const generateWideGrid = () => {
    const grid = [];
    for (let r = -12; r <= 12; r++) {
        const rOffset = Math.floor(r / 2);
        for (let q = -20 - rOffset; q <= 20 - rOffset; q++) {
            grid.push({ id: `${q},${r}`, q, r, ...getXY(q, r) });
        }
    }
    return grid;
};

                bgTones = ['#166534', '#14532d', '#15803d'];
                if (rand < 0.5) emoji = rand < 0.3 ? '🌼' : (rand < 0.4 ? '🐝' : '🦋');
            } else if (h.q > 3 && h.r > 2) { // 5. Rocky
                bgTones = ['#3f3f46', '#27272a', '#52525b'];
                if (rand < 0.3) emoji = rand < 0.2 ? '🪨' : '⛏️';
            } else if (h.q > 6 && h.r > -2 && h.r < 2) { // 6. Spooky
                bgTones = ['#312e81', '#1e1b4b', '#3730a3'];
                if (rand < 0.3) emoji = rand < 0.15 ? '🦇' : '🕸️';
            } else if (h.q < -7 && Math.abs(h.r) <= 2) { // 7. Campfire
                if (rand < 0.2) emoji = rand < 0.1 ? '🪵' : '🔥';
            } else { // 8. Mixed
                if (rand < 0.15) emoji = '🌳'; else if (rand < 0.25) emoji = '🌿';
            }

            const fill = bgTones[Math.floor(rand * bgTones.length)];
            return { ...h, emoji, fill };
        });
    }, []);

    const getValidOuts = (node) => {
        if (!node || !node.dirs) return [];
        return node.dirs.map(dir => ({ dir: dir, id: `${node.q + HEX_DIRS[dir].q},${node.r + HEX_DIRS[dir].r}` })).filter(out => RAW_MAP_DATA[out.id]);
    };

    const calculateGhostPath = (startNodeId, chosenDirIdx) => {
        let path = [];
        let currentId = startNodeId;
        let steps = movesLeft;

        path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});

        let nextId = `${RAW_MAP_DATA[currentId].q + HEX_DIRS[chosenDirIdx].q},${RAW_MAP_DATA[currentId].r + HEX_DIRS[chosenDirIdx].r}`;
        if (!RAW_MAP_DATA[nextId]) return { path, landingNode: null };
        
        currentId = nextId;
        path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
        
        const nextNode = RAW_MAP_DATA[currentId];
        const nextOuts = getValidOuts(nextNode);
        if (nextOuts.length <= 1 && nextNode.type !== 'thwomp') steps--; 

        while (steps > 0) {
            let node = RAW_MAP_DATA[currentId];
            let outs = getValidOuts(node);
            
            if (outs.length === 0 || outs.length > 1 || node.type === 'thwomp' || node.type === 'star') break; 
            
            currentId = outs[0].id;
            path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
            
            let nextNextNode = RAW_MAP_DATA[currentId];
            let nextNextOuts = getValidOuts(nextNextNode);
            if (nextNextOuts.length <= 1 && nextNextNode.type !== 'thwomp') steps--;
        }
        return { path, landingNode: RAW_MAP_DATA[currentId] };
    };

    const previewChoice = (dirIdx) => {
        setSelectedForkDir(dirIdx);
        const ghostData = calculateGhostPath(activePos, dirIdx);
        setGhostPathCoords(ghostData.path);
        setGhostLandingNode(ghostData.landingNode);
    };

    const confirmChoice = () => {
        if (selectedForkDir === null) return;
        const nextId = `${RAW_MAP_DATA[activePos].q + HEX_DIRS[selectedForkDir].q},${RAW_MAP_DATA[activePos].r + HEX_DIRS[selectedForkDir].r}`;
        
        setSelectedForkDir(null);
        setGhostPathCoords([]);
        setGhostLandingNode(null);
        
        tryMoveTo(nextId);
    };

    // --- FIN DE TURNO & DEMO PREGUNTA ---
    const endTurn = (finalPosId) => {
        const finalNode = RAW_MAP_DATA[finalPosId];
        const pName = players[turn].name;
        
        updateCurrentPlayer(p => ({ ...p, pos: finalPosId }));

        // Activar Minijuego (Demo) si cae en azul
        if (finalNode.type === 'blue') {
            const q = DEMO_QUESTIONS[Math.floor(Math.random() * DEMO_QUESTIONS.length)];
            setCurrentQuestion(q);
            setGamePhase('QUESTION_PROMPT');
            return; // Pausamos el fin de turno hasta que responda
        }

        // Otros eventos
        if (finalNode.type === 'event') showToast("⚡ ¡Evento Sorpresa!");
        if (finalNode.type === 'red') { showToast(`🔴 ${pName} perdió -3 Monedas`); updateCurrentPlayer(p => ({...p, coins: p.coins - 3})); }
        
        finalizeTurnChange();
    };

    const finalizeTurnChange = () => {
        setTimeout(() => {
            setGamePhase('IDLE');
            setTurn(prevTurn => (prevTurn + 1) % players.length);
        }, 1500);
    };

    const handleQuestionAnswer = (selectedOption) => {
        if (selectedOption === currentQuestion.answer) {
            showToast(`✅ ¡Correcto! ${players[turn].name} ganó +3 Monedas`);
            updateCurrentPlayer(p => ({...p, coins: p.coins + 3}));
        } else {
            showToast(`❌ Incorrecto. La respuesta era ${currentQuestion.answer}`);
        }
        setCurrentQuestion(null);
        finalizeTurnChange();
    };

    // --- NÚCLEO DE MOVIMIENTO ---
    const tryMoveTo = (nextNodeId) => {
        const nextNode = RAW_MAP_DATA[nextNodeId];
        
        if (nextNode.type === 'thwomp') {
            setPendingNode(nextNodeId);
            setGamePhase('THWOMP_PROMPT');
            return;
        }
        if (nextNode.type === 'star') {
            setPendingNode(nextNodeId);
            setGamePhase('STAR_PROMPT');
            return;
        }

        executeMove(nextNodeId);
    };

    const executeMove = (nextNodeId) => {
        const nextNode = RAW_MAP_DATA[nextNodeId];
        const isNextFork = getValidOuts(nextNode).length > 1;
        setActivePos(nextNodeId);
        updateCurrentPlayer(p => ({...p, pos: nextNodeId}));

        let newMoves = movesLeft;
        if (!isNextFork && nextNode.type !== 'thwomp') {
            newMoves -= 1;
        }

        if (newMoves > 0) {
            if (nextNode.type === 'bowser') { showToast(`💀 Bowser roba 10 Monedas`); updateCurrentPlayer(p => ({...p, coins: p.coins - 10})); }
            if (nextNode.type === 'koopa') { showToast(`🏆 Koopa regala +10 Monedas`); updateCurrentPlayer(p => ({...p, coins: p.coins + 10})); }
        }

        setMovesLeft(newMoves);
        if (newMoves <= 0) {
            endTurn(nextNodeId);
        } else {
            setGamePhase('MOVING');
        }
    };

    useEffect(() => {
        if (gamePhase === 'MOVING' && movesLeft > 0 && !isRolling) {
            const timer = setTimeout(() => {
                const currentNode = RAW_MAP_DATA[activePos];
                const validOuts = getValidOuts(currentNode);

                if (validOuts.length === 0) { endTurn(activePos); return; }
                if (validOuts.length > 1) { setGamePhase('CHOICE'); return; }

                tryMoveTo(validOuts[0].id);

            }, 350);
            return () => clearTimeout(timer);
        }
    }, [gamePhase, movesLeft, activePos, isRolling]);

    useEffect(() => {
        if (gamePhase === 'IDLE' && players[turn]) {
            setActivePos(players[turn].pos);
        }
    }, [turn, gamePhase]);

    const rollDice = () => {
        if (gamePhase !== 'IDLE') return;
        setIsRolling(true);
        let count = 0;
        const interval = setInterval(() => {
            setDisplayDice(Math.floor(Math.random() * 6) + 1);
            count++;
            if (count > 15) {
                 clearInterval(interval);
                 const finalRoll = Math.floor(Math.random() * 6) + 1;
                 setDisplayDice(finalRoll);
                 setIsRolling(false);
                 setMovesLeft(finalRoll);
                 setGamePhase('MOVING');
            }
        }, 50);
    };

    const handleThwompPay = () => {
        updateCurrentPlayer(p => ({...p, coins: p.coins - 10}));
        showToast("🪨 ¡Pagaste el peaje!");
        executeMove(pendingNode); 
    };

    const handleThwompFail = () => {
        let curr = activePos;
        for(let i=0; i<5; i++) {
            const parents = reverseMap[curr];
            if(parents && parents.length > 0) curr = parents[0];
            else break;
        }
        
        setActivePos(curr);
        updateCurrentPlayer(p => ({...p, pos: curr}));
        setMovesLeft(0);
        showToast("💥 ¡El Thwomp te aplastó! Retrocedes 5 casillas.");
        
        setTimeout(() => endTurn(curr), 1500); 
        setGamePhase('IDLE'); 
    };

    const handleStarBuy = (buy) => {
        if (buy) {
            updateCurrentPlayer(p => ({...p, coins: p.coins - 20, stars: p.stars + 1}));
            showToast("⭐ ¡Compraste una Estrella!");
            confetti({particleCount: 150, spread: 70});
        }
        executeMove(pendingNode); 
    };

    return (
        <div className="h-full flex flex-col bg-emerald-950 relative">
            
            {/* PLAYER HUD (4 JUGADORES / TOGGLE VIEW) */}
            <div className="bg-zinc-900 border-b border-zinc-800 shrink-0 flex flex-col z-10 shadow-xl">
                <div className="flex justify-between items-center p-2 bg-zinc-950">
                    <span className="text-zinc-400 font-bold text-xs uppercase tracking-widest px-2">Turno {Math.floor(turn/4)+1}</span>
                    <button onClick={() => setShowAllPlayers(!showAllPlayers)} className="text-zinc-400 hover:text-white flex items-center gap-1 text-xs font-bold px-2 py-1 rounded bg-zinc-800">
                        {showAllPlayers ? <><EyeOff size={14}/> Ocultar</> : <><Eye size={14}/> Ver Todos</>}
                    </button>
                </div>
                
                <div className={`grid ${showAllPlayers ? 'grid-cols-2 md:grid-cols-4' : 'grid-cols-1'} w-full`}>
                    {players.map((p, idx) => {
                        if (!showAllPlayers && idx !== turn) return null; // Solo muestra al de turno si está oculto
                        return (
                            <div key={p.id} className={`p-3 flex justify-between items-center border-b-4 transition-all ${turn === idx ? 'border-indigo-500 bg-zinc-800' : 'border-transparent bg-zinc-950 opacity-70 grayscale'}`}>
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full border-2 shadow-lg" style={{backgroundColor: p.color, borderColor: p.activeColor}}></div>
                                    <div className="flex flex-col">
                                        <span className="font-black text-white text-sm leading-none">{p.name}</span>
                                        {turn === idx && gamePhase === 'IDLE' && <span className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest mt-1">¡Tu Turno!</span>}
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <div className="flex items-center gap-1"><Coins className="text-yellow-400" size={16}/><span className={`font-black ${p.coins < 0 ? 'text-rose-500' : 'text-white'}`}>{p.coins}</span></div>
                                    <div className="flex items-center gap-1"><Star className="text-amber-400 fill-amber-400" size={16}/><span className="font-black text-white">{p.stars}</span></div>
                                </div>
                            </div>
                        )
                    })}
                </div>
            </div>

            {/* DADO FLOTANTE (ESQUINA SUPERIOR DERECHA) */}
            {gamePhase === 'IDLE' && (
                <div className="absolute top-32 right-6 z-50 animate-in slide-in-from-right-10">
                    <button onClick={rollDice} disabled={isRolling} 
                            className={`w-20 h-20 md:w-24 md:h-24 rounded-[2rem] flex flex-col items-center justify-center transition-all border-4 ${!isRolling ? 'shadow-[0_8px_0_rgba(0,0,0,0.5)] active:translate-y-2 active:shadow-none cursor-pointer' : 'shadow-none cursor-not-allowed'}`}
                            style={{ backgroundColor: players[turn].color, borderColor: players[turn].activeColor }}>
                        {isRolling ? (
                            <span className="text-4xl md:text-5xl font-black text-white animate-pulse">{displayDice}</span>
                        ) : (
                            <><Dices size={36} className="mb-1 text-white"/><span className="text-[10px] font-bold uppercase tracking-widest text-white">Tirar</span></>
                        )}
                    </button>
                </div>
            )}

            {/* TABLERO INTERACTIVO */}
            <div className="flex-1 relative overflow-hidden flex items-center justify-center bg-[#022c22]">
                
                {toastMsg && (
                    <div className="absolute top-10 z-50 pointer-events-none">
                        <div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-bounce border-4 border-emerald-500">{toastMsg}</div>
                    </div>
                )}

                <svg viewBox="-500 -350 1000 700" className="w-full h-full">
                    {/* BOSQUE */}
                    <g>
                        {forestDecorations.map((t) => (
                            <g key={`forest-${t.id}`}>
                                <polygon points={getHexPoints(t.x, t.y)} fill={t.fill} stroke="#022c22" strokeWidth="1" opacity="0.8" />
                                {t.emoji && <text x={t.x} y={t.y} fontSize="20" textAnchor="middle" dominantBaseline="central" opacity="0.9">{t.emoji}</text>}
                            </g>
                        ))}
                    </g>

                    {/* CASILLAS */}
                    <g>
                        {Object.values(RAW_MAP_DATA).map((tile) => {
                            const isFork = getValidOuts(tile).length > 1;
                            const baseStyle = SPACE_TYPES[tile.type];
                            
                            // FORKS SON COLOR MADERA
                            const fill = isFork ? '#78350f' : baseStyle.fill;
                            const stroke = isFork ? '#b45309' : baseStyle.stroke;
                            const isGhostLanding = ghostLandingNode && ghostLandingNode.id === tile.id;

                            // CONDICIÓN: FLECHAS SOLO EN ROJAS, AZULES O FORKS
                            const shouldHaveArrows = tile.type === 'blue' || tile.type === 'red' || isFork;

                            return (
                                <g key={`play-${tile.id}`}>
                                    <polygon points={getHexPoints(tile.x, tile.y)} 
                                             fill={fill} 
                                             stroke={isGhostLanding ? '#ffffff' : stroke} 
                                             strokeWidth={isGhostLanding ? "6" : "3"} 
                                             className={isGhostLanding ? "pulse-landing" : "drop-shadow-lg"} />
                                    {baseStyle.icon && <g transform={`translate(${tile.x - 9}, ${tile.y - 9})`}>{baseStyle.icon}</g>}
                                    
                                    {/* Flechas blancas manuales centradas */}
                                    {shouldHaveArrows && (tile.dirs || []).map(dir => (
                                        <g key={`arrow-${dir}`} transform={`translate(${tile.x}, ${tile.y}) rotate(${dir * 60})`}>
                                            <path d="M 0,-1.5 L 5,-1.5 L 5,-3.5 L 10,0 L 5,3.5 L 5,1.5 L 0,1.5 Z" fill="rgba(255,255,255,0.6)" />
                                        </g>
                                    ))}
                                </g>
                            );
                        })}
                    </g>

                    {/* GHOST PATH */}
                    {gamePhase === 'CHOICE' && ghostPathCoords.length > 1 && (
                        <polyline points={ghostPathCoords.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#ffffff" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="8 12" className="ghost-path drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]" />
                    )}

                    {/* FICHAS MULTIJUGADOR (4) */}
                    {players.map((p, idx) => {
                        const posIdToRender = (idx === turn && gamePhase !== 'IDLE') ? activePos : p.pos;
                        const tileData = RAW_MAP_DATA[posIdToRender];
                        if(!tileData) return null;
                        
                        // Lógica de offsets si comparten casilla
                        const sharingPlayers = players.filter(pl => (pl.id===turn+1 ? activePos : pl.pos) === posIdToRender);
                        const isSharingTile = sharingPlayers.length > 1;
                        const shareIndex = sharingPlayers.findIndex(pl => pl.id === p.id);
                        
                        let offsetX = 0, offsetY = 0;
                        if (isSharingTile) {
                            if(shareIndex === 0) { offsetX = -8; offsetY = -8; }
                            else if(shareIndex === 1) { offsetX = 8; offsetY = -8; }
                            else if(shareIndex === 2) { offsetX = -8; offsetY = 8; }
                            else if(shareIndex === 3) { offsetX = 8; offsetY = 8; }
                        }

                        return (
                            <g key={`player-${p.id}`} className="transition-all duration-300 ease-in-out z-50" style={{ transform: `translate(${tileData.x + offsetX}px, ${tileData.y + offsetY}px)` }}>
                                <circle cx="0" cy="0" r="14" fill="#ffffff" className="shadow-xl" />
                                <circle cx="0" cy="0" r="10" fill={p.color} />
                                {idx === turn && gamePhase === 'IDLE' && <circle cx="0" cy="0" r="22" fill="none" stroke={p.activeColor} strokeWidth="4" className="animate-pulse" />}
                            </g>
                        );
                    })}

                    {/* PASOS RESTANTES */}
                    {(gamePhase === 'MOVING' || gamePhase === 'CHOICE' || gamePhase === 'THWOMP_PROMPT' || gamePhase === 'STAR_PROMPT') && (
                        <g style={{ transform: `translate(${RAW_MAP_DATA[activePos].x}px, ${RAW_MAP_DATA[activePos].y - 35}px)` }} className="transition-all duration-300 ease-in-out z-50">
                            <rect x="-14" y="-14" width="28" height="28" rx="8" fill={players[turn].color} stroke="#ffffff" strokeWidth="2" className="drop-shadow-lg"/>
                            <text x="0" y="5" fill="white" fontSize="16" fontWeight="black" textAnchor="middle">{movesLeft}</text>
                        </g>
                    )}
                </svg>

                {/* MODAL BIFURCACIÓN INFERIOR */}
                {gamePhase === 'CHOICE' && (
                    <div className="absolute bottom-0 left-0 right-0 bg-zinc-900 border-t-4 border-indigo-500 p-6 shadow-[0_-15px_30px_rgba(0,0,0,0.6)] z-40 animate-in slide-in-from-bottom-10">
                        <div className="max-w-3xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="text-center md:text-left shrink-0">
                                <h2 className="text-2xl font-black text-white flex items-center justify-center md:justify-start gap-2"><MapPin className="text-indigo-400"/> ¡Intersección!</h2>
                                <p className="text-zinc-400 text-sm mt-1">Elige una ruta con <span className="text-white font-bold">{movesLeft} pasos</span>.</p>
                            </div>
                            
                            <div className="flex-1 flex justify-center gap-3 w-full">
                                {getValidOuts(RAW_MAP_DATA[activePos]).map((out) => {
                                    const isSelected = selectedForkDir === out.dir;
                                    const customName = RAW_MAP_DATA[activePos].dirLabels?.[out.dir] || `Ruta ${HEX_DIRS[out.dir].label}`;
                                    const nextType = SPACE_TYPES[RAW_MAP_DATA[out.id].type];
                                    return (
                                        <button key={out.id} onClick={() => previewChoice(out.dir)} 
                                            className={`btn-juicy flex-1 p-3 rounded-2xl font-bold flex flex-col items-center justify-center border-2 transition-all ${isSelected ? 'bg-indigo-600 border-indigo-400 text-white shadow-[0_0_15px_rgba(99,102,241,0.5)] scale-105' : 'bg-zinc-800 border-zinc-700 text-zinc-300 hover:bg-zinc-700'}`}>
                                            <span className="text-xs opacity-70 mb-1 uppercase tracking-widest">{customName}</span>
                                            <span className="flex items-center gap-2">{nextType.icon} Hacia {nextType.name}</span> 
                                        </button>
                                    )
                                })}
                            </div>

                            <div className="shrink-0 w-full md:w-auto">
                                <button onClick={confirmChoice} disabled={selectedForkDir === null} className="btn-juicy w-full md:w-auto bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-500 text-emerald-950 px-8 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-[0_6px_0_theme(colors.emerald.700)] disabled:shadow-none">
                                    Avanzar <ArrowRight size={24}/>
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* MODAL PREGUNTA DEMO (SIMULANDO FIREBASE) */}
                {gamePhase === 'QUESTION_PROMPT' && currentQuestion && (
                    <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-indigo-500 rounded-3xl p-8 w-full max-w-lg shadow-2xl animate-in zoom-in-95">
                            <div className="flex justify-center mb-4">
                                <div className="bg-indigo-600 p-3 rounded-full shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                                    <BrainCircuit className="text-white" size={32}/>
                                </div>
                            </div>
                            <h2 className="text-2xl font-black text-white mb-6 text-center">{currentQuestion.text}</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {currentQuestion.options.map(opt => (
                                    <button key={opt} onClick={() => handleQuestionAnswer(opt)} 
                                        className="btn-juicy bg-zinc-800 hover:bg-indigo-600 border-2 border-zinc-700 hover:border-indigo-400 text-white p-4 rounded-2xl font-bold text-lg transition-all">
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {/* MODALES EVENTOS (THWOMP / STAR) */}
                {gamePhase === 'THWOMP_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-zinc-700 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95">
                            <AlertTriangle className="mx-auto text-zinc-400 mb-4" size={50}/>
                            <h2 className="text-3xl font-black text-white mb-2">¡Thwomp!</h2>
                            <p className="text-zinc-400 mb-6">El peaje es de <span className="text-yellow-400 font-bold">10 Monedas</span> para cruzar el puente.</p>
                            <div className="flex flex-col gap-3">
                                <button onClick={handleThwompPay} disabled={players[turn].coins < 10} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-emerald-950 py-4 rounded-2xl font-black text-lg shadow-[0_6px_0_theme(colors.emerald.700)] disabled:shadow-none">
                                    Pagar 10 Monedas
                                </button>
                                <button onClick={handleThwompFail} className="btn-juicy w-full bg-rose-600 hover:bg-rose-500 text-white py-4 rounded-2xl font-bold text-lg shadow-[0_6px_0_theme(colors.rose.800)]">
                                    ¡No puedo pagar! (Rebotar)
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {gamePhase === 'STAR_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-amber-500 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95">
                            <Star className="mx-auto text-amber-400 fill-amber-400 mb-4 animate-pulse" size={60}/>
                            <h2 className="text-3xl font-black text-white mb-2">¡Estrella!</h2>
                            <p className="text-zinc-400 mb-6">¿Quieres comprarla por <span className="text-yellow-400 font-bold">20 Monedas</span>?</p>
                            <div className="flex flex-col gap-3">
                                <button onClick={() => handleStarBuy(true)} disabled={players[turn].coins < 20} className="btn-juicy w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-amber-950 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.amber.700)] disabled:shadow-none flex items-center justify-center gap-2">
                                    <Star size={20} className="fill-amber-950"/> Comprar Estrella
                                </button>
                                <button onClick={() => handleStarBuy(false)} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-white py-4 rounded-2xl font-bold text-lg">
                                    Pasar de largo
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

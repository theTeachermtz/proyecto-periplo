<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LingoMatch | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }; 
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Users, Play, Eye, Plus, LogIn, CheckCircle2, XCircle, Trophy, User, Pause, AlertTriangle, BookOpen, Clock, Zap, Timer, ChevronRight } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from 'firebase/firestore';
        import confetti from 'canvas-confetti';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const genCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

        const LingoMatch = () => {
            const [user, setUser] = useState(null);
            const [quizData, setQuizData] = useState(null);
            const [roomCode, setRoomCode] = useState('');
            const [inputCode, setInputCode] = useState('');
            const [roomData, setRoomData] = useState(null);
            const [isObserver, setIsObserver] = useState(false);
            
            // UI States
            const [selection, setSelection] = useState({ c1: null, c2: null, c3: null });
            const [feedback, setFeedback] = useState('none');
            const [locked, setLocked] = useState(false);
            const [errorModal, setErrorModal] = useState(null);
            
            // Single Player Timer
            const [timer, setTimer] = useState(0);
            const timerRef = useRef(null);

            // 1. Init Auth & Fetch Quiz
            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                
                const quizId = new URLSearchParams(window.location.search).get('id');
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if(snap.exists()) setQuizData(snap.data());
                        else alert("Juego no encontrado");
                    });
                }
                return () => unsub();
            }, []);

            // 2. Sync Room
            useEffect(() => {
                if (!user || !roomCode) return;
                const unsub = onSnapshot(doc(db, 'artifacts/periplo-app-v1/public/rooms', roomCode), (docSnap) => {
                    if (docSnap.exists()) setRoomData(docSnap.data());
                    else { setRoomCode(''); setRoomData(null); alert("Sala cerrada."); }
                });
                return () => unsub();
            }, [user, roomCode]);

            // 3. Timer for Single Player
            useEffect(() => {
                if (roomData?.gameState === 'playing' && roomData?.mode === 'single') {
                    timerRef.current = setInterval(() => setTimer(prev => prev + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [roomData?.gameState, roomData?.mode]);

            // Formato de Tiempo (mm:ss)
            const formatTime = (totalSeconds) => {
                const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const s = (totalSeconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const myPlayer = roomData?.players?.find(p => p.uid === user?.uid);
            const myRole = myPlayer ? myPlayer.id : (isObserver ? 'obs' : null);

            // --- LOBBY & ROLES ---
            const createRoom = async () => {
                if (!quizData) return alert("Esperando datos del juego...");
                const code = genCode();
                await setDoc(doc(db, 'artifacts/periplo-app-v1/public/rooms', code), {
                    quizId: new URLSearchParams(window.location.search).get('id'),
                    gameState: 'roles',
                    players: [
                        { id: 'p1', name: 'Jugador 1', score: 0, color: 'bg-indigo-500', occupied: false, uid: null },
                        { id: 'p2', name: 'Jugador 2', score: 0, color: 'bg-rose-500', occupied: false, uid: null },
                        { id: 'p3', name: 'Jugador 3', score: 0, color: 'bg-emerald-500', occupied: false, uid: null },
                        { id: 'p4', name: 'Jugador 4', score: 0, color: 'bg-amber-500', occupied: false, uid: null },
                    ]
                });
                setRoomCode(code);
            };

            const joinRoom = async () => {
                const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/public/rooms', inputCode.toUpperCase()));
                if (snap.exists()) setRoomCode(inputCode.toUpperCase());
                else alert('Código inválido.');
            };

            const selectRole = async (roleId) => {
                if (roleId === 'obs') { setIsObserver(true); return; }
                const updated = roomData.players.map(p => p.id === roleId ? { ...p, occupied: true, uid: user.uid } : (p.uid === user.uid ? { ...p, occupied: false, uid: null } : p));
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/public/rooms', roomCode), { players: updated });
                setIsObserver(false);
            };

            // --- INICIAR PARTIDA ---
            const startGame = async () => {
                const activePlayers = roomData.players.filter(p => p.occupied);
                const mode = activePlayers.length === 1 ? 'single' : 'multi';
                
                // Configuración de Rondas (Matemática del Builder)
                const settings = quizData.content.settings || { rounds: 4, rowsPerRound: 6 };
                const totalNeeded = settings.rounds * settings.rowsPerRound;
                
                let allPairs = shuffle([...quizData.content.pairs]);
                
                // Si el maestro no configuró bien, rellenamos o cortamos
                if (allPairs.length < totalNeeded) {
                    const diff = totalNeeded - allPairs.length;
                    for(let i=0; i<diff; i++) allPairs.push(allPairs[i % allPairs.length]);
                }
                const gamePool = allPairs.slice(0, totalNeeded);
                const round1Pairs = gamePool.slice(0, settings.rowsPerRound);

                await updateDoc(doc(db, 'artifacts/periplo-app-v1/public/rooms', roomCode), {
                    gameState: 'playing',
                    mode: mode,
                    settings: settings,
                    gamePool: gamePool, // Toda la lista de esta sesión
                    currentRound: 1,
                    board: generateBoardColumns(round1Pairs),
                    matchedIds: [],
                    currentTurn: activePlayers[0].id,
                    players: roomData.players.map(p => ({...p, score: 0, roundScore: 0}))
                });

                if (mode === 'single') setTimer(0);
            };

            const generateBoardColumns = (pairsSubset) => {
                return {
                    c1: shuffle(pairsSubset.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c1 }))),
                    c2: shuffle(pairsSubset.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c2 }))),
                    c3: shuffle(pairsSubset.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c3 })))
                };
            };

            // --- LÓGICA DEL JUEGO ---
            const handleSelect = (col, item) => {
                if (locked || myRole === 'obs') return;
                if (roomData.mode === 'multi' && myRole !== roomData.currentTurn) return;
                
                setSelection(prev => ({ ...prev, [col]: prev[col]?.uid === item.uid ? null : item }));
            };

            useEffect(() => {
                if (selection.c1 && selection.c2 && selection.c3) validateMatch();
            }, [selection]);

            const validateMatch = () => {
                setLocked(true);
                const id1 = selection.c1.pairId;
                const id2 = selection.c2.pairId;
                const id3 = selection.c3.pairId;

                const isPerfect = (id1 === id2 && id2 === id3);
                const isPartial = !isPerfect && ((id1 === id2) || (id2 === id3) || (id1 === id3));
                
                const targetPair = roomData.gamePool.find(p => p.id === id1) || roomData.gamePool.find(p => p.id === id2);

                if (isPerfect) {
                    setFeedback('success');
                    setTimeout(() => processTurn(3, true), 800);
                } else if (isPartial) {
                    setFeedback('partial');
                    setTimeout(() => {
                        setErrorModal({
                            title: "¡Casi!", 
                            correct: `${targetPair.c1} ➔ ${targetPair.c2} ➔ ${targetPair.c3}`,
                            penalty: roomData.mode === 'single' ? "+2 Segundos" : "+1 Punto Parcial",
                            type: 'partial'
                        });
                    }, 500);
                } else {
                    setFeedback('error');
                    setTimeout(() => {
                        setErrorModal({
                            title: "¡Error Total!", 
                            correct: `${targetPair.c1} ➔ ${targetPair.c2} ➔ ${targetPair.c3}`,
                            penalty: roomData.mode === 'single' ? "+5 Segundos" : "0 Puntos",
                            type: 'error'
                        });
                    }, 500);
                }
            };

            const acceptPenalty = async () => {
                const type = errorModal.type;
                setErrorModal(null);
                
                if (roomData.mode === 'single') {
                    setTimer(prev => prev + (type === 'partial' ? 2 : 5));
                    await processTurn(0, false); // En single player no hay puntos
                } else {
                    await processTurn(type === 'partial' ? 1 : 0, false);
                }
            };

            const processTurn = async (pointsEarned, clearBoard) => {
                setSelection({ c1: null, c2: null, c3: null });
                setFeedback('none');
                setLocked(false);

                let updatedPlayers = [...roomData.players];
                let newMatched = [...roomData.matchedIds];
                let nextTurn = roomData.currentTurn;

                // Asignar Puntos (Solo Multi)
                if (roomData.mode === 'multi') {
                    updatedPlayers = updatedPlayers.map(p => p.id === roomData.currentTurn ? { ...p, score: p.score + pointsEarned, roundScore: (p.roundScore || 0) + pointsEarned } : p);
                    
                    // Pasar Turno
                    const active = updatedPlayers.filter(p => p.occupied);
                    const currIdx = active.findIndex(p => p.id === roomData.currentTurn);
                    nextTurn = active[(currIdx + 1) % active.length].id;
                }

                // Limpiar Tablero si fue Perfecto
                if (clearBoard) {
                    newMatched = [...newMatched, selection.c1.uid, selection.c2.uid, selection.c3.uid];
                }

                const ref = doc(db, 'artifacts/periplo-app-v1/public/rooms', roomCode);
                const isRoundOver = newMatched.length >= (roomData.settings.rowsPerRound * 3);

                if (isRoundOver) {
                    let finalPlayers = [...updatedPlayers];
                    
                    // Bono de Ronda en Multi
                    if (roomData.mode === 'multi') {
                        const maxRoundScore = Math.max(...finalPlayers.map(p => p.roundScore || 0));
                        finalPlayers = finalPlayers.map(p => ({
                            ...p,
                            score: p.roundScore === maxRoundScore && p.roundScore > 0 ? p.score + 5 : p.score, // +5 al ganador de la ronda
                            roundScore: 0 // Resetear para la siguiente
                        }));
                    }

                    const nextRound = roomData.currentRound + 1;
                    
                    if (nextRound > roomData.settings.rounds) {
                        // Fin del Juego
                        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                        await updateDoc(ref, { gameState: 'end', players: finalPlayers, finalTime: timer });
                    } else {
                        // Siguiente Ronda
                        const startIndex = (nextRound - 1) * roomData.settings.rowsPerRound;
                        const nextPairs = roomData.gamePool.slice(startIndex, startIndex + roomData.settings.rowsPerRound);
                        
                        await updateDoc(ref, {
                            currentRound: nextRound,
                            board: generateBoardColumns(nextPairs),
                            matchedIds: [],
                            players: finalPlayers,
                            currentTurn: nextTurn
                        });
                    }
                } else {
                    // Continuar Ronda Actual
                    await updateDoc(ref, { players: updatedPlayers, matchedIds: newMatched, currentTurn: nextTurn });
                }
            };

            // --- VISTAS ---
            if (!quizData) return <div className="h-screen flex items-center justify-center font-black animate-pulse">Cargando Motor...</div>;

            if (!roomData) return (
                <div className="h-screen flex flex-col items-center justify-center p-6 bg-zinc-950 relative overflow-hidden">
                    <div className="absolute top-10 w-full text-center">
                        <h1 className="text-3xl font-black italic text-indigo-500 mb-2">LINGOMATCH <span className="text-amber-400">TRIPLE</span></h1>
                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">{quizData.title}</p>
                    </div>

                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl z-10">
                        <button onClick={createRoom} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 flex items-center justify-center gap-2 mb-6"><Plus/> CREAR SALA</button>
                        <div className="flex gap-2">
                            <input value={inputCode} onChange={e => setInputCode(e.target.value)} maxLength={6} placeholder="CÓDIGO" className="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-center text-xl font-black uppercase outline-none focus:border-indigo-500 text-white"/>
                            <button onClick={joinRoom} disabled={inputCode.length !== 6} className="btn-juicy bg-zinc-800 text-white font-black px-6 rounded-xl border-zinc-700 disabled:opacity-50"><LogIn/></button>
                        </div>
                    </div>
                </div>
            );

            if (roomData.gameState === 'roles') return (
                <div className="h-screen flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="w-full max-w-xl bg-zinc-900 border border-zinc-800 rounded-[2rem] overflow-hidden shadow-2xl">
                        <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950">
                            <div>
                                <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">SALA ACTIVA</p>
                                <p className="text-3xl font-black text-indigo-400 tracking-widest">{roomCode}</p>
                            </div>
                            <button onClick={() => setRoomData(null)} className="p-3 bg-rose-500/10 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-colors"><XCircle/></button>
                        </div>
                        
                        <div className="p-6">
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                {roomData.players.map(p => (
                                    <button key={p.id} onClick={() => selectRole(p.id)} disabled={p.occupied && p.uid !== user.uid} className={`btn-juicy p-4 rounded-xl border-b-4 font-black flex items-center gap-3 transition-all ${p.occupied && p.uid !== user.uid ? 'bg-zinc-950 border-zinc-900 text-zinc-600 opacity-50' : p.uid === user.uid ? `${p.color} border-black text-white ring-2 ring-white scale-105` : 'bg-zinc-800 border-zinc-950 text-zinc-300'}`}>
                                        <User size={20}/> {p.name}
                                    </button>
                                ))}
                            </div>
                            
                            {roomData.players.some(p => p.occupied) && myRole !== 'obs' && (
                                <button onClick={startGame} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 flex items-center justify-center gap-2 text-xl mt-8">
                                    {roomData.players.filter(p=>p.occupied).length === 1 ? <Timer size={24}/> : <Play size={24} fill="currentColor"/>}
                                    {roomData.players.filter(p=>p.occupied).length === 1 ? "MODO SPEEDRUN (1P)" : "MODO ARENA (VS)"}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );

            if (roomData.gameState === 'playing') {
                const isMulti = roomData.mode === 'multi';
                const activePlayer = roomData.players.find(p => p.id === roomData.currentTurn);
                const isMyTurn = !isMulti || myRole === roomData.currentTurn;

                const renderCol = (items, colKey) => (
                    <div className="flex-1 flex flex-col gap-2">
                        {items.map(item => {
                            const isMatched = roomData.matchedIds.includes(item.uid);
                            const isSel = selection[colKey]?.uid === item.uid;
                            
                            let bg = "bg-zinc-900 border-zinc-800 text-zinc-300";
                            if (isSel) {
                                if (feedback === 'error') bg = "bg-rose-500 border-rose-700 text-white animate-shake";
                                else if (feedback === 'partial') bg = "bg-amber-500 border-amber-700 text-white animate-shake";
                                else if (feedback === 'success') bg = "bg-emerald-500 border-emerald-700 text-white scale-105";
                                else bg = "bg-indigo-600 border-indigo-800 text-white scale-105";
                            }

                            if (isMatched) return <div key={item.uid} className="h-[4.5rem] sm:h-20 border-2 border-dashed border-zinc-800 rounded-2xl flex items-center justify-center opacity-30"><CheckCircle2 className="text-zinc-700"/></div>;

                            return (
                                <button key={item.uid} onClick={() => handleSelect(colKey, item)} className={`btn-juicy h-[4.5rem] sm:h-20 rounded-2xl border-2 font-black text-sm sm:text-base leading-tight px-2 transition-all ${bg}`}>
                                    {item.text}
                                </button>
                            );
                        })}
                    </div>
                );

                return (
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 relative">
                        {/* HEADER DE PARTIDA */}
                        <header className="bg-zinc-900 border-b border-zinc-800 p-4 shrink-0 z-20 flex justify-between items-center shadow-lg">
                            <div className="flex items-center gap-3">
                                <div className="bg-zinc-950 px-3 py-1.5 rounded-lg border border-zinc-800 font-black text-zinc-500 text-xs tracking-widest hidden sm:block">SALA {roomCode}</div>
                                <div className="font-black text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-lg uppercase text-xs">Ronda {roomData.currentRound} / {roomData.settings.rounds}</div>
                            </div>
                            
                            {isMulti ? (
                                <div className="flex gap-2">
                                    {roomData.players.filter(p=>p.occupied).map(p => (
                                        <div key={p.id} className={`flex flex-col items-center px-3 py-1 rounded-xl border-2 transition-all ${p.id === roomData.currentTurn ? 'border-indigo-500 bg-indigo-500/20 scale-110' : 'border-transparent bg-zinc-950'}`}>
                                            <span className={`text-xs font-black uppercase ${p.color.replace('bg-','text-')}`}>{p.name.split(' ')[1] || p.name}</span>
                                            <span className="text-lg font-black leading-none">{p.score}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="flex items-center gap-2 bg-zinc-950 border border-zinc-800 px-4 py-2 rounded-xl">
                                    <Clock className="text-amber-500" size={20}/>
                                    <span className="font-black text-2xl text-amber-500 tracking-wider tabular-nums">{formatTime(timer)}</span>
                                </div>
                            )}
                        </header>

                        {/* ERROR MODAL (CASTIGOS) */}
                        {errorModal && (
                            <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                                <div className={`bg-zinc-900 border-4 rounded-3xl p-6 max-w-sm w-full text-center animate-shake shadow-2xl ${errorModal.type === 'error' ? 'border-rose-500 shadow-[0_0_30px_rgba(244,63,94,0.3)]' : 'border-amber-500 shadow-[0_0_30px_rgba(245,158,11,0.3)]'}`}>
                                    <h2 className={`text-3xl font-black italic mb-2 uppercase ${errorModal.type === 'error' ? 'text-rose-500' : 'text-amber-500'}`}>{errorModal.title}</h2>
                                    <p className="text-zinc-400 font-bold text-xs uppercase tracking-widest mb-4">La respuesta era:</p>
                                    
                                    <div className="bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 font-black text-indigo-400 text-lg leading-snug">
                                        {errorModal.correct}
                                    </div>

                                    <button onClick={acceptPenalty} className={`btn-juicy w-full text-white font-black py-4 rounded-2xl text-lg flex items-center justify-center gap-2 ${errorModal.type === 'error' ? 'bg-rose-600 border-rose-800' : 'bg-amber-600 border-amber-800'}`}>
                                        <Timer/> PENALIZACIÓN {errorModal.penalty}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* TABLERO */}
                        <main className={`flex-1 flex gap-2 sm:gap-4 p-2 sm:p-6 max-w-5xl mx-auto w-full transition-opacity duration-300 ${!isMyTurn ? 'opacity-50 pointer-events-none' : ''}`}>
                            {renderCol(roomData.board.c1, 'c1')}
                            {renderCol(roomData.board.c2, 'c2')}
                            {renderCol(roomData.board.c3, 'c3')}
                        </main>
                        
                        {!isMyTurn && isMulti && (
                            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full font-black tracking-widest uppercase shadow-2xl animate-pulse">
                                Espera tu turno
                            </div>
                        )}
                    </div>
                );
            }

            if (roomData.gameState === 'end') {
                const isMulti = roomData.mode === 'multi';
                const winner = isMulti ? [...roomData.players].sort((a,b) => b.score - a.score)[0] : null;

                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-zinc-950 text-center">
                        <div className="bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl border border-zinc-800 max-w-md w-full">
                            <Trophy size={80} className="text-amber-400 mx-auto mb-6 drop-shadow-lg" />
                            <h1 className="text-4xl font-black italic text-white mb-2 uppercase">¡Completado!</h1>
                            <p className="text-zinc-500 font-bold uppercase tracking-widest text-xs mb-8">Dominaste {roomData.gamePool.length} conceptos</p>
                            
                            {isMulti ? (
                                <div className="bg-zinc-950 border border-zinc-800 p-6 rounded-2xl mb-8">
                                    <p className="text-zinc-400 font-bold mb-1">Ganador Absoluto</p>
                                    <p className={`text-3xl font-black uppercase ${winner.color.replace('bg-','text-')}`}>{winner.name}</p>
                                    <p className="text-xl font-bold text-white mt-2">{winner.score} PTS</p>
                                </div>
                            ) : (
                                <div className="bg-zinc-950 border border-zinc-800 p-6 rounded-2xl mb-8 relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 opacity-10"><Clock size={100}/></div>
                                    <p className="text-zinc-400 font-bold mb-1 uppercase tracking-widest text-xs">Tiempo Final (Speedrun)</p>
                                    <p className="text-5xl font-black text-amber-500 tabular-nums">{formatTime(roomData.finalTime)}</p>
                                </div>
                            )}
                            
                            <button onClick={() => window.location.href='index.html'} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 text-lg uppercase tracking-widest">
                                SALIR AL HUB
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LingoMatch />);
    </script>
</body>
</html>

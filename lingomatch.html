<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LingoMatch | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }; 
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.3); } }
        .animate-float { animation: floatUp 0.8s ease-out forwards; }
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Users, Play, Plus, LogIn, CheckCircle2, XCircle, Trophy, User, Pause, Clock, Timer, Medal, Crown, Zap, ChevronRight } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from 'firebase/firestore';
        import confetti from 'canvas-confetti';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        const genCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        const formatTime = (totalSecs) => `${Math.floor(totalSecs / 60).toString().padStart(2, '0')}:${(totalSecs % 60).toString().padStart(2, '0')}`;

        const LingoMatch = () => {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [quizData, setQuizData] = useState(null);
            
            // Core Architecture States
            const [modeSelected, setModeSelected] = useState(null); // 'single' | 'multi'
            const [isSinglePlayer, setIsSinglePlayer] = useState(false);
            
            // Room & Game State (Shared structure for both modes)
            const [roomCode, setRoomCode] = useState('');
            const [inputCode, setInputCode] = useState('');
            const [roomData, setRoomData] = useState(null); 
            
            // Single Player Specifics
            const [playerName, setPlayerName] = useState('');
            const [leaderboard, setLeaderboard] = useState([]);
            
            // Gameplay UI States
            const [selection, setSelection] = useState({ c1: null, c2: null, c3: null });
            const [feedback, setFeedback] = useState('none');
            const [locked, setLocked] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            
            // Fancy Animations
            const [countdown, setCountdown] = useState(null);
            const [penaltyFlies, setPenaltyFlies] = useState([]);
            const [timerAnim, setTimerAnim] = useState(false);

            const [timer, setTimer] = useState(0);
            const timerRef = useRef(null);

            // 1. Initial Load
            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if(snap.exists()) setQuizData(snap.data());
                        else alert("Juego no encontrado");
                    });
                }
                return () => unsub();
            }, [quizId]);

            // 2. Multiplayer Firebase Sync
            useEffect(() => {
                if (!user || !roomCode || isSinglePlayer) return;
                const unsub = onSnapshot(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), (docSnap) => {
                    if (docSnap.exists()) setRoomData(docSnap.data());
                    else { setRoomCode(''); setRoomData(null); alert("La sala ha sido cerrada."); }
                });
                return () => unsub();
            }, [user, roomCode, isSinglePlayer]);

            // 3. Single Player Timer
            useEffect(() => {
                if (roomData?.gameState === 'playing' && isSinglePlayer && !countdown && !isPaused) {
                    timerRef.current = setInterval(() => setTimer(prev => prev + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [roomData?.gameState, isSinglePlayer, countdown, isPaused]);

            // --- ANIMATION CONTROLLERS ---
            const triggerCountdown = (callback, textPrefix = "") => {
                setCountdown(textPrefix ? `${textPrefix} - 3` : '3');
                let count = 3;
                const int = setInterval(() => {
                    count--;
                    if (count > 0) setCountdown(textPrefix ? `${textPrefix} - ${count}` : count.toString());
                    else if (count === 0) setCountdown('¡GO!');
                    else {
                        clearInterval(int);
                        setCountdown(null);
                        if (callback) callback();
                    }
                }, 800);
            };

            const triggerPenalty = (pointsText, penaltySecs) => {
                setLocked(true);
                const isErr = penaltySecs > 2;
                setFeedback(isErr ? 'error' : 'partial');
                
                // Efecto flotante
                const id = Date.now();
                setPenaltyFlies(prev => [...prev, { id, text: pointsText, isErr }]);
                setTimeout(() => setPenaltyFlies(prev => prev.filter(p => p.id !== id)), 800);

                if (isSinglePlayer) {
                    setTimer(prev => prev + penaltySecs);
                    setTimerAnim(true);
                    setTimeout(() => setTimerAnim(false), 500);
                }

                // Liberar el tablero rápido sin modales
                setTimeout(() => {
                    setSelection({ c1: null, c2: null, c3: null });
                    setFeedback('none');
                    setLocked(false);
                    if (!isSinglePlayer) processTurn(isErr ? 0 : 1, false); // En multi pasa turno
                }, 600);
            };

            // --- STATE UPDATER (Dual Engine) ---
            const updateGame = async (newData) => {
                if (isSinglePlayer) setRoomData(prev => ({...prev, ...newData}));
                else await updateDoc(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), newData);
            };

            // --- SINGLE PLAYER (SPEEDRUN) SETUP ---
            const setupSinglePlayer = async () => {
                setIsSinglePlayer(true);
                setModeSelected('single');
                
                // Fetch Leaderboard
                const q = query(collection(db, `artifacts/periplo-app-v1/quizzes/${quizId}/leaderboard`), orderBy('time', 'asc'), limit(5));
                const snap = await getDocs(q);
                setLeaderboard(snap.docs.map(d => d.data()));
            };

            const startSinglePlayer = () => {
                if (!playerName.trim()) return alert("Por favor escribe tu nombre o apodo.");
                triggerCountdown(() => {
                    const settings = quizData.content.settings || { rounds: 4, rowsPerRound: 6 };
                    const totalNeeded = settings.rounds * settings.rowsPerRound;
                    let allPairs = shuffle([...quizData.content.pairs]);
                    if (allPairs.length < totalNeeded) {
                        const diff = totalNeeded - allPairs.length;
                        for(let i=0; i<diff; i++) allPairs.push(allPairs[i % allPairs.length]);
                    }
                    const gamePool = allPairs.slice(0, totalNeeded);
                    
                    setRoomData({
                        gameState: 'playing', mode: 'single', settings, gamePool, currentRound: 1,
                        board: generateBoardColumns(gamePool.slice(0, settings.rowsPerRound)),
                        matchedIds: [],
                        players: [{ id: 'p1', name: playerName, score: 0, occupied: true }]
                    });
                    setTimer(0);
                }, "PREPÁRATE");
            };

            // --- MULTIPLAYER SETUP ---
            const setupMultiplayer = () => {
                setIsSinglePlayer(false);
                setModeSelected('multi');
            };

            const createRoom = async () => {
                const code = genCode();
                await setDoc(doc(db, 'artifacts/periplo-app-v1/rooms', code), {
                    quizId, gameState: 'roles',
                    players: [
                        { id: 'p1', name: 'Jugador 1', score: 0, color: 'bg-indigo-500', occupied: false, uid: null },
                        { id: 'p2', name: 'Jugador 2', score: 0, color: 'bg-rose-500', occupied: false, uid: null },
                        { id: 'p3', name: 'Jugador 3', score: 0, color: 'bg-emerald-500', occupied: false, uid: null },
                        { id: 'p4', name: 'Jugador 4', score: 0, color: 'bg-amber-500', occupied: false, uid: null },
                    ]
                });
                setRoomCode(code);
            };

            const joinRoom = async () => {
                const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/rooms', inputCode.toUpperCase()));
                if (snap.exists()) setRoomCode(inputCode.toUpperCase());
                else alert('Código inválido.');
            };

            const selectRole = async (roleId) => {
                if (roleId === 'obs') { setIsObserver(true); return; }
                const updated = roomData.players.map(p => p.id === roleId ? { ...p, occupied: true, uid: user.uid } : (p.uid === user.uid ? { ...p, occupied: false, uid: null } : p));
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), { players: updated });
                setIsObserver(false);
            };

            const startMultiplayer = async () => {
                const activePlayers = roomData.players.filter(p => p.occupied);
                const settings = quizData.content.settings || { rounds: 4, rowsPerRound: 6 };
                const totalNeeded = settings.rounds * settings.rowsPerRound;
                
                let allPairs = shuffle([...quizData.content.pairs]);
                if (allPairs.length < totalNeeded) {
                    const diff = totalNeeded - allPairs.length;
                    for(let i=0; i<diff; i++) allPairs.push(allPairs[i % allPairs.length]);
                }
                const gamePool = allPairs.slice(0, totalNeeded);

                await updateGame({
                    gameState: 'playing', mode: 'multi', settings, gamePool, currentRound: 1,
                    board: generateBoardColumns(gamePool.slice(0, settings.rowsPerRound)),
                    matchedIds: [], currentTurn: activePlayers[0].id,
                    players: roomData.players.map(p => ({...p, score: 0, roundScore: 0}))
                });
            };

            const generateBoardColumns = (pairsSubset) => ({
                c1: shuffle(pairsSubset.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c1 }))),
                c2: shuffle(pairsSubset.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c2 }))),
                c3: shuffle(pairsSubset.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c3 })))
            });

            // --- GAMEPLAY LOGIC ---
            const handleSelect = (col, item) => {
                if (locked || myRole === 'obs' || countdown) return;
                if (!isSinglePlayer && myRole !== roomData.currentTurn) return;
                setSelection(prev => ({ ...prev, [col]: prev[col]?.uid === item.uid ? null : item }));
            };

            useEffect(() => {
                if (selection.c1 && selection.c2 && selection.c3) {
                    setLocked(true);
                    const id1 = selection.c1.pairId, id2 = selection.c2.pairId, id3 = selection.c3.pairId;
                    const isPerfect = (id1 === id2 && id2 === id3);
                    const isPartial = !isPerfect && ((id1 === id2) || (id2 === id3) || (id1 === id3));
                    
                    if (isPerfect) {
                        setFeedback('success');
                        setTimeout(() => processTurn(3, true), 400); // Rápido en aciertos
                    } else if (isPartial) {
                        triggerPenalty(isSinglePlayer ? "+2s" : "+1 Pt", 2);
                    } else {
                        triggerPenalty(isSinglePlayer ? "+5s" : "Falló", 5);
                    }
                }
            }, [selection]);

            const processTurn = async (pointsEarned, clearBoard) => {
                setSelection({ c1: null, c2: null, c3: null });
                setFeedback('none');
                setLocked(false);

                let updatedPlayers = [...roomData.players];
                let newMatched = [...roomData.matchedIds];
                let nextTurn = roomData.currentTurn;

                if (!isSinglePlayer) {
                    updatedPlayers = updatedPlayers.map(p => p.id === roomData.currentTurn ? { ...p, score: p.score + pointsEarned, roundScore: (p.roundScore || 0) + pointsEarned } : p);
                    const active = updatedPlayers.filter(p => p.occupied);
                    const currIdx = active.findIndex(p => p.id === roomData.currentTurn);
                    nextTurn = active[(currIdx + 1) % active.length].id;
                }

                if (clearBoard) newMatched.push(selection.c1.uid, selection.c2.uid, selection.c3.uid);

                const isRoundOver = newMatched.length >= (roomData.settings.rowsPerRound * 3);

                if (isRoundOver) {
                    if (!isSinglePlayer) {
                        const maxRoundScore = Math.max(...updatedPlayers.map(p => p.roundScore || 0));
                        updatedPlayers = updatedPlayers.map(p => ({
                            ...p, score: p.roundScore === maxRoundScore && p.roundScore > 0 ? p.score + 5 : p.score, roundScore: 0 
                        }));
                    }

                    const nextRound = roomData.currentRound + 1;
                    
                    if (nextRound > roomData.settings.rounds) {
                        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                        if (isSinglePlayer) {
                            await addDoc(collection(db, `artifacts/periplo-app-v1/quizzes/${quizId}/leaderboard`), { playerName, time: timer, date: serverTimestamp() });
                        }
                        await updateGame({ gameState: 'end', players: updatedPlayers, finalTime: timer });
                    } else {
                        triggerCountdown(async () => {
                            const startIndex = (nextRound - 1) * roomData.settings.rowsPerRound;
                            const nextPairs = roomData.gamePool.slice(startIndex, startIndex + roomData.settings.rowsPerRound);
                            await updateGame({ currentRound: nextRound, board: generateBoardColumns(nextPairs), matchedIds: [], players: updatedPlayers, currentTurn: nextTurn });
                        }, `RONDA ${nextRound}`);
                    }
                } else {
                    await updateGame({ players: updatedPlayers, matchedIds: newMatched, currentTurn: nextTurn });
                }
            };

            // --- VISTAS ---
            if (!quizData) return <div className="h-screen flex items-center justify-center font-black animate-pulse">Cargando Motor...</div>;

            // PANTALLA 1: ELEGIR MODALIDAD
            if (!modeSelected) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="text-center mb-10">
                        <h1 className="text-4xl font-black italic text-indigo-500 mb-2 tracking-tighter">LINGOMATCH <span className="text-amber-400">TRIPLE</span></h1>
                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">{quizData.title}</p>
                    </div>
                    <div className="w-full max-w-sm space-y-4">
                        <button onClick={setupSinglePlayer} className="btn-juicy w-full bg-amber-500 text-zinc-950 font-black py-5 rounded-2xl border-amber-700 flex flex-col items-center justify-center gap-1 shadow-xl">
                            <Timer size={32}/>
                            <span className="text-xl tracking-widest uppercase">SPEEDRUN (1P)</span>
                            <span className="text-xs font-bold opacity-80">Juega local. Guarda tu récord.</span>
                        </button>
                        <button onClick={setupMultiplayer} className="btn-juicy w-full bg-indigo-600 text-white font-black py-5 rounded-2xl border-indigo-800 flex flex-col items-center justify-center gap-1 shadow-xl mt-4">
                            <Users size={32}/>
                            <span className="text-xl tracking-widest uppercase">ARENA (VS)</span>
                            <span className="text-xs font-bold opacity-80">Crea sala. Compite por turnos.</span>
                        </button>
                    </div>
                </div>
            );

            // PANTALLA 2A: LOBBY SINGLE PLAYER (LEADERBOARD)
            if (modeSelected === 'single' && !roomData) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 p-6 rounded-3xl shadow-2xl">
                        <div className="flex items-center gap-3 mb-6 border-b border-zinc-800 pb-4">
                            <Trophy className="text-amber-400" size={28}/>
                            <h2 className="text-xl font-black uppercase italic text-white tracking-widest">Mejores Tiempos</h2>
                        </div>
                        
                        <div className="space-y-3 mb-8">
                            {leaderboard.length === 0 ? <p className="text-center text-zinc-500 font-bold text-sm py-4">Sé el primero en dejar tu marca.</p> :
                                leaderboard.map((l, i) => (
                                    <div key={i} className="flex justify-between items-center bg-zinc-950 p-3 rounded-xl border border-zinc-800">
                                        <div className="flex items-center gap-3">
                                            <span className={`font-black text-sm ${i===0?'text-amber-400':i===1?'text-zinc-400':i===2?'text-amber-700':'text-zinc-600'}`}>#{i+1}</span>
                                            <span className="font-bold text-white uppercase">{l.playerName}</span>
                                        </div>
                                        <span className="font-black text-indigo-400 tabular-nums">{formatTime(l.time)}</span>
                                    </div>
                                ))
                            }
                        </div>

                        <input value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="TU NOMBRE / APODO" className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-4 text-center text-lg font-black uppercase outline-none focus:border-amber-500 text-white mb-4"/>
                        <button onClick={startSinglePlayer} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 uppercase tracking-widest text-lg flex items-center justify-center gap-2">
                            <Play fill="currentColor"/> EMPEZAR
                        </button>
                        <button onClick={() => setModeSelected(null)} className="w-full text-zinc-500 font-bold text-xs mt-4 hover:text-white transition-colors">Volver a Selección</button>
                    </div>
                </div>
            );

            // PANTALLA 2B: LOBBY MULTIPLAYER
            if (modeSelected === 'multi' && !roomData) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl z-10">
                        <h2 className="text-center text-indigo-400 font-black italic text-2xl mb-6 uppercase tracking-widest">Lobby Arena</h2>
                        <button onClick={createRoom} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 flex items-center justify-center gap-2 mb-6"><Plus/> CREAR SALA</button>
                        <div className="flex gap-2">
                            <input value={inputCode} onChange={e => setInputCode(e.target.value)} maxLength={6} placeholder="CÓDIGO" className="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-center text-xl font-black uppercase outline-none focus:border-indigo-500 text-white"/>
                            <button onClick={joinRoom} disabled={inputCode.length !== 6} className="btn-juicy bg-zinc-800 text-white font-black px-6 rounded-xl border-zinc-700 disabled:opacity-50"><LogIn/></button>
                        </div>
                        <button onClick={() => setModeSelected(null)} className="w-full text-center text-zinc-500 font-bold text-xs mt-6 hover:text-white transition-colors">Volver a Selección</button>
                    </div>
                </div>
            );

            // PANTALLA 3: ROLES MULTIPLAYER
            if (roomData?.gameState === 'roles') return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="w-full max-w-xl bg-zinc-900 border border-zinc-800 rounded-[2rem] overflow-hidden shadow-2xl">
                        <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950">
                            <div><p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">SALA ACTIVA</p><p className="text-3xl font-black text-indigo-400 tracking-widest">{roomCode}</p></div>
                            <button onClick={() => setRoomData(null)} className="p-3 bg-rose-500/10 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-colors"><XCircle/></button>
                        </div>
                        <div className="p-6">
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                {roomData.players.map(p => (
                                    <button key={p.id} onClick={() => selectRole(p.id)} disabled={p.occupied && p.uid !== user.uid} className={`btn-juicy p-4 rounded-xl border-b-4 font-black flex items-center gap-3 transition-all ${p.occupied && p.uid !== user.uid ? 'bg-zinc-950 border-zinc-900 text-zinc-600 opacity-50' : p.uid === user.uid ? `${p.color} border-black text-white ring-2 ring-white scale-105` : 'bg-zinc-800 border-zinc-950 text-zinc-300'}`}>
                                        <User size={20}/> {p.name}
                                    </button>
                                ))}
                            </div>
                            {roomData.players.some(p => p.occupied) && myRole !== 'obs' && (
                                <button onClick={startMultiplayer} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 flex items-center justify-center gap-2 text-xl mt-8">
                                    <Play fill="currentColor"/> EMPEZAR PARTIDA
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );

            // PANTALLA 4: GAMEPLAY
            if (roomData?.gameState === 'playing') {
                const activePlayer = roomData.players.find(p => p.id === roomData.currentTurn);
                const isMyTurn = isSinglePlayer || myRole === roomData.currentTurn;

                const renderCol = (items, colKey) => (
                    <div className="flex-1 flex flex-col gap-2">
                        {items.map(item => {
                            const isMatched = roomData.matchedIds.includes(item.uid);
                            const isSel = selection[colKey]?.uid === item.uid;
                            
                            let bg = "bg-zinc-900 border-zinc-800 text-zinc-300";
                            if (isSel) {
                                if (feedback === 'error') bg = "bg-rose-500 border-rose-700 text-white";
                                else if (feedback === 'partial') bg = "bg-amber-500 border-amber-700 text-white";
                                else if (feedback === 'success') bg = "bg-emerald-500 border-emerald-700 text-white scale-105";
                                else bg = "bg-indigo-600 border-indigo-800 text-white scale-105";
                            }

                            if (isMatched) return <div key={item.uid} className="h-[4.5rem] sm:h-20 border-2 border-dashed border-zinc-800 rounded-2xl flex items-center justify-center opacity-30"><CheckCircle2 className="text-zinc-700"/></div>;

                            return (
                                <button key={item.uid} onClick={() => handleSelect(colKey, item)} className={`btn-juicy h-[4.5rem] sm:h-20 rounded-2xl border-2 font-black text-sm sm:text-base leading-tight px-2 transition-all ${bg}`}>
                                    {item.text}
                                </button>
                            );
                        })}
                    </div>
                );

                return (
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 relative">
                        
                        {/* OVERLAY DE COUNTDOWN / PAUSA */}
                        {(countdown || isPaused) && (
                            <div className="fixed inset-0 bg-zinc-950/80 backdrop-blur-md z-50 flex items-center justify-center">
                                {countdown ? (
                                    <div className="text-[10vw] font-black italic text-white animate-pulse drop-shadow-[0_0_30px_rgba(99,102,241,0.8)] tracking-tighter text-center">
                                        {countdown}
                                    </div>
                                ) : (
                                    <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center max-w-sm w-full">
                                        <Pause size={48} className="text-zinc-500 mx-auto mb-4"/>
                                        <h2 className="text-2xl font-black text-white mb-6 uppercase tracking-widest">Pausa</h2>
                                        <button onClick={() => { setIsPaused(false); triggerCountdown(null, "REANUDANDO"); }} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 mb-3">Reanudar</button>
                                        <button onClick={() => window.location.href='index.html'} className="btn-juicy w-full bg-zinc-800 text-zinc-400 font-black py-4 rounded-xl border-zinc-950">Abandonar</button>
                                    </div>
                                )}
                            </div>
                        )}

                        <header className="bg-zinc-900 border-b border-zinc-800 p-4 shrink-0 z-20 flex justify-between items-center shadow-lg relative">
                            {/* CAJA DE CASTIGOS FLOTANTES */}
                            <div className="absolute top-full right-4 mt-2 pointer-events-none">
                                {penaltyFlies.map(p => (
                                    <div key={p.id} className={`absolute right-0 text-2xl font-black italic animate-float drop-shadow-lg ${p.isErr ? 'text-rose-500' : 'text-amber-500'}`}>
                                        {p.text}
                                    </div>
                                ))}
                            </div>

                            <div className="flex items-center gap-3">
                                {!isSinglePlayer && <div className="bg-zinc-950 px-3 py-1.5 rounded-lg border border-zinc-800 font-black text-zinc-500 text-xs tracking-widest hidden sm:block">SALA {roomCode}</div>}
                                <div className="font-black text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-lg uppercase text-xs">Ronda {roomData.currentRound} / {roomData.settings.rounds}</div>
                            </div>
                            
                            {!isSinglePlayer ? (
                                <div className="flex gap-2">
                                    {roomData.players.filter(p=>p.occupied).map(p => (
                                        <div key={p.id} className={`flex flex-col items-center px-3 py-1 rounded-xl border-2 transition-all ${p.id === roomData.currentTurn ? 'border-indigo-500 bg-indigo-500/20 scale-110' : 'border-transparent bg-zinc-950'}`}>
                                            <span className={`text-xs font-black uppercase ${p.color.replace('bg-','text-')}`}>{p.name.split(' ')[1] || p.name}</span>
                                            <span className="text-lg font-black leading-none">{p.score}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="flex items-center gap-3">
                                    <div className={`flex items-center gap-2 bg-zinc-950 border px-4 py-2 rounded-xl transition-all ${timerAnim ? 'border-rose-500 bg-rose-500/20 text-rose-500 scale-110 animate-shake' : 'border-zinc-800 text-amber-500'}`}>
                                        <Clock size={20}/>
                                        <span className="font-black text-2xl tracking-wider tabular-nums">{formatTime(timer)}</span>
                                    </div>
                                    <button onClick={() => setIsPaused(true)} className="p-2.5 bg-zinc-800 rounded-xl hover:bg-zinc-700 transition-colors text-zinc-400"><Pause size={20}/></button>
                                </div>
                            )}
                        </header>

                        <main className={`flex-1 flex gap-2 sm:gap-4 p-2 sm:p-6 max-w-5xl mx-auto w-full transition-opacity duration-300 ${!isMyTurn ? 'opacity-50 pointer-events-none' : ''}`}>
                            {renderCol(roomData.board.c1, 'c1')}
                            {renderCol(roomData.board.c2, 'c2')}
                            {renderCol(roomData.board.c3, 'c3')}
                        </main>
                        
                        {!isMyTurn && !isSinglePlayer && (
                            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full font-black tracking-widest uppercase shadow-2xl animate-pulse">
                                Espera tu turno
                            </div>
                        )}
                    </div>
                );
            }

            if (roomData.gameState === 'end') {
                const winner = !isSinglePlayer ? [...roomData.players].sort((a,b) => b.score - a.score)[0] : null;

                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-zinc-950 text-center">
                        <div className="bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl border border-zinc-800 max-w-md w-full">
                            <Trophy size={80} className="text-amber-400 mx-auto mb-6 drop-shadow-lg" />
                            <h1 className="text-4xl font-black italic text-white mb-2 uppercase">¡Completado!</h1>
                            <p className="text-zinc-500 font-bold uppercase tracking-widest text-xs mb-8">Dominaste {roomData.gamePool.length} conceptos</p>
                            
                            {!isSinglePlayer ? (
                                <div className="bg-zinc-950 border border-zinc-800 p-6 rounded-2xl mb-8">
                                    <p className="text-zinc-400 font-bold mb-1">Ganador Absoluto</p>
                                    <p className={`text-3xl font-black uppercase ${winner.color.replace('bg-','text-')}`}>{winner.name}</p>
                                    <p className="text-xl font-bold text-white mt-2">{winner.score} PTS</p>
                                </div>
                            ) : (
                                <div className="bg-zinc-950 border border-zinc-800 p-6 rounded-2xl mb-8 relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 opacity-10"><Clock size={100}/></div>
                                    <p className="text-zinc-400 font-bold mb-1 uppercase tracking-widest text-xs">Tiempo Final (Speedrun)</p>
                                    <p className="text-5xl font-black text-amber-500 tabular-nums">{formatTime(roomData.finalTime)}</p>
                                </div>
                            )}
                            
                            <button onClick={() => window.location.href='index.html'} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 text-lg uppercase tracking-widest">
                                SALIR AL HUB
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LingoMatch />);
    </script>
</body>
</html>

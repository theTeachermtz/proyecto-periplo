<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LingoMatch Triple | Periplo</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }; 
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { font-family: 'Varela Round', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; height: 100dvh; background-color: #09090b; margin: 0; }
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="dark:bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { CheckCircle2, AlertTriangle, BookOpen, XCircle, Trophy, Loader2, Zap } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LingoMatch = () => {
            const [loading, setLoading] = useState(true);
            const [quiz, setQuiz] = useState(null);
            const [columns, setColumns] = useState({ col0: [], col1: [], col2: [] });
            const [selection, setSelection] = useState({ col0: null, col1: null, col2: null });
            const [matchedIds, setMatchedIds] = useState([]);
            const [feedback, setFeedback] = useState('none');
            const [errorModal, setErrorModal] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setQuiz(data);
                            setupBoard(data.content.pairs);
                        }
                        setLoading(false);
                    });
                }
            }, []);

            const setupBoard = (pairs) => {
                const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
                setColumns({
                    col0: shuffle(pairs.map(p => ({ id: p.id, text: p.c1 }))),
                    col1: shuffle(pairs.map(p => ({ id: p.id, text: p.c2 }))),
                    col2: shuffle(pairs.map(p => ({ id: p.id, text: p.c3 })))
                });
            };

            const handleSelect = (colKey, item) => {
                if (feedback !== 'none' || matchedIds.includes(item.id)) return;
                setSelection(prev => ({ ...prev, [colKey]: prev[colKey]?.id === item.id ? null : item }));
            };

            useEffect(() => {
                if (selection.col0 && selection.col1 && selection.col2) {
                    validate();
                }
            }, [selection]);

            const validate = () => {
                const isCorrect = selection.col0.id === selection.col1.id && selection.col1.id === selection.col2.id;
                if (isCorrect) {
                    setFeedback('success');
                    setTimeout(() => {
                        setMatchedIds(prev => [...prev, selection.col0.id]);
                        setSelection({ col0: null, col1: null, col2: null });
                        setFeedback('none');
                        if (matchedIds.length + 1 === quiz.content.pairs.length) {
                            confetti();
                        }
                    }, 600);
                } else {
                    setFeedback('error');
                    setTimeout(() => {
                        const correctPair = quiz.content.pairs.find(p => p.id === selection.col1.id || p.id === selection.col0.id);
                        setErrorModal({
                            correct: `${correctPair.c1} + ${correctPair.c2} + ${correctPair.c3}`,
                            exp: correctPair.exp || "Revisa la concordancia y la traducción."
                        });
                        setFeedback('none');
                        setSelection({ col0: null, col1: null, col2: null });
                    }, 600);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-zinc-500"><Loader2 className="animate-spin mr-2"/> Cargando LingoMatch...</div>;

            return (
                <div className="h-[100dvh] flex flex-col p-4 gap-4">
                    <header className="flex justify-between items-center shrink-0">
                        <h1 className="text-xl font-black italic text-indigo-400">LINGOMATCH <span className="text-yellow-400 text-xs">TRIPLE</span></h1>
                        <div className="bg-zinc-900 px-4 py-1 rounded-full text-xs font-bold border border-zinc-800 uppercase tracking-widest">{quiz?.title}</div>
                    </header>

                    <main className="flex-1 grid grid-cols-3 gap-3 md:gap-6 items-center max-w-4xl mx-auto w-full">
                        {['col0', 'col1', 'col2'].map((colKey, idx) => (
                            <div key={colKey} className="flex flex-col gap-3">
                                {columns[colKey].map(item => {
                                    const isMatched = matchedIds.includes(item.id);
                                    const isSelected = selection[colKey]?.id === item.id;
                                    return (
                                        <button 
                                            key={item.id + colKey}
                                            onClick={() => handleSelect(colKey, item)}
                                            disabled={isMatched}
                                            className={`btn-juicy h-16 sm:h-20 rounded-2xl font-black text-sm sm:text-base border-2 transition-all flex items-center justify-center px-2 text-center
                                                ${isMatched ? 'opacity-0 pointer-events-none' : 
                                                  isSelected ? 'bg-indigo-500 border-indigo-700 text-white scale-105' : 
                                                  'bg-zinc-900 border-zinc-800 text-zinc-300 hover:border-zinc-700'}`}
                                        >
                                            {item.text}
                                        </button>
                                    );
                                })}
                            </div>
                        ))}
                    </main>

                    {errorModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
                            <div className="bg-zinc-900 border-2 border-rose-500 p-8 rounded-[2rem] max-w-sm w-full animate-shake">
                                <AlertTriangle className="text-rose-500 mx-auto mb-4" size={48}/>
                                <h2 className="text-2xl font-black text-center mb-4">¡Incorrecto!</h2>
                                <div className="bg-zinc-800 p-4 rounded-xl mb-4 border border-zinc-700">
                                    <p className="text-[10px] uppercase font-black text-zinc-500 mb-1 tracking-widest">Lo correcto es:</p>
                                    <p className="text-lg font-bold text-emerald-400">{errorModal.correct}</p>
                                </div>
                                <div className="flex gap-3 items-start mb-6">
                                    <BookOpen className="text-indigo-400 shrink-0" size={20}/>
                                    <p className="text-sm text-zinc-400 font-medium">{errorModal.exp}</p>
                                </div>
                                <button onClick={() => setErrorModal(null)} className="btn-juicy w-full bg-rose-500 py-4 rounded-2xl font-black uppercase border-rose-700">Entendido</button>
                            </div>
                        </div>
                    )}

                    {matchedIds.length === quiz?.content.pairs.length && (
                        <div className="fixed inset-0 bg-indigo-600 flex flex-col items-center justify-center z-50 p-6 text-center">
                            <Trophy size={100} className="text-yellow-400 mb-6 drop-shadow-2xl animate-bounce"/>
                            <h2 className="text-5xl font-black mb-2 italic">¡MAESTRÍA!</h2>
                            <p className="text-xl font-bold text-indigo-200 mb-8 uppercase tracking-widest">Dominaste este mazo triple</p>
                            <button onClick={() => window.location.href='index.html'} className="btn-juicy bg-white text-indigo-600 px-12 py-5 rounded-2xl font-black border-zinc-300 text-xl">SALIR</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LingoMatch />);
    </script>
</body>
</html>

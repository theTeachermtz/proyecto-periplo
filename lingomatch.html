<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoMatch Demo | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Users, Play, Eye, Plus, LogIn, CheckCircle2, XCircle, Trophy, User, Pause, AlertTriangle, BookOpen } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from 'firebase/firestore';

        // --- FIREBASE SETUP (PERIPLO) ---
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        // --- ESTILOS PERSONALIZADOS (Animaciones) ---
        const customStyles = `
          @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
          }
          .animate-shake {
            animation: shake 0.4s ease-in-out;
          }
          
          .btn-3d {
            transition: all 0.1s;
            border-bottom-width: 4px;
          }
          .btn-3d:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(4px);
          }
        `;

        // --- VOCABULARIO CON REGLAS GRAMATICALES (Hardcodeado del demo) ---
        const VOCABULARY = [
          { id: 1, article: "un", es: "sofá", en: "sofa", exp: "Spanish loves exceptions! Even though it ends in '-a', 'sofá' is a rebel masculine word (like 'el mapa' or 'el problema')." },
          { id: 2, article: "unos", es: "sillones", en: "armchairs", exp: "If the word ends in a consonant, form the plural by adding '-es' (sillón -> sillones)." },
          { id: 3, article: "una", es: "mesa de centro", en: "coffee table", exp: "The 'Golden Rule': nouns ending in '-a' are usually feminine." },
          { id: 4, article: "unos", es: "libreros", en: "bookcases", exp: "Nouns ending in '-o' are masculine. Since it ends in a vowel, add '-s' to make it plural." },
          { id: 5, article: "unas", es: "plantas", en: "plants", exp: "Nouns ending in '-a' are feminine. To form the plural, simply add '-s'." },
          { id: 6, article: "una", es: "alfombra", en: "rug", exp: "The 'Golden Rule': nouns ending in '-a' are usually feminine." },
          { id: 7, article: "unas", es: "mesas", en: "tables", exp: "Nouns ending in '-a' are feminine. Add '-s' for the plural form." },
          { id: 8, article: "una", es: "silla", en: "chair", exp: "The 'Golden Rule': nouns ending in '-a' are usually feminine." },
          { id: 9, article: "unas", es: "lámparas de techo", en: "ceiling lamps", exp: "Nouns ending in '-a' are feminine. Add '-s' for the plural form." },
          { id: 10, article: "una", es: "estufa", en: "stove", exp: "The 'Golden Rule': nouns ending in '-a' are usually feminine." },
          { id: 11, article: "un", es: "horno", en: "oven", exp: "The 'Golden Rule': nouns ending in '-o' are usually masculine." },
          { id: 12, article: "unos", es: "microondas", en: "microwaves", exp: "Words ending in -s (and not stressed): the word stays the same in plural. 'El microondas' -> 'Los microondas'." },
          { id: 13, article: "un", es: "refrigerador", en: "refrigerator", exp: "The 'LONERS' rule: nouns ending in L, O, N, E, R, or S are usually masculine. Here, it ends in 'r'." },
          { id: 14, article: "unos", es: "gabinetes", en: "cabinets", exp: "The 'LONERS' rule: nouns ending in 'e' are usually masculine. Add '-s' to form the plural!" },
          { id: 15, article: "un", es: "taburete", en: "stool", exp: "The 'LONERS' rule: nouns ending in 'e' are usually masculine." },
          { id: 16, article: "unos", es: "armarios", en: "wardrobes", exp: "The 'Golden Rule': nouns ending in '-o' are usually masculine. Add '-s' for plural." },
          { id: 17, article: "una", es: "lámpara de mesa", en: "table lamp", exp: "The 'Golden Rule': nouns ending in '-a' are usually feminine." },
          { id: 18, article: "unas", es: "mesitas de noche", en: "nightstands", exp: "Nouns ending in '-a' are feminine. Add '-s' for plural." },
          { id: 19, article: "un", es: "tocador", en: "dresser", exp: "The 'LONERS' rule: nouns ending in 'r' are usually masculine." },
          { id: 20, article: "unas", es: "camas", en: "beds", exp: "Nouns ending in '-a' are usually feminine. Add '-s' to form the plural." },
          { id: 21, article: "un", es: "escritorio", en: "desk", exp: "The 'Golden Rule': nouns ending in '-o' are usually masculine." },
          { id: 22, article: "unos", es: "espejos", en: "mirrors", exp: "Nouns ending in '-o' are usually masculine. Add '-s' for plural." },
          { id: 23, article: "un", es: "lavabo", en: "sink", exp: "The 'Golden Rule': nouns ending in '-o' are usually masculine." },
          { id: 24, article: "unos", es: "inodoros", en: "toilets", exp: "The 'Golden Rule': nouns ending in '-o' are usually masculine. Add '-s' for plural." },
          { id: 25, article: "una", es: "bañera", en: "bathtub", exp: "The 'Golden Rule': nouns ending in '-a' are usually feminine." }
        ];

        // --- UTILIDADES ---
        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);
        const generateRoomCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

        const generateColumns = (vocabSubset) => {
          return {
            articles: shuffleArray(vocabSubset.map(v => ({ uid: `art_${v.id}_${Math.random().toString(36).substring(2,6)}`, vocabId: v.id, text: v.article, type: 'article' }))),
            es: shuffleArray(vocabSubset.map(v => ({ uid: `es_${v.id}_${Math.random().toString(36).substring(2,6)}`, vocabId: v.id, text: v.es, type: 'es' }))),
            en: shuffleArray(vocabSubset.map(v => ({ uid: `en_${v.id}_${Math.random().toString(36).substring(2,6)}`, vocabId: v.id, text: v.en, type: 'en' })))
          };
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
          const [user, setUser] = useState(null);
          const [roomCode, setRoomCode] = useState('');
          const [inputCode, setInputCode] = useState('');
          const [roomData, setRoomData] = useState(null);
          const [isObserver, setIsObserver] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');
          
          const [selection, setSelection] = useState({ article: null, es: null, en: null });
          const [feedback, setFeedback] = useState('none'); 
          const [locked, setLocked] = useState(false); 
          const [isPaused, setIsPaused] = useState(false);
          const [errorModal, setErrorModal] = useState(null);

          useEffect(() => {
            const styleSheet = document.createElement("style");
            styleSheet.innerText = customStyles;
            document.head.appendChild(styleSheet);
            return () => styleSheet.remove();
          }, []);

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (e) {
                console.error("Auth error", e);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !roomCode) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
            
            const unsubscribe = onSnapshot(roomRef, (docSnap) => {
              if (docSnap.exists()) {
                setRoomData(docSnap.data());
              } else {
                setErrorMsg("La sala fue cerrada o no existe.");
                setRoomCode('');
                setRoomData(null);
              }
            }, (error) => {
              console.error(error);
              setErrorMsg("Error al conectar con la sala.");
            });
            
            return () => unsubscribe();
          }, [user, roomCode]);

          const myPlayer = roomData?.players?.find(p => p.uid === user?.uid);
          const myRole = myPlayer ? myPlayer.id : (isObserver ? 'obs' : null);

          const handleCreateRoom = async () => {
            if (!user) return;
            const newCode = generateRoomCode();
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', newCode);
            
            await setDoc(roomRef, {
              gameState: 'roles',
              players: [
                { id: 'p1', name: 'Jugador 1', score: 0, color: 'bg-blue-500', occupied: false, uid: null },
                { id: 'p2', name: 'Jugador 2', score: 0, color: 'bg-pink-500', occupied: false, uid: null },
                { id: 'p3', name: 'Jugador 3', score: 0, color: 'bg-green-500', occupied: false, uid: null },
                { id: 'p4', name: 'Jugador 4', score: 0, color: 'bg-yellow-500', occupied: false, uid: null },
              ],
              currentTurn: 'p1',
              columns: { articles: [], es: [], en: [] },
              matchedUids: [],
              playedVocabIds: []
            });
            setRoomCode(newCode);
            setErrorMsg('');
          };

          const handleJoinRoom = async () => {
            if (!user || inputCode.length !== 6) return;
            const code = inputCode.toUpperCase();
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            const snap = await getDoc(roomRef);
            if (snap.exists()) {
              setRoomCode(code);
              setErrorMsg('');
            } else {
              setErrorMsg('Código de sala no válido.');
            }
          };

          const handleSelectRole = async (roleId) => {
            if (!roomData || !user) return;
            if (roleId === 'obs') {
              setIsObserver(true);
              return;
            }
            
            const updatedPlayers = roomData.players.map(p => 
              p.id === roleId ? { ...p, occupied: true, uid: user.uid } : 
              (p.uid === user.uid ? { ...p, occupied: false, uid: null } : p) 
            );
            
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
            await updateDoc(roomRef, { players: updatedPlayers });
            setIsObserver(false);
          };

          const startGame = async () => {
            if (!roomData || !user) return;
            
            const nextRoundVocab = shuffleArray(VOCABULARY).slice(0, 8);
            const firstPlayer = roomData.players.find(p => p.occupied) || roomData.players[0];
            const updatedPlayers = roomData.players.map(p => ({ ...p, score: 0 }));
            
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
            await updateDoc(roomRef, {
              gameState: 'playing',
              players: updatedPlayers,
              columns: generateColumns(nextRoundVocab),
              playedVocabIds: nextRoundVocab.map(v => v.id),
              currentTurn: firstPlayer.id,
              matchedUids: []
            });
          };

          const exitRoom = async () => {
            if (roomData && user && !isObserver) {
              const updatedPlayers = roomData.players.map(p => 
                p.uid === user.uid ? { ...p, occupied: false, uid: null } : p 
              );
              const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
              await updateDoc(roomRef, { players: updatedPlayers });
            }
            setRoomCode('');
            setRoomData(null);
            setIsObserver(false);
          };

          const handleItemClick = (item, type) => {
            if (locked || myRole === 'obs' || !roomData) return; 
            if (myRole !== roomData.currentTurn) return; 
            
            setSelection(prev => ({
              ...prev,
              [type]: prev[type]?.uid === item.uid ? null : item 
            }));
          };

          useEffect(() => {
            if (selection.article && selection.es && selection.en) {
              validateSelection();
            }
          }, [selection]);

          const validateSelection = () => {
            setLocked(true);
            
            const targetVocab = VOCABULARY.find(v => v.id === selection.es.vocabId);
            const isArticleCorrect = selection.article.text === targetVocab.article;
            const isTranslationCorrect = selection.en.vocabId === selection.es.vocabId;
            const isMatch = isArticleCorrect && isTranslationCorrect;

            if (isMatch) {
              setFeedback('success');
              setTimeout(async () => {
                await processTurn(true);
              }, 1200);
            } else {
              setFeedback('error');
              setTimeout(() => {
                let explanationMsg = "";
                if (!isArticleCorrect && !isTranslationCorrect) {
                  explanationMsg = `Grammar: ${targetVocab.exp} Also, the correct translation is "${targetVocab.en}".`;
                } else if (!isArticleCorrect) {
                  explanationMsg = targetVocab.exp;
                } else {
                  explanationMsg = `Translation error! The correct English word for "${targetVocab.es}" is "${targetVocab.en}".`;
                }
                setErrorModal({
                  correctAnswer: `${targetVocab.article} ${targetVocab.es} = ${targetVocab.en}`,
                  explanation: explanationMsg
                });
              }, 800);
            }
          };

          const handleAcceptPunishment = async () => {
            setErrorModal(null);
            await processTurn(false);
          };

          const processTurn = async (wasCorrect) => {
            setSelection({ article: null, es: null, en: null });
            setFeedback('none');
            setLocked(false);
            
            if (!roomData || !user) return;

            const occupiedPlayers = roomData.players.filter(p => p.occupied);
            let nextTurnId = roomData.currentTurn;
            if (occupiedPlayers.length > 0) {
              const currentIndex = occupiedPlayers.findIndex(p => p.id === roomData.currentTurn);
              const nextIndex = (currentIndex + 1) % occupiedPlayers.length;
              nextTurnId = occupiedPlayers[nextIndex].id;
            }

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
            let newMatchedUids = roomData.matchedUids || [];
            let updatedPlayers = roomData.players;

            if (wasCorrect) {
              newMatchedUids = [...newMatchedUids, selection.article.uid, selection.es.uid, selection.en.uid];
              updatedPlayers = roomData.players.map(p => 
                p.id === roomData.currentTurn ? { ...p, score: p.score + 10 } : p
              );
            }

            const isRoundEnd = wasCorrect && (newMatchedUids.length + 3) >= (roomData.columns.es.length * 3);

            if (isRoundEnd) {
              const playedIds = roomData.playedVocabIds || [];
              const unusedVocab = VOCABULARY.filter(v => !playedIds.includes(v.id));

              if (unusedVocab.length === 0) {
                await updateDoc(roomRef, {
                  currentTurn: nextTurnId,
                  matchedUids: newMatchedUids,
                  players: updatedPlayers,
                  gameState: 'end'
                });
              } else {
                const nextRoundVocab = shuffleArray(unusedVocab).slice(0, 8);
                const newColumns = generateColumns(nextRoundVocab);

                await updateDoc(roomRef, {
                  currentTurn: nextTurnId,
                  players: updatedPlayers,
                  columns: newColumns,
                  matchedUids: [], 
                  playedVocabIds: [...playedIds, ...nextRoundVocab.map(v => v.id)]
                });
              }
            } else {
              await updateDoc(roomRef, {
                currentTurn: nextTurnId,
                matchedUids: newMatchedUids,
                players: updatedPlayers
              });
            }
          };

          const currentGameState = roomData ? roomData.gameState : 'lobby';

          if (!roomData && roomCode) {
            return (
              <div className="min-h-screen bg-sky-50 flex flex-col items-center justify-center font-bold text-sky-600 gap-4">
                <div className="w-16 h-16 border-4 border-sky-400 border-t-transparent rounded-full animate-spin"></div>
                Conectando a la sala multijugador...
              </div>
            );
          }

          if (currentGameState === 'lobby') {
            return (
              <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6 font-sans text-slate-800">
                <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border-b-8 border-sky-200">
                  <div className="text-center mb-8">
                    <div className="bg-sky-500 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
                      <Users size={40} className="text-white" />
                    </div>
                    <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">LingoMatch</h1>
                    <p className="text-slate-500 mt-2 font-medium">¡Aprende muebles en español!</p>
                  </div>

                  <div className="space-y-4">
                    <button 
                      onClick={handleCreateRoom}
                      className="btn-3d w-full bg-green-400 hover:bg-green-500 text-white font-bold py-4 px-6 rounded-2xl border-green-600 flex items-center justify-center gap-3 text-lg"
                    >
                      <Plus size={24} /> Crear Nueva Sala
                    </button>
                    <div className="flex gap-2 mt-4">
                      <input 
                        type="text" 
                        placeholder="Código" 
                        maxLength={6}
                        value={inputCode}
                        onChange={(e) => setInputCode(e.target.value)}
                        className="flex-1 bg-slate-100 border-2 border-slate-200 rounded-2xl px-4 py-3 text-center text-xl font-bold uppercase focus:outline-none focus:border-sky-400 focus:bg-white transition-colors"
                      />
                      <button 
                        onClick={handleJoinRoom}
                        disabled={inputCode.length !== 6}
                        className="btn-3d bg-sky-400 hover:bg-sky-500 disabled:bg-slate-300 disabled:border-slate-400 disabled:border-b-4 text-white font-bold py-3 px-6 rounded-2xl border-sky-600 flex items-center justify-center"
                      >
                        <LogIn size={24} />
                      </button>
                    </div>
                    {errorMsg && <p className="text-red-500 font-bold text-center mt-2">{errorMsg}</p>}
                  </div>
                </div>
              </div>
            );
          }

          if (currentGameState === 'roles') {
            return (
              <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6">
                <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-2xl border-b-8 border-sky-200">
                  
                  <div className="flex justify-between items-center mb-8 bg-slate-100 p-4 rounded-2xl">
                    <div className="flex items-center gap-3">
                      <span className="font-bold text-slate-500 text-lg">Sala:</span>
                      <span className="text-3xl font-extrabold tracking-widest text-sky-600 bg-white px-4 py-1 rounded-xl shadow-sm">{roomCode}</span>
                    </div>
                    <button 
                      onClick={exitRoom} 
                      className="text-slate-400 hover:text-red-500 transition-colors flex flex-col items-center"
                      title="Salir de la sala"
                    >
                      <XCircle size={28} />
                      <span className="text-xs font-bold mt-1">Salir</span>
                    </button>
                  </div>
                  
                  <h2 className="text-2xl font-bold text-center mb-6 text-slate-700">Elige tu rol</h2>
                  <div className="grid grid-cols-2 gap-4 mb-6">
                    {roomData.players.map((p) => (
                      <button
                        key={p.id}
                        onClick={() => handleSelectRole(p.id)}
                        disabled={p.occupied && p.uid !== user?.uid}
                        className={`btn-3d relative p-4 rounded-2xl border-b-4 font-bold text-lg flex items-center justify-center gap-3
                          ${p.occupied && p.uid !== user?.uid ? 'bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed border-b-4' 
                            : (p.uid === user?.uid ? `${p.color} border-black/20 text-white ring-4 ring-offset-2 ring-sky-300` : `${p.color} text-white border-black/20`)}`}
                      >
                        <User size={24} /> {p.name} {p.uid === user?.uid && '(Tú)'}
                      </button>
                    ))}
                  </div>
                  
                  <button 
                    onClick={() => handleSelectRole('obs')}
                    className={`btn-3d w-full bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-4 px-6 rounded-2xl border-slate-400 flex items-center justify-center gap-3 text-lg ${isObserver ? 'ring-4 ring-offset-2 ring-sky-300' : ''}`}
                  >
                    <Eye size={24} /> Entrar como Observador {isObserver && '(Seleccionado)'}
                  </button>

                  {roomData.players.some(p => p.occupied) && (
                    <div className="mt-8 pt-6 border-t-2 border-slate-100">
                      <button 
                        onClick={startGame}
                        className="btn-3d w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-6 rounded-2xl border-purple-700 flex items-center justify-center gap-3 text-xl shadow-md animate-bounce-slow"
                      >
                        <Play size={28} fill="currentColor" /> Iniciar Juego
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          }

          const renderColumn = (items, type, title) => (
            <div className="flex-1 flex flex-col gap-3">
              <h3 className="text-center font-bold text-slate-400 uppercase tracking-wider text-sm mb-2">{title}</h3>
              {items.map(item => {
                const isMatched = (roomData.matchedUids || []).includes(item.uid);
                const isSelected = selection[type]?.uid === item.uid;
                
                let stateClasses = "bg-white border-slate-200 text-slate-600 hover:border-sky-300 hover:bg-sky-50";
                if (isSelected) {
                  if (feedback === 'error') stateClasses = "bg-red-100 border-red-500 text-red-600 animate-shake";
                  else if (feedback === 'success') stateClasses = "bg-green-100 border-green-500 text-green-600";
                  else stateClasses = "bg-sky-100 border-sky-500 text-sky-700";
                }
                
                if (isMatched) return (
                     <div key={item.uid} className="h-16 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 opacity-50 flex items-center justify-center text-slate-300 font-bold">
                       <CheckCircle2 size={20} />
                     </div>
                );

                return (
                  <button key={item.uid} onClick={() => handleItemClick(item, type)} className={`btn-3d h-16 rounded-xl border-2 border-b-4 font-bold text-lg md:text-xl transition-all flex items-center justify-center px-4 ${stateClasses}`}>
                    {item.text}
                  </button>
                );
              })}
            </div>
          );

          if (currentGameState === 'playing') {
            const activePlayer = roomData.players.find(p => p.id === roomData.currentTurn);
            const isMyTurn = myRole === roomData.currentTurn;
            
            const palabrasTotalesMostradas = roomData.playedVocabIds?.length || 8;
            const palabrasEnTablero = roomData.columns?.es?.length || 8;
            const progresoActual = palabrasTotalesMostradas - palabrasEnTablero + ((roomData.matchedUids?.length || 0) / 3);

            return (
              <div className="min-h-screen bg-sky-50 flex flex-col font-sans relative">
                <header className="bg-white p-4 shadow-sm z-10 sticky top-0">
                  <div className="max-w-6xl mx-auto flex flex-wrap justify-between items-center gap-4">
                    <div className="flex gap-2 items-center">
                      <span className="bg-slate-100 text-slate-500 font-bold px-3 py-1 rounded-lg text-sm">SALA: {roomCode}</span>
                      <span className="bg-purple-100 text-purple-600 font-bold px-3 py-1 rounded-lg text-sm hidden sm:block shadow-sm">
                        Progreso: {Math.min(progresoActual, VOCABULARY.length)} / {VOCABULARY.length}
                      </span>
                    </div>
                    
                    <div className={`px-6 py-2 rounded-full font-bold text-white flex items-center gap-2 shadow-md ${activePlayer?.color || 'bg-slate-500'} ${isMyTurn ? 'animate-bounce-slow ring-4 ring-sky-300' : ''}`}>
                      <Play size={18} fill="currentColor" /> {isMyTurn ? '¡Es tu turno!' : `Turno de ${activePlayer?.name}`}
                    </div>

                    <div className="flex gap-3">
                      {roomData.players.filter(p => p.occupied).map(p => (
                        <div key={p.id} className={`flex flex-col items-center px-3 py-1 rounded-xl border-2 ${p.id === roomData.currentTurn ? 'border-sky-400 bg-sky-50 shadow-sm' : 'border-transparent'}`}>
                          <span className={`text-lg font-extrabold ${p.color.replace('bg-', 'text-')}`}>{p.score}</span>
                        </div>
                      ))}
                      <button onClick={() => setIsPaused(true)} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-600 transition-colors ml-2">
                        <Pause size={24} />
                      </button>
                    </div>
                  </div>
                </header>

                <main className="flex-grow flex items-center justify-center p-4 max-w-6xl mx-auto w-full">
                  
                  {feedback === 'success' && (
                    <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-40">
                       <CheckCircle2 size={120} className="text-green-500 opacity-80 animate-bounce" />
                    </div>
                  )}

                  {isPaused && (
                    <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 backdrop-blur-sm p-4">
                      <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl flex flex-col gap-4 text-center">
                        <h2 className="text-3xl font-extrabold text-slate-800 mb-4">Pausa</h2>
                        <button onClick={() => setIsPaused(false)} className="btn-3d bg-sky-400 hover:bg-sky-500 text-white font-bold py-3 px-4 rounded-xl border-sky-600 w-full">Regresar al juego</button>
                        <button onClick={() => { setIsPaused(false); startGame(); }} className="btn-3d bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-xl border-yellow-600 w-full">Reiniciar juego (Todos)</button>
                        <button onClick={() => { setIsPaused(false); exitRoom(); }} className="btn-3d bg-slate-400 hover:bg-slate-500 text-white font-bold py-3 px-4 rounded-xl border-slate-600 w-full mt-2">Salir de la sala</button>
                      </div>
                    </div>
                  )}

                  {errorModal && (
                    <div className="fixed inset-0 bg-red-900/40 flex items-center justify-center z-50 backdrop-blur-sm p-4">
                      <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden animate-shake border-4 border-red-500">
                        <div className="bg-red-500 p-4 text-white flex items-center justify-center gap-3">
                          <AlertTriangle size={30} />
                          <h2 className="text-2xl font-extrabold">¡Combinación Incorrecta!</h2>
                        </div>
                        
                        <div className="p-6">
                          <p className="text-slate-500 font-bold text-sm uppercase mb-2">Respuesta Correcta:</p>
                          <div className="bg-green-50 text-green-700 text-2xl font-black text-center py-4 rounded-2xl border-2 border-green-200 mb-6">
                            {errorModal.correctAnswer}
                          </div>
                          
                          <div className="flex gap-3 bg-blue-50 border-2 border-blue-200 p-4 rounded-2xl items-start">
                            <BookOpen size={24} className="text-blue-500 flex-shrink-0 mt-1" />
                            <div>
                              <p className="font-bold text-blue-800 text-sm">Lección de Gramática:</p>
                              <p className="text-blue-700 mt-1 font-medium leading-relaxed">
                                {errorModal.explanation}
                              </p>
                            </div>
                          </div>
                        </div>

                        <div className="p-6 pt-0">
                          <button 
                            onClick={handleAcceptPunishment}
                            className="btn-3d w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-6 rounded-2xl border-red-700 flex items-center justify-center gap-2 text-lg"
                          >
                            <XCircle size={24} /> Aceptar castigo, perder turno
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className={`w-full flex flex-col md:flex-row gap-4 md:gap-8 bg-white p-6 md:p-8 rounded-3xl shadow-xl border-b-8 border-slate-200 transition-opacity duration-300 ${!isMyTurn && myRole !== 'obs' ? 'opacity-60 pointer-events-none' : ''}`}>
                    {renderColumn(roomData.columns.articles, 'article', 'Artículo')}
                    {renderColumn(roomData.columns.es, 'es', 'Mueble')}
                    {renderColumn(roomData.columns.en, 'en', 'Inglés')}
                  </div>
                </main>
              </div>
            );
          }

          if (currentGameState === 'end') {
            const winner = [...roomData.players].sort((a, b) => b.score - a.score)[0];
            return (
              <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6 text-center">
                 <div className="bg-white p-10 rounded-3xl shadow-xl max-w-lg w-full border-b-8 border-sky-200">
                    <Trophy size={80} className="text-yellow-400 mx-auto mb-6 drop-shadow-md" />
                    <h1 className="text-4xl font-extrabold text-slate-800 mb-2">¡Partida Terminada!</h1>
                    <p className="text-slate-600 font-medium mb-6">¡Has dominado las {VOCABULARY.length} palabras del juego!</p>
                    <p className="text-xl font-bold text-slate-500 mb-8">Ganador: <span className={winner.color.replace('bg-', 'text-')}>{winner.name}</span> con {winner.score} pts</p>
                    
                    <button 
                      onClick={exitRoom}
                      className="btn-3d w-full bg-sky-400 hover:bg-sky-500 text-white font-bold py-4 px-6 rounded-2xl border-sky-600 text-lg"
                    >
                      Volver al Menú Principal
                    </button>
                 </div>
              </div>
            );
          }

          return null;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

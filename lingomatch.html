    <script src="https://cdn.tailwindcss.com"></script>

        document.documentElement.classList.add('dark');

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; user-select: none; -webkit-user-select: none; }

        .safari-text-fix {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            width: 100%;
            text-align: center;
        }

        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(1.3)} }

        @keyframes diceRoll { 
            0%{transform:rotate(0deg) scale(1)}

        .pulse-glow { animation: pulseGlow 1.5s ease-in-out infinite; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }

<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Users, Play, Plus, LogIn, CheckCircle2, XCircle, Trophy, User, Pause, Clock, Timer, BookOpen, X, Dice5, Send, ArrowRight, Dices, RotateCcw, AlertTriangle } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from 'firebase/firestore';
        import confetti from 'canvas-confetti';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
        
        // CÓDIGO SUAVE: 4 números aleatorios (ej. 4921)
        const genCode = () => Math.floor(1000 + Math.random() * 9000).toString();
        
        const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

        const DICE_FACES = [1, 2, 3, 4, 5, 6];
        const DICE_EMOJIS = ['⚀','⚁','⚂','⚃','⚄','⚅'];
        
        // LOS 9 EMOJIS DE AVATARES
        const AVATARS = ['🦊', '🐼', '🐯', '🐰', '🐨', '🐸', '🦄', '🐙', '🐵'];

        const LingoMatch = () => {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');
            const [quizData, setQuizData] = useState(null);
            
            const [acceptedDisclaimer, setAcceptedDisclaimer] = useState(() => localStorage.getItem('periplo_disclaimer_v1') === 'true');

            // Estados pendientes para el INTERCEPTOR de Reconexión
            const [pendingRoom, setPendingRoom] = useState(() => sessionStorage.getItem('lingo_room') || null);
            const [pendingMode, setPendingMode] = useState(() => sessionStorage.getItem('lingo_mode') || null);

            // Estados activos de sesión
            const [modeSelected, setModeSelected] = useState(null);
            const [isSinglePlayer, setIsSinglePlayer] = useState(false);
            const [roomCode, setRoomCode] = useState('');
            
            const [inputCode, setInputCode] = useState('');
            const [roomData, setRoomData] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [playerEmoji, setPlayerEmoji] = useState(AVATARS[0]); // Estado para el emoji
            const [leaderboard, setLeaderboard] = useState([]);

            const [selection, setSelection] = useState({ c1: null, c2: null, c3: null });
            const [feedback, setFeedback] = useState('none');
            const [locked, setLocked] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [countdown, setCountdown] = useState(null);
            const [penaltyFlies, setPenaltyFlies] = useState([]);
            const [timerAnim, setTimerAnim] = useState(false);
            const [timer, setTimer] = useState(0);
            const timerRef = useRef(null);
            const lastActionUidRef = useRef(null);

            const [diceValue, setDiceValue] = useState(null);
            const [diceRolling, setDiceRolling] = useState(false);
            const [showSubmit, setShowSubmit] = useState(false);
            const [showCorrectCards, setShowCorrectCards] = useState(false);
            const [correctTriple, setCorrectTriple] = useState(null); 

            const [showLeaderboard, setShowLeaderboard] = useState(false);
            const [showLibrary, setShowLibrary] = useState(false);

            // ====== PERSISTENCIA DE SESIÓN ======
            useEffect(() => {
                if (modeSelected) sessionStorage.setItem('lingo_mode', modeSelected);
                if (isSinglePlayer !== null) sessionStorage.setItem('lingo_sp', isSinglePlayer);
                if (roomCode) sessionStorage.setItem('lingo_room', roomCode);
            }, [modeSelected, isSinglePlayer, roomCode]);

            // ====== HELPERS ======
            const loadLeaderboardData = async (targetId) => {
                const q = query(collection(db, `artifacts/periplo-app-v1/quizzes/${targetId}/leaderboard`), orderBy('time', 'asc'), limit(5));
                const snap = await getDocs(q);
                setLeaderboard(snap.docs.map(d => d.data()));
            };

            const forgetRoom = () => {
                sessionStorage.removeItem('lingo_room');
                sessionStorage.removeItem('lingo_mode');
                sessionStorage.removeItem('lingo_sp');
                setPendingRoom(null);
                setPendingMode(null);
            };

            const reconnectRoom = () => {
                setRoomCode(pendingRoom);
                setModeSelected(pendingMode);
                setIsSinglePlayer(sessionStorage.getItem('lingo_sp') === 'true');
                setPendingRoom(null);
                setPendingMode(null);
            };

            // ====== FIREBASE AUTH + INITIAL FETCH ======
            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(async snap => {
                        if (snap.exists()) setQuizData(snap.data());
                        else alert("Juego no encontrado");
                    });
                }
                return () => unsub();
            }, [quizId]);

            // ====== AUTO-SPEEDRUN (Solo para alumnos con ID que no tienen sala pendiente) ======
            useEffect(() => {
                if (quizData && isStudent && !pendingRoom && !modeSelected) {
                    setIsSinglePlayer(true);
                    setModeSelected('single');
                    loadLeaderboardData(quizId);
                }
            }, [quizData, isStudent, pendingRoom, modeSelected, quizId]);

            // ====== ROOM LISTENER (Seguro contra ciclos infinitos) ======
            useEffect(() => {
                if (!user || !roomCode || isSinglePlayer) return;
                const unsub = onSnapshot(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setRoomData(data);
                        
                        // Si me reconecté pero no tengo la data de las cartas (entrando sin ID)
                        setQuizData(prev => {
                            if (!prev && data.quizId) {
                                getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', data.quizId)).then(qSnap => {
                                    if (qSnap.exists()) {
                                        setQuizData(qSnap.data());
                                        setQuizId(data.quizId);
                                    }
                                });
                            }
                            return prev;
                        });
                    } else {
                        setRoomCode(''); setRoomData(null); alert("La sala ha sido cerrada por el host.");
                        forgetRoom();
                        setModeSelected(null);
                    }
                });
                return () => unsub();
            }, [user, roomCode, isSinglePlayer]);

            // ====== TIMER (single player) ======
            useEffect(() => {
                if (roomData?.gameState === 'playing' && isSinglePlayer && !countdown && !isPaused) {
                    timerRef.current = setInterval(() => setTimer(p => p + 1), 1000);
                } else { clearInterval(timerRef.current); }
                return () => clearInterval(timerRef.current);
            }, [roomData?.gameState, isSinglePlayer, countdown, isPaused]);

            const myPlayer = roomData?.players?.find(p => p.uid === user?.uid);
            const myRole = isSinglePlayer ? 'p1' : (myPlayer ? myPlayer.id : null);

            // ====== SYNC REMOTE ANIMATIONS ======
            useEffect(() => {
                if (!roomData?.lastAction || isSinglePlayer) return;
                const action = roomData.lastAction;
                if (action.uid === lastActionUidRef.current) return;
                lastActionUidRef.current = action.uid;

                if (myRole !== action.player) {
                    if (action.type === 'error') {
                        setFeedback('error');
                        setPenaltyFlies(prev => [...prev, { id: Date.now(), text: '❌', isErr: true }]);
                        setTimeout(() => setFeedback('none'), 800);
                    } else if (action.type === 'partial') {
                        setFeedback('partial');
                        setPenaltyFlies(prev => [...prev, { id: Date.now(), text: `+1 pt`, isErr: false }]);
                        setTimeout(() => setFeedback('none'), 800);
                    }
                }
            }, [roomData?.lastAction, myRole, isSinglePlayer]);

            // ====== LOGIC HELPERS ======
            const triggerSequence = (steps, cb) => {
                let i = 0; setCountdown(steps[0]);
                const int = setInterval(() => {
                    i++;
                    if (i < steps.length) setCountdown(steps[i]);
                    else { clearInterval(int); setCountdown(null); if (cb) cb(); }
                }, 800);
            };

            const updateGame = async (newData) => {
                if (isSinglePlayer) setRoomData(prev => ({ ...prev, ...newData }));
                else await updateDoc(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), newData);
            };

            const resetToMenu = async () => {
                setRoomData(null); 
                setTimer(0); setCountdown(null); setRoomCode('');
                setShowLeaderboard(false); setShowLibrary(false);
                setDiceValue(null); setDiceRolling(false); setShowSubmit(false);
                setShowCorrectCards(false); setCorrectTriple(null);
                setSelection({ c1: null, c2: null, c3: null }); setFeedback('none');
                
                if (isStudent && quizId) {
                    setIsSinglePlayer(true);
                    setModeSelected('single');
                    await loadLeaderboardData(quizId);
                } else {
                    setModeSelected(null);
                    setIsSinglePlayer(false);
                }
                forgetRoom();
            };

            const generateBoardColumns = (pairs) => ({
                c1: shuffle(pairs.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c1 }))),
                c2: shuffle(pairs.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c2 }))),
                c3: shuffle(pairs.map(p => ({ uid: Math.random().toString(), pairId: p.id, text: p.c3 }))),
            });

            // ====== SINGLE PLAYER ======
            const setupSinglePlayer = async () => {
                setIsSinglePlayer(true); setModeSelected('single'); await loadLeaderboardData(quizId);
            };

            const startSinglePlayer = () => {
                if (!playerName.trim()) return alert("Escribe tu nombre o apodo.");
                const settings = quizData.content.settings || { rounds: 3, rowsPerRound: 6 };
                const totalNeeded = settings.rounds * settings.rowsPerRound;
                
                let allPairs = [];
                while(allPairs.length < totalNeeded) {
                    allPairs = allPairs.concat(shuffle([...quizData.content.pairs]));
                }
                const gp = allPairs.slice(0, totalNeeded);
                
                setRoomData({
                    gameState: 'playing', mode: 'single', settings, gamePool: gp, currentRound: 1,
                    board: generateBoardColumns(gp.slice(0, settings.rowsPerRound)),
                    matchedIds: [],
                    players: [{ id: 'p1', name: playerName, emoji: playerEmoji, score: 0, occupied: true, uid: user?.uid }]
                });
                triggerSequence(['READY...', 'SET...', 'GO!'], () => setTimer(0));
            };

            // ====== MULTIPLAYER ======
            const createRoom = async () => {
                const code = genCode();
                await setDoc(doc(db, 'artifacts/periplo-app-v1/rooms', code), {
                    quizId,
                    hostUid: user.uid,
                    gameState: 'roles',
                    players: [
                        { id: 'p1', name: 'Silla 1', emoji: '👤', score: 0, color: 'bg-indigo-500', occupied: false, uid: null },
                        { id: 'p2', name: 'Silla 2', emoji: '👤', score: 0, color: 'bg-rose-500', occupied: false, uid: null },
                        { id: 'p3', name: 'Silla 3', emoji: '👤', score: 0, color: 'bg-emerald-500', occupied: false, uid: null },
                        { id: 'p4', name: 'Silla 4', emoji: '👤', score: 0, color: 'bg-amber-500', occupied: false, uid: null },
                    ],
                    liveSelections: {},
                });
                setRoomCode(code);
                setModeSelected('multi_host');
            };

            const joinRoom = async () => {
                if (!playerName.trim()) return alert("Escribe tu nombre primero.");
                const code = inputCode.toUpperCase().trim();
                if (code.length < 4) return alert('Código muy corto');
                
                const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/rooms', code));
                if (snap.exists()) {
                    const data = snap.data();
                    const qSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', data.quizId));
                    if (qSnap.exists()) {
                        setQuizData(qSnap.data());
                        setQuizId(data.quizId);
                        setRoomCode(code);
                        setModeSelected('multi_join');
                    } else {
                        alert('El juego asociado a esta sala no fue encontrado.');
                    }
                } else alert('Código de sala inválido.');
            };

            const selectRole = async (roleId) => {
                const isHost = roomData.hostUid === user?.uid;
                const activeName = playerName.trim() || (isHost ? 'Teacher' : 'Jugador');
                const updated = roomData.players.map(p =>
                    p.id === roleId ? { ...p, occupied: true, uid: user.uid, name: activeName, emoji: playerEmoji } :
                    (p.uid === user.uid ? { ...p, occupied: false, uid: null, name: `Silla ${p.id.replace('p','')}`, emoji: '👤' } : p)
                );
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), { players: updated });
            };

            const startMultiplayer = async () => {
                const settings = quizData.content.settings || { rounds: 3, rowsPerRound: 6 };
                const totalNeeded = settings.rounds * settings.rowsPerRound;
                
                let allPairs = [];
                while(allPairs.length < totalNeeded) {
                    allPairs = allPairs.concat(shuffle([...quizData.content.pairs]));
                }
                const gp = allPairs.slice(0, totalNeeded);
                
                const activePlayers = roomData.players.filter(p => p.occupied);

                await updateGame({
                    gameState: 'playing', mode: 'multi', settings, gamePool: gp, currentRound: 1,
                    board: generateBoardColumns(gp.slice(0, settings.rowsPerRound)),
                    matchedIds: [], correctTriples: [],
                    currentTurn: activePlayers[0].id,
                    currentDice: null, dicePhase: 'roll',
                    liveSelections: {},
                    players: roomData.players.map(p => ({ ...p, score: 0, roundScore: 0 }))
                });
            };

            // ====== DICE ROLL ======
            const rollDice = async () => {
                setDiceRolling(true);
                const activePlayers = roomData.players.filter(p => p.occupied);
                const maxScore = Math.max(...activePlayers.map(p => p.score), 0);
                const myScore = roomData.players.find(p => p.id === roomData.currentTurn)?.score || 0;
                
                let result = DICE_FACES[Math.floor(Math.random() * DICE_FACES.length)];
                if (!isSinglePlayer && (maxScore - myScore > 5)) result = Math.max(3, result);

                setTimeout(async () => {
                    setDiceRolling(false);
                    setDiceValue(result);
                    await updateGame({ currentDice: result, dicePhase: 'select', liveSelections: {} });
                }, 700);
            };

            // ====== HANDLE SELECT ======
            const handleSelect = async (col, item) => {
                if (locked || countdown || showCorrectCards) return;

                if (isSinglePlayer) {
                    setSelection(prev => ({ ...prev, [col]: prev[col]?.uid === item.uid ? null : item }));
                } else {
                    if (myRole !== roomData.currentTurn) return;
                    if (roomData.dicePhase !== 'select') return;

                    const newSel = { ...selection, [col]: selection[col]?.uid === item.uid ? null : item };
                    setSelection(newSel);

                    const liveData = {};
                    if (newSel.c1) liveData.c1 = newSel.c1.uid;
                    if (newSel.c2) liveData.c2 = newSel.c2.uid;
                    if (newSel.c3) liveData.c3 = newSel.c3.uid;
                    try {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/rooms', roomCode), { liveSelections: liveData });
                    } catch(e) {}
                }
            };

            // ====== AUTO-CHECK (Single Player) ======
            useEffect(() => {
                if (!isSinglePlayer) return;
                if (selection.c1 && selection.c2 && selection.c3) {
                    setLocked(true);
                    let maxMatches = 0;
                    roomData.gamePool.forEach(p => {
                        let m = 0;
                        if (p.c1 === selection.c1.text) m++;
                        if (p.c2 === selection.c2.text) m++;
                        if (p.c3 === selection.c3.text) m++;
                        if (m > maxMatches) maxMatches = m;
                    });

                    if (maxMatches === 3) {
                        setFeedback('success');
                        setTimeout(() => processTurnSingle(true), 400);
                    } else if (maxMatches === 2) {
                        triggerPenalty("+2s", 2);
                    } else {
                        triggerPenalty("+5s", 5);
                    }
                }
            }, [selection, isSinglePlayer]);

            useEffect(() => {
                if (isSinglePlayer) return;
                setShowSubmit(selection.c1 && selection.c2 && selection.c3 && roomData?.dicePhase === 'select');
            }, [selection, isSinglePlayer, roomData?.dicePhase]);

            // ====== SUBMIT (Arena) ======
            const handleSubmitArena = async () => {
                if (!selection.c1 || !selection.c2 || !selection.c3) return;
                setLocked(true);

                let maxMatches = 0;
                roomData.gamePool.forEach(p => {
                    let m = 0;
                    if (p.c1 === selection.c1.text) m++;
                    if (p.c2 === selection.c2.text) m++;
                    if (p.c3 === selection.c3.text) m++;
                    if (m > maxMatches) maxMatches = m;
                });

                const dice = roomData.currentDice || 1;
                const isPerfect = maxMatches === 3;
                const isPartial = maxMatches === 2;

                if (isPerfect) {
                    setFeedback('success');
                    confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 } });
                    setCorrectTriple({ c1: selection.c1.uid, c2: selection.c2.uid, c3: selection.c3.uid });
                    setShowCorrectCards(true);

                    const updatedPlayers = roomData.players.map(p =>
                        p.id === roomData.currentTurn ? { ...p, score: p.score + dice, roundScore: (p.roundScore || 0) + dice } : p
                    );
                    const newMatched = [...(roomData.matchedIds || []), selection.c1.uid, selection.c2.uid, selection.c3.uid];
                    const newTriples = [...(roomData.correctTriples || []), { c1: selection.c1.uid, c2: selection.c2.uid, c3: selection.c3.uid }];

                    await updateGame({
                        players: updatedPlayers,
                        matchedIds: newMatched,
                        correctTriples: newTriples,
                        dicePhase: 'result',
                        liveSelections: {},
                        lastAction: { type: 'success', uid: Date.now(), player: roomData.currentTurn }
                    });
                } else if (isPartial) {
                    const pts = 1;
                    setFeedback('partial');
                    const id = Date.now();
                    setPenaltyFlies(prev => [...prev, { id, text: `+${pts} pt`, isErr: false }]);
                    setTimeout(() => setPenaltyFlies(prev => prev.filter(f => f.id !== id)), 800);

                    const updatedPlayers = roomData.players.map(p =>
                        p.id === roomData.currentTurn ? { ...p, score: p.score + pts, roundScore: (p.roundScore || 0) + pts } : p
                    );

                    await updateGame({ lastAction: { type: 'partial', uid: Date.now(), player: roomData.currentTurn } });

                    setTimeout(async () => {
                        setFeedback('none'); setSelection({ c1: null, c2: null, c3: null }); setLocked(false);
                        await advanceTurnArena(updatedPlayers, roomData.matchedIds);
                    }, 800);
                } else {
                    setFeedback('error');
                    const id = Date.now();
                    setPenaltyFlies(prev => [...prev, { id, text: '0 pts', isErr: true }]);
                    setTimeout(() => setPenaltyFlies(prev => prev.filter(f => f.id !== id)), 800);

                    await updateGame({ lastAction: { type: 'error', uid: Date.now(), player: roomData.currentTurn } });

                    setTimeout(async () => {
                        setFeedback('none'); setSelection({ c1: null, c2: null, c3: null }); setLocked(false);
                        await advanceTurnArena(roomData.players, roomData.matchedIds);
                    }, 800);
                }
            };

            const handleNextArena = async () => {
                setShowCorrectCards(false);
                setCorrectTriple(null);
                setFeedback('none');
                setSelection({ c1: null, c2: null, c3: null });
                setLocked(false);

                const newMatched = roomData.matchedIds || [];
                const maxMatchesThisRound = Math.max(1, roomData.board.c1.length - 1); 
                const isRoundOver = (newMatched.length / 3) >= maxMatchesThisRound;

                if (isRoundOver) {
                    await handleRoundEnd(roomData.players);
                } else {
                    await advanceTurnArena(roomData.players, newMatched);
                }
            };

            const advanceTurnArena = async (players, matchedIds) => {
                const active = players.filter(p => p.occupied);
                const currIdx = active.findIndex(p => p.id === roomData.currentTurn);
                const nextTurn = active[(currIdx + 1) % active.length].id;
                setDiceValue(null);
                await updateGame({
                    players, matchedIds,
                    currentTurn: nextTurn,
                    currentDice: null,
                    dicePhase: 'roll',
                    liveSelections: {}
                });
            };

            const handleRoundEnd = async (players) => {
                let updatedPlayers = players.map(p => ({ ...p, roundScore: 0 }));

                const nextRound = roomData.currentRound + 1;
                if (nextRound > roomData.settings.rounds) {
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                    if (isSinglePlayer) {
                        await addDoc(collection(db, `artifacts/periplo-app-v1/quizzes/${quizId}/leaderboard`), { playerName, time: timer, date: serverTimestamp() });
                    }
                    await updateGame({ gameState: 'end', players: updatedPlayers, finalTime: timer });
                } else {
                    const active = updatedPlayers.filter(p => p.occupied);
                    const nextStartIdx = (nextRound - 1) % active.length;
                    const nextStartingPlayer = active[nextStartIdx].id;

                    triggerSequence(
                        ['¡BIEN HECHO!', `RONDA ${nextRound}`, '3', '2', '1', 'GO!'],
                        async () => {
                            const startIdx = (nextRound - 1) * roomData.settings.rowsPerRound;
                            const nextPairs = roomData.gamePool.slice(startIdx, startIdx + roomData.settings.rowsPerRound);
                            
                            setDiceValue(null);
                            await updateGame({
                                currentRound: nextRound,
                                board: generateBoardColumns(nextPairs),
                                matchedIds: [], correctTriples: [],
                                players: updatedPlayers,
                                currentTurn: nextStartingPlayer,
                                currentDice: null, dicePhase: 'roll',
                                liveSelections: {}
                            });
                        }
                    );
                }
            };

            const triggerPenalty = (text, secs) => {
                setLocked(true);
                const isErr = secs > 2;
                setFeedback(isErr ? 'error' : 'partial');
                const id = Date.now();
                setPenaltyFlies(prev => [...prev, { id, text, isErr }]);
                setTimeout(() => setPenaltyFlies(prev => prev.filter(f => f.id !== id)), 800);
                if (isSinglePlayer) { setTimer(prev => prev + secs); setTimerAnim(true); setTimeout(() => setTimerAnim(false), 500); }
                setTimeout(() => {
                    setSelection({ c1: null, c2: null, c3: null }); setFeedback('none'); setLocked(false);
                    if (!isSinglePlayer) processTurnSingle(false);
                }, 600);
            };

            const processTurnSingle = async (clearBoard) => {
                setSelection({ c1: null, c2: null, c3: null }); setFeedback('none'); setLocked(false);
                let newMatched = [...(roomData.matchedIds || [])];
                if (clearBoard) newMatched.push(selection.c1.uid, selection.c2.uid, selection.c3.uid);

                const maxMatchesThisRound = Math.max(1, roomData.board.c1.length - 1); 
                const isRoundOver = (newMatched.length / 3) >= maxMatchesThisRound;
                
                if (isRoundOver) {
                    await updateGame({ matchedIds: newMatched });
                    await handleRoundEnd(roomData.players);
                } else {
                    await updateGame({ matchedIds: newMatched });
                }
            };

            useEffect(() => {
                if (!isSinglePlayer && roomData?.currentDice && !diceRolling) {
                    setDiceValue(roomData.currentDice);
                }
                if (!isSinglePlayer && roomData?.dicePhase === 'roll') {
                    setDiceValue(null); setShowCorrectCards(false); setCorrectTriple(null);
                    setSelection({ c1: null, c2: null, c3: null }); setFeedback('none'); setLocked(false);
                }
                if (!isSinglePlayer && roomData?.dicePhase === 'result') {
                    const trips = roomData.correctTriples;
                    if (trips && trips.length > 0) {
                        const last = trips[trips.length - 1];
                        setCorrectTriple(last);
                        setShowCorrectCards(true);
                        if (!isSinglePlayer && myRole !== roomData.currentTurn) setFeedback('success');
                    }
                }
            }, [roomData?.currentDice, roomData?.dicePhase, isSinglePlayer, myRole, roomData?.currentTurn]);

            const getLiveSelUid = (col) => {
                if (!roomData?.liveSelections) return null;
                return roomData.liveSelections[col] || null;
            };

            // ====== RENDER GUARD (Disclaimer) ======
            if (!acceptedDisclaimer) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 text-center overflow-auto">
                    <div className="max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-[2rem] shadow-2xl my-auto">
                        <div className="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                            <AlertTriangle size={32} className="text-amber-500"/>
                        </div>
                        <h2 className="text-xl font-black text-white mb-4 uppercase tracking-widest">Aviso de Compatibilidad</h2>
                        <p className="text-zinc-400 text-sm font-bold mb-4 leading-relaxed">
                            LingoMatch Arena está altamente optimizado. Sin embargo, si utilizas navegadores muy antiguos o <strong className="text-white">Safari en iOS</strong>, algunos textos largos podrían verse cortados.
                        </p>
                        <p className="text-zinc-400 text-sm font-bold mb-8 leading-relaxed">
                            Si experimentas fallos visuales, te recomendamos usar <strong className="text-white">Chrome o jugar en PC/Laptop</strong> donde la experiencia es perfecta. 🚀
                        </p>
                        <button onClick={() => { localStorage.setItem('periplo_disclaimer_v1', 'true'); setAcceptedDisclaimer(true); }}
                            className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 uppercase tracking-widest text-sm flex justify-center items-center gap-2">
                            Entendido, ¡A jugar!
                        </button>
                    </div>
                </div>
            );

            // ====== PANTALLA 0.5: INTERCEPTOR (RECONECTAR) ======
            if (pendingRoom && !roomCode && !modeSelected) {
                return (
                    <div className="h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6 bg-zinc-950 overflow-auto">
                        <div className="bg-zinc-900 border border-zinc-800 p-6 sm:p-8 rounded-3xl w-full max-w-sm shadow-2xl my-auto text-center fade-in">
                            <div className="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                <AlertTriangle size={32} className="text-amber-500"/>
                            </div>
                            <h2 className="text-xl font-black text-white mb-2 uppercase tracking-widest">Partida Pendiente</h2>
                            <p className="text-zinc-400 text-sm font-bold mb-6">
                                Tienes una partida sin terminar en la sala <strong className="text-white text-lg">{pendingRoom}</strong>. ¿Qué deseas hacer?
                            </p>
                            
                            <div className="space-y-3">
                                <button onClick={reconnectRoom} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 uppercase tracking-widest text-sm flex justify-center items-center gap-2 shadow-lg">
                                    <Play size={18} fill="currentColor"/> RECONECTAR
                                </button>
                                
                                <button onClick={forgetRoom} className="btn-juicy w-full bg-zinc-800 text-zinc-400 font-black py-4 rounded-xl border-zinc-950 uppercase tracking-widest text-sm flex justify-center items-center gap-2 hover:text-white transition-colors">
                                    <XCircle size={18}/> OLVIDAR SALA
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ====== PANTALLA 1: JOIN LOBBY (ALUMNOS SIN ID) ======
            if (!quizId && !roomData && !modeSelected) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6 bg-zinc-950 overflow-auto">
                    <div className="bg-zinc-900 border border-zinc-800 p-6 sm:p-8 rounded-3xl w-full max-w-sm shadow-2xl my-auto fade-in">
                        <h2 className="text-center text-indigo-400 font-black italic text-xl sm:text-2xl mb-6 uppercase tracking-widest">Unirse a Arena</h2>
                        
                        <input value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="TU NOMBRE / APODO"
                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-center text-lg font-black uppercase outline-none focus:border-indigo-500 text-white mb-4" style={{ fontSize: '16px' }}/>
                        
                        <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-2 text-center">Elige tu Avatar</p>
                        <div className="flex flex-wrap justify-center gap-2 mb-6">
                            {AVATARS.map(emo => (
                                <button key={emo} onClick={() => setPlayerEmoji(emo)} 
                                    className={`w-10 h-10 text-2xl flex items-center justify-center rounded-xl transition-all ${playerEmoji === emo ? 'bg-indigo-500/20 border-2 border-indigo-500 scale-110' : 'bg-zinc-800 border border-zinc-700 opacity-50 hover:opacity-100'}`}>
                                    {emo}
                                </button>
                            ))}
                        </div>

                        <input value={inputCode} onChange={e => setInputCode(e.target.value.toUpperCase())} maxLength={4} placeholder="CÓDIGO (4 DÍGITOS)"
                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-center text-lg font-black uppercase outline-none focus:border-indigo-500 text-white mb-6" style={{ fontSize: '16px' }}/>
                        
                        <button onClick={joinRoom} disabled={!playerName.trim() || inputCode.length < 4}
                            className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-lg">
                            <LogIn size={20}/> ENTRAR A LA SALA
                        </button>
                    </div>
                </div>
            );

            // ====== RENDER GUARD (Carga de QuizData si ya tenemos ID) ======
            if (quizId && !quizData) return <div className="h-[100dvh] flex items-center justify-center font-black text-indigo-500 animate-pulse text-xl uppercase tracking-widest">Conectando...</div>;

            // ====== PANTALLA 2: TEACHER CHOICE (CON ID, NO ESTUDIANTE) ======
            if (quizId && !modeSelected) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 overflow-auto">
                    <div className="text-center mb-8 fade-in">
                        <h1 className="text-3xl sm:text-4xl font-black italic text-indigo-500 mb-2 tracking-tighter">LINGOMATCH <span className="text-amber-400">TRIPLE</span></h1>
                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">{quizData?.title}</p>
                    </div>

                    <div className="w-full max-w-sm mb-6 fade-in" style={{ animationDelay: '0.1s' }}>
                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest mb-2 text-center">Tu Avatar (por si juegas)</p>
                        <div className="flex flex-wrap justify-center gap-2">
                            {AVATARS.map(emo => (
                                <button key={emo} onClick={() => setPlayerEmoji(emo)} 
                                    className={`w-10 h-10 text-2xl flex items-center justify-center rounded-xl transition-all ${playerEmoji === emo ? 'bg-indigo-500/20 border-2 border-indigo-500 scale-110' : 'bg-zinc-800 border border-zinc-700 opacity-50 hover:opacity-100'}`}>
                                    {emo}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="w-full max-w-sm space-y-4 fade-in" style={{ animationDelay: '0.2s' }}>
                        <button onClick={setupSinglePlayer} className="btn-juicy w-full bg-amber-500 text-zinc-950 font-black py-5 rounded-2xl border-amber-700 flex flex-col items-center gap-1 shadow-xl">
                            <Timer size={32}/><span className="text-xl tracking-widest uppercase">TEST SPEEDRUN (1P)</span>
                            <span className="text-xs font-bold opacity-80">Juega y prueba el set localmente.</span>
                        </button>
                        <button onClick={createRoom} className="btn-juicy w-full bg-indigo-600 text-white font-black py-5 rounded-2xl border-indigo-800 flex flex-col items-center gap-1 shadow-xl">
                            <Users size={32}/><span className="text-xl tracking-widest uppercase">HOST ARENA (VS)</span>
                            <span className="text-xs font-bold opacity-80">Crear sala para los alumnos.</span>
                        </button>
                    </div>
                    {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest fade-in" style={{ animationDelay: '0.3s' }}>Volver al Hub</button>}
                </div>
            );

            // ====== PANTALLA 3: SINGLE PLAYER SETUP ======
            if (modeSelected === 'single' && !roomData) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6 bg-zinc-950 overflow-auto">
                    <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 p-5 sm:p-6 rounded-3xl shadow-2xl my-auto fade-in">
                        <div className="flex items-center gap-3 mb-5 border-b border-zinc-800 pb-4">
                            <Trophy className="text-amber-400 flex-shrink-0" size={24}/>
                            <h2 className="text-lg sm:text-xl font-black uppercase italic text-white tracking-widest">Mejores Tiempos</h2>
                        </div>
                        <div className="space-y-2 mb-6">
                            {leaderboard.length === 0 ? <p className="text-center text-zinc-500 font-bold text-sm py-4">Sé el primero en dejar tu marca.</p> :
                                leaderboard.map((l, i) => (
                                    <div key={i} className="flex justify-between items-center bg-zinc-950 p-3 rounded-xl border border-zinc-800">
                                        <div className="flex items-center gap-3">
                                            <span className={`font-black text-sm ${i===0?'text-amber-400':i===1?'text-zinc-400':'text-zinc-600'}`}>#{i+1}</span>
                                            <span className="font-bold text-white uppercase text-sm">{l.playerName}</span>
                                        </div>
                                        <span className="font-black text-indigo-400 tabular-nums">{formatTime(l.time)}</span>
                                    </div>
                                ))
                            }
                        </div>
                        <input value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="TU NOMBRE / APODO"
                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-center text-lg font-black uppercase outline-none focus:border-amber-500 text-white mb-4" style={{ fontSize: '16px' }}/>
                        
                        <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-2 text-center">Elige tu Avatar</p>
                        <div className="flex flex-wrap justify-center gap-2 mb-6">
                            {AVATARS.map(emo => (
                                <button key={emo} onClick={() => setPlayerEmoji(emo)} 
                                    className={`w-10 h-10 text-2xl flex items-center justify-center rounded-xl transition-all ${playerEmoji === emo ? 'bg-amber-500/20 border-2 border-amber-500 scale-110' : 'bg-zinc-800 border border-zinc-700 opacity-50 hover:opacity-100'}`}>
                                    {emo}
                                </button>
                            ))}
                        </div>

                        <button onClick={startSinglePlayer} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 uppercase tracking-widest text-lg flex items-center justify-center gap-2 shadow-lg">
                            <Play fill="currentColor"/> EMPEZAR
                        </button>
                        {!isStudent && <button onClick={() => setModeSelected(null)} className="w-full text-zinc-500 font-bold text-xs mt-4 hover:text-white uppercase tracking-widest">Volver</button>}
                    </div>
                </div>
            );

            // ====== PANTALLA 4: ROLE SELECTION (LOBBY) ======
            if (roomData?.gameState === 'roles') {
                const isHost = roomData.hostUid === user?.uid;
                
                return (
                    <div className="h-[100dvh] flex flex-col items-center justify-center p-4 bg-zinc-950 overflow-auto">
                        <div className="w-full max-w-xl bg-zinc-900 border border-zinc-800 rounded-[2rem] overflow-hidden shadow-2xl my-auto fade-in">
                            <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950">
                                <div>
                                    <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">SALA ACTIVA</p>
                                    <p className="text-3xl sm:text-4xl font-black text-indigo-400 tracking-widest">{roomCode}</p>
                                </div>
                                {isHost && <button onClick={() => setRoomData(null)} className="p-2.5 bg-rose-500/10 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-colors"><XCircle size={20}/></button>}
                            </div>
                            <div className="p-5">
                                <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-3 text-center">
                                    {isHost ? 'Toma una silla para jugar, o inicia sin sentarte' : 'Haz clic en una silla para jugar'}
                                </p>
                                
                                <div className="grid grid-cols-2 gap-3 mb-5">
                                    {roomData.players.map(p => {
                                        const isMe = p.uid === user?.uid;
                                        const isOccupiedByOther = p.occupied && !isMe;
                                        
                                        return (
                                            <button key={p.id} onClick={() => selectRole(p.id)} disabled={isOccupiedByOther}
                                                className={`btn-juicy p-3 sm:p-4 rounded-xl border-b-4 font-black flex items-center gap-2 text-sm sm:text-base transition-all ${
                                                    isOccupiedByOther ? 'bg-zinc-950 border-zinc-900 text-zinc-600 opacity-50 cursor-not-allowed' :
                                                    isMe ? `${p.color} border-black text-white ring-2 ring-white scale-105 shadow-lg` :
                                                    'bg-zinc-800 border-zinc-950 text-zinc-300 hover:bg-zinc-700'}`}>
                                                <span className="text-xl">{p.emoji}</span> <span className="truncate">{p.name}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {isHost ? (
                                    roomData.players.some(p => p.occupied) ? (
                                        <button onClick={startMultiplayer} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 flex items-center justify-center gap-2 text-lg uppercase tracking-widest shadow-lg">
                                            <Play fill="currentColor"/> {roomData.players.find(p => p.uid === user?.uid) ? 'INICIAR PARTIDA' : 'INICIAR COMO OBSERVADOR'}
                                        </button>
                                    ) : (
                                        <p className="text-zinc-500 font-bold text-center text-sm uppercase tracking-widest py-3">Esperando jugadores...</p>
                                    )
                                ) : (
                                    <p className="text-indigo-400 font-bold text-center text-sm uppercase tracking-widest py-3 animate-pulse">Esperando a que el maestro inicie...</p>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // ====== PLAYING ======
            if (roomData?.gameState === 'playing') {
                const isMyTurn = isSinglePlayer || myRole === roomData.currentTurn;
                const activePlayerObj = !isSinglePlayer ? roomData.players.find(p => p.id === roomData.currentTurn) : null;
                const isSelectPhase = isSinglePlayer || roomData.dicePhase === 'select';

                const renderCol = (items, colKey) => (
                    <div className="flex-1 flex flex-col gap-1.5 sm:gap-2 overflow-hidden">
                        {items.map(item => {
                            const isMatched = (roomData.matchedIds || []).includes(item.uid);
                            const isCorrectCard = correctTriple && (correctTriple.c1 === item.uid || correctTriple.c2 === item.uid || correctTriple.c3 === item.uid);
                            const isMySel = selection[colKey]?.uid === item.uid;
                            const isLiveSel = !isSinglePlayer && getLiveSelUid(colKey) === item.uid && !isMyTurn;

                            if (isMatched && !isCorrectCard) {
                                return <div key={item.uid} className="h-16 sm:h-20 border-2 border-dashed border-zinc-800 rounded-2xl flex items-center justify-center opacity-25 shrink-0"><CheckCircle2 className="text-zinc-700" size={18}/></div>;
                            }

                            if (isCorrectCard && showCorrectCards) {
                                return (
                                    <div key={item.uid} className="h-16 sm:h-20 rounded-2xl border-2 border-emerald-500 bg-emerald-500/20 flex items-center justify-center font-black text-sm sm:text-base text-emerald-300 px-2 text-center leading-tight slide-up shrink-0">
                                        <span className="safari-text-fix">{item.text}</span>
                                    </div>
                                );
                            }

                            let bg = "bg-zinc-900 border-zinc-800 text-zinc-300";
                            if (isMySel) {
                                if (feedback === 'error') bg = "bg-rose-500 border-rose-700 text-white animate-shake";
                                else if (feedback === 'partial') bg = "bg-amber-500 border-amber-700 text-white animate-shake";
                                else if (feedback === 'success') bg = "bg-emerald-500 border-emerald-700 text-white scale-105";
                                else bg = "bg-indigo-600 border-indigo-800 text-white scale-105 pulse-glow";
                            } else if (isLiveSel) {
                                const turnColor = activePlayerObj?.color?.replace('bg-','border-') || 'border-indigo-500';
                                bg = `bg-zinc-900 ${turnColor} border-2 text-zinc-100`;
                            }

                            return (
                                <button key={item.uid}
                                    onClick={() => handleSelect(colKey, item)}
                                    disabled={!isSelectPhase || locked || (isMatched && !isCorrectCard)}
                                    className={`btn-juicy h-16 sm:h-20 rounded-2xl border-2 font-black leading-tight p-1 sm:p-2 transition-all flex items-center justify-center shrink-0 overflow-hidden ${bg} disabled:opacity-40`}>
                                    <span className="safari-text-fix text-[10px] sm:text-xs text-center w-full">
                                        {item.text}
                                    </span>
                                </button>
                            );
                        })}
                    </div>
                );

                return (
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 relative overflow-hidden">

                        {/* COUNTDOWN / PAUSE OVERLAY */}
                        {(countdown || isPaused) && (
                            <div className="fixed inset-0 bg-zinc-950/85 backdrop-blur-md z-50 flex items-center justify-center p-4">
                                {countdown ? (
                                    <div className="text-5xl sm:text-7xl md:text-[10vw] font-black italic text-white animate-pulse drop-shadow-[0_0_30px_rgba(99,102,241,0.8)] text-center leading-tight px-4">
                                        {countdown}
                                    </div>
                                ) : (
                                    <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center max-w-sm w-full shadow-2xl">
                                        <Pause size={48} className="text-zinc-500 mx-auto mb-4"/>
                                        <h2 className="text-2xl font-black text-white mb-6 uppercase tracking-widest">Pausa</h2>
                                        <button onClick={() => { setIsPaused(false); triggerSequence(['3','2','1','GO!']); }} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 mb-3 uppercase tracking-widest">Reanudar</button>
                                        <button onClick={resetToMenu} className="btn-juicy w-full bg-zinc-800 text-zinc-400 font-black py-4 rounded-xl border-zinc-950 uppercase tracking-widest hover:text-white transition-colors">Abandonar</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* DICE ROLL OVERLAY (Arena) */}
                        {!isSinglePlayer && roomData.dicePhase === 'roll' && (
                            <div className="fixed inset-0 bg-zinc-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 sm:p-8 text-center max-w-sm w-full shadow-2xl fade-in">
                                    <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-2">Turno de</p>
                                    <p className={`text-2xl font-black uppercase mb-6 flex justify-center items-center gap-2 ${activePlayerObj?.color?.replace('bg-','text-') || 'text-white'}`}>
                                        <span className="text-3xl">{activePlayerObj?.emoji}</span> {activePlayerObj?.name || 'Jugador'}
                                    </p>

                                    <div className={`text-8xl sm:text-9xl mb-6 ${diceRolling ? 'animate-dice' : ''}`}>
                                        {diceRolling ? '🎲' : (diceValue ? DICE_EMOJIS[diceValue - 1] : '🎲')}
                                    </div>

                                    {isMyTurn ? (
                                        <button onClick={rollDice} disabled={diceRolling}
                                            className="btn-juicy w-full bg-amber-500 text-black font-black py-4 rounded-xl border-amber-700 uppercase tracking-widest text-lg flex items-center justify-center gap-2 disabled:opacity-50 shadow-lg">
                                            <Dices size={24}/> {diceRolling ? 'TIRANDO...' : 'TIRAR DADO'}
                                        </button>
                                    ) : (
                                        <p className="text-zinc-500 font-bold uppercase tracking-widest animate-pulse">Esperando que tire el dado...</p>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* HEADER CON BRANDING "P" - ORDENADO IZQ A DER */}
                        <header className="bg-zinc-900 border-b border-zinc-800 px-3 py-2.5 sm:p-4 shrink-0 z-20 flex justify-between items-center shadow-lg relative">
                            <div className="absolute top-full left-1/2 -translate-x-1/2 mt-4 pointer-events-none z-50 flex gap-10 w-full max-w-lg justify-around">
                                {penaltyFlies.map(p => (
                                    <div key={p.id} className={`text-2xl sm:text-3xl font-black italic animate-float drop-shadow-[0_0_10px_rgba(0,0,0,1)] ${p.isErr ? 'text-rose-500' : 'text-amber-500'}`}>{p.text}</div>
                                ))}
                            </div>

                            <div className="flex items-center gap-2 sm:gap-3">
                                {/* 1. LOGO P */}
                                <div className="w-7 h-7 sm:w-8 sm:h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-black text-white text-xs sm:text-sm shadow-md shrink-0">P</div>
                                
                                {/* 2. SALA */}
                                {!isSinglePlayer && (
                                    <div className="font-black text-zinc-400 bg-zinc-800/80 px-2.5 py-1.5 rounded-lg uppercase text-[10px] sm:text-xs tracking-widest border border-zinc-700 flex items-center gap-1.5">
                                        SALA <span className="text-white">{roomCode}</span>
                                    </div>
                                )}

                                {/* 3. RONDAS */}
                                <div className="font-black text-indigo-400 bg-indigo-500/10 px-2.5 py-1.5 rounded-lg uppercase text-[10px] sm:text-xs">
                                    R{roomData.currentRound}/{roomData.settings.rounds}
                                </div>

                                {/* 4. DADO */}
                                {!isSinglePlayer && diceValue && roomData.dicePhase !== 'roll' && (
                                    <div className="flex items-center gap-1 bg-amber-500/10 px-2.5 py-1.5 rounded-lg">
                                        <span className="text-lg leading-none">{DICE_EMOJIS[diceValue - 1]}</span>
                                        <span className="text-amber-500 font-black text-xs">×{diceValue}</span>
                                    </div>
                                )}
                            </div>

                            {/* CONTROLES DERECHOS (Pausa y Timer) */}
                            {isSinglePlayer ? (
                                <div className="flex items-center gap-2">
                                    <div className={`flex items-center gap-1.5 bg-zinc-950 border px-3 py-1.5 rounded-xl transition-all ${timerAnim ? 'border-rose-500 bg-rose-500/20 text-rose-500 scale-110 animate-shake' : 'border-zinc-800 text-amber-500'}`}>
                                        <Clock size={16}/><span className="font-black text-xl tabular-nums">{formatTime(timer)}</span>
                                    </div>
                                    <button onClick={() => setIsPaused(true)} className="p-2 bg-zinc-800 rounded-xl text-zinc-400 hover:text-white transition-colors"><Pause size={18}/></button>
                                </div>
                            ) : (
                                <button onClick={() => setIsPaused(true)} className="p-2 bg-zinc-800 rounded-xl text-zinc-400 hover:text-white transition-colors"><Pause size={18}/></button>
                            )}
                        </header>

                        {/* NUEVO SCOREBOARD BANNER (SOLO MULTIPLAYER) */}
                        {!isSinglePlayer && (
                            <div className="flex justify-around items-center px-2 py-2 bg-zinc-950 border-b border-zinc-800 shrink-0 z-10">
                                {roomData.players.filter(p => p.occupied).map(p => (
                                    <div key={p.id} className={`flex items-center gap-2 px-3 py-1 rounded-xl border-2 transition-all ${p.id === roomData.currentTurn ? 'border-indigo-500 bg-indigo-500/10 scale-105' : 'border-transparent bg-zinc-900/50'}`}>
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-lg shadow-md border-2 border-zinc-950 ${p.color}`}>
                                            {p.emoji}
                                        </div>
                                        <span className={`text-lg sm:text-xl font-black ${p.color.replace('bg-','text-')}`}>{p.score}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* BOARD */}
                        <main className={`flex-1 flex gap-1.5 sm:gap-3 p-2 sm:p-4 max-w-5xl mx-auto w-full transition-opacity duration-300 overflow-y-auto ${(!isMyTurn && !showCorrectCards && roomData.hostUid !== user?.uid) ? 'opacity-50' : ''}`}>
                            {renderCol(roomData.board.c1, 'c1')}
                            {renderCol(roomData.board.c2, 'c2')}
                            {renderCol(roomData.board.c3, 'c3')}
                        </main>

                        {/* SUBMIT BUTTON (Arena) */}
                        {!isSinglePlayer && showSubmit && isMyTurn && !showCorrectCards && (
                            <div className="shrink-0 p-3 border-t border-zinc-800 bg-zinc-900/90 backdrop-blur-sm slide-up">
                                <button onClick={handleSubmitArena}
                                    className="btn-juicy w-full max-w-lg mx-auto block bg-indigo-600 text-white font-black py-4 rounded-xl border-indigo-800 uppercase tracking-widest text-lg flex items-center justify-center gap-2 shadow-xl">
                                    <Send size={20}/> CONFIRMAR
                                </button>
                            </div>
                        )}

                        {/* NEXT BUTTON (Arena, after correct) */}
                        {!isSinglePlayer && showCorrectCards && (
                            <div className="shrink-0 p-3 border-t border-emerald-800/50 bg-emerald-950/30 backdrop-blur-sm slide-up">
                                {isMyTurn ? (
                                    <button onClick={handleNextArena}
                                        className="btn-juicy w-full max-w-lg mx-auto block bg-emerald-500 text-white font-black py-4 rounded-xl border-emerald-700 uppercase tracking-widest text-lg flex items-center justify-center gap-2 shadow-xl">
                                        <ArrowRight size={20}/> SIGUIENTE
                                    </button>
                                ) : (
                                    <p className="text-center text-emerald-400 font-bold text-sm uppercase tracking-widest py-3 animate-pulse">¡Correcto! Esperando...</p>
                                )}
                            </div>
                        )}

                        {/* NOT MY TURN BADGE */}
                        {!isMyTurn && !isSinglePlayer && !showCorrectCards && roomData.dicePhase !== 'roll' && roomData.hostUid !== user?.uid && (
                            <div className="absolute bottom-20 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-5 py-2.5 rounded-full font-black tracking-widest uppercase text-sm shadow-2xl animate-pulse z-30 flex items-center gap-2">
                                <span className="text-lg">{activePlayerObj?.emoji}</span> Turno de {activePlayerObj?.name || '...'}
                            </div>
                        )}
                    </div>
                );
            }

            // ====== END SCREEN ======
            if (roomData?.gameState === 'end') {
                const winner = !isSinglePlayer ? [...roomData.players].filter(p=>p.occupied).sort((a,b) => b.score - a.score)[0] : null;

                return (
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-auto">
                        <div className="flex-1 flex items-center justify-center p-4 sm:p-6">
                            <div className="bg-zinc-900 p-6 sm:p-8 rounded-[2rem] shadow-2xl border border-zinc-800 max-w-md w-full text-center my-auto fade-in">
                                <Trophy size={64} className="text-amber-400 mx-auto mb-4"/>
                                <h1 className="text-3xl sm:text-4xl font-black italic text-white mb-1 uppercase">¡Completado!</h1>
                                <p className="text-zinc-500 font-bold uppercase tracking-widest text-[10px] mb-6">Dominaste {roomData.gamePool.length} conceptos</p>

                                {!isSinglePlayer ? (
                                    <div className="bg-zinc-950 border border-zinc-800 p-5 rounded-2xl mb-6">
                                        <p className="text-zinc-400 font-bold text-xs mb-1 uppercase tracking-widest">Ganador</p>
                                        <p className={`text-2xl sm:text-3xl font-black uppercase flex justify-center gap-2 ${winner.color.replace('bg-','text-')}`}>
                                            <span>{winner.emoji}</span> {winner.name}
                                        </p>
                                        <p className="text-lg font-bold text-white mt-1">{winner.score} PTS</p>
                                        <div className="mt-3 pt-3 border-t border-zinc-800 flex flex-wrap justify-center gap-3">
                                            {roomData.players.filter(p => p.occupied && p.id !== winner.id).map(p => (
                                                <span key={p.id} className="text-xs font-bold text-zinc-500">{p.emoji} {p.name}: {p.score}pts</span>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-zinc-950 border border-zinc-800 p-5 rounded-2xl mb-6 relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-10"><Clock size={80}/></div>
                                        <p className="text-zinc-400 font-bold uppercase tracking-widest text-[10px] mb-1">Tu Tiempo</p>
                                        <p className="text-4xl sm:text-5xl font-black text-amber-500 tabular-nums">{formatTime(roomData.finalTime)}</p>
                                    </div>
                                )}

                                <div className="space-y-3">
                                    {isSinglePlayer && (
                                        <button onClick={() => { loadLeaderboardData(quizId); setShowLeaderboard(true); }} className="btn-juicy w-full bg-amber-600 text-white font-black py-3.5 rounded-xl border-amber-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2 shadow-md">
                                            <Trophy size={16}/> Leaderboard
                                        </button>
                                    )}
                                    <button onClick={() => setShowLibrary(true)} className="btn-juicy w-full bg-indigo-600 text-white font-black py-3.5 rounded-xl border-indigo-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2 shadow-md">
                                        <BookOpen size={16}/> Ver Vocabulario
                                    </button>
                                    <button onClick={resetToMenu} className="btn-juicy w-full bg-zinc-800 text-white font-black py-3.5 rounded-xl border-zinc-950 text-sm uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-zinc-700 transition-colors">
                                        <RotateCcw size={16}/> Volver al Inicio
                                    </button>
                                </div>
                                {(!isStudent && quizId) && <button onClick={() => window.location.href='index.html'} className="text-zinc-500 font-bold text-xs uppercase tracking-widest mt-6 hover:text-white block mx-auto transition-colors">Salir al Hub</button>}
                            </div>
                        </div>

                        {/* Library modal */}
                        {showLibrary && (
                            <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl flex flex-col max-h-[85vh] shadow-2xl overflow-hidden fade-in">
                                    <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                        <h3 className="font-black text-lg text-white uppercase tracking-widest flex items-center gap-2"><BookOpen size={18} className="text-indigo-400"/> Vocabulario</h3>
                                        <button onClick={() => setShowLibrary(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                    </div>
                                    <div className="p-4 overflow-y-auto custom-scrollbar space-y-2">
                                        {[...quizData.content.pairs].sort((a,b) => a.c1.localeCompare(b.c1)).map((p, i) => (
                                            <div key={i} className="flex flex-col sm:flex-row gap-1 sm:gap-3 text-sm font-bold bg-zinc-900 p-3 rounded-xl border border-zinc-800 hover:border-indigo-500/30 transition-colors">
                                                <span className="flex-1 text-indigo-400">{p.c1}</span>
                                                <span className="flex-1 text-zinc-300">{p.c2}</span>
                                                <span className="flex-1 text-zinc-300">{p.c3}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Leaderboard modal */}
                        {showLeaderboard && (
                            <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm shadow-2xl overflow-hidden fade-in">
                                    <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                        <h3 className="font-black text-lg text-amber-400 uppercase tracking-widest flex items-center gap-2"><Trophy size={18}/> Top 5</h3>
                                        <button onClick={() => setShowLeaderboard(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                    </div>
                                    <div className="p-5 space-y-2">
                                        {leaderboard.length === 0 ? <p className="text-center text-zinc-500 font-bold">Sin récords aún.</p> :
                                            leaderboard.map((l, i) => (
                                                <div key={i} className="flex justify-between items-center bg-zinc-900 p-3 rounded-xl border border-zinc-800">
                                                    <div className="flex items-center gap-2">
                                                        <span className={`font-black ${i===0?'text-amber-400':i===1?'text-zinc-400':'text-zinc-600'}`}>#{i+1}</span>
                                                        <span className="font-bold text-white uppercase text-sm">{l.playerName}</span>
                                                    </div>
                                                    <span className="font-black text-indigo-400 tabular-nums">{formatTime(l.time)}</span>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return null;
        };

        createRoot(document.getElementById('root')).render(<LingoMatch />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spell the Phrase | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="periplo.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; overscroll-behavior-y: none; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .min-h-screen-safe { min-height: 100vh; min-height: -webkit-fill-available; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }
        .animate-shake { animation: shake 0.35s ease both; }
        @keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
        .animate-pop { animation: pop 0.15s ease both; }
        @keyframes slideUp { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
        .slide-up { animation: slideUp 0.2s ease both; }
        .letter-tile { transition: background 0.15s, opacity 0.15s, transform 0.1s; }
        .letter-slot { transition: color 0.1s, border-color 0.15s; }
    </style>
</head>
<body class="text-zinc-100">
<div id="root"></div>
<script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { RefreshCw, CheckCircle2, Trophy, ChevronRight, Delete } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, doc, getDoc } from 'firebase/firestore';

    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",
        authDomain: "proyecto-periplo.firebaseapp.com",
        projectId: "proyecto-periplo",
        storageBucket: "proyecto-periplo.firebasestorage.app",
        messagingSenderId: "236795998392",
        appId: "1:236795998392:web:0da24b4f018611b55c844d"
    };
    const fbApp = initializeApp(FIREBASE_CONFIG);
    const db    = getFirestore(fbApp);

    const urlParams   = new URLSearchParams(window.location.search);
    const QUIZ_ID     = urlParams.get('id')  || null;
    const TEACHER_UID = urlParams.get('uid') || 'teacher_builder_001';

    const DECOY_POOL = 'bcdfghjklmnpqrstvwxyz'.split('');

    const shuffle = (arr) => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    };

    const buildLetterPool = (blankPart) => {
        const needed = blankPart.replace(/\s/g, '').split('');
        const decoys = shuffle([...DECOY_POOL]).slice(0, 4);
        return shuffle([...needed, ...decoys]).map((char, i) => ({
            char, id: `${char}-${i}-${Math.random().toString(36).slice(2)}`, used: false
        }));
    };

    // Compute the global slot index for each (wordIndex, charIndex) pair
    const computeWordSlotStarts = (blankPart) => {
        const words = blankPart.split(' ');
        const starts = [];
        let count = 0;
        for (const w of words) {
            starts.push(count);
            count += w.length;
        }
        return starts;
    };

    export default function SpellThePhraseApp() {
        const [exercises, setExercises] = useState([]);
        const [loading, setLoading]     = useState(true);
        const [current, setCurrent]     = useState(0);
        const [gameState, setGameState] = useState('playing');
        const [letterPool, setLetterPool] = useState([]);
        const [typedChars, setTypedChars] = useState([]);
        const [feedback, setFeedback]   = useState(null); // null | 'correct' | 'wrong'
        const [score, setScore]         = useState(0);
        const [shakeKey, setShakeKey]   = useState(0);
        const inputRef = useRef(null);
        const advanceTimer = useRef(null);

        const goBack = () => {
            window.location.href = document.referrer?.includes('index') ? document.referrer : 'index.html';
        };

        const getBlankPart = (ex) =>
            ex?.blank_part || (ex?.english_tokens || []).join(' ') || '';
        const getGivenPart = (ex) => ex?.given_part || '';

        const initExercise = useCallback((ex) => {
            const bp = getBlankPart(ex);
            setLetterPool(buildLetterPool(bp));
            setTypedChars([]);
            setFeedback(null);
        }, []);

        useEffect(() => {
            const load = async () => {
                try {
                    let data;
                    if (QUIZ_ID) {
                        const snap = await getDoc(doc(db, `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`, QUIZ_ID));
                        data = snap.exists() ? (snap.data().content?.exercises || []) : [];
                    } else {
                        const res = await fetch('spell-the-phrase.json');
                        data = await res.json();
                    }
                    if (data.length) {
                        setExercises(data);
                        initExercise(data[0]);
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };
            load();
        }, []);

        // Focus hidden input for keyboard capture
        useEffect(() => {
            if (!loading && gameState === 'playing') {
                inputRef.current?.focus();
            }
        }, [loading, gameState, current]);

        const totalSlots = useMemo(() => {
            const ex = exercises[current];
            if (!ex) return 0;
            return getBlankPart(ex).replace(/\s/g, '').length;
        }, [exercises, current]);

        // Auto-check when all slots filled
        useEffect(() => {
            if (feedback || typedChars.length === 0) return;
            if (typedChars.length < totalSlots) return;
            const ex = exercises[current];
            if (!ex) return;
            const bp = getBlankPart(ex);
            const typed = typedChars.join('').toLowerCase();
            const correct = bp.replace(/\s/g, '').toLowerCase();
            if (typed === correct) {
                setFeedback('correct');
                setScore(s => s + 1);
                advanceTimer.current = setTimeout(() => doAdvance(current, exercises), 1400);
            } else {
                setFeedback('wrong');
                setShakeKey(k => k + 1);
            }
        }, [typedChars]);

        useEffect(() => () => clearTimeout(advanceTimer.current), []);

        const doAdvance = (cur, exs) => {
            const next = cur + 1;
            if (next >= exs.length) {
                setGameState('victory');
            } else {
                setCurrent(next);
                initExercise(exs[next]);
            }
        };

        const handleType = useCallback((char) => {
            if (feedback || typedChars.length >= totalSlots) return;
            if (!/^[a-zA-Z]$/.test(char)) return;
            setTypedChars(prev => [...prev, char]);
            // mark first unused tile matching char, else first unused any
            setLetterPool(prev => {
                const idx = prev.findIndex(t => !t.used && t.char.toLowerCase() === char.toLowerCase());
                const target = idx !== -1 ? idx : prev.findIndex(t => !t.used);
                if (target === -1) return prev;
                return prev.map((t, i) => i === target ? { ...t, used: true } : t);
            });
        }, [feedback, typedChars, totalSlots]);

        const handleBackspace = useCallback(() => {
            if (feedback || typedChars.length === 0) return;
            setTypedChars(prev => prev.slice(0, -1));
            setLetterPool(prev => {
                for (let i = prev.length - 1; i >= 0; i--) {
                    if (prev[i].used) {
                        return prev.map((t, j) => j === i ? { ...t, used: false } : t);
                    }
                }
                return prev;
            });
        }, [feedback, typedChars]);

        // Keyboard listener
        useEffect(() => {
            const handler = (e) => {
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    handleBackspace();
                } else if (e.key.length === 1) {
                    handleType(e.key);
                }
            };
            window.addEventListener('keydown', handler);
            return () => window.removeEventListener('keydown', handler);
        }, [handleType, handleBackspace]);

        const handleRetry = () => {
            clearTimeout(advanceTimer.current);
            initExercise(exercises[current]);
        };
        const handleSkip = () => {
            clearTimeout(advanceTimer.current);
            doAdvance(current, exercises);
        };
        const restart = () => {
            clearTimeout(advanceTimer.current);
            setCurrent(0);
            setScore(0);
            setGameState('playing');
            if (exercises.length > 0) initExercise(exercises[0]);
        };

        if (loading) return (
            <div className="min-h-screen-safe w-screen flex items-center justify-center bg-zinc-950">
                <div className="w-12 h-12 border-4 border-violet-500 border-t-transparent rounded-full animate-spin" />
            </div>
        );

        if (gameState === 'victory') return (
            <div className="min-h-screen-safe w-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-center">
                <div className="w-24 h-24 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center mb-6">
                    <Trophy size={48} className="text-amber-500" />
                </div>
                <h2 className="text-3xl font-black text-white mb-2">¡Completado!</h2>
                <p className="text-zinc-400 mb-1 text-lg">
                    Aciertos: <span className="text-emerald-400 font-black">{score}</span>
                    <span className="text-zinc-600"> / {exercises.length}</span>
                </p>
                <p className="text-zinc-600 text-sm mb-10 font-medium">Escribiste {exercises.length} estructuras en inglés.</p>
                <div className="flex flex-col w-full max-w-xs gap-3 pb-safe">
                    <button onClick={restart}
                        className="w-full py-4 bg-violet-500 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-violet-400 transition-all active:scale-95 shadow-lg shadow-violet-500/20 text-sm">
                        Jugar de nuevo
                    </button>
                    <button onClick={goBack} className="w-full py-4 text-zinc-500 font-bold text-sm hover:text-zinc-300 transition-colors">
                        Salir
                    </button>
                </div>
            </div>
        );

        const ex = exercises[current];
        if (!ex) return null;

        const blankPart = getBlankPart(ex);
        const givenPart = getGivenPart(ex);
        const words = blankPart.split(' ');
        const wordSlotStarts = computeWordSlotStarts(blankPart);
        const progress = (current / exercises.length) * 100;

        const slotColor = feedback === 'correct' ? 'text-emerald-400 border-emerald-500'
                        : feedback === 'wrong'   ? 'text-rose-400 border-rose-500'
                        :                          'text-white border-white';
        const emptySlotColor = feedback === 'wrong' ? 'border-rose-800' : 'border-zinc-600';

        return (
            <div className="min-h-screen-safe w-screen flex flex-col bg-zinc-950 overflow-hidden">

                {/* Hidden input for keyboard focus */}
                <input ref={inputRef} className="sr-only" readOnly
                    onFocus={() => {}} style={{ position: 'fixed', left: '-9999px' }} />

                {/* HEADER */}
                <header className="shrink-0 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-4 py-3 z-20"
                        style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                    <div className="flex items-center gap-3">
                        <button onClick={goBack}
                            className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20 active:scale-95 transition-transform">
                            P
                        </button>
                        <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1"/>
                        <div>
                            <h1 className="text-base font-black text-white leading-none tracking-tight">Spell the Phrase</h1>
                            <p className="text-[10px] font-bold uppercase tracking-widest mt-1 text-violet-400">Escribe la estructura</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-3">
                        <div className="flex items-center gap-1.5 text-emerald-500">
                            <CheckCircle2 size={14} />
                            <span className="font-black text-sm tabular-nums">{score}</span>
                        </div>
                        <span className="text-zinc-600 font-bold text-sm tabular-nums">{current + 1}/{exercises.length}</span>
                        <button onClick={restart}
                            className="p-2 text-zinc-600 hover:text-zinc-300 transition-colors rounded-xl hover:bg-zinc-800 active:scale-95">
                            <RefreshCw size={16} />
                        </button>
                    </div>
                </header>

                {/* PROGRESS BAR */}
                <div className="w-full h-1 bg-zinc-900 shrink-0">
                    <div className="h-full bg-violet-500 transition-all duration-500" style={{ width: `${progress}%` }} />
                </div>

                {/* MAIN */}
                <div className="flex-1 flex flex-col items-center w-full max-w-lg mx-auto px-4 py-5 gap-4 min-h-0 overflow-hidden"
                     onClick={() => inputRef.current?.focus()}>

                    {/* SPANISH PROMPT */}
                    <div className="shrink-0 w-full">
                        <p className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 text-center">Traduce al inglés</p>
                        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-center flex flex-col items-center gap-2 shadow-inner">
                            {ex.imageData ? (
                                <img src={ex.imageData} alt="" className="w-16 h-16 rounded-xl object-cover border border-zinc-700" draggable="false" />
                            ) : ex.emoji ? (
                                <span className="text-4xl leading-none select-none">{ex.emoji}</span>
                            ) : null}
                            <p className="text-xl sm:text-2xl font-black text-white leading-snug">{ex.spanish}</p>
                        </div>
                    </div>

                    {/* BLANK AREA */}
                    <div className="shrink-0 w-full" key={shakeKey}>
                        <p className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-3 text-center">Tu respuesta</p>
                        <div className={`flex flex-wrap items-end justify-center gap-x-4 gap-y-2 px-2 py-3 rounded-2xl border transition-colors duration-200
                            ${feedback === 'correct' ? 'border-emerald-500/40 bg-emerald-950/20' :
                              feedback === 'wrong'   ? 'border-rose-500/40 bg-rose-950/20 animate-shake' :
                                                       'border-zinc-800 bg-zinc-900/50'}`}>

                            {/* Blank word groups */}
                            {words.map((word, wi) => (
                                <div key={wi} className="flex gap-1 items-end">
                                    {word.split('').map((_, ci) => {
                                        const si = wordSlotStarts[wi] + ci;
                                        const typed = typedChars[si];
                                        return (
                                            <span key={ci}
                                                className={`letter-slot inline-flex items-center justify-center w-7 h-9 border-b-2 text-sm font-black uppercase
                                                    ${typed ? slotColor : emptySlotColor}`}
                                            >
                                                {typed || ''}
                                            </span>
                                        );
                                    })}
                                </div>
                            ))}

                            {/* Given part */}
                            {givenPart && (
                                <span className="text-zinc-400 font-bold text-base pb-1">{givenPart}</span>
                            )}
                        </div>

                        {/* Feedback label */}
                        <div className={`text-center mt-2 h-4 transition-opacity ${feedback ? 'opacity-100' : 'opacity-0'}`}>
                            {feedback === 'correct' && <span className="text-emerald-400 font-black text-xs uppercase tracking-widest">¡Correcto! ✓</span>}
                            {feedback === 'wrong'   && <span className="text-rose-400 font-black text-xs uppercase tracking-widest">Revisa las letras</span>}
                        </div>
                    </div>

                    {/* LETTER POOL */}
                    <div className="shrink-0 w-full">
                        <p className="text-[10px] font-black uppercase tracking-widest text-zinc-700 mb-2 text-center">Letras disponibles</p>
                        <div className="flex flex-wrap gap-2 justify-center">
                            {letterPool.map(tile => (
                                <button key={tile.id}
                                    onClick={() => tile.used ? handleBackspace() : handleType(tile.char)}
                                    disabled={!!feedback}
                                    className={`letter-tile w-9 h-9 rounded-xl font-black text-base uppercase flex items-center justify-center border
                                        ${tile.used
                                            ? 'bg-zinc-900 border-zinc-800 text-zinc-700 scale-90'
                                            : 'bg-zinc-800 border-zinc-700 text-white hover:bg-zinc-700 active:scale-90'
                                        } disabled:pointer-events-none`}
                                >
                                    {tile.char}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* BACKSPACE hint + action buttons */}
                    <div className="shrink-0 w-full flex flex-col items-center gap-3 pb-safe">
                        {!feedback && typedChars.length > 0 && (
                            <button onClick={handleBackspace}
                                className="flex items-center gap-1.5 px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold text-xs transition-colors slide-up">
                                <Delete size={13} /> Borrar última
                            </button>
                        )}
                        {feedback === 'wrong' && (
                            <div className="flex gap-3 w-full slide-up">
                                <button onClick={handleRetry}
                                    className="flex-1 py-3.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-2xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 border border-zinc-700">
                                    Reintentar
                                </button>
                                <button onClick={handleSkip}
                                    className="flex-1 py-3.5 bg-zinc-900 hover:bg-zinc-800 text-zinc-500 border border-zinc-800 rounded-2xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 flex items-center justify-center gap-1">
                                    Saltar <ChevronRight size={13} />
                                </button>
                            </div>
                        )}
                    </div>

                </div>
            </div>
        );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<SpellThePhraseApp />);
</script>
</body>
</html>

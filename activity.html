<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformar Actividad | Periplo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Play, LayoutGrid, Zap, Puzzle, Grid, ArrowLeft, Copy, Loader2, ListFilter } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from 'firebase/firestore';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Solo los juegos que leen el Vocabulary Bank
        const TEMPLATES = [
            { id: 'FLASHCARDS', name: 'Flashcards', icon: LayoutGrid, file: 'flashcards.html', color: 'text-sky-500' },
            { id: 'CROSSWORD', name: 'Crucigrama', icon: Grid, file: 'crossword.html', color: 'text-emerald-500' },
            { id: 'ANAGRAM', name: 'Anagrama', icon: Puzzle, file: 'anagram.html', color: 'text-rose-500' },
            { id: 'LINGOMATCH', name: 'LingoMatch', icon: ListFilter, file: 'lingomatch.html', color: 'text-indigo-500' }
        ];

        function ActivityTransformer() {
            const [gameData, setGameData] = useState(null);
            const [activeTemplate, setActiveTemplate] = useState(null);
            const [gameId, setGameId] = useState(null);
            const [isCloning, setIsCloning] = useState(false);

            useEffect(() => {
                const id = new URLSearchParams(window.location.search).get('id');
                setGameId(id);
                if (!id) return;

                const fetchGame = async () => {
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameData(data);
                        const currentType = TEMPLATES.find(t => t.id === data.type) || TEMPLATES[0];
                        setActiveTemplate(currentType);
                    }
                };
                fetchGame();
            }, []);

            const cloneActivity = async () => {
                if (!activeTemplate || activeTemplate.id === gameData.type) {
                    alert("Selecciona un formato distinto al actual para clonar.");
                    return;
                }
                
                setIsCloning(true);
                try {
                    const newGameData = { 
                        ...gameData, 
                        type: activeTemplate.id, 
                        title: `${gameData.title} (${activeTemplate.name})`, 
                        parentPath: gameData.parentPath || '', 
                        createdAt: serverTimestamp() 
                    };
                    delete newGameData.id; 
                    
                    await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), newGameData);
                    alert("¡Actividad clonada con éxito! Aparecerá en tu Hub.");
                    window.location.href = 'index.html';
                } catch (e) { 
                    alert("Error al duplicar: " + e.message); 
                    setIsCloning(false);
                }
            };

            if (!gameData || !activeTemplate) return <div className="min-h-screen flex items-center justify-center text-zinc-500 font-black animate-pulse">Cargando Transformador...</div>;

            return (
                <div className="h-screen flex flex-col bg-zinc-950 overflow-hidden">
                    {/* Header Principal */}
                    <header className="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-800 text-zinc-400 hover:text-white rounded-xl transition-colors">
                                <ArrowLeft size={20}/>
                            </button>
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-sm font-black shadow-lg shadow-indigo-600/20">P</div>
                            <div>
                                <h1 className="text-xl font-black text-white leading-none">Cámara de Transformación</h1>
                                <p className="text-[10px] text-zinc-500 uppercase tracking-widest mt-1 font-bold">Origen: {gameData.title}</p>
                            </div>
                        </div>
                        <button 
                            onClick={cloneActivity} 
                            disabled={isCloning || activeTemplate.id === gameData.type}
                            className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-6 py-2.5 rounded-xl font-black uppercase tracking-widest text-xs flex items-center gap-2 transition-all shadow-lg active:scale-95"
                        >
                            {isCloning ? <Loader2 size={16} className="animate-spin"/> : <Copy size={16}/>}
                            Guardar como {activeTemplate.name}
                        </button>
                    </header>

                    {/* Área de Trabajo */}
                    <div className="flex-1 flex overflow-hidden">
                        
                        {/* Menú Lateral de Selección */}
                        <div className="w-64 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col shrink-0 overflow-y-auto">
                            <h3 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4">Selecciona el nuevo motor</h3>
                            <div className="space-y-3">
                                {TEMPLATES.map((t) => (
                                    <button 
                                        key={t.id} 
                                        onClick={() => setActiveTemplate(t)} 
                                        className={`w-full flex items-center gap-3 px-4 py-4 rounded-xl text-left transition-all border ${activeTemplate.id === t.id ? 'bg-zinc-800 border-zinc-700 shadow-md' : 'bg-transparent border-transparent hover:bg-zinc-800/50'}`}
                                    >
                                        <div className={`p-2 rounded-lg bg-zinc-950 ${t.color}`}><t.icon size={20} /></div>
                                        <div>
                                            <span className={`block font-black text-sm ${activeTemplate.id === t.id ? 'text-white' : 'text-zinc-400'}`}>{t.name}</span>
                                            {gameData.type === t.id && <span className="text-[9px] text-zinc-600 uppercase font-bold tracking-widest">Original</span>}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Iframe de Previsualización GIGANTE */}
                        <div className="flex-1 bg-black p-4 relative flex flex-col">
                            <div className="flex justify-between items-center mb-2 px-2">
                                <span className="text-xs font-black text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                                    <Play size={14} className="text-amber-500"/> Live Preview
                                </span>
                                <span className="text-[10px] text-zinc-600 font-bold bg-zinc-900 px-2 py-1 rounded-md">
                                    {activeTemplate.file}?id={gameId}
                                </span>
                            </div>
                            <div className="flex-1 rounded-[2rem] overflow-hidden border border-zinc-800 relative bg-zinc-950 shadow-2xl">
                                <iframe 
                                    src={`${activeTemplate.file}?id=${gameId}`} 
                                    className="absolute inset-0 w-full h-full border-0" 
                                    allow="autoplay"
                                    title="Game Preview"
                                ></iframe>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ActivityTransformer />);
    </script>
</body>
</html>

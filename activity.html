<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Transformar Actividad | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Home, Grid, Type, Layers, BookOpen, Sparkles } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ActivityApp = () => {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if(snap.exists()) {
                            setQuizData(snap.data());
                        } else {
                            alert("Paquete no encontrado");
                        }
                        setLoading(false);
                    });
                } else {
                    setLoading(false);
                }
                return () => unsub();
            }, [quizId]);

            if (loading) return <div className="min-h-screen flex items-center justify-center text-indigo-500 font-black animate-pulse">Cargando Módulos...</div>;
            if (!quizId || !quizData) return <div className="min-h-screen flex items-center justify-center text-rose-500 font-bold p-6 text-center">No se seleccionó ningún paquete válido. Regresa al Hub.</div>;

            const wordCount = (quizData.content?.cards || quizData.content?.pairs || []).length;

            return (
                <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-zinc-950 p-4 sm:p-8 flex flex-col items-center">
                    {/* Header */}
                    <header className="w-full max-w-5xl flex items-center justify-between mb-12">
                        <button onClick={() => window.location.href='index.html'} className="p-3 bg-zinc-800/50 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700/50 backdrop-blur-sm shadow-sm active:scale-95">
                            <Home size={20}/>
                        </button>
                        <div className="text-right">
                            <h1 className="text-xl sm:text-2xl font-black text-white tracking-tight">{quizData.title}</h1>
                            <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mt-1">Transformar Actividad • {wordCount} Palabras</p>
                        </div>
                    </header>

                    {/* Contenido Principal */}
                    <main className="w-full max-w-5xl flex-1 flex flex-col justify-center">
                        <div className="text-center mb-12">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/10 mb-6 border border-indigo-500/20">
                                <Sparkles className="text-indigo-500 w-8 h-8" />
                            </div>
                            <h2 className="text-4xl sm:text-5xl font-black text-white mb-4 tracking-tight">Elige un Formato</h2>
                            <p className="text-zinc-400 text-lg max-w-xl mx-auto">
                                Transforma tu banco de palabras en una experiencia interactiva al instante.
                            </p>
                        </div>

                        {/* GRID DE JUEGOS */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl mx-auto pb-12">

                            {/* 1. FLASHCARDS */}
                            <button
                                onClick={() => window.location.href = `flashcards.html?id=${quizId}`}
                                className="group relative overflow-hidden bg-zinc-900/50 backdrop-blur-sm border border-zinc-800 rounded-3xl p-6 sm:p-8 hover:border-indigo-500/50 transition-all duration-300 text-left w-full shadow-lg hover:shadow-indigo-500/10 active:scale-95 flex flex-col h-full"
                            >
                                <div className="absolute top-0 right-0 p-6 opacity-5 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500 pointer-events-none">
                                    <BookOpen size={120} className="text-indigo-500" />
                                </div>
                                <div className="relative z-10 flex-1 flex flex-col">
                                    <div className="w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mb-6 border border-indigo-500/20 group-hover:bg-indigo-500/20 group-hover:scale-110 transition-all">
                                        <BookOpen className="text-indigo-500 w-7 h-7" />
                                    </div>
                                    <h3 className="text-2xl font-black text-white mb-2 group-hover:text-indigo-400 transition-colors">Flashcards</h3>
                                    <p className="text-zinc-400 text-sm font-medium leading-relaxed mb-6 flex-1">
                                        Repaso directo y efectivo. Tarjetas interactivas con audio para dominar vocabulario rápido.
                                    </p>
                                    <div className="mt-auto flex items-center gap-2">
                                        <span className="text-[10px] font-black uppercase tracking-widest text-indigo-400 bg-indigo-500/10 px-3 py-1 rounded-md">
                                            Modo Estudio
                                        </span>
                                    </div>
                                </div>
                            </button>

                            {/* 2. CRUCIGRAMA */}
                            <button
                                onClick={() => window.location.href = `crossword.html?id=${quizId}`}
                                className="group relative overflow-hidden bg-zinc-900/50 backdrop-blur-sm border border-zinc-800 rounded-3xl p-6 sm:p-8 hover:border-amber-500/50 transition-all duration-300 text-left w-full shadow-lg hover:shadow-amber-500/10 active:scale-95 flex flex-col h-full"
                            >
                                <div className="absolute top-0 right-0 p-6 opacity-5 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500 pointer-events-none">
                                    <Grid size={120} className="text-amber-500" />
                                </div>
                                <div className="relative z-10 flex-1 flex flex-col">
                                    <div className="w-14 h-14 bg-amber-500/10 rounded-2xl flex items-center justify-center mb-6 border border-amber-500/20 group-hover:bg-amber-500/20 group-hover:scale-110 transition-all">
                                        <Grid className="text-amber-500 w-7 h-7" />
                                    </div>
                                    <h3 className="text-2xl font-black text-white mb-2 group-hover:text-amber-400 transition-colors">Crucigrama</h3>
                                    <p className="text-zinc-400 text-sm font-medium leading-relaxed mb-6 flex-1">
                                        Generador automático de cuadrículas cruzadas. Pon a prueba la ortografía de los alumnos.
                                    </p>
                                    <div className="mt-auto flex items-center gap-2">
                                        <span className="text-[10px] font-black uppercase tracking-widest text-amber-500 bg-amber-500/10 px-3 py-1 rounded-md">
                                            15 Palabras Max
                                        </span>
                                    </div>
                                </div>
                            </button>

                            {/* 3. ANAGRAMA */}
                            <button
                                onClick={() => window.location.href = `anagram.html?id=${quizId}`}
                                className="group relative overflow-hidden bg-zinc-900/50 backdrop-blur-sm border border-zinc-800 rounded-3xl p-6 sm:p-8 hover:border-rose-500/50 transition-all duration-300 text-left w-full shadow-lg hover:shadow-rose-500/10 active:scale-95 flex flex-col h-full"
                            >
                                <div className="absolute top-0 right-0 p-6 opacity-5 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500 pointer-events-none">
                                    <Type size={120} className="text-rose-500" />
                                </div>
                                <div className="relative z-10 flex-1 flex flex-col">
                                    <div className="w-14 h-14 bg-rose-500/10 rounded-2xl flex items-center justify-center mb-6 border border-rose-500/20 group-hover:bg-rose-500/20 group-hover:scale-110 transition-all">
                                        <Type className="text-rose-500 w-7 h-7" />
                                    </div>
                                    <h3 className="text-2xl font-black text-white mb-2 group-hover:text-rose-400 transition-colors">Anagrama</h3>
                                    <p className="text-zinc-400 text-sm font-medium leading-relaxed mb-6 flex-1">
                                        Letras desordenadas. Excelente para reforzar la memoria visual y la escritura rápida.
                                    </p>
                                    <div className="mt-auto flex items-center gap-2">
                                        <span className="text-[10px] font-black uppercase tracking-widest text-rose-500 bg-rose-500/10 px-3 py-1 rounded-md">
                                            Modo Práctica
                                        </span>
                                    </div>
                                </div>
                            </button>

                            {/* 4. MEMORAMA */}
                            <button
                                onClick={() => window.location.href = `memorama.html?id=${quizId}`}
                                className="group relative overflow-hidden bg-zinc-900/50 backdrop-blur-sm border border-zinc-800 rounded-3xl p-6 sm:p-8 hover:border-emerald-500/50 transition-all duration-300 text-left w-full shadow-lg hover:shadow-emerald-500/10 active:scale-95 flex flex-col h-full"
                            >
                                <div className="absolute top-0 right-0 p-6 opacity-5 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500 pointer-events-none">
                                    <Layers size={120} className="text-emerald-500" />
                                </div>
                                <div className="relative z-10 flex-1 flex flex-col">
                                    <div className="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center mb-6 border border-emerald-500/20 group-hover:bg-emerald-500/20 group-hover:scale-110 transition-all">
                                        <Layers className="text-emerald-500 w-7 h-7" />
                                    </div>
                                    <h3 className="text-2xl font-black text-white mb-2 group-hover:text-emerald-400 transition-colors">Memorama</h3>
                                    <p className="text-zinc-400 text-sm font-medium leading-relaxed mb-6 flex-1">
                                        El clásico juego de memoria. Encuentra los pares entre inglés y español para dominar el vocabulario.
                                    </p>
                                    <div className="mt-auto flex items-center gap-2">
                                        <span className="text-[10px] font-black uppercase tracking-widest text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-md">
                                            Hasta 25 Pares
                                        </span>
                                    </div>
                                </div>
                            </button>

                        </div>
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ActivityApp />);
    </script>
</body>
</html>

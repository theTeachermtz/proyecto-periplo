<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phone Chat | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; user-select: none; -webkit-user-select: none; overflow: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        .animate-shake { animation: shake 0.35s ease-in-out; }
        @keyframes popIn { 0%{opacity:0;transform:scale(0.9) translateY(10px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
        .animate-pop { animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        @keyframes slideUp { 0%{opacity:0;transform:translateY(16px)} 100%{opacity:1;transform:translateY(0)} }
        .animate-slide-up { animation: slideUp 0.25s ease-out forwards; }
        @keyframes pulse-bar { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .voice-bar { animation: pulse-bar 1.2s ease-in-out infinite; }
        @keyframes pointUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .point-up { animation: pointUp 1s ease-in-out infinite; }
        /* Word input styling */
        .word-input {
            background: transparent;
            border: none;
            border-bottom: 3px solid rgba(255,255,255,0.3);
            outline: none;
            color: white;
            font-weight: 800;
            font-size: 16px;
            text-align: center;
            padding: 4px 6px;
            min-width: 60px;
            max-width: 140px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            caret-color: #a78bfa;
            -webkit-appearance: none;
            border-radius: 0;
        }
        .word-input:focus { border-bottom-color: white; background: rgba(255,255,255,0.05); border-radius: 8px 8px 0 0; }
        .word-input.error { border-bottom-color: #f87171; color: #fca5a5; background: rgba(239,68,68,0.1); border-radius: 8px 8px 0 0; }
        .word-input.hinted { border-bottom-color: rgba(251,191,36,0.5); color: #fbbf24; opacity: 0.85; cursor: not-allowed; }
        .word-input.correct { border-bottom-color: rgba(52,211,153,0.5); color: #6ee7b7; }
    </style>
</head>
<body class="text-zinc-100 h-[100dvh]">
    <div id="root" class="h-full"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from 'firebase/firestore';
        import confetti from 'canvas-confetti';
        import { Loader2, Volume2, Lightbulb, ArrowLeft, Trophy, ChevronRight, Star, RotateCcw, Play, Eye, CheckSquare, Square } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const stripEmoji = (s) => s.replace(/[\u{1F600}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1FA00}-\u{1FAFF}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}\u{E0020}-\u{E007F}]/gu, '').trim();
        const speak = (text, lang='en-US', rate=0.85, onEnd) => {
            if(!window.speechSynthesis) { if(onEnd) onEnd(); return; }
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(stripEmoji(text)); u.lang=lang; u.rate=rate; u.pitch=1;
            const voices = window.speechSynthesis.getVoices();
            const v = voices.find(v=>v.lang.startsWith(lang.split('-')[0])&&v.name.includes('Google')) || voices.find(v=>v.lang.startsWith(lang.split('-')[0]));
            if(v) u.voice=v;
            if(onEnd) u.onend = onEnd;
            window.speechSynthesis.speak(u);
        };
        if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}

        const pickUserEmoji = (t) => {
            const l=t.toLowerCase();
            if(/thank|thanks/.test(l)) return ' 🙏'; if(/please/.test(l)) return ' 🤝';
            if(/hello|hi |hey/.test(l)) return ' 👋'; if(/bye|goodbye|see you/.test(l)) return ' 👋';
            if(/sorry/.test(l)) return ' 😅'; if(/love|amazing|great|awesome/.test(l)) return ' 😍';
            if(/yes|sure|of course/.test(l)) return ' 👍'; if(/food|eat|hungry|dinner/.test(l)) return ' 🍽️';
            if(/happy|glad|excited/.test(l)) return ' 😊'; if(/work|job|office/.test(l)) return ' 💼';
            const r=[' 💬',' ✨','','','']; return r[Math.floor(Math.random()*r.length)];
        };

        const guessContact = (cf) => {
            if(!cf||cf.length===0) return{name:'Teacher',emoji:'🧑‍🏫'};
            const t=cf.map(c=>(c.botMessage||'')+(c.expectedAnswer||'')).join(' ').toLowerCase();
            const p=[{k:['boss','manager','meeting','deadline','office'],n:'Boss',e:'👔'},{k:['doctor','appointment','health','hospital'],n:'Dr. Smith',e:'🩺'},{k:['waiter','menu','order','restaurant','food','bill'],n:'Server',e:'🍽️'},{k:['bartender','bar','cocktail','beer'],n:'Bartender',e:'🍸'},{k:['friend','party','hang out','movie','weekend','bro'],n:'Best Friend',e:'😎'},{k:['mom','mother','mama','family'],n:'Mom',e:'👩‍🦱'},{k:['dad','father','papa'],n:'Dad',e:'👨‍🦳'},{k:['grandma','grandmother','abuela'],n:'Grandma',e:'👵'},{k:['hotel','reservation','room','check in'],n:'Hotel Staff',e:'🏨'},{k:['store','buy','price','shopping'],n:'Cashier',e:'🛒'},{k:['teacher','class','homework','school'],n:'Teacher',e:'📚'},{k:['taxi','uber','driver','ride','airport'],n:'Driver',e:'🚕'},{k:['interview','hire','resume','job'],n:'Interviewer',e:'💼'}];
            for(const x of p) if(x.k.some(k=>t.includes(k))) return{name:x.n,emoji:x.e};
            return{name:'Chat Partner',emoji:'💬'};
        };

        // Voice note component
        const VoiceNote = ({text, onPlay, isPlaying}) => (
            <div className="flex items-center gap-2 bg-zinc-700/50 rounded-2xl px-3 py-2.5 max-w-[220px]">
                <button onClick={onPlay} className="w-9 h-9 rounded-full bg-emerald-500 flex items-center justify-center text-white flex-shrink-0 active:scale-90 transition-transform">
                    {isPlaying?<div className="w-2.5 h-2.5 bg-white rounded-sm"/>:<Play size={15} fill="white"/>}
                </button>
                <div className="flex-1 flex items-center gap-[2px] h-5 overflow-hidden">
                    {[...Array(16)].map((_,i)=>(<div key={i} className={`w-[3px] rounded-full bg-emerald-400 ${isPlaying?'voice-bar':''}`} style={{height:`${Math.random()*60+30}%`,animationDelay:`${i*0.08}s`,opacity:isPlaying?undefined:0.4}}/>))}
                </div>
                <span className="text-[10px] text-zinc-400 font-bold flex-shrink-0">0:{String(Math.ceil(text.length/14)).padStart(2,'0')}</span>
            </div>
        );

        // ====== ACTIVE BUBBLE — WORD BY WORD ======
        // The answer is split into words. The student types each word in its own input.
        // Scoring: each correctly typed word (without hint) = 1 point.
        // Blind bonus: +50% extra points if transcript was never revealed before submission.
        // Hint: reveals that word's letters — word scores 0.
        // Wrong attempt on a word: shake + no score penalty (just no bonus for blind if they peek later).
        const ActiveBubble = ({data, onNext, setTotalScore, isTutorial, transcriptVisible, botPlayClicked}) => {

            // Build word list from expectedAnswer (preserve punctuation attached to words)
            const wordList = useMemo(() => {
                // Split on spaces, keep each token as a "word"
                return data.expectedAnswer.trim().split(/\s+/).filter(Boolean);
            }, [data.expectedAnswer]);

            const totalWords = wordList.length;
            const LISTEN_BONUS = Math.ceil(totalWords * 0.5); // 50% extra if no transcript peeked

            // Per-word state
            const [inputs, setInputs] = useState(() => Array(totalWords).fill(''));
            // 'idle' | 'error' | 'correct' per word
            const [wordStatus, setWordStatus] = useState(() => Array(totalWords).fill('idle'));
            const [hintedWords, setHintedWords] = useState(() => Array(totalWords).fill(false));
            const [phase, setPhase] = useState('waiting'); // waiting | typing | correct
            const [showHintPicker, setShowHintPicker] = useState(false);
            const [stepScore, setStepScore] = useState(0);
            const [tutStep, setTutStep] = useState(isTutorial ? 0 : -1);
            const [tutPlayClicked, setTutPlayClicked] = useState(false);
            const [activeWord, setActiveWord] = useState(0); // which word is focused

            const inputRefs = useRef([]);
            const userEmoji = useMemo(() => pickUserEmoji(data.expectedAnswer), [data.expectedAnswer]);

            // Tutorial: track when bot audio played
            useEffect(() => {
                if(botPlayClicked && tutStep === 0 && !tutPlayClicked) setTutPlayClicked(true);
            }, [botPlayClicked, tutStep]);

            useEffect(() => {
                if(tutStep === 1) startTyping();
            }, [tutStep]);

            const startTyping = () => {
                setPhase('typing');
                setTimeout(() => { if(inputRefs.current[0]) inputRefs.current[0].focus(); }, 300);
            };

            // Normalize: strip punctuation at edges for comparison
            const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9']/g, '');

            const checkWord = (idx, value) => {
                const typed = normalize(value);
                const expected = normalize(wordList[idx]);
                return typed === expected;
            };

            const handleInputChange = (idx, val) => {
                const ni = [...inputs]; ni[idx] = val; setInputs(ni);
                // Clear error on change
                const ws = [...wordStatus]; ws[idx] = 'idle'; setWordStatus(ws);
            };

            const handleWordSubmit = (idx) => {
                if(hintedWords[idx]) {
                    // Already hinted, just move to next
                    focusNext(idx); return;
                }
                if(!inputs[idx].trim()) return;
                if(checkWord(idx, inputs[idx])) {
                    const ws = [...wordStatus]; ws[idx] = 'correct'; setWordStatus(ws);
                    // Check if all words done
                    const allDone = ws.every((s, i) => s === 'correct' || hintedWords[i]);
                    if(allDone) {
                        finishAnswer(ws);
                    } else {
                        focusNext(idx);
                    }
                } else {
                    // Wrong
                    const ws = [...wordStatus]; ws[idx] = 'error'; setWordStatus(ws);
                    setTimeout(() => {
                        const ws2 = [...wordStatus]; ws2[idx] = 'idle'; setWordStatus(ws2);
                    }, 600);
                }
            };

            const focusNext = (idx) => {
                for(let i = idx + 1; i < totalWords; i++) {
                    if(!hintedWords[i] && wordStatus[i] !== 'correct') {
                        if(inputRefs.current[i]) { inputRefs.current[i].focus(); setActiveWord(i); return; }
                    }
                }
                // Try to find any unfinished word
                for(let i = 0; i < totalWords; i++) {
                    if(!hintedWords[i] && wordStatus[i] !== 'correct') {
                        if(inputRefs.current[i]) { inputRefs.current[i].focus(); setActiveWord(i); return; }
                    }
                }
            };

            // Also handle Enter key
            const handleKeyDown = (idx, e) => {
                if(e.key === 'Enter') { e.preventDefault(); handleWordSubmit(idx); }
            };

            const finishAnswer = (finalWordStatus) => {
                // Count correctly typed words (not hinted)
                const correctCount = finalWordStatus.filter((s, i) => s === 'correct' && !hintedWords[i]).length;
                let earned = correctCount;
                if(!transcriptVisible) earned += LISTEN_BONUS; // blind bonus
                setStepScore(earned);
                setTotalScore(prev => prev + earned);
                setPhase('correct');
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
                setTimeout(() => speak(data.expectedAnswer, 'en-US', 0.85), 600);
            };

            // Check if all words answered (to auto-finish when last hinted word is revealed)
            useEffect(() => {
                if(phase !== 'typing') return;
                const allDone = wordStatus.every((s, i) => s === 'correct' || hintedWords[i]);
                if(allDone && wordList.length > 0 && (wordStatus.some(s => s === 'correct') || hintedWords.some(Boolean))) {
                    finishAnswer(wordStatus);
                }
            }, [hintedWords, wordStatus, phase]);

            const handleHint = (idx) => {
                const nh = [...hintedWords]; nh[idx] = true; setHintedWords(nh);
                const ni = [...inputs]; ni[idx] = wordList[idx]; setInputs(ni);
                const ws = [...wordStatus]; ws[idx] = 'correct'; setWordStatus(ws);
                setShowHintPicker(false);
                // Check if all done after hint
                const allDone = ws.every((s, wi) => s === 'correct' || nh[wi]);
                if(allDone) { setTimeout(() => finishAnswer(ws), 150); }
                else focusNext(idx);
            };

            // ====== TUTORIAL TOOLTIPS ======
            const renderTutorial = () => {
                if(tutStep < 0) return null;
                return (
                    <div className="w-full flex justify-center mt-2 z-[60]">
                        <div className="bg-zinc-900 border border-zinc-700 rounded-2xl p-5 max-w-sm w-full shadow-2xl animate-slide-up text-left">
                            {tutStep === 0 && !tutPlayClicked && (<>
                                <div className="text-center mb-2 point-up text-2xl">☝️</div>
                                <h3 className="text-base font-black text-white mb-1.5">🎧 Escucha la nota de voz</h3>
                                <p className="text-zinc-300 text-sm leading-relaxed">Dale play al botón verde para escuchar la pregunta.</p>
                            </>)}
                            {tutStep === 0 && tutPlayClicked && (<>
                                <h3 className="text-base font-black text-white mb-1.5">🎧 ¡Bien! Ya escuchaste</h3>
                                <p className="text-zinc-300 text-sm leading-relaxed mb-4">Ahora intenta responder. Escribe cada palabra en su casilla y presiona Enter (o toca ✓) para confirmarla.</p>
                                <button onClick={() => setTutStep(1)} className="w-full bg-indigo-600 text-white font-black py-3 rounded-xl text-sm active:scale-95">Siguiente →</button>
                            </>)}
                            {tutStep === 1 && (<>
                                <div className="text-center mb-2 point-up text-2xl">☝️</div>
                                <h3 className="text-base font-black text-white mb-1.5">✍️ Palabra por palabra</h3>
                                <p className="text-zinc-300 text-sm leading-relaxed mb-4">Escribe cada palabra y confirma con Enter. Si necesitas ayuda usa el botón 💡 (pero esa palabra no dará puntos).</p>
                                <button onClick={() => setTutStep(-1)} className="w-full bg-indigo-600 text-white font-black py-3 rounded-xl text-sm active:scale-95">¡Entendido!</button>
                            </>)}
                        </div>
                    </div>
                );
            };

            // ====== WAITING ======
            if(phase === 'waiting') return (
                <div className="flex flex-col items-end w-full space-y-2 animate-pop">
                    <div className="w-[95%] sm:w-[88%] bg-indigo-600 p-4 rounded-2xl rounded-tr-sm">
                        <button onClick={startTyping} className="w-full bg-white text-indigo-700 font-black py-2.5 rounded-xl text-sm flex items-center justify-center gap-1.5 active:scale-95">
                            ✍️ Responder
                        </button>
                    </div>
                    {renderTutorial()}
                </div>
            );

            // ====== CORRECT ======
            if(phase === 'correct') return (
                <div className="flex flex-col items-end w-full space-y-2 animate-pop">
                    <div className="w-[95%] sm:w-[88%] bg-emerald-600 p-4 rounded-2xl rounded-tr-sm">
                        <p className="text-white font-bold text-base sm:text-lg leading-relaxed">{data.expectedAnswer}{userEmoji}</p>
                        <div className="flex items-center gap-2 mt-3 flex-wrap">
                            <button onClick={() => speak(data.expectedAnswer, 'en-US', 0.85)} className="bg-white/20 hover:bg-white/30 text-white p-2 rounded-full"><Volume2 size={16}/></button>
                            <div className="flex items-center gap-1 bg-white/20 px-3 py-1.5 rounded-full"><Star size={13} className="text-amber-300"/><span className="text-white font-black text-sm">+{stepScore}</span></div>
                            {!transcriptVisible && <span className="text-emerald-200 text-[10px] font-bold bg-white/10 px-2 py-1 rounded-full">👂 Bonus</span>}
                        </div>
                        <div className="mt-4 text-right">
                            <button onClick={onNext} className="bg-white text-emerald-700 font-black py-2.5 px-6 rounded-xl shadow-lg text-sm uppercase tracking-wider flex items-center gap-1 ml-auto active:scale-95">
                                Enviar <ChevronRight size={16}/>
                            </button>
                        </div>
                    </div>
                </div>
            );

            // ====== TYPING ======
            return (
                <div className="flex flex-col items-end w-full space-y-2 animate-pop">
                    {/* Spanish hint only when transcript visible */}
                    {transcriptVisible && (
                        <div className="flex items-center gap-2 mr-2 flex-wrap justify-end">
                            <span className="text-base font-bold text-amber-400 bg-amber-500/10 px-4 py-2 rounded-xl border border-amber-500/20">💡 {data.userHint}</span>
                        </div>
                    )}
                    {/* Blind bonus indicator */}
                    {!transcriptVisible && (
                        <div className="flex items-center gap-2 mr-2">
                            <span className="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1.5 rounded-full border border-emerald-500/20">👂 +{LISTEN_BONUS} bonus sin ver</span>
                        </div>
                    )}

                    <div className={`w-[95%] sm:w-[88%] bg-indigo-600 p-4 rounded-2xl rounded-tr-sm`}>
                        {/* Word inputs */}
                        <div className="flex flex-wrap gap-x-3 gap-y-4 justify-start">
                            {wordList.map((word, idx) => {
                                const isHinted = hintedWords[idx];
                                const status = wordStatus[idx];
                                // Width hint: approx chars
                                const approxWidth = Math.max(60, Math.min(140, word.replace(/[^a-zA-Z]/g,'').length * 14 + 20));
                                return (
                                    <div key={idx} className="flex flex-col items-center gap-1">
                                        <div className="relative">
                                            <input
                                                ref={el => inputRefs.current[idx] = el}
                                                type="text"
                                                value={inputs[idx]}
                                                disabled={isHinted || status === 'correct'}
                                                autoComplete="off" autoCorrect="off" autoCapitalize="none" spellCheck="false"
                                                onChange={e => handleInputChange(idx, e.target.value)}
                                                onKeyDown={e => handleKeyDown(idx, e)}
                                                onFocus={() => setActiveWord(idx)}
                                                className={`word-input ${isHinted ? 'hinted' : status === 'error' ? 'error animate-shake' : status === 'correct' ? 'correct' : ''}`}
                                                style={{ width: approxWidth, fontSize: '16px' }}
                                                placeholder={isHinted ? '' : '···'}
                                            />
                                            {/* Checkmark button */}
                                            {!isHinted && status !== 'correct' && (
                                                <button
                                                    onClick={() => handleWordSubmit(idx)}
                                                    className="absolute -right-7 top-1/2 -translate-y-1/2 text-white/40 hover:text-white active:scale-90 transition-all text-lg font-black"
                                                    style={{lineHeight:1}}
                                                >✓</button>
                                            )}
                                            {status === 'correct' && !isHinted && (
                                                <span className="absolute -right-5 top-1/2 -translate-y-1/2 text-emerald-300 text-sm">✓</span>
                                            )}
                                        </div>
                                        {/* Word length hint: number of letters */}
                                        <span className="text-[10px] text-white/30 font-bold">
                                            {word.replace(/[^a-zA-Z]/g,'').length} letras
                                        </span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Hint button */}
                        <div className="mt-4 flex items-center gap-2 flex-wrap">
                            <button
                                onClick={() => setShowHintPicker(!showHintPicker)}
                                className="bg-amber-500/15 hover:bg-amber-500/25 text-amber-300 px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1.5 border border-amber-500/20"
                            >
                                <Lightbulb size={13}/> Pista por palabra
                            </button>
                            <span className="text-indigo-300/40 text-[9px] font-bold">No suma pts</span>
                        </div>

                        {showHintPicker && (
                            <div className="mt-2 flex flex-wrap gap-2 animate-slide-up">
                                {wordList.map((word, idx) => {
                                    const done = hintedWords[idx] || wordStatus[idx] === 'correct';
                                    return (
                                        <button key={idx} disabled={done} onClick={() => handleHint(idx)}
                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${done ? 'bg-zinc-700/50 text-zinc-500 border-zinc-700' : 'bg-amber-500/10 text-amber-300 border-amber-500/20 hover:bg-amber-500/20 active:scale-95'}`}>
                                            {done ? word : `"${word.replace(/./g, '·')}" (${word.replace(/[^a-zA-Z]/g,'').length})`}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    {renderTutorial()}
                </div>
            );
        };

        // ====== MAIN APP ======
        const App = () => {
            const [chatFlow, setChatFlow] = useState([]);
            const [gameTitle, setGameTitle] = useState('');
            const [currentStep, setCurrentStep] = useState(0);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [totalScore, setTotalScore] = useState(0);
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');
            const [quizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [screen, setScreen] = useState('name');
            const [playerName, setPlayerName] = useState('');
            const [rememberChoice, setRememberChoice] = useState(true);
            const [showTutorial, setShowTutorial] = useState(false);
            const [leaderboard, setLeaderboard] = useState([]);
            const [scoreSaved, setScoreSaved] = useState(false);
            const [transcriptVisible, setTranscriptVisible] = useState(false);
            const [isPlayingBot, setIsPlayingBot] = useState(false);
            const [botPlayClicked, setBotPlayClicked] = useState(false);

            const messagesEndRef = useRef(null);

            useEffect(() => {
                const load = async () => {
                    if(!quizId) { setError("Falta el ID."); setLoading(false); return; }
                    try {
                        const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId));
                        // ← BUG FIX: Cierra el if con } antes del else
                        if(snap.exists()) {
                            const d = snap.data();
                            setGameTitle(d.title || 'Chat');
                            setChatFlow(d.content?.flow || d.content || []);
                        } else {
                            setError("Juego no encontrado.");
                        }
                        const q = query(collection(db, `artifacts/periplo-app-v1/quizzes/${quizId}/chat-leaderboard`), orderBy('score', 'desc'), limit(5));
                        const lbSnap = await getDocs(q);
                        setLeaderboard(lbSnap.docs.map(d => d.data()));
                    } catch(e) { setError(e.message); }
                    setLoading(false);
                };
                load();
            }, [quizId]);

            const contact = useMemo(() => guessContact(chatFlow), [chatFlow]);
            useEffect(() => { setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 200); }, [currentStep]);

            const handleNext = () => {
                if(currentStep < chatFlow.length) {
                    setCurrentStep(prev => prev + 1);
                    setTranscriptVisible(false);
                    setIsPlayingBot(false);
                    setBotPlayClicked(false);
                }
            };

            const goToGame = (played) => {
                if(rememberChoice && played) localStorage.setItem(`periplo-chat-played-${quizId}`, 'yes');
                setShowTutorial(!played);
                setScreen('game');
            };

            const goBackToName = () => { setScreen('name'); setCurrentStep(0); setTotalScore(0); setScoreSaved(false); setTranscriptVisible(false); };

            const isComplete = screen === 'game' && currentStep === chatFlow.length && chatFlow.length > 0;

            useEffect(() => {
                if(isComplete && !scoreSaved && playerName) {
                    addDoc(collection(db, `artifacts/periplo-app-v1/quizzes/${quizId}/chat-leaderboard`), { playerName, score: totalScore, date: serverTimestamp() }).then(() => {
                        setScoreSaved(true);
                        const q = query(collection(db, `artifacts/periplo-app-v1/quizzes/${quizId}/chat-leaderboard`), orderBy('score', 'desc'), limit(5));
                        getDocs(q).then(s => setLeaderboard(s.docs.map(d => d.data())));
                    });
                }
            }, [isComplete, scoreSaved]);

            const playCurrentBot = () => {
                const d = chatFlow[currentStep];
                if(!d) return;
                setIsPlayingBot(true);
                setBotPlayClicked(true);
                speak(d.botMessage, 'en-US', 0.85, () => setIsPlayingBot(false));
                const est = Math.max(2000, d.botMessage.length * 75);
                setTimeout(() => setIsPlayingBot(false), est);
            };

            useEffect(() => {
                if(screen === 'game' && !showTutorial && currentStep < chatFlow.length) {
                    setTimeout(() => playCurrentBot(), 400);
                }
            }, [currentStep, screen]);

            if(loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={40}/></div>;
            if(error) return (
                <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 p-6">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 text-center max-w-sm">
                        <p className="text-rose-400 font-bold mb-2">Error</p>
                        <p className="text-zinc-400 text-sm mb-6">{error}</p>
                        <button onClick={() => window.location.href='index.html'} className="bg-zinc-800 text-white font-bold px-6 py-2 rounded-xl">Volver</button>
                    </div>
                </div>
            );

            // NAME SCREEN
            if(screen === 'name') return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-4 bg-zinc-950 overflow-auto">
                    <div className="max-w-sm w-full my-auto">
                        <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] p-6 shadow-2xl text-center">
                            <div className="w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center text-3xl mx-auto mb-4">{contact.emoji}</div>
                            <h1 className="text-2xl font-black text-white mb-1">{gameTitle}</h1>
                            <p className="text-zinc-500 text-sm font-medium mb-6">Practica con {contact.name}</p>
                            {leaderboard.length > 0 && (
                                <div className="mb-6 space-y-2">
                                    <div className="flex items-center gap-2 justify-center mb-2"><Trophy size={16} className="text-amber-400"/><span className="text-amber-400 font-black text-xs uppercase tracking-widest">Top Scores</span></div>
                                    {leaderboard.map((l, i) => (
                                        <div key={i} className="flex items-center justify-between bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5">
                                            <div className="flex items-center gap-2"><span className={`font-black text-sm ${i===0?'text-amber-400':i===1?'text-zinc-400':'text-zinc-600'}`}>#{i+1}</span><span className="font-bold text-white text-sm uppercase">{l.playerName}</span></div>
                                            <div className="flex items-center gap-1"><Star size={12} className="text-amber-400"/><span className="font-black text-amber-400 text-sm">{l.score}</span></div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <input type="text" placeholder="Tu nombre..." value={playerName} onChange={e => setPlayerName(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && playerName.trim() && (localStorage.getItem(`periplo-chat-played-${quizId}`) === 'yes' ? goToGame(true) : setScreen('askPlayed'))}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center text-lg font-bold text-white mb-4 outline-none focus:border-indigo-500" style={{fontSize:'16px'}}/>
                            <button disabled={!playerName.trim()} onClick={() => {
                                if(localStorage.getItem(`periplo-chat-played-${quizId}`) === 'yes') goToGame(true);
                                else setScreen('askPlayed');
                            }} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-zinc-800 disabled:text-zinc-600 text-white font-black py-3.5 rounded-xl shadow-lg active:scale-95 uppercase tracking-widest text-sm">Continuar</button>
                        </div>
                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-4 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest block mx-auto">Volver al Hub</button>}
                    </div>
                </div>
            );

            // ASK PLAYED SCREEN
            if(screen === 'askPlayed') return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-4 bg-zinc-950 overflow-auto">
                    <div className="max-w-sm w-full my-auto">
                        <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] p-6 shadow-2xl text-center">
                            <div className="text-5xl mb-4">🎮</div>
                            <h2 className="text-xl font-black text-white mb-2">¿Ya has jugado antes?</h2>
                            <p className="text-zinc-400 text-sm mb-6">Si es tu primera vez te mostramos cómo funciona.</p>
                            <div className="space-y-3 mb-6">
                                <button onClick={() => goToGame(true)} className="w-full bg-indigo-600 text-white font-black py-3.5 rounded-xl text-sm uppercase tracking-widest active:scale-95">Sí, ya sé cómo</button>
                                <button onClick={() => goToGame(false)} className="w-full bg-zinc-800 text-zinc-200 font-black py-3.5 rounded-xl text-sm uppercase tracking-widest active:scale-95 border border-zinc-700">No, muéstrame</button>
                            </div>
                            <button onClick={() => setRememberChoice(!rememberChoice)} className="flex items-center gap-2 mx-auto text-zinc-500 text-xs font-bold hover:text-zinc-300">
                                {rememberChoice ? <CheckSquare size={16} className="text-indigo-400"/> : <Square size={16}/>} Recordar mi respuesta
                            </button>
                        </div>
                    </div>
                </div>
            );

            // GAME SCREEN
            const currentData = chatFlow[currentStep];

            return (
                <div className="h-[100dvh] flex flex-col bg-zinc-950 max-w-lg mx-auto sm:my-4 sm:rounded-[2rem] sm:border sm:border-zinc-800 sm:shadow-2xl overflow-hidden sm:h-[calc(100dvh-2rem)]">
                    {/* Header */}
                    <header className="bg-zinc-900 px-4 py-3 flex items-center justify-between shrink-0 border-b border-zinc-800">
                        <div className="flex items-center gap-3">
                            <button onClick={goBackToName} className="p-2 text-zinc-500 hover:text-white rounded-xl"><ArrowLeft size={18}/></button>
                            <div className="w-10 h-10 rounded-full bg-indigo-600/20 flex items-center justify-center text-xl border border-indigo-500/30 relative">
                                {contact.emoji}
                                <div className="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 rounded-full border-2 border-zinc-900"/>
                            </div>
                            <div><h1 className="font-black text-white text-sm leading-none">{contact.name}</h1><p className="text-[10px] text-zinc-500 font-bold mt-0.5">{gameTitle}</p></div>
                        </div>
                        <div className="flex items-center gap-1.5 bg-amber-500/10 border border-amber-500/30 px-3 py-1.5 rounded-full">
                            <Star size={14} className="text-amber-400"/>
                            <span className="text-amber-400 font-black text-sm tabular-nums">{totalScore}</span>
                        </div>
                    </header>

                    {/* Messages */}
                    <div className="flex-1 overflow-y-auto px-4 py-4 space-y-5 custom-scrollbar">
                        {chatFlow.slice(0, currentStep + 1).map((data, index) => {
                            const isCurrent = index === currentStep && !isComplete;
                            const isDone = index < currentStep;
                            const isFirstTutorial = showTutorial && index === 0 && isCurrent;

                            return (
                                <div key={data.id || index} className="space-y-3 animate-pop">
                                    {/* NPC bubble */}
                                    <div className="flex w-full gap-2">
                                        <div className="w-7 h-7 rounded-full bg-indigo-600/20 flex items-center justify-center text-sm shrink-0 mt-auto border border-indigo-500/20">{contact.emoji}</div>
                                        {isDone ? (
                                            <div className="bg-zinc-800 text-zinc-200 px-4 py-3 rounded-2xl rounded-bl-sm border border-zinc-700/50 max-w-[82%]">
                                                <p className="text-sm leading-relaxed">{data.botMessage}</p>
                                                <button onClick={() => speak(data.botMessage, 'en-US', 0.85)} className="mt-1.5 text-indigo-400 hover:text-indigo-300 flex items-center gap-1 text-[11px] font-bold"><Volume2 size={12}/> Escuchar</button>
                                            </div>
                                        ) : (
                                            <div className="bg-zinc-800 px-4 py-3 rounded-2xl rounded-bl-sm border border-zinc-700/50 max-w-[82%] space-y-2">
                                                <VoiceNote text={data.botMessage} onPlay={playCurrentBot} isPlaying={isPlayingBot}/>
                                                {!transcriptVisible ? (
                                                    <button onClick={() => setTranscriptVisible(true)} className="text-zinc-500 hover:text-zinc-300 text-xs font-bold flex items-center gap-1">
                                                        <Eye size={12}/> Ver transcripción
                                                    </button>
                                                ) : (
                                                    <div className="bg-zinc-700/40 rounded-xl p-3 border border-zinc-600/30 animate-slide-up">
                                                        <p className="text-zinc-200 text-sm leading-relaxed">{data.botMessage}</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    {/* User response */}
                                    {isCurrent ? (
                                        <ActiveBubble
                                            data={data}
                                            onNext={handleNext}
                                            setTotalScore={setTotalScore}
                                            isTutorial={isFirstTutorial}
                                            transcriptVisible={transcriptVisible}
                                            botPlayClicked={botPlayClicked}
                                        />
                                    ) : isDone ? (
                                        <div className="flex flex-col items-end w-full space-y-1">
                                            <div className="bg-indigo-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%]">
                                                <p className="text-sm font-medium leading-relaxed">{data.expectedAnswer}{pickUserEmoji(data.expectedAnswer)}</p>
                                                <button onClick={() => speak(data.expectedAnswer, 'en-US', 0.85)} className="mt-1 text-indigo-200 hover:text-white flex items-center gap-1 text-[11px] font-bold ml-auto"><Volume2 size={12}/> Repetir</button>
                                            </div>
                                        </div>
                                    ) : null}
                                </div>
                            );
                        })}

                        {/* Completion card */}
                        {isComplete && (
                            <div className="text-center py-6 animate-pop">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-xs mx-auto">
                                    <Trophy size={36} className="text-amber-400 mx-auto mb-3"/>
                                    <h2 className="text-lg font-black text-white mb-1">¡Chat Completado!</h2>
                                    <div className="flex items-center justify-center gap-2 mb-4">
                                        <Star size={16} className="text-amber-400"/>
                                        <span className="text-2xl font-black text-amber-400">{totalScore}</span>
                                        <span className="text-zinc-500 text-sm font-bold">pts</span>
                                    </div>
                                    {leaderboard.length > 0 && (
                                        <div className="mb-4 space-y-1.5">
                                            {leaderboard.slice(0,3).map((l,i) => (
                                                <div key={i} className="flex justify-between bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs">
                                                    <span className="font-bold text-zinc-300">{i===0?'🥇':i===1?'🥈':'🥉'} {l.playerName}</span>
                                                    <span className="font-black text-amber-400">{l.score}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <button onClick={() => window.location.reload()} className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2 mb-2">
                                        <RotateCcw size={14}/> Jugar de nuevo
                                    </button>
                                    <button onClick={goBackToName} className="w-full bg-zinc-800 text-zinc-400 font-bold py-2.5 rounded-xl text-sm">Volver</button>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef}/>
                    </div>

                    {/* Fake input bar */}
                    {!isComplete && (
                        <div className="bg-zinc-900 px-4 py-3 border-t border-zinc-800 flex items-center gap-3 shrink-0">
                            <div className="flex-1 bg-zinc-800 rounded-full h-10 px-4 flex items-center border border-zinc-700/50">
                                <span className="text-zinc-500 text-sm">Escribe arriba...</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>

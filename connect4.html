<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connect 4 Game | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh; user-select: none; -webkit-user-select: none;}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .token-drop { animation: drop 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes drop { from { transform: translateY(-500px); } to { transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, serverTimestamp } from 'firebase/firestore';
        import { Trophy, HelpCircle, Brain, Target, CheckCircle2, XCircle, ArrowRight, LogOut, Loader2, Users, SkipForward, RotateCcw, Timer, Pencil, Link2, AlertTriangle, Mic, Headphones, Wifi } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const shuffleArray = (array) => {
            if (!array) return [];
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [newArray[i], newArray[j]] = [newArray[j], newArray[i]]; }
            return newArray;
        };

        const fireConfetti = () => { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'] }); };

        const CountdownBar = ({ duration, onTimeUp, isActive }) => {
            const [timeLeft, setTimeLeft] = useState(duration);
            useEffect(() => { 
                if (!isActive) return; 
                if (timeLeft <= 0) { onTimeUp(); return; } 
                const timerId = setInterval(() => setTimeLeft(t => t - 1), 1000); 
                return () => clearInterval(timerId); 
            }, [timeLeft, isActive, onTimeUp]);
            
            const percentage = (timeLeft / duration) * 100;
            let color = 'bg-green-500';
            let animation = '';
            if (timeLeft <= 15) { color = 'bg-red-500'; animation = 'animate-pulse'; } 
            else if (timeLeft <= 30) color = 'bg-yellow-400';
            return <div className="w-full bg-slate-200 dark:bg-zinc-800 h-3 rounded-t-[2.5rem] overflow-hidden relative"><div className={`h-full ${color} ${animation} transition-all duration-1000 ease-linear`} style={{ width: `${percentage}%` }}></div></div>;
        };

        // =========================================================================
        // LOBBY Y MULTIJUGADOR
        // =========================================================================
        const LobbyScreen = ({ isTeacher, onCreateRoom, onJoinRoom, onLocalPlay }) => {
            const [code, setCode] = useState('');
            return (
                <div className="fixed inset-0 bg-slate-900 dark:bg-zinc-950 z-50 flex flex-col items-center justify-center p-4 animate-in">
                    <div className="text-center mb-12"><h1 className="text-5xl md:text-7xl font-black text-white mb-4 tracking-tight uppercase drop-shadow-lg">Connect 4</h1></div>
                    
                    {isTeacher ? (
                        <div className="bg-slate-800 dark:bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full border border-slate-700 dark:border-zinc-800 flex flex-col gap-4">
                            <h2 className="text-2xl font-black text-center mb-4 flex items-center justify-center gap-2"><Users className="text-blue-400"/> Modo Maestro</h2>
                            <button onClick={() => onCreateRoom('red')} className="btn-juicy bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl border-blue-800 flex items-center justify-center gap-2"><Wifi size={20}/> Crear Sala Online (Rojo)</button>
                            <button onClick={() => onCreateRoom('yellow')} className="btn-juicy bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl border-blue-800 flex items-center justify-center gap-2"><Wifi size={20}/> Crear Sala Online (Amarillo)</button>
                            <div className="h-px bg-slate-700 my-2"></div>
                            <button onClick={onLocalPlay} className="btn-juicy bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl border-slate-900">Jugar Local (1 Dispositivo)</button>
                        </div>
                    ) : (
                        <div className="bg-slate-800 dark:bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full border border-slate-700 dark:border-zinc-800">
                            <h2 className="text-xl font-black text-center mb-6 text-blue-400 uppercase tracking-widest">Ingresa a la Sala</h2>
                            <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="CÓDIGO DE 4 DÍGITOS" className="w-full bg-slate-950 border-2 border-slate-700 rounded-xl p-4 text-center text-2xl sm:text-3xl font-black text-white outline-none focus:border-blue-500 mb-4 tracking-widest" maxLength={4}/>
                            <button onClick={() => onJoinRoom(code)} disabled={code.length !== 4} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:bg-slate-700 text-white font-black py-4 rounded-xl border-blue-800 disabled:border-slate-900 flex items-center justify-center gap-2">Unirse al Juego <ArrowRight size={20}/></button>
                        </div>
                    )}
                </div>
            );
        };

        // =========================================================================
        // MINIJUEGOS AUTO-EVALUADOS (6 TIPOS)
        // =========================================================================
        const MultipleChoiceChallenge = ({ data, onComplete, onFail, onSuccess, canInteract }) => {
            const [selected, setSelected] = useState(null);
            const [status, setStatus] = useState('playing');
            const handleSelect = (idx) => { 
                if (status !== 'playing' || !canInteract) return; 
                setSelected(idx); 
                if (idx === data.correct) { setStatus('correct'); onSuccess(); fireConfetti(); } 
                else { setStatus('wrong'); onFail(); } 
            };
            return (
                <div className="w-full text-center relative">
                    {!canInteract && status === 'playing' && <div className="absolute inset-0 bg-white/60 dark:bg-black/60 z-10 flex items-center justify-center backdrop-blur-[2px] rounded-2xl"><span className="bg-slate-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    <div className="flex justify-center mb-4"><div className="bg-indigo-100 dark:bg-indigo-900/30 p-3 rounded-full"><HelpCircle className="w-8 h-8 text-indigo-600 dark:text-indigo-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Elige la correcta</h3>
                    <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-6 font-medium text-lg text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">{data.question}</div>
                    <div className="grid gap-3 mb-6">{data.options.map((opt, idx) => (<button key={idx} onClick={() => handleSelect(idx)} disabled={status !== 'playing' || !canInteract} className={`p-4 rounded-2xl border-2 font-bold text-left transition-all text-lg flex items-center justify-between ${status === 'playing' ? 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 hover:border-indigo-400 text-slate-600 dark:text-zinc-300' : idx === data.correct ? 'bg-green-100 border-green-500 text-green-800' : selected === idx ? 'bg-red-100 border-red-500 text-red-800' : 'opacity-30'}`}>{opt}{status !== 'playing' && idx === data.correct && <CheckCircle2/>}{status === 'wrong' && selected === idx && <XCircle/>}</button>))}</div>
                    {canInteract && status === 'correct' && <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black text-lg hover:bg-green-500 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {canInteract && status === 'wrong' && <button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 transition-all animate-in">Perder Turno</button>}
                </div>
            );
        };

        const DragDropChallenge = ({ data, onComplete, onFail, onSuccess, canInteract }) => {
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [status, setStatus] = useState('playing');
            const handleSelect = (opt) => {
                if (status !== 'playing' || !canInteract) return;
                setSelectedOpt(opt);
                if (opt === data.correct) { setStatus('correct'); onSuccess(); fireConfetti(); }
                else { setStatus('wrong'); onFail(); }
            };
            return (
                <div className="w-full text-center relative">
                    {!canInteract && status === 'playing' && <div className="absolute inset-0 bg-white/60 dark:bg-black/60 z-10 flex items-center justify-center backdrop-blur-[2px] rounded-2xl"><span className="bg-slate-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    <div className="flex justify-center mb-4"><div className="bg-rose-100 dark:bg-rose-900/30 p-3 rounded-full"><Target className="w-8 h-8 text-rose-600 dark:text-rose-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Completa la Frase</h3>
                    <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-8 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.sentence.split('[BLANK]').map((part, i, arr) => (
                            <React.Fragment key={i}>
                                {part}
                                {i < arr.length - 1 && <span className={`inline-block min-w-[100px] border-b-4 border-dashed pb-1 mx-2 text-center font-black ${status==='correct'?'text-green-500 border-green-500':status==='wrong'?'text-red-500 border-red-500':'text-indigo-500 border-indigo-300 dark:border-indigo-700'}`}>{selectedOpt || '_____'}</span>}
                            </React.Fragment>
                        ))}
                    </div>
                    {status === 'playing' && (
                        <div className="flex flex-wrap justify-center gap-3 mb-6">
                            {shuffleArray([...data.options]).map((opt, i) => (
                                <button key={i} onClick={() => handleSelect(opt)} disabled={!canInteract} className="bg-slate-100 dark:bg-zinc-800 border-2 border-slate-200 dark:border-zinc-700 hover:border-indigo-400 px-6 py-3 rounded-xl font-bold text-lg transition-colors">{opt}</button>
                            ))}
                        </div>
                    )}
                    {canInteract && status === 'correct' && <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {canInteract && status === 'wrong' && <button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">Perder Turno</button>}
                </div>
            );
        };

        const UnscrambleChallenge = ({ data, onComplete, onFail, onSuccess, canInteract }) => {
            const [shuffledWords, setShuffledWords] = useState([]);
            const [selectedWords, setSelectedWords] = useState([]);
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (data && data.text) {
                    const wordsWithIds = data.text.split(' ').map((w, i) => ({ id: i, text: w }));
                    setShuffledWords(shuffleArray(wordsWithIds));
                    setSelectedWords([]); setStatus('playing');
                }
            }, [data]);

            const checkAnswer = () => {
                const built = selectedWords.map(w => w.text).join(" ");
                const normalize = (str) => str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s{2,}/g," ").trim().toLowerCase();
                if (normalize(built) === normalize(data.text)) { setStatus('correct'); onSuccess(); fireConfetti(); } 
                else { setStatus('wrong'); onFail(); }
            };

            return (
                <div className="w-full text-center relative">
                    {!canInteract && status === 'playing' && <div className="absolute inset-0 bg-white/60 dark:bg-black/60 z-10 flex items-center justify-center backdrop-blur-[2px] rounded-2xl"><span className="bg-slate-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    <div className="flex justify-center mb-4"><div className="bg-amber-100 dark:bg-amber-900/30 p-3 rounded-full"><Brain className="w-8 h-8 text-amber-600 dark:text-amber-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Ordena la Frase</h3>
                    <div className="bg-slate-50 dark:bg-zinc-900 p-3 rounded-xl border border-slate-100 dark:border-zinc-800 mb-6 inline-block"><p className="text-slate-500 dark:text-zinc-400 font-medium italic">"{data.translation}"</p></div>
                    
                    <div className={`min-h-[80px] h-auto bg-white dark:bg-zinc-950 rounded-2xl p-4 mb-4 flex flex-wrap gap-2 justify-center content-center border-2 transition-colors ${status === 'correct' ? 'border-green-500 bg-green-50 dark:bg-green-900/20' : status === 'wrong' ? 'border-red-500 bg-red-50 dark:bg-red-900/20' : 'border-slate-200 dark:border-zinc-800 shadow-inner'}`}>
                        {selectedWords.map(w => (
                            <button key={w.id} onClick={() => { if (status !== 'playing' || !canInteract) return; setShuffledWords([...shuffledWords, w]); setSelectedWords(selectedWords.filter(sw => sw.id !== w.id)); }} className="bg-white dark:bg-zinc-800 border border-slate-300 dark:border-zinc-600 px-4 py-2 rounded-lg font-bold text-slate-700 dark:text-zinc-200 shadow-sm hover:bg-slate-50 dark:hover:bg-zinc-700 transition-colors animate-in">{w.text}</button>
                        ))}
                    </div>
                    
                    <div className="flex flex-wrap gap-2 justify-center mb-6 min-h-[60px]">
                        {status === 'playing' && shuffledWords.map(w => (
                            <button key={w.id} onClick={() => { if(!canInteract)return; setSelectedWords([...selectedWords, w]); setShuffledWords(shuffledWords.filter(sw => sw.id !== w.id)); }} className="bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 border border-slate-200 dark:border-zinc-700 px-4 py-2 rounded-lg font-bold hover:bg-slate-200 dark:hover:bg-zinc-700 hover:text-slate-800 dark:hover:text-white transition-colors animate-in">{w.text}</button>
                        ))}
                    </div>

                    {canInteract && status === 'correct' && (<button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">COLOCAR FICHA <ArrowRight/></button>)}
                    {canInteract && status === 'wrong' && (<div className="animate-in"><div className="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 p-4 rounded-xl mb-4"><p className="text-red-600 dark:text-red-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/> Incorrecto</p><p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">{data.text}</p></div><button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700">Perder Turno</button></div>)}
                    {canInteract && status === 'playing' && (<button onClick={checkAnswer} disabled={shuffledWords.length === 0} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50">COMPROBAR</button>)}
                </div>
            );
        };

        const FillBlankChallenge = ({ data, onComplete, onFail, onSuccess, canInteract }) => {
            const [input, setInput] = useState('');
            const [status, setStatus] = useState('playing');
            
            const checkAnswer = () => {
                const normalize = (str) => str.trim().toLowerCase();
                if (normalize(input) === normalize(data.answer)) { setStatus('correct'); onSuccess(); fireConfetti(); }
                else { setStatus('wrong'); onFail(); }
            };

            return (
                <div className="w-full text-center relative">
                    {!canInteract && status === 'playing' && <div className="absolute inset-0 bg-white/60 dark:bg-black/60 z-10 flex items-center justify-center backdrop-blur-[2px] rounded-2xl"><span className="bg-slate-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    <div className="flex justify-center mb-4"><div className="bg-emerald-100 dark:bg-emerald-900/30 p-3 rounded-full"><Pencil className="w-8 h-8 text-emerald-600 dark:text-emerald-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Escribe la Palabra</h3>
                    <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-4 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.sentence.replace('[BLANK]', '_____')}
                    </div>
                    {data.hint && <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6 italic">Pista: {data.hint}</p>}
                    
                    {status === 'playing' && (
                        <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&canInteract&&checkAnswer()} disabled={!canInteract} className="w-full text-center text-2xl font-black p-4 rounded-xl border-2 border-indigo-300 focus:border-indigo-500 bg-indigo-50 dark:bg-zinc-800 dark:border-zinc-700 dark:focus:border-indigo-500 outline-none mb-6" placeholder="Escribe aquí..."/>
                    )}

                    {canInteract && status === 'correct' && <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {canInteract && status === 'wrong' && (<div className="animate-in"><div className="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 p-4 rounded-xl mb-4"><p className="text-red-600 dark:text-red-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/> Incorrecto</p><p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">{data.answer}</p></div><button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">Perder Turno</button></div>)}
                    {canInteract && status === 'playing' && (<button onClick={checkAnswer} disabled={!input.trim()} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50">COMPROBAR</button>)}
                </div>
            );
        };

        const MatchingChallenge = ({ data, onComplete, onFail, onSuccess, canInteract }) => {
            const [pairs, setPairs] = useState([]);
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [matched, setMatched] = useState(new Set());
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (data && data.pairs) {
                    const l = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.left})));
                    const r = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.right})));
                    setPairs({ left: l, right: r });
                }
            }, [data]);

            const handleRightClick = (rightId) => {
                if(selectedLeft === null || status !== 'playing' || !canInteract) return;
                if(selectedLeft === rightId) {
                    const newMatched = new Set(matched).add(selectedLeft);
                    setMatched(newMatched);
                    setSelectedLeft(null);
                    if(newMatched.size === data.pairs.length) { setStatus('correct'); onSuccess(); fireConfetti(); }
                } else {
                    setStatus('wrong'); onFail();
                }
            };

            if(!pairs.left) return null;

            return (
                <div className="w-full text-center relative">
                    {!canInteract && status === 'playing' && <div className="absolute inset-0 bg-white/60 dark:bg-black/60 z-10 flex items-center justify-center backdrop-blur-[2px] rounded-2xl"><span className="bg-slate-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    <div className="flex justify-center mb-4"><div className="bg-cyan-100 dark:bg-cyan-900/30 p-3 rounded-full"><Link2 className="w-8 h-8 text-cyan-600 dark:text-cyan-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Une las parejas</h3>
                    
                    <div className="flex gap-4 mb-6">
                        <div className="flex-1 space-y-2">
                            {pairs.left.map(item => {
                                const isMatched = matched.has(item.id);
                                const isSel = selectedLeft === item.id;
                                return <button key={`l-${item.id}`} onClick={() => !isMatched && status==='playing' && canInteract && setSelectedLeft(item.id)} disabled={isMatched || status!=='playing' || !canInteract} className={`btn-juicy w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-100 border-zinc-200 text-zinc-300 dark:bg-zinc-900 dark:border-zinc-800 dark:text-zinc-600' : isSel ? 'bg-indigo-100 border-indigo-500 text-indigo-700' : 'bg-white border-slate-200 hover:border-indigo-300 dark:bg-zinc-800 dark:border-zinc-700 dark:hover:border-indigo-500'}`}>{item.text}</button>
                            })}
                        </div>
                        <div className="flex-1 space-y-2">
                            {pairs.right.map(item => {
                                const isMatched = matched.has(item.id);
                                return <button key={`r-${item.id}`} onClick={() => handleRightClick(item.id)} disabled={isMatched || status!=='playing' || !canInteract} className={`btn-juicy w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-100 border-zinc-200 text-zinc-300 dark:bg-zinc-900 dark:border-zinc-800 dark:text-zinc-600' : 'bg-white border-slate-200 hover:border-indigo-300 dark:bg-zinc-800 dark:border-zinc-700 dark:hover:border-indigo-500'}`}>{item.text}</button>
                            })}
                        </div>
                    </div>

                    {canInteract && status === 'correct' && <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {canInteract && status === 'wrong' && <button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">¡Error! Perder Turno</button>}
                </div>
            );
        };

        const ErrorCorrectionChallenge = ({ data, onComplete, onFail, onSuccess, canInteract }) => {
            const [input, setInput] = useState('');
            const [status, setStatus] = useState('playing');
            
            const checkAnswer = () => {
                const normalize = (str) => str.trim().toLowerCase();
                if (normalize(input) === normalize(data.correction)) { setStatus('correct'); onSuccess(); fireConfetti(); }
                else { setStatus('wrong'); onFail(); }
            };

            return (
                <div className="w-full text-center relative">
                    {!canInteract && status === 'playing' && <div className="absolute inset-0 bg-white/60 dark:bg-black/60 z-10 flex items-center justify-center backdrop-blur-[2px] rounded-2xl"><span className="bg-slate-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    <div className="flex justify-center mb-4"><div className="bg-pink-100 dark:bg-pink-900/30 p-3 rounded-full"><AlertTriangle className="w-8 h-8 text-pink-600 dark:text-pink-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Corrige el Error</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Encuentra la palabra incorrecta y escribe la corrección.</p>
                    
                    <div className="bg-rose-50 dark:bg-rose-900/10 border-2 border-rose-200 dark:border-rose-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.sentence}
                    </div>
                    
                    {status === 'playing' && (
                        <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&canInteract&&checkAnswer()} disabled={!canInteract} className="w-full text-center text-xl font-black p-4 rounded-xl border-2 border-indigo-300 focus:border-indigo-500 bg-white dark:bg-zinc-800 dark:border-zinc-700 dark:focus:border-indigo-500 outline-none mb-6" placeholder="Escribe la palabra correcta..."/>
                    )}

                    {canInteract && status === 'correct' && <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {canInteract && status === 'wrong' && (<div className="animate-in"><div className="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 p-4 rounded-xl mb-4"><p className="text-red-600 dark:text-red-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/> Incorrecto</p><p className="text-slate-800 dark:text-zinc-200 font-bold text-sm">El error era: <span className="text-red-500 line-through">{data.error}</span></p><p className="text-slate-800 dark:text-zinc-200 font-bold text-lg mt-1">La corrección es: <span className="text-green-500">{data.correction}</span></p></div><button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">Perder Turno</button></div>)}
                    {canInteract && status === 'playing' && (<button onClick={checkAnswer} disabled={!input.trim()} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50 shadow-lg">COMPROBAR</button>)}
                </div>
            );
        };

        // =========================================================================
        // MINIJUEGOS MANUALES (EL MAESTRO EVALÚA)
        // =========================================================================

        const SpeakingChallenge = ({ data, onComplete, onFail, onSuccess, isHost }) => {
            const [status, setStatus] = useState('playing');
            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-blue-100 dark:bg-blue-900/30 p-3 rounded-full"><Mic className="w-8 h-8 text-blue-600 dark:text-blue-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Traducción Oral</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Traduce esta frase en voz alta. Tu maestro evaluará tu respuesta.</p>
                    <div className="bg-blue-50 dark:bg-blue-900/20 border-2 border-blue-100 dark:border-blue-900/50 p-8 rounded-[2rem] mb-8 shadow-sm"><p className="text-2xl font-black text-slate-800 dark:text-zinc-200 leading-tight">"{data.spanish}"</p></div>
                    
                    {isHost && (
                        <div className="bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl mb-8 border border-slate-200 dark:border-zinc-800 group cursor-help relative overflow-hidden">
                            <p className="text-[10px] text-slate-400 font-bold uppercase mb-2">Respuesta Esperada (Solo Maestro)</p>
                            <p className="font-bold text-slate-800 dark:text-zinc-100 text-lg text-transparent blur-[3px] group-hover:blur-none group-hover:text-slate-800 dark:group-hover:text-zinc-100 transition-all duration-300 select-none">{data.english}</p>
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-white/80 dark:bg-black/80 px-2 py-1 rounded text-xs font-bold text-slate-500 dark:text-zinc-300">Hover para ver</span></div>
                        </div>
                    )}
                    
                    {status === 'playing' ? (
                        isHost ? (
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => { setStatus('wrong'); onFail(); }} className="btn-juicy py-4 rounded-2xl bg-white dark:bg-zinc-800 border-2 border-red-100 dark:border-red-900/50 text-red-500 dark:text-red-400 font-black hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">INCORRECTO</button>
                                <button onClick={() => { setStatus('correct'); onSuccess(); fireConfetti(); }} className="btn-juicy py-4 rounded-2xl bg-green-500 border-green-700 text-white font-black shadow-lg hover:bg-green-600 transition-all">¡CORRECTO!</button>
                            </div>
                        ) : (
                            <div className="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl text-center text-amber-600 dark:text-amber-400 font-bold animate-pulse border border-amber-200 dark:border-amber-800/50">Esperando la evaluación del maestro...</div>
                        )
                    ) : status === 'correct' && isHost ? (
                        <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>
                    ) : status === 'wrong' && isHost ? (
                        <button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">Perder Turno</button>
                    ) : null}
                </div>
            );
        };

        const ListeningChallenge = ({ data, onComplete, onFail, onSuccess, isHost }) => {
            const [status, setStatus] = useState('playing');
            
            const playAudio = () => {
                const utterance = new SpeechSynthesisUtterance(data.audioText);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-purple-100 dark:bg-purple-900/30 p-3 rounded-full"><Headphones className="w-8 h-8 text-purple-600 dark:text-purple-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Listening</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Escucha el audio y responde o traduce. El maestro evaluará.</p>
                    
                    <button onClick={playAudio} className="btn-juicy mb-8 bg-purple-600 hover:bg-purple-500 text-white border-purple-800 font-black px-8 py-4 rounded-full shadow-md flex items-center gap-2 mx-auto transition-colors text-lg">
                        ▶️ Reproducir Audio
                    </button>
                    
                    <div className="bg-purple-50 dark:bg-purple-900/10 border-2 border-purple-200 dark:border-purple-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.question}
                    </div>
                    
                    {isHost && (
                        <div className="bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl mb-8 border border-slate-200 dark:border-zinc-800 group cursor-help relative overflow-hidden">
                            <p className="text-[10px] text-slate-400 font-bold uppercase mb-2">Transcripción / Respuesta (Solo Maestro)</p>
                            <p className="font-bold text-slate-800 dark:text-zinc-100 text-lg text-transparent blur-[3px] group-hover:blur-none group-hover:text-slate-800 dark:group-hover:text-zinc-100 transition-all duration-300 select-none">{data.audioText} <br/><br/> <span className="text-sm text-purple-500">{data.answer}</span></p>
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-white/80 dark:bg-black/80 px-2 py-1 rounded text-xs font-bold text-slate-500 dark:text-zinc-300">Hover para ver</span></div>
                        </div>
                    )}
                    
                    {status === 'playing' ? (
                        isHost ? (
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => { setStatus('wrong'); onFail(); }} className="btn-juicy py-4 rounded-2xl bg-white dark:bg-zinc-800 border-2 border-red-100 dark:border-red-900/50 text-red-500 dark:text-red-400 font-black hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">INCORRECTO</button>
                                <button onClick={() => { setStatus('correct'); onSuccess(); fireConfetti(); }} className="btn-juicy py-4 rounded-2xl bg-green-500 border-green-700 text-white font-black shadow-lg hover:bg-green-600 transition-all">¡CORRECTO!</button>
                            </div>
                        ) : (
                            <div className="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl text-center text-amber-600 dark:text-amber-400 font-bold animate-pulse border border-amber-200 dark:border-amber-800/50">Esperando la evaluación del maestro...</div>
                        )
                    ) : status === 'correct' && isHost ? (
                        <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>
                    ) : status === 'wrong' && isHost ? (
                        <button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">Perder Turno</button>
                    ) : null}
                </div>
            );
        };

        const RoleplayChallenge = ({ data, onComplete, onFail, onSuccess, isHost }) => {
            const [status, setStatus] = useState('playing');
            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-orange-100 dark:bg-orange-900/30 p-3 rounded-full"><Users className="w-8 h-8 text-orange-600 dark:text-orange-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Roleplay</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Lee la situación y actúa la respuesta en inglés.</p>
                    
                    <div className="bg-orange-50 dark:bg-orange-900/20 border-2 border-orange-100 dark:border-orange-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.situation}
                    </div>
                    
                    {isHost && (
                        <div className="bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl mb-8 border border-slate-200 dark:border-zinc-800 group cursor-help relative overflow-hidden">
                            <p className="text-[10px] text-slate-400 font-bold uppercase mb-2">Sugerencia (Solo Maestro)</p>
                            <p className="font-bold text-slate-800 dark:text-zinc-100 text-lg text-transparent blur-[3px] group-hover:blur-none group-hover:text-slate-800 dark:group-hover:text-zinc-100 transition-all duration-300 select-none">{data.expected}</p>
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-white/80 dark:bg-black/80 px-2 py-1 rounded text-xs font-bold text-slate-500 dark:text-zinc-300">Hover para ver</span></div>
                        </div>
                    )}
                    
                    {status === 'playing' ? (
                        isHost ? (
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => { setStatus('wrong'); onFail(); }} className="btn-juicy py-4 rounded-2xl bg-white dark:bg-zinc-800 border-2 border-red-100 dark:border-red-900/50 text-red-500 dark:text-red-400 font-black hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">INCORRECTO</button>
                                <button onClick={() => { setStatus('correct'); onSuccess(); fireConfetti(); }} className="btn-juicy py-4 rounded-2xl bg-green-500 border-green-700 text-white font-black shadow-lg hover:bg-green-600 transition-all">¡CORRECTO!</button>
                            </div>
                        ) : (
                            <div className="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl text-center text-amber-600 dark:text-amber-400 font-bold animate-pulse border border-amber-200 dark:border-amber-800/50">Esperando la evaluación del maestro...</div>
                        )
                    ) : status === 'correct' && isHost ? (
                        <button onClick={() => onComplete(true)} className="btn-juicy w-full bg-green-600 text-white py-4 rounded-xl border-green-800 font-black flex justify-center items-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>
                    ) : status === 'wrong' && isHost ? (
                        <button onClick={() => onComplete(false)} className="btn-juicy w-full bg-slate-800 text-white py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700 animate-in">Perder Turno</button>
                    ) : null}
                </div>
            );
        };

        // =========================================================================
        // CONTROLADOR DEL MODAL
        // =========================================================================
        const ChallengeModal = ({ type, data, onComplete, isHost, myColor, currentPlayer }) => {
            const [timeIsUp, setTimeIsUp] = useState(false);
            const [challengeStatus, setChallengeStatus] = useState('playing');
            
            const isTeacherGraded = ['speaking', 'listening', 'roleplay'].includes(type);
            const canInteract = myColor === null ? true : (isTeacherGraded ? isHost : currentPlayer === myColor);

            const handleTimeUp = () => { setTimeIsUp(true); setChallengeStatus('failed'); };
            const handleFail = () => { setChallengeStatus('failed'); };
            const handleSuccess = () => { setChallengeStatus('success'); };
            const handleComplete = (success) => { onComplete(success); };
            const handleSkip = () => { if(isHost || myColor === null) onComplete(true); }; 

            return (
                <div className="fixed inset-0 bg-slate-900/90 dark:bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in">
                    <div className="bg-white dark:bg-zinc-950 w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-zinc-800 flex flex-col max-h-[90vh]">
                        {!isTeacherGraded && <CountdownBar duration={60} onTimeUp={handleTimeUp} isActive={challengeStatus === 'playing'} />}
                        
                        <div className="p-6 flex justify-between items-start bg-slate-50 dark:bg-zinc-900 border-b border-slate-100 dark:border-zinc-800 shrink-0">
                            <div><span className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-1 block">Desafío</span><h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 capitalize">{type.replace(/([A-Z])/g, ' $1').trim()}</h3></div>
                            <div className="flex flex-col items-end gap-2">
                                {!isTeacherGraded && <div className="flex items-center gap-1 text-slate-400 font-bold text-xs"><Timer size={14}/> 60s</div>}
                                {challengeStatus === 'playing' && (isHost || myColor === null) && <button onClick={handleSkip} className="text-slate-400 hover:text-green-500 font-bold text-xs uppercase flex items-center gap-1 bg-white dark:bg-zinc-800 border dark:border-zinc-700 px-3 py-1.5 rounded-full transition-colors">Saltar (Aceptar) <SkipForward size={14}/></button>}
                            </div>
                        </div>
                        <div className="p-8 overflow-y-auto">
                            {timeIsUp ? (
                                <div className="text-center animate-in"><div className="text-red-500 mb-4"><Timer size={64} className="mx-auto"/></div><h2 className="text-3xl font-black text-slate-800 dark:text-white mb-2">¡Tiempo Agotado!</h2><p className="text-slate-500 mb-8">Te tardaste demasiado.</p>{canInteract && <button onClick={() => onComplete(false)} className="btn-juicy bg-slate-800 text-white px-8 py-4 rounded-xl border-slate-950 font-bold hover:bg-slate-700">Perder Turno</button>}</div>
                            ) : (
                                <>
                                    {type === 'multipleChoice' && <MultipleChoiceChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} canInteract={canInteract} />}
                                    {type === 'dragDrop' && <DragDropChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} canInteract={canInteract} />}
                                    {type === 'unscramble' && <UnscrambleChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} canInteract={canInteract} />}
                                    {type === 'fillBlank' && <FillBlankChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} canInteract={canInteract} />}
                                    {type === 'matching' && <MatchingChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} canInteract={canInteract} />}
                                    {type === 'errorCorrection' && <ErrorCorrectionChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} canInteract={canInteract} />}
                                    {type === 'speaking' && <SpeakingChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} isHost={isHost || myColor===null} />}
                                    {type === 'listening' && <ListeningChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} isHost={isHost || myColor===null} />}
                                    {type === 'roleplay' && <RoleplayChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} isHost={isHost || myColor===null} />}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const GameBoard = () => {
            const [stage, setStage] = useState('loading');
            const [gameData, setGameData] = useState(null);
            const [originalContent, setOriginalContent] = useState({});
            const [activePools, setActivePools] = useState({});
            
            const [roomId, setRoomId] = useState(null);
            const [isHost, setIsHost] = useState(false);
            const [myColor, setMyColor] = useState(null); 

            const emptyBoard = Array(6).fill(null).map(() => Array(7).fill(null));
            const [board, setBoard] = useState(emptyBoard);
            const [currentPlayer, setCurrentPlayer] = useState('red');
            const [winner, setWinner] = useState(null);
            const [modal, setModal] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        const params = new URLSearchParams(window.location.search);
                        const id = params.get('id');
                        if (id) {
                            const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                            if (snap.exists()) {
                                setGameData(snap.data());
                                setOriginalContent(snap.data().content);
                                setStage('lobby');
                            } else { throw new Error("Juego no encontrado"); }
                        } else {
                            setStage('lobby');
                        }
                    } catch (e) { alert(e.message); window.location.href='index.html'; }
                };
                init();
            }, []);

            useEffect(() => {
                if (!roomId) return;
                const unsub = onSnapshot(doc(db, 'artifacts/periplo-app-v1/rooms', roomId), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setBoard(data.board);
                        setCurrentPlayer(data.turn);
                        setWinner(data.winner);
                        setModal(data.activeChallenge);
                        
                        if (isHost && data.guestJoined && stage === 'waiting_guest') {
                            fillPools(originalContent);
                            setStage('playing');
                        }
                    }
                });
                return () => unsub();
            }, [roomId, isHost, stage, originalContent]);

            const fillPools = (contentData) => {
                const newPools = {};
                Object.keys(contentData).forEach(key => {
                    if (Array.isArray(contentData[key]) && contentData[key].length > 0) {
                        newPools[key] = shuffleArray(contentData[key]);
                    }
                });
                setActivePools(newPools);
            };

            const syncState = async (updates) => {
                if (roomId) {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/rooms', roomId), updates);
                } else {
                    if (updates.board !== undefined) setBoard(updates.board);
                    if (updates.turn !== undefined) setCurrentPlayer(updates.turn);
                    if (updates.activeChallenge !== undefined) setModal(updates.activeChallenge);
                    if (updates.winner !== undefined) setWinner(updates.winner);
                }
            };

            const handleLocalPlay = () => {
                setRoomId(null);
                setMyColor(null);
                setIsHost(true);
                fillPools(originalContent);
                setStage('playing');
            };

            const handleCreateRoom = async (color) => {
                const code = Math.floor(1000 + Math.random() * 9000).toString();
                const roomRef = doc(db, 'artifacts/periplo-app-v1/rooms', code);
                await setDoc(roomRef, {
                    gameId: new URLSearchParams(window.location.search).get('id'),
                    board: emptyBoard,
                    turn: 'red',
                    winner: null,
                    activeChallenge: null,
                    hostColor: color,
                    guestJoined: false,
                    createdAt: serverTimestamp()
                });
                setRoomId(code);
                setIsHost(true);
                setMyColor(color);
                setStage('waiting_guest');
            };

            const handleJoinRoom = async (code) => {
                setStage('loading');
                const roomRef = doc(db, 'artifacts/periplo-app-v1/rooms', code);
                const snap = await getDoc(roomRef);
                if (snap.exists()) {
                    const data = snap.data();
                    const guestColor = data.hostColor === 'red' ? 'yellow' : 'red';
                    
                    const gameSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', data.gameId));
                    const gameDataContent = gameSnap.data().content;
                    setGameData(gameSnap.data());
                    setOriginalContent(gameDataContent);
                    fillPools(gameDataContent);

                    await updateDoc(roomRef, { guestJoined: true });
                    
                    setRoomId(code);
                    setIsHost(false);
                    setMyColor(guestColor);
                    setStage('playing');
                } else {
                    alert("Sala no encontrada o código incorrecto.");
                    setStage('lobby');
                }
            };

            const resetGame = () => {
                fillPools(originalContent);
                syncState({ board: emptyBoard, turn: 'red', winner: null, activeChallenge: null });
            };

            const calculateMaxConnection = (boardState, r, c, player) => {
                const directions = [[0, 1], [1, 0], [1, 1], [1, -1]]; let maxLen = 1;
                directions.forEach(([dr, dc]) => {
                    let count = 1; let i = 1;
                    while(true) { const nr = r + dr * i, nc = c + dc * i; if(nr>=0 && nr<6 && nc>=0 && nc<7 && boardState[nr][nc] === player) { count++; i++; } else break; }
                    i = 1;
                    while(true) { const nr = r - dr * i, nc = c - dc * i; if(nr>=0 && nr<6 && nc>=0 && nc<7 && boardState[nr][nc] === player) { count++; i++; } else break; }
                    if(count > maxLen) maxLen = count;
                });
                return maxLen;
            };

            const getQuestion = () => {
                const availableTypes = Object.keys(activePools).filter(k => activePools[k].length > 0);
                if (availableTypes.length === 0) {
                    fillPools(originalContent);
                    const resetTypes = Object.keys(originalContent).filter(k => Array.isArray(originalContent[k]) && originalContent[k].length > 0);
                    const randomType = resetTypes[Math.floor(Math.random() * resetTypes.length)];
                    const question = originalContent[randomType][0];
                    return { type: randomType, data: question };
                }
                const randomType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                const question = activePools[randomType][0];
                setActivePools(prev => ({ ...prev, [randomType]: prev[randomType].slice(1) }));
                return { type: randomType, data: question };
            };

            const handleColumnClick = (col) => {
                if (winner || modal || stage !== 'playing') return;
                if (roomId && currentPlayer !== myColor) return;

                let row = -1;
                for (let r = 5; r >= 0; r--) { if (!board[r][col]) { row = r; break; } }
                if (row === -1) return;
                
                const tempBoard = board.map(r => [...r]);
                tempBoard[row][col] = currentPlayer;
                const connectionLen = calculateMaxConnection(tempBoard, row, col, currentPlayer);
                const pendingMove = { r: row, c: col };
                
                if (connectionLen >= 2 && connectionLen < 4) {
                    const q = getQuestion();
                    syncState({ activeChallenge: { type: q.type, data: q.data, pendingMove } });
                } else {
                    commitMove(row, col, tempBoard);
                }
            };

            const commitMove = (r, c, optionalBoard) => {
                const newBoard = optionalBoard || board.map(row => [...row]);
                newBoard[r][c] = currentPlayer;
                
                if (calculateMaxConnection(newBoard, r, c, currentPlayer) >= 4) { 
                    fireConfetti(); 
                    syncState({ board: newBoard, winner: currentPlayer, activeChallenge: null });
                } else { 
                    syncState({ board: newBoard, turn: currentPlayer === 'red' ? 'yellow' : 'red', activeChallenge: null });
                }
            };

            const handleChallengeComplete = (success) => {
                if (success) commitMove(modal.pendingMove.r, modal.pendingMove.c);
                else syncState({ turn: currentPlayer === 'red' ? 'yellow' : 'red', activeChallenge: null });
            };

            if (stage === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-900 dark:bg-zinc-950 text-white"><Loader2 className="animate-spin mr-3" size={40}/> Cargando...</div>;
            if (stage === 'lobby') return <LobbyScreen isTeacher={!!gameData} onCreateRoom={handleCreateRoom} onLocalPlay={handleLocalPlay} onJoinRoom={handleJoinRoom} />;
            if (stage === 'waiting_guest') return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 dark:bg-zinc-950 text-white animate-in"><Wifi size={64} className="text-blue-400 mb-6 animate-pulse"/><h2 className="text-3xl font-black mb-2">Sala Creada</h2><p className="text-slate-400 mb-8">Pídele a tu alumno que ingrese a connect4.html y use este código:</p><div className="bg-slate-950 border-2 border-blue-500/50 px-12 py-6 rounded-2xl text-6xl font-black tracking-[0.2em]">{roomId}</div></div>;

            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden font-sans relative">
                    <div className="bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0 h-20 shadow-sm transition-colors">
                        <div>
                            <h1 className="text-xl md:text-2xl font-black text-slate-800 dark:text-white tracking-tight leading-none truncate max-w-[200px] md:max-w-md">{gameData.title}</h1>
                            <div className="flex gap-2 mt-1 items-center">
                                <span className={`w-3 h-3 rounded-full ${currentPlayer==='red'?'bg-red-500 animate-pulse': 'bg-slate-200 dark:bg-zinc-700'}`}></span>
                                <span className={`w-3 h-3 rounded-full ${currentPlayer==='yellow'?'bg-yellow-400 animate-pulse': 'bg-slate-200 dark:bg-zinc-700'}`}></span>
                                <span className="text-[10px] md:text-xs font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest ml-1">Turno: <span className={currentPlayer === 'red' ? 'text-red-500' : 'text-yellow-500'}>{currentPlayer === 'red' ? 'Rojo' : 'Amarillo'}</span></span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {roomId && <div className="hidden md:flex items-center gap-2 bg-blue-500/10 border border-blue-500/30 px-3 py-1.5 rounded-full"><Wifi size={14} className="text-blue-400"/><span className="text-xs font-bold text-blue-400 tracking-widest">SALA: {roomId}</span></div>}
                            <div className="flex gap-2">
                                {(isHost || myColor === null) && <button onClick={resetGame} className="btn-juicy p-2 md:p-3 bg-slate-100 dark:bg-zinc-800 border-b-4 border-slate-200 dark:border-zinc-950 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl text-slate-600 dark:text-zinc-400 transition-colors" title="Reiniciar Juego"><RotateCcw size={20}/></button>}
                                <button onClick={() => window.location.href='index.html'} className="btn-juicy p-2 md:p-3 bg-slate-100 dark:bg-zinc-800 border-b-4 border-slate-200 dark:border-zinc-950 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-500 rounded-xl text-slate-400 dark:text-zinc-400 transition-colors" title="Salir"><LogOut size={20}/></button>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex items-center justify-center p-2 md:p-4 bg-slate-200 dark:bg-zinc-950">
                        <div className="relative w-full max-w-[1000px] flex flex-col justify-center h-full">
                            <div className="grid grid-cols-7 px-6 md:px-12 mb-1 md:mb-2 ml-4 md:ml-8">
                                {['A','B','C','D','E','F','G'].map(l => (
                                    <div key={l} className="text-center font-black text-slate-500 dark:text-zinc-600 text-lg md:text-3xl">{l}</div>
                                ))}
                            </div>
                            <div className="flex w-full">
                                <div className="flex flex-col justify-around pr-2 md:pr-4 py-2 md:py-6 shrink-0">
                                    {[1,2,3,4,5,6].map(n => (
                                        <div key={n} className="font-black text-slate-500 dark:text-zinc-600 text-lg md:text-3xl">{n}</div>
                                    ))}
                                </div>
                                <div className="flex-1 bg-blue-600 dark:bg-blue-700 rounded-2xl md:rounded-[3rem] p-2 md:p-6 shadow-2xl border-b-[10px] md:border-b-[20px] border-blue-800 dark:border-blue-900 relative ring-4 md:ring-8 ring-blue-500/10 aspect-[7/6]">
                                    <div className="w-full h-full grid grid-cols-7 gap-1 md:gap-4">
                                        {board.map((row, r) => (
                                            row.map((cell, c) => (
                                                <div key={`${r}-${c}`} onClick={() => handleColumnClick(c)} className="relative w-full aspect-square cursor-pointer group">
                                                    <div className="w-full h-full bg-blue-800 dark:bg-blue-900 rounded-full shadow-[inset_0_4px_8px_rgba(0,0,0,0.4)] md:shadow-[inset_0_6px_12px_rgba(0,0,0,0.4)] flex items-center justify-center overflow-hidden border-2 md:border-4 border-blue-700/50 dark:border-blue-800/50">
                                                        {!cell && !winner && !modal && (!roomId || currentPlayer === myColor) && (
                                                            <div className={`w-[85%] h-[85%] rounded-full opacity-0 group-hover:opacity-40 transition-opacity ${currentPlayer === 'red' ? 'bg-red-500' : 'bg-yellow-400'}`}></div>
                                                        )}
                                                    </div>
                                                    {cell && (
                                                        <div className={`absolute inset-0 rounded-full token-drop shadow-[inset_0_-4px_8px_rgba(0,0,0,0.3)] md:shadow-[inset_0_-6px_10px_rgba(0,0,0,0.3)] border-[4px] md:border-[8px] ${cell === 'red' ? 'bg-red-500 border-red-600' : 'bg-yellow-400 border-yellow-500'}`}>
                                                            <div className="absolute top-[20%] left-[20%] w-[15%] h-[15%] bg-white opacity-40 rounded-full blur-[1px] md:blur-[2px]"></div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))
                                        ))}
                                    </div>
                                    <div className="absolute -bottom-8 md:-bottom-16 left-6 md:left-12 w-6 md:w-12 h-12 md:h-24 bg-blue-900 rounded-b-xl md:rounded-b-3xl -z-10 shadow-lg"></div>
                                    <div className="absolute -bottom-8 md:-bottom-16 right-6 md:right-12 w-6 md:w-12 h-12 md:h-24 bg-blue-900 rounded-b-xl md:rounded-b-3xl -z-10 shadow-lg"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {modal && <ChallengeModal type={modal.type} data={modal.data} onComplete={handleChallengeComplete} isHost={isHost} myColor={myColor} currentPlayer={currentPlayer} />}
                    
                    {winner && (
                        <div className="fixed inset-0 bg-slate-900/95 dark:bg-black/95 flex items-center justify-center z-50 animate-in">
                            <div className="text-center text-white p-8">
                                <Trophy size={120} className="md:w-40 md:h-40 mx-auto text-yellow-400 mb-8 animate-bounce drop-shadow-[0_0_40px_rgba(250,204,21,0.5)]"/>
                                <h1 className="text-6xl md:text-9xl font-black mb-4 tracking-tighter drop-shadow-xl">{winner === 'red' ? 'ROJO' : 'AMARILLO'}</h1>
                                <p className="text-xl md:text-3xl font-bold text-slate-400 uppercase tracking-widest mb-16">¡Victoria Absoluta!</p>
                                {(isHost || myColor === null) && <button onClick={resetGame} className="btn-juicy bg-white dark:bg-zinc-800 text-slate-900 dark:text-white border-b-4 dark:border-zinc-950 px-8 md:px-16 py-4 md:py-6 rounded-full font-black text-xl md:text-2xl hover:scale-105 transition-transform flex items-center gap-4 mx-auto shadow-2xl"><RotateCcw size={24} className="md:w-8 md:h-8"/> Jugar de Nuevo</button>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<GameBoard />);
    </script>
</body>
</html>

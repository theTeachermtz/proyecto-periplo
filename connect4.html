<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connect 4 Game | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.263.1","firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"}}</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body{font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;height:100dvh;user-select:none;-webkit-user-select:none}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        .token-drop{animation:drop .5s cubic-bezier(.25,1,.5,1)}@keyframes drop{from{transform:translateY(-500px)}to{transform:translateY(0)}}
        .animate-in{animation:fadeIn .3s ease-out}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .btn-juicy{transition:all .1s ease;border-bottom-width:4px}.btn-juicy:active:not(:disabled){transform:translateY(4px);border-bottom-width:0;margin-top:4px}
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100"><div id="root"></div>
<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef,useCallback} from 'react';
import {createRoot} from 'react-dom/client';
import {initializeApp} from 'firebase/app';
import {getAuth,signInAnonymously,onAuthStateChanged} from 'firebase/auth';
import {getFirestore,doc,getDoc,setDoc,updateDoc,onSnapshot,serverTimestamp,deleteField} from 'firebase/firestore';
import {Trophy,HelpCircle,Brain,Target,CheckCircle2,XCircle,ArrowRight,LogOut,Loader2,Users,SkipForward,RotateCcw,Timer,Pencil,Link2,AlertTriangle,Mic,Headphones,Wifi} from 'lucide-react';

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);
const shuffle=a=>{const n=[...a];for(let i=n.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[n[i],n[j]]=[n[j],n[i]]}return n};
const boom=()=>confetti({particleCount:150,spread:80,origin:{y:.6},colors:['#22c55e','#3b82f6','#f59e0b','#ef4444']});

// ROOM PATH — uses the quizzes parent path pattern that already has write permissions
const ROOMS_PATH='artifacts/periplo-app-v1/users/teacher_builder_001/rooms';

const CountdownBar=({duration,onTimeUp,isActive})=>{
    const[tl,setTl]=useState(duration);
    useEffect(()=>{if(!isActive)return;if(tl<=0){onTimeUp();return}const t=setInterval(()=>setTl(v=>v-1),1000);return()=>clearInterval(t)},[tl,isActive]);
    const p=(tl/duration)*100;const c=tl<=15?'bg-red-500 animate-pulse':tl<=30?'bg-yellow-400':'bg-green-500';
    return<div className="w-full bg-zinc-800 h-3 rounded-t-[2.5rem] overflow-hidden"><div className={`h-full ${c} transition-all duration-1000 ease-linear`} style={{width:`${p}%`}}/></div>;
};

// =========== LOBBY ===========
const LobbyScreen=({isTeacher,onCreateRoom,onJoinRoom,onLocalPlay})=>{
    const[code,setCode]=useState('');const[name,setName]=useState(localStorage.getItem('periplo_student_name')||'');
    return(
        <div className="fixed inset-0 bg-zinc-950 z-50 flex flex-col items-center justify-center p-4 animate-in">
            {isTeacher&&<button onClick={()=>window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-zinc-800 rounded-full hover:bg-zinc-700 text-white"><RotateCcw size={20}/></button>}
            <div className="text-center mb-10">
                <div className="flex justify-center gap-2 mb-6">
                    <span className="bg-red-500 w-10 h-10 rounded-full shadow-[inset_0_-4px_8px_rgba(0,0,0,0.4)] border-4 border-red-600"/>
                    <span className="bg-yellow-400 w-10 h-10 rounded-full shadow-[inset_0_-4px_8px_rgba(0,0,0,0.4)] border-4 border-yellow-500"/>
                </div>
                <h1 className="text-5xl font-black text-white mb-2 tracking-tight uppercase">Connect 4</h1>
                <p className="text-blue-400 font-bold uppercase tracking-[0.2em] text-sm">{isTeacher?'Modo Maestro':'Modo Alumno'}</p>
            </div>
            <div className="bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl border border-zinc-800 w-full max-w-sm">
                {isTeacher?(
                    <div className="space-y-4">
                        <button onClick={onCreateRoom} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl border-blue-800 flex items-center justify-center gap-2 text-lg"><Wifi size={24}/>CREAR SALA ONLINE</button>
                        <div className="h-px bg-zinc-700 my-4"/>
                        <button onClick={onLocalPlay} className="btn-juicy w-full bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-4 rounded-xl border-zinc-900">Jugar Local (1 Dispositivo)</button>
                    </div>
                ):(
                    <div className="space-y-4">
                        <h2 className="text-lg font-black text-center mb-2 text-zinc-300 uppercase tracking-widest">Ingresar al Juego</h2>
                        <input value={name} onChange={e=>setName(e.target.value)} placeholder="TU NOMBRE" className="w-full bg-zinc-950 border-2 border-zinc-700 rounded-xl p-3 text-center text-xl font-bold text-white outline-none focus:border-blue-500 mb-2" style={{fontSize:'16px'}}/>
                        <div className="flex gap-2">
                            <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="CÓDIGO" className="w-full bg-zinc-950 border-2 border-zinc-700 rounded-xl p-3 text-center text-2xl font-black text-white outline-none focus:border-blue-500 tracking-widest" maxLength={4} style={{fontSize:'16px'}}/>
                            <button onClick={()=>{localStorage.setItem('periplo_student_name',name);onJoinRoom(code,name)}} disabled={code.length!==4||!name.trim()} className="btn-juicy bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-black px-5 rounded-xl border-emerald-800 flex items-center justify-center"><ArrowRight size={24}/></button>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};

// =========== ROLES ===========
const RolesScreen=({roomData,roomCode,isHost,onSelectRole,onStartGame,myUid})=>{
    const roles=[{id:'red',name:'Jugador 1 (Rojo)',color:'bg-red-500 border-red-700'},{id:'yellow',name:'Jugador 2 (Amarillo)',color:'bg-yellow-500 border-yellow-700'},{id:'observer',name:'Observador (Maestro)',color:'bg-zinc-600 border-zinc-800'}];
    return(
        <div className="fixed inset-0 bg-zinc-950 z-50 flex flex-col items-center justify-center p-4 animate-in">
            <div className="bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full border border-zinc-800">
                <div className="text-center mb-8">
                    <p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-1">CÓDIGO DE SALA</p>
                    <h2 className="text-6xl font-black text-white tracking-[0.2em]">{roomCode}</h2>
                </div>
                <div className="space-y-3 mb-8">{roles.map(r=>{
                    const occ=roomData.roles[r.id];const mine=occ===myUid;const taken=occ&&!mine;
                    const occName=taken?(roomData.playerNames?.[occ]||'Ocupado'):'';
                    return(<button key={r.id} onClick={()=>onSelectRole(r.id)} disabled={taken} className={`btn-juicy w-full p-4 rounded-xl font-black flex justify-between items-center transition-all ${mine?r.color+' text-white scale-105 shadow-lg':taken?'bg-zinc-950 border-zinc-950 text-zinc-600 cursor-not-allowed':'bg-zinc-700 text-white hover:bg-zinc-600 border-zinc-900'}`}>
                        <span>{r.name}</span><span className="text-xs uppercase tracking-widest">{mine?'TÚ':taken?occName:'Elegir'}</span>
                    </button>);
                })}</div>
                {isHost?(<button onClick={onStartGame} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-xl border-emerald-700 text-lg uppercase tracking-widest shadow-xl flex items-center justify-center gap-2">Comenzar <ArrowRight size={20}/></button>):
                (<p className="text-center text-zinc-400 font-bold animate-pulse text-sm">Esperando que el Host inicie...</p>)}
            </div>
        </div>
    );
};

// =========== CHALLENGES ===========
const MC=({data,onComplete,onFail,onSuccess,canInteract})=>{const[sel,setSel]=useState(null);const[st,setSt]=useState('p');
    const pick=i=>{if(st!=='p'||!canInteract)return;setSel(i);if(i===data.correct){setSt('c');onSuccess();boom()}else{setSt('w');onFail()}};
    return(<div className="w-full text-center"><div className="flex justify-center mb-4"><div className="bg-indigo-900/30 p-3 rounded-full"><HelpCircle className="w-8 h-8 text-indigo-400"/></div></div>
    <h3 className="text-2xl font-black mb-6">Elige la correcta</h3>
    <div className="bg-zinc-900 border-2 border-zinc-800 p-6 rounded-2xl mb-6 font-medium text-lg leading-relaxed">{data.question}</div>
    <div className="grid gap-3 mb-6">{data.options.map((o,i)=>(<button key={i} onClick={()=>pick(i)} disabled={st!=='p'||!canInteract} className={`p-4 rounded-2xl border-2 font-bold text-left text-lg flex items-center justify-between ${st==='p'?'bg-zinc-900 border-zinc-700 hover:border-indigo-400':i===data.correct?'bg-emerald-900/30 border-emerald-500 text-emerald-300':sel===i?'bg-rose-900/30 border-rose-500 text-rose-300':'opacity-30'}`}>{o}{st!=='p'&&i===data.correct&&<CheckCircle2/>}{st==='w'&&sel===i&&<XCircle/>}</button>))}</div>
    {canInteract&&st==='c'&&<button onClick={()=>onComplete(true)} className="btn-juicy w-full bg-emerald-600 text-white py-4 rounded-xl border-emerald-800 font-black text-lg flex items-center justify-center gap-2 animate-in">COLOCAR FICHA <ArrowRight/></button>}
    {canInteract&&st==='w'&&<button onClick={()=>onComplete(false)} className="btn-juicy w-full bg-zinc-800 text-white py-4 rounded-xl border-zinc-950 font-bold animate-in">Perder Turno</button>}</div>);
};

const Unscramble=({data,onComplete,onFail,onSuccess,canInteract})=>{
    const[shuffled,setShuffled]=useState([]);const[selected,setSelected]=useState([]);const[st,setSt]=useState('p');
    useEffect(()=>{if(data?.text){setShuffled(shuffle(data.text.split(' ').map((w,i)=>({id:i,text:w}))));setSelected([]);setSt('p')}},[data]);
    const check=()=>{const n=s=>s.replace(/[.,!?]/g,'').trim().toLowerCase();if(n(selected.map(w=>w.text).join(' '))===n(data.text)){setSt('c');onSuccess();boom()}else{setSt('w');onFail()}};
    return(<div className="w-full text-center"><div className="flex justify-center mb-4"><div className="bg-amber-900/30 p-3 rounded-full"><Brain className="w-8 h-8 text-amber-400"/></div></div>
    <h3 className="text-2xl font-black mb-2">Ordena la Frase</h3>
    <div className="bg-zinc-900 p-3 rounded-xl border border-zinc-800 mb-6 inline-block"><p className="text-zinc-400 font-medium italic">"{data.translation}"</p></div>
    <div className={`min-h-[80px] bg-zinc-950 rounded-2xl p-4 mb-4 flex flex-wrap gap-2 justify-center content-center border-2 ${st==='c'?'border-emerald-500':st==='w'?'border-rose-500':'border-zinc-800'}`}>
        {selected.map(w=><button key={w.id} onClick={()=>{if(st!=='p'||!canInteract)return;setShuffled([...shuffled,w]);setSelected(selected.filter(s=>s.id!==w.id))}} className="bg-zinc-800 border border-zinc-600 px-4 py-2 rounded-lg font-bold animate-in">{w.text}</button>)}
    </div>
    <div className="flex flex-wrap gap-2 justify-center mb-6 min-h-[60px]">{st==='p'&&shuffled.map(w=><button key={w.id} onClick={()=>{if(!canInteract)return;setSelected([...selected,w]);setShuffled(shuffled.filter(s=>s.id!==w.id))}} className="bg-zinc-800 border border-zinc-700 px-4 py-2 rounded-lg font-bold animate-in">{w.text}</button>)}</div>
    {canInteract&&st==='c'&&<button onClick={()=>onComplete(true)} className="btn-juicy w-full bg-emerald-600 text-white py-4 rounded-xl border-emerald-800 font-black flex justify-center items-center gap-2 animate-in">COLOCAR FICHA <ArrowRight/></button>}
    {canInteract&&st==='w'&&<div className="animate-in"><div className="bg-rose-900/20 border border-rose-800/50 p-4 rounded-xl mb-4"><p className="text-rose-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/>Incorrecto</p><p className="font-bold text-lg">{data.text}</p></div><button onClick={()=>onComplete(false)} className="btn-juicy w-full bg-zinc-800 text-white py-4 rounded-xl border-zinc-950 font-bold">Perder Turno</button></div>}
    {canInteract&&st==='p'&&<button onClick={check} disabled={shuffled.length>0} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50">COMPROBAR</button>}</div>);
};

const Speaking=({data,onComplete,onFail,onSuccess,canGrade})=>{const[st,setSt]=useState('p');
    return(<div className="w-full text-center"><div className="flex justify-center mb-4"><div className="bg-blue-900/30 p-3 rounded-full"><Mic className="w-8 h-8 text-blue-400"/></div></div>
    <h3 className="text-2xl font-black mb-2">Traducción Oral</h3><p className="text-sm font-bold text-zinc-500 mb-6">Traduce en voz alta. El maestro evalúa.</p>
    <div className="bg-blue-900/20 border-2 border-blue-900/50 p-8 rounded-[2rem] mb-8"><p className="text-2xl font-black leading-tight">"{data.spanish}"</p></div>
    {canGrade&&<div className="bg-zinc-900 p-4 rounded-xl mb-8 border border-zinc-800 group cursor-help relative overflow-hidden"><p className="text-[10px] text-zinc-400 font-bold uppercase mb-2">Respuesta (Solo Maestro)</p><p className="font-bold text-lg text-transparent blur-[4px] group-hover:blur-none group-hover:text-zinc-100 transition-all select-none">{data.english}</p><div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-black/80 px-2 py-1 rounded text-xs font-bold text-zinc-300">Hover para ver</span></div></div>}
    {st==='p'?canGrade?(<div className="grid grid-cols-2 gap-4"><button onClick={()=>{setSt('w');onFail()}} className="btn-juicy py-4 rounded-2xl bg-zinc-800 border-2 border-rose-900/50 text-rose-400 font-black">INCORRECTO</button><button onClick={()=>{setSt('c');onSuccess();boom()}} className="btn-juicy py-4 rounded-2xl bg-emerald-500 border-emerald-700 text-white font-black shadow-lg">¡CORRECTO!</button></div>):(<div className="p-4 bg-amber-900/20 rounded-xl text-amber-400 font-bold animate-pulse border border-amber-800/50">Esperando evaluación del maestro...</div>)
    :st==='c'&&canGrade?<button onClick={()=>onComplete(true)} className="btn-juicy w-full bg-emerald-600 text-white py-4 rounded-xl border-emerald-800 font-black flex justify-center items-center gap-2 animate-in">COLOCAR FICHA <ArrowRight/></button>
    :st==='w'&&canGrade?<button onClick={()=>onComplete(false)} className="btn-juicy w-full bg-zinc-800 text-white py-4 rounded-xl border-zinc-950 font-bold animate-in">Perder Turno</button>:null}</div>);
};

// =========== CHALLENGE MODAL ===========
const ChallengeModal=({type,data,onComplete,isHost,myRole,currentPlayer})=>{
    const[timeUp,setTimeUp]=useState(false);const[cst,setCst]=useState('p');
    const isLocal=myRole==='local';const isTeacherGraded=type==='speaking';
    const canGrade=isLocal||myRole==='observer'||isHost;
    const canInteract=isLocal||(isTeacherGraded?canGrade:myRole===currentPlayer);
    const blocked=!canInteract;
    return(
        <div className="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in">
            <div className="bg-zinc-950 w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl border border-zinc-800 flex flex-col max-h-[90vh]">
                {!isTeacherGraded&&<CountdownBar duration={60} onTimeUp={()=>{setTimeUp(true);setCst('f')}} isActive={cst==='p'}/>}
                <div className="p-6 flex justify-between items-start bg-zinc-900 border-b border-zinc-800 shrink-0">
                    <div><span className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] block">Desafío</span><h3 className="text-2xl font-black capitalize">{type==='multipleChoice'?'Multiple Choice':type==='unscramble'?'Unscramble':type}</h3></div>
                    {cst==='p'&&canGrade&&<button onClick={()=>onComplete(true)} className="text-zinc-400 hover:text-emerald-400 font-bold text-xs uppercase flex items-center gap-1 bg-zinc-800 border border-zinc-700 px-3 py-1.5 rounded-full">Saltar <SkipForward size={14}/></button>}
                </div>
                <div className="p-8 overflow-y-auto relative">
                    {blocked&&cst==='p'&&<div className="absolute inset-0 bg-black/60 z-20 flex items-center justify-center backdrop-blur-[2px]"><span className="bg-zinc-900 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-pulse">¡Turno del Oponente!</span></div>}
                    {timeUp?(<div className="text-center animate-in"><Timer size={64} className="mx-auto text-rose-500 mb-4"/><h2 className="text-3xl font-black mb-2">¡Tiempo!</h2>{canInteract&&<button onClick={()=>onComplete(false)} className="btn-juicy bg-zinc-800 text-white px-8 py-4 rounded-xl font-bold mt-6">Perder Turno</button>}</div>):(
                        <>{type==='multipleChoice'&&<MC data={data} onComplete={onComplete} onFail={()=>setCst('f')} onSuccess={()=>setCst('s')} canInteract={canInteract}/>}
                        {type==='unscramble'&&<Unscramble data={data} onComplete={onComplete} onFail={()=>setCst('f')} onSuccess={()=>setCst('s')} canInteract={canInteract}/>}
                        {type==='speaking'&&<Speaking data={data} onComplete={onComplete} onFail={()=>setCst('f')} onSuccess={()=>setCst('s')} canGrade={canGrade}/>}</>
                    )}
                </div>
            </div>
        </div>
    );
};

// =========== GAME BOARD ===========
const GameBoard=()=>{
    const[stage,setStage]=useState('loading');
    const[gameData,setGameData]=useState(null);
    const[originalContent,setOriginalContent]=useState({});
    const[activePools,setActivePools]=useState({});
    const[authUid,setAuthUid]=useState(null);
    const myUid=useRef(null);
    const[roomId,setRoomId]=useState(null);
    const[isHost,setIsHost]=useState(false);
    const[myRole,setMyRole]=useState(null);
    const[roomRoles,setRoomRoles]=useState({red:null,yellow:null,observer:null});
    const[playerNames,setPlayerNames]=useState({});
    const emptyBoard=Array(6).fill(null).map(()=>Array(7).fill(null));
    const[board,setBoard]=useState(emptyBoard);
    const[currentPlayer,setCurrentPlayer]=useState('red');
    const[winner,setWinner]=useState(null);
    const[modal,setModal]=useState(null);
    const[isStudent]=useState(new URLSearchParams(window.location.search).get('student')==='true');

    // AUTH — wait for real UID
    useEffect(()=>{
        const unsub=onAuthStateChanged(auth,u=>{
            if(u){myUid.current=u.uid;setAuthUid(u.uid);}
            else signInAnonymously(auth).catch(e=>console.error(e));
        });
        signInAnonymously(auth).catch(e=>console.error(e));
        return()=>unsub();
    },[]);

    // LOAD GAME DATA — only after auth is ready
    useEffect(()=>{
        if(!authUid)return;
        const init=async()=>{
            try{
                const id=new URLSearchParams(window.location.search).get('id');
                if(id){
                    const snap=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',id));
                    if(snap.exists()){setGameData(snap.data());setOriginalContent(snap.data().content);setStage('lobby');}
                    else{alert("Juego no encontrado");window.location.href='index.html';}
                }else setStage('lobby');
            }catch(e){alert("Error: "+e.message);window.location.href='index.html';}
        };
        init();
    },[authUid]);

    // ROOM LISTENER
    useEffect(()=>{
        if(!roomId||!myUid.current)return;
        const unsub=onSnapshot(doc(db,ROOMS_PATH,roomId),snap=>{
            if(!snap.exists())return;
            const d=snap.data();
            setBoard(d.board||emptyBoard);setCurrentPlayer(d.turn||'red');setWinner(d.winner||null);setModal(d.activeChallenge||null);
            setRoomRoles(d.roles||{});setPlayerNames(d.playerNames||{});
            const uid=myUid.current;
            if(d.roles.red===uid)setMyRole('red');
            else if(d.roles.yellow===uid)setMyRole('yellow');
            else if(d.roles.observer===uid)setMyRole('observer');
            if(d.gameState==='playing'&&stage==='roles'){fillPools(originalContent);setStage('playing');}
        });
        return()=>unsub();
    },[roomId,stage,originalContent]);

    const fillPools=c=>{const p={};Object.keys(c).forEach(k=>{if(Array.isArray(c[k])&&c[k].length>0)p[k]=shuffle(c[k])});setActivePools(p)};

    const syncState=async updates=>{
        if(roomId){try{await updateDoc(doc(db,ROOMS_PATH,roomId),updates)}catch(e){console.error('Sync error:',e)}}
        else{if(updates.board!==undefined)setBoard(updates.board);if(updates.turn!==undefined)setCurrentPlayer(updates.turn);if(updates.activeChallenge!==undefined)setModal(updates.activeChallenge);if(updates.winner!==undefined)setWinner(updates.winner)}
    };

    const handleLocalPlay=()=>{setRoomId(null);setMyRole('local');setIsHost(true);fillPools(originalContent);setStage('playing')};

    const handleCreateRoom=async()=>{
        if(!myUid.current){alert("Autenticando... intenta de nuevo en un momento.");return;}
        const code=Math.floor(1000+Math.random()*9000).toString();
        try{
            await setDoc(doc(db,ROOMS_PATH,code),{
                gameId:new URLSearchParams(window.location.search).get('id'),
                board:emptyBoard,turn:'red',winner:null,activeChallenge:null,
                hostUid:myUid.current,
                roles:{red:null,yellow:null,observer:null},
                playerNames:{},gameState:'roles',
                createdAt:serverTimestamp()
            });
            setRoomId(code);setIsHost(true);setStage('roles');
        }catch(e){alert("Error creando sala: "+e.message);console.error(e)}
    };

    const handleJoinRoom=async(code,sName)=>{
        if(!myUid.current){alert("Autenticando...");return;}
        setStage('loading');
        try{
            const snap=await getDoc(doc(db,ROOMS_PATH,code));
            if(!snap.exists()){alert("Sala no encontrada.");setStage('lobby');return;}
            const d=snap.data();
            const gSnap=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',d.gameId));
            if(!gSnap.exists()){alert("Juego de esta sala no encontrado.");setStage('lobby');return;}
            setGameData(gSnap.data());setOriginalContent(gSnap.data().content);
            const pn={...(d.playerNames||{})};pn[myUid.current]=sName||'Alumno';
            await updateDoc(doc(db,ROOMS_PATH,code),{playerNames:pn});
            setRoomId(code);setIsHost(false);setStage(d.gameState==='playing'?'playing':'roles');
            if(d.gameState==='playing')fillPools(gSnap.data().content);
        }catch(e){alert("Error: "+e.message);setStage('lobby')}
    };

    const handleSelectRole=async rid=>{
        const nr={...roomRoles};Object.keys(nr).forEach(k=>{if(nr[k]===myUid.current)nr[k]=null});nr[rid]=myUid.current;
        try{await updateDoc(doc(db,ROOMS_PATH,roomId),{roles:nr})}catch(e){alert("Error: "+e.message)}
    };

    const handleStartGame=async()=>{
        try{await updateDoc(doc(db,ROOMS_PATH,roomId),{gameState:'playing'})}catch(e){alert("Error: "+e.message)}
    };

    const resetGame=()=>{fillPools(originalContent);syncState({board:emptyBoard,turn:'red',winner:null,activeChallenge:null})};

    const maxConn=(b,r,c,p)=>{const dirs=[[0,1],[1,0],[1,1],[1,-1]];let mx=1;dirs.forEach(([dr,dc])=>{let cnt=1,i=1;
        while(true){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<6&&nc>=0&&nc<7&&b[nr][nc]===p){cnt++;i++}else break}i=1;
        while(true){const nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<6&&nc>=0&&nc<7&&b[nr][nc]===p){cnt++;i++}else break}if(cnt>mx)mx=cnt});return mx};

    const getQ=()=>{
        const avail=Object.keys(activePools).filter(k=>activePools[k].length>0);
        if(!avail.length){fillPools(originalContent);const r=Object.keys(originalContent).filter(k=>Array.isArray(originalContent[k])&&originalContent[k].length>0);const t=r[Math.floor(Math.random()*r.length)];return{type:t,data:originalContent[t][0]}}
        const t=avail[Math.floor(Math.random()*avail.length)];const q=activePools[t][0];setActivePools(prev=>({...prev,[t]:prev[t].slice(1)}));return{type:t,data:q};
    };

    const handleColClick=col=>{
        if(winner||modal||stage!=='playing')return;
        if(roomId&&(currentPlayer!==myRole||myRole==='observer'))return;
        let row=-1;for(let r=5;r>=0;r--)if(!board[r][col]){row=r;break}if(row===-1)return;
        const tmp=board.map(r=>[...r]);tmp[row][col]=currentPlayer;
        const conn=maxConn(tmp,row,col,currentPlayer);
        if(conn>=2&&conn<4){const q=getQ();syncState({activeChallenge:{type:q.type,data:q.data,pendingMove:{r:row,c:col}}})}
        else commitMove(row,col,tmp);
    };

    const commitMove=(r,c,ob)=>{const nb=ob||board.map(row=>[...row]);nb[r][c]=currentPlayer;
        if(maxConn(nb,r,c,currentPlayer)>=4){boom();syncState({board:nb,winner:currentPlayer,activeChallenge:null})}
        else syncState({board:nb,turn:currentPlayer==='red'?'yellow':'red',activeChallenge:null})};

    const handleChallengeComplete=ok=>{if(ok)commitMove(modal.pendingMove.r,modal.pendingMove.c);else syncState({turn:currentPlayer==='red'?'yellow':'red',activeChallenge:null})};

    if(stage==='loading')return<div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin mr-3" size={40}/>Cargando...</div>;
    if(stage==='lobby')return<LobbyScreen isTeacher={!!gameData&&!isStudent} onCreateRoom={handleCreateRoom} onJoinRoom={handleJoinRoom} onLocalPlay={handleLocalPlay}/>;
    if(stage==='roles')return<RolesScreen roomData={{roles:roomRoles,playerNames}} roomCode={roomId} isHost={isHost} myUid={myUid.current} onSelectRole={handleSelectRole} onStartGame={handleStartGame}/>;

    return(
        <div className="h-[100dvh] flex flex-col overflow-hidden relative">
            <div className="bg-zinc-900 border-b border-zinc-800 px-4 py-3 flex justify-between items-center z-10 shrink-0">
                <div>
                    <h1 className="text-lg font-black truncate max-w-[200px] md:max-w-md">{gameData?.title||'Connect 4'}</h1>
                    <div className="flex gap-2 mt-1 items-center">
                        <span className={`w-3 h-3 rounded-full ${currentPlayer==='red'?'bg-red-500 animate-pulse':'bg-zinc-700'}`}/>
                        <span className={`w-3 h-3 rounded-full ${currentPlayer==='yellow'?'bg-yellow-400 animate-pulse':'bg-zinc-700'}`}/>
                        <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Turno: <span className={currentPlayer==='red'?'text-red-500':'text-yellow-400'}>{currentPlayer==='red'?'Rojo':'Amarillo'}</span></span>
                    </div>
                </div>
                <div className="flex items-center gap-2">
                    {roomId&&<div className="hidden md:flex items-center gap-2 bg-blue-500/10 border border-blue-500/30 px-3 py-1.5 rounded-full"><Wifi size={14} className="text-blue-400"/><span className="text-xs font-bold text-blue-400 tracking-widest">SALA: {roomId}</span></div>}
                    {(isHost||myRole==='local')&&<button onClick={resetGame} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl"><RotateCcw size={18}/></button>}
                    <button onClick={()=>window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-rose-900/30 hover:text-rose-400 rounded-xl"><LogOut size={18}/></button>
                </div>
            </div>

            <div className="flex-1 flex items-center justify-center p-2 md:p-4 bg-zinc-950">
                <div className="relative w-full max-w-[900px] flex flex-col justify-center">
                    <div className="grid grid-cols-7 px-6 md:px-10 mb-1 ml-4 md:ml-8">{['A','B','C','D','E','F','G'].map(l=><div key={l} className="text-center font-black text-zinc-600 text-lg md:text-2xl">{l}</div>)}</div>
                    <div className="flex w-full">
                        <div className="flex flex-col justify-around pr-2 md:pr-3 py-2 md:py-5 shrink-0">{[1,2,3,4,5,6].map(n=><div key={n} className="font-black text-zinc-600 text-lg md:text-2xl">{n}</div>)}</div>
                        <div className="flex-1 bg-blue-700 rounded-2xl md:rounded-[2.5rem] p-2 md:p-5 shadow-2xl border-b-[8px] md:border-b-[16px] border-blue-900 ring-4 md:ring-8 ring-blue-500/10 aspect-[7/6]">
                            <div className="w-full h-full grid grid-cols-7 gap-1 md:gap-3">
                                {board.map((row,r)=>row.map((cell,c)=>(
                                    <div key={`${r}-${c}`} onClick={()=>handleColClick(c)} className="relative w-full aspect-square cursor-pointer group">
                                        <div className="w-full h-full bg-blue-900 rounded-full shadow-[inset_0_4px_8px_rgba(0,0,0,0.4)] flex items-center justify-center overflow-hidden border-2 md:border-4 border-blue-800/50">
                                            {!cell&&!winner&&!modal&&(!roomId||currentPlayer===myRole||myRole==='local')&&myRole!=='observer'&&(
                                                <div className={`w-[85%] h-[85%] rounded-full opacity-0 group-hover:opacity-40 transition-opacity ${currentPlayer==='red'?'bg-red-500':'bg-yellow-400'}`}/>
                                            )}
                                        </div>
                                        {cell&&<div className={`absolute inset-0 rounded-full token-drop shadow-[inset_0_-4px_8px_rgba(0,0,0,0.3)] border-[4px] md:border-[6px] ${cell==='red'?'bg-red-500 border-red-600':'bg-yellow-400 border-yellow-500'}`}><div className="absolute top-[20%] left-[20%] w-[15%] h-[15%] bg-white opacity-40 rounded-full blur-[1px]"/></div>}
                                    </div>
                                )))}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            {modal&&<ChallengeModal type={modal.type} data={modal.data} onComplete={handleChallengeComplete} isHost={isHost} myRole={myRole} currentPlayer={currentPlayer}/>}

            {winner&&(
                <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 animate-in">
                    <div className="text-center p-8">
                        <Trophy size={100} className="mx-auto text-yellow-400 mb-8 animate-bounce drop-shadow-[0_0_40px_rgba(250,204,21,0.5)]"/>
                        <h1 className="text-6xl md:text-8xl font-black mb-4 tracking-tighter">{winner==='red'?'ROJO':'AMARILLO'}</h1>
                        <p className="text-xl font-bold text-zinc-400 uppercase tracking-widest mb-16">¡Victoria!</p>
                        {(isHost||myRole==='local')&&<button onClick={resetGame} className="btn-juicy bg-zinc-800 text-white border-zinc-950 px-12 py-5 rounded-full font-black text-xl flex items-center gap-4 mx-auto shadow-2xl"><RotateCcw size={24}/>Jugar de Nuevo</button>}
                    </div>
                </div>
            )}
        </div>
    );
};

createRoot(document.getElementById('root')).render(<GameBoard/>);
</script>
</body>
</html>

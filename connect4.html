<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Game | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100dvh;}
        .token-drop { animation: drop 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes drop { from { transform: translateY(-500px); } to { transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Trophy, HelpCircle, Brain, Target, CheckCircle2, XCircle, ArrowRight, LogOut, Loader2, Info, X, SkipForward, RotateCcw, Database, Timer, Pencil, Link2, AlertTriangle, Mic, Headphones, Drama } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const shuffleArray = (array) => {
            if (!array) return [];
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [newArray[i], newArray[j]] = [newArray[j], newArray[i]]; }
            return newArray;
        };

        const fireConfetti = () => { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'] }); };

        const CountdownBar = ({ duration, onTimeUp, isActive }) => {
            const [timeLeft, setTimeLeft] = useState(duration);
            useEffect(() => { 
                if (!isActive) return; 
                if (timeLeft <= 0) { onTimeUp(); return; } 
                const timerId = setInterval(() => setTimeLeft(t => t - 1), 1000); 
                return () => clearInterval(timerId); 
            }, [timeLeft, isActive, onTimeUp]);
            
            const percentage = (timeLeft / duration) * 100;
            let color = 'bg-green-500';
            let animation = '';
            if (timeLeft <= 15) { color = 'bg-red-500'; animation = 'animate-pulse'; } 
            else if (timeLeft <= 30) color = 'bg-yellow-400';
            return <div className="w-full bg-slate-200 dark:bg-zinc-800 h-3 rounded-t-[2.5rem] overflow-hidden relative"><div className={`h-full ${color} ${animation} transition-all duration-1000 ease-linear`} style={{ width: `${percentage}%` }}></div></div>;
        };

        const StartScreen = ({ onStart, title }) => (
            <div className="fixed inset-0 bg-slate-900 dark:bg-zinc-950 z-50 flex flex-col items-center justify-center p-4 animate-in">
                <div className="text-center mb-12"><h1 className="text-5xl md:text-7xl font-black text-white mb-4 tracking-tight uppercase drop-shadow-lg">{title || 'Connect 4'}</h1><div className="inline-block bg-slate-800 dark:bg-zinc-900 px-6 py-2 rounded-full border border-slate-700 dark:border-zinc-800"><p className="text-blue-400 font-bold uppercase tracking-[0.2em] text-sm">Selecciona Jugador Inicial</p></div></div>
                <div className="flex gap-8 md:gap-16">
                    <button onClick={() => onStart('red')} className="w-48 h-48 md:w-64 md:h-64 bg-slate-800 dark:bg-zinc-900 rounded-[2.5rem] shadow-2xl hover:bg-slate-700 dark:hover:bg-zinc-800 hover:-translate-y-2 transition-all border-4 border-slate-700 dark:border-zinc-800 hover:border-red-500 flex flex-col items-center justify-center gap-6 group"><div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-red-500 shadow-[0_0_30px_rgba(239,68,68,0.4)] group-hover:scale-110 transition-transform border-4 border-red-600"></div><span className="font-black text-white text-xl md:text-2xl tracking-widest group-hover:text-red-400">ROJO</span></button>
                    <button onClick={() => onStart('yellow')} className="w-48 h-48 md:w-64 md:h-64 bg-slate-800 dark:bg-zinc-900 rounded-[2.5rem] shadow-2xl hover:bg-slate-700 dark:hover:bg-zinc-800 hover:-translate-y-2 transition-all border-4 border-slate-700 dark:border-zinc-800 hover:border-yellow-400 flex flex-col items-center justify-center gap-6 group"><div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-yellow-400 shadow-[0_0_30px_rgba(250,204,21,0.4)] group-hover:scale-110 transition-transform border-4 border-yellow-500"></div><span className="font-black text-white text-xl md:text-2xl tracking-widest group-hover:text-yellow-400">AMARILLO</span></button>
                </div>
            </div>
        );

        // =========================================================================
        // MINIJUEGOS AUTO-EVALUADOS (6 TIPOS)
        // =========================================================================

        const MultipleChoiceChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [selected, setSelected] = useState(null);
            const [status, setStatus] = useState('playing');
            const handleSelect = (idx) => { 
                if (status !== 'playing') return; 
                setSelected(idx); 
                if (idx === data.correct) { setStatus('correct'); onSuccess(); fireConfetti(); } 
                else { setStatus('wrong'); onFail(); } 
            };
            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-indigo-100 dark:bg-indigo-900/30 p-3 rounded-full"><HelpCircle className="w-8 h-8 text-indigo-600 dark:text-indigo-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Elige la correcta</h3>
                    <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-6 font-medium text-lg text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">{data.question}</div>
                    <div className="grid gap-3 mb-6">{data.options.map((opt, idx) => (<button key={idx} onClick={() => handleSelect(idx)} disabled={status !== 'playing'} className={`p-4 rounded-2xl border-2 font-bold text-left transition-all text-lg flex items-center justify-between ${status === 'playing' ? 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 hover:border-indigo-400 dark:hover:border-indigo-500 hover:shadow-md text-slate-600 dark:text-zinc-300' : idx === data.correct ? 'bg-green-100 dark:bg-green-900/40 border-green-500 dark:border-green-500 text-green-800 dark:text-green-300' : selected === idx ? 'bg-red-100 dark:bg-red-900/40 border-red-500 text-red-800 dark:text-red-300' : 'opacity-30'}`}>{opt}{status !== 'playing' && idx === data.correct && <CheckCircle2/>}{status === 'wrong' && selected === idx && <XCircle/>}</button>))}</div>
                    {status === 'correct' && <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {status === 'wrong' && <button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button>}
                </div>
            );
        };

        const DragDropChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [status, setStatus] = useState('playing');
            const handleSelect = (opt) => {
                if (status !== 'playing') return;
                setSelectedOpt(opt);
                if (opt === data.correct) { setStatus('correct'); onSuccess(); fireConfetti(); }
                else { setStatus('wrong'); onFail(); }
            };
            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-rose-100 dark:bg-rose-900/30 p-3 rounded-full"><Target className="w-8 h-8 text-rose-600 dark:text-rose-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Completa la Frase</h3>
                    <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-8 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.sentence.split('[BLANK]').map((part, i, arr) => (
                            <React.Fragment key={i}>
                                {part}
                                {i < arr.length - 1 && (
                                    <span className={`inline-block min-w-[100px] border-b-4 border-dashed pb-1 mx-2 text-center font-black ${status==='correct'?'text-green-500 border-green-500':status==='wrong'?'text-red-500 border-red-500':'text-indigo-500 border-indigo-300 dark:border-indigo-700'}`}>{selectedOpt || '_____'}</span>
                                )}
                            </React.Fragment>
                        ))}
                    </div>
                    {status === 'playing' && (
                        <div className="flex flex-wrap justify-center gap-3 mb-6">
                            {shuffleArray([...data.options]).map((opt, i) => (
                                <button key={i} onClick={() => handleSelect(opt)} className="bg-slate-100 dark:bg-zinc-800 border-2 border-slate-200 dark:border-zinc-700 hover:border-indigo-400 px-6 py-3 rounded-xl font-bold text-lg transition-colors">{opt}</button>
                            ))}
                        </div>
                    )}
                    {status === 'correct' && <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {status === 'wrong' && <button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button>}
                </div>
            );
        };

        const UnscrambleChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [shuffledWords, setShuffledWords] = useState([]);
            const [selectedWords, setSelectedWords] = useState([]);
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (data && data.text) {
                    const wordsWithIds = data.text.split(' ').map((w, i) => ({ id: i, text: w }));
                    setShuffledWords(shuffleArray(wordsWithIds));
                    setSelectedWords([]); setStatus('playing');
                }
            }, [data]);

            const checkAnswer = () => {
                const built = selectedWords.map(w => w.text).join(" ");
                const normalize = (str) => str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s{2,}/g," ").trim().toLowerCase();
                if (normalize(built) === normalize(data.text)) { setStatus('correct'); onSuccess(); fireConfetti(); } 
                else { setStatus('wrong'); onFail(); }
            };

            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-amber-100 dark:bg-amber-900/30 p-3 rounded-full"><Brain className="w-8 h-8 text-amber-600 dark:text-amber-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Ordena la Frase</h3>
                    <div className="bg-slate-50 dark:bg-zinc-900 p-3 rounded-xl border border-slate-100 dark:border-zinc-800 mb-6 inline-block"><p className="text-slate-500 dark:text-zinc-400 font-medium italic">"{data.translation}"</p></div>
                    
                    <div className={`min-h-[80px] h-auto bg-white dark:bg-zinc-950 rounded-2xl p-4 mb-4 flex flex-wrap gap-2 justify-center content-center border-2 transition-colors ${status === 'correct' ? 'border-green-500 bg-green-50 dark:bg-green-900/20' : status === 'wrong' ? 'border-red-500 bg-red-50 dark:bg-red-900/20' : 'border-slate-200 dark:border-zinc-800 shadow-inner'}`}>
                        {selectedWords.map(w => (
                            <button key={w.id} onClick={() => { if (status !== 'playing') return; setShuffledWords([...shuffledWords, w]); setSelectedWords(selectedWords.filter(sw => sw.id !== w.id)); }} className="bg-white dark:bg-zinc-800 border border-slate-300 dark:border-zinc-600 px-4 py-2 rounded-lg font-bold text-slate-700 dark:text-zinc-200 shadow-sm hover:bg-slate-50 dark:hover:bg-zinc-700 transition-colors animate-in">{w.text}</button>
                        ))}
                    </div>
                    
                    <div className="flex flex-wrap gap-2 justify-center mb-6 min-h-[60px]">
                        {status === 'playing' && shuffledWords.map(w => (
                            <button key={w.id} onClick={() => { setSelectedWords([...selectedWords, w]); setShuffledWords(shuffledWords.filter(sw => sw.id !== w.id)); }} className="bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 border border-slate-200 dark:border-zinc-700 px-4 py-2 rounded-lg font-bold hover:bg-slate-200 dark:hover:bg-zinc-700 hover:text-slate-800 dark:hover:text-white transition-colors animate-in">{w.text}</button>
                        ))}
                    </div>

                    {status === 'correct' && (<div className="animate-in"><button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2">COLOCAR FICHA <ArrowRight/></button></div>)}
                    {status === 'wrong' && (<div className="animate-in"><div className="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 p-4 rounded-xl mb-4"><p className="text-red-600 dark:text-red-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/> Incorrecto</p><p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">{data.text}</p></div><button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all">Terminar Turno</button></div>)}
                    {status === 'playing' && (<button onClick={checkAnswer} disabled={shuffledWords.length > 0} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-700 transition-all disabled:opacity-50 disabled:bg-slate-300 dark:disabled:bg-zinc-800 disabled:text-slate-500 shadow-lg">COMPROBAR</button>)}
                </div>
            );
        };

        const FillBlankChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [input, setInput] = useState('');
            const [status, setStatus] = useState('playing');
            
            const checkAnswer = () => {
                const normalize = (str) => str.trim().toLowerCase();
                if (normalize(input) === normalize(data.answer)) { setStatus('correct'); onSuccess(); fireConfetti(); }
                else { setStatus('wrong'); onFail(); }
            };

            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-emerald-100 dark:bg-emerald-900/30 p-3 rounded-full"><Pencil className="w-8 h-8 text-emerald-600 dark:text-emerald-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Escribe la Palabra</h3>
                    <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-4 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.sentence.replace('[BLANK]', '_____')}
                    </div>
                    {data.hint && <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6 italic">Pista: {data.hint}</p>}
                    
                    {status === 'playing' && (
                        <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&checkAnswer()} className="w-full text-center text-2xl font-black p-4 rounded-xl border-2 border-indigo-300 focus:border-indigo-500 bg-indigo-50 dark:bg-zinc-800 dark:border-zinc-700 dark:focus:border-indigo-500 outline-none mb-6" placeholder="Escribe aquí..."/>
                    )}

                    {status === 'correct' && <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {status === 'wrong' && (<div className="animate-in"><div className="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 p-4 rounded-xl mb-4"><p className="text-red-600 dark:text-red-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/> Incorrecto</p><p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">{data.answer}</p></div><button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button></div>)}
                    {status === 'playing' && (<button onClick={checkAnswer} disabled={!input.trim()} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-700 transition-all disabled:opacity-50 shadow-lg">COMPROBAR</button>)}
                </div>
            );
        };

        const MatchingChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [pairs, setPairs] = useState([]);
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [matched, setMatched] = useState(new Set());
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (data && data.pairs) {
                    const l = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.left})));
                    const r = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.right})));
                    setPairs({ left: l, right: r });
                }
            }, [data]);

            const handleRightClick = (rightId) => {
                if(selectedLeft === null || status !== 'playing') return;
                if(selectedLeft === rightId) {
                    const newMatched = new Set(matched).add(selectedLeft);
                    setMatched(newMatched);
                    setSelectedLeft(null);
                    if(newMatched.size === data.pairs.length) { setStatus('correct'); onSuccess(); fireConfetti(); }
                } else {
                    setStatus('wrong'); onFail();
                }
            };

            if(!pairs.left) return null;

            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-cyan-100 dark:bg-cyan-900/30 p-3 rounded-full"><Link2 className="w-8 h-8 text-cyan-600 dark:text-cyan-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Une las parejas</h3>
                    
                    <div className="flex gap-4 mb-6">
                        <div className="flex-1 space-y-2">
                            {pairs.left.map(item => {
                                const isMatched = matched.has(item.id);
                                const isSel = selectedLeft === item.id;
                                return <button key={`l-${item.id}`} onClick={() => !isMatched && status==='playing' && setSelectedLeft(item.id)} disabled={isMatched || status!=='playing'} className={`w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-100 border-zinc-200 text-zinc-300 dark:bg-zinc-900 dark:border-zinc-800' : isSel ? 'bg-indigo-100 border-indigo-500 text-indigo-700' : 'bg-white border-slate-200 hover:border-indigo-300 dark:bg-zinc-800 dark:border-zinc-700'}`}>{item.text}</button>
                            })}
                        </div>
                        <div className="flex-1 space-y-2">
                            {pairs.right.map(item => {
                                const isMatched = matched.has(item.id);
                                return <button key={`r-${item.id}`} onClick={() => handleRightClick(item.id)} disabled={isMatched || status!=='playing'} className={`w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-100 border-zinc-200 text-zinc-300 dark:bg-zinc-900 dark:border-zinc-800' : 'bg-white border-slate-200 hover:border-indigo-300 dark:bg-zinc-800 dark:border-zinc-700'}`}>{item.text}</button>
                            })}
                        </div>
                    </div>

                    {status === 'correct' && <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {status === 'wrong' && <button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">¡Error! Perder Turno</button>}
                </div>
            );
        };

        const ErrorCorrectionChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [input, setInput] = useState('');
            const [status, setStatus] = useState('playing');
            
            const checkAnswer = () => {
                const normalize = (str) => str.trim().toLowerCase();
                if (normalize(input) === normalize(data.correction)) { setStatus('correct'); onSuccess(); fireConfetti(); }
                else { setStatus('wrong'); onFail(); }
            };

            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-pink-100 dark:bg-pink-900/30 p-3 rounded-full"><AlertTriangle className="w-8 h-8 text-pink-600 dark:text-pink-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Corrige el Error</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Encuentra la palabra incorrecta y escribe la corrección.</p>
                    
                    <div className="bg-rose-50 dark:bg-rose-900/10 border-2 border-rose-200 dark:border-rose-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.sentence}
                    </div>
                    
                    {status === 'playing' && (
                        <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&checkAnswer()} className="w-full text-center text-xl font-black p-4 rounded-xl border-2 border-indigo-300 focus:border-indigo-500 bg-white dark:bg-zinc-800 dark:border-zinc-700 dark:focus:border-indigo-500 outline-none mb-6" placeholder="Escribe la palabra correcta..."/>
                    )}

                    {status === 'correct' && <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>}
                    {status === 'wrong' && (<div className="animate-in"><div className="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 p-4 rounded-xl mb-4"><p className="text-red-600 dark:text-red-400 font-bold mb-1"><XCircle size={18} className="inline mr-1"/> Incorrecto</p><p className="text-slate-800 dark:text-zinc-200 font-bold text-sm">El error era: <span className="text-red-500 line-through">{data.error}</span></p><p className="text-slate-800 dark:text-zinc-200 font-bold text-lg mt-1">La corrección es: <span className="text-green-500">{data.correction}</span></p></div><button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button></div>)}
                    {status === 'playing' && (<button onClick={checkAnswer} disabled={!input.trim()} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-700 transition-all disabled:opacity-50 shadow-lg">COMPROBAR</button>)}
                </div>
            );
        };

        // =========================================================================
        // MINIJUEGOS MANUALES (MAESTRO EVALÚA)
        // =========================================================================

        const SpeakingChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [status, setStatus] = useState('playing');
            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-blue-100 dark:bg-blue-900/30 p-3 rounded-full"><Mic className="w-8 h-8 text-blue-600 dark:text-blue-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Traducción Oral</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Traduce esta frase en voz alta. Tu maestro evaluará tu respuesta.</p>
                    <div className="bg-blue-50 dark:bg-blue-900/20 border-2 border-blue-100 dark:border-blue-900/50 p-8 rounded-[2rem] mb-8 shadow-sm"><p className="text-2xl font-black text-slate-800 dark:text-zinc-200 leading-tight">"{data.spanish}"</p></div>
                    <div className="bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl mb-8 border border-slate-200 dark:border-zinc-800 group cursor-help relative overflow-hidden"><p className="text-[10px] text-slate-400 dark:text-zinc-500 font-bold uppercase mb-2">Respuesta Esperada (Solo Maestro)</p><p className="font-bold text-slate-800 dark:text-zinc-100 text-lg filter blur-md group-hover:blur-0 transition-all duration-300 select-none">{data.english}</p><div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-white/80 dark:bg-black/80 px-2 py-1 rounded text-xs font-bold text-slate-500 dark:text-zinc-300">Hover para ver</span></div></div>
                    {status === 'playing' ? (
                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => { setStatus('wrong'); onFail(); }} className="py-4 rounded-2xl bg-white dark:bg-zinc-800 border-2 border-red-100 dark:border-red-900/50 text-red-500 dark:text-red-400 font-black hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">INCORRECTO</button>
                            <button onClick={() => { setStatus('correct'); onSuccess(); fireConfetti(); }} className="py-4 rounded-2xl bg-green-500 text-white font-black shadow-lg hover:bg-green-600 hover:scale-105 transition-all">¡CORRECTO!</button>
                        </div>
                    ) : status === 'correct' ? (
                        <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>
                    ) : (
                        <button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button>
                    )}
                </div>
            );
        };

        const ListeningChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [status, setStatus] = useState('playing');
            
            const playAudio = () => {
                const utterance = new SpeechSynthesisUtterance(data.audioText);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-purple-100 dark:bg-purple-900/30 p-3 rounded-full"><Headphones className="w-8 h-8 text-purple-600 dark:text-purple-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Listening</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Escucha el audio y responde la pregunta.</p>
                    
                    <button onClick={playAudio} className="mb-6 bg-purple-600 hover:bg-purple-500 text-white font-black px-6 py-3 rounded-full shadow-md flex items-center gap-2 mx-auto transition-colors">
                        ▶️ Reproducir Audio
                    </button>

                    <div className="bg-purple-50 dark:bg-purple-900/10 border-2 border-purple-200 dark:border-purple-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.question}
                    </div>
                    
                    <div className="bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl mb-8 border border-slate-200 dark:border-zinc-800 group cursor-help relative overflow-hidden"><p className="text-[10px] text-slate-400 dark:text-zinc-500 font-bold uppercase mb-2">Respuesta Esperada (Solo Maestro)</p><p className="font-bold text-slate-800 dark:text-zinc-100 text-lg filter blur-md group-hover:blur-0 transition-all duration-300 select-none">{data.answer}</p><div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-white/80 dark:bg-black/80 px-2 py-1 rounded text-xs font-bold text-slate-500 dark:text-zinc-300">Hover para ver</span></div></div>
                    
                    {status === 'playing' ? (
                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => { setStatus('wrong'); onFail(); }} className="py-4 rounded-2xl bg-white dark:bg-zinc-800 border-2 border-red-100 dark:border-red-900/50 text-red-500 dark:text-red-400 font-black hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">INCORRECTO</button>
                            <button onClick={() => { setStatus('correct'); onSuccess(); fireConfetti(); }} className="py-4 rounded-2xl bg-green-500 text-white font-black shadow-lg hover:bg-green-600 hover:scale-105 transition-all">¡CORRECTO!</button>
                        </div>
                    ) : status === 'correct' ? (
                        <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>
                    ) : (
                        <button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button>
                    )}
                </div>
            );
        };

        const RoleplayChallenge = ({ data, onComplete, onFail, onSuccess }) => {
            const [status, setStatus] = useState('playing');
            return (
                <div className="w-full text-center">
                    <div className="flex justify-center mb-4"><div className="bg-orange-100 dark:bg-orange-900/30 p-3 rounded-full"><Drama className="w-8 h-8 text-orange-600 dark:text-orange-400"/></div></div>
                    <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Roleplay</h3>
                    <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Lee la situación y actúa la respuesta en inglés.</p>
                    
                    <div className="bg-orange-50 dark:bg-orange-900/20 border-2 border-orange-100 dark:border-orange-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                        {data.situation}
                    </div>
                    
                    <div className="bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl mb-8 border border-slate-200 dark:border-zinc-800 group cursor-help relative overflow-hidden"><p className="text-[10px] text-slate-400 dark:text-zinc-500 font-bold uppercase mb-2">Sugerencia (Solo Maestro)</p><p className="font-bold text-slate-800 dark:text-zinc-100 text-lg filter blur-md group-hover:blur-0 transition-all duration-300 select-none">{data.expected}</p><div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"><span className="bg-white/80 dark:bg-black/80 px-2 py-1 rounded text-xs font-bold text-slate-500 dark:text-zinc-300">Hover para ver</span></div></div>
                    
                    {status === 'playing' ? (
                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => { setStatus('wrong'); onFail(); }} className="py-4 rounded-2xl bg-white dark:bg-zinc-800 border-2 border-red-100 dark:border-red-900/50 text-red-500 dark:text-red-400 font-black hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">INCORRECTO</button>
                            <button onClick={() => { setStatus('correct'); onSuccess(); fireConfetti(); }} className="py-4 rounded-2xl bg-green-500 text-white font-black shadow-lg hover:bg-green-600 hover:scale-105 transition-all">¡CORRECTO!</button>
                        </div>
                    ) : status === 'correct' ? (
                        <button onClick={() => onComplete(true)} className="w-full bg-green-600 dark:bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition-all shadow-lg flex items-center justify-center gap-2 animate-in">CONTINUAR Y COLOCAR FICHA <ArrowRight/></button>
                    ) : (
                        <button onClick={() => onComplete(false)} className="w-full bg-slate-800 dark:bg-zinc-800 text-white py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700 transition-all animate-in">Perder Turno</button>
                    )}
                </div>
            );
        };

        // =========================================================================
        // CONTROLADOR DEL MODAL (Selecciona la pantalla correcta)
        // =========================================================================
        const ChallengeModal = ({ type, data, onComplete }) => {
            const [timeIsUp, setTimeIsUp] = useState(false);
            const [challengeStatus, setChallengeStatus] = useState('playing');
            
            const handleTimeUp = () => { setTimeIsUp(true); setChallengeStatus('failed'); };
            const handleFail = () => { setChallengeStatus('failed'); };
            const handleSuccess = () => { setChallengeStatus('success'); };
            const handleComplete = (success) => { onComplete(success); };
            const handleSkip = () => { onComplete(true); }; 

            return (
                <div className="fixed inset-0 bg-slate-900/90 dark:bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in">
                    <div className="bg-white dark:bg-zinc-950 w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-zinc-800">
                        <CountdownBar duration={60} onTimeUp={handleTimeUp} isActive={challengeStatus === 'playing'} />
                        <div className="p-6 flex justify-between items-start bg-slate-50 dark:bg-zinc-900 border-b border-slate-100 dark:border-zinc-800">
                            <div><span className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-1 block">Desafío</span><h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 capitalize">{type.replace(/([A-Z])/g, ' $1').trim()}</h3></div>
                            <div className="flex flex-col items-end gap-2"><div className="flex items-center gap-1 text-slate-400 dark:text-zinc-500 font-bold text-xs"><Timer size={14}/> 60s</div>{challengeStatus === 'playing' && <button onClick={handleSkip} className="text-slate-400 dark:text-zinc-500 hover:text-green-500 dark:hover:text-green-400 font-bold text-xs uppercase flex items-center gap-1 bg-white dark:bg-zinc-800 border dark:border-zinc-700 px-3 py-1.5 rounded-full transition-colors">Saltar (Aceptar) <SkipForward size={14}/></button>}</div>
                        </div>
                        <div className="p-8">
                            {timeIsUp ? (
                                <div className="text-center animate-in"><div className="text-red-500 mb-4"><Timer size={64} className="mx-auto"/></div><h2 className="text-3xl font-black text-slate-800 dark:text-white mb-2">¡Tiempo Agotado!</h2><p className="text-slate-500 dark:text-zinc-400 mb-8">Te tardaste demasiado.</p><button onClick={() => onComplete(false)} className="bg-slate-800 dark:bg-zinc-800 text-white px-8 py-4 rounded-xl font-bold hover:bg-black dark:hover:bg-zinc-700">Perder Turno</button></div>
                            ) : (
                                <>
                                    {type === 'multipleChoice' && <MultipleChoiceChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'dragDrop' && <DragDropChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'unscramble' && <UnscrambleChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'fillBlank' && <FillBlankChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'matching' && <MatchingChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'errorCorrection' && <ErrorCorrectionChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'speaking' && <SpeakingChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'listening' && <ListeningChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                    {type === 'roleplay' && <RoleplayChallenge data={data} onComplete={handleComplete} onFail={handleFail} onSuccess={handleSuccess} />}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const GameBoard = () => {
            const [stage, setStage] = useState('loading');
            const [gameData, setGameData] = useState(null);
            const [board, setBoard] = useState(Array(6).fill(null).map(() => Array(7).fill(null)));
            const [currentPlayer, setCurrentPlayer] = useState(null);
            const [winner, setWinner] = useState(null);
            const [modal, setModal] = useState(null);
            
            const [activePools, setActivePools] = useState({});
            const [originalContent, setOriginalContent] = useState({});

            useEffect(() => {
                const init = async () => {
                    try {
                        const params = new URLSearchParams(window.location.search);
                        const id = params.get('id');
                        if (!id) throw new Error("Falta ID");
                        const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                        if (snap.exists()) {
                            const content = snap.data().content;
                            setGameData(snap.data());
                            setOriginalContent(content);
                            
                            const newPools = {};
                            Object.keys(content).forEach(key => {
                                if (Array.isArray(content[key]) && content[key].length > 0) {
                                    newPools[key] = shuffleArray(content[key]);
                                }
                            });
                            setActivePools(newPools);
                            setStage('setup');
                        } else { throw new Error("Juego no encontrado"); }
                    } catch (e) { alert(e.message); window.location.href='index.html'; }
                };
                init();
            }, []);

            const resetGame = () => {
                setBoard(Array(6).fill(null).map(() => Array(7).fill(null)));
                setWinner(null);
                setModal(null);
                setCurrentPlayer(null);
                
                const newPools = {};
                Object.keys(originalContent).forEach(key => {
                    if (Array.isArray(originalContent[key]) && originalContent[key].length > 0) {
                        newPools[key] = shuffleArray(originalContent[key]);
                    }
                });
                setActivePools(newPools);
                setStage('setup');
            };

            const startGame = (player) => { setCurrentPlayer(player); setStage('playing'); };

            const calculateMaxConnection = (boardState, r, c, player) => {
                const directions = [[0, 1], [1, 0], [1, 1], [1, -1]]; let maxLen = 1;
                directions.forEach(([dr, dc]) => {
                    let count = 1; let i = 1;
                    while(true) { const nr = r + dr * i, nc = c + dc * i; if(nr>=0 && nr<6 && nc>=0 && nc<7 && boardState[nr][nc] === player) { count++; i++; } else break; }
                    i = 1;
                    while(true) { const nr = r - dr * i, nc = c - dc * i; if(nr>=0 && nr<6 && nc>=0 && nc<7 && boardState[nr][nc] === player) { count++; i++; } else break; }
                    if(count > maxLen) maxLen = count;
                });
                return maxLen;
            };

            // LA TÓMBOLA: Saca una pregunta al azar de cualquier categoría disponible
            const getQuestion = () => {
                const availableTypes = Object.keys(activePools).filter(k => activePools[k].length > 0);
                
                // Si se acabaron todas, volvemos a llenar la bolsa
                if (availableTypes.length === 0) {
                    const resetPools = {};
                    Object.keys(originalContent).forEach(key => {
                        if (Array.isArray(originalContent[key]) && originalContent[key].length > 0) {
                            resetPools[key] = shuffleArray(originalContent[key]);
                        }
                    });
                    setActivePools(resetPools);
                    
                    const newAvailable = Object.keys(resetPools).filter(k => resetPools[k].length > 0);
                    const randomType = newAvailable[Math.floor(Math.random() * newAvailable.length)];
                    const question = resetPools[randomType][0];
                    setActivePools(prev => ({ ...prev, [randomType]: resetPools[randomType].slice(1) }));
                    return { type: randomType, data: question };
                }

                const randomType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                const question = activePools[randomType][0];
                setActivePools(prev => ({ ...prev, [randomType]: activePools[randomType].slice(1) }));
                return { type: randomType, data: question };
            };

            const handleColumnClick = (col) => {
                if (winner || modal || stage !== 'playing') return;
                let row = -1;
                for (let r = 5; r >= 0; r--) { if (!board[r][col]) { row = r; break; } }
                if (row === -1) return;
                
                const tempBoard = board.map(r => [...r]);
                tempBoard[row][col] = currentPlayer;
                const connectionLen = calculateMaxConnection(tempBoard, row, col, currentPlayer);
                const pendingMove = { r: row, c: col };
                
                // CUALQUIER conexión de 2 o 3 fichas saca una pregunta al azar
                if (connectionLen >= 2 && connectionLen < 4) {
                    const q = getQuestion();
                    setModal({ type: q.type, data: q.data, pendingMove });
                } else {
                    commitMove(row, col);
                }
            };

            const commitMove = (r, c) => {
                const newBoard = board.map(row => [...row]);
                newBoard[r][c] = currentPlayer;
                setBoard(newBoard);
                if (calculateMaxConnection(newBoard, r, c, currentPlayer) >= 4) { fireConfetti(); setWinner(currentPlayer); } 
                else { setCurrentPlayer(currentPlayer === 'red' ? 'yellow' : 'red'); }
            };

            const handleChallengeComplete = (success) => {
                if (success) commitMove(modal.pendingMove.r, modal.pendingMove.c);
                else setCurrentPlayer(currentPlayer === 'red' ? 'yellow' : 'red');
                setModal(null);
            };

            if (stage === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-900 text-white"><Loader2 className="animate-spin mr-3" size={40}/> Cargando...</div>;
            if (stage === 'setup') return <StartScreen onStart={startGame} title={gameData.title} />;

            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden font-sans relative">
                    <div className="bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0 h-20 shadow-sm transition-colors">
                        <div>
                            <h1 className="text-xl md:text-2xl font-black text-slate-800 dark:text-white tracking-tight leading-none truncate max-w-[200px] md:max-w-md">{gameData.title}</h1>
                            <div className="flex gap-2 mt-1 items-center">
                                <span className={`w-3 h-3 rounded-full ${currentPlayer==='red'?'bg-red-500 animate-pulse': 'bg-slate-200 dark:bg-zinc-700'}`}></span>
                                <span className={`w-3 h-3 rounded-full ${currentPlayer==='yellow'?'bg-yellow-400 animate-pulse': 'bg-slate-200 dark:bg-zinc-700'}`}></span>
                                <span className="text-[10px] md:text-xs font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest ml-1">Turno: <span className={currentPlayer === 'red' ? 'text-red-500' : 'text-yellow-500'}>{currentPlayer === 'red' ? 'Rojo' : 'Amarillo'}</span></span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={resetGame} className="p-2 md:p-3 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl text-slate-600 dark:text-zinc-400 transition-colors" title="Reiniciar Juego"><RotateCcw size={20}/></button>
                            <button onClick={() => window.location.href='index.html'} className="p-2 md:p-3 bg-slate-100 dark:bg-zinc-800 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-500 rounded-xl text-slate-400 dark:text-zinc-400 transition-colors" title="Salir"><LogOut size={20}/></button>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex items-center justify-center p-2 md:p-4 bg-slate-200 dark:bg-zinc-950">
                        <div className="relative w-full max-w-[1000px] flex flex-col justify-center h-full">
                            <div className="grid grid-cols-7 px-6 md:px-12 mb-1 md:mb-2 ml-4 md:ml-8">
                                {['A','B','C','D','E','F','G'].map(l => (
                                    <div key={l} className="text-center font-black text-slate-500 dark:text-zinc-600 text-lg md:text-3xl">{l}</div>
                                ))}
                            </div>
                            <div className="flex w-full">
                                <div className="flex flex-col justify-around pr-2 md:pr-4 py-2 md:py-6 shrink-0">
                                    {[1,2,3,4,5,6].map(n => (
                                        <div key={n} className="font-black text-slate-500 dark:text-zinc-600 text-lg md:text-3xl">{n}</div>
                                    ))}
                                </div>
                                <div className="flex-1 bg-blue-600 dark:bg-blue-700 rounded-2xl md:rounded-[3rem] p-2 md:p-6 shadow-2xl border-b-[10px] md:border-b-[20px] border-blue-800 dark:border-blue-900 relative ring-4 md:ring-8 ring-blue-500/10 aspect-[7/6]">
                                    <div className="w-full h-full grid grid-cols-7 gap-1 md:gap-4">
                                        {board.map((row, r) => (
                                            row.map((cell, c) => (
                                                <div key={`${r}-${c}`} onClick={() => handleColumnClick(c)} className="relative w-full aspect-square cursor-pointer group">
                                                    <div className="w-full h-full bg-blue-800 dark:bg-blue-900 rounded-full shadow-[inset_0_4px_8px_rgba(0,0,0,0.4)] md:shadow-[inset_0_6px_12px_rgba(0,0,0,0.4)] flex items-center justify-center overflow-hidden border-2 md:border-4 border-blue-700/50 dark:border-blue-800/50">
                                                        {!cell && !winner && !modal && (
                                                            <div className={`w-[85%] h-[85%] rounded-full opacity-0 group-hover:opacity-40 transition-opacity ${currentPlayer === 'red' ? 'bg-red-500' : 'bg-yellow-400'}`}></div>
                                                        )}
                                                    </div>
                                                    {cell && (
                                                        <div className={`absolute inset-0 rounded-full token-drop shadow-[inset_0_-4px_8px_rgba(0,0,0,0.3)] md:shadow-[inset_0_-6px_10px_rgba(0,0,0,0.3)] border-[4px] md:border-[8px] ${cell === 'red' ? 'bg-red-500 border-red-600' : 'bg-yellow-400 border-yellow-500'}`}>
                                                            <div className="absolute top-[20%] left-[20%] w-[15%] h-[15%] bg-white opacity-40 rounded-full blur-[1px] md:blur-[2px]"></div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))
                                        ))}
                                    </div>
                                    <div className="absolute -bottom-8 md:-bottom-16 left-6 md:left-12 w-6 md:w-12 h-12 md:h-24 bg-blue-900 rounded-b-xl md:rounded-b-3xl -z-10 shadow-lg"></div>
                                    <div className="absolute -bottom-8 md:-bottom-16 right-6 md:right-12 w-6 md:w-12 h-12 md:h-24 bg-blue-900 rounded-b-xl md:rounded-b-3xl -z-10 shadow-lg"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {modal && <ChallengeModal type={modal.type} data={modal.data} onComplete={handleChallengeComplete} />}
                    
                    {winner && (
                        <div className="fixed inset-0 bg-slate-900/95 dark:bg-black/95 flex items-center justify-center z-50 animate-in">
                            <div className="text-center text-white p-8">
                                <Trophy size={120} className="md:w-40 md:h-40 mx-auto text-yellow-400 mb-8 animate-bounce drop-shadow-[0_0_40px_rgba(250,204,21,0.5)]"/>
                                <h1 className="text-6xl md:text-9xl font-black mb-4 tracking-tighter drop-shadow-xl">{winner === 'red' ? 'ROJO' : 'AMARILLO'}</h1>
                                <p className="text-xl md:text-3xl font-bold text-slate-400 uppercase tracking-widest mb-16">¡Victoria Absoluta!</p>
                                <button onClick={resetGame} className="bg-white dark:bg-zinc-800 text-slate-900 dark:text-white border dark:border-zinc-700 px-8 md:px-16 py-4 md:py-6 rounded-full font-black text-xl md:text-2xl hover:scale-105 transition-transform flex items-center gap-4 mx-auto shadow-2xl"><RotateCcw size={24} className="md:w-8 md:h-8"/> Jugar de Nuevo</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<GameBoard />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alumnos Español | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #6366f1; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 4px; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Users, Plus, Trash2, ArrowLeft, Sun, Moon, UserPlus, Hash, Star, LayoutGrid, Zap, Award, Activity, MessageCircle, Ear, BookOpen, PenTool, Brain, Mic, Save, X, HelpCircle, Palette, Target, CheckCircle2 } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const db = getFirestore(app);

        const STUDENTS_PATH = ['artifacts', 'periplo-app-v1', 'students-es'];

        // --- PALETA DE COLORES ---
        const PALETTE = [
            { id: 'lavanda',   class: 'bg-violet-200 border-violet-300 text-violet-900 dark:bg-violet-900/50 dark:border-violet-500 dark:text-violet-100' },
            { id: 'lirio',     class: 'bg-stone-50 border-stone-200 text-stone-600 dark:bg-stone-800 dark:border-stone-500 dark:text-stone-200' },
            { id: 'menta',     class: 'bg-teal-200 border-teal-300 text-teal-900 dark:bg-teal-900/50 dark:border-teal-500 dark:text-teal-100' },
            { id: 'durazno',   class: 'bg-orange-200 border-orange-300 text-orange-900 dark:bg-orange-900/50 dark:border-orange-500 dark:text-orange-100' },
            { id: 'cereza',    class: 'bg-rose-300 border-rose-400 text-rose-900 dark:bg-rose-900/50 dark:border-rose-500 dark:text-rose-100' },
            { id: 'arandano',  class: 'bg-blue-300 border-blue-400 text-blue-900 dark:bg-blue-900/50 dark:border-blue-500 dark:text-blue-100' },
            { id: 'kiwi',      class: 'bg-lime-200 border-lime-300 text-lime-900 dark:bg-lime-900/50 dark:border-lime-500 dark:text-lime-100' },
            { id: 'uva',       class: 'bg-purple-300 border-purple-400 text-purple-900 dark:bg-purple-900/50 dark:border-purple-500 dark:text-purple-100' },
            { id: 'fresa',     class: 'bg-pink-200 border-pink-300 text-pink-900 dark:bg-pink-900/50 dark:border-pink-500 dark:text-pink-100' },
            { id: 'mandarina', class: 'bg-amber-200 border-amber-300 text-amber-900 dark:bg-amber-900/50 dark:border-amber-500 dark:text-amber-100' },
            { id: 'cielo',     class: 'bg-sky-200 border-sky-300 text-sky-900 dark:bg-sky-900/50 dark:border-sky-500 dark:text-sky-100' },
            { id: 'coral',     class: 'bg-red-200 border-red-300 text-red-900 dark:bg-red-900/50 dark:border-red-500 dark:text-red-100' },
        ];

        // --- MÓDULOS ESPAÑOL ---
        const LEVELS = [
            { id: 'all',      name: 'Todos',    short: 'Todos',    icon: Users },
            { id: 'limbo',    name: 'Sin nivel', short: 'Sin nivel', icon: HelpCircle },
            { id: 'es1',      name: 'ES1 — Cimientos',          short: 'ES1', icon: LayoutGrid },
            { id: 'es2',      name: 'ES2 — Sistema Verbal',     short: 'ES2', icon: Zap },
            { id: 'es3',      name: 'ES3 — Presente I',         short: 'ES3', icon: Award },
            { id: 'es4',      name: 'ES4 — Presente II',        short: 'ES4', icon: Award },
            { id: 'es5',      name: 'ES5 — Tiempo y Narrativas', short: 'ES5', icon: Star },
            { id: 'es-mix1',  name: 'ES-Mix1 — Consolidación',  short: 'Mix1', icon: Star },
        ];

        // --- ARQUETIPOS (para el radar rápido) ---
        const calcArchetype = (s) => {
            const spk = parseInt(s.speaking) || 0;
            const lst = parseInt(s.listening) || 0;
            const rdn = parseInt(s.reading) || 0;
            const grm = parseInt(s.grammar) || 0;
            const voc = parseInt(s.vocabulary) || 0;
            const prn = parseInt(s.pronunciation) || 0;
            const total = spk + lst + rdn + grm + voc + prn;

            if (total <= 10) return { name: "Arrancando 🌱", desc: "Primer contacto con el español.", color: "text-stone-500" };
            if (total >= 54) return { name: "Casi Nativo 🌶️", desc: "Habla español hasta en sueños.", color: "text-amber-500" };
            if (grm >= 8 && spk <= 5) return { name: "Gramático Mudo 📚", desc: "Conjuga bien, pero no habla.", color: "text-blue-500" };
            if (spk >= 8 && grm <= 5) return { name: "Tarzán Español 🌴", desc: "Se hace entender, gramática libre.", color: "text-emerald-500" };
            if (lst >= 8 && spk <= 5) return { name: "Esponja Muda 🧽", desc: "Entiende todo, responde poco.", color: "text-cyan-500" };
            if (prn >= 8 && grm <= 5) return { name: "Loro Hispano 🦜", desc: "Suena perfecto, estructura mal.", color: "text-rose-500" };
            if (total < 25) return { name: "Superviviente 🐣", desc: "Sobrevive con frases básicas.", color: "text-orange-500" };
            if (total < 45) return { name: "Todo Terreno 🚙", desc: "Balanceado. Errores normales.", color: "text-teal-500" };
            return { name: "Avanzado Pulido 💎", desc: "Detalles finales por afinar.", color: "text-indigo-500" };
        };

        const getRandomColor = () => PALETTE[Math.floor(Math.random() * PALETTE.length)].class;
        const getNextFolio = (list) => {
            if (list.length === 0) return "0001";
            const folios = list.map(s => parseInt(s.folio) || 0);
            return String(Math.max(...folios) + 1).padStart(4, '0');
        };

        // --- COMPONENTE PRINCIPAL ---
        const StudentManager = () => {
            const [students,        setStudents]        = useState([]);
            const [newName,         setNewName]         = useState('');
            const [newLevel,        setNewLevel]        = useState('limbo');
            const [activeTab,       setActiveTab]       = useState('all');
            const [isDarkMode,      setIsDarkMode]      = useState(true);
            const [colorModal,      setColorModal]      = useState(null);
            const [radarModal,      setRadarModal]      = useState(null);
            const [radarSkills,     setRadarSkills]     = useState({ speaking: 0, listening: 0, reading: 0, grammar: 0, vocabulary: 0, pronunciation: 0 });
            const [isSavingRadar,   setIsSavingRadar]   = useState(false);
            const [toast,           setToast]           = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('themePreference');
                if (saved === 'light') setIsDarkMode(false);
                const unsub = onSnapshot(collection(db, ...STUDENTS_PATH), snap => {
                    const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    loaded.sort((a, b) => (parseInt(a.folio) || 9999) - (parseInt(b.folio) || 9999));
                    setStudents(loaded);
                });
                return () => unsub();
            }, []);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);
            const toggleTheme = () => { setIsDarkMode(d => { localStorage.setItem('themePreference', !d ? 'dark' : 'light'); return !d; }); };

            const showToast = () => { setToast(true); setTimeout(() => setToast(false), 2500); };

            const handleAddStudent = async (e) => {
                e.preventDefault();
                if (!newName.trim()) return;
                try {
                    await addDoc(collection(db, ...STUDENTS_PATH), {
                        name: newName.trim(),
                        folio: getNextFolio(students),
                        color: getRandomColor(),
                        level: newLevel,
                        skills: { speaking: 0, listening: 0, reading: 0, grammar: 0, vocabulary: 0, pronunciation: 0 },
                        createdAt: serverTimestamp()
                    });
                    setNewName('');
                    setNewLevel('limbo');
                } catch (err) { alert("Error: " + err.message); }
            };

            const handleDelete = async (id, name) => {
                if (confirm(`¿Eliminar a ${name}?`)) {
                    try { await deleteDoc(doc(db, ...STUDENTS_PATH, id)); }
                    catch (err) { alert("Error: " + err.message); }
                }
            };

            const handleLevelChange = async (id, level) => {
                try { await updateDoc(doc(db, ...STUDENTS_PATH, id), { level }); }
                catch (err) { alert("Error: " + err.message); }
            };

            const handleColorChange = async (student, colorClass) => {
                try {
                    await updateDoc(doc(db, ...STUDENTS_PATH, student.id), { color: colorClass });
                    setColorModal(null);
                } catch (err) { alert("Error: " + err.message); }
            };

            const openRadar = (student) => {
                setRadarSkills(student.skills || { speaking: 0, listening: 0, reading: 0, grammar: 0, vocabulary: 0, pronunciation: 0 });
                setRadarModal(student);
            };

            const saveRadar = async () => {
                if (!radarModal) return;
                setIsSavingRadar(true);
                try {
                    await updateDoc(doc(db, ...STUDENTS_PATH, radarModal.id), { skills: radarSkills });
                    setRadarModal(null);
                    showToast();
                } catch (err) { alert("Error: " + err.message); }
                setIsSavingRadar(false);
            };

            const filtered = activeTab === 'all' ? students : students.filter(s => (s.level || 'limbo') === activeTab);

            const RADAR_SKILLS_DEF = [
                { id: 'speaking',      icon: MessageCircle, label: 'Expresión Oral (Fluidez)',   color: 'text-emerald-500' },
                { id: 'listening',     icon: Ear,           label: 'Comprensión Auditiva',        color: 'text-cyan-500'    },
                { id: 'reading',       icon: BookOpen,      label: 'Lectura y Comprensión',       color: 'text-blue-500'    },
                { id: 'grammar',       icon: PenTool,       label: 'Gramática (Estructura)',       color: 'text-purple-500'  },
                { id: 'vocabulary',    icon: Brain,         label: 'Vocabulario (Léxico)',         color: 'text-rose-500'    },
                { id: 'pronunciation', icon: Mic,           label: 'Pronunciación y Acento',       color: 'text-pink-500'    },
            ];

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 transition-colors duration-300 pb-12">

                    {/* TOAST */}
                    {toast && (
                        <div className="fixed bottom-8 right-8 z-[100] bg-emerald-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 pointer-events-none">
                            <CheckCircle2 size={22}/><span className="font-black">¡Guardado!</span>
                        </div>
                    )}

                    {/* MODAL — COLOR */}
                    {colorModal && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] shadow-2xl w-full max-w-sm border border-slate-200 dark:border-zinc-800 p-6 text-center">
                                <h3 className="text-xl font-black mb-1 flex items-center justify-center gap-2"><Palette className="text-indigo-500"/> Cambiar Color</h3>
                                <p className="text-xs text-slate-500 dark:text-zinc-400 mb-6">Color de perfil de {colorModal.name}.</p>
                                <div className="grid grid-cols-4 gap-3 mb-6">
                                    {PALETTE.map(v => (
                                        <button key={v.id} onClick={() => handleColorChange(colorModal, v.class)}
                                            className={`h-12 w-12 rounded-full border-2 mx-auto transition-all ${v.class.split(' ')[0]} ${colorModal.color === v.class ? 'border-slate-900 dark:border-white ring-2 ring-slate-900 scale-110' : 'border-black/5 hover:scale-110'}`}
                                            title={v.id}/>
                                    ))}
                                </div>
                                <button onClick={() => setColorModal(null)} className="w-full py-3 bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl font-bold transition-colors">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL — RADAR RÁPIDO */}
                    {radarModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] shadow-2xl w-full max-w-lg border border-slate-200 dark:border-zinc-800 flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-start bg-slate-50 dark:bg-zinc-950 shrink-0">
                                    <div>
                                        <h3 className="text-2xl font-black flex items-center gap-2"><Activity className="text-indigo-500"/> Radar Rápido</h3>
                                        <p className="font-bold text-slate-500 dark:text-zinc-400 mt-1">{radarModal.name}</p>
                                    </div>
                                    <button onClick={() => setRadarModal(null)} className="p-2 bg-slate-200 dark:bg-zinc-800 hover:bg-slate-300 dark:hover:bg-zinc-700 rounded-full transition-colors"><X size={20}/></button>
                                </div>

                                <div className="p-6 space-y-5 overflow-y-auto custom-scrollbar flex-1">
                                    {/* ARQUETIPO */}
                                    <div className="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800 rounded-xl p-4 text-center">
                                        <p className="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1">Arquetipo</p>
                                        <h4 className={`text-xl font-black ${calcArchetype(radarSkills).color}`}>{calcArchetype(radarSkills).name}</h4>
                                        <p className="text-sm font-medium text-slate-600 dark:text-zinc-400 mt-1">{calcArchetype(radarSkills).desc}</p>
                                        <p className="mt-3 font-black text-lg text-indigo-900 dark:text-indigo-300">
                                            {Object.values(radarSkills).reduce((a, b) => a + Number(b), 0)}
                                            <span className="text-sm opacity-50 ml-1">/ 60 pts</span>
                                        </p>
                                    </div>

                                    {/* SLIDERS */}
                                    <div className="space-y-4">
                                        {RADAR_SKILLS_DEF.map(sk => (
                                            <div key={sk.id}>
                                                <div className="flex justify-between items-center mb-2">
                                                    <label className={`text-xs font-bold uppercase tracking-widest flex items-center gap-1.5 ${sk.color}`}>
                                                        <sk.icon size={14}/> {sk.label}
                                                    </label>
                                                    <span className="font-black text-sm w-6 text-right text-slate-700 dark:text-slate-300">{radarSkills[sk.id] || 0}</span>
                                                </div>
                                                <input type="range" min="0" max="10" step="1"
                                                    value={radarSkills[sk.id] || 0}
                                                    onChange={e => setRadarSkills({ ...radarSkills, [sk.id]: e.target.value })}
                                                    className="w-full"/>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="p-6 bg-slate-50 dark:bg-zinc-950 border-t border-slate-200 dark:border-zinc-800 flex justify-end gap-3 shrink-0">
                                    <button onClick={() => setRadarModal(null)} className="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors">Cancelar</button>
                                    <button onClick={saveRadar} disabled={isSavingRadar} className="px-6 py-2.5 rounded-xl font-black bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg flex items-center gap-2 disabled:opacity-50">
                                        <Save size={18}/> Guardar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href = 'index-es.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <div className="bg-indigo-500 p-2 rounded-lg text-white shadow-md"><Users size={20}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 dark:text-white leading-none">ALUMNOS ESPAÑOL</h1>
                                    <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mt-1">Anita · Directorio & Niveles</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-100 dark:bg-zinc-800 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-500 dark:text-zinc-400 hidden md:block">
                                    Total: {students.length}
                                </div>
                                <button onClick={toggleTheme} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors">
                                    {isDarkMode ? <Sun size={18}/> : <Moon size={18}/>}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">

                        {/* FORM — NUEVO ALUMNO */}
                        <div className="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl border border-slate-200 dark:border-zinc-800 p-6 sm:p-8 mb-8">
                            <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-slate-800 dark:text-white">
                                <UserPlus className="text-indigo-500"/> Registrar Nuevo Alumno
                            </h2>
                            <form onSubmit={handleAddStudent} className="flex flex-col gap-4">
                                <div className="flex flex-col sm:flex-row gap-3">
                                    <input type="text" value={newName} onChange={e => setNewName(e.target.value)}
                                        placeholder="Nombre del alumno..."
                                        className="flex-1 bg-slate-50 dark:bg-zinc-950 border-2 border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 dark:text-white transition-colors"/>
                                    <button type="submit" disabled={!newName.trim()}
                                        className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg transition-colors flex items-center justify-center gap-2 shrink-0">
                                        <Plus size={18}/> <span className="hidden sm:inline">Agregar</span>
                                    </button>
                                </div>

                                {/* NIVEL INICIAL */}
                                <div className="flex flex-wrap items-center gap-2 mt-1">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mr-1">Módulo inicial:</span>
                                    {LEVELS.filter(l => l.id !== 'all').map(lvl => (
                                        <label key={lvl.id} className="cursor-pointer">
                                            <input type="radio" name="levelSelect" value={lvl.id}
                                                checked={newLevel === lvl.id}
                                                onChange={e => setNewLevel(e.target.value)}
                                                className="sr-only peer"/>
                                            <div className="px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition-all peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 peer-checked:text-indigo-600 dark:peer-checked:text-indigo-400 bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-slate-500 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-700 flex items-center gap-1.5">
                                                <lvl.icon size={13}/> {lvl.short}
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </form>
                        </div>

                        {/* TABS */}
                        <div className="flex overflow-x-auto custom-scrollbar gap-2 pb-2 mb-6">
                            {LEVELS.map(tab => {
                                const count = tab.id === 'all' ? students.length : students.filter(s => (s.level || 'limbo') === tab.id).length;
                                return (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-sm whitespace-nowrap transition-colors border-2 ${activeTab === tab.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800'}`}>
                                        <tab.icon size={15}/> {tab.short}
                                        <span className={`text-[10px] px-1.5 py-0.5 rounded-md ${activeTab === tab.id ? 'bg-white/20 text-white' : 'bg-slate-200 dark:bg-zinc-700 text-slate-500 dark:text-zinc-400'}`}>{count}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* GRID */}
                        {filtered.length === 0 ? (
                            <div className="text-center py-16 bg-white dark:bg-zinc-900 rounded-3xl border-2 border-dashed border-slate-200 dark:border-zinc-800">
                                <Users size={48} className="mx-auto text-slate-300 dark:text-zinc-700 mb-4"/>
                                <h3 className="text-xl font-bold text-slate-500 dark:text-zinc-500">No hay alumnos en este módulo.</h3>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {filtered.map(student => {
                                    const archetype = student.skills ? calcArchetype(student.skills) : { name: "Sin evaluar", desc: "Usa el radar para perfilar.", color: "text-slate-400" };
                                    const total = student.skills ? Object.values(student.skills).reduce((a, b) => a + Number(b), 0) : 0;
                                    const levelLabel = LEVELS.find(l => l.id === (student.level || 'limbo'))?.name || 'Sin nivel';

                                    return (
                                        <div key={student.id}
                                            className={`rounded-2xl p-5 border shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow relative overflow-hidden ${student.color || 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-800'}`}>

                                            {/* CABECERA */}
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <div className="flex items-center gap-1.5 mb-0.5 opacity-60">
                                                        <Hash size={11}/>
                                                        <span className="text-[10px] font-black tracking-widest">{student.folio || '0000'}</span>
                                                    </div>
                                                    <h3 className="font-black text-xl truncate pr-2" title={student.name}>{student.name}</h3>
                                                </div>
                                                <div className="flex items-center gap-1">
                                                    <button onClick={() => setColorModal(student)} className="opacity-50 hover:opacity-100 hover:text-indigo-500 transition-colors p-1" title="Cambiar color"><Palette size={16}/></button>
                                                    <button onClick={() => handleDelete(student.id, student.name)} className="opacity-50 hover:opacity-100 hover:text-red-500 transition-colors p-1" title="Eliminar"><Trash2 size={16}/></button>
                                                </div>
                                            </div>

                                            {/* ARQUETIPO + ACCIONES */}
                                            <div className="mb-3 flex items-center justify-between bg-white/40 dark:bg-black/20 p-3 rounded-xl border border-black/5 dark:border-white/5">
                                                <div className="flex flex-col flex-1 pr-2 min-w-0">
                                                    <span className={`text-[10px] font-black uppercase tracking-widest ${archetype.color} truncate`}>{archetype.name}</span>
                                                    {student.skills ? (
                                                        <div className="flex items-center gap-1.5 mt-1 opacity-60">
                                                            <div className="w-full max-w-[72px] h-1.5 bg-black/10 dark:bg-white/10 rounded-full overflow-hidden">
                                                                <div className="h-full bg-current" style={{ width: `${(total / 60) * 100}%` }}/>
                                                            </div>
                                                            <span className="text-[9px] font-bold shrink-0">{total}/60</span>
                                                        </div>
                                                    ) : (
                                                        <span className="text-[9px] font-bold opacity-60 mt-1 truncate">{archetype.desc}</span>
                                                    )}
                                                </div>
                                                <div className="flex gap-1.5 shrink-0">
                                                    {/* EVALUACIÓN DETALLADA */}
                                                    <button
                                                        onClick={() => window.location.href = `evaluaciones-es.html?id=${student.id}`}
                                                        title="Evaluación detallada (módulo español)"
                                                        className="p-2 bg-white/60 dark:bg-black/40 hover:bg-rose-500 hover:text-white rounded-lg transition-colors shadow-sm">
                                                        <Target size={16}/>
                                                    </button>
                                                    {/* RADAR RÁPIDO */}
                                                    <button
                                                        onClick={() => openRadar(student)}
                                                        title="Radar rápido de macro-habilidades"
                                                        className="p-2 bg-white/60 dark:bg-black/40 hover:bg-indigo-500 hover:text-white rounded-lg transition-colors shadow-sm">
                                                        <Activity size={16}/>
                                                    </button>
                                                </div>
                                            </div>

                                            {/* SELECTOR DE MÓDULO */}
                                            <select
                                                value={student.level || 'limbo'}
                                                onChange={e => handleLevelChange(student.id, e.target.value)}
                                                className="w-full bg-white/50 dark:bg-black/20 border border-black/10 dark:border-white/10 rounded-lg px-2 py-1.5 text-xs font-bold outline-none cursor-pointer appearance-none">
                                                {LEVELS.filter(l => l.id !== 'all').map(lvl => (
                                                    <option key={lvl.id} value={lvl.id} className="bg-white dark:bg-zinc-900 text-slate-800 dark:text-white">{lvl.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentManager />);
    </script>
</body>
</html>

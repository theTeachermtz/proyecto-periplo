<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥪</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.263.1","firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"}}</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body{font-family:'Plus Jakarta Sans',sans-serif;height:100dvh;overflow:hidden}
        .custom-scrollbar::-webkit-scrollbar{width:5px}.custom-scrollbar::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:4px}
    </style>
</head>
<body class="bg-zinc-950"><div id="root"></div>
<script type="text/babel" data-type="module">
import React,{useState,useEffect} from 'react';
import {createRoot} from 'react-dom/client';
import {initializeApp} from 'firebase/app';
import {getFirestore,collection,addDoc,updateDoc,doc,getDoc,serverTimestamp} from 'firebase/firestore';
import {Sparkles,Zap,Save,Edit3,ArrowLeft,Loader2,Search,CheckCircle2,Circle,Sun,Moon,Star,Eye,Tags,ShoppingCart,Settings2,X} from 'lucide-react';

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);

// ============================================================
// TAXONOMÍA MAESTRA
// ============================================================
const TAXONOMY={
basic:{
grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)"],
verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival"],
nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway"],
adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste"],
key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs"]
},
advanced:{
grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention"],
verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound"],
nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science"],
adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives"],
key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice"]
},
pro:{
grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals"],
verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations"],
nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic"],
adjectives:["Formal Register Adj.","Nuance & Tone Adj."],
key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives"]
}
};

const CAT_COLORS={grammar:'indigo',verbs:'rose',nouns:'sky',adjectives:'pink',key_structs:'amber'};

// ============================================================
// CONTENT EDITOR (Revisa las múltiples pestañas generadas)
// ============================================================
const ContentEditor=({content,onSave,title,setTitle,isEditing})=>{
    const[ec,setEc]=useState(content);
    const tabs = Object.keys(ec).filter(k => Array.isArray(ec[k]) && ec[k].length > 0);
    const[tab,setTab]=useState(tabs[0] || '');
    
    const hc=(s,i,f,v)=>{const u={...ec};u[s][i][f]=v;setEc(u)};
    
    return(
        <div className="h-[100dvh] flex flex-col bg-zinc-950 text-zinc-100">
            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-3">
                <h2 className="text-base font-black flex items-center gap-2"><Edit3 size={18}/>{isEditing?"Editar Juego":"Revisión Final"}</h2>
                <div className="flex gap-2">
                    <button onClick={()=>window.location.reload()} className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl font-bold text-sm">Cancelar</button>
                    <button onClick={()=>onSave(ec)} className="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 text-sm"><Save size={16}/>{isEditing?"Actualizar":"Guardar"}</button>
                </div>
            </div>
            <div className="p-4 border-b border-zinc-800 shrink-0">
                <label className="block text-[10px] font-black text-zinc-500 uppercase mb-1">Título</label>
                <input value={title} onChange={e=>setTitle(e.target.value)} className="w-full text-lg font-bold p-3 bg-zinc-900 border-2 border-zinc-800 rounded-xl outline-none focus:border-indigo-500" placeholder="Connect 4: Mi Examen"/>
            </div>
            
            <div className="flex gap-2 border-b border-zinc-800 px-4 shrink-0 overflow-x-auto custom-scrollbar">
                {tabs.map(t=>(
                    <button key={t} onClick={()=>setTab(t)} className={`px-4 py-2.5 font-bold capitalize text-sm border-b-4 transition-all whitespace-nowrap ${tab===t?'border-indigo-500 text-indigo-400':'border-transparent text-zinc-500 hover:text-zinc-300'}`}>
                        {t} ({ec[t]?.length||0})
                    </button>
                ))}
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar bg-zinc-950">
                {tab==='multipleChoice'&&ec.multipleChoice?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800">
                        <span className="font-bold text-zinc-500 text-xs">Q #{i+1}</span>
                        <input value={item.question} onChange={e=>hc('multipleChoice',i,'question',e.target.value)} className="w-full p-2 mt-2 mb-3 border border-zinc-700 rounded bg-zinc-950 text-sm font-medium outline-none focus:border-indigo-500"/>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">{item.options.map((opt,oi)=>(
                            <div key={oi} className={`flex items-center gap-2 p-2 rounded border ${oi===item.correct?'bg-emerald-900/30 border-emerald-800':'bg-zinc-950 border-zinc-700'}`}>
                                <button onClick={()=>{const u={...ec};u.multipleChoice[i].correct=oi;setEc(u)}} className="shrink-0">{oi===item.correct?<CheckCircle2 className="text-emerald-400" size={18}/>:<Circle className="text-zinc-600" size={18}/>}</button>
                                <input value={opt} onChange={e=>{const u={...ec};u.multipleChoice[i].options[oi]=e.target.value;setEc(u)}} className="w-full text-xs font-bold bg-transparent outline-none"/>
                            </div>
                        ))}</div>
                    </div>
                ))}
                
                {tab==='dragDrop'&&ec.dragDrop?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Sentence (use [BLANK]):</span><input value={item.sentence} onChange={e=>hc('dragDrop',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none focus:border-indigo-500"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Correct Answer:</span><input value={item.correct} onChange={e=>hc('dragDrop',i,'correct',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none focus:border-emerald-500"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Distractor Options (comma separated):</span><input value={item.options.join(',')} onChange={e=>hc('dragDrop',i,'options',e.target.value.split(','))} className="w-full p-2 border border-zinc-700 bg-transparent rounded outline-none focus:border-indigo-500"/></div>
                    </div>
                ))}

                {tab==='unscramble'&&ec.unscramble?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">English Text:</span><input value={item.text} onChange={e=>hc('unscramble',i,'text',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none focus:border-indigo-500"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Spanish Translation:</span><input value={item.translation} onChange={e=>hc('unscramble',i,'translation',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded italic text-zinc-400 outline-none focus:border-indigo-500"/></div>
                    </div>
                ))}

                {tab==='fillBlank'&&ec.fillBlank?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Sentence (use [BLANK]):</span><input value={item.sentence} onChange={e=>hc('fillBlank',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none focus:border-indigo-500"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-zinc-500">Answer:</span><input value={item.answer} onChange={e=>hc('fillBlank',i,'answer',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-zinc-500">Hint (e.g. "p_ _ _ _"):</span><input value={item.hint} onChange={e=>hc('fillBlank',i,'hint',e.target.value)} className="w-full p-2 border border-amber-700/50 bg-amber-900/20 text-amber-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}

                {tab==='matching'&&ec.matching?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <span className="font-bold text-zinc-500 text-xs">Matching Set #{i+1}</span>
                        {item.pairs.map((p,pi)=>(
                            <div key={pi} className="flex gap-2">
                                <input value={p.left} onChange={e=>{const u={...ec};u.matching[i].pairs[pi].left=e.target.value;setEc(u)}} className="flex-1 p-2 border border-zinc-700 bg-transparent rounded text-sm"/>
                                <input value={p.right} onChange={e=>{const u={...ec};u.matching[i].pairs[pi].right=e.target.value;setEc(u)}} className="flex-1 p-2 border border-zinc-700 bg-transparent rounded text-sm"/>
                            </div>
                        ))}
                    </div>
                ))}

                {tab==='errorCorrection'&&ec.errorCorrection?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Sentence with Error:</span><input value={item.sentence} onChange={e=>hc('errorCorrection',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none focus:border-indigo-500"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-rose-500">Wrong Word:</span><input value={item.error} onChange={e=>hc('errorCorrection',i,'error',e.target.value)} className="w-full p-2 border border-rose-700/50 bg-rose-900/20 text-rose-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-emerald-500">Correction:</span><input value={item.correction} onChange={e=>hc('errorCorrection',i,'correction',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
};

// ============================================================
// MAIN DASHBOARD
// ============================================================
const Dashboard=()=>{
    const[apiKey,setApiKey]=useState(localStorage.getItem('periplo_google_key')||'');
    const[gameTitle,setGameTitle]=useState('');
    const[ingredients,setIngredients]=useState({});
    const[selectedLevel,setSelectedLevel]=useState('basic');
    const[selectedCat,setSelectedCat]=useState('grammar');
    
    // NUEVO: ESTADO DE CONFIGURACIÓN DE PREGUNTAS
    const[showConfig,setShowConfig]=useState(false);
    const[qConfig,setQConfig]=useState({
        mc: 5,   // multipleChoice
        dad: 5,  // dragDrop
        scr: 5,  // unscramble
        fib: 0,  // fillBlank
        mat: 0,  // matching
        err: 0   // errorCorrection
    });

    const[isGenerating,setIsGenerating]=useState(false);
    const[generatedContent,setGeneratedContent]=useState(null);
    const[editingId,setEditingId]=useState(null);
    const[isLoading,setIsLoading]=useState(false);
    const[models,setModels]=useState([]);
    const[selModel,setSelModel]=useState('');
    const[loadingModels,setLoadingModels]=useState(false);

    useEffect(()=>{
        const init=async()=>{
            const p=new URLSearchParams(window.location.search);const eid=p.get('edit');
            if(eid){setIsLoading(true);try{const s=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',eid));if(s.exists()){const d=s.data();setGeneratedContent(d.content);setGameTitle(d.title);setEditingId(eid);}}catch(e){alert(e.message)}setIsLoading(false);}
        };init();
    },[]);

    const toggle=(name)=>{setIngredients(prev=>{const n={...prev};if(n[name])delete n[name];else n[name]={priority:1};return n})};
    const setPrio=(name,lv)=>{setIngredients(prev=>({...prev,[name]:{...prev[name],priority:lv}}))};
    const updateQConfig=(key,val)=>{setQConfig(prev=>({...prev,[key]:parseInt(val)}))};

    const fetchModels=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");setLoadingModels(true);
        try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);if(!r.ok)throw new Error("Error");const d=await r.json();
        const v=d.models.filter(m=>m.supportedGenerationMethods?.includes("generateContent")).map(m=>m.name);setModels(v);
        if(v.length>0)setSelModel(v.find(m=>m.includes("gemini-2.5-flash"))||v.find(m=>m.includes("gemini-2.0"))||v[0]);
        }catch(e){alert(e.message)}setLoadingModels(false);
    };

    const generate=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");
        if(!selModel)return alert("Escanea modelos primero (🔍)");
        const items=Object.keys(ingredients);if(!items.length)return alert("Agrega ingredientes.");
        
        const totalQ = Object.values(qConfig).reduce((a,b)=>a+b,0);
        if(totalQ === 0) return alert("Configura al menos 1 pregunta en el menú del engranaje ⚙️");

        const high=items.filter(k=>ingredients[k].priority===3);
        const med=items.filter(k=>ingredients[k].priority===2);
        const low=items.filter(k=>ingredients[k].priority===1);
        const ctx=items.filter(k=>ingredients[k].priority===0);
        if(!high.length&&!med.length&&!low.length)return alert("Asigna al menos 1 estrella a un ingrediente.");
        
        setIsGenerating(true);
        
        // PROMPT DINÁMICO BASADO EN LA CONFIGURACIÓN DEL USUARIO
        const prompt=`You are an expert ESL test creator. Create a JSON object for an educational game.

EVALUATION PRIORITIES (these MUST be the focus of the blanks/questions):
- High Priority: ${high.join(', ')||'None'}
- Medium Priority: ${med.join(', ')||'None'}
- Low Priority: ${low.join(', ')||'None'}
CONTEXT (use to build natural sentences, NOT as the main test target): ${ctx.join(', ')||'None'}

Generate EXACTLY these quantities of question types:
${qConfig.mc > 0 ? `- 'multipleChoice' array: ${qConfig.mc} items. Format: {"question":"...","options":["A","B","C","D"],"correct":int(0-3)}` : ''}
${qConfig.dad > 0 ? `- 'dragDrop' array: ${qConfig.dad} items. Format: {"sentence":"I [BLANK] to the store.","options":["wrong1","correct","wrong2"],"correct":"correct"}` : ''}
${qConfig.scr > 0 ? `- 'unscramble' array: ${qConfig.scr} items. Format: {"text":"Correct English sentence","translation":"Spanish translation"}` : ''}
${qConfig.fib > 0 ? `- 'fillBlank' array: ${qConfig.fib} items. Format: {"sentence":"Sentence with a [BLANK].","answer":"correct_word","hint":"w _ _ _ (starts with w, 4 letters)"}` : ''}
${qConfig.mat > 0 ? `- 'matching' array: ${qConfig.mat} items. Each item is a set of 4-5 pairs. Format: {"pairs":[{"left":"English term/sentence half","right":"Spanish/Matching half"}, ...]}` : ''}
${qConfig.err > 0 ? `- 'errorCorrection' array: ${qConfig.err} items. Format: {"sentence":"Sentence with ONE grammatical error.","error":"the wrong word","correction":"the right word"}` : ''}

Output STRICT JSON containing ONLY the requested arrays. Do not include markdown formatting like \`\`\`json.`;

        try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/${selModel}:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseMimeType:"application/json"}})});
        const d=await r.json();if(d.error)throw new Error(d.error.message);if(!d.candidates?.[0]?.content)throw new Error("Sin resultados.");
        const t=d.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();setGeneratedContent(JSON.parse(t));
        }catch(e){alert("Error: "+e.message)}setIsGenerating(false);
    };

    const saveToFirebase=async(final)=>{
        if(!gameTitle)return alert("Ponle título");
        try{
            // Opcional: auto-capitalizar unscramble si existe
            let proc={...final};
            if(proc.unscramble) {
                proc.unscramble = proc.unscramble.map(s=>{let t=s.text.replace(/\//g,'').replace(/[()]/g,'');t=t.charAt(0).toUpperCase()+t.slice(1);if(!t.endsWith('.'))t+='.';return{...s,text:t,words:t.split(' ').filter(w=>w.trim())}});
            }
            const p=new URLSearchParams(window.location.search);const fp=p.get('folder');
            const pp=(fp&&fp!=='undefined'&&fp!=='null')?decodeURIComponent(fp):'';
            const selItems=Object.keys(ingredients);
            const tags={level:selectedLevel,ingredients:selItems};
            
            if(editingId){await updateDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',editingId),{title:gameTitle,content:proc,tags,updatedAt:serverTimestamp()});}
            else{await addDoc(collection(db,'artifacts','periplo-app-v1','users','teacher_builder_001','quizzes'),{title:gameTitle,type:'CONNECT4',content:proc,tags,createdAt:serverTimestamp(),parentPath:pp});}
            window.location.href=pp?`index.html?folder=${encodeURIComponent(pp)}`:'index.html';
        }catch(e){alert(e.message)}
    };

    if(isLoading)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-zinc-500"><Loader2 className="animate-spin mr-2"/>Cargando...</div>;
    if(generatedContent)return<ContentEditor content={generatedContent} onSave={saveToFirebase} title={gameTitle} setTitle={setGameTitle} isEditing={!!editingId}/>;

    const cats=Object.keys(TAXONOMY[selectedLevel]||{}).filter(c=>(TAXONOMY[selectedLevel][c]||[]).length>0);
    const currentTopics=TAXONOMY[selectedLevel]?.[selectedCat]||[];
    const ingCount=Object.keys(ingredients).length;

    return(
        <div className="h-[100dvh] flex flex-col text-zinc-100">
            {/* MODAL DE CONFIGURACIÓN */}
            {showConfig && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-zinc-900 border border-zinc-700 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-lg font-black flex items-center gap-2"><Settings2 className="text-indigo-400"/>Configurar Examen</h2>
                            <button onClick={()=>setShowConfig(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                        </div>
                        <div className="space-y-4">
                            {[
                                {k:'mc',n:'Opción Múltiple (A,B,C,D)',c:'bg-indigo-500'},
                                {k:'dad',n:'Drag & Drop (Fill Blank)',c:'bg-rose-500'},
                                {k:'scr',n:'Unscramble (Ordenar frase)',c:'bg-amber-500'},
                                {k:'fib',n:'Completar (Hint Text Input)',c:'bg-emerald-500'},
                                {k:'mat',n:'Match (Unir 5 pares)',c:'bg-cyan-500'},
                                {k:'err',n:'Error Correction (Corregir)',c:'bg-pink-500'}
                            ].map(t=>(
                                <div key={t.k} className="flex items-center justify-between">
                                    <label className="text-xs font-bold text-zinc-300 flex items-center gap-2">
                                        <div className={`w-2 h-2 rounded-full ${t.c}`}></div>{t.n}
                                    </label>
                                    <div className="flex items-center gap-2">
                                        <input type="range" min="0" max="20" value={qConfig[t.k]} onChange={e=>updateQConfig(t.k,e.target.value)} className="w-24 accent-indigo-500"/>
                                        <span className="text-sm font-black w-6 text-right">{qConfig[t.k]}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>setShowConfig(false)} className="w-full mt-8 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold">Aceptar</button>
                    </div>
                </div>
            )}

            {/* HEADER */}
            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-2">
                <div className="flex items-center gap-3 min-w-0">
                    <button onClick={()=>window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl"><ArrowLeft size={18}/></button>
                    <h1 className="text-base font-black flex items-center gap-2 truncate"><Sparkles className="text-blue-400 w-4 h-4 flex-shrink-0"/>Connect 4 Builder</h1>
                </div>
                <div className="flex items-center gap-1.5 flex-shrink-0">
                    <input type="password" placeholder="API Key..." value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem('periplo_google_key',e.target.value)}} className="bg-zinc-900 border border-zinc-700 text-white rounded-lg px-2 py-1.5 text-xs font-mono w-28 focus:border-blue-500 outline-none"/>
                    <button onClick={fetchModels} disabled={loadingModels||!apiKey} className="p-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg">{loadingModels?<Loader2 className="animate-spin" size={14}/>:<Search size={14}/>}</button>
                    {models.length>0&&<select value={selModel} onChange={e=>setSelModel(e.target.value)} className="bg-zinc-900 border border-zinc-700 rounded-lg px-1.5 py-1.5 text-[10px] text-white max-w-[120px] outline-none">{models.map(m=><option key={m} value={m}>{m.replace('models/','')}</option>)}</select>}
                </div>
            </div>

            <div className="flex flex-1 flex-col md:flex-row overflow-hidden">
                {/* LEFT: TAXONOMY INGREDIENT PICKER */}
                <div className="w-full md:w-[42%] xl:w-[36%] border-b md:border-b-0 md:border-r border-zinc-800 flex flex-col h-[45%] md:h-full bg-zinc-950">
                    <div className="p-4 border-b border-zinc-800 shrink-0">
                        <h2 className="font-black text-sm flex items-center gap-2"><Tags className="text-indigo-400" size={16}/>Ingredientes</h2>
                        <p className="text-[10px] text-zinc-500 font-bold mt-1">Selecciona temas para que la IA genere preguntas.</p>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-5 custom-scrollbar">
                        {/* Level */}
                        <div>
                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Nivel</label>
                            <select value={selectedLevel} onChange={e=>{setSelectedLevel(e.target.value);const c=Object.keys(TAXONOMY[e.target.value]||{}).filter(k=>(TAXONOMY[e.target.value][k]||[]).length>0);setSelectedCat(c[0]||'grammar');}}
                                className="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5 text-sm font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                            </select>
                        </div>
                        {/* Category tabs */}
                        <div>
                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Categoría</label>
                            <div className="flex flex-wrap gap-1.5">
                                {cats.map(c=><button key={c} onClick={()=>setSelectedCat(c)} className={`px-3 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${selectedCat===c?`bg-${CAT_COLORS[c]||'indigo'}-600 text-white`:'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>{c.replace('_',' ')}</button>)}
                            </div>
                        </div>
                        {/* Topics */}
                        <div className="space-y-2">
                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Temas</label>
                            {currentTopics.map(topic=>{
                                const isIn=!!ingredients[topic];
                                return(<button key={topic} onClick={()=>toggle(topic)}
                                    className={`w-full text-left p-3 rounded-xl border-2 font-bold text-sm transition-all ${isIn?'bg-indigo-600/20 border-indigo-500 text-indigo-300':'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-indigo-500/50 active:scale-[0.98]'}`}>
                                    <div className="flex justify-between items-center">
                                        <span>{topic}</span>
                                        {isIn&&<span className="text-[10px] bg-indigo-500/30 text-indigo-300 px-2 py-0.5 rounded">✓</span>}
                                    </div>
                                </button>);
                            })}
                        </div>
                    </div>
                </div>

                {/* RIGHT: EVALUATION TRAY (STARS) */}
                <div className="w-full md:w-[58%] xl:w-[64%] flex flex-col h-[55%] md:h-full bg-zinc-900 relative">
                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center shrink-0 bg-zinc-950/50">
                        <div>
                            <h3 className="font-black text-base flex items-center gap-2"><ShoppingCart className="text-blue-400" size={16}/>Bandeja de Evaluación</h3>
                            <p className="text-[10px] text-zinc-500 font-bold mt-0.5">⭐ = evaluar como respuesta correcta | 👁️ = solo contexto</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={()=>setShowConfig(true)} className="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-xl text-xs font-black border border-zinc-700 flex items-center gap-2 transition-colors">
                                <Settings2 size={16}/> {Object.values(qConfig).reduce((a,b)=>a+b,0)} Qs
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar">
                        {ingCount===0?(
                            <div className="h-full flex flex-col items-center justify-center text-zinc-600">
                                <ShoppingCart size={40} className="mb-3 opacity-40"/>
                                <p className="font-bold">Bandeja vacía</p>
                                <p className="text-xs mt-1">Selecciona ingredientes en el panel izquierdo.</p>
                            </div>
                        ):(
                            <div className="space-y-2.5 pb-28">
                                {Object.entries(ingredients).map(([name,data])=>(
                                    <div key={name} className="flex items-center justify-between gap-3 p-3 bg-zinc-950 border border-zinc-800 rounded-xl">
                                        <span className="font-bold text-sm text-zinc-200 truncate flex-1">{name}</span>
                                        <div className="flex bg-zinc-900 border border-zinc-700 rounded-xl overflow-hidden shrink-0">
                                            <button onClick={()=>setPrio(name,0)} className={`flex items-center px-2.5 py-1.5 border-r border-zinc-700 ${data.priority===0?'bg-zinc-700 text-white':'text-zinc-500 hover:bg-zinc-800'}`} title="Solo contexto"><Eye size={14}/></button>
                                            {[1,2,3].map(lv=>(
                                                <button key={lv} onClick={()=>setPrio(name,lv)} className={`flex items-center px-2 py-1.5 ${lv<3?'border-r border-zinc-700':''} ${data.priority>=lv?'text-amber-400':'text-zinc-600 hover:bg-zinc-800'}`} title={`Prioridad ${lv}`}>
                                                    {Array.from({length:lv},(_,i)=><Star key={i} size={12} className={`${data.priority>=lv?'fill-current':''} ${i>0?'-ml-1':''}`}/>)}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* GENERATE BUTTON */}
                    <div className="absolute bottom-5 left-4 right-4 z-20">
                        <button onClick={generate} disabled={isGenerating||!ingCount} className="w-full bg-white text-zinc-900 py-4 rounded-2xl font-black text-lg hover:bg-blue-500 hover:text-white transition-all flex items-center justify-center gap-3 disabled:opacity-40 disabled:cursor-not-allowed shadow-2xl">
                            {isGenerating?<><Loader2 className="animate-spin"/>Cocinando...</>:<><Zap className="fill-amber-400 text-amber-500"/>GENERAR JUEGO</>}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📽️</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Serif+Display&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap'); 
        body { font-family: 'Outfit', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        
        /* Mini preview */
        .mini-preview {
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            font-size: 5px;
            display: flex;
            position: relative;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Presentation, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Plus, Trash2, ArrowUp, ArrowDown, LayoutTemplate, Settings2, Gamepad2, BookOpen, Copy, Eye, ChevronDown, Palette, Image, Table, GitBranch, Quote, Columns, Type, Star } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // CONSTANTS (TAXONOMY ACTUALIZADA SEGÚN ARQUITECTURA)
        // ============================================================
        const TAXONOMY = {
            basic: { 
                grammar: ["Modal Verbs", "Present Simple", "Present Continuous", "Future (Going to)", "Otro"], 
                verbs: ["Pack 1: Daily Routine", "Pack 2", "Pack 3", "Pack 4", "Pack 5", "Pack 6", "Pack 7", "Pack 8", "Pack 9: Medical & Survival", "Otro"], 
                nouns: ["Pack 1: Modern Nomad", "Pack 2", "Pack 3", "Pack 4", "Pack 5: Weekend Getaway", "Otro"],
                adjectives: ["Pack 1: Personality & Looks", "Pack 2", "Pack 3", "Pack 4", "Pack 5: Opinions & Taste", "Otro"],
                key_structs: ["WH Questions", "FANBOYS & Correlative", "Subordinating Conj.", "Preps x3", "Possessive & Object Pron.", "Quantifiers", "Frequency Adverbs", "Otro"],
                otro: ["Otro"]
            },
            advanced: { 
                grammar: ["Past Simple", "Second Conditional", "Past Continuous", "Past Future Intention", "Otro"], 
                verbs: ["Irregular A-F", "Irregular G-M", "Irregular N-Z", "Regular /ɪd/ Sound", "Otro"], 
                nouns: ["Pack 1: Success & Failure", "Pack 2", "Pack 3", "Pack 4", "Pack 5: Env. & Science", "Otro"],
                adjectives: ["Short/Long/Irregular Comparatives", "Superlatives", "Otro"],
                key_structs: ["Used to", "Comparative/Superlative Rules", "Idioms", "Possessive Nouns", "Relative Clauses", "Modals of Possibility", "Passive Voice", "Otro"], 
                otro: ["Otro"]
            },
            pro: { 
                grammar: ["Present/Past Perfect", "Perfect Continuous", "Third Conditional", "Mixed Conditionals", "Otro"], 
                verbs: ["Phrasal Verbs 2", "Idiomatic Expressions", "Sayings & Proverbs", "Advanced Collocations", "Otro"],
                nouns: ["Pack 1: Law & Politics", "Pack 2", "Pack 3", "Pack 4", "Pack 5: Formal & Academic", "Otro"],
                adjectives: ["Formal Register Adj.", "Nuance & Tone Adj.", "Otro"],
                key_structs: ["Inversion", "Cleft Sentences", "Participle Clauses", "Wish & Regret", "Double Comparatives", "Otro"], 
                otro: ["Otro"]
            },
            otro: { otro: ["Otro"] }
        };

        const THEMES = {
            dark:    { id: 'dark',    label: 'Midnight',   preview: '#18181b', accent: '#3b82f6' },
            warm:    { id: 'warm',    label: 'Terracotta', preview: '#8B6F5E', accent: '#C75B3F' },
            cool:    { id: 'cool',    label: 'Ocean',      preview: '#6B98B8', accent: '#E8956A' },
            forest:  { id: 'forest',  label: 'Forest',     preview: '#2D5016', accent: '#F5C842' },
            sunset:  { id: 'sunset',  label: 'Sunset',     preview: '#C75B3F', accent: '#F5C842' },
            cream:   { id: 'cream',   label: 'Cream',      preview: '#F5EDE2', accent: '#C75B3F' },
        };

        const LAYOUT_OPTIONS = [
            { id: 'cover',                    label: 'Portada',                icon: '◆', group: 'Estructura' },
            { id: 'hero',                     label: 'Hero (Texto Grande)',    icon: '★', group: 'Texto' },
            { id: 'title-bullets',            label: 'Título + Bullets',      icon: '≡', group: 'Texto' },
            { id: 'split-text-image-left',    label: 'Texto Izq / Visual Der',icon: '◧', group: 'Dividido' },
            { id: 'split-text-image-right',   label: 'Texto Der / Visual Izq',icon: '◨', group: 'Dividido' },
            { id: 'two-columns',              label: 'Dos Columnas',          icon: '⊞', group: 'Comparación' },
            { id: 'table-notes',              label: 'Tabla + Notas',         icon: '▦', group: 'Datos' },
            { id: 'mind-map',                 label: 'Mapa Mental',           icon: '✳', group: 'Diagrama' },
            { id: 'quote',                    label: 'Cita Destacada',        icon: '❝', group: 'Texto' },
            { id: 'horizontal-emoji-band',    label: 'Banda de Emojis',       icon: '☺', group: 'Texto' },
        ];

        // Default data structure for each layout
        const getDefaultSlideData = (layout) => {
            const base = { id: crypto.randomUUID(), type: 'theory', layout };
            switch (layout) {
                case 'cover': return { ...base, heading: '', subtitle: '', branding: 'theTeacher' };
                case 'hero': return { ...base, text: '', emojis: '✨', subtext: '' };
                case 'title-bullets': return { ...base, heading: '', bullets: ['', ''], emojis: '' };
                case 'split-text-image-left':
                case 'split-text-image-right': return { ...base, heading: '', text: '', emojis: '📝', imageUrl: '', bullets: [] };
                case 'two-columns': return { ...base, heading: '', leftColumn: { title: '', items: [''] }, rightColumn: { title: '', items: [''] } };
                case 'table-notes': return { ...base, heading: '', table: { headers: ['Col A', 'Col B'], rows: [['', '']] }, notes: [''] };
                case 'mind-map': return { ...base, centerLabel: '', branches: [{ term: '', translation: '', color: '' }] };
                case 'quote': return { ...base, quote: '', attribution: '' };
                case 'horizontal-emoji-band': return { ...base, text: '', emojis: '✨ 🎯 🚀' };
                default: return { ...base, layout: 'hero', text: '', emojis: '✨' };
            }
        };

        const getDefaultMinigame = (type) => {
            if (type === 'multipleChoice') return { id: crypto.randomUUID(), type, questions: [{ question: '', options: ['', '', ''], correctIndex: 0 }] };
            if (type === 'fillBlank') return { id: crypto.randomUUID(), type, text: '', wordBank: [] };
            if (type === 'sentenceScramble') return { id: crypto.randomUUID(), type, sentences: [{ text: '', translation: '' }] };
        };

        // ============================================================
        // MINI PREVIEW COMPONENT
        // ============================================================
        const MiniPreview = ({ slide, themePrev }) => {
            const bg = themePrev?.preview || '#18181b';
            const acc = themePrev?.accent || '#3b82f6';
            const layout = slide.layout || 'hero';
            const type = slide.type || 'theory';

            if (type !== 'theory') {
                return (
                    <div className="mini-preview items-center justify-center" style={{ backgroundColor: bg }}>
                        <div className="text-center">
                            <div style={{ fontSize: '16px' }}>🎮</div>
                            <div style={{ fontSize: '5px', color: '#aaa', fontWeight: 700 }}>{type}</div>
                        </div>
                    </div>
                );
            }

            const boxStyle = { backgroundColor: 'rgba(255,255,255,0.12)', borderRadius: '2px' };
            const textBar = (w = '70%') => <div style={{ ...boxStyle, width: w, height: '3px', marginBottom: '2px' }} />;
            const accentBar = (w = '50%') => <div style={{ backgroundColor: acc, borderRadius: '2px', width: w, height: '4px', marginBottom: '2px' }} />;

            if (layout === 'cover') return (
                <div className="mini-preview items-center justify-center" style={{ backgroundColor: bg }}>
                    <div className="text-center" style={{ padding: '4px' }}>
                        <div style={{ backgroundColor: '#fff', borderRadius: '2px', padding: '3px 6px' }}>
                            <div style={{ backgroundColor: '#333', width: '40px', height: '5px', borderRadius: '1px' }} />
                        </div>
                    </div>
                </div>
            );

            if (layout === 'two-columns') return (
                <div className="mini-preview items-center justify-center gap-1 p-1" style={{ backgroundColor: bg }}>
                    <div style={{ ...boxStyle, flex: 1, height: '80%', padding: '3px' }}>{textBar('80%')}{textBar('60%')}</div>
                    <div style={{ ...boxStyle, flex: 1, height: '80%', padding: '3px' }}>{textBar('80%')}{textBar('60%')}</div>
                </div>
            );

            if (layout === 'mind-map') return (
                <div className="mini-preview items-center justify-center" style={{ backgroundColor: bg }}>
                    <div className="flex items-center gap-1">
                        <div style={{ backgroundColor: '#A8E6CF', width: '8px', height: '5px', borderRadius: '2px' }} />
                        <div style={{ backgroundColor: acc, width: '14px', height: '7px', borderRadius: '2px' }} />
                        <div style={{ backgroundColor: '#FFD3B6', width: '8px', height: '5px', borderRadius: '2px' }} />
                    </div>
                </div>
            );

            if (layout === 'table-notes') return (
                <div className="mini-preview items-center justify-center p-1 gap-1" style={{ backgroundColor: bg }}>
                    <div style={{ flex: 1 }}>{textBar('60%')}{textBar('80%')}</div>
                    <div style={{ ...boxStyle, flex: 1, height: '70%' }}>
                        <div style={{ backgroundColor: acc, height: '4px', borderRadius: '2px 2px 0 0' }} />
                    </div>
                </div>
            );

            if (layout.startsWith('split-')) return (
                <div className="mini-preview items-stretch p-1 gap-1" style={{ backgroundColor: bg }}>
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '2px' }}>
                        {accentBar('60%')}{textBar('80%')}{textBar('50%')}
                    </div>
                    <div style={{ ...boxStyle, flex: 1 }} />
                </div>
            );

            // Default hero / quote / etc
            return (
                <div className="mini-preview items-center justify-center flex-col" style={{ backgroundColor: bg }}>
                    {slide.emojis && <div style={{ fontSize: '14px', marginBottom: '2px' }}>{(slide.emojis || '✨').substring(0, 2)}</div>}
                    {accentBar('50%')}
                    {textBar('70%')}
                </div>
            );
        };

        // ============================================================
        // SLIDE EDITOR PANELS
        // ============================================================

        const CommonFields = ({ slide, updateField, label }) => (
            <div className="space-y-4">
                {label && <h4 className="font-black text-zinc-300 text-sm">{label}</h4>}
            </div>
        );

        const CoverEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <Field label="Título Principal" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Ej: Modal Verbs" />
                <Field label="Subtítulo (arriba)" value={slide.subtitle} onChange={v => updateField('subtitle', v)} placeholder="Ej: READING WORKSHOP" />
                <Field label="Branding (abajo)" value={slide.branding} onChange={v => updateField('branding', v)} placeholder="Ej: theTeacher" />
            </div>
        );

        const HeroEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <FieldArea label="Texto Principal" value={slide.text} onChange={v => updateField('text', v)} max={250} placeholder="El texto grande que se ve centrado..." />
                <Field label="Subtexto" value={slide.subtext} onChange={v => updateField('subtext', v)} placeholder="Texto secundario debajo (opcional)" />
                <Field label="Emojis" value={slide.emojis} onChange={v => updateField('emojis', v)} placeholder="✨🎯" className="text-2xl text-center" />
            </div>
        );

        const BulletsEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <Field label="Encabezado" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Título del slide" />
                <Field label="Emojis" value={slide.emojis} onChange={v => updateField('emojis', v)} placeholder="📝🎯" className="text-xl text-center" />
                <ArrayEditor label="Bullets" items={slide.bullets || []} onChange={v => updateField('bullets', v)} placeholder="Punto a explicar..." />
            </div>
        );

        const SplitEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <Field label="Encabezado" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Título" />
                <FieldArea label="Texto" value={slide.text} onChange={v => updateField('text', v)} max={400} placeholder="Texto explicativo..." />
                <Field label="URL de Imagen (opcional)" value={slide.imageUrl} onChange={v => updateField('imageUrl', v)} placeholder="https://..." />
                <Field label="Emojis (fallback sin imagen)" value={slide.emojis} onChange={v => updateField('emojis', v)} placeholder="📝" className="text-2xl text-center" />
                <ArrayEditor label="Bullets (opcional)" items={slide.bullets || []} onChange={v => updateField('bullets', v)} placeholder="Punto..." />
            </div>
        );

        const TwoColumnsEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <Field label="Encabezado General" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Ej: Can vs Could" />
                {['leftColumn', 'rightColumn'].map((col, ci) => {
                    const data = slide[col] || { title: '', items: [''] };
                    return (
                        <div key={col} className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                            <Field label={ci === 0 ? "Columna Izquierda - Título" : "Columna Derecha - Título"} 
                                value={data.title} onChange={v => updateField(col, { ...data, title: v })} placeholder="Título columna" />
                            <div className="mt-3">
                                <ArrayEditor label="Elementos" items={data.items || []} 
                                    onChange={v => updateField(col, { ...data, items: v })} placeholder="Ej: ✅ I can swim" />
                            </div>
                        </div>
                    );
                })}
            </div>
        );

        const TableEditor = ({ slide, updateField }) => {
            const table = slide.table || { headers: ['A', 'B'], rows: [['', '']] };
            const updateTable = (newTable) => updateField('table', newTable);

            return (
                <div className="space-y-4">
                    <Field label="Encabezado" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Título de la tabla" />
                    <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2">Headers (separados por coma)</label>
                        <input value={(table.headers || []).join(', ')} 
                            onChange={e => updateTable({ ...table, headers: e.target.value.split(',').map(h => h.trim()) })}
                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500" />
                        
                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2 mt-4">Filas</label>
                        {(table.rows || []).map((row, ri) => (
                            <div key={ri} className="flex gap-2 mb-2 items-center">
                                {row.map((cell, ci) => (
                                    <input key={ci} value={cell} 
                                        onChange={e => {
                                            const newRows = [...table.rows];
                                            newRows[ri] = [...newRows[ri]];
                                            newRows[ri][ci] = e.target.value;
                                            updateTable({ ...table, rows: newRows });
                                        }}
                                        className="flex-1 bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-xs text-zinc-200 outline-none focus:border-indigo-500"
                                        placeholder={`Celda ${ci+1}`} />
                                ))}
                                <button onClick={() => { const r = [...table.rows]; r.splice(ri, 1); updateTable({ ...table, rows: r }); }}
                                    className="text-rose-500 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
                            </div>
                        ))}
                        <button onClick={() => updateTable({ ...table, rows: [...table.rows, Array(table.headers.length).fill('')] })}
                            className="text-xs text-indigo-400 font-bold hover:text-indigo-300 mt-1">+ Fila</button>
                    </div>
                    <ArrayEditor label="Notas al lado (opcional)" items={slide.notes || []} onChange={v => updateField('notes', v)} placeholder="Nota explicativa..." />
                </div>
            );
        };

        const MindMapEditor = ({ slide, updateField }) => {
            const branches = slide.branches || [];
            const colors = ['#A8E6CF', '#DCEDC1', '#FFD3B6', '#FFAAA5', '#B5EAD7', '#C7CEEA', '#FFDAC1', '#E2F0CB'];
            
            return (
                <div className="space-y-4">
                    <Field label="Concepto Central" value={slide.centerLabel} onChange={v => updateField('centerLabel', v)} placeholder="Ej: Modal Verbs" />
                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block">Ramas</label>
                    {branches.map((b, i) => (
                        <div key={i} className="bg-zinc-900/50 p-3 rounded-xl border border-zinc-800 grid grid-cols-3 gap-2 items-center">
                            <input value={b.term} onChange={e => {
                                const nb = [...branches]; nb[i] = { ...nb[i], term: e.target.value }; updateField('branches', nb);
                            }} className="bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-sm font-bold text-white outline-none" placeholder="Término" />
                            <input value={b.translation || ''} onChange={e => {
                                const nb = [...branches]; nb[i] = { ...nb[i], translation: e.target.value }; updateField('branches', nb);
                            }} className="bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-xs text-zinc-300 outline-none" placeholder="Traducción" />
                            <div className="flex gap-1 items-center">
                                {colors.slice(0, 4).map(c => (
                                    <button key={c} onClick={() => { const nb = [...branches]; nb[i] = { ...nb[i], color: c }; updateField('branches', nb); }}
                                        className="w-5 h-5 rounded-full border-2 transition-transform hover:scale-125"
                                        style={{ backgroundColor: c, borderColor: b.color === c ? '#fff' : 'transparent' }} />
                                ))}
                                <button onClick={() => { const nb = [...branches]; nb.splice(i, 1); updateField('branches', nb); }}
                                    className="text-rose-500 ml-auto p-1"><Trash2 size={12}/></button>
                            </div>
                        </div>
                    ))}
                    <button onClick={() => updateField('branches', [...branches, { term: '', translation: '', color: colors[branches.length % colors.length] }])}
                        className="text-xs text-indigo-400 font-bold hover:text-indigo-300">+ Rama</button>
                </div>
            );
        };

        const QuoteEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <FieldArea label="Cita" value={slide.quote} onChange={v => updateField('quote', v)} max={300} placeholder="La frase destacada..." />
                <Field label="Atribución" value={slide.attribution} onChange={v => updateField('attribution', v)} placeholder="— Autor o fuente" />
            </div>
        );

        const EmojiBandEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <FieldArea label="Texto" value={slide.text} onChange={v => updateField('text', v)} max={250} placeholder="Texto principal..." />
                <Field label="Emojis (separados por espacio)" value={slide.emojis} onChange={v => updateField('emojis', v)} placeholder="✨ 🎯 🚀" className="text-2xl text-center" />
            </div>
        );

        // --- Minigame Editors ---
        const MCEditor = ({ slide, updateField }) => {
            const questions = slide.questions || [];
            return (
                <div className="space-y-4">
                    <h4 className="font-black text-emerald-400 text-sm flex items-center gap-2"><Gamepad2 size={14}/> Opción Múltiple</h4>
                    
                    <Field 
                        label="Instrucción General (opcional)" 
                        value={slide.instruction} 
                        onChange={v => updateField('instruction', v)} 
                        placeholder="Ej: Choose the best modal verb" 
                        className="border-emerald-900/50 focus:border-emerald-500" 
                    />
                    {questions.map((q, qi) => (
                        <div key={qi} className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                            <input value={q.question} onChange={e => {
                                const nq = [...questions]; nq[qi] = { ...nq[qi], question: e.target.value }; updateField('questions', nq);
                            }} className="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-white outline-none focus:border-indigo-500 mb-3 text-sm font-bold" placeholder={`Pregunta ${qi+1}...`} />
                            <div className="grid grid-cols-3 gap-2">
                                {[0,1,2].map(oi => (
                                    <div key={oi} className="relative">
                                        <input value={q.options[oi] || ''} onChange={e => {
                                            const nq = [...questions]; const opts = [...nq[qi].options]; opts[oi] = e.target.value; nq[qi] = { ...nq[qi], options: opts }; updateField('questions', nq);
                                        }} className={`w-full bg-zinc-900 border p-2 rounded-lg text-xs outline-none pr-8 ${q.correctIndex === oi ? 'border-emerald-500 text-emerald-300 font-bold' : 'border-zinc-700 text-white'}`} />
                                        <button onClick={() => { const nq = [...questions]; nq[qi] = { ...nq[qi], correctIndex: oi }; updateField('questions', nq); }}
                                            className={`absolute right-2 top-2 w-4 h-4 rounded-full border-2 ${q.correctIndex === oi ? 'border-emerald-500 bg-emerald-500' : 'border-zinc-600'}`} />
                                    </div>
                                ))}
                            </div>
                            {questions.length > 1 && (
                                <button onClick={() => { const nq = [...questions]; nq.splice(qi, 1); updateField('questions', nq); }}
                                    className="text-rose-500 text-xs font-bold mt-2 hover:text-rose-400">Eliminar pregunta</button>
                            )}
                        </div>
                    ))}
                    <button onClick={() => updateField('questions', [...questions, { question: '', options: ['', '', ''], correctIndex: 0 }])}
                        className="text-xs text-emerald-400 font-bold hover:text-emerald-300">+ Pregunta</button>
                </div>
            );
        };

        const FBEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <h4 className="font-black text-emerald-400 text-sm flex items-center gap-2"><Gamepad2 size={14}/> Rellenar Huecos</h4>
                <FieldArea label="Historia (usa [corchetes] para huecos)" value={slide.text} onChange={v => updateField('text', v)} max={600} placeholder="Yesterday, I [went] to the store and [bought]..." />
                <Field label="Wordbank (respuestas + distractores, separados por coma)" value={Array.isArray(slide.wordBank) ? slide.wordBank.join(', ') : slide.wordBank || ''} 
                    onChange={v => updateField('wordBank', v.split(',').map(w => w.trim()).filter(Boolean))} placeholder="went, bought, goes, buy, took" className="text-emerald-400 font-bold" />
            </div>
        );

        const SSEditor = ({ slide, updateField }) => {
            const sentences = slide.sentences || [];
            return (
                <div className="space-y-4">
                    <h4 className="font-black text-emerald-400 text-sm flex items-center gap-2"><Gamepad2 size={14}/> Ordenar Frases</h4>
                    {sentences.map((s, si) => (
                        <div key={si} className="bg-zinc-900/50 p-3 rounded-xl border border-zinc-800 grid grid-cols-2 gap-2">
                            <input value={s.text} onChange={e => {
                                const ns = [...sentences]; ns[si] = { ...ns[si], text: e.target.value }; updateField('sentences', ns);
                            }} className="bg-zinc-900 border border-emerald-900/50 p-2 rounded-lg text-sm font-bold text-emerald-300 outline-none" placeholder="English sentence" />
                            <input value={s.translation} onChange={e => {
                                const ns = [...sentences]; ns[si] = { ...ns[si], translation: e.target.value }; updateField('sentences', ns);
                            }} className="bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-sm text-zinc-300 outline-none" placeholder="Traducción" />
                        </div>
                    ))}
                    <button onClick={() => updateField('sentences', [...sentences, { text: '', translation: '' }])}
                        className="text-xs text-emerald-400 font-bold hover:text-emerald-300">+ Oración</button>
                </div>
            );
        };

        // ============================================================
        // REUSABLE FORM COMPONENTS
        // ============================================================
        const Field = ({ label, value, onChange, placeholder, className = '', type = 'text' }) => (
            <div>
                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">{label}</label>
                <input type={type} value={value || ''} onChange={e => onChange(e.target.value)}
                    className={`w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500 ${className}`}
                    placeholder={placeholder} />
            </div>
        );

        const FieldArea = ({ label, value, onChange, placeholder, max }) => (
            <div>
                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">{label}</label>
                <textarea value={value || ''} onChange={e => onChange(e.target.value)} maxLength={max}
                    className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500 h-24 resize-none"
                    placeholder={placeholder} />
                {max && <span className="text-[9px] text-zinc-600 float-right">{(value||'').length}/{max}</span>}
            </div>
        );

        const ArrayEditor = ({ label, items, onChange, placeholder }) => (
            <div>
                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">{label}</label>
                {items.map((item, i) => (
                    <div key={i} className="flex gap-2 mb-2">
                        <input value={item} onChange={e => { const n = [...items]; n[i] = e.target.value; onChange(n); }}
                            className="flex-1 bg-zinc-900 border border-zinc-800 p-2 rounded-lg text-sm text-zinc-200 outline-none focus:border-indigo-500" placeholder={placeholder} />
                        {items.length > 1 && (
                            <button onClick={() => { const n = [...items]; n.splice(i, 1); onChange(n); }}
                                className="text-rose-500 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
                        )}
                    </div>
                ))}
                <button onClick={() => onChange([...items, ''])} className="text-xs text-indigo-400 font-bold hover:text-indigo-300">+ Añadir</button>
            </div>
        );

        // ============================================================
        // MAIN DASHBOARD
        // ============================================================
        const Dashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const abortControllerRef = useRef(null);

            const [level, setLevel] = useState('basic');
            const [category, setCategory] = useState('grammar');
            const [topic, setTopic] = useState('Present Simple');
            const [promptText, setPromptText] = useState("");
            const [selectedTheme, setSelectedTheme] = useState('dark');
            
            const [includeMC, setIncludeMC] = useState(false);
            const [includeFB, setIncludeFB] = useState(false);
            const [includeSS, setIncludeSS] = useState(false);

            const [title, setTitle] = useState("");
            const [slides, setSlides] = useState([]);
            const [addMenuOpen, setAddMenuOpen] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setEditingId(editId);
                            // Compatibility: Check if theme is object or string to set selectedTheme correctly
                            if (data.theme) {
                                if (typeof data.theme === 'string') setSelectedTheme(data.theme);
                                else if (data.theme.preview) {
                                    const matchedKey = Object.keys(THEMES).find(key => THEMES[key].preview === data.theme.preview);
                                    if (matchedKey) setSelectedTheme(matchedKey);
                                }
                            }
                            if (data.content?.slides) setSlides(deserializeSlides(data.content.slides));
                            if (data.tags) {
                                setLevel(data.tags.level || 'basic');
                                setCategory(data.tags.category || 'grammar');
                                setTopic(data.tags.topic || 'Otro');
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[level] && TAXONOMY[level][category]) {
                    setTopic(TAXONOMY[level][category][0] || 'Otro');
                } else {
                    const firstCat = Object.keys(TAXONOMY[level] || {})[0];
                    if (firstCat) setCategory(firstCat);
                }
            }, [level, category]);

            // ---- AI GENERATION ----
            const generateWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!promptText.trim()) { alert("Escribe instrucciones en el prompt."); return; }

                if (abortControllerRef.current) abortControllerRef.current.abort();
                abortControllerRef.current = new AbortController();

                setIsGenerating(true);
                try {
                    const systemPrompt = `
Eres un creador de contenido educativo. Genera una presentación estructurada sobre: ${topic} (${level} level).
Instrucciones del maestro: ${promptText}

TEMA VISUAL: "${selectedTheme}" — usa esto solo como referencia de mood, no afecta tu JSON.

REGLAS DE TEXTO:
- Usa **doble asterisco** para negritas y __doble guion bajo__ para subrayar palabras clave.
- Sé conciso pero claro. Máximo 250 caracteres por campo de texto.

LAYOUTS DISPONIBLES PARA SLIDES DE TEORÍA (usa variedad):
- "cover": Portada. Campos: heading, subtitle, branding ("theTeacher")
- "hero": Statement grande. Campos: text, emojis, subtext
- "title-bullets": Encabezado + lista. Campos: heading, bullets[], emojis
- "split-text-image-left": Texto izq, visual der. Campos: heading, text, emojis, bullets[]
- "split-text-image-right": Visual izq, texto der. Campos: heading, text, emojis, bullets[]
- "two-columns": Comparación lado a lado. Campos: heading, leftColumn{title, items[]}, rightColumn{title, items[]}
- "table-notes": Tabla de datos. Campos: heading, table{headers[], rows[][]}, notes[]
- "mind-map": Diagrama central con ramas. Campos: centerLabel, branches[{term, translation, color}]. Colores pastel hex: #A8E6CF, #DCEDC1, #FFD3B6, #FFAAA5, #C7CEEA, #FFDAC1
- "quote": Cita destacada. Campos: quote, attribution
- "horizontal-emoji-band": Texto + emojis abajo. Campos: text, emojis

INSTRUCCIONES:
1. SIEMPRE empieza con un slide de layout "cover".
2. Varía los layouts — no repitas el mismo layout consecutivamente.
3. Para gramática, usa "two-columns" para comparaciones, "table-notes" para conjugaciones, "mind-map" para mapas de conceptos.
4. TÚ decides cuántas slides necesitas. Sé directo y eficiente.

MINIJUEGOS (al final de la teoría, UNA slide por tipo):
${includeMC ? '- Incluye un slide type "multipleChoice" con 5 questions: [{question, options[3], correctIndex}]' : ''}
${includeFB ? '- Incluye un slide type "fillBlank" con text (usa [corchetes] para huecos, 5 huecos) y wordBank[] (respuestas + 2 distractores)' : ''}
${includeSS ? '- Incluye un slide type "sentenceScramble" con 5 sentences: [{text, translation}]' : ''}

Devuelve ÚNICAMENTE JSON válido:
{
    "suggestedTitle": "Título atractivo",
    "slides": [
        { "type": "theory", "layout": "cover", "heading": "...", "subtitle": "...", "branding": "theTeacher" },
        { "type": "theory", "layout": "...", ... },
        ...
    ]
}`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        signal: abortControllerRef.current.signal,
                        body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    const parsedData = JSON.parse(resultText);
                    if (!title) setTitle(parsedData.suggestedTitle);
                    
                    const newSlides = parsedData.slides.map(s => ({
                        ...s,
                        id: crypto.randomUUID(),
                        type: s.type || 'theory',
                        layout: s.layout || 'hero',
                    }));

                    setSlides(newSlides);
                } catch (error) {
                    if (error.name === 'AbortError') return; // Cancelado por el usuario, no hacer nada
                    alert("Error parseando la respuesta de la IA. Revisa la consola o intenta de nuevo.");
                    console.error(error);
                } finally {
                    setIsGenerating(false);
                }
            };

            // ---- FIREBASE SERIALIZATION (no nested arrays allowed) ----
            const serializeSlides = (slides) => slides.map(s => {
                const copy = JSON.parse(JSON.stringify(s));
                // Convert table.rows[][] → table.rows[{}] for Firebase
                if (copy.table?.rows) {
                    copy.table.rows = copy.table.rows.map(row => {
                        if (Array.isArray(row)) {
                            const obj = {};
                            row.forEach((cell, i) => { obj[String(i)] = cell; });
                            return obj;
                        }
                        return row;
                    });
                }
                return copy;
            });

            const deserializeSlides = (slides) => slides.map(s => {
                const copy = JSON.parse(JSON.stringify(s));
                // Convert table.rows[{}] → table.rows[][] back to arrays
                if (copy.table?.rows) {
                    copy.table.rows = copy.table.rows.map(row => {
                        if (!Array.isArray(row) && typeof row === 'object') {
                            const keys = Object.keys(row).sort((a, b) => Number(a) - Number(b));
                            return keys.map(k => row[k]);
                        }
                        return row;
                    });
                }
                return copy;
            });

            // ---- SAVE ----
            const handleSave = async () => {
                if (!title.trim()) return alert("El título es obligatorio.");
                if (slides.length === 0) return alert("Añade al menos una diapositiva.");
                
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    const payload = {
                        title,
                        type: 'PRESENTATION',
                        theme: {
                            accent: THEMES[selectedTheme].accent,
                            preview: THEMES[selectedTheme].preview
                        },
                        tags: { level, category, topic },
                        content: { slides: serializeSlides(slides) },
                        parentPath,
                        updatedAt: serverTimestamp()
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), payload);
                    } else {
                        payload.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
                } catch (error) {
                    alert("Error al guardar: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            // ---- HELPERS ----
            const updateSlideField = (id, field, value) => {
                setSlides(slides.map(s => s.id === id ? { ...s, [field]: value } : s));
            };
            const removeSlide = (id) => setSlides(slides.filter(s => s.id !== id));
            const duplicateSlide = (id) => {
                const idx = slides.findIndex(s => s.id === id);
                if (idx !== -1) {
                    const clone = { ...JSON.parse(JSON.stringify(slides[idx])), id: crypto.randomUUID() };
                    const newSlides = [...slides];
                    newSlides.splice(idx + 1, 0, clone);
                    setSlides(newSlides);
                }
            };
            const moveSlide = (index, direction) => {
                const target = index + direction;
                if (target < 0 || target >= slides.length) return;
                const newSlides = [...slides];
                [newSlides[index], newSlides[target]] = [newSlides[target], newSlides[index]];
                setSlides(newSlides);
            };
            const addSlide = (layout) => {
                setSlides([...slides, getDefaultSlideData(layout)]);
                setAddMenuOpen(false);
            };
            const addMinigame = (type) => {
                setSlides([...slides, getDefaultMinigame(type)]);
                setAddMenuOpen(false);
            };
            const changeSlideLayout = (id, newLayout) => {
                setSlides(slides.map(s => {
                    if (s.id !== id) return s;
                    const base = getDefaultSlideData(newLayout);
                    // Preserve common fields
                    return { ...base, id: s.id, heading: s.heading || s.text || base.heading, text: s.text || base.text, emojis: s.emojis || base.emojis };
                }));
            };

            // ---- RENDER SLIDE EDITOR ----
            const renderSlideEditor = (slide) => {
                const update = (field, value) => updateSlideField(slide.id, field, value);
                const t = slide.type || 'theory';
                
                if (t === 'multipleChoice') return <MCEditor slide={slide} updateField={update} />;
                if (t === 'fillBlank') return <FBEditor slide={slide} updateField={update} />;
                if (t === 'sentenceScramble') return <SSEditor slide={slide} updateField={update} />;

                const layout = slide.layout || 'hero';
                switch (layout) {
                    case 'cover': return <CoverEditor slide={slide} updateField={update} />;
                    case 'hero': return <HeroEditor slide={slide} updateField={update} />;
                    case 'title-bullets': return <BulletsEditor slide={slide} updateField={update} />;
                    case 'split-text-image-left':
                    case 'split-text-image-right': return <SplitEditor slide={slide} updateField={update} />;
                    case 'two-columns': return <TwoColumnsEditor slide={slide} updateField={update} />;
                    case 'table-notes': return <TableEditor slide={slide} updateField={update} />;
                    case 'mind-map': return <MindMapEditor slide={slide} updateField={update} />;
                    case 'quote': return <QuoteEditor slide={slide} updateField={update} />;
                    case 'horizontal-emoji-band': return <EmojiBandEditor slide={slide} updateField={update} />;
                    default: return <HeroEditor slide={slide} updateField={update} />;
                }
            };

            const themePrev = THEMES[selectedTheme];

            return (
                <div className="h-[100dvh] flex flex-col relative overflow-hidden">
                    {/* HEADER */}
                    <div className="bg-zinc-950 px-4 md:px-6 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 z-10">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl transition text-white"><ArrowLeft size={18}/></button>
                            <h1 className="text-lg font-black flex items-center gap-2 text-indigo-400"><Presentation size={22}/> Presentation Builder</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-zinc-400 hover:text-amber-400 transition"><KeyRound size={18}/></button>
                            <button onClick={handleSave} disabled={isSaving} className="btn-juicy bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 text-black px-5 py-2 rounded-xl font-black flex gap-2 border-emerald-700 text-sm">
                                {isSaving ? <Loader2 className="animate-spin" size={16}/> : <Save size={16}/>} GUARDAR
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        
                        {/* LEFT PANEL */}
                        <div className="w-full lg:w-[340px] bg-zinc-950 border-r border-zinc-800 p-5 overflow-y-auto custom-scrollbar flex flex-col shrink-0">
                            
                            {showApiInput && (
                                <div className="bg-zinc-900 p-3 rounded-xl mb-5 flex gap-2 items-center border border-zinc-700">
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="API Key de Gemini..." className="flex-1 bg-zinc-950 border border-zinc-700 p-2 rounded-lg outline-none text-xs text-white focus:border-indigo-500"/>
                                </div>
                            )}

                            {/* THEME SELECTOR */}
                            <div className="mb-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Palette size={14}/> Tema Visual</h2>
                                <div className="grid grid-cols-3 gap-2">
                                    {Object.values(THEMES).map(t => (
                                        <button key={t.id} onClick={() => setSelectedTheme(t.id)}
                                            className={`p-2 rounded-xl border-2 transition-all text-center ${selectedTheme === t.id ? 'border-indigo-500 ring-2 ring-indigo-500/30' : 'border-zinc-800 hover:border-zinc-600'}`}>
                                            <div className="w-full h-5 rounded-md mb-1.5" style={{ background: `linear-gradient(135deg, ${t.preview}, ${t.accent})` }} />
                                            <span className="text-[9px] font-bold text-zinc-400">{t.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* TAXONOMY */}
                            <div className="mb-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Settings2 size={14}/> Taxonomía</h2>
                                <div className="space-y-2">
                                    <select value={level} onChange={e => setLevel(e.target.value)} className="w-full bg-zinc-900 p-2.5 rounded-xl border border-zinc-800 text-xs font-bold text-white outline-none focus:border-indigo-500">
                                        <option value="basic">BASIC</option><option value="advanced">ADVANCED</option><option value="pro">PRO</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-2">
                                        <select value={category} onChange={e => setCategory(e.target.value)} className="w-full bg-zinc-900 p-2.5 rounded-xl border border-zinc-800 text-xs font-bold text-white outline-none focus:border-indigo-500 capitalize">
                                            {Object.keys(TAXONOMY[level] || {}).map(c => <option key={c} value={c}>{c.replace('_', ' ')}</option>)}
                                        </select>
                                        <select value={topic} onChange={e => setTopic(e.target.value)} className="w-full bg-zinc-900 p-2.5 rounded-xl border border-zinc-800 text-xs font-bold text-white outline-none focus:border-indigo-500">
                                            {(TAXONOMY[level]?.[category] || []).map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* MINIGAME TOGGLES */}
                            <div className="mb-5 border-t border-zinc-800 pt-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Gamepad2 size={14} className="text-emerald-400"/> Minijuegos</h2>
                                {[
                                    [includeMC, setIncludeMC, 'Opción Múltiple'],
                                    [includeFB, setIncludeFB, 'Rellenar Huecos'],
                                    [includeSS, setIncludeSS, 'Ordenar Frases'],
                                ].map(([val, setter, label]) => (
                                    <label key={label} className={`flex items-center gap-3 p-2.5 rounded-xl border cursor-pointer transition-colors mb-1.5 ${val ? 'bg-emerald-500/10 border-emerald-500/50' : 'bg-zinc-900 border-zinc-800 hover:bg-zinc-800'}`}>
                                        <input type="checkbox" checked={val} onChange={e => setter(e.target.checked)} className="w-3.5 h-3.5 accent-emerald-500"/>
                                        <span className="text-xs font-bold text-zinc-200">{label}</span>
                                    </label>
                                ))}
                            </div>

                            {/* PROMPT */}
                            <div className="flex-1 border-t border-zinc-800 pt-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Sparkles size={14} className="text-amber-500"/> Prompt</h2>
                                <textarea value={promptText} onChange={e => setPromptText(e.target.value)} 
                                    placeholder="Ej: Explica las reglas de la 3ra persona singular. Usa comparaciones con español..." 
                                    className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 focus:border-amber-500 outline-none h-28 resize-none text-xs font-medium text-white" />
                                
                                <button onClick={generateWithAI} disabled={isGenerating} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-3 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 border-indigo-800 mt-4 text-sm">
                                    {isGenerating ? <Loader2 className="animate-spin" size={18}/> : <Sparkles size={18}/>} GENERAR CON IA
                                </button>
                            </div>
                        </div>

                        {/* RIGHT PANEL: EDITOR */}
                        <div className="w-full flex-1 bg-zinc-900 p-5 md:p-8 overflow-y-auto custom-scrollbar">
                            <input value={title} onChange={e => setTitle(e.target.value)} 
                                placeholder="Título de la Presentación..." 
                                className="w-full text-2xl md:text-4xl font-black bg-transparent border-b-2 border-zinc-800 pb-2 mb-8 outline-none focus:border-indigo-500 text-white placeholder-zinc-700" />

                            <div className="space-y-5 pb-20">
                                {slides.map((slide, idx) => (
                                    <div key={slide.id} className="bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden relative group shadow-sm hover:border-zinc-700 transition-colors">
                                        
                                        {/* Slide Header */}
                                        <div className="flex justify-between items-center px-5 py-3 border-b border-zinc-800 bg-zinc-950">
                                            <div className="flex items-center gap-3">
                                                {/* Mini Preview */}
                                                <div className="w-16 h-9 shrink-0">
                                                    <MiniPreview slide={slide} themePrev={themePrev} />
                                                </div>
                                                <span className="text-zinc-500 text-[10px] font-black">#{idx + 1}</span>
                                                {slide.type === 'theory' ? (
                                                    <select value={slide.layout || 'hero'} onChange={e => changeSlideLayout(slide.id, e.target.value)}
                                                        className="bg-zinc-900 border border-zinc-800 rounded-lg px-2 py-1 text-[10px] font-bold text-zinc-300 outline-none cursor-pointer hover:border-zinc-600">
                                                        {LAYOUT_OPTIONS.map(l => <option key={l.id} value={l.id}>{l.icon} {l.label}</option>)}
                                                    </select>
                                                ) : (
                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-emerald-400 flex items-center gap-1"><Gamepad2 size={11}/> {slide.type}</span>
                                                )}
                                            </div>
                                            <div className="flex gap-1 opacity-50 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => moveSlide(idx, -1)} disabled={idx === 0} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowUp size={14}/></button>
                                                <button onClick={() => moveSlide(idx, 1)} disabled={idx === slides.length - 1} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowDown size={14}/></button>
                                                <button onClick={() => duplicateSlide(slide.id)} className="p-1.5 hover:bg-zinc-800 rounded-md text-indigo-400"><Copy size={14}/></button>
                                                <button onClick={() => removeSlide(slide.id)} className="p-1.5 text-rose-500 hover:bg-rose-900/30 rounded-md"><Trash2 size={14}/></button>
                                            </div>
                                        </div>

                                        {/* Slide Content Editor */}
                                        <div className="p-5">
                                            {renderSlideEditor(slide)}
                                        </div>
                                    </div>
                                ))}

                                {/* ADD SLIDE BUTTONS */}
                                <div className="relative">
                                    <button onClick={() => setAddMenuOpen(!addMenuOpen)} className="w-full py-4 border-2 border-dashed border-zinc-800 hover:border-zinc-600 hover:bg-zinc-950 rounded-2xl text-zinc-500 font-bold flex justify-center items-center gap-2 transition-all text-sm">
                                        <Plus size={18}/> AÑADIR SLIDE <ChevronDown size={14} className={`transition-transform ${addMenuOpen ? 'rotate-180' : ''}`}/>
                                    </button>
                                    {addMenuOpen && (
                                        <div className="absolute top-full left-0 right-0 mt-2 bg-zinc-950 border border-zinc-800 rounded-2xl p-4 z-50 shadow-2xl">
                                            <h3 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Teoría</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
                                                {LAYOUT_OPTIONS.map(l => (
                                                    <button key={l.id} onClick={() => addSlide(l.id)}
                                                        className="flex items-center gap-2 p-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-xl transition-colors text-left">
                                                        <span className="text-lg">{l.icon}</span>
                                                        <span className="text-xs font-bold text-zinc-300">{l.label}</span>
                                                    </button>
                                                ))}
                                            </div>
                                            <h3 className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-3">Minijuegos</h3>
                                            <div className="grid grid-cols-3 gap-2">
                                                {[['multipleChoice', '❓ Opción Múltiple'], ['fillBlank', '✏️ Rellenar Huecos'], ['sentenceScramble', '🔀 Ordenar Frases']].map(([type, label]) => (
                                                    <button key={type} onClick={() => addMinigame(type)}
                                                        className="flex items-center gap-2 p-3 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 rounded-xl transition-colors text-left">
                                                        <span className="text-xs font-bold text-emerald-300">{label}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

            // ---- AI GENERATION (TEORÍA) ----
            const generateTheoryAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!selectedModel) { alert("Por favor escanea y selecciona un modelo primero (botón lupa)."); setShowApiInput(true); return; }

                if (abortControllerRef.current) abortControllerRef.current.abort();
                abortControllerRef.current = new AbortController();

                setIsGeneratingTheory(true);
                try {
                    const systemPrompt = `
Eres un creador de contenido educativo. Genera una presentación estructurada sobre: ${topic} (${level} level).
Instrucciones del maestro: ${promptText || "Crea una presentación atractiva."}

REGLAS DE TEXTO:
- Usa **doble asterisco** para negritas y __doble guion bajo__ para subrayar palabras clave.
- Sé conciso pero claro. Máximo 250 caracteres por campo de texto.

LAYOUTS DISPONIBLES PARA SLIDES DE TEORÍA (usa variedad):
- "cover": Portada. Campos: heading, subtitle, branding ("theTeacher")
- "hero": Statement grande. Campos: text, emojis (string), subtext
- "title-bullets": Encabezado + lista. Campos: heading, bullets[], emojis (string)
- "split-text-image-left": Texto izq, visual der. Campos: heading, text, emojis (string), bullets[]
- "split-text-image-right": Visual izq, texto der. Campos: heading, text, emojis (string), bullets[]
- "two-columns": Comparación lado a lado. Campos: heading, leftColumn{title, items[]}, rightColumn{title, items[]}
- "table-notes": Tabla de datos. Campos: heading, table{headers[], rows[][]}, notes[]
- "mind-map": Diagrama central con ramas. Campos: centerLabel, branches[{term, translation, color}]. Colores pastel hex: #A8E6CF, #DCEDC1, #FFD3B6, #FFAAA5, #C7CEEA, #FFDAC1
- "quote": Cita destacada. Campos: quote, attribution
- "horizontal-emoji-band": Texto + emojis abajo. Campos: text, emojis (string)

REGLA CRÍTICA PARA EMOJIS: El campo "emojis" debe ser SIEMPRE un string, NUNCA un array.
Correcto: "emojis": "✨ 🎯"
Incorrecto: "emojis": ["✨", "🎯"]

INSTRUCCIONES:
1. SIEMPRE empieza con un slide de layout "cover".
2. Varía los layouts — no repitas el mismo layout consecutivamente.
3. Para gramática, usa "two-columns" para comparaciones, "table-notes" para conjugaciones, "mind-map" para mapas de conceptos.
4. TÚ decides cuántas slides necesitas. Sé directo y eficiente.

Devuelve ÚNICAMENTE JSON válido con esta estructura:
{
    "suggestedTitle": "Título atractivo",
    "slides": [
        { "type": "theory", "layout": "cover", "heading": "...", "subtitle": "...", "branding": "theTeacher" },
        { "type": "theory", "layout": "...", ... }
    ]
}`;

                    let resultText = await AI.callGemini({
                        apiKey, model: selectedModel, prompt: systemPrompt,
                        signal: abortControllerRef.current.signal, json: true
                    });
                    resultText = AI.sanitizeJSON(resultText.replace(/```json/gi, '').replace(/```/g, '').trim());
                    const parsedData = JSON.parse(resultText);
                    
                    if (!title) setTitle(parsedData.suggestedTitle);
                    
                    const newSlides = parsedData.slides.map(s => ({
                        ...s,
                        id: crypto.randomUUID(),
                        type: s.type || 'theory',
                        layout: s.layout || 'hero',
                        ...(s.emojis !== undefined && { emojis: Array.isArray(s.emojis) ? s.emojis.join(' ') : String(s.emojis) })
                    }));

                    setSlides(newSlides); 
                } catch (error) {
                    if (error.name === 'AbortError') return;
                    alert("Error con la IA: " + error.message);
                } finally {
                    setIsGeneratingTheory(false);
                }
            };

            // ---- AI GENERATION (MINIGAMES) - PROMPT BLINDADO ----
            const generateMinigamesAI = async (mode) => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); return; }
                if (!selectedModel) { alert("Por favor escanea y selecciona un modelo primero."); return; }

                if (abortControllerRef.current) abortControllerRef.current.abort();
                abortControllerRef.current = new AbortController();

                setIsGeneratingMinigames(true);
                try {
                    const includeMC = mode === 'ALL' || mode === 'MC';
                    const includeFB = mode === 'ALL' || mode === 'FB';
                    const includeSS = mode === 'ALL' || mode === 'SS';

                    const systemPrompt = `Eres un generador ESTRICTO de datos JSON para minijuegos educativos.
Tema de la lección: ${topic} (${level} level).
Contexto: ${promptText || "Crea contenido relevante para el tema."}

INSTRUCCIONES CRÍTICAS QUE NO DEBES DESOBEDECER:
1. TU ÚNICA SALIDA DEBE SER UN ARRAY JSON RAW QUE COMIENCE CON "[" Y TERMINE CON "]".
2. ESTÁ ABSOLUTAMENTE PROHIBIDO ENVOLVER EL ARRAY EN CUALQUIER OTRO OBJETO (no uses "slides": [], no uses "suggestedTitle").
3. ESTÁ ABSOLUTAMENTE PROHIBIDO GENERAR SLIDES DE TIPO "theory". 
4. SOLO PUEDES GENERAR LOS TIPOS DE JUEGO SOLICITADOS A CONTINUACIÓN.

JUEGOS SOLICITADOS EN ESTA PETICIÓN (Genera 1 objeto por cada juego listado aquí):
${includeMC ? '- 1 objeto de tipo "multipleChoice" con 5 preguntas (cada pregunta DEBE tener exactamente 4 opciones y un correctIndex de 0 a 3).' : ''}
${includeFB ? '- 1 objeto de tipo "fillBlank" con un texto (usa [corchetes] para marcar 5 palabras clave) y un "wordBank" (array de strings con las 5 respuestas y 2 engaños).' : ''}
${includeSS ? '- 1 objeto de tipo "sentenceScramble" con 5 oraciones (text y translation).' : ''}

EJEMPLO EXACTO DE LA ESTRUCTURA ESPERADA:
[
${includeMC ? `  {
    "type": "multipleChoice",
    "instruction": "Elige la opción correcta",
    "questions": [
      { "question": "She ___ to school.", "options": ["go", "went", "gone", "going"], "correctIndex": 1 }
    ]
  }${includeFB || includeSS ? ',' : ''}` : ''}
${includeFB ? `  {
    "type": "fillBlank",
    "text": "Yesterday she [went] to the market and [bought] apples.",
    "wordBank": ["went", "bought", "goes", "buy", "taking", "took", "takes"]
  }${includeSS ? ',' : ''}` : ''}
${includeSS ? `  {
    "type": "sentenceScramble",
    "sentences": [
      { "text": "She went to the store.", "translation": "Ella fue a la tienda." }
    ]
  }` : ''}
]`;

                    let resultText = await AI.callGemini({
                        apiKey, model: selectedModel, prompt: systemPrompt,
                        signal: abortControllerRef.current.signal, json: true
                    });
                    
                    // Limpieza agresiva por si la IA devuelve markdown o texto envolvente
                    resultText = AI.sanitizeJSON(resultText.replace(/```json/gi, '').replace(/```/g, '').trim());
                    if (resultText.startsWith('{') && resultText.includes('"slides":')) {
                        // Si a pesar de todo la IA lo envolvió en un objeto, lo extraemos
                        const tempParse = JSON.parse(resultText);
                        if (tempParse.slides) {
                            resultText = JSON.stringify(tempParse.slides);
                        }
                    }

                    const parsedSlides = JSON.parse(resultText);
                    
                    if (!Array.isArray(parsedSlides)) {
                        throw new Error("La IA no devolvió un formato de Array válido.");
                    }

                    // Filtrar estrictamente solo los tipos de minijuegos permitidos
                    const validMinigames = parsedSlides.filter(s => s.type === 'multipleChoice' || s.type === 'fillBlank' || s.type === 'sentenceScramble');
                    
                    if(validMinigames.length === 0) {
                        throw new Error("La IA no generó los juegos solicitados. Revisa el prompt e intenta de nuevo.");
                    }

                    const newSlides = validMinigames.map(s => ({
                        ...s,
                        id: crypto.randomUUID()
                    }));

                    setSlides(prev => [...prev, ...newSlides]); 
                } catch (error) {
                    if (error.name === 'AbortError') return;
                    alert("Error generando minijuego: " + error.message);
                    console.error("AI Output error:", error);
                } finally {
                    setIsGeneratingMinigames(false);
                }
            };

            // ---- AI IMAGE GENERATION (Imagen 4) ----
            const CARTOON_STYLE = "Cartoon/comic illustration style. Flat design with clear outlines. Vibrant colors. Fun and educational. NOT photorealistic. NOT hyperrealistic. Colorful scene background that complements the subject (not a flat solid-color background). Simple, clean design for educational materials. ";

            const generateImageForSlide = async (slideId, concept, options = {}) => {
                if (!apiKey) { alert("Necesitas tu API Key para generar imágenes."); return; }

                // Limit: max 5 data-URL images per presentation
                const existingDataImages = slides.filter(s => s.imageUrl?.startsWith('data:')).length;
                if (existingDataImages >= 5) {
                    alert("Límite de 5 imágenes IA por presentación.\nElimina una imagen existente para poder generar una nueva.");
                    return;
                }

                setGeneratingImageFor(slideId);
                try {
                    const userPrompt = (concept || '').trim() || `Educational illustration for: ${topic}`;
                    const prompt = CARTOON_STYLE + userPrompt;
                    const parameters = { sampleCount: 1 };
                    if (options.aspectRatio) parameters.aspectRatio = options.aspectRatio;

                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ instances: [{ prompt }], parameters })
                        }
                    );

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    const prediction = data.predictions?.[0];
                    if (!prediction?.bytesBase64Encoded) throw new Error("No se recibió imagen de la API.");

                    // 16:9 images get a wider max to keep quality
                    const maxSize = options.aspectRatio === '16:9' ? 900 : 600;
                    const dataUrl = await compressImageToDataUrl(
                        prediction.bytesBase64Encoded,
                        prediction.mimeType || 'image/png',
                        maxSize
                    );
                    updateSlideField(slideId, 'imageUrl', dataUrl);
                } catch (error) {
                    alert("Error generando imagen: " + error.message);
                } finally {
                    setGeneratingImageFor(null);
                }
            };

            const serializeSlides = (slides) => slides.map(s => {
                const copy = JSON.parse(JSON.stringify(s));
                if (copy.emojis !== undefined) {
                    copy.emojis = Array.isArray(copy.emojis) ? copy.emojis.join(' ') : String(copy.emojis || '');
                }
                if (copy.table?.rows) {
                    copy.table.rows = copy.table.rows.map(row => {
                        if (Array.isArray(row)) {
                            const obj = {};
                            row.forEach((cell, i) => { obj[String(i)] = cell; });
                            return obj;
                        }
                        return row;
                    });
                }
                return copy;
            });

            const deserializeSlides = (slides) => slides.map(s => {
                const copy = JSON.parse(JSON.stringify(s));
                if (copy.emojis !== undefined) {
                    copy.emojis = Array.isArray(copy.emojis) ? copy.emojis.join(' ') : String(copy.emojis || '');
                }
                if (copy.table?.rows) {
                    copy.table.rows = copy.table.rows.map(row => {
                        if (!Array.isArray(row) && typeof row === 'object') {
                            const keys = Object.keys(row).sort((a, b) => Number(a) - Number(b));
                            return keys.map(k => row[k]);
                        }
                        return row;
                    });
                }
                return copy;
            });

            // ---- SAVE LOGIC ----
            const handlePreSave = () => {
                if (!title.trim()) return alert("El título es obligatorio.");
                if (slides.length === 0) return alert("Añade al menos una diapositiva.");
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    const payload = {
                        title,
                        type: 'PRESENTATION',
                        theme: {
                            accent: THEMES[selectedTheme].accent,
                            preview: THEMES[selectedTheme].preview
                        },
                        tags: { levels: saveLevels, categories: saveCats, topics: saveTopics },
                        content: { slides: serializeSlides(slides) },
                        parentPath,
                        updatedAt: serverTimestamp()
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), payload);
                    } else {
                        payload.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
                } catch (error) {
                    alert("Error al guardar: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const updateSlideField = (id, field, value) => {
                setSlides(slides.map(s => s.id === id ? { ...s, [field]: value } : s));
            };
            const removeSlide = (id) => setSlides(slides.filter(s => s.id !== id));
            const duplicateSlide = (id) => {
                const idx = slides.findIndex(s => s.id === id);
                if (idx !== -1) {
                    const clone = { ...JSON.parse(JSON.stringify(slides[idx])), id: crypto.randomUUID() };
                    const newSlides = [...slides];
                    newSlides.splice(idx + 1, 0, clone);
                    setSlides(newSlides);
                }
            };
            const moveSlide = (index, direction) => {
                const target = index + direction;
                if (target < 0 || target >= slides.length) return;
                const newSlides = [...slides];
                [newSlides[index], newSlides[target]] = [newSlides[target], newSlides[index]];
                setSlides(newSlides);
            };
            const addSlide = (layout) => {
                setSlides([...slides, getDefaultSlideData(layout)]);
                setAddMenuOpen(false);
            };
            const addMinigame = (type) => {
                setSlides([...slides, getDefaultMinigame(type)]);
                setAddMenuOpen(false);
            };
            const changeSlideLayout = (id, newLayout) => {
                setSlides(slides.map(s => {
                    if (s.id !== id) return s;
                    const base = getDefaultSlideData(newLayout);
                    return { ...base, id: s.id, heading: s.heading || s.text || base.heading, text: s.text || base.text, emojis: s.emojis || base.emojis };
                }));
            };

            const renderSlideEditor = (slide) => {
                const update = (field, value) => updateSlideField(slide.id, field, value);
                const t = slide.type || 'theory';
                
                if (t === 'multipleChoice') return <MCEditor slide={slide} updateField={update} />;
                if (t === 'fillBlank') return <FBEditor slide={slide} updateField={update} />;
                if (t === 'sentenceScramble') return <SSEditor slide={slide} updateField={update} />;

                const layout = slide.layout || 'hero';
                switch (layout) {
                    case 'cover': return <CoverEditor slide={slide} updateField={update} onGenerateImage={(concept) => generateImageForSlide(slide.id, concept, { aspectRatio: '1:1' })} isGenerating={generatingImageFor === slide.id} />;
                    case 'hero': return <HeroEditor slide={slide} updateField={update} />;
                    case 'title-bullets': return <BulletsEditor slide={slide} updateField={update} />;
                    case 'split-text-image-left':
                    case 'split-text-image-right': return <SplitEditor slide={slide} updateField={update} onGenerateImage={(concept) => generateImageForSlide(slide.id, concept)} isGenerating={generatingImageFor === slide.id} />;
                    case 'two-columns': return <TwoColumnsEditor slide={slide} updateField={update} />;
                    case 'table-notes': return <TableEditor slide={slide} updateField={update} />;
                    case 'mind-map': return <MindMapEditor slide={slide} updateField={update} />;
                    case 'quote': return <QuoteEditor slide={slide} updateField={update} />;
                    case 'horizontal-emoji-band': return <EmojiBandEditor slide={slide} updateField={update} onGenerateImage={(concept) => generateImageForSlide(slide.id, concept, { aspectRatio: '16:9' })} isGenerating={generatingImageFor === slide.id} />;
                    default: return <HeroEditor slide={slide} updateField={update} />;
                }
            };

            const themePrev = THEMES[selectedTheme] || THEMES.midnight;

            return (
                <div className="h-[100dvh] flex flex-col relative overflow-hidden">
                    
                    {/* TAXONOMY SAVE MODAL */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col animate-popIn">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-white"><Tags className="text-indigo-400"/> Clasificar Actividad</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">
                                    {/* PASO 1: NIVELES */}
                                    <div>
                                        <label className="block text-xs font-black text-indigo-400 uppercase tracking-widest mb-3">1. Niveles (Selección Múltiple)</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button 
                                                    key={lvl} 
                                                    onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-indigo-500 hover:text-indigo-300'}`}
                                                >
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 2: CATEGORÍAS */}
                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categorías (Selección Múltiple)</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button 
                                                    key={cat.id} 
                                                    onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}
                                                >
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 3: TEMAS SEGMENTADOS */}
                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">3. Temas y Skills Disponibles</label>
                                            
                                            {saveCats.map(catId => {
                                                if (catId === 'otro') return null;
                                                
                                                const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                                const topics = getAllTopicsForCategory(catId, saveLevels);
                                                
                                                if (topics.length === 0) return null;

                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button 
                                                                    key={topic} 
                                                                    onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}
                                                                >
                                                                    {topic}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {saveCats.includes('otro') && (
                                                <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                                                    <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades (Otro)</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {MACRO_SKILLS.map(skill => (
                                                            <button 
                                                                key={skill} 
                                                                onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                                className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-500 text-zinc-900 shadow-sm' : 'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}
                                                            >
                                                                {skill}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <button 
                                    onClick={executeFinalSave} 
                                    disabled={isSaving || saveLevels.length === 0 || saveCats.length === 0} 
                                    className="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:bg-zinc-800 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0"
                                >
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} 
                                    {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar"}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <div className="bg-zinc-950 px-4 md:px-6 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 z-10">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl transition text-white"><ArrowLeft size={18}/></button>
                            <h1 className="text-lg font-black flex items-center gap-2 text-indigo-400"><Presentation size={22}/> Presentation Builder</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-zinc-400 hover:text-amber-400 transition"><KeyRound size={18}/></button>
                            <button onClick={handlePreSave} disabled={isSaving || slides.length === 0} className="btn-juicy bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 text-black px-5 py-2 rounded-xl font-black flex gap-2 border-emerald-700 text-sm">
                                {isSaving ? <Loader2 className="animate-spin" size={16}/> : <Save size={16}/>} GUARDAR ACTIVIDAD
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        
                        {/* LEFT PANEL */}
                        <div className="w-full lg:w-[340px] bg-zinc-950 border-r border-zinc-800 p-5 overflow-y-auto custom-scrollbar flex flex-col shrink-0">
                            
                            {showApiInput && (
                                <div className="mb-5">
                                    <ApiKeyBar
                                        variant="modal"
                                        accentBtn="bg-indigo-600 hover:bg-indigo-500 text-white"
                                        placeholder="API Key de Gemini..."
                                        apiKey={apiKey} setApiKey={setApiKey}
                                        models={availableModels} selectedModel={selectedModel} setSelectedModel={setSelectedModel}
                                        isLoading={isLoadingModels} onFetch={fetchModels}
                                        onClear={() => setAvailableModels([])}
                                    />
                                </div>
                            )}

                            {/* THEME SELECTOR */}
                            <div className="mb-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Palette size={14}/> Tema Visual</h2>
                                <div className="grid grid-cols-3 gap-2">
                                    {Object.values(THEMES).map(t => (
                                        <button key={t.id} onClick={() => setSelectedTheme(t.id)}
                                            className={`p-2 rounded-xl border-2 transition-all text-center ${selectedTheme === t.id ? 'border-indigo-500 ring-2 ring-indigo-500/30' : 'border-zinc-800 hover:border-zinc-600'}`}>
                                            <div className="w-full h-5 rounded-md mb-1.5" style={{ background: `linear-gradient(135deg, ${t.preview}, ${t.accent})` }} />
                                            <span className="text-[9px] font-bold text-zinc-400">{t.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* TAXONOMY CREATIVA */}
                            <div className="mb-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Settings2 size={14}/> Taxonomía Creativa (IA)</h2>
                                <div className="space-y-2">
                                    <select value={level} onChange={e => setLevel(e.target.value)} className="w-full bg-zinc-900 p-2.5 rounded-xl border border-zinc-800 text-xs font-bold text-white outline-none focus:border-indigo-500">
                                        <option value="basic">BASIC</option><option value="advanced">ADVANCED</option><option value="pro">PRO</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-2">
                                        <select value={category} onChange={e => setCategory(e.target.value)} className="w-full bg-zinc-900 p-2.5 rounded-xl border border-zinc-800 text-xs font-bold text-white outline-none focus:border-indigo-500 capitalize">
                                            {Object.keys(TAXONOMY[level] || {}).map(c => <option key={c} value={c}>{c.replace('_', ' ')}</option>)}
                                        </select>
                                        <select value={topic} onChange={e => setTopic(e.target.value)} className="w-full bg-zinc-900 p-2.5 rounded-xl border border-zinc-800 text-xs font-bold text-white outline-none focus:border-indigo-500">
                                            {(TAXONOMY[level]?.[category] || []).map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* PROMPT (Solo Teoría) */}
                            <div className="flex-1 border-t border-zinc-800 pt-5">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Sparkles size={14} className="text-indigo-400"/> Generar Teoría</h2>
                                <textarea value={promptText} onChange={e => setPromptText(e.target.value)} 
                                    placeholder="Ej: Explica las reglas de la 3ra persona singular..." 
                                    className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 focus:border-indigo-500 outline-none h-28 resize-none text-xs font-medium text-white mb-2" />
                                
                                <button onClick={generateTheoryAI} disabled={isGeneratingTheory} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-3 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 border-indigo-800 text-sm">
                                    {isGeneratingTheory ? <Loader2 className="animate-spin" size={18}/> : <BookOpen size={18}/>} CREAR PRESENTACIÓN
                                </button>
                            </div>
                        </div>

                        {/* RIGHT PANEL: EDITOR */}
                        <div className="w-full flex-1 bg-zinc-900 p-5 md:p-8 overflow-y-auto custom-scrollbar flex flex-col">
                            <input value={title} onChange={e => setTitle(e.target.value)} 
                                placeholder="Título de la Presentación..." 
                                className="w-full text-2xl md:text-4xl font-black bg-transparent border-b-2 border-zinc-800 pb-2 mb-8 outline-none focus:border-indigo-500 text-white placeholder-zinc-700" />

                            <div className="space-y-5 mb-8">
                                {slides.map((slide, idx) => (
                                    <div key={slide.id} className="bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden relative group shadow-sm hover:border-zinc-700 transition-colors">
                                        <div className="flex justify-between items-center px-5 py-3 border-b border-zinc-800 bg-zinc-950">
                                            <div className="flex items-center gap-3">
                                                <div className="w-16 h-9 shrink-0">
                                                    <MiniPreview slide={slide} themePrev={themePrev} />
                                                </div>
                                                <span className="text-zinc-500 text-[10px] font-black">#{idx + 1}</span>
                                                {slide.type === 'theory' ? (
                                                    <select value={slide.layout || 'hero'} onChange={e => changeSlideLayout(slide.id, e.target.value)}
                                                        className="bg-zinc-900 border border-zinc-800 rounded-lg px-2 py-1 text-[10px] font-bold text-zinc-300 outline-none cursor-pointer hover:border-zinc-600">
                                                        {LAYOUT_OPTIONS.map(l => <option key={l.id} value={l.id}>{l.icon} {l.label}</option>)}
                                                    </select>
                                                ) : (
                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-emerald-400 flex items-center gap-1"><Gamepad2 size={11}/> {slide.type}</span>
                                                )}
                                            </div>
                                            <div className="flex gap-1 opacity-50 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => moveSlide(idx, -1)} disabled={idx === 0} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowUp size={14}/></button>
                                                <button onClick={() => moveSlide(idx, 1)} disabled={idx === slides.length - 1} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowDown size={14}/></button>
                                                <button onClick={() => duplicateSlide(slide.id)} className="p-1.5 hover:bg-zinc-800 rounded-md text-indigo-400"><Copy size={14}/></button>
                                                <button onClick={() => removeSlide(slide.id)} className="p-1.5 text-rose-500 hover:bg-rose-900/30 rounded-md"><Trash2 size={14}/></button>
                                            </div>
                                        </div>
                                        <div className="p-5">
                                            {renderSlideEditor(slide)}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* MANUAL ADD BUTTON */}
                            <div className="relative mb-12">
                                <button onClick={() => setAddMenuOpen(!addMenuOpen)} className="w-full py-4 border-2 border-dashed border-zinc-700 hover:border-zinc-500 hover:bg-zinc-800/50 rounded-2xl text-zinc-400 font-bold flex justify-center items-center gap-2 transition-all text-sm">
                                    <Plus size={18}/> AÑADIR SLIDE MANUAL <ChevronDown size={14} className={`transition-transform ${addMenuOpen ? 'rotate-180' : ''}`}/>
                                </button>
                                {addMenuOpen && (
                                    <div className="absolute top-full left-0 right-0 mt-2 bg-zinc-950 border border-zinc-800 rounded-2xl p-4 z-50 shadow-2xl">
                                        <h3 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Teoría</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
                                            {LAYOUT_OPTIONS.map(l => (
                                                <button key={l.id} onClick={() => addSlide(l.id)}
                                                    className="flex items-center gap-2 p-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-xl transition-colors text-left">
                                                    <span className="text-lg">{l.icon}</span>
                                                    <span className="text-xs font-bold text-zinc-300">{l.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <h3 className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-3">Minijuegos</h3>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[['multipleChoice', '❓ Opción Múltiple'], ['fillBlank', '✏️ Rellenar Huecos'], ['sentenceScramble', '🔀 Ordenar Frases']].map(([type, label]) => (
                                                <button key={type} onClick={() => addMinigame(type)}
                                                    className="flex items-center gap-2 p-3 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 rounded-xl transition-colors text-left">
                                                    <span className="text-xs font-bold text-emerald-300">{label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* AI MINIGAME GENERATOR ZONE */}
                            <div className="mt-auto bg-emerald-950/30 border border-emerald-900/50 rounded-3xl p-6">
                                <h3 className="text-sm font-black text-emerald-400 mb-2 flex items-center gap-2">
                                    <Sparkles size={16}/> Anexar Minijuegos con IA
                                </h3>
                                <p className="text-xs text-emerald-500/70 mb-5 font-medium">La IA analizará el tema actual y creará un juego para añadirlo al final de la presentación.</p>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <button onClick={() => generateMinigamesAI('MC')} disabled={isGeneratingMinigames} className="btn-juicy bg-zinc-900 border border-zinc-800 hover:border-emerald-500 hover:bg-emerald-900/20 text-zinc-300 py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-2 text-xs transition-colors">
                                        <ListChecks size={20} className="text-emerald-400"/> Opción Múltiple
                                    </button>
                                    <button onClick={() => generateMinigamesAI('FB')} disabled={isGeneratingMinigames} className="btn-juicy bg-zinc-900 border border-zinc-800 hover:border-emerald-500 hover:bg-emerald-900/20 text-zinc-300 py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-2 text-xs transition-colors">
                                        <Edit3 size={20} className="text-emerald-400"/> Rellenar Huecos
                                    </button>
                                    <button onClick={() => generateMinigamesAI('SS')} disabled={isGeneratingMinigames} className="btn-juicy bg-zinc-900 border border-zinc-800 hover:border-emerald-500 hover:bg-emerald-900/20 text-zinc-300 py-3 rounded-xl font-bold flex flex-col items-center justify-center gap-2 text-xs transition-colors">
                                        <Shuffle size={20} className="text-emerald-400"/> Ordenar Frases
                                    </button>
                                    <button onClick={() => generateMinigamesAI('ALL')} disabled={isGeneratingMinigames} className="btn-juicy bg-emerald-600 border border-emerald-800 hover:bg-emerald-500 text-white py-3 rounded-xl font-black flex flex-col items-center justify-center gap-2 text-xs shadow-lg">
                                        {isGeneratingMinigames ? <Loader2 className="animate-spin" size={20}/> : <Sparkles size={20}/>}
                                        {isGeneratingMinigames ? 'Generando...' : 'Generar los 3'}
                                    </button>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

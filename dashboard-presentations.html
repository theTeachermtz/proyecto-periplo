<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📽️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Presentation, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Plus, Trash2, ArrowUp, ArrowDown, LayoutTemplate, Smile, Gamepad2, Settings2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // TAXONOMÍA MAESTRA
        const TAXONOMY = {
            basic: {
                grammar: ["Modal Verbs", "Present Simple", "Present Continuous", "Future (Going to)", "Otro"],
                verbs: ["Pack 1", "Pack 2", "Pack 3", "Otro"],
                key_structs: ["WH Questions", "Prepositions", "Otro"]
            },
            advanced: {
                grammar: ["Past Simple", "Second Conditional", "Past Continuous", "Otro"],
                verbs: ["Irregular Verbs", "Otro"],
                key_structs: ["Used to", "Relative Clauses", "Otro"]
            },
            pro: {
                grammar: ["Present Perfect", "Third Conditional", "Otro"],
                key_structs: ["Inversion", "Cleft Sentences", "Otro"]
            }
        };

        const LAYOUT_OPTIONS = [
            { id: 'hero-emoji-center', label: 'Emoji Centro (Hero)' },
            { id: 'hero-emoji-top', label: 'Emoji Arriba (Hero)' },
            { id: 'split-text-left', label: 'Texto Izq / Emoji Der' },
            { id: 'split-text-right', label: 'Texto Der / Emoji Izq' },
            { id: 'horizontal-emoji-band', label: 'Banda de Emojis Inferior' }
        ];

        const Dashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);

            // Left Panel (Taxonomy & AI)
            const [level, setLevel] = useState('basic');
            const [category, setCategory] = useState('grammar');
            const [topic, setTopic] = useState('Present Simple');
            const [promptText, setPromptText] = useState("");
            const [slideCount, setSlideCount] = useState(5);

            // Right Panel (Content)
            const [title, setTitle] = useState("");
            const [slides, setSlides] = useState([]);
            const [miniGame, setMiniGame] = useState({ type: 'none', data: {} });

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setEditingId(editId);
                            if (data.content) {
                                setSlides(data.content.slides || []);
                                setMiniGame(data.content.miniGame || { type: 'none', data: {} });
                            }
                            if (data.tags) {
                                setLevel(data.tags.level || 'basic');
                                setCategory(data.tags.category || 'grammar');
                                setTopic(data.tags.topic || 'Otro');
                            }
                        }
                    });
                }
            }, []);

            // Handle Taxonomy cascades
            useEffect(() => {
                if (TAXONOMY[level] && TAXONOMY[level][category]) {
                    setTopic(TAXONOMY[level][category][0] || 'Otro');
                } else {
                    const firstCat = Object.keys(TAXONOMY[level] || {})[0];
                    if (firstCat) {
                        setCategory(firstCat);
                    }
                }
            }, [level]);

            const generateWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!promptText.trim()) { alert("Escribe instrucciones en el prompt."); return; }

                setIsGenerating(true);
                try {
                    const systemPrompt = `
                        Eres un creador de contenido educativo. Genera una presentación de ${slideCount} diapositivas sobre el tema: ${topic} (${level} level).
                        Instrucciones del maestro: ${promptText}

                        Devuelve ÚNICAMENTE un JSON válido con esta estructura estricta:
                        {
                            "suggestedTitle": "Un título atractivo",
                            "slides": [
                                {
                                    "text": "Explicación concisa (máximo 200 caracteres por slide).",
                                    "emojis": "📝🎯✨" (Sugerencia de 2 a 3 emojis Unicode juntos que ilustren el texto)
                                }
                            ]
                        }
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    const parsedData = JSON.parse(resultText);
                    
                    if (!title) setTitle(parsedData.suggestedTitle);
                    
                    // Map generated slides and append default layout
                    const newSlides = parsedData.slides.map(s => ({
                        id: crypto.randomUUID(),
                        text: s.text.substring(0, 200),
                        emojis: s.emojis,
                        layout: 'hero-emoji-center'
                    }));

                    setSlides(newSlides);
                } catch (error) {
                    alert("Error parseando la respuesta de la IA. Revisa la consola o intenta de nuevo.");
                    console.error(error);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleSave = async () => {
                if (!title.trim()) return alert("El título es obligatorio.");
                if (slides.length === 0) return alert("Añade al menos una diapositiva.");
                
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    const payload = {
                        title,
                        type: 'PRESENTATION',
                        tags: { level, category, topic },
                        content: { slides, miniGame },
                        parentPath,
                        updatedAt: serverTimestamp()
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), payload);
                    } else {
                        payload.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
                } catch (error) {
                    alert("Error al guardar: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            // Slide Controls
            const updateSlide = (id, field, value) => {
                setSlides(slides.map(s => s.id === id ? { ...s, [field]: value } : s));
            };

            const removeSlide = (id) => {
                setSlides(slides.filter(s => s.id !== id));
            };

            const moveSlide = (index, direction) => {
                if (direction === -1 && index === 0) return;
                if (direction === 1 && index === slides.length - 1) return;
                const newSlides = [...slides];
                const temp = newSlides[index];
                newSlides[index] = newSlides[index + direction];
                newSlides[index + direction] = temp;
                setSlides(newSlides);
            };

            const addManualSlide = () => {
                setSlides([...slides, { id: crypto.randomUUID(), text: '', emojis: '✨', layout: 'hero-emoji-center' }]);
            };

            // MiniGame Controls
            const handleMiniGameType = (e) => {
                const type = e.target.value;
                let defaultData = {};
                if (type === 'multipleChoice') defaultData = { question: '', options: ['', '', ''], correctIndex: 0 };
                if (type === 'sentenceScramble') defaultData = { text: '', translation: '' };
                if (type === 'fillBlank') defaultData = { sentence: 'The [BLANK] is fast.', answer: '', hint: '' };
                setMiniGame({ type, data: defaultData });
            };

            return (
                <div className="h-[100dvh] flex flex-col relative overflow-hidden">
                    {/* HEADER */}
                    <div className="bg-zinc-950 px-6 py-4 flex justify-between items-center shrink-0 border-b border-zinc-800 z-10">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl transition text-white"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-indigo-400"><Presentation/> Presentation Builder</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-zinc-400 hover:text-amber-400 transition"><KeyRound size={20}/></button>
                            <button onClick={handleSave} disabled={isSaving} className="btn-juicy bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 text-black px-6 py-2 rounded-xl font-black flex gap-2 border-emerald-700">
                                {isSaving ? <Loader2 className="animate-spin"/> : <Save/>} GUARDAR
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        
                        {/* LEFT PANEL: IA & TAXONOMY */}
                        <div className="w-full lg:w-1/3 bg-zinc-950 border-r border-zinc-800 p-6 overflow-y-auto custom-scrollbar flex flex-col">
                            
                            {showApiInput && (
                                <div className="bg-zinc-900 p-4 rounded-xl mb-6 flex gap-3 items-center border border-zinc-700">
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="API Key de Gemini..." className="flex-1 bg-zinc-950 border border-zinc-700 p-2 rounded-lg outline-none text-sm text-white focus:border-indigo-500"/>
                                </div>
                            )}

                            <div className="mb-6">
                                <h2 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Settings2 size={16}/> Taxonomía</h2>
                                <div className="space-y-3">
                                    <select value={level} onChange={e => setLevel(e.target.value)} className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white outline-none focus:border-indigo-500">
                                        <option value="basic">BASIC</option>
                                        <option value="advanced">ADVANCED</option>
                                        <option value="pro">PRO</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select value={category} onChange={e => setCategory(e.target.value)} className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white outline-none focus:border-indigo-500 capitalize">
                                            {Object.keys(TAXONOMY[level] || {}).map(c => <option key={c} value={c}>{c.replace('_', ' ')}</option>)}
                                        </select>
                                        <select value={topic} onChange={e => setTopic(e.target.value)} className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white outline-none focus:border-indigo-500">
                                            {(TAXONOMY[level]?.[category] || []).map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1">
                                <h2 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Sparkles size={16} className="text-amber-500"/> Generador IA</h2>
                                <textarea 
                                    value={promptText} 
                                    onChange={e => setPromptText(e.target.value)} 
                                    placeholder="Ej: Explica las reglas de la 3ra persona singular en afirmativo, negativo e interrogativo..." 
                                    className="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 focus:border-amber-500 outline-none h-32 resize-none text-sm font-medium mb-4 text-white"
                                />
                                <div className="flex items-center gap-3 mb-6">
                                    <label className="text-xs font-bold text-zinc-400">Cant. Slides:</label>
                                    <input type="range" min="3" max="10" value={slideCount} onChange={e => setSlideCount(parseInt(e.target.value))} className="flex-1 accent-amber-500"/>
                                    <span className="text-sm font-black text-amber-500">{slideCount}</span>
                                </div>
                                
                                <button onClick={generateWithAI} disabled={isGenerating} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 border-indigo-800">
                                    {isGenerating ? <Loader2 className="animate-spin" size={20}/> : <Sparkles size={20}/>} GENERAR PRESENTACIÓN
                                </button>
                            </div>
                        </div>

                        {/* RIGHT PANEL: EDITOR */}
                        <div className="w-full lg:w-2/3 bg-zinc-900 p-6 md:p-10 overflow-y-auto custom-scrollbar">
                            <input 
                                value={title} 
                                onChange={e => setTitle(e.target.value)} 
                                placeholder="Título de la Presentación..." 
                                className="w-full text-3xl md:text-5xl font-black bg-transparent border-b-2 border-zinc-800 pb-2 mb-10 outline-none focus:border-indigo-500 text-white placeholder-zinc-700"
                            />

                            <div className="space-y-6 mb-12">
                                {slides.map((slide, idx) => (
                                    <div key={slide.id} className="bg-zinc-950 border border-zinc-800 rounded-2xl p-5 relative group shadow-sm hover:border-zinc-700 transition-colors">
                                        
                                        {/* Slide Controls Header */}
                                        <div className="flex justify-between items-center mb-4 pb-3 border-b border-zinc-800">
                                            <span className="bg-zinc-800 text-zinc-400 text-xs font-black px-3 py-1 rounded-full">Slide {idx + 1}</span>
                                            <div className="flex gap-2 opacity-50 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => moveSlide(idx, -1)} disabled={idx === 0} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowUp size={16}/></button>
                                                <button onClick={() => moveSlide(idx, 1)} disabled={idx === slides.length - 1} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowDown size={16}/></button>
                                                <div className="w-px h-6 bg-zinc-800 mx-1"></div>
                                                <button onClick={() => removeSlide(slide.id)} className="p-1.5 text-rose-500 hover:bg-rose-900/30 rounded-md"><Trash2 size={16}/></button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                            {/* Text Area */}
                                            <div className="md:col-span-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2">Contenido (Máx 200)</label>
                                                <textarea 
                                                    value={slide.text} 
                                                    onChange={e => updateSlide(slide.id, 'text', e.target.value)}
                                                    maxLength={200}
                                                    className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500 h-24 resize-none"
                                                />
                                            </div>
                                            
                                            {/* Emojis & Layout */}
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2 flex items-center gap-1"><Smile size={12}/> Emojis</label>
                                                    <input 
                                                        value={slide.emojis} 
                                                        onChange={e => updateSlide(slide.id, 'emojis', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-2xl text-center outline-none focus:border-amber-500"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2 flex items-center gap-1"><LayoutTemplate size={12}/> Layout</label>
                                                    <select 
                                                        value={slide.layout} 
                                                        onChange={e => updateSlide(slide.id, 'layout', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-2.5 text-xs font-bold text-zinc-300 outline-none focus:border-indigo-500"
                                                    >
                                                        {LAYOUT_OPTIONS.map(l => <option key={l.id} value={l.id}>{l.label}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                <button onClick={addManualSlide} className="w-full py-4 border-2 border-dashed border-zinc-800 hover:border-zinc-600 hover:bg-zinc-950 rounded-2xl text-zinc-500 font-bold flex justify-center items-center gap-2 transition-all">
                                    <Plus size={18}/> AÑADIR SLIDE MANUAL
                                </button>
                            </div>

                            {/* MINIGAME SECTION */}
                            <div className="bg-indigo-950/20 border border-indigo-900/30 rounded-[2rem] p-6 md:p-8">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="bg-indigo-500/20 p-2 rounded-xl"><Gamepad2 className="text-indigo-400"/></div>
                                    <div>
                                        <h3 className="font-black text-lg text-indigo-300">Minijuego Final (Opcional)</h3>
                                        <p className="text-xs text-indigo-400/60 font-medium">Cierra la presentación evaluando el concepto.</p>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <select value={miniGame.type} onChange={handleMiniGameType} className="w-full md:w-1/2 bg-zinc-950 border border-indigo-900/50 rounded-xl p-3 text-sm font-bold text-indigo-300 outline-none focus:border-indigo-500">
                                        <option value="none">Sin minijuego</option>
                                        <option value="multipleChoice">Opción Múltiple (3 opciones)</option>
                                        <option value="sentenceScramble">Ordenar la Frase (Scramble)</option>
                                        <option value="fillBlank">Rellenar el Espacio (Fill in the Blank)</option>
                                    </select>
                                </div>

                                {miniGame.type === 'multipleChoice' && (
                                    <div className="space-y-4 animate-in fade-in duration-300">
                                        <input value={miniGame.data.question} onChange={e => setMiniGame({...miniGame, data: {...miniGame.data, question: e.target.value}})} placeholder="Pregunta evaluativa..." className="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-indigo-500"/>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                            {[0, 1, 2].map(idx => (
                                                <div key={idx} className="relative">
                                                    <input 
                                                        value={miniGame.data.options[idx]} 
                                                        onChange={e => { const newOpts = [...miniGame.data.options]; newOpts[idx] = e.target.value; setMiniGame({...miniGame, data: {...miniGame.data, options: newOpts}}); }} 
                                                        placeholder={`Opción ${idx + 1}...`} 
                                                        className={`w-full bg-zinc-900 border p-3 rounded-xl text-sm outline-none transition-colors pr-10 ${miniGame.data.correctIndex === idx ? 'border-emerald-500 text-emerald-300' : 'border-zinc-800 focus:border-indigo-500 text-white'}`}
                                                    />
                                                    <button 
                                                        onClick={() => setMiniGame({...miniGame, data: {...miniGame.data, correctIndex: idx}})}
                                                        className={`absolute right-3 top-3 w-5 h-5 rounded-full border-2 transition-colors ${miniGame.data.correctIndex === idx ? 'border-emerald-500 bg-emerald-500' : 'border-zinc-600'}`}
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {miniGame.type === 'sentenceScramble' && (
                                    <div className="space-y-4 animate-in fade-in duration-300">
                                        <input value={miniGame.data.text} onChange={e => setMiniGame({...miniGame, data: {...miniGame.data, text: e.target.value}})} placeholder="Oración correcta en inglés (Ej: She doesn't like apples)" className="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-indigo-500"/>
                                        <input value={miniGame.data.translation} onChange={e => setMiniGame({...miniGame, data: {...miniGame.data, translation: e.target.value}})} placeholder="Traducción o pista (Ej: A ella no le gustan las manzanas)" className="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-sm text-zinc-400 outline-none focus:border-indigo-500"/>
                                    </div>
                                )}

                                {miniGame.type === 'fillBlank' && (
                                    <div className="space-y-4 animate-in fade-in duration-300">
                                        <input value={miniGame.data.sentence} onChange={e => setMiniGame({...miniGame, data: {...miniGame.data, sentence: e.target.value}})} placeholder="Oración con [BLANK] (Ej: He [BLANK] a doctor)" className="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-indigo-500"/>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input value={miniGame.data.answer} onChange={e => setMiniGame({...miniGame, data: {...miniGame.data, answer: e.target.value}})} placeholder="Respuesta correcta (Ej: is)" className="w-full bg-zinc-900 border border-emerald-900/50 p-3 rounded-xl text-sm text-emerald-400 outline-none focus:border-emerald-500"/>
                                            <input value={miniGame.data.hint} onChange={e => setMiniGame({...miniGame, data: {...miniGame.data, hint: e.target.value}})} placeholder="Pista opcional (Ej: Verbo to be)" className="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-sm text-zinc-400 outline-none focus:border-indigo-500"/>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

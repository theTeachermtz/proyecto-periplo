<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📽️</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Serif+Display&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-taxonomy.js"></script>
    <script src="periplo-ai.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap'); 
        body { font-family: 'Outfit', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        
        /* Mini preview */
        .mini-preview {
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            font-size: 5px;
            display: flex;
            position: relative;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Presentation, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Plus, Trash2, ArrowUp, ArrowDown, LayoutTemplate, Settings2, Gamepad2, BookOpen, Copy, Eye, ChevronDown, Palette, Image, Table, GitBranch, Quote, Columns, Type, Star, Search, ListChecks, Edit3, Shuffle, Tags, X } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { TAXONOMY, NEW_LEVELS, NEW_CATS, MACRO_SKILLS, getAllTopicsForCategory } = window.PERIPLO_TAXONOMY;

        // IA Assistant compartido (periplo-ai.js) — la generación de imágenes (Imagen :predict) se queda local
        const AI = window.PERIPLO_AI;
        const ApiKeyBar = AI.createApiKeyBar(React);

        const THEMES = {
            midnight: { id: 'midnight', label: 'Midnight', preview: '#09090b', accent: '#3b82f6' },
            slate:    { id: 'slate',    label: 'Slate',    preview: '#0f172a', accent: '#818cf8' },
            forest:   { id: 'forest',   label: 'Forest',   preview: '#0a1f0a', accent: '#4ade80' },
            rose:     { id: 'rose',     label: 'Rose',     preview: '#1a0a0f', accent: '#fb7185' },
            amber:    { id: 'amber',    label: 'Amber',    preview: '#1a1200', accent: '#fbbf24' },
            teal:     { id: 'teal',     label: 'Teal',     preview: '#001a1a', accent: '#2dd4bf' },
        };

        const LAYOUT_OPTIONS = [
            { id: 'cover',                    label: 'Portada',                icon: '◆', group: 'Estructura' },
            { id: 'hero',                     label: 'Hero (Texto Grande)',    icon: '★', group: 'Texto' },
            { id: 'title-bullets',            label: 'Título + Bullets',      icon: '≡', group: 'Texto' },
            { id: 'split-text-image-left',    label: 'Texto Izq / Visual Der',icon: '◧', group: 'Dividido' },
            { id: 'split-text-image-right',   label: 'Texto Der / Visual Izq',icon: '◨', group: 'Dividido' },
            { id: 'two-columns',              label: 'Dos Columnas',          icon: '⊞', group: 'Comparación' },
            { id: 'table-notes',              label: 'Tabla + Notas',         icon: '▦', group: 'Datos' },
            { id: 'mind-map',                 label: 'Mapa Mental',           icon: '✳', group: 'Diagrama' },
            { id: 'quote',                    label: 'Cita Destacada',        icon: '❝', group: 'Texto' },
            { id: 'horizontal-emoji-band',    label: 'Banda de Emojis',       icon: '☺', group: 'Texto' },
        ];

        const getDefaultSlideData = (layout) => {
            const base = { id: crypto.randomUUID(), type: 'theory', layout };
            switch (layout) {
                case 'cover': return { ...base, heading: '', subtitle: '', branding: 'theTeacher', imageUrl: '' };
                case 'hero': return { ...base, text: '', emojis: '✨', subtext: '' };
                case 'title-bullets': return { ...base, heading: '', bullets: ['', ''], emojis: '' };
                case 'split-text-image-left':
                case 'split-text-image-right': return { ...base, heading: '', text: '', emojis: '📝', imageUrl: '', bullets: [] };
                case 'two-columns': return { ...base, heading: '', leftColumn: { title: '', items: [''] }, rightColumn: { title: '', items: [''] } };
                case 'table-notes': return { ...base, heading: '', table: { headers: ['Col A', 'Col B'], rows: [['', '']] }, notes: [''] };
                case 'mind-map': return { ...base, centerLabel: '', branches: [{ term: '', translation: '', color: '' }] };
                case 'quote': return { ...base, quote: '', attribution: '' };
                case 'horizontal-emoji-band': return { ...base, text: '', emojis: '✨ 🎯 🚀', imageUrl: '', panels: ['', '', ''] };
                default: return { ...base, layout: 'hero', text: '', emojis: '✨' };
            }
        };

        const getDefaultMinigame = (type) => {
            if (type === 'multipleChoice') return { id: crypto.randomUUID(), type, questions: [{ question: '', options: ['', '', ''], correctIndex: 0 }] };
            if (type === 'fillBlank') return { id: crypto.randomUUID(), type, text: '', wordBank: [] };
            if (type === 'sentenceScramble') return { id: crypto.randomUUID(), type, sentences: [{ text: '', translation: '' }] };
        };

        // ============================================================
        // MINI PREVIEW COMPONENT
        // ============================================================
        const MiniPreview = ({ slide, themePrev }) => {
            const bg = themePrev?.preview || '#09090b';
            const acc = themePrev?.accent || '#3b82f6';
            const layout = slide.layout || 'hero';
            const type = slide.type || 'theory';

            if (type !== 'theory') {
                return (
                    <div className="mini-preview items-center justify-center" style={{ backgroundColor: bg }}>
                        <div className="text-center">
                            <div style={{ fontSize: '16px' }}>🎮</div>
                            <div style={{ fontSize: '5px', color: '#aaa', fontWeight: 700 }}>{type}</div>
                        </div>
                    </div>
                );
            }

            const boxStyle = { backgroundColor: 'rgba(255,255,255,0.12)', borderRadius: '2px' };
            const textBar = (w = '70%') => <div style={{ ...boxStyle, width: w, height: '3px', marginBottom: '2px' }} />;
            const accentBar = (w = '50%') => <div style={{ backgroundColor: acc, borderRadius: '2px', width: w, height: '4px', marginBottom: '2px' }} />;

            if (layout === 'cover') return (
                <div className="mini-preview items-center justify-center" style={{ backgroundColor: bg }}>
                    <div className="text-center" style={{ padding: '4px' }}>
                        <div style={{ backgroundColor: '#fff', borderRadius: '2px', padding: '3px 6px' }}>
                            <div style={{ backgroundColor: '#333', width: '40px', height: '5px', borderRadius: '1px' }} />
                        </div>
                    </div>
                </div>
            );

            if (layout === 'two-columns') return (
                <div className="mini-preview items-center justify-center gap-1 p-1" style={{ backgroundColor: bg }}>
                    <div style={{ ...boxStyle, flex: 1, height: '80%', padding: '3px' }}>{textBar('80%')}{textBar('60%')}</div>
                    <div style={{ ...boxStyle, flex: 1, height: '80%', padding: '3px' }}>{textBar('80%')}{textBar('60%')}</div>
                </div>
            );

            if (layout === 'mind-map') return (
                <div className="mini-preview items-center justify-center" style={{ backgroundColor: bg }}>
                    <div className="flex items-center gap-1">
                        <div style={{ backgroundColor: '#A8E6CF', width: '8px', height: '5px', borderRadius: '2px' }} />
                        <div style={{ backgroundColor: acc, width: '14px', height: '7px', borderRadius: '2px' }} />
                        <div style={{ backgroundColor: '#FFD3B6', width: '8px', height: '5px', borderRadius: '2px' }} />
                    </div>
                </div>
            );

            if (layout === 'table-notes') return (
                <div className="mini-preview items-center justify-center p-1 gap-1" style={{ backgroundColor: bg }}>
                    <div style={{ flex: 1 }}>{textBar('60%')}{textBar('80%')}</div>
                    <div style={{ ...boxStyle, flex: 1, height: '70%' }}>
                        <div style={{ backgroundColor: acc, height: '4px', borderRadius: '2px 2px 0 0' }} />
                    </div>
                </div>
            );

            if (layout.startsWith('split-')) return (
                <div className="mini-preview items-stretch p-1 gap-1" style={{ backgroundColor: bg }}>
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '2px' }}>
                        {accentBar('60%')}{textBar('80%')}{textBar('50%')}
                    </div>
                    <div style={{ ...boxStyle, flex: 1 }} />
                </div>
            );

            const safeEmoji = Array.isArray(slide.emojis) ? slide.emojis[0] : String(slide.emojis || '✨');
            return (
                <div className="mini-preview items-center justify-center flex-col" style={{ backgroundColor: bg }}>
                    {slide.emojis && <div style={{ fontSize: '14px', marginBottom: '2px' }}>{safeEmoji.substring(0, 2)}</div>}
                    {accentBar('50%')}
                    {textBar('70%')}
                </div>
            );
        };

        // ============================================================
        // SLIDE EDITOR PANELS
        // ============================================================
        const CoverEditor = ({ slide, updateField, onGenerateImage, isGenerating }) => {
            const [imgPrompt, setImgPrompt] = useState('');
            const [showCrop, setShowCrop] = useState(false);
            const hasImage = slide.imageUrl?.startsWith('data:');
            return (
                <div className="space-y-4">
                    {showCrop && <CropModal imageUrl={slide.imageUrl} onConfirm={url => { updateField('imageUrl', url); setShowCrop(false); }} onClose={() => setShowCrop(false)} />}
                    <Field label="Título Principal" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Ej: Modal Verbs" />
                    <Field label="Subtítulo (arriba)" value={slide.subtitle} onChange={v => updateField('subtitle', v)} placeholder="Ej: READING WORKSHOP" />
                    <Field label="Branding (abajo)" value={slide.branding} onChange={v => updateField('branding', v)} placeholder="Ej: theTeacher" />

                    {/* COVER IMAGE */}
                    <div>
                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">
                            Visual de Portada {hasImage && <span className="text-violet-400 ml-1">● IA</span>}
                        </label>
                        {hasImage ? (
                            <div className="space-y-2">
                                <img src={slide.imageUrl} alt="Cover" className="w-36 h-36 rounded-2xl object-cover border border-violet-800/50 shadow-lg" />
                                <div className="flex gap-2">
                                    <input value={imgPrompt} onChange={e => setImgPrompt(e.target.value)} placeholder="Nuevo prompt..." className="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-2 text-xs text-zinc-300 outline-none focus:border-violet-500" />
                                    <button onClick={() => onGenerateImage(imgPrompt || slide.heading || '')} disabled={isGenerating} className="bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white py-2 px-3 rounded-xl font-bold text-xs flex items-center gap-1.5 shrink-0 transition">
                                        {isGenerating ? <Loader2 size={13} className="animate-spin"/> : '🎨'} Regen
                                    </button>
                                    <button onClick={() => setShowCrop(true)} className="bg-zinc-700 hover:bg-zinc-600 text-zinc-300 py-2 px-3 rounded-xl text-xs transition" title="Recortar">✂️</button>
                                    <button onClick={() => updateField('imageUrl', '')} className="bg-zinc-800 hover:bg-rose-900/40 text-rose-400 py-2 px-3 rounded-xl text-xs transition" title="Eliminar"><Trash2 size={13}/></button>
                                </div>
                            </div>
                        ) : (
                            <div className="flex gap-2">
                                <input value={imgPrompt} onChange={e => setImgPrompt(e.target.value)} placeholder="Describe un visual para la portada..." className="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-2 text-xs text-zinc-300 outline-none focus:border-violet-500" />
                                <button onClick={() => onGenerateImage(imgPrompt || slide.heading || '')} disabled={isGenerating} className="bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white py-2 px-3 rounded-xl font-bold text-xs flex items-center gap-1.5 shrink-0 transition">
                                    {isGenerating ? <Loader2 size={13} className="animate-spin"/> : '🎨'} IA
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const HeroEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <FieldArea label="Texto Principal" value={slide.text} onChange={v => updateField('text', v)} max={250} placeholder="El texto grande que se ve centrado..." />
                <Field label="Subtexto" value={slide.subtext} onChange={v => updateField('subtext', v)} placeholder="Texto secundario debajo (opcional)" />
                <Field label="Emojis" value={Array.isArray(slide.emojis) ? slide.emojis.join(' ') : (slide.emojis || '')} onChange={v => updateField('emojis', v)} placeholder="✨🎯" className="text-2xl text-center" />
            </div>
        );

        const BulletsEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <Field label="Encabezado" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Título del slide" />
                <Field label="Emojis" value={Array.isArray(slide.emojis) ? slide.emojis.join(' ') : (slide.emojis || '')} onChange={v => updateField('emojis', v)} placeholder="📝🎯" className="text-xl text-center" />
                <ArrayEditor label="Bullets" items={slide.bullets || []} onChange={v => updateField('bullets', v)} placeholder="Punto a explicar..." />
            </div>
        );

        const SplitEditor = ({ slide, updateField, onGenerateImage, isGenerating }) => {
            const [imgPrompt, setImgPrompt] = useState('');
            const [showCrop, setShowCrop] = useState(false);
            const hasDataImage = slide.imageUrl?.startsWith('data:');

            return (
                <div className="space-y-4">
                    {showCrop && <CropModal imageUrl={slide.imageUrl} onConfirm={url => { updateField('imageUrl', url); setShowCrop(false); }} onClose={() => setShowCrop(false)} />}
                    <Field label="Encabezado" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Título" />
                    <FieldArea label="Texto" value={slide.text} onChange={v => updateField('text', v)} max={400} placeholder="Texto explicativo..." />

                    {/* IMAGE SECTION */}
                    <div>
                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">
                            Imagen de Slide {hasDataImage && <span className="text-violet-400 ml-1">● IA</span>}
                        </label>

                        {hasDataImage ? (
                            <div className="space-y-2">
                                <img src={slide.imageUrl} alt="IA" className="w-full max-w-[200px] rounded-xl border border-violet-800/50 object-cover" />
                                <div className="flex gap-2">
                                    <input value={imgPrompt} onChange={e => setImgPrompt(e.target.value)} placeholder="Nuevo prompt (inglés)..." className="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-2 text-xs text-zinc-300 outline-none focus:border-violet-500" />
                                    <button onClick={() => onGenerateImage(imgPrompt || slide.heading || '')} disabled={isGenerating} className="bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white py-2 px-3 rounded-xl font-bold text-xs flex items-center gap-1.5 transition shrink-0">
                                        {isGenerating ? <Loader2 size={13} className="animate-spin"/> : '🎨'} Regen
                                    </button>
                                    <button onClick={() => setShowCrop(true)} className="bg-zinc-700 hover:bg-zinc-600 text-zinc-300 py-2 px-3 rounded-xl text-xs transition" title="Recortar">✂️</button>
                                    <button onClick={() => updateField('imageUrl', '')} className="bg-zinc-800 hover:bg-rose-900/40 text-rose-400 py-2 px-3 rounded-xl text-xs transition" title="Eliminar"><Trash2 size={13}/></button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-2">
                                <input value={slide.imageUrl} onChange={e => updateField('imageUrl', e.target.value)} placeholder="https://... o genera con IA ↓" className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500" />
                                <div className="flex gap-2">
                                    <input value={imgPrompt} onChange={e => setImgPrompt(e.target.value)} placeholder="Describe la imagen en inglés..." className="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-2 text-xs text-zinc-300 outline-none focus:border-violet-500" />
                                    <button onClick={() => onGenerateImage(imgPrompt || slide.heading || '')} disabled={isGenerating} className="bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white py-2 px-3 rounded-xl font-bold text-xs flex items-center gap-1.5 transition shrink-0">
                                        {isGenerating ? <Loader2 size={13} className="animate-spin"/> : '🎨'} IA
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    <Field label="Emojis (fallback sin imagen)" value={Array.isArray(slide.emojis) ? slide.emojis.join(' ') : (slide.emojis || '')} onChange={v => updateField('emojis', v)} placeholder="📝" className="text-2xl text-center" />
                    <ArrayEditor label="Bullets (opcional)" items={slide.bullets || []} onChange={v => updateField('bullets', v)} placeholder="Punto..." />
                </div>
            );
        };

        const TwoColumnsEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <Field label="Encabezado General" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Ej: Can vs Could" />
                {['leftColumn', 'rightColumn'].map((col, ci) => {
                    const data = slide[col] || { title: '', items: [''] };
                    return (
                        <div key={col} className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                            <Field label={ci === 0 ? "Columna Izquierda - Título" : "Columna Derecha - Título"} 
                                value={data.title} onChange={v => updateField(col, { ...data, title: v })} placeholder="Título columna" />
                            <div className="mt-3">
                                <ArrayEditor label="Elementos" items={data.items || []} 
                                    onChange={v => updateField(col, { ...data, items: v })} placeholder="Ej: ✅ I can swim" />
                            </div>
                        </div>
                    );
                })}
            </div>
        );

        const TableEditor = ({ slide, updateField }) => {
            const table = slide.table || { headers: ['A', 'B'], rows: [['', '']] };
            const updateTable = (newTable) => updateField('table', newTable);

            return (
                <div className="space-y-4">
                    <Field label="Encabezado" value={slide.heading} onChange={v => updateField('heading', v)} placeholder="Título de la tabla" />
                    <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2">Headers (separados por coma)</label>
                        <input value={(table.headers || []).join(', ')} 
                            onChange={e => updateTable({ ...table, headers: e.target.value.split(',').map(h => h.trim()) })}
                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500" />
                        
                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2 mt-4">Filas</label>
                        {(table.rows || []).map((row, ri) => (
                            <div key={ri} className="flex gap-2 mb-2 items-center">
                                {row.map((cell, ci) => (
                                    <input key={ci} value={cell} 
                                        onChange={e => {
                                            const newRows = [...table.rows];
                                            newRows[ri] = [...newRows[ri]];
                                            newRows[ri][ci] = e.target.value;
                                            updateTable({ ...table, rows: newRows });
                                        }}
                                        className="flex-1 bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-xs text-zinc-200 outline-none focus:border-indigo-500"
                                        placeholder={`Celda ${ci+1}`} />
                                ))}
                                <button onClick={() => { const r = [...table.rows]; r.splice(ri, 1); updateTable({ ...table, rows: r }); }}
                                    className="text-rose-500 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
                            </div>
                        ))}
                        <button onClick={() => updateTable({ ...table, rows: [...table.rows, Array(table.headers.length).fill('')] })}
                            className="text-xs text-indigo-400 font-bold hover:text-indigo-300 mt-1">+ Fila</button>
                    </div>
                    <ArrayEditor label="Notas al lado (opcional)" items={slide.notes || []} onChange={v => updateField('notes', v)} placeholder="Nota explicativa..." />
                </div>
            );
        };

        const MindMapEditor = ({ slide, updateField }) => {
            const branches = slide.branches || [];
            const colors = ['#A8E6CF', '#DCEDC1', '#FFD3B6', '#FFAAA5', '#B5EAD7', '#C7CEEA', '#FFDAC1', '#E2F0CB'];
            
            return (
                <div className="space-y-4">
                    <Field label="Concepto Central" value={slide.centerLabel} onChange={v => updateField('centerLabel', v)} placeholder="Ej: Modal Verbs" />
                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block">Ramas</label>
                    {branches.map((b, i) => (
                        <div key={i} className="bg-zinc-900/50 p-3 rounded-xl border border-zinc-800 grid grid-cols-3 gap-2 items-center">
                            <input value={b.term} onChange={e => {
                                const nb = [...branches]; nb[i] = { ...nb[i], term: e.target.value }; updateField('branches', nb);
                            }} className="bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-sm font-bold text-white outline-none" placeholder="Término" />
                            <input value={b.translation || ''} onChange={e => {
                                const nb = [...branches]; nb[i] = { ...nb[i], translation: e.target.value }; updateField('branches', nb);
                            }} className="bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-xs text-zinc-300 outline-none" placeholder="Traducción" />
                            <div className="flex gap-1 items-center">
                                {colors.slice(0, 4).map(c => (
                                    <button key={c} onClick={() => { const nb = [...branches]; nb[i] = { ...nb[i], color: c }; updateField('branches', nb); }}
                                        className="w-5 h-5 rounded-full border-2 transition-transform hover:scale-125"

                    {!hasImage && (

            );
        };

        // ============================================================
        // CROP MODAL (Canvas — no libs)
        // ============================================================
        const CropModal = ({ imageUrl, onConfirm, onClose }) => {
            const containerRef = useRef(null);
            const overlayRef = useRef(null);
            const imgRef = useRef(null);
            const [cropRect, setCropRect] = useState(null);
            const dragging = useRef(false);
            const startPt = useRef({ x: 0, y: 0 });

            const getRelPos = (e) => {
                const rect = containerRef.current.getBoundingClientRect();
                const src = e.touches ? e.touches[0] : e;
                return {
                    x: Math.max(0, Math.min(src.clientX - rect.left, rect.width)),
                    y: Math.max(0, Math.min(src.clientY - rect.top, rect.height))
                };
            };

            const syncCanvas = () => {
                const canvas = overlayRef.current;
                const container = containerRef.current;
                if (!canvas || !container) return;
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;
            };

            const drawOverlay = (rect) => {
                const canvas = overlayRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (!rect || rect.w < 2 || rect.h < 2) return;
                ctx.fillStyle = 'rgba(0,0,0,0.58)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.clearRect(rect.x, rect.y, rect.w, rect.h);
                ctx.strokeStyle = '#a78bfa';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
                ctx.setLineDash([]);
                const hs = 7;
                [[rect.x, rect.y], [rect.x + rect.w, rect.y], [rect.x, rect.y + rect.h], [rect.x + rect.w, rect.y + rect.h]].forEach(([cx, cy]) => {
                    ctx.fillStyle = '#a78bfa';
                    ctx.fillRect(cx - hs/2, cy - hs/2, hs, hs);
                });
            };

            const onStart = (e) => {
                e.preventDefault();
                syncCanvas();
                dragging.current = true;
                startPt.current = getRelPos(e);
                setCropRect(null);
                drawOverlay(null);
            };

            const onMove = (e) => {
                if (!dragging.current) return;
                e.preventDefault();
                const pos = getRelPos(e);
                const rect = {
                    x: Math.min(startPt.current.x, pos.x),
                    y: Math.min(startPt.current.y, pos.y),
                    w: Math.abs(pos.x - startPt.current.x),
                    h: Math.abs(pos.y - startPt.current.y)
                };
                setCropRect(rect);
                drawOverlay(rect);
            };

            const onEnd = () => { dragging.current = false; };

            const applyCrop = () => {
                if (!cropRect || cropRect.w < 10 || cropRect.h < 10) return;
                const img = imgRef.current;
                const cr = containerRef.current.getBoundingClientRect();
                const scaleX = img.naturalWidth / cr.width;
                const scaleY = img.naturalHeight / cr.height;
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(cropRect.w * scaleX);
                canvas.height = Math.round(cropRect.h * scaleY);
                canvas.getContext('2d').drawImage(
                    img,
                    cropRect.x * scaleX, cropRect.y * scaleY,
                    cropRect.w * scaleX, cropRect.h * scaleY,
                    0, 0, canvas.width, canvas.height
                );
                onConfirm(canvas.toDataURL('image/jpeg', 0.92));
            };

            useEffect(() => {
                syncCanvas();
                window.addEventListener('resize', syncCanvas);
                return () => window.removeEventListener('resize', syncCanvas);
            }, []);

            return (
                <div className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-zinc-950 border border-zinc-800 rounded-2xl p-4 w-full max-w-2xl shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-black text-white text-sm">✂️ Recortar imagen</h3>
                            <button onClick={onClose} className="text-zinc-500 hover:text-white p-1"><X size={16}/></button>
                        </div>
                        <p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-3">Arrastra para seleccionar el área · la calidad no cambia</p>
                        <div
                            ref={containerRef}
                            className="relative w-full overflow-hidden rounded-xl cursor-crosshair"
                            style={{ userSelect: 'none', touchAction: 'none' }}
                            onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
                            onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
                        >
                            <img ref={imgRef} src={imageUrl} alt="" className="w-full h-auto block" draggable={false} onLoad={syncCanvas} />
                            <canvas ref={overlayRef} className="absolute inset-0" style={{ width: '100%', height: '100%', touchAction: 'none' }} />
                        </div>
                        <div className="flex gap-3 mt-4 justify-end">
                            <button onClick={onClose} className="bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition">Cancelar</button>
                            <button onClick={applyCrop} disabled={!cropRect || cropRect.w < 10} className="bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition">
                                ✂️ Aplicar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // IMAGE COMPRESSION UTILITY (Canvas — no libs)
        // ============================================================
        const compressImageToDataUrl = (base64, mimeType, maxSize = 600) => new Promise(resolve => {
            const img = document.createElement('img'); // ⚠️ No usar `new Image()` — `Image` está importado de lucide-react y lo sobreescribe
            img.onload = () => {
                const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * scale);
                canvas.height = Math.round(img.height * scale);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
            };
            img.onerror = () => resolve(`data:${mimeType};base64,${base64}`);
            img.src = `data:${mimeType || 'image/png'};base64,${base64}`;
        });

        // --- Minigame Editors ---
        const MCEditor = ({ slide, updateField }) => {
            const questions = slide.questions || [];
            return (
                <div className="space-y-4">

                            <div className="grid grid-cols-3 gap-2">
                                {[0,1,2,3].map(oi => (
                                    <div key={oi} className="relative">
                                        <input value={q.options?.[oi] || ''} onChange={e => {
                                            const nq = [...questions]; const opts = [...(nq[qi].options || ['', '', '', ''])]; opts[oi] = e.target.value; nq[qi] = { ...nq[qi], options: opts }; updateField('questions', nq);
                                        }} className={`w-full bg-zinc-900 border p-2 rounded-lg text-xs outline-none pr-8 ${q.correctIndex === oi ? 'border-emerald-500 text-emerald-300 font-bold' : 'border-zinc-700 text-white'}`} placeholder={`Opción ${oi+1}`} />
                                        <button onClick={() => { const nq = [...questions]; nq[qi] = { ...nq[qi], correctIndex: oi }; updateField('questions', nq); }}
                                            className={`absolute right-2 top-2 w-4 h-4 rounded-full border-2 ${q.correctIndex === oi ? 'border-emerald-500 bg-emerald-500' : 'border-zinc-600'}`} />
                                    </div>

                            {questions.length > 1 && (
                                <button onClick={() => { const nq = [...questions]; nq.splice(qi, 1); updateField('questions', nq); }}
                                    className="text-rose-500 text-xs font-bold mt-2 hover:text-rose-400">Eliminar pregunta</button>

                    ))}
                    <button onClick={() => updateField('questions', [...questions, { question: '', options: ['', '', '', ''], correctIndex: 0 }])}
                        className="text-xs text-emerald-400 font-bold hover:text-emerald-300">+ Pregunta</button>
                </div>

        const FBEditor = ({ slide, updateField }) => (
            <div className="space-y-4">
                <h4 className="font-black text-emerald-400 text-sm flex items-center gap-2"><Edit3 size={14}/> Rellenar Huecos</h4>
                <FieldArea label="Historia (usa [corchetes] para huecos)" value={slide.text} onChange={v => updateField('text', v)} max={600} placeholder="Yesterday, I [went] to the store and [bought]..." />
                <Field label="Wordbank (respuestas + distractores, separados por coma)" value={Array.isArray(slide.wordBank) ? slide.wordBank.join(', ') : slide.wordBank || ''} 
                    onChange={v => updateField('wordBank', v.split(',').map(w => w.trim()).filter(Boolean))} placeholder="went, bought, goes, buy, took" className="text-emerald-400 font-bold" />
            </div>

        const Field = ({ label, value, onChange, placeholder, className = '', type = 'text' }) => (
            <div>
                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">{label}</label>
                <input type={type} value={value || ''} onChange={e => onChange(e.target.value)}

                    placeholder={placeholder} />
            </div>
        );

        const FieldArea = ({ label, value, onChange, placeholder, max }) => (
            <div>
                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">{label}</label>
                <textarea value={value || ''} onChange={e => onChange(e.target.value)} maxLength={max}

                    placeholder={placeholder} />

        const ArrayEditor = ({ label, items, onChange, placeholder }) => (

                {items.map((item, i) => (

        // ============================================================
        // MAIN DASHBOARD
        // ============================================================
        const Dashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            
            const [isGeneratingTheory, setIsGeneratingTheory] = useState(false);
            const [isGeneratingMinigames, setIsGeneratingMinigames] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [generatingImageFor, setGeneratingImageFor] = useState(null);
            
            const abortControllerRef = useRef(null);

            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);

            // Creation Taxonomy (IA)
            const [level, setLevel] = useState('basic');
            const [category, setCategory] = useState('grammar');
            const [topic, setTopic] = useState('Present Simple');
            const [promptText, setPromptText] = useState("");
            const [selectedTheme, setSelectedTheme] = useState('midnight');

            // Save Taxonomy (Firestore) - Arrays multi-selección
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels] = useState([]);
            const [saveCats, setSaveCats] = useState([]);
            const [saveTopics, setSaveTopics] = useState([]);

            const [title, setTitle] = useState("");
            const [slides, setSlides] = useState([]);
            const [addMenuOpen, setAddMenuOpen] = useState(false);

            const toggleSelection = (stateArray, setStateFunction, item) => {
                if (stateArray.includes(item)) {
                    setStateFunction(stateArray.filter(i => i !== item));
                } else {
                    setStateFunction([...stateArray, item]);
                }
            };

            useEffect(() => {
                const savedKey = AI.loadKey();
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setEditingId(editId);
                            if (data.theme) {
                                if (typeof data.theme === 'string') setSelectedTheme(data.theme);
                                else if (data.theme.preview) {
                                    const matchedKey = Object.keys(THEMES).find(key => THEMES[key].preview === data.theme.preview);
                                    if (matchedKey) setSelectedTheme(matchedKey);
                                }
                            }
                            if (data.content?.slides) setSlides(deserializeSlides(data.content.slides));
                            if (data.tags) {
                                setSaveLevels(data.tags.levels || (data.tags.level ? [data.tags.level.toUpperCase()] : []));
                                setSaveCats(data.tags.categories || (data.tags.category ? [data.tags.category] : []));
                                setSaveTopics(data.tags.topics || (data.tags.topic ? [data.tags.topic] : []));
                                
                                setLevel(data.tags.level || 'basic');
                                setCategory(data.tags.category || 'grammar');
                                setTopic(data.tags.topic || 'Otro');
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[level] && TAXONOMY[level][category]) {
                    setTopic(TAXONOMY[level][category][0] || 'Otro');
                } else {
                    const firstCat = Object.keys(TAXONOMY[level] || {})[0];
                    if (firstCat) setCategory(firstCat);
                }
            }, [level, category]);

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");

                try {
                    const validModels = await AI.fetchModels(apiKey);
                    setAvailableModels(validModels);

                finally { setIsLoadingModels(false); }

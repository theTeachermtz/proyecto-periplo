<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📽️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Presentation, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Plus, Trash2, ArrowUp, ArrowDown, LayoutTemplate, Smile, Gamepad2, Settings2, BookOpen, CheckSquare } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TAXONOMY = {
            basic: { grammar: ["Modal Verbs", "Present Simple", "Present Continuous", "Future (Going to)", "Otro"], verbs: ["Pack 1", "Pack 2", "Pack 3", "Otro"], key_structs: ["WH Questions", "Prepositions", "Otro"] },
            advanced: { grammar: ["Past Simple", "Second Conditional", "Past Continuous", "Otro"], verbs: ["Irregular Verbs", "Otro"], key_structs: ["Used to", "Relative Clauses", "Otro"] },
            pro: { grammar: ["Present Perfect", "Third Conditional", "Otro"], key_structs: ["Inversion", "Cleft Sentences", "Otro"] }
        };

        const LAYOUT_OPTIONS = [
            { id: 'hero-emoji-center', label: 'Emoji Centro (Hero)' },
            { id: 'hero-emoji-top', label: 'Emoji Arriba (Hero)' },
            { id: 'split-text-left', label: 'Texto Izq / Emoji Der' },
            { id: 'split-text-right', label: 'Texto Der / Emoji Izq' },
            { id: 'horizontal-emoji-band', label: 'Banda Inferior' }
        ];

        const Dashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);

            // Left Panel State
            const [level, setLevel] = useState('basic');
            const [category, setCategory] = useState('grammar');
            const [topic, setTopic] = useState('Present Simple');
            const [promptText, setPromptText] = useState("");
            
            // Mini-game Toggles
            const [includeMC, setIncludeMC] = useState(false);
            const [includeFB, setIncludeFB] = useState(false);
            const [includeSS, setIncludeSS] = useState(false);

            // Right Panel State
            const [title, setTitle] = useState("");
            const [slides, setSlides] = useState([]);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setEditingId(editId);
                            if (data.content && data.content.slides) setSlides(data.content.slides);
                            
                            if (data.tags) {
                                setLevel(data.tags.level || 'basic');
                                setCategory(data.tags.category || 'grammar');
                                setTopic(data.tags.topic || 'Otro');
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[level] && TAXONOMY[level][category]) {
                    setTopic(TAXONOMY[level][category][0] || 'Otro');
                } else {
                    const firstCat = Object.keys(TAXONOMY[level] || {})[0];
                    if (firstCat) setCategory(firstCat);
                }
            }, [level]);

            const generateWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!promptText.trim()) { alert("Escribe instrucciones en el prompt."); return; }

                setIsGenerating(true);
                try {
                    const systemPrompt = `
                        Eres el "Frontend CTO" y un creador de contenido educativo. Genera una presentación estructurada sobre: ${topic} (${level} level).
                        Instrucciones del maestro: ${promptText}

                        TONO Y EXTENSIÓN:
                        - Explica de manera eficiente, con un lenguaje amigable, atrapante y relajado.
                        - TÚ decides cuántas diapositivas de teoría ("theory") son necesarias para explicar bien y secuencialmente el tema. No te limites, pero sé directo.

                        MINIJUEGOS SOLICITADOS (Crea UNA diapositiva por cada minijuego solicitado al final de la teoría):
                        ${includeMC ? '- "multipleChoice": EXACTAMENTE 5 preguntas sobre el tema explicado.' : ''}
                        ${includeFB ? '- "fillBlank": Una historia corta relacionada al tema con EXACTAMENTE 5 huecos (marcados con corchetes, ej: [palabra]). Añade un array "wordBank" con las 5 respuestas correctas MÁS 2 distractores.' : ''}
                        ${includeSS ? '- "sentenceScramble": EXACTAMENTE 5 oraciones en inglés para ordenar, con su respectiva traducción al español.' : ''}

                        Devuelve ÚNICAMENTE un JSON válido con esta estructura estricta:
                        {
                            "suggestedTitle": "Un título atractivo",
                            "slides": [
                                {
                                    "type": "theory",
                                    "text": "Explicación concisa (máximo 200 caracteres por slide).",
                                    "emojis": "📝🎯✨" (Sugerencia de 2 a 3 emojis Unicode juntos)
                                },
                                // Si se solicitó multipleChoice:
                                {
                                    "type": "multipleChoice",
                                    "questions": [
                                        { "question": "¿...?", "options": ["Opc1", "Opc2", "Opc3"], "correctIndex": 0 } // Repetir 5 veces
                                    ]
                                },
                                // Si se solicitó fillBlank:
                                {
                                    "type": "fillBlank",
                                    "text": "Historia con [hueco1] y [hueco2]...",
                                    "wordBank": ["hueco1", "hueco2", "distractor1", "distractor2"]
                                },
                                // Si se solicitó sentenceScramble:
                                {
                                    "type": "sentenceScramble",
                                    "sentences": [
                                        { "text": "Correct sentence in English", "translation": "Traducción al español" } // Repetir 5 veces
                                    ]
                                }
                            ]
                        }
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    const parsedData = JSON.parse(resultText);
                    if (!title) setTitle(parsedData.suggestedTitle);
                    
                    const newSlides = parsedData.slides.map(s => ({
                        ...s,
                        id: crypto.randomUUID(),
                        layout: s.type === 'theory' ? 'hero-emoji-center' : undefined
                    }));

                    setSlides(newSlides);
                } catch (error) {
                    alert("Error parseando la respuesta de la IA. Revisa la consola o intenta de nuevo.");
                    console.error(error);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleSave = async () => {
                if (!title.trim()) return alert("El título es obligatorio.");
                if (slides.length === 0) return alert("Añade al menos una diapositiva.");
                
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    const payload = {
                        title,
                        type: 'PRESENTATION',
                        tags: { level, category, topic },
                        content: { slides },
                        parentPath,
                        updatedAt: serverTimestamp()
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), payload);
                    } else {
                        payload.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
                } catch (error) {
                    alert("Error al guardar: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            // Helpers for deep state updates
            const updateSlideField = (id, field, value) => {
                setSlides(slides.map(s => s.id === id ? { ...s, [field]: value } : s));
            };

            const updateNestedSlideField = (slideId, arrayName, index, field, value) => {
                setSlides(slides.map(s => {
                    if (s.id !== slideId) return s;
                    const newArray = [...s[arrayName]];
                    newArray[index] = { ...newArray[index], [field]: value };
                    return { ...s, [arrayName]: newArray };
                }));
            };

            const updateMCOption = (slideId, qIndex, optIndex, value) => {
                setSlides(slides.map(s => {
                    if (s.id !== slideId) return s;
                    const newQuestions = [...s.questions];
                    const newOptions = [...newQuestions[qIndex].options];
                    newOptions[optIndex] = value;
                    newQuestions[qIndex] = { ...newQuestions[qIndex], options: newOptions };
                    return { ...s, questions: newQuestions };
                }));
            };

            const removeSlide = (id) => setSlides(slides.filter(s => s.id !== id));
            
            const moveSlide = (index, direction) => {
                if (direction === -1 && index === 0) return;
                if (direction === 1 && index === slides.length - 1) return;
                const newSlides = [...slides];
                const temp = newSlides[index];
                newSlides[index] = newSlides[index + direction];
                newSlides[index + direction] = temp;
                setSlides(newSlides);
            };

            const addManualSlide = () => {
                setSlides([...slides, { id: crypto.randomUUID(), type: 'theory', text: '', emojis: '✨', layout: 'hero-emoji-center' }]);
            };

            return (
                <div className="h-[100dvh] flex flex-col relative overflow-hidden">
                    {/* HEADER */}
                    <div className="bg-zinc-950 px-6 py-4 flex justify-between items-center shrink-0 border-b border-zinc-800 z-10">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl transition text-white"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-indigo-400"><Presentation/> Presentation Builder</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-zinc-400 hover:text-amber-400 transition"><KeyRound size={20}/></button>
                            <button onClick={handleSave} disabled={isSaving} className="btn-juicy bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 text-black px-6 py-2 rounded-xl font-black flex gap-2 border-emerald-700">
                                {isSaving ? <Loader2 className="animate-spin"/> : <Save/>} GUARDAR
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        
                        {/* LEFT PANEL: IA & CONFIGURATION */}
                        <div className="w-full lg:w-1/3 bg-zinc-950 border-r border-zinc-800 p-6 overflow-y-auto custom-scrollbar flex flex-col">
                            
                            {showApiInput && (
                                <div className="bg-zinc-900 p-4 rounded-xl mb-6 flex gap-3 items-center border border-zinc-700">
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="API Key de Gemini..." className="flex-1 bg-zinc-950 border border-zinc-700 p-2 rounded-lg outline-none text-sm text-white focus:border-indigo-500"/>
                                </div>
                            )}

                            <div className="mb-6">
                                <h2 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Settings2 size={16}/> Taxonomía</h2>
                                <div className="space-y-3">
                                    <select value={level} onChange={e => setLevel(e.target.value)} className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white outline-none focus:border-indigo-500">
                                        <option value="basic">BASIC</option>
                                        <option value="advanced">ADVANCED</option>
                                        <option value="pro">PRO</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select value={category} onChange={e => setCategory(e.target.value)} className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white outline-none focus:border-indigo-500 capitalize">
                                            {Object.keys(TAXONOMY[level] || {}).map(c => <option key={c} value={c}>{c.replace('_', ' ')}</option>)}
                                        </select>
                                        <select value={topic} onChange={e => setTopic(e.target.value)} className="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white outline-none focus:border-indigo-500">
                                            {(TAXONOMY[level]?.[category] || []).map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div className="mb-6 border-t border-zinc-800 pt-6">
                                <h2 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Gamepad2 size={16} className="text-emerald-400"/> Inyectar Minijuegos</h2>
                                <p className="text-[10px] text-zinc-400 mb-3">La IA creará slides dinámicas al final de la teoría con 5 preguntas cada uno.</p>
                                <div className="space-y-2">
                                    <label className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${includeMC ? 'bg-emerald-500/10 border-emerald-500/50' : 'bg-zinc-900 border-zinc-800 hover:bg-zinc-800'}`}>
                                        <input type="checkbox" checked={includeMC} onChange={e => setIncludeMC(e.target.checked)} className="w-4 h-4 accent-emerald-500"/>
                                        <span className="text-sm font-bold text-zinc-200">Opción Múltiple</span>
                                    </label>
                                    <label className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${includeFB ? 'bg-emerald-500/10 border-emerald-500/50' : 'bg-zinc-900 border-zinc-800 hover:bg-zinc-800'}`}>
                                        <input type="checkbox" checked={includeFB} onChange={e => setIncludeFB(e.target.checked)} className="w-4 h-4 accent-emerald-500"/>
                                        <span className="text-sm font-bold text-zinc-200">Rellenar Huecos (Historia)</span>
                                    </label>
                                    <label className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${includeSS ? 'bg-emerald-500/10 border-emerald-500/50' : 'bg-zinc-900 border-zinc-800 hover:bg-zinc-800'}`}>
                                        <input type="checkbox" checked={includeSS} onChange={e => setIncludeSS(e.target.checked)} className="w-4 h-4 accent-emerald-500"/>
                                        <span className="text-sm font-bold text-zinc-200">Ordenar Frases (Scramble)</span>
                                    </label>
                                </div>
                            </div>

                            <div className="flex-1 border-t border-zinc-800 pt-6">
                                <h2 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Sparkles size={16} className="text-amber-500"/> Prompt Teórico</h2>
                                <textarea 
                                    value={promptText} 
                                    onChange={e => setPromptText(e.target.value)} 
                                    placeholder="Ej: Explica las reglas de la 3ra persona singular. Hazlo simple y amigable..." 
                                    className="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 focus:border-amber-500 outline-none h-32 resize-none text-sm font-medium mb-6 text-white"
                                />
                                
                                <button onClick={generateWithAI} disabled={isGenerating} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 border-indigo-800">
                                    {isGenerating ? <Loader2 className="animate-spin" size={20}/> : <Sparkles size={20}/>} GENERAR PRESENTACIÓN
                                </button>
                            </div>
                        </div>

                        {/* RIGHT PANEL: EDITOR */}
                        <div className="w-full lg:w-2/3 bg-zinc-900 p-6 md:p-10 overflow-y-auto custom-scrollbar">
                            <input 
                                value={title} 
                                onChange={e => setTitle(e.target.value)} 
                                placeholder="Título de la Presentación..." 
                                className="w-full text-3xl md:text-5xl font-black bg-transparent border-b-2 border-zinc-800 pb-2 mb-10 outline-none focus:border-indigo-500 text-white placeholder-zinc-700"
                            />

                            <div className="space-y-6 pb-20">
                                {slides.map((slide, idx) => (
                                    <div key={slide.id} className="bg-zinc-950 border border-zinc-800 rounded-2xl p-5 relative group shadow-sm hover:border-zinc-700 transition-colors">
                                        
                                        {/* Slide Header */}
                                        <div className="flex justify-between items-center mb-4 pb-3 border-b border-zinc-800">
                                            <div className="flex items-center gap-3">
                                                <span className="bg-zinc-800 text-zinc-400 text-xs font-black px-3 py-1 rounded-full">Slide {idx + 1}</span>
                                                {slide.type === 'theory' && <span className="text-[10px] font-bold uppercase tracking-widest text-indigo-400 flex items-center gap-1"><BookOpen size={12}/> Teoría</span>}
                                                {slide.type !== 'theory' && <span className="text-[10px] font-bold uppercase tracking-widest text-emerald-400 flex items-center gap-1"><Gamepad2 size={12}/> Minijuego</span>}
                                            </div>
                                            <div className="flex gap-2 opacity-50 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => moveSlide(idx, -1)} disabled={idx === 0} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowUp size={16}/></button>
                                                <button onClick={() => moveSlide(idx, 1)} disabled={idx === slides.length - 1} className="p-1.5 hover:bg-zinc-800 rounded-md disabled:opacity-30"><ArrowDown size={16}/></button>
                                                <div className="w-px h-6 bg-zinc-800 mx-1"></div>
                                                <button onClick={() => removeSlide(slide.id)} className="p-1.5 text-rose-500 hover:bg-rose-900/30 rounded-md"><Trash2 size={16}/></button>
                                            </div>
                                        </div>

                                        {/* RENDER DYNAMIC SLIDE CONTENT */}
                                        
                                        {/* THEORY SLIDE */}
                                        {slide.type === 'theory' && (
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                                <div className="md:col-span-2">
                                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2">Contenido (Máx 200)</label>
                                                    <textarea 
                                                        value={slide.text} 
                                                        onChange={e => updateSlideField(slide.id, 'text', e.target.value)}
                                                        maxLength={200}
                                                        className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 outline-none focus:border-indigo-500 h-24 resize-none"
                                                    />
                                                </div>
                                                <div className="space-y-4">
                                                    <div>
                                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2 flex items-center gap-1"><Smile size={12}/> Emojis</label>
                                                        <input 
                                                            value={slide.emojis || ''} 
                                                            onChange={e => updateSlideField(slide.id, 'emojis', e.target.value)}
                                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-2xl text-center outline-none focus:border-amber-500"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2 flex items-center gap-1"><LayoutTemplate size={12}/> Layout</label>
                                                        <select 
                                                            value={slide.layout} 
                                                            onChange={e => updateSlideField(slide.id, 'layout', e.target.value)}
                                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-2.5 text-xs font-bold text-zinc-300 outline-none focus:border-indigo-500"
                                                        >
                                                            {LAYOUT_OPTIONS.map(l => <option key={l.id} value={l.id}>{l.label}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* MULTIPLE CHOICE SLIDE */}
                                        {slide.type === 'multipleChoice' && (
                                            <div className="space-y-4">
                                                <h4 className="font-black text-zinc-300 text-sm mb-4">Opción Múltiple</h4>
                                                {slide.questions?.map((q, qIdx) => (
                                                    <div key={qIdx} className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                                                        <input 
                                                            value={q.question} 
                                                            onChange={e => updateNestedSlideField(slide.id, 'questions', qIdx, 'question', e.target.value)} 
                                                            className="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-white outline-none focus:border-indigo-500 mb-3 text-sm font-bold"
                                                            placeholder={`Pregunta ${qIdx + 1}...`}
                                                        />
                                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                            {[0, 1, 2].map(optIdx => (
                                                                <div key={optIdx} className="relative">
                                                                    <input 
                                                                        value={q.options[optIdx]} 
                                                                        onChange={e => updateMCOption(slide.id, qIdx, optIdx, e.target.value)}
                                                                        className={`w-full bg-zinc-900 border p-3 rounded-xl text-xs outline-none transition-colors pr-10 ${q.correctIndex === optIdx ? 'border-emerald-500 text-emerald-300 font-bold' : 'border-zinc-700 focus:border-indigo-500 text-white'}`}
                                                                    />
                                                                    <button 
                                                                        onClick={() => updateNestedSlideField(slide.id, 'questions', qIdx, 'correctIndex', optIdx)}
                                                                        className={`absolute right-3 top-2.5 w-5 h-5 rounded-full border-2 transition-colors ${q.correctIndex === optIdx ? 'border-emerald-500 bg-emerald-500' : 'border-zinc-600'}`}
                                                                    />
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* FILL IN THE BLANK SLIDE */}
                                        {slide.type === 'fillBlank' && (
                                            <div className="space-y-4">
                                                <h4 className="font-black text-zinc-300 text-sm mb-4">Rellenar Huecos</h4>
                                                <div>
                                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2">Historia (Usa [corchetes] para los huecos)</label>
                                                    <textarea 
                                                        value={slide.text} 
                                                        onChange={e => updateSlideField(slide.id, 'text', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm text-zinc-200 outline-none focus:border-indigo-500 h-32 resize-none"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-2">Wordbank (Respuestas + Distractores, separados por coma)</label>
                                                    <input 
                                                        value={Array.isArray(slide.wordBank) ? slide.wordBank.join(', ') : slide.wordBank} 
                                                        onChange={e => updateSlideField(slide.id, 'wordBank', e.target.value.split(',').map(w => w.trim()))}
                                                        className="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-emerald-400 font-bold outline-none focus:border-indigo-500"
                                                    />
                                                </div>
                                            </div>
                                        )}

                                        {/* SENTENCE SCRAMBLE SLIDE */}
                                        {slide.type === 'sentenceScramble' && (
                                            <div className="space-y-4">
                                                <h4 className="font-black text-zinc-300 text-sm mb-4">Ordenar Frases</h4>
                                                {slide.sentences?.map((sent, sIdx) => (
                                                    <div key={sIdx} className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800 grid grid-cols-1 md:grid-cols-2 gap-3">
                                                        <div>
                                                            <label className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Inglés (Respuesta)</label>
                                                            <input value={sent.text} onChange={e => updateNestedSlideField(slide.id, 'sentences', sIdx, 'text', e.target.value)} className="w-full bg-zinc-900 border border-emerald-900/50 p-3 rounded-xl text-sm font-bold text-emerald-300 outline-none focus:border-emerald-500"/>
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Español (Pista)</label>
                                                            <input value={sent.translation} onChange={e => updateNestedSlideField(slide.id, 'sentences', sIdx, 'translation', e.target.value)} className="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm text-zinc-300 outline-none focus:border-indigo-500"/>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                    </div>
                                ))}

                                <button onClick={addManualSlide} className="w-full py-4 border-2 border-dashed border-zinc-800 hover:border-zinc-600 hover:bg-zinc-950 rounded-2xl text-zinc-500 font-bold flex justify-center items-center gap-2 transition-all">
                                    <Plus size={18}/> AÑADIR SLIDE DE TEORÍA
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

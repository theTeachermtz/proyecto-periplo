<body class="bg-slate-900 text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from 'firebase/firestore';
        
        import { User, Play, RotateCcw, AlertTriangle, CheckCircle, Zap, BookOpen, Pause, Users, ArrowRight, Home, Dices, Link as LinkIcon, Loader2, ArrowLeft, Eye, EyeOff } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const appId = 'periplo-app-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Mapeo de IDs (0 a 3) a colores del UNO
        const CAT_COLORS = { 0: 'bg-blue-500 border-blue-600', 1: 'bg-red-500 border-red-600', 2: 'bg-yellow-400 border-yellow-500', 3: 'bg-green-500 border-green-600', 'any': 'bg-slate-800 border-slate-600' };
        const CAT_TEXT = { 0: 'text-white', 1: 'text-white', 2: 'text-slate-900', 3: 'text-white', 'any': 'text-white' };

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const build112Deck = (categoriesData) => {
            const deck = [];
            
            // Construir 76 palabras (19 por categoría)
            categoriesData.forEach(cat => {
                const shuffledWords = shuffleArray([...cat.words]);
                const wordsToTake = shuffledWords.slice(0, 19);
                
                // Rellenar si la IA dio menos de 19
                while (wordsToTake.length < 19 && wordsToTake.length > 0) {
                    wordsToTake.push(wordsToTake[wordsToTake.length - 1]);
                }

                wordsToTake.forEach(w => {
                    deck.push({ type: 'word', word: w, categoryId: cat.id, categoryName: cat.name });
                });
            });

            // Construir 24 Cartas de Acción
            categoriesData.forEach(cat => {
                for(let i=0; i<2; i++) {
                    deck.push({ word: '+2', categoryId: cat.id, categoryName: cat.name, type: 'action', action: 'draw2', desc: 'Roba 2' });
                    deck.push({ word: 'Reversa', categoryId: cat.id, categoryName: cat.name, type: 'action', action: 'reverse', desc: 'Cambia sentido' });
                    deck.push({ word: 'Salto', categoryId: cat.id, categoryName: cat.name, type: 'action', action: 'skip', desc: 'Pierde turno' });
                }
            });

            // Construir 12 Comodines
            for(let i=0; i<4; i++) {
                deck.push({ word: 'Comodín', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'wild', desc: 'Elige categoría' });
                deck.push({ word: '+4 Wild', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'wild4', desc: '+4 al rival' });
                deck.push({ word: 'Swap', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'swap', desc: 'Intercambia tu mano' });
            }

            return shuffleArray(deck);
        };

        const getNextTurn = (currentTurn, activePlayers, direction = 1, steps = 1) => {
            let idx = activePlayers.indexOf(currentTurn);
            if (idx === -1) return activePlayers[0];
            let nextIdx = (idx + (direction * steps)) % activePlayers.length;
            if (nextIdx < 0) nextIdx += activePlayers.length;
            return activePlayers[nextIdx];
        };

        const UnoGame = () => {
            const [user, setUser] = useState(null);
            const [deckId, setDeckId] = useState(''); 
            const [roomId, setRoomId] = useState('');
            const [roomData, setRoomData] = useState(null);
            const [joinInput, setJoinInput] = useState('');
            
            const [localFeedback, setLocalFeedback] = useState({ text: '', type: '', visible: false });
            const [localError, setLocalError] = useState('');
            const [flashCategory, setFlashCategory] = useState(null);

            const [isStudentMode, setIsStudentMode] = useState(false);
            const [studentName, setStudentName] = useState('');
            const [pendingWildCard, setPendingWildCard] = useState(null);
            const [pendingSwapCard, setPendingSwapCard] = useState(null);
            const [showMaestroView, setShowMaestroView] = useState(true);

            // Evitar congelamientos Chrome Mobile
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && roomId) {
                        getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId)).then(snap => {
                            if (snap.exists()) setRoomData(snap.data());
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, [roomId]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const idFromUrl = params.get('id'); 
                if (idFromUrl) setDeckId(idFromUrl);

                if (params.get('mode') === 'student') {
                    setIsStudentMode(true);
                    setStudentName(localStorage.getItem('periplo_student_name') || '');
                }
                const urlCode = params.get('code');
                if (urlCode) setJoinInput(urlCode.toUpperCase());

                signInAnonymously(auth).catch(e => console.error(e));
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!roomId || !user) { setRoomData(null); return; }
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                const unsubscribe = onSnapshot(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        setRoomData(snapshot.data());
                    } else {
                        setRoomData(null);
                        setLocalError("La sala fue cerrada o no existe.");
                        setRoomId('');
                    }
                });
                return () => unsubscribe();
            }, [user, roomId]);

            useEffect(() => {
                if (roomData?.feedbackMessage?.ts) {
                    setLocalFeedback({ ...roomData.feedbackMessage, visible: true });
                    const t = setTimeout(() => setLocalFeedback(prev => ({ ...prev, visible: false })), 2500);
                    return () => clearTimeout(t);
                }
            }, [roomData?.feedbackMessage?.ts]);

            useEffect(() => {
                let interval;
                if (roomData?.isRandomizing) {
                    let i = 0;
                    interval = setInterval(() => { setFlashCategory(i % 4); i++; }, 100);
                } else {
                    setFlashCategory(null);
                }
                return () => clearInterval(interval);
            }, [roomData?.isRandomizing]);

            const updateGame = async (updates) => {
                if (!roomId || !user) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                    await updateDoc(roomRef, updates);
                } catch (e) { console.error(e); }
            };

            const handleCreateRoom = async () => {
                let currentUser = user;
                if (!currentUser || !deckId) return;
                
                try {
                    const deckSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId));
                    if (!deckSnap.exists()) { alert("No se encontró el mazo. Regresa al dashboard."); return; }
                    
                    const customCategories = deckSnap.data().content.categories;

                    const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                    await setDoc(roomRef, {
                        roomId: code,
                        categories: customCategories, 
                        gameState: 'MENU',
                        players: { s1: currentUser.uid, s2: null, j1: null, j2: null, j3: null, j4: null },
                        playerNames: { [currentUser.uid]: 'Mtro Creador' }, 
                        deck: [], player1Hand: [], player2Hand: [], player3Hand: [], player4Hand: [],
                        currentCategoryId: null, tableCard: null, 
                        turn: 1, direction: 1, activeUnoPenalty: null, unoCalled: {},
                        isRandomizing: false, winner: null, penaltyData: null,
                        isPaused: false, feedbackMessage: null
                    });
                    setRoomId(code);
                    setLocalError('');
                } catch (e) { setLocalError("Hubo un error al crear la sala."); }
            };

            const handleJoinRoom = () => {
                if (!user || !joinInput) return;
                if (isStudentMode && !studentName.trim()) {
                    setLocalError("Por favor, ingresa tu nombre.");
                    return;
                }
                if (isStudentMode) localStorage.setItem('periplo_student_name', studentName);
                setLocalError('');
                setRoomId(joinInput.trim().toUpperCase());
            };

            const handleLeaveRoom = async () => {
                if (roomData && user && roomId) {
                    const newPlayers = { ...roomData.players };
                    let changed = false;
                    Object.keys(newPlayers).forEach(k => {
                        if (newPlayers[k] === user.uid) { newPlayers[k] = null; changed = true; }
                    });
                    if (changed) {
                        try {
                            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                            await updateDoc(roomRef, { players: newPlayers });
                        } catch(e) {}
                    }
                }
                setRoomId('');
                setRoomData(null);
                setJoinInput('');
                setLocalError('');
            };

            const toggleRole = async (roleId) => {
                if (!roomData || !user) return;
                const newPlayers = { ...roomData.players };
                const newNames = { ...(roomData.playerNames || {}) };
                
                if (newPlayers[roleId] === user.uid) {
                    newPlayers[roleId] = null; 
                } else {
                    newPlayers[roleId] = user.uid; 
                    newNames[user.uid] = isStudentMode ? studentName : (roleId.startsWith('s') ? 'Maestro' : 'Jugador M');
                }
                await updateGame({ players: newPlayers, playerNames: newNames });
            };

            const copyStudentLink = () => {
                const link = `${window.location.origin}${window.location.pathname}?mode=student&code=${roomId}`;
                navigator.clipboard.writeText(link);
                setLocalFeedback({ text: '¡Link Copiado!', type: 'success', visible: true, ts: Date.now() });
            };

            const handleEndGame = async () => {
                if (!roomData) return;
                await updateGame({ gameState: 'MENU', isPaused: false, feedbackMessage: null });
            };

            const startGame = async () => {
                if (!roomData) return;
                const gameDeck = build112Deck(roomData.categories);
                
                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                if(activePlayers.length === 0) {
                    alert("Al menos un jugador (j1, j2, j3, j4) debe estar en la mesa para empezar.");
                    return;
                }

                let updates = {
                    gameState: 'PLAYING',
                    player1Hand: [], player2Hand: [], player3Hand: [], player4Hand: [],
                    currentCategoryId: null, tableCard: null, isRandomizing: false,
                    direction: 1, activeUnoPenalty: null, unoCalled: {1: false, 2: false, 3: false, 4: false},
                    winner: null, penaltyData: null, isPaused: false
                };

                activePlayers.forEach(num => {
                    updates[`player${num}Hand`] = gameDeck.splice(0, 7);
                });

                updates.deck = gameDeck;
                updates.turn = activePlayers[0];
                updates.feedbackMessage = { text: '¡El juego comienza! Gira la ruleta para empezar.', type: 'info', ts: Date.now() };

                await updateGame(updates);
            };

            const isS1 = roomData?.players?.s1 === user?.uid;
            const isS2 = roomData?.players?.s2 === user?.uid;
            const isSelectorRole = isS1 || isS2;
            
            const myPlayerKey = roomData ? Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid) : null;
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j', '')) : null;
            const isMyTurn = myPlayerNum === roomData?.turn;

            const handleRandomize = async () => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (!isSelectorRole && !isMyTurn) return;

                const picked = Math.floor(Math.random() * 4); // Elije ID 0 a 3
                await updateGame({ isRandomizing: true, currentCategoryId: null });
                setTimeout(async () => {
                    await updateGame({ isRandomizing: false, currentCategoryId: picked, feedbackMessage: { text: `¡Busca: ${roomData.categories[picked].name.toUpperCase()}!`, type: 'alert', ts: Date.now() }});
                }, 2000);
            };

            const handleCallUno = async () => {
                if (!myPlayerNum) return;
                const myName = roomData.playerNames[user.uid] || 'Alguien';
                await updateGame({
                    [`unoCalled.${myPlayerNum}`]: true,
                    feedbackMessage: { text: `¡${myName} gritó UNO!`, type: 'alert', ts: Date.now() }
                });
            };

            const validatePlay = (playedCard) => {
                if (roomData.activeUnoPenalty) {
                    if (roomData.activeUnoPenalty.type === 'draw2' && playedCard.action === 'draw2') return true;
                    if (roomData.activeUnoPenalty.type === 'draw4' && playedCard.action === 'wild4') return true;
                    return false; 
                }
                if (playedCard.type === 'wild') return true;
                if (playedCard.categoryId === roomData.currentCategoryId) return true;
                if (playedCard.type === 'action' && roomData.tableCard && roomData.tableCard.action === playedCard.action) return true;
                return false;
            };

            const handlePlayCard = async (playerNum, cardIndex) => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum || myPlayerNum !== playerNum) return;

                const hand = roomData[`player${playerNum}Hand`];
                const playedCard = hand[cardIndex];
                if (!playedCard) return;

                let isCorrectUno = false;
                let errorMsg = "";

                if (roomData.activeUnoPenalty) {
                    if ((roomData.activeUnoPenalty.type === 'draw2' && playedCard.action === 'draw2') || 
                        (roomData.activeUnoPenalty.type === 'draw4' && playedCard.action === 'wild4')) {
                        isCorrectUno = true;
                    } else {
                        isCorrectUno = false;
                        errorMsg = `¡Tienes un castigo activo de +${roomData.activeUnoPenalty.amount}! Debes defenderte con una carta igual (+2 o +4) o comer las cartas.`;
                    }
                } else {
                    if (roomData.currentCategoryId === null && playedCard.type !== 'wild') {
                        alert("¡Debes girar la ruleta primero!");
                        return;
                    }
                    
                    if (playedCard.type === 'wild') {
                        isCorrectUno = true;
                    } else if (playedCard.categoryId === roomData.currentCategoryId) {
                        isCorrectUno = true;
                    } else if (playedCard.type === 'action' && roomData.tableCard && roomData.tableCard.action === playedCard.action) {
                        isCorrectUno = true;
                    } else {
                        isCorrectUno = false;
                        const reqCatName = roomData.categories[roomData.currentCategoryId]?.name || "N/A";
                        errorMsg = `Esa carta no pertenece a la categoría '${reqCatName}'. Tampoco coincide la acción de la mesa.`;
                    }
                }
                
                if (isCorrectUno) {
                    if (playedCard.action === 'swap') {
                        setPendingSwapCard({ playerNum, cardIndex, card: playedCard });
                    } else if (playedCard.type === 'wild') {
                        setPendingWildCard({ playerNum, cardIndex, card: playedCard });
                    } else {
                        executeCardPlay(playerNum, cardIndex, playedCard, playedCard.categoryId !== 'any' ? playedCard.categoryId : roomData.currentCategoryId);
                    }
                } else {
                    await updateGame({
                        penaltyData: {
                            player: playerNum, playedWord: playedCard.word, 
                            correctCategoryDisplay: playedCard.categoryName, 
                            wrongCategoryDisplay: roomData.categories[roomData.currentCategoryId]?.name || 'N/A', 
                            explanation: errorMsg
                        }
                    });
                }
            };

            const executeCardPlay = async (playerNum, cardIndex, card, newCatId) => {
                const hand = [...roomData[`player${playerNum}Hand`]];
                hand.splice(cardIndex, 1); 
                
                let updates = {
                    [`player${playerNum}Hand`]: hand,
                    tableCard: { ...card, categoryId: newCatId, categoryName: roomData.categories[newCatId]?.name || 'Comodín' },
                    feedbackMessage: { text: `¡Bien jugado!`, type: 'success', ts: Date.now() }
                };

                // Regla Híbrida
                if (card.type === 'action' || card.type === 'wild') updates.currentCategoryId = newCatId; 
                else updates.currentCategoryId = null; 

                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurnSteps = 1;
                let nextDirection = roomData.direction ?? 1;
                let newPenalty = roomData.activeUnoPenalty ? { ...roomData.activeUnoPenalty } : null;

                if (card.type === 'action') {
                    if (card.action === 'skip') {
                        nextTurnSteps = 2;
                        updates.feedbackMessage.text = "¡Pierde Turno!";
                    } else if (card.action === 'reverse') {
                        if (activePlayers.length <= 2) nextTurnSteps = 2; else nextDirection *= -1;
                        updates.direction = nextDirection;
                        updates.feedbackMessage.text = "¡Cambio de Sentido!";
                    } else if (card.action === 'draw2') {
                        newPenalty = { type: 'draw2', amount: (newPenalty?.amount || 0) + 2 };
                        updates.activeUnoPenalty = newPenalty;
                        updates.feedbackMessage.text = `¡+${newPenalty.amount} Acumulado!`;
                    }
                } else if (card.type === 'wild') {
                    if (card.action === 'wild4') {
                        newPenalty = { type: 'draw4', amount: (newPenalty?.amount || 0) + 4 };
                        updates.activeUnoPenalty = newPenalty;
                        updates.feedbackMessage.text = `¡+${newPenalty.amount} Acumulado!`;
                    }
                }

                let nextTurn = getNextTurn(playerNum, activePlayers, nextDirection, nextTurnSteps);

                if (hand.length === 0 && card.action !== 'swap') {
                    if (roomData.unoCalled && roomData.unoCalled[playerNum]) {
                        updates.winner = roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`;
                    } else {
                        updates.winner = `❌ ${roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`} olvidó gritar UNO`;
                    }
                    updates.gameState = 'GAME_OVER';
                } else if (card.action === 'swap') {
                    const targetHand = roomData[`player${nextTurn}Hand`];
                    updates[`player${playerNum}Hand`] = targetHand;
                    updates[`player${nextTurn}Hand`] = hand;
                    updates[`unoCalled.${playerNum}`] = false;
                    updates[`unoCalled.${nextTurn}`] = false;
                    updates.feedbackMessage.text = "¡Manos Intercambiadas!";
                }

                updates.turn = nextTurn;
                await updateGame(updates);
                setPendingWildCard(null); 
            };

            const handleWildChoice = (chosenCatId) => {
                executeCardPlay(pendingWildCard.playerNum, pendingWildCard.cardIndex, pendingWildCard.card, chosenCatId);
            };

            const handleSwapChoice = async (targetOpponent) => {
                const { playerNum, cardIndex, card } = pendingSwapCard;
                const hand = [...roomData[`player${playerNum}Hand`]];
                hand.splice(cardIndex, 1);
                
                let updates = {
                    tableCard: { ...card, categoryId: roomData.currentCategoryId },
                    currentCategoryId: roomData.currentCategoryId, 
                    feedbackMessage: { text: `¡Intercambio de manos!`, type: 'success', ts: Date.now() }
                };

                const targetHand = roomData[`player${targetOpponent}Hand`];
                updates[`player${playerNum}Hand`] = targetHand;
                updates[`player${targetOpponent}Hand`] = hand;
                updates[`unoCalled.${playerNum}`] = false;
                updates[`unoCalled.${targetOpponent}`] = false;

                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurn = getNextTurn(playerNum, activePlayers, roomData.direction ?? 1, 1);
                
                if (hand.length === 0) {
                    if (roomData.unoCalled && roomData.unoCalled[playerNum]) {
                        updates.winner = roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`;
                    } else {
                        updates.winner = `❌ ${roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`} olvidó gritar UNO`;
                    }
                    updates.gameState = 'GAME_OVER';
                }

                updates.turn = nextTurn;
                await updateGame(updates);
                setPendingSwapCard(null);
            };

            const handleDrawCard = async (playerNum) => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum || myPlayerNum !== playerNum) return;

                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurn = getNextTurn(playerNum, activePlayers, roomData.direction ?? 1, 1);
                let updates = { [`unoCalled.${playerNum}`]: false }; 

                if (roomData.activeUnoPenalty) {
                    const amount = roomData.activeUnoPenalty.amount;
                    const drawnCards = roomData.deck.slice(0, amount);
                    updates.deck = roomData.deck.slice(amount);
                    updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], ...drawnCards];
                    updates.turn = nextTurn;
                    updates.activeUnoPenalty = null;
                    updates.currentCategoryId = roomData.currentCategoryId; 
                    updates.feedbackMessage = { text: `Comió ${amount} cartas`, type: 'error', ts: Date.now() };
                } else {
                    const drawnCard = roomData.deck[0];
                    updates.deck = roomData.deck.slice(1);
                    updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], drawnCard];
                    updates.turn = nextTurn;
                    
                    if (roomData.tableCard && (roomData.tableCard.type === 'action' || roomData.tableCard.type === 'wild')) {
                        updates.currentCategoryId = roomData.currentCategoryId;
                    } else {
                        updates.currentCategoryId = null;
                    }
                }
                await updateGame(updates);
            };

            const closePenaltyModal = async () => {
                let updates = { penaltyData: null };
                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurn = getNextTurn(roomData.turn, activePlayers, roomData.direction ?? 1, 1);
                const playerNum = roomData.penaltyData.player;
                const hand = roomData[`player${playerNum}Hand`];
                let deck = [...roomData.deck];

                if (roomData.activeUnoPenalty) {
                    const amount = roomData.activeUnoPenalty.amount;
                    const drawnCards = deck.splice(0, amount);
                    updates.deck = deck;
                    updates[`player${playerNum}Hand`] = [...hand, ...drawnCards];
                    updates.activeUnoPenalty = null;
                    updates.currentCategoryId = roomData.currentCategoryId; 
                } else {
                    const drawnCards = deck.splice(0, 1);
                    updates.deck = deck;
                    updates[`player${playerNum}Hand`] = [...hand, ...drawnCards];
                    if (roomData.tableCard && (roomData.tableCard.type === 'action' || roomData.tableCard.type === 'wild')) {
                        updates.currentCategoryId = roomData.currentCategoryId;
                    } else {
                        updates.currentCategoryId = null;
                    }
                }
                
                updates[`unoCalled.${playerNum}`] = false;
                updates.turn = nextTurn;
                await updateGame(updates);
            };

            // --- VISTAS ---
            
            if (!roomId && !deckId) return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-slate-900">
                    <button onClick={() => window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition text-white"><ArrowLeft size={20}/></button>
                    
                    {/* UI de unirse directamente aunque no haya mazo cargado para el maestro */}
                    <div className="bg-slate-800 p-8 md:p-12 rounded-2xl shadow-2xl border border-slate-700 max-w-lg w-full text-center relative">
                        <div className="flex justify-center gap-2 mb-6">
                            <span className="bg-blue-500 w-10 h-14 rounded shadow-lg transform -rotate-12 border border-white"></span>
                            <span className="bg-red-500 w-10 h-14 rounded shadow-lg transform -rotate-6 border border-white"></span>
                            <span className="bg-yellow-400 w-10 h-14 rounded shadow-lg transform rotate-6 border border-white"></span>
                            <span className="bg-green-500 w-10 h-14 rounded shadow-lg transform rotate-12 border border-white"></span>
                        </div>
                        <h1 className="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500 tracking-tight leading-tight">
                            UNO CUSTOM
                        </h1>
                        <p className="text-slate-400 mb-8 font-medium">{isStudentMode ? 'Modo Alumno' : 'Modo Multijugador'}</p>

                        {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}

                        <div className="space-y-6">
                            {!isStudentMode && (
                                <div className="bg-amber-500/20 border border-amber-500 text-amber-200 p-4 rounded-xl text-xs font-bold text-left shadow-inner">
                                    <AlertTriangle size={16} className="inline mb-1 mr-1"/> Para <span className="text-white">CREAR</span> una sala, debes abrir un mazo desde tu Bóveda Periplo. (Aún puedes unirte a una sala existente abajo).
                                </div>
                            )}

                            {!isStudentMode && (
                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-600"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-500 text-sm font-bold">O ÚNETE A UNA</span>
                                    <div className="flex-grow border-t border-slate-600"></div>
                                </div>
                            )}

                            {isStudentMode && (
                                <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="TU NOMBRE" className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-blue-500 mb-2"/>
                            )}

                            <div className="flex gap-2">
                                <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO DE SALA" maxLength={4} className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500"/>
                                <button onClick={handleJoinRoom} disabled={joinInput.length < 4} className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-6 rounded-xl font-bold transition flex items-center justify-center">
                                    <ArrowRight size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (!roomId && deckId) return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 h-full">
                    <div className="bg-slate-800 p-8 md:p-12 rounded-2xl shadow-2xl border border-slate-700 max-w-lg w-full text-center relative mt-6">
                        {!isStudentMode && (
                            <button onClick={() => window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition"><ArrowLeft size={20}/></button>
                        )}
                        <div className="flex justify-center gap-2 mb-6">
                            <span className="bg-blue-500 w-10 h-14 rounded shadow-lg transform -rotate-12 border border-white"></span>
                            <span className="bg-red-500 w-10 h-14 rounded shadow-lg transform -rotate-6 border border-white"></span>
                            <span className="bg-yellow-400 w-10 h-14 rounded shadow-lg transform rotate-6 border border-white"></span>
                            <span className="bg-green-500 w-10 h-14 rounded shadow-lg transform rotate-12 border border-white"></span>
                        </div>
                        <h1 className="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500 tracking-tight leading-tight">
                            UNO CUSTOM
                        </h1>
                        <p className="text-slate-400 mb-8 font-medium">{isStudentMode ? 'Modo Alumno' : 'Mazo Cargado desde la Bóveda'}</p>

                        {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}

                        <div className="space-y-6">
                            {!isStudentMode && (
                                <button onClick={handleCreateRoom} className="w-full py-4 bg-indigo-500 hover:bg-indigo-400 text-white rounded-xl font-bold shadow-lg transition active:scale-95 border-b-[4px] border-indigo-700 flex justify-center items-center gap-2 text-lg">
                                    <Users size={24} /> Crear Sala con este Mazo
                                </button>
                            )}

                            {!isStudentMode && (
                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-600"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-500 text-sm font-bold">O ÚNETE A UNA</span>
                                    <div className="flex-grow border-t border-slate-600"></div>
                                </div>
                            )}

                            {isStudentMode && (
                                <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="TU NOMBRE" className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-blue-500 mb-2"/>
                            )}

                            <div className="flex gap-2">
                                <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO DE SALA" maxLength={4} className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500"/>
                                <button onClick={handleJoinRoom} disabled={joinInput.length < 4} className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-6 rounded-xl font-bold transition flex items-center justify-center">
                                    <ArrowRight size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (roomId && !roomData) return (
                <div className="flex-1 flex flex-col items-center justify-center gap-4 animate-fade-in w-full h-full">
                    <Loader2 size={48} className="animate-spin text-blue-500" />
                    <p className="font-bold tracking-widest uppercase text-slate-400">Conectando a la sala...</p>
                </div>
            );

            if (roomData.gameState === 'MENU') {
                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                const canStart = isS1 && activePlayers.length >= 1; 

                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative w-full h-full overflow-y-auto">
                        <div className={`fixed top-4 z-50 transition-all duration-300 ${localFeedback.visible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                            <div className="px-6 py-2 rounded-full font-bold text-white shadow-lg bg-green-500 flex gap-2 items-center"><LinkIcon size={16}/> {localFeedback.text}</div>
                        </div>

                        <div className="bg-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl border border-slate-700 max-w-lg w-full relative mt-16 md:mt-0 mb-8">
                            <button onClick={handleLeaveRoom} className="absolute top-4 left-4 text-slate-400 hover:text-white flex items-center gap-1 text-xs font-bold transition bg-slate-900/50 px-3 py-1.5 rounded-full">
                                <ArrowRight className="rotate-180" size={14} /> Salir
                            </button>

                            <div className="text-center mb-6 mt-6">
                                <div className="text-xs text-indigo-400 font-bold mb-2 uppercase flex justify-center gap-1 items-center"><Dices size={14}/> Mazo Custom Activado</div>
                                <h2 className="text-sm font-bold text-slate-400 tracking-widest uppercase mb-1">Código de Sala</h2>
                                <div className="text-5xl font-black text-white tracking-[0.2em] bg-slate-900 py-3 rounded-xl border border-slate-700 mx-auto w-max px-8 shadow-inner">{roomId}</div>
                                {!isStudentMode && (
                                    <button onClick={copyStudentLink} className="mt-4 px-6 py-2 bg-slate-700 hover:bg-slate-600 text-blue-400 rounded-full font-bold text-sm flex items-center justify-center mx-auto gap-2 transition-colors">
                                        <LinkIcon size={16}/> Copiar Link de Alumnos
                                    </button>
                                )}
                            </div>

                            <div className="mb-6 bg-slate-900 p-4 rounded-2xl border border-slate-700">
                                <h4 className="text-slate-400 font-bold mb-3 uppercase tracking-widest text-[10px] text-center">Maestros / Selectores</h4>
                                <div className="flex flex-col gap-2">
                                    {isS1 ? (
                                        <div className="bg-purple-500/20 border border-purple-500 text-purple-200 p-3 rounded-xl flex items-center justify-between shadow-inner">
                                            <span className="font-bold flex items-center gap-2 text-sm"><User size={16}/> Tú eres Selector Principal</span>
                                            <CheckCircle size={16} className="text-purple-400"/>
                                        </div>
                                    ) : roomData.players.s1 ? (
                                        <div className="bg-slate-800 p-3 rounded-xl text-slate-400 flex items-center gap-2 text-sm border border-slate-700">
                                            <User size={16}/> {roomData.playerNames[roomData.players.s1]} es Selector 1
                                        </div>
                                    ) : null}

                                    {isS2 ? (
                                        <button onClick={() => toggleRole('s2')} className="bg-orange-500/20 border border-orange-500 text-orange-200 hover:bg-orange-500/40 font-bold p-3 rounded-xl transition flex items-center justify-between text-sm shadow-inner w-full text-left">
                                            <span className="flex items-center gap-2"><User size={16}/> Tú eres Selector 2</span>
                                            <span className="text-xs text-orange-400">Dejar Rol</span>
                                        </button>
                                    ) : !roomData.players.s2 ? (
                                        <button onClick={() => toggleRole('s2')} className="bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold p-3 rounded-xl transition border border-slate-600 border-dashed text-sm flex items-center justify-center gap-2 w-full">
                                            Entrar como 2do Maestro
                                        </button>
                                    ) : (
                                        <div className="bg-slate-800 p-3 rounded-xl text-slate-400 flex items-center gap-2 text-sm border border-slate-700">
                                            <User size={16}/> {roomData.playerNames[roomData.players.s2]} es Selector 2
                                        </div>
                                    )}
                                </div>
                            </div>

                            <h4 className="text-slate-400 font-bold mb-3 uppercase tracking-widest text-[10px] text-center">Lugares en la Mesa</h4>
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                {[1, 2, 3, 4].map(num => {
                                    const roleId = `j

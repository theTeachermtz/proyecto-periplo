<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Custom | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; overscroll-behavior: none; touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15,23,42,0.3); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71,85,105,0.7); border-radius: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 80% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes drawPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.7); } 50% { box-shadow: 0 0 0 12px rgba(99,102,241,0); } }
        .draw-pulse { animation: drawPulse 1.2s ease-in-out infinite; }
        @keyframes penaltyPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.8); } 50% { box-shadow: 0 0 0 14px rgba(239,68,68,0); } }
        .penalty-pulse { animation: penaltyPulse 0.8s ease-in-out infinite; }
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-slow { animation: spinSlow 12s linear infinite; }
        @keyframes cardFloat { 0%,100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(-2deg) translateY(-4px); } }
        .card-float { animation: cardFloat 2.5s ease-in-out infinite; }
        @keyframes tablePulse { 0%,100% { transform: rotate(2deg) scale(1.02); } 50% { transform: rotate(2deg) scale(1.06); } }
        .table-card-pulse { animation: tablePulse 0.6s ease-in-out 1; }
        .btn-juicy { transition: transform 0.1s, filter 0.1s; }
        .btn-juicy:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-juicy:active:not(:disabled) { transform: scale(0.93); }
        input:-webkit-autofill { -webkit-text-fill-color: #fff; -webkit-box-shadow: 0 0 0px 1000px #1e293b inset; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">
<div id="root"></div>
<script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from 'firebase/firestore';
    import { User, Play, RotateCcw, AlertTriangle, CheckCircle, Zap, Pause, Users, ArrowRight, Home, Dices, Loader2, ArrowLeft, Eye, EyeOff, Link as LinkIcon } from 'lucide-react';

    const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
    const appId = 'periplo-app-v1';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const CAT_COLORS = { 0: 'bg-blue-500 border-blue-600', 1: 'bg-red-500 border-red-600', 2: 'bg-yellow-400 border-yellow-500', 3: 'bg-green-500 border-green-600' };
    const CAT_TEXT   = { 0: 'text-white', 1: 'text-white', 2: 'text-slate-900', 3: 'text-white' };
    const CAT_BADGE  = { 0: 'bg-blue-500/20 border-blue-400 text-blue-200', 1: 'bg-red-500/20 border-red-400 text-red-200', 2: 'bg-yellow-400/20 border-yellow-400 text-yellow-200', 3: 'bg-green-500/20 border-green-400 text-green-200' };

    const AVATARS = ["😎","🤩","🦁","🐯","🦊","🐸","🐼","🤖","👽","🧙","🦄","🎃","🔥","⚡","🌊","🌈","🎯","🎲","🃏","🎸"];

    const shuffleArray = (arr) => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

    const build112Deck = (categories) => {
        let deck = [];
        categories.forEach((cat, idx) => {
            const shuffled = shuffleArray([...cat.words]);
            const words = shuffled.slice(0, 25);
            // 19 cartas normales
            words.slice(0, 19).forEach(w => deck.push({ word: w, categoryId: idx, categoryName: cat.name, type: 'word' }));
            // 4 acción: skip, reverse, draw2 x2
            ['skip','reverse','draw2','draw2'].forEach(action => {
                const actionWord = words[19 + ['skip','reverse','draw2','draw2'].indexOf(action)] || words[0];
                deck.push({ word: actionWord, categoryId: idx, categoryName: cat.name, type: 'action', action, desc: action === 'skip' ? 'Pierde Turno' : action === 'reverse' ? 'Cambio de Sentido' : '+2 Castigo' });
            });
        });
        // 12 comodines
        for (let i = 0; i < 4; i++) {
            deck.push({ word: 'Comodín', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'wild', desc: 'Elige categoría' });
            deck.push({ word: '+4 Wild', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'wild4', desc: '+4 al rival' });
            deck.push({ word: 'Swap', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'swap', desc: 'Intercambia tu mano' });
        }
        return shuffleArray(deck);
    };

    const getNextTurn = (currentTurn, activePlayers, direction = 1, steps = 1) => {
        let idx = activePlayers.indexOf(currentTurn);
        if (idx === -1) return activePlayers[0];
        let nextIdx = (idx + (direction * steps)) % activePlayers.length;
        if (nextIdx < 0) nextIdx += activePlayers.length;
        return activePlayers[nextIdx];
    };

    // ─────────────────────────────────────────────
    // PANTALLA: NOMBRE + EMOJI (nueva)
    // ─────────────────────────────────────────────
    const NameEmojiScreen = ({ onConfirm, isStudentMode, initialName = '' }) => {
        const [name, setName]   = useState(initialName);
        const [emoji, setEmoji] = useState(AVATARS[Math.floor(Math.random() * AVATARS.length)]);
        const inputRef = useRef(null);
        useEffect(() => { setTimeout(() => inputRef.current?.focus(), 100); }, []);
        const handleSubmit = () => { if (!name.trim()) return; onConfirm(name.trim(), emoji); };
        return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 h-[100dvh] bg-slate-900 animate-fade-in">
                <div className="w-full max-w-sm">
                    <div className="flex justify-center gap-2 mb-6">
                        <span className="bg-blue-500 w-9 h-12 rounded-lg shadow-lg transform -rotate-12 border-2 border-white/30 flex items-center justify-center font-black text-white text-lg">U</span>
                        <span className="bg-red-500 w-9 h-12 rounded-lg shadow-lg transform -rotate-4 border-2 border-white/30 flex items-center justify-center font-black text-white text-lg">N</span>
                        <span className="bg-yellow-400 w-9 h-12 rounded-lg shadow-lg transform rotate-4 border-2 border-white/30 flex items-center justify-center font-black text-slate-800 text-lg">O</span>
                    </div>
                    <h1 className="text-3xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500 mb-1">UNO Custom</h1>
                    <p className="text-slate-500 text-center text-sm font-bold mb-8 uppercase tracking-widest">{isStudentMode ? 'Modo Alumno' : 'Modo Multijugador'}</p>

                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-6 shadow-2xl space-y-5">
                        {/* Nombre */}
                        <div>
                            <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Tu Nombre</label>
                            <input ref={inputRef} type="text" value={name} onChange={e => setName(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                                maxLength={14} placeholder="Ej. Carlos"
                                className="w-full bg-slate-900 border-2 border-slate-600 rounded-xl px-4 py-3 text-center font-black text-xl text-white outline-none focus:border-blue-500 transition-colors"/>
                        </div>
                        {/* Emoji */}
                        <div>
                            <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Tu Avatar</label>
                            <div className="grid grid-cols-5 gap-2">
                                {AVATARS.map(av => (
                                    <button key={av} onClick={() => setEmoji(av)}
                                        className={`text-2xl p-2 rounded-xl transition-all btn-juicy border-2 ${emoji === av ? 'bg-blue-500/20 border-blue-500 scale-110 shadow-lg shadow-blue-500/30' : 'bg-slate-900 border-transparent hover:bg-slate-700'}`}>
                                        {av}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <button onClick={handleSubmit} disabled={!name.trim()}
                            className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:from-slate-700 disabled:to-slate-700 disabled:text-slate-500 text-white rounded-xl font-black text-lg shadow-lg transition-all btn-juicy flex items-center justify-center gap-2">
                            <ArrowRight size={20}/> Continuar
                        </button>
                    </div>
                    <button onClick={() => window.location.href='index.html'} className="mt-6 w-full text-slate-500 hover:text-white font-bold text-sm flex items-center justify-center gap-2 transition-colors">
                        <ArrowLeft size={14}/> Volver al Hub
                    </button>
                </div>
            </div>
        );
    };

    // ─────────────────────────────────────────────
    // COMPONENTE PRINCIPAL
    // ─────────────────────────────────────────────
    const UnoGame = () => {
        const [user, setUser]             = useState(null);
        const [deckId, setDeckId]         = useState('');
        const [roomId, setRoomId]         = useState('');
        const [roomData, setRoomData]     = useState(null);
        const [joinInput, setJoinInput]   = useState('');
        const [localFeedback, setLocalFeedback] = useState({ text: '', type: '', visible: false });
        const [localError, setLocalError] = useState('');
        const [isStudentMode, setIsStudentMode] = useState(false);
        // Nuevo: nombre y emoji antes de entrar al lobby
        const [playerName, setPlayerName] = useState('');
        const [playerEmoji, setPlayerEmoji] = useState('😎');
        const [profileDone, setProfileDone] = useState(false);
        const [pendingWildCard, setPendingWildCard]   = useState(null);
        const [pendingSwapCard, setPendingSwapCard]   = useState(null);
        const [showMaestroView, setShowMaestroView]   = useState(true);
        const feedbackTimerRef = useRef(null);

        // Auth + URL params
        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            const code = params.get('code');
            const id   = params.get('id');
            if (mode === 'student') { setIsStudentMode(true); if (code) setJoinInput(code); }
            if (id) setDeckId(id);
            // Pre-cargar nombre guardado
            const savedName  = localStorage.getItem('periplo_student_name') || '';
            const savedEmoji = localStorage.getItem('periplo_uno_emoji') || AVATARS[0];
            if (savedName) setPlayerName(savedName);
            setPlayerEmoji(savedEmoji);
        }, []);

        useEffect(() => {
            const unsub = onAuthStateChanged(auth, async (u) => {
                if (u) { setUser(u); } else { const c = await signInAnonymously(auth); setUser(c.user); }
            });
            return () => unsub();
        }, []);

        // Feedback toast
        useEffect(() => {
            if (!roomData?.feedbackMessage) return;
            setLocalFeedback({ text: roomData.feedbackMessage.text, type: roomData.feedbackMessage.type, visible: true });
            if (feedbackTimerRef.current) clearTimeout(feedbackTimerRef.current);
            feedbackTimerRef.current = setTimeout(() => setLocalFeedback(p => ({ ...p, visible: false })), 2500);
        }, [roomData?.feedbackMessage?.ts]);

        // Suscripción sala
        useEffect(() => {
            if (!roomId) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            const unsub = onSnapshot(roomRef, snap => {
                if (snap.exists()) setRoomData(snap.data());
            });
            return () => unsub();
        }, [roomId]);

        const updateGame = async (updates) => {
            if (!roomId) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), updates);
        };

        // ── ACCIONES ──────────────────────────────
        const handleProfileDone = (name, emoji) => {
            setPlayerName(name);
            setPlayerEmoji(emoji);
            localStorage.setItem('periplo_student_name', name);
            localStorage.setItem('periplo_uno_emoji', emoji);
            setProfileDone(true);
        };

        const handleCreateRoom = async () => {
            if (!user || !deckId) return;
            try {
                const deckSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId));
                if (!deckSnap.exists()) { setLocalError("Mazo no encontrado. Regresa al dashboard."); return; }
                const customCategories = deckSnap.data().content.categories;
                const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                await setDoc(roomRef, {
                    roomId: code, categories: customCategories, gameState: 'MENU',
                    players: { s1: user.uid, s2: null, j1: null, j2: null, j3: null, j4: null },
                    playerNames: { [user.uid]: playerName || 'Maestro' },
                    playerEmojis: { [user.uid]: playerEmoji || '🎓' },
                    deck: [], player1Hand: [], player2Hand: [], player3Hand: [], player4Hand: [],
                    currentCategoryId: null, tableCard: null, turn: 1, direction: 1,
                    activeUnoPenalty: null, unoCalled: {}, isRandomizing: false,
                    winner: null, penaltyData: null, isPaused: false, feedbackMessage: null
                });
                setRoomId(code);
                setLocalError('');
            } catch (e) { setLocalError("Hubo un error al crear la sala."); }
        };

        const handleJoinRoom = () => {
            if (!user || !joinInput || joinInput.length < 4) return;
            if (!playerName.trim()) { setLocalError("Por favor, ingresa tu nombre."); return; }
            setLocalError('');
            setRoomId(joinInput.trim().toUpperCase());
        };

        const handleLeaveRoom = async () => {
            if (roomData && user && roomId) {
                const newPlayers = { ...roomData.players };
                Object.keys(newPlayers).forEach(k => { if (newPlayers[k] === user.uid) newPlayers[k] = null; });
                try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), { players: newPlayers }); } catch(e) {}
            }
            setRoomId(''); setRoomData(null); setJoinInput(''); setLocalError('');
        };

        const toggleRole = async (roleId) => {
            if (!roomData || !user) return;
            const newPlayers = { ...roomData.players };
            const newNames   = { ...(roomData.playerNames || {}) };
            const newEmojis  = { ...(roomData.playerEmojis || {}) };
            if (newPlayers[roleId] === user.uid) {
                newPlayers[roleId] = null;
            } else {
                // Liberar silla anterior
                Object.keys(newPlayers).forEach(k => { if (newPlayers[k] === user.uid) newPlayers[k] = null; });
                newPlayers[roleId] = user.uid;
                newNames[user.uid]  = playerName || (roleId.startsWith('s') ? 'Maestro' : 'Jugador');
                newEmojis[user.uid] = playerEmoji || '😎';
            }
            await updateGame({ players: newPlayers, playerNames: newNames, playerEmojis: newEmojis });
        };

        const copyStudentLink = () => {
            const link = `${window.location.origin}${window.location.pathname}?mode=student&code=${roomId}`;
            navigator.clipboard.writeText(link);
            setLocalFeedback({ text: '¡Link Copiado!', type: 'success', visible: true, ts: Date.now() });
        };

        const handleEndGame  = async () => { if (!roomData) return; await updateGame({ gameState: 'MENU', isPaused: false, feedbackMessage: null }); };

        const startGame = async () => {
            if (!roomData) return;
            const gameDeck = build112Deck(roomData.categories);
            let activePlayers = [1,2,3,4].filter(n => roomData.players[`j${n}`]);
            if (activePlayers.length === 0) { alert("Al menos un jugador debe estar sentado para empezar."); return; }
            let updates = {
                gameState: 'PLAYING', player1Hand: [], player2Hand: [], player3Hand: [], player4Hand: [],
                currentCategoryId: null, tableCard: null, isRandomizing: false, direction: 1,
                activeUnoPenalty: null, unoCalled: {1:false,2:false,3:false,4:false}, winner: null, penaltyData: null, isPaused: false
            };
            activePlayers.forEach(num => { updates[`player${num}Hand`] = gameDeck.splice(0, 7); });
            updates.deck = gameDeck;
            updates.turn = activePlayers[0];
            updates.feedbackMessage = { text: '¡El juego comienza! Gira la ruleta para empezar.', type: 'info', ts: Date.now() };
            await updateGame(updates);
        };

        const handleRandomize = async () => {
            if (!roomData || roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
            const isS1 = roomData?.players?.s1 === user?.uid;
            const isS2 = roomData?.players?.s2 === user?.uid;
            const myPlayerKey = Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid);
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j','')) : null;
            if (!isS1 && !isS2 && myPlayerNum !== roomData.turn) return;
            const picked = Math.floor(Math.random() * roomData.categories.length);
            await updateGame({ isRandomizing: true, currentCategoryId: null });
            setTimeout(async () => {
                await updateGame({ isRandomizing: false, currentCategoryId: picked, feedbackMessage: { text: `¡Busca: ${roomData.categories[picked].name.toUpperCase()}!`, type: 'alert', ts: Date.now() } });
            }, 2000);
        };

        const handleCallUno = async () => {
            const myPlayerKey = roomData ? Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid) : null;
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j','')) : null;
            if (!myPlayerNum) return;
            const myName = roomData.playerNames?.[user.uid] || 'Alguien';
            await updateGame({ [`unoCalled.${myPlayerNum}`]: true, feedbackMessage: { text: `¡${myName} gritó UNO!`, type: 'alert', ts: Date.now() } });
        };

        const validatePlay = (playedCard) => {
            if (roomData.activeUnoPenalty) {
                if (roomData.activeUnoPenalty.type === 'draw2' && playedCard.action === 'draw2') return true;
                if (roomData.activeUnoPenalty.type === 'draw4' && playedCard.action === 'wild4') return true;
                return false;
            }
            if (playedCard.type === 'wild') return true;
            if (playedCard.categoryId === roomData.currentCategoryId) return true;
            if (playedCard.type === 'action' && roomData.tableCard && roomData.tableCard.action === playedCard.action) return true;
            return false;
        };

        const handlePlayCard = async (playerNum, cardIndex) => {
            if (!roomData || roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
            const myPlayerKey = Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid);
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j','')) : null;
            if (roomData.turn !== playerNum || myPlayerNum !== playerNum) return;
            const hand = roomData[`player${playerNum}Hand`];
            const playedCard = hand[cardIndex];
            if (!playedCard) return;
            let isValid = false, errorMsg = '';
            if (roomData.activeUnoPenalty) {
                if ((roomData.activeUnoPenalty.type === 'draw2' && playedCard.action === 'draw2') || (roomData.activeUnoPenalty.type === 'draw4' && playedCard.action === 'wild4')) { isValid = true; }
                else { isValid = false; errorMsg = `¡Tienes un castigo activo de +${roomData.activeUnoPenalty.amount}!`; }
            } else if (roomData.currentCategoryId === null) {
                errorMsg = '¡Primero gira la ruleta para elegir categoría!';
            } else {
                isValid = validatePlay(playedCard);
                if (!isValid) errorMsg = `Esa carta no coincide con la categoría activa ni con la acción de la mesa.`;
            }
            if (isValid) {
                if (playedCard.action === 'swap') { setPendingSwapCard({ playerNum, cardIndex, card: playedCard }); }
                else if (playedCard.type === 'wild') { setPendingWildCard({ playerNum, cardIndex, card: playedCard }); }
                else { executeCardPlay(playerNum, cardIndex, playedCard, playedCard.categoryId !== 'any' ? playedCard.categoryId : roomData.currentCategoryId); }
            } else {
                await updateGame({ penaltyData: { player: playerNum, playedWord: playedCard.word, correctCategoryDisplay: playedCard.categoryName, wrongCategoryDisplay: roomData.categories[roomData.currentCategoryId]?.name || 'N/A', explanation: errorMsg } });
            }
        };

        const executeCardPlay = async (playerNum, cardIndex, card, newCatId) => {
            const hand = [...roomData[`player${playerNum}Hand`]];
            hand.splice(cardIndex, 1);
            let updates = {
                [`player${playerNum}Hand`]: hand,
                tableCard: { ...card, categoryId: newCatId, categoryName: roomData.categories[newCatId]?.name || 'Comodín' },
                feedbackMessage: { text: '¡Bien jugado!', type: 'success', ts: Date.now() }
            };
            if (card.type === 'action' || card.type === 'wild') updates.currentCategoryId = newCatId;
            else updates.currentCategoryId = null;
            let activePlayers = [1,2,3,4].filter(n => roomData.players[`j${n}`]);
            let nextTurnSteps = 1, nextDirection = roomData.direction ?? 1;
            let newPenalty = roomData.activeUnoPenalty ? { ...roomData.activeUnoPenalty } : null;
            if (card.type === 'action') {
                if (card.action === 'skip') { nextTurnSteps = 2; updates.feedbackMessage.text = '¡Pierde Turno!'; }
                else if (card.action === 'reverse') {
                    if (activePlayers.length <= 2) nextTurnSteps = 2; else nextDirection *= -1;
                    updates.direction = nextDirection; updates.feedbackMessage.text = '¡Cambio de Sentido!';
                } else if (card.action === 'draw2') {
                    newPenalty = { type: 'draw2', amount: (newPenalty?.amount || 0) + 2 };
                    updates.activeUnoPenalty = newPenalty; updates.feedbackMessage.text = `¡+${newPenalty.amount} Acumulado!`;
                }
            } else if (card.type === 'wild' && card.action === 'wild4') {
                newPenalty = { type: 'draw4', amount: (newPenalty?.amount || 0) + 4 };
                updates.activeUnoPenalty = newPenalty; updates.feedbackMessage.text = `¡+${newPenalty.amount} Acumulado!`;
            }
            let nextTurn = getNextTurn(playerNum, activePlayers, nextDirection, nextTurnSteps);
            if (hand.length === 0 && card.action !== 'swap') {
                updates.winner = roomData.unoCalled?.[playerNum] ? (roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`) : `❌ ${roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`} olvidó gritar UNO`;
                updates.gameState = 'GAME_OVER';
            }
            if (card.action !== 'swap') {
                if (card.type === 'action' || card.type === 'wild') updates.currentCategoryId = newCatId;
                else updates.currentCategoryId = null;
            }
            updates[`unoCalled.${playerNum}`] = false;
            updates.turn = nextTurn;
            await updateGame(updates);
        };

        const handleWildChoice = (chosenCatId) => {
            executeCardPlay(pendingWildCard.playerNum, pendingWildCard.cardIndex, pendingWildCard.card, chosenCatId);
            setPendingWildCard(null);
        };

        const handleSwapChoice = async (targetOpponent) => {
            const { playerNum, cardIndex, card } = pendingSwapCard;
            const hand = [...roomData[`player${playerNum}Hand`]];
            hand.splice(cardIndex, 1);
            const targetHand = roomData[`player${targetOpponent}Hand`];
            let updates = {
                tableCard: { ...card, categoryId: roomData.currentCategoryId },
                currentCategoryId: roomData.currentCategoryId,
                feedbackMessage: { text: '¡Intercambio de manos!', type: 'success', ts: Date.now() },
                [`player${playerNum}Hand`]: targetHand, [`player${targetOpponent}Hand`]: hand,
                [`unoCalled.${playerNum}`]: false, [`unoCalled.${targetOpponent}`]: false
            };
            if (hand.length === 0) {
                updates.winner = roomData.unoCalled?.[playerNum] ? (roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`) : `❌ ${roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`} olvidó gritar UNO`;
                updates.gameState = 'GAME_OVER';
            }
            let activePlayers = [1,2,3,4].filter(n => roomData.players[`j${n}`]);
            updates.turn = getNextTurn(playerNum, activePlayers, roomData.direction ?? 1, 1);
            await updateGame(updates);
            setPendingSwapCard(null);
        };

        const handleDrawCard = async (playerNum) => {
            if (!roomData || roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
            const myPlayerKey = Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid);
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j','')) : null;
            if (roomData.turn !== playerNum || myPlayerNum !== playerNum) return;
            let activePlayers = [1,2,3,4].filter(n => roomData.players[`j${n}`]);
            let nextTurn = getNextTurn(playerNum, activePlayers, roomData.direction ?? 1, 1);
            let updates = { [`unoCalled.${playerNum}`]: false };
            if (roomData.activeUnoPenalty) {
                const amount = roomData.activeUnoPenalty.amount;
                updates.deck = roomData.deck.slice(amount);
                updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], ...roomData.deck.slice(0, amount)];
                updates.turn = nextTurn; updates.activeUnoPenalty = null;
                updates.currentCategoryId = roomData.currentCategoryId;
                updates.feedbackMessage = { text: `Comió ${amount} cartas`, type: 'error', ts: Date.now() };
            } else {
                updates.deck = roomData.deck.slice(1);
                updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], roomData.deck[0]];
                updates.turn = nextTurn;
                updates.currentCategoryId = (roomData.tableCard && (roomData.tableCard.type === 'action' || roomData.tableCard.type === 'wild')) ? roomData.currentCategoryId : null;
                updates.feedbackMessage = { text: 'Robó 1 carta', type: 'info', ts: Date.now() };
            }
            await updateGame(updates);
        };

        const closePenaltyModal = async () => {
            let updates = { penaltyData: null };
            let activePlayers = [1,2,3,4].filter(n => roomData.players[`j${n}`]);
            let nextTurn = getNextTurn(roomData.penaltyData.player, activePlayers, roomData.direction ?? 1, 1);
            const playerNum = roomData.penaltyData.player;
            let deck = [...roomData.deck];
            if (roomData.activeUnoPenalty) {
                const amount = roomData.activeUnoPenalty.amount;
                updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], ...deck.splice(0, amount)];
                updates.deck = deck; updates.activeUnoPenalty = null;
                updates.currentCategoryId = roomData.currentCategoryId;
            } else {
                updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], ...deck.splice(0, 1)];
                updates.deck = deck;
                updates.currentCategoryId = (roomData.tableCard && (roomData.tableCard.type === 'action' || roomData.tableCard.type === 'wild')) ? roomData.currentCategoryId : null;
            }
            updates.turn = nextTurn;
            await updateGame(updates);
        };

        // ── DERIVED ───────────────────────────────
        const isS1 = roomData?.players?.s1 === user?.uid;
        const isS2 = roomData?.players?.s2 === user?.uid;
        const isSelectorRole = isS1 || isS2;
        const myPlayerKey  = roomData ? Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid) : null;
        const myPlayerNum  = myPlayerKey ? parseInt(myPlayerKey.replace('j','')) : null;
        const isMyTurn     = myPlayerNum === roomData?.turn;
        const myHandSize   = myPlayerNum ? (roomData?.[`player${myPlayerNum}Hand`]?.length || 0) : 0;
        const canCallUno   = myHandSize > 0 && myHandSize <= 2 && !roomData?.unoCalled?.[myPlayerNum];

        // ── RENDERS ───────────────────────────────

        // 1. Pantalla nombre+emoji (siempre primero para alumnos, también para teacher sin deckId)
        if (!profileDone) {
            return <NameEmojiScreen onConfirm={handleProfileDone} isStudentMode={isStudentMode} initialName={playerName} />;
        }

        // 2. Sin sala y sin mazo — solo unirse
        if (!roomId && !deckId) return (
            <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-slate-900 animate-fade-in">
                <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-sm w-full text-center">
                    <div className="text-4xl mb-4">{playerEmoji}</div>
                    <h2 className="text-2xl font-black text-white mb-1">Hola, {playerName}</h2>
                    <p className="text-slate-500 text-sm mb-6">Ingresa el código de sala para unirte</p>
                    {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-xl mb-4 text-sm font-bold">{localError}</div>}
                    <div className="flex gap-2">
                        <input type="text" value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO" maxLength={4}
                            className="flex-1 bg-slate-900 border-2 border-slate-600 rounded-xl px-4 py-3 text-center text-2xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500 transition-colors"/>
                        <button onClick={handleJoinRoom} disabled={joinInput.length < 4}
                            className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-5 rounded-xl font-bold transition btn-juicy">
                            <ArrowRight size={22}/>
                        </button>
                    </div>
                    <button onClick={() => setProfileDone(false)} className="mt-4 text-slate-500 hover:text-slate-300 text-sm font-bold transition">← Cambiar nombre/avatar</button>
                </div>
            </div>
        );

        // 3. Con mazo, sin sala — crear o unirse
        if (!roomId && deckId) return (
            <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-slate-900 animate-fade-in">
                <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-sm w-full text-center relative">
                    {!isStudentMode && <button onClick={() => window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition text-white"><ArrowLeft size={18}/></button>}
                    <div className="flex justify-center gap-2 mb-5">
                        <span className="bg-blue-500 w-9 h-12 rounded-lg shadow-lg transform -rotate-12 border-2 border-white/20"></span>
                        <span className="bg-red-500 w-9 h-12 rounded-lg shadow-lg transform -rotate-3 border-2 border-white/20"></span>
                        <span className="bg-yellow-400 w-9 h-12 rounded-lg shadow-lg transform rotate-6 border-2 border-white/20"></span>
                        <span className="bg-green-500 w-9 h-12 rounded-lg shadow-lg transform rotate-12 border-2 border-white/20"></span>
                    </div>
                    <h1 className="text-3xl font-black mb-1 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500">UNO Custom</h1>
                    <p className="text-slate-500 mb-6 text-sm font-bold">Mazo cargado ✓</p>
                    {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-xl mb-4 text-sm font-bold">{localError}</div>}
                    <div className="space-y-4">
                        {!isStudentMode && (
                            <button onClick={handleCreateRoom} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold shadow-lg transition btn-juicy flex justify-center items-center gap-2">
                                <Users size={20}/> Crear Sala
                            </button>
                        )}
                        <div className="flex gap-2">
                            <input type="text" value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO" maxLength={4}
                                className="flex-1 bg-slate-900 border-2 border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500 transition-colors"/>
                            <button onClick={handleJoinRoom} disabled={joinInput.length < 4}
                                className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-5 rounded-xl font-bold transition btn-juicy">
                                <ArrowRight size={22}/>
                            </button>
                        </div>
                    </div>
                    <button onClick={() => setProfileDone(false)} className="mt-4 text-slate-500 hover:text-slate-300 text-sm font-bold transition">← Cambiar nombre/avatar</button>
                </div>
            </div>
        );

        // 4. Sala cargando
        if (!roomData) return (
            <div className="flex-1 flex items-center justify-center h-[100dvh] bg-slate-900">
                <Loader2 size={40} className="animate-spin text-blue-500"/>
            </div>
        );

        // 5. LOBBY (MENU)
        if (roomData.gameState === 'MENU') {
            const activePlayingOpponents = [1,2,3,4].filter(n => roomData.players[`j${n}`] && n !== myPlayerNum);
            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-slate-900 animate-fade-in overflow-y-auto">
                    {/* Feedback toast */}
                    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 ${localFeedback.visible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4 pointer-events-none'}`}>
                        <div className="px-5 py-2 rounded-full font-bold text-white bg-green-500 shadow-xl text-sm flex items-center gap-2">
                            <LinkIcon size={14}/> {localFeedback.text}
                        </div>
                    </div>

                    <div className="bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700 max-w-md w-full relative">
                        <button onClick={handleLeaveRoom} className="absolute top-4 left-4 text-slate-400 hover:text-white flex items-center gap-1 text-xs font-bold transition bg-slate-900/50 px-3 py-1.5 rounded-full">
                            <ArrowLeft size={12}/> Salir
                        </button>

                        {/* Header sala */}
                        <div className="text-center mb-6 mt-4">
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-1">Código de Sala</p>
                            <div className="text-5xl font-black text-white tracking-[0.25em] bg-slate-900 py-3 rounded-xl border border-slate-700 mx-auto w-max px-8 shadow-inner">{roomId}</div>
                            {!isStudentMode && (
                                <button onClick={copyStudentLink} className="mt-3 px-5 py-2 bg-slate-700 hover:bg-slate-600 text-blue-400 rounded-full font-bold text-xs flex items-center justify-center mx-auto gap-2 transition">
                                    <LinkIcon size={13}/> Copiar Link Alumnos
                                </button>
                            )}
                        </div>

                        {/* Sección MAESTROS — solo visible para no-alumnos */}
                        {!isStudentMode && (
                            <div className="mb-4 bg-slate-900 p-3 rounded-xl border border-slate-700">
                                <h4 className="text-slate-400 font-black text-[10px] uppercase tracking-widest text-center mb-2">Maestros / Selectores</h4>
                                <div className="space-y-2">
                                    {[{ key:'s1', label:'Selector 1' },{ key:'s2', label:'Selector 2' }].map(({key, label}) => {
                                        const occupantId = roomData.players[key];
                                        const isMe = occupantId === user?.uid;
                                        const isOccupied = occupantId && !isMe;
                                        const displayName = occupantId ? (roomData.playerNames?.[occupantId] || label) : label;
                                        const displayEmoji = occupantId ? (roomData.playerEmojis?.[occupantId] || '🎓') : '🎓';
                                        return (
                                            <div key={key} className={`p-2.5 rounded-xl border-2 flex items-center justify-between transition-all ${isMe ? 'bg-purple-500/15 border-purple-500' : isOccupied ? 'bg-slate-800 border-slate-700 opacity-60' : 'bg-slate-800 border-slate-600'}`}>
                                                <span className="text-sm font-bold text-white flex items-center gap-2">{displayEmoji} {displayName}</span>
                                                <button onClick={() => toggleRole(key)} disabled={isOccupied}
                                                    className={`text-[10px] px-3 py-1.5 rounded-lg font-bold transition ${isMe ? 'bg-red-500 text-white' : isOccupied ? 'bg-slate-700 text-slate-500' : 'bg-purple-600 hover:bg-purple-500 text-white'}`}>
                                                    {isMe ? 'Levantarse' : isOccupied ? 'Ocupado' : 'Sentarse'}
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Sillas jugadores */}
                        <div className="mb-5 bg-slate-900 p-3 rounded-xl border border-slate-700">
                            <h4 className="text-slate-400 font-black text-[10px] uppercase tracking-widest text-center mb-3">Lugares en la Mesa</h4>
                            <div className="grid grid-cols-2 gap-2">
                                {[1,2,3,4].map(num => {
                                    const roleId = `j${num}`;
                                    const occupantId = roomData.players[roleId];
                                    const isMe = occupantId === user?.uid;
                                    const isOccupied = occupantId && !isMe;
                                    const displayName = occupantId ? (roomData.playerNames?.[occupantId] || `Jugador ${num}`) : `Silla ${num}`;
                                    const displayEmoji = occupantId ? (roomData.playerEmojis?.[occupantId] || '🃏') : '🪑';
                                    return (
                                        <div key={roleId} className={`p-3 rounded-xl border-2 flex flex-col items-center gap-1.5 transition-all ${isMe ? 'bg-blue-500/15 border-blue-500 shadow-inner' : isOccupied ? 'bg-slate-800 border-slate-700 opacity-70' : 'bg-slate-800 border-slate-600'}`}>
                                            <span className="text-2xl">{displayEmoji}</span>
                                            <span className={`font-black text-xs truncate w-full text-center ${isOccupied || isMe ? 'text-white' : 'text-slate-500'}`}>{displayName}</span>
                                            <button onClick={() => toggleRole(roleId)} disabled={isOccupied}
                                                className={`text-[10px] px-3 py-1.5 rounded-lg font-bold w-full transition ${isMe ? 'bg-red-500 hover:bg-red-600 text-white' : isOccupied ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white'}`}>
                                                {isMe ? 'Levantarse' : isOccupied ? 'Ocupado' : 'Sentarse'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {isS1 && (
                            <button onClick={startGame} disabled={[1,2,3,4].filter(n => roomData.players[`j${n}`]).length === 0}
                                className="w-full py-4 rounded-2xl font-black text-lg shadow-lg btn-juicy flex items-center justify-center gap-2 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 disabled:from-slate-700 disabled:to-slate-700 disabled:text-slate-500 text-white transition-all">
                                <Play size={22} fill="currentColor"/> REPARTIR CARTAS
                            </button>
                        )}
                        {!isS1 && <p className="text-center text-slate-500 text-sm font-bold">Esperando al Maestro para empezar...</p>}
                    </div>
                </div>
            );
        }

        // 6. JUEGO ACTIVO
        const activePlayingOpponents = [1,2,3,4].filter(n => roomData.players[`j${n}`] && n !== myPlayerNum);
        const turnPlayerName = roomData.playerNames?.[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`;
        const turnPlayerEmoji = roomData.playerEmojis?.[roomData.players[`j${roomData.turn}`]] || '🃏';
        const isDrawActive = isMyTurn && myPlayerNum && (roomData.currentCategoryId !== null || roomData.activeUnoPenalty);

        return (
            <div className="flex flex-col w-full h-[100dvh] overflow-hidden bg-slate-900 relative">

                {/* ══════════════ BANNER SUPERIOR — delgado ══════════════ */}
                <div className="flex-none h-12 flex items-center justify-between px-3 bg-slate-900 border-b border-slate-800 z-30">
                    {/* Logo + nombre del tema */}
                    <div className="flex items-center gap-2 min-w-0">
                        <div className="w-7 h-7 bg-gradient-to-br from-blue-500 via-yellow-400 to-red-500 rounded-full flex items-center justify-center shadow-md flex-none">
                            <span className="font-black text-white text-[10px]">U</span>
                        </div>
                        <span className="font-black text-white text-sm truncate hidden sm:block max-w-[120px]">
                            {roomData.categories?.[0]?.name ? `UNO · ${roomData.categories[0].name.substring(0,12)}` : 'UNO Custom'}
                        </span>
                    </div>

                    {/* Turno actual — centro */}
                    <div className="flex items-center gap-1.5 bg-slate-800 px-3 py-1 rounded-full border border-slate-700 shadow-inner">
                        <span className="text-base leading-none">{isMyTurn && myPlayerNum ? '⭐' : turnPlayerEmoji}</span>
                        <span className="font-black text-white text-xs truncate max-w-[90px]">
                            {isMyTurn && myPlayerNum ? '¡Tu turno!' : `Turno: ${turnPlayerName}`}
                        </span>
                    </div>

                    {/* Pausa */}
                    <button onClick={() => updateGame({ isPaused: true })}
                        className="w-9 h-9 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-full flex items-center justify-center transition btn-juicy flex-none border border-slate-700">
                        <Pause size={16}/>
                    </button>
                </div>

                {/* ══════════════ MESA CENTRAL (flex-1) ══════════════ */}
                <div className="flex-1 min-h-0 bg-green-800 relative flex items-center justify-center overflow-hidden">
                    {/* Textura de mesa */}
                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle, #fff 8%, transparent 9%)', backgroundSize: '18px 18px' }}></div>
                    {/* Anillo decorativo */}
                    <div className="w-[min(60vw,320px)] h-[min(60vw,320px)] border-4 border-green-700/40 rounded-full absolute flex items-center justify-center pointer-events-none">
                        <span className="text-green-700/20 font-black text-[min(10vw,60px)] spin-slow select-none">UNO</span>
                    </div>

                    {/* ── CONTROLES FLOTANTES SOBRE LA MESA ── */}
                    <div className="absolute top-3 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2">
                        {/* Categorías activas */}
                        {roomData.currentCategoryId !== null && !roomData.isRandomizing && (
                            <div className="flex gap-1.5 animate-pop-in">
                                {roomData.categories.map((cat, idx) => (
                                    <div key={idx} className={`px-2.5 py-1 rounded-full border font-black text-[10px] uppercase tracking-wide transition-all ${idx === roomData.currentCategoryId ? `${CAT_BADGE[idx]} scale-110 shadow-lg` : 'bg-slate-900/60 border-slate-700 text-slate-500'}`}>
                                        {cat.name}
                                    </div>
                                ))}
                            </div>
                        )}
                        {/* Castigo activo */}
                        {roomData.activeUnoPenalty && (
                            <div className="px-4 py-1.5 rounded-full bg-red-600/20 border border-red-500 text-red-300 font-black text-xs flex items-center gap-1.5 animate-pulse">
                                <AlertTriangle size={13}/> ¡CASTIGO +{roomData.activeUnoPenalty.amount}!
                            </div>
                        )}
                        {/* Ruleta girando */}
                        {roomData.isRandomizing && (
                            <div className="px-4 py-1.5 rounded-full bg-purple-600/20 border border-purple-500 text-purple-300 font-black text-xs flex items-center gap-1.5 animate-pulse">
                                <Dices size={13} className="animate-spin"/> Eligiendo categoría...
                            </div>
                        )}
                        {/* Botón TIRAR RULETA */}
                        {roomData.currentCategoryId === null && !roomData.isRandomizing && (isSelectorRole || isMyTurn) && (
                            <button onClick={handleRandomize}
                                className="px-5 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 rounded-full font-black text-white text-sm shadow-xl btn-juicy flex items-center gap-2 border-b-4 border-indigo-800 animate-pop-in">
                                <Dices size={18}/> TIRAR LA RULETA
                            </button>
                        )}
                        {roomData.currentCategoryId === null && !roomData.isRandomizing && !isSelectorRole && !isMyTurn && (
                            <div className="px-4 py-1.5 rounded-full bg-slate-900/60 border border-slate-700 text-slate-400 font-bold text-xs flex items-center gap-1.5">
                                <Loader2 size={12} className="animate-spin"/> {turnPlayerEmoji} {turnPlayerName} gira...
                            </div>
                        )}
                        {/* Feedback toast */}
                        <div className={`transition-all duration-300 ${localFeedback.visible ? 'opacity-100 scale-100' : 'opacity-0 scale-90 pointer-events-none'}`}>
                            {localFeedback.visible && (
                                <div className={`px-4 py-1.5 rounded-full font-bold text-white text-xs flex items-center gap-1.5 shadow-lg ${localFeedback.type === 'success' ? 'bg-green-500' : localFeedback.type === 'error' ? 'bg-red-500' : localFeedback.type === 'alert' ? 'bg-blue-500' : 'bg-slate-700'}`}>
                                    {localFeedback.type === 'success' && <CheckCircle size={13}/>}
                                    {localFeedback.type === 'alert' && <Zap size={13}/>}
                                    {localFeedback.text}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ── MAZO (clickeable) ── */}
                    <div className="absolute left-4 md:left-10 top-1/2 -translate-y-1/2 flex flex-col items-center gap-2 z-10">
                        <button
                            onClick={() => isDrawActive && handleDrawCard(myPlayerNum)}
                            disabled={!isDrawActive}
                            title={isDrawActive ? (roomData.activeUnoPenalty ? `Comer +${roomData.activeUnoPenalty.amount}` : 'Robar carta') : 'No es tu turno'}
                            className={`relative w-14 h-20 md:w-20 md:h-28 rounded-xl border-4 flex flex-col items-center justify-center transition-all duration-200 select-none
                                ${isDrawActive
                                    ? roomData.activeUnoPenalty
                                        ? 'bg-red-900 border-red-500 cursor-pointer penalty-pulse hover:scale-105'
                                        : 'bg-slate-700 border-indigo-400 cursor-pointer draw-pulse hover:scale-105'
                                    : 'bg-slate-800 border-slate-700 cursor-default opacity-70'}`}>
                            {/* Capas de cartas */}
                            {roomData.deck?.length > 1 && <div className="absolute inset-0 bg-slate-800 rounded-xl transform translate-x-1 translate-y-1 -z-10 border-4 border-slate-700"></div>}
                            {roomData.deck?.length > 2 && <div className="absolute inset-0 bg-slate-800 rounded-xl transform translate-x-2 translate-y-2 -z-20 border-4 border-slate-700"></div>}
                            <span className="font-black text-[9px] md:text-[10px] text-slate-400 rotate-[-45deg] z-10">UNO</span>
                            {isDrawActive && (
                                <span className={`text-[8px] md:text-[9px] font-black mt-1 z-10 ${roomData.activeUnoPenalty ? 'text-red-300 animate-pulse' : 'text-indigo-300'}`}>
                                    {roomData.activeUnoPenalty ? `+${roomData.activeUnoPenalty.amount}` : 'DRAW'}
                                </span>
                            )}
                        </button>
                        <span className="bg-black/50 text-white px-2 py-0.5 rounded-full text-[10px] font-bold">{roomData.deck?.length ?? 0}</span>
                    </div>

                    {/* ── CARTA EN MESA ── */}
                    <div className="relative z-10">
                        <div className="relative w-28 h-40 md:w-44 md:h-60 flex items-center justify-center">
                            {roomData.tableCard ? (
                                <div className={`w-full h-full rounded-2xl shadow-2xl flex flex-col items-center justify-center border-8 transition-all duration-500 card-float ${CAT_COLORS[roomData.tableCard.categoryId]} bg-white`}>
                                    <div className={`text-[10px] md:text-sm font-black mb-1 uppercase text-center leading-tight px-1 ${CAT_TEXT[roomData.tableCard.categoryId]} opacity-70`}>
                                        {roomData.tableCard.categoryName}
                                    </div>
                                    <div className="bg-white px-2 py-4 md:py-6 w-10/12 rounded-xl flex items-center justify-center shadow-inner">
                                        <span className={`font-extrabold text-slate-800 text-center break-words leading-tight flex flex-col items-center gap-1 ${roomData.tableCard.type !== 'word' ? 'text-2xl md:text-3xl text-indigo-600' : 'text-sm md:text-lg'}`}>
                                            {roomData.tableCard.type === 'action' && <span className="text-xl">⚡</span>}
                                            {roomData.tableCard.type === 'wild' && <span className="text-xl">🌈</span>}
                                            {roomData.tableCard.word}
                                        </span>
                                    </div>
                                    {roomData.tableCard.type !== 'word' && <div className="mt-1 text-[8px] md:text-[10px] font-bold text-slate-700 uppercase px-2 py-0.5 rounded bg-slate-200">{roomData.tableCard.desc}</div>}
                                </div>
                            ) : (
                                <div className="w-full h-full rounded-2xl border-4 border-dashed border-green-600/40 flex flex-col items-center justify-center text-green-700/40 text-center p-4">
                                    <span className="font-bold text-sm">ESPERANDO<br/>CARTA</span>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ── PANEL LATERAL (rivales/maestro) ── */}
                    {(isSelectorRole || myPlayerNum) && (
                        <div className={`absolute right-2 top-3 bottom-3 bg-slate-900/90 rounded-xl border border-slate-700 flex flex-col shadow-2xl z-20 transition-all duration-300 ${showMaestroView ? (isSelectorRole ? 'w-40 p-2' : 'w-28 p-2') : 'w-9 p-1.5'}`}>
                            <div className={`flex items-center border-slate-700 mb-2 ${showMaestroView ? 'justify-between border-b pb-1.5' : 'justify-center'}`}>
                                {showMaestroView && <h3 className="text-[9px] font-black text-purple-400 uppercase tracking-widest">{isSelectorRole ? 'Maestro' : 'Rivales'}</h3>}
                                <button onClick={() => setShowMaestroView(!showMaestroView)} className="p-1 hover:bg-slate-700 rounded text-slate-400 transition">
                                    {showMaestroView ? <EyeOff size={14}/> : <Eye size={14}/>}
                                </button>
                            </div>
                            {showMaestroView && (
                                <div className="flex flex-col gap-1.5 overflow-y-auto custom-scrollbar flex-1">
                                    {activePlayingOpponents.map(pNum => (
                                        <div key={pNum} className={`bg-slate-800 rounded-lg p-1.5 border-2 ${roomData.turn === pNum ? 'border-yellow-500' : 'border-slate-700'}`}>
                                            <div className="text-[9px] font-bold text-white mb-1 truncate flex justify-between items-center gap-1">
                                                <span className="flex items-center gap-1">
                                                    <span>{roomData.playerEmojis?.[roomData.players[`j${pNum}`]] || '🃏'}</span>
                                                    <span className="truncate">{roomData.playerNames?.[roomData.players[`j${pNum}`]] || `J${pNum}`}</span>
                                                </span>
                                                {roomData.unoCalled?.[pNum] && <span className="bg-orange-500 text-[7px] px-1 rounded animate-pulse flex-none">UNO!</span>}
                                            </div>
                                            {isSelectorRole ? (
                                                <div className="flex flex-wrap gap-0.5">
                                                    {(roomData[`player${pNum}Hand`] || []).map((c, i) => (
                                                        <div key={i} className={`w-full text-[8px] font-bold rounded py-0.5 px-1 truncate border-l-2 ${c.categoryId === 0 ? 'border-blue-500 bg-blue-900/30 text-blue-200' : c.categoryId === 1 ? 'border-red-500 bg-red-900/30 text-red-200' : c.categoryId === 2 ? 'border-yellow-400 bg-yellow-900/30 text-yellow-200' : c.categoryId === 3 ? 'border-green-500 bg-green-900/30 text-green-200' : 'border-purple-500 bg-purple-900/30 text-purple-200'}`}>
                                                            {c.type === 'action' ? `⚡${c.word}` : c.type === 'wild' ? `🌈${c.word}` : c.word}
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="flex items-center gap-1">
                                                    <div className="w-4 h-6 bg-slate-700 rounded border border-slate-600 flex items-center justify-center">
                                                        <span className="text-[5px] font-black text-slate-500 rotate-[-45deg]">UNO</span>
                                                    </div>
                                                    <span className="text-sm font-black text-slate-300">x{(roomData[`player${pNum}Hand`] || []).length}</span>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>

                {/* ══════════════ BANNER INFERIOR — mano de cartas ══════════════ */}
                <div className="flex-none border-t border-slate-700 shadow-[0_-8px_20px_rgba(0,0,0,0.4)] relative bg-slate-900"
                    style={{ height: 'clamp(110px, 22vh, 180px)' }}>
                    {myPlayerNum ? (
                        <div className="w-full h-full flex flex-col">
                            {/* Sub-header de la mano */}
                            <div className="flex justify-between items-center px-3 py-1.5 bg-slate-900/80 border-b border-slate-800 flex-none">
                                <div className="flex items-center gap-2">
                                    <span className="text-base">{playerEmoji}</span>
                                    <span className="font-bold text-white text-xs hidden sm:inline truncate max-w-[100px]">{playerName}</span>
                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-black ${isMyTurn ? 'bg-yellow-500 text-slate-900 animate-pulse' : 'bg-slate-700 text-slate-400'}`}>
                                        {isMyTurn ? '¡Tu turno!' : `${myHandSize} cartas`}
                                    </span>
                                </div>
                                <div className="flex gap-1.5 items-center">
                                    {canCallUno && (
                                        <button onClick={handleCallUno}
                                            className="px-3 py-1 rounded-lg bg-orange-500 hover:bg-orange-400 text-white text-[10px] font-black tracking-widest shadow-lg animate-bounce btn-juicy shadow-orange-500/40">
                                            ¡UNO!
                                        </button>
                                    )}
                                </div>
                            </div>
                            {/* Cartas — siempre visibles, solo el click se bloquea cuando no es tu turno */}
                            <div className={`flex-1 overflow-x-auto overflow-y-hidden custom-scrollbar relative ${!isMyTurn ? 'opacity-80' : ''}`}>
                                {!isMyTurn && (
                                    <div className="absolute inset-0 z-10 flex items-center justify-end pr-4 pointer-events-none">
                                        <span className="text-[10px] font-bold text-slate-500 bg-slate-900/70 px-2 py-1 rounded-full">{turnPlayerEmoji} turno de {turnPlayerName}</span>
                                    </div>
                                )}
                                <div className="flex flex-nowrap items-center justify-start gap-1.5 h-full px-3 w-max">
                                    {(roomData[`player${myPlayerNum}Hand`] || []).map((card, idx) => {
                                        const disabled = !isMyTurn || (roomData.currentCategoryId === null && !roomData.activeUnoPenalty);
                                        let cardClass = 'bg-white border-slate-200 text-slate-800';
                                        if (card.type === 'action') cardClass = `${CAT_COLORS[card.categoryId]} ${CAT_TEXT[card.categoryId] === 'text-white' ? 'text-white' : 'text-slate-900'} border-white`;
                                        if (card.type === 'wild') cardClass = 'bg-slate-800 text-white border-white';
                                        return (
                                            <button key={idx} onClick={() => !disabled && handlePlayCard(myPlayerNum, idx)}
                                                className={`flex-none rounded-xl border-2 flex flex-col items-center justify-center transition-all duration-200 relative overflow-hidden select-none
                                                    w-14 h-20 md:w-20 md:h-28
                                                    ${cardClass}
                                                    ${!disabled ? 'hover:scale-110 hover:shadow-xl hover:-translate-y-2 hover:border-yellow-300 hover:z-10 cursor-pointer active:scale-95' : 'cursor-default'}`}>
                                                {card.type === 'wild' && <div className="absolute inset-0 bg-gradient-to-br from-red-500/30 via-yellow-400/30 to-blue-500/30 z-0"></div>}
                                                <span className={`font-black text-center break-words leading-tight px-1 z-10 flex flex-col items-center gap-0.5 ${card.type !== 'word' ? 'text-base md:text-xl mt-0.5' : 'text-[9px] md:text-xs'}`}>
                                                    {card.type === 'action' && <span className="text-xs">⚡</span>}
                                                    {card.type === 'wild' && <span className="text-xs">🌈</span>}
                                                    {card.word}
                                                </span>
                                                {card.type !== 'word' && <span className="text-[6px] md:text-[8px] mt-1 opacity-80 text-center px-1 pb-0.5 z-10 uppercase">{card.desc}</span>}
                                            </button>
                                        );
                                    })}
                                    {(roomData[`player${myPlayerNum}Hand`] || []).length === 0 && (
                                        <span className="text-slate-500 italic px-4 font-bold text-sm">Has tirado todas tus cartas.</span>
                                    )}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="w-full h-full flex items-center justify-center">
                            <span className="text-slate-500 font-bold text-sm flex items-center gap-2"><User size={18}/> Eres Selector — no tienes cartas en mano</span>
                        </div>
                    )}
                </div>

                {/* ══════════════ MODALES ══════════════ */}

                {/* Pausa */}
                {roomData.isPaused && (
                    <div className="absolute inset-0 z-[60] bg-slate-900/85 backdrop-blur-md flex flex-col items-center justify-center animate-fade-in p-4">
                        <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-600 text-center max-w-xs w-full">
                            <Pause size={56} className="text-white mb-4 mx-auto opacity-80"/>
                            <h2 className="text-3xl font-black text-white tracking-widest mb-6">PAUSADO</h2>
                            <div className="flex flex-col gap-3 w-full">
                                <button onClick={() => updateGame({ isPaused: false })} className="w-full py-3 bg-blue-500 hover:bg-blue-400 text-white rounded-xl font-bold text-lg btn-juicy flex items-center justify-center gap-2">
                                    <Play size={18} fill="currentColor"/> Continuar
                                </button>
                                {isS1 && (
                                    <button onClick={startGame} className="w-full py-3 bg-yellow-500 hover:bg-yellow-400 text-slate-900 rounded-xl font-bold btn-juicy flex items-center justify-center gap-2">
                                        <RotateCcw size={18}/> Reiniciar
                                    </button>
                                )}
                                <button onClick={handleEndGame} className="w-full py-3 bg-red-500 hover:bg-red-400 text-white rounded-xl font-bold btn-juicy flex items-center justify-center gap-2">
                                    <Home size={18}/> Finalizar Juego
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Penalización */}
                {roomData.penaltyData && (
                    <div className="absolute inset-0 z-[55] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center animate-fade-in p-4">
                        <div className="bg-slate-800 p-7 rounded-2xl shadow-2xl border-2 border-red-500 max-w-sm w-full text-center">
                            <div className="text-4xl mb-3">❌</div>
                            <h3 className="text-xl font-black text-red-400 mb-1">¡Carta Incorrecta!</h3>
                            <p className="text-slate-300 font-bold mb-1">"{roomData.penaltyData.playedWord}"</p>
                            <p className="text-xs text-slate-400 mb-4">{roomData.penaltyData.explanation}</p>
                            {(isS1 || roomData.penaltyData.player === myPlayerNum) && (
                                <button onClick={closePenaltyModal} className="w-full py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl font-black btn-juicy">
                                    Aceptar y Robar Carta
                                </button>
                            )}
                            {(!isS1 && roomData.penaltyData.player !== myPlayerNum) && (
                                <p className="text-slate-500 text-xs font-bold">Esperando que el jugador o maestro acepte...</p>
                            )}
                        </div>
                    </div>
                )}

                {/* Elegir categoría (wild) */}
                {pendingWildCard && (
                    <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 animate-fade-in">
                        <h2 className="text-2xl font-black text-white mb-6 text-center">Elige la Nueva Categoría</h2>
                        <div className="grid grid-cols-2 gap-3 w-full max-w-xs">
                            {roomData.categories.map((cat, idx) => (
                                <button key={idx} onClick={() => handleWildChoice(idx)}
                                    className={`py-4 rounded-xl font-black text-sm border-4 btn-juicy shadow-lg ${CAT_COLORS[idx]} ${CAT_TEXT[idx] === 'text-white' ? 'text-white border-white/30' : 'text-slate-900 border-slate-900/30'}`}>
                                    {cat.name}
                                </button>
                            ))}
                        </div>
                    </div>
                )}

                {/* Elegir swap */}
                {pendingSwapCard && (
                    <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 animate-fade-in">
                        <h2 className="text-2xl font-black text-white mb-6 text-center">¿Con quién intercambias?</h2>
                        <div className="flex flex-col gap-3 w-full max-w-xs">
                            {activePlayingOpponents.map(pNum => (
                                <button key={pNum} onClick={() => handleSwapChoice(pNum)}
                                    className="py-3 rounded-xl font-black text-white bg-indigo-600 hover:bg-indigo-500 border-4 border-indigo-400 btn-juicy text-sm flex items-center justify-center gap-2 shadow-lg">
                                    <span>{roomData.playerEmojis?.[roomData.players[`j${pNum}`]] || '🃏'}</span>
                                    {roomData.playerNames?.[roomData.players[`j${pNum}`]] || `Jugador ${pNum}`}
                                    <span className="text-xs opacity-70">({(roomData[`player${pNum}Hand`] || []).length} cartas)</span>
                                </button>
                            ))}
                        </div>
                    </div>
                )}

                {/* Game Over */}
                {roomData.gameState === 'GAME_OVER' && (
                    <div className="absolute inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in p-4">
                        <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border-4 border-yellow-400 text-center max-w-sm w-full">
                            <div className="mb-4 flex justify-center">
                                {roomData.winner?.includes('❌') ? <AlertTriangle size={56} className="text-red-500"/> : <span className="text-6xl">🏆</span>}
                            </div>
                            <h2 className="text-4xl font-black text-white mb-1 uppercase tracking-tight">
                                {roomData.winner?.includes('❌') ? '¡Penalización!' : '¡Juego Terminado!'}
                            </h2>
                            <p className="text-xl font-black text-yellow-400 mb-6">{roomData.winner?.replace('❌ ','')}</p>
                            <div className="flex flex-col gap-3">
                                {isS1 && (
                                    <button onClick={startGame} className="w-full py-3 bg-green-500 hover:bg-green-400 text-white rounded-xl font-black btn-juicy flex items-center justify-center gap-2">
                                        <RotateCcw size={18}/> Jugar de Nuevo
                                    </button>
                                )}
                                <button onClick={handleEndGame} className="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold btn-juicy flex items-center justify-center gap-2">
                                    <Home size={18}/> Volver al Lobby
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(
        <div className="flex flex-col h-[100dvh] bg-slate-900 text-white overflow-hidden">
            <UnoGame/>
        </div>
    );
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UNO Gramatical | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }; 
        document.documentElement.classList.add('dark');
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body { font-family: 'Varela Round', sans-serif; user-select: none; -webkit-user-select: none; touch-action: manipulation; overflow-x: hidden; max-width: 100vw; height: 100dvh; background-color: #09090b; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 8px; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root" class="w-full h-full max-w-[100vw] overflow-x-hidden flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from 'firebase/firestore';
        
        import { ArrowLeft, Loader2, Sun, Moon, Pause, Play, RotateCcw, Share2, User, Users, AlertTriangle, BookOpen, ArrowRight, Dices, RefreshCw } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ARTICLE_COLORS = { 'el': 'bg-blue-500 border-blue-700', 'la': 'bg-red-500 border-red-700', 'los': 'bg-yellow-400 border-yellow-600', 'las': 'bg-green-500 border-green-700', 'any': 'bg-slate-800 border-slate-600' };
        const ARTICLE_TEXT = { 'el': 'text-white', 'la': 'text-white', 'los': 'text-gray-900', 'las': 'text-white', 'any': 'text-white' };

        const VOCABULARY = [
            { word: 'clima', article: 'el' }, { word: 'problema', article: 'el' }, { word: 'sistema', article: 'el' }, { word: 'mapa', article: 'el' }, { word: 'planeta', article: 'el' }, { word: 'idioma', article: 'el' }, { word: 'fantasma', article: 'el' }, { word: 'dilema', article: 'el' }, { word: 'esquema', article: 'el' }, { word: 'síntoma', article: 'el' }, { word: 'día', article: 'el' }, { word: 'sofá', article: 'el' }, { word: 'árbol', article: 'el' }, { word: 'gallo', article: 'el' }, { word: 'corazón', article: 'el' }, { word: 'sol', article: 'el' }, { word: 'beso', article: 'el' }, { word: 'abrazo', article: 'el' }, { word: 'anillo', article: 'el' }, { word: 'chocolate', article: 'el' }, { word: 'poema', article: 'el' }, { word: 'menú', article: 'el' }, { word: 'plato', article: 'el' }, { word: 'vaso', article: 'el' }, { word: 'sabor', article: 'el' }, { word: 'olor', article: 'el' }, { word: 'fuego', article: 'el' }, { word: 'hospital', article: 'el' }, { word: 'dolor', article: 'el' }, { word: 'techo', article: 'el' }, { word: 'piso', article: 'el' }, { word: 'baño', article: 'el' }, { word: 'reloj', article: 'el' }, { word: 'teléfono', article: 'el' }, { word: 'perro', article: 'el' }, { word: 'gato', article: 'el' }, { word: 'celular', article: 'el' }, { word: 'internet', article: 'el' }, { word: 'viaje', article: 'el' }, { word: 'lunes', article: 'el', validArticles: ['el', 'los'] }, { word: 'paraguas', article: 'el', validArticles: ['el', 'los'] }, { word: 'virus', article: 'el', validArticles: ['el', 'los'] }, { word: 'análisis', article: 'el', validArticles: ['el', 'los'] },
            { word: 'mano', article: 'la' }, { word: 'foto', article: 'la' }, { word: 'moto', article: 'la' }, { word: 'radio', article: 'la' }, { word: 'actriz', article: 'la' }, { word: 'verdad', article: 'la' }, { word: 'canción', article: 'la' }, { word: 'pasión', article: 'la' }, { word: 'luz', article: 'la' }, { word: 'voz', article: 'la' }, { word: 'emperatriz', article: 'la' }, { word: 'cicatriz', article: 'la' }, { word: 'ciudad', article: 'la' }, { word: 'misión', article: 'la' }, { word: 'serie', article: 'la' }, { word: 'especie', article: 'la' }, { word: 'dama', article: 'la' }, { word: 'botella', article: 'la' }, { word: 'luna', article: 'la' }, { word: 'estrella', article: 'la' }, { word: 'rosa', article: 'la' }, { word: 'cita', article: 'la' }, { word: 'cena', article: 'la' }, { word: 'flor', article: 'la' }, { word: 'música', article: 'la' }, { word: 'sorpresa', article: 'la' }, { word: 'mesa', article: 'la' }, { word: 'silla', article: 'la' }, { word: 'cocina', article: 'la' }, { word: 'cuenta', article: 'la' }, { word: 'comida', article: 'la' }, { word: 'cerveza', article: 'la' }, { word: 'sangre', article: 'la' }, { word: 'presión', article: 'la' }, { word: 'casa', article: 'la' }, { word: 'puerta', article: 'la' }, { word: 'ventana', article: 'la' }, { word: 'cama', article: 'la' }, { word: 'llave', article: 'la' }, { word: 'computadora', article: 'la' }, { word: 'maleta', article: 'la' }, { word: 'tienda', article: 'la' },
            { word: 'climas', article: 'los' }, { word: 'problemas', article: 'los' }, { word: 'sistemas', article: 'los' }, { word: 'mapas', article: 'los' }, { word: 'días', article: 'los' }, { word: 'árboles', article: 'los' }, { word: 'corazones', article: 'los' }, { word: 'soles', article: 'los' }, { word: 'besos', article: 'los' }, { word: 'abrazos', article: 'los' }, { word: 'anillos', article: 'los' }, { word: 'poemas', article: 'los' }, { word: 'menús', article: 'los' }, { word: 'platos', article: 'los' }, { word: 'vasos', article: 'los' }, { word: 'hospitales', article: 'los' }, { word: 'doctores', article: 'los' }, { word: 'relojes', article: 'los' }, { word: 'teléfonos', article: 'los' }, { word: 'perros', article: 'los' }, { word: 'gatos', article: 'los' }, { word: 'celulares', article: 'los' }, { word: 'viajes', article: 'los' }, { word: 'hoteles', article: 'los' }, { word: 'taxis', article: 'los' }, { word: 'trenes', article: 'los' },
            { word: 'manos', article: 'las' }, { word: 'fotos', article: 'las' }, { word: 'motos', article: 'las' }, { word: 'radios', article: 'las' }, { word: 'actrices', article: 'las' }, { word: 'verdades', article: 'las' }, { word: 'canciones', article: 'las' }, { word: 'pasiones', article: 'las' }, { word: 'luces', article: 'las' }, { word: 'voces', article: 'las' }, { word: 'ciudades', article: 'las' }, { word: 'misiones', article: 'las' }, { word: 'series', article: 'las' }, { word: 'botellas', article: 'las' }, { word: 'lunas', article: 'las' }, { word: 'estrellas', article: 'las' }, { word: 'rosas', article: 'las' }, { word: 'citas', article: 'las' }, { word: 'cenas', article: 'las' }, { word: 'flores', article: 'las' }, { word: 'músicas', article: 'las' }, { word: 'mesas', article: 'las' }, { word: 'sillas', article: 'las' }, { word: 'cocinas', article: 'las' }, { word: 'cuentas', article: 'las' }, { word: 'comidas', article: 'las' }, { word: 'cervezas', article: 'las' }, { word: 'casas', article: 'las' }, { word: 'puertas', article: 'las' }, { word: 'ventanas', article: 'las' }, { word: 'camas', article: 'las' }, { word: 'llaves', article: 'las' }, { word: 'maletas', article: 'las' }, { word: 'tijeras', article: 'las' },
            { word: 'artista', article: 'el', validArticles: ['el', 'la'] }, { word: 'dentista', article: 'el', validArticles: ['el', 'la'] }, { word: 'guía', article: 'el', validArticles: ['el', 'la'] }, { word: 'cantante', article: 'el', validArticles: ['el', 'la'] }, { word: 'estudiante', article: 'el', validArticles: ['el', 'la'] }, { word: 'paciente', article: 'el', validArticles: ['el', 'la'] }, { word: 'amante', article: 'el', validArticles: ['el', 'la'] }, { word: 'chef', article: 'el', validArticles: ['el', 'la'] }, { word: 'cliente', article: 'el', validArticles: ['el', 'la'] }, { word: 'gerente', article: 'el', validArticles: ['el', 'la'] }, { word: 'turista', article: 'el', validArticles: ['el', 'la'] }
        ];

        const getGrammarExplanation = (wordObj) => {
            if (wordObj.validArticles && wordObj.validArticles.length > 1) {
                return `Excepción de Género Neutro: '${wordObj.word}' se puede usar con ${wordObj.validArticles.join(' o ')} dependiendo de la persona.`;
            }
            if (wordObj.article === 'el' || wordObj.article === 'los') {
                if (['clima', 'problema', 'sistema', 'mapa', 'planeta', 'idioma', 'día', 'sofá'].includes(wordObj.word)) return "Los Rebeldes: Palabras que terminan en -ma (origen griego) o excepciones como 'día' y 'mapa' parecen femeninas pero son MASCULINAS.";
                return `Regla Masculina: '${wordObj.word}' lleva el artículo masculino '${wordObj.article}'. Recuerda la regla LONERS.`;
            } else {
                if (['mano', 'foto', 'moto', 'radio'].includes(wordObj.word)) return "Los Rebeldes: Palabras que son versiones cortas (fotografía, motocicleta) o excepciones como 'mano' parecen masculinas pero son FEMENINAS.";
                return `Regla Femenina: '${wordObj.word}' lleva el artículo femenino '${wordObj.article}'.`;
            }
        };

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const build112Deck = () => {
            const getWords = (art) => shuffleArray(VOCABULARY.filter(w => w.article === art || (w.validArticles && w.validArticles.includes(art)))).slice(0, 19);
            const deck = [];
            const articles = ['el', 'la', 'los', 'las'];

            articles.forEach(art => { getWords(art).forEach(w => deck.push({ ...w, type: 'word' })); });

            articles.forEach(art => {
                for(let i=0; i<2; i++) {
                    deck.push({ word: '+2', article: art, type: 'action', action: 'draw2', desc: 'Roba 2 y pierde turno' });
                    deck.push({ word: 'Reversa', article: art, type: 'action', action: 'reverse', desc: 'Cambia sentido (Salta turno en 2P)' });
                    deck.push({ word: 'Salto', article: art, type: 'action', action: 'skip', desc: 'Pierde turno' });
                }
            });

            for(let i=0; i<4; i++) {
                deck.push({ word: 'Comodín', article: 'any', type: 'wild', action: 'wild', desc: 'Elige el nuevo artículo' });
                deck.push({ word: '+4 Wild', article: 'any', type: 'wild', action: 'wild4', desc: 'Elige artículo, rival roba 4' });
                deck.push({ word: 'Swap', article: 'any', type: 'wild', action: 'swap', desc: 'Intercambia manos con rival' });
            }

            return shuffleArray(deck);
        };

        const UnoGame = () => {
            const [user, setUser] = useState(null);
            const [roomId, setRoomId] = useState('');
            const [joinInput, setJoinInput] = useState('');
            const [roomData, setRoomData] = useState(null);
            
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [localFeedback, setLocalFeedback] = useState({ text: '', type: '', visible: false });
            const [flashArticle, setFlashArticle] = useState(null);
            
            const [pendingWildCard, setPendingWildCard] = useState(null); 

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                signInAnonymously(auth).catch(e => console.error(e));
                const unsubscribe = onAuthStateChanged(auth, u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!roomId || !user) return;
                const roomRef = doc(db, 'artifacts/periplo-app-v1/public/rooms', roomId);
                
                const unsubscribe = onSnapshot(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        setRoomData(snapshot.data());
                    } else {
                        setRoomData(null); 
                        alert("La sala no existe o fue cerrada.");
                        setRoomId('');
                    }
                });
                return () => unsubscribe();
            }, [roomId, user]);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);

            useEffect(() => {
                if (roomData?.feedbackMessage?.ts) {
                    setLocalFeedback({ ...roomData.feedbackMessage, visible: true });
                    const t = setTimeout(() => setLocalFeedback(prev => ({ ...prev, visible: false })), 2500);
                    return () => clearTimeout(t);
                }
            }, [roomData?.feedbackMessage?.ts]);

            useEffect(() => {
                let interval;
                if (roomData?.isRandomizing) {
                    const arts = ['el', 'la', 'los', 'las'];
                    let i = 0;
                    interval = setInterval(() => { setFlashArticle(arts[i % 4]); i++; }, 100);
                } else {
                    setFlashArticle(null);
                }
                return () => clearInterval(interval);
            }, [roomData?.isRandomizing]);

            const updateGame = async (updates) => {
                if (!roomId) return;
                try { await updateDoc(doc(db, 'artifacts/periplo-app-v1/public/rooms', roomId), updates); } 
                catch (e) { console.error("Error updating", e); }
            };

            const handleCreateRoom = async () => {
                if (!user) return;
                const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                const roomRef = doc(db, 'artifacts/periplo-app-v1/public/rooms', code);
                await setDoc(roomRef, {
                    roomId: code, gameState: 'MENU',
                    players: { s1: user.uid, s2: null, j1: null, j2: null },
                    deck: [], player1Hand: [], player2Hand: [],
                    currentArticle: null, tableCard: null, turn: 1,
                    isRandomizing: false, winner: null, penaltyData: null,
                    isPaused: false, feedbackMessage: null
                });
                setRoomId(code);
            };

            const toggleRole = async (roleId) => {
                if (!roomData || !user) return;
                const newPlayers = { ...roomData.players };
                newPlayers[roleId] = newPlayers[roleId] === user.uid ? null : user.uid;
                await updateGame({ players: newPlayers });
            };

            const startGame = async () => {
                if (!roomData) return;
                const gameDeck = build112Deck();
                await updateGame({
                    gameState: 'PLAYING', deck: gameDeck.slice(14),
                    player1Hand: gameDeck.slice(0, 7), player2Hand: gameDeck.slice(7, 14),
                    currentArticle: null, tableCard: null, turn: 1, isRandomizing: false, winner: null, penaltyData: null, isPaused: false,
                    feedbackMessage: { text: '¡El juego comienza! Selector, gira la ruleta.', type: 'info', ts: Date.now() }
                });
            };

            const isS1 = roomData?.players?.s1 === user?.uid;
            const isS2 = roomData?.players?.s2 === user?.uid;
            const isJ1 = roomData?.players?.j1 === user?.uid;
            const isJ2 = roomData?.players?.j2 === user?.uid;
            const isSelectorRole = isS1 || isS2;

            const handleRandomize = async () => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || !isSelectorRole || roomData.isPaused || roomData.isRandomizing) return;
                const articles = ['el', 'la', 'los', 'las'];
                const picked = articles[Math.floor(Math.random() * articles.length)];
                await updateGame({ isRandomizing: true, currentArticle: null });
                setTimeout(async () => {
                    await updateGame({ isRandomizing: false, currentArticle: picked, feedbackMessage: { text: `¡Artículo: ${picked.toUpperCase()}!`, type: 'alert', ts: Date.now() }});
                }, 2000);
            };

            const handlePlayCard = async (playerNum, cardIndex) => {
                if (roomData.gameState !== 'PLAYING' || !roomData.currentArticle || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum) return;
                if ((playerNum === 1 && !isJ1) || (playerNum === 2 && !isJ2)) return;

                const hand = playerNum === 1 ? roomData.player1Hand : roomData.player2Hand;
                const playedCard = hand[cardIndex];
                if (!playedCard) return;

                const isCorrect = playedCard.type === 'wild' || playedCard.article === roomData.currentArticle || (playedCard.validArticles && playedCard.validArticles.includes(roomData.currentArticle));
                
                if (isCorrect) {
                    if (playedCard.type === 'wild') {
                        setPendingWildCard({ playerNum, cardIndex, card: playedCard });
                    } else {
                        executeCardPlay(playerNum, cardIndex, playedCard, roomData.currentArticle);
                    }
                } else {
                    await updateGame({
                        penaltyData: {
                            player: playerNum, playedWord: playedCard.word, correctArticle: playedCard.article,
                            correctArticlesDisplay: playedCard.validArticles ? playedCard.validArticles.join(' O ') : playedCard.article,
                            wrongArticle: roomData.currentArticle, explanation: playedCard.type === 'action' ? "¡Las cartas de acción también tienen género en este juego! Debe coincidir con la mesa." : getGrammarExplanation(playedCard)
                        }
                    });
                }
            };

            const executeCardPlay = async (playerNum, cardIndex, card, newArticle) => {
                const hand = playerNum === 1 ? [...roomData.player1Hand] : [...roomData.player2Hand];
                const opponentHand = playerNum === 1 ? [...roomData.player2Hand] : [...roomData.player1Hand];
                let deck = [...roomData.deck];
                
                hand.splice(cardIndex, 1);
                
                let updates = {
                    [`player${playerNum}Hand`]: hand,
                    tableCard: { ...card, article: newArticle },
                    currentArticle: newArticle,
                    feedbackMessage: { text: `¡Bien jugado!`, type: 'success', ts: Date.now() }
                };

                let nextTurn = playerNum === 1 ? 2 : 1;

                if (card.type === 'action') {
                    if (card.action === 'skip' || card.action === 'reverse') {
                        nextTurn = playerNum; 
                        updates.feedbackMessage.text = "¡Pierde Turno!";
                    } else if (card.action === 'draw2') {
                        const drawnCards = deck.splice(0, 2);
                        updates[`player${playerNum === 1 ? 2 : 1}Hand`] = [...opponentHand, ...drawnCards];
                        updates.deck = deck;
                        nextTurn = playerNum; 
                        updates.feedbackMessage.text = "¡Roba 2 y Pierde Turno!";
                    }
                } else if (card.type === 'wild') {
                    if (card.action === 'wild4') {
                        const drawnCards = deck.splice(0, 4);
                        updates[`player${playerNum === 1 ? 2 : 1}Hand`] = [...opponentHand, ...drawnCards];
                        updates.deck = deck;
                        nextTurn = playerNum; 
                        updates.feedbackMessage.text = "¡Roba 4 y Pierde Turno!";
                    } else if (card.action === 'swap') {
                        updates[`player${playerNum}Hand`] = opponentHand;
                        updates[`player${playerNum === 1 ? 2 : 1}Hand`] = hand;
                        updates.feedbackMessage.text = "¡Manos Intercambiadas!";
                    }
                }

                updates.turn = nextTurn;

                if (hand.length === 0 && card.action !== 'swap') { 
                    updates.winner = `Jugador ${playerNum}`; 
                    updates.gameState = 'GAME_OVER'; 
                }

                await updateGame(updates);
                setPendingWildCard(null); 
            };

            const handleWildChoice = (chosenArticle) => {
                executeCardPlay(pendingWildCard.playerNum, pendingWildCard.cardIndex, pendingWildCard.card, chosenArticle);
            };

            const handleDrawCard = async (playerNum) => {
                if (roomData.gameState !== 'PLAYING' || roomData.deck.length === 0 || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum) return;
                if ((playerNum === 1 && !isJ1) || (playerNum === 2 && !isJ2)) return;

                const hand = playerNum === 1 ? roomData.player1Hand : roomData.player2Hand;
                await updateGame({ deck: roomData.deck.slice(1), [`player${playerNum}Hand`]: [...hand, roomData.deck[0]], turn: playerNum === 1 ? 2 : 1 });
            };

            const closePenaltyModal = async () => { await updateGame({ penaltyData: null, turn: roomData.turn === 1 ? 2 : 1, currentArticle: null }); };

            const renderCard = (c, i, playerNum, isMe) => {
                if (!isMe && !isSelectorRole) return (
                    <div key={i} className="w-[60px] h-[85px] sm:w-[75px] sm:h-[105px] bg-slate-800 rounded-lg shadow-md border-2 border-slate-700 flex flex-col items-center justify-center p-1 shrink-0">
                        <span className="text-white text-xs font-black rotate-[-15deg] opacity-50">UNO</span>
                    </div>
                );

                const disabled = !roomData.currentArticle || roomData.turn !== playerNum || !isMe;
                
                let cardClass = "bg-white border-slate-200 text-slate-800";
                if (c.type === 'action') cardClass = `${ARTICLE_COLORS[c.article]} ${ARTICLE_TEXT[c.article]} border-white`;
                if (c.type === 'wild') cardClass = "bg-slate-800 text-white border-white";

                return (
                    <button key={i} onClick={() => handlePlayCard(playerNum, i)} disabled={disabled} className={`w-[60px] h-[85px] sm:w-[75px] sm:h-[105px] rounded-lg shadow-md border-2 flex flex-col items-center justify-center p-1 shrink-0 relative transition-transform ${cardClass} ${!disabled ? 'hover:scale-110 hover:-translate-y-2 z-10' : 'opacity-80'}`}>
                        {c.type === 'wild' && (
                            <div className="absolute inset-0 m-1 rounded bg-gradient-to-br from-red-500 via-yellow-400 to-blue-500 opacity-20"></div>
                        )}
                        <span className={`text-[10px] sm:text-xs font-black text-center leading-tight break-words relative z-10 ${c.type !== 'word' ? 'text-xl' : ''}`}>{c.word}</span>
                        {c.type !== 'word' && <span className="text-[7px] mt-1 opacity-80 text-center leading-none">{c.desc}</span>}
                    </button>
                )
            };

            // --- VISTAS ---
            if (!roomId) return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 flex flex-col items-center justify-center p-6 text-center animate-fade-in relative overflow-hidden">
                    <button onClick={() => window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-slate-200 dark:bg-zinc-800 rounded-full"><ArrowLeft size={20}/></button>
                    <div className="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-zinc-800 max-w-md w-full relative z-10">
                        <div className="flex justify-center gap-2 mb-6">
                            <span className="bg-blue-500 w-10 h-14 rounded shadow transform -rotate-12 border-2 border-white dark:border-zinc-800"></span>
                            <span className="bg-red-500 w-10 h-14 rounded shadow transform -rotate-6 border-2 border-white dark:border-zinc-800"></span>
                            <span className="bg-yellow-400 w-10 h-14 rounded shadow transform rotate-6 border-2 border-white dark:border-zinc-800"></span>
                            <span className="bg-green-500 w-10 h-14 rounded shadow transform rotate-12 border-2 border-white dark:border-zinc-800"></span>
                        </div>
                        <h1 className="text-4xl font-black text-slate-800 dark:text-white mb-2">UNO Gramatical</h1>
                        <p className="text-sm text-slate-500 dark:text-zinc-400 mb-8 font-medium">Juego Universal de 112 Cartas</p>

                        <div className="space-y-4">
                            <button onClick={handleCreateRoom} className="w-full py-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2 border-b-[6px] border-indigo-700 uppercase tracking-widest"><Users size={24} /> Crear Sala</button>
                            <div className="flex items-center gap-2 py-2">
                                <div className="flex-1 h-px bg-slate-200 dark:bg-zinc-800"></div>
                                <span className="text-xs font-bold text-slate-400">O ÚNETE A UNA</span>
                                <div className="flex-1 h-px bg-slate-200 dark:bg-zinc-800"></div>
                            </div>
                            <div className="flex gap-2">
                                <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO" maxLength={4} className="flex-1 bg-slate-100 dark:bg-zinc-800 border-2 border-slate-200 dark:border-zinc-700 rounded-2xl px-4 py-3 text-center text-xl font-black dark:text-white uppercase outline-none focus:border-indigo-500"/>
                                <button onClick={() => setRoomId(joinInput)} disabled={joinInput.length < 4} className="bg-slate-800 text-white px-6 rounded-2xl font-black border-b-[6px] border-slate-900 disabled:opacity-50"><ArrowRight size={24}/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (roomData?.gameState === 'MENU') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-50 dark:bg-zinc-950 animate-fade-in relative">
                    <button onClick={() => { setRoomId(''); setRoomData(null); }} className="absolute top-4 left-4 p-2 bg-slate-200 dark:bg-zinc-800 rounded-full"><ArrowLeft size={20}/></button>
                    <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-zinc-800 max-w-lg w-full">
                        <div className="text-center mb-8">
                            <h2 className="text-xs font-bold text-slate-400 tracking-widest uppercase mb-2">Código de Sala</h2>
                            <div className="text-5xl font-black text-slate-800 dark:text-white tracking-[0.2em] bg-slate-100 dark:bg-zinc-800 py-4 rounded-2xl border border-slate-200 dark:border-zinc-700 mx-auto w-max px-10 shadow-inner">{roomId}</div>
                        </div>
                        <h3 className="font-black text-slate-800 dark:text-zinc-200 mb-4 text-center border-b border-slate-200 dark:border-zinc-800 pb-2 uppercase">Roles</h3>
                        <div className="grid grid-cols-2 gap-3 mb-8">
                            {[
                                { id: 's1', label: 'Maestro 1', color: 'bg-purple-500' }, { id: 's2', label: 'Maestro 2', color: 'bg-orange-500' },
                                { id: 'j1', label: 'Jugador 1', color: 'bg-blue-500' }, { id: 'j2', label: 'Jugador 2', color: 'bg-red-500' }
                            ].map(r => {
                                const occupant = roomData.players[r.id];
                                const isMe = occupant === user?.uid;
                                const isOccupied = occupant && !isMe;
                                return (
                                    <div key={r.id} className={`p-4 rounded-2xl border-2 flex flex-col items-center gap-2 transition-all ${isMe ? 'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-500' : isOccupied ? 'bg-slate-50 dark:bg-zinc-900/50 border-slate-200 dark:border-zinc-800 opacity-60' : 'bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700'}`}>
                                        <div className={`${r.color} p-2 rounded-full text-white`}><User size={16}/></div>
                                        <span className="font-bold text-xs text-slate-700 dark:text-zinc-200">{r.label}</span>
                                        <button onClick={() => toggleRole(r.id)} disabled={isOccupied} className={`text-[10px] px-3 py-1.5 rounded-lg font-black w-full uppercase transition-colors ${isMe ? 'bg-rose-500 text-white' : isOccupied ? 'bg-slate-200 dark:bg-zinc-800 text-slate-500' : 'bg-emerald-500 text-white'}`}>
                                            {isMe ? 'Dejar' : isOccupied ? 'Lleno' : 'Tomar'}
                                        </button>
                                    </div>
                                )
                            })}
                        </div>
                        <button onClick={startGame} disabled={!isS1} className={`w-full py-4 rounded-2xl font-black text-lg uppercase tracking-widest flex items-center justify-center gap-2 border-b-[6px] transition-all ${isS1 ? 'bg-sky-500 hover:bg-sky-400 text-white border-sky-700 active:scale-95' : 'bg-slate-200 dark:bg-zinc-800 text-slate-400 dark:text-zinc-600 border-slate-300 dark:border-zinc-900 cursor-not-allowed'}`}>
                            <Play size={24} fill="currentColor" /> {isS1 ? 'Iniciar Juego' : 'Esperando Maestro 1...'}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex-1 w-full flex flex-col relative h-[100dvh] overflow-hidden bg-zinc-950">
                    
                    {roomData.isPaused && (
                        <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-zinc-900 p-8 rounded-3xl w-full max-w-sm text-center border border-zinc-800">
                                <Pause size={48} className="text-slate-400 mx-auto mb-4"/>
                                <h2 className="text-3xl font-black mb-6 text-white">Pausa</h2>
                                <div className="space-y-3">
                                    <button onClick={() => updateGame({ isPaused: false })} className="w-full py-3 bg-indigo-500 text-white rounded-xl font-bold">Reanudar</button>
                                    {isS1 && <button onClick={startGame} className="w-full py-3 bg-yellow-500 text-zinc-900 rounded-xl font-bold">Reiniciar Partida</button>}
                                    <button onClick={() => updateGame({ gameState: 'MENU', isPaused: false })} className="w-full py-3 bg-rose-500 text-white rounded-xl font-bold">Salir al Lobby</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingWildCard && (
                        <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 animate-fade-in">
                            <h2 className="text-3xl font-black text-white mb-8 text-center drop-shadow-lg">Elige el Nuevo Artículo</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {['el', 'la', 'los', 'las'].map(art => (
                                    <button key={art} onClick={() => handleWildChoice(art)} className={`w-32 h-40 rounded-2xl ${ARTICLE_COLORS[art]} ${ARTICLE_TEXT[art]} font-black text-4xl uppercase shadow-2xl hover:scale-105 active:scale-95 transition-transform flex items-center justify-center border-4`}>
                                        {art}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-zinc-900 border-b border-zinc-800 p-3 flex justify-between items-center relative shrink-0">
                        <div className="text-xs font-bold text-zinc-500 flex items-center gap-2"><Users size={14}/> Sala: {roomId}</div>
                        <div className="text-yellow-400 font-black text-lg sm:text-xl tracking-widest uppercase">Turno J{roomData.turn}</div>
                        <button onClick={() => updateGame({ isPaused: true })} className="text-zinc-400 hover:text-white p-2 bg-zinc-800 rounded-full"><Pause size={14}/></button>
                    </div>

                    {isSelectorRole && roomData.gameState === 'PLAYING' && (
                        <div className="bg-zinc-800 p-2 flex justify-center gap-4 shrink-0 shadow-inner">
                            <div className="flex gap-2 p-1 bg-zinc-900 rounded-xl border border-zinc-700">
                                {['el', 'la', 'los', 'las'].map((art) => (
                                    <div key={art} className={`w-10 h-10 rounded-lg font-black text-xs uppercase flex items-center justify-center transition-all ${roomData.currentArticle === art || flashArticle === art ? ARTICLE_COLORS[art] + ' text-white scale-110 shadow-lg' : ARTICLE_COLORS[art] + ' opacity-30 grayscale'}`}>{art}</div>
                                ))}
                            </div>
                            {!roomData.currentArticle && !roomData.isRandomizing ? (
                                <button onClick={handleRandomize} className="px-6 py-2 bg-indigo-500 rounded-xl font-black text-white shadow-lg animate-bounce text-sm">GIRAR</button>
                            ) : <span className="text-zinc-500 text-xs font-bold self-center">Esperando jugada...</span>}
                        </div>
                    )}

                    <div className="flex-1 bg-emerald-800 relative flex items-center justify-center overflow-hidden border-y-4 border-emerald-950">
                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle, #fff 10%, transparent 11%)', backgroundSize: '20px 20px' }}></div>
                        <div className="text-emerald-900/30 font-black text-[150px] sm:text-[200px] rotate-[-15deg] select-none absolute">UNO</div>
                        
                        <div className="relative z-10 flex flex-col items-center">
                            <div className="absolute -top-12 transition-all duration-300">
                                {localFeedback.visible && (
                                    <div className={`px-4 py-1.5 rounded-full font-bold text-white shadow-lg flex items-center gap-2 text-xs uppercase tracking-widest ${localFeedback.type === 'success' ? 'bg-green-500' : localFeedback.type === 'alert' ? 'bg-blue-500 animate-pulse' : 'bg-slate-800'}`}>
                                        {localFeedback.text}
                                    </div>
                                )}
                            </div>

                            <div className="w-32 h-44 sm:w-40 sm:h-56">
                                {roomData.tableCard ? (
                                    <div className={`w-full h-full rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 transform rotate-[2deg] animate-pop-in ${ARTICLE_COLORS[roomData.tableCard.article]} bg-white p-2`}>
                                        <div className={`text-lg sm:text-xl font-black mb-1 uppercase ${ARTICLE_TEXT[roomData.tableCard.article]}`}>{roomData.tableCard.article}</div>
                                        <div className="bg-white flex-1 w-full rounded-xl flex items-center justify-center shadow-inner p-2">
                                            <span className={`text-lg sm:text-2xl font-black text-slate-800 text-center leading-tight break-words ${roomData.tableCard.type !== 'word' ? 'text-4xl' : ''}`}>{roomData.tableCard.word}</span>
                                        </div>
                                    </div>
                                ) : roomData.currentArticle ? (
                                    <div className={`w-full h-full rounded-2xl flex items-center justify-center border-4 border-white/20 animate-pulse ${ARTICLE_COLORS[roomData.currentArticle]}`}>
                                        <span className={`text-5xl font-black uppercase ${ARTICLE_TEXT[roomData.currentArticle]}`}>{roomData.currentArticle}</span>
                                    </div>
                                ) : (
                                    <div className="w-full h-full rounded-2xl border-4 border-dashed border-emerald-600/50 flex items-center justify-center text-emerald-600 font-bold text-sm">ESPERANDO COLOR</div>
                                )}
                            </div>
                        </div>

                        <div className="absolute right-4 sm:right-12 top-1/2 -translate-y-1/2">
                            <div className="relative w-20 h-28 bg-slate-900 rounded-xl border-2 border-slate-700 shadow-xl flex items-center justify-center rotate-[10deg]">
                                <span className="font-black text-slate-600 text-xs rotate-[-90deg]">UNO</span>
                                {roomData.deck.length > 2 && <div className="absolute inset-0 bg-slate-900 rounded-xl border-2 border-slate-700 transform -translate-x-1 -translate-y-1 -z-10"></div>}
                            </div>
                        </div>
                    </div>

                    <div className="h-60 sm:h-72 flex bg-zinc-900 border-t border-zinc-800 relative shrink-0">
                        <div className="absolute left-1/2 top-0 bottom-0 w-1 bg-black z-20"></div>
                        <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20 bg-zinc-800 rounded-full p-2 border border-zinc-700 shadow-lg"><RefreshCw size={20} className="text-zinc-500"/></div>
                        
                        <div className={`flex-1 flex flex-col p-2 relative ${roomData.turn !== 1 ? 'opacity-50 grayscale pointer-events-none' : 'ring-inset ring-2 ring-emerald-500'}`}>
                            <div className="flex justify-between items-center bg-zinc-950 p-2 rounded-lg mb-2 shrink-0">
                                <div className="flex items-center gap-2"><div className="bg-blue-500 p-1 rounded-full text-white"><User size={12}/></div><span className="text-xs font-bold text-white">J1 {isJ1 ? '(Tú)' : ''}</span></div>
                                <button onClick={() => handleDrawCard(1)} disabled={!isJ1 || !roomData.currentArticle} className="text-[10px] bg-zinc-800 text-white px-2 py-1 rounded font-bold hover:bg-zinc-700 uppercase">+ Robar</button>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-wrap content-start justify-center gap-2">
                                {roomData.player1Hand?.map((c, i) => renderCard(c, i, 1, isJ1))}
                            </div>
                        </div>

                        <div className={`flex-1 flex flex-col p-2 relative ${roomData.turn !== 2 ? 'opacity-50 grayscale pointer-events-none' : 'ring-inset ring-2 ring-emerald-500'}`}>
                            <div className="flex justify-between items-center bg-zinc-950 p-2 rounded-lg mb-2 shrink-0">
                                <button onClick={() => handleDrawCard(2)} disabled={!isJ2 || !roomData.currentArticle} className="text-[10px] bg-zinc-800 text-white px-2 py-1 rounded font-bold hover:bg-zinc-700 uppercase">+ Robar</button>
                                <div className="flex items-center gap-2"><span className="text-xs font-bold text-white">J2 {isJ2 ? '(Tú)' : ''}</span><div className="bg-red-500 p-1 rounded-full text-white"><User size={12}/></div></div>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-wrap content-start justify-center gap-2" dir="rtl">
                                <div className="flex flex-wrap content-start justify-center gap-2" dir="ltr">
                                    {roomData.player2Hand?.map((c, i) => renderCard(c, i, 2, isJ2))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {roomData.penaltyData && (
                        <div className="absolute inset-0 z-50 bg-black/90 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-zinc-900 p-6 sm:p-8 rounded-3xl border-4 border-rose-500 max-w-sm w-full text-center shadow-2xl">
                                <div className="bg-rose-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><AlertTriangle className="text-rose-500" size={32}/></div>
                                <h2 className="text-2xl font-black text-white mb-4 uppercase">¡Incorrecto Jugador {roomData.penaltyData.player}!</h2>
                                <div className="bg-zinc-800 p-4 rounded-xl mb-6 border border-zinc-700 text-left">
                                    <p className="text-emerald-400 font-bold mb-2 flex items-center gap-2"><BookOpen size={16}/> Regla Gramatical:</p>
                                    <p className="text-zinc-300 text-sm leading-relaxed">{roomData.penaltyData.explanation}</p>
                                </div>
                                <button onClick={closePenaltyModal} className="w-full py-4 bg-rose-500 text-white rounded-xl font-black uppercase shadow-lg active:scale-95">Aceptar y Pasar Turno</button>
                            </div>
                        </div>
                    )}

                    {roomData.gameState === 'GAME_OVER' && (
                        <div className="absolute inset-0 z-50 bg-black/95 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-zinc-900 p-8 rounded-3xl border-4 border-yellow-500 text-center max-w-sm w-full shadow-2xl">
                                <div className="text-7xl mb-4 animate-bounce">🏆</div>
                                <h2 className="text-4xl font-black text-white mb-2 uppercase">¡UNO!</h2>
                                <p className="text-xl text-zinc-300 mb-8">El ganador es: <br/><span className="text-yellow-400 font-black text-3xl mt-2 block">{roomData.winner}</span></p>
                                {isS1 ? (
                                    <button onClick={startGame} className="w-full py-4 bg-yellow-500 text-zinc-900 rounded-xl font-black uppercase flex justify-center gap-2 active:scale-95"><RotateCcw/> Jugar Otra Vez</button>
                                ) : <p className="text-zinc-500 font-bold bg-zinc-800 p-3 rounded-lg">Esperando al Maestro 1 para reiniciar...</p>}
                                <button onClick={() => updateGame({ gameState: 'MENU' })} className="w-full mt-4 text-zinc-500 font-bold hover:text-white uppercase tracking-widest text-xs">Volver al Lobby</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<UnoGame />);
    </script>
</body>
</html>

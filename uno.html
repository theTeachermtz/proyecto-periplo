<body class="bg-slate-900 text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from 'firebase/firestore';
        
        import { User, Play, RotateCcw, AlertTriangle, CheckCircle, Zap, BookOpen, Pause, Users, ArrowRight, Home, Dices, Link as LinkIcon, Loader2, ArrowLeft, Eye, EyeOff } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const appId = 'periplo-app-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Mapeo de IDs (0 a 3) a colores del UNO
        const CAT_COLORS = { 0: 'bg-blue-500 border-blue-600', 1: 'bg-red-500 border-red-600', 2: 'bg-yellow-400 border-yellow-500', 3: 'bg-green-500 border-green-600', 'any': 'bg-slate-800 border-slate-600' };
        const CAT_TEXT = { 0: 'text-white', 1: 'text-white', 2: 'text-slate-900', 3: 'text-white', 'any': 'text-white' };

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const build112Deck = (categoriesData) => {
            const deck = [];
            
            // Construir 76 palabras (19 por categoría)
            categoriesData.forEach(cat => {
                const shuffledWords = shuffleArray([...cat.words]);
                const wordsToTake = shuffledWords.slice(0, 19);
                
                // Rellenar si la IA dio menos de 19
                while (wordsToTake.length < 19 && wordsToTake.length > 0) {
                    wordsToTake.push(wordsToTake[wordsToTake.length - 1]);
                }

                wordsToTake.forEach(w => {
                    deck.push({ type: 'word', word: w, categoryId: cat.id, categoryName: cat.name });
                });
            });

            // Construir 24 Cartas de Acción
            categoriesData.forEach(cat => {
                for(let i=0; i<2; i++) {
                    deck.push({ word: '+2', categoryId: cat.id, categoryName: cat.name, type: 'action', action: 'draw2', desc: 'Roba 2' });
                    deck.push({ word: 'Reversa', categoryId: cat.id, categoryName: cat.name, type: 'action', action: 'reverse', desc: 'Cambia sentido' });
                    deck.push({ word: 'Salto', categoryId: cat.id, categoryName: cat.name, type: 'action', action: 'skip', desc: 'Pierde turno' });
                }
            });

            // Construir 12 Comodines
            for(let i=0; i<4; i++) {
                deck.push({ word: 'Comodín', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'wild', desc: 'Elige categoría' });
                deck.push({ word: '+4 Wild', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'wild4', desc: '+4 al rival' });
                deck.push({ word: 'Swap', categoryId: 'any', categoryName: 'Comodín', type: 'wild', action: 'swap', desc: 'Intercambia tu mano' });
            }

            return shuffleArray(deck);
        };

        const getNextTurn = (currentTurn, activePlayers, direction = 1, steps = 1) => {
            let idx = activePlayers.indexOf(currentTurn);
            if (idx === -1) return activePlayers[0];
            let nextIdx = (idx + (direction * steps)) % activePlayers.length;
            if (nextIdx < 0) nextIdx += activePlayers.length;
            return activePlayers[nextIdx];
        };

        const UnoGame = () => {
            const [user, setUser] = useState(null);
            const [deckId, setDeckId] = useState(''); 
            const [roomId, setRoomId] = useState('');
            const [roomData, setRoomData] = useState(null);
            const [joinInput, setJoinInput] = useState('');
            
            const [localFeedback, setLocalFeedback] = useState({ text: '', type: '', visible: false });
            const [localError, setLocalError] = useState('');
            const [flashCategory, setFlashCategory] = useState(null);

            const [isStudentMode, setIsStudentMode] = useState(false);
            const [studentName, setStudentName] = useState('');
            const [pendingWildCard, setPendingWildCard] = useState(null);
            const [pendingSwapCard, setPendingSwapCard] = useState(null);
            const [showMaestroView, setShowMaestroView] = useState(true);

            // Evitar congelamientos Chrome Mobile
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && roomId) {
                        getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId)).then(snap => {
                            if (snap.exists()) setRoomData(snap.data());
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, [roomId]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const idFromUrl = params.get('id'); 
                if (idFromUrl) setDeckId(idFromUrl);

                if (params.get('mode') === 'student') {
                    setIsStudentMode(true);
                    setStudentName(localStorage.getItem('periplo_student_name') || '');
                }
                const urlCode = params.get('code');
                if (urlCode) setJoinInput(urlCode.toUpperCase());

                signInAnonymously(auth).catch(e => console.error(e));
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!roomId || !user) { setRoomData(null); return; }
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                const unsubscribe = onSnapshot(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        setRoomData(snapshot.data());
                    } else {
                        setRoomData(null);
                        setLocalError("La sala fue cerrada o no existe.");
                        setRoomId('');
                    }
                });
                return () => unsubscribe();
            }, [user, roomId]);

            useEffect(() => {
                if (roomData?.feedbackMessage?.ts) {
                    setLocalFeedback({ ...roomData.feedbackMessage, visible: true });
                    const t = setTimeout(() => setLocalFeedback(prev => ({ ...prev, visible: false })), 2500);
                    return () => clearTimeout(t);
                }
            }, [roomData?.feedbackMessage?.ts]);

            useEffect(() => {
                let interval;
                if (roomData?.isRandomizing) {
                    let i = 0;
                    interval = setInterval(() => { setFlashCategory(i % 4); i++; }, 100);
                } else {
                    setFlashCategory(null);
                }
                return () => clearInterval(interval);
            }, [roomData?.isRandomizing]);

            const updateGame = async (updates) => {
                if (!roomId || !user) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                    await updateDoc(roomRef, updates);
                } catch (e) { console.error(e); }
            };

            const handleCreateRoom = async () => {
                let currentUser = user;
                if (!currentUser || !deckId) return;
                
                try {
                    const deckSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId));
                    if (!deckSnap.exists()) { alert("No se encontró el mazo. Regresa al dashboard."); return; }
                    
                    const customCategories = deckSnap.data().content.categories;

                    const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                    await setDoc(roomRef, {
                        roomId: code,
                        categories: customCategories, 
                        gameState: 'MENU',
                        players: { s1: currentUser.uid, s2: null, j1: null, j2: null, j3: null, j4: null },
                        playerNames: { [currentUser.uid]: 'Mtro Creador' }, 
                        deck: [], player1Hand: [], player2Hand: [], player3Hand: [], player4Hand: [],
                        currentCategoryId: null, tableCard: null, 
                        turn: 1, direction: 1, activeUnoPenalty: null, unoCalled: {},
                        isRandomizing: false, winner: null, penaltyData: null,
                        isPaused: false, feedbackMessage: null
                    });
                    setRoomId(code);
                    setLocalError('');
                } catch (e) { setLocalError("Hubo un error al crear la sala."); }
            };

            const handleJoinRoom = () => {
                if (!user || !joinInput) return;
                if (isStudentMode && !studentName.trim()) {
                    setLocalError("Por favor, ingresa tu nombre.");
                    return;
                }
                if (isStudentMode) localStorage.setItem('periplo_student_name', studentName);
                setLocalError('');
                setRoomId(joinInput.trim().toUpperCase());
            };

            const handleLeaveRoom = async () => {
                if (roomData && user && roomId) {
                    const newPlayers = { ...roomData.players };
                    let changed = false;
                    Object.keys(newPlayers).forEach(k => {
                        if (newPlayers[k] === user.uid) { newPlayers[k] = null; changed = true; }
                    });
                    if (changed) {
                        try {
                            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                            await updateDoc(roomRef, { players: newPlayers });
                        } catch(e) {}
                    }
                }
                setRoomId('');
                setRoomData(null);
                setJoinInput('');
                setLocalError('');
            };

            const toggleRole = async (roleId) => {
                if (!roomData || !user) return;
                const newPlayers = { ...roomData.players };
                const newNames = { ...(roomData.playerNames || {}) };
                
                if (newPlayers[roleId] === user.uid) {
                    newPlayers[roleId] = null; 
                } else {
                    newPlayers[roleId] = user.uid; 
                    newNames[user.uid] = isStudentMode ? studentName : (roleId.startsWith('s') ? 'Maestro' : 'Jugador M');
                }
                await updateGame({ players: newPlayers, playerNames: newNames });
            };

            const copyStudentLink = () => {
                const link = `${window.location.origin}${window.location.pathname}?mode=student&code=${roomId}`;
                navigator.clipboard.writeText(link);
                setLocalFeedback({ text: '¡Link Copiado!', type: 'success', visible: true, ts: Date.now() });
            };

            const handleEndGame = async () => {
                if (!roomData) return;
                await updateGame({ gameState: 'MENU', isPaused: false, feedbackMessage: null });
            };

            const startGame = async () => {
                if (!roomData) return;
                const gameDeck = build112Deck(roomData.categories);
                
                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                if(activePlayers.length === 0) {
                    alert("Al menos un jugador (j1, j2, j3, j4) debe estar en la mesa para empezar.");
                    return;
                }

                let updates = {
                    gameState: 'PLAYING',
                    player1Hand: [], player2Hand: [], player3Hand: [], player4Hand: [],
                    currentCategoryId: null, tableCard: null, isRandomizing: false,
                    direction: 1, activeUnoPenalty: null, unoCalled: {1: false, 2: false, 3: false, 4: false},
                    winner: null, penaltyData: null, isPaused: false
                };

                activePlayers.forEach(num => {
                    updates[`player${num}Hand`] = gameDeck.splice(0, 7);
                });

                updates.deck = gameDeck;
                updates.turn = activePlayers[0];
                updates.feedbackMessage = { text: '¡El juego comienza! Gira la ruleta para empezar.', type: 'info', ts: Date.now() };

                await updateGame(updates);
            };

            const isS1 = roomData?.players?.s1 === user?.uid;
            const isS2 = roomData?.players?.s2 === user?.uid;
            const isSelectorRole = isS1 || isS2;
            
            const myPlayerKey = roomData ? Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid) : null;
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j', '')) : null;
            const isMyTurn = myPlayerNum === roomData?.turn;

            const handleRandomize = async () => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (!isSelectorRole && !isMyTurn) return;

                const picked = Math.floor(Math.random() * 4); // Elije ID 0 a 3
                await updateGame({ isRandomizing: true, currentCategoryId: null });
                setTimeout(async () => {
                    await updateGame({ isRandomizing: false, currentCategoryId: picked, feedbackMessage: { text: `¡Busca: ${roomData.categories[picked].name.toUpperCase()}!`, type: 'alert', ts: Date.now() }});
                }, 2000);
            };

            const handleCallUno = async () => {
                if (!myPlayerNum) return;
                const myName = roomData.playerNames[user.uid] || 'Alguien';
                await updateGame({
                    [`unoCalled.${myPlayerNum}`]: true,
                    feedbackMessage: { text: `¡${myName} gritó UNO!`, type: 'alert', ts: Date.now() }
                });
            };

            const validatePlay = (playedCard) => {
                if (roomData.activeUnoPenalty) {
                    if (roomData.activeUnoPenalty.type === 'draw2' && playedCard.action === 'draw2') return true;
                    if (roomData.activeUnoPenalty.type === 'draw4' && playedCard.action === 'wild4') return true;
                    return false; 
                }
                if (playedCard.type === 'wild') return true;
                if (playedCard.categoryId === roomData.currentCategoryId) return true;
                if (playedCard.type === 'action' && roomData.tableCard && roomData.tableCard.action === playedCard.action) return true;
                return false;
            };

            const handlePlayCard = async (playerNum, cardIndex) => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum || myPlayerNum !== playerNum) return;

                const hand = roomData[`player${playerNum}Hand`];
                const playedCard = hand[cardIndex];
                if (!playedCard) return;

                let isCorrectUno = false;
                let errorMsg = "";

                if (roomData.activeUnoPenalty) {
                    if ((roomData.activeUnoPenalty.type === 'draw2' && playedCard.action === 'draw2') || 
                        (roomData.activeUnoPenalty.type === 'draw4' && playedCard.action === 'wild4')) {
                        isCorrectUno = true;
                    } else {
                        isCorrectUno = false;
                        errorMsg = `¡Tienes un castigo activo de +${roomData.activeUnoPenalty.amount}! Debes defenderte con una carta igual (+2 o +4) o comer las cartas.`;
                    }
                } else {
                    if (roomData.currentCategoryId === null && playedCard.type !== 'wild') {
                        alert("¡Debes girar la ruleta primero!");
                        return;
                    }
                    
                    if (playedCard.type === 'wild') {
                        isCorrectUno = true;
                    } else if (playedCard.categoryId === roomData.currentCategoryId) {
                        isCorrectUno = true;
                    } else if (playedCard.type === 'action' && roomData.tableCard && roomData.tableCard.action === playedCard.action) {
                        isCorrectUno = true;
                    } else {
                        isCorrectUno = false;
                        const reqCatName = roomData.categories[roomData.currentCategoryId]?.name || "N/A";
                        errorMsg = `Esa carta no pertenece a la categoría '${reqCatName}'. Tampoco coincide la acción de la mesa.`;
                    }
                }
                
                if (isCorrectUno) {
                    if (playedCard.action === 'swap') {
                        setPendingSwapCard({ playerNum, cardIndex, card: playedCard });
                    } else if (playedCard.type === 'wild') {
                        setPendingWildCard({ playerNum, cardIndex, card: playedCard });
                    } else {
                        executeCardPlay(playerNum, cardIndex, playedCard, playedCard.categoryId !== 'any' ? playedCard.categoryId : roomData.currentCategoryId);
                    }
                } else {
                    await updateGame({
                        penaltyData: {
                            player: playerNum, playedWord: playedCard.word, 
                            correctCategoryDisplay: playedCard.categoryName, 
                            wrongCategoryDisplay: roomData.categories[roomData.currentCategoryId]?.name || 'N/A', 
                            explanation: errorMsg
                        }
                    });
                }
            };

            const executeCardPlay = async (playerNum, cardIndex, card, newCatId) => {
                const hand = [...roomData[`player${playerNum}Hand`]];
                hand.splice(cardIndex, 1); 
                
                let updates = {
                    [`player${playerNum}Hand`]: hand,
                    tableCard: { ...card, categoryId: newCatId, categoryName: roomData.categories[newCatId]?.name || 'Comodín' },
                    feedbackMessage: { text: `¡Bien jugado!`, type: 'success', ts: Date.now() }
                };

                // Regla Híbrida
                if (card.type === 'action' || card.type === 'wild') updates.currentCategoryId = newCatId; 
                else updates.currentCategoryId = null; 

                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurnSteps = 1;
                let nextDirection = roomData.direction ?? 1;
                let newPenalty = roomData.activeUnoPenalty ? { ...roomData.activeUnoPenalty } : null;

                if (card.type === 'action') {
                    if (card.action === 'skip') {
                        nextTurnSteps = 2;
                        updates.feedbackMessage.text = "¡Pierde Turno!";
                    } else if (card.action === 'reverse') {
                        if (activePlayers.length <= 2) nextTurnSteps = 2; else nextDirection *= -1;
                        updates.direction = nextDirection;
                        updates.feedbackMessage.text = "¡Cambio de Sentido!";
                    } else if (card.action === 'draw2') {
                        newPenalty = { type: 'draw2', amount: (newPenalty?.amount || 0) + 2 };
                        updates.activeUnoPenalty = newPenalty;
                        updates.feedbackMessage.text = `¡+${newPenalty.amount} Acumulado!`;
                    }
                } else if (card.type === 'wild') {
                    if (card.action === 'wild4') {
                        newPenalty = { type: 'draw4', amount: (newPenalty?.amount || 0) + 4 };
                        updates.activeUnoPenalty = newPenalty;
                        updates.feedbackMessage.text = `¡+${newPenalty.amount} Acumulado!`;
                    }
                }

                let nextTurn = getNextTurn(playerNum, activePlayers, nextDirection, nextTurnSteps);

                if (hand.length === 0 && card.action !== 'swap') {
                    if (roomData.unoCalled && roomData.unoCalled[playerNum]) {
                        updates.winner = roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`;
                    } else {
                        updates.winner = `❌ ${roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`} olvidó gritar UNO`;
                    }
                    updates.gameState = 'GAME_OVER';
                } else if (card.action === 'swap') {
                    const targetHand = roomData[`player${nextTurn}Hand`];
                    updates[`player${playerNum}Hand`] = targetHand;
                    updates[`player${nextTurn}Hand`] = hand;
                    updates[`unoCalled.${playerNum}`] = false;
                    updates[`unoCalled.${nextTurn}`] = false;
                    updates.feedbackMessage.text = "¡Manos Intercambiadas!";
                }

                updates.turn = nextTurn;
                await updateGame(updates);
                setPendingWildCard(null); 
            };

            const handleWildChoice = (chosenCatId) => {
                executeCardPlay(pendingWildCard.playerNum, pendingWildCard.cardIndex, pendingWildCard.card, chosenCatId);
            };

            const handleSwapChoice = async (targetOpponent) => {
                const { playerNum, cardIndex, card } = pendingSwapCard;
                const hand = [...roomData[`player${playerNum}Hand`]];
                hand.splice(cardIndex, 1);
                
                let updates = {
                    tableCard: { ...card, categoryId: roomData.currentCategoryId },
                    currentCategoryId: roomData.currentCategoryId, 
                    feedbackMessage: { text: `¡Intercambio de manos!`, type: 'success', ts: Date.now() }
                };

                const targetHand = roomData[`player${targetOpponent}Hand`];
                updates[`player${playerNum}Hand`] = targetHand;
                updates[`player${targetOpponent}Hand`] = hand;
                updates[`unoCalled.${playerNum}`] = false;
                updates[`unoCalled.${targetOpponent}`] = false;

                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurn = getNextTurn(playerNum, activePlayers, roomData.direction ?? 1, 1);
                
                if (hand.length === 0) {
                    if (roomData.unoCalled && roomData.unoCalled[playerNum]) {
                        updates.winner = roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`;
                    } else {
                        updates.winner = `❌ ${roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`} olvidó gritar UNO`;
                    }
                    updates.gameState = 'GAME_OVER';
                }

                updates.turn = nextTurn;
                await updateGame(updates);
                setPendingSwapCard(null);
            };

            const handleDrawCard = async (playerNum) => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum || myPlayerNum !== playerNum) return;

                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurn = getNextTurn(playerNum, activePlayers, roomData.direction ?? 1, 1);
                let updates = { [`unoCalled.${playerNum}`]: false }; 

                if (roomData.activeUnoPenalty) {
                    const amount = roomData.activeUnoPenalty.amount;
                    const drawnCards = roomData.deck.slice(0, amount);
                    updates.deck = roomData.deck.slice(amount);
                    updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], ...drawnCards];
                    updates.turn = nextTurn;
                    updates.activeUnoPenalty = null;
                    updates.currentCategoryId = roomData.currentCategoryId; 
                    updates.feedbackMessage = { text: `Comió ${amount} cartas`, type: 'error', ts: Date.now() };
                } else {
                    const drawnCard = roomData.deck[0];
                    updates.deck = roomData.deck.slice(1);
                    updates[`player${playerNum}Hand`] = [...roomData[`player${playerNum}Hand`], drawnCard];
                    updates.turn = nextTurn;
                    
                    if (roomData.tableCard && (roomData.tableCard.type === 'action' || roomData.tableCard.type === 'wild')) {
                        updates.currentCategoryId = roomData.currentCategoryId;
                    } else {
                        updates.currentCategoryId = null;
                    }
                }
                await updateGame(updates);
            };

            const closePenaltyModal = async () => {
                let updates = { penaltyData: null };
                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                let nextTurn = getNextTurn(roomData.turn, activePlayers, roomData.direction ?? 1, 1);
                const playerNum = roomData.penaltyData.player;
                const hand = roomData[`player${playerNum}Hand`];
                let deck = [...roomData.deck];

                if (roomData.activeUnoPenalty) {
                    const amount = roomData.activeUnoPenalty.amount;
                    const drawnCards = deck.splice(0, amount);
                    updates.deck = deck;
                    updates[`player${playerNum}Hand`] = [...hand, ...drawnCards];
                    updates.activeUnoPenalty = null;
                    updates.currentCategoryId = roomData.currentCategoryId; 
                } else {
                    const drawnCards = deck.splice(0, 1);
                    updates.deck = deck;
                    updates[`player${playerNum}Hand`] = [...hand, ...drawnCards];
                    if (roomData.tableCard && (roomData.tableCard.type === 'action' || roomData.tableCard.type === 'wild')) {
                        updates.currentCategoryId = roomData.currentCategoryId;
                    } else {
                        updates.currentCategoryId = null;
                    }
                }
                
                updates[`unoCalled.${playerNum}`] = false;
                updates.turn = nextTurn;
                await updateGame(updates);
            };

            // --- VISTAS ---
            
            if (!roomId && !deckId) return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-slate-900">
                    <button onClick={() => window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition text-white"><ArrowLeft size={20}/></button>
                    
                    {/* UI de unirse directamente aunque no haya mazo cargado para el maestro */}
                    <div className="bg-slate-800 p-8 md:p-12 rounded-2xl shadow-2xl border border-slate-700 max-w-lg w-full text-center relative">
                        <div className="flex justify-center gap-2 mb-6">
                            <span className="bg-blue-500 w-10 h-14 rounded shadow-lg transform -rotate-12 border border-white"></span>
                            <span className="bg-red-500 w-10 h-14 rounded shadow-lg transform -rotate-6 border border-white"></span>
                            <span className="bg-yellow-400 w-10 h-14 rounded shadow-lg transform rotate-6 border border-white"></span>
                            <span className="bg-green-500 w-10 h-14 rounded shadow-lg transform rotate-12 border border-white"></span>
                        </div>
                        <h1 className="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500 tracking-tight leading-tight">
                            UNO CUSTOM
                        </h1>
                        <p className="text-slate-400 mb-8 font-medium">{isStudentMode ? 'Modo Alumno' : 'Modo Multijugador'}</p>

                        {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}

                        <div className="space-y-6">
                            {!isStudentMode && (
                                <div className="bg-amber-500/20 border border-amber-500 text-amber-200 p-4 rounded-xl text-xs font-bold text-left shadow-inner">
                                    <AlertTriangle size={16} className="inline mb-1 mr-1"/> Para <span className="text-white">CREAR</span> una sala, debes abrir un mazo desde tu Bóveda Periplo. (Aún puedes unirte a una sala existente abajo).
                                </div>
                            )}

                            {!isStudentMode && (
                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-600"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-500 text-sm font-bold">O ÚNETE A UNA</span>
                                    <div className="flex-grow border-t border-slate-600"></div>
                                </div>
                            )}

                            {isStudentMode && (
                                <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="TU NOMBRE" className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-blue-500 mb-2"/>
                            )}

                            <div className="flex gap-2">
                                <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO DE SALA" maxLength={4} className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500"/>
                                <button onClick={handleJoinRoom} disabled={joinInput.length < 4} className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-6 rounded-xl font-bold transition flex items-center justify-center">
                                    <ArrowRight size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (!roomId && deckId) return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 h-full">
                    <div className="bg-slate-800 p-8 md:p-12 rounded-2xl shadow-2xl border border-slate-700 max-w-lg w-full text-center relative mt-6">
                        {!isStudentMode && (
                            <button onClick={() => window.location.href='index.html'} className="absolute top-4 left-4 p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition"><ArrowLeft size={20}/></button>
                        )}
                        <div className="flex justify-center gap-2 mb-6">
                            <span className="bg-blue-500 w-10 h-14 rounded shadow-lg transform -rotate-12 border border-white"></span>
                            <span className="bg-red-500 w-10 h-14 rounded shadow-lg transform -rotate-6 border border-white"></span>
                            <span className="bg-yellow-400 w-10 h-14 rounded shadow-lg transform rotate-6 border border-white"></span>
                            <span className="bg-green-500 w-10 h-14 rounded shadow-lg transform rotate-12 border border-white"></span>
                        </div>
                        <h1 className="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500 tracking-tight leading-tight">
                            UNO CUSTOM
                        </h1>
                        <p className="text-slate-400 mb-8 font-medium">{isStudentMode ? 'Modo Alumno' : 'Mazo Cargado desde la Bóveda'}</p>

                        {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}

                        <div className="space-y-6">
                            {!isStudentMode && (
                                <button onClick={handleCreateRoom} className="w-full py-4 bg-indigo-500 hover:bg-indigo-400 text-white rounded-xl font-bold shadow-lg transition active:scale-95 border-b-[4px] border-indigo-700 flex justify-center items-center gap-2 text-lg">
                                    <Users size={24} /> Crear Sala con este Mazo
                                </button>
                            )}

                            {!isStudentMode && (
                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-600"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-500 text-sm font-bold">O ÚNETE A UNA</span>
                                    <div className="flex-grow border-t border-slate-600"></div>
                                </div>
                            )}

                            {isStudentMode && (
                                <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="TU NOMBRE" className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-blue-500 mb-2"/>
                            )}

                            <div className="flex gap-2">
                                <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO DE SALA" maxLength={4} className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500"/>
                                <button onClick={handleJoinRoom} disabled={joinInput.length < 4} className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-6 rounded-xl font-bold transition flex items-center justify-center">
                                    <ArrowRight size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (roomId && !roomData) return (
                <div className="flex-1 flex flex-col items-center justify-center gap-4 animate-fade-in w-full h-full">
                    <Loader2 size={48} className="animate-spin text-blue-500" />
                    <p className="font-bold tracking-widest uppercase text-slate-400">Conectando a la sala...</p>
                </div>
            );

            if (roomData.gameState === 'MENU') {
                let activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                const canStart = isS1 && activePlayers.length >= 1; 

                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative w-full h-full overflow-y-auto">
                        <div className={`fixed top-4 z-50 transition-all duration-300 ${localFeedback.visible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                            <div className="px-6 py-2 rounded-full font-bold text-white shadow-lg bg-green-500 flex gap-2 items-center"><LinkIcon size={16}/> {localFeedback.text}</div>
                        </div>

                        <div className="bg-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl border border-slate-700 max-w-lg w-full relative mt-16 md:mt-0 mb-8">
                            <button onClick={handleLeaveRoom} className="absolute top-4 left-4 text-slate-400 hover:text-white flex items-center gap-1 text-xs font-bold transition bg-slate-900/50 px-3 py-1.5 rounded-full">
                                <ArrowRight className="rotate-180" size={14} /> Salir
                            </button>

                            <div className="text-center mb-6 mt-6">
                                <div className="text-xs text-indigo-400 font-bold mb-2 uppercase flex justify-center gap-1 items-center"><Dices size={14}/> Mazo Custom Activado</div>
                                <h2 className="text-sm font-bold text-slate-400 tracking-widest uppercase mb-1">Código de Sala</h2>
                                <div className="text-5xl font-black text-white tracking-[0.2em] bg-slate-900 py-3 rounded-xl border border-slate-700 mx-auto w-max px-8 shadow-inner">{roomId}</div>
                                {!isStudentMode && (
                                    <button onClick={copyStudentLink} className="mt-4 px-6 py-2 bg-slate-700 hover:bg-slate-600 text-blue-400 rounded-full font-bold text-sm flex items-center justify-center mx-auto gap-2 transition-colors">
                                        <LinkIcon size={16}/> Copiar Link de Alumnos
                                    </button>
                                )}
                            </div>

                            <div className="mb-6 bg-slate-900 p-4 rounded-2xl border border-slate-700">
                                <h4 className="text-slate-400 font-bold mb-3 uppercase tracking-widest text-[10px] text-center">Maestros / Selectores</h4>
                                <div className="flex flex-col gap-2">
                                    {isS1 ? (
                                        <div className="bg-purple-500/20 border border-purple-500 text-purple-200 p-3 rounded-xl flex items-center justify-between shadow-inner">
                                            <span className="font-bold flex items-center gap-2 text-sm"><User size={16}/> Tú eres Selector Principal</span>
                                            <CheckCircle size={16} className="text-purple-400"/>
                                        </div>
                                    ) : roomData.players.s1 ? (
                                        <div className="bg-slate-800 p-3 rounded-xl text-slate-400 flex items-center gap-2 text-sm border border-slate-700">
                                            <User size={16}/> {roomData.playerNames[roomData.players.s1]} es Selector 1
                                        </div>
                                    ) : null}

                                    {isS2 ? (
                                        <button onClick={() => toggleRole('s2')} className="bg-orange-500/20 border border-orange-500 text-orange-200 hover:bg-orange-500/40 font-bold p-3 rounded-xl transition flex items-center justify-between text-sm shadow-inner w-full text-left">
                                            <span className="flex items-center gap-2"><User size={16}/> Tú eres Selector 2</span>
                                            <span className="text-xs text-orange-400">Dejar Rol</span>
                                        </button>
                                    ) : !roomData.players.s2 ? (
                                        <button onClick={() => toggleRole('s2')} className="bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold p-3 rounded-xl transition border border-slate-600 border-dashed text-sm flex items-center justify-center gap-2 w-full">
                                            Entrar como 2do Maestro
                                        </button>
                                    ) : (
                                        <div className="bg-slate-800 p-3 rounded-xl text-slate-400 flex items-center gap-2 text-sm border border-slate-700">
                                            <User size={16}/> {roomData.playerNames[roomData.players.s2]} es Selector 2
                                        </div>
                                    )}
                                </div>
                            </div>

                            <h4 className="text-slate-400 font-bold mb-3 uppercase tracking-widest text-[10px] text-center">Lugares en la Mesa</h4>
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                {[1, 2, 3, 4].map(num => {
                                    const roleId = `j${num}`;
                                    const occupantId = roomData.players[roleId];
                                    const isMe = occupantId === user?.uid;
                                    const isOccupied = occupantId && !isMe;
                                    const displayName = occupantId ? (roomData.playerNames?.[occupantId] || `Jugador ${num}`) : `Silla ${num}`;
                                    
                                    return (
                                        <div key={roleId} className={`p-3 rounded-xl border-2 flex flex-col items-center justify-center gap-2 transition-all ${isMe ? 'bg-blue-500/20 border-blue-500 shadow-inner' : isOccupied ? 'bg-slate-900/50 border-slate-700 opacity-60' : 'bg-slate-800 border-slate-600'}`}>
                                            <span className={`font-black text-xs truncate w-full text-center ${isOccupied || isMe ? 'text-blue-300' : 'text-slate-500'}`}>{displayName}</span>
                                            <button onClick={() => toggleRole(roleId)} disabled={isOccupied} className={`text-[10px] px-3 py-1.5 rounded-lg font-bold w-full transition ${isMe ? 'bg-red-500 hover:bg-red-600 text-white' : isOccupied ? 'bg-slate-800 text-slate-500' : 'bg-green-500 hover:bg-green-400 text-white'}`}>
                                                {isMe ? 'Levantarse' : 'Sentarse'}
                                            </button>
                                        </div>
                                    )
                                })}
                            </div>

                            <button onClick={startGame} disabled={!canStart} className={`w-full py-4 rounded-2xl font-black text-lg shadow-lg transform transition flex items-center justify-center gap-2 ${canStart ? 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white active:scale-95' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                                <Play size={24} fill="currentColor" /> {!isS1 ? 'Esperando al Maestro...' : 'REPARTIR CARTAS'}
                            </button>
                        </div>
                    </div>
                );
            }

            let activePlayingOpponents = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`] && n !== myPlayerNum);
            const myHandSize = myPlayerNum ? (roomData[`player${myPlayerNum}Hand`]?.length || 0) : 0;
            const canCallUno = myHandSize > 0 && myHandSize <= 2 && !roomData.unoCalled?.[myPlayerNum];

            return (
                <div className="flex-1 flex flex-col w-full h-full relative overflow-hidden bg-slate-900">
                    
                    <button onClick={() => updateGame({ isPaused: true })} className="absolute top-4 right-4 z-20 bg-slate-700/80 hover:bg-slate-600 text-white p-2 md:p-3 rounded-full shadow-lg backdrop-blur-sm transition-all" title="Pausar Juego">
                        <Pause size={20} />
                    </button>

                    {roomData.isPaused && (
                        <div className="absolute inset-0 z-[60] bg-slate-900/80 backdrop-blur-md flex flex-col items-center justify-center animate-in fade-in p-4">
                            <div className="bg-slate-800 p-8 md:p-10 rounded-3xl shadow-2xl border border-slate-600 text-center flex flex-col items-center max-w-sm w-full mx-auto">
                                <Pause size={64} className="text-white mb-6 opacity-80" />
                                <h2 className="text-4xl font-black text-white tracking-widest mb-8">PAUSADO</h2>
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => updateGame({ isPaused: false })} className="w-full py-4 bg-blue-500 hover:bg-blue-400 text-white rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                        <Play size={20} fill="currentColor" /> VOLVER AL JUEGO
                                    </button>
                                    {isS1 && (
                                        <button onClick={startGame} className="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                            <RotateCcw size={20} /> REINICIAR EL JUEGO
                                        </button>
                                    )}
                                    <button onClick={handleEndGame} className="w-full py-4 bg-red-500 hover:bg-red-400 text-white rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                        <Home size={20} /> FINALIZAR JUEGO
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingWildCard && (
                        <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 animate-fade-in">
                            <h2 className="text-3xl font-black text-white mb-8 text-center drop-shadow-lg">Elige la Nueva Categoría</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {[0, 1, 2, 3].map(catId => (
                                    <button key={catId} onClick={() => handleWildChoice(catId)} className={`w-32 h-40 rounded-2xl ${CAT_COLORS[catId]} ${CAT_TEXT[catId]} font-black text-xl md:text-2xl uppercase shadow-2xl hover:scale-105 active:scale-95 transition-transform flex items-center justify-center border-4 leading-tight text-center px-2`}>
                                        {roomData.categories[catId].name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingSwapCard && (
                        <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 animate-fade-in">
                            <h2 className="text-3xl font-black text-white mb-8 text-center drop-shadow-lg">¿Con quién quieres intercambiar?</h2>
                            <div className="grid grid-cols-1 gap-4 w-full max-w-sm">
                                {activePlayingOpponents.map(oppNum => (
                                    <button key={oppNum} onClick={() => handleSwapChoice(oppNum)} className="w-full bg-slate-800 border-4 border-indigo-500 text-white rounded-2xl p-4 flex justify-between items-center shadow-xl hover:scale-105 active:scale-95 transition-transform">
                                        <span className="font-black text-xl truncate">{roomData.playerNames?.[roomData.players[`j${oppNum}`]]}</span>
                                        <span className="bg-indigo-500 px-3 py-1 rounded-full font-bold whitespace-nowrap">{roomData[`player${oppNum}Hand`]?.length} cartas</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {roomData.penaltyData && (
                        <div className="absolute inset-0 z-50 bg-slate-900/95 backdrop-blur-sm flex flex-col items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl border-4 border-red-500 max-w-2xl w-full flex flex-col max-h-[95vh] relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-red-500 shrink-0"></div>
                                <div className="shrink-0 text-center">
                                    <div className="bg-red-500/20 text-red-400 w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><BookOpen size={36} /></div>
                                    <h2 className="text-2xl md:text-4xl font-black text-white mb-4 uppercase">¡Oops, {roomData.playerNames?.[roomData.players[`j${roomData.penaltyData.player}`]] || `Jugador ${roomData.penaltyData.player}`}!</h2>
                                </div>
                                
                                <div className="overflow-y-auto custom-scrollbar pr-2 pb-4 flex-1">
                                    <div className="bg-red-500/20 border border-red-500 p-4 rounded-xl mb-6 flex items-center gap-3 animate-pulse">
                                        <AlertTriangle className="text-red-400 shrink-0" size={32} />
                                        <p className="text-red-200 font-bold text-lg text-left">Respuesta incorrecta. ¡Pierdes tu turno y robas {roomData.activeUnoPenalty ? roomData.activeUnoPenalty.amount : 1} carta extra!</p>
                                    </div>
                                    <div className="bg-slate-900 p-4 md:p-6 rounded-2xl mb-6 shadow-inner border border-slate-700 text-center">
                                        <p className="text-xl text-slate-300 mb-4">La mesa pedía <strong>{roomData.penaltyData.wrongCategoryDisplay.toUpperCase()}</strong>:</p>
                                        <div className="flex flex-col md:flex-row justify-center items-center gap-4 text-2xl font-black">
                                            <span className={`${CAT_TEXT[roomData.penaltyData.correctArticle]} ${CAT_COLORS[roomData.penaltyData.correctArticle]} px-4 py-2 rounded-xl shadow-lg uppercase text-center`}>
                                                {roomData.penaltyData.correctCategoryDisplay}
                                            </span>
                                            <span className="text-white bg-slate-700 px-6 py-2 rounded-xl border-2 border-slate-600 text-center break-words max-w-full">
                                                {roomData.penaltyData.playedWord}
                                            </span>
                                        </div>
                                    </div>
                                    {roomData.penaltyData.explanation && (
                                        <div className="text-left bg-blue-900/30 border border-blue-500/30 p-5 rounded-xl">
                                            <h3 className="text-blue-400 font-bold mb-2 flex items-center gap-2"><BookOpen size={18} /> Regla de Juego:</h3>
                                            <p className="text-slate-200 leading-relaxed whitespace-pre-line text-sm md:text-base">{roomData.penaltyData.explanation}</p>
                                        </div>
                                    )}
                                </div>

                                <div className="shrink-0 pt-4 mt-2 border-t border-slate-700/50">
                                    <button onClick={closePenaltyModal} disabled={myPlayerNum !== roomData.penaltyData.player && !isSelectorRole} className="px-6 py-4 bg-red-500 hover:bg-red-400 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 mx-auto w-full">
                                        {myPlayerNum === roomData.penaltyData.player || isSelectorRole ? `Aceptar Castigo (+${roomData.activeUnoPenalty ? roomData.activeUnoPenalty.amount : 1})` : "Esperando jugador..."}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-slate-800 border-b border-slate-700 p-4 shadow-md z-10 flex flex-col justify-center items-center relative shrink-0">
                        <div className="absolute top-4 left-4 z-20 text-xs font-bold text-slate-500 flex items-center gap-2">
                            <Users size={14}/> Sala: {roomId} {isSelectorRole && <span className="bg-purple-500 text-white px-2 py-0.5 rounded-full text-[10px] ml-2">Modo Maestro</span>}
                        </div>

                        <div className="text-center font-black text-xl md:text-2xl text-yellow-400 tracking-wider mb-4 drop-shadow-lg uppercase mt-6 md:mt-0 flex items-center gap-3">
                            ¡Turno de {roomData.playerNames?.[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`}!
                            {roomData.direction === -1 && <RotateCcw size={20} className="text-orange-500"/>}
                        </div>

                        <div className="flex gap-2 md:gap-4 p-3 bg-slate-900 rounded-3xl shadow-inner border border-slate-700 mb-2 w-full max-w-2xl justify-center">
                            {[0, 1, 2, 3].map((catId) => {
                                const catObj = roomData.categories[catId];
                                const isHighlight = roomData.currentCategoryId === catId || flashCategory === catId;
                                const colorClass = isHighlight ? CAT_COLORS[catId] + ' scale-110 shadow-2xl z-10 ring-4 ring-white text-white' : CAT_COLORS[catId] + ' opacity-30 scale-90 grayscale';
                                const fontSize = catObj.name.length > 8 ? 'text-[10px] md:text-sm' : 'text-sm md:text-xl';

                                return (
                                    <div key={catId} className={`flex-1 max-w-[100px] h-16 md:h-24 rounded-xl font-black ${fontSize} uppercase border-b-4 transform transition-all duration-[50ms] flex items-center justify-center text-center leading-tight px-1 ${colorClass}`}>
                                        {catObj.name}
                                    </div>
                                )
                            })}
                        </div>

                        <div className="mt-2 h-14 flex justify-center w-full">
                            {roomData.activeUnoPenalty ? (
                                <div className="text-red-400 font-black flex items-center gap-2 text-lg text-center px-6 py-2 rounded-full border-2 border-red-500/50 bg-red-900/30 shadow-[0_0_15px_rgba(239,68,68,0.3)] animate-pulse">
                                    <AlertTriangle size={20}/> ¡CASTIGO ACTIVO +{roomData.activeUnoPenalty.amount}!
                                </div>
                            ) : (roomData.currentCategoryId === null && !roomData.isRandomizing) ? (
                                (isSelectorRole || isMyTurn) ? (
                                    <button onClick={handleRandomize} className="px-8 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 rounded-full font-black text-white shadow-xl hover:shadow-2xl animate-bounce flex items-center gap-2 active:scale-95 border-b-[4px] border-indigo-800">
                                        <Dices size={24} /> TIRAR LA RULETA
                                    </button>
                                ) : (
                                    <div className="text-slate-400 font-bold flex items-center gap-2 text-sm text-center px-4 bg-slate-900/50 py-2 rounded-full border border-slate-700">
                                        <Loader2 size={16} className="animate-spin"/> Esperando a que {roomData.playerNames?.[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`} gire...
                                    </div>
                                )
                            ) : roomData.currentCategoryId !== null ? (
                                <div className="text-slate-400 font-bold flex items-center gap-2 text-sm text-center px-4">
                                    Esperando a que {roomData.playerNames?.[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`} tire...
                                </div>
                            ) : null}
                        </div>
                    </div>

                    <div className="flex-1 bg-green-800 relative flex items-center justify-center shadow-inner overflow-hidden border-y-8 border-green-900">
                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle, #fff 10%, transparent 11%)', backgroundSize: '20px 20px' }}></div>
                        <div className="w-64 h-64 md:w-[400px] md:h-[400px] border-4 border-green-700/50 rounded-full absolute flex items-center justify-center pointer-events-none">
                            <div className="text-green-700/30 font-black text-6xl md:text-8xl rotate-12 select-none">UNO</div>
                        </div>

                        <div className={`absolute top-4 transition-all duration-300 transform z-30 ${localFeedback.visible ? 'translate-y-0 opacity-100 scale-100' : '-translate-y-4 opacity-0 scale-95'}`}>
                            {localFeedback.visible && (
                                <div className={`px-6 py-2 rounded-full font-bold text-white shadow-xl flex items-center gap-2 text-sm md:text-lg ${localFeedback.type === 'success' ? 'bg-green-500' : localFeedback.type === 'error' ? 'bg-red-500' : localFeedback.type === 'alert' ? 'bg-blue-500 animate-pulse' : 'bg-slate-800'}`}>
                                    {localFeedback.type === 'success' && <CheckCircle size={20} />}
                                    {localFeedback.type === 'alert' && <Zap size={20} />}
                                    {localFeedback.text}
                                </div>
                            )}
                        </div>

                        <div className="absolute left-4 md:left-12 top-1/2 transform -translate-y-1/2 hidden sm:flex flex-col items-center">
                            <div className="relative w-24 h-36 bg-slate-800 rounded-xl border-4 border-slate-700 shadow-xl flex items-center justify-center text-slate-500 rotate-[-5deg]">
                                <span className="font-bold">MAZO</span>
                                {roomData.deck.length > 1 && <div className="absolute inset-0 bg-slate-800 rounded-xl shadow-xl transform translate-x-1 translate-y-1 -z-10"></div>}
                                {roomData.deck.length > 2 && <div className="absolute inset-0 bg-slate-800 rounded-xl shadow-xl transform translate-x-2 translate-y-2 -z-20"></div>}
                            </div>
                            <span className="mt-4 bg-black/50 text-white px-3 py-1 rounded-full text-xs font-bold">{roomData.deck.length} cartas</span>
                        </div>

                        <div className="relative z-10 flex flex-col items-center justify-center">
                            <div className="relative w-32 h-44 md:w-48 md:h-64 flex items-center justify-center">
                                {roomData.tableCard ? (
                                    <div className={`w-full h-full rounded-2xl shadow-2xl flex flex-col items-center justify-center border-8 transition-all duration-500 transform rotate-[-2deg] scale-105 animate-in fade-in zoom-in-50 ${CAT_COLORS[roomData.tableCard.categoryId]} bg-white`}>
                                        <div className={`text-sm md:text-xl font-black mb-2 uppercase text-center leading-tight px-1 ${CAT_TEXT[roomData.tableCard.categoryId]} ${CAT_TEXT[roomData.tableCard.categoryId] === 'text-white' ? 'text-white/80' : 'text-gray-800/80'}`}>
                                            {roomData.tableCard.categoryName}
                                        </div>
                                        <div className="bg-white px-2 py-6 md:py-8 w-11/12 rounded-xl flex items-center justify-center shadow-inner">
                                            <span className={`text-lg md:text-2xl font-extrabold text-slate-800 text-center break-words leading-tight flex flex-col items-center gap-1 ${roomData.tableCard.type !== 'word' ? 'text-3xl md:text-4xl text-indigo-600' : ''}`}>
                                                {roomData.tableCard.type === 'action' && <span className="text-xl md:text-3xl">⚡</span>}
                                                {roomData.tableCard.type === 'wild' && <span className="text-xl md:text-3xl">🌈</span>}
                                                {roomData.tableCard.word}
                                            </span>
                                        </div>
                                        {roomData.tableCard.type !== 'word' && <div className="mt-2 text-[10px] md:text-xs font-bold text-slate-800 uppercase bg-slate-200 px-2 py-1 rounded-md">{roomData.tableCard.desc}</div>}
                                    </div>
                                ) : (
                                    <div className="w-full h-full rounded-2xl border-4 border-dashed border-green-700/50 flex flex-col items-center justify-center text-green-700/50 p-4 text-center">
                                        <span className="font-bold text-lg mb-2">ESPERANDO<br/>CARTA</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {(isSelectorRole || myPlayerNum) && (
                            <div className={`absolute right-2 md:right-4 top-4 bottom-4 bg-slate-900/90 rounded-2xl border border-slate-700 flex flex-col shadow-2xl z-20 transition-all duration-300 ${showMaestroView ? (isSelectorRole ? 'w-44 p-2' : 'w-24 md:w-32 p-2') : 'w-10 md:w-12 p-2'}`}>
                                <div className={`flex items-center border-slate-700 mb-2 ${showMaestroView ? 'justify-between border-b pb-2' : 'justify-center'}`}>
                                    {showMaestroView && <h3 className="text-[10px] font-black text-purple-400 uppercase tracking-widest pl-1">{isSelectorRole ? 'Maestro' : 'Rivales'}</h3>}
                                    <button onClick={() => setShowMaestroView(!showMaestroView)} className="p-1.5 hover:bg-slate-700 rounded-lg text-slate-400 transition-colors">
                                        {showMaestroView ? <EyeOff size={16}/> : <Eye size={16}/>}
                                    </button>
                                </div>
                                {showMaestroView && (
                                    <div className="flex flex-col gap-2 overflow-y-auto custom-scrollbar flex-1">
                                        {activePlayingOpponents.map(pNum => (
                                            <div key={pNum} className={`bg-slate-800 rounded-lg p-2 border-2 ${roomData.turn === pNum ? 'border-yellow-500' : 'border-slate-700'}`}>
                                                <div className="text-[10px] font-bold text-white mb-1 truncate flex justify-between items-center">
                                                    <span>{roomData.playerNames[roomData.players[`j${pNum}`]]}</span>
                                                    {roomData.unoCalled?.[pNum] && <span className="bg-orange-500 text-[8px] px-1 rounded animate-pulse">UNO!</span>}
                                                </div>
                                                {isSelectorRole ? (
                                                    <div className="flex flex-wrap gap-1">
                                                        {roomData[`player${pNum}Hand`].map((c, i) => (
                                                            <div key={i} className={`w-full text-center text-[9px] font-bold rounded py-0.5 px-1 truncate border-l-2 ${c.categoryId === 0 ? 'border-blue-500 bg-blue-900/30 text-blue-200' : c.categoryId === 1 ? 'border-red-500 bg-red-900/30 text-red-200' : c.categoryId === 2 ? 'border-yellow-400 bg-yellow-900/30 text-yellow-200' : c.categoryId === 3 ? 'border-green-500 bg-green-900/30 text-green-200' : 'border-purple-500 bg-purple-900/30 text-purple-200'}`}>
                                                                {c.type === 'action' ? `⚡ ${c.word}` : c.type === 'wild' ? `🌈 ${c.word}` : c.word}
                                                            </div>
                                                        ))}
                                                        {roomData[`player${pNum}Hand`].length === 0 && <span className="text-[9px] text-slate-500 italic">Vacío</span>}
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <div className="w-6 h-8 bg-slate-700 rounded border border-slate-600 flex items-center justify-center">
                                                            <span className="text-[6px] font-black text-slate-500 rotate-[-45deg]">UNO</span>
                                                        </div>
                                                        <span className="text-lg font-black text-slate-300">x{roomData[`player${pNum}Hand`].length}</span>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="bg-slate-800 h-[12rem] md:h-[18rem] flex border-t border-slate-700 shadow-[0_-10px_20px_rgba(0,0,0,0.3)] relative shrink-0">
                        {myPlayerNum ? (
                            <div className={`w-full flex flex-col relative p-2 md:p-4 overflow-hidden ${roomData.turn !== myPlayerNum ? 'opacity-50 grayscale pointer-events-none' : 'ring-inset ring-4 ring-yellow-500'}`}>
                                <div className="flex justify-between items-center px-4 py-2 bg-slate-900/50 rounded-lg mb-2 z-10 shrink-0">
                                    <div className="flex items-center gap-2">
                                        <div className={`p-1.5 rounded-full text-white ${roomData.turn === myPlayerNum ? 'bg-yellow-500 animate-pulse text-slate-900' : 'bg-blue-500'}`}><User size={16}/></div>
                                        <span className="font-bold text-white hidden sm:inline">{roomData.playerNames[user.uid]} (Jugador {myPlayerNum})</span>
                                        <span className="font-bold text-white sm:hidden">J{myPlayerNum}</span>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <span className="bg-slate-700 text-white text-xs px-2 py-1 rounded-full font-mono">{myHandSize} cartas</span>
                                        
                                        <button onClick={handleCallUno} disabled={!canCallUno} className={`px-4 py-1.5 rounded-md transition-colors text-xs font-black shadow flex items-center gap-1 uppercase tracking-widest ${canCallUno ? 'bg-orange-500 hover:bg-orange-400 text-white animate-bounce shadow-[0_0_15px_rgba(249,115,22,0.5)]' : 'hidden'}`}>
                                            ¡UNO!
                                        </button>

                                        <button onClick={() => handleDrawCard(myPlayerNum)} disabled={roomData.turn !== myPlayerNum || (roomData.currentCategoryId === null && !roomData.activeUnoPenalty)} className={`px-4 py-1.5 rounded-md transition-colors text-xs font-black shadow flex items-center gap-1 uppercase tracking-widest ${roomData.activeUnoPenalty && roomData.turn === myPlayerNum ? 'bg-red-600 hover:bg-red-500 text-white animate-pulse border-2 border-red-400 scale-110' : 'bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 disabled:text-slate-500 text-white'}`} title="Robar carta">
                                            {roomData.activeUnoPenalty ? <><AlertTriangle size={14}/> COMER {roomData.activeUnoPenalty.amount}</> : '+1 Mazo'}
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-x-auto overflow-y-hidden custom-scrollbar pb-2">
                                    <div className="flex flex-nowrap items-center justify-start gap-2 h-full px-2 w-max">
                                        {roomData[`player${myPlayerNum}Hand`]?.map((card, idx) => {
                                            const isMyTurn = roomData.turn === myPlayerNum;
                                            const disabled = !isMyTurn || (roomData.currentCategoryId === null && !roomData.activeUnoPenalty);
                                            
                                            let cardClass = "bg-white border-slate-200 text-slate-800";
                                            if (card.type === 'action') cardClass = `${CAT_COLORS[card.categoryId]} ${CAT_TEXT[card.categoryId]} border-white`;
                                            if (card.type === 'wild') cardClass = "bg-slate-800 text-white border-white";

                                            return (
                                                <button key={idx} onClick={() => handlePlayCard(myPlayerNum, idx)} disabled={disabled} className={`w-20 h-28 md:w-28 md:h-40 rounded-xl shadow-md border-2 flex flex-col items-center justify-center transform transition-all duration-200 relative shrink-0 overflow-hidden ${cardClass} ${!disabled ? 'hover:scale-105 hover:shadow-xl hover:border-blue-400 hover:z-10 cursor-pointer' : 'opacity-80 cursor-not-allowed'}`}>
                                                    {card.type === 'wild' && <div className="absolute inset-0 bg-gradient-to-br from-red-500/30 via-yellow-400/30 to-blue-500/30 z-0"></div>}
                                                    
                                                    <span className={`font-black text-center break-words leading-tight px-1 z-10 flex flex-col items-center gap-1 ${card.type !== 'word' ? 'text-lg md:text-2xl mt-1' : 'text-xs md:text-sm'}`}>
                                                        {card.type === 'action' && <span className="text-sm md:text-base">⚡</span>}
                                                        {card.type === 'wild' && <span className="text-sm md:text-base">🌈</span>}
                                                        {card.word}
                                                    </span>

                                                    {card.type !== 'word' && <span className="text-[7px] md:text-[9px] mt-2 opacity-90 text-center leading-none px-1 pb-1 z-10 uppercase tracking-wider">{card.desc}</span>}
                                                </button>
                                            )
                                        })}
                                        {roomData[`player${myPlayerNum}Hand`]?.length === 0 && <span className="text-slate-500 italic px-4 font-bold">Has tirado todas tus cartas.</span>}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="w-full flex items-center justify-center bg-slate-900/50">
                                <span className="text-slate-400 font-bold uppercase tracking-widest flex items-center gap-2"><User size={20}/> Estás en la sala como Selector (Maestro)</span>
                            </div>
                        )}
                    </div>

                    {roomData.gameState === 'GAME_OVER' && (
                        <div className="absolute inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in p-4">
                            <div className="bg-slate-800 p-10 rounded-3xl shadow-2xl border-4 border-yellow-400 text-center max-w-lg w-full transform hover:scale-105 transition-transform">
                                <div className="text-yellow-400 mb-4 flex justify-center">{roomData.winner.includes('❌') ? <AlertTriangle size={64} className="text-red-500"/> : <RotateCcw size={64} className="animate-spin-slow" />}</div>
                                <h2 className="text-5xl font-black text-white mb-2 tracking-tight uppercase">{roomData.winner.includes('❌') ? '¡PENALIZACIÓN!' : '¡Juego Terminado!'}</h2>
                                <p className="text-2xl text-slate-300 mb-8 font-medium">{roomData.winner.includes('❌') ? 'Eliminado:' : 'El ganador es:'} <br/><span className={`font-black text-3xl mt-2 inline-block ${roomData.winner.includes('❌') ? 'text-red-500' : 'text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600'}`}>{roomData.winner}</span></p>
                                {isS1 ? (
                                    <button onClick={startGame} className="px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 rounded-full font-black text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 mx-auto w-full">
                                        <RotateCcw size={24} /> VOLVER A JUGAR
                                    </button>
                                ) : (
                                    <p className="text-slate-400 bg-slate-900 p-3 rounded-lg font-bold">Esperando a que el Maestro 1 inicie otra partida...</p>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<UnoGame />);
    </script>
</body>
</html>

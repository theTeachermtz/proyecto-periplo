                if (singularWord.endsWith('o')) { explanation = "The 'Golden Rule': Usually, words ending in -o are masculine."; } 
                else if (['l', 'o', 'n', 'e', 'r', 's'].includes(singularWord.slice(-1))) { explanation = "Masculine Clues: The 'LONERS' Rule. If a noun ends in L, O, N, E, R, or S, it's usually masculine."; } 
                else if (['jueves', 'paraguas', 'lunes', 'sacapuntas', 'virus', 'análisis'].includes(singularWord)) { explanation = "Special Case: Words ending in an unstressed -s stay the same. We use the masculine article here."; } 
                else { explanation = `Nominal Agreement: Nouns like '${singularWord}' don't follow the LONERS rule! Grammatical gender can sometimes be arbitrary, so you have to memorize that it acts like a masculine magnet.`; }
            } else { 
                if (singularWord.endsWith('a')) { explanation = "The 'Golden Rule': Usually, words ending in -a are feminine."; } 
                else if (singularWord.match(/(ción|sión|dad|tad|tud|z|umbre|ie)$/)) { explanation = "Feminine Clues: If a word ends in -ción, -sión, -dad, -tad, -tud, -z, -umbre, or -ie, it's almost certainly feminine."; } 
                else { explanation = `Nominal Agreement: The gender of '${singularWord}' is feminine. It acts like a magnet, forcing articles and adjectives to match it.`; }
            }

            if (isPlural) {
                explanation += "\n\nPlural Rule: ";
                if (['jueves', 'paraguas', 'lunes', 'sacapuntas', 'virus', 'análisis'].includes(word)) { explanation += "Words ending in -s: If it ends in -s (and is not stressed), the word stays the same."; } 
                else if (word.endsWith('ces') && singularWord.endsWith('z')) { explanation += "The 'Z' Change: If the singular ends in -z, the last syllable transforms into -ces."; } 
                else {
                    const vowels = ['a', 'e', 'i', 'o', 'u', 'á', 'é', 'í', 'ó', 'ú'];
                    if (!vowels.includes(singularWord.slice(-1))) { explanation += "Standard Consonants: If the word ends in a consonant, we form the plural by adding -es."; } 
                    else { explanation += "Ending in a Vowel: Simply add -s to the end of the word."; }
                }
            }
            return explanation;
        };

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // TU CONSTRUCTOR DE MAZO ORIGINAL DE 112 CARTAS (SOLO PALABRAS) INTACTO
        const build112Deck = () => {
            const getCardsForArticle = (target) => VOCABULARY.filter(c => c.article === target || (c.validArticles && c.validArticles.includes(target)));
            const elCards = getCardsForArticle('el');
            const laCards = getCardsForArticle('la');
            const losCards = getCardsForArticle('los');
            const lasCards = getCardsForArticle('las');

            const padTo28 = (cards) => {
                let result = [];
                let i = 0;
                while(result.length < 28) { result.push(cards[i % cards.length]); i++; }
                return result;
            }

            const deckEl = padTo28(elCards);
            const deckLa = padTo28(laCards);
            const deckLos = padTo28(losCards);
            const deckLas = padTo28(lasCards);

            return shuffleArray([...deckEl, ...deckLa, ...deckLos, ...deckLas]);
        };

        const UnoGame = () => {
            const [user, setUser] = useState(null);
            const [roomId, setRoomId] = useState('');
            const [roomData, setRoomData] = useState(null);
            const [joinInput, setJoinInput] = useState('');
            
            const [localFeedback, setLocalFeedback] = useState({ text: '', type: '', visible: false });
            const [localError, setLocalError] = useState('');
            const [flashArticle, setFlashArticle] = useState(null);

            // --- PLUG 1: Lógica de Modo Alumno (URL y LocalStorage) ---
            const [isStudentMode, setIsStudentMode] = useState(false);
            const [studentName, setStudentName] = useState('');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('mode') === 'student') {
                    setIsStudentMode(true);
                    setStudentName(localStorage.getItem('periplo_student_name') || '');
                }
                const urlCode = params.get('code');
                if (urlCode) setJoinInput(urlCode.toUpperCase());

                // Login anónimo seguro
                signInAnonymously(auth).catch(e => console.error("Error en auth:", e));
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Escuchar cambios en la Sala (Conexión Original Intacta)
            useEffect(() => {
                if (!user || !roomId) { setRoomData(null); return; }
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                const unsubscribe = onSnapshot(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        setRoomData(snapshot.data());
                    } else {
                        setRoomData(null);
                        setLocalError("La sala fue cerrada o no existe.");
                        setRoomId('');
                    }
                }, (err) => console.error("Error leyendo sala:", err));
                return () => unsubscribe();
            }, [user, roomId]);

            useEffect(() => {
                if (roomData?.feedbackMessage?.ts) {
                    setLocalFeedback({ ...roomData.feedbackMessage, visible: true });
                    const t = setTimeout(() => setLocalFeedback(prev => ({ ...prev, visible: false })), 2500);
                    return () => clearTimeout(t);
                }
            }, [roomData?.feedbackMessage?.ts]);

            useEffect(() => {
                let interval;
                if (roomData?.isRandomizing) {
                    const arts = ['el', 'la', 'los', 'las'];
                    let i = 0;
                    interval = setInterval(() => { setFlashArticle(arts[i % 4]); i++; }, 100);
                } else {
                    setFlashArticle(null);
                }
                return () => clearInterval(interval);
            }, [roomData?.isRandomizing]);

            // --- ACCIONES DE RED ---
            const updateGame = async (updates) => {
                if (!roomId || !user) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                    await updateDoc(roomRef, updates);
                } catch (e) { console.error("Error actualizando juego:", e); }
            };

            const handleCreateRoom = async () => {
                let currentUser = user;
                if (!currentUser) return; // Candado quitado, ahora es seguro.
                
                try {
                    const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                    await setDoc(roomRef, {
                        roomId: code,
                        gameState: 'MENU',
                        players: { s1: currentUser.uid, s2: null, j1: null, j2: null }, 
                        playerNames: { [currentUser.uid]: 'Maestro' }, // <-- PLUG 2: Guardamos el nombre real!
                        deck: [], player1Hand: [], player2Hand: [],
                        currentArticle: null, tableCard: null, 
                        turn: 1, isRandomizing: false,
                        winner: null, penaltyData: null,
                        isPaused: false, feedbackMessage: null
                    });
                    setRoomId(code);
                    setLocalError('');
                } catch (e) {
                    console.error("Error al crear sala:", e);
                    setLocalError("Hubo un error al crear la sala. Revisa tu conexión.");
                }
            };

            const handleJoinRoom = () => {
                if (!user || !joinInput) return;
                // Si es alumno, exigimos que ponga nombre
                if (isStudentMode && !studentName.trim()) {
                    setLocalError("Por favor, ingresa tu nombre primero.");
                    return;
                }
                if (isStudentMode) localStorage.setItem('periplo_student_name', studentName);
                setLocalError('');
                setRoomId(joinInput.trim().toUpperCase());
            };

            const handleLeaveRoom = async () => {
                if (roomData && user && roomId) {
                    const newPlayers = { ...roomData.players };
                    let changed = false;
                    Object.keys(newPlayers).forEach(k => {
                        if (newPlayers[k] === user.uid) { newPlayers[k] = null; changed = true; }
                    });
                    if (changed) {
                        try {
                            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                            await updateDoc(roomRef, { players: newPlayers });
                        } catch(e) {}
                    }
                }
                setRoomId('');
                setRoomData(null);
                setJoinInput('');
                setLocalError('');
            };

            // PLUG 3: Botón de Link Magico
            const copyStudentLink = () => {
                const link = `${window.location.origin}${window.location.pathname}?mode=student&code=${roomId}`;
                navigator.clipboard.writeText(link);
                setLocalFeedback({ text: '¡Link Copiado!', type: 'success', visible: true, ts: Date.now() });
            };

            const toggleRole = async (roleId) => {
                if (!roomData || !user) return;
                const newPlayers = { ...roomData.players };
                const newNames = { ...(roomData.playerNames || {}) };
                
                if (newPlayers[roleId] === user.uid) {
                    newPlayers[roleId] = null; 
                } else {
                    newPlayers[roleId] = user.uid; 
                    newNames[user.uid] = isStudentMode ? studentName : 'Maestro'; // Guardamos su nombre real!
                }
                await updateGame({ players: newPlayers, playerNames: newNames });
            };

            const handleEndGame = async () => {
                if (!roomData) return;
                await updateGame({ gameState: 'MENU', isPaused: false, feedbackMessage: null });
            };

            // Lógica original de juego intacta
            const startGame = async () => {
                if (!roomData) return;
                const gameDeck = build112Deck();
                const p1 = gameDeck.slice(0, 10);
                const p2 = gameDeck.slice(10, 20);
                const remaining = gameDeck.slice(20);

                await updateGame({
                    gameState: 'PLAYING', deck: remaining,
                    player1Hand: p1, player2Hand: p2,
                    currentArticle: null, tableCard: null, turn: 1, isRandomizing: false,
                    winner: null, penaltyData: null, isPaused: false,
                    feedbackMessage: { text: '¡El juego comienza! Selector, gira el artículo.', type: 'info', ts: Date.now() }
                });
            };

            const isS1 = roomData?.players?.s1 === user?.uid;
            const isS2 = roomData?.players?.s2 === user?.uid;
            const isJ1 = roomData?.players?.j1 === user?.uid;
            const isJ2 = roomData?.players?.j2 === user?.uid;
            const isSelectorRole = isS1 || isS2;

            const handleRandomize = async () => {
                if (roomData.gameState !== 'PLAYING' || roomData.penaltyData || !isSelectorRole || roomData.isPaused || roomData.isRandomizing) return;
                const articles = ['el', 'la', 'los', 'las'];
                const picked = articles[Math.floor(Math.random() * articles.length)];
                await updateGame({ isRandomizing: true, currentArticle: null });
                setTimeout(async () => {
                    await updateGame({ isRandomizing: false, currentArticle: picked, feedbackMessage: { text: `¡Buscando: ${picked.toUpperCase()}!`, type: 'alert', ts: Date.now() } });
                }, 2000);
            };

            const handlePlayCard = async (playerNum, cardIndex) => {
                if (roomData.gameState !== 'PLAYING' || !roomData.currentArticle || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum) return;
                if ((playerNum === 1 && !isJ1) || (playerNum === 2 && !isJ2)) return;

                const hand = playerNum === 1 ? roomData.player1Hand : roomData.player2Hand;
                const playedCard = hand[cardIndex];
                if (!playedCard) return;

                const isCorrect = playedCard.article === roomData.currentArticle || (playedCard.validArticles && playedCard.validArticles.includes(roomData.currentArticle));
                let updates = {};

                if (isCorrect) {
                    const newHand = [...hand];
                    newHand.splice(cardIndex, 1);
                    
                    updates[`player${playerNum}Hand`] = newHand;
                    updates.tableCard = { ...playedCard, article: roomData.currentArticle };
                    updates.currentArticle = null; 
                    updates.turn = roomData.turn === 1 ? 2 : 1; 
                    updates.feedbackMessage = { text: `¡Jugador ${playerNum} acertó!`, type: 'success', ts: Date.now() };

                    if (newHand.length === 0) {
                        updates.winner = roomData.playerNames?.[roomData.players[`j${playerNum}`]] || `Jugador ${playerNum}`;
                        updates.gameState = 'GAME_OVER';
                    }
                    await updateGame(updates);
                } else {
                    const correctArticlesDisplay = playedCard.validArticles ? playedCard.validArticles.join(' O ').toUpperCase() : playedCard.article.toUpperCase();
                    updates.penaltyData = {
                        player: playerNum, playedWord: playedCard.word, correctArticle: playedCard.article,
                        correctArticlesDisplay: correctArticlesDisplay, wrongArticle: roomData.currentArticle,
                        explanation: getGrammarExplanation(playedCard.word, playedCard.article)
                    };
                    await updateGame(updates);
                }
            };

            const closePenaltyModal = async () => {
                await updateGame({ penaltyData: null, turn: roomData.turn === 1 ? 2 : 1, currentArticle: null });
            };

            const handleDrawCard = async (playerNum) => {
                if (roomData.gameState !== 'PLAYING' || roomData.deck.length === 0 || roomData.penaltyData || roomData.isPaused || roomData.isRandomizing) return;
                if (roomData.turn !== playerNum) return;
                if ((playerNum === 1 && !isJ1) || (playerNum === 2 && !isJ2)) return;

                const hand = playerNum === 1 ? roomData.player1Hand : roomData.player2Hand;
                const drawnCard = roomData.deck[0];
                const newDeck = roomData.deck.slice(1);
                
                await updateGame({ deck: newDeck, [`player${playerNum}Hand`]: [...hand, drawnCard] });
            };

            const renderHiddenCard = (idx) => (
                <div key={idx} className="w-20 h-28 md:w-24 md:h-32 bg-slate-800 rounded-xl shadow-md border-2 border-slate-700 flex items-center justify-center relative transform hover:scale-100 cursor-default shrink-0">
                    <div className="absolute inset-1 border border-slate-700/50 rounded-lg pointer-events-none"></div>
                    <span className="font-bold text-slate-500 text-xs md:text-sm px-1 text-center tracking-widest">MAZO</span>
                </div>
            );

            // --- VISTAS ---

            // VISTA 1: INICIO (Conectar o Crear)
            if (!roomId) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center font-sans text-slate-100">
                        {/* PLUG: NAVBAR PERIPLO */}
                        <div className="w-full px-4 py-3 flex items-center justify-between shrink-0 z-30 border-b border-slate-700 bg-slate-800">
                            <div className="flex items-center gap-3 min-w-0 flex-1">
                                {!isStudentMode && (
                                    <button onClick={() => window.location.href='index.html'} className="p-1.5 rounded-full hover:bg-slate-700 text-slate-400 shrink-0"><ArrowLeft size={20}/></button>
                                )}
                                <h1 className="text-lg font-black italic tracking-widest text-white shrink-0">PERIPLO <span className="text-yellow-400">⚡</span></h1>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col justify-center items-center p-4 w-full">
                            <div className="bg-slate-800 p-8 md:p-12 rounded-2xl shadow-2xl border border-slate-700 max-w-lg w-full text-center">
                                <div className="flex justify-center gap-2 mb-6">
                                    <span className="bg-blue-500 w-10 h-14 rounded shadow-lg transform -rotate-12 border border-white"></span>
                                    <span className="bg-red-500 w-10 h-14 rounded shadow-lg transform -rotate-6 border border-white"></span>
                                    <span className="bg-yellow-400 w-10 h-14 rounded shadow-lg transform rotate-6 border border-white"></span>
                                    <span className="bg-green-500 w-10 h-14 rounded shadow-lg transform rotate-12 border border-white"></span>
                                </div>
                                <h1 className="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-yellow-400 to-red-500 tracking-tight leading-tight">
                                    GÉNERO Y NÚMERO UNO
                                </h1>
                                <p className="text-slate-400 mb-8 font-medium">{isStudentMode ? 'Modo Alumno' : 'Multijugador en Línea'}</p>

                                {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}

                                <div className="space-y-6">
                                    {!isStudentMode && (
                                        <button onClick={handleCreateRoom} className="w-full py-4 bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-400 hover:to-indigo-500 text-white rounded-xl font-bold text-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                            <Users size={24} /> Crear Nueva Sala
                                        </button>
                                    )}
                                    
                                    {!isStudentMode && (
                                        <div className="relative flex items-center py-2">
                                            <div className="flex-grow border-t border-slate-600"></div>
                                            <span className="flex-shrink-0 mx-4 text-slate-500 text-sm font-bold">O ÚNETE A UNA</span>
                                            <div className="flex-grow border-t border-slate-600"></div>
                                        </div>
                                    )}

                                    {isStudentMode && (
                                        <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="TU NOMBRE" className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-blue-500 mb-2"/>
                                    )}

                                    <div className="flex gap-2">
                                        <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())} placeholder="CÓDIGO DE SALA" maxLength={4} className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-blue-500"/>
                                        <button onClick={handleJoinRoom} disabled={joinInput.length < 4} className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-6 rounded-xl font-bold transition flex items-center justify-center">
                                            <ArrowRight size={24} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // PLUG 4: PANTALLA DE CARGA ANTI-CRASHEOS
            if (roomId && !roomData) return (
                <div className="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center gap-4">
                    <Loader2 size={40} className="animate-spin text-blue-500" />
                    <p className="font-bold tracking-widest uppercase">Conectando con la sala...</p>
                    {localError && <p className="text-red-400 font-bold">{localError}</p>}
                    <button onClick={handleLeaveRoom} className="mt-4 px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition">Cancelar</button>
                </div>
            );

            // VISTA 2: LOBBY DE ESPERA
            if (roomData.gameState === 'MENU') {
                const roles = [
                    { id: 's1', label: 'Selector 1 (Mtro)', icon: <User size={20}/>, color: 'bg-purple-500' },
                    { id: 's2', label: 'Selector 2 (Mtro)', icon: <User size={20}/>, color: 'bg-orange-500' },
                    { id: 'j1', label: 'Jugador 1', icon: <User size={20}/>, color: 'bg-blue-500' },
                    { id: 'j2', label: 'Jugador 2', icon: <User size={20}/>, color: 'bg-red-500' },
                ];

                const canStart = roomData.players.s1 && isS1; 

                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center font-sans text-slate-100 relative">
                        {/* NAVBAR PERIPLO */}
                        <div className="w-full px-4 py-3 flex items-center justify-between shrink-0 z-30 border-b border-slate-700 bg-slate-800 absolute top-0">
                            <div className="flex items-center gap-3 min-w-0 flex-1">
                                <h1 className="text-lg font-black italic tracking-widest text-white shrink-0">PERIPLO <span className="text-yellow-400">⚡</span></h1>
                            </div>
                        </div>

                        {/* Alerta flotante para Copy Link */}
                        <div className={`absolute top-16 z-50 transition-all duration-300 ${localFeedback.visible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                            <div className="px-6 py-2 rounded-full font-bold text-white shadow-lg bg-green-500 flex gap-2 items-center"><LinkIcon size={16}/> {localFeedback.text}</div>
                        </div>

                        <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-lg w-full relative overflow-hidden mt-20">
                            <button onClick={handleLeaveRoom} className="absolute top-4 left-4 text-slate-400 hover:text-white flex items-center gap-1 text-xs font-bold transition bg-slate-900/50 px-3 py-1.5 rounded-full">
                                <ArrowRight className="rotate-180" size={14} /> Salir
                            </button>

                            <div className="text-center mb-8 mt-4">
                                <h2 className="text-sm font-bold text-slate-400 tracking-widest uppercase mb-1">Código de Sala</h2>
                                <div className="text-5xl font-black text-white tracking-[0.2em] bg-slate-900 py-3 rounded-xl border border-slate-700 mx-auto w-max px-8 shadow-inner">
                                    {roomId}
                                </div>
                                {!isStudentMode && (
                                    <button onClick={copyStudentLink} className="mt-4 px-6 py-2 bg-slate-700 hover:bg-slate-600 text-blue-400 rounded-full font-bold text-sm flex items-center justify-center mx-auto gap-2 transition-colors">
                                        <LinkIcon size={16}/> Copiar Link de Alumnos
                                    </button>
                                )}
                            </div>

                            <div className="bg-yellow-500/10 border border-yellow-500/50 rounded-lg p-3 mb-6 text-sm text-yellow-200">
                                <strong>Tip:</strong> Si el maestro va a jugar, puede tomar el rol de "Selector" Y el rol de "Jugador" al mismo tiempo.
                            </div>

                            <h3 className="font-bold text-slate-200 mb-4 text-center border-b border-slate-600 pb-2">Selecciona tus Roles</h3>
                            
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                {roles.map(r => {
                                    const occupantId = roomData.players[r.id];
                                    const isMe = occupantId === user?.uid;
                                    const isOccupied = occupantId && !isMe;
                                    
                                    // PLUG 5: Leer el nombre real del jugador desde playerNames
                                    const displayName = occupantId ? (roomData.playerNames?.[occupantId] || 'Jugador') : r.label;
                                    
                                    return (
                                        <div key={r.id} className={`p-4 rounded-xl border-2 flex flex-col items-center justify-center gap-3 transition-all ${isMe ? 'bg-blue-500/20 border-blue-500' : isOccupied ? 'bg-slate-900/50 border-slate-700 opacity-60' : 'bg-slate-700 border-slate-600'}`}>
                                            <div className={`${r.color} p-2 rounded-full text-white`} title={occupantId ? `ID: ${occupantId.slice(0,5)}...` : ''}>
                                                {r.icon}
                                            </div>
                                            <span className={`font-bold text-sm text-center w-full truncate px-1 ${isOccupied || isMe ? 'text-blue-300' : ''}`}>{displayName}</span>
                                            <button onClick={() => toggleRole(r.id)} disabled={isOccupied} className={`text-xs px-4 py-1.5 rounded-full font-bold w-full transition ${isMe ? 'bg-red-500 hover:bg-red-600 text-white' : isOccupied ? 'bg-slate-800 text-slate-500' : 'bg-green-500 hover:bg-green-400 text-white'}`}>
                                                {isMe ? 'Dejar Rol' : isOccupied ? 'Ocupado' : 'Tomar Rol'}
                                            </button>
                                        </div>
                                    )
                                })}
                            </div>

                            <button onClick={startGame} disabled={!canStart} className={`w-full py-4 rounded-xl font-bold text-xl shadow-lg transform transition flex items-center justify-center gap-2 ${canStart ? 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white active:scale-95' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                                <Play size={24} fill="currentColor" /> {!isS1 ? 'Esperando al Selector 1...' : 'INICIAR JUEGO'}
                            </button>
                        </div>
                    </div>
                );
            }

            // VISTA 3: JUEGO EN CURSO (Exactamente como la diste)
            return (
                <div className="min-h-screen bg-slate-900 flex flex-col font-sans overflow-hidden select-none relative">
                    
                    <button onClick={() => updateGame({ isPaused: true })} className="absolute top-4 right-4 z-20 bg-slate-700/80 hover:bg-slate-600 text-white p-2 md:p-3 rounded-full shadow-lg backdrop-blur-sm transition-all" title="Pausar Juego">
                        <Pause size={20} />
                    </button>

                    {roomData.isPaused && (
                        <div className="absolute inset-0 z-[60] bg-slate-900/80 backdrop-blur-md flex flex-col items-center justify-center animate-in fade-in p-4">
                            <div className="bg-slate-800 p-8 md:p-10 rounded-3xl shadow-2xl border border-slate-600 text-center flex flex-col items-center max-w-sm w-full mx-auto">
                                <Pause size={64} className="text-white mb-6 opacity-80" />
                                <h2 className="text-4xl font-black text-white tracking-widest mb-8">PAUSADO</h2>
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => updateGame({ isPaused: false })} className="w-full py-4 bg-blue-500 hover:bg-blue-400 text-white rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                        <Play size={20} fill="currentColor" /> VOLVER AL JUEGO
                                    </button>
                                    {isS1 && (
                                        <button onClick={startGame} className="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                            <RotateCcw size={20} /> REINICIAR EL JUEGO
                                        </button>
                                    )}
                                    <button onClick={handleEndGame} className="w-full py-4 bg-red-500 hover:bg-red-400 text-white rounded-xl font-bold text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                                        <Home size={20} /> FINALIZAR JUEGO
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {roomData.penaltyData && (
                        <div className="absolute inset-0 z-50 bg-slate-900/95 backdrop-blur-sm flex flex-col items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl border-4 border-red-500 max-w-2xl w-full flex flex-col max-h-[95vh] relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-red-500 shrink-0"></div>
                                <div className="shrink-0 text-center">
                                    <div className="bg-red-500/20 text-red-400 w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                                        <BookOpen size={36} />
                                    </div>
                                    <h2 className="text-3xl md:text-4xl font-black text-white mb-4 uppercase">
                                        ¡Oops, {roomData.playerNames?.[roomData.players[`j${roomData.penaltyData.player}`]] || `Jugador ${roomData.penaltyData.player}`}!
                                    </h2>
                                </div>
                                
                                <div className="overflow-y-auto custom-scrollbar pr-2 pb-4 flex-1">
                                    <div className="bg-red-500/20 border border-red-500 p-4 rounded-xl mb-6 flex items-center gap-3 animate-pulse">
                                        <AlertTriangle className="text-red-400 shrink-0" size={32} />
                                        <p className="text-red-200 font-bold text-lg text-left">Respuesta incorrecta. ¡Pierdes tu turno!</p>
                                    </div>

                                    <div className="bg-slate-900 p-4 md:p-6 rounded-2xl mb-6 shadow-inner border border-slate-700 text-center">
                                        <p className="text-xl text-slate-300 mb-4">Eligió <strong>{roomData.penaltyData.wrongArticle.toUpperCase()}</strong>, pero la respuesta correcta es:</p>
                                        <div className="flex flex-col md:flex-row justify-center items-center gap-4 text-3xl md:text-4xl font-black">
                                            <span className={`${ARTICLE_TEXT_COLORS[roomData.penaltyData.correctArticle]} ${ARTICLE_COLORS_STATIC[roomData.penaltyData.correctArticle]} px-4 py-2 rounded-xl shadow-lg uppercase text-center`}>
                                                {roomData.penaltyData.correctArticlesDisplay}
                                            </span>
                                            <span className="text-white bg-slate-700 px-6 py-2 rounded-xl border-2 border-slate-600 text-center break-words max-w-full">
                                                {roomData.penaltyData.playedWord}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="text-left bg-blue-900/30 border border-blue-500/30 p-5 rounded-xl">
                                        <h3 className="text-blue-400 font-bold mb-2 flex items-center gap-2"><BookOpen size={18} /> Grammar Rule:</h3>
                                        <p className="text-slate-200 leading-relaxed whitespace-pre-line text-lg">{roomData.penaltyData.explanation}</p>
                                    </div>
                                </div>

                                <div className="shrink-0 pt-4 mt-2 border-t border-slate-700/50">
                                    <button onClick={closePenaltyModal} className="px-6 py-4 bg-red-500 hover:bg-red-400 text-white rounded-xl font-bold text-xl md:text-2xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 mx-auto w-full">
                                        Aceptar y Pasar Turno
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- PANEL SUPERIOR: SELECTORES Y RANDOMIZADOR --- */}
                    <div className="bg-slate-800 border-b border-slate-700 p-4 shadow-md z-10 flex flex-col justify-center items-center relative">
                        <div className="absolute top-4 left-4 z-20 text-xs font-bold text-slate-500 flex items-center gap-2">
                            <Users size={14}/> Sala: {roomId}
                        </div>

                        <div className="text-center font-black text-2xl text-yellow-400 tracking-wider mb-4 drop-shadow-lg uppercase">
                            ¡Turno de {roomData.playerNames?.[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`}!
                        </div>

                        <div className="flex gap-4 p-3 bg-slate-900 rounded-3xl shadow-inner border border-slate-700">
                            {['el', 'la', 'los', 'las'].map((article) => {
                                const isHighlight = roomData.currentArticle === article || flashArticle === article;
                                const colorClass = isHighlight ? ARTICLE_COLORS_STATIC[article] + ' scale-110 shadow-2xl z-10 ring-4 ring-white' : ARTICLE_COLORS_STATIC[article] + ' opacity-30 scale-90 grayscale';

                                return (
                                    <div key={article} className={`w-16 h-20 md:w-20 md:h-24 rounded-xl font-black text-2xl md:text-3xl uppercase border-b-4 transform transition-all duration-[50ms] flex items-center justify-center ${colorClass} ${ARTICLE_TEXT_COLORS[article]}`}>
                                        {article}
                                    </div>
                                )
                            })}
                        </div>

                        {isSelectorRole && (
                            <div className="mt-6 h-12 flex justify-center">
                                {(!roomData.currentArticle && !roomData.isRandomizing) ? (
                                    <button onClick={handleRandomize} className="px-8 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 rounded-full font-black text-white shadow-xl hover:shadow-2xl animate-bounce flex items-center gap-2">
                                        <Dices size={24} /> GIRAR ARTÍCULO
                                    </button>
                                ) : roomData.currentArticle ? (
                                    <div className="text-slate-400 font-bold flex items-center gap-2">
                                        Esperando a que {roomData.playerNames?.[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`} tire su carta...
                                    </div>
                                ) : null}
                            </div>
                        )}
                    </div>

                    {/* --- MESA CENTRAL --- */}
                    <div className="flex-1 bg-green-800 relative flex items-center justify-center shadow-inner overflow-hidden border-y-8 border-green-900">
                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle, #fff 10%, transparent 11%)', backgroundSize: '20px 20px' }}></div>
                        <div className="w-64 h-64 md:w-96 md:h-96 border-4 border-green-700/50 rounded-full absolute flex items-center justify-center">
                            <div className="text-green-700/30 font-black text-6xl md:text-8xl rotate-12 select-none">UNO</div>
                        </div>

                        <div className="absolute left-4 md:left-12 top-1/2 transform -translate-y-1/2 hidden sm:flex flex-col items-center">
                            <div className="relative w-24 h-36 bg-slate-800 rounded-xl border-4 border-slate-700 shadow-xl flex items-center justify-center text-slate-500 rotate-[-5deg]">
                                <span className="font-bold">MAZO</span>
                                {roomData.deck.length > 1 && <div className="absolute inset-0 bg-slate-800 rounded-xl shadow-xl transform translate-x-1 translate-y-1 -z-10"></div>}
                                {roomData.deck.length > 2 && <div className="absolute inset-0 bg-slate-800 rounded-xl shadow-xl transform translate-x-2 translate-y-2 -z-20"></div>}
                            </div>
                            <span className="mt-4 bg-black/50 text-white px-3 py-1 rounded-full text-xs font-bold">{roomData.deck.length} cartas</span>
                        </div>

                        <div className="relative z-10 flex flex-col items-center justify-center">
                            <div className={`absolute -top-20 transition-all duration-300 transform ${localFeedback.visible ? 'translate-y-0 opacity-100 scale-100' : 'translate-y-4 opacity-0 scale-95'}`}>
                                {localFeedback.visible && (
                                    <div className={`px-6 py-3 rounded-full font-bold text-white shadow-xl flex items-center gap-2 ${localFeedback.type === 'success' ? 'bg-green-500' : localFeedback.type === 'error' ? 'bg-red-500' : localFeedback.type === 'alert' ? 'bg-blue-500 animate-pulse' : 'bg-slate-800'}`}>
                                        {localFeedback.type === 'success' && <CheckCircle size={20} />}
                                        {localFeedback.type === 'alert' && <Zap size={20} />}
                                        {localFeedback.text}
                                    </div>
                                )}
                            </div>

                            <div className="relative w-40 h-56 md:w-48 md:h-64 flex items-center justify-center">
                                {roomData.tableCard ? (
                                    <div className={`w-full h-full rounded-2xl shadow-2xl flex flex-col items-center justify-center border-8 transition-all duration-500 transform rotate-[-2deg] scale-105 animate-in fade-in zoom-in-50 ${ARTICLE_COLORS_STATIC[roomData.tableCard.article]} bg-white`}>
                                        <div className={`text-xl md:text-2xl font-black mb-2 uppercase ${ARTICLE_TEXT_COLORS[roomData.tableCard.article] === 'text-white' ? 'text-white/80' : 'text-gray-800/80'}`}>
                                            {roomData.tableCard.article}
                                        </div>
                                        <div className="bg-white px-4 py-6 md:py-8 w-11/12 rounded-xl flex items-center justify-center shadow-inner">
                                            <span className="text-xl md:text-2xl font-extrabold text-slate-800 text-center break-words">
                                                {roomData.tableCard.word}
                                            </span>
                                        </div>
                                    </div>
                                ) : roomData.currentArticle ? (
                                    <div className={`w-full h-full rounded-2xl shadow-2xl flex items-center justify-center border-8 border-white/20 animate-pulse ${ARTICLE_COLORS_STATIC[roomData.currentArticle]}`}>
                                        <span className={`text-6xl font-black uppercase tracking-widest ${ARTICLE_TEXT_COLORS[roomData.currentArticle]} opacity-90`}>{roomData.currentArticle}</span>
                                    </div>
                                ) : (
                                    <div className="w-full h-full rounded-2xl border-4 border-dashed border-green-700/50 flex flex-col items-center justify-center text-green-700/50 p-4 text-center">
                                        <span className="font-bold text-lg mb-2">ESPERANDO GIRO</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* --- PANEL INFERIOR: JUGADORES --- */}
                    <div className="bg-slate-800 h-[22rem] md:h-[26rem] flex border-t border-slate-700 shadow-[0_-10px_20px_rgba(0,0,0,0.3)] relative">
                        <div className="absolute left-1/2 top-0 bottom-0 w-1 bg-slate-900 shadow-inner z-20"></div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-slate-900 rounded-full p-2 z-20 shadow-xl border border-slate-700">
                            <Zap className="text-yellow-400" size={24} />
                        </div>

                        {/* Área Jugador 1 */}
                        <div className={`flex-1 flex flex-col relative p-2 overflow-hidden border-r border-slate-900/50 ${roomData.turn !== 1 ? 'opacity-50 grayscale pointer-events-none' : 'ring-inset ring-4 ring-green-500'}`}>
                            <div className="flex justify-between items-center px-4 py-2 bg-slate-900/50 rounded-lg mb-2 z-10 shrink-0">
                                <div className="flex items-center gap-2">
                                    <div className="bg-blue-500 p-1.5 rounded-full"><User size={16} className="text-white"/></div>
                                    <span className="font-bold text-white hidden sm:inline truncate max-w-[150px]">{roomData.playerNames?.[roomData.players.j1] || 'Jugador 1'} {isJ1 ? '(Tú)' : ''}</span>
                                    <span className="font-bold text-white sm:hidden">J1</span>
                                </div>
                                <div className="flex gap-2 items-center">
                                    <span className="bg-slate-700 text-white text-xs px-2 py-1 rounded-full font-mono">{roomData.player1Hand?.length || 0}</span>
                                    <button onClick={() => handleDrawCard(1)} disabled={!isJ1 || roomData.turn !== 1 || !roomData.currentArticle} className="bg-slate-600 hover:bg-slate-500 disabled:opacity-50 text-white p-1 rounded-md transition-colors" title="Robar carta">+1 Mazo</button>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto overflow-x-hidden pr-2 custom-scrollbar">
                                <div className="flex flex-wrap content-start justify-center gap-3 pb-4">
                                    {roomData.player1Hand?.map((card, idx) => {
                                        if (!isJ1 && !isSelectorRole) return renderHiddenCard(idx);
                                        const disabled = !roomData.currentArticle || roomData.turn !== 1 || !isJ1;
                                        
                                        return (
                                            <button key={idx} onClick={() => handlePlayCard(1, idx)} disabled={disabled} className={`w-20 h-28 md:w-24 md:h-32 bg-white rounded-xl shadow-md border-2 border-slate-200 flex items-center justify-center transform transition-all duration-200 relative shrink-0 ${!disabled ? 'hover:scale-105 hover:shadow-xl hover:border-blue-400 hover:z-10 cursor-pointer' : 'opacity-80 cursor-not-allowed'}`}>
                                                <div className="absolute inset-1 border border-slate-100 rounded-lg pointer-events-none"></div>
                                                <span className="font-bold text-slate-800 text-sm md:text-base px-1 text-center break-words leading-tight">{card.word}</span>
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Área Jugador 2 */}
                        <div className={`flex-1 flex flex-col relative p-2 overflow-hidden ${roomData.turn !== 2 ? 'opacity-50 grayscale pointer-events-none' : 'ring-inset ring-4 ring-green-500'}`}>
                            <div className="flex justify-between items-center px-4 py-2 bg-slate-900/50 rounded-lg mb-2 z-10 shrink-0">
                                <div className="flex gap-2 items-center">
                                    <button onClick={() => handleDrawCard(2)} disabled={!isJ2 || roomData.turn !== 2 || !roomData.currentArticle} className="bg-slate-600 hover:bg-slate-500 disabled:opacity-50 text-white p-1 rounded-md transition-colors" title="Robar carta">+1 Mazo</button>
                                    <span className="bg-slate-700 text-white text-xs px-2 py-1 rounded-full font-mono">{roomData.player2Hand?.length || 0}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="font-bold text-white hidden sm:inline truncate max-w-[150px]">{roomData.playerNames?.[roomData.players.j2] || 'Jugador 2'} {isJ2 ? '(Tú)' : ''}</span>
                                    <span className="font-bold text-white sm:hidden">J2</span>
                                    <div className="bg-red-500 p-1.5 rounded-full"><User size={16} className="text-white"/></div>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto overflow-x-hidden pl-2 custom-scrollbar" dir="rtl">
                                <div className="flex flex-wrap content-start justify-center gap-3 pb-4" dir="ltr">
                                    {roomData.player2Hand?.map((card, idx) => {
                                        if (!isJ2 && !isSelectorRole) return renderHiddenCard(idx);
                                        const disabled = !roomData.currentArticle || roomData.turn !== 2 || !isJ2;

                                        return (
                                            <button key={idx} onClick={() => handlePlayCard(2, idx)} disabled={disabled} className={`w-20 h-28 md:w-24 md:h-32 bg-white rounded-xl shadow-md border-2 border-slate-200 flex items-center justify-center transform transition-all duration-200 relative shrink-0 ${!disabled ? 'hover:scale-105 hover:shadow-xl hover:border-red-400 hover:z-10 cursor-pointer' : 'opacity-80 cursor-not-allowed'}`}>
                                                <div className="absolute inset-1 border border-slate-100 rounded-lg pointer-events-none"></div>
                                                <span className="font-bold text-slate-800 text-sm md:text-base px-1 text-center break-words leading-tight">{card.word}</span>
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>

                    </div>

                    {roomData.gameState === 'GAME_OVER' && (
                        <div className="absolute inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in">
                            <div className="bg-slate-800 p-10 rounded-3xl shadow-2xl border-4 border-yellow-400 text-center max-w-lg w-11/12 transform hover:scale-105 transition-transform">
                                <div className="text-yellow-400 mb-4 flex justify-center"><RotateCcw size={64} className="animate-spin-slow" /></div>
                                <h2 className="text-5xl font-black text-white mb-2 tracking-tight uppercase">¡Juego Terminado!</h2>
                                <p className="text-2xl text-slate-300 mb-8 font-medium">El ganador es: <br/><span className="text-4xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600 font-black mt-2 inline-block">{roomData.winner}</span></p>
                                {isS1 ? (
                                    <button onClick={startGame} className="px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 rounded-full font-black text-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 mx-auto w-full"><RotateCcw size={24} /> VOLVER A JUGAR</button>
                                ) : (
                                    <p className="text-slate-400">Esperando a que el Maestro inicie otra partida...</p>
                                )}
                            </div>
                        </div>
                    )}

                    <style dangerouslySetInnerHTML={{__html: `
                        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 1); }
                        .animate-spin-slow { animation: spin 8s linear infinite; }
                    `}} />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<UnoGame />);
    </script>
</body>
</html>

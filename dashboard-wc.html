<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .animate-popIn { animation: popIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Dices, Save, ArrowLeft, Loader2, Sun, Moon, Sparkles, KeyRound, Search, RefreshCw, Wand2, X, Tags } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TAXONOMY={
            basic:{
                grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)", "Otro"],
                verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival", "Otro"],
                nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway", "Otro"],
                adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste", "Otro"],
                key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs", "Otro"],
                otro: ["Otro"]
            },
            advanced:{
                grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention", "Otro"],
                verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound", "Otro"],
                nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science", "Otro"],
                adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives", "Otro"],
                key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice", "Otro"],
                otro: ["Otro"]
            },
            pro:{
                grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals", "Otro"],
                verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations", "Otro"],
                nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic", "Otro"],
                adjectives:["Formal Register Adj.","Nuance & Tone Adj.", "Otro"],
                key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives", "Otro"],
                otro: ["Otro"]
            },
            otro: {
                otro: ["Otro"]
            }
        };

        const NEW_LEVELS = ["B1", "B2", "B-MIX", "A1", "A2", "A-MIX", "P1", "P2", "P-MIX"];
        const NEW_CATS = [
            { id: 'grammar', label: 'Grammar' },
            { id: 'verbs', label: 'Verb Mastery' },
            { id: 'nouns', label: 'Noun Mastery' },
            { id: 'adjectives', label: 'Vocab Mastery (Adj)' },
            { id: 'key_structs', label: 'Key Structures' },
            { id: 'otro', label: 'Otro (Macro Skills)' }
        ];
        const MACRO_SKILLS = ["Speaking", "Listening", "Reading", "Grammar", "Vocabulary", "Pronunciation"];

        const getAllTopicsForCategory = (categoryId, selectedLevels) => {
            let topics = [];
            const activeDbKeys = new Set();
            selectedLevels.forEach(lvl => {
                if (lvl.startsWith('B')) activeDbKeys.add('basic');
                if (lvl.startsWith('A')) activeDbKeys.add('advanced');
                if (lvl.startsWith('P')) activeDbKeys.add('pro');
            });
            activeDbKeys.forEach(dbKey => {
                if (TAXONOMY[dbKey] && TAXONOMY[dbKey][categoryId]) topics.push(...TAXONOMY[dbKey][categoryId]);
            });
            return [...new Set(topics)];
        };

        const Dashboard = () => {
            const [gameTitle, setGameTitle] = useState("");
            const [categories, setCategories] = useState(["", "", "", ""]);
            const [words, setWords] = useState([[], [], [], []]);
            
            // IA & API State (Standardized)
            const [apiKey, setApiKey] = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [showApiSection, setShowApiSection] = useState(false);
            
            const [isGeneratingAll, setIsGeneratingAll] = useState(false);
            const [generatingIndex, setGeneratingIndex] = useState(null); 
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels] = useState([]);
            const [saveCats, setSaveCats] = useState([]);
            const [saveTopics, setSaveTopics] = useState([]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
                
                const savedKey = localStorage.getItem('periplo_google_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    fetchModelsSilent(savedKey);
                }

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            setEditingId(editId);
                            if (data.content && data.content.categories) {
                                setCategories(data.content.categories.map(c => c.name));
                                setWords(data.content.categories.map(c => c.words));
                            }
                            if (data.tags) {
                                setSaveLevels(data.tags.levels || (data.tags.level ? [data.tags.level.toUpperCase()] : []));
                                setSaveCats(data.tags.categories || (data.tags.category ? [data.tags.category] : []));
                                setSaveTopics(data.tags.topics || (data.tags.topic ? [data.tags.topic] : []));
                            }
                        }
                    });
                }
            }, []);

            const fetchModelsSilent = async (key) => {
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key.trim()}`);
                    if (!r.ok) return;
                    const d = await r.json();
                    const valid = d.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(valid);
                    if (valid.length > 0) {
                        const preferred = valid.find(m => m.includes("gemini-2.0-flash")) || valid.find(m => m.includes("gemini-1.5-flash")) || valid[0];
                        setSelectedModel(preferred);
                    }
                } catch(e) {}
            };

            const fetchModels = async () => {
                if (!apiKey.trim()) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey.trim()}`);
                    if (!r.ok) throw new Error("Error conectando con Google");
                    const d = await r.json();
                    const valid = d.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(valid);
                    if (valid.length > 0) {
                        const preferred = valid.find(m => m.includes("gemini-2.0-flash")) || valid.find(m => m.includes("gemini-1.5-flash")) || valid[0];
                        setSelectedModel(preferred);
                    }
                } catch(e) { alert(e.message); }
                finally { setIsLoadingModels(false); }
            };

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);

            const generateAllWithAI = async () => {
                if (!apiKey.trim()) { setShowApiSection(true); return alert("⚠️ Ingresa tu API Key."); }
                if (!selectedModel) { setShowApiSection(true); return alert("⚠️ Escanea y selecciona un modelo."); }
                if (categories.some(c => c.trim() === "")) return alert("Por favor, ponle nombre a las 4 categorías primero.");

                setIsGeneratingAll(true);
                try {
                    const prompt = `Genera 4 listas de palabras. Las categorías son: "${categories[0]}", "${categories[1]}", "${categories[2]}", "${categories[3]}". Cada lista debe tener exactamente 19 palabras. No repitas palabras entre listas. Responde ÚNICAMENTE con un objeto JSON válido con esta estructura exacta: { "0": ["w1", "w2"], "1": ["w1", "w2"], "2": ["w1", "w2"], "3": ["w1", "w2"] } sin formato markdown ni explicaciones.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(resultText);
                    setWords([parsedData["0"], parsedData["1"], parsedData["2"], parsedData["3"]]);
                } catch (error) {
                    alert("Error generando con la IA. Verifica tu API Key y modelo.");
                } finally {
                    setIsGeneratingAll(false);
                }
            };

            const generateSingleCategory = async (index) => {
                if (!apiKey.trim()) { setShowApiSection(true); return alert("⚠️ Ingresa tu API Key."); }
                if (!selectedModel) { setShowApiSection(true); return alert("⚠️ Escanea y selecciona un modelo."); }
                if (!categories[index].trim()) return alert("Ponle nombre a esta categoría primero.");

                setGeneratingIndex(index);
                try {
                    const prompt = `Genera una lista de exactamente 19 palabras para la categoría "${categories[index]}". Asegúrate de que encajen en el tema. Responde ÚNICAMENTE con un array JSON válido de strings, por ejemplo: ["palabra1", "palabra2", "palabra3"] sin formato markdown ni texto extra.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(resultText);
                    const newWords = [...words];
                    newWords[index] = parsedData;
                    setWords(newWords);
                } catch (error) {
                    alert("Error recargando la categoría.");
                } finally {
                    setGeneratingIndex(null);
                }
            };

            const handleWordsChange = (index, value) => {
                const newWords = [...words];
                newWords[index] = value.split('\n'); 
                setWords(newWords);
            };

            const handlePreSave = () => {
                if (!gameTitle) return alert("Ponle un título al juego");
                if (categories.some(c => c.trim() === "")) return alert("Nombra las 4 categorías.");
                const cleanedWords = words.map(list => list.map(w => w.trim()).filter(w => w !== ""));
                if (cleanedWords.some(w => w.length < 15)) return alert("Te recomiendo tener al menos 15 palabras por categoría para armar el mazo completo.");
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                const cleanedWords = words.map(list => list.map(w => w.trim()).filter(w => w !== ""));
                try {
                    const content = { categories: categories.map((name, i) => ({ id: i, name, words: cleanedWords[i] })) };
                    const tags = {
                        levels: saveLevels,
                        categories: saveCats,
                        topics: saveTopics,
                        level: saveLevels.length > 0 && saveLevels[0].startsWith('A') ? 'advanced' : saveLevels.length > 0 && saveLevels[0].startsWith('P') ? 'pro' : 'basic',
                        category: saveCats.length > 0 ? saveCats[0] : 'grammar',
                        topic: saveTopics.length > 0 ? saveTopics[0] : 'mixed'
                    };
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { 
                            title: gameTitle, content: content, tags: tags, updatedAt: serverTimestamp() 
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), { 
                            title: gameTitle, type: 'UNO', content: content, tags: tags, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { 
                    alert("Error guardando: " + e.message); 
                    setIsSaving(false);
                }
            };

            return (
                <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950">
                    {/* MODAL CLASIFICACIÓN (No cambia) */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col animate-popIn">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-white"><Tags className="text-indigo-400"/> Clasificar Mazo UNO</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition"><X size={20}/></button>
                                </div>
                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">
                                    <div>
                                        <label className="block text-xs font-black text-indigo-400 uppercase tracking-widest mb-3">1. Niveles</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button key={lvl} onClick={() => { if(saveLevels.includes(lvl)) setSaveLevels(saveLevels.filter(i=>i!==lvl)); else setSaveLevels([...saveLevels, lvl]); }} className={`px-4 py-2 rounded-xl font-bold text-sm border-2 ${saveLevels.includes(lvl) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-indigo-500 hover:text-indigo-300'}`}>{lvl}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categorías</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button key={cat.id} onClick={() => { if(saveCats.includes(cat.id)) setSaveCats(saveCats.filter(i=>i!==cat.id)); else setSaveCats([...saveCats, cat.id]); }} className={`px-4 py-2 rounded-xl font-bold text-sm border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>{cat.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">3. Temas Disponibles</label>
                                            {saveCats.map(catId => {
                                                const topics = getAllTopicsForCategory(catId, saveLevels);
                                                if (topics.length === 0) return null;
                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{NEW_CATS.find(c=>c.id===catId)?.label}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button key={topic} onClick={() => { if(saveTopics.includes(topic)) setSaveTopics(saveTopics.filter(i=>i!==topic)); else setSaveTopics([...saveTopics, topic]); }} className={`px-3 py-1.5 rounded-lg font-bold text-xs border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>{topic}</button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                                <button onClick={executeFinalSave} disabled={isSaving || saveLevels.length === 0 || saveCats.length === 0} className="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} 
                                    {(saveLevels.length === 0 || saveCats.length === 0) ? "Faltan datos de clasificación" : "Confirmar y Guardar"}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* HEADER ESTANDARIZADO */}
                    <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-md z-10 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl transition"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><Dices/> UNO Builder IA</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiSection(!showApiSection)}
                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${selectedModel ? 'border-emerald-600 text-emerald-400 bg-emerald-900/20' : 'border-zinc-700 text-zinc-400'}`}>
                                <KeyRound size={13}/>
                                {selectedModel ? selectedModel.replace('models/','').split('-').slice(0,3).join('-') : 'IA Off'}
                            </button>
                            <button onClick={() => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); }} className="text-amber-500"><Sun size={20}/></button>
                        </div>
                    </div>

                    {/* PANEL IA DINÁMICO */}
                    {showApiSection && (
                        <div className="border-b border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900/80 px-6 py-3 flex flex-col sm:flex-row items-center gap-3 shrink-0">
                            <div className="flex items-center gap-2 flex-1 bg-slate-100 dark:bg-zinc-950 border border-slate-300 dark:border-zinc-700 rounded-xl px-3 py-2">
                                <KeyRound size={15} className="text-zinc-500 shrink-0"/>
                                <input type="password" placeholder="Gemini API Key..." value={apiKey}
                                    onChange={e => { setApiKey(e.target.value); localStorage.setItem('periplo_google_key', e.target.value); }}
                                    className="bg-transparent text-sm font-mono w-full outline-none dark:text-white placeholder-zinc-500"/>
                            </div>
                            <button onClick={fetchModels} disabled={isLoadingModels || !apiKey}
                                className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white rounded-xl text-xs font-black shrink-0">
                                {isLoadingModels ? <Loader2 size={14} className="animate-spin"/> : <Search size={14}/>}
                                {isLoadingModels ? 'Buscando...' : 'Escanear modelos'}
                            </button>
                            {availableModels.length > 0 && (
                                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)}
                                    className="bg-zinc-950 border border-zinc-700 rounded-xl px-3 py-2 text-xs font-bold text-white outline-none shrink-0">
                                    {availableModels.map(m => <option key={m} value={m}>{m.replace('models/','')}</option>)}
                                </select>
                            )}
                        </div>
                    )}
                    
                    <div className="flex-1 overflow-y-auto p-6 max-w-6xl mx-auto w-full custom-scrollbar relative">
                        <input value={gameTitle} onChange={e => setGameTitle(e.target.value)} className="text-4xl font-black w-full border-b-4 border-slate-300 dark:border-zinc-800 pb-2 mb-8 bg-transparent outline-none focus:border-indigo-500 dark:text-white placeholder-zinc-700" placeholder="Nombre del Mazo..."/>
                        
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2"><Sparkles className="text-yellow-500"/> Categorías (Colores)</h2>
                            <button onClick={generateAllWithAI} disabled={isGeneratingAll || generatingIndex !== null} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg transition active:scale-95 disabled:opacity-50">
                                {isGeneratingAll ? <Loader2 className="animate-spin"/> : <Sparkles/>} Autocompletar Todo
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-24">
                            {[
                                { color: 'blue', border: 'border-blue-500', bg: 'bg-blue-50 dark:bg-blue-900/10' },
                                { color: 'red', border: 'border-red-500', bg: 'bg-red-50 dark:bg-red-900/10' },
                                { color: 'yellow', border: 'border-yellow-400', bg: 'bg-yellow-50 dark:bg-yellow-900/10' },
                                { color: 'green', border: 'border-green-500', bg: 'bg-green-50 dark:bg-green-900/10' }
                            ].map((c, i) => {
                                const validWordsCount = words[i].filter(w => w.trim() !== '').length;
                                return (
                                    <div key={i} className={`p-5 rounded-3xl border-2 ${c.border} ${c.bg} shadow-sm relative`}>
                                        <div className="flex gap-2">
                                            <input value={categories[i]} onChange={e => { const nc = [...categories]; nc[i] = e.target.value; setCategories(nc); }} placeholder={`Categoría ${i+1}`} className="flex-1 text-xl font-black bg-white dark:bg-zinc-900 dark:text-white p-3 rounded-xl mb-3 outline-none border border-slate-200 dark:border-zinc-700 focus:border-indigo-500 placeholder-slate-400"/>
                                            <button onClick={() => generateSingleCategory(i)} disabled={generatingIndex !== null || isGeneratingAll} className="h-12 w-12 flex items-center justify-center bg-indigo-100 hover:bg-indigo-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 text-indigo-600 dark:text-indigo-300 rounded-xl transition-colors shrink-0 disabled:opacity-50">
                                                {generatingIndex === i ? <Loader2 size={20} className="animate-spin"/> : <Wand2 size={20}/>}
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-500 dark:text-zinc-400 mb-2 font-bold px-1 flex justify-between">
                                            <span>Una palabra por línea:</span>
                                            <span className={validWordsCount < 15 ? 'text-rose-500' : 'text-emerald-500'}>{validWordsCount}/19 palabras</span>
                                        </p>
                                        <textarea 
                                            value={words[i].join('\n')} 
                                            onChange={e => handleWordsChange(i, e.target.value)} 
                                            className="w-full h-48 bg-white dark:bg-zinc-900 dark:text-white p-3 rounded-xl text-sm outline-none border border-slate-200 dark:border-zinc-700 resize-none custom-scrollbar placeholder-slate-400" 
                                            placeholder="palabra 1&#10;palabra 2..."
                                        ></textarea>
                                    </div>
                                );
                            })}
                        </div>
                        
                        <div className="absolute bottom-8 right-8 z-50">
                            <button onClick={handlePreSave} disabled={isSaving} className="bg-emerald-500 hover:bg-emerald-400 text-white p-5 rounded-full shadow-[0_10px_25px_rgba(16,185,129,0.5)] transform transition active:scale-95 flex items-center justify-center disabled:opacity-50">
                                {isSaving ? <Loader2 className="animate-spin" size={28}/> : <Save size={28}/>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

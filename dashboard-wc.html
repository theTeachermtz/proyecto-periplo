<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☄️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Zap, Save, ArrowLeft, Loader2, Sparkles, KeyRound, X, ListRestart, CheckCircle2, Search, Tags, Building2, Waves, Combine } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TAXONOMY={
            basic:{
                grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)", "Otro"],
                verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival", "Otro"],
                nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway", "Otro"],
                adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste", "Otro"],
                key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs", "Otro"],
                otro: ["Otro"]
            },
            advanced:{
                grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention", "Otro"],
                verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound", "Otro"],
                nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science", "Otro"],
                adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives", "Otro"],
                key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice", "Otro"],
                otro: ["Otro"]
            },
            pro:{
                grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals", "Otro"],
                verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations", "Otro"],
                nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic", "Otro"],
                adjectives:["Formal Register Adj.","Nuance & Tone Adj.", "Otro"],
                key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives", "Otro"],
                otro: ["Otro"]
            },
            otro: { otro: ["Otro"] }
        };

        const CATEGORY_STYLES = [
            { id: 0, label: 'Azul', color: 'text-blue-400', border: 'border-blue-500/50', bg: 'bg-blue-500/10' },
            { id: 1, label: 'Rojo', color: 'text-red-400', border: 'border-red-500/50', bg: 'bg-red-500/10' },
            { id: 2, label: 'Amarillo', color: 'text-yellow-400', border: 'border-yellow-500/50', bg: 'bg-yellow-500/10' },
            { id: 3, label: 'Verde', color: 'text-green-400', border: 'border-green-500/50', bg: 'bg-green-500/10' }
        ];

        const DashboardWC = () => {
            const [view, setView] = useState('bulk'); 
            const [gameTitle, setGameTitle] = useState("");
            const [categories, setCategories] = useState(["", "", "", ""]);
            const [rawWords, setRawWords] = useState(["", "", "", ""]); 
            const [items, setItems] = useState([[], [], [], []]); 
            const [activeTab, setActiveTab] = useState(0);
            
            const [editingId, setEditingId] = useState(null);
            const [originalType, setOriginalType] = useState('WordCascade');
            
            // API & Modelos
            const [apiKey, setApiKey] = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [showApiModal, setShowApiModal] = useState(false);
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            // TAXONOMÍA STATE
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevel, setSaveLevel] = useState('basic');
            const [saveCat, setSaveCat] = useState('grammar');
            const [saveTopic, setSaveTopic] = useState(TAXONOMY['basic']['grammar'][0]);

            const abortControllerRef = useRef(null);

            // AUTO-FETCH AL CARGAR
            useEffect(() => {
                const savedKey = localStorage.getItem('periplo_google_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    fetchModelsSilent(savedKey);
                }

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            setEditingId(editId);
                            setOriginalType(data.type || 'WordCascade');
                            
                            if (data.content?.categories) {
                                setCategories(data.content.categories.map(c => c.name));
                                setItems(data.content.categories.map(c => c.items || []));
                                setRawWords(data.content.categories.map(c => (c.items || []).map(i => i.en || i.word).join('\n')));
                            }
                            if (data.tags) {
                                setSaveLevel(data.tags.level || 'basic');
                                setSaveCat(data.tags.category || 'grammar');
                                setSaveTopic(data.tags.topic || TAXONOMY['basic']['grammar'][0]);
                            }
                            
                            // 🚀 MAGIA: Si estamos editando, saltamos directo a la vista de revisión procesada
                            setView('review');
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[saveLevel] && TAXONOMY[saveLevel][saveCat]) {
                    setSaveTopic(TAXONOMY[saveLevel][saveCat][0] || 'mixed');
                }
            }, [saveLevel, saveCat]);

            const handleApiKeyChange = (e) => {
                const val = e.target.value;
                setApiKey(val);
                localStorage.setItem('periplo_google_key', val);
            };

            const fetchModelsSilent = async (key) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key.trim()}`);
                    if (!response.ok) return;
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels.find(m => m.includes("gemini-2.0")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { console.error("Error auto-fetching models:", e); } 
            };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey.trim()}`);
                    if (!response.ok) throw new Error("Error conectando con Google. Verifica tu API Key.");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels.find(m => m.includes("gemini-2.0")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { alert(e.message); } 
                finally { setIsLoadingModels(false); }
            };

            const cancelMagia = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    setIsGenerating(false);
                }
            };

            const generateWithAI = async () => {
                if (!apiKey.trim() || !selectedModel) {
                    setShowApiModal(true);
                    return alert("⚠️ Escanea y selecciona un modelo de Gemini primero para continuar.");
                }
                
                const hasTheme = gameTitle.trim() !== "";
                const hasCats = categories.some(c => c.trim() !== "");

                if (!hasTheme && !hasCats) return alert("Debes escribir al menos el Título General o los Títulos de las 4 Categorías para que la IA sepa de qué trata.");

                setIsGenerating(true);
                abortControllerRef.current = new AbortController();

                try {
                    const promptText = `
                    Actúa como experto en pedagogía y traductor bilingüe. Devuelve ÚNICAMENTE un JSON válido con esta estructura exacta:
                    {
                      "title": "Tema General",
                      "categories": [
                        { "name": "Cat 1", "items": [{"en": "Sun", "es": "Sol", "emoji": "☀️"}] },
                        { "name": "Cat 2", "items": [] },
                        { "name": "Cat 3", "items": [] },
                        { "name": "Cat 4", "items": [] }
                      ]
                    }

                    REGLAS OBLIGATORIAS:
                    1. Rango estricto: Cada categoría debe tener entre 15 y 20 pares de palabras únicas e irrepetibles.
                    2. Si el usuario te dio palabras en la lista bruta, úsalas. Tu trabajo es darles un formato perfecto de 3 partes: La palabra en Inglés ("en"), su traducción exacta al Español ("es") y un emoji representativo ("emoji").
                    3. Si el usuario dejó palabras vacías en alguna categoría, inventa el vocabulario para llenar los huecos (siempre en, es y emoji).
                    4. Si el Título General o el Nombre de una Categoría NO ES "(Vacío)", DEBES RESPETARLO y devolverlo exactamente igual.
                    5. Si falta el Título General, invéntalo basándote en los nombres de las categorías.
                    6. Si faltan los nombres de las categorías, invéntalos basándote en el Título General.

                    DATOS DEL USUARIO ACTUALES:
                    - Título General: ${hasTheme ? gameTitle : "(Vacío - Genéralo)"}
                    - Cat 1 (${categories[0] || "(Vacío - Genéralo)"}): \n${rawWords[0] || "(Vacío - Genera palabras)"}
                    - Cat 2 (${categories[1] || "(Vacío - Genéralo)"}): \n${rawWords[1] || "(Vacío - Genera palabras)"}
                    - Cat 3 (${categories[2] || "(Vacío - Genéralo)"}): \n${rawWords[2] || "(Vacío - Genera palabras)"}
                    - Cat 4 (${categories[3] || "(Vacío - Genéralo)"}): \n${rawWords[3] || "(Vacío - Genera palabras)"}
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                        }),
                        signal: abortControllerRef.current.signal
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const jsonString = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonString);

                    setGameTitle(parsedData.title);
                    setCategories([parsedData.categories[0].name, parsedData.categories[1].name, parsedData.categories[2].name, parsedData.categories[3].name]);
                    setItems([parsedData.categories[0].items, parsedData.categories[1].items, parsedData.categories[2].items, parsedData.categories[3].items]);
                    
                    setRawWords([
                        parsedData.categories[0].items.map(i => i.en || i.word).join('\n'),
                        parsedData.categories[1].items.map(i => i.en || i.word).join('\n'),
                        parsedData.categories[2].items.map(i => i.en || i.word).join('\n'),
                        parsedData.categories[3].items.map(i => i.en || i.word).join('\n')
                    ]);

                    setView('review'); 
                } catch (error) {
                    if (error.name === 'AbortError') console.log("Generación cancelada.");
                    else { alert("Error procesando con la IA.\n" + error.message); }
                } finally {
                    setIsGenerating(false);
                    abortControllerRef.current = null;
                }
            };

            const handlePreSave = () => {
                if (!gameTitle) return alert("Ponle un título al juego");
                if (categories.some(c => c.trim() === "")) return alert("Nombra las 4 categorías.");
                
                const validItemsCount = items.map(cat => cat.filter(i => (i.en || "").trim() !== "" && (i.es || "").trim() !== "").length);
                if (validItemsCount.some(count => count < 15)) {
                    if(!confirm("Algunas categorías tienen menos de 15 palabras. Estos juegos funcionan mejor con al menos 15. ¿Continuar?")) return;
                }
                
                setShowSaveModal(true);
            };

            const executeFinalSave = async (gameType) => {
                setShowSaveModal(false);
                setIsSaving(true);
                
                const cleanItems = items.map(cat => cat.filter(i => (i.en || "").trim() !== "" && (i.es || "").trim() !== ""));
                
                try {
                    const content = { categories: categories.map((name, i) => ({ id: i, name, items: cleanItems[i] })) };
                    const tags = { level: saveLevel, category: saveCat, topic: saveTopic };
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                    
                    const basePayload = { title: gameTitle, content: content, tags: tags, parentPath: parentPath };

                    if (gameType === 'BOTH') {
                        // Creación/Actualización en Cadena
                        if (editingId) {
                            // Actualizamos el original que abrimos
                            await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { ...basePayload, type: originalType, updatedAt: serverTimestamp() });
                            // Creamos un CLON del tipo opuesto
                            const otherType = originalType === 'WordCascade' ? 'WordBuildings' : 'WordCascade';
                            await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...basePayload, type: otherType, createdAt: serverTimestamp() });
                        } else {
                            // Creamos ambos desde cero
                            await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...basePayload, type: 'WordCascade', createdAt: serverTimestamp() });
                            await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...basePayload, type: 'WordBuildings', createdAt: serverTimestamp() });
                        }
                    } else {
                        // Guardado simple de 1 motor
                        if (editingId) {
                            await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { ...basePayload, type: gameType, updatedAt: serverTimestamp() });
                        } else {
                            await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...basePayload, type: gameType, createdAt: serverTimestamp() });
                        }
                    }
                    
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { 
                    alert("Error guardando: " + e.message); 
                } finally {
                    setIsSaving(false);
                }
            };

            return (
                <div className="h-screen flex flex-col dark:text-white bg-zinc-950 relative">
                    
                    {/* LOADING OVERLAY */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-indigo-500 mb-6" size={56}/>
                            <p className="text-indigo-400 font-bold uppercase tracking-widest mb-8">Traduciendo, asignando Emojis...</p>
                            <button onClick={cancelMagia} className="bg-rose-600 hover:bg-rose-500 text-white font-black px-6 py-3 rounded-full flex items-center gap-2 transition-all active:scale-95 shadow-xl">
                                <X size={20}/> CANCELAR IA
                            </button>
                        </div>
                    )}

                    {/* API KEY MODAL */}
                    {showApiModal && (
                        <div className="fixed inset-0 bg-black/90 z-[90] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden flex flex-col p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-xl text-white flex items-center gap-2"><KeyRound className="text-indigo-400"/> Configuración IA</h3>
                                    <button onClick={() => setShowApiModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-4 mb-6">
                                    <div className="w-full flex flex-col sm:flex-row items-center gap-2 bg-zinc-950 p-2 rounded-xl border border-zinc-700 focus-within:border-indigo-500 transition-colors">
                                        <div className="flex w-full items-center">
                                            <KeyRound size={16} className="text-zinc-500 mx-2 shrink-0"/>
                                            <input type="password" placeholder="Tu API Key de Gemini..." value={apiKey} onChange={handleApiKeyChange} className="bg-transparent text-white px-2 py-1 text-sm font-mono w-full focus:outline-none"/>
                                        </div>
                                        <button onClick={fetchModels} disabled={isLoadingModels || !apiKey} className="w-full sm:w-auto px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition-colors shrink-0 font-bold text-xs flex justify-center items-center gap-2">
                                            {isLoadingModels ? <Loader2 className="animate-spin" size={16}/> : <Search size={16}/>} Escanear Modelos
                                        </button>
                                    </div>
                                    {availableModels.length > 0 && (
                                        <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500 cursor-pointer">
                                            {availableModels.map(m => <option key={m} value={m}>{m.replace('models/', '')}</option>)}
                                        </select>
                                    )}
                                </div>
                                <button onClick={() => setShowApiModal(false)} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold transition-colors">Guardar y Cerrar</button>
                            </div>
                        </div>
                    )}

                    {/* DUAL SAVE MODAL */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-md p-6 shadow-2xl animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-black flex items-center gap-2 text-white"><Tags className="text-indigo-400"/> Clasificar y Guardar</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-4 mb-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">1. Nivel</label>
                                            <select value={saveLevel} onChange={e=>{setSaveLevel(e.target.value);const cats=Object.keys(TAXONOMY[e.target.value]||{});setSaveCat(cats[0]||'grammar');}}
                                                className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer">
                                                {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">2. Categoría</label>
                                            <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}
                                                className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer capitalize">
                                                {Object.keys(TAXONOMY[saveLevel]||{}).map(c=><option key={c} value={c}>{c.replace('_',' ')}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">3. Tema Específico</label>
                                        <select value={saveTopic} onChange={e=>setSaveTopic(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer">
                                            {(TAXONOMY[saveLevel]?.[saveCat]||[]).map(t=><option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3 pt-4 border-t border-zinc-800">
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest text-center">Opciones de Guardado</p>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => executeFinalSave('WordCascade')} disabled={isSaving} className="flex flex-col items-center justify-center text-center gap-2 p-4 rounded-xl border border-zinc-700 hover:border-indigo-500 hover:bg-indigo-500/10 transition group">
                                            <div className="text-indigo-400 group-hover:scale-110 transition"><Waves size={24}/></div>
                                            <div className="font-bold text-white text-sm">Solo Cascade</div>
                                        </button>
                                        
                                        <button onClick={() => executeFinalSave('WordBuildings')} disabled={isSaving} className="flex flex-col items-center justify-center text-center gap-2 p-4 rounded-xl border border-zinc-700 hover:border-emerald-500 hover:bg-emerald-500/10 transition group">
                                            <div className="text-emerald-400 group-hover:scale-110 transition"><Building2 size={24}/></div>
                                            <div className="font-bold text-white text-sm">Solo Buildings</div>
                                        </button>
                                    </div>

                                    {/* BOTÓN MÁGICO DE GUARDAR AMBOS EN CADENA */}
                                    <button onClick={() => executeFinalSave('BOTH')} disabled={isSaving} className="w-full flex items-center justify-between p-4 rounded-xl border border-amber-500/50 bg-amber-500/10 hover:bg-amber-500/20 hover:border-amber-500 transition group mt-2">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-amber-500/20 text-amber-400 p-2 rounded-lg group-hover:scale-110 transition"><Combine size={20}/></div>
                                            <div className="text-left">
                                                <div className="font-black text-amber-400 text-sm">Guardar AMBOS (Recomendado)</div>
                                                <div className="text-[10px] font-medium text-amber-500/70">Crea los dos juegos con esta misma base.</div>
                                            </div>
                                        </div>
                                    </button>
                                </div>
                                {isSaving && <div className="mt-4 text-center text-sm font-bold text-indigo-400 flex justify-center items-center gap-2"><Loader2 className="animate-spin" size={16}/> Guardando...</div>}
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900 z-10">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.history.back()} className="p-2 hover:bg-zinc-800 rounded-lg"><ArrowLeft size={20}/></button>
                            <h1 className="font-black text-indigo-400 flex items-center gap-2 tracking-tighter"><Zap size={18}/> DUAL BUILDER</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            {view === 'review' && (
                                <button onClick={() => setView('bulk')} className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition text-zinc-300">
                                    <ListRestart size={14}/> VOLVER A TEXTO
                                </button>
                            )}
                            {view === 'bulk' && (
                                <button onClick={generateWithAI} className="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition shadow-[0_0_15px_rgba(79,70,229,0.4)]">
                                    <Sparkles size={14}/> PROCESAR CON IA
                                </button>
                            )}
                            {view === 'review' && (
                                <button onClick={handlePreSave} className="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                                    <Save size={14}/> GUARDAR COMO...
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                        <div className="max-w-6xl mx-auto w-full space-y-6 pb-20">
                            
                            <input 
                                value={gameTitle} 
                                onChange={e => setGameTitle(e.target.value)}
                                placeholder="Tema General del Juego (ej: The Solar System)"
                                className="w-full bg-transparent text-3xl md:text-5xl font-black outline-none border-b-4 border-zinc-800 focus:border-indigo-500 pb-2 transition-all placeholder-zinc-700"
                            />

                            {/* VISTA 1: BULK INPUT */}
                            {view === 'bulk' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-in fade-in slide-in-from-bottom-4">
                                    {CATEGORY_STYLES.map((c, i) => {
                                        const validWordsCount = rawWords[i].split('\n').filter(w => w.trim() !== '').length;
                                        const isOptimal = validWordsCount >= 15 && validWordsCount <= 20;
                                        const isEmpty = validWordsCount === 0;
                                        
                                        return (
                                            <div key={i} className={`p-4 rounded-3xl border-2 ${c.border} ${c.bg} shadow-sm relative flex flex-col h-[50vh]`}>
                                                <input 
                                                    value={categories[i]} 
                                                    onChange={e => { const nc = [...categories]; nc[i] = e.target.value; setCategories(nc); }} 
                                                    placeholder={`Categoría ${i+1}`} 
                                                    className="w-full text-xl font-black bg-zinc-900 text-white p-3 rounded-xl mb-2 outline-none border border-zinc-700 focus:border-indigo-500 placeholder-zinc-600"
                                                />
                                                <div className="flex justify-between items-center px-1 mb-2">
                                                    <span className="text-[10px] uppercase font-black text-zinc-500">Pega tu lista:</span>
                                                    <span className={`text-xs font-black transition-colors ${isEmpty ? 'text-zinc-600' : (isOptimal ? 'text-emerald-500' : 'text-rose-500')}`}>
                                                        {validWordsCount}/20
                                                    </span>
                                                </div>
                                                <textarea 
                                                    value={rawWords[i]} 
                                                    onChange={e => { const nw = [...rawWords]; nw[i] = e.target.value; setRawWords(nw); }} 
                                                    className="flex-1 w-full bg-zinc-900 text-white p-4 rounded-xl text-sm outline-none border border-zinc-700 resize-none custom-scrollbar placeholder-zinc-700 font-medium" 
                                                    placeholder="Pega palabras aquí...&#10;O deja en blanco para que la IA invente esta categoría."
                                                ></textarea>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {/* VISTA 2: REVIEW MULTILINGÜE */}
                            {view === 'review' && (
                                <div className="max-w-4xl mx-auto flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-4 h-[75vh]">
                                    <div className="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800 shrink-0">
                                        {CATEGORY_STYLES.map((tab) => (
                                            <button
                                                key={tab.id}
                                                onClick={() => setActiveTab(tab.id)}
                                                className={`flex-1 py-3 rounded-xl text-[10px] md:text-xs font-black uppercase tracking-widest transition-all ${activeTab === tab.id ? `${tab.bg} ${tab.color} shadow-lg` : 'text-zinc-500 hover:bg-zinc-800'}`}
                                            >
                                                {categories[tab.id] || `Cat ${tab.id + 1}`}
                                            </button>
                                        ))}
                                    </div>

                                    <div className={`flex-1 rounded-[2rem] border-2 p-4 md:p-6 flex flex-col gap-4 overflow-hidden transition-all ${CATEGORY_STYLES[activeTab].border} ${CATEGORY_STYLES[activeTab].bg}`}>
                                        
                                        <div className="flex gap-2 px-2 text-[10px] font-black uppercase text-zinc-500 tracking-widest">
                                            <div className="w-14 text-center">Emoji</div>
                                            <div className="flex-1">Inglés</div>
                                            <div className="flex-1">Español</div>
                                            <div className="w-8"></div>
                                        </div>

                                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-2">
                                            {items[activeTab].map((item, idx) => (
                                                <div key={idx} className="flex gap-2 animate-pop-in">
                                                    <input 
                                                        value={item.emoji || "❓"} 
                                                        onChange={e => { const ni = [...items]; ni[activeTab][idx].emoji = e.target.value; setItems(ni); }}
                                                        className="w-14 bg-zinc-900 border border-white/5 rounded-xl p-2 text-xl text-center outline-none focus:border-indigo-500 transition-colors"
                                                    />
                                                    <input 
                                                        value={item.en || item.word || ""} 
                                                        placeholder="Inglés"
                                                        onChange={e => { const ni = [...items]; ni[activeTab][idx].en = e.target.value; setItems(ni); }}
                                                        className="flex-1 bg-zinc-900 border border-white/5 rounded-xl p-2 px-4 outline-none font-bold text-indigo-200 focus:border-indigo-500 transition-colors"
                                                    />
                                                    <input 
                                                        value={item.es || ""} 
                                                        placeholder="Español"
                                                        onChange={e => { const ni = [...items]; ni[activeTab][idx].es = e.target.value; setItems(ni); }}
                                                        className="flex-1 bg-zinc-900 border border-white/5 rounded-xl p-2 px-4 outline-none font-bold text-emerald-200 focus:border-emerald-500 transition-colors"
                                                    />
                                                    <button onClick={() => { const ni = [...items]; ni[activeTab].splice(idx,1); setItems(ni); }} className="text-zinc-600 hover:text-red-400 p-2 transition-colors"><X size={20}/></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="shrink-0 pt-4 border-t border-white/10 flex justify-between items-center">
                                            <div className="flex items-center gap-2 text-zinc-400 font-black text-sm uppercase">
                                                <CheckCircle2 size={16} className={items[activeTab].length >= 15 && items[activeTab].length <= 20 ? "text-emerald-500" : "text-rose-500"}/> 
                                                <span className={items[activeTab].length >= 15 && items[activeTab].length <= 20 ? "text-emerald-500" : "text-rose-500"}>{items[activeTab].length} Pares</span>
                                            </div>
                                            <button 
                                                onClick={() => { const ni = [...items]; ni[activeTab].push({en: "", es: "", emoji: "❓"}); setItems(ni); }}
                                                className="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-xl transition"
                                            >
                                                + Añadir Fila
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                    
                    {/* Floating API Key Setting */}
                    <div className="fixed bottom-4 left-4 z-50">
                         <button onClick={() => setShowApiModal(true)} className="p-3 bg-zinc-900 rounded-full border border-zinc-800 text-zinc-500 hover:text-indigo-400 shadow-lg transition" title="Configurar IA"><KeyRound size={20}/></button>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<DashboardWC />);
    </script>
</body>
</html>

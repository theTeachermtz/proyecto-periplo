<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC/WB Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Zap, Save, ArrowLeft, Loader2, KeyRound, Sparkles, X, Layout, Hash, Building2, Waves } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CATEGORY_STYLES = [
            { id: 0, label: 'Azul', color: 'text-blue-400', border: 'border-blue-500/50', bg: 'bg-blue-500/10' },
            { id: 1, label: 'Rojo', color: 'text-red-400', border: 'border-red-500/50', bg: 'bg-red-500/10' },
            { id: 2, label: 'Amarillo', color: 'text-yellow-400', border: 'border-yellow-500/50', bg: 'bg-yellow-500/10' },
            { id: 3, label: 'Verde', color: 'text-green-400', border: 'border-green-500/50', bg: 'bg-green-500/10' }
        ];

        const DashboardWC = () => {
            const [gameTitle, setGameTitle] = useState("");
            const [activeTab, setActiveTab] = useState(0);
            const [categories, setCategories] = useState(["", "", "", ""]);
            const [items, setItems] = useState([[], [], [], []]);
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [showSaveModal, setShowSaveModal] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            if (data.content?.categories) {
                                setCategories(data.content.categories.map(c => c.name));
                                setItems(data.content.categories.map(c => c.items || []));
                            }
                        }
                    });
                }
            }, []);

            const generateWithAI = async () => {
                if (!apiKey) return alert("Pega tu API Key de Gemini en el botón de la llave.");
                if (!gameTitle) return alert("Escribe un tema general en el título primero.");

                setIsGenerating(true);
                try {
                    const prompt = `Actúa como experto en pedagogía. Basado en el tema "${gameTitle}", genera 4 campos semánticos diferentes. 
                    Regla: Cada campo debe tener entre 15 y 19 palabras únicas e irrepetibles entre sí. 
                    Cada palabra debe incluir su versión en INGLÉS, su traducción exacta al ESPAÑOL, y un emoji representativo. 
                    Responde ÚNICAMENTE con un JSON válido usando esta estructura:
                    {
                      "0": { "name": "Nombre Categoría 1", "items": [{"en": "Sun", "es": "Sol", "emoji": "☀️"}, ...] },
                      "1": { "name": "Nombre Categoría 2", "items": [...] },
                      "2": { "name": "Nombre Categoría 3", "items": [...] },
                      "3": { "name": "Nombre Categoría 4", "items": [...] }
                    }`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    const parsed = JSON.parse(text);

                    setCategories([parsed["0"].name, parsed["1"].name, parsed["2"].name, parsed["3"].name]);
                    setItems([parsed["0"].items, parsed["1"].items, parsed["2"].items, parsed["3"].items]);
                } catch (e) {
                    alert("Error con la IA: Asegúrate de que tu API Key sea válida. Detalle: " + e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const executeSave = async (gameType) => {
                setIsSaving(true);
                try {
                    const payload = {
                        title: gameTitle,
                        type: gameType,
                        content: {
                            categories: categories.map((name, i) => ({ id: i, name, items: items[i] }))
                        },
                        updatedAt: serverTimestamp()
                    };
                    const params = new URLSearchParams(window.location.search);
                    const editId = params.get('edit');
                    const folder = params.get('folder') || '';
                    
                    if (editId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId), payload);
                    } else {
                        await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { 
                            ...payload, 
                            createdAt: serverTimestamp(),
                            parentPath: folder
                        });
                    }
                    window.location.href = folder ? `index.html?folder=${encodeURIComponent(folder)}` : 'index.html';
                } catch (e) { alert(e.message); setIsSaving(false); setShowSaveModal(false); }
            };

            const handlePreSave = () => {
                if (!gameTitle) return alert("Ponle un título al juego primero.");
                if (items.some(cat => cat.length === 0)) return alert("Genera o añade palabras a todas las categorías.");
                setShowSaveModal(true);
            };

            return (
                <div className="h-screen flex flex-col dark:text-white relative">
                    {/* Modal de Guardado */}
                    {showSaveModal && (
                        <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] p-6 max-w-md w-full shadow-2xl animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black">¿Cómo quieres guardar esto?</h2>
                                    <button onClick={() => setShowSaveModal(false)} className="text-zinc-500 hover:text-white"><X size={24}/></button>
                                </div>
                                <p className="text-sm text-zinc-400 mb-6">Los datos base sirven para dos motores de juego distintos. Elige el formato final.</p>
                                
                                <div className="flex flex-col gap-4">
                                    <button onClick={() => executeSave('WordCascade')} disabled={isSaving} className="flex items-center gap-4 p-4 rounded-2xl border border-zinc-700 hover:border-indigo-500 hover:bg-indigo-500/10 transition group text-left">
                                        <div className="bg-indigo-500/20 text-indigo-400 p-3 rounded-xl group-hover:scale-110 transition"><Waves size={24}/></div>
                                        <div>
                                            <div className="font-black text-lg">Word Cascade</div>
                                            <div className="text-xs text-zinc-400">Juego de lluvia de palabras por categorías.</div>
                                        </div>
                                    </button>
                                    
                                    <button onClick={() => executeSave('WordBuildings')} disabled={isSaving} className="flex items-center gap-4 p-4 rounded-2xl border border-zinc-700 hover:border-emerald-500 hover:bg-emerald-500/10 transition group text-left">
                                        <div className="bg-emerald-500/20 text-emerald-400 p-3 rounded-xl group-hover:scale-110 transition"><Building2 size={24}/></div>
                                        <div>
                                            <div className="font-black text-lg">Word Buildings</div>
                                            <div className="text-xs text-zinc-400">Torre de apilamiento (Stacker). Inglés a Español.</div>
                                        </div>
                                    </button>
                                </div>
                                {isSaving && <div className="mt-4 text-center text-sm font-bold text-indigo-400 flex justify-center items-center gap-2"><Loader2 className="animate-spin" size={16}/> Guardando...</div>}
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.history.back()} className="p-2 hover:bg-zinc-800 rounded-lg"><ArrowLeft size={20}/></button>
                            <h1 className="font-black text-indigo-400 flex items-center gap-2 tracking-tighter"><Zap size={18}/> DUAL BUILDER</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={generateWithAI} disabled={isGenerating} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition disabled:opacity-50 shadow-lg shadow-indigo-500/20">
                                {isGenerating ? <Loader2 className="animate-spin" size={14}/> : <Sparkles size={14}/>} MAGIA IA
                            </button>
                            <button onClick={handlePreSave} className="bg-emerald-600 px-4 py-2 rounded-xl text-xs font-black hover:bg-emerald-500 transition shadow-lg shadow-emerald-500/20 flex items-center gap-2">
                                <Save size={16}/> GUARDAR COMO...
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-hidden flex flex-col p-4 gap-4 max-w-3xl mx-auto w-full">
                        <input 
                            value={gameTitle} 
                            onChange={e => setGameTitle(e.target.value)}
                            placeholder="Tema del Juego (ej: The Solar System)"
                            className="bg-transparent text-3xl font-black outline-none border-b-2 border-zinc-800 focus:border-indigo-500 pb-2 transition-all"
                        />

                        {/* Sistema de Tabs */}
                        <div className="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
                            {CATEGORY_STYLES.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === tab.id ? `${tab.bg} ${tab.color} shadow-lg` : 'text-zinc-500 hover:bg-white/5'}`}
                                >
                                    Cat {tab.id + 1}
                                </button>
                            ))}
                        </div>

                        {/* Área de Edición de Tab Activo */}
                        <div className={`flex-1 rounded-[2.5rem] border-2 p-6 flex flex-col gap-4 overflow-hidden transition-all ${CATEGORY_STYLES[activeTab].border} ${CATEGORY_STYLES[activeTab].bg}`}>
                            <div className="flex gap-2">
                                <div className="p-3 bg-zinc-900 rounded-2xl border border-white/5"><Layout size={20} className={CATEGORY_STYLES[activeTab].color}/></div>
                                <input 
                                    value={categories[activeTab]}
                                    onChange={e => { const c = [...categories]; c[activeTab] = e.target.value; setCategories(c); }}
                                    placeholder="Nombre de la categoría..."
                                    className="flex-1 bg-zinc-900 border border-white/5 rounded-2xl px-4 font-bold outline-none focus:border-white/20"
                                />
                            </div>

                            {/* Encabezados de tabla */}
                            <div className="flex gap-2 px-2 mt-2 text-[10px] font-black uppercase text-zinc-500 tracking-widest">
                                <div className="w-12 text-center">Emoji</div>
                                <div className="flex-1">Inglés (Péndulo)</div>
                                <div className="flex-1">Español (Bloque Apilado)</div>
                                <div className="w-10"></div>
                            </div>

                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-2">
                                {items[activeTab].map((item, idx) => (
                                    <div key={idx} className="flex gap-2">
                                        <input 
                                            value={item.emoji || "❓"} 
                                            onChange={e => { const ni = [...items]; ni[activeTab][idx].emoji = e.target.value; setItems(ni); }}
                                            className="w-12 bg-zinc-900 border border-white/5 rounded-xl p-2 text-center outline-none focus:border-indigo-500"
                                            title="Emoji"
                                        />
                                        <input 
                                            value={item.en || item.word || ""} 
                                            onChange={e => { const ni = [...items]; ni[activeTab][idx].en = e.target.value; setItems(ni); }}
                                            className="flex-1 bg-zinc-900 border border-white/5 rounded-xl p-2 px-4 outline-none font-bold text-indigo-200 focus:border-indigo-500"
                                            placeholder="Inglés..."
                                        />
                                        <input 
                                            value={item.es || ""} 
                                            onChange={e => { const ni = [...items]; ni[activeTab][idx].es = e.target.value; setItems(ni); }}
                                            className="flex-1 bg-zinc-900 border border-white/5 rounded-xl p-2 px-4 outline-none font-medium text-emerald-200 focus:border-emerald-500"
                                            placeholder="Español..."
                                        />
                                        <button onClick={() => { const ni = [...items]; ni[activeTab].splice(idx,1); setItems(ni); }} className="text-zinc-600 hover:text-red-400 p-2"><X size={16}/></button>
                                    </div>
                                ))}
                                <button 
                                    onClick={() => { const ni = [...items]; ni[activeTab].push({en: "", es: "", emoji: "❓"}); setItems(ni); }}
                                    className="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-zinc-500 font-bold hover:bg-white/5 transition"
                                >
                                    + Añadir Par de Palabras
                                </button>
                            </div>
                            
                            <div className="flex justify-between items-center pt-2 border-t border-white/5">
                                <span className="text-[10px] font-black uppercase text-zinc-500 tracking-widest flex items-center gap-1"><Hash size={12}/> {items[activeTab].length} Pares</span>
                                <span className="text-[10px] font-black uppercase opacity-40 italic">Mínimo sugerido: 15</span>
                            </div>
                        </div>
                    </div>
                    
                    {/* Floating API Key Config */}
                    <div className="fixed bottom-4 left-4 z-40">
                         <button onClick={() => { const k = prompt("Gemini API Key:", apiKey); if(k){setApiKey(k); localStorage.setItem('gemini_api_key', k);}}} className="p-3 bg-zinc-900 rounded-full border border-zinc-800 text-zinc-500 hover:text-indigo-400 transition shadow-lg"><KeyRound size={20}/></button>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<DashboardWC />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☄️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        @keyframes pop-in {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pop-in { animation: pop-in 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Zap, Save, ArrowLeft, Loader2, Sparkles, KeyRound, X, ListRestart, CheckCircle2, Search, Tags, Building2, Waves, Plus } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // TAXONOMÍA MAESTRA (NUEVA)
        // ============================================================
        const TAXONOMY = {
            basic: {
                grammar:     ["Modal Verbs","Present Simple","Present Continuous","Future (Going to)","Otro"],
                verbs:       ["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival","Otro"],
                nouns:       ["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway","Otro"],
                adjectives:  ["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste","Otro"],
                key_structs: ["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs","Otro"],
                otro:        ["Otro"]
            },
            advanced: {
                grammar:     ["Past Simple","Second Conditional","Past Continuous","Past Future Intention","Otro"],
                verbs:       ["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound","Otro"],
                nouns:       ["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science","Otro"],
                adjectives:  ["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives","Otro"],
                key_structs: ["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice","Otro"],
                otro:        ["Otro"]
            },
            pro: {
                grammar:     ["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals","Otro"],
                verbs:       ["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations","Otro"],
                nouns:       ["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic","Otro"],
                adjectives:  ["Formal Register Adj.","Nuance & Tone Adj.","Otro"],
                key_structs: ["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives","Otro"],
                otro:        ["Otro"]
            },
            otro: { otro: ["Otro"] }
        };

        const NEW_LEVELS = ["B1","B2","B-MIX","A1","A2","A-MIX","P1","P2","P-MIX"];

        const NEW_CATS = [
            { id: 'grammar',     label: 'Grammar' },
            { id: 'verbs',       label: 'Verb Mastery' },
            { id: 'nouns',       label: 'Noun Mastery' },
            { id: 'adjectives',  label: 'Vocab Mastery (Adj)' },
            { id: 'key_structs', label: 'Key Structures' },
            { id: 'otro',        label: 'Otro (Macro Skills)' }
        ];

        const MACRO_SKILLS = ["Speaking","Listening","Reading","Grammar","Vocabulary","Pronunciation"];

        const getAllTopicsForCategory = (categoryId, selectedLevels) => {
            let topics = [];
            const activeDbKeys = new Set();
            selectedLevels.forEach(lvl => {
                if (lvl.startsWith('B')) activeDbKeys.add('basic');
                if (lvl.startsWith('A')) activeDbKeys.add('advanced');
                if (lvl.startsWith('P')) activeDbKeys.add('pro');
            });
            activeDbKeys.forEach(dbKey => {
                if (TAXONOMY[dbKey] && TAXONOMY[dbKey][categoryId]) {
                    topics.push(...TAXONOMY[dbKey][categoryId]);
                }
            });
            return [...new Set(topics)];
        };

        const CATEGORY_STYLES = [
            { id: 0, label: 'Azul', color: 'text-blue-400', border: 'border-blue-500/30', bg: 'bg-blue-500/5', active: 'bg-blue-600' },
            { id: 1, label: 'Rojo', color: 'text-rose-400', border: 'border-rose-500/30', bg: 'bg-rose-500/5', active: 'bg-rose-600' },
            { id: 2, label: 'Amarillo', color: 'text-amber-400', border: 'border-amber-500/30', bg: 'bg-amber-500/5', active: 'bg-amber-600' },
            { id: 3, label: 'Verde', color: 'text-emerald-400', border: 'border-emerald-500/30', bg: 'bg-emerald-500/5', active: 'bg-emerald-600' }
        ];

        const DualBuilder = () => {
            const [view, setView] = useState('bulk'); 
            const [gameTitle, setGameTitle] = useState("");
            const [categories, setCategories] = useState(["", "", "", ""]);
            const [rawWords, setRawWords] = useState(["", "", "", ""]); 
            const [items, setItems] = useState([[], [], [], []]); 
            const [activeTab, setActiveTab] = useState(0);
            
            const [editingId, setEditingId] = useState(null);
            const [apiKey, setApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState('');
            const [availableModels, setAvailableModels] = useState([]);
            
            const [showApiModal, setShowApiModal] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            // Nuevos estados para taxonomía y modal de guardado
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels] = useState([]);
            const [saveCats, setSaveCats] = useState([]);
            const [saveTopics, setSaveTopics] = useState([]);

            // Estado para el modal de éxito final
            const [showPreviewModal, setShowPreviewModal] = useState(false);
            const [savedDocId, setSavedDocId] = useState(null);

            const abortControllerRef = useRef(null);

            const toggleSelection = (arr, setArr, item) => {
                if (arr.includes(item)) setArr(arr.filter(i => i !== item));
                else setArr([...arr, item]);
            };

            useEffect(() => {
                const savedKey = localStorage.getItem('periplo_google_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    fetchModels(savedKey);
                }

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) loadExistingArtifact(editId);
            }, []);

            const fetchModels = async (key) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key.trim()}`);
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        setSelectedModel(validModels.find(m => m.includes("gemini-2.0-flash")) || validModels[0]);
                    }
                } catch (e) { console.error("API Error", e); }
            };

            const loadExistingArtifact = async (id) => {
                const docSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    setGameTitle(data.title);
                    setEditingId(id);
                    if (data.content?.categories) {
                        setCategories(data.content.categories.map(c => c.name));
                        setItems(data.content.categories.map(c => c.items || []));
                        setView('review');
                    }
                    if (data.tags) {
                        setSaveLevels(data.tags.levels || (data.tags.level ? [data.tags.level.toUpperCase()] : []));
                        setSaveCats(data.tags.categories || (data.tags.category ? [data.tags.category] : []));
                        setSaveTopics(data.tags.topics || (data.tags.topic ? [data.tags.topic] : []));
                    }
                }
            };

            const generateWithAI = async () => {
                if (!apiKey) return setShowApiModal(true);
                if (!gameTitle && categories.every(c => !c)) return alert("Escribe un título o categorías para guiar a la IA.");

                setIsGenerating(true);
                abortControllerRef.current = new AbortController();

                const prompt = `Actúa como experto en inglés. Genera un JSON con esta estructura:
                {"title": "Tema", "categories": [{"name": "Cat1", "items": [{"en": "Word", "es": "Palabra", "emoji": "🚀"}]}]}
                Genera exactamente 4 categorías con 15-20 palabras cada una.
                Contexto Usuario: Título: ${gameTitle}, Categorías: ${categories.join(", ")}. 
                Palabras proporcionadas: ${rawWords.join(" | ")}`;

                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }),
                        signal: abortControllerRef.current.signal
                    });
                    const data = await resp.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    setGameTitle(result.title);
                    setCategories(result.categories.map(c => c.name));
                    setItems(result.categories.map(c => c.items));
                    setView('review');
                } catch (e) { alert("Error IA: " + e.message); }
                finally { setIsGenerating(false); }
            };

            const handlePreSave = () => {
                if (!gameTitle.trim()) {
                    alert("Asegúrate de ponerle un título al juego.");
                    return;
                }
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                
                const tags = { levels: saveLevels, categories: saveCats, topics: saveTopics };
                const payload = {
                    title: gameTitle,
                    type: 'DUAL_WORD',
                    content: { categories: categories.map((name, i) => ({ id: i, name, items: items[i] })) },
                    tags: tags,
                    updatedAt: serverTimestamp()
                };

                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';
                payload.parentPath = parentPath;

                try {
                    let docId = editingId;
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), payload);
                    } else {
                        const ref = await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...payload, createdAt: serverTimestamp() });
                        docId = ref.id;
                    }
                    setSavedDocId(docId);
                    setShowPreviewModal(true);
                } catch (e) { 
                    alert("Error al guardar: " + e.message); 
                } finally { 
                    setIsSaving(false); 
                }
            };

            const goToHub = () => {
                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';
                window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
            };

            return (
                <div className="h-screen flex flex-col bg-zinc-950 overflow-hidden">
                    {/* Header */}
                    <header className="h-16 border-b border-zinc-800 flex items-center justify-between px-6 bg-zinc-900/50 backdrop-blur-md shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.history.back()} className="p-2 hover:bg-zinc-800 rounded-full transition-colors"><ArrowLeft size={20}/></button>
                            <h1 className="font-black text-indigo-400 flex items-center gap-2 uppercase tracking-tighter italic"><Zap size={18}/> Dual Builder</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            {view === 'review' ? (
                                <>
                                    <button onClick={() => setView('bulk')} className="flex items-center gap-2 px-4 py-2 text-xs font-bold text-zinc-400 hover:text-white transition-colors"><ListRestart size={14}/> RE-EDITAR</button>
                                    <button onClick={handlePreSave} disabled={isSaving} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl text-xs font-black transition-all shadow-lg shadow-emerald-900/20 disabled:opacity-50">
                                        {isSaving ? <Loader2 size={14} className="animate-spin"/> : <Save size={14}/>} GUARDAR BASE
                                    </button>
                                </>
                            ) : (
                                <button onClick={generateWithAI} disabled={isGenerating} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl text-xs font-black transition-all shadow-lg shadow-indigo-900/20 disabled:opacity-50">
                                    {isGenerating ? <Loader2 size={14} className="animate-spin"/> : <Sparkles size={14}/>} PROCESAR CON IA
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                        <div className="max-w-6xl mx-auto space-y-8 pb-10">
                            <input 
                                value={gameTitle} 
                                onChange={e => setGameTitle(e.target.value)}
                                placeholder="Título de la Base (ej: Phrasal Verbs in the Office)"
                                className="w-full bg-transparent text-4xl md:text-6xl font-black outline-none border-b-2 border-zinc-800 focus:border-indigo-500 pb-4 transition-all placeholder:text-zinc-800"
                            />

                            {view === 'bulk' ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-pop-in">
                                    {CATEGORY_STYLES.map((style, i) => (
                                        <div key={i} className={`p-4 rounded-[2rem] border ${style.border} ${style.bg} flex flex-col h-[55vh]`}>
                                            <input 
                                                value={categories[i]} 
                                                onChange={e => {const nc=[...categories]; nc[i]=e.target.value; setCategories(nc)}}
                                                placeholder={`Categoría ${i+1}`}
                                                className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-3 mb-3 text-sm font-bold outline-none focus:border-indigo-500"
                                            />
                                            <textarea 
                                                value={rawWords[i]}
                                                onChange={e => {const nw=[...rawWords]; nw[i]=e.target.value; setRawWords(nw)}}
                                                placeholder="Pega tu lista de palabras aquí..."
                                                className="flex-1 w-full bg-transparent p-2 text-sm outline-none resize-none custom-scrollbar placeholder:text-zinc-700"
                                            />
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="max-w-4xl mx-auto animate-pop-in">
                                    <div className="flex gap-2 p-1 bg-zinc-900 rounded-2xl border border-zinc-800 mb-4 overflow-x-auto">
                                        {CATEGORY_STYLES.map((tab) => (
                                            <button 
                                                key={tab.id} 
                                                onClick={() => setActiveTab(tab.id)}
                                                className={`flex-1 py-3 px-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab.id ? `${tab.active} text-white shadow-lg` : 'text-zinc-500 hover:bg-zinc-800'}`}
                                            >
                                                {categories[tab.id] || `Cat ${tab.id+1}`}
                                            </button>
                                        ))}
                                    </div>

                                    <div className={`rounded-[2.5rem] border ${CATEGORY_STYLES[activeTab].border} ${CATEGORY_STYLES[activeTab].bg} p-6 h-[60vh] flex flex-col`}>
                                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-2">
                                            {items[activeTab]?.map((item, idx) => (
                                                <div key={idx} className="flex gap-2 group animate-pop-in">
                                                    <input value={item.emoji} onChange={e => {const ni=[...items]; ni[activeTab][idx].emoji=e.target.value; setItems(ni)}} className="w-12 bg-zinc-900 border border-zinc-800 rounded-xl text-center text-lg"/>
                                                    <input value={item.en} onChange={e => {const ni=[...items]; ni[activeTab][idx].en=e.target.value; setItems(ni)}} className="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2 font-bold text-indigo-300 outline-none focus:border-indigo-500"/>
                                                    <input value={item.es} onChange={e => {const ni=[...items]; ni[activeTab][idx].es=e.target.value; setItems(ni)}} className="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2 font-bold text-emerald-300 outline-none focus:border-emerald-500"/>
                                                    <button onClick={() => {const ni=[...items]; ni[activeTab].splice(idx,1); setItems(ni)}} className="p-2 text-zinc-600 hover:text-red-500 transition-colors"><X size={18}/></button>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => {const ni=[...items]; ni[activeTab].push({en:"", es:"", emoji:"❓"}); setItems(ni)}} className="mt-4 w-full py-3 border border-dashed border-zinc-700 rounded-2xl text-zinc-500 hover:text-zinc-300 hover:border-zinc-500 flex items-center justify-center gap-2 text-xs font-bold transition-all"><Plus size={14}/> AÑADIR NUEVO PAR</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modals: API */}
                    {showApiModal && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[3rem] max-w-sm w-full space-y-6">
                                <h3 className="text-xl font-black flex items-center gap-2"><KeyRound className="text-indigo-500"/> Configuración IA</h3>
                                <input type="password" value={apiKey} onChange={e => {setApiKey(e.target.value); localStorage.setItem('periplo_google_key', e.target.value)}} placeholder="Ingresa tu Gemini API Key" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-indigo-500"/>
                                <button onClick={() => {fetchModels(apiKey); setShowApiModal(false)}} className="w-full bg-indigo-600 py-4 rounded-2xl font-black text-sm">GUARDAR Y CONTINUAR</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE CLASIFICACIÓN (MÚLTIPLE) */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-white">
                                        <Tags className="text-indigo-400"/> Clasificar Base Dual
                                    </h2>
                                    <button onClick={() => setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition">
                                        <X size={20}/>
                                    </button>
                                </div>

                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">
                                    {/* PASO 1 — NIVELES */}
                                    <div>
                                        <label className="block text-xs font-black text-indigo-400 uppercase tracking-widest mb-3">
                                            1. Niveles <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span>
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button key={lvl}
                                                    onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-indigo-500 hover:text-indigo-300'}`}>
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 2 — CATEGORÍAS */}
                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">
                                            2. Categorías <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span>
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button key={cat.id}
                                                    onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 3 — TEMAS */}
                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">
                                                3. Temas Específicos
                                            </label>

                                            {saveCats.map(catId => {
                                                if (catId === 'otro') return null;
                                                const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                                const topics   = getAllTopicsForCategory(catId, saveLevels);
                                                if (topics.length === 0) return null;
                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button key={topic}
                                                                    onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>
                                                                    {topic}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {saveCats.includes('otro') && (
                                                <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                                                    <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {MACRO_SKILLS.map(skill => (
                                                            <button key={skill}
                                                                onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                                className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-500 text-zinc-900 shadow-sm' : 'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}>
                                                                {skill}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <button onClick={executeFinalSave}
                                    disabled={isSaving || saveLevels.length === 0 || saveCats.length === 0}
                                    className="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:bg-zinc-800 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                                    {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>}
                                    {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar"}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MODAL PREVIEW Y LANZADOR RÁPIDO */}
                    {showPreviewModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl animate-pop-in">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">✅</div>
                                    <h2 className="text-xl font-black text-white">¡Base Guardada!</h2>
                                    <p className="text-zinc-400 text-sm mt-1 font-medium">"{gameTitle}"</p>
                                </div>

                                <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 text-center">Abrir y probar como...</p>

                                <div className="space-y-3 mb-6">
                                    <button onClick={() => window.location.href = `wordcascade.html?id=${savedDocId}`}
                                        className="w-full flex items-center gap-3 p-4 rounded-xl border border-indigo-500/50 bg-indigo-500/10 text-indigo-400 font-bold text-sm transition-all active:scale-95 hover:opacity-80">
                                        <Waves size={20}/> <span>Word Cascade 🌊</span>
                                    </button>
                                    
                                    <button onClick={() => window.location.href = `wordbuildings.html?id=${savedDocId}`}
                                        className="w-full flex items-center gap-3 p-4 rounded-xl border border-emerald-500/50 bg-emerald-500/10 text-emerald-400 font-bold text-sm transition-all active:scale-95 hover:opacity-80">
                                        <Building2 size={20}/> <span>Word Buildings 🏢</span>
                                    </button>
                                </div>

                                <button onClick={goToHub}
                                    className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl font-bold text-sm transition-colors">
                                    Volver al Hub Principal
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<DualBuilder />);
    </script>
</body>
</html>

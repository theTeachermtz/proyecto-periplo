<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco del Examen de Nivel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="periplo-config.js"></script>
  <script src="placement-bank.js"></script>
  <style>
    :root { --mono: 'Cascadia Code','JetBrains Mono','Fira Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
    body, input, textarea, button { font-family: var(--mono); }
    body { background:#0a0a0b; color:#d4d4d8; }
    .scroll::-webkit-scrollbar { width:10px; height:10px; }
    .scroll::-webkit-scrollbar-thumb { background:#27272a; border-radius:6px; }
    .scroll::-webkit-scrollbar-track { background:transparent; }
    *:focus { outline:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { initializeApp } from 'firebase/app';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'firebase/firestore';

const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
const db  = getFirestore(app);
const SHIPS = window.PERIPLO_BANK.ships;

const TEACHER_UID = new URLSearchParams(location.search).get('uid') || 'teacher_builder_001';
const BANK_REF = doc(db, `artifacts/periplo-app-v1/users/${TEACHER_UID}/placement/bank`);

// ── etiquetas ─────────────────────────────────────────────────────────────────
const TOOL_LABEL = {
  multipleChoice:'Opción múltiple', wordForm:'Forma correcta', oddOneOut:'El intruso',
  trueFalse:'Verdadero / Falso', audioQuestion:'Comprensión auditiva',
  fillBlank:'Completa el espacio', errorCorrection:'Corrige la oración',
  spotError:'Encuentra el error', unscramble:'Ordena la oración',
  matching:'Une los pares', categorySort:'Clasifica',
  dialogueFill:'Completa el diálogo', multipleResponse:'Selección múltiple (varias)', translate:'Traducción (output completo)',
};
const CONTAINERS = ['conoce','entiende','produce'];
const CONTAINER_LABEL = { conoce:'Conoce — vocab', entiende:'Entiende', produce:'Produce' };
const CONTAINER_COLOR = { conoce:'text-cyan-400', entiende:'text-amber-400', produce:'text-rose-400' };
const TIERS = ['facil','media','dificil'];
const TIER_LABEL = { facil:'Fácil', media:'Media', dificil:'Difícil' };
const TIER_COLOR = { facil:'text-zinc-400', media:'text-yellow-500', dificil:'text-red-500' };

// Moldes vacíos por tipo (para "+ añadir pregunta")
const MOLD = {
  multipleChoice: () => ({ q:'', options:['','',''], answer:'' }),
  oddOneOut:      () => ({ q:'', options:['','','',''], answer:'' }),
  wordForm:       () => ({ q:'', options:['','',''], answer:'' }),
  trueFalse:      () => ({ q:'', answer:true }),
  fillBlank:      () => ({ q:'', hint:'', answer:'', accept:[] }),
  errorCorrection:() => ({ q:'', answer:'', accept:[] }),
  spotError:      () => ({ q:'', errorWord:'', answer:'' }),
  unscramble:     () => ({ spanishPrompt:'', targetLabel:'Arma la oración', words:[], answer:'', acceptedAnswers:[] }),
  matching:       () => ({ q:'', pairs:[{left:'',right:''},{left:'',right:''}], distractors:[] }),
  categorySort:   () => ({ q:'', pool:[], buckets:[{label:'',correct:[]},{label:'',correct:[]}] }),
  audioQuestion:  () => ({ audioText:'', q:'', options:['','',''], answer:'' }),
  dialogueFill:   () => ({ q:'Choose the most natural response for B:', dialogue:[{speaker:'A',line:''},{speaker:'B',line:null},{speaker:'A',line:''}], options:['','',''], answer:'' }),
  multipleResponse:() => ({ q:'', options:['','','',''], answers:[] }),
  translate:      () => ({ spanishPrompt:'', answer:'', acceptedAnswers:[] }),
};
const TYPES = Object.keys(MOLD);

// ── índice de la semilla ──────────────────────────────────────────────────────
const seedById = {};
SHIPS.forEach(s => s.questions.forEach(q => { seedById[q.id] = q; }));
const TOTAL_Q = Object.keys(seedById).length;

const stable = o => JSON.stringify(o);
const pretty = o => JSON.stringify(o, null, 2);
const clone  = o => JSON.parse(JSON.stringify(o));

// ── widgets de campo ──────────────────────────────────────────────────────────
function Txt({ label, value, onChange, area }) {
  return (
    <label className="block mb-2.5">
      <span className="block text-[11px] text-zinc-500 mb-1">{label}</span>
      {area
        ? <textarea value={value ?? ''} onChange={e => onChange(e.target.value)} rows={2} spellCheck={false}
            className="w-full bg-zinc-900 border border-zinc-700 rounded px-2.5 py-1.5 text-[13px] text-zinc-100 focus:border-emerald-600 resize-y scroll" />
        : <input value={value ?? ''} onChange={e => onChange(e.target.value)} spellCheck={false}
            className="w-full bg-zinc-900 border border-zinc-700 rounded px-2.5 py-1.5 text-[13px] text-zinc-100 focus:border-emerald-600" />}
    </label>
  );
}

function TF({ answer, onChange }) {
  return (
    <div className="mb-2.5">
      <span className="block text-[11px] text-zinc-500 mb-1">Respuesta correcta</span>
      <div className="flex gap-2">
        {[['Verdadero', true], ['Falso', false]].map(([l, v]) => (
          <button key={l} onClick={() => onChange(v)}
            className={`px-3 py-1 rounded text-[13px] border ${answer === v ? 'bg-emerald-600 border-emerald-600 text-black font-bold' : 'border-zinc-700 text-zinc-300 hover:border-zinc-500'}`}>{l}</button>
        ))}
      </div>
    </div>
  );
}

function Options({ options, answer, answers, multi, onOptions, onAnswer }) {
  const [dragI, setDragI] = useState(null);
  const correct = opt => multi ? (answers || []).includes(opt) : opt === answer;
  const toggle = opt => {
    if (multi) { const s = new Set(answers || []); s.has(opt) ? s.delete(opt) : s.add(opt); onAnswer([...s]); }
    else onAnswer(opt);
  };
  const setOpt = (i, val) => {
    const old = options[i]; const next = [...options]; next[i] = val; onOptions(next);
    if (multi) { if ((answers || []).includes(old)) onAnswer((answers || []).map(a => a === old ? val : a)); }
    else if (answer === old) onAnswer(val);
  };
  const del = i => {
    const opt = options[i]; onOptions(options.filter((_, j) => j !== i));
    if (multi) onAnswer((answers || []).filter(a => a !== opt)); else if (answer === opt) onAnswer('');
  };
  const move = (from, to) => {
    if (from == null || from === to) return;
    const n = [...options]; const [it] = n.splice(from, 1); n.splice(to, 0, it); onOptions(n);
  };
  return (
    <div className="mb-2.5">
      <span className="block text-[11px] text-zinc-500 mb-1">Opciones · {multi ? 'marca TODAS las correctas' : 'marca la correcta'} · arrastra ⠿ para reordenar</span>
      {(options || []).map((opt, i) => (
        <div key={i} onDragOver={e => e.preventDefault()} onDrop={() => { move(dragI, i); setDragI(null); }}
          className={`flex items-center gap-2 mb-1 ${dragI === i ? 'opacity-40' : ''}`}>
          <span draggable onDragStart={() => setDragI(i)} onDragEnd={() => setDragI(null)} title="arrastra para reordenar"
            className="cursor-grab text-zinc-600 hover:text-zinc-300 select-none px-0.5 text-base leading-none">⠿</span>
          <button onClick={() => toggle(opt)} title="marcar correcta"
            className={`w-5 h-5 ${multi ? 'rounded' : 'rounded-full'} border flex items-center justify-center text-[11px] shrink-0 ${correct(opt) ? 'bg-emerald-600 border-emerald-600 text-black' : 'border-zinc-600 text-transparent hover:border-zinc-400'}`}>✓</button>
          <input value={opt} onChange={e => setOpt(i, e.target.value)} spellCheck={false}
            className={`flex-1 bg-zinc-900 border rounded px-2.5 py-1 text-[13px] ${correct(opt) ? 'border-emerald-700 text-emerald-200' : 'border-zinc-700 text-zinc-200'} focus:border-emerald-600`} />
          <button onClick={() => del(i)} className="text-zinc-600 hover:text-red-400 px-1 shrink-0">×</button>
        </div>
      ))}
      <button onClick={() => onOptions([...(options || []), ''])} className="text-[11px] text-zinc-500 hover:text-emerald-400 ml-6">+ opción</button>
    </div>
  );
}

function ListEdit({ label, items, onChange }) {
  return (
    <div className="mb-2.5">
      <span className="block text-[11px] text-zinc-500 mb-1">{label}</span>
      {(items || []).map((it, i) => (
        <div key={i} className="flex items-center gap-2 mb-1">
          <input value={it} onChange={e => { const n = [...items]; n[i] = e.target.value; onChange(n); }} spellCheck={false}
            className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2.5 py-1 text-[13px] text-zinc-200 focus:border-emerald-600" />
          <button onClick={() => onChange(items.filter((_, j) => j !== i))} className="text-zinc-600 hover:text-red-400 px-1 shrink-0">×</button>
        </div>
      ))}
      <button onClick={() => onChange([...(items || []), ''])} className="text-[11px] text-zinc-500 hover:text-emerald-400">+ agregar</button>
    </div>
  );
}

function Pairs({ label, pairs, keys, onChange }) {
  const [ka, kb] = keys;
  const set = (i, k, v) => onChange(pairs.map((p, j) => j === i ? { ...p, [k]: v } : p));
  return (
    <div className="mb-2.5">
      <span className="block text-[11px] text-zinc-500 mb-1">{label}</span>
      {(pairs || []).map((p, i) => (
        <div key={i} className="flex items-center gap-2 mb-1">
          <input value={p[ka] ?? ''} onChange={e => set(i, ka, e.target.value)} spellCheck={false}
            className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2.5 py-1 text-[13px] text-zinc-200 focus:border-emerald-600" />
          <span className="text-zinc-600 text-xs shrink-0">→</span>
          <input value={p[kb] ?? ''} onChange={e => set(i, kb, e.target.value)} spellCheck={false}
            className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2.5 py-1 text-[13px] text-emerald-200 focus:border-emerald-600" />
          <button onClick={() => onChange(pairs.filter((_, j) => j !== i))} className="text-zinc-600 hover:text-red-400 px-1 shrink-0">×</button>
        </div>
      ))}
      <button onClick={() => onChange([...(pairs || []), { [ka]: '', [kb]: '' }])} className="text-[11px] text-zinc-500 hover:text-emerald-400">+ par</button>
    </div>
  );
}

function DialogueEdit({ dialogue, onChange }) {
  const set = (i, patch) => onChange(dialogue.map((t, j) => j === i ? { ...t, ...patch } : t));
  return (
    <div className="mb-2.5">
      <span className="block text-[11px] text-zinc-500 mb-1">Diálogo (3 turnos; el de B es la respuesta a elegir abajo)</span>
      {(dialogue || []).map((t, i) => (
        <div key={i} className="flex items-center gap-2 mb-1">
          <span className="w-6 h-6 rounded-full bg-zinc-700 text-zinc-300 text-[11px] font-black flex items-center justify-center shrink-0">{t.speaker}</span>
          {t.line === null
            ? <span className="flex-1 text-[12px] text-indigo-400/70 italic px-2.5 py-1.5 border border-dashed border-zinc-700 rounded">(aquí responde B — se elige abajo)</span>
            : <input value={t.line ?? ''} onChange={e => set(i, { line: e.target.value })} spellCheck={false}
                className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2.5 py-1.5 text-[13px] text-zinc-100 focus:border-emerald-600" />}
        </div>
      ))}
    </div>
  );
}

function JsonEdit({ q, onUpdate }) {
  const [txt, setTxt] = useState(() => pretty(q));
  let ok = true; try { JSON.parse(txt); } catch { ok = false; }
  return (
    <div>
      <textarea value={txt} spellCheck={false} rows={Math.max(5, (txt.match(/\n/g) || []).length + 1)}
        onChange={e => { setTxt(e.target.value); try { onUpdate(q.id, JSON.parse(e.target.value)); } catch {} }}
        className={`w-full bg-zinc-900 border ${ok ? 'border-zinc-700' : 'border-red-600'} rounded px-2.5 py-1.5 text-[12px] text-zinc-200 focus:border-emerald-600 scroll`} />
      {!ok && <p className="text-red-500 text-[11px] mt-1">JSON inválido — corrige para que se guarde</p>}
    </div>
  );
}

function Fields({ q, update }) {
  const set = patch => update({ ...q, ...patch });
  const enun = q.q !== undefined ? <Txt label="Enunciado" value={q.q} area onChange={v => set({ q: v })} /> : null;
  const opts = (single) => (
    <Options multi={!single} options={q.options} answer={q.answer} answers={q.answers}
      onOptions={o => set({ options: o })} onAnswer={a => set(single ? { answer: a } : { answers: a })} />
  );
  switch (q.type) {
    case 'multipleChoice': case 'wordForm': case 'oddOneOut':
      return <>{enun}{opts(true)}</>;
    case 'audioQuestion':
      return <><Txt label="Audio — en INGLÉS (se lee en voz alta)" value={q.audioText} area onChange={v => set({ audioText: v })} /><Txt label="Pregunta — en INGLÉS" value={q.q} onChange={v => set({ q: v })} />{opts(true)}<p className="text-[10px] text-zinc-600 -mt-1">↑ las opciones van en ESPAÑOL (mide comprensión real)</p></>;
    case 'trueFalse':
      return <>{enun}<TF answer={q.answer} onChange={a => set({ answer: a })} /></>;
    case 'multipleResponse':
      return <>{enun}{opts(false)}</>;
    case 'fillBlank':
      return <>{enun}<Txt label="Pista" value={q.hint} onChange={v => set({ hint: v })} /><Txt label="Respuesta" value={q.answer} onChange={v => set({ answer: v })} /><ListEdit label="También acepta (variantes válidas)" items={q.accept || []} onChange={a => set({ accept: a })} /></>;
    case 'errorCorrection':
      return <>{enun}<Txt label="Oración corregida" value={q.answer} area onChange={v => set({ answer: v })} /><ListEdit label="También acepta (otras versiones correctas)" items={q.accept || []} onChange={a => set({ accept: a })} /></>;
    case 'translate':
      return <><Txt label="Frase en español (el alumno la escribe en inglés)" value={q.spanishPrompt} area onChange={v => set({ spanishPrompt: v })} /><Txt label="Traducción correcta (inglés)" value={q.answer} area onChange={v => set({ answer: v })} /><ListEdit label="Traducciones también válidas (minúsculas)" items={q.acceptedAnswers || []} onChange={a => set({ acceptedAnswers: a })} /><p className="text-[10px] text-zinc-600 -mt-1">Ignora mayúsculas, acentos, apóstrofes y puntuación. Pon variantes comunes para no fallar output válido.</p></>;
    case 'spotError':
      return <>{enun}<Txt label="Palabra con el error" value={q.errorWord} onChange={v => set({ errorWord: v })} /><Txt label="Oración corregida" value={q.answer} area onChange={v => set({ answer: v })} /></>;
    case 'unscramble':
      return <><Txt label="Frase en español (prompt)" value={q.spanishPrompt} onChange={v => set({ spanishPrompt: v })} /><Txt label="Etiqueta (ej: Arma la PREGUNTA)" value={q.targetLabel} onChange={v => set({ targetLabel: v })} /><ListEdit label="Fichas — incluye distractores que NO se usan" items={q.words || []} onChange={w => set({ words: w })} /><Txt label="Oración correcta" value={q.answer} area onChange={v => set({ answer: v })} /><ListEdit label="Respuestas también válidas (minúsculas, sin puntuación)" items={q.acceptedAnswers || []} onChange={a => set({ acceptedAnswers: a })} /></>;
    case 'dialogueFill':
      return <>{q.q !== undefined && <Txt label="Instrucción" value={q.q} onChange={v => set({ q: v })} />}<DialogueEdit dialogue={q.dialogue || []} onChange={d => set({ dialogue: d })} />{opts(true)}</>;
    case 'matching':
      return <>{enun}<Pairs label="Pares" pairs={q.pairs || []} keys={['left', 'right']} onChange={p => set({ pairs: p })} /><ListEdit label="Distractores (respuestas falsas extra, sin par)" items={q.distractors || []} onChange={d => set({ distractors: d })} /></>;
    case 'categorySort':
      return <>{enun}<ListEdit label="Palabras a clasificar" items={q.pool || []} onChange={p => set({ pool: p })} />
        {(q.buckets || []).map((b, i) => (
          <div key={i} className="border border-zinc-800 rounded p-2 mb-1">
            <Txt label={`Categoría ${i + 1}`} value={b.label} onChange={v => set({ buckets: q.buckets.map((x, j) => j === i ? { ...x, label: v } : x) })} />
            <ListEdit label="Palabras correctas aquí" items={b.correct || []} onChange={c => set({ buckets: q.buckets.map((x, j) => j === i ? { ...x, correct: c } : x) })} />
          </div>
        ))}</>;
    default:
      return enun;
  }
}

// ── tarjeta de una pregunta ───────────────────────────────────────────────────
const QCard = React.memo(function QCard({ q, isOverride, isAdded, dirty, onUpdate, onRevert, onDelete }) {
  const [json, setJson] = useState(false);
  const border = dirty ? 'border-amber-600/60' : isAdded ? 'border-cyan-800/60' : isOverride ? 'border-emerald-800/60' : 'border-zinc-800';
  return (
    <div className={`border ${border} rounded-lg bg-zinc-950/60 mb-3`}>
      <div className="flex items-center gap-2 px-3 py-2 border-b border-zinc-800/70 text-[11px] flex-wrap">
        <span className="text-zinc-200 font-bold">{TOOL_LABEL[q.type] || q.type}</span>
        <span className={TIER_COLOR[q.tier]}>· {TIER_LABEL[q.tier]}</span>
        <span className="ml-auto flex items-center gap-2.5">
          {dirty && <span className="text-amber-500">● sin guardar</span>}
          {!dirty && isAdded && <span className="text-cyan-400">✦ nueva</span>}
          {!dirty && !isAdded && isOverride && <span className="text-emerald-500">✓ editada</span>}
          <button onClick={() => setJson(s => !s)} className="text-zinc-600 hover:text-zinc-300">{json ? 'campos' : 'avanzado'}</button>
          {!isAdded && (dirty || isOverride) && <button onClick={() => onRevert(q.id)} className="text-zinc-500 hover:text-amber-400">revertir</button>}
          <button onClick={() => onDelete(q.id, isAdded)} className="text-zinc-600 hover:text-red-400" title="eliminar esta pregunta">🗑</button>
        </span>
      </div>
      <div className="p-3">
        {json ? <JsonEdit q={q} onUpdate={onUpdate} /> : <Fields q={q} update={obj => onUpdate(q.id, obj)} />}
      </div>
    </div>
  );
});

// ── app ───────────────────────────────────────────────────────────────────────
function App() {
  const [overrides, setOverrides] = useState({});
  const [drafts, setDrafts] = useState({});
  const [added, setAdded] = useState([]);       // preguntas nuevas (cada una con id, ship, container, tier, type)
  const [deleted, setDeleted] = useState(new Set()); // ids del banco base eliminados
  const [touched, setTouched] = useState(false);
  const [adding, setAdding] = useState(null);   // { ship, container, tier } cuando el panel está abierto
  const [shipIdx, setShipIdx] = useState(0);
  const [search, setSearch] = useState('');
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState('');
  const [collapsed, setCollapsed] = useState({});

  useEffect(() => {
    getDoc(BANK_REF).then(snap => {
      if (snap.exists()) {
        const d = snap.data();
        setOverrides(d.overrides || {});
        setAdded(d.added || []);
        setDeleted(new Set(d.deleted || []));
      }
    }).catch(e => setMsg('No cargó Firestore: ' + e.message)).finally(() => setLoaded(true));
  }, []);

  const addedById = useMemo(() => Object.fromEntries(added.map(a => [a.id, a])), [added]);
  const baseOf = id => seedById[id] || addedById[id] || {};
  const effective = id => overrides[id] || baseOf(id);
  const objOf = id => drafts[id] || effective(id);

  const dirtyIds = useMemo(() => Object.keys(drafts).filter(id => stable(drafts[id]) !== stable(effective(id))), [drafts, overrides, added]);
  const dirtySet = useMemo(() => new Set(dirtyIds), [dirtyIds]);

  const mark = () => setTouched(true);
  const onUpdate = useCallback((id, obj) => { setDrafts(d => ({ ...d, [id]: obj })); setTouched(true); }, []);
  const onRevert = useCallback(id => { setDrafts(d => ({ ...d, [id]: clone(seedById[id]) })); setTouched(true); }, []);
  const onDelete = useCallback((id, isAdded) => {
    if (isAdded) setAdded(a => a.filter(x => x.id !== id));
    else setDeleted(d => new Set([...d, id]));
    setDrafts(d => { const n = { ...d }; delete n[id]; return n; });
    setTouched(true);
  }, []);
  const addQuestion = useCallback((shipId, container, tier, type) => {
    const id = 'add_' + Date.now().toString(36) + '_' + Math.floor(Math.random() * 1296).toString(36);
    setAdded(a => [...a, { id, ship: shipId, container, tier, type, ...MOLD[type]() }]);
    setAdding(null); setTouched(true);
  }, []);

  async function save() {
    const nextOv = { ...overrides };
    for (const id of Object.keys(drafts)) {
      if (seedById[id]) { // edición de base
        if (stable(drafts[id]) === stable(seedById[id])) delete nextOv[id]; else nextOv[id] = drafts[id];
      }
    }
    const nextAdded = added.map(a => drafts[a.id] ? { ...drafts[a.id] } : a);
    const delArr = [...deleted];
    setSaving(true);
    try {
      await setDoc(BANK_REF, { overrides: nextOv, added: nextAdded, deleted: delArr, updatedAt: serverTimestamp() });
      setOverrides(nextOv); setAdded(nextAdded); setDrafts({}); setTouched(false);
      setMsg(`✓ Guardado · ${Object.keys(nextOv).length} editadas · ${nextAdded.length} nuevas · ${delArr.length} eliminadas`);
    } catch (e) { setMsg('✕ Error al guardar: ' + e.message); }
    setSaving(false);
  }

  function exportJSON() {
    const blob = new Blob([pretty({ overrides, added, deleted: [...deleted] })], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'placement-overrides.json'; a.click();
  }

  const ship = SHIPS[shipIdx];
  const q = search.trim().toLowerCase();

  const byContainer = useMemo(() => {
    const out = { conoce: [], entiende: [], produce: [] };
    ship.questions.forEach(qq => { if (!deleted.has(qq.id) && out[qq.container]) out[qq.container].push(qq.id); });
    added.filter(a => a.ship === ship.id).forEach(a => { if (out[a.container]) out[a.container].push(a.id); });
    CONTAINERS.forEach(c => out[c].sort((a, b) => TIERS.indexOf(baseOf(a).tier) - TIERS.indexOf(baseOf(b).tier)));
    return out;
  }, [shipIdx, deleted, added]);

  const allIds = useMemo(() => [...Object.keys(seedById).filter(id => !deleted.has(id)), ...added.map(a => a.id)], [deleted, added]);
  const searchResults = useMemo(() => {
    if (!q) return [];
    return allIds.filter(id => id.toLowerCase().includes(q) || pretty(effective(id)).toLowerCase().includes(q));
  }, [q, overrides, allIds]);

  if (!loaded) return <div className="p-6 text-zinc-500 text-sm">cargando banco…</div>;

  const renderCard = id => (
    <QCard key={id} q={objOf(id)} isOverride={!!overrides[id]} isAdded={!seedById[id]} dirty={dirtySet.has(id)}
      onUpdate={onUpdate} onRevert={onRevert} onDelete={onDelete} />
  );

  return (
    <div className="h-screen flex flex-col">
      <header className="shrink-0 border-b border-zinc-800 bg-zinc-950 px-4 py-2.5 flex items-center gap-3 text-[12.5px]">
        <span className="text-emerald-400 font-bold">Banco del Examen de Nivel</span>
        <span className="text-zinc-600">{SHIPS.length} barcos · {TOTAL_Q} base</span>
        {Object.keys(overrides).length > 0 && <span className="text-emerald-600">· {Object.keys(overrides).length} editadas</span>}
        {added.length > 0 && <span className="text-cyan-500">· {added.length} nuevas</span>}
        {deleted.size > 0 && <span className="text-red-500">· {deleted.size} eliminadas</span>}
        {touched && <span className="text-amber-500">· ● sin guardar</span>}
        {msg && <span className="text-zinc-400 truncate">· {msg}</span>}
        <div className="ml-auto flex items-center gap-2">
          <button onClick={exportJSON} className="px-2.5 py-1 border border-zinc-700 rounded text-zinc-400 hover:text-zinc-100 hover:border-zinc-500">exportar</button>
          <button onClick={save} disabled={saving || !touched}
            className={`px-3 py-1 rounded font-bold ${!touched ? 'border border-zinc-800 text-zinc-600' : 'bg-emerald-600 text-black hover:bg-emerald-500'}`}>
            {saving ? 'guardando…' : 'Guardar'}
          </button>
        </div>
      </header>

      <div className="flex-1 flex min-h-0">
        <aside className="w-64 shrink-0 border-r border-zinc-800 bg-zinc-950 overflow-y-auto scroll py-2">
          {SHIPS.map((s, i) => {
            const active = i === shipIdx && !q;
            const count = s.questions.filter(x => !deleted.has(x.id)).length + added.filter(a => a.ship === s.id).length;
            return (
              <button key={s.id} onClick={() => { setShipIdx(i); setSearch(''); }}
                className={`w-full text-left px-3 py-2 border-l-2 ${active ? 'border-emerald-500 bg-zinc-900' : 'border-transparent hover:bg-zinc-900/50'}`}>
                <div className={`text-[12.5px] ${active ? 'text-zinc-100' : 'text-zinc-300'}`}>Barco {s.n} — {s.label}</div>
                <div className="text-[10.5px] text-zinc-600 mt-0.5">{s.level} · {count} preguntas{count !== 18 ? ' ⚠️' : ''}</div>
              </button>
            );
          })}
        </aside>

        <main className="flex-1 overflow-y-auto scroll p-4">
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="buscar pregunta por texto o id en todos los barcos…"
            className="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-[13px] text-zinc-200 placeholder-zinc-600 focus:border-emerald-700 mb-4" />

          {q ? (
            <div>
              <p className="text-[12px] text-zinc-500 mb-3">{searchResults.length} resultados para "{search}"</p>
              {searchResults.map(renderCard)}
            </div>
          ) : (
            <div>
              <h2 className="text-[14px] text-zinc-200 mb-0.5">Barco {ship.n} — {ship.label}</h2>
              <p className="text-[11.5px] text-zinc-600 mb-5">{ship.level} · {ship.module} · sem {ship.week} &nbsp;|&nbsp; {ship.grammar}</p>
              {CONTAINERS.map(c => {
                const open = !collapsed[c];
                const ids = byContainer[c];
                return (
                  <section key={c} className="mb-6">
                    <div className="flex items-center gap-2 mb-2.5">
                      <button onClick={() => setCollapsed(x => ({ ...x, [c]: !x[c] }))}
                        className="text-[12px] font-bold flex items-center gap-2 hover:opacity-80 shrink-0">
                        <span className="text-emerald-500 w-3 text-center">{open ? '▾' : '▸'}</span>
                        <span className={CONTAINER_COLOR[c]}>{CONTAINER_LABEL[c]}</span>
                        <span className="text-zinc-600 font-normal">· {ids.length}{ids.length !== 6 ? ' ⚠️' : ''}</span>
                      </button>
                      <span className="flex-1 border-b border-zinc-800/70" />
                      <button onClick={() => setAdding({ ship: ship.id, container: c, tier: null })}
                        className="text-[11px] font-bold text-emerald-500 hover:text-emerald-300 border border-zinc-700 hover:border-emerald-700 rounded px-2 py-0.5 shrink-0">+ pregunta</button>
                    </div>
                    {open && (
                      <>
                        {ids.map(renderCard)}
                        <button onClick={() => setAdding({ ship: ship.id, container: c, tier: null })}
                          className="w-full py-2 mt-1 text-[12px] text-emerald-500 hover:text-emerald-300 border border-dashed border-zinc-700 hover:border-emerald-700 rounded-lg transition-colors">
                          + añadir pregunta a {CONTAINER_LABEL[c]}
                        </button>
                      </>
                    )}
                  </section>
                );
              })}
            </div>
          )}
          <div className="h-20" />
        </main>
      </div>

      {/* Panel de añadir pregunta */}
      {adding && (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setAdding(null)}>
          <div className="bg-zinc-900 border border-zinc-700 rounded-xl w-full max-w-lg p-5" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-[14px] text-zinc-100 font-bold">Añadir pregunta · <span className={CONTAINER_COLOR[adding.container]}>{CONTAINER_LABEL[adding.container]}</span></h3>
              <button onClick={() => setAdding(null)} className="text-zinc-500 hover:text-zinc-200">✕</button>
            </div>
            <p className="text-[11px] text-zinc-500 mb-2">1 · Dificultad</p>
            <div className="flex gap-2 mb-4">
              {TIERS.map(t => (
                <button key={t} onClick={() => setAdding(a => ({ ...a, tier: t }))}
                  className={`px-3 py-1.5 rounded text-[12px] border ${adding.tier === t ? 'bg-emerald-600 border-emerald-600 text-black font-bold' : 'border-zinc-700 text-zinc-300 hover:border-zinc-500'}`}>{TIER_LABEL[t]}</button>
              ))}
            </div>
            <p className="text-[11px] text-zinc-500 mb-2">2 · Tipo de pregunta {!adding.tier && <span className="text-amber-500">(elige dificultad primero)</span>}</p>
            <div className="grid grid-cols-2 gap-2">
              {TYPES.map(t => (
                <button key={t} disabled={!adding.tier} onClick={() => addQuestion(adding.ship, adding.container, adding.tier, t)}
                  className="px-3 py-2 rounded text-[12px] text-left border border-zinc-700 text-zinc-300 hover:border-emerald-600 hover:text-emerald-300 disabled:opacity-30 disabled:hover:border-zinc-700 disabled:hover:text-zinc-300">{TOOL_LABEL[t]}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

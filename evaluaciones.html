<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Volume Bar Slider Customizado */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; 
            background: #fff; cursor: pointer; margin-top: -10px; 
            border: 4px solid currentColor; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); 
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
        input[type=range]::-webkit-slider-runnable-track { 
            width: 100%; height: 8px; cursor: pointer; background: #e2e8f0; border-radius: 4px; 
        }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, CheckSquare, Square, AlertTriangle, Loader2, LayoutGrid, Zap, Award, Lock, CheckCircle2, Brain, Key, ChevronDown, ChevronUp } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FALLAS UNIVERSALES DE GRAMÁTICA
        const UNIVERSAL_FAILS = [
            "Resuelve en papel, pero no lo usa al hablar",
            "No lo identifica al escucharlo (Listening)"
        ];

        // FALLAS UNIVERSALES DE VOCABULARIO (VERBOS)
        const VOCAB_FAILS = [
            "Resuelve en ejercicio pero no en conversación",
            "No los reconoce al escucharlos",
            "Tiene problemas pronunciando"
        ];

        // KEYVERBS & ESTRUCTURAS
        const KEYVERBS_LIST = [
            "WH Questions",
            "Object Pronouns",
            "Possessive Pronouns",
            "Prepositions of Time (In/On/At)",
            "Prepositions of Place",
            "Prepositions Cause/Effect",
            "Adjectives (-ed / -ing)",
            "Nouns (Campos Semánticos)",
            "Conjunctions (And, but, so...)"
        ];

        const GRAMMAR_TRACKS = {
            basic: {
                title: "Básico", icon: LayoutGrid, color: "text-emerald-500", bg: "bg-emerald-100 dark:bg-emerald-900/30", barColor: "bg-emerald-500",
                topics: [
                    { id: 'modal_verbs', title: 'Modal Verbs (Can, must, should...)', fails: ["No sabe el significado (traducción)", "Mezcla el 'to' (Can to play)", "Falla en Negación (Don't can)", "No sabe armar Preguntas", ...UNIVERSAL_FAILS] },
                    { id: 'present_simple', title: 'Present Simple', fails: ["Olvida la 's' de 3ra persona", "Falla Do/Does en pregunta", "Falla Don't/Doesn't", "Armado de WH Questions", ...UNIVERSAL_FAILS] },
                    { id: 'present_continuous', title: 'Present Continuous', fails: ["Olvida el verbo To Be (I playing)", "Olvida el -ing (I am play)", "Lo usa para rutinas", "Falla en reglas de deletreo", ...UNIVERSAL_FAILS] },
                    { id: 'going_to', title: 'Future Intentions (Going to)', fails: ["Olvida el verbo To Be", "Olvida el 'to'", "Lo confunde con 'Will'", "Falla en Negación", ...UNIVERSAL_FAILS] }
                ]
            },
            advanced: {
                title: "Avanzado", icon: Zap, color: "text-blue-500", bg: "bg-blue-100 dark:bg-blue-900/30", barColor: "bg-blue-500",
                topics: [
                    { id: 'past_vs_perfect', title: 'Past Simple vs Present Perfect', fails: ["Usa Past Simple para experiencias", "Equivoca verbos irregulares", "Olvida el auxiliar Have/Has", "Confunde For y Since", ...UNIVERSAL_FAILS] },
                    { id: 'conditionals_1_2', title: '1st & 2nd Conditionals', fails: ["Pone Will/Would en la condición", "Falla el pasado en 2nd Cond.", "No entiende diferencia de probabilidad", ...UNIVERSAL_FAILS] },
                    { id: 'comparatives', title: 'Comparatives & Superlatives', fails: ["Mezcla 'more' con '-er'", "Olvida el 'than'", "Irregulares (gooder)", "Olvida el 'the' en superlativos", ...UNIVERSAL_FAILS] }
                ]
            },
            pro: {
                title: "Pro", icon: Award, color: "text-purple-500", bg: "bg-purple-100 dark:bg-purple-900/30", barColor: "bg-purple-500",
                topics: [
                    { id: 'passive_voice', title: 'Passive Voice', fails: ["Olvida el verbo To Be", "Falla el Participio", "Confunde Sujeto con Objeto", "Falla tiempos compuestos", ...UNIVERSAL_FAILS] },
                    { id: 'reported_speech', title: 'Reported Speech', fails: ["No retrasa el tiempo (Backshift)", "No cambia pronombres", "No cambia palabras de tiempo", ...UNIVERSAL_FAILS] },
                    { id: 'conditionals_3', title: '3rd & Mixed Conditionals', fails: ["Se pierde en la estructura larga", "Falla Past Perfect en la condición", "Falla Would have + participio", ...UNIVERSAL_FAILS] }
                ]
            }
        };

        const VOCAB_TOPICS = [
            { id: 'verbs_1_3', title: 'Verbs Pack 1, 2, 3', fails: VOCAB_FAILS },
            { id: 'verbs_4_6', title: 'Verbs Pack 4, 5, 6', fails: VOCAB_FAILS },
            { id: 'verbs_7_9', title: 'Verbs Pack 7, 8, 9', fails: VOCAB_FAILS }
        ];

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(false);
            
            const [activeTrack, setActiveTrack] = useState('basic');
            
            // ESTADO DE ACORDEONES (Pestañas colapsables)
            const [openPanels, setOpenPanels] = useState(['grammar']); 

            const [evalData, setEvalData] = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        
                        if (data.detailedGrammar) setEvalData(data.detailedGrammar);
                        
                        if (data.level === 'advanced' || data.level === 'pro') setActiveTrack(data.level);
                        else setActiveTrack('basic'); 
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedGrammar: evalData });
                    setIsSaving(false);
                    setToast(true);
                    setTimeout(() => setToast(false), 3000); 
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            const togglePanel = (panelName) => {
                setOpenPanels(prev => 
                    prev.includes(panelName) ? prev.filter(p => p !== panelName) : [...prev, panelName]
                );
            };

            const isTrackLocked = (trackId) => {
                const lvl = student?.level || 'limbo';
                if (lvl === 'vip' || lvl === 'pro') return false; 
                if (lvl === 'advanced' && trackId === 'pro') return true;
                if ((lvl === 'basic' || lvl === 'limbo') && (trackId === 'advanced' || trackId === 'pro')) return true;
                return false;
            };

            const calculateScore = (failsCount, totalFails) => {
                if (failsCount === 0) return 10;
                const penaltyPerFail = 10 / totalFails;
                const score = Math.max(0, Math.round(10 - (failsCount * penaltyPerFail)));
                return score;
            };

            const getTopicData = (topicId, totalFails) => {
                const data = evalData[topicId] || { fails: [] };
                // Para keyverbs usamos la longitud directa de su propio array
                const calculatedTotalFails = totalFails || (topicId === 'keyverbs' ? KEYVERBS_LIST.length : 3); 
                const score = calculateScore(data.fails.length, calculatedTotalFails);
                return { ...data, score };
            };

            const updateScore = (topicId, newScore) => {
                setEvalData(prev => ({
                    ...prev,
                    [topicId]: { ...(prev[topicId] || { fails: [] }), score: parseInt(newScore) }
                }));
            };

            const toggleFail = (topicId, failLabel) => {
                setEvalData(prev => {
                    const topic = prev[topicId] || { fails: [] };
                    const newFails = topic.fails.includes(failLabel) 
                        ? topic.fails.filter(f => f !== failLabel) 
                        : [...topic.fails, failLabel];
                    return { ...prev, [topicId]: { ...topic, fails: newFails } };
                });
            };

            const getProgressBarColor = (score) => {
                if (score >= 8) return 'bg-emerald-500';
                if (score >= 5) return 'bg-yellow-400';
                return 'bg-rose-500';
            };

            const Checkbox = ({ label, checked, onChange, colorClass }) => (
                <label onClick={(e) => { e.preventDefault(); onChange(); }} className={`flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl cursor-pointer transition-all border border-transparent select-none ${checked ? `bg-white dark:bg-zinc-800 shadow-sm border-slate-200 dark:border-zinc-700` : ''}`}>
                    {checked ? <CheckSquare className={colorClass} size={20}/> : <Square className="text-slate-300 dark:text-zinc-600" size={20}/>}
                    <span className={`text-sm font-bold pointer-events-none leading-snug ${checked ? 'text-slate-800 dark:text-zinc-200' : 'text-slate-500 dark:text-zinc-400'}`}>{label}</span>
                </label>
            );

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const trackInfo = GRAMMAR_TRACKS[activeTrack];
            const keyverbsData = getTopicData('keyverbs', KEYVERBS_LIST.length);

            return (
                <div className="min-h-screen pb-24">
                    
                    {toast && (
                        <div className="fixed bottom-8 right-8 z-[100] bg-emerald-500 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-5 fade-in duration-300">
                            <CheckCircle2 size={24}/>
                            <span className="font-black tracking-wide">¡Progreso Guardado!</span>
                        </div>
                    )}

                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <div className="bg-rose-500 p-2 rounded-lg text-white shadow-md"><Target size={20}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 dark:text-white leading-none">Evaluación Diagnóstica</h1>
                                    <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mt-1">Análisis de {student?.name}</p>
                                </div>
                            </div>
                            <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-black shadow-lg flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} <span className="hidden sm:inline">Guardar Progreso</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8 space-y-6">
                        
                        {/* SELECTOR DE NIVELES CON CANDADOS */}
                        <div className="flex overflow-x-auto gap-3 pb-4 no-select custom-scrollbar">
                            {Object.entries(GRAMMAR_TRACKS).map(([key, track]) => {
                                const locked = isTrackLocked(key);
                                return (
                                    <button 
                                        key={key} 
                                        onClick={() => !locked && setActiveTrack(key)}
                                        className={`flex items-center gap-2 px-5 py-3 rounded-2xl font-black text-sm transition-all border-2 shrink-0 ${locked ? 'opacity-50 bg-slate-100 dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-400 dark:text-zinc-600 cursor-not-allowed' : activeTrack === key ? `${track.color} border-current bg-white dark:bg-zinc-900 shadow-md scale-105` : 'text-slate-500 border-transparent hover:bg-slate-200 dark:hover:bg-zinc-800'}`}
                                    >
                                        {locked ? <Lock size={18}/> : <track.icon size={18}/>} {track.title}
                                    </button>
                                )
                            })}
                        </div>

                        {/* ACORDEÓN 1: GRAMMAR */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300">
                            <button onClick={() => togglePanel('grammar')} className={`w-full ${trackInfo.bg} p-5 flex items-center justify-between border-b border-slate-200 dark:border-zinc-800 no-select hover:brightness-95 transition-all`}>
                                <div className="flex items-center gap-3">
                                    <PenTool className={trackInfo.color} size={24}/>
                                    <h2 className={`text-lg font-black uppercase tracking-widest ${trackInfo.color}`}>GRAMMAR ({trackInfo.title})</h2>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className={`text-xs font-bold uppercase tracking-widest bg-white/50 dark:bg-black/20 px-3 py-1 rounded-lg ${trackInfo.color} hidden sm:block`}>{student?.level === 'vip' ? 'Acceso VIP' : student?.level}</span>
                                    {openPanels.includes('grammar') ? <ChevronUp className={trackInfo.color}/> : <ChevronDown className={trackInfo.color}/>}
                                </div>
                            </button>

                            {openPanels.includes('grammar') && (
                                <div className="p-6 md:p-8 space-y-12 animate-in slide-in-from-top-4 fade-in duration-300">
                                    {trackInfo.topics.map(topic => {
                                        const totalPossibleFails = topic.fails.length;
                                        const data = getTopicData(topic.id, totalPossibleFails);
                                        const barColor = getProgressBarColor(data.score);
                                        
                                        return (
                                            <div key={topic.id} className="relative">
                                                <div className="flex justify-between items-end mb-4">
                                                    <div>
                                                        <h3 className="font-black text-xl text-slate-800 dark:text-white leading-tight mb-1">{topic.title}</h3>
                                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">({totalPossibleFails - data.fails.length} de {totalPossibleFails} dominados)</p>
                                                    </div>
                                                    <div className={`px-4 py-2 rounded-xl flex items-center gap-1 font-black shadow-sm border ${data.score >= 8 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 border-emerald-200 dark:border-emerald-800' : data.score >= 5 ? 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 border-yellow-200 dark:border-yellow-800' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 border-rose-200 dark:border-rose-800'}`}>
                                                        <span className="text-2xl">{data.score}</span><span className="text-sm opacity-50">/10</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="w-full h-3 bg-slate-100 dark:bg-zinc-800 rounded-full overflow-hidden mb-6 border border-slate-200 dark:border-zinc-700">
                                                    <div className={`h-full transition-all duration-500 ease-out ${barColor}`} style={{ width: `${(data.score / 10) * 100}%` }}></div>
                                                </div>

                                                <div className="bg-slate-50 dark:bg-zinc-950/50 p-5 rounded-2xl border border-slate-200 dark:border-zinc-800">
                                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Checklist de Errores (Marca los que comete)</p>
                                                    <div className="grid sm:grid-cols-2 gap-3">
                                                        {topic.fails.map(fail => (
                                                            <Checkbox key={fail} label={fail} checked={data.fails.includes(fail)} onChange={() => toggleFail(topic.id, fail)} colorClass={trackInfo.color}/>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>

                        {/* ACORDEÓN 2: VOCABULARIO */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300">
                            <button onClick={() => togglePanel('vocab')} className={`w-full bg-rose-100 dark:bg-rose-900/30 p-5 flex items-center justify-between border-b border-rose-200 dark:border-rose-800 no-select hover:brightness-95 transition-all`}>
                                <div className="flex items-center gap-3">
                                    <Brain className="text-rose-600 dark:text-rose-400" size={24}/>
                                    <h2 className="text-lg font-black uppercase tracking-widest text-rose-600 dark:text-rose-400">VOCABULARIO</h2>
                                </div>
                                {openPanels.includes('vocab') ? <ChevronUp className="text-rose-600 dark:text-rose-400"/> : <ChevronDown className="text-rose-600 dark:text-rose-400"/>}
                            </button>

                            {openPanels.includes('vocab') && (
                                <div className="p-6 md:p-8 space-y-12 animate-in slide-in-from-top-4 fade-in duration-300">
                                    {VOCAB_TOPICS.map(topic => {
                                        const data = getTopicData(topic.id, topic.fails.length);
                                        const barColor = getProgressBarColor(data.score);
                                        return (
                                            <div key={topic.id} className="relative">
                                                <div className="flex justify-between items-end mb-4">
                                                    <div>
                                                        <h3 className="font-black text-xl text-slate-800 dark:text-white leading-tight mb-1">{topic.title}</h3>
                                                    </div>
                                                </div>
                                                <input type="range" min="0" max="10" step="1" value={data.score} onChange={e => updateScore(topic.id, e.target.value)} className="text-rose-500 mb-4"/>
                                                
                                                {data.score < 10 && (
                                                    <div className="bg-slate-50 dark:bg-zinc-950 p-5 rounded-2xl border border-slate-200 dark:border-zinc-800 mt-4 animate-in fade-in">
                                                        <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Checklist de Errores</p>
                                                        <div className="grid sm:grid-cols-2 gap-3">
                                                            {topic.fails.map(fail => (
                                                                <Checkbox key={fail} label={fail} checked={data.fails.includes(fail)} onChange={() => toggleFail(topic.id, fail)} colorClass="text-rose-500"/>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>

                        {/* ACORDEÓN 3: KEYVERBS & ESTRUCTURAS */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300">
                            <button onClick={() => togglePanel('keyverbs')} className={`w-full bg-amber-100 dark:bg-amber-900/30 p-5 flex items-center justify-between border-b border-amber-200 dark:border-amber-800 no-select hover:brightness-95 transition-all`}>
                                <div className="flex items-center gap-3">
                                    <Key className="text-amber-600 dark:text-amber-400" size={24}/>
                                    <h2 className="text-lg font-black uppercase tracking-widest text-amber-600 dark:text-amber-400">KEYVERBS & STRUCTURES</h2>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="text-xs font-bold uppercase tracking-widest bg-white/50 dark:bg-black/20 px-3 py-1 rounded-lg text-amber-600 dark:text-amber-400 hidden sm:block">Master List</span>
                                    {openPanels.includes('keyverbs') ? <ChevronUp className="text-amber-600 dark:text-amber-400"/> : <ChevronDown className="text-amber-600 dark:text-amber-400"/>}
                                </div>
                            </button>

                            {openPanels.includes('keyverbs') && (
                                <div className="p-6 md:p-8 animate-in slide-in-from-top-4 fade-in duration-300">
                                    <div className="flex justify-between items-end mb-4">
                                        <div>
                                            <h3 className="font-black text-xl text-slate-800 dark:text-white leading-tight mb-1">Estructuras Complementarias</h3>
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Marca las que el alumno FALLA o DESCONOCE</p>
                                        </div>
                                        <div className={`px-4 py-2 rounded-xl flex items-center gap-1 font-black shadow-sm border ${keyverbsData.score >= 8 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 border-emerald-200 dark:border-emerald-800' : keyverbsData.score >= 5 ? 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 border-yellow-200 dark:border-yellow-800' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 border-rose-200 dark:border-rose-800'}`}>
                                            <span className="text-2xl">{keyverbsData.score}</span><span className="text-sm opacity-50">/10</span>
                                        </div>
                                    </div>
                                    
                                    <div className="w-full h-3 bg-slate-100 dark:bg-zinc-800 rounded-full overflow-hidden mb-6 border border-slate-200 dark:border-zinc-700">
                                        <div className={`h-full transition-all duration-500 ease-out ${getProgressBarColor(keyverbsData.score)}`} style={{ width: `${(keyverbsData.score / 10) * 100}%` }}></div>
                                    </div>

                                    <div className="bg-slate-50 dark:bg-zinc-950/50 p-5 rounded-2xl border border-slate-200 dark:border-zinc-800">
                                        <div className="grid sm:grid-cols-2 gap-3">
                                            {KEYVERBS_LIST.map(fail => (
                                                <Checkbox 
                                                    key={fail} 
                                                    label={fail} 
                                                    checked={keyverbsData.fails.includes(fail)} 
                                                    onChange={() => toggleFail('keyverbs', fail)} 
                                                    colorClass="text-amber-500"
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-taxonomy.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, Loader2, Brain, Key, ChevronDown, ChevronUp, XCircle, MinusCircle, CheckCircle, CheckCircle2, Eye, Calendar, Lock, BookOpen, Palette } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SKILLS GLOBALES ---
        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];
        const CORE_MASTERY_SKILLS = ["Aplica en conversación", "Identifica al escuchar", "Pronuncia correctamente"];
        const ADVANCED_VERB_SKILLS = ["Significado al verlo", "Pronuncia correctamente", "Concordancia (Contexto)", "Aplica en conversación", "Identifica al escuchar"];
        const PRO_VERB_SKILLS = ["Precisión de registro", "Fluidez espontánea", "Aplica en debate", "Identifica matiz/tono", "Comprende a nativos"];
        
        // Habilidades específicas para Nouns y Adjectives
        const VOCAB_SKILLS = ["Identifica (ID)", "Ortografía (SP)", "Colocación (COL)", "Uso activo (USE)"];

        // --- HELPERS DE TOPICS (cada topic = {id, title(=string EXACTO de taxonomía), cat, skills}) ---
        const G   = (id, title, skills) => ({ id, title, cat: 'grammar',     skills });
        const N   = (id, title)         => ({ id, title, cat: 'nouns',       skills: VOCAB_SKILLS });
        const ADJ = (id, title)         => ({ id, title, cat: 'adjectives',  skills: VOCAB_SKILLS });
        const AV  = (id, title)         => ({ id, title, cat: 'verbs',       skills: ADVANCED_VERB_SKILLS });
        const PV  = (id, title)         => ({ id, title, cat: 'verbs',       skills: PRO_VERB_SKILLS });
        // single-skill (un rating por tema; la skill ES el tema) — verbs básicos y key structures
        const VB  = (id, title)         => ({ id, title, cat: 'verbs',       skills: [title] });
        const KS  = (id, title)         => ({ id, title, cat: 'key_structs', skills: [title] });

        // --- DICCIONARIO DE CONFIGURACIÓN POR NIVEL (títulos = periplo-taxonomy.js) ---
        const CONFIG = {
            basic: {
                grammar: [
                    G('modal_verbs',        'Modal Verbs',        ["Significado correcto", "Omisión del 'to'", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS]),
                    G('present_simple',     'Present Simple',     ["Regla de la 's'", "Auxiliar Do/Does", "Negación don't/doesn't", "WH Questions", ...UNIVERSAL_SKILLS]),
                    G('present_continuous', 'Present Continuous', ["Verbo To Be", "Sufijo -ing", "Contraste vs Simple", "Reglas deletreo", ...UNIVERSAL_SKILLS]),
                    G('going_to',           'Future (Going to)',  ["Inclusión To Be", "Partícula 'to'", "Contraste vs Will", "Negación", ...UNIVERSAL_SKILLS])
                ],
                verbs: [
                    VB('v_b_1','Pack 1: Daily Routine'),        VB('v_b_2','Pack 2: Home & Communication'),
                    VB('v_b_3','Pack 3: Travel & Adventure'),   VB('v_b_4','Pack 4: Feelings & Reactions'),
                    VB('v_b_5','Pack 5: Action & Strategy'),    VB('v_b_6','Pack 6: Social & Relationships'),
                    VB('v_b_7','Pack 7: Science & Lab'),        VB('v_b_8','Pack 8: Corporate & Economy'),
                    VB('v_b_9','Pack 9: Hospital & Health')
                ],
                nouns: [
                    N('n_b_1','Pack 1: Modern Nomad'),    N('n_b_2','Pack 2: Hungry Traveler'),
                    N('n_b_3','Pack 3: Travel & Places'), N('n_b_4','Pack 4: Emotions & Mind'),
                    N('n_b_5','Pack 5: Weekend Getaway'), N('n_b_6','Pack 6: People & Society'),
                    N('n_b_7','Pack 7: Science & Lab'),   N('n_b_8','Pack 8: Money & Power'),
                    N('n_b_9','Pack 9: Body & Health')
                ],
                adjectives: [
                    ADJ('adj_1','Pack 1: Personality & Looks'), ADJ('adj_2','Pack 2: Feelings & State'),
                    ADJ('adj_3','Pack 3: Places & Vibes'),      ADJ('adj_4','Pack 4: The -ed/-ing Trap'),
                    ADJ('adj_5','Pack 5: Opinions & Taste')
                ],
                key_structs: [
                    KS('ks_b_1','WH Questions'),          KS('ks_b_2','Prep. Place'),           KS('ks_b_3','Frequency Adverbs'),
                    KS('ks_b_4','FANBOYS & Correlative'), KS('ks_b_5','Subordinating Conj.'),   KS('ks_b_6','Prep. Time'),
                    KS('ks_b_7','Prep. Movement & Other'),KS('ks_b_8','Object Pronouns'),
                    KS('ks_b_9','Quantifiers'),           KS('ks_b_10','Possessive Pronouns')
                ]
            },
            advanced: {
                grammar: [
                    G('past_simple',  'Past Simple',          ["Confunde pasado/presente", "Usa did en afirmativo", "Did + Verb in Past", "Pronunciación -ed", ...UNIVERSAL_SKILLS]),
                    G('second_cond',  'Second Conditional',   ["Would en cláusula IF", "Presente vs Pasado", "Uso de 'Were'", "Contracción 'd", ...UNIVERSAL_SKILLS]),
                    G('past_cont',    'Past Continuous',      ["Olvida was/were", "When vs While", "Uso State Verbs", "Concordancia", ...UNIVERSAL_SKILLS]),
                    G('past_future',  'Past Future Intention',["Will para planes pasados", "Concordancia (They was)", "vs Used To", "Auxiliar be", ...UNIVERSAL_SKILLS])
                ],
                verbs: [
                    AV('v_a_irr_af','Irregular A-F'),    AV('v_a_irr_gm','Irregular G-M'),
                    AV('v_a_irr_rs','Irregular R-S'),    AV('v_a_irr_tw','Irregular T-W'),
                    AV('v_a_reg_t','Regular /t/ Sound'), AV('v_a_reg_d','Regular /d/ Sound'),
                    AV('v_a_reg_id','Regular /ɪd/ Sound')
                ],
                nouns: [
                    N('n_a_1','Pack 1: Success & Failure'),     N('n_a_2','Pack 2: Truth & Lies'),
                    N('n_a_3','Pack 3: Media & Entertainment'), N('n_a_4','Pack 4: Regrets & Turning Points'),
                    N('n_a_5','Pack 5: Attraction & Identity'), N('n_a_6','Pack 6: Ambition & Competition'),
                    N('n_a_7','Pack 7: Mystery & Crime'),       N('n_a_8','Pack 8: Systems & Society')
                ],
                adjectives: [
                    ADJ('adj_a_1','Short Comparatives'),    ADJ('adj_a_2','Long Comparatives'),
                    ADJ('adj_a_3','Irregular Comparatives'),ADJ('adj_a_4','Superlatives')
                ],
                key_structs: [
                    KS('ks_a_1','Used to / Use to'),    KS('ks_a_2','Comparative Rules'),  KS('ks_a_3','Superlative Rules'),
                    KS('ks_a_4','Idiomatic Expressions'),KS('ks_a_5','Possessive Nouns'),  KS('ks_a_6','Relative Clauses'),
                    KS('ks_a_7','Modals of Possibility'),KS('ks_a_8','Passive Voice')
                ]
            },
            pro: {
                grammar: [
                    G('perf_tenses', 'Present/Past Perfect', ["Confunde con Past Simple", "Omite auxiliar Have/Had", "Error en Participio", "For/Since incorrecto", ...UNIVERSAL_SKILLS]),
                    G('perf_cont',   'Perfect Continuous',   ["Omite 'been'", "Usa con State Verbs", "Confunde duración/resultado", "Falla estructura", ...UNIVERSAL_SKILLS]),
                    G('third_cond',  'Third Conditional',    ["'Would' en cláusula IF", "Falla en participio", "Confunde irrealidad", "Olvida 'have'", ...UNIVERSAL_SKILLS]),
                    G('mixed_cond',  'Mixed Conditionals',   ["Mezcla mal los tiempos", "Confunde resultado presente", "Estructura incompleta", "Uso ilógico", ...UNIVERSAL_SKILLS])
                ],
                verbs: [
                    PV('v_phrasal2','Phrasal Verbs 2'),    PV('v_idioms','Idiomatic Expressions'),
                    PV('v_sayings','Sayings & Proverbs'),  PV('v_colloc','Advanced Collocations')
                ],
                nouns: [
                    N('n_p_1','Pack 1: Law & Politics'),  N('n_p_2','Pack 2: Finance & Econ.'),
                    N('n_p_3','Pack 3: Collective Nouns'),N('n_p_4','Pack 4: Uncountables'),
                    N('n_p_5','Pack 5: Formal & Academic')
                ],
                adjectives: [
                    ADJ('adj_p_1','Formal Register Adj.'), ADJ('adj_p_2','Nuance & Tone Adj.')
                ],
                key_structs: [
                    KS('ks_p_1','Inversion'),       KS('ks_p_2','Cleft Sentences'), KS('ks_p_3','Participle Clauses'),
                    KS('ks_p_4','Wish & Regret'),   KS('ks_p_5','Double Comparatives')
                ]
            }
        };

        // Índice id → {title, cat} (todos los niveles) para enriquecer detailedMastery al guardar.
        const TOPIC_INDEX = {};
        Object.values(CONFIG).forEach(track =>
            ['grammar','verbs','nouns','adjectives','key_structs'].forEach(cat =>
                (track[cat] || []).forEach(tp => { TOPIC_INDEX[tp.id] = { title: tp.title, cat }; })
            )
        );

        // Validación de drift contra la taxonomía (solo consola, no rompe nada).
        (function validateTaxonomy(){
            const TAX = (window.PERIPLO_TAXONOMY || {}).TAXONOMY; if (!TAX) return;
            const miss = [];
            Object.entries(CONFIG).forEach(([lvl, track]) =>
                ['grammar','verbs','nouns','adjectives','key_structs'].forEach(cat =>
                    (track[cat] || []).forEach(tp => {
                        const list = (TAX[lvl] && TAX[lvl][cat]) || [];
                        if (!list.includes(tp.title)) miss.push(lvl + '.' + cat + ': "' + tp.title + '"');
                    })
                )
            );
            if (miss.length) console.warn('[evaluaciones] Títulos fuera de la taxonomía:', miss);
        })();

        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(false);
            const [activeTrack, setActiveTrack] = useState('basic');
            const [openPanels, setOpenPanels] = useState([]); 
            const [evalData, setEvalData] = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }
                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        if (LEVEL_HIERARCHY.includes(data.level)) setActiveTrack(data.level);
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    // Enriquecer cada tema con su title (= string EXACTO de taxonomía) y cat,
                    // que es lo que el portal usa para rutear los tropezones a los juegos.
                    // Se descartan ids legacy (no presentes en TOPIC_INDEX) → limpia datos viejos.
                    const enriched = {};
                    Object.entries(evalData).forEach(([id, val]) => {
                        const meta = TOPIC_INDEX[id];
                        if (!meta) return;
                        enriched[id] = { title: meta.title, cat: meta.cat, skills: (val && val.skills) || {} };
                    });
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedMastery: enriched });
                    setEvalData(enriched);
                    setIsSaving(false);
                    setToast(true);
                    setTimeout(() => setToast(false), 3000);
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            const togglePanel = (panelName) => setOpenPanels(prev => prev.includes(panelName) ? prev.filter(p => p !== panelName) : [...prev, panelName]);

            const setSkillStatus = (topicId, skillName, status) => {
                setEvalData(prev => {
                    const topic = prev[topicId] || { skills: {} };
                    return { ...prev, [topicId]: { ...topic, skills: { ...topic.skills, [skillName]: status } } };
                });
            };

            const calculateScore = (topicId, skillList) => {
                const topic = evalData[topicId] || { skills: {} };
                let earnedPoints = 0;
                skillList.forEach(skill => {
                    const status = topic.skills[skill] || 0;
                    if (status === 1) earnedPoints += 0.5;
                    if (status === 2) earnedPoints += 1;
                });
                return skillList.length === 0 ? 0 : Math.round(((earnedPoints / skillList.length) * 10) * 10) / 10;
            };

            const getSectionTotal = (sectionKey) => {
                const topics = (CONFIG[activeTrack] || {})[sectionKey] || [];
                if (topics.length === 0) return 0;
                const totalScore = topics.reduce((sum, t) => sum + calculateScore(t.id, t.skills), 0);
                return Math.round((totalScore / topics.length) * 10) / 10;
            };

            const SkillRow = ({ label, status, onChange }) => (
                <div className="flex items-center justify-between gap-3 p-2.5 hover:bg-slate-100 dark:hover:bg-zinc-800/50 rounded-xl transition-colors">
                    <span className="text-[11px] font-bold text-slate-700 dark:text-zinc-300 flex-1 leading-tight">{label}</span>
                    <div className="flex bg-slate-200 dark:bg-zinc-950 rounded-xl p-0.5 border border-slate-300 dark:border-zinc-800 shadow-inner">
                        <button onClick={() => onChange(0)} className={`p-1.5 rounded-lg transition-all ${status === 0 ? 'bg-rose-500 text-white scale-110' : 'text-slate-400 hover:text-rose-400'}`}><XCircle size={16}/></button>
                        <button onClick={() => onChange(1)} className={`p-1.5 rounded-lg transition-all ${status === 1 ? 'bg-yellow-500 text-white scale-110' : 'text-slate-400 hover:text-yellow-400'}`}><MinusCircle size={16}/></button>
                        <button onClick={() => onChange(2)} className={`p-1.5 rounded-lg transition-all ${status === 2 ? 'bg-emerald-500 text-white scale-110' : 'text-slate-400 hover:text-emerald-400'}`}><CheckCircle size={16}/></button>
                    </div>
                </div>
            );

            const ProgressBar = ({ score }) => (
                <div className="w-full h-1.5 bg-slate-200 dark:bg-zinc-800 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-500 ${score >= 8 ? 'bg-emerald-500' : score >= 5 ? 'bg-yellow-400' : 'bg-rose-500'}`} style={{width: `${score * 10}%`}}></div>
                </div>
            );

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const studentLevelIndex = LEVEL_HIERARCHY.indexOf(student?.level || 'basic');

            return (
                <div className="min-h-screen pb-24 fade-in">
                    {toast && <div className="fixed bottom-8 right-8 z-[100] bg-emerald-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-in fade-in"><CheckCircle2 size={24}/><span className="font-black">¡Guardado!</span></div>}

                    <header className="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 w-full sm:w-auto">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors text-slate-400"><ArrowLeft size={20}/></button>
                                <div><h1 className="text-lg font-black leading-none">Evaluación Periplo</h1><p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">{student?.name}</p></div>
                            </div>
                            
                            <div className="flex items-center gap-2 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                                <button onClick={() => window.location.href=`schedule.html?id=${student?.id}`} className="bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 text-slate-700 dark:text-zinc-200 border border-slate-200 dark:border-zinc-700 px-3 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shrink-0">
                                    <Calendar size={18}/> <span className="hidden sm:inline">Agenda</span>
                                </button>
                                <button onClick={() => window.open(`student_portal.html?id=${student?.id}`, '_blank')} className="bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 text-slate-700 dark:text-zinc-200 border border-slate-200 dark:border-zinc-700 px-3 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shrink-0">
                                    <Eye size={18}/> <span className="hidden sm:inline">Ver Portal</span>
                                </button>
                                <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-black flex items-center gap-2 shadow-lg transition-transform active:scale-95 disabled:opacity-50 shrink-0">
                                    {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} <span className="hidden sm:inline">Guardar</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 py-8 space-y-6">
                        {/* SELECTOR CON CANDADOS */}
                        <div className="flex p-1 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl w-fit">
                            {LEVEL_HIERARCHY.map((lvl, idx) => {
                                const isLocked = idx > studentLevelIndex;
                                return (
                                    <button 
                                        key={lvl} 
                                        disabled={isLocked}
                                        onClick={() => setActiveTrack(lvl)} 
                                        className={`px-5 py-2 rounded-xl font-black text-xs transition-all flex items-center gap-1 
                                            ${isLocked ? 'opacity-40 cursor-not-allowed text-slate-400' : 
                                              activeTrack === lvl ? 'bg-slate-100 dark:bg-zinc-800 text-indigo-500 shadow-sm' : 'text-slate-400 hover:text-slate-600 dark:hover:text-zinc-300'}`}
                                    >
                                        {isLocked && <Lock size={12} />}
                                        {lvl.toUpperCase()}
                                    </button>
                                );
                            })}
                        </div>

                        {/* GRAMMAR CORE */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => togglePanel('grammar')} className="w-full p-5 flex items-center justify-between bg-emerald-50 dark:bg-emerald-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                <div className="flex items-center gap-3"><PenTool className="text-emerald-500" size={20}/><h2 className="text-sm font-black text-emerald-500 uppercase tracking-widest">Grammar Core</h2></div>
                                <div className="flex items-center gap-4">
                                    <span className="font-black text-emerald-500 text-lg">{getSectionTotal('grammar')}</span>
                                    {openPanels.includes('grammar') ? <ChevronUp className="text-emerald-500" size={20}/> : <ChevronDown className="text-emerald-500" size={20}/>}
                                </div>
                            </button>
                            {openPanels.includes('grammar') && (
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                    {CONFIG[activeTrack].grammar.map(t => (
                                        <div key={t.id} className="p-4 bg-slate-50 dark:bg-zinc-950/50 rounded-3xl border border-slate-200 dark:border-zinc-800">
                                            <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase text-slate-400 tracking-wider">{t.title}</h3><span className="text-xs font-black text-indigo-500">{calculateScore(t.id, t.skills)}</span></div>
                                            <ProgressBar score={calculateScore(t.id, t.skills)}/>
                                            <div className="mt-3 space-y-1">{t.skills.map(s => <SkillRow key={s} label={s} status={(evalData[t.id]?.skills || {})[s] || 0} onChange={v => setSkillStatus(t.id, s, v)}/>)}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* VERB MASTERY */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => togglePanel('verbs')} className="w-full p-5 flex items-center justify-between bg-rose-50 dark:bg-rose-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                <div className="flex items-center gap-3"><Brain className="text-rose-500" size={20}/><h2 className="text-sm font-black text-rose-500 uppercase tracking-widest">Verb Mastery</h2></div>
                                <div className="flex items-center gap-4">
                                    <span className="font-black text-rose-500 text-lg">{getSectionTotal('verbs')}</span>
                                    {openPanels.includes('verbs') ? <ChevronUp className="text-rose-500" size={20}/> : <ChevronDown className="text-rose-500" size={20}/>}
                                </div>
                            </button>
                            {openPanels.includes('verbs') && (
                                <div className="p-4 animate-in fade-in">
                                    {activeTrack === 'basic' ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                            {CONFIG.basic.verbs.map(v => <SkillRow key={v.id} label={v.title} status={(evalData[v.id]?.skills || {})[v.title] || 0} onChange={st => setSkillStatus(v.id, v.title, st)}/>)}
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {CONFIG[activeTrack].verbs.map(v => (
                                                <div key={v.id} className="p-4 bg-slate-50 dark:bg-zinc-950/50 rounded-3xl border border-slate-200 dark:border-zinc-800">
                                                    <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase text-slate-400 tracking-wider">{v.title}</h3><span className="text-xs font-black text-rose-500">{calculateScore(v.id, v.skills)}</span></div>
                                                    <ProgressBar score={calculateScore(v.id, v.skills)}/>
                                                    <div className="mt-3 space-y-1">{v.skills.map(s => <SkillRow key={s} label={s} status={(evalData[v.id]?.skills || {})[s] || 0} onChange={val => setSkillStatus(v.id, s, val)}/>)}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* NOUN MASTERY (NUEVO - TODOS LOS NIVELES) */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => togglePanel('nouns')} className="w-full p-5 flex items-center justify-between bg-sky-50 dark:bg-sky-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                <div className="flex items-center gap-3"><BookOpen className="text-sky-500" size={20}/><h2 className="text-sm font-black text-sky-500 uppercase tracking-widest">Noun Mastery</h2></div>
                                <div className="flex items-center gap-4">
                                    <span className="font-black text-sky-500 text-lg">{getSectionTotal('nouns')}</span>
                                    {openPanels.includes('nouns') ? <ChevronUp className="text-sky-500" size={20}/> : <ChevronDown className="text-sky-500" size={20}/>}
                                </div>
                            </button>
                            {openPanels.includes('nouns') && (
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                    {CONFIG[activeTrack].nouns.map(n => (
                                        <div key={n.id} className="p-4 bg-slate-50 dark:bg-zinc-950/50 rounded-3xl border border-slate-200 dark:border-zinc-800">
                                            <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase text-slate-400 tracking-wider">{n.title}</h3><span className="text-xs font-black text-sky-500">{calculateScore(n.id, n.skills)}</span></div>
                                            <ProgressBar score={calculateScore(n.id, n.skills)}/>
                                            <div className="mt-3 space-y-1">{n.skills.map(s => <SkillRow key={s} label={s} status={(evalData[n.id]?.skills || {})[s] || 0} onChange={v => setSkillStatus(n.id, s, v)}/>)}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* ADJECTIVE MASTERY (todos los niveles con adjetivos en taxonomía) */}
                        {(CONFIG[activeTrack].adjectives || []).length > 0 && (
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                                <button onClick={() => togglePanel('adjectives')} className="w-full p-5 flex items-center justify-between bg-pink-50 dark:bg-pink-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                    <div className="flex items-center gap-3"><Palette className="text-pink-500" size={20}/><h2 className="text-sm font-black text-pink-500 uppercase tracking-widest">Adjective Mastery</h2></div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-pink-500 text-lg">{getSectionTotal('adjectives')}</span>
                                        {openPanels.includes('adjectives') ? <ChevronUp className="text-pink-500" size={20}/> : <ChevronDown className="text-pink-500" size={20}/>}
                                    </div>
                                </button>
                                {openPanels.includes('adjectives') && (
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                        {CONFIG[activeTrack].adjectives.map(a => (
                                            <div key={a.id} className="p-4 bg-slate-50 dark:bg-zinc-950/50 rounded-3xl border border-slate-200 dark:border-zinc-800">
                                                <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase text-slate-400 tracking-wider">{a.title}</h3><span className="text-xs font-black text-pink-500">{calculateScore(a.id, a.skills)}</span></div>
                                                <ProgressBar score={calculateScore(a.id, a.skills)}/>
                                                <div className="mt-3 space-y-1">{a.skills.map(s => <SkillRow key={s} label={s} status={(evalData[a.id]?.skills || {})[s] || 0} onChange={v => setSkillStatus(a.id, s, v)}/>)}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* KEY STRUCTURES */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => togglePanel('keyverbs')} className="w-full p-5 flex items-center justify-between bg-amber-50 dark:bg-amber-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                <div className="flex items-center gap-3"><Key className="text-amber-500" size={20}/><h2 className="text-sm font-black text-amber-500 uppercase tracking-widest">Key Structures</h2></div>
                                <div className="flex items-center gap-4">
                                    <span className="font-black text-amber-500 text-lg">{getSectionTotal('key_structs')}</span>
                                    {openPanels.includes('keyverbs') ? <ChevronUp className="text-amber-500" size={20}/> : <ChevronDown className="text-amber-500" size={20}/>}
                                </div>
                            </button>
                            {openPanels.includes('keyverbs') && (
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 animate-in fade-in">
                                    {CONFIG[activeTrack].key_structs.map(ks => <SkillRow key={ks.id} label={ks.title} status={(evalData[ks.id]?.skills || {})[ks.title] || 0} onChange={st => setSkillStatus(ks.id, ks.title, st)}/>)}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };
        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, AlertTriangle, Loader2, LayoutGrid, Zap, Award, Lock, CheckCircle2, Brain, Key, ChevronDown, ChevronUp, XCircle, MinusCircle, CheckCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // HABILIDADES DE COMUNICACIÓN UNIVERSALES
        const UNIVERSAL_SKILLS = [
            "Aplica la estructura al hablar fluidamente",
            "Identifica la estructura al escucharla (Listening)"
        ];

        const VERBS_PACKS = [
            "Pack 1 (1-30)", "Pack 2 (31-60)", "Pack 3 (61-90)", 
            "Pack 4 (91-120)", "Pack 5 (121-150)", "Pack 6 (151-180)", 
            "Pack 7 (181-210)", "Pack 8 (211-240)", "Pack 9 (241-270)"
        ];
        
        const VERBS_ISSUES = [
            "Aplica los verbos en conversación fluida",
            "Identifica los verbos al escucharlos (Listening)",
            "Pronuncia los verbos correctamente"
        ];

        // ESTRUCTURAS SACADAS DE TU CONNECT 4
        const KEYVERBS_LIST = [
            "Coordinating Conjunctions (FANBOYS)",
            "Subordinating Conjunctions",
            "Correlative Conjunctions",
            "Prepositions of Time (In, On, At)",
            "Prepositions of Place",
            "Prepositions of Movement/Direction",
            "Other Common Prepositions",
            "Quantifiers (Much, Many, Few...)",
            "Possessive Adjectives (My, Your...)",
            "Possessive Nouns ('s)",
            "Possessive Pronouns (Mine, Yours...)",
            "Object Pronouns (Me, Him, Us...)",
            "Frequency Adverbs (Always, Never...)"
        ];

        // DICCIONARIO GRAMATICAL (AHORA POSITIVO: HABILIDADES A DOMINAR)
        const GRAMMAR_TRACKS = {
            basic: {
                title: "Básico", icon: LayoutGrid, color: "text-emerald-500", bg: "bg-emerald-100 dark:bg-emerald-900/30",
                topics: [
                    { id: 'modal_verbs', title: 'Modal Verbs (Can, must, should...)', skills: ["Significado y traducción correcta", "Omisión del 'to' (ej. Can play)", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS] },
                    { id: 'present_simple', title: 'Present Simple', skills: ["Regla de la 's' (3ra Persona)", "Auxiliar Do/Does en preguntas", "Negación con Don't/Doesn't", "Armado de WH Questions", ...UNIVERSAL_SKILLS] },
                    { id: 'present_continuous', title: 'Present Continuous', skills: ["Inclusión del verbo To Be", "Uso correcto del sufijo -ing", "Contraste con Present Simple (Rutina vs Momento)", "Reglas de deletreo (-ing)", ...UNIVERSAL_SKILLS] },
                    { id: 'going_to', title: 'Future Intentions (Going to)', skills: ["Inclusión del verbo To Be", "Inclusión de la partícula 'to'", "Contraste con el uso de 'Will'", "Estructura Negativa", ...UNIVERSAL_SKILLS] }
                ]
            },
            advanced: {
                title: "Avanzado", icon: Zap, color: "text-blue-500", bg: "bg-blue-100 dark:bg-blue-900/30",
                topics: [
                    { id: 'past_vs_perfect', title: 'Past Simple vs Present Perfect', skills: ["Diferencia Evento vs Experiencia", "Dominio de verbos irregulares (Participio)", "Uso del auxiliar Have/Has", "Uso correcto de For y Since", ...UNIVERSAL_SKILLS] },
                    { id: 'conditionals_1_2', title: '1st & 2nd Conditionals', skills: ["1st Cond: Uso correcto del Will/Present", "2nd Cond: Uso correcto del Would/Past", "Entiende la diferencia de probabilidad real/irreal", ...UNIVERSAL_SKILLS] },
                    { id: 'comparatives', title: 'Comparatives & Superlatives', skills: ["Regla de sílabas cortas vs largas", "Inclusión de 'than' al comparar", "Dominio de irregulares (better, worse)", "Inclusión de 'the' en superlativos", ...UNIVERSAL_SKILLS] }
                ]
            },
            pro: {
                title: "Pro", icon: Award, color: "text-purple-500", bg: "bg-purple-100 dark:bg-purple-900/30",
                topics: [
                    { id: 'passive_voice', title: 'Passive Voice', skills: ["Inclusión del verbo To Be", "Dominio del Participio", "Intercambio correcto Sujeto/Objeto", "Dominio en tiempos compuestos (Perfect, Continuous)", ...UNIVERSAL_SKILLS] },
                    { id: 'reported_speech', title: 'Reported Speech', skills: ["Backshift (Retraso de tiempo verbal)", "Cambio correcto de pronombres", "Cambio de expresiones de tiempo", ...UNIVERSAL_SKILLS] },
                    { id: 'conditionals_3', title: '3rd & Mixed Conditionals', skills: ["Uso de Past Perfect en la condición", "Uso de Would have + participio", "Dominio de estructuras largas combinadas", ...UNIVERSAL_SKILLS] }
                ]
            }
        };

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(false);
            
            const [activeTrack, setActiveTrack] = useState('basic');
            const [openPanels, setOpenPanels] = useState(['grammar', 'verbs']); 

            // ESTADO: evalData = { topicId: { skills: { "skillName": 0|1|2 } } }
            const [evalData, setEvalData] = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        
                        // Si trae el formato nuevo (detailedMastery) lo carga, si no lo inicia en blanco
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        
                        if (data.level === 'advanced' || data.level === 'pro') setActiveTrack(data.level);
                        else setActiveTrack('basic'); 
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedMastery: evalData });
                    setIsSaving(false);
                    setToast(true);
                    setTimeout(() => setToast(false), 3000); 
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            const togglePanel = (panelName) => setOpenPanels(prev => prev.includes(panelName) ? prev.filter(p => p !== panelName) : [...prev, panelName]);

            const isTrackLocked = (trackId) => {
                const lvl = student?.level || 'limbo';
                if (lvl === 'vip' || lvl === 'pro') return false; 
                if (lvl === 'advanced' && trackId === 'pro') return true;
                if ((lvl === 'basic' || lvl === 'limbo') && (trackId === 'advanced' || trackId === 'pro')) return true;
                return false;
            };

            // ACTUALIZAR ESTADO DE HABILIDAD: 0 = Not Yet, 1 = Getting There, 2 = Mastered
            const setSkillStatus = (topicId, skillName, status) => {
                setEvalData(prev => {
                    const topic = prev[topicId] || { skills: {} };
                    return { ...prev, [topicId]: { ...topic, skills: { ...topic.skills, [skillName]: status } } };
                });
            };

            // MOTOR DE CALIFICACIÓN (0 a 10 basado en semáforos)
            const calculateScore = (topicId, skillList) => {
                const topic = evalData[topicId] || { skills: {} };
                let earnedPoints = 0;
                
                skillList.forEach(skill => {
                    const status = topic.skills[skill] || 0; // Default es 0 (Rojo)
                    if (status === 1) earnedPoints += 0.5;
                    if (status === 2) earnedPoints += 1;
                });

                if (skillList.length === 0) return 0;
                const finalScore = (earnedPoints / skillList.length) * 10;
                return Math.round(finalScore * 10) / 10; // Redondea a 1 decimal
            };

            const getProgressBarColor = (score) => {
                if (score >= 8) return 'bg-emerald-500';
                if (score >= 5) return 'bg-yellow-400';
                return 'bg-rose-500';
            };

            // COMPONENTE: ROW DE HABILIDAD CON SEMÁFORO
            const SkillRow = ({ label, status, onChange }) => (
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-3 sm:p-4 hover:bg-slate-50 dark:hover:bg-zinc-800/50 rounded-xl transition-colors border border-transparent hover:border-slate-200 dark:hover:border-zinc-700">
                    <span className="text-sm font-bold text-slate-700 dark:text-zinc-200 leading-snug flex-1">{label}</span>
                    <div className="flex bg-slate-100 dark:bg-zinc-950 rounded-xl p-1 shrink-0 self-start sm:self-auto border border-slate-200 dark:border-zinc-800 shadow-inner">
                        <button onClick={() => onChange(0)} title="Not Yet (0 pts)" className={`p-1.5 sm:px-3 rounded-lg flex items-center justify-center transition-all ${status === 0 ? 'bg-rose-500 text-white shadow-md scale-105' : 'text-slate-400 hover:text-rose-400'}`}>
                            <XCircle size={18} strokeWidth={status === 0 ? 3 : 2}/> <span className="hidden sm:inline sm:ml-1 text-xs font-black uppercase tracking-wider">Not Yet</span>
                        </button>
                        <button onClick={() => onChange(1)} title="Getting There (0.5 pts)" className={`p-1.5 sm:px-3 rounded-lg flex items-center justify-center transition-all ${status === 1 ? 'bg-yellow-500 text-white shadow-md scale-105' : 'text-slate-400 hover:text-yellow-400'}`}>
                            <MinusCircle size={18} strokeWidth={status === 1 ? 3 : 2}/> <span className="hidden sm:inline sm:ml-1 text-xs font-black uppercase tracking-wider">Partial</span>
                        </button>
                        <button onClick={() => onChange(2)} title="Mastered (1 pt)" className={`p-1.5 sm:px-3 rounded-lg flex items-center justify-center transition-all ${status === 2 ? 'bg-emerald-500 text-white shadow-md scale-105' : 'text-slate-400 hover:text-emerald-400'}`}>
                            <CheckCircle size={18} strokeWidth={status === 2 ? 3 : 2}/> <span className="hidden sm:inline sm:ml-1 text-xs font-black uppercase tracking-wider">Mastered</span>
                        </button>
                    </div>
                </div>
            );

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const trackInfo = GRAMMAR_TRACKS[activeTrack];
            const allVerbsSkills = [...VERBS_PACKS, ...VERBS_ISSUES];
            const verbsScore = calculateScore('verbs', allVerbsSkills);
            const keyverbsScore = calculateScore('keyverbs', KEYVERBS_LIST);

            return (
                <div className="min-h-screen pb-24">
                    
                    {toast && (
                        <div className="fixed bottom-8 right-8 z-[100] bg-emerald-500 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-5 fade-in duration-300">
                            <CheckCircle2 size={24}/>
                            <span className="font-black tracking-wide">¡Progreso Guardado!</span>
                        </div>
                    )}

                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <div className="bg-rose-500 p-2 rounded-lg text-white shadow-md"><Target size={20}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 dark:text-white leading-none">Evaluación Dinámica</h1>
                                    <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mt-1">Progreso de {student?.name}</p>
                                </div>
                            </div>
                            <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-black shadow-lg flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} <span className="hidden sm:inline">Guardar</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8 space-y-6">
                        
                        {/* SELECTOR DE NIVELES (CANDADOS) PARA GRAMÁTICA */}
                        <div className="flex overflow-x-auto gap-3 pb-4 no-select custom-scrollbar">
                            {Object.entries(GRAMMAR_TRACKS).map(([key, track]) => {
                                const locked = isTrackLocked(key);
                                return (
                                    <button 
                                        key={key} 
                                        onClick={() => !locked && setActiveTrack(key)}
                                        className={`flex items-center gap-2 px-5 py-3 rounded-2xl font-black text-sm transition-all border-2 shrink-0 ${locked ? 'opacity-50 bg-slate-100 dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-400 dark:text-zinc-600 cursor-not-allowed' : activeTrack === key ? `${track.color} border-current bg-white dark:bg-zinc-900 shadow-md scale-105` : 'text-slate-500 border-transparent hover:bg-slate-200 dark:hover:bg-zinc-800'}`}
                                    >
                                        {locked ? <Lock size={18}/> : <track.icon size={18}/>} {track.title}
                                    </button>
                                )
                            })}
                        </div>

                        {/* ACORDEÓN 1: GRAMMAR */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300">
                            <button onClick={() => togglePanel('grammar')} className={`w-full ${trackInfo.bg} p-5 flex items-center justify-between border-b border-slate-200 dark:border-zinc-800 no-select hover:brightness-95 transition-all`}>
                                <div className="flex items-center gap-3">
                                    <PenTool className={trackInfo.color} size={24}/>
                                    <h2 className={`text-lg font-black uppercase tracking-widest ${trackInfo.color}`}>GRAMMAR ({trackInfo.title})</h2>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className={`text-xs font-bold uppercase tracking-widest bg-white/50 dark:bg-black/20 px-3 py-1 rounded-lg ${trackInfo.color} hidden sm:block`}>{student?.level === 'vip' ? 'Acceso VIP' : student?.level}</span>
                                    {openPanels.includes('grammar') ? <ChevronUp className={trackInfo.color}/> : <ChevronDown className={trackInfo.color}/>}
                                </div>
                            </button>

                            {openPanels.includes('grammar') && (
                                <div className="p-4 sm:p-8 space-y-12 animate-in slide-in-from-top-4 fade-in duration-300">
                                    {trackInfo.topics.map(topic => {
                                        const score = calculateScore(topic.id, topic.skills);
                                        const barColor = getProgressBarColor(score);
                                        const topicData = evalData[topic.id] || { skills: {} };
                                        
                                        return (
                                            <div key={topic.id} className="relative">
                                                <div className="flex justify-between items-end mb-4 px-2">
                                                    <div>
                                                        <h3 className="font-black text-xl text-slate-800 dark:text-white leading-tight mb-1">{topic.title}</h3>
                                                    </div>
                                                    <div className={`px-4 py-2 rounded-xl flex items-center gap-1 font-black shadow-sm border ${score >= 8 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 border-emerald-200 dark:border-emerald-800' : score >= 5 ? 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 border-yellow-200 dark:border-yellow-800' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 border-rose-200 dark:border-rose-800'}`}>
                                                        <span className="text-2xl">{score}</span><span className="text-sm opacity-50">/10</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="w-full h-3 bg-slate-100 dark:bg-zinc-800 rounded-full overflow-hidden mb-6 border border-slate-200 dark:border-zinc-700">
                                                    <div className={`h-full transition-all duration-500 ease-out ${barColor}`} style={{ width: `${(score / 10) * 100}%` }}></div>
                                                </div>

                                                <div className="bg-slate-50 dark:bg-zinc-950/50 p-2 sm:p-4 rounded-2xl border border-slate-200 dark:border-zinc-800 divide-y divide-slate-200 dark:divide-zinc-800/50">
                                                    {topic.skills.map(skill => (
                                                        <SkillRow 
                                                            key={skill} 
                                                            label={skill} 
                                                            status={topicData.skills[skill] || 0} 
                                                            onChange={(val) => setSkillStatus(topic.id, skill, val)} 
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>

                        {/* ACORDEÓN 2: VERBOS (PACKS) */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300">
                            <button onClick={() => togglePanel('verbs')} className={`w-full bg-rose-100 dark:bg-rose-900/30 p-5 flex items-center justify-between border-b border-rose-200 dark:border-rose-800 no-select hover:brightness-95 transition-all`}>
                                <div className="flex items-center gap-3">
                                    <Brain className="text-rose-600 dark:text-rose-400" size={24}/>
                                    <h2 className="text-lg font-black uppercase tracking-widest text-rose-600 dark:text-rose-400">VERBOS (Packs)</h2>
                                </div>
                                <div className="flex items-center gap-3">
                                    {openPanels.includes('verbs') ? <ChevronUp className="text-rose-600 dark:text-rose-400"/> : <ChevronDown className="text-rose-600 dark:text-rose-400"/>}
                                </div>
                            </button>

                            {openPanels.includes('verbs') && (
                                <div className="p-4 sm:p-8 animate-in slide-in-from-top-4 fade-in duration-300">
                                    <div className="flex justify-between items-end mb-4 px-2">
                                        <div>
                                            <h3 className="font-black text-xl text-slate-800 dark:text-white leading-tight mb-1">Verbos Irregulares y Regulares</h3>
                                        </div>
                                        <div className={`px-4 py-2 rounded-xl flex items-center gap-1 font-black shadow-sm border ${verbsScore >= 8 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 border-emerald-200 dark:border-emerald-800' : verbsScore >= 5 ? 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 border-yellow-200 dark:border-yellow-800' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 border-rose-200 dark:border-rose-800'}`}>
                                            <span className="text-2xl">{verbsScore}</span><span className="text-sm opacity-50">/10</span>
                                        </div>
                                    </div>
                                    
                                    <div className="w-full h-3 bg-slate-100 dark:bg-zinc-800 rounded-full overflow-hidden mb-6 border border-slate-200 dark:border-zinc-700">
                                        <div className={`h-full transition-all duration-500 ease-out ${getProgressBarColor(verbsScore)}`} style={{ width: `${(verbsScore / 10) * 100}%` }}></div>
                                    </div>

                                    <div className="bg-slate-50 dark:bg-zinc-950/50 p-2 sm:p-4 rounded-2xl border border-slate-200 dark:border-zinc-800 space-y-6">
                                        <div>
                                            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 pl-2 flex items-center gap-2">Packs de Vocabulario (Memorización)</p>
                                            <div className="divide-y divide-slate-200 dark:divide-zinc-800/50">
                                                {VERBS_PACKS.map(pack => (
                                                    <SkillRow 
                                                        key={pack} 
                                                        label={pack} 
                                                        status={(evalData['verbs']?.skills || {})[pack] || 0} 
                                                        onChange={(val) => setSkillStatus('verbs', pack, val)} 
                                                    />
                                                ))}
                                            </div>
                                        </div>

                                        <div className="border-t border-slate-200 dark:border-zinc-800 pt-6">
                                            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 pl-2 flex items-center gap-2">Naturaleza del Dominio (Habilidades aplicadas)</p>
                                            <div className="divide-y divide-slate-200 dark:divide-zinc-800/50">
                                                {VERBS_ISSUES.map(issue => (
                                                    <SkillRow 
                                                        key={issue} 
                                                        label={issue} 
                                                        status={(evalData['verbs']?.skills || {})[issue] || 0} 
                                                        onChange={(val) => setSkillStatus('verbs', issue, val)} 
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* ACORDEÓN 3: KEYVERBS & ESTRUCTURAS */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300">
                            <button onClick={() => togglePanel('keyverbs')} className={`w-full bg-amber-100 dark:bg-amber-900/30 p-5 flex items-center justify-between border-b border-amber-200 dark:border-amber-800 no-select hover:brightness-95 transition-all`}>
                                <div className="flex items-center gap-3">
                                    <Key className="text-amber-600 dark:text-amber-400" size={24}/>
                                    <h2 className="text-lg font-black uppercase tracking-widest text-amber-600 dark:text-amber-400">KEYVERBS Y ESTRUCTURAS</h2>
                                </div>
                                <div className="flex items-center gap-3">
                                    {openPanels.includes('keyverbs') ? <ChevronUp className="text-amber-600 dark:text-amber-400"/> : <ChevronDown className="text-amber-600 dark:text-amber-400"/>}
                                </div>
                            </button>

                            {openPanels.includes('keyverbs') && (
                                <div className="p-4 sm:p-8 animate-in slide-in-from-top-4 fade-in duration-300">
                                    <div className="flex justify-between items-end mb-4 px-2">
                                        <div>
                                            <h3 className="font-black text-xl text-slate-800 dark:text-white leading-tight mb-1">Lista Maestra de Estructuras</h3>
                                        </div>
                                        <div className={`px-4 py-2 rounded-xl flex items-center gap-1 font-black shadow-sm border ${keyverbsScore >= 8 ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 border-emerald-200 dark:border-emerald-800' : keyverbsScore >= 5 ? 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 border-yellow-200 dark:border-yellow-800' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 border-rose-200 dark:border-rose-800'}`}>
                                            <span className="text-2xl">{keyverbsScore}</span><span className="text-sm opacity-50">/10</span>
                                        </div>
                                    </div>
                                    
                                    <div className="w-full h-3 bg-slate-100 dark:bg-zinc-800 rounded-full overflow-hidden mb-6 border border-slate-200 dark:border-zinc-700">
                                        <div className={`h-full transition-all duration-500 ease-out ${getProgressBarColor(keyverbsScore)}`} style={{ width: `${(keyverbsScore / 10) * 100}%` }}></div>
                                    </div>

                                    <div className="bg-slate-50 dark:bg-zinc-950/50 p-2 sm:p-4 rounded-2xl border border-slate-200 dark:border-zinc-800 divide-y divide-slate-200 dark:divide-zinc-800/50">
                                        {KEYVERBS_LIST.map(skill => (
                                            <SkillRow 
                                                key={skill} 
                                                label={skill} 
                                                status={(evalData['keyverbs']?.skills || {})[skill] || 0} 
                                                onChange={(val) => setSkillStatus('keyverbs', skill, val)} 
                                            />
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

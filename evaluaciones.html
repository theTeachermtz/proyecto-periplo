<script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
    import { Target, ArrowLeft, Save, PenTool, AlertTriangle, Loader2, LayoutGrid, Zap, Award, Lock, CheckCircle2, Brain, Key, ChevronDown, ChevronUp, XCircle, MinusCircle, CheckCircle, Activity } from 'lucide-react';

    const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. CONFIGURACIÓN DE GRAMÁTICA (En qué falla)
    const GRAMMAR_TRACKS = {
        basic: {
            title: "Básico", icon: LayoutGrid, color: "text-emerald-500", bg: "bg-emerald-100 dark:bg-emerald-900/30",
            topics: [
                { id: 'pres_simple', title: 'Present Simple', errors: ["Olvida la 's' (3ra pers)", "Confunde Do/Does", "Error en negación (don't/doesn't)", "No invierte en pregunta"] },
                { id: 'pres_cont', title: 'Present Continuous', errors: ["Olvida el Verbo To Be", "Error en terminación -ing", "Lo confunde con rutina", "No usa el auxiliar en negación"] },
                { id: 'modals_bas', title: 'Basic Modals', errors: ["Usa 'to' después de modal", "Confunde Can vs Must", "Error en pronunciación", "Olvida estructura interrogativa"] },
                { id: 'going_to', title: 'Going to', errors: ["Olvida el To Be", "Olvida el 'to'", "Usa Will para planes", "Pronunciación del 'gonna'"] }
            ]
        },
        advanced: {
            title: "Advanced", icon: Zap, color: "text-blue-500", bg: "bg-blue-100 dark:bg-blue-900/30",
            topics: [
                { id: 'past_simple', title: 'Past Simple', errors: ["Confunde pasado/presente al hablar", "Usa did en afirmativo innecesariamente", "Did + Verb in Past (Error de pregunta)", "Pronunciación deficiente de -ed"] },
                { id: 'second_cond', title: 'Second Conditional', errors: ["Usa 'would' en la cláusula IF", "Usa presente en lugar de pasado simple", "Olvida el uso de 'Were' (I were/She were)", "No contrae 'would' ('d)"] },
                { id: 'past_cont', title: 'Past Continuous', errors: ["Olvida was/were", "Confunde When vs While", "Lo usa con State Verbs (I was wanting)", "Falla en concordancia de sujeto"] },
                { id: 'past_future', title: 'Past Future (Was going to)', errors: ["Usa Will para planes pasados", "Falta de concordancia (They was)", "Confunde 'iba a' con 'solía' (used to)", "Olvida el auxiliar be"] }
            ]
        }
    };

    // 2. MATRIZ DE VERBOS
    const VERB_CATEGORIES = [
        { id: 'v_reg', label: 'Regulars (-ed)' },
        { id: 'v_irreg', label: 'Irregulars (Past)' },
        { id: 'v_part', label: 'Participles (Identify/Mem)' },
        { id: 'v_phrasal', label: 'Phrasal Verbs' }
    ];
    const VERB_SKILLS = [
        { id: 'id', label: 'ID', title: 'Identifica' },
        { id: 'mem', label: 'MEM', title: 'Memoriza' },
        { id: 'pron', label: 'PRON', title: 'Pronuncia' },
        { id: 'coh', label: 'COH', title: 'Coherencia' }
    ];

    // 3. ESTRUCTURAS CLAVE (B1-B2)
    const KEY_STRUCTURES = [
        "Idiomatic Expressions", "Used to / Use to", "Comparatives", "Superlatives", 
        "Possessive Nouns ('s)", "Relative Clauses", "Modals of Possibility", "Passive Voice (Intro)"
    ];

    const EvaluationHub = () => {
        const [student, setStudent] = useState(null);
        const [loading, setLoading] = useState(true);
        const [isSaving, setIsSaving] = useState(false);
        const [toast, setToast] = useState(false);
        const [activeTrack, setActiveTrack] = useState('basic');
        const [evalData, setEvalData] = useState({});

        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = 'students.html'; return; }

            getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    setStudent({ id: docSnap.id, ...data });
                    if (data.detailedMastery) setEvalData(data.detailedMastery);
                    setActiveTrack(data.level === 'advanced' ? 'advanced' : 'basic');
                }
                setLoading(false);
            });
        }, []);

        const saveEvaluation = async () => {
            setIsSaving(true);
            try {
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedMastery: evalData });
                setIsSaving(false);
                setToast(true);
                setTimeout(() => setToast(false), 3000); 
            } catch(e) { alert(e.message); setIsSaving(false); }
        };

        const toggleStatus = (section, item, status) => {
            setEvalData(prev => {
                const sectionData = prev[section] || {};
                return { ...prev, [section]: { ...sectionData, [item]: status } };
            });
        };

        if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

        return (
            <div className="min-h-screen pb-24 dark">
                {toast && (
                    <div className="fixed bottom-8 right-8 z-[100] bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-5">
                        <CheckCircle2 size={24}/> <span className="font-bold tracking-tight">Progreso guardado</span>
                    </div>
                )}

                <header className="bg-zinc-900/50 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-40">
                    <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-zinc-800 rounded-xl text-zinc-400"><ArrowLeft/></button>
                            <div>
                                <h1 className="text-xl font-black text-white">Evaluación Periplo</h1>
                                <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">{student?.name} • {activeTrack}</p>
                            </div>
                        </div>
                        <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-black flex items-center gap-2 transition-all active:scale-95">
                            {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} Guardar
                        </button>
                    </div>
                </header>

                <main className="max-w-4xl mx-auto px-6 py-8 space-y-8">
                    
                    {/* SELECTOR DE NIVEL */}
                    <div className="flex gap-2 p-1 bg-zinc-900 rounded-2xl border border-zinc-800 w-fit">
                        {Object.keys(GRAMMAR_TRACKS).map(lvl => (
                            <button key={lvl} onClick={() => setActiveTrack(lvl)} className={`px-6 py-2 rounded-xl font-bold text-sm transition-all ${activeTrack === lvl ? 'bg-zinc-800 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}>
                                {lvl.toUpperCase()}
                            </button>
                        ))}
                    </div>

                    {/* SECCIÓN 1: GRAMMAR CORE (Foquitos de errores) */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {GRAMMAR_TRACKS[activeTrack].topics.map(topic => (
                            <div key={topic.id} className="bg-zinc-900 p-5 rounded-[2rem] border border-zinc-800">
                                <h3 className="text-zinc-100 font-black mb-4 flex items-center gap-2">
                                    <Activity size={16} className="text-indigo-500"/> {topic.title}
                                </h3>
                                <div className="flex flex-wrap gap-2">
                                    {topic.errors.map(error => {
                                        const isActive = evalData[topic.id]?.[error];
                                        return (
                                            <button key={error} onClick={() => toggleStatus(topic.id, error, !isActive)} className={`text-[11px] font-bold px-3 py-2 rounded-full border transition-all ${isActive ? 'bg-rose-500/20 border-rose-500 text-rose-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'bg-zinc-950 border-zinc-800 text-zinc-500 hover:border-zinc-700'}`}>
                                                {error}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* SECCIÓN 2: VERB MATRIX (Los 4 puntitos) */}
                    <div className="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800">
                        <div className="flex items-center gap-3 mb-6">
                            <Brain className="text-rose-500"/>
                            <h3 className="text-white font-black text-lg">VERB COMPETENCY</h3>
                        </div>
                        <div className="space-y-4">
                            {VERB_CATEGORIES.map(cat => (
                                <div key={cat.id} className="flex items-center justify-between p-3 bg-zinc-950 rounded-2xl border border-zinc-800/50">
                                    <span className="text-sm font-bold text-zinc-300">{cat.label}</span>
                                    <div className="flex gap-4">
                                        {VERB_SKILLS.map(skill => {
                                            const isActive = evalData[cat.id]?.[skill.id];
                                            return (
                                                <div key={skill.id} className="flex flex-col items-center gap-1">
                                                    <span className="text-[8px] font-black text-zinc-600">{skill.label}</span>
                                                    <button onClick={() => toggleStatus(cat.id, skill.id, !isActive)} className={`w-5 h-5 rounded-full border-2 transition-all ${isActive ? 'bg-indigo-500 border-indigo-400 shadow-[0_0_8px_rgba(99,102,241,0.5)]' : 'border-zinc-800 bg-zinc-900'}`}></button>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* SECCIÓN 3: KEY STRUCTURES (Chips rápidos) */}
                    <div className="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800">
                        <div className="flex items-center gap-3 mb-6">
                            <Key className="text-amber-500"/>
                            <h3 className="text-white font-black text-lg">KEY STRUCTURES (B1-B2)</h3>
                        </div>
                        <div className="flex flex-wrap gap-3">
                            {KEY_STRUCTURES.map(struct => {
                                const isActive = evalData['key_structs']?.[struct];
                                return (
                                    <button key={struct} onClick={() => toggleStatus('key_structs', struct, !isActive)} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-xs border transition-all ${isActive ? 'bg-emerald-500/10 border-emerald-500 text-emerald-500' : 'bg-zinc-950 border-zinc-800 text-zinc-500'}`}>
                                        {isActive ? <CheckCircle size={14}/> : <div className="w-3.5 h-3.5 rounded-full border border-zinc-700"></div>}
                                        {struct}
                                    </button>
                                )
                            })}
                        </div>
                    </div>

                </main>
            </div>
        );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<EvaluationHub />);
</script>

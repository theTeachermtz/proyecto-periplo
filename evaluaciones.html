<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .error-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-color: #ef4444 !important; color: #ef4444 !important; }
        .success-glow { border-color: #10b981 !important; color: #10b981 !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, Loader2, LayoutGrid, Zap, Brain, Key, CheckCircle, Activity, XCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];

        const GRAMMAR_TRACKS = {
            basic: {
                title: "Basic", icon: LayoutGrid,
                topics: [
                    { id: 'modal_verbs', title: 'Modal Verbs (Can, must...)', items: ["Significado correcto", "Omisión del 'to'", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS] },
                    { id: 'present_simple', title: 'Present Simple', items: ["Regla de la 's'", "Auxiliar Do/Does", "Negación don't/doesn't", "WH Questions", ...UNIVERSAL_SKILLS] },
                    { id: 'present_continuous', title: 'Present Continuous', items: ["Verbo To Be", "Sufijo -ing", "Contraste vs Simple", "Reglas deletreo", ...UNIVERSAL_SKILLS] },
                    { id: 'going_to', title: 'Future (Going to)', items: ["Inclusión To Be", "Partícula 'to'", "Contraste vs Will", "Negación", ...UNIVERSAL_SKILLS] }
                ]
            },
            advanced: {
                title: "Advanced", icon: Zap,
                topics: [
                    { id: 'past_simple', title: 'Past Simple', items: ["Confunde pasado/presente", "Usa did en afirmativo", "Did + Verb in Past", "Pronunciación -ed", ...UNIVERSAL_SKILLS] },
                    { id: 'second_cond', title: 'Second Conditional', items: ["Would en cláusula IF", "Presente vs Pasado", "Uso de 'Were'", "Contracción 'd", ...UNIVERSAL_SKILLS] },
                    { id: 'past_cont', title: 'Past Continuous', items: ["Olvida was/were", "When vs While", "Uso State Verbs", "Concordancia", ...UNIVERSAL_SKILLS] },
                    { id: 'past_future', title: 'Past Future Intention', items: ["Will en planes pasados", "Concordancia (They was)", "vs Used To", "Auxiliar be", ...UNIVERSAL_SKILLS] }
                ]
            }
        };

        const VERB_CATEGORIES = [
            { id: 'v_reg', label: 'Regulars (-ed)' }, { id: 'v_irreg', label: 'Irregulars (Past)' },
            { id: 'v_part', label: 'Participles (Identify)' }, { id: 'v_phrasal', label: 'Phrasal Verbs' }
        ];

        const VERB_SKILLS = [{ id: 'id', label: 'ID' }, { id: 'mem', label: 'MEM' }, { id: 'pron', label: 'PRON' }, { id: 'coh', label: 'COH' }];

        const KEY_STRUCTURES = [
            "FANBOYS", "Subordinating Conj.", "Correlative Conj.", "Prep. Time (In,On,At)", 
            "Prep. Place", "Prep. Movement", "Other Prepositions", "Quantifiers", 
            "Possessive Adj.", "Possessive Nouns", "Possessive Pronouns", "Object Pronouns", 
            "Frequency Adverbs", "Used to / Use to", "Comparatives", "Superlatives", "Idiomatic Expressions"
        ];

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [activeTrack, setActiveTrack] = useState('basic');
            const [evalData, setEvalData] = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }
                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        setActiveTrack(data.level === 'advanced' ? 'advanced' : 'basic');
                    }
                    setLoading(false);
                });
            }, []);

            const toggleStatus = (section, item, status) => {
                setEvalData(prev => {
                    const sectionData = prev[section] || {};
                    return { ...prev, [section]: { ...sectionData, [item]: status } };
                });
            };

            const saveEvaluation = async () => {
                setIsSaving(true);
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedMastery: evalData });
                setIsSaving(false);
                alert("¡Guardado!");
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950 text-indigo-500"><Loader2 className="animate-spin" size={48}/></div>;

            return (
                <div className="min-h-screen pb-20 fade-in">
                    <header className="bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-zinc-800 rounded-xl text-zinc-400"><ArrowLeft/></button>
                                <div><h1 className="text-lg font-black">Periplo Dev</h1><p className="text-[10px] font-bold text-indigo-400 uppercase tracking-tighter">{student?.name}</p></div>
                            </div>
                            <button onClick={saveEvaluation} className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2">
                                {isSaving ? <Loader2 size={16} className="animate-spin"/> : <Save size={16}/>} Guardar
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 py-8 space-y-8">
                        <div className="flex p-1 bg-zinc-900 border border-zinc-800 rounded-2xl w-fit">
                            {Object.keys(GRAMMAR_TRACKS).map(lvl => (
                                <button key={lvl} onClick={() => setActiveTrack(lvl)} className={`px-6 py-2 rounded-xl font-black text-xs transition-all ${activeTrack === lvl ? 'bg-zinc-800 text-white' : 'text-zinc-500'}`}>{lvl.toUpperCase()}</button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {GRAMMAR_TRACKS[activeTrack].topics.map(topic => (
                                <div key={topic.id} className="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem]">
                                    <h3 className="text-zinc-400 font-black text-[10px] uppercase mb-4 tracking-widest flex items-center gap-2"><Activity size={14} className="text-indigo-500"/> {topic.title}</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {topic.items.map(skill => {
                                            const active = evalData[topic.id]?.[skill];
                                            return (
                                                <button key={skill} onClick={() => toggleStatus(topic.id, skill, !active)} className={`px-3 py-2 rounded-xl border text-[10px] font-black transition-all ${active ? 'error-glow bg-rose-500/10' : 'bg-zinc-950 border-zinc-800 text-zinc-600'}`}>{skill}</button>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem]">
                            <h3 className="text-zinc-400 font-black text-[10px] uppercase mb-6 tracking-widest flex items-center gap-2"><Brain size={16} className="text-rose-500"/> Verb Competency</h3>
                            <div className="space-y-3">
                                {VERB_CATEGORIES.map(cat => (
                                    <div key={cat.id} className="flex items-center justify-between p-3 bg-zinc-950 border border-zinc-800/50 rounded-2xl">
                                        <span className="text-xs font-bold text-zinc-300">{cat.label}</span>
                                        <div className="flex gap-4">
                                            {VERB_SKILLS.map(s => {
                                                const active = evalData[cat.id]?.[s.id];
                                                return (
                                                    <div key={s.id} className="flex flex-col items-center gap-1">
                                                        <span className="text-[8px] font-black text-zinc-600">{s.label}</span>
                                                        <button onClick={() => toggleStatus(cat.id, s.id, !active)} className={`w-5 h-5 rounded-full border-2 transition-all ${active ? 'bg-indigo-500 border-indigo-400 shadow-lg' : 'bg-zinc-900 border-zinc-800'}`}></button>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem]">
                            <h3 className="text-zinc-400 font-black text-[10px] uppercase mb-6 tracking-widest flex items-center gap-2"><Key size={16} className="text-amber-500"/> Key Structures</h3>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                {KEY_STRUCTURES.map(item => {
                                    const active = evalData['key_structs']?.[item];
                                    return (
                                        <button key={item} onClick={() => toggleStatus('key_structs', item, !active)} className={`flex items-center justify-between p-3 rounded-2xl border text-[9px] font-bold transition-all ${active ? 'success-glow bg-emerald-500/5' : 'bg-zinc-950 border-zinc-800 text-zinc-600'}`}>
                                            {item} {active && <CheckCircle size={14}/>}
                                        </button>
                                    )
                                })}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };
        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

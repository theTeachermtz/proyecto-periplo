<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, AlertTriangle, Loader2, LayoutGrid, Zap, Award, Lock, CheckCircle2, Brain, Key, ChevronDown, ChevronUp, XCircle, MinusCircle, CheckCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];

        const VERBS_PACKS = ["Pack 1 (1-30)", "Pack 2 (31-60)", "Pack 3 (61-90)", "Pack 4 (91-120)", "Pack 5 (121-150)", "Pack 6 (151-180)", "Pack 7 (181-210)", "Pack 8 (211-240)", "Pack 9 (241-270)", "Regulares (-ed)", "Irregulares", "Participios", "Phrasal Verbs"];
        const VERBS_ISSUES = ["Aplica en conversación", "Identifica al escuchar", "Pronuncia correctamente"];

        const KEYVERBS_LIST = ["FANBOYS", "Subordinating Conj.", "Correlative Conj.", "Prep. Time (In,On,At)", "Prep. Place", "Prep. Movement", "Other Prepositions", "Quantifiers", "Possessive Adj.", "Possessive Nouns", "Possessive Pronouns", "Object Pronouns", "Frequency Adverbs", "Used to / Use to", "Comparatives", "Superlatives", "Idiomatic Expressions"];

        const GRAMMAR_TRACKS = {
            basic: {
                title: "Básico", icon: LayoutGrid, color: "text-emerald-500", bg: "bg-emerald-100 dark:bg-emerald-900/30",
                topics: [
                    { id: 'modal_verbs', title: 'Modal Verbs (Can, must...)', skills: ["Significado correcto", "Omisión del 'to'", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS] },
                    { id: 'present_simple', title: 'Present Simple', skills: ["Regla de la 's'", "Auxiliar Do/Does", "Negación don't/doesn't", "WH Questions", ...UNIVERSAL_SKILLS] },
                    { id: 'present_continuous', title: 'Present Continuous', skills: ["Verbo To Be", "Sufijo -ing", "Contraste vs Simple", "Reglas deletreo", ...UNIVERSAL_SKILLS] },
                    { id: 'going_to', title: 'Future (Going to)', skills: ["Inclusión To Be", "Partícula 'to'", "Contraste vs Will", "Negación", ...UNIVERSAL_SKILLS] }
                ]
            },
            advanced: {
                title: "Advanced", icon: Zap, color: "text-blue-500", bg: "bg-blue-100 dark:bg-blue-900/30",
                topics: [
                    { id: 'past_simple', title: 'Past Simple', skills: ["Confunde pasado/presente", "Usa did en afirmativo", "Did + Verb in Past", "Pronunciación -ed", ...UNIVERSAL_SKILLS] },
                    { id: 'second_cond', title: 'Second Conditional', skills: ["Would en cláusula IF", "Presente vs Pasado", "Uso de 'Were'", "Contracción 'd", ...UNIVERSAL_SKILLS] },
                    { id: 'past_cont', title: 'Past Continuous', skills: ["Olvida was/were", "When vs While", "Uso State Verbs", "Concordancia", ...UNIVERSAL_SKILLS] },
                    { id: 'past_future', title: 'Past Future Intention', skills: ["Will para planes pasados", "Concordancia (They was)", "vs Used To", "Auxiliar be", ...UNIVERSAL_SKILLS] }
                ]
            },
            pro: {
                title: "Pro", icon: Award, color: "text-purple-500", bg: "bg-purple-100 dark:bg-purple-900/30",
                topics: [
                    { id: 'passive_voice', title: 'Passive Voice', skills: ["Verbo To Be", "Dominio Participio", "Sujeto/Objeto", ...UNIVERSAL_SKILLS] },
                    { id: 'reported_speech', title: 'Reported Speech', skills: ["Backshift verbal", "Pronombres", "Expresiones tiempo", ...UNIVERSAL_SKILLS] }
                ]
            }
        };

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(false);
            const [activeTrack, setActiveTrack] = useState('basic');
            const [openPanels, setOpenPanels] = useState(['grammar', 'verbs', 'keyverbs']); 
            const [evalData, setEvalData] = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }
                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        setActiveTrack(data.level === 'advanced' || data.level === 'pro' ? data.level : 'basic'); 
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedMastery: evalData });
                    setIsSaving(false);
                    setToast(true);
                    setTimeout(() => setToast(false), 3000); 
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            const setSkillStatus = (topicId, skillName, status) => {
                setEvalData(prev => {
                    const topic = prev[topicId] || { skills: {} };
                    return { ...prev, [topicId]: { ...topic, skills: { ...topic.skills, [skillName]: status } } };
                });
            };

            const calculateScore = (topicId, skillList) => {
                const topic = evalData[topicId] || { skills: {} };
                let earnedPoints = 0;
                skillList.forEach(skill => {
                    const status = topic.skills[skill] || 0;
                    if (status === 1) earnedPoints += 0.5;
                    if (status === 2) earnedPoints += 1;
                });
                return skillList.length === 0 ? 0 : Math.round(((earnedPoints / skillList.length) * 10) * 10) / 10;
            };

            const getProgressBarColor = (score) => score >= 8 ? 'bg-emerald-500' : score >= 5 ? 'bg-yellow-400' : 'bg-rose-500';

            const SkillRow = ({ label, status, onChange }) => (
                <div className="flex items-center justify-between gap-3 p-3 hover:bg-slate-50 dark:hover:bg-zinc-800/50 rounded-xl transition-colors border border-transparent">
                    <span className="text-xs font-bold text-slate-700 dark:text-zinc-200 leading-snug flex-1">{label}</span>
                    <div className="flex bg-slate-100 dark:bg-zinc-950 rounded-xl p-1 shrink-0 border border-slate-200 dark:border-zinc-800 shadow-inner">
                        <button onClick={() => onChange(0)} title="Not Yet" className={`p-2 rounded-lg transition-all ${status === 0 ? 'bg-rose-500 text-white shadow-md scale-110' : 'text-slate-400 hover:text-rose-400'}`}>
                            <XCircle size={18} strokeWidth={status === 0 ? 3 : 2}/>
                        </button>
                        <button onClick={() => onChange(1)} title="Partial" className={`p-2 rounded-lg transition-all ${status === 1 ? 'bg-yellow-500 text-white shadow-md scale-110' : 'text-slate-400 hover:text-yellow-400'}`}>
                            <MinusCircle size={18} strokeWidth={status === 1 ? 3 : 2}/>
                        </button>
                        <button onClick={() => onChange(2)} title="Mastered" className={`p-2 rounded-lg transition-all ${status === 2 ? 'bg-emerald-500 text-white shadow-md scale-110' : 'text-slate-400 hover:text-emerald-400'}`}>
                            <CheckCircle size={18} strokeWidth={status === 2 ? 3 : 2}/>
                        </button>
                    </div>
                </div>
            );

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const trackInfo = GRAMMAR_TRACKS[activeTrack];

            return (
                <div className="min-h-screen pb-24">
                    {toast && <div className="fixed bottom-8 right-8 z-[100] bg-emerald-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-in fade-in"><CheckCircle2 size={24}/><span className="font-black">¡Guardado!</span></div>}

                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl"><ArrowLeft size={20}/></button>
                                <div><h1 className="text-lg font-black tracking-tight">Evaluación Periplo</h1><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{student?.name}</p></div>
                            </div>
                            <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-black shadow-lg flex items-center gap-2">
                                {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} <span>Guardar</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 py-8 space-y-6">
                        <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                            {Object.entries(GRAMMAR_TRACKS).map(([key, track]) => (
                                <button key={key} onClick={() => setActiveTrack(key)} className={`flex items-center gap-2 px-5 py-2.5 rounded-2xl font-black text-xs transition-all border-2 shrink-0 ${activeTrack === key ? `${track.color} border-current bg-white dark:bg-zinc-900 shadow-md` : 'text-slate-500 border-transparent hover:bg-slate-200 dark:hover:bg-zinc-800'}`}>
                                    <track.icon size={16}/> {track.title}
                                </button>
                            ))}
                        </div>

                        {/* GRAMMAR PANEL */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => setOpenPanels(p => p.includes('grammar') ? p.filter(x => x!=='grammar') : [...p, 'grammar'])} className={`w-full ${trackInfo.bg} p-5 flex items-center justify-between border-b border-slate-200 dark:border-zinc-800`}>
                                <div className="flex items-center gap-3"><PenTool className={trackInfo.color} size={20}/><h2 className={`text-sm font-black uppercase tracking-widest ${trackInfo.color}`}>GRAMMAR CORE</h2></div>
                                {openPanels.includes('grammar') ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}
                            </button>
                            {openPanels.includes('grammar') && (
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in duration-300">
                                    {trackInfo.topics.map(topic => {
                                        const score = calculateScore(topic.id, topic.skills);
                                        return (
                                            <div key={topic.id} className="bg-slate-50 dark:bg-zinc-950/50 p-4 rounded-3xl border border-slate-200 dark:border-zinc-800">
                                                <div className="flex justify-between items-center mb-2">
                                                    <h3 className="font-black text-xs uppercase text-slate-500 tracking-wider">{topic.title}</h3>
                                                    <span className="font-black text-sm text-indigo-500">{score}/10</span>
                                                </div>
                                                <div className="w-full h-1.5 bg-slate-200 dark:bg-zinc-800 rounded-full mb-4 overflow-hidden">
                                                    <div className={`h-full transition-all ${getProgressBarColor(score)}`} style={{width: `${score*10}%`}}></div>
                                                </div>
                                                <div className="space-y-1">
                                                    {topic.skills.map(s => <SkillRow key={s} label={s} status={(evalData[topic.id]?.skills || {})[s] || 0} onChange={v => setSkillStatus(topic.id, s, v)}/>)}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        {/* VERBS PANEL */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => setOpenPanels(p => p.includes('verbs') ? p.filter(x => x!=='verbs') : [...p, 'verbs'])} className="w-full bg-rose-50 dark:bg-rose-900/20 p-5 flex items-center justify-between border-b border-slate-200 dark:border-zinc-800">
                                <div className="flex items-center gap-3"><Brain className="text-rose-500" size={20}/><h2 className="text-sm font-black uppercase tracking-widest text-rose-500">VERB MASTERY</h2></div>
                                {openPanels.includes('verbs') ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}
                            </button>
                            {openPanels.includes('verbs') && (
                                <div className="p-4 animate-in fade-in duration-300">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {VERBS_PACKS.map(pack => <SkillRow key={pack} label={pack} status={(evalData['verbs']?.skills || {})[pack] || 0} onChange={v => setSkillStatus('verbs', pack, v)}/>)}
                                        <div className="col-span-full border-t border-slate-200 dark:border-zinc-800 pt-4 mt-2">
                                            {VERBS_ISSUES.map(issue => <SkillRow key={issue} label={issue} status={(evalData['verbs']?.skills || {})[issue] || 0} onChange={v => setSkillStatus('verbs', issue, v)}/>)}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* KEY STRUCTURES PANEL */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => setOpenPanels(p => p.includes('keyverbs') ? p.filter(x => x!=='keyverbs') : [...p, 'keyverbs'])} className="w-full bg-amber-50 dark:bg-amber-900/20 p-5 flex items-center justify-between border-b border-slate-200 dark:border-zinc-800">
                                <div className="flex items-center gap-3"><Key className="text-amber-500" size={20}/><h2 className="text-sm font-black uppercase tracking-widest text-amber-500">KEY STRUCTURES</h2></div>
                                {openPanels.includes('keyverbs') ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}
                            </button>
                            {openPanels.includes('keyverbs') && (
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-2 animate-in fade-in">
                                    {KEYVERBS_LIST.map(kv => <SkillRow key={kv} label={kv} status={(evalData['keyverbs']?.skills || {})[kv] || 0} onChange={v => setSkillStatus('keyverbs', kv, v)}/>)}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };
        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

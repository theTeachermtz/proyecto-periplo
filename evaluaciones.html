<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        
        /* MAGIA ANTI-BARATO */
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }

        /* Volume Bar Slider Customizado */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; 
            background: #fff; cursor: pointer; margin-top: -10px; 
            border: 4px solid currentColor; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); 
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
        input[type=range]::-webkit-slider-runnable-track { 
            width: 100%; height: 8px; cursor: pointer; background: #e2e8f0; border-radius: 4px; 
        }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #3f3f46; }
        
        /* Ocultar scrollbars por estética */
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, CheckSquare, Square, AlertTriangle, Loader2, LayoutGrid, Zap, Award } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DICCIONARIO PEDAGÓGICO DE GRAMÁTICA POR NIVELES
        const GRAMMAR_TRACKS = {
            basic: {
                title: "Básico",
                icon: LayoutGrid,
                color: "text-emerald-500",
                bg: "bg-emerald-100 dark:bg-emerald-900/30",
                topics: [
                    { 
                        id: 'modal_verbs', title: 'Modal Verbs (Can, must, should...)', 
                        fails: ["No sabe el significado (traducción)", "Mezcla el 'to' (Can to play)", "Falla en Negación (Don't can)", "No sabe armar Preguntas"] 
                    },
                    { 
                        id: 'present_simple', title: 'Present Simple', 
                        fails: ["Olvida la 's' de 3ra persona", "Falla Do/Does en pregunta", "Falla Don't/Doesn't", "Armado de WH Questions (What do you...)"] 
                    },
                    { 
                        id: 'present_continuous', title: 'Present Continuous', 
                        fails: ["Olvida el verbo To Be (I playing)", "Olvida el -ing (I am play)", "Lo usa para rutinas (Confusión con Simple)", "Falla en reglas de deletreo (makeing)"] 
                    },
                    { 
                        id: 'going_to', title: 'Future Intentions (Going to)', 
                        fails: ["Olvida el verbo To Be (I going to)", "Olvida el 'to' (I am going play)", "Lo confunde con 'Will'", "Falla en Negación"] 
                    }
                ]
            },
            advanced: {
                title: "Avanzado",
                icon: Zap,
                color: "text-blue-500",
                bg: "bg-blue-100 dark:bg-blue-900/30",
                topics: [
                    { 
                        id: 'past_vs_perfect', title: 'Past Simple vs Present Perfect', 
                        fails: ["Usa Past Simple para experiencias de vida", "Se equivoca en verbos irregulares", "Olvida el auxiliar Have/Has", "Confunde For y Since"] 
                    },
                    { 
                        id: 'conditionals_1_2', title: '1st & 2nd Conditionals', 
                        fails: ["Pone Will/Would en la condición (If I will...)", "Falla el pasado en el 2nd Cond. (If I have... I would)", "No entiende la diferencia de probabilidad"] 
                    },
                    { 
                        id: 'comparatives', title: 'Comparatives & Superlatives', 
                        fails: ["Mezcla 'more' con '-er' (more bigger)", "Olvida el 'than'", "Irregulares (gooder en vez de better)", "Olvida el 'the' en superlativos"] 
                    }
                ]
            },
            pro: {
                title: "Pro",
                icon: Award,
                color: "text-purple-500",
                bg: "bg-purple-100 dark:bg-purple-900/30",
                topics: [
                    { 
                        id: 'passive_voice', title: 'Passive Voice', 
                        fails: ["Olvida el verbo To Be", "Falla el Participio del verbo principal", "Confunde Sujeto con Objeto", "No logra cambiar los tiempos verbales (Pasado, Perfecto)"] 
                    },
                    { 
                        id: 'reported_speech', title: 'Reported Speech', 
                        fails: ["No retrasa el tiempo (Backshift)", "No cambia los pronombres", "No cambia las palabras de tiempo (today -> that day)"] 
                    },
                    { 
                        id: 'conditionals_3', title: '3rd & Mixed Conditionals', 
                        fails: ["Estructura demasiado larga/se pierde", "Falla el Past Perfect en la condición", "Falla el Would have + participio"] 
                    }
                ]
            }
        };

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            
            const [activeTrack, setActiveTrack] = useState('basic');
            
            // ESTADO DE EVALUACIÓN (Guarda el score y array de fallas por cada ID)
            const [evalData, setEvalData] = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        
                        // Cargar datos previos si existen
                        if (data.detailedGrammar) {
                            setEvalData(data.detailedGrammar);
                        }
                        
                        // Setear la pestaña activa según su nivel
                        if (data.level === 'advanced') setActiveTrack('advanced');
                        else if (data.level === 'pro') setActiveTrack('pro');
                        else setActiveTrack('basic'); // Limbo, VIP o Basic caen aquí por defecto
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedGrammar: evalData });
                    setTimeout(() => setIsSaving(false), 500);
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            // Inicializa un tema en 10 si no existe en el estado
            const getTopicData = (topicId) => {
                return evalData[topicId] || { score: 10, fails: [] };
            };

            const updateScore = (topicId, newScore) => {
                setEvalData(prev => ({
                    ...prev,
                    [topicId]: { ...getTopicData(topicId), score: parseInt(newScore) }
                }));
            };

            const toggleFail = (topicId, failLabel) => {
                setEvalData(prev => {
                    const topic = getTopicData(topicId);
                    const newFails = topic.fails.includes(failLabel) 
                        ? topic.fails.filter(f => f !== failLabel) 
                        : [...topic.fails, failLabel];
                    return { ...prev, [topicId]: { ...topic, fails: newFails } };
                });
            };

            const Checkbox = ({ label, checked, onChange, colorClass }) => (
                <label onClick={(e) => { e.preventDefault(); onChange(); }} className={`flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl cursor-pointer transition-colors no-select border border-transparent ${checked ? `bg-slate-50 dark:bg-zinc-800/50 border-slate-200 dark:border-zinc-700` : ''}`}>
                    {checked ? <CheckSquare className={colorClass} size={20}/> : <Square className="text-slate-300 dark:text-zinc-600" size={20}/>}
                    <span className="text-sm font-bold text-slate-700 dark:text-zinc-300 pointer-events-none leading-snug">{label}</span>
                </label>
            );

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const trackInfo = GRAMMAR_TRACKS[activeTrack];

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <div className="bg-rose-500 p-2 rounded-lg text-white shadow-md"><Target size={20}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 dark:text-white leading-none">Evaluación Gramatical</h1>
                                    <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mt-1">Análisis de {student?.name}</p>
                                </div>
                            </div>
                            <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-black shadow-lg flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} <span className="hidden sm:inline">Guardar Progreso</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8 space-y-8">
                        
                        {/* SELECTOR DE NIVELES (PESTAÑAS) */}
                        <div className="flex overflow-x-auto gap-2 pb-2">
                            {Object.entries(GRAMMAR_TRACKS).map(([key, track]) => (
                                <button 
                                    key={key} 
                                    onClick={() => setActiveTrack(key)}
                                    className={`flex items-center gap-2 px-5 py-3 rounded-2xl font-black text-sm transition-all border-2 no-select shrink-0 ${activeTrack === key ? `${track.color} border-current bg-white dark:bg-zinc-900 shadow-md scale-105` : 'text-slate-400 border-transparent hover:bg-slate-200 dark:hover:bg-zinc-800'}`}
                                >
                                    <track.icon size={18}/> {track.title}
                                </button>
                            ))}
                        </div>

                        {/* BLOQUE DINÁMICO DE GRAMÁTICA */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all duration-300 animate-in fade-in">
                            <div className={`${trackInfo.bg} p-5 flex items-center gap-3 border-b border-slate-200 dark:border-zinc-800`}>
                                <PenTool className={trackInfo.color} size={24}/>
                                <h2 className={`text-lg font-black uppercase tracking-widest ${trackInfo.color}`}>Módulo {trackInfo.title}</h2>
                            </div>

                            <div className="p-6 md:p-8 space-y-12">
                                {trackInfo.topics.map(topic => {
                                    const data = getTopicData(topic.id);
                                    
                                    return (
                                        <div key={topic.id} className="relative">
                                            {/* Título y Slider */}
                                            <div className={`flex justify-between items-center mb-4 ${trackInfo.color}`}>
                                                <h3 className="font-black text-lg sm:text-xl text-slate-800 dark:text-white leading-tight pr-4">{topic.title}</h3>
                                                <div className="bg-slate-100 dark:bg-zinc-800 px-3 py-1 rounded-lg border border-slate-200 dark:border-zinc-700 shrink-0">
                                                    <span className="font-black text-xl sm:text-2xl">{data.score}</span><span className="text-sm font-bold text-slate-400">/10</span>
                                                </div>
                                            </div>
                                            <input 
                                                type="range" min="0" max="10" step="1" 
                                                value={data.score} 
                                                onChange={e => updateScore(topic.id, e.target.value)} 
                                                className={`${trackInfo.color} mb-4`}
                                            />

                                            {/* SECCIÓN DE FALLAS (Solo si baja de 10) */}
                                            {data.score < 10 && (
                                                <div className="bg-slate-50 dark:bg-zinc-950 p-5 sm:p-6 rounded-2xl border border-slate-200 dark:border-zinc-800 animate-in slide-in-from-top-4 duration-300 mt-4">
                                                    <p className="text-xs font-black text-rose-500 uppercase tracking-widest mb-4 flex items-center gap-1.5"><AlertTriangle size={16}/> ¿Dónde está fallando?</p>
                                                    
                                                    <div className="grid sm:grid-cols-2 gap-3">
                                                        {topic.fails.map(fail => (
                                                            <Checkbox 
                                                                key={fail} 
                                                                label={fail} 
                                                                checked={data.fails.includes(fail)} 
                                                                onChange={() => toggleFail(topic.id, fail)} 
                                                                colorClass={trackInfo.color}
                                                            />
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

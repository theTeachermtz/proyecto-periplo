<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Detallada | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        
        /* Volume Bar Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: #fff; cursor: pointer; margin-top: -8px; 
            border: 3px solid currentColor; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        input[type=range]::-webkit-slider-runnable-track { 
            width: 100%; height: 8px; cursor: pointer; background: #e2e8f0; border-radius: 4px; 
        }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Target, ArrowLeft, Save, PenTool, Brain, CheckSquare, Square, AlertTriangle, Loader2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const EvaluationHub = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            
            // ESTADO COMPLEJO DE LA EVALUACIÓN DETALLADA
            const [evalData, setEvalData] = useState({
                modal_verbs: { score: 10, cause: '', verbs: [], grammar_fails: [] },
                present_simple: { score: 10, fails: [] },
                vocab_pack_1_3: { score: 10, notes: '' }
            });

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'students.html'; return; }

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedEval) setEvalData(data.detailedEval);
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedEval: evalData });
                    setTimeout(() => setIsSaving(false), 500);
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            const toggleArrayItem = (path, field, item) => {
                setEvalData(prev => {
                    const currentArray = prev[path][field] || [];
                    const newArray = currentArray.includes(item) 
                        ? currentArray.filter(x => x !== item) 
                        : [...currentArray, item];
                    return { ...prev, [path]: { ...prev[path], [field]: newArray } };
                });
            };

            const Checkbox = ({ label, checked, onChange }) => (
                <label className="flex items-center gap-2 p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-lg cursor-pointer transition-colors select-none">
                    {checked ? <CheckSquare className="text-indigo-500" size={18}/> : <Square className="text-slate-300 dark:text-zinc-600" size={18}/>}
                    <span className="text-sm font-bold text-slate-700 dark:text-zinc-300">{label}</span>
                </label>
            );

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='students.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <div className="bg-rose-500 p-2 rounded-lg text-white shadow-md"><Target size={20}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 dark:text-white leading-none">Desempeño a Detalle</h1>
                                    <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mt-1">Análisis de {student?.name}</p>
                                </div>
                            </div>
                            <button onClick={saveEvaluation} disabled={isSaving} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-black shadow-lg flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>} <span className="hidden sm:inline">Guardar Progreso</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8 space-y-8">
                        
                        {/* BLOQUE: GRAMÁTICA */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden">
                            <div className="bg-purple-100 dark:bg-purple-900/30 p-5 flex items-center gap-3 border-b border-purple-200 dark:border-purple-800">
                                <PenTool className="text-purple-600 dark:text-purple-400" size={24}/>
                                <h2 className="text-lg font-black text-purple-900 dark:text-purple-300 uppercase tracking-widest">Grammar Base</h2>
                            </div>

                            <div className="p-6 md:p-8 space-y-10">
                                {/* SUB-TEMA: MODAL VERBS */}
                                <div>
                                    <div className="flex justify-between items-center mb-4 text-purple-500">
                                        <h3 className="font-black text-lg text-slate-800 dark:text-white">Modal Verbs (Can, must, will...)</h3>
                                        <span className="font-black text-2xl">{evalData.modal_verbs.score}/10</span>
                                    </div>
                                    <input 
                                        type="range" min="0" max="10" step="1" 
                                        value={evalData.modal_verbs.score} 
                                        onChange={e => setEvalData(p => ({...p, modal_verbs: {...p.modal_verbs, score: parseInt(e.target.value)}}))} 
                                        className="text-purple-500 mb-4"
                                    />

                                    {/* LÓGICA CONDICIONAL: Si baja de 10, muestra las fallas */}
                                    {evalData.modal_verbs.score < 10 && (
                                        <div className="bg-slate-50 dark:bg-zinc-950 p-6 rounded-2xl border border-slate-200 dark:border-zinc-800 animate-in slide-in-from-top-4 duration-300">
                                            <p className="text-xs font-black text-rose-500 uppercase tracking-widest mb-3 flex items-center gap-1"><AlertTriangle size={14}/> Detectar Falla Específica</p>
                                            
                                            <div className="mb-6">
                                                <p className="text-sm font-bold text-slate-500 dark:text-zinc-400 mb-2">1. ¿Qué modales se le complican?</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {['can', 'must', 'will', 'could', 'should', 'would'].map(verb => (
                                                        <button 
                                                            key={verb} 
                                                            onClick={() => toggleArrayItem('modal_verbs', 'verbs', verb)}
                                                            className={`px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border ${evalData.modal_verbs.verbs.includes(verb) ? 'bg-purple-100 dark:bg-purple-900/40 border-purple-300 dark:border-purple-500 text-purple-700 dark:text-purple-300' : 'bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-slate-500'}`}
                                                        >{verb}</button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="mb-6">
                                                <p className="text-sm font-bold text-slate-500 dark:text-zinc-400 mb-2">2. ¿Por qué falla?</p>
                                                <div className="flex gap-3">
                                                    <label className="cursor-pointer">
                                                        <input type="radio" name="modal_cause" className="sr-only peer" checked={evalData.modal_verbs.cause === 'memorization'} onChange={() => setEvalData(p => ({...p, modal_verbs: {...p.modal_verbs, cause: 'memorization'}}))}/>
                                                        <div className="px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all peer-checked:border-purple-500 peer-checked:text-purple-600 bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-500">No memoriza el significado</div>
                                                    </label>
                                                    <label className="cursor-pointer">
                                                        <input type="radio" name="modal_cause" className="sr-only peer" checked={evalData.modal_verbs.cause === 'grammar'} onChange={() => setEvalData(p => ({...p, modal_verbs: {...p.modal_verbs, cause: 'grammar'}}))}/>
                                                        <div className="px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all peer-checked:border-purple-500 peer-checked:text-purple-600 bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-500">Falla en la estructura gramatical</div>
                                                    </label>
                                                </div>
                                            </div>

                                            {evalData.modal_verbs.cause === 'grammar' && (
                                                <div className="bg-white dark:bg-zinc-900 p-4 rounded-xl border border-slate-200 dark:border-zinc-800 animate-in fade-in">
                                                    <p className="text-sm font-bold text-slate-500 dark:text-zinc-400 mb-2">3. ¿Qué estructura rompe?</p>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {['Afirmativo (mezcla to)', 'Negativo', 'Yes/No Questions', 'WH Questions'].map(g => (
                                                            <Checkbox key={g} label={g} checked={evalData.modal_verbs.grammar_fails.includes(g)} onChange={() => toggleArrayItem('modal_verbs', 'grammar_fails', g)} />
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <hr className="border-slate-100 dark:border-zinc-800 mx-8"/>

                                {/* SUB-TEMA: PRESENT SIMPLE */}
                                <div>
                                    <div className="flex justify-between items-center mb-4 text-purple-500">
                                        <h3 className="font-black text-lg text-slate-800 dark:text-white">Present Simple</h3>
                                        <span className="font-black text-2xl">{evalData.present_simple.score}/10</span>
                                    </div>
                                    <input 
                                        type="range" min="0" max="10" step="1" 
                                        value={evalData.present_simple.score} 
                                        onChange={e => setEvalData(p => ({...p, present_simple: {...p.present_simple, score: parseInt(e.target.value)}}))} 
                                        className="text-purple-500 mb-4"
                                    />

                                    {evalData.present_simple.score < 10 && (
                                        <div className="bg-slate-50 dark:bg-zinc-950 p-6 rounded-2xl border border-slate-200 dark:border-zinc-800 animate-in slide-in-from-top-4 duration-300">
                                            <p className="text-sm font-bold text-slate-500 dark:text-zinc-400 mb-3">Identifica la falla principal:</p>
                                            <div className="grid sm:grid-cols-2 gap-2">
                                                {["Tercera persona (Olvida la 's')", "Falla Do/Does en pregunta", "Falla Don't/Doesn't", "Armado de WH Questions"].map(fail => (
                                                    <Checkbox key={fail} label={fail} checked={evalData.present_simple.fails.includes(fail)} onChange={() => toggleArrayItem('present_simple', 'fails', fail)} />
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>

                        {/* BLOQUE: VOCABULARIO */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 shadow-sm overflow-hidden">
                            <div className="bg-rose-100 dark:bg-rose-900/30 p-5 flex items-center gap-3 border-b border-rose-200 dark:border-rose-800">
                                <Brain className="text-rose-600 dark:text-rose-400" size={24}/>
                                <h2 className="text-lg font-black text-rose-900 dark:text-rose-300 uppercase tracking-widest">Vocab Arsenal</h2>
                            </div>

                            <div className="p-6 md:p-8 space-y-10">
                                <div>
                                    <div className="flex justify-between items-center mb-4 text-rose-500">
                                        <h3 className="font-black text-lg text-slate-800 dark:text-white">Verbs Pack 1 al 3</h3>
                                        <span className="font-black text-2xl">{evalData.vocab_pack_1_3.score}/10</span>
                                    </div>
                                    <input 
                                        type="range" min="0" max="10" step="1" 
                                        value={evalData.vocab_pack_1_3.score} 
                                        onChange={e => setEvalData(p => ({...p, vocab_pack_1_3: {...p.vocab_pack_1_3, score: parseInt(e.target.value)}}))} 
                                        className="text-rose-500 mb-4"
                                    />

                                    {evalData.vocab_pack_1_3.score < 10 && (
                                        <div className="bg-slate-50 dark:bg-zinc-950 p-6 rounded-2xl border border-slate-200 dark:border-zinc-800 animate-in slide-in-from-top-4 duration-300">
                                            <p className="text-sm font-bold text-slate-500 dark:text-zinc-400 mb-3">Verbos reportados con fallas esta semana:</p>
                                            <textarea 
                                                value={evalData.vocab_pack_1_3.notes} 
                                                onChange={e => setEvalData(p => ({...p, vocab_pack_1_3: {...p.vocab_pack_1_3, notes: e.target.value}}))} 
                                                placeholder="Ej: get, become, realize..."
                                                className="w-full h-24 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-medium outline-none focus:border-rose-500 resize-none"
                                            />
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

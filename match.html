<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Madness | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; height: 100dvh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .animate-shake { animation: shake 0.35s ease-in-out; }

        @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
        .animate-pop-in { animation: popIn 0.2s ease-out forwards; }

        @keyframes slowFade {
            0% { opacity:1; transform:scale(1); }
            100% { opacity:0; transform:scale(0.92); pointer-events:none; }
        }
        /* 2.5 second slow fade — the anti-cheat */
        .animate-slow-fade { animation: slowFade 2.5s ease-in forwards; pointer-events: none; }
        /* Instant appear when user moves elsewhere */
        .animate-instant-in { animation: popIn 0.15s ease-out forwards; }

        @keyframes milestoneIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.15) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-milestone { animation: milestoneIn 0.5s ease-out forwards; }

        .btn-juicy { transition: transform 0.08s, background-color 0.15s, border-color 0.15s; }
        .btn-juicy:active:not(:disabled) { transform: translateY(3px); border-bottom-width: 1px !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, Play, RotateCcw, X } from 'lucide-react';
        import confetti from 'canvas-confetti';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const shuffle = (arr) => {
            const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a;
        };

        const TOTAL_PAIRS = 45;
        const TIME_SECONDS = 105; // 1:45
        const MILESTONES = [15, 30];

        const MatchGame = () => {
            const [loading, setLoading] = useState(true);
            const [gameData, setGameData] = useState(null);
            const [wordPool, setWordPool] = useState([]);
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');

            const [gameState, setGameState] = useState('menu'); 
            const [timeLeft, setTimeLeft] = useState(0);
            const [score, setScore] = useState(0);
            const [milestone, setMilestone] = useState(null); 

            const [board, setBoard] = useState([]);
            const [selectedSide, setSelectedSide] = useState(null); 

            const scoreRef = useRef(0);
            const lockedRef = useRef(false);
            const poolQueueRef = useRef([]);
            const fadingSlotsRef = useRef({}); 

            // Load
            useEffect(() => {
                const init = async () => {
                    const id = new URLSearchParams(window.location.search).get('id');
                    if (!id) return;
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameData(data);
                        setWordPool(data.content.pairs || []); // Claude changed it from wordPool to pairs, checking this
                    }
                    setLoading(false);
                };
                init();
            }, []);

            // Build initial board
            const buildInitialBoard = useCallback((pool) => {
                const first5 = pool.slice(0, 5);
                const rest = pool.slice(5);
                poolQueueRef.current = rest;

                let rightOrder = shuffle(first5);
                let att = 0;
                while (rightOrder.some((w, i) => w.id === first5[i].id) && att < 100) {
                    rightOrder = shuffle(first5); att++;
                }

                return first5.map((w, i) => ({
                    leftId: w.id, leftText: w.c1 || w.es, leftStatus: 'idle', // Claude fix for c1/es
                    rightId: rightOrder[i].id, rightText: rightOrder[i].c2 || rightOrder[i].en, rightStatus: 'idle', // Claude fix for c2/en
                    key: Date.now() + i,
                }));
            }, []);

            // Get next pair from queue
            const getNextPair = useCallback((currentBoardLeftIds, currentBoardRightIds) => {
                if (poolQueueRef.current.length === 0) {
                    poolQueueRef.current = shuffle([...wordPool]);
                }
                
                // CRÍTICO: Lógica anti-duplicados accidentales
                let candidateIndex = 0;
                let safetyBreak = 0;
                let candidate = poolQueueRef.current[candidateIndex];

                while ((currentBoardLeftIds.includes(candidate.id) || currentBoardRightIds.includes(candidate.id)) && safetyBreak < 50) {
                    candidateIndex++;
                    if(candidateIndex >= poolQueueRef.current.length) {
                        poolQueueRef.current = shuffle([...wordPool]);
                        candidateIndex = 0;
                    }
                    candidate = poolQueueRef.current[candidateIndex];
                    safetyBreak++;
                }

                const finalPair = poolQueueRef.current.splice(candidateIndex, 1)[0];
                return finalPair;
            }, [wordPool]);

            // Start game
            const startGame = useCallback(() => {
                if(wordPool.length < 5) return alert("Necesitas al menos 5 pares en tu banco de palabras.");
                let pool = shuffle([...wordPool]);
                while (pool.length < TOTAL_PAIRS + 10) pool = [...pool, ...shuffle([...wordPool])];

                const b = buildInitialBoard(pool);
                setBoard(b);
                setScore(0); scoreRef.current = 0;
                setTimeLeft(TIME_SECONDS);
                setSelectedSide(null);
                setMilestone(null);
                lockedRef.current = false;
                fadingSlotsRef.current = {};
                setGameState('playing');
            }, [wordPool, buildInitialBoard]);

            // Timer
            useEffect(() => {
                let timer;
                if (gameState === 'playing' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 0.1) { clearInterval(timer); setGameState('lost'); return 0; }
                            return +(prev - 0.1).toFixed(1);
                        });
                    }, 100);
                }
                return () => clearInterval(timer);
            }, [gameState]);

            // Force-resolve any fading slots
            const resolveAllFading = useCallback(() => {
                const fading = fadingSlotsRef.current;
                const keys = Object.keys(fading);
                if (keys.length === 0) return;

                setBoard(prev => {
                    const next = [...prev];
                    keys.forEach(idxStr => {
                        const idx = parseInt(idxStr);
                        const pending = fading[idx];
                        if (pending) {
                            clearTimeout(pending.timer);
                            next[idx] = {
                                ...next[idx],
                                leftId: pending.left.id, leftText: pending.left.text, leftStatus: 'entering',
                                rightId: pending.right.id, rightText: pending.right.text, rightStatus: 'entering',
                                key: Date.now() + idx + Math.random(),
                            };
                        }
                    });
                    return next;
                });
                fadingSlotsRef.current = {};

                setTimeout(() => {
                    setBoard(prev => prev.map(slot =>
                        (slot.leftStatus === 'entering' || slot.rightStatus === 'entering')
                            ? { ...slot, leftStatus: 'idle', rightStatus: 'idle' }
                            : slot
                    ));
                }, 200);
            }, []);

            // Schedule a slow replacement
            const scheduleFadeReplacement = useCallback((slotIndex, leftPair, rightPair) => {
                const timer = setTimeout(() => {
                    delete fadingSlotsRef.current[slotIndex];
                    setBoard(prev => {
                        const next = [...prev];
                        next[slotIndex] = {
                            ...next[slotIndex],
                            leftId: leftPair.id, leftText: leftPair.text, leftStatus: 'entering',
                            rightId: rightPair.id, rightText: rightPair.text, rightStatus: 'entering',
                            key: Date.now() + slotIndex + Math.random(),
                        };
                        return next;
                    });
                    setTimeout(() => {
                        setBoard(prev => prev.map((s, i) =>
                            i === slotIndex && (s.leftStatus === 'entering' || s.rightStatus === 'entering')
                                ? { ...s, leftStatus: 'idle', rightStatus: 'idle' }
                                : s
                        ));
                    }, 200);
                }, 2500); // 2.5s fade anti-cheat

                fadingSlotsRef.current[slotIndex] = {
                    left: leftPair, right: rightPair, timer
                };
            }, []);

            // Click handler
            const handleClick = useCallback((side, index) => {
                if (lockedRef.current || gameState !== 'playing') return;
                const slot = board[index];
                const status = side === 'left' ? slot.leftStatus : slot.rightStatus;
                if (status === 'fading' || status === 'entering' || status === 'wrong') return;

                resolveAllFading();

                const clickedId = side === 'left' ? slot.leftId : slot.rightId;

                // Deselect
                if (selectedSide && selectedSide.side === side && selectedSide.index === index) {
                    setSelectedSide(null);
                    setBoard(prev => prev.map((s, i) => {
                        if (i !== index) return s;
                        return side === 'left' ? { ...s, leftStatus: 'idle' } : { ...s, rightStatus: 'idle' };
                    }));
                    return;
                }

                // Switch side
                if (selectedSide && selectedSide.side === side) {
                    setBoard(prev => prev.map((s, i) => {
                        if (i === selectedSide.index) return side === 'left' ? { ...s, leftStatus: 'idle' } : { ...s, rightStatus: 'idle' };
                        if (i === index) return side === 'left' ? { ...s, leftStatus: 'selected' } : { ...s, rightStatus: 'selected' };
                        return s;
                    }));
                    setSelectedSide({ side, index });
                    return;
                }

                // Select first
                if (!selectedSide) {
                    setBoard(prev => prev.map((s, i) => {
                        if (i !== index) return s;
                        return side === 'left' ? { ...s, leftStatus: 'selected' } : { ...s, rightStatus: 'selected' };
                    }));
                    setSelectedSide({ side, index });
                    return;
                }

                // Check Match
                const prevSlot = board[selectedSide.index];
                const prevId = selectedSide.side === 'left' ? prevSlot.leftId : prevSlot.rightId;
                const isMatch = prevId === clickedId;

                lockedRef.current = true;

                if (isMatch) {
                    const leftIdx = selectedSide.side === 'left' ? selectedSide.index : index;
                    const rightIdx = selectedSide.side === 'right' ? selectedSide.index : index;

                    setBoard(prev => prev.map((s, i) => {
                        if (i === leftIdx && i === rightIdx) return { ...s, leftStatus: 'fading', rightStatus: 'fading' };
                        if (i === leftIdx) return { ...s, leftStatus: 'fading' };
                        if (i === rightIdx) return { ...s, rightStatus: 'fading' };
                        return s;
                    }));

                    confetti({ particleCount: 10, spread: 25, origin: { y: 0.5 }, gravity: 2, scalar: 0.6 });

                    const ns = scoreRef.current + 1;
                    scoreRef.current = ns;
                    setScore(ns);

                    if (MILESTONES.includes(ns)) {
                        setMilestone({ text: ns === 20 ? '¡Vas volando!' : '¡Imparable!', emoji: ns === 20 ? '🔥' : '⚡', count: ns });
                        setTimeout(() => setMilestone(null), 2000);
                    }

                    if (ns >= TOTAL_PAIRS) {
                        setTimeout(() => {
                            confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                            setGameState('won');
                        }, 400);
                        lockedRef.current = false;
                        setSelectedSide(null);
                        return;
                    }

                    // Lógica segura de extracción
                    const currentLeftIds = board.map(s => s.leftId);
                    const currentRightIds = board.map(s => s.rightId);
                    
                    // Remover los ids que acabamos de empatar
                    const lIdFilter = currentLeftIds.filter(id => id !== prevId);
                    const rIdFilter = currentRightIds.filter(id => id !== prevId);

                    const newPairForLeft = getNextPair(lIdFilter, rIdFilter);
                    const newPairForRight = getNextPair([...lIdFilter, newPairForLeft.id], [...rIdFilter, newPairForLeft.id]);

                    scheduleFadeReplacement(leftIdx, 
                        { id: newPairForLeft.id, text: newPairForLeft.c1 || newPairForLeft.es }, 
                        board[leftIdx] ? { id: board[leftIdx].rightId, text: board[leftIdx].rightText } : { id: newPairForRight.id, text: newPairForRight.c2 || newPairForRight.en }
                    );

                    if (rightIdx !== leftIdx) {
                        scheduleFadeReplacement(rightIdx, 
                            { id: board[rightIdx].leftId, text: board[rightIdx].leftText }, 
                            { id: newPairForRight.id, text: newPairForRight.c2 || newPairForRight.en }
                        );
                    }

                    setSelectedSide(null);
                    lockedRef.current = false;
                } else {
                    const leftIdx = selectedSide.side === 'left' ? selectedSide.index : index;
                    const rightIdx = selectedSide.side === 'right' ? selectedSide.index : index;

                    setBoard(prev => {
                        const next = [...prev];
                        if (selectedSide.side === 'left') next[selectedSide.index] = { ...next[selectedSide.index], leftStatus: 'wrong' };
                        else next[selectedSide.index] = { ...next[selectedSide.index], rightStatus: 'wrong' };
                        if (side === 'left') next[index] = { ...next[index], leftStatus: 'wrong' };
                        else next[index] = { ...next[index], rightStatus: 'wrong' };
                        return next;
                    });

                    setSelectedSide(null);
                    setTimeout(() => {
                        setBoard(prev => prev.map(s => ({
                            ...s,
                            leftStatus: s.leftStatus === 'wrong' ? 'idle' : s.leftStatus,
                            rightStatus: s.rightStatus === 'wrong' ? 'idle' : s.rightStatus,
                        })));
                        lockedRef.current = false;
                    }, 400);
                }
            }, [board, selectedSide, gameState, resolveAllFading, getNextPair, scheduleFadeReplacement]);

            const WordBtn = ({ text, status, onClick, side }) => {
                let bg = 'bg-zinc-800 border-zinc-700 text-zinc-200';
                let anim = '';
                if (status === 'selected') bg = 'bg-emerald-600 border-emerald-800 text-white';
                else if (status === 'wrong') { bg = 'bg-rose-500/80 border-rose-700 text-white'; anim = 'animate-shake'; }
                else if (status === 'fading') { bg = 'bg-emerald-500/50 border-emerald-700/50 text-emerald-300'; anim = 'animate-slow-fade'; }
                else if (status === 'entering') { bg = 'bg-zinc-800 border-zinc-700 text-zinc-200'; anim = 'animate-instant-in'; }
                const disabled = status === 'fading' || status === 'wrong' || status === 'entering';

                return (
                    <div className="h-[3.6rem] sm:h-[4.2rem]">
                        <button
                            className={`btn-juicy w-full h-full rounded-2xl border-2 border-b-4 font-bold text-sm sm:text-base flex items-center justify-center px-3 leading-tight ${bg} ${anim}`}
                            onClick={onClick}
                            disabled={disabled}>
                            {text}
                        </button>
                    </div>
                );
            };

            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-zinc-500" size={32}/></div>;
            if (!gameData || wordPool.length < 5) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">Error: No hay suficientes palabras guardadas en Firebase.</div>;

            if (gameState === 'menu') return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 overflow-auto">
                    <div className="max-w-sm w-full text-center my-auto">
                        <div className="text-7xl mb-4">⚡</div>
                        <h1 className="text-4xl font-black text-white mb-1">Match Madness</h1>
                        <p className="text-zinc-400 font-medium mb-1">{gameData.title}</p>
                        <p className="text-zinc-500 text-sm mb-8">Empareja {TOTAL_PAIRS} pares en {Math.floor(TIME_SECONDS/60)}:{(TIME_SECONDS%60).toString().padStart(2,'0')}</p>
                        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-8 text-left space-y-3">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">🔥</span>
                                <div><p className="font-black text-white text-sm">20 pares</p><p className="text-zinc-500 text-xs">Primer milestone</p></div>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">⚡</span>
                                <div><p className="font-black text-white text-sm">30 pares</p><p className="text-zinc-500 text-xs">Segundo milestone</p></div>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">👑</span>
                                <div><p className="font-black text-amber-400 text-sm">{TOTAL_PAIRS} pares</p><p className="text-zinc-500 text-xs">¡Victoria total!</p></div>
                            </div>
                        </div>
                        <button onClick={startGame} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-xl uppercase tracking-widest flex items-center justify-center gap-2">
                            <Play fill="currentColor" size={24}/> JUGAR
                        </button>
                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Volver al Hub</button>}
                    </div>
                </div>
            );

            if (gameState === 'playing') {
                const pct = (score / TOTAL_PAIRS) * 100;
                const isLow = timeLeft < 20;
                const mins = Math.floor(Math.ceil(timeLeft) / 60);
                const secs = Math.ceil(timeLeft) % 60;
                const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

                const ms20pct = (20 / TOTAL_PAIRS) * 100;
                const ms30pct = (30 / TOTAL_PAIRS) * 100;

                return (
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden relative">
                        {milestone && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 animate-milestone">
                                <div className="bg-zinc-800 border-2 border-amber-500/50 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
                                    <span className="text-3xl">{milestone.emoji}</span>
                                    <div>
                                        <p className="font-black text-white text-lg">{milestone.count} pares</p>
                                        <p className="text-amber-400 font-bold text-sm">{milestone.text}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        <header className="px-4 py-2.5 flex items-center justify-between shrink-0 bg-zinc-900 border-b border-zinc-800">
                            <button onClick={() => setGameState('menu')} className="p-2 text-zinc-500 hover:text-white rounded-xl"><X size={20}/></button>
                            <div className="flex-1 mx-4 relative">
                                <div className="h-3 w-full bg-zinc-800 rounded-full overflow-visible relative">
                                    <div className={`h-full rounded-full transition-all duration-300 ${isLow ? 'bg-rose-500' : 'bg-amber-500'}`} style={{ width: `${pct}%` }}/>
                                    <div className="absolute top-1/2 -translate-y-1/2 flex items-center justify-center" style={{ left: `${ms20pct}%` }}>
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center text-[8px] font-black ${score >= 20 ? 'bg-amber-500 border-amber-400 text-black' : 'bg-zinc-700 border-zinc-600 text-zinc-400'}`}>20</div>
                                    </div>
                                    <div className="absolute top-1/2 -translate-y-1/2 flex items-center justify-center" style={{ left: `${ms30pct}%` }}>
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center text-[8px] font-black ${score >= 30 ? 'bg-amber-500 border-amber-400 text-black' : 'bg-zinc-700 border-zinc-600 text-zinc-400'}`}>30</div>
                                    </div>
                                    <div className="absolute top-1/2 -translate-y-1/2 right-0 flex items-center justify-center">
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center text-[8px] font-black ${score >= TOTAL_PAIRS ? 'bg-amber-500 border-amber-400 text-black' : 'bg-zinc-700 border-zinc-600 text-zinc-400'}`}>👑</div>
                                    </div>
                                </div>
                            </div>
                            <div className={`font-black text-lg tabular-nums min-w-[50px] text-right ${isLow ? 'text-rose-500 animate-pulse' : 'text-amber-500'}`}>
                                {timeStr}
                            </div>
                        </header>
                        <div className="flex px-4 sm:px-8 max-w-2xl mx-auto w-full pt-3 pb-1">
                            <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Español</p>
                            <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">English</p>
                        </div>
                        <main className="flex-1 flex gap-3 sm:gap-4 px-4 sm:px-8 pb-6 max-w-2xl mx-auto w-full">
                            <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">
                                {board.map((slot, i) => (
                                    <WordBtn key={`l-${slot.key}`} text={slot.leftText} status={slot.leftStatus} side="left" onClick={() => handleClick('left', i)}/>
                                ))}
                            </div>
                            <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">
                                {board.map((slot, i) => (
                                    <WordBtn key={`r-${slot.key}`} text={slot.rightText} status={slot.rightStatus} side="right" onClick={() => handleClick('right', i)}/>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            const isWin = gameState === 'won';
            const timeTaken = TIME_SECONDS - Math.ceil(timeLeft);
            const mins = Math.floor(timeTaken / 60);
            const secs = timeTaken % 60;

            return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 overflow-auto">
                    <div className="max-w-sm w-full text-center my-auto">
                        <div className="text-7xl mb-4">{isWin ? '👑' : '⏱️'}</div>
                        {isWin ? (
                            <>
                                <h2 className="text-3xl font-black text-amber-400 mb-2">¡VICTORIA!</h2>
                                <p className="text-zinc-400 font-bold mb-1">{TOTAL_PAIRS} pares en {mins}:{secs.toString().padStart(2, '0')}</p>
                                <p className="text-zinc-500 text-sm mb-8">Has dominado Match Madness.</p>
                            </>
                        ) : (
                            <>
                                <h2 className="text-3xl font-black text-rose-400 mb-2">Se acabó el tiempo</h2>
                                <p className="text-zinc-400 font-bold mb-1">{score} de {TOTAL_PAIRS} pares</p>
                                <p className="text-zinc-500 text-sm mb-8">¡Inténtalo otra vez!</p>
                            </>
                        )}
                        <div className="space-y-3">
                            <button onClick={startGame} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-lg uppercase tracking-widest flex items-center justify-center gap-2">
                                <RotateCcw size={20}/> {isWin ? 'Jugar de Nuevo' : 'Reintentar'}
                            </button>
                            <button onClick={() => setGameState('menu')} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">
                                Menú
                            </button>
                        </div>
                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Volver al Hub</button>}
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<MatchGame />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react/jsx-runtime":"https://esm.sh/react@18.2.0/jsx-runtime","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.263.1","firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js","canvas-confetti":"https://esm.sh/canvas-confetti@1.9.3"}}</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body{font-family:'Plus Jakarta Sans',sans-serif;user-select:none;-webkit-user-select:none;overflow:hidden;height:100dvh}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        button,[role="button"]{touch-action:manipulation;cursor:pointer}
        .btn-juicy{transition:transform 0.1s ease,filter 0.1s ease;-webkit-transform:translateZ(0);}
        .btn-juicy:active:not(:disabled){transform:scale(0.94) translateZ(0)}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        .animate-shake{animation:shake 0.4s ease-in-out}
    </style>
</head>
<body class="text-zinc-100">
<div id="root"></div>
<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef,useCallback,useMemo}from 'react';
import{createRoot}from 'react-dom/client';
import{initializeApp}from 'firebase/app';
import{getAuth, signInAnonymously, onAuthStateChanged} from 'firebase/auth';
import{getFirestore,doc,getDoc,addDoc,collection,query,orderBy,limit,getDocs,serverTimestamp,where,deleteDoc}from 'firebase/firestore';
import{Loader2,Play,RotateCcw,X,Trophy,BookOpen,Crown,ArrowRight,Pause,LogOut}from 'lucide-react';
import confetti from 'canvas-confetti';

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const MatchGame=()=>{
    const[loading,setLoading]=useState(true);
    const[quizId]=useState(new URLSearchParams(window.location.search).get('id'));
    
    // --- ESTE ES EL EFECTO CORREGIDO ---
    useEffect(()=>{
        const unsub = onAuthStateChanged(auth, async (u) => {
            if (u) {
                // Usuario logueado (Maestro o Anónimo existente), cargamos juego
                if (!quizId) { setLoading(false); return; }
                try {
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId));
                    // ... (Aquí va toda tu lógica original de setGameData y wordPool) ...
                } catch (e) { console.error(e); }
                setLoading(false);
            } else {
                // No hay nadie, iniciamos anónimo
                signInAnonymously(auth).catch(e => console.error("Error auth:", e));
            }
        });
        return () => unsub();
    }, [quizId]);

    // ... (El resto de tu código original sin cambios) ...

    if(loading)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-zinc-500" size={32}/></div>;
    
    return <div className="text-white">Juego cargado correctamente</div>;
};

createRoot(document.getElementById('root')).render(<MatchGame/>);
</script>
</body>

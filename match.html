<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Madness | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; height: 100dvh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .animate-shake { animation: shake 0.35s ease-in-out; }

        @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
        .animate-pop-in { animation: popIn 0.2s ease-out forwards; }

        @keyframes slowFade {
            0% { opacity:1; transform:scale(1); }
            100% { opacity:0; transform:scale(0.92); pointer-events:none; }
        }
        .animate-slow-fade { animation: slowFade 2.5s ease-in forwards; pointer-events: none; }
        .animate-instant-in { animation: popIn 0.15s ease-out forwards; }

        @keyframes milestoneIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.15) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-milestone { animation: milestoneIn 0.5s ease-out forwards; }

        .btn-juicy { transition: transform 0.08s, background-color 0.15s, border-color 0.15s, opacity 0.3s; }
        .btn-juicy:active:not(:disabled) { transform: translateY(3px); border-bottom-width: 1px !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, Play, RotateCcw, X } from 'lucide-react';
        import confetti from 'canvas-confetti';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const shuffle = (arr) => {
            const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a;
        };

        const TOTAL_PAIRS = 45; 
        const PAIRS_PER_ROUND = 15;
        const ROUNDS = TOTAL_PAIRS / PAIRS_PER_ROUND;
        const TIME_SECONDS = 105; 

        const MatchGame = () => {
            const [loading, setLoading] = useState(true);
            const [gameData, setGameData] = useState(null);
            const [wordPool, setWordPool] = useState([]);
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');

            const [gameState, setGameState] = useState('menu'); 
            const [timeLeft, setTimeLeft] = useState(0);
            const [score, setScore] = useState(0);
            const [milestone, setMilestone] = useState(null); 

            const [board, setBoard] = useState([]);
            const [selectedSide, setSelectedSide] = useState(null); 
            const [currentRound, setCurrentRound] = useState(0);

            const scoreRef = useRef(0);
            const lockedRef = useRef(false);
            
            // Colas independientes para manejar los vaciados de forma perfecta
            const leftQueueRef = useRef([]);
            const rightQueueRef = useRef([]);
            const gamePoolRef = useRef([]); // Las 45 palabras elegidas para esta partida

            useEffect(() => {
                const init = async () => {
                    const id = new URLSearchParams(window.location.search).get('id');
                    if (!id) return;
                    try {
                        const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                        if (snap.exists()) {
                            const data = snap.data();
                            setGameData(data);
                            
                            let foundPool = [];
                            if (Array.isArray(data.content)) {
                                foundPool = data.content;
                            } else if (data.content && typeof data.content === 'object') {
                                Object.values(data.content).forEach(val => {
                                    if (Array.isArray(val) && val.length > foundPool.length) {
                                        foundPool = val;
                                    }
                                });
                            }
                            
                            const normalizedPool = foundPool.map((item, index) => {
                                const strValues = Object.values(item).filter(v => typeof v === 'string');
                                return {
                                    id: item.id || `word-${index}-${Date.now()}`,
                                    c1: item.c1 || item.es || item.term || item.spanish || strValues[0] || "???",
                                    c2: item.c2 || item.en || item.definition || item.english || strValues[1] || "???"
                                };
                            });

                            setWordPool(normalizedPool);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            const startRound = useCallback((roundIdx, pool) => {
                const roundPairs = pool.slice(roundIdx * PAIRS_PER_ROUND, (roundIdx + 1) * PAIRS_PER_ROUND);
                
                let lQueue = shuffle([...roundPairs]);
                let rQueue = shuffle([...roundPairs]);
                
                // Evitar que los primeros 5 coincidan en la misma fila al iniciar
                for(let i=0; i<5; i++) {
                    if(lQueue[i] && rQueue[i] && lQueue[i].id === rQueue[i].id) {
                        const swapIdx = (i + 1) % Math.min(15, rQueue.length);
                        const temp = rQueue[i];
                        rQueue[i] = rQueue[swapIdx];
                        rQueue[swapIdx] = temp;
                    }
                }
                
                leftQueueRef.current = lQueue.slice(5);
                rightQueueRef.current = rQueue.slice(5);

                const initialBoard = [];
                for(let i=0; i<5; i++) {
                    if(lQueue[i] && rQueue[i]) {
                        initialBoard.push({
                            left: { id: lQueue[i].id, text: lQueue[i].c1, status: 'idle' },
                            right: { id: rQueue[i].id, text: rQueue[i].c2, status: 'idle' },
                            key: Date.now() + i
                        });
                    }
                }
                setBoard(initialBoard);
                setCurrentRound(roundIdx);
            }, []);

            const startGame = useCallback(() => {
                if(wordPool.length < 5) return alert("Necesitas al menos 5 pares en tu banco de palabras.");
                
                // Seleccionar las 45 palabras para el juego (o repetir si hay menos)
                let pool = shuffle([...wordPool]);
                while (pool.length < TOTAL_PAIRS) pool = [...pool, ...shuffle([...wordPool])];
                gamePoolRef.current = pool.slice(0, TOTAL_PAIRS);

                startRound(0, gamePoolRef.current);
                
                setScore(0); scoreRef.current = 0;
                setTimeLeft(TIME_SECONDS);
                setSelectedSide(null);
                setMilestone(null);
                lockedRef.current = false;
                setGameState('playing');
            }, [wordPool, startRound]);

            useEffect(() => {
                let timer;
                if (gameState === 'playing' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 0.1) { clearInterval(timer); setGameState('lost'); return 0; }
                            return +(prev - 0.1).toFixed(1);
                        });
                    }, 100);
                }
                return () => clearInterval(timer);
            }, [gameState, timeLeft]);

            const handleClick = useCallback((side, index) => {
                if (lockedRef.current || gameState !== 'playing') return;
                
                const slot = board[index];
                const item = side === 'left' ? slot.left : slot.right;
                if (item.status === 'fading' || item.status === 'entering' || item.status === 'wrong' || item.status === 'empty') return;

                const clickedId = item.id;

                if (selectedSide && selectedSide.side === side && selectedSide.index === index) {
                    setSelectedSide(null);
                    setBoard(prev => prev.map((s, i) => {
                        if (i !== index) return s;
                        return side === 'left' ? { ...s, left: { ...s.left, status: 'idle' } } : { ...s, right: { ...s.right, status: 'idle' } };
                    }));
                    return;
                }

                if (selectedSide && selectedSide.side === side) {
                    setBoard(prev => prev.map((s, i) => {
                        if (i === selectedSide.index) return side === 'left' ? { ...s, left: { ...s.left, status: 'idle' } } : { ...s, right: { ...s.right, status: 'idle' } };
                        if (i === index) return side === 'left' ? { ...s, left: { ...s.left, status: 'selected' } } : { ...s, right: { ...s.right, status: 'selected' } };
                        return s;
                    }));
                    setSelectedSide({ side, index });
                    return;
                }

                if (!selectedSide) {
                    setBoard(prev => prev.map((s, i) => {
                        if (i !== index) return s;
                        return side === 'left' ? { ...s, left: { ...s.left, status: 'selected' } } : { ...s, right: { ...s.right, status: 'selected' } };
                    }));
                    setSelectedSide({ side, index });
                    return;
                }

                const prevSlot = board[selectedSide.index];
                const prevItem = selectedSide.side === 'left' ? prevSlot.left : prevSlot.right;
                const isMatch = prevItem.id === clickedId;

                lockedRef.current = true;

                if (isMatch) {
                    const leftIdx = selectedSide.side === 'left' ? selectedSide.index : index;
                    const rightIdx = selectedSide.side === 'right' ? selectedSide.index : index;

                    setBoard(prev => prev.map((s, i) => {
                        let newS = { ...s };
                        if (i === leftIdx) newS.left = { ...newS.left, status: 'correct' };
                        if (i === rightIdx) newS.right = { ...newS.right, status: 'correct' };
                        return newS;
                    }));

                    const ns = scoreRef.current + 1;
                    scoreRef.current = ns;
                    setScore(ns);

                    // Reemplazo con desvanecimiento
                    setTimeout(() => {
                        const nextLeft = leftQueueRef.current.pop();
                        const nextRight = rightQueueRef.current.pop();

                        setBoard(prev => {
                            const next = [...prev];
                            
                            // Reemplazar o vaciar
                            if (nextLeft) {
                                next[leftIdx].left = { id: nextLeft.id, text: nextLeft.c1, status: 'entering' };
                            } else {
                                next[leftIdx].left = { ...next[leftIdx].left, status: 'empty' };
                            }
                            
                            if (nextRight) {
                                next[rightIdx].right = { id: nextRight.id, text: nextRight.c2, status: 'entering' };
                            } else {
                                next[rightIdx].right = { ...next[rightIdx].right, status: 'empty' };
                            }

                            return next;
                        });

                        setTimeout(() => {
                            setBoard(prev => prev.map(s => ({
                                ...s,
                                left: s.left.status === 'entering' ? { ...s.left, status: 'idle' } : s.left,
                                right: s.right.status === 'entering' ? { ...s.right, status: 'idle' } : s.right
                            })));

                            // Revisar si la ronda se limpió completamente (todos vacíos o ya se alcanzó el múltiplo de 15)
                            if (ns % PAIRS_PER_ROUND === 0) {
                                if (ns >= TOTAL_PAIRS) {
                                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                                    setGameState('won');
                                } else {
                                    setMilestone({ text: '¡Ronda Completada!', emoji: '🔥', count: ns });
                                    setTimeout(() => {
                                        setMilestone(null);
                                        startRound(currentRound + 1, gamePoolRef.current);
                                    }, 2000);
                                }
                            }

                            lockedRef.current = false;
                        }, 200);
                    }, 2500);

                    setSelectedSide(null);

                } else {
                    // Error: Mostrar 🤔
                    setBoard(prev => {
                        const next = [...prev];
                        if (selectedSide.side === 'left') next[selectedSide.index].left = { ...next[selectedSide.index].left, status: 'wrong' };
                        else next[selectedSide.index].right = { ...next[selectedSide.index].right, status: 'wrong' };
                        
                        if (side === 'left') next[index].left = { ...next[index].left, status: 'wrong' };
                        else next[index].right = { ...next[index].right, status: 'wrong' };
                        
                        return next;
                    });

                    setSelectedSide(null);
                    setTimeout(() => {
                        setBoard(prev => prev.map(s => ({
                            ...s,
                            left: s.left.status === 'wrong' ? { ...s.left, status: 'idle' } : s.left,
                            right: s.right.status === 'wrong' ? { ...s.right, status: 'idle' } : s.right,
                        })));
                        lockedRef.current = false;
                    }, 400);
                }
            }, [board, selectedSide, gameState, currentRound, startRound]);

            const WordBtn = ({ item, onClick }) => {
                if (item.status === 'empty') {
                    return <div className="h-[3.6rem] sm:h-[4.2rem] opacity-0 pointer-events-none"></div>;
                }

                let bg = 'bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-slate-700 dark:text-zinc-200';
                let anim = '';
                let displayText = item.text;

                if (item.status === 'selected') {
                    bg = 'bg-cyan-50 dark:bg-cyan-900/30 border-cyan-300 dark:border-cyan-800 text-cyan-700 dark:text-cyan-400 font-black';
                } else if (item.status === 'correct') {
                    bg = 'bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-transparent'; 
                    anim = 'animate-slow-fade';
                    displayText = '😎';
                } else if (item.status === 'wrong') {
                    bg = 'bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-transparent'; 
                    anim = 'animate-shake';
                    displayText = '🤔';
                } else if (item.status === 'entering') {
                    anim = 'animate-instant-in';
                }

                const disabled = item.status === 'fading' || item.status === 'wrong' || item.status === 'entering' || item.status === 'correct';

                return (
                    <div className="h-[3.6rem] sm:h-[4.2rem]">
                        <button
                            className={`btn-juicy w-full h-full rounded-2xl border-2 border-b-4 font-bold text-sm sm:text-base flex items-center justify-center px-3 leading-tight ${bg} ${anim}`}
                            onClick={onClick}
                            disabled={disabled}>
                            <span className={item.status === 'correct' || item.status === 'wrong' ? 'text-3xl text-black dark:text-white' : ''}>
                                {displayText}
                            </span>
                        </button>
                    </div>
                );
            };

            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-zinc-500" size={32}/></div>;
            if (!gameData || wordPool.length < 5) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><div className="bg-rose-900/20 border border-rose-500/50 p-6 rounded-2xl text-rose-500 font-bold text-center max-w-sm">⚠️ Error: No hay suficientes palabras guardadas en este juego. (Se encontraron {wordPool.length}, mínimo 5).</div></div>;

            if (gameState === 'menu') return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 overflow-auto">
                    <div className="max-w-sm w-full text-center my-auto">
                        <div className="text-7xl mb-4">⚡</div>
                        <h1 className="text-4xl font-black text-white mb-1">Match Madness</h1>
                        <p className="text-zinc-400 font-medium mb-1">{gameData.title}</p>
                        <p className="text-zinc-500 text-sm mb-8">Empareja {TOTAL_PAIRS} pares en {Math.floor(TIME_SECONDS/60)}:{(TIME_SECONDS%60).toString().padStart(2,'0')}</p>
                        
                        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-8 text-left space-y-3">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">🔥</span>
                                <div><p className="font-black text-white text-sm">3 Rondas</p><p className="text-zinc-500 text-xs">De 15 pares cada una</p></div>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">😎</span>
                                <div><p className="font-black text-white text-sm">Anti-Trampas</p><p className="text-zinc-500 text-xs">No esperes, sigue haciendo pares</p></div>
                            </div>
                        </div>
                        
                        <button onClick={startGame} className="btn-juicy w-full bg-cyan-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-cyan-700 text-xl uppercase tracking-widest flex items-center justify-center gap-2">
                            <Play fill="currentColor" size={24}/> JUGAR
                        </button>
                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Volver al Hub</button>}
                    </div>
                </div>
            );

            if (gameState === 'playing') {
                const pct = (score / TOTAL_PAIRS) * 100;
                const isLow = timeLeft < 20;
                const mins = Math.floor(Math.ceil(timeLeft) / 60);
                const secs = Math.ceil(timeLeft) % 60;
                const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

                return (
                    <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950 overflow-hidden relative">
                        {milestone && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 animate-milestone">
                                <div className="bg-zinc-800 border-2 border-cyan-500/50 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
                                    <span className="text-3xl">{milestone.emoji}</span>
                                    <div>
                                        <p className="font-black text-white text-lg">{milestone.count} pares</p>
                                        <p className="text-cyan-400 font-bold text-sm">{milestone.text}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        <header className="px-4 py-2.5 flex items-center justify-between shrink-0 bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 shadow-sm">
                            <button onClick={() => setGameState('menu')} className="p-2 text-slate-400 dark:text-zinc-500 hover:text-slate-800 dark:hover:text-white rounded-xl"><X size={20}/></button>
                            <div className="flex-1 mx-4 relative">
                                <div className="h-3 w-full bg-slate-200 dark:bg-zinc-800 rounded-full overflow-hidden">
                                    <div className={`h-full rounded-full transition-all duration-300 ${isLow ? 'bg-rose-500' : 'bg-cyan-500'}`} style={{ width: `${pct}%` }}/>
                                </div>
                            </div>
                            <div className={`font-black text-lg tabular-nums min-w-[50px] text-right ${isLow ? 'text-rose-500 animate-pulse' : 'text-cyan-600 dark:text-cyan-400'}`}>
                                {timeStr}
                            </div>
                        </header>
                        <div className="flex px-4 sm:px-8 max-w-2xl mx-auto w-full pt-3 pb-1">
                            <p className="flex-1 text-center text-slate-400 dark:text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Columna 1</p>
                            <p className="flex-1 text-center text-slate-400 dark:text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Columna 2</p>
                        </div>
                        <main className="flex-1 flex gap-3 sm:gap-4 px-4 sm:px-8 pb-6 max-w-2xl mx-auto w-full">
                            <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">
                                {board.map((slot, i) => (
                                    <WordBtn key={`l-${slot.key}`} item={slot.left} onClick={() => handleClick('left', i)}/>
                                ))}
                            </div>
                            <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">
                                {board.map((slot, i) => (
                                    <WordBtn key={`r-${slot.key}`} item={slot.right} onClick={() => handleClick('right', i)}/>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            const isWin = gameState === 'won';
            const timeTaken = TIME_SECONDS - Math.ceil(timeLeft);
            const mins = Math.floor(timeTaken / 60);
            const secs = timeTaken % 60;

            return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 overflow-auto">
                    <div className="max-w-sm w-full text-center my-auto">
                        <div className="text-7xl mb-4">{isWin ? '👑' : '⏱️'}</div>
                        {isWin ? (
                            <>
                                <h2 className="text-3xl font-black text-cyan-400 mb-2">¡VICTORIA!</h2>
                                <p className="text-zinc-400 font-bold mb-1">{TOTAL_PAIRS} pares en {mins}:{secs.toString().padStart(2, '0')}</p>
                                <p className="text-zinc-500 text-sm mb-8">Has dominado Match Madness.</p>
                            </>
                        ) : (
                            <>
                                <h2 className="text-3xl font-black text-rose-400 mb-2">Se acabó el tiempo</h2>
                                <p className="text-zinc-400 font-bold mb-1">{score} de {TOTAL_PAIRS} pares</p>
                                <p className="text-zinc-500 text-sm mb-8">¡Inténtalo otra vez!</p>
                            </>
                        )}
                        <div className="space-y-3">
                            <button onClick={startGame} className="btn-juicy w-full bg-cyan-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-cyan-700 text-lg uppercase tracking-widest flex items-center justify-center gap-2">
                                <RotateCcw size={20}/> {isWin ? 'Jugar de Nuevo' : 'Reintentar'}
                            </button>
                            <button onClick={() => setGameState('menu')} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">
                                Menú
                            </button>
                        </div>
                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Volver al Hub</button>}
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<MatchGame />);
    </script>
</body>
</html>

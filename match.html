<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Madness | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.263.1","firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js","canvas-confetti":"https://esm.sh/canvas-confetti@1.9.3"}}</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body{font-family:'Plus Jakarta Sans',sans-serif;user-select:none;-webkit-user-select:none;overflow:hidden;height:100dvh}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        /*
         * ============================================================
         * FIX iOS / SAFARI — RESPUESTA TÁCTIL INSTANTÁNEA
         * ============================================================
         * PROBLEMA: En iOS Safari, un <button> dentro de un div que
         * no es "interactive" a veces necesita 300ms antes de disparar
         * el evento click. Peor aún: si el botón tiene TANTO onClick
         * como onTouchEnd, los DOS se disparan → comportamiento de
         * "doble clic raro".
         *
         * SOLUCIÓN:
         * 1. touch-action: manipulation  → elimina el delay de 300ms
         * 2. NO usar onTouchEnd en React; usar SOLO onClick
         * 3. El handler llama e.preventDefault() para evitar que el
         *    sistema genere un click sintético después del touch
         * ============================================================
         */
        button, [role="button"] {
            touch-action: manipulation;
            cursor: pointer;
        }

        /* Sólo aplica hover en dispositivos con mouse real */
        @media (hover: hover) and (pointer: fine) {
            .hover-effect:hover { filter: brightness(1.15); }
        }

        /* Juicy press — funciona en touch y mouse */
        .btn-juicy {
            transition: transform 0.1s ease, filter 0.1s ease;
            -webkit-transform: translateZ(0); /* fuerza GPU en Safari */
        }
        .btn-juicy:active:not(:disabled) {
            transform: scale(0.94) translateZ(0);
        }

        /* Overflow de texto largo en celdas pequeñas (Safari) */
        .safari-text-fix {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            width: 100%;
            text-align: center;
        }

        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
        .animate-shake{animation:shake 0.4s ease-in-out}

        @keyframes pop-in{0%{transform:scale(0.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
        .animate-pop-in{animation:pop-in 0.25s ease-out both}

        @keyframes slow-fade{0%{opacity:1}100%{opacity:0.35}}
        .animate-slow-fade{animation:slow-fade 5s linear forwards}

        @keyframes milestone{0%{opacity:0;transform:translateX(-50%) translateY(-12px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-12px)}}
        .animate-milestone{animation:milestone 2.2s ease both}

        /* Countdown overlay número */
        @keyframes countdown-pop{0%{transform:scale(1.6);opacity:0}30%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.8)}}
        .animate-countdown{animation:countdown-pop 0.85s ease both}

        /* Banner top pulse on low time */
        @keyframes pulse-low{0%,100%{opacity:1}50%{opacity:0.6}}
        .pulse-low{animation:pulse-low 0.7s ease-in-out infinite}
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React,{useState,useEffect,useRef,useCallback,useMemo}from 'react';
        import{createRoot}from 'react-dom/client';
        import{initializeApp}from 'firebase/app';
        import{getFirestore,doc,getDoc,addDoc,collection,query,orderBy,limit,getDocs,serverTimestamp}from 'firebase/firestore';
        import{Loader2,Play,RotateCcw,X,Trophy,Star,BookOpen,Crown,ArrowRight,Pause,Home,LogOut}from 'lucide-react';
        import confetti from 'canvas-confetti';

        /* ─── Firebase ─── */
        const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
        const app=initializeApp(firebaseConfig);
        const db=getFirestore(app);

        /* ─── Helpers ─── */
        const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};

        /* ─── Constantes de juego ─── */
        const CROWNS=[
            {id:1,emoji:'👑',name:'Bronze Crown',color:'text-amber-600',bg:'bg-amber-600',perCP:15,time:105,checkpoints:3},
            {id:2,emoji:'👑',name:'Silver Crown',color:'text-zinc-300',bg:'bg-zinc-400',perCP:20,time:105,checkpoints:3},
            {id:3,emoji:'👑',name:'Gold Crown',color:'text-amber-400',bg:'bg-amber-400',perCP:20,time:90,checkpoints:3},
        ];
        const FADE_MS=5000;
        const BOARD_SIZE=5;

        /* ════════════════════════════════════════════
           COMPONENTE PRINCIPAL
        ════════════════════════════════════════════ */
        const MatchGame=()=>{
            const[loading,setLoading]=useState(true);
            const[gameData,setGameData]=useState(null);
            const[wordPool,setWordPool]=useState([]);
            const[isStudent]=useState(new URLSearchParams(window.location.search).get('student')==='true');
            const[quizId]=useState(new URLSearchParams(window.location.search).get('id'));

            const[screen,setScreen]=useState('menu');
            const[playerName,setPlayerName]=useState('');
            const[leaderboard,setLeaderboard]=useState([]);
            const[showVocab,setShowVocab]=useState(false);
            const[showLB,setShowLB]=useState(false);

            /* estado de juego */
            const[board,setBoard]=useState([]);
            const[selectedSide,setSelectedSide]=useState(null);
            const[score,setScore]=useState(0);
            const[timeLeft,setTimeLeft]=useState(105);
            const[crownIdx,setCrownIdx]=useState(0);
            const[cpIdx,setCpIdx]=useState(0);
            const[cpMatched,setCpMatched]=useState(0);
            const[milestone,setMilestone]=useState(null);
            const[totalPairs,setTotalPairs]=useState(0);
            const[isPerfect,setIsPerfect]=useState(true);

            /* pausa & countdown */
            const[isPaused,setIsPaused]=useState(false);
            const[countdown,setCountdown]=useState(null);   // '3','2','1','¡GO!'  o null
            const countdownRef=useRef(null);

            /* refs para lógica sin stale-closures */
            const lockedRef=useRef(false);
            const allPairsRef=useRef([]);
            const cpIdxRef=useRef(0);
            const cpMatchedRef=useRef(0);
            const fadingRef=useRef({});
            const timerRef=useRef(null);

            /* ─── CARGA FIREBASE ─── */
            useEffect(()=>{
                if(!quizId){setLoading(false);return;}
                /* Path: artifacts/periplo-app-v1/users/teacher_builder_001/quizzes/{id} */
                getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',quizId))
                    .then(snap=>{
                        if(snap.exists()){
                            const d=snap.data();
                            setGameData(d);
                            const pairs=(d.content?.pairs||d.pairs||[]).filter(p=>p.left&&p.right);
                            setWordPool(pairs);
                        }
                        setLoading(false);
                    })
                    .catch(()=>setLoading(false));
            },[quizId]);

            /* ─── TIMER ─── */
            useEffect(()=>{
                if(screen!=='playing'||isPaused||countdown){
                    clearInterval(timerRef.current);return;
                }
                timerRef.current=setInterval(()=>{
                    setTimeLeft(t=>{
                        if(t<=1){clearInterval(timerRef.current);setScreen('checkpointFail');return 0;}
                        return t-1;
                    });
                },1000);
                return()=>clearInterval(timerRef.current);
            },[screen,isPaused,countdown]);

            /* ─── PAUSA: triggerCountdown ─── */
            /*
             * Cuando el usuario reanuda, NO arranca el juego de inmediato.
             * Muestra 3 → 2 → 1 → ¡GO! antes de quitar isPaused.
             * Cada número dura ~900ms para que la animación termine.
             */
            const triggerCountdown=useCallback(()=>{
                const steps=['3','2','1','¡GO!'];
                let i=0;
                const tick=()=>{
                    setCountdown(steps[i]);
                    i++;
                    if(i<steps.length){
                        countdownRef.current=setTimeout(tick,900);
                    }else{
                        countdownRef.current=setTimeout(()=>{
                            setCountdown(null);
                            setIsPaused(false);
                        },700);
                    }
                };
                tick();
            },[]);

            const handlePause=useCallback(()=>{
                if(screen!=='playing')return;
                if(isPaused)return; // ya está pausado, no hacer nada (el botón "reanudar" del overlay lo maneja)
                clearTimeout(countdownRef.current);
                setCountdown(null);
                setIsPaused(true);
            },[screen,isPaused]);

            const handleResume=useCallback(()=>{
                triggerCountdown();
            },[triggerCountdown]);

            /* ─── URL de salida al hub ─── */
            const hubUrl=useMemo(()=>{
                const params=new URLSearchParams(window.location.search);
                const sid=params.get('studentId');
                if(isStudent&&sid) return `students_portal.html?id=${sid}`;
                return 'index.html';
            },[isStudent]);

            /* ─── buildCP ─── */
            const buildCP=useCallback((pairs)=>{
                const rows=pairs.map((p,i)=>({
                    key:`${cpIdxRef.current}-${i}`,
                    left:{text:p.left,status:'idle',uid:`L${cpIdxRef.current}-${i}`},
                    right:{text:p.right,status:'idle',uid:`R${cpIdxRef.current}-${i}`},
                }));
                const ls=shuffle(rows.map((r,i)=>({...r.left,rowIndex:i})));
                const rs=shuffle(rows.map((r,i)=>({...r.right,rowIndex:i})));
                setBoard(rows.map((r,i)=>({key:r.key,left:ls[i],right:rs[i]})));
                setSelectedSide(null);
                lockedRef.current=false;
            },[]);

            /* ─── startCrown ─── */
            const startCrown=useCallback((idx)=>{
                if(!playerName.trim())return;
                const c=CROWNS[idx];
                const total=c.perCP*c.checkpoints;
                setTotalPairs(total);
                setScore(0);setTimeLeft(c.time);
                setCrownIdx(idx);setCpIdx(0);cpIdxRef.current=0;
                setCpMatched(0);cpMatchedRef.current=0;
                fadingRef.current={};setIsPerfect(true);
                const pool=shuffle(wordPool).slice(0,total);
                allPairsRef.current=pool;
                buildCP(pool.slice(0,c.perCP));
                setScreen('playing');
            },[playerName,wordPool,buildCP]);

            /* ─── resolveAllFading ─── */
            const resolveAllFading=useCallback(()=>{
                const keys=Object.keys(fadingRef.current);
                if(!keys.length)return;
                keys.forEach(k=>clearTimeout(fadingRef.current[k]));
                fadingRef.current={};
                setBoard(prev=>prev.map(r=>{
                    const nl={...r.left};const nr={...r.right};
                    if(nl.status==='entering')nl.status='idle';
                    if(nr.status==='entering')nr.status='idle';
                    return{...r,left:nl,right:nr};
                }));
            },[]);

            /* ─── handleClick ─── */
            const handleClick=useCallback((side,index)=>{
                if(lockedRef.current||screen!=='playing'||isPaused||countdown)return;
                const row=board[index];
                const item=side==='left'?row.left:row.right;
                if(['matched','wrong','entering','empty'].includes(item.status))return;

                if(!selectedSide){
                    setSelectedSide({side,index});
                    setBoard(prev=>{const n=[...prev];
                        if(side==='left')n[index]={...n[index],left:{...n[index].left,status:'selected'}};
                        else n[index]={...n[index],right:{...n[index].right,status:'selected'}};
                        return n;
                    });
                    return;
                }

                /* misma celda → deselecciona */
                if(selectedSide.side===side&&selectedSide.index===index){
                    setSelectedSide(null);
                    setBoard(prev=>{const n=[...prev];
                        if(side==='left')n[index]={...n[index],left:{...n[index].left,status:'idle'}};
                        else n[index]={...n[index],right:{...n[index].right,status:'idle'}};
                        return n;
                    });
                    return;
                }

                /* intentar match */
                const selRow=board[selectedSide.index];
                const selItem=selectedSide.side==='left'?selRow.left:selRow.right;
                const isMatch=selItem.rowIndex===item.rowIndex;

                if(isMatch){
                    lockedRef.current=true;
                    setBoard(prev=>{const n=[...prev];
                        const si=selectedSide.index;const ss=selectedSide.side;
                        if(ss==='left')n[si]={...n[si],left:{...n[si].left,status:'matched'}};
                        else n[si]={...n[si],right:{...n[si].right,status:'matched'}};
                        if(side==='left')n[index]={...n[index],left:{...n[index].left,status:'matched'}};
                        else n[index]={...n[index],right:{...n[index].right,status:'matched'}};
                        return n;
                    });
                    setSelectedSide(null);
                    const ns=score+1;
                    setScore(ns);
                    const ncm=cpMatchedRef.current+1;
                    cpMatchedRef.current=ncm;
                    setCpMatched(ncm);

                    const c=CROWNS[crownIdx];
                    /* fading after FADE_MS */
                    const fadeKey=`${selectedSide?.index}-${index}`;
                    fadingRef.current[fadeKey]=setTimeout(()=>{
                        setBoard(prev=>{
                            const n=[...prev];
                            /* mark empty slots */
                            [selectedSide?.index,index].forEach(idx=>{
                                if(idx==null)return;
                                const r={...n[idx]};
                                if(r.left.status==='matched')r.left={...r.left,status:'empty'};
                                if(r.right.status==='matched')r.right={...r.right,status:'empty'};
                                n[idx]=r;
                            });
                            return n;
                        });
                        delete fadingRef.current[fadeKey];
                        lockedRef.current=false;
                    },FADE_MS);

                    /* checkpoint completo */
                    if(ncm>=c.perCP){
                        const nextCpI=cpIdxRef.current+1;
                        if(nextCpI>=c.checkpoints){
                            /* corona completa */
                            resolveAllFading();
                            const finalScore=ns+Math.ceil(timeLeft);
                            const perf=isPerfect;
                            if(perf)confetti({particleCount:200,spread:90,origin:{y:0.5}});
                            if(playerName){
                                addDoc(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),{
                                    playerName,score:finalScore+(perf?20:0),
                                    crown:crownIdx+1,perfect:perf,date:serverTimestamp()
                                }).catch(()=>{});
                            }
                            setMilestone({emoji:'🏆',text:`¡${c.name}!`,count:ns});
                            setTimeout(()=>{setMilestone(null);setScreen('crownComplete');},2200);
                        }else{
                            setMilestone({emoji:nextCpI===1?'🔥':'⚡',text:`Checkpoint ${nextCpI+1}!`,count:ns});
                            setScreen('checkpoint');
                            setTimeout(()=>{
                                setMilestone(null);fadingRef.current={};
                                cpIdxRef.current=nextCpI;setCpIdx(nextCpI);
                                cpMatchedRef.current=0;setCpMatched(0);
                                buildCP(allPairsRef.current.slice(nextCpI*c.perCP,(nextCpI+1)*c.perCP));
                                setScreen('playing');
                            },2000);
                        }
                    }else{
                        setTimeout(()=>lockedRef.current=false,50);
                    }
                }else{
                    setIsPerfect(false);
                    lockedRef.current=true;
                    setBoard(prev=>{const n=[...prev];
                        const si=selectedSide.index;const ss=selectedSide.side;
                        if(ss==='left')n[si]={...n[si],left:{...n[si].left,status:'wrong'}};
                        else n[si]={...n[si],right:{...n[si].right,status:'wrong'}};
                        if(side==='left')n[index]={...n[index],left:{...n[index].left,status:'wrong'}};
                        else n[index]={...n[index],right:{...n[index].right,status:'wrong'}};
                        return n;
                    });
                    setSelectedSide(null);
                    setTimeout(()=>{
                        setBoard(prev=>prev.map(r=>({...r,
                            left:r.left.status==='wrong'?{...r.left,status:'idle'}:r.left,
                            right:r.right.status==='wrong'?{...r.right,status:'idle'}:r.right,
                        })));
                        lockedRef.current=false;
                    },400);
                }
            },[board,selectedSide,screen,crownIdx,resolveAllFading,buildCP,timeLeft,playerName,quizId,score,isPaused,countdown,isPerfect]);

            /* ─── loadLB ─── */
            const loadLB=useCallback(async()=>{
                if(!quizId)return;
                const q=query(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),orderBy('score','desc'),limit(10));
                const snap=await getDocs(q);
                setLeaderboard(snap.docs.map(d=>d.data()));
            },[quizId]);

            /* ════════════════════════════════════════════
               COMPONENTE WordBtn
               FIX iOS: Solo onClick, sin onTouchEnd.
               touch-action:manipulation en CSS elimina el delay.
               El e.preventDefault() evita el click sintético post-touch.
            ════════════════════════════════════════════ */
            const WordBtn=({item,onClick})=>{
                if(item.status==='empty')return<div className="h-14 sm:h-[4.2rem]"/>;
                let bg='bg-zinc-800 border-zinc-700 text-zinc-200 hover-effect',anim='';
                if(item.status==='selected')bg='bg-emerald-600 border-emerald-500 text-white shadow-lg shadow-emerald-500/30';
                else if(item.status==='matched'){bg='bg-emerald-500/30 border-emerald-700/40 text-emerald-300';anim='animate-slow-fade';}
                else if(item.status==='wrong'){bg='bg-rose-500/70 border-rose-700 text-white';anim='animate-shake';}
                else if(item.status==='entering')anim='animate-pop-in';
                const dis=['matched','wrong','entering','empty'].includes(item.status);
                return(
                    <div className="h-14 sm:h-[4.2rem]">
                        <button
                            className={`btn-juicy w-full h-full rounded-2xl border-2 border-b-4 font-bold text-sm sm:text-base flex items-center justify-center px-3 leading-tight ${bg} ${anim} disabled:opacity-40`}
                            disabled={dis}
                            onClick={(e)=>{e.preventDefault();onClick();}}
                        >
                            <span className="safari-text-fix">{item.text}</span>
                        </button>
                    </div>
                );
            };

            /* ─── Modales ─── */
            const VocabModal=()=>showVocab?(
                <div className="fixed inset-0 z-[60] bg-black/70 backdrop-blur-sm flex items-end sm:items-center justify-center p-4" onClick={()=>setShowVocab(false)}>
                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-sm max-h-[70vh] flex flex-col" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 border-b border-zinc-800 flex items-center justify-between">
                            <h3 className="font-black text-white">Vocabulario del juego</h3>
                            <button onClick={()=>setShowVocab(false)} className="p-2 text-zinc-500"><X size={18}/></button>
                        </div>
                        <div className="overflow-y-auto p-4 space-y-2">
                            {wordPool.map((p,i)=>(
                                <div key={i} className="flex justify-between items-center bg-zinc-800 rounded-xl px-3 py-2.5">
                                    <span className="text-zinc-200 font-bold text-sm">{p.left}</span>
                                    <span className="text-zinc-400 font-bold text-sm">{p.right}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            ):null;

            const LBModal=()=>showLB?(
                <div className="fixed inset-0 z-[60] bg-black/70 backdrop-blur-sm flex items-end sm:items-center justify-center p-4" onClick={()=>setShowLB(false)}>
                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-sm max-h-[70vh] flex flex-col" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 border-b border-zinc-800 flex items-center justify-between">
                            <h3 className="font-black text-white flex items-center gap-2"><Trophy size={18} className="text-amber-400"/>Top Jugadores</h3>
                            <button onClick={()=>setShowLB(false)} className="p-2 text-zinc-500"><X size={18}/></button>
                        </div>
                        <div className="overflow-y-auto p-4 space-y-2">
                            {leaderboard.length===0&&<p className="text-zinc-500 text-center py-4 font-bold">Sin registros aún</p>}
                            {leaderboard.map((l,i)=>(
                                <div key={i} className="flex items-center justify-between bg-zinc-800 rounded-xl px-3 py-2.5">
                                    <div className="flex items-center gap-2">
                                        <span className={`font-black text-sm ${i===0?'text-amber-400':i===1?'text-zinc-300':i===2?'text-amber-700':'text-zinc-600'}`}>#{i+1}</span>
                                        <span className="font-bold text-white text-sm uppercase">{l.playerName}</span>
                                        {l.crown&&<span className="text-xs">{l.crown===3?'🏆':l.crown===2?'🥈':'🥉'}</span>}
                                        {l.perfect&&<span className="text-[10px] text-emerald-400 font-bold">✓</span>}
                                    </div>
                                    <span className="font-black text-amber-400 text-sm">{l.score}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            ):null;

            /* ════════════════════════════════════════════
               BANNER SUPERIOR (igual que flashcards/connect4)
               Aparece en TODAS las pantallas excepto loading
            ════════════════════════════════════════════ */
            const TopBanner=({showPause=false})=>(
                <header className="w-full bg-zinc-900 border-b border-zinc-800 px-4 py-3 flex items-center justify-between shrink-0 z-30">
                    {/* Izquierda: Logo P + título */}
                    <div className="flex items-center gap-3 min-w-0">
                        <a href={hubUrl} className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-md shadow-indigo-600/30 flex-shrink-0" title="Salir al hub">
                            P
                        </a>
                        <div className="min-w-0">
                            <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest leading-none">Match Madness ⚡</p>
                            <h1 className="font-black text-white text-sm leading-tight truncate max-w-[180px] sm:max-w-xs">
                                {gameData?.title||'Cargando...'}
                            </h1>
                        </div>
                    </div>
                    {/* Derecha: botones */}
                    <div className="flex items-center gap-2 flex-shrink-0">
                        {showPause&&(
                            <button
                                onClick={handlePause}
                                className="btn-juicy p-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white rounded-xl border border-zinc-700 transition-colors"
                                title="Pausar"
                            >
                                <Pause size={18}/>
                            </button>
                        )}
                        <a href={hubUrl} className="btn-juicy p-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white rounded-xl border border-zinc-700 transition-colors" title="Salir">
                            <LogOut size={18}/>
                        </a>
                    </div>
                </header>
            );

            /* ════════════════════════════════════════════
               OVERLAY DE PAUSA (con countdown al reanudar)
            ════════════════════════════════════════════ */
            const PauseOverlay=()=>{
                if(!isPaused&&!countdown)return null;
                return(
                    <div className="fixed inset-0 bg-zinc-950/85 backdrop-blur-md z-50 flex items-center justify-center p-4">
                        {countdown?(
                            /* Número animado del conteo */
                            <div
                                key={countdown}
                                className="text-[20vw] sm:text-[15vw] font-black italic text-white animate-countdown drop-shadow-[0_0_40px_rgba(99,102,241,0.9)] text-center select-none"
                            >
                                {countdown}
                            </div>
                        ):(
                            /* Menú de pausa */
                            <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center max-w-sm w-full shadow-2xl">
                                <Pause size={48} className="text-zinc-500 mx-auto mb-4"/>
                                <h2 className="text-2xl font-black text-white mb-2 uppercase tracking-widest">Pausa</h2>
                                <p className="text-zinc-500 text-sm font-bold mb-6">El tiempo está detenido</p>
                                <button
                                    onClick={handleResume}
                                    className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2 mb-3"
                                >
                                    <Play size={18}/> Reanudar
                                </button>
                                <a href={hubUrl} className="block w-full text-center text-zinc-500 font-bold text-sm py-3 hover:text-white transition-colors">
                                    Salir al Hub
                                </a>
                            </div>
                        )}
                    </div>
                );
            };

            /* ════════════════════════════════════════════
               RENDER
            ════════════════════════════════════════════ */
            if(loading)return(
                <div className="h-[100dvh] flex items-center justify-center bg-zinc-950">
                    <Loader2 className="animate-spin text-zinc-500" size={32}/>
                </div>
            );

            if(!gameData||wordPool.length<5)return(
                <div className="h-[100dvh] flex flex-col bg-zinc-950">
                    <TopBanner/>
                    <div className="flex-1 flex items-center justify-center p-6">
                        <div className="bg-rose-900/20 border border-rose-500/50 p-6 rounded-2xl text-rose-400 font-bold text-center max-w-sm">
                            Necesitas al menos 5 pares para jugar.
                        </div>
                    </div>
                </div>
            );

            /* ─── MENÚ ─── */
            if(screen==='menu')return(
                <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden">
                    <VocabModal/><LBModal/>
                    <TopBanner/>
                    <div className="flex-1 overflow-y-auto">
                        <div className="max-w-sm mx-auto px-4 py-6">
                            <div className="text-center mb-6">
                                <div className="text-6xl mb-3">⚡</div>
                                <h2 className="text-2xl font-black text-white mb-1">Match Madness</h2>
                                <p className="text-zinc-400 font-medium text-sm">{gameData.title}</p>
                            </div>

                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-5 space-y-3">
                                <h3 className="font-black text-white text-sm uppercase tracking-widest mb-2">¿Cómo funciona?</h3>
                                <p className="text-zinc-400 text-sm leading-relaxed">Empareja palabras en español con su traducción en inglés contra reloj. Completa los 3 checkpoints para ganar la corona.</p>
                                <div className="space-y-2 pt-2">
                                    {CROWNS.map((c,i)=>(
                                        <div key={i} className={`flex items-center justify-between rounded-xl px-3 py-2.5 border ${i===0?'border-amber-600/30 bg-amber-600/10':i===1?'border-zinc-500/30 bg-zinc-700/20':'border-amber-400/30 bg-amber-400/10'}`}>
                                            <span className={`font-black text-sm ${c.color}`}>{c.emoji} {c.name}</span>
                                            <span className="text-zinc-500 text-xs font-bold">{c.perCP*c.checkpoints} pares · {c.time}s</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-5">
                                <input
                                    value={playerName}
                                    onChange={e=>setPlayerName(e.target.value)}
                                    placeholder="Tu nombre para el ranking..."
                                    className="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white font-bold placeholder-zinc-600 focus:outline-none focus:border-indigo-500 text-sm"
                                />
                            </div>

                            <div className="space-y-3">
                                {CROWNS.map((c,i)=>(
                                    <button
                                        key={i}
                                        onClick={()=>startCrown(i)}
                                        disabled={!playerName.trim()}
                                        className={`btn-juicy w-full py-4 rounded-2xl border-2 border-b-4 font-black text-sm uppercase tracking-widest disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2 ${i===0?'bg-amber-600/20 text-amber-500 border-amber-600/40':i===1?'bg-zinc-700/30 text-zinc-300 border-zinc-600/40':'bg-amber-400/20 text-amber-400 border-amber-400/40'}`}
                                    >
                                        <Crown size={16}/> {c.name}
                                    </button>
                                ))}
                                <div className="flex gap-2">
                                    <button onClick={()=>{loadLB();setShowLB(true)}} className="btn-juicy flex-1 bg-zinc-900 text-zinc-400 font-black py-3 rounded-2xl border border-zinc-800 text-xs uppercase tracking-widest flex items-center justify-center gap-1">
                                        <Trophy size={14}/> Ranking
                                    </button>
                                    <button onClick={()=>setShowVocab(true)} className="btn-juicy flex-1 bg-zinc-900 text-zinc-400 font-black py-3 rounded-2xl border border-zinc-800 text-xs uppercase tracking-widest flex items-center justify-center gap-1">
                                        <BookOpen size={14}/> Vocab
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            /* ─── PLAYING / CHECKPOINT ─── */
            if(screen==='playing'||screen==='checkpoint'){
                const crown=CROWNS[crownIdx];
                const pct=(score/totalPairs)*100;
                const isLow=timeLeft<20;
                const m=Math.floor(Math.ceil(timeLeft)/60);
                const s=Math.ceil(timeLeft)%60;
                return(
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden relative">
                        <PauseOverlay/>
                        {milestone&&(
                            <div className="fixed top-28 left-1/2 -translate-x-1/2 z-50 animate-milestone pointer-events-none">
                                <div className="bg-zinc-800 border-2 border-amber-500/50 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
                                    <span className="text-3xl">{milestone.emoji}</span>
                                    <div>
                                        <p className="font-black text-white text-lg">{milestone.count} pares</p>
                                        <p className="text-amber-400 font-bold text-sm">{milestone.text}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* BANNER SUPERIOR CON PAUSA */}
                        <TopBanner showPause={true}/>

                        {/* BARRA DE PROGRESO + TIEMPO */}
                        <div className="px-4 py-2 bg-zinc-900/80 border-b border-zinc-800/50 flex items-center gap-3 shrink-0">
                            <div className="flex-1">
                                <div className="h-2.5 w-full bg-zinc-800 rounded-full overflow-hidden relative">
                                    <div
                                        className={`h-full rounded-full transition-all duration-300 ${isLow?'bg-rose-500':'bg-amber-500'}`}
                                        style={{width:`${pct}%`}}
                                    />
                                    {[1,2].map(cp=>(
                                        <div key={cp} className="absolute top-1/2 -translate-y-1/2" style={{left:`${(cp*crown.perCP/totalPairs)*100}%`}}>
                                            <div className={`w-1.5 h-4 rounded-full ${score>=cp*crown.perCP?'bg-amber-400':'bg-zinc-600'}`}/>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between mt-0.5">
                                    <span className="text-[9px] text-zinc-500 font-bold">{score}/{totalPairs} pares</span>
                                    <span className={`text-[9px] font-bold ${crown.color}`}>{crown.emoji} Crown {crownIdx+1} · CP {cpIdx+1}/{crown.checkpoints}</span>
                                </div>
                            </div>
                            <div className={`font-black text-lg tabular-nums min-w-[48px] text-right ${isLow?'text-rose-500 pulse-low':'text-amber-500'}`}>
                                {m}:{s.toString().padStart(2,'0')}
                            </div>
                        </div>

                        {/* ETIQUETAS DE COLUMNAS */}
                        <div className="flex px-4 sm:px-8 max-w-2xl mx-auto w-full pt-2 pb-0.5">
                            <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Español</p>
                            <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">English</p>
                        </div>

                        {/* TABLERO */}
                        <main className="flex-1 flex gap-3 sm:gap-4 px-4 sm:px-8 pb-4 max-w-2xl mx-auto w-full items-center overflow-hidden">
                            <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">
                                {board.map((r,i)=><WordBtn key={`l-${r.key}`} item={r.left} onClick={()=>handleClick('left',i)}/>)}
                            </div>
                            <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">
                                {board.map((r,i)=><WordBtn key={`r-${r.key}`} item={r.right} onClick={()=>handleClick('right',i)}/>)}
                            </div>
                        </main>
                    </div>
                );
            }

            /* ─── CHECKPOINT FAIL ─── */
            if(screen==='checkpointFail')return(
                <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden">
                    <TopBanner/>
                    <VocabModal/>
                    <div className="flex-1 overflow-y-auto flex items-center justify-center p-6">
                        <div className="max-w-sm w-full text-center">
                            <div className="text-6xl mb-4">⏱️</div>
                            <h2 className="text-2xl font-black text-rose-400 mb-2">Se acabó el tiempo</h2>
                            <p className="text-zinc-400 font-bold mb-1">{score} pares completados</p>
                            <p className="text-zinc-500 text-sm mb-8">
                                Checkpoint {cpIdx+1} de {CROWNS[crownIdx].checkpoints} — {cpMatched}/{CROWNS[crownIdx].perCP} pares de este checkpoint.
                            </p>
                            <div className="space-y-3">
                                {cpIdx>0&&(
                                    <button onClick={()=>startCrown(crownIdx)} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-sm uppercase tracking-widest">
                                        <RotateCcw size={16} className="inline mr-2"/>Reintentar corona
                                    </button>
                                )}
                                <button onClick={()=>startCrown(crownIdx)} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border border-zinc-700 text-sm uppercase tracking-widest">
                                    <RotateCcw size={16} className="inline mr-2"/>Reintentar
                                </button>
                                <button onClick={()=>setShowVocab(true)} className="btn-juicy w-full bg-zinc-900 text-zinc-500 font-black py-3 rounded-2xl border border-zinc-800 text-xs uppercase tracking-widest">
                                    <BookOpen size={14} className="inline mr-2"/>Ver vocabulario
                                </button>
                                <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-950 text-zinc-600 font-black py-3 rounded-2xl border border-zinc-900 text-xs uppercase tracking-widest">
                                    Volver al menú
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            /* ─── CROWN COMPLETE ─── */
            if(screen==='crownComplete'){
                const crown=CROWNS[crownIdx];
                const hasNextCrown=crownIdx<CROWNS.length-1;
                const finalScore=score+Math.ceil(timeLeft)+(isPerfect?20:0);
                const tm=Math.floor(Math.ceil(timeLeft)/60);
                const ts=Math.ceil(timeLeft)%60;
                return(
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden">
                        <TopBanner/>
                        <VocabModal/><LBModal/>
                        <div className="flex-1 overflow-y-auto flex items-center justify-center p-6">
                            <div className="max-w-sm w-full text-center">
                                <div className="text-6xl mb-3 animate-bounce">{crown.emoji}</div>
                                <h2 className="text-3xl font-black text-white mb-1">{crown.name}</h2>
                                <p className="text-zinc-400 text-sm font-bold mb-2">¡Completada!</p>
                                {isPerfect&&<p className="text-emerald-400 font-bold text-sm mb-2">✓ Perfecto — sin errores (+20 bonus)</p>}
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-6">
                                    <div className="flex justify-around mb-3">
                                        <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Pares</p><p className="text-xl font-black text-white">{totalPairs}</p></div>
                                        <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Tiempo</p><p className="text-xl font-black text-white">{tm}:{ts.toString().padStart(2,'0')}</p></div>
                                        <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Score</p><p className="text-xl font-black text-amber-400">{finalScore}</p></div>
                                    </div>
                                    <p className="text-[10px] text-zinc-500 font-bold">
                                        {totalPairs} pts + tiempo: {Math.ceil(timeLeft)} pts {isPerfect?'+ perfecto: 20 pts':''}
                                    </p>
                                </div>
                                <div className="space-y-3">
                                    {hasNextCrown&&(
                                        <button onClick={()=>startCrown(crownIdx+1)} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                            <Crown size={18}/> Siguiente Corona ({CROWNS[crownIdx+1].name})
                                        </button>
                                    )}
                                    <button onClick={()=>{loadLB();setShowLB(true)}} className="btn-juicy w-full bg-amber-500/10 text-amber-400 font-black py-3 rounded-2xl border-2 border-b-4 border-amber-500/20 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                        <Trophy size={16}/> Ver Ranking
                                    </button>
                                    <button onClick={()=>setShowVocab(true)} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                        <BookOpen size={16}/> Vocabulario del juego
                                    </button>
                                    <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-900 text-zinc-500 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-950 text-sm uppercase tracking-widest">
                                        Volver al inicio
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        createRoot(document.getElementById('root')).render(<MatchGame/>);
    </script>
</body>
</html>

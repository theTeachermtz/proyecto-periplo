<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Madness | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; height: 100dvh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes popOut { 0%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.8} 100%{transform:scale(0.5);opacity:0} }
        .animate-pop-out { animation: popOut 0.25s forwards ease-in; }

        @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.05);opacity:1} 100%{transform:scale(1);opacity:1} }
        .animate-pop-in { animation: popIn 0.25s forwards ease-out; }

        @keyframes emojiPop { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:1} }
        .animate-emoji-pop { animation: emojiPop 0.35s ease-out forwards; }

        @keyframes emojiFade { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-30px) scale(1.2)} }
        .animate-emoji-fade { animation: emojiFade 0.6s ease-out forwards; }

        .btn-juicy { transition: transform 0.1s, background-color 0.2s, border-color 0.2s; }
        .btn-juicy:active:not(:disabled) { transform: translateY(3px); border-bottom-width: 1px !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { ArrowLeft, Loader2, Play, RotateCcw, ArrowRight, Trophy, Zap } from 'lucide-react';
        import confetti from 'canvas-confetti';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ROUNDS = [
            { round: 1, pairsToWin: 15, timeSeconds: 60, title: "Calentamiento", emoji: "🔥" },
            { round: 2, pairsToWin: 20, timeSeconds: 55, title: "Acelerando", emoji: "⚡" },
            { round: 3, pairsToWin: 25, timeSeconds: 50, title: "Avanzado", emoji: "🚀" },
            { round: 4, pairsToWin: 30, timeSeconds: 45, title: "Experto", emoji: "🧠" },
            { round: 5, pairsToWin: 35, timeSeconds: 40, title: "Jefe Final", emoji: "👑" },
        ];

        const shuffle = (arr) => {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
            return a;
        };

        /*
         * ANTI-CHEAT BOARD LOGIC
         *
         * The board always shows 5 words on each side.
         * When a pair is matched, BOTH slots are emptied and TWO NEW DIFFERENT
         * words fill those slots. The two new words are NOT a pair with each other.
         *
         * This means after a match:
         * - Left slot gets word A (español)
         * - Right slot gets word B (español's pair is somewhere else, NOT in that right slot)
         *
         * So you can never cheat by just clicking the two new ones.
         *
         * Implementation:
         * We maintain a "pool queue" of words not yet on the board.
         * When we need 2 replacements, we pick 2 different words from the queue.
         * Word A goes to the left slot, Word B goes to the right slot.
         * Their PAIRS (A's english, B's english) must already be findable —
         * but since the board reshuffles right-side positions, the student
         * has to actually READ to find the match.
         */

        const MatchGame = () => {
            const [loading, setLoading] = useState(true);
            const [gameData, setGameData] = useState(null);
            const [wordPool, setWordPool] = useState([]);
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');

            const [gameState, setGameState] = useState('menu');
            const [currentRoundIdx, setCurrentRoundIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [score, setScore] = useState(0);

            // Board: arrays of { id, textLeft, textRight, status, animKey }
            // Each "row" has a left word and right word that are NOT necessarily pairs
            const [board, setBoard] = useState([]); // 5 items
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [selectedRight, setSelectedRight] = useState(null);

            // Emoji feedback
            const [feedbackEmoji, setFeedbackEmoji] = useState(null); // { emoji, type }
            const [feedbackFlies, setFeedbackFlies] = useState([]);

            const poolQueueRef = useRef([]); // Words waiting to enter the board
            const scoreRef = useRef(0);
            const lockedRef = useRef(false);

            const currentRoundData = ROUNDS[currentRoundIdx];

            // ====== LOAD ======
            useEffect(() => {
                const init = async () => {
                    const id = new URLSearchParams(window.location.search).get('id');
                    if (!id) return;
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameData(data);
                        setWordPool(data.content.wordPool || []);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            // ====== BUILD INITIAL BOARD ======
            // Board is 5 rows. Left col = español, Right col = english.
            // Right col is shuffled so no row is a pair.
            const buildBoard = useCallback((pool) => {
                // Pick first 5 for left, shuffle their english for right
                const first5 = pool.slice(0, 5);
                const restQueue = pool.slice(5);
                poolQueueRef.current = restQueue;

                // Left side: first5 in order
                // Right side: shuffled so no position matches
                let rightOrder = shuffle(first5);
                // Ensure NO row has matching pair (derangement)
                let attempts = 0;
                while (rightOrder.some((w, i) => w.id === first5[i].id) && attempts < 50) {
                    rightOrder = shuffle(first5);
                    attempts++;
                }

                const newBoard = first5.map((w, i) => ({
                    leftId: w.id,
                    leftText: w.es,
                    rightId: rightOrder[i].id,
                    rightText: rightOrder[i].en,
                    leftStatus: 'idle',
                    rightStatus: 'idle',
                    animKey: Date.now() + i,
                }));

                return newBoard;
            }, []);

            // ====== START ROUND ======
            const startRound = useCallback((roundIdx = 0) => {
                const roundData = ROUNDS[roundIdx];
                const shuffledPool = shuffle(wordPool);
                // Extend pool if needed (cycle)
                let extPool = [...shuffledPool];
                while (extPool.length < roundData.pairsToWin + 10) {
                    extPool = [...extPool, ...shuffle(wordPool)];
                }

                const newBoard = buildBoard(extPool);
                setBoard(newBoard);
                setScore(0);
                scoreRef.current = 0;
                setTimeLeft(roundData.timeSeconds);
                setSelectedLeft(null);
                setSelectedRight(null);
                setCurrentRoundIdx(roundIdx);
                setFeedbackEmoji(null);
                lockedRef.current = false;
                setGameState('playing');
            }, [wordPool, buildBoard]);

            const resetGame = () => { setCurrentRoundIdx(0); setGameState('menu'); };

            // ====== TIMER ======
            useEffect(() => {
                let timer;
                if (gameState === 'playing' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 0.1) {
                                clearInterval(timer);
                                if (scoreRef.current < ROUNDS[currentRoundIdx].pairsToWin) setGameState('game_over');
                                return 0;
                            }
                            return +(prev - 0.1).toFixed(1);
                        });
                    }, 100);
                }
                return () => clearInterval(timer);
            }, [gameState, currentRoundIdx]);

            // ====== WIN CHECK ======
            useEffect(() => {
                if (gameState === 'playing' && score >= currentRoundData.pairsToWin) {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                    if (currentRoundIdx === ROUNDS.length - 1) setGameState('game_won');
                    else setGameState('round_won');
                }
            }, [score, gameState, currentRoundIdx, currentRoundData]);

            // ====== GET NEXT WORD FROM QUEUE ======
            const getNextWord = useCallback(() => {
                const q = poolQueueRef.current;
                if (q.length === 0) {
                    // Refill from wordPool
                    poolQueueRef.current = shuffle(wordPool);
                    return poolQueueRef.current.shift();
                }
                return q.shift();
            }, [wordPool]);

            // ====== REPLACE TWO SLOTS ======
            // After a correct match, we replace the left slot and right slot
            // with TWO DIFFERENT new words. Word A → left, Word B → right.
            // This means the new left and new right are NOT pairs.
            const replaceTwoSlots = useCallback((leftIdx, rightIdx, currentBoard) => {
                const wordA = getNextWord();
                let wordB = getNextWord();
                // Make sure A and B are different words
                let safety = 0;
                while (wordB.id === wordA.id && safety < 20) {
                    poolQueueRef.current.push(wordB);
                    wordB = getNextWord();
                    safety++;
                }

                const newBoard = [...currentBoard];
                const ak = Date.now() + Math.random();

                // Word A's español goes to left slot at leftIdx
                // Word B's english goes to right slot at rightIdx
                // This guarantees the new pair visible is NOT a match
                newBoard[leftIdx] = {
                    ...newBoard[leftIdx],
                    leftId: wordA.id,
                    leftText: wordA.es,
                    leftStatus: 'entering',
                    animKey: ak,
                };
                newBoard[rightIdx] = {
                    ...newBoard[rightIdx],
                    rightId: wordB.id,
                    rightText: wordB.en,
                    rightStatus: 'entering',
                    animKey: ak + 1,
                };

                return newBoard;
            }, [getNextWord]);

            // ====== PROCESS MATCH ======
            const processMatch = useCallback((lIdx, rIdx) => {
                const row = board;
                const leftItem = row[lIdx];
                const rightItem = row[rIdx];
                const isMatch = leftItem.leftId === rightItem.rightId;

                if (isMatch) {
                    // Mark correct
                    lockedRef.current = true;
                    setBoard(prev => {
                        const n = [...prev];
                        n[lIdx] = { ...n[lIdx], leftStatus: 'correct' };
                        n[rIdx] = { ...n[rIdx], rightStatus: 'correct' };
                        return n;
                    });

                    const ns = scoreRef.current + 1;
                    scoreRef.current = ns;
                    setScore(ns);

                    // Mini confetti
                    confetti({ particleCount: 15, spread: 40, origin: { y: 0.5 }, gravity: 1.5, scalar: 0.7 });

                    // Show emoji
                    const id = Date.now();
                    setFeedbackFlies(prev => [...prev, { id, emoji: '✅', type: 'correct' }]);
                    setTimeout(() => setFeedbackFlies(prev => prev.filter(f => f.id !== id)), 700);

                    // After pop-out animation, replace
                    setTimeout(() => {
                        setBoard(prev => {
                            const replaced = replaceTwoSlots(lIdx, rIdx, prev);
                            return replaced;
                        });
                        // After pop-in, set to idle
                        setTimeout(() => {
                            setBoard(prev => prev.map((item, i) => {
                                if (i === lIdx) return { ...item, leftStatus: 'idle' };
                                if (i === rIdx) return { ...item, rightStatus: 'idle' };
                                return item;
                            }));
                            lockedRef.current = false;
                        }, 280);
                    }, 280);
                } else {
                    // Wrong
                    lockedRef.current = true;
                    setBoard(prev => {
                        const n = [...prev];
                        n[lIdx] = { ...n[lIdx], leftStatus: 'wrong' };
                        n[rIdx] = { ...n[rIdx], rightStatus: 'wrong' };
                        return n;
                    });

                    const id = Date.now();
                    setFeedbackFlies(prev => [...prev, { id, emoji: '😬', type: 'wrong' }]);
                    setTimeout(() => setFeedbackFlies(prev => prev.filter(f => f.id !== id)), 700);

                    setTimeout(() => {
                        setBoard(prev => prev.map((item, i) => {
                            if (i === lIdx) return { ...item, leftStatus: 'idle' };
                            if (i === rIdx) return { ...item, rightStatus: 'idle' };
                            return item;
                        }));
                        lockedRef.current = false;
                    }, 450);
                }
            }, [board, replaceTwoSlots]);

            // ====== CLICK HANDLER ======
            const handleClick = useCallback((side, index) => {
                if (lockedRef.current) return;
                if (side === 'left') {
                    if (board[index].leftStatus !== 'idle' && board[index].leftStatus !== 'entering') return;
                    if (selectedLeft === index) {
                        // Deselect
                        setSelectedLeft(null);
                        setBoard(prev => prev.map((r, i) => i === index ? { ...r, leftStatus: 'idle' } : r));
                        return;
                    }
                    // Select
                    setBoard(prev => prev.map((r, i) => {
                        if (i === index) return { ...r, leftStatus: 'selected' };
                        if (i === selectedLeft) return { ...r, leftStatus: 'idle' };
                        return r;
                    }));
                    setSelectedLeft(index);
                    if (selectedRight !== null) {
                        processMatch(index, selectedRight);
                        setSelectedLeft(null); setSelectedRight(null);
                    }
                } else {
                    if (board[index].rightStatus !== 'idle' && board[index].rightStatus !== 'entering') return;
                    if (selectedRight === index) {
                        setSelectedRight(null);
                        setBoard(prev => prev.map((r, i) => i === index ? { ...r, rightStatus: 'idle' } : r));
                        return;
                    }
                    setBoard(prev => prev.map((r, i) => {
                        if (i === index) return { ...r, rightStatus: 'selected' };
                        if (i === selectedRight) return { ...r, rightStatus: 'idle' };
                        return r;
                    }));
                    setSelectedRight(index);
                    if (selectedLeft !== null) {
                        processMatch(selectedLeft, index);
                        setSelectedLeft(null); setSelectedRight(null);
                    }
                }
            }, [board, selectedLeft, selectedRight, processMatch]);

            // ====== WORD BUTTON ======
            const WordBtn = ({ text, status, onClick }) => {
                let bg = 'bg-zinc-800 border-zinc-700 text-zinc-200';
                let anim = '';
                let borderB = 'border-b-4';

                if (status === 'entering') { bg = 'bg-zinc-800 border-zinc-700 text-zinc-200'; anim = 'animate-pop-in'; }
                else if (status === 'selected') { bg = 'bg-indigo-600 border-indigo-800 text-white'; }
                else if (status === 'correct') { bg = 'bg-emerald-500 border-emerald-700 text-white'; anim = 'animate-pop-out'; }
                else if (status === 'wrong') { bg = 'bg-rose-500 border-rose-700 text-white'; anim = 'animate-shake'; }

                return (
                    <div className="h-14 sm:h-16">
                        <button
                            className={`btn-juicy w-full h-full rounded-2xl border-2 ${borderB} font-bold text-sm sm:text-base flex items-center justify-center px-2 leading-tight ${bg} ${anim}`}
                            onClick={onClick}
                            disabled={status === 'correct' || status === 'wrong'}>
                            {text}
                        </button>
                    </div>
                );
            };

            // ====== RENDER ======
            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-zinc-500" size={32}/></div>;
            if (!gameData || wordPool.length < 5) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">Error: No hay suficientes palabras.</div>;

            // ====== MENU ======
            if (gameState === 'menu') return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="max-w-sm w-full text-center">
                        <div className="text-7xl mb-6">⚡</div>
                        <h1 className="text-4xl font-black text-white mb-2">Match<br/>Madness</h1>
                        <p className="text-zinc-400 font-medium mb-2">{gameData.title}</p>
                        <p className="text-zinc-500 text-sm mb-8">Empareja palabras a la velocidad de la luz.</p>

                        <div className="space-y-3 mb-8">
                            {ROUNDS.map((r, i) => (
                                <div key={i} className="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm">
                                    <span className="font-bold text-zinc-300">{r.emoji} R{r.round}: {r.title}</span>
                                    <span className="text-zinc-500 font-bold">{r.pairsToWin} pares · {r.timeSeconds}s</span>
                                </div>
                            ))}
                        </div>

                        <button onClick={() => startRound(0)} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-xl uppercase tracking-widest flex items-center justify-center gap-2">
                            <Play fill="currentColor" size={24}/> JUGAR
                        </button>
                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Volver al Hub</button>}
                    </div>
                </div>
            );

            // ====== PLAYING ======
            if (gameState === 'playing') {
                const pct = (timeLeft / currentRoundData.timeSeconds) * 100;
                const isLow = timeLeft < 10;

                return (
                    <div className="h-[100dvh] flex flex-col bg-zinc-950 relative overflow-hidden">

                        {/* Floating feedback emojis */}
                        <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50">
                            {feedbackFlies.map(f => (
                                <div key={f.id} className="text-5xl animate-emoji-fade">{f.emoji}</div>
                            ))}
                        </div>

                        {/* Header */}
                        <header className="px-4 py-3 flex items-center justify-between shrink-0 bg-zinc-900 border-b border-zinc-800">
                            <div className="flex items-center gap-3">
                                <button onClick={() => { setGameState('menu'); }} className="p-2 text-zinc-400 hover:text-white rounded-xl hover:bg-zinc-800">
                                    <ArrowLeft size={20}/>
                                </button>
                                <div>
                                    <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">{currentRoundData.emoji} Ronda {currentRoundIdx + 1}</p>
                                    <p className="text-lg font-black text-white leading-none">{score} / {currentRoundData.pairsToWin}</p>
                                </div>
                            </div>
                            <div className={`font-black text-2xl tabular-nums ${isLow ? 'text-rose-500 animate-pulse' : 'text-amber-500'}`}>
                                {Math.ceil(timeLeft)}s
                            </div>
                        </header>

                        {/* Timer bar */}
                        <div className="h-2 w-full bg-zinc-800 shrink-0">
                            <div className={`h-full transition-all duration-100 ease-linear rounded-r-full ${isLow ? 'bg-rose-500' : 'bg-amber-500'}`} style={{ width: `${pct}%` }}/>
                        </div>

                        {/* Board */}
                        <main className="flex-1 flex gap-3 sm:gap-5 p-3 sm:p-6 max-w-3xl mx-auto w-full items-center">
                            {/* Left column (español) */}
                            <div className="flex-1 flex flex-col gap-2 sm:gap-3">
                                {board.map((row, i) => (
                                    <WordBtn key={`l-${row.animKey}`} text={row.leftText} status={row.leftStatus} onClick={() => handleClick('left', i)}/>
                                ))}
                            </div>

                            {/* Center divider */}
                            <div className="flex flex-col items-center justify-center gap-4 opacity-20">
                                {[...Array(5)].map((_, i) => <div key={i} className="w-px h-10 bg-zinc-700"/>)}
                            </div>

                            {/* Right column (english) */}
                            <div className="flex-1 flex flex-col gap-2 sm:gap-3">
                                {board.map((row, i) => (
                                    <WordBtn key={`r-${row.animKey}`} text={row.rightText} status={row.rightStatus} onClick={() => handleClick('right', i)}/>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // ====== RESULT SCREENS ======
            const isWin = gameState === 'round_won' || gameState === 'game_won';

            return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950">
                    <div className="max-w-sm w-full text-center">
                        <div className={`text-7xl mb-4 ${isWin ? '' : ''}`}>
                            {gameState === 'game_won' ? '👑' : gameState === 'round_won' ? '🎉' : '⏱️'}
                        </div>

                        {gameState === 'round_won' && (
                            <>
                                <h2 className="text-3xl font-black text-emerald-400 mb-2">¡Ronda {currentRoundIdx + 1} Superada!</h2>
                                <p className="text-zinc-400 font-bold mb-8">Reflejos impresionantes.</p>
                                <button onClick={() => startRound(currentRoundIdx + 1)}
                                    className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-lg uppercase tracking-widest flex items-center justify-center gap-2">
                                    <ArrowRight size={20}/> Siguiente Ronda
                                </button>
                            </>
                        )}

                        {gameState === 'game_won' && (
                            <>
                                <h2 className="text-3xl font-black text-amber-400 mb-2">¡VICTORIA TOTAL!</h2>
                                <p className="text-zinc-400 font-bold mb-8">Has dominado la locura de las palabras.</p>
                                <button onClick={resetGame}
                                    className="btn-juicy w-full bg-amber-500 text-black font-black py-4 rounded-2xl border-2 border-b-4 border-amber-700 text-lg uppercase tracking-widest flex items-center justify-center gap-2">
                                    <RotateCcw size={20}/> Volver al Menú
                                </button>
                            </>
                        )}

                        {gameState === 'game_over' && (
                            <>
                                <h2 className="text-3xl font-black text-rose-400 mb-2">Se acabó el tiempo</h2>
                                <p className="text-zinc-400 font-bold mb-2">Lograste {score} de {currentRoundData.pairsToWin} pares.</p>
                                <p className="text-zinc-500 text-sm mb-8">¡Inténtalo otra vez!</p>
                                <div className="space-y-3">
                                    <button onClick={() => startRound(currentRoundIdx)}
                                        className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-lg uppercase tracking-widest flex items-center justify-center gap-2">
                                        <RotateCcw size={20}/> Reintentar Ronda
                                    </button>
                                    <button onClick={resetGame}
                                        className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-4 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">
                                        Volver al Menú
                                    </button>
                                </div>
                            </>
                        )}

                        {!isStudent && <button onClick={() => window.location.href='index.html'} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Volver al Hub</button>}
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<MatchGame />);
    </script>
</body>
</html>

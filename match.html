<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Madness | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.263.1","firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js","canvas-confetti":"https://esm.sh/canvas-confetti@1.9.3"}}</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body{font-family:'Plus Jakarta Sans',sans-serif;user-select:none;-webkit-user-select:none;overflow:hidden;height:100dvh}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        .custom-scrollbar::-webkit-scrollbar{width:4px}.custom-scrollbar::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}.animate-shake{animation:shake .35s ease-in-out}
        @keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}.animate-pop-in{animation:popIn .2s ease-out forwards}
        @keyframes slowFade{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.9)}}.animate-slow-fade{animation:slowFade 5s ease-in forwards;pointer-events:none}
        @keyframes milestoneIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}.animate-milestone{animation:milestoneIn .5s ease-out forwards}
        .btn-juicy{transition:transform .08s,background-color .15s,border-color .15s}.btn-juicy:active:not(:disabled){transform:translateY(3px);border-bottom-width:1px!important}
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100"><div id="root"></div>
<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef,useCallback,useMemo} from 'react';
import {createRoot} from 'react-dom/client';
import {initializeApp} from 'firebase/app';
import {getFirestore,doc,getDoc,collection,addDoc,query,orderBy,limit,getDocs,serverTimestamp} from 'firebase/firestore';
import {Loader2,Play,RotateCcw,X,Trophy,Star,ChevronDown,ChevronUp,BookOpen,Crown,ArrowRight} from 'lucide-react';
import confetti from 'canvas-confetti';

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};

/*
 * CROWN SYSTEM:
 * Crown 1: 15+15+15=45 pairs in 1:45 (105s)
 * Crown 2: 20+20+20=60 pairs in 1:45 (105s)
 * Crown 3: 20+20+20=60 pairs in 1:30 (90s)
 *
 * CHECKPOINTS: 3 per crown. If you fail (time runs out), you restart
 * from your last checkpoint but lose your "perfect" bonus.
 *
 * SCORING:
 * - Base: 1 point per pair matched
 * - Speed bonus: remaining seconds as points
 * - Perfect bonus: +20 if no checkpoint retries
 *
 * LEADERBOARD: name + crown + score saved to Firebase
 */

const CROWNS=[
    {id:1,emoji:'👑',name:'Bronze Crown',color:'text-amber-600',bg:'bg-amber-600',perCP:15,time:105,checkpoints:3},
    {id:2,emoji:'👑',name:'Silver Crown',color:'text-zinc-300',bg:'bg-zinc-400',perCP:20,time:105,checkpoints:3},
    {id:3,emoji:'👑',name:'Gold Crown',color:'text-amber-400',bg:'bg-amber-400',perCP:20,time:90,checkpoints:3},
];
const FADE_MS=5000;const BOARD_SIZE=5;

const MatchGame=()=>{
    const[loading,setLoading]=useState(true);
    const[gameData,setGameData]=useState(null);
    const[wordPool,setWordPool]=useState([]);
    const[isStudent]=useState(new URLSearchParams(window.location.search).get('student')==='true');
    const[quizId]=useState(new URLSearchParams(window.location.search).get('id'));

    // Screens: menu | playing | checkpointFail | crownWon | lost
    const[screen,setScreen]=useState('menu');
    const[playerName,setPlayerName]=useState('');
    const[leaderboard,setLeaderboard]=useState([]);
    const[showVocab,setShowVocab]=useState(false);
    const[showLB,setShowLB]=useState(false);

    // Crown state
    const[crownIdx,setCrownIdx]=useState(0);
    const crown=CROWNS[crownIdx];
    const totalPairs=crown.perCP*crown.checkpoints;

    // Game state
    const[timeLeft,setTimeLeft]=useState(0);
    const[score,setScore]=useState(0);
    const[cpIdx,setCpIdx]=useState(0); // current checkpoint 0,1,2
    const[cpMatched,setCpMatched]=useState(0);
    const[retries,setRetries]=useState(0); // how many checkpoint retries (kills perfect bonus)
    const[milestone,setMilestone]=useState(null);
    const[board,setBoard]=useState([]);
    const[selectedSide,setSelectedSide]=useState(null);

    const scoreRef=useRef(0);const cpMatchedRef=useRef(0);const lockedRef=useRef(false);
    const queueRef=useRef([]);const allPairsRef=useRef([]);const fadingRef=useRef({});
    const cpIdxRef=useRef(0);const retriesRef=useRef(0);

    // Load
    useEffect(()=>{
        const init=async()=>{
            if(!quizId)return;
            try{
                const snap=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',quizId));
                if(snap.exists()){
                    const d=snap.data();setGameData(d);
                    let pool=[];
                    if(Array.isArray(d.content))pool=d.content;
                    else if(d.content&&typeof d.content==='object')Object.values(d.content).forEach(v=>{if(Array.isArray(v)&&v.length>pool.length)pool=v});
                    setWordPool(pool.map((w,i)=>{
                        const s=Object.values(w).filter(v=>typeof v==='string');
                        return{id:w.id||`w${i}`,c1:w.c1||w.es||w.term||w.spanish||s[0]||'???',c2:w.c2||w.en||w.definition||w.english||s[1]||'???'};
                    }));
                }
                const q=query(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),orderBy('score','desc'),limit(10));
                const lbs=await getDocs(q);setLeaderboard(lbs.docs.map(d=>d.data()));
            }catch(e){console.error(e)}
            setLoading(false);
        };init();
    },[quizId]);

    const loadLB=async()=>{
        const q=query(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),orderBy('score','desc'),limit(10));
        const s=await getDocs(q);setLeaderboard(s.docs.map(d=>d.data()));
    };

    // Build checkpoint
    const buildCP=useCallback((pairs)=>{
        const sh=shuffle(pairs);const vis=sh.slice(0,BOARD_SIZE);const q=sh.slice(BOARD_SIZE);
        queueRef.current=q;
        const left=[...vis];let right=shuffle([...vis]);let att=0;
        while(right.some((w,i)=>w.id===left[i].id)&&att<100){right=shuffle([...vis]);att++}
        setBoard(left.map((w,i)=>({left:{id:w.id,text:w.c1,status:'idle'},right:{id:right[i].id,text:right[i].c2,status:'idle'},key:Date.now()+i})));
        fadingRef.current={};
    },[]);

    // Start crown
    const startCrown=useCallback((ci)=>{
        const c=CROWNS[ci];if(wordPool.length<5)return;
        let pool=shuffle([...wordPool]);const need=c.perCP*c.checkpoints;
        while(pool.length<need)pool=[...pool,...shuffle([...wordPool])];
        allPairsRef.current=pool.slice(0,need);
        buildCP(allPairsRef.current.slice(0,c.perCP));
        setCrownIdx(ci);setCpIdx(0);cpIdxRef.current=0;
        setCpMatched(0);cpMatchedRef.current=0;
        setScore(0);scoreRef.current=0;
        setRetries(0);retriesRef.current=0;
        setTimeLeft(c.time);setSelectedSide(null);setMilestone(null);
        lockedRef.current=false;setScreen('playing');
    },[wordPool,buildCP]);

    // Retry from current checkpoint
    const retryCP=useCallback(()=>{
        const c=CROWNS[crownIdx];
        retriesRef.current++;setRetries(r=>r+1);
        const start=cpIdxRef.current*c.perCP;
        buildCP(allPairsRef.current.slice(start,start+c.perCP));
        setCpMatched(0);cpMatchedRef.current=0;
        setSelectedSide(null);lockedRef.current=false;
        setScreen('playing');
        // Timer continues from where it was — no reset
    },[crownIdx,buildCP]);

    // Timer
    useEffect(()=>{
        let t;
        if(screen==='playing'&&timeLeft>0){
            t=setInterval(()=>{
                setTimeLeft(prev=>{
                    if(prev<=0.1){clearInterval(t);setScreen('checkpointFail');return 0}
                    return +(prev-0.1).toFixed(1);
                });
            },100);
        }
        return ()=>clearInterval(t);
    },[screen]);

    // Resolve fading
    const resolveAllFading=useCallback(()=>{
        const f=fadingRef.current;const keys=Object.keys(f);if(!keys.length)return;
        setBoard(prev=>prev.map((row,i)=>{
            let nr={...row};
            keys.forEach(k=>{const fd=f[k];if(!fd?.pair)return;
                if(fd.leftIdx===i)nr={...nr,left:{id:fd.pair.id,text:fd.pair.c1,status:'entering'},key:Date.now()+i};
                if(fd.rightIdx===i)nr={...nr,right:{id:fd.pair.id,text:fd.pair.c2,status:'entering'},key:Date.now()+i+100};
            });return nr;
        }));
        keys.forEach(k=>clearTimeout(f[k]?.timer));fadingRef.current={};
        setTimeout(()=>{setBoard(prev=>prev.map(r=>({...r,
            left:r.left.status==='entering'?{...r.left,status:'idle'}:r.left,
            right:r.right.status==='entering'?{...r.right,status:'idle'}:r.right,
        })))},180);
    },[]);

    // Click
    const handleClick=useCallback((side,index)=>{
        if(lockedRef.current||screen!=='playing')return;
        const row=board[index];const item=side==='left'?row.left:row.right;
        if(['matched','entering','wrong','empty'].includes(item.status))return;
        resolveAllFading();

        // Same side: only allow deselect same cell
        if(selectedSide?.side===side){
            if(selectedSide.index===index){
                setSelectedSide(null);
                setBoard(prev=>prev.map((r,i)=>i!==index?r:(side==='left'?{...r,left:{...r.left,status:'idle'}}:{...r,right:{...r.right,status:'idle'}})));
            }
            return;
        }

        if(!selectedSide){
            setBoard(prev=>prev.map((r,i)=>i!==index?r:(side==='left'?{...r,left:{...r.left,status:'selected'}}:{...r,right:{...r.right,status:'selected'}})));
            setSelectedSide({side,index});return;
        }

        // Opposite side — check
        const prevRow=board[selectedSide.index];
        const prevItem=selectedSide.side==='left'?prevRow.left:prevRow.right;
        const isMatch=prevItem.id===item.id;
        lockedRef.current=true;

        if(isMatch){
            const leftIdx=selectedSide.side==='left'?selectedSide.index:index;
            const rightIdx=selectedSide.side==='right'?selectedSide.index:index;
            setBoard(prev=>prev.map((r,i)=>{
                let nr={...r};
                if(i===leftIdx)nr={...nr,left:{...nr.left,status:'matched'}};
                if(i===rightIdx)nr={...nr,right:{...nr.right,status:'matched'}};
                return nr;
            }));
            confetti({particleCount:10,spread:25,origin:{y:.5},gravity:2,scalar:.6});
            const ns=scoreRef.current+1;scoreRef.current=ns;setScore(ns);
            const cpm=cpMatchedRef.current+1;cpMatchedRef.current=cpm;setCpMatched(cpm);

            const nextPair=queueRef.current.shift()||null;
            if(nextPair){
                const fid=`${leftIdx}-${rightIdx}-${Date.now()}`;
                const timer=setTimeout(()=>{
                    delete fadingRef.current[fid];
                    setBoard(prev=>{const n=[...prev];
                        n[leftIdx]={...n[leftIdx],left:{id:nextPair.id,text:nextPair.c1,status:'entering'},key:Date.now()+leftIdx};
                        n[rightIdx]={...n[rightIdx],right:{id:nextPair.id,text:nextPair.c2,status:'entering'},key:Date.now()+rightIdx+100};
                        return n;
                    });
                    setTimeout(()=>{setBoard(prev=>prev.map(r=>({...r,
                        left:r.left.status==='entering'?{...r.left,status:'idle'}:r.left,
                        right:r.right.status==='entering'?{...r.right,status:'idle'}:r.right,
                    })))},180);
                },FADE_MS);
                fadingRef.current[fid]={pair:nextPair,leftIdx,rightIdx,timer};
            }else{
                setTimeout(()=>{setBoard(prev=>prev.map((r,i)=>{
                    let nr={...r};
                    if(i===leftIdx&&nr.left.status==='matched')nr={...nr,left:{...nr.left,status:'empty'}};
                    if(i===rightIdx&&nr.right.status==='matched')nr={...nr,right:{...nr.right,status:'empty'}};
                    return nr;
                }))},FADE_MS);
            }

            setSelectedSide(null);lockedRef.current=false;

            const c=CROWNS[crownIdx];
            if(cpm>=c.perCP){
                const nextCpI=cpIdxRef.current+1;
                if(nextCpI>=c.checkpoints){
                    // Crown complete!
                    setTimeout(()=>{
                        confetti({particleCount:200,spread:100,origin:{y:.5}});
                        // Calculate final score
                        const timeBonus=Math.ceil(timeLeft);
                        const perfectBonus=retriesRef.current===0?20:0;
                        const finalScore=ns+timeBonus+perfectBonus;
                        scoreRef.current=finalScore;setScore(finalScore);
                        // Save to leaderboard
                        addDoc(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),{
                            playerName,score:finalScore,crown:crownIdx+1,
                            time:c.time-Math.ceil(timeLeft),perfect:retriesRef.current===0,
                            date:serverTimestamp()
                        }).then(()=>loadLB());
                        setScreen('crownWon');
                    },800);
                }else{
                    setMilestone({emoji:nextCpI===1?'🔥':'⚡',text:`Checkpoint ${nextCpI+1}!`,count:ns});
                    setTimeout(()=>{
                        setMilestone(null);fadingRef.current={};
                        cpIdxRef.current=nextCpI;setCpIdx(nextCpI);
                        cpMatchedRef.current=0;setCpMatched(0);
                        buildCP(allPairsRef.current.slice(nextCpI*c.perCP,(nextCpI+1)*c.perCP));
                    },2000);
                }
            }
        }else{
            // Wrong
            setBoard(prev=>{const n=[...prev];
                if(selectedSide.side==='left')n[selectedSide.index]={...n[selectedSide.index],left:{...n[selectedSide.index].left,status:'wrong'}};
                else n[selectedSide.index]={...n[selectedSide.index],right:{...n[selectedSide.index].right,status:'wrong'}};
                if(side==='left')n[index]={...n[index],left:{...n[index].left,status:'wrong'}};
                else n[index]={...n[index],right:{...n[index].right,status:'wrong'}};
                return n;
            });
            setSelectedSide(null);
            setTimeout(()=>{setBoard(prev=>prev.map(r=>({...r,
                left:r.left.status==='wrong'?{...r.left,status:'idle'}:r.left,
                right:r.right.status==='wrong'?{...r.right,status:'idle'}:r.right,
            })));lockedRef.current=false},400);
        }
    },[board,selectedSide,screen,crownIdx,resolveAllFading,buildCP,timeLeft,playerName,quizId]);

    const WordBtn=({item,onClick})=>{
        if(item.status==='empty')return<div className="h-14 sm:h-[4.2rem]"/>;
        let bg='bg-zinc-800 border-zinc-700 text-zinc-200',anim='';
        if(item.status==='selected')bg='bg-emerald-600 border-emerald-800 text-white';
        else if(item.status==='matched'){bg='bg-emerald-500/40 border-emerald-700/40 text-emerald-300';anim='animate-slow-fade';}
        else if(item.status==='wrong'){bg='bg-rose-500/70 border-rose-700 text-white';anim='animate-shake';}
        else if(item.status==='entering')anim='animate-pop-in';
        const dis=['matched','wrong','entering','empty'].includes(item.status);
        return(<div className="h-14 sm:h-[4.2rem]"><button className={`btn-juicy w-full h-full rounded-2xl border-2 border-b-4 font-bold text-sm sm:text-base flex items-center justify-center px-3 leading-tight ${bg} ${anim}`} onClick={onClick} disabled={dis}>{item.text}</button></div>);
    };

    // Vocab modal
    const VocabModal=()=>showVocab?(
        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-md flex flex-col max-h-[85vh] shadow-2xl overflow-hidden">
                <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                    <h3 className="font-black text-lg text-white flex items-center gap-2"><BookOpen size={18} className="text-indigo-400"/> Vocabulario</h3>
                    <button onClick={()=>setShowVocab(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400"><X size={20}/></button>
                </div>
                <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                    {[...wordPool].sort((a,b)=>a.c1.localeCompare(b.c1)).map((w,i)=>(
                        <div key={i} className="flex justify-between bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3">
                            <span className="font-bold text-zinc-200 text-sm">{w.c1}</span>
                            <span className="font-bold text-indigo-400 text-sm">{w.c2}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    ):null;

    // LB modal
    const LBModal=()=>showLB?(
        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm shadow-2xl overflow-hidden">
                <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                    <h3 className="font-black text-lg text-amber-400 flex items-center gap-2"><Trophy size={18}/> Ranking</h3>
                    <button onClick={()=>setShowLB(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400"><X size={20}/></button>
                </div>
                <div className="p-5 space-y-2 max-h-[60vh] overflow-y-auto custom-scrollbar">
                    {leaderboard.length===0?<p className="text-zinc-500 font-bold text-center text-sm py-4">Sé el primero en dejar tu marca.</p>:
                        leaderboard.map((l,i)=>(
                            <div key={i} className="flex items-center justify-between bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5">
                                <div className="flex items-center gap-2">
                                    <span className={`font-black text-sm ${i===0?'text-amber-400':i===1?'text-zinc-400':i===2?'text-amber-700':'text-zinc-600'}`}>#{i+1}</span>
                                    <span className="font-bold text-white text-sm uppercase">{l.playerName}</span>
                                    {l.crown&&<span className="text-xs">{l.crown===3?'🏆':l.crown===2?'🥈':'🥉'}</span>}
                                    {l.perfect&&<span className="text-[10px] text-emerald-400 font-bold">✓</span>}
                                </div>
                                <span className="font-black text-amber-400 text-sm">{l.score}</span>
                            </div>
                        ))
                    }
                </div>
            </div>
        </div>
    ):null;

    if(loading)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-zinc-500" size={32}/></div>;
    if(!gameData||wordPool.length<5)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950 p-6"><div className="bg-rose-900/20 border border-rose-500/50 p-6 rounded-2xl text-rose-400 font-bold text-center max-w-sm">Necesitas al menos 5 pares.</div></div>;

    // ====== MENU ======
    if(screen==='menu')return(
        <div className="h-[100dvh] flex flex-col items-center justify-center p-4 bg-zinc-950 overflow-auto">
            <VocabModal/><LBModal/>
            <div className="max-w-sm w-full my-auto">
                <div className="text-center mb-6">
                    <div className="text-6xl mb-3">⚡</div>
                    <h1 className="text-3xl font-black text-white mb-1">Match Madness</h1>
                    <p className="text-zinc-400 font-medium text-sm">{gameData.title}</p>
                </div>

                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-5 space-y-3">
                    <h2 className="font-black text-white text-sm uppercase tracking-widest mb-2">¿Cómo funciona?</h2>
                    <p className="text-zinc-400 text-sm leading-relaxed">Empareja palabras en español con su traducción en inglés contra reloj. Completa los 3 checkpoints para ganar la corona.</p>
                    <div className="space-y-2 pt-2">
                        {CROWNS.map((c,i)=>(
                            <div key={i} className={`flex items-center justify-between rounded-xl px-3 py-2.5 border ${i===0?'bg-amber-950/30 border-amber-800/50':'bg-zinc-950 border-zinc-800'}`}>
                                <div className="flex items-center gap-2">
                                    <span className={`text-lg ${c.color}`}>{c.emoji}</span>
                                    <div>
                                        <p className={`font-black text-xs ${c.color}`}>{c.name}</p>
                                        <p className="text-zinc-500 text-[10px]">{c.perCP}×3 = {c.perCP*3} pares</p>
                                    </div>
                                </div>
                                <span className="text-zinc-500 font-bold text-xs">{Math.floor(c.time/60)}:{(c.time%60).toString().padStart(2,'0')}</span>
                            </div>
                        ))}
                    </div>
                </div>

                <div className="flex gap-2 mb-5">
                    <button onClick={()=>{loadLB();setShowLB(true)}} className="flex-1 btn-juicy bg-zinc-800 text-zinc-300 font-bold py-3 rounded-xl border-2 border-b-4 border-zinc-900 text-xs flex items-center justify-center gap-1.5"><Trophy size={14}/> Ranking</button>
                    <button onClick={()=>setShowVocab(true)} className="flex-1 btn-juicy bg-zinc-800 text-zinc-300 font-bold py-3 rounded-xl border-2 border-b-4 border-zinc-900 text-xs flex items-center justify-center gap-1.5"><BookOpen size={14}/> Vocabulario</button>
                </div>

                <input type="text" placeholder="Tu nombre..." value={playerName} onChange={e=>setPlayerName(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&playerName.trim()&&startCrown(0)}
                    className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center text-lg font-bold text-white mb-4 outline-none focus:border-amber-500" style={{fontSize:'16px'}}/>

                <button disabled={!playerName.trim()} onClick={()=>startCrown(0)}
                    className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-lg uppercase tracking-widest flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                    <Play fill="currentColor" size={22}/> JUGAR
                </button>
                {!isStudent&&<button onClick={()=>window.location.href='index.html'} className="mt-5 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest block mx-auto">Volver al Hub</button>}
            </div>
        </div>
    );

    // ====== PLAYING ======
    if(screen==='playing'){
        const pct=(score/totalPairs)*100;const isLow=timeLeft<20;
        const m=Math.floor(Math.ceil(timeLeft)/60);const s=Math.ceil(timeLeft)%60;
        return(
            <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden relative">
                {milestone&&(<div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 animate-milestone"><div className="bg-zinc-800 border-2 border-amber-500/50 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3"><span className="text-3xl">{milestone.emoji}</span><div><p className="font-black text-white text-lg">{milestone.count} pares</p><p className="text-amber-400 font-bold text-sm">{milestone.text}</p></div></div></div>)}

                <header className="px-4 py-2.5 flex items-center justify-between shrink-0 bg-zinc-900 border-b border-zinc-800">
                    <button onClick={()=>setScreen('menu')} className="p-2 text-zinc-500 hover:text-white rounded-xl"><X size={20}/></button>
                    <div className="flex-1 mx-3 relative">
                        <div className="h-3 w-full bg-zinc-800 rounded-full overflow-hidden relative">
                            <div className={`h-full rounded-full transition-all duration-300 ${isLow?'bg-rose-500':'bg-amber-500'}`} style={{width:`${pct}%`}}/>
                            {[1,2].map(cp=><div key={cp} className="absolute top-1/2 -translate-y-1/2" style={{left:`${(cp*crown.perCP/totalPairs)*100}%`}}><div className={`w-2 h-5 rounded-full ${score>=cp*crown.perCP?'bg-amber-400':'bg-zinc-600'}`}/></div>)}
                        </div>
                        <div className="flex justify-between mt-0.5">
                            <span className="text-[10px] text-zinc-500 font-bold">{score}/{totalPairs}</span>
                            <span className={`text-[10px] font-bold ${crown.color}`}>{crown.emoji} Crown {crownIdx+1}</span>
                        </div>
                    </div>
                    <div className={`font-black text-lg tabular-nums min-w-[50px] text-right ${isLow?'text-rose-500 animate-pulse':'text-amber-500'}`}>{m}:{s.toString().padStart(2,'0')}</div>
                </header>

                <div className="flex px-4 sm:px-8 max-w-2xl mx-auto w-full pt-3 pb-1">
                    <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Español</p>
                    <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">English</p>
                </div>

                <main className="flex-1 flex gap-3 sm:gap-4 px-4 sm:px-8 pb-6 max-w-2xl mx-auto w-full items-center">
                    <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">{board.map((r,i)=><WordBtn key={`l-${r.key}`} item={r.left} onClick={()=>handleClick('left',i)}/>)}</div>
                    <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">{board.map((r,i)=><WordBtn key={`r-${r.key}`} item={r.right} onClick={()=>handleClick('right',i)}/>)}</div>
                </main>
            </div>
        );
    }

    // ====== CHECKPOINT FAIL ======
    if(screen==='checkpointFail')return(
        <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 overflow-auto">
            <VocabModal/>
            <div className="max-w-sm w-full text-center my-auto">
                <div className="text-6xl mb-4">⏱️</div>
                <h2 className="text-2xl font-black text-rose-400 mb-2">Se acabó el tiempo</h2>
                <p className="text-zinc-400 font-bold mb-1">{score} pares completados</p>
                <p className="text-zinc-500 text-sm mb-8">Checkpoint {cpIdx+1} de {crown.checkpoints} — {cpMatched}/{crown.perCP} pares de este checkpoint.</p>

                {cpIdx>0?(
                    <div className="space-y-3">
                        <p className="text-zinc-400 text-xs mb-3">Puedes reintentar este checkpoint (pierdes el bonus de perfección).</p>
                        <button onClick={()=>{setTimeLeft(30);retryCP()}} className="btn-juicy w-full bg-amber-500 text-black font-black py-4 rounded-2xl border-2 border-b-4 border-amber-700 text-sm uppercase tracking-widest flex items-center justify-center gap-2"><RotateCcw size={18}/> Reintentar (+30s)</button>
                        <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">Volver al menú</button>
                    </div>
                ):(
                    <div className="space-y-3">
                        <button onClick={()=>startCrown(crownIdx)} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-sm uppercase tracking-widest flex items-center justify-center gap-2"><RotateCcw size={18}/> Reintentar desde cero</button>
                        <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">Volver al menú</button>
                    </div>
                )}
            </div>
        </div>
    );

    // ====== CROWN WON ======
    if(screen==='crownWon'){
        const timeTaken=crown.time-Math.ceil(timeLeft);
        const tm=Math.floor(timeTaken/60);const ts=timeTaken%60;
        const isPerfect=retries===0;
        const hasNextCrown=crownIdx<CROWNS.length-1;

        return(
            <div className="h-[100dvh] flex flex-col items-center justify-center p-4 bg-zinc-950 overflow-auto">
                <VocabModal/><LBModal/>
                <div className="max-w-sm w-full text-center my-auto">
                    <div className={`text-7xl mb-3 ${crown.color}`}>👑</div>
                    <h2 className="text-3xl font-black text-white mb-1">¡{crown.name}!</h2>
                    {isPerfect&&<p className="text-emerald-400 font-bold text-sm mb-2">✓ Perfecto — sin reintentos (+20 bonus)</p>}
                    <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-6">
                        <div className="flex justify-around mb-3">
                            <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Pares</p><p className="text-xl font-black text-white">{totalPairs}</p></div>
                            <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Tiempo</p><p className="text-xl font-black text-white">{tm}:{ts.toString().padStart(2,'0')}</p></div>
                            <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Score</p><p className="text-xl font-black text-amber-400">{score}</p></div>
                        </div>
                        <div className="text-[10px] text-zinc-500 font-bold space-y-0.5">
                            <p>Pares: {totalPairs} pts + Tiempo restante: {Math.ceil(timeLeft)} pts {isPerfect?'+ Perfecto: 20 pts':''}</p>
                        </div>
                    </div>

                    <div className="space-y-3">
                        {hasNextCrown&&(
                            <button onClick={()=>startCrown(crownIdx+1)} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                <Crown size={18}/> Siguiente Corona ({CROWNS[crownIdx+1].name})
                            </button>
                        )}
                        <button onClick={()=>{loadLB();setShowLB(true)}} className="btn-juicy w-full bg-amber-500/10 text-amber-400 font-black py-3 rounded-2xl border-2 border-b-4 border-amber-500/20 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                            <Trophy size={16}/> Ver Ranking
                        </button>
                        <button onClick={()=>setShowVocab(true)} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                            <BookOpen size={16}/> ¿Qué hay en este juego?
                        </button>
                        <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-900 text-zinc-500 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-950 text-sm uppercase tracking-widest">
                            Volver al inicio
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    return null;
};

createRoot(document.getElementById('root')).render(<MatchGame/>);
</script>
</body>
</html>

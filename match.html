<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Madness | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.263.1","firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js","canvas-confetti":"https://esm.sh/canvas-confetti@1.9.3"}}</script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body{font-family:'Plus Jakarta Sans',sans-serif;user-select:none;-webkit-user-select:none;overflow:hidden;height:100dvh}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        /*
         * FIX PARPADEO/FLICKER — touch-action:manipulation en TODOS los botones.
         * Elimina el delay de 300ms de iOS/Safari sin necesitar onTouchEnd.
         * El handler usa SOLO onClick (no onTouchEnd) para evitar doble disparo.
         */
        button,[role="button"]{touch-action:manipulation;cursor:pointer}

        @media(hover:hover) and (pointer:fine){.hover-effect:hover{filter:brightness(1.15)}}

        .btn-juicy{
            transition:transform 0.1s ease,filter 0.1s ease;
            -webkit-transform:translateZ(0);
        }
        .btn-juicy:active:not(:disabled){transform:scale(0.94) translateZ(0)}

        @keyframes shrink{from{width:100%}to{width:0%}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        @keyframes pop-in{0%{transform:scale(0.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
        @keyframes slow-fade{0%{opacity:1}100%{opacity:0.2}}
        @keyframes milestone-anim{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
        @keyframes countdown-pop{0%{transform:scale(1.6);opacity:0}30%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.8)}}

        .animate-shake{animation:shake 0.4s ease-in-out}
        .animate-pop-in{animation:pop-in 0.28s cubic-bezier(0.175,0.885,0.32,1.275) both}
        .animate-slow-fade{animation:slow-fade 5s linear forwards}
        .animate-milestone{animation:milestone-anim 2.2s ease both}
        .animate-countdown{animation:countdown-pop 0.85s ease both}
    </style>
</head>
<body class="text-zinc-100">
<div id="root"></div>
<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef,useCallback,useMemo}from 'react';
import{createRoot}from 'react-dom/client';
import{initializeApp}from 'firebase/app';
import{getFirestore,doc,getDoc,addDoc,collection,query,orderBy,limit,getDocs,serverTimestamp,where,deleteDoc}from 'firebase/firestore';
import{Loader2,Play,RotateCcw,X,Trophy,BookOpen,Crown,ArrowRight,Pause,LogOut}from 'lucide-react';
import confetti from 'canvas-confetti';

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};

const CROWNS=[
    {id:1,emoji:'👑',name:'Bronze Crown',color:'text-amber-600',bg:'bg-amber-600',perCP:15,time:105,checkpoints:3},
    {id:2,emoji:'👑',name:'Silver Crown',color:'text-zinc-300',bg:'bg-zinc-400',perCP:20,time:105,checkpoints:3},
    {id:3,emoji:'👑',name:'Gold Crown',color:'text-amber-400',bg:'bg-amber-400',perCP:20,time:90,checkpoints:3},
];
const FADE_MS=5000;const BOARD_SIZE=5;

/* ══════════════════════════════════════════════════════════════
   WordBtn definido FUERA del componente padre.
   CRÍTICO: si está dentro, cada render del padre crea una función
   nueva → React desmonta/remonta el botón → el hover dispara
   re-renders en loop → parpadeo en desktop con mouse.
   Fuera del padre, React reutiliza el mismo componente siempre.
══════════════════════════════════════════════════════════════ */
/*
 * WordBtn recibe side e idx como data-attributes en lugar de un onClick closure.
 * El handler real vive en onClickCapture del <main> padre — es UNA función
 * estable que nunca cambia referencia → React nunca re-renderiza los botones
 * por cambio de prop onClick → cero parpadeo con mouse en desktop.
 */
const WordBtn=({item,side,idx})=>{
    if(item.status==='empty')return<div className="h-14 sm:h-[4.2rem]"/>;
    let bg='bg-zinc-800 border-zinc-700 text-zinc-200 hover-effect',anim='';
    if(item.status==='selected')bg='bg-emerald-600 border-emerald-800 text-white';
    else if(item.status==='matched'){bg='bg-emerald-500/40 border-emerald-700/40 text-emerald-300';anim='animate-slow-fade';}
    else if(item.status==='wrong'){bg='bg-rose-500/70 border-rose-700 text-white';anim='animate-shake';}
    else if(item.status==='entering')anim='animate-pop-in';
    const dis=['matched','wrong','entering','empty'].includes(item.status);
    return(<div className="h-14 sm:h-[4.2rem]"><button type="button" data-side={side} data-idx={idx} className={`btn-juicy w-full h-full rounded-2xl border-2 border-b-4 font-bold text-sm sm:text-base flex items-center justify-center px-3 leading-tight ${bg} ${anim}`} style={{touchAction:'manipulation',WebkitTapHighlightColor:'transparent'}} disabled={dis}>{item.text}</button></div>);
};

const MatchGame=()=>{
    const[loading,setLoading]=useState(true);
    const[gameData,setGameData]=useState(null);
    const[wordPool,setWordPool]=useState([]);
    const[isStudent]=useState(new URLSearchParams(window.location.search).get('student')==='true');
    const[quizId]=useState(new URLSearchParams(window.location.search).get('id'));

    /* ── hub URL: alumnos vuelven a su portal, teacher al index ── */
    const hubUrl=useMemo(()=>{
        const sid=new URLSearchParams(window.location.search).get('studentId');
        return(isStudent&&sid)?`students_portal.html?id=${sid}`:'index.html';
    },[isStudent]);

    const[screen,setScreen]=useState('menu');
    const[playerName,setPlayerName]=useState('');
    const[leaderboard,setLeaderboard]=useState([]);
    const[showVocab,setShowVocab]=useState(false);
    const[showLB,setShowLB]=useState(false);

    /* ── pausa & countdown (NUEVO) ── */
    const[isPaused,setIsPaused]=useState(false);
    const[countdown,setCountdown]=useState(null);
    const countdownRef=useRef(null);

    const[crownIdx,setCrownIdx]=useState(0);
    const crown=CROWNS[crownIdx];
    const totalPairs=crown.perCP*crown.checkpoints;

    const[timeLeft,setTimeLeft]=useState(0);
    const[score,setScore]=useState(0);
    const[cpIdx,setCpIdx]=useState(0);
    const[cpMatched,setCpMatched]=useState(0);
    const[retries,setRetries]=useState(0);
    const[milestone,setMilestone]=useState(null);
    const[board,setBoard]=useState([]);
    const[selectedSide,setSelectedSide]=useState(null);

    const scoreRef=useRef(0);const cpMatchedRef=useRef(0);const lockedRef=useRef(false);
    const queueRef=useRef([]);const allPairsRef=useRef([]);const fadingRef=useRef({});
    const cpIdxRef=useRef(0);const retriesRef=useRef(0);
    /* refs para board y selectedSide — evitan que handleClick tenga deps de state
       que causan re-renders en loop cuando el mouse hace hover en desktop */
    const boardRef=useRef([]);const selectedSideRef=useRef(null);
    const isPausedRef=useRef(false);const countdownRef2=useRef(null);
    const screenRef=useRef('menu');const crownIdxRef=useRef(0);
    const timeLeftRef=useRef(0);const playerNameRef=useRef('');
    /* refs para funciones que cambian referencia — evitan que handleClick se recree */
    const resolveAllFadingRef=useRef(null);const buildCPRef=useRef(null);

    /* sync refs con state — O(1), no causan re-renders */
    useEffect(()=>{boardRef.current=board;},[board]);
    useEffect(()=>{selectedSideRef.current=selectedSide;},[selectedSide]);
    useEffect(()=>{isPausedRef.current=isPaused;},[isPaused]);
    useEffect(()=>{countdownRef2.current=countdown;},[countdown]);
    useEffect(()=>{screenRef.current=screen;},[screen]);
    useEffect(()=>{crownIdxRef.current=crownIdx;},[crownIdx]);
    useEffect(()=>{timeLeftRef.current=timeLeft;},[timeLeft]);
    useEffect(()=>{playerNameRef.current=playerName;},[playerName]);
    /* sync function refs */
    useEffect(()=>{resolveAllFadingRef.current=resolveAllFading;},[resolveAllFading]);
    useEffect(()=>{buildCPRef.current=buildCP;},[buildCP]);

    /* ══════════════════════════════════════════════════
       CARGA FIREBASE
       dashboard-match.html guarda: content.wordPool [{id,en,es}]
       Normalizamos a {id, c1:es, c2:en} que es lo que usa buildCP.
       También soporta: arrays directo, o {c1,c2}, o {es,en}, etc.
    ══════════════════════════════════════════════════ */
    useEffect(()=>{
        const init=async()=>{
            if(!quizId)return;
            try{
                const snap=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',quizId));
                if(snap.exists()){
                    const d=snap.data();setGameData(d);

                    /* 1. Formato dashboard-match → content.wordPool [{id,en,es}] */
                    if(d.content?.wordPool&&Array.isArray(d.content.wordPool)&&d.content.wordPool.length>0){
                        const pool=d.content.wordPool.filter(p=>p.en&&p.es).map((w,i)=>({
                            id:w.id||`w${i}`,c1:w.es,c2:w.en
                        }));
                        setWordPool(pool);
                    }
                    /* 2. Formato legacy: array directo o cualquier otro campo */
                    else{
                        let raw=[];
                        if(Array.isArray(d.content))raw=d.content;
                        else if(d.content&&typeof d.content==='object'){
                            Object.values(d.content).forEach(v=>{if(Array.isArray(v)&&v.length>raw.length)raw=v});
                        }
                        setWordPool(raw.map((w,i)=>{
                            const s=Object.values(w).filter(v=>typeof v==='string');
                            return{id:w.id||`w${i}`,c1:w.c1||w.es||w.term||w.spanish||s[0]||'???',c2:w.c2||w.en||w.definition||w.english||s[1]||'???'};
                        }));
                    }
                }
                const q=query(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),limit(50));
                const lbs=await getDocs(q);
                const allLb=lbs.docs.map(d=>({...d.data(),docId:d.id}));
                allLb.sort((a,b)=>{if((b.crown||1)!==(a.crown||1))return(b.crown||1)-(a.crown||1);return(b.score||0)-(a.score||0)});
                setLeaderboard(allLb.slice(0,10));
            }catch(e){console.error(e)}
            setLoading(false);
        };init();
    },[quizId]);

    const loadLB=async()=>{
        const q=query(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),limit(50));
        const snap=await getDocs(q);
        const all=snap.docs.map(d=>({...d.data(),docId:d.id}));
        all.sort((a,b)=>{
            if((b.crown||1)!==(a.crown||1))return(b.crown||1)-(a.crown||1);
            return(b.score||0)-(a.score||0);
        });
        setLeaderboard(all.slice(0,10));
    };

    /* ── buildCP: siempre muestra BOARD_SIZE=5 pares, el resto va a la cola ── */
    const buildCP=useCallback((pairs)=>{
        const sh=shuffle(pairs);const vis=sh.slice(0,BOARD_SIZE);const q=sh.slice(BOARD_SIZE);
        queueRef.current=q;
        const left=[...vis];let right=shuffle([...vis]);let att=0;
        while(right.some((w,i)=>w.id===left[i].id)&&att<100){right=shuffle([...vis]);att++}
        setBoard(left.map((w,i)=>({left:{id:w.id,text:w.c1,status:'idle'},right:{id:right[i].id,text:right[i].c2,status:'idle'},key:Date.now()+i})));
        fadingRef.current={};
    },[]);

    const startCrown=useCallback((ci)=>{
        const c=CROWNS[ci];if(wordPool.length<5)return;
        let pool=shuffle([...wordPool]);const need=c.perCP*c.checkpoints;
        while(pool.length<need)pool=[...pool,...shuffle([...wordPool])];
        allPairsRef.current=pool.slice(0,need);
        buildCP(allPairsRef.current.slice(0,c.perCP));
        setCrownIdx(ci);setCpIdx(0);cpIdxRef.current=0;
        setCpMatched(0);cpMatchedRef.current=0;
        setScore(0);scoreRef.current=0;
        setRetries(0);retriesRef.current=0;
        setTimeLeft(c.time);setSelectedSide(null);setMilestone(null);
        lockedRef.current=false;setScreen('playing');
    },[wordPool,buildCP]);

    const retryCP=useCallback(()=>{
        const c=CROWNS[crownIdx];
        retriesRef.current++;setRetries(r=>r+1);
        const start=cpIdxRef.current*c.perCP;
        buildCP(allPairsRef.current.slice(start,start+c.perCP));
        setCpMatched(0);cpMatchedRef.current=0;
        setSelectedSide(null);lockedRef.current=false;
        setScreen('playing');
    },[crownIdx,buildCP]);

    /* ── TIMER — se pausa cuando isPaused o countdown activo ── */
    useEffect(()=>{
        let t;
        if(screen==='playing'&&timeLeft>0&&!isPaused&&!countdown){
            t=setInterval(()=>{
                setTimeLeft(prev=>{
                    if(prev<=0.1){clearInterval(t);setScreen('checkpointFail');return 0}
                    return +(prev-0.1).toFixed(1);
                });
            },100);
        }
        return()=>clearInterval(t);
    },[screen,isPaused,countdown]);

    /* ── PAUSA & COUNTDOWN (NUEVO) ── */
    const handlePause=useCallback(()=>{
        if(screen!=='playing'||isPaused)return;
        clearTimeout(countdownRef.current);setCountdown(null);
        setIsPaused(true);
    },[screen,isPaused]);

    const triggerCountdown=useCallback(()=>{
        const steps=['3','2','1','¡GO!'];
        let i=0;
        const tick=()=>{
            setCountdown(steps[i]);i++;
            if(i<steps.length)countdownRef.current=setTimeout(tick,900);
            else countdownRef.current=setTimeout(()=>{setCountdown(null);setIsPaused(false);},700);
        };
        tick();
    },[]);

    const resolveAllFading=useCallback(()=>{
        const f=fadingRef.current;const keys=Object.keys(f);if(!keys.length)return;
        setBoard(prev=>prev.map((row,i)=>{
            let nr={...row};
            keys.forEach(k=>{const fd=f[k];if(!fd?.pair)return;
                if(fd.leftIdx===i)nr={...nr,left:{id:fd.pair.id,text:fd.pair.c1,status:'entering'},key:Date.now()+i};
                if(fd.rightIdx===i)nr={...nr,right:{id:fd.pair.id,text:fd.pair.c2,status:'entering'},key:Date.now()+i+100};
            });return nr;
        }));
        keys.forEach(k=>clearTimeout(f[k]?.timer));fadingRef.current={};
        setTimeout(()=>{setBoard(prev=>prev.map(r=>({...r,
            left:r.left.status==='entering'?{...r.left,status:'idle'}:r.left,
            right:r.right.status==='entering'?{...r.right,status:'idle'}:r.right,
        })))},180);
    },[]);

    /* ══════════════════════════════════════════════════
       FIX PARPADEO: handleClick usa SOLO onClick (sin onTouchEnd).
       El e.preventDefault() en WordBtn evita el ghost click de iOS.
       touch-action:manipulation en CSS elimina el 300ms delay de Safari.
       La lógica de juego es EXACTAMENTE la original.
    ══════════════════════════════════════════════════ */
    const handleClick=useCallback((side,index)=>{
        /* Lee todo via refs — sin deps de state = no re-renders en loop */
        if(lockedRef.current||screenRef.current!=='playing')return;
        if(isPausedRef.current||countdownRef2.current!==null)return;
        const board=boardRef.current;
        const selectedSide=selectedSideRef.current;
        const row=board[index];const item=side==='left'?row.left:row.right;
        if(['matched','entering','wrong','empty'].includes(item.status))return;
        resolveAllFadingRef.current?.();

        if(selectedSide?.side===side){
            if(selectedSide.index===index){
                selectedSideRef.current=null;setSelectedSide(null);
                setBoard(prev=>prev.map((r,i)=>i!==index?r:(side==='left'?{...r,left:{...r.left,status:'idle'}}:{...r,right:{...r.right,status:'idle'}})));
            }
            return;
        }

        if(!selectedSide){
            setBoard(prev=>prev.map((r,i)=>i!==index?r:(side==='left'?{...r,left:{...r.left,status:'selected'}}:{...r,right:{...r.right,status:'selected'}})));
            selectedSideRef.current={side,index};setSelectedSide({side,index});return;
        }

        const prevRow=board[selectedSide.index];
        const prevItem=selectedSide.side==='left'?prevRow.left:prevRow.right;
        const isMatch=prevItem.id===item.id;
        lockedRef.current=true;

        if(isMatch){
            const leftIdx=selectedSide.side==='left'?selectedSide.index:index;
            const rightIdx=selectedSide.side==='right'?selectedSide.index:index;
            setBoard(prev=>prev.map((r,i)=>{
                let nr={...r};
                if(i===leftIdx)nr={...nr,left:{...nr.left,status:'matched'}};
                if(i===rightIdx)nr={...nr,right:{...nr.right,status:'matched'}};
                return nr;
            }));
            confetti({particleCount:10,spread:25,origin:{y:.5},gravity:2,scalar:.6});
            const ns=scoreRef.current+1;scoreRef.current=ns;setScore(ns);
            const cpm=cpMatchedRef.current+1;cpMatchedRef.current=cpm;setCpMatched(cpm);

            const nextPair=queueRef.current.shift()||null;
            if(nextPair){
                const fid=`${leftIdx}-${rightIdx}-${Date.now()}`;
                const timer=setTimeout(()=>{
                    delete fadingRef.current[fid];
                    setBoard(prev=>{const n=[...prev];
                        n[leftIdx]={...n[leftIdx],left:{id:nextPair.id,text:nextPair.c1,status:'entering'},key:Date.now()+leftIdx};
                        n[rightIdx]={...n[rightIdx],right:{id:nextPair.id,text:nextPair.c2,status:'entering'},key:Date.now()+rightIdx+100};
                        return n;
                    });
                    setTimeout(()=>{setBoard(prev=>prev.map(r=>({...r,
                        left:r.left.status==='entering'?{...r.left,status:'idle'}:r.left,
                        right:r.right.status==='entering'?{...r.right,status:'idle'}:r.right,
                    })))},180);
                },FADE_MS);
                fadingRef.current[fid]={pair:nextPair,leftIdx,rightIdx,timer};
            }else{
                setTimeout(()=>{setBoard(prev=>prev.map((r,i)=>{
                    let nr={...r};
                    if(i===leftIdx&&nr.left.status==='matched')nr={...nr,left:{...nr.left,status:'empty'}};
                    if(i===rightIdx&&nr.right.status==='matched')nr={...nr,right:{...nr.right,status:'empty'}};
                    return nr;
                }))},FADE_MS);
            }

            setSelectedSide(null);lockedRef.current=false;

            const c=CROWNS[crownIdx];
            if(cpm>=c.perCP){
                const nextCpI=cpIdxRef.current+1;
                if(nextCpI>=c.checkpoints){
                    setTimeout(()=>{
                        confetti({particleCount:200,spread:100,origin:{y:.5}});
                        const timeBonus=Math.ceil(timeLeft);
                        const perfectBonus=retriesRef.current===0?20:0;
                        const finalScore=ns+timeBonus+perfectBonus;
                        scoreRef.current=finalScore;setScore(finalScore);
                        const oldQ=query(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),where('playerName','==',playerName));
                        getDocs(oldQ).then(snap=>{
                            snap.docs.forEach(d=>deleteDoc(doc(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`,d.id)));
                        }).then(()=>{
                            addDoc(collection(db,`artifacts/periplo-app-v1/quizzes/${quizId}/match-leaderboard`),{
                                playerName,score:finalScore,crown:crownIdx+1,
                                time:c.time-Math.ceil(timeLeft),perfect:retriesRef.current===0,
                                date:serverTimestamp()
                            }).then(()=>loadLB());
                        });
                        setScreen('crownWon');
                    },800);
                }else{
                    setMilestone({emoji:nextCpI===1?'🔥':'⚡',text:`Checkpoint ${nextCpI+1}!`,count:ns});
                    setScreen('checkpoint');
                    setTimeout(()=>{
                        setMilestone(null);fadingRef.current={};
                        cpIdxRef.current=nextCpI;setCpIdx(nextCpI);
                        cpMatchedRef.current=0;setCpMatched(0);
                        buildCPRef.current?.(allPairsRef.current.slice(nextCpI*c.perCP,(nextCpI+1)*c.perCP));
                        setScreen('playing');
                    },2000);
                }
            }
        }else{
            setBoard(prev=>{const n=[...prev];
                if(selectedSide.side==='left')n[selectedSide.index]={...n[selectedSide.index],left:{...n[selectedSide.index].left,status:'wrong'}};
                else n[selectedSide.index]={...n[selectedSide.index],right:{...n[selectedSide.index].right,status:'wrong'}};
                if(side==='left')n[index]={...n[index],left:{...n[index].left,status:'wrong'}};
                else n[index]={...n[index],right:{...n[index].right,status:'wrong'}};
                return n;
            });
            setSelectedSide(null);
            setTimeout(()=>{setBoard(prev=>prev.map(r=>({...r,
                left:r.left.status==='wrong'?{...r.left,status:'idle'}:r.left,
                right:r.right.status==='wrong'?{...r.right,status:'idle'}:r.right,
            })));lockedRef.current=false},400);
        }
    /* sin deps de state → nunca se recrea → no causa re-renders de WordBtn */
    /* sin deps: todo via refs, nunca se recrea */},[]);

    /* WordBtn definido fuera del componente — ver abajo */

    /* ── Modales originales ── */
    const VocabModal=()=>showVocab?(
        <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-end justify-center p-4" onClick={()=>setShowVocab(false)}>
            <div className="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-sm max-h-[70vh] flex flex-col" onClick={e=>e.stopPropagation()}>
                <div className="p-4 border-b border-zinc-800 flex items-center justify-between shrink-0">
                    <h3 className="font-black text-white text-sm uppercase tracking-widest">Vocabulario del juego</h3>
                    <button onClick={()=>setShowVocab(false)} className="text-zinc-500"><X size={20}/></button>
                </div>
                <div className="overflow-y-auto p-4 space-y-2">
                    {wordPool.map((p,i)=>(
                        <div key={i} className="flex justify-between items-center gap-3 bg-zinc-800 rounded-xl px-3 py-2.5">
                            <span className="text-zinc-200 font-bold text-sm">{p.c1}</span>
                            <ArrowRight size={14} className="text-zinc-600 flex-shrink-0"/>
                            <span className="text-zinc-400 font-bold text-sm text-right">{p.c2}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    ):null;

    const LBModal=()=>showLB?(
        <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-end justify-center p-4" onClick={()=>setShowLB(false)}>
            <div className="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-sm max-h-[70vh] flex flex-col" onClick={e=>e.stopPropagation()}>
                <div className="p-4 border-b border-zinc-800 flex items-center justify-between shrink-0">
                    <h3 className="font-black text-white text-sm uppercase tracking-widest flex items-center gap-2"><Trophy size={16} className="text-amber-400"/>Ranking</h3>
                    <button onClick={()=>setShowLB(false)} className="text-zinc-500"><X size={20}/></button>
                </div>
                <div className="overflow-y-auto p-4 space-y-2">
                    {leaderboard.length===0&&<p className="text-zinc-500 text-center py-6 font-bold text-sm">Sin registros aún</p>}
                    {leaderboard.map((l,i)=>(
                        <div key={i} className="flex items-center justify-between bg-zinc-800 rounded-xl px-3 py-2.5">
                            <div className="flex items-center gap-2">
                                <span className={`font-black text-sm ${i===0?'text-amber-400':i===1?'text-zinc-300':i===2?'text-amber-700':'text-zinc-600'}`}>#{i+1}</span>
                                <span className="font-bold text-white text-sm uppercase">{l.playerName}</span>
                                {l.crown&&<span className="text-xs">{l.crown===3?'🏆':l.crown===2?'🥈':'🥉'}</span>}
                                {l.perfect&&<span className="text-[10px] text-emerald-400 font-bold">✓</span>}
                            </div>
                            <span className="font-black text-amber-400 text-sm">{l.score}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    ):null;

    /* ══ NUEVO: Banner top + Pause Overlay ══ */
    const TopBanner=({showPause=false})=>(
        <header className="w-full bg-zinc-900 border-b border-zinc-800 px-4 py-3 flex items-center justify-between shrink-0 z-30">
            <div className="flex items-center gap-3 min-w-0">
                <a href={hubUrl} className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-md shadow-indigo-600/30 flex-shrink-0" title="Hub">P</a>
                <div className="min-w-0">
                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest leading-none">Match Madness ⚡</p>
                    <h1 className="font-black text-white text-sm leading-tight truncate max-w-[180px] sm:max-w-xs">{gameData?.title||'Cargando...'}</h1>
                </div>
            </div>
            <div className="flex items-center gap-2 flex-shrink-0">
                {showPause&&(
                    <button onClick={handlePause} className="btn-juicy p-2.5 bg-zinc-800 text-zinc-400 rounded-xl border border-zinc-700" title="Pausar">
                        <Pause size={18}/>
                    </button>
                )}
                <a href={hubUrl} className="btn-juicy p-2.5 bg-zinc-800 text-zinc-400 rounded-xl border border-zinc-700" title="Salir">
                    <LogOut size={18}/>
                </a>
            </div>
        </header>
    );

    const PauseOverlay=()=>{
        if(!isPaused&&!countdown)return null;
        return(
            <div className="fixed inset-0 bg-zinc-950/85 backdrop-blur-md z-50 flex items-center justify-center p-4">
                {countdown?(
                    <div key={countdown} className="text-[22vw] sm:text-[14vw] font-black italic text-white animate-countdown drop-shadow-[0_0_40px_rgba(99,102,241,0.9)] select-none">
                        {countdown}
                    </div>
                ):(
                    <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center max-w-sm w-full shadow-2xl">
                        <Pause size={48} className="text-zinc-500 mx-auto mb-4"/>
                        <h2 className="text-2xl font-black text-white mb-2 uppercase tracking-widest">Pausa</h2>
                        <p className="text-zinc-500 text-sm font-bold mb-6">El tiempo está detenido</p>
                        <button onClick={triggerCountdown} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2 mb-3">
                            <Play size={18}/> Reanudar
                        </button>
                        <a href={hubUrl} className="block text-center text-zinc-500 font-bold text-sm py-3 hover:text-white transition-colors">Salir al Hub</a>
                    </div>
                )}
            </div>
        );
    };

    /* ══ RENDERS ══ */

    if(loading)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-zinc-500" size={32}/></div>;
    if(!gameData||wordPool.length<5)return(
        <div className="h-[100dvh] flex flex-col bg-zinc-950">
            <TopBanner/>
            <div className="flex-1 flex items-center justify-center p-6">
                <div className="bg-rose-900/20 border border-rose-500/50 p-6 rounded-2xl text-rose-400 font-bold text-center max-w-sm">
                    {!gameData?'No se encontró el juego.':'Necesitas al menos 5 pares para jugar.'}
                </div>
            </div>
        </div>
    );

    /* ─ MENÚ ─ */
    if(screen==='menu')return(
        <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden">
            <VocabModal/><LBModal/>
            <TopBanner/>
            <div className="flex-1 overflow-y-auto">
                <div className="max-w-sm mx-auto p-4 py-6">
                    <div className="text-center mb-6">
                        <div className="text-6xl mb-3">⚡</div>
                        <h1 className="text-3xl font-black text-white mb-1">Match Madness</h1>
                        <p className="text-zinc-400 font-medium text-sm">{gameData.title}</p>
                    </div>
                    <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-5 space-y-3">
                        <h2 className="font-black text-white text-sm uppercase tracking-widest mb-2">¿Cómo funciona?</h2>
                        <p className="text-zinc-400 text-sm leading-relaxed">Empareja palabras en español con su traducción en inglés contra reloj. Completa los 3 checkpoints para ganar la corona.</p>
                        <div className="space-y-2 pt-2">
                            {CROWNS.map((c,i)=>(
                                <div key={i} className={`flex items-center justify-between rounded-xl px-3 py-2.5 border ${i===0?'bg-amber-950/30 border-amber-800/50':'bg-zinc-950 border-zinc-800'}`}>
                                    <div className="flex items-center gap-2">
                                        <span className={`text-lg ${c.color}`}>{c.emoji}</span>
                                        <div>
                                            <p className={`font-black text-xs ${c.color}`}>{c.name}</p>
                                            <p className="text-zinc-500 text-[10px]">{c.perCP}×3 = {c.perCP*3} pares</p>
                                        </div>
                                    </div>
                                    <span className="text-zinc-500 font-bold text-xs">{Math.floor(c.time/60)}:{(c.time%60).toString().padStart(2,'0')}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="flex gap-2 mb-5">
                        <button onClick={()=>{loadLB();setShowLB(true)}} className="flex-1 btn-juicy bg-zinc-800 text-zinc-300 font-bold py-3 rounded-xl border-2 border-b-4 border-zinc-900 text-xs flex items-center justify-center gap-1.5"><Trophy size={14}/> Ranking</button>
                        <button onClick={()=>setShowVocab(true)} className="flex-1 btn-juicy bg-zinc-800 text-zinc-300 font-bold py-3 rounded-xl border-2 border-b-4 border-zinc-900 text-xs flex items-center justify-center gap-1.5"><BookOpen size={14}/> Vocabulario</button>
                    </div>
                    <input type="text" placeholder="Tu nombre..." value={playerName} onChange={e=>setPlayerName(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&playerName.trim()&&startCrown(0)}
                        className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center text-lg font-bold text-white mb-4 outline-none focus:border-amber-500" style={{fontSize:'16px'}}/>
                    <button disabled={!playerName.trim()} onClick={()=>startCrown(0)}
                        className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-lg uppercase tracking-widest flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                        <Play fill="currentColor" size={22}/> JUGAR
                    </button>
                </div>
            </div>
        </div>
    );

    /* ─ PLAYING / CHECKPOINT ─ */
    if(screen==='playing'||screen==='checkpoint'){
        const pct=(score/totalPairs)*100;const isLow=timeLeft<20;
        const m=Math.floor(Math.ceil(timeLeft)/60);const s=Math.ceil(timeLeft)%60;
        return(
            <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden relative">
                <PauseOverlay/>
                {milestone&&(
                    <div className="fixed top-28 left-1/2 z-50 animate-milestone pointer-events-none" style={{transform:'translateX(-50%)'}}>
                        <div className="bg-zinc-800 border-2 border-amber-500/50 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
                            <span className="text-3xl">{milestone.emoji}</span>
                            <div><p className="font-black text-white text-lg">{milestone.count} pares</p><p className="text-amber-400 font-bold text-sm">{milestone.text}</p></div>
                        </div>
                    </div>
                )}

                {/* BANNER CON PAUSA */}
                <TopBanner showPause={true}/>

                {/* barra de progreso + tiempo */}
                <div className="px-4 py-2 flex items-center gap-3 shrink-0 bg-zinc-900/80 border-b border-zinc-800/50">
                    <div className="flex-1 relative">
                        <div className="h-3 w-full bg-zinc-800 rounded-full overflow-hidden relative">
                            <div className={`h-full rounded-full transition-all duration-300 ${isLow?'bg-rose-500':'bg-amber-500'}`} style={{width:`${pct}%`}}/>
                            {[1,2].map(cp=>(
                                <div key={cp} className="absolute top-1/2 -translate-y-1/2" style={{left:`${(cp*crown.perCP/totalPairs)*100}%`}}>
                                    <div className={`w-2 h-5 rounded-full ${score>=cp*crown.perCP?'bg-amber-400':'bg-zinc-600'}`}/>
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-between mt-0.5">
                            <span className="text-[10px] text-zinc-500 font-bold">{score}/{totalPairs}</span>
                            <span className={`text-[10px] font-bold ${crown.color}`}>{crown.emoji} Crown {crownIdx+1}</span>
                        </div>
                    </div>
                    <div className={`font-black text-lg tabular-nums min-w-[50px] text-right ${isLow?'text-rose-500 animate-pulse':'text-amber-500'}`}>{m}:{s.toString().padStart(2,'0')}</div>
                </div>

                <div className="flex px-4 sm:px-8 max-w-2xl mx-auto w-full pt-3 pb-1">
                    <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Español</p>
                    <p className="flex-1 text-center text-zinc-500 font-bold text-[10px] uppercase tracking-widest">English</p>
                </div>

                {/* onClickCapture en el main — UN solo handler estable, cero closures por botón */}
                <main className="flex-1 flex gap-3 sm:gap-4 px-4 sm:px-8 pb-6 max-w-2xl mx-auto w-full items-center"
                    onClickCapture={e=>{
                        const btn=e.target.closest('[data-side]');
                        if(btn)handleClick(btn.dataset.side,+btn.dataset.idx);
                    }}>
                    <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">{board.map((r,i)=><WordBtn key={`l-${r.key}`} item={r.left} side="left" idx={i}/>)}</div>
                    <div className="flex-1 flex flex-col gap-2.5 sm:gap-3 justify-center">{board.map((r,i)=><WordBtn key={`r-${r.key}`} item={r.right} side="right" idx={i}/>)}</div>
                </main>
            </div>
        );
    }

    /* ─ CHECKPOINT FAIL ─ */
    if(screen==='checkpointFail')return(
        <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden">
            <TopBanner/>
            <VocabModal/>
            <div className="flex-1 flex items-center justify-center p-6 overflow-y-auto">
                <div className="max-w-sm w-full text-center my-auto">
                    <div className="text-6xl mb-4">⏱️</div>
                    <h2 className="text-2xl font-black text-rose-400 mb-2">Se acabó el tiempo</h2>
                    <p className="text-zinc-400 font-bold mb-1">{score} pares completados</p>
                    <p className="text-zinc-500 text-sm mb-8">Checkpoint {cpIdx+1} de {crown.checkpoints} — {cpMatched}/{crown.perCP} pares de este checkpoint.</p>
                    {cpIdx>0?(
                        <div className="space-y-3">
                            <p className="text-zinc-400 text-xs mb-3">Puedes reintentar este checkpoint (pierdes el bonus de perfección).</p>
                            <button onClick={()=>{setTimeLeft(30);retryCP()}} className="btn-juicy w-full bg-amber-500 text-black font-black py-4 rounded-2xl border-2 border-b-4 border-amber-700 text-sm uppercase tracking-widest flex items-center justify-center gap-2"><RotateCcw size={18}/> Reintentar (+30s)</button>
                            <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">Volver al menú</button>
                        </div>
                    ):(
                        <div className="space-y-3">
                            <button onClick={()=>startCrown(crownIdx)} className="btn-juicy w-full bg-emerald-500 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-emerald-700 text-sm uppercase tracking-widest flex items-center justify-center gap-2"><RotateCcw size={18}/> Reintentar desde cero</button>
                            <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest">Volver al menú</button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );

    /* ─ CROWN WON ─ */
    if(screen==='crownWon'){
        const timeTaken=crown.time-Math.ceil(timeLeft);
        const tm=Math.floor(timeTaken/60);const ts=timeTaken%60;
        const isPerfect=retries===0;
        const hasNextCrown=crownIdx<CROWNS.length-1;
        return(
            <div className="h-[100dvh] flex flex-col bg-zinc-950 overflow-hidden">
                <TopBanner/>
                <VocabModal/><LBModal/>
                <div className="flex-1 overflow-y-auto flex items-center justify-center p-4">
                    <div className="max-w-sm w-full text-center my-auto">
                        <div className={`text-7xl mb-3 ${crown.color}`}>👑</div>
                        <h2 className="text-3xl font-black text-white mb-1">¡{crown.name}!</h2>
                        {isPerfect&&<p className="text-emerald-400 font-bold text-sm mb-2">✓ Perfecto — sin reintentos (+20 bonus)</p>}
                        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-6">
                            <div className="flex justify-around mb-3">
                                <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Pares</p><p className="text-xl font-black text-white">{totalPairs}</p></div>
                                <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Tiempo</p><p className="text-xl font-black text-white">{tm}:{ts.toString().padStart(2,'0')}</p></div>
                                <div className="text-center"><p className="text-zinc-500 text-[10px] font-bold uppercase">Score</p><p className="text-xl font-black text-amber-400">{score}</p></div>
                            </div>
                            <div className="text-[10px] text-zinc-500 font-bold space-y-0.5">
                                <p>Pares: {totalPairs} pts + Tiempo restante: {Math.ceil(timeLeft)} pts {isPerfect?'+ Perfecto: 20 pts':''}</p>
                            </div>
                        </div>
                        <div className="space-y-3">
                            {hasNextCrown&&(
                                <button onClick={()=>startCrown(crownIdx+1)} className="btn-juicy w-full bg-indigo-600 text-white font-black py-4 rounded-2xl border-2 border-b-4 border-indigo-800 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                    <Crown size={18}/> Siguiente Corona ({CROWNS[crownIdx+1].name})
                                </button>
                            )}
                            <button onClick={()=>{loadLB();setShowLB(true)}} className="btn-juicy w-full bg-amber-500/10 text-amber-400 font-black py-3 rounded-2xl border-2 border-b-4 border-amber-500/20 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                <Trophy size={16}/> Ver Ranking
                            </button>
                            <button onClick={()=>setShowVocab(true)} className="btn-juicy w-full bg-zinc-800 text-zinc-300 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-900 text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                                <BookOpen size={16}/> ¿Qué hay en este juego?
                            </button>
                            <button onClick={()=>setScreen('menu')} className="btn-juicy w-full bg-zinc-900 text-zinc-500 font-black py-3 rounded-2xl border-2 border-b-4 border-zinc-950 text-sm uppercase tracking-widest">
                                Volver al inicio
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    return null;
};

createRoot(document.getElementById('root')).render(<MatchGame/>);
</script>
</body>
</html>

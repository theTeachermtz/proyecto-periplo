<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LingoMatch Pro | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; height: 100dvh; background-color: #f0f9ff; }
        .btn-3d { transition: all 0.1s; border-bottom-width: 4px; }
        .btn-3d:active:not(:disabled) { border-bottom-width: 0px; transform: translateY(4px); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, getDoc, onSnapshot, updateDoc, setDoc } from 'firebase/firestore';
        import { Users, Play, CheckCircle2, XCircle, Trophy, User, Pause, AlertTriangle, BookOpen, LogIn, Plus, Eye } from 'lucide-react';

        // Configuración idéntica a tu UNO
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        const MatchGame = () => {
            const [user, setUser] = useState(null);
            const [deckData, setDeckData] = useState(null);
            const [roomCode, setRoomCode] = useState('');
            const [roomData, setRoomData] = useState(null);
            const [selection, setSelection] = useState({ col0: null, col1: null, col2: null });
            const [feedback, setFeedback] = useState('none');
            const [errorModal, setErrorModal] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const deckId = params.get('id');
                signInAnonymously(auth).then(cred => setUser(cred.user));
                
                if (deckId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId)).then(snap => {
                        if (snap.exists()) setDeckData(snap.data().content);
                    });
                }
            }, []);

            // Lógica de conexión a sala sincronizada con Firestore
            useEffect(() => {
                if (!roomCode) return;
                const unsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode), (snap) => {
                    if (snap.exists()) setRoomData(snap.data());
                });
                return () => unsubscribe();
            }, [roomCode]);

            const handleCreateRoom = async () => {
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                await setDoc(roomRef, {
                    gameState: 'roles',
                    players: [
                        { id: 'p1', name: 'Jugador 1', score: 0, color: 'bg-blue-500', occupied: false, uid: null },
                        { id: 'p2', name: 'Jugador 2', score: 0, color: 'bg-pink-500', occupied: false, uid: null }
                    ],
                    currentTurn: 'p1',
                    matchedUids: []
                });
                setRoomCode(code);
            };

            if (!roomData) return (
                <div className="h-full flex flex-col items-center justify-center p-6 bg-sky-50">
                    <h1 className="text-4xl font-black text-sky-600 mb-8">LingoMatch Pro</h1>
                    <button onClick={handleCreateRoom} className="btn-3d bg-green-500 text-white font-bold py-4 px-8 rounded-2xl border-green-700 text-xl mb-4">Crear Sala</button>
                    <div className="flex gap-2">
                        <input placeholder="CÓDIGO" className="p-4 rounded-2xl border-2 border-sky-200 uppercase font-black text-center" onChange={e => setRoomCode(e.target.value.toUpperCase())} />
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col bg-white">
                    <header className="p-4 border-b flex justify-between items-center">
                        <span className="font-black text-sky-600">SALA: {roomCode}</span>
                        <div className="flex gap-4">
                            {roomData.players.map(p => <span key={p.id} className={`${p.color} text-white px-3 py-1 rounded-xl font-bold text-sm`}>{p.score}</span>)}
                        </div>
                    </header>
                    <main className="flex-1 grid grid-cols-3 gap-4 p-4 items-center">
                        {/* Aquí se renderizarían las columnas dinámicas según deckData */}
                        <div className="text-center text-slate-400 font-bold italic col-span-3">Cargando tablero dinámico...</div>
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MatchGame />);
    </script>
</body>
</html>

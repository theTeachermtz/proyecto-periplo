<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Builder IA | Periplo Español</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-taxonomy-es.js"></script>
    <script src="periplo-ai.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { BookOpen, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Image as ImageIcon, Trash2, Plus, CheckCircle2, Tags, X, RefreshCw } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // RUTAS DE FIREBASE — ESPAÑOL (Anita)
        // ============================================================
        const FS_APP_ID   = 'periplo-app-v1';
        const TEACHER_UID = 'teacher_anita_001';

        const { TAXONOMY, NEW_LEVELS, NEW_CATS, MACRO_SKILLS, getAllTopicsForCategory } = window.PERIPLO_TAXONOMY_ES;

        // IA Assistant compartido (periplo-ai.js)
        const AI = window.PERIPLO_AI;
        const ApiKeyBar = AI.createApiKeyBar(React);

        const Dashboard = () => {
            const [apiKey, setApiKey]                         = useState("");
            const [availableModels, setAvailableModels]       = useState([]);
            const [selectedModel, setSelectedModel]           = useState('');
            const [isLoadingModels, setIsLoadingModels]       = useState(false);
            const [showApiInput, setShowApiInput]             = useState(false);
            const [isGenerating, setIsGenerating]             = useState(false);
            const [isGeneratingQuestions, setIsGeneratingQuestions] = useState(false);
            const [isSaving, setIsSaving]                     = useState(false);
            const [editingId, setEditingId]                   = useState(null);

            const [title, setTitle]           = useState("");
            const [topic, setTopic]           = useState("");
            const [genre, setGenre]           = useState("ARTICLE");
            const [aiLevel, setAiLevel]       = useState("intermedio");
            const [targetWords, setTargetWords] = useState("");

            const [stories, setStories]               = useState([]);
            const [editingStoryIdx, setEditingStoryIdx] = useState(-1);
            const [authorName, setAuthorName]           = useState("");

            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels]       = useState([]);
            const [saveCats, setSaveCats]           = useState([]);
            const [saveTopics, setSaveTopics]       = useState([]);

            const toggleSelection = (stateArray, setStateFunction, item) => {
                if (stateArray.includes(item)) setStateFunction(stateArray.filter(i => i !== item));
                else setStateFunction([...stateArray, item]);
            };

            useEffect(() => {
                const savedKey = AI.loadKey();
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, `artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`, editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setGenre(data.genre || 'ARTICLE');
                            setEditingId(editId);
                            if (data.stories) setStories(data.stories);
                            else if (data.content) setStories([{...data.content, title: data.title}]);
                            if (data.authorName) setAuthorName(data.authorName);
                            if (data.tags) {
                                setSaveLevels(data.tags.levels || []);
                                setSaveCats(data.tags.categories || []);
                                setSaveTopics(data.tags.topics || []);
                                setAiLevel(data.tags.levels?.[0]?.startsWith('AV') ? 'avanzado' : data.tags.levels?.[0]?.startsWith('A') ? 'intermedio' : 'basico');
                            }
                        }
                    });
                }
            }, []);

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const validModels = await AI.fetchModels(apiKey);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) setSelectedModel(AI.pickPreferredModel(validModels));
                } catch (e) { alert("Error al buscar modelos: " + e.message); }
                finally { setIsLoadingModels(false); }
            };

            const getWordCount = (text) => {
                if (!text) return 0;
                return text.trim().split(/\s+/).filter(word => word.length > 0).length;
            };

            // ============================================================
            // GENERADOR DE TEXTO — Siempre en ESPAÑOL, para anglófonos
            // ============================================================
            const generateStoryWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!topic)  { alert("Escribe un tema primero."); return; }

                setIsGenerating(true);
                try {
                    let levelRules = "";
                    let targetMinWords = 200;
                    let targetMaxWords = 400;

                    if (aiLevel === 'basico') {
                        levelRules = `NIVEL BÁSICO (A1/A2): El texto está escrito en español SIMPLE. Usa vocabulario cotidiano, frases cortas y estructuras del presente de indicativo. Vocabulario de uso diario (familia, comida, rutina, colores). Evita subjuntivo, pasado complejo o vocabulario formal.`;
                        targetMinWords = 100; targetMaxWords = 180;
                    } else if (aiLevel === 'intermedio') {
                        levelRules = `NIVEL INTERMEDIO (B1/B2): El texto está en español natural y fluido. Usa una mezcla de presente, pasado (indefinido e imperfecto) y algún futuro. Vocabulario útil y real, conectores básicos (porque, aunque, sin embargo). No es un libro de texto — debe sonar como un artículo real.`;
                        targetMinWords = 280; targetMaxWords = 380;
                    } else {
                        levelRules = `NIVEL AVANZADO (B2/C1+): El texto está en español rico y matizado. Usa subjuntivo cuando corresponda, condicionales, voz pasiva, modismos en español y expresiones idiomáticas auténticas. Debe sonar como un artículo de revista o periódico hispano de calidad.`;
                        targetMinWords = 380; targetMaxWords = 480;
                    }

                    let specificRules = "";
                    if (genre === 'BIOGRAPHY') {
                        specificRules = `Redacta una biografía en español sobre el tema dado. Narra la historia de forma interesante, no solo fechas. EXTENSIÓN: entre ${targetMinWords} y ${targetMaxWords} palabras.`;
                        if (aiLevel === 'basico') { targetMinWords = 80; targetMaxWords = 120; specificRules = `Redacta una biografía MUY BREVE en español simple. Oraciones cortas. EXTENSIÓN: entre 80 y 120 palabras.`; }
                    } else if (genre === 'ARTICLE') {
                        specificRules = `Redacta como un artículo de una revista hispana moderna (ej. Gatopardo, El País Semanal). Analiza el tema con un tono inteligente pero accesible. EXTENSIÓN: entre ${targetMinWords} y ${targetMaxWords} palabras.`;
                    } else if (genre === 'ARTICLE_INFORMAL') {
                        specificRules = `Redacta como un post de blog muy informal en español latinoamericano. Tono conversacional, directo, como si le hablaras a un amigo. EXTENSIÓN: entre ${targetMinWords} y ${targetMaxWords} palabras.`;
                    } else if (genre === 'REDDIT') {
                        specificRules = `Escribe un post estilo Reddit hispano (ej. r/mexico, r/desahogo). Usa jerga de internet en español, tono muy personal e informal.`;
                    } else if (genre === 'TRIPADVISOR') {
                        specificRules = `Redacta como una guía turística o reseña de viaje en español sobre el destino mencionado en el tema. Usa vocabulario descriptivo de turismo y cultura local.`;
                    } else if (genre === 'DIALOGUE_QA') {
                        specificRules = `Escribe en formato de diálogo o entrevista en español (Q/A entre dos personas). Indica claramente los nombres de los hablantes.`;
                    } else if (genre === 'STORY') {
                        specificRules = `Escribe un cuento o historia corta en español. Narrativa clara con inicio, desarrollo y desenlace.`;
                    } else if (genre === 'EMAIL') {
                        specificRules = `Escribe un correo electrónico o carta formal/informal en español sobre el tema indicado.`;
                    } else {
                        specificRules = `Asegúrate de que el texto fluya bien en español y tenga sentido de principio a fin.`;
                    }

                    const prompt = `Crea un texto educativo de comprensión lectora EN ESPAÑOL para estudiantes angloparlantes que están aprendiendo el idioma.

IDIOMA: Español (siempre — el texto COMPLETO debe estar en español, incluyendo título y fun_fact).
TEMA: ${topic}
FORMATO/GÉNERO: ${genre}
PALABRAS CLAVE a incluir (si hay): ${targetWords || 'ninguna en particular'}

${levelRules}

REGLAS DE GÉNERO Y EXTENSIÓN:
${specificRules}

INSTRUCCIONES ESTRUCTURALES:
1. "title": Un título creativo EN ESPAÑOL.
2. "text": El cuerpo del texto EN ESPAÑOL. Separa bien en párrafos. DENTRO del texto, envuelve entre corchetes [ ] unas 10 a 15 palabras o frases clave en español que el alumno deberá adivinar. Prioriza palabras del nivel indicado. Ejemplo: "Todos los días [me levanto] temprano y [desayuno] con mi familia."
3. "fun_fact": Un dato curioso EN ESPAÑOL relacionado al texto (2-3 oraciones). Puede incluir curiosidades culturales, históricas o lingüísticas del mundo hispano.

Responde ÚNICAMENTE con un JSON válido con esta estructura exacta (NO agregues preguntas aún):
{
    "title": "...",
    "text": "Texto en español con los [huecos] integrados directamente aquí...",
    "fun_fact": "...",
    "image_url": ""
}`;

                    const resultText = await AI.callGemini({ apiKey, model: selectedModel, prompt });
                    const parsedData = AI.extractJSON(resultText);

                    parsedData.blanks    = [];
                    parsedData.questions = [];
                    parsedData.minWords  = targetMinWords;
                    parsedData.maxWords  = targetMaxWords;

                    setStories([...stories, parsedData]);
                    if (!title) setTitle(topic);
                } catch (error) {
                    alert("Error con la IA. Intenta reformular el tema o revisa tu conexión.");
                    console.error(error);
                } finally {
                    setIsGenerating(false);
                }
            };

            // ============================================================
            // GENERADOR DE PREGUNTAS — en el idioma del texto (español)
            // ============================================================
            const generateQuestionsOnlyWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                const currentText = stories[editingStoryIdx].text;
                if (!currentText || currentText.trim() === '') { alert("No hay texto base para generar preguntas."); return; }

                setIsGeneratingQuestions(true);
                try {
                    const prompt = `Aquí tienes un texto en español:
"${currentText}"

Basándote ÚNICAMENTE en este texto, genera EXACTAMENTE 5 preguntas de comprensión lectora de opción múltiple EN ESPAÑOL.
Cada pregunta debe tener 4 opciones lógicas y plausibles en español, e indica el índice (0, 1, 2 o 3) de la respuesta correcta. Mezcla aleatoriamente la posición de la respuesta correcta.

Responde ÚNICAMENTE con un JSON válido con esta estructura exacta:
[
    {"q": "¿Pregunta 1?", "options": ["Opción A", "Opción B", "Opción C", "Opción D"], "correctIndex": 1},
    {"q": "¿Pregunta 2?", "options": ["Opción A", "Opción B", "Opción C", "Opción D"], "correctIndex": 3}
]`;

                    let resultText = await AI.callGemini({ apiKey, model: selectedModel, prompt });
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedQuestions = JSON.parse(resultText);

                    const ns = [...stories];
                    ns[editingStoryIdx].questions = parsedQuestions;
                    setStories(ns);
                } catch (error) {
                    alert("Error generando preguntas.");
                    console.error(error);
                } finally {
                    setIsGeneratingQuestions(false);
                }
            };

            const removeStory    = (idx) => { if (confirm("¿Eliminar esta lectura?")) { const ns=[...stories]; ns.splice(idx,1); setStories(ns); } };
            const updateStory    = (field, value) => { const ns=[...stories]; ns[editingStoryIdx][field]=value; setStories(ns); };

            const handlePreSave = () => {
                if (!title) return alert("El título general de la colección es obligatorio.");
                if (stories.length === 0) return alert("Genera al menos una lectura.");
                setShowSaveModal(true);
            };

            // ============================================================
            // GUARDAR EN FIREBASE — Ruta de Anita
            // ============================================================
            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                try {
                    const params     = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                    const tags       = { levels: saveLevels, categories: saveCats, topics: saveTopics };

                    if (editingId) {
                        await updateDoc(doc(db, `artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`, editingId), {
                            title, genre, stories, tags, authorName, language: 'es', updatedAt: serverTimestamp()
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', FS_APP_ID, 'users', TEACHER_UID, 'quizzes'), {
                            title, type: 'READING', genre, stories, tags, authorName, language: 'es', createdAt: serverTimestamp(), parentPath
                        });
                    }
                    window.location.href = parentPath ? `index-es.html?folder=${encodeURIComponent(parentPath)}` : 'index-es.html';
                } catch (e) { alert("Error guardando: " + e.message); }
                finally { setIsSaving(false); }
            };

            const renderInteractiveBlankSelector = () => {
                const currentStory = stories[editingStoryIdx];
                if (!currentStory || !currentStory.text) return null;
                
                const regex  = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑüÜ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑüÜ\s\[\]]+|\s+)/g;
                const parts  = currentStory.text.match(regex) || [];
                const legacyBlanks = currentStory.blanks || [];
                
                const tokens = parts.map((part, index) => {
                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                    let cleanText   = isBracketed ? part.slice(1, -1) : part;
                    let isWord      = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑüÜ]+$/.test(cleanText);
                    let isHidden    = (isBracketed || legacyBlanks.includes(index)) && isWord;
                    return { id: index, text: cleanText, original: part, isWord, isHidden, isBracketed };
                });

                const toggleBlank = (idx, token) => {
                    if (!token.isWord) return;
                    const ns = [...stories];
                    let currentTokens = [...tokens];
                    currentTokens[idx].original = token.isHidden ? token.text : `[${token.text}]`;
                    ns[editingStoryIdx].text   = currentTokens.map(t => t.original).join('');
                    ns[editingStoryIdx].blanks = [];
                    setStories(ns);
                };

                const activeCount = tokens.filter(t => t.isHidden).length;

                return (
                    <div className="mb-8">
                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                            <span>Selector de Palabras (Word Bank)</span>
                            <span className="text-orange-500 font-black bg-orange-100 dark:bg-orange-900/50 px-2 py-1 rounded-md">{activeCount} seleccionadas</span>
                        </label>
                        <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                            Haz clic en las palabras para ocultarlas. Para agrupar frases (ej. <strong>me levanto</strong>), escríbelas entre corchetes <strong>[me levanto]</strong> directamente en el texto.
                        </p>
                        <div className="p-4 md:p-6 bg-slate-100 dark:bg-zinc-950 rounded-2xl leading-loose text-base md:text-lg font-medium border border-slate-200 dark:border-zinc-800 shadow-inner h-64 overflow-y-auto custom-scrollbar">
                            {tokens.map((token, index) => {
                                if (!token.isWord) return <span key={index}>{token.original.match(/\n/) ? <br/> : token.original}</span>;
                                return (
                                    <span 
                                        key={index} 
                                        onClick={() => toggleBlank(index, token)}
                                        className={`cursor-pointer px-1 rounded transition-all select-none ${token.isHidden ? 'bg-orange-500 text-white font-bold shadow-md transform scale-105 inline-block mx-0.5' : 'hover:bg-orange-200 dark:hover:bg-orange-900 text-slate-700 dark:text-zinc-300 mx-0.5'}`}
                                    >
                                        {token.text}
                                    </span>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 relative">
                    
                    {/* ================================================================ */}
                    {/* MODAL DE GUARDADO                                               */}
                    {/* ================================================================ */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-white"><Tags className="text-orange-400"/> Clasificar Lectura — Español</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">
                                    <div>
                                        <label className="block text-xs font-black text-orange-400 uppercase tracking-widest mb-3">1. Nivel del Estudiante</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button key={lvl} onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-orange-600 border-orange-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-orange-500 hover:text-orange-300'}`}>
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categoría Gramatical</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button key={cat.id} onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">3. Temas Específicos</label>
                                            {saveCats.map(catId => {
                                                if (catId === 'otro') return null;
                                                const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                                const topics   = getAllTopicsForCategory(catId, saveLevels);
                                                if (topics.length === 0) return null;
                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button key={topic} onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>
                                                                    {topic}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {saveCats.includes('otro') && (
                                                <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                                                    <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {MACRO_SKILLS.map(skill => (
                                                            <button key={skill} onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                                className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-500 text-zinc-900 shadow-sm' : 'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}>
                                                                {skill}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <button onClick={executeFinalSave} disabled={isSaving || saveLevels.length === 0 || saveCats.length === 0}
                                    className="w-full mt-6 bg-orange-600 hover:bg-orange-500 disabled:opacity-50 disabled:bg-zinc-800 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>}
                                    {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar (Anita)"}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-sm z-10 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index-es.html'} className="p-2 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl transition"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-orange-500 dark:text-orange-400">
                                <BookOpen/> Reading Builder <span className="text-base">🇲🇽</span>
                            </h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-slate-400 hover:text-orange-500 transition"><KeyRound size={20}/></button>
                            <button onClick={handlePreSave} disabled={isSaving || stories.length === 0} className="bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white px-6 py-2 rounded-xl font-bold flex gap-2 shadow-lg transition-transform active:scale-95">
                                {isSaving ? <Loader2 className="animate-spin"/> : <Save/>} Guardar Actividad
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-hidden flex flex-col lg:flex-row">
                        
                        {/* PANEL IZQUIERDO: IA GENERADOR */}
                        <div className="w-full lg:w-1/3 bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 p-6 flex flex-col overflow-y-auto custom-scrollbar">
                            <h2 className="font-black text-lg mb-6 flex items-center gap-2"><Sparkles className="text-orange-500"/> Asistente IA — Español</h2>
                            
                            {showApiInput && (
                                <div className="mb-6">
                                    <ApiKeyBar
                                        variant="sidebar"
                                        accentBtn="bg-orange-500 hover:bg-orange-400 text-white"
                                        placeholder="Tu API Key de Gemini..."
                                        apiKey={apiKey} setApiKey={setApiKey}
                                        models={availableModels} selectedModel={selectedModel} setSelectedModel={setSelectedModel}
                                        isLoading={isLoadingModels} onFetch={fetchModels}
                                        onClear={() => setAvailableModels([])}
                                    />
                                </div>
                            )}

                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Tema / Prompt</label>
                                    <textarea value={topic} onChange={e => setTopic(e.target.value)} placeholder="Ej: La historia del Día de Muertos en México..." className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 focus:border-orange-500 h-24 resize-none"></textarea>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Nivel de Español</label>
                                        <select value={aiLevel} onChange={e => setAiLevel(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold text-orange-600 dark:text-orange-400">
                                            <option value="basico">Básico (A1/A2)</option>
                                            <option value="intermedio">Intermedio (B1/B2)</option>
                                            <option value="avanzado">Avanzado (C1+)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Idioma</label>
                                        <div className="w-full bg-orange-50 dark:bg-orange-900/20 p-3 rounded-xl border border-orange-200 dark:border-orange-800/50 font-black text-orange-600 dark:text-orange-400 text-sm flex items-center gap-2">
                                            🇲🇽 Español (fijo)
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Género Literario</label>
                                    <select value={genre} onChange={e => setGenre(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold">
                                        <option value="ARTICLE">Artículo Formal (Revista, Periódico)</option>
                                        <option value="ARTICLE_INFORMAL">Artículo Informal (Blog, De Compas)</option>
                                        <option value="BIOGRAPHY">Biografía</option>
                                        <option value="TRIPADVISOR">TripAdvisor / Turismo Hispano</option>
                                        <option value="STORY">Historia / Cuento</option>
                                        <option value="DIALOGUE_QA">Diálogo (Entrevista / Podcast)</option>
                                        <option value="EMAIL">Email / Carta</option>
                                        <option value="REDDIT">Reddit (r/mexico, r/desahogo)</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Palabras Clave en Español (Opcional)</label>
                                    <input value={targetWords} onChange={e => setTargetWords(e.target.value)} placeholder="Ej: mercado, artesanías, tradición..." className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800"/>
                                </div>

                                <button onClick={generateStoryWithAI} disabled={isGenerating} className="w-full bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 mt-4">
                                    {isGenerating ? <Loader2 className="animate-spin"/> : <Plus/>} Añadir Lectura al Módulo
                                </button>
                            </div>

                            <div className="mt-8 pt-6 border-t border-slate-200 dark:border-zinc-800">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Lecturas en este Módulo ({stories.length})</label>
                                <div className="space-y-2">
                                    {stories.map((s, i) => (
                                        <div key={i} onClick={() => setEditingStoryIdx(i)} className={`p-3 rounded-xl flex items-center justify-between cursor-pointer border transition-colors ${editingStoryIdx === i ? 'bg-orange-50 border-orange-200 dark:bg-orange-900/20 dark:border-orange-700' : 'bg-slate-50 border-slate-200 dark:bg-zinc-800/50 dark:border-zinc-700/50 hover:border-slate-300 dark:hover:border-zinc-600'}`}>
                                            <span className="font-bold text-sm truncate pr-4">{i+1}. {s.title}</span>
                                            <div className="flex gap-1 shrink-0">
                                                <button onClick={(e) => { e.stopPropagation(); removeStory(i); if(editingStoryIdx === i) setEditingStoryIdx(-1); }} className="text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-900/30 p-1.5 rounded-lg transition-colors"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {stories.length === 0 && <p className="text-sm text-slate-400 italic">No hay lecturas aún.</p>}
                                </div>
                            </div>
                        </div>

                        {/* PANEL DERECHO: EDITOR DE LA LECTURA SELECCIONADA */}
                        <div className="flex-1 bg-slate-50 dark:bg-zinc-950 p-6 md:p-10 overflow-y-auto custom-scrollbar">
                            <input value={title} onChange={e => setTitle(e.target.value)} className="text-3xl md:text-5xl font-black w-full border-b-4 border-slate-200 dark:border-zinc-800 pb-2 mb-3 bg-transparent outline-none focus:border-orange-500" placeholder="Nombre de la Colección en Español..."/>
                            
                            <div className="flex items-center gap-4 mb-8">
                                <div className="flex-1 flex items-center gap-2">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest shrink-0">By</label>
                                    <input value={authorName} onChange={e => setAuthorName(e.target.value)} className="bg-transparent outline-none text-sm font-bold text-orange-600 dark:text-orange-400 border-b border-transparent focus:border-orange-500 pb-0.5 w-48" placeholder="Nombre del autor..."/>
                                </div>
                                {editingId && (
                                    <button onClick={() => window.open(`reading-es.html?id=${editingId}`, '_blank')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold bg-orange-100 dark:bg-orange-900/50 text-orange-600 dark:text-orange-400 hover:bg-orange-200 dark:hover:bg-orange-900/80 transition-colors">
                                        <BookOpen size={14}/> Preview
                                    </button>
                                )}
                            </div>

                            {editingStoryIdx !== -1 && stories[editingStoryIdx] ? (
                                <div className="max-w-4xl mx-auto bg-white dark:bg-zinc-900 rounded-[2rem] shadow-xl p-8 border border-slate-100 dark:border-zinc-800 animate-in fade-in">
                                    <div className="mb-6">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Título de la Lectura</label>
                                        <input value={stories[editingStoryIdx].title} onChange={e => updateStory('title', e.target.value)} className="text-2xl font-black w-full bg-transparent outline-none border-b border-transparent focus:border-orange-500 pb-1"/>
                                    </div>
                                    
                                    <div className="mb-6">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Imagen Decorativa (URL)</label>
                                        <div className="flex gap-2 items-center">
                                            <ImageIcon className="text-slate-400"/>
                                            <input 
                                                value={stories[editingStoryIdx].image_url || ''} 
                                                onChange={e => updateStory('image_url', e.target.value)}
                                                onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('ring-2', 'ring-orange-500'); }}
                                                onDragLeave={e => e.currentTarget.classList.remove('ring-2', 'ring-orange-500')}
                                                onDrop={e => {
                                                    e.preventDefault();
                                                    e.currentTarget.classList.remove('ring-2', 'ring-orange-500');
                                                    const html = e.dataTransfer.getData('text/html');
                                                    const text = e.dataTransfer.getData('text/plain');
                                                    let url = text;
                                                    if (html) { const match = html.match(/src\s*=\s*"([^"]+)"/i); if (match && match[1]) url = match[1]; }
                                                    if (url) updateStory('image_url', url);
                                                }}
                                                placeholder="Arrastra aquí una imagen de Google o pega el URL..." 
                                                className="flex-1 bg-slate-50 dark:bg-zinc-950 p-2 rounded-lg outline-none border border-slate-200 dark:border-zinc-800 focus:border-orange-500 text-sm transition-all"
                                            />
                                        </div>
                                        {stories[editingStoryIdx].image_url && (
                                            <div className="mt-3 rounded-xl overflow-hidden h-32 relative">
                                                <img src={stories[editingStoryIdx].image_url} alt="Preview" className="w-full h-full object-cover" onError={e => e.target.style.display='none'}/>
                                                <div className="absolute inset-0 bg-gradient-to-t from-zinc-900/80 to-transparent"></div>
                                                <span className="absolute bottom-2 left-3 text-[10px] font-bold text-white/60 uppercase tracking-widest">Background preview</span>
                                            </div>
                                        )}
                                    </div>

                                    <div className="mb-8">
                                        <div className="flex justify-between items-end mb-2">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block">Cuerpo del Texto en Español (Usa [corchetes] para agrupar frases)</label>
                                            <span className={`text-xs font-bold px-2 py-1 rounded-md transition-colors ${getWordCount(stories[editingStoryIdx].text) >= (stories[editingStoryIdx].minWords || 100) && getWordCount(stories[editingStoryIdx].text) <= (stories[editingStoryIdx].maxWords || 500) ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-400' : 'bg-slate-200 text-slate-600 dark:bg-zinc-800 dark:text-slate-400'}`}>
                                                {getWordCount(stories[editingStoryIdx].text)} palabras
                                            </span>
                                        </div>
                                        <textarea value={stories[editingStoryIdx].text} onChange={e => updateStory('text', e.target.value)} className="w-full h-48 bg-slate-50 dark:bg-zinc-950 p-4 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 focus:border-orange-500 resize-y leading-relaxed font-medium"></textarea>
                                    </div>

                                    {renderInteractiveBlankSelector()}

                                    <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-400 rounded-r-xl">
                                        <label className="text-xs font-bold text-amber-600 dark:text-amber-500 uppercase tracking-widest mb-1 block">¿Sabías que...? (Fun Fact)</label>
                                        <textarea value={stories[editingStoryIdx].fun_fact} onChange={e => updateStory('fun_fact', e.target.value)} className="w-full bg-transparent outline-none font-medium resize-y min-h-[60px] custom-scrollbar"></textarea>
                                    </div>

                                    {/* PREGUNTAS DE OPCIÓN MÚLTIPLE */}
                                    <div className="mb-8 border-t border-slate-200 dark:border-zinc-800 pt-6">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">
                                                Preguntas de Comprensión ({stories[editingStoryIdx].questions?.length || 0})
                                            </label>
                                            <div className="flex items-center gap-2">
                                                <button onClick={generateQuestionsOnlyWithAI} disabled={isGeneratingQuestions}
                                                    className="bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-400 px-3 py-1.5 rounded-lg flex items-center gap-2 hover:bg-amber-200 dark:hover:bg-amber-900/80 transition-colors font-bold text-sm shadow-sm">
                                                    {isGeneratingQuestions ? <Loader2 className="animate-spin" size={16}/> : <RefreshCw size={16}/>}
                                                    IA: Generar 5 Preguntas
                                                </button>
                                                <button onClick={() => {
                                                    const ns = [...stories];
                                                    if (!ns[editingStoryIdx].questions) ns[editingStoryIdx].questions = [];
                                                    ns[editingStoryIdx].questions.push({ q: 'Nueva pregunta...', options: ['Opción 1', 'Opción 2', 'Opción 3', 'Opción 4'], correctIndex: 0 });
                                                    setStories(ns);
                                                }} className="bg-orange-100 dark:bg-orange-900/50 text-orange-600 dark:text-orange-400 px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-orange-200 transition-colors font-bold text-sm"><Plus size={16}/> Manual</button>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="bg-orange-50 dark:bg-orange-900/10 border border-orange-200 dark:border-orange-800/50 rounded-xl p-3 text-xs text-orange-700 dark:text-orange-400 font-medium leading-relaxed">
                                                <strong>¿Cómo funciona?</strong> Al terminar la lectura, el alumno responderá estas preguntas en español. Escribe la pregunta, llena las 4 opciones y <strong>selecciona el círculo</strong> de la respuesta correcta.
                                            </div>
                                            
                                            {stories[editingStoryIdx].questions?.map((q, qIdx) => {
                                                const options    = q.options || [q.a || "Respuesta correcta", "Distractor 1", "Distractor 2", "Distractor 3"];
                                                const correctIdx = q.correctIndex !== undefined ? q.correctIndex : 0;
                                                return (
                                                    <div key={qIdx} className="bg-slate-50 dark:bg-zinc-950 p-5 rounded-2xl border border-slate-200 dark:border-zinc-800 relative group">
                                                        <button onClick={() => { const ns=[...stories]; ns[editingStoryIdx].questions.splice(qIdx,1); setStories(ns); }} className="absolute top-4 right-4 text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-900/30 p-1.5 rounded-md opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button>
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Pregunta {qIdx + 1}</label>
                                                        <input value={q.q} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].q=e.target.value; setStories(ns); }} placeholder="Escribe la pregunta en español..." className="w-11/12 bg-transparent font-bold outline-none mb-5 text-lg text-orange-900 dark:text-orange-300"/>
                                                        <div className="space-y-2.5">
                                                            {options.map((opt, optIdx) => (
                                                                <div key={optIdx} className="flex items-center gap-3">
                                                                    <button onClick={() => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].correctIndex=optIdx; if(!ns[editingStoryIdx].questions[qIdx].options) ns[editingStoryIdx].questions[qIdx].options=options; setStories(ns); }}
                                                                        className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-all ${correctIdx===optIdx ? 'border-emerald-500 bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]' : 'border-slate-300 dark:border-zinc-600 hover:border-emerald-400 cursor-pointer'}`}>
                                                                        {correctIdx===optIdx && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                                                    </button>
                                                                    <input value={opt} onChange={e => { const ns=[...stories]; if(!ns[editingStoryIdx].questions[qIdx].options) ns[editingStoryIdx].questions[qIdx].options=[...options]; ns[editingStoryIdx].questions[qIdx].options[optIdx]=e.target.value; setStories(ns); }} placeholder={`Opción ${optIdx+1}`}
                                                                        className={`flex-1 p-3 rounded-xl outline-none font-medium text-sm transition-all border ${correctIdx===optIdx ? 'bg-emerald-50/50 border-emerald-200 text-emerald-900 dark:bg-emerald-900/10 dark:border-emerald-500/50 dark:text-emerald-100' : 'bg-white border-slate-200 dark:bg-zinc-900 dark:border-zinc-800 focus:border-orange-500'}`}/>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {(!stories[editingStoryIdx].questions || stories[editingStoryIdx].questions.length === 0) && (
                                                <p className="text-sm text-slate-400 italic py-4">No hay preguntas aún. Usa "IA: Generar" o añade una manual.</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 dark:border-zinc-800 rounded-3xl bg-white/50 dark:bg-zinc-900/50">
                                    <BookOpen size={48} className="mb-4 opacity-50"/>
                                    <p className="font-bold text-lg">Selecciona o genera una lectura en el panel izquierdo</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

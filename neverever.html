<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Never Have I Ever | Periplo Games</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤫</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-2px, 0, 0) rotate(-2deg)' },
                            '20%, 80%': { transform: 'translate3d(4px, 0, 0) rotate(2deg)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-6px, 0, 0) rotate(-4deg)' },
                            '40%, 60%': { transform: 'translate3d(6px, 0, 0) rotate(4deg)' }
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }
            }
        };
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        
        @media (hover: hover) { .hover-scale:hover { transform: scale(1.05); transition: transform 0.2s; } }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        
        .table-gradient { background: radial-gradient(circle, #1e1b4b 0%, #0f172a 70%); }
        .avatar-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .vote-hidden { filter: blur(4px) brightness(0.5); }
    </style>
</head>
<body class="bg-slate-950 text-white h-[100dvh] w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, arrayUnion } from 'firebase/firestore';
        import { Users, Play, Crown, Eye, ArrowRight, ShieldCheck, HeartCrack, Info, Zap, DoorOpen, Home, Check } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const AVATARS = ["💸", "💋", "👽", "🤡", "🤠", "😈", "👻", "💩", "🦄", "💅", "🐸", "😎"];
        
        // Secuencia de luces: 2 Verdes, Amarilla, Naranja, 2 Rojas
        const LIGHT_COLORS = ['bg-emerald-500', 'bg-lime-400', 'bg-yellow-400', 'bg-orange-500', 'bg-rose-500', 'bg-rose-700'];

        const generateId = () => Math.random().toString(36).substring(2, 6).toUpperCase();

        const NeverEverGame = () => {
            const [localPlayerId] = useState(() => localStorage.getItem('ne_playerId') || generateId());
            const [gameState, setGameState] = useState('loading'); // loading, menu, setup, lobby, playing, error
            const [sessionMode, setSessionMode] = useState(null); // 'host' or 'join'
            const [sessionCode, setSessionCode] = useState("");
            
            const [playerName, setPlayerName] = useState("");
            const [playerEmoji, setPlayerEmoji] = useState(AVATARS[0]);
            
            // Estados para el Menú Principal
            const [joinInputCode, setJoinInputCode] = useState("");
            const [hostInputId, setHostInputId] = useState("");

            const [sessionData, setSessionData] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                localStorage.setItem('ne_playerId', localPlayerId);
                const params = new URLSearchParams(window.location.search);
                const quizId = params.get('id');
                const joinCode = params.get('session');

                if (joinCode) {
                    setSessionMode('join');
                    setSessionCode(joinCode.toUpperCase());
                    setGameState('setup');
                } else if (quizId) {
                    setSessionMode('host');
                    initializeHostSession(quizId);
                } else {
                    // Si no hay parámetros, mostramos el Menú Principal
                    setGameState('menu');
                }
            }, []);

            const initializeHostSession = async (quizId) => {
                try {
                    setGameState('loading');
                    const quizRef = doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId);
                    const quizSnap = await getDoc(quizRef);
                    
                    if (!quizSnap.exists()) {
                        throw new Error("El Quiz ID no existe o no se encontró.");
                    }
                    
                    const data = quizSnap.data();
                    let allPhrases = [];
                    if(data.content && data.content.categories) {
                        data.content.categories.forEach(cat => {
                            cat.phrases.forEach(p => allPhrases.push(p));
                        });
                    } else {
                        throw new Error("El Quiz no tiene un formato válido para este juego.");
                    }
                    
                    // Shuffle
                    allPhrases = allPhrases.sort(() => Math.random() - 0.5);

                    const newCode = generateId();
                    const sessionRef = doc(db, 'artifacts/periplo-app-v1/sessions', newCode);
                    
                    await setDoc(sessionRef, {
                        hostId: localPlayerId,
                        quizTitle: data.title,
                        state: 'lobby', // lobby, voting, reveal, gameover
                        phrases: allPhrases,
                        currentIndex: 0,
                        players: [], // { id, name, emoji, lives: 6, vote: null }
                        createdAt: new Date().toISOString()
                    });

                    setSessionCode(newCode);
                    setSessionMode('host');
                    setGameState('setup');
                } catch (e) {
                    setErrorMsg(e.message);
                    setGameState('error');
                }
            };

            // Escuchar cambios en la sesión de Firebase
            useEffect(() => {
                if (!sessionCode || gameState === 'setup' || gameState === 'loading' || gameState === 'menu') return;
                
                const sessionRef = doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode);
                const unsubscribe = onSnapshot(sessionRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setSessionData(docSnap.data());
                    } else {
                        setErrorMsg("La sala se ha cerrado por el host.");
                        setGameState('error');
                    }
                });
                return () => unsubscribe();
            }, [sessionCode, gameState]);

            const joinGame = async () => {
                if (!playerName.trim()) return alert("Escribe tu nombre");
                setGameState('loading');
                
                const sessionRef = doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode);
                const snap = await getDoc(sessionRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    // Evitar duplicados si reconecta
                    const existingPlayer = data.players.find(p => p.id === localPlayerId);
                    
                    if (!existingPlayer) {
                        const newPlayer = { id: localPlayerId, name: playerName, emoji: playerEmoji, lives: 6, vote: null };
                        await updateDoc(sessionRef, { players: arrayUnion(newPlayer) });
                    }
                    setGameState('playing');
                } else {
                    setErrorMsg("Código de sala inválido o partida eliminada.");
                    setGameState('error');
                }
            };

            // Controles del Host
            const startGame = async () => {
                if(sessionData.players.length < 2) return alert("Se necesitan al menos 2 jugadores.");
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode), { state: 'voting' });
            };

            const revealVotes = async () => {
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode), { state: 'reveal' });
                
                // Deduct lives for those who voted 'have'
                const updatedPlayers = sessionData.players.map(p => {
                    if (p.vote === 'have' && p.lives > 0) return { ...p, lives: p.lives - 1 };
                    return p;
                });

                // Pequeno delay para la animación antes de guardar las vidas perdidas
                setTimeout(async () => {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode), { players: updatedPlayers });
                }, 1000);
            };

            const nextRound = async () => {
                const nextIndex = sessionData.currentIndex + 1;
                const alivePlayersCount = sessionData.players.filter(p => p.lives > 0).length;
                const isOver = nextIndex >= sessionData.phrases.length || alivePlayersCount <= 1;
                
                const resetPlayers = sessionData.players.map(p => ({ ...p, vote: null }));
                
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode), { 
                    state: isOver ? 'gameover' : 'voting',
                    currentIndex: nextIndex,
                    players: resetPlayers
                });

                if (isOver && typeof window.confetti === 'function') {
                    window.confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                }
            };

            // Controles del Jugador
            const castVote = async (voteType) => {
                if(sessionData.state !== 'voting') return;
                const updatedPlayers = sessionData.players.map(p => p.id === localPlayerId ? { ...p, vote: voteType } : p);
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode), { players: updatedPlayers });
            };

            // --- RENDERIZADORES ---
            if (gameState === 'loading') return <div className="h-full flex items-center justify-center"><Zap className="animate-pulse text-fuchsia-500" size={48} /></div>;
            
            if (gameState === 'error') return (
                <div className="h-full flex flex-col items-center justify-center text-center p-6 bg-slate-950">
                    <HeartCrack className="text-rose-500 mb-4 animate-shake" size={64}/> 
                    <h2 className="text-2xl font-bold mb-2">Ups, hay un problema</h2>
                    <p className="text-slate-400 mb-8 max-w-sm">{errorMsg}</p>
                    <button onClick={() => setGameState('menu')} className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-colors active-scale">
                        <Home size={18}/> Volver al Menú
                    </button>
                </div>
            );

            // PANTALLA 0: MENÚ PRINCIPAL
            if (gameState === 'menu') return (
                <div className="flex flex-col h-full bg-slate-950 items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-b from-fuchsia-900/20 to-slate-950 z-0"></div>
                    <div className="relative z-10 w-full max-w-md flex flex-col items-center">
                        <div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] shadow-2xl w-full text-center">
                            <h1 className="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-indigo-400">Never Have I Ever</h1>
                            <p className="text-slate-400 text-sm font-bold uppercase tracking-widest mb-8">Multijugador</p>
                            
                            <div className="mb-6">
                                <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 text-left">Código de Sala (Alumnos)</label>
                                <input 
                                    type="text" 
                                    value={joinInputCode} 
                                    onChange={e => setJoinInputCode(e.target.value.toUpperCase())} 
                                    maxLength="4" 
                                    placeholder="ABCD" 
                                    className="w-full bg-slate-950 border border-white/10 rounded-2xl p-4 text-center font-black text-3xl outline-none focus:border-fuchsia-500 text-fuchsia-400 tracking-[0.5em] uppercase placeholder-slate-800"
                                />
                            </div>

                            <button 
                                onClick={() => {
                                    if(joinInputCode.length > 0) {
                                        setSessionCode(joinInputCode);
                                        setSessionMode('join');
                                        setGameState('setup');
                                    } else {
                                        alert("Ingresa un código de sala.");
                                    }
                                }} 
                                className="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-[0_10px_25px_rgba(192,38,211,0.3)] transition-all active-scale"
                            >
                                <DoorOpen size={20}/> Unirse a Partida
                            </button>
                            
                            <div className="mt-8 pt-6 border-t border-white/10">
                                <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-3 text-left">Maestros: Crear Sala</label>
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={hostInputId} 
                                        onChange={e => setHostInputId(e.target.value)} 
                                        placeholder="Pega el ID del Quiz" 
                                        className="flex-1 bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-indigo-500 text-white placeholder-slate-700"
                                    />
                                    <button 
                                        onClick={() => {
                                            if(hostInputId) {
                                                initializeHostSession(hostInputId);
                                            } else {
                                                alert("Ingresa el ID del Quiz.");
                                            }
                                        }}
                                        className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-xl font-bold text-sm transition-all shadow-[0_5px_15px_rgba(79,70,229,0.3)] active-scale"
                                    >
                                        Crear
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // PANTALLA 1: SETUP LOBBY (Nombre y Avatar)
            if (gameState === 'setup') return (
                <div className="flex flex-col h-full bg-slate-950 items-center justify-center p-6 relative overflow-hidden">
                    <button onClick={() => setGameState('menu')} className="absolute top-6 left-6 text-slate-400 hover:text-white z-20 flex items-center gap-1 font-bold text-sm transition-colors active-scale">
                        <ArrowRight size={16} className="rotate-180"/> Volver
                    </button>

                    <div className="absolute inset-0 bg-gradient-to-b from-fuchsia-900/20 to-slate-950 z-0"></div>
                    <div className="relative z-10 w-full max-w-md flex flex-col items-center">
                        <div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] shadow-2xl w-full text-center">
                            <h1 className="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-indigo-400">Yo Nunca, Nunca</h1>
                            <p className="text-slate-400 text-sm font-bold uppercase tracking-widest mb-8">Sala: {sessionCode}</p>
                            
                            <div className="mb-6">
                                <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 text-left">Tu Nombre</label>
                                <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)} maxLength="12" placeholder="Ej. Ana" className="w-full bg-slate-950 border border-white/10 rounded-2xl p-4 text-center font-black text-xl outline-none focus:border-fuchsia-500 text-white"/>
                            </div>

                            <div className="mb-8">
                                <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 text-left">Tu Avatar</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {AVATARS.map(emoji => (
                                        <button key={emoji} onClick={() => setPlayerEmoji(emoji)} className={`text-3xl p-2 rounded-xl transition-all ${playerEmoji === emoji ? 'bg-fuchsia-500/20 border-2 border-fuchsia-500 scale-110' : 'bg-slate-950 border-2 border-transparent hover:bg-slate-800'}`}>
                                            {emoji}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button onClick={joinGame} className="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-[0_10px_25px_rgba(192,38,211,0.3)] transition-all active-scale">
                                Entrar a la Mesa
                            </button>
                        </div>
                    </div>
                </div>
            );

            // PANTALLA 2: JUEGO (MESA + CONTROLES)
            if (sessionData) {
                const isHost = sessionData.hostId === localPlayerId;
                const myPlayer = sessionData.players.find(p => p.id === localPlayerId);
                const isGameOver = sessionData.state === 'gameover';
                
                const alivePlayers = sessionData.players.filter(p => p.lives > 0);
                const winner = isGameOver && alivePlayers.length === 1 ? alivePlayers[0] : null;

                // Renderizador de Mesa Circular
                const renderTable = () => {
                    const radius = 38; // Porcentaje del contenedor
                    const total = sessionData.players.length;
                    
                    return (
                        <div className="relative w-full max-w-lg aspect-square mx-auto mt-4 mb-8">
                            {/* La Mesa Física */}
                            <div className="absolute inset-8 rounded-full border-[8px] border-slate-800 table-gradient shadow-[inset_0_0_50px_rgba(0,0,0,0.8)] flex items-center justify-center p-8 text-center z-0">
                                {sessionData.state === 'lobby' ? (
                                    <div className="animate-pulse flex flex-col items-center">
                                        <Users className="text-slate-500 mb-2" size={32}/>
                                        <p className="text-slate-400 font-bold uppercase tracking-widest text-sm">Esperando Jugadores...</p>
                                        <p className="text-fuchsia-400 font-black text-2xl mt-2">{sessionCode}</p>
                                    </div>
                                ) : isGameOver ? (
                                    <div className="flex flex-col items-center">
                                        <Crown className="text-yellow-400 mb-2" size={48}/>
                                        <h2 className="text-2xl font-black text-white">¡Juego Terminado!</h2>
                                        {winner ? (
                                            <p className="text-fuchsia-400 font-bold mt-2">{winner.name} Sobrevivió</p>
                                        ) : (
                                            <p className="text-slate-400 font-bold mt-2">Nadie Sobrevivió</p>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center w-full">
                                        <span className="text-xs font-black text-fuchsia-500 uppercase tracking-widest mb-2">Ronda {sessionData.currentIndex + 1}</span>
                                        <h3 className="text-white font-black text-lg md:text-2xl leading-tight">"Never have I ever... <br/><span className="text-fuchsia-300">{sessionData.phrases[sessionData.currentIndex]}</span>"</h3>
                                        {sessionData.state === 'voting' && <div className="mt-4 px-4 py-1.5 bg-slate-800 rounded-full text-xs font-bold text-slate-400 animate-pulse-fast">Votación Abierta</div>}
                                        {sessionData.state === 'reveal' && <div className="mt-4 px-4 py-1.5 bg-fuchsia-600 rounded-full text-xs font-bold text-white shadow-lg shadow-fuchsia-500/30">Resultados</div>}
                                    </div>
                                )}
                            </div>

                            {/* Los Jugadores (Avatares) */}
                            {sessionData.players.map((p, index) => {
                                // Trigonometría para círculo
                                const angle = (index / total) * 2 * Math.PI - (Math.PI / 2);
                                const left = 50 + radius * Math.cos(angle);
                                const top = 50 + radius * Math.sin(angle);
                                
                                const isMe = p.id === localPlayerId;
                                const isDead = p.lives === 0;
                                const voted = p.vote !== null;
                                
                                // Animación si pierde vida en la revelación
                                const justLostLife = sessionData.state === 'reveal' && p.vote === 'have' && !isDead;

                                return (
                                    <div key={p.id} 
                                        className={`absolute w-16 md:w-20 flex flex-col items-center z-10 transition-all duration-500 transform -translate-x-1/2 -translate-y-1/2 ${justLostLife ? 'animate-shake' : ''} ${isDead ? 'opacity-30 grayscale' : ''}`}
                                        style={{ left: `${left}%`, top: `${top}%` }}
                                    >
                                        <div className={`text-3xl md:text-4xl w-14 h-14 md:w-16 md:h-16 bg-slate-900 rounded-full flex items-center justify-center border-4 relative ${isMe ? 'border-fuchsia-500 avatar-glow' : 'border-slate-700'}`}>
                                            {p.emoji}
                                            
                                            {/* Indicador de voto */}
                                            {sessionData.state === 'voting' && voted && (
                                                <div className="absolute -top-2 -right-2 bg-emerald-500 w-5 h-5 rounded-full border-2 border-slate-900 flex items-center justify-center"><Check size={12} className="text-slate-900"/></div>
                                            )}
                                            
                                            {/* Revelación del Voto */}
                                            {sessionData.state === 'reveal' && p.vote === 'have' && (
                                                <div className="absolute -bottom-4 bg-rose-600 text-white text-[9px] font-black uppercase px-2 py-0.5 rounded-full border border-slate-900 shadow-lg whitespace-nowrap animate-pop-in">I HAVE</div>
                                            )}
                                            {sessionData.state === 'reveal' && p.vote === 'never' && (
                                                <div className="absolute -bottom-4 bg-emerald-600 text-white text-[9px] font-black uppercase px-2 py-0.5 rounded-full border border-slate-900 shadow-lg whitespace-nowrap animate-pop-in">NEVER</div>
                                            )}
                                        </div>
                                        <span className="text-[10px] font-black uppercase mt-1 text-slate-300 bg-slate-950/80 px-2 py-0.5 rounded truncate max-w-full">{p.name}</span>
                                        
                                        {/* Sistema de Luces (6 Vidas) */}
                                        <div className="flex gap-0.5 mt-1">
                                            {[0,1,2,3,4,5].map(lightIdx => (
                                                <div key={lightIdx} className={`w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${lightIdx < p.lives ? LIGHT_COLORS[lightIdx] : 'bg-slate-800'}`}></div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col h-full bg-slate-950 overflow-hidden">
                        {/* HEADER */}
                        <div className="p-4 flex justify-between items-center bg-slate-900/50 border-b border-white/5 shrink-0 z-20">
                            <div className="flex items-center gap-2">
                                <span className="bg-fuchsia-500 text-black text-xs font-black px-2 py-1 rounded uppercase tracking-widest">SALA: {sessionCode}</span>
                                {isHost && <Crown size={16} className="text-yellow-400"/>}
                            </div>
                            <div className="text-slate-400 font-bold text-sm">
                                Jugadores: <span className="text-white">{sessionData.players.length}</span>
                            </div>
                        </div>

                        {/* MESA CIRCULAR */}
                        <div className="flex-1 flex flex-col justify-center items-center p-4 relative z-10 overflow-hidden">
                            {renderTable()}
                        </div>

                        {/* CONTROLES INFERIORES */}
                        <div className="p-4 md:p-6 bg-slate-900 border-t border-white/5 shrink-0 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-20">
                            
                            {/* Panel Host (Solo lo ve el creador) */}
                            {isHost && (
                                <div className="mb-4 p-3 bg-slate-950 rounded-2xl border border-fuchsia-500/30 flex justify-between items-center gap-2">
                                    <span className="text-xs font-black text-fuchsia-400 uppercase tracking-widest flex items-center gap-1 hidden md:flex"><Crown size={14}/> Controles Host</span>
                                    
                                    {sessionData.state === 'lobby' && (
                                        <button onClick={startGame} className="flex-1 bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-3 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2 transition active-scale"><Play size={16}/> Iniciar Partida</button>
                                    )}
                                    
                                    {sessionData.state === 'voting' && (
                                        <button onClick={revealVotes} className="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-900 py-3 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2 transition active-scale"><Eye size={16}/> Revelar Votos</button>
                                    )}

                                    {sessionData.state === 'reveal' && (
                                        <button onClick={nextRound} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2 transition active-scale"><ArrowRight size={16}/> Siguiente Ronda</button>
                                    )}
                                    
                                    {sessionData.state === 'gameover' && (
                                        <button onClick={() => window.location.href='index.html'} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-black uppercase text-sm transition active-scale">Salir al Hub</button>
                                    )}
                                </div>
                            )}

                            {/* Panel Jugador (Lo ven todos) */}
                            {myPlayer && sessionData.state === 'voting' && myPlayer.lives > 0 && (
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => castVote('have')} 
                                        className={`flex-1 py-5 rounded-2xl font-black text-lg sm:text-xl uppercase tracking-wider flex flex-col items-center justify-center gap-1 transition-all active-scale ${myPlayer.vote === 'have' ? 'bg-rose-600 text-white border-2 border-white/20' : 'bg-slate-800 text-rose-500 hover:bg-slate-700 border-2 border-transparent'}`}
                                    >
                                        <span className="text-2xl">🙋‍♂️</span> I HAVE
                                    </button>
                                    <button 
                                        onClick={() => castVote('never')} 
                                        className={`flex-1 py-5 rounded-2xl font-black text-lg sm:text-xl uppercase tracking-wider flex flex-col items-center justify-center gap-1 transition-all active-scale ${myPlayer.vote === 'never' ? 'bg-emerald-600 text-white border-2 border-white/20' : 'bg-slate-800 text-emerald-500 hover:bg-slate-700 border-2 border-transparent'}`}
                                    >
                                        <span className="text-2xl">🙅‍♂️</span> NEVER
                                    </button>
                                </div>
                            )}

                            {myPlayer && sessionData.state === 'voting' && myPlayer.lives === 0 && (
                                <div className="text-center py-4 bg-rose-950/30 rounded-2xl border border-rose-900/50">
                                    <HeartCrack className="mx-auto text-rose-500 mb-2" size={24}/>
                                    <p className="text-rose-400 font-bold uppercase text-sm">Estás eliminado. Observa el juego.</p>
                                </div>
                            )}

                            {myPlayer && sessionData.state !== 'voting' && sessionData.state !== 'lobby' && (
                                <div className="text-center py-6 bg-slate-950 rounded-2xl border border-white/5">
                                    <Info className="mx-auto text-slate-500 mb-2" size={24}/>
                                    <p className="text-slate-400 font-bold uppercase text-sm">
                                        {sessionData.state === 'reveal' ? "Viendo resultados..." : "Esperando al Host..."}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
            
            return null;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<NeverEverGame />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lotería Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="periplo-config.js"></script>
    <script src="periplo-taxonomy-es.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; background-color: #09090b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="text-zinc-100 font-sans">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, X, Key, Search, Shuffle, Tags } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const TEACHER_UID = urlParams.get('uid') || 'teacher_builder_001';
        const QUIZZES_PATH = `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`;
        const BACK_URL = (urlParams.get('uid') || '').includes('anita') ? 'index-es.html' : 'index.html';

        const taxonomyEs = window.PERIPLO_TAXONOMY_ES || { NEW_LEVELS: [], NEW_CATS: [], MACRO_SKILLS: [], getAllTopicsForCategory: () => [] };
        const { NEW_LEVELS, NEW_CATS, MACRO_SKILLS, getAllTopicsForCategory } = taxonomyEs;

        const THEMES = [
            { id:'taco',       label:'Taco House',     icon:'🌮', nav1:'#450a0a', nav2:'#7f1d1d' },
            { id:'valentines', label:'San Valentín',   icon:'💕', nav1:'#500724', nav2:'#9d174d' },
            { id:'muertos',    label:'Día de Muertos', icon:'💀', nav1:'#1e0a4a', nav2:'#4c1d95' },
            { id:'navidad',    label:'Navidad',         icon:'🎄', nav1:'#14532d', nav2:'#166534' },
            { id:'tropical',   label:'Tropical',        icon:'🌊', nav1:'#134e4a', nav2:'#0f766e' },
            { id:'noche',      label:'Noche Oscura',    icon:'🌙', nav1:'#0f172a', nav2:'#1e293b' },
            { id:'primavera',  label:'Primavera',       icon:'🌸', nav1:'#701a75', nav2:'#a21caf' },
            { id:'dorado',     label:'Dorado',          icon:'🏆', nav1:'#451a03', nav2:'#78350f' },
        ];

        const LoteriaBuilder = () => {
            const [title, setTitle] = useState("");
            const [cards, setCards] = useState([]);
            const [language, setLanguage] = useState("es");
            const [theme, setTheme] = useState("taco");
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [magiaModal, setMagiaModal] = useState(false);
            const [omniPrompt, setOmniPrompt] = useState("");
            const [apiKey, setApiKey] = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);

            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels]       = useState([]);
            const [saveCats, setSaveCats]           = useState([]);
            const [saveTopics, setSaveTopics]       = useState([]);

            const abortControllerRef = useRef(null);

            const toggleSelection = (arr, setArr, item) => {
                if (arr.includes(item)) setArr(arr.filter(i => i !== item));
                else setArr([...arr, item]);
            };

            useEffect(() => {
                const savedKey = localStorage.getItem('periplo_google_key');
                if (savedKey) setApiKey(savedKey);

                const editId = urlParams.get('edit');
                if (editId) {
                    getDoc(doc(db, QUIZZES_PATH, editId)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setTitle(data.title);
                            setLanguage(data.language || 'es');
                            setTheme(data.theme || 'taco');
                            if (data.content?.cards) {
                                setCards(data.content.cards.map((c, i) => ({ ...c, id: Date.now() + i })));
                            }
                            if (data.tags) {
                                setSaveLevels(data.tags.levels || []);
                                setSaveCats(data.tags.categories || []);
                                setSaveTopics(data.tags.topics || []);
                            }
                            setEditingId(editId);
                        }
                    });
                } else {
                    setCards([{ id: Date.now(), word: '', wordEn: '', article: '', type: 'masc', emoji: '' }]);
                }
            }, []);

            const addRow = () => setCards([...cards, { id: Date.now(), word: '', wordEn: '', article: '', type: 'masc', emoji: '' }]);
            const removeRow = (id) => { if (cards.length > 1) setCards(cards.filter(c => c.id !== id)); };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey.trim()}`);
                    if (!response.ok) throw new Error("Error conectando con Google");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { alert("Error al buscar modelos: " + e.message); }
                finally { setIsLoadingModels(false); }
            };

            const cancelMagia = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    setLoading(false);
                }
            };

            const executeMagia = async () => {
                if (!apiKey.trim()) return alert("⚠️ Necesitas ingresar tu API Key.");
                if (!selectedModel) return alert("⚠️ Selecciona un modelo primero.");
                if (!omniPrompt.trim()) return alert("⚠️ Escribe qué tema quieres.");

                setMagiaModal(false);
                setLoading(true);
                abortControllerRef.current = new AbortController();

                const promptText = `
                    Crea una lista para un juego de Lotería Mexicana bilingüe basado en este tema/texto: "${omniPrompt}".
                    Genera EXACTAMENTE 54 cartas. No más, no menos.

                    REGLAS PARA CADA CARTA:
                    1. "word": La palabra en español de México (ej. "Mundo").
                    2. "wordEn": Traducción al inglés (ej. "World").
                    3. "article": Artículo en español (ej. "El", "La", "Los", "Las", "El/La").
                    4. "type": "masc", "fem", o "neutral".
                    5. "emoji": 1 emoji representativo.

                    Devuelve ÚNICAMENTE un JSON válido:
                    { "title": "Título sugerido", "cards": [ { "word": "...", "wordEn": "...", "article": "...", "type": "...", "emoji": "..." } ] }
                `;

                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey.trim()}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 8192 } }),
                            signal: abortControllerRef.current.signal
                        }
                    );
                    if (!response.ok) throw new Error(`API Error ${response.status}`);
                    const result = await response.json();
                    const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("La IA no devolvió JSON válido.");
                    const parsed = JSON.parse(jsonMatch[0]);

                    if (parsed.title && !title) setTitle(parsed.title);
                    setCards(parsed.cards.map((c, i) => ({ ...c, id: Date.now() + i })));
                } catch (error) {
                    if (error.name !== 'AbortError') alert("Error al generar: " + error.message);
                } finally {
                    setLoading(false);
                    abortControllerRef.current = null;
                }
            };

            const handlePreSave = () => {
                if (!title.trim() || cards.length === 0) return alert("Falta el título o cartas.");
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setLoading(true);

                const cleanCards = cards.map((c, index) => ({
                    id: index + 1,
                    word: c.word,
                    wordEn: c.wordEn,
                    article: c.article,
                    type: c.type,
                    emoji: c.emoji
                }));

                const tags = { levels: saveLevels, categories: saveCats, topics: saveTopics };
                const folderParam = urlParams.get('folder');
                const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';

                const data = {
                    title,
                    type: 'LOTERIA',
                    language,
                    theme,
                    content: { cards: cleanCards },
                    tags,
                    parentPath,
                    cardCount: cleanCards.length,
                    updatedAt: serverTimestamp()
                };

                try {
                    let docId = editingId;
                    if (editingId) {
                        await updateDoc(doc(db, QUIZZES_PATH, editingId), data);
                    } else {
                        const ref = await addDoc(collection(db, QUIZZES_PATH), { ...data, createdAt: serverTimestamp() });
                        docId = ref.id;
                    }
                    window.location.href = `loteria.html?id=${docId}&uid=${TEACHER_UID}`;
                } catch (e) {
                    alert(e.message);
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 sm:p-6 relative">
                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-sky-500 mb-6" size={56}/>
                            <p className="text-sky-500 font-bold uppercase tracking-widest mb-8">Procesando...</p>
                            <button onClick={cancelMagia} className="bg-rose-600 px-6 py-3 rounded-full flex gap-2 font-black shadow-xl">
                                <X size={20}/> CANCELAR
                            </button>
                        </div>
                    )}

                    {/* ================================================================ */}
                    {/* MODAL DE CLASIFICACIÓN (TAXONOMY)                               */}
                    {/* ================================================================ */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-white">
                                        <Tags className="text-sky-400"/> Clasificar Mazo de Lotería
                                    </h2>
                                    <button onClick={() => setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition">
                                        <X size={20}/>
                                    </button>
                                </div>

                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">

                                    {/* PASO 1 — NIVELES */}
                                    <div>
                                        <label className="block text-xs font-black text-sky-400 uppercase tracking-widest mb-3">
                                            1. Nivel del Estudiante <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span>
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button key={lvl}
                                                    onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-sky-600 border-sky-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-sky-500 hover:text-sky-300'}`}>
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 2 — CATEGORÍAS */}
                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">
                                            2. Categoría <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span>
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button key={cat.id}
                                                    onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 3 — TEMAS */}
                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">
                                                3. Temas Específicos
                                            </label>

                                            {saveCats.map(catId => {
                                                if (catId === 'otro') return null;
                                                const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                                const topics   = getAllTopicsForCategory(catId, saveLevels);
                                                if (topics.length === 0) return null;
                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button key={topic}
                                                                    onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>
                                                                    {topic}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {saveCats.includes('otro') && (
                                                <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                                                    <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {MACRO_SKILLS.map(skill => (
                                                            <button key={skill}
                                                                onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                                className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-500 text-zinc-900 shadow-sm' : 'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}>
                                                                {skill}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <button onClick={executeFinalSave}
                                    disabled={loading || saveLevels.length === 0 || saveCats.length === 0}
                                    className="w-full mt-6 bg-sky-600 hover:bg-sky-500 disabled:opacity-50 disabled:bg-zinc-800 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                                    <Save size={18}/>
                                    {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar Lotería"}
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href = BACK_URL} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800">
                            <ArrowLeft/>
                        </button>
                        <div className="flex items-center gap-3">
                            <Shuffle className="text-sky-400" size={28}/>
                            <div>
                                <h1 className="text-2xl font-black italic text-sky-400">LOTERÍA BUILDER</h1>
                                <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">{cards.length} / 54 CARTAS RECOMENDADAS</p>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                            {/* Selector de idioma del mazo */}
                            <div className="flex bg-zinc-800 p-1 rounded-xl border border-zinc-700">
                                <button
                                    onClick={() => setLanguage('es')}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-black transition-all ${language === 'es' ? 'bg-sky-500 text-white shadow-sm' : 'text-zinc-400 hover:text-zinc-200'}`}
                                >
                                    🇲🇽 Español
                                </button>
                                <button
                                    onClick={() => setLanguage('en')}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-black transition-all ${language === 'en' ? 'bg-indigo-500 text-white shadow-sm' : 'text-zinc-400 hover:text-zinc-200'}`}
                                >
                                    🇺🇸 Inglés
                                </button>
                            </div>
                            <button onClick={() => setMagiaModal(true)} className="bg-sky-500 text-black px-4 py-2 rounded-xl font-bold flex gap-2 items-center">
                                <Sparkles size={18}/> IA Assist
                            </button>
                            <button onClick={handlePreSave} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold flex gap-2 items-center">
                                <Save size={18}/> Guardar
                            </button>
                        </div>
                    </header>

                    <div className="mb-4 p-3 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center gap-3 text-xs text-zinc-400">
                        <span className="font-black text-zinc-500 uppercase tracking-wider">Idioma por defecto en renderer:</span>
                        <span className={`font-black ${language === 'es' ? 'text-sky-400' : 'text-indigo-400'}`}>
                            {language === 'es' ? '🇲🇽 Español — los alumnos verán las palabras en español al abrir' : '🇺🇸 Inglés — los alumnos verán las palabras en inglés al abrir'}
                        </span>
                    </div>

                    {/* SELECTOR DE TEMA VISUAL */}
                    <div className="mb-6 p-4 bg-zinc-900 border border-zinc-800 rounded-xl">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Tema visual del renderer</p>
                        <div className="flex flex-wrap gap-2">
                            {THEMES.map(th => (
                                <button key={th.id} onClick={() => setTheme(th.id)}
                                    className="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-black transition-all border-2"
                                    style={{
                                        background: `linear-gradient(to right, ${th.nav1}, ${th.nav2})`,
                                        borderColor: theme === th.id ? '#ffffff' : 'transparent',
                                        transform: theme === th.id ? 'scale(1.07)' : 'scale(1)',
                                        boxShadow: theme === th.id ? `0 0 0 3px ${th.nav2}55` : 'none'
                                    }}>
                                    <span>{th.icon}</span>
                                    <span className="text-white">{th.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <input value={title} onChange={e => setTitle(e.target.value)}
                        placeholder="Nombre del Mazo de Lotería..."
                        className="w-full bg-transparent text-3xl sm:text-4xl font-black border-b-2 border-zinc-800 mb-8 outline-none focus:border-sky-500 pb-2 text-white"/>

                    {/* LISTA DE CARTAS */}
                    <div className="space-y-2 mb-8">
                        <div className="grid grid-cols-12 gap-2 px-4 text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                            <div className="col-span-1 text-center">#</div>
                            <div className="col-span-2">Emoji</div>
                            <div className="col-span-2">Artículo</div>
                            <div className="col-span-3">Español</div>
                            <div className="col-span-3">Inglés</div>
                            <div className="col-span-1 text-center">Tipo</div>
                        </div>

                        {cards.map((c, idx) => (
                            <div key={c.id} className="grid grid-cols-12 gap-2 bg-zinc-900 p-2 rounded-xl border border-zinc-800 items-center group">
                                <div className="col-span-1 text-center text-zinc-600 font-mono text-xs">{idx + 1}</div>
                                <div className="col-span-2">
                                    <input value={c.emoji} onChange={e => { const n = [...cards]; n[idx].emoji = e.target.value; setCards(n); }} placeholder="🌞" className="w-full bg-zinc-950 p-2 rounded-lg border border-zinc-800 text-center outline-none focus:border-sky-500"/>
                                </div>
                                <div className="col-span-2">
                                    <input value={c.article} onChange={e => { const n = [...cards]; n[idx].article = e.target.value; setCards(n); }} placeholder="El / La" className="w-full bg-zinc-950 p-2 rounded-lg border border-zinc-800 outline-none focus:border-sky-500 text-sm"/>
                                </div>
                                <div className="col-span-3">
                                    <input value={c.word} onChange={e => { const n = [...cards]; n[idx].word = e.target.value; setCards(n); }} placeholder="Palabra" className="w-full bg-zinc-950 p-2 rounded-lg border border-zinc-800 outline-none focus:border-sky-500 font-bold"/>
                                </div>
                                <div className="col-span-3">
                                    <input value={c.wordEn} onChange={e => { const n = [...cards]; n[idx].wordEn = e.target.value; setCards(n); }} placeholder="Word" className="w-full bg-zinc-950 p-2 rounded-lg border border-zinc-800 outline-none focus:border-sky-500 font-bold"/>
                                </div>
                                <div className="col-span-1 flex justify-between items-center">
                                    <select value={c.type} onChange={e => { const n = [...cards]; n[idx].type = e.target.value; setCards(n); }} className="bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs outline-none focus:border-sky-500">
                                        <option value="masc">M</option><option value="fem">F</option><option value="neutral">N</option>
                                    </select>
                                    <button onClick={() => removeRow(c.id)} className="text-zinc-600 hover:text-rose-500 transition-colors ml-2"><Trash2 size={16}/></button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={addRow} className="w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-bold flex justify-center gap-2 hover:bg-zinc-900 hover:text-sky-500 transition-colors">
                        <Plus/> Añadir Carta
                    </button>

                    {/* MODAL IA */}
                    {magiaModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl shadow-2xl p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-xl text-white flex gap-2"><Sparkles className="text-sky-500"/> Generador 54 Cartas</h3>
                                    <button onClick={() => setMagiaModal(false)}><X size={20}/></button>
                                </div>

                                <div className="flex gap-2 mb-4 bg-zinc-950 p-2 rounded-xl">
                                    <Key size={16} className="text-zinc-500 mt-1"/>
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('periplo_google_key', e.target.value); }} placeholder="API Key de Google AI..." className="bg-transparent w-full outline-none text-xs font-mono text-white"/>
                                    <button onClick={fetchModels} disabled={isLoadingModels} className="text-sky-500 disabled:opacity-50">
                                        {isLoadingModels ? <Loader2 size={16} className="animate-spin"/> : <Search size={16}/>}
                                    </button>
                                </div>

                                {availableModels.length > 0 && (
                                    <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)} className="w-full mb-4 bg-zinc-950 p-2 rounded-xl border border-zinc-800 text-xs text-white">
                                        {availableModels.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                )}

                                <textarea value={omniPrompt} onChange={e => setOmniPrompt(e.target.value)} placeholder="Ej: Comida Mexicana, Verbos de Acción, Acentuación del español..." className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm focus:border-sky-500 outline-none h-32 resize-none mb-4"/>

                                <button onClick={executeMagia} disabled={!apiKey || !omniPrompt || !selectedModel} className="w-full bg-sky-500 disabled:opacity-40 text-black font-black py-4 rounded-xl uppercase tracking-widest">
                                    Generar Mazo Completo
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LoteriaBuilder />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Performance | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, Calendar, Video, Trophy, Target, Sparkles, Brain, Key, PenTool, Flame, Lock, ChevronRight, BarChart, BookOpen, Palette } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        // --- SKILLS GLOBALES ---
        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];
        const CORE_MASTERY_SKILLS = ["Aplica en conversación", "Identifica al escuchar", "Pronuncia correctamente"];
        const ADVANCED_VERB_SKILLS = ["Significado al verlo", "Pronuncia correctamente", "Concordancia (Contexto)", "Aplica en conversación", "Identifica al escuchar"];
        const PRO_VERB_SKILLS = ["Precisión de registro", "Fluidez espontánea", "Aplica en debate", "Identifica matiz/tono", "Comprende a nativos"];
        const VOCAB_SKILLS = ["Identifica (ID)", "Ortografía (SP)", "Colocación (COL)", "Uso activo (USE)"];

        // --- DICCIONARIO ACTUALIZADO (AÑADIDOS NOUNS Y ADJECTIVES 2.0) ---
        const CONFIG = {
            basic: {
                grammar: [
                    { id: 'modal_verbs', skills: ["Significado correcto", "Omisión del 'to'", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS] },
                    { id: 'present_simple', skills: ["Regla de la 's'", "Auxiliar Do/Does", "Negación don't/doesn't", "WH Questions", ...UNIVERSAL_SKILLS] },
                    { id: 'present_continuous', skills: ["Verbo To Be", "Sufijo -ing", "Contraste vs Simple", "Reglas deletreo", ...UNIVERSAL_SKILLS] },
                    { id: 'going_to', skills: ["Inclusión To Be", "Partícula 'to'", "Contraste vs Will", "Negación", ...UNIVERSAL_SKILLS] }
                ],
                verbs: [ ...CORE_MASTERY_SKILLS, "Pack 1 (Daily Routine & Work)", "Pack 2 (Home & Communication)", "Pack 3 (Travel & Conflict)", "Pack 4 (Business & Emotion)", "Pack 5 (Action & Strategy)", "Pack 6 (Thoughts & Senses)", "Pack 7 (Interactions & Science)", "Pack 8 (Corporate & Economy)", "Pack 9 (Medical & Survival)" ],
                nouns: [
                    { id: 'n_b_1', skills: VOCAB_SKILLS }, { id: 'n_b_2', skills: VOCAB_SKILLS }, { id: 'n_b_3', skills: VOCAB_SKILLS }, { id: 'n_b_4', skills: VOCAB_SKILLS }, { id: 'n_b_5', skills: VOCAB_SKILLS }
                ],
                adjectives: [
                    { id: 'adj_1', skills: VOCAB_SKILLS }, { id: 'adj_2', skills: VOCAB_SKILLS }, { id: 'adj_3', skills: VOCAB_SKILLS }, { id: 'adj_4', skills: VOCAB_SKILLS }, { id: 'adj_5', skills: VOCAB_SKILLS }
                ],
                key_structs: [ ...CORE_MASTERY_SKILLS, "FANBOYS", "Subordinating Conj.", "Correlative Conj.", "Prep. Time (In,On,At)", "Prep. Place", "Prep. Movement", "Other Prepositions", "Quantifiers", "Possessive Adj.", "Possessive Pronouns", "Object Pronouns", "Frequency Adverbs" ]
            },
            advanced: {
                grammar: [
                    { id: 'past_simple', skills: ["Confunde pasado/presente", "Usa did en afirmativo", "Did + Verb in Past", "Pronunciación -ed", ...UNIVERSAL_SKILLS] },
                    { id: 'second_cond', skills: ["Would en cláusula IF", "Presente vs Pasado", "Uso de 'Were'", "Contracción 'd", ...UNIVERSAL_SKILLS] },
                    { id: 'past_cont', skills: ["Olvida was/were", "When vs While", "Uso State Verbs", "Concordancia", ...UNIVERSAL_SKILLS] },
                    { id: 'past_future', skills: ["Will para planes pasados", "Concordancia (They was)", "vs Used To", "Auxiliar be", ...UNIVERSAL_SKILLS] }
                ],
                verbs: [ { id: 'v_reg', skills: ADVANCED_VERB_SKILLS }, { id: 'v_irreg', skills: ADVANCED_VERB_SKILLS }, { id: 'v_part', skills: ADVANCED_VERB_SKILLS }, { id: 'v_phrasal', skills: ADVANCED_VERB_SKILLS } ],
                nouns: [
                    { id: 'n_a_1', skills: VOCAB_SKILLS }, { id: 'n_a_2', skills: VOCAB_SKILLS }, { id: 'n_a_3', skills: VOCAB_SKILLS }, { id: 'n_a_4', skills: VOCAB_SKILLS }, { id: 'n_a_5', skills: VOCAB_SKILLS }
                ],
                adjectives: [ // ADJECTIVES MASTERY 2.0
                    { id: 'adj_a_1', skills: VOCAB_SKILLS }, { id: 'adj_a_2', skills: VOCAB_SKILLS }, { id: 'adj_a_3', skills: VOCAB_SKILLS }, { id: 'adj_a_4', skills: VOCAB_SKILLS }, { id: 'adj_a_5', skills: VOCAB_SKILLS }
                ],
                key_structs: [ "Used to / Use to", "Comparatives", "Superlatives", "Idiomatic Expressions", "Possessive Nouns", "Relative Clauses", "Modals of Possibility", "Passive Voice" ]
            },
            pro: {
                grammar: [
                    { id: 'perf_tenses', skills: ["Confunde con Past Simple", "Omite auxiliar Have/Had", "Error en Participio", "For/Since incorrecto", ...UNIVERSAL_SKILLS] },
                    { id: 'perf_cont', skills: ["Omite 'been'", "Usa con State Verbs", "Confunde duración/resultado", "Falla estructura", ...UNIVERSAL_SKILLS] },
                    { id: 'third_cond', skills: ["'Would' en cláusula IF", "Falla en participio", "Confunde irrealidad", "Olvida 'have'", ...UNIVERSAL_SKILLS] },
                    { id: 'mixed_cond', skills: ["Mezcla mal los tiempos", "Confunde resultado presente", "Estructura incompleta", "Uso ilógico", ...UNIVERSAL_SKILLS] }
                ],
                verbs: [ { id: 'v_phrasal2', skills: PRO_VERB_SKILLS }, { id: 'v_idioms', skills: PRO_VERB_SKILLS }, { id: 'v_sayings', skills: PRO_VERB_SKILLS }, { id: 'v_colloc', skills: PRO_VERB_SKILLS } ],
                nouns: [
                    { id: 'n_p_1', skills: VOCAB_SKILLS }, { id: 'n_p_2', skills: VOCAB_SKILLS }, { id: 'n_p_3', skills: VOCAB_SKILLS }, { id: 'n_p_4', skills: VOCAB_SKILLS }, { id: 'n_p_5', skills: VOCAB_SKILLS }
                ],
                key_structs: [ "Inversion (Never have I...)", "Cleft Sentences (It was X who...)", "Participle Clauses", "Advanced Wish/Regret", "Double Comparatives", "Ellipsis & Substitution" ]
            }
        };

        const calculateArchetype = (s) => {
            if (!s) return { name: "Limbo / Por Evaluar", desc: "Realiza la evaluación para perfilar.", color: "text-slate-400" };
            const spk = parseInt(s.speaking) || 0; const lst = parseInt(s.listening) || 0;
            const rdn = parseInt(s.reading) || 0; const grm = parseInt(s.grammar) || 0;
            const voc = parseInt(s.vocabulary) || 0; const prn = parseInt(s.pronunciation) || 0;
            const total = spk + lst + rdn + grm + voc + prn;

            if (total <= 10) return { name: "Ahí vamos 🥚", desc: "Tabula rasa. Listo para moldear.", color: "text-stone-500" };
            if (total >= 54) return { name: "Maestro Jedi 👑", desc: "Casi nativo. Ya bromea en inglés.", color: "text-amber-500" };
            if (grm >= 8 && spk <= 5) return { name: "Teórico Bloqueado 📚", desc: "Sabe reglas, pero le da pánico hablar.", color: "text-blue-500" };
            if (spk >= 8 && grm <= 5) return { name: "Tarzán Fluido 🌴", desc: "Habla rápido, pero conjuga a lo salvaje.", color: "text-emerald-500" };
            if (lst >= 8 && spk <= 5) return { name: "Esponja Muda 🧽", desc: "Entiende el chisme, pero no opina.", color: "text-cyan-500" };
            if ((rdn >= 8 || voc >= 8) && lst <= 5 && spk <= 5) return { name: "Lector Académico 🤓", desc: "Lee a Shakespeare, no pide un café.", color: "text-purple-500" };
            if (prn >= 8 && grm <= 5) return { name: "Loro Bilingüe 🦜", desc: "Pronuncia hermoso, pero estructura mal.", color: "text-rose-500" };
            if (total < 25) return { name: "Sobreviviente 🐣", desc: "Sobrevive con lo mínimo indispensable.", color: "text-orange-500" };
            if (total >= 25 && total < 45) return { name: "Todo Terreno 🚙", desc: "Balanceado. El intermedio sólido.", color: "text-teal-500" };
            return { name: "Avanzado Pulido 💎", desc: "Detalles mínimos por arreglar.", color: "text-indigo-500" };
        };

        const CircularProgress = ({ score, label, colorClass, strokeColor, icon: Icon }) => {
            const percentage = (score / 10) * 100;
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <div className="flex flex-col items-center bg-white dark:bg-zinc-900/50 p-4 rounded-3xl border border-slate-200 dark:border-zinc-800/50 relative overflow-hidden shadow-sm w-36">
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" className="text-slate-100 dark:text-zinc-800" />
                            <circle cx="50" cy="50" r={radius} stroke={strokeColor} strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="circle-transition" />
                        </svg>
                        <div className="absolute flex flex-col items-center">
                            <span className="text-xl font-black text-slate-800 dark:text-white">{score}</span>
                        </div>
                    </div>
                    <div className={`mt-3 flex flex-col items-center gap-1 ${colorClass}`}>
                        <Icon size={16} />
                        <span className="text-[9px] font-bold uppercase tracking-widest text-center leading-tight">{label}</span>
                    </div>
                </div>
            );
        };

        const StudentPortal = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [evalData, setEvalData] = useState({});
            const [activeTrack, setActiveTrack] = useState('basic');
            const [chartView, setChartView] = useState('radar'); 

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return; 

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        if (LEVEL_HIERARCHY.includes(data.level)) setActiveTrack(data.level);
                    }
                    setLoading(false);
                });
            }, []);

            const getSkill = (key) => parseInt(student?.skills?.[key]) || 0;

            // EL CÁLCULO PRECISO Y TODO TERRENO
            const getRealScore = (section) => {
                const viewIdx = LEVEL_HIERARCHY.indexOf(activeTrack);
                const stuIdx = LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                if(viewIdx < stuIdx) return 10.0; 
                if(viewIdx > stuIdx) return 0.0;  

                const trackConfig = CONFIG[activeTrack];
                let topics = trackConfig[section];
                if (!topics) return 0.0;

                const calculateItemScore = (topicId, skillList) => {
                    const topicData = evalData[topicId] || { skills: {} };
                    let earned = 0;
                    if(skillList.length === 0) return 0;
                    skillList.forEach(s => {
                        const status = topicData.skills[s] || 0;
                        earned += (status === 2 ? 1 : status === 1 ? 0.5 : 0);
                    });
                    return (earned / skillList.length) * 10;
                };

                // Lógica especial para las listas planas (Basic Verbs y Key Structs)
                if (section === 'verbs' && activeTrack === 'basic') {
                    return Math.round(calculateItemScore('verbs', topics) * 10) / 10;
                }
                if (section === 'key_structs') {
                    return Math.round(calculateItemScore('key_structs', topics) * 10) / 10;
                }

                // Lógica para listas con paquetes anidados (Grammar, Nouns, Adjectives, Adv/Pro Verbs)
                let totalScore = 0;
                topics.forEach(t => {
                    totalScore += calculateItemScore(t.id, t.skills);
                });
                return topics.length === 0 ? 0 : Math.round((totalScore / topics.length) * 10) / 10;
            }

            useEffect(() => {
                const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');

                if (!loading && chartRef.current && student && !isLocked) {
                    if (chartInstance.current) chartInstance.current.destroy();

                    const ctx = chartRef.current.getContext('2d');
                    const dataValues = [ getSkill('speaking'), getSkill('listening'), getSkill('reading'), getSkill('grammar'), getSkill('vocabulary'), getSkill('pronunciation') ];

                    const drawNumbersPlugin = {
                        id: 'drawNumbersPlugin',
                        afterDatasetsDraw(chart) {
                            if (chart.config.type !== 'bar') return; 
                            const { ctx, data } = chart;
                            ctx.save();
                            ctx.font = 'bold 12px Plus Jakarta Sans';
                            ctx.fillStyle = '#f59e0b';
                            ctx.textAlign = 'left';
                            ctx.textBaseline = 'middle';
                            
                            chart.getDatasetMeta(0).data.forEach((bar, index) => {
                                const value = data.datasets[0].data[index];
                                ctx.fillText(value, bar.x + 5, bar.y);
                            });
                            ctx.restore();
                        }
                    };

                    const radarOptions = {
                        scales: {
                            r: {
                                min: 0, max: 10, beginAtZero: true,
                                angleLines: { color: 'rgba(161, 161, 170, 0.2)' },
                                grid: { color: 'rgba(161, 161, 170, 0.2)' },
                                pointLabels: { color: '#f59e0b', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } },
                                ticks: { display: false, stepSize: 2 }
                            }
                        },
                        plugins: { legend: { display: false }, tooltip: { enabled: true } },
                        maintainAspectRatio: false
                    };

                    const barOptions = {
                        indexAxis: 'y', 
                        scales: {
                            x: { min: 0, max: 10, grid: { color: 'rgba(161, 161, 170, 0.1)' }, ticks: { color: 'rgba(161, 161, 170, 0.8)', stepSize: 2 } },
                            y: { grid: { display: false }, ticks: { color: '#f59e0b', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } }
                        },
                        plugins: { legend: { display: false } },
                        maintainAspectRatio: false
                    };

                    chartInstance.current = new window.Chart(ctx, {
                        type: chartView === 'radar' ? 'radar' : 'bar',
                        data: {
                            labels: ['Speaking', 'Listening', 'Reading', 'Grammar', 'Vocabulary', 'Pronunc.'],
                            datasets: [{
                                data: dataValues,
                                backgroundColor: chartView === 'bar' ? 'rgba(245, 158, 11, 0.8)' : 'rgba(245, 158, 11, 0.2)',
                                borderColor: 'rgba(245, 158, 11, 1)',
                                pointBackgroundColor: '#f59e0b',
                                pointBorderColor: '#fff',
                                borderWidth: 2,
                                borderRadius: chartView === 'bar' ? 4 : 0, 
                            }]
                        },
                        options: chartView === 'radar' ? radarOptions : barOptions,
                        plugins: [drawNumbersPlugin] 
                    });
                }
            }, [loading, evalData, activeTrack, student, chartView]);

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
            const archetypeData = calculateArchetype(student?.skills);
            const macroTotal = getSkill('speaking') + getSkill('listening') + getSkill('reading') + getSkill('grammar') + getSkill('vocabulary') + getSkill('pronunciation');

            return (
                <div className="pb-24 fade-in">
                    <div className="bg-gradient-to-br from-indigo-600 to-purple-800 pt-8 pb-16 px-6 rounded-b-[3rem] relative shadow-2xl">
                        <div className="max-w-4xl mx-auto relative z-10 flex justify-between items-start">
                            <div>
                                <p className="text-indigo-200 font-bold text-xs tracking-widest uppercase mb-1">My Performance</p>
                                <h1 className="text-3xl sm:text-4xl font-black text-white">¡Hola, {student?.name?.split(' ')[0] || 'Alumno'}! 🚀</h1>
                                <div className="inline-block mt-3 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold text-white uppercase tracking-wider">
                                    Nivel Actual: {student?.level?.toUpperCase() || 'BÁSICO'}
                                </div>
                            </div>
                            <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-md hidden sm:block">
                                <Trophy className="text-yellow-400" size={32} />
                            </div>
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto px-6 -mt-10 space-y-6 relative z-20">
                        
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-100 dark:bg-indigo-500/20 p-4 rounded-2xl"><Calendar className="text-indigo-600 dark:text-indigo-400" size={28} /></div>
                                <div><h3 className="font-black text-slate-800 dark:text-white text-lg leading-tight">Próxima Sesión</h3><p className="text-slate-500 dark:text-zinc-400 text-sm font-semibold">Viernes, 5:00 PM (EST)</p></div>
                            </div>
                            <button className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-black px-6 py-3 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-indigo-500/30">
                                <Video size={18} /> Entrar a Clase
                            </button>
                        </div>

                        <div className="bg-gradient-to-r from-slate-800 to-zinc-900 dark:from-zinc-900 dark:to-black rounded-[2rem] p-6 shadow-xl border border-slate-700 dark:border-zinc-800 text-white">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-6 mb-6 border-b border-white/10 pb-6">
                                <div>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Macro Evaluación</p>
                                    <h2 className={`text-2xl font-black flex items-center gap-2 ${archetypeData.color}`}>
                                        <Flame size={24}/> {archetypeData.name}
                                    </h2>
                                    <p className="text-sm text-slate-300 mt-2 max-w-sm">{archetypeData.desc}</p>
                                </div>
                                <div className="bg-white/5 border border-white/10 p-4 rounded-2xl backdrop-blur-sm text-center w-full sm:w-auto shrink-0">
                                    <span className="block text-3xl font-black text-amber-500">{macroTotal} <span className="text-lg text-slate-400">/ 60</span></span>
                                    <span className="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Global Pts</span>
                                </div>
                            </div>
                            
                            <div className="w-full flex flex-col items-center relative">
                                <div className="w-full flex justify-between items-center mb-4">
                                    <h3 className="font-black text-slate-300 uppercase tracking-widest text-xs flex items-center gap-2">
                                        <Target className="text-amber-500" size={16}/> Balance de Habilidades
                                    </h3>
                                    <button onClick={() => setChartView(prev => prev === 'radar' ? 'bar' : 'radar')} className="flex items-center gap-1.5 text-[10px] uppercase font-bold tracking-widest text-amber-500 hover:text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 px-3 py-2 rounded-xl transition-colors border border-amber-500/20">
                                        {chartView === 'radar' ? <><BarChart size={14}/> Ver Barras</> : <><Target size={14}/> Ver Radar</>}
                                        <ChevronRight size={14}/>
                                    </button>
                                </div>
                                <div className="w-full h-64 relative">
                                    <canvas id="radarChart" ref={chartRef}></canvas>
                                </div>
                            </div>
                        </div>

                        <div className="flex p-1 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl w-fit mx-auto shadow-sm">
                            {LEVEL_HIERARCHY.map((lvl) => (
                                <button key={lvl} onClick={() => setActiveTrack(lvl)} className={`px-6 py-2 rounded-xl font-black text-xs transition-all uppercase ${activeTrack === lvl ? 'bg-indigo-50 dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>
                                    {lvl}
                                </button>
                            ))}
                        </div>

                        {isLocked ? (
                            <div className="bg-white dark:bg-zinc-900 p-12 rounded-[2rem] text-center border border-slate-200 dark:border-zinc-800 shadow-lg animate-in fade-in">
                                <div className="bg-slate-100 dark:bg-zinc-800 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Lock className="text-slate-400 dark:text-zinc-500" size={40} />
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2">You're almost there!</h3>
                                <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-sm mx-auto">Sigue practicando duro en tu nivel actual para desbloquear las métricas del bloque <span className="text-indigo-500 uppercase">{activeTrack}</span>.</p>
                            </div>
                        ) : (
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-lg border border-slate-200 dark:border-zinc-800 animate-in fade-in">
                                <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-6 flex items-center gap-2">
                                    <Sparkles className="text-indigo-500" size={16}/> Hacia {activeTrack.toUpperCase()} Mastery
                                </h3>
                                
                                {/* AQUI ESTAN LOS ANILLOS QUE SE ACOMODAN SOLOS CON FLEX-WRAP */}
                                <div className="flex flex-wrap justify-center gap-4 sm:gap-6">
                                    <CircularProgress score={getRealScore('grammar')} label="Grammar Core" colorClass="text-emerald-500" strokeColor="#10b981" icon={PenTool}/>
                                    <CircularProgress score={getRealScore('verbs')} label="Verb Mastery" colorClass="text-rose-500" strokeColor="#f43f5e" icon={Brain}/>
                                    <CircularProgress score={getRealScore('nouns')} label="Noun Mastery" colorClass="text-sky-500" strokeColor="#0ea5e9" icon={BookOpen}/>
                                    
                                    {(activeTrack === 'basic' || activeTrack === 'advanced') && (
                                        <CircularProgress score={getRealScore('adjectives')} label={activeTrack === 'advanced' ? "Adjectives 2.0" : "Adj. Mastery"} colorClass="text-pink-500" strokeColor="#ec4899" icon={Palette}/>
                                    )}
                                    
                                    <CircularProgress score={getRealScore('key_structs')} label="Structures" colorClass="text-indigo-500" strokeColor="#6366f1" icon={Key}/>
                                </div>

                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentPortal />);
    </script>
</body>
</html>

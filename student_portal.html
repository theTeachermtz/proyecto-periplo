<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal del Alumno | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script>window.onload = function() { MobileDragDrop.polyfill({ holdToDrag: 400 }); };</script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "date-fns": "https://esm.sh/date-fns@2.30.0",
        "date-fns/locale": "https://esm.sh/date-fns@2.30.0/locale",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
        .animate-invite { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .notebook-lines { background-image: repeating-linear-gradient(transparent, transparent 31px, #e2e8f0 31px, #e2e8f0 32px); background-attachment: local; line-height: 32px; padding-top: 6px; }
        .dark .notebook-lines { background-image: repeating-linear-gradient(transparent, transparent 31px, #3f3f46 31px, #3f3f46 32px); }
        /* Shimmer loading */
        @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
        .shimmer { background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen font-sans pb-20 md:pb-0">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from 'firebase/firestore';
        import { format, addDays } from 'date-fns';
        import { es } from 'date-fns/locale';
        import { 
            Loader2, Target, Sparkles, Brain, Key, PenTool, Flame, ChevronLeft, ChevronRight,
            BarChart, BookOpen, Palette, Home, Gamepad2, Library, Quote, Play,
            Clock, Layers, Puzzle, Grid, Shuffle, Zap, CheckSquare, ArrowDownCircle,
            Headphones, MessageSquare, HelpCircle, Smartphone, Presentation, Dices,
            Users, Wifi, Trophy, Star, Calendar, Video, Eye, EyeOff, X
        } from 'lucide-react';

        const firebaseConfig = { 
            apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", 
            authDomain: "proyecto-periplo.firebaseapp.com", 
            projectId: "proyecto-periplo", 
            storageBucket: "proyecto-periplo.firebasestorage.app", 
            messagingSenderId: "236795998392", 
            appId: "1:236795998392:web:0da24b4f018611b55c844d" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // CONSTANTS
        // ============================================================
        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        // Router de juegos — mismo que index.html pero siempre con &student=true
        const getPlayLink = (q) => {
            const param = '&student=true';
            if (['PHONECHAT', 'AUDIOTRANSLATOR', 'VOICEREPLY'].includes(q.type)) {
                const mode = q.content?.gameMode || 'typing';
                if (mode === 'unscramble') return `audiotranslator.html?id=${q.id}${param}`;
                if (mode === 'voice') return `voicereply.html?id=${q.id}${param}`;
                return `phonechat.html?id=${q.id}${param}`;
            }
            if (q.type === 'READING') return `reading.html?id=${q.id}${param}`;
            if (q.type === 'MATCH') return `match.html?id=${q.id}${param}`;
            if (q.type === 'LINGOMATCH') return `lingomatch.html?id=${q.id}${param}`;
            if (q.type === 'WordCascade') return `wordcascade.html?id=${q.id}${param}`;
            if (q.type === 'NEVEREVER') return `neverever.html?id=${q.id}${param}`;
            if (q.type === 'TALKTIME') return `talktime.html?id=${q.id}${param}`;
            if (q.type === 'UNO') return `uno.html?id=${q.id}${param}`;
            if (q.type === 'LISTENING') return `listening.html?id=${q.id}${param}`;
            if (q.type === 'FLASHCARDS') return `flashcards.html?id=${q.id}${param}`;
            if (q.type === 'CROSSWORD') return `crossword.html?id=${q.id}${param}`;
            if (q.type === 'ANAGRAM') return `anagram.html?id=${q.id}${param}`;
            if (q.type === 'MEMORAMA') return `memorama.html?id=${q.id}${param}`;
            if (q.type === 'EMOJISPELL') return `emojispell.html?id=${q.id}${param}`;
            if (q.type === 'PRESENTATION') return `presentations.html?id=${q.id}${param}`;
            if (q.type === 'BOARDGAME_BANK') return `periplo-party.html?id=${q.id}${param}`;
            return `activity.html?id=${q.id}${param}`;
        };

        // Íconos y colores por tipo de juego
        const GAME_META = {
            FLASHCARDS:    { icon: Layers,        color: 'from-sky-500 to-cyan-600',      label: 'Flashcards' },
            MEMORAMA:      { icon: Grid,           color: 'from-emerald-500 to-teal-600',   label: 'Memorama' },
            CROSSWORD:     { icon: Puzzle,         color: 'from-amber-500 to-orange-600',   label: 'Crucigrama' },
            ANAGRAM:       { icon: Shuffle,        color: 'from-pink-500 to-rose-600',      label: 'Anagrama' },
            EMOJISPELL:    { icon: Zap,            color: 'from-yellow-400 to-amber-500',   label: 'Emoji Spell' },
            MATCH:         { icon: CheckSquare,    color: 'from-violet-500 to-purple-600',  label: 'Match Game' },
            LINGOMATCH:    { icon: Zap,            color: 'from-fuchsia-500 to-pink-600',   label: 'LingoMatch' },
            WordCascade:   { icon: ArrowDownCircle,color: 'from-cyan-500 to-sky-600',       label: 'Word Cascade' },
            READING:       { icon: BookOpen,       color: 'from-lime-500 to-green-600',     label: 'Reading' },
            LISTENING:     { icon: Headphones,     color: 'from-teal-500 to-emerald-600',   label: 'Listening' },
            TALKTIME:      { icon: MessageSquare,  color: 'from-sky-400 to-blue-500',       label: 'Talk Time' },
            NEVEREVER:     { icon: HelpCircle,     color: 'from-fuchsia-400 to-violet-500', label: 'Never Ever' },
            PHONECHAT:     { icon: Smartphone,     color: 'from-green-500 to-emerald-600',  label: 'Phone Chat' },
            UNO:           { icon: Layers,         color: 'from-red-500 to-rose-600',       label: 'Periplo UNO' },
            PRESENTATION:  { icon: Presentation,   color: 'from-indigo-500 to-blue-600',    label: 'Presentación' },
            BOARDGAME_BANK:{ icon: Dices,          color: 'from-blue-500 to-indigo-600',    label: 'Party Game' },
        };

        // Tipos que son multijugador en clase - LINGOMATCH agregado
        const MULTI_TYPES = ['BOARDGAME_BANK', 'NEVEREVER', 'TALKTIME', 'UNO', 'LINGOMATCH'];

        const calculateArchetype = (s) => {
            if (!s) return { name: "Limbo / Por Evaluar", desc: "Realiza la evaluación para perfilar.", color: "text-zinc-400" };
            const vals = Object.values(s);
            const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
            if (avg >= 8) return { name: "The Linguist 🧠", desc: "Dominio excepcional del idioma.", color: "text-violet-400" };
            if (avg >= 6) return { name: "The Communicator 💬", desc: "Expresión fluida y confiada.", color: "text-blue-400" };
            if (avg >= 4) return { name: "The Explorer 🗺️", desc: "En camino, progresando bien.", color: "text-emerald-400" };
            return { name: "The Rookie 🌱", desc: "Todo gran viaje comienza con un paso.", color: "text-amber-400" };
        };

        // ============================================================
        // ROCKET ICON SVG
        // ============================================================
        const RocketIcon = ({size, className}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
                <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path>
                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path>
            </svg>
        );

        // ============================================================
        // VISTA: HOME
        // ============================================================
        const HomeView = ({ student, setTab }) => (
            <div className="space-y-6 fade-in">
                {/* Hero card */}
                <div className="bg-gradient-to-br from-indigo-600 to-purple-800 p-8 sm:p-10 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 transform translate-x-10 -translate-y-10"><Target size={200}/></div>
                    <div className="relative z-10">
                        <p className="text-indigo-200 font-bold text-xs tracking-widest uppercase mb-2">Periplo Student Hub</p>
                        <h1 className="text-4xl sm:text-5xl font-black mb-4">¡Hola, {student?.name?.split(' ')[0] || 'Alumno'}! 👋</h1>
                        <div className="flex flex-wrap gap-3">
                            <span className="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
                                <Flame size={14} className="text-orange-400"/> {student?.level?.toUpperCase() || 'BÁSICO'}
                            </span>
                            <span className="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold tracking-wider">
                                {calculateArchetype(student?.skills).name}
                            </span>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4">
                        {/* Agenda card */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-100 dark:bg-indigo-500/20 p-4 rounded-2xl text-indigo-600 dark:text-indigo-400"><Calendar size={24} /></div>
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white text-lg">Tu Agenda</h3>
                                    <p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Reserva y ve tus clases</p>
                                </div>
                            </div>
                            <button onClick={() => setTab('schedule')} className="bg-indigo-600 hover:bg-indigo-500 text-white font-black p-4 rounded-xl transition-transform active:scale-95 shadow-lg shadow-indigo-500/30">
                                <ChevronRight size={20} />
                            </button>
                        </div>

                        {/* Playground CTA */}
                        <button onClick={() => setTab('playground')} className="w-full bg-gradient-to-r from-rose-500 to-orange-500 rounded-[2rem] p-6 shadow-xl text-white flex items-center justify-between hover:scale-[1.02] transition-transform text-left">
                            <div>
                                <h3 className="font-black text-2xl mb-1">Juegos 🎮</h3>
                                <p className="text-rose-100 text-xs font-bold uppercase tracking-widest">Practica y aprende jugando</p>
                            </div>
                            <div className="bg-white/20 p-4 rounded-2xl"><Gamepad2 size={28}/></div>
                        </button>

                        {/* Performance CTA */}
                        <button onClick={() => setTab('performance')} className="w-full bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between hover:border-indigo-500 transition-colors text-left group">
                            <div>
                                <h3 className="font-black text-slate-800 dark:text-white text-lg">My Performance</h3>
                                <p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Ver mi progreso y fallas</p>
                            </div>
                            <div className="bg-slate-100 dark:bg-zinc-800 p-4 rounded-2xl text-slate-400 group-hover:text-indigo-500 group-hover:bg-indigo-50 dark:group-hover:bg-indigo-900/30 transition-colors">
                                <Target size={24}/>
                            </div>
                        </button>
                    </div>

                    <div className="space-y-4">
                        {/* Frase del día */}
                        <div className="bg-amber-50 dark:bg-amber-900/10 rounded-[2rem] p-6 sm:p-8 shadow-sm border border-amber-200 dark:border-amber-900/30 relative">
                            <Quote className="text-amber-200 dark:text-amber-900/50 absolute top-4 right-4" size={60}/>
                            <h4 className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-3">Frase del Día</h4>
                            <p className="text-xl sm:text-2xl font-black text-slate-800 dark:text-amber-50 leading-tight relative z-10">"A smooth sea never made a skilled sailor."</p>
                            <p className="text-sm text-slate-500 dark:text-amber-200/60 mt-2 font-bold">— Franklin D. Roosevelt</p>
                        </div>
                        {/* Library CTA */}
                        <button onClick={() => setTab('library')} className="w-full bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between hover:border-indigo-500 transition-colors text-left group">
                            <div>
                                <h3 className="font-black text-slate-800 dark:text-white text-lg">Biblioteca</h3>
                                <p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Recursos y presentaciones</p>
                            </div>
                            <div className="bg-slate-100 dark:bg-zinc-800 p-4 rounded-2xl text-slate-400 group-hover:text-indigo-500 group-hover:bg-indigo-50 dark:group-hover:bg-indigo-900/30 transition-colors">
                                <Library size={24}/>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        );

        // ============================================================
        // VISTA: PERFORMANCE
        // ============================================================
        const PerformanceView = ({ student, evalData }) => {
            const [activeTrack, setActiveTrack] = useState(student?.level || 'basic');
            const [detailModal, setDetailModal] = useState(null);

            const CONFIG = {
                basic: {
                    grammar: [
                        { id: 'g_present_simple', title: 'Present Simple', skills: ['Affirmative', 'Negative', 'Questions', 'Short Answers', 'Frequency Adverbs'] },
                        { id: 'g_present_cont', title: 'Present Continuous', skills: ['Form', 'Usage vs Simple', 'Stative Verbs'] },
                        { id: 'g_past_simple', title: 'Past Simple', skills: ['Regular Verbs', 'Irregular Verbs', 'Questions', 'Negatives'] },
                        { id: 'g_future', title: 'Future (will/going to)', skills: ['Will vs Going To', 'Predictions', 'Plans'] },
                        { id: 'g_modals_basic', title: 'Modal Verbs (Basic)', skills: ['Can/Could', 'Must/Have to', 'Should'] },
                    ],
                    nouns: [
                        { id: 'n_p_1', title: 'Pack 1: Essential Verbs', skills: ['Recognition', 'Usage in Context', 'Collocations'] },
                        { id: 'n_p_2', title: 'Pack 2: Daily Routines', skills: ['Recognition', 'Usage in Context', 'Collocations'] },
                        { id: 'n_p_3', title: 'Pack 3: Social & Emot.', skills: ['Recognition', 'Usage in Context', 'Collocations'] },
                    ],
                    key_structs: ['There is/are', 'How much/many', 'Comparative', 'Superlative', 'Imperatives']
                },
                advanced: {
                    grammar: [
                        { id: 'a_g_perf', title: 'Perfect Tenses', skills: ['Present Perfect Simple', 'Present Perfect Continuous', 'Past Perfect'] },
                        { id: 'a_g_cond', title: 'Conditionals', skills: ['Zero & First', 'Second', 'Third', 'Mixed'] },
                        { id: 'a_g_passive', title: 'Passive Voice', skills: ['Present/Past Passive', 'Modal Passives', 'Reporting Passives'] },
                    ],
                    nouns: [
                        { id: 'a_n_p1', title: 'Pack 1: Business Vocab', skills: ['Recognition', 'Usage in Context'] },
                        { id: 'a_n_p2', title: 'Pack 2: Academic Vocab', skills: ['Recognition', 'Usage in Context'] },
                    ],
                    key_structs: ['Reported Speech', 'Relative Clauses', 'Inversion (basic)', 'Gerunds vs Infinitives']
                },
                pro: {
                    grammar: [
                        { id: 'p_g_inv', title: 'Advanced Structures', skills: ['Inversion', 'Cleft Sentences', 'Subjunctive'] },
                        { id: 'p_g_disc', title: 'Discourse Markers', skills: ['Cohesion', 'Register', 'Hedging'] },
                    ],
                    nouns: [
                        { id: 'p_n_p1', title: 'Pack 1: Formal Register', skills: ['Recognition', 'Usage'] },
                    ],
                    key_structs: ['Ellipsis', 'Double Comparatives', 'Participle Clauses', 'Advanced Wish/Regret']
                }
            };

            const GRAMMAR_SKILLS = ['Concept', 'Formation', 'Usage', 'Errors', 'Practice'];
            const VOCAB_SKILLS = ['Recognition', 'Usage in Context', 'Collocations'];

            const trackConfig = CONFIG[activeTrack] || CONFIG.basic;

            const getRealScore = (section) => {
                let totalSkills = 0, earnedPoints = 0;
                const sections = section === 'grammar' ? trackConfig.grammar : trackConfig.nouns;
                if (!sections) return 0;
                sections.forEach(topic => {
                    const topicData = evalData[topic.id] || { skills: {} };
                    const skillList = topic.skills || [];
                    skillList.forEach(s => {
                        totalSkills++;
                        const status = topicData.skills?.[s] || 0;
                        earnedPoints += (status === 2 ? 1 : status === 1 ? 0.5 : 0);
                    });
                });
                return totalSkills === 0 ? 0 : Math.round((earnedPoints / totalSkills) * 100) / 10;
            };

            const macroTotal = Math.round(
                [getRealScore('grammar'), getRealScore('nouns')].reduce((a, b) => a + b, 0)
            );

            const archetypeData = calculateArchetype(student?.skills);

            const CircularProgress = ({ score, label, colorClass, strokeColor, icon: Icon, onClick }) => {
                const radius = 36; const circumference = 2 * Math.PI * radius;
                const offset = circumference - (score / 10) * circumference;
                return (
                    <button onClick={onClick} className="flex flex-col items-center gap-2 group hover:scale-105 transition-transform">
                        <div className="relative w-24 h-24 sm:w-28 sm:h-28">
                            <svg className="w-full h-full -rotate-90" viewBox="0 0 88 88">
                                <circle cx="44" cy="44" r={radius} fill="none" stroke="currentColor" strokeWidth="8" className="text-slate-200 dark:text-zinc-800"/>
                                <circle cx="44" cy="44" r={radius} fill="none" stroke={strokeColor} strokeWidth="8" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset} className="circle-transition"/>
                            </svg>
                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                <span className="text-lg sm:text-2xl font-black text-slate-800 dark:text-white">{score}</span>
                            </div>
                        </div>
                        <div className={`flex flex-col items-center gap-1 ${colorClass}`}>
                            <Icon className="w-4 h-4 sm:w-5 sm:h-5" />
                            <span className="text-[8px] sm:text-[10px] font-black uppercase tracking-widest text-center leading-tight">{label}</span>
                        </div>
                    </button>
                );
            };

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-gradient-to-r from-slate-800 to-zinc-900 rounded-[2.5rem] p-6 sm:p-8 shadow-xl border border-zinc-700 text-white">
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-6">
                            <div>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Macro Evaluación</p>
                                <h2 className={`text-2xl sm:text-3xl font-black flex items-center gap-2 ${archetypeData.color}`}>
                                    <Flame size={28}/> {archetypeData.name}
                                </h2>
                                <p className="text-sm text-slate-300 mt-2 max-w-md">{archetypeData.desc}</p>
                            </div>
                            <div className="bg-white/5 border border-white/10 p-5 rounded-2xl text-center shrink-0">
                                <span className="block text-4xl font-black text-amber-500">{macroTotal} <span className="text-xl text-slate-400">/ 20</span></span>
                                <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Global Pts</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-zinc-900 rounded-[2.5rem] p-4 sm:p-8 shadow-lg border border-slate-200 dark:border-zinc-800">
                        <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                            <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs sm:text-sm flex items-center gap-2">
                                <Sparkles className="text-indigo-500" size={18}/> MASTERY MODULES
                            </h3>
                            <div className="flex items-center bg-slate-100 dark:bg-zinc-800/50 border border-slate-200 dark:border-zinc-700 rounded-2xl p-1">
                                <button onClick={() => { const i = LEVEL_HIERARCHY.indexOf(activeTrack); if(i > 0) setActiveTrack(LEVEL_HIERARCHY[i-1]); }} disabled={LEVEL_HIERARCHY.indexOf(activeTrack) === 0} className="p-1.5 text-slate-400 hover:text-indigo-500 disabled:opacity-30 hover:bg-white dark:hover:bg-zinc-700 rounded-lg transition-colors"><ChevronLeft size={16}/></button>
                                <span className="font-black text-xs uppercase tracking-widest text-slate-700 dark:text-zinc-200 px-4">{activeTrack} MASTERY</span>
                                <button onClick={() => { const i = LEVEL_HIERARCHY.indexOf(activeTrack); if(i < 2) setActiveTrack(LEVEL_HIERARCHY[i+1]); }} disabled={LEVEL_HIERARCHY.indexOf(activeTrack) === 2} className="p-1.5 text-slate-400 hover:text-indigo-500 disabled:opacity-30 hover:bg-white dark:hover:bg-zinc-700 rounded-lg transition-colors"><ChevronRight size={16}/></button>
                            </div>
                        </div>

                        <div className="flex flex-col gap-4 w-full px-2 sm:px-8">
                            <div className="flex justify-center gap-3 sm:gap-6 w-full">
                                <CircularProgress score={getRealScore('grammar')} label="Grammar" colorClass="text-sky-500" strokeColor="#0ea5e9" icon={Brain} onClick={() => {}}/>
                                <CircularProgress score={getRealScore('nouns')} label="Vocabulary" colorClass="text-emerald-500" strokeColor="#10b981" icon={BookOpen} onClick={() => {}}/>
                                <CircularProgress score={macroTotal} label="Total" colorClass="text-amber-500" strokeColor="#f59e0b" icon={Trophy} onClick={() => {}}/>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // VISTA: SCHEDULE (placeholder mejorado)
        // ============================================================
        const ScheduleView = ({ student }) => (
            <div className="space-y-6 fade-in">
                <div className="bg-white dark:bg-zinc-900 rounded-[2.5rem] p-8 shadow-xl border border-slate-200 dark:border-zinc-800 text-center">
                    <div className="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-full inline-flex mb-6 text-indigo-500"><Calendar size={48}/></div>
                    <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-3">Tu Agenda</h2>
                    <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-md mx-auto">Aquí verás tus clases reservadas y podrás agendar nuevas sesiones con tu teacher.</p>
                </div>
            </div>
        );

        // ============================================================
        // VISTA: PLAYGROUND — ✅ NUEVA, conectada a Firestore
        // ============================================================
        // Juegos multijugador: carcasas fijas, siempre visibles, sin ?id
        // El alumno llega al lobby del juego y escribe el código de sala ahí.
        const MULTI_GAMES_STATIC = [
            {
                id: 'connect4',
                name: 'Connect 4',
                desc: 'Conecta 4 fichas y responde desafíos',
                emoji: '🔴',
                color: 'from-blue-600 to-blue-800',
                url: 'connect4.html?student=true'
            },
            {
                id: 'periplo-party',
                name: 'Periplo Party',
                desc: 'El juego de mesa del salón',
                emoji: '🎲',
                color: 'from-emerald-500 to-teal-700',
                url: 'periplo-party.html?student=true'
            },
            {
                id: 'neverever',
                name: 'Never Have I Ever',
                desc: 'Conversación con Present Perfect',
                emoji: '🤫',
                color: 'from-fuchsia-500 to-pink-700',
                url: 'neverever.html?student=true'
            },
            {
                id: 'talktime',
                name: 'Talk Time',
                desc: 'Dilemas y conversación guiada',
                emoji: '💬',
                color: 'from-sky-500 to-blue-700',
                url: 'talktime.html?student=true'
            },
            {
                id: 'uno',
                name: 'Periplo UNO',
                desc: 'UNO con vocabulario en inglés',
                emoji: '🃏',
                color: 'from-red-500 to-rose-700',
                url: 'uno.html?student=true'
            },
            {
                id: 'lingomatch',
                name: 'LingoMatch',
                desc: 'Empareja conceptos a toda velocidad',
                emoji: '⚡',
                color: 'from-fuchsia-500 to-pink-600',
                url: 'lingomatch.html?student=true'
            }
        ];

        const PlaygroundView = ({ student }) => {
            // Single player: viene de Firestore (studentVisible === true)
            const [singleGames, setSingleGames] = useState([]);
            const [loadingSingle, setLoadingSingle] = useState(true);
            const [activeSection, setActiveSection] = useState('single');

            useEffect(() => {
                const fetchGames = async () => {
                    try {
                        const q = query(
                            collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'),
                            where('studentVisible', '==', true)
                        );
                        const snap = await getDocs(q);
                        // Solo los que NO son multi
                        const list = snap.docs
                            .map(d => ({ id: d.id, ...d.data() }))
                            .filter(d => !MULTI_TYPES.includes(d.type));
                        setSingleGames(list);
                    } catch(e) {
                        console.error('Error cargando juegos:', e);
                    } finally {
                        setLoadingSingle(false);
                    }
                };
                fetchGames();
            }, []);

            // Tarjeta single player (viene de Firestore, tiene ?id)
            const SingleCard = ({ game }) => {
                const meta = GAME_META[game.type] || { icon: Gamepad2, color: 'from-slate-500 to-slate-600', label: game.type };
                const IconComp = meta.icon;
                return (
                    <a
                        href={getPlayLink(game)}
                        className="group bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl overflow-hidden hover:border-indigo-400 dark:hover:border-indigo-500 hover:shadow-xl hover:shadow-indigo-500/10 hover:scale-[1.03] transition-all flex flex-col"
                    >
                        <div className={`w-full h-16 bg-gradient-to-br ${meta.color} flex items-center justify-center text-white shrink-0`}>
                            <IconComp size={24}/>
                        </div>
                        <div className="p-3 flex-1 flex flex-col gap-1">
                            <p className="font-black text-xs text-slate-800 dark:text-white leading-tight line-clamp-2">{game.title}</p>
                            <p className="text-[9px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">{meta.label}</p>
                            {game.tags?.level && (
                                <span className="inline-block mt-1 text-[8px] font-black uppercase tracking-widest bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded-full self-start">
                                    {game.tags.level}
                                </span>
                            )}
                        </div>
                    </a>
                );
            };

            // Tarjeta multi (carcasa fija, sin ?id — el juego maneja su propio lobby)
            const MultiCard = ({ game }) => (
                <a
                    href={game.url}
                    className="group bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl overflow-hidden hover:border-emerald-400 dark:hover:border-emerald-500 hover:shadow-xl hover:shadow-emerald-500/10 hover:scale-[1.03] transition-all flex flex-col"
                >
                    <div className={`w-full h-20 bg-gradient-to-br ${game.color} flex items-center justify-center text-5xl shrink-0`}>
                        {game.emoji}
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-1">
                        <p className="font-black text-sm text-slate-800 dark:text-white leading-tight">{game.name}</p>
                        <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 leading-snug">{game.desc}</p>
                    </div>
                    <div className="px-4 pb-4">
                        <span className="text-[9px] font-black uppercase tracking-widest bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 px-2 py-1 rounded-full flex items-center gap-1 w-fit">
                            <Wifi size={8}/> Necesitas código de sala
                        </span>
                    </div>
                </a>
            );

            // Skeleton loader
            const SkeletonCard = () => (
                <div className="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl overflow-hidden">
                    <div className="w-full h-16 shimmer"/>
                    <div className="p-3 space-y-2">
                        <div className="h-3 rounded shimmer w-4/5"/>
                        <div className="h-2 rounded shimmer w-2/5"/>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 fade-in">
                    {/* Header */}
                    <div className="bg-gradient-to-br from-rose-500 to-orange-500 p-6 sm:p-8 rounded-[2.5rem] shadow-2xl text-white">
                        <p className="text-rose-200 font-bold text-xs tracking-widest uppercase mb-2">Área de Juegos</p>
                        <h1 className="text-3xl sm:text-4xl font-black mb-2">Game Zone 🎮</h1>
                        <p className="text-rose-100 text-sm font-bold">
                            {loadingSingle ? 'Cargando...' : `${singleGames.length} juego${singleGames.length !== 1 ? 's' : ''} solo · ${MULTI_GAMES_STATIC.length} en clase`}
                        </p>
                    </div>

                    {/* Tabs */}
                    <div className="flex bg-slate-100 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl p-1 gap-1">
                        <button
                            onClick={() => setActiveSection('single')}
                            className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${activeSection === 'single' ? 'bg-white dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-400 dark:text-zinc-500 hover:text-slate-600 dark:hover:text-zinc-300'}`}
                        >
                            <Gamepad2 size={14}/> Solo ({loadingSingle ? '...' : singleGames.length})
                        </button>
                        <button
                            onClick={() => setActiveSection('multi')}
                            className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${activeSection === 'multi' ? 'bg-white dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-400 dark:text-zinc-500 hover:text-slate-600 dark:hover:text-zinc-300'}`}
                        >
                            <Users size={14}/> En Clase ({MULTI_GAMES_STATIC.length})
                        </button>
                    </div>

                    {/* SINGLE PLAYER */}
                    {activeSection === 'single' && (
                        <div className="space-y-4">
                            {loadingSingle ? (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                    {[...Array(6)].map((_, i) => <SkeletonCard key={i}/>)}
                                </div>
                            ) : singleGames.length === 0 ? (
                                <div className="text-center py-16 bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800">
                                    <p className="text-4xl mb-4">🎮</p>
                                    <p className="font-bold text-slate-500 dark:text-zinc-500">Tu teacher aún no ha publicado juegos.</p>
                                    <p className="text-sm text-slate-400 dark:text-zinc-600 mt-1">¡Vuelve pronto!</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                    {singleGames.map(g => <SingleCard key={g.id} game={g}/>)}
                                </div>
                            )}
                        </div>
                    )}

                    {/* MULTIJUGADOR — carcasas fijas, siempre disponibles */}
                    {activeSection === 'multi' && (
                        <div className="space-y-4">
                            <div className="bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-900/30 rounded-2xl p-4 flex gap-3">
                                <Wifi className="text-amber-500 shrink-0 mt-0.5" size={18}/>
                                <div>
                                    <p className="font-black text-amber-800 dark:text-amber-300 text-sm">¿Cómo funciona?</p>
                                    <p className="text-amber-700 dark:text-amber-400/80 text-xs font-bold mt-0.5">
                                        Tu teacher abre el juego en clase y te da un código de sala. Entra al juego y escríbelo para unirte.
                                    </p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                {MULTI_GAMES_STATIC.map(g => <MultiCard key={g.id} game={g}/>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // VISTA: LIBRARY — presentaciones y recursos
        // ============================================================
        const LibraryView = ({ student }) => {
            const [presentations, setPresentations] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchPresentations = async () => {
                    try {
                        const q = query(
                            collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'),
                            where('studentVisible', '==', true)
                        );
                        const snap = await getDocs(q);
                        const list = snap.docs
                            .map(d => ({ id: d.id, ...d.data() }))
                            .filter(d => d.type === 'PRESENTATION');
                        setPresentations(list);
                    } catch(e) {
                        console.error(e);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchPresentations();
            }, []);

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-gradient-to-br from-indigo-500 to-blue-600 p-6 sm:p-8 rounded-[2.5rem] shadow-2xl text-white">
                        <p className="text-indigo-200 font-bold text-xs tracking-widest uppercase mb-2">Recursos</p>
                        <h1 className="text-3xl sm:text-4xl font-black mb-2">Biblioteca 📚</h1>
                        <p className="text-indigo-100 text-sm font-bold">Presentaciones y materiales de clase</p>
                    </div>

                    {loading ? (
                        <div className="flex items-center justify-center py-16">
                            <Loader2 className="animate-spin text-indigo-500" size={32}/>
                        </div>
                    ) : presentations.length === 0 ? (
                        <div className="text-center py-16 bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800">
                            <p className="text-4xl mb-4">📚</p>
                            <p className="font-bold text-slate-500 dark:text-zinc-500">Aún no hay presentaciones publicadas.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {presentations.map(p => (
                                <a
                                    key={p.id}
                                    href={`presentations.html?id=${p.id}&student=true`}
                                    className="group bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl p-5 hover:border-indigo-400 dark:hover:border-indigo-500 hover:shadow-lg transition-all flex items-center gap-4"
                                >
                                    <div className="w-12 h-12 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-xl flex items-center justify-center text-white shrink-0">
                                        <Presentation size={20}/>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <p className="font-black text-slate-800 dark:text-white truncate">{p.title}</p>
                                        <p className="text-xs text-slate-400 dark:text-zinc-500 font-bold uppercase tracking-wider mt-0.5">{p.tags?.level || ''} · {p.tags?.category || ''}</p>
                                    </div>
                                    <Play size={16} className="text-indigo-500 shrink-0 group-hover:scale-110 transition-transform"/>
                                </a>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // APP ROOT
        // ============================================================
        const StudentApp = () => {
            const [student, setStudent] = useState(null);
            const [evalData, setEvalData] = useState({});
            const [loading, setLoading] = useState(true);
            const [currentTab, setCurrentTab] = useState('home');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [hasClickedMenu, setHasClickedMenu] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { setLoading(false); return; }

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                    }
                    setLoading(false);
                });
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-zinc-950">
                    <Loader2 className="animate-spin text-indigo-500" size={48}/>
                </div>
            );

            if (!student) return (
                <div className="h-screen flex flex-col items-center justify-center bg-zinc-950 text-white p-8 text-center">
                    <p className="text-6xl mb-6">🚀</p>
                    <h1 className="text-3xl font-black mb-3">Periplo Student Hub</h1>
                    <p className="text-zinc-400 font-bold mb-2">Accede con tu link personalizado.</p>
                    <p className="text-zinc-600 text-sm">Si no tienes uno, pídelo a tu teacher.</p>
                </div>
            );

            const NAV_ITEMS = [
                { id: 'home',        label: 'Inicio',     icon: Home },
                { id: 'performance', label: 'Mi Progreso', icon: Target },
                { id: 'schedule',    label: 'Agenda',     icon: Calendar },
                { id: 'playground',  label: 'Juegos',     icon: Gamepad2 },
                { id: 'library',     label: 'Biblioteca', icon: Library },
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 dark:bg-zinc-950 overflow-x-hidden">

                    {/* ── SIDEBAR (desktop) ── */}
                    <aside className={`hidden md:flex flex-col bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 fixed h-full z-50 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className={`p-6 pb-2 border-b border-slate-100 dark:border-zinc-800/50 flex items-center h-[88px] ${isSidebarOpen ? 'justify-start gap-3' : 'justify-center'}`}>
                            <button
                                onClick={() => { setIsSidebarOpen(!isSidebarOpen); setHasClickedMenu(true); }}
                                className={`bg-indigo-600 p-2.5 rounded-xl text-white transition-all hover:bg-indigo-500 shadow-md shrink-0 ${!hasClickedMenu ? 'animate-invite' : ''}`}
                                title={isSidebarOpen ? "Colapsar menú" : "Expandir menú"}
                            >
                                <RocketIcon size={20}/>
                            </button>
                            {isSidebarOpen && <h1 className="text-xl font-black tracking-tight whitespace-nowrap fade-in">Periplo</h1>}
                        </div>

                        <nav className={`flex-1 py-4 space-y-2 overflow-y-auto no-scrollbar flex flex-col ${isSidebarOpen ? 'px-4' : 'items-center px-0'}`}>
                            {isSidebarOpen && <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-3 mb-4 mt-2 w-full fade-in">Menú Principal</div>}
                            {NAV_ITEMS.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentTab(item.id)}
                                    title={!isSidebarOpen ? item.label : ''}
                                    className={`flex items-center rounded-2xl font-bold transition-all ${isSidebarOpen ? 'w-full px-4 py-3 gap-3 justify-start' : 'w-12 h-12 justify-center shrink-0'} ${currentTab === item.id ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400' : 'text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-800/50 hover:text-slate-900 dark:hover:text-white'}`}
                                >
                                    <item.icon size={20} className={`${currentTab === item.id ? 'stroke-[2.5px]' : ''} shrink-0`}/>
                                    {isSidebarOpen && <span className="whitespace-nowrap fade-in">{item.label}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className={`p-4 border-t border-slate-100 dark:border-zinc-800/50 flex ${isSidebarOpen ? 'items-center justify-start gap-3' : 'justify-center'}`}>
                            <div className="w-10 h-10 rounded-full bg-indigo-100 dark:bg-zinc-800 flex items-center justify-center font-black text-indigo-600 dark:text-indigo-400 shrink-0">
                                {student?.name?.charAt(0) || '?'}
                            </div>
                            {isSidebarOpen && (
                                <div className="overflow-hidden fade-in">
                                    <p className="text-sm font-bold truncate text-slate-800 dark:text-white">{student?.name}</p>
                                    <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest truncate">{student?.level}</p>
                                </div>
                            )}
                        </div>
                    </aside>

                    {/* ── MAIN ── */}
                    <main className={`flex-1 min-w-0 relative pb-24 md:pb-8 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'md:ml-64' : 'md:ml-20'}`}>

                        {/* Mobile header */}
                        <header className="md:hidden bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40 p-4 flex justify-between items-center">
                            <h1 className="text-lg font-black flex items-center gap-2">
                                <RocketIcon size={20} className="text-indigo-500"/> Periplo
                            </h1>
                            <div className="w-8 h-8 rounded-full bg-indigo-100 dark:bg-zinc-800 flex items-center justify-center font-black text-indigo-600 dark:text-indigo-400 text-xs">
                                {student?.name?.charAt(0) || '?'}
                            </div>
                        </header>

                        <div className="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8 w-full">
                            {currentTab === 'home'        && <HomeView student={student} setTab={setCurrentTab}/>}
                            {currentTab === 'performance' && <PerformanceView student={student} evalData={evalData}/>}
                            {currentTab === 'schedule'    && <ScheduleView student={student}/>}
                            {currentTab === 'playground'  && <PlaygroundView student={student}/>}
                            {currentTab === 'library'     && <LibraryView student={student}/>}
                        </div>
                    </main>

                    {/* ── BOTTOM NAV (mobile) ── */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white/90 dark:bg-zinc-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-zinc-800 pb-safe z-50 flex justify-around px-2 py-2">
                        {NAV_ITEMS.map(item => (
                            <button
                                key={item.id}
                                onClick={() => setCurrentTab(item.id)}
                                className={`flex flex-col items-center justify-center w-16 h-14 rounded-2xl transition-all ${currentTab === item.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-zinc-300'}`}
                            >
                                <div className={`${currentTab === item.id ? 'bg-indigo-50 dark:bg-indigo-500/20 p-1.5 rounded-xl mb-1' : 'mb-1'}`}>
                                    <item.icon size={20} className={currentTab === item.id ? 'stroke-[2.5px]' : ''}/>
                                </div>
                                <span className={`text-[9px] font-bold ${currentTab === item.id ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentApp />);
    </script>
</body>
</html>

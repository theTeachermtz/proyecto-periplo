<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Performance | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        /* Animación para los anillos SVG */
        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, Calendar, Video, Trophy, Target, Sparkles, Brain, Key, PenTool } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- NECESITAMOS LA MISMA CONFIG PARA CALCULAR LOS PROMEDIOS ---
        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];
        const CORE_MASTERY_SKILLS = ["Aplica en conversación", "Identifica al escuchar", "Pronuncia correctamente"];
        const ADVANCED_VERB_SKILLS = ["Significado al verlo", "Pronuncia correctamente", "Concordancia (Contexto)", "Aplica en conversación", "Identifica al escuchar"];
        const PRO_VERB_SKILLS = ["Precisión de registro", "Fluidez espontánea", "Aplica en debate", "Identifica matiz/tono", "Comprende a nativos"];

        const CONFIG = {
            basic: {
                grammar: [
                    { id: 'modal_verbs', skills: ["Significado correcto", "Omisión del 'to'", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS] },
                    { id: 'present_simple', skills: ["Regla de la 's'", "Auxiliar Do/Does", "Negación don't/doesn't", "WH Questions", ...UNIVERSAL_SKILLS] },
                    { id: 'present_continuous', skills: ["Verbo To Be", "Sufijo -ing", "Contraste vs Simple", "Reglas deletreo", ...UNIVERSAL_SKILLS] },
                    { id: 'going_to', skills: ["Inclusión To Be", "Partícula 'to'", "Contraste vs Will", "Negación", ...UNIVERSAL_SKILLS] }
                ],
                verbs: [ ...CORE_MASTERY_SKILLS, "Pack 1 (Daily Routine & Work)", "Pack 2 (Home & Communication)", "Pack 3 (Travel & Conflict)", "Pack 4 (Business & Emotion)", "Pack 5 (Action & Strategy)", "Pack 6 (Thoughts & Senses)", "Pack 7 (Interactions & Science)", "Pack 8 (Corporate & Economy)", "Pack 9 (Medical & Survival)" ],
                key_structs: [ ...CORE_MASTERY_SKILLS, "FANBOYS", "Subordinating Conj.", "Correlative Conj.", "Prep. Time (In,On,At)", "Prep. Place", "Prep. Movement", "Other Prepositions", "Quantifiers", "Possessive Adj.", "Possessive Pronouns", "Object Pronouns", "Frequency Adverbs" ]
            },
            advanced: {
                grammar: [
                    { id: 'past_simple', skills: ["Confunde pasado/presente", "Usa did en afirmativo", "Did + Verb in Past", "Pronunciación -ed", ...UNIVERSAL_SKILLS] },
                    { id: 'second_cond', skills: ["Would en cláusula IF", "Presente vs Pasado", "Uso de 'Were'", "Contracción 'd", ...UNIVERSAL_SKILLS] },
                    { id: 'past_cont', skills: ["Olvida was/were", "When vs While", "Uso State Verbs", "Concordancia", ...UNIVERSAL_SKILLS] },
                    { id: 'past_future', skills: ["Will para planes pasados", "Concordancia (They was)", "vs Used To", "Auxiliar be", ...UNIVERSAL_SKILLS] }
                ],
                verbs: [ { id: 'v_reg', skills: ADVANCED_VERB_SKILLS }, { id: 'v_irreg', skills: ADVANCED_VERB_SKILLS }, { id: 'v_part', skills: ADVANCED_VERB_SKILLS }, { id: 'v_phrasal', skills: ADVANCED_VERB_SKILLS } ],
                key_structs: [ "Used to / Use to", "Comparatives", "Superlatives", "Idiomatic Expressions", "Possessive Nouns", "Relative Clauses", "Modals of Possibility", "Passive Voice" ]
            },
            pro: {
                grammar: [
                    { id: 'perf_tenses', skills: ["Confunde con Past Simple", "Omite auxiliar Have/Had", "Error en Participio", "For/Since incorrecto", ...UNIVERSAL_SKILLS] },
                    { id: 'perf_cont', skills: ["Omite 'been'", "Usa con State Verbs", "Confunde duración/resultado", "Falla estructura", ...UNIVERSAL_SKILLS] },
                    { id: 'third_cond', skills: ["'Would' en cláusula IF", "Falla en participio", "Confunde irrealidad", "Olvida 'have'", ...UNIVERSAL_SKILLS] },
                    { id: 'mixed_cond', skills: ["Mezcla mal los tiempos", "Confunde resultado presente", "Estructura incompleta", "Uso ilógico", ...UNIVERSAL_SKILLS] }
                ],
                verbs: [ { id: 'v_phrasal2', skills: PRO_VERB_SKILLS }, { id: 'v_idioms', skills: PRO_VERB_SKILLS }, { id: 'v_sayings', skills: PRO_VERB_SKILLS }, { id: 'v_colloc', skills: PRO_VERB_SKILLS } ],
                key_structs: [ "Inversion (Never have I...)", "Cleft Sentences (It was X who...)", "Participle Clauses", "Advanced Wish/Regret", "Double Comparatives", "Future in the Past", "Ellipsis & Substitution" ]
            }
        };

        // COMPONENTE: Anillo de Progreso Circular
        const CircularProgress = ({ score, label, colorClass, strokeColor, icon: Icon }) => {
            const percentage = (score / 10) * 100;
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <div className="flex flex-col items-center bg-zinc-900/50 p-4 rounded-3xl border border-zinc-800/50 relative overflow-hidden">
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        {/* Background Circle */}
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" className="text-zinc-800" />
                            {/* Progress Circle */}
                            <circle cx="50" cy="50" r={radius} stroke={strokeColor} strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="circle-transition" />
                        </svg>
                        <div className="absolute flex flex-col items-center">
                            <span className="text-xl font-black text-white">{score}</span>
                        </div>
                    </div>
                    <div className={`mt-3 flex items-center gap-2 ${colorClass}`}>
                        <Icon size={16} />
                        <span className="text-xs font-bold uppercase tracking-widest">{label}</span>
                    </div>
                </div>
            );
        };

        const StudentPortal = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [evalData, setEvalData] = useState({});
            const [activeTrack, setActiveTrack] = useState('basic');
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                // Si no hay ID, podríamos mostrar un error, por ahora simulamos carga infinita o redirección
                if (!id) return; 

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        if (['basic', 'advanced', 'pro'].includes(data.level)) setActiveTrack(data.level);
                    }
                    setLoading(false);
                });
            }, []);

            // Motor de cálculo de promedios (idéntico al del profesor)
            const calculateScore = (topicId, skillList) => {
                const topic = evalData[topicId] || { skills: {} };
                let earnedPoints = 0;
                skillList.forEach(skill => {
                    const status = topic.skills[skill] || 0;
                    if (status === 1) earnedPoints += 0.5;
                    if (status === 2) earnedPoints += 1;
                });
                return skillList.length === 0 ? 0 : Math.round(((earnedPoints / skillList.length) * 10) * 10) / 10;
            };

            const getSectionTotal = (sectionKey) => {
                const track = CONFIG[activeTrack];
                let totalScore = 0;
                let topics = [];
                
                if (sectionKey === 'grammar') topics = track.grammar;
                else if (sectionKey === 'verbs' && activeTrack !== 'basic') topics = track.verbs;
                else {
                    const list = sectionKey === 'verbs' ? track.verbs : track.key_structs;
                    return calculateScore(sectionKey, list);
                }

                topics.forEach(t => totalScore += calculateScore(t.id, t.skills));
                return topics.length === 0 ? 0 : Math.round((totalScore / topics.length) * 10) / 10;
            };

            // Dibuja la gráfica de Radar cuando la data está lista
            useEffect(() => {
                if (!loading && chartRef.current && student) {
                    const grammarScore = getSectionTotal('grammar');
                    const verbsScore = getSectionTotal('verbs');
                    const structsScore = getSectionTotal('key_structs');

                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new window.Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['Grammar', 'Verb Mastery', 'Key Structures'],
                            datasets: [{
                                label: 'Nivel de Dominio',
                                data: [grammarScore, verbsScore, structsScore],
                                backgroundColor: 'rgba(99, 102, 241, 0.2)', // Indigo transparente
                                borderColor: 'rgba(99, 102, 241, 1)',
                                pointBackgroundColor: ['#10b981', '#f43f5e', '#f59e0b'],
                                pointBorderColor: '#fff',
                                pointHoverBackgroundColor: '#fff',
                                pointHoverBorderColor: 'rgba(99, 102, 241, 1)',
                                borderWidth: 2,
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                    pointLabels: { color: '#a1a1aa', font: { family: 'Plus Jakarta Sans', size: 12, weight: 'bold' } },
                                    ticks: { display: false, min: 0, max: 10, stepSize: 2 }
                                }
                            },
                            plugins: { legend: { display: false } },
                            maintainAspectRatio: false
                        }
                    });
                }
            }, [loading, evalData, activeTrack]);

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            return (
                <div className="pb-24 fade-in">
                    {/* TOP HEADER */}
                    <div className="bg-indigo-600 dark:bg-indigo-900/50 pt-8 pb-16 px-6 rounded-b-[3rem] relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')]"></div>
                        <div className="max-w-4xl mx-auto relative z-10 flex justify-between items-start">
                            <div>
                                <p className="text-indigo-200 font-bold text-sm tracking-widest uppercase mb-1">My Performance</p>
                                <h1 className="text-3xl sm:text-4xl font-black text-white">¡Hola, {student?.name.split(' ')[0]}! 🚀</h1>
                                <div className="inline-block mt-3 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold text-white uppercase tracking-wider">
                                    Nivel: {student?.level || 'Basic'}
                                </div>
                            </div>
                            <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                                <Trophy className="text-yellow-400" size={32} />
                            </div>
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto px-6 -mt-10 space-y-6 relative z-20">
                        
                        {/* MODULE 1: AGENDA MOCKUP */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-100 dark:bg-indigo-500/20 p-4 rounded-2xl">
                                    <Calendar className="text-indigo-600 dark:text-indigo-400" size={28} />
                                </div>
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white text-lg leading-tight">Próxima Sesión</h3>
                                    <p className="text-slate-500 dark:text-zinc-400 text-sm font-semibold">Viernes, 5:00 PM (EST)</p>
                                </div>
                            </div>
                            <button className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-black px-6 py-3 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-indigo-500/30">
                                <Video size={18} /> Entrar a Clase
                            </button>
                        </div>

                        {/* MODULE 2: RADAR & CIRCULAR STATS */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            {/* RADAR CHART */}
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-lg border border-slate-200 dark:border-zinc-800 flex flex-col items-center">
                                <h3 className="w-full text-left font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-4 flex items-center gap-2">
                                    <Target className="text-indigo-500" size={16}/> Balance de Habilidades
                                </h3>
                                <div className="w-full h-64 relative">
                                    <canvas id="radarChart" ref={chartRef}></canvas>
                                </div>
                            </div>

                            {/* CIRCULAR PROGRESS GRID */}
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-lg border border-slate-200 dark:border-zinc-800">
                                <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-6 flex items-center gap-2">
                                    <Sparkles className="text-yellow-500" size={16}/> Dominio por Área
                                </h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <CircularProgress score={getSectionTotal('grammar')} label="Grammar" colorClass="text-emerald-500" strokeColor="#10b981" icon={PenTool}/>
                                    <CircularProgress score={getSectionTotal('verbs')} label="Verbs" colorClass="text-rose-500" strokeColor="#f43f5e" icon={Brain}/>
                                    <div className="col-span-2 flex justify-center">
                                        <div className="w-1/2 min-w-[150px]">
                                            <CircularProgress score={getSectionTotal('key_structs')} label="Structures" colorClass="text-amber-500" strokeColor="#f59e0b" icon={Key}/>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentPortal />);
    </script>
</body>
</html>

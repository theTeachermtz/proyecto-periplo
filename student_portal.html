<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal del Alumno | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "date-fns": "https://esm.sh/date-fns@2.30.0",
        "date-fns/locale": "https://esm.sh/date-fns@2.30.0/locale",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:       #0f0e0c;
            --surface:  #1a1814;
            --border:   #2e2b26;
            --amber:    #f5a623;
            --amber-dim:#b87a1a;
            --ember:    #e8572a;
            --sage:     #7fad8c;
            --mist:     #8ab4c2;
            --cream:    #f5ede0;
            --text:     #e8e0d4;
            --text-dim: #8a8070;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.35;
        }

        /* Warm radial glow behind content */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(245,166,35,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .syne { font-family: 'Syne', sans-serif; }

        /* Fade animations */
        .fade-in  { animation: fadeIn  0.45s ease-out both; }
        .fade-up  { animation: fadeUp  0.5s ease-out both; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* Stagger delays */
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.12s; }
        .delay-3 { animation-delay: 0.20s; }
        .delay-4 { animation-delay: 0.28s; }

        /* Shimmer for skeletons */
        @keyframes shimmer { from { background-position:-200% 0; } to { background-position:200% 0; } }
        .shimmer {
            background: linear-gradient(90deg, var(--surface) 25%, #2a2620 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        /* Surface cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .card-lg { border-radius: 28px; }

        /* Warm glow pulse for nav active */
        @keyframes warmPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(245,166,35,0.0); }
            50%      { box-shadow: 0 0 0 6px rgba(245,166,35,0.12); }
        }
        .nav-active { animation: warmPulse 2.5s ease-in-out infinite; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        /* Modal overlay */
        .modal-overlay {
            backdrop-filter: blur(12px);
            background: rgba(10,9,8,0.85);
        }

        /* Tag pills */
        .pill {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 99px;
            border: 1px solid;
        }

        /* Compass icon hand-drawn feel */
        @keyframes compassSpin {
            0%   { transform: rotate(0deg);   }
            20%  { transform: rotate(15deg);  }
            40%  { transform: rotate(-10deg); }
            60%  { transform: rotate(20deg);  }
            80%  { transform: rotate(-5deg);  }
            100% { transform: rotate(0deg);   }
        }
        .compass-wobble:hover { animation: compassSpin 1.2s ease-in-out; }

        /* Story mode node */
        .story-node {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .story-node::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px dashed var(--border);
        }

        /* Bottom nav safe area */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 12px); }

        /* Sidebar transition */
        .sidebar { transition: width 0.3s cubic-bezier(0.4,0,0.2,1); }

        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from 'firebase/firestore';
        import {
            Loader2, Target, Sparkles, Brain, BookOpen, Home, Gamepad2, Library,
            Play, Layers, Trophy, Star, Calendar, Headphones, Presentation,
            Users, Wifi, Map, ChevronRight, ChevronLeft, Flame, Quote,
            Lock, CheckCircle2, Circle, Compass, Scroll, Sword, Crown,
            X, Clock, Zap
        } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",
            authDomain: "proyecto-periplo.firebaseapp.com",
            projectId: "proyecto-periplo",
            storageBucket: "proyecto-periplo.firebasestorage.app",
            messagingSenderId: "236795998392",
            appId: "1:236795998392:web:0da24b4f018611b55c844d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ─────────────────────────────────────────────────────────────
        // LORE & LEVEL SYSTEM
        // ─────────────────────────────────────────────────────────────
        const LEVEL_LORE = {
            basic:    { name: 'Dreamer',  icon: '🌱', color: '#7fad8c', gradient: 'from-[#3a6b47] to-[#1e3a27]', pill: 'border-[#7fad8c] text-[#7fad8c] bg-[#7fad8c]/10' },
            advanced: { name: 'Warrior',  icon: '⚔️', color: '#f5a623', gradient: 'from-[#8a5a10] to-[#3a2408]', pill: 'border-[#f5a623] text-[#f5a623] bg-[#f5a623]/10' },
            pro:      { name: 'Champion', icon: '👑', color: '#8ab4c2', gradient: 'from-[#2a5a70] to-[#0e2a38]', pill: 'border-[#8ab4c2] text-[#8ab4c2] bg-[#8ab4c2]/10' },
            limbo:    { name: 'Wanderer', icon: '🧭', color: '#8a8070', gradient: 'from-[#3a3530] to-[#1a1814]', pill: 'border-[#8a8070] text-[#8a8070] bg-[#8a8070]/10' },
        };

        const ARCHETYPES = [
            { min: 8, name: 'The Linguist',      emoji: '🧠', desc: 'Dominio excepcional.', color: '#8ab4c2' },
            { min: 6, name: 'The Communicator',  emoji: '💬', desc: 'Fluido y confiado.',    color: '#f5a623' },
            { min: 4, name: 'The Explorer',       emoji: '🗺️', desc: 'En camino, avanzando.',color: '#7fad8c' },
            { min: 0, name: 'The Rookie',         emoji: '🌱', desc: 'El primer paso es hoy.',color: '#e8572a' },
        ];

        const getArchetype = (skills) => {
            if (!skills) return ARCHETYPES[3];
            const vals = Object.values(skills);
            const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
            return ARCHETYPES.find(a => avg >= a.min) || ARCHETYPES[3];
        };

        const getLevelLore = (level) => LEVEL_LORE[level] || LEVEL_LORE.limbo;

        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        // ─────────────────────────────────────────────────────────────
        // GAME ROUTING
        // ─────────────────────────────────────────────────────────────
        const getPlayLink = (q) => {
            const p = '&student=true';
            const t = (q.renderAs || q.type || '').toUpperCase();
            if (['PHONECHAT','AUDIOTRANSLATOR','VOICEREPLY'].includes(t)) {
                const mode = q.content?.gameMode || 'typing';
                if (mode === 'unscramble') return `audiotranslator.html?id=${q.id}${p}`;
                if (mode === 'voice')      return `voicereply.html?id=${q.id}${p}`;
                return `phonechat.html?id=${q.id}${p}`;
            }
            const MAP = {
                READING:'reading.html', MATCH:'match.html', LINGOMATCH:'lingomatch.html',
                WORDCASCADE:'wordcascade.html', NEVEREVER:'neverever.html', TALKTIME:'talktime.html',
                UNO:'uno.html', LISTENING:'listening.html', FLASHCARDS:'flashcards.html',
                CROSSWORD:'crossword.html', ANAGRAM:'anagram.html', MEMORAMA:'memorama.html',
                EMOJISPELL:'emojispell.html', PRESENTATION:'presentations.html',
                BOARDGAME_BANK:'periplo-party.html',
            };
            return `${MAP[t] || 'activity.html'}?id=${q.id}${p}`;
        };

        const GAME_META = {
            FLASHCARDS:    { emoji:'🃏', color:'#0ea5e9', label:'Flashcards' },
            MEMORAMA:      { emoji:'🧠', color:'#10b981', label:'Memorama' },
            CROSSWORD:     { emoji:'🧩', color:'#f59e0b', label:'Crucigrama' },
            ANAGRAM:       { emoji:'🔠', color:'#ec4899', label:'Anagrama' },
            EMOJISPELL:    { emoji:'⚡', color:'#eab308', label:'Emoji Spell' },
            MATCH:         { emoji:'✅', color:'#8b5cf6', label:'Match Game' },
            LINGOMATCH:    { emoji:'🔀', color:'#d946ef', label:'LingoMatch' },
            WORDCASCADE:   { emoji:'🔤', color:'#06b6d4', label:'Word Cascade' },
            TALKTIME:      { emoji:'💬', color:'#38bdf8', label:'Talk Time' },
            NEVEREVER:     { emoji:'🤫', color:'#a78bfa', label:'Never Ever' },
            PHONECHAT:     { emoji:'📱', color:'#22c55e', label:'Phone Chat' },
            UNO:           { emoji:'🃏', color:'#ef4444', label:'Periplo UNO' },
            PRESENTATION:  { emoji:'📽️', color:'#6366f1', label:'Presentación' },
            BOARDGAME_BANK:{ emoji:'🎲', color:'#3b82f6', label:'Party Game' },
            READING:       { emoji:'📖', color:'#84cc16', label:'Reading' },
            LISTENING:     { emoji:'🎧', color:'#14b8a6', label:'Listening' },
        };

        const LIBRARY_TYPES = ['READING', 'LISTENING', 'PRESENTATION'];

        const MULTI_GAMES_STATIC = [
            { id:'connect4',     name:'Connect 4',          desc:'Conecta 4 y responde desafíos', emoji:'🔴', color:'#3b82f6', url:'connect4.html?student=true' },
            { id:'periplo-party',name:'Periplo Party',       desc:'El juego de mesa del salón',    emoji:'🎲', color:'#10b981', url:'periplo-party.html?student=true' },
            { id:'memorama',     name:'Memorama',            desc:'Encuentra los pares en equipo', emoji:'🧠', color:'#0ea5e9', url:'memorama.html?student=true' },
            { id:'neverever',    name:'Never Have I Ever',   desc:'Conversación con Present Perfect',emoji:'🤫',color:'#a78bfa',url:'neverever.html?student=true' },
            { id:'talktime',     name:'Talk Time',           desc:'Dilemas y conversación guiada', emoji:'💬', color:'#8b5cf6', url:'talktime.html?student=true' },
            { id:'uno',          name:'Periplo UNO',         desc:'UNO con vocabulario en inglés', emoji:'🃏', color:'#ef4444', url:'uno.html?student=true' },
            { id:'lingomatch',   name:'LingoMatch',          desc:'Match de palabras rápido',       emoji:'🔀', color:'#d946ef', url:'lingomatch.html?student=true' },
        ];

        const DAILY_QUOTES = [
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
            { text: "A smooth sea never made a skilled sailor.", author: "Franklin D. Roosevelt" },
            { text: "Fall seven times, stand up eight.", author: "Japanese Proverb" },
            { text: "The journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
            { text: "Difficulties strengthen the mind, as labor does the body.", author: "Seneca" },
            { text: "The obstacle is the way.", author: "Marcus Aurelius" },
            { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
        ];

        const getDailyQuote = () => {
            const day = new Date().getDay();
            return DAILY_QUOTES[day % DAILY_QUOTES.length];
        };

        // ─────────────────────────────────────────────────────────────
        // COMPASS ICON
        // ─────────────────────────────────────────────────────────────
        const CompassIcon = ({ size = 24, className = '' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/>
                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="currentColor" opacity="0.3"/>
                <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            </svg>
        );

        // ─────────────────────────────────────────────────────────────
        // STORY MODE MODAL (En Construcción)
        // ─────────────────────────────────────────────────────────────
        const StoryModeModal = ({ onClose, lore }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
                <div
                    className="relative max-w-sm w-full card card-lg p-8 text-center"
                    style={{ border: `1px solid ${lore.color}40` }}
                    onClick={e => e.stopPropagation()}
                >
                    {/* Glow */}
                    <div className="absolute inset-0 rounded-[28px] pointer-events-none"
                         style={{ boxShadow: `inset 0 0 60px ${lore.color}10` }}/>

                    <button onClick={onClose}
                        className="absolute top-4 right-4 text-[var(--text-dim)] hover:text-[var(--text)] transition-colors">
                        <X size={18}/>
                    </button>

                    {/* Icon */}
                    <div className="relative inline-flex mb-6">
                        <div className="w-20 h-20 rounded-full flex items-center justify-center text-4xl"
                             style={{ background: `${lore.color}15`, border: `2px solid ${lore.color}30` }}>
                            🗺️
                        </div>
                        <div className="absolute -bottom-1 -right-1 w-7 h-7 rounded-full flex items-center justify-center text-sm"
                             style={{ background: '#0f0e0c', border: `1px solid ${lore.color}40` }}>
                            🔒
                        </div>
                    </div>

                    <p className="syne text-[10px] font-bold tracking-[0.15em] uppercase mb-2"
                       style={{ color: lore.color }}>Modo Historia</p>
                    <h2 className="syne text-2xl font-extrabold text-[var(--cream)] mb-3">
                        The Path Awaits
                    </h2>
                    <p className="text-[var(--text-dim)] text-sm leading-relaxed mb-6">
                        El camino se está trazando. Pronto cada semana será un capítulo,
                        cada juego un paso en tu periplo. Los que lleguen primero
                        serán los primeros en explorarlo.
                    </p>

                    {/* Status badge */}
                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold mb-6"
                         style={{ background: '#f5a62315', border: '1px solid #f5a62330', color: '#f5a623' }}>
                        <Clock size={12}/> En construcción
                    </div>

                    {/* Lore flavour */}
                    <div className="rounded-2xl p-4 text-xs leading-relaxed text-[var(--text-dim)] italic"
                         style={{ background: `${lore.color}08`, border: `1px solid ${lore.color}15` }}>
                        "No importa a dónde vas — aprender inglés es solo la excusa.
                        El periplo real eres tú, en el camino."
                    </div>

                    <button onClick={onClose}
                        className="mt-6 w-full py-3 rounded-2xl font-bold text-sm transition-all hover:opacity-80 active:scale-95"
                        style={{ background: `${lore.color}20`, color: lore.color, border: `1px solid ${lore.color}30` }}>
                        Volver al Portal
                    </button>
                </div>
            </div>
        );

        // ─────────────────────────────────────────────────────────────
        // VISTA: HOME
        // ─────────────────────────────────────────────────────────────
        const HomeView = ({ student, setTab, showStory }) => {
            const lore = getLevelLore(student?.level);
            const archetype = getArchetype(student?.skills);
            const quote = getDailyQuote();
            const firstName = student?.name?.split(' ')[0] || 'Viajero';

            return (
                <div className="space-y-5 fade-in">

                    {/* ── HERO GREETING ── */}
                    <div className="card card-lg p-7 relative overflow-hidden"
                         style={{ borderColor: `${lore.color}30` }}>
                        {/* Background glow blob */}
                        <div className="absolute -top-8 -right-8 w-48 h-48 rounded-full pointer-events-none"
                             style={{ background: `radial-gradient(circle, ${lore.color}12 0%, transparent 70%)` }}/>

                        <div className="relative z-10">
                            {/* Greeting */}
                            <p className="syne text-[10px] font-bold tracking-[0.2em] uppercase mb-1"
                               style={{ color: lore.color }}>
                                Bienvenido de vuelta
                            </p>
                            <h1 className="syne text-3xl sm:text-4xl font-extrabold text-[var(--cream)] mb-4 leading-tight">
                                {firstName}
                            </h1>

                            {/* Level + Archetype pills */}
                            <div className="flex flex-wrap gap-2">
                                <span className={`pill ${lore.pill}`}>
                                    {lore.icon} {lore.name}
                                </span>
                                <span className="pill"
                                      style={{ borderColor: `${archetype.color}50`, color: archetype.color, background: `${archetype.color}10` }}>
                                    {archetype.emoji} {archetype.name}
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* ── QUICK ACTIONS ── */}
                    <div className="grid grid-cols-2 gap-3">

                        {/* Story Mode — CTA principal */}
                        <button onClick={showStory}
                            className="col-span-2 card card-lg p-5 flex items-center justify-between group hover:border-[#f5a62340] transition-all active:scale-[0.99]"
                            style={{ borderColor: '#f5a62320' }}>
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl compass-wobble"
                                     style={{ background: '#f5a62315', border: '1px solid #f5a62325' }}>
                                    🗺️
                                </div>
                                <div className="text-left">
                                    <p className="syne font-bold text-[var(--cream)] text-sm">Modo Historia</p>
                                    <p className="text-[10px] font-bold uppercase tracking-widest"
                                       style={{ color: '#f5a623' }}>Tu camino · Próximamente</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-1.5 text-[var(--text-dim)]">
                                <Lock size={14} className="opacity-50"/>
                                <ChevronRight size={16} className="group-hover:translate-x-0.5 transition-transform"/>
                            </div>
                        </button>

                        {/* Juegos */}
                        <button onClick={() => setTab('playground')}
                            className="card card-lg p-5 flex flex-col gap-3 group hover:border-[#e8572a50] transition-all active:scale-[0.98]"
                            style={{ borderColor: '#e8572a20' }}>
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl"
                                 style={{ background: '#e8572a15' }}>🎮</div>
                            <div className="text-left">
                                <p className="syne font-bold text-[var(--cream)] text-sm">Game Zone</p>
                                <p className="text-[10px] text-[var(--text-dim)] font-bold uppercase tracking-wider">Practica jugando</p>
                            </div>
                        </button>

                        {/* Biblioteca */}
                        <button onClick={() => setTab('library')}
                            className="card card-lg p-5 flex flex-col gap-3 group hover:border-[#8ab4c250] transition-all active:scale-[0.98]"
                            style={{ borderColor: '#8ab4c220' }}>
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl"
                                 style={{ background: '#8ab4c215' }}>📚</div>
                            <div className="text-left">
                                <p className="syne font-bold text-[var(--cream)] text-sm">Biblioteca</p>
                                <p className="text-[10px] text-[var(--text-dim)] font-bold uppercase tracking-wider">Lecturas · Recursos</p>
                            </div>
                        </button>

                        {/* Performance */}
                        <button onClick={() => setTab('performance')}
                            className="card card-lg p-5 flex flex-col gap-3 group hover:border-[#7fad8c50] transition-all active:scale-[0.98]"
                            style={{ borderColor: '#7fad8c20' }}>
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl"
                                 style={{ background: '#7fad8c15' }}>📊</div>
                            <div className="text-left">
                                <p className="syne font-bold text-[var(--cream)] text-sm">Mi Progreso</p>
                                <p className="text-[10px] text-[var(--text-dim)] font-bold uppercase tracking-wider">Skills · Evaluación</p>
                            </div>
                        </button>

                        {/* Agenda */}
                        <button onClick={() => setTab('schedule')}
                            className="card card-lg p-5 flex flex-col gap-3 group hover:border-[#a78bfa50] transition-all active:scale-[0.98]"
                            style={{ borderColor: '#a78bfa20' }}>
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl"
                                 style={{ background: '#a78bfa15' }}>🗓️</div>
                            <div className="text-left">
                                <p className="syne font-bold text-[var(--cream)] text-sm">Agenda</p>
                                <p className="text-[10px] text-[var(--text-dim)] font-bold uppercase tracking-wider">Clases · Sesiones</p>
                            </div>
                        </button>
                    </div>

                    {/* ── QUOTE OF THE DAY ── */}
                    <div className="card card-lg p-6 relative overflow-hidden"
                         style={{ borderColor: '#f5a62320' }}>
                        <div className="absolute top-4 right-5 syne text-[80px] font-black leading-none pointer-events-none select-none"
                             style={{ color: '#f5a62308' }}>"</div>
                        <p className="syne text-[9px] font-bold tracking-[0.2em] uppercase mb-3"
                           style={{ color: '#f5a623' }}>Thought for today</p>
                        <p className="text-[var(--cream)] font-semibold text-base leading-snug relative z-10 mb-2 italic">
                            "{quote.text}"
                        </p>
                        <p className="text-xs font-bold" style={{ color: '#f5a62380' }}>— {quote.author}</p>
                    </div>

                </div>
            );
        };

        // ─────────────────────────────────────────────────────────────
        // VISTA: PERFORMANCE
        // ─────────────────────────────────────────────────────────────
        const PerformanceView = ({ student, evalData }) => {
            const [activeTrack, setActiveTrack] = useState(student?.level || 'basic');
            const archetype = getArchetype(student?.skills);

            const CONFIG = {
                basic: {
                    grammar: [
                        { id:'g_present_simple', title:'Present Simple',          skills:['Affirmative','Negative','Questions','Short Answers','Frequency Adverbs'] },
                        { id:'g_present_cont',   title:'Present Continuous',      skills:['Form','Usage vs Simple','Stative Verbs'] },
                        { id:'g_past_simple',    title:'Past Simple',             skills:['Regular Verbs','Irregular Verbs','Questions','Negatives'] },
                        { id:'g_future',         title:'Future (will/going to)',  skills:['Will vs Going To','Predictions','Plans'] },
                        { id:'g_modals_basic',   title:'Modal Verbs (Basic)',     skills:['Can/Could','Must/Have to','Should'] },
                    ],
                    nouns: [
                        { id:'n_p_1', title:'Pack 1: Essential Verbs',  skills:['Recognition','Usage in Context','Collocations'] },
                        { id:'n_p_2', title:'Pack 2: Daily Routines',   skills:['Recognition','Usage in Context','Collocations'] },
                        { id:'n_p_3', title:'Pack 3: Social & Emot.',   skills:['Recognition','Usage in Context','Collocations'] },
                    ],
                },
                advanced: {
                    grammar: [
                        { id:'a_g_perf',    title:'Perfect Tenses',   skills:['Present Perfect Simple','Present Perfect Continuous','Past Perfect'] },
                        { id:'a_g_cond',    title:'Conditionals',     skills:['Zero & First','Second','Third','Mixed'] },
                        { id:'a_g_passive', title:'Passive Voice',    skills:['Present/Past Passive','Modal Passives','Reporting Passives'] },
                    ],
                    nouns: [
                        { id:'a_n_p1', title:'Pack 1: Business Vocab',  skills:['Recognition','Usage in Context'] },
                        { id:'a_n_p2', title:'Pack 2: Academic Vocab',  skills:['Recognition','Usage in Context'] },
                    ],
                },
                pro: {
                    grammar: [
                        { id:'p_g_inv',  title:'Advanced Structures', skills:['Inversion','Cleft Sentences','Subjunctive'] },
                        { id:'p_g_disc', title:'Discourse Markers',   skills:['Cohesion','Register','Hedging'] },
                    ],
                    nouns: [
                        { id:'p_n_p1', title:'Pack 1: Formal Register', skills:['Recognition','Usage'] },
                    ],
                }
            };

            const trackConfig = CONFIG[activeTrack] || CONFIG.basic;
            const lore = getLevelLore(activeTrack);

            const getRealScore = (section) => {
                let total = 0, earned = 0;
                const secs = section === 'grammar' ? trackConfig.grammar : trackConfig.nouns;
                if (!secs) return 0;
                secs.forEach(topic => {
                    const td = evalData[topic.id] || { skills:{} };
                    topic.skills.forEach(s => {
                        total++;
                        const st = td.skills?.[s] || 0;
                        earned += st === 2 ? 1 : st === 1 ? 0.5 : 0;
                    });
                });
                return total === 0 ? 0 : Math.round((earned/total)*100)/10;
            };

            const gScore = getRealScore('grammar');
            const vScore = getRealScore('nouns');
            const total  = Math.round(gScore + vScore);

            const Arc = ({ score, label, color, icon: Icon }) => {
                const r = 34, c = 2 * Math.PI * r;
                const off = c - (score/10)*c;
                return (
                    <div className="flex flex-col items-center gap-2">
                        <div className="relative w-20 h-20">
                            <svg className="w-full h-full -rotate-90" viewBox="0 0 80 80">
                                <circle cx="40" cy="40" r={r} fill="none" stroke="#2e2b26" strokeWidth="7"/>
                                <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="7"
                                    strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
                                    className="circle-transition"/>
                            </svg>
                            <div className="absolute inset-0 flex items-center justify-center">
                                <span className="syne font-extrabold text-lg text-[var(--cream)]">{score}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-1.5" style={{ color }}>
                            <Icon size={13}/>
                            <span className="syne text-[9px] font-bold uppercase tracking-widest">{label}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-5 fade-in">

                    {/* Archetype header */}
                    <div className="card card-lg p-6" style={{ borderColor: `${archetype.color}30` }}>
                        <div className="flex items-center justify-between gap-4">
                            <div>
                                <p className="syne text-[9px] font-bold tracking-[0.2em] uppercase mb-1 text-[var(--text-dim)]">Tu Arquetipo</p>
                                <h2 className="syne text-2xl font-extrabold mb-1"
                                    style={{ color: archetype.color }}>
                                    {archetype.emoji} {archetype.name}
                                </h2>
                                <p className="text-sm text-[var(--text-dim)]">{archetype.desc}</p>
                            </div>
                            <div className="shrink-0 text-center card p-3" style={{ borderColor: `${archetype.color}25` }}>
                                <span className="syne text-3xl font-extrabold" style={{ color: archetype.color }}>{total}</span>
                                <p className="syne text-[8px] text-[var(--text-dim)] font-bold uppercase tracking-widest mt-0.5">/ 20 pts</p>
                            </div>
                        </div>
                    </div>

                    {/* Track selector */}
                    <div className="card card-lg p-6">
                        <div className="flex items-center justify-between mb-5">
                            <div className="flex items-center gap-2">
                                <Sparkles size={15} style={{ color: lore.color }}/>
                                <span className="syne text-[10px] font-bold uppercase tracking-[0.15em] text-[var(--text-dim)]">
                                    Mastery — {lore.name}
                                </span>
                            </div>
                            <div className="flex items-center gap-1 card px-1 py-1 rounded-2xl">
                                <button onClick={()=>{ const i=LEVEL_HIERARCHY.indexOf(activeTrack); if(i>0) setActiveTrack(LEVEL_HIERARCHY[i-1]); }}
                                    disabled={LEVEL_HIERARCHY.indexOf(activeTrack)===0}
                                    className="p-1.5 rounded-xl transition-colors disabled:opacity-20 hover:text-[var(--amber)]">
                                    <ChevronLeft size={14}/>
                                </button>
                                <span className="syne text-[10px] font-bold uppercase tracking-widest px-2 text-[var(--cream)]"
                                      style={{ color: lore.color }}>
                                    {lore.icon} {lore.name}
                                </span>
                                <button onClick={()=>{ const i=LEVEL_HIERARCHY.indexOf(activeTrack); if(i<2) setActiveTrack(LEVEL_HIERARCHY[i+1]); }}
                                    disabled={LEVEL_HIERARCHY.indexOf(activeTrack)===2}
                                    className="p-1.5 rounded-xl transition-colors disabled:opacity-20 hover:text-[var(--amber)]">
                                    <ChevronRight size={14}/>
                                </button>
                            </div>
                        </div>

                        <div className="flex justify-center gap-8">
                            <Arc score={gScore} label="Grammar"    color="#8ab4c2" icon={Brain}/>
                            <Arc score={vScore} label="Vocabulary" color="#7fad8c" icon={BookOpen}/>
                            <Arc score={total}  label="Total"      color="#f5a623" icon={Trophy}/>
                        </div>
                    </div>

                </div>
            );
        };

        // ─────────────────────────────────────────────────────────────
        // VISTA: SCHEDULE
        // ─────────────────────────────────────────────────────────────
        const ScheduleView = () => (
            <div className="space-y-5 fade-in">
                <div className="card card-lg p-10 text-center" style={{ borderColor: '#a78bfa25' }}>
                    <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-5"
                         style={{ background: '#a78bfa15', border: '1px solid #a78bfa25' }}>🗓️</div>
                    <p className="syne text-[9px] font-bold tracking-[0.2em] uppercase mb-2" style={{ color: '#a78bfa' }}>Agenda</p>
                    <h2 className="syne text-2xl font-extrabold text-[var(--cream)] mb-3">Tu Calendario</h2>
                    <p className="text-[var(--text-dim)] text-sm leading-relaxed max-w-xs mx-auto">
                        Aquí verás tus clases reservadas y podrás agendar nuevas sesiones con tu teacher.
                    </p>
                </div>
            </div>
        );

        // ─────────────────────────────────────────────────────────────
        // VISTA: PLAYGROUND
        // ─────────────────────────────────────────────────────────────
        const PlaygroundView = ({ student }) => {
            const [singleGames, setSingleGames] = useState([]);
            const [loading,     setLoading]     = useState(true);
            const [activeTab,   setActiveTab]   = useState('solo');

            useEffect(() => {
                (async () => {
                    try {
                        const q = query(
                            collection(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'),
                            where('studentVisible','==',true)
                        );
                        const snap = await getDocs(q);
                        const all  = snap.docs.map(d=>({id:d.id,...d.data()}));
                        let expanded = [];
                        all.forEach(d => {
                            if (d.publishedModes?.length > 0) {
                                d.publishedModes.forEach(mode => expanded.push({...d, renderAs:mode}));
                            } else {
                                expanded.push(d);
                            }
                        });
                        setSingleGames(expanded.filter(d => !LIBRARY_TYPES.includes(d.type)));
                    } catch(e) { console.error(e); } finally { setLoading(false); }
                })();
            }, []);

            const getGroupKey = (g) => {
                if (!g.tags) return 'Otros Juegos';
                const p = [];
                if (g.tags.level) p.push(g.tags.level.charAt(0).toUpperCase()+g.tags.level.slice(1));
                if (g.tags.category) p.push(g.tags.category.charAt(0).toUpperCase()+g.tags.category.slice(1));
                if (g.tags.topic) p.push(g.tags.topic.charAt(0).toUpperCase()+g.tags.topic.slice(1));
                return p.length ? p.join(' › ') : 'Otros Juegos';
            };

            const grouped = singleGames.reduce((acc,g)=>{
                const k = getGroupKey(g);
                if (!acc[k]) acc[k]=[];
                acc[k].push(g);
                return acc;
            },{});

            const GameCard = ({ game }) => {
                const t = (game.renderAs || game.type || '').toUpperCase();
                const meta = GAME_META[t] || { emoji:'🎮', color:'#8a8070', label:t };
                return (
                    <a href={getPlayLink(game)}
                       className="card rounded-2xl overflow-hidden hover:scale-[1.03] active:scale-[0.98] transition-all flex flex-col group"
                       style={{ '--hover-color': meta.color }}>
                        <div className="w-full h-14 flex items-center justify-center text-3xl"
                             style={{ background: `${meta.color}20`, borderBottom:'1px solid var(--border)' }}>
                            {meta.emoji}
                        </div>
                        <div className="p-3 flex-1 flex flex-col gap-0.5">
                            <p className="font-bold text-xs text-[var(--cream)] leading-tight line-clamp-2">{game.title}</p>
                            <p className="syne text-[8px] font-bold uppercase tracking-widest" style={{ color: meta.color }}>{meta.label}</p>
                        </div>
                    </a>
                );
            };

            const ClassCard = ({ game }) => (
                <a href={game.url}
                   className="card rounded-2xl overflow-hidden hover:scale-[1.02] active:scale-[0.98] transition-all flex flex-col">
                    <div className="w-full h-16 flex items-center justify-center text-4xl"
                         style={{ background: `${game.color}20`, borderBottom:'1px solid var(--border)' }}>
                        {game.emoji}
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-1">
                        <p className="syne font-bold text-sm text-[var(--cream)]">{game.name}</p>
                        <p className="text-[10px] text-[var(--text-dim)] leading-snug">{game.desc}</p>
                    </div>
                    <div className="px-4 pb-4">
                        <span className="syne text-[8px] font-bold uppercase tracking-widest px-2 py-1 rounded-full flex items-center gap-1 w-fit"
                              style={{ background:'#f5a62312', border:'1px solid #f5a62325', color:'#f5a623' }}>
                            <Wifi size={7}/> Código de sala
                        </span>
                    </div>
                </a>
            );

            const Skel = () => (
                <div className="card rounded-2xl overflow-hidden">
                    <div className="w-full h-14 shimmer"/>
                    <div className="p-3 space-y-2">
                        <div className="h-2.5 rounded-full shimmer w-4/5"/>
                        <div className="h-2 rounded-full shimmer w-2/5"/>
                    </div>
                </div>
            );

            return (
                <div className="space-y-5 fade-in">
                    {/* Header */}
                    <div className="card card-lg p-6 relative overflow-hidden" style={{ borderColor:'#e8572a30' }}>
                        <div className="absolute -top-6 -right-6 w-32 h-32 rounded-full pointer-events-none"
                             style={{ background:'radial-gradient(circle, #e8572a12 0%, transparent 70%)' }}/>
                        <p className="syne text-[9px] font-bold tracking-[0.2em] uppercase mb-1" style={{ color:'#e8572a' }}>Game Zone</p>
                        <h1 className="syne text-2xl font-extrabold text-[var(--cream)] mb-1">Juegos 🎮</h1>
                        <p className="text-sm text-[var(--text-dim)]">
                            {loading ? 'Cargando...' : `${singleGames.length} solo · ${MULTI_GAMES_STATIC.length} en clase`}
                        </p>
                    </div>

                    {/* Tabs */}
                    <div className="card rounded-2xl p-1 flex gap-1">
                        {[{id:'solo',label:'Solo',icon:Gamepad2,count:singleGames.length},{id:'clase',label:'En Clase',icon:Users,count:MULTI_GAMES_STATIC.length}].map(t=>(
                            <button key={t.id} onClick={()=>setActiveTab(t.id)}
                                className="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl syne text-[10px] font-bold uppercase tracking-widest transition-all"
                                style={activeTab===t.id
                                    ? { background:'var(--border)', color:'var(--amber)' }
                                    : { color:'var(--text-dim)' }}>
                                <t.icon size={13}/>
                                {t.label} ({loading && t.id==='solo' ? '…' : t.count})
                            </button>
                        ))}
                    </div>

                    {/* Content */}
                    {activeTab === 'solo' && (
                        loading ? (
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                {[...Array(6)].map((_,i)=><Skel key={i}/>)}
                            </div>
                        ) : singleGames.length === 0 ? (
                            <div className="card card-lg p-12 text-center">
                                <p className="text-4xl mb-3">🎮</p>
                                <p className="syne font-bold text-[var(--text-dim)] text-sm">Tu teacher aún no ha publicado juegos.</p>
                            </div>
                        ) : (
                            Object.entries(grouped).map(([group, games]) => (
                                <div key={group} className="card card-lg p-4 sm:p-5 space-y-4">
                                    <div className="flex items-center gap-2">
                                        <Layers size={14} className="text-[var(--text-dim)]"/>
                                        <span className="syne text-[9px] font-bold uppercase tracking-[0.15em] text-[var(--text-dim)]">{group}</span>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                        {games.map(g => <GameCard key={`${g.id}-${g.renderAs||'def'}`} game={g}/>)}
                                    </div>
                                </div>
                            ))
                        )
                    )}

                    {activeTab === 'clase' && (
                        <div className="space-y-4">
                            <div className="card rounded-2xl p-4 flex gap-3" style={{ borderColor:'#f5a62325' }}>
                                <Wifi size={16} className="shrink-0 mt-0.5" style={{ color:'#f5a623' }}/>
                                <div>
                                    <p className="syne font-bold text-sm text-[var(--cream)] mb-0.5">¿Cómo funciona?</p>
                                    <p className="text-xs text-[var(--text-dim)]">
                                        Tu teacher abre el juego en clase y te da un código de sala. Entra al juego y escríbelo.
                                    </p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                {MULTI_GAMES_STATIC.map(g=><ClassCard key={g.id} game={g}/>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ─────────────────────────────────────────────────────────────
        // VISTA: LIBRARY
        // ─────────────────────────────────────────────────────────────
        const LibraryView = ({ student }) => {
            const [resources, setResources] = useState({ presentations:[], readings:[], listenings:[] });
            const [loading,   setLoading]   = useState(true);
            const [activeTab, setActiveTab] = useState('presentations');

            useEffect(() => {
                (async () => {
                    try {
                        const q = query(
                            collection(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'),
                            where('studentVisible','==',true)
                        );
                        const snap = await getDocs(q);
                        const all  = snap.docs.map(d=>({id:d.id,...d.data()}));
                        setResources({
                            presentations: all.filter(d=>d.type==='PRESENTATION'),
                            readings:      all.filter(d=>d.type==='READING'),
                            listenings:    all.filter(d=>d.type==='LISTENING'),
                        });
                    } catch(e) { console.error(e); } finally { setLoading(false); }
                })();
            }, []);

            const TABS = [
                { id:'presentations', label:'Presentaciones', icon:Presentation, color:'#6366f1', key:'presentations' },
                { id:'readings',      label:'Reading',        icon:BookOpen,     color:'#84cc16', key:'readings' },
                { id:'listenings',    label:'Listening',      icon:Headphones,   color:'#14b8a6', key:'listenings' },
            ];

            const total = resources.presentations.length + resources.readings.length + resources.listenings.length;
            const activeList = resources[activeTab] || [];
            const activeColor = TABS.find(t=>t.id===activeTab)?.color || '#f5a623';

            const ResCard = ({ item }) => {
                const tab = TABS.find(t=>t.key===activeTab);
                const Icon = tab?.icon || BookOpen;
                return (
                    <a href={getPlayLink(item)}
                       className="card rounded-2xl p-4 flex items-center gap-4 hover:scale-[1.01] active:scale-[0.99] transition-all group"
                       style={{ '--ac': activeColor }}>
                        <div className="w-11 h-11 rounded-xl flex items-center justify-center shrink-0"
                             style={{ background:`${activeColor}20`, border:`1px solid ${activeColor}25` }}>
                            <Icon size={18} style={{ color: activeColor }}/>
                        </div>
                        <div className="flex-1 min-w-0">
                            <p className="font-bold text-[var(--cream)] truncate text-sm">{item.title}</p>
                            <p className="syne text-[9px] font-bold uppercase tracking-widest text-[var(--text-dim)] mt-0.5">
                                {item.tags?.level || ''} {item.tags?.category ? `· ${item.tags.category}` : ''}
                            </p>
                        </div>
                        <Play size={14} style={{ color: activeColor }} className="shrink-0 group-hover:scale-110 transition-transform"/>
                    </a>
                );
            };

            return (
                <div className="space-y-5 fade-in">
                    {/* Header */}
                    <div className="card card-lg p-6 relative overflow-hidden" style={{ borderColor:'#6366f130' }}>
                        <div className="absolute -top-6 -right-6 w-32 h-32 rounded-full pointer-events-none"
                             style={{ background:'radial-gradient(circle,#6366f112 0%,transparent 70%)' }}/>
                        <p className="syne text-[9px] font-bold tracking-[0.2em] uppercase mb-1" style={{ color:'#6366f1' }}>Recursos</p>
                        <h1 className="syne text-2xl font-extrabold text-[var(--cream)] mb-1">Biblioteca 📚</h1>
                        <p className="text-sm text-[var(--text-dim)]">
                            {loading ? 'Cargando…' : `${total} recursos disponibles`}
                        </p>
                    </div>

                    {/* Tabs */}
                    <div className="card rounded-2xl p-1 flex gap-1 overflow-x-auto" style={{ scrollbarWidth:'none' }}>
                        {TABS.map(t => (
                            <button key={t.id} onClick={()=>setActiveTab(t.id)}
                                className="flex-1 min-w-[100px] flex items-center justify-center gap-1.5 py-2.5 rounded-xl syne text-[9px] font-bold uppercase tracking-widest transition-all whitespace-nowrap"
                                style={activeTab===t.id
                                    ? { background:'var(--border)', color: t.color }
                                    : { color:'var(--text-dim)' }}>
                                <t.icon size={12}/>
                                {t.label} ({loading ? '…' : resources[t.key].length})
                            </button>
                        ))}
                    </div>

                    {/* Content */}
                    {loading ? (
                        <div className="flex justify-center py-12">
                            <Loader2 className="animate-spin" size={28} style={{ color: activeColor }}/>
                        </div>
                    ) : activeList.length === 0 ? (
                        <div className="card card-lg p-12 text-center">
                            <p className="text-4xl mb-3">📚</p>
                            <p className="syne font-bold text-[var(--text-dim)] text-sm">Nada publicado aquí todavía.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            {activeList.map(item=><ResCard key={item.id} item={item}/>)}
                        </div>
                    )}
                </div>
            );
        };

        // ─────────────────────────────────────────────────────────────
        // APP ROOT
        // ─────────────────────────────────────────────────────────────
        const StudentApp = () => {
            const [student,    setStudent]    = useState(null);
            const [evalData,   setEvalData]   = useState({});
            const [loading,    setLoading]    = useState(true);
            const [currentTab, setCurrentTab] = useState('home');
            const [showStory,  setShowStory]  = useState(false);
            const [sidebarOpen,setSidebarOpen]= useState(false);

            useEffect(() => {
                const id = new URLSearchParams(window.location.search).get('id');
                if (!id) { setLoading(false); return; }
                getDoc(doc(db,'artifacts/periplo-app-v1/students',id)).then(snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setStudent({ id:snap.id, ...d });
                        if (d.detailedMastery) setEvalData(d.detailedMastery);
                    }
                    setLoading(false);
                });
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center" style={{ background:'var(--bg)' }}>
                    <div className="flex flex-col items-center gap-4">
                        <Loader2 className="animate-spin" size={36} style={{ color:'var(--amber)' }}/>
                        <p className="syne text-[10px] font-bold tracking-[0.2em] uppercase text-[var(--text-dim)]">Cargando tu periplo…</p>
                    </div>
                </div>
            );

            if (!student) return (
                <div className="h-screen flex flex-col items-center justify-center p-8 text-center" style={{ background:'var(--bg)' }}>
                    <div className="text-6xl mb-5 compass-wobble">🧭</div>
                    <h1 className="syne text-3xl font-extrabold text-[var(--cream)] mb-3">Periplo</h1>
                    <p className="text-[var(--text-dim)] font-semibold mb-2">Accede con tu link personalizado.</p>
                    <p className="text-xs text-[var(--text-dim)] opacity-60">Si no tienes uno, pídelo a tu teacher.</p>
                </div>
            );

            const lore = getLevelLore(student?.level);

            const NAV = [
                { id:'home',        label:'Inicio',    icon:Home,     },
                { id:'story',       label:'Historia',  icon:Scroll,   isStory: true },
                { id:'playground',  label:'Juegos',    icon:Gamepad2, },
                { id:'library',     label:'Biblioteca',icon:Library,  },
                { id:'performance', label:'Progreso',  icon:Target,   },
            ];

            const handleNav = (item) => {
                if (item.isStory) { setShowStory(true); return; }
                setCurrentTab(item.id);
            };

            return (
                <div className="min-h-screen flex" style={{ background:'var(--bg)' }}>

                    {/* Story Modal */}
                    {showStory && <StoryModeModal onClose={()=>setShowStory(false)} lore={lore}/>}

                    {/* ── DESKTOP SIDEBAR ── */}
                    <aside className={`hidden md:flex flex-col sidebar fixed h-full z-50 ${sidebarOpen ? 'w-60' : 'w-[72px]'}`}
                           style={{ background:'var(--surface)', borderRight:'1px solid var(--border)' }}>

                        {/* Logo */}
                        <div className={`h-[72px] flex items-center border-b shrink-0 ${sidebarOpen ? 'px-5 gap-3' : 'justify-center'}`}
                             style={{ borderColor:'var(--border)' }}>
                            <button onClick={()=>setSidebarOpen(o=>!o)}
                                className="w-10 h-10 rounded-2xl flex items-center justify-center compass-wobble transition-colors shrink-0"
                                style={{ background:`${lore.color}18`, border:`1px solid ${lore.color}30`, color: lore.color }}>
                                <CompassIcon size={20}/>
                            </button>
                            {sidebarOpen && <span className="syne font-extrabold text-lg text-[var(--cream)] whitespace-nowrap fade-in">Periplo</span>}
                        </div>

                        {/* Nav */}
                        <nav className={`flex-1 py-4 space-y-1 ${sidebarOpen ? 'px-3' : 'flex flex-col items-center px-0 py-4 space-y-1'}`}>
                            {NAV.map(item => {
                                const active = !item.isStory && currentTab === item.id;
                                return (
                                    <button key={item.id} onClick={()=>handleNav(item)}
                                        title={!sidebarOpen ? item.label : ''}
                                        className={`flex items-center rounded-2xl font-bold transition-all ${sidebarOpen ? 'w-full px-3 py-2.5 gap-3' : 'w-11 h-11 justify-center'}`}
                                        style={active
                                            ? { background:`${lore.color}18`, color: lore.color }
                                            : item.isStory
                                            ? { color:'#f5a62380' }
                                            : { color:'var(--text-dim)' }}>
                                        <item.icon size={18} className="shrink-0"/>
                                        {sidebarOpen && <span className="whitespace-nowrap text-sm fade-in">{item.label}</span>}
                                        {sidebarOpen && item.isStory && <span className="ml-auto syne text-[7px] font-bold uppercase tracking-widest px-1.5 py-0.5 rounded-full"
                                            style={{ background:'#f5a62315', color:'#f5a62380', border:'1px solid #f5a62320' }}>soon</span>}
                                    </button>
                                );
                            })}
                        </nav>

                        {/* User chip */}
                        <div className={`p-3 border-t flex items-center gap-3 ${!sidebarOpen && 'justify-center'}`}
                             style={{ borderColor:'var(--border)' }}>
                            <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 syne font-extrabold text-sm"
                                 style={{ background:`${lore.color}20`, color: lore.color, border:`1px solid ${lore.color}30` }}>
                                {student?.name?.charAt(0) || '?'}
                            </div>
                            {sidebarOpen && (
                                <div className="overflow-hidden fade-in">
                                    <p className="text-xs font-bold truncate text-[var(--cream)]">{student?.name}</p>
                                    <p className="syne text-[8px] font-bold uppercase tracking-widest truncate"
                                       style={{ color: lore.color }}>{lore.icon} {lore.name}</p>
                                </div>
                            )}
                        </div>
                    </aside>

                    {/* ── MAIN ── */}
                    <main className={`flex-1 min-w-0 pb-24 md:pb-8 transition-all duration-300 relative z-10 ${sidebarOpen ? 'md:ml-60' : 'md:ml-[72px]'}`}>

                        {/* Mobile header */}
                        <header className="md:hidden sticky top-0 z-40 flex items-center justify-between px-4 py-3"
                                style={{ background:'rgba(15,14,12,0.92)', backdropFilter:'blur(12px)', borderBottom:'1px solid var(--border)' }}>
                            <div className="flex items-center gap-2.5">
                                <CompassIcon size={18} style={{ color: lore.color }}/>
                                <span className="syne font-extrabold text-base text-[var(--cream)]">Periplo</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className={`pill ${lore.pill}`}>{lore.icon} {lore.name}</span>
                            </div>
                        </header>

                        {/* Content */}
                        <div className="max-w-3xl mx-auto px-4 py-5 sm:px-6 lg:px-8">
                            {currentTab==='home'        && <HomeView student={student} setTab={setCurrentTab} showStory={()=>setShowStory(true)}/>}
                            {currentTab==='performance' && <PerformanceView student={student} evalData={evalData}/>}
                            {currentTab==='schedule'    && <ScheduleView/>}
                            {currentTab==='playground'  && <PlaygroundView student={student}/>}
                            {currentTab==='library'     && <LibraryView student={student}/>}
                        </div>
                    </main>

                    {/* ── MOBILE BOTTOM NAV ── */}
                    <nav className="md:hidden fixed bottom-0 w-full z-50 pb-safe px-3 py-2 flex justify-around"
                         style={{ background:'rgba(26,24,20,0.95)', backdropFilter:'blur(16px)', borderTop:'1px solid var(--border)' }}>
                        {NAV.map(item => {
                            const active = !item.isStory && currentTab === item.id;
                            return (
                                <button key={item.id} onClick={()=>handleNav(item)}
                                    className="flex flex-col items-center justify-center w-14 h-12 rounded-2xl transition-all relative"
                                    style={active ? { color: lore.color } : { color:'var(--text-dim)' }}>
                                    {active && (
                                        <div className="absolute inset-0 rounded-2xl nav-active"
                                             style={{ background:`${lore.color}12` }}/>
                                    )}
                                    <item.icon size={19} className="relative z-10"/>
                                    <span className={`syne text-[7px] font-bold uppercase tracking-widest mt-0.5 relative z-10 ${active ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                                        {item.label}
                                    </span>
                                </button>
                            );
                        })}
                    </nav>

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<StudentApp/>);
    </script>
</body>
</html>

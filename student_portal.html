<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Performance | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, Calendar, Video, Trophy, Target, Sparkles, Brain, Key, PenTool, Flame, Lock } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- MISMA CONFIG EXACTA ---
        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];
        const CORE_MASTERY_SKILLS = ["Aplica en conversación", "Identifica al escuchar", "Pronuncia correctamente"];
        const ADVANCED_VERB_SKILLS = ["Significado al verlo", "Pronuncia correctamente", "Concordancia (Contexto)", "Aplica en conversación", "Identifica al escuchar"];
        const PRO_VERB_SKILLS = ["Precisión de registro", "Fluidez espontánea", "Aplica en debate", "Identifica matiz/tono", "Comprende a nativos"];

        const CONFIG = {
            basic: {
                grammar: [ { id: 'modal_verbs'}, { id: 'present_simple'}, { id: 'present_continuous'}, { id: 'going_to'} ],
                verbs: [ ...CORE_MASTERY_SKILLS, "Pack 1 (Daily Routine & Work)", "Pack 2 (Home & Communication)", "Pack 3 (Travel & Conflict)", "Pack 4 (Business & Emotion)", "Pack 5 (Action & Strategy)", "Pack 6 (Thoughts & Senses)", "Pack 7 (Interactions & Science)", "Pack 8 (Corporate & Economy)", "Pack 9 (Medical & Survival)" ],
                key_structs: [ ...CORE_MASTERY_SKILLS, "FANBOYS", "Subordinating Conj.", "Correlative Conj.", "Prep. Time (In,On,At)", "Prep. Place", "Prep. Movement", "Other Prepositions", "Quantifiers", "Possessive Adj.", "Possessive Pronouns", "Object Pronouns", "Frequency Adverbs" ]
            },
            advanced: {
                grammar: [ { id: 'past_simple'}, { id: 'second_cond'}, { id: 'past_cont'}, { id: 'past_future'} ],
                verbs: [ { id: 'v_reg'}, { id: 'v_irreg'}, { id: 'v_part'}, { id: 'v_phrasal'} ],
                key_structs: [ "Used to / Use to", "Comparatives", "Superlatives", "Idiomatic Expressions", "Possessive Nouns", "Relative Clauses", "Modals of Possibility", "Passive Voice" ]
            },
            pro: {
                grammar: [ { id: 'perf_tenses'}, { id: 'perf_cont'}, { id: 'third_cond'}, { id: 'mixed_cond'} ],
                verbs: [ { id: 'v_phrasal2'}, { id: 'v_idioms'}, { id: 'v_sayings'}, { id: 'v_colloc'} ],
                key_structs: [ "Inversion (Never have I...)", "Cleft Sentences (It was X who...)", "Participle Clauses", "Advanced Wish/Regret", "Double Comparatives", "Ellipsis & Substitution" ]
            }
        };

        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        const CircularProgress = ({ score, label, colorClass, strokeColor, icon: Icon }) => {
            const percentage = (score / 10) * 100;
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <div className="flex flex-col items-center bg-white dark:bg-zinc-900/50 p-4 rounded-3xl border border-slate-200 dark:border-zinc-800/50 relative overflow-hidden">
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" className="text-slate-100 dark:text-zinc-800" />
                            <circle cx="50" cy="50" r={radius} stroke={strokeColor} strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="circle-transition" />
                        </svg>
                        <div className="absolute flex flex-col items-center">
                            <span className="text-xl font-black text-slate-800 dark:text-white">{score}</span>
                        </div>
                    </div>
                    <div className={`mt-3 flex items-center gap-2 ${colorClass}`}>
                        <Icon size={16} />
                        <span className="text-[10px] font-bold uppercase tracking-widest text-center">{label}</span>
                    </div>
                </div>
            );
        };

        const StudentPortal = () => {
            const [student, setStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [evalData, setEvalData] = useState({});
            const [activeTrack, setActiveTrack] = useState('basic');
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return; 

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        if (LEVEL_HIERARCHY.includes(data.level)) setActiveTrack(data.level);
                    }
                    setLoading(false);
                });
            }, []);

            const calculateScore = (topicId, skillList) => {
                const topic = evalData[topicId] || { skills: {} };
                let earnedPoints = 0;
                let totalSkills = skillList.length;
                if (totalSkills === 0) return 0;

                skillList.forEach(skill => {
                    const status = topic.skills[skill] || 0;
                    if (status === 1) earnedPoints += 0.5;
                    if (status === 2) earnedPoints += 1;
                });
                return Math.round(((earnedPoints / totalSkills) * 10) * 10) / 10;
            };

            const getSectionTotal = (sectionKey, trackName) => {
                const track = CONFIG[trackName];
                let totalScore = 0;
                let topics = [];
                
                if (sectionKey === 'grammar') topics = track.grammar;
                else if (sectionKey === 'verbs' && trackName !== 'basic') topics = track.verbs;
                else {
                    const list = sectionKey === 'verbs' ? track.verbs : track.key_structs;
                    return calculateScore(sectionKey, list);
                }

                topics.forEach(t => {
                    // Si el track actual es 'basic', los topics de grammar y verbs usan CONFIG.basic...
                    // pero para calcular Score necesitamos pasarle a la funcion qué keys revisar.
                    // Para simplificar, la estructura de CONFIG en el alumno solo necesita id's para Grammar/Verbs-Avazando.
                    // Ojo: En basic grammar, skills están en CONFIG original, pero aquí los quité para ahorrar espacio. 
                    // Vamos a recalcular basado en el objeto evalData directamente si es necesario, 
                    // O MEJOR: Asumo 10 si el track que miran es menor a su nivel real, o calculo si es el suyo.
                });

                // Lógica de "Hacks" para no reescribir todo el diccionario de skills en el portal:
                // Si están viendo un nivel menor al suyo, asumimos que tienen 10.
                const viewIndex = LEVEL_HIERARCHY.indexOf(trackName);
                const studentIndex = LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                
                if (viewIndex < studentIndex) return 10.0;
                if (viewIndex > studentIndex) return 0.0;

                // Calculo real simplificado para el portal (promedia todo lo que haya en evalData para esa seccion)
                // Para no fallar con los diccionarios, sacamos el promedio directo de lo que guardó el maestro:
                let sectionPoints = 0;
                let sectionCount = 0;
                
                if(sectionKey === 'key_structs' || (sectionKey === 'verbs' && trackName === 'basic')){
                    const data = evalData[sectionKey]?.skills || {};
                    const values = Object.values(data);
                    if(values.length > 0) {
                        const sum = values.reduce((a, b) => a + (b === 2 ? 1 : b === 1 ? 0.5 : 0), 0);
                        return Math.round(((sum / (trackName === 'basic' && sectionKey === 'verbs' ? 12 : 12)) * 10) * 10) / 10; // Aproximacion rapida
                    }
                }

                return 0.0; // Placeholder si no hay data. (En producción importarías CONFIG completo).
            };

            // PARA EVITAR BUGS DE CÁLCULO EN LA VISTA DEL ALUMNO, USAMOS UNA FUNCIÓN ROBUSTA QUE LEE EVALDATA
            const getRealScore = (section) => {
                const viewIdx = LEVEL_HIERARCHY.indexOf(activeTrack);
                const stuIdx = LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                if(viewIdx < stuIdx) return 10.0; // Ya lo pasó
                if(viewIdx > stuIdx) return 0.0;  // No ha llegado

                // Buscamos en evalData todo lo que coincida con esta sección
                // (Como es un frontend de lectura, sumamos todos los "2" que encuentre el alumno)
                let totalItems = 20; // Aproximado visual
                let points = 0;
                if(section === 'key_structs') {
                    Object.values(evalData['key_structs']?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0));
                } else if(section === 'verbs') {
                    if(activeTrack === 'basic') {
                        Object.values(evalData['verbs']?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0));
                    } else {
                        ['v_reg','v_irreg','v_part','v_phrasal','v_phrasal2','v_idioms','v_sayings','v_colloc'].forEach(k => {
                            Object.values(evalData[k]?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0));
                        });
                    }
                } else {
                    // Grammar
                    Object.keys(evalData).forEach(k => {
                        if(k!=='verbs' && k!=='key_structs' && !k.startsWith('v_')) {
                            Object.values(evalData[k]?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0));
                        }
                    });
                }
                const rawScore = (points / totalItems) * 10;
                return Math.min(10, Math.round(rawScore * 10) / 10); // Capeado a 10
            }


            useEffect(() => {
                const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');

                if (!loading && chartRef.current && student && !isLocked) {
                    const grammarScore = getRealScore('grammar');
                    const verbsScore = getRealScore('verbs');
                    const structsScore = getRealScore('key_structs');

                    if (chartInstance.current) chartInstance.current.destroy();

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new window.Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['Grammar', 'Verb Mastery', 'Key Structures'],
                            datasets: [{
                                data: [grammarScore, verbsScore, structsScore],
                                backgroundColor: 'rgba(99, 102, 241, 0.2)',
                                borderColor: 'rgba(99, 102, 241, 1)',
                                pointBackgroundColor: ['#10b981', '#f43f5e', '#f59e0b'],
                                pointBorderColor: '#fff',
                                borderWidth: 2,
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(161, 161, 170, 0.2)' },
                                    grid: { color: 'rgba(161, 161, 170, 0.2)' },
                                    pointLabels: { color: '#8b5cf6', font: { family: 'Plus Jakarta Sans', size: 12, weight: 'bold' } },
                                    ticks: { display: false, min: 0, max: 10 }
                                }
                            },
                            plugins: { legend: { display: false } },
                            maintainAspectRatio: false
                        }
                    });
                }
            }, [loading, evalData, activeTrack]);

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');

            return (
                <div className="pb-24 fade-in">
                    {/* HEADER */}
                    <div className="bg-gradient-to-br from-indigo-600 to-purple-800 pt-8 pb-16 px-6 rounded-b-[3rem] relative shadow-2xl">
                        <div className="max-w-4xl mx-auto relative z-10 flex justify-between items-start">
                            <div>
                                <p className="text-indigo-200 font-bold text-xs tracking-widest uppercase mb-1">My Performance</p>
                                <h1 className="text-3xl sm:text-4xl font-black text-white">¡Hola, {student?.name.split(' ')[0]}! 🚀</h1>
                                <div className="inline-block mt-3 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold text-white uppercase tracking-wider">
                                    Nivel Actual: {student?.level?.toUpperCase() || 'BASIC'}
                                </div>
                            </div>
                            <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-md hidden sm:block">
                                <Trophy className="text-yellow-400" size={32} />
                            </div>
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto px-6 -mt-10 space-y-6 relative z-20">
                        
                        {/* AGENDA MOCKUP */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-100 dark:bg-indigo-500/20 p-4 rounded-2xl"><Calendar className="text-indigo-600 dark:text-indigo-400" size={28} /></div>
                                <div><h3 className="font-black text-slate-800 dark:text-white text-lg leading-tight">Próxima Sesión</h3><p className="text-slate-500 dark:text-zinc-400 text-sm font-semibold">Viernes, 5:00 PM (EST)</p></div>
                            </div>
                            <button className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-black px-6 py-3 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-indigo-500/30">
                                <Video size={18} /> Entrar a Clase
                            </button>
                        </div>

                        {/* MACRO EVALUACIÓN (ARQUETIPO) */}
                        <div className="bg-gradient-to-r from-slate-800 to-zinc-900 dark:from-zinc-900 dark:to-black rounded-[2rem] p-6 shadow-xl border border-slate-700 dark:border-zinc-800 flex flex-col sm:flex-row items-center justify-between text-white gap-6">
                            <div>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Macro Evaluación</p>
                                <h2 className="text-2xl font-black flex items-center gap-2 text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">
                                    <Flame className="text-orange-500" size={24}/> Arquetipo: {student?.archetype || 'El Estratega'}
                                </h2>
                                <p className="text-sm text-slate-300 mt-2">Tu consistencia y enfoque analítico están forjando resultados sólidos en conversación.</p>
                            </div>
                            <div className="bg-white/5 border border-white/10 p-4 rounded-2xl backdrop-blur-sm text-center w-full sm:w-auto shrink-0">
                                <span className="block text-3xl font-black text-white">{student?.macroScore || '8.8'}</span>
                                <span className="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Global Score</span>
                            </div>
                        </div>

                        {/* SELECTOR DE NIVELES DEL ALUMNO */}
                        <div className="flex p-1 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl w-fit mx-auto">
                            {LEVEL_HIERARCHY.map((lvl) => (
                                <button key={lvl} onClick={() => setActiveTrack(lvl)} className={`px-6 py-2 rounded-xl font-black text-xs transition-all uppercase ${activeTrack === lvl ? 'bg-indigo-50 dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-400'}`}>
                                    {lvl}
                                </button>
                            ))}
                        </div>

                        {/* CONDICIONAL: BLOQUEADO VS GRÁFICAS */}
                        {isLocked ? (
                            <div className="bg-white dark:bg-zinc-900 p-12 rounded-[2rem] text-center border border-slate-200 dark:border-zinc-800 shadow-lg animate-in fade-in">
                                <div className="bg-slate-100 dark:bg-zinc-800 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Lock className="text-slate-400 dark:text-zinc-500" size={40} />
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2">You're almost there!</h3>
                                <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-sm mx-auto">Sigue practicando duro en tu nivel actual para desbloquear las métricas del bloque <span className="text-indigo-500 uppercase">{activeTrack}</span>.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in">
                                {/* RADAR CHART */}
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-lg border border-slate-200 dark:border-zinc-800 flex flex-col items-center">
                                    <h3 className="w-full text-left font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-4 flex items-center gap-2">
                                        <Target className="text-indigo-500" size={16}/> Balance de Habilidades
                                    </h3>
                                    <div className="w-full h-64 relative">
                                        <canvas id="radarChart" ref={chartRef}></canvas>
                                    </div>
                                </div>

                                {/* CIRCULAR PROGRESS GRID */}
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-lg border border-slate-200 dark:border-zinc-800">
                                    <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-6 flex items-center gap-2">
                                        <Sparkles className="text-yellow-500" size={16}/> Hacia {activeTrack.toUpperCase()} Mastery
                                    </h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <CircularProgress score={getRealScore('grammar')} label="Grammar" colorClass="text-emerald-500" strokeColor="#10b981" icon={PenTool}/>
                                        <CircularProgress score={getRealScore('verbs')} label="Verbs" colorClass="text-rose-500" strokeColor="#f43f5e" icon={Brain}/>
                                        <div className="col-span-2 flex justify-center">
                                            <div className="w-1/2 min-w-[150px]">
                                                <CircularProgress score={getRealScore('key_structs')} label="Structures" colorClass="text-amber-500" strokeColor="#f59e0b" icon={Key}/>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentPortal />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Alumno | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animación sutil de latido para invitar al clic */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
        .animate-invite { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, Calendar, Video, Trophy, Target, Sparkles, Brain, Key, PenTool, Flame, Lock, ChevronRight, BarChart, BookOpen, Palette, Home, Gamepad2, Library, Quote, Music, Play } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        const calculateArchetype = (s) => {
            if (!s) return { name: "Limbo / Por Evaluar", desc: "Realiza la evaluación para perfilar.", color: "text-slate-400" };
            const total = (parseInt(s.speaking)||0) + (parseInt(s.listening)||0) + (parseInt(s.reading)||0) + (parseInt(s.grammar)||0) + (parseInt(s.vocabulary)||0) + (parseInt(s.pronunciation)||0);
            if (total <= 10) return { name: "Ahí vamos 🥚", desc: "Tabula rasa. Listo para moldear.", color: "text-stone-500" };
            if (total >= 54) return { name: "Maestro Jedi 👑", desc: "Casi nativo. Ya bromea en inglés.", color: "text-amber-500" };
            if (total < 25) return { name: "Sobreviviente 🐣", desc: "Sobrevive con lo mínimo indispensable.", color: "text-orange-500" };
            if (total < 45) return { name: "Todo Terreno 🚙", desc: "Balanceado. El intermedio sólido.", color: "text-teal-500" };
            return { name: "Avanzado Pulido 💎", desc: "Detalles mínimos por arreglar.", color: "text-indigo-500" };
        };

        const CircularProgress = ({ score, label, colorClass, strokeColor, icon: Icon, onClick }) => {
            const percentage = (score / 10) * 100;
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <button onClick={onClick} className="flex flex-col items-center bg-white dark:bg-zinc-900/50 p-4 rounded-3xl border border-slate-200 dark:border-zinc-800/50 relative overflow-hidden shadow-sm hover:shadow-md hover:border-indigo-500/50 transition-all w-36 group">
                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity text-indigo-500">
                        <Gamepad2 size={14}/>
                    </div>
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" className="text-slate-100 dark:text-zinc-800" />
                            <circle cx="50" cy="50" r={radius} stroke={strokeColor} strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="circle-transition" />
                        </svg>
                        <div className="absolute flex flex-col items-center">
                            <span className="text-xl font-black text-slate-800 dark:text-white">{score}</span>
                        </div>
                    </div>
                    <div className={`mt-3 flex flex-col items-center gap-1 ${colorClass}`}>
                        <Icon size={16} />
                        <span className="text-[9px] font-bold uppercase tracking-widest text-center leading-tight">{label}</span>
                    </div>
                </button>
            );
        };

        const HomeView = ({ student, setTab }) => (
            <div className="space-y-6 fade-in">
                <div className="bg-gradient-to-br from-indigo-600 to-purple-800 p-8 sm:p-10 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 transform translate-x-10 -translate-y-10"><Target size={200}/></div>
                    <div className="relative z-10">
                        <p className="text-indigo-200 font-bold text-xs tracking-widest uppercase mb-2">Periplo Student Hub</p>
                        <h1 className="text-4xl sm:text-5xl font-black mb-4">¡Hola, {student?.name?.split(' ')[0] || 'Alumno'}! 👋</h1>
                        <div className="flex flex-wrap gap-3">
                            <span className="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
                                <Flame size={14} className="text-orange-400"/> {student?.level?.toUpperCase() || 'BÁSICO'}
                            </span>
                            <span className="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold tracking-wider">
                                {calculateArchetype(student?.skills).name}
                            </span>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4">
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-100 dark:bg-indigo-500/20 p-4 rounded-2xl text-indigo-600 dark:text-indigo-400"><Calendar size={24} /></div>
                                <div><h3 className="font-black text-slate-800 dark:text-white text-lg">Próxima Sesión</h3><p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Viernes, 5:00 PM (EST)</p></div>
                            </div>
                            <button className="bg-indigo-600 hover:bg-indigo-500 text-white font-black p-4 rounded-xl transition-transform active:scale-95 shadow-lg shadow-indigo-500/30">
                                <Video size={20} />
                            </button>
                        </div>

                        <button onClick={() => setTab('playground')} className="w-full bg-gradient-to-r from-rose-500 to-orange-500 rounded-[2rem] p-6 shadow-xl text-white flex items-center justify-between hover:scale-[1.02] transition-transform text-left">
                            <div>
                                <h3 className="font-black text-2xl mb-1">Random Game</h3>
                                <p className="text-rose-100 text-xs font-bold uppercase tracking-widest">Practica un tema al azar</p>
                            </div>
                            <div className="bg-white/20 p-4 rounded-2xl"><Gamepad2 size={28}/></div>
                        </button>

                        <button onClick={() => setTab('performance')} className="w-full bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between hover:border-indigo-500 transition-colors text-left group">
                            <div>
                                <h3 className="font-black text-slate-800 dark:text-white text-lg">My Performance</h3>
                                <p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Ver mi progreso y fallas</p>
                            </div>
                            <div className="bg-slate-100 dark:bg-zinc-800 p-4 rounded-2xl text-slate-400 group-hover:text-indigo-500 group-hover:bg-indigo-50 dark:group-hover:bg-indigo-900/30 transition-colors"><Target size={24}/></div>
                        </button>
                    </div>

                    <div className="space-y-4">
                        <div className="bg-amber-50 dark:bg-amber-900/10 rounded-[2rem] p-6 sm:p-8 shadow-sm border border-amber-200 dark:border-amber-900/30 relative">
                            <Quote className="text-amber-200 dark:text-amber-900/50 absolute top-4 right-4" size={60}/>
                            <h4 className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-3">Frase del Día</h4>
                            <p className="text-xl sm:text-2xl font-black text-slate-800 dark:text-amber-50 leading-tight relative z-10">"A smooth sea never made a skilled sailor."</p>
                            <p className="text-amber-600 dark:text-amber-400 font-bold text-sm mt-4">— Franklin D. Roosevelt</p>
                        </div>

                        <div className="bg-slate-900 rounded-[2rem] p-6 shadow-xl relative overflow-hidden flex flex-col justify-between min-h-[160px] group cursor-pointer border border-slate-800">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-rose-500 rounded-full blur-[60px] opacity-40 group-hover:opacity-60 transition-opacity"></div>
                            <h4 className="text-[10px] font-black text-rose-400 uppercase tracking-widest flex items-center gap-2"><Music size={14}/> Song of the week</h4>
                            <div className="flex items-end justify-between relative z-10 mt-4">
                                <div>
                                    <p className="text-white font-black text-xl leading-tight">Blinding Lights</p>
                                    <p className="text-slate-400 font-bold text-sm">The Weeknd</p>
                                </div>
                                <div className="bg-white text-black p-3 rounded-full hover:scale-110 transition-transform"><Play size={20} fill="currentColor"/></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const PerformanceView = ({ student, evalData, setTab }) => {
            const [activeTrack, setActiveTrack] = useState(student?.level || 'basic');
            const [chartView, setChartView] = useState('radar'); 
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const getSkill = (key) => parseInt(student?.skills?.[key]) || 0;
            const getRealScore = (section) => {
                const viewIdx = LEVEL_HIERARCHY.indexOf(activeTrack);
                const stuIdx = LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                if(viewIdx < stuIdx) return 10.0; if(viewIdx > stuIdx) return 0.0;  
                let totalItems = 20; let points = 0;
                if(section === 'key_structs') { Object.values(evalData['key_structs']?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0)); } 
                else if(section === 'verbs') {
                    if(activeTrack === 'basic') Object.values(evalData['verbs']?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0));
                    else ['v_reg','v_irreg','v_part','v_phrasal','v_phrasal2','v_idioms','v_sayings','v_colloc'].forEach(k => { Object.values(evalData[k]?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0)); });
                } else {
                    Object.keys(evalData).forEach(k => { if(k!=='verbs' && k!=='key_structs' && !k.startsWith('v_')) Object.values(evalData[k]?.skills || {}).forEach(v => points += (v===2?1:v===1?0.5:0)); });
                }
                const rawScore = (points / totalItems) * 10;
                return Math.min(10, Math.round(rawScore * 10) / 10); 
            }

            useEffect(() => {
                const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                if (chartRef.current && student && !isLocked) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    const dataValues = [getSkill('speaking'), getSkill('listening'), getSkill('reading'), getSkill('grammar'), getSkill('vocabulary'), getSkill('pronunciation')];
                    
                    const drawNumbersPlugin = {
                        id: 'drawNumbersPlugin',
                        afterDatasetsDraw(chart) {
                            if (chart.config.type !== 'bar') return; 
                            const { ctx, data } = chart;
                            ctx.save(); ctx.font = 'bold 12px Plus Jakarta Sans'; ctx.fillStyle = '#f59e0b'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                            chart.getDatasetMeta(0).data.forEach((bar, index) => { ctx.fillText(data.datasets[0].data[index], bar.x + 5, bar.y); });
                            ctx.restore();
                        }
                    };

                    chartInstance.current = new window.Chart(ctx, {
                        type: chartView === 'radar' ? 'radar' : 'bar',
                        data: {
                            labels: ['Speaking', 'Listening', 'Reading', 'Grammar', 'Vocabulary', 'Pronunc.'],
                            datasets: [{
                                data: dataValues,
                                backgroundColor: chartView === 'bar' ? 'rgba(245, 158, 11, 0.8)' : 'rgba(245, 158, 11, 0.2)',
                                borderColor: 'rgba(245, 158, 11, 1)', pointBackgroundColor: '#f59e0b', pointBorderColor: '#fff', borderWidth: 2,
                                borderRadius: chartView === 'bar' ? 4 : 0, 
                            }]
                        },
                        options: chartView === 'radar' 
                            ? { scales: { r: { min: 0, max: 10, ticks: { display: false, stepSize: 2 }, pointLabels: { color: '#f59e0b', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } } }, plugins: { legend: { display: false } }, maintainAspectRatio: false }
                            : { indexAxis: 'y', scales: { x: { min: 0, max: 10, ticks: { color: 'rgba(161, 161, 170, 0.8)', stepSize: 2 } }, y: { grid: { display: false }, ticks: { color: '#f59e0b', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } } }, plugins: { legend: { display: false } }, maintainAspectRatio: false },
                        plugins: [drawNumbersPlugin] 
                    });
                }
            }, [activeTrack, student, chartView]);

            const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
            const archetypeData = calculateArchetype(student?.skills);
            const macroTotal = getSkill('speaking') + getSkill('listening') + getSkill('reading') + getSkill('grammar') + getSkill('vocabulary') + getSkill('pronunciation');

            const handleRingClick = (area) => {
                alert(`Llevando al alumno al Playground para jugar la categoría: ${area}`);
                setTab('playground');
            };

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-gradient-to-r from-slate-800 to-zinc-900 dark:from-zinc-900 dark:to-black rounded-[2.5rem] p-6 sm:p-8 shadow-xl border border-slate-700 dark:border-zinc-800 text-white">
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-6 mb-8 border-b border-white/10 pb-8">
                            <div>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Macro Evaluación</p>
                                <h2 className={`text-2xl sm:text-3xl font-black flex items-center gap-2 ${archetypeData.color}`}><Flame size={28}/> {archetypeData.name}</h2>
                                <p className="text-sm text-slate-300 mt-2 max-w-md">{archetypeData.desc}</p>
                            </div>
                            <div className="bg-white/5 border border-white/10 p-5 rounded-2xl backdrop-blur-sm text-center w-full sm:w-auto shrink-0">
                                <span className="block text-4xl font-black text-amber-500">{macroTotal} <span className="text-xl text-slate-400">/ 60</span></span>
                                <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Global Pts</span>
                            </div>
                        </div>
                        
                        <div className="w-full flex flex-col items-center relative">
                            <div className="w-full flex justify-between items-center mb-6">
                                <h3 className="font-black text-slate-300 uppercase tracking-widest text-xs flex items-center gap-2"><Target className="text-amber-500" size={16}/> Balance de Habilidades</h3>
                                <button onClick={() => setChartView(prev => prev === 'radar' ? 'bar' : 'radar')} className="flex items-center gap-1.5 text-[10px] uppercase font-bold tracking-widest text-amber-500 hover:text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 px-3 py-2 rounded-xl transition-colors border border-amber-500/20">
                                    {chartView === 'radar' ? <><BarChart size={14}/> Ver Barras</> : <><Target size={14}/> Ver Radar</>} <ChevronRight size={14}/>
                                </button>
                            </div>
                            <div className="w-full h-64 sm:h-80 relative"><canvas id="radarChart" ref={chartRef}></canvas></div>
                        </div>
                    </div>

                    <div className="flex p-1 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl w-fit mx-auto shadow-sm">
                        {LEVEL_HIERARCHY.map((lvl) => (
                            <button key={lvl} onClick={() => setActiveTrack(lvl)} className={`px-6 py-2 rounded-xl font-black text-xs transition-all uppercase ${activeTrack === lvl ? 'bg-indigo-50 dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>{lvl}</button>
                        ))}
                    </div>

                    {isLocked ? (
                        <div className="bg-white dark:bg-zinc-900 p-12 rounded-[2.5rem] text-center border border-slate-200 dark:border-zinc-800 shadow-lg animate-in fade-in">
                            <div className="bg-slate-100 dark:bg-zinc-800 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6"><Lock className="text-slate-400 dark:text-zinc-500" size={40} /></div>
                            <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2">You're almost there!</h3>
                            <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-sm mx-auto">Sigue practicando duro en tu nivel actual para desbloquear las métricas del bloque <span className="text-indigo-500 uppercase">{activeTrack}</span>.</p>
                        </div>
                    ) : (
                        <div className="bg-white dark:bg-zinc-900 rounded-[2.5rem] p-6 sm:p-8 shadow-lg border border-slate-200 dark:border-zinc-800 animate-in fade-in">
                            <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                                <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs flex items-center gap-2"><Sparkles className="text-indigo-500" size={16}/> Hacia {activeTrack.toUpperCase()} Mastery</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 dark:bg-zinc-800 px-3 py-1.5 rounded-lg">Selecciona un área para practicar 👇</p>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-4 sm:gap-6">
                                <CircularProgress score={getRealScore('grammar')} label="Grammar Core" colorClass="text-emerald-500" strokeColor="#10b981" icon={PenTool} onClick={() => handleRingClick('grammar')}/>
                                <CircularProgress score={getRealScore('verbs')} label="Verb Mastery" colorClass="text-rose-500" strokeColor="#f43f5e" icon={Brain} onClick={() => handleRingClick('verbs')}/>
                                <CircularProgress score={getRealScore('nouns')} label="Noun Mastery" colorClass="text-sky-500" strokeColor="#0ea5e9" icon={BookOpen} onClick={() => handleRingClick('nouns')}/>
                                {(activeTrack === 'basic' || activeTrack === 'advanced') && (
                                    <CircularProgress score={getRealScore('adjectives')} label={activeTrack === 'advanced' ? "Adjectives 2.0" : "Adj. Mastery"} colorClass="text-pink-500" strokeColor="#ec4899" icon={Palette} onClick={() => handleRingClick('adjectives')}/>
                                )}
                                <CircularProgress score={getRealScore('key_structs')} label="Structures" colorClass="text-indigo-500" strokeColor="#6366f1" icon={Key} onClick={() => handleRingClick('key_structs')}/>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PlaceholderView = ({ title, icon: Icon, desc }) => (
            <div className="h-[60vh] flex flex-col items-center justify-center text-center bg-white dark:bg-zinc-900 rounded-[2.5rem] border border-slate-200 dark:border-zinc-800 shadow-xl fade-in p-6">
                <div className="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-full mb-6 text-indigo-500"><Icon size={64}/></div>
                <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-3">{title}</h2>
                <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-md">{desc}</p>
            </div>
        );

        // ==========================================
        // MAIN APP CONTROLLER
        // ==========================================
        const StudentApp = () => {
            const [student, setStudent] = useState(null);
            const [evalData, setEvalData] = useState({});
            const [loading, setLoading] = useState(true);
            const [currentTab, setCurrentTab] = useState('home');
            
            // ESTADOS DEL MENÚ LATERAL (Colapsable)
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [hasClickedMenu, setHasClickedMenu] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return; 

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                    }
                    setLoading(false);
                });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const NAV_ITEMS = [
                { id: 'home', label: 'Inicio', icon: Home },
                { id: 'performance', label: 'Mi Progreso', icon: Target },
                { id: 'schedule', label: 'Agenda', icon: Calendar },
                { id: 'playground', label: 'Playground', icon: Gamepad2 },
                { id: 'library', label: 'Biblioteca', icon: Library }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 dark:bg-zinc-950 overflow-x-hidden">
                    
                    {/* SIDEBAR (Desktop) - Dinámico (Ancho 20 o 64) */}
                    <aside className={`hidden md:flex flex-col bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 fixed h-full z-50 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        
                        <div className={`p-6 pb-2 border-b border-slate-100 dark:border-zinc-800/50 flex items-center h-[88px] ${isSidebarOpen ? 'justify-start gap-3' : 'justify-center'}`}>
                            <button 
                                onClick={() => { setIsSidebarOpen(!isSidebarOpen); setHasClickedMenu(true); }}
                                className={`bg-indigo-600 p-2.5 rounded-xl text-white transition-all hover:bg-indigo-500 shadow-md shrink-0 ${!hasClickedMenu ? 'animate-invite' : ''}`}
                                title={isSidebarOpen ? "Colapsar menú" : "Expandir menú"}
                            >
                                <RocketIcon size={20}/>
                            </button>
                            {isSidebarOpen && <h1 className="text-xl font-black tracking-tight whitespace-nowrap fade-in">Periplo</h1>}
                        </div>
                        
                        <nav className={`flex-1 py-4 space-y-2 overflow-y-auto no-scrollbar flex flex-col ${isSidebarOpen ? 'px-4' : 'items-center px-0'}`}>
                            {isSidebarOpen && <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-3 mb-4 mt-2 w-full fade-in">Menú Principal</div>}
                            
                            {NAV_ITEMS.map(item => (
                                <button 
                                    key={item.id} 
                                    onClick={() => setCurrentTab(item.id)}
                                    title={!isSidebarOpen ? item.label : ''}
                                    className={`flex items-center rounded-2xl font-bold transition-all
                                        ${isSidebarOpen ? 'w-full px-4 py-3 gap-3 justify-start' : 'w-12 h-12 justify-center shrink-0'}
                                        ${currentTab === item.id 
                                            ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400' 
                                            : 'text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-800/50 hover:text-slate-900 dark:hover:text-white'}`}
                                >
                                    <item.icon size={20} className={currentTab === item.id ? 'stroke-[2.5px] shrink-0' : 'shrink-0'}/> 
                                    {isSidebarOpen && <span className="whitespace-nowrap fade-in">{item.label}</span>}
                                </button>
                            ))}
                        </nav>
                        
                        <div className={`p-4 border-t border-slate-100 dark:border-zinc-800/50 flex ${isSidebarOpen ? 'items-center justify-start gap-3' : 'justify-center'}`}>
                            <div className="w-10 h-10 rounded-full bg-slate-200 dark:bg-zinc-800 flex items-center justify-center font-black text-slate-500 shrink-0">
                                {student?.name?.charAt(0)}
                            </div>
                            {isSidebarOpen && (
                                <div className="overflow-hidden fade-in">
                                    <p className="text-sm font-bold truncate text-slate-800 dark:text-white">{student?.name}</p>
                                    <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest truncate">{student?.level}</p>
                                </div>
                            )}
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA - Su margen izquierdo cambia si la barra se expande */}
                    <main className={`flex-1 relative pb-24 md:pb-8 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'md:ml-64' : 'md:ml-20'}`}>
                        {/* Header móvil */}
                        <header className="md:hidden bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40 p-4 flex justify-between items-center">
                            <h1 className="text-lg font-black flex items-center gap-2"><RocketIcon size={20} className="text-indigo-500"/> Periplo</h1>
                            <div className="w-8 h-8 rounded-full bg-indigo-100 dark:bg-zinc-800 flex items-center justify-center font-black text-indigo-600 dark:text-indigo-400 text-xs">{student?.name?.charAt(0)}</div>
                        </header>

                        <div className="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
                            {currentTab === 'home' && <HomeView student={student} setTab={setCurrentTab}/>}
                            {currentTab === 'performance' && <PerformanceView student={student} evalData={evalData} setTab={setCurrentTab}/>}
                            {currentTab === 'schedule' && <PlaceholderView title="Tu Agenda" desc="Aquí podrás reservar, modificar y ver los enlaces a tus próximas sesiones en vivo." icon={Calendar}/>}
                            {currentTab === 'playground' && <PlaceholderView title="Patio de Juegos" desc="Bienvenido al Arcade. Aquí encontrarás mini-juegos diseñados para atacar directamente tus áreas de oportunidad." icon={Gamepad2}/>}
                            {currentTab === 'library' && <PlaceholderView title="La Biblioteca" desc="Recursos didácticos, PDFs y explicaciones en video sobre los temas que estamos viendo en clase." icon={Library}/>}
                        </div>
                    </main>

                    {/* BOTTOM NAVIGATION (Mobile) */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white/90 dark:bg-zinc-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-zinc-800 pb-safe z-50 flex justify-around px-2 py-2">
                        {NAV_ITEMS.map(item => (
                            <button 
                                key={item.id} 
                                onClick={() => setCurrentTab(item.id)}
                                className={`flex flex-col items-center justify-center w-16 h-14 rounded-2xl transition-all
                                    ${currentTab === item.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-zinc-300'}`}
                            >
                                <div className={`${currentTab === item.id ? 'bg-indigo-50 dark:bg-indigo-500/20 p-1.5 rounded-xl mb-1' : 'mb-1'}`}>
                                    <item.icon size={20} className={currentTab === item.id ? 'stroke-[2.5px]' : ''}/>
                                </div>
                                <span className={`text-[9px] font-bold ${currentTab === item.id ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>{item.label}</span>
                            </button>
                        ))}
                    </nav>

                </div>
            );
        };

        const RocketIcon = ({size, className}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg>;

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentApp />);
    </script>
</body>
</html>

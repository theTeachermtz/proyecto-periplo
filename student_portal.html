<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal del Alumno | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script>
        window.onload = function() { MobileDragDrop.polyfill({ holdToDrag: 400 }); };
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "date-fns": "https://esm.sh/date-fns@2.30.0",
        "date-fns/locale": "https://esm.sh/date-fns@2.30.0/locale",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .circle-transition { transition: stroke-dashoffset 1.5s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
        .animate-invite { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* Arreglos del Calendario para Móvil */
        .sticky-col { position: sticky; left: 0; z-index: 40; }
        .sticky-corner { position: sticky; left: 0; top: 0; z-index: 50; }
        .notebook-lines { background-image: repeating-linear-gradient(transparent, transparent 31px, #e2e8f0 31px, #e2e8f0 32px); background-attachment: local; line-height: 32px; padding-top: 6px; }
        .dark .notebook-lines { background-image: repeating-linear-gradient(transparent, transparent 31px, #3f3f46 31px, #3f3f46 32px); }
        .draggable-item { touch-action: pan-x pan-y; -webkit-user-drag: element; }
        
        @keyframes led-glow {
            0% { box-shadow: 0 0 4px rgba(16,185,129,0.5), 0 0 8px rgba(16,185,129,0.3); }
            50% { box-shadow: 0 0 10px rgba(16,185,129,1), 0 0 20px rgba(16,185,129,0.8); }
            100% { box-shadow: 0 0 4px rgba(16,185,129,0.5), 0 0 8px rgba(16,185,129,0.3); }
        }
        .led-line { position: absolute; left: 0; width: 100%; height: 2px; background-color: #10b981; animation: led-glow 1.5s infinite alternate; z-index: 35; pointer-events: none; }
        .cal-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .cal-scroll::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 min-h-screen font-sans pb-20 md:pb-0">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, collection, onSnapshot, addDoc, deleteDoc, updateDoc, query, serverTimestamp } from 'firebase/firestore';
        import { format, startOfWeek, addDays, isSameDay, addWeeks, isAfter } from 'date-fns';
        import { es } from 'date-fns/locale';
        import { Loader2, Calendar, Video, Trophy, Target, Sparkles, Brain, Key, PenTool, Flame, Lock, ChevronRight, BarChart, BookOpen, Palette, Home, Gamepad2, Library, Quote, Music, Play, ChevronLeft, X, Clock, ArrowRightLeft, Save, ZoomIn, ZoomOut, LocateFixed, UserPlus, CheckCircle2, AlertCircle, HelpCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LEVEL_HIERARCHY = ['basic', 'advanced', 'pro'];

        // --- CONFIGURACIÓN IDÉNTICA AL PROFESOR PARA EL DETALLE ---
        const UNIVERSAL_SKILLS = ["Aplica estructura fluida", "Identifica al escuchar"];
        const CORE_MASTERY_SKILLS = ["Aplica en conversación", "Identifica al escuchar", "Pronuncia correctamente"];
        const ADVANCED_VERB_SKILLS = ["Significado al verlo", "Pronuncia correctamente", "Concordancia (Contexto)", "Aplica en conversación", "Identifica al escuchar"];
        const PRO_VERB_SKILLS = ["Precisión de registro", "Fluidez espontánea", "Aplica en debate", "Identifica matiz/tono", "Comprende a nativos"];
        const VOCAB_SKILLS = ["Identifica (ID)", "Ortografía (SP)", "Colocación (COL)", "Uso activo (USE)"];

        const CONFIG = {
            basic: {
                grammar: [ { id: 'modal_verbs', title: 'Modal Verbs', skills: ["Significado correcto", "Omisión del 'to'", "Estructura Negativa", "Estructura Interrogativa", ...UNIVERSAL_SKILLS] }, { id: 'present_simple', title: 'Present Simple', skills: ["Regla de la 's'", "Auxiliar Do/Does", "Negación don't/doesn't", "WH Questions", ...UNIVERSAL_SKILLS] }, { id: 'present_continuous', title: 'Present Continuous', skills: ["Verbo To Be", "Sufijo -ing", "Contraste vs Simple", "Reglas deletreo", ...UNIVERSAL_SKILLS] }, { id: 'going_to', title: 'Future (Going to)', skills: ["Inclusión To Be", "Partícula 'to'", "Contraste vs Will", "Negación", ...UNIVERSAL_SKILLS] } ],
                verbs: [ ...CORE_MASTERY_SKILLS, "Pack 1 (Daily Routine & Work)", "Pack 2 (Home & Communication)", "Pack 3 (Travel & Conflict)", "Pack 4 (Business & Emotion)", "Pack 5 (Action & Strategy)", "Pack 6 (Thoughts & Senses)", "Pack 7 (Interactions & Science)", "Pack 8 (Corporate & Economy)", "Pack 9 (Medical & Survival)" ],
                nouns: [ { id: 'n_b_1', title: 'Pack 1: Modern Nomad', skills: VOCAB_SKILLS }, { id: 'n_b_2', title: 'Pack 2: Hungry Traveler', skills: VOCAB_SKILLS }, { id: 'n_b_3', title: 'Pack 3: Daily Grind', skills: VOCAB_SKILLS }, { id: 'n_b_4', title: 'Pack 4: Urban Chaos', skills: VOCAB_SKILLS }, { id: 'n_b_5', title: 'Pack 5: Weekend Getaway', skills: VOCAB_SKILLS } ],
                adjectives: [ { id: 'adj_1', title: 'Pack 1: Personality & Looks', skills: VOCAB_SKILLS }, { id: 'adj_2', title: 'Pack 2: Feelings & State', skills: VOCAB_SKILLS }, { id: 'adj_3', title: 'Pack 3: Places & Vibes', skills: VOCAB_SKILLS }, { id: 'adj_4', title: 'Pack 4: The -ed/-ing Trap', skills: VOCAB_SKILLS }, { id: 'adj_5', title: 'Pack 5: Opinions & Taste', skills: VOCAB_SKILLS } ],
                key_structs: [ ...CORE_MASTERY_SKILLS, "FANBOYS", "Subordinating Conj.", "Correlative Conj.", "Prep. Time (In,On,At)", "Prep. Place", "Prep. Movement", "Other Prepositions", "Quantifiers", "Possessive Adj.", "Possessive Pronouns", "Object Pronouns", "Frequency Adverbs" ]
            },
            advanced: {
                grammar: [ { id: 'past_simple', title: 'Past Simple', skills: ["Confunde pasado/presente", "Usa did en afirmativo", "Did + Verb in Past", "Pronunciación -ed", ...UNIVERSAL_SKILLS] }, { id: 'second_cond', title: 'Second Conditional', skills: ["Would en cláusula IF", "Presente vs Pasado", "Uso de 'Were'", "Contracción 'd", ...UNIVERSAL_SKILLS] }, { id: 'past_cont', title: 'Past Continuous', skills: ["Olvida was/were", "When vs While", "Uso State Verbs", "Concordancia", ...UNIVERSAL_SKILLS] }, { id: 'past_future', title: 'Past Future Intention', skills: ["Will para planes pasados", "Concordancia (They was)", "vs Used To", "Auxiliar be", ...UNIVERSAL_SKILLS] } ],
                verbs: [ { id: 'v_reg', title: 'Regulares', skills: ADVANCED_VERB_SKILLS }, { id: 'v_irreg', title: 'Irregulares', skills: ADVANCED_VERB_SKILLS }, { id: 'v_part', title: 'Participios', skills: ADVANCED_VERB_SKILLS }, { id: 'v_phrasal', title: 'Phrasal Verbs', skills: ADVANCED_VERB_SKILLS } ],
                nouns: [ { id: 'n_a_1', title: 'Pack 1: Success & Failure', skills: VOCAB_SKILLS }, { id: 'n_a_2', title: 'Pack 2: Truth & Lies', skills: VOCAB_SKILLS }, { id: 'n_a_3', title: 'Pack 3: Media & Ent.', skills: VOCAB_SKILLS }, { id: 'n_a_4', title: 'Pack 4: Compound Nouns', skills: VOCAB_SKILLS }, { id: 'n_a_5', title: 'Pack 5: Env. & Science', skills: VOCAB_SKILLS } ],
                adjectives: [ { id: 'adj_a_1', title: 'Pack 1: Extreme Adjectives', skills: VOCAB_SKILLS }, { id: 'adj_a_2', title: 'Pack 2: Nuanced Emotions', skills: VOCAB_SKILLS }, { id: 'adj_a_3', title: 'Pack 3: Character Traits', skills: VOCAB_SKILLS }, { id: 'adj_a_4', title: 'Pack 4: Academic & Formal', skills: VOCAB_SKILLS }, { id: 'adj_a_5', title: 'Pack 5: Idiomatic Adj.', skills: VOCAB_SKILLS } ],
                key_structs: [ "Used to / Use to", "Comparatives", "Superlatives", "Idiomatic Expressions", "Possessive Nouns", "Relative Clauses", "Modals of Possibility", "Passive Voice" ]
            },
            pro: {
                grammar: [ { id: 'perf_tenses', title: 'Present/Past Perfect', skills: ["Confunde con Past Simple", "Omite auxiliar Have/Had", "Error en Participio", "For/Since incorrecto", ...UNIVERSAL_SKILLS] }, { id: 'perf_cont', title: 'Perfect Continuous', skills: ["Omite 'been'", "Usa con State Verbs", "Confunde duración/resultado", "Falla estructura", ...UNIVERSAL_SKILLS] }, { id: 'third_cond', title: 'Third Conditional', skills: ["'Would' en cláusula IF", "Falla en participio", "Confunde irrealidad", "Olvida 'have'", ...UNIVERSAL_SKILLS] }, { id: 'mixed_cond', title: 'Mixed Conditionals', skills: ["Mezcla mal los tiempos", "Confunde resultado presente", "Estructura incompleta", "Uso ilógico", ...UNIVERSAL_SKILLS] } ],
                verbs: [ { id: 'v_phrasal2', title: 'Phrasal Verbs 2', skills: PRO_VERB_SKILLS }, { id: 'v_idioms', title: 'Idiomatic Expressions', skills: PRO_VERB_SKILLS }, { id: 'v_sayings', title: 'Sayings & Proverbs', skills: PRO_VERB_SKILLS }, { id: 'v_colloc', title: 'Advanced Collocations', skills: PRO_VERB_SKILLS } ],
                nouns: [ { id: 'n_p_1', title: 'Pack 1: Law & Politics', skills: VOCAB_SKILLS }, { id: 'n_p_2', title: 'Pack 2: Finance & Econ.', skills: VOCAB_SKILLS }, { id: 'n_p_3', title: 'Pack 3: Collective Nouns', skills: VOCAB_SKILLS }, { id: 'n_p_4', title: 'Pack 4: Uncountables', skills: VOCAB_SKILLS }, { id: 'n_p_5', title: 'Pack 5: Formal & Academic', skills: VOCAB_SKILLS } ],
                key_structs: [ "Inversion (Never have I...)", "Cleft Sentences (It was X who...)", "Participle Clauses", "Advanced Wish/Regret", "Double Comparatives", "Ellipsis & Substitution" ]
            }
        };

        const calculateArchetype = (s) => {
            if (!s) return { name: "Limbo / Por Evaluar", desc: "Realiza la evaluación para perfilar.", color: "text-slate-400" };
            const total = (parseInt(s.speaking)||0) + (parseInt(s.listening)||0) + (parseInt(s.reading)||0) + (parseInt(s.grammar)||0) + (parseInt(s.vocabulary)||0) + (parseInt(s.pronunciation)||0);
            if (total <= 10) return { name: "Ahí vamos 🥚", desc: "Tabula rasa. Listo para moldear.", color: "text-stone-500" };
            if (total >= 54) return { name: "Maestro Jedi 👑", desc: "Casi nativo. Ya bromea en inglés.", color: "text-amber-500" };
            if (total < 25) return { name: "Sobreviviente 🐣", desc: "Sobrevive con lo mínimo indispensable.", color: "text-orange-500" };
            if (total < 45) return { name: "Todo Terreno 🚙", desc: "Balanceado. El intermedio sólido.", color: "text-teal-500" };
            return { name: "Avanzado Pulido 💎", desc: "Detalles mínimos por arreglar.", color: "text-indigo-500" };
        };

        const CircularProgress = ({ score, label, colorClass, strokeColor, icon: Icon, onClick }) => {
            const percentage = (score / 10) * 100;
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;

            return (
                <button onClick={onClick} className="flex flex-col items-center bg-white dark:bg-zinc-900/50 p-4 rounded-3xl border border-slate-200 dark:border-zinc-800/50 relative overflow-hidden shadow-sm hover:shadow-md hover:border-indigo-500/50 transition-all w-36 sm:w-40 group">
                    <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity text-indigo-500 bg-indigo-50 dark:bg-indigo-900/40 p-1.5 rounded-full"><Eye size={14}/></div>
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" className="text-slate-100 dark:text-zinc-800" />
                            <circle cx="50" cy="50" r={radius} stroke={strokeColor} strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="circle-transition" />
                        </svg>
                        <div className="absolute flex flex-col items-center">
                            <span className="text-2xl font-black text-slate-800 dark:text-white">{score}</span>
                        </div>
                    </div>
                    <div className={`mt-4 flex flex-col items-center gap-1 ${colorClass}`}>
                        <Icon size={18} />
                        <span className="text-[10px] font-black uppercase tracking-widest text-center leading-tight">{label}</span>
                    </div>
                </button>
            );
        };

        // --- COMPONENTE MODAL: DETALLE DE MICRO-EVALUACIÓN ---
        const DetailModal = ({ sectionKey, title, evalData, activeTrack, onClose }) => {
            const trackConfig = CONFIG[activeTrack];
            let topics = [];
            let isFlatList = false;

            if (sectionKey === 'grammar') topics = trackConfig.grammar;
            else if (sectionKey === 'verbs' && activeTrack !== 'basic') topics = trackConfig.verbs;
            else if (sectionKey === 'nouns') topics = trackConfig.nouns;
            else if (sectionKey === 'adjectives') topics = trackConfig.adjectives;
            else {
                isFlatList = true;
                topics = [{ id: sectionKey, title: 'General Mastery', skills: sectionKey === 'verbs' ? trackConfig.verbs : trackConfig.key_structs }];
            }

            const calculateItemScore = (topicId, skillList) => {
                const topicData = evalData[topicId] || { skills: {} };
                let earned = 0;
                if(skillList.length === 0) return 0;
                skillList.forEach(s => {
                    const status = topicData.skills[s] || 0;
                    earned += (status === 2 ? 1 : status === 1 ? 0.5 : 0);
                });
                return Math.round(((earned / skillList.length) * 10) * 10) / 10;
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in">
                    <div className="bg-white dark:bg-zinc-900 w-full max-w-4xl max-h-[85vh] rounded-[2rem] shadow-2xl flex flex-col border border-slate-200 dark:border-zinc-800">
                        <div className="p-6 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center shrink-0">
                            <div>
                                <h2 className="text-xl sm:text-2xl font-black text-slate-800 dark:text-white uppercase tracking-widest flex items-center gap-2">
                                    <Target className="text-indigo-500"/> {title} Detalle
                                </h2>
                                <p className="text-xs font-bold text-slate-500 dark:text-zinc-400 mt-1 uppercase tracking-widest">Nivel: {activeTrack}</p>
                            </div>
                            <button onClick={onClose} className="p-3 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 text-slate-500 rounded-full transition-colors"><X size={20}/></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50 dark:bg-zinc-950/50">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {topics.map((topic, idx) => {
                                    const score = calculateItemScore(topic.id, topic.skills);
                                    const topicData = evalData[topic.id] || { skills: {} };
                                    
                                    const mastered = []; const progress = []; const review = [];
                                    topic.skills.forEach(s => {
                                        const val = topicData.skills[s] || 0;
                                        if (val === 2) mastered.push(s);
                                        else if (val === 1) progress.push(s);
                                        else review.push(s);
                                    });

                                    return (
                                        <div key={idx} className="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl p-5 shadow-sm">
                                            <div className="flex justify-between items-start mb-4 border-b border-slate-100 dark:border-zinc-800/50 pb-4">
                                                <h3 className="font-black text-sm sm:text-base text-slate-700 dark:text-zinc-200 pr-2">{topic.title}</h3>
                                                <div className={`px-3 py-1 rounded-lg font-black text-sm shrink-0 ${score >= 8 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : score >= 5 ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400' : 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400'}`}>
                                                    {score} / 10
                                                </div>
                                            </div>

                                            <div className="space-y-4">
                                                {mastered.length > 0 && (
                                                    <div>
                                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-emerald-500 flex items-center gap-1 mb-2"><CheckCircle2 size={12}/> Lo que dominas</h4>
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {mastered.map(s => <span key={s} className="px-2 py-1 bg-emerald-50 dark:bg-emerald-900/10 border border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 text-[10px] font-bold rounded-md">{s}</span>)}
                                                        </div>
                                                    </div>
                                                )}
                                                {progress.length > 0 && (
                                                    <div>
                                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-yellow-600 dark:text-yellow-500 flex items-center gap-1 mb-2"><Loader2 size={12}/> Ahí la llevas</h4>
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {progress.map(s => <span key={s} className="px-2 py-1 bg-yellow-50 dark:bg-yellow-900/10 border border-yellow-200 dark:border-yellow-800 text-yellow-700 dark:text-yellow-400 text-[10px] font-bold rounded-md">{s}</span>)}
                                                        </div>
                                                    </div>
                                                )}
                                                {review.length > 0 && (
                                                    <div>
                                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-rose-500 flex items-center gap-1 mb-2"><AlertCircle size={12}/> Falta revisar</h4>
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {review.map(s => <span key={s} className="px-2 py-1 bg-rose-50 dark:bg-rose-900/10 border border-rose-200 dark:border-rose-800 text-rose-700 dark:text-rose-400 text-[10px] font-bold rounded-md">{s}</span>)}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // VISTA 1: HOME
        // ==========================================
        const HomeView = ({ student, setTab }) => (
            <div className="space-y-6 fade-in">
                <div className="bg-gradient-to-br from-indigo-600 to-purple-800 p-8 sm:p-10 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 transform translate-x-10 -translate-y-10"><Target size={200}/></div>
                    <div className="relative z-10">
                        <p className="text-indigo-200 font-bold text-xs tracking-widest uppercase mb-2">Periplo Student Hub</p>
                        <h1 className="text-4xl sm:text-5xl font-black mb-4">¡Hola, {student?.name?.split(' ')[0] || 'Alumno'}! 👋</h1>
                        <div className="flex flex-wrap gap-3">
                            <span className="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
                                <Flame size={14} className="text-orange-400"/> {student?.level?.toUpperCase() || 'BÁSICO'}
                            </span>
                            <span className="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/20 text-xs font-bold tracking-wider">
                                {calculateArchetype(student?.skills).name}
                            </span>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4">
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-100 dark:bg-indigo-500/20 p-4 rounded-2xl text-indigo-600 dark:text-indigo-400"><Calendar size={24} /></div>
                                <div><h3 className="font-black text-slate-800 dark:text-white text-lg">Tu Agenda</h3><p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Reserva y ve tus clases</p></div>
                            </div>
                            <button onClick={() => setTab('schedule')} className="bg-indigo-600 hover:bg-indigo-500 text-white font-black p-4 rounded-xl transition-transform active:scale-95 shadow-lg shadow-indigo-500/30">
                                <ChevronRight size={20} />
                            </button>
                        </div>

                        <button onClick={() => setTab('playground')} className="w-full bg-gradient-to-r from-rose-500 to-orange-500 rounded-[2rem] p-6 shadow-xl text-white flex items-center justify-between hover:scale-[1.02] transition-transform text-left">
                            <div>
                                <h3 className="font-black text-2xl mb-1">Random Game</h3>
                                <p className="text-rose-100 text-xs font-bold uppercase tracking-widest">Practica un tema al azar</p>
                            </div>
                            <div className="bg-white/20 p-4 rounded-2xl"><Gamepad2 size={28}/></div>
                        </button>

                        <button onClick={() => setTab('performance')} className="w-full bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-xl border border-slate-200 dark:border-zinc-800 flex items-center justify-between hover:border-indigo-500 transition-colors text-left group">
                            <div>
                                <h3 className="font-black text-slate-800 dark:text-white text-lg">My Performance</h3>
                                <p className="text-slate-500 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest">Ver mi progreso y fallas</p>
                            </div>
                            <div className="bg-slate-100 dark:bg-zinc-800 p-4 rounded-2xl text-slate-400 group-hover:text-indigo-500 group-hover:bg-indigo-50 dark:group-hover:bg-indigo-900/30 transition-colors"><Target size={24}/></div>
                        </button>
                    </div>

                    <div className="space-y-4">
                        <div className="bg-amber-50 dark:bg-amber-900/10 rounded-[2rem] p-6 sm:p-8 shadow-sm border border-amber-200 dark:border-amber-900/30 relative">
                            <Quote className="text-amber-200 dark:text-amber-900/50 absolute top-4 right-4" size={60}/>
                            <h4 className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-3">Frase del Día</h4>
                            <p className="text-xl sm:text-2xl font-black text-slate-800 dark:text-amber-50 leading-tight relative z-10">"A smooth sea never made a skilled sailor."</p>
                            <p className="text-amber-600 dark:text-amber-400 font-bold text-sm mt-4">— Franklin D. Roosevelt</p>
                        </div>
                        <div className="bg-slate-900 rounded-[2rem] p-6 shadow-xl relative overflow-hidden flex flex-col justify-between min-h-[160px] group cursor-pointer border border-slate-800">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-rose-500 rounded-full blur-[60px] opacity-40 group-hover:opacity-60 transition-opacity"></div>
                            <h4 className="text-[10px] font-black text-rose-400 uppercase tracking-widest flex items-center gap-2"><Music size={14}/> Song of the week</h4>
                            <div className="flex items-end justify-between relative z-10 mt-4">
                                <div><p className="text-white font-black text-xl leading-tight">Blinding Lights</p><p className="text-slate-400 font-bold text-sm">The Weeknd</p></div>
                                <div className="bg-white text-black p-3 rounded-full hover:scale-110 transition-transform"><Play size={20} fill="currentColor"/></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // VISTA 2: MY PERFORMANCE (Gráficas y Modal)
        // ==========================================
        const PerformanceView = ({ student, evalData, setTab }) => {
            const [activeTrack, setActiveTrack] = useState(student?.level || 'basic');
            const [chartView, setChartView] = useState('radar'); 
            const [detailModal, setDetailModal] = useState(null); // Estado para abrir el modal
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const getSkill = (key) => parseInt(student?.skills?.[key]) || 0;
            const getRealScore = (section) => {
                const viewIdx = LEVEL_HIERARCHY.indexOf(activeTrack);
                const stuIdx = LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                if(viewIdx < stuIdx) return 10.0; if(viewIdx > stuIdx) return 0.0;  
                
                const trackConfig = CONFIG[activeTrack];
                let topics = trackConfig[section];
                if (!topics && section !== 'verbs' && section !== 'key_structs') return 0.0;

                const calculateItemScore = (topicId, skillList) => {
                    const topicData = evalData[topicId] || { skills: {} };
                    let earned = 0; if(skillList.length === 0) return 0;
                    skillList.forEach(s => { const status = topicData.skills[s] || 0; earned += (status === 2 ? 1 : status === 1 ? 0.5 : 0); });
                    return (earned / skillList.length) * 10;
                };

                if (section === 'verbs' && activeTrack === 'basic') return Math.round(calculateItemScore('verbs', trackConfig.verbs) * 10) / 10;
                if (section === 'key_structs') return Math.round(calculateItemScore('key_structs', trackConfig.key_structs) * 10) / 10;

                let totalScore = 0;
                topics.forEach(t => { totalScore += calculateItemScore(t.id, t.skills); });
                return topics.length === 0 ? 0 : Math.round((totalScore / topics.length) * 10) / 10;
            }

            useEffect(() => {
                const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
                if (chartRef.current && student && !isLocked && !detailModal) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    const dataValues = [getSkill('speaking'), getSkill('listening'), getSkill('reading'), getSkill('grammar'), getSkill('vocabulary'), getSkill('pronunciation')];
                    
                    const drawNumbersPlugin = {
                        id: 'drawNumbersPlugin',
                        afterDatasetsDraw(chart) {
                            if (chart.config.type !== 'bar') return; 
                            const { ctx, data } = chart;
                            ctx.save(); ctx.font = 'bold 12px Plus Jakarta Sans'; ctx.fillStyle = '#f59e0b'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                            chart.getDatasetMeta(0).data.forEach((bar, index) => { ctx.fillText(data.datasets[0].data[index], bar.x + 5, bar.y); });
                            ctx.restore();
                        }
                    };

                    chartInstance.current = new window.Chart(ctx, {
                        type: chartView === 'radar' ? 'radar' : 'bar',
                        data: {
                            labels: ['Speaking', 'Listening', 'Reading', 'Grammar', 'Vocabulary', 'Pronunc.'],
                            datasets: [{
                                data: dataValues, backgroundColor: chartView === 'bar' ? 'rgba(245, 158, 11, 0.8)' : 'rgba(245, 158, 11, 0.2)',
                                borderColor: 'rgba(245, 158, 11, 1)', pointBackgroundColor: '#f59e0b', pointBorderColor: '#fff', borderWidth: 2, borderRadius: chartView === 'bar' ? 4 : 0, 
                            }]
                        },
                        options: chartView === 'radar' 
                            ? { scales: { r: { min: 0, max: 10, ticks: { display: false, stepSize: 2 }, pointLabels: { color: '#f59e0b', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } } }, plugins: { legend: { display: false }, tooltip: {enabled: true} }, maintainAspectRatio: false }
                            : { indexAxis: 'y', scales: { x: { min: 0, max: 10, ticks: { color: 'rgba(161, 161, 170, 0.8)', stepSize: 2 } }, y: { grid: { display: false }, ticks: { color: '#f59e0b', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } } }, plugins: { legend: { display: false } }, maintainAspectRatio: false },
                        plugins: [drawNumbersPlugin] 
                    });
                }
            }, [activeTrack, student, chartView, detailModal]);

            const isLocked = LEVEL_HIERARCHY.indexOf(activeTrack) > LEVEL_HIERARCHY.indexOf(student?.level || 'basic');
            const archetypeData = calculateArchetype(student?.skills);
            const macroTotal = getSkill('speaking') + getSkill('listening') + getSkill('reading') + getSkill('grammar') + getSkill('vocabulary') + getSkill('pronunciation');

            const handleRingClick = (area, title) => {
                setDetailModal({ key: area, title });
            };

            return (
                <div className="space-y-6 fade-in">
                    
                    {/* El Modal de Detalle */}
                    {detailModal && (
                        <DetailModal 
                            sectionKey={detailModal.key} 
                            title={detailModal.title} 
                            evalData={evalData} 
                            activeTrack={activeTrack} 
                            onClose={() => setDetailModal(null)} 
                        />
                    )}

                    <div className="bg-gradient-to-r from-slate-800 to-zinc-900 dark:from-zinc-900 dark:to-black rounded-[2.5rem] p-6 sm:p-8 shadow-xl border border-slate-700 dark:border-zinc-800 text-white">
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-6 mb-8 border-b border-white/10 pb-8">
                            <div>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Macro Evaluación</p>
                                <h2 className={`text-2xl sm:text-3xl font-black flex items-center gap-2 ${archetypeData.color}`}><Flame size={28}/> {archetypeData.name}</h2>
                                <p className="text-sm text-slate-300 mt-2 max-w-md">{archetypeData.desc}</p>
                            </div>
                            <div className="bg-white/5 border border-white/10 p-5 rounded-2xl backdrop-blur-sm text-center w-full sm:w-auto shrink-0">
                                <span className="block text-4xl font-black text-amber-500">{macroTotal} <span className="text-xl text-slate-400">/ 60</span></span>
                                <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Global Pts</span>
                            </div>
                        </div>
                        <div className="w-full flex flex-col items-center relative">
                            <div className="w-full flex justify-between items-center mb-6">
                                <h3 className="font-black text-slate-300 uppercase tracking-widest text-xs flex items-center gap-2"><Target className="text-amber-500" size={16}/> Balance de Habilidades</h3>
                                <button onClick={() => setChartView(prev => prev === 'radar' ? 'bar' : 'radar')} className="flex items-center gap-1.5 text-[10px] uppercase font-bold tracking-widest text-amber-500 hover:text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 px-3 py-2 rounded-xl transition-colors border border-amber-500/20">
                                    {chartView === 'radar' ? <><BarChart size={14}/> Ver Barras</> : <><Target size={14}/> Ver Radar</>} <ChevronRight size={14}/>
                                </button>
                            </div>
                            <div className="w-full h-64 sm:h-80 relative"><canvas id="radarChart" ref={chartRef}></canvas></div>
                        </div>
                    </div>

                    <div className="flex p-1 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl w-fit mx-auto shadow-sm">
                        {LEVEL_HIERARCHY.map((lvl) => (
                            <button key={lvl} onClick={() => setActiveTrack(lvl)} className={`px-6 py-2 rounded-xl font-black text-xs transition-all uppercase ${activeTrack === lvl ? 'bg-indigo-50 dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>{lvl}</button>
                        ))}
                    </div>

                    {isLocked ? (
                        <div className="bg-white dark:bg-zinc-900 p-12 rounded-[2.5rem] text-center border border-slate-200 dark:border-zinc-800 shadow-lg animate-in fade-in">
                            <div className="bg-slate-100 dark:bg-zinc-800 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6"><Lock className="text-slate-400 dark:text-zinc-500" size={40} /></div>
                            <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2">You're almost there!</h3>
                            <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-sm mx-auto">Sigue practicando duro en tu nivel actual para desbloquear las métricas del bloque <span className="text-indigo-500 uppercase">{activeTrack}</span>.</p>
                        </div>
                    ) : (
                        <div className="bg-white dark:bg-zinc-900 rounded-[2.5rem] p-6 sm:p-8 shadow-lg border border-slate-200 dark:border-zinc-800 animate-in fade-in">
                            <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                                <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs flex items-center gap-2"><Sparkles className="text-indigo-500" size={16}/> Hacia {activeTrack.toUpperCase()} Mastery</h3>
                                <p className="text-[10px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-widest bg-slate-100 dark:bg-zinc-800 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-zinc-700">Click para ver detalles 👇</p>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-4 sm:gap-6">
                                <CircularProgress score={getRealScore('grammar')} label="Grammar Core" colorClass="text-emerald-500" strokeColor="#10b981" icon={PenTool} onClick={() => handleRingClick('grammar', 'Grammar Core')}/>
                                <CircularProgress score={getRealScore('verbs')} label="Verb Mastery" colorClass="text-rose-500" strokeColor="#f43f5e" icon={Brain} onClick={() => handleRingClick('verbs', 'Verb Mastery')}/>
                                <CircularProgress score={getRealScore('nouns')} label="Noun Mastery" colorClass="text-sky-500" strokeColor="#0ea5e9" icon={BookOpen} onClick={() => handleRingClick('nouns', 'Noun Mastery')}/>
                                {(activeTrack === 'basic' || activeTrack === 'advanced') && (
                                    <CircularProgress score={getRealScore('adjectives')} label={activeTrack === 'advanced' ? "Adjectives 2.0" : "Adj. Mastery"} colorClass="text-pink-500" strokeColor="#ec4899" icon={Palette} onClick={() => handleRingClick('adjectives', 'Adjective Mastery')}/>
                                )}
                                <CircularProgress score={getRealScore('key_structs')} label="Structures" colorClass="text-indigo-500" strokeColor="#6366f1" icon={Key} onClick={() => handleRingClick('key_structs', 'Key Structures')}/>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // VISTA 3: AGENDA (Calendario Interno)
        // ==========================================
        const getMexicoTime = () => new Date(new Date().toLocaleString("en-US", { timeZone: "America/Mexico_City" }));
        const getInitialDate = () => { const t = getMexicoTime(); if (t.getDay() === 0) return addDays(t, 1); return t; };
        const parseLocal = (dateStr) => { if (!dateStr) return new Date(); const [y, m, d] = dateStr.split('-'); return new Date(y, m - 1, d); };
        const TIMES = ['07:00', '08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00'];
        const formatTimeDisplay = (time24) => { const h = parseInt(time24.split(':')[0], 10); return `${h % 12 || 12}:00 ${h >= 12 ? 'pm' : 'am'}`; };
        const normalizeName = (name) => name ? name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "";
        const matchDays = (dbDay, gridDay) => {
            if (!dbDay || !gridDay) return false;
            let d1 = dbDay.toUpperCase().replace(/\./g, '').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            let d2 = gridDay.toUpperCase().replace(/\./g, '').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            if (d1 === 'MIER') d1 = 'MIE'; if (d2 === 'MIER') d2 = 'MIE';
            return d1 === d2;
        };
        const checkIsMine = (event, studentName) => {
            if (!event || !studentName) return false;
            const sn = normalizeName(studentName); const evStudent = normalizeName(event.student);
            if (evStudent === sn && sn !== "") return true;
            const evTitle = normalizeName(event.title).replace("clase de ", "").trim();
            const snFirstName = sn.split(' ')[0]; const titleFirstName = evTitle.split(' ')[0];
            return (evTitle === sn || evTitle === snFirstName || titleFirstName === snFirstName);
        };

        const ScheduleView = ({ student }) => {
            const [events, setEvents] = useState([]);
            const [studentsList, setStudentsList] = useState([]); 
            const [currentDate, setCurrentDate] = useState(getInitialDate());
            const [now, setNow] = useState(getMexicoTime());
            const [zoomLevel, setZoomLevel] = useState(1);

            const [bookingModal, setBookingModal] = useState(null); 
            const [classHubModal, setClassHubModal] = useState(null); 
            const [rescheduleMode, setRescheduleMode] = useState(null); 
            
            const [vocabNotes, setVocabNotes] = useState('');
            const [grammarNotes, setGrammarNotes] = useState('');
            const [isSavingNotes, setIsSavingNotes] = useState(false);
            const [draggedEventId, setDraggedEventId] = useState(null);

            const studentName = student?.name || "Alumno";

            const scrollToCurrentTime = () => {
                setZoomLevel(1);
                setTimeout(() => { const liveEl = document.getElementById('live-cell'); if(liveEl) liveEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' }); }, 150);
            };

            useEffect(() => {
                const timer = setInterval(() => setNow(getMexicoTime()), 60000);
                const qEvents = query(collection(db, 'artifacts', 'periplo-app-v1', 'schedule'));
                const unsubscribeEvents = onSnapshot(qEvents, (snapshot) => { setEvents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); });
                const qStudents = query(collection(db, 'artifacts', 'periplo-app-v1', 'students'));
                const unsubscribeStudents = onSnapshot(qStudents, (snapshot) => { setStudentsList(snapshot.docs.map(doc => doc.data())); });
                scrollToCurrentTime();
                return () => { clearInterval(timer); unsubscribeEvents(); unsubscribeStudents(); };
            }, []);

            const weekStart = startOfWeek(currentDate, { weekStartsOn: 1 });
            const weekDays = Array.from({ length: 6 }).map((_, i) => addDays(weekStart, i));
            const handlePrevWeek = () => setCurrentDate(addWeeks(currentDate, -1));
            const handleNextWeek = () => { const next = addWeeks(currentDate, 1); if (!isAfter(next, addWeeks(getMexicoTime(), 2))) setCurrentDate(next); };
            const notifyTeacher = async (message) => { await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'notifications'), { message, createdAt: serverTimestamp(), read: false }); };

            const canBookMore = (targetDateStr, currentStudentName) => {
                const myEvents = events.filter(e => checkIsMine(e, currentStudentName));
                const targetDate = parseLocal(targetDateStr);
                const dayName = format(targetDate, 'EEE', {locale:es}).toUpperCase().replace('.','');
                const hasClassToday = myEvents.some(e => e.date === targetDateStr || (!e.date && matchDays(e.day, dayName)));
                if (hasClassToday) { alert("⚠️ Ya tienes una clase agendada para este día. El límite es 1 por día."); return false; }
                const targetWeekStart = startOfWeek(targetDate, { weekStartsOn: 1 });
                const targetWeekEnd = addDays(targetWeekStart, 6);
                const startStr = format(targetWeekStart, 'yyyy-MM-dd');
                const endStr = format(targetWeekEnd, 'yyyy-MM-dd');
                let countThisWeek = 0; let detectedDates = [];
                myEvents.forEach(e => {
                    if (!e.date) { countThisWeek++; detectedDates.push(`${e.day} (Fija)`); } 
                    else if (e.date >= startStr && e.date <= endStr) { countThisWeek++; detectedDates.push(e.date); }
                });
                if (countThisWeek >= 3) { alert(`⚠️ Límite de 3 clases por semana.\n\nTienes en:\n➡️ ${detectedDates.join('\n➡️ ')}`); return false; }
                return true;
            };

            const getEventForSlot = (dateStr, dayName, time) => events.find(e => (e.date === dateStr && e.time === time) || (!e.date && matchDays(e.day, dayName) && e.time === time));

            const handleSlotClick = (dateStr, dayName, time) => {
                const existing = getEventForSlot(dateStr, dayName, time);
                if (rescheduleMode) {
                    if (existing) return; 
                    if (confirm(`¿Mover clase al ${dayName} ${dateStr} a las ${formatTimeDisplay(time)}?`)) performReschedule(dateStr, dayName, time);
                    return;
                }
                if (existing) {
                    if (checkIsMine(existing, studentName)) {
                        setVocabNotes(existing.notes_vocab || '');
                        setGrammarNotes(existing.notes_grammar || '');
                        setClassHubModal(existing);
                    }
                    return;
                }
                if (canBookMore(dateStr, studentName)) {
                    if(confirm(`¿Reservar NUEVA clase el ${dateStr} a las ${formatTimeDisplay(time)}?`)) bookClass(dateStr, dayName, time, studentName);
                }
            };

            const handleDragStart = (e, id) => { setDraggedEventId(id); e.dataTransfer.setData('text/plain', id); e.dataTransfer.effectAllowed = 'move'; };
            const handleDrop = async (e, tDate, tDay, tTime) => {
                e.preventDefault(); const id = e.dataTransfer.getData('text/plain'); if(!id) return;
                const evToMove = events.find(x => x.id === id); if(!evToMove) return;
                if(getEventForSlot(tDate, tDay, tTime)) { alert("⚠️ Ese espacio ya está ocupado."); setDraggedEventId(null); return; }
                if(confirm(`¿Mover tu clase al ${tDate} a las ${formatTimeDisplay(tTime)}?`)) {
                    try { await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'schedule', id), { date: tDate, day: tDay, time: tTime }); notifyTeacher(`🔄 ${studentName} arrastró su clase al ${tDate} a las ${formatTimeDisplay(tTime)}`); } catch(err) { alert(err.message); }
                }
                setDraggedEventId(null);
            };

            const bookClass = async (dateStr, dayName, time, name) => {
                const sn = normalizeName(name);
                const studentRecord = studentsList.find(s => normalizeName(s.name) === sn);
                const studentColor = studentRecord?.color || 'bg-emerald-200 border-emerald-300 text-emerald-900 dark:bg-emerald-900/50 dark:border-emerald-500 dark:text-emerald-100'; 
                try {
                    await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'schedule'), { date: dateStr, day: dayName, time, title: "Clase de " + name.split(' ')[0], student: name, type: 'class', notes: 'Agendado por alumno', customColor: studentColor, meetLink: '' });
                    notifyTeacher(`📗 ${name} agendó una clase el ${dateStr} a las ${time}`);
                } catch (e) { alert("Error: " + e.message); }
            };

            const saveNotes = async () => {
                if(!classHubModal) return;
                setIsSavingNotes(true);
                try { await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'schedule', classHubModal.id), { notes_vocab: vocabNotes, notes_grammar: grammarNotes }); setTimeout(() => setIsSavingNotes(false), 500); } catch (e) { alert(e.message); setIsSavingNotes(false); }
            };

            const cancelClass = async () => {
                if (!classHubModal) return;
                if (confirm("¿Seguro que quieres CANCELAR esta clase? El espacio quedará libre.")) {
                    try { await deleteDoc(doc(db, 'artifacts', 'periplo-app-v1', 'schedule', classHubModal.id)); notifyTeacher(`🚨 ${studentName} CANCELÓ su clase del ${classHubModal.date || classHubModal.day} a las ${classHubModal.time}`); setClassHubModal(null); } catch (e) { alert("Error: " + e.message); }
                }
            };

            const initReschedule = () => { setRescheduleMode(classHubModal); setClassHubModal(null); };
            const performReschedule = async (newDate, newDayName, newTime) => {
                if (!rescheduleMode) return;
                try { await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'schedule', rescheduleMode.id), { date: newDate, day: newDayName, time: newTime }); notifyTeacher(`🔄 ${studentName} MOVIÓ su clase al ${newDate} a las ${newTime}`); setRescheduleMode(null); } catch (e) { alert("Error: " + e.message); }
            };

            return (
                <div className="fade-in bg-white dark:bg-zinc-900 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-zinc-800 overflow-hidden relative h-[calc(100vh-140px)] md:h-[calc(100vh-60px)] min-h-[500px] flex flex-col">
                    
                    {rescheduleMode && (
                        <div className="bg-amber-500 text-white p-4 shadow-md z-50 flex justify-between items-center absolute top-0 w-full">
                            <div className="flex items-center gap-3"><ArrowRightLeft className="animate-pulse"/><div><p className="font-black text-sm uppercase">Modo Reprogramación</p><p className="text-xs">Selecciona un espacio vacío (amarillo).</p></div></div>
                            <button onClick={() => setRescheduleMode(null)} className="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-lg text-xs font-bold">Cancelar</button>
                        </div>
                    )}

                    <div className="p-4 border-b border-stone-200 dark:border-zinc-800 flex flex-wrap justify-between items-center bg-stone-50 dark:bg-zinc-950 shrink-0 z-10 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-teal-500 p-2 rounded-xl text-white shadow-md"><Calendar size={20}/></div>
                            <div><h2 className="text-lg font-black text-stone-800 dark:text-white leading-none">Reserva de Clases</h2><p className="text-xs font-bold text-teal-600 dark:text-teal-400 mt-1 uppercase">Límite: 3 por semana</p></div>
                        </div>
                        <div className="flex items-center gap-2 bg-white dark:bg-zinc-800 px-3 py-1.5 rounded-xl border border-stone-200 dark:border-zinc-700 shadow-sm w-full sm:w-auto justify-between">
                            <button onClick={handlePrevWeek} className="p-1 hover:bg-stone-100 dark:hover:bg-zinc-700 rounded transition-colors"><ChevronLeft size={16}/></button>
                            <span className="font-bold text-xs text-center capitalize">{format(weekStart, 'MMM d')} - {format(addDays(weekStart, 5), 'MMM d')}</span>
                            <button onClick={handleNextWeek} disabled={isAfter(addWeeks(currentDate, 1), addWeeks(getMexicoTime(), 2))} className="p-1 hover:bg-stone-100 dark:hover:bg-zinc-700 rounded disabled:opacity-30"><ChevronRight size={16}/></button>
                        </div>
                    </div>

                    {/* Contenedor responsivo con min-w grande para evitar que se apachurre en móvil */}
                    <div className="flex-1 overflow-x-auto overflow-y-auto p-4 cal-scroll relative bg-stone-50 dark:bg-zinc-950">
                        <div className="bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-stone-200 dark:border-zinc-800 origin-top-left transition-transform duration-200 min-w-[900px] mx-auto pb-8" style={{ zoom: zoomLevel }}>
                            <div className="grid grid-cols-[80px_repeat(6,minmax(120px,1fr))] border-b-2 border-stone-200 dark:border-zinc-800 bg-stone-100 dark:bg-zinc-950 sticky top-0 z-[45]">
                                <div className="sticky-corner p-4 text-center text-xs font-black text-stone-400 dark:text-zinc-500 uppercase border-r border-stone-200 dark:border-zinc-800 bg-stone-100 dark:bg-zinc-950 flex items-center justify-center">HORA</div>
                                {weekDays.map(day => {
                                    const isToday = isSameDay(day, now);
                                    return (
                                        <div key={day.toString()} className={`p-3 text-center border-r border-stone-200 dark:border-zinc-800 last:border-r-0 ${isToday ? 'bg-teal-50 dark:bg-teal-900/20' : ''}`}>
                                            <div className={`text-[10px] font-bold uppercase ${isToday ? 'text-teal-600 dark:text-teal-400' : 'text-stone-400 dark:text-zinc-500'}`}>{format(day, 'EEE', { locale: es })}</div>
                                            <div className={`text-lg font-black tracking-tight ${isToday ? 'text-teal-700 dark:text-teal-300' : 'text-stone-800 dark:text-zinc-300'}`}>{format(day, 'd')}</div>
                                        </div>
                                    )
                                })}
                            </div>

                            <div className="divide-y divide-stone-100 dark:divide-zinc-800 relative z-10">
                                {TIMES.map(time => {
                                    const currentHourStr = format(now, 'HH:00');
                                    const isCurrentHourRow = time === currentHourStr;

                                    return (
                                        <div key={time} className="grid grid-cols-[80px_repeat(6,minmax(120px,1fr))] h-[110px] relative">
                                            <div className={`sticky-col p-2 text-xs font-black flex items-center justify-center border-r border-stone-200 dark:border-zinc-800 backdrop-blur-sm ${isCurrentHourRow ? 'bg-teal-100 dark:bg-teal-900/60 text-teal-700 dark:text-teal-300' : 'bg-stone-50 dark:bg-zinc-950/90 text-stone-400 dark:text-zinc-500'}`}><span>{formatTimeDisplay(time)}</span></div>
                                            {weekDays.map(day => {
                                                const dateStr = format(day, 'yyyy-MM-dd');
                                                const dayName = format(day, 'EEE', {locale: es}).toUpperCase().replace('.',''); 
                                                const event = getEventForSlot(dateStr, dayName, time);
                                                const isMine = checkIsMine(event, studentName);
                                                const isToday = isSameDay(day, now);
                                                const isLiveCell = isToday && isCurrentHourRow;
                                                const currentMinutePercent = (now.getMinutes() / 60) * 100;
                                                
                                                let cellClass = `relative p-1 border-r border-stone-100 dark:border-zinc-800 last:border-r-0 transition-all duration-200 group overflow-hidden ${isToday ? 'bg-teal-50/30 dark:bg-teal-900/5' : ''}`;
                                                let cellContent = null;

                                                if (rescheduleMode) {
                                                    if (event) cellClass += " bg-stone-100 dark:bg-zinc-950 opacity-30 cursor-not-allowed";
                                                    else {
                                                        cellClass += " cursor-pointer bg-amber-50 dark:bg-amber-900/10 hover:bg-amber-100 border-amber-200";
                                                        cellContent = <div className="h-full w-full rounded-xl border-2 border-dashed border-amber-300 flex items-center justify-center animate-pulse"><span className="text-amber-600 font-bold text-xs uppercase flex items-center gap-1"><ArrowRightLeft size={14}/> Mover</span></div>;
                                                    }
                                                } else {
                                                    if (event) {
                                                        let finalColorClasses = event.customColor || 'bg-emerald-100 border-emerald-300 text-emerald-900 dark:bg-emerald-900/40 dark:border-emerald-500';
                                                        if (isMine) {
                                                            cellClass += " cursor-pointer";
                                                            cellContent = (
                                                                <div draggable="true" onDragStart={e=>handleDragStart(e,event.id)} onDragEnd={()=>setDraggedEventId(null)} className={`draggable-item h-full w-full rounded-xl p-2.5 border-2 shadow-md flex flex-col justify-between hover:scale-[1.02] cursor-grab active:cursor-grabbing ${draggedEventId === event.id ? 'opacity-40' : ''} ${finalColorClasses}`}>
                                                                    <div><div className="text-[10px] font-black uppercase mb-1 flex items-center gap-1 opacity-80"><BookOpen size={10}/> MI CLASE</div><div className="text-xs md:text-sm font-bold leading-tight line-clamp-2" title={event.title}>{event.title}</div></div>
                                                                    <span className="text-[10px] mt-2 font-bold flex items-center justify-center gap-1 bg-white/40 dark:bg-black/20 w-full py-1 rounded opacity-90"><PenTool size={10}/> Detalles</span>
                                                                </div>
                                                            );
                                                        } else {
                                                            cellClass += " cursor-not-allowed";
                                                            cellContent = <div className="h-full w-full bg-stone-100 dark:bg-zinc-800/50 border border-stone-200 dark:border-zinc-700 rounded-xl flex items-center justify-center opacity-70"><div className="flex items-center gap-1 text-stone-400 dark:text-zinc-600 font-bold text-xs uppercase"><Lock size={12}/> Ocupado</div></div>;
                                                        }
                                                    } else {
                                                        cellClass += " cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-900/20";
                                                        cellContent = <div className="h-full w-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><div className="flex flex-col items-center gap-1 text-teal-500 dark:text-teal-400"><UserPlus size={20}/><span className="text-[10px] font-bold uppercase">Apartar</span></div></div>;
                                                    }
                                                }

                                                return (
                                                    <div id={isLiveCell ? "live-cell" : ""} key={`${dateStr}-${time}`} onDragEnter={e=>e.preventDefault()} onDragOver={e=>{e.preventDefault(); e.dataTransfer.dropEffect='move'}} onDrop={e=>handleDrop(e,dateStr,dayName,time)} onClick={() => handleSlotClick(dateStr, dayName, time)} className={cellClass}>
                                                        {isLiveCell && <div className="led-line" style={{ top: `${currentMinutePercent}%` }}></div>}
                                                        {cellContent}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Controles de Zoom ocultos en móvil porque usan touch para scroll */}
                    <div className="absolute bottom-6 right-6 flex flex-col gap-2 z-40 hidden md:flex">
                        <button onClick={() => setZoomLevel(z => Math.min(z + 0.1, 1.5))} className="p-3 bg-white dark:bg-zinc-800 border border-stone-200 dark:border-zinc-700 shadow-xl rounded-full text-stone-600 dark:text-zinc-300 hover:bg-stone-50 dark:hover:bg-zinc-700 active:scale-95 transition-all"><ZoomIn size={20}/></button>
                        <button onClick={() => setZoomLevel(z => Math.max(z - 0.1, 0.5))} className="p-3 bg-white dark:bg-zinc-800 border border-stone-200 dark:border-zinc-700 shadow-xl rounded-full text-stone-600 dark:text-zinc-300 hover:bg-stone-50 dark:hover:bg-zinc-700 active:scale-95 transition-all"><ZoomOut size={20}/></button>
                        <button onClick={scrollToCurrentTime} className="p-3 bg-teal-600 border border-teal-700 shadow-xl rounded-full text-white hover:bg-teal-700 active:scale-95 transition-all mt-2"><LocateFixed size={20}/></button>
                    </div>

                    {classHubModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden border border-stone-200 dark:border-zinc-700 flex flex-col max-h-[90%]">
                                <div className="bg-teal-600 p-6 text-white shrink-0 flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl sm:text-2xl font-black">{classHubModal.title}</h3>
                                        <p className="opacity-80 font-medium text-sm flex items-center gap-2 mt-1"><Calendar size={14}/> {classHubModal.date || classHubModal.day} • {formatTimeDisplay(classHubModal.time)}</p>
                                    </div>
                                    <button onClick={() => setClassHubModal(null)} className="bg-black/20 hover:bg-black/40 p-2 rounded-full transition-colors"><X size={20}/></button>
                                </div>
                                <div className="p-4 sm:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6 bg-stone-50 dark:bg-zinc-950">
                                    <div className="flex gap-4">
                                        {classHubModal.meetLink ? (
                                            <a href={classHubModal.meetLink} target="_blank" className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-2xl font-black text-center shadow-lg shadow-indigo-500/30 transition-transform active:scale-95 flex items-center justify-center gap-2 sm:text-lg">
                                                <Video size={24}/> ENTRAR A LA CLASE
                                            </a>
                                        ) : (
                                            <div className="flex-1 bg-stone-200 dark:bg-zinc-800 text-stone-500 dark:text-zinc-400 p-4 rounded-2xl font-bold text-center border-2 border-dashed border-stone-300 dark:border-zinc-700 flex items-center justify-center gap-2">
                                                <Clock size={20}/> El profe pondrá el link pronto
                                            </div>
                                        )}
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div className="bg-yellow-50 dark:bg-zinc-900 border border-yellow-200 dark:border-zinc-700 rounded-2xl p-4 shadow-inner">
                                            <h4 className="text-yellow-800 dark:text-yellow-500 font-black uppercase text-xs tracking-widest mb-2 flex items-center gap-2"><BookOpen size={14}/> Vocabulario</h4>
                                            <textarea value={vocabNotes} onChange={e => setVocabNotes(e.target.value)} onBlur={saveNotes} placeholder="Anota palabras nuevas aquí..." className="w-full h-32 sm:h-48 bg-transparent outline-none resize-none text-stone-700 dark:text-stone-300 font-medium notebook-lines placeholder-yellow-800/30 dark:placeholder-zinc-600 text-sm"/>
                                        </div>
                                        <div className="bg-blue-50 dark:bg-zinc-900 border border-blue-200 dark:border-zinc-700 rounded-2xl p-4 shadow-inner">
                                            <h4 className="text-blue-800 dark:text-blue-400 font-black uppercase text-xs tracking-widest mb-2 flex items-center gap-2"><PenTool size={14}/> Gramática</h4>
                                            <textarea value={grammarNotes} onChange={e => setGrammarNotes(e.target.value)} onBlur={saveNotes} placeholder="Apuntes de reglas y estructuras..." className="w-full h-32 sm:h-48 bg-transparent outline-none resize-none text-stone-700 dark:text-stone-300 font-medium notebook-lines placeholder-blue-800/30 dark:placeholder-zinc-600 text-sm"/>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white dark:bg-zinc-900 p-4 border-t border-stone-200 dark:border-zinc-800 shrink-0 flex items-center justify-between">
                                    <div className="text-stone-400 text-xs font-bold hidden sm:block">{isSavingNotes ? <span className="text-emerald-500">Guardando...</span> : "Notas autoguardadas."}</div>
                                    <div className="flex gap-2 w-full sm:w-auto justify-between sm:justify-end">
                                        <button onClick={cancelClass} className="px-4 py-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-xl font-bold text-sm transition-colors border border-transparent hover:border-rose-200">Cancelar</button>
                                        <button onClick={initReschedule} className="px-4 py-2 bg-stone-100 dark:bg-zinc-800 text-stone-700 dark:text-zinc-300 hover:bg-stone-200 dark:hover:bg-zinc-700 rounded-xl font-bold text-sm transition-colors border border-stone-200 dark:border-zinc-700">Posponer</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // VISTAS PLACEHOLDER (Playground & Library)
        // ==========================================
        const PlaceholderView = ({ title, icon: Icon, desc }) => (
            <div className="h-[60vh] flex flex-col items-center justify-center text-center bg-white dark:bg-zinc-900 rounded-[2.5rem] border border-slate-200 dark:border-zinc-800 shadow-xl fade-in p-6">
                <div className="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-full mb-6 text-indigo-500"><Icon size={64}/></div>
                <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-3">{title}</h2>
                <p className="text-slate-500 dark:text-zinc-400 font-semibold max-w-md">{desc}</p>
            </div>
        );

        // ==========================================
        // MAIN APP CONTROLLER
        // ==========================================
        const StudentApp = () => {
            const [student, setStudent] = useState(null);
            const [evalData, setEvalData] = useState({});
            const [loading, setLoading] = useState(true);
            const [currentTab, setCurrentTab] = useState('home');
            
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [hasClickedMenu, setHasClickedMenu] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return; 

                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                    }
                    setLoading(false);
                });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center bg-zinc-950"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;

            const NAV_ITEMS = [
                { id: 'home', label: 'Inicio', icon: Home },
                { id: 'performance', label: 'Mi Progreso', icon: Target },
                { id: 'schedule', label: 'Agenda', icon: Calendar },
                { id: 'playground', label: 'Playground', icon: Gamepad2 },
                { id: 'library', label: 'Biblioteca', icon: Library }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 dark:bg-zinc-950 overflow-x-hidden">
                    
                    <aside className={`hidden md:flex flex-col bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 fixed h-full z-50 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className={`p-6 pb-2 border-b border-slate-100 dark:border-zinc-800/50 flex items-center h-[88px] ${isSidebarOpen ? 'justify-start gap-3' : 'justify-center'}`}>
                            <button onClick={() => { setIsSidebarOpen(!isSidebarOpen); setHasClickedMenu(true); }} className={`bg-indigo-600 p-2.5 rounded-xl text-white transition-all hover:bg-indigo-500 shadow-md shrink-0 ${!hasClickedMenu ? 'animate-invite' : ''}`} title={isSidebarOpen ? "Colapsar menú" : "Expandir menú"}><RocketIcon size={20}/></button>
                            {isSidebarOpen && <h1 className="text-xl font-black tracking-tight whitespace-nowrap fade-in">Periplo</h1>}
                        </div>
                        <nav className={`flex-1 py-4 space-y-2 overflow-y-auto no-scrollbar flex flex-col ${isSidebarOpen ? 'px-4' : 'items-center px-0'}`}>
                            {isSidebarOpen && <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-3 mb-4 mt-2 w-full fade-in">Menú Principal</div>}
                            {NAV_ITEMS.map(item => (
                                <button key={item.id} onClick={() => setCurrentTab(item.id)} title={!isSidebarOpen ? item.label : ''} className={`flex items-center rounded-2xl font-bold transition-all ${isSidebarOpen ? 'w-full px-4 py-3 gap-3 justify-start' : 'w-12 h-12 justify-center shrink-0'} ${currentTab === item.id ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400' : 'text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-800/50 hover:text-slate-900 dark:hover:text-white'}`}>
                                    <item.icon size={20} className={currentTab === item.id ? 'stroke-[2.5px] shrink-0' : 'shrink-0'}/> 
                                    {isSidebarOpen && <span className="whitespace-nowrap fade-in">{item.label}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className={`p-4 border-t border-slate-100 dark:border-zinc-800/50 flex ${isSidebarOpen ? 'items-center justify-start gap-3' : 'justify-center'}`}>
                            <div className="w-10 h-10 rounded-full bg-slate-200 dark:bg-zinc-800 flex items-center justify-center font-black text-slate-500 shrink-0">{student?.name?.charAt(0)}</div>
                            {isSidebarOpen && <div className="overflow-hidden fade-in"><p className="text-sm font-bold truncate text-slate-800 dark:text-white">{student?.name}</p><p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest truncate">{student?.level}</p></div>}
                        </div>
                    </aside>

                    <main className={`flex-1 relative pb-24 md:pb-8 transition-all duration-300 ease-in-out ${isSidebarOpen ? 'md:ml-64' : 'md:ml-20'}`}>
                        <header className="md:hidden bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40 p-4 flex justify-between items-center">
                            <h1 className="text-lg font-black flex items-center gap-2"><RocketIcon size={20} className="text-indigo-500"/> Periplo</h1>
                            <div className="w-8 h-8 rounded-full bg-indigo-100 dark:bg-zinc-800 flex items-center justify-center font-black text-indigo-600 dark:text-indigo-400 text-xs">{student?.name?.charAt(0)}</div>
                        </header>

                        <div className="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
                            {currentTab === 'home' && <HomeView student={student} setTab={setCurrentTab}/>}
                            {currentTab === 'performance' && <PerformanceView student={student} evalData={evalData} setTab={setCurrentTab}/>}
                            {currentTab === 'schedule' && <ScheduleView student={student} />}
                            {currentTab === 'playground' && <PlaceholderView title="Patio de Juegos" desc="Bienvenido al Arcade. Aquí encontrarás mini-juegos diseñados para atacar directamente tus áreas de oportunidad." icon={Gamepad2}/>}
                            {currentTab === 'library' && <PlaceholderView title="La Biblioteca" desc="Recursos didácticos, PDFs y explicaciones en video sobre los temas que estamos viendo en clase." icon={Library}/>}
                        </div>
                    </main>

                    <nav className="md:hidden fixed bottom-0 w-full bg-white/90 dark:bg-zinc-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-zinc-800 pb-safe z-50 flex justify-around px-2 py-2">
                        {NAV_ITEMS.map(item => (
                            <button key={item.id} onClick={() => setCurrentTab(item.id)} className={`flex flex-col items-center justify-center w-16 h-14 rounded-2xl transition-all ${currentTab === item.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-zinc-300'}`}>
                                <div className={`${currentTab === item.id ? 'bg-indigo-50 dark:bg-indigo-500/20 p-1.5 rounded-xl mb-1' : 'mb-1'}`}><item.icon size={20} className={currentTab === item.id ? 'stroke-[2.5px]' : ''}/></div>
                                <span className={`text-[9px] font-bold ${currentTab === item.id ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>{item.label}</span>
                            </button>
                        ))}
                    </nav>

                </div>
            );
        };

        const RocketIcon = ({size, className}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg>;

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentApp />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Presentations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#09090b', brand: '#3b82f6' },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.4s ease-in-out',
                        popIn: 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: white; overflow: hidden; }
        .touch-safe { touch-action: manipulation; }
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.05); }
            .hover-bg:hover { background-color: rgba(255, 255, 255, 0.1); }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.6.0",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import confetti from 'canvas-confetti';
        import { ChevronLeft, ChevronRight, CheckCircle2, AlertCircle } from 'lucide-react';

        // --- MOCK DATA FALLBACK ---
        const MOCK_DATA = {
            title: "Present Simple Rules",
            content: {
                slides: [
                    { id: "uuid1", type: "theory", text: "Usamos el presente simple para rutinas y hechos.", emojis: "⏰ 🏃‍♂️", layout: "hero-emoji-center" },
                    { id: "uuid1b", type: "theory", text: "También lo usamos en tercera persona agregando 's'.", emojis: "🍎 🐍", layout: "split-text-left" },
                    { id: "uuid2", type: "multipleChoice", questions: [ { question: "She ___ everyday.", options: ["run", "runs"], correctIndex: 1 }, { question: "They ___ tennis.", options: ["play", "plays"], correctIndex: 0 } ] },
                    { id: "uuid3", type: "fillBlank", text: "I [wake] up at 7am and [eat] breakfast.", wordBank: ["wake", "sleep", "eat", "run"] },
                    { id: "uuid4", type: "sentenceScramble", sentences: [ { text: "I play tennis", translation: "Yo juego tenis" } ] }
                ]
            }
        };

        // --- UTILS ---
        const triggerConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
        };

        // --- COMPONENTS ---

        // 1. Theory Slide
        const TheorySlide = ({ slide }) => {
            const layoutClasses = {
                'hero-emoji-center': 'flex-col items-center justify-center text-center',
                'hero-emoji-top': 'flex-col items-center justify-start pt-20 text-center',
                'split-text-left': 'grid grid-cols-1 md:grid-cols-2 items-center gap-8 text-left',
                'split-text-right': 'grid grid-cols-1 md:grid-cols-2 items-center gap-8 text-right',
                'horizontal-emoji-band': 'flex-col items-center justify-start pt-20 text-center'
            };

            const EmojiBlock = () => (
                <div className={`text-8xl md:text-9xl animate-popIn ${slide.layout === 'horizontal-emoji-band' ? 'flex gap-8 mt-12' : ''}`}>
                    {slide.layout === 'horizontal-emoji-band' 
                        ? slide.emojis.split(' ').map((e, i) => <span key={i}>{e}</span>) 
                        : slide.emojis}
                </div>
            );
            
            const TextBlock = () => <h2 className="text-3xl md:text-5xl font-black text-white leading-tight animate-popIn" style={{animationDelay: '0.1s'}}>{slide.text}</h2>;

            return (
                <div className={`w-full h-full p-8 flex ${layoutClasses[slide.layout] || layoutClasses['hero-emoji-center']}`}>
                    {slide.layout === 'split-text-right' && <EmojiBlock />}
                    {slide.layout !== 'split-text-right' && slide.layout !== 'horizontal-emoji-band' && slide.layout !== 'split-text-left' && <EmojiBlock />}
                    
                    <TextBlock />

                    {slide.layout === 'split-text-left' && <EmojiBlock />}
                    {slide.layout === 'horizontal-emoji-band' && <EmojiBlock />}
                </div>
            );
        };

        // 2. Multiple Choice Slide
        const MultipleChoiceSlide = ({ slide, onComplete }) => {
            const [qIndex, setQIndex] = useState(0);
            const [errorIdx, setErrorIdx] = useState(null);
            const q = slide.questions[qIndex];

            const handleAnswer = (idx) => {
                if (idx === q.correctIndex) {
                    triggerConfetti();
                    if (qIndex < slide.questions.length - 1) {
                        setTimeout(() => setQIndex(qIndex + 1), 1000);
                    } else {
                        setTimeout(onComplete, 1000);
                    }
                } else {
                    setErrorIdx(idx);
                    setTimeout(() => setErrorIdx(null), 500);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-3xl mx-auto">
                    <div className="bg-zinc-900 rounded-3xl p-8 w-full shadow-2xl border border-zinc-800 animate-popIn">
                        <h3 className="text-sm font-bold text-zinc-400 mb-2 uppercase tracking-wider">Choose the correct answer</h3>
                        <h2 className="text-4xl font-black mb-8">{q.question}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {q.options.map((opt, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => handleAnswer(idx)}
                                    className={`touch-safe text-2xl font-bold py-6 px-4 rounded-2xl transition-all border-2 
                                        ${errorIdx === idx ? 'border-red-500 bg-red-500/20 animate-shake text-red-100' : 'border-zinc-700 bg-zinc-800 hover-bg text-white'}`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // 3. Fill in the Blank Slide
        const FillBlankSlide = ({ slide, onComplete }) => {
            const parts = slide.text.split(/\[(.*?)\]/g);
            const answers = slide.text.match(/\[(.*?)\]/g)?.map(s => s.replace(/\[|\]/g, '')) || [];
            
            const [blanks, setBlanks] = useState(Array(answers.length).fill(null));
            const [availableWords, setAvailableWords] = useState(slide.wordBank);

            const handleBankClick = (word) => {
                const firstEmpty = blanks.indexOf(null);
                if (firstEmpty !== -1) {
                    const newBlanks = [...blanks];
                    newBlanks[firstEmpty] = word;
                    setBlanks(newBlanks);
                    setAvailableWords(availableWords.filter(w => w !== word));
                }
            };

            const handleBlankClick = (word, idx) => {
                if (!word) return;
                const newBlanks = [...blanks];
                newBlanks[idx] = null;
                setBlanks(newBlanks);
                setAvailableWords([...availableWords, word]);
            };

            useEffect(() => {
                if (blanks.every(b => b !== null)) {
                    if (blanks.join(',') === answers.join(',')) {
                        triggerConfetti();
                        setTimeout(onComplete, 1500);
                    } else {
                        // Shake all blanks if wrong
                        const blankElements = document.querySelectorAll('.fill-blank-slot');
                        blankElements.forEach(el => {
                            el.classList.add('animate-shake', 'border-red-500', 'text-red-500');
                            setTimeout(() => el.classList.remove('animate-shake', 'border-red-500', 'text-red-500'), 500);
                        });
                    }
                }
            }, [blanks]);

            let blankCounter = 0;

            return (
                <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto animate-popIn">
                    <div className="text-3xl md:text-5xl font-black leading-loose text-center mb-12">
                        {parts.map((part, i) => {
                            if (i % 2 === 0) return <span key={i}>{part}</span>;
                            const bIdx = blankCounter++;
                            return (
                                <button 
                                    key={i}
                                    onClick={() => handleBlankClick(blanks[bIdx], bIdx)}
                                    className={`fill-blank-slot touch-safe inline-block min-w-[120px] mx-2 px-4 py-2 rounded-xl border-b-4 bg-zinc-800 transition-all font-bold
                                        ${blanks[bIdx] ? 'border-brand text-brand' : 'border-zinc-600 text-zinc-500'}`}
                                >
                                    {blanks[bIdx] || '???'}
                                </button>
                            );
                        })}
                    </div>
                    
                    <div className="flex flex-wrap gap-4 justify-center mt-8 p-6 bg-zinc-900 rounded-3xl w-full">
                        {availableWords.map((word, i) => (
                            <button
                                key={i}
                                onClick={() => handleBankClick(word)}
                                className="touch-safe text-2xl font-bold py-3 px-6 bg-zinc-800 border-2 border-zinc-700 rounded-xl hover-scale text-white transition-transform"
                            >
                                {word}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // 4. Sentence Scramble Slide
        const SentenceScrambleSlide = ({ slide, onComplete }) => {
            // Simplified for first sentence in array
            const targetSentence = slide.sentences[0].text;
            const translation = slide.sentences[0].translation;
            const words = targetSentence.split(' ');
            
            const [shuffled, setShuffled] = useState([]);
            const [selected, setSelected] = useState([]);

            useEffect(() => {
                setShuffled([...words].sort(() => Math.random() - 0.5));
            }, [slide]);

            const handleSelect = (word, idx) => {
                setSelected([...selected, word]);
                const newShuffled = [...shuffled];
                newShuffled.splice(idx, 1);
                setShuffled(newShuffled);
            };

            const handleDeselect = (word, idx) => {
                const newSelected = [...selected];
                newSelected.splice(idx, 1);
                setSelected(newSelected);
                setShuffled([...shuffled, word]);
            };

            useEffect(() => {
                if (shuffled.length === 0 && selected.length > 0) {
                    if (selected.join(' ') === targetSentence) {
                        triggerConfetti();
                        setTimeout(onComplete, 1500);
                    } else {
                        const container = document.getElementById('scramble-container');
                        container.classList.add('animate-shake');
                        setTimeout(() => {
                            container.classList.remove('animate-shake');
                            // Reset
                            setShuffled([...words].sort(() => Math.random() - 0.5));
                            setSelected([]);
                        }, 500);
                    }
                }
            }, [selected, shuffled]);

            return (
                <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto animate-popIn">
                    <p className="text-xl text-zinc-400 font-bold mb-4 uppercase tracking-widest">{translation}</p>
                    
                    <div id="scramble-container" className="flex flex-wrap gap-3 min-h-[80px] mb-12 justify-center items-center p-4 bg-zinc-900 border-2 border-dashed border-zinc-700 rounded-3xl w-full">
                        {selected.map((word, i) => (
                            <button key={i} onClick={() => handleDeselect(word, i)} className="touch-safe text-3xl font-black py-2 px-6 bg-brand rounded-xl text-white hover-scale transition-transform">
                                {word}
                            </button>
                        ))}
                    </div>

                    <div className="flex flex-wrap gap-4 justify-center">
                        {shuffled.map((word, i) => (
                            <button key={i} onClick={() => handleSelect(word, i)} className="touch-safe text-2xl font-bold py-3 px-6 bg-zinc-800 border-2 border-zinc-700 rounded-xl text-white hover-scale transition-transform">
                                {word}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };


        // --- MAIN APP ---
        const App = () => {
            const [presentation, setPresentation] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    
                    if (id) {
                        // TODO: Reemplazar con lógica real de Firebase
                        /*
                        import { doc, getDoc } from "firebase/firestore";
                        const docRef = doc(db, "presentations", id);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) setPresentation(docSnap.data());
                        */
                        console.log("Fetching ID:", id);
                        setTimeout(() => { setPresentation(MOCK_DATA); setLoading(false); }, 500); // Simulando red
                    } else {
                        setPresentation(MOCK_DATA);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            if (loading) return <div className="h-screen w-screen flex items-center justify-center text-white"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brand"></div></div>;
            if (!presentation) return <div className="h-screen w-screen flex items-center justify-center text-white">Error loading data.</div>;

            const slides = presentation.content.slides;
            const currentSlide = slides[currentIdx];

            const nextSlide = () => { if (currentIdx < slides.length - 1) setCurrentIdx(currentIdx + 1); };
            const prevSlide = () => { if (currentIdx > 0) setCurrentIdx(currentIdx - 1); };
            const progress = ((currentIdx + 1) / slides.length) * 100;

            const renderSlide = () => {
                switch(currentSlide.type) {
                    case 'theory': return <TheorySlide slide={currentSlide} />;
                    case 'multipleChoice': return <MultipleChoiceSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id} />;
                    case 'fillBlank': return <FillBlankSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id} />;
                    case 'sentenceScramble': return <SentenceScrambleSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id} />;
                    default: return <div>Unknown slide type</div>;
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col relative overflow-hidden">
                    {/* Header / Progress */}
                    <header className="absolute top-0 left-0 w-full p-6 flex items-center justify-between z-10 pointer-events-none">
                        <h1 className="text-xl font-bold text-zinc-300 drop-shadow-md">{presentation.title}</h1>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold text-zinc-500">{currentIdx + 1} / {slides.length}</span>
                            <div className="w-32 h-2 bg-zinc-800 rounded-full overflow-hidden">
                                <div className="h-full bg-brand transition-all duration-300" style={{width: `${progress}%`}}></div>
                            </div>
                        </div>
                    </header>

                    {/* Canvas / Main Content */}
                    <main className="flex-1 relative z-0 mt-16 pb-24 md:pb-0 md:px-24">
                        {renderSlide()}
                    </main>

                    {/* Navigation Controls */}
                    <div className="absolute bottom-6 left-0 w-full flex justify-between px-6 md:top-1/2 md:-translate-y-1/2 md:bottom-auto z-10 pointer-events-none">
                        <button 
                            onClick={prevSlide}
                            disabled={currentIdx === 0}
                            className={`pointer-events-auto touch-safe p-4 rounded-full bg-zinc-800 border-2 border-zinc-700 text-white transition-transform ${currentIdx === 0 ? 'opacity-0' : 'hover-scale opacity-100 shadow-xl'}`}
                        >
                            <ChevronLeft size={32} />
                        </button>
                        
                        {currentSlide.type === 'theory' && (
                            <button 
                                onClick={nextSlide}
                                disabled={currentIdx === slides.length - 1}
                                className={`pointer-events-auto touch-safe p-4 rounded-full bg-brand text-white shadow-xl transition-transform hover-scale shadow-brand/20 ${currentIdx === slides.length - 1 ? 'opacity-0' : 'opacity-100'}`}
                            >
                                <ChevronRight size={32} />
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

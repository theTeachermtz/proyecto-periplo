<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Presentations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#09090b', brand: '#3b82f6' },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.4s ease-in-out',
                        popIn: 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        fadeIn: 'fadeIn 0.4s ease forwards'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: white; overflow: hidden; }
        .touch-safe { touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.05); }
            .hover-bg:hover { background-color: rgba(255, 255, 255, 0.1); }
        }
        /* Nav arrows fade transition */
        .nav-arrows { transition: opacity 0.4s ease; }
        .nav-arrows.hidden-arrows { opacity: 0; pointer-events: none; }
        .nav-arrows.visible-arrows { opacity: 1; pointer-events: auto; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.6.0",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import confetti from 'canvas-confetti';
        import { ChevronLeft, ChevronRight, Play, X, ArrowLeft, LayoutTemplate } from 'lucide-react';
        
        // --- FIREBASE INIT ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const QUIZZES_PATH = 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes';

        const triggerConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
        };

        // ============================================================
        // MINI-MARKDOWN PARSER
        // Supports: **bold**, __underline__, *italic*
        // Also detects numbered list patterns in text: "1. xxx 2. yyy"
        // ============================================================
        const parseMiniMarkdown = (text) => {
            if (!text) return null;
            const parts = [];
            // Regex: **bold** or __underline__ or *italic*
            const regex = /(\*\*(.+?)\*\*|__(.+?)__|(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*))/g;
            let lastIndex = 0;
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push(text.slice(lastIndex, match.index));
                }
                if (match[2]) parts.push(<strong key={match.index} className="font-black text-white">{match[2]}</strong>);
                else if (match[3]) parts.push(<span key={match.index} className="underline decoration-2 underline-offset-4">{match[3]}</span>);
                else if (match[4]) parts.push(<em key={match.index} className="italic text-blue-300">{match[4]}</em>);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < text.length) parts.push(text.slice(lastIndex));
            return parts.length > 0 ? parts : text;
        };

        // Detect if text has a numbered-list pattern like "1. xxx 2. yyy" or "1. xxx\n2.yyy"
        const parseTextWithLists = (text) => {
            if (!text) return null;
            // Pattern: digit(s) followed by . and space, repeated 2+ times
            const listPattern = /(?:^|\n)\s*\d+\.\s+/g;
            const matches = text.match(listPattern);
            if (matches && matches.length >= 2) {
                // Split into items by the numbered pattern
                const items = text.split(/(?:^|\n)\s*\d+\.\s+/).filter(s => s.trim());
                // Check if there's a heading before the first number
                const firstNumIdx = text.search(/\d+\.\s+/);
                const heading = firstNumIdx > 0 ? text.slice(0, firstNumIdx).trim() : null;
                return { type: 'numbered-list', heading, items };
            }
            return { type: 'plain', text };
        };

        // ============================================================
        // THEORY SLIDE — supports ALL layouts from SCHEMES-FASE2-BOT
        // ============================================================
        const TheorySlide = ({ slide }) => {

            // --- Layout: COVER ---
            if (slide.layout === 'cover') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 animate-popIn">
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-black text-white leading-tight mb-4 max-w-3xl">
                            {parseMiniMarkdown(slide.heading || slide.text)}
                        </h1>
                        {slide.subtitle && <p className="text-lg md:text-2xl text-zinc-400 font-medium max-w-2xl">{parseMiniMarkdown(slide.subtitle)}</p>}
                        {slide.branding && <p className="text-sm text-zinc-600 mt-6 font-bold uppercase tracking-widest">{slide.branding}</p>}
                    </div>
                );
            }

            // --- Layout: TITLE-BULLETS ---
            if (slide.layout === 'title-bullets') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 md:px-16 animate-popIn">
                        <div className="max-w-3xl w-full text-center">
                            <h2 className="text-3xl md:text-5xl font-black text-white mb-8 leading-tight">
                                {parseMiniMarkdown(slide.heading || slide.text)}
                            </h2>
                            {slide.bullets && (
                                <ul className="space-y-3 text-left mx-auto max-w-2xl">
                                    {slide.bullets.map((b, i) => (
                                        <li key={i} className="flex items-start gap-3 animate-fadeIn" style={{ animationDelay: `${i * 0.1}s`, opacity: 0 }}>
                                            <span className="text-brand font-black text-lg mt-0.5 shrink-0">{i + 1}.</span>
                                            <span className="text-xl md:text-2xl text-zinc-200 font-semibold leading-snug">{parseMiniMarkdown(b)}</span>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                );
            }

            // --- Layout: TWO-COLUMNS ---
            if (slide.layout === 'two-columns') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 md:px-16 animate-popIn">
                        <h2 className="text-3xl md:text-5xl font-black text-white mb-10 text-center max-w-3xl">
                            {parseMiniMarkdown(slide.heading)}
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
                            {[slide.leftColumn, slide.rightColumn].map((col, ci) => col && (
                                <div key={ci} className="bg-white/5 rounded-2xl p-6 border border-white/10">
                                    <h3 className="text-lg font-black text-brand mb-4 uppercase tracking-wider">{col.title}</h3>
                                    <ul className="space-y-2">
                                        {col.items?.map((item, i) => (
                                            <li key={i} className="text-zinc-300 font-medium text-base flex items-start gap-2">
                                                <span className="text-brand mt-1">•</span>
                                                <span>{parseMiniMarkdown(item)}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // --- Layout: TABLE-NOTES ---
            if (slide.layout === 'table-notes') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-6 md:px-16 animate-popIn overflow-y-auto">
                        <div className="max-w-4xl w-full">
                            <h2 className="text-3xl md:text-4xl font-black text-white mb-8 text-center">
                                {parseMiniMarkdown(slide.heading)}
                            </h2>
                            {slide.table && (
                                <div className="overflow-x-auto rounded-2xl border border-white/10 mb-6">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="bg-white/10">
                                                {slide.table.headers?.map((h, i) => (
                                                    <th key={i} className="px-5 py-3 text-sm font-black text-brand uppercase tracking-wider">{h}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {slide.table.rows?.map((row, ri) => (
                                                <tr key={ri} className={ri % 2 === 0 ? 'bg-white/5' : ''}>
                                                    {row.map((cell, ci) => (
                                                        <td key={ci} className="px-5 py-3 text-zinc-200 font-medium text-sm">{parseMiniMarkdown(cell)}</td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            {slide.notes && (
                                <div className="space-y-2">
                                    {slide.notes.map((n, i) => (
                                        <p key={i} className="text-zinc-400 text-sm font-medium">💡 {parseMiniMarkdown(n)}</p>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- Layout: MIND-MAP ---
            if (slide.layout === 'mind-map') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 animate-popIn">
                        <div className="bg-white/10 rounded-full px-8 py-4 mb-10 border border-white/20">
                            <h2 className="text-2xl md:text-4xl font-black text-white text-center">{slide.centerLabel}</h2>
                        </div>
                        <div className="flex flex-wrap justify-center gap-4 max-w-4xl">
                            {slide.branches?.map((b, i) => (
                                <div key={i} className="rounded-2xl px-5 py-3 border-2 animate-fadeIn flex flex-col items-center"
                                     style={{ borderColor: b.color || '#3b82f6', animationDelay: `${i * 0.08}s`, opacity: 0 }}>
                                    <span className="text-lg font-black text-white">{b.term}</span>
                                    {b.translation && <span className="text-sm text-zinc-400">{b.translation}</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // --- Layout: QUOTE ---
            if (slide.layout === 'quote') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 text-center animate-popIn">
                        <div className="max-w-3xl">
                            <span className="text-6xl text-brand/40 font-black leading-none">"</span>
                            <p className="text-2xl md:text-4xl font-bold text-white leading-snug -mt-6">{parseMiniMarkdown(slide.quote || slide.text)}</p>
                            {slide.attribution && <p className="text-zinc-500 font-bold mt-6 text-lg">— {slide.attribution}</p>}
                        </div>
                    </div>
                );
            }

            // --- Layout: SPLIT-TEXT-IMAGE-LEFT or SPLIT-TEXT-IMAGE-RIGHT ---
            if (slide.layout === 'split-text-image-left' || slide.layout === 'split-text-image-right') {
                const textSide = (
                    <div className="flex flex-col justify-center items-center md:items-start text-center md:text-left">
                        {slide.heading && <h2 className="text-2xl md:text-4xl font-black text-white mb-4 leading-tight">{parseMiniMarkdown(slide.heading)}</h2>}
                        {slide.text && <p className="text-lg md:text-xl text-zinc-300 font-medium mb-4 leading-relaxed">{parseMiniMarkdown(slide.text)}</p>}
                        {slide.bullets && (
                            <ul className="space-y-2 mt-2">
                                {slide.bullets.map((b, i) => (
                                    <li key={i} className="text-zinc-300 font-medium text-base flex items-start gap-2">
                                        <span className="text-brand mt-1 shrink-0">•</span>
                                        <span>{parseMiniMarkdown(b)}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                );
                const emojiSide = (
                    <div className="flex items-center justify-center">
                        <span className="text-6xl md:text-8xl animate-popIn">{slide.emojis || '📝'}</span>
                    </div>
                );
                const isLeft = slide.layout === 'split-text-image-left';
                return (
                    <div className="w-full h-full flex flex-col md:grid md:grid-cols-5 items-center gap-6 px-8 md:px-16 animate-popIn">
                        <div className="md:col-span-3 flex flex-col justify-center">{isLeft ? textSide : emojiSide}</div>
                        <div className="md:col-span-2 flex items-center justify-center">{isLeft ? emojiSide : textSide}</div>
                    </div>
                );
            }

            // --- Layout: HORIZONTAL-EMOJI-BAND ---
            if (slide.layout === 'horizontal-emoji-band') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 gap-6 animate-popIn">
                        <h2 className="text-3xl md:text-5xl font-black text-white text-center leading-tight max-w-3xl">
                            {parseMiniMarkdown(slide.text)}
                        </h2>
                        <div className="flex gap-6 text-5xl md:text-7xl mt-2">
                            {(slide.emojis || '').split(' ').filter(Boolean).map((e, i) => <span key={i} className="animate-popIn" style={{ animationDelay: `${i * 0.1}s` }}>{e}</span>)}
                        </div>
                    </div>
                );
            }

            // ============================================================
            // FALLBACK / LEGACY LAYOUTS: hero-emoji-center, hero-emoji-top,
            // split-text-left, split-text-right, AND generic "hero"
            // Also handles plain text with auto-list detection
            // ============================================================
            const textContent = slide.text || '';
            const parsed = parseTextWithLists(textContent);

            const renderTextBlock = () => {
                if (parsed.type === 'numbered-list') {
                    return (
                        <div className="max-w-3xl w-full animate-popIn text-center" style={{ animationDelay: '0.1s' }}>
                            {parsed.heading && (
                                <h2 className="text-2xl md:text-4xl lg:text-5xl font-black text-white leading-tight mb-6 drop-shadow-lg">
                                    {parseMiniMarkdown(parsed.heading)}
                                </h2>
                            )}
                            <ol className="space-y-3 text-left mx-auto max-w-2xl">
                                {parsed.items.map((item, i) => (
                                    <li key={i} className="flex items-start gap-3 animate-fadeIn" style={{ animationDelay: `${(i + 1) * 0.12}s`, opacity: 0 }}>
                                        <span className="text-brand font-black text-xl mt-0.5 shrink-0">{i + 1}.</span>
                                        <span className="text-xl md:text-2xl text-zinc-200 font-semibold leading-snug">{parseMiniMarkdown(item.trim())}</span>
                                    </li>
                                ))}
                            </ol>
                        </div>
                    );
                }
                return (
                    <h2 className="text-3xl md:text-5xl lg:text-6xl font-black text-white leading-tight animate-popIn drop-shadow-lg max-w-3xl text-center"
                        style={{ animationDelay: '0.1s' }}>
                        {parseMiniMarkdown(textContent)}
                    </h2>
                );
            };

            const emojiBlock = (extraClass = '') => (
                <div className={`text-5xl md:text-7xl animate-popIn ${extraClass}`}>
                    {slide.emojis || '📝'}
                </div>
            );

            // hero / hero-emoji-center (default)
            if (!slide.layout || slide.layout === 'hero' || slide.layout === 'hero-emoji-center') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-4">
                        {emojiBlock()}
                        {renderTextBlock()}
                    </div>
                );
            }

            // hero-emoji-top
            if (slide.layout === 'hero-emoji-top') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-4">
                        {emojiBlock()}
                        {renderTextBlock()}
                    </div>
                );
            }

            // split-text-left (text left, emoji right) — legacy
            if (slide.layout === 'split-text-left') {
                return (
                    <div className="w-full h-full flex flex-col md:grid md:grid-cols-5 items-center gap-6 px-8 md:px-16">
                        <div className="md:col-span-3 flex items-center justify-center">{renderTextBlock()}</div>
                        <div className="md:col-span-2 flex items-center justify-center">{emojiBlock()}</div>
                    </div>
                );
            }

            // split-text-right (emoji left, text right) — legacy
            if (slide.layout === 'split-text-right') {
                return (
                    <div className="w-full h-full flex flex-col md:grid md:grid-cols-5 items-center gap-6 px-8 md:px-16">
                        <div className="md:col-span-2 flex items-center justify-center">{emojiBlock()}</div>
                        <div className="md:col-span-3 flex items-center justify-center">{renderTextBlock()}</div>
                    </div>
                );
            }

            // Absolute fallback
            return (
                <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-4">
                    {emojiBlock()}
                    {renderTextBlock()}
                </div>
            );
        };

        // ============================================================
        // INTERACTIVE SLIDE COMPONENTS (quiz types)
        // ============================================================
        const MultipleChoiceSlide = ({ slide, onComplete }) => {
            const [qIndex, setQIndex] = useState(0);
            const [errorIdx, setErrorIdx] = useState(null);
            
            const questions = slide.questions || slide.data?.questions || [slide]; 
            const q = questions[qIndex];

            if (!q || !q.options) return <div className="text-center text-white">Error loading question data</div>;

            const handleAnswer = (idx) => {
                if (idx === q.correctIndex || idx === q.correct) {
                    triggerConfetti();
                    if (qIndex < questions.length - 1) setTimeout(() => setQIndex(qIndex + 1), 1000);
                    else setTimeout(onComplete, 1000);
                } else {
                    setErrorIdx(idx);
                    setTimeout(() => setErrorIdx(null), 500);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto">
                    <div className="bg-zinc-900 rounded-3xl p-8 md:p-12 w-full shadow-2xl border border-zinc-800 animate-popIn">
                        <h3 className="text-sm font-bold text-zinc-400 mb-2 uppercase tracking-wider text-center">Quiz Time!</h3>
                        <h2 className="text-3xl md:text-5xl font-black mb-10 text-center">{q.question}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                            {q.options.map((opt, idx) => (
                                <button key={idx} onClick={() => handleAnswer(idx)}
                                    className={`touch-safe text-2xl font-bold py-6 px-4 rounded-2xl transition-all border-2 
                                        ${errorIdx === idx ? 'border-red-500 bg-red-500/20 animate-shake text-red-100' : 'border-zinc-700 bg-zinc-800 hover:border-brand hover-bg text-white'}`}>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const FillBlankSlide = ({ slide, onComplete }) => {
             return <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto animate-popIn"><h2 className="text-4xl font-black text-white">Fill in the Blanks (WIP)</h2><button onClick={onComplete} className="mt-8 bg-brand text-white px-6 py-3 rounded-xl font-bold touch-safe">Skip for now</button></div>
        }
        const SentenceScrambleSlide = ({ slide, onComplete }) => {
            return <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto animate-popIn"><h2 className="text-4xl font-black text-white">Sentence Scramble (WIP)</h2><button onClick={onComplete} className="mt-8 bg-brand text-white px-6 py-3 rounded-xl font-bold touch-safe">Skip for now</button></div>
        }

        // ============================================================
        // MAIN APP
        // ============================================================
        const App = () => {
            const [presentation, setPresentation] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(true);
            const [isPresenting, setIsPresenting] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);

            // --- NAV ARROWS AUTO-HIDE ---
            const [arrowsVisible, setArrowsVisible] = useState(true);
            const hideTimer = useRef(null);

            const showArrows = useCallback(() => {
                setArrowsVisible(true);
                clearTimeout(hideTimer.current);
                hideTimer.current = setTimeout(() => setArrowsVisible(false), 2000);
            }, []);

            // On slide change or entering presentation, flash arrows then hide
            useEffect(() => {
                showArrows();
                return () => clearTimeout(hideTimer.current);
            }, [currentIdx, isPresenting, showArrows]);

            // Listen for touch/mouse to re-show arrows
            useEffect(() => {
                const handler = () => showArrows();
                document.addEventListener('touchstart', handler, { passive: true });
                document.addEventListener('mousemove', handler, { passive: true });
                return () => {
                    document.removeEventListener('touchstart', handler);
                    document.removeEventListener('mousemove', handler);
                };
            }, [showArrows]);

            useEffect(() => {
                const initAndFetch = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    
                    if (!id) {
                        setErrorMsg("No ID provided in URL.");
                        setLoading(false);
                        return;
                    }

                    try {
                        await signInAnonymously(auth);
                        const docRef = doc(db, QUIZZES_PATH, id);
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            setPresentation(docSnap.data());
                        } else {
                            setErrorMsg("Presentation not found.");
                        }
                    } catch (error) {
                        console.error("Error fetching presentation:", error);
                        setErrorMsg(error.message);
                    } finally {
                        setLoading(false);
                    }
                };

                initAndFetch();
            }, []);

            if (loading) return <div className="h-[100dvh] flex items-center justify-center"><div className="animate-spin h-12 w-12 border-t-4 border-brand rounded-full"></div></div>;
            if (errorMsg) return <div className="h-[100dvh] flex items-center justify-center text-red-500 font-bold text-xl">{errorMsg}</div>;
            if (!presentation || !presentation.content) return <div className="h-[100dvh] flex items-center justify-center text-white">Invalid presentation data.</div>;

            const slides = presentation.content.slides || presentation.content;
            
            const allSlides = [...slides];
            if (presentation.miniGame && presentation.miniGame.type !== 'none') {
                allSlides.push({
                    id: "minigame-final",
                    type: presentation.miniGame.type,
                    ...presentation.miniGame.data
                });
            }

            const currentSlide = allSlides[currentIdx];
            if (!currentSlide) return null;

            const nextSlide = () => { if (currentIdx < allSlides.length - 1) setCurrentIdx(currentIdx + 1); };
            const prevSlide = () => { if (currentIdx > 0) setCurrentIdx(currentIdx - 1); };

            const renderSlide = () => {
                // If it has a layout field OR type is theory, render as TheorySlide
                if (currentSlide.layout || currentSlide.type === 'theory' || (!currentSlide.type)) {
                    return <TheorySlide slide={currentSlide} key={currentSlide.id || currentIdx} />;
                }
                
                switch(currentSlide.type) {
                    case 'multipleChoice': return <MultipleChoiceSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                    case 'fillBlank': return <FillBlankSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                    case 'sentenceScramble': return <SentenceScrambleSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                    default: return <div className="p-8 text-center text-xl text-white">Unknown slide type: {currentSlide.type}</div>;
                }
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col bg-zinc-950 text-white overflow-hidden font-sans">
                    
                    {/* 1. TOP BANNER */}
                    {!isPresenting && (
                        <header className="h-16 md:h-20 shrink-0 border-b border-zinc-800 bg-zinc-900 flex items-center justify-between px-4 md:px-8 z-20">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 hover:text-white transition-colors touch-safe" title="Back to Hub">
                                    <ArrowLeft size={24} />
                                </button>
                                <h1 className="text-lg md:text-2xl font-black truncate max-w-[200px] md:max-w-md">{presentation.title || "Presentación"}</h1>
                            </div>
                            <button 
                                onClick={() => setIsPresenting(true)}
                                className="bg-brand hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition-transform hover-scale shadow-lg shadow-brand/20 touch-safe">
                                <Play size={18} fill="currentColor" />
                                <span className="hidden md:inline">Presentar</span>
                            </button>
                        </header>
                    )}

                    {/* 2. MAIN STAGE */}
                    <main className={`flex-1 relative transition-all duration-500 flex flex-col ${isPresenting ? 'h-[100dvh] bg-black z-50' : 'bg-zinc-950'}`}>
                        
                        {isPresenting && (
                            <button onClick={() => setIsPresenting(false)} className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white z-50 backdrop-blur-md transition-colors touch-safe">
                                <X size={24} />
                            </button>
                        )}

                        <div className="flex-1 w-full h-full relative z-0">
                            {renderSlide()}
                        </div>

                        {/* NAV ARROWS — auto-hide after 2s */}
                        <div className={`nav-arrows ${arrowsVisible ? 'visible-arrows' : 'hidden-arrows'} absolute top-1/2 -translate-y-1/2 w-full flex justify-between px-4 md:px-8 z-10`}>
                            <button onClick={prevSlide} disabled={currentIdx === 0}
                                className={`pointer-events-auto touch-safe p-3 md:p-5 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === 0 ? 'opacity-0' : 'bg-white/10 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronLeft size={32} />
                            </button>
                            <button onClick={nextSlide} disabled={currentIdx === allSlides.length - 1}
                                className={`pointer-events-auto touch-safe p-3 md:p-5 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === allSlides.length - 1 ? 'opacity-0' : 'bg-white/10 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronRight size={32} />
                            </button>
                        </div>

                        {isPresenting && (
                            <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/10">
                                <div className="h-full bg-brand transition-all duration-300" style={{width: `${((currentIdx + 1) / allSlides.length) * 100}%`}}></div>
                            </div>
                        )}
                    </main>

                    {/* 3. BOTTOM STRIP */}
                    {!isPresenting && (
                        <footer className="h-36 md:h-48 shrink-0 border-t border-zinc-800 bg-zinc-900 flex items-center px-4 md:px-8 overflow-x-auto gap-4 custom-scrollbar z-20">
                            {allSlides.map((slide, idx) => (
                                <button 
                                    key={slide.id || idx} 
                                    onClick={() => setCurrentIdx(idx)}
                                    className={`shrink-0 h-24 w-36 md:h-32 md:w-48 rounded-xl border-2 flex flex-col items-center justify-center p-2 relative overflow-hidden transition-all hover-scale touch-safe
                                        ${idx === currentIdx ? 'border-brand ring-4 ring-brand/20 bg-zinc-800' : 'border-zinc-700 bg-zinc-950 hover:border-zinc-500'}`}
                                >
                                    <span className="text-xs font-bold text-zinc-500 absolute top-2 left-3">{idx + 1}</span>
                                    {(slide.type === 'theory' || !slide.type) ? (
                                        <span className="text-3xl md:text-5xl mt-2">{(slide.emojis || "📝").split(' ')[0]}</span>
                                    ) : (
                                        <LayoutTemplate size={32} className="text-zinc-600 mt-2" />
                                    )}
                                    <p className="text-[10px] md:text-xs text-zinc-400 font-bold mt-2 truncate w-full px-2">
                                        {(slide.type === 'theory' || !slide.type) ? (slide.heading || slide.text || slide.centerLabel || '') : `${slide.type} Quiz`}
                                    </p>
                                </button>
                            ))}
                        </footer>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

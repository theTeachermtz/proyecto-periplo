<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Presentations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#09090b', brand: '#3b82f6' },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.4s ease-in-out',
                        popIn: 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        fadeIn: 'fadeIn 0.4s ease forwards'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: white; overflow: hidden; }
        .touch-safe { touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.05); }
            .hover-bg:hover { background-color: rgba(255, 255, 255, 0.1); }
        }
        .nav-arrows { transition: opacity 0.4s ease; }
        .nav-arrows.hidden-arrows { opacity: 0; pointer-events: none; }
        .nav-arrows.visible-arrows { opacity: 1; pointer-events: auto; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.6.0",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import confetti from 'canvas-confetti';
        import { ChevronLeft, ChevronRight, Play, X, ArrowLeft, LayoutTemplate } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const QUIZZES_PATH = 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes';

        const triggerConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
        };

        // ============================================================
        // THEME SYSTEM
        // ============================================================
        const FALLBACK_THEME = { bg: '#09090b', text: 'white', accent: '#3b82f6', subtle: 'rgba(255,255,255,0.08)' };

        const resolveTheme = (docThemeObj) => {
            if (docThemeObj && typeof docThemeObj === 'object') {
                return {
                    bg: docThemeObj.preview || FALLBACK_THEME.bg,
                    text: 'white',
                    accent: docThemeObj.accent || FALLBACK_THEME.accent,
                    subtle: 'rgba(255,255,255,0.08)' 
                };
            }
            return FALLBACK_THEME;
        };

        const getSlideBackground = (slide, docThemeObj) => {
            if (slide.bgColor) return slide.bgColor;
            if (slide.background) return slide.background;
            return resolveTheme(docThemeObj).bg;
        };

        const makeWrapStyle = (slide, docThemeObj) => {
            const bg = getSlideBackground(slide, docThemeObj);
            if (typeof bg === 'string' && (bg.includes('gradient') || bg.includes('linear') || bg.includes('radial'))) {
                return { background: bg };
            }
            return { backgroundColor: bg };
        };

        // ============================================================
        // MINI-MARKDOWN PARSER
        // ============================================================
        const parseMiniMarkdown = (text) => {
            if (!text) return null;
            const strText = String(text);
            const parts = [];
            const regex = /(\*\*(.+?)\*\*|__(.+?)__|(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*))/g;
            let lastIndex = 0;
            let match;
            while ((match = regex.exec(strText)) !== null) {
                if (match.index > lastIndex) parts.push(strText.slice(lastIndex, match.index));
                if (match[2]) parts.push(<strong key={match.index} className="font-black">{match[2]}</strong>);
                else if (match[3]) parts.push(<span key={match.index} className="underline decoration-2 underline-offset-4">{match[3]}</span>);
                else if (match[4]) parts.push(<em key={match.index} className="italic opacity-80">{match[4]}</em>);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < strText.length) parts.push(strText.slice(lastIndex));
            return parts.length > 0 ? parts : strText;
        };

        const parseTextWithLists = (text) => {
            if (!text) return { type: 'plain', text: '' };
            const strText = String(text);
            const listPattern = /(?:^|\n)\s*\d+\.\s+/g;
            const matches = strText.match(listPattern);
            if (matches && matches.length >= 2) {
                const items = strText.split(/(?:^|\n)\s*\d+\.\s+/).filter(s => s.trim());
                const firstNumIdx = strText.search(/\d+\.\s+/);
                const heading = firstNumIdx > 0 ? strText.slice(0, firstNumIdx).trim() : null;
                return { type: 'numbered-list', heading, items };
            }
            return { type: 'plain', text: strText };
        };

        // ============================================================
        // THEORY SLIDE
        // ============================================================
        const TheorySlide = ({ slide, theme }) => {
            const t = resolveTheme(theme);
            const wrapStyle = makeWrapStyle(slide, theme);
            const getText = () => slide.text || slide.heading || slide.centerLabel || slide.quote || '';
            
            // BLINDAJE DE EMOJIS: Asegurarnos que siempre sea un string
            const safeEmojis = Array.isArray(slide.emojis) ? slide.emojis.join(' ') : String(slide.emojis || '📝');

            if (slide.layout === 'cover') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 animate-popIn" style={wrapStyle}>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-black leading-tight mb-4 max-w-3xl">
                            {parseMiniMarkdown(slide.heading || slide.text || '')}
                        </h1>
                        {slide.subtitle && <p className="text-lg md:text-2xl opacity-60 font-medium max-w-2xl">{parseMiniMarkdown(slide.subtitle)}</p>}
                        {slide.branding && <p className="text-sm opacity-40 mt-6 font-bold uppercase tracking-widest">{slide.branding}</p>}
                    </div>
                );
            }

            if (slide.layout === 'title-bullets') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 md:px-16 animate-popIn" style={wrapStyle}>
                        <div className="max-w-3xl w-full text-center">
                            <h2 className="text-3xl md:text-5xl font-black mb-8 leading-tight">{parseMiniMarkdown(slide.heading || '')}</h2>
                            {slide.bullets && (
                                <ul className="space-y-3 text-left mx-auto max-w-2xl">
                                    {slide.bullets.map((b, i) => (
                                        <li key={i} className="flex items-start gap-3 animate-fadeIn" style={{ animationDelay: `${i * 0.1}s`, opacity: 0 }}>
                                            <span className="font-black text-lg mt-0.5 shrink-0" style={{ color: t.accent }}>{i + 1}.</span>
                                            <span className="text-xl md:text-2xl font-semibold leading-snug opacity-90">{parseMiniMarkdown(b)}</span>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'two-columns') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 md:px-16 animate-popIn" style={wrapStyle}>
                        <h2 className="text-3xl md:text-5xl font-black mb-10 text-center max-w-3xl">{parseMiniMarkdown(slide.heading || '')}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
                            {[slide.leftColumn, slide.rightColumn].map((col, ci) => col && (
                                <div key={ci} className="rounded-2xl p-6 border" style={{ backgroundColor: t.subtle, borderColor: t.subtle }}>
                                    <h3 className="text-lg font-black mb-4 uppercase tracking-wider" style={{ color: t.accent }}>{col.title}</h3>
                                    <ul className="space-y-2">
                                        {col.items?.map((item, i) => (
                                            <li key={i} className="font-medium text-base flex items-start gap-2 opacity-90">
                                                <span style={{ color: t.accent }} className="mt-1">•</span>
                                                <span>{parseMiniMarkdown(item)}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'table-notes') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-6 md:px-16 animate-popIn overflow-y-auto" style={wrapStyle}>
                        <div className="max-w-4xl w-full">
                            <h2 className="text-3xl md:text-4xl font-black mb-8 text-center">{parseMiniMarkdown(slide.heading || '')}</h2>
                            {slide.table && (
                                <div className="overflow-x-auto rounded-2xl border mb-6" style={{ borderColor: t.subtle }}>
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr style={{ backgroundColor: t.subtle }}>
                                                {slide.table.headers?.map((h, i) => <th key={i} className="px-5 py-3 text-sm font-black uppercase tracking-wider" style={{ color: t.accent }}>{h}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {slide.table.rows?.map((row, ri) => (
                                                <tr key={ri} style={ri % 2 === 0 ? { backgroundColor: t.subtle } : {}}>
                                                    {(Array.isArray(row) ? row : Object.values(row)).map((cell, ci) => (
                                                        <td key={ci} className="px-5 py-3 font-medium text-sm opacity-90">{parseMiniMarkdown(String(cell || ''))}</td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            {slide.notes && slide.notes.map((n, i) => <p key={i} className="text-sm font-medium opacity-60">💡 {parseMiniMarkdown(n)}</p>)}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'mind-map') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 animate-popIn" style={wrapStyle}>
                        <div className="rounded-full px-8 py-4 mb-10 border-2" style={{ borderColor: t.accent, backgroundColor: t.subtle }}>
                            <h2 className="text-2xl md:text-4xl font-black text-center">{slide.centerLabel || ''}</h2>
                        </div>
                        <div className="flex flex-wrap justify-center gap-4 max-w-4xl">
                            {slide.branches?.map((b, i) => (
                                <div key={i} className="rounded-2xl px-5 py-3 border-2 animate-fadeIn flex flex-col items-center" style={{ borderColor: b.color || t.accent, animationDelay: `${i * 0.08}s`, opacity: 0 }}>
                                    <span className="text-lg font-black">{b.term}</span>
                                    {b.translation && <span className="text-sm opacity-60">{b.translation}</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'quote') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 text-center animate-popIn" style={wrapStyle}>
                        <div className="max-w-3xl">
                            <span className="text-6xl font-black leading-none" style={{ color: t.accent, opacity: 0.4 }}>"</span>
                            <p className="text-2xl md:text-4xl font-bold leading-snug -mt-6">{parseMiniMarkdown(slide.quote || slide.text || '')}</p>
                            {slide.attribution && <p className="opacity-50 font-bold mt-6 text-lg">— {slide.attribution}</p>}
                        </div>
                    </div>
                );
            }

            // ACEPTAMOS AMBOS NOMBRES PARA LEFT
            if (slide.layout === 'split-text-image-left' || slide.layout === 'split-text-left') {
                const textSide = (
                    <div className="flex flex-col justify-center">
                        {slide.heading && <h2 className="text-2xl md:text-3xl font-black mb-3 leading-tight">{parseMiniMarkdown(slide.heading)}</h2>}
                        {slide.text && <p className="text-lg md:text-xl font-medium mb-3 leading-relaxed opacity-85">{parseMiniMarkdown(slide.text)}</p>}
                        {slide.bullets && (
                            <ul className="space-y-2 mt-2">
                                {slide.bullets.map((b, i) => (
                                    <li key={i} className="font-medium text-base flex items-start gap-2 opacity-90">
                                        <span style={{ color: t.accent }} className="mt-1 shrink-0">•</span>
                                        <span>{parseMiniMarkdown(b)}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                );
                const emojiSide = <div className="flex items-center justify-center"><span className="text-6xl md:text-8xl animate-popIn">{safeEmojis}</span></div>;
                return (
                    <div className="w-full h-full flex items-center justify-center px-8 md:px-12" style={wrapStyle}>
                        <div className="max-w-4xl w-full grid grid-cols-1 md:grid-cols-3 items-center gap-8 animate-popIn">
                            <div className="md:col-span-2">{textSide}</div><div className="md:col-span-1 flex justify-center">{emojiSide}</div>
                        </div>
                    </div>
                );
            }

            // ACEPTAMOS AMBOS NOMBRES PARA RIGHT
            if (slide.layout === 'split-text-image-right' || slide.layout === 'split-text-right') {
                const textSide = (
                    <div className="flex flex-col justify-center">
                        {slide.heading && <h2 className="text-2xl md:text-3xl font-black mb-3 leading-tight">{parseMiniMarkdown(slide.heading)}</h2>}
                        {slide.text && <p className="text-lg md:text-xl font-medium mb-3 leading-relaxed opacity-85">{parseMiniMarkdown(slide.text)}</p>}
                        {slide.bullets && (
                            <ul className="space-y-2 mt-2">
                                {slide.bullets.map((b, i) => (
                                    <li key={i} className="font-medium text-base flex items-start gap-2 opacity-90">
                                        <span style={{ color: t.accent }} className="mt-1 shrink-0">•</span>
                                        <span>{parseMiniMarkdown(b)}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                );
                const emojiSide = <div className="flex items-center justify-center"><span className="text-6xl md:text-8xl animate-popIn">{safeEmojis}</span></div>;
                return (
                    <div className="w-full h-full flex items-center justify-center px-8 md:px-12" style={wrapStyle}>
                        <div className="max-w-4xl w-full grid grid-cols-1 md:grid-cols-3 items-center gap-8 animate-popIn">
                            <div className="md:col-span-1 flex justify-center">{emojiSide}</div><div className="md:col-span-2">{textSide}</div>
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'horizontal-emoji-band') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 gap-6 animate-popIn" style={wrapStyle}>
                        <h2 className="text-3xl md:text-5xl font-black text-center leading-tight max-w-3xl">{parseMiniMarkdown(slide.text || '')}</h2>
                        <div className="flex gap-6 text-5xl md:text-7xl mt-2">
                            {safeEmojis.split(' ').filter(Boolean).map((e, i) => <span key={i} className="animate-popIn" style={{ animationDelay: `${i * 0.1}s` }}>{e}</span>)}
                        </div>
                    </div>
                );
            }

            const textContent = getText();
            const parsed = parseTextWithLists(textContent);

            const renderTextBlock = () => {
                if (parsed.type === 'numbered-list') {
                    return (
                        <div className="max-w-3xl w-full animate-popIn text-center" style={{ animationDelay: '0.1s' }}>
                            {parsed.heading && <h2 className="text-2xl md:text-4xl lg:text-5xl font-black leading-tight mb-6 drop-shadow-lg">{parseMiniMarkdown(parsed.heading)}</h2>}
                            <ol className="space-y-3 text-left mx-auto max-w-2xl">
                                {parsed.items.map((item, i) => (
                                    <li key={i} className="flex items-start gap-3 animate-fadeIn" style={{ animationDelay: `${(i + 1) * 0.12}s`, opacity: 0 }}>
                                        <span className="font-black text-xl mt-0.5 shrink-0" style={{ color: t.accent }}>{i + 1}.</span>
                                        <span className="text-xl md:text-2xl font-semibold leading-snug opacity-90">{parseMiniMarkdown(item.trim())}</span>
                                    </li>
                                ))}
                            </ol>
                        </div>
                    );
                }
                return <h2 className="text-3xl md:text-5xl lg:text-6xl font-black leading-tight animate-popIn drop-shadow-lg max-w-3xl text-center" style={{ animationDelay: '0.1s' }}>{parseMiniMarkdown(textContent)}</h2>;
            };

            const emojiBlock = (size = 'text-5xl md:text-7xl') => <div className={`${size} animate-popIn`}>{safeEmojis}</div>;

            if (!slide.layout || slide.layout === 'hero' || slide.layout === 'hero-emoji-center' || slide.layout === 'hero-emoji-top') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-5" style={wrapStyle}>
                        {emojiBlock()}
                        {renderTextBlock()}
                        {slide.subtext && <p className="text-lg md:text-xl opacity-50 max-w-2xl font-medium mt-2">{parseMiniMarkdown(slide.subtext)}</p>}
                    </div>
                );
            }

            return (
                <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-5" style={wrapStyle}>
                    {emojiBlock()}
                    {renderTextBlock()}
                </div>
            );
        };

        // ============================================================
        // INTERACTIVE SLIDES (MINIGAMES)
        // ============================================================
        const MultipleChoiceSlide = ({ slide, onComplete }) => {
            const questions = slide.questions || slide.data?.questions || [slide]; 
            const [qIndex, setQIndex] = useState(slide.savedQIndex || 0);
            const [isFinished, setIsFinished] = useState(slide.isFinished || false);
            const [errorIdx, setErrorIdx] = useState(null);
            const [successIdx, setSuccessIdx] = useState(null);
            const [isTransitioning, setIsTransitioning] = useState(false);
            
            const q = questions[qIndex];

            if (isFinished) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-popIn">
                        <span className="text-6xl md:text-8xl mb-6">🎉</span>
                        <h2 className="text-3xl md:text-5xl font-black text-white mb-4">¡Quiz Completado!</h2>
                        <p className="text-zinc-400 text-lg md:text-xl">Ya respondiste estas preguntas.</p>
                    </div>
                );
            }

            if (!q || !q.options) return <div className="text-center text-white p-8">Error loading question data</div>;

            const handleAnswer = (idx) => {
                if (isTransitioning) return;

                if (idx === q.correctIndex || idx === q.correct) {
                    setSuccessIdx(idx);
                    setIsTransitioning(true);
                    triggerConfetti();
                    
                    setTimeout(() => {
                        if (qIndex < questions.length - 1) {
                            const nextIdx = qIndex + 1;
                            setQIndex(nextIdx);
                            slide.savedQIndex = nextIdx;
                            setSuccessIdx(null);
                            setErrorIdx(null);
                            setIsTransitioning(false);
                        } else {
                            setIsFinished(true);
                            slide.isFinished = true;
                            onComplete();
                        }
                    }, 1000);
                } else {
                    setErrorIdx(idx);
                    setTimeout(() => setErrorIdx(null), 500);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 md:p-8 w-full max-w-4xl mx-auto">
                    <div className="mb-8 text-center animate-fadeIn flex flex-col items-center">
                        <h3 className="text-xl md:text-2xl font-bold text-zinc-400 mb-3 uppercase tracking-widest">Quiz Time!</h3>
                        <p className="text-base md:text-lg text-zinc-200 font-medium bg-zinc-800/80 inline-block px-6 py-2 rounded-full border border-zinc-700 shadow-lg">
                            {q.instruction || slide.instruction || "Choose the correct option"}
                        </p>
                    </div>

                    <div className="bg-zinc-900 rounded-3xl p-8 md:p-12 w-full shadow-2xl border border-zinc-800 animate-popIn">
                        <h2 className="text-2xl md:text-4xl lg:text-5xl font-black mb-8 text-center text-white leading-tight">
                            {q.question}
                        </h2>
                        
                        <div className="flex flex-col items-center gap-3 md:gap-4 w-full max-w-lg mx-auto">
                            {q.options.map((opt, idx) => {
                                let buttonClasses = 'border-zinc-700 bg-zinc-800 hover:border-brand hover:bg-zinc-800/80 text-white';
                                if (errorIdx === idx) buttonClasses = 'border-red-500 bg-red-500/20 animate-shake text-red-100';
                                else if (successIdx === idx) buttonClasses = 'border-green-500 bg-green-500/20 text-green-100 scale-[1.02] shadow-lg shadow-green-500/20';

                                return (
                                    <button 
                                        key={idx} 
                                        onClick={() => handleAnswer(idx)}
                                        disabled={isTransitioning}
                                        className={`touch-safe w-full text-lg md:text-xl font-bold py-4 px-6 rounded-2xl transition-all duration-200 border-2 flex items-center justify-center text-center min-h-[64px] disabled:opacity-90 disabled:cursor-default ${buttonClasses}`}
                                    >
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const FillBlankSlide = ({ slide, onComplete }) => {
            const [isFinished, setIsFinished] = useState(slide.isFinished || false);
            
            const { segments, blanks } = React.useMemo(() => {
                const text = slide.text || '';
                const regex = /\[(.*?)\]/g;
                const segments = [];
                const blanks = [];
                let lastIdx = 0;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    segments.push(text.slice(lastIdx, match.index));
                    blanks.push(match[1]);
                    lastIdx = regex.lastIndex;
                }
                segments.push(text.slice(lastIdx));
                return { segments, blanks };
            }, [slide.text]);

            const [userAnswers, setUserAnswers] = useState(slide.savedUserAnswers || Array(blanks.length).fill(null));
            const [availableWords, setAvailableWords] = useState(() => {
                if (slide.savedAvailable) return slide.savedAvailable;
                const words = [...(slide.wordBank || blanks)];
                return words.sort(() => Math.random() - 0.5);
            });

            if (isFinished) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-popIn">
                        <span className="text-6xl md:text-8xl mb-6">🎉</span>
                        <h2 className="text-3xl md:text-5xl font-black text-white mb-4">¡Texto Completado!</h2>
                    </div>
                );
            }

            const handleWordClick = (word, index) => {
                const firstEmpty = userAnswers.findIndex(a => a === null);
                if (firstEmpty !== -1) {
                    const newAnswers = [...userAnswers];
                    newAnswers[firstEmpty] = word;
                    setUserAnswers(newAnswers);
                    slide.savedUserAnswers = newAnswers;

                    const newAvailable = [...availableWords];
                    newAvailable.splice(index, 1);
                    setAvailableWords(newAvailable);
                    slide.savedAvailable = newAvailable;
                }
            };

            const handleRemoveAnswer = (word, index) => {
                const newAnswers = [...userAnswers];
                newAnswers[index] = null;
                setUserAnswers(newAnswers);
                slide.savedUserAnswers = newAnswers;

                const newAvailable = [...availableWords, word];
                setAvailableWords(newAvailable);
                slide.savedAvailable = newAvailable;
            };

            const checkAnswers = () => {
                if (userAnswers.join(',') === blanks.join(',')) {
                    triggerConfetti();
                    slide.isFinished = true;
                    setTimeout(() => {
                        setIsFinished(true);
                        onComplete();
                    }, 1500);
                } else {
                    const container = document.getElementById('fb-container');
                    container.classList.add('animate-shake');
                    setTimeout(() => container.classList.remove('animate-shake'), 500);
                }
            };

            const isFull = !userAnswers.includes(null);

            return (
                <div id="fb-container" className="flex flex-col items-center justify-center h-full p-6 w-full max-w-4xl mx-auto">
                    <div className="bg-zinc-900 rounded-3xl p-8 md:p-12 w-full shadow-2xl border border-zinc-800 animate-popIn">
                        <h3 className="text-xl font-bold text-zinc-400 mb-8 uppercase tracking-widest text-center">Fill in the Blanks</h3>
                        
                        <div className="text-2xl md:text-3xl font-medium leading-relaxed text-zinc-200 mb-10 text-center flex flex-wrap justify-center items-center gap-y-4">
                            {segments.map((seg, i) => (
                                <React.Fragment key={i}>
                                    <span>{seg}</span>
                                    {i < blanks.length && (
                                        <button 
                                            onClick={() => userAnswers[i] && handleRemoveAnswer(userAnswers[i], i)}
                                            className={`inline-block mx-2 px-4 py-1 border-b-4 rounded-lg min-w-[100px] text-center transition-colors font-bold ${userAnswers[i] ? 'bg-zinc-800 border-brand text-brand cursor-pointer hover:bg-zinc-700' : 'bg-zinc-950 border-zinc-700 text-transparent'}`}
                                        >
                                            {userAnswers[i] || '___'}
                                        </button>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>

                        <div className="flex flex-wrap justify-center gap-3 mb-8">
                            {availableWords.map((word, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => handleWordClick(word, i)}
                                    className="bg-zinc-800 hover:bg-zinc-700 border-2 border-zinc-700 text-white font-bold py-2 px-4 rounded-xl transition-all touch-safe"
                                >
                                    {word}
                                </button>
                            ))}
                        </div>

                        <div className="flex justify-center">
                            <button 
                                onClick={checkAnswers}
                                disabled={!isFull}
                                className="bg-brand hover:bg-blue-600 disabled:bg-zinc-700 disabled:opacity-50 text-white font-black py-4 px-12 rounded-2xl transition-all touch-safe"
                            >
                                VERIFICAR
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SentenceScrambleSlide = ({ slide, onComplete }) => {
            const sentences = slide.sentences || [];
            const [sIndex, setSIndex] = useState(slide.savedSIndex || 0);
            const [isFinished, setIsFinished] = useState(slide.isFinished || false);

            const currentS = sentences[sIndex];
            
            const cleanText = currentS ? currentS.text.replace(/\//g, '').replace(/\s+/g, ' ').trim() : '';

            const [userWords, setUserWords] = useState(slide.savedUserWords || []);
            const [availableWords, setAvailableWords] = useState(() => {
                if (slide.savedAvailableWords) return slide.savedAvailableWords;
                if (!currentS) return [];
                return cleanText.split(' ').sort(() => Math.random() - 0.5);
            });

            if (isFinished || !currentS) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-popIn">
                        <span className="text-6xl md:text-8xl mb-6">🎉</span>
                        <h2 className="text-3xl md:text-5xl font-black text-white mb-4">¡Frases Completadas!</h2>
                    </div>
                );
            }

            const handleAdd = (word, idx) => {
                const newU = [...userWords, word];
                const newA = [...availableWords];
                newA.splice(idx, 1);
                setUserWords(newU);
                setAvailableWords(newA);
                slide.savedUserWords = newU;
                slide.savedAvailableWords = newA;
            };

            const handleRemove = (word, idx) => {
                const newU = [...userWords];
                newU.splice(idx, 1);
                const newA = [...availableWords, word];
                setUserWords(newU);
                setAvailableWords(newA);
                slide.savedUserWords = newU;
                slide.savedAvailableWords = newA;
            };

            const checkAnswer = () => {
                if (userWords.join(' ') === cleanText) {
                    triggerConfetti();
                    setTimeout(() => {
                        if (sIndex < sentences.length - 1) {
                            const nextIdx = sIndex + 1;
                            setSIndex(nextIdx);
                            slide.savedSIndex = nextIdx;
                            
                            const nextCleanText = sentences[nextIdx].text.replace(/\//g, '').replace(/\s+/g, ' ').trim();
                            setUserWords([]);
                            setAvailableWords(nextCleanText.split(' ').sort(() => Math.random() - 0.5));
                            
                            slide.savedUserWords = null;
                            slide.savedAvailableWords = null;
                        } else {
                            setIsFinished(true);
                            slide.isFinished = true;
                            onComplete();
                        }
                    }, 1500);
                } else {
                    const container = document.getElementById('ss-container');
                    container.classList.add('animate-shake');
                    setTimeout(() => container.classList.remove('animate-shake'), 500);
                }
            };

            const isFull = availableWords.length === 0;

            return (
                <div id="ss-container" className="flex flex-col items-center justify-center h-full p-6 w-full max-w-4xl mx-auto">
                    <div className="bg-zinc-900 rounded-3xl p-8 md:p-12 w-full shadow-2xl border border-zinc-800 animate-popIn flex flex-col items-center">
                        <h3 className="text-xl font-bold text-zinc-400 mb-2 uppercase tracking-widest text-center">Sentence Scramble</h3>
                        <p className="text-base md:text-lg text-zinc-500 mb-8 text-center">Ordena las palabras para formar la frase correcta.</p>
                        
                        <div className="text-2xl md:text-4xl font-black text-emerald-400 mb-10 text-center">
                            "{currentS.translation}"
                        </div>

                        <div className="flex flex-wrap justify-center gap-3 w-full min-h-[70px] p-4 bg-zinc-950 rounded-2xl border-2 border-dashed border-zinc-700 mb-8">
                            {userWords.length === 0 && <span className="text-zinc-600 font-medium italic mt-2">Toca las palabras abajo...</span>}
                            {userWords.map((word, i) => (
                                <button key={i} onClick={() => handleRemove(word, i)}
                                    className="bg-brand text-white font-bold py-2 px-4 rounded-xl shadow-lg hover:bg-blue-600 transition-colors animate-popIn">
                                    {word}
                                </button>
                            ))}
                        </div>

                        <div className="flex flex-wrap justify-center gap-3 mb-10 min-h-[50px]">
                            {availableWords.map((word, i) => (
                                <button key={i} onClick={() => handleAdd(word, i)}
                                    className="bg-zinc-800 border-2 border-zinc-700 text-white font-bold py-2 px-4 rounded-xl hover:bg-zinc-700 transition-colors">
                                    {word}
                                </button>
                            ))}
                        </div>

                        <div className="flex justify-center">
                            <button 
                                onClick={checkAnswer}
                                disabled={!isFull}
                                className="bg-emerald-500 hover:bg-emerald-600 disabled:bg-zinc-700 disabled:opacity-50 text-white font-black py-4 px-12 rounded-2xl transition-all touch-safe shadow-lg shadow-emerald-500/20 disabled:shadow-none"
                            >
                                VERIFICAR
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // MAIN APP
        // ============================================================
        const App = () => {
            const [presentation, setPresentation] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(true);
            const [isPresenting, setIsPresenting] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);

            const [arrowsVisible, setArrowsVisible] = useState(true);
            const hideTimer = useRef(null);

            const showArrows = useCallback(() => {
                setArrowsVisible(true);
                clearTimeout(hideTimer.current);
                hideTimer.current = setTimeout(() => setArrowsVisible(false), 2000);
            }, []);

            useEffect(() => {
                showArrows();
                return () => clearTimeout(hideTimer.current);
            }, [currentIdx, isPresenting, showArrows]);

            useEffect(() => {
                const handler = () => showArrows();
                document.addEventListener('touchstart', handler, { passive: true });
                document.addEventListener('mousemove', handler, { passive: true });
                return () => {
                    document.removeEventListener('touchstart', handler);
                    document.removeEventListener('mousemove', handler);
                };
            }, [showArrows]);

            useEffect(() => {
                const initAndFetch = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    
                    if (!id) { setErrorMsg("No ID provided in URL."); setLoading(false); return; }

                    try {
                        await signInAnonymously(auth);
                        const docSnap = await getDoc(doc(db, QUIZZES_PATH, id));
                        
                        if (docSnap.exists()) {
                            setPresentation(docSnap.data());
                        } else {
                            setErrorMsg("Presentation not found.");
                        }
                    } catch (error) {
                        console.error("Error fetching presentation:", error);
                        setErrorMsg(error.message);
                    } finally {
                        setLoading(false);
                    }
                };
                initAndFetch();
            }, []);

            if (loading) return <div className="h-[100dvh] flex items-center justify-center"><div className="animate-spin h-12 w-12 border-t-4 border-brand rounded-full"></div></div>;
            if (errorMsg) return <div className="h-[100dvh] flex items-center justify-center text-red-500 font-bold text-xl p-8 text-center">{errorMsg}</div>;
            if (!presentation || !presentation.content) return <div className="h-[100dvh] flex items-center justify-center text-white">Invalid presentation data.</div>;

            const docTheme = presentation.theme; 
            const stageBg = resolveTheme(docTheme).bg;
            const slides = presentation.content.slides || presentation.content;
            
            const allSlides = [...slides];
            if (presentation.miniGame && presentation.miniGame.type !== 'none') {
                allSlides.push({ id: "minigame-final", type: presentation.miniGame.type, ...presentation.miniGame.data });
            }

            const currentSlide = allSlides[currentIdx];
            if (!currentSlide) return null;

            const nextSlide = () => { if (currentIdx < allSlides.length - 1) setCurrentIdx(currentIdx + 1); };
            const prevSlide = () => { if (currentIdx > 0) setCurrentIdx(currentIdx - 1); };

            const renderSlide = () => {
                const quizTypes = ['multipleChoice', 'fillBlank', 'sentenceScramble'];
                if (quizTypes.includes(currentSlide.type)) {
                    switch(currentSlide.type) {
                        case 'multipleChoice': return <MultipleChoiceSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                        case 'fillBlank': return <FillBlankSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                        case 'sentenceScramble': return <SentenceScrambleSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                    }
                }
                if (currentSlide.layout || currentSlide.type === 'theory' || !currentSlide.type) {
                    return <TheorySlide slide={currentSlide} theme={docTheme} key={currentSlide.id || currentIdx} />;
                }
                return <div className="p-8 text-center text-xl text-white">Unknown slide type: {currentSlide.type}</div>;
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col text-white overflow-hidden font-sans" style={{ backgroundColor: stageBg }}>
                    
                    {!isPresenting && (
                        <header className="h-16 md:h-20 shrink-0 border-b border-white/10 flex items-center justify-between px-4 md:px-8 z-20" style={{ backgroundColor: 'rgba(0,0,0,0.3)' }}>
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 hover:bg-white/10 rounded-full opacity-60 hover:opacity-100 transition-all touch-safe">
                                    <ArrowLeft size={24} />
                                </button>
                                <h1 className="text-lg md:text-2xl font-black truncate max-w-[200px] md:max-w-md">{presentation.title || "Presentación"}</h1>
                            </div>
                            <button onClick={() => setIsPresenting(true)}
                                className="bg-brand hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition-transform hover-scale shadow-lg shadow-brand/20 touch-safe">
                                <Play size={18} fill="currentColor" />
                                <span className="hidden md:inline">Presentar</span>
                            </button>
                        </header>
                    )}

                    <main className={`flex-1 relative transition-all duration-500 flex flex-col ${isPresenting ? 'h-[100dvh] z-50' : ''}`}>
                        
                        {isPresenting && (
                            <button onClick={() => setIsPresenting(false)} className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white z-50 backdrop-blur-md transition-colors touch-safe">
                                <X size={24} />
                            </button>
                        )}

                        <div className="flex-1 w-full h-full relative z-0">
                            {renderSlide()}
                        </div>

                        <div className={`nav-arrows ${arrowsVisible ? 'visible-arrows' : 'hidden-arrows'} absolute top-1/2 -translate-y-1/2 w-full flex justify-between px-4 md:px-8 z-10`}>
                            <button onClick={prevSlide} disabled={currentIdx === 0}
                                className={`pointer-events-auto touch-safe p-3 md:p-5 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === 0 ? 'opacity-0' : 'bg-white/10 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronLeft size={32} />
                            </button>
                            <button onClick={nextSlide} disabled={currentIdx === allSlides.length - 1}
                                className={`pointer-events-auto touch-safe p-3 md:p-5 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === allSlides.length - 1 ? 'opacity-0' : 'bg-white/10 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronRight size={32} />
                            </button>
                        </div>

                        {isPresenting && (
                            <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/10">
                                <div className="h-full bg-brand transition-all duration-300" style={{width: `${((currentIdx + 1) / allSlides.length) * 100}%`}}></div>
                            </div>
                        )}
                    </main>

                    {!isPresenting && (
                        <footer className="h-36 md:h-48 shrink-0 border-t border-white/10 relative z-20" style={{ backgroundColor: 'rgba(0,0,0,0.4)' }}>
                            <button onClick={() => { const el = document.getElementById('slide-strip'); if (el) el.scrollBy({ left: -200, behavior: 'smooth' }); }}
                                className="absolute left-0 top-0 h-full w-10 md:w-14 z-30 flex items-center justify-center bg-gradient-to-r from-black/60 to-transparent text-white/60 hover:text-white transition-opacity touch-safe">
                                <ChevronLeft size={24} />
                            </button>
                            <button onClick={() => { const el = document.getElementById('slide-strip'); if (el) el.scrollBy({ left: 200, behavior: 'smooth' }); }}
                                className="absolute right-0 top-0 h-full w-10 md:w-14 z-30 flex items-center justify-center bg-gradient-to-l from-black/60 to-transparent text-white/60 hover:text-white transition-opacity touch-safe">
                                <ChevronRight size={24} />
                            </button>
                            <div id="slide-strip" className="h-full flex items-center px-12 md:px-16 overflow-x-auto gap-4 custom-scrollbar">
                                {allSlides.map((slide, idx) => (
                                    <button 
                                        key={slide.id || idx} 
                                        onClick={() => setCurrentIdx(idx)}
                                        className={`shrink-0 h-24 w-36 md:h-32 md:w-48 rounded-xl border-2 flex flex-col items-center justify-center p-2 relative overflow-hidden transition-all hover-scale touch-safe
                                            ${idx === currentIdx ? 'border-brand ring-4 ring-brand/20 bg-white/10' : 'border-white/10 bg-black/30 hover:border-white/30'}`}
                                    >
                                        <span className="text-xs font-bold opacity-40 absolute top-2 left-3">{idx + 1}</span>
                                        {(slide.type === 'theory' || !slide.type) ? (
                                            <span className="text-3xl md:text-5xl mt-2">{(Array.isArray(slide.emojis) ? slide.emojis[0] : String(slide.emojis || "📝")).split(' ')[0]}</span>
                                        ) : (
                                            <LayoutTemplate size={32} className="opacity-40 mt-2" />
                                        )}
                                        <p className="text-[10px] md:text-xs font-bold mt-2 truncate w-full px-2 opacity-60">
                                            {(slide.type === 'theory' || !slide.type) ? (slide.heading || slide.text || slide.centerLabel || '') : `${slide.type} Quiz`}
                                        </p>
                                    </button>
                                ))}
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Presentations</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.92) translateY(12px)', opacity: '0' },
                            '100%': { transform: 'scale(1) translateY(0)', opacity: '1' },
                        },
                        fadeSlide: {
                            '0%': { opacity: '0', transform: 'translateX(40px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        fadeSlideBack: {
                            '0%': { opacity: '0', transform: 'translateX(-40px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        branchIn: {
                            '0%': { opacity: '0', transform: 'scale(0.5)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        droppedCorrect: {
                            '0%': { boxShadow: '0 0 0 0 rgba(16,185,129,0.6)' },
                            '70%': { boxShadow: '0 0 0 12px rgba(16,185,129,0)' },
                            '100%': { boxShadow: '0 0 0 0 rgba(16,185,129,0)' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.4s ease-in-out',
                        popIn: 'popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        fadeSlide: 'fadeSlide 0.4s ease-out forwards',
                        fadeSlideBack: 'fadeSlideBack 0.4s ease-out forwards',
                        branchIn: 'branchIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        droppedCorrect: 'droppedCorrect 0.6s ease-out',
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; overflow: hidden; margin: 0; background: #09090b; color: white; }
        .font-display { font-family: 'DM Serif Display', serif; }
        .font-mono-head { font-family: 'Space Grotesk', sans-serif; }
        .touch-safe { touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        /* Markdown-lite rendering */
        .md-text strong, .md-text b { font-weight: 800; }
        .md-text em, .md-text i { font-style: italic; }
        .md-text u { text-decoration: underline; text-underline-offset: 3px; }

        /* Transition wrapper */
        .slide-transition {
            animation: fadeSlide 0.35s ease-out forwards;
        }
        .slide-transition-back {
            animation: fadeSlideBack 0.35s ease-out forwards;
        }

        /* Mind map connector lines via CSS */
        .mind-map-center { position: relative; }

        /* Fill blank input */
        .blank-input {
            border-bottom: 3px solid currentColor;
            background: transparent;
            outline: none;
            text-align: center;
            min-width: 80px;
            font-weight: 700;
            padding: 2px 8px;
        }
        .blank-input:focus {
            border-bottom-color: #3b82f6;
        }
        .blank-correct {
            border-bottom-color: #10b981 !important;
            color: #10b981 !important;
        }
        .blank-wrong {
            border-bottom-color: #ef4444 !important;
            color: #ef4444 !important;
        }

        /* Scramble drag items */
        .scramble-word {
            cursor: grab;
            user-select: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .scramble-word:active { cursor: grabbing; transform: scale(1.08); }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.6.0",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import confetti from 'canvas-confetti';
        import { ChevronLeft, ChevronRight, Play, X, ArrowLeft, LayoutTemplate, Trophy, RotateCcw } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const QUIZZES_PATH = 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes';

        // ============================================================
        // THEME ENGINE
        // ============================================================
        const THEMES = {
            dark: {
                id: 'dark',
                label: 'Midnight',
                bgPrimary: '#18181b',
                bgSecondary: '#27272a',
                bgAccent: '#3f3f46',
                textPrimary: '#fafafa',
                textSecondary: '#a1a1aa',
                accent: '#3b82f6',
                accentAlt: '#8b5cf6',
                cardBg: '#1e1e22',
                cardBorder: '#3f3f46',
                coverGradient: 'linear-gradient(135deg, #18181b 0%, #1e293b 50%, #0f172a 100%)',
            },
            warm: {
                id: 'warm',
                label: 'Terracotta',
                bgPrimary: '#8B6F5E',
                bgSecondary: '#A68776',
                bgAccent: '#D4B5A0',
                textPrimary: '#1a1a1a',
                textSecondary: '#4a3728',
                accent: '#C75B3F',
                accentAlt: '#E8956A',
                cardBg: '#F5EDE8',
                cardBorder: '#C9AD9A',
                coverGradient: 'linear-gradient(135deg, #8B6F5E 0%, #A68776 50%, #6B5344 100%)',
            },
            cool: {
                id: 'cool',
                label: 'Ocean',
                bgPrimary: '#6B98B8',
                bgSecondary: '#7EACC8',
                bgAccent: '#A8CBE0',
                textPrimary: '#0C2637',
                textSecondary: '#1E4A64',
                accent: '#E8956A',
                accentAlt: '#F0B89A',
                cardBg: '#E8F1F8',
                cardBorder: '#A8CBE0',
                coverGradient: 'linear-gradient(135deg, #6B98B8 0%, #4A7A9B 50%, #2C5F82 100%)',
            },
            forest: {
                id: 'forest',
                label: 'Forest',
                bgPrimary: '#2D5016',
                bgSecondary: '#3A6B1E',
                bgAccent: '#5C8A3C',
                textPrimary: '#F5F0E8',
                textSecondary: '#D4CCBB',
                accent: '#F5C842',
                accentAlt: '#E8A530',
                cardBg: '#1A3A0A',
                cardBorder: '#5C8A3C',
                coverGradient: 'linear-gradient(135deg, #2D5016 0%, #1A3A0A 50%, #0F2408 100%)',
            },
            sunset: {
                id: 'sunset',
                label: 'Sunset',
                bgPrimary: '#C75B3F',
                bgSecondary: '#D4735A',
                bgAccent: '#E8956A',
                textPrimary: '#FFF8F0',
                textSecondary: '#FFE4D0',
                accent: '#F5C842',
                accentAlt: '#FFE082',
                cardBg: '#A84430',
                cardBorder: '#E8956A',
                coverGradient: 'linear-gradient(135deg, #C75B3F 0%, #E87040 50%, #F59E0B 100%)',
            },
            cream: {
                id: 'cream',
                label: 'Cream',
                bgPrimary: '#F5EDE2',
                bgSecondary: '#EDE3D5',
                bgAccent: '#D4C4B0',
                textPrimary: '#1a1a1a',
                textSecondary: '#5a5a5a',
                accent: '#C75B3F',
                accentAlt: '#2563eb',
                cardBg: '#FFFFFF',
                cardBorder: '#D4C4B0',
                coverGradient: 'linear-gradient(135deg, #F5EDE2 0%, #E8DCC8 50%, #D4C4B0 100%)',
            },
        };

        const getTheme = (id) => THEMES[id] || THEMES.dark;

        // ============================================================
        // UTILITY: Parse mini-markdown
        // ============================================================
        const parseMd = (text) => {
            if (!text) return '';
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.+?)__/g, '<u>$1</u>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');
        };

        const MdText = ({ text, className = '', style = {} }) => (
            <span className={`md-text ${className}`} style={style} dangerouslySetInnerHTML={{ __html: parseMd(text) }} />
        );

        // ============================================================
        // CONFETTI
        // ============================================================
        const triggerConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'] });
        };

        // ============================================================
        // SLIDE COMPONENTS
        // ============================================================

        // --- COVER SLIDE ---
        const CoverSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex items-center justify-center p-8 md:p-16 relative overflow-hidden"
                style={{ background: theme.coverGradient }}>
                <div className="absolute inset-0 opacity-[0.04]" 
                    style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, currentColor 1px, transparent 0)', backgroundSize: '32px 32px' }} />
                <div className="relative z-10 text-center animate-popIn max-w-4xl">
                    {slide.subtitle && (
                        <p className="font-mono-head text-sm md:text-base tracking-[0.3em] uppercase mb-6 opacity-70"
                            style={{ color: theme.textPrimary, animationDelay: '0.05s' }}>
                            {slide.subtitle}
                        </p>
                    )}
                    <div className="inline-block px-8 md:px-16 py-6 md:py-10 rounded-2xl relative"
                        style={{ backgroundColor: theme.cardBg, border: `3px solid ${theme.cardBorder}` }}>
                        <h1 className="font-display text-5xl md:text-7xl lg:text-8xl font-black leading-[0.95]"
                            style={{ color: theme.textPrimary }}>
                            <MdText text={slide.heading || slide.title || slide.text} />
                        </h1>
                    </div>
                    {slide.branding && (
                        <p className="mt-8 text-lg md:text-xl italic opacity-60 font-display"
                            style={{ color: theme.textPrimary }}>
                            {slide.branding}
                        </p>
                    )}
                </div>
            </div>
        );

        // --- TITLE + BULLETS ---
        const TitleBulletsSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex flex-col justify-center p-8 md:p-16 lg:p-24"
                style={{ backgroundColor: theme.bgPrimary }}>
                <h2 className="font-display text-4xl md:text-6xl font-black mb-8 md:mb-12 animate-popIn"
                    style={{ color: theme.textPrimary }}>
                    <MdText text={slide.heading} />
                    {slide.emojis && <span className="ml-4 text-3xl md:text-5xl">{slide.emojis}</span>}
                </h2>
                <div className="rounded-2xl p-6 md:p-10 animate-popIn" 
                    style={{ backgroundColor: theme.cardBg, border: `2px solid ${theme.cardBorder}`, animationDelay: '0.1s', opacity: 0 }}>
                    <ul className="space-y-4">
                        {(slide.bullets || []).map((b, i) => (
                            <li key={i} className="flex items-start gap-3 text-lg md:text-2xl font-medium animate-popIn"
                                style={{ color: theme.textPrimary, animationDelay: `${0.15 + i * 0.08}s`, opacity: 0 }}>
                                <span className="text-xl md:text-2xl mt-0.5" style={{ color: theme.accent }}>•</span>
                                <MdText text={b} />
                            </li>
                        ))}
                    </ul>
                </div>
            </div>
        );

        // --- SPLIT TEXT + IMAGE (or emoji) ---
        const SplitSlide = ({ slide, theme }) => {
            const isLeft = slide.layout === 'split-text-left' || slide.layout === 'split-text-image-left';
            const hasImage = slide.imageUrl;

            const TextBlock = () => (
                <div className="flex-1 flex flex-col justify-center p-6 md:p-12 animate-popIn">
                    {slide.heading && (
                        <h2 className="font-display text-3xl md:text-5xl font-black mb-4 md:mb-6" style={{ color: theme.textPrimary }}>
                            <MdText text={slide.heading} />
                            {slide.emojis && <span className="ml-3">{slide.emojis}</span>}
                        </h2>
                    )}
                    <div className="text-base md:text-xl leading-relaxed font-medium" style={{ color: theme.textSecondary }}>
                        <MdText text={slide.text} />
                    </div>
                    {slide.bullets && (
                        <ul className="mt-4 space-y-2">
                            {slide.bullets.map((b, i) => (
                                <li key={i} className="flex items-start gap-2 text-base md:text-lg font-medium" style={{ color: theme.textPrimary }}>
                                    <span style={{ color: theme.accent }}>•</span>
                                    <MdText text={b} />
                                </li>
                            ))}
                        </ul>
                    )}
                </div>
            );

            const VisualBlock = () => (
                <div className="flex-1 flex items-center justify-center p-6 md:p-12 animate-popIn" style={{ animationDelay: '0.1s', opacity: 0 }}>
                    {hasImage ? (
                        <img src={slide.imageUrl} alt="" className="max-w-full max-h-full object-contain rounded-2xl shadow-2xl"
                            style={{ border: `3px solid ${theme.cardBorder}` }} />
                    ) : (
                        <span className="text-8xl md:text-[10rem]">{slide.emojis || '📝'}</span>
                    )}
                </div>
            );

            return (
                <div className="w-full h-full flex flex-col md:flex-row" style={{ backgroundColor: theme.bgPrimary }}>
                    {isLeft ? <><TextBlock /><VisualBlock /></> : <><VisualBlock /><TextBlock /></>}
                </div>
            );
        };

        // --- BIG STATEMENT / HERO ---
        const HeroSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex flex-col items-center justify-center text-center p-8 md:p-16"
                style={{ backgroundColor: theme.bgPrimary }}>
                {slide.emojis && (
                    <div className="text-6xl md:text-8xl mb-6 animate-popIn">{slide.emojis}</div>
                )}
                <h2 className="font-display text-3xl md:text-5xl lg:text-6xl font-black leading-tight animate-popIn max-w-4xl"
                    style={{ color: theme.textPrimary, animationDelay: '0.1s', opacity: 0 }}>
                    <MdText text={slide.text || slide.heading} />
                </h2>
                {slide.subtext && (
                    <p className="mt-6 text-lg md:text-2xl font-medium animate-popIn max-w-3xl"
                        style={{ color: theme.textSecondary, animationDelay: '0.2s', opacity: 0 }}>
                        <MdText text={slide.subtext} />
                    </p>
                )}
            </div>
        );

        // --- TWO COLUMNS / COMPARISON ---
        const TwoColumnsSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex flex-col justify-center p-6 md:p-12 lg:p-20" style={{ backgroundColor: theme.bgPrimary }}>
                {slide.heading && (
                    <h2 className="font-display text-3xl md:text-5xl font-black text-center mb-8 animate-popIn" style={{ color: theme.textPrimary }}>
                        <MdText text={slide.heading} />
                    </h2>
                )}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                    {[slide.leftColumn, slide.rightColumn].map((col, ci) => col && (
                        <div key={ci} className="rounded-2xl p-6 md:p-8 animate-popIn"
                            style={{ backgroundColor: theme.cardBg, border: `2px solid ${theme.cardBorder}`, animationDelay: `${0.1 + ci * 0.12}s`, opacity: 0 }}>
                            {col.title && (
                                <h3 className="font-mono-head text-xl md:text-2xl font-bold mb-5 pb-3"
                                    style={{ color: theme.accent, borderBottom: `2px solid ${theme.cardBorder}` }}>
                                    {col.title}
                                </h3>
                            )}
                            <ul className="space-y-3">
                                {(col.items || []).map((item, i) => (
                                    <li key={i} className="text-base md:text-lg font-medium" style={{ color: theme.textPrimary }}>
                                        <MdText text={item} />
                                    </li>
                                ))}
                            </ul>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- TABLE + NOTES ---
        const TableSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex flex-col md:flex-row items-center justify-center p-6 md:p-12 gap-8"
                style={{ backgroundColor: theme.bgPrimary }}>
                {/* Notes / left side */}
                {slide.notes && slide.notes.length > 0 && (
                    <div className="flex-1 flex flex-col justify-center animate-popIn">
                        {slide.heading && (
                            <h2 className="font-display text-3xl md:text-4xl font-black mb-6" style={{ color: theme.textPrimary }}>
                                <MdText text={slide.heading} />
                            </h2>
                        )}
                        <ul className="space-y-3">
                            {slide.notes.map((n, i) => (
                                <li key={i} className="text-base md:text-lg font-medium flex items-start gap-2"
                                    style={{ color: theme.textSecondary }}>
                                    <span style={{ color: theme.accent }}>→</span>
                                    <MdText text={n} />
                                </li>
                            ))}
                        </ul>
                    </div>
                )}
                {/* Table */}
                <div className="flex-1 animate-popIn" style={{ animationDelay: '0.1s', opacity: 0 }}>
                    {!slide.notes?.length && slide.heading && (
                        <h2 className="font-display text-3xl md:text-4xl font-black mb-6 text-center" style={{ color: theme.textPrimary }}>
                            <MdText text={slide.heading} />
                        </h2>
                    )}
                    <div className="rounded-2xl overflow-hidden" style={{ border: `2px solid ${theme.cardBorder}` }}>
                        <table className="w-full">
                            {slide.table?.headers && (
                                <thead>
                                    <tr style={{ backgroundColor: theme.accent }}>
                                        {slide.table.headers.map((h, i) => (
                                            <th key={i} className="px-4 md:px-6 py-3 text-left font-mono-head text-sm md:text-base font-bold text-white">{h}</th>
                                        ))}
                                    </tr>
                                </thead>
                            )}
                            <tbody>
                                {(slide.table?.rows || []).map((row, ri) => (
                                    <tr key={ri} style={{ backgroundColor: ri % 2 === 0 ? theme.cardBg : theme.bgSecondary }}>
                                        {row.map((cell, ci) => (
                                            <td key={ci} className="px-4 md:px-6 py-3 text-sm md:text-base font-medium"
                                                style={{ color: theme.textPrimary, borderTop: `1px solid ${theme.cardBorder}` }}>
                                                <MdText text={cell} />
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        // --- MIND MAP ---
        const MindMapSlide = ({ slide, theme }) => {
            const branches = slide.branches || [];
            const pastelColors = ['#A8E6CF', '#DCEDC1', '#FFD3B6', '#FFAAA5', '#B5EAD7', '#C7CEEA', '#FFDAC1', '#E2F0CB'];
            
            return (
                <div className="w-full h-full flex flex-col items-center justify-center p-6 md:p-12"
                    style={{ backgroundColor: theme.bgPrimary }}>
                    {/* Center node */}
                    <div className="font-display text-3xl md:text-5xl font-black mb-10 md:mb-14 animate-popIn text-center"
                        style={{ color: theme.textPrimary }}>
                        {slide.centerLabel || slide.heading}
                    </div>
                    {/* Branches in a flex wrap layout */}
                    <div className="flex flex-wrap justify-center gap-4 md:gap-6 max-w-5xl">
                        {branches.map((b, i) => (
                            <div key={i} className="animate-branchIn text-center"
                                style={{ animationDelay: `${0.1 + i * 0.1}s`, opacity: 0 }}>
                                <div className="inline-block px-5 py-3 rounded-xl font-bold text-base md:text-lg shadow-md"
                                    style={{ backgroundColor: b.color || pastelColors[i % pastelColors.length], color: '#1a1a1a' }}>
                                    {b.term}
                                </div>
                                {b.translation && (
                                    <p className="mt-2 text-xs md:text-sm font-bold uppercase tracking-wider"
                                        style={{ color: theme.textSecondary }}>
                                        {b.translation}
                                    </p>
                                )}
                                {b.description && (
                                    <p className="mt-1 text-xs md:text-sm max-w-[180px] mx-auto"
                                        style={{ color: theme.textSecondary }}>
                                        <MdText text={b.description} />
                                    </p>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- BIG QUOTE ---
        const QuoteSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex items-center justify-center p-8 md:p-20"
                style={{ backgroundColor: theme.bgSecondary }}>
                <div className="max-w-4xl text-center animate-popIn">
                    <div className="text-7xl md:text-9xl opacity-20 mb-4 font-display" style={{ color: theme.accent }}>"</div>
                    <blockquote className="font-display text-2xl md:text-4xl lg:text-5xl leading-snug font-black -mt-16 md:-mt-20"
                        style={{ color: theme.textPrimary }}>
                        <MdText text={slide.quote || slide.text} />
                    </blockquote>
                    {slide.attribution && (
                        <p className="mt-8 text-lg font-mono-head font-bold" style={{ color: theme.accent }}>
                            — {slide.attribution}
                        </p>
                    )}
                </div>
            </div>
        );

        // --- EMOJI BAND (legacy compat) ---
        const EmojiBandSlide = ({ slide, theme }) => (
            <div className="w-full h-full flex flex-col items-center justify-center p-8 md:p-16"
                style={{ backgroundColor: theme.bgPrimary }}>
                <h2 className="font-display text-3xl md:text-5xl lg:text-6xl font-black leading-tight text-center animate-popIn max-w-4xl"
                    style={{ color: theme.textPrimary }}>
                    <MdText text={slide.text} />
                </h2>
                {slide.emojis && (
                    <div className="flex gap-6 md:gap-10 mt-10 animate-popIn" style={{ animationDelay: '0.15s', opacity: 0 }}>
                        {[...slide.emojis].filter(c => c.trim()).map((e, i) => (
                            <span key={i} className="text-6xl md:text-8xl">{e}</span>
                        ))}
                    </div>
                )}
            </div>
        );

        // ============================================================
        // MINI-GAME SLIDES
        // ============================================================

        // --- MULTIPLE CHOICE ---
        const MultipleChoiceSlide = ({ slide, onComplete, theme }) => {
            const [qIndex, setQIndex] = useState(0);
            const [errorIdx, setErrorIdx] = useState(null);
            const [correctIdx, setCorrectIdx] = useState(null);
            const [score, setScore] = useState(0);
            const [done, setDone] = useState(false);

            const questions = slide.questions || [];
            const q = questions[qIndex];

            if (!q || !q.options) return <div className="text-center">Error loading question</div>;

            const handleAnswer = (idx) => {
                if (correctIdx !== null) return; // already answered
                if (idx === q.correctIndex) {
                    setCorrectIdx(idx);
                    setScore(s => s + 1);
                    triggerConfetti();
                    setTimeout(() => {
                        if (qIndex < questions.length - 1) {
                            setQIndex(qIndex + 1);
                            setCorrectIdx(null);
                        } else {
                            setDone(true);
                        }
                    }, 1200);
                } else {
                    setErrorIdx(idx);
                    setTimeout(() => setErrorIdx(null), 500);
                }
            };

            if (done) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 animate-popIn" style={{ backgroundColor: theme.bgPrimary }}>
                        <Trophy size={64} style={{ color: theme.accent }} />
                        <h2 className="font-display text-4xl md:text-6xl font-black mt-6" style={{ color: theme.textPrimary }}>
                            {score}/{questions.length}
                        </h2>
                        <p className="mt-3 text-xl font-bold" style={{ color: theme.textSecondary }}>
                            {score === questions.length ? '¡Perfecto!' : score >= questions.length * 0.7 ? '¡Muy bien!' : 'Sigue practicando'}
                        </p>
                        <button onClick={onComplete}
                            className="mt-8 px-8 py-3 rounded-xl font-bold text-white text-lg transition-transform hover:scale-105"
                            style={{ backgroundColor: theme.accent }}>
                            Continuar →
                        </button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 md:p-8 w-full max-w-4xl mx-auto"
                    style={{ backgroundColor: theme.bgPrimary }}>
                    <div className="rounded-2xl p-6 md:p-10 w-full animate-popIn shadow-2xl"
                        style={{ backgroundColor: theme.cardBg, border: `2px solid ${theme.cardBorder}` }} key={qIndex}>
                        <div className="flex justify-between items-center mb-6">
                            <span className="font-mono-head text-xs font-bold tracking-widest uppercase" style={{ color: theme.textSecondary }}>
                                Quiz Time!
                            </span>
                            <span className="font-mono-head text-xs font-bold px-3 py-1 rounded-full"
                                style={{ backgroundColor: theme.bgAccent, color: theme.textPrimary }}>
                                {qIndex + 1}/{questions.length}
                            </span>
                        </div>
                        <h3 className="font-display text-2xl md:text-4xl font-black mb-8 text-center" style={{ color: theme.textPrimary }}>
                            <MdText text={q.question} />
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            {q.options.map((opt, idx) => {
                                let btnStyle = { backgroundColor: theme.bgSecondary, color: theme.textPrimary, borderColor: theme.cardBorder };
                                if (correctIdx === idx) btnStyle = { backgroundColor: '#10b981', color: 'white', borderColor: '#10b981' };
                                else if (errorIdx === idx) btnStyle = { backgroundColor: '#ef4444', color: 'white', borderColor: '#ef4444' };
                                
                                return (
                                    <button key={idx} onClick={() => handleAnswer(idx)}
                                        className={`touch-safe text-lg md:text-xl font-bold py-5 px-4 rounded-xl transition-all border-2 hover:scale-[1.02]
                                            ${errorIdx === idx ? 'animate-shake' : ''}`}
                                        style={btnStyle}>
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- FILL IN THE BLANK ---
        const FillBlankSlide = ({ slide, onComplete, theme }) => {
            const text = slide.text || '';
            const blanks = text.match(/\[([^\]]+)\]/g) || [];
            const answers = blanks.map(b => b.replace(/[[\]]/g, ''));
            const [userAnswers, setUserAnswers] = useState(Array(answers.length).fill(''));
            const [checked, setChecked] = useState(false);
            const [results, setResults] = useState([]);
            const wordBank = slide.wordBank || [];

            const parts = text.split(/\[([^\]]+)\]/);
            let blankIdx = 0;

            const handleCheck = () => {
                const r = userAnswers.map((ua, i) => ua.trim().toLowerCase() === answers[i].trim().toLowerCase());
                setResults(r);
                setChecked(true);
                if (r.every(Boolean)) triggerConfetti();
            };

            const handleWordClick = (word) => {
                const firstEmpty = userAnswers.findIndex(a => a === '');
                if (firstEmpty !== -1) {
                    const newAns = [...userAnswers];
                    newAns[firstEmpty] = word;
                    setUserAnswers(newAns);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 md:p-12 w-full max-w-4xl mx-auto"
                    style={{ backgroundColor: theme.bgPrimary }}>
                    <div className="rounded-2xl p-6 md:p-10 w-full animate-popIn shadow-2xl"
                        style={{ backgroundColor: theme.cardBg, border: `2px solid ${theme.cardBorder}` }}>
                        <span className="font-mono-head text-xs font-bold tracking-widest uppercase block mb-6" style={{ color: theme.textSecondary }}>
                            Fill in the Blanks
                        </span>
                        <div className="text-lg md:text-2xl leading-loose font-medium mb-8" style={{ color: theme.textPrimary }}>
                            {parts.map((part, i) => {
                                if (i % 2 === 0) return <span key={i}>{part}</span>;
                                const bIdx = Math.floor(i / 2);
                                const val = userAnswers[bIdx];
                                const cls = checked ? (results[bIdx] ? 'blank-correct' : 'blank-wrong') : '';
                                return (
                                    <input key={i}
                                        className={`blank-input text-lg md:text-2xl ${cls}`}
                                        style={{ color: theme.textPrimary }}
                                        value={val}
                                        onChange={e => {
                                            const n = [...userAnswers]; n[bIdx] = e.target.value; setUserAnswers(n);
                                        }}
                                        placeholder="___"
                                        readOnly={checked}
                                    />
                                );
                            })}
                        </div>
                        {/* Word bank */}
                        {wordBank.length > 0 && !checked && (
                            <div className="flex flex-wrap gap-2 mb-6">
                                {wordBank.map((w, i) => (
                                    <button key={i} onClick={() => handleWordClick(w)}
                                        className="px-4 py-2 rounded-lg text-sm font-bold transition-transform hover:scale-105"
                                        style={{ backgroundColor: theme.bgAccent, color: theme.textPrimary }}>
                                        {w}
                                    </button>
                                ))}
                            </div>
                        )}
                        <div className="flex justify-center gap-4">
                            {!checked ? (
                                <button onClick={handleCheck}
                                    className="px-8 py-3 rounded-xl font-bold text-white text-lg transition-transform hover:scale-105"
                                    style={{ backgroundColor: theme.accent }}>
                                    Check ✓
                                </button>
                            ) : (
                                <>
                                    {!results.every(Boolean) && (
                                        <button onClick={() => { setChecked(false); setResults([]); setUserAnswers(Array(answers.length).fill('')); }}
                                            className="px-6 py-3 rounded-xl font-bold text-lg flex items-center gap-2 transition-transform hover:scale-105"
                                            style={{ backgroundColor: theme.bgAccent, color: theme.textPrimary }}>
                                            <RotateCcw size={18}/> Retry
                                        </button>
                                    )}
                                    <button onClick={onComplete}
                                        className="px-8 py-3 rounded-xl font-bold text-white text-lg transition-transform hover:scale-105"
                                        style={{ backgroundColor: theme.accent }}>
                                        Continuar →
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SENTENCE SCRAMBLE ---
        const SentenceScrambleSlide = ({ slide, onComplete, theme }) => {
            const sentences = slide.sentences || [];
            const [sIdx, setSIdx] = useState(0);
            const [done, setDone] = useState(false);

            if (done || sIdx >= sentences.length) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 animate-popIn" style={{ backgroundColor: theme.bgPrimary }}>
                        <Trophy size={64} style={{ color: theme.accent }} />
                        <h2 className="font-display text-4xl font-black mt-6" style={{ color: theme.textPrimary }}>¡Completado!</h2>
                        <button onClick={onComplete}
                            className="mt-8 px-8 py-3 rounded-xl font-bold text-white text-lg transition-transform hover:scale-105"
                            style={{ backgroundColor: theme.accent }}>
                            Continuar →
                        </button>
                    </div>
                );
            }

            return <ScrambleSentence
                key={sIdx}
                sentence={sentences[sIdx]}
                index={sIdx}
                total={sentences.length}
                theme={theme}
                onCorrect={() => {
                    triggerConfetti();
                    setTimeout(() => {
                        if (sIdx < sentences.length - 1) setSIdx(sIdx + 1);
                        else setDone(true);
                    }, 1000);
                }}
            />;
        };

        const ScrambleSentence = ({ sentence, index, total, theme, onCorrect }) => {
            const words = useMemo(() => {
                const original = sentence.text.split(' ');
                const shuffled = [...original].sort(() => Math.random() - 0.5);
                // Make sure it's actually shuffled
                if (shuffled.join(' ') === original.join(' ')) shuffled.reverse();
                return shuffled;
            }, [sentence.text]);
            
            const [placed, setPlaced] = useState([]);
            const [available, setAvailable] = useState(words);
            const [wrong, setWrong] = useState(false);
            const [correct, setCorrect] = useState(false);

            const correctWords = sentence.text.split(' ');

            const handleWordClick = (word, fromPlaced) => {
                if (correct) return;
                if (fromPlaced) {
                    setPlaced(placed.filter((_, i) => i !== placed.indexOf(word)));
                    setAvailable([...available, word]);
                } else {
                    const newPlaced = [...placed, word];
                    setPlaced(newPlaced);
                    setAvailable(available.filter((_, i) => i !== available.indexOf(word)));
                    
                    if (newPlaced.length === correctWords.length) {
                        if (newPlaced.join(' ') === sentence.text) {
                            setCorrect(true);
                            onCorrect();
                        } else {
                            setWrong(true);
                            setTimeout(() => {
                                setWrong(false);
                                setPlaced([]);
                                setAvailable(words);
                            }, 800);
                        }
                    }
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 md:p-12 w-full max-w-4xl mx-auto"
                    style={{ backgroundColor: theme.bgPrimary }}>
                    <div className={`rounded-2xl p-6 md:p-10 w-full shadow-2xl animate-popIn ${wrong ? 'animate-shake' : ''}`}
                        style={{ backgroundColor: theme.cardBg, border: `2px solid ${correct ? '#10b981' : theme.cardBorder}` }}>
                        <div className="flex justify-between items-center mb-4">
                            <span className="font-mono-head text-xs font-bold tracking-widest uppercase" style={{ color: theme.textSecondary }}>
                                Sentence Scramble
                            </span>
                            <span className="font-mono-head text-xs font-bold px-3 py-1 rounded-full"
                                style={{ backgroundColor: theme.bgAccent, color: theme.textPrimary }}>
                                {index + 1}/{total}
                            </span>
                        </div>
                        {sentence.translation && (
                            <p className="text-center text-base md:text-lg mb-6 italic" style={{ color: theme.textSecondary }}>
                                "{sentence.translation}"
                            </p>
                        )}
                        {/* Drop zone */}
                        <div className="min-h-[60px] rounded-xl p-4 mb-6 flex flex-wrap gap-2 items-center justify-center"
                            style={{ backgroundColor: theme.bgSecondary, border: `2px dashed ${theme.cardBorder}` }}>
                            {placed.length === 0 && <span className="text-sm italic" style={{ color: theme.textSecondary }}>Tap words to build the sentence...</span>}
                            {placed.map((w, i) => (
                                <button key={i} onClick={() => handleWordClick(w, true)}
                                    className="scramble-word px-4 py-2 rounded-lg font-bold text-base"
                                    style={{ backgroundColor: correct ? '#10b981' : theme.accent, color: 'white' }}>
                                    {w}
                                </button>
                            ))}
                        </div>
                        {/* Available words */}
                        <div className="flex flex-wrap gap-2 justify-center">
                            {available.map((w, i) => (
                                <button key={i} onClick={() => handleWordClick(w, false)}
                                    className="scramble-word px-4 py-2 rounded-lg font-bold text-base transition-transform hover:scale-105"
                                    style={{ backgroundColor: theme.bgAccent, color: theme.textPrimary }}>
                                    {w}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // SLIDE ROUTER
        // ============================================================
        const SlideRenderer = ({ slide, theme, onComplete }) => {
            const layout = slide.layout || '';
            const type = slide.type || 'theory';

            // Mini-games first
            if (type === 'multipleChoice') return <MultipleChoiceSlide slide={slide} theme={theme} onComplete={onComplete} />;
            if (type === 'fillBlank') return <FillBlankSlide slide={slide} theme={theme} onComplete={onComplete} />;
            if (type === 'sentenceScramble') return <SentenceScrambleSlide slide={slide} theme={theme} onComplete={onComplete} />;

            // Theory layouts
            if (layout === 'cover') return <CoverSlide slide={slide} theme={theme} />;
            if (layout === 'title-bullets') return <TitleBulletsSlide slide={slide} theme={theme} />;
            if (layout === 'two-columns') return <TwoColumnsSlide slide={slide} theme={theme} />;
            if (layout === 'table-notes' || layout === 'table') return <TableSlide slide={slide} theme={theme} />;
            if (layout === 'mind-map') return <MindMapSlide slide={slide} theme={theme} />;
            if (layout === 'quote') return <QuoteSlide slide={slide} theme={theme} />;
            if (layout.startsWith('split-')) return <SplitSlide slide={slide} theme={theme} />;
            if (layout === 'horizontal-emoji-band') return <EmojiBandSlide slide={slide} theme={theme} />;
            
            // Default: hero-style for legacy or simple slides
            return <HeroSlide slide={slide} theme={theme} />;
        };

        // ============================================================
        // MAIN APP
        // ============================================================
        const App = () => {
            const [presentation, setPresentation] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(true);
            const [isPresenting, setIsPresenting] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            const [direction, setDirection] = useState('forward');

            useEffect(() => {
                const initAndFetch = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    
                    if (!id) { setErrorMsg("No ID provided in URL."); setLoading(false); return; }

                    try {
                        await signInAnonymously(auth);
                        const docSnap = await getDoc(doc(db, QUIZZES_PATH, id));
                        if (docSnap.exists()) setPresentation(docSnap.data());
                        else setErrorMsg("Presentation not found.");
                    } catch (error) {
                        console.error(error);
                        setErrorMsg(error.message);
                    } finally {
                        setLoading(false);
                    }
                };
                initAndFetch();
            }, []);

            // Keyboard navigation
            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
                    if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
                    if (e.key === 'Escape' && isPresenting) setIsPresenting(false);
                    if (e.key === 'f' || e.key === 'F') setIsPresenting(p => !p);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            });

            if (loading) return (
                <div className="h-[100dvh] flex items-center justify-center bg-zinc-950">
                    <div className="animate-spin h-12 w-12 border-t-4 border-blue-500 rounded-full"></div>
                </div>
            );
            if (errorMsg) return (
                <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-red-400 font-bold text-xl p-8 text-center">{errorMsg}</div>
            );
            if (!presentation?.content) return (
                <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-white">Invalid presentation data.</div>
            );

            const theme = getTheme(presentation.theme || 'dark');
            
            // Deserialize Firebase data (table rows stored as objects, not arrays)
            const deserializeSlides = (slides) => slides.map(s => {
                const copy = { ...s };
                if (copy.table?.rows) {
                    copy.table = { ...copy.table, rows: copy.table.rows.map(row => {
                        if (!Array.isArray(row) && typeof row === 'object') {
                            const keys = Object.keys(row).sort((a, b) => Number(a) - Number(b));
                            return keys.map(k => row[k]);
                        }
                        return row;
                    })};
                }
                return copy;
            });
            
            const rawSlides = presentation.content.slides || presentation.content || [];
            const slides = deserializeSlides(rawSlides);
            const allSlides = [...slides];
            
            if (presentation.miniGame && presentation.miniGame.type !== 'none') {
                allSlides.push({ id: "minigame-final", type: presentation.miniGame.type, ...presentation.miniGame.data });
            }

            const currentSlide = allSlides[currentIdx];
            if (!currentSlide) return null;

            const nextSlide = () => {
                if (currentIdx < allSlides.length - 1) {
                    setDirection('forward');
                    setCurrentIdx(currentIdx + 1);
                }
            };
            const prevSlide = () => {
                if (currentIdx > 0) {
                    setDirection('back');
                    setCurrentIdx(currentIdx - 1);
                }
            };

            const getThumbPreview = (slide) => {
                const t = slide.type || 'theory';
                if (t !== 'theory') return { icon: true, label: `${t} Quiz` };
                const l = slide.layout || 'hero';
                return {
                    emoji: slide.emojis || null,
                    label: slide.heading || slide.text || slide.title || l,
                    iscover: l === 'cover'
                };
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col overflow-hidden" style={{ fontFamily: "'Outfit', sans-serif", backgroundColor: theme.bgPrimary }}>
                    
                    {/* TOP BANNER */}
                    {!isPresenting && (
                        <header className="h-16 md:h-20 shrink-0 flex items-center justify-between px-4 md:px-8 z-20"
                            style={{ backgroundColor: theme.cardBg, borderBottom: `1px solid ${theme.cardBorder}` }}>
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'}
                                    className="p-2 rounded-full transition-colors hover:opacity-70" style={{ color: theme.textSecondary }}>
                                    <ArrowLeft size={24} />
                                </button>
                                <h1 className="text-lg md:text-2xl font-black truncate max-w-[200px] md:max-w-md"
                                    style={{ color: theme.textPrimary }}>
                                    {presentation.title || "Presentación"}
                                </h1>
                                {presentation.theme && (
                                    <span className="text-[10px] font-bold tracking-widest uppercase px-2 py-0.5 rounded-full"
                                        style={{ backgroundColor: theme.bgAccent, color: theme.textSecondary }}>
                                        {theme.label}
                                    </span>
                                )}
                            </div>
                            <button onClick={() => setIsPresenting(true)}
                                className="text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition-transform hover:scale-105 shadow-lg"
                                style={{ backgroundColor: theme.accent }}>
                                <Play size={18} fill="currentColor" />
                                <span className="hidden md:inline">Presentar</span>
                            </button>
                        </header>
                    )}

                    {/* MAIN STAGE */}
                    <main className={`flex-1 relative flex flex-col ${isPresenting ? 'h-[100dvh] z-50' : ''}`}
                        style={{ backgroundColor: theme.bgPrimary }}>
                        
                        {isPresenting && (
                            <button onClick={() => setIsPresenting(false)}
                                className="absolute top-6 right-6 p-3 rounded-full z-50 backdrop-blur-md transition-colors"
                                style={{ backgroundColor: 'rgba(255,255,255,0.1)', color: 'white' }}>
                                <X size={24} />
                            </button>
                        )}

                        <div className={`flex-1 w-full h-full relative z-0 ${direction === 'forward' ? 'slide-transition' : 'slide-transition-back'}`}
                            key={currentIdx}>
                            <SlideRenderer slide={currentSlide} theme={theme} onComplete={nextSlide} />
                        </div>

                        {/* Nav arrows */}
                        <div className="absolute top-1/2 -translate-y-1/2 w-full flex justify-between px-3 md:px-6 pointer-events-none z-10">
                            <button onClick={prevSlide} disabled={currentIdx === 0}
                                className={`pointer-events-auto touch-safe p-3 md:p-4 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === 0 ? 'opacity-0' : 'opacity-80 hover:opacity-100 hover:scale-110'}`}
                                style={{ backgroundColor: 'rgba(0,0,0,0.3)', color: 'white' }}>
                                <ChevronLeft size={28} />
                            </button>
                            <button onClick={nextSlide} disabled={currentIdx === allSlides.length - 1}
                                className={`pointer-events-auto touch-safe p-3 md:p-4 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === allSlides.length - 1 ? 'opacity-0' : 'opacity-80 hover:opacity-100 hover:scale-110'}`}
                                style={{ backgroundColor: 'rgba(0,0,0,0.3)', color: 'white' }}>
                                <ChevronRight size={28} />
                            </button>
                        </div>

                        {/* Progress bar */}
                        {isPresenting && (
                            <div className="absolute bottom-0 left-0 w-full h-1.5" style={{ backgroundColor: 'rgba(255,255,255,0.1)' }}>
                                <div className="h-full transition-all duration-300" style={{ width: `${((currentIdx + 1) / allSlides.length) * 100}%`, backgroundColor: theme.accent }}></div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM STRIP - Thumbnails */}
                    {!isPresenting && (
                        <footer className="h-28 md:h-36 shrink-0 flex items-center px-4 md:px-8 overflow-x-auto gap-3 custom-scrollbar z-20"
                            style={{ backgroundColor: theme.cardBg, borderTop: `1px solid ${theme.cardBorder}` }}>
                            {allSlides.map((slide, idx) => {
                                const preview = getThumbPreview(slide);
                                return (
                                    <button key={slide.id || idx} onClick={() => { setDirection(idx > currentIdx ? 'forward' : 'back'); setCurrentIdx(idx); }}
                                        className={`shrink-0 h-20 w-32 md:h-24 md:w-40 rounded-xl flex flex-col items-center justify-center p-2 relative overflow-hidden transition-all hover:scale-105 border-2`}
                                        style={{
                                            backgroundColor: idx === currentIdx ? theme.bgAccent : theme.bgSecondary,
                                            borderColor: idx === currentIdx ? theme.accent : 'transparent',
                                            boxShadow: idx === currentIdx ? `0 0 0 3px ${theme.accent}33` : 'none'
                                        }}>
                                        <span className="text-[10px] font-bold absolute top-1.5 left-2.5" style={{ color: theme.textSecondary }}>
                                            {idx + 1}
                                        </span>
                                        {preview.icon ? (
                                            <LayoutTemplate size={24} style={{ color: theme.textSecondary }} />
                                        ) : preview.emoji ? (
                                            <span className="text-2xl md:text-3xl">{preview.emoji.split(' ')[0]}</span>
                                        ) : (
                                            <span className="text-lg font-black" style={{ color: theme.textPrimary }}>
                                                {preview.iscover ? '◆' : '—'}
                                            </span>
                                        )}
                                        <p className="text-[9px] md:text-[10px] font-bold mt-1 truncate w-full px-1 text-center" style={{ color: theme.textSecondary }}>
                                            {(preview.label || '').substring(0, 30)}
                                        </p>
                                    </button>
                                );
                            })}
                        </footer>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

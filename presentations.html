<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Presentations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#09090b', brand: '#3b82f6' },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.4s ease-in-out',
                        popIn: 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        fadeIn: 'fadeIn 0.4s ease forwards'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: white; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        .touch-safe { touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.05); }
            .hover-bg:hover { background-color: rgba(255, 255, 255, 0.1); }
        }
        .nav-arrows { transition: opacity 0.4s ease; }
        .nav-arrows.hidden-arrows { opacity: 0; pointer-events: none; }
        .nav-arrows.visible-arrows { opacity: 1; pointer-events: auto; }
        
        /* Glassmorphism y profundidad para los elementos */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .emoji-glow {
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.15));
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.6.0",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import confetti from 'canvas-confetti';
        import { ChevronLeft, ChevronRight, Play, X, ArrowLeft, LayoutTemplate, Presentation } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const QUIZZES_PATH = 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes';

        const triggerConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
        };

        // ============================================================
        // THEME SYSTEM
        // ============================================================
        const FALLBACK_THEME = { bg: '#09090b', text: 'white', accent: '#3b82f6', subtle: 'rgba(255,255,255,0.08)' };

        const resolveTheme = (docThemeObj) => {
            if (docThemeObj && typeof docThemeObj === 'object') {
                return {
                    bg: docThemeObj.preview || FALLBACK_THEME.bg,
                    text: 'white',
                    accent: docThemeObj.accent || FALLBACK_THEME.accent,
                    subtle: 'rgba(255,255,255,0.08)' 
                };
            }
            return FALLBACK_THEME;
        };

        const getSlideBackground = (slide, docThemeObj) => {
            if (slide.bgColor) return slide.bgColor;
            if (slide.background) return slide.background;
            return resolveTheme(docThemeObj).bg;
        };

        const makeWrapStyle = (slide, docThemeObj) => {
            const bg = getSlideBackground(slide, docThemeObj);
            if (typeof bg === 'string' && (bg.includes('gradient') || bg.includes('linear') || bg.includes('radial'))) {
                return { background: bg };
            }
            return { 
                background: `radial-gradient(circle at 50% -20%, rgba(255,255,255,0.1) 0%, transparent 70%), ${bg}`
            };
        };

        // ============================================================
        // MINI-MARKDOWN PARSER
        // ============================================================
        const parseMiniMarkdown = (text) => {
            if (!text) return null;
            const strText = String(text);
            const parts = [];
            const regex = /(\*\*(.+?)\*\*|__(.+?)__|(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*))/g;
            let lastIndex = 0;
            let match;
            while ((match = regex.exec(strText)) !== null) {
                if (match.index > lastIndex) parts.push(strText.slice(lastIndex, match.index));
                if (match[2]) parts.push(<strong key={match.index} className="font-black drop-shadow-md">{match[2]}</strong>);
                else if (match[3]) parts.push(<span key={match.index} className="underline decoration-2 underline-offset-4">{match[3]}</span>);
                else if (match[4]) parts.push(<em key={match.index} className="italic opacity-80">{match[4]}</em>);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < strText.length) parts.push(strText.slice(lastIndex));
            return parts.length > 0 ? parts : strText;
        };

        const parseTextWithLists = (text) => {
            if (!text) return { type: 'plain', text: '' };
            const strText = String(text);
            const listPattern = /(?:^|\n)\s*\d+\.\s+/g;
            const matches = strText.match(listPattern);
            if (matches && matches.length >= 2) {
                const items = strText.split(/(?:^|\n)\s*\d+\.\s+/).filter(s => s.trim());
                const firstNumIdx = strText.search(/\d+\.\s+/);
                const heading = firstNumIdx > 0 ? strText.slice(0, firstNumIdx).trim() : null;
                return { type: 'numbered-list', heading, items };
            }
            return { type: 'plain', text: strText };
        };

        // ============================================================
        // THEORY SLIDE
        // ============================================================
        const TheorySlide = ({ slide, theme }) => {
            const t = resolveTheme(theme);
            const wrapStyle = makeWrapStyle(slide, theme);
            const getText = () => slide.text || slide.heading || slide.centerLabel || slide.quote || '';
            
            const safeEmojis = Array.isArray(slide.emojis) ? slide.emojis.join(' ') : String(slide.emojis || '📝');

            if (slide.layout === 'cover') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 animate-popIn relative" style={wrapStyle}>
                        <div className="absolute inset-0 bg-black/20 z-0 pointer-events-none"></div>
                        <div className="z-10 relative max-w-4xl w-full glass-panel p-10 md:p-16 rounded-[3rem] shadow-2xl flex flex-col items-center justify-center">
                            <h1 className="text-5xl md:text-7xl lg:text-8xl font-black leading-tight mb-6 drop-shadow-2xl">
                                {parseMiniMarkdown(slide.heading || slide.text || '')}
                            </h1>
                            {slide.subtitle && <p className="text-xl md:text-3xl opacity-80 font-medium max-w-2xl mx-auto drop-shadow-md">{parseMiniMarkdown(slide.subtitle)}</p>}
                            {slide.branding && (
                                <div className="mt-12 inline-block bg-white/10 px-6 py-2 rounded-full border border-white/20">
                                    <p className="text-sm opacity-80 font-bold uppercase tracking-widest">{slide.branding}</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'title-bullets') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 md:px-16 animate-popIn" style={wrapStyle}>
                        <div className="max-w-4xl w-full text-center glass-panel p-8 md:p-12 rounded-[2rem]">
                            <h2 className="text-4xl md:text-5xl font-black mb-10 leading-tight drop-shadow-lg">{parseMiniMarkdown(slide.heading || '')}</h2>
                            {slide.bullets && (
                                <ul className="space-y-4 text-left mx-auto max-w-3xl">
                                    {slide.bullets.map((b, i) => (
                                        <li key={i} className="flex items-start gap-4 animate-fadeIn bg-black/10 p-4 rounded-xl border border-white/5" style={{ animationDelay: `${i * 0.1}s`, opacity: 0 }}>
                                            <span className="font-black text-2xl mt-0.5 shrink-0" style={{ color: t.accent }}>{i + 1}.</span>
                                            <span className="text-xl md:text-2xl font-semibold leading-snug opacity-90">{parseMiniMarkdown(b)}</span>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'two-columns') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 md:px-16 animate-popIn" style={wrapStyle}>
                        <h2 className="text-4xl md:text-5xl font-black mb-12 text-center max-w-3xl drop-shadow-lg">{parseMiniMarkdown(slide.heading || '')}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl w-full">
                            {[slide.leftColumn, slide.rightColumn].map((col, ci) => col && (
                                <div key={ci} className="rounded-[2rem] p-8 glass-panel transition-transform hover-scale">
                                    <h3 className="text-xl font-black mb-6 uppercase tracking-wider text-center" style={{ color: t.accent }}>{col.title}</h3>
                                    <ul className="space-y-3">
                                        {col.items?.map((item, i) => (
                                            <li key={i} className="font-medium text-lg flex items-start gap-3 opacity-90 bg-black/20 p-3 rounded-xl">
                                                <span style={{ color: t.accent }} className="mt-1 font-bold">•</span>
                                                <span>{parseMiniMarkdown(item)}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'table-notes') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-6 md:px-16 animate-popIn overflow-y-auto" style={wrapStyle}>
                        <div className="max-w-5xl w-full glass-panel p-8 md:p-12 rounded-[2rem]">
                            <h2 className="text-3xl md:text-5xl font-black mb-10 text-center drop-shadow-lg">{parseMiniMarkdown(slide.heading || '')}</h2>
                            {slide.table && (
                                <div className="overflow-hidden rounded-2xl border border-white/10 mb-8 shadow-2xl">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr style={{ background: 'rgba(0,0,0,0.3)' }}>
                                                {slide.table.headers?.map((h, i) => <th key={i} className="px-6 py-4 text-sm font-black uppercase tracking-wider border-b border-white/10" style={{ color: t.accent }}>{h}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {slide.table.rows?.map((row, ri) => (
                                                <tr key={ri} style={ri % 2 === 0 ? { background: 'rgba(255,255,255,0.03)' } : {}}>
                                                    {(Array.isArray(row) ? row : Object.values(row)).map((cell, ci) => (
                                                        <td key={ci} className="px-6 py-4 font-medium text-base opacity-90 border-b border-white/5">{parseMiniMarkdown(String(cell || ''))}</td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            {slide.notes && slide.notes.map((n, i) => <p key={i} className="text-base font-medium opacity-70 bg-black/20 p-3 rounded-lg text-center">💡 {parseMiniMarkdown(n)}</p>)}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'mind-map') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 animate-popIn" style={wrapStyle}>
                        <div className="rounded-full px-10 py-5 mb-12 border-2 shadow-[0_0_40px_rgba(255,255,255,0.1)] glass-panel" style={{ borderColor: t.accent }}>
                            <h2 className="text-3xl md:text-5xl font-black text-center">{slide.centerLabel || ''}</h2>
                        </div>
                        <div className="flex flex-wrap justify-center gap-6 max-w-5xl relative">
                            {slide.branches?.map((b, i) => (
                                <div key={i} className="rounded-2xl px-6 py-4 border-l-4 animate-fadeIn flex flex-col items-center glass-panel shadow-xl hover:-translate-y-2 transition-transform" style={{ borderColor: b.color || t.accent, animationDelay: `${i * 0.08}s`, opacity: 0 }}>
                                    <span className="text-xl font-black">{b.term}</span>
                                    {b.translation && <span className="text-sm opacity-60 mt-1">{b.translation}</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'quote') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 text-center animate-popIn" style={wrapStyle}>
                        <div className="max-w-4xl glass-panel p-12 rounded-[3rem] relative">
                            <span className="absolute -top-8 left-8 text-9xl font-black leading-none" style={{ color: t.accent, opacity: 0.3 }}>"</span>
                            <p className="text-3xl md:text-5xl font-bold leading-relaxed relative z-10 drop-shadow-md">{parseMiniMarkdown(slide.quote || slide.text || '')}</p>
                            {slide.attribution && <p className="opacity-50 font-bold mt-8 text-xl">— {slide.attribution}</p>}
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'split-text-image-left' || slide.layout === 'split-text-left') {
                const textSide = (
                    <div className="flex flex-col justify-center glass-panel p-8 rounded-[2rem]">
                        {slide.heading && <h2 className="text-3xl md:text-4xl font-black mb-4 leading-tight drop-shadow-md">{parseMiniMarkdown(slide.heading)}</h2>}
                        {slide.text && <p className="text-xl md:text-2xl font-medium mb-4 leading-relaxed opacity-85">{parseMiniMarkdown(slide.text)}</p>}
                        {slide.bullets && (
                            <ul className="space-y-3 mt-4">
                                {slide.bullets.map((b, i) => (
                                    <li key={i} className="font-medium text-lg flex items-start gap-3 opacity-90 bg-black/20 p-3 rounded-xl">
                                        <span style={{ color: t.accent }} className="mt-1 shrink-0 font-bold">•</span>
                                        <span>{parseMiniMarkdown(b)}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                );
                const emojiSide = <div className="flex items-center justify-center"><span className="text-7xl md:text-9xl animate-popIn emoji-glow">{safeEmojis}</span></div>;
                return (
                    <div className="w-full h-full flex items-center justify-center px-8 md:px-12" style={wrapStyle}>
                        <div className="max-w-6xl w-full grid grid-cols-1 md:grid-cols-3 items-center gap-10 animate-popIn">
                            <div className="md:col-span-2">{textSide}</div><div className="md:col-span-1 flex justify-center">{emojiSide}</div>
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'split-text-image-right' || slide.layout === 'split-text-right') {
                const textSide = (
                    <div className="flex flex-col justify-center glass-panel p-8 rounded-[2rem]">
                        {slide.heading && <h2 className="text-3xl md:text-4xl font-black mb-4 leading-tight drop-shadow-md">{parseMiniMarkdown(slide.heading)}</h2>}
                        {slide.text && <p className="text-xl md:text-2xl font-medium mb-4 leading-relaxed opacity-85">{parseMiniMarkdown(slide.text)}</p>}
                        {slide.bullets && (
                            <ul className="space-y-3 mt-4">
                                {slide.bullets.map((b, i) => (
                                    <li key={i} className="font-medium text-lg flex items-start gap-3 opacity-90 bg-black/20 p-3 rounded-xl">
                                        <span style={{ color: t.accent }} className="mt-1 shrink-0 font-bold">•</span>
                                        <span>{parseMiniMarkdown(b)}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                );
                const emojiSide = <div className="flex items-center justify-center"><span className="text-7xl md:text-9xl animate-popIn emoji-glow">{safeEmojis}</span></div>;
                return (
                    <div className="w-full h-full flex items-center justify-center px-8 md:px-12" style={wrapStyle}>
                        <div className="max-w-6xl w-full grid grid-cols-1 md:grid-cols-3 items-center gap-10 animate-popIn">
                            <div className="md:col-span-1 flex justify-center">{emojiSide}</div><div className="md:col-span-2">{textSide}</div>
                        </div>
                    </div>
                );
            }

            if (slide.layout === 'horizontal-emoji-band') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center px-8 gap-10 animate-popIn" style={wrapStyle}>
                        <h2 className="text-4xl md:text-6xl font-black text-center leading-tight max-w-4xl drop-shadow-lg">{parseMiniMarkdown(slide.text || '')}</h2>
                        <div className="flex gap-8 text-6xl md:text-8xl mt-4 glass-panel px-10 py-6 rounded-[3rem]">
                            {safeEmojis.split(' ').filter(Boolean).map((e, i) => <span key={i} className="animate-popIn emoji-glow" style={{ animationDelay: `${i * 0.1}s` }}>{e}</span>)}
                        </div>
                    </div>
                );
            }

            const textContent = getText();
            const parsed = parseTextWithLists(textContent);

            const renderTextBlock = () => {
                if (parsed.type === 'numbered-list') {
                    return (
                        <div className="max-w-4xl w-full animate-popIn text-center glass-panel p-10 rounded-[2rem]" style={{ animationDelay: '0.1s' }}>
                            {parsed.heading && <h2 className="text-3xl md:text-5xl lg:text-6xl font-black leading-tight mb-8 drop-shadow-lg">{parseMiniMarkdown(parsed.heading)}</h2>}
                            <ol className="space-y-4 text-left mx-auto max-w-3xl">
                                {parsed.items.map((item, i) => (
                                    <li key={i} className="flex items-start gap-4 animate-fadeIn bg-black/20 p-4 rounded-xl border border-white/5" style={{ animationDelay: `${(i + 1) * 0.12}s`, opacity: 0 }}>
                                        <span className="font-black text-2xl mt-0.5 shrink-0" style={{ color: t.accent }}>{i + 1}.</span>
                                        <span className="text-xl md:text-2xl font-semibold leading-snug opacity-90">{parseMiniMarkdown(item.trim())}</span>
                                    </li>
                                ))}
                            </ol>
                        </div>
                    );
                }
                return <h2 className="text-4xl md:text-6xl lg:text-7xl font-black leading-tight animate-popIn drop-shadow-xl max-w-4xl text-center glass-panel p-10 rounded-[2rem]" style={{ animationDelay: '0.1s' }}>{parseMiniMarkdown(textContent)}</h2>;
            };

            const emojiBlock = (size = 'text-7xl md:text-9xl') => <div className={`${size} animate-popIn emoji-glow mb-6`}>{safeEmojis}</div>;

            if (!slide.layout || slide.layout === 'hero' || slide.layout === 'hero-emoji-center' || slide.layout === 'hero-emoji-top') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-2" style={wrapStyle}>
                        {emojiBlock()}
                        {renderTextBlock()}
                        {slide.subtext && <p className="text-xl md:text-2xl opacity-60 max-w-2xl font-medium mt-6 drop-shadow-md">{parseMiniMarkdown(slide.subtext)}</p>}
                    </div>
                );
            }

            return (
                <div className="w-full h-full flex flex-col items-center justify-center text-center px-8 gap-5" style={wrapStyle}>
                    {emojiBlock()}
                    {renderTextBlock()}
                </div>
            );
        };

        // ============================================================
        // INTERACTIVE SLIDES (MINIGAMES) - MEJORADOS ANTI-ATASCOS Y ACCESIBLES
        // ============================================================
        const MultipleChoiceSlide = ({ slide, onComplete }) => {
            const questions = slide.questions || slide.data?.questions || [slide]; 
            const [qIndex, setQIndex] = useState(slide.savedQIndex || 0);
            const [isFinished, setIsFinished] = useState(slide.isFinished || false);
            
            const [errorIdx, setErrorIdx] = useState(null);
            const [successIdx, setSuccessIdx] = useState(null);
            const [revealed, setRevealed] = useState(false);

            const q = questions[qIndex];

            if (isFinished) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-popIn">
                        <span className="text-7xl md:text-9xl mb-6 emoji-glow">🎉</span>
                        <h2 className="text-4xl md:text-6xl font-black text-white mb-4 drop-shadow-lg">¡Quiz Completado!</h2>
                    </div>
                );
            }

            if (!q || !q.options) return <div className="text-center text-white p-8">Error loading question data</div>;

            const correctIdx = q.correctIndex !== undefined ? q.correctIndex : q.options.indexOf(q.correct);

            const advance = () => {
                if (qIndex < questions.length - 1) {
                    const nextIdx = qIndex + 1;
                    setQIndex(nextIdx);
                    slide.savedQIndex = nextIdx;
                    setSuccessIdx(null);
                    setErrorIdx(null);
                    setRevealed(false);
                } else {
                    setIsFinished(true);
                    slide.isFinished = true;
                    onComplete();
                }
            };

            const handleAnswer = (idx) => {
                if (successIdx !== null || revealed) return;

                if (idx === correctIdx) {
                    setSuccessIdx(idx);
                    triggerConfetti();
                    setTimeout(advance, 1500);
                } else {
                    setErrorIdx(idx);
                    setRevealed(true); 
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 md:p-8 w-full max-w-5xl mx-auto">
                    <div className="mb-8 text-center animate-fadeIn flex flex-col items-center">
                        <h3 className="text-lg md:text-xl font-bold text-zinc-400 mb-3 uppercase tracking-widest">Quiz Time!</h3>
                        <p className="text-base md:text-lg text-zinc-200 font-bold bg-white/10 backdrop-blur-md inline-block px-8 py-3 rounded-full border border-white/10 shadow-xl">
                            {q.instruction || slide.instruction || "Elige la opción correcta"}
                        </p>
                    </div>

                    <div className="glass-panel rounded-[3rem] p-8 md:p-14 w-full relative animate-popIn">
                        <h2 className="text-3xl md:text-5xl font-black mb-10 text-center text-white leading-tight drop-shadow-md">
                            {q.question}
                        </h2>
                        
                        <div className="flex flex-col items-center gap-4 w-full max-w-2xl mx-auto">
                            {q.options.map((opt, idx) => {
                                let buttonClasses = 'border-white/10 bg-black/20 hover:border-brand hover:bg-white/10 text-white';
                                
                                if (successIdx === idx) buttonClasses = 'border-green-500 bg-green-500/20 text-green-100 scale-[1.02] shadow-[0_0_30px_rgba(34,197,94,0.3)]';
                                else if (errorIdx === idx) buttonClasses = 'border-red-500 bg-red-500/20 text-red-100 opacity-50';
                                else if (revealed && idx === correctIdx) buttonClasses = 'border-green-500 bg-green-500/20 text-green-100 shadow-[0_0_30px_rgba(34,197,94,0.3)]';
                                else if (revealed) buttonClasses = 'border-white/5 bg-black/10 text-white/30 opacity-30';

                                return (
                                    <button 
                                        key={idx} 
                                        onClick={() => handleAnswer(idx)}
                                        disabled={successIdx !== null || revealed}
                                        className={`relative z-20 touch-safe w-full text-xl md:text-2xl font-bold py-6 px-8 rounded-2xl transition-all duration-300 border-2 cursor-pointer flex items-center justify-center text-center min-h-[80px] disabled:cursor-default ${buttonClasses}`}
                                    >
                                        {/* Añadimos pointer-events-none al span para que no estorbe el clic al botón */}
                                        <span className="pointer-events-none">{opt}</span>
                                    </button>
                                );
                            })}
                        </div>
                        
                        {revealed && (
                            <div className="mt-10 flex flex-col items-center animate-popIn">
                                <p className="text-red-400 font-bold mb-4 uppercase tracking-widest">¡Respuesta Incorrecta!</p>
                                <button onClick={advance} className="touch-safe bg-white text-black font-black px-10 py-4 rounded-full hover-scale shadow-xl text-lg cursor-pointer">
                                    CONTINUAR
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const FillBlankSlide = ({ slide, onComplete }) => {
            const [isFinished, setIsFinished] = useState(slide.isFinished || false);
            const [revealed, setRevealed] = useState(false);
            
            const { segments, blanks } = React.useMemo(() => {
                const text = slide.text || '';
                const regex = /\[(.*?)\]/g;
                const segments = [];
                const blanks = [];
                let lastIdx = 0;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    segments.push(text.slice(lastIdx, match.index));
                    blanks.push(match[1]);
                    lastIdx = regex.lastIndex;
                }
                segments.push(text.slice(lastIdx));
                return { segments, blanks };
            }, [slide.text]);

            const [userAnswers, setUserAnswers] = useState(slide.savedUserAnswers || Array(blanks.length).fill(null));
            const [availableWords, setAvailableWords] = useState(() => {
                if (slide.savedAvailable) return slide.savedAvailable;
                const words = [...(slide.wordBank || blanks)];
                return words.sort(() => Math.random() - 0.5);
            });

            if (isFinished) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-popIn">
                        <span className="text-7xl md:text-9xl mb-6 emoji-glow">🎉</span>
                        <h2 className="text-4xl md:text-6xl font-black text-white mb-4 drop-shadow-lg">¡Texto Completado!</h2>
                    </div>
                );
            }

            const handleWordClick = (word, index) => {
                if (revealed) return;
                const firstEmpty = userAnswers.findIndex(a => a === null);
                if (firstEmpty !== -1) {
                    const newAnswers = [...userAnswers];
                    newAnswers[firstEmpty] = word;
                    setUserAnswers(newAnswers);
                    slide.savedUserAnswers = newAnswers;

                    const newAvailable = [...availableWords];
                    newAvailable.splice(index, 1);
                    setAvailableWords(newAvailable);
                    slide.savedAvailable = newAvailable;
                }
            };

            const handleRemoveAnswer = (word, index) => {
                if (revealed) return;
                const newAnswers = [...userAnswers];
                newAnswers[index] = null;
                setUserAnswers(newAnswers);
                slide.savedUserAnswers = newAnswers;

                const newAvailable = [...availableWords, word];
                setAvailableWords(newAvailable);
                slide.savedAvailable = newAvailable;
            };

            const checkAnswers = () => {
                if (userAnswers.join(',') === blanks.join(',')) {
                    triggerConfetti();
                    slide.isFinished = true;
                    setTimeout(() => {
                        setIsFinished(true);
                        onComplete();
                    }, 1500);
                } else {
                    setRevealed(true);
                }
            };

            const forceAdvance = () => {
                slide.isFinished = true;
                setIsFinished(true);
                onComplete();
            };

            const isFull = !userAnswers.includes(null);

            return (
                <div id="fb-container" className="flex flex-col items-center justify-center h-full p-6 w-full max-w-5xl mx-auto">
                    <div className="glass-panel rounded-[3rem] p-8 md:p-14 w-full shadow-2xl animate-popIn">
                        <h3 className="text-xl font-bold text-zinc-400 mb-10 uppercase tracking-widest text-center">Fill in the Blanks</h3>
                        
                        {revealed ? (
                            <div className="text-center animate-fadeIn">
                                <p className="text-red-400 font-bold mb-6 uppercase tracking-widest">¡Hay errores! La respuesta correcta es:</p>
                                <div className="text-2xl md:text-4xl font-medium leading-relaxed text-zinc-200 mb-10 flex flex-wrap justify-center items-center gap-y-4">
                                    {segments.map((seg, i) => (
                                        <React.Fragment key={i}>
                                            <span>{seg}</span>
                                            {i < blanks.length && (
                                                <span className="mx-2 px-4 py-1 border-b-4 border-green-500 text-green-400 font-bold bg-green-500/10 rounded-lg">
                                                    {blanks[i]}
                                                </span>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>
                                <button onClick={forceAdvance} className="touch-safe bg-white text-black font-black px-10 py-4 rounded-full hover-scale shadow-xl text-lg cursor-pointer">
                                    CONTINUAR
                                </button>
                            </div>
                        ) : (
                            <>
                                <div className="text-2xl md:text-4xl font-medium leading-relaxed text-zinc-200 mb-12 text-center flex flex-wrap justify-center items-center gap-y-4">
                                    {segments.map((seg, i) => (
                                        <React.Fragment key={i}>
                                            <span>{seg}</span>
                                            {i < blanks.length && (
                                                <button 
                                                    onClick={() => userAnswers[i] && handleRemoveAnswer(userAnswers[i], i)}
                                                    className={`touch-safe inline-block mx-2 px-4 py-1 border-b-4 rounded-lg min-w-[120px] text-center transition-colors font-bold ${userAnswers[i] ? 'bg-white/10 border-brand text-brand shadow-lg cursor-pointer hover:bg-white/20' : 'bg-black/30 border-white/20 text-transparent'}`}
                                                >
                                                    <span className="pointer-events-none">{userAnswers[i] || '___'}</span>
                                                </button>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>

                                <div className="flex flex-wrap justify-center gap-4 mb-10">
                                    {availableWords.map((word, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => handleWordClick(word, i)}
                                            className="touch-safe cursor-pointer bg-black/40 hover:bg-white/10 border border-white/10 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg text-lg"
                                        >
                                            <span className="pointer-events-none">{word}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="flex justify-center">
                                    <button 
                                        onClick={checkAnswers}
                                        disabled={!isFull}
                                        className="touch-safe cursor-pointer bg-brand hover:bg-blue-600 disabled:bg-white/5 disabled:text-white/20 text-white font-black py-4 px-12 rounded-full transition-all shadow-lg text-lg"
                                    >
                                        VERIFICAR
                                    </button>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const SentenceScrambleSlide = ({ slide, onComplete }) => {
            const sentences = slide.sentences || [];
            const [sIndex, setSIndex] = useState(slide.savedSIndex || 0);
            const [isFinished, setIsFinished] = useState(slide.isFinished || false);
            const [revealed, setRevealed] = useState(false);

            const currentS = sentences[sIndex];
            const cleanText = currentS ? currentS.text.replace(/\//g, '').replace(/\s+/g, ' ').trim() : '';

            const [userWords, setUserWords] = useState(slide.savedUserWords || []);
            const [availableWords, setAvailableWords] = useState(() => {
                if (slide.savedAvailableWords) return slide.savedAvailableWords;
                if (!currentS) return [];
                return cleanText.split(' ').sort(() => Math.random() - 0.5);
            });

            if (isFinished || !currentS) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-popIn">
                        <span className="text-7xl md:text-9xl mb-6 emoji-glow">🎉</span>
                        <h2 className="text-4xl md:text-6xl font-black text-white mb-4 drop-shadow-lg">¡Frases Completadas!</h2>
                    </div>
                );
            }

            const handleAdd = (word, idx) => {
                if (revealed) return;
                const newU = [...userWords, word];
                const newA = [...availableWords];
                newA.splice(idx, 1);
                setUserWords(newU);
                setAvailableWords(newA);
                slide.savedUserWords = newU;
                slide.savedAvailableWords = newA;
            };

            const handleRemove = (word, idx) => {
                if (revealed) return;
                const newU = [...userWords];
                newU.splice(idx, 1);
                const newA = [...availableWords, word];
                setUserWords(newU);
                setAvailableWords(newA);
                slide.savedUserWords = newU;
                slide.savedAvailableWords = newA;
            };

            const advance = () => {
                if (sIndex < sentences.length - 1) {
                    const nextIdx = sIndex + 1;
                    setSIndex(nextIdx);
                    slide.savedSIndex = nextIdx;
                    
                    const nextCleanText = sentences[nextIdx].text.replace(/\//g, '').replace(/\s+/g, ' ').trim();
                    setUserWords([]);
                    setAvailableWords(nextCleanText.split(' ').sort(() => Math.random() - 0.5));
                    setRevealed(false);
                    
                    slide.savedUserWords = null;
                    slide.savedAvailableWords = null;
                } else {
                    setIsFinished(true);
                    slide.isFinished = true;
                    onComplete();
                }
            };

            const checkAnswer = () => {
                if (userWords.join(' ') === cleanText) {
                    triggerConfetti();
                    setTimeout(advance, 1500);
                } else {
                    setRevealed(true);
                }
            };

            const isFull = availableWords.length === 0;

            return (
                <div id="ss-container" className="flex flex-col items-center justify-center h-full p-6 w-full max-w-5xl mx-auto">
                    <div className="glass-panel rounded-[3rem] p-8 md:p-14 w-full shadow-2xl animate-popIn flex flex-col items-center">
                        <h3 className="text-xl font-bold text-zinc-400 mb-2 uppercase tracking-widest text-center">Sentence Scramble</h3>
                        <p className="text-lg text-zinc-400 mb-8 text-center font-medium">Ordena las palabras para formar la frase correcta.</p>
                        
                        <div className="text-3xl md:text-5xl font-black text-brand mb-10 text-center drop-shadow-md">
                            "{currentS.translation}"
                        </div>

                        {revealed ? (
                            <div className="text-center w-full animate-fadeIn mb-8">
                                <p className="text-red-400 font-bold mb-4 uppercase tracking-widest">¡Incorrecto! La frase es:</p>
                                <div className="text-2xl md:text-4xl font-black text-green-400 bg-green-500/10 border border-green-500/30 rounded-2xl p-6 shadow-lg inline-block">
                                    {cleanText}
                                </div>
                            </div>
                        ) : (
                            <>
                                <div className="flex flex-wrap justify-center gap-3 w-full min-h-[120px] p-6 bg-black/30 rounded-3xl border-2 border-dashed border-white/20 mb-8 shadow-inner items-center">
                                    {userWords.length === 0 && <span className="text-zinc-500 font-medium italic mt-2 text-lg">Toca las palabras abajo...</span>}
                                    {userWords.map((word, i) => (
                                        <button key={i} onClick={() => handleRemove(word, i)}
                                            className="touch-safe cursor-pointer bg-brand text-white font-bold py-3 px-6 rounded-xl shadow-[0_5px_15px_rgba(59,130,246,0.4)] hover:bg-blue-600 transition-colors animate-popIn text-lg">
                                            <span className="pointer-events-none">{word}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="flex flex-wrap justify-center gap-4 mb-10 min-h-[50px]">
                                    {availableWords.map((word, i) => (
                                        <button key={i} onClick={() => handleAdd(word, i)}
                                            className="touch-safe cursor-pointer bg-black/50 border border-white/10 text-white font-bold py-3 px-6 rounded-xl hover:bg-white/10 transition-colors shadow-lg text-lg">
                                            <span className="pointer-events-none">{word}</span>
                                        </button>
                                    ))}
                                </div>
                            </>
                        )}

                        <div className="flex justify-center">
                            {revealed ? (
                                <button onClick={advance} className="touch-safe cursor-pointer bg-white text-black font-black px-12 py-4 rounded-full hover-scale shadow-xl text-lg">
                                    CONTINUAR
                                </button>
                            ) : (
                                <button 
                                    onClick={checkAnswer}
                                    disabled={!isFull}
                                    className="touch-safe cursor-pointer bg-emerald-500 hover:bg-emerald-600 disabled:bg-white/5 disabled:text-white/20 text-white font-black py-4 px-12 rounded-full transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] disabled:shadow-none text-lg"
                                >
                                    VERIFICAR
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // MAIN APP
        // ============================================================
        const App = () => {
            const [presentation, setPresentation] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(true);
            const [isPresenting, setIsPresenting] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);

            const [arrowsVisible, setArrowsVisible] = useState(true);
            const hideTimer = useRef(null);

            const showArrows = useCallback(() => {
                setArrowsVisible(true);
                clearTimeout(hideTimer.current);
                hideTimer.current = setTimeout(() => setArrowsVisible(false), 2000);
            }, []);

            useEffect(() => {
                showArrows();
                return () => clearTimeout(hideTimer.current);
            }, [currentIdx, isPresenting, showArrows]);

            useEffect(() => {
                const handler = () => showArrows();
                document.addEventListener('touchstart', handler, { passive: true });
                document.addEventListener('mousemove', handler, { passive: true });
                return () => {
                    document.removeEventListener('touchstart', handler);
                    document.removeEventListener('mousemove', handler);
                };
            }, [showArrows]);

            useEffect(() => {
                const initAndFetch = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    
                    if (!id) { setErrorMsg("No ID provided in URL."); setLoading(false); return; }

                    try {
                        await signInAnonymously(auth);
                        const docSnap = await getDoc(doc(db, QUIZZES_PATH, id));
                        
                        if (docSnap.exists()) {
                            setPresentation(docSnap.data());
                        } else {
                            setErrorMsg("Presentation not found.");
                        }
                    } catch (error) {
                        console.error("Error fetching presentation:", error);
                        setErrorMsg(error.message);
                    } finally {
                        setLoading(false);
                    }
                };
                initAndFetch();
            }, []);

            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><div className="animate-spin h-12 w-12 border-t-4 border-brand rounded-full"></div></div>;
            if (errorMsg) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-red-500 font-bold text-xl p-8 text-center">{errorMsg}</div>;
            if (!presentation || !presentation.content) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-white">Invalid presentation data.</div>;

            const docTheme = presentation.theme; 
            const stageBg = resolveTheme(docTheme).bg;
            const slides = presentation.content.slides || presentation.content;
            
            const allSlides = [...slides];
            if (presentation.miniGame && presentation.miniGame.type !== 'none') {
                allSlides.push({ id: "minigame-final", type: presentation.miniGame.type, ...presentation.miniGame.data });
            }

            const currentSlide = allSlides[currentIdx];
            if (!currentSlide) return null;

            const nextSlide = () => { if (currentIdx < allSlides.length - 1) setCurrentIdx(currentIdx + 1); };
            const prevSlide = () => { if (currentIdx > 0) setCurrentIdx(currentIdx - 1); };

            const renderSlide = () => {
                const quizTypes = ['multipleChoice', 'fillBlank', 'sentenceScramble'];
                if (quizTypes.includes(currentSlide.type)) {
                    switch(currentSlide.type) {
                        case 'multipleChoice': return <MultipleChoiceSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                        case 'fillBlank': return <FillBlankSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                        case 'sentenceScramble': return <SentenceScrambleSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id || currentIdx} />;
                    }
                }
                if (currentSlide.layout || currentSlide.type === 'theory' || !currentSlide.type) {
                    return <TheorySlide slide={currentSlide} theme={docTheme} key={currentSlide.id || currentIdx} />;
                }
                return <div className="p-8 text-center text-xl text-white">Unknown slide type: {currentSlide.type}</div>;
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col text-white overflow-hidden font-sans" style={{ backgroundColor: stageBg }}>
                    
                    {!isPresenting && (
                        <header className="px-4 md:px-8 py-3 flex items-center justify-between shrink-0 sticky top-0 z-20 backdrop-blur-xl border-b border-white/10" style={{ background: 'rgba(0,0,0,0.5)' }}>
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 rounded-full hover:bg-white/10 text-white/70 hover:text-white transition-colors touch-safe">
                                    <ArrowLeft size={20} />
                                </button>
                                <div className="flex flex-col">
                                    <h1 className="text-sm md:text-lg font-black leading-tight line-clamp-1 flex items-center gap-2">
                                        <Presentation size={18} className="text-brand hidden md:block" /> {presentation.title || "Presentación"}
                                    </h1>
                                    <span className="text-[10px] font-bold uppercase tracking-widest opacity-50 flex items-center gap-1">
                                        Periplo • Presentation Module
                                    </span>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsPresenting(true)}
                                    className="bg-brand hover:bg-blue-600 text-white font-bold py-2.5 px-6 rounded-full flex items-center gap-2 transition-transform hover-scale shadow-[0_0_15px_rgba(59,130,246,0.3)] touch-safe">
                                    <Play size={16} fill="currentColor" />
                                    <span className="hidden md:inline text-sm">Presentar</span>
                                </button>
                            </div>
                        </header>
                    )}

                    <main className={`flex-1 relative transition-all duration-500 flex flex-col ${isPresenting ? 'h-[100dvh] z-50' : ''}`}>
                        
                        {isPresenting && (
                            <button onClick={() => setIsPresenting(false)} className="absolute top-6 right-6 p-4 bg-white/10 hover:bg-white/20 rounded-full text-white z-50 backdrop-blur-md transition-colors touch-safe border border-white/10 shadow-xl">
                                <X size={24} />
                            </button>
                        )}

                        <div className="flex-1 w-full h-full relative z-0">
                            {renderSlide()}
                        </div>

                        <div className={`nav-arrows ${arrowsVisible ? 'visible-arrows' : 'hidden-arrows'} absolute top-1/2 -translate-y-1/2 w-full flex justify-between px-4 md:px-8 z-10`}>
                            <button onClick={prevSlide} disabled={currentIdx === 0}
                                className={`pointer-events-auto touch-safe p-4 md:p-6 rounded-full backdrop-blur-md transition-all border border-white/10 shadow-2xl
                                    ${currentIdx === 0 ? 'opacity-0' : 'bg-black/30 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronLeft size={32} />
                            </button>
                            <button onClick={nextSlide} disabled={currentIdx === allSlides.length - 1}
                                className={`pointer-events-auto touch-safe p-4 md:p-6 rounded-full backdrop-blur-md transition-all border border-white/10 shadow-2xl
                                    ${currentIdx === allSlides.length - 1 ? 'opacity-0' : 'bg-black/30 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronRight size={32} />
                            </button>
                        </div>

                        {isPresenting && (
                            <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/10">
                                <div className="h-full bg-brand transition-all duration-300" style={{width: `${((currentIdx + 1) / allSlides.length) * 100}%`, boxShadow: '0 0 10px rgba(59,130,246,0.8)'}}></div>
                            </div>
                        )}
                    </main>

                    {!isPresenting && (
                        <footer className="h-36 md:h-48 shrink-0 border-t border-white/10 relative z-20 backdrop-blur-md" style={{ background: 'rgba(0,0,0,0.5)' }}>
                            <button onClick={() => { const el = document.getElementById('slide-strip'); if (el) el.scrollBy({ left: -300, behavior: 'smooth' }); }}
                                className="absolute left-0 top-0 h-full w-12 md:w-16 z-30 flex items-center justify-center bg-gradient-to-r from-black/80 via-black/50 to-transparent text-white/50 hover:text-white transition-colors touch-safe">
                                <ChevronLeft size={32} />
                            </button>
                            <button onClick={() => { const el = document.getElementById('slide-strip'); if (el) el.scrollBy({ left: 300, behavior: 'smooth' }); }}
                                className="absolute right-0 top-0 h-full w-12 md:w-16 z-30 flex items-center justify-center bg-gradient-to-l from-black/80 via-black/50 to-transparent text-white/50 hover:text-white transition-colors touch-safe">
                                <ChevronRight size={32} />
                            </button>
                            <div id="slide-strip" className="h-full flex items-center px-14 md:px-20 overflow-x-auto gap-5 custom-scrollbar py-4">
                                {allSlides.map((slide, idx) => (
                                    <button 
                                        key={slide.id || idx} 
                                        onClick={() => setCurrentIdx(idx)}
                                        className={`shrink-0 h-28 w-40 md:h-36 md:w-52 rounded-2xl border-2 flex flex-col items-center justify-center p-3 relative overflow-hidden transition-all hover-scale touch-safe shadow-lg
                                            ${idx === currentIdx ? 'border-brand ring-4 ring-brand/30 bg-white/10' : 'border-white/10 bg-black/40 hover:border-white/30 hover:bg-white/5'}`}
                                    >
                                        <span className="text-xs font-black opacity-50 absolute top-2 left-3">{idx + 1}</span>
                                        {(slide.type === 'theory' || !slide.type) ? (
                                            <span className="text-4xl md:text-5xl mt-2 drop-shadow-md">{(Array.isArray(slide.emojis) ? slide.emojis[0] : String(slide.emojis || "📝")).split(' ')[0]}</span>
                                        ) : (
                                            <LayoutTemplate size={36} className="opacity-40 mt-2 text-brand" />
                                        )}
                                        <p className="text-[10px] md:text-xs font-bold mt-3 truncate w-full px-2 opacity-70">
                                            {(slide.type === 'theory' || !slide.type) ? (slide.heading || slide.text || slide.centerLabel || '') : `${slide.type} Quiz`}
                                        </p>
                                    </button>
                                ))}
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Presentations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#09090b', brand: '#3b82f6' },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.4s ease-in-out',
                        popIn: 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: white; overflow: hidden; }
        .touch-safe { touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.05); }
            .hover-bg:hover { background-color: rgba(255, 255, 255, 0.1); }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.6.0",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import confetti from 'canvas-confetti';
        import { ChevronLeft, ChevronRight, Play, Maximize, X, ArrowLeft, LayoutTemplate } from 'lucide-react';

        // --- MOCK DATA FALLBACK ---
        const MOCK_DATA = {
            title: "The Magic of Present Simple",
            content: {
                slides: [
                    { id: "uuid1", type: "theory", text: "We use Present Simple for daily routines.", emojis: "⏰ 🏃‍♂️", layout: "hero-emoji-center" },
                    { id: "uuid1b", type: "theory", text: "Don't forget the 's' for he, she, it!", emojis: "🍎 🐍", layout: "split-text-left" },
                    { id: "uuid2", type: "multipleChoice", questions: [ { question: "She ___ everyday.", options: ["run", "runs"], correctIndex: 1 }, { question: "They ___ tennis.", options: ["play", "plays"], correctIndex: 0 } ] },
                    { id: "uuid3", type: "fillBlank", text: "I [wake] up at 7am and [eat] breakfast.", wordBank: ["wake", "sleep", "eat", "run"] },
                    { id: "uuid4", type: "sentenceScramble", sentences: [ { text: "I play tennis", translation: "Yo juego tenis" } ] }
                ]
            }
        };

        const triggerConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
        };

        // --- SLIDE COMPONENTS ---
        const TheorySlide = ({ slide }) => {
            const layoutClasses = {
                'hero-emoji-center': 'flex-col items-center justify-center text-center',
                'hero-emoji-top': 'flex-col items-center justify-start pt-12 md:pt-24 text-center',
                'split-text-left': 'grid grid-cols-1 md:grid-cols-2 items-center gap-8 text-left',
                'split-text-right': 'grid grid-cols-1 md:grid-cols-2 items-center gap-8 text-right',
                'horizontal-emoji-band': 'flex-col items-center justify-start pt-12 md:pt-24 text-center'
            };

            const EmojiBlock = () => (
                <div className={`text-7xl md:text-9xl animate-popIn ${slide.layout === 'horizontal-emoji-band' ? 'flex gap-8 mt-12' : ''}`}>
                    {slide.layout === 'horizontal-emoji-band' 
                        ? slide.emojis.split(' ').map((e, i) => <span key={i}>{e}</span>) 
                        : slide.emojis}
                </div>
            );
            
            const TextBlock = () => <h2 className="text-3xl md:text-5xl lg:text-6xl font-black text-white leading-tight animate-popIn drop-shadow-lg" style={{animationDelay: '0.1s'}}>{slide.text}</h2>;

            return (
                <div className={`w-full h-full p-8 md:p-16 flex ${layoutClasses[slide.layout] || layoutClasses['hero-emoji-center']}`}>
                    {slide.layout === 'split-text-right' && <EmojiBlock />}
                    {slide.layout !== 'split-text-right' && slide.layout !== 'horizontal-emoji-band' && slide.layout !== 'split-text-left' && <EmojiBlock />}
                    <TextBlock />
                    {slide.layout === 'split-text-left' && <EmojiBlock />}
                    {slide.layout === 'horizontal-emoji-band' && <EmojiBlock />}
                </div>
            );
        };

        const MultipleChoiceSlide = ({ slide, onComplete }) => {
            const [qIndex, setQIndex] = useState(0);
            const [errorIdx, setErrorIdx] = useState(null);
            const q = slide.questions[qIndex];

            const handleAnswer = (idx) => {
                if (idx === q.correctIndex) {
                    triggerConfetti();
                    if (qIndex < slide.questions.length - 1) setTimeout(() => setQIndex(qIndex + 1), 1000);
                    else setTimeout(onComplete, 1000);
                } else {
                    setErrorIdx(idx);
                    setTimeout(() => setErrorIdx(null), 500);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto">
                    <div className="bg-zinc-900 rounded-3xl p-8 md:p-12 w-full shadow-2xl border border-zinc-800 animate-popIn">
                        <h3 className="text-sm font-bold text-zinc-400 mb-2 uppercase tracking-wider text-center">Quiz Time!</h3>
                        <h2 className="text-3xl md:text-5xl font-black mb-10 text-center">{q.question}</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                            {q.options.map((opt, idx) => (
                                <button key={idx} onClick={() => handleAnswer(idx)}
                                    className={`touch-safe text-2xl font-bold py-6 px-4 rounded-2xl transition-all border-2 
                                        ${errorIdx === idx ? 'border-red-500 bg-red-500/20 animate-shake text-red-100' : 'border-zinc-700 bg-zinc-800 hover:border-brand hover-bg text-white'}`}>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Simplified for brevity, same logic as before
        const FillBlankSlide = ({ slide, onComplete }) => {
             return <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto animate-popIn"><h2 className="text-4xl font-black">Fill in the Blanks (WIP)</h2><button onClick={onComplete} className="mt-8 bg-brand px-6 py-3 rounded-xl font-bold">Skip for now</button></div>
        }
        const SentenceScrambleSlide = ({ slide, onComplete }) => {
            return <div className="flex flex-col items-center justify-center h-full p-8 w-full max-w-4xl mx-auto animate-popIn"><h2 className="text-4xl font-black">Sentence Scramble (WIP)</h2><button onClick={onComplete} className="mt-8 bg-brand px-6 py-3 rounded-xl font-bold">Skip for now</button></div>
        }

        // --- MAIN APP ---
        const App = () => {
            const [presentation, setPresentation] = useState(null);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [loading, setLoading] = useState(true);
            const [isPresenting, setIsPresenting] = useState(false); // THEATER MODE STATE

            useEffect(() => {
                const loadData = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (id) {
                        setTimeout(() => { setPresentation(MOCK_DATA); setLoading(false); }, 500); 
                    } else {
                        setPresentation(MOCK_DATA);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            if (loading) return <div className="h-[100dvh] flex items-center justify-center"><div className="animate-spin h-12 w-12 border-t-4 border-brand rounded-full"></div></div>;
            if (!presentation) return <div className="h-[100dvh] flex items-center justify-center">Error loading data.</div>;

            const slides = presentation.content.slides;
            const currentSlide = slides[currentIdx];

            const nextSlide = () => { if (currentIdx < slides.length - 1) setCurrentIdx(currentIdx + 1); };
            const prevSlide = () => { if (currentIdx > 0) setCurrentIdx(currentIdx - 1); };

            const renderSlide = () => {
                switch(currentSlide.type) {
                    case 'theory': return <TheorySlide slide={currentSlide} />;
                    case 'multipleChoice': return <MultipleChoiceSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id} />;
                    case 'fillBlank': return <FillBlankSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id} />;
                    case 'sentenceScramble': return <SentenceScrambleSlide slide={currentSlide} onComplete={nextSlide} key={currentSlide.id} />;
                    default: return <div className="p-8 text-center text-xl">Unknown slide type</div>;
                }
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col bg-zinc-950 text-white overflow-hidden font-sans">
                    
                    {/* 1. TOP BANNER (Hidden in Theater Mode) */}
                    {!isPresenting && (
                        <header className="h-16 md:h-20 shrink-0 border-b border-zinc-800 bg-zinc-900 flex items-center justify-between px-4 md:px-8 z-20">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 hover:text-white transition-colors" title="Back to Hub">
                                    <ArrowLeft size={24} />
                                </button>
                                <h1 className="text-lg md:text-2xl font-black truncate max-w-[200px] md:max-w-md">{presentation.title}</h1>
                            </div>
                            <button 
                                onClick={() => setIsPresenting(true)}
                                className="bg-brand hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition-transform hover-scale shadow-lg shadow-brand/20">
                                <Play size={18} fill="currentColor" />
                                <span className="hidden md:inline">Presentar</span>
                            </button>
                        </header>
                    )}

                    {/* 2. MAIN STAGE */}
                    <main className={`flex-1 relative transition-all duration-500 flex flex-col ${isPresenting ? 'h-[100dvh] bg-black z-50' : 'bg-zinc-950'}`}>
                        
                        {/* Close button for Theater Mode */}
                        {isPresenting && (
                            <button onClick={() => setIsPresenting(false)} className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white z-50 backdrop-blur-md transition-colors">
                                <X size={24} />
                            </button>
                        )}

                        {/* The actual slide content */}
                        <div className="flex-1 w-full h-full relative z-0">
                            {renderSlide()}
                        </div>

                        {/* Navigation Arrows (Floating) */}
                        <div className="absolute top-1/2 -translate-y-1/2 w-full flex justify-between px-4 md:px-8 pointer-events-none z-10">
                            <button onClick={prevSlide} disabled={currentIdx === 0}
                                className={`pointer-events-auto touch-safe p-3 md:p-5 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === 0 ? 'opacity-0' : 'opacity-100 bg-white/10 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronLeft size={32} />
                            </button>
                            <button onClick={nextSlide} disabled={currentIdx === slides.length - 1}
                                className={`pointer-events-auto touch-safe p-3 md:p-5 rounded-full backdrop-blur-md transition-all
                                    ${currentIdx === slides.length - 1 ? 'opacity-0' : 'opacity-100 bg-white/10 hover:bg-white/20 text-white hover-scale'}`}>
                                <ChevronRight size={32} />
                            </button>
                        </div>

                        {/* Progress Bar (Only in Theater Mode) */}
                        {isPresenting && (
                            <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/10">
                                <div className="h-full bg-brand transition-all duration-300" style={{width: `${((currentIdx + 1) / slides.length) * 100}%`}}></div>
                            </div>
                        )}
                    </main>

                    {/* 3. BOTTOM STRIP (Hidden in Theater Mode) */}
                    {!isPresenting && (
                        <footer className="h-36 md:h-48 shrink-0 border-t border-zinc-800 bg-zinc-900 flex items-center px-4 md:px-8 overflow-x-auto gap-4 custom-scrollbar z-20">
                            {slides.map((slide, idx) => (
                                <button 
                                    key={slide.id} 
                                    onClick={() => setCurrentIdx(idx)}
                                    className={`shrink-0 h-24 w-36 md:h-32 md:w-48 rounded-xl border-2 flex flex-col items-center justify-center p-2 relative overflow-hidden transition-all hover-scale
                                        ${idx === currentIdx ? 'border-brand ring-4 ring-brand/20 bg-zinc-800' : 'border-zinc-700 bg-zinc-950 hover:border-zinc-500'}`}
                                >
                                    <span className="text-xs font-bold text-zinc-500 absolute top-2 left-3">{idx + 1}</span>
                                    {slide.type === 'theory' ? (
                                        <span className="text-3xl md:text-5xl mt-2">{slide.emojis.split(' ')[0]}</span>
                                    ) : (
                                        <LayoutTemplate size={32} className="text-zinc-600 mt-2" />
                                    )}
                                    <p className="text-[10px] md:text-xs text-zinc-400 font-bold mt-2 truncate w-full px-2">
                                        {slide.type === 'theory' ? slide.text : `${slide.type} Quiz`}
                                    </p>
                                </button>
                            ))}
                        </footer>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

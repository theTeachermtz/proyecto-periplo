<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periplo · Portal rediseñado</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;
    background:radial-gradient(120% 90% at 50% 0%, #2A2150 0%, #1A1533 55%, #100D22 100%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #stage{transform-origin:center center;}
  /* botón 3D presionable */
  .g-btn{transition:transform .07s ease, box-shadow .07s ease;
    box-shadow:0 5px 0 var(--c2), 0 8px 16px rgba(0,0,0,.16);}
  .g-btn:hover{filter:brightness(1.04);}
  .g-btn:active{transform:translateY(5px);box-shadow:0 0 0 var(--c2), 0 2px 5px rgba(0,0,0,.18);}
  /* tile / card */
  .g-tile{transition:transform .08s ease, box-shadow .08s ease;}
  .g-tile:active{transform:translateY(3px);}
  /* node del mapa */
  .g-node{transition:transform .09s ease, filter .09s ease;}
  .g-node:hover{filter:brightness(1.05);}
  .g-node:active{transform:translateY(4px) scale(.97);}
  /* anim */
  @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-up{animation:sheetUp .32s cubic-bezier(.22,1,.36,1) both;}
  @keyframes zoomIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
  .zoom-in{animation:zoomIn .28s cubic-bezier(.22,1,.36,1) both;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}
  .bob{animation:bob 2.4s ease-in-out infinite;}
  @keyframes fadeTab{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .fade-tab{animation:fadeTab .26s ease both;}
  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="home-game.jsx"></script>
<script type="text/babel" src="solo-game.jsx"></script>
<script type="text/babel" src="agenda-mas.jsx"></script>

<script type="text/babel" data-presets="react">
const useStateP = React.useState, useEffectP = React.useEffect;
const TKEY = 'periplo-redesign-tab', THKEY = 'periplo-redesign-theme';

function Shell() {
  const [tab, setTab] = useStateP(() => localStorage.getItem(TKEY) || 'home');
  const [theme, setTheme] = useStateP(() => localStorage.getItem(THKEY) || 'light');
  useEffectP(() => { localStorage.setItem(TKEY, tab); }, [tab]);
  useEffectP(() => { localStorage.setItem(THKEY, theme); }, [theme]);

  const t = window.THEMES[theme];
  const deviceDark = theme === 'dark' || tab === 'solo';

  return (
    <window.IOSDevice width={402} height={874} dark={deviceDark}>
      <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
        <div className="fade-tab" key={tab} style={{ height: '100%' }}>
          {tab === 'home'   && <window.HomeGame   t={t} onNav={setTab} />}
          {tab === 'solo'   && <window.SoloGame   t={t} />}
          {tab === 'agenda' && <window.AgendaGame t={t} />}
          {tab === 'mas'    && <window.MasGame    t={t} theme={theme} onTheme={setTheme} />}
        </div>
        <window.BottomNav t={t} tab={tab} onNav={setTab} />
      </div>
    </window.IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Shell />);

/* escalar el teléfono para que siempre quepa */
function fit() {
  const s = Math.min(1, (window.innerHeight - 36) / 874, (window.innerWidth - 36) / 402);
  document.getElementById('stage').style.transform = 'scale(' + s + ')';
}
window.addEventListener('resize', fit); fit(); setTimeout(fit, 200);
</script>
</body>
</html>

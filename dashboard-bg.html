<script type="text/babel" data-type="module">

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};

// ============================================================
// TAXONOMÍA MAESTRA (Estandarizada con Reading Builder)
// ============================================================

const Q_TYPES = {
    mc: { id: 'multipleChoice', name: 'Opción Múltiple', format: '{"question":"...","options":["A","B","C","D"],"correct":int(0-3)}' },
    dad: { id: 'dragDrop', name: 'Drag & Drop', format: '{"sentence":"I [BLANK] to the store.","options":["wrong1","correct","wrong2"],"correct":"correct"}' },
    scr: { id: 'unscramble', name: 'Unscramble', format: '{"text":"Correct English sentence","translation":"Spanish translation"}' },
    fib: { id: 'fillBlank', name: 'Fill Blank', format: '{"sentence":"Sentence with a [BLANK].","answer":"correct_word","hint":"w _ _ _ (starts with w, 4 letters)"}' },
    mat: { id: 'matching', name: 'Matching', format: 'Each item is a set of 4-5 pairs. {"pairs":[{"left":"English term","right":"Spanish/Matching half"}, ...]}' },
    err: { id: 'errorCorrection', name: 'Error Correction', format: '{"sentence":"Sentence with ONE error.","error":"wrong word","correction":"right word"}' },
    odd: { id: 'oddOneOut', name: 'Odd One Out', format: '{"words":["word1","word2","oddWord","word3"],"odd":"oddWord","reason":"Explanation in Spanish"}' },
    spk: { id: 'speaking', name: 'Speaking', format: '{"spanish":"Sentence to translate","english":"Expected translation"}' },
    lis: { id: 'listening', name: 'Listening', format: '{"audioText":"Text for TTS","answer":"Expected translation"}' },
    rol: { id: 'roleplay', name: 'Roleplay', format: '{"situation":"Spanish scenario","expected":"English response"}' }
};

// ============================================================
// CONTENT EDITOR (El Revisador Final)
// ============================================================
const ContentEditor=({content,onSave,title,setTitle,isEditing})=>{
    const[ec,setEc]=useState(content);
    const tabs = Object.keys(ec).filter(k => Array.isArray(ec[k]) && ec[k].length > 0);
    const[tab,setTab]=useState(tabs[0] || '');
    const hc=(s,i,f,v)=>{const u={...ec};u[s][i][f]=v;setEc(u)};
    
    return(
        <div className="h-[100dvh] flex flex-col bg-zinc-950 text-zinc-100">
            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-3">
                <h2 className="text-base font-black flex items-center gap-2"><Edit3 size={18}/>{isEditing?"Editar Banco":"Revisión Final"}</h2>
                <div className="flex gap-2">
                    <button onClick={()=>window.location.reload()} className="btn-juicy bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl font-bold text-sm">Cancelar</button>
                    <button onClick={()=>onSave(ec)} className="btn-juicy bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 text-sm"><Save size={16}/>{isEditing?"Actualizar":"Guardar"}</button>
                </div>
            </div>
            <div className="p-4 border-b border-zinc-800 shrink-0">
                <label className="block text-[10px] font-black text-zinc-500 uppercase mb-1">Título del Banco</label>
                <input value={title} onChange={e=>setTitle(e.target.value)} className="w-full text-lg font-bold p-3 bg-zinc-900 border-2 border-zinc-800 rounded-xl outline-none focus:border-indigo-500"/>
            </div>
            <div className="flex gap-2 border-b border-zinc-800 px-4 shrink-0 overflow-x-auto custom-scrollbar">
                {tabs.map(t=>(<button key={t} onClick={()=>setTab(t)} className={`px-4 py-2.5 font-bold capitalize text-sm border-b-4 transition-all whitespace-nowrap ${tab===t?'border-indigo-500 text-indigo-400':'border-transparent text-zinc-500 hover:text-zinc-300'}`}>{t} ({ec[t]?.length||0})</button>))}
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar bg-zinc-950">
                {tab==='multipleChoice'&&ec.multipleChoice?.map((item,i)=>(

                        <input value={item.question} onChange={e=>hc('multipleChoice',i,'question',e.target.value)} className="w-full p-2 mb-3 border border-zinc-700 rounded bg-zinc-950 text-sm font-medium outline-none focus:border-indigo-500"/>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">{item.options.map((opt,oi)=>(
                            <div key={oi} className={`flex items-center gap-2 p-2 rounded border ${oi===item.correct?'bg-emerald-900/30 border-emerald-800':'bg-zinc-950 border-zinc-700'}`}>
                                <button onClick={()=>{const u={...ec};u.multipleChoice[i].correct=oi;setEc(u)}} className="shrink-0">{oi===item.correct?<CheckCircle2 className="text-emerald-400" size={18}/>:<Circle className="text-zinc-600" size={18}/>}</button>
                                <input value={opt} onChange={e=>{const u={...ec};u.multipleChoice[i].options[oi]=e.target.value;setEc(u)}} className="w-full text-xs font-bold bg-transparent outline-none"/>
                            </div>
                        ))}</div>
                    </div>
                ))}
                {tab==='dragDrop'&&ec.dragDrop?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Sentence (use [BLANK]):</span><input value={item.sentence} onChange={e=>hc('dragDrop',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Correct Answer:</span><input value={item.correct} onChange={e=>hc('dragDrop',i,'correct',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Distractors (comma separated):</span><input value={item.options.join(',')} onChange={e=>hc('dragDrop',i,'options',e.target.value.split(','))} className="w-full p-2 border border-zinc-700 bg-transparent rounded outline-none"/></div>
                    </div>
                ))}
                {tab==='unscramble'&&ec.unscramble?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">English Text:</span><input value={item.text} onChange={e=>hc('unscramble',i,'text',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Spanish Translation:</span><input value={item.translation} onChange={e=>hc('unscramble',i,'translation',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded italic text-zinc-400 outline-none"/></div>
                    </div>
                ))}
                {tab==='fillBlank'&&ec.fillBlank?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Sentence (use [BLANK]):</span><input value={item.sentence} onChange={e=>hc('fillBlank',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-zinc-500">Answer:</span><input value={item.answer} onChange={e=>hc('fillBlank',i,'answer',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-zinc-500">Hint:</span><input value={item.hint} onChange={e=>hc('fillBlank',i,'hint',e.target.value)} className="w-full p-2 border border-amber-700/50 bg-amber-900/20 text-amber-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
                {tab==='matching'&&ec.matching?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        {item.pairs.map((p,pi)=>(
                            <div key={pi} className="flex gap-2">
                                <input value={p.left} onChange={e=>{const u={...ec};u.matching[i].pairs[pi].left=e.target.value;setEc(u)}} className="flex-1 p-2 border border-zinc-700 bg-transparent rounded text-sm"/>
                                <input value={p.right} onChange={e=>{const u={...ec};u.matching[i].pairs[pi].right=e.target.value;setEc(u)}} className="flex-1 p-2 border border-zinc-700 bg-transparent rounded text-sm"/>
                            </div>
                        ))}
                    </div>
                ))}
                {tab==='errorCorrection'&&ec.errorCorrection?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Sentence with Error:</span><input value={item.sentence} onChange={e=>hc('errorCorrection',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-rose-500">Wrong Word:</span><input value={item.error} onChange={e=>hc('errorCorrection',i,'error',e.target.value)} className="w-full p-2 border border-rose-700/50 bg-rose-900/20 text-rose-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-emerald-500">Correction:</span><input value={item.correction} onChange={e=>hc('errorCorrection',i,'correction',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
                {tab==='oddOneOut'&&ec.oddOneOut?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Words (comma separated):</span><input value={item.words.join(',')} onChange={e=>hc('oddOneOut',i,'words',e.target.value.split(','))} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-rose-500">Odd Word:</span><input value={item.odd} onChange={e=>hc('oddOneOut',i,'odd',e.target.value)} className="w-full p-2 border border-rose-700/50 bg-rose-900/20 text-rose-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-blue-400">Reason:</span><input value={item.reason} onChange={e=>hc('oddOneOut',i,'reason',e.target.value)} className="w-full p-2 border border-blue-700/50 bg-blue-900/20 text-blue-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
                {tab==='speaking'&&ec.speaking?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Spanish Prompt:</span><input value={item.spanish} onChange={e=>hc('speaking',i,'spanish',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-blue-400">Target English:</span><input value={item.english} onChange={e=>hc('speaking',i,'english',e.target.value)} className="w-full p-2 border border-blue-900/50 bg-blue-900/20 text-blue-300 rounded font-bold outline-none"/></div>
                    </div>
                ))}
                {tab==='listening'&&ec.listening?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Audio Text (IA will read this):</span><input value={item.audioText} onChange={e=>hc('listening',i,'audioText',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-purple-400">Translation/Answer:</span><input value={item.answer} onChange={e=>hc('listening',i,'answer',e.target.value)} className="w-full p-2 border border-purple-900/50 bg-purple-900/20 text-purple-300 rounded font-bold outline-none"/></div>
                    </div>
                ))}
                {tab==='roleplay'&&ec.roleplay?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Situation (Spanish):</span><input value={item.situation} onChange={e=>hc('roleplay',i,'situation',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-orange-400">Expected English:</span><input value={item.expected} onChange={e=>hc('roleplay',i,'expected',e.target.value)} className="w-full p-2 border border-orange-900/50 bg-orange-900/20 text-orange-300 rounded font-bold outline-none"/></div>
                    </div>
                ))}

// ============================================================
// MAIN DASHBOARD (Active Buckets Architecture)
// ============================================================
const Dashboard=()=>{
    const[apiKey,setApiKey]=useState(localStorage.getItem('periplo_google_key')||'AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo');
    const[gameTitle,setGameTitle]=useState('');
    const[globalContext,setGlobalContext]=useState('');
    const[selectedLevel,setSelectedLevel]=useState('basic');
    const[selectedCat,setSelectedCat]=useState('grammar');
    
    const[showConfig,setShowConfig]=useState(false);
    // Empezamos limpios, sin preguntas por defecto
    const[qConfig,setQConfig]=useState({
        mc: 0, dad: 0, scr: 0, fib: 0, mat: 0, err: 0, odd: 0, spk: 0, lis: 0, rol: 0
    });

    // BUCKETS ACTIVOS (Mapea tipo -> array de ingredientes)
    const[bucketItems,setBucketItems]=useState({});
    const[activeBucket,setActiveBucket]=useState(null);

    const[isGenerating,setIsGenerating]=useState(false);
    const[generatedContent,setGeneratedContent]=useState(null);
    const[editingId,setEditingId]=useState(null);
    const[isLoading,setIsLoading]=useState(false);
    const[models,setModels]=useState([]);
    const[selModel,setSelModel]=useState('');
    const[loadingModels,setLoadingModels]=useState(false);

    useEffect(()=>{
        const init=async()=>{
            const p=new URLSearchParams(window.location.search);const eid=p.get('edit');
            if(eid){setIsLoading(true);try{const s=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',eid));if(s.exists()){const d=s.data();setGeneratedContent(d.content);setGameTitle(d.title);setEditingId(eid);}}catch(e){alert(e.message)}setIsLoading(false);}
        };init();
    },[]);

    // Mantener sincronizado el bucket activo con la config
    useEffect(()=>{
        const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
        if (activeKeys.length > 0 && !activeKeys.includes(activeBucket)) {
            setActiveBucket(activeKeys[0]);
        } else if (activeKeys.length === 0) {
            setActiveBucket(null);
        }
    }, [qConfig]);

    const toggleIngredient=(topic)=>{
        if(!activeBucket) return alert("Selecciona un tipo de pregunta activo a la derecha primero.");
        setBucketItems(prev=>{
            const current = prev[activeBucket] || [];
            if(current.includes(topic)) return {...prev, [activeBucket]: current.filter(t=>t!==topic)};
            return {...prev, [activeBucket]: [...current, topic]};
        });
    };

    const removeIngredient=(bucketKey, topic)=>{
        setBucketItems(prev=>{
            const current = prev[bucketKey] || [];
            return {...prev, [bucketKey]: current.filter(t=>t!==topic)};
        });
    };

    const updateQConfig=(key,val)=>{setQConfig(prev=>({...prev,[key]:parseInt(val)}))};

    const fetchModels=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");setLoadingModels(true);
        try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);if(!r.ok)throw new Error("Error");const d=await r.json();
        const v=d.models.filter(m=>m.supportedGenerationMethods?.includes("generateContent")).map(m=>m.name);setModels(v);
        if(v.length>0)setSelModel(v.find(m=>m.includes("gemini-2.5-flash"))||v.find(m=>m.includes("gemini-2.0"))||v[0]);
        }catch(e){alert(e.message)}setLoadingModels(false);
    };

    const generate=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");
        if(!selModel)return alert("Escanea modelos primero (🔍)");
        
        const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
        if(activeKeys.length === 0) return alert("Configura al menos 1 pregunta en el engranaje ⚙️");

        setIsGenerating(true);
        
        let prompt=`You are an expert ESL test creator. Create a JSON object for an educational boardgame bank.\n\n`;
        
        if(globalContext.trim().length > 0) {
            prompt += `GLOBAL CONTEXT & NARRATIVE (Level: ${selectedLevel}):\n"${globalContext}"\n*(Apply this narrative context to all sentences and scenarios. Extract the specific vocabulary/topics strictly from this text).*\n\n`;
        }

        prompt += `Generate EXACTLY these quantities and types:\n`;
        
        activeKeys.forEach(k => {
            const typeInfo = Q_TYPES[k];
            const topics = bucketItems[k]?.join(', ') || 'General mixed English';
            prompt += `- '${typeInfo.id}' array: ${qConfig[k]} items. Evaluate STRICTLY: [${topics}]. Format: ${typeInfo.format}\n`;
        });

        prompt += `\nOutput STRICT JSON containing ONLY the requested arrays. Do not include markdown formatting or explanations.`;

        try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/${selModel}:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseMimeType:"application/json"}})});
        const d=await r.json();if(d.error)throw new Error(d.error.message);if(!d.candidates?.[0]?.content)throw new Error("Sin resultados.");
        const t=d.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();setGeneratedContent(JSON.parse(t));
        }catch(e){alert("Error: "+e.message)}setIsGenerating(false);
    };

    const saveToFirebase=async(final)=>{
        if(!gameTitle)return alert("Ponle un título al banco");
        try{
            let proc={...final};
            if(proc.unscramble) {
                proc.unscramble = proc.unscramble.map(s=>{let t=s.text.replace(/\//g,'').replace(/[()]/g,'');t=t.charAt(0).toUpperCase()+t.slice(1);if(!t.endsWith('.'))t+='.';return{...s,text:t,words:t.split(' ').filter(w=>w.trim())}});
            }
            const p=new URLSearchParams(window.location.search);const fp=p.get('folder');
            const pp=(fp&&fp!=='undefined'&&fp!=='null')?decodeURIComponent(fp):'';
            
            // Recopilar todos los tags únicos para el buscador global
            const allTopics = [...new Set(Object.values(bucketItems).flat())];
            const tags={level:selectedLevel,category:selectedCat,topic:allTopics[0]||'mixed',ingredients:allTopics};
            
            if(editingId){await updateDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',editingId),{title:gameTitle,content:proc,tags,updatedAt:serverTimestamp()});}
            else{await addDoc(collection(db,'artifacts','periplo-app-v1','users','teacher_builder_001','quizzes'),{title:gameTitle,type:'BOARDGAME_BANK',content:proc,tags,createdAt:serverTimestamp(),parentPath:pp});}
            window.location.href=pp?`index.html?folder=${encodeURIComponent(pp)}`:'index.html';
        }catch(e){alert(e.message)}
    };

    if(isLoading)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-zinc-500"><Loader2 className="animate-spin mr-2"/>Cargando...</div>;
    if(generatedContent)return<ContentEditor content={generatedContent} onSave={saveToFirebase} title={gameTitle} setTitle={setGameTitle} isEditing={!!editingId}/>;

    const currentTopics=TAXONOMY[selectedLevel]?.[selectedCat]||[];
    const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
    const totalQ = Object.values(qConfig).reduce((a,b)=>a+b,0);

    return(
        <div className="h-[100dvh] flex flex-col text-zinc-100 bg-zinc-950">
            {/* MODAL CONFIG */}
            {showConfig && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-zinc-900 border border-zinc-700 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-black flex items-center gap-2"><Settings2 className="text-indigo-400"/>Asignar Cantidades</h2>
                            <button onClick={()=>setShowConfig(false)} className="btn-juicy text-zinc-500 hover:text-white"><X size={20}/></button>
                        </div>
                        <div className="space-y-3 mb-6 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                            {Object.entries(Q_TYPES).map(([k, t])=>(
                                <div key={k} className="flex items-center justify-between bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                                    <label className="text-xs font-bold text-zinc-300 ml-2">{t.name}</label>
                                    <div className="flex items-center gap-2">
                                        <input type="range" min="0" max="20" value={qConfig[k]} onChange={e=>updateQConfig(k,e.target.value)} className="w-20 accent-indigo-500"/>
                                        <span className={`text-sm font-black w-6 text-right ${qConfig[k]>0?'text-indigo-400':'text-zinc-600'}`}>{qConfig[k]}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>setShowConfig(false)} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold">Activar Buckets ({totalQ} Qs)</button>
                    </div>
                </div>
            )}

            {/* HEADER */}
            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-2">
                <div className="flex items-center gap-3 min-w-0">
                    <button onClick={()=>window.location.href='index.html'} className="btn-juicy p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl"><ArrowLeft size={18}/></button>
                    <h1 className="text-base font-black flex items-center gap-2 truncate"><Sparkles className="text-blue-400 w-4 h-4 flex-shrink-0"/>Boardgames Builder</h1>
                </div>
                <div className="flex items-center gap-1.5 flex-shrink-0">
                    <input type="password" placeholder="API Key..." value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem('periplo_google_key',e.target.value)}} className="bg-zinc-900 border border-zinc-700 text-white rounded-lg px-2 py-1.5 text-xs font-mono w-28 focus:border-blue-500 outline-none"/>
                    <button onClick={fetchModels} disabled={loadingModels||!apiKey} className="btn-juicy p-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg">{loadingModels?<Loader2 className="animate-spin" size={14}/>:<Search size={14}/>}</button>
                    {models.length>0&&<select value={selModel} onChange={e=>setSelModel(e.target.value)} className="bg-zinc-900 border border-zinc-700 rounded-lg px-1.5 py-1.5 text-[10px] text-white max-w-[120px] outline-none">{models.map(m=><option key={m} value={m}>{m.replace('models/','')}</option>)}</select>}
                </div>
            </div>

            <div className="flex flex-1 flex-col md:flex-row overflow-hidden">
                {/* LEFT PANEL: TAXONOMÍA COMPACTA */}
                <div className="w-full md:w-[35%] border-b md:border-b-0 md:border-r border-zinc-800 flex flex-col h-[40%] md:h-full bg-zinc-950">
                    <div className="p-4 border-b border-zinc-800 shrink-0 space-y-3">
                        <div className="flex gap-2">
                            <select value={selectedLevel} onChange={e=>{setSelectedLevel(e.target.value);setSelectedCat('grammar');}} className="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl p-2 text-xs font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>Nivel: {l.toUpperCase()}</option>)}
                            </select>
                            <select value={selectedCat} onChange={e=>setSelectedCat(e.target.value)} className="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl p-2 text-xs font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                {Object.keys(TAXONOMY[selectedLevel]||{}).filter(k=>(TAXONOMY[selectedLevel][k]||[]).length>0).map(c=><option key={c} value={c}>{c.replace('_',' ').toUpperCase()}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                        <p className="text-[10px] text-zinc-500 font-bold mb-3 tracking-widest uppercase">Haz clic para agregar a la pestaña activa</p>
                        <div className="space-y-2">
                            {currentTopics.map(topic=>{
                                const isAdded = activeBucket && (bucketItems[activeBucket]||[]).includes(topic);
                                return(
                                    <button key={topic} onClick={()=>toggleIngredient(topic)}
                                        className={`btn-juicy w-full text-left p-3 rounded-xl border-2 font-bold text-sm transition-all ${isAdded?'bg-indigo-600/20 border-indigo-500 text-indigo-300':'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-indigo-500/50'}`}>
                                        <div className="flex justify-between items-center">
                                            <span>{topic}</span>
                                            {isAdded && <span className="text-[10px] bg-indigo-500/30 text-indigo-300 px-2 py-0.5 rounded uppercase">Agregado</span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* RIGHT PANEL: BUCKETS ACTIVOS Y CONTEXTO */}
                <div className="w-full md:w-[65%] flex flex-col h-[60%] md:h-full bg-zinc-900 relative">
                    {/* CONTEXTO GLOBAL */}
                    <div className="p-4 border-b border-zinc-800 shrink-0 bg-zinc-950/50">
                        <label className="flex items-center gap-2 text-xs font-black text-blue-400 uppercase tracking-widest mb-2"><MessageSquare size={14}/> Contexto Global & Vocabulario Custom</label>
                        <textarea 
                            value={globalContext} 
                            onChange={e=>setGlobalContext(e.target.value)} 
                            placeholder="Ej: Ambientado en un apocalipsis zombie. Si usas vocabulario evalúa estas palabras: bite, run, shelter..."
                            className="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-3 text-sm font-medium outline-none focus:border-blue-500 resize-none h-20 custom-scrollbar placeholder-zinc-600"
                        ></textarea>
                    </div>

                    {/* TABS DE BUCKETS ACTIVOS */}
                    <div className="flex items-center bg-black border-b border-zinc-800 shrink-0">
                        <button onClick={()=>setShowConfig(true)} className="btn-juicy p-3 border-r border-zinc-800 hover:bg-zinc-900 text-zinc-400 transition-colors" title="Configurar Cantidades">
                            <Settings2 size={18}/>
                        </button>
                        <div className="flex-1 overflow-x-auto flex custom-scrollbar">
                            {activeKeys.length === 0 ? (
                                <div className="p-3 text-xs font-bold text-zinc-600 italic">Asigna Qs en el engranaje para activar pestañas.</div>
                            ) : (
                                activeKeys.map(k => (
                                    <button 
                                        key={k} 
                                        onClick={()=>setActiveBucket(k)} 
                                        className={`px-4 py-3 font-bold text-sm border-b-2 whitespace-nowrap transition-all flex items-center gap-2 ${activeBucket===k ? 'border-indigo-500 text-indigo-400 bg-zinc-900' : 'border-transparent text-zinc-500 hover:bg-zinc-900/50 hover:text-zinc-300'}`}
                                    >
                                        {Q_TYPES[k].name} <span className="bg-zinc-800 text-zinc-400 px-1.5 rounded text-[10px]">{qConfig[k]}</span>
                                    </button>
                                ))
                            )}
                        </div>
                    </div>

                    {/* CONTENIDO DEL BUCKET ACTIVO */}
                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar pb-24">
                        {!activeBucket ? (
                            <div className="h-full flex flex-col items-center justify-center text-zinc-600">
                                <ShoppingCart size={40} className="mb-3 opacity-40"/>
                                <p className="font-bold">No hay pestañas activas</p>
                                <p className="text-xs mt-1">Usa el engranaje (⚙️) para empezar.</p>
                            </div>
                        ) : (
                            <div>
                                <h3 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-3 border-b border-zinc-800 pb-2">Evaluando en {Q_TYPES[activeBucket].name}:</h3>
                                
                                {!(bucketItems[activeBucket]?.length > 0) ? (
                                    <div className="p-6 border border-dashed border-zinc-700 rounded-2xl text-center text-zinc-500 text-sm font-bold bg-zinc-950/50">
                                        Haz clic en los temas de la izquierda para inyectarlos aquí. <br/>
                                        <span className="text-xs font-medium opacity-70">(Si lo dejas vacío, será un mix general de inglés)</span>
                                    </div>
                                ) : (
                                    <div className="space-y-2">
                                        {bucketItems[activeBucket].map(topic => (
                                            <div key={topic} className="flex justify-between items-center p-3 bg-zinc-950 border border-zinc-800 rounded-xl group">
                                                <span className="font-bold text-sm text-zinc-300">{topic}</span>
                                                <button onClick={()=>removeIngredient(activeBucket, topic)} className="text-zinc-600 hover:text-rose-500 transition-colors p-1"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* GENERATE BUTTON */}
                    <div className="absolute bottom-5 left-4 right-4 z-20">
                        <button onClick={generate} disabled={isGenerating||activeKeys.length===0} className="btn-juicy w-full bg-white text-zinc-900 py-4 rounded-2xl font-black text-lg hover:bg-blue-500 hover:text-white transition-all flex items-center justify-center gap-3 disabled:opacity-40 disabled:cursor-not-allowed shadow-2xl">
                            {isGenerating?<><Loader2 className="animate-spin"/>Cocinando JSON...</>:<><Zap className="fill-amber-400 text-amber-500"/>GENERAR ({totalQ} Qs)</>}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boardgames Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'};document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    
    <script type="module" src="https://esm.sh/run"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body{font-family:'Plus Jakarta Sans',sans-serif;height:100dvh;overflow:hidden}
        .custom-scrollbar::-webkit-scrollbar{width:6px;height:6px}.custom-scrollbar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
        .dark .custom-scrollbar::-webkit-scrollbar-thumb{background:#3f3f46;}

        .btn-juicy:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>

<script type="text/babel" data-type="module">
import React,{useState,useEffect} from 'react';
import {createRoot} from 'react-dom/client';
import {initializeApp} from 'firebase/app';
import {getFirestore,collection,addDoc,updateDoc,doc,getDoc,serverTimestamp} from 'firebase/firestore';
import {Sparkles,Zap,Save,Edit3,ArrowLeft,Loader2,Search,CheckCircle2,Circle,ShoppingCart,Settings2,X,MessageSquare,Trash2,KeyRound, Dices, Tags} from 'lucide-react';

const firebaseConfig={apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",authDomain:"proyecto-periplo.firebaseapp.com",projectId:"proyecto-periplo"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);

// ============================================================
// TAXONOMÍA Y CLASIFICACIÓN (Estandarizado Portal-Firebase)
// ============================================================
const TAXONOMY={
    basic:{
        grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)"],
        verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival"],
        nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway"],
        adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste"],
        key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs"]
    },
    advanced:{
        grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention"],
        verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound"],
        nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science"],
        adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives"],
        key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice"]
    },
    pro:{
        grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals"],
        verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations"],
        nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic"],
        adjectives:["Formal Register Adj.","Nuance & Tone Adj."],
        key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives"]
    }
};

const NEW_LEVELS = ["B1", "B2", "B-MIX", "A1", "A2", "A-MIX", "P1", "P2", "P-MIX"];
const NEW_CATS = [
    { id: 'grammar', label: 'Grammar' },
    { id: 'verbs', label: 'Verb Mastery' },
    { id: 'nouns', label: 'Noun Mastery' },
    { id: 'adjectives', label: 'Vocab Mastery (Adj)' },
    { id: 'key_structs', label: 'Key Structures' },
    { id: 'otro', label: 'Otro (Macro Skills)' }
];
const MACRO_SKILLS = ["Speaking", "Listening", "Reading", "Grammar", "Vocabulary", "Pronunciation"];

const getAllTopicsForCategory = (categoryId, selectedLevels) => {
    let topics = [];
    const activeDbKeys = new Set();
    selectedLevels.forEach(lvl => {
        if (lvl.startsWith('B')) activeDbKeys.add('basic');
        if (lvl.startsWith('A')) activeDbKeys.add('advanced');
        if (lvl.startsWith('P')) activeDbKeys.add('pro');
    });

    activeDbKeys.forEach(dbKey => {
        if (TAXONOMY[dbKey] && TAXONOMY[dbKey][categoryId]) {
            topics.push(...TAXONOMY[dbKey][categoryId]);
        }
    });
    return [...new Set(topics)]; 
};

const toggleSelection = (stateArray, setStateFunction, item) => {
    if (stateArray.includes(item)) {
        setStateFunction(stateArray.filter(i => i !== item));
    } else {
        setStateFunction([...stateArray, item]);
    }
};

const Q_TYPES = {
    mc: { id: 'multipleChoice', name: 'Opción Múltiple', format: '{"question":"...","options":["A","B","C","D"],"correct":int(0-3)}' },
    dad: { id: 'dragDrop', name: 'Drag & Drop', format: '{"sentence":"I [BLANK] to the store.","options":["wrong1","correct","wrong2"],"correct":"correct"}' },
    scr: { id: 'unscramble', name: 'Unscramble', format: '{"text":"Correct English sentence","translation":"Spanish translation"}' },
    fib: { id: 'fillBlank', name: 'Fill Blank', format: '{"sentence":"Sentence with a [BLANK].","answer":"correct_word","hint":"w _ _ _ (starts with w, 4 letters)"}' },
    mat: { id: 'matching', name: 'Matching', format: 'Each item is a set of 4-5 pairs. {"pairs":[{"left":"English term","right":"Spanish/Matching half"}, ...]}' },
    err: { id: 'errorCorrection', name: 'Error Correction', format: '{"sentence":"Sentence with ONE error.","error":"wrong word","correction":"right word"}' },
    odd: { id: 'oddOneOut', name: 'Odd One Out', format: '{"words":["word1","word2","oddWord","word3"],"odd":"oddWord","reason":"Explanation in Spanish"}' },
    spk: { id: 'speaking', name: 'Speaking', format: '{"spanish":"Sentence to translate","english":"Expected translation"}' },
    lis: { id: 'listening', name: 'Listening', format: '{"audioText":"Text for TTS","answer":"Expected translation"}' },
    rol: { id: 'roleplay', name: 'Roleplay', format: '{"situation":"Spanish scenario","expected":"English response"}' }
};

// ============================================================
// CONTENT EDITOR & MODAL GUARDADO
// ============================================================
const ContentEditor=({content,onSaveToFirebase,title,setTitle,isEditing,initialTags})=>{
    const[ec,setEc]=useState(content);
    const tabs = Object.keys(ec).filter(k => Array.isArray(ec[k]) && ec[k].length > 0);
    const[tab,setTab]=useState(tabs[0] || '');
    const hc=(s,i,f,v)=>{const u={...ec};u[s][i][f]=v;setEc(u)};
    
    // Modal State
    const [showSaveModal, setShowSaveModal] = useState(false);
    const [saveLevels, setSaveLevels] = useState(initialTags?.levels || (initialTags?.level ? [initialTags.level.toUpperCase()] : []));
    const [saveCats, setSaveCats] = useState(initialTags?.categories || (initialTags?.category ? [initialTags.category] : []));
    const [saveTopics, setSaveTopics] = useState(initialTags?.topics || (initialTags?.topic ? [initialTags.topic] : []));
    const [isSaving, setIsSaving] = useState(false);

    const handleConfirmSave = () => {
        setIsSaving(true);
        const finalTags = { levels: saveLevels, categories: saveCats, topics: saveTopics };
        onSaveToFirebase(ec, finalTags).finally(() => setIsSaving(false));
    };

    return(
        <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 relative">
            
            {/* MODAL DE CLASIFICACIÓN (El mismo de Reading) */}
            {showSaveModal && (
                <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                        <div className="flex justify-between items-center mb-6 shrink-0">
                            <h2 className="text-xl font-black flex items-center gap-2 text-white"><Tags className="text-indigo-400"/> Clasificar Boardgame</h2>
                            <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition"><X size={20}/></button>
                        </div>
                        
                        <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">
                            {/* PASO 1: NIVELES */}
                            <div>
                                <label className="block text-xs font-black text-indigo-400 uppercase tracking-widest mb-3">1. Niveles Comerciales (Portal)</label>
                                <div className="flex flex-wrap gap-2">
                                    {NEW_LEVELS.map(lvl => (
                                        <button key={lvl} onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)} className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-indigo-500 hover:text-indigo-300'}`}>
                                            {lvl}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* PASO 2: CATEGORÍAS */}
                            <div>
                                <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categorías</label>
                                <div className="flex flex-wrap gap-2">
                                    {NEW_CATS.map(cat => (
                                        <button key={cat.id} onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)} className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                            {cat.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* PASO 3: TEMAS FILTRADOS */}
                            {saveCats.length > 0 && saveLevels.length > 0 && (
                                <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                    <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">3. Temas Específicos Evaluados</label>
                                    {saveCats.map(catId => {
                                        if (catId === 'otro') return null;
                                        const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                        const topics = getAllTopicsForCategory(catId, saveLevels);
                                        if (topics.length === 0) return null;
                                        return (
                                            <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {topics.map(topic => (
                                                        <button key={topic} onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)} className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>
                                                            {topic}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {saveCats.includes('otro') && (
                                        <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                                            <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades (Otro)</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {MACRO_SKILLS.map(skill => (
                                                    <button key={skill} onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)} className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-500 text-zinc-900 shadow-sm' : 'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}>
                                                        {skill}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <button onClick={handleConfirmSave} disabled={isSaving || saveLevels.length === 0 || saveCats.length === 0} className="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:bg-zinc-800 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                            {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} 
                            {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar en BD"}
                        </button>
                    </div>
                </div>
            )}

            {/* HEADER EDITOR FINAL */}
            <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shrink-0 border-b border-slate-200 dark:border-zinc-800 shadow-sm gap-3 z-10">
                <h2 className="text-lg font-black flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><Edit3 size={20}/>{isEditing?"Editar Banco":"Revisión Final"}</h2>
                <div className="flex gap-3">
                    <button onClick={()=>window.location.reload()} className="btn-juicy bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 px-4 py-2 rounded-xl font-bold text-sm text-slate-600 dark:text-zinc-300">Cancelar</button>
                    <button onClick={()=>{
                        if(!title) return alert("Por favor ponle un título al banco de juegos.");
                        setShowSaveModal(true);
                    }} className="btn-juicy bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 text-sm shadow-lg"><Save size={16}/>{isEditing?"Clasificar y Actualizar":"Clasificar y Guardar"}</button>
                </div>
            </div>

            <div className="p-6 md:p-8 flex-1 overflow-y-auto custom-scrollbar">
                <div className="max-w-4xl mx-auto bg-white dark:bg-zinc-900 rounded-[2rem] shadow-xl border border-slate-100 dark:border-zinc-800 p-8">
                    <div className="mb-8">
                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Título del Banco de Preguntas</label>
                        <input value={title} onChange={e=>setTitle(e.target.value)} className="text-2xl font-black w-full bg-transparent outline-none border-b border-transparent focus:border-indigo-500 pb-1 dark:text-white" placeholder="Ej: Challenge Level 1..."/>
                    </div>

                    <div className="flex gap-2 border-b border-slate-200 dark:border-zinc-800 mb-6 overflow-x-auto custom-scrollbar">
                        {tabs.map(t=>(<button key={t} onClick={()=>setTab(t)} className={`px-4 py-2.5 font-bold capitalize text-sm border-b-4 transition-all whitespace-nowrap ${tab===t?'border-indigo-500 text-indigo-600 dark:text-indigo-400':'border-transparent text-slate-500 hover:text-slate-700 dark:text-zinc-500 dark:hover:text-zinc-300'}`}>{t} ({ec[t]?.length||0})</button>))}
                    </div>
                    
                    <div className="space-y-4">
                        {tab==='multipleChoice'&&ec.multipleChoice?.map((item,i)=>(
                            <div key={i} className="p-5 bg-slate-50 dark:bg-zinc-950/50 rounded-xl border border-slate-200 dark:border-zinc-800 relative group">
                                <input value={item.question} onChange={e=>hc('multipleChoice',i,'question',e.target.value)} className="w-full p-2 mb-4 border-b border-slate-200 dark:border-zinc-700 bg-transparent font-bold outline-none focus:border-indigo-500 dark:text-white"/>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{item.options.map((opt,oi)=>(
                                    <div key={oi} className={`flex items-center gap-2 p-3 rounded-lg border transition-colors ${oi===item.correct?'bg-emerald-50 border-emerald-200 dark:bg-emerald-900/30 dark:border-emerald-800':'bg-white border-slate-200 dark:bg-zinc-900 dark:border-zinc-700'}`}>
                                        <button onClick={()=>{const u={...ec};u.multipleChoice[i].correct=oi;setEc(u)}} className="shrink-0">{oi===item.correct?<CheckCircle2 className="text-emerald-500" size={20}/>:<Circle className="text-slate-300 dark:text-zinc-600" size={20}/>}</button>
                                        <input value={opt} onChange={e=>{const u={...ec};u.multipleChoice[i].options[oi]=e.target.value;setEc(u)}} className="w-full text-sm font-medium bg-transparent outline-none dark:text-white"/>
                                    </div>
                                ))}</div>
                            </div>
                        ))}
                        {tab!=='multipleChoice' && <div className="p-6 text-center text-slate-500 border-2 border-dashed rounded-xl dark:border-zinc-800">Visualización en desarrollo (Datos guardados correctamente).</div>}
                    </div>
                </div>
            </div>
        </div>
    );
};

// ============================================================
// MAIN DASHBOARD
// ============================================================
const Dashboard=()=>{
    const[apiKey,setApiKey]=useState(localStorage.getItem('periplo_google_key')||'');
    const[showApiInput, setShowApiInput] = useState(false);
    
    const[gameTitle,setGameTitle]=useState('');
    const[globalContext,setGlobalContext]=useState('');
    const[selectedLevel,setSelectedLevel]=useState('basic');
    const[selectedCat,setSelectedCat]=useState('grammar');
    
    const[showConfig,setShowConfig]=useState(false);
    const[qConfig,setQConfig]=useState({ mc: 0, dad: 0, scr: 0, fib: 0, mat: 0, err: 0, odd: 0, spk: 0, lis: 0, rol: 0 });

    const[bucketItems,setBucketItems]=useState({});
    const[activeBucket,setActiveBucket]=useState(null);

    const[isGenerating,setIsGenerating]=useState(false);
    const[generatedContent,setGeneratedContent]=useState(null);
    const[existingTags,setExistingTags]=useState(null); // Tags de Firebase
    const[editingId,setEditingId]=useState(null);
    const[isLoading,setIsLoading]=useState(false);
    
    const[models,setModels]=useState([]);
    const[selModel,setSelModel]=useState('');
    const[loadingModels,setLoadingModels]=useState(false);

    useEffect(()=>{
        const init=async()=>{
            const p=new URLSearchParams(window.location.search);const eid=p.get('edit');
            if(eid){
                setIsLoading(true);
                try{
                    const s=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',eid));
                    if(s.exists()){
                        const d=s.data();
                        setGeneratedContent(d.content);
                        setGameTitle(d.title);
                        setEditingId(eid);
                        if(d.tags) setExistingTags(d.tags);
                    }
                }catch(e){alert(e.message)}
                setIsLoading(false);
            }
        };init();
    },[]);

    useEffect(()=>{
        const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
        if (activeKeys.length > 0 && !activeKeys.includes(activeBucket)) setActiveBucket(activeKeys[0]);
        else if (activeKeys.length === 0) setActiveBucket(null);
    }, [qConfig]);

    const toggleIngredient=(topic)=>{
        if(!activeBucket) return alert("Configura y selecciona un tipo de pregunta activo a la derecha primero.");
        setBucketItems(prev=>{
            const current = prev[activeBucket] || [];
            if(current.includes(topic)) return {...prev, [activeBucket]: current.filter(t=>t!==topic)};
            return {...prev, [activeBucket]: [...current, topic]};
        });
    };

    const removeIngredient=(bucketKey, topic)=>{
        setBucketItems(prev=>{
            const current = prev[bucketKey] || [];
            return {...prev, [bucketKey]: current.filter(t=>t!==topic)};
        });
    };

    const updateQConfig=(key,val)=>{setQConfig(prev=>({...prev,[key]:parseInt(val)}))};

    const fetchModels=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key de Gemini");setLoadingModels(true);
        try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);if(!r.ok)throw new Error("Error API");const d=await r.json();
        const v=d.models.filter(m=>m.supportedGenerationMethods?.includes("generateContent")).map(m=>m.name);setModels(v);
        if(v.length>0)setSelModel(v.find(m=>m.includes("gemini-2.5-flash"))||v.find(m=>m.includes("gemini-2.0"))||v[0]);
        }catch(e){alert(e.message)}setLoadingModels(false);
    };

    const generate=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");
        if(!selModel)return alert("Escanea modelos primero (Botón Lupa)");
        
        const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
        if(activeKeys.length === 0) return alert("Configura al menos 1 pregunta en el engranaje ⚙️");

        setIsGenerating(true);
        
        let prompt=`You are an expert ESL test creator. Create a JSON object for an educational boardgame bank.\n\n`;
        if(globalContext.trim().length > 0) {
            prompt += `GLOBAL CONTEXT & NARRATIVE (Level: ${selectedLevel}):\n"${globalContext}"\n*(Apply this narrative context to all sentences and scenarios. Extract the specific vocabulary/topics strictly from this text).*\n\n`;
        }

        prompt += `Generate EXACTLY these quantities and types:\n`;
        activeKeys.forEach(k => {
            const typeInfo = Q_TYPES[k];
            const topics = bucketItems[k]?.join(', ') || 'General mixed English';
            prompt += `- '${typeInfo.id}' array: ${qConfig[k]} items. Evaluate STRICTLY: [${topics}]. Format: ${typeInfo.format}\n`;
        });

        prompt += `\nOutput STRICT JSON containing ONLY the requested arrays. Do not include markdown formatting or explanations.`;

        try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/${selModel}:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseMimeType:"application/json"}})});
        const d=await r.json();if(d.error)throw new Error(d.error.message);if(!d.candidates?.[0]?.content)throw new Error("Sin resultados.");
        const t=d.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();setGeneratedContent(JSON.parse(t));
        }catch(e){alert("Error: "+e.message)}setIsGenerating(false);
    };

    // Nueva función que recibe los tags ESTANDARIZADOS desde el Modal del ContentEditor
    const saveToFirebase=async(finalContent, finalTags)=>{
        try{
            let proc={...finalContent};
            if(proc.unscramble) { proc.unscramble = proc.unscramble.map(s=>{let t=s.text.replace(/\//g,'').replace(/[()]/g,'');t=t.charAt(0).toUpperCase()+t.slice(1);if(!t.endsWith('.'))t+='.';return{...s,text:t,words:t.split(' ').filter(w=>w.trim())}}); }
            
            const p=new URLSearchParams(window.location.search);const fp=p.get('folder');
            const pp=(fp&&fp!=='undefined'&&fp!=='null')?decodeURIComponent(fp):'';
            
            if(editingId){
                await updateDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',editingId),{
                    title:gameTitle, content:proc, tags:finalTags, updatedAt:serverTimestamp()
                });
            }else{
                await addDoc(collection(db,'artifacts','periplo-app-v1','users','teacher_builder_001','quizzes'),{
                    title:gameTitle, type:'BOARDGAME_BANK', content:proc, tags:finalTags, createdAt:serverTimestamp(), parentPath:pp
                });
            }
            window.location.href=pp?`index.html?folder=${encodeURIComponent(pp)}`:'index.html';
        }catch(e){alert(e.message)}
    };

    if(isLoading)return<div className="h-[100dvh] flex items-center justify-center bg-slate-50 dark:bg-zinc-950 text-indigo-500"><Loader2 className="animate-spin mr-2"/>Cargando...</div>;
    
    // Si ya hay contenido generado, mostramos el Editor Final (que ahora incluye el Modal de Guardado Comercial)
    if(generatedContent)return<ContentEditor content={generatedContent} onSaveToFirebase={saveToFirebase} title={gameTitle} setTitle={setGameTitle} isEditing={!!editingId} initialTags={existingTags}/>;

    const currentTopics=TAXONOMY[selectedLevel]?.[selectedCat]||[];
    const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
    const totalQ = Object.values(qConfig).reduce((a,b)=>a+b,0);

    return(
        <div className="h-[100dvh] flex flex-col text-slate-800 dark:text-zinc-100 bg-slate-50 dark:bg-zinc-950">
            {/* MODAL CONFIG */}
            {showConfig && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-700 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-lg font-black flex items-center gap-2 dark:text-white"><Settings2 className="text-indigo-500"/>Asignar Cantidades</h2>
                            <button onClick={()=>setShowConfig(false)} className="btn-juicy text-slate-400 hover:text-slate-600 dark:hover:text-white"><X size={20}/></button>
                        </div>
                        <div className="space-y-3 mb-6 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                            {Object.entries(Q_TYPES).map(([k, t])=>(
                                <div key={k} className="flex items-center justify-between bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl border border-slate-200 dark:border-zinc-800">
                                    <label className="text-xs font-bold text-slate-600 dark:text-zinc-300 ml-2">{t.name}</label>
                                    <div className="flex items-center gap-3">
                                        <input type="range" min="0" max="20" value={qConfig[k]} onChange={e=>updateQConfig(k,e.target.value)} className="w-20 accent-indigo-500"/>
                                        <span className={`text-sm font-black w-6 text-right ${qConfig[k]>0?'text-indigo-500':'text-slate-400 dark:text-zinc-600'}`}>{qConfig[k]}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>setShowConfig(false)} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-black shadow-lg">Confirmar ({totalQ} Qs)</button>
                    </div>
                </div>
            )}

            {/* HEADER ESTANDARIZADO */}
            <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-sm z-10 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                <div className="flex items-center gap-4">
                    <button onClick={()=>window.location.href='index.html'} className="p-2 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl transition"><ArrowLeft size={20}/></button>
                    <h1 className="text-xl font-black flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><Dices/> Boardgames Builder</h1>
                </div>
                
                <div className="flex items-center gap-4">
                    {showApiInput && (
                        <div className="flex items-center gap-2">
                            <input type="password" placeholder="Tu API Key de Gemini..." value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem('periplo_google_key',e.target.value)}} className="bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 dark:text-white rounded-lg px-3 py-2 text-xs font-mono w-40 focus:border-indigo-500 outline-none"/>
                            <button onClick={fetchModels} disabled={loadingModels||!apiKey} className="p-2 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-200 dark:hover:bg-indigo-900/80 rounded-lg transition-colors">{loadingModels?<Loader2 className="animate-spin" size={16}/>:<Search size={16}/>}</button>
                            {models.length>0&&<select value={selModel} onChange={e=>setSelModel(e.target.value)} className="bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-lg px-2 py-2 text-[10px] dark:text-white max-w-[120px] outline-none">{models.map(m=><option key={m} value={m}>{m.replace('models/','')}</option>)}</select>}
                        </div>
                    )}
                    <button onClick={() => setShowApiInput(!showApiInput)} className="text-slate-400 hover:text-indigo-500 transition"><KeyRound size={20}/></button>
                </div>
            </div>

            <div className="flex flex-1 flex-col lg:flex-row overflow-hidden">
                
                {/* LEFT PANEL: TAXONOMÍA (Generación Interna de IA) */}
                <div className="w-full lg:w-1/3 bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 flex flex-col h-[40%] lg:h-full z-0">
                    <div className="p-6 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                        <h2 className="font-black text-lg mb-4 flex items-center gap-2 dark:text-white"><Sparkles className="text-amber-500"/> Temario Base IA</h2>
                        <div className="flex flex-col gap-3">
                            <div>
                                <select value={selectedLevel} onChange={e=>{setSelectedLevel(e.target.value);setSelectedCat('grammar');}} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold text-sm text-indigo-600 dark:text-indigo-400 cursor-pointer">
                                    {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>Nivel {l.toUpperCase()}</option>)}
                                </select>
                            </div>
                            <div>
                                <select value={selectedCat} onChange={e=>setSelectedCat(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold text-sm cursor-pointer capitalize dark:text-white">
                                    {Object.keys(TAXONOMY[selectedLevel]||{}).filter(k=>(TAXONOMY[selectedLevel][k]||[]).length>0).map(c=><option key={c} value={c}>{c.replace('_',' ')}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-slate-50/50 dark:bg-zinc-900">
                        <p className="text-[10px] text-slate-500 font-bold mb-3 tracking-widest uppercase">Haz clic para evaluar en pestaña activa</p>
                        <div className="space-y-2">
                            {currentTopics.map(topic=>{
                                const isAdded = activeBucket && (bucketItems[activeBucket]||[]).includes(topic);
                                return(
                                    <button key={topic} onClick={()=>toggleIngredient(topic)}
                                        className={`btn-juicy w-full text-left p-4 rounded-xl border-2 font-bold text-sm transition-all ${isAdded?'bg-indigo-50 border-indigo-200 dark:bg-indigo-900/30 dark:border-indigo-700 text-indigo-700 dark:text-indigo-300':'bg-white border-slate-200 dark:bg-zinc-950 dark:border-zinc-800 text-slate-600 dark:text-zinc-400 hover:border-slate-300 dark:hover:border-zinc-600'}`}>
                                        <div className="flex justify-between items-center">
                                            <span>{topic}</span>
                                            {isAdded && <span className="text-[10px] bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded-md uppercase">Agregado</span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* RIGHT PANEL: BUCKETS ACTIVOS Y CONTEXTO */}
                <div className="flex-1 bg-slate-50 dark:bg-zinc-950 flex flex-col h-[60%] lg:h-full relative">
                    {/* CONTEXTO GLOBAL */}
                    <div className="p-6 md:p-8 pb-4 shrink-0">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2 block"><MessageSquare size={16} className="text-indigo-500"/> Contexto Global & Narrativa (Opcional)</label>
                        <textarea 
                            value={globalContext} 
                            onChange={e=>setGlobalContext(e.target.value)} 
                            placeholder="Ej: Ambientado en una estación espacial. Usa vocabulario de ciencia ficción..."
                            className="w-full bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl p-4 text-sm font-medium outline-none focus:border-indigo-500 resize-none h-20 custom-scrollbar dark:text-white"
                        ></textarea>
                    </div>

                    {/* TABS DE BUCKETS ACTIVOS */}
                    <div className="flex items-center px-6 md:px-8 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                        <button onClick={()=>setShowConfig(true)} className="btn-juicy p-3 mr-4 rounded-lg bg-slate-200 dark:bg-zinc-800 hover:bg-slate-300 dark:hover:bg-zinc-700 text-slate-600 dark:text-zinc-300 transition-colors mb-2" title="Configurar Cantidades">
                            <Settings2 size={18}/>
                        </button>
                        <div className="flex-1 overflow-x-auto flex gap-4 custom-scrollbar pb-2">
                            {activeKeys.length === 0 ? (
                                <div className="py-2 text-sm font-bold text-slate-400 italic">Haz clic en el engranaje para configurar preguntas y habilitar pestañas.</div>
                            ) : (
                                activeKeys.map(k => (
                                    <button 
                                        key={k} 
                                        onClick={()=>setActiveBucket(k)} 
                                        className={`px-4 py-2 font-bold text-sm rounded-lg whitespace-nowrap transition-all flex items-center gap-2 ${activeBucket===k ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-400' : 'bg-transparent text-slate-500 hover:bg-slate-200 dark:hover:bg-zinc-800 dark:text-zinc-400'}`}
                                    >
                                        {Q_TYPES[k].name} <span className="bg-white dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 px-1.5 rounded text-[10px]">{qConfig[k]}</span>
                                    </button>
                                ))
                            )}
                        </div>
                    </div>

                    {/* CONTENIDO DEL BUCKET ACTIVO */}
                    <div className="flex-1 p-6 md:p-8 overflow-y-auto custom-scrollbar pb-28">
                        {!activeBucket ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 dark:border-zinc-800 rounded-3xl bg-white/50 dark:bg-zinc-900/50">
                                <ShoppingCart size={48} className="mb-4 opacity-50"/>
                                <p className="font-bold text-lg">No hay paneles activos</p>
                                <p className="text-sm mt-1">Usa el engranaje para empezar a diseñar tu juego.</p>
                            </div>
                        ) : (
                            <div className="max-w-2xl">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 border-b border-slate-200 dark:border-zinc-800 pb-2">Temas que evaluará la sección: {Q_TYPES[activeBucket].name}</h3>
                                
                                {!(bucketItems[activeBucket]?.length > 0) ? (
                                    <div className="p-8 border border-dashed border-slate-300 dark:border-zinc-700 rounded-2xl text-center text-slate-500 bg-white/50 dark:bg-zinc-900/50">
                                        <p className="font-bold text-sm mb-1">El panel está vacío.</p>
                                        <p className="text-xs font-medium opacity-80">Haz clic en los temas de la columna izquierda para agregarlos a este grupo. Si lo dejas vacío, la IA generará contenido general.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {bucketItems[activeBucket].map(topic => (
                                            <div key={topic} className="flex justify-between items-center p-4 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl shadow-sm group">
                                                <span className="font-bold text-sm text-slate-700 dark:text-zinc-200">{topic}</span>
                                                <button onClick={()=>removeIngredient(activeBucket, topic)} className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 p-1.5 rounded-md transition-colors"><Trash2 size={18}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* GENERATE BUTTON */}
                    <div className="absolute bottom-6 left-6 right-6 z-20 md:left-8 md:right-8">
                        <button onClick={generate} disabled={isGenerating||activeKeys.length===0} className="btn-juicy w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-indigo-500 transition-transform active:scale-95 flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed shadow-xl">
                            {isGenerating?<><Loader2 className="animate-spin"/>Cocinando JSON con IA...</>:<><Zap className="fill-amber-400 text-amber-400"/>GENERAR BANCO DE JUEGO ({totalQ} Qs)</>}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>

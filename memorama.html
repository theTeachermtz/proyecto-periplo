<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memorama | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .safari-text-fix { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; overflow-wrap: break-word; }
        @keyframes pop-in { 0%{opacity:0;transform:scale(.85)} 70%{transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
        .animate-pop-in { animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes fade-in { from{opacity:0} to{opacity:1} }
        .animate-fade-in { animation: fade-in 0.3s ease forwards; }
        .btn-juicy { transition: transform 0.15s cubic-bezier(0.4,0,0.2,1); }
        .btn-juicy:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from 'firebase/firestore';
        import { Check, X, Award, Home, Layers, Users, ArrowRight, ArrowLeft, Loader2, User, Play, Crown, Volume2, BookOpen, Link as LinkIcon, Trophy, Pause, RotateCcw, AlertTriangle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const appId = 'periplo-app-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================
        // NAVEGACIÓN INTELIGENTE — función global para todos los componentes
        // ============================================================
        const goBack = () => {
            const ref = document.referrer;
            if (ref && ref.includes('student_portal.html')) {
                window.location.href = ref;
            } else {
                window.location.href = 'index.html';
            }
        };

        const PLAYER_COLORS = {
            1: { bg: 'bg-sky-500', text: 'text-sky-400', border: 'border-sky-500', ring: 'ring-sky-500', light: 'bg-sky-500/20', glow: 'shadow-sky-500/30' },
            2: { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500', ring: 'ring-rose-500', light: 'bg-rose-500/20', glow: 'shadow-rose-500/30' },
            3: { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500', ring: 'ring-amber-500', light: 'bg-amber-500/20', glow: 'shadow-amber-500/30' },
            4: { bg: 'bg-violet-500', text: 'text-violet-400', border: 'border-violet-500', ring: 'ring-violet-500', light: 'bg-violet-500/20', glow: 'shadow-violet-500/30' },
        };

        const shuffleArray = (array) => { const a = [...array]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

        const parseQuizWords = (data) => {
            const rawWords = data.content?.cards || data.content?.pairs || [];
            return rawWords.map((w, i) => ({
                id: w.id || `word-${i}`, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || w.c2 || '🎯'
            })).filter(w => w.wordEn);
        };

        const buildRoundsFromWords = (wordsArray) => {
            let pool = [...wordsArray];
            if (pool.length > 30) { pool = shuffleArray(pool).slice(0, 30); }
            else { let fillIndex = 0; const shuffled = shuffleArray([...wordsArray]); while (pool.length < 30) { pool.push({ ...shuffled[fillIndex % shuffled.length] }); fillIndex++; } }
            pool = shuffleArray(pool);
            const final = pool.map((w, idx) => ({ ...w, instanceId: `inst-${idx}` }));
            return [final.slice(0, 15), final.slice(15, 30)];
        };

        const buildDeckFromRound = (wordsArray) => {
            let cards = [];
            wordsArray.forEach((item) => {
                cards.push({ uniqueId: `${item.instanceId}-en`, pairId: item.id, text: item.wordEn, emoji: item.emojis, type: 'en', audioText: item.wordEn });
                cards.push({ uniqueId: `${item.instanceId}-es`, pairId: item.id, text: item.wordEs, emoji: item.emojis, type: 'es', audioText: item.wordEn });
            });
            return shuffleArray(cards);
        };

        const playAudio = (text) => { if ('speechSynthesis' in window && text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); } };
        const getNextTurn = (current, activePlayers) => { const idx = activePlayers.indexOf(current); if (idx === -1) return activePlayers[0]; return activePlayers[(idx + 1) % activePlayers.length]; };

        const Toast = ({ msg }) => msg ? (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-full font-black text-sm shadow-xl z-[120] animate-pop-in flex items-center gap-2">
                <Check size={16} /> {msg}
            </div>
        ) : null;

        const WordListOverlay = ({ words, onClose }) => (
            <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8 animate-fade-in">
                <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                    <div className="flex items-center justify-between mb-6 shrink-0">
                        <h2 className="text-2xl sm:text-3xl font-black text-white">Vocabulario</h2>
                        <button onClick={onClose} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white transition-colors"><X size={20} /></button>
                    </div>
                    <div className="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar pb-6">
                        {words.map(card => (
                            <div key={card.id} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">{card.emojis}</div>
                                <div className="flex-grow w-full">
                                    <h4 className="text-lg font-black text-white">{card.wordEn}</h4>
                                    <p className="text-emerald-500 font-bold text-sm mb-1">{card.wordEs}</p>
                                    {card.exampleEn && <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const CardGrid = ({ deck, flippedIndices, errorIndices = [], matchedUniqueIds, onCardClick, isLocked, cols = 'grid-cols-5 md:grid-cols-6 lg:grid-cols-10' }) => (
            <div className={`grid ${cols} gap-2 sm:gap-3 w-full`}>
                {deck.map((card, index) => {
                    const isFlipped = flippedIndices.includes(index);
                    const isMatched = matchedUniqueIds.includes(card.uniqueId);
                    const isError = errorIndices.includes(index);
                    const isVisible = isFlipped || isMatched || isError;
                    const frontBg = isMatched ? 'bg-emerald-900/50 border-emerald-600/50' : isError ? 'bg-rose-900/50 border-rose-600/50' : 'bg-zinc-800 border-zinc-700';
                    return (
                        <div key={card.uniqueId} onClick={() => !isLocked && !isMatched && onCardClick(index)}
                            className={`perspective relative aspect-[3/4] rounded-xl cursor-pointer transition-all duration-150 ${isMatched ? 'opacity-60 cursor-default' : !isLocked ? 'hover:scale-105 active:scale-95' : 'cursor-default'}`}>
                            <div className={`preserve-3d relative w-full h-full transition-transform duration-500 ${isVisible ? 'rotate-y-180' : ''}`}>
                                <div className="backface-hidden absolute inset-0 bg-emerald-600 rounded-xl flex items-center justify-center border-2 border-emerald-500/50 shadow-lg">
                                    <span className="text-2xl sm:text-3xl select-none">🃏</span>
                                </div>
                                <div className={`backface-hidden rotate-y-180 absolute inset-0 ${frontBg} rounded-xl flex flex-col items-center justify-center p-1.5 border-2 shadow-md gap-1`}>
                                    <span className="text-xl sm:text-2xl select-none leading-none">{card.emoji}</span>
                                    <span className={`font-black text-center leading-tight w-full safari-text-fix ${card.text.length > 12 ? 'text-[9px] sm:text-[10px]' : 'text-[10px] sm:text-xs'} ${isMatched ? 'text-emerald-400' : isError ? 'text-rose-300' : 'text-zinc-200'}`}>
                                        {card.text}
                                    </span>
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>
        );

        // ═══════════════════════════════════════════════
        //  MODO SINGLEPLAYER
        // ═══════════════════════════════════════════════
        const SinglePlayerGame = ({ quizData, fullWordList, isStudent, quizId }) => {
            const [gameStarted, setGameStarted] = useState(false);
            const [playerName, setPlayerName] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            const [showWordList, setShowWordList] = useState(false);
            const [roundsData, setRoundsData] = useState([]);
            const [currentRound, setCurrentRound] = useState(0);
            const [roundTransition, setRoundTransition] = useState(false);
            const [globalWin, setGlobalWin] = useState(false);
            const [deck, setDeck] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [errorIndices, setErrorIndices] = useState([]);
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [moves, setMoves] = useState(0);
            const [isLocked, setIsLocked] = useState(false);

            useEffect(() => {
                const rounds = buildRoundsFromWords(fullWordList);
                setRoundsData(rounds);
                setDeck(buildDeckFromRound(rounds[0]));
            }, []);

            const prepareDeck = (wordsArray) => {
                setDeck(buildDeckFromRound(wordsArray));
                setFlippedIndices([]); setErrorIndices([]); setMatchedPairs([]); setIsLocked(false);
            };

            const handleCardClick = (index) => {
                const card = deck[index];
                if (!gameStarted || isLocked || flippedIndices.includes(index) || errorIndices.includes(index) || matchedPairs.includes(card.uniqueId)) return;
                if (card.type === 'en') playAudio(card.audioText);
                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);
                if (newFlipped.length === 2) {
                    setIsLocked(true); setMoves(m => m + 1);
                    const [idx1, idx2] = newFlipped;
                    const c1 = deck[idx1], c2 = deck[idx2];
                    if (c1.pairId === c2.pairId && c1.type !== c2.type) {
                        setTimeout(() => {
                            const newMatched = [...matchedPairs, c1.uniqueId, c2.uniqueId];
                            setMatchedPairs(newMatched); setFlippedIndices([]); setIsLocked(false);
                            if (newMatched.length === deck.length) {
                                if (currentRound === 0 && roundsData[1]) { setRoundTransition(true); }
                                else { setGlobalWin(true); }
                            }
                        }, 600);
                    } else {
                        setErrorIndices(newFlipped);
                        setTimeout(() => { setFlippedIndices([]); setErrorIndices([]); setIsLocked(false); }, 1000);
                    }
                }
            };

            const startRound2 = () => {
                setRoundTransition(false); setCurrentRound(1);
                setMoves(0); prepareDeck(roundsData[1]);
            };

            const handleRestart = () => {
                const rounds = buildRoundsFromWords(fullWordList);
                setRoundsData(rounds); setCurrentRound(0); setMoves(0);
                setGlobalWin(false); setRoundTransition(false);
                prepareDeck(rounds[0]);
            };

            if (!gameStarted) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center z-10 animate-pop-in">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                            <h1 className="text-3xl font-black text-emerald-500 mb-2">{quizData?.title || 'Memorama'}</h1>
                            <p className="text-zinc-400 mb-8 font-medium">Ingresa tu nombre para comenzar.</p>
                            <input type="text" placeholder="Tu nombre..." value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && setGameStarted(true)}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-emerald-500 transition-colors" style={{ fontSize: '16px' }} />
                            <button disabled={!playerName.trim()} onClick={() => setGameStarted(true)}
                                className="w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest">
                                Empezar Juego
                            </button>
                            {/* goBack en lugar de index.html */}
                            <button onClick={goBack} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                Regresar
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">
                    <Toast msg={toastMsg} />

                    {/* TRANSICIÓN RONDA 2 */}
                    {roundTransition && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                            <div className="bg-zinc-900 border border-emerald-500/30 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Layers className="w-24 h-24 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Ronda 1 Superada!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Gran trabajo, {playerName}. ¡Vamos por los últimos 15 pares!</p>
                                <button onClick={startRound2} className="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-base uppercase tracking-widest">
                                    Siguiente Ronda ➡️
                                </button>
                            </div>
                        </div>
                    )}

                    {/* VICTORIA GLOBAL */}
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                            <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Award className="w-24 h-24 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Completado, {playerName}!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Lo lograste en {moves} movimientos totales.</p>
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => setShowWordList(true)} className="w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">📖 REPASAR VOCABULARIO</button>
                                    <button onClick={handleRestart} className="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">🔄 JUGAR OTRA VEZ</button>
                                    {/* goBack en lugar de index.html */}
                                    <button onClick={goBack} className="mt-2 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">SALIR</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showWordList && <WordListOverlay words={fullWordList} onClose={() => setShowWordList(false)} />}

                    {/* HEADER — Home usa goBack, se elimina Share2 */}
                    <header className="p-4 sm:p-6 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/50 backdrop-blur-md z-40">
                        <div className="flex items-center gap-3 min-w-0">
                            <button onClick={() => { sessionStorage.clear(); goBack(); }} className="p-2.5 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700 shrink-0"><Home size={20}/></button>
                            <div className="w-px h-8 bg-zinc-800 mx-1 hidden sm:block"></div>
                            <div className="min-w-0 ml-2">
                                <h1 className="text-lg font-black text-emerald-500 leading-none tracking-tight truncate">{quizData?.title || 'Memorama'}</h1>
                                <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Modo: Solitario • Ronda {currentRound + 1} de 2</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3 shrink-0">
                            <div className="flex flex-col items-end sm:items-center sm:flex-row gap-1 sm:gap-3 bg-zinc-900 border border-zinc-800 px-3 sm:px-4 py-2 rounded-xl">
                                <span className="text-zinc-400 font-black text-[10px] sm:text-xs uppercase tracking-widest">Pares: <span className="text-emerald-500">{matchedPairs.length / 2}/15</span></span>
                                <div className="w-1 h-1 bg-zinc-700 rounded-full hidden sm:block"></div>
                                <span className="text-zinc-400 font-black text-[10px] sm:text-xs uppercase tracking-widest">Movs: <span className="text-white">{moves}</span></span>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 w-full overflow-y-auto custom-scrollbar p-2 sm:p-4 md:p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
                        <div className="max-w-7xl mx-auto w-full pb-10">
                            <CardGrid deck={deck} flippedIndices={flippedIndices} errorIndices={errorIndices} matchedUniqueIds={matchedPairs} onCardClick={handleCardClick} isLocked={isLocked} />
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════
        //  MODO MULTIPLAYER — SISTEMA DE SALAS
        // ═══════════════════════════════════════════════
        const MultiPlayerGame = ({ user, quizId, isStudent }) => {
            const [deckId] = useState(quizId);
            const [roomId, setRoomId] = useState(() => sessionStorage.getItem('memorama_room') || '');
            const [roomData, setRoomData] = useState(null);
            const [joinInput, setJoinInput] = useState('');
            const [localError, setLocalError] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            const [studentName, setStudentName] = useState(localStorage.getItem('periplo_student_name') || '');
            const [showWordList, setShowWordList] = useState(false);
            const [fullWordList, setFullWordList] = useState([]);

            useEffect(() => {
                if (roomId) sessionStorage.setItem('memorama_room', roomId);
                else sessionStorage.removeItem('memorama_room');
            }, [roomId]);

            useEffect(() => {
                const handleVis = () => {
                    if (document.visibilityState === 'visible' && roomId) {
                        getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId)).then(snap => {
                            if (snap.exists()) setRoomData(snap.data());
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVis);
                return () => document.removeEventListener("visibilitychange", handleVis);
            }, [roomId]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlCode = params.get('code');
                if (urlCode) setJoinInput(urlCode.toUpperCase());
            }, []);

            useEffect(() => {
                if (!roomId || !user) { setRoomData(null); return; }
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId);
                const unsub = onSnapshot(roomRef, (snap) => {
                    if (snap.exists()) setRoomData(snap.data());
                    else { setRoomData(null); setLocalError("La sala fue cerrada o no existe."); setRoomId(''); }
                });
                return () => unsub();
            }, [user, roomId]);

            const updateGame = async (updates) => {
                if (!roomId || !user) return;
                try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId), updates); }
                catch (e) { console.error("updateGame error:", e); }
            };

            const handleCreateRoom = async () => {
                if (!user || !deckId) return;
                try {
                    const quizSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId));
                    if (!quizSnap.exists()) { alert("No se encontró el quiz. Regresa al dashboard."); return; }
                    const quizDoc = quizSnap.data();
                    const words = parseQuizWords(quizDoc);
                    setFullWordList(words);
                    const rounds = buildRoundsFromWords(words);
                    const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', code);
                    await setDoc(roomRef, {
                        roomId: code, gameType: 'MEMORAMA', sourceQuizId: deckId, title: quizDoc.title || 'Memorama',
                        gameState: 'MENU', players: { s1: user.uid, j1: null, j2: null, j3: null, j4: null },
                        playerNames: { [user.uid]: 'Mtro Creador' },
                        roundsWords: {
                            0: rounds[0].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId })),
                            1: rounds[1].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId }))
                        },
                        fullWordList: words.map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn })),
                        currentRound: 0, deck: [], flippedIndices: [], errorIndices: [], matchedUniqueIds: [],
                        scores: { 1: 0, 2: 0, 3: 0, 4: 0 }, totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                        lastMatchBy: null, turn: 1, isLocked: false, winner: null, feedbackMessage: null, isPaused: false,
                    });
                    setRoomId(code); setLocalError('');
                } catch (e) { console.error(e); setLocalError("Error al crear la sala."); }
            };

            const handleJoinRoom = () => {
                if (!user || !joinInput) return;
                if (isStudent && !studentName.trim()) { setLocalError("Ingresa tu nombre."); return; }
                localStorage.setItem('periplo_student_name', studentName);
                setRoomId(joinInput.toUpperCase());
            };

            // MENÚ DE SALAS
            if (!roomId || !roomData) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center animate-pop-in">
                            <div className="w-20 h-20 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg mx-auto mb-6">🃏</div>
                            <h1 className="text-2xl font-black text-emerald-500 mb-6">Memorama Multijugador</h1>
                            {localError && <p className="text-rose-400 text-sm font-bold mb-4">{localError}</p>}
                            {isStudent && (
                                <input type="text" placeholder="Tu nombre..." value={studentName} onChange={e => setStudentName(e.target.value)}
                                    className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center font-bold text-white mb-3 outline-none focus:border-emerald-500" style={{ fontSize: '16px' }} />
                            )}
                            <input type="text" placeholder="CÓDIGO DE SALA" value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())}
                                maxLength={4} className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center text-xl font-black text-white mb-3 outline-none focus:border-emerald-500 tracking-widest" style={{ fontSize: '16px' }} />
                            <button onClick={handleJoinRoom} disabled={joinInput.length < 4}
                                className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 text-black font-black py-3 rounded-xl mb-3 uppercase tracking-widest">
                                Unirse a Sala
                            </button>
                            {!isStudent && (
                                <button onClick={handleCreateRoom}
                                    className="btn-juicy w-full bg-zinc-700 hover:bg-zinc-600 text-white font-black py-3 rounded-xl mb-3 uppercase tracking-widest">
                                    Crear Sala
                                </button>
                            )}
                            {/* goBack en lugar de index.html */}
                            <button onClick={goBack} className="mt-4 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">
                                Regresar
                            </button>
                        </div>
                    </div>
                );
            }

            // Vista simple de sala activa (placeholder para multiplayer completo)
            return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col overflow-hidden relative">
                    {showWordList && <WordListOverlay words={roomData.fullWordList || []} onClose={() => setShowWordList(false)} />}
                    <header className="p-4 sm:p-6 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/50 backdrop-blur-md z-40">
                        <div className="flex items-center gap-3 min-w-0">
                            <button onClick={() => { sessionStorage.clear(); goBack(); }} className="p-2.5 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700 shrink-0"><Home size={20}/></button>
                            <div className="min-w-0 ml-2">
                                <h1 className="text-lg font-black text-emerald-500 leading-none tracking-tight truncate">{roomData.title || 'Memorama'}</h1>
                                <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Sala: {roomId}</p>
                            </div>
                        </div>
                    </header>
                    <div className="flex-1 flex items-center justify-center p-6 text-center">
                        <div className="text-zinc-500">
                            <p className="text-4xl mb-4">🃏</p>
                            <p className="font-black text-white text-xl mb-2">Sala {roomId} activa</p>
                            <p className="text-zinc-400 text-sm">Estado: {roomData.gameState}</p>
                            <p className="text-zinc-400 text-xs mt-2">Código de sala copiado y enviado a alumnos.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const FeedbackBanner = ({ message }) => {
            const [visible, setVisible] = useState(false);
            const [text, setText] = useState('');
            const lastTs = useRef(null);
            useEffect(() => {
                if (message?.ts && message.ts !== lastTs.current) {
                    lastTs.current = message.ts; setText(message.text); setVisible(true);
                    const t = setTimeout(() => setVisible(false), 2500); return () => clearTimeout(t);
                }
            }, [message?.ts]);
            if (!visible) return null;
            const bgClass = message.type === 'success' ? 'bg-emerald-500 text-black' : message.type === 'alert' ? 'bg-amber-500 text-black' : 'bg-sky-500 text-white';
            return <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] ${bgClass} px-6 py-2.5 rounded-full font-black text-sm shadow-xl animate-pop-in whitespace-nowrap`}>{text}</div>;
        };

        // ═══════════════════════════════════════════════
        //  APP ROOT — SELECTOR DE MODO
        // ═══════════════════════════════════════════════
        const MemoryApp = () => {
            const [user, setUser] = useState(null);
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const isStudentUrl = params.get('student') === 'true' || params.get('mode') === 'student';
            const hasCode = params.has('code');
            const [quizData, setQuizData] = useState(null);
            const [fullWordList, setFullWordList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [acceptedDisclaimer, setAcceptedDisclaimer] = useState(() => localStorage.getItem('periplo_disclaimer_v1') === 'true');
            const [teacherMode, setTeacherMode] = useState(() => sessionStorage.getItem('memorama_mode') || (hasCode || isStudentUrl ? 'multi' : null));

            useEffect(() => {
                if (teacherMode) sessionStorage.setItem('memorama_mode', teacherMode);
                else sessionStorage.removeItem('memorama_mode');
            }, [teacherMode]);

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.error(e));
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u && quizId && !hasCode && !isStudentUrl) {
                        getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                            if (snap.exists()) { const data = snap.data(); setQuizData(data); setFullWordList(parseQuizWords(data)); }
                            else alert("Juego no encontrado");
                            setLoading(false);
                        });
                    } else if (u) { setLoading(false); }
                });
                return () => unsub();
            }, []);

            if (!acceptedDisclaimer) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 text-center overflow-auto">
                    <div className="max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-[2rem] shadow-2xl my-auto animate-pop-in">
                        <div className="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6"><AlertTriangle size={32} className="text-amber-500"/></div>
                        <h2 className="text-xl font-black text-white mb-4 uppercase tracking-widest">Aviso de Compatibilidad</h2>
                        <p className="text-zinc-400 text-sm font-bold mb-4 leading-relaxed">Memorama está altamente optimizado. Sin embargo, si utilizas teléfonos antiguos o <strong className="text-white">Safari en iOS</strong>, algunos textos largos podrían verse cortados.</p>
                        <p className="text-zinc-400 text-sm font-bold mb-8 leading-relaxed">Si experimentas fallos visuales, te recomendamos usar <strong className="text-white">Chrome o jugar en PC/Laptop</strong>. 🚀</p>
                        <button onClick={() => { localStorage.setItem('periplo_disclaimer_v1', 'true'); setAcceptedDisclaimer(true); }}
                            className="btn-juicy w-full bg-emerald-500 text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm flex justify-center items-center gap-2">
                            Entendido, ¡A jugar!
                        </button>
                    </div>
                </div>
            );

            if (loading || !user) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 size={40} className="animate-spin text-emerald-500" /></div>;
            if (isStudentUrl || hasCode || teacherMode === 'multi' || !quizId) return <MultiPlayerGame user={user} quizId={quizId} isStudent={isStudentUrl} />;
            if (teacherMode === 'single') return <SinglePlayerGame quizData={quizData} fullWordList={fullWordList} isStudent={false} quizId={quizId} />;

            // SELECTOR DE MODO para el Maestro — goBack en lugar de index.html
            return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center z-10 animate-pop-in mt-10 sm:mt-0">
                        <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                        <h1 className="text-3xl font-black text-emerald-500 mb-2 leading-tight">Memorama</h1>
                        <p className="text-zinc-400 mb-8 font-medium">¿Cómo quieres jugar hoy?</p>
                        <button onClick={() => setTeacherMode('single')} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-white font-black text-lg py-4 rounded-xl mb-4 transition-all shadow-md active:scale-95 border border-zinc-700 uppercase tracking-widest flex items-center justify-center gap-2">
                            <User size={20} /> Solitario
                        </button>
                        <button onClick={() => setTeacherMode('multi')} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest flex items-center justify-center gap-2">
                            <Users size={20} /> Multijugador
                        </button>
                        {/* goBack en lugar de index.html */}
                        <button onClick={goBack} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                            Regresar
                        </button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MemoryApp />);
    </script>
</body>
</html>

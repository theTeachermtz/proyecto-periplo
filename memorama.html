<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memorama | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .safari-text-fix { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; overflow-wrap: break-word; }
        @keyframes pop-in { 0%{opacity:0;transform:scale(.85)} 70%{transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
        .animate-pop-in { animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes fade-in { from{opacity:0} to{opacity:1} }
        .animate-fade-in { animation: fade-in 0.3s ease forwards; }
        .btn-juicy { transition: transform 0.15s cubic-bezier(0.4,0,0.2,1); }
        .btn-juicy:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from 'firebase/firestore';
        import { Check, X, Award, Home, Layers, Users, ArrowRight, ArrowLeft, Loader2, User, Play, Trophy, AlertTriangle, Link as LinkIcon } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const appId = 'periplo-app-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================
        // NAVEGACIÓN INTELIGENTE
        // ============================================================
        const goBack = () => {
            const ref = document.referrer;
            if (ref && ref.includes('student_portal.html')) window.location.href = ref;
            else window.location.href = 'index.html';
        };

        const PLAYER_COLORS = {
            1: { bg: 'bg-sky-500', text: 'text-sky-400', border: 'border-sky-500', light: 'bg-sky-500/20', glow: 'shadow-sky-500/30' },
            2: { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500', light: 'bg-rose-500/20', glow: 'shadow-rose-500/30' },
            3: { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500', light: 'bg-amber-500/20', glow: 'shadow-amber-500/30' },
            4: { bg: 'bg-violet-500', text: 'text-violet-400', border: 'border-violet-500', light: 'bg-violet-500/20', glow: 'shadow-violet-500/30' },
        };

        const shuffleArray = (array) => { const a = [...array]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

        const parseQuizWords = (data) => {
            const rawWords = data.content?.cards || data.content?.pairs || [];
            return rawWords.map((w, i) => ({ id: w.id || `word-${i}`, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '', exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || w.c2 || '🎯' })).filter(w => w.wordEn);
        };

        const buildRoundsFromWords = (wordsArray) => {
            let pool = [...wordsArray];
            if (pool.length > 30) { pool = shuffleArray(pool).slice(0, 30); }
            else { let fi = 0; const sh = shuffleArray([...wordsArray]); while (pool.length < 30) { pool.push({ ...sh[fi % sh.length] }); fi++; } }
            pool = shuffleArray(pool);
            const final = pool.map((w, idx) => ({ ...w, instanceId: `inst-${idx}` }));
            return [final.slice(0, 15), final.slice(15, 30)];
        };

        const buildDeckFromRound = (wordsArray) => {
            let cards = [];
            wordsArray.forEach((item) => {
                cards.push({ uniqueId: `${item.instanceId}-en`, pairId: item.id, text: item.wordEn, emoji: item.emojis, type: 'en', audioText: item.wordEn });
                cards.push({ uniqueId: `${item.instanceId}-es`, pairId: item.id, text: item.wordEs, emoji: item.emojis, type: 'es', audioText: item.wordEn });
            });
            return shuffleArray(cards);
        };

        const playAudio = (text) => { if ('speechSynthesis' in window && text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); } };
        const getNextTurn = (current, activePlayers) => { const idx = activePlayers.indexOf(current); if (idx === -1) return activePlayers[0]; return activePlayers[(idx + 1) % activePlayers.length]; };

        const Toast = ({ msg }) => msg ? (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-full font-black text-sm shadow-xl z-[120] animate-pop-in flex items-center gap-2">
                <Check size={16} /> {msg}
            </div>
        ) : null;

        const WordListOverlay = ({ words, onClose }) => (
            <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8 animate-fade-in">
                <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                    <div className="flex items-center justify-between mb-6 shrink-0">
                        <h2 className="text-2xl sm:text-3xl font-black text-white">Vocabulario</h2>
                        <button onClick={onClose} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white transition-colors"><X size={20} /></button>
                    </div>
                    <div className="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar pb-6">
                        {words.map((card, i) => (
                            <div key={card.id || i} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">{card.emojis}</div>
                                <div className="flex-grow w-full">
                                    <h4 className="text-lg font-black text-white">{card.wordEn}</h4>
                                    <p className="text-emerald-500 font-bold text-sm mb-1">{card.wordEs}</p>
                                    {card.exampleEn && <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // ============================================================
        // CARDGRID — dorso con NÚMERO como guía visual (original)
        // Fondo índigo con el número de la carta para recordar posiciones
        // ============================================================
        const CardGrid = ({ deck, flippedIndices, errorIndices = [], matchedUniqueIds, onCardClick, isLocked }) => (
            <div className="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-10 gap-2 sm:gap-3 w-full">
                {deck.map((card, index) => {
                    const isFlipped = flippedIndices.includes(index);
                    const isMatched = matchedUniqueIds.includes(card.uniqueId);
                    const isError = errorIndices.includes(index);
                    const isVisible = isFlipped || isMatched || isError;
                    const frontBg = isMatched ? 'bg-emerald-900/50 border-emerald-600/50' : isError ? 'bg-rose-900/50 border-rose-600/50' : 'bg-zinc-800 border-zinc-700';
                    return (
                        <div key={card.uniqueId} onClick={() => !isLocked && !isMatched && onCardClick(index)}
                            className={`perspective relative aspect-[3/4] rounded-xl cursor-pointer transition-all duration-150 ${isMatched ? 'opacity-60 cursor-default' : !isLocked ? 'hover:scale-105 active:scale-95' : 'cursor-default'}`}>
                            <div className={`preserve-3d relative w-full h-full transition-transform duration-500 ${isVisible ? 'rotate-y-180' : ''}`}>

                                {/* ── DORSO: número como guía visual, fondo índigo ── */}
                                <div className="backface-hidden absolute inset-0 bg-indigo-700 rounded-xl flex flex-col items-center justify-center border-2 border-indigo-500/60 shadow-lg gap-0.5">
                                    <span className="text-white font-black text-base sm:text-lg leading-none select-none">{index + 1}</span>
                                    <span className="text-indigo-300 text-[7px] sm:text-[8px] font-bold uppercase tracking-widest select-none">carta</span>
                                </div>

                                {/* ── FRENTE: texto y emoji ── */}
                                <div className={`backface-hidden rotate-y-180 absolute inset-0 ${frontBg} rounded-xl flex flex-col items-center justify-center p-1.5 border-2 shadow-md gap-1`}>
                                    <span className="text-xl sm:text-2xl select-none leading-none">{card.emoji}</span>
                                    <span className={`font-black text-center leading-tight w-full safari-text-fix ${card.text.length > 12 ? 'text-[9px] sm:text-[10px]' : 'text-[10px] sm:text-xs'} ${isMatched ? 'text-emerald-400' : isError ? 'text-rose-300' : 'text-zinc-200'}`}>
                                        {card.text}
                                    </span>
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>
        );

        const FeedbackBanner = ({ message }) => {
            const [visible, setVisible] = useState(false);
            const [text, setText] = useState('');
            const lastTs = useRef(null);
            useEffect(() => {
                if (message?.ts && message.ts !== lastTs.current) {
                    lastTs.current = message.ts; setText(message.text); setVisible(true);
                    const t = setTimeout(() => setVisible(false), 2500); return () => clearTimeout(t);
                }
            }, [message?.ts]);
            if (!visible) return null;
            const bgClass = message.type === 'success' ? 'bg-emerald-500 text-black' : message.type === 'alert' ? 'bg-amber-500 text-black' : 'bg-sky-500 text-white';
            return <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] ${bgClass} px-6 py-2.5 rounded-full font-black text-sm shadow-xl animate-pop-in whitespace-nowrap`}>{text}</div>;
        };

        // ═══════════════════════════════════════════════
        //  MODO SINGLEPLAYER
        // ═══════════════════════════════════════════════
        const SinglePlayerGame = ({ quizData, fullWordList, quizId }) => {
            const [gameStarted, setGameStarted] = useState(false);
            const [playerName, setPlayerName] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            const [showWordList, setShowWordList] = useState(false);
            const [roundsData, setRoundsData] = useState([]);
            const [currentRound, setCurrentRound] = useState(0);
            const [roundTransition, setRoundTransition] = useState(false);
            const [globalWin, setGlobalWin] = useState(false);
            const [deck, setDeck] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [errorIndices, setErrorIndices] = useState([]);
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [moves, setMoves] = useState(0);
            const [isLocked, setIsLocked] = useState(false);

            useEffect(() => { const rounds = buildRoundsFromWords(fullWordList); setRoundsData(rounds); setDeck(buildDeckFromRound(rounds[0])); }, []);

            const prepareDeck = (wordsArray) => { setDeck(buildDeckFromRound(wordsArray)); setFlippedIndices([]); setErrorIndices([]); setMatchedPairs([]); setIsLocked(false); };

            const handleCardClick = (index) => {
                const card = deck[index];
                if (!gameStarted || isLocked || flippedIndices.includes(index) || errorIndices.includes(index) || matchedPairs.includes(card.uniqueId)) return;
                if (card.type === 'en') playAudio(card.audioText);
                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);
                if (newFlipped.length === 2) {
                    setIsLocked(true); setMoves(m => m + 1);
                    const [idx1, idx2] = newFlipped;
                    const c1 = deck[idx1], c2 = deck[idx2];
                    if (c1.pairId === c2.pairId && c1.type !== c2.type) {
                        setTimeout(() => {
                            const newMatched = [...matchedPairs, c1.uniqueId, c2.uniqueId];
                            setMatchedPairs(newMatched); setFlippedIndices([]); setIsLocked(false);
                            if (newMatched.length === deck.length) { if (currentRound === 0 && roundsData[1]) setRoundTransition(true); else setGlobalWin(true); }
                        }, 800);
                    } else {
                        setTimeout(() => { setErrorIndices(newFlipped); setFlippedIndices([]);
                            setTimeout(() => { setErrorIndices([]); setIsLocked(false); }, 1500);
                        }, 2000);
                    }
                }
            };

            const startRound2 = () => { setCurrentRound(1); setRoundTransition(false); setMoves(m => m); prepareDeck(roundsData[1]); };
            const handleRestart = () => { const rounds = buildRoundsFromWords(fullWordList); setRoundsData(rounds); setCurrentRound(0); setMoves(0); setGlobalWin(false); setRoundTransition(false); prepareDeck(rounds[0]); };

            if (!gameStarted) return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center z-10 animate-pop-in">
                        <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                        <h1 className="text-3xl font-black text-emerald-500 mb-2">{quizData?.title || 'Memorama'}</h1>
                        <p className="text-zinc-400 mb-8 font-medium">Encuentra los 30 pares en dos rondas para ganar.</p>
                        <input type="text" placeholder="Tu nombre..." value={playerName} onChange={(e) => setPlayerName(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && setGameStarted(true)}
                            className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-emerald-500 transition-colors" style={{ fontSize: '16px' }} />
                        <button disabled={!playerName.trim()} onClick={() => setGameStarted(true)} className="w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest">Empezar Juego</button>
                        <button onClick={goBack} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">Regresar</button>
                    </div>
                </div>
            );

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">
                    <Toast msg={toastMsg} />
                    {roundTransition && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                            <div className="bg-zinc-900 border border-emerald-500/30 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Layers className="w-24 h-24 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Ronda 1 Superada!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Gran trabajo, {playerName}. ¡Vamos por los últimos 15 pares!</p>
                                <button onClick={startRound2} className="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-base uppercase tracking-widest">Siguiente Ronda ➡️</button>
                            </div>
                        </div>
                    )}
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                            <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Award className="w-24 h-24 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Completado, {playerName}!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Lo lograste en {moves} movimientos totales.</p>
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => setShowWordList(true)} className="w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm">📖 REPASAR VOCABULARIO</button>
                                    <button onClick={handleRestart} className="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm">🔄 JUGAR OTRA VEZ</button>
                                    <button onClick={goBack} className="mt-2 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">SALIR</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showWordList && <WordListOverlay words={fullWordList} onClose={() => setShowWordList(false)} />}
                    <header className="p-4 sm:p-6 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/50 backdrop-blur-md z-40">
                        <div className="flex items-center gap-3 min-w-0">
                            <button onClick={() => { sessionStorage.clear(); goBack(); }} className="p-2.5 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700 shrink-0"><Home size={20}/></button>
                            <div className="w-px h-8 bg-zinc-800 mx-1 hidden sm:block"></div>
                            <div className="min-w-0 ml-2">
                                <h1 className="text-lg font-black text-emerald-500 leading-none tracking-tight truncate">{quizData?.title || 'Memorama'}</h1>
                                <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Modo: Solitario • Ronda {currentRound + 1} de 2</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3 shrink-0">
                            <div className="flex flex-col items-end sm:items-center sm:flex-row gap-1 sm:gap-3 bg-zinc-900 border border-zinc-800 px-3 sm:px-4 py-2 rounded-xl">
                                <span className="text-zinc-400 font-black text-[10px] sm:text-xs uppercase tracking-widest">Pares: <span className="text-emerald-500">{matchedPairs.length / 2}/15</span></span>
                                <div className="w-1 h-1 bg-zinc-700 rounded-full hidden sm:block"></div>
                                <span className="text-zinc-400 font-black text-[10px] sm:text-xs uppercase tracking-widest">Movs: <span className="text-white">{moves}</span></span>
                            </div>
                        </div>
                    </header>
                    <div className="flex-1 w-full overflow-y-auto custom-scrollbar p-2 sm:p-4 md:p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
                        <div className="max-w-7xl mx-auto w-full pb-10">
                            <CardGrid deck={deck} flippedIndices={flippedIndices} errorIndices={errorIndices} matchedUniqueIds={matchedPairs} onCardClick={handleCardClick} isLocked={isLocked} />
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════
        //  MODO MULTIPLAYER — SISTEMA DE SALAS COMPLETO
        // ═══════════════════════════════════════════════
        const MultiPlayerGame = ({ user, quizId, isStudent }) => {
            const [deckId] = useState(quizId);
            const [roomId, setRoomId] = useState(() => sessionStorage.getItem('memorama_room') || '');
            const [roomData, setRoomData] = useState(null);
            const [joinInput, setJoinInput] = useState('');
            const [localError, setLocalError] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            const [studentName, setStudentName] = useState(localStorage.getItem('periplo_student_name') || '');
            const [showWordList, setShowWordList] = useState(false);

            useEffect(() => {
                if (roomId) sessionStorage.setItem('memorama_room', roomId);
                else sessionStorage.removeItem('memorama_room');
            }, [roomId]);

            useEffect(() => {
                const handleVis = () => {
                    if (document.visibilityState === 'visible' && roomId) {
                        getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId)).then(snap => {
                            if (snap.exists()) setRoomData(snap.data());
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVis);
                return () => document.removeEventListener("visibilitychange", handleVis);
            }, [roomId]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlCode = params.get('code');
                if (urlCode) setJoinInput(urlCode.toUpperCase());
            }, []);

            useEffect(() => {
                if (!roomId || !user) { setRoomData(null); return; }
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId);
                const unsub = onSnapshot(roomRef, (snap) => {
                    if (snap.exists()) setRoomData(snap.data());
                    else { setRoomData(null); setLocalError("La sala fue cerrada o no existe."); setRoomId(''); }
                });
                return () => unsub();
            }, [user, roomId]);

            const updateGame = async (updates) => {
                if (!roomId || !user) return;
                try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId), updates); }
                catch (e) { console.error("updateGame error:", e); }
            };

            const handleCreateRoom = async () => {
                if (!user || !deckId) return;
                try {
                    const quizSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId));
                    if (!quizSnap.exists()) { alert("No se encontró el quiz. Regresa al dashboard."); return; }
                    const quizDoc = quizSnap.data();
                    const words = parseQuizWords(quizDoc);
                    const rounds = buildRoundsFromWords(words);
                    const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', code);
                    await setDoc(roomRef, {
                        roomId: code, gameType: 'MEMORAMA', sourceQuizId: deckId, title: quizDoc.title || 'Memorama',
                        gameState: 'MENU',
                        players: { s1: user.uid, j1: null, j2: null, j3: null, j4: null },
                        playerNames: { [user.uid]: 'Mtro Creador' },
                        roundsWords: {
                            0: rounds[0].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId })),
                            1: rounds[1].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId }))
                        },
                        fullWordList: words.map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn })),
                        currentRound: 0, deck: [], flippedIndices: [], errorIndices: [], matchedUniqueIds: [],
                        scores: { 1: 0, 2: 0, 3: 0, 4: 0 }, totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                        lastMatchBy: null, turn: 1, isLocked: false, winner: null, feedbackMessage: null, isPaused: false,
                    });
                    setRoomId(code); setLocalError('');
                } catch (e) { console.error(e); setLocalError("Error al crear la sala."); }
            };

            const handleJoinRoom = () => {
                if (!user || !joinInput) return;
                if (isStudent && !studentName.trim()) { setLocalError("Ingresa tu nombre."); return; }
                if (isStudent) localStorage.setItem('periplo_student_name', studentName);
                setLocalError('');
                setRoomId(joinInput.trim().toUpperCase());
            };

            const handleLeaveRoom = async () => {
                if (roomData && user && roomId) {
                    const newPlayers = { ...roomData.players };
                    Object.keys(newPlayers).forEach(k => { if (newPlayers[k] === user.uid) newPlayers[k] = null; });
                    try { await updateGame({ players: newPlayers }); } catch(e) {}
                }
                setRoomId(''); setRoomData(null); setJoinInput(''); setLocalError('');
                sessionStorage.removeItem('memorama_room');
            };

            const toggleRole = async (roleId) => {
                if (!roomData || !user) return;
                const newPlayers = { ...roomData.players };
                const newNames = { ...(roomData.playerNames || {}) };
                if (newPlayers[roleId] === user.uid) { newPlayers[roleId] = null; }
                else {
                    newPlayers[roleId] = user.uid;
                    newNames[user.uid] = isStudent ? studentName : (roleId === 's1' ? 'Maestro' : `Jugador ${roleId.replace('j','')}`);
                }
                await updateGame({ players: newPlayers, playerNames: newNames });
            };

            const copyStudentLink = () => {
                const link = `${window.location.origin}${window.location.pathname}?mode=student&code=${roomId}`;
                navigator.clipboard.writeText(link);
                setToastMsg('¡Link Copiado!'); setTimeout(() => setToastMsg(null), 3000);
            };

            const startGame = async () => {
                if (!roomData) return;
                const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                if (activePlayers.length === 0) { alert("Al menos un jugador debe sentarse."); return; }
                const newDeck = buildDeckFromRound(roomData.roundsWords[0]);
                await updateGame({
                    gameState: 'PLAYING', currentRound: 0, deck: newDeck,
                    flippedIndices: [], errorIndices: [], matchedUniqueIds: [],
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 }, totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    lastMatchBy: null, turn: activePlayers[0], isLocked: false, winner: null, isPaused: false,
                    feedbackMessage: { text: `¡Empieza la Ronda 1! Turno de ${roomData.playerNames[roomData.players[`j${activePlayers[0]}`]] || 'Jugador ' + activePlayers[0]}`, type: 'info', ts: Date.now() },
                });
            };

            const startRound2 = async () => {
                if (!roomData) return;
                const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                const newDeck = buildDeckFromRound(roomData.roundsWords[1]);
                const newTotalScores = { ...roomData.totalScores };
                [1,2,3,4].forEach(n => { newTotalScores[n] = (newTotalScores[n] || 0) + (roomData.scores[n] || 0); });
                await updateGame({
                    gameState: 'PLAYING', currentRound: 1, deck: newDeck,
                    flippedIndices: [], errorIndices: [], matchedUniqueIds: [],
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 }, totalScores: newTotalScores,
                    lastMatchBy: null, turn: activePlayers[0], isLocked: false, winner: null, isPaused: false,
                    feedbackMessage: { text: '¡Ronda 2! A buscar los últimos 15 pares.', type: 'info', ts: Date.now() },
                });
            };

            const handleCardClick = async (index) => {
                if (!roomData || roomData.gameState !== 'PLAYING' || roomData.isPaused) return;
                const myPlayerKey = Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid);
                const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j', '')) : null;
                if (!myPlayerNum || roomData.turn !== myPlayerNum) return;
                const card = roomData.deck[index];
                if (!card) return;
                const currentFlipped = roomData.flippedIndices || [];
                const currentErrors = roomData.errorIndices || [];
                if (currentFlipped.includes(index) || currentErrors.includes(index) || roomData.matchedUniqueIds.includes(card.uniqueId)) return;
                if (card.type === 'en') playAudio(card.audioText);
                const newFlipped = [...currentFlipped, index];
                if (newFlipped.length === 1) {
                    await updateGame({ flippedIndices: newFlipped });
                } else if (newFlipped.length === 2) {
                    await updateGame({ flippedIndices: newFlipped, isLocked: true });
                    const [idx1, idx2] = newFlipped;
                    const c1 = roomData.deck[idx1], c2 = roomData.deck[idx2];
                    const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                    if (c1.pairId === c2.pairId && c1.type !== c2.type) {
                        setTimeout(async () => {
                            const newMatched = [...roomData.matchedUniqueIds, c1.uniqueId, c2.uniqueId];
                            const newScores = { ...roomData.scores };
                            newScores[myPlayerNum] = (newScores[myPlayerNum] || 0) + 1;
                            const pName = roomData.playerNames[user.uid] || `Jugador ${myPlayerNum}`;
                            let updates = { flippedIndices: [], matchedUniqueIds: newMatched, scores: newScores, lastMatchBy: myPlayerNum, isLocked: false, feedbackMessage: { text: `✨ ¡${pName} encontró un par!`, type: 'success', ts: Date.now() } };
                            if (newMatched.length === roomData.deck.length) {
                                if (roomData.currentRound === 0) { updates.gameState = 'ROUND_TRANSITION'; updates.feedbackMessage = { text: '¡Ronda 1 completada!', type: 'info', ts: Date.now() }; }
                                else {
                                    const finalTotals = { ...roomData.totalScores };
                                    [1,2,3,4].forEach(n => { finalTotals[n] = (finalTotals[n] || 0) + (newScores[n] || 0); });
                                    updates.totalScores = finalTotals;
                                    let maxScore = 0; let winners = [];
                                    activePlayers.forEach(n => { if (finalTotals[n] > maxScore) { maxScore = finalTotals[n]; winners = [n]; } else if (finalTotals[n] === maxScore) winners.push(n); });
                                    const winnerName = winners.length === 1 ? (roomData.playerNames[roomData.players[`j${winners[0]}`]] || `Jugador ${winners[0]}`) : '¡Empate!';
                                    updates.gameState = 'GAME_OVER'; updates.winner = winnerName;
                                    updates.feedbackMessage = { text: `🏆 ${winnerName} gana con ${maxScore} pares!`, type: 'success', ts: Date.now() };
                                }
                            }
                            await updateGame(updates);
                        }, 800);
                    } else {
                        setTimeout(async () => {
                            await updateGame({ flippedIndices: [], errorIndices: newFlipped });
                            setTimeout(async () => {
                                const nextTurn = getNextTurn(myPlayerNum, activePlayers);
                                const nextName = roomData.playerNames[roomData.players[`j${nextTurn}`]] || `Jugador ${nextTurn}`;
                                await updateGame({ errorIndices: [], isLocked: false, turn: nextTurn, feedbackMessage: { text: `No hubo par. Turno de ${nextName}.`, type: 'alert', ts: Date.now() } });
                            }, 1500);
                        }, 2000);
                    }
                }
            };

            const handleRestart = async () => {
                if (!roomData) return;
                const words = roomData.fullWordList || [];
                const rounds = buildRoundsFromWords(words);
                const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                const newDeck = buildDeckFromRound(rounds[0]);
                await updateGame({
                    roundsWords: { 0: rounds[0].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId })), 1: rounds[1].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId })) },
                    gameState: 'PLAYING', currentRound: 0, deck: newDeck, flippedIndices: [], errorIndices: [], matchedUniqueIds: [],
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 }, totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    lastMatchBy: null, turn: activePlayers[0] || 1, isLocked: false, winner: null, isPaused: false,
                    feedbackMessage: { text: '¡Nueva partida! Ronda 1.', type: 'info', ts: Date.now() },
                });
            };

            const handleEndGame = async () => { if (!roomData) return; await updateGame({ gameState: 'MENU', isPaused: false, feedbackMessage: null, winner: null }); };

            const isS1 = roomData?.players?.s1 === user?.uid;
            const myPlayerKey = roomData ? Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid) : null;
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j', '')) : null;
            const activePlayers = roomData ? [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]) : [];

            // ── Sin sala ──
            if (!roomId) return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-zinc-950">
                    {!isStudent && <button onClick={() => { sessionStorage.clear(); goBack(); }} className="absolute top-4 left-4 p-2.5 bg-zinc-800 rounded-xl hover:bg-zinc-700 transition text-white border border-zinc-700"><ArrowLeft size={20}/></button>}
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-lg w-full text-center relative animate-pop-in">
                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-4">P</div>
                        <h1 className="text-3xl font-black text-emerald-500 mb-1">Memorama</h1>
                        <p className="text-zinc-500 mb-8 font-medium text-sm">{isStudent ? 'Modo Alumno — Ingresa el código de sala' : 'Multijugador'}</p>
                        {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}
                        <div className="space-y-5 w-full">
                            {!isStudent && deckId && (
                                <button onClick={handleCreateRoom} className="btn-juicy w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-black rounded-xl font-black shadow-lg transition active:scale-95 flex justify-center items-center gap-2 text-lg uppercase tracking-widest">
                                    <Users size={22} /> Crear Sala
                                </button>
                            )}
                            <div>
                                <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-2">{isStudent ? 'Código de sala' : 'Unirse a sala existente'}</p>
                                {isStudent && (
                                    <input type="text" placeholder="Tu nombre..." value={studentName} onChange={e => setStudentName(e.target.value)}
                                        className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center font-bold text-white mb-3 outline-none focus:border-emerald-500 transition" style={{ fontSize: '16px' }} />
                                )}
                                <div className="flex gap-3">
                                    <input type="text" placeholder="CÓDIGO" value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())}
                                        maxLength={4} className="flex-1 bg-zinc-950 border-2 border-zinc-800 rounded-xl p-3 text-center text-2xl font-black text-white outline-none focus:border-emerald-500 tracking-widest transition" style={{ fontSize: '16px' }} />
                                    <button onClick={handleJoinRoom} disabled={joinInput.length < 4}
                                        className="shrink-0 bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-black px-4 sm:px-6 rounded-xl font-bold transition flex items-center justify-center active:scale-95">
                                        <ArrowRight size={24} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ── Cargando sala ──
            if (roomId && !roomData) return (
                <div className="flex-1 flex flex-col items-center justify-center gap-4 w-full h-[100dvh] bg-zinc-950">
                    <Loader2 size={48} className="animate-spin text-emerald-500" />
                    <p className="font-bold tracking-widest uppercase text-zinc-400 text-sm">Conectando a la sala...</p>
                </div>
            );

            // ── MENU / Lobby ──
            if (roomData.gameState === 'MENU') {
                const canStart = isS1 && activePlayers.length >= 1;
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative w-full h-[100dvh] overflow-y-auto bg-zinc-950">
                        <Toast msg={toastMsg} />
                        <div className="bg-zinc-900 border border-zinc-800 p-6 md:p-8 rounded-[2.5rem] shadow-2xl max-w-lg w-full relative animate-pop-in mt-10 sm:mt-0">
                            <button onClick={handleLeaveRoom} className="absolute top-5 left-5 p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-zinc-400 transition"><ArrowLeft size={18}/></button>
                            <div className="text-center mb-6 pt-4">
                                <h2 className="text-2xl font-black text-white">{roomData.title || 'Memorama'}</h2>
                                <div className="flex items-center justify-center gap-2 mt-2">
                                    <span className="text-zinc-400 text-sm font-bold">Sala:</span>
                                    <span className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-lg font-black text-lg tracking-widest">{roomId}</span>
                                </div>
                            </div>
                            {isS1 && (
                                <button onClick={copyStudentLink} className="btn-juicy w-full mb-6 py-3 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 border border-zinc-700 transition">
                                    <LinkIcon size={16}/> Copiar link para alumnos
                                </button>
                            )}
                            <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Asientos de Jugadores</p>
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                {[1, 2, 3, 4].map(n => {
                                    const c = PLAYER_COLORS[n];
                                    const occupied = roomData.players[`j${n}`];
                                    const isMine = occupied === user?.uid;
                                    const name = occupied ? (roomData.playerNames[occupied] || `Jugador ${n}`) : null;
                                    return (
                                        <button key={n} onClick={() => toggleRole(`j${n}`)} className={`flex items-center gap-3 p-3 rounded-xl border-2 transition-all btn-juicy ${isMine ? `${c.light} ${c.border} shadow-md` : occupied ? 'bg-zinc-800/50 border-zinc-700 cursor-not-allowed opacity-70' : 'bg-zinc-900 border-zinc-700 hover:border-zinc-500'}`}>
                                            <div className={`w-8 h-8 rounded-full ${c.bg} flex items-center justify-center shrink-0`}>
                                                {occupied ? <User size={16} className="text-white"/> : <span className="text-white font-black text-sm">{n}</span>}
                                            </div>
                                            <span className={`font-bold text-sm truncate ${isMine ? 'text-white' : occupied ? 'text-zinc-400' : 'text-zinc-500'}`}>
                                                {name || (isMine ? 'Tú' : 'Libre')}
                                            </span>
                                            {isMine && <Check size={14} className={`${c.text} ml-auto shrink-0`}/>}
                                        </button>
                                    );
                                })}
                            </div>
                            <button onClick={startGame} disabled={!canStart}
                                className={`btn-juicy w-full py-4 rounded-xl font-black text-lg uppercase tracking-widest flex items-center justify-center gap-2 transition shadow-lg ${canStart ? 'bg-emerald-500 hover:bg-emerald-400 text-black' : 'bg-zinc-800 text-zinc-600 cursor-not-allowed'}`}>
                                <Play size={22} fill="currentColor" /> {!isS1 ? 'Esperando al Maestro...' : '¡Empezar!'}
                            </button>
                        </div>
                    </div>
                );
            }

            // ── ROUND_TRANSITION ──
            if (roomData.gameState === 'ROUND_TRANSITION') return (
                <div className="h-[100dvh] bg-zinc-950 flex items-center justify-center p-4">
                    <FeedbackBanner message={roomData.feedbackMessage} />
                    <div className="bg-zinc-900 border border-emerald-500/30 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md animate-pop-in">
                        <Layers className="w-20 h-20 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                        <h2 className="text-3xl font-black mb-3">¡Ronda 1 Superada!</h2>
                        <div className="space-y-2 mb-6">
                            {activePlayers.sort((a,b) => (roomData.scores[b]||0) - (roomData.scores[a]||0)).map(n => {
                                const c = PLAYER_COLORS[n];
                                const name = roomData.playerNames[roomData.players[`j${n}`]] || `Jugador ${n}`;
                                return (
                                    <div key={n} className={`flex items-center justify-between p-3 rounded-xl ${c.light} border ${c.border}/30`}>
                                        <span className={`font-bold text-sm ${c.text}`}>{name}</span>
                                        <span className="font-black text-white text-lg">{roomData.scores[n] || 0} pares</span>
                                    </div>
                                );
                            })}
                        </div>
                        {isS1 ? <button onClick={startRound2} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl active:scale-95 text-base uppercase tracking-widest">Siguiente Ronda ➡️</button>
                               : <p className="text-zinc-400 bg-zinc-950 p-3 rounded-lg font-bold text-sm">Esperando al Maestro...</p>}
                    </div>
                </div>
            );

            // ── GAME_OVER ──
            if (roomData.gameState === 'GAME_OVER') {
                const sortedPlayers = [...activePlayers].sort((a,b) => (roomData.totalScores[b]||0) - (roomData.totalScores[a]||0));
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex items-center justify-center p-4">
                        <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md animate-pop-in mt-10 sm:mt-0">
                            <Trophy className="w-20 h-20 text-amber-400 mx-auto mb-4 animate-bounce"/>
                            <h2 className="text-3xl font-black mb-1">¡Juego Terminado!</h2>
                            <p className="text-emerald-400 font-black text-xl mb-6">{roomData.winner}</p>
                            <div className="space-y-2 mb-8">
                                {sortedPlayers.map((n, i) => {
                                    const c = PLAYER_COLORS[n];
                                    const name = roomData.playerNames[roomData.players[`j${n}`]] || `Jugador ${n}`;
                                    const total = roomData.totalScores[n] || 0;
                                    return (
                                        <div key={n} className={`flex items-center justify-between p-3 rounded-xl border ${i === 0 ? 'bg-amber-500/10 border-amber-500/40' : 'bg-zinc-800 border-zinc-700'}`}>
                                            <div className="flex items-center gap-3">
                                                <span className={`font-black text-lg ${i === 0 ? 'text-amber-400' : 'text-zinc-500'}`}>{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</span>
                                                <span className={`font-bold text-sm ${c.text}`}>{name}</span>
                                            </div>
                                            <span className="font-black text-white">{total} pares</span>
                                        </div>
                                    );
                                })}
                            </div>
                            {isS1 && (
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleRestart} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-3 rounded-xl uppercase tracking-widest">🔄 Jugar otra vez</button>
                                    <button onClick={handleEndGame} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold py-3 rounded-xl">Volver al lobby</button>
                                </div>
                            )}
                            {!isS1 && <p className="text-zinc-400 bg-zinc-950 p-3 rounded-lg font-bold text-sm mt-4">Esperando al Maestro...</p>}
                            {showWordList && <WordListOverlay words={roomData.fullWordList || []} onClose={() => setShowWordList(false)} />}
                        </div>
                    </div>
                );
            }

            // ── PLAYING ──
            const isMyTurn = myPlayerNum !== null && roomData.turn === myPlayerNum;
            const turnColor = PLAYER_COLORS[roomData.turn] || PLAYER_COLORS[1];
            const currentTurnName = roomData.playerNames[roomData.players[`j${roomData.turn}`]] || `Jugador ${roomData.turn}`;

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">
                    <FeedbackBanner message={roomData.feedbackMessage} />
                    {showWordList && <WordListOverlay words={roomData.fullWordList || []} onClose={() => setShowWordList(false)} />}
                    <header className="p-3 sm:p-4 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/50 backdrop-blur-md z-40">
                        <div className="flex items-center gap-2 min-w-0">
                            <button onClick={handleLeaveRoom} className="p-2 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700 shrink-0"><Home size={18}/></button>
                            <div className="min-w-0 ml-1">
                                <h1 className="text-sm font-black text-emerald-500 leading-none truncate">{roomData.title || 'Memorama'}</h1>
                                <p className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">Ronda {(roomData.currentRound || 0) + 1} • Sala {roomId}</p>
                            </div>
                        </div>
                        <div className={`flex items-center gap-2 px-3 py-2 rounded-xl border transition-all ${isMyTurn ? `${turnColor.light} ${turnColor.border}/50` : 'bg-zinc-900 border-zinc-800'}`}>
                            <div className={`w-6 h-6 rounded-full ${turnColor.bg} flex items-center justify-center shrink-0`}><User size={12} className="text-white" /></div>
                            <span className={`font-black text-xs sm:text-sm truncate max-w-[80px] sm:max-w-[120px] ${isMyTurn ? 'text-white' : 'text-zinc-400'}`}>
                                {isMyTurn ? '¡Tu turno!' : currentTurnName}
                            </span>
                        </div>
                    </header>
                    <div className="shrink-0 bg-zinc-900/50 border-b border-zinc-800/50 px-3 py-2 flex items-center justify-center gap-2 sm:gap-4 overflow-x-auto">
                        {activePlayers.map(n => {
                            const c = PLAYER_COLORS[n];
                            const name = roomData.playerNames[roomData.players[`j${n}`]] || `J${n}`;
                            const score = (roomData.totalScores?.[n] || 0) + (roomData.scores?.[n] || 0);
                            const isTurn = roomData.turn === n;
                            return (
                                <div key={n} className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg transition-all ${isTurn ? `${c.light} border ${c.border}/40 shadow-md` : 'bg-zinc-800/50 border border-zinc-800'}`}>
                                    <div className={`w-5 h-5 rounded-full ${c.bg} flex items-center justify-center shrink-0`}><span className="text-white font-black text-[8px]">{n}</span></div>
                                    <span className={`font-bold text-[10px] sm:text-xs truncate max-w-[50px] sm:max-w-[70px] ${c.text}`}>{name}</span>
                                    <span className="font-black text-white text-xs sm:text-sm">{score}</span>
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex-1 w-full overflow-y-auto custom-scrollbar p-2 sm:p-4 md:p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
                        <div className="max-w-7xl mx-auto w-full pb-10">
                            <CardGrid
                                deck={roomData.deck || []}
                                flippedIndices={roomData.flippedIndices || []}
                                errorIndices={roomData.errorIndices || []}
                                matchedUniqueIds={roomData.matchedUniqueIds || []}
                                onCardClick={handleCardClick}
                                isLocked={roomData.isLocked || !isMyTurn}
                            />
                        </div>
                    </div>
                    {isMyTurn && !roomData.isPaused && (
                        <div className={`shrink-0 ${turnColor.light} border-t ${turnColor.border}/30 px-4 py-3 text-center sm:hidden`}>
                            <p className={`${turnColor.text} font-black text-sm uppercase tracking-widest animate-pulse`}>¡Es tu turno!</p>
                        </div>
                    )}
                    {!isMyTurn && !roomData.isPaused && (
                        <div className="shrink-0 bg-zinc-900 border-t border-zinc-800 px-4 py-3 text-center sm:hidden">
                            <p className="text-zinc-400 font-bold text-sm">Esperando a <span className={`${turnColor.text} font-black`}>{currentTurnName}</span>...</p>
                        </div>
                    )}
                </div>
            );
        };

        // ═══════════════════════════════════════════════
        //  APP ROOT
        // ═══════════════════════════════════════════════
        const MemoryApp = () => {
            const [user, setUser] = useState(null);
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const isStudentUrl = params.get('student') === 'true' || params.get('mode') === 'student';
            const hasCode = params.has('code');
            const [quizData, setQuizData] = useState(null);
            const [fullWordList, setFullWordList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [acceptedDisclaimer, setAcceptedDisclaimer] = useState(() => localStorage.getItem('periplo_disclaimer_v1') === 'true');
            const [teacherMode, setTeacherMode] = useState(() => sessionStorage.getItem('memorama_mode') || (hasCode || isStudentUrl ? 'multi' : null));

            useEffect(() => {
                if (teacherMode) sessionStorage.setItem('memorama_mode', teacherMode);
                else sessionStorage.removeItem('memorama_mode');
            }, [teacherMode]);

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.error(e));
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u && quizId && !hasCode && !isStudentUrl) {
                        getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                            if (snap.exists()) { const data = snap.data(); setQuizData(data); setFullWordList(parseQuizWords(data)); }
                            else alert("Juego no encontrado");
                            setLoading(false);
                        });
                    } else if (u) { setLoading(false); }
                });
                return () => unsub();
            }, []);

            if (!acceptedDisclaimer) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 text-center overflow-auto">
                    <div className="max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-[2rem] shadow-2xl my-auto animate-pop-in">
                        <div className="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6"><AlertTriangle size={32} className="text-amber-500"/></div>
                        <h2 className="text-xl font-black text-white mb-4 uppercase tracking-widest">Aviso de Compatibilidad</h2>
                        <p className="text-zinc-400 text-sm font-bold mb-4 leading-relaxed">Memorama está altamente optimizado. Sin embargo, si utilizas teléfonos antiguos o <strong className="text-white">Safari en iOS</strong>, algunos textos largos podrían verse cortados.</p>
                        <p className="text-zinc-400 text-sm font-bold mb-8 leading-relaxed">Recomendamos <strong className="text-white">Chrome o PC/Laptop</strong> para la mejor experiencia. 🚀</p>
                        <button onClick={() => { localStorage.setItem('periplo_disclaimer_v1', 'true'); setAcceptedDisclaimer(true); }} className="btn-juicy w-full bg-emerald-500 text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm flex justify-center items-center gap-2">Entendido, ¡A jugar!</button>
                    </div>
                </div>
            );

            if (loading || !user) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950"><Loader2 size={40} className="animate-spin text-emerald-500" /></div>;
            if (isStudentUrl || hasCode || teacherMode === 'multi' || !quizId) return <MultiPlayerGame user={user} quizId={quizId} isStudent={isStudentUrl} />;
            if (teacherMode === 'single') return <SinglePlayerGame quizData={quizData} fullWordList={fullWordList} quizId={quizId} />;

            return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center z-10 animate-pop-in mt-10 sm:mt-0">
                        <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                        <h1 className="text-3xl font-black text-emerald-500 mb-2 leading-tight">Memorama</h1>
                        <p className="text-zinc-400 mb-8 font-medium">¿Cómo quieres jugar hoy?</p>
                        <button onClick={() => setTeacherMode('single')} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-white font-black text-lg py-4 rounded-xl mb-4 transition-all shadow-md active:scale-95 border border-zinc-700 uppercase tracking-widest flex items-center justify-center gap-2">
                            <User size={20} /> Solitario
                        </button>
                        <button onClick={() => setTeacherMode('multi')} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest flex items-center justify-center gap-2">
                            <Users size={20} /> Multijugador
                        </button>
                        <button onClick={goBack} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">Regresar</button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MemoryApp />);
    </script>
</body>
</html>

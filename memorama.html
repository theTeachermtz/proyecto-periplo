<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memorama | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        /* Textura Premium para el reverso de las cartas */
        .premium-pattern {
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* Fixes Safari Old iOS Text & Emoji Overflow */
        .safari-text-fix {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            width: 100%;
        }
        
        /* FIX iOS: Emojis en bloque normal en lugar de flex para evitar apilamiento vertical */
        .emoji-wrap-fix {
            display: block;
            text-align: center;
            word-break: normal;
            overflow-wrap: break-word;
            line-height: 1.15;
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .animate-pop-in { animation: popIn 0.25s ease-out forwards; }
        
        /* Animación de error más agresiva */
        @keyframes shakeError { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .animate-shake-error { animation: shakeError 0.5s ease-in-out; }
        
        @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4)} 50%{box-shadow:0 0 0 8px rgba(16,185,129,0)} }
        .animate-pulse-border { animation: pulse-border 1.5s ease-in-out infinite; }

        .btn-juicy { transition: all 0.1s ease; border-bottom-width: 4px; touch-action: manipulation; }
        .btn-juicy:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
    </style>
</head>
<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from 'firebase/firestore';
        import { Check, X, Award, Share2, Layers, Users, ArrowRight, ArrowLeft, Loader2, User, Play, Crown, Volume2, BookOpen, Link as LinkIcon, Trophy, Pause, RotateCcw, AlertTriangle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const appId = 'periplo-app-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // FUNCIÓN GLOBAL PARA VOLVER (Inteligente)
        const goBack = () => {
            const ref = document.referrer;
            if (ref && ref.includes('student_portal.html')) {
                window.location.href = ref;
            } else {
                window.location.href = 'index.html';
            }
        };

        const AVATAR_EMOJIS = ['👽', '🦖', '🧢', '🍄', '👑', '🐶', '🐱', '🤑', '🤖', '👻', '💩', '🤡', '🐼', '🦊', '🦄', '🍎', '🍔', '⚽'];

        const PLAYER_COLORS = {
            1: { bg: 'bg-sky-500', text: 'text-sky-400', border: 'border-sky-500', ring: 'ring-sky-500', light: 'bg-sky-500/20', glow: 'shadow-sky-500/30' },
            2: { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500', ring: 'ring-rose-500', light: 'bg-rose-500/20', glow: 'shadow-rose-500/30' },
            3: { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500', ring: 'ring-amber-500', light: 'bg-amber-500/20', glow: 'shadow-amber-500/30' },
            4: { bg: 'bg-violet-500', text: 'text-violet-400', border: 'border-violet-500', ring: 'ring-violet-500', light: 'bg-violet-500/20', glow: 'shadow-violet-500/30' },
        };

        const shuffleArray = (array) => {
            const a = [...array];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        };

        const parseQuizWords = (data) => {
            const rawWords = data.content?.cards || data.content?.pairs || [];
            return rawWords.map((w, i) => ({
                id: w.id || `word-${i}`, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || w.c2 || '🎯'
            })).filter(w => w.wordEn);
        };

        const buildRoundsFromWords = (wordsArray) => {
            let pool = [...wordsArray];
            if (pool.length > 30) {
                pool = shuffleArray(pool).slice(0, 30);
            } else {
                let fillIndex = 0;
                const shuffled = shuffleArray([...wordsArray]);
                while (pool.length < 30) {
                    pool.push({ ...shuffled[fillIndex % shuffled.length] });
                    fillIndex++;
                }
            }
            pool = shuffleArray(pool);
            const final = pool.map((w, idx) => ({ ...w, instanceId: `inst-${idx}` }));
            return [final.slice(0, 15), final.slice(15, 30)];
        };

        const buildDeckFromRound = (wordsArray) => {
            let cards = [];
            wordsArray.forEach((item) => {
                cards.push({ uniqueId: `${item.instanceId}-en`, pairId: item.id, text: item.wordEn, emoji: item.emojis, type: 'en', audioText: item.wordEn });
                cards.push({ uniqueId: `${item.instanceId}-es`, pairId: item.id, text: item.wordEs, emoji: item.emojis, type: 'es', audioText: item.wordEn });
            });
            return shuffleArray(cards);
        };

        const playAudio = (text) => {
            if ('speechSynthesis' in window && text) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.9;
                window.speechSynthesis.speak(u);
            }
        };

        const getNextTurn = (current, activePlayers) => {
            const idx = activePlayers.indexOf(current);
            if (idx === -1) return activePlayers[0];
            return activePlayers[(idx + 1) % activePlayers.length];
        };

        const Toast = ({ msg }) => msg ? (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-full font-black text-sm shadow-xl z-[120] animate-pop-in flex items-center gap-2">
                <Check size={16} /> {msg}
            </div>
        ) : null;

        const WordListOverlay = ({ words, onClose }) => (
            <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8 animate-fade-in">
                <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                    <div className="flex items-center justify-between mb-6 shrink-0">
                        <h2 className="text-2xl sm:text-3xl font-black text-white">Vocabulario</h2>
                        <button onClick={onClose} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white transition-colors">
                            <X size={20} />
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar pb-6">
                        {words.map(card => (
                            <div key={card.id} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">{card.emojis}</div>
                                <div className="flex-grow w-full">
                                    <h4 className="text-lg font-black text-white">{card.wordEn}</h4>
                                    <p className="text-emerald-500 font-bold text-sm mb-1">{card.wordEs}</p>
                                    {card.exampleEn && <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const CardGrid = ({ deck, flippedIndices, errorIndices = [], matchedUniqueIds, onCardClick, isLocked, lastMatchBy, cols = 'grid-cols-5 md:grid-cols-6 lg:grid-cols-10' }) => (
            <div className={`grid ${cols} gap-2 sm:gap-3 w-full`}>
                {deck.map((card, index) => {
                    const isFlipped = flippedIndices.includes(index);
                    const isMatched = matchedUniqueIds.includes(card.uniqueId);
                    const isError = errorIndices.includes(index);
                    const isVisible = isFlipped || isMatched || isError;
                    
                    const frontBg = isMatched 
                        ? 'bg-emerald-950/60 border-emerald-500/50 opacity-60 shadow-none' 
                        : isError 
                            ? 'bg-rose-950/90 border-rose-500/80 shadow-[0_0_20px_rgba(244,63,94,0.4)] animate-shake-error' 
                            : 'bg-zinc-900 border-zinc-600 shadow-xl shadow-black/50';

                    return (
                        <div key={`${card.uniqueId}-${index}`} onClick={() => onCardClick(index)}
                            className={`perspective aspect-[3/4] w-full ${!isMatched && !isFlipped && !isError && !isLocked ? 'cursor-pointer group' : 'cursor-default'}`}>
                            <div className={`relative w-full h-full duration-300 preserve-3d transition-transform ease-out ${isVisible ? 'rotate-y-180' : ''}`}>
                                
                                {/* CARD BACK PREMIUM */}
                                <div className={`absolute inset-0 backface-hidden bg-gradient-to-br from-slate-700 via-slate-800 to-slate-900 rounded-xl sm:rounded-2xl border border-slate-600 flex flex-col items-center justify-center shadow-[inset_0_1px_2px_rgba(255,255,255,0.2),0_4px_8px_rgba(0,0,0,0.5)] transition-all duration-300 overflow-hidden group-hover:border-emerald-400 group-hover:shadow-[0_0_15px_rgba(16,185,129,0.3)]`}>
                                    <div className="absolute inset-0 premium-pattern opacity-40"></div>
                                    <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-slate-950/90 flex items-center justify-center border border-slate-600 shadow-inner z-10">
                                        <span className="font-black text-slate-400 text-lg sm:text-xl">{index + 1}</span>
                                    </div>
                                </div>
                                
                                {/* CARD FRONT */}
                                <div className={`absolute inset-0 backface-hidden rotate-y-180 rounded-xl sm:rounded-2xl border flex flex-col items-center justify-center p-1 sm:p-2 text-center transition-all duration-300 overflow-hidden ${frontBg}`}>
                                    {card.emoji && (
                                        <div className="text-xl sm:text-2xl mb-1 sm:mb-2 drop-shadow-md emoji-wrap-fix w-full px-1 max-h-[3.5rem] overflow-hidden">
                                            {card.emoji}
                                        </div>
                                    )}
                                    <div className="w-full px-0.5 sm:px-1 overflow-hidden flex flex-col justify-center flex-1">
                                        <span className={`safari-text-fix font-bold tracking-tight leading-tight w-full ${card.text.length > 12 ? 'text-[9px] sm:text-[10px]' : 'text-[10px] sm:text-xs'} ${isMatched ? 'text-emerald-400' : isError ? 'text-rose-300' : 'text-zinc-200'}`}>
                                            {card.text}
                                        </span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    );
                })}
            </div>
        );

        // ═══════════════════════════════════════════════
        //  MODO SINGLEPLAYER
        // ═══════════════════════════════════════════════

        const SinglePlayerGame = ({ quizData, fullWordList, isStudent, quizId, hostName }) => {
            const [gameStarted, setGameStarted] = useState(false);
            const [playerName, setPlayerName] = useState(hostName || '');
            const [toastMsg, setToastMsg] = useState(null);
            const [showWordList, setShowWordList] = useState(false);

            const [roundsData, setRoundsData] = useState([]);
            const [currentRound, setCurrentRound] = useState(0);
            const [roundTransition, setRoundTransition] = useState(false);
            const [globalWin, setGlobalWin] = useState(false);

            const [deck, setDeck] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [errorIndices, setErrorIndices] = useState([]);
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [moves, setMoves] = useState(0);
            const [isLocked, setIsLocked] = useState(false);

            useEffect(() => {
                const rounds = buildRoundsFromWords(fullWordList);
                setRoundsData(rounds);
                setDeck(buildDeckFromRound(rounds[0]));
            }, []);

            const prepareDeck = (wordsArray) => {
                setDeck(buildDeckFromRound(wordsArray));
                setFlippedIndices([]);
                setErrorIndices([]);
                setMatchedPairs([]);
                setIsLocked(false);
            };

            const handleCardClick = (index) => {
                const card = deck[index];
                if (!gameStarted || isLocked || flippedIndices.includes(index) || errorIndices.includes(index) || matchedPairs.includes(card.uniqueId)) return;
                if (card.type === 'en') playAudio(card.audioText);

                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);

                if (newFlipped.length === 2) {
                    setIsLocked(true);
                    setMoves(m => m + 1);
                    const [idx1, idx2] = newFlipped;
                    const c1 = deck[idx1], c2 = deck[idx2];
                    
                    if (c1.pairId === c2.pairId && c1.type !== c2.type) {
                        setTimeout(() => {
                            const newMatched = [...matchedPairs, c1.uniqueId, c2.uniqueId];
                            setMatchedPairs(newMatched);
                            setFlippedIndices([]);
                            setIsLocked(false);
                            if (newMatched.length === deck.length) {
                                if (currentRound === 0) setRoundTransition(true);
                                else setGlobalWin(true);
                            }
                        }, 800);
                    } else {
                        setTimeout(() => {
                            setErrorIndices(newFlipped);
                            setFlippedIndices([]);
                            setTimeout(() => {
                                setErrorIndices([]);
                                setIsLocked(false);
                            }, 1500);
                        }, 2000);
                    }
                }
            };

            const startRound2 = () => { setCurrentRound(1); setRoundTransition(false); prepareDeck(roundsData[1]); };
            const handleRestart = () => {
                const rounds = buildRoundsFromWords(fullWordList);
                setRoundsData(rounds);
                setCurrentRound(0); setMoves(0); setGlobalWin(false); setRoundTransition(false);
                prepareDeck(rounds[0]);
            };

            const copyLink = () => {
                const studentUrl = `${window.location.origin}${window.location.pathname}?id=${quizId}&student=true`;
                navigator.clipboard.writeText(studentUrl).then(() => { setToastMsg('¡Link copiado!'); setTimeout(() => setToastMsg(null), 3000); });
            };

            if (!gameStarted) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center z-10 animate-pop-in">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                            <h1 className="text-3xl font-black text-emerald-500 mb-2 leading-tight">{quizData?.title || 'Memorama'}</h1>
                            <p className="text-zinc-400 mb-8 font-medium">Encuentra los 30 pares en dos rondas para ganar.</p>
                            <input type="text" placeholder="Tu nombre..." value={playerName} onChange={(e) => setPlayerName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && setGameStarted(true)}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-emerald-500 transition-colors" />
                            <button disabled={!playerName.trim()} onClick={() => setGameStarted(true)}
                                className="w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest">
                                Empezar Juego
                            </button>
                            <button onClick={goBack} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                Regresar
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">
                    <Toast msg={toastMsg} />
                    {roundTransition && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                            <div className="bg-zinc-900 border border-emerald-500/30 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Layers className="w-24 h-24 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Ronda 1 Superada!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Gran trabajo, {playerName}. ¡Vamos por los últimos 15 pares!</p>
                                <button onClick={startRound2} className="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-base uppercase tracking-widest">
                                    Siguiente Ronda ➡️
                                </button>
                            </div>
                        </div>
                    )}
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in p-4">
                            <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Award className="w-24 h-24 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Completado, {playerName}!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Lo lograste en {moves} movimientos totales.</p>
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => setShowWordList(true)} className="w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">📖 REPASAR VOCABULARIO</button>
                                    <button onClick={handleRestart} className="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">🔄 JUGAR OTRA VEZ</button>
                                    <button onClick={goBack} className="mt-2 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">SALIR</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showWordList && <WordListOverlay words={fullWordList} onClose={() => setShowWordList(false)} />}

                    <header className="px-4 py-3 sm:px-6 sm:py-4 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/50 backdrop-blur-md z-40">
                        <div className="flex items-center gap-3 min-w-0">
                            <button onClick={goBack} className="flex items-center gap-2 font-black text-xl tracking-tight text-white hover:text-emerald-400 transition-colors">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base shadow-lg shadow-indigo-600/20">P</div>
                            </button>
                            <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1"></div>
                            {!isStudent && (
                                <button onClick={copyLink} className="p-2 bg-zinc-800 text-sky-400 rounded-xl hover:bg-zinc-700 hover:text-sky-300 transition-colors border border-zinc-700 shrink-0" title="Copiar link para alumnos"><Share2 size={18}/></button>
                            )}
                            <div className={`min-w-0 ${!isStudent ? "ml-2" : ""}`}>
                                <h1 className="text-base sm:text-lg font-black text-emerald-500 leading-none tracking-tight truncate">{quizData?.title || 'Actividad Periplo'}</h1>
                                <p className="text-[9px] sm:text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Modo: Solitario • Ronda {currentRound + 1} de 2</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3 shrink-0">
                            <div className="flex flex-col items-end sm:items-center sm:flex-row gap-1 sm:gap-3 bg-zinc-900 border border-zinc-800 px-3 sm:px-4 py-2 rounded-xl">
                                <span className="text-zinc-400 font-black text-[10px] sm:text-xs uppercase tracking-widest">Pares: <span className="text-emerald-500">{matchedPairs.length / 2}/15</span></span>
                                <div className="w-1 h-1 bg-zinc-700 rounded-full hidden sm:block"></div>
                                <span className="text-zinc-400 font-black text-[10px] sm:text-xs uppercase tracking-widest">Movs: <span className="text-white">{moves}</span></span>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 w-full overflow-y-auto custom-scrollbar p-2 sm:p-4 md:p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
                        <div className="max-w-7xl mx-auto w-full pb-10">
                            <CardGrid 
                                deck={deck} 
                                flippedIndices={flippedIndices} 
                                errorIndices={errorIndices} 
                                matchedUniqueIds={matchedPairs} 
                                onCardClick={handleCardClick} 
                                isLocked={isLocked} 
                            />
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════
        //  MODO MULTIPLAYER — SISTEMA DE SALAS
        // ═══════════════════════════════════════════════

        const MultiPlayerGame = ({ user, quizId, isStudent, autoCreate, hostName, hostEmoji }) => {
            const [deckId] = useState(quizId);
            const [roomId, setRoomId] = useState(() => sessionStorage.getItem('memorama_room') || '');
            
            const [roomData, setRoomData] = useState(null);
            const [joinInput, setJoinInput] = useState('');
            const [localError, setLocalError] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            
            // Config de Alumno
            const [studentName, setStudentName] = useState(localStorage.getItem('periplo_student_name') || '');
            const [studentEmoji, setStudentEmoji] = useState(localStorage.getItem('periplo_student_emoji') || '👽');
            
            const [showWordList, setShowWordList] = useState(false);
            const [fullWordList, setFullWordList] = useState([]);

            const hasCreated = useRef(false);

            useEffect(() => {
                if (roomId) sessionStorage.setItem('memorama_room', roomId);
                else sessionStorage.removeItem('memorama_room');
            }, [roomId]);

            useEffect(() => {
                const handleVis = () => {
                    if (document.visibilityState === 'visible' && roomId) {
                        getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId)).then(snap => {
                            if (snap.exists()) setRoomData(snap.data());
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVis);
                return () => document.removeEventListener("visibilitychange", handleVis);
            }, [roomId]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlCode = params.get('code');
                if (urlCode) setJoinInput(urlCode.toUpperCase());
            }, []);

            useEffect(() => {
                if (!roomId || !user) { setRoomData(null); return; }
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId);
                const unsub = onSnapshot(roomRef, (snap) => {
                    if (snap.exists()) {
                        setRoomData(snap.data());
                    } else {
                        setRoomData(null);
                        setLocalError("La sala fue cerrada o no existe.");
                        setRoomId('');
                    }
                });
                return () => unsub();
            }, [user, roomId]);

            const updateGame = async (updates) => {
                if (!roomId || !user) return;
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', roomId);
                    await updateDoc(roomRef, updates);
                } catch (e) { console.error("updateGame error:", e); }
            };

            const handleCreateRoom = async () => {
                if (!user || !deckId) return;
                try {
                    const quizSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', deckId));
                    if (!quizSnap.exists()) { alert("No se encontró el quiz. Regresa al dashboard."); return; }

                    const quizDoc = quizSnap.data();
                    const words = parseQuizWords(quizDoc);
                    setFullWordList(words);
                    const rounds = buildRoundsFromWords(words);

                    const code = Math.random().toString(36).substring(2, 6).toUpperCase().padEnd(4, 'X');
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'memorama_rooms', code);

                    await setDoc(roomRef, {
                        roomId: code,
                        gameType: 'MEMORAMA',
                        sourceQuizId: deckId,
                        title: quizDoc.title || 'Memorama',
                        gameState: 'MENU',
                        players: { s1: user.uid, j1: null, j2: null, j3: null, j4: null },
                        playerNames: { [user.uid]: hostName || 'Mtro Creador' },
                        playerEmojis: { [user.uid]: hostEmoji || '👑' },
                        roundsWords: {
                            0: rounds[0].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId })),
                            1: rounds[1].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId }))
                        },
                        fullWordList: words.map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn })),
                        currentRound: 0,
                        deck: [],
                        flippedIndices: [],
                        errorIndices: [],
                        matchedUniqueIds: [],
                        scores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                        totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                        lastMatchBy: null,
                        turn: 1,
                        isLocked: false,
                        winner: null,
                        feedbackMessage: null,
                        isPaused: false,
                    });
                    setRoomId(code);
                    setLocalError('');
                } catch (e) { console.error(e); setLocalError("Error al crear la sala."); }
            };

            // Auto-create room for Host
            useEffect(() => {
                if (autoCreate && deckId && user && !roomId && !hasCreated.current) {
                    hasCreated.current = true;
                    handleCreateRoom();
                }
            }, [autoCreate, deckId, user, roomId]);

            const handleJoinRoom = () => {
                if (!user || !joinInput) return;
                if (isStudent && !studentName.trim()) { setLocalError("Ingresa tu nombre."); return; }
                if (isStudent) {
                    localStorage.setItem('periplo_student_name', studentName);
                    localStorage.setItem('periplo_student_emoji', studentEmoji);
                }
                setLocalError('');
                setRoomId(joinInput.trim().toUpperCase());
            };

            const handleLeaveRoom = async () => {
                if (roomData && user && roomId) {
                    const newPlayers = { ...roomData.players };
                    let changed = false;
                    Object.keys(newPlayers).forEach(k => {
                        if (newPlayers[k] === user.uid) { newPlayers[k] = null; changed = true; }
                    });
                    if (changed) {
                        try { await updateGame({ players: newPlayers }); } catch(e) {}
                    }
                }
                setRoomId(''); setRoomData(null); setJoinInput(''); setLocalError('');
                sessionStorage.removeItem('memorama_room');
            };

            const toggleRole = async (roleId) => {
                if (!roomData || !user) return;
                const newPlayers = { ...roomData.players };
                const newNames = { ...(roomData.playerNames || {}) };
                const newEmojis = { ...(roomData.playerEmojis || {}) };

                if (newPlayers[roleId] === user.uid) {
                    newPlayers[roleId] = null;
                } else {
                    newPlayers[roleId] = user.uid;
                    newNames[user.uid] = isStudent ? studentName : (hostName || (roleId === 's1' ? 'Maestro' : 'Jugador M'));
                    newEmojis[user.uid] = isStudent ? studentEmoji : (hostEmoji || '👑');
                }
                await updateGame({ players: newPlayers, playerNames: newNames, playerEmojis: newEmojis });
            };

            const copyStudentLink = () => {
                const link = `${window.location.origin}${window.location.pathname}?mode=student&code=${roomId}`;
                navigator.clipboard.writeText(link);
                setToastMsg('¡Link Copiado!'); setTimeout(() => setToastMsg(null), 3000);
            };

            const startGame = async () => {
                if (!roomData) return;
                const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                if (activePlayers.length === 0) { alert("Al menos un jugador debe sentarse."); return; }

                const roundWords = roomData.roundsWords[0];
                const newDeck = buildDeckFromRound(roundWords);

                await updateGame({
                    gameState: 'PLAYING',
                    currentRound: 0,
                    deck: newDeck,
                    flippedIndices: [],
                    errorIndices: [],
                    matchedUniqueIds: [],
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    lastMatchBy: null,
                    turn: activePlayers[0],
                    isLocked: false,
                    winner: null,
                    isPaused: false,
                    feedbackMessage: { text: `¡Empieza la Ronda 1! Turno de ${roomData.playerNames[roomData.players[`j${activePlayers[0]}`]] || 'Jugador ' + activePlayers[0]}`, type: 'info', ts: Date.now() },
                });
            };

            const startRound2 = async () => {
                if (!roomData) return;
                const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                const roundWords = roomData.roundsWords[1];
                const newDeck = buildDeckFromRound(roundWords);

                const newTotalScores = { ...roomData.totalScores };
                [1,2,3,4].forEach(n => { newTotalScores[n] = (newTotalScores[n] || 0) + (roomData.scores[n] || 0); });

                await updateGame({
                    gameState: 'PLAYING',
                    currentRound: 1,
                    deck: newDeck,
                    flippedIndices: [],
                    errorIndices: [],
                    matchedUniqueIds: [],
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    totalScores: newTotalScores,
                    lastMatchBy: null,
                    turn: activePlayers[0],
                    isLocked: false,
                    winner: null,
                    isPaused: false,
                    feedbackMessage: { text: '¡Ronda 2! A buscar los últimos 15 pares.', type: 'info', ts: Date.now() },
                });
            };

            const handleCardClick = async (index) => {
                if (!roomData || roomData.gameState !== 'PLAYING' || roomData.isPaused) return;

                const myPlayerKey = Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid);
                const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j', '')) : null;
                if (!myPlayerNum || roomData.turn !== myPlayerNum) return;

                const card = roomData.deck[index];
                if (!card) return;
                
                const currentFlipped = roomData.flippedIndices || [];
                const currentErrors = roomData.errorIndices || [];
                
                if (currentFlipped.includes(index) || currentErrors.includes(index) || roomData.matchedUniqueIds.includes(card.uniqueId)) return;

                if (card.type === 'en') playAudio(card.audioText);

                const newFlipped = [...currentFlipped, index];

                if (newFlipped.length === 1) {
                    await updateGame({ flippedIndices: newFlipped });
                } else if (newFlipped.length === 2) {
                    await updateGame({ flippedIndices: newFlipped, isLocked: true });

                    const [idx1, idx2] = newFlipped;
                    const c1 = roomData.deck[idx1], c2 = roomData.deck[idx2];
                    const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);

                    if (c1.pairId === c2.pairId && c1.type !== c2.type) {
                        setTimeout(async () => {
                            const newMatched = [...roomData.matchedUniqueIds, c1.uniqueId, c2.uniqueId];
                            const newScores = { ...roomData.scores };
                            newScores[myPlayerNum] = (newScores[myPlayerNum] || 0) + 1;
                            const playerName = roomData.playerNames[user.uid] || `Jugador ${myPlayerNum}`;

                            let updates = {
                                flippedIndices: [],
                                matchedUniqueIds: newMatched,
                                scores: newScores,
                                lastMatchBy: myPlayerNum,
                                isLocked: false,
                                feedbackMessage: { text: `✨ ¡${playerName} encontró un par! Sigue jugando.`, type: 'success', ts: Date.now() },
                            };

                            if (newMatched.length === roomData.deck.length) {
                                if (roomData.currentRound === 0) {
                                    updates.gameState = 'ROUND_TRANSITION';
                                    updates.feedbackMessage = { text: '¡Ronda 1 completada!', type: 'info', ts: Date.now() };
                                } else {
                                    const finalTotals = { ...roomData.totalScores };
                                    [1,2,3,4].forEach(n => { finalTotals[n] = (finalTotals[n] || 0) + (newScores[n] || 0); });
                                    updates.totalScores = finalTotals;

                                    let maxScore = 0; let winners = [];
                                    activePlayers.forEach(n => {
                                        if (finalTotals[n] > maxScore) { maxScore = finalTotals[n]; winners = [n]; }
                                        else if (finalTotals[n] === maxScore) winners.push(n);
                                    });
                                    const winnerName = winners.length === 1
                                        ? (roomData.playerNames[roomData.players[`j${winners[0]}`]] || `Jugador ${winners[0]}`)
                                        : '¡Empate!';

                                    updates.gameState = 'GAME_OVER';
                                    updates.winner = winnerName;
                                    updates.feedbackMessage = { text: `🏆 ${winnerName} gana con ${maxScore} pares!`, type: 'success', ts: Date.now() };
                                }
                            }
                            await updateGame(updates);
                        }, 800);
                    } else {
                        setTimeout(async () => {
                            await updateGame({
                                flippedIndices: [],
                                errorIndices: newFlipped
                            });
                            setTimeout(async () => {
                                const nextTurn = getNextTurn(myPlayerNum, activePlayers);
                                const nextName = roomData.playerNames[roomData.players[`j${nextTurn}`]] || `Jugador ${nextTurn}`;
                                await updateGame({
                                    errorIndices: [],
                                    isLocked: false,
                                    turn: nextTurn,
                                    feedbackMessage: { text: `No hubo par. Turno de ${nextName}.`, type: 'alert', ts: Date.now() },
                                });
                            }, 1500); 
                        }, 2000); 
                    }
                }
            };

            const handleRestart = async () => {
                if (!roomData) return;
                const words = roomData.fullWordList || [];
                const rounds = buildRoundsFromWords(words);
                const activePlayers = [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]);
                const newDeck = buildDeckFromRound(rounds[0]);

                await updateGame({
                    roundsWords: {
                        0: rounds[0].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId })),
                        1: rounds[1].map(w => ({ id: w.id, wordEn: w.wordEn, wordEs: w.wordEs, emojis: w.emojis, exampleEn: w.exampleEn, instanceId: w.instanceId }))
                    },
                    gameState: 'PLAYING',
                    currentRound: 0,
                    deck: newDeck,
                    flippedIndices: [],
                    errorIndices: [],
                    matchedUniqueIds: [],
                    scores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    totalScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
                    lastMatchBy: null,
                    turn: activePlayers[0] || 1,
                    isLocked: false,
                    winner: null,
                    isPaused: false,
                    feedbackMessage: { text: '¡Nueva partida! Ronda 1.', type: 'info', ts: Date.now() },
                });
            };

            const handleEndGame = async () => {
                if (!roomData) return;
                await updateGame({ gameState: 'MENU', isPaused: false, feedbackMessage: null, winner: null });
            };

            const isS1 = roomData?.players?.s1 === user?.uid;
            const myPlayerKey = roomData ? Object.keys(roomData.players).find(k => k.startsWith('j') && roomData.players[k] === user?.uid) : null;
            const myPlayerNum = myPlayerKey ? parseInt(myPlayerKey.replace('j', '')) : null;
            const activePlayers = roomData ? [1, 2, 3, 4].filter(n => roomData.players[`j${n}`]) : [];

            if (!roomId) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 h-[100dvh] bg-zinc-950 overflow-y-auto">
                        <button onClick={goBack} className="absolute top-4 left-4 p-2.5 bg-zinc-800 rounded-xl hover:bg-zinc-700 transition text-white border border-zinc-700"><ArrowLeft size={20}/></button>
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-lg w-full text-center relative animate-pop-in mt-10 sm:mt-0">
                            <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-4">P</div>
                            <h1 className="text-3xl font-black text-emerald-500 mb-1">Memorama</h1>
                            <p className="text-zinc-500 mb-8 font-medium text-sm">{isStudent ? 'Entra a tu Sala' : 'Unirse a sala Multijugador'}</p>

                            {localError && <div className="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm font-bold">{localError}</div>}

                            <div className="space-y-5 w-full">
                                {isStudent && (
                                    <>
                                        <div className="text-left mb-2">
                                            <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">1. Tu Nombre</label>
                                            <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)}
                                                placeholder="Ej: Sofía" className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-emerald-500 transition-colors" />
                                        </div>
                                        <div className="text-left mb-6">
                                            <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">2. Elige tu Avatar</label>
                                            <div className="grid grid-cols-6 gap-2 p-3 border-2 border-zinc-800 rounded-2xl bg-zinc-950">
                                                {AVATAR_EMOJIS.map(emoji => (
                                                    <button key={emoji} onClick={() => setStudentEmoji(emoji)} className={`text-2xl aspect-square rounded-xl transition-all flex items-center justify-center ${studentEmoji === emoji ? 'bg-emerald-600 scale-110 shadow-lg ring-2 ring-emerald-300' : 'bg-zinc-800 hover:bg-zinc-700 opacity-70 hover:opacity-100'}`}>{emoji}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}

                                <div className="text-left">
                                    <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">{isStudent ? '3.' : ''} Código de la Sala</label>
                                    <div className="flex gap-2 w-full max-w-full">
                                        <input type="text" value={joinInput} onChange={(e) => setJoinInput(e.target.value.toUpperCase())}
                                            placeholder="CÓDIGO" maxLength={4}
                                            onKeyDown={(e) => e.key === 'Enter' && joinInput.length >= 4 && handleJoinRoom()}
                                            className="flex-1 min-w-0 bg-zinc-950 border-2 border-zinc-800 rounded-xl px-3 sm:px-4 py-3 text-center text-xl font-black text-white uppercase tracking-widest focus:outline-none focus:border-emerald-500 transition-colors" />
                                        <button onClick={handleJoinRoom} disabled={joinInput.length < 4}
                                            className="shrink-0 bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-black px-4 sm:px-6 rounded-xl font-bold transition flex items-center justify-center active:scale-95">
                                            <ArrowRight size={24} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (roomId && !roomData) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center gap-4 animate-fade-in w-full h-[100dvh] bg-zinc-950">
                        <Loader2 size={48} className="animate-spin text-emerald-500" />
                        <p className="font-bold tracking-widest uppercase text-zinc-400 text-sm">Conectando a la sala...</p>
                    </div>
                );
            }

            if (roomData.gameState === 'MENU') {
                const canStart = isS1 && activePlayers.length >= 1;
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative w-full h-[100dvh] overflow-y-auto bg-zinc-950">
                        <Toast msg={toastMsg} />
                        <div className="bg-zinc-900 border border-zinc-800 p-6 md:p-8 rounded-[2.5rem] shadow-2xl max-w-lg w-full relative animate-pop-in mt-10 sm:mt-0">
                            <button onClick={handleLeaveRoom} className="absolute top-4 left-4 text-zinc-500 hover:text-white flex items-center gap-1 text-xs font-bold transition bg-zinc-800 px-3 py-1.5 rounded-full border border-zinc-700">
                                <ArrowLeft size={14} /> Salir
                            </button>

                            <div className="text-center mb-6 mt-8">
                                <p className="text-[10px] text-emerald-500 font-black mb-2 uppercase tracking-widest flex justify-center gap-1 items-center"><Layers size={12}/> {roomData.title || 'Memorama'}</p>
                                <h2 className="text-sm font-bold text-zinc-500 tracking-widest uppercase mb-1">Código de Sala</h2>
                                <div className="text-5xl font-black text-white tracking-[0.2em] bg-zinc-950 py-3 rounded-xl border border-zinc-800 mx-auto w-max px-8 shadow-inner">{roomId}</div>
                                {!isStudent && (
                                    <button onClick={copyStudentLink} className="mt-4 px-6 py-2 bg-zinc-800 hover:bg-zinc-700 text-emerald-400 rounded-full font-bold text-sm flex items-center justify-center mx-auto gap-2 transition-colors border border-zinc-700">
                                        <LinkIcon size={14}/> Copiar Link de Alumnos
                                    </button>
                                )}
                            </div>

                            <div className="mb-4 bg-zinc-950/50 p-3 rounded-xl border border-zinc-800">
                                <h4 className="text-zinc-500 font-bold mb-2 uppercase tracking-widest text-[10px] text-center">Maestro (Administra la sala)</h4>
                                {isS1 ? (
                                    <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-300 p-3 rounded-xl flex items-center justify-between">
                                        <span className="font-bold flex items-center gap-2 text-sm"><Crown size={14}/> Tú administras esta sala</span>
                                        <Check size={16} className="text-emerald-400"/>
                                    </div>
                                ) : roomData.players.s1 ? (
                                    <div className="bg-zinc-800 p-3 rounded-xl text-zinc-400 flex items-center gap-2 text-sm border border-zinc-700">
                                        <span className="text-lg">{roomData.playerEmojis?.[roomData.players.s1] || '👑'}</span> {roomData.playerNames[roomData.players.s1]} es el Maestro
                                    </div>
                                ) : null}
                            </div>

                            <h4 className="text-emerald-400 font-bold mb-3 uppercase tracking-widest text-[11px] text-center bg-emerald-900/30 py-2 rounded-lg border border-emerald-500/30 shadow-inner">👉 Toca una silla libre para sentarte</h4>
                            
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                {[1, 2, 3, 4].map(num => {
                                    const roleId = `j${num}`;
                                    const occupantId = roomData.players[roleId];
                                    const isMe = occupantId === user?.uid;
                                    const isOccupied = occupantId && !isMe;
                                    const displayName = occupantId ? (roomData.playerNames?.[occupantId] || `Jugador ${num}`) : `Libre`;
                                    const displayEmoji = occupantId ? (roomData.playerEmojis?.[occupantId] || '👤') : null;
                                    const colors = PLAYER_COLORS[num];

                                    return (
                                        <div key={roleId} className={`p-3 rounded-xl border-2 flex flex-col items-center justify-center gap-2 transition-all ${isMe ? `${colors.light} ${colors.border}` : isOccupied ? 'bg-zinc-900/50 border-zinc-700 opacity-60' : 'bg-zinc-800 border-zinc-700'}`}>
                                            <div className={`w-10 h-10 rounded-full ${isMe || isOccupied ? colors.bg : 'bg-zinc-700'} flex items-center justify-center text-xl shadow-inner border border-black/20`}>
                                                {displayEmoji || <User size={16} className="text-white" />}
                                            </div>
                                            <span className={`font-black text-xs truncate w-full text-center ${isOccupied || isMe ? colors.text : 'text-zinc-500'}`}>{displayName}</span>
                                            <button onClick={() => toggleRole(roleId)} disabled={isOccupied}
                                                className={`text-[10px] px-3 py-1.5 rounded-lg font-bold w-full transition active:scale-95 ${isMe ? 'bg-red-500/80 hover:bg-red-500 text-white' : isOccupied ? 'bg-zinc-900 text-zinc-600 cursor-not-allowed' : 'bg-emerald-500 hover:bg-emerald-400 text-black'}`}>
                                                {isMe ? 'Levantarse' : isOccupied ? 'Ocupado' : '¡Sentarse Aquí!'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>

                            <button onClick={startGame} disabled={!canStart}
                                className={`btn-juicy w-full py-4 rounded-xl font-black text-lg shadow-lg transition flex items-center justify-center gap-2 active:scale-95 uppercase tracking-widest ${canStart ? 'bg-emerald-500 hover:bg-emerald-400 text-black' : 'bg-zinc-800 text-zinc-600 cursor-not-allowed'}`}>
                                <Play size={22} fill="currentColor" /> {!isS1 ? 'Esperando al Maestro...' : '¡Empezar!'}
                            </button>
                        </div>
                    </div>
                );
            }

            if (roomData.gameState === 'ROUND_TRANSITION') {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex items-center justify-center p-4">
                        <div className="bg-zinc-900 border border-emerald-500/30 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md animate-pop-in">
                            <Layers className="w-20 h-20 text-emerald-500 mx-auto mb-6 animate-bounce"/>
                            <h2 className="text-3xl font-black mb-3">¡Ronda 1 Superada!</h2>
                            
                            <div className="space-y-2 mb-6">
                                {activePlayers.sort((a,b) => (roomData.scores[b]||0) - (roomData.scores[a]||0)).map(n => {
                                    const c = PLAYER_COLORS[n];
                                    const occupantId = roomData.players[`j${n}`];
                                    const name = roomData.playerNames[occupantId] || `Jugador ${n}`;
                                    const emoji = roomData.playerEmojis?.[occupantId] || '';
                                    return (
                                        <div key={n} className={`flex items-center justify-between p-3 rounded-xl ${c.light} border ${c.border}/30`}>
                                            <span className={`font-bold text-sm ${c.text}`}>{emoji} {name}</span>
                                            <span className="font-black text-white text-lg">{roomData.scores[n] || 0} pares</span>
                                        </div>
                                    );
                                })}
                            </div>

                            {isS1 ? (
                                <button onClick={startRound2} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-base uppercase tracking-widest">
                                    Siguiente Ronda ➡️
                                </button>
                            ) : (
                                <p className="text-zinc-400 bg-zinc-950 p-3 rounded-lg font-bold text-sm">Esperando al Maestro...</p>
                            )}
                        </div>
                    </div>
                );
            }

            if (roomData.gameState === 'GAME_OVER') {
                const sortedPlayers = [...activePlayers].sort((a,b) => (roomData.totalScores[b]||0) - (roomData.totalScores[a]||0));
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex items-center justify-center p-4">
                        <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md animate-pop-in mt-10 sm:mt-0">
                            <Trophy className="w-20 h-20 text-amber-400 mx-auto mb-4 animate-bounce"/>
                            <h2 className="text-3xl font-black mb-1">¡Juego Terminado!</h2>
                            <p className="text-emerald-400 font-black text-xl mb-6">{roomData.winner}</p>

                            <div className="space-y-2 mb-8">
                                {sortedPlayers.map((n, i) => {
                                    const c = PLAYER_COLORS[n];
                                    const occupantId = roomData.players[`j${n}`];
                                    const name = roomData.playerNames[occupantId] || `Jugador ${n}`;
                                    const emoji = roomData.playerEmojis?.[occupantId] || '';
                                    const total = roomData.totalScores[n] || 0;
                                    return (
                                        <div key={n} className={`flex items-center justify-between p-3 rounded-xl border ${i === 0 ? 'bg-amber-500/10 border-amber-500/40' : 'bg-zinc-800 border-zinc-700'}`}>
                                            <div className="flex items-center gap-3">
                                                <span className={`font-black text-lg ${i === 0 ? 'text-amber-400' : 'text-zinc-500'}`}>#{i+1}</span>
                                                <span className={`font-bold text-sm ${c.text}`}>{emoji} {name}</span>
                                            </div>
                                            <span className="font-black text-white text-lg">{total} pares</span>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="flex flex-col gap-3">
                                <button onClick={() => setShowWordList(true)} className="btn-juicy w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-3 rounded-xl transition-all active:scale-95 text-sm">📖 REPASAR VOCABULARIO</button>
                                {isS1 && <button onClick={handleRestart} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black px-6 py-3 rounded-xl transition-all active:scale-95 text-sm uppercase">🔄 Jugar Otra Vez</button>}
                                {isS1 && <button onClick={handleEndGame} className="btn-juicy w-full bg-zinc-800 border border-zinc-700 hover:bg-zinc-700 text-zinc-300 font-bold px-6 py-3 rounded-xl transition-all active:scale-95 text-xs uppercase tracking-widest">Volver al Lobby</button>}
                                {!isS1 && <p className="text-zinc-500 font-bold text-xs mt-2">Esperando al Maestro...</p>}
                            </div>
                        </div>
                        {showWordList && <WordListOverlay words={roomData.fullWordList || []} onClose={() => setShowWordList(false)} />}
                    </div>
                );
            }

            const isMyTurn = myPlayerNum === roomData.turn;
            const currentTurnOccupant = roomData.players[`j${roomData.turn}`];
            const currentTurnName = roomData.playerNames[currentTurnOccupant] || `Jugador ${roomData.turn}`;
            const currentTurnEmoji = roomData.playerEmojis?.[currentTurnOccupant] || '👤';
            const turnColor = PLAYER_COLORS[roomData.turn] || PLAYER_COLORS[1];

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 flex flex-col overflow-hidden relative">
                    <Toast msg={toastMsg} />

                    {roomData.feedbackMessage && (
                        <FeedbackBanner message={roomData.feedbackMessage} />
                    )}

                    {roomData.isPaused && (
                        <div className="absolute inset-0 z-[60] bg-zinc-950/90 backdrop-blur-md flex flex-col items-center justify-center animate-fade-in p-4">
                            <div className="bg-zinc-900 p-8 rounded-[2rem] shadow-2xl border border-zinc-800 text-center flex flex-col items-center max-w-sm w-full">
                                <Pause size={56} className="text-zinc-400 mb-6" />
                                <h2 className="text-3xl font-black text-white tracking-widest mb-6">PAUSADO</h2>
                                <div className="flex flex-col gap-3 w-full">
                                    <button onClick={() => updateGame({ isPaused: false })} className="btn-juicy w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-black rounded-xl font-black text-lg transition active:scale-95 flex items-center justify-center gap-2">
                                        <Play size={20} fill="currentColor" /> CONTINUAR
                                    </button>
                                    {isS1 && (
                                        <button onClick={handleRestart} className="btn-juicy w-full py-3 bg-amber-500 hover:bg-amber-400 text-black rounded-xl font-bold transition active:scale-95 flex items-center justify-center gap-2">
                                            <RotateCcw size={18} /> REINICIAR
                                        </button>
                                    )}
                                    {isS1 && (
                                        <button onClick={handleEndGame} className="btn-juicy w-full py-3 bg-zinc-800 border border-zinc-700 hover:bg-zinc-700 text-zinc-300 rounded-xl font-bold transition active:scale-95 flex items-center justify-center gap-2">
                                            <Home size={18} /> TERMINAR
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="px-3 py-2.5 sm:px-6 sm:py-3 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/80 backdrop-blur-md z-40">
                        <div className="flex items-center gap-2 sm:gap-3 min-w-0">
                            <button onClick={goBack} className="flex items-center gap-2 font-black text-xl tracking-tight text-white hover:text-emerald-400 transition-colors hidden sm:flex mr-1">
                                <div className="w-8 h-8 sm:w-10 sm:h-10 bg-indigo-600 rounded-lg sm:rounded-xl flex items-center justify-center text-white text-sm sm:text-base shadow-lg shadow-indigo-600/20">P</div>
                            </button>
                            <button onClick={() => updateGame({ isPaused: true })} className="p-1.5 sm:p-2 bg-zinc-800 text-zinc-400 rounded-lg sm:rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700 shrink-0">
                                <Pause size={16}/>
                            </button>
                            <div className="min-w-0 ml-1 sm:ml-2">
                                <h1 className="text-sm sm:text-lg font-black text-emerald-500 leading-none tracking-tight truncate">{roomData.title || 'Memorama'}</h1>
                                <p className="text-[9px] sm:text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">Ronda {(roomData.currentRound || 0) + 1}/2 • Sala {roomId}</p>
                            </div>
                        </div>

                        <div className={`flex items-center gap-2 px-3 py-1.5 rounded-xl border ${isMyTurn ? `${turnColor.light} ${turnColor.border}/50 animate-pulse-border` : 'bg-zinc-900 border-zinc-800'}`}>
                            <div className={`w-6 h-6 rounded-full ${turnColor.bg} flex items-center justify-center shrink-0 shadow-inner`}>
                                <span className="text-xs">{currentTurnEmoji}</span>
                            </div>
                            <span className={`font-black text-xs sm:text-sm truncate max-w-[80px] sm:max-w-[120px] ${isMyTurn ? 'text-white' : 'text-zinc-400'}`}>
                                {isMyTurn ? '¡Tu turno!' : currentTurnName}
                            </span>
                        </div>
                    </header>

                    <div className="shrink-0 bg-zinc-900/50 border-b border-zinc-800/50 px-3 py-2 flex items-center justify-center gap-2 sm:gap-4 overflow-x-auto">
                        {activePlayers.map(n => {
                            const c = PLAYER_COLORS[n];
                            const occupant = roomData.players[`j${n}`];
                            const name = roomData.playerNames[occupant] || `J${n}`;
                            const emoji = roomData.playerEmojis?.[occupant] || '👤';
                            const score = (roomData.totalScores?.[n] || 0) + (roomData.scores?.[n] || 0);
                            const isTurn = roomData.turn === n;
                            return (
                                <div key={n} className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg transition-all ${isTurn ? `${c.light} border ${c.border}/40 shadow-md ${c.glow}` : 'bg-zinc-800/50 border border-zinc-800'}`}>
                                    <div className={`w-5 h-5 rounded-full ${c.bg} flex items-center justify-center shrink-0`}>
                                        <span className="text-[10px]">{emoji}</span>
                                    </div>
                                    <span className={`font-bold text-[10px] sm:text-xs truncate max-w-[50px] sm:max-w-[70px] ${c.text}`}>{name}</span>
                                    <span className="font-black text-white text-xs sm:text-sm">{score}</span>
                                </div>
                            );
                        })}
                    </div>

                    <div className="flex-1 w-full overflow-y-auto custom-scrollbar p-2 sm:p-4 md:p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
                        <div className="max-w-7xl mx-auto w-full pb-10">
                            <CardGrid
                                deck={roomData.deck || []}
                                flippedIndices={roomData.flippedIndices || []}
                                errorIndices={roomData.errorIndices || []}
                                matchedUniqueIds={roomData.matchedUniqueIds || []}
                                onCardClick={handleCardClick}
                                isLocked={roomData.isLocked || !isMyTurn}
                                lastMatchBy={roomData.lastMatchBy}
                            />
                        </div>
                    </div>

                    {!isMyTurn && !roomData.isPaused && (
                        <div className="shrink-0 bg-zinc-900 border-t border-zinc-800 px-4 py-3 text-center sm:hidden">
                            <p className="text-zinc-400 font-bold text-sm">Esperando a <span className={`${turnColor.text} font-black`}>{currentTurnName}</span>...</p>
                        </div>
                    )}
                    {isMyTurn && !roomData.isPaused && (
                        <div className={`shrink-0 ${turnColor.light} border-t ${turnColor.border}/30 px-4 py-3 text-center sm:hidden`}>
                            <p className={`${turnColor.text} font-black text-sm uppercase tracking-widest animate-pulse`}>¡Es tu turno! Voltea 2 cartas</p>
                        </div>
                    )}

                    {showWordList && <WordListOverlay words={roomData.fullWordList || []} onClose={() => setShowWordList(false)} />}
                </div>
            );
        };

        const FeedbackBanner = ({ message }) => {
            const [visible, setVisible] = useState(false);
            const [text, setText] = useState('');
            const lastTs = useRef(null);

            useEffect(() => {
                if (message?.ts && message.ts !== lastTs.current) {
                    lastTs.current = message.ts;
                    setText(message.text);
                    setVisible(true);
                    const t = setTimeout(() => setVisible(false), 2500);
                    return () => clearTimeout(t);
                }
            }, [message?.ts]);

            if (!visible) return null;
            const bgClass = message.type === 'success' ? 'bg-emerald-500 text-black' : message.type === 'alert' ? 'bg-amber-500 text-black' : 'bg-sky-500 text-white';
            return (
                <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] ${bgClass} px-6 py-2.5 rounded-full font-black text-sm shadow-xl animate-pop-in whitespace-nowrap`}>
                    {text}
                </div>
            );
        };

        // ═══════════════════════════════════════════════
        //  APP ROOT — SELECTOR DE MODO
        // ═══════════════════════════════════════════════

        const MemoryApp = () => {
            const [user, setUser] = useState(null);
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const isStudentUrl = params.get('student') === 'true' || params.get('mode') === 'student';
            const hasCode = params.has('code');

            const [quizData, setQuizData] = useState(null);
            const [fullWordList, setFullWordList] = useState([]);
            const [loading, setLoading] = useState(true);

            // SYSTEM: Disclaimer Guard
            const [acceptedDisclaimer, setAcceptedDisclaimer] = useState(() => localStorage.getItem('periplo_disclaimer_v1') === 'true');

            // Config Maestro
            const [teacherMode, setTeacherMode] = useState(() => sessionStorage.getItem('memorama_mode') || (hasCode || isStudentUrl ? 'multi' : null));
            const [hostName, setHostName] = useState(() => localStorage.getItem('periplo_teacher_name') || 'Maestro');
            const [hostEmoji, setHostEmoji] = useState(() => localStorage.getItem('periplo_teacher_emoji') || '👑');

            useEffect(() => {
                if (teacherMode) sessionStorage.setItem('memorama_mode', teacherMode);
                else sessionStorage.removeItem('memorama_mode');
            }, [teacherMode]);

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.error(e));
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u && quizId && !hasCode && !isStudentUrl) {
                        getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                            if (snap.exists()) {
                                const data = snap.data();
                                setQuizData(data);
                                setFullWordList(parseQuizWords(data));
                            } else { alert("Juego no encontrado"); }
                            setLoading(false);
                        });
                    } else if (u) {
                        setLoading(false);
                    }
                });
                return () => unsub();
            }, []);

            if (!acceptedDisclaimer) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-6 bg-zinc-950 text-center overflow-auto">
                    <div className="max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-[2rem] shadow-2xl my-auto animate-pop-in">
                        <div className="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                            <AlertTriangle size={32} className="text-amber-500"/>
                        </div>
                        <h2 className="text-xl font-black text-white mb-4 uppercase tracking-widest">Aviso de Compatibilidad</h2>
                        <p className="text-zinc-400 text-sm font-bold mb-4 leading-relaxed">
                            Memorama está altamente optimizado. Sin embargo, si utilizas teléfonos antiguos o <strong className="text-white">Safari en iOS</strong>, algunos textos largos podrían verse cortados.
                        </p>
                        <p className="text-zinc-400 text-sm font-bold mb-8 leading-relaxed">
                            Si experimentas fallos visuales, te recomendamos usar <strong className="text-white">Chrome o jugar en PC/Laptop</strong> donde la experiencia es perfecta. 🚀
                        </p>
                        <button onClick={() => { localStorage.setItem('periplo_disclaimer_v1', 'true'); setAcceptedDisclaimer(true); }}
                            className="btn-juicy w-full bg-emerald-500 text-black font-black py-4 rounded-xl border-emerald-700 uppercase tracking-widest text-sm flex justify-center items-center gap-2">
                            Entendido, ¡A jugar!
                        </button>
                    </div>
                </div>
            );

            if (loading || !user) return (
                <div className="h-[100dvh] flex items-center justify-center bg-zinc-950">
                    <Loader2 size={40} className="animate-spin text-emerald-500" />
                </div>
            );

            if (isStudentUrl || hasCode) {
                return <MultiPlayerGame user={user} quizId={quizId} isStudent={true} />;
            }

            if (teacherMode === 'single') {
                return <SinglePlayerGame quizData={quizData} fullWordList={fullWordList} isStudent={false} quizId={quizId} hostName={hostName} />;
            }

            if (teacherMode === 'multi') {
                return <MultiPlayerGame user={user} quizId={quizId} isStudent={false} autoCreate={true} hostName={hostName} hostEmoji={hostEmoji} />;
            }

            // PANTALLA DE CONFIGURACIÓN DEL MAESTRO
            const saveHostConfig = () => {
                localStorage.setItem('periplo_teacher_name', hostName);
                localStorage.setItem('periplo_teacher_emoji', hostEmoji);
            };

            return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-y-auto">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center z-10 animate-pop-in mt-10 sm:mt-0">
                        <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                        <h1 className="text-3xl font-black text-emerald-500 mb-2 leading-tight">Configuración</h1>
                        <p className="text-zinc-400 mb-6 font-medium text-sm">Prepara tu perfil antes de iniciar.</p>

                        <div className="text-left mb-2">
                            <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">1. Tu Nombre</label>
                            <input type="text" value={hostName} onChange={(e) => setHostName(e.target.value)}
                                placeholder="Ej: Maestro Juan" className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl px-4 py-3 text-center text-lg font-bold text-white outline-none focus:border-emerald-500 transition-colors" />
                        </div>
                        
                        <div className="text-left mb-8">
                            <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">2. Elige tu Avatar</label>
                            <div className="grid grid-cols-6 gap-2 p-3 border-2 border-zinc-800 rounded-2xl bg-zinc-950">
                                {AVATAR_EMOJIS.map(emoji => (
                                    <button key={emoji} onClick={() => setHostEmoji(emoji)} className={`text-2xl aspect-square rounded-xl transition-all flex items-center justify-center ${hostEmoji === emoji ? 'bg-emerald-600 scale-110 shadow-lg ring-2 ring-emerald-300' : 'bg-zinc-800 hover:bg-zinc-700 opacity-70 hover:opacity-100'}`}>{emoji}</button>
                                ))}
                            </div>
                        </div>

                        <button onClick={() => { saveHostConfig(); setTeacherMode('single'); }} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-white font-black text-base py-4 rounded-xl mb-4 transition-all shadow-md active:scale-95 border border-zinc-700 uppercase tracking-widest flex items-center justify-center gap-2">
                            <User size={18} /> Jugar Solitario
                        </button>

                        <button onClick={() => { saveHostConfig(); setTeacherMode('multi'); }} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black text-base py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest flex items-center justify-center gap-2">
                            <Users size={18} /> Crear Sala Multijugador
                        </button>

                        <button onClick={goBack} className="mt-8 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                            Volver al Hub
                        </button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MemoryApp />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Say it with Emoji | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        /* Animaciones base */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes zoom-in-95 { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
        .zoom-in-95 { animation: zoom-in-95 0.3s ease-out; }
        @keyframes slide-in-from-top-4 { from { transform: translateY(-1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-in-from-top-4 { animation: slide-in-from-top-4 0.3s ease-out; }

        /* Estilos importados de Flashcards */
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .card-texture { background-color: #18181b; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E"); }
        .index-card-lines { background-image: linear-gradient(to bottom, transparent 3.9rem, #8b5cf6 3.9rem, #8b5cf6 4rem, #8b5cf6 4rem, #8b5cf6 4.1rem, transparent 4.1rem), linear-gradient(to bottom, #27272a 1px, transparent 1px); background-size: 100% 100%, 100% 2.5rem; background-position: 0 0, 0 6.6rem; }
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Check, Award, Home, Volume2, ArrowRight, ChevronLeft, ChevronRight, RotateCcw, X, CheckCircle2, CircleDashed, Trophy, RefreshCw, ArrowLeft } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const shuffleArray = (arr) => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

        const EmojiSpellApp = () => {
            const [user, setUser] = useState(null);
            const [quizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [gameStarted, setGameStarted] = useState(false);
            
            // ============================================================
            // MEMORIA DE NOMBRE (localStorage)
            // ============================================================
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('periplo_student_name') || '');

            const [toastMsg, setToastMsg] = useState(null);
            const [fullWordList, setFullWordList] = useState([]);
            const [showWordList, setShowWordList] = useState(false);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [cardStatuses, setCardStatuses] = useState({});
            const [availableLetters, setAvailableLetters] = useState([]);
            const [inputSlots, setInputSlots] = useState([]);
            const [status, setStatus] = useState('playing');
            const [shake, setShake] = useState(false);

            // NAVEGACIÓN INTELIGENTE
            const goBack = () => {
                const ref = document.referrer;
                if (ref && ref.includes('student_portal.html')) {
                    window.location.href = ref;
                } else {
                    window.location.href = 'index.html';
                }
            };

            // GUARDA EL NOMBRE Y ARRANCA EL JUEGO
            const handleStartGame = () => {
                localStorage.setItem('periplo_student_name', playerName);
                setGameStarted(true);
            };

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            const rawWords = data.content?.cards || data.content?.pairs || [];
                            const cleanWords = rawWords.map((w, i) => ({
                                id: w.id || i, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                                exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || '🎯'
                            })).filter(w => w.wordEn);
                            setFullWordList([...cleanWords].sort(() => 0.5 - Math.random()));
                        } else { alert("Juego no encontrado"); }
                        setLoading(false);
                    });
                } else { setLoading(false); }
                return () => unsub();
            }, [quizId]);

            const totalWords = fullWordList.length;
            const globalWin = totalWords > 0 && Object.keys(cardStatuses).length === totalWords;

            useEffect(() => {
                if (totalWords === 0 || globalWin || !gameStarted) return;
                const currentData = fullWordList[currentIndex];
                const currentWord = currentData.wordEn.toUpperCase();
                const letters = currentWord.replace(/\s+/g, '').split('');
                if (cardStatuses[currentIndex] === 'correct') {
                    setInputSlots(letters.map(char => ({ id: Math.random(), char })));
                    setAvailableLetters([]);
                    setStatus('correct');
                } else {
                    let shuffled = shuffleArray(letters); let attempts = 0;
                    const isAllSame = letters.every(l => l === letters[0]);
                    if (!isAllSame) { while (shuffled.join('') === letters.join('') && attempts < 10) { shuffled = shuffleArray(letters); attempts++; } }
                    setAvailableLetters(shuffled.map((char, index) => ({ id: `avail-${index}`, char })));
                    setInputSlots(Array(letters.length).fill(null));
                    setStatus('playing');
                }
            }, [currentIndex, fullWordList, cardStatuses, globalWin, gameStarted, totalWords]);

            const stopAudio = () => { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); };
            const playAudio = (text) => {
                if ('speechSynthesis' in window && text) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.85;
                    window.speechSynthesis.speak(u);
                }
            };

            const handleAddLetter = (item, idx) => {
                if (status !== 'playing') return;
                const firstEmpty = inputSlots.findIndex(s => s === null);
                if (firstEmpty === -1) return;
                const ns = [...inputSlots]; ns[firstEmpty] = item;
                setInputSlots(ns);
                setAvailableLetters(prev => prev.filter((_, i) => i !== idx));
            };

            const handleRemoveLetter = (idx, slot) => {
                if (!slot || status === 'correct') return;
                const ns = [...inputSlots]; ns[idx] = null; setInputSlots(ns);
                setAvailableLetters(prev => [...prev, slot]);
                if (status === 'error') setStatus('playing');
            };

            const handleRetry = () => {
                const currentData = fullWordList[currentIndex];
                const letters = currentData.wordEn.toUpperCase().replace(/\s+/g, '').split('');
                let shuffled = shuffleArray(letters); let attempts = 0;
                const isAllSame = letters.every(l => l === letters[0]);
                if (!isAllSame) { while (shuffled.join('') === letters.join('') && attempts < 10) { shuffled = shuffleArray(letters); attempts++; } }
                setAvailableLetters(shuffled.map((char, index) => ({ id: `avail-retry-${index}-${Date.now()}`, char })));
                setInputSlots(Array(letters.length).fill(null));
                setStatus('playing');
            };

            const checkAnswer = () => {
                const currentData = fullWordList[currentIndex];
                const targetWord = currentData.wordEn.toUpperCase().replace(/\s+/g, '');
                const currentGuess = inputSlots.map(s => s ? s.char : '').join('');
                if (currentGuess.length < targetWord.length) return;
                if (currentGuess === targetWord) {
                    setStatus('correct');
                    setCardStatuses(prev => ({ ...prev, [currentIndex]: 'correct' }));
                    if (currentData.exampleEn) playAudio(currentData.exampleEn);
                    else playAudio(currentData.wordEn);
                } else {
                    setStatus('error');
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            useEffect(() => {
                if (!gameStarted || globalWin) return;
                const handleKeyDown = (e) => {
                    if (status === 'correct') { if (e.key === 'Enter') handleNext(); return; }
                    const key = e.key.toUpperCase();
                    if (e.key === 'Backspace') {
                        e.preventDefault();
                        for (let i = inputSlots.length - 1; i >= 0; i--) {
                            if (inputSlots[i] !== null) { handleRemoveLetter(i, inputSlots[i]); break; }
                        }
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (status === 'error') handleRetry(); else checkAnswer();
                    } else if (e.key === 'ArrowRight') { handleNext(); }
                    else if (e.key === 'ArrowLeft') { handlePrev(); }
                    else if (/^[A-ZÑ]$/.test(key) && status === 'playing') {
                        const ai = availableLetters.findIndex(item => item.char === key);
                        if (ai !== -1) handleAddLetter(availableLetters[ai], ai);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [status, inputSlots, availableLetters, gameStarted, globalWin, currentIndex, totalWords]);

            const handleNext = () => { stopAudio(); setCurrentIndex(prev => (prev === totalWords - 1 ? 0 : prev + 1)); };
            const handlePrev = () => { stopAudio(); setCurrentIndex(prev => (prev === 0 ? totalWords - 1 : prev - 1)); };
            const handleRestart = () => { stopAudio(); window.location.reload(); };

            if (loading) return (
                <div className="h-screen w-screen flex items-center justify-center bg-zinc-950">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-violet-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">Cargando Emojis...</p>
                    </div>
                </div>
            );

            if (!fullWordList || totalWords === 0) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">No se pudo generar el juego. El banco de palabras está vacío.</div>;

            // ====== PANTALLA DE INICIO ======
            if (!gameStarted) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center z-10 zoom-in-95">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                            <h1 className="text-3xl font-black text-violet-500 mb-2 leading-tight">{quizData?.title || 'Say it with Emoji'}</h1>
                            <p className="text-zinc-400 mb-8 font-medium">Adivina la palabra oculta detrás de los emojis.</p>
                            <input type="text" placeholder="Tu nombre..." value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && handleStartGame()}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-violet-500 transition-colors" style={{ fontSize: '16px' }} />
                            <button disabled={!playerName.trim()} onClick={handleStartGame}
                                className="w-full bg-violet-500 hover:bg-violet-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-white font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest">
                                Empezar Juego
                            </button>
                            <button onClick={goBack} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                Regresar
                            </button>
                        </div>
                    </div>
                );
            }

            const currentData = fullWordList[currentIndex];
            const isComplete = inputSlots.every(slot => slot !== null);
            const correctCount = Object.keys(cardStatuses).length;
            const pendingCount = totalWords - correctCount;

            const renderSlots = () => {
                if (!currentData) return null;
                let slotIndex = 0;
                const words = currentData.wordEn.split(' ');
                return words.map((word, wIdx) => (
                    <div key={`word-${wIdx}`} className="flex flex-nowrap justify-center gap-1.5 sm:gap-2">
                        {word.split('').map((char, cIdx) => {
                            const currentIdx = slotIndex++;
                            const slot = inputSlots[currentIdx];
                            return (
                                <button key={`slot-${currentIdx}`} onClick={() => handleRemoveLetter(currentIdx, slot)}
                                    disabled={!slot || status === 'correct'}
                                    className={`w-9 h-12 sm:w-12 sm:h-14 rounded-xl text-xl sm:text-2xl font-black flex items-center justify-center shrink-0 uppercase transition-all duration-200 select-none
                                        ${slot ? 'bg-zinc-800 border-b-4 border-zinc-900 text-white cursor-pointer hover:bg-zinc-700 animate-pop' : 'bg-zinc-900/50 border-2 border-dashed border-zinc-800/50 text-transparent cursor-default'}
                                        ${status === 'correct' ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400 border-b-2' : ''}
                                        ${status === 'error' && slot ? 'bg-rose-500/20 border-rose-500 text-rose-400 border-b-2' : ''}
                                    `}>
                                    {slot ? slot.char : ''}
                                </button>
                            );
                        })}
                    </div>
                ));
            };

            return (
                <div className="h-screen w-screen flex flex-col items-center bg-zinc-950 p-4 sm:p-8 font-sans overflow-hidden relative">

                    {toastMsg && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-full font-black text-sm shadow-xl z-[120] slide-in-from-top-4 flex items-center gap-2">
                            <Check size={16} /> {toastMsg}
                        </div>
                    )}

                    {/* VICTORIA GLOBAL */}
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in slide-in-from-bottom-4 duration-500 text-center">
                            <div className="w-32 h-32 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center mb-6 shadow-inner relative">
                                <Trophy size={64} className="text-amber-500 absolute z-10" />
                                <div className="absolute inset-0 flex items-center justify-center animate-spin-slow text-4xl">✨✨✨</div>
                            </div>
                            <h2 className="text-4xl font-black text-white mb-2">¡Completado, {playerName}!</h2>
                            <p className="text-lg text-zinc-500 mb-8 font-bold uppercase tracking-widest">Puntaje Perfecto</p>
                            
                            <div className="flex flex-col w-full max-w-sm space-y-3">
                                <button onClick={handleRestart} className="w-full py-4 bg-violet-500 text-white rounded-2xl font-black text-lg hover:bg-violet-400 shadow-lg hover:shadow-violet-500/30 transition-all active:scale-95">
                                    Jugar de nuevo
                                </button>
                                <button onClick={() => { stopAudio(); setShowWordList(true); }} className="w-full py-4 bg-zinc-900 text-zinc-300 border-2 border-zinc-800 rounded-2xl font-bold text-lg hover:bg-zinc-800 hover:border-zinc-700 transition-all active:scale-95">
                                    Ver resumen de palabras
                                </button>
                                <button onClick={goBack} className="w-full py-4 text-zinc-500 font-bold text-sm hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                    Salir
                                </button>
                            </div>
                        </div>
                    )}

                    {/* LISTA DE PALABRAS */}
                    {showWordList && (
                        <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8 animate-in fade-in zoom-in-95 duration-300">
                            <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                                <div className="flex items-center justify-between mb-6 shrink-0">
                                    <h2 className="text-2xl font-black text-white">Vocabulario</h2>
                                    <button onClick={() => setShowWordList(false)} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white transition-colors">
                                        <X size={20}/>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 custom-scrollbar pb-6 pr-2">
                                    {fullWordList.map(card => (
                                        <div key={card.id} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                            <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">
                                                {card.emojis}
                                            </div>
                                            <div className="flex-grow min-w-0 w-full">
                                                <div className="flex justify-between items-start">
                                                    <h4 className="text-lg font-bold text-white">{card.wordEn}</h4>
                                                    <button onClick={(e) => playAudio(card.wordEn, 'en-US', e)} className="p-1.5 text-zinc-500 hover:text-sky-400 transition-colors rounded-lg bg-zinc-900">
                                                        <Volume2 size={16} />
                                                    </button>
                                                </div>
                                                <p className="text-violet-400 font-bold text-sm mb-1">{card.wordEs}</p>
                                                {card.exampleEn && <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER UNIFICADO */}
                    <div className="w-full max-w-4xl flex justify-between items-center mb-6 z-20 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); goBack(); }} className="flex items-center gap-2 font-black text-xl tracking-tight text-white hover:text-violet-400 transition-colors">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base shadow-lg shadow-indigo-600/20">P</div>
                            </button>
                            <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-2"></div>
                            <div>
                                <h1 className="text-lg font-black text-white leading-none tracking-tight">{quizData?.title || 'Actividad Periplo'}</h1>
                                <p className="text-[10px] font-bold text-violet-500 uppercase tracking-widest mt-1">Modo: Say It With Emoji</p>
                            </div>
                        </div>
                        <div className="flex space-x-3 w-full sm:w-auto justify-center">
                            <button onClick={(e) => { e.stopPropagation(); handleRestart(); }} className="flex items-center px-4 py-2 bg-zinc-900 text-zinc-300 rounded-full shadow-sm hover:bg-zinc-800 hover:text-violet-500 transition-colors font-bold text-sm border border-zinc-800 hidden sm:flex">
                                <RefreshCw size={16} className="mr-2" /> Reiniciar
                            </button>
                        </div>
                    </div>

                    {/* ÁREA PRINCIPAL */}
                    <div className="flex-1 w-full flex flex-col items-center overflow-y-auto custom-scrollbar">
                        {!globalWin && currentData && (
                            <div className="w-full flex flex-col items-center gap-4 sm:gap-6 mt-2 pb-10">

                                {/* BARRA DE ESTADÍSTICAS */}
                                <div className="mb-2 w-full max-w-sm sm:max-w-md flex justify-between items-center bg-zinc-900 p-3 rounded-2xl shadow-md border border-zinc-800 z-10 shrink-0">
                                    <div className="flex flex-col items-center px-4 w-1/2">
                                        <CircleDashed size={20} className="text-zinc-500 mb-1" />
                                        <span className="text-[10px] font-black tracking-widest text-zinc-600">PENDIENTES</span>
                                        <span className="text-lg font-black text-white">{pendingCount}</span>
                                    </div>
                                    <div className="w-px h-10 bg-zinc-800"></div>
                                    <div className="flex flex-col items-center px-4 w-1/2">
                                        <CheckCircle2 size={20} className="text-emerald-500 mb-1" />
                                        <span className="text-[10px] font-black tracking-widest text-emerald-500">CORRECTAS</span>
                                        <span className="text-lg font-black text-emerald-500">{correctCount}</span>
                                    </div>
                                </div>

                                {/* TARJETA DE PISTA (Solo Emojis y Audio) */}
                                <div className="w-full max-w-xl card-texture index-card-lines rounded-[2rem] p-6 sm:p-8 shadow-xl flex flex-col items-center text-center gap-3 relative overflow-hidden border border-zinc-800/50">
                                    
                                    <h2 className="text-[10px] font-black text-violet-400 uppercase tracking-widest mb-1">Adivina y Escribe</h2>
                                    <div className="text-6xl sm:text-7xl drop-shadow-lg leading-none py-2">{currentData.emojis}</div>
                                    
                                    {status !== 'correct' && (
                                        <button onClick={() => playAudio(currentData.wordEn)} className="mt-2 flex items-center gap-2 bg-zinc-900/80 hover:bg-zinc-800 border border-zinc-700 text-violet-400 hover:text-violet-300 px-5 py-2.5 rounded-xl font-black text-sm uppercase tracking-widest transition-all shadow-md active:scale-95">
                                            <Volume2 size={20}/> Escuchar Pista
                                        </button>
                                    )}

                                    {/* Revela la palabra y el ejemplo SÓLO cuando responde bien */}
                                    {status === 'correct' && (
                                        <div className="w-full flex flex-col items-center gap-3 mt-2 animate-pop">
                                            <p className="text-2xl sm:text-3xl font-black text-amber-400 leading-tight">{currentData.wordEs}</p>
                                            
                                            {currentData.exampleEn && (
                                                <div className="flex items-center gap-2 bg-zinc-950/80 backdrop-blur-sm rounded-xl p-3 border border-zinc-800 w-full">
                                                    <p className="text-zinc-300 text-sm italic flex-1 font-medium">"{currentData.exampleEn}"</p>
                                                    <button onClick={() => playAudio(currentData.exampleEn)} className="text-zinc-500 hover:text-sky-400 transition-colors shrink-0 bg-zinc-900 p-1.5 rounded-lg">
                                                        <Volume2 size={18}/>
                                                    </button>
                                                </div>
                                            )}
                                            <div className="flex items-center gap-2 text-emerald-500 font-black text-sm uppercase tracking-widest bg-emerald-500/10 px-4 py-1.5 rounded-full border border-emerald-500/20">
                                                <Check size={16}/> ¡Correcto! — {currentData.wordEn}
                                            </div>
                                        </div>
                                    )}

                                    {status === 'error' && (
                                        <div className="text-rose-500 font-black text-sm uppercase tracking-widest mt-2 bg-rose-500/10 px-4 py-1.5 rounded-full border border-rose-500/20">
                                            Intenta de nuevo
                                        </div>
                                    )}
                                </div>

                                {/* ZONA DE JUEGO (Letras) */}
                                <div className="w-full max-w-xl bg-zinc-900/50 border border-zinc-800 rounded-[2rem] p-6 flex flex-col items-center gap-6">
                                    
                                    {/* SLOTS */}
                                    <div className={`flex flex-col items-center gap-2 ${shake ? 'animate-shake' : ''}`}>
                                        {renderSlots()}
                                    </div>

                                    {/* LETRAS DISPONIBLES */}
                                    {status !== 'correct' && (
                                        <div className="flex flex-wrap justify-center gap-2 sm:gap-3 min-h-[4rem]">
                                            {availableLetters.map((item, idx) => (
                                                <button key={item.id} onClick={() => handleAddLetter(item, idx)} disabled={status !== 'playing'}
                                                    className={`w-10 h-12 sm:w-12 sm:h-14 bg-zinc-800 border-b-4 border-zinc-950 rounded-xl text-xl sm:text-2xl font-black text-white flex items-center justify-center uppercase hover:bg-zinc-700 hover:-translate-y-1 active:translate-y-0 active:border-b-0 transition-all duration-150 select-none cursor-pointer shrink-0 shadow-sm ${status !== 'playing' ? 'opacity-50 cursor-not-allowed transform-none border-b-0 translate-y-1' : ''}`}>
                                                    {item.char}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* BOTONES DE ACCIÓN */}
                                    <div className="flex gap-3 w-full max-w-sm mt-2">
                                        {status === 'playing' || status === 'error' ? (
                                            <button onClick={status === 'error' ? handleRetry : checkAnswer}
                                                disabled={!isComplete && status !== 'error'}
                                                className={`flex-1 py-4 rounded-2xl font-black text-lg transition-all flex items-center justify-center gap-2 uppercase tracking-widest shadow-md ${isComplete || status === 'error' ? status === 'error' ? 'bg-rose-500 hover:bg-rose-400 active:scale-95 text-white shadow-rose-500/20' : 'bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-black shadow-emerald-500/20' : 'bg-zinc-800 text-zinc-500 cursor-not-allowed'}`}>
                                                {status === 'error' ? <RotateCcw className="w-5 h-5" /> : <Check className="w-5 h-5" />}
                                                <span>{status === 'error' ? 'Reintentar' : 'Comprobar'}</span>
                                            </button>
                                        ) : (
                                            <button onClick={handleNext}
                                                className="w-full py-4 bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-black rounded-2xl font-black text-lg transition-all animate-pop flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 uppercase tracking-widest">
                                                <span>Siguiente Palabra</span> <ArrowRight className="w-5 h-5" />
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* NAVEGACIÓN INFERIOR */}
                                <div className="mt-2 flex items-center justify-center space-x-6 z-10 w-full shrink-0">
                                    <button onClick={handlePrev} className="p-4 rounded-full shadow-lg transition-all bg-zinc-900 text-zinc-400 border border-zinc-800 hover:text-white hover:bg-zinc-800 active:scale-95">
                                        <ChevronLeft size={24} />
                                    </button>
                                    <div className="flex flex-col items-center bg-zinc-900 px-6 py-2 rounded-full shadow-sm border border-zinc-800">
                                        <span className="text-base font-black text-zinc-300 tracking-widest">
                                            {currentIndex + 1} <span className="text-zinc-600 font-normal mx-1">/</span> {totalWords}
                                        </span>
                                    </div>
                                    <button onClick={handleNext} className="p-4 rounded-full shadow-lg transition-all bg-zinc-900 text-zinc-400 border border-zinc-800 hover:text-white hover:bg-zinc-800 active:scale-95">
                                        <ChevronRight size={24} />
                                    </button>
                                </div>

                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EmojiSpellApp />);
    </script>
</body>
</html>

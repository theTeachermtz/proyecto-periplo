<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk Time Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-taxonomy.js"></script>
    <script src="periplo-ai.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        
        // CORREGIDO: Eliminado MessageSquareQuote que causaba el crash
        import { Mic, Save, ArrowLeft, Loader2, Search, Sparkles, KeyRound, X, ListRestart, CheckCircle2, Tags } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { TAXONOMY, NEW_LEVELS, NEW_CATS, MACRO_SKILLS, getAllTopicsForCategory } = window.PERIPLO_TAXONOMY;

        // IA Assistant compartido (periplo-ai.js)
        const AI = window.PERIPLO_AI;
        const ApiKeyBar = AI.createApiKeyBar(React);

        const CATEGORY_STYLES = [
            { id: 0, label: 'Story Time', color: 'text-blue-400', border: 'border-blue-500/50', bg: 'bg-blue-500/10' },
            { id: 1, label: 'Deep Qs', color: 'text-rose-400', border: 'border-rose-500/50', bg: 'bg-rose-500/10' },
            { id: 2, label: 'Facts', color: 'text-amber-400', border: 'border-amber-500/50', bg: 'bg-amber-500/10' },
            { id: 3, label: 'Dilemmas', color: 'text-emerald-400', border: 'border-emerald-500/50', bg: 'bg-emerald-500/10' }
        ];

        const DashboardTT = () => {
            const [view, setView] = useState('bulk'); 
            const [gameTitle, setGameTitle] = useState("");
            
            const [rawWords, setRawWords] = useState(["", "", "", ""]); 
            
            const [items, setItems] = useState([[], [], [], []]); 
            const [activeTab, setActiveTab] = useState(0);
            const [editingId, setEditingId] = useState(null);
            
            const [apiKey, setApiKey] = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [showApiModal, setShowApiModal] = useState(false);
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevel, setSaveLevel] = useState('basic');
            const [saveCat, setSaveCat] = useState('grammar');
            const [saveTopic, setSaveTopic] = useState(TAXONOMY['basic']['grammar'][0]);

            const abortControllerRef = useRef(null);

            useEffect(() => {
                const savedKey = AI.loadKey();
                if (savedKey) {
                    setApiKey(savedKey);
                    fetchModelsSilent(savedKey);
                }

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            setEditingId(editId);
                            if (data.content?.categories) {
                                setItems(data.content.categories.map(c => c.items || []));
                                setRawWords(data.content.categories.map(c => c.prompt || ""));
                            }
                            if (data.tags) {
                                setSaveLevel(data.tags.level || 'basic');
                                setSaveCat(data.tags.category || 'grammar');
                                setSaveTopic(data.tags.topic || TAXONOMY['basic']['grammar'][0]);
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[saveLevel] && TAXONOMY[saveLevel][saveCat]) {
                    setSaveTopic(TAXONOMY[saveLevel][saveCat][0] || 'mixed');
                }
            }, [saveLevel, saveCat]);

            const fetchModelsSilent = async (key) => {
                try {
                    const validModels = await AI.fetchModels(key);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) setSelectedModel(AI.pickPreferredModel(validModels));
                } catch (e) { console.error("Error auto-fetching models:", e); }
            };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const validModels = await AI.fetchModels(apiKey);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) setSelectedModel(AI.pickPreferredModel(validModels));
                } catch (e) { alert(e.message); }
                finally { setIsLoadingModels(false); }
            };

            const cancelMagia = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    setIsGenerating(false);
                }
            };

            const generateWithAI = async () => {
                if (!apiKey.trim() || !selectedModel) {
                    setShowApiModal(true);
                    return alert("⚠️ Selecciona un modelo de Gemini primero.");
                }
                
                if (!gameTitle.trim()) return alert("Debes escribir el Tema General (Título) para darle contexto a la IA.");

                setIsGenerating(true);
                abortControllerRef.current = new AbortController();

                try {
                    const promptText = `
                    Actúa como un diseñador de materiales ESL. Estás creando un juego de fluidez oral (Talk Time).
                    
                    Devuelve ÚNICAMENTE un JSON válido con esta estructura exacta:
                    {
                      "categories": [
                        { "id": "story", "items": [{"title": "Short catchy title", "content": "The actual story..."}] },
                        { "id": "questions", "items": [] },
                        { "id": "facts", "items": [] },
                        { "id": "dilemmas", "items": [] }
                      ]
                    }

                    TEMA GENERAL: "${gameTitle}"

                    INSTRUCCIONES Y REGLAS POR CATEGORÍA:
                    Genera exactamente entre 8 y 10 ítems para cada categoría basados en los "Prompts del Maestro" (si están vacíos, invéntalos usando el TEMA GENERAL).
                    
                    1. STORY TIME (Azul): Prompt del Maestro: [${rawWords[0]}]. Genera historias breves (50-70 palabras max) que provoquen opinión.
                    2. DEEP QS (Rojo): Prompt del Maestro: [${rawWords[1]}]. Genera preguntas abiertas profundas y polémicas sobre el tema.
                    3. SHOCKING FACTS (Amarillo): Prompt del Maestro: [${rawWords[2]}]. Genera datos curiosos, impactantes o bizarros (estilo podcast 'La Cotorrisa') para que opinen.
                    4. DILEMMAS (Verde): Prompt del Maestro: [${rawWords[3]}]. Genera dilemas morales o escenarios de 'Qué harías si...' donde tengan que justificar su respuesta.

                    IMPORTANTE: Asegúrate de que el 'title' sea corto (2-4 palabras) para mostrar en el menú, y el 'content' sea el texto completo.
                    `;

                    const jsonString = await AI.callGemini({
                        apiKey, model: selectedModel, prompt: promptText,
                        signal: abortControllerRef.current.signal, json: true, temperature: 0.8
                    });
                    const parsedData = JSON.parse(jsonString);

                    setItems([
                        parsedData.categories[0].items,
                        parsedData.categories[1].items,
                        parsedData.categories[2].items,
                        parsedData.categories[3].items
                    ]);

                    setView('review'); 
                } catch (error) {
                    if (error.name === 'AbortError') console.log("Generación cancelada.");
                    else { alert("Error procesando con la IA.\n" + error.message); }
                } finally {
                    setIsGenerating(false);
                    abortControllerRef.current = null;
                }
            };

            const handlePreSave = () => {
                if (!gameTitle) return alert("Ponle un título al juego");
                
                const validItemsCount = items.map(cat => cat.filter(item => item.title.trim() !== "" && item.content.trim() !== "").length);
                if (validItemsCount.some(count => count < 6)) {
                    if(!confirm("Alguna categoría tiene muy pocos ítems válidos. Talk Time necesita variedad. ¿Continuar?")) return;
                }
                
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                
                const cleanItems = items.map(cat => cat.filter(item => item.title.trim() !== "" && item.content.trim() !== ""));
                
                try {
                    const content = { 
                        categories: [
                            { id: 'story', name: 'Story Time', prompt: rawWords[0], items: cleanItems[0] },
                            { id: 'questions', name: 'Deep Questions', prompt: rawWords[1], items: cleanItems[1] },
                            { id: 'facts', name: 'Shocking Facts', prompt: rawWords[2], items: cleanItems[2] },
                            { id: 'dilemmas', name: 'Dilemmas', prompt: rawWords[3], items: cleanItems[3] }
                        ]
                    };
                    
                    const tags = { level: saveLevel, category: saveCat, topic: saveTopic };
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { 
                            title: gameTitle, content: content, tags: tags, updatedAt: serverTimestamp() 
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { 
                            title: gameTitle, type: 'TALKTIME', content: content, tags: tags, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { 
                    alert("Error guardando: " + e.message); 
                    setIsSaving(false);
                }
            };

            return (
                <div className="h-screen flex flex-col dark:text-white bg-zinc-950 relative">
                    
                    {isGenerating && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-sky-500 mb-6" size={56}/>
                            <p className="text-sky-400 font-bold uppercase tracking-widest mb-8">Diseñando Temas de Conversación...</p>
                            <button onClick={cancelMagia} className="bg-rose-600 hover:bg-rose-500 text-white font-black px-6 py-3 rounded-full flex items-center gap-2 transition-all active:scale-95 shadow-xl">
                                <X size={20}/> CANCELAR IA
                            </button>
                        </div>
                    )}

                    {showApiModal && (
                        <div className="fixed inset-0 bg-black/90 z-[90] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden flex flex-col p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-xl text-white flex items-center gap-2"><KeyRound className="text-sky-400"/> Configuración IA</h3>
                                    <button onClick={() => setShowApiModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                <div className="space-y-4 mb-6">
                                    <ApiKeyBar
                                        variant="modal"
                                        accentBtn="bg-sky-600 hover:bg-sky-500 text-white"
                                        placeholder="Tu API Key..."
                                        apiKey={apiKey} setApiKey={setApiKey}
                                        models={availableModels} selectedModel={selectedModel} setSelectedModel={setSelectedModel}
                                        isLoading={isLoadingModels} onFetch={fetchModels}
                                        onClear={() => setAvailableModels([])}
                                    />
                                </div>
                                <button onClick={() => setShowApiModal(false)} className="w-full bg-sky-600 hover:bg-sky-500 text-white py-3 rounded-xl font-bold transition-colors">Guardar y Cerrar</button>
                            </div>
                        </div>
                    )}

                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-black flex items-center gap-2 text-white"><Tags className="text-sky-400"/> Clasificar Talk Time</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">1. Nivel</label>
                                        <select value={saveLevel} onChange={e=>{setSaveLevel(e.target.value);const cats=Object.keys(TAXONOMY[e.target.value]||{});setSaveCat(cats[0]||'grammar');}}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-sky-500 cursor-pointer">
                                            {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">2. Categoría</label>
                                        <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-sky-500 cursor-pointer capitalize">
                                            {Object.keys(TAXONOMY[saveLevel]||{}).map(c=><option key={c} value={c}>{c.replace('_',' ')}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">3. Tema Específico</label>
                                        <select value={saveTopic} onChange={e=>setSaveTopic(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-sky-500 cursor-pointer">
                                            {(TAXONOMY[saveLevel]?.[saveCat]||[]).map(t=><option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <button onClick={executeFinalSave} disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 disabled:opacity-50">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} Confirmar y Guardar
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900 z-10">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.location.href='index.html'} className="p-2 hover:bg-zinc-800 rounded-lg"><ArrowLeft size={20}/></button>
                            <h1 className="font-black text-sky-400 flex items-center gap-2 tracking-tighter"><Mic size={20}/> TT BUILDER</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            {view === 'review' && (
                                <button onClick={() => setView('bulk')} className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition text-zinc-300">
                                    <ListRestart size={14}/> INSTRUCCIONES
                                </button>
                            )}
                            {view === 'bulk' && (
                                <button onClick={generateWithAI} className="bg-sky-600 hover:bg-sky-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition shadow-[0_0_15px_rgba(14,165,233,0.4)] text-black">
                                    <Sparkles size={14}/> MAGIA IA
                                </button>
                            )}
                            {view === 'review' && (
                                <button onClick={handlePreSave} className="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition shadow-[0_0_15px_rgba(16,185,129,0.4)] text-white">
                                    <Save size={14}/> GUARDAR
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                        <div className="max-w-6xl mx-auto w-full space-y-6 pb-20">
                            
                            <input 
                                value={gameTitle} 
                                onChange={e => setGameTitle(e.target.value)}
                                placeholder="Tema General de Fluidez (ej: Crime & Punishment)"
                                className="w-full bg-transparent text-3xl md:text-5xl font-black outline-none border-b-4 border-zinc-800 focus:border-sky-500 pb-2 transition-all placeholder-zinc-700"
                            />

                            {view === 'bulk' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-in fade-in slide-in-from-bottom-4">
                                    {CATEGORY_STYLES.map((c, i) => (
                                        <div key={i} className={`p-4 rounded-3xl border-2 ${c.border} ${c.bg} shadow-sm relative flex flex-col h-[50vh]`}>
                                            <div className={`w-full text-xl font-black bg-zinc-900 text-white p-3 rounded-xl mb-2 border border-zinc-700 flex items-center justify-center`}>
                                                {c.label}
                                            </div>
                                            <div className="px-1 mb-2">
                                                <span className="text-[10px] uppercase font-black text-zinc-500">Dale instrucciones a la IA:</span>
                                            </div>
                                            <textarea 
                                                value={rawWords[i]} 
                                                onChange={e => { const nw = [...rawWords]; nw[i] = e.target.value; setRawWords(nw); }} 
                                                className="flex-1 w-full bg-zinc-900 text-white p-4 rounded-xl text-sm outline-none border border-zinc-700 resize-none custom-scrollbar placeholder-zinc-600 font-medium leading-relaxed" 
                                                placeholder="Ej. Tema: Dinero, Gramática: 2nd Conditional.&#10;&#10;Si dejas en blanco, la IA inventará basado en el Título General."
                                            ></textarea>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'review' && (
                                <div className="max-w-4xl mx-auto flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-4 h-[75vh]">
                                    <div className="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800 shrink-0">
                                        {CATEGORY_STYLES.map((tab) => (
                                            <button
                                                key={tab.id}
                                                onClick={() => setActiveTab(tab.id)}
                                                className={`flex-1 py-3 rounded-xl text-[10px] md:text-xs font-black uppercase tracking-widest transition-all ${activeTab === tab.id ? `${tab.bg} ${tab.color} shadow-lg` : 'text-zinc-500 hover:bg-zinc-800'}`}
                                            >
                                                {tab.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className={`flex-1 rounded-[2rem] border-2 p-4 md:p-6 flex flex-col gap-4 overflow-hidden transition-all ${CATEGORY_STYLES[activeTab].border} ${CATEGORY_STYLES[activeTab].bg}`}>
                                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-4">
                                            {items[activeTab].map((item, idx) => (
                                                <div key={idx} className="flex flex-col gap-2 p-4 bg-zinc-950 border border-white/5 rounded-2xl animate-pop-in">
                                                    <div className="flex gap-3 items-center">
                                                        <span className="text-zinc-500 font-black text-xs w-6 text-center shrink-0">{idx + 1}.</span>
                                                        <input 
                                                            value={item.title} 
                                                            onChange={e => { const ni = [...items]; ni[activeTab][idx].title = e.target.value; setItems(ni); }}
                                                            placeholder="Título Oculto (Ej. El Dilema del Tren)"
                                                            className="flex-1 bg-zinc-900 border border-white/10 rounded-xl p-2 px-4 outline-none font-black text-sm md:text-base focus:border-sky-500 transition-colors text-white"
                                                        />
                                                        <button onClick={() => { const ni = [...items]; ni[activeTab].splice(idx,1); setItems(ni); }} className="text-zinc-600 hover:text-red-400 p-2 transition-colors shrink-0"><X size={20}/></button>
                                                    </div>
                                                    <div className="flex gap-3">
                                                        <div className="w-6 shrink-0"></div>
                                                        <textarea 
                                                            value={item.content} 
                                                            onChange={e => { const ni = [...items]; ni[activeTab][idx].content = e.target.value; setItems(ni); }}
                                                            placeholder="Contenido de la historia, pregunta o dilema..."
                                                            className="flex-1 bg-zinc-900 border border-white/10 rounded-xl p-3 px-4 outline-none font-medium text-sm focus:border-sky-500 transition-colors text-zinc-300 resize-none"
                                                            rows="3"
                                                        />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="shrink-0 pt-4 border-t border-white/10 flex justify-between items-center">
                                            <div className="flex items-center gap-2 text-zinc-400 font-black text-sm uppercase">
                                                <CheckCircle2 size={16} className={items[activeTab].length >= 8 && items[activeTab].length <= 12 ? "text-emerald-500" : "text-rose-500"}/> 
                                                <span className={items[activeTab].length >= 8 && items[activeTab].length <= 12 ? "text-emerald-500" : "text-rose-500"}>{items[activeTab].length} Ítems</span>
                                            </div>
                                            <button 
                                                onClick={() => { const ni = [...items]; ni[activeTab].push({title:"", content:""}); setItems(ni); }}
                                                className="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-xl transition"
                                            >
                                                + Añadir Fila
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                    
                    <div className="fixed bottom-4 left-4 z-50">
                         <button onClick={() => setShowApiModal(true)} className="p-3 bg-zinc-900 rounded-full border border-zinc-800 text-zinc-500 hover:text-sky-400 shadow-lg transition" title="Configurar IA"><KeyRound size={20}/></button>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<DashboardTT />);
    </script>
</body>
</html>

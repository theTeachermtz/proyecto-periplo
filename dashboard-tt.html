<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk Time Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react":            "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react":     "https://esm.sh/lucide-react@0.263.1",
        "firebase/app":     "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-taxonomy.js"></script>
    <script src="periplo-ai.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
<div id="root"></div>

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { initializeApp } from 'firebase/app';
import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
import { Save, Loader2, Sparkles, X, Check, Plus, Trash2, Tags } from 'lucide-react';

const firebaseConfig = { apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain:"proyecto-periplo.firebaseapp.com", projectId:"proyecto-periplo", storageBucket:"proyecto-periplo.firebasestorage.app", messagingSenderId:"236795998392", appId:"1:236795998392:web:0da24b4f018611b55c844d" };
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const AI        = window.PERIPLO_AI;
const ApiKeyBar = AI.createApiKeyBar(React);
const { NEW_LEVELS, NEW_CATS } = window.PERIPLO_TAXONOMY || {};

const urlParams   = new URLSearchParams(window.location.search);
const TEACHER_UID = urlParams.get('uid') || 'teacher_builder_001';
const QUIZZES_PATH = `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`;
const BACK_URL    = TEACHER_UID.includes('anita') ? 'index-es.html' : 'index.html';

const CATS = [
    { id:'story',    name:'Story Time',    color:'text-blue-400',    border:'border-blue-500',    activeBg:'bg-blue-500/20 text-blue-300'       },
    { id:'hotTake',  name:'Hot Take',      color:'text-fuchsia-400', border:'border-fuchsia-500', activeBg:'bg-fuchsia-500/20 text-fuchsia-300'  },
    { id:'facts',    name:'Shocking Facts',color:'text-amber-400',   border:'border-amber-500',   activeBg:'bg-amber-500/20 text-amber-300'      },
    { id:'dilemmas', name:'Dilemmas',      color:'text-emerald-400', border:'border-emerald-500', activeBg:'bg-emerald-500/20 text-emerald-300'  },
];

const FALLBACK_LEVELS = ['B1','B2','B Mix','A1','A2','A Mix','P1','P2','P Mix'];
const FALLBACK_CATS   = ['grammar','vocab','conversation','reading','listening','mixed'];

const emptyItems = () => ({ story:[], hotTake:[], facts:[], dilemmas:[] });

const DashboardTT = () => {
    const [gameTitle,    setGameTitle]    = useState('');
    const [themeNotes,   setThemeNotes]   = useState('');
    const [items,        setItems]        = useState(emptyItems());
    const [activeTab,    setActiveTab]    = useState('story');
    const [editingId,    setEditingId]    = useState(null);

    // IA
    const [apiKey,          setApiKey]          = useState('');
    const [availableModels, setAvailableModels] = useState([]);
    const [selectedModel,   setSelectedModel]   = useState('');
    const [isLoadingModels, setIsLoadingModels] = useState(false);
    const [isGenerating,    setIsGenerating]    = useState(false);
    const abortRef = useRef(null);

    // Taxonomy
    const [taxLevels,     setTaxLevels]     = useState([]);
    const [taxCategories, setTaxCategories] = useState([]);
    const [taxTopics,     setTaxTopics]     = useState([]);
    const [topicInput,    setTopicInput]    = useState('');
    const [showTaxModal,  setShowTaxModal]  = useState(false);

    // UI
    const [isSaving,    setIsSaving]    = useState(false);
    const [showSuccess, setShowSuccess] = useState(false);

    useEffect(() => {
        const key = AI.loadKey();
        if (key) { setApiKey(key); silentFetchModels(key); }

        const editId = urlParams.get('edit');
        if (!editId) return;
        getDoc(doc(db, QUIZZES_PATH, editId)).then(snap => {
            if (!snap.exists()) return;
            const data = snap.data();
            setGameTitle(data.title || '');
            setThemeNotes(data.themeNotes || '');
            setEditingId(editId);
            if (data.content?.categories) {
                const loaded = emptyItems();
                data.content.categories.forEach(cat => { if (loaded[cat.id] !== undefined) loaded[cat.id] = cat.items || []; });
                setItems(loaded);
            }
            if (data.tags) {
                setTaxLevels(data.tags.levels     || (data.tags.level    ? [data.tags.level]    : []));
                setTaxCategories(data.tags.categories || (data.tags.category ? [data.tags.category] : []));
                setTaxTopics(data.tags.topics     || (data.tags.topic    ? [data.tags.topic]    : []));
            }
        });
    }, []);

    const silentFetchModels = async (key) => {
        try {
            const models = await AI.fetchModels(key);
            setAvailableModels(models);
            if (models.length) setSelectedModel(AI.pickPreferredModel(models));
        } catch {}
    };

    const fetchModels = async () => {
        setIsLoadingModels(true);
        try {
            const models = await AI.fetchModels(apiKey);
            setAvailableModels(models);
            if (models.length) setSelectedModel(AI.pickPreferredModel(models));
        } catch (e) { alert(e.message); }
        finally { setIsLoadingModels(false); }
    };

    const generateWithAI = async () => {
        if (!apiKey || !selectedModel) return alert('Configura tu API Key de Gemini primero.');
        if (!gameTitle.trim()) return alert('Escribe el tema del juego primero.');

        setIsGenerating(true);
        abortRef.current = new AbortController();

        const prompt = `You are an expert ESL conversation game designer. Create a Talk Time game.

Topic: "${gameTitle}"${themeNotes ? `\nExtra notes from teacher: ${themeNotes}` : ''}

Return ONLY valid JSON — no markdown, no extra text:
{
  "categories": [
    { "id": "story",    "items": [{"title": "...", "content": "..."}] },
    { "id": "hotTake",  "items": [{"title": "...", "content": "..."}] },
    { "id": "facts",    "items": [{"title": "...", "content": "..."}] },
    { "id": "dilemmas", "items": [{"title": "...", "content": "..."}] }
  ]
}

Generate exactly 8 items per category. Rules:

STORY TIME (id: story):
Relatable first-person anecdotes in past tense, 60–80 words. Funny or recognizable — the kind a friend would actually tell you. The situation itself must make the listener want to say "that happened to me" or "I would have..." — DO NOT add explicit questions; let the story create the trigger naturally.
Example: "My college roommate borrowed $200 from me saying it was urgent. Three months later I found out he used it to buy concert tickets — to a show he never mentioned to me. We still hang out. I never brought it up. Not sure why."

HOT TAKE (id: hotTake):
A bold, slightly uncomfortable opinion stated as undeniable fact. NOT a question — a statement people must agree or disagree with and defend.  Never political or discriminatory. Just spicy enough to split the room.
Example: "People who don't read are just not that interesting to talk to."

SHOCKING FACTS (id: facts):
A surprising or counterintuitive fact/statistic PLUS a personal follow-up question embedded in the content. The fact hooks them, the question makes it personal and opens the conversation.
Example: "Studies show people lie in about 20% of their social interactions — even with close friends. Think about the last week: how honest have you really been with the people around you?"

DILEMMAS (id: dilemmas):
A real "what would you do" scenario with two options that both have a genuine cost. No easy answer — each choice loses something important. Grounded in situations people can actually imagine happening to them.
Example: "You find out your best friend's partner has been cheating on them for months. Your friend seems completely happy and has no idea. Do you tell them and risk destroying their world — or stay quiet and carry that secret forever?"

Title: 3–5 words max, used as a menu label. All content in English.`;

        try {
            const raw = await AI.callGemini({ apiKey, model: selectedModel, prompt, signal: abortRef.current.signal, json: true, temperature: 0.85 });

            let parsed;
            try { parsed = JSON.parse(raw); } catch { parsed = AI.extractJSON(raw); }

            const loaded = emptyItems();
            (parsed?.categories || []).forEach(cat => { if (loaded[cat.id] !== undefined) loaded[cat.id] = cat.items || []; });
            setItems(loaded);
            setActiveTab('story');
        } catch (e) {
            if (e.name !== 'AbortError') alert('Error con la IA: ' + e.message);
        } finally {
            setIsGenerating(false);
            abortRef.current = null;
        }
    };

    const updateItem = (catId, idx, field, value) => {
        setItems(prev => ({ ...prev, [catId]: prev[catId].map((item, i) => i === idx ? { ...item, [field]: value } : item) }));
    };

    const addItem    = () => setItems(prev => ({ ...prev, [activeTab]: [...prev[activeTab], { title:'', content:'' }] }));
    const removeItem = (catId, idx) => setItems(prev => ({ ...prev, [catId]: prev[catId].filter((_,i) => i !== idx) }));

    const addTopic = (e) => {
        if ((e.key === 'Enter' || e.key === ',') && topicInput.trim()) {
            e.preventDefault();
            const t = topicInput.trim().replace(/,$/, '');
            if (t && !taxTopics.includes(t)) setTaxTopics(prev => [...prev, t]);
            setTopicInput('');
        }
    };

    const handleSave = async () => {
        if (!gameTitle.trim()) return alert('Ponle un título al juego.');
        if (!taxLevels.length || !taxCategories.length) { setShowTaxModal(true); return; }

        setIsSaving(true);
        try {
            const content = {
                categories: CATS.map(cat => ({
                    id: cat.id, name: cat.name,
                    items: items[cat.id].filter(i => i.title.trim() && i.content.trim())
                }))
            };
            const tags = {
                levels:     taxLevels,
                categories: taxCategories,
                topics:     taxTopics
            };
            const base = { title: gameTitle, themeNotes, content, tags, updatedAt: serverTimestamp() };

            if (editingId) {
                await updateDoc(doc(db, QUIZZES_PATH, editingId), base);
            } else {
                await addDoc(collection(db, QUIZZES_PATH), { ...base, type:'TALKTIME', isDeleted:false, parentPath:QUIZZES_PATH, createdAt:serverTimestamp() });
            }
            setShowSuccess(true);
            setTimeout(() => { window.location.href = BACK_URL; }, 1800);
        } catch (e) {
            alert('Error guardando: ' + e.message);
            setIsSaving(false);
        }
    };

    const goBack = () => { window.location.href = BACK_URL; };

    const activeCat   = CATS.find(c => c.id === activeTab);
    const countValid  = (catId) => items[catId].filter(i => i.title.trim()).length;
    const hasClassification = taxLevels.length > 0 && taxCategories.length > 0;

    return (
        <div className="flex flex-col bg-zinc-950 text-white" style={{ height:'100dvh', overflow:'hidden' }}>

            {/* ── Header ── */}
            <header className="sticky top-0 z-20 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-5 py-3 shrink-0" style={{ fontFamily:"'Plus Jakarta Sans', sans-serif" }}>
                <div className="flex items-center gap-4">
                    <button onClick={goBack} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-600/20">P</div>
                    </button>
                    <div className="hidden sm:block w-px h-7 bg-zinc-800"/>
                    <div className="hidden sm:block">
                        <h1 className="text-sm font-black text-white leading-none tracking-tight">Talk Time</h1>
                        <p className="text-[10px] font-bold uppercase tracking-widest mt-0.5 text-violet-400">Builder</p>
                    </div>
                </div>
                <div className="flex items-center gap-3">
                    <ApiKeyBar variant="compact"
                        accentBtn="bg-violet-600 hover:bg-violet-500 text-white"
                        apiKey={apiKey} setApiKey={setApiKey}
                        models={availableModels} selectedModel={selectedModel} setSelectedModel={setSelectedModel}
                        isLoading={isLoadingModels} onFetch={fetchModels} onClear={() => setAvailableModels([])}
                    />
                    <button onClick={handleSave} disabled={isSaving}
                        className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white px-4 py-2 rounded-xl font-black text-xs uppercase tracking-widest flex items-center gap-2 transition active:scale-95 shadow-[0_0_14px_rgba(16,185,129,0.25)]">
                        {isSaving ? <Loader2 size={14} className="animate-spin"/> : <Save size={14}/>} Guardar
                    </button>
                </div>
            </header>

            {/* ── Body ── */}
            <div className="flex flex-1 overflow-hidden">

                {/* Left panel */}
                <div className="w-72 shrink-0 border-r border-zinc-800 flex flex-col p-5 gap-5 overflow-y-auto custom-scrollbar">

                    <div>
                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Tema del juego</label>
                        <input value={gameTitle} onChange={e => setGameTitle(e.target.value)}
                            placeholder="Ej. Addiction & Social Media"
                            className="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2.5 text-sm font-bold text-white outline-none focus:border-violet-500 transition placeholder-zinc-600"
                        />
                    </div>

                    <div>
                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">
                            Notas para la IA <span className="text-zinc-700 normal-case font-medium tracking-normal">(opcional)</span>
                        </label>
                        <textarea value={themeNotes} onChange={e => setThemeNotes(e.target.value)} rows={4}
                            placeholder="Ej: Ice breaker entre dos personas que no se conocen. Meter Third Conditional de forma natural."
                            className="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2.5 text-sm text-white outline-none focus:border-violet-500 transition resize-none placeholder-zinc-600 custom-scrollbar"
                        />
                    </div>

                    <button onClick={generateWithAI} disabled={isGenerating || !apiKey}
                        className="w-full bg-sky-600 hover:bg-sky-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-3 rounded-xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-2 transition active:scale-95 shadow-[0_0_14px_rgba(14,165,233,0.25)]">
                        <Sparkles size={14}/> Generar con IA
                    </button>

                    {/* Classification */}
                    <div className="border-t border-zinc-800 pt-5">
                        <div className="flex items-center justify-between mb-3">
                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Clasificación</label>
                            <button onClick={() => setShowTaxModal(true)}
                                className="text-[10px] text-violet-400 hover:text-violet-300 font-black uppercase tracking-widest flex items-center gap-1 transition">
                                <Tags size={11}/> {hasClassification ? 'Editar' : 'Añadir'}
                            </button>
                        </div>
                        {hasClassification ? (
                            <div className="flex flex-wrap gap-1.5">
                                {taxLevels.map(l => <span key={l} className="bg-zinc-800 text-zinc-300 text-[10px] font-black px-2 py-0.5 rounded-lg uppercase">{l}</span>)}
                                {taxCategories.map(c => <span key={c} className="bg-violet-900/50 text-violet-300 text-[10px] font-black px-2 py-0.5 rounded-lg capitalize">{c}</span>)}
                                {taxTopics.map(t => <span key={t} className="bg-zinc-900 text-zinc-500 text-[10px] px-2 py-0.5 rounded-lg border border-zinc-800">{t}</span>)}
                            </div>
                        ) : (
                            <button onClick={() => setShowTaxModal(true)}
                                className="w-full border border-dashed border-zinc-800 rounded-xl py-3 text-zinc-600 text-xs font-bold hover:border-violet-600 hover:text-violet-400 transition">
                                + Clasificar para el hub
                            </button>
                        )}
                    </div>

                    {/* Summary */}
                    <div className="border-t border-zinc-800 pt-5">
                        <p className="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-3">Contenido</p>
                        <div className="space-y-2">
                            {CATS.map(cat => {
                                const n = countValid(cat.id);
                                const ok = n >= 6;
                                return (
                                    <div key={cat.id} onClick={() => setActiveTab(cat.id)}
                                        className={`flex justify-between items-center p-2.5 rounded-xl cursor-pointer transition ${activeTab === cat.id ? 'bg-zinc-800' : 'hover:bg-zinc-900'}`}>
                                        <span className={`text-xs font-bold ${cat.color}`}>{cat.name}</span>
                                        <span className={`text-xs font-black ${ok ? 'text-emerald-500' : 'text-zinc-600'}`}>
                                            {n} ítem{n !== 1 ? 's' : ''}
                                        </span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* Right panel */}
                <div className="flex-1 flex flex-col overflow-hidden">

                    {/* Tabs */}
                    <div className="flex gap-1 p-3 border-b border-zinc-800 shrink-0">
                        {CATS.map(cat => (
                            <button key={cat.id} onClick={() => setActiveTab(cat.id)}
                                className={`flex-1 py-2.5 rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest transition-all ${activeTab === cat.id ? cat.activeBg : 'text-zinc-600 hover:text-zinc-400 hover:bg-zinc-900'}`}>
                                {cat.name}
                            </button>
                        ))}
                    </div>

                    {/* Items */}
                    <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-3">
                        {items[activeTab].length === 0 && (
                            <div className="flex flex-col items-center justify-center h-48 text-zinc-700 select-none">
                                <Sparkles size={28} className="mb-3 opacity-20"/>
                                <p className="text-sm font-bold">Sin ítems todavía</p>
                                <p className="text-xs mt-1 text-zinc-800">Genera con IA o añade manualmente</p>
                            </div>
                        )}
                        {items[activeTab].map((item, idx) => (
                            <div key={idx} className={`flex flex-col gap-2 p-4 bg-zinc-900 border ${activeCat.border} border-opacity-30 rounded-2xl`}>
                                <div className="flex gap-2 items-center">
                                    <span className="text-zinc-700 font-black text-xs w-5 text-center shrink-0">{idx + 1}</span>
                                    <input value={item.title}
                                        onChange={e => updateItem(activeTab, idx, 'title', e.target.value)}
                                        placeholder="Título corto (3–5 palabras)"
                                        className="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm font-black text-white outline-none focus:border-zinc-600 transition placeholder-zinc-700"
                                    />
                                    <button onClick={() => removeItem(activeTab, idx)} className="text-zinc-700 hover:text-rose-400 p-1.5 transition shrink-0">
                                        <Trash2 size={15}/>
                                    </button>
                                </div>
                                <div className="flex gap-2">
                                    <div className="w-5 shrink-0"/>
                                    <textarea value={item.content}
                                        onChange={e => updateItem(activeTab, idx, 'content', e.target.value)}
                                        placeholder="Contenido completo..."
                                        rows={3}
                                        className="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm text-zinc-300 outline-none focus:border-zinc-600 transition resize-none custom-scrollbar placeholder-zinc-700"
                                    />
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Footer */}
                    <div className="shrink-0 border-t border-zinc-800 px-4 py-2.5 flex justify-between items-center bg-zinc-950">
                        <span className={`text-xs font-black ${countValid(activeTab) >= 6 ? 'text-emerald-500' : 'text-zinc-600'}`}>
                            {countValid(activeTab)} ítem{countValid(activeTab) !== 1 ? 's' : ''}
                            {countValid(activeTab) < 6 && <span className="text-zinc-700 font-medium"> — mínimo 6</span>}
                        </span>
                        <button onClick={addItem}
                            className="flex items-center gap-1.5 bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-xl text-xs font-black transition active:scale-95">
                            <Plus size={13}/> Añadir ítem
                        </button>
                    </div>
                </div>
            </div>

            {/* ── Generating overlay ── */}
            {isGenerating && (
                <div className="fixed inset-0 bg-black/85 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                    <Loader2 className="animate-spin text-sky-400 mb-5" size={52}/>
                    <p className="text-sky-400 font-black uppercase tracking-widest mb-1">Generando temas...</p>
                    <p className="text-zinc-500 text-sm font-bold mb-8">"{gameTitle}"</p>
                    <button onClick={() => { abortRef.current?.abort(); setIsGenerating(false); }}
                        className="bg-rose-600 hover:bg-rose-500 text-white font-black px-6 py-3 rounded-full flex items-center gap-2 transition active:scale-95">
                        <X size={18}/> Cancelar
                    </button>
                </div>
            )}

            {/* ── Success overlay ── */}
            {showSuccess && (
                <div className="fixed inset-0 bg-black/85 z-[100] flex items-center justify-center">
                    <div className="text-center">
                        <div className="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_40px_rgba(16,185,129,0.6)]">
                            <Check size={40} className="text-black"/>
                        </div>
                        <p className="text-emerald-400 font-black text-2xl">¡Guardado!</p>
                        <p className="text-zinc-500 text-sm mt-1">Volviendo al hub...</p>
                    </div>
                </div>
            )}

            {/* ── Taxonomy modal ── */}
            {showTaxModal && (
                <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">

                        <div className="flex justify-between items-center p-6 border-b border-zinc-800 shrink-0">
                            <h2 className="text-lg font-black text-white flex items-center gap-2">
                                <Tags className="text-violet-400" size={20}/> Clasificar Talk Time
                            </h2>
                            <button onClick={() => setShowTaxModal(false)} className="text-zinc-500 hover:text-white p-1.5 rounded-full hover:bg-zinc-800 transition">
                                <X size={18}/>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">

                            <div>
                                <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">1. Nivel</label>
                                <div className="flex flex-wrap gap-2">
                                    {(NEW_LEVELS?.length ? NEW_LEVELS : FALLBACK_LEVELS).map(l => (
                                        <button key={l} onClick={() => setTaxLevels(prev => prev.includes(l) ? prev.filter(x=>x!==l) : [...prev,l])}
                                            className={`px-3 py-1.5 rounded-xl font-black text-xs border-2 transition-all ${taxLevels.includes(l) ? 'bg-violet-600 border-violet-600 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-violet-500 hover:text-violet-300'}`}>
                                            {l}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">2. Categoría</label>
                                <div className="flex flex-wrap gap-2">
                                    {(NEW_CATS?.length ? NEW_CATS : FALLBACK_CATS).map(c => (
                                        <button key={c.id ?? c} onClick={() => setTaxCategories(prev => prev.includes(c.id ?? c) ? prev.filter(x=>x!==(c.id ?? c)) : [...prev, c.id ?? c])}
                                            className={`px-3 py-1.5 rounded-xl font-black text-xs border-2 transition-all capitalize ${taxCategories.includes(c.id ?? c) ? 'bg-violet-600 border-violet-600 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-violet-500 hover:text-violet-300'}`}>
                                            {c.label ?? c}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">
                                    3. Temas <span className="text-zinc-700 normal-case font-medium tracking-normal">(opcional — Enter para añadir)</span>
                                </label>
                                <div className="flex flex-wrap gap-2 mb-2">
                                    {taxTopics.map(t => (
                                        <span key={t} className="bg-zinc-800 text-zinc-300 text-xs font-bold px-2.5 py-1 rounded-lg flex items-center gap-1.5">
                                            {t}
                                            <button onClick={() => setTaxTopics(prev => prev.filter(x=>x!==t))} className="text-zinc-500 hover:text-rose-400 transition">
                                                <X size={11}/>
                                            </button>
                                        </span>
                                    ))}
                                </div>
                                <input value={topicInput} onChange={e => setTopicInput(e.target.value)} onKeyDown={addTopic}
                                    placeholder="Third Conditional, Ice Breaker, Past Simple..."
                                    className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-violet-500 transition placeholder-zinc-600"
                                />
                            </div>
                        </div>

                        <div className="p-6 border-t border-zinc-800 shrink-0">
                            <button onClick={() => setShowTaxModal(false)}
                                disabled={!taxLevels.length || !taxCategories.length}
                                className="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition active:scale-95">
                                <Check size={16}/> Confirmar
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

createRoot(document.getElementById('root')).render(<DashboardTT/>);
</script>
</body>
</html>

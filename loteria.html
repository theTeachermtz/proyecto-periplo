<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lotería Multiverso | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="periplo-config.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            background-color: #7c4a1e;
            background-image:
                repeating-linear-gradient(108deg, transparent, transparent 8px, rgba(0,0,0,.03) 8px, rgba(0,0,0,.03) 9px),
                repeating-linear-gradient(112deg, transparent, transparent 12px, rgba(255,180,80,.04) 12px, rgba(255,180,80,.04) 13px),
                repeating-linear-gradient(104deg, rgba(140,80,20,0.3) 10%, rgba(180,100,30,0) 20%, rgba(120,65,15,0.2) 30%, rgba(180,100,30,0) 40%),
                linear-gradient(180deg, #9c652f 0%, #7c4a1e 30%, #8b5525 60%, #6b3d18 100%);
        }
        @keyframes zoom-in {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(12deg); opacity: 1; }
        }
        .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-parchment {
            background-color: #fffef7;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(200,160,80,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(180,120,40,0.05) 0%, transparent 60%);
        }
        .board-bg {
            background-color: #4a1c08;
            background-image:
                repeating-linear-gradient(108deg, transparent, transparent 6px, rgba(255,255,255,.015) 6px, rgba(255,255,255,.015) 7px),
                linear-gradient(180deg, #5a2510 0%, #4a1c08 50%, #3d1606 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { RefreshCw, Play, RotateCcw, Eye, EyeOff, Shuffle, Book, History, X, Globe, ArrowLeft, Loader2 } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const TEACHER_UID = urlParams.get('uid') || 'teacher_builder_001';
        const QUIZ_ID = urlParams.get('id');
        const INITIAL_MODE = urlParams.get('mode') || 'student';

        const shuffleArray = (array) => {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden border-4 border-red-900/60" style={{backgroundColor:'#fef9e6'}}>
                        <div className="p-4 border-b-2 border-red-900/20 flex justify-between items-center" style={{backgroundColor:'#f5e8c8'}}>
                            <h3 className="text-xl font-bold text-red-950 font-serif">{title}</h3>
                            <button onClick={onClose} className="p-1 hover:bg-red-900/10 rounded-full transition">
                                <X size={24} className="text-red-900/70" />
                            </button>
                        </div>
                        <div className="p-4 overflow-y-auto">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const StudentView = ({ board, marked, showAnswers, generateBoard, toggleMark, toggleShowAnswers, language }) => {
            const isEn = language === 'en';
            const [showConfirm, setShowConfirm] = useState(false);
            const handleRefresh = () => { if (marked.size > 0) setShowConfirm(true); else generateBoard(); };
            return (
                <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in fade-in duration-500">
                    <div className="card-parchment p-4 rounded-xl shadow-2xl border-4 border-red-900 w-full relative">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl sm:text-2xl font-bold text-red-950 font-serif tracking-wide truncate">
                                {isEn ? "MY BOARD" : "MI TABLA"}
                            </h2>
                            <div className="flex gap-2">
                                <button onClick={toggleShowAnswers} className="p-2 rounded-full text-red-950 transition-colors shadow-sm border-b-2 active:mt-0.5 active:border-b-0" style={{backgroundColor:'#f5c842', borderColor:'#c49a10'}}>
                                    {showAnswers ? <EyeOff size={20}/> : <Eye size={20}/>}
                                </button>
                                <button onClick={handleRefresh} className="p-2 bg-red-800 hover:bg-red-900 rounded-full text-yellow-100 transition-colors shadow-sm border-b-2 border-red-950 active:mt-0.5 active:border-b-0">
                                    <RefreshCw size={20}/>
                                </button>
                            </div>
                        </div>

                        {showConfirm && (
                            <div className="absolute inset-0 z-30 flex items-center justify-center rounded-xl bg-black/50 backdrop-blur-[3px]">
                                <div className="card-parchment border-4 border-red-900 rounded-xl p-5 shadow-2xl text-center mx-6">
                                    <p className="font-serif font-bold text-red-950 text-sm mb-1">{isEn ? "Change board?" : "¿Cambiar tabla?"}</p>
                                    <p className="font-serif text-red-900/60 text-xs mb-4">{isEn ? "You'll lose your progress this round." : "Perderás tu progreso en esta ronda."}</p>
                                    <div className="flex gap-3 justify-center">
                                        <button onClick={() => { generateBoard(); setShowConfirm(false); }}
                                            className="px-5 py-2 bg-red-800 hover:bg-red-900 text-yellow-100 font-bold font-serif rounded-lg shadow border-b-2 border-red-950 active:mt-0.5 active:border-b-0 transition-all">
                                            {isEn ? "Yes, change" : "Sí, cambiar"}
                                        </button>
                                        <button onClick={() => setShowConfirm(false)}
                                            className="px-5 py-2 font-bold font-serif rounded-lg border-2 border-red-900/30 text-red-950 transition-all hover:border-red-900/60"
                                            style={{backgroundColor:'rgba(124,74,30,0.08)'}}>
                                            {isEn ? "Cancel" : "Cancelar"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="board-bg grid grid-cols-4 gap-2 p-2 rounded-lg border-2 border-red-950/50">
                            {board.map((item) => (
                                <div key={item.id} onClick={() => toggleMark(item.id)}
                                    className="relative aspect-[3/4] card-parchment border-2 border-red-900/30 rounded-lg flex flex-col items-center justify-between cursor-pointer transition-colors shadow-sm overflow-hidden p-1 active:scale-95 hover:border-red-700/60">

                                    <span className="absolute top-0 right-1 text-[8px] sm:text-[10px] text-red-900/30 font-mono">{item.id}</span>

                                    <div className="flex flex-col items-center justify-center h-full w-full z-10">
                                        <div className="h-4 sm:h-5 flex items-end">
                                            {showAnswers && (
                                                <span className={`text-[10px] sm:text-xs font-bold uppercase ${item.type === 'masc' ? 'text-sky-700' : item.type === 'fem' ? 'text-rose-700' : 'text-purple-700'}`}>
                                                    {isEn ? "The" : item.article}
                                                </span>
                                            )}
                                        </div>
                                        <div className="text-2xl sm:text-4xl mb-1 drop-shadow-md">{item.emoji}</div>
                                        <span className={`font-serif font-bold text-red-950 leading-tight text-center break-words w-full ${(isEn ? item.wordEn : item.word).length > 9 ? 'text-[9px] sm:text-xs' : 'text-xs sm:text-sm'}`}>
                                            {isEn ? item.wordEn : item.word}
                                        </span>
                                    </div>

                                    {marked.has(item.id) && (
                                        <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-zoom-in">
                                            <div className="w-10 h-10 sm:w-12 sm:h-12 bg-red-800/85 rounded-full border-2 border-red-950/50 transform rotate-12 shadow-lg backdrop-blur-[1px]"></div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        <p className="text-center text-xs text-red-900/50 mt-3 italic font-serif">{isEn ? "Tap to mark" : "Toca una casilla para marcarla"}</p>
                    </div>
                </div>
            );
        };

        const TeacherView = ({ deck, currentCard, drawnHistory, gameOver, drawCard, startNewGame, openHistoryModal, language }) => {
            const isEn = language === 'en';
            return (
                <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in fade-in duration-500">
                    <div className="card-parchment p-6 rounded-xl shadow-2xl border-4 border-red-900 w-full text-center">
                        <h2 className="text-xl font-bold text-red-950 font-serif mb-4 tracking-wide border-b-2 border-red-900/20 pb-2">
                            {isEn ? "THE DECK" : "LA BARAJA"}
                        </h2>

                        <div className="mb-6 relative h-64 w-48 mx-auto">
                            {currentCard ? (
                                <div className="w-full h-full card-parchment border-4 border-red-800 rounded-xl shadow-lg flex flex-col items-center justify-center p-4 transform transition-all hover:scale-105 duration-300" style={{boxShadow:'0 4px 0 #7c1d1d, 0 8px 24px rgba(0,0,0,0.4)'}}>
                                    <span className="absolute top-2 left-3 text-xl font-bold text-red-900/20 font-serif">{currentCard.id}</span>
                                    <div className={`text-2xl font-black mb-2 uppercase font-serif ${currentCard.type === 'masc' ? 'text-sky-700' : currentCard.type === 'fem' ? 'text-rose-700' : 'text-purple-700'}`}>
                                        {isEn ? "The" : currentCard.article}
                                    </div>
                                    <div className="text-6xl mb-4 drop-shadow-lg">{currentCard.emoji}</div>
                                    <div className={`font-serif font-bold text-red-950 w-full break-words leading-none ${(isEn ? currentCard.wordEn : currentCard.word).length > 9 ? 'text-2xl' : 'text-3xl'}`}>
                                        {isEn ? currentCard.wordEn : currentCard.word}
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full h-full rounded-xl flex items-center justify-center border-4 border-dashed border-red-900/30" style={{backgroundColor:'rgba(124,74,30,0.08)'}}>
                                    <span className="text-red-900/50 font-bold font-serif text-lg">{isEn ? "Ready to play!" : "¡Listo!"}</span>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-4 justify-center mb-6">
                            <button onClick={drawCard} disabled={gameOver || deck.length === 0}
                                className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold font-serif shadow-lg transform active:scale-95 transition-all ${gameOver ? 'bg-red-900/20 text-red-900/40 cursor-not-allowed' : ''}`}
                                style={gameOver ? {} : {backgroundColor:'#f5c842', borderBottom:'4px solid #c49a10', color:'#3d1606'}}>
                                <Play size={24} fill="currentColor" /> {gameOver ? (isEn ? "GAME OVER!" : "¡SE ACABÓ!") : (isEn ? "DRAW CARD" : "SACAR CARTA")}
                            </button>
                            <button onClick={startNewGame} className="p-3 bg-red-800 hover:bg-red-900 text-yellow-100 rounded-full shadow-lg border-b-4 border-red-950 active:mt-1 active:border-b-0 transition-all">
                                <RotateCcw size={24} />
                            </button>
                        </div>

                        <div className="text-sm text-red-900/60 mb-4 font-serif font-medium">
                            {isEn ? "Cards remaining: " : "Restantes: "} <span className="font-bold text-red-900">{deck.length}</span>
                        </div>

                        <div className="w-full rounded-lg p-3 border-2 border-red-900/20" style={{backgroundColor:'rgba(124,74,30,0.06)'}}>
                            <div className="flex justify-between items-center mb-2">
                                <h3 className="text-xs font-bold text-red-900/50 uppercase text-left font-serif">{isEn ? "History" : "Historial"}</h3>
                                <button onClick={openHistoryModal} className="text-xs font-bold text-red-800 hover:underline flex items-center gap-1 font-serif">
                                    <History size={12} /> {isEn ? "View All" : "Ver Todo"}
                                </button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-2 min-h-[70px]">
                                {drawnHistory.slice(0, 5).map((card, idx) => (
                                    <div key={idx} className="flex-shrink-0 w-14 card-parchment border-2 border-red-900/20 rounded flex flex-col items-center justify-center shadow-sm opacity-90 p-1">
                                        <span className="text-xl">{card.emoji}</span>
                                        <span className="font-bold text-red-950 truncate w-full text-center text-[9px] mt-1 font-serif">{isEn ? card.wordEn : card.word}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function LoteriaApp() {
            const [loading, setLoading] = useState(true);
            const [deckData, setDeckData] = useState(null);

            const [mode, setMode] = useState(INITIAL_MODE);
            const [language, setLanguage] = useState('es');

            const [board, setBoard] = useState([]);
            const [marked, setMarked] = useState(new Set());
            const [showAnswers, setShowAnswers] = useState(false);

            const [deck, setDeck] = useState([]);
            const [currentCard, setCurrentCard] = useState(null);
            const [drawnHistory, setDrawnHistory] = useState([]);
            const [gameOver, setGameOver] = useState(false);

            const [isVocabOpen, setIsVocabOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [nothingMsg, setNothingMsg] = useState(false);

            useEffect(() => {
                const fetchDeck = async () => {
                    if (!QUIZ_ID) { setLoading(false); return; }
                    try {
                        const snap = await getDoc(doc(db, `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`, QUIZ_ID));
                        if (snap.exists()) {
                            const data = snap.data();
                            setDeckData(data);
                            setLanguage(data.language || 'es');
                            const cards = data.content?.cards || [];
                            setBoard(shuffleArray(cards).slice(0, 16));
                            setDeck(shuffleArray(cards));
                        }
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                fetchDeck();
            }, []);

            const generateBoard = () => {
                if (!deckData) return;
                setBoard(shuffleArray(deckData.content.cards).slice(0, 16));
                setMarked(new Set());
                setShowAnswers(false);
            };

            const toggleMark = (id) => {
                const newMarked = new Set(marked);
                newMarked.has(id) ? newMarked.delete(id) : newMarked.add(id);
                setMarked(newMarked);
            };

            const startNewGame = () => {
                if (!deckData) return;
                setDeck(shuffleArray(deckData.content.cards));
                setCurrentCard(null);
                setDrawnHistory([]);
                setGameOver(false);
            };

            const drawCard = () => {
                if (deck.length === 0) { setGameOver(true); return; }
                const nextCard = deck[0];
                setDeck(deck.slice(1));
                setCurrentCard(nextCard);
                setDrawnHistory([nextCard, ...drawnHistory]);
            };

            const goBack = () => {
                if (INITIAL_MODE === 'teacher') {
                    window.location.href = TEACHER_UID.includes('anita') ? 'index-es.html' : 'index.html';
                } else if (urlParams.get('student') === 'true') {
                    if (window.history.length > 1) window.history.back();
                    else window.location.href = TEACHER_UID.includes('anita') ? 'index-es.html' : 'index.html';
                } else {
                    setNothingMsg(true);
                    setTimeout(() => setNothingMsg(false), 2500);
                }
            };

            if (loading) return (
                <div className="h-screen w-screen flex items-center justify-center" style={{backgroundColor:'#7c4a1e'}}>
                    <Loader2 className="animate-spin" size={48} style={{color:'#f5c842'}}/>
                </div>
            );
            if (!deckData) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center text-yellow-100" style={{backgroundColor:'#7c4a1e'}}>
                    <p className="text-xl mb-4 font-serif">Mazo no encontrado</p>
                    <button onClick={goBack} className="px-6 py-2 rounded-xl font-serif font-bold" style={{backgroundColor:'#f5c842', color:'#3d1606'}}>Regresar</button>
                </div>
            );

            const isEn = language === 'en';

            return (
                <div className="min-h-screen font-sans" style={{paddingBottom:'calc(2.5rem + env(safe-area-inset-bottom, 0px))'}}>
                    <nav className="text-white shadow-xl sticky top-0 z-50 mb-6" style={{background:'linear-gradient(to right, #450a0a, #7f1d1d)'}}>
                        <div className="px-3 pb-3 max-w-4xl mx-auto flex flex-row flex-wrap justify-between items-center gap-2"
                             style={{paddingTop:'calc(env(safe-area-inset-top, 0px) + 0.75rem)'}}>
                            <div className="flex items-center gap-3">
                                <button onClick={goBack} className="p-1.5 rounded-lg transition-colors flex-shrink-0" style={{backgroundColor:'rgba(255,255,255,0.12)'}}
                                    onMouseEnter={e=>e.currentTarget.style.backgroundColor='rgba(255,255,255,0.22)'}
                                    onMouseLeave={e=>e.currentTarget.style.backgroundColor='rgba(255,255,255,0.12)'}><ArrowLeft size={20}/></button>
                                {nothingMsg ? (
                                    <span className="text-xs font-bold font-serif px-3 py-1 rounded-full animate-in fade-in duration-300 whitespace-nowrap" style={{backgroundColor:'rgba(245,200,66,0.15)', color:'#fde68a', border:'1px solid rgba(245,200,66,0.3)'}}>
                                        👀 Nothing to see here!
                                    </span>
                                ) : (
                                    <div className="flex items-center gap-2 min-w-0">
                                        <span className="text-xl flex-shrink-0">🎴</span>
                                        <h1 className="text-lg sm:text-xl font-bold tracking-wider font-serif truncate">{deckData.title}</h1>
                                    </div>
                                )}
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4 flex-1 justify-end">
                                <button onClick={() => setLanguage(l => l === 'es' ? 'en' : 'es')}
                                    className="text-white p-1.5 rounded-lg flex items-center gap-1 font-bold font-serif transition-colors"
                                    style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                    <Globe size={18} /> <span className="text-xs">{language === 'es' ? '🇲🇽 ES' : '🇺🇸 EN'}</span>
                                </button>

                                <button onClick={() => setIsVocabOpen(true)}
                                    className="text-white p-1.5 rounded-lg flex items-center gap-1 transition-colors"
                                    style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                    <Book size={18} /> <span className="text-xs font-bold font-serif hidden sm:inline">Vocab</span>
                                </button>

                                <div className="flex p-1 rounded-lg" style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                    <button onClick={() => setMode('student')}
                                        className={`px-3 py-1 rounded-md text-xs sm:text-sm font-bold font-serif transition-all ${mode === 'student' ? 'shadow-sm' : 'text-white/80'}`}
                                        style={mode === 'student' ? {backgroundColor:'#f5c842', color:'#3d1606'} : {}}>
                                        {isEn ? 'Student' : 'Alumno'}
                                    </button>
                                    <button onClick={() => setMode('teacher')}
                                        className={`px-3 py-1 rounded-md text-xs sm:text-sm font-bold font-serif transition-all ${mode === 'teacher' ? 'shadow-sm' : 'text-white/80'}`}
                                        style={mode === 'teacher' ? {backgroundColor:'#f5c842', color:'#3d1606'} : {}}>
                                        {isEn ? 'Teacher' : 'Profe'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="px-4">
                        {mode === 'student' ? (
                            <StudentView board={board} marked={marked} showAnswers={showAnswers} generateBoard={generateBoard} toggleMark={toggleMark} toggleShowAnswers={() => setShowAnswers(!showAnswers)} language={language} />
                        ) : (
                            <TeacherView deck={deck} currentCard={currentCard} drawnHistory={drawnHistory} gameOver={gameOver} drawCard={drawCard} startNewGame={startNewGame} openHistoryModal={() => setIsHistoryOpen(true)} language={language} />
                        )}
                    </main>

                    <Modal isOpen={isVocabOpen} onClose={() => setIsVocabOpen(false)} title={isEn ? "Vocabulary" : "Vocabulario"}>
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                            {deckData.content.cards.map(card => (
                                <div key={card.id} className="flex flex-col items-center justify-center p-2 rounded-xl transition-colors border-2 border-red-900/15 hover:border-red-900/30" style={{backgroundColor:'rgba(124,74,30,0.06)'}}>
                                    <div className="text-3xl mb-1">{card.emoji}</div>
                                    <div className="text-xs font-bold text-red-950 text-center leading-tight font-serif">
                                        <span className={`${card.type === 'masc' ? 'text-sky-700' : card.type === 'fem' ? 'text-rose-700' : 'text-purple-700'}`}>{isEn ? "The" : card.article}</span> {isEn ? card.wordEn : card.word}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Modal>

                    <Modal isOpen={isHistoryOpen} onClose={() => setIsHistoryOpen(false)} title={isEn ? "History" : "Historial"}>
                        {drawnHistory.length === 0 ? (
                            <p className="text-center text-red-900/50 py-8 font-serif">{isEn ? "Empty." : "Vacío."}</p>
                        ) : (
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                                {drawnHistory.map((card, idx) => (
                                    <div key={idx} className="flex flex-col items-center justify-center p-2 border-2 border-red-900/20 rounded-xl relative" style={{backgroundColor:'rgba(124,74,30,0.06)'}}>
                                        <span className="absolute top-1 right-2 text-[10px] text-red-900/30 font-mono font-bold">{drawnHistory.length - idx}</span>
                                        <div className="text-3xl">{card.emoji}</div>
                                        <div className="text-xs font-bold text-red-950 mt-1 text-center leading-tight font-serif">
                                            {isEn ? card.wordEn : card.word}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </Modal>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<LoteriaApp />);
    </script>
</body>
</html>

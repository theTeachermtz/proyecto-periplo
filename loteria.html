<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lotería Multiverso | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="periplo-config.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            background-color: #7c4a1e;
            background-image:
                repeating-linear-gradient(108deg, transparent, transparent 8px, rgba(0,0,0,.03) 8px, rgba(0,0,0,.03) 9px),
                repeating-linear-gradient(112deg, transparent, transparent 12px, rgba(255,180,80,.04) 12px, rgba(255,180,80,.04) 13px),
                repeating-linear-gradient(104deg, rgba(140,80,20,0.3) 10%, rgba(180,100,30,0) 20%, rgba(120,65,15,0.2) 30%, rgba(180,100,30,0) 40%),
                linear-gradient(180deg, #9c652f 0%, #7c4a1e 30%, #8b5525 60%, #6b3d18 100%);
        }
        @keyframes zoom-in {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(12deg); opacity: 1; }
        }
        .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-base {
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(200,160,80,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(180,120,40,0.05) 0%, transparent 60%);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { RefreshCw, Play, RotateCcw, Eye, EyeOff, Book, History, X, Globe, ArrowLeft, Loader2 } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const TEACHER_UID = urlParams.get('uid') || 'teacher_builder_001';
        const QUIZ_ID = urlParams.get('id');
        const INITIAL_MODE = urlParams.get('mode') || 'student';

        const THEMES = {
            taco:       { label:'Taco House',     icon:'🌮', nav1:'#450a0a', nav2:'#7f1d1d', accent:'#7f1d1d', soft:'rgba(127,29,29,0.28)',  cardBg:'#fffef7', gridBg:'#4a1c08', gold:'#f5c842', goldShadow:'#c49a10', goldText:'#3d1606', marker:'rgba(153,27,27,0.85)' },
            valentines: { label:'San Valentín',   icon:'💕', nav1:'#500724', nav2:'#9d174d', accent:'#9d174d', soft:'rgba(157,23,77,0.28)',   cardBg:'#fff0f6', gridBg:'#4a0f28', gold:'#fda4af', goldShadow:'#e11d48', goldText:'#500724', marker:'rgba(157,23,77,0.82)'  },
            muertos:    { label:'Día de Muertos', icon:'💀', nav1:'#1e0a4a', nav2:'#4c1d95', accent:'#6d28d9', soft:'rgba(109,40,217,0.28)',  cardBg:'#fefce8', gridBg:'#1c0848', gold:'#fbbf24', goldShadow:'#b45309', goldText:'#1e0a4a', marker:'rgba(109,40,217,0.85)' },
            navidad:    { label:'Navidad',         icon:'🎄', nav1:'#14532d', nav2:'#166534', accent:'#15803d', soft:'rgba(21,128,61,0.28)',   cardBg:'#f0fdf4', gridBg:'#0f3320', gold:'#dc2626', goldShadow:'#991b1b', goldText:'#f0fdf4', marker:'rgba(220,38,38,0.85)'  },
            tropical:   { label:'Tropical',        icon:'🌊', nav1:'#134e4a', nav2:'#0f766e', accent:'#0d9488', soft:'rgba(13,148,136,0.28)',  cardBg:'#f0fdfa', gridBg:'#0c2e2b', gold:'#fb923c', goldShadow:'#c2410c', goldText:'#134e4a', marker:'rgba(13,148,136,0.85)' },
            noche:      { label:'Noche Oscura',    icon:'🌙', nav1:'#0f172a', nav2:'#1e293b', accent:'#475569', soft:'rgba(71,85,105,0.30)',   cardBg:'#f1f5f9', gridBg:'#0f172a', gold:'#e2e8f0', goldShadow:'#64748b', goldText:'#0f172a', marker:'rgba(71,85,105,0.85)'  },
            primavera:  { label:'Primavera',       icon:'🌸', nav1:'#701a75', nav2:'#a21caf', accent:'#c026d3', soft:'rgba(192,38,211,0.28)',  cardBg:'#fdf4ff', gridBg:'#4a0a52', gold:'#fde047', goldShadow:'#ca8a04', goldText:'#701a75', marker:'rgba(192,38,211,0.85)' },
            dorado:     { label:'Dorado',          icon:'🏆', nav1:'#451a03', nav2:'#78350f', accent:'#b45309', soft:'rgba(180,83,9,0.28)',    cardBg:'#fffbeb', gridBg:'#3d1e05', gold:'#fbbf24', goldShadow:'#92400e', goldText:'#451a03', marker:'rgba(180,83,9,0.85)'   },
        };

        const shuffleArray = (array) => {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const Modal = ({ isOpen, onClose, title, children, t }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="card-base rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden border-4"
                        style={{backgroundColor: t.cardBg, borderColor: t.accent + 'aa'}}>
                        <div className="p-4 border-b-2 flex justify-between items-center" style={{backgroundColor: t.gold + '40', borderColor: t.soft}}>
                            <h3 className="text-xl font-bold font-serif" style={{color: t.nav1}}>{title}</h3>
                            <button onClick={onClose} className="p-1 rounded-full transition"
                                onMouseEnter={e => e.currentTarget.style.backgroundColor = t.soft}
                                onMouseLeave={e => e.currentTarget.style.backgroundColor = 'transparent'}>
                                <X size={24} style={{color: t.accent}} />
                            </button>
                        </div>
                        <div className="p-4 overflow-y-auto">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const StudentView = ({ board, marked, showAnswers, generateBoard, toggleMark, toggleShowAnswers, language, t }) => {
            const isEn = language === 'en';
            const [showConfirm, setShowConfirm] = useState(false);
            const handleRefresh = () => { if (marked.size > 0) setShowConfirm(true); else generateBoard(); };
            return (
                <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in fade-in duration-500">
                    <div className="card-base p-4 rounded-xl shadow-2xl border-4 w-full relative"
                        style={{backgroundColor: t.cardBg, borderColor: t.accent}}>
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl sm:text-2xl font-bold font-serif tracking-wide truncate" style={{color: t.nav1}}>
                                {isEn ? "MY BOARD" : "MI TABLA"}
                            </h2>
                            <div className="flex gap-2">
                                <button onClick={toggleShowAnswers}
                                    className="p-2 rounded-full transition-colors shadow-sm border-b-2 active:mt-0.5 active:border-b-0"
                                    style={{backgroundColor: t.gold, borderColor: t.goldShadow, color: t.goldText}}>
                                    {showAnswers ? <EyeOff size={20}/> : <Eye size={20}/>}
                                </button>
                                <button onClick={handleRefresh}
                                    className="p-2 rounded-full text-white transition-colors shadow-sm border-b-2 active:mt-0.5 active:border-b-0"
                                    style={{backgroundColor: t.accent, borderColor: t.nav1}}>
                                    <RefreshCw size={20}/>
                                </button>
                            </div>
                        </div>

                        {showConfirm && (
                            <div className="absolute inset-0 z-30 flex items-center justify-center rounded-xl bg-black/50 backdrop-blur-[3px]">
                                <div className="card-base border-4 rounded-xl p-5 shadow-2xl text-center mx-6"
                                    style={{backgroundColor: t.cardBg, borderColor: t.accent}}>
                                    <p className="font-serif font-bold text-sm mb-1" style={{color: t.nav1}}>
                                        {isEn ? "Change board?" : "¿Cambiar tabla?"}
                                    </p>
                                    <p className="font-serif text-xs mb-4" style={{color: t.accent}}>
                                        {isEn ? "You'll lose your progress this round." : "Perderás tu progreso en esta ronda."}
                                    </p>
                                    <div className="flex gap-3 justify-center">
                                        <button onClick={() => { generateBoard(); setShowConfirm(false); }}
                                            className="px-5 py-2 text-white font-bold font-serif rounded-lg shadow border-b-2 active:mt-0.5 active:border-b-0 transition-all"
                                            style={{backgroundColor: t.accent, borderColor: t.nav1}}>
                                            {isEn ? "Yes, change" : "Sí, cambiar"}
                                        </button>
                                        <button onClick={() => setShowConfirm(false)}
                                            className="px-5 py-2 font-bold font-serif rounded-lg border-2 transition-all"
                                            style={{borderColor: t.soft, color: t.nav1, backgroundColor: t.soft}}>
                                            {isEn ? "Cancel" : "Cancelar"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-4 gap-2 p-2 rounded-lg border-2"
                            style={{backgroundColor: t.gridBg, borderColor: t.nav1 + '80'}}>
                            {board.map((item) => (
                                <div key={item.id} onClick={() => toggleMark(item.id)}
                                    className="relative aspect-[3/4] card-base border-2 rounded-lg flex flex-col items-center justify-between cursor-pointer transition-colors shadow-sm overflow-hidden p-1 active:scale-95"
                                    style={{backgroundColor: t.cardBg, borderColor: t.soft}}>

                                    <span className="absolute top-0 right-1 text-[8px] sm:text-[10px] font-mono" style={{color: t.soft}}>{item.id}</span>

                                    <div className="flex flex-col items-center justify-center h-full w-full z-10">
                                        <div className="h-4 sm:h-5 flex items-end">
                                            {showAnswers && (
                                                <span className={`text-[10px] sm:text-xs font-bold uppercase ${item.type === 'masc' ? 'text-sky-700' : item.type === 'fem' ? 'text-rose-700' : 'text-purple-700'}`}>
                                                    {isEn ? "The" : item.article}
                                                </span>
                                            )}
                                        </div>
                                        <div className="text-2xl sm:text-4xl mb-1 drop-shadow-md">{item.emoji}</div>
                                        <span className={`font-serif font-bold leading-tight text-center break-words w-full ${(isEn ? item.wordEn : item.word).length > 9 ? 'text-[9px] sm:text-xs' : 'text-xs sm:text-sm'}`}
                                            style={{color: t.nav1}}>
                                            {isEn ? item.wordEn : item.word}
                                        </span>
                                    </div>

                                    {marked.has(item.id) && (
                                        <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-zoom-in">
                                            <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 transform rotate-12 shadow-lg"
                                                style={{backgroundColor: t.marker, borderColor: t.nav1 + '40'}}></div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        <p className="text-center text-xs mt-3 italic font-serif" style={{color: t.soft}}>
                            {isEn ? "Tap to mark" : "Toca una casilla para marcarla"}
                        </p>
                    </div>
                </div>
            );
        };

        const TeacherView = ({ deck, currentCard, drawnHistory, gameOver, drawCard, startNewGame, openHistoryModal, language, t }) => {
            const isEn = language === 'en';
            return (
                <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in fade-in duration-500">
                    <div className="card-base p-6 rounded-xl shadow-2xl border-4 w-full text-center"
                        style={{backgroundColor: t.cardBg, borderColor: t.accent}}>
                        <h2 className="text-xl font-bold font-serif mb-4 tracking-wide pb-2 border-b-2"
                            style={{color: t.nav1, borderColor: t.soft}}>
                            {isEn ? "THE DECK" : "LA BARAJA"}
                        </h2>

                        <div className="mb-6 relative h-64 w-48 mx-auto">
                            {currentCard ? (
                                <div className="w-full h-full card-base border-4 rounded-xl shadow-lg flex flex-col items-center justify-center p-4 transform transition-all hover:scale-105 duration-300"
                                    style={{backgroundColor: t.cardBg, borderColor: t.accent, boxShadow: `0 4px 0 ${t.nav1}, 0 8px 24px rgba(0,0,0,0.4)`}}>
                                    <span className="absolute top-2 left-3 text-xl font-bold font-serif" style={{color: t.soft}}>{currentCard.id}</span>
                                    <div className={`text-2xl font-black mb-2 uppercase font-serif ${currentCard.type === 'masc' ? 'text-sky-700' : currentCard.type === 'fem' ? 'text-rose-700' : 'text-purple-700'}`}>
                                        {isEn ? "The" : currentCard.article}
                                    </div>
                                    <div className="text-6xl mb-4 drop-shadow-lg">{currentCard.emoji}</div>
                                    <div className={`font-serif font-bold w-full break-words leading-none ${(isEn ? currentCard.wordEn : currentCard.word).length > 9 ? 'text-2xl' : 'text-3xl'}`}
                                        style={{color: t.nav1}}>
                                        {isEn ? currentCard.wordEn : currentCard.word}
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full h-full rounded-xl flex items-center justify-center border-4 border-dashed"
                                    style={{backgroundColor: t.soft + '40', borderColor: t.soft}}>
                                    <span className="font-bold font-serif text-lg" style={{color: t.soft}}>
                                        {isEn ? "Ready to play!" : "¡Listo!"}
                                    </span>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-4 justify-center mb-6">
                            <button onClick={drawCard} disabled={gameOver || deck.length === 0}
                                className="flex items-center gap-2 px-6 py-3 rounded-full font-bold font-serif shadow-lg transform active:scale-95 transition-all"
                                style={gameOver
                                    ? {backgroundColor: t.soft, color: t.nav1 + '70', cursor: 'not-allowed'}
                                    : {backgroundColor: t.gold, borderBottom: `4px solid ${t.goldShadow}`, color: t.goldText}}>
                                <Play size={24} fill="currentColor" />
                                {gameOver ? (isEn ? "GAME OVER!" : "¡SE ACABÓ!") : (isEn ? "DRAW CARD" : "SACAR CARTA")}
                            </button>
                            <button onClick={startNewGame}
                                className="p-3 text-white rounded-full shadow-lg border-b-4 active:mt-1 active:border-b-0 transition-all"
                                style={{backgroundColor: t.accent, borderColor: t.nav1}}>
                                <RotateCcw size={24} />
                            </button>
                        </div>

                        <div className="text-sm mb-4 font-serif font-medium" style={{color: t.soft}}>
                            {isEn ? "Cards remaining: " : "Restantes: "}
                            <span className="font-bold" style={{color: t.accent}}>{deck.length}</span>
                        </div>

                        <div className="w-full rounded-lg p-3 border-2" style={{backgroundColor: t.soft + '30', borderColor: t.soft}}>
                            <div className="flex justify-between items-center mb-2">
                                <h3 className="text-xs font-bold uppercase text-left font-serif" style={{color: t.soft}}>
                                    {isEn ? "History" : "Historial"}
                                </h3>
                                <button onClick={openHistoryModal} className="text-xs font-bold hover:underline flex items-center gap-1 font-serif"
                                    style={{color: t.accent}}>
                                    <History size={12} /> {isEn ? "View All" : "Ver Todo"}
                                </button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-2 min-h-[70px]">
                                {drawnHistory.slice(0, 5).map((card, idx) => (
                                    <div key={idx} className="flex-shrink-0 w-14 card-base border-2 rounded flex flex-col items-center justify-center shadow-sm opacity-90 p-1"
                                        style={{backgroundColor: t.cardBg, borderColor: t.soft}}>
                                        <span className="text-xl">{card.emoji}</span>
                                        <span className="font-bold truncate w-full text-center text-[9px] mt-1 font-serif" style={{color: t.nav1}}>
                                            {isEn ? card.wordEn : card.word}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const QrModal = ({ onClose, t }) => {
            const [copied, setCopied] = useState(false);
            const base = window.location.href.split('?')[0];
            const studentUrl = `${base}?id=${QUIZ_ID}&uid=${TEACHER_UID}`;
            const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(studentUrl)}&bgcolor=09090b&color=ffffff&qzone=2`;
            const copy = () => navigator.clipboard.writeText(studentUrl).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2200); });
            return (
                <div className="fixed inset-0 z-[200] bg-black/80 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="card-base rounded-3xl p-8 text-center max-w-xs w-full shadow-2xl border-4"
                        style={{ backgroundColor: t.cardBg, borderColor: t.accent }}
                        onClick={e => e.stopPropagation()}>
                        <div className="text-xl font-bold font-serif mb-4" style={{ color: t.nav1 }}>📱 Link de alumnos</div>
                        <img src={qrSrc} alt="QR" className="rounded-2xl mx-auto border-4 w-56 h-56" style={{ borderColor: t.soft }} />
                        <div className="mt-3 text-[10px] font-mono break-all" style={{ color: t.soft }}>{studentUrl}</div>
                        <button onClick={copy}
                            className="mt-4 w-full py-2.5 rounded-xl font-bold font-serif border-b-2 active:mt-[18px] active:border-b-0 transition-all"
                            style={{ backgroundColor: t.gold, borderColor: t.goldShadow, color: t.goldText }}>
                            {copied ? '✅ ¡Copiado!' : '🔗 Copiar link'}
                        </button>
                        <button onClick={onClose}
                            className="mt-2 w-full py-2 rounded-xl font-bold font-serif text-sm"
                            style={{ color: t.soft }}>
                            Cerrar
                        </button>
                    </div>
                </div>
            );
        };

        function LoteriaApp() {
            const [loading, setLoading] = useState(true);
            const [deckData, setDeckData] = useState(null);

            const [mode, setMode] = useState(INITIAL_MODE);
            const [language, setLanguage] = useState('es');
            const [theme, setTheme] = useState('taco');

            const [board, setBoard] = useState([]);
            const [marked, setMarked] = useState(new Set());
            const [showAnswers, setShowAnswers] = useState(false);

            const [deck, setDeck] = useState([]);
            const [currentCard, setCurrentCard] = useState(null);
            const [drawnHistory, setDrawnHistory] = useState([]);
            const [gameOver, setGameOver] = useState(false);

            const [isVocabOpen, setIsVocabOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [nothingMsg, setNothingMsg] = useState(false);
            const [isQrOpen, setIsQrOpen] = useState(false);

            useEffect(() => {
                const fetchDeck = async () => {
                    if (!QUIZ_ID) { setLoading(false); return; }
                    try {
                        const snap = await getDoc(doc(db, `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`, QUIZ_ID));
                        if (snap.exists()) {
                            const data = snap.data();
                            setDeckData(data);
                            setLanguage(data.language || 'es');
                            setTheme(data.theme || 'taco');
                            const cards = data.content?.cards || [];
                            setBoard(shuffleArray(cards).slice(0, 16));
                            setDeck(shuffleArray(cards));
                        }
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                fetchDeck();
            }, []);

            const generateBoard = () => {
                if (!deckData) return;
                setBoard(shuffleArray(deckData.content.cards).slice(0, 16));
                setMarked(new Set());
                setShowAnswers(false);
            };

            const toggleMark = (id) => {
                const newMarked = new Set(marked);
                newMarked.has(id) ? newMarked.delete(id) : newMarked.add(id);
                setMarked(newMarked);
            };

            const startNewGame = () => {
                if (!deckData) return;
                setDeck(shuffleArray(deckData.content.cards));
                setCurrentCard(null);
                setDrawnHistory([]);
                setGameOver(false);
            };

            const drawCard = () => {
                if (deck.length === 0) { setGameOver(true); return; }
                const nextCard = deck[0];
                setDeck(deck.slice(1));
                setCurrentCard(nextCard);
                setDrawnHistory([nextCard, ...drawnHistory]);
            };

            const goBack = () => {
                if (INITIAL_MODE === 'teacher') {
                    window.location.href = TEACHER_UID.includes('anita') ? 'index-es.html' : 'index.html';
                } else if (urlParams.get('student') === 'true') {
                    if (window.history.length > 1) window.history.back();
                    else window.location.href = TEACHER_UID.includes('anita') ? 'index-es.html' : 'index.html';
                } else {
                    setNothingMsg(true);
                    setTimeout(() => setNothingMsg(false), 2500);
                }
            };

            const t = THEMES[theme] || THEMES.taco;
            const isEn = language === 'en';

            if (loading) return (
                <div className="h-screen w-screen flex items-center justify-center" style={{backgroundColor:'#7c4a1e'}}>
                    <Loader2 className="animate-spin" size={48} style={{color:'#f5c842'}}/>
                </div>
            );
            if (!deckData) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center text-yellow-100" style={{backgroundColor:'#7c4a1e'}}>
                    <p className="text-xl mb-4 font-serif">Mazo no encontrado</p>
                    <button onClick={goBack} className="px-6 py-2 rounded-xl font-serif font-bold"
                        style={{backgroundColor:'#f5c842', color:'#3d1606'}}>Regresar</button>
                </div>
            );

            return (
                <div className="min-h-screen font-sans" style={{paddingBottom:'calc(2.5rem + env(safe-area-inset-bottom, 0px))'}}>
                    <nav className="text-white shadow-xl sticky top-0 z-50 mb-6"
                        style={{background:`linear-gradient(to right, ${t.nav1}, ${t.nav2})`}}>
                        <div className="px-3 pb-3 max-w-4xl mx-auto flex flex-row flex-wrap justify-between items-center gap-2"
                             style={{paddingTop:'calc(env(safe-area-inset-top, 0px) + 0.75rem)'}}>
                            <div className="flex items-center gap-3">
                                <button onClick={goBack} className="p-1.5 rounded-lg transition-colors flex-shrink-0"
                                    style={{backgroundColor:'rgba(255,255,255,0.12)'}}
                                    onMouseEnter={e=>e.currentTarget.style.backgroundColor='rgba(255,255,255,0.22)'}
                                    onMouseLeave={e=>e.currentTarget.style.backgroundColor='rgba(255,255,255,0.12)'}>
                                    <ArrowLeft size={20}/>
                                </button>
                                {nothingMsg ? (
                                    <span className="text-xs font-bold font-serif px-3 py-1 rounded-full animate-in fade-in duration-300 whitespace-nowrap"
                                        style={{backgroundColor:'rgba(245,200,66,0.15)', color:'#fde68a', border:'1px solid rgba(245,200,66,0.3)'}}>
                                        👀 Nothing to see here!
                                    </span>
                                ) : (
                                    <div className="flex items-center gap-2 min-w-0">
                                        <span className="text-xl flex-shrink-0">🎴</span>
                                        <h1 className="text-lg sm:text-xl font-bold tracking-wider font-serif truncate">{deckData.title}</h1>
                                    </div>
                                )}
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4 flex-1 justify-end">
                                <button onClick={() => setLanguage(l => l === 'es' ? 'en' : 'es')}
                                    className="text-white p-1.5 rounded-lg flex items-center gap-1 font-bold font-serif"
                                    style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                    <Globe size={18} /> <span className="text-xs">{language === 'es' ? '🇲🇽 ES' : '🇺🇸 EN'}</span>
                                </button>

                                <button onClick={() => setIsVocabOpen(true)}
                                    className="text-white p-1.5 rounded-lg flex items-center gap-1"
                                    style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                    <Book size={18} /> <span className="text-xs font-bold font-serif hidden sm:inline">Vocab</span>
                                </button>

                                {mode === 'teacher' && (
                                    <button onClick={() => setIsQrOpen(true)}
                                        className="text-white p-1.5 rounded-lg flex items-center gap-1 font-bold font-serif"
                                        style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                        <span>📱</span> <span className="text-xs hidden sm:inline">QR</span>
                                    </button>
                                )}

                                <div className="flex p-1 rounded-lg" style={{backgroundColor:'rgba(0,0,0,0.3)'}}>
                                    <button onClick={() => setMode('student')}
                                        className={`px-3 py-1 rounded-md text-xs sm:text-sm font-bold font-serif transition-all ${mode !== 'student' ? 'text-white/80' : ''}`}
                                        style={mode === 'student' ? {backgroundColor: t.gold, color: t.goldText} : {}}>
                                        {isEn ? 'Student' : 'Alumno'}
                                    </button>
                                    <button onClick={() => setMode('teacher')}
                                        className={`px-3 py-1 rounded-md text-xs sm:text-sm font-bold font-serif transition-all ${mode !== 'teacher' ? 'text-white/80' : ''}`}
                                        style={mode === 'teacher' ? {backgroundColor: t.gold, color: t.goldText} : {}}>
                                        {isEn ? 'Teacher' : 'Profe'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="px-4">
                        {mode === 'student' ? (
                            <StudentView board={board} marked={marked} showAnswers={showAnswers} generateBoard={generateBoard}
                                toggleMark={toggleMark} toggleShowAnswers={() => setShowAnswers(!showAnswers)}
                                language={language} t={t} />
                        ) : (
                            <TeacherView deck={deck} currentCard={currentCard} drawnHistory={drawnHistory} gameOver={gameOver}
                                drawCard={drawCard} startNewGame={startNewGame} openHistoryModal={() => setIsHistoryOpen(true)}
                                language={language} t={t} />
                        )}
                    </main>

                    <Modal isOpen={isVocabOpen} onClose={() => setIsVocabOpen(false)}
                        title={isEn ? "Vocabulary" : "Vocabulario"} t={t}>
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                            {deckData.content.cards.map(card => (
                                <div key={card.id} className="flex flex-col items-center justify-center p-2 rounded-xl transition-colors border-2"
                                    style={{backgroundColor: t.soft + '40', borderColor: t.soft}}>
                                    <div className="text-3xl mb-1">{card.emoji}</div>
                                    <div className="text-xs font-bold text-center leading-tight font-serif" style={{color: t.nav1}}>
                                        <span className={`${card.type === 'masc' ? 'text-sky-700' : card.type === 'fem' ? 'text-rose-700' : 'text-purple-700'}`}>
                                            {isEn ? "The" : card.article}
                                        </span> {isEn ? card.wordEn : card.word}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Modal>

                    <Modal isOpen={isHistoryOpen} onClose={() => setIsHistoryOpen(false)}
                        title={isEn ? "History" : "Historial"} t={t}>
                        {drawnHistory.length === 0 ? (
                            <p className="text-center py-8 font-serif" style={{color: t.soft}}>
                                {isEn ? "Empty." : "Vacío."}
                            </p>
                        ) : (
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                                {drawnHistory.map((card, idx) => (
                                    <div key={idx} className="flex flex-col items-center justify-center p-2 border-2 rounded-xl relative"
                                        style={{backgroundColor: t.soft + '40', borderColor: t.soft}}>
                                        <span className="absolute top-1 right-2 text-[10px] font-mono font-bold" style={{color: t.soft}}>
                                            {drawnHistory.length - idx}
                                        </span>
                                        <div className="text-3xl">{card.emoji}</div>
                                        <div className="text-xs font-bold mt-1 text-center leading-tight font-serif" style={{color: t.nav1}}>
                                            {isEn ? card.wordEn : card.word}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </Modal>

                    {isQrOpen && <QrModal onClose={() => setIsQrOpen(false)} t={t} />}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<LoteriaApp />);
    </script>
</body>
</html>

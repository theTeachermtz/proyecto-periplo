<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lotería Multiverso | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="periplo-config.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; overflow-x: hidden; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        @keyframes zoom-in {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(12deg); opacity: 1; }
        }
        .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { RefreshCw, Play, RotateCcw, Eye, EyeOff, Shuffle, Book, History, X, Globe, ArrowLeft, Loader2 } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const TEACHER_UID = urlParams.get('uid') || 'teacher_builder_001';
        const QUIZ_ID = urlParams.get('id');
        const INITIAL_MODE = urlParams.get('mode') || 'student';

        const shuffleArray = (array) => {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden">
                        <div className="p-4 border-b flex justify-between items-center bg-slate-50">
                            <h3 className="text-xl font-bold text-slate-800 font-serif">{title}</h3>
                            <button onClick={onClose} className="p-1 hover:bg-slate-200 rounded-full transition">
                                <X size={24} className="text-slate-500" />
                            </button>
                        </div>
                        <div className="p-4 overflow-y-auto">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const StudentView = ({ board, marked, showAnswers, generateBoard, toggleMark, toggleShowAnswers, language }) => {
            const isEn = language === 'en';
            return (
                <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in fade-in duration-500">
                    <div className="bg-white p-4 rounded-xl shadow-xl border-4 border-indigo-600 w-full">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl sm:text-2xl font-bold text-slate-700 font-serif tracking-wide truncate">
                                {isEn ? "MY BOARD" : "MI TABLA"}
                            </h2>
                            <div className="flex gap-2">
                                <button onClick={toggleShowAnswers} className="p-2 bg-amber-400 hover:bg-amber-500 rounded-full text-rose-800 transition-colors shadow-sm">
                                    {showAnswers ? <EyeOff size={20}/> : <Eye size={20}/>}
                                </button>
                                <button onClick={generateBoard} className="p-2 bg-indigo-500 hover:bg-indigo-600 rounded-full text-white transition-colors shadow-sm">
                                    <RefreshCw size={20}/>
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-4 gap-2 bg-slate-100 p-2 rounded-lg border-2 border-slate-300">
                            {board.map((item) => (
                                <div key={item.id} onClick={() => toggleMark(item.id)}
                                    className="relative aspect-[3/4] bg-white border-2 border-indigo-200 rounded-lg flex flex-col items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors shadow-sm overflow-hidden p-1 active:scale-95">

                                    <span className="absolute top-0 right-1 text-[8px] sm:text-[10px] text-slate-400 font-mono">{item.id}</span>

                                    <div className="flex flex-col items-center justify-center h-full w-full z-10">
                                        <div className="h-4 sm:h-5 flex items-end">
                                            {showAnswers && (
                                                <span className={`text-[10px] sm:text-xs font-bold uppercase ${item.type === 'masc' ? 'text-sky-600' : item.type === 'fem' ? 'text-rose-500' : 'text-purple-600'}`}>
                                                    {isEn ? "The" : item.article}
                                                </span>
                                            )}
                                        </div>
                                        <div className="text-2xl sm:text-4xl mb-1 drop-shadow-md">{item.emoji}</div>
                                        <span className={`font-serif font-bold text-slate-800 leading-tight text-center break-words w-full ${(isEn ? item.wordEn : item.word).length > 9 ? 'text-[9px] sm:text-xs' : 'text-xs sm:text-sm'}`}>
                                            {isEn ? item.wordEn : item.word}
                                        </span>
                                    </div>

                                    {marked.has(item.id) && (
                                        <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none animate-zoom-in">
                                            <div className="w-10 h-10 sm:w-12 sm:h-12 bg-rose-700/80 rounded-full border-2 border-rose-900/40 transform rotate-12 shadow-lg backdrop-blur-[1px]"></div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        <p className="text-center text-xs text-slate-500 mt-3 italic">{isEn ? "Tap to mark" : "Toca una casilla para marcarla"}</p>
                    </div>
                </div>
            );
        };

        const TeacherView = ({ deck, currentCard, drawnHistory, gameOver, drawCard, startNewGame, openHistoryModal, language }) => {
            const isEn = language === 'en';
            return (
                <div className="flex flex-col items-center w-full max-w-md mx-auto animate-in fade-in duration-500">
                    <div className="bg-white p-6 rounded-xl shadow-2xl border-4 border-rose-600 w-full text-center">
                        <h2 className="text-xl font-bold text-slate-800 font-serif mb-4 tracking-wide border-b-2 border-slate-100 pb-2">
                            {isEn ? "THE DECK" : "LA BARAJA"}
                        </h2>

                        <div className="mb-6 relative h-64 w-48 mx-auto perspective">
                            {currentCard ? (
                                <div className="w-full h-full bg-white border-4 border-rose-500 rounded-xl shadow-lg flex flex-col items-center justify-center p-4 transform transition-all hover:scale-105 duration-300">
                                    <span className="absolute top-2 left-3 text-xl font-bold text-slate-300">{currentCard.id}</span>
                                    <div className={`text-2xl font-black mb-2 uppercase ${currentCard.type === 'masc' ? 'text-sky-500' : currentCard.type === 'fem' ? 'text-rose-500' : 'text-purple-500'}`}>
                                        {isEn ? "The" : currentCard.article}
                                    </div>
                                    <div className="text-6xl mb-4 drop-shadow-lg">{currentCard.emoji}</div>
                                    <div className={`font-serif font-bold text-slate-800 w-full break-words leading-none ${(isEn ? currentCard.wordEn : currentCard.word).length > 9 ? 'text-2xl' : 'text-3xl'}`}>
                                        {isEn ? currentCard.wordEn : currentCard.word}
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full h-full bg-slate-100 border-4 border-dashed border-slate-300 rounded-xl flex items-center justify-center">
                                    <span className="text-slate-400 font-bold text-lg">{isEn ? "Ready to play!" : "¡Listo!"}</span>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-4 justify-center mb-6">
                            <button onClick={drawCard} disabled={gameOver || deck.length === 0}
                                className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold shadow-lg transform active:scale-95 transition-all ${gameOver ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-emerald-500 hover:bg-emerald-600 text-white border-b-4 border-emerald-700'}`}>
                                <Play size={24} fill="currentColor" /> {gameOver ? (isEn ? "GAME OVER!" : "¡SE ACABÓ!") : (isEn ? "DRAW CARD" : "SACAR CARTA")}
                            </button>
                            <button onClick={startNewGame} className="p-3 bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-lg border-b-4 border-rose-700 active:mt-1 active:border-b-0">
                                <RotateCcw size={24} />
                            </button>
                        </div>

                        <div className="text-sm text-slate-500 mb-4 font-medium">
                            {isEn ? "Cards remaining: " : "Restantes: "} <span className="font-bold text-indigo-600">{deck.length}</span>
                        </div>

                        <div className="w-full bg-slate-50 rounded-lg p-3 border border-slate-200">
                            <div className="flex justify-between items-center mb-2">
                                <h3 className="text-xs font-bold text-slate-400 uppercase text-left">{isEn ? "History" : "Historial"}</h3>
                                <button onClick={openHistoryModal} className="text-xs font-bold text-indigo-600 hover:underline flex items-center gap-1">
                                    <History size={12} /> {isEn ? "View All" : "Ver Todo"}
                                </button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-2 min-h-[70px]">
                                {drawnHistory.slice(0, 5).map((card, idx) => (
                                    <div key={idx} className="flex-shrink-0 w-14 bg-white border border-slate-300 rounded flex flex-col items-center justify-center shadow-sm opacity-90 p-1">
                                        <span className="text-xl">{card.emoji}</span>
                                        <span className="font-bold text-slate-600 truncate w-full text-center text-[9px] mt-1">{isEn ? card.wordEn : card.word}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function LoteriaApp() {
            const [loading, setLoading] = useState(true);
            const [deckData, setDeckData] = useState(null);

            const [mode, setMode] = useState(INITIAL_MODE);
            const [language, setLanguage] = useState('es');

            const [board, setBoard] = useState([]);
            const [marked, setMarked] = useState(new Set());
            const [showAnswers, setShowAnswers] = useState(false);

            const [deck, setDeck] = useState([]);
            const [currentCard, setCurrentCard] = useState(null);
            const [drawnHistory, setDrawnHistory] = useState([]);
            const [gameOver, setGameOver] = useState(false);

            const [isVocabOpen, setIsVocabOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);

            useEffect(() => {
                const fetchDeck = async () => {
                    if (!QUIZ_ID) { setLoading(false); return; }
                    try {
                        const snap = await getDoc(doc(db, `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`, QUIZ_ID));
                        if (snap.exists()) {
                            const data = snap.data();
                            setDeckData(data);
                            setLanguage(data.language || 'es');
                            const cards = data.content?.cards || [];
                            setBoard(shuffleArray(cards).slice(0, 16));
                            setDeck(shuffleArray(cards));
                        }
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                fetchDeck();
            }, []);

            const generateBoard = () => {
                if (!deckData) return;
                setBoard(shuffleArray(deckData.content.cards).slice(0, 16));
                setMarked(new Set());
                setShowAnswers(false);
            };

            const toggleMark = (id) => {
                const newMarked = new Set(marked);
                newMarked.has(id) ? newMarked.delete(id) : newMarked.add(id);
                setMarked(newMarked);
            };

            const startNewGame = () => {
                if (!deckData) return;
                setDeck(shuffleArray(deckData.content.cards));
                setCurrentCard(null);
                setDrawnHistory([]);
                setGameOver(false);
            };

            const drawCard = () => {
                if (deck.length === 0) { setGameOver(true); return; }
                const nextCard = deck[0];
                setDeck(deck.slice(1));
                setCurrentCard(nextCard);
                setDrawnHistory([nextCard, ...drawnHistory]);
            };

            const goBack = () => {
                const ref = document.referrer;
                if (ref && ref.includes('index-es.html')) window.location.href = 'index-es.html';
                else window.location.href = 'index.html';
            };

            if (loading) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900"><Loader2 className="animate-spin text-indigo-500" size={48}/></div>;
            if (!deckData) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <p className="text-xl mb-4">Mazo no encontrado</p>
                    <button onClick={goBack} className="bg-indigo-600 px-6 py-2 rounded-xl">Regresar</button>
                </div>
            );

            const isEn = language === 'en';

            return (
                <div className="min-h-screen bg-slate-100 font-sans pb-10">
                    <nav className="bg-gradient-to-r from-indigo-800 to-violet-900 text-white p-3 shadow-lg mb-6 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex flex-row flex-wrap justify-between items-center gap-2">
                            <div className="flex items-center gap-3">
                                <button onClick={goBack} className="p-1.5 bg-white/10 hover:bg-white/20 rounded-lg transition-colors"><ArrowLeft size={20}/></button>
                                <div className="flex items-center gap-2">
                                    <Shuffle className="text-indigo-300" size={24} />
                                    <h1 className="text-lg sm:text-xl font-bold tracking-wider font-serif">{deckData.title}</h1>
                                </div>
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4 flex-1 justify-end">
                                <button onClick={() => setLanguage(l => l === 'es' ? 'en' : 'es')} className="bg-black/30 hover:bg-black/40 text-white p-1.5 rounded-lg flex items-center gap-1 font-bold">
                                    <Globe size={18} /> <span className="text-xs">{language === 'es' ? '🇲🇽 ES' : '🇺🇸 EN'}</span>
                                </button>

                                <button onClick={() => setIsVocabOpen(true)} className="bg-black/30 hover:bg-black/40 text-white p-1.5 rounded-lg flex items-center gap-1">
                                    <Book size={18} /> <span className="text-xs font-bold hidden sm:inline">Vocab</span>
                                </button>

                                <div className="flex bg-black/30 p-1 rounded-lg">
                                    <button onClick={() => setMode('student')} className={`px-3 py-1 rounded-md text-xs sm:text-sm font-bold transition-all ${mode === 'student' ? 'bg-white text-slate-800 shadow-sm' : 'text-white/80'}`}>{isEn ? 'Student' : 'Alumno'}</button>
                                    <button onClick={() => setMode('teacher')} className={`px-3 py-1 rounded-md text-xs sm:text-sm font-bold transition-all ${mode === 'teacher' ? 'bg-white text-slate-800 shadow-sm' : 'text-white/80'}`}>{isEn ? 'Teacher' : 'Profe'}</button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="px-4">
                        {mode === 'student' ? (
                            <StudentView board={board} marked={marked} showAnswers={showAnswers} generateBoard={generateBoard} toggleMark={toggleMark} toggleShowAnswers={() => setShowAnswers(!showAnswers)} language={language} />
                        ) : (
                            <TeacherView deck={deck} currentCard={currentCard} drawnHistory={drawnHistory} gameOver={gameOver} drawCard={drawCard} startNewGame={startNewGame} openHistoryModal={() => setIsHistoryOpen(true)} language={language} />
                        )}
                    </main>

                    <Modal isOpen={isVocabOpen} onClose={() => setIsVocabOpen(false)} title={isEn ? "Vocabulary" : "Vocabulario"}>
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                            {deckData.content.cards.map(card => (
                                <div key={card.id} className="flex flex-col items-center justify-center p-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors">
                                    <div className="text-3xl mb-1">{card.emoji}</div>
                                    <div className="text-xs font-bold text-slate-600 text-center leading-tight">
                                        <span className={`${card.type === 'masc' ? 'text-sky-600' : card.type === 'fem' ? 'text-rose-500' : 'text-purple-600'}`}>{isEn ? "The" : card.article}</span> {isEn ? card.wordEn : card.word}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Modal>

                    <Modal isOpen={isHistoryOpen} onClose={() => setIsHistoryOpen(false)} title={isEn ? "History" : "Historial"}>
                        {drawnHistory.length === 0 ? (
                            <p className="text-center text-slate-500 py-8">{isEn ? "Empty." : "Vacío."}</p>
                        ) : (
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                                {drawnHistory.map((card, idx) => (
                                    <div key={idx} className="flex flex-col items-center justify-center p-2 border border-indigo-200 bg-indigo-50/50 rounded-xl relative">
                                        <span className="absolute top-1 right-2 text-[10px] text-slate-400 font-mono font-bold">{drawnHistory.length - idx}</span>
                                        <div className="text-3xl">{card.emoji}</div>
                                        <div className="text-xs font-bold text-slate-800 mt-1 text-center leading-tight">
                                            {isEn ? card.wordEn : card.word}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </Modal>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<LoteriaApp />);
    </script>
</body>
</html>

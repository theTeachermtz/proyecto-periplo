<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periplo - Teacher Hub v20.2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (window.location.search.includes('undefined') || window.location.search.includes('null')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="https://esm.sh/run"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .drag-over-breadcrumb { background-color: rgba(99, 102, 241, 0.2); border-radius: 0.5rem; padding: 0 0.5rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, Component, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, deleteDoc, updateDoc, getDocs } from 'firebase/firestore';
        import { Plus, Folder, X, LayoutGrid, Puzzle, Grid, ArrowLeft, Trash2, Copy, Edit2, AlertTriangle, Map as MapIcon, Gamepad2, BookOpen, Calendar, Users, Sun, Moon, Zap, Dices, RotateCcw, LifeBuoy, CheckSquare, Check, FolderInput, ChevronRight, CheckCircle2, Headphones, ListFilter } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 text-center bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100">
                        <AlertTriangle size={48} className="text-rose-500 mb-4"/>
                        <h2 className="text-xl font-bold mb-2">Algo salió mal visualmente</h2>
                        <button onClick={() => window.location.reload()} className="bg-slate-900 dark:bg-white text-white dark:text-zinc-900 px-6 py-3 rounded-xl font-bold">Recargar</button>
                    </div>
                );
                return this.props.children;
            }
        }

        const GAME_TYPES = [
            { id: 'FLASHCARDS', name: 'Flashcards', icon: LayoutGrid, color: 'bg-gradient-to-br from-indigo-500 to-purple-600', desc: 'Repaso con imágenes' }, 
            { id: 'ANAGRAM', name: 'Anagrama', icon: Puzzle, color: 'bg-gradient-to-br from-pink-500 to-rose-500', desc: 'Ordena las letras' },
            { id: 'CROSSWORD', name: 'Crucigrama', icon: Grid, color: 'bg-gradient-to-br from-emerald-400 to-teal-600', desc: 'Cruza tus palabras' },
            { id: 'CONNECT4', name: 'Connect 4', icon: Gamepad2, color: 'bg-gradient-to-br from-orange-400 to-amber-500', desc: 'Estrategia y Gramática' },
            { id: 'READING', name: 'Reading Builder', icon: BookOpen, color: 'bg-gradient-to-br from-cyan-500 to-blue-600', desc: 'Lecturas con IA y Huecos' },
            { id: 'MATCH', name: 'Match Madness', icon: Zap, color: 'bg-gradient-to-br from-yellow-400 to-red-500', desc: 'Velocidad y Reflejos' },
            { id: 'LINGOMATCH', name: 'LingoMatch', icon: ListFilter, color: 'bg-gradient-to-br from-violet-500 to-indigo-600', desc: 'Emparejamiento Triple' },
            { id: 'UNO', name: 'UNO Builder (IA)', icon: Dices, color: 'bg-gradient-to-br from-blue-500 to-indigo-600', desc: 'Crea tu mazo con Gemini' },
            { id: 'LISTENING', name: 'Listening Builder', icon: Headphones, color: 'bg-gradient-to-br from-rose-500 to-pink-600', desc: 'YouGlish & YouTube IA' }
        ];

        const FOLDER_PALETTE = [
            'bg-slate-200 text-slate-800 dark:bg-slate-800 dark:text-slate-200', 
            'bg-rose-200 text-rose-900 dark:bg-rose-900/60 dark:text-rose-200', 
            'bg-amber-200 text-amber-900 dark:bg-amber-900/60 dark:text-amber-200', 
            'bg-emerald-200 text-emerald-900 dark:bg-emerald-900/60 dark:text-emerald-200', 
            'bg-sky-200 text-sky-900 dark:bg-sky-900/60 dark:text-sky-200', 
            'bg-indigo-200 text-indigo-900 dark:bg-indigo-900/60 dark:text-indigo-200', 
            'bg-fuchsia-200 text-fuchsia-900 dark:bg-fuchsia-900/60 dark:text-fuchsia-200'
        ];

        function Dashboard() {
            const user = { uid: "teacher_builder_001" };
            const [path, setPath] = useState([]);
            const [userFolders, setUserFolders] = useState([]);
            const [userQuizzes, setUserQuizzes] = useState([]);
            const [trashItems, setTrashItems] = useState({ folders: [], quizzes: [] }); 
            const [modals, setModals] = useState({ folder: false, activity: false, trash: false });
            const [editingFolder, setEditingFolder] = useState(null);
            const [folderForm, setFolderForm] = useState({ name: '', colorClass: FOLDER_PALETTE[0] });
            const [isDarkMode, setIsDarkMode] = useState(true);

            const [selectedItems, setSelectedItems] = useState([]);
            const [isSelecting, setIsSelecting] = useState(false);
            const [moveModalOpen, setMoveModalOpen] = useState(false);
            const [moveTarget, setMoveTarget] = useState([]); 
            const [moveModalFolders, setMoveModalFolders] = useState([]); 
            const [undoAction, setUndoAction] = useState(null);
            const undoTimeoutRef = useRef(null);
            const [isRescuing, setIsRescuing] = useState(false);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
                else setIsDarkMode(true);
                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                if (folderParam && folderParam !== 'undefined' && folderParam !== 'null') setPath(decodeURIComponent(folderParam).split('/'));
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const currentPath = path.join('/');
                const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentPath));
                const unsubF = onSnapshot(qF, (s) => setUserFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.isDeleted !== true)));
                const qQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('parentPath', '==', currentPath));
                const unsubQ = onSnapshot(qQ, (s) => setUserQuizzes(s.docs.map(d => ({id: d.id, ...d.data()})).filter(q => q.isDeleted !== true)));
                const qTrashF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('isDeleted', '==', true));
                const unsubTrashF = onSnapshot(qTrashF, (s) => setTrashItems(prev => ({...prev, folders: s.docs.map(d => ({id: d.id, ...d.data()}))})));
                const qTrashQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('isDeleted', '==', true));
                const unsubTrashQ = onSnapshot(qTrashQ, (s) => setTrashItems(prev => ({...prev, quizzes: s.docs.map(d => ({id: d.id, ...d.data()}))})));
                return () => { unsubF(); unsubQ(); unsubTrashF(); unsubTrashQ(); };
            }, [path]);

            useEffect(() => {
                if (!moveModalOpen) return;
                const unsubF = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', moveTarget.join('/'))), (s) => setMoveModalFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.isDeleted !== true)));
                return () => unsubF();
            }, [moveTarget, moveModalOpen]);

            const navigateTo = (newPath) => {
                setPath(newPath);
                setSelectedItems([]); 
                const url = new URL(window.location);
                if (newPath.length > 0) url.searchParams.set('folder', newPath.join('/')); else url.searchParams.delete('folder');
                window.history.pushState({}, '', url);
            };

            const handleActivityClick = (e, gameType) => {
                e.preventDefault();
                const encodedFolder = encodeURIComponent(path.join('/'));
                const routes = {
                    'CONNECT4': 'dashboard-connect4.html',
                    'READING': 'dashboard-reading.html',
                    'MATCH': 'dashboard-match.html',
                    'LINGOMATCH': 'dashboard-lm.html',
                    'UNO': 'dashboard-uno.html',
                    'LISTENING': 'dashboard-listening.html'
                };
                window.location.href = `${routes[gameType.id] || 'dashboard.html'}?folder=${encodedFolder}${gameType.id === 'FLASHCARDS' ? '&type='+gameType.id : ''}`;
            };

            const handleEditActivity = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                const encodedFolder = encodeURIComponent(path.join('/'));
                const routes = {
                    'CONNECT4': 'dashboard-connect4.html',
                    'READING': 'dashboard-reading.html',
                    'MATCH': 'dashboard-match.html',
                    'LINGOMATCH': 'dashboard-lm.html',
                    'UNO': 'dashboard-uno.html',
                    'LISTENING': 'dashboard-listening.html'
                };
                window.location.href = `${routes[q.type]}?edit=${q.id}&folder=${encodedFolder}`;
            };

            const getPlayLink = (q) => {
                const routes = {
                    'CONNECT4': 'connect4.html',
                    'READING': 'reading.html',
                    'MATCH': 'match.html',
                    'LINGOMATCH': 'lingomatch.html',
                    'UNO': 'uno.html',
                    'LISTENING': 'listening.html'
                };
                return `${routes[q.type] || 'activity.html'}?id=${q.id}`;
            };

            const SelectOverlay = ({ item, type }) => {
                const isSelected = selectedItems.some(i => i.id === item.id);
                return (
                    <div onClick={(e) => { e.stopPropagation(); const exists = selectedItems.find(i => i.id === item.id); setSelectedItems(exists ? selectedItems.filter(i => i.id !== item.id) : [...selectedItems, {id: item.id, type}]); }} className={`absolute top-2 left-2 w-6 h-6 rounded bg-white dark:bg-zinc-800 border-2 z-20 flex items-center justify-center transition-all ${isSelected ? 'border-indigo-500 bg-indigo-500 text-white' : 'border-slate-300 dark:border-zinc-600 text-transparent opacity-0 group-hover:opacity-100 hover:border-indigo-400'} ${(isSelecting || selectedItems.length > 0) && !isSelected ? 'opacity-100' : ''}`}>
                        <Check size={14} strokeWidth={4}/>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300 pb-24 no-select">
                    <div className="max-w-7xl mx-auto p-4 md:p-6 fade-in relative">
                        <div className="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-zinc-800 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center relative z-20">
                            <div className="flex items-center justify-between w-full md:w-auto gap-3">
                                {path.length > 0 && <button onClick={() => navigateTo(path.slice(0, -1))} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl text-slate-400"><ArrowLeft size={20}/></button>}
                                <h1 className="text-xl font-black italic tracking-tight text-indigo-600 dark:text-indigo-400">PERIPLO <span className="text-[10px] not-italic bg-indigo-100 dark:bg-indigo-900/50 px-2 rounded-full border border-indigo-200">v20.2</span></h1>
                            </div>
                            <div className="flex flex-wrap items-center justify-center md:justify-end gap-2 w-full md:w-auto">
                                <a href="students.html" className="bg-white dark:bg-zinc-800 border-2 border-indigo-100 dark:border-zinc-700 text-indigo-600 dark:text-indigo-400 px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center hover:bg-indigo-50 transition-all"><Users size={16}/> Alumnos</a>
                                <a href="dashboard-schedule.html" className="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center shadow-md transition-all"><Calendar size={16}/> Agenda</a>
                                <button onClick={() => setIsSelecting(!isSelecting)} className={`p-2 rounded-xl border transition-all ${isSelecting || selectedItems.length > 0 ? 'bg-indigo-100 text-indigo-700 border-indigo-300' : 'bg-slate-50 dark:bg-zinc-800 border-slate-200 text-slate-600'}`}><CheckSquare size={18}/></button>
                                <button onClick={() => setModals({...modals, activity: true})} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold flex gap-2 hover:bg-indigo-700 transition-all shadow-lg"><Plus size={16}/> Actividad</button>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400">{isDarkMode ? <Sun size={18}/> : <Moon size={18}/>}</button>
                            </div>
                        </div>

                        <div className="flex gap-2 mb-6 text-xs font-black text-slate-400 uppercase tracking-widest overflow-x-auto pb-2">
                            <span onClick={() => navigateTo([])} className={`cursor-pointer hover:text-indigo-500 p-1 rounded ${path.length===0?'text-indigo-600 bg-indigo-50 dark:bg-indigo-900/20':''}`}>INICIO</span>
                            {path.map((f, i) => (
                                <React.Fragment key={i}><span className="opacity-30">/</span><span onClick={() => navigateTo(path.slice(0, i+1))} className={`cursor-pointer hover:text-indigo-500 p-1 rounded ${i===path.length-1?'text-indigo-600 bg-indigo-50 dark:bg-indigo-900/20':''}`}>{f}</span></React.Fragment>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-4">
                            {path.length === 0 && (
                                <div onClick={() => setModals({...modals, trash: true})} className="relative aspect-[4/3] bg-rose-50 dark:bg-rose-900/10 text-rose-600 border border-rose-200 dark:border-rose-800 rounded-[1.5rem] flex flex-col items-center justify-center gap-2 hover:scale-105 transition-all cursor-pointer">
                                    <Trash2 size={32}/>
                                    <span className="font-black text-[10px] uppercase">Papelera</span>
                                </div>
                            )}

                            {userFolders.map((f) => (
                                <div key={f.id} onClick={() => navigateTo([...path, f.name])} className="relative aspect-[4/3] bg-slate-200 dark:bg-zinc-800 rounded-[1.5rem] flex flex-col items-center justify-center gap-2 hover:scale-105 transition-all group cursor-pointer border border-transparent hover:border-indigo-400 shadow-sm">
                                    <SelectOverlay item={f} type="folder" />
                                    <Folder size={32} className="text-slate-400"/>
                                    <span className="font-black text-[10px] text-center px-2 uppercase truncate w-full">{f.name}</span>
                                </div>
                            ))}

                            {userQuizzes.map((q) => {
                                const info = GAME_TYPES.find(g => g.id === q.type) || GAME_TYPES[0];
                                return (
                                    <div key={q.id} onClick={() => window.location.href = getPlayLink(q)} className="relative aspect-[4/3] bg-white dark:bg-zinc-900 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-zinc-800 flex flex-col overflow-hidden group hover:scale-105 transition-all cursor-pointer">
                                        <SelectOverlay item={q} type="quiz" />
                                        <div className={`w-full h-1/2 ${info.color} flex items-center justify-center text-white`}><info.icon size={24}/></div>
                                        <div className="p-3 text-center flex-1 flex flex-col justify-center">
                                            <div className="font-bold text-xs leading-tight line-clamp-2">{q.title}</div>
                                            <div className="text-[8px] font-black uppercase text-slate-400 mt-1">{info.name}</div>
                                        </div>
                                        <button onClick={(e) => handleEditActivity(e, q)} className="absolute top-2 right-2 p-1.5 bg-black/20 rounded-md text-white opacity-0 group-hover:opacity-100 transition-all"><Edit2 size={12}/></button>
                                    </div>
                                );
                            })}
                        </div>

                        {modals.activity && (
                            <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
                                    <div className="p-6 border-b dark:border-zinc-800 flex justify-between items-center">
                                        <h3 className="font-black text-2xl uppercase italic">Selecciona el Motor</h3>
                                        <button onClick={() => setModals({...modals, activity: false})} className="p-2 hover:bg-rose-50 rounded-full text-slate-400"><X/></button>
                                    </div>
                                    <div className="p-8 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 overflow-y-auto">
                                        {GAME_TYPES.map(g => (
                                            <button key={g.id} onClick={(e) => handleActivityClick(e, g)} className="bg-slate-50 dark:bg-zinc-800 p-5 rounded-2xl border hover:border-indigo-500 transition-all text-left flex gap-4 items-center group">
                                                <div className={`w-12 h-12 ${g.color} text-white rounded-xl flex items-center justify-center group-hover:scale-110 transition-all shadow-md`}><g.icon/></div>
                                                <div><div className="font-black uppercase text-sm">{g.name}</div><div className="text-[10px] text-slate-500 uppercase font-bold">{g.desc}</div></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

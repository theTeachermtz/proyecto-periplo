<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, Component, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, deleteDoc, updateDoc, getDocs } from 'firebase/firestore';
        
        import { Plus, Folder, X, LayoutGrid, Puzzle, Grid, ArrowLeft, Trash2, Copy, Edit2, AlertTriangle, Map as MapIcon, Gamepad2, BookOpen, Calendar, Users, Sun, Moon, Zap, Dices, RotateCcw, LifeBuoy, CheckSquare, Check, FolderInput, ChevronRight, CheckCircle2, Headphones, ListFilter, Target, Play, Layers, Smartphone, Link, Search, Presentation, ArrowDownCircle, HelpCircle, Wand2, Mic, Shuffle, MessageSquare } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 text-center bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100">
                        <AlertTriangle size={48} className="text-rose-500 mb-4"/>
                        <h2 className="text-xl font-bold mb-2">Algo salió mal visualmente</h2>
                        <p className="text-slate-500 mb-6">Tus datos están a salvo.</p>
                        <button onClick={() => window.location.reload()} className="bg-slate-900 dark:bg-white text-white dark:text-zinc-900 px-6 py-3 rounded-xl font-bold">Recargar</button>
                    </div>
                );
                return this.props.children;
            }
        }

        const GAME_TYPES = [
            { id: 'PRESENTATION', name: 'Presentation Builder', icon: Presentation, color: 'bg-gradient-to-br from-fuchsia-500 to-purple-600', desc: 'Diapositivas y teoría' },
            { id: 'FLASHCARDS', name: 'Flashcards', icon: LayoutGrid, color: 'bg-gradient-to-br from-indigo-500 to-purple-600', desc: 'Repaso con imágenes' }, 
            { id: 'ANAGRAM', name: 'Anagrama', icon: Puzzle, color: 'bg-gradient-to-br from-pink-500 to-rose-500', desc: 'Ordena las letras' },
            { id: 'CROSSWORD', name: 'Crucigrama', icon: Grid, color: 'bg-gradient-to-br from-amber-400 to-amber-600', desc: 'Cruza tus palabras' },
            { id: 'MEMORAMA', name: 'Memorama', icon: Layers, color: 'bg-gradient-to-br from-emerald-400 to-teal-600', desc: 'Empareja las cartas' },
            { id: 'EMOJISPELL', name: 'Emoji Spell', icon: Wand2, color: 'bg-gradient-to-br from-purple-400 to-pink-500', desc: 'Say it with Emoji' },
            { id: 'BOARDGAME_BANK', name: 'Boardgames', icon: Gamepad2, color: 'bg-gradient-to-br from-orange-400 to-amber-500', desc: 'Periplo Party, Connect 4' },
            { id: 'READING', name: 'Reading Builder', icon: BookOpen, color: 'bg-gradient-to-br from-cyan-500 to-blue-600', desc: 'Lecturas con IA' },
            { id: 'MATCH', name: 'Match Madness', icon: Zap, color: 'bg-gradient-to-br from-yellow-400 to-red-500', desc: 'Velocidad y Reflejos' },
            { id: 'LINGOMATCH', name: 'LingoMatch', icon: ListFilter, color: 'bg-gradient-to-br from-violet-500 to-indigo-600', desc: 'Emparejamiento Triple' },
            { id: 'WordCascade', name: 'Word Cascade', icon: ArrowDownCircle, color: 'bg-gradient-to-br from-indigo-400 to-cyan-400', desc: 'Palabras y emojis cayendo' },
            { id: 'NEVEREVER', name: 'Never Have I Ever', icon: HelpCircle, color: 'bg-gradient-to-br from-fuchsia-500 to-pink-600', desc: 'Conversación y Present Perfect' },
            { id: 'TALKTIME', name: 'Talk Time', icon: MessageSquare, color: 'bg-gradient-to-br from-sky-400 to-blue-500', desc: 'Fluidez y dilemas morales' },
            { id: 'UNO', name: 'UNO Builder (IA)', icon: Dices, color: 'bg-gradient-to-br from-blue-500 to-indigo-600', desc: 'Crea tu mazo con Gemini' },
            { id: 'LISTENING', name: 'Listening Builder', icon: Headphones, color: 'bg-gradient-to-br from-rose-500 to-pink-600', desc: 'YouGlish & YouTube IA' },
            { id: 'PHONECHAT', name: 'Phone Chat', icon: Smartphone, color: 'bg-gradient-to-br from-cyan-400 to-blue-500', desc: 'Conversaciones Fill-in-blanks' },
            { id: 'AUDIOTRANSLATOR', name: 'Audio Translator', icon: Shuffle, color: 'bg-gradient-to-br from-emerald-400 to-teal-500', desc: 'Traduce audios reenviados' },
            { id: 'VOICEREPLY', name: 'Voice Reply', icon: Mic, color: 'bg-gradient-to-br from-indigo-400 to-purple-500', desc: 'Práctica de pronunciación' }
        ];

        const TOOL_TYPES = [
            { id: 'CITYMAP', name: 'City Map', icon: MapIcon, color: 'bg-slate-800', file: 'citymap.html', desc: 'Práctica de direcciones' },
            { id: 'LINGODEMO', name: 'LingoMatch Demo', icon: Play, color: 'bg-rose-600', file: 'lingomatch.html', desc: 'Probar demo de Anita' }
        ];

        const FOLDER_PALETTE = [
            'bg-slate-200 text-slate-800 dark:bg-slate-800 dark:text-slate-200', 
            'bg-rose-200 text-rose-900 dark:bg-rose-900/60 dark:text-rose-200', 
            'bg-amber-200 text-amber-900 dark:bg-amber-900/60 dark:text-amber-200', 
            'bg-emerald-200 text-emerald-900 dark:bg-emerald-900/60 dark:text-emerald-200', 
            'bg-sky-200 text-sky-900 dark:bg-sky-900/60 dark:text-sky-200', 
            'bg-indigo-200 text-indigo-900 dark:bg-indigo-900/60 dark:text-indigo-200', 
            'bg-fuchsia-200 text-fuchsia-900 dark:bg-fuchsia-900/60 dark:text-fuchsia-200'
        ];

        function Dashboard() {
            const user = { uid: "teacher_builder_001" };
            const [path, setPath] = useState([]);
            const [userFolders, setUserFolders] = useState([]);
            const [userQuizzes, setUserQuizzes] = useState([]);
            const [trashItems, setTrashItems] = useState({ folders: [], quizzes: [] }); 
            const [modals, setModals] = useState({ folder: false, activity: false, trash: false });
            
            // ESTADO DEL NUEVO MODAL DE BOARDGAMES
            const [boardgameModal, setBoardgameModal] = useState({ isOpen: false, quiz: null, action: 'play' });

            const [editingFolder, setEditingFolder] = useState(null);
            const [folderForm, setFolderForm] = useState({ name: '', colorClass: FOLDER_PALETTE[0] });
            const [isDarkMode, setIsDarkMode] = useState(true);

            const [selectedItems, setSelectedItems] = useState([]);
            const [isSelecting, setIsSelecting] = useState(false);
            const [moveModalOpen, setMoveModalOpen] = useState(false);
            const [moveTarget, setMoveTarget] = useState([]); 
            const [moveModalFolders, setMoveModalFolders] = useState([]); 

            const [undoAction, setUndoAction] = useState(null);
            const undoTimeoutRef = useRef(null);
            const [isRescuing, setIsRescuing] = useState(false);

            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
                else setIsDarkMode(true);

                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                if (folderParam && folderParam !== 'undefined' && folderParam !== 'null') setPath(decodeURIComponent(folderParam).split('/'));
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const currentPath = path.join('/');
                
                const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentPath));
                const unsubF = onSnapshot(qF, (s) => {
                    setUserFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.isDeleted !== true));
                });
                
                const qQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('parentPath', '==', currentPath));
                const unsubQ = onSnapshot(qQ, (s) => {
                    setUserQuizzes(s.docs.map(d => ({id: d.id, ...d.data()})).filter(q => q.isDeleted !== true));
                });

                const qTrashF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('isDeleted', '==', true));
                const unsubTrashF = onSnapshot(qTrashF, (s) => setTrashItems(prev => ({...prev, folders: s.docs.map(d => ({id: d.id, ...d.data()}))})));

                const qTrashQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('isDeleted', '==', true));
                const unsubTrashQ = onSnapshot(qTrashQ, (s) => setTrashItems(prev => ({...prev, quizzes: s.docs.map(d => ({id: d.id, ...d.data()}))})));

                return () => { unsubF(); unsubQ(); unsubTrashF(); unsubTrashQ(); };
            }, [path]);

            useEffect(() => {
                if (!moveModalOpen) return;
                const currentMovePath = moveTarget.join('/');
                const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentMovePath));
                const unsubF = onSnapshot(qF, (s) => {
                    setMoveModalFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.isDeleted !== true));
                });
                return () => unsubF();
            }, [moveTarget, moveModalOpen]);

            useEffect(() => {
                let scrollInterval = null;
                const handleDragOverEdge = (e) => {
                    const threshold = 150; 
                    const speed = 25; 
                    const clientY = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);
                    if (!clientY) return;

                    if (clientY < threshold) {
                        if (!scrollInterval) scrollInterval = setInterval(() => window.scrollBy(0, -speed), 20);
                    } else if (window.innerHeight - clientY < threshold) {
                        if (!scrollInterval) scrollInterval = setInterval(() => window.scrollBy(0, speed), 20);
                    } else {
                        if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
                    }
                };

                const handleDragEndEdge = () => { if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; } };

                window.addEventListener('dragover', handleDragOverEdge);
                window.addEventListener('touchmove', handleDragOverEdge, { passive: true });
                window.addEventListener('dragend', handleDragEndEdge);
                window.addEventListener('drop', handleDragEndEdge);
                window.addEventListener('touchend', handleDragEndEdge);
                
                return () => {
                    window.removeEventListener('dragover', handleDragOverEdge);
                    window.removeEventListener('touchmove', handleDragOverEdge);
                    window.removeEventListener('dragend', handleDragEndEdge);
                    window.removeEventListener('drop', handleDragEndEdge);
                    window.removeEventListener('touchend', handleDragEndEdge);
                    if (scrollInterval) clearInterval(scrollInterval);
                };
            }, []);

            const toggleTheme = () => { 
                setIsDarkMode(!isDarkMode); 
                localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); 
            };

            const toggleSelect = (e, item, type) => {
                e.stopPropagation(); e.preventDefault();
                const exists = selectedItems.find(i => i.id === item.id);
                if (exists) setSelectedItems(selectedItems.filter(i => i.id !== item.id));
                else setSelectedItems([...selectedItems, {id: item.id, type, name: item.name || item.title}]);
            };

            const handleDragStart = (e, id, type) => { 
                let payload = [{id, type}];
                if (selectedItems.find(i => i.id === id)) {
                    payload = selectedItems;
                }
                e.dataTransfer.setData('payload', JSON.stringify(payload)); 
            };

            const handleDropOnTarget = async (e, newParentPath, targetId = null) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over-breadcrumb');
                const payloadStr = e.dataTransfer.getData('payload');
                if (!payloadStr) return;
                
                const payload = JSON.parse(payloadStr);
                const oldParentPath = path.join('/');

                if (newParentPath === oldParentPath) return;
                if (payload.some(item => item.type === 'folder' && item.id === targetId)) return;
                
                try { 
                    const updatePromises = payload.map(item => {
                        const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                        return updateDoc(ref, { parentPath: newParentPath });
                    });
                    await Promise.all(updatePromises);
                    
                    triggerUndo(`${payload.length} elemento(s) movido(s)`, async () => { 
                        const undoPromises = payload.map(item => {
                            const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                            return updateDoc(ref, { parentPath: oldParentPath });
                        });
                        await Promise.all(undoPromises);
                    });
                    setSelectedItems([]);
                    setIsSelecting(false);
                } 
                catch (err) { alert(err.message); }
            };

            const handleDeleteSelected = async () => {
                if(!confirm(`¿Enviar ${selectedItems.length} elemento(s) a la papelera?`)) return;
                try {
                    const updatePromises = selectedItems.map(item => {
                        const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                        return updateDoc(ref, { isDeleted: true });
                    });
                    await Promise.all(updatePromises);
                    
                    triggerUndo(`${selectedItems.length} elemento(s) a papelera`, async () => {
                        const undoPromises = selectedItems.map(item => {
                            const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                            return updateDoc(ref, { isDeleted: false });
                        });
                        await Promise.all(undoPromises);
                    });
                    setSelectedItems([]);
                    setIsSelecting(false);
                } catch(err) { alert(err.message); }
            };

            const openMoveModal = () => {
                setMoveTarget([...path]); 
                setMoveModalOpen(true);
            };

            const executeMoveModal = async () => {
                const newParentPath = moveTarget.join('/');
                const oldParentPath = path.join('/');
                
                if (newParentPath === oldParentPath) {
                    setMoveModalOpen(false); return;
                }

                try {
                    const updatePromises = selectedItems.map(item => {
                        const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                        return updateDoc(ref, { parentPath: newParentPath });
                    });
                    await Promise.all(updatePromises);
                    
                    triggerUndo(`${selectedItems.length} elemento(s) movido(s)`, async () => {
                        const undoPromises = selectedItems.map(item => {
                            const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                            return updateDoc(ref, { parentPath: oldParentPath });
                        });
                        await Promise.all(undoPromises);
                    });
                    
                    setSelectedItems([]);
                    setIsSelecting(false);
                    setMoveModalOpen(false);
                } catch(err) { alert(err.message); }
            };

            const triggerUndo = (message, actionFn) => {
                setUndoAction({ message, actionFn });
                if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
                undoTimeoutRef.current = setTimeout(() => { setUndoAction(null); }, 5000); 
            };

            const executeUndo = () => {
                if (undoAction && undoAction.actionFn) {
                    undoAction.actionFn(); setUndoAction(null);
                    if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
                }
            };

            const navigateTo = (newPath) => {
                setPath(newPath);
                setSelectedItems([]); 
                setSearchQuery(""); 
                const url = new URL(window.location);
                if (newPath.length > 0) url.searchParams.set('folder', newPath.join('/')); else url.searchParams.delete('folder');
                window.history.pushState({}, '', url);
            };

            // ---- FIXED: Added missing handleFolderClick function ----
            const handleFolderClick = (e, f) => {
                if (e.target.closest('button') || e.target.closest('.select-box')) return;
                if (isSelecting || selectedItems.length > 0) { toggleSelect(e, f, 'folder'); return; }
                navigateTo([...path, f.name]);
            };

            const openFolderModal = (folder = null) => {
                if (folder) {
                    setEditingFolder(folder);
                    setFolderForm({ name: folder.name, colorClass: folder.colorClass || FOLDER_PALETTE[0] });
                } else {
                    setEditingFolder(null);
                    setFolderForm({ name: '', colorClass: FOLDER_PALETTE[0] });
                }
                setModals({...modals, folder: true});
            };

            const saveFolder = async () => {
                if (!folderForm.name.trim()) return;
                try {
                    if (editingFolder) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'folders', editingFolder.id), { name: folderForm.name.trim(), colorClass: folderForm.colorClass });
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), { name: folderForm.name.trim(), colorClass: folderForm.colorClass, parentPath: path.join('/'), createdAt: serverTimestamp(), isDeleted: false });
                    }
                    setModals({...modals, folder: false});
                } catch(e) { alert(e.message); }
            };

            const deleteFolder = async (e, folder) => {
                e.preventDefault(); e.stopPropagation();
                const folderRef = doc(db, 'artifacts', appId, 'users', user.uid, 'folders', folder.id);
                await updateDoc(folderRef, { isDeleted: true });
                
                triggerUndo(`Carpeta "${folder.name}" enviada a papelera`, async () => {
                    await updateDoc(folderRef, { isDeleted: false });
                });
            };

            const handleDeleteActivity = async (e, quiz) => {
                e.preventDefault(); e.stopPropagation();
                const quizRef = doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', quiz.id);
                await updateDoc(quizRef, { isDeleted: true });

                triggerUndo(`Actividad "${quiz.title}" enviada a papelera`, async () => {
                    await updateDoc(quizRef, { isDeleted: false });
                });
            };

            const restoreItem = async (id, type) => {
                const colName = type === 'folder' ? 'folders' : 'quizzes';
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, colName, id), { isDeleted: false });
            };

            const permanentDelete = async (id, type) => {
                if(confirm("¿Eliminar PERMANENTEMENTE? Esto no se puede deshacer.")) {
                    const colName = type === 'folder' ? 'folders' : 'quizzes';
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, colName, id));
                }
            };

            const rescueAllFiles = async () => {
                if(!confirm("Esto enviará TODAS tus carpetas y actividades a la pantalla de INICIO (se saldrán de las subcarpetas donde estén escondidas). ¿Estás seguro?")) return;
                setIsRescuing(true);
                try {
                    const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'));
                    const snapF = await getDocs(qF);
                    const updatePromises = [];
                    
                    snapF.forEach(d => {
                        if (d.data().isDeleted !== true && d.data().parentPath !== "") {
                            updatePromises.push(updateDoc(d.ref, { parentPath: "" }));
                        }
                    });

                    const qQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'));
                    const snapQ = await getDocs(qQ);
                    snapQ.forEach(d => {
                        if (d.data().isDeleted !== true && d.data().parentPath !== "") {
                            updatePromises.push(updateDoc(d.ref, { parentPath: "" }));
                        }
                    });

                    await Promise.all(updatePromises);
                    setModals({...modals, trash: false});
                    navigateTo([]);
                    alert("¡Rescate completo! Todos tus archivos han vuelto a la página de INICIO.");
                } catch (e) {
                    alert("Error en el rescate: " + e.message);
                } finally {
                    setIsRescuing(false);
                }
            };

            const handleActivityClick = (e, gameType) => {
                e.preventDefault();
                const encodedFolder = encodeURIComponent(path.join('/'));
                
                if (gameType.id === 'PHONECHAT') window.location.href = `dashboard-pc.html?folder=${encodedFolder}&mode=typing`;
                else if (gameType.id === 'AUDIOTRANSLATOR') window.location.href = `dashboard-pc.html?folder=${encodedFolder}&mode=unscramble`;
                else if (gameType.id === 'VOICEREPLY') window.location.href = `dashboard-pc.html?folder=${encodedFolder}&mode=voice`;
                else if (gameType.id === 'BOARDGAME_BANK' || gameType.id === 'CONNECT4') window.location.href = `dashboard-bg.html?folder=${encodedFolder}`;
                else if (gameType.id === 'READING') window.location.href = `dashboard-reading.html?folder=${encodedFolder}`;
                else if (gameType.id === 'MATCH') window.location.href = `dashboard-match.html?folder=${encodedFolder}`;
                else if (gameType.id === 'LINGOMATCH') window.location.href = `dashboard-lm.html?folder=${encodedFolder}`;
                else if (gameType.id === 'WordCascade') window.location.href = `dashboard-wc.html?folder=${encodedFolder}`;
                else if (gameType.id === 'NEVEREVER') window.location.href = `dashboard-ne.html?folder=${encodedFolder}`;
                else if (gameType.id === 'TALKTIME') window.location.href = `dashboard-tt.html?folder=${encodedFolder}`;
                else if (gameType.id === 'UNO') window.location.href = `dashboard-uno.html?folder=${encodedFolder}`;
                else if (gameType.id === 'LISTENING') window.location.href = `dashboard-listening.html?folder=${encodedFolder}`;
                else if (gameType.id === 'PRESENTATION') window.location.href = `dashboard-presentations.html?folder=${encodedFolder}`;
                else window.location.href = `dashboard-fc.html?folderId=${encodedFolder}&type=${gameType.id}`;
            };

            const getPlayLink = (q, asStudent = false) => {
                const param = asStudent ? '&student=true' : '';
                
                if (['PHONECHAT', 'AUDIOTRANSLATOR', 'VOICEREPLY'].includes(q.type)) {
                    const mode = q.content?.gameMode || 'typing';
                    if (mode === 'unscramble') return `audiotranslator.html?id=${q.id}${param}`;
                    if (mode === 'voice') return `voicereply.html?id=${q.id}${param}`;
                    return `phonechat.html?id=${q.id}${param}`;
                }

                if (q.type === 'READING') return `reading.html?id=${q.id}${param}`;
                if (q.type === 'MATCH') return `match.html?id=${q.id}${param}`;
                if (q.type === 'LINGOMATCH') return `lingomatch.html?id=${q.id}${param}`;
                if (q.type === 'WordCascade') return `wordcascade.html?id=${q.id}${param}`;
                if (q.type === 'NEVEREVER') return `neverever.html?id=${q.id}${param}`;
                if (q.type === 'TALKTIME') return `talktime.html?id=${q.id}${param}`;
                if (q.type === 'UNO') return `uno.html?id=${q.id}${param}`;
                if (q.type === 'LISTENING') return `listening.html?id=${q.id}${param}`;
                if (q.type === 'FLASHCARDS') return `flashcards.html?id=${q.id}${param}`; 
                if (q.type === 'CROSSWORD') return `crossword.html?id=${q.id}${param}`;   
                if (q.type === 'ANAGRAM') return `anagram.html?id=${q.id}${param}`;        
                if (q.type === 'MEMORAMA') return `memorama.html?id=${q.id}${param}`;
                if (q.type === 'EMOJISPELL') return `emojispell.html?id=${q.id}${param}`;
                if (q.type === 'PRESENTATION') return `presentations.html?id=${q.id}${param}`;
                return `activity.html?id=${q.id}${param}`;
            };

            const handleQuizClick = (e, q) => {
                if (e.target.closest('button') || e.target.closest('.select-box')) return; 
                if (isSelecting || selectedItems.length > 0) { toggleSelect(e, q, 'quiz'); return; }
                
                // INTERCEPTOR PARA BOARDGAMES
                if (q.type === 'BOARDGAME_BANK' || q.type === 'CONNECT4') {
                    setBoardgameModal({ isOpen: true, quiz: q, action: 'play' });
                    return;
                }

                const link = getPlayLink(q);
                if (e.ctrlKey || e.metaKey) window.open(link, '_blank');
                else window.location.href = link;
            };

            const handleEditActivity = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                const encodedFolder = encodeURIComponent(path.join('/'));
                
                if (['PHONECHAT', 'AUDIOTRANSLATOR', 'VOICEREPLY'].includes(q.type)) window.location.href = `dashboard-pc.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'CONNECT4' || q.type === 'BOARDGAME_BANK') window.location.href = `dashboard-bg.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'READING') window.location.href = `dashboard-reading.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'MATCH') window.location.href = `dashboard-match.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'LINGOMATCH') window.location.href = `dashboard-lm.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'WordCascade') window.location.href = `dashboard-wc.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'NEVEREVER') window.location.href = `dashboard-ne.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'TALKTIME') window.location.href = `dashboard-tt.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'UNO') window.location.href = `dashboard-uno.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'LISTENING') window.location.href = `dashboard-listening.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'PRESENTATION') window.location.href = `dashboard-presentations.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (['FLASHCARDS', 'CROSSWORD', 'ANAGRAM', 'MEMORAMA', 'EMOJISPELL'].includes(q.type)) window.location.href = `dashboard-fc.html?edit=${q.id}&folder=${encodedFolder}`; 
                else alert("Editor no disponible en esta versión para este juego.");
            };

            const handleTransformActivity = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                window.location.href = `activity.html?id=${q.id}`;
            };

            const handleCopyLink = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                
                // INTERCEPTOR PARA BOARDGAMES AL COPIAR
                if (q.type === 'BOARDGAME_BANK' || q.type === 'CONNECT4') {
                    setBoardgameModal({ isOpen: true, quiz: q, action: 'copy' });
                    return;
                }

                const fullLink = window.location.origin + window.location.pathname.replace('index.html', '') + getPlayLink(q, true);
                
                navigator.clipboard.writeText(fullLink).then(() => {
                    triggerUndo(`✅ Link copiado al portapapeles. ¡Pégalo a tus alumnos!`, null);
                }).catch(err => {
                    alert("No se pudo copiar el link automáticamente. Cópialo manualmente: " + fullLink);
                });
            };

            const SelectOverlay = ({ item, type }) => {
                const isSelected = selectedItems.some(i => i.id === item.id);
                const show = isSelecting || selectedItems.length > 0 || isSelected;
                return (
                    <div 
                        onClick={(e) => toggleSelect(e, item, type)} 
                        className={`absolute top-2 left-2 w-5 h-5 sm:w-6 h-6 rounded bg-white dark:bg-zinc-800 border-2 z-20 flex items-center justify-center transition-all select-box ${isSelected ? 'border-indigo-500 bg-indigo-500 text-white opacity-100 scale-110' : 'border-slate-300 dark:border-zinc-600 text-transparent opacity-0 group-hover:opacity-100 hover:border-indigo-400'} ${show && !isSelected ? 'opacity-100' : ''}`}
                    >
                        <Check size={14} strokeWidth={4}/>
                    </div>
                );
            };

            const filteredFolders = userFolders.filter(f => {
                if (!searchQuery) return true;
                return f.name.toLowerCase().includes(searchQuery.toLowerCase());
            });

            const filteredQuizzes = userQuizzes.filter(q => {
                if (!searchQuery) return true;
                const sq = searchQuery.toLowerCase();
                const searchableText = `${q.title} ${q.type} ${q.tags?.level || ''} ${q.tags?.category || ''} ${q.tags?.topic || ''}`.toLowerCase();
                return searchableText.includes(sq);
            });

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300 pb-24">
                    <div className="max-w-7xl mx-auto p-4 md:p-6 fade-in relative">
                        
                        {undoAction && (
                            <div className="fixed bottom-24 right-6 bg-slate-900 dark:bg-zinc-800 text-white p-4 rounded-xl shadow-2xl z-50 flex items-center gap-4 animate-in slide-in-from-bottom-10 fade-in duration-300 border border-slate-700 dark:border-zinc-700">
                                <span className="font-bold text-sm">{undoAction.message}</span>
                                {undoAction.actionFn && (
                                    <button onClick={executeUndo} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg font-black text-xs uppercase tracking-widest flex items-center gap-2 transition-colors">
                                        <RotateCcw size={14}/> Deshacer
                                    </button>
                                )}
                            </div>
                        )}

                        {(selectedItems.length > 0 || isSelecting) && (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-zinc-800 text-white px-4 md:px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 md:gap-4 z-50 animate-in slide-in-from-bottom-10 fade-in duration-300 border border-slate-700 dark:border-zinc-700 w-11/12 md:w-auto overflow-x-auto">
                                <span className="font-black text-sm md:text-base whitespace-nowrap bg-slate-800 dark:bg-zinc-900 px-3 py-1 rounded-full">{selectedItems.length} seleccionados</span>
                                <div className="w-px h-6 bg-slate-700 mx-1 shrink-0"></div>
                                <button onClick={openMoveModal} disabled={selectedItems.length===0} className="hover:text-indigo-400 disabled:opacity-50 flex items-center gap-1.5 text-sm font-bold transition-colors whitespace-nowrap"><FolderInput size={18}/> <span className="hidden sm:inline">Mover a...</span></button>
                                <button onClick={handleDeleteSelected} disabled={selectedItems.length===0} className="hover:text-rose-400 disabled:opacity-50 flex items-center gap-1.5 text-sm font-bold transition-colors whitespace-nowrap"><Trash2 size={18}/> <span className="hidden sm:inline">Borrar</span></button>
                                <div className="w-px h-6 bg-slate-700 mx-1 shrink-0"></div>
                                <button onClick={() => {setSelectedItems([]); setIsSelecting(false);}} className="hover:bg-slate-700 p-1.5 rounded-full transition-colors shrink-0"><X size={20}/></button>
                            </div>
                        )}

                        <div className="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-zinc-800 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center relative z-20 transition-colors w-full">
                            <div className="flex items-center justify-between w-full md:w-auto">
                                <div className="flex items-center gap-3">
                                    {path.length > 0 && <button onClick={() => navigateTo(path.slice(0, -1))} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl text-slate-400 dark:text-zinc-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all"><ArrowLeft size={20}/></button>}
                                    <h1 className="text-xl font-black flex items-center gap-2 tracking-tight text-indigo-600 dark:text-indigo-400 uppercase italic">PERIPLO <span className="text-[10px] not-italic bg-indigo-100 dark:bg-indigo-900/50 dark:border-indigo-700 px-2 rounded-full border border-indigo-200">v21.1</span></h1>
                                </div>
                                <button onClick={toggleTheme} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors md:hidden">
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>

                            <div className="w-full md:flex-1 md:max-w-xs relative">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                                <input 
                                    type="text" 
                                    placeholder="Buscar juego, nivel, verbos..." 
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                    className="w-full bg-slate-100 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl py-2 pl-9 pr-4 text-sm outline-none focus:border-indigo-500 transition-colors dark:text-white placeholder-slate-400 font-bold"
                                />
                            </div>
                            
                            <div className="flex flex-wrap items-center justify-center md:justify-end gap-2 w-full md:w-auto">
                                <a href="students.html" className="justify-center bg-white dark:bg-zinc-800 border-2 border-indigo-100 dark:border-zinc-700 text-indigo-600 dark:text-indigo-400 px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center hover:bg-indigo-50 dark:hover:bg-zinc-700">
                                    <Users size={16}/> <span className="hidden sm:inline">Alumnos</span>
                                </a>
                                <a href="dashboard-schedule.html" className="justify-center bg-emerald-500 hover:bg-emerald-600 dark:bg-emerald-600 dark:hover:bg-emerald-500 text-white px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center shadow-md">
                                    <Calendar size={16}/> <span className="hidden sm:inline">Agenda</span>
                                </a>
                                
                                <div className="hidden sm:block w-px h-6 bg-slate-200 dark:bg-zinc-800 mx-1"></div>

                                <button onClick={() => setIsSelecting(!isSelecting)} title="Seleccionar varios" className={`justify-center p-2 rounded-xl font-bold flex gap-2 items-center transition-colors border ${isSelecting || selectedItems.length > 0 ? 'bg-indigo-100 text-indigo-700 border-indigo-300 dark:bg-indigo-900/50 dark:text-indigo-300 dark:border-indigo-700 shadow-inner' : 'bg-slate-50 dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-slate-600 dark:text-zinc-300 hover:bg-slate-100 dark:hover:bg-zinc-700'}`}>
                                    <CheckSquare size={18}/>
                                </button>
                                
                                <button onClick={() => openFolderModal()} className="justify-center bg-slate-50 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 px-3 py-2 rounded-xl font-bold flex gap-2 hover:bg-slate-100 dark:hover:bg-zinc-700 border border-slate-200 dark:border-zinc-700 transition-all text-sm items-center">
                                    <Plus size={16}/> <span className="hidden sm:inline">Carpeta</span>
                                </button>
                                <button onClick={() => setModals({...modals, activity: true})} className="justify-center bg-indigo-600 dark:bg-indigo-500 text-white px-3 py-2 rounded-xl font-bold flex gap-2 hover:bg-indigo-700 transition-all text-sm items-center">
                                    <Plus size={16}/> <span className="hidden sm:inline">Actividad</span>
                                </button>
                                
                                <button onClick={toggleTheme} className="hidden md:block p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors">
                                    {isDarkMode ? <Sun size={18}/> : <Moon size={18}/>}
                                </button>
                            </div>
                        </div>

                        <div className="flex gap-2 mb-6 text-xs font-bold text-slate-400 dark:text-zinc-500 overflow-x-auto pb-2 uppercase tracking-widest items-center">
                            <span 
                                onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over-breadcrumb'); }}
                                onDragLeave={e => e.currentTarget.classList.remove('drag-over-breadcrumb')}
                                onDrop={e => handleDropOnTarget(e, "")}
                                onClick={() => navigateTo([])} 
                                className={`cursor-pointer hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors py-1 px-2 rounded-md ${path.length===0?"bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400":""}`}
                            >
                                INICIO
                            </span>
                            {path.map((f, i) => {
                                const targetPath = path.slice(0, i+1).join('/');
                                return (
                                    <React.Fragment key={i}>
                                        <span className="opacity-50">/</span>
                                        <span 
                                            onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over-breadcrumb'); }}
                                            onDragLeave={e => e.currentTarget.classList.remove('drag-over-breadcrumb')}
                                            onDrop={e => handleDropOnTarget(e, targetPath)}
                                            onClick={() => navigateTo(path.slice(0, i+1))} 
                                            className={`cursor-pointer hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors py-1 px-2 rounded-md ${i === path.length-1 ? "bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400" : "text-slate-600 dark:text-zinc-300"}`}
                                        >
                                            {f}
                                        </span>
                                    </React.Fragment>
                                )
                            })}
                        </div>

                        {searchQuery && (filteredFolders.length === 0 && filteredQuizzes.length === 0) && (
                            <div className="text-center py-12 text-slate-400 dark:text-zinc-500">
                                <Search size={48} className="mx-auto mb-4 opacity-20"/>
                                <p className="font-bold text-lg">No se encontraron resultados para "{searchQuery}"</p>
                            </div>
                        )}

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-3 md:gap-4">
                            
                            {path.length === 0 && !searchQuery && (
                                <div 
                                    onClick={() => setModals({...modals, trash: true})}
                                    className="relative h-24 sm:h-auto sm:aspect-[4/3] bg-rose-50 text-rose-600 dark:bg-rose-900/20 dark:text-rose-400 border border-rose-200 dark:border-rose-800/50 rounded-[1.5rem] flex flex-col items-center justify-center gap-2 shadow-sm hover:scale-105 hover:shadow-md transition-all cursor-pointer"
                                >
                                    <div className="relative">
                                        <Trash2 size={32} className="opacity-80 shrink-0"/>
                                        {(trashItems.folders.length > 0 || trashItems.quizzes.length > 0) && (
                                            <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
                                        )}
                                    </div>
                                    <span className="font-black text-xs text-center px-2 uppercase tracking-wide truncate w-full">Papelera</span>
                                </div>
                            )}

                            {filteredFolders.map((f) => (
                                <div 
                                    key={f.id} 
                                    onClick={(e) => handleFolderClick(e, f)}
                                    draggable={!isSelecting && selectedItems.length === 0}
                                    onDragStart={e => handleDragStart(e, f.id, 'folder')}
                                    onDragOver={e => e.preventDefault()}
                                    onDrop={e => handleDropOnTarget(e, path.length > 0 ? `${path.join('/')}/${f.name}` : f.name, f.id)}
                                    className={`relative h-24 sm:h-auto sm:aspect-[4/3] ${f.colorClass || FOLDER_PALETTE[0]} ${selectedItems.find(i=>i.id===f.id)?'ring-4 ring-indigo-500 scale-95':''} border border-transparent rounded-[1.5rem] flex flex-col items-center justify-center gap-2 shadow-sm hover:scale-105 hover:shadow-md transition-all group cursor-pointer`}
                                >
                                    <SelectOverlay item={f} type="folder" />
                                    
                                    {!isSelecting && selectedItems.length === 0 && (
                                        <div className="absolute top-2 right-2 flex flex-col md:flex-row gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                            <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); openFolderModal(f); }} className="p-1.5 bg-white/50 dark:bg-black/30 backdrop-blur rounded-md hover:bg-white dark:hover:bg-black/50 transition-colors"><Edit2 size={12}/></button>
                                            <button onClick={(e) => deleteFolder(e, f)} className="p-1.5 bg-white/50 dark:bg-black/30 backdrop-blur rounded-md hover:bg-rose-500 hover:text-white transition-colors"><Trash2 size={12}/></button>
                                        </div>
                                    )}

                                    <Folder size={32} className="opacity-80 shrink-0"/>
                                    <span className="font-black text-xs text-center px-2 uppercase tracking-wide truncate w-full">{f.name}</span>
                                </div>
                            ))}

                            {filteredQuizzes.map((q) => {
                                let info = GAME_TYPES.find(g => g.id === q.type) || GAME_TYPES[0];
                                if (q.type === 'CONNECT4') {
                                    info = { id: 'CONNECT4', name: 'Connect 4 (Legacy)', icon: Target, color: 'bg-gradient-to-br from-orange-400 to-amber-500', desc: 'Juego Clásico' };
                                }
                                
                                if (q.type === 'PHONECHAT' && q.content?.gameMode) {
                                    if (q.content.gameMode === 'unscramble') info = GAME_TYPES.find(g => g.id === 'AUDIOTRANSLATOR') || info;
                                    else if (q.content.gameMode === 'voice') info = GAME_TYPES.find(g => g.id === 'VOICEREPLY') || info;
                                }

                                return (
                                    <div 
                                        key={q.id} 
                                        onMouseUp={(e) => handleQuizClick(e, q)}
                                        draggable={!isSelecting && selectedItems.length === 0}
                                        onDragStart={e => handleDragStart(e, q.id, 'quiz')}
                                        className={`h-auto sm:aspect-[4/3] bg-white dark:bg-zinc-900 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-zinc-800 flex flex-col overflow-hidden group hover:shadow-md hover:-translate-y-1 transition-all cursor-pointer relative ${selectedItems.find(i=>i.id===q.id)?'ring-4 ring-indigo-500 scale-95':''}`}
                                    >
                                        <SelectOverlay item={q} type="quiz" />

                                        {!isSelecting && selectedItems.length === 0 && (
                                            <div className="absolute top-2 right-2 flex flex-col md:flex-row gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                                
                                                <button onClick={(e) => handleCopyLink(e, q)} title="Copiar Link para Alumnos" className="p-1.5 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded-md text-emerald-500 hover:text-emerald-400 shadow-sm transition-colors"><Link size={12}/></button>
                                                
                                                <button onClick={(e) => handleEditActivity(e, q)} title="Editar" className="p-1.5 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded-md text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 shadow-sm transition-colors"><Edit2 size={12}/></button>
                                                
                                                {['FLASHCARDS', 'CROSSWORD', 'ANAGRAM', 'MEMORAMA', 'EMOJISPELL'].includes(q.type) && (
                                                    <button onClick={(e) => handleTransformActivity(e, q)} title="Transformar a otro formato" className="p-1.5 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded-md text-slate-400 hover:text-amber-500 dark:hover:text-amber-400 shadow-sm transition-colors"><Copy size={12}/></button>
                                                )}

                                                <button onClick={(e) => handleDeleteActivity(e, q)} title="Eliminar" className="p-1.5 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded-md text-slate-400 hover:text-red-600 dark:hover:text-red-400 shadow-sm transition-colors"><Trash2 size={12}/></button>
                                            </div>
                                        )}

                                        <div className={`w-full h-12 sm:h-2/5 ${info.color} flex items-center justify-center text-white shrink-0`}><info.icon size={20} /></div>
                                        <div className="p-3 flex-1 flex flex-col justify-center text-slate-700 dark:text-zinc-200 overflow-hidden w-full text-center">
                                            <div className="font-bold text-xs leading-tight truncate px-1">{q.title}</div>
                                            <div className="text-[9px] text-slate-400 dark:text-zinc-500 font-black uppercase tracking-widest mt-1 truncate">{info.name}</div>
                                            
                                            {q.tags && (
                                                <div className="flex justify-center gap-1 mt-2 overflow-hidden px-1">
                                                    <span className="text-[8px] bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 px-1.5 py-0.5 rounded uppercase font-bold shrink-0">{q.tags.level}</span>
                                                    <span className="text-[8px] bg-slate-200 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 px-1.5 py-0.5 rounded uppercase font-bold truncate">{q.tags.category}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* MODAL MOVER A... */}
                        {moveModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[70] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] w-full max-w-md shadow-2xl border border-transparent dark:border-zinc-800 flex flex-col max-h-[80vh]">
                                    <div className="flex justify-between items-center mb-4 shrink-0">
                                        <h3 className="font-black text-xl text-slate-800 dark:text-white flex items-center gap-2"><FolderInput size={24} className="text-indigo-500"/> Mover a...</h3>
                                        <button onClick={() => setMoveModalOpen(false)} className="p-2 rounded-full bg-slate-50 dark:bg-zinc-800 hover:bg-slate-100 text-slate-500"><X size={20}/></button>
                                    </div>
                                    
                                    <div className="bg-slate-50 dark:bg-zinc-950 p-2 rounded-xl mb-4 flex items-center gap-2 text-xs font-bold text-slate-500 overflow-x-auto shrink-0">
                                        <button onClick={() => setMoveTarget([])} className="hover:text-indigo-500 py-1 px-2 rounded hover:bg-white dark:hover:bg-zinc-800 transition-colors">INICIO</button>
                                        {moveTarget.map((f, i) => (
                                            <React.Fragment key={i}>
                                                <ChevronRight size={14} className="opacity-50 shrink-0"/>
                                                <button onClick={() => setMoveTarget(moveTarget.slice(0, i+1))} className="hover:text-indigo-500 py-1 px-2 rounded hover:bg-white dark:hover:bg-zinc-800 transition-colors whitespace-nowrap">{f}</button>
                                            </React.Fragment>
                                        ))}
                                    </div>

                                    <div className="flex-1 overflow-y-auto custom-scrollbar border border-slate-100 dark:border-zinc-800 rounded-xl mb-4 p-2">
                                        {moveModalFolders.length === 0 && <div className="p-4 text-center text-sm text-slate-400 font-bold italic">No hay carpetas aquí.</div>}
                                        {moveModalFolders.map(f => {
                                            if (selectedItems.some(sel => sel.type === 'folder' && sel.id === f.id)) return null;
                                            return (
                                                <button key={f.id} onClick={() => setMoveTarget([...moveTarget, f.name])} className="w-full flex items-center justify-between p-3 hover:bg-slate-50 dark:hover:bg-zinc-800 rounded-lg transition-colors group border-b border-transparent hover:border-slate-100 dark:hover:border-zinc-700">
                                                    <div className="flex items-center gap-3"><Folder size={20} className="text-indigo-400 group-hover:text-indigo-500"/><span className="font-bold text-sm text-slate-700 dark:text-zinc-200 text-left">{f.name}</span></div>
                                                    <ChevronRight size={16} className="text-slate-300 group-hover:text-indigo-400"/>
                                                </button>
                                            )
                                        })}
                                    </div>

                                    <div className="shrink-0 flex gap-2 pt-2">
                                        <button onClick={() => setMoveModalOpen(false)} className="flex-1 py-3 text-slate-500 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl font-bold transition-colors">Cancelar</button>
                                        <button onClick={executeMoveModal} disabled={moveTarget.join('/') === path.join('/')} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Mover Aquí</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL CREAR CARPETA */}
                        {modals.folder && (
                            <div className="fixed inset-0 bg-slate-900/60 dark:bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-white dark:bg-zinc-900 p-8 rounded-3xl w-full max-w-sm shadow-2xl animate-in zoom-in-95 border border-transparent dark:border-zinc-800">
                                    <h3 className="font-black text-xl mb-4">{editingFolder ? 'Editar Carpeta' : 'Nueva Carpeta'}</h3>
                                    <input id="folderName" name="folderName" autoComplete="off" value={folderForm.name} onChange={e => setFolderForm({...folderForm, name: e.target.value})} placeholder="Nombre..." className="w-full p-4 bg-slate-50 dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 rounded-2xl mb-4 font-bold outline-none focus:border-indigo-500 dark:focus:border-indigo-500 dark:text-white" autoFocus/>
                                    <div className="flex flex-wrap gap-2 mb-6 justify-center p-2">
                                        {FOLDER_PALETTE.map(c => (
                                            <button key={c} onClick={() => setFolderForm({...folderForm, colorClass: c})} className={`w-8 h-8 rounded-full border-2 transition-transform ${c.split(' ')[0]} ${folderForm.colorClass === c ? 'scale-125 border-stone-800 dark:border-white' : 'border-transparent'}`}></button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setModals({...modals, folder: false})} className="flex-1 py-3 text-slate-400 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 rounded-xl font-bold transition-colors">Cancelar</button>
                                        <button onClick={saveFolder} className="flex-1 py-3 bg-indigo-600 dark:bg-indigo-500 text-white rounded-xl font-bold transition-colors">Guardar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL CREAR ACTIVIDAD */}
                        {modals.activity && (
                            <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-transparent dark:border-zinc-800">
                                    <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center bg-white dark:bg-zinc-900 sticky top-0 z-10 shrink-0">
                                        <div><h3 className="font-black text-2xl text-slate-800 dark:text-white tracking-tight">Crea o Selecciona</h3><p className="text-slate-400 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest mt-1">Elige el motor para tu actividad</p></div>
                                        <button onClick={() => setModals({...modals, activity: false})} className="w-10 h-10 rounded-full bg-slate-50 dark:bg-zinc-800 hover:bg-rose-50 dark:hover:bg-rose-900/30 hover:text-rose-500 flex items-center justify-center transition-all text-slate-500 dark:text-zinc-400"><X size={20}/></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 dark:bg-zinc-950/50">
                                        <div className="mb-8">
                                            <h4 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-[0.2em] mb-4">Generadores & Juegos</h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                                {GAME_TYPES.map(g => (
                                                    <button key={g.id} onClick={(e) => handleActivityClick(e, g)} className="bg-white dark:bg-zinc-800 p-5 rounded-[1.5rem] border border-slate-100 dark:border-zinc-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:shadow-xl transition-all text-left flex flex-row sm:flex-col items-center sm:items-start gap-4 group">
                                                        <div className={`w-12 h-12 ${g.color} text-white rounded-2xl flex items-center justify-center shadow-md group-hover:scale-110 transition-transform shrink-0`}><g.icon size={24}/></div>
                                                        <div><div className="font-black text-slate-700 dark:text-zinc-100 text-base sm:text-lg">{g.name}</div><div className="text-xs text-slate-400 dark:text-zinc-400 font-medium line-clamp-1">{g.desc}</div></div>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <h4 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-[0.2em] mb-4">Herramientas de Clase</h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                                {TOOL_TYPES.map(t => (
                                                    <a key={t.id} href={t.file} className="bg-slate-800 dark:bg-zinc-800 p-5 rounded-[1.5rem] border border-slate-700 dark:border-zinc-700 hover:shadow-xl transition-all text-left flex flex-row sm:flex-col items-center sm:items-start gap-4 group">
                                                        <div className={`w-12 h-12 ${t.color} text-white rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform shrink-0`}><t.icon size={24}/></div>
                                                        <div><div className="font-black text-white text-base sm:text-lg">{t.name}</div><div className="text-xs text-slate-400 dark:text-zinc-400 font-medium line-clamp-1">{t.desc}</div></div>
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL PAPELERA */}
                        {modals.trash && (
                            <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-transparent dark:border-zinc-800">
                                    <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center bg-white dark:bg-zinc-900 sticky top-0 z-10 shrink-0">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-rose-100 dark:bg-rose-900/30 text-rose-500 p-3 rounded-xl"><Trash2 size={24}/></div>
                                            <div><h3 className="font-black text-xl text-slate-800 dark:text-white tracking-tight">Papelera</h3><p className="text-slate-400 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest mt-1">Archivos eliminados</p></div>
                                        </div>
                                        <button onClick={() => setModals({...modals, trash: false})} className="w-10 h-10 rounded-full bg-slate-50 dark:bg-zinc-800 hover:bg-slate-100 hover:text-slate-700 flex items-center justify-center transition-all text-slate-500 dark:text-zinc-400"><X size={20}/></button>
                                    </div>

                                    <div className="bg-indigo-50 dark:bg-indigo-900/30 border-b border-indigo-200 dark:border-indigo-800 p-4 flex justify-between items-center shrink-0">
                                        <div>
                                            <h4 className="font-bold text-indigo-800 dark:text-indigo-300 text-sm flex items-center gap-1"><AlertTriangle size={16}/> ¿Perdiste una carpeta?</h4>
                                            <p className="text-xs text-indigo-600 dark:text-indigo-400">Si la moviste por error y no la encuentras, esto devuelve TODO a INICIO.</p>
                                        </div>
                                        <button onClick={rescueAllFiles} disabled={isRescuing} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 shadow-md transition-colors whitespace-nowrap">
                                            {isRescuing ? <div className="animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> : <LifeBuoy size={16}/>} Rescatar Todo
                                        </button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 dark:bg-zinc-950/50 space-y-2">
                                        {trashItems.folders.length === 0 && trashItems.quizzes.length === 0 && (
                                            <div className="text-center py-12 text-slate-400">
                                                <CheckCircle2 size={48} className="mx-auto mb-4 opacity-20"/>
                                                <p className="font-bold">La papelera está vacía</p>
                                            </div>
                                        )}
                                        {trashItems.folders.map(f => (
                                            <div key={f.id} className="bg-white dark:bg-zinc-800 p-4 rounded-xl border border-slate-200 dark:border-zinc-700 flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-3">
                                                    <Folder className="text-slate-400"/>
                                                    <div>
                                                        <div className="font-bold text-sm text-slate-700 dark:text-zinc-200">{f.name}</div>
                                                        <div className="text-xs text-slate-400">Carpeta</div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => restoreItem(f.id, 'folder')} className="bg-emerald-100 text-emerald-600 hover:bg-emerald-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Restaurar</button>
                                                    <button onClick={() => permanentDelete(f.id, 'folder')} className="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Destruir</button>
                                                </div>
                                            </div>
                                        ))}
                                        {trashItems.quizzes.map(q => (
                                            <div key={q.id} className="bg-white dark:bg-zinc-800 p-4 rounded-xl border border-slate-200 dark:border-zinc-700 flex justify-between items-center shadow-sm">
                                                <div className="flex items-center gap-3">
                                                    <LayoutGrid className="text-slate-400"/>
                                                    <div>
                                                        <div className="font-bold text-sm text-slate-700 dark:text-zinc-200">{q.title}</div>
                                                        <div className="text-xs text-slate-400">Actividad: {q.type}</div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => restoreItem(q.id, 'quiz')} className="bg-emerald-100 text-emerald-600 hover:bg-emerald-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Restaurar</button>
                                                    <button onClick={() => permanentDelete(q.id, 'quiz')} className="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Destruir</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL SELECTOR DE BOARDGAME RENDER */}
                        {boardgameModal.isOpen && boardgameModal.quiz && (
                            <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[80] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-transparent dark:border-zinc-800 text-center">
                                    <div className="mx-auto bg-indigo-100 dark:bg-indigo-900/30 text-indigo-500 w-16 h-16 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
                                        <Gamepad2 size={32}/>
                                    </div>
                                    <h3 className="font-black text-2xl mb-1 text-slate-800 dark:text-white">Elige el Tablero</h3>
                                    <p className="text-slate-500 dark:text-zinc-400 text-sm mb-6 font-bold px-4">
                                        ¿Cómo quieres {boardgameModal.action === 'copy' ? 'que jueguen tus alumnos' : 'abrir esta actividad'}?
                                    </p>

                                    <div className="flex flex-col gap-3">
                                        <button onClick={() => {
                                            const link = `periplo-party.html?id=${boardgameModal.quiz.id}${boardgameModal.action === 'copy' ? '&student=true' : ''}`;
                                            if (boardgameModal.action === 'copy') {
                                                const fullLink = window.location.origin + window.location.pathname.replace('index.html', '') + link;
                                                navigator.clipboard.writeText(fullLink).then(() => triggerUndo(`✅ Link (Periplo Party) copiado.`, null));
                                            } else {
                                                window.location.href = link;
                                            }
                                            setBoardgameModal({ isOpen: false, quiz: null, action: 'play' });
                                        }} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-emerald-950 p-4 rounded-2xl font-black text-lg shadow-[0_4px_0_theme(colors.emerald.700)] flex items-center justify-center gap-3">
                                            <Dices size={20}/> Periplo Party
                                        </button>

                                        <button onClick={() => {
                                            const link = `connect4.html?id=${boardgameModal.quiz.id}${boardgameModal.action === 'copy' ? '&student=true' : ''}`;
                                            if (boardgameModal.action === 'copy') {
                                                const fullLink = window.location.origin + window.location.pathname.replace('index.html', '') + link;
                                                navigator.clipboard.writeText(fullLink).then(() => triggerUndo(`✅ Link (Connect 4) copiado.`, null));
                                            } else {
                                                window.location.href = link;
                                            }
                                            setBoardgameModal({ isOpen: false, quiz: null, action: 'play' });
                                        }} className="btn-juicy w-full bg-amber-500 hover:bg-amber-400 text-amber-950 p-4 rounded-2xl font-black text-lg shadow-[0_4px_0_theme(colors.amber.700)] flex items-center justify-center gap-3">
                                            <Target size={20}/> Connect 4
                                        </button>
                                        
                                        <button onClick={() => setBoardgameModal({ isOpen: false, quiz: null, action: 'play' })} className="mt-2 text-slate-400 hover:text-slate-600 dark:hover:text-white font-bold py-3 transition-colors">
                                            Cancelar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><Dashboard /></ErrorBoundary>);
    </script>
</body>
</html>

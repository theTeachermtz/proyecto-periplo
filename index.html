    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .btn-juicy { transition: transform 0.1s cubic-bezier(0.4,0,0.2,1), filter 0.1s; }
        .btn-juicy:active:not(:disabled) { transform: scale(0.95); }
        .folder-pill { transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
        .folder-pill.active { transform: translateY(-1px); }
        .taxonomy-group { animation: fadeIn 0.2s ease-out; }
        .level-tab { position: relative; }
        .level-tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:currentColor; border-radius:2px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, Component } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, query, onSnapshot, serverTimestamp, doc, deleteDoc, updateDoc, getDocs } from 'firebase/firestore';

        import {
            Plus, X, LayoutGrid, Puzzle, Grid, Trash2, Edit2, AlertTriangle,
            Gamepad2, BookOpen, Calendar, Users, Sun, Moon, Zap, Dices, RotateCcw,
            LifeBuoy, CheckSquare, Check, ChevronRight, CheckCircle2, Headphones,
            ListFilter, Target, Layers, Smartphone, Link, Search, Presentation,
            ArrowDownCircle, HelpCircle, Wand2, Mic, Shuffle, MessageSquare,
            Eye, EyeOff, FolderInput, Map as MapIcon, Play, ChevronDown, ChevronUp,
            Tag, Globe
        } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const FS_APP_ID = 'periplo-app-v1';
        const TEACHER_UID = 'teacher_builder_001';

        // ============================================================
        // CARPETAS FIJAS
        // ============================================================
        const GAME_FOLDERS = [
            { id: 'wordbank',      label: 'Word Bank',      emoji: '📚', color: 'from-sky-500 to-blue-600',      types: ['WORDPACK','FLASHCARDS','CROSSWORD','ANAGRAM','MEMORAMA','EMOJISPELL'] },
            { id: 'boardgames',    label: 'Board Games',    emoji: '🎲', color: 'from-orange-400 to-amber-500',  types: ['BOARDGAME_BANK','CONNECT4','WORD_BANK'] },
            { id: 'presentations', label: 'Presentations',  emoji: '📽️', color: 'from-fuchsia-500 to-purple-600', types: ['PRESENTATION'] },
            { id: 'reading',       label: 'Reading',        emoji: '📖', color: 'from-lime-500 to-green-600',    types: ['READING'] },
            { id: 'listening',     label: 'Listening',      emoji: '🎧', color: 'from-rose-500 to-pink-600',     types: ['LISTENING'] },
            { id: 'dualword',      label: 'Dual Word',      emoji: '☄️', color: 'from-indigo-400 to-cyan-500',   types: ['DUAL_WORD', 'WordCascade'] },
            { id: 'phonechat',     label: 'Phone Chat',     emoji: '📱', color: 'from-green-500 to-emerald-600',  types: ['PHONECHAT'] },
            { id: 'voicereply',    label: 'Voice Replay',   emoji: '🔊', color: 'from-indigo-400 to-purple-500',  types: ['VOICEREPLY'] },
            { id: 'audiotranslator',label:'Audio Translator', emoji: '🌐', color: 'from-emerald-400 to-teal-500',   types: ['AUDIOTRANSLATOR'] },
            { id: 'talktime',      label: 'Talk Time',      emoji: '💬', color: 'from-sky-400 to-blue-500',       types: ['TALKTIME'] },
            { id: 'neverever',     label: 'Never Ever',     emoji: '🤫', color: 'from-fuchsia-400 to-violet-500', types: ['NEVEREVER'] },
            { id: 'lingomatch',    label: 'LingoMatch',     emoji: '🔗', color: 'from-violet-500 to-indigo-600',  types: ['LINGOMATCH'] },
            { id: 'match',         label: 'Match',          emoji: '🎯', color: 'from-yellow-400 to-red-500',     types: ['MATCH'] },
            { id: 'uno',           label: 'UNO',            emoji: '🃏', color: 'from-red-500 to-rose-600',       types: ['UNO'] },
            { id: 'loteria',       label: 'Lotería',        emoji: '🀄', color: 'from-amber-500 to-red-500',      types: ['LOTERIA'] },
            { id: 'conversations', label: 'Conversations',  emoji: '🗣️', color: 'from-teal-400 to-cyan-500',     types: ['CONVERSATIONS'] },
            { id: 'uncategorized', label: 'Sin Clasificar', emoji: '🗂️', color: 'from-slate-500 to-zinc-600',    types: ['__LEGACY__'] },
        ];

        const TYPE_TO_FOLDER = {};
        GAME_FOLDERS.forEach(f => { f.types.forEach(t => { TYPE_TO_FOLDER[t] = f.id; }); });

        const hasNewTaxonomy = (q) => {
            if (!q.tags) return false;
            if (Array.isArray(q.tags.levels) && q.tags.levels.length > 0) return true;
            return false;
        };

        const getFolderForDoc = (q) => {
            if (!hasNewTaxonomy(q)) return 'uncategorized';
            const fid = TYPE_TO_FOLDER[q.type];
            return fid || 'uncategorized';
        };

        const getLevelBucket = (q) => {
            if (!q.tags?.levels) return null;
            const lvls = q.tags.levels;
            const buckets = new Set();
            lvls.forEach(l => {
                if (l.startsWith('B')) buckets.add('basic');
                if (l.startsWith('A')) buckets.add('advanced');
                if (l.startsWith('P')) buckets.add('pro');
            });
            return buckets;
        };

        const getTaxonomyLabel = (q) => {
            if (!q.tags) return null;
            const parts = [];
            const lvls = q.tags.levels || (q.tags.level ? [q.tags.level.toUpperCase()] : []);
            const cats = q.tags.categories || (q.tags.category ? [q.tags.category] : []);
            const topics = q.tags.topics || (q.tags.topic ? [q.tags.topic] : []);

            if (lvls.length) parts.push(lvls.join(', '));
            if (cats.length) {
                const CAT_LABELS = { grammar:'Grammar', verbs:'Verb Mastery', nouns:'Noun Mastery', adjectives:'Vocab (Adj)', key_structs:'Key Structures', otro:'Otro' };
                parts.push(cats.map(c => CAT_LABELS[c] || c).join(', '));
            }
            if (topics.length) parts.push(topics.join(', '));
            return parts.length ? parts.join(' › ') : null;
        };

        const getTaxonomyGroupKey = (q) => {
            if (!q.tags) return '__none__';
            const cats = q.tags.categories || (q.tags.category ? [q.tags.category] : []);
            const topics = q.tags.topics || (q.tags.topic ? [q.tags.topic] : []);
            const CAT_LABELS = { grammar:'Grammar', verbs:'Verb Mastery', nouns:'Noun Mastery', adjectives:'Vocab (Adj)', key_structs:'Key Structures', otro:'Otro' };
            const catStr = cats.map(c => CAT_LABELS[c] || c).join(' + ');
            const topicStr = topics.join(', ');
            if (catStr && topicStr) return `${catStr} › ${topicStr}`;
            if (catStr) return catStr;
            return '__none__';
        };

        // ============================================================
        // TIPOS de GAME
        // ============================================================
        const GAME_TYPES = [
            { id: 'PRESENTATION',    name: 'Presentation',    icon: Presentation,    color: 'bg-gradient-to-br from-fuchsia-500 to-purple-600' },
            { id: 'FLASHCARDS',      name: 'Flashcards',      icon: LayoutGrid,      color: 'bg-gradient-to-br from-sky-500 to-blue-600' },
            { id: 'ANAGRAM',         name: 'Anagrama',        icon: Puzzle,          color: 'bg-gradient-to-br from-pink-500 to-rose-500' },
            { id: 'CROSSWORD',       name: 'Crucigrama',      icon: Grid,            color: 'bg-gradient-to-br from-amber-400 to-amber-600' },
            { id: 'MEMORAMA',        name: 'Memorama',        icon: Layers,          color: 'bg-gradient-to-br from-emerald-400 to-teal-600' },
            { id: 'EMOJISPELL',      name: 'Emoji Spell',     icon: Wand2,           color: 'bg-gradient-to-br from-purple-400 to-pink-500' },
            { id: 'BOARDGAME_BANK',  name: 'Board Games',     icon: Gamepad2,        color: 'bg-gradient-to-br from-orange-400 to-amber-500' },
            { id: 'WORD_BANK',       name: 'Board Games',     icon: Gamepad2,        color: 'bg-gradient-to-br from-orange-400 to-amber-500' },
            { id: 'READING',         name: 'Reading',         icon: BookOpen,        color: 'bg-gradient-to-br from-lime-500 to-green-600' },
            { id: 'MATCH',           name: 'Match',           icon: Zap,             color: 'bg-gradient-to-br from-yellow-400 to-red-500' },
            { id: 'LINGOMATCH',      name: 'LingoMatch',      icon: ListFilter,      color: 'bg-gradient-to-br from-violet-500 to-indigo-600' },
            { id: 'DUAL_WORD',       name: 'Dual Word',       icon: Zap,             color: 'bg-gradient-to-br from-indigo-400 to-cyan-400' },
            { id: 'WordCascade',     name: 'Dual Word',       icon: Zap,             color: 'bg-gradient-to-br from-indigo-400 to-cyan-400' },
            { id: 'NEVEREVER',       name: 'Never Ever',      icon: HelpCircle,      color: 'bg-gradient-to-br from-fuchsia-500 to-pink-600' },
            { id: 'TALKTIME',        name: 'Talk Time',       icon: MessageSquare,   color: 'bg-gradient-to-br from-sky-400 to-blue-500' },
            { id: 'UNO',             name: 'UNO',             icon: Dices,           color: 'bg-gradient-to-br from-red-500 to-rose-600' },
            { id: 'LISTENING',       name: 'Listening',       icon: Headphones,      color: 'bg-gradient-to-br from-rose-500 to-pink-600' },
            { id: 'PHONECHAT',       name: 'Phone Chat',      icon: Smartphone,      color: 'bg-gradient-to-br from-green-500 to-emerald-600' },
            { id: 'AUDIOTRANSLATOR', name: 'Audio Translator',icon: Shuffle,         color: 'bg-gradient-to-br from-emerald-400 to-teal-500' },
            { id: 'VOICEREPLY',      name: 'Voice Replay',    icon: Mic,             color: 'bg-gradient-to-br from-indigo-400 to-purple-500' },
        ];
        const GAME_TYPE_MAP = Object.fromEntries(GAME_TYPES.map(g => [g.id, g]));

        const TOOL_TYPES = [
            { id: 'CITYMAP',   name: 'City Map',        icon: MapIcon, color: 'bg-slate-800', file: 'citymap.html',    desc: 'Práctica de direcciones' },
            { id: 'LINGODEMO', name: 'LingoMatch Demo', icon: Play,    color: 'bg-rose-600',  file: 'lingomatch.html', desc: 'Probar demo de Anita' }
        ];

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError() { return { hasError: true }; }
            render() {
                if (this.state.hasError) return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 text-center bg-zinc-950 text-white">
                        <AlertTriangle size={48} className="text-rose-500 mb-4"/>
                        <h2 className="text-xl font-bold mb-2">Algo salió mal</h2>
                        <button onClick={() => window.location.reload()} className="bg-white text-zinc-900 px-6 py-3 rounded-xl font-bold mt-4">Recargar</button>
                    </div>
                );
                return this.props.children;
            }
        }

        // Helpers de Enlaces (Retorna # si abre un Modal)
        const getPlayLink = (q, asStudent = false) => {
            if (['BOARDGAME_BANK', 'CONNECT4', 'WORD_BANK', 'WORDPACK', 'DUAL_WORD', 'WordCascade'].includes(q.type)) return '#';
            
            const p = asStudent ? '&student=true' : '';
            if (['PHONECHAT','AUDIOTRANSLATOR','VOICEREPLY'].includes(q.type)) {
                const mode = q.content?.gameMode || 'typing';
                if (mode === 'unscramble') return `audiotranslator.html?id=${q.id}${p}`;
                if (mode === 'voice')      return `voicereply.html?id=${q.id}${p}`;
                return `phonechat.html?id=${q.id}${p}`;
            }
            const MAP = { READING:'reading.html', MATCH:'match.html', LINGOMATCH:'lingomatch.html', NEVEREVER:'neverever.html', TALKTIME:'talktime.html', UNO:'uno.html', LISTENING:'listening.html', FLASHCARDS:'flashcards.html', CROSSWORD:'crossword.html', ANAGRAM:'anagram.html', MEMORAMA:'memorama.html', EMOJISPELL:'emojispell.html', PRESENTATION:'presentations.html' };
            return `${MAP[q.type] || 'activity.html'}?id=${q.id}${p}`;
        };

        const getEditLink = (q) => {
            if (['PHONECHAT','AUDIOTRANSLATOR','VOICEREPLY'].includes(q.type)) return `dashboard-pc.html?edit=${q.id}`;
            const MAP = { CONNECT4:'dashboard-bg.html', BOARDGAME_BANK:'dashboard-bg.html', WORD_BANK:'dashboard-bg.html', READING:'dashboard-reading.html', MATCH:'dashboard-match.html', LINGOMATCH:'dashboard-lm.html', DUAL_WORD:'dashboard-wc.html', WordCascade:'dashboard-wc.html', NEVEREVER:'dashboard-ne.html', TALKTIME:'dashboard-tt.html', UNO:'dashboard-uno.html', LISTENING:'dashboard-listening.html', PRESENTATION:'dashboard-presentations.html' };
            if (MAP[q.type]) return `${MAP[q.type]}?edit=${q.id}`;
            if (['FLASHCARDS','CROSSWORD','ANAGRAM','MEMORAMA','EMOJISPELL','WORDPACK'].includes(q.type)) return `dashboard-fc.html?edit=${q.id}`;
            return null;
        };

        function Dashboard() {
            const user = { uid: TEACHER_UID };
            const [allQuizzes, setAllQuizzes]   = useState([]);
            const [trashItems, setTrashItems]   = useState([]);
            const [isDarkMode, setIsDarkMode]   = useState(true);
            const [searchQuery, setSearchQuery] = useState('');

            const [openFolder, setOpenFolder]   = useState(null);
            const [activeLevel, setActiveLevel] = useState('basic');

            const [modals, setModals]         = useState({ activity: false, trash: false });
            
            // Modales de Juegos Combinados
            const [boardgameModal, setBoardgameModal] = useState({ isOpen: false, quiz: null, action: 'play' });
            const [wordpackModal,  setWordpackModal]  = useState({ isOpen: false, quiz: null, action: 'play' });
            const [dualwordModal,  setDualwordModal]  = useState({ isOpen: false, quiz: null, action: 'play' });

            const [undoAction, setUndoAction] = useState(null);
            const undoTimerRef = useRef(null);

            const [selectedItems, setSelectedItems] = useState([]);
            const [isSelecting,   setIsSelecting]   = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('themePreference');
                setIsDarkMode(saved !== 'light');
            }, []);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
            }, [isDarkMode]);

            useEffect(() => {
                const qAll = query(collection(db, 'artifacts', FS_APP_ID, 'users', user.uid, 'quizzes'));
                const unsub = onSnapshot(qAll, (snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllQuizzes(docs.filter(d => d.isDeleted !== true));
                    setTrashItems(docs.filter(d => d.isDeleted === true));
                });
                return unsub;
            }, []);

            const triggerUndo = (msg, fn) => {
                setUndoAction({ message: msg, actionFn: fn });
                if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
                undoTimerRef.current = setTimeout(() => setUndoAction(null), 5000);
            };

            const toggleTheme = () => {
                setIsDarkMode(p => { localStorage.setItem('themePreference', !p ? 'dark' : 'light'); return !p; });
            };

            const visibleQuizzes = allQuizzes.filter(q => {
                if (!searchQuery) return true;
                const sq = searchQuery.toLowerCase();
                const tax = getTaxonomyLabel(q) || '';
                return `${q.title} ${q.type} ${tax}`.toLowerCase().includes(sq);
            });

            const folderCounts = {};
            const folderDocs   = {};
            GAME_FOLDERS.forEach(f => { folderCounts[f.id] = 0; folderDocs[f.id] = []; });

            visibleQuizzes.forEach(q => {
                const fid = getFolderForDoc(q);
                if (folderDocs[fid]) { folderDocs[fid].push(q); folderCounts[fid]++; }
            });

            const FUTURE_FOLDERS = ['loteria','conversations'];
            const visibleFolders = GAME_FOLDERS.filter(f => {
                if (f.id === 'uncategorized') return folderCounts['uncategorized'] > 0;
                if (FUTURE_FOLDERS.includes(f.id)) return folderCounts[f.id] > 0;
                return true;
            });

            const getDocsForLevel = (folderId, level) => {
                const docs = folderDocs[folderId] || [];
                if (level === 'uncategorized') return docs;
                return docs.filter(q => {
                    const buckets = getLevelBucket(q);
                    if (!buckets) return false;
                    return buckets.has(level);
                });
            };

            const groupByTaxonomy = (docs) => {
                const groups = {};
                docs.forEach(q => {
                    const key = getTaxonomyGroupKey(q);
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(q);
                });
                const sorted = Object.entries(groups).sort(([a],[b]) => {
                    if (a === '__none__') return 1;
                    if (b === '__none__') return -1;
                    return a.localeCompare(b);
                });
                return sorted;
            };

            const LEVEL_TABS = [
                { id: 'basic',    label: 'Basic',    color: 'text-sky-400',    active_bg: 'bg-sky-500/10 border-sky-500/30' },
                { id: 'advanced', label: 'Advanced', color: 'text-amber-400',  active_bg: 'bg-amber-500/10 border-amber-500/30' },
                { id: 'pro',      label: 'Pro',      color: 'text-violet-400', active_bg: 'bg-violet-500/10 border-violet-500/30' },
            ];

            const handleDeleteActivity = async (e, q) => {
                e.preventDefault(); e.stopPropagation();
                const ref = doc(db, 'artifacts', FS_APP_ID, 'users', user.uid, 'quizzes', q.id);
                await updateDoc(ref, { isDeleted: true });
                triggerUndo(`"${q.title}" enviado a papelera`, async () => updateDoc(ref, { isDeleted: false }));
            };

            const handleToggleVisibility = async (e, q) => {
                e.preventDefault(); e.stopPropagation();
                if (q.type === 'WORDPACK' && !q.studentVisible) {
                    setWordpackModal({ isOpen: true, quiz: q, action: 'publish' });
                    return;
                }
                const newVal = !q.studentVisible;
                const updateData = { studentVisible: newVal };
                if (!newVal && q.type === 'WORDPACK') updateData.publishedModes = [];
                await updateDoc(doc(db, 'artifacts', FS_APP_ID, 'users', user.uid, 'quizzes', q.id), updateData);
                triggerUndo(newVal ? `👁️ "${q.title}" visible en portal` : `🙈 "${q.title}" oculto del portal`, null);
            };

            const handleCopyLink = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                if (q.type === 'BOARDGAME_BANK' || q.type === 'CONNECT4' || q.type === 'WORD_BANK') { setBoardgameModal({ isOpen: true, quiz: q, action: 'copy' }); return; }
                if (q.type === 'WORDPACK') { setWordpackModal({ isOpen: true, quiz: q, action: 'copy' }); return; }
                if (q.type === 'DUAL_WORD' || q.type === 'WordCascade') { setDualwordModal({ isOpen: true, quiz: q, action: 'copy' }); return; }
                
                const fullLink = window.location.origin + window.location.pathname.replace('index.html','') + getPlayLink(q, true);
                navigator.clipboard.writeText(fullLink)
                    .then(() => triggerUndo('✅ Link copiado al portapapeles', null))
                    .catch(() => alert('Copia manualmente: ' + fullLink));
            };

            const handleEditActivity = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                const link = getEditLink(q);
                if (link) window.location.href = link;
                else alert('Editor no disponible para este tipo.');
            };

            const handleQuizClick = (e, q) => {
                // Prevenimos acción si se clickeó un botón de utilidad dentro de la tarjeta
                if (e.target.closest('.card-actions')) return; 

                if (isSelecting || selectedItems.length > 0) {
                    e.preventDefault();
                    const exists = selectedItems.find(i => i.id === q.id);
                    setSelectedItems(exists ? selectedItems.filter(i => i.id !== q.id) : [...selectedItems, { id: q.id, type: 'quiz', name: q.title }]);
                    return;
                }
                
                // Tipos de actividades que requieren un Modal intermedio
                if (q.type === 'BOARDGAME_BANK' || q.type === 'CONNECT4' || q.type === 'WORD_BANK') { 
                    e.preventDefault();
                    setBoardgameModal({ isOpen: true, quiz: q, action: 'play' }); 
                    return; 
                }
                if (q.type === 'WORDPACK') { 
                    e.preventDefault();
                    setWordpackModal({ isOpen: true, quiz: q, action: 'play' }); 
                    return; 
                }
                if (q.type === 'DUAL_WORD' || q.type === 'WordCascade') { 
                    e.preventDefault();
                    setDualwordModal({ isOpen: true, quiz: q, action: 'play' }); 
                    return; 
                }
                
                // Si es un link directo, NO hacemos e.preventDefault(). 
                // La etiqueta <a> nativamente abrirá la URL en una nueva pestaña (target="_blank")
            };

            const handleActivityClick = (e, gameType) => {
                e.preventDefault();
                if (gameType.id === 'PHONECHAT')       window.location.href = 'dashboard-pc.html?mode=typing';
                else if (gameType.id === 'AUDIOTRANSLATOR') window.location.href = 'dashboard-pc.html?mode=unscramble';
                else if (gameType.id === 'VOICEREPLY')  window.location.href = 'dashboard-pc.html?mode=voice';
                else if (gameType.id === 'BOARDGAME_BANK') window.location.href = 'dashboard-bg.html';
                else if (gameType.id === 'READING')     window.location.href = 'dashboard-reading.html';
                else if (gameType.id === 'MATCH')       window.location.href = 'dashboard-match.html';
                else if (gameType.id === 'LINGOMATCH')  window.location.href = 'dashboard-lm.html';
                else if (gameType.id === 'DUAL_WORD' || gameType.id === 'WordCascade') window.location.href = 'dashboard-wc.html';
                else if (gameType.id === 'NEVEREVER')   window.location.href = 'dashboard-ne.html';
                else if (gameType.id === 'TALKTIME')    window.location.href = 'dashboard-tt.html';
                else if (gameType.id === 'UNO')         window.location.href = 'dashboard-uno.html';
                else if (gameType.id === 'LISTENING')   window.location.href = 'dashboard-listening.html';
                else if (gameType.id === 'PRESENTATION') window.location.href = 'dashboard-presentations.html';
                else window.location.href = `dashboard-fc.html?type=${gameType.id}`;
            };

            const handleDeleteSelected = async () => {
                if (!confirm(`¿Enviar ${selectedItems.length} elemento(s) a la papelera?`)) return;
                await Promise.all(selectedItems.map(item => {
                    const ref = doc(db, 'artifacts', FS_APP_ID, 'users', user.uid, 'quizzes', item.id);
                    return updateDoc(ref, { isDeleted: true });
                }));
                setSelectedItems([]); setIsSelecting(false);
            };

            const restoreItem = async (id) => {
                await updateDoc(doc(db, 'artifacts', FS_APP_ID, 'users', user.uid, 'quizzes', id), { isDeleted: false });
            };

            const permanentDelete = async (id) => {
                if (confirm('¿Eliminar PERMANENTEMENTE? Esto no se puede deshacer.'))
                    await deleteDoc(doc(db, 'artifacts', FS_APP_ID, 'users', user.uid, 'quizzes', id));
            };

            const GameCard = ({ q }) => {
                let info = GAME_TYPE_MAP[q.type] || GAME_TYPES[0];
                if (q.type === 'CONNECT4') info = { id:'CONNECT4', name:'Connect 4', icon: Target, color:'bg-gradient-to-br from-orange-400 to-amber-500' };
                if (q.type === 'PHONECHAT' && q.content?.gameMode === 'unscramble') info = GAME_TYPE_MAP['AUDIOTRANSLATOR'] || info;
                if (q.type === 'PHONECHAT' && q.content?.gameMode === 'voice')      info = GAME_TYPE_MAP['VOICEREPLY'] || info;

                const isSelected = selectedItems.some(i => i.id === q.id);
                const taxLabel   = getTaxonomyLabel(q);
                const playLink   = getPlayLink(q);
                const isModalLink = playLink === '#';

                return (
                    <a
                        href={playLink}
                        target={isModalLink ? undefined : "_blank"}
                        onClick={(e) => handleQuizClick(e, q)}
                        className={`relative bg-white dark:bg-zinc-900 rounded-2xl border ${isSelected ? 'ring-2 ring-indigo-500 border-indigo-500' : 'border-slate-200 dark:border-zinc-800'} flex flex-col overflow-hidden group hover:shadow-lg hover:-translate-y-0.5 transition-all cursor-pointer`}
                    >
                        {/* Checkbox select */}
                        {(isSelecting || selectedItems.length > 0) && (
                            <div className={`absolute top-2 left-2 w-5 h-5 rounded border-2 z-20 flex items-center justify-center transition-all ${isSelected ? 'border-indigo-500 bg-indigo-500 text-white' : 'border-zinc-600 bg-zinc-800'}`}>
                                {isSelected && <Check size={12} strokeWidth={4}/>}
                            </div>
                        )}

                        {/* Botones de acción aislados para no disparar el enlace */}
                        {!isSelecting && selectedItems.length === 0 && (
                            <div className="card-actions absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                <button onClick={(e) => handleCopyLink(e, q)} title="Copiar link" className="p-1.5 bg-white/95 dark:bg-zinc-800/95 rounded-lg text-emerald-500 hover:text-emerald-400 shadow-sm transition-colors"><Link size={11}/></button>
                                <button onClick={(e) => handleToggleVisibility(e, q)} title={q.studentVisible ? 'Visible — click para ocultar' : 'Oculto — click para publicar'} className={`p-1.5 bg-white/95 dark:bg-zinc-800/95 rounded-lg shadow-sm transition-colors ${q.studentVisible ? 'text-indigo-500' : 'text-zinc-500 hover:text-indigo-400'}`}>{q.studentVisible ? <Eye size={11}/> : <EyeOff size={11}/>}</button>
                                <button onClick={(e) => handleEditActivity(e, q)} title="Editar" className="p-1.5 bg-white/95 dark:bg-zinc-800/95 rounded-lg text-zinc-400 hover:text-blue-500 shadow-sm transition-colors"><Edit2 size={11}/></button>
                                <button onClick={(e) => handleDeleteActivity(e, q)} title="Eliminar" className="p-1.5 bg-white/95 dark:bg-zinc-800/95 rounded-lg text-zinc-400 hover:text-red-500 shadow-sm transition-colors"><Trash2 size={11}/></button>
                            </div>
                        )}

                        {/* Header color */}
                        <div className={`w-full h-10 ${info.color} flex items-center justify-center text-white shrink-0`}>
                            <info.icon size={18}/>
                        </div>

                        {/* Contenido */}
                        <div className="p-2.5 flex-1 flex flex-col text-center">
                            <div className="font-bold text-xs leading-tight truncate text-slate-700 dark:text-zinc-200">{q.title}</div>
                            <div className="text-[9px] text-slate-400 dark:text-zinc-500 font-black uppercase tracking-widest mt-0.5 truncate">{info.name}</div>

                            {/* Taxonomía badge */}
                            {taxLabel && (
                                <div className="mt-1.5 text-[8px] font-bold text-indigo-400 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-950/50 border border-indigo-100 dark:border-indigo-900/50 rounded-lg px-1.5 py-0.5 leading-relaxed line-clamp-2 text-left">
                                    {taxLabel}
                                </div>
                            )}
                            {!hasNewTaxonomy(q) && q.tags && (
                                <div className="mt-1.5 text-[8px] font-bold text-amber-400 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900/40 rounded-lg px-1.5 py-0.5 text-left">
                                    ⚠️ Taxonomía antigua — edita para actualizar
                                </div>
                            )}
                        </div>
                    </a>
                );
            };

            const openFolderData = GAME_FOLDERS.find(f => f.id === openFolder);
            const isUncategorized = openFolder === 'uncategorized';

            const LevelContent = ({ folderId, level }) => {
                const docs = getDocsForLevel(folderId, level);
                if (docs.length === 0) return (
                    <div className="flex flex-col items-center justify-center py-16 text-zinc-600">
                        <div className="text-4xl mb-3">📭</div>
                        <p className="font-bold text-sm">Sin contenido {level === 'basic' ? 'Basic' : level === 'advanced' ? 'Advanced' : 'Pro'} aquí</p>
                        <p className="text-xs mt-1">Crea una actividad y etiquétala como {level === 'basic' ? 'B1/B2' : level === 'advanced' ? 'A1/A2' : 'P1/P2'}</p>
                    </div>
                );

                const groups = groupByTaxonomy(docs);
                return (
                    <div className="space-y-6 taxonomy-group">
                        {groups.map(([groupKey, groupDocs]) => (
                            <div key={groupKey}>
                                {groupKey !== '__none__' && (
                                    <div className="flex items-center gap-2 mb-3">
                                        <Tag size={11} className="text-zinc-500 shrink-0"/>
                                        <span className="text-[10px] font-black uppercase tracking-widest text-zinc-500">{groupKey}</span>
                                        <div className="flex-1 h-px bg-zinc-800"></div>
                                        <span className="text-[9px] font-bold text-zinc-600">{groupDocs.length}</span>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                    {groupDocs.map(q => <GameCard key={q.id} q={q}/>)}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-200 pb-24">
                    <div className="max-w-7xl mx-auto p-4 md:p-6 fade-in">

                        {/* ── UNDO TOAST ── */}
                        {undoAction && (
                            <div className="fixed bottom-24 right-6 bg-zinc-900 text-white p-4 rounded-xl shadow-2xl z-50 flex items-center gap-4 border border-zinc-700 animate-in slide-in-from-bottom-4 fade-in duration-200">
                                <span className="font-bold text-sm">{undoAction.message}</span>
                                {undoAction.actionFn && (
                                    <button onClick={() => { undoAction.actionFn(); setUndoAction(null); clearTimeout(undoTimerRef.current); }} className="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg font-black text-xs flex items-center gap-1.5">
                                        <RotateCcw size={13}/> Deshacer
                                    </button>
                                )}
                            </div>
                        )}

                        {/* ── BARRA SELECCIÓN MÚLTIPLE ── */}
                        {(selectedItems.length > 0 || isSelecting) && (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 text-white px-4 py-3 rounded-full shadow-2xl flex items-center gap-3 z-50 border border-zinc-700 w-11/12 md:w-auto">
                                <span className="font-black text-sm bg-zinc-800 px-3 py-1 rounded-full">{selectedItems.length} seleccionados</span>
                                <button onClick={handleDeleteSelected} disabled={selectedItems.length===0} className="hover:text-rose-400 disabled:opacity-50 flex items-center gap-1.5 text-sm font-bold"><Trash2 size={16}/> Borrar</button>
                                <div className="w-px h-5 bg-zinc-700"/>
                                <button onClick={() => { setSelectedItems([]); setIsSelecting(false); }} className="hover:bg-zinc-800 p-1.5 rounded-full"><X size={18}/></button>
                            </div>
                        )}

                        {/* ── HEADER ── */}
                        <div className="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-zinc-800 mb-6 flex flex-col md:flex-row gap-3 justify-between items-center">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                {openFolder && (
                                    <button onClick={() => setOpenFolder(null)} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl text-zinc-400 hover:text-indigo-500 transition-all">
                                        ← 
                                    </button>
                                )}
                                <h1 className="text-xl font-black tracking-tight text-indigo-600 dark:text-indigo-400 uppercase italic">
                                    PERIPLO {openFolderData && <span className="not-italic font-black text-white"> › {openFolderData.emoji} {openFolderData.label}</span>}
                                    <span className="ml-2 text-[10px] not-italic normal-case bg-indigo-100 dark:bg-indigo-900/50 px-2 rounded-full border border-indigo-200 dark:border-indigo-700">v22</span>
                                </h1>
                            </div>

                            <div className="w-full md:flex-1 md:max-w-xs relative">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={15}/>
                                <input
                                    type="text" placeholder="Buscar título, nivel, tema..."
                                    value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                    className="w-full bg-slate-100 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl py-2 pl-8 pr-4 text-sm outline-none focus:border-indigo-500 dark:text-white placeholder-slate-400 font-bold"
                                />
                            </div>

                            <div className="flex items-center gap-2 w-full md:w-auto justify-end">
                                <a href="students.html" className="bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 text-indigo-600 dark:text-indigo-400 px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center hover:bg-indigo-50 dark:hover:bg-zinc-700 transition-colors">
                                    <Users size={15}/><span className="hidden sm:inline">Alumnos</span>
                                </a>
                                <a href="dashboard-schedule.html" className="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center">
                                    <Calendar size={15}/><span className="hidden sm:inline">Agenda</span>
                                </a>
                                <div className="w-px h-6 bg-slate-200 dark:bg-zinc-800 mx-1 hidden sm:block"/>
                                <button onClick={() => setIsSelecting(!isSelecting)} className={`p-2 rounded-xl border transition-colors ${isSelecting || selectedItems.length > 0 ? 'bg-indigo-100 text-indigo-700 border-indigo-300 dark:bg-indigo-900/50 dark:text-indigo-300 dark:border-indigo-700' : 'bg-slate-50 dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-slate-600 dark:text-zinc-300'}`}>
                                    <CheckSquare size={17}/>
                                </button>
                                <button onClick={() => setModals({...modals, activity: true})} className="bg-indigo-600 dark:bg-indigo-500 text-white px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center hover:bg-indigo-700 transition-colors">
                                    <Plus size={15}/><span className="hidden sm:inline">Actividad</span>
                                </button>
                                <button onClick={toggleTheme} className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors">
                                    {isDarkMode ? <Sun size={17}/> : <Moon size={17}/>}
                                </button>
                            </div>
                        </div>

                        {/* ── VISTA PRINCIPAL ── */}
                        {!openFolder ? (
                            <div className="fade-in">
                                {/* Papelera */}
                                <div className="flex items-center gap-3 mb-4">
                                    <button
                                        onClick={() => setModals({...modals, trash: true})}
                                        className="flex items-center gap-2 px-4 py-2 bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-800/50 rounded-xl text-sm font-bold hover:bg-rose-100 dark:hover:bg-rose-900/30 transition-colors relative"
                                    >
                                        <Trash2 size={15}/>
                                        Papelera
                                        {trashItems.length > 0 && <span className="ml-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">{trashItems.length}</span>}
                                    </button>
                                    <span className="text-xs text-zinc-500 font-bold">{visibleQuizzes.length} actividades en total</span>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                    {visibleFolders.map(folder => {
                                        const count = folderCounts[folder.id] || 0;
                                        const isUncategorizedFolder = folder.id === 'uncategorized';
                                        return (
                                            <button
                                                key={folder.id}
                                                onClick={() => { setOpenFolder(folder.id); setActiveLevel(isUncategorizedFolder ? 'uncategorized' : 'basic'); }}
                                                className={`relative h-28 sm:aspect-[4/3] sm:h-auto rounded-2xl flex flex-col items-center justify-center gap-2 transition-all hover:scale-105 hover:shadow-xl group border ${
                                                    isUncategorizedFolder
                                                        ? 'bg-zinc-800 border-zinc-700 hover:border-zinc-500'
                                                        : `bg-gradient-to-br ${folder.color} border-transparent shadow-md`
                                                }`}
                                            >
                                                <span className="text-3xl">{folder.emoji}</span>
                                                <span className={`text-xs font-black uppercase tracking-wide text-center px-2 leading-tight ${isUncategorizedFolder ? 'text-zinc-300' : 'text-white'}`}>
                                                    {folder.label}
                                                </span>
                                                {count > 0 && (
                                                    <span className="absolute top-2 right-2 bg-black/20 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">
                                                        {count}
                                                    </span>
                                                )}
                                                {count === 0 && !isUncategorizedFolder && (
                                                    <span className="absolute top-2 right-2 bg-black/20 text-white/60 text-[9px] font-bold px-1.5 py-0.5 rounded-full">vacía</span>
                                                )}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="fade-in">
                                {isUncategorized ? (
                                    <div>
                                        <div className="mb-4 p-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/40 rounded-xl flex items-start gap-3">
                                            <AlertTriangle size={16} className="text-amber-500 mt-0.5 shrink-0"/>
                                            <div>
                                                <p className="text-sm font-black text-amber-800 dark:text-amber-300">Actividades sin taxonomía nueva</p>
                                                <p className="text-xs text-amber-700 dark:text-amber-400 mt-0.5">Edita cada actividad y asígnale Nivel + Categoría + Temas. Cuando lo hagas, desaparecerá de aquí y se irá a su carpeta correcta automáticamente.</p>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                            {(folderDocs['uncategorized'] || []).map(q => <GameCard key={q.id} q={q}/>)}
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="flex gap-1 mb-6 bg-zinc-900 p-1 rounded-xl border border-zinc-800 w-fit">
                                            {LEVEL_TABS.map(tab => (
                                                <button
                                                    key={tab.id}
                                                    onClick={() => setActiveLevel(tab.id)}
                                                    className={`px-5 py-2 rounded-lg text-sm font-black transition-all ${
                                                        activeLevel === tab.id
                                                            ? `${tab.color} bg-zinc-800 shadow-sm`
                                                            : 'text-zinc-600 hover:text-zinc-400'
                                                    }`}
                                                >
                                                    {tab.label}
                                                    <span className={`ml-2 text-[9px] font-bold px-1.5 py-0.5 rounded-full ${activeLevel === tab.id ? 'bg-zinc-700' : 'bg-zinc-800'}`}>
                                                        {getDocsForLevel(openFolder, tab.id).length}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                        <LevelContent key={`${openFolder}-${activeLevel}`} folderId={openFolder} level={activeLevel}/>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ──────────────────────────────────────────────────── */}
                        {/* MODAL CREAR ACTIVIDAD                                */}
                        {/* ──────────────────────────────────────────────────── */}
                        {modals.activity && (
                            <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-zinc-800">
                                    <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center sticky top-0 bg-white dark:bg-zinc-900 z-10">
                                        <div>
                                            <h3 className="font-black text-2xl text-slate-800 dark:text-white">Crea o Selecciona</h3>
                                            <p className="text-slate-400 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest mt-1">Elige el motor para tu actividad</p>
                                        </div>
                                        <button onClick={() => setModals({...modals, activity: false})} className="w-10 h-10 rounded-full bg-slate-50 dark:bg-zinc-800 hover:bg-rose-50 dark:hover:bg-rose-900/30 hover:text-rose-500 flex items-center justify-center transition-all text-slate-500 dark:text-zinc-400"><X size={20}/></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 dark:bg-zinc-950/50">
                                        <div className="mb-8">
                                            <h4 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-[0.2em] mb-4">Generadores & Juegos</h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                                {GAME_TYPES.map(g => (
                                                    <button key={g.id} onClick={(e) => handleActivityClick(e, g)} className="bg-white dark:bg-zinc-800 p-5 rounded-[1.5rem] border border-slate-100 dark:border-zinc-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:shadow-xl transition-all text-left flex items-center gap-4 group">
                                                        <div className={`w-12 h-12 ${g.color} text-white rounded-2xl flex items-center justify-center shadow-md group-hover:scale-110 transition-transform shrink-0`}><g.icon size={22}/></div>
                                                        <div><div className="font-black text-slate-700 dark:text-zinc-100 text-base">{g.name}</div></div>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <h4 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-[0.2em] mb-4">Herramientas de Clase</h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                                {TOOL_TYPES.map(t => (
                                                    <a key={t.id} href={t.file} target="_blank" className="bg-slate-800 p-5 rounded-[1.5rem] border border-slate-700 hover:shadow-xl transition-all flex items-center gap-4 group">
                                                        <div className={`w-12 h-12 ${t.color} text-white rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform shrink-0`}><t.icon size={22}/></div>
                                                        <div><div className="font-black text-white text-base">{t.name}</div><div className="text-xs text-zinc-400">{t.desc}</div></div>
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ──────────────────────────────────────────────────── */}
                        {/* MODAL PAPELERA                                       */}
                        {/* ──────────────────────────────────────────────────── */}
                        {modals.trash && (
                            <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-zinc-800">
                                    <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center sticky top-0 bg-white dark:bg-zinc-900 z-10">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-rose-100 dark:bg-rose-900/30 text-rose-500 p-3 rounded-xl"><Trash2 size={22}/></div>
                                            <div>
                                                <h3 className="font-black text-xl text-slate-800 dark:text-white">Papelera</h3>
                                                <p className="text-zinc-400 text-xs font-bold uppercase tracking-widest mt-0.5">Archivos eliminados</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setModals({...modals, trash: false})} className="w-10 h-10 rounded-full bg-slate-50 dark:bg-zinc-800 hover:bg-slate-100 flex items-center justify-center text-slate-500 dark:text-zinc-400"><X size={20}/></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6 space-y-2 bg-slate-50/50 dark:bg-zinc-950/50">
                                        {trashItems.length === 0 && (
                                            <div className="text-center py-12 text-slate-400">
                                                <CheckCircle2 size={48} className="mx-auto mb-4 opacity-20"/>
                                                <p className="font-bold">La papelera está vacía</p>
                                            </div>
                                        )}
                                        {trashItems.map(q => (
                                            <div key={q.id} className="bg-white dark:bg-zinc-800 p-4 rounded-xl border border-slate-200 dark:border-zinc-700 flex justify-between items-center shadow-sm">
                                                <div>
                                                    <div className="font-bold text-sm text-slate-700 dark:text-zinc-200">{q.title}</div>
                                                    <div className="text-xs text-slate-400">{q.type}</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => restoreItem(q.id)} className="bg-emerald-100 text-emerald-600 hover:bg-emerald-200 px-3 py-1.5 rounded-lg text-xs font-bold">Restaurar</button>
                                                    <button onClick={() => permanentDelete(q.id)} className="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-1.5 rounded-lg text-xs font-bold">Destruir</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ──────────────────────────────────────────────────── */}
                        {/* MODAL BOARDGAME SELECTOR                             */}
                        {/* ──────────────────────────────────────────────────── */}
                        {boardgameModal.isOpen && boardgameModal.quiz && (
                            <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-zinc-800 text-center">
                                    <div className="mx-auto bg-amber-100 dark:bg-amber-900/30 text-amber-500 w-16 h-16 rounded-2xl flex items-center justify-center mb-4"><Gamepad2 size={32}/></div>
                                    <h3 className="font-black text-2xl mb-1 text-slate-800 dark:text-white">Board Games</h3>
                                    <p className="text-slate-500 dark:text-zinc-400 text-sm mb-6 font-bold">¿Cómo quieres {boardgameModal.action === 'copy' ? 'que jueguen tus alumnos' : 'abrir esta actividad'}?</p>
                                    <div className="flex flex-col gap-3">
                                        {[
                                            { label: 'Periplo Party', emoji: '🎉', file: 'periplo-party.html', color: 'bg-emerald-500 hover:bg-emerald-400 text-emerald-950 shadow-[0_4px_0_theme(colors.emerald.700)]' },
                                            { label: 'Connect 4',     emoji: '🔴', file: 'connect4.html',      color: 'bg-amber-500 hover:bg-amber-400 text-amber-950 shadow-[0_4px_0_theme(colors.amber.700)]' },
                                        ].map(opt => {
                                            const link = `${opt.file}?id=${boardgameModal.quiz.id}${boardgameModal.action==='copy'?'&student=true':''}`;
                                            return (
                                                <a key={opt.file} href={boardgameModal.action==='copy' ? '#' : link} target={boardgameModal.action==='copy' ? undefined : "_blank"} onClick={(e) => {
                                                    if (boardgameModal.action === 'copy') {
                                                        e.preventDefault();
                                                        const fl = window.location.origin + window.location.pathname.replace('index.html','') + link; 
                                                        navigator.clipboard.writeText(fl).then(() => triggerUndo(`✅ Link (${opt.label}) copiado`, null));
                                                        setBoardgameModal({ isOpen: false, quiz: null, action: 'play' });
                                                    } else {
                                                        setTimeout(() => setBoardgameModal({ isOpen: false, quiz: null, action: 'play' }), 50);
                                                    }
                                                }} className={`btn-juicy w-full p-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 ${opt.color}`}>
                                                    <span>{opt.emoji}</span> {opt.label}
                                                </a>
                                            );
                                        })}
                                        <button onClick={() => setBoardgameModal({ isOpen: false, quiz: null, action: 'play' })} className="mt-2 text-zinc-500 hover:text-amber-500 font-bold py-3 transition-colors">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ──────────────────────────────────────────────────── */}
                        {/* MODAL DUAL WORD SELECTOR                             */}
                        {/* ──────────────────────────────────────────────────── */}
                        {dualwordModal.isOpen && dualwordModal.quiz && (
                            <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                                <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-zinc-800 text-center">
                                    <div className="mx-auto bg-indigo-100 dark:bg-indigo-900/30 text-indigo-500 w-16 h-16 rounded-2xl flex items-center justify-center mb-4 text-3xl">☄️</div>
                                    <h3 className="font-black text-2xl mb-1 text-slate-800 dark:text-white">Dual Word</h3>
                                    <p className="text-slate-500 dark:text-zinc-400 text-sm mb-6 font-bold">¿Cómo quieres {dualwordModal.action === 'copy' ? 'que jueguen tus alumnos' : 'abrir esta actividad'}?</p>
                                    <div className="flex flex-col gap-3">
                                        {[
                                            { label: 'Word Cascade',   emoji: '🌊', file: 'wordcascade.html',   color: 'bg-indigo-500 hover:bg-indigo-400 text-indigo-950 shadow-[0_4px_0_theme(colors.indigo.700)]' },
                                            { label: 'Word Buildings', emoji: '🏢', file: 'wordbuildings.html', color: 'bg-emerald-500 hover:bg-emerald-400 text-emerald-950 shadow-[0_4px_0_theme(colors.emerald.700)]' },
                                        ].map(opt => {
                                            const link = `${opt.file}?id=${dualwordModal.quiz.id}${dualwordModal.action==='copy'?'&student=true':''}`;
                                            return (
                                                <a key={opt.file} href={dualwordModal.action==='copy' ? '#' : link} target={dualwordModal.action==='copy' ? undefined : "_blank"} onClick={(e) => {
                                                    if (dualwordModal.action === 'copy') {
                                                        e.preventDefault();
                                                        const fl = window.location.origin + window.location.pathname.replace('index.html','') + link; 
                                                        navigator.clipboard.writeText(fl).then(() => triggerUndo(`✅ Link (${opt.label}) copiado`, null));
                                                        setDualwordModal({ isOpen: false, quiz: null, action: 'play' });
                                                    } else {
                                                        setTimeout(() => setDualwordModal({ isOpen: false, quiz: null, action: 'play' }), 50);
                                                    }
                                                }} className={`btn-juicy w-full p-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 ${opt.color}`}>
                                                    <span>{opt.emoji}</span> {opt.label}
                                                </a>
                                            );
                                        })}
                                        <button onClick={() => setDualwordModal({ isOpen: false, quiz: null, action: 'play' })} className="mt-2 text-zinc-500 hover:text-indigo-400 font-bold py-3 transition-colors">Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ──────────────────────────────────────────────────── */}
                        {/* MODAL WORDPACK SELECTOR / PUBLISHER                  */}
                        {/* ──────────────────────────────────────────────────── */}
                        {wordpackModal.isOpen && wordpackModal.quiz && (
                            <div className="fixed inset-0 bg-black/80 z-[200] flex items-end sm:items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl animate-in slide-in-from-bottom-4 duration-200">
                                    <div className="flex items-center justify-between mb-2">
                                        <div>
                                            <h3 className="text-lg font-black text-sky-400">Word Bank 📚</h3>
                                            <p className="text-zinc-400 text-sm truncate">{wordpackModal.quiz.title}</p>
                                        </div>
                                        <button onClick={() => setWordpackModal({ isOpen: false, quiz: null, action: 'play' })} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-zinc-400"><X size={18}/></button>
                                    </div>
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 mt-4">
                                        {wordpackModal.action === 'copy' ? 'Copiar link de...' : wordpackModal.action === 'publish' ? '¿Qué juego quieres publicar?' : '¿En qué juego abrimos?'}
                                    </p>
                                    <div className="space-y-2">
                                        {wordpackModal.action === 'publish' && (
                                            <a href="#" onClick={async (e) => {
                                                e.preventDefault();
                                                try {
                                                    await updateDoc(doc(db,'artifacts',FS_APP_ID,'users',user.uid,'quizzes',wordpackModal.quiz.id), { studentVisible:true, publishedModes:['flashcards','crossword','anagram','memorama','emojispell'] });
                                                    triggerUndo(`👁️ "${wordpackModal.quiz.title}" publicado (Todos los juegos)`, null);
                                                    setWordpackModal({ isOpen:false, quiz:null, action:'play' });
                                                } catch(err) { alert(err.message); }
                                            }} className="w-full flex items-center justify-center gap-3 p-3 rounded-xl border border-sky-500/40 bg-sky-500/10 text-sky-400 font-black text-sm mb-4 hover:opacity-80 active:scale-95 transition-all">
                                                <span className="text-xl">✨</span> Publicar Todos
                                            </a>
                                        )}
                                        {[
                                            { id:'flashcards', label:'Flashcards',      emoji:'🃏', file:'flashcards.html',  color:'border-sky-500/40 bg-sky-500/10 text-sky-300' },
                                            { id:'crossword',  label:'Crucigrama',      emoji:'⬛', file:'crossword.html',   color:'border-amber-500/40 bg-amber-500/10 text-amber-300' },
                                            { id:'anagram',    label:'Anagrama',        emoji:'🔤', file:'anagram.html',     color:'border-rose-500/40 bg-rose-500/10 text-rose-300' },
                                            { id:'memorama',   label:'Memorama',        emoji:'🧠', file:'memorama.html',    color:'border-emerald-500/40 bg-emerald-500/10 text-emerald-300' },
                                            { id:'emojispell', label:'Say it w/ Emoji', emoji:'😎', file:'emojispell.html',  color:'border-violet-500/40 bg-violet-500/10 text-violet-300' },
                                        ].map(game => {
                                            const link = `${game.file}?id=${wordpackModal.quiz.id}${wordpackModal.action==='copy'?'&student=true':''}`;
                                            return (
                                                <a key={game.id} href={wordpackModal.action==='copy' || wordpackModal.action==='publish' ? '#' : link} target={wordpackModal.action==='copy' || wordpackModal.action==='publish' ? undefined : "_blank"} onClick={async (e) => {
                                                    if (wordpackModal.action === 'publish') {
                                                        e.preventDefault();
                                                        try {
                                                            await updateDoc(doc(db,'artifacts',FS_APP_ID,'users',user.uid,'quizzes',wordpackModal.quiz.id), { studentVisible:true, publishedModes:[game.id] });
                                                            triggerUndo(`👁️ "${wordpackModal.quiz.title}" publicado como ${game.label}`, null);
                                                            setWordpackModal({ isOpen:false, quiz:null, action:'play' });
                                                        } catch(err) { alert(err.message); }
                                                    } else if (wordpackModal.action === 'copy') {
                                                        e.preventDefault();
                                                        const fl = window.location.origin + window.location.pathname.replace('index.html','') + link; 
                                                        navigator.clipboard.writeText(fl).then(() => triggerUndo(`✅ Link (${game.label}) copiado`, null));
                                                        setWordpackModal({ isOpen:false, quiz:null, action:'play' });
                                                    } else {
                                                        setTimeout(() => setWordpackModal({ isOpen: false, quiz: null, action: 'play' }), 50);
                                                    }
                                                }} className={`w-full flex items-center gap-3 p-3 rounded-xl border font-bold text-sm transition-all active:scale-95 hover:opacity-80 ${game.color}`}>
                                                    <span className="text-xl">{game.emoji}</span>
                                                    <span>{wordpackModal.action === 'publish' ? `Publicar ${game.label}` : game.label}</span>
                                                </a>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<ErrorBoundary><Dashboard/></ErrorBoundary>);
    </script>
</body>
</html>

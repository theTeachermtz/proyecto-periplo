<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periplo - Teacher Hub v21.0 (Taxonomy Ready)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (window.location.search.includes('undefined') || window.location.search.includes('null')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #09090b; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc, updateDoc, getDocs, serverTimestamp } from 'firebase/firestore';
        import { Plus, Folder, X, LayoutGrid, Puzzle, Grid, ArrowLeft, Trash2, Edit2, AlertTriangle, BookOpen, Calendar, Users, Sun, Moon, Zap, Dices, RotateCcw, LifeBuoy, CheckSquare, Check, FolderInput, ChevronRight, CheckCircle2, Headphones, ListFilter, Target, Play, Layers, Smartphone, Link, Filter } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        const GAME_TYPES = [
            { id: 'FLASHCARDS', name: 'Flashcards', icon: LayoutGrid, color: 'bg-gradient-to-br from-indigo-500 to-purple-600' }, 
            { id: 'ANAGRAM', name: 'Anagrama', icon: Puzzle, color: 'bg-gradient-to-br from-pink-500 to-rose-500' },
            { id: 'CROSSWORD', name: 'Crucigrama', icon: Grid, color: 'bg-gradient-to-br from-amber-400 to-amber-600' },
            { id: 'MEMORAMA', name: 'Memorama', icon: Layers, color: 'bg-gradient-to-br from-emerald-400 to-teal-600' },
            { id: 'CONNECT4', name: 'Connect 4', icon: Target, color: 'bg-gradient-to-br from-orange-400 to-amber-500' },
            { id: 'READING', name: 'Reading', icon: BookOpen, color: 'bg-gradient-to-br from-cyan-500 to-blue-600' },
            { id: 'MATCH', name: 'Match Madness', icon: Zap, color: 'bg-gradient-to-br from-yellow-400 to-red-500' },
            { id: 'LINGOMATCH', name: 'LingoMatch', icon: ListFilter, color: 'bg-gradient-to-br from-violet-500 to-indigo-600' },
            { id: 'UNO', name: 'UNO', icon: Dices, color: 'bg-gradient-to-br from-blue-500 to-indigo-600' },
            { id: 'LISTENING', name: 'Listening', icon: Headphones, color: 'bg-gradient-to-br from-rose-500 to-pink-600' },
            { id: 'PHONECHAT', name: 'Phone Chat', icon: Smartphone, color: 'bg-gradient-to-br from-cyan-400 to-blue-500' }
        ];

        function Dashboard() {
            const user = { uid: "teacher_builder_001" };
            const [path, setPath] = useState([]);
            const [userFolders, setUserFolders] = useState([]);
            const [userQuizzes, setUserQuizzes] = useState([]);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [modals, setModals] = useState({ activity: false });

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                if (folderParam) setPath(decodeURIComponent(folderParam).split('/'));
            }, []);

            useEffect(() => {
                const currentPath = path.join('/');
                const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentPath));
                const unsubF = onSnapshot(qF, (s) => {
                    setUserFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => !f.isDeleted));
                });
                
                // CAMBIO CLAVE: Si el bot de Daniel no pone parentPath, se asume vacío ""
                const qQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('parentPath', '==', currentPath));
                const unsubQ = onSnapshot(qQ, (s) => {
                    setUserQuizzes(s.docs.map(d => ({id: d.id, ...d.data()})).filter(q => !q.isDeleted));
                });

                return () => { unsubF(); unsubQ(); };
            }, [path]);

            const navigateTo = (newPath) => {
                setPath(newPath);
                const url = new URL(window.location);
                if (newPath.length > 0) url.searchParams.set('folder', newPath.join('/')); else url.searchParams.delete('folder');
                window.history.pushState({}, '', url);
            };

            const getPlayLink = (q, student = false) => {
                const p = student ? '&student=true' : '';
                const type = q.type?.toLowerCase() || 'match';
                return `${type}.html?id=${q.id}${p}`;
            };

            const handleCopyLink = (q) => {
                const link = window.location.origin + window.location.pathname.replace('index.html','') + getPlayLink(q, true);
                navigator.clipboard.writeText(link);
                alert("¡Link de Alumno copiado!");
            };

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <header className="flex justify-between items-center mb-8 bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                            <div className="flex items-center gap-4">
                                {path.length > 0 && <button onClick={() => navigateTo(path.slice(0, -1))} className="p-2 hover:bg-zinc-800 rounded-xl"><ArrowLeft/></button>}
                                <h1 className="text-xl font-black text-indigo-400 italic">PERIPLO HUB</h1>
                            </div>
                            <button onClick={() => setModals({activity: true})} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all">
                                <Plus size={18}/> Nueva Actividad
                            </button>
                        </header>

                        {/* Breadcrumbs */}
                        <div className="flex items-center gap-2 mb-8 text-xs font-bold text-zinc-500 tracking-widest uppercase">
                            <span onClick={() => navigateTo([])} className="cursor-pointer hover:text-white">INICIO</span>
                            {path.map((p, i) => (
                                <React.Fragment key={i}>
                                    <span>/</span>
                                    <span onClick={() => navigateTo(path.slice(0, i+1))} className="cursor-pointer hover:text-white">{p}</span>
                                </React.Fragment>
                            ))}
                        </div>

                        {/* Grid de Archivos */}
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                            {userFolders.map(f => (
                                <div key={f.id} onClick={() => navigateTo([...path, f.name])} className="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 flex flex-col items-center gap-3 cursor-pointer hover:scale-105 transition-all group">
                                    <Folder size={40} className="text-indigo-400 group-hover:fill-indigo-400/20 transition-all"/>
                                    <span className="font-bold text-sm truncate w-full text-center">{f.name}</span>
                                </div>
                            ))}

                            {userQuizzes.map(q => {
                                const info = GAME_TYPES.find(g => g.id === q.type) || GAME_TYPES[6];
                                return (
                                    <div key={q.id} className="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden hover:translate-y-[-4px] transition-all group relative">
                                        <div className={`h-20 ${info.color} flex items-center justify-center text-white`}>
                                            <info.icon size={28}/>
                                        </div>
                                        <div className="p-4 flex flex-col gap-1">
                                            <div className="font-bold text-xs truncate" title={q.title}>{q.title}</div>
                                            <div className="text-[10px] text-zinc-500 font-black uppercase tracking-tighter">{info.name}</div>
                                            
                                            {/* Tags de Taxonomía de Daniel */}
                                            {q.tags && (
                                                <div className="flex gap-1 mt-2 overflow-hidden">
                                                    <span className="text-[8px] bg-indigo-500/20 text-indigo-400 px-1.5 rounded uppercase font-bold">{q.tags.level}</span>
                                                    <span className="text-[8px] bg-zinc-800 text-zinc-400 px-1.5 rounded uppercase font-bold truncate">{q.tags.category}</span>
                                                </div>
                                            )}
                                        </div>

                                        {/* Botones de acción rápidos */}
                                        <div className="flex border-t border-zinc-800">
                                            <button onClick={() => window.location.href = getPlayLink(q)} className="flex-1 p-2 hover:bg-zinc-800 text-zinc-400 hover:text-white transition-colors border-r border-zinc-800">
                                                <Play size={14} className="mx-auto"/>
                                            </button>
                                            <button onClick={() => handleCopyLink(q)} className="flex-1 p-2 hover:bg-zinc-800 text-zinc-400 hover:text-emerald-400 transition-colors border-r border-zinc-800">
                                                <Link size={14} className="mx-auto"/>
                                            </button>
                                            <button onClick={async () => { if(confirm("¿Borrar?")) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', q.id), {isDeleted: true}) }} className="flex-1 p-2 hover:bg-zinc-800 text-zinc-400 hover:text-rose-400 transition-colors">
                                                <Trash2 size={14} className="mx-auto"/>
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

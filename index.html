<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periplo - Teacher Hub v20.2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, updateDoc } from 'firebase/firestore';
        // AQUÍ ESTABA EL ERROR: AGREGUÉ BOOKOPEN Y VERIFICQUÉ LOS DEMÁS
        import { Plus, Folder, X, LayoutGrid, Puzzle, Grid, ArrowLeft, Trash2, Edit2, Calendar, Users, Sun, Moon, Zap, Dices, Headphones, ListFilter, Target, BookOpen, CheckSquare, Check } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        const GAME_TYPES = [
            { id: 'FLASHCARDS', name: 'Flashcards', icon: LayoutGrid, color: 'bg-gradient-to-br from-indigo-500 to-purple-600', desc: 'Repaso con imágenes' }, 
            { id: 'ANAGRAM', name: 'Anagrama', icon: Puzzle, color: 'bg-gradient-to-br from-pink-500 to-rose-500', desc: 'Ordena las letras' },
            { id: 'CROSSWORD', name: 'Crucigrama', icon: Grid, color: 'bg-gradient-to-br from-emerald-400 to-teal-600', desc: 'Cruza tus palabras' },
            { id: 'CONNECT4', name: 'Connect 4', icon: Target, color: 'bg-gradient-to-br from-orange-400 to-amber-500', desc: 'Estrategia y Gramática' },
            { id: 'READING', name: 'Reading Builder', icon: BookOpen, color: 'bg-gradient-to-br from-cyan-500 to-blue-600', desc: 'Lecturas con IA' },
            { id: 'MATCH', name: 'Match Madness', icon: Zap, color: 'bg-gradient-to-br from-yellow-400 to-red-500', desc: 'Velocidad y Reflejos' },
            { id: 'LINGOMATCH', name: 'LingoMatch', icon: ListFilter, color: 'bg-gradient-to-br from-violet-500 to-indigo-600', desc: 'Emparejamiento Triple' },
            { id: 'UNO', name: 'UNO Builder', icon: Dices, color: 'bg-gradient-to-br from-blue-500 to-indigo-600', desc: 'Mazo con Gemini' },
            { id: 'LISTENING', name: 'Listening Builder', icon: Headphones, color: 'bg-gradient-to-br from-rose-500 to-pink-600', desc: 'YouGlish & YouTube' }
        ];

        function Dashboard() {
            const user = { uid: "teacher_builder_001" };
            const [path, setPath] = useState([]);
            const [userFolders, setUserFolders] = useState([]);
            const [userQuizzes, setUserQuizzes] = useState([]);
            const [modals, setModals] = useState({ activity: false });
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                const currentPath = path.join('/');
                const unsubF = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentPath)), (s) => {
                    setUserFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => !f.isDeleted));
                });
                const unsubQ = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('parentPath', '==', currentPath)), (s) => {
                    setUserQuizzes(s.docs.map(d => ({id: d.id, ...d.data()})).filter(q => !q.isDeleted));
                });
                return () => { unsubF(); unsubQ(); };
            }, [path]);

            const handleActivityClick = (id) => {
                const encodedFolder = encodeURIComponent(path.join('/'));
                const routes = {
                    'CONNECT4': 'dashboard-connect4.html',
                    'READING': 'dashboard-reading.html',
                    'MATCH': 'dashboard-match.html',
                    'LINGOMATCH': 'dashboard-lm.html',
                    'UNO': 'dashboard-uno.html',
                    'LISTENING': 'dashboard-listening.html'
                };
                window.location.href = `${routes[id] || 'dashboard.html'}?folder=${encodedFolder}`;
            };

            const getPlayLink = (q) => {
                const routes = {
                    'CONNECT4': 'connect4.html',
                    'READING': 'reading.html',
                    'MATCH': 'match.html',
                    'LINGOMATCH': 'lingomatch.html',
                    'UNO': 'uno.html',
                    'LISTENING': 'listening.html'
                };
                return `${routes[q.type] || 'activity.html'}?id=${q.id}`;
            };

            return (
                <div className={`min-h-screen bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300 pb-24 no-select ${isDarkMode ? 'dark' : ''}`}>
                    <div className="max-w-7xl mx-auto p-4 md:p-6 relative">
                        <div className="bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-zinc-800 mb-6 flex justify-between items-center relative z-20">
                            <h1 className="text-xl font-black italic text-indigo-600 dark:text-indigo-400">PERIPLO <span className="text-[10px] not-italic bg-indigo-100 dark:bg-indigo-900/50 px-2 rounded-full border border-indigo-200">v20.2</span></h1>
                            <div className="flex gap-2">
                                <a href="students.html" className="bg-white dark:bg-zinc-800 border-2 border-indigo-100 dark:border-zinc-700 text-indigo-600 dark:text-indigo-400 px-3 py-2 rounded-xl font-bold flex gap-2 text-sm items-center hover:bg-indigo-50 transition-all"><Users size={16}/> Alumnos</a>
                                <button onClick={() => setModals({activity: true})} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold flex gap-2 hover:bg-indigo-700 transition-all shadow-lg"><Plus size={16}/> Actividad</button>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400">{isDarkMode ? <Sun size={18}/> : <Moon size={18}/>}</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4">
                            {userQuizzes.map((q) => {
                                const info = GAME_TYPES.find(g => g.id === q.type) || GAME_TYPES[0];
                                return (
                                    <div key={q.id} onClick={() => window.location.href = getPlayLink(q)} className="relative aspect-[4/3] bg-white dark:bg-zinc-900 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-zinc-800 flex flex-col overflow-hidden group hover:scale-105 transition-all cursor-pointer">
                                        <div className={`w-full h-1/2 ${info.color} flex items-center justify-center text-white`}><info.icon size={24}/></div>
                                        <div className="p-3 text-center flex-1 flex flex-col justify-center">
                                            <div className="font-bold text-xs leading-tight line-clamp-2">{q.title}</div>
                                            <div className="text-[8px] font-black uppercase text-slate-400 mt-1">{info.name}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {modals.activity && (
                            <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md">
                                <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
                                    <div className="p-6 border-b dark:border-zinc-800 flex justify-between items-center">
                                        <h3 className="font-black text-2xl uppercase italic text-slate-800 dark:text-white">Selecciona el Motor</h3>
                                        <button onClick={() => setModals({activity: false})} className="p-2 hover:bg-rose-50 rounded-full text-slate-400 transition-colors"><X/></button>
                                    </div>
                                    <div className="p-8 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 overflow-y-auto">
                                        {GAME_TYPES.map(g => (
                                            <button key={g.id} onClick={() => handleActivityClick(g.id)} className="bg-slate-50 dark:bg-zinc-800 p-5 rounded-2xl border border-transparent hover:border-indigo-500 transition-all text-left flex gap-4 items-center group">
                                                <div className={`w-12 h-12 ${g.color} text-white rounded-xl flex items-center justify-center group-hover:scale-110 transition-all shadow-md`}><g.icon/></div>
                                                <div><div className="font-black uppercase text-sm text-slate-700 dark:text-zinc-100">{g.name}</div><div className="text-[10px] text-slate-500 uppercase font-bold">{g.desc}</div></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

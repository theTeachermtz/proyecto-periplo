<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periplo - Teacher Hub v20.2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Plus, Folder, X, LayoutGrid, Puzzle, Grid, ArrowLeft, Trash2, Edit2, AlertTriangle, Gamepad2, BookOpen, Calendar, Users, Sun, Moon, Zap, Dices, Headphones, Columns, CheckSquare, Search } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        const GAME_TYPES = [
            { id: 'FLASHCARDS', name: 'Flashcards', icon: LayoutGrid, color: 'bg-indigo-500', desc: 'Repaso visual' }, 
            { id: 'ANAGRAM', name: 'Anagrama', icon: Puzzle, color: 'bg-rose-500', desc: 'Ordena letras' },
            { id: 'MATCH', name: 'Match Madness', icon: Zap, color: 'bg-yellow-500', desc: 'Velocidad (2 col)' },
            { id: 'LINGOMATCH', name: 'LingoMatch', icon: Columns, color: 'bg-blue-600', desc: 'Gramática (3 col)' },
            { id: 'UNO', name: 'UNO Builder', icon: Dices, color: 'bg-indigo-600', desc: 'Mazo con IA' }
        ];

        function Dashboard() {
            const [path, setPath] = useState([]);
            const [quizzes, setQuizzes] = useState([]);
            const [folders, setFolders] = useState([]);
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'users', 'teacher_builder_001', 'quizzes'), where('parentPath', '==', path.join('/')));
                return onSnapshot(q, (s) => setQuizzes(s.docs.map(d => ({id: d.id, ...d.data()})).filter(q => !q.isDeleted)));
            }, [path]);

            const getPlayLink = (q) => {
                if (q.type === 'LINGOMATCH') return `lingomatch.html?id=${q.id}`;
                if (q.type === 'MATCH') return `match.html?id=${q.id}`;
                if (q.type === 'UNO') return `uno.html?id=${q.id}`;
                return `activity.html?id=${q.id}`;
            };

            const handleActivityClick = (e, g) => {
                const folder = encodeURIComponent(path.join('/'));
                if (g.id === 'LINGOMATCH') window.location.href = `dashboard-lm.html?folder=${folder}`;
                else if (g.id === 'MATCH') window.location.href = `dashboard-match.html?folder=${folder}`;
                else if (g.id === 'UNO') window.location.href = `dashboard-uno.html?folder=${folder}`;
            };

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 p-6">
                        <header className="flex justify-between items-center mb-8 bg-white dark:bg-zinc-900 p-4 rounded-2xl border border-slate-200 dark:border-zinc-800 shadow-sm">
                            <h1 className="text-xl font-black text-indigo-600 italic uppercase">PERIPLO <span className="text-zinc-400 not-italic text-xs ml-2">v20.2</span></h1>
                            <div className="flex gap-2">
                                <button onClick={() => window.location.reload()} className="p-2 bg-slate-100 dark:bg-zinc-800 rounded-xl"><Zap size={18}/></button>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 bg-slate-100 dark:bg-zinc-800 rounded-xl text-amber-500">{isDarkMode ? <Sun size={18}/> : <Moon size={18}/>}</button>
                            </div>
                        </header>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                            {GAME_TYPES.map(g => (
                                <button key={g.id} onClick={(e) => handleActivityClick(e, g)} className="bg-white dark:bg-zinc-900 p-4 rounded-2xl border border-slate-200 dark:border-zinc-800 hover:scale-105 transition-all text-left">
                                    <div className={`${g.color} w-10 h-10 rounded-xl flex items-center justify-center text-white mb-3 shadow-lg`}><g.icon size={20}/></div>
                                    <div className="font-bold text-sm dark:text-white">{g.name}</div>
                                </button>
                            ))}
                        </div>
                        <div className="mt-12 grid grid-cols-2 md:grid-cols-4 gap-4">
                            {quizzes.map(q => (
                                <div key={q.id} className="bg-white dark:bg-zinc-900 p-4 rounded-2xl border border-slate-200 dark:border-zinc-800 group relative">
                                    <div className="font-bold text-sm mb-1 truncate dark:text-white">{q.title}</div>
                                    <div className="text-[10px] text-slate-400 font-black uppercase tracking-widest">{q.type}</div>
                                    <a href={getPlayLink(q)} className="absolute inset-0 z-0"></a>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>

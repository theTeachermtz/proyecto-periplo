<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Periplo Hub | Panel de Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Calendar, Users, Target, BookOpen, Sun, Moon, ArrowRight, Compass } from 'lucide-react';

        const MainHub = () => {
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
            }, []);

            useEffect(() => { 
                document.documentElement.classList.toggle('dark', isDarkMode); 
            }, [isDarkMode]);

            const toggleTheme = () => { 
                setIsDarkMode(!isDarkMode); 
                localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); 
            };

            const TOOLS = [
                {
                    id: 'schedule',
                    title: 'Master Schedule',
                    desc: 'Agenda global, horarios, excepciones y empalmes de clases.',
                    icon: Calendar,
                    color: 'from-teal-500 to-emerald-500',
                    link: 'dashboard-schedule.html',
                    tag: 'Operativo'
                },
                {
                    id: 'students',
                    title: 'Directorio de Alumnos',
                    desc: 'Gestión de perfiles, niveles (VIP/Limbo), colores y folios.',
                    icon: Users,
                    color: 'from-indigo-500 to-blue-600',
                    link: 'students.html',
                    tag: 'Gestión'
                },
                {
                    id: 'evaluations',
                    title: 'Centro de Evaluaciones',
                    desc: 'Skill Trees, análisis de arquetipos y progreso detallado.',
                    icon: Target,
                    color: 'from-rose-500 to-pink-600',
                    link: 'evaluaciones.html',
                    tag: 'Pedagogía'
                },
                {
                    id: 'reading',
                    title: 'Reading Builder',
                    desc: 'Generador de lecturas IA con huecos interactivos y Q&A.',
                    icon: BookOpen,
                    color: 'from-amber-500 to-orange-600',
                    link: 'dashboard-reading.html',
                    tag: 'Contenido'
                }
            ];

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden">
                    {/* Background decorativo */}
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-teal-500/10 blur-[100px] rounded-full pointer-events-none"></div>

                    <header className="relative z-10 p-6 sm:p-10 flex justify-between items-center max-w-7xl mx-auto w-full">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl shadow-xl">
                                <Compass size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight">PERIPLO</h1>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Teacher Hub</p>
                            </div>
                        </div>
                        <button onClick={toggleTheme} className="p-3 rounded-full bg-white dark:bg-zinc-900 shadow-sm border border-slate-200 dark:border-zinc-800 text-slate-600 dark:text-amber-400 hover:scale-105 transition-transform">
                            {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                        </button>
                    </header>

                    <main className="flex-1 relative z-10 max-w-7xl mx-auto w-full px-6 sm:px-10 pb-20 flex flex-col justify-center">
                        <div className="mb-12">
                            <h2 className="text-4xl sm:text-5xl font-black mb-4 text-slate-800 dark:text-white">Bienvenido, Capi.</h2>
                            <p className="text-lg text-slate-500 dark:text-zinc-400 font-medium max-w-2xl">¿Qué vamos a gestionar hoy? Selecciona una herramienta de tu ecosistema para comenzar.</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {TOOLS.map((tool) => (
                                <a 
                                    key={tool.id} 
                                    href={tool.link}
                                    className="group relative bg-white dark:bg-zinc-900 rounded-[2rem] p-8 border border-slate-200 dark:border-zinc-800 shadow-sm hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 overflow-hidden flex flex-col justify-between min-h-[240px]"
                                >
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br opacity-10 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-150 duration-500"></div>
                                    
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start mb-6">
                                            <div className={`p-4 rounded-2xl bg-gradient-to-br ${tool.color} text-white shadow-lg`}>
                                                <tool.icon size={28} />
                                            </div>
                                            <span className="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 border border-slate-200 dark:border-zinc-700">
                                                {tool.tag}
                                            </span>
                                        </div>
                                        <h3 className="text-2xl font-black mb-2 text-slate-800 dark:text-white">{tool.title}</h3>
                                        <p className="text-slate-500 dark:text-zinc-400 font-medium leading-relaxed">{tool.desc}</p>
                                    </div>

                                    <div className="relative z-10 mt-8 flex items-center gap-2 text-sm font-black uppercase tracking-widest opacity-60 group-hover:opacity-100 group-hover:text-indigo-500 transition-all">
                                        Abrir Módulo <ArrowRight size={16} className="group-hover:translate-x-2 transition-transform"/>
                                    </div>
                                </a>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MainHub />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periplo - Teacher Hub v21.2 (Student Visibility)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (window.location.search.includes('undefined') || window.location.search.includes('null')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="https://esm.sh/run"></script>
    
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .drag-over-breadcrumb { background-color: rgba(99, 102, 241, 0.2); border-radius: 0.5rem; padding: 0 0.5rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
        .btn-juicy { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), filter 0.1s; }
        .btn-juicy:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, Component, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, doc, deleteDoc, updateDoc, getDocs } from 'firebase/firestore';
        
        // ✅ NUEVO: Eye y EyeOff agregados para el botón de visibilidad para alumnos
        import { Plus, Folder, X, LayoutGrid, Puzzle, Grid, ArrowLeft, Trash2, Copy, Edit2, AlertTriangle, Map as MapIcon, Gamepad2, BookOpen, Calendar, Users, Sun, Moon, Zap, Dices, RotateCcw, LifeBuoy, CheckSquare, Check, FolderInput, ChevronRight, CheckCircle2, Headphones, ListFilter, Target, Play, Layers, Smartphone, Link, Search, Presentation, ArrowDownCircle, HelpCircle, Wand2, Mic, Shuffle, MessageSquare, Eye, EyeOff } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'periplo-app-v1';

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 text-center bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100">
                        <AlertTriangle size={48} className="text-rose-500 mb-4"/>
                        <h2 className="text-2xl font-black mb-2">Algo salió mal</h2>
                        <p className="text-slate-500 dark:text-zinc-400 mb-6">Ocurrió un error inesperado en la interfaz.</p>
                        <button onClick={() => window.location.reload()} className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold">Recargar página</button>
                    </div>
                );
                return this.props.children;
            }
        }

        // ============================================================
        // CONSTANTS
        // ============================================================
        const FOLDER_PALETTE = [
            'bg-indigo-400 text-white', 'bg-violet-400 text-white', 'bg-sky-400 text-white',
            'bg-emerald-400 text-white', 'bg-amber-400 text-white', 'bg-rose-400 text-white',
            'bg-pink-400 text-white', 'bg-teal-400 text-white', 'bg-orange-400 text-white',
            'bg-slate-400 text-white', 'bg-zinc-600 text-white', 'bg-lime-400 text-white'
        ];

        const GAME_TYPES = [
            { id: 'BOARDGAME_BANK', name: 'Boardgame Bank', icon: Dices, color: 'bg-gradient-to-br from-blue-500 to-indigo-600', desc: 'Para Periplo Party o Connect 4', dashboardUrl: 'dashboard-bg.html' },
            { id: 'FLASHCARDS',     name: 'Flashcards',     icon: Layers, color: 'bg-gradient-to-br from-sky-500 to-cyan-600', desc: 'Tarjetas de vocabulario', dashboardUrl: 'dashboard-fc.html' },
            { id: 'MEMORAMA',       name: 'Memorama',       icon: Grid, color: 'bg-gradient-to-br from-emerald-500 to-teal-600', desc: 'Juego de memoria por pares', dashboardUrl: 'dashboard-fc.html' },
            { id: 'CROSSWORD',      name: 'Crucigrama',     icon: Puzzle, color: 'bg-gradient-to-br from-amber-500 to-orange-600', desc: 'Crucigrama interactivo', dashboardUrl: 'dashboard-fc.html' },
            { id: 'ANAGRAM',        name: 'Anagrama',       icon: Shuffle, color: 'bg-gradient-to-br from-pink-500 to-rose-600', desc: 'Ordena las letras', dashboardUrl: 'dashboard-fc.html' },
            { id: 'EMOJISPELL',     name: 'Emoji Spell',    icon: Zap, color: 'bg-gradient-to-br from-yellow-400 to-amber-500', desc: 'Adivina por emojis', dashboardUrl: 'dashboard-fc.html' },
            { id: 'MATCH',          name: 'Match Game',     icon: CheckSquare, color: 'bg-gradient-to-br from-violet-500 to-purple-600', desc: 'Relaciona columnas', dashboardUrl: 'dashboard-match.html' },
            { id: 'LINGOMATCH',     name: 'LingoMatch',     icon: Zap, color: 'bg-gradient-to-br from-fuchsia-500 to-pink-600', desc: 'Triadas de vocabulario', dashboardUrl: 'dashboard-lm.html' },
            { id: 'WordCascade',    name: 'Word Cascade',   icon: ArrowDownCircle, color: 'bg-gradient-to-br from-cyan-500 to-sky-600', desc: 'Palabras en cascada', dashboardUrl: 'dashboard-wc.html' },
            { id: 'READING',        name: 'Reading',        icon: BookOpen, color: 'bg-gradient-to-br from-lime-500 to-green-600', desc: 'Comprensión lectora', dashboardUrl: 'dashboard-reading.html' },
            { id: 'LISTENING',      name: 'Listening',      icon: Headphones, color: 'bg-gradient-to-br from-teal-500 to-emerald-600', desc: 'Actividad de escucha', dashboardUrl: 'dashboard-listening.html' },
            { id: 'TALKTIME',       name: 'Talk Time',      icon: MessageSquare, color: 'bg-gradient-to-br from-sky-400 to-blue-500', desc: 'Conversación guiada', dashboardUrl: 'dashboard-tt.html' },
            { id: 'NEVEREVER',      name: 'Never Ever',     icon: HelpCircle, color: 'bg-gradient-to-br from-fuchsia-400 to-violet-500', desc: 'Juego Never Have I Ever', dashboardUrl: 'dashboard-ne.html' },
            { id: 'PHONECHAT',      name: 'Phone Chat',     icon: Smartphone, color: 'bg-gradient-to-br from-green-500 to-emerald-600', desc: 'Chat estilo teléfono', dashboardUrl: 'dashboard-pc.html' },
            { id: 'UNO',            name: 'Periplo UNO',    icon: Layers, color: 'bg-gradient-to-br from-red-500 to-rose-600', desc: 'Juego estilo UNO', dashboardUrl: 'dashboard-uno.html' },
            { id: 'PRESENTATION',   name: 'Presentación',   icon: Presentation, color: 'bg-gradient-to-br from-indigo-500 to-blue-600', desc: 'Slides interactivas', dashboardUrl: 'dashboard-presentations.html' },
        ];

        // ============================================================
        // MAIN DASHBOARD COMPONENT
        // ============================================================
        const Dashboard = () => {
            const user = { uid: "teacher_builder_001" };
            const [path, setPath] = useState([]);
            const [userFolders, setUserFolders] = useState([]);
            const [userQuizzes, setUserQuizzes] = useState([]);
            const [trashItems, setTrashItems] = useState({ folders: [], quizzes: [] }); 
            const [modals, setModals] = useState({ folder: false, activity: false, trash: false });
            const [boardgameModal, setBoardgameModal] = useState({ isOpen: false, quiz: null, action: 'play' });
            const [editingFolder, setEditingFolder] = useState(null);
            const [folderForm, setFolderForm] = useState({ name: '', colorClass: FOLDER_PALETTE[0] });
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [selectedItems, setSelectedItems] = useState([]);
            const [isSelecting, setIsSelecting] = useState(false);
            const [moveModalOpen, setMoveModalOpen] = useState(false);
            const [moveTarget, setMoveTarget] = useState([]); 
            const [moveModalFolders, setMoveModalFolders] = useState([]); 
            const [undoAction, setUndoAction] = useState(null);
            const undoTimeoutRef = useRef(null);
            const [isRescuing, setIsRescuing] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
                else setIsDarkMode(true);
                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                if (folderParam && folderParam !== 'undefined' && folderParam !== 'null') setPath(decodeURIComponent(folderParam).split('/'));
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const currentPath = path.join('/');
                const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentPath));
                const unsubF = onSnapshot(qF, (s) => {
                    setUserFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.isDeleted !== true));
                });
                const qQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('parentPath', '==', currentPath));
                const unsubQ = onSnapshot(qQ, (s) => {
                    setUserQuizzes(s.docs.map(d => ({id: d.id, ...d.data()})).filter(q => q.isDeleted !== true));
                });
                const qTrashF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('isDeleted', '==', true));
                const unsubTrashF = onSnapshot(qTrashF, (s) => setTrashItems(prev => ({...prev, folders: s.docs.map(d => ({id: d.id, ...d.data()}))})));
                const qTrashQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'), where('isDeleted', '==', true));
                const unsubTrashQ = onSnapshot(qTrashQ, (s) => setTrashItems(prev => ({...prev, quizzes: s.docs.map(d => ({id: d.id, ...d.data()}))})));
                return () => { unsubF(); unsubQ(); unsubTrashF(); unsubTrashQ(); };
            }, [path]);

            useEffect(() => {
                if (!moveModalOpen) return;
                const currentMovePath = moveTarget.join('/');
                const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), where('parentPath', '==', currentMovePath));
                const unsubF = onSnapshot(qF, (s) => {
                    setMoveModalFolders(s.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.isDeleted !== true));
                });
                return () => unsubF();
            }, [moveTarget, moveModalOpen]);

            useEffect(() => {
                let scrollInterval = null;
                const handleDragOverEdge = (e) => {
                    const threshold = 150; 
                    const speed = 25; 
                    const clientY = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : null);
                    if (clientY === null) return;
                    if (clientY < threshold) { scrollInterval = setInterval(() => window.scrollBy(0, -speed), 50); }
                    else if (clientY > window.innerHeight - threshold) { scrollInterval = setInterval(() => window.scrollBy(0, speed), 50); }
                };
                const handleDragEnd = () => { if (scrollInterval) clearInterval(scrollInterval); };
                window.addEventListener('dragover', handleDragOverEdge);
                window.addEventListener('dragend', handleDragEnd);
                return () => { window.removeEventListener('dragover', handleDragOverEdge); window.removeEventListener('dragend', handleDragEnd); if (scrollInterval) clearInterval(scrollInterval); };
            }, []);

            const triggerUndo = (message, undoFn) => {
                if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
                setUndoAction({ message, undoFn });
                undoTimeoutRef.current = setTimeout(() => setUndoAction(null), 5000);
            };

            const navigateTo = (newPath) => {
                setPath(newPath);
                const url = newPath.length > 0 ? `?folder=${encodeURIComponent(newPath.join('/'))}` : window.location.pathname;
                window.history.pushState({}, '', url);
            };

            const handleFolderClick = (e, f) => {
                if (e.target.closest('button') || e.target.closest('.select-box')) return;
                if (isSelecting || selectedItems.length > 0) { toggleSelect(e, f, 'folder'); return; }
                navigateTo([...path, f.name]);
            };

            const openFolderModal = (folder = null) => {
                if (folder) {
                    setEditingFolder(folder);
                    setFolderForm({ name: folder.name, colorClass: folder.colorClass || FOLDER_PALETTE[0] });
                } else {
                    setEditingFolder(null);
                    setFolderForm({ name: '', colorClass: FOLDER_PALETTE[0] });
                }
                setModals({...modals, folder: true});
            };

            const saveFolder = async () => {
                if (!folderForm.name.trim()) return;
                try {
                    if (editingFolder) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'folders', editingFolder.id), { name: folderForm.name.trim(), colorClass: folderForm.colorClass });
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'), { name: folderForm.name.trim(), colorClass: folderForm.colorClass, parentPath: path.join('/'), createdAt: serverTimestamp(), isDeleted: false });
                    }
                    setModals({...modals, folder: false});
                } catch(e) { alert(e.message); }
            };

            const deleteFolder = async (e, folder) => {
                e.preventDefault(); e.stopPropagation();
                const folderRef = doc(db, 'artifacts', appId, 'users', user.uid, 'folders', folder.id);
                await updateDoc(folderRef, { isDeleted: true });
                triggerUndo(`Carpeta "${folder.name}" enviada a papelera`, async () => {
                    await updateDoc(folderRef, { isDeleted: false });
                });
            };

            const handleDeleteActivity = async (e, quiz) => {
                e.preventDefault(); e.stopPropagation();
                const quizRef = doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', quiz.id);
                await updateDoc(quizRef, { isDeleted: true });
                triggerUndo(`Actividad "${quiz.title}" enviada a papelera`, async () => {
                    await updateDoc(quizRef, { isDeleted: false });
                });
            };

            const restoreItem = async (id, type) => {
                const colName = type === 'folder' ? 'folders' : 'quizzes';
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, colName, id), { isDeleted: false });
            };

            const permanentDelete = async (id, type) => {
                if(confirm("¿Eliminar PERMANENTEMENTE? Esto no se puede deshacer.")) {
                    const colName = type === 'folder' ? 'folders' : 'quizzes';
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, colName, id));
                }
            };

            const rescueAllFiles = async () => {
                if(!confirm("Esto enviará TODAS tus carpetas y actividades a la pantalla de INICIO. ¿Estás seguro?")) return;
                setIsRescuing(true);
                try {
                    const qF = query(collection(db, 'artifacts', appId, 'users', user.uid, 'folders'));
                    const snapF = await getDocs(qF);
                    const updatePromises = [];
                    snapF.forEach(d => {
                        if (d.data().isDeleted !== true && d.data().parentPath !== "") {
                            updatePromises.push(updateDoc(d.ref, { parentPath: "" }));
                        }
                    });
                    const qQ = query(collection(db, 'artifacts', appId, 'users', user.uid, 'quizzes'));
                    const snapQ = await getDocs(qQ);
                    snapQ.forEach(d => {
                        if (d.data().isDeleted !== true && d.data().parentPath !== "") {
                            updatePromises.push(updateDoc(d.ref, { parentPath: "" }));
                        }
                    });
                    await Promise.all(updatePromises);
                    setModals({...modals, trash: false});
                    navigateTo([]);
                    alert("¡Rescate completo! Todos tus archivos han vuelto a la página de INICIO.");
                } catch(e) { alert(e.message); }
                setIsRescuing(false);
            };

            const toggleTheme = () => {
                const newMode = !isDarkMode;
                setIsDarkMode(newMode);
                localStorage.setItem('themePreference', newMode ? 'dark' : 'light'); 
            };

            const toggleSelect = (e, item, type) => {
                e.stopPropagation(); e.preventDefault();
                const exists = selectedItems.find(i => i.id === item.id);
                if (exists) setSelectedItems(selectedItems.filter(i => i.id !== item.id));
                else setSelectedItems([...selectedItems, {id: item.id, type, name: item.name || item.title}]);
            };

            const handleDragStart = (e, id, type) => { 
                let payload = [{id, type}];
                if (selectedItems.find(i => i.id === id)) payload = selectedItems;
                e.dataTransfer.setData('payload', JSON.stringify(payload)); 
            };

            const handleDropOnTarget = async (e, newParentPath, targetId = null) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over-breadcrumb');
                const payloadStr = e.dataTransfer.getData('payload');
                if (!payloadStr) return;
                const payload = JSON.parse(payloadStr);
                const oldParentPath = path.join('/');
                if (newParentPath === oldParentPath) return;
                if (payload.some(item => item.type === 'folder' && item.id === targetId)) return;
                try { 
                    const updatePromises = payload.map(item => {
                        const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                        return updateDoc(ref, { parentPath: newParentPath });
                    });
                    await Promise.all(updatePromises);
                    triggerUndo(`${payload.length} elemento(s) movido(s)`, async () => { 
                        const undoPromises = payload.map(item => {
                            const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                            return updateDoc(ref, { parentPath: oldParentPath });
                        });
                        await Promise.all(undoPromises);
                    });
                    setSelectedItems([]);
                    setIsSelecting(false);
                } catch (err) { alert(err.message); }
            };

            const handleDeleteSelected = async () => {
                if(!confirm(`¿Enviar ${selectedItems.length} elemento(s) a la papelera?`)) return;
                try {
                    const updatePromises = selectedItems.map(item => {
                        const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                        return updateDoc(ref, { isDeleted: true });
                    });
                    await Promise.all(updatePromises);
                    triggerUndo(`${selectedItems.length} elemento(s) a papelera`, async () => {
                        const undoPromises = selectedItems.map(item => {
                            const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                            return updateDoc(ref, { isDeleted: false });
                        });
                        await Promise.all(undoPromises);
                    });
                    setSelectedItems([]);
                    setIsSelecting(false);
                } catch(err) { alert(err.message); }
            };

            const openMoveModal = () => {
                setMoveTarget([...path]); 
                setMoveModalOpen(true);
            };

            const executeMoveModal = async () => {
                const newParentPath = moveTarget.join('/');
                const oldParentPath = path.join('/');
                if (newParentPath === oldParentPath) { setMoveModalOpen(false); return; }
                try {
                    const updatePromises = selectedItems.map(item => {
                        const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                        return updateDoc(ref, { parentPath: newParentPath });
                    });
                    await Promise.all(updatePromises);
                    triggerUndo(`${selectedItems.length} elemento(s) movido(s)`, async () => {
                        const undoPromises = selectedItems.map(item => {
                            const ref = doc(db, 'artifacts', appId, 'users', user.uid, item.type === 'folder' ? 'folders' : 'quizzes', item.id);
                            return updateDoc(ref, { parentPath: oldParentPath });
                        });
                        await Promise.all(undoPromises);
                    });
                    setSelectedItems([]);
                    setIsSelecting(false);
                    setMoveModalOpen(false);
                } catch(err) { alert(err.message); }
            };

            // ============================================================
            // PLAY LINK ROUTER — igual que siempre
            // ============================================================
            const getPlayLink = (q, isStudent = false) => {
                const param = isStudent ? '&student=true' : '';
                if (['PHONECHAT', 'AUDIOTRANSLATOR', 'VOICEREPLY'].includes(q.type)) {
                    const mode = q.content?.gameMode || 'typing';
                    if (mode === 'unscramble') return `audiotranslator.html?id=${q.id}${param}`;
                    if (mode === 'voice') return `voicereply.html?id=${q.id}${param}`;
                    return `phonechat.html?id=${q.id}${param}`;
                }
                if (q.type === 'READING') return `reading.html?id=${q.id}${param}`;
                if (q.type === 'MATCH') return `match.html?id=${q.id}${param}`;
                if (q.type === 'LINGOMATCH') return `lingomatch.html?id=${q.id}${param}`;
                if (q.type === 'WordCascade') return `wordcascade.html?id=${q.id}${param}`;
                if (q.type === 'NEVEREVER') return `neverever.html?id=${q.id}${param}`;
                if (q.type === 'TALKTIME') return `talktime.html?id=${q.id}${param}`;
                if (q.type === 'UNO') return `uno.html?id=${q.id}${param}`;
                if (q.type === 'LISTENING') return `listening.html?id=${q.id}${param}`;
                if (q.type === 'FLASHCARDS') return `flashcards.html?id=${q.id}${param}`; 
                if (q.type === 'CROSSWORD') return `crossword.html?id=${q.id}${param}`;   
                if (q.type === 'ANAGRAM') return `anagram.html?id=${q.id}${param}`;        
                if (q.type === 'MEMORAMA') return `memorama.html?id=${q.id}${param}`;
                if (q.type === 'EMOJISPELL') return `emojispell.html?id=${q.id}${param}`;
                if (q.type === 'PRESENTATION') return `presentations.html?id=${q.id}${param}`;
                return `activity.html?id=${q.id}${param}`;
            };

            const handleQuizClick = (e, q) => {
                if (e.target.closest('button') || e.target.closest('.select-box')) return; 
                if (isSelecting || selectedItems.length > 0) { toggleSelect(e, q, 'quiz'); return; }
                if (q.type === 'BOARDGAME_BANK' || q.type === 'CONNECT4') {
                    setBoardgameModal({ isOpen: true, quiz: q, action: 'play' });
                    return;
                }
                const link = getPlayLink(q);
                if (e.ctrlKey || e.metaKey) window.open(link, '_blank');
                else window.location.href = link;
            };

            const handleEditActivity = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                const encodedFolder = encodeURIComponent(path.join('/'));
                if (['PHONECHAT', 'AUDIOTRANSLATOR', 'VOICEREPLY'].includes(q.type)) window.location.href = `dashboard-pc.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'CONNECT4' || q.type === 'BOARDGAME_BANK') window.location.href = `dashboard-bg.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'READING') window.location.href = `dashboard-reading.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'MATCH') window.location.href = `dashboard-match.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'LINGOMATCH') window.location.href = `dashboard-lm.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'WordCascade') window.location.href = `dashboard-wc.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'NEVEREVER') window.location.href = `dashboard-ne.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'TALKTIME') window.location.href = `dashboard-tt.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'UNO') window.location.href = `dashboard-uno.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'LISTENING') window.location.href = `dashboard-listening.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (q.type === 'PRESENTATION') window.location.href = `dashboard-presentations.html?edit=${q.id}&folder=${encodedFolder}`;
                else if (['FLASHCARDS', 'CROSSWORD', 'ANAGRAM', 'MEMORAMA', 'EMOJISPELL'].includes(q.type)) window.location.href = `dashboard-fc.html?edit=${q.id}&folder=${encodedFolder}`; 
                else alert("Editor no disponible en esta versión para este juego.");
            };

            const handleTransformActivity = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                window.location.href = `activity.html?id=${q.id}`;
            };

            const handleCopyLink = (e, q) => {
                e.preventDefault(); e.stopPropagation();
                if (q.type === 'BOARDGAME_BANK' || q.type === 'CONNECT4') {
                    setBoardgameModal({ isOpen: true, quiz: q, action: 'copy' });
                    return;
                }
                const fullLink = window.location.origin + window.location.pathname.replace('index.html', '') + getPlayLink(q, true);
                navigator.clipboard.writeText(fullLink).then(() => {
                    triggerUndo(`✅ Link copiado al portapapeles. ¡Pégalo a tus alumnos!`, null);
                }).catch(err => {
                    alert("No se pudo copiar el link automáticamente.\n\n" + fullLink);
                });
            };

            // ============================================================
            // ✅ NUEVO: Toggle de visibilidad para alumnos
            // Escribe studentVisible: true/false en Firestore.
            // Students_portal.html lee este campo para mostrar los juegos.
            // ============================================================
            const handleToggleStudentVisibility = async (e, q) => {
                e.preventDefault(); e.stopPropagation();
                const newVal = !q.studentVisible;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'quizzes', q.id), { studentVisible: newVal });
                    triggerUndo(
                        newVal 
                            ? `👁️ "${q.title}" ahora visible en el portal de alumnos` 
                            : `🙈 "${q.title}" oculto del portal de alumnos`,
                        null
                    );
                } catch(err) { alert("Error al cambiar visibilidad: " + err.message); }
            };

            // ============================================================
            // SEARCH FILTER
            // ============================================================
            const filteredFolders = searchQuery.trim()
                ? userFolders.filter(f => f.name?.toLowerCase().includes(searchQuery.toLowerCase()))
                : userFolders;

            const filteredQuizzes = searchQuery.trim()
                ? userQuizzes.filter(q => q.title?.toLowerCase().includes(searchQuery.toLowerCase()) || q.type?.toLowerCase().includes(searchQuery.toLowerCase()) || q.tags?.topic?.toLowerCase().includes(searchQuery.toLowerCase()))
                : userQuizzes;

            // ============================================================
            // SELECT OVERLAY COMPONENT
            // ============================================================
            const SelectOverlay = ({ item, type }) => (
                isSelecting || selectedItems.length > 0 ? (
                    <div onClick={(e) => toggleSelect(e, item, type)} className={`select-box absolute inset-0 z-20 flex items-center justify-center rounded-[1.5rem] cursor-pointer transition-all ${selectedItems.find(i => i.id === item.id) ? 'bg-indigo-500/30 border-2 border-indigo-500' : 'bg-black/10 border-2 border-transparent hover:border-indigo-300'}`}>
                        {selectedItems.find(i => i.id === item.id) && (
                            <div className="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center shadow-lg">
                                <Check size={16} className="text-white"/>
                            </div>
                        )}
                    </div>
                ) : null
            );

            return (
                <div className={`min-h-screen ${isDarkMode ? 'dark' : ''}`}>
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors">

                    {/* UNDO TOAST */}
                    {undoAction && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 font-bold text-sm border border-zinc-700 dark:border-zinc-200 animate-in fade-in slide-in-from-bottom-4">
                            <span>{undoAction.message}</span>
                            {undoAction.undoFn && (
                                <button onClick={async () => { await undoAction.undoFn(); setUndoAction(null); }} className="ml-2 px-3 py-1 bg-indigo-500 text-white rounded-lg text-xs font-black hover:bg-indigo-400 transition-colors">
                                    DESHACER
                                </button>
                            )}
                            <button onClick={() => setUndoAction(null)} className="text-zinc-400 dark:text-zinc-500 hover:text-white dark:hover:text-zinc-900"><X size={14}/></button>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="sticky top-0 z-40 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-slate-200 dark:border-zinc-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3">

                            {/* LOGO */}
                            <div
                                onClick={() => navigateTo([])}
                                onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over-breadcrumb'); }}
                                onDragLeave={(e) => e.currentTarget.classList.remove('drag-over-breadcrumb')}
                                onDrop={(e) => handleDropOnTarget(e, '')}
                                className="flex items-center gap-2 cursor-pointer shrink-0 group"
                                title="Inicio"
                            >
                                <div className="bg-indigo-600 group-hover:bg-indigo-500 transition-colors p-2 rounded-xl text-white shadow-md">
                                    <MapIcon size={16}/>
                                </div>
                                <span className="font-black text-base text-slate-800 dark:text-white tracking-tight hidden sm:inline">Periplo</span>
                            </div>

                            {/* SEPARADOR */}
                            {path.length > 0 && <ChevronRight size={14} className="text-slate-300 dark:text-zinc-600 shrink-0"/>}

                            {/* BREADCRUMB */}
                            <div className="flex items-center gap-1 flex-1 min-w-0 overflow-x-auto no-scrollbar">
                                {path.map((segment, i) => (
                                    <React.Fragment key={i}>
                                        <span
                                            onClick={() => navigateTo(path.slice(0, i + 1))}
                                            onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over-breadcrumb'); }}
                                            onDragLeave={(e) => e.currentTarget.classList.remove('drag-over-breadcrumb')}
                                            onDrop={(e) => handleDropOnTarget(e, path.slice(0, i + 1).join('/'))}
                                            className="font-bold text-sm cursor-pointer hover:text-indigo-500 transition-colors shrink-0 whitespace-nowrap px-1"
                                        >{segment}</span>
                                        {i < path.length - 1 && <ChevronRight size={14} className="text-slate-300 dark:text-zinc-600 shrink-0"/>}
                                    </React.Fragment>
                                ))}
                            </div>

                            {/* SEARCH */}
                            <div className="relative hidden sm:flex items-center">
                                <Search size={14} className="absolute left-3 text-slate-400 dark:text-zinc-500 pointer-events-none"/>
                                <input
                                    type="text"
                                    placeholder="Buscar..."
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                    className="pl-8 pr-3 py-2 bg-slate-100 dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 rounded-xl text-sm font-bold outline-none focus:border-indigo-500 w-40 focus:w-56 transition-all text-slate-800 dark:text-zinc-100 placeholder-slate-400 dark:placeholder-zinc-600"
                                />
                            </div>

                            {/* ACTIONS */}
                            <div className="flex items-center gap-2 shrink-0">

                                {/* Ir a Alumnos */}
                                <button onClick={() => window.location.href='students.html'} title="Base de datos de alumnos" className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors">
                                    <Users size={16}/>
                                </button>

                                {/* Ir a Schedule */}
                                <button onClick={() => window.location.href='dashboard-schedule.html'} title="Agenda de clases" className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 hover:text-teal-500 hover:bg-teal-50 dark:hover:bg-teal-900/20 transition-colors">
                                    <Calendar size={16}/>
                                </button>

                                <button onClick={toggleTheme} className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 hover:text-indigo-500 transition-colors" title="Cambiar tema">
                                    {isDarkMode ? <Sun size={16}/> : <Moon size={16}/>}
                                </button>
                                <button onClick={() => setModals({...modals, trash: true})} className="p-2 rounded-xl bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 hover:text-rose-500 transition-colors relative" title="Papelera">
                                    <Trash2 size={16}/>
                                    {(trashItems.folders.length + trashItems.quizzes.length) > 0 && (
                                        <span className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 rounded-full text-[9px] text-white font-black flex items-center justify-center">
                                            {trashItems.folders.length + trashItems.quizzes.length}
                                        </span>
                                    )}
                                </button>
                                <button onClick={() => openFolderModal()} className="flex items-center gap-1.5 px-3 py-2 bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl font-bold text-sm transition-colors">
                                    <Folder size={14}/> <span className="hidden sm:inline">Carpeta</span>
                                </button>
                                <button onClick={() => setModals({...modals, activity: true})} className="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm transition-colors shadow-lg shadow-indigo-500/20">
                                    <Plus size={14}/> <span className="hidden sm:inline">Actividad</span>
                                </button>
                            </div>
                        </div>

                        {/* SELECTION BAR */}
                        {(isSelecting || selectedItems.length > 0) && (
                            <div className="bg-indigo-600 text-white px-4 py-2 flex items-center justify-between gap-2">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => { setIsSelecting(false); setSelectedItems([]); }} className="p-1 hover:bg-indigo-500 rounded-lg transition-colors"><X size={16}/></button>
                                    <span className="font-bold text-sm">{selectedItems.length} seleccionado(s)</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={openMoveModal} disabled={selectedItems.length === 0} className="flex items-center gap-1 px-3 py-1.5 bg-indigo-500 hover:bg-indigo-400 disabled:opacity-50 rounded-lg font-bold text-xs transition-colors"><FolderInput size={14}/> Mover</button>
                                    <button onClick={handleDeleteSelected} disabled={selectedItems.length === 0} className="flex items-center gap-1 px-3 py-1.5 bg-rose-600 hover:bg-rose-500 disabled:opacity-50 rounded-lg font-bold text-xs transition-colors"><Trash2 size={14}/> Eliminar</button>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">

                        {/* EMPTY STATE */}
                        {filteredFolders.length === 0 && filteredQuizzes.length === 0 && (
                            <div className="text-center py-24 fade-in">
                                <div className="text-6xl mb-4">{searchQuery ? '🔍' : '📂'}</div>
                                <h3 className="font-black text-xl text-slate-400 dark:text-zinc-500 mb-2">
                                    {searchQuery ? 'Sin resultados' : path.length > 0 ? 'Carpeta vacía' : 'Tu Hub está vacío'}
                                </h3>
                                <p className="text-slate-400 dark:text-zinc-600 text-sm mb-6">
                                    {searchQuery ? `No se encontró "${searchQuery}"` : 'Crea tu primera actividad o carpeta'}
                                </p>
                                {!searchQuery && (
                                    <button onClick={() => setModals({...modals, activity: true})} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black transition-colors shadow-lg">
                                        <Plus size={16} className="inline mr-2"/> Nueva Actividad
                                    </button>
                                )}
                            </div>
                        )}

                        {/* ── GRID: carpetas y actividades, mismo tamaño cuadrado ── */}
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-2.5 fade-in">

                            {/* FOLDERS */}
                            {filteredFolders.map((f) => (
                                <div
                                    key={f.id}
                                    draggable
                                    onDragStart={(e) => handleDragStart(e, f.id, 'folder')}
                                    onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); e.currentTarget.style.opacity = '0.7'; }}
                                    onDragLeave={(e) => { e.currentTarget.style.opacity = '1'; }}
                                    onDrop={(e) => { e.currentTarget.style.opacity = '1'; handleDropOnTarget(e, `${path.join('/')}${path.length > 0 ? '/' : ''}${f.name}`, f.id); }}
                                    onClick={(e) => handleFolderClick(e, f)}
                                    className={`relative aspect-square ${f.colorClass || FOLDER_PALETTE[0]} ${selectedItems.find(i=>i.id===f.id)?'ring-4 ring-indigo-500 scale-95':''} rounded-2xl flex flex-col items-center justify-center gap-1.5 shadow-sm hover:scale-105 hover:shadow-md transition-all group cursor-pointer`}
                                >
                                    <SelectOverlay item={f} type="folder" />
                                    {!isSelecting && selectedItems.length === 0 && (
                                        <div className="absolute top-1.5 right-1.5 flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                            <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); openFolderModal(f); }} className="p-1 bg-black/20 backdrop-blur rounded-md hover:bg-black/40 transition-colors"><Edit2 size={10}/></button>
                                            <button onClick={(e) => deleteFolder(e, f)} className="p-1 bg-black/20 backdrop-blur rounded-md hover:bg-rose-500 hover:text-white transition-colors"><Trash2 size={10}/></button>
                                        </div>
                                    )}
                                    <Folder size={26} className="opacity-90 shrink-0"/>
                                    <span className="font-black text-[10px] text-center px-1.5 uppercase tracking-wide truncate w-full leading-tight">{f.name}</span>
                                </div>
                            ))}

                            {/* QUIZ CARDS */}
                            {filteredQuizzes.map((q) => {
                                let info = GAME_TYPES.find(g => g.id === q.type) || { id: q.type, name: q.type, icon: Puzzle, color: 'bg-gradient-to-br from-slate-400 to-slate-500', desc: '' };
                                if (q.type === 'CONNECT4') {
                                    info = { id: 'CONNECT4', name: 'Connect 4', icon: Target, color: 'bg-gradient-to-br from-orange-400 to-amber-500', desc: 'Juego Clásico' };
                                }
                                if (q.type === 'PHONECHAT' && q.content?.gameMode === 'unscramble') info = { ...info, name: 'Audio Translator', icon: Mic };
                                if (q.type === 'PHONECHAT' && q.content?.gameMode === 'voice') info = { ...info, name: 'Voice Reply', icon: Mic };

                                return (
                                    <div
                                        key={q.id}
                                        draggable
                                        onDragStart={(e) => handleDragStart(e, q.id, 'quiz')}
                                        onClick={(e) => handleQuizClick(e, q)}
                                        className={`relative aspect-square bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl flex flex-col overflow-hidden shadow-sm hover:scale-105 hover:shadow-lg transition-all group cursor-pointer ${selectedItems.find(i=>i.id===q.id)?'ring-4 ring-indigo-500 scale-95':''}`}
                                    >
                                        <SelectOverlay item={q} type="quiz" />

                                        {/* Botones de acción — fila compacta, solo visible al hover */}
                                        {!isSelecting && selectedItems.length === 0 && (
                                            <div className="absolute top-1 right-1 flex flex-row gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                                <button onClick={(e) => handleCopyLink(e, q)} title="Copiar Link" className="p-1 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded text-emerald-500 hover:text-emerald-400 shadow-sm transition-colors"><Link size={9}/></button>
                                                <button onClick={(e) => handleToggleStudentVisibility(e, q)} title={q.studentVisible ? "Visible para alumnos" : "Oculto"} className={`p-1 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded shadow-sm transition-colors ${q.studentVisible ? 'text-indigo-500' : 'text-slate-300 dark:text-zinc-600 hover:text-indigo-400'}`}>{q.studentVisible ? <Eye size={9}/> : <EyeOff size={9}/>}</button>
                                                <button onClick={(e) => handleEditActivity(e, q)} title="Editar" className="p-1 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded text-slate-400 hover:text-blue-500 shadow-sm transition-colors"><Edit2 size={9}/></button>
                                                {['FLASHCARDS','CROSSWORD','ANAGRAM','MEMORAMA','EMOJISPELL'].includes(q.type) && (
                                                    <button onClick={(e) => handleTransformActivity(e, q)} title="Transformar" className="p-1 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded text-slate-400 hover:text-amber-500 shadow-sm transition-colors"><Copy size={9}/></button>
                                                )}
                                                <button onClick={(e) => handleDeleteActivity(e, q)} title="Eliminar" className="p-1 bg-white/90 dark:bg-zinc-800/90 backdrop-blur rounded text-slate-400 hover:text-red-500 shadow-sm transition-colors"><Trash2 size={9}/></button>
                                            </div>
                                        )}

                                        {/* Dot visible para alumnos */}
                                        {q.studentVisible && (
                                            <div className="absolute bottom-1 left-1 z-10 bg-indigo-500 text-white rounded-full p-0.5 shadow" title="Visible para alumnos">
                                                <Eye size={7}/>
                                            </div>
                                        )}

                                        {/* Color header ~45% del cuadrado */}
                                        <div className={`w-full flex-[5] ${info.color} flex items-center justify-center text-white`}>
                                            <info.icon size={20} />
                                        </div>

                                        {/* Body ~55% */}
                                        <div className="flex-[6] px-1.5 py-1 flex flex-col justify-center text-slate-700 dark:text-zinc-200 overflow-hidden text-center">
                                            <div className="font-bold text-[9px] leading-tight line-clamp-2">{q.title}</div>
                                            <div className="text-[7px] text-slate-400 dark:text-zinc-500 font-black uppercase tracking-wider mt-0.5 truncate">{info.name}</div>
                                            {q.tags?.level && (
                                                <span className="inline-block mt-0.5 text-[7px] bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 px-1 rounded uppercase font-bold">{q.tags.level}</span>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* SELECTION MODE TOGGLE */}
                        {(filteredFolders.length > 0 || filteredQuizzes.length > 0) && !isSelecting && selectedItems.length === 0 && (
                            <div className="flex justify-center mt-8">
                                <button onClick={() => setIsSelecting(true)} className="flex items-center gap-2 px-4 py-2 text-xs font-bold text-slate-400 dark:text-zinc-600 hover:text-indigo-500 transition-colors">
                                    <CheckSquare size={14}/> Seleccionar múltiples
                                </button>
                            </div>
                        )}
                    </main>

                    {/* ============================================================ */}
                    {/* MODALS */}
                    {/* ============================================================ */}

                    {/* MODAL CREAR/EDITAR CARPETA */}
                    {modals.folder && (
                        <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] w-full max-w-sm shadow-2xl border border-transparent dark:border-zinc-800">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-black text-xl text-slate-800 dark:text-white">{editingFolder ? 'Editar Carpeta' : 'Nueva Carpeta'}</h3>
                                    <button onClick={() => setModals({...modals, folder: false})} className="text-slate-400 hover:text-slate-600 dark:hover:text-white"><X size={20}/></button>
                                </div>
                                <input id="folderName" name="folderName" autoComplete="off" value={folderForm.name} onChange={e => setFolderForm({...folderForm, name: e.target.value})} placeholder="Nombre..." className="w-full p-4 bg-slate-50 dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 rounded-2xl mb-4 font-bold outline-none focus:border-indigo-500 dark:focus:border-indigo-500 dark:text-white" autoFocus/>
                                <div className="flex flex-wrap gap-2 mb-6 justify-center p-2">
                                    {FOLDER_PALETTE.map(c => (
                                        <button key={c} onClick={() => setFolderForm({...folderForm, colorClass: c})} className={`w-8 h-8 rounded-full border-2 transition-transform ${c.split(' ')[0]} ${folderForm.colorClass === c ? 'scale-125 border-stone-800 dark:border-white' : 'border-transparent'}`}></button>
                                    ))}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setModals({...modals, folder: false})} className="flex-1 py-3 text-slate-400 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 rounded-xl font-bold transition-colors">Cancelar</button>
                                    <button onClick={saveFolder} className="flex-1 py-3 bg-indigo-600 dark:bg-indigo-500 text-white rounded-xl font-bold transition-colors">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CREAR ACTIVIDAD */}
                    {modals.activity && (
                        <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-transparent dark:border-zinc-800">
                                <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center bg-white dark:bg-zinc-900 sticky top-0 z-10 shrink-0">
                                    <div>
                                        <h3 className="font-black text-2xl text-slate-800 dark:text-white tracking-tight">Crea o Selecciona</h3>
                                        <p className="text-slate-400 dark:text-zinc-400 text-xs font-bold uppercase tracking-widest mt-1">Elige el motor para tu actividad</p>
                                    </div>
                                    <button onClick={() => setModals({...modals, activity: false})} className="w-10 h-10 rounded-full bg-slate-50 dark:bg-zinc-800 hover:bg-rose-100 dark:hover:bg-rose-900/30 flex items-center justify-center text-slate-400 dark:text-zinc-400 hover:text-rose-500 transition-colors"><X size={18}/></button>
                                </div>
                                <div className="overflow-y-auto custom-scrollbar p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                    {GAME_TYPES.map(type => (
                                        <button
                                            key={type.id}
                                            onClick={() => {
                                                const encodedFolder = encodeURIComponent(path.join('/'));
                                                window.location.href = `${type.dashboardUrl}?folder=${encodedFolder}`;
                                            }}
                                            className="flex flex-col items-center gap-2 p-4 bg-slate-50 dark:bg-zinc-800 hover:bg-slate-100 dark:hover:bg-zinc-700 border border-slate-200 dark:border-zinc-700 rounded-2xl transition-all hover:scale-105 text-center group"
                                        >
                                            <div className={`w-12 h-12 ${type.color} rounded-2xl flex items-center justify-center text-white shadow-md`}>
                                                <type.icon size={22}/>
                                            </div>
                                            <span className="font-black text-xs text-slate-700 dark:text-zinc-200">{type.name}</span>
                                            <span className="text-[9px] text-slate-400 dark:text-zinc-500 font-bold">{type.desc}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PAPELERA */}
                    {modals.trash && (
                        <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] w-full max-w-lg max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-transparent dark:border-zinc-800">
                                <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center shrink-0">
                                    <div>
                                        <h3 className="font-black text-xl text-slate-800 dark:text-white flex items-center gap-2"><Trash2 size={20} className="text-rose-500"/> Papelera</h3>
                                        <p className="text-xs text-slate-400 dark:text-zinc-500 font-bold mt-1">{trashItems.folders.length + trashItems.quizzes.length} elemento(s)</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={rescueAllFiles} disabled={isRescuing} className="flex items-center gap-1.5 px-3 py-2 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 hover:bg-amber-200 dark:hover:bg-amber-900/50 rounded-xl font-bold text-xs transition-colors disabled:opacity-50">
                                            <LifeBuoy size={14}/> {isRescuing ? 'Rescatando...' : 'Rescatar Todo'}
                                        </button>
                                        <button onClick={() => setModals({...modals, trash: false})} className="text-slate-400 hover:text-slate-600 dark:hover:text-white"><X size={20}/></button>
                                    </div>
                                </div>
                                <div className="overflow-y-auto custom-scrollbar p-4 space-y-2 flex-1">
                                    {trashItems.folders.length === 0 && trashItems.quizzes.length === 0 && (
                                        <div className="text-center py-12 text-slate-400 dark:text-zinc-600 font-bold">La papelera está vacía 🎉</div>
                                    )}
                                    {trashItems.folders.map(f => (
                                        <div key={f.id} className="bg-white dark:bg-zinc-800 p-4 rounded-xl border border-slate-200 dark:border-zinc-700 flex justify-between items-center shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <Folder className="text-slate-400" size={18}/>
                                                <span className="font-bold text-sm text-slate-700 dark:text-zinc-200">{f.name}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => restoreItem(f.id, 'folder')} className="bg-emerald-100 text-emerald-600 hover:bg-emerald-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Restaurar</button>
                                                <button onClick={() => permanentDelete(f.id, 'folder')} className="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Destruir</button>
                                            </div>
                                        </div>
                                    ))}
                                    {trashItems.quizzes.map(q => (
                                        <div key={q.id} className="bg-white dark:bg-zinc-800 p-4 rounded-xl border border-slate-200 dark:border-zinc-700 flex justify-between items-center shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <LayoutGrid className="text-slate-400" size={18}/>
                                                <div>
                                                    <div className="font-bold text-sm text-slate-700 dark:text-zinc-200">{q.title}</div>
                                                    <div className="text-xs text-slate-400 dark:text-zinc-500">{q.type}</div>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => restoreItem(q.id, 'quiz')} className="bg-emerald-100 text-emerald-600 hover:bg-emerald-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Restaurar</button>
                                                <button onClick={() => permanentDelete(q.id, 'quiz')} className="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Destruir</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL MOVER A... */}
                    {moveModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[70] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] w-full max-w-md shadow-2xl border border-transparent dark:border-zinc-800 flex flex-col max-h-[80vh]">
                                <div className="flex justify-between items-center mb-4 shrink-0">
                                    <h3 className="font-black text-xl text-slate-800 dark:text-white flex items-center gap-2"><FolderInput size={20} className="text-indigo-500"/> Mover a...</h3>
                                    <button onClick={() => setMoveModalOpen(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-white"><X size={20}/></button>
                                </div>
                                <div className="flex items-center gap-1 mb-4 shrink-0 overflow-x-auto no-scrollbar">
                                    <button onClick={() => setMoveTarget([])} className="font-black text-base hover:text-indigo-500 transition-colors shrink-0">🚀</button>
                                    {moveTarget.map((seg, i) => (
                                        <React.Fragment key={i}>
                                            <ChevronRight size={12} className="text-slate-300 dark:text-zinc-600 shrink-0"/>
                                            <button onClick={() => setMoveTarget(moveTarget.slice(0, i + 1))} className="font-bold text-sm hover:text-indigo-500 transition-colors shrink-0 whitespace-nowrap">{seg}</button>
                                        </React.Fragment>
                                    ))}
                                </div>
                                <div className="overflow-y-auto flex-1 space-y-2 custom-scrollbar">
                                    {moveModalFolders.length === 0 && (
                                        <p className="text-center text-slate-400 dark:text-zinc-600 text-sm py-8 font-bold">No hay subcarpetas aquí</p>
                                    )}
                                    {moveModalFolders.map(f => (
                                        <button key={f.id} onClick={() => setMoveTarget([...moveTarget, f.name])} className="w-full flex items-center gap-3 p-3 bg-slate-50 dark:bg-zinc-800 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-xl transition-colors text-left">
                                            <div className={`w-8 h-8 ${f.colorClass?.split(' ')[0] || 'bg-slate-400'} rounded-lg flex items-center justify-center`}><Folder size={14} className="text-white"/></div>
                                            <span className="font-bold text-sm text-slate-700 dark:text-zinc-200">{f.name}</span>
                                            <ChevronRight size={14} className="ml-auto text-slate-300 dark:text-zinc-600"/>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-2 mt-4 shrink-0">
                                    <button onClick={() => setMoveModalOpen(false)} className="flex-1 py-3 text-slate-400 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800 rounded-xl font-bold transition-colors">Cancelar</button>
                                    <button onClick={executeMoveModal} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-colors">Mover Aquí</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL SELECTOR DE BOARDGAME RENDER */}
                    {boardgameModal.isOpen && boardgameModal.quiz && (
                        <div className="fixed inset-0 bg-slate-900/80 dark:bg-black/80 z-[80] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-transparent dark:border-zinc-800 text-center">
                                <div className="mx-auto bg-indigo-100 dark:bg-indigo-900/30 text-indigo-500 w-16 h-16 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
                                    <Gamepad2 size={32}/>
                                </div>
                                <h3 className="font-black text-2xl mb-1 text-slate-800 dark:text-white">Elige el Tablero</h3>
                                <p className="text-slate-500 dark:text-zinc-400 text-sm mb-6 font-bold px-4">
                                    ¿Cómo quieres {boardgameModal.action === 'copy' ? 'que jueguen tus alumnos' : 'abrir esta actividad'}?
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => {
                                        const link = `periplo-party.html?id=${boardgameModal.quiz.id}${boardgameModal.action === 'copy' ? '&student=true' : ''}`;
                                        if (boardgameModal.action === 'copy') {
                                            const fullLink = window.location.origin + window.location.pathname.replace('index.html', '') + link;
                                            navigator.clipboard.writeText(fullLink).then(() => triggerUndo(`✅ Link (Periplo Party) copiado.`, null));
                                        } else {
                                            window.location.href = link;
                                        }
                                        setBoardgameModal({ isOpen: false, quiz: null, action: 'play' });
                                    }} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-emerald-950 p-4 rounded-2xl font-black text-lg shadow-[0_4px_0_theme(colors.emerald.700)] flex items-center justify-center gap-3">
                                        <Dices size={20}/> Periplo Party
                                    </button>
                                    <button onClick={() => {
                                        const link = `connect4.html?id=${boardgameModal.quiz.id}${boardgameModal.action === 'copy' ? '&student=true' : ''}`;
                                        if (boardgameModal.action === 'copy') {
                                            const fullLink = window.location.origin + window.location.pathname.replace('index.html', '') + link;
                                            navigator.clipboard.writeText(fullLink).then(() => triggerUndo(`✅ Link (Connect 4) copiado.`, null));
                                        } else {
                                            window.location.href = link;
                                        }
                                        setBoardgameModal({ isOpen: false, quiz: null, action: 'play' });
                                    }} className="btn-juicy w-full bg-amber-500 hover:bg-amber-400 text-amber-950 p-4 rounded-2xl font-black text-lg shadow-[0_4px_0_theme(colors.amber.700)] flex items-center justify-center gap-3">
                                        <Target size={20}/> Connect 4
                                    </button>
                                    <button onClick={() => setBoardgameModal({ isOpen: false, quiz: null, action: 'play' })} className="mt-2 text-slate-400 hover:text-slate-600 dark:hover:text-white font-bold py-3 transition-colors">
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><Dashboard /></ErrorBoundary>);
    </script>
</body>
</html>

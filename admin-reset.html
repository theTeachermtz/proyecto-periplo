<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periplo — Reset Students</title>
    <script type="importmap">
    {
      "imports": {
        "firebase/app":       "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth":      "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <style>
        body { font-family: monospace; background: #0a0908; color: #ede5d8; padding: 40px; max-width: 600px; margin: 0 auto; }
        h1 { font-size: 18px; margin-bottom: 8px; color: #ef4444; }
        p  { font-size: 13px; color: #6b6055; line-height: 1.6; margin-bottom: 20px; }
        .card { background: #141210; border: 1px solid #272320; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
        .student { padding: 6px 0; border-bottom: 1px solid #1c1916; font-size: 12px; color: #9a9080; }
        .student:last-child { border: none; }
        button {
            padding: 12px 24px; border: none; border-radius: 10px; font-family: monospace;
            font-weight: 700; font-size: 13px; cursor: pointer; transition: all .18s;
        }
        #btn-delete { background: #ef4444; color: #fff; margin-top: 16px; }
        #btn-delete:hover { background: #dc2626; }
        #btn-delete:disabled { background: #332f2b; color: #6b6055; cursor: not-allowed; }
        .log { font-size: 12px; color: #6b6055; margin-top: 12px; line-height: 1.8; }
        .ok  { color: #7fad8c; }
        .err { color: #ef4444; }
        #status { font-size: 13px; margin-top: 8px; color: #e8a030; }
    </style>
</head>
<body>

<h1>⚠️ RESET STUDENTS — Solo para Israel</h1>
<p>Borra TODOS los documentos de la colección <code>students</code>. Irreversible.<br>
Solo funciona si estás logueado como teacher (israel.martinez…@gmail.com).</p>

<div class="card" id="card-list">
    <div id="status">Cargando…</div>
    <div id="list"></div>
    <button id="btn-delete" disabled onclick="deleteAll()">Borrar todos los alumnos</button>
</div>

<div class="card">
    <div class="log" id="log"></div>
</div>

<script type="module">
import { initializeApp }    from 'firebase/app';
import { getAuth, onAuthStateChanged } from 'firebase/auth';
import { getFirestore, collection, getDocs, deleteDoc, doc } from 'firebase/firestore';

const FB = { apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",
             authDomain:"proyecto-periplo.firebaseapp.com", projectId:"proyecto-periplo",
             storageBucket:"proyecto-periplo.firebasestorage.app",
             messagingSenderId:"236795998392", appId:"1:236795998392:web:0da24b4f018611b55c844d" };

const ALLOWED = new Set(['israel.martinez.silva1904@gmail.com']);
const STUDENTS_PATH = 'artifacts/periplo-app-v1/students';

const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

let allDocs = [];

onAuthStateChanged(auth, async user => {
    const status = document.getElementById('status');
    if (!user || !ALLOWED.has(user.email)) {
        status.textContent = '❌  Acceso denegado. Abre login.html primero.';
        status.className = 'err';
        return;
    }

    const snap = await getDocs(collection(db, STUDENTS_PATH));
    allDocs = snap.docs;

    if (snap.empty) {
        status.textContent = '✅  La colección ya está vacía.';
        return;
    }

    status.textContent = `${snap.size} alumnos encontrados:`;
    const list = document.getElementById('list');
    snap.docs.forEach(d => {
        const div = document.createElement('div');
        div.className = 'student';
        div.textContent = `${d.data().name || '(sin nombre)'}  ·  ${d.data().email || '(sin email)'}  ·  ${d.id}`;
        list.appendChild(div);
    });

    document.getElementById('btn-delete').disabled = false;
});

window.deleteAll = async () => {
    const btn = document.getElementById('btn-delete');
    const log = document.getElementById('log');
    const confirm1 = prompt(`Escribe BORRAR para confirmar que eliminarás ${allDocs.length} alumnos:`);
    if (confirm1 !== 'BORRAR') { log.innerHTML += '<span class="err">Cancelado.</span><br>'; return; }

    btn.disabled = true;
    btn.textContent = 'Borrando…';
    let ok = 0;

    for (const d of allDocs) {
        try {
            await deleteDoc(doc(db, STUDENTS_PATH, d.id));
            ok++;
            log.innerHTML += `<span class="ok">✓</span> ${d.data().name || d.id}<br>`;
        } catch(e) {
            log.innerHTML += `<span class="err">✗ ${d.id}: ${e.message}</span><br>`;
        }
    }

    log.innerHTML += `<br><span class="ok">✅  ${ok}/${allDocs.length} alumnos eliminados.</span><br>`;
    log.innerHTML += `<span style="color:#6b6055">Ya puedes cerrar esta página y usar students.html con el nuevo schema.</span>`;
    document.getElementById('status').textContent = '✅  Listo.';
};
</script>
</body>
</html>

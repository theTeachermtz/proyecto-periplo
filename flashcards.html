<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flashcards Pro | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { ChevronLeft, ChevronRight, RotateCcw, Volume2, CheckCircle2, XCircle, CircleDashed, Check, X, Trophy, Pause, Play, RefreshCw, ArrowLeft } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        export default function FlashcardsApp() {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [quizData, setQuizData] = useState(null);
            const [flashcardsData, setFlashcardsData] = useState([]);
            const [loading, setLoading] = useState(true);

            const [gameState, setGameState] = useState('playing'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            
            const [isAnimating, setIsAnimating] = useState(false);
            const [isVisible, setIsVisible] = useState(true); 
            const [shake, setShake] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const [hasSeenBack, setHasSeenBack] = useState({}); 
            const [cardStatuses, setCardStatuses] = useState({}); 

            const playAudio = (text, lang = 'en-US', e) => {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.rate = 0.9; 
                    window.speechSynthesis.speak(utterance);
                }
            };

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if(snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            
                            // --- TRADUCTOR UNIVERSAL (Arregla el error Iterable) ---
                            const rawWords = data.content?.cards || data.content?.pairs || [];
                            const normalizedWords = rawWords.map((w, i) => ({
                                id: w.id || i,
                                wordEn: w.wordEn || w.c1 || '',
                                wordEs: w.wordEs || w.c3 || '',
                                emojis: w.emojis || '🎯',
                                exampleEn: w.exampleEn || w.c2 || ''
                            }));

                            setFlashcardsData(normalizedWords);
                        } else {
                            alert("Mazo no encontrado");
                        }
                        setLoading(false);
                    });
                } else { setLoading(false); }
                return () => unsub();
            }, [quizId]);

            const totalCards = flashcardsData.length;
            const currentCard = flashcardsData[currentIndex] || {};
            const correctCount = Object.values(cardStatuses).filter(v => v === 'correct').length;
            const incorrectCount = Object.values(cardStatuses).filter(v => v === 'incorrect').length;
            const pendingCount = totalCards - correctCount - incorrectCount;
            const canNavigate = !(hasSeenBack[currentIndex] && !cardStatuses[currentIndex]);

            const changeCard = useCallback((direction) => {
                if (isAnimating || feedback || gameState !== 'playing' || totalCards === 0) return;
                
                if (!canNavigate) {
                    setShake(true); setTimeout(() => setShake(false), 500); return;
                }

                setIsAnimating(true); setIsVisible(false);

                setTimeout(() => {
                    let next = currentIndex; let loops = 0;
                    do {
                        next = direction === 'next' ? (next === totalCards - 1 ? 0 : next + 1) : (next === 0 ? totalCards - 1 : next - 1);
                        loops++;
                    } while (cardStatuses[next] === 'correct' && loops <= totalCards);

                    setCurrentIndex(next); setIsFlipped(!!cardStatuses[next]); setIsVisible(true);
                    setTimeout(() => setIsAnimating(false), 300);
                }, 300);
            }, [currentIndex, isAnimating, canNavigate, cardStatuses, totalCards, feedback, gameState]);

            const handleNext = () => changeCard('next');
            const handlePrev = () => changeCard('prev');

            const handleFlip = () => {
                if (isAnimating || feedback || gameState !== 'playing') return;
                const newFlippedState = !isFlipped;
                setIsFlipped(newFlippedState);
                if (newFlippedState && !hasSeenBack[currentIndex]) setHasSeenBack(prev => ({ ...prev, [currentIndex]: true }));
            };

            const handleGrade = (status, e) => {
                e.stopPropagation();
                if (isAnimating || feedback) return;

                setFeedback(status);

                setTimeout(() => {
                    setIsAnimating(true); setIsVisible(false); 
                    
                    setTimeout(() => {
                        const newStatuses = { ...cardStatuses, [currentIndex]: status };
                        const correct = Object.values(newStatuses).filter(s => s === 'correct').length;
                        const incorrect = Object.values(newStatuses).filter(s => s === 'incorrect').length;
                        const pending = totalCards - correct - incorrect;

                        setFeedback(null);

                        if (pending === 0) {
                            if (incorrect === 0) {
                                setCardStatuses(newStatuses); setGameState('victory'); setIsAnimating(false); return; 
                            } else {
                                const nextRoundStatuses = { ...newStatuses }; const nextRoundSeen = { ...hasSeenBack };
                                const firstIncorrectIdx = flashcardsData.findIndex((_, i) => newStatuses[i] === 'incorrect');
                                flashcardsData.forEach((_, i) => { if (newStatuses[i] === 'incorrect') { delete nextRoundStatuses[i]; delete nextRoundSeen[i]; } });
                                setCardStatuses(nextRoundStatuses); setHasSeenBack(nextRoundSeen); setCurrentIndex(firstIncorrectIdx); setIsFlipped(false);
                            }
                        } else {
                            setCardStatuses(newStatuses);
                            let next = currentIndex; let loops = 0;
                            do {
                                next = next === totalCards - 1 ? 0 : next + 1; loops++;
                                if (loops > totalCards) break;
                            } while (newStatuses[next] === 'correct');
                            setCurrentIndex(next); setIsFlipped(false);
                        }
                        setIsVisible(true); setTimeout(() => setIsAnimating(false), 300);
                    }, 300); 
                }, 1200); 
            };

            const restartGame = () => { setCardStatuses({}); setHasSeenBack({}); setCurrentIndex(0); setIsFlipped(false); setFeedback(null); setGameState('playing'); };
            const togglePause = () => { if (gameState === 'playing') setGameState('paused'); else if (gameState === 'paused') setGameState('playing'); };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (gameState !== 'playing') return;
                    if (e.key === 'ArrowRight') handleNext();
                    if (e.key === 'ArrowLeft') handlePrev();
                    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); handleFlip(); }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleNext, handlePrev, handleFlip, gameState]);

            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-sky-500 font-black animate-pulse">Cargando Tarjetas...</div>;
            if (totalCards === 0) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-zinc-500 font-bold">No hay datos en este mazo.</div>;

            return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center p-4 sm:p-8 font-sans overflow-hidden relative">
                    
                    <style dangerouslySetInnerHTML={{__html: `
                        .perspective-1000 { perspective: 1000px; }
                        .transform-style-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(-1deg); } 50% { transform: translateY(-8px) rotate(1deg); } }
                        .animate-float { animation: float 6s ease-in-out infinite; }
                        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-2deg); } 50% { transform: translateX(8px) rotate(2deg); } 75% { transform: translateX(-8px) rotate(-2deg); } }
                        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
                        @keyframes explodeUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-80px) scale(1.5); opacity: 0; } }
                        .particle { animation: explodeUp 1s ease-out forwards; position: absolute; font-size: 2rem; }
                        .card-texture { background-color: #18181b; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E"); }
                        .index-card-lines { background-image: linear-gradient(to bottom, transparent 4rem, #9f1239 4rem, #9f1239 4.1rem, transparent 4.1rem), linear-gradient(to bottom, #27272a 1px, transparent 1px); background-size: 100% 100%, 100% 2.5rem; background-position: 0 0, 0 6.6rem; }
                    `}} />

                    {/* HEADER BRANDING PERIPLO */}
                    <div className="w-full max-w-4xl flex justify-between items-center mb-6 z-20">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="flex items-center gap-2 font-black text-xl tracking-tight text-white hover:text-sky-400 transition-colors">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base shadow-lg shadow-indigo-600/20">P</div>
                            </button>
                            <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-2"></div>
                            <div>
                                <h1 className="text-lg font-black text-white leading-none tracking-tight">{quizData?.title || 'Actividad Periplo'}</h1>
                                <p className="text-[10px] font-bold text-sky-500 uppercase tracking-widest mt-1">Modo: Flashcards</p>
                            </div>
                        </div>
                        <div className="flex space-x-3 w-full sm:w-auto justify-center">
                            <button onClick={togglePause} disabled={gameState === 'victory' || gameState === 'wordList'} className="flex items-center px-4 py-2 bg-zinc-900 text-zinc-300 rounded-full shadow-sm hover:bg-zinc-800 transition-colors font-bold text-sm border border-zinc-800 disabled:opacity-50">
                                {gameState === 'paused' ? <><Play size={16} className="mr-2"/> Reanudar</> : <><Pause size={16} className="mr-2"/> Pausa</>}
                            </button>
                            <button onClick={restartGame} className="flex items-center px-4 py-2 bg-zinc-900 text-zinc-300 rounded-full shadow-sm hover:bg-zinc-800 hover:text-rose-500 transition-colors font-bold text-sm border border-zinc-800 hidden sm:flex">
                                <RefreshCw size={16} className="mr-2" /> Reiniciar
                            </button>
                        </div>
                    </div>

                    {/* PANTALLAS ALTERNAS (VICTORIA Y LISTA) */}
                    {gameState === 'victory' && (
                        <div className="flex flex-col items-center justify-center flex-grow w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-500 text-center">
                            <div className="w-32 h-32 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center mb-6 shadow-inner relative">
                                <Trophy size={64} className="text-amber-500 absolute z-10" />
                                <div className="absolute inset-0 flex items-center justify-center animate-spin-slow text-4xl">✨✨✨</div>
                            </div>
                            <h2 className="text-4xl font-black text-white mb-2">¡Dominado!</h2>
                            <p className="text-lg text-zinc-500 mb-8">Has memorizado todas las tarjetas de este set.</p>
                            <div className="flex flex-col w-full space-y-3">
                                <button onClick={restartGame} className="w-full py-4 bg-sky-500 text-black rounded-2xl font-black text-lg hover:bg-sky-400 shadow-lg hover:shadow-sky-500/30 transition-all active:scale-95">
                                    Jugar de nuevo
                                </button>
                                <button onClick={() => setGameState('wordList')} className="w-full py-4 bg-zinc-900 text-zinc-300 border-2 border-zinc-800 rounded-2xl font-bold text-lg hover:bg-zinc-800 hover:border-zinc-700 transition-all active:scale-95">
                                    Ver resumen del mazo
                                </button>
                                <button onClick={() => window.location.href='index.html'} className="w-full py-4 text-zinc-500 font-bold text-sm hover:text-zinc-300 transition-colors">
                                    Salir al Hub
                                </button>
                            </div>
                        </div>
                    )}

                    {gameState === 'wordList' && (
                        <div className="flex flex-col flex-grow w-full max-w-2xl bg-zinc-900 rounded-3xl shadow-2xl border border-zinc-800 p-6 sm:p-8 animate-in fade-in zoom-in-95 duration-300 relative z-30">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-2xl font-black text-white">Resumen del Mazo</h2>
                                <button onClick={() => setGameState(correctCount === totalCards ? 'victory' : 'playing')} className="p-2 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 transition-colors">
                                    <ArrowLeft size={24} />
                                </button>
                            </div>
                            <div className="flex-grow overflow-y-auto pr-2 space-y-4 max-h-[60vh] custom-scrollbar">
                                {flashcardsData.map((card) => (
                                    <div key={card.id} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                        <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">
                                            {card.emojis}
                                        </div>
                                        <div className="flex-grow w-full">
                                            <div className="flex justify-between items-start">
                                                <h4 className="text-lg font-bold text-white">{card.wordEn}</h4>
                                                <button onClick={(e) => playAudio(card.wordEn, 'en-US', e)} className="p-1.5 text-zinc-500 hover:text-sky-400 transition-colors rounded-lg bg-zinc-900">
                                                    <Volume2 size={16} />
                                                </button>
                                            </div>
                                            <p className="text-amber-500 font-bold text-sm mb-1">{card.wordEs}</p>
                                            <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* ÁREA PRINCIPAL DEL JUEGO */}
                    {(gameState === 'playing' || gameState === 'paused') && (
                        <div className="flex flex-col items-center flex-grow mt-4 w-full">
                            
                            <div className="mb-8 w-full max-w-sm sm:max-w-md flex justify-between items-center bg-zinc-900 p-3 rounded-2xl shadow-md border border-zinc-800 z-10">
                                <div className="flex flex-col items-center px-4">
                                    <CircleDashed size={20} className="text-zinc-500 mb-1" />
                                    <span className="text-[10px] font-black tracking-widest text-zinc-600">PENDIENTES</span>
                                    <span className="text-lg font-black text-white">{pendingCount}</span>
                                </div>
                                <div className="w-px h-10 bg-zinc-800"></div>
                                <div className="flex flex-col items-center px-4">
                                    <XCircle size={20} className="text-rose-500 mb-1" />
                                    <span className="text-[10px] font-black tracking-widest text-rose-500">REPASAR</span>
                                    <span className="text-lg font-black text-rose-500">{incorrectCount}</span>
                                </div>
                                <div className="w-px h-10 bg-zinc-800"></div>
                                <div className="flex flex-col items-center px-4">
                                    <CheckCircle2 size={20} className="text-emerald-500 mb-1" />
                                    <span className="text-[10px] font-black tracking-widest text-emerald-500">CORRECTAS</span>
                                    <span className="text-lg font-black text-emerald-500">{correctCount}</span>
                                </div>
                            </div>

                            <div className={`transition-opacity duration-300 relative w-full flex justify-center ${isVisible ? 'opacity-100' : 'opacity-0'}`}>
                                <div className={`relative w-[90%] sm:w-80 h-[65vh] max-h-[500px] perspective-1000 group ${!isAnimating && gameState === 'playing' && !feedback ? 'animate-float' : ''} ${shake ? 'animate-shake' : ''}`}>
                                    <div className={`relative w-full h-full duration-500 ease-out transform-style-3d shadow-2xl rounded-[2rem] transition-all ${isFlipped ? 'rotate-y-180 shadow-sky-900/20' : 'shadow-black/50'} ${gameState === 'playing' && !feedback && !isFlipped ? 'hover:-translate-y-2 hover:shadow-sky-500/10' : ''} ${shake ? 'ring-4 ring-rose-500 ring-offset-4 ring-offset-zinc-950' : ''}`}>
                                        
                                        <div onClick={handleFlip} className="absolute inset-0 backface-hidden card-texture rounded-[2rem] border border-zinc-800 flex flex-col items-center justify-center p-8 overflow-hidden cursor-pointer z-10">
                                            <div className="z-10 flex flex-col items-center w-full text-center space-y-6">
                                                <div className="text-7xl sm:text-8xl drop-shadow-2xl">
                                                    {currentCard.emojis}
                                                </div>
                                                <div className="space-y-4 w-full">
                                                    <h2 className="text-3xl sm:text-4xl font-black text-white tracking-tight px-2">
                                                        {currentCard.wordEn}
                                                    </h2>
                                                    {/* HITBOX PROTEGIDO */}
                                                    <button onClick={(e) => playAudio(currentCard.wordEn, 'en-US', e)} className="mx-auto flex items-center justify-center space-x-2 text-zinc-400 hover:text-sky-400 bg-zinc-950 px-6 py-3 rounded-xl border border-zinc-800 transition-colors shadow-sm relative z-50 pointer-events-auto">
                                                        <Volume2 size={24} />
                                                        <span className="text-xs font-black uppercase tracking-widest">Escuchar</span>
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="absolute bottom-6 flex items-center text-zinc-600 text-xs font-black tracking-widest space-x-2 pointer-events-none">
                                                <RotateCcw size={16} /> <span>TOCA PARA VOLTEAR</span>
                                            </div>
                                        </div>

<div className="absolute inset-0 backface-hidden rotate-y-180 card-texture index-card-lines rounded-[2rem] border border-zinc-800 flex flex-col overflow-hidden shadow-inner">
    <div className="z-10 flex flex-col h-full p-6 sm:p-8 relative">
        
        <button onClick={handleFlip} disabled={!!feedback} className="absolute top-4 right-4 text-zinc-400 hover:text-white flex items-center gap-1 text-[10px] uppercase tracking-widest font-black bg-zinc-900/80 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm border border-zinc-700 transition-colors z-50 pointer-events-auto active:scale-95">
            <RotateCcw size={14} /> Frente
        </button>

        {feedback && (
            <div className={`absolute inset-0 z-40 flex items-center justify-center backdrop-blur-sm rounded-[2rem] transition-all duration-300 ${feedback === 'correct' ? 'bg-emerald-950/80' : 'bg-rose-950/80'}`}>
                {feedback === 'correct' ? (
                    <div className="relative">
                        <span className="text-8xl block animate-bounce">🎉</span>
                        <span className="particle" style={{ left: '-50px', top: '10px', animationDelay: '0.1s' }}>✨</span>
                        <span className="particle" style={{ right: '-50px', top: '20px', animationDelay: '0.2s' }}>✅</span>
                        <span className="particle" style={{ left: '20px', top: '-40px', animationDelay: '0s' }}>🎊</span>
                    </div>
                ) : (
                    <div className="relative">
                        <span className="text-8xl block animate-pulse">🤔</span>
                        <span className="particle" style={{ left: '-40px', top: '0px', animationDelay: '0.1s' }}>💭</span>
                        <span className="particle" style={{ right: '-40px', top: '10px', animationDelay: '0.2s' }}>❌</span>
                    </div>
                )}
            </div>
        )}

        <div className="relative z-10 flex-grow pt-4 pointer-events-none">
            <h3 className="text-2xl sm:text-3xl font-black text-amber-400 mb-8 pl-1 tracking-tight leading-tight">
                {currentCard.wordEs}
            </h3>
            <div className="pl-1 mt-4">
                <div className="flex flex-col bg-zinc-950/80 p-4 rounded-2xl backdrop-blur-sm border border-zinc-800 shadow-inner pointer-events-auto">
                    <p className="text-zinc-300 text-lg sm:text-xl font-medium mb-3 italic">
                        "{currentCard.exampleEn}"
                    </p>
                    {/* HITBOX PROTEGIDO */}
                    <button onClick={(e) => playAudio(currentCard.exampleEn, 'en-US', e)} className="self-end flex items-center gap-2 text-zinc-500 hover:text-sky-400 transition-colors p-2 rounded-lg hover:bg-zinc-900 z-50">
                        <Volume2 size={16}/> <span className="text-[10px] font-black uppercase tracking-widest">Audio</span>
                    </button>
                </div>
            </div>
        </div>

        <div className="relative z-50 flex space-x-3 mt-auto pt-4 pointer-events-auto">
            <button onClick={(e) => handleGrade('incorrect', e)} disabled={!!feedback} className="flex-1 flex flex-col items-center justify-center py-3 bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white border border-rose-500/20 rounded-xl font-black uppercase tracking-widest text-xs transition-all shadow-sm active:scale-95 disabled:opacity-50">
                <X size={20} className="mb-1" /> A repasar
            </button>
            <button onClick={(e) => handleGrade('correct', e)} disabled={!!feedback} className="flex-1 flex flex-col items-center justify-center py-3 bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500 hover:text-white border border-emerald-500/20 rounded-xl font-black uppercase tracking-widest text-xs transition-all shadow-sm active:scale-95 disabled:opacity-50">
                <Check size={20} className="mb-1" /> Me la supe
            </button>
        </div>

    </div>
</div>
                                                <div className="relative z-10 flex-grow pt-4 pointer-events-none">
                                                    <h3 className="text-2xl sm:text-3xl font-black text-amber-400 mb-8 pl-1 tracking-tight leading-tight">
                                                        {currentCard.wordEs}
                                                    </h3>
                                                    <div className="pl-1 mt-4">
                                                        <div className="flex flex-col bg-zinc-950/80 p-4 rounded-2xl backdrop-blur-sm border border-zinc-800 shadow-inner pointer-events-auto">
                                                            <p className="text-zinc-300 text-lg sm:text-xl font-medium mb-3 italic">
                                                                "{currentCard.exampleEn}"
                                                            </p>
                                                            {/* HITBOX PROTEGIDO */}
                                                            <button onClick={(e) => playAudio(currentCard.exampleEn, 'en-US', e)} className="self-end flex items-center gap-2 text-zinc-500 hover:text-sky-400 transition-colors p-2 rounded-lg hover:bg-zinc-900 z-50">
                                                                <Volume2 size={16}/> <span className="text-[10px] font-black uppercase tracking-widest">Audio</span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="relative z-50 flex space-x-3 mt-auto pt-4 pointer-events-auto">
                                                    <button onClick={(e) => handleGrade('incorrect', e)} disabled={!!feedback} className="flex-1 flex flex-col items-center justify-center py-3 bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white border border-rose-500/20 rounded-xl font-black uppercase tracking-widest text-xs transition-all shadow-sm active:scale-95 disabled:opacity-50">
                                                        <X size={20} className="mb-1" /> A repasar
                                                    </button>
                                                    <button onClick={(e) => handleGrade('correct', e)} disabled={!!feedback} className="flex-1 flex flex-col items-center justify-center py-3 bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500 hover:text-white border border-emerald-500/20 rounded-xl font-black uppercase tracking-widest text-xs transition-all shadow-sm active:scale-95 disabled:opacity-50">
                                                        <Check size={20} className="mb-1" /> Me la supe
                                                    </button>
                                                </div>

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className={`mt-8 flex items-center space-x-6 z-10 transition-opacity duration-300 ${feedback || gameState !== 'playing' ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                                <button onClick={handlePrev} disabled={!canNavigate || isAnimating} className={`p-4 rounded-full shadow-lg transition-all ${canNavigate ? 'bg-zinc-900 text-zinc-400 border border-zinc-800 hover:text-white hover:bg-zinc-800 active:scale-95' : 'bg-zinc-950 text-zinc-800 cursor-not-allowed'}`}>
                                    <ChevronLeft size={24} />
                                </button>

                                <div className="flex flex-col items-center bg-zinc-900 px-6 py-2 rounded-full shadow-sm border border-zinc-800">
                                    <span className="text-base font-black text-zinc-300 tracking-widest">
                                        {currentIndex + 1} <span className="text-zinc-600 font-normal mx-1">/</span> {totalCards}
                                    </span>
                                </div>

                                <button onClick={handleNext} disabled={!canNavigate || isAnimating} className={`p-4 rounded-full shadow-lg transition-all ${canNavigate ? 'bg-zinc-900 text-zinc-400 border border-zinc-800 hover:text-white hover:bg-zinc-800 active:scale-95' : 'bg-zinc-950 text-zinc-800 cursor-not-allowed'}`}>
                                    <ChevronRight size={24} />
                                </button>
                            </div>
                        </div>
                    )}

                    {gameState === 'paused' && (
                        <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center text-white p-6 text-center">
                            <Pause size={64} className="mb-6 text-zinc-600" />
                            <h3 className="text-3xl font-black mb-8 tracking-tighter uppercase">Pausa</h3>
                            <button onClick={togglePause} className="px-8 py-4 bg-sky-500 text-black rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-sky-500/20 hover:scale-105 transition-transform mb-4">
                                Reanudar Estudio
                            </button>
                            <button onClick={() => window.location.href='index.html'} className="px-8 py-4 bg-transparent text-zinc-400 rounded-2xl font-bold uppercase tracking-widest hover:text-white transition-colors">
                                Salir al Hub
                            </button>
                        </div>
                    )}

                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<FlashcardsApp />);
    </script>
</body>
</html>

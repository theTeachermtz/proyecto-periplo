<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flashcards Pro | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="periplo.css">
    <script src="periplo-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        /* Previene scroll y rebotes en móviles */
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; overscroll-behavior-y: none; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

        /* Utilidades para SafeArea en iOS */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .min-h-screen-safe { min-height: 100vh; min-height: -webkit-fill-available; }
    </style>
</head>
<body class="text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Volume2, CheckCircle2, XCircle, CircleDashed, Check, X, Trophy, Pause, Play, RefreshCw, ArrowLeft, BookOpen, Dumbbell, BrainCircuit } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── SONIDOS (Web Audio API, sintetizados — sin archivos, se graban en pantalla) ──
        const SFX = (() => {
            let ctx = null;
            const ac = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
            // toca una nota: freq Hz, dur seg, tipo de onda, volumen
            const tone = (freq, start, dur, type = 'sine', vol = 0.22) => {
                const c = ac();
                const o = c.createOscillator(), g = c.createGain();
                o.type = type; o.frequency.value = freq;
                o.connect(g); g.connect(c.destination);
                const t = c.currentTime + start;
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(vol, t + 0.015);
                g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                o.start(t); o.stop(t + dur + 0.02);
            };
            return {
                // Celebración: acorde ascendente alegre (do-mi-sol-do agudo)
                success: () => { try { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.35, 'triangle', 0.2)); } catch(e){} },
                // Acierto individual: "ding" corto y brillante
                ding:    () => { try { tone(880, 0, 0.18, 'triangle', 0.18); tone(1318.5, 0.05, 0.18, 'triangle', 0.14); } catch(e){} },
                // Error: grave corto y seco
                error:   () => { try { tone(160, 0, 0.28, 'sawtooth', 0.16); tone(120, 0.04, 0.28, 'sawtooth', 0.14); } catch(e){} },
                // Voltear tarjeta: clic suave
                flip:    () => { try { tone(440, 0, 0.07, 'sine', 0.1); } catch(e){} },
            };
        })();

        // Modo especial: ?mode=verbs → frente presente, reverso pasado + participio
        const FC_MODE = new URLSearchParams(window.location.search).get('mode') || 'normal';
        const IS_VERBS = FC_MODE === 'verbs';

        // Visual de la tarjeta: imagen real si existe (imageData), si no el emoji.
        const CardVisual = ({ card, size = 'big' }) => {
            const cls = size === 'big'
                ? 'w-28 h-28 sm:w-32 sm:h-32 rounded-3xl object-cover shadow-lg border-2 border-zinc-700/50'
                : 'w-full h-full rounded-xl object-cover';
            if (card?.imageData) {
                return <img src={card.imageData} alt="" className={cls} draggable="false" />;
            }
            const emojiCls = size === 'big' ? 'text-6xl sm:text-7xl drop-shadow-lg select-none' : 'text-2xl sm:text-3xl';
            return <div className={emojiCls}>{card?.emojis}</div>;
        };

        // --- COMPONENTE DE MINI JUEGOS ---
        // NOTA: en la rama inglés la palabra que el alumno APRENDE (y por tanto deletrea
        // en los minijuegos) es wordEn; wordEs es la traducción/pista.
        const MiniGameModal = ({ miniGame, onComplete }) => {
            const [inputs, setInputs] = useState(miniGame.cards.map(() => ''));
            const [errors, setErrors] = useState(miniGame.cards.map(() => false));
            const [step, setStep] = useState(0);
            const [guessed, setGuessed] = useState([]);
            const [shake, setShake] = useState(false);
            const [isReviewing, setIsReviewing] = useState(false);
            const [success, setSuccess] = useState(false);

            useEffect(() => {
                setInputs(miniGame.cards.map(() => ''));
                setErrors(miniGame.cards.map(() => false));
                setStep(0);
                setGuessed([]);
                setIsReviewing(false);
                setSuccess(false);
            }, [miniGame]);

            // Muestra una celebración y luego completa (para que el alumno sepa que acertó)
            const celebrateAndComplete = () => {
                SFX.success();
                setSuccess(true);
                setTimeout(() => onComplete(), 1100);
            };

            const verifyTextGames = () => {
                let hasError = false;
                const newErrors = inputs.map((inp, idx) => {
                    const normalize = (str) => str.toLowerCase().split(/[\s/]+/).filter(Boolean).sort().join('');
                    const target = miniGame.data[idx]?.target || miniGame.cards[idx].wordEn;
                    const isWrong = normalize(inp) !== normalize(target);
                    if (isWrong) hasError = true;
                    return isWrong;
                });
                setErrors(newErrors);
                if (!hasError) celebrateAndComplete();
                else SFX.error();
            };

            const handleInputChange = (idx, val) => {
                const newInputs = [...inputs];
                newInputs[idx] = val;
                setInputs(newInputs);
                const newErrors = [...errors];
                newErrors[idx] = false;
                setErrors(newErrors);
            };

            const handleTF = (guess) => {
                if (guess === miniGame.data[step].isTrue) {
                    if (step + 1 >= miniGame.cards.length) celebrateAndComplete();
                    else { SFX.ding(); setStep(step + 1); }
                } else {
                    SFX.error();
                    setShake(true);
                    setTimeout(() => setShake(false), 400);
                }
            };

            const handleKeyClick = (key) => {
                if (guessed.includes(key)) return;
                const newGuessed = [...guessed, key];
                setGuessed(newGuessed);

                const targetWord = miniGame.data[step]?.target || miniGame.cards[step].wordEn;
                const wordChars = targetWord.toLowerCase().split('');
                const requiredChars = wordChars.filter(c => c !== ' ' && c !== '/');
                // sonido por tecla: ding si la letra está en la palabra, error suave si no
                if (targetWord.toLowerCase().includes(key)) SFX.flip(); else SFX.error();
                const isWordComplete = requiredChars.every(c => newGuessed.includes(c));

                if (isWordComplete) {
                    setTimeout(() => {
                        if (step + 1 >= miniGame.cards.length) celebrateAndComplete();
                        else {
                            SFX.ding();
                            setStep(step + 1);
                            setGuessed([]);
                        }
                    }, 500);
                }
            };

            const renderAnagramGame = () => (
                <div className="w-full flex flex-col gap-4">
                    <p className="text-zinc-400 mb-2 text-center text-sm font-medium px-4">Reorganiza las letras para formar la palabra correcta.</p>
                    {miniGame.cards.map((card, idx) => (
                        <div key={card.id} className="flex flex-col gap-1">
                            <div className="text-center">
                                <span className="text-base font-bold text-amber-400">{miniGame.data[idx]?.hint}</span>
                                {miniGame.data[idx]?.label && <span className="ml-2 text-[10px] font-black uppercase tracking-widest text-violet-400/80">({miniGame.data[idx].label})</span>}
                            </div>
                            <div className="text-xl font-black tracking-[0.3em] text-sky-400 text-center uppercase">
                                {miniGame.data[idx].scrambled}
                            </div>
                            <input
                                type="text"
                                className={`w-full bg-zinc-950 border-2 ${errors[idx] ? 'border-rose-500' : 'border-zinc-800 focus:border-sky-500'} text-white px-4 py-3 rounded-2xl text-center text-lg outline-none transition-colors font-bold`}
                                placeholder="Escribe la palabra..."
                                value={inputs[idx]}
                                onChange={(e) => handleInputChange(idx, e.target.value)}
                            />
                        </div>
                    ))}
                    <button onClick={verifyTextGames} className="mt-4 w-full bg-sky-500 hover:bg-sky-400 py-4 rounded-2xl font-black text-black transition-colors uppercase tracking-widest text-sm shadow-lg shadow-sky-500/20 active:scale-95">
                        Verificar
                    </button>
                </div>
            );

            const renderMissingGame = () => {
                const maskWord = (text) => {
                    return text.split(' ').map(word => {
                        if (word === '/' || word.length <= 2) return word;
                        return `${word[0]} ${'_ '.repeat(word.length - 2).trim()} ${word[word.length - 1]}`;
                    }).join(' ');
                };
                return (
                    <div className="w-full flex flex-col gap-4">
                        <p className="text-zinc-400 mb-2 text-center text-sm font-medium px-4">Completa los espacios en blanco con las letras correctas.</p>
                        {miniGame.cards.map((card, idx) => (
                            <div key={card.id} className="flex flex-col gap-1">
                                <div className="text-center">
                                    <span className="text-base font-bold text-amber-400">{miniGame.data[idx]?.hint}</span>
                                    {miniGame.data[idx]?.label && <span className="ml-2 text-[10px] font-black uppercase tracking-widest text-violet-400/80">({miniGame.data[idx].label})</span>}
                                </div>
                                <div className="text-xl font-black tracking-[0.3em] text-emerald-400 text-center uppercase">
                                    {maskWord(miniGame.data[idx]?.target || card.wordEn)}
                                </div>
                                <input
                                    type="text"
                                    className={`w-full bg-zinc-950 border-2 ${errors[idx] ? 'border-rose-500' : 'border-zinc-800 focus:border-emerald-500'} text-white px-4 py-3 rounded-2xl text-center text-lg outline-none transition-colors font-bold`}
                                    placeholder="Palabra completa..."
                                    value={inputs[idx]}
                                    onChange={(e) => handleInputChange(idx, e.target.value)}
                                />
                            </div>
                        ))}
                        <button onClick={verifyTextGames} className="mt-4 w-full bg-emerald-500 hover:bg-emerald-400 py-4 rounded-2xl font-black text-black transition-colors uppercase tracking-widest text-sm shadow-lg shadow-emerald-500/20 active:scale-95">
                            Verificar
                        </button>
                    </div>
                );
            };

            const renderHangmanGame = () => {
                const currentCard = miniGame.cards[step];
                const d = miniGame.data[step] || {};
                const word = (d.target || currentCard.wordEn).toLowerCase();
                const keys = ['q','w','e','r','t','y','u','i','o','p','a','s','d','f','g','h','j','k','l','z','x','c','v','b','n','m'];

                return (
                    <div className="w-full flex flex-col items-center gap-6">
                        <div className="text-center">
                            <p className="text-zinc-400 mb-1 text-sm font-medium">Toca las letras para adivinar la palabra oculta. ({step + 1}/{miniGame.cards.length})</p>
                            <p className="text-xl font-black text-amber-400">Pista: {d.hint || currentCard.wordEs}{d.label && <span className="ml-2 text-xs font-black uppercase tracking-widest text-violet-400/80">({d.label})</span>}</p>
                        </div>
                        <div className="flex gap-2 justify-center flex-wrap mb-4">
                            {word.split('').map((char, i) => {
                                if (char === ' ' || char === '/') return <span key={i} className="w-4 h-10 inline-block"></span>;
                                return (
                                    <span key={i} className="border-b-4 border-zinc-600 w-8 h-10 flex items-center justify-center text-3xl font-black uppercase text-white">
                                        {guessed.includes(char) ? char : ''}
                                    </span>
                                );
                            })}
                        </div>
                        <div className="flex flex-wrap justify-center gap-2 max-w-sm">
                            {keys.map(key => (
                                <button
                                    key={key}
                                    disabled={guessed.includes(key)}
                                    onClick={() => handleKeyClick(key)}
                                    className={`w-9 h-11 rounded-xl font-bold uppercase text-base transition-all ${
                                        guessed.includes(key)
                                            ? (word.includes(key) ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-zinc-950 text-zinc-800 border border-zinc-900')
                                            : 'bg-zinc-800 hover:bg-zinc-700 text-white active:scale-95 border border-zinc-700'
                                    }`}
                                >
                                    {key}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderTrueFalseGame = () => {
                const currentQ = miniGame.data[step];
                const currentCard = miniGame.cards[step];

                return (
                    <div className={`w-full flex flex-col items-center gap-6 transition-transform ${shake ? 'translate-x-[-10px] sm:translate-x-[10px] duration-100' : ''}`}>
                        {currentQ?.verbsTF ? (
                            <>
                                <p className="text-zinc-400 text-center text-sm font-medium">¿La forma corresponde a la etiqueta? ({step + 1}/{miniGame.cards.length})</p>
                                <div className="bg-zinc-950 p-6 rounded-[2rem] w-full text-center border border-zinc-800 shadow-inner">
                                    <div className="text-zinc-500 text-[10px] mb-1 uppercase tracking-widest font-black">Presente</div>
                                    <div className="text-2xl font-black text-white mb-6">{currentQ.present}</div>
                                    <div className="text-zinc-500 text-[10px] mb-1 uppercase tracking-widest font-black">{currentQ.claimedLabel}</div>
                                    <div className="text-3xl font-black text-sky-400">{currentQ.form}</div>
                                </div>
                            </>
                        ) : (
                            <>
                                <p className="text-zinc-400 text-center text-sm font-medium">Observa la tarjeta e indica si la traducción es correcta o falsa. ({step + 1}/{miniGame.cards.length})</p>
                                <div className="bg-zinc-950 p-6 rounded-[2rem] w-full text-center border border-zinc-800 shadow-inner">
                                    <div className="text-zinc-500 text-[10px] mb-1 uppercase tracking-widest font-black">Inglés</div>
                                    <div className="text-2xl font-black text-white mb-6">{currentCard.wordEn}</div>
                                    <div className="text-zinc-500 text-[10px] mb-1 uppercase tracking-widest font-black">Español</div>
                                    <div className="text-3xl font-black text-sky-400">{currentQ.displayedEs}</div>
                                </div>
                            </>
                        )}
                        <div className="flex w-full gap-4 mt-2">
                            <button
                                onClick={() => handleTF(true)}
                                className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 rounded-2xl text-lg transition-all active:scale-95 shadow-lg shadow-emerald-500/20 uppercase tracking-widest"
                            >
                                Cierto
                            </button>
                            <button
                                onClick={() => handleTF(false)}
                                className="flex-1 bg-rose-500 hover:bg-rose-400 text-white font-black py-4 rounded-2xl text-lg transition-all active:scale-95 shadow-lg shadow-rose-500/20 uppercase tracking-widest"
                            >
                                Falso
                            </button>
                        </div>
                    </div>
                );
            };

            const gameTitles = {
                'anagram': '🧩 Anagrama',
                'hangman': '⌨️ El Ahorcado',
                'truefalse': '⚖️ Cierto o Falso',
                'missing': '🔤 Letras Faltantes'
            };

            if (isReviewing) {
                return (
                    <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[110] flex items-center justify-center p-4">
                        <div className="card-texture index-card-lines border border-zinc-800 rounded-[2rem] max-w-md w-full max-h-[85dvh] flex flex-col shadow-2xl animate-in zoom-in-95 duration-200 overflow-hidden">
                            <div className="flex-1 overflow-y-auto p-6 flex flex-col items-center">
                                <div className="w-14 h-14 shrink-0 bg-sky-500/10 rounded-2xl flex items-center justify-center mb-4 border border-sky-500/20 shadow-inner">
                                    <BookOpen size={28} className="text-sky-400" />
                                </div>
                                <h3 className="text-2xl font-black text-white mb-2 text-center shrink-0 tracking-tight">Repaso Rápido</h3>
                                <p className="text-zinc-500 mb-6 text-center text-sm shrink-0 font-medium">Recuerda estas palabras:</p>

                                <div className="w-full flex flex-col gap-3">
                                    {miniGame.cards.map(c => (
                                        <div key={c.id} className="bg-zinc-950/80 border border-zinc-800 p-4 rounded-2xl flex items-center gap-4 shrink-0 shadow-inner">
                                            <div className="text-3xl drop-shadow-md">{c.emojis}</div>
                                            <div className="flex-1">
                                                <div className="text-lg font-bold text-white lowercase leading-tight">{c.wordEn}</div>
                                                <div className="text-zinc-500 font-medium lowercase text-xs">{c.wordEs}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="w-full shrink-0 border-t border-zinc-800/50 p-4 bg-zinc-950/50 backdrop-blur-sm pb-safe">
                                <button
                                    onClick={() => setIsReviewing(false)}
                                    className="w-full bg-zinc-100 hover:bg-white text-black py-4 rounded-2xl font-black transition-all active:scale-95 shadow-lg uppercase tracking-widest text-sm"
                                >
                                    Regresar al ejercicio
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-in fade-in duration-300">
                    <div className="card-texture index-card-lines border border-zinc-800 rounded-[2rem] max-w-md w-full max-h-[85dvh] flex flex-col shadow-2xl overflow-hidden relative">
                        {success && (
                            <div className="absolute inset-0 z-[60] flex flex-col items-center justify-center bg-emerald-950/90 backdrop-blur-sm rounded-[2rem] animate-in fade-in zoom-in-95 duration-200">
                                <div className="relative">
                                    <span className="text-7xl sm:text-8xl block animate-bounce">🎉</span>
                                    <span className="particle" style={{ left: '-50px', top: '10px', animationDelay: '0.1s' }}>✨</span>
                                    <span className="particle" style={{ right: '-50px', top: '20px', animationDelay: '0.2s' }}>✅</span>
                                    <span className="particle" style={{ left: '10px', top: '-30px', animationDelay: '0.15s' }}>⭐</span>
                                </div>
                                <h3 className="text-2xl sm:text-3xl font-black text-emerald-300 mt-4 tracking-tight">¡Perfecto!</h3>
                                <p className="text-emerald-400/80 font-bold text-sm mt-1">{miniGame.cards.length} de {miniGame.cards.length} correctas</p>
                            </div>
                        )}
                        <div className="flex-1 overflow-y-auto p-6 flex flex-col items-center relative z-10">
                            <div className="w-14 h-14 shrink-0 bg-amber-500/10 rounded-2xl flex items-center justify-center mb-4 border border-amber-500/20 shadow-inner">
                                <Dumbbell size={28} className="text-amber-400" />
                            </div>
                            <h3 className="text-xl sm:text-2xl font-black text-white mb-6 text-center shrink-0 tracking-tight">
                                {gameTitles[miniGame.type]}
                            </h3>
                            <div className="w-full flex-1 flex flex-col justify-center">
                                {miniGame.type === 'anagram' && renderAnagramGame()}
                                {miniGame.type === 'missing' && renderMissingGame()}
                                {miniGame.type === 'hangman' && renderHangmanGame()}
                                {miniGame.type === 'truefalse' && renderTrueFalseGame()}
                            </div>
                        </div>
                        <div className="w-full shrink-0 bg-zinc-950/50 backdrop-blur-sm p-4 border-t border-zinc-800/50 flex justify-center relative z-10 pb-safe">
                            <button
                                onClick={() => setIsReviewing(true)}
                                className="w-full py-4 bg-orange-500 text-black rounded-2xl font-black text-sm hover:bg-orange-400 shadow-lg hover:shadow-orange-500/30 transition-all active:scale-95 uppercase tracking-widest"
                            >
                                Repasar palabras
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL FLASHCARDS ---
        export default function FlashcardsApp() {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [quizData, setQuizData] = useState(null);

            // ESTADOS GENERALES
            const [loading, setLoading] = useState(true);
            const [gameState, setGameState] = useState('welcome');

            // ESTADO PERIPLO
            const [deck, setDeck] = useState([]);
            const [originalCards, setOriginalCards] = useState([]);
            const [recentLearnedCards, setRecentLearnedCards] = useState([]);
            const [allLearnedCards, setAllLearnedCards] = useState([]);
            const [incorrectCount, setIncorrectCount] = useState(0);

            // SISTEMA DE BOLSA (Shuffle Bag)
            const [gameQueue, setGameQueue] = useState([]);
            const [activeMiniGame, setActiveMiniGame] = useState(null);

            // ESTADO DE TARJETA ACTUAL
            const [isFlipped, setIsFlipped] = useState(false);
            const [isAnimating, setIsAnimating] = useState(false);
            const [isVisible, setIsVisible] = useState(true);
            const [shake, setShake] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [hasSeenBack, setHasSeenBack] = useState(false);

            const goBack = () => {
                const ref = document.referrer;
                if (ref && ref.includes('student_portal.html')) {
                    window.location.href = ref;
                } else {
                    window.location.href = 'index.html';
                }
            };

            const playAudio = (text, lang = 'en-US', e) => {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.rate = 0.85;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                }
            };

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, async (u) => {
                    if (u) { setUser(u); }
                    else { try { await signInAnonymously(auth); } catch(e) { console.error(e); } }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !quizId) { setLoading(false); return; }
                const fetchQuiz = async () => {
                    try {
                        const uid = new URLSearchParams(window.location.search).get('uid') || 'teacher_builder_001';
                        const snap = await getDoc(doc(db, `artifacts/periplo-app-v1/users/${uid}/quizzes`, quizId));
                        if (snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            const cards = (data.content?.cards || []).map((c, i) => ({ ...c, id: c.id || `card-${i}` }));
                            setOriginalCards(cards);
                            setDeck([...cards]);
                        }
                    } catch(e) { console.error(e); }
                    finally { setLoading(false); }
                };
                fetchQuiz();
            }, [user, quizId]);

            const currentCard = deck.length > 0 ? deck[0] : null;
            // Modo verbos: activo por URL (?mode=verbs) o por el mazo guardado (data.mode === 'verbs')
            const isVerbs = IS_VERBS || quizData?.mode === 'verbs';

            const startGame = () => {
                setGameState('playing');
            };

            const restartGame = () => {
                setDeck([...originalCards]);
                setRecentLearnedCards([]);
                setAllLearnedCards([]);
                setIncorrectCount(0);
                setGameQueue([]);
                setIsFlipped(false);
                setHasSeenBack(false);
                setGameState('playing');
                setFeedback(null);
                setIsAnimating(false);
                setIsVisible(true);
                setActiveMiniGame(null);
            };

            const togglePause = () => {
                if (gameState === 'playing') setGameState('paused');
                else if (gameState === 'paused') setGameState('playing');
            };

            const handleFlip = () => {
                if (isAnimating || feedback || gameState !== 'playing' || !currentCard) return;
                const newFlippedState = !isFlipped;
                SFX.flip();
                setIsFlipped(newFlippedState);
                if (newFlippedState) setHasSeenBack(true);
            };

            // Extrae pasado y participio de una carta de verbo (campos o wordEs "pasado / participio")
            const verbForms = (c) => {
                const raw = c.wordEs || '';
                const parts = raw.includes(' / ') ? raw.split(' / ') : raw.split('/');
                return {
                    past: (c.past || parts[0] || '').trim(),
                    participle: (c.participle || parts[1] || '').trim(),
                };
            };
            // Una sola palabra deletreable (was/were → was) para los juegos de texto
            const firstToken = (s) => (s || '').split('/')[0].trim();
            const scramble = (text) => text.split(' ').map(word => {
                if (word === '/' || word.length <= 2) return word;
                let s = word, tries = 0;
                while (s === word && tries < 10) { s = word.split('').sort(() => Math.random() - 0.5).join(''); tries++; }
                return s;
            }).join(' ');

            const triggerMiniGame = (cards, learnedPool) => {
                let currentQueue = [...gameQueue];

                // Shuffle Bag Logic
                if (currentQueue.length === 0) {
                    let types = ['anagram', 'hangman', 'missing'];
                    if (learnedPool.length > 3) types.push('truefalse');

                    for (let i = types.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [types[i], types[j]] = [types[j], types[i]];
                    }
                    currentQueue = types;
                }

                const type = currentQueue.pop();
                setGameQueue(currentQueue);

                // Para cada carta define la palabra objetivo (target) y la pista (hint).
                // Normal: target = inglés, hint = traducción. Verbos: target = pasado o participio
                // al azar, hint = presente (+ label de la forma elegida).
                const targetInfo = (c) => {
                    if (!isVerbs) return { target: c.wordEn, hint: c.wordEs, label: '' };
                    const { past, participle } = verbForms(c);
                    let label = Math.random() > 0.5 ? 'Pasado' : 'Participio';
                    let form = label === 'Pasado' ? past : participle;
                    if (!form) { label = label === 'Pasado' ? 'Participio' : 'Pasado'; form = label === 'Pasado' ? past : participle; }
                    return { target: firstToken(form) || c.wordEn, hint: c.wordEn, label };
                };

                let data;
                if (type === 'anagram') {
                    data = cards.map(c => { const t = targetInfo(c); return { ...t, scrambled: scramble(t.target) }; });
                } else if (type === 'missing') {
                    data = cards.map(c => targetInfo(c));
                } else if (type === 'hangman') {
                    data = cards.map(c => targetInfo(c));
                } else if (type === 'truefalse') {
                    data = cards.map(c => {
                        if (isVerbs) {
                            // Muestra presente + una forma + una etiqueta afirmada; el alumno juzga si la
                            // etiqueta corresponde a la forma. OJO: si pasado == participio (cut/cut,
                            // brought/brought) la forma vale para AMBAS etiquetas → la afirmación siempre
                            // es verdadera (cualquier etiqueta es correcta).
                            const { past, participle } = verbForms(c);
                            const same = past && participle && firstToken(past).toLowerCase() === firstToken(participle).toLowerCase();
                            const showParticiple = Math.random() > 0.5;
                            const form = showParticiple ? participle : past;
                            const realLabel = showParticiple ? 'Participio' : 'Pasado';
                            const claimedLabel = Math.random() > 0.5 ? realLabel : (realLabel === 'Pasado' ? 'Participio' : 'Pasado');
                            const isTrue = same ? true : (claimedLabel === realLabel);
                            return { verbsTF: true, present: c.wordEn, form: form || '—', claimedLabel, isTrue };
                        }
                        const isTrue = Math.random() > 0.5;
                        let displayedEs = c.wordEs;
                        if (!isTrue) {
                            const otherCards = learnedPool.filter(o => o.id !== c.id);
                            if (otherCards.length > 0) displayedEs = otherCards[Math.floor(Math.random() * otherCards.length)].wordEs;
                        }
                        return { isTrue: displayedEs === c.wordEs ? true : isTrue, displayedEs };
                    });
                } else { data = []; }

                setActiveMiniGame({ type, cards, data, mode: isVerbs ? 'verbs' : 'normal' });
            };

            const handleLearned = (e) => {
                if(e) e.stopPropagation();
                if (isAnimating || feedback || deck.length === 0) return;

                SFX.ding();
                setFeedback('correct');

                setTimeout(() => {
                    setIsAnimating(true); setIsVisible(false);

                    setTimeout(() => {
                        const newDeck = [...deck];
                        const learnedCard = newDeck.shift();
                        const newRecent = [...recentLearnedCards, learnedCard];
                        const newAll = [...allLearnedCards, learnedCard];

                        setAllLearnedCards(newAll);
                        setFeedback(null);
                        setIsFlipped(false);
                        setHasSeenBack(false);

                        // Minijuegos cada 5 tarjetas (en modo verbos prueban pasado/participio)
                        if (newRecent.length >= 5 || newDeck.length === 0) {
                            setDeck(newDeck);
                            triggerMiniGame(newRecent, newAll);
                            setRecentLearnedCards([]);
                        } else {
                            setDeck(newDeck);
                            setRecentLearnedCards(newRecent);
                        }

                        setIsVisible(true);
                        setTimeout(() => setIsAnimating(false), 300);
                    }, 300);
                }, 800);
            };

            const handleNotLearned = (e) => {
                if(e) e.stopPropagation();
                if (isAnimating || feedback || deck.length === 0) return;

                SFX.error();
                setFeedback('incorrect');

                setTimeout(() => {
                    setIsAnimating(true); setIsVisible(false);

                    setTimeout(() => {
                        const current = deck[0];
                        const newDeck = [...deck.slice(1), current];

                        setDeck(newDeck);
                        setIncorrectCount(prev => prev + 1);
                        setFeedback(null);
                        setIsFlipped(false);
                        setHasSeenBack(false);

                        setIsVisible(true);
                        setTimeout(() => setIsAnimating(false), 300);
                    }, 300);
                }, 800);
            };

            useEffect(() => {
                if (deck.length === 0 && originalCards.length > 0 && !activeMiniGame && gameState === 'playing') {
                    SFX.success();
                    setGameState('victory');
                }
            }, [deck.length, originalCards.length, activeMiniGame, gameState]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (gameState !== 'playing' || feedback || isAnimating || activeMiniGame) return;
                    if (e.key === ' ') { e.preventDefault(); handleFlip(); }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [gameState, feedback, isAnimating, activeMiniGame, deck]);

            if (loading) return (
                <div className="min-h-screen-safe w-screen flex items-center justify-center bg-zinc-950">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">Cargando mazo...</p>
                    </div>
                </div>
            );

            if (!quizId || originalCards.length === 0) return (
                <div className="min-h-screen-safe w-screen flex items-center justify-center bg-zinc-950">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">Cargando mazo...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen-safe w-screen flex flex-col bg-zinc-950 font-sans overflow-hidden">

                    <style dangerouslySetInnerHTML={{__html: `
                        .perspective-1000 { perspective: 1000px; }
                        .transform-style-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(-1deg); } 50% { transform: translateY(-6px) rotate(1deg); } }
                        .animate-float { animation: float 6s ease-in-out infinite; }
                        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-2deg); } 50% { transform: translateX(8px) rotate(2deg); } 75% { transform: translateX(-8px) rotate(-2deg); } }
                        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
                        @keyframes explodeUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-80px) scale(1.5); opacity: 0; } }
                        .particle { animation: explodeUp 1s ease-out forwards; position: absolute; font-size: 2rem; }
                        .card-texture { background-color: #18181b; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E"); }
                        .index-card-lines { background-image: linear-gradient(to bottom, transparent 3.9rem, #9f1239 3.9rem, #9f1239 4rem, #9f1239 4rem, #9f1239 4.1rem, transparent 4.1rem), linear-gradient(to bottom, #27272a 1px, transparent 1px); background-size: 100% 100%, 100% 2.5rem; background-position: 0 0, 0 6.6rem; }
                    `}} />

                    {/* HEADER - ALTURA FIJA (Shrink 0) */}
                    <div className="w-full shrink-0 flex justify-between items-center z-20 p-4 sm:p-6">
                        <div className="flex items-center gap-3">
                            <div className="flex items-center justify-center w-10 h-10 bg-indigo-600 rounded-xl text-white font-black shadow-lg shadow-indigo-600/20">
                                P
                            </div>
                            <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1"></div>
                            <div className="flex flex-col">
                                <h1 className="text-base sm:text-lg font-black text-white leading-none tracking-tight truncate max-w-[150px] sm:max-w-xs">{quizData?.title || 'Actividad Periplo'}</h1>
                                <p className="text-[9px] sm:text-[10px] font-bold text-sky-500 uppercase tracking-widest mt-1">Modo: {isVerbs ? 'Verbos (3 formas)' : 'Flashcards Pro'}</p>
                            </div>
                        </div>

                        {(gameState === 'playing' || gameState === 'paused') && (
                            <div className="flex space-x-2">
                                <button onClick={(e) => { e.stopPropagation(); togglePause(); }} disabled={gameState === 'victory' || gameState === 'wordList'} className="flex items-center px-3 sm:px-4 py-2 bg-zinc-900 text-zinc-300 rounded-full shadow-sm hover:bg-zinc-800 transition-colors font-bold text-xs sm:text-sm border border-zinc-800 disabled:opacity-50 active:scale-95">
                                    {gameState === 'paused' ? <><Play size={14} className="sm:mr-2"/> <span className="hidden sm:inline">Reanudar</span></> : <><Pause size={14} className="sm:mr-2"/> <span className="hidden sm:inline">Pausa</span></>}
                                </button>
                                <button onClick={(e) => { e.stopPropagation(); restartGame(); }} className="flex items-center px-3 sm:px-4 py-2 bg-zinc-900 text-zinc-300 rounded-full shadow-sm hover:bg-zinc-800 hover:text-rose-500 transition-colors font-bold text-xs sm:text-sm border border-zinc-800 active:scale-95">
                                    <RefreshCw size={14} className="sm:mr-2" /> <span className="hidden sm:inline">Reiniciar</span>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* PANTALLA DE INSTRUCCIONES INICIAL (Welcome State) */}
                    {gameState === 'welcome' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-4 min-h-0 w-full animate-in fade-in zoom-in-95 duration-500">
                            <div className="w-full max-w-sm card-texture index-card-lines border border-zinc-800 rounded-[2rem] shadow-2xl flex flex-col overflow-hidden relative">
                                <div className="p-6 sm:p-8 flex flex-col items-center">
                                    <div className="w-16 h-16 bg-sky-500/10 border border-sky-500/20 rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                                        <BrainCircuit size={32} className="text-sky-400" />
                                    </div>
                                    <h2 className="text-2xl sm:text-3xl font-black text-white mb-6 text-center tracking-tight leading-tight">
                                        Instrucciones de la dinámica
                                    </h2>

                                    <div className="flex flex-col gap-4 w-full">
                                        <div className="flex items-start gap-3 bg-zinc-950/80 p-4 rounded-2xl border border-zinc-800/50">
                                            <div className="text-xl">👆</div>
                                            <p className="text-sm font-medium text-zinc-300 leading-snug">
                                                Lee cada tarjeta con su definición, toca para girarla y elige si la sabías o necesitas repasar.
                                            </p>
                                        </div>
                                        <div className="flex items-start gap-3 bg-zinc-950/80 p-4 rounded-2xl border border-zinc-800/50">
                                            <div className="text-xl">⏱️</div>
                                            <p className="text-sm font-medium text-zinc-300 leading-snug">
                                                Cada 5 palabras te aparecerá un ejercicio que evaluará tu memoria y retención.
                                            </p>
                                        </div>
                                        <div className="flex items-start gap-3 bg-zinc-950/80 p-4 rounded-2xl border border-zinc-800/50">
                                            <div className="text-xl">🎮</div>
                                            <p className="text-sm font-medium text-zinc-300 leading-snug">
                                                Los minijuegos incluyen: completar la palabra, anagrama, ahorcado y verdadero/falso.
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full p-4 sm:p-6 bg-zinc-950/50 backdrop-blur-sm border-t border-zinc-800/50 shrink-0 pb-safe">
                                    <button
                                        onClick={startGame}
                                        className="w-full py-4 bg-sky-500 text-black rounded-2xl font-black text-base hover:bg-sky-400 shadow-lg hover:shadow-sky-500/30 transition-all active:scale-95 uppercase tracking-widest"
                                    >
                                        Entendido, ¡A jugar!
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MAIN CONTENT AREA - (JUEGO ACTIVO) */}
                    {(gameState === 'playing' || gameState === 'paused') && (
                        <div className="flex-1 flex flex-col items-center w-full min-h-0 px-4 pb-safe">

                            {/* STATS BANNER */}
                            {deck.length > 0 && !activeMiniGame && (
                                <div className="w-full max-w-sm shrink-0 flex justify-between items-center bg-zinc-900 p-2 sm:p-3 rounded-2xl shadow-md border border-zinc-800 z-10 mb-4 sm:mb-6 animate-in slide-in-from-top-4 fade-in duration-300">
                                    <div className="flex flex-col items-center px-2 w-1/3">
                                        <CircleDashed size={16} className="text-zinc-500 mb-1" />
                                        <span className="text-[9px] sm:text-[10px] font-black tracking-widest text-zinc-600">EN COLA</span>
                                        <span className="text-base sm:text-lg font-black text-white">{deck.length}</span>
                                    </div>
                                    <div className="w-px h-8 sm:h-10 bg-zinc-800"></div>
                                    <div className="flex flex-col items-center px-2 w-1/3">
                                        <XCircle size={16} className="text-rose-500 mb-1" />
                                        <span className="text-[9px] sm:text-[10px] font-black tracking-widest text-rose-500">FALLOS</span>
                                        <span className="text-base sm:text-lg font-black text-rose-500">{incorrectCount}</span>
                                    </div>
                                    <div className="w-px h-8 sm:h-10 bg-zinc-800"></div>
                                    <div className="flex flex-col items-center px-2 w-1/3">
                                        <CheckCircle2 size={16} className="text-emerald-500 mb-1" />
                                        <span className="text-[9px] sm:text-[10px] font-black tracking-widest text-emerald-500">APRENDIDAS</span>
                                        <span className="text-base sm:text-lg font-black text-emerald-500">{allLearnedCards.length}</span>
                                    </div>
                                </div>
                            )}

                            {/* ÁREA DE JUEGO CENTRAL */}
                            {deck.length > 0 && !activeMiniGame && (
                                <div className="flex-1 w-full max-w-sm flex flex-col justify-center min-h-0 relative mb-4 sm:mb-6 animate-in zoom-in-95 fade-in duration-500">

                                    {/* CONTENEDOR DE LA TARJETA */}
                                    <div className={`flex-1 relative perspective-1000 min-h-[300px] sm:min-h-[340px] transition-opacity duration-300 ${isVisible ? 'opacity-100' : 'opacity-0'}`}>
                                        <div onClick={handleFlip} className={`absolute inset-0 w-full h-full max-h-[480px] m-auto duration-500 ease-out transform-style-3d shadow-2xl rounded-[2rem] cursor-pointer transition-transform ${isFlipped ? 'rotate-y-180 shadow-sky-900/20' : 'shadow-black/50'} ${!isAnimating && gameState === 'playing' && !feedback && !isFlipped ? 'animate-float hover:-translate-y-2' : ''} ${shake ? 'animate-shake' : ''}`}>

                                            {/* FRENTE — palabra en inglés (la que se aprende) */}
                                            <div className="absolute inset-0 backface-hidden rounded-[2rem] overflow-hidden card-texture index-card-lines flex flex-col p-4 sm:p-6">
                                                <div className="flex justify-between items-center mb-2 h-8 sm:h-10 w-full">
                                                    <div></div> {/* Espaciador */}
                                                    <button onClick={(e) => { e.stopPropagation(); playAudio(currentCard?.wordEn, 'en-US', e); }} className="p-2 text-zinc-500 hover:text-sky-400 transition-colors rounded-xl hover:bg-zinc-800 z-50 bg-zinc-950/50 backdrop-blur-sm border border-zinc-800/50">
                                                        <Volume2 size={20} />
                                                    </button>
                                                </div>

                                                <div className="flex-grow flex flex-col items-center justify-center text-center pb-2">
                                                    <div className="mb-4 sm:mb-6 flex items-center justify-center"><CardVisual card={currentCard} /></div>
                                                    <h2 className="text-3xl sm:text-4xl lg:text-5xl font-black text-white mb-3 tracking-tight leading-tight">{currentCard?.wordEn}</h2>
                                                    {isVerbs && <p className="text-[10px] sm:text-xs font-black uppercase tracking-widest text-sky-500/70 mb-1">Presente</p>}
                                                    <div className="w-12 h-1 bg-sky-500/50 rounded-full mt-2"></div>
                                                </div>

                                                <div className="w-full text-center pb-2">
                                                    <span className="text-[11px] sm:text-xs font-black tracking-widest text-zinc-500 uppercase opacity-60 animate-pulse">
                                                        Toca para girar
                                                    </span>
                                                </div>
                                            </div>

                                            {/* REVERSO — traducción al español + ejemplo en inglés */}
                                            <div className="absolute inset-0 backface-hidden rotate-y-180 rounded-[2rem] overflow-hidden bg-zinc-900 border border-zinc-800 flex flex-col p-4 sm:p-6">
                                                {feedback && (
                                                    <div className={`absolute inset-0 z-40 flex items-center justify-center backdrop-blur-sm rounded-[2rem] transition-all duration-300 ${feedback === 'correct' ? 'bg-emerald-950/80' : 'bg-rose-950/80'}`}>
                                                        {feedback === 'correct' ? (
                                                            <div className="relative pointer-events-none">
                                                                <span className="text-6xl sm:text-8xl block animate-bounce">🎉</span>
                                                                <span className="particle" style={{ left: '-50px', top: '10px', animationDelay: '0.1s' }}>✨</span>
                                                                <span className="particle" style={{ right: '-50px', top: '20px', animationDelay: '0.2s' }}>✅</span>
                                                            </div>
                                                        ) : (
                                                            <div className="relative pointer-events-none">
                                                                <span className="text-6xl sm:text-8xl block animate-pulse">🤔</span>
                                                                <span className="particle" style={{ left: '-40px', top: '0px', animationDelay: '0.1s' }}>💭</span>
                                                                <span className="particle" style={{ right: '-40px', top: '10px', animationDelay: '0.2s' }}>❌</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                <div className="relative z-10 flex-grow pointer-events-none flex flex-col justify-center">
                                                    {isVerbs ? (() => {
                                                        // Pasado + participio: usa campos past/participle si existen,
                                                        // si no parsea wordEs separando por " / " (slash con espacios),
                                                        // para no romper pasados dobles como "was/were" (ej. "was/were / been").
                                                        const raw = currentCard?.wordEs || '';
                                                        const parts = raw.includes(' / ')
                                                            ? raw.split(' / ').map(s => s.trim()).filter(Boolean)
                                                            : raw.split('/').map(s => s.trim()).filter(Boolean);
                                                        const past = currentCard?.past || parts[0] || '';
                                                        const participle = currentCard?.participle || parts[1] || '';
                                                        return (
                                                            <div className="flex flex-col gap-2 mb-3 px-2">
                                                                <div className="bg-zinc-950/80 py-2 px-3 rounded-xl border border-zinc-800 text-center">
                                                                    <div className="text-[9px] font-black uppercase tracking-widest text-amber-500/70">Pasado</div>
                                                                    <div className="text-xl sm:text-2xl font-black text-amber-400 tracking-tight leading-tight">{past}</div>
                                                                </div>
                                                                <div className="bg-zinc-950/80 py-2 px-3 rounded-xl border border-zinc-800 text-center">
                                                                    <div className="text-[9px] font-black uppercase tracking-widest text-violet-400/70">Participio</div>
                                                                    <div className="text-xl sm:text-2xl font-black text-violet-300 tracking-tight leading-tight">{participle}</div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })() : (
                                                        <h3 className="text-2xl sm:text-3xl font-black text-amber-400 mb-4 sm:mb-6 tracking-tight leading-tight text-center px-2">
                                                            {currentCard?.wordEs}
                                                        </h3>
                                                    )}
                                                    <div className="px-1 sm:px-2">
                                                        <div className="flex flex-col bg-zinc-950/80 p-3 sm:p-4 rounded-2xl backdrop-blur-sm border border-zinc-800 shadow-inner text-center pointer-events-auto">
                                                            <p className="text-zinc-300 text-sm sm:text-base font-medium mb-2 italic">
                                                                "{currentCard?.exampleEn}"
                                                            </p>
                                                            <button onClick={(e) => playAudio(currentCard?.exampleEn, 'en-US', e)} className="self-end flex items-center gap-1 sm:gap-2 text-zinc-500 hover:text-sky-400 transition-colors p-1.5 sm:p-2 rounded-lg hover:bg-zinc-900 z-50">
                                                                <Volume2 size={16}/> <span className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest">Audio</span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="w-full text-center pb-2 pointer-events-none opacity-50">
                                                    <span className="text-[10px] sm:text-xs font-black tracking-widest text-zinc-500 uppercase">
                                                        Toca para regresar
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* BOTONES DE ACCIÓN - RESERVADOS EN EL BOTTOM */}
                                    <div className="shrink-0 w-full h-16 sm:h-20 mt-4 sm:mt-6 flex flex-row gap-3 sm:gap-4 justify-center relative">
                                        <div className={`absolute inset-0 flex flex-row gap-3 sm:gap-4 w-full h-full transition-all duration-300 ${isFlipped && !isAnimating && !feedback ? 'opacity-100 translate-y-0 pointer-events-auto' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
                                            <button onClick={handleNotLearned} className="flex-1 flex items-center justify-center gap-2 bg-zinc-900 hover:bg-rose-900/40 border-2 border-zinc-800 hover:border-rose-500/50 text-zinc-400 hover:text-rose-400 py-2 px-3 rounded-2xl transition-all duration-300 group shadow-lg active:scale-95">
                                                <div className="bg-zinc-950 group-hover:bg-rose-500/20 p-2 rounded-full transition-colors">
                                                    <X size={20} className="text-zinc-500 group-hover:text-rose-500" strokeWidth={3} />
                                                </div>
                                                <span className="text-[10px] sm:text-[11px] font-black uppercase tracking-widest leading-none">A repasar</span>
                                            </button>
                                            <button onClick={handleLearned} className="flex-1 flex items-center justify-center gap-2 bg-zinc-900 hover:bg-emerald-900/40 border-2 border-zinc-800 hover:border-emerald-500/50 text-zinc-400 hover:text-emerald-400 py-2 px-3 rounded-2xl transition-all duration-300 group shadow-lg active:scale-95">
                                                <div className="bg-zinc-950 group-hover:bg-emerald-500/20 p-2 rounded-full transition-colors">
                                                    <Check size={20} className="text-zinc-500 group-hover:text-emerald-500" strokeWidth={3} />
                                                </div>
                                                <span className="text-[10px] sm:text-[11px] font-black uppercase tracking-widest leading-none">Me la supe</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    )}

                    {/* OVERLAY DEL MINIJUEGO */}
                    {activeMiniGame && (
                        <MiniGameModal
                            miniGame={activeMiniGame}
                            onComplete={() => setActiveMiniGame(null)}
                        />
                    )}

                    {/* PANTALLA VICTORIA */}
                    {gameState === 'victory' && !activeMiniGame && (
                        <div className="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-zinc-950 p-6 animate-in fade-in duration-500 text-center">
                            <div className="w-24 h-24 sm:w-32 sm:h-32 bg-amber-500/10 border border-amber-500/20 rounded-full flex items-center justify-center mb-6 shadow-inner relative shrink-0">
                                <Trophy size={48} className="text-amber-500 absolute z-10" />
                                <div className="absolute inset-0 flex items-center justify-center animate-spin-slow text-2xl sm:text-4xl">✨✨✨</div>
                            </div>
                            <h2 className="text-3xl sm:text-4xl font-black text-white mb-2">¡Dominado!</h2>
                            <p className="text-base sm:text-lg text-zinc-500 mb-8 px-4 max-w-sm">Has memorizado y superado los minijuegos de todas las tarjetas.</p>
                            <div className="flex flex-col w-full max-w-xs space-y-3 pb-safe">
                                <button onClick={restartGame} className="w-full py-4 bg-sky-500 text-black rounded-2xl font-black text-sm sm:text-base hover:bg-sky-400 shadow-lg hover:shadow-sky-500/30 transition-all active:scale-95 uppercase tracking-widest">
                                    Jugar de nuevo
                                </button>
                                <button onClick={() => setGameState('wordList')} className="w-full py-4 bg-zinc-900 text-zinc-300 border-2 border-zinc-800 rounded-2xl font-bold text-sm sm:text-base hover:bg-zinc-800 hover:border-zinc-700 transition-all active:scale-95">
                                    Ver resumen del mazo
                                </button>
                                <p className="w-full py-3 text-zinc-500 font-medium text-xs sm:text-sm text-center">
                                    Para salir, puedes cerrar esta pestaña.
                                </p>
                            </div>
                        </div>
                    )}

                    {/* PANTALLA RESUMEN LISTA */}
                    {gameState === 'wordList' && (
                        <div className="absolute inset-0 z-[150] bg-zinc-950 flex flex-col animate-in fade-in duration-300 p-4 sm:p-6 pb-safe">
                            <div className="flex-1 min-h-0 w-full max-w-2xl mx-auto flex flex-col bg-zinc-900 rounded-[2rem] shadow-2xl border border-zinc-800 p-4 sm:p-8">
                                <div className="flex items-center justify-between mb-4 sm:mb-6 shrink-0">
                                    <h2 className="text-xl sm:text-2xl font-black text-white">Resumen del Mazo</h2>
                                    <button onClick={() => setGameState(deck.length === 0 ? 'victory' : 'playing')} className="p-2 sm:p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 transition-colors active:scale-95">
                                        <ArrowLeft size={20} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 space-y-3 sm:space-y-4 custom-scrollbar">
                                    {originalCards.map((card) => (
                                        <div key={card.id} className="flex flex-row items-center p-3 sm:p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-3 sm:gap-4">
                                            <div className="bg-zinc-900 w-12 h-12 sm:w-14 sm:h-14 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 shrink-0 overflow-hidden">
                                                <CardVisual card={card} size="small" />
                                            </div>
                                            <div className="flex-grow min-w-0">
                                                <div className="flex justify-between items-start">
                                                    <h4 className="text-base sm:text-lg font-bold text-white truncate pr-2">{card.wordEn}</h4>
                                                    <button onClick={(e) => playAudio(card.wordEn, 'en-US', e)} className="p-1 text-zinc-500 hover:text-sky-400 transition-colors rounded-lg bg-zinc-900 shrink-0">
                                                        <Volume2 size={16} />
                                                    </button>
                                                </div>
                                                <p className="text-amber-500 font-bold text-xs sm:text-sm truncate">{card.wordEs}</p>
                                                <p className="text-zinc-500 text-[10px] sm:text-xs italic truncate">"{card.exampleEn}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PANTALLA PAUSA */}
                    {gameState === 'paused' && (
                        <div className="absolute inset-0 z-[200] bg-black/80 backdrop-blur-md flex flex-col items-center justify-center text-white p-6 text-center pb-safe">
                            <Pause size={56} className="mb-6 text-zinc-600" />
                            <h3 className="text-2xl sm:text-3xl font-black mb-8 tracking-tighter uppercase">Estudio Pausado</h3>
                            <button onClick={togglePause} className="w-full max-w-xs py-4 bg-sky-500 text-black rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-sky-500/20 hover:scale-105 transition-transform mb-3 active:scale-95 text-sm sm:text-base">
                                Reanudar Estudio
                            </button>
                            <button onClick={goBack} className="w-full max-w-xs py-4 bg-transparent text-zinc-400 rounded-2xl font-bold uppercase tracking-widest hover:text-white transition-colors text-sm sm:text-base">
                                Salir
                            </button>
                        </div>
                    )}

                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<FlashcardsApp />);
    </script>
</body>
</html>

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { Dices, MapPin, ArrowRight, Skull, Ghost, Star, Zap, LogIn, AlertTriangle, Trophy, Coins, CheckCircle2, XCircle, HelpCircle, Timer, Eye, EyeOff, BrainCircuit, Crosshair, Users, Crown, Gamepad2, ChevronLeft, Link as LinkIcon, UserPlus, Copy, Check, Pencil, Link2, Mic, Headphones, Target } from 'lucide-react';
import confetti from 'canvas-confetti';

import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc, runTransaction } from 'firebase/firestore';

const firebaseConfig = { 
    apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", 
    authDomain: "proyecto-periplo.firebaseapp.com", 
    projectId: "proyecto-periplo", 
    storageBucket: "proyecto-periplo.firebasestorage.app", 
    messagingSenderId: "236795998392", 
    appId: "1:236795998392:web:0da24b4f018611b55c844d"

let db = null;
try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
} catch (e) {
    console.warn("Error conectando a Firestore.", e);
}

const withTimeout = (promise, ms = 8000, label = 'Firebase') => {
    return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(`${label}_TIMEOUT`)), ms))
    ]);
};

const QUIZZES_PATH = 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes';

const shuffleArray = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
};

// ==========================================
// COMPONENTES MULTIPLAYER (RELOJ & RETOS)
// ==========================================
const CountdownBar = ({ startTime, endTime, status, onTimeUp, canInteract, duration = 50 }) => {
    const [timeLeft, setTimeLeft] = useState(duration);

    useEffect(() => {
        const calcTime = () => {
            const end = endTime || Date.now();
            const elapsed = Math.floor((end - startTime) / 1000);
            return Math.max(0, duration - elapsed);
        };

        setTimeLeft(calcTime());
        if (status !== 'playing') return;

        const interval = setInterval(() => {
            const remaining = calcTime();
            setTimeLeft(remaining);
            if (remaining <= 0) {
                clearInterval(interval);
                if (canInteract) onTimeUp();
            }
        }, 500);

        return () => clearInterval(interval);
    }, [startTime, endTime, status, canInteract, onTimeUp, duration]);

    const percentage = (timeLeft / duration) * 100;
    let color = 'bg-emerald-500';
    if (timeLeft <= 8) color = 'bg-rose-500 animate-pulse';
    else if (timeLeft <= 15) color = 'bg-amber-400';

    return (
        <div className="w-full bg-zinc-800 h-3 rounded-full overflow-hidden">
            <div className={`h-full ${color} transition-all duration-500 ease-linear`} style={{ width: `${percentage}%` }}></div>
        </div>
    );
};

const MultipleChoiceChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    
    const handleSelect = (idx) => { 
        if (status !== 'playing' || !canInteract) return; 
        const isCorrect = idx === data.correct;
        updateChallenge({ status: isCorrect ? 'correct' : 'wrong', playerAnswer: idx, endTime: Date.now() });
    };
    
    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-indigo-100 dark:bg-indigo-900/30 p-3 rounded-full"><HelpCircle className="w-8 h-8 text-indigo-600 dark:text-indigo-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Elige la correcta</h3>
            <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-6 font-medium text-lg text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">{data.question}</div>
            
            <div className="grid gap-3 mb-6">
                {data.options.map((opt, idx) => {
                    let btnClass = 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-600 dark:text-zinc-300';
                    if (status !== 'playing') {
                        if (idx === data.correct) btnClass = 'bg-green-100 border-green-500 text-green-800 dark:bg-green-900/40 dark:text-green-300';
                        else if (playerAnswer === idx) btnClass = 'bg-red-100 border-red-500 text-red-800 dark:bg-red-900/40 dark:text-red-300';
                        else btnClass = 'opacity-30';
                    } else if (!canInteract) {
                        btnClass += ' opacity-60 cursor-not-allowed';
                    } else {
                        btnClass += ' hover:border-indigo-400';
                    }
                    return (
                        <button key={idx} onClick={() => handleSelect(idx)} disabled={status !== 'playing' || !canInteract} className={`btn-juicy p-4 rounded-2xl border-2 font-bold text-left transition-all text-lg flex items-center justify-between ${btnClass}`}>
                            {opt}
                            {status !== 'playing' && idx === data.correct && <CheckCircle2/>}
                            {status === 'wrong' && playerAnswer === idx && <XCircle/>}
                        </button>
                    );
                })}
            </div>
        </div>
    );
};

const DragDropChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    
    const handleSelect = (opt) => {
        if (status !== 'playing' || !canInteract) return;
        const isCorrect = opt === data.correct;
        updateChallenge({ status: isCorrect ? 'correct' : 'wrong', playerAnswer: opt, endTime: Date.now() });
    };
    
    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-rose-100 dark:bg-rose-900/30 p-3 rounded-full"><Target className="w-8 h-8 text-rose-600 dark:text-rose-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Completa la Frase</h3>
            
            <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-8 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                {data.sentence.split('[BLANK]').map((part, i, arr) => (
                    <React.Fragment key={i}>
                        {part}
                        {i < arr.length - 1 && <span className={`inline-block min-w-[100px] border-b-4 border-dashed pb-1 mx-2 text-center font-black ${status==='correct'?'text-green-500 border-green-500':status==='wrong'?'text-red-500 border-red-500':'text-indigo-500 border-indigo-300 dark:border-indigo-700'}`}>{playerAnswer || '_____'}</span>}
                    </React.Fragment>
                ))}
            </div>
            
            {status === 'playing' ? (
                <div className="flex flex-wrap justify-center gap-3 mb-6">
                    {data.options.map((opt, i) => (
                        <button key={i} onClick={() => handleSelect(opt)} disabled={!canInteract} className={`btn-juicy bg-slate-100 dark:bg-zinc-800 border-2 border-slate-200 dark:border-zinc-700 hover:border-indigo-400 px-6 py-3 rounded-xl font-bold text-lg transition-colors ${!canInteract ? 'opacity-60 cursor-not-allowed' : ''}`}>{opt}</button>
                    ))}
                </div>
            ) : (
                <div className="animate-in mb-6">
                    {status === 'wrong' && <p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">La respuesta era: <span className="text-green-500">{data.correct}</span></p>}
                </div>
            )}
        </div>
    );
};

const UnscrambleChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [shuffledWords, setShuffledWords] = useState([]);
    const [selectedWords, setSelectedWords] = useState([]);

    useEffect(() => {
        if (status === 'playing' && data?.text && shuffledWords.length === 0 && selectedWords.length === 0) {
            const wordsWithIds = data.text.split(' ').map((w, i) => ({ id: i, text: w }));
            setShuffledWords(shuffleArray(wordsWithIds));
        }
    }, [data, status]);

    const checkAnswer = () => {
        const built = selectedWords.map(w => w.text).join(" ");
        const normalize = (str) => str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s{2,}/g," ").trim().toLowerCase();
        const isCorrect = normalize(built) === normalize(data.text);
        updateChallenge({ status: isCorrect ? 'correct' : 'wrong', playerAnswer: built, endTime: Date.now() });
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-amber-100 dark:bg-amber-900/30 p-3 rounded-full"><BrainCircuit className="w-8 h-8 text-amber-600 dark:text-amber-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Ordena la Frase</h3>
            <div className="bg-slate-50 dark:bg-zinc-900 p-3 rounded-xl border border-slate-100 dark:border-zinc-800 mb-6 inline-block"><p className="text-slate-500 dark:text-zinc-400 font-medium italic">"{data.translation}"</p></div>
            
            {status === 'playing' ? (
                <>
                    <div className={`min-h-[80px] h-auto bg-white dark:bg-zinc-950 rounded-2xl p-4 mb-4 flex flex-wrap gap-2 justify-center content-center border-2 border-slate-200 dark:border-zinc-800 shadow-inner`}>
                        {selectedWords.map(w => (
                            <button key={w.id} onClick={() => { if(!canInteract)return; setShuffledWords([...shuffledWords, w]); setSelectedWords(selectedWords.filter(sw => sw.id !== w.id)); }} disabled={!canInteract} className={`btn-juicy bg-white border border-slate-300 dark:border-zinc-600 dark:bg-zinc-800 px-4 py-2 rounded-lg font-bold text-slate-700 dark:text-zinc-200 shadow-sm animate-in ${!canInteract ? 'opacity-80 cursor-not-allowed' : ''}`}>{w.text}</button>
                        ))}
                    </div>
                    
                    <div className="flex flex-wrap gap-2 justify-center mb-6 min-h-[60px]">
                        {shuffledWords.map(w => (
                            <button key={w.id} onClick={() => { if(!canInteract)return; setSelectedWords([...selectedWords, w]); setShuffledWords(shuffledWords.filter(sw => sw.id !== w.id)); }} disabled={!canInteract} className={`btn-juicy bg-slate-100 border border-slate-200 dark:bg-zinc-800 dark:border-zinc-700 px-4 py-2 rounded-lg font-bold text-slate-600 dark:text-zinc-300 animate-in ${!canInteract ? 'opacity-60 cursor-not-allowed' : ''}`}>{w.text}</button>
                        ))}
                    </div>

                    {canInteract && <button onClick={checkAnswer} disabled={selectedWords.length === 0} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50">COMPROBAR</button>}
                </>
            ) : (
                <div className="animate-pop-in mb-6">
                    <div className={`p-4 rounded-xl border-2 mb-4 font-black text-xl ${status === 'correct' ? 'bg-green-50 border-green-500 text-green-700 dark:bg-green-900/20 dark:text-green-400' : 'bg-red-50 border-red-500 text-red-700 dark:bg-red-900/20 dark:text-red-400'}`}>
                        Tu respuesta: {playerAnswer}
                    </div>
                    {status === 'wrong' && <p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">Era: <span className="text-green-500">{data.text}</span></p>}
                </div>
            )}
        </div>
    );
};

const FillBlankChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [input, setInput] = useState('');
    
    const checkAnswer = () => {
        const normalize = (str) => str.trim().toLowerCase();
        const isCorrect = normalize(input) === normalize(data.answer);
        updateChallenge({ status: isCorrect ? 'correct' : 'wrong', playerAnswer: input, endTime: Date.now() });
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-emerald-100 dark:bg-emerald-900/30 p-3 rounded-full"><Pencil className="w-8 h-8 text-emerald-600 dark:text-emerald-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Escribe la Palabra</h3>
            
            <div className="bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 p-6 rounded-2xl mb-4 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                {data.sentence.replace('[BLANK]', '_____')}
            </div>
            {data.hint && <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6 italic">Pista: {data.hint}</p>}
            
            {status === 'playing' ? (
                <>
                    <input 
                        autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} 
                        onKeyDown={e=>e.key==='Enter'&&canInteract&&input.trim()&&checkAnswer()} disabled={!canInteract} 
                        autoComplete="new-password" autoCorrect="off" spellCheck="false" name={"ans_fb_"+Math.random()} id={"ans_fb_"+Math.random()} data-lpignore="true" data-form-type="other" data-1p-ignore="true"
                        className="w-full text-center text-2xl font-black p-4 rounded-xl border-2 border-indigo-300 focus:border-indigo-500 bg-indigo-50 dark:bg-zinc-800 dark:border-zinc-700 dark:focus:border-indigo-500 outline-none mb-6 disabled:opacity-60 disabled:cursor-not-allowed text-slate-800 dark:text-white" 
                        placeholder={canInteract ? "Escribe aquí..." : "El jugador está escribiendo..."}
                    />
                    {canInteract && <button onClick={checkAnswer} disabled={!input.trim()} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50">COMPROBAR</button>}
                </>
            ) : (
                <div className="animate-in mb-6">
                    <div className="text-2xl font-black p-4 mb-2 text-slate-800 dark:text-white">
                        Tu respuesta: <span className={status === 'correct' ? 'text-green-500' : 'text-red-500'}>{playerAnswer || '(sin respuesta)'}</span>
                    </div>
                    {status !== 'correct' && <p className="text-slate-800 dark:text-zinc-200 font-bold text-lg">Era: <span className="text-green-500">{data.answer}</span></p>}
                </div>
            )}
        </div>
    );
};

const MatchingChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [pairs, setPairs] = useState([]);
    const [selectedLeft, setSelectedLeft] = useState(null);
    const [matched, setMatched] = useState(new Set());

    useEffect(() => {
        if (data && data.pairs && status === 'playing' && pairs.length === 0) {
            const l = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.left})));
            const r = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.right})));
            setPairs({ left: l, right: r });
        }
    }, [data, status]);

    const handleRightClick = (rightId) => {
        if(selectedLeft === null || status !== 'playing' || !canInteract) return;
        if(selectedLeft === rightId) {
            const newMatched = new Set(matched).add(selectedLeft);
            setMatched(newMatched);
            setSelectedLeft(null);
            if(newMatched.size === data.pairs.length) {
                updateChallenge({ status: 'correct', playerAnswer: 'All matched', endTime: Date.now() });
            }
        } else {
            updateChallenge({ status: 'wrong', playerAnswer: 'Failed match', endTime: Date.now() });
        }
    };

    if(!pairs.left && status === 'playing') return null;

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-cyan-100 dark:bg-cyan-900/30 p-3 rounded-full"><Link2 className="w-8 h-8 text-cyan-600 dark:text-cyan-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-6">Une las parejas</h3>
            
            {status === 'playing' ? (
                <div className="flex gap-4 mb-6">
                    <div className="flex-1 space-y-2">
                        {pairs.left.map(item => {
                            const isMatched = matched.has(item.id);
                            const isSel = selectedLeft === item.id;
                            return <button key={`l-${item.id}`} onClick={() => !isMatched && canInteract && setSelectedLeft(item.id)} disabled={isMatched || !canInteract} className={`btn-juicy w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-100 border-zinc-200 text-zinc-300 dark:bg-zinc-900 dark:border-zinc-800 dark:text-zinc-600' : isSel ? 'bg-indigo-100 border-indigo-500 text-indigo-700' : 'bg-white border-slate-200 hover:border-indigo-300 dark:bg-zinc-800 dark:border-zinc-700 dark:hover:border-indigo-500 text-slate-700 dark:text-zinc-200'} ${!canInteract ? 'opacity-60 cursor-not-allowed' : ''}`}>{item.text}</button>
                        })}
                    </div>
                    <div className="flex-1 space-y-2">
                        {pairs.right.map(item => {
                            const isMatched = matched.has(item.id);
                            return <button key={`r-${item.id}`} onClick={() => handleRightClick(item.id)} disabled={isMatched || !canInteract} className={`btn-juicy w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-100 border-zinc-200 text-zinc-300 dark:bg-zinc-900 dark:border-zinc-800 dark:text-zinc-600' : 'bg-white border-slate-200 hover:border-indigo-300 dark:bg-zinc-800 dark:border-zinc-700 dark:hover:border-indigo-500 text-slate-700 dark:text-zinc-200'} ${!canInteract ? 'opacity-60 cursor-not-allowed' : ''}`}>{item.text}</button>
                        })}
                    </div>
                </div>
            ) : (
                <div className="animate-in mb-6">
                    <div className={`p-4 rounded-xl border-2 mb-4 font-black text-xl ${status === 'correct' ? 'bg-green-50 border-green-500 text-green-700 dark:bg-green-900/20 dark:text-green-400' : 'bg-red-50 border-red-500 text-red-700 dark:bg-red-900/20 dark:text-red-400'}`}>
                        {status === 'correct' ? '¡Todas emparejadas!' : '¡Te equivocaste de pareja!'}
                    </div>
                </div>
            )}
        </div>
    );
};

const ErrorCorrectionChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [input, setInput] = useState('');
    
    const checkAnswer = () => {
        const normalize = (str) => str.trim().toLowerCase();
        const isCorrect = normalize(input) === normalize(data.correction);
        updateChallenge({ status: isCorrect ? 'correct' : 'wrong', playerAnswer: input, endTime: Date.now() });
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-pink-100 dark:bg-pink-900/30 p-3 rounded-full"><AlertTriangle className="w-8 h-8 text-pink-600 dark:text-pink-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Corrige el Error</h3>
            <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Encuentra la palabra incorrecta y escribe la corrección. <br/><span className="text-xs italic">(Si la palabra sobra, escribe 'eliminate: palabra')</span></p>
            
            <div className="bg-rose-50 dark:bg-rose-900/10 border-2 border-rose-200 dark:border-rose-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-slate-700 dark:text-zinc-200 shadow-sm leading-relaxed">
                {data.sentence}
            </div>
            
            {status === 'playing' ? (
                <>
                    <input 
                        autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} 
                        onKeyDown={e=>e.key==='Enter'&&canInteract&&input.trim()&&checkAnswer()} disabled={!canInteract} 
                        autoComplete="new-password" autoCorrect="off" spellCheck="false" name={"ans_ec_"+Math.random()} id={"ans_ec_"+Math.random()} data-lpignore="true" data-form-type="other" data-1p-ignore="true"
                        className="w-full text-center text-xl font-black p-4 rounded-xl border-2 border-indigo-300 focus:border-indigo-500 bg-white dark:bg-zinc-800 dark:border-zinc-700 dark:focus:border-indigo-500 outline-none mb-6 disabled:opacity-60 disabled:cursor-not-allowed text-slate-800 dark:text-white" 
                        placeholder={canInteract ? "Escribe la palabra correcta..." : "El jugador está escribiendo..."}
                    />
                    {canInteract && <button onClick={checkAnswer} disabled={!input.trim()} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl border-blue-800 font-black text-lg disabled:opacity-50 shadow-lg">COMPROBAR</button>}
                </>
            ) : (
                <div className="animate-in mb-6">
                    <div className="text-xl font-black p-4 mb-2 text-slate-800 dark:text-white">
                        Tu respuesta: <span className={status === 'correct' ? 'text-green-500' : 'text-red-500'}>{playerAnswer || '(sin respuesta)'}</span>
                    </div>
                    {status === 'wrong' && (
                        <div className="text-slate-800 dark:text-zinc-200 font-bold text-lg text-left bg-slate-100 dark:bg-zinc-900 p-4 rounded-xl border border-slate-200 dark:border-zinc-800 mx-auto max-w-sm">
                            <p>El error era: <span className="text-red-500 line-through">{data.error}</span></p>
                            <p>La corrección es: <span className="text-green-500">{data.correction}</span></p>
                        </div>
                    )}
                </div>
            )}
        </div>
    );

const OddOneOutChallenge = ({ modal, updateChallenge, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    
    const handleSelect = (word) => {
        if (status !== 'playing' || !canInteract) return;
        const isCorrect = word === data.odd;
        updateChallenge({ status: isCorrect ? 'correct' : 'wrong', playerAnswer: word, endTime: Date.now() });
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-teal-100 dark:bg-teal-900/30 p-3 rounded-full"><BrainCircuit className="w-8 h-8 text-teal-600 dark:text-teal-400"/></div></div>
            <h3 className="text-2xl font-black text-slate-800 dark:text-zinc-100 mb-2">Encuentra el Intruso</h3>
            <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Selecciona la palabra que no pertenece al grupo.</p>
            
            <div className="grid grid-cols-2 gap-3 mb-6">
                {data.words.map((w, i) => {
                    const isSel = playerAnswer === w;
                    const isOdd = data.odd === w;
                    let btnClass = 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-700 dark:text-zinc-300';
                    
                    if (status !== 'playing') {
                        if (isOdd) btnClass = 'bg-green-100 border-green-500 text-green-800 dark:bg-green-900/40 dark:text-green-300';
                        else if (isSel) btnClass = 'bg-red-100 border-red-500 text-red-800 dark:bg-red-900/40 dark:text-red-300';
                        else btnClass = 'opacity-30';
                    } else if (!canInteract) {
                        btnClass += ' opacity-60 cursor-not-allowed';
                    } else {
                        btnClass += ' hover:border-indigo-400';
                    }
                    
                    return (
                        <button key={i} disabled={status !== 'playing' || !canInteract} onClick={() => handleSelect(w)} className={`btn-juicy p-4 rounded-2xl border-2 font-bold text-lg transition-all ${btnClass}`}>
                            {w}
                        </button>
                    );
                })}
            </div>
            {status !== 'playing' && data.reason && (
                <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 p-4 rounded-xl text-left animate-in mb-6 shadow-sm">
                    <p className="font-bold text-blue-800 dark:text-blue-300 flex items-start gap-2"><HelpCircle className="shrink-0 mt-0.5" size={18}/> {data.reason}</p>
                </div>
            )}
        </div>
    );
};

const SpeakingChallenge = ({ modal, updateChallenge, isSupreme }) => {

    return (
        <div className="w-full text-center">

            <p className="text-sm font-bold text-slate-400 dark:text-zinc-500 mb-6">Traduce esta frase en voz alta. El Host evaluará tu respuesta.</p>

                    {status === 'correct' ? '¡Respuesta Validada!' : 'Respuesta Incorrecta'}
                </div>
            )}
        </div>

const ChallengeRouter = ({ modal, updateChallenge, canInteract, isHost }) => {
    if (!modal || !modal.type) return null;
    const props = { modal, updateChallenge, canInteract, isSupreme: isHost };
    switch(modal.type) {
        case 'multipleChoice': return <MultipleChoiceChallenge {...props}/>;
        case 'dragDrop': return <DragDropChallenge {...props}/>;
        case 'unscramble': return <UnscrambleChallenge {...props}/>;
        case 'fillBlank': return <FillBlankChallenge {...props}/>;
        case 'matching': return <MatchingChallenge {...props}/>;
        case 'errorCorrection': return <ErrorCorrectionChallenge {...props}/>;
        case 'oddOneOut': return <OddOneOutChallenge {...props}/>;
        case 'speaking': return <SpeakingChallenge {...props}/>;
        case 'listening': return <ListeningChallenge {...props}/>;
        case 'roleplay': return <RoleplayChallenge {...props}/>;
        default: return <div className="text-zinc-300 text-center p-8">Tipo de pregunta no soportado: {modal.type}</div>;
    }
};

const generateWideGrid = () => {
    const grid = [];
    for (let r = -12; r <= 12; r++) {
        const rOffset = Math.floor(r / 2);
        for (let q = -20 - rOffset; q <= 20 - rOffset; q++) {
            grid.push({ id: `${q},${r}`, q, r, ...getXY(q, r) });
        }
    }
    return grid;
};

// APLICACIÓN PRINCIPAL
// ==========================================
const App = () => {
    const [appState, setAppState] = useState('HOME');
    
    const [roomId, setRoomId] = useState("");
    const [inputRoomId, setInputRoomId] = useState("");
    const [localPlayerId, setLocalPlayerId] = useState(null); 
    const [isHost, setIsHost] = useState(false);
    
    const [playerName, setPlayerName] = useState("");
    const [selectedEmoji, setSelectedEmoji] = useState("👽");

    const [game, setGame] = useState(INITIAL_GAME_STATE);
    const [toastMsg, setToastMsg] = useState(null);
    const [showAllPlayers, setShowAllPlayers] = useState(false);
    const [linkCopied, setLinkCopied] = useState(false);
    const [codeCopied, setCodeCopied] = useState(false);

    const [quizContent, setQuizContent] = useState(null); 
    const [quizTitle, setQuizTitle] = useState("");
    const [quizLoading, setQuizLoading] = useState(true);
    const [quizError, setQuizError] = useState(null);
    const [recoverableSession, setRecoverableSession] = useState(null);

    const [isRolling, setIsRolling] = useState(false);
    const [localDiceFace, setLocalDiceFace] = useState(6);
    const [selectedForkDir, setSelectedForkDir] = useState(null);
    const [ghostPathCoords, setGhostPathCoords] = useState([]);
    const [ghostLandingNode, setGhostLandingNode] = useState(null);

    const toastTimerRef = useRef(null);
    const lastEventTsRef = useRef(0);
    const gameRef = useRef(game);
    const localPlayerIdRef = useRef(localPlayerId);
    const quizContentRef = useRef(null);
    
    useEffect(() => { gameRef.current = game; }, [game]);
    useEffect(() => { localPlayerIdRef.current = localPlayerId; }, [localPlayerId]);
    useEffect(() => { quizContentRef.current = quizContent; }, [quizContent]);

    // Listener para los eventos sincronizados globales
    useEffect(() => {
        if (game.lastEvent && game.lastEvent.ts && game.lastEvent.ts !== lastEventTsRef.current) {
            showToast(game.lastEvent.msg);
            if (game.lastEvent.msg.includes("⭐")) confetti({particleCount: 150, spread: 70});
            lastEventTsRef.current = game.lastEvent.ts;
        }
    }, [game.lastEvent]);

    const isMyTurnRender = localPlayerId !== null && localPlayerId !== 'HOST' && game.players && game.players.length > 0 && game.turn === (localPlayerId - 1);

    const isMyTurnAction = useCallback(() => {
        const id = localPlayerIdRef.current;
        const g = gameRef.current;
        if (id === null || id === 'HOST' || !g.players || g.players.length === 0) return false;
        return g.turn === (id - 1);
    }, []);

    const showToast = useCallback((msg) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToastMsg(msg);
        toastTimerRef.current = setTimeout(() => setToastMsg(null), msg.includes('❌') ? 5000 : 2500);
    }, []);

    const advanceTurn = useCallback((forceHostOverride = false) => {
        if (!isMyTurnAction() && !forceHostOverride) return;
        setTimeout(() => {
            const currentGame = gameRef.current;
            const nextTurn = (currentGame.turn + 1) % currentGame.players.length;
            const nextActivePos = currentGame.players[nextTurn].pos; 

            const updates = { phase: 'IDLE', turn: nextTurn, activePos: nextActivePos, pendingNode: null, currentDialog: "", activeChallenge: null };
            if (nextTurn === 0) { 
                updates.round = (currentGame.round || 1) + 1; 
                updates.lastEvent = { msg: `🎉 ¡Ronda ${updates.round}!`, ts: Date.now() }; 
            }
            
            if (db && roomId) {
                updateDoc(doc(db, 'periplo-party-rooms', roomId), updates);
            } else {
                setGame(prev => ({ ...prev, ...updates }));
            }
        }, 1500);
    }, [isMyTurnAction, roomId]);

    // ==========================================
    // POOLS EN FIREBASE
    // ==========================================
    const HUMAN_TYPES = ['speaking', 'listening', 'roleplay'];
    const buildFreshPools = useCallback((content) => {
        if (!content) return { auto: {}, human: {} };
        const auto = {};
        const human = {};
        Object.keys(content).forEach(key => {
            if (Array.isArray(content[key]) && content[key].length > 0) {
                const bucket = HUMAN_TYPES.includes(key) ? human : auto;
                bucket[key] = shuffleArray(content[key]);
            }
        });
        return { auto, human };
    }, []);

    const pickQuestion = useCallback(async (kind = 'auto') => {
        const content = quizContentRef.current;
        if (!content) return null;

        const drawFrom = (pools, bucketKey) => {
            const bucket = pools[bucketKey] || {};
            const availableTypes = Object.keys(bucket).filter(k => Array.isArray(bucket[k]) && bucket[k].length > 0);
            if (availableTypes.length === 0) return null;
            const randomType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
            const updatedPool = [...bucket[randomType]];
            const question = updatedPool.shift();
            updatedPool.push(question);
            pools[bucketKey] = { ...bucket, [randomType]: updatedPool };
            return { type: randomType, data: question };
        };

        if (db && roomId) {
            try {
                let picked = null;
                await runTransaction(db, async (txn) => {
                    const roomRef = doc(db, 'periplo-party-rooms', roomId);
                    const snap = await txn.get(roomRef);
                    if (!snap.exists()) return;
                    const data = snap.data();
                    let pools = data.pools || {};
                    if (!pools.auto && !pools.human) pools = buildFreshPools(content);

                    picked = drawFrom(pools, kind);
                    if (!picked) {
                        const fresh = buildFreshPools(content);
                        pools[kind] = fresh[kind];
                        picked = drawFrom(pools, kind);
                    }
                    if (!picked && kind === 'human') {
                        picked = drawFrom(pools, 'auto');
                        if (!picked) {
                            const fresh = buildFreshPools(content);
                            pools.auto = fresh.auto;
                            picked = drawFrom(pools, 'auto');
                        }
                    }

                    txn.update(roomRef, { pools });
                });
                return picked;
            } catch (e) {
                console.warn("pickQuestion txn failed", e);
                return null;
            }
        } else {
            let pools = gameRef.current.pools || {};
            if (!pools.auto && !pools.human) pools = buildFreshPools(content);

            let picked = drawFrom(pools, kind);
            if (!picked) {
                const fresh = buildFreshPools(content);
                pools[kind] = fresh[kind];
                picked = drawFrom(pools, kind);
            }
            if (!picked && kind === 'human') {
                picked = drawFrom(pools, 'auto');
                if (!picked) {
                    const fresh = buildFreshPools(content);
                    pools.auto = fresh.auto;
                    picked = drawFrom(pools, 'auto');
                }
            }
            setGame(prev => ({ ...prev, pools }));
            return picked;
        }
    }, [roomId, buildFreshPools]);

    // ==========================================
    // INICIALIZACIÓN + RECUPERACIÓN
    // ==========================================
    useEffect(() => {
        try {
            const savedName = localStorage.getItem('periplo_playerName');
            const savedEmoji = localStorage.getItem('periplo_playerEmoji');
            if (savedName) setPlayerName(savedName);
            if (savedEmoji) setSelectedEmoji(savedEmoji);
        } catch(e) {}

        const checkRecovery = async (currentQuizId) => {
            const savedRoomId = localStorage.getItem('periplo_roomId');
            const savedPlayerId = localStorage.getItem('periplo_localPlayerId');
            const savedIsHost = localStorage.getItem('periplo_isHost');
            const savedQuizId = localStorage.getItem('periplo_quizId');

            if (!savedRoomId || !savedPlayerId || !db) return;
            if (savedQuizId && currentQuizId && savedQuizId !== currentQuizId) {
                localStorage.removeItem('periplo_roomId'); localStorage.removeItem('periplo_localPlayerId');
                localStorage.removeItem('periplo_isHost'); localStorage.removeItem('periplo_quizId');
                return;
            }

            try {
                const snap = await withTimeout(getDoc(doc(db, 'periplo-party-rooms', savedRoomId)), 6000, 'RECOVER');
                if (snap.exists()) {
                    const data = snap.data();
                    const stillThere = savedIsHost === 'true' || (data.players || []).some(p => p.id === Number(savedPlayerId));
                    if (!stillThere) {
                        localStorage.removeItem('periplo_roomId'); localStorage.removeItem('periplo_localPlayerId');
                        localStorage.removeItem('periplo_isHost'); localStorage.removeItem('periplo_quizId');
                        return;
                    }
                    setRecoverableSession({
                        roomId: savedRoomId,
                        playerId: savedPlayerId,
                        isHost: savedIsHost === 'true',
                        data, status: data.status, round: data.round || 1, playersCount: (data.players || []).length
                    });
                } else {
                    localStorage.removeItem('periplo_roomId'); localStorage.removeItem('periplo_localPlayerId');
                    localStorage.removeItem('periplo_isHost'); localStorage.removeItem('periplo_quizId');
                }
            } catch(e) { console.warn("Error reconectando a la sala:", e); }
        };

        const loadQuiz = async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                setQuizError("Falta el ID del banco. Abre este juego desde el Teacher Hub.");
                setQuizLoading(false); return;
            }
            if (!db) { setQuizError("Sin conexión a Firebase."); setQuizLoading(false); return; }
            try {
                const snap = await withTimeout(getDoc(doc(db, QUIZZES_PATH, id)), 8000, 'LOAD_QUIZ');
                if (!snap.exists()) throw new Error("Banco no encontrado");
                const data = snap.data();
                setQuizContent(data.content || {}); setQuizTitle(data.title || "Periplo Party");
                setQuizLoading(false); checkRecovery(id);
            } catch(e) {
                setQuizError(e.message || "Error al cargar el banco"); setQuizLoading(false);
            }
        };
        loadQuiz();
    }, []);

    useEffect(() => {
        if (!db || !roomId || (appState !== 'LOBBY' && appState !== 'PLAYING')) return;
        const roomDocRef = doc(db, 'periplo-party-rooms', roomId);
        const unsubscribe = onSnapshot(roomDocRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                setGame(data);
                if (data.status === 'PLAYING' && appState !== 'PLAYING') setAppState('PLAYING');
            } else {
                showToast("⚠️ La sala fue cerrada"); leaveRoom();
            }
        }, (error) => { showToast(`❌ Conexión perdida`); });
        return () => unsubscribe();
    }, [roomId, appState]);

    const updateGame = useCallback((updates) => {
        if (db && roomId) {
            updateDoc(doc(db, 'periplo-party-rooms', roomId), updates).catch(e => { console.error("[Periplo] updateDoc error:", e); });
        } else {
            setGame(prev => ({ ...prev, ...updates }));
            if (updates.status === 'PLAYING') setAppState('PLAYING');
        }
    }, [roomId]);

    // ==========================================
    // FLUJO LOBBY / PRE-GAME
    // ==========================================
    const copyGameLink = () => {
        const url = window.location.href.split('?')[0];
        navigator.clipboard.writeText(url).then(() => {
            setLinkCopied(true); setTimeout(() => setLinkCopied(false), 2000);
        });
    };

    const copyRoomCode = () => {
        navigator.clipboard.writeText(roomId).then(() => {
            setCodeCopied(true); setTimeout(() => setCodeCopied(false), 2000);
        });
    };

    const handleCreateRoomClick = () => { setIsHost(true); setAppState('PROFILE'); };

    const handleJoinRoomClick = async () => {
        if (!inputRoomId.trim()) return showToast("⚠️ Ingresa un código");
        const code = inputRoomId.trim().toUpperCase();
        
        if (db) {
            try {
                const snapshot = await withTimeout(getDoc(doc(db, 'periplo-party-rooms', code)), 8000, 'CHECK_ROOM');
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    if (data.status === 'LOBBY' && (data.players || []).length < 4) {
                        setRoomId(code); setIsHost(false); setAppState('PROFILE');
                    } else if (data.status !== 'LOBBY') {
                        showToast("❌ El juego ya inició");
                    } else {
                        showToast("❌ Sala llena (4/4)");
                    }
                } else { showToast("❌ Sala no encontrada"); }
            } catch(e) { showToast(`❌ Error de conexión`); }
        } else {
            setRoomId(code); setIsHost(false); setAppState('PROFILE');
        }
    };

    const saveSessionToLocal = (id, pId, isH) => {
        localStorage.setItem('periplo_roomId', id);
        localStorage.setItem('periplo_localPlayerId', pId);
        localStorage.setItem('periplo_isHost', isH ? 'true' : 'false');
        const currentQuizId = new URLSearchParams(window.location.search).get('id');
        if (currentQuizId) localStorage.setItem('periplo_quizId', currentQuizId);
    };

    const handleReconnect = () => {
        if (!recoverableSession) return;
        const s = recoverableSession;
        setRoomId(s.roomId);
        setLocalPlayerId(s.playerId === 'HOST' ? 'HOST' : Number(s.playerId));
        setIsHost(s.isHost);
        setGame(s.data);
        setAppState(s.status === 'PLAYING' ? 'PLAYING' : 'LOBBY');
        setRecoverableSession(null);
    };

    const handleForgetSession = () => {
        localStorage.removeItem('periplo_roomId'); localStorage.removeItem('periplo_localPlayerId');
        localStorage.removeItem('periplo_isHost'); localStorage.removeItem('periplo_quizId');
        setRecoverableSession(null); showToast("✅ Sesión olvidada");
    };

    const handleProfileSubmit = async (role = 'PLAYER') => {
        const name = playerName.trim();
        if (!name && role !== 'OBSERVER') return showToast("⚠️ Pon tu nombre para jugar");
        const finalName = name || 'Moderador';
        
        try { localStorage.setItem('periplo_playerName', finalName); localStorage.setItem('periplo_playerEmoji', selectedEmoji); } catch(e) {}

        if (isHost) {
            const newId = Math.random().toString(36).substring(2, 6).toUpperCase();
            const initialPools = buildFreshPools(quizContent);
            let initialPlayers = [];
            let myId = 'HOST';

            if (role === 'PLAYER') {
                const c = PLAYER_COLORS[0];
                initialPlayers = [{ id: 1, name: finalName, emoji: selectedEmoji, coins: 10, stars: 0, pos: "5,5", color: c.color, activeColor: c.activeColor }];
                myId = 1;
            }
            
            if (db) {
                try {
                    await withTimeout(setDoc(doc(db, 'periplo-party-rooms', newId), { 
                        ...INITIAL_GAME_STATE, players: initialPlayers, pools: initialPools, quizId: new URLSearchParams(window.location.search).get('id') || null, quizTitle: quizTitle || "Periplo Party", createdAt: Date.now() 
                    }), 8000, 'CREATE_ROOM');
                    setRoomId(newId); setLocalPlayerId(myId); 
                    saveSessionToLocal(newId, myId, true);
                    setAppState('LOBBY');
                } catch(e) { showToast("❌ Firebase no responde"); }
            } else {
                setRoomId(newId); setLocalPlayerId(myId);
                saveSessionToLocal(newId, myId, true);
                setGame({ ...INITIAL_GAME_STATE, players: initialPlayers, pools: initialPools });
                setAppState('LOBBY');
            }
        } else {
            if (db) {
                try {
                    let assignedId = null;
                    await withTimeout(runTransaction(db, async (txn) => {
                        const roomDocRef = doc(db, 'periplo-party-rooms', roomId);
                        const snap = await txn.get(roomDocRef);
                        if (!snap.exists()) throw new Error('ROOM_NOT_FOUND');
                        const current = snap.data();
                        const players = current.players || [];
                        if (current.status !== 'LOBBY') throw new Error('GAME_STARTED');
                        if (players.length >= 4) throw new Error('ROOM_FULL');
                        
                        assignedId = players.length + 1;
                        const c = PLAYER_COLORS[assignedId - 1];
                        const newPlayer = { id: assignedId, name: finalName, emoji: selectedEmoji, coins: 10, stars: 0, pos: "5,5", color: c.color, activeColor: c.activeColor };
                        txn.update(roomDocRef, { players: [...players, newPlayer] });
                    }), 8000, 'JOIN_ROOM');
                    
                    if (assignedId) { 
                        setLocalPlayerId(assignedId); 
                        saveSessionToLocal(roomId, assignedId, false);
                        setAppState('LOBBY'); 
                    }
                } catch(e) {
                    showToast(`❌ ${e.message === 'ROOM_NOT_FOUND' ? 'Sala no encontrada' : 'Error al unirse'}`);
                    setRoomId(""); setAppState('HOME');
                }
            } else {
                const newPlayerId = (game.players || []).length + 1;
                setLocalPlayerId(newPlayerId);
                saveSessionToLocal(roomId, newPlayerId, false);
                const c = PLAYER_COLORS[newPlayerId - 1];
                const newPlayer = { id: newPlayerId, name: finalName, emoji: selectedEmoji, coins: 10, stars: 0, pos: "5,5", color: c.color, activeColor: c.activeColor };
                setGame(prev => ({ ...prev, players: [...prev.players, newPlayer] }));
                setAppState('LOBBY');
            }
        }
    };

    const leaveRoom = async () => {
        if (db && roomId && localPlayerId) {
            try {
                const roomDocRef = doc(db, 'periplo-party-rooms', roomId);
                if (isHost) await deleteDoc(roomDocRef);
                else {
                    await runTransaction(db, async (txn) => {
                        const snap = await txn.get(roomDocRef);
                        if (!snap.exists()) return;
                        const current = snap.data();
                        txn.update(roomDocRef, { players: (current.players || []).filter(p => p.id !== localPlayerId) });
                    });
                }
            } catch(e) {}
        }
        localStorage.removeItem('periplo_roomId'); localStorage.removeItem('periplo_localPlayerId');
        localStorage.removeItem('periplo_isHost'); localStorage.removeItem('periplo_quizId');
        
        setRoomId(""); setLocalPlayerId(null); setIsHost(false); setGame(INITIAL_GAME_STATE); setAppState('HOME');
    };

    const startGame = () => {
        const freshPools = buildFreshPools(quizContent);
        updateGame({ status: 'PLAYING', activePos: game.players[0].pos, pools: freshPools });
    };

    // ==========================================
    // MOTOR DE MOVIMIENTO Y MAPA
    // ==========================================
    const reverseMap = useMemo(() => {
        const map = {};
        Object.values(RAW_MAP_DATA).forEach(node => {
            (node.dirs || []).forEach(dir => {
                const targetId = `${node.q + HEX_DIRS[dir].q},${node.r + HEX_DIRS[dir].r}`;
                if (RAW_MAP_DATA[targetId]) {
                    if (!map[targetId]) map[targetId] = [];
                    map[targetId].push(node.id);
                }
            });
        });
        return map;
    }, []);

    const forestDecorations = useMemo(() => {
        const grid = generateWideGrid();
        const emptyHexes = grid.filter(h => !RAW_MAP_DATA[h.id]);
        return emptyHexes.map(h => {
            const hash = Math.abs(Math.sin(h.q * 12.9898 + h.r * 78.233)) * 10000;
            const rand = hash - Math.floor(hash);
            let emoji = null;
            let bgTones = ['#064e3b', '#022c22', '#065f46'];

            if (h.q > 2 && h.r < -2) { if (rand < 0.4) emoji = rand < 0.2 ? '🍄' : '🐛'; } 
            else if (h.q < -4 && h.r > 2) { bgTones = ['#0369a1', '#0c4a6e', '#075985']; if (rand < 0.3) emoji = rand < 0.15 ? '🌊' : (rand < 0.25 ? '🦆' : '🐸'); } 
            else if (h.q < -4 && h.r < -2) { if (rand < 0.5) emoji = rand < 0.4 ? '🌲' : '🦉'; } 
            else if (Math.abs(h.q) <= 3 && Math.abs(h.r) <= 2) { bgTones = ['#166534', '#14532d', '#15803d']; if (rand < 0.5) emoji = rand < 0.3 ? '🌼' : (rand < 0.4 ? '🐝' : '🦋'); } 
            else if (h.q > 3 && h.r > 2) { bgTones = ['#3f3f46', '#27272a', '#52525b']; if (rand < 0.3) emoji = rand < 0.2 ? '🪨' : '⛏️'; } 
            else if (h.q > 4 && h.r > -4 && h.r < 4) { bgTones = ['#312e81', '#1e1b4b', '#3730a3']; if (rand < 0.4) emoji = rand < 0.15 ? '🦇' : (rand < 0.25 ? '🕸️' : '🪦'); } 
            else if (h.q < -7 && Math.abs(h.r) <= 2) { if (rand < 0.3) emoji = rand < 0.1 ? '⛺' : (rand < 0.2 ? '🔥' : '🪵'); } 
            else { if (rand < 0.15) emoji = '🌳'; else if (rand < 0.25) emoji = '🌿'; }

            return { ...h, emoji, fill: bgTones[Math.floor(rand * bgTones.length)] };
        });
    }, []);

    const getValidOuts = (node) => {
        if (!node || !node.dirs) return [];
        return node.dirs.map(dir => ({ dir: dir, id: `${node.q + HEX_DIRS[dir].q},${node.r + HEX_DIRS[dir].r}` })).filter(out => RAW_MAP_DATA[out.id]);
    };
    
    const executeMoveStep = (nextNodeId) => {
        const currentGame = gameRef.current;
        const nextNode = RAW_MAP_DATA[nextNodeId];
        const isNextFork = getValidOuts(nextNode).length > 1;
        
        // FIX: Bowser (Chupacabras) ahora es "isZeroCost", actúa como una casilla de paso transparente.
        const isZeroCost = isNextFork || nextNode.type === 'stone' || nextNode.type === 'bowser' || (nextNode.type === 'star_node' && nextNodeId !== currentGame.activeStarId);
        const newMoves = isZeroCost ? currentGame.movesLeft : currentGame.movesLeft - 1;

        let newPlayers = [...currentGame.players];
        newPlayers[currentGame.turn] = { ...newPlayers[currentGame.turn], pos: nextNodeId };

        let updates = { activePos: nextNodeId, movesLeft: newMoves, players: newPlayers, pendingNode: null, currentDialog: "" };

        if (newMoves > 0 && nextNode.type === 'koopa') {
            const pName = newPlayers[currentGame.turn].name;
            newPlayers[currentGame.turn].coins += 10;
            updates.lastEvent = { msg: `🐢 Wealthy Turtle da +10 Monedas a ${pName}`, ts: Date.now() };
        }

        let nextPhase = 'MOVING';
        const needsPrompt = newMoves <= 0 && (nextNode.type === 'koopa' || nextNode.type === 'boo');
        // FIX: Bowser (Chupacabras) agregado a los interceptores activos sin importar cuántos pasos queden.
        const interceptor = nextNode.type === 'stone' || nextNode.type === 'bowser' || (nextNode.type === 'star_node' && nextNodeId === currentGame.activeStarId);

        if (newMoves <= 0 && (nextNode.type === 'blue' || nextNode.type === 'red')) {
            nextPhase = 'PENDING_END_TURN';
        } else if (interceptor) {
            if (nextNode.type === 'stone') nextPhase = 'STONE_PROMPT';
            else if (nextNode.type === 'bowser') { nextPhase = 'BOWSER_PROMPT'; updates.currentDialog = CHUPACABRAS_DIALOGS[Math.floor(Math.random() * CHUPACABRAS_DIALOGS.length)]; }
            else nextPhase = 'STAR_PROMPT';
            updates.pendingNode = nextNodeId;
        } else if (needsPrompt) {
            if (nextNode.type === 'koopa') { nextPhase = 'KOOPA_PROMPT'; updates.currentDialog = WT_DIALOGS[Math.floor(Math.random() * WT_DIALOGS.length)]; }
            else if (nextNode.type === 'boo') nextPhase = 'BOO_PROMPT';
            updates.pendingNode = nextNodeId;
        } else if (newMoves <= 0) {
            nextPhase = 'PENDING_END_TURN';
        }

        updates.phase = nextPhase;
        updateGame(updates);
    };

    const tryMoveTo = (nextNodeId) => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        const nextNode = RAW_MAP_DATA[nextNodeId];
        
        let tempPlayers = [...currentGame.players];
        tempPlayers[currentGame.turn] = { ...tempPlayers[currentGame.turn], pos: nextNodeId };
        
        const needsPrompt = nextNode.type === 'stone' || (nextNode.type === 'star_node' && nextNodeId === currentGame.activeStarId) || nextNode.type === 'koopa' || nextNode.type === 'bowser' || nextNode.type === 'boo';

        if (needsPrompt) {
            updateGame({ activePos: nextNodeId, players: tempPlayers, phase: 'PAUSED_FOR_PROMPT' }); 
            setTimeout(() => {
                if (!isMyTurnAction()) return; 
                let newPhase = '';
                let dialog = '';
                if (nextNode.type === 'stone') newPhase = 'STONE_PROMPT';
                else if (nextNode.type === 'star_node') newPhase = 'STAR_PROMPT';
                else if (nextNode.type === 'koopa') { newPhase = 'KOOPA_PROMPT'; dialog = WT_DIALOGS[Math.floor(Math.random() * WT_DIALOGS.length)]; }
                else if (nextNode.type === 'bowser') { newPhase = 'BOWSER_PROMPT'; dialog = CHUPACABRAS_DIALOGS[Math.floor(Math.random() * CHUPACABRAS_DIALOGS.length)]; }
                else if (nextNode.type === 'boo') newPhase = 'BOO_PROMPT';
                
                updateGame({ phase: newPhase, pendingNode: nextNodeId, currentDialog: dialog });
            }, 350);
            return;
        }

        updateGame({ activePos: nextNodeId, players: tempPlayers, phase: 'PAUSED_FOR_PROMPT' });
        setTimeout(() => executeMoveStep(nextNodeId), 350);
    };

    useEffect(() => {
        if (isMyTurnRender && game.phase === 'MOVING' && game.movesLeft > 0 && !isRolling) {
            const timer = setTimeout(() => {
                const currentGame = gameRef.current;
                const currentNode = RAW_MAP_DATA[currentGame.activePos];
                const validOuts = getValidOuts(currentNode);

                if (validOuts.length === 0) { updateGame({ phase: 'PENDING_END_TURN' }); return; }
                if (validOuts.length > 1) { updateGame({ phase: 'CHOICE' }); return; }

                tryMoveTo(validOuts[0].id);
            }, 350);
            return () => clearTimeout(timer);
        }
    }, [game.phase, game.movesLeft, game.activePos, isRolling, isMyTurnRender]);

    useEffect(() => {
        if (isMyTurnRender && game.phase === 'PENDING_END_TURN') {
            const timer = setTimeout(() => endTurnHandler(), 200);
            return () => clearTimeout(timer);
        }
    }, [game.phase, isMyTurnRender]);

    const endTurnHandler = async () => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        const finalNode = RAW_MAP_DATA[currentGame.activePos];
        if (!finalNode) { advanceTurn(); return; }

        if (finalNode.type === 'blue' || finalNode.type === 'red') {
            const q = await pickQuestion('auto');
            if (!q) { showToast("⚠️ Banco sin preguntas"); advanceTurn(); return; }
            updateGame({
                activeChallenge: { type: q.type, data: q.data, status: 'playing', playerAnswer: null, startTime: Date.now(), endTime: null, context: { trigger: finalNode.type } }, phase: 'CHALLENGE'
            });
            return; 
        }

        if (finalNode.type === 'event') {
            const q = await pickQuestion('human');
            if (!q) { showToast("⚡ ¡Evento Sorpresa! (sin pregunta)"); advanceTurn(); return; }
            showToast("⚡ ¡Evento Sorpresa!");
            updateGame({
                activeChallenge: { type: q.type, data: q.data, status: 'playing', playerAnswer: null, startTime: Date.now(), endTime: null, context: { trigger: 'event_land' } }, phase: 'CHALLENGE'
            });
            return;
        }

        advanceTurn();
    };

    const rollDice = () => {
        if (!isMyTurnAction() || gameRef.current.phase !== 'IDLE') return;
        setIsRolling(true);
        let count = 0;
        const interval = setInterval(() => {
            setLocalDiceFace(Math.floor(Math.random() * 6) + 1);
            count++;
            if (count > 15) {
                 clearInterval(interval);
                 const finalRoll = Math.floor(Math.random() * 6) + 1;
                 setLocalDiceFace(finalRoll);
                 setTimeout(() => {
                     setIsRolling(false);
                     updateGame({ diceVal: finalRoll, movesLeft: finalRoll, phase: 'MOVING' });
                 }, 800);
            }
        }, 50);
    };

    const calculateGhostPath = (startNodeId, chosenDirIdx) => {
        let path = [];
        let currentId = startNodeId;
        let steps = game.movesLeft;

        path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
        let nextId = `${RAW_MAP_DATA[currentId].q + HEX_DIRS[chosenDirIdx].q},${RAW_MAP_DATA[currentId].r + HEX_DIRS[chosenDirIdx].r}`;
        if (!RAW_MAP_DATA[nextId]) return { path, landingNode: null };
        
        currentId = nextId;
        path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
        
        const nextNode = RAW_MAP_DATA[currentId];
        const nextOuts = getValidOuts(nextNode);
        // FIX: Bowser (Chupacabras) excluido de decrementar `steps`.
        if (nextOuts.length <= 1 && nextNode.type !== 'stone' && nextNode.type !== 'bowser' && !(nextNode.type === 'star_node' && nextNode.id === game.activeStarId)) steps--; 

        while (steps > 0) {
            let node = RAW_MAP_DATA[currentId];
            let outs = getValidOuts(node);
            if (outs.length === 0 || outs.length > 1 || node.type === 'stone' || node.type === 'bowser' || (node.type === 'star_node' && node.id === game.activeStarId) || node.type === 'koopa' || node.type === 'boo') break; 
            currentId = outs[0].id;
            path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
            
            let nnNode = RAW_MAP_DATA[currentId];
            let nnOuts = getValidOuts(nnNode);
            // FIX: Bowser (Chupacabras) excluido de decrementar `steps`.
            if (nnOuts.length <= 1 && nnNode.type !== 'stone' && nnNode.type !== 'bowser' && !(nnNode.type === 'star_node' && nnNode.id === game.activeStarId)) steps--;
        }
        return { path, landingNode: RAW_MAP_DATA[currentId] };
    };

    const previewChoice = (dirIdx) => {
        if (!isMyTurnAction()) return;
        setSelectedForkDir(dirIdx);
        const ghostData = calculateGhostPath(game.activePos, dirIdx);
        setGhostPathCoords(ghostData.path);
        setGhostLandingNode(ghostData.landingNode);
    };

    const confirmChoice = () => {
        if (!isMyTurnAction() || selectedForkDir === null) return;
        const nextId = `${RAW_MAP_DATA[game.activePos].q + HEX_DIRS[selectedForkDir].q},${RAW_MAP_DATA[game.activePos].r + HEX_DIRS[selectedForkDir].r}`;
        setSelectedForkDir(null); setGhostPathCoords([]); setGhostLandingNode(null);
        tryMoveTo(nextId);
    };

    const handleStonePay = () => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        let newPlayers = [...currentGame.players];
        const pName = newPlayers[currentGame.turn].name;
        newPlayers[currentGame.turn].coins -= 10;
        const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
        updateGame({ players: newPlayers, phase: nextPhase, pendingNode: null, lastEvent: { msg: `🪨 ¡${pName} pagó el peaje! (-10)`, ts: Date.now() } });
    };

    const handleStoneFail = () => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        let curr = currentGame.activePos;
        for(let i=0; i<5; i++) {
            const parents = reverseMap[curr];
            if(parents && parents.length > 0) curr = parents[0]; else break;
        }
        let newPlayers = [...currentGame.players];
        newPlayers[currentGame.turn].pos = curr;
        const pName = newPlayers[currentGame.turn].name;
        updateGame({ activePos: curr, players: newPlayers, movesLeft: 0, phase: 'IDLE', lastEvent: { msg: `💥 ¡La Piedra aplastó a ${pName}! Retrocede.`, ts: Date.now() } });
        setTimeout(() => endTurnHandler(), 400); 
    };

    const handleStarBuy = (buy) => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        let updates = { pendingNode: null };
        if (buy) {
            let newPlayers = [...currentGame.players];
            const pName = newPlayers[currentGame.turn].name;
            newPlayers[currentGame.turn].coins -= 20;
            newPlayers[currentGame.turn].stars += 1;
            updates.players = newPlayers;
            updates.activeStarId = STAR_LOCATIONS.filter(id => id !== currentGame.activeStarId)[Math.floor(Math.random() * 2)];
            updates.lastEvent = { msg: `⭐ ¡${pName} compró una Estrella!`, ts: Date.now() };
        }
        updates.phase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
        updateGame(updates);
    };

    const handleKoopaAccept = () => { 
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        let newPlayers = [...currentGame.players];
        const pName = newPlayers[currentGame.turn].name;
        newPlayers[currentGame.turn].coins += 10;
        const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
        updateGame({ players: newPlayers, phase: nextPhase, pendingNode: null, lastEvent: { msg: `🐢 ¡${pName} recibió 10 Monedas!`, ts: Date.now() } });
    };

    const handleBooPass = () => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
        updateGame({ phase: nextPhase, pendingNode: null, booAction: null, lastEvent: { msg: "👻 Boo se aleja flotando...", ts: Date.now() } });
    };
    
    const handleBowserTrivia = async () => {
        if (!isMyTurnAction()) return;
        const q = await pickQuestion('human');
        if (!q) { 
            const currentGame = gameRef.current;
            let newPlayers = [...currentGame.players];
            const pName = newPlayers[currentGame.turn].name;
            // FIX: Fallback damage si se queda sin preguntas (-15)
            newPlayers[currentGame.turn].coins -= 15;
            const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
            updateGame({ players: newPlayers, phase: nextPhase, pendingNode: null, lastEvent: { msg: `💀 Chupacabras muerde a ${pName} (-15)`, ts: Date.now() } });
            return; 
        }
        updateGame({ activeChallenge: { type: q.type, data: q.data, status: 'playing', playerAnswer: null, startTime: Date.now(), endTime: null, context: { trigger: 'bowser_pass' } }, phase: 'CHALLENGE' });
    };

    const startBooSteal = (action) => { if (!isMyTurnAction()) return; updateGame({ booAction: action, phase: 'BOO_TARGET' }); };

    const executeBooSteal = async (targetId) => {
        if (!isMyTurnAction()) return;
        const currentGame = gameRef.current;
        const pName = currentGame.players[currentGame.turn].name;
        
        if (currentGame.booAction === 'coins') {
            let newPlayers = [...currentGame.players];
            const targetIdx = newPlayers.findIndex(p => p.id === targetId);
            const stolen = Math.min(10, newPlayers[targetIdx].coins); 
            newPlayers[targetIdx].coins -= stolen;
            newPlayers[currentGame.turn].coins += stolen;
            const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
            updateGame({ players: newPlayers, phase: nextPhase, pendingNode: null, booAction: null, lastEvent: { msg: `👻 ¡Boo robó ${stolen} monedas para ${pName}!`, ts: Date.now() } });
        } else if (currentGame.booAction === 'star') {
            let newPlayers = [...currentGame.players];
            newPlayers[currentGame.turn].coins -= 40;
            const q = await pickQuestion('human');
            if (!q) { 
                const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
                updateGame({ players: newPlayers, phase: nextPhase, pendingNode: null, booAction: null, lastEvent: { msg: `⚠️ Boo se rinde (sin pregunta). ${pName} pierde dinero.`, ts: Date.now() } });
                return; 
            }
            updateGame({ 
                players: newPlayers,
                activeChallenge: { type: q.type, data: q.data, status: 'playing', playerAnswer: null, startTime: Date.now(), endTime: null, context: { trigger: 'boo_star', targetId } }, 
                phase: 'CHALLENGE' 
            });
        }
    };

    const updateChallenge = useCallback((updates) => {
        if (db && roomId) {
            const fbUpdates = {};
            Object.keys(updates).forEach(k => { fbUpdates[`activeChallenge.${k}`] = updates[k]; });
            updateDoc(doc(db, 'periplo-party-rooms', roomId), fbUpdates);
        } else {
            setGame(prev => ({ ...prev, activeChallenge: { ...prev.activeChallenge, ...updates } }));
        }
    }, [roomId]);

    const handleChallengeTimeout = () => {
        if (!isMyTurnAction()) return;
        if (!gameRef.current.activeChallenge || gameRef.current.activeChallenge.status !== 'playing') return;
        updateChallenge({ status: 'timeout', playerAnswer: null, endTime: Date.now() });
    };

    // ==========================================
    // RESOLVE CHALLENGE — EVENTOS SINCRONIZADOS
    // ==========================================
    const resolveChallenge = useCallback(() => {
        const currentGame = gameRef.current;
        if (!currentGame.activeChallenge) return;
        
        const ch = currentGame.activeChallenge;
        const ctx = ch.context || {};
        const isTeacherGraded = ['speaking', 'listening', 'roleplay'].includes(ch.type);

        if (isTeacherGraded) { if (!isHost) return; } else { if (!isMyTurnAction()) return; }

        const isCorrect = ch.status === 'correct';
        const pName = currentGame.players[currentGame.turn].name;
        let newPlayers = [...currentGame.players];
        let eventMsg = "";

        const pushUpdate = (playerUpdates, extraProps = {}) => {
            const up = { players: playerUpdates, activeChallenge: null, ...extraProps };
            if (eventMsg) up.lastEvent = { msg: eventMsg, ts: Date.now() };
            if (db && roomId) { updateDoc(doc(db, 'periplo-party-rooms', roomId), up); } else { setGame(prev => ({ ...prev, ...up })); }
        };

        if (ctx.trigger === 'blue') {
            if (isCorrect) { eventMsg = `✅ ${pName} +3 Monedas`; newPlayers[currentGame.turn].coins += 3; }
            else { eventMsg = `❌ Sin recompensa para ${pName}.`; }
            pushUpdate(newPlayers); advanceTurn(isTeacherGraded); 
        } 
        else if (ctx.trigger === 'red') {
            if (isCorrect) { eventMsg = `✅ ¡${pName} a salvo!`; }
            else { eventMsg = `❌ ${pName} pierde -3 Monedas`; newPlayers[currentGame.turn].coins -= 3; }
            pushUpdate(newPlayers); advanceTurn(isTeacherGraded);
        }
        else if (ctx.trigger === 'event_land') {
            if (isCorrect) { eventMsg = `⚡ ${pName} +6 Monedas`; newPlayers[currentGame.turn].coins += 6; }
            else { eventMsg = `❌ ${pName} se queda con las ganas.`; }
            pushUpdate(newPlayers); advanceTurn(isTeacherGraded);
        }
        else if (ctx.trigger === 'bowser_pass') {
            // FIX: Lógica original restaurada (-5 correcto / -15 incorrecto).
            if (isCorrect) { eventMsg = `🩸 Chupacabras muerde suave a ${pName} (-5)`; newPlayers[currentGame.turn].coins -= 5; } 
            else { eventMsg = `💀 Chupacabras destroza a ${pName} (-15)`; newPlayers[currentGame.turn].coins -= 15; }
            const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
            pushUpdate(newPlayers, { phase: nextPhase, pendingNode: null });
        }
        else if (ctx.trigger === 'boo_star') {
            if (isCorrect) {
                eventMsg = `👻 ¡Boo robó la estrella para ${pName}! ⭐`;
                const targetIdx = newPlayers.findIndex(p => p.id === ctx.targetId);
                if (targetIdx >= 0 && newPlayers[targetIdx].stars > 0) {
                    newPlayers[targetIdx].stars -= 1;
                    newPlayers[currentGame.turn].stars += 1;
                }
            } else {
                eventMsg = `❌ Boo: "Too bad..." (${pName} perdió 40)`;
            }
            const nextPhase = currentGame.movesLeft > 0 ? 'MOVING' : 'PENDING_END_TURN';
            pushUpdate(newPlayers, { phase: nextPhase, pendingNode: null, booAction: null });
        }
    }, [isMyTurnAction, isHost, roomId, advanceTurn]);

    if (quizLoading || quizError) return <div className="h-full flex items-center justify-center bg-emerald-950 p-6 text-white font-bold">{quizError || "Cargando..."}</div>;

    if (appState === 'HOME') {
        return (
            <div className="h-full flex flex-col items-center justify-center bg-emerald-950 p-6 relative">
                {toastMsg && <div className="absolute top-10 z-50"><div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div></div>}
                <button onClick={copyGameLink} className="absolute top-6 right-6 text-zinc-400 hover:text-white flex items-center gap-2 font-bold bg-zinc-900 px-4 py-2 rounded-xl z-20 transition-colors"><LinkIcon size={18}/> <span className="hidden md:inline">Copiar Link</span></button>
                <div className="bg-zinc-900 border-4 border-emerald-500 rounded-3xl p-8 w-full max-w-md shadow-2xl z-10 text-center">
                    {recoverableSession && (
                        <div className="bg-amber-500/10 border-2 border-amber-500/50 rounded-2xl p-4 mb-6 animate-pop-in">
                            <div className="flex items-center gap-2 mb-2 justify-center">
                                <AlertTriangle size={18} className="text-amber-400 shrink-0"/>
                                <p className="text-amber-300 font-black text-sm uppercase tracking-widest">Partida en curso</p>
                            </div>
                            <p className="text-zinc-300 text-xs mb-3 text-center">
                                Sala <span className="font-black text-white">{recoverableSession.roomId}</span> · Ronda {recoverableSession.round} · {recoverableSession.playersCount} jugador{recoverableSession.playersCount !== 1 ? 'es' : ''}
                            </p>
                            <div className="flex gap-2">
                                <button onClick={handleReconnect} className="btn-juicy flex-1 bg-amber-500 hover:bg-amber-400 text-amber-950 py-2 rounded-xl font-black text-sm">
                                    Reconectar
                                </button>
                                <button onClick={handleForgetSession} className="btn-juicy flex-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-2 rounded-xl font-bold text-sm border border-zinc-700">
                                    Olvidar
                                </button>
                            </div>
                        </div>
                    )}
                    <Gamepad2 size={60} className="text-emerald-400 mx-auto mb-4"/>
                    <h1 className="text-4xl font-black text-white mb-2">Periplo Party</h1>
                    <p className="text-emerald-400 font-bold tracking-widest uppercase mb-8">Multiplayer Edition</p>
                    {quizTitle && <p className="text-zinc-400 text-sm font-bold mb-6 italic">📚 {quizTitle}</p>}
                    <div className="flex flex-col gap-4">
                        <button onClick={handleCreateRoomClick} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-emerald-950 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.emerald.700)] flex justify-center items-center gap-2"><Crown size={24}/> Crear Sala</button>
                        <div className="flex items-center gap-4 my-2"><div className="h-px bg-zinc-700 flex-1"></div><span className="text-zinc-500 font-bold uppercase text-xs">o unirse</span><div className="h-px bg-zinc-700 flex-1"></div></div>
                        <div className="flex gap-2">
                            <input type="text" value={inputRoomId} onChange={e => setInputRoomId(e.target.value)} placeholder="CÓDIGO" maxLength="4" className="bg-zinc-800 text-white font-black text-center text-xl uppercase px-4 py-3 rounded-2xl w-full border-2 border-zinc-700 outline-none focus:border-indigo-500" />
                            <button onClick={handleJoinRoomClick} className="btn-juicy bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-2xl font-black text-lg">Entrar</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    if (appState === 'PROFILE') {
        return (
            <div className="h-full flex flex-col items-center justify-center bg-emerald-950 p-6 relative">
                {toastMsg && <div className="absolute top-10 z-50"><div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div></div>}
                <button onClick={() => { setAppState('HOME'); setRoomId(""); }} className="absolute top-6 left-6 text-zinc-400 hover:text-white flex items-center gap-2 font-bold bg-zinc-900 px-4 py-2 rounded-xl z-20 transition-colors"><ChevronLeft size={20}/> Volver</button>
                <div className="bg-zinc-900 border-4 border-indigo-500 rounded-3xl p-8 w-full max-w-md shadow-2xl z-10 text-center animate-pop-in">
                    <UserPlus size={50} className="text-indigo-400 mx-auto mb-4"/>
                    <h2 className="text-2xl font-black text-white mb-1">Crea tu Perfil</h2>
                    <p className="text-zinc-500 text-xs mb-6">Tu nombre y avatar se recordarán para próximos juegos</p>
                    <div className="text-left mb-6">
                        <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">1. Tu Nombre</label>
                        <input 
                            type="text" value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="Ej: Juan" maxLength="12" 
                            autoComplete="new-password" autoCorrect="off" spellCheck="false" name={"prof_n_"+Math.random()} id={"prof_n_"+Math.random()} data-lpignore="true" data-form-type="other" data-1p-ignore="true"
                            className="bg-zinc-800 text-white font-black text-xl px-4 py-3 rounded-2xl w-full border-2 border-zinc-700 outline-none focus:border-indigo-500 transition-all" 
                        />
                    </div>
                    <div className="text-left mb-8">
                        <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">2. Elige tu Avatar</label>
                        <div className="grid grid-cols-6 gap-2 p-3 border-2 border-zinc-800 rounded-2xl bg-zinc-950">
                            {AVATAR_EMOJIS.map(emoji => (
                                <button key={emoji} onClick={() => setSelectedEmoji(emoji)} className={`text-2xl md:text-3xl aspect-square rounded-xl transition-all flex items-center justify-center ${selectedEmoji === emoji ? 'bg-indigo-600 scale-110 shadow-lg ring-2 ring-indigo-300' : 'bg-zinc-800 hover:bg-zinc-700 opacity-70 hover:opacity-100'}`}>{emoji}</button>
                            ))}
                        </div>
                    </div>
                    
                    {isHost ? (
                        <div className="flex flex-col gap-3 mt-4">
                            <button onClick={() => handleProfileSubmit('PLAYER')} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.indigo.800)] flex justify-center items-center gap-2">Jugar y Moderar <ArrowRight size={24}/></button>
                            <button onClick={() => handleProfileSubmit('OBSERVER')} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 border-2 border-zinc-700 text-zinc-300 py-3 rounded-2xl font-bold text-lg flex justify-center items-center gap-2"><Eye size={20}/> Entrar como Espectador/Host</button>
                        </div>
                    ) : (
                        <button onClick={() => handleProfileSubmit('PLAYER')} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.indigo.800)] flex justify-center items-center gap-2">Sentarse en la mesa <ArrowRight size={24}/></button>
                    )}
                </div>
            </div>
        );
    }

    if (appState === 'LOBBY' && roomId) {
        return (
            <div className="h-full flex flex-col items-center justify-center bg-emerald-950 p-6 relative">
                {toastMsg && <div className="absolute top-10 z-50"><div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div></div>}

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { Dices, MapPin, ArrowRight, Skull, Ghost, Star, Zap, LogIn, AlertTriangle, Trophy, Coins, CheckCircle2, XCircle, HelpCircle, Timer, Eye, EyeOff, BrainCircuit, Crosshair, Users, Crown, Gamepad2, ChevronLeft, Link as LinkIcon, UserPlus, Copy, Check, Pencil } from 'lucide-react';
import confetti from 'canvas-confetti';
import { initializeApp } from 'firebase/app';
import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc, runTransaction } from 'firebase/firestore';

// ==========================================
// 🔴 FIREBASE
// ==========================================
const firebaseConfig = { 
    apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", 
    authDomain: "proyecto-periplo.firebaseapp.com", 
    projectId: "proyecto-periplo", 
    storageBucket: "proyecto-periplo.firebasestorage.app", 
    messagingSenderId: "236795998392", 
    appId: "1:236795998392:web:0da24b4f018611b55c844d" 
};

let db = null;
try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
} catch (e) {
    console.warn("Error conectando a Firestore.", e);
}

const withTimeout = (promise, ms = 8000, label = 'Firebase') => {
    return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(`${label}_TIMEOUT`)), ms))
    ]);
};

const QUIZZES_PATH = 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes';

const shuffleArray = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
};

// ==========================================
// COMPONENTES MULTIPLAYER (RELOJ & RETOS)
// ==========================================
const CountdownBar = ({ startTime, endTime, status, onTimeUp, canInteract, duration = 30 }) => {
    const [timeLeft, setTimeLeft] = useState(duration);

    useEffect(() => {
        const calcTime = () => {
            const end = endTime || Date.now();
            const elapsed = Math.floor((end - startTime) / 1000);
            return Math.max(0, duration - elapsed);
        };

        setTimeLeft(calcTime());
        if (status !== 'playing') return;

        const interval = setInterval(() => {
            const remaining = calcTime();
            setTimeLeft(remaining);
            if (remaining <= 0) {
                clearInterval(interval);
                if (canInteract) onTimeUp();
            }
        }, 500);

        return () => clearInterval(interval);
    }, [startTime, endTime, status, canInteract, onTimeUp, duration]);

    const percentage = (timeLeft / duration) * 100;
    let color = 'bg-emerald-500';
    if (timeLeft <= 8) color = 'bg-rose-500 animate-pulse';
    else if (timeLeft <= 15) color = 'bg-amber-400';

    return (
        <div className="w-full bg-zinc-800 h-3 rounded-full overflow-hidden">
            <div className={`h-full ${color} transition-all duration-500 ease-linear`} style={{ width: `${percentage}%` }}></div>
        </div>
    );
};

const MultipleChoiceChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const handleSelect = (idx) => { 
        if (status !== 'playing' || !canInteract) return; 
        onAnswer(idx, idx === data.correct);
    };
    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-indigo-900/40 p-3 rounded-full"><HelpCircle className="w-8 h-8 text-indigo-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-6">Elige la correcta</h3>
            <div className="bg-zinc-950 border-2 border-zinc-800 p-6 rounded-2xl mb-6 font-medium text-lg text-zinc-200 shadow-sm leading-relaxed">{data.question}</div>
            <div className="grid gap-3 mb-6">
                {data.options.map((opt, idx) => {
                    let btnClass = 'bg-zinc-900 border-zinc-700 text-zinc-300';
                    if (status !== 'playing') {
                        if (idx === data.correct) btnClass = 'bg-emerald-900/40 border-emerald-500 text-emerald-300';
                        else if (playerAnswer === idx) btnClass = 'bg-rose-900/40 border-rose-500 text-rose-300';
                        else btnClass = 'opacity-30';
                    } else if (!canInteract) {
                        btnClass += ' opacity-60 cursor-not-allowed';
                    } else {
                        btnClass += ' hover:border-indigo-400';
                    }
                    return (
                        <button key={idx} onClick={() => handleSelect(idx)} disabled={status !== 'playing' || !canInteract} className={`btn-juicy p-4 rounded-2xl border-2 font-bold text-left transition-all text-lg flex items-center justify-between ${btnClass}`}>
                            {opt}
                            {status !== 'playing' && idx === data.correct && <CheckCircle2/>}
                            {status === 'wrong' && playerAnswer === idx && <XCircle/>}
                        </button>
                    );
                })}
            </div>
        </div>
    );
};

const DragDropChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const handleSelect = (opt) => {
        if (status !== 'playing' || !canInteract) return;
        onAnswer(opt, opt === data.correct);
    };
    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-rose-900/30 p-3 rounded-full"><Crosshair className="w-8 h-8 text-rose-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-6">Completa la Frase</h3>
            <div className="bg-zinc-950 border-2 border-zinc-800 p-6 rounded-2xl mb-8 font-medium text-xl text-zinc-200 shadow-sm leading-relaxed">
                {data.sentence.split('[BLANK]').map((part, i, arr) => (
                    <React.Fragment key={i}>
                        {part}
                        {i < arr.length - 1 && <span className={`inline-block min-w-[100px] border-b-4 border-dashed pb-1 mx-2 text-center font-black ${status==='correct'?'text-emerald-400 border-emerald-400':status==='wrong'?'text-rose-400 border-rose-400':'text-indigo-400 border-indigo-700'}`}>{playerAnswer || '_____'}</span>}
                    </React.Fragment>
                ))}
            </div>
            {status === 'playing' ? (
                <div className="flex flex-wrap justify-center gap-3 mb-6">
                    {data.options.map((opt, i) => (
                        <button key={i} onClick={() => handleSelect(opt)} disabled={!canInteract} className={`btn-juicy bg-zinc-800 border-2 border-zinc-700 hover:border-indigo-400 px-6 py-3 rounded-xl font-bold text-lg ${!canInteract ? 'opacity-60 cursor-not-allowed' : ''}`}>{opt}</button>
                    ))}
                </div>
            ) : (
                <div className="animate-pop-in mb-6">
                    {status === 'wrong' && <p className="text-zinc-200 font-bold text-lg">Era: <span className="text-emerald-400">{data.correct}</span></p>}
                </div>
            )}
        </div>
    );
};

const UnscrambleChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [shuffledWords, setShuffledWords] = useState([]);
    const [selectedWords, setSelectedWords] = useState([]);

    useEffect(() => {
        if (status === 'playing' && data?.text && shuffledWords.length === 0 && selectedWords.length === 0) {
            const wordsWithIds = data.text.split(' ').map((w, i) => ({ id: i, text: w }));
            setShuffledWords(shuffleArray(wordsWithIds));
        }
    }, [data, status]);

    const checkAnswer = () => {
        const built = selectedWords.map(w => w.text).join(" ");
        const normalize = (str) => str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s{2,}/g," ").trim().toLowerCase();
        const isCorrect = normalize(built) === normalize(data.text);
        onAnswer(built, isCorrect);
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-amber-900/30 p-3 rounded-full"><BrainCircuit className="w-8 h-8 text-amber-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-2">Ordena la Frase</h3>
            <div className="bg-zinc-900 p-3 rounded-xl border border-zinc-800 mb-6 inline-block"><p className="text-zinc-400 font-medium italic">"{data.translation}"</p></div>
            
            {status === 'playing' ? (
                <>
                    <div className="min-h-[80px] bg-zinc-950 rounded-2xl p-4 mb-4 flex flex-wrap gap-2 justify-center content-center border-2 border-zinc-800 shadow-inner">
                        {selectedWords.map(w => (
                            <button key={w.id} onClick={() => { if(!canInteract)return; setShuffledWords([...shuffledWords, w]); setSelectedWords(selectedWords.filter(sw => sw.id !== w.id)); }} disabled={!canInteract} className={`btn-juicy bg-zinc-800 border border-zinc-600 px-4 py-2 rounded-lg font-bold text-zinc-200 ${!canInteract ? 'opacity-80' : ''}`}>{w.text}</button>
                        ))}
                    </div>
                    <div className="flex flex-wrap gap-2 justify-center mb-6 min-h-[60px]">
                        {shuffledWords.map(w => (
                            <button key={w.id} onClick={() => { if(!canInteract)return; setSelectedWords([...selectedWords, w]); setShuffledWords(shuffledWords.filter(sw => sw.id !== w.id)); }} disabled={!canInteract} className={`btn-juicy bg-zinc-800 border border-zinc-700 px-4 py-2 rounded-lg font-bold text-zinc-300 ${!canInteract ? 'opacity-60' : ''}`}>{w.text}</button>
                        ))}
                    </div>
                    {canInteract && <button onClick={checkAnswer} disabled={selectedWords.length === 0} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black text-lg disabled:opacity-50">COMPROBAR</button>}
                </>
            ) : (
                <div className="animate-pop-in mb-6">
                    <div className={`p-4 rounded-xl border-2 mb-4 font-black text-xl ${status === 'correct' ? 'bg-emerald-900/20 border-emerald-500 text-emerald-400' : 'bg-rose-900/20 border-rose-500 text-rose-400'}`}>
                        Tu respuesta: {playerAnswer || '(sin respuesta)'}
                    </div>
                    {status !== 'correct' && <p className="text-zinc-200 font-bold text-lg">Era: <span className="text-emerald-400">{data.text}</span></p>}
                </div>
            )}
        </div>
    );
};

const FillBlankChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [input, setInput] = useState('');
    
    const checkAnswer = () => {
        const normalize = (str) => str.trim().toLowerCase();
        const isCorrect = normalize(input) === normalize(data.answer);
        onAnswer(input, isCorrect);
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-emerald-900/30 p-3 rounded-full"><Pencil className="w-8 h-8 text-emerald-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-6">Escribe la Palabra</h3>
            <div className="bg-zinc-950 border-2 border-zinc-800 p-6 rounded-2xl mb-4 font-medium text-xl text-zinc-200 shadow-sm leading-relaxed">
                {data.sentence.replace('[BLANK]', '_____')}
            </div>
            {data.hint && <p className="text-sm font-bold text-zinc-500 mb-6 italic">Pista: {data.hint}</p>}
            
            {status === 'playing' ? (
                <>
                    <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&canInteract&&input.trim()&&checkAnswer()} disabled={!canInteract} autoComplete="off" data-lpignore="true" data-form-type="other" className="w-full text-center text-2xl font-black p-4 rounded-xl border-2 border-zinc-700 focus:border-indigo-500 bg-zinc-800 outline-none mb-6 disabled:opacity-60 text-white" placeholder={canInteract ? "Escribe aquí..." : "El jugador está escribiendo..."}/>
                    {canInteract && <button onClick={checkAnswer} disabled={!input.trim()} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black text-lg disabled:opacity-50">COMPROBAR</button>}
                </>
            ) : (
                <div className="animate-pop-in mb-6">
                    <div className="text-2xl font-black p-4 mb-2 text-white">
                        Tu respuesta: <span className={status === 'correct' ? 'text-emerald-400' : 'text-rose-400'}>{playerAnswer || '(sin respuesta)'}</span>
                    </div>
                    {status !== 'correct' && <p className="text-zinc-200 font-bold text-lg">Era: <span className="text-emerald-400">{data.answer}</span></p>}
                </div>
            )}
        </div>
    );
};

const MatchingChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [pairs, setPairs] = useState(null);
    const [selectedLeft, setSelectedLeft] = useState(null);
    const [matched, setMatched] = useState(new Set());

    useEffect(() => {
        if (data && data.pairs && status === 'playing' && !pairs) {
            const l = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.left})));
            const r = shuffleArray(data.pairs.map((p,i) => ({id: i, text: p.right})));
            setPairs({ left: l, right: r });
        }
    }, [data, status]);

    const handleRightClick = (rightId) => {
        if(selectedLeft === null || status !== 'playing' || !canInteract) return;
        if(selectedLeft === rightId) {
            const newMatched = new Set(matched).add(selectedLeft);
            setMatched(newMatched);
            setSelectedLeft(null);
            if(newMatched.size === data.pairs.length) {
                onAnswer('All matched', true);
            }
        } else {
            onAnswer('Failed match', false);
        }
    };

    if(!pairs && status === 'playing') return null;

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-cyan-900/30 p-3 rounded-full"><LinkIcon className="w-8 h-8 text-cyan-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-6">Une las parejas</h3>
            
            {status === 'playing' && pairs ? (
                <div className="flex gap-4 mb-6">
                    <div className="flex-1 space-y-2">
                        {pairs.left.map(item => {
                            const isMatched = matched.has(item.id);
                            const isSel = selectedLeft === item.id;
                            return <button key={`l-${item.id}`} onClick={() => !isMatched && canInteract && setSelectedLeft(item.id)} disabled={isMatched || !canInteract} className={`btn-juicy w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-900 border-zinc-800 text-zinc-600' : isSel ? 'bg-indigo-900/40 border-indigo-500 text-indigo-300' : 'bg-zinc-800 border-zinc-700 hover:border-indigo-500 text-zinc-200'} ${!canInteract ? 'opacity-60' : ''}`}>{item.text}</button>
                        })}
                    </div>
                    <div className="flex-1 space-y-2">
                        {pairs.right.map(item => {
                            const isMatched = matched.has(item.id);
                            return <button key={`r-${item.id}`} onClick={() => handleRightClick(item.id)} disabled={isMatched || !canInteract} className={`btn-juicy w-full p-3 rounded-xl border-2 font-bold text-sm transition-all ${isMatched ? 'bg-zinc-900 border-zinc-800 text-zinc-600' : 'bg-zinc-800 border-zinc-700 hover:border-indigo-500 text-zinc-200'} ${!canInteract ? 'opacity-60' : ''}`}>{item.text}</button>
                        })}
                    </div>
                </div>
            ) : (
                <div className="animate-pop-in mb-6">
                    <div className={`p-4 rounded-xl border-2 mb-4 font-black text-xl ${status === 'correct' ? 'bg-emerald-900/20 border-emerald-500 text-emerald-400' : 'bg-rose-900/20 border-rose-500 text-rose-400'}`}>
                        {status === 'correct' ? '¡Todas emparejadas!' : '¡Te equivocaste de pareja!'}
                    </div>
                </div>
            )}
        </div>
    );
};

const ErrorCorrectionChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    const [input, setInput] = useState('');
    
    const checkAnswer = () => {
        const normalize = (str) => str.trim().toLowerCase();
        const isCorrect = normalize(input) === normalize(data.correction);
        onAnswer(input, isCorrect);
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-pink-900/30 p-3 rounded-full"><AlertTriangle className="w-8 h-8 text-pink-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-2">Corrige el Error</h3>
            <p className="text-sm font-bold text-zinc-500 mb-6">Encuentra la palabra incorrecta y escribe la corrección.</p>
            
            <div className="bg-rose-900/10 border-2 border-rose-900/50 p-6 rounded-2xl mb-6 font-medium text-xl text-zinc-200 shadow-sm leading-relaxed">
                {data.sentence}
            </div>
            
            {status === 'playing' ? (
                <>
                    <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&canInteract&&input.trim()&&checkAnswer()} disabled={!canInteract} autoComplete="off" data-lpignore="true" data-form-type="other" className="w-full text-center text-xl font-black p-4 rounded-xl border-2 border-zinc-700 focus:border-indigo-500 bg-zinc-800 outline-none mb-6 disabled:opacity-60 text-white" placeholder={canInteract ? "Escribe la palabra correcta..." : "El jugador está escribiendo..."}/>
                    {canInteract && <button onClick={checkAnswer} disabled={!input.trim()} className="btn-juicy w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black text-lg disabled:opacity-50">COMPROBAR</button>}
                </>
            ) : (
                <div className="animate-pop-in mb-6">
                    <div className="text-xl font-black p-4 mb-2 text-white">
                        Tu respuesta: <span className={status === 'correct' ? 'text-emerald-400' : 'text-rose-400'}>{playerAnswer || '(sin respuesta)'}</span>
                    </div>
                    {status !== 'correct' && (
                        <div className="text-zinc-200 font-bold text-lg text-left bg-zinc-900 p-4 rounded-xl border border-zinc-800 mx-auto max-w-sm">
                            <p>Error: <span className="text-rose-400 line-through">{data.error}</span></p>
                            <p>Corrección: <span className="text-emerald-400">{data.correction}</span></p>
                        </div>
                    )}
                </div>
            )}
        </div>
    );
};

const OddOneOutChallenge = ({ modal, onAnswer, canInteract }) => {
    const { data, status, playerAnswer } = modal;
    
    const handleSelect = (word) => {
        if (status !== 'playing' || !canInteract) return;
        onAnswer(word, word === data.odd);
    };

    return (
        <div className="w-full text-center relative">
            <div className="flex justify-center mb-4"><div className="bg-teal-900/30 p-3 rounded-full"><BrainCircuit className="w-8 h-8 text-teal-400"/></div></div>
            <h3 className="text-2xl font-black text-zinc-100 mb-2">Encuentra el Intruso</h3>
            <p className="text-sm font-bold text-zinc-500 mb-6">Selecciona la palabra que no pertenece al grupo.</p>
            
            <div className="grid grid-cols-2 gap-3 mb-6">
                {data.words.map((w, i) => {
                    const isSel = playerAnswer === w;
                    const isOdd = data.odd === w;
                    let btnClass = 'bg-zinc-900 border-zinc-700 text-zinc-300';
                    
                    if (status !== 'playing') {
                        if (isOdd) btnClass = 'bg-emerald-900/40 border-emerald-500 text-emerald-300';
                        else if (isSel) btnClass = 'bg-rose-900/40 border-rose-500 text-rose-300';
                        else btnClass = 'opacity-30';
                    } else if (!canInteract) {
                        btnClass += ' opacity-60 cursor-not-allowed';
                    } else {
                        btnClass += ' hover:border-indigo-400';
                    }
                    
                    return (
                        <button key={i} disabled={status !== 'playing' || !canInteract} onClick={() => handleSelect(w)} className={`btn-juicy p-4 rounded-2xl border-2 font-bold text-lg transition-all ${btnClass}`}>
                            {w}
                        </button>
                    );
                })}
            </div>
            {status !== 'playing' && data.reason && (
                <div className="bg-blue-900/20 border border-blue-800 p-4 rounded-xl text-left animate-pop-in mb-6">
                    <p className="font-bold text-blue-300 flex items-start gap-2"><HelpCircle className="shrink-0 mt-0.5" size={18}/> {data.reason}</p>
                </div>
            )}
        </div>
    );
};

const ChallengeRouter = ({ modal, onAnswer, canInteract }) => {
    if (!modal || !modal.type) return null;
    const props = { modal, onAnswer, canInteract };
    switch(modal.type) {
        case 'multipleChoice': return <MultipleChoiceChallenge {...props}/>;
        case 'dragDrop': return <DragDropChallenge {...props}/>;
        case 'unscramble': return <UnscrambleChallenge {...props}/>;
        case 'fillBlank': return <FillBlankChallenge {...props}/>;

const generateWideGrid = () => {
    const grid = [];
    for (let r = -12; r <= 12; r++) {
        const rOffset = Math.floor(r / 2);
        for (let q = -20 - rOffset; q <= 20 - rOffset; q++) {
            grid.push({ id: `${q},${r}`, q, r, ...getXY(q, r) });
        }
    }
    return grid;
};

const App = () => {
    const [appState, setAppState] = useState('HOME');
    
    const [roomId, setRoomId] = useState("");
    const [inputRoomId, setInputRoomId] = useState("");
    const [localPlayerId, setLocalPlayerId] = useState(null); 
    const [isHost, setIsHost] = useState(false);
    
    const [playerName, setPlayerName] = useState("");
    const [selectedEmoji, setSelectedEmoji] = useState("👽");

    const [game, setGame] = useState(INITIAL_GAME_STATE);
    const [toastMsg, setToastMsg] = useState(null);
    const [showAllPlayers, setShowAllPlayers] = useState(false);
    const [linkCopied, setLinkCopied] = useState(false);
    const [codeCopied, setCodeCopied] = useState(false);

    const [quizContent, setQuizContent] = useState(null); 
    const [quizTitle, setQuizTitle] = useState("");
    const [quizLoading, setQuizLoading] = useState(true);
    const [quizError, setQuizError] = useState(null);
    const [activePools, setActivePools] = useState({});

    const [isRolling, setIsRolling] = useState(false);
    const [localDiceFace, setLocalDiceFace] = useState(6);
    const [selectedForkDir, setSelectedForkDir] = useState(null);
    const [ghostPathCoords, setGhostPathCoords] = useState([]);
    const [ghostLandingNode, setGhostLandingNode] = useState(null);

    // ==========================================
    // CANDADOS DE SEGURIDAD (ANTI-TELEPORT)
    // ==========================================
    const toastTimerRef = useRef(null);
    const gameRef = useRef(game);
    
    useEffect(() => { gameRef.current = game; }, [game]);

    const isMyTurn = useCallback(() => {
        if (localPlayerId === null || !gameRef.current.players || gameRef.current.players.length === 0) return false;
        return gameRef.current.turn === (localPlayerId - 1);
    }, [localPlayerId]);

    // ==========================================
    // CARGAR MEMORIA Y FIRESTORE
    // ==========================================
    useEffect(() => {
        try {
            const savedName = localStorage.getItem('periplo_playerName');
            const savedEmoji = localStorage.getItem('periplo_playerEmoji');
            if (savedName) setPlayerName(savedName);
            if (savedEmoji) setSelectedEmoji(savedEmoji);
        } catch(e) {}
    }, []);

    useEffect(() => {
        const loadQuiz = async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                setQuizError("Falta el ID del banco. Abre este juego desde index.");
                setQuizLoading(false);
                return;
            }
            if (!db) {
                setQuizError("Sin conexión a Firebase.");
                setQuizLoading(false);
                return;
            }
            try {
                const snap = await withTimeout(getDoc(doc(db, QUIZZES_PATH, id)), 8000, 'LOAD_QUIZ');
                if (!snap.exists()) throw new Error("Banco no encontrado");
                const data = snap.data();
                setQuizContent(data.content || {});
                setQuizTitle(data.title || "Periplo Party");
                setQuizLoading(false);
            } catch(e) {
                setQuizError(e.message || "Error al cargar el banco");
                setQuizLoading(false);
            }
        };
        loadQuiz();
    }, []);

    const fillPools = useCallback((content) => {
        if (!content) return {};
        const newPools = {};
        Object.keys(content).forEach(key => {
            if (Array.isArray(content[key]) && content[key].length > 0) {
                newPools[key] = shuffleArray(content[key]);
            }
        });
        setActivePools(newPools);
        return newPools;
    }, []);

    const pickQuestion = useCallback(() => {
        if (!quizContent) return null;
        let pools = activePools;
        let availableTypes = Object.keys(pools).filter(k => pools[k] && pools[k].length > 0);
        
        if (availableTypes.length === 0) {
            pools = fillPools(quizContent);
            availableTypes = Object.keys(pools).filter(k => pools[k] && pools[k].length > 0);
            if (availableTypes.length === 0) return null;
        }
        
        const randomType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
        const question = pools[randomType][0];
        setActivePools(prev => ({ ...prev, [randomType]: prev[randomType].slice(1) }));
        return { type: randomType, data: question };
    }, [activePools, quizContent, fillPools]);

    // Listener de Sala en Vivo
    useEffect(() => {
        if (!db || !roomId || (appState !== 'LOBBY' && appState !== 'PLAYING')) return;
        const roomDocRef = doc(db, 'periplo-party-rooms', roomId);
        const unsubscribe = onSnapshot(roomDocRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                setGame(data);
                if (data.status === 'PLAYING' && appState !== 'PLAYING') {
                    setAppState('PLAYING');
                }
            } else {
                showToast("⚠️ La sala fue cerrada");
                setRoomId("");
                setLocalPlayerId(null);
                setGame(INITIAL_GAME_STATE);
                setAppState('HOME');
            }
        }, (error) => {
            showToast(`❌ Conexión perdida`);
        });
        return () => unsubscribe();
    }, [roomId, appState]);

    const updateGame = useCallback((updates) => {
        if (db && roomId) {
            updateDoc(doc(db, 'periplo-party-rooms', roomId), updates).catch(e => {
                console.error("[Periplo] updateDoc error:", e);
            });
        } else {
            setGame(prev => ({ ...prev, ...updates }));
            if (updates.status === 'PLAYING') setAppState('PLAYING');
        }
    }, [roomId]);

    const showToast = useCallback((msg) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToastMsg(msg);
        toastTimerRef.current = setTimeout(() => setToastMsg(null), msg.includes('❌') ? 5000 : 2500);
    }, []);

    // ==========================================
    // FLUJO LOBBY / PRE-GAME
    // ==========================================
    const copyGameLink = () => {
        const url = window.location.href.split('?')[0];
        navigator.clipboard.writeText(url).then(() => {
            setLinkCopied(true);
            setTimeout(() => setLinkCopied(false), 2000);
        });
    };

    const copyRoomCode = () => {
        navigator.clipboard.writeText(roomId).then(() => {
            setCodeCopied(true);
            setTimeout(() => setCodeCopied(false), 2000);
        });
    };

    const handleCreateRoomClick = () => { setIsHost(true); setAppState('PROFILE'); };

    const handleJoinRoomClick = async () => {
        if (!inputRoomId.trim()) return showToast("⚠️ Ingresa un código");
        const code = inputRoomId.trim().toUpperCase();
        
        if (db) {
            try {
                const snapshot = await withTimeout(getDoc(doc(db, 'periplo-party-rooms', code)), 8000, 'CHECK_ROOM');
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    if (data.status === 'LOBBY' && (data.players || []).length < 4) {
                        setRoomId(code); setIsHost(false); setAppState('PROFILE');
                    } else if (data.status !== 'LOBBY') {
                        showToast("❌ El juego ya inició");
                    } else {
                        showToast("❌ Sala llena (4/4)");
                    }
                } else {
                    showToast("❌ Sala no encontrada");
                }
            } catch(e) {
                showToast(`❌ Error de conexión`);
            }
        } else {
            setRoomId(code); setIsHost(false); setAppState('PROFILE');
        }
    };

        const name = playerName.trim();
        if (!name) return showToast("⚠️ Pon tu nombre para jugar");
        
        try { localStorage.setItem('periplo_playerName', name); localStorage.setItem('periplo_playerEmoji', selectedEmoji); } catch(e) {}

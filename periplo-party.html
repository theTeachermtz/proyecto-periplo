const generateWideGrid = () => {
    const grid = [];
    for (let r = -12; r <= 12; r++) {
        const rOffset = Math.floor(r / 2);
        for (let q = -20 - rOffset; q <= 20 - rOffset; q++) {
            grid.push({ id: `${q},${r}`, q, r, ...getXY(q, r) });
        }
    }
    return grid;
};

const App = () => {
    const [appState, setAppState] = useState('HOME');
    
    const [roomId, setRoomId] = useState("");
    const [inputRoomId, setInputRoomId] = useState("");
    const [localPlayerId, setLocalPlayerId] = useState(null); 
    const [isHost, setIsHost] = useState(false);
    
    const [playerName, setPlayerName] = useState("");
    const [selectedEmoji, setSelectedEmoji] = useState("👽");

    const [game, setGame] = useState(INITIAL_GAME_STATE);
    const [toastMsg, setToastMsg] = useState(null);
    const [showAllPlayers, setShowAllPlayers] = useState(false);
    const [linkCopied, setLinkCopied] = useState(false);
    const [codeCopied, setCodeCopied] = useState(false);

    // Dado animado LOCAL (no toca firebase hasta el resultado)
    const [isRolling, setIsRolling] = useState(false);
    const [localDiceFace, setLocalDiceFace] = useState(6);

    // Bifurcaciones (local)
    const [selectedForkDir, setSelectedForkDir] = useState(null);
    const [ghostPathCoords, setGhostPathCoords] = useState([]);
    const [ghostLandingNode, setGhostLandingNode] = useState(null);

    const toastTimerRef = useRef(null);
    const localPlayerIdRef = useRef(null);
    const gameRef = useRef(game);

    // Mantener refs sincronizados (para evitar stale closures en useEffect)
    useEffect(() => { gameRef.current = game; }, [game]);
    useEffect(() => { localPlayerIdRef.current = localPlayerId; }, [localPlayerId]);

    // ==========================================
    // CARGAR PERFIL DESDE LOCALSTORAGE
    // ==========================================
    useEffect(() => {
        try {
            const savedName = localStorage.getItem('periplo_playerName');
            const savedEmoji = localStorage.getItem('periplo_playerEmoji');
            if (savedName) setPlayerName(savedName);
            if (savedEmoji) setSelectedEmoji(savedEmoji);
        } catch(e) { /* localStorage bloqueado */ }
    }, []);

    // ==========================================
    // FIREBASE LISTENER
    // Solo se suscribe cuando ya estamos en LOBBY o PLAYING
    // ==========================================
    useEffect(() => {
        if (!db || !roomId || (appState !== 'LOBBY' && appState !== 'PLAYING')) return;
        const roomRef = ref(db, `rooms/${roomId}`);
        const unsubscribe = onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                setGame(data);
                if (data.status === 'PLAYING' && appState !== 'PLAYING') {
                    setAppState('PLAYING');
                }
            } else {
                // Sala desapareció (host abandonó)
                showToast("⚠️ La sala fue cerrada");
                setRoomId("");
                setLocalPlayerId(null);
                setGame(INITIAL_GAME_STATE);
                setAppState('HOME');
            }
        });
        return () => unsubscribe();
    }, [roomId, appState]);

    // ==========================================
    // HELPERS
    // ==========================================
    const updateGame = useCallback((updates) => {
        if (db && roomId) {
            update(ref(db, `rooms/${roomId}`), updates);
        } else {
            setGame(prev => ({ ...prev, ...updates }));
            if (updates.status === 'PLAYING') setAppState('PLAYING');
        }
    }, [roomId]);

    const showToast = useCallback((msg) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToastMsg(msg);
        // Errores duran más para que el usuario los pueda leer
        const duration = msg.includes('❌') ? 5000 : 2500;
        toastTimerRef.current = setTimeout(() => setToastMsg(null), duration);
    }, []);

    const isMyTurn = useMemo(() => {
        if (localPlayerId === null || !game.players || game.players.length === 0) return false;
        return game.turn === (localPlayerId - 1);
    }, [localPlayerId, game.turn, game.players]);

    // ==========================================
    // FLUJO DE SALA
    // ==========================================
    const copyGameLink = () => {
        const url = window.location.href.split('?')[0];
        navigator.clipboard.writeText(url).then(() => {
            setLinkCopied(true);
            setTimeout(() => setLinkCopied(false), 2000);
        }).catch(() => showToast("❌ No se pudo copiar"));
    };

    const copyRoomCode = () => {
        navigator.clipboard.writeText(roomId).then(() => {
            setCodeCopied(true);
            setTimeout(() => setCodeCopied(false), 2000);
        }).catch(() => showToast("❌ No se pudo copiar"));
    };

    const handleCreateRoomClick = () => {
        setIsHost(true);
        setAppState('PROFILE');
    };

    const handleJoinRoomClick = async () => {
        if (!inputRoomId.trim()) return showToast("⚠️ Ingresa un código");
        const code = inputRoomId.trim().toUpperCase();
        
        if (db) {
            try {
                const snapshot = await get(ref(db, `rooms/${code}`));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.status === 'LOBBY' && (data.players || []).length < 4) {
                        setRoomId(code);
                        setIsHost(false);
                        setAppState('PROFILE');
                    } else if (data.status !== 'LOBBY') {
                        showToast("❌ El juego ya inició");
                    } else {
                        showToast("❌ Sala llena (4/4)");
                    }
                } else {
                    showToast("❌ Sala no encontrada");
                }
            } catch(e) {
                showToast("❌ Error de conexión");
            }
        } else {
            setRoomId(code);
            setIsHost(false);
            setAppState('PROFILE');
        }
    };

    const handleProfileSubmit = async () => {
        const name = playerName.trim();
        if (!name) return showToast("⚠️ Pon tu nombre para jugar");
        
        try {
            localStorage.setItem('periplo_playerName', name);
            localStorage.setItem('periplo_playerEmoji', selectedEmoji);
        } catch(e) {}

        if (isHost) {
            const newId = Math.random().toString(36).substring(2, 6).toUpperCase();
            const c = PLAYER_COLORS[0];
            const hostPlayer = { id: 1, name, emoji: selectedEmoji, coins: 10, stars: 0, pos: "5,5", color: c.color, activeColor: c.activeColor };
            
            if (db) {
                try {
                    console.log("[Periplo] Creando sala", newId);
                    await set(ref(db, `rooms/${newId}`), { ...INITIAL_GAME_STATE, players: [hostPlayer] });
                    console.log("[Periplo] Sala creada OK");
                    setRoomId(newId);
                    setLocalPlayerId(1);
                    setAppState('LOBBY');
                } catch(e) {
                    console.error("[Periplo] Error creando sala:", e);
                    showToast(`❌ Firebase: ${e.code || e.message || 'error desconocido'}`);
                }
            } else {
                console.warn("[Periplo] db es null - modo offline");
                setRoomId(newId);
                setLocalPlayerId(1);
                setGame({ ...INITIAL_GAME_STATE, players: [hostPlayer] });
                setAppState('LOBBY');
            }
        } else {
            // INVITADO - usar transacción para evitar race conditions
            if (db) {
                try {
                    console.log("[Periplo] Uniéndose a sala", roomId);
                    let assignedId = null;
                    const result = await runTransaction(ref(db, `rooms/${roomId}`), (current) => {
                        if (!current) return current;
                        const players = current.players || [];
                        if (players.length >= 4 || current.status !== 'LOBBY') return; 
                        const newId = players.length + 1;
                        assignedId = newId;
                        const c = PLAYER_COLORS[newId - 1];
                        const newPlayer = { id: newId, name, emoji: selectedEmoji, coins: 10, stars: 0, pos: "5,5", color: c.color, activeColor: c.activeColor };
                        current.players = [...players, newPlayer];
                        return current;
                    });
                    
                    if (result.committed && assignedId) {
                        console.log("[Periplo] Unido como jugador", assignedId);
                        setLocalPlayerId(assignedId);
                        setAppState('LOBBY');
                    } else {
                        showToast("❌ Sala llena o cerrada");
                        setRoomId("");
                        setAppState('HOME');
                    }
                } catch(e) {
                    console.error("[Periplo] Error al unirse:", e);
                    showToast(`❌ Firebase: ${e.code || e.message || 'error'}`);
                }
            } else {
                const newPlayerId = (game.players || []).length + 1;
                setLocalPlayerId(newPlayerId);
                const c = PLAYER_COLORS[newPlayerId - 1];
                const newPlayer = { id: newPlayerId, name, emoji: selectedEmoji, coins: 10, stars: 0, pos: "5,5", color: c.color, activeColor: c.activeColor };
                setGame(prev => ({ ...prev, players: [...prev.players, newPlayer] }));
                setAppState('LOBBY');
            }
        }
    };

    const leaveRoom = async () => {
        if (db && roomId && localPlayerId) {
            try {
                if (isHost) {
                    // Host abandona = sala se cierra
                    await set(ref(db, `rooms/${roomId}`), null);
                } else {
                    await runTransaction(ref(db, `rooms/${roomId}`), (current) => {
                        if (!current) return current;
                        current.players = (current.players || []).filter(p => p.id !== localPlayerId);
                        return current;
                    });
                }
            } catch(e) {}
        }
        setRoomId("");
        setLocalPlayerId(null);
        setIsHost(false);
        setGame(INITIAL_GAME_STATE);
        setAppState('HOME');
    };

    const startGame = () => {
        updateGame({ status: 'PLAYING' });
    };

    // ==========================================
    // UTILIDADES DE MAPA
    // ==========================================
    const reverseMap = useMemo(() => {
        const map = {};
        Object.values(RAW_MAP_DATA).forEach(node => {
            (node.dirs || []).forEach(dir => {
                const targetId = `${node.q + HEX_DIRS[dir].q},${node.r + HEX_DIRS[dir].r}`;
                if (RAW_MAP_DATA[targetId]) {
                    if (!map[targetId]) map[targetId] = [];
                    map[targetId].push(node.id);
                }
            });
        });
        return map;
    }, []);

    const forestDecorations = useMemo(() => {
        const grid = generateWideGrid();
        const emptyHexes = grid.filter(h => !RAW_MAP_DATA[h.id]);
        return emptyHexes.map(h => {
            const hash = Math.abs(Math.sin(h.q * 12.9898 + h.r * 78.233)) * 10000;
            const rand = hash - Math.floor(hash);
            let emoji = null;
            let bgTones = ['#064e3b', '#022c22', '#065f46'];

            if (h.q > 2 && h.r < -2) { if (rand < 0.4) emoji = rand < 0.2 ? '🍄' : '🐛'; } 
            else if (h.q < -4 && h.r > 2) { bgTones = ['#0369a1', '#0c4a6e', '#075985']; if (rand < 0.3) emoji = rand < 0.15 ? '🌊' : (rand < 0.25 ? '🦆' : '🐸'); } 
            else if (h.q < -4 && h.r < -2) { if (rand < 0.5) emoji = rand < 0.4 ? '🌲' : '🦉'; } 
            else if (Math.abs(h.q) <= 3 && Math.abs(h.r) <= 2) { bgTones = ['#166534', '#14532d', '#15803d']; if (rand < 0.5) emoji = rand < 0.3 ? '🌼' : (rand < 0.4 ? '🐝' : '🦋'); } 
            else if (h.q > 3 && h.r > 2) { bgTones = ['#3f3f46', '#27272a', '#52525b']; if (rand < 0.3) emoji = rand < 0.2 ? '🪨' : '⛏️'; } 
            else if (h.q > 4 && h.r > -4 && h.r < 4) { bgTones = ['#312e81', '#1e1b4b', '#3730a3']; if (rand < 0.4) emoji = rand < 0.15 ? '🦇' : (rand < 0.25 ? '🕸️' : '🪦'); } 
            else if (h.q < -7 && Math.abs(h.r) <= 2) { if (rand < 0.3) emoji = rand < 0.1 ? '⛺' : (rand < 0.2 ? '🔥' : '🪵'); } 
            else { if (rand < 0.15) emoji = '🌳'; else if (rand < 0.25) emoji = '🌿'; }

            return { ...h, emoji, fill: bgTones[Math.floor(rand * bgTones.length)] };
        });
    }, []);

    const getValidOuts = (node) => {
        if (!node || !node.dirs) return [];
        return node.dirs.map(dir => ({ dir: dir, id: `${node.q + HEX_DIRS[dir].q},${node.r + HEX_DIRS[dir].r}` })).filter(out => RAW_MAP_DATA[out.id]);
    };

    const updateActivePlayer = (updater) => {
        const newPlayers = [...game.players];
        newPlayers[game.turn] = updater(newPlayers[game.turn]);
        return newPlayers;
    };

    // ==========================================
    // LÓGICA DE MOVIMIENTO
    // ==========================================
    const executeMove = (nextNodeId, currentMoves) => {
        const nextNode = RAW_MAP_DATA[nextNodeId];
        const isNextFork = getValidOuts(nextNode).length > 1;
        
        let newMoves = currentMoves;
        const isZeroCost = isNextFork || nextNode.type === 'stone' || (nextNode.type === 'star_node' && nextNodeId !== game.activeStarId);
        if (!isZeroCost) newMoves -= 1;

        let newPlayers = updateActivePlayer(p => ({ ...p, pos: nextNodeId }));

        if (newMoves > 0) {
            if (nextNode.type === 'bowser') { showToast(`💀 Chupacabras roba 10 Monedas`); newPlayers[game.turn].coins -= 10; }
            if (nextNode.type === 'koopa') { showToast(`🐢 Wealthy Turtle da +10 Monedas`); newPlayers[game.turn].coins += 10; }
        }

        updateGame({ activePos: nextNodeId, movesLeft: newMoves, players: newPlayers });

        if (newMoves <= 0) {
            setTimeout(() => { if (isMyTurn) endTurn(nextNodeId, newPlayers); }, 300);
        } else {
            updateGame({ phase: 'MOVING' });
        }
    };

    const tryMoveTo = (nextNodeId, currentMoves) => {
        if (!isMyTurn) return;

        const nextNode = RAW_MAP_DATA[nextNodeId];
        updateGame({ activePos: nextNodeId, players: updateActivePlayer(p => ({...p, pos: nextNodeId})) });

        const needsPrompt = nextNode.type === 'stone' || 
                            (nextNode.type === 'star_node' && nextNodeId === game.activeStarId) ||
                            nextNode.type === 'koopa' || 
                            nextNode.type === 'bowser' || 
                            nextNode.type === 'boo';

        if (needsPrompt) {
            updateGame({ phase: 'PAUSED_FOR_PROMPT' });
            setTimeout(() => {
                if (!isMyTurn) return; 
                let newPhase = '';
                let dialog = '';
                if (nextNode.type === 'stone') newPhase = 'STONE_PROMPT';
                else if (nextNode.type === 'star_node') newPhase = 'STAR_PROMPT';
                else if (nextNode.type === 'koopa') { newPhase = 'KOOPA_PROMPT'; dialog = WT_DIALOGS[Math.floor(Math.random() * WT_DIALOGS.length)]; }
                else if (nextNode.type === 'bowser') { newPhase = 'BOWSER_PROMPT'; dialog = CHUPACABRAS_DIALOGS[Math.floor(Math.random() * CHUPACABRAS_DIALOGS.length)]; }
                else if (nextNode.type === 'boo') newPhase = 'BOO_PROMPT';
                
                updateGame({ phase: newPhase, pendingNode: nextNodeId, currentDialog: dialog });
            }, 350);
            return;
        }

        finalizeMoveStep(nextNodeId, currentMoves);
    };

    const finalizeMoveStep = (nextNodeId, currentMoves) => {
        executeMove(nextNodeId, currentMoves);
    };

    // Auto-mover en MOVING - SOLO el cliente activo ejecuta esto
    useEffect(() => {
        if (!isMyTurn || game.phase !== 'MOVING' || game.movesLeft <= 0 || isRolling) return;
        
        const timer = setTimeout(() => {
            const currentNode = RAW_MAP_DATA[game.activePos];
            const validOuts = getValidOuts(currentNode);

            if (validOuts.length === 0) { endTurn(game.activePos, game.players); return; }
            if (validOuts.length > 1) { updateGame({ phase: 'CHOICE' }); return; }

            tryMoveTo(validOuts[0].id, game.movesLeft);
        }, 350);
        return () => clearTimeout(timer);
    }, [game.phase, game.movesLeft, game.activePos, isRolling, isMyTurn]);

    const endTurn = (finalPosId, currentPlayers) => {
        if (!isMyTurn) return;
        const finalNode = RAW_MAP_DATA[finalPosId];

        if (finalNode.type === 'blue' || finalNode.type === 'red') {
            const q = DEMO_QUESTIONS[Math.floor(Math.random() * DEMO_QUESTIONS.length)];
            updateGame({ currentQuestion: q, questionContext: { type: finalNode.type }, phase: 'QUESTION_PROMPT' });
            return; 
        }

        if (finalNode.type === 'event') showToast("⚡ ¡Evento Sorpresa!");
        finalizeTurnChange();
    };

    // 🆕 finalizeTurnChange ahora maneja rondas reales
    const finalizeTurnChange = () => {
        if (!isMyTurn) return;
        setTimeout(() => {
            const nextTurn = (game.turn + 1) % game.players.length;
            const updates = { phase: 'IDLE', turn: nextTurn };
            // Si el siguiente turno es 0, completamos una vuelta = nueva ronda
            if (nextTurn === 0) {
                updates.round = (game.round || 1) + 1;
                showToast(`🎉 ¡Ronda ${updates.round}!`);
            }
            updateGame(updates);
        }, 1500);
    };

    // ==========================================
    // DADO LOCAL (no satura Firebase)
    // ==========================================
    const rollDice = () => {
        if (!isMyTurn || game.phase !== 'IDLE' || isRolling) return;
        setIsRolling(true);
        let count = 0;
        const interval = setInterval(() => {
            setLocalDiceFace(Math.floor(Math.random() * 6) + 1);
            count++;
            if (count > 15) {
                 clearInterval(interval);
                 const finalRoll = Math.floor(Math.random() * 6) + 1;
                 setLocalDiceFace(finalRoll);
                 setTimeout(() => {
                     setIsRolling(false);
                     // UNA sola escritura a Firebase
                     updateGame({ diceVal: finalRoll, movesLeft: finalRoll, phase: 'MOVING' });
                 }, 800);
            }
        }, 50);
    };

    const calculateGhostPath = (startNodeId, chosenDirIdx) => {
        let path = [];
        let currentId = startNodeId;
        let steps = game.movesLeft;

        path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
        let nextId = `${RAW_MAP_DATA[currentId].q + HEX_DIRS[chosenDirIdx].q},${RAW_MAP_DATA[currentId].r + HEX_DIRS[chosenDirIdx].r}`;
        if (!RAW_MAP_DATA[nextId]) return { path, landingNode: null };
        
        currentId = nextId;
        path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
        
        const nextNode = RAW_MAP_DATA[currentId];
        const nextOuts = getValidOuts(nextNode);
        if (nextOuts.length <= 1 && nextNode.type !== 'stone' && !(nextNode.type === 'star_node' && nextNode.id === game.activeStarId)) steps--; 

        while (steps > 0) {
            let node = RAW_MAP_DATA[currentId];
            let outs = getValidOuts(node);
            
            if (outs.length === 0 || outs.length > 1 || node.type === 'stone' || (node.type === 'star_node' && node.id === game.activeStarId) || node.type === 'koopa' || node.type === 'bowser' || node.type === 'boo') break; 
            
            currentId = outs[0].id;
            path.push({x: RAW_MAP_DATA[currentId].x, y: RAW_MAP_DATA[currentId].y});
            
            let nnNode = RAW_MAP_DATA[currentId];
            let nnOuts = getValidOuts(nnNode);
            if (nnOuts.length <= 1 && nnNode.type !== 'stone' && !(nnNode.type === 'star_node' && nnNode.id === game.activeStarId)) steps--;
        }
        return { path, landingNode: RAW_MAP_DATA[currentId] };
    };

    const previewChoice = (dirIdx) => {
        if (!isMyTurn) return;
        setSelectedForkDir(dirIdx);
        const ghostData = calculateGhostPath(game.activePos, dirIdx);
        setGhostPathCoords(ghostData.path);
        setGhostLandingNode(ghostData.landingNode);
    };

    const confirmChoice = () => {
        if (!isMyTurn || selectedForkDir === null) return;
        const nextId = `${RAW_MAP_DATA[game.activePos].q + HEX_DIRS[selectedForkDir].q},${RAW_MAP_DATA[game.activePos].r + HEX_DIRS[selectedForkDir].r}`;
        setSelectedForkDir(null); setGhostPathCoords([]); setGhostLandingNode(null);
        tryMoveTo(nextId, game.movesLeft);
    };

    // Limpiar ghost path cuando cambia el turno
    useEffect(() => {
        setSelectedForkDir(null);
        setGhostPathCoords([]);
        setGhostLandingNode(null);
    }, [game.turn]);

    const handleStonePay = () => {
        if (!isMyTurn) return;
        const newP = updateActivePlayer(p => ({...p, coins: p.coins - 10}));
        showToast("🪨 ¡Pagaste el peaje!");
        updateGame({ players: newP });
        finalizeMoveStep(game.pendingNode, game.movesLeft); 
    };

    const handleStoneFail = () => {
        if (!isMyTurn) return;
        let curr = game.activePos;
        for(let i=0; i<5; i++) {
            const parents = reverseMap[curr];
            if(parents && parents.length > 0) curr = parents[0]; else break;
        }
        showToast("💥 ¡La Piedra te aplastó! Retrocedes 5 casillas.");
        updateGame({ activePos: curr, players: updateActivePlayer(p => ({...p, pos: curr})), movesLeft: 0, phase: 'IDLE' });
        setTimeout(() => endTurn(curr, game.players), 400); 
    };

    const handleStarBuy = (buy) => {
        if (!isMyTurn) return;
        if (buy) {
            const newP = updateActivePlayer(p => ({...p, coins: p.coins - 20, stars: p.stars + 1}));
            showToast("⭐ ¡Compraste una Estrella!");
            confetti({particleCount: 150, spread: 70});
            const otherStars = STAR_LOCATIONS.filter(id => id !== game.activeStarId);
            const newStarId = otherStars[Math.floor(Math.random() * otherStars.length)];
            updateGame({ players: newP, activeStarId: newStarId });
        }
        finalizeMoveStep(game.pendingNode, game.movesLeft); 
    };

    const handleKoopaAccept = () => { 
        if (!isMyTurn) return;
        updateGame({ players: updateActivePlayer(p => ({...p, coins: p.coins + 10})) });
        showToast("🐢 ¡Recibiste 10 Monedas!"); 
        finalizeMoveStep(game.pendingNode, game.movesLeft); 
    };
    
    const handleBowserTrivia = () => {
        if (!isMyTurn) return;
        const q = DEMO_QUESTIONS[Math.floor(Math.random() * DEMO_QUESTIONS.length)];
        updateGame({ currentQuestion: q, questionContext: { type: 'bowser' }, phase: 'QUESTION_PROMPT' });
    };

    const startBooSteal = (action) => {
        if (!isMyTurn) return;
        updateGame({ booAction: action, phase: 'BOO_TARGET' });
    };

    const executeBooSteal = (targetId) => {
        if (!isMyTurn) return;
        if (game.booAction === 'coins') {
            const newP = [...game.players];
            const targetIdx = newP.findIndex(p => p.id === targetId);
            const stolen = Math.min(10, newP[targetIdx].coins); 
            newP[targetIdx].coins -= stolen;
            newP[game.turn].coins += stolen;
            showToast(`👻 ¡Boo robó ${stolen} monedas!`);
            updateGame({ players: newP });
            finalizeMoveStep(game.pendingNode, game.movesLeft);
        } else if (game.booAction === 'star') {
            const newP = updateActivePlayer(p => ({...p, coins: p.coins - 40})); 
            const q = DEMO_QUESTIONS[Math.floor(Math.random() * DEMO_QUESTIONS.length)];
            updateGame({ players: newP, currentQuestion: q, questionContext: { type: 'boo_star', targetId: targetId }, phase: 'QUESTION_PROMPT' });
        }
    };

    const handleQuestionAnswer = (selectedOption) => {
        if (!isMyTurn) return;
        const isCorrect = selectedOption === game.currentQuestion.answer;
        const pName = game.players[game.turn].name;
        let newP = [...game.players];

        if (game.questionContext.type === 'blue') {
            if (isCorrect) { showToast(`✅ ¡Correcto! ${pName} gana +3 Monedas`); newP[game.turn].coins += 3; }
            else { showToast(`❌ Incorrecto. Ganas 0 Monedas.`); }
            updateGame({ players: newP, currentQuestion: null });
            finalizeTurnChange();
        } 
        else if (game.questionContext.type === 'red') {
            if (isCorrect) { showToast(`✅ ¡Salvado! ${pName} no pierde monedas`); }
            else { showToast(`❌ ¡Fallaste! ${pName} pierde -3 Monedas`); newP[game.turn].coins -= 3; }
            updateGame({ players: newP, currentQuestion: null });
            finalizeTurnChange();
        }
        else if (game.questionContext.type === 'bowser') {
            if (isCorrect) { showToast(`✅ Chupacabras: "¡Grrr!" (-5 Monedas)`); newP[game.turn].coins -= 5; }
            else { showToast(`❌ Chupacabras: "¡BWAHAHA!" (-15 Monedas)`); newP[game.turn].coins -= 15; }
            updateGame({ players: newP, currentQuestion: null });
            finalizeMoveStep(game.pendingNode, game.movesLeft);
        }
        else if (game.questionContext.type === 'boo_star') {
            if (isCorrect) {
                showToast(`👻 ¡Boo robó la estrella exitosamente!`);
                const targetIdx = newP.findIndex(p => p.id === game.questionContext.targetId);
                if (newP[targetIdx].stars > 0) {
                    newP[targetIdx].stars -= 1;
                    newP[game.turn].stars += 1;
                }
            } else {
                showToast(`❌ Boo: "Too bad..." (Pierdes las 40 monedas)`);
            }
            updateGame({ players: newP, currentQuestion: null });
            finalizeMoveStep(game.pendingNode, game.movesLeft);
        }
    };

    // ==========================================
    // RENDER: HOME
    // ==========================================
    if (appState === 'HOME') {
        return (
            <div className="h-full flex flex-col items-center justify-center bg-emerald-950 p-6 relative">
                {toastMsg && <div className="absolute top-10 z-50"><div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div></div>}
                
                <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath d=\'M54.627 0l.83.83v58.34l-.83.83H5.373l-.83-.83V.83l.83-.83h49.254zM53.797 1.66H6.203v56.68h47.594V1.66zM27 16h6v28h-6V16zm12 12h-6v4h6v-4z\' fill=\'%23ffffff\' fill-opacity=\'1\' fill-rule=\'evenodd\'/%3E%3C/svg%3E")' }}></div>
                
                <div className="bg-zinc-900 border-4 border-emerald-500 rounded-3xl p-8 w-full max-w-md shadow-2xl z-10 text-center">
                    <Gamepad2 size={60} className="text-emerald-400 mx-auto mb-4"/>
                    <h1 className="text-4xl font-black text-white mb-2">Periplo Party</h1>
                    <p className="text-emerald-400 font-bold tracking-widest uppercase mb-6">Multiplayer Edition</p>

                    {/* Botón copiar link prominente */}
                    <button onClick={copyGameLink} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 border-2 border-zinc-700 text-white py-3 rounded-2xl font-bold text-sm mb-6 flex justify-center items-center gap-2">
                        {linkCopied ? <><Check size={18} className="text-emerald-400"/> ¡Link copiado!</> : <><Copy size={18}/> Copiar link para compartir</>}
                    </button>

                    <div className="flex flex-col gap-4">
                        <button onClick={handleCreateRoomClick} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 text-emerald-950 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.emerald.700)] flex justify-center items-center gap-2">
                            <Crown size={24}/> Crear Sala
                        </button>
                        
                        <div className="flex items-center gap-4 my-2">
                            <div className="h-px bg-zinc-700 flex-1"></div><span className="text-zinc-500 font-bold uppercase text-xs">o unirse con código</span><div className="h-px bg-zinc-700 flex-1"></div>
                        </div>
                        
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                value={inputRoomId} 
                                onChange={e => setInputRoomId(e.target.value)} 
                                placeholder="CÓDIGO" 
                                maxLength="4" 
                                autoComplete="off"
                                autoCorrect="off"
                                autoCapitalize="characters"
                                spellCheck="false"
                                name="periplo-room-code"
                                data-lpignore="true"
                                data-form-type="other"
                                className="bg-zinc-800 text-white font-black text-center text-xl uppercase px-4 py-3 rounded-2xl w-full border-2 border-zinc-700 outline-none focus:border-indigo-500" 
                            />
                            <button onClick={handleJoinRoomClick} className="btn-juicy bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-2xl font-black text-lg">Entrar</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // ==========================================
    // RENDER: PROFILE
    // ==========================================
    if (appState === 'PROFILE') {
        return (
            <div className="h-full flex flex-col items-center justify-center bg-emerald-950 p-6 relative">
                {toastMsg && <div className="absolute top-10 z-50"><div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div></div>}
                
                <button onClick={() => { setAppState('HOME'); setRoomId(""); }} className="absolute top-6 left-6 text-zinc-400 hover:text-white flex items-center gap-2 font-bold bg-zinc-900 px-4 py-2 rounded-xl z-20 transition-colors">
                    <ChevronLeft size={20}/> Volver
                </button>

                <div className="bg-zinc-900 border-4 border-indigo-500 rounded-3xl p-8 w-full max-w-md shadow-2xl z-10 text-center animate-pop-in">
                    <UserPlus size={50} className="text-indigo-400 mx-auto mb-4"/>
                    <h2 className="text-2xl font-black text-white mb-1">Crea tu Perfil</h2>
                    <p className="text-zinc-500 text-xs mb-6">Tu nombre y avatar se recordarán para próximos juegos</p>

                    <div className="text-left mb-6">
                        <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">1. Tu Nombre</label>
                        {/* Input con todos los anti-autofill posibles */}
                        <input 
                            type="text" 
                            value={playerName} 
                            onChange={e => setPlayerName(e.target.value)} 
                            placeholder="Ej: Juan" 
                            maxLength="12"
                            autoComplete="off"
                            autoCorrect="off"
                            autoCapitalize="words"
                            spellCheck="false"
                            name="periplo-pn"
                            id="periplo-pn"
                            data-lpignore="true"
                            data-form-type="other"
                            data-1p-ignore="true"
                            inputMode="text"
                            className="bg-zinc-800 text-white font-black text-xl px-4 py-3 rounded-2xl w-full border-2 border-zinc-700 outline-none focus:border-indigo-500 transition-all" 
                        />
                    </div>

                    <div className="text-left mb-8">
                        <label className="text-zinc-400 font-bold text-xs uppercase tracking-widest ml-2 mb-2 block">2. Elige tu Avatar</label>
                        <div className="grid grid-cols-6 gap-2 p-3 border-2 border-zinc-800 rounded-2xl bg-zinc-950">
                            {AVATAR_EMOJIS.map(emoji => (
                                <button key={emoji} onClick={() => setSelectedEmoji(emoji)} className={`text-2xl md:text-3xl aspect-square rounded-xl transition-all flex items-center justify-center ${selectedEmoji === emoji ? 'bg-indigo-600 scale-110 shadow-lg ring-2 ring-indigo-300' : 'bg-zinc-800 hover:bg-zinc-700 opacity-70 hover:opacity-100'}`}>
                                    {emoji}
                                </button>
                            ))}
                        </div>
                    </div>

                    <button onClick={handleProfileSubmit} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.indigo.800)] flex justify-center items-center gap-2">
                        Sentarme a la mesa <ArrowRight size={24}/>
                    </button>
                </div>
            </div>
        );
    }

    // ==========================================
    // RENDER: LOBBY
    // ==========================================
    if (appState === 'LOBBY' && roomId) {
        return (
            <div className="h-full flex flex-col items-center justify-center bg-emerald-950 p-6 relative">
                {toastMsg && <div className="absolute top-10 z-50"><div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div></div>}
                
                <button onClick={leaveRoom} className="absolute top-6 left-6 text-zinc-400 hover:text-white flex items-center gap-2 font-bold bg-zinc-900 px-4 py-2 rounded-xl z-20 transition-colors">
                    <ChevronLeft size={20}/> {isHost ? 'Cerrar sala' : 'Abandonar'}
                </button>

                <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath d=\'M54.627 0l.83.83v58.34l-.83.83H5.373l-.83-.83V.83l.83-.83h49.254zM53.797 1.66H6.203v56.68h47.594V1.66zM27 16h6v28h-6V16zm12 12h-6v4h6v-4z\' fill=\'%23ffffff\' fill-opacity=\'1\' fill-rule=\'evenodd\'/%3E%3C/svg%3E")' }}></div>
                
                <div className="bg-zinc-900 border-4 border-emerald-500 rounded-3xl p-8 w-full max-w-md shadow-2xl z-10 text-center animate-pop-in">
                    {/* Código tappable para copiar */}
                    <button onClick={copyRoomCode} className="btn-juicy w-full bg-zinc-950 border border-zinc-800 hover:border-emerald-500 rounded-2xl p-4 mb-4 transition-colors">
                        <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1 flex items-center justify-center gap-2">
                            {codeCopied ? <><Check size={12} className="text-emerald-400"/> Código copiado</> : <><Copy size={12}/> Toca para copiar el código</>}
                        </p>
                        <p className="text-5xl font-black text-white tracking-widest">{roomId}</p>
                    </button>

                    <button onClick={copyGameLink} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white py-2 rounded-xl font-bold text-xs mb-6 flex justify-center items-center gap-2">
                        {linkCopied ? <><Check size={14} className="text-emerald-400"/> ¡Link copiado!</> : <><LinkIcon size={14}/> Copiar link completo</>}
                    </button>
                    
                    <h3 className="text-left text-zinc-400 font-bold text-sm flex items-center gap-2 mb-3"><Users size={18}/> Jugadores ({(game.players || []).length}/4)</h3>
                    
                    <div className="grid grid-cols-2 gap-3 mb-8">
                        {(game.players || []).map((p, i) => (
                            <div key={p.id} className={`bg-zinc-800 border-2 rounded-xl p-3 flex items-center justify-center gap-3 relative overflow-hidden ${p.id === localPlayerId ? 'ring-4 ring-white/30' : ''}`} style={{ borderColor: p.activeColor }}>
                                <div className="absolute inset-0 opacity-10" style={{ backgroundColor: p.color }}></div>
                                <span className="text-3xl relative z-10">{p.emoji}</span>
                                <span className="font-black text-white text-base relative z-10 truncate">{p.name} {i===0 && '👑'}</span>
                            </div>
                        ))}
                        {[...Array(Math.max(0, 4 - (game.players || []).length))].map((_, i) => (
                            <div key={`empty-${i}`} className="bg-zinc-950 border-2 border-zinc-800 border-dashed rounded-xl p-3 flex flex-col items-center justify-center">
                                <span className="text-zinc-600 font-bold text-sm">Silla vacía</span>
                                <span className="text-zinc-700 text-xs">Esperando...</span>
                            </div>
                        ))}
                    </div>
                    
                    {localPlayerId === 1 ? (
                        <button onClick={startGame} disabled={(game.players || []).length < 2} className="btn-juicy w-full bg-emerald-500 disabled:bg-zinc-800 text-emerald-950 disabled:text-zinc-500 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.emerald.700)] disabled:shadow-none">
                            {(game.players || []).length < 2 ? 'Esperando jugadores...' : '¡Iniciar Partida!'}
                        </button>
                    ) : (
                        <div className="bg-indigo-900/30 border border-indigo-500/30 rounded-2xl p-4">
                            <p className="text-indigo-300 font-bold animate-pulse">Esperando a que el Host inicie el juego...</p>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ==========================================
    // RENDER: PLAYING
    // ==========================================
    if (!game.players || game.players.length === 0) return null;
    const activePlayer = game.players[game.turn];
    if (!activePlayer) return null;

    return (
        <div className="h-full flex flex-col bg-emerald-950 relative">
            
            {/* HUD */}
            <div className="border-b shrink-0 flex flex-col z-10 shadow-xl transition-colors duration-500" style={{ backgroundColor: `${activePlayer.color}1A`, borderColor: activePlayer.color }}>
                <div className="flex justify-between items-center p-2 bg-black/40 gap-2">
                    <span className="font-bold text-xs uppercase tracking-widest px-2 truncate" style={{ color: activePlayer.activeColor }}>
                        Ronda {game.round || 1} · {isMyTurn ? '¡Es tu turno!' : `Turno de ${activePlayer.name}`}
                    </span>
                    <button onClick={() => setShowAllPlayers(!showAllPlayers)} className="text-zinc-400 hover:text-white flex items-center gap-1 text-xs font-bold px-2 py-1 rounded bg-black/50 shrink-0">
                        {showAllPlayers ? <><EyeOff size={14}/> Ocultar</> : <><Eye size={14}/> Ver Todos</>}
                    </button>
                </div>
                
                <div className={`grid ${showAllPlayers ? 'grid-cols-2 md:grid-cols-4' : 'grid-cols-1'} w-full`}>
                    {game.players.map((p, idx) => {
                        if (!showAllPlayers && idx !== game.turn) return null; 
                        return (
                            <div key={p.id} className={`p-3 flex justify-between items-center border-b-4 transition-all ${game.turn === idx ? '' : 'border-transparent bg-zinc-950 opacity-70 grayscale'}`} style={game.turn === idx ? { borderColor: p.color, backgroundColor: `${p.color}33` } : {}}>
                                <div className="flex items-center gap-3 min-w-0">
                                    <div className="w-10 h-10 rounded-full border-2 shadow-lg flex items-center justify-center text-xl bg-white shrink-0" style={{ borderColor: p.activeColor }}>
                                        {p.emoji}
                                    </div>
                                    <div className="flex flex-col min-w-0">
                                        <span className="font-black text-white text-sm leading-none truncate">{p.name}{p.id === localPlayerId ? ' (Tú)' : ''}</span>
                                        {game.turn === idx && game.phase === 'IDLE' && <span className="text-[10px] font-bold uppercase tracking-widest mt-1" style={{ color: p.activeColor }}>Ready</span>}
                                    </div>
                                </div>
                                <div className="flex gap-3 shrink-0">
                                    <div className="flex items-center gap-1"><Coins className="text-yellow-400" size={18}/><span className={`font-black ${p.coins < 0 ? 'text-rose-500' : 'text-white'}`}>{p.coins}</span></div>
                                    <div className="flex items-center gap-1"><Star className="text-amber-400 fill-amber-400" size={18}/><span className="font-black text-white">{p.stars}</span></div>
                                </div>
                            </div>
                        )
                    })}
                </div>
            </div>

            {/* DADO FLOTANTE */}
            {game.phase === 'IDLE' && (
                <div className="absolute top-32 right-6 z-50 animate-pop-in">
                    <button onClick={rollDice} disabled={isRolling || !isMyTurn} 
                            className={`w-20 h-20 md:w-24 md:h-24 rounded-[2rem] flex flex-col items-center justify-center transition-all border-4 ${(!isRolling && isMyTurn) ? 'shadow-[0_8px_0_rgba(0,0,0,0.5)] active:translate-y-2 active:shadow-none cursor-pointer' : 'shadow-none cursor-not-allowed opacity-80'}`}
                            style={{ backgroundColor: activePlayer.color, borderColor: activePlayer.activeColor }}>
                        {isRolling ? (
                            <span className="text-4xl md:text-5xl font-black text-white animate-pulse">{localDiceFace}</span>
                        ) : (
                            <><Dices size={36} className="mb-1 text-white"/><span className="text-[10px] font-bold uppercase tracking-widest text-white">{isMyTurn ? 'Tirar' : 'Espera'}</span></>
                        )}
                    </button>
                </div>
            )}

            {/* TABLERO */}
            <div className="flex-1 relative overflow-hidden flex items-center justify-center bg-[#022c22]">
                
                {toastMsg && (
                    <div className="absolute top-10 z-50 pointer-events-none">
                        <div className="bg-white text-black px-6 py-3 rounded-full font-black text-lg shadow-2xl animate-pop-in border-4 border-emerald-500">{toastMsg}</div>
                    </div>
                )}

                <svg viewBox="-500 -350 1000 700" className="w-full h-full">
                    <g>
                        {forestDecorations.map((t) => (
                            <g key={`forest-${t.id}`}>
                                <polygon points={getHexPoints(t.x, t.y)} fill={t.fill} stroke="#022c22" strokeWidth="1" opacity="0.8" />
                                {t.emoji && <text x={t.x} y={t.y} fontSize="20" textAnchor="middle" dominantBaseline="central" opacity="0.9">{t.emoji}</text>}
                            </g>
                        ))}
                    </g>

                    <g>
                        {Object.values(RAW_MAP_DATA).map((tile) => {
                            const isFork = getValidOuts(tile).length > 1;
                            const baseStyle = SPACE_TYPES[tile.type];
                            const isActiveStar = tile.type === 'star_node' && tile.id === game.activeStarId;
                            const isInactiveStar = tile.type === 'star_node' && tile.id !== game.activeStarId;
                            const isGhostLanding = ghostLandingNode && ghostLandingNode.id === tile.id;

                            if (tile.type === 'stone') {
                                return (
                                    <g key={`play-${tile.id}`}>
                                        <rect x={tile.x - S*0.85} y={tile.y - S*0.85} width={S*1.7} height={S*1.7} rx="4" fill={baseStyle.fill} stroke={isGhostLanding ? '#ffffff' : baseStyle.stroke} strokeWidth={isGhostLanding ? "6" : "3"} className={isGhostLanding ? "pulse-landing" : "drop-shadow-lg"} />
                                        <text x={tile.x} y={tile.y + 2} fontSize="24" textAnchor="middle" dominantBaseline="central">😡</text>
                                    </g>
                                );
                            }
                            if (tile.type === 'koopa') {
                                return (
                                    <g key={`play-${tile.id}`}>
                                        <rect x={tile.x - S*0.85} y={tile.y - S*0.85} width={S*1.7} height={S*1.7} rx="12" fill={baseStyle.fill} stroke={isGhostLanding ? '#ffffff' : baseStyle.stroke} strokeWidth={isGhostLanding ? "6" : "3"} className={isGhostLanding ? "pulse-landing" : "drop-shadow-lg"} />
                                        <text x={tile.x} y={tile.y + 2} fontSize="22" textAnchor="middle" dominantBaseline="central">🐢</text>
                                    </g>
                                );
                            }
                            if (tile.type === 'bowser') {
                                return (
                                    <g key={`play-${tile.id}`}>
                                        <polygon points={getHexPoints(tile.x, tile.y)} fill={baseStyle.fill} stroke={isGhostLanding ? '#ffffff' : baseStyle.stroke} strokeWidth={isGhostLanding ? "6" : "3"} className={isGhostLanding ? "pulse-landing" : "drop-shadow-lg"} />
                                        <text x={tile.x} y={tile.y + 2} fontSize="24" textAnchor="middle" dominantBaseline="central">👹</text>
                                    </g>
                                );
                            }

                            let fill = baseStyle.fill;
                            let stroke = baseStyle.stroke;
                            
                            if (isFork) { fill = '#78350f'; stroke = '#b45309'; }
                            if (isInactiveStar) { fill = 'transparent'; stroke = '#ffffff'; }

                            const shouldHaveArrows = tile.type === 'blue' || tile.type === 'red' || isFork;

                            return (
                                <g key={`play-${tile.id}`}>
                                    {isInactiveStar ? (
                                        <g>
                                            <polygon points={getHexPoints(tile.x, tile.y)} fill={fill} stroke={stroke} strokeWidth="2" strokeDasharray="4 4" opacity="0.6"/>
                                            <circle cx={tile.x} cy={tile.y} r="4" fill="#ffffff" opacity="0.8"/>
                                        </g>
                                    ) : (
                                        <g>
                                            <polygon points={getHexPoints(tile.x, tile.y)} fill={fill} stroke={isGhostLanding ? '#ffffff' : stroke} strokeWidth={isGhostLanding ? "6" : "3"} className={isGhostLanding ? "pulse-landing" : "drop-shadow-lg"} />
                                            {isActiveStar ? (
                                                <g transform={`translate(${tile.x - 9}, ${tile.y - 9})`}><Star size={18} className="text-amber-300 fill-amber-300"/></g>
                                            ) : (
                                                baseStyle.icon && <g transform={`translate(${tile.x - 9}, ${tile.y - 9})`}>{baseStyle.icon}</g>
                                            )}
                                        </g>
                                    )}
                                    
                                    {shouldHaveArrows && (tile.dirs || []).map(dir => (
                                        <g key={`arrow-${dir}`} transform={`translate(${tile.x}, ${tile.y}) rotate(${dir * 60})`}>
                                            <path d="M 0,-1.5 L 5,-1.5 L 5,-3.5 L 10,0 L 5,3.5 L 5,1.5 L 0,1.5 Z" fill="rgba(255,255,255,0.6)" />
                                        </g>
                                    ))}
                                </g>
                            );
                        })}
                    </g>

                    {game.phase === 'CHOICE' && isMyTurn && ghostPathCoords.length > 1 && (
                        <polyline points={ghostPathCoords.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#ffffff" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="8 12" className="ghost-path drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]" />
                    )}

                    {game.players.map((p, idx) => {
                        const isTurn = idx === game.turn;
                        const posIdToRender = (isTurn && game.phase !== 'IDLE') ? game.activePos : p.pos;
                        const tileData = RAW_MAP_DATA[posIdToRender];
                        if(!tileData) return null;
                        
                        const sharingPlayers = game.players.filter(pl => {
                            const plPos = (game.players.indexOf(pl) === game.turn && game.phase !== 'IDLE') ? game.activePos : pl.pos;
                            return plPos === posIdToRender;
                        });
                        const isSharingTile = sharingPlayers.length > 1;
                        const shareIndex = sharingPlayers.findIndex(pl => pl.id === p.id);
                        
                        let offsetX = 0, offsetY = 0;
                        if (isSharingTile) {
                            if(shareIndex === 0) { offsetX = -8; offsetY = -8; }
                            else if(shareIndex === 1) { offsetX = 8; offsetY = -8; }
                            else if(shareIndex === 2) { offsetX = -8; offsetY = 8; }
                            else if(shareIndex === 3) { offsetX = 8; offsetY = 8; }
                        }

                        return (
                            <g key={`player-${p.id}`} className="transition-transform duration-300 ease-in-out" style={{ transform: `translate(${tileData.x + offsetX}px, ${tileData.y + offsetY}px)` }}>
                                <circle cx="0" cy="0" r="14" fill="#ffffff" />
                                <circle cx="0" cy="0" r="12" fill={p.color} />
                                <text x="0" y="1" fontSize="14" textAnchor="middle" dominantBaseline="central">{p.emoji}</text>
                                {isTurn && game.phase === 'IDLE' && <circle cx="0" cy="0" r="22" fill="none" stroke={p.activeColor} strokeWidth="4" className="animate-pulse" />}
                            </g>
                        );
                    })}

                    {(game.phase === 'MOVING' || game.phase === 'CHOICE' || (game.phase || '').includes('PROMPT')) && RAW_MAP_DATA[game.activePos] && (
                        <g style={{ transform: `translate(${RAW_MAP_DATA[game.activePos].x}px, ${RAW_MAP_DATA[game.activePos].y - 35}px)` }} className="transition-transform duration-300 ease-in-out">
                            <rect x="-14" y="-14" width="28" height="28" rx="8" fill={activePlayer.color} stroke="#ffffff" strokeWidth="2" className="drop-shadow-lg"/>
                            <text x="0" y="5" fill="white" fontSize="16" fontWeight="black" textAnchor="middle">{game.movesLeft}</text>
                        </g>
                    )}
                </svg>

                {/* MODAL BIFURCACIÓN */}
                {game.phase === 'CHOICE' && (
                    <div className="absolute bottom-0 left-0 right-0 bg-zinc-900 border-t-4 p-6 shadow-[0_-15px_30px_rgba(0,0,0,0.6)] z-40 animate-pop-in" style={{ borderColor: activePlayer.color }}>
                        <div className="max-w-3xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="text-center md:text-left shrink-0">
                                <h2 className="text-2xl font-black text-white flex items-center justify-center md:justify-start gap-2"><MapPin style={{ color: activePlayer.activeColor }}/> ¡Intersección!</h2>
                                <p className="text-zinc-400 text-sm mt-1">{isMyTurn ? <>Elige una ruta con <span className="text-white font-bold">{game.movesLeft} pasos</span>.</> : <span className="animate-pulse">{activePlayer.name} está eligiendo...</span>}</p>
                            </div>
                            
                            <div className="flex-1 flex justify-center gap-3 w-full">
                                {getValidOuts(RAW_MAP_DATA[game.activePos]).map((out) => {
                                    const isSelected = selectedForkDir === out.dir;
                                    const customName = RAW_MAP_DATA[game.activePos].dirLabels?.[out.dir] || `Ruta ${HEX_DIRS[out.dir].label}`;
                                    const nextType = SPACE_TYPES[RAW_MAP_DATA[out.id].type === 'star_node' ? 'start' : RAW_MAP_DATA[out.id].type] || SPACE_TYPES.blue;
                                    return (
                                        <button key={out.id} onClick={() => previewChoice(out.dir)} disabled={!isMyTurn}
                                            className={`btn-juicy flex-1 p-3 rounded-2xl font-bold flex flex-col items-center justify-center border-2 transition-all disabled:opacity-50 ${isSelected ? 'text-white shadow-[0_0_15px_rgba(255,255,255,0.5)] scale-105' : 'bg-zinc-800 border-zinc-700 text-zinc-300 hover:bg-zinc-700'}`}
                                            style={isSelected ? { backgroundColor: activePlayer.color, borderColor: activePlayer.activeColor } : {}}>
                                            <span className="text-xs opacity-70 mb-1 uppercase tracking-widest">{customName}</span>
                                            <span className="flex items-center gap-2">{nextType.icon || <Star size={18}/>} Hacia allá</span> 
                                        </button>
                                    )
                                })}
                            </div>

                            <div className="shrink-0 w-full md:w-auto">
                                <button onClick={confirmChoice} disabled={selectedForkDir === null || !isMyTurn} className="btn-juicy w-full md:w-auto bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-500 text-emerald-950 px-8 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-[0_6px_0_theme(colors.emerald.700)] disabled:shadow-none">
                                    {isMyTurn ? <><CheckCircle2 size={24}/> Confirmar Ruta</> : 'Esperando...'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* MODALES INTERCEPTORES */}
                {game.phase === 'STONE_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-zinc-700 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-pop-in">
                            <div className="text-5xl mb-4">😡</div>
                            <h2 className="text-3xl font-black text-white mb-2">¡La Piedra!</h2>
                            <p className="text-zinc-400 mb-6">El peaje es de <span className="text-yellow-400 font-bold">10 Monedas</span> para cruzar.</p>
                            <div className="flex flex-col gap-3">
                                {isMyTurn ? (
                                    <>
                                        <button onClick={handleStonePay} disabled={activePlayer.coins < 10} className="btn-juicy w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-emerald-950 py-4 rounded-2xl font-black text-lg shadow-[0_6px_0_theme(colors.emerald.700)] disabled:shadow-none">Pagar 10 Monedas</button>
                                        <button onClick={handleStoneFail} className="btn-juicy w-full bg-rose-600 hover:bg-rose-500 text-white py-4 rounded-2xl font-bold text-lg shadow-[0_6px_0_theme(colors.rose.800)]">¡No puedo pagar! (Rebotar)</button>
                                    </>
                                ) : (
                                    <p className="text-white font-bold animate-pulse">Esperando decisión de {activePlayer.name}...</p>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {game.phase === 'STAR_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-amber-500 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-pop-in">
                            <Star className="mx-auto text-amber-400 fill-amber-400 mb-4 animate-pulse" size={60}/>
                            <h2 className="text-3xl font-black text-white mb-2">¡Estrella!</h2>
                            <p className="text-zinc-400 mb-6">¿Quieres comprarla por <span className="text-yellow-400 font-bold">20 Monedas</span>?</p>
                            <div className="flex flex-col gap-3">
                                {isMyTurn ? (
                                    <>
                                        <button onClick={() => handleStarBuy(true)} disabled={activePlayer.coins < 20} className="btn-juicy w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-amber-950 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_theme(colors.amber.700)] disabled:shadow-none flex items-center justify-center gap-2"><Star size={20} className="fill-amber-950"/> Comprar Estrella</button>
                                        <button onClick={() => handleStarBuy(false)} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-white py-4 rounded-2xl font-bold text-lg">Pasar de largo</button>
                                    </>
                                ) : (
                                    <p className="text-white font-bold animate-pulse">Esperando decisión de {activePlayer.name}...</p>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {game.phase === 'KOOPA_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-teal-500 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-pop-in">
                            <div className="text-5xl mb-4">🐢</div>
                            <h2 className="text-3xl font-black text-white mb-2">Wealthy Turtle</h2>
                            <p className="text-zinc-300 italic mb-6">"{game.currentDialog}"</p>
                            {isMyTurn ? (
                                <button onClick={handleKoopaAccept} className="btn-juicy w-full bg-teal-500 hover:bg-teal-400 text-teal-950 py-4 rounded-2xl font-black text-lg shadow-[0_6px_0_theme(colors.teal.700)]">¡Gracias! (+10 Monedas)</button>
                            ) : (
                                <p className="text-white font-bold animate-pulse">Esperando a {activePlayer.name}...</p>
                            )}
                        </div>
                    </div>
                )}

                {game.phase === 'BOWSER_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-rose-500 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-pop-in">
                            <div className="text-5xl mb-4">👹</div>
                            <h2 className="text-3xl font-black text-white mb-2">Chupacabras</h2>
                            <p className="text-zinc-300 italic mb-6">"{game.currentDialog}"</p>
                            {isMyTurn ? (
                                <button onClick={handleBowserTrivia} className="btn-juicy w-full bg-rose-600 hover:bg-rose-500 text-white py-4 rounded-2xl font-black text-lg shadow-[0_6px_0_theme(colors.rose.800)] flex items-center justify-center gap-2"><BrainCircuit size={20}/> ¡A la Trivia!</button>
                            ) : (
                                <p className="text-white font-bold animate-pulse">El Chupacabras atrapó a {activePlayer.name}...</p>
                            )}
                        </div>
                    </div>
                )}

                {game.phase === 'BOO_PROMPT' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-purple-500 rounded-3xl p-8 w-full max-w-md text-center shadow-2xl animate-pop-in">
                            <Ghost className="mx-auto text-purple-400 mb-4" size={60}/>
                            <h2 className="text-3xl font-black text-white mb-2">Boo</h2>
                            <p className="text-zinc-300 italic mb-6">"I don't care who wins, I just want to have fun. I'll steal some loot for you... for a price."</p>
                            <div className="flex flex-col gap-3">
                                {isMyTurn ? (
                                    <>
                                        <button onClick={() => startBooSteal('coins')} className="btn-juicy w-full bg-yellow-500 hover:bg-yellow-400 text-yellow-950 py-3 rounded-2xl font-black text-lg shadow-[0_4px_0_theme(colors.yellow.700)] flex justify-center items-center gap-2"><Coins size={20}/> Robar 10 Monedas (Gratis)</button>
                                        <button onClick={() => startBooSteal('star')} disabled={activePlayer.coins < 40} className="btn-juicy w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-amber-950 py-3 rounded-2xl font-black text-lg shadow-[0_4px_0_theme(colors.amber.700)] disabled:shadow-none flex justify-center items-center gap-2"><Star size={20}/> Robar Estrella (40 Monedas)</button>
                                        <button onClick={() => finalizeMoveStep(game.pendingNode, game.movesLeft)} className="btn-juicy w-full bg-zinc-800 hover:bg-zinc-700 text-white py-3 rounded-2xl font-bold text-base mt-2">Pasar de largo</button>
                                    </>
                                ) : (
                                    <p className="text-white font-bold animate-pulse">{activePlayer.name} está negociando con Boo...</p>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {game.phase === 'BOO_TARGET' && (
                    <div className="absolute inset-0 bg-black/80 z-40 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 border-purple-500 rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-pop-in">
                            <Crosshair className="mx-auto text-purple-400 mb-4" size={40}/>
                            <h2 className="text-2xl font-black text-white mb-4">¿A quién le robarás?</h2>
                            <div className="flex flex-col gap-3">
                                {game.players.filter(p => p.id !== activePlayer.id).map(target => (
                                    <button key={target.id} onClick={() => isMyTurn && executeBooSteal(target.id)} 
                                        className="btn-juicy bg-zinc-800 hover:bg-purple-600 border-2 border-zinc-700 hover:border-purple-400 text-white p-3 rounded-2xl font-bold flex justify-between items-center transition-all">
                                        <span className="flex items-center gap-2"><span className="text-xl">{target.emoji}</span> {target.name}</span>
                                        <div className="flex gap-2 text-xs">
                                            <span className="flex items-center"><Coins size={12} className="text-yellow-400 mr-1"/> {target.coins}</span>
                                            <span className="flex items-center"><Star size={12} className="text-amber-400 mr-1"/> {target.stars}</span>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {game.phase === 'QUESTION_PROMPT' && game.currentQuestion && game.questionContext && (
                    <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-zinc-900 border-4 rounded-3xl p-8 w-full max-w-lg shadow-2xl animate-pop-in" 
                             style={{ borderColor: game.questionContext.type === 'bowser' ? '#ef4444' : (game.questionContext.type === 'boo_star' ? '#a855f7' : activePlayer.color) }}>
                            <div className="text-center mb-6">
                                {game.questionContext.type === 'blue' && <span className="text-blue-400 font-bold uppercase tracking-widest">Responde para ganar +3 Monedas</span>}
                                {game.questionContext.type === 'red' && <span className="text-red-400 font-bold uppercase tracking-widest">Responde para salvar tus monedas</span>}
                                {game.questionContext.type === 'bowser' && <span className="text-rose-500 font-bold uppercase tracking-widest">Trivia Chupacabras: ¡Falla y pierde 15!</span>}
                                {game.questionContext.type === 'boo_star' && <span className="text-purple-400 font-bold uppercase tracking-widest">Acierta para robar la Estrella</span>}
                            </div>
                            <h2 className="text-2xl font-black text-white mb-6 text-center leading-tight">{game.currentQuestion.text}</h2>
                            
                            {isMyTurn ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {game.currentQuestion.options.map(opt => (
                                        <button key={opt} onClick={() => handleQuestionAnswer(opt)} 
                                            className="btn-juicy bg-zinc-800 hover:bg-indigo-600 border-2 border-zinc-700 hover:border-indigo-400 text-white p-4 rounded-2xl font-bold text-lg transition-all">
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-white font-bold animate-pulse text-center mt-8 text-xl">Esperando la respuesta de {activePlayer.name}...</p>
                            )}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

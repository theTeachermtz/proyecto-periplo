<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FC Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, X, Settings2, Key, Search, Layers, AlertCircle, CheckCircle2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🎓 TAXONOMÍA UNIVERSAL - Igual para todos los dashboards
        const TAXONOMY = {
            basic: {
                label: 'Básico',
                categories: {
                    vocab: { label: 'Vocabulario', topics: { animals: 'Animales', food: 'Comida', colors: 'Colores', numbers: 'Números', objects: 'Objetos' } },
                    grammar: { label: 'Gramática', topics: { present: 'Presente Simple', past: 'Pasado Simple', future: 'Futuro', questions: 'Preguntas' } },
                    phrases: { label: 'Frases Comunes', topics: { greetings: 'Saludos', polite: 'Expresiones Corteses', daily: 'Vida Diaria' } }
                }
            },
            advanced: {
                label: 'Intermedio',
                categories: {
                    vocab: { label: 'Vocabulario Avanzado', topics: { business: 'Negocios', academic: 'Académico', technical: 'Técnico', emotions: 'Emociones' } },
                    grammar: { label: 'Gramática Compleja', topics: { conditionals: 'Condicionales', modals: 'Modales', passive: 'Voz Pasiva', reported: 'Discurso Indirecto' } },
                    idioms: { label: 'Idiomas y Expresiones', topics: { phrasal: 'Phrasal Verbs', idioms: 'Expresiones Idiomáticas', slang: 'Jerga Coloquial' } }
                }
            },
            pro: {
                label: 'Avanzado',
                categories: {
                    vocab: { label: 'Vocabulario Especializado', topics: { medical: 'Medicina', legal: 'Legal', scientific: 'Científico', literature: 'Literatura' } },
                    grammar: { label: 'Matices Gramaticales', topics: { subtle: 'Sutilezas', advanced_tenses: 'Tiempos Complejos', stylistic: 'Estilística' } },
                    culture: { label: 'Cultura y Contexto', topics: { cultural: 'Referencias Culturales', historical: 'Contexto Histórico', regional: 'Variantes Regionales' } }
                }
            }
        };

        const FCBuilder = () => {
            const [title, setTitle] = useState("");
            const [cards, setCards] = useState([{ id: 1, wordEn: '', wordEs: '', emojis: '', exampleEn: '' }]);
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const [magiaModal, setMagiaModal] = useState(false);
            const [omniPrompt, setOmniPrompt] = useState("");
            const [targetCount, setTargetCount] = useState(15);
            
            const [apiKey, setApiKey] = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);

            // 🎯 ESTADOS DE TAXONOMÍA
            const [showTaxonomy, setShowTaxonomy] = useState(false);
            const [taxonomy, setTaxonomy] = useState({ level: 'basic', category: '', topic: '' });
            const [taxonomyErrors, setTaxonomyErrors] = useState({});

            const abortControllerRef = useRef(null);

            useEffect(() => {
                const savedKey = localStorage.getItem('periplo_google_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setTitle(data.title);
                            if (data.content && data.content.cards) {
                                setCards(data.content.cards.map((c, i) => ({ ...c, id: Date.now() + i })));
                            }
                            // Cargar taxonomía guardada
                            if (data.tags) {
                                setTaxonomy(data.tags);
                            }
                            setEditingId(editId);
                        }
                    });
                }
            }, []);

            const handleApiKeyChange = (e) => {
                const val = e.target.value;
                setApiKey(val);
                localStorage.setItem('periplo_google_key', val);
            };

            const addRow = () => setCards([...cards, { id: Date.now(), wordEn: '', wordEs: '', emojis: '', exampleEn: '' }]);
            const removeRow = (id) => { if (cards.length > 1) setCards(cards.filter(c => c.id !== id)); };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey.trim()}`);
                    if (!response.ok) throw new Error("Error conectando con Google");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels.find(m => m.includes("gemini-2.0")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { alert("Error al buscar modelos: " + e.message); } 
                finally { setIsLoadingModels(false); }
            };

            const cancelMagia = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    setLoading(false);
                }
            };

            const executeMagia = async () => {
                if (!apiKey.trim()) return alert("⚠️ Necesitas ingresar tu API Key.");
                if (!selectedModel) return alert("⚠️ Escanea y selecciona un modelo primero (botón lupa).");
                if (!omniPrompt.trim()) return alert("⚠️ Escribe qué quieres que haga la IA en la caja de texto.");
                
                setMagiaModal(false);
                setLoading(true);

                abortControllerRef.current = new AbortController();
                
                const promptText = `
                    Actúa como un creador de Flashcards experto para estudiantes de inglés hispanohablantes (español de México).
                    El usuario te ha dado la siguiente petición libre (puede ser un tema, una lista de palabras, o un texto para extraer vocabulario):
                    
                    PETICIÓN DEL USUARIO: "${omniPrompt}"
                    
                    Tu tarea es generar EXACTAMENTE ${targetCount} tarjetas basadas en esa petición.
                    
                    REGLAS PARA CADA TARJETA:
                    1. "wordEn": La palabra, phrasal verb o expresión en inglés.
                    2. "wordEs": La traducción o significado natural en español de México.
                    3. "emojis": De 1 a 3 emojis que representen MUY CLARAMENTE el concepto. Sé creativo, usa combinaciones visuales si es un concepto abstracto (ej. "escape" -> 🏃‍♂️💨).
                    4. "exampleEn": Una oración de ejemplo en inglés, nivel intermedio, que sea natural y conversacional.

                    Formato JSON requerido estrictamente:
                    [
                      {
                        "wordEn": "texto",
                        "wordEs": "texto",
                        "emojis": "emojis",
                        "exampleEn": "oración de ejemplo"
                      }
                    ]
                    
                    Devuelve ÚNICAMENTE el array JSON válido. NADA de texto markdown fuera del JSON.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                        }),
                        signal: abortControllerRef.current.signal
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const jsonString = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonString);

                    const newCards = parsedData.map((item, index) => ({
                        id: Date.now() + index,
                        wordEn: item.wordEn || '', 
                        wordEs: item.wordEs || '', 
                        emojis: item.emojis || '',
                        exampleEn: item.exampleEn || ''
                    }));

                    setCards(newCards);

                } catch (error) {
                    if (error.name === 'AbortError') console.log("Generación cancelada por el usuario.");
                    else { console.error("Error al generar:", error); alert("Ocurrió un error al contactar la IA.\n\n" + error.message); }
                } finally {
                    setLoading(false);
                    abortControllerRef.current = null;
                }
            };

            // 🎯 VALIDAR TAXONOMÍA
            const validateTaxonomy = () => {
                const errors = {};
                if (!taxonomy.level) errors.level = 'Nivel requerido';
                if (!taxonomy.category) errors.category = 'Categoría requerida';
                if (!taxonomy.topic) errors.topic = 'Tema requerido';
                setTaxonomyErrors(errors);
                return Object.keys(errors).length === 0;
            };

            // 💾 GUARDAR CON TAXONOMÍA
            const save = async () => {
                if(!title.trim() || cards.some(c => !c.wordEn || !c.wordEs)) {
                    alert("Asegúrate de tener un título y que ninguna tarjeta tenga las palabras en blanco.");
                    return;
                }

                // Validar taxonomía
                if (!validateTaxonomy()) {
                    setShowTaxonomy(true);
                    return;
                }
                
                const cleanCards = cards.map(({ id, ...rest }) => rest);
                
                setLoading(true);
                const data = { 
                    title, 
                    type: 'FLASHCARDS',
                    content: { cards: cleanCards },
                    tags: {
                        level: taxonomy.level,
                        category: taxonomy.category,
                        topic: taxonomy.topic
                    },
                    cardCount: cleanCards.length,
                    updatedAt: serverTimestamp() 
                };
                
                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';
                data.parentPath = parentPath;

                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), data);
                    } else {
                        await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...data, createdAt: serverTimestamp() });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
                } catch(e) { alert(e.message); setLoading(false); }
            };

            // Calcular categorías y temas disponibles
            const categories = TAXONOMY[taxonomy.level]?.categories || {};
            const topics = taxonomy.category ? TAXONOMY[taxonomy.level].categories[taxonomy.category]?.topics || {} : {};

            return (
                <div className="max-w-5xl mx-auto p-6 relative">
                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-sky-500 mb-6" size={56}/>
                            <p className="text-sky-500 font-bold uppercase tracking-widest mb-8">Sintetizando Tarjetas...</p>
                            <button onClick={cancelMagia} className="bg-rose-600 hover:bg-rose-500 text-white font-black px-6 py-3 rounded-full flex items-center gap-2 border-2 border-rose-700 transition-all active:scale-95 shadow-xl">
                                <X size={20}/> CANCELAR MAGIA
                            </button>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800 hover:bg-zinc-800 transition-colors"><ArrowLeft/></button>
                        <div className="flex items-center gap-3">
                            <Layers className="text-sky-400 hidden sm:block" size={28}/>
                            <h1 className="text-2xl font-black italic text-sky-400 tracking-tight">FC BUILDER</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setMagiaModal(true)} className="bg-sky-500 hover:bg-sky-400 text-black px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Sparkles size={18}/> <span className="hidden sm:inline">IA Assist</span></button>
                            <button onClick={save} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Save size={18}/> <span className="hidden sm:inline">Guardar</span></button>
                        </div>
                    </header>

                    <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título del mazo de Flashcards..." className="w-full bg-transparent text-3xl sm:text-4xl font-black border-b-2 border-zinc-800 mb-8 outline-none focus:border-sky-500 pb-2 text-white placeholder-zinc-700"/>

                    <div className="space-y-4">
                        {cards.map((c, idx) => (
                            <div key={c.id} className="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 relative group transition-all hover:border-zinc-700 shadow-md">
                                
                                <div className="absolute -left-3 -top-3 bg-sky-500 text-black w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shadow-lg border-4 border-zinc-950 z-10">
                                    {idx + 1}
                                </div>

                                {cards.length > 1 && (
                                    <button onClick={() => removeRow(c.id)} className="absolute -right-2 -top-2 bg-rose-500 hover:bg-rose-400 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg md:hidden group-hover:md:flex z-10">
                                        <Trash2 size={14}/>
                                    </button>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                    {/* EMOJI (Pequeño) */}
                                    <div className="md:col-span-2 flex flex-col">
                                        <label className="text-[10px] font-bold text-zinc-500 uppercase mb-1 pl-1">Emojis</label>
                                        <input value={c.emojis} onChange={e => { const n = [...cards]; n[idx].emojis = e.target.value; setCards(n); }} placeholder="🚀✨" className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-2xl text-center outline-none focus:border-sky-500 h-full"/>
                                    </div>
                                    
                                    {/* INGLÉS Y ESPAÑOL */}
                                    <div className="md:col-span-10 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-sky-400 uppercase mb-1 pl-1">Inglés (Frontal)</label>
                                            <input value={c.wordEn} onChange={e => { const n = [...cards]; n[idx].wordEn = e.target.value; setCards(n); }} placeholder="Word or phrase..." className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-base font-bold text-white focus:border-sky-500 outline-none"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-amber-400 uppercase mb-1 pl-1">Español (Trasera)</label>
                                            <input value={c.wordEs} onChange={e => { const n = [...cards]; n[idx].wordEs = e.target.value; setCards(n); }} placeholder="Traducción..." className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-base font-bold text-white focus:border-amber-500 outline-none"/>
                                        </div>
                                        <div className="sm:col-span-2">
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase mb-1 pl-1">Oración de Ejemplo (Inglés)</label>
                                            <input value={c.exampleEn} onChange={e => { const n = [...cards]; n[idx].exampleEn = e.target.value; setCards(n); }} placeholder="Ej: I usually run in the mornings." className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm text-zinc-300 focus:border-sky-500 outline-none italic"/>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="mt-8">
                        <button onClick={addRow} className="w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-bold flex items-center justify-center gap-2 hover:bg-zinc-900 hover:text-sky-500 hover:border-sky-900 transition-colors">
                            <Plus/> Añadir Tarjeta Manualmente
                        </button>
                    </div>

                    {/* MODAL DE OMNI-PROMPT */}
                    {magiaModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-sky-500/20 p-2 rounded-xl text-sky-500"><Sparkles size={24}/></div>
                                        <div><h3 className="font-black text-xl text-white">IA Assistant</h3><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Generador Omni-Prompt</p></div>
                                    </div>
                                    <button onClick={() => setMagiaModal(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                                    <div className="bg-black/30 p-4 rounded-xl border border-zinc-800/50 flex flex-col sm:flex-row gap-2 items-center">
                                        <div className="w-full flex items-center gap-2 bg-zinc-900 p-1.5 rounded-xl border border-zinc-700">
                                            <Key size={14} className="text-zinc-500 ml-2 shrink-0"/>
                                            <input type="password" placeholder="Tu API Key real..." value={apiKey} onChange={handleApiKeyChange} className="bg-transparent text-white px-2 py-1 text-xs font-mono w-full focus:outline-none"/>
                                            <button onClick={fetchModels} disabled={isLoadingModels || !apiKey} className="p-2 bg-sky-500 hover:bg-sky-400 text-black rounded-lg transition-colors shrink-0" title="Escanear Modelos">
                                                {isLoadingModels ? <Loader2 className="animate-spin" size={16}/> : <Search size={16}/>}
                                            </button>
                                        </div>
                                        {availableModels.length > 0 && (
                                            <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2.5 text-xs text-white w-full sm:w-auto outline-none">
                                                {availableModels.map(m => <option key={m} value={m}>{m.replace('models/', '')}</option>)}
                                            </select>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-sky-400 uppercase tracking-widest mb-3">Instrucción Libre (Omni-Prompt)</label>
                                        <p className="text-xs text-zinc-400 mb-3 leading-relaxed">Pídele un tema, pégale una lista de palabras para que las traduzca, o pégale un texto largo y pídele que extraiga el vocabulario clave.</p>
                                        <textarea 
                                            value={omniPrompt} 
                                            onChange={e => setOmniPrompt(e.target.value)} 
                                            placeholder="Ej: Extrae 15 verbos de acción de este texto y crea tarjetas con ellos: [pegar texto]..."
                                            className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm text-white focus:border-sky-500 outline-none h-40 resize-none shadow-inner"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">Cantidad de Tarjetas a Generar</label>
                                        <input type="range" min="5" max="60" step="1" value={targetCount} onChange={e => setTargetCount(parseInt(e.target.value))} className="w-full accent-sky-500"/>
                                        <div className="text-center font-black text-sky-500 mt-2">{targetCount} Tarjetas</div>
                                    </div>
                                </div>

                                <div className="p-6 border-t border-zinc-800 bg-zinc-950 shrink-0">
                                    <button onClick={executeMagia} className="w-full bg-sky-500 hover:bg-sky-400 text-black py-4 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-colors shadow-lg shadow-sky-500/20"><Sparkles size={20}/> Procesar Petición</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE TAXONOMÍA */}
                    {showTaxonomy && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden flex flex-col">
                                <div className="p-6 border-b border-zinc-800 bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3 mb-2">
                                        <div className="bg-amber-500/20 p-2 rounded-xl text-amber-500"><Settings2 size={24}/></div>
                                        <h3 className="font-black text-xl text-white">Clasificación</h3>
                                    </div>
                                    <p className="text-xs text-zinc-400">Asigna este mazo a un nivel, categoría y tema de estudio</p>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar space-y-4">
                                    {/* NIVEL */}
                                    <div>
                                        <label className="block text-xs font-bold text-amber-400 uppercase tracking-widest mb-2">Nivel *</label>
                                        <select 
                                            value={taxonomy.level}
                                            onChange={(e) => {
                                                setTaxonomy({...taxonomy, level: e.target.value, category: '', topic: ''});
                                                setTaxonomyErrors({});
                                            }}
                                            className={`w-full px-4 py-2 bg-zinc-950 border rounded-lg text-white focus:outline-none transition-colors ${
                                                taxonomyErrors.level ? 'border-rose-500 focus:border-rose-500' : 'border-zinc-800 focus:border-sky-500'
                                            }`}
                                        >
                                            {Object.entries(TAXONOMY).map(([key, val]) => (
                                                <option key={key} value={key}>{val.label}</option>
                                            ))}
                                        </select>
                                        {taxonomyErrors.level && <p className="text-xs text-rose-500 mt-1">{taxonomyErrors.level}</p>}
                                    </div>

                                    {/* CATEGORÍA */}
                                    <div>
                                        <label className="block text-xs font-bold text-sky-400 uppercase tracking-widest mb-2">Categoría *</label>
                                        <select 
                                            value={taxonomy.category}
                                            onChange={(e) => {
                                                setTaxonomy({...taxonomy, category: e.target.value, topic: ''});
                                                setTaxonomyErrors(prev => {delete prev.category; return prev;});
                                            }}
                                            className={`w-full px-4 py-2 bg-zinc-950 border rounded-lg text-white focus:outline-none transition-colors ${
                                                taxonomyErrors.category ? 'border-rose-500 focus:border-rose-500' : 'border-zinc-800 focus:border-sky-500'
                                            }`}
                                        >
                                            <option value="">Selecciona una categoría</option>
                                            {Object.entries(categories).map(([key, cat]) => (
                                                <option key={key} value={key}>{cat.label}</option>
                                            ))}
                                        </select>
                                        {taxonomyErrors.category && <p className="text-xs text-rose-500 mt-1">{taxonomyErrors.category}</p>}
                                    </div>

                                    {/* TEMA */}
                                    <div>
                                        <label className="block text-xs font-bold text-emerald-400 uppercase tracking-widest mb-2">Tema *</label>
                                        <select 
                                            value={taxonomy.topic}
                                            onChange={(e) => {
                                                setTaxonomy({...taxonomy, topic: e.target.value});
                                                setTaxonomyErrors(prev => {delete prev.topic; return prev;});
                                            }}
                                            disabled={!taxonomy.category}
                                            className={`w-full px-4 py-2 bg-zinc-950 border rounded-lg text-white focus:outline-none transition-colors ${
                                                taxonomyErrors.topic ? 'border-rose-500 focus:border-rose-500' : 'border-zinc-800 focus:border-sky-500'
                                            } ${!taxonomy.category ? 'opacity-50 cursor-not-allowed' : ''}`}
                                        >
                                            <option value="">Selecciona un tema</option>
                                            {Object.entries(topics).map(([key, label]) => (
                                                <option key={key} value={key}>{label}</option>
                                            ))}
                                        </select>
                                        {taxonomyErrors.topic && <p className="text-xs text-rose-500 mt-1">{taxonomyErrors.topic}</p>}
                                    </div>

                                    {/* PREVIEW */}
                                    {taxonomy.level && taxonomy.category && taxonomy.topic && (
                                        <div className="bg-emerald-950/30 border border-emerald-500/30 rounded-lg p-3 flex items-start gap-2 mt-4">
                                            <CheckCircle2 size={16} className="text-emerald-500 flex-shrink-0 mt-0.5" />
                                            <div className="text-xs text-emerald-300">
                                                <p className="font-bold">Clasificación completada:</p>
                                                <p className="mt-1">{TAXONOMY[taxonomy.level].label} → {categories[taxonomy.category]?.label} → {topics[taxonomy.topic]}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="p-6 border-t border-zinc-800 bg-zinc-950 shrink-0 flex gap-3">
                                    <button 
                                        onClick={() => setShowTaxonomy(false)}
                                        className="flex-1 py-3 bg-zinc-900 text-zinc-300 rounded-lg font-bold hover:bg-zinc-800 transition-colors"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (validateTaxonomy()) {
                                                setShowTaxonomy(false);
                                                save();
                                            }
                                        }}
                                        className="flex-1 py-3 bg-sky-500 text-black rounded-lg font-bold hover:bg-sky-400 transition-colors"
                                    >
                                        Guardar Mazo
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<FCBuilder />);
    </script>
</body>
</html>

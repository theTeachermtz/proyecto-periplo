<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { BookOpen, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Image as ImageIcon, Trash2, Plus, Settings2, GripVertical, CheckCircle2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const Dashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [title, setTitle] = useState("");
            const [topic, setTopic] = useState("");
            const [genre, setGenre] = useState("STORY");
            const [lang, setLang] = useState("ENGLISH");
            const [targetWords, setTargetWords] = useState("");

            const [stories, setStories] = useState([]);
            const [editingStoryIdx, setEditingStoryIdx] = useState(-1);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setGenre(data.genre || 'STORY');
                            setEditingId(editId);
                            if (data.stories) setStories(data.stories);
                            else if (data.content) setStories([{...data.content, title: data.title}]); 
                        }
                    });
                }
            }, []);

            const generateStoryWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!topic) { alert("Escribe un tema primero."); return; }

                setIsGenerating(true);
                try {
                    let specificRules = "";
                    if (genre === 'REDDIT') {
                        specificRules = "Utiliza el formato clásico de un post de Reddit (ej. r/AmItheAsshole). Permite el uso de slang nativo y expresiones coloquiales comunes en internet.";
                    } else if (genre === 'BIOGRAPHY') {
                        specificRules = "Redacta una biografía CORTA y al grano, entre 150 y 200 palabras como máximo. Utiliza un nivel de vocabulario B1/B2 accesible.";
                    } else if (genre === 'TRIPADVISOR') {
                        specificRules = "Redacta como un folleto turístico o guía de viajes informando al visitante ('Visit X city!'). Destaca lugares qué ver y actividades qué hacer. NO lo escribas como una anécdota o experiencia personal. Utiliza vocabulario B1/B2 accesible.";
                    } else {
                        specificRules = "Utiliza un nivel de vocabulario B1/B2 accesible. Evita palabras excesivamente rebuscadas o raras para que los estudiantes de idiomas puedan leerlo con fluidez.";
                    }

                    const prompt = `Crea un texto de nivel intermedio para estudiantes. 
                    Idioma: ${lang}. 
                    Formato/Género: ${genre}. 
                    Tema: ${topic}. 
                    Palabras clave que deben incluirse (si hay): ${targetWords}.

                    REGLAS IMPORTANTES:
                    ${specificRules}
                    
                    INSTRUCCIONES ESTRUCTURALES:
                    1. 'title': Un título creativo.
                    2. 'text': El cuerpo del texto. (Asegúrate de separar bien en párrafos).
                    3. 'fun_fact': Un dato curioso o de cultura general relacionado al texto (puede tener de 2 a 3 oraciones, no seas tan breve).
                    4. 'blanks': Un array de números enteros que representan los índices de las palabras en el texto que se ocultarán para el ejercicio de drag and drop. Escoge unas 10 a 15 palabras clave importantes.
                    5. 'questions': Genera de 2 a 4 preguntas de comprensión lectora. Para cada pregunta, indica el 'paragraph_index' (0, 1, 2...) donde se encuentra la respuesta.

                    Responde ÚNICAMENTE con un JSON válido usando esta estructura exacta:
                    {
                        "title": "...",
                        "text": "...",
                        "fun_fact": "...",
                        "image_url": "",
                        "blanks": [5, 12, 25...],
                        "questions": [
                            {"q": "Pregunta 1?", "a": "Respuesta corta", "paragraph_index": 0}
                        ]
                    }`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(resultText);

                    setStories([...stories, parsedData]);
                    if (!title) setTitle(topic); 
                } catch (error) {
                    alert("Error con la IA. Intenta reformular el tema o revisa tu conexión.");
                    console.error(error);
                } finally {
                    setIsGenerating(false);
                }
            };

            const removeStory = (idx) => {
                if (confirm("¿Eliminar esta lectura?")) {
                    const ns = [...stories];
                    ns.splice(idx, 1);
                    setStories(ns);
                }
            };

            const updateStory = (field, value) => {
                const ns = [...stories];
                ns[editingStoryIdx][field] = value;
                setStories(ns);
            };

            const saveToFirebase = async () => {
                if (!title) return alert("El título general de la colección es obligatorio.");
                if (stories.length === 0) return alert("Genera al menos una lectura.");
                
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { 
                            title: title, genre: genre, stories: stories, updatedAt: serverTimestamp() 
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), { 
                            title: title, type: 'READING', genre: genre, stories: stories, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { alert("Error guardando: " + e.message); }
                finally { setIsSaving(false); }
            };

            const renderInteractiveBlankSelector = () => {
                const currentStory = stories[editingStoryIdx];
                if (!currentStory || !currentStory.text) return null;
                
                const regex = /([a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s]+|\s+)/g;
                const parts = currentStory.text.match(regex) || [];
                
                const toggleBlank = (idx, isWord) => {
                    if (!isWord) return; // NO DEJA SELECCIONAR COMAS
                    const ns = [...stories];
                    const blanks = ns[editingStoryIdx].blanks || [];
                    if (blanks.includes(idx)) {
                        ns[editingStoryIdx].blanks = blanks.filter(b => b !== idx);
                    } else {
                        ns[editingStoryIdx].blanks = [...blanks, idx];
                    }
                    setStories(ns);
                };

                return (
                    <div className="mb-8">
                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                            <span>Selector de Palabras (Word Bank)</span>
                            <span className="text-indigo-500 font-black bg-indigo-100 dark:bg-indigo-900/50 px-2 py-1 rounded-md">{currentStory.blanks?.length || 0} seleccionadas</span>
                        </label>
                        <p className="text-xs text-slate-500 mb-3">Haz clic en las palabras del texto para ocultarlas y convertirlas en los huecos que los alumnos arrastrarán.</p>
                        <div className="p-4 md:p-6 bg-slate-100 dark:bg-zinc-950 rounded-2xl leading-loose text-base md:text-lg font-medium border border-slate-200 dark:border-zinc-800 shadow-inner h-64 overflow-y-auto custom-scrollbar">
                            {parts.map((part, index) => {
                                const isWord = /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(part);
                                const isBlank = (currentStory.blanks || []).includes(index);
                                
                                if (!isWord) return <span key={index}>{part.match(/\n/) ? <br/> : part}</span>;
                                
                                return (
                                    <span 
                                        key={index} 
                                        onClick={() => toggleBlank(index, isWord)}
                                        className={`cursor-pointer px-1 rounded transition-all select-none ${isBlank ? 'bg-indigo-500 text-white font-bold shadow-md transform scale-105 inline-block mx-0.5' : 'hover:bg-indigo-200 dark:hover:bg-indigo-900 text-slate-700 dark:text-zinc-300 mx-0.5'}`}
                                    >
                                        {part}
                                    </span>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100">
                    <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-sm z-10 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl transition"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><BookOpen/> Reading Builder</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-slate-400 hover:text-indigo-500 transition"><KeyRound size={20}/></button>
                            <button onClick={saveToFirebase} disabled={isSaving || stories.length === 0} className="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 text-white px-6 py-2 rounded-xl font-bold flex gap-2 shadow-lg transition-transform active:scale-95">
                                {isSaving ? <Loader2 className="animate-spin"/> : <Save/>} Guardar Actividad
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-hidden flex flex-col lg:flex-row">
                        
                        {/* PANEL IZQUIERDO: IA GENERADOR */}
                        <div className="w-full lg:w-1/3 bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 p-6 flex flex-col overflow-y-auto custom-scrollbar">
                            <h2 className="font-black text-lg mb-6 flex items-center gap-2"><Sparkles className="text-amber-500"/> Asistente IA</h2>
                            
                            {showApiInput && (
                                <div className="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-xl mb-6 flex gap-3 items-center border border-indigo-200 dark:border-indigo-800">
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="Tu API Key de Gemini..." className="flex-1 bg-white dark:bg-zinc-950 p-2 rounded outline-none text-sm"/>
                                </div>
                            )}

                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Tema General / Prompt</label>
                                    <textarea value={topic} onChange={e => setTopic(e.target.value)} placeholder="Ej: La historia de cómo Steve Jobs robó el mouse..." className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 focus:border-indigo-500 h-24 resize-none"></textarea>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Género</label>
                                        <select value={genre} onChange={e => setGenre(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold">
                                            <option value="STORY">Historia / Cuento</option>
                                            <option value="ARTICLE">Artículo / Noticia</option>
                                            <option value="EMAIL">Email / Carta</option>
                                            <option value="REDDIT">Reddit (AmIOverreacting)</option>
                                            <option value="BIOGRAPHY">Biografía Corta</option>
                                            <option value="TRIPADVISOR">TripAdvisor (Guía Turismo)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Idioma</label>
                                        <select value={lang} onChange={e => setLang(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold">
                                            <option value="ENGLISH">Inglés</option>
                                            <option value="SPANISH">Español</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Palabras Clave (Opcional)</label>
                                    <input value={targetWords} onChange={e => setTargetWords(e.target.value)} placeholder="Ej: apple, thief, invention..." className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800"/>
                                </div>

                                <button onClick={generateStoryWithAI} disabled={isGenerating} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 mt-4">
                                    {isGenerating ? <Loader2 className="animate-spin"/> : <Plus/>} Añadir Lectura al Módulo
                                </button>
                            </div>

                            <div className="mt-8 pt-6 border-t border-slate-200 dark:border-zinc-800">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Lecturas en este Módulo ({stories.length})</label>
                                <div className="space-y-2">
                                    {stories.map((s, i) => (
                                        <div key={i} onClick={() => setEditingStoryIdx(i)} className={`p-3 rounded-xl flex items-center justify-between cursor-pointer border transition-colors ${editingStoryIdx === i ? 'bg-indigo-50 border-indigo-200 dark:bg-indigo-900/30 dark:border-indigo-700' : 'bg-slate-50 border-slate-200 dark:bg-zinc-800/50 dark:border-zinc-700/50 hover:border-slate-300 dark:hover:border-zinc-600'}`}>
                                            <span className="font-bold text-sm truncate pr-4">{i+1}. {s.title}</span>
                                            <div className="flex gap-1 shrink-0">
                                                <button onClick={(e) => { e.stopPropagation(); removeStory(i); if(editingStoryIdx === i) setEditingStoryIdx(-1); }} className="text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-900/30 p-1.5 rounded-lg transition-colors"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {stories.length === 0 && <p className="text-sm text-slate-400 italic">No hay lecturas aún.</p>}
                                </div>
                            </div>
                        </div>

                        {/* PANEL DERECHO: EDITOR DE LA LECTURA SELECCIONADA */}
                        <div className="flex-1 bg-slate-50 dark:bg-zinc-950 p-6 md:p-10 overflow-y-auto custom-scrollbar">
                            <input value={title} onChange={e => setTitle(e.target.value)} className="text-3xl md:text-5xl font-black w-full border-b-4 border-slate-200 dark:border-zinc-800 pb-2 mb-8 bg-transparent outline-none focus:border-indigo-500" placeholder="Nombre de la Colección..."/>

                            {editingStoryIdx !== -1 && stories[editingStoryIdx] ? (
                                <div className="max-w-4xl mx-auto bg-white dark:bg-zinc-900 rounded-[2rem] shadow-xl p-8 border border-slate-100 dark:border-zinc-800 animate-in fade-in">
                                    <div className="mb-6">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Título de la Lectura</label>
                                        <input value={stories[editingStoryIdx].title} onChange={e => updateStory('title', e.target.value)} className="text-2xl font-black w-full bg-transparent outline-none border-b border-transparent focus:border-indigo-500 pb-1"/>
                                    </div>
                                    
                                    <div className="mb-6">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Imagen Decorativa (URL)</label>
                                        <div className="flex gap-2 items-center">
                                            <ImageIcon className="text-slate-400"/>
                                            <input value={stories[editingStoryIdx].image_url || ''} onChange={e => updateStory('image_url', e.target.value)} placeholder="https://..." className="flex-1 bg-slate-50 dark:bg-zinc-950 p-2 rounded-lg outline-none border border-slate-200 dark:border-zinc-800 focus:border-indigo-500 text-sm"/>
                                        </div>
                                    </div>

                                    <div className="mb-8">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Cuerpo del Texto</label>
                                        <textarea value={stories[editingStoryIdx].text} onChange={e => updateStory('text', e.target.value)} className="w-full h-48 bg-slate-50 dark:bg-zinc-950 p-4 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 focus:border-indigo-500 resize-y leading-relaxed font-medium"></textarea>
                                    </div>

                                    {renderInteractiveBlankSelector()}

                                    {/* DID YOU KNOW AHORA ES TEXTAREA */}
                                    <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-400 rounded-r-xl">
                                        <label className="text-xs font-bold text-amber-600 dark:text-amber-500 uppercase tracking-widest mb-1 block">Did You Know? (Fun Fact)</label>
                                        <textarea value={stories[editingStoryIdx].fun_fact} onChange={e => updateStory('fun_fact', e.target.value)} className="w-full bg-transparent outline-none font-medium resize-y min-h-[60px] custom-scrollbar"></textarea>
                                    </div>

                                    <div className="mb-8">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex justify-between items-center">
                                            <span>Preguntas de Comprensión ({stories[editingStoryIdx].questions.length})</span>
                                            <button onClick={() => {
                                                const ns = [...stories];
                                                ns[editingStoryIdx].questions.push({q: 'Nueva pregunta...', a: 'Respuesta...', paragraph_index: 0});
                                                setStories(ns);
                                            }} className="bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg flex items-center gap-1 hover:bg-indigo-200 transition-colors"><Plus size={14}/> Añadir</button>
                                        </label>
                                        <div className="space-y-4">
                                            {stories[editingStoryIdx].questions.map((q, qIdx) => (
                                                <div key={qIdx} className="bg-slate-50 dark:bg-zinc-950 p-4 rounded-xl border border-slate-200 dark:border-zinc-800 relative">
                                                    <button onClick={() => {
                                                        const ns = [...stories];
                                                        ns[editingStoryIdx].questions.splice(qIdx, 1);
                                                        setStories(ns);
                                                    }} className="absolute top-4 right-4 text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-900/30 p-1 rounded-md"><Trash2 size={14}/></button>
                                                    
                                                    <input value={q.q} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].q = e.target.value; setStories(ns); }} placeholder="Pregunta..." className="w-11/12 bg-transparent font-bold outline-none mb-2"/>
                                                    <input value={q.a} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].a = e.target.value; setStories(ns); }} placeholder="Respuesta corta clave..." className="w-full bg-white dark:bg-zinc-900 p-2 rounded outline-none border border-slate-200 dark:border-zinc-800 text-sm mb-2"/>
                                                    <div className="flex items-center gap-2 text-xs text-slate-500 font-bold">
                                                        <span>Párrafo donde está la respuesta:</span>
                                                        <input type="number" min="0" value={q.paragraph_index || 0} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].paragraph_index = parseInt(e.target.value); setStories(ns); }} className="w-16 bg-white dark:bg-zinc-900 p-1 rounded border border-slate-200 dark:border-zinc-800 text-center"/>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 dark:border-zinc-800 rounded-3xl">
                                    <BookOpen size={48} className="mb-4 opacity-50"/>
                                    <p className="font-bold text-lg">Selecciona o genera una lectura</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

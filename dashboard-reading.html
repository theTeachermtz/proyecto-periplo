<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { BookOpen, Save, ArrowLeft, Loader2, KeyRound, Sparkles, Image as ImageIcon, Trash2, Plus, Settings2, GripVertical, CheckCircle2, Tags, X, RefreshCw } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // TAXONOMÍA MAESTRA
        // ============================================================
        const TAXONOMY={
            basic:{
                grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)"],
                verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival"],
                nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway"],
                adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste"],
                key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs"]
            },
            advanced:{
                grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention"],
                verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound"],
                nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science"],
                adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives"],
                key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice"]
            },
            pro:{
                grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals"],
                verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations"],
                nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic"],
                adjectives:["Formal Register Adj.","Nuance & Tone Adj."],
                key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives"]
            }
        };

        const Dashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingQuestions, setIsGeneratingQuestions] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [title, setTitle] = useState("");
            const [topic, setTopic] = useState("");
            const [genre, setGenre] = useState("ARTICLE");
            const [lang, setLang] = useState("ENGLISH");
            const [aiLevel, setAiLevel] = useState("advanced"); 
            const [targetWords, setTargetWords] = useState("");

            const [stories, setStories] = useState([]);
            const [editingStoryIdx, setEditingStoryIdx] = useState(-1);

            // TAXONOMY MODAL STATE
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevel, setSaveLevel] = useState('basic');
            const [saveCat, setSaveCat] = useState('grammar');
            const [saveTopic, setSaveTopic] = useState(TAXONOMY['basic']['grammar'][0]);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setGenre(data.genre || 'ARTICLE');
                            setEditingId(editId);
                            if (data.stories) setStories(data.stories);
                            else if (data.content) setStories([{...data.content, title: data.title}]); 
                            
                            if (data.tags) {
                                setSaveLevel(data.tags.level || 'basic');
                                setSaveCat(data.tags.category || 'grammar');
                                setSaveTopic(data.tags.topic || TAXONOMY['basic']['grammar'][0]);
                                setAiLevel(data.tags.level || 'advanced');
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[saveLevel] && TAXONOMY[saveLevel][saveCat]) {
                    setSaveTopic(TAXONOMY[saveLevel][saveCat][0] || 'mixed');
                }
            }, [saveLevel, saveCat]);

            // UTILIDAD PARA CONTAR PALABRAS
            const getWordCount = (text) => {
                if (!text) return 0;
                return text.trim().split(/\s+/).filter(word => word.length > 0).length;
            };

            const generateStoryWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                if (!topic) { alert("Escribe un tema primero."); return; }

                setIsGenerating(true);
                try {
                    const teacherPreferences = "IMPORTANTE: Escribe con un tono moderno y enganchante. PROHIBIDO usar lenguaje barroco, anticuado o poético innecesario. Usa vocabulario útil para la vida real y conversacional.";

                    let levelRules = "";
                    if (aiLevel === 'basic') {
                        levelRules = "NIVEL BÁSICO (A1/A2): Utiliza estructuras gramaticales muy básicas y vocabulario de uso diario. Oraciones cortas y directas. Evita phrasal verbs complejos.";
                    } else if (aiLevel === 'advanced') {
                        levelRules = "NIVEL AVANZADO (B2/C1): Lenguaje natural y fluido. Usa conectores lógicos, vocabulario rico y descriptivo, pero sin sonar como un libro de texto antiguo. Ideal para estudiantes que quieren sonar fluidos.";
                    } else if (aiLevel === 'pro') {
                        levelRules = "NIVEL PRO (C2): Usa phrasal verbs avanzados, modismos (idioms), jerga actual y expresiones complejas. PROHIBIDO usar palabras arcaicas (ej. alas, hitherto, epistemic). Tiene que sonar como un experto moderno hablando.";
                    }

                    let specificRules = "";
                    if (genre === 'REDDIT') {
                        specificRules = "Utiliza el formato clásico de un post de Reddit (ej. r/AmItheAsshole). Permite el uso de jerga de internet y un tono muy informal y personal.";
                    } else if (genre === 'BIOGRAPHY') {
                        specificRules = "Redacta una biografía con una extensión estricta de entre 190 y 240 palabras. Sigue una estructura clásica pero interesante, contando una historia, no solo fechas.";
                    } else if (genre === 'BIOGRAPHY_SHORT') {
                        specificRules = "Redacta una biografía MUY BREVE, de estrictamente alrededor de 100 palabras. Ve directo a los puntos clave de su vida y legado sin rodeos.";
                    } else if (genre === 'TRIPADVISOR') {
                        specificRules = "Redacta como una guía de viajes o reseña turística ('Visit X place!'). Destaca lugares, actividades y usa mucho vocabulario descriptivo de turismo, comida y clima.";
                    } else if (genre === 'ARTICLE') {
                        specificRules = "Redacta como un artículo o noticia de una revista moderna o blog (ej. Wired, The Atlantic). Analiza el tema de forma interesante, ideal para generar debate o análisis posterior en clase. EXTENSIÓN ESTRICTA: entre 380 y 420 palabras.";
                    } else if (genre === 'ARTICLE_INFORMAL') {
                        specificRules = "Redacta como un post de blog muy informal, estilo 'de compas' o revista juvenil. Usa un tono muy conversacional, directo y relajado. EXTENSIÓN ESTRICTA: entre 380 y 420 palabras.";
                    } else if (genre === 'DIALOGUE_QA') {
                        specificRules = "Escribe el texto con formato de diálogo de preguntas y respuestas (Q/A) entre dos personas (ej. Entrevista o podcast). Indica claramente los nombres de los hablantes.";
                    } else {
                        specificRules = "Asegúrate de que la narrativa fluya bien y tenga sentido de principio a fin.";
                    }

                    const prompt = `Crea un texto educativo de comprensión lectora. 
                    Idioma: ${lang}. 
                    Formato/Género: ${genre}. 
                    Tema: ${topic}. 
                    Palabras clave que deben incluirse (si hay): ${targetWords}.

                    ${teacherPreferences}

                    ${levelRules}

                    REGLAS DE GÉNERO Y EXTENSIÓN:
                    ${specificRules}
                    
                    INSTRUCCIONES ESTRUCTURALES:
                    1. 'title': Un título creativo.
                    2. 'text': El cuerpo del texto. Asegúrate de separar bien en párrafos o líneas. DENTRO de este texto, envuelve entre corchetes [ ] unas 10 a 15 palabras o frases clave que el alumno deberá adivinar. Puedes usar frases completas o phrasal verbs (Ejemplo: "He had to [wake up] early").
                    3. 'fun_fact': Un dato curioso o de cultura general relacionado al texto (2-3 oraciones).
                    4. 'questions': Genera de 2 a 4 preguntas de comprensión lectora. Para cada pregunta, indica el 'paragraph_index' (0, 1, 2...) donde se encuentra la respuesta.

                    Responde ÚNICAMENTE con un JSON válido usando esta estructura exacta:
                    {
                        "title": "...",
                        "text": "Texto con los [huecos] integrados directamente aquí...",
                        "fun_fact": "...",
                        "image_url": "",
                        "questions": [
                            {"q": "Pregunta 1?", "a": "Respuesta corta", "paragraph_index": 0}
                        ]
                    }`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(resultText);

                    parsedData.blanks = []; 

                    setStories([...stories, parsedData]);
                    if (!title) setTitle(topic); 
                } catch (error) {
                    alert("Error con la IA. Intenta reformular el tema o revisa tu conexión.");
                    console.error(error);
                } finally {
                    setIsGenerating(false);
                }
            };

            const generateQuestionsOnlyWithAI = async () => {
                if (!apiKey) { alert("Necesitas tu API Key de Gemini."); setShowApiInput(true); return; }
                const currentText = stories[editingStoryIdx].text;
                if (!currentText || currentText.trim() === '') { alert("No hay texto base en la caja de edición para generar preguntas."); return; }

                setIsGeneratingQuestions(true);
                try {
                    const prompt = `Aquí tienes un texto:
                    "${currentText}"

                    REGLA ESTRICTA: Escribe las preguntas y las respuestas EXACTAMENTE en el mismo idioma en el que está escrito el texto de arriba. Si el texto está en inglés, TODO tu output debe estar en inglés. Si está en español, todo en español. No traduzcas nada.

                    Basándote ÚNICAMENTE en este texto, genera 4 preguntas de comprensión lectora.
                    Asegúrate de que las respuestas sean concisas y señala en qué índice de párrafo (0, 1, 2, etc.) se encuentra la información.
                    
                    Responde ÚNICAMENTE con un JSON válido usando esta estructura exacta:
                    [
                        {"q": "Pregunta 1?", "a": "Respuesta corta", "paragraph_index": 0},
                        {"q": "Pregunta 2?", "a": "Respuesta corta", "paragraph_index": 1}
                    ]`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedQuestions = JSON.parse(resultText);

                    const ns = [...stories];
                    ns[editingStoryIdx].questions = parsedQuestions;
                    setStories(ns);

                } catch (error) {
                    alert("Error generando preguntas. Revisa la consola.");
                    console.error(error);
                } finally {
                    setIsGeneratingQuestions(false);
                }
            };

            const removeStory = (idx) => {
                if (confirm("¿Eliminar esta lectura?")) {
                    const ns = [...stories];
                    ns.splice(idx, 1);
                    setStories(ns);
                }
            };

            const updateStory = (field, value) => {
                const ns = [...stories];
                ns[editingStoryIdx][field] = value;
                setStories(ns);
            };

            const handlePreSave = () => {
                if (!title) return alert("El título general de la colección es obligatorio.");
                if (stories.length === 0) return alert("Genera al menos una lectura.");
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    const tags = {
                        level: saveLevel,
                        category: saveCat,
                        topic: saveTopic
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { 
                            title: title, genre: genre, stories: stories, tags: tags, updatedAt: serverTimestamp() 
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), { 
                            title: title, type: 'READING', genre: genre, stories: stories, tags: tags, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { alert("Error guardando: " + e.message); }
                finally { setIsSaving(false); }
            };

            const renderInteractiveBlankSelector = () => {
                const currentStory = stories[editingStoryIdx];
                if (!currentStory || !currentStory.text) return null;
                
                const regex = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s\[\]]+|\s+)/g;
                const parts = currentStory.text.match(regex) || [];
                const legacyBlanks = currentStory.blanks || [];
                
                const tokens = parts.map((part, index) => {
                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                    let cleanText = isBracketed ? part.slice(1, -1) : part;
                    let isWord = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(cleanText);
                    let isHidden = (isBracketed || legacyBlanks.includes(index)) && isWord;
                    return { id: index, text: cleanText, original: part, isWord, isHidden, isBracketed };
                });

                const toggleBlank = (idx, token) => {
                    if (!token.isWord) return; 
                    
                    const ns = [...stories];
                    let currentTokens = [...tokens];
                    
                    if (token.isHidden) {
                        currentTokens[idx].original = token.text;
                    } else {
                        currentTokens[idx].original = `[${token.text}]`;
                    }
                    
                    ns[editingStoryIdx].text = currentTokens.map(t => t.original).join('');
                    ns[editingStoryIdx].blanks = [];
                    setStories(ns);
                };

                const activeCount = tokens.filter(t => t.isHidden).length;

                return (
                    <div className="mb-8">
                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                            <span>Selector de Palabras (Word Bank)</span>
                            <span className="text-indigo-500 font-black bg-indigo-100 dark:bg-indigo-900/50 px-2 py-1 rounded-md">{activeCount} seleccionadas</span>
                        </label>
                        <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                            Haz clic en las palabras para ocultarlas. Si quieres agrupar frases completas (ej. <strong>phrasal verbs</strong> como <em>wake up</em>), escríbelas entre corchetes <strong>[wake up]</strong> directamente en la caja de texto arriba.
                        </p>
                        <div className="p-4 md:p-6 bg-slate-100 dark:bg-zinc-950 rounded-2xl leading-loose text-base md:text-lg font-medium border border-slate-200 dark:border-zinc-800 shadow-inner h-64 overflow-y-auto custom-scrollbar">
                            {tokens.map((token, index) => {
                                if (!token.isWord) return <span key={index}>{token.original.match(/\n/) ? <br/> : token.original}</span>;
                                
                                return (
                                    <span 
                                        key={index} 
                                        onClick={() => toggleBlank(index, token)}
                                        className={`cursor-pointer px-1 rounded transition-all select-none ${token.isHidden ? 'bg-indigo-500 text-white font-bold shadow-md transform scale-105 inline-block mx-0.5' : 'hover:bg-indigo-200 dark:hover:bg-indigo-900 text-slate-700 dark:text-zinc-300 mx-0.5'}`}
                                    >
                                        {token.text}
                                    </span>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 relative">
                    
                    {/* TAXONOMY SAVE MODAL */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-black flex items-center gap-2 text-white"><Tags className="text-indigo-400"/> Clasificar Lectura</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">1. Nivel</label>
                                        <select value={saveLevel} onChange={e=>{setSaveLevel(e.target.value);const cats=Object.keys(TAXONOMY[e.target.value]||{});setSaveCat(cats[0]||'grammar');}}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer">
                                            {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">2. Categoría</label>
                                        <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer capitalize">
                                            {Object.keys(TAXONOMY[saveLevel]||{}).map(c=><option key={c} value={c}>{c.replace('_',' ')}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">3. Tema Específico</label>
                                        <select value={saveTopic} onChange={e=>setSaveTopic(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer">
                                            {(TAXONOMY[saveLevel]?.[saveCat]||[]).map(t=><option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <button onClick={executeFinalSave} disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:bg-zinc-800 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} Confirmar y Guardar
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-sm z-10 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl transition"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><BookOpen/> Reading Builder</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-slate-400 hover:text-indigo-500 transition"><KeyRound size={20}/></button>
                            <button onClick={handlePreSave} disabled={isSaving || stories.length === 0} className="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 text-white px-6 py-2 rounded-xl font-bold flex gap-2 shadow-lg transition-transform active:scale-95">
                                {isSaving ? <Loader2 className="animate-spin"/> : <Save/>} Guardar Actividad
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-hidden flex flex-col lg:flex-row">
                        
                        {/* PANEL IZQUIERDO: IA GENERADOR */}
                        <div className="w-full lg:w-1/3 bg-white dark:bg-zinc-900 border-r border-slate-200 dark:border-zinc-800 p-6 flex flex-col overflow-y-auto custom-scrollbar">
                            <h2 className="font-black text-lg mb-6 flex items-center gap-2"><Sparkles className="text-amber-500"/> Asistente IA</h2>
                            
                            {showApiInput && (
                                <div className="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-xl mb-6 flex gap-3 items-center border border-indigo-200 dark:border-indigo-800">
                                    <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="Tu API Key de Gemini..." className="flex-1 bg-white dark:bg-zinc-950 p-2 rounded outline-none text-sm"/>
                                </div>
                            )}

                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Tema General / Prompt</label>
                                    <textarea value={topic} onChange={e => setTopic(e.target.value)} placeholder="Ej: La historia de cómo Steve Jobs robó el mouse..." className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 focus:border-indigo-500 h-24 resize-none"></textarea>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Nivel de IA</label>
                                        <select value={aiLevel} onChange={e => setAiLevel(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold text-indigo-600 dark:text-indigo-400">
                                            <option value="basic">Básico</option>
                                            <option value="advanced">Avanzado (B2/C1)</option>
                                            <option value="pro">Pro (Slang / Idioms)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Idioma</label>
                                        <select value={lang} onChange={e => setLang(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold">
                                            <option value="ENGLISH">Inglés</option>
                                            <option value="SPANISH">Español</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Género Literario</label>
                                    <select value={genre} onChange={e => setGenre(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 font-bold">
                                        <option value="ARTICLE">Artículo Formal (Wired, The Atlantic)</option>
                                        <option value="ARTICLE_INFORMAL">Artículo Informal (Estilo Blog/De Compas)</option>
                                        <option value="BIOGRAPHY">Biografía Larga (~200 pal.)</option>
                                        <option value="BIOGRAPHY_SHORT">Biografía Corta (~100 pal.)</option>
                                        <option value="TRIPADVISOR">TripAdvisor / Turismo</option>
                                        <option value="STORY">Historia / Cuento</option>
                                        <option value="DIALOGUE_QA">Diálogo (Entrevista / Podcast)</option>
                                        <option value="EMAIL">Email / Carta</option>
                                        <option value="REDDIT">Reddit (r/AmIOverreacting)</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Palabras Clave (Opcional)</label>
                                    <input value={targetWords} onChange={e => setTargetWords(e.target.value)} placeholder="Ej: apple, thief, invention..." className="w-full bg-slate-50 dark:bg-zinc-950 p-3 rounded-xl outline-none border border-slate-200 dark:border-zinc-800"/>
                                </div>

                                <button onClick={generateStoryWithAI} disabled={isGenerating} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 mt-4">
                                    {isGenerating ? <Loader2 className="animate-spin"/> : <Plus/>} Añadir Lectura al Módulo
                                </button>
                            </div>

                            <div className="mt-8 pt-6 border-t border-slate-200 dark:border-zinc-800">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Lecturas en este Módulo ({stories.length})</label>
                                <div className="space-y-2">
                                    {stories.map((s, i) => (
                                        <div key={i} onClick={() => setEditingStoryIdx(i)} className={`p-3 rounded-xl flex items-center justify-between cursor-pointer border transition-colors ${editingStoryIdx === i ? 'bg-indigo-50 border-indigo-200 dark:bg-indigo-900/30 dark:border-indigo-700' : 'bg-slate-50 border-slate-200 dark:bg-zinc-800/50 dark:border-zinc-700/50 hover:border-slate-300 dark:hover:border-zinc-600'}`}>
                                            <span className="font-bold text-sm truncate pr-4">{i+1}. {s.title}</span>
                                            <div className="flex gap-1 shrink-0">
                                                <button onClick={(e) => { e.stopPropagation(); removeStory(i); if(editingStoryIdx === i) setEditingStoryIdx(-1); }} className="text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-900/30 p-1.5 rounded-lg transition-colors"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {stories.length === 0 && <p className="text-sm text-slate-400 italic">No hay lecturas aún.</p>}
                                </div>
                            </div>
                        </div>

                        {/* PANEL DERECHO: EDITOR DE LA LECTURA SELECCIONADA */}
                        <div className="flex-1 bg-slate-50 dark:bg-zinc-950 p-6 md:p-10 overflow-y-auto custom-scrollbar">
                            <input value={title} onChange={e => setTitle(e.target.value)} className="text-3xl md:text-5xl font-black w-full border-b-4 border-slate-200 dark:border-zinc-800 pb-2 mb-8 bg-transparent outline-none focus:border-indigo-500" placeholder="Nombre de la Colección..."/>

                            {editingStoryIdx !== -1 && stories[editingStoryIdx] ? (
                                <div className="max-w-4xl mx-auto bg-white dark:bg-zinc-900 rounded-[2rem] shadow-xl p-8 border border-slate-100 dark:border-zinc-800 animate-in fade-in">
                                    <div className="mb-6">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Título de la Lectura</label>
                                        <input value={stories[editingStoryIdx].title} onChange={e => updateStory('title', e.target.value)} className="text-2xl font-black w-full bg-transparent outline-none border-b border-transparent focus:border-indigo-500 pb-1"/>
                                    </div>
                                    
                                    <div className="mb-6">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 block">Imagen Decorativa (URL)</label>
                                        <div className="flex gap-2 items-center">
                                            <ImageIcon className="text-slate-400"/>
                                            <input 
                                                value={stories[editingStoryIdx].image_url || ''} 
                                                onChange={e => updateStory('image_url', e.target.value)} 
                                                onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('ring-2', 'ring-indigo-500'); }}
                                                onDragLeave={e => e.currentTarget.classList.remove('ring-2', 'ring-indigo-500')}
                                                onDrop={e => {
                                                    e.preventDefault();
                                                    e.currentTarget.classList.remove('ring-2', 'ring-indigo-500');
                                                    const html = e.dataTransfer.getData('text/html');
                                                    const text = e.dataTransfer.getData('text/plain');
                                                    let url = text;
                                                    if (html) {
                                                        const match = html.match(/src\s*=\s*"([^"]+)"/i);
                                                        if (match && match[1]) url = match[1];
                                                    }
                                                    if (url) updateStory('image_url', url);
                                                }}
                                                placeholder="Arrastra aquí una imagen de Google o pega el URL..." 
                                                className="flex-1 bg-slate-50 dark:bg-zinc-950 p-2 rounded-lg outline-none border border-slate-200 dark:border-zinc-800 focus:border-indigo-500 text-sm transition-all"
                                            />
                                        </div>
                                    </div>

                                    <div className="mb-8">
                                        <div className="flex justify-between items-end mb-2">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block">Cuerpo del Texto (Usa [corchetes] para agrupar frases)</label>
                                            <span className={`text-xs font-bold px-2 py-1 rounded-md transition-colors ${getWordCount(stories[editingStoryIdx].text) >= 380 && getWordCount(stories[editingStoryIdx].text) <= 420 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-400' : 'bg-slate-200 text-slate-600 dark:bg-zinc-800 dark:text-slate-400'}`}>
                                                {getWordCount(stories[editingStoryIdx].text)} palabras
                                            </span>
                                        </div>
                                        <textarea value={stories[editingStoryIdx].text} onChange={e => updateStory('text', e.target.value)} className="w-full h-48 bg-slate-50 dark:bg-zinc-950 p-4 rounded-xl outline-none border border-slate-200 dark:border-zinc-800 focus:border-indigo-500 resize-y leading-relaxed font-medium"></textarea>
                                    </div>

                                    {/* EL COMPONENTE MAGICO DE LOS HUECOS */}
                                    {renderInteractiveBlankSelector()}

                                    <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-400 rounded-r-xl">
                                        <label className="text-xs font-bold text-amber-600 dark:text-amber-500 uppercase tracking-widest mb-1 block">Did You Know? (Fun Fact)</label>
                                        <textarea value={stories[editingStoryIdx].fun_fact} onChange={e => updateStory('fun_fact', e.target.value)} className="w-full bg-transparent outline-none font-medium resize-y min-h-[60px] custom-scrollbar"></textarea>
                                    </div>

                                    <div className="mb-8 border-t border-slate-200 dark:border-zinc-800 pt-6">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">
                                                Preguntas de Comprensión ({stories[editingStoryIdx].questions?.length || 0})
                                            </label>
                                            
                                            {/* ZONA DE BOTONES DE PREGUNTAS */}
                                            <div className="flex items-center gap-2">
                                                <button 
                                                    onClick={generateQuestionsOnlyWithAI} 
                                                    disabled={isGeneratingQuestions}
                                                    className="bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-400 px-3 py-1.5 rounded-lg flex items-center gap-2 hover:bg-amber-200 dark:hover:bg-amber-900/80 transition-colors font-bold text-sm shadow-sm"
                                                    title="Lee el texto de arriba y crea preguntas nuevas"
                                                >
                                                    {isGeneratingQuestions ? <Loader2 className="animate-spin" size={16}/> : <RefreshCw size={16}/>} 
                                                    IA: Regenerar Preguntas
                                                </button>
                                                
                                                <button onClick={() => {
                                                    const ns = [...stories];
                                                    if (!ns[editingStoryIdx].questions) ns[editingStoryIdx].questions = [];
                                                    ns[editingStoryIdx].questions.push({q: 'Nueva pregunta...', a: 'Respuesta...', paragraph_index: 0});
                                                    setStories(ns);
                                                }} className="bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-indigo-200 transition-colors font-bold text-sm"><Plus size={16}/> Manual</button>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            {stories[editingStoryIdx].questions?.map((q, qIdx) => (
                                                <div key={qIdx} className="bg-slate-50 dark:bg-zinc-950 p-4 rounded-xl border border-slate-200 dark:border-zinc-800 relative group">
                                                    <button onClick={() => {
                                                        const ns = [...stories];
                                                        ns[editingStoryIdx].questions.splice(qIdx, 1);
                                                        setStories(ns);
                                                    }} className="absolute top-4 right-4 text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-900/30 p-1.5 rounded-md opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button>
                                                    
                                                    <input value={q.q} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].q = e.target.value; setStories(ns); }} placeholder="Pregunta..." className="w-11/12 bg-transparent font-bold outline-none mb-3 text-lg text-indigo-900 dark:text-indigo-300"/>
                                                    <input value={q.a} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].a = e.target.value; setStories(ns); }} placeholder="Respuesta corta clave..." className="w-full bg-white dark:bg-zinc-900 p-2.5 rounded-lg outline-none border border-slate-200 dark:border-zinc-800 text-sm mb-3"/>
                                                    <div className="flex items-center gap-2 text-xs text-slate-500 font-bold">
                                                        <span>Párrafo donde está la respuesta:</span>
                                                        <input type="number" min="0" value={q.paragraph_index || 0} onChange={e => { const ns=[...stories]; ns[editingStoryIdx].questions[qIdx].paragraph_index = parseInt(e.target.value); setStories(ns); }} className="w-16 bg-white dark:bg-zinc-900 p-1.5 rounded border border-slate-200 dark:border-zinc-800 text-center"/>
                                                    </div>
                                                </div>
                                            ))}
                                            {(!stories[editingStoryIdx].questions || stories[editingStoryIdx].questions.length === 0) && (
                                                <p className="text-sm text-slate-400 italic py-4">No hay preguntas generadas. Usa el botón "IA: Regenerar" o añade una manual.</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 dark:border-zinc-800 rounded-3xl bg-white/50 dark:bg-zinc-900/50">
                                    <BookOpen size={48} className="mb-4 opacity-50"/>
                                    <p className="font-bold text-lg">Selecciona o genera una lectura en el panel izquierdo</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

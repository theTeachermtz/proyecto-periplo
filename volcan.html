<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Volcán del Saber - Alumno 🌋</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .volcan-box { background: #333; padding: 40px; border-radius: 20px; border: 4px solid #ff4d00; display: inline-block; box-shadow: 0 0 20px #ff4d00; }
        .emoji-grande { font-size: 80px; margin: 0; }
        #frase-display { font-size: 45px; font-weight: bold; margin: 20px 0; min-height: 60px; color: #fff; }
        .btn-repetir { background: #ff4d00; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 18px; margin-top: 15px; display: none; }
        .btn-repetir:hover { background: #e63900; scale: 1.05; }
        .badge { background: #ff4d00; color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="volcan-box">
        <div class="badge">PROYECTO PERIPLO: LIVE 🔴</div>
        <p class="emoji-grande">🌋</p>
        <div id="frase-display">Esperando al Teacher...</div>
        <button id="btn-audio" class="btn-repetir" onclick="repetirAudio()">🔊 Escuchar de nuevo</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",
            authDomain: "proyecto-periplo.firebaseapp.com",
            projectId: "proyecto-periplo",
            storageBucket: "proyecto-periplo.firebasestorage.app",
            messagingSenderId: "236795998392",
            appId: "1:236795998392:web:0da24b4f018611b55c844d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let ultimaFrase = "";

        function hablar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'en-US'; // Cámbialo a 'es-ES' cuando des clase de español
            msg.rate = 0.9; // Un poquito más lento para que entiendan bien
            window.speechSynthesis.speak(msg);
        }

        window.repetirAudio = () => hablar(ultimaFrase);

        // ESCUCHA EN TIEMPO REAL
        onSnapshot(doc(db, "juego", "actual"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                ultimaFrase = data.frase;
                
                // Actualizar texto
                document.getElementById('frase-display').innerText = data.frase;
                
                // Mostrar botón de repetir
                document.getElementById('btn-audio').style.display = "inline-block";
                
                // ¡AUDIO AUTOMÁTICO! 🎤
                hablar(data.frase);
            }
        });
    </script>
</body>
</html>

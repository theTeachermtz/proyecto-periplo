<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Builder IA | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Dices, Save, ArrowLeft, Loader2, Sun, Moon, Sparkles, KeyRound, RefreshCw, Wand2, X, Tags } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // TAXONOMÍA MAESTRA
        // ============================================================
        const TAXONOMY={
            basic:{
                grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)"],
                verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival"],
                nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway"],
                adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste"],
                key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs"]
            },
            advanced:{
                grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention"],
                verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound"],
                nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science"],
                adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives"],
                key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice"]
            },
            pro:{
                grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals"],
                verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations"],
                nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic"],
                adjectives:["Formal Register Adj.","Nuance & Tone Adj."],
                key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives"]
            }
        };

        const Dashboard = () => {
            const [gameTitle, setGameTitle] = useState("");
            const [categories, setCategories] = useState(["", "", "", ""]);
            const [words, setWords] = useState([[], [], [], []]);
            
            const [apiKey, setApiKey] = useState("");
            const [showApiInput, setShowApiInput] = useState(false);
            
            const [isGeneratingAll, setIsGeneratingAll] = useState(false);
            const [generatingIndex, setGeneratingIndex] = useState(null); 
            
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);

            // TAXONOMY MODAL STATE
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevel, setSaveLevel] = useState('basic');
            const [saveCat, setSaveCat] = useState('grammar');
            const [saveTopic, setSaveTopic] = useState(TAXONOMY['basic']['grammar'][0]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
                
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            setEditingId(editId);
                            if (data.content && data.content.categories) {
                                setCategories(data.content.categories.map(c => c.name));
                                setWords(data.content.categories.map(c => c.words));
                            }
                            // Load existing tags
                            if (data.tags) {
                                setSaveLevel(data.tags.level || 'basic');
                                setSaveCat(data.tags.category || 'grammar');
                                setSaveTopic(data.tags.topic || TAXONOMY['basic']['grammar'][0]);
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);

            // Dynamic Topic Dropdown Update
            useEffect(() => {
                if (TAXONOMY[saveLevel] && TAXONOMY[saveLevel][saveCat]) {
                    setSaveTopic(TAXONOMY[saveLevel][saveCat][0] || 'mixed');
                }
            }, [saveLevel, saveCat]);

            const generateAllWithAI = async () => {
                if (!apiKey) { alert("Necesitas guardar tu API Key de Gemini primero."); setShowApiInput(true); return; }
                if (categories.some(c => c.trim() === "")) { alert("Por favor, ponle nombre a las 4 categorías primero."); return; }

                setIsGeneratingAll(true);
                try {
                    const prompt = `Genera 4 listas de palabras. Las categorías son: "${categories[0]}", "${categories[1]}", "${categories[2]}", "${categories[3]}". Cada lista debe tener exactamente 19 palabras. No repitas palabras entre listas. Responde ÚNICAMENTE con un objeto JSON válido con esta estructura exacta: { "0": ["w1", "w2"], "1": ["w1", "w2"], "2": ["w1", "w2"], "3": ["w1", "w2"] } sin formato markdown ni explicaciones.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(resultText);

                    setWords([parsedData["0"], parsedData["1"], parsedData["2"], parsedData["3"]]);
                } catch (error) {
                    alert("Error generando con la IA. Intenta de nuevo.");
                    console.error(error);
                } finally {
                    setIsGeneratingAll(false);
                }
            };

            const generateSingleCategory = async (index) => {
                if (!apiKey) { alert("Necesitas guardar tu API Key de Gemini primero."); setShowApiInput(true); return; }
                if (!categories[index].trim()) { alert("Ponle nombre a esta categoría primero."); return; }

                setGeneratingIndex(index);
                try {
                    const prompt = `Genera una lista de exactamente 19 palabras para la categoría "${categories[index]}". Asegúrate de que encajen en el tema. Responde ÚNICAMENTE con un array JSON válido de strings, por ejemplo: ["palabra1", "palabra2", "palabra3"] sin formato markdown ni texto extra.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(resultText);

                    const newWords = [...words];
                    newWords[index] = parsedData;
                    setWords(newWords);
                } catch (error) {
                    alert("Error recargando la categoría. Intenta de nuevo.");
                    console.error(error);
                } finally {
                    setGeneratingIndex(null);
                }
            };

            const handleWordsChange = (index, value) => {
                const newWords = [...words];
                newWords[index] = value.split('\n'); 
                setWords(newWords);
            };

            // PRE-SAVE CHECK
            const handlePreSave = () => {
                if (!gameTitle) return alert("Ponle un título al juego");
                if (categories.some(c => c.trim() === "")) return alert("Nombra las 4 categorías.");
                
                const cleanedWords = words.map(list => list.map(w => w.trim()).filter(w => w !== ""));
                if (cleanedWords.some(w => w.length < 15)) return alert("Te recomiendo tener al menos 15 palabras por categoría para armar el mazo completo.");
                
                setShowSaveModal(true);
            };

            // FINAL SAVE WITH TAXONOMY
            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                
                const cleanedWords = words.map(list => list.map(w => w.trim()).filter(w => w !== ""));
                
                try {
                    const content = { 
                        categories: categories.map((name, i) => ({ id: i, name, words: cleanedWords[i] })) 
                    };
                    
                    // CREATE TAGS OBJECT
                    const tags = {
                        level: saveLevel,
                        category: saveCat,
                        topic: saveTopic
                    };
                    
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { 
                            title: gameTitle, content: content, tags: tags, updatedAt: serverTimestamp() 
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), { 
                            title: gameTitle, type: 'UNO', content: content, tags: tags, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { 
                    alert("Error guardando: " + e.message); 
                    setIsSaving(false);
                }
            };

            return (
                <div className="h-[100dvh] flex flex-col bg-slate-50 dark:bg-zinc-950">
                    
                    {/* TAXONOMY SAVE MODAL */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-black flex items-center gap-2 text-white"><Tags className="text-indigo-400"/> Clasificar Mazo UNO</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">1. Nivel</label>
                                        <select value={saveLevel} onChange={e=>{setSaveLevel(e.target.value);const cats=Object.keys(TAXONOMY[e.target.value]||{});setSaveCat(cats[0]||'grammar');}}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer">
                                            {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">2. Categoría</label>
                                        <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer capitalize">
                                            {Object.keys(TAXONOMY[saveLevel]||{}).map(c=><option key={c} value={c}>{c.replace('_',' ')}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">3. Tema Específico</label>
                                        <select value={saveTopic} onChange={e=>setSaveTopic(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-indigo-500 cursor-pointer">
                                            {(TAXONOMY[saveLevel]?.[saveCat]||[]).map(t=><option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <button onClick={executeFinalSave} disabled={isSaving} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:bg-zinc-800 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} Confirmar y Guardar
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-md z-10 border-b border-slate-200 dark:border-zinc-800">
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl transition"><ArrowLeft size={20}/></button>
                            <h1 className="text-xl font-black flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><Dices/> Creador de Mazos UNO</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowApiInput(!showApiInput)} className="text-slate-400 hover:text-indigo-500 transition"><KeyRound size={20}/></button>
                            <button onClick={() => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); }} className="text-amber-500"><Sun size={20}/></button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-6 max-w-6xl mx-auto w-full custom-scrollbar relative">
                        {showApiInput && (
                            <div className="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-2xl mb-6 flex gap-4 items-center border border-indigo-200 dark:border-indigo-800">
                                <KeyRound className="text-indigo-500"/>
                                <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="Pega tu API Key de Gemini aquí..." className="flex-1 bg-white dark:bg-zinc-900 p-2 rounded-lg border border-slate-300 dark:border-zinc-700 outline-none focus:border-indigo-500 dark:text-white"/>
                            </div>
                        )}

                        <input value={gameTitle} onChange={e => setGameTitle(e.target.value)} className="text-4xl font-black w-full border-b-4 border-slate-300 dark:border-zinc-800 pb-2 mb-8 bg-transparent outline-none focus:border-indigo-500 dark:text-white placeholder-zinc-700" placeholder="Nombre del Mazo (ej. Parts of Speech)..."/>
                        
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2"><Sparkles className="text-yellow-500"/> Las 4 Categorías (Colores)</h2>
                            <button onClick={generateAllWithAI} disabled={isGeneratingAll || generatingIndex !== null} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg transition active:scale-95 disabled:opacity-50">
                                {isGeneratingAll ? <Loader2 className="animate-spin"/> : <Sparkles/>} Autocompletar Todo
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-24">
                            {[
                                { color: 'blue', border: 'border-blue-500', bg: 'bg-blue-50 dark:bg-blue-900/10' },
                                { color: 'red', border: 'border-red-500', bg: 'bg-red-50 dark:bg-red-900/10' },
                                { color: 'yellow', border: 'border-yellow-400', bg: 'bg-yellow-50 dark:bg-yellow-900/10' },
                                { color: 'green', border: 'border-green-500', bg: 'bg-green-50 dark:bg-green-900/10' }
                            ].map((c, i) => {
                                const validWordsCount = words[i].filter(w => w.trim() !== '').length;
                                return (
                                    <div key={i} className={`p-5 rounded-3xl border-2 ${c.border} ${c.bg} shadow-sm relative`}>
                                        <div className="flex gap-2">
                                            <input value={categories[i]} onChange={e => { const nc = [...categories]; nc[i] = e.target.value; setCategories(nc); }} placeholder={`Categoría ${i+1}`} className="flex-1 text-xl font-black bg-white dark:bg-zinc-900 dark:text-white p-3 rounded-xl mb-3 outline-none border border-slate-200 dark:border-zinc-700 focus:border-indigo-500 placeholder-slate-400"/>
                                            <button onClick={() => generateSingleCategory(i)} disabled={generatingIndex !== null || isGeneratingAll} className="h-12 w-12 flex items-center justify-center bg-indigo-100 hover:bg-indigo-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 text-indigo-600 dark:text-indigo-300 rounded-xl transition-colors shrink-0 disabled:opacity-50" title="Regenerar solo esta caja">
                                                {generatingIndex === i ? <Loader2 size={20} className="animate-spin"/> : <Wand2 size={20}/>}
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-500 dark:text-zinc-400 mb-2 font-bold px-1 flex justify-between">
                                            <span>Una palabra por línea:</span>
                                            <span className={validWordsCount < 15 ? 'text-rose-500' : 'text-emerald-500'}>{validWordsCount}/19 palabras</span>
                                        </p>
                                        <textarea 
                                            value={words[i].join('\n')} 
                                            onChange={e => handleWordsChange(i, e.target.value)} 
                                            className="w-full h-48 bg-white dark:bg-zinc-900 dark:text-white p-3 rounded-xl text-sm outline-none border border-slate-200 dark:border-zinc-700 resize-none custom-scrollbar placeholder-slate-400" 
                                            placeholder="palabra 1&#10;palabra 2&#10;palabra 3..."
                                        ></textarea>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* FLOTANTE: BOTÓN DE GUARDAR */}
                        <div className="absolute bottom-8 right-8 z-50">
                            <button onClick={handlePreSave} disabled={isSaving} className="bg-emerald-500 hover:bg-emerald-400 text-white p-5 rounded-full shadow-[0_10px_25px_rgba(16,185,129,0.5)] transform transition active:scale-95 flex items-center justify-center disabled:opacity-50">
                                {isSaving ? <Loader2 className="animate-spin" size={28}/> : <Save size={28}/>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

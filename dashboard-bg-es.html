const NEW_LEVELS = ["B1-ES", "B2-ES", "B-MIX-ES", "A1-ES", "A2-ES", "A-MIX-ES", "AV1-ES", "AV2-ES", "AV-MIX-ES"];
const NEW_CATS = [
    { id: 'gramatica', label: 'Gramática' },
    { id: 'verbos', label: 'Verbos' },
    { id: 'vocabulario', label: 'Vocabulario' },
    { id: 'estructuras', label: 'Estructuras Clave' },
    { id: 'otro', label: 'Otro (Macro Habilidades)' }
];
const MACRO_SKILLS = ["Comprensión Oral", "Comprensión Lectora", "Expresión Oral", "Expresión Escrita", "Gramática", "Vocabulario", "Pronunciación", "Cultura Hispana"];

const getAllTopicsForCategory = (categoryId, selectedLevels) => {
    let topics = [];
    const activeDbKeys = new Set();
    selectedLevels.forEach(lvl => {
        if (lvl.startsWith('B')) activeDbKeys.add('basico');
        if (lvl.startsWith('A')) activeDbKeys.add('intermedio');
        if (lvl.startsWith('AV')) activeDbKeys.add('avanzado');
    });
    activeDbKeys.forEach(dbKey => {
        if (TAXONOMY[dbKey] && TAXONOMY[dbKey][categoryId]) {
            topics.push(...TAXONOMY[dbKey][categoryId]);
        }
    });
    return [...new Set(topics)];
};

const toggleSelection = (stateArray, setStateFunction, item) => {
    if (stateArray.includes(item)) {
        setStateFunction(stateArray.filter(i => i !== item));
    } else {
        setStateFunction([...stateArray, item]);
    }
};

// ============================================================

// ============================================================
const Q_TYPES = {
    mc:  { id: 'multipleChoice',  name: 'Opción Múltiple',  format: '{"question":"Pregunta en inglés sobre el tema","options":["opción A en español","opción B","opción C","opción D"],"correct":int(0-3)}' },
    dad: { id: 'dragDrop',        name: 'Drag & Drop',      format: '{"sentence":"Oración en español con [BLANK].","options":["incorrecto1","correcto","incorrecto2"],"correct":"correcto"}' },
    scr: { id: 'unscramble',      name: 'Unscramble',       format: '{"text":"Oración correcta en español.","translation":"English translation"}' },
    fib: { id: 'fillBlank',       name: 'Fill in the Blank',format: '{"sentence":"Oración en español con un [BLANK].","answer":"palabra_correcta","hint":"p _ _ _ (starts with p, 4 letters)"}' },
    mat: { id: 'matching',        name: 'Matching',         format: 'Each item is a set of 4-5 pairs. {"pairs":[{"left":"Spanish word/phrase","right":"English equivalent"}, ...]}' },
    err: { id: 'errorCorrection', name: 'Error Correction', format: '{"sentence":"Oración en español con UN error.","error":"palabra incorrecta","correction":"palabra correcta"}' },
    odd: { id: 'oddOneOut',       name: 'Odd One Out',      format: '{"words":["palabra1","palabra2","raraAvis","palabra3"],"odd":"raraAvis","reason":"Explanation in English"}' },
    spk: { id: 'speaking',        name: 'Speaking',         format: '{"english":"English prompt for student","spanish":"Expected Spanish response"}' },
    lis: { id: 'listening',       name: 'Listening',        format: '{"audioText":"Texto en español para TTS","answer":"English translation expected"}' },
    rol: { id: 'roleplay',        name: 'Roleplay',         format: '{"situation":"English scenario description","expected":"Expected Spanish response"}' }
};

// ============================================================
// CONTENT EDITOR (El Revisador Final)
// ============================================================
const ContentEditor=({content,onSaveToFirebase,title,setTitle,isEditing,initialTags})=>{
    const[ec,setEc]=useState(content);
    const tabs = Object.keys(ec).filter(k => Array.isArray(ec[k]) && ec[k].length > 0);
    const[tab,setTab]=useState(tabs[0] || '');
    const hc=(s,i,f,v)=>{const u={...ec};u[s][i][f]=v;setEc(u)};

    const [showSaveModal, setShowSaveModal] = useState(false);
    const [saveLevels, setSaveLevels] = useState(initialTags?.levels || (initialTags?.level ? [initialTags.level.toUpperCase()] : []));
    const [saveCats, setSaveCats] = useState(initialTags?.categories || (initialTags?.category ? [initialTags.category] : []));
    const [saveTopics, setSaveTopics] = useState(initialTags?.topics || (initialTags?.topic ? [initialTags.topic] : []));
    const [isSaving, setIsSaving] = useState(false);

    const handleConfirmSave = () => {
        setIsSaving(true);
        const finalTags = { levels: saveLevels, categories: saveCats, topics: saveTopics };
        onSaveToFirebase(ec, finalTags).finally(() => setIsSaving(false));
    };
    
    return(
        <div className="h-[100dvh] flex flex-col bg-zinc-950 text-zinc-100 relative">
            
            {showSaveModal && (
                <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                        <div className="flex justify-between items-center mb-6 shrink-0">
                            <h2 className="text-xl font-black flex items-center gap-2 text-white"><Tags className="text-orange-400"/> Clasificar Boardgame — Español</h2>
                            <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition"><X size={20}/></button>
                        </div>
                        
                        <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">
                            <div>
                                <label className="block text-xs font-black text-orange-400 uppercase tracking-widest mb-3">1. Nivel del Estudiante</label>
                                <div className="flex flex-wrap gap-2">
                                    {NEW_LEVELS.map(lvl => (
                                        <button key={lvl} onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)} className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-orange-600 border-orange-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-orange-500 hover:text-orange-300'}`}>
                                            {lvl}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categoría Gramatical</label>
                                <div className="flex flex-wrap gap-2">
                                    {NEW_CATS.map(cat => (
                                        <button key={cat.id} onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)} className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                            {cat.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {saveCats.length > 0 && saveLevels.length > 0 && (
                                <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                    <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">3. Temas Específicos Evaluados</label>
                                    {saveCats.map(catId => {
                                        if (catId === 'otro') return null;
                                        const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                        const topics = getAllTopicsForCategory(catId, saveLevels);
                                        if (topics.length === 0) return null;
                                        return (
                                            <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {topics.map(topic => (
                                                        <button key={topic} onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)} className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>

                                                        {skill}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <button onClick={handleConfirmSave} disabled={isSaving || saveLevels.length === 0 || saveCats.length === 0} className="w-full mt-6 bg-orange-600 hover:bg-orange-500 disabled:opacity-50 disabled:bg-zinc-800 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">

                            {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar en BD (Anita)"}
                        </button>
                    </div>
                </div>
            )}

            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-3">
                <h2 className="text-base font-black flex items-center gap-2"><Edit3 size={18}/>{isEditing?"Editar Banco":"Revisión Final"}</h2>
                <div className="flex gap-2">
                    <button onClick={()=>window.location.reload()} className="btn-juicy bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl font-bold text-sm">Cancelar</button>
                    <button onClick={()=>{
                        if(!title) return alert("Ponle un título al banco.");
                        setShowSaveModal(true);
                    }} className="btn-juicy bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 text-sm"><Save size={16}/>{isEditing?"Clasificar y Actualizar":"Clasificar y Guardar"}</button>
                </div>
            </div>
            <div className="p-4 border-b border-zinc-800 shrink-0">
                <label className="block text-[10px] font-black text-zinc-500 uppercase mb-1">Título del Banco</label>

            </div>
            <div className="flex gap-2 border-b border-zinc-800 px-4 shrink-0 overflow-x-auto custom-scrollbar">
                {tabs.map(t=>(<button key={t} onClick={()=>setTab(t)} className={`px-4 py-2.5 font-bold capitalize text-sm border-b-4 transition-all whitespace-nowrap ${tab===t?'border-orange-500 text-orange-400':'border-transparent text-zinc-500 hover:text-zinc-300'}`}>{t} ({ec[t]?.length||0})</button>))}
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar bg-zinc-950">
                {tab==='multipleChoice'&&ec.multipleChoice?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800">
                        <input value={item.question} onChange={e=>hc('multipleChoice',i,'question',e.target.value)} className="w-full p-2 mb-3 border border-zinc-700 rounded bg-zinc-950 text-sm font-medium outline-none focus:border-orange-500"/>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">{item.options.map((opt,oi)=>(
                            <div key={oi} className={`flex items-center gap-2 p-2 rounded border ${oi===item.correct?'bg-emerald-900/30 border-emerald-800':'bg-zinc-950 border-zinc-700'}`}>
                                <button onClick={()=>{const u={...ec};u.multipleChoice[i].correct=oi;setEc(u)}} className="shrink-0">{oi===item.correct?<CheckCircle2 className="text-emerald-400" size={18}/>:<Circle className="text-zinc-600" size={18}/>}</button>
                                <input value={opt} onChange={e=>{const u={...ec};u.multipleChoice[i].options[oi]=e.target.value;setEc(u)}} className="w-full text-xs font-bold bg-transparent outline-none"/>
                            </div>
                        ))}</div>
                    </div>
                ))}
                {tab==='dragDrop'&&ec.dragDrop?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Oración en español (usa [BLANK]):</span><input value={item.sentence} onChange={e=>hc('dragDrop',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Respuesta Correcta:</span><input value={item.correct} onChange={e=>hc('dragDrop',i,'correct',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">Distractores (separados por coma):</span><input value={item.options.join(',')} onChange={e=>hc('dragDrop',i,'options',e.target.value.split(','))} className="w-full p-2 border border-zinc-700 bg-transparent rounded outline-none"/></div>
                    </div>
                ))}
                {tab==='unscramble'&&ec.unscramble?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Oración en Español:</span><input value={item.text} onChange={e=>hc('unscramble',i,'text',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-zinc-500">English Translation:</span><input value={item.translation} onChange={e=>hc('unscramble',i,'translation',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded italic text-zinc-400 outline-none"/></div>
                    </div>
                ))}
                {tab==='fillBlank'&&ec.fillBlank?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Oración en español (usa [BLANK]):</span><input value={item.sentence} onChange={e=>hc('fillBlank',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-zinc-500">Respuesta:</span><input value={item.answer} onChange={e=>hc('fillBlank',i,'answer',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-zinc-500">Hint (pista):</span><input value={item.hint} onChange={e=>hc('fillBlank',i,'hint',e.target.value)} className="w-full p-2 border border-amber-700/50 bg-amber-900/20 text-amber-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
                {tab==='matching'&&ec.matching?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        {item.pairs.map((p,pi)=>(
                            <div key={pi} className="flex gap-2">
                                <input value={p.left} onChange={e=>{const u={...ec};u.matching[i].pairs[pi].left=e.target.value;setEc(u)}} className="flex-1 p-2 border border-zinc-700 bg-transparent rounded text-sm" placeholder="Español"/>
                                <input value={p.right} onChange={e=>{const u={...ec};u.matching[i].pairs[pi].right=e.target.value;setEc(u)}} className="flex-1 p-2 border border-zinc-700 bg-transparent rounded text-sm" placeholder="English"/>
                            </div>
                        ))}
                    </div>
                ))}
                {tab==='errorCorrection'&&ec.errorCorrection?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Oración con Error:</span><input value={item.sentence} onChange={e=>hc('errorCorrection',i,'sentence',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-rose-500">Palabra Incorrecta:</span><input value={item.error} onChange={e=>hc('errorCorrection',i,'error',e.target.value)} className="w-full p-2 border border-rose-700/50 bg-rose-900/20 text-rose-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-emerald-500">Corrección:</span><input value={item.correction} onChange={e=>hc('errorCorrection',i,'correction',e.target.value)} className="w-full p-2 border border-emerald-700/50 bg-emerald-900/20 text-emerald-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
                {tab==='oddOneOut'&&ec.oddOneOut?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Palabras (separadas por coma):</span><input value={item.words.join(',')} onChange={e=>hc('oddOneOut',i,'words',e.target.value.split(','))} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div className="flex gap-2">
                            <div className="flex-1"><span className="text-xs font-bold text-rose-500">La Rara:</span><input value={item.odd} onChange={e=>hc('oddOneOut',i,'odd',e.target.value)} className="w-full p-2 border border-rose-700/50 bg-rose-900/20 text-rose-400 rounded outline-none"/></div>
                            <div className="flex-1"><span className="text-xs font-bold text-blue-400">Razón (English):</span><input value={item.reason} onChange={e=>hc('oddOneOut',i,'reason',e.target.value)} className="w-full p-2 border border-blue-700/50 bg-blue-900/20 text-blue-400 rounded outline-none"/></div>
                        </div>
                    </div>
                ))}
                {tab==='speaking'&&ec.speaking?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">English Prompt (para el estudiante):</span><input value={item.english} onChange={e=>hc('speaking',i,'english',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-orange-400">Respuesta en Español esperada:</span><input value={item.spanish} onChange={e=>hc('speaking',i,'spanish',e.target.value)} className="w-full p-2 border border-orange-900/50 bg-orange-900/20 text-orange-300 rounded font-bold outline-none"/></div>
                    </div>
                ))}
                {tab==='listening'&&ec.listening?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Texto en Español (para TTS):</span><input value={item.audioText} onChange={e=>hc('listening',i,'audioText',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-purple-400">English Answer:</span><input value={item.answer} onChange={e=>hc('listening',i,'answer',e.target.value)} className="w-full p-2 border border-purple-900/50 bg-purple-900/20 text-purple-300 rounded font-bold outline-none"/></div>
                    </div>
                ))}
                {tab==='roleplay'&&ec.roleplay?.map((item,i)=>(
                    <div key={i} className="p-4 bg-zinc-900 rounded-xl border border-zinc-800 space-y-2">
                        <div><span className="text-xs font-bold text-zinc-500">Situación (en inglés para el estudiante):</span><input value={item.situation} onChange={e=>hc('roleplay',i,'situation',e.target.value)} className="w-full p-2 border border-zinc-700 bg-transparent rounded font-bold outline-none"/></div>
                        <div><span className="text-xs font-bold text-orange-400">Respuesta en Español esperada:</span><input value={item.expected} onChange={e=>hc('roleplay',i,'expected',e.target.value)} className="w-full p-2 border border-orange-900/50 bg-orange-900/20 text-orange-300 rounded font-bold outline-none"/></div>
                    </div>
                ))}
            </div>
        </div>
    );
};

// ============================================================
// MAIN DASHBOARD
// ============================================================
const Dashboard=()=>{
    const[apiKey,setApiKey]=useState(localStorage.getItem('periplo_google_key')||'');
    const[gameTitle,setGameTitle]=useState('');
    const[globalContext,setGlobalContext]=useState('');
    
    const[selectedLevel,setSelectedLevel]=useState('');
    const[selectedCat,setSelectedCat]=useState('');
    
    const[showConfig,setShowConfig]=useState(false);
    const[qConfig,setQConfig]=useState({
        mc: 0, dad: 0, scr: 0, fib: 0, mat: 0, err: 0, odd: 0, spk: 0, lis: 0, rol: 0
    });

    const[bucketItems,setBucketItems]=useState({});
    const[activeBucket,setActiveBucket]=useState(null);

    const[isGenerating,setIsGenerating]=useState(false);
    const[generatedContent,setGeneratedContent]=useState(null);
    const[existingTags,setExistingTags]=useState(null);
    const[editingId,setEditingId]=useState(null);
    const[isLoading,setIsLoading]=useState(false);
    const[models,setModels]=useState([]);
    const[selModel,setSelModel]=useState('');
    const[loadingModels,setLoadingModels]=useState(false);

    useEffect(()=>{
        const init=async()=>{
            const p=new URLSearchParams(window.location.search);const eid=p.get('edit');
            if(eid){
                setIsLoading(true);
                try{
                    const s=await getDoc(doc(db,`artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`,eid));
                    if(s.exists()){const d=s.data();setGeneratedContent(d.content);setGameTitle(d.title);setEditingId(eid);if(d.tags)setExistingTags(d.tags);}
                }catch(e){alert(e.message)}
                setIsLoading(false);
            }
        };init();
    },[]);

    useEffect(()=>{
        const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
        if (activeKeys.length > 0 && !activeKeys.includes(activeBucket)) {
            setActiveBucket(activeKeys[0]);
        } else if (activeKeys.length === 0) {
            setActiveBucket(null);
        }
    }, [qConfig]);

    const toggleIngredient=(topic)=>{
        if(!activeBucket) return alert("Selecciona un tipo de pregunta activo a la derecha primero.");
        setBucketItems(prev=>{
            const current = prev[activeBucket] || [];
            if(current.includes(topic)) return {...prev, [activeBucket]: current.filter(t=>t!==topic)};
            return {...prev, [activeBucket]: [...current, topic]};
        });
    };

    const removeIngredient=(bucketKey, topic)=>{
        setBucketItems(prev=>{
            const current = prev[bucketKey] || [];
            return {...prev, [bucketKey]: current.filter(t=>t!==topic)};
        });
    };

    const updateQConfig=(key,val)=>{setQConfig(prev=>({...prev,[key]:parseInt(val)}))};

    const fetchModels=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");setLoadingModels(true);
        try{
            const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            if(!r.ok)throw new Error("Error al conectar");
            const d=await r.json();
            const v=d.models.filter(m=>m.supportedGenerationMethods?.includes("generateContent")).map(m=>m.name);
            setModels(v);
            if(v.length>0)setSelModel(v.find(m=>m.includes("gemini-2.5-flash"))||v.find(m=>m.includes("gemini-2.0"))||v[0]);
        }catch(e){alert(e.message)}setLoadingModels(false);
    };

    const generate=async()=>{
        if(!apiKey)return alert("Ingresa tu API Key");
        if(!selModel)return alert("Escanea modelos primero (🔍)");
        
        const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
        if(activeKeys.length === 0) return alert("Configura al menos 1 tipo de pregunta en el engranaje ⚙️");

        setIsGenerating(true);
        
        // ============================================================
        // PROMPT PARA ESPAÑOL — La IA genera contenido para enseñar ESPAÑOL a angloparlantes
        // ============================================================
        let prompt=`You are an expert Spanish language teacher creating content for English-speaking students learning Spanish. Create a JSON object for an educational boardgame bank.\n\n`;
        prompt += `TARGET LANGUAGE: Spanish (the language being TAUGHT)\nSTUDENT NATIVE LANGUAGE: English\nINSTRUCTION LANGUAGE: Mix — questions/hints can be in English to help students, but the Spanish content must be authentic and natural.\n\n`;
        
        if(globalContext.trim().length > 0) {
            prompt += `GLOBAL CONTEXT & VOCABULARY:\n"${globalContext}"\n*(Apply this context to all sentences and scenarios. If a section evaluates specific vocabulary, use the words from this text.)*\n\n`;
        }

        prompt += `Generate EXACTLY these quantities and types:\n`;
        
        activeKeys.forEach(k => {
            const typeInfo = Q_TYPES[k];
            const topics = bucketItems[k]?.join(', ') || 'General Spanish for beginners';
            prompt += `- '${typeInfo.id}' array: ${qConfig[k]} items. Evaluate STRICTLY: [${topics}]. Format: ${typeInfo.format}\n`;
        });

        prompt += `\nIMPORTANT RULES:
- All Spanish content must be grammatically correct and natural.
- Keep sentences appropriate for language learners (not too complex unless topic demands it).
- For 'matching' items: pair Spanish words/phrases with their English equivalents.
- For 'unscramble': always provide the correct Spanish sentence and its English translation.
- For 'speaking'/'roleplay': the prompt to the student is in English, the expected answer is in Spanish.
- Output STRICT JSON containing ONLY the requested arrays. No markdown, no explanations.`;

        try{
            const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/${selModel}:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseMimeType:"application/json"}})});
            const d=await r.json();
            if(d.error)throw new Error(d.error.message);
            if(!d.candidates?.[0]?.content)throw new Error("Sin resultados de la IA.");
            const t=d.candidates[0].content.parts[0].text.replace(/```json|```/g,"").trim();
            setGeneratedContent(JSON.parse(t));
        }catch(e){alert("Error: "+e.message)}
        setIsGenerating(false);
    };

    // ============================================================
    // GUARDAR EN FIREBASE — Ruta de Anita
    // ============================================================
    const saveToFirebase=async(finalContent, finalTags)=>{
        try{
            let proc={...finalContent};
            if(proc.unscramble) {
                proc.unscramble = proc.unscramble.map(s=>{
                    let t=s.text.replace(/\//g,'').replace(/[()]/g,'');
                    t=t.charAt(0).toUpperCase()+t.slice(1);
                    if(!t.endsWith('.'))t+='.';
                    return{...s,text:t,words:t.split(' ').filter(w=>w.trim())};
                });
            }
            const p=new URLSearchParams(window.location.search);
            const fp=p.get('folder');
            const pp=(fp&&fp!=='undefined'&&fp!=='null')?decodeURIComponent(fp):'';
            
            // RUTA CORRECTA: artifacts/periplo-app-v1/users/teacher_anita_001/quizzes
            if(editingId){
                await updateDoc(
                    doc(db,`artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`,editingId),
                    {title:gameTitle,content:proc,tags:finalTags,updatedAt:serverTimestamp()}
                );
            } else {
                await addDoc(
                    collection(db,'artifacts',FS_APP_ID,'users',TEACHER_UID,'quizzes'),
                    {title:gameTitle,type:'BOARDGAME_BANK',content:proc,tags:finalTags,createdAt:serverTimestamp(),parentPath:pp, language:'es'}
                );
            }
            // Redirige a index-es.html
            window.location.href=pp?`index-es.html?folder=${encodeURIComponent(pp)}`:'index-es.html';
        }catch(e){alert(e.message)}
    };

    if(isLoading)return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-zinc-500"><Loader2 className="animate-spin mr-2"/>Cargando...</div>;
    if(generatedContent)return<ContentEditor content={generatedContent} onSaveToFirebase={saveToFirebase} title={gameTitle} setTitle={setGameTitle} isEditing={!!editingId} initialTags={existingTags}/>;

    const currentTopics = (selectedLevel && selectedCat) ? (TAXONOMY[selectedLevel]?.[selectedCat] || []) : [];
    const activeKeys = Object.keys(qConfig).filter(k => qConfig[k] > 0);
    const totalQ = Object.values(qConfig).reduce((a,b)=>a+b,0);

    // Nivel de taxonomía mapeado desde los niveles comerciales
    const selectedTaxLevel = selectedLevel.startsWith('B') ? 'basico' : selectedLevel.startsWith('AV') ? 'avanzado' : selectedLevel.startsWith('A') ? 'intermedio' : '';

    return(
        <div className="h-[100dvh] flex flex-col text-zinc-100 bg-zinc-950">
            {/* MODAL CONFIG */}
            {showConfig && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-zinc-900 border border-zinc-700 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-black flex items-center gap-2"><Settings2 className="text-orange-400"/>Asignar Cantidades</h2>
                            <button onClick={()=>setShowConfig(false)} className="btn-juicy text-zinc-500 hover:text-white"><X size={20}/></button>
                        </div>
                        <div className="space-y-3 mb-6 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                            {Object.entries(Q_TYPES).map(([k, t])=>(
                                <div key={k} className="flex items-center justify-between bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                                    <label className="text-xs font-bold text-zinc-300 ml-2">{t.name}</label>
                                    <div className="flex items-center gap-2">
                                        <input type="range" min="0" max="20" value={qConfig[k]} onChange={e=>updateQConfig(k,e.target.value)} className="w-20 accent-orange-500"/>
                                        <span className={`text-sm font-black w-6 text-right ${qConfig[k]>0?'text-orange-400':'text-zinc-600'}`}>{qConfig[k]}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>setShowConfig(false)} className="btn-juicy w-full bg-orange-600 hover:bg-orange-500 text-white py-3 rounded-xl font-bold">Activar Buckets ({totalQ} Qs)</button>
                    </div>
                </div>
            )}

            {/* HEADER */}
            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-2">
                <div className="flex items-center gap-3 min-w-0">
                    <button onClick={()=>window.location.href='index-es.html'} className="btn-juicy p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl"><ArrowLeft size={18}/></button>
                    <h1 className="text-base font-black flex items-center gap-2 truncate">
                        <span className="text-orange-400">🎲</span>
                        Boardgames Builder — <span className="text-orange-400">Español</span>
                    </h1>
                </div>
                <div className="flex items-center gap-1.5 flex-shrink-0">
                    <input type="password" placeholder="API Key..." value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem('periplo_google_key',e.target.value)}} className="bg-zinc-900 border border-zinc-700 text-white rounded-lg px-2 py-1.5 text-xs font-mono w-28 focus:border-orange-500 outline-none"/>
                    <button onClick={fetchModels} disabled={loadingModels||!apiKey} className="btn-juicy p-1.5 bg-orange-600 hover:bg-orange-500 text-white rounded-lg">{loadingModels?<Loader2 className="animate-spin" size={14}/>:<Search size={14}/>}</button>
                    {models.length>0&&<select value={selModel} onChange={e=>setSelModel(e.target.value)} className="bg-zinc-900 border border-zinc-700 rounded-lg px-1.5 py-1.5 text-[10px] text-white max-w-[120px] outline-none">{models.map(m=><option key={m} value={m}>{m.replace('models/','')}</option>)}</select>}
                </div>
            </div>

            <div className="flex flex-1 flex-col md:flex-row overflow-hidden">
                {/* LEFT PANEL: TAXONOMÍA ESPAÑOL */}
                <div className="w-full md:w-[35%] border-b md:border-b-0 md:border-r border-zinc-800 flex flex-col h-[40%] md:h-full bg-zinc-950">
                    <div className="p-4 border-b border-zinc-800 shrink-0 space-y-3">
                        <div className="flex gap-2">
                            <select value={selectedLevel} onChange={e=>{setSelectedLevel(e.target.value);setSelectedCat('');}} className="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl p-2 text-xs font-bold outline-none focus:border-orange-500 cursor-pointer">
                                <option value="" disabled>Nivel del estudiante...</option>
                                {NEW_LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
                            </select>
                            <select value={selectedCat} onChange={e=>setSelectedCat(e.target.value)} disabled={!selectedLevel} className="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl p-2 text-xs font-bold outline-none focus:border-orange-500 cursor-pointer disabled:opacity-50">
                                <option value="" disabled>Categoría...</option>
                                {selectedTaxLevel && Object.keys(TAXONOMY[selectedTaxLevel]||{}).map(c=><option key={c} value={c}>{c.replace('_',' ').toUpperCase()}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                        <div className="space-y-2">
                            {!selectedLevel || !selectedCat ? (
                                <div className="text-center text-zinc-600 font-bold text-xs mt-10 px-4">
                                    Selecciona Nivel y Categoría para ver los temas disponibles.
                                </div>
                            ) : (
                                <>
                                    <p className="text-[10px] text-zinc-500 font-bold mb-3 tracking-widest uppercase">Haz clic para agregar a la pestaña activa</p>
                                    {(TAXONOMY[selectedTaxLevel]?.[selectedCat] || []).map(topic=>{
                                        const isAdded = activeBucket && (bucketItems[activeBucket]||[]).includes(topic);
                                        return(
                                            <button key={topic} onClick={()=>toggleIngredient(topic)}
                                                className={`btn-juicy w-full text-left p-3 rounded-xl border-2 font-bold text-sm transition-all ${isAdded?'bg-orange-600/20 border-orange-500 text-orange-300':'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-orange-500/50'}`}>
                                                <div className="flex justify-between items-center">
                                                    <span>{topic}</span>
                                                    {isAdded && <span className="text-[10px] bg-orange-500/30 text-orange-300 px-2 py-0.5 rounded uppercase">Agregado</span>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </>
                            )}
                        </div>
                    </div>
                </div>

                {/* RIGHT PANEL */}
                <div className="w-full md:w-[65%] flex flex-col h-[60%] md:h-full bg-zinc-900 relative">
                    {/* CONTEXTO GLOBAL */}
                    <div className="p-4 border-b border-zinc-800 shrink-0 bg-zinc-950/50">
                        <label className="flex items-center gap-2 text-xs font-black text-orange-400 uppercase tracking-widest mb-2"><MessageSquare size={14}/> Contexto Global & Vocabulario Custom</label>
                        <textarea 
                            value={globalContext} 
                            onChange={e=>setGlobalContext(e.target.value)} 
                            placeholder="Ej: Contexto de viaje a México. Si usas vocabulario evalúa estas palabras: playa, hotel, mercado..."
                            className="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-3 text-sm font-medium outline-none focus:border-orange-500 resize-none h-20 custom-scrollbar placeholder-zinc-600"
                        ></textarea>
                    </div>

                    {/* TABS DE BUCKETS */}
                    <div className="flex items-center bg-black border-b border-zinc-800 shrink-0">
                        <button onClick={()=>setShowConfig(true)} className="btn-juicy p-3 border-r border-zinc-800 hover:bg-zinc-900 text-zinc-400 transition-colors" title="Configurar Cantidades">
                            <Settings2 size={18}/>
                        </button>
                        <div className="flex-1 overflow-x-auto flex custom-scrollbar">
                            {activeKeys.length === 0 ? (
                                <div className="p-3 text-xs font-bold text-zinc-600 italic">Asigna Qs en el engranaje para activar pestañas.</div>
                            ) : (
                                activeKeys.map(k => (
                                    <button 
                                        key={k} 
                                        onClick={()=>setActiveBucket(k)} 
                                        className={`px-4 py-3 font-bold text-sm border-b-2 whitespace-nowrap transition-all flex items-center gap-2 ${activeBucket===k ? 'border-orange-500 text-orange-400 bg-zinc-900' : 'border-transparent text-zinc-500 hover:bg-zinc-900/50 hover:text-zinc-300'}`}
                                    >
                                        {Q_TYPES[k].name} <span className="bg-zinc-800 text-zinc-400 px-1.5 rounded text-[10px]">{qConfig[k]}</span>
                                    </button>
                                ))
                            )}
                        </div>
                    </div>

                    {/* CONTENIDO DEL BUCKET */}
                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar pb-24">
                        {!activeBucket ? (
                            <div className="h-full flex flex-col items-center justify-center text-zinc-600">
                                <ShoppingCart size={40} className="mb-3 opacity-40"/>
                                <p className="font-bold">No hay pestañas activas</p>
                                <p className="text-xs mt-1">Usa el engranaje (⚙️) para empezar.</p>
                            </div>
                        ) : (
                            <div>
                                <h3 className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-3 border-b border-zinc-800 pb-2">Evaluando en {Q_TYPES[activeBucket].name}:</h3>
                                
                                {!(bucketItems[activeBucket]?.length > 0) ? (
                                    <div className="p-6 border border-dashed border-zinc-700 rounded-2xl text-center text-zinc-500 text-sm font-bold bg-zinc-950/50">
                                        Haz clic en los temas de la izquierda para inyectarlos aquí. <br/>
                                        <span className="text-xs font-medium opacity-70">(Si lo dejas vacío, será un mix general de español)</span>
                                    </div>
                                ) : (
                                    <div className="space-y-2">
                                        {bucketItems[activeBucket].map(topic => (
                                            <div key={topic} className="flex justify-between items-center p-3 bg-zinc-950 border border-zinc-800 rounded-xl group">
                                                <span className="font-bold text-sm text-zinc-300">{topic}</span>
                                                <button onClick={()=>removeIngredient(activeBucket, topic)} className="text-zinc-600 hover:text-rose-500 transition-colors p-1"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* GENERATE BUTTON */}
                    <div className="absolute bottom-5 left-4 right-4 z-20">
                        <button onClick={generate} disabled={isGenerating||activeKeys.length===0} className="btn-juicy w-full bg-white text-zinc-900 py-4 rounded-2xl font-black text-lg hover:bg-orange-500 hover:text-white transition-all flex items-center justify-center gap-3 disabled:opacity-40 disabled:cursor-not-allowed shadow-2xl">
                            {isGenerating?<><Loader2 className="animate-spin"/>Generando en Español...</>:<><Zap className="fill-orange-400 text-orange-500"/>GENERAR ({totalQ} Qs) 🇲🇽</>}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reading Activity | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; overflow-x: clip; -webkit-tap-highlight-color: transparent; }
        
        .token-base {
            display: inline-flex; align-items: center; justify-content: center; vertical-align: middle;
            padding: 0 0.5em; min-width: 3em; height: 1.8em; transition: all 0.2s ease;
            touch-action: manipulation; cursor: pointer;
        }

        .token-start { border-top-left-radius: 0.3em; border-bottom-left-radius: 0.3em; margin-left: 0.2em; border-left-width: 2px !important; }
        .token-end { border-top-right-radius: 0.3em; border-bottom-right-radius: 0.3em; margin-right: 0.2em; border-right-width: 2px !important; }
        .token-middle { border-left-width: 0px !important; border-right-width: 0px !important; margin: 0; border-radius: 0; }
        .token-single { border-radius: 0.3em; margin: 0 0.2em; border-left-width: 2px !important; border-right-width: 2px !important; }

        .token-hidden-light { background-color: #f1f5f9; border: 2px dashed #94a3b8; border-bottom-width: 4px; }
        .token-hidden-dark { background-color: #334155; border: 2px dashed #64748b; border-bottom-width: 4px; }
        .token-filled { background-color: #e0e7ff; border: 2px solid #6366f1; color: #3730a3; font-weight: 800; border-bottom-width: 4px; }
        .token-correct { background-color: #dcfce7 !important; border: 2px solid #22c55e !important; color: #14532d !important; border-bottom-width: 4px !important; }
        .token-wrong { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #7f1d1d !important; border-bottom-width: 4px !important; animation: shake 0.4s; }

        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); } }
        
        .timer-bar { animation: shrink linear forwards; }
        .animate-shake { animation: shake 0.4s; }
        .animate-fadeUp { animation: fadeUp 0.6s ease both; }
        .animate-scaleIn { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .animate-pulseGlow { animation: pulseGlow 2s infinite; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }

        @media (hover: hover) {
            .hover-lift:hover { transform: translateY(-4px); }
            .hover-glow:hover { box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        }

        .btn-juicy { touch-action: manipulation; transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .btn-juicy:active:not(:disabled) { transform: scale(0.96) !important; }

        .word-chip { touch-action: manipulation; user-select: none; -webkit-user-select: none; }

        .progress-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s ease; }
        .progress-dot.active { width: 24px; border-radius: 4px; }

        /* Estilos Q&A Opciones Múltiples */
        .quiz-opt { transition: all 0.2s ease; }
        .quiz-opt:hover:not(:disabled) { transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, CheckCircle2, RotateCcw, ArrowLeft, Lightbulb, Puzzle, Moon, Sun, ZoomIn, ZoomOut, Timer, Swords, ArrowRight, PlayCircle, BookOpen, Edit2, LayoutGrid, Award, GraduationCap, Star, Trophy, Sparkles, X, Info, Languages, Eye, XCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const EMOJI_SETS = [
            ['🌟','✨','🚀','💫','⭐'],
            ['🎯','🏆','💡','🔥','🧩'],
            ['📚','📖','✏️','📝','🧠'],
            ['🎨','🎭','🎪','🌈','🎉']
        ];

        const ReadingActivity = () => {
            // ═══════════════ 1. ESTADOS ═══════════════
            const [loading, setLoading] = useState(true);
            const [activityData, setActivityData] = useState(null);
            const [activityId, setActivityId] = useState(null);
            const [stories, setStories] = useState([]);
            const [curIdx, setCurIdx] = useState(-1); 
            const [isStudent, setIsStudent] = useState(false);

            const [currentSlide, setCurrentSlide] = useState(0); 
            const [slideResult, setSlideResult] = useState(null); 
            const [dropped, setDropped] = useState({});
            const [selectedWord, setSelectedWord] = useState(null);
            
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [fontSize, setFontSize] = useState(window.innerWidth < 768 ? 18 : 22);

            // Traductor
            const [translations, setTranslations] = useState({});
            const [isTranslating, setIsTranslating] = useState(false);
            const [showSpanish, setShowSpanish] = useState(false);

            // Q&A Opciones Múltiples
            const [qaMode, setQaMode] = useState(false);
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [qaOptions, setQaOptions] = useState([]);
            const [optionsVisible, setOptionsVisible] = useState(false);
            const [qaFinished, setQaFinished] = useState(false);
            const [score, setScore] = useState(0);
            const [answeredQ, setAnsweredQ] = useState({});

            const currentStory = curIdx !== -1 ? stories[curIdx] : null;

            const wordBank = useMemo(() => {
                if (!currentStory) return [];
                return currentStory.flatTokens.filter(t => t.isHidden).map(t => t.text).sort(() => Math.random() - 0.5); 
            }, [currentStory]);

            // ═══════════════ AUTO-GUARDADO DE PROGRESO ═══════════════
            useEffect(() => {
                if (activityId && curIdx !== -1) {
                    const saveObj = { currentSlide, dropped, score, answeredQ };
                    localStorage.setItem(`periplo_reading_${activityId}_${curIdx}`, JSON.stringify(saveObj));
                }
            }, [currentSlide, dropped, score, answeredQ, activityId, curIdx]);

            // ═══════════════ EFECTOS INICIALES ═══════════════
            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (params.get('student') === 'true') setIsStudent(true);
                    if (!id) return;
                    setActivityId(id);
                    
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const savedData = snap.data();
                        setActivityData(savedData);
                        
                        let loadedStories = [];
                        if (savedData.stories) {
                            loadedStories = savedData.stories;
                        } else if (savedData.content) {
                            loadedStories = [{
                                title: savedData.title,
                                text: savedData.content.text,
                                fun_fact: savedData.content.fun_fact,
                                image_url: savedData.content.image_url,
                                blanks: savedData.content.blanks,
                                questions: savedData.content.questions
                            }];
                        }

                        const processed = loadedStories.map(s => {
                            const rawParagraphs = s.text.split(/\n\n+/).filter(p => p.trim().length > 0);
                            let globalId = 0;
                            
                            const parsedParagraphs = rawParagraphs.map(p => {
                                const regex = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s\[\]]+|\s+)/g;
                                const parts = p.match(regex) || [];
                                
                                return parts.map(part => {
                                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                                    let cleanText = isBracketed ? part.slice(1, -1) : part;
                                    let isWord = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(cleanText);
                                    let isHidden = isBracketed && isWord;
                                    return { id: globalId++, text: cleanText, isWord, isHidden };
                                });
                            });

                            return { ...s, paragraphs: parsedParagraphs, flatTokens: parsedParagraphs.flat() };
                        });

                        setStories(processed);
                        if (processed.length === 1) openStory(0, id);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            // ── Funciones de Apertura y Reseteo ──
            const openStory = (index, docId = activityId) => {
                setCurIdx(index);
                const saved = localStorage.getItem(`periplo_reading_${docId}_${index}`);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setCurrentSlide(parsed.currentSlide || 0);
                        setDropped(parsed.dropped || {});
                        setScore(parsed.score || 0);
                        setAnsweredQ(parsed.answeredQ || {});
                    } catch(e) { resetProgress(); }
                } else {
                    resetProgress();
                }
            };

            const restartStory = (index, docId = activityId) => {
                // Borra explícitamente el guardado de esta lectura
                localStorage.removeItem(`periplo_reading_${docId}_${index}`);
                setCurIdx(index);
                resetProgress();
            };

            const resetProgress = () => {
                setCurrentSlide(0); setDropped({}); setSlideResult(null); setSelectedWord(null);
                setQaMode(false); setQaFinished(false); setCurrentQIdx(0); setScore(0); setAnsweredQ({});
                setShowSpanish(false);
            };

            const toggleTheme = () => { 
                setIsDarkMode(!isDarkMode); 
                localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); 
            };

            const handleExit = () => {
                const ref = document.referrer;
                if (ref && ref.includes('student_portal.html')) {
                    window.location.href = ref;
                } else if (activityData && activityData.parentPath) {
                    window.location.href = `index.html?folder=${encodeURIComponent(activityData.parentPath)}`;
                } else {
                    window.location.href = 'index.html';
                }
            };

            const backToMenu = () => {
                if (stories.length === 1) handleExit(); 
                else setCurIdx(-1);
            };

            const handleEdit = () => {
                if (!activityId) return;
                const folderParam = (activityData && activityData.parentPath) ? `&folder=${encodeURIComponent(activityData.parentPath)}` : '';
                window.location.href = `dashboard-reading.html?edit=${activityId}${folderParam}`;
            };

            // ═══════════════ TRADUCTOR MÁGICO ═══════════════
            const toggleTranslation = async () => {
                if (Object.keys(translations).length > 0) {
                    setShowSpanish(!showSpanish);
                    return;
                }
                setIsTranslating(true);
                const uniqueWords = [...new Set(wordBank)];
                const newTrans = {};
                
                await Promise.all(uniqueWords.map(async (w) => {
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(w)}&langpair=en|es`);
                        const data = await res.json();
                        newTrans[w] = data.responseData.translatedText.toLowerCase();
                    } catch(e) { newTrans[w] = w; }
                }));
                
                setTranslations(newTrans);
                setShowSpanish(true);
                setIsTranslating(false);
            };

            // ═══════════════ TAP-TO-PLACE ═══════════════
            const handleWordTap = (word) => {
                if (slideResult === 'correct') return;
                setSelectedWord(selectedWord === word ? null : word);
            };

            const handleBlankTap = (tokenId) => {
                if (slideResult === 'correct') return;
                
                if (dropped[tokenId]) {
                    const newDropped = { ...dropped };
                    delete newDropped[tokenId];
                    setDropped(newDropped);
                    setSlideResult(null);
                    return;
                }
                
                if (selectedWord) {
                    setDropped(prev => ({ ...prev, [tokenId]: selectedWord }));
                    setSlideResult(null);
                    setSelectedWord(null);
                }
            };
            
            // ═══════════════ NAVEGACIÓN DE LA LECTURA ═══════════════
            const checkSlideAnswers = () => {
                if (!currentStory) return;
                const currentTokens = currentStory.paragraphs[currentSlide - 1];
                const hidden = currentTokens.filter(t => t.isHidden);
                const isAllCorrect = hidden.every(t => dropped[t.id] === t.text);
                
                setSlideResult(isAllCorrect ? 'correct' : 'wrong');
                if (isAllCorrect) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                } else {
                    setTimeout(() => {
                        const newDropped = { ...dropped };
                        hidden.forEach(t => { if (newDropped[t.id] !== t.text) delete newDropped[t.id]; });
                        setDropped(newDropped);
                        setSlideResult(null);
                    }, 1200);
                }
            };

            const nextSlide = () => {
                setSlideResult(null); setSelectedWord(null);
                setCurrentSlide(c => c + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const prevSlide = () => {
                if (currentSlide > 1) {
                    setSlideResult(null); setSelectedWord(null);
                    setCurrentSlide(c => c - 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            // ═══════════════ Q&A MÚLTIPLE ═══════════════
            const startChallenge = () => {
                if (!currentStory.questions || currentStory.questions.length === 0) { alert("Esta lectura no tiene preguntas."); return; }
                setQaMode(true);
                setCurrentQIdx(0);
                setScore(0);
                setAnsweredQ({});
                generateOptionsFor(0);
            };

            const generateOptionsFor = (qIndex) => {
                setOptionsVisible(false);
                const currentQ = currentStory.questions[qIndex];
                if (!currentQ) return;
                
                if (currentQ.options && typeof currentQ.correctIndex === 'number') {
                    setQaOptions(currentQ.options);
                    return;
                }

                const correctAnswer = currentQ.a || "Yes";
                let distractors = currentStory.questions.filter((_, idx) => idx !== qIndex).map(q => q.a).filter(a => a && a.length > 0);
                const generic = ["I don't know", "Not mentioned", "Maybe later", "It depends"];
                while (distractors.length < 3) distractors.push(generic.pop());

                let opts = [correctAnswer, ...distractors.slice(0, 3)];
                opts.sort(() => Math.random() - 0.5);
                setQaOptions(opts);
            };

            const handleAnswer = (ansIdx) => {
                if (answeredQ[currentQIdx] !== undefined) return;
                
                const currentQ = currentStory.questions[currentQIdx];
                let isCorrect = false;

                if (currentQ.options) {
                    isCorrect = currentQ.correctIndex === ansIdx;
                } else {
                    isCorrect = qaOptions[ansIdx] === currentQ.a;
                }

                setAnsweredQ(prev => ({ ...prev, [currentQIdx]: ansIdx }));
                if (isCorrect) {
                    setScore(s => s + 1);
                    confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
                }

                setTimeout(() => nextQuestion(), 1500);
            };

            const nextQuestion = () => {
                if (currentQIdx < currentStory.questions.length - 1) {
                    setCurrentQIdx(idx => idx + 1);
                    generateOptionsFor(currentQIdx + 1);
                } else {
                    setQaFinished(true);
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                }
            };


            // ═══════════════ RENDER MENÚ ═══════════════
            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <div className="text-center">
                        <Loader2 className="animate-spin text-indigo-500 mx-auto mb-4" size={40}/>
                        <p className="text-slate-400 font-bold tracking-widest text-xs uppercase">Cargando lectura...</p>
                    </div>
                </div>
            );

            if (curIdx === -1) {
                return (
                    <div className={`min-h-screen font-sans flex flex-col transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-800'}`}>
                        <div className={`px-6 py-4 flex items-center justify-between shrink-0 shadow-sm transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 border-b'}`}>
                            <div className="flex items-center gap-4">
                                <button onClick={handleExit} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-slate-100 text-slate-500'}`}><ArrowLeft size={20}/></button>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 text-white flex items-center justify-center"><BookOpen size={16}/></div>
                                    <span className="font-bold uppercase tracking-widest text-xs opacity-50">Reading Module</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {!isStudent && (
                                    <button onClick={handleEdit} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border btn-juicy ${isDarkMode ? 'border-slate-600 hover:bg-slate-700 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'}`}>
                                        <Edit2 size={14}/> Editar
                                    </button>
                                )}
                                <button onClick={toggleTheme} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'hover:bg-slate-100 text-slate-600'}`}>
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar">
                            <div className="max-w-6xl mx-auto">
                                <div className="text-center mb-12 animate-fadeUp">
                                    <h1 className="text-4xl md:text-6xl font-black mb-4 tracking-tight drop-shadow-sm">{activityData.title}</h1>
                                    <p className="text-lg md:text-xl font-medium opacity-60 max-w-2xl mx-auto">Selecciona una lectura interactiva para practicar tu vocabulario y comprensión.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {stories.map((s, i) => {
                                        const wordCount = s.flatTokens ? s.flatTokens.filter(t => t.isWord).length : s.text.split(/\s+/).length;
                                        const blanksCount = s.flatTokens ? s.flatTokens.filter(t => t.isHidden).length : (s.blanks ? s.blanks.length : 0);
                                        return (
                                            <div key={i} onClick={() => openStory(i)} className={`group rounded-[2rem] overflow-hidden shadow-md hover-lift transition-all cursor-pointer border flex flex-col animate-fadeUp ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:border-indigo-500' : 'bg-white border-slate-200 hover:border-indigo-400'}`}>
                                                <div className={`h-48 relative overflow-hidden flex items-center justify-center ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}>
                                                    {s.image_url ? (
                                                        <img src={s.image_url} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"/>
                                                    ) : (
                                                        <div className="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center group-hover:scale-105 transition-transform duration-700">
                                                            <BookOpen size={64} className="text-white opacity-20"/>
                                                        </div>
                                                    )}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
                                                    <div className="absolute bottom-4 left-4 right-4">
                                                        <span className="bg-indigo-600 text-white text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded mb-2 inline-block shadow-lg">Lectura {i + 1}</span>
                                                        <h3 className="text-white font-black text-xl leading-tight line-clamp-2 drop-shadow-md">{s.title || 'Historia'}</h3>
                                                    </div>
                                                </div>
                                                <div className="p-6 flex-1 flex flex-col justify-between gap-6">
                                                    <div className="flex items-center justify-between text-xs font-bold uppercase tracking-widest opacity-60">
                                                        <div className="flex items-center gap-1.5"><LayoutGrid size={14}/> {blanksCount} Huecos</div>
                                                        <div className="flex items-center gap-1.5"><BookOpen size={14}/> {wordCount} Palabras</div>
                                                    </div>
                                                    <button className="btn-juicy w-full py-3.5 rounded-xl font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-all bg-indigo-50 text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white dark:bg-indigo-900/30 dark:text-indigo-400 dark:group-hover:bg-indigo-500 dark:group-hover:text-white">
                                                        Comenzar <ArrowRight size={16}/>
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ═══════════════ VARIABLES SLIDES ═══════════════
            const availableWords = wordBank.filter(word => {
                const totalInText = currentStory.flatTokens.filter(t => t.text === word && t.isHidden).length;
                const totalPlaced = Object.values(dropped).filter(w => w === word).length;
                return totalPlaced < totalInText;
            });

            const totalContentSlides = currentStory.paragraphs.length;
            const hasFunFact = !!currentStory.fun_fact;
            const SLIDE_PARAGRAPH_START = 1;
            const SLIDE_PARAGRAPH_END = totalContentSlides;
            const SLIDE_FUN_FACT = hasFunFact ? SLIDE_PARAGRAPH_END + 1 : null;
            const SLIDE_END = hasFunFact ? SLIDE_PARAGRAPH_END + 2 : SLIDE_PARAGRAPH_END + 1;

            const isOnParagraph = currentSlide >= SLIDE_PARAGRAPH_START && currentSlide <= SLIDE_PARAGRAPH_END;
            const currentParagraphIdx = isOnParagraph ? currentSlide - 1 : -1;
            const currentTokens = isOnParagraph ? currentStory.paragraphs[currentParagraphIdx] : [];
            const isLeftEmoji = currentSlide % 2 !== 0;
            const currentEmojis = EMOJI_SETS[currentSlide % EMOJI_SETS.length];
            
            const hiddenInSlide = currentTokens.filter(t => t.isHidden);
            const requiresCheck = hiddenInSlide.length > 0;
            const isSlideComplete = slideResult === 'correct' || !requiresCheck;

            const isFunFactSlide = SLIDE_FUN_FACT !== null && currentSlide === SLIDE_FUN_FACT;
            const isEndSlide = currentSlide === SLIDE_END;
            const progressTotal = SLIDE_END;

            return (
                <div className="min-h-screen font-sans flex flex-col transition-all duration-700">
                    
                    {currentStory.image_url ? (
                        <div className="fixed inset-0 z-0">
                            <img src={currentStory.image_url} alt="" className="w-full h-full object-cover" style={{ objectPosition: 'center top' }}/>
                            <div className={`absolute inset-0 ${isDarkMode ? 'bg-gradient-to-b from-slate-900/40 via-slate-900/80 to-slate-900' : 'bg-gradient-to-b from-white/30 via-slate-100/80 to-slate-100'}`}></div>
                        </div>
                    ) : (
                        <div className={`fixed inset-0 z-0 ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}></div>
                    )}

                    <div className="relative z-10 flex-1 flex flex-col w-full h-full">
                        
                        {/* ── NAVBAR ORIGINAL (CON ZOOM) ── */}
                        <div className={`px-4 md:px-6 py-3 flex items-center justify-between shrink-0 sticky top-0 z-50 backdrop-blur-xl border-b transition-colors ${isDarkMode ? 'bg-slate-900/70 border-white/5 text-white' : 'bg-white/70 border-slate-200 text-slate-800'}`}>
                            <div className="flex items-center gap-3">
                                <button onClick={backToMenu} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-slate-200 text-slate-600'}`}><ArrowLeft size={20}/></button>
                                <div className="flex flex-col">
                                    <h1 className="text-sm md:text-base font-black leading-tight line-clamp-1">{currentStory.title}</h1>
                                    <span className="text-[10px] font-bold uppercase tracking-widest opacity-40">
                                        {currentSlide === 0 ? 'Portada' : isOnParagraph ? `Párrafo ${currentParagraphIdx + 1} / ${totalContentSlides}` : isEndSlide ? 'Resumen' : ''}
                                    </span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className={`hidden md:flex items-center gap-1 px-3 py-2 rounded-xl ${isDarkMode ? 'bg-slate-800' : 'bg-white border border-slate-200'}`}>
                                    {Array.from({ length: progressTotal + 1 }).map((_, i) => (
                                        <div key={i} className={`progress-dot ${i === currentSlide ? 'active' : ''} ${i <= currentSlide ? 'bg-indigo-500' : (isDarkMode ? 'bg-slate-700' : 'bg-slate-300')}`}/>
                                    ))}
                                </div>
                                <div className={`flex items-center gap-1 md:gap-2 px-2 py-1.5 md:px-3 rounded-xl border shrink-0 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                    <button onClick={() => setFontSize(s => Math.max(14, s - 2))} className="p-1 md:p-1.5 rounded hover:bg-opacity-20 opacity-70 hover:opacity-100 btn-juicy"><ZoomOut size={18}/></button>
                                    <span className="text-xs font-bold w-6 md:w-10 text-center opacity-50">{fontSize}</span>
                                    <button onClick={() => setFontSize(s => Math.min(40, s + 2))} className="p-1 md:p-1.5 rounded hover:bg-opacity-20 opacity-70 hover:opacity-100 btn-juicy"><ZoomIn size={18}/></button>
                                </div>
                                <button onClick={toggleTheme} className={`hidden md:block p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'bg-white border border-slate-200 hover:bg-slate-100 text-slate-600'}`}>
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>
                        </div>

                        {/* ── Q&A OVERLAY (MÚLTIPLE OPCIÓN) ── */}
                        {qaMode && (
                            <div className="fixed inset-0 z-[60] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4 animate-scaleIn">
                                {qaFinished ? (
                                    <div className={`rounded-[3rem] p-10 md:p-12 text-center max-w-lg w-full shadow-2xl ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                                        <div className="w-24 h-24 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-500 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Trophy size={48} strokeWidth={2.5}/>
                                        </div>
                                        <h2 className={`text-4xl font-black mb-2 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>¡Completado!</h2>
                                        <div className="flex items-center justify-center gap-1 mb-8">
                                            {Array.from({ length: currentStory.questions.length }).map((_, i) => (
                                                <Star key={i} size={32} className={i < score ? 'text-yellow-400 fill-yellow-400' : (isDarkMode ? 'text-slate-700' : 'text-slate-200')} />
                                            ))}
                                        </div>
                                        <div className="flex flex-col gap-3 max-w-sm mx-auto">
                                            {/* AQUÍ ESTÁ EL FIX DEL RESTART STORY */}
                                            <button onClick={() => restartStory(curIdx)} className="btn-juicy w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl flex items-center justify-center gap-2">
                                                <RotateCcw size={20}/> Reiniciar Lectura
                                            </button>
                                            <button onClick={() => setQaMode(false)} className={`btn-juicy w-full py-3 rounded-2xl font-bold border ${isDarkMode ? 'border-slate-600 text-slate-300 hover:bg-slate-700' : 'border-slate-300 text-slate-600 hover:bg-slate-100'}`}>
                                                Ver Resumen
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className={`w-full max-w-2xl rounded-[2rem] overflow-hidden shadow-2xl flex flex-col ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                                        <div className="bg-slate-900 text-white p-5 flex justify-between items-center relative z-10">
                                            <span className="font-black tracking-widest text-slate-400 text-xs uppercase flex items-center gap-2">
                                                <Swords size={16}/> Pregunta {currentQIdx + 1}/{currentStory.questions.length}
                                            </span>
                                            <button onClick={() => setQaMode(false)} className="text-slate-500 hover:text-white transition-colors p-1"><X size={16}/></button>
                                        </div>
                                        
                                        <div className="p-6 md:p-10 flex flex-col items-center">
                                            <h3 className={`text-xl md:text-2xl font-black mb-8 text-center ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>
                                                "{currentStory.questions[currentQIdx].q}"
                                            </h3>
                                            
                                            {!optionsVisible && answeredQ[currentQIdx] === undefined ? (
                                                <button onClick={() => setOptionsVisible(true)}
                                                    className="btn-juicy bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold text-lg shadow-lg flex items-center gap-2 animate-pulseGlow">
                                                    <Eye size={20}/> Mostrar Opciones
                                                </button>
                                            ) : (
                                                <div className="flex flex-col gap-3 w-full max-w-md animate-fadeUp">
                                                    {qaOptions.map((opt, idx) => {
                                                        const selected = answeredQ[currentQIdx];
                                                        const isSelected = selected === idx;
                                                        
                                                        let isCorrect = false;
                                                        if (currentStory.questions[currentQIdx].options) {
                                                            isCorrect = currentStory.questions[currentQIdx].correctIndex === idx;
                                                        } else {
                                                            isCorrect = opt === currentStory.questions[currentQIdx].a;
                                                        }

                                                        const showResult = selected !== undefined;
                                                        
                                                        let style = isDarkMode 
                                                            ? "bg-slate-700/50 border-slate-600 text-slate-200" 
                                                            : "bg-slate-50 border-slate-200 text-slate-700";
                                                            
                                                        if (showResult) {
                                                            if (isCorrect) style = "bg-emerald-500/15 border-emerald-500/50 text-emerald-600 dark:text-emerald-400 ring-1 ring-emerald-500/30";
                                                            else if (isSelected && !isCorrect) style = "bg-rose-500/15 border-rose-500/50 text-rose-600 dark:text-rose-400";
                                                            else style = isDarkMode ? "bg-slate-800/50 border-transparent text-slate-500" : "bg-slate-100 border-transparent text-slate-400";
                                                        }

                                                        return (
                                                            <button key={idx} onClick={() => handleAnswer(idx)} disabled={showResult}
                                                                className={`quiz-opt p-4 rounded-xl border text-left font-bold flex justify-between items-center gap-3 text-sm ${style}`}>
                                                                <span>{opt}</span>
                                                                {showResult && isCorrect && <CheckCircle2 size={18} className="text-emerald-500 shrink-0"/>}
                                                                {showResult && isSelected && !isCorrect && <XCircle size={18} className="text-rose-500 shrink-0"/>}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── MAIN LAYOUT ── */}
                        <div className={`max-w-[1400px] mx-auto w-full p-4 md:p-8 flex-1 flex flex-col lg:grid lg:grid-cols-12 gap-6 md:gap-8 items-start ${qaMode ? 'hidden' : ''}`}>
                            
                            {/* ── TEXT AREA ── */}
                            <div className={`w-full flex-1 flex flex-col justify-center animate-fadeUp ${isOnParagraph && !isEndSlide ? 'order-2 lg:order-1 lg:col-span-8' : 'order-1 lg:col-span-12'}`}>
                                
                                {currentSlide === 0 && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-16 text-center animate-scaleIn ${isDarkMode ? 'bg-slate-800/80 border-slate-700/50 text-white backdrop-blur-lg' : 'bg-white/80 border-white/50 text-slate-800 backdrop-blur-lg'}`}>
                                        {currentStory.image_url ? (
                                            <div className="w-28 h-28 md:w-36 md:h-36 mx-auto rounded-3xl overflow-hidden shadow-2xl mb-8 border-4 border-white/20">
                                                <img src={currentStory.image_url} alt="" className="w-full h-full object-cover"/>
                                            </div>
                                        ) : (
                                            <div className="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white mb-8 shadow-lg">
                                                <GraduationCap size={40} />
                                            </div>
                                        )}
                                        <h2 className="text-4xl md:text-6xl font-black mb-4">{currentStory.title}</h2>
                                        
                                        <div className={`flex items-center justify-center gap-6 mb-10 text-sm font-bold ${isDarkMode ? 'text-slate-500' : 'text-slate-400'}`}>
                                            <span className="flex items-center gap-1.5"><LayoutGrid size={16}/> {currentStory.flatTokens.filter(t => t.isHidden).length} huecos</span>
                                            <span className="flex items-center gap-1.5"><BookOpen size={16}/> {totalContentSlides} párrafos</span>
                                        </div>

                                        <button onClick={nextSlide} className="btn-juicy px-10 py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-black text-xl shadow-xl flex items-center gap-3 mx-auto animate-pulseGlow">
                                            Comenzar Lectura <ArrowRight size={24}/>
                                        </button>
                                    </div>
                                )}

                                {isOnParagraph && (
                                    <div className="space-y-4 md:space-y-6" key={`slide-${currentSlide}`}>
                                        
                                        {/* INSTRUCCIONES: Solo en el párrafo 1, estilo Listening */}
                                        {currentSlide === 1 && (
                                            <div className={`rounded-2xl p-4 flex gap-4 items-start shadow-sm border animate-fadeUp ${isDarkMode ? 'bg-indigo-900/30 border-indigo-500/30' : 'bg-indigo-50 border-indigo-200'}`}>
                                                <div className={`p-2 rounded-xl shrink-0 ${isDarkMode ? 'bg-indigo-500/20 text-indigo-400' : 'bg-indigo-100 text-indigo-600'}`}><Info size={20}/></div>
                                                <div className={`text-sm font-medium leading-relaxed ${isDarkMode ? 'text-indigo-100/80' : 'text-indigo-900/80'}`}>
                                                    <strong>Instrucciones:</strong> Asegúrate de saber qué significan las palabras del Word Bank (usa el botón Traducir). Luego, <strong className="text-indigo-500 dark:text-indigo-400">toca la palabra que creas y luego toca el hueco en el texto</strong>. ¡No arrastres las palabras!
                                                </div>
                                            </div>
                                        )}

                                        <div className={`relative rounded-[2rem] shadow-2xl border p-6 md:p-10 leading-loose transition-all duration-300 flex items-stretch ${isDarkMode ? 'bg-slate-800/90 border-slate-700 text-slate-200 backdrop-blur-lg' : 'bg-white/90 border-white text-slate-700 backdrop-blur-lg'}`} style={{ fontSize: `${fontSize}px` }}>
                                            {isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pr-6 border-r border-slate-200 dark:border-slate-700 mr-6 opacity-40 z-10">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                            
                                            <div className="flex-1 font-medium text-justify relative z-20">
                                                <div className="flex items-center justify-between mb-4 md:mb-6 border-b pb-3 border-slate-200 dark:border-slate-700">
                                                    <span className="text-xs font-black uppercase tracking-widest opacity-40">Párrafo {currentParagraphIdx + 1} / {totalContentSlides}</span>
                                                    {requiresCheck && !isSlideComplete && <span className="text-xs font-black uppercase tracking-widest text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full">{hiddenInSlide.length - Object.keys(dropped).filter(k => hiddenInSlide.some(h => h.id === parseInt(k))).length} restantes</span>}
                                                    {isSlideComplete && <span className="text-xs font-black uppercase tracking-widest text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full flex items-center gap-1"><CheckCircle2 size={14}/> Correcto</span>}
                                                </div>

                                                {currentTokens.map((t, i) => {
                                                    if (t.isHidden) {
                                                        const val = dropped[t.id];
                                                        let stateClass = isDarkMode ? 'token-hidden-dark' : 'token-hidden-light';
                                                        if (val) stateClass = 'token-filled'; 
                                                        if (slideResult === 'correct') stateClass = 'token-correct';
                                                        if (slideResult === 'wrong' && val) stateClass = val === t.text ? 'token-correct' : 'token-wrong';
                                                        
                                                        const prevIsH = i > 0 && currentTokens[i-1].isHidden;
                                                        const nextIsH = i < currentTokens.length - 1 && currentTokens[i+1].isHidden;
                                                        let shapeClass = "token-single";
                                                        if (prevIsH && nextIsH) shapeClass = "token-middle";
                                                        else if (prevIsH) shapeClass = "token-end";
                                                        else if (nextIsH) shapeClass = "token-start";

                                                        return <span key={i} onClick={() => handleBlankTap(t.id)} className={`token-base ${stateClass} ${shapeClass} ${!val && selectedWord ? 'animate-pulseGlow' : ''}`}>{val || ""}</span>;
                                                    }
                                                    if (t.text.match(/\n/)) return <br key={i}/>;
                                                    return <span key={i}>{t.text}</span>;
                                                })}
                                            </div>

                                            {!isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pl-6 border-l border-slate-200 dark:border-slate-700 ml-6 opacity-40 z-10">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                        </div>

                                        <div className="flex justify-between items-center pt-2">
                                            {/* BOTÓN ATRÁS (RELEER PÁRRAFOS) */}
                                            <button onClick={prevSlide} className={`btn-juicy px-5 py-3.5 rounded-2xl font-bold flex items-center gap-2 transition-colors ${currentSlide === 1 ? 'opacity-0 pointer-events-none' : (isDarkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-600 hover:bg-slate-300')}`}>
                                                <ArrowLeft size={18}/> Atrás
                                            </button>

                                            {requiresCheck && !isSlideComplete ? (
                                                <button onClick={checkSlideAnswers} className={`btn-juicy px-8 py-3.5 rounded-2xl font-black shadow-xl flex items-center gap-2 ${isDarkMode ? 'bg-slate-700 text-white hover:bg-slate-600' : 'bg-slate-900 text-white hover:bg-slate-800'}`}>
                                                    <CheckCircle2 size={20}/> Verificar
                                                </button>
                                            ) : (
                                                <button onClick={nextSlide} className="btn-juicy bg-emerald-500 text-white px-8 py-3.5 rounded-2xl font-black shadow-xl flex items-center gap-2 animate-fadeUp">
                                                    {currentSlide === SLIDE_PARAGRAPH_END ? (hasFunFact ? 'Sabías que...' : 'Resumen') : 'Siguiente'} <ArrowRight size={20}/>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {isFunFactSlide && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-14 text-center max-w-2xl mx-auto animate-scaleIn ${isDarkMode ? 'bg-amber-900/30 border-amber-500/20 backdrop-blur-lg' : 'bg-amber-50 border-amber-200'}`}>
                                        <div className={`w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-8 shadow-lg ${isDarkMode ? 'bg-amber-500/20 text-amber-400' : 'bg-white text-amber-500'}`}>
                                            <Lightbulb size={40} strokeWidth={2.5}/>
                                        </div>
                                        <h3 className={`font-black text-sm uppercase tracking-[0.2em] mb-6 ${isDarkMode ? 'text-amber-400' : 'text-amber-800'}`}>Did You Know?</h3>
                                        <p className={`text-xl md:text-2xl font-medium leading-relaxed mb-10 ${isDarkMode ? 'text-amber-100/90' : 'text-amber-900/80'}`}>{currentStory.fun_fact}</p>
                                        
                                        <button onClick={nextSlide} className="btn-juicy bg-amber-500 hover:bg-amber-400 text-white px-10 py-4 rounded-full font-black text-lg shadow-xl flex items-center gap-3 mx-auto">
                                            Continuar <ArrowRight size={24}/>
                                        </button>
                                    </div>
                                )}

                                {isEndSlide && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-14 text-center max-w-2xl mx-auto animate-scaleIn ${isDarkMode ? 'bg-slate-800/90 border-slate-700 backdrop-blur-lg text-white' : 'bg-white/90 border-white text-slate-800 backdrop-blur-lg'}`}>
                                        <div className="w-24 h-24 mx-auto rounded-full bg-emerald-100 dark:bg-emerald-900/50 text-emerald-500 flex items-center justify-center mb-8">
                                            <CheckCircle2 size={56} strokeWidth={3} />
                                        </div>
                                        <h2 className="text-3xl md:text-5xl font-black mb-4">¡Lectura Completada!</h2>
                                        <p className={`text-lg mb-10 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Has rellenado correctamente todos los párrafos.</p>
                                        
                                        <div className="flex flex-col gap-3 max-w-sm mx-auto">
                                            {currentStory.questions && currentStory.questions.length > 0 && (
                                                <button onClick={startChallenge} className="btn-juicy w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-500 flex items-center justify-center gap-2 text-lg animate-pulseGlow">
                                                    <Swords size={24}/> CHALLENGE Q&A <ArrowRight size={20}/>
                                                </button>
                                            )}
                                            {/* AQUÍ ESTÁ EL FIX DEL RESTART STORY */}
                                            <button onClick={() => restartStory(curIdx)} className={`btn-juicy w-full py-4 rounded-2xl font-black border flex items-center justify-center gap-2 ${isDarkMode ? 'border-slate-600 hover:bg-slate-700 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'}`}>
                                                <RotateCcw size={20}/> Volver a Leer
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* ── WORD BANK SIDEBAR ── */}
                            {isOnParagraph && !isEndSlide && (
                                <div className="order-1 lg:order-2 lg:col-span-4 w-full lg:sticky lg:top-20 lg:self-start flex flex-col gap-4 animate-fadeUp">
                                    <div className={`rounded-[2rem] shadow-xl border overflow-hidden flex flex-col h-full max-h-[350px] lg:max-h-full ${isDarkMode ? 'bg-slate-800/90 border-slate-700 backdrop-blur-lg' : 'bg-white/90 border-white backdrop-blur-lg'}`}>
                                        <div className="bg-slate-900 p-4 flex items-center justify-between text-white shrink-0">
                                            <div className="flex items-center gap-2 font-black uppercase text-xs tracking-widest">
                                                <Puzzle size={18} className="text-indigo-400"/> Word Bank
                                                <span className="ml-2 bg-slate-800 px-2 py-1 rounded-lg text-[10px] font-bold text-slate-400">{availableWords.length} left</span>
                                            </div>
                                            
                                            {/* BOTÓN TRADUCIR NOTORIO */}
                                            <button onClick={toggleTranslation} disabled={isTranslating}
                                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-colors btn-juicy shadow-sm border ${
                                                    showSpanish
                                                        ? 'bg-indigo-600 text-white border-indigo-700 hover:bg-indigo-500'
                                                        : isDarkMode
                                                            ? 'bg-slate-700 text-slate-200 border-slate-600 hover:bg-slate-600 hover:text-white'
                                                            : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'
                                                }`}
                                            >
                                                {isTranslating ? <Loader2 size={14} className="animate-spin"/> : <Languages size={14}/>}
                                                {showSpanish ? 'Inglés' : 'Traducir'}
                                            </button>
                                        </div>
                                        
                                        <div className={`p-4 md:p-5 overflow-y-auto custom-scrollbar flex-1 ${isDarkMode ? 'bg-slate-800/50' : 'bg-slate-50'}`}>
                                            {availableWords.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center py-8 text-center">
                                                    <CheckCircle2 size={48} className="mb-4 opacity-30 text-emerald-500"/>
                                                    <p className="text-lg font-black uppercase tracking-widest text-emerald-500">¡Perfecto!</p>
                                                </div>
                                            ) : (
                                                <div className="flex flex-wrap gap-2 md:gap-3">
                                                    {availableWords.map((w, i) => {
                                                        const displayWord = showSpanish && translations[w] ? translations[w] : w;
                                                        const isSelected = selectedWord === w;
                                                        return (
                                                            <div key={`${w}-${i}`} onClick={() => handleWordTap(w)}
                                                                className={`word-chip border border-b-4 px-4 py-2.5 rounded-xl font-bold shadow-sm transition-all cursor-pointer text-sm md:text-base ${
                                                                    isSelected 
                                                                        ? 'bg-indigo-600 border-indigo-700 border-b-indigo-900 text-white scale-105 shadow-lg shadow-indigo-500/30' 
                                                                        : isDarkMode 
                                                                            ? 'bg-slate-700 border-slate-600 border-b-slate-900 text-slate-200 hover:bg-slate-600' 
                                                                            : 'bg-white border-slate-300 border-b-slate-300 text-slate-700 hover:bg-slate-100'
                                                                }`}
                                                            >{displayWord}</div>
                                                        )
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ReadingActivity />);
    </script>

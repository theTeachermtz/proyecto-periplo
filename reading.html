<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reading Activity | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    
    <script src="https://unpkg.com/fast-average-color/dist/index.browser.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root { --theme-color: 99, 102, 241; --theme-light: 224, 231, 255; }
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #f8fafc; overflow-x: clip; -webkit-tap-highlight-color: transparent; }
        
        .token-base {
            display: inline-flex; align-items: center; justify-content: center; vertical-align: middle;
            padding: 0 0.5em; min-width: 3em; height: 1.8em; transition: all 0.2s ease; cursor: pointer;
        }
        .token-start { border-top-left-radius: 0.4em; border-bottom-left-radius: 0.4em; margin-left: 0.2em; border-left-width: 2px !important; }
        .token-end { border-top-right-radius: 0.4em; border-bottom-right-radius: 0.4em; margin-right: 0.2em; border-right-width: 2px !important; }
        .token-middle { border-left-width: 0px !important; border-right-width: 0px !important; margin: 0; border-radius: 0; }
        .token-single { border-radius: 0.4em; margin: 0 0.2em; border-left-width: 2px !important; border-right-width: 2px !important; }

        .token-hidden-dark { background-color: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); border-bottom-width: 4px; }
        .token-filled { background-color: rgba(var(--theme-color), 0.15); border: 2px solid rgba(var(--theme-color), 0.8); color: rgba(var(--theme-light), 1); font-weight: 800; border-bottom-width: 4px; }
        .token-correct { background-color: rgba(16, 185, 129, 0.15) !important; border: 2px solid #10b981 !important; color: #34d399 !important; border-bottom-width: 4px !important; }
        .token-wrong { background-color: rgba(244, 63, 94, 0.15) !important; border: 2px solid #f43f5e !important; color: #fb7185 !important; border-bottom-width: 4px !important; animation: shake 0.4s; }

        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--theme-color), 0.4); } 50% { box-shadow: 0 0 0 12px rgba(var(--theme-color), 0); } }
        
        .timer-bar { animation: shrink linear forwards; }
        .animate-shake { animation: shake 0.4s; }
        .animate-fadeUp { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-scaleIn { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .animate-pulseGlow { animation: pulseGlow 2s infinite; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .btn-juicy { transition: transform 0.15s ease, opacity 0.15s ease; }
        .btn-juicy:active:not(:disabled) { transform: scale(0.96) !important; }

        /* Multiple Choice quiz styles */
        .quiz-opt { transition: all 0.2s ease; }
        .quiz-opt:hover:not(:disabled) { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }

        .progress-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s ease; }
        .progress-dot.active { width: 24px; border-radius: 4px; background-color: rgb(var(--theme-color)); }
    </style>
</head>
<body class="bg-zinc-950 text-slate-100 min-h-[100dvh]">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, CheckCircle2, RotateCcw, ArrowLeft, Lightbulb, Puzzle, Moon, Sun, ZoomIn, ZoomOut, Timer, Swords, ArrowRight, PlayCircle, BookOpen, LayoutGrid, Award, GraduationCap, Star, Trophy, Sparkles, X, Languages, Info, Eye, XCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const EMOJI_SETS = [
            ['🌟','✨','🚀','💫','⭐'],
            ['🎯','🏆','💡','🔥','🧩'],
            ['📚','📖','✏️','📝','🧠'],
            ['🎨','🎭','🎪','🌈','🎉']
        ];

        const ReadingActivity = () => {
            const [loading, setLoading] = useState(true);
            const [activityData, setActivityData] = useState(null);
            const [activityId, setActivityId] = useState(null);
            const [stories, setStories] = useState([]);
            const [curIdx, setCurIdx] = useState(-1); 

            // Progress & Navigation
            const [currentSlide, setCurrentSlide] = useState(0); 
            const [slideResult, setSlideResult] = useState(null); 
            const [dropped, setDropped] = useState({});
            const [selectedWord, setSelectedWord] = useState(null);
            
            const [fontSize, setFontSize] = useState(window.innerWidth < 768 ? 16 : 20);

            // Translation State
            const [translations, setTranslations] = useState({});
            const [isTranslating, setIsTranslating] = useState(false);
            const [showSpanish, setShowSpanish] = useState(false);

            // Q&A State
            const [qaMode, setQaMode] = useState(false);
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [qaOptions, setQaOptions] = useState([]);
            const [optionsVisible, setOptionsVisible] = useState(false);
            const [qaFinished, setQaFinished] = useState(false);
            const [score, setScore] = useState(0);
            const [answeredQ, setAnsweredQ] = useState({});

            const currentStory = curIdx !== -1 ? stories[curIdx] : null;

            const wordBank = useMemo(() => {
                if (!currentStory) return [];
                return currentStory.flatTokens.filter(t => t.isHidden).map(t => t.text).sort(() => Math.random() - 0.5); 
            }, [currentStory]);

            // ═══════════════ AUTO-GUARDADO ═══════════════
            useEffect(() => {
                if (activityId && curIdx !== -1) {
                    const saveObj = { currentSlide, dropped, score, answeredQ };
                    localStorage.setItem(`periplo_reading_${activityId}_${curIdx}`, JSON.stringify(saveObj));
                }
            }, [currentSlide, dropped, score, answeredQ, activityId, curIdx]);

            // ═══════════════ COLOR DINÁMICO ═══════════════
            useEffect(() => {
                if (currentStory && currentStory.image_url) {
                    const fac = new FastAverageColor();
                    fac.getColorAsync(currentStory.image_url, { crossOrigin: 'anonymous' })
                        .then(color => {
                            const [r, g, b] = color.value;
                            document.documentElement.style.setProperty('--theme-color', `${r}, ${g}, ${b}`);
                        })
                        .catch(e => {
                            // Fallback indigo si falla CORS
                            document.documentElement.style.setProperty('--theme-color', '99, 102, 241');
                        });
                }
            }, [currentStory]);

            useEffect(() => {
                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) return;
                    setActivityId(id);
                    
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const savedData = snap.data();
                        setActivityData(savedData);
                        
                        let loadedStories = savedData.stories || (savedData.content ? [{...savedData.content, title: savedData.title}] : []);

                        const processed = loadedStories.map(s => {
                            const rawParagraphs = s.text.split(/\n\n+/).filter(p => p.trim().length > 0);
                            let globalId = 0;
                            const parsedParagraphs = rawParagraphs.map(p => {
                                const regex = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s\[\]]+|\s+)/g;
                                return (p.match(regex) || []).map(part => {
                                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                                    let cleanText = isBracketed ? part.slice(1, -1) : part;
                                    let isWord = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(cleanText);
                                    let isHidden = isBracketed && isWord;
                                    return { id: globalId++, text: cleanText, isWord, isHidden };
                                });
                            });
                            return { ...s, paragraphs: parsedParagraphs, flatTokens: parsedParagraphs.flat() };
                        });

                        setStories(processed);
                        if (processed.length === 1) openStory(0, id);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            const openStory = (index, docId = activityId) => {
                setCurIdx(index);
                // Intentar recuperar progreso
                const saved = localStorage.getItem(`periplo_reading_${docId}_${index}`);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setCurrentSlide(parsed.currentSlide || 0);
                        setDropped(parsed.dropped || {});
                        setScore(parsed.score || 0);
                        setAnsweredQ(parsed.answeredQ || {});
                    } catch(e) { resetProgress(); }
                } else {
                    resetProgress();
                }
            };

            const resetProgress = () => {
                setCurrentSlide(0); setDropped({}); setSlideResult(null); setSelectedWord(null);
                setQaMode(false); setQaFinished(false); setCurrentQIdx(0); setScore(0); setAnsweredQ({});
            };

            const handleExit = () => {
                const ref = document.referrer;
                if (ref && ref.includes('student_portal.html')) {
                    window.location.href = ref; // Regresa al portal del alumno
                } else if (activityData && activityData.parentPath) {
                    window.location.href = `index.html?folder=${encodeURIComponent(activityData.parentPath)}`;
                } else {
                    window.location.href = 'index.html';
                }
            };

            const backToMenu = () => {
                if (stories.length === 1) handleExit(); 
                else setCurIdx(-1);
            };

            // ═══════════════ TRADUCTOR MAGICO ═══════════════
            const toggleTranslation = async () => {
                if (Object.keys(translations).length > 0) {
                    setShowSpanish(!showSpanish);
                    return;
                }
                setIsTranslating(true);
                const uniqueWords = [...new Set(wordBank)];
                const newTrans = {};
                
                // Usamos Promesas en paralelo para mayor velocidad
                await Promise.all(uniqueWords.map(async (w) => {
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(w)}&langpair=en|es`);
                        const data = await res.json();
                        newTrans[w] = data.responseData.translatedText.toLowerCase();
                    } catch(e) {
                        newTrans[w] = w; // Fallback
                    }
                }));
                
                setTranslations(newTrans);
                setShowSpanish(true);
                setIsTranslating(false);
            };

            // ═══════════════ TAP TO PLACE (SIN DRAG) ═══════════════
            const handleWordTap = (word) => {
                if (slideResult === 'correct') return;
                setSelectedWord(selectedWord === word ? null : word);
            };

            const handleBlankTap = (tokenId) => {
                if (slideResult === 'correct') return;
                
                // Si ya tiene una palabra, la quitamos al tocar
                if (dropped[tokenId]) {
                    const newDropped = { ...dropped };
                    delete newDropped[tokenId];
                    setDropped(newDropped);
                    setSlideResult(null);
                    return;
                }
                
                // Si hay palabra seleccionada, la ponemos
                if (selectedWord) {
                    setDropped(prev => ({ ...prev, [tokenId]: selectedWord }));
                    setSlideResult(null);
                    setSelectedWord(null);
                }
            };
            
            // ── Check & Navigate ──
            const checkSlideAnswers = () => {
                const currentTokens = currentStory.paragraphs[currentSlide - 1];
                const hidden = currentTokens.filter(t => t.isHidden);
                const isAllCorrect = hidden.every(t => dropped[t.id] === t.text);
                
                setSlideResult(isAllCorrect ? 'correct' : 'wrong');
                if (isAllCorrect) {
                    confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 }, colors: ['#10b981', '#3b82f6', '#8b5cf6'] });
                } else {
                    setTimeout(() => {
                        const newDropped = { ...dropped };
                        hidden.forEach(t => { if (newDropped[t.id] !== t.text) delete newDropped[t.id]; });
                        setDropped(newDropped);
                        setSlideResult(null);
                    }, 1200);
                }
            };

            const nextSlide = () => {
                setSlideResult(null); setSelectedWord(null);
                setCurrentSlide(c => c + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const prevSlide = () => {
                if (currentSlide > 0) {
                    setSlideResult(null); setSelectedWord(null);
                    setCurrentSlide(c => c - 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            // ═══════════════ MULTIPLE CHOICE Q&A ═══════════════
            const startChallenge = () => {
                setQaMode(true);
                setCurrentQIdx(0);
                setScore(0);
                setAnsweredQ({});
                generateOptionsFor(0);
            };

            const generateOptionsFor = (qIndex) => {
                setOptionsVisible(false);
                const currentQ = currentStory.questions[qIndex];
                if (!currentQ) return;
                
                // Si la BD ya tiene opciones (estructura nueva)
                if (currentQ.options && typeof currentQ.correctIndex === 'number') {
                    setQaOptions(currentQ.options);
                    return;
                }

                // Si es estructura vieja ({q, a}), generamos distractores dinámicos
                const correctAnswer = currentQ.a || "Yes";
                let distractors = currentStory.questions
                    .filter((_, idx) => idx !== qIndex)
                    .map(q => q.a)
                    .filter(a => a && a.length > 0);
                
                // Rellenar si faltan distractores
                const generic = ["I don't know", "Not mentioned in the text", "Maybe later", "It depends"];
                while (distractors.length < 3) {
                    distractors.push(generic.pop());
                }

                let opts = [correctAnswer, ...distractors.slice(0, 3)];
                opts.sort(() => Math.random() - 0.5); // Shuffle
                setQaOptions(opts);
            };

            const handleAnswer = (ansIdx) => {
                if (answeredQ[currentQIdx] !== undefined) return;
                
                const currentQ = currentStory.questions[currentQIdx];
                let isCorrect = false;

                if (currentQ.options) {
                    isCorrect = currentQ.correctIndex === ansIdx;
                } else {
                    isCorrect = qaOptions[ansIdx] === currentQ.a;
                }

                setAnsweredQ(prev => ({ ...prev, [currentQIdx]: ansIdx }));
                if (isCorrect) {
                    setScore(s => s + 1);
                    confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
                }

                setTimeout(() => nextQuestion(), 1500);
            };

            const nextQuestion = () => {
                if (currentQIdx < currentStory.questions.length - 1) {
                    setCurrentQIdx(idx => idx + 1);
                    generateOptionsFor(currentQIdx + 1);
                } else {
                    setQaFinished(true);
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                }
            };


            // ═══════════════ RENDERERS ═══════════════
            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-zinc-950">
                    <div className="w-12 h-12 border-4 border-zinc-700 border-t-indigo-500 rounded-full animate-spin"></div>
                </div>
            );

            if (curIdx === -1) {
                // Menú de Selección (Mismo diseño pero con tema oscuro y elegante)
                return (
                    <div className="min-h-screen font-sans flex flex-col bg-zinc-950">
                        <div className="px-6 py-4 flex items-center justify-between shrink-0 border-b border-white/10 bg-black/40 backdrop-blur-md">
                            <div className="flex items-center gap-4">
                                <button onClick={handleExit} className="p-2 rounded-full hover:bg-white/10 text-zinc-400 btn-juicy"><ArrowLeft size={20}/></button>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 rounded-lg bg-indigo-500/20 text-indigo-400 flex items-center justify-center"><BookOpen size={16}/></div>
                                    <span className="font-bold uppercase tracking-widest text-xs opacity-50">Reading Module</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar">
                            <div className="max-w-6xl mx-auto">
                                <div className="text-center mb-12 animate-fadeUp">
                                    <h1 className="text-4xl md:text-5xl font-black mb-4 tracking-tight text-white">{activityData.title}</h1>
                                    <p className="text-lg font-medium text-zinc-400 max-w-2xl mx-auto">Selecciona una lectura para practicar vocabulario y comprensión.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {stories.map((s, i) => {
                                        return (
                                            <div key={i} onClick={() => openStory(i)} className="group rounded-3xl overflow-hidden bg-zinc-900 border border-zinc-800 hover:border-indigo-500/50 transition-all cursor-pointer flex flex-col animate-fadeUp">
                                                <div className="h-48 relative bg-zinc-800">
                                                    {s.image_url ? (
                                                        <img src={s.image_url} alt="" className="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700"/>
                                                    ) : (
                                                        <div className="w-full h-full bg-gradient-to-br from-zinc-800 to-zinc-900 flex items-center justify-center group-hover:scale-105 transition-transform duration-700">
                                                            <BookOpen size={48} className="text-zinc-700"/>
                                                        </div>
                                                    )}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                                    <div className="absolute bottom-4 left-4 right-4">
                                                        <span className="bg-indigo-500 text-white text-[10px] font-black uppercase px-2 py-1 rounded mb-2 inline-block">Lectura {i + 1}</span>
                                                        <h3 className="text-white font-black text-xl line-clamp-2">{s.title || 'Historia'}</h3>
                                                    </div>
                                                </div>
                                                <div className="p-6">
                                                    <button className="btn-juicy w-full py-3.5 rounded-xl font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-all bg-white/5 text-zinc-300 group-hover:bg-indigo-600 group-hover:text-white">
                                                        Comenzar <ArrowRight size={16}/>
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Variables de Paginación
            const availableWords = wordBank.filter(word => {
                const totalInText = currentStory.flatTokens.filter(t => t.text === word && t.isHidden).length;
                const totalPlaced = Object.values(dropped).filter(w => w === word).length;
                return totalPlaced < totalInText;
            });

            const totalContentSlides = currentStory.paragraphs.length;
            const hasFunFact = !!currentStory.fun_fact;
            const SLIDE_TITLE = 0;
            const SLIDE_PARAGRAPH_START = 1;
            const SLIDE_PARAGRAPH_END = totalContentSlides;
            const SLIDE_FUN_FACT = hasFunFact ? SLIDE_PARAGRAPH_END + 1 : null;
            const SLIDE_END = hasFunFact ? SLIDE_PARAGRAPH_END + 2 : SLIDE_PARAGRAPH_END + 1;

            const isOnParagraph = currentSlide >= SLIDE_PARAGRAPH_START && currentSlide <= SLIDE_PARAGRAPH_END;
            const currentParagraphIdx = isOnParagraph ? currentSlide - 1 : -1;
            const currentTokens = isOnParagraph ? currentStory.paragraphs[currentParagraphIdx] : [];
            const isLeftEmoji = currentSlide % 2 !== 0;
            const currentEmojis = EMOJI_SETS[currentSlide % EMOJI_SETS.length];
            
            const hiddenInSlide = currentTokens.filter(t => t.isHidden);
            const requiresCheck = hiddenInSlide.length > 0;
            const isSlideComplete = slideResult === 'correct' || (!requiresCheck && Object.keys(dropped).length > 0) || !requiresCheck;

            const isFunFactSlide = SLIDE_FUN_FACT !== null && currentSlide === SLIDE_FUN_FACT;
            const isEndSlide = currentSlide === SLIDE_END;

            return (
                <div className="min-h-screen font-sans flex flex-col relative" style={{ backgroundColor: 'rgba(var(--theme-color), 0.05)' }}>
                    
                    {/* Background Dynamic Blur */}
                    {currentStory.image_url && (
                        <div className="fixed inset-0 z-0 opacity-10 blur-[80px] scale-110 saturate-150 pointer-events-none"
                            style={{ backgroundImage: `url(${currentStory.image_url})`, backgroundSize: 'cover', backgroundPosition: 'center' }}/>
                    )}
                    
                    {/* Navbar */}
                    <div className="px-4 py-3 flex items-center justify-between sticky top-0 z-50 bg-black/40 backdrop-blur-xl border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <button onClick={backToMenu} className="p-2 rounded-full hover:bg-white/10 text-zinc-300 transition-colors btn-juicy"><ArrowLeft size={20}/></button>
                            <div className="flex flex-col">
                                <h1 className="text-sm font-black leading-tight line-clamp-1">{currentStory.title}</h1>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                                    {currentSlide === 0 ? 'Portada' : isOnParagraph ? `Párrafo ${currentParagraphIdx + 1} / ${totalContentSlides}` : isEndSlide ? 'Resumen' : ''}
                                </span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="hidden md:flex items-center gap-1.5 px-3 py-2 rounded-xl bg-white/5">
                                {Array.from({ length: SLIDE_END + 1 }).map((_, i) => (
                                    <div key={i} className={`progress-dot ${i === currentSlide ? 'active' : ''} ${i <= currentSlide ? 'bg-[rgb(var(--theme-color))]' : 'bg-white/20'}`}/>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Q&A OVERLAY (Modo Listening) */}
                    {qaMode && (
                        <div className="fixed inset-0 z-[60] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            {qaFinished ? (
                                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-10 text-center max-w-lg w-full shadow-2xl animate-scaleIn">
                                    <div className="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <Trophy size={40} strokeWidth={2.5}/>
                                    </div>
                                    <h2 className="text-3xl font-black mb-2 text-white">¡Completado!</h2>
                                    <div className="flex items-center justify-center gap-1 mb-8">
                                        {Array.from({ length: currentStory.questions.length }).map((_, i) => (
                                            <Star key={i} size={28} className={i < score ? 'text-yellow-400 fill-yellow-400' : 'text-zinc-700'} />
                                        ))}
                                    </div>
                                    <button onClick={() => setQaMode(false)} className="btn-juicy w-full bg-white/10 hover:bg-white/20 text-white py-4 rounded-xl font-bold">
                                        Volver al Resumen
                                    </button>
                                </div>
                            ) : (
                                <div className="w-full max-w-2xl bg-zinc-900 border border-zinc-800 rounded-3xl shadow-2xl overflow-hidden animate-scaleIn flex flex-col">
                                    <div className="bg-black/50 p-5 flex justify-between items-center border-b border-white/5">
                                        <span className="font-black tracking-widest text-zinc-500 text-xs uppercase flex items-center gap-2">
                                            <HelpCircle size={16}/> Pregunta {currentQIdx + 1} de {currentStory.questions.length}
                                        </span>
                                        <button onClick={() => setQaMode(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                    </div>
                                    
                                    <div className="p-6 md:p-10 flex flex-col items-center">
                                        <h3 className="text-xl md:text-2xl font-black mb-8 text-white text-center leading-snug">
                                            "{currentStory.questions[currentQIdx].q}"
                                        </h3>
                                        
                                        {!optionsVisible && answeredQ[currentQIdx] === undefined ? (
                                            <button onClick={() => setOptionsVisible(true)}
                                                className="btn-juicy bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3.5 rounded-xl font-bold shadow-lg flex items-center gap-2 text-sm">
                                                <Eye size={18}/> Mostrar Opciones
                                            </button>
                                        ) : (
                                            <div className="flex flex-col gap-3 w-full max-w-md animate-fadeUp">
                                                {qaOptions.map((opt, idx) => {
                                                    const selected = answeredQ[currentQIdx];
                                                    const isSelected = selected === idx;
                                                    
                                                    // Saber cuál es la correcta
                                                    let isCorrect = false;
                                                    if (currentStory.questions[currentQIdx].options) {
                                                        isCorrect = currentStory.questions[currentQIdx].correctIndex === idx;
                                                    } else {
                                                        isCorrect = opt === currentStory.questions[currentQIdx].a;
                                                    }

                                                    const showResult = selected !== undefined;
                                                    
                                                    let style = "bg-white/5 border-white/10 text-white";
                                                    if (showResult) {
                                                        if (isCorrect) style = "bg-emerald-500/15 border-emerald-500/50 text-emerald-300 ring-1 ring-emerald-500/30";
                                                        else if (isSelected && !isCorrect) style = "bg-rose-500/15 border-rose-500/50 text-rose-300";
                                                        else style = "bg-black/20 border-transparent text-zinc-600";
                                                    }

                                                    return (
                                                        <button key={idx} onClick={() => handleAnswer(idx)} disabled={showResult}
                                                            className={`quiz-opt p-4 rounded-xl border text-left font-semibold flex justify-between items-center gap-3 text-sm ${style}`}>
                                                            <span>{opt}</span>
                                                            {showResult && isCorrect && <CheckCircle2 size={18} className="text-emerald-400 shrink-0"/>}
                                                            {showResult && isSelected && !isCorrect && <XCircle size={18} className="text-rose-400 shrink-0"/>}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* MAIN CONTENT AREA */}
                    <div className={`flex-1 w-full max-w-7xl mx-auto p-4 md:p-6 lg:grid lg:grid-cols-12 gap-6 ${qaMode ? 'hidden' : ''}`}>
                        
                        {/* LEFT/MAIN: Reader */}
                        <div className={`w-full flex flex-col justify-center animate-fadeUp ${isOnParagraph && !isEndSlide ? 'order-2 lg:order-1 lg:col-span-8' : 'order-1 lg:col-span-12'}`}>
                            
                            {/* Slide 0: Portada */}
                            {currentSlide === 0 && (
                                <div className="bg-zinc-900/80 backdrop-blur-md rounded-3xl border border-white/5 p-8 md:p-14 text-center">
                                    {currentStory.image_url ? (
                                        <div className="w-32 h-32 mx-auto rounded-3xl overflow-hidden mb-8 border-4 border-white/10 shadow-2xl">
                                            <img src={currentStory.image_url} alt="" className="w-full h-full object-cover"/>
                                        </div>
                                    ) : (
                                        <div className="w-20 h-20 mx-auto rounded-2xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center mb-8">
                                            <BookOpen size={40} />
                                        </div>
                                    )}
                                    <h2 className="text-4xl md:text-5xl font-black mb-4">{currentStory.title}</h2>
                                    
                                    <div className="flex flex-wrap justify-center gap-4 mb-10 text-sm font-bold text-zinc-400">
                                        <span className="flex items-center gap-1.5"><LayoutGrid size={16}/> {currentStory.flatTokens.filter(t => t.isHidden).length} huecos</span>
                                        <span className="flex items-center gap-1.5"><BookOpen size={16}/> {totalContentSlides} párrafos</span>
                                    </div>

                                    <button onClick={nextSlide} className="btn-juicy bg-[rgb(var(--theme-color))] text-white px-10 py-4 rounded-full font-black text-lg shadow-xl flex items-center gap-3 mx-auto shadow-[0_0_20px_rgba(var(--theme-color),0.4)]">
                                        Comenzar Lectura <ArrowRight size={24}/>
                                    </button>
                                </div>
                            )}

                            {/* Slides 1..N: Párrafos */}
                            {isOnParagraph && (
                                <div className="space-y-6" key={`slide-${currentSlide}`}>
                                    {/* Instrucciones claras y amigables */}
                                    <div className="bg-indigo-500/10 border border-indigo-500/20 rounded-2xl p-4 flex gap-4 items-start shadow-sm mb-2">
                                        <div className="bg-indigo-500/20 p-2 rounded-xl text-indigo-400 shrink-0"><Info size={20}/></div>
                                        <div className="text-sm font-medium text-indigo-100/80 leading-relaxed">
                                            Asegúrate de saber qué significa la palabra del Word Bank (¡usa el botón mágico de traducir si ocupas!). Empieza a leer, <strong className="text-white">toca la palabra que creas y luego toca el hueco en el texto</strong>. ¡Sin arrastrar!
                                        </div>
                                    </div>

                                    <div className="relative bg-zinc-900/80 backdrop-blur-md rounded-3xl border border-white/5 p-6 md:p-10 leading-loose flex items-stretch" style={{ fontSize: `${fontSize}px` }}>
                                        {/* Emojis z-index alto */}
                                        {isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pr-6 border-r border-white/10 mr-6 opacity-80 z-20">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                        
                                        <div className="flex-1 font-medium text-justify">
                                            <div className="flex items-center justify-between mb-6 border-b border-white/10 pb-3">
                                                <span className="text-xs font-black uppercase tracking-widest text-zinc-500">Párrafo {currentParagraphIdx + 1} / {totalContentSlides}</span>
                                                {isSlideComplete ? (
                                                    <span className="text-xs font-black uppercase tracking-widest text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-full flex items-center gap-1"><CheckCircle2 size={14}/> Listo</span>
                                                ) : (
                                                    <span className="text-xs font-black uppercase tracking-widest text-amber-400 bg-amber-400/10 px-3 py-1 rounded-full">{hiddenInSlide.length - Object.keys(dropped).filter(k => hiddenInSlide.some(h => h.id === parseInt(k))).length} faltan</span>
                                                )}
                                            </div>

                                            {/* Render Text */}
                                            {currentTokens.map((t, i) => {
                                                if (t.isHidden) {
                                                    const val = dropped[t.id];
                                                    let stateClass = 'token-hidden-dark';
                                                    if (val) stateClass = 'token-filled'; 
                                                    if (slideResult === 'correct') stateClass = 'token-correct';
                                                    if (slideResult === 'wrong' && val) stateClass = val === t.text ? 'token-correct' : 'token-wrong';
                                                    
                                                    const prevIsH = i > 0 && currentTokens[i-1].isHidden;
                                                    const nextIsH = i < currentTokens.length - 1 && currentTokens[i+1].isHidden;
                                                    let shapeClass = "token-single";
                                                    if (prevIsH && nextIsH) shapeClass = "token-middle";
                                                    else if (prevIsH) shapeClass = "token-end";
                                                    else if (nextIsH) shapeClass = "token-start";

                                                    return <span key={i} onClick={() => handleBlankTap(t.id)} className={`token-base ${stateClass} ${shapeClass} ${!val && selectedWord ? 'ring-2 ring-[rgb(var(--theme-color))] animate-pulseGlow' : ''}`}>{val || ""}</span>;
                                                }
                                                if (t.text.match(/\n/)) return <br key={i}/>;
                                                return <span key={i}>{t.text}</span>;
                                            })}
                                        </div>
                                        {!isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pl-6 border-l border-white/10 ml-6 opacity-80 z-20">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                    </div>

                                    {/* Controles de navegación inferior */}
                                    <div className="flex justify-between items-center pt-2">
                                        <button onClick={prevSlide} className={`btn-juicy px-4 py-3 rounded-xl font-bold flex items-center gap-2 ${currentSlide === 1 ? 'opacity-0 pointer-events-none' : 'bg-white/5 hover:bg-white/10 text-zinc-300'}`}>
                                            <ArrowLeft size={18}/> Atrás
                                        </button>

                                        {requiresCheck && !isSlideComplete ? (
                                            <button onClick={checkSlideAnswers} className="btn-juicy px-8 py-3.5 rounded-xl font-black bg-white/10 text-white hover:bg-white/20 shadow-lg flex items-center gap-2">
                                                <CheckCircle2 size={20}/> Verificar
                                            </button>
                                        ) : (
                                            <button onClick={nextSlide} className="btn-juicy bg-[rgb(var(--theme-color))] text-white px-8 py-3.5 rounded-xl font-black shadow-lg flex items-center gap-2 shadow-[0_0_15px_rgba(var(--theme-color),0.4)]">
                                                {currentSlide === SLIDE_PARAGRAPH_END ? (hasFunFact ? 'Sabías que...' : 'Resumen') : 'Siguiente'} <ArrowRight size={20}/>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Slide Fun Fact */}
                            {isFunFactSlide && (
                                <div className="bg-amber-500/10 border border-amber-500/20 backdrop-blur-md rounded-3xl p-10 text-center max-w-2xl mx-auto animate-scaleIn">
                                    <div className="w-16 h-16 mx-auto rounded-2xl bg-amber-500/20 text-amber-400 flex items-center justify-center mb-6">
                                        <Lightbulb size={32} strokeWidth={2.5}/>
                                    </div>
                                    <h3 className="font-black text-xs uppercase tracking-[0.2em] mb-4 text-amber-400">Did You Know?</h3>
                                    <p className="text-xl font-medium leading-relaxed mb-8 text-amber-100/90">{currentStory.fun_fact}</p>
                                    
                                    <button onClick={nextSlide} className="btn-juicy bg-amber-500 hover:bg-amber-400 text-white px-8 py-3.5 rounded-full font-black shadow-xl flex items-center gap-2 mx-auto">
                                        Terminar <ArrowRight size={20}/>
                                    </button>
                                </div>
                            )}

                            {/* Slide Resumen */}
                            {isEndSlide && (
                                <div className="bg-zinc-900/80 backdrop-blur-md border border-white/5 rounded-3xl p-10 text-center max-w-xl mx-auto animate-scaleIn">
                                    <div className="w-20 h-20 mx-auto rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center mb-6">
                                        <CheckCircle2 size={40} strokeWidth={3} />
                                    </div>
                                    <h2 className="text-3xl font-black mb-3">¡Lectura Completada!</h2>
                                    <p className="text-zinc-400 mb-8">Has rellenado correctamente todos los párrafos.</p>
                                    
                                    <div className="flex flex-col gap-3">
                                        {currentStory.questions && currentStory.questions.length > 0 && (
                                            <button onClick={startChallenge} className="btn-juicy w-full bg-[rgb(var(--theme-color))] text-white py-4 rounded-xl font-black shadow-xl flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(var(--theme-color),0.4)]">
                                                <Swords size={20}/> CHALLENGE Q&A
                                            </button>
                                        )}
                                        <button onClick={() => openStory(curIdx)} className="btn-juicy w-full py-4 rounded-xl font-bold bg-white/5 hover:bg-white/10 text-zinc-300 flex items-center justify-center gap-2">
                                            <RotateCcw size={18}/> Volver a Leer
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* RIGHT: Word Bank Sidebar */}
                        {isOnParagraph && !isEndSlide && (
                            <div className="order-1 lg:order-2 lg:col-span-4 w-full lg:sticky lg:top-20 lg:self-start lg:h-[calc(100vh-6rem)] animate-fadeUp">
                                <div className="bg-zinc-900/90 backdrop-blur-xl border border-white/10 rounded-3xl overflow-hidden flex flex-col h-full max-h-[350px] lg:max-h-full shadow-2xl">
                                    <div className="bg-black/40 p-4 flex items-center justify-between border-b border-white/5 shrink-0">
                                        <div className="flex items-center gap-2 font-black uppercase text-xs tracking-widest">
                                            <Puzzle size={16} className="text-[rgb(var(--theme-color))]"/> Word Bank
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="bg-white/10 px-2.5 py-1 rounded-lg text-[10px] font-bold text-zinc-300">
                                                {availableWords.length} left
                                            </span>
                                            {/* Traductor Mágico */}
                                            <button onClick={toggleTranslation} disabled={isTranslating} className={`btn-juicy p-1.5 rounded-lg transition-colors ${showSpanish ? 'bg-indigo-500 text-white' : 'bg-white/10 text-zinc-400 hover:text-white'}`} title="Traducir Palabras">
                                                {isTranslating ? <Loader2 size={16} className="animate-spin"/> : <Languages size={16}/>}
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="p-5 overflow-y-auto custom-scrollbar flex-1">
                                        {availableWords.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-emerald-500/50">
                                                <CheckCircle2 size={40} className="mb-3"/>
                                                <p className="text-sm font-black uppercase tracking-widest text-emerald-400">¡Perfecto!</p>
                                            </div>
                                        ) : (
                                            <div className="flex flex-wrap gap-2 md:gap-3">
                                                {availableWords.map((w, i) => {
                                                    const displayWord = showSpanish && translations[w] ? translations[w] : w;
                                                    const isSelected = selectedWord === w;
                                                    
                                                    return (
                                                        <button key={`${w}-${i}`} 
                                                            onClick={() => handleWordTap(w)}
                                                            className={`btn-juicy border-b-4 px-4 py-2.5 rounded-xl font-bold shadow-sm transition-all text-sm md:text-base ${
                                                                isSelected 
                                                                    ? 'bg-[rgb(var(--theme-color))] border-[rgba(var(--theme-color),0.5)] text-white scale-105' 
                                                                    : 'bg-white/5 border-black/50 text-zinc-200 hover:bg-white/10'
                                                            }`}
                                                        >
                                                            {displayWord}
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ReadingActivity />);
    </script>
</body>
</html>

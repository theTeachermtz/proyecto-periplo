<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reading Activity | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; overflow-x: clip; -webkit-tap-highlight-color: transparent; }
        
        .token-base { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; padding: 0 0.5em; min-width: 3em; height: 1.8em; transition: all 0.2s ease; touch-action: manipulation; cursor: pointer; }
        .token-start { border-top-left-radius: 0.3em; border-bottom-left-radius: 0.3em; margin-left: 0.2em; border-left-width: 2px !important; }
        .token-end { border-top-right-radius: 0.3em; border-bottom-right-radius: 0.3em; margin-right: 0.2em; border-right-width: 2px !important; }
        .token-middle { border-left-width: 0px !important; border-right-width: 0px !important; margin: 0; border-radius: 0; }
        .token-single { border-radius: 0.3em; margin: 0 0.2em; border-left-width: 2px !important; border-right-width: 2px !important; }

        .token-hidden-light { background-color: #f1f5f9; border: 2px dashed #94a3b8; border-bottom-width: 4px; }
        .token-hidden-dark { background-color: #334155; border: 2px dashed #64748b; border-bottom-width: 4px; }
        .token-filled { background-color: #e0e7ff; border: 2px solid #6366f1; color: #3730a3; font-weight: 800; border-bottom-width: 4px; }
        .token-correct { background-color: #dcfce7 !important; border: 2px solid #22c55e !important; color: #14532d !important; border-bottom-width: 4px !important; }
        .token-wrong { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #7f1d1d !important; border-bottom-width: 4px !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); } }
        
        .animate-shake { animation: shake 0.4s; }
        .animate-fadeUp { animation: fadeUp 0.6s ease both; }
        .animate-scaleIn { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .animate-pulseGlow { animation: pulseGlow 2s infinite; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }

        @media (hover: hover) { .hover-lift:hover { transform: translateY(-4px); } }
        .btn-juicy { touch-action: manipulation; transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .btn-juicy:active:not(:disabled) { transform: scale(0.96) !important; }
        .word-chip { touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s ease; }
        .progress-dot.active { width: 24px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, CheckCircle2, RotateCcw, ArrowLeft, Lightbulb, Puzzle, Moon, Sun, ZoomIn, ZoomOut, Swords, ArrowRight, BookOpen, Edit2, LayoutGrid, Star, Trophy, X, Info, Languages, Eye, XCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const EMOJI_SETS = [['🌟','✨','🚀','💫','⭐'], ['🎯','🏆','💡','🔥','🧩'], ['📚','📖','✏️','📝','🧠'], ['🎨','🎭','🎪','🌈','🎉']];

        const ReadingActivity = () => {
            const [loading, setLoading] = useState(true);
            const [activityData, setActivityData] = useState(null);
            const [activityId, setActivityId] = useState(null);
            const [stories, setStories] = useState([]);
            const [curIdx, setCurIdx] = useState(-1); 
            const [isStudent, setIsStudent] = useState(false);

            const [currentSlide, setCurrentSlide] = useState(0); 
            const [slideResult, setSlideResult] = useState(null); 
            const [dropped, setDropped] = useState({});
            const [selectedWord, setSelectedWord] = useState(null);
            
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [fontSize, setFontSize] = useState(window.innerWidth < 768 ? 18 : 22);

            // Modal Progreso Guardado
            const [pendingResume, setPendingResume] = useState(null);

            // Traductor
            const [translations, setTranslations] = useState({});
            const [isTranslating, setIsTranslating] = useState(false);
            const [showSpanish, setShowSpanish] = useState(false);

            // Q&A
            const [qaMode, setQaMode] = useState(false);
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [qaOptions, setQaOptions] = useState([]);
            const [optionsVisible, setOptionsVisible] = useState(false);
            const [qaFinished, setQaFinished] = useState(false);
            const [score, setScore] = useState(0);
            const [answeredQ, setAnsweredQ] = useState({});

            const currentStory = curIdx !== -1 ? stories[curIdx] : null;

            const wordBank = useMemo(() => {
                if (!currentStory) return [];
                return currentStory.flatTokens.filter(t => t.isHidden).map(t => t.text).sort(() => Math.random() - 0.5); 
            }, [currentStory]);

            useEffect(() => {
                if (activityId && curIdx !== -1 && !pendingResume) {
                    const saveObj = { currentSlide, dropped, score, answeredQ };
                    localStorage.setItem(`periplo_reading_${activityId}_${curIdx}`, JSON.stringify(saveObj));
                }
            }, [currentSlide, dropped, score, answeredQ, activityId, curIdx, pendingResume]);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (params.get('student') === 'true') setIsStudent(true);
                    if (!id) return;
                    setActivityId(id);
                    
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const savedData = snap.data();
                        setActivityData(savedData);
                        let loadedStories = savedData.stories ? savedData.stories : [{
                                title: savedData.title, text: savedData.content.text, fun_fact: savedData.content.fun_fact,
                                image_url: savedData.content.image_url, blanks: savedData.content.blanks, questions: savedData.content.questions
                            }];
                        const processed = loadedStories.map(s => {
                            const rawParagraphs = s.text.split(/\n\n+/).filter(p => p.trim().length > 0);
                            let globalId = 0;
                            const parsedParagraphs = rawParagraphs.map(p => {
                                const regex = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s\[\]]+|\s+)/g;
                                return (p.match(regex) || []).map(part => {
                                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                                    let cleanText = isBracketed ? part.slice(1, -1) : part;
                                    let isWord = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(cleanText);
                                    return { id: globalId++, text: cleanText, isWord, isHidden: isBracketed && isWord };
                                });
                            });
                            return { ...s, paragraphs: parsedParagraphs, flatTokens: parsedParagraphs.flat() };
                        });
                        setStories(processed);
                        if (processed.length === 1) openStory(0, id);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            const openStory = (index, docId = activityId) => {
                const saved = localStorage.getItem(`periplo_reading_${docId}_${index}`);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // Si ya avanzaron más allá de la portada, preguntamos si quieren retomar.
                        if (parsed.currentSlide > 0) {
                            setPendingResume({ index, savedData: parsed });
                            return;
                        }
                    } catch(e) {}
                }
                setCurIdx(index);
                resetProgress();
            };

            const resumeSavedProgress = () => {
                const data = pendingResume.savedData;
                setCurIdx(pendingResume.index);
                setCurrentSlide(data.currentSlide || 0); 
                setDropped(data.dropped || {});
                setScore(data.score || 0); 
                setAnsweredQ(data.answeredQ || {});
                setPendingResume(null);
            };

            const startFresh = () => {
                const index = pendingResume.index;
                localStorage.removeItem(`periplo_reading_${activityId}_${index}`);
                setCurIdx(index);
                resetProgress();
                setPendingResume(null);
            };

            const restartStory = (index = curIdx, docId = activityId) => {
                if(index === -1) return;
                localStorage.removeItem(`periplo_reading_${docId}_${index}`);
                setCurIdx(index); 
                resetProgress();
            };

            const resetProgress = () => {
                setCurrentSlide(0); setDropped({}); setSlideResult(null); setSelectedWord(null);
                setQaMode(false); setQaFinished(false); setCurrentQIdx(0); setScore(0); setAnsweredQ({});
                setShowSpanish(false); 
            };

            const toggleTheme = () => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); };
            const handleExit = () => { window.location.href = (document.referrer.includes('student_portal.html')) ? document.referrer : 'index.html'; };
            const backToMenu = () => { if (stories.length === 1) handleExit(); else setCurIdx(-1); };

            const toggleTranslation = async () => {
                if (Object.keys(translations).length > 0) { setShowSpanish(!showSpanish); return; }
                setIsTranslating(true);
                const uniqueWords = [...new Set(wordBank)];
                const newTrans = {};
                await Promise.all(uniqueWords.map(async (w) => {
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(w)}&langpair=en|es`);
                        newTrans[w] = (await res.json()).responseData.translatedText.toLowerCase();
                    } catch(e) { newTrans[w] = w; }
                }));
                setTranslations(newTrans); setShowSpanish(true); setIsTranslating(false);
            };

            const handleWordTap = (word) => { if (slideResult !== 'correct') setSelectedWord(selectedWord === word ? null : word); };
            const handleBlankTap = (tokenId) => {
                if (slideResult === 'correct') return;
                if (dropped[tokenId]) {
                    const newDropped = { ...dropped }; delete newDropped[tokenId];
                    setDropped(newDropped); setSlideResult(null); return;
                }
                if (selectedWord) { setDropped(prev => ({ ...prev, [tokenId]: selectedWord })); setSlideResult(null); setSelectedWord(null); }
            };
            
            const checkSlideAnswers = () => {
                if(!currentStory) return;
                const hidden = currentStory.paragraphs[currentParagraphIdx].filter(t => t.isHidden);
                const isAllCorrect = hidden.every(t => dropped[t.id] === t.text);
                setSlideResult(isAllCorrect ? 'correct' : 'wrong');
                if (isAllCorrect) confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                else setTimeout(() => {
                    const newDropped = { ...dropped };
                    hidden.forEach(t => { if (newDropped[t.id] !== t.text) delete newDropped[t.id]; });
                    setDropped(newDropped); setSlideResult(null);
                }, 1200);
            };

            const nextSlide = () => { setSlideResult(null); setSelectedWord(null); setCurrentSlide(c => c + 1); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            const prevSlide = () => { if (currentSlide > 1) { setSlideResult(null); setSelectedWord(null); setCurrentSlide(c => c - 1); window.scrollTo({ top: 0, behavior: 'smooth' }); } };

            const startChallenge = () => { setQaMode(true); setCurrentQIdx(0); setScore(0); setAnsweredQ({}); generateOptionsFor(0); };
            const generateOptionsFor = (qIndex) => {
                setOptionsVisible(false);
                const currentQ = currentStory.questions[qIndex];
                if (currentQ.options && typeof currentQ.correctIndex === 'number') { setQaOptions(currentQ.options); return; }
                let distractors = currentStory.questions.filter((_, idx) => idx !== qIndex).map(q => q.a).filter(a => a && a.length > 0);
                const generic = ["I don't know", "Not mentioned", "Maybe later", "It depends"];
                while (distractors.length < 3) distractors.push(generic.pop());
                let opts = [currentQ.a || "Yes", ...distractors.slice(0, 3)].sort(() => Math.random() - 0.5);
                setQaOptions(opts);
            };

            const handleAnswer = (ansIdx) => {
                if (answeredQ[currentQIdx] !== undefined) return;
                const isCorrect = currentStory.questions[currentQIdx].options ? currentStory.questions[currentQIdx].correctIndex === ansIdx : qaOptions[ansIdx] === currentStory.questions[currentQIdx].a;
                setAnsweredQ(prev => ({ ...prev, [currentQIdx]: ansIdx }));
                if (isCorrect) { setScore(s => s + 1); confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } }); }
                setTimeout(() => {
                    if (currentQIdx < currentStory.questions.length - 1) { setCurrentQIdx(idx => idx + 1); generateOptionsFor(currentQIdx + 1); } 
                    else { setQaFinished(true); confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } }); }
                }, 1500);
            };

            // ════════ Lógica de Slides ════════
            const SLIDE_COVER = 0;
            const SLIDE_INSTRUCTIONS = 1;
            const SLIDE_PARAGRAPH_START = 2;
            const SLIDE_PARAGRAPH_END = currentStory ? currentStory.paragraphs.length + 1 : 0;
            
            const isInstructions = currentSlide === SLIDE_INSTRUCTIONS;
            const isOnParagraph = currentSlide >= SLIDE_PARAGRAPH_START && currentSlide <= SLIDE_PARAGRAPH_END;
            const currentParagraphIdx = isOnParagraph ? currentSlide - SLIDE_PARAGRAPH_START : -1;
            
            // Emojis (Usamos el índice del párrafo)
            const isLeftEmoji = currentParagraphIdx % 2 !== 0;
            const currentEmojis = isOnParagraph ? EMOJI_SETS[currentParagraphIdx % EMOJI_SETS.length] : [];

            // ════════ Renders Rápidos ════════
            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-950"><Loader2 className="animate-spin text-indigo-500" size={40}/></div>;
            
            if (curIdx === -1 && !pendingResume) return (
                <div className={`min-h-screen font-sans flex flex-col transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-800'}`}>
                    <div className={`px-6 py-4 flex items-center justify-between shrink-0 shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 border-b'}`}>
                        <div className="flex items-center gap-4">
                            <button onClick={handleExit} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-slate-100 text-slate-500'}`}><ArrowLeft size={20}/></button>
                            <div className="flex items-center gap-2.5">
                                <div className="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-black text-lg shadow-lg">P</div>
                                <div className="flex flex-col justify-center">
                                    <span className="font-black uppercase tracking-widest text-[11px] leading-none mb-0.5">Periplo</span>
                                    <span className="font-bold text-[9px] opacity-60 uppercase tracking-widest leading-none">Reading & Comprehension</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {stories.map((s, i) => (
                                <div key={i} onClick={() => openStory(i)} className={`group rounded-[2rem] overflow-hidden shadow-md hover-lift transition-all cursor-pointer border flex flex-col animate-fadeUp ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:border-indigo-500' : 'bg-white border-slate-200 hover:border-indigo-400'}`}>
                                    <div className="h-48 relative overflow-hidden flex items-center justify-center bg-slate-900">
                                        {s.image_url ? <img src={s.image_url} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"/> : <BookOpen size={64} className="text-white opacity-20"/>}
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
                                        <div className="absolute bottom-4 left-4 right-4"><h3 className="text-white font-black text-xl line-clamp-2">{s.title || 'Historia'}</h3></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const availableWords = wordBank.filter(word => Object.values(dropped).filter(w => w === word).length < currentStory.flatTokens.filter(t => t.text === word && t.isHidden).length);
            const currentTokens = isOnParagraph ? currentStory.paragraphs[currentParagraphIdx] : [];
            const requiresCheck = currentTokens.filter(t => t.isHidden).length > 0;
            const isSlideComplete = slideResult === 'correct' || !requiresCheck;

            return (
                <div className="min-h-screen font-sans flex flex-col transition-all duration-700 relative">
                    
                    {/* MODAL DE PROGRESO GUARDADO */}
                    {pendingResume && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 animate-scaleIn">
                            <div className={`w-full max-w-md rounded-[2rem] p-8 text-center shadow-2xl border ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'}`}>
                                <div className="w-20 h-20 bg-indigo-500/20 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <BookOpen size={40} />
                                </div>
                                <h2 className="text-2xl font-black mb-3">Progreso Guardado</h2>
                                <p className="text-sm opacity-70 mb-8 leading-relaxed">
                                    Vimos que dejaste esta lectura a medias. ¿Quieres continuar donde te quedaste o prefieres empezar de cero?
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={resumeSavedProgress} className="btn-juicy w-full py-3.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-black shadow-lg">
                                        Continuar Lectura
                                    </button>
                                    <button onClick={startFresh} className={`btn-juicy w-full py-3.5 rounded-xl font-bold border ${isDarkMode ? 'border-slate-600 text-slate-300 hover:bg-slate-700' : 'border-slate-300 text-slate-600 hover:bg-slate-100'}`}>
                                        Empezar de Cero
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {currentStory.image_url ? (
                        <div className="fixed inset-0 z-0">
                            <img src={currentStory.image_url} className="w-full h-full object-cover" style={{ objectPosition: 'center top' }}/>
                            <div className={`absolute inset-0 ${isDarkMode ? 'bg-gradient-to-b from-slate-900/40 via-slate-900/80 to-slate-900' : 'bg-gradient-to-b from-white/30 via-slate-100/80 to-slate-100'}`}></div>
                        </div>
                    ) : <div className={`fixed inset-0 z-0 ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}></div>}

                    <div className="relative z-10 flex-1 flex flex-col w-full h-full">
                        {/* NAVBAR OFICIAL PERIPLO */}
                        <div className={`px-4 md:px-6 py-3 flex items-center justify-between shrink-0 sticky top-0 z-50 backdrop-blur-xl border-b transition-colors ${isDarkMode ? 'bg-slate-900/70 border-white/5 text-white' : 'bg-white/70 border-slate-200 text-slate-800'}`}>
                            <div className="flex items-center gap-3">
                                <button onClick={backToMenu} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-slate-200 text-slate-600'}`}><ArrowLeft size={20}/></button>
                                <div className="flex flex-col">
                                    <h1 className="text-sm md:text-base font-black leading-tight line-clamp-1">{currentStory.title}</h1>
                                    <span className="text-[10px] font-bold uppercase tracking-widest opacity-40">
                                        {currentSlide === 0 ? 'Portada' : isInstructions ? 'Instrucciones' : isOnParagraph ? `Párrafo ${currentParagraphIdx + 1} / ${currentStory.paragraphs.length}` : 'Resumen'}
                                    </span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className={`flex items-center px-1.5 py-1.5 rounded-xl border shrink-0 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                    <button onClick={() => setFontSize(s => Math.max(14, s - 2))} className="p-1 md:p-1.5 btn-juicy text-slate-400 hover:text-slate-600 dark:hover:text-white"><ZoomOut size={18}/></button>
                                    <button onClick={() => setFontSize(s => Math.min(40, s + 2))} className="p-1 md:p-1.5 btn-juicy text-slate-400 hover:text-slate-600 dark:hover:text-white"><ZoomIn size={18}/></button>
                                    <div className="w-px h-5 bg-slate-300 dark:bg-slate-700 mx-1"></div>
                                    <button onClick={() => restartStory(curIdx)} className="p-1 md:p-1.5 btn-juicy text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors" title="Reiniciar de Cero"><RotateCcw size={18}/></button>
                                </div>
                                <button onClick={toggleTheme} className={`p-2 rounded-full btn-juicy hidden md:block ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'bg-white border hover:bg-slate-100 text-slate-600'}`}>{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                            </div>
                        </div>

                        {/* Q&A OVERLAY */}
                        {qaMode && (
                            <div className="fixed inset-0 z-[60] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4 animate-scaleIn">
                                {qaFinished ? (
                                    <div className={`rounded-[3rem] p-10 md:p-12 text-center max-w-lg w-full shadow-2xl ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-800'}`}>
                                        <Trophy size={48} className="text-emerald-500 mx-auto mb-6"/>
                                        <h2 className="text-4xl font-black mb-8">¡Completado!</h2>
                                        <button onClick={() => restartStory(curIdx)} className="btn-juicy w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl flex items-center justify-center gap-2"><RotateCcw size={20}/> Reiniciar Lectura</button>
                                    </div>
                                ) : (
                                    <div className={`w-full max-w-2xl rounded-[2rem] overflow-hidden shadow-2xl flex flex-col ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-800'}`}>
                                        <div className="bg-slate-900 text-white p-5 flex justify-between items-center"><span className="font-black text-xs uppercase flex items-center gap-2"><Swords size={16}/> Q&A {currentQIdx + 1}/{currentStory.questions.length}</span><button onClick={() => setQaMode(false)}><X size={16}/></button></div>
                                        <div className="p-6 md:p-10 flex flex-col items-center">
                                            <h3 className="text-xl md:text-2xl font-black mb-8 text-center">"{currentStory.questions[currentQIdx].q}"</h3>
                                            {!optionsVisible && answeredQ[currentQIdx] === undefined ? (
                                                <button onClick={() => setOptionsVisible(true)} className="btn-juicy bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold flex items-center gap-2"><Eye size={20}/> Mostrar Opciones</button>
                                            ) : (
                                                <div className="flex flex-col gap-3 w-full max-w-md">
                                                    {qaOptions.map((opt, idx) => (
                                                        <button key={idx} onClick={() => handleAnswer(idx)} disabled={answeredQ[currentQIdx] !== undefined} className="p-4 rounded-xl border text-left font-bold flex justify-between items-center bg-slate-700/50 border-slate-600"><span>{opt}</span></button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className={`max-w-[1400px] mx-auto w-full p-4 md:p-8 flex-1 flex flex-col lg:grid lg:grid-cols-12 gap-6 md:gap-8 items-start ${qaMode ? 'hidden' : ''}`}>
                            
                            {/* ── AREA PRINCIPAL (Instrucciones o Texto) ── */}
                            <div className={`w-full flex-1 flex flex-col justify-center animate-fadeUp ${currentSlide >= 1 && currentSlide <= SLIDE_PARAGRAPH_END ? 'order-2 lg:order-1 lg:col-span-8' : 'order-1 lg:col-span-12'}`}>
                                
                                {currentSlide === SLIDE_COVER && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-16 text-center animate-scaleIn ${isDarkMode ? 'bg-slate-800/80 border-slate-700/50 text-white' : 'bg-white/80 border-white/50 text-slate-800'}`}>
                                        {currentStory.image_url && <img src={currentStory.image_url} className="w-28 h-28 mx-auto rounded-3xl object-cover mb-8 shadow-2xl"/>}
                                        <h2 className="text-4xl md:text-6xl font-black mb-10">{currentStory.title}</h2>
                                        <button onClick={nextSlide} className="btn-juicy px-10 py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-black text-xl shadow-xl flex items-center gap-3 mx-auto">Comenzar <ArrowRight size={24}/></button>
                                    </div>
                                )}

                                {/* SLIDE 1: INSTRUCCIONES FORMALES */}
                                {isInstructions && (
                                    <div className={`relative rounded-[2rem] shadow-2xl border p-6 md:p-10 transition-all duration-300 animate-scaleIn ${isDarkMode ? 'bg-slate-800/90 border-slate-700 text-slate-200' : 'bg-white/90 border-white text-slate-800'}`}>
                                        <div className="flex items-center gap-3 mb-6 border-b pb-4 border-slate-200 dark:border-slate-700">
                                            <div className="w-10 h-10 bg-amber-500/20 text-amber-500 rounded-xl flex items-center justify-center shrink-0">
                                                <Info size={24}/>
                                            </div>
                                            <h3 className="font-black text-2xl">¿Cómo funciona?</h3>
                                        </div>
                                        
                                        <div className={`p-5 rounded-2xl flex flex-col gap-6 mb-8 border ${isDarkMode ? 'bg-black/40 border-white/10' : 'bg-slate-50 border-slate-200'}`}>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-500 flex items-center justify-center shrink-0 font-black border border-indigo-500/30">1</div>
                                                <div>
                                                    <h4 className="font-bold mb-1">Traduce tu Word Bank</h4>
                                                    <p className="text-sm opacity-70 leading-relaxed">Usa el botón "Traducir" en el panel lateral para conocer el significado de las palabras antes de empezar.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center shrink-0 font-black border border-rose-500/30">2</div>
                                                <div>
                                                    <h4 className="font-bold mb-1">Toca, no arrastres</h4>
                                                    <p className="text-sm opacity-70 leading-relaxed">Toca la palabra correcta y luego toca el hueco en el texto. ¡Evita arrastrar para no recargar la página por error!</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-amber-500/20 text-amber-500 flex items-center justify-center shrink-0 font-black border border-amber-500/30">3</div>
                                                <div>
                                                    <h4 className="font-bold mb-1">Verifica y avanza</h4>
                                                    <p className="text-sm opacity-70 leading-relaxed">Llena todos los huecos del párrafo y dale a "Verificar". Las palabras erróneas volverán al banco.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 items-start">
                                                <div className="w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-500 flex items-center justify-center shrink-0 font-black border border-emerald-500/30">4</div>
                                                <div>
                                                    <h4 className="font-bold mb-1">Challenge Q&A</h4>
                                                    <p className="text-sm opacity-70 leading-relaxed">Al terminar toda la lectura, prueba tu comprensión completando el quiz final de opción múltiple.</p>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex justify-between items-center pt-2">
                                            <button onClick={prevSlide} className={`btn-juicy px-5 py-3.5 rounded-2xl font-bold flex items-center gap-2 ${isDarkMode ? 'bg-slate-700 text-slate-300' : 'bg-slate-200 text-slate-600'}`}>
                                                <ArrowLeft size={18}/> Atrás
                                            </button>
                                            <button onClick={nextSlide} className="btn-juicy bg-emerald-500 text-white px-8 py-3.5 rounded-2xl font-black flex items-center gap-2 shadow-lg shadow-emerald-500/20">
                                                ¡Entendido, a leer! <ArrowRight size={20}/>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* SLIDES DE PÁRRAFOS */}
                                {isOnParagraph && (
                                    <div className="space-y-4 md:space-y-6" key={`slide-${currentSlide}`}>
                                        <div className={`relative rounded-[2rem] shadow-2xl border p-6 md:p-10 leading-loose transition-all duration-300 animate-scaleIn flex items-stretch ${isDarkMode ? 'bg-slate-800/90 border-slate-700 text-slate-200' : 'bg-white/90 border-white text-slate-700'}`} style={{ fontSize: `${fontSize}px` }}>
                                            
                                            {/* Emojis Izquierda */}
                                            {isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pr-6 border-r border-slate-200 dark:border-slate-700 mr-6 opacity-40 z-10 select-none">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                            
                                            <div className="flex-1 font-medium text-justify relative z-20">
                                                <div className="flex items-center justify-between mb-4 md:mb-6 border-b pb-3 border-slate-200 dark:border-slate-700">
                                                    <span className="text-xs font-black uppercase opacity-40">Párrafo {currentParagraphIdx + 1} / {currentStory.paragraphs.length}</span>
                                                    {requiresCheck && !isSlideComplete && <span className="text-xs font-black uppercase text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full">{currentTokens.filter(t=>t.isHidden).length - Object.keys(dropped).filter(k => currentTokens.some(h => h.id === parseInt(k))).length} restantes</span>}
                                                    {isSlideComplete && <span className="text-xs font-black uppercase text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full flex items-center gap-1"><CheckCircle2 size={14}/> Correcto</span>}
                                                </div>
                                                {currentTokens.map((t, i) => {
                                                    if (t.isHidden) {
                                                        const val = dropped[t.id];
                                                        let stateClass = isDarkMode ? 'token-hidden-dark' : 'token-hidden-light';
                                                        if (val) stateClass = 'token-filled'; 
                                                        if (slideResult === 'correct') stateClass = 'token-correct';
                                                        if (slideResult === 'wrong' && val) stateClass = val === t.text ? 'token-correct' : 'token-wrong';
                                                        return <span key={i} onClick={() => handleBlankTap(t.id)} className={`token-base token-single ${stateClass} ${!val && selectedWord ? 'animate-pulseGlow' : ''}`}>{val || ""}</span>;
                                                    }
                                                    if (t.text.match(/\n/)) return <br key={i}/>;
                                                    return <span key={i}>{t.text}</span>;
                                                })}
                                            </div>

                                            {/* Emojis Derecha */}
                                            {!isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pl-6 border-l border-slate-200 dark:border-slate-700 ml-6 opacity-40 z-10 select-none">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                        </div>

                                        <div className="flex justify-between items-center pt-2">
                                            <button onClick={prevSlide} className={`btn-juicy px-5 py-3.5 rounded-2xl font-bold flex items-center gap-2 ${isDarkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}><ArrowLeft size={18}/> Atrás</button>
                                            {requiresCheck && !isSlideComplete ? (
                                                <button onClick={checkSlideAnswers} className={`btn-juicy px-8 py-3.5 rounded-2xl font-black flex items-center gap-2 shadow-lg ${isDarkMode ? 'bg-slate-700 text-white hover:bg-slate-600' : 'bg-slate-900 text-white hover:bg-slate-800'}`}><CheckCircle2 size={20}/> Verificar</button>
                                            ) : (
                                                <button onClick={nextSlide} className="btn-juicy bg-emerald-500 text-white px-8 py-3.5 rounded-2xl font-black flex items-center gap-2 shadow-lg shadow-emerald-500/20">Siguiente <ArrowRight size={20}/></button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {currentSlide > SLIDE_PARAGRAPH_END && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-14 text-center max-w-2xl mx-auto animate-scaleIn ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-white'}`}>
                                        <CheckCircle2 size={56} className="text-emerald-500 mx-auto mb-8" />
                                        <h2 className="text-4xl font-black mb-10">¡Lectura Completada!</h2>
                                        <div className="flex flex-col gap-3 max-w-sm mx-auto">
                                            {currentStory.questions && currentStory.questions.length > 0 && <button onClick={startChallenge} className="btn-juicy w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black shadow-xl mb-2 flex items-center justify-center gap-2"><Swords size={24}/> CHALLENGE Q&A</button>}
                                            <button onClick={() => restartStory(curIdx)} className={`btn-juicy w-full py-4 rounded-2xl font-black border ${isDarkMode ? 'border-slate-600 text-slate-300 hover:bg-slate-700' : 'border-slate-300 text-slate-600 hover:bg-slate-100'}`}><RotateCcw size={20}/> Volver a Leer</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* ── WORD BANK SIDEBAR (Visible desde Instrucciones hasta el último párrafo) ── */}
                            {(isInstructions || isOnParagraph) && (
                                <div className={`order-1 lg:order-2 lg:col-span-4 w-full lg:sticky lg:top-20 flex flex-col gap-4 animate-fadeUp`}>
                                    <div className={`rounded-[2rem] shadow-xl border overflow-hidden flex flex-col max-h-[350px] lg:max-h-[calc(100vh-8rem)] ${isDarkMode ? 'bg-slate-800/90 border-slate-700' : 'bg-white/90 border-white'}`}>
                                        <div className="bg-slate-900 p-4 flex items-center justify-between text-white shrink-0">
                                            <div className="flex items-center gap-2 font-black uppercase text-xs tracking-widest"><Puzzle size={18} className="text-indigo-400"/> Word Bank <span className="ml-2 bg-slate-800 px-2 py-1 rounded-lg text-[10px] text-slate-400">{availableWords.length} left</span></div>
                                            <button onClick={toggleTranslation} disabled={isTranslating} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase btn-juicy border ${showSpanish ? 'bg-indigo-600 border-indigo-700' : 'bg-slate-700 border-slate-600'}`}>
                                                {isTranslating ? <Loader2 size={14} className="animate-spin"/> : <Languages size={14}/>} {showSpanish ? 'Inglés' : 'Traducir'}
                                            </button>
                                        </div>
                                        <div className={`p-4 md:p-5 overflow-y-auto custom-scrollbar flex-1 ${isDarkMode ? 'bg-slate-800/50' : 'bg-slate-50'}`}>
                                            {availableWords.length === 0 ? (
                                                <div className="flex flex-col items-center justify-center py-8"><CheckCircle2 size={48} className="text-emerald-500 opacity-30 mb-4"/><p className="text-lg font-black text-emerald-500">¡Perfecto!</p></div>
                                            ) : (
                                                <div className="flex flex-wrap gap-2 md:gap-3">
                                                    {availableWords.map((w, i) => (
                                                        <div key={`${w}-${i}`} onClick={() => handleWordTap(w)} className={`word-chip border border-b-4 px-4 py-2.5 rounded-xl font-bold cursor-pointer ${selectedWord === w ? 'bg-indigo-600 border-indigo-900 text-white scale-105' : isDarkMode ? 'bg-slate-700 border-slate-900 text-slate-200' : 'bg-white border-slate-300 text-slate-700'}`}>{showSpanish && translations[w] ? translations[w] : w}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };
        const root = createRoot(document.getElementById('root'));
        root.render(<ReadingActivity />);
    </script>
</body>
</html>

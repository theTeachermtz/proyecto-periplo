<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Activity | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/scroll-behaviour.min.js"></script>
    <script>
        window.onload = function() {
            MobileDragDrop.polyfill({ holdToDrag: 300 }); 
            window.addEventListener('touchmove', function() {}, {passive: false});
        };
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; overflow-x: clip; }
        
        .token-base {
            display: inline-flex; align-items: center; justify-content: center; vertical-align: middle;
            padding: 0 0.5em; min-width: 3em; height: 1.8em; transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .token-start { border-top-left-radius: 0.3em; border-bottom-left-radius: 0.3em; margin-left: 0.2em; border-left-width: 2px !important; }
        .token-end { border-top-right-radius: 0.3em; border-bottom-right-radius: 0.3em; margin-right: 0.2em; border-right-width: 2px !important; }
        .token-middle { border-left-width: 0px !important; border-right-width: 0px !important; margin: 0; border-radius: 0; }
        .token-single { border-radius: 0.3em; margin: 0 0.2em; border-left-width: 2px !important; border-right-width: 2px !important; }

        .token-hidden-light { background-color: #f1f5f9; border: 2px dashed #94a3b8; border-bottom-width: 4px; }
        .token-hidden-dark { background-color: #334155; border: 2px dashed #64748b; border-bottom-width: 4px; }
        .token-filled { background-color: #e0e7ff; border: 2px solid #6366f1; color: #3730a3; font-weight: 800; border-bottom-width: 4px; }
        .token-correct { background-color: #dcfce7 !important; border: 2px solid #22c55e !important; color: #14532d !important; border-bottom-width: 4px !important; }
        .token-wrong { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #7f1d1d !important; border-bottom-width: 4px !important; animation: shake 0.4s; }

        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); } }
        
        .timer-bar { animation: shrink linear forwards; }
        .animate-shake { animation: shake 0.4s; }
        .animate-fadeUp { animation: fadeUp 0.6s ease both; }
        .animate-scaleIn { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .animate-pulseGlow { animation: pulseGlow 2s infinite; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }

        @media (hover: hover) {
            .hover-lift:hover { transform: translateY(-4px); }
            .hover-glow:hover { box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        }

        .btn-juicy {
            touch-action: manipulation;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-juicy:active { transform: scale(0.96) !important; }

        .word-chip {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .progress-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s ease; }
        .progress-dot.active { width: 24px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, CheckCircle2, RotateCcw, Lightbulb, Puzzle, Moon, Sun, ZoomIn, ZoomOut, Swords, ArrowRight, BookOpen, Edit2, LayoutGrid, Award, GraduationCap, Star, Trophy, X, ArrowLeft, XCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const EMOJI_SETS = [
            ['🌟','✨','🚀','💫','⭐'],
            ['🎯','🏆','💡','🔥','🧩'],
            ['📚','📖','✏️','📝','🧠'],
            ['🎨','🎭','🎪','🌈','🎉']
        ];

        const ReadingActivity = () => {
            const [loading, setLoading] = useState(true);
            const [activityData, setActivityData] = useState(null);
            const [activityId, setActivityId] = useState(null);
            const [stories, setStories] = useState([]);
            const [curIdx, setCurIdx] = useState(-1); 
            const [isStudent, setIsStudent] = useState(false);

            const [currentSlide, setCurrentSlide] = useState(0); 
            const [slideResult, setSlideResult] = useState(null); 
            const [dropped, setDropped] = useState({});
            const [selectedWord, setSelectedWord] = useState(null);
            
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [fontSize, setFontSize] = useState(window.innerWidth < 768 ? 18 : 22);

            // Q&A States (Option Select version)
            const [qaMode, setQaMode] = useState(false);
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [qaFinished, setQaFinished] = useState(false);
            const [score, setScore] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);

            const startStory = (index) => {
                setCurIdx(index);
                setCurrentSlide(0); 
                setDropped({});
                setSlideResult(null);
                setSelectedWord(null);
                setQaMode(false);
                setQaFinished(false);
                setCurrentQIdx(0);
                setScore(0);
                setSelectedOption(null);
            };

            const toggleTheme = () => { 
                setIsDarkMode(!isDarkMode); 
                localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); 
            };

            const currentStory = curIdx !== -1 ? stories[curIdx] : null;

            const wordBank = useMemo(() => {
                if (!currentStory) return [];
                return currentStory.flatTokens.filter(t => t.isHidden).map(t => t.text).sort(() => Math.random() - 0.5); 
            }, [currentStory]);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (params.get('student') === 'true') setIsStudent(true);
                    if (!id) return;
                    setActivityId(id);
                    
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const savedData = snap.data();
                        setActivityData(savedData);
                        
                        let loadedStories = [];
                        if (savedData.stories) {
                            loadedStories = savedData.stories;
                        } else if (savedData.content) {
                            loadedStories = [{
                                title: savedData.title,
                                text: savedData.content.text,
                                fun_fact: savedData.content.fun_fact,
                                image_url: savedData.content.image_url,
                                blanks: savedData.content.blanks,
                                questions: savedData.content.questions
                            }];
                        }

                        const processed = loadedStories.map(s => {
                            const rawParagraphs = s.text.split(/\n\n+/).filter(p => p.trim().length > 0);
                            let globalId = 0;
                            
                            const parsedParagraphs = rawParagraphs.map(p => {
                                const regex = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s\[\]]+|\s+)/g;
                                const parts = p.match(regex) || [];
                                
                                return parts.map(part => {
                                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                                    let cleanText = isBracketed ? part.slice(1, -1) : part;
                                    let isWord = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(cleanText);
                                    let isHidden = isBracketed && isWord;
                                    return { id: globalId++, text: cleanText, isWord, isHidden };
                                });
                            });

                            return {
                                ...s,
                                paragraphs: parsedParagraphs,
                                flatTokens: parsedParagraphs.flat()
                            };
                        });

                        setStories(processed);
                        if (processed.length === 1) startStory(0);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            useEffect(() => {
                let scrollInterval = null;
                const handleDragOverEdge = (e) => {
                    const threshold = 100;
                    const speed = 15;
                    const clientY = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);
                    if (!clientY) return;

                    if (clientY < threshold) {
                        if (!scrollInterval) scrollInterval = setInterval(() => window.scrollBy(0, -speed), 20);
                    } else if (window.innerHeight - clientY < threshold) {
                        if (!scrollInterval) scrollInterval = setInterval(() => window.scrollBy(0, speed), 20);
                    } else {
                        if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
                    }
                };
                const handleDragEndEdge = () => { if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; } };

                window.addEventListener('dragover', handleDragOverEdge);
                window.addEventListener('touchmove', handleDragOverEdge, { passive: true });
                window.addEventListener('dragend', handleDragEndEdge);
                window.addEventListener('drop', handleDragEndEdge);
                window.addEventListener('touchend', handleDragEndEdge);
                
                return () => {
                    window.removeEventListener('dragover', handleDragOverEdge);
                    window.removeEventListener('touchmove', handleDragOverEdge);
                    window.removeEventListener('dragend', handleDragEndEdge);
                    window.removeEventListener('drop', handleDragEndEdge);
                    window.removeEventListener('touchend', handleDragEndEdge);
                    if (scrollInterval) clearInterval(scrollInterval);
                };
            }, []);

            const handleEdit = () => {
                if (!activityId) return;
                const folderParam = (activityData && activityData.parentPath) ? `&folder=${encodeURIComponent(activityData.parentPath)}` : '';
                window.location.href = `dashboard-reading.html?edit=${activityId}${folderParam}`;
            };

            const handleDragStart = (e, word) => { e.dataTransfer.setData("text/plain", word); };
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (e, index) => {
                e.preventDefault();
                if (slideResult === 'correct') return; 
                const word = e.dataTransfer.getData("text/plain");
                if(!word) return;
                setDropped(prev => ({ ...prev, [index]: word }));
                setSlideResult(null);
                setSelectedWord(null);
            };
            const removeDrop = (index) => { 
                if (slideResult === 'correct') return;
                const newDropped = { ...dropped }; 
                delete newDropped[index]; 
                setDropped(newDropped); 
                setSlideResult(null);
            };

            const handleWordTap = (word) => {
                if (slideResult === 'correct') return;
                if (selectedWord === word) {
                    setSelectedWord(null);
                    return;
                }
                setSelectedWord(word);
            };

            const handleBlankTap = (tokenId) => {
                if (slideResult === 'correct') return;
                if (dropped[tokenId]) {
                    removeDrop(tokenId);
                    return;
                }
                if (selectedWord) {
                    setDropped(prev => ({ ...prev, [tokenId]: selectedWord }));
                    setSlideResult(null);
                    setSelectedWord(null);
                }
            };
            
            const checkSlideAnswers = () => {
                if (!currentStory) return;
                const currentTokens = currentStory.paragraphs[currentSlide - 1];
                const hidden = currentTokens.filter(t => t.isHidden);
                const isAllCorrect = hidden.every(t => dropped[t.id] === t.text);
                
                setSlideResult(isAllCorrect ? 'correct' : 'wrong');
                if (isAllCorrect) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                } else {
                    setTimeout(() => {
                        const newDropped = { ...dropped };
                        hidden.forEach(t => {
                            if (newDropped[t.id] !== t.text) delete newDropped[t.id];
                        });
                        setDropped(newDropped);
                        setSlideResult(null);
                    }, 1200);
                }
            };

            const nextSlide = () => {
                setSlideResult(null);
                setSelectedWord(null);
                setCurrentSlide(c => c + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const prevSlide = () => {
                if (currentSlide > 1) {
                    // Mantenemos el estado de dropped y confiamos en que el slide ya estaba completado
                    setSlideResult(null);
                    setSelectedWord(null);
                    setCurrentSlide(c => c - 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            // ── Q&A MULTIPLE CHOICE LOGIC ──
            const startChallenge = () => {
                if (!currentStory.questions || currentStory.questions.length === 0) { alert("Esta lectura no tiene preguntas."); return; }
                setQaMode(true);
                setCurrentQIdx(0);
                setScore(0);
                setSelectedOption(null);
                setQaFinished(false);
            };

            const handleOptionClick = (idx) => {
                if (selectedOption !== null) return; // ya respondió
                const q = currentStory.questions[currentQIdx];
                setSelectedOption(idx);
                const isCorrect = idx === q.correctIndex;

                if (isCorrect) {
                    confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
                    setScore(s => s + 1);
                    setTimeout(() => nextQuestion(), 1200);
                } else {
                    const el = document.getElementById('qa-box');
                    if (el) {
                        el.classList.add('animate-shake');
                        setTimeout(() => el.classList.remove('animate-shake'), 500);
                    }
                    setTimeout(() => nextQuestion(), 2000); // 2 segundos para ver cuál era la correcta y avanzar
                }
            };

            const nextQuestion = () => {
                setSelectedOption(null);
                if (currentQIdx < currentStory.questions.length - 1) {
                    setCurrentQIdx(idx => idx + 1);
                } else {
                    setQaFinished(true);
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                }
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <div className="text-center">
                        <Loader2 className="animate-spin text-indigo-500 mx-auto mb-4" size={40}/>
                        <p className="text-slate-400 font-bold tracking-widest text-xs uppercase">Cargando lectura...</p>
                    </div>
                </div>
            );
            if (!activityData) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-center p-8">
                    <BookOpen size={64} className="text-slate-700 mb-6"/>
                    <h2 className="text-2xl font-black text-white mb-2">Lectura no encontrada</h2>
                    <p className="text-slate-500 mb-8">El enlace puede estar incompleto o la lectura fue eliminada.</p>
                    <button onClick={() => window.location.href = 'index.html'} className="btn-juicy bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">Volver al Inicio</button>
                </div>
            );

            // ═══════════════ 7. MENÚ (Multi-story) ═══════════════
            if (curIdx === -1) {
                return (
                    <div className={`min-h-screen font-sans flex flex-col transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-800'}`}>
                        {/* ── BANNER MULTI-STORY ── */}
                        <div className={`px-4 md:px-6 py-3 flex items-start justify-between gap-4 shrink-0 sticky top-0 z-50 backdrop-blur-xl border-b transition-colors ${isDarkMode ? 'bg-slate-900/70 border-white/5 text-white' : 'bg-white/70 border-slate-200 text-slate-800'}`}>
                            <div className="flex items-center gap-3 md:gap-4 min-w-0">
                                <div className="w-11 h-11 md:w-14 md:h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-indigo-500/20">
                                    <span className="font-black text-2xl md:text-3xl text-white">P</span>
                                </div>
                                <div className="flex flex-col justify-center min-w-0">
                                    <p className="text-indigo-500 dark:text-indigo-400 font-extrabold uppercase tracking-[0.2em] text-[9px] md:text-[11px] mb-0.5 md:mb-1">
                                        Reading and Comprehension
                                    </p>
                                    <h1 className="text-base md:text-2xl font-black text-slate-800 dark:text-white leading-tight line-clamp-2">{activityData.title}</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 mt-1 shrink-0">
                                {!isStudent && (
                                    <button onClick={handleEdit} className={`hidden md:flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border btn-juicy ${isDarkMode ? 'border-slate-600 hover:bg-slate-700 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'}`}>
                                        <Edit2 size={14}/> Editar
                                    </button>
                                )}
                                <button onClick={toggleTheme} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'bg-white border border-slate-200 shadow-sm hover:bg-slate-100 text-slate-600'}`}>
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar">
                            <div className="max-w-6xl mx-auto">
                                <div className="text-center mb-12 animate-fadeUp">
                                    <h1 className="text-4xl md:text-6xl font-black mb-4 tracking-tight drop-shadow-sm">{activityData.title}</h1>
                                    <p className="text-lg md:text-xl font-medium opacity-60 max-w-2xl mx-auto">Selecciona una lectura interactiva para practicar tu vocabulario y comprensión.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {stories.map((s, i) => {
                                        const wordCount = s.flatTokens ? s.flatTokens.filter(t => t.isWord).length : s.text.split(/\s+/).length;
                                        const blanksCount = s.flatTokens ? s.flatTokens.filter(t => t.isHidden).length : (s.blanks ? s.blanks.length : 0);
                                        
                                        return (
                                            <div key={i} onClick={() => startStory(i)} className={`group rounded-[2rem] overflow-hidden shadow-md hover-lift transition-all cursor-pointer border flex flex-col animate-fadeUp ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:border-indigo-500' : 'bg-white border-slate-200 hover:border-indigo-400'}`} style={{animationDelay: `${i * 100}ms`}}>
                                                
                                                <div className={`h-48 relative overflow-hidden flex items-center justify-center ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}>
                                                    {s.image_url ? (
                                                        <img src={s.image_url} alt={s.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"/>
                                                    ) : (
                                                        <div className="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center group-hover:scale-105 transition-transform duration-700">
                                                            <BookOpen size={64} className="text-white opacity-20"/>
                                                        </div>
                                                    )}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
                                                    
                                                    <div className="absolute bottom-4 left-4 right-4">
                                                        <span className="bg-indigo-600 text-white text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded mb-2 inline-block shadow-lg">Lectura {i + 1}</span>
                                                        <h3 className="text-white font-black text-xl leading-tight line-clamp-2 drop-shadow-md">{s.title || 'Historia sin título'}</h3>
                                                    </div>
                                                </div>

                                                <div className="p-6 flex-1 flex flex-col justify-between gap-6">
                                                    <div className="flex items-center justify-between text-xs font-bold uppercase tracking-widest opacity-60">
                                                        <div className="flex items-center gap-1.5"><LayoutGrid size={14}/> {blanksCount} Huecos</div>
                                                        <div className="flex items-center gap-1.5"><BookOpen size={14}/> {wordCount} Palabras</div>
                                                    </div>
                                                    
                                                    <button className="btn-juicy w-full py-3.5 rounded-xl font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-all bg-indigo-50 text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white dark:bg-indigo-900/30 dark:text-indigo-400 dark:group-hover:bg-indigo-500 dark:group-hover:text-white">
                                                        Comenzar <ArrowRight size={16}/>
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ═══════════════ 8. JUEGO ACTIVO ═══════════════
            const availableWords = wordBank.filter(word => {
                const totalInText = currentStory.flatTokens.filter(t => t.text === word && t.isHidden).length;
                const totalPlaced = Object.values(dropped).filter(w => w === word).length;
                return totalPlaced < totalInText;
            });

            const totalContentSlides = currentStory.paragraphs.length;
            const hasFunFact = !!currentStory.fun_fact;
            const SLIDE_TITLE = 0;
            const SLIDE_PARAGRAPH_START = 1;
            const SLIDE_PARAGRAPH_END = totalContentSlides;
            const SLIDE_FUN_FACT = hasFunFact ? SLIDE_PARAGRAPH_END + 1 : null;
            const SLIDE_END = hasFunFact ? SLIDE_PARAGRAPH_END + 2 : SLIDE_PARAGRAPH_END + 1;

            const isOnParagraph = currentSlide >= SLIDE_PARAGRAPH_START && currentSlide <= SLIDE_PARAGRAPH_END;
            const currentParagraphIdx = isOnParagraph ? currentSlide - 1 : -1;
            
            // Ya que permitimos volver atrás, validamos si este párrafo específico ya tiene todos los huecos correctos.
            const currentTokens = isOnParagraph ? currentStory.paragraphs[currentParagraphIdx] : [];
            const hiddenInSlide = currentTokens.filter(t => t.isHidden);
            const requiresCheck = hiddenInSlide.length > 0;
            const isFullyFilled = requiresCheck && hiddenInSlide.every(t => dropped[t.id] === t.text);
            
            // Actualizamos la condición de "slide completo": O acaba de dar click en Verificar (y estuvo bien), o ya lo había llenado.
            const isSlideComplete = slideResult === 'correct' || (!requiresCheck) || isFullyFilled;

            const isLeftEmoji = currentSlide % 2 !== 0; // Ya no aplica para la franja lateral, pero podemos usar currentEmojis
            const currentEmojis = EMOJI_SETS[currentSlide % EMOJI_SETS.length];

            const isFunFactSlide = SLIDE_FUN_FACT !== null && currentSlide === SLIDE_FUN_FACT;
            const isEndSlide = currentSlide === SLIDE_END;

            const progressTotal = SLIDE_END;
            const progressCurrent = Math.min(currentSlide, progressTotal);

            const activeStoryWordCount = currentStory.flatTokens.filter(t => t.isWord).length;

            return (
                <div className="min-h-screen font-sans flex flex-col transition-all duration-700">
                    
                    {/* ── HERO BACKGROUND IMAGE ── */}
                    {currentStory.image_url && (
                        <div className="fixed inset-0 z-0">
                            <img src={currentStory.image_url} alt="" className="w-full h-full object-cover" style={{ objectPosition: 'center top' }}/>
                            <div className={`absolute inset-0 ${isDarkMode 
                                ? 'bg-gradient-to-b from-slate-900/40 via-slate-900/80 to-slate-900' 
                                : 'bg-gradient-to-b from-white/30 via-slate-100/80 to-slate-100'}`}></div>
                        </div>
                    )}
                    {!currentStory.image_url && (
                        <div className={`fixed inset-0 z-0 ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}></div>
                    )}

                    <div className="relative z-10 flex-1 flex flex-col w-full h-full">
                        
                        {/* ── BANNER JUEGO ACTIVO ── */}
                        <div className={`px-4 md:px-6 py-3 flex items-start justify-between gap-4 shrink-0 sticky top-0 z-50 backdrop-blur-xl border-b transition-colors ${isDarkMode ? 'bg-slate-900/70 border-white/5 text-white' : 'bg-white/70 border-slate-200 text-slate-800'}`}>
                            <div className="flex items-center gap-3 md:gap-4 min-w-0 cursor-pointer" onClick={() => setCurIdx(-1)}>
                                <div className="w-11 h-11 md:w-14 md:h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-indigo-500/20">
                                    <span className="font-black text-2xl md:text-3xl text-white">P</span>
                                </div>
                                <div className="flex flex-col justify-center min-w-0">
                                    <p className="text-indigo-500 dark:text-indigo-400 font-extrabold uppercase tracking-[0.2em] text-[9px] md:text-[11px] mb-0.5 md:mb-1">
                                        Reading and Comprehension
                                    </p>
                                    <h1 className="text-base md:text-2xl font-black text-slate-800 dark:text-white leading-tight line-clamp-2 hover:underline">{currentStory.title || activityData.title}</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 mt-1 shrink-0">
                                <div className={`hidden md:flex items-center gap-1 px-3 py-2 rounded-xl ${isDarkMode ? 'bg-slate-800' : 'bg-white border border-slate-200'}`}>
                                    {Array.from({ length: progressTotal + 1 }).map((_, i) => (
                                        <div key={i} className={`progress-dot ${i === currentSlide ? 'active' : ''} ${i <= currentSlide ? (isDarkMode ? 'bg-indigo-500' : 'bg-indigo-500') : (isDarkMode ? 'bg-slate-700' : 'bg-slate-300')}`}/>
                                    ))}
                                </div>
                                <button onClick={toggleTheme} className={`p-2 rounded-full transition-colors btn-juicy ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'bg-white border border-slate-200 shadow-sm hover:bg-slate-100 text-slate-600'}`}>
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>
                        </div>

                        {/* ── Q&A MODAL OVERLAY (MULTIPLE CHOICE) ── */}
                        {qaMode && (
                            <div className="fixed inset-0 z-[60] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4 md:p-6 animate-scaleIn overflow-y-auto">
                                {qaFinished ? (
                                    <div className={`rounded-[3rem] p-10 md:p-12 text-center max-w-lg w-full shadow-2xl my-auto ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                                        <div className="w-24 h-24 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-500 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Trophy size={48} strokeWidth={2.5}/>
                                        </div>
                                        <h2 className={`text-4xl font-black mb-2 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>¡Completado!</h2>
                                        <p className={`text-lg font-bold mb-2 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Puntuación</p>
                                        <div className="flex items-center justify-center gap-1 mb-8">
                                            {Array.from({ length: currentStory.questions.length }).map((_, i) => (
                                                <Star key={i} size={32} className={i < score ? 'text-yellow-400 fill-yellow-400' : (isDarkMode ? 'text-slate-700' : 'text-slate-200')} />
                                            ))}
                                        </div>
                                        <div className="flex flex-col gap-3 max-w-sm mx-auto">
                                            <button onClick={() => { startStory(curIdx); }} className="btn-juicy w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl flex items-center justify-center gap-2">
                                                <RotateCcw size={20}/> Reiniciar Lectura
                                            </button>
                                            <button onClick={() => setQaMode(false)} className={`btn-juicy w-full py-3 rounded-2xl font-bold border ${isDarkMode ? 'border-slate-600 text-slate-300 hover:bg-slate-700' : 'border-slate-300 text-slate-600 hover:bg-slate-100'}`}>
                                                Ver Resumen
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div id="qa-box" className={`w-full max-w-5xl rounded-[2rem] overflow-hidden shadow-2xl transition-colors duration-200 flex flex-col md:flex-row my-auto ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                                        
                                        {/* TEXT AREA FOR REFERENCE */}
                                        <div className={`md:w-1/2 p-6 md:p-8 border-b md:border-b-0 md:border-r ${isDarkMode ? 'border-slate-700 bg-slate-800/50' : 'border-slate-200 bg-slate-50'}`}>
                                            <h4 className="text-xs font-black uppercase tracking-widest text-indigo-500 mb-4 flex items-center gap-2"><BookOpen size={16}/> Texto de referencia</h4>
                                            <p className={`leading-relaxed text-base md:text-lg font-medium ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>
                                                {/* Sacamos el texto limpio de llaves y buscamos el párrafo correcto si existe */}
                                                {(() => {
                                                    const cleanText = currentStory.text.replace(/\[([^\]]+)\]/g, '$1');
                                                    const paragraphs = cleanText.split(/\n\n+/);
                                                    const pIdx = currentStory.questions[currentQIdx].paragraph_index;
                                                    return pIdx !== undefined && paragraphs[pIdx] ? paragraphs[pIdx] : cleanText;
                                                })()}
                                            </p>
                                        </div>
                                        
                                        {/* QUESTION & OPTIONS AREA */}
                                        <div className="md:w-1/2 p-6 md:p-8 flex flex-col justify-center">
                                            <div className="flex justify-between items-center mb-6">
                                                <span className="font-black tracking-widest text-slate-400 text-xs uppercase flex items-center gap-2"><Swords size={16}/> Pregunta {currentQIdx + 1}/{currentStory.questions.length}</span>
                                                <button onClick={() => setQaMode(false)} className="text-slate-500 hover:text-white transition-colors p-1"><X size={16}/></button>
                                            </div>
                                            
                                            <h3 className={`text-xl md:text-2xl font-black mb-8 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>"{currentStory.questions[currentQIdx].q}"</h3>
                                            
                                            <div className="flex flex-col gap-3">
                                                {(currentStory.questions[currentQIdx].options || []).map((opt, idx) => {
                                                    const isSelected = selectedOption === idx;
                                                    const isCorrect = idx === currentStory.questions[currentQIdx].correctIndex;
                                                    const showResult = selectedOption !== null;
                                                    
                                                    let btnClass = isDarkMode ? 'bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50';
                                                    
                                                    if (showResult) {
                                                        if (isCorrect) btnClass = 'bg-emerald-500/20 text-emerald-500 border-emerald-500/50';
                                                        else if (isSelected) btnClass = 'bg-rose-500/20 text-rose-500 border-rose-500/50';
                                                        else btnClass = isDarkMode ? 'bg-slate-800 text-slate-500 border-slate-700 opacity-50' : 'bg-slate-100 text-slate-400 border-slate-200 opacity-50';
                                                    }
                                                    
                                                    return (
                                                        <button key={idx} disabled={showResult} onClick={() => handleOptionClick(idx)} className={`p-4 rounded-xl border-2 font-bold text-left transition-all flex justify-between items-center ${btnClass}`}>
                                                            <span>{opt}</span>
                                                            {showResult && isCorrect && <CheckCircle2 size={20} className="text-emerald-500 shrink-0"/>}
                                                            {showResult && isSelected && !isCorrect && <XCircle size={20} className="text-rose-500 shrink-0"/>}
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── MAIN CONTENT ── */}
                        <div className={`max-w-[1400px] mx-auto w-full p-4 md:p-8 flex-1 flex flex-col lg:grid lg:grid-cols-12 gap-6 md:gap-8 items-start ${qaMode ? 'hidden' : ''}`}>
                            
                            {/* ── LEFT: Main Reading Area ── */}
                            <div className={`w-full flex-1 flex flex-col justify-center animate-fadeUp ${isOnParagraph && !isEndSlide ? 'order-2 lg:order-1 lg:col-span-8' : 'order-1 lg:col-span-12'}`}>
                                
                                {/* ═══ SLIDE 0: TITLE CARD MEJORADO ═══ */}
                                {currentSlide === 0 && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-16 text-center animate-scaleIn ${isDarkMode ? 'bg-slate-800/80 border-slate-700/50 text-white backdrop-blur-lg' : 'bg-white/80 border-white/50 text-slate-800 backdrop-blur-lg'}`}>
                                        {currentStory.image_url && (
                                            <div className="w-28 h-28 md:w-36 md:h-36 mx-auto rounded-3xl overflow-hidden shadow-2xl mb-8 border-4 border-white/20">
                                                <img src={currentStory.image_url} alt="" className="w-full h-full object-cover"/>
                                            </div>
                                        )}
                                        {!currentStory.image_url && (
                                            <div className="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white mb-8 shadow-lg shadow-indigo-500/30">
                                                <GraduationCap size={40} />
                                            </div>
                                        )}
                                        <h2 className="text-4xl md:text-6xl font-black tracking-tight mb-4 leading-tight">{currentStory.title}</h2>
                                        <p className={`text-lg md:text-xl font-bold mb-10 uppercase tracking-widest flex items-center justify-center gap-2 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                            <Award size={20}/> By {activityData.authorName || 'Teacher'}
                                        </p>
                                        
                                        {/* TARJETAS DE MÉTRICAS DETALLADAS */}
                                        <div className="grid grid-cols-3 gap-3 md:gap-6 max-w-lg mx-auto mb-10">
                                            <div className={`flex flex-col items-center justify-center p-4 rounded-2xl border shadow-sm ${isDarkMode ? 'bg-slate-700/50 border-slate-600' : 'bg-slate-50 border-slate-200'}`}>
                                                <BookOpen size={28} className="mb-2 text-indigo-500"/>
                                                <span className={`text-2xl md:text-3xl font-black ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{totalContentSlides}</span>
                                                <span className={`text-[10px] md:text-xs font-bold uppercase tracking-widest ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Párrafos</span>
                                            </div>
                                            <div className={`flex flex-col items-center justify-center p-4 rounded-2xl border shadow-sm ${isDarkMode ? 'bg-slate-700/50 border-slate-600' : 'bg-slate-50 border-slate-200'}`}>
                                                <LayoutGrid size={28} className="mb-2 text-emerald-500"/>
                                                <span className={`text-2xl md:text-3xl font-black ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{activeStoryWordCount}</span>
                                                <span className={`text-[10px] md:text-xs font-bold uppercase tracking-widest ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Palabras</span>
                                            </div>
                                            <div className={`flex flex-col items-center justify-center p-4 rounded-2xl border shadow-sm ${isDarkMode ? 'bg-slate-700/50 border-slate-600' : 'bg-slate-50 border-slate-200'}`}>
                                                <Swords size={28} className="mb-2 text-rose-500"/>
                                                <span className={`text-2xl md:text-3xl font-black ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{currentStory.questions?.length || 0}</span>
                                                <span className={`text-[10px] md:text-xs font-bold uppercase tracking-widest ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Preguntas</span>
                                            </div>
                                        </div>

                                        <button onClick={nextSlide} className="btn-juicy px-10 py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-black text-xl shadow-xl flex items-center gap-3 mx-auto animate-pulseGlow">
                                            Comenzar Lectura <ArrowRight size={24}/>
                                        </button>
                                    </div>
                                )}

                                {/* ═══ SLIDES 1..N: PARAGRAPHS ═══ */}
                                {isOnParagraph && (
                                    <div className="space-y-4 md:space-y-6 animate-fadeUp" key={`slide-${currentSlide}`}>
                                        <div className={`relative rounded-[2rem] shadow-2xl border p-6 md:p-10 leading-loose transition-all duration-300 flex flex-col ${isDarkMode ? 'bg-slate-800/90 border-slate-700 text-slate-200 backdrop-blur-lg' : 'bg-white/90 border-white text-slate-700 backdrop-blur-lg'}`} style={{ fontSize: `${fontSize}px` }}>
                                            
                                            <div className="flex-1 font-medium text-justify">
                                                
                                                {/* BARRA DE CONTROLES DEL PÁRRAFO */}
                                                <div className="flex items-center justify-between mb-4 md:mb-6 border-b pb-3 border-slate-200 dark:border-slate-700">
                                                    <div className="flex items-center gap-3">
                                                        {currentSlide > 1 && (
                                                            <button onClick={prevSlide} className={`p-1.5 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors btn-juicy`}>
                                                                <ArrowLeft size={16}/>
                                                            </button>
                                                        )}
                                                        <span className="text-xs font-black uppercase tracking-widest opacity-40">Párrafo {currentParagraphIdx + 1} / {totalContentSlides}</span>
                                                    </div>

                                                    <div className="flex items-center gap-3">
                                                        {/* CONTROLES DE ZOOM AQUÍ */}
                                                        <div className={`hidden sm:flex items-center gap-1 md:gap-2 px-2 py-1 rounded-lg border shrink-0 ${isDarkMode ? 'bg-slate-700/50 border-slate-600' : 'bg-slate-100 border-slate-200'}`}>
                                                            <button onClick={() => setFontSize(s => Math.max(14, s - 2))} className="p-1 rounded hover:bg-opacity-20 opacity-70 hover:opacity-100 btn-juicy"><ZoomOut size={14}/></button>
                                                            <span className="text-[10px] font-bold w-4 text-center opacity-50">{fontSize}</span>
                                                            <button onClick={() => setFontSize(s => Math.min(40, s + 2))} className="p-1 rounded hover:bg-opacity-20 opacity-70 hover:opacity-100 btn-juicy"><ZoomIn size={14}/></button>
                                                        </div>

                                                        {requiresCheck && !isSlideComplete && <span className="text-xs font-black uppercase tracking-widest text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full">{hiddenInSlide.length - Object.keys(dropped).filter(k => hiddenInSlide.some(h => h.id === parseInt(k))).length} restantes</span>}
                                                        {isSlideComplete && <span className="text-xs font-black uppercase tracking-widest text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full flex items-center gap-1"><CheckCircle2 size={14}/> Correcto</span>}
                                                    </div>
                                                </div>

                                                {/* TEXTO DEL PÁRRAFO */}
                                                {currentTokens.map((t, i) => {
                                                    if (t.isHidden) {
                                                        const val = dropped[t.id];
                                                        let stateClass = isDarkMode ? 'token-hidden-dark' : 'token-hidden-light';
                                                        if (val) stateClass = 'token-filled'; 
                                                        if (isSlideComplete && val) stateClass = 'token-correct';
                                                        if (slideResult === 'wrong' && val) stateClass = val === t.text ? 'token-correct' : 'token-wrong';
                                                        
                                                        const prevIsHidden = i > 0 && currentTokens[i-1].isHidden && currentTokens[i-1].isWord;
                                                        const nextIsHidden = i < currentTokens.length - 1 && currentTokens[i+1].isHidden && currentTokens[i+1].isWord;
                                                        
                                                        let shapeClass = "token-single";
                                                        if (prevIsHidden && nextIsHidden) shapeClass = "token-middle";
                                                        else if (prevIsHidden && !nextIsHidden) shapeClass = "token-end";
                                                        else if (!prevIsHidden && nextIsHidden) shapeClass = "token-start";

                                                        return <span key={i} 
                                                            onDragOver={handleDragOver} 
                                                            onDrop={(e) => handleDrop(e, t.id)} 
                                                            onClick={() => handleBlankTap(t.id)} 
                                                            className={`token-base cursor-pointer ${stateClass} ${shapeClass} ${!val && selectedWord ? 'animate-pulseGlow' : ''}`}
                                                        >{val || ""}</span>;
                                                    }
                                                    if (t.text.match(/\n/)) return <br key={i}/>;
                                                    return <span key={i}>{t.text}</span>;
                                                })}
                                            </div>

                                            {/* FRANJA DE EMOJIS HORIZONTAL AL FONDO */}
                                            <div className="mt-8 flex justify-center gap-6 md:gap-10 opacity-30 text-2xl md:text-3xl border-t border-slate-200 dark:border-slate-700 pt-6">
                                                {currentEmojis.map((e,i)=><span key={i} className="hover:scale-125 transition-transform cursor-default">{e}</span>)}
                                            </div>
                                        </div>

                                        {/* Mobile progress */}
                                        <div className="flex md:hidden justify-center gap-1.5 py-2">
                                            {Array.from({ length: progressTotal + 1 }).map((_, i) => (
                                                <div key={i} className={`progress-dot ${i === currentSlide ? 'active' : ''} ${i <= currentSlide ? 'bg-indigo-500' : (isDarkMode ? 'bg-slate-700' : 'bg-slate-300')}`}/>
                                            ))}
                                        </div>

                                        <div className="flex justify-end pt-1">
                                            {requiresCheck && !isSlideComplete ? (
                                                <button onClick={checkSlideAnswers} className={`btn-juicy px-8 py-4 rounded-2xl font-black text-lg shadow-xl flex items-center gap-2 ${isDarkMode ? 'bg-slate-700 text-white hover:bg-slate-600' : 'bg-slate-900 text-white hover:bg-slate-800'}`}>
                                                    <CheckCircle2 size={20}/> Verificar
                                                </button>
                                            ) : (
                                                <button onClick={nextSlide} className="btn-juicy bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-xl flex items-center gap-3 animate-fadeUp">
                                                    {currentSlide === SLIDE_PARAGRAPH_END ? (hasFunFact ? '¿Sabías que...?' : 'Ver Resumen') : 'Siguiente Párrafo'} <ArrowRight size={24}/>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* ═══ FUN FACT SLIDE ═══ */}
                                {isFunFactSlide && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-14 text-center max-w-2xl mx-auto animate-scaleIn ${isDarkMode ? 'bg-amber-900/30 border-amber-500/20 backdrop-blur-lg' : 'bg-amber-50 border-amber-200'}`}>
                                        <div className={`w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-8 shadow-lg ${isDarkMode ? 'bg-amber-500/20 text-amber-400' : 'bg-white text-amber-500'}`}>
                                            <Lightbulb size={40} strokeWidth={2.5}/>
                                        </div>
                                        <h3 className={`font-black text-sm uppercase tracking-[0.2em] mb-6 ${isDarkMode ? 'text-amber-400' : 'text-amber-800'}`}>Did You Know?</h3>
                                        <p className={`text-xl md:text-2xl font-medium leading-relaxed mb-10 ${isDarkMode ? 'text-amber-100/90' : 'text-amber-900/80'}`}>{currentStory.fun_fact}</p>
                                        
                                        <button onClick={nextSlide} className="btn-juicy bg-amber-500 hover:bg-amber-400 text-white px-10 py-4 rounded-full font-black text-lg shadow-xl flex items-center gap-3 mx-auto">
                                            Continuar <ArrowRight size={24}/>
                                        </button>
                                    </div>
                                )}

                                {/* ═══ END SLIDE ═══ */}
                                {isEndSlide && (
                                    <div className={`rounded-[3rem] shadow-2xl border p-8 md:p-14 text-center max-w-2xl mx-auto animate-scaleIn ${isDarkMode ? 'bg-slate-800/90 border-slate-700 backdrop-blur-lg text-white' : 'bg-white/90 border-white text-slate-800 backdrop-blur-lg'}`}>
                                        <div className="w-24 h-24 mx-auto rounded-full bg-emerald-100 dark:bg-emerald-900/50 text-emerald-500 flex items-center justify-center mb-8">
                                            <CheckCircle2 size={56} strokeWidth={3} />
                                        </div>
                                        <h2 className="text-3xl md:text-5xl font-black mb-4">¡Lectura Completada!</h2>
                                        <p className={`text-lg mb-10 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Has rellenado correctamente todos los párrafos.</p>
                                        
                                        <div className="flex flex-col gap-3 max-w-sm mx-auto">
                                            {currentStory.questions && currentStory.questions.length > 0 && (
                                                <button onClick={startChallenge} className="btn-juicy w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-500 flex items-center justify-center gap-2 text-lg animate-pulseGlow">
                                                    <Swords size={24}/> CHALLENGE Q&A <ArrowRight size={20}/>
                                                </button>
                                            )}
                                            <button onClick={() => startStory(curIdx)} className={`btn-juicy w-full py-4 rounded-2xl font-black border flex items-center justify-center gap-2 ${isDarkMode ? 'border-slate-600 hover:bg-slate-700 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'}`}>
                                                <RotateCcw size={20}/> Volver a Leer
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* ── RIGHT SIDEBAR: Word Bank (only on paragraph slides) ── */}
                            {isOnParagraph && !isEndSlide && (
                                <div className="order-1 lg:order-2 lg:col-span-4 w-full lg:sticky lg:top-20 lg:self-start flex flex-col gap-4 md:gap-6 lg:h-[calc(100vh-6rem)] animate-fadeUp" style={{ animationDelay: '0.15s' }}>
                                    <div className={`rounded-[2rem] shadow-xl border overflow-hidden flex flex-col h-full max-h-[350px] lg:max-h-full ${isDarkMode ? 'bg-slate-800/90 border-slate-700 backdrop-blur-lg' : 'bg-white/90 border-white backdrop-blur-lg'}`}>
                                        <div className="bg-slate-900 p-4 flex items-center justify-between text-white shrink-0">
                                            <div className="flex items-center gap-2 font-black uppercase text-xs tracking-widest"><Puzzle size={18} className="text-indigo-400"/> Word Bank</div>
                                            <span className="bg-slate-800 px-3 py-1.5 rounded-lg text-[10px] font-bold text-slate-300 shadow-inner">{availableWords.length} restantes</span>
                                        </div>
                                        
                                        <div className={`p-4 md:p-5 overflow-y-auto custom-scrollbar flex-1 ${isDarkMode ? 'bg-slate-800/50' : 'bg-slate-50'}`} style={{ fontSize: `${Math.max(16, fontSize * 0.7)}px` }}>
                                            {availableWords.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 py-8 text-center">
                                                    <CheckCircle2 size={48} className="mb-4 opacity-30 text-emerald-500"/>
                                                    <p className="text-lg font-black uppercase tracking-widest text-emerald-500">¡Perfecto!</p>
                                                    <p className="text-sm font-bold mt-2">Todas las palabras colocadas.</p>
                                                </div>
                                            ) : (
                                                <>
                                                    {selectedWord && (
                                                        <p className={`text-xs font-bold uppercase tracking-widest mb-3 text-center ${isDarkMode ? 'text-indigo-400' : 'text-indigo-600'}`}>Toca un hueco para colocar "{selectedWord}"</p>
                                                    )}
                                                    <div className="flex flex-wrap gap-2 md:gap-3">
                                                        {availableWords.map((w, i) => (
                                                            <div key={`${w}-${i}`} 
                                                                draggable={!isSlideComplete} 
                                                                onDragStart={(e) => handleDragStart(e, w)} 
                                                                onClick={() => handleWordTap(w)}
                                                                className={`word-chip border border-b-4 px-4 py-2 md:py-3 rounded-xl font-bold shadow-sm cursor-grab active:cursor-grabbing transition-all ${
                                                                    selectedWord === w 
                                                                        ? 'bg-indigo-600 border-indigo-700 border-b-indigo-900 text-white scale-105 shadow-lg shadow-indigo-500/30' 
                                                                        : isDarkMode 
                                                                            ? 'bg-slate-700 border-slate-600 border-b-slate-900 text-slate-200' 
                                                                            : 'bg-white border-slate-300 border-b-slate-300 text-slate-700'
                                                                }`}
                                                            >{w}</div>
                                                        ))}
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ReadingActivity />);
    </script>
</body>
</html>

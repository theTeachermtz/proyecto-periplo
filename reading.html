<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Activity | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/scroll-behaviour.min.js"></script>
    <script>
        window.onload = function() {
            MobileDragDrop.polyfill({ 
                holdToDrag: 300
            }); 
            window.addEventListener('touchmove', function() {}, {passive: false});
        };
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; overflow-x: clip; }
        
        .token-base {
            display: inline-flex; align-items: center; justify-content: center; vertical-align: middle;
            padding: 0 0.5em; min-width: 3em; height: 1.8em; transition: all 0.2s ease;
        }

        .token-start { border-top-left-radius: 0.3em; border-bottom-left-radius: 0.3em; margin-left: 0.2em; border-left-width: 2px !important; }
        .token-end { border-top-right-radius: 0.3em; border-bottom-right-radius: 0.3em; margin-right: 0.2em; border-right-width: 2px !important; }
        .token-middle { border-left-width: 0px !important; border-right-width: 0px !important; margin: 0; border-radius: 0; }
        .token-single { border-radius: 0.3em; margin: 0 0.2em; border-left-width: 2px !important; border-right-width: 2px !important; }

        .token-hidden-light { background-color: #f1f5f9; border: 2px dashed #94a3b8; border-bottom-width: 4px; }
        .token-hidden-dark { background-color: #334155; border: 2px dashed #64748b; border-bottom-width: 4px; }
        .token-filled { background-color: #e0e7ff; border: 2px solid #6366f1; color: #3730a3; font-weight: 800; border-bottom-width: 4px; }
        .token-correct { background-color: #dcfce7 !important; border: 2px solid #22c55e !important; color: #14532d !important; border-bottom-width: 4px !important; }
        .token-wrong { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #7f1d1d !important; border-bottom-width: 4px !important; animation: shake 0.4s; }

        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        
        .timer-bar { animation: shrink linear forwards; }
        .animate-shake { animation: shake 0.4s; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Loader2, CheckCircle2, RotateCcw, ArrowLeft, Lightbulb, Puzzle, Moon, Sun, ZoomIn, ZoomOut, Timer, Swords, ArrowRight, PlayCircle, BookOpen, Edit2, LayoutGrid, Award, GraduationCap } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const EMOJI_SETS = [
            ['🌟','✨','🚀','💫','⭐'],
            ['🎯','🏆','💡','🔥','🧩'],
            ['📚','📖','✏️','📝','🧠'],
            ['🎨','🎭','🎪','🌈','🎉']
        ];

        const ReadingActivity = () => {
            // 1. Estados
            const [loading, setLoading] = useState(true);
            const [activityData, setActivityData] = useState(null);
            const [activityId, setActivityId] = useState(null);
            const [stories, setStories] = useState([]);
            const [curIdx, setCurIdx] = useState(-1); 

            const [currentSlide, setCurrentSlide] = useState(0); 
            const [slideResult, setSlideResult] = useState(null); 
            const [dropped, setDropped] = useState({});
            
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [fontSize, setFontSize] = useState(window.innerWidth < 768 ? 18 : 22);

            const [qaMode, setQaMode] = useState(false);
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(12);
            const [timerStarted, setTimerStarted] = useState(false);
            const [showParagraphHelp, setShowParagraphHelp] = useState(false);
            const [qaFinished, setQaFinished] = useState(false);
            const [score, setScore] = useState(0);
            const timerRef = useRef(null);

            // 2. Funciones Clave (Arriba de los useEffects)
            const startStory = (index) => {
                setCurIdx(index);
                setCurrentSlide(0); 
                setDropped({});
                setSlideResult(null);
                setQaMode(false);
                setQaFinished(false);
                setCurrentQIdx(0);
                setScore(0);
            };

            const toggleTheme = () => { 
                setIsDarkMode(!isDarkMode); 
                localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); 
            };

            // 3. Variables Derivadas
            const currentStory = curIdx !== -1 ? stories[curIdx] : null;

            const wordBank = useMemo(() => {
                if (!currentStory) return [];
                return currentStory.flatTokens.filter(t => t.isHidden).map(t => t.text).sort(() => Math.random() - 0.5); 
            }, [currentStory]);

            // 4. Efectos (Después de que las funciones existen)
            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) return;
                    setActivityId(id);
                    
                    const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (snap.exists()) {
                        const savedData = snap.data();
                        setActivityData(savedData);
                        
                        let loadedStories = [];
                        if (savedData.stories) {
                            loadedStories = savedData.stories;
                        } else if (savedData.content) {
                            loadedStories = [{
                                title: savedData.title,
                                text: savedData.content.text,
                                fun_fact: savedData.content.fun_fact,
                                image_url: savedData.content.image_url,
                                blanks: savedData.content.blanks,
                                questions: savedData.content.questions
                            }];
                        }

                        const processed = loadedStories.map(s => {
                            const rawParagraphs = s.text.split(/\n\n+/).filter(p => p.trim().length > 0);
                            let globalId = 0;
                            
                            const parsedParagraphs = rawParagraphs.map(p => {
                                const regex = /(\[[^\]]+\]|[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+|[^a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ\s\[\]]+|\s+)/g;
                                const parts = p.match(regex) || [];
                                
                                return parts.map(part => {
                                    let isBracketed = part.startsWith('[') && part.endsWith(']');
                                    let cleanText = isBracketed ? part.slice(1, -1) : part;
                                    let isWord = isBracketed || /^[a-zA-Z0-9'áéíóúñÁÉÍÓÚÑ]+$/.test(cleanText);
                                    let isHidden = isBracketed && isWord;
                                    return { id: globalId++, text: cleanText, isWord, isHidden };
                                });
                            });

                            return {
                                ...s,
                                paragraphs: parsedParagraphs,
                                flatTokens: parsedParagraphs.flat()
                            };
                        });

                        setStories(processed);
                        // ¡Aquí es donde tronaba, pero como startStory ya está definida arriba, ahora es seguro!
                        if (processed.length === 1) startStory(0);
                    }
                    setLoading(false);
                };
                init();
            }, []);

            useEffect(() => {
                let scrollInterval = null;
                const handleDragOverEdge = (e) => {
                    const threshold = 100;
                    const speed = 15;
                    const clientY = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);
                    if (!clientY) return;

                    if (clientY < threshold) {
                        if (!scrollInterval) scrollInterval = setInterval(() => window.scrollBy(0, -speed), 20);
                    } else if (window.innerHeight - clientY < threshold) {
                        if (!scrollInterval) scrollInterval = setInterval(() => window.scrollBy(0, speed), 20);
                    } else {
                        if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
                    }
                };
                const handleDragEndEdge = () => { if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; } };

                window.addEventListener('dragover', handleDragOverEdge);
                window.addEventListener('touchmove', handleDragOverEdge, { passive: true });
                window.addEventListener('dragend', handleDragEndEdge);
                window.addEventListener('drop', handleDragEndEdge);
                window.addEventListener('touchend', handleDragEndEdge);
                
                return () => {
                    window.removeEventListener('dragover', handleDragOverEdge);
                    window.removeEventListener('touchmove', handleDragOverEdge);
                    window.removeEventListener('dragend', handleDragEndEdge);
                    window.removeEventListener('drop', handleDragEndEdge);
                    window.removeEventListener('touchend', handleDragEndEdge);
                    if (scrollInterval) clearInterval(scrollInterval);
                };
            }, []);

            // 5. Resto de Funciones Auxiliares
            const handleExit = () => {
                if (activityData && activityData.parentPath) window.location.href = `index.html?folder=${encodeURIComponent(activityData.parentPath)}`;
                else window.location.href = 'index.html';
            };

            const backToMenu = () => {
                if (stories.length === 1) handleExit(); 
                else setCurIdx(-1);
            };

            const handleEdit = () => {
                if (!activityId) return;
                const folderParam = (activityData && activityData.parentPath) ? `&folder=${encodeURIComponent(activityData.parentPath)}` : '';
                window.location.href = `dashboard-reading.html?edit=${activityId}${folderParam}`;
            };

            const handleDragStart = (e, word) => { e.dataTransfer.setData("text/plain", word); };
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (e, index) => {
                e.preventDefault();
                if (slideResult === 'correct') return; 
                const word = e.dataTransfer.getData("text/plain");
                if(!word) return;
                setDropped(prev => ({ ...prev, [index]: word }));
                setSlideResult(null); 
            };
            const removeDrop = (index) => { 
                if (slideResult === 'correct') return;
                const newDropped = { ...dropped }; 
                delete newDropped[index]; 
                setDropped(newDropped); 
                setSlideResult(null);
            };
            
            const checkSlideAnswers = () => {
                if (!currentStory) return;
                const currentTokens = currentStory.paragraphs[currentSlide - 1];
                const hidden = currentTokens.filter(t => t.isHidden);
                const isAllCorrect = hidden.every(t => dropped[t.id] === t.text);
                
                setSlideResult(isAllCorrect ? 'correct' : 'wrong');
                if (isAllCorrect) confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            };

            const nextSlide = () => {
                setSlideResult(null);
                setCurrentSlide(c => c + 1);
            };

            const startChallenge = () => {
                if (!currentStory.questions || currentStory.questions.length === 0) { alert("Esta lectura no tiene preguntas."); return; }
                setQaMode(true);
                setCurrentQIdx(0);
                setScore(0);
                setTimerStarted(false); 
                setTimeLeft(12);
                setShowParagraphHelp(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            const startTimer = () => {
                setTimerStarted(true);
                setTimeLeft(12);
                setShowParagraphHelp(false);
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) { 
                            clearInterval(timerRef.current); 
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const handleSentenceClick = (sentence) => {
                const q = currentStory.questions[currentQIdx];
                const correctAnswer = q.options ? q.options[q.correctIndex] : "";
                const cleanAnswer = correctAnswer.toLowerCase().replace(/[^a-z0-9]/g, '');
                const cleanSentence = sentence.toLowerCase().replace(/[^a-z0-9]/g, '');

                if (cleanAnswer && (cleanSentence.includes(cleanAnswer) || cleanAnswer.includes(cleanSentence.substring(0, 10)))) {
                    confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
                    setScore(s => s + 1);
                    nextQuestion();
                } else {
                    const el = document.getElementById('qa-box');
                    el.classList.add('bg-red-100', 'animate-shake');
                    setTimeout(() => el.classList.remove('bg-red-100', 'animate-shake'), 500);
                }
            };

            const nextQuestion = () => {
                if (currentQIdx < currentStory.questions.length - 1) {
                    setCurrentQIdx(idx => idx + 1);
                    setTimerStarted(false);
                    setTimeLeft(12);
                    setShowParagraphHelp(false);
                    if (timerRef.current) clearInterval(timerRef.current);
                } else {
                    setQaFinished(true);
                    if (timerRef.current) clearInterval(timerRef.current);
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                }
            };

            const getTargetParagraphSentences = () => {
                if (!currentStory || !currentStory.questions) return [];
                const q = currentStory.questions[currentQIdx];
                const pIndex = q.paragraph_index || 0;
                const paragraphs = currentStory.text.split(/\n\n+/);
                const targetP = paragraphs[pIndex] || paragraphs[0]; 
                return targetP.split(/(?<=\.)\s+/).filter(s => s.trim().length > 0);
            };

            // 6. Validaciones de Renderizado Iniciales
            if (loading) return <div className="h-screen flex items-center justify-center text-slate-400 bg-slate-50 dark:bg-zinc-950"><Loader2 className="animate-spin mr-2"/> Cargando...</div>;
            if (!activityData) return <div className="h-screen flex items-center justify-center text-red-400 dark:bg-zinc-950">Lectura no encontrada</div>;

            // 7. Renderizado (Menú / Juego)
            if (curIdx === -1) {
                return (
                    <div className={`min-h-screen font-sans flex flex-col transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-800'}`}>
                        <div className={`px-6 py-4 flex items-center justify-between shrink-0 shadow-sm transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 border-b'}`}>
                            <div className="flex items-center gap-4">
                                <button onClick={handleExit} className={`p-2 rounded-full transition-colors ${isDarkMode ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-slate-100 text-slate-500'}`} title="Regresar a la Bóveda"><ArrowLeft size={20}/></button>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 text-white flex items-center justify-center"><BookOpen size={16}/></div>
                                    <span className="font-bold uppercase tracking-widest text-xs opacity-50">Reading Module</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={handleEdit} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border ${isDarkMode ? 'border-slate-600 hover:bg-slate-700 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'}`}>
                                    <Edit2 size={14}/> Editar Módulo
                                </button>
                                <button onClick={toggleTheme} className={`p-2 rounded-full transition-colors ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'hover:bg-slate-100 text-slate-600'}`}>
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar">
                            <div className="max-w-6xl mx-auto">
                                <div className="text-center mb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <h1 className="text-4xl md:text-6xl font-black mb-4 tracking-tight drop-shadow-sm">{activityData.title}</h1>
                                    <p className="text-lg md:text-xl font-medium opacity-60 max-w-2xl mx-auto">Selecciona una de las lecturas interactivas de esta colección para practicar tu vocabulario y comprensión.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {stories.map((s, i) => {
                                        const wordCount = s.flatTokens ? s.flatTokens.filter(t => t.isWord).length : s.text.split(/\s+/).length;
                                        const blanksCount = s.flatTokens ? s.flatTokens.filter(t => t.isHidden).length : (s.blanks ? s.blanks.length : 0);
                                        
                                        return (
                                            <div key={i} onClick={() => startStory(i)} className={`group rounded-[2rem] overflow-hidden shadow-md hover:shadow-2xl hover:-translate-y-2 transition-all cursor-pointer border flex flex-col animate-in fade-in zoom-in duration-500 ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:border-indigo-500' : 'bg-white border-slate-200 hover:border-indigo-400'}`} style={{animationDelay: `${i * 100}ms`}}>
                                                
                                                <div className={`h-48 relative overflow-hidden flex items-center justify-center ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}>
                                                    {s.image_url ? (
                                                        <img src={s.image_url} alt={s.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"/>
                                                    ) : (
                                                        <div className="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center group-hover:scale-105 transition-transform duration-700">
                                                            <BookOpen size={64} className="text-white opacity-20"/>
                                                        </div>
                                                    )}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
                                                    
                                                    <div className="absolute bottom-4 left-4 right-4">
                                                        <span className="bg-indigo-600 text-white text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded mb-2 inline-block shadow-lg">Lectura {i + 1}</span>
                                                        <h3 className="text-white font-black text-xl leading-tight line-clamp-2 drop-shadow-md">{s.title || 'Historia sin título'}</h3>
                                                    </div>
                                                </div>

                                                <div className="p-6 flex-1 flex flex-col justify-between gap-6">
                                                    <div className="flex items-center justify-between text-xs font-bold uppercase tracking-widest opacity-60">
                                                        <div className="flex items-center gap-1.5"><LayoutGrid size={14}/> {blanksCount} Huecos</div>
                                                        <div className="flex items-center gap-1.5"><BookOpen size={14}/> {wordCount} Palabras</div>
                                                    </div>
                                                    
                                                    <button className="w-full py-3.5 rounded-xl font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-all bg-indigo-50 text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white dark:bg-indigo-900/30 dark:text-indigo-400 dark:group-hover:bg-indigo-500 dark:group-hover:text-white">
                                                        Comenzar Diapositivas <ArrowRight size={16}/>
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const availableWords = wordBank.filter(word => {
                const totalInText = currentStory.flatTokens.filter(t => t.text === word && t.isHidden).length;
                const totalPlaced = Object.values(dropped).filter(w => w === word).length;
                return totalPlaced < totalInText;
            });

            const isPresentationFinished = currentSlide > currentStory.paragraphs.length;
            const currentTokens = (!isPresentationFinished && currentSlide > 0) ? currentStory.paragraphs[currentSlide - 1] : [];
            const isLeftEmoji = currentSlide % 2 !== 0;
            const currentEmojis = EMOJI_SETS[currentSlide % EMOJI_SETS.length];
            
            const hiddenInSlide = currentTokens.filter(t => t.isHidden);
            const requiresCheck = hiddenInSlide.length > 0;
            const isSlideComplete = slideResult === 'correct' || !requiresCheck;

            const backgroundStyle = {
                backgroundImage: currentStory.image_url ? `url(${currentStory.image_url})` : 'none',
                backgroundSize: 'cover',
                backgroundPosition: 'center',
                backgroundAttachment: 'fixed'
            };

            return (
                <div className="min-h-screen font-sans flex flex-col transition-all duration-700" style={backgroundStyle}>
                    <div className={`flex-1 flex flex-col w-full h-full backdrop-blur-2xl transition-colors duration-500 ${isDarkMode ? 'bg-slate-900/85' : 'bg-slate-100/85'}`}>
                        
                        <div className={`px-4 md:px-6 py-4 flex items-center justify-between shrink-0 sticky top-0 z-50 shadow-sm border-b transition-colors ${isDarkMode ? 'bg-slate-900/50 border-white/5 text-white' : 'bg-white/50 border-slate-200 text-slate-800'}`}>
                            <div className="flex items-center gap-3 md:gap-4">
                                <button onClick={backToMenu} className={`p-2 rounded-full transition-colors ${isDarkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-slate-200 text-slate-600'}`} title="Volver"><ArrowLeft size={20}/></button>
                                <div>
                                    <h1 className="text-lg md:text-xl font-black leading-tight line-clamp-1">{currentStory.title || activityData.title}</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className={`flex items-center gap-1 md:gap-2 px-2 py-1.5 md:px-3 rounded-xl border shrink-0 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                    <button onClick={() => setFontSize(s => Math.max(14, s - 2))} className="p-1 md:p-1.5 rounded hover:bg-opacity-20 opacity-70 hover:opacity-100"><ZoomOut size={18}/></button>
                                    <span className="text-xs font-bold w-6 md:w-10 text-center opacity-50">{fontSize}</span>
                                    <button onClick={() => setFontSize(s => Math.min(40, s + 2))} className="p-1 md:p-1.5 rounded hover:bg-opacity-20 opacity-70 hover:opacity-100"><ZoomIn size={18}/></button>
                                </div>
                                <button onClick={toggleTheme} className={`hidden md:block p-2 rounded-full transition-colors ${isDarkMode ? 'hover:bg-slate-700 text-yellow-400' : 'bg-white border border-slate-200 shadow-sm hover:bg-slate-100 text-slate-600'}`}>
                                    {isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}
                                </button>
                            </div>
                        </div>

                        {qaMode && (
                            <div className="fixed inset-0 z-[60] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4 md:p-6 animate-in zoom-in-95 duration-300">
                                {qaFinished ? (
                                    <div className="bg-white dark:bg-slate-800 rounded-[3rem] p-12 text-center max-w-lg w-full shadow-2xl">
                                        <div className="w-24 h-24 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-500 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6"><CheckCircle2 size={48} strokeWidth={3}/></div>
                                        <h2 className="text-4xl font-black text-slate-800 dark:text-white mb-2">¡Completado!</h2>
                                        <p className="text-lg text-slate-500 dark:text-slate-400 font-bold mb-8">Puntuación: {score} / {currentStory.questions.length}</p>
                                        <button onClick={backToMenu} className="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-4 rounded-2xl font-black text-lg hover:-translate-y-1 transition-transform">{stories.length > 1 ? 'Volver al Menú' : 'Salir'}</button>
                                    </div>
                                ) : (
                                    <div id="qa-box" className="bg-white dark:bg-slate-800 w-full max-w-3xl rounded-[2rem] overflow-hidden shadow-2xl transition-colors duration-200">
                                        <div className="bg-slate-900 text-white p-6 relative">
                                            <div className="flex justify-between items-center relative z-10">
                                                <span className="font-black tracking-widest text-slate-400 text-xs uppercase flex items-center gap-2"><Swords size={16}/> Pregunta {currentQIdx + 1} de {currentStory.questions.length}</span>
                                                <div className={`font-black text-2xl flex items-center gap-2 ${timeLeft <= 3 && timerStarted ? 'text-red-400 animate-pulse' : 'text-emerald-400'}`}><Timer size={24}/> {timeLeft}s</div>
                                            </div>
                                            {timerStarted && <div className="absolute bottom-0 left-0 h-1.5 bg-emerald-500 timer-bar" style={{ animationDuration: '12s', animationPlayState: timeLeft === 0 ? 'paused' : 'running' }}></div>}
                                        </div>
                                        <div className="p-6 md:p-12 text-center">
                                            <h3 className="text-xl md:text-3xl font-black mb-8 text-slate-800 dark:text-white">"{currentStory.questions[currentQIdx].q}"</h3>
                                            
                                            {!timerStarted ? (
                                                <button onClick={startTimer} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-indigo-500 transition-transform active:scale-95 shadow-lg flex items-center gap-2 mx-auto">
                                                    <PlayCircle size={24}/> Iniciar Reloj
                                                </button>
                                            ) : timeLeft > 0 ? (
                                                <div className="h-32 md:h-48 flex items-center justify-center flex-col text-slate-400 dark:text-slate-500">
                                                    <Lightbulb size={40} className="mb-4 opacity-30"/>
                                                    <p className="font-bold">Piensa rápido...</p>
                                                </div>
                                            ) : !showParagraphHelp ? (
                                                <div className="h-32 md:h-48 flex items-center justify-center flex-col animate-in zoom-in duration-300">
                                                    <p className="text-red-500 font-black text-2xl mb-6">¡Tiempo agotado!</p>
                                                    <button onClick={() => setShowParagraphHelp(true)} className="bg-amber-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-amber-400 transition-transform active:scale-95 flex items-center gap-2">
                                                        <BookOpen size={20}/> Buscar en el Texto
                                                    </button>
                                                </div>
                                            ) : (
                                                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 text-left">
                                                    <div className="bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-400 text-xs font-black uppercase tracking-widest p-3 rounded-t-xl text-center border-b border-amber-200 dark:border-amber-900/50">Encuentra la respuesta aquí:</div>
                                                    <div className="p-4 md:p-8 rounded-b-xl border border-t-0 leading-relaxed text-base md:text-lg font-medium shadow-inner bg-slate-50 border-amber-100 text-slate-700 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300">
                                                        {getTargetParagraphSentences().map((sentence, i) => (
                                                            <span key={i} onClick={() => handleSentenceClick(sentence)} className="inline hover:bg-amber-200 dark:hover:bg-indigo-900 cursor-pointer transition-colors rounded px-1 py-0.5 mx-0.5 border border-transparent hover:border-amber-300 dark:hover:border-indigo-700">{sentence}. </span>
                                                        ))}
                                                    </div>
                                                    <div className="flex justify-between items-center mt-6">
                                                        <p className="text-xs text-slate-400 uppercase font-bold tracking-widest">Haz clic en la oración correcta</p>
                                                        <button onClick={nextQuestion} className="text-xs font-bold text-slate-400 hover:text-slate-600 dark:hover:text-white uppercase tracking-widest flex items-center gap-1 transition-colors">Saltar <ArrowRight size={14}/></button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className={`max-w-[1400px] mx-auto w-full p-4 md:p-8 flex-1 flex flex-col lg:grid lg:grid-cols-12 gap-8 items-start ${qaMode ? 'hidden' : ''}`}>
                            
                            <div className="order-2 lg:order-1 lg:col-span-8 w-full flex-1 flex flex-col justify-center animate-in fade-in slide-in-from-bottom-8 duration-700">
                                
                                {currentSlide === 0 ? (
                                    <div className={`rounded-[3rem] shadow-2xl border p-10 md:p-16 text-center ${isDarkMode ? 'bg-slate-800/90 border-slate-700 text-white' : 'bg-white/95 border-white text-slate-800'}`}>
                                        <div className="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white mb-8 shadow-lg shadow-indigo-500/30">
                                            <GraduationCap size={40} />
                                        </div>
                                        <h2 className="text-5xl md:text-7xl font-black tracking-tight mb-6">{currentStory.title}</h2>
                                        <p className="text-xl md:text-2xl font-bold opacity-60 mb-12 uppercase tracking-widest flex items-center justify-center gap-2"><Award size={24}/> By {activityData.authorName || 'Teacher'}</p>
                                        
                                        <button onClick={nextSlide} className="px-10 py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-black text-xl shadow-xl hover:-translate-y-1 transition-all flex items-center gap-3 mx-auto">
                                            Comenzar Lectura <ArrowRight size={24}/>
                                        </button>
                                    </div>
                                ) : isPresentationFinished ? (
                                    <div className={`rounded-[3rem] shadow-2xl border p-10 md:p-16 text-center ${isDarkMode ? 'bg-slate-800/90 border-slate-700 text-white' : 'bg-white/95 border-white text-slate-800'}`}>
                                        <div className="w-24 h-24 mx-auto rounded-full bg-emerald-100 text-emerald-500 flex items-center justify-center mb-8">
                                            <CheckCircle2 size={56} strokeWidth={3} />
                                        </div>
                                        <h2 className="text-4xl md:text-5xl font-black mb-6">¡Lectura Completada!</h2>
                                        <p className="text-xl opacity-70 mb-12">Has rellenado correctamente todos los párrafos.</p>
                                        
                                        <div className="flex flex-col gap-4 max-w-sm mx-auto">
                                            {currentStory.questions && currentStory.questions.length > 0 && (
                                                <button onClick={startChallenge} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-500 hover:-translate-y-1 transition-all flex items-center justify-center gap-2 text-lg">
                                                    <Swords size={24}/> CHALLENGE Q&A <ArrowRight size={20}/>
                                                </button>
                                            )}
                                            <button onClick={() => startStory(curIdx)} className={`w-full py-4 rounded-2xl font-black border transition-colors flex items-center justify-center gap-2 ${isDarkMode ? 'border-slate-600 hover:bg-slate-700 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'}`}>
                                                <RotateCcw size={20}/> Volver a Leer
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className={`relative rounded-[2rem] shadow-2xl border p-8 md:p-12 leading-loose transition-all duration-300 flex items-stretch ${isDarkMode ? 'bg-slate-800/95 border-slate-700 text-slate-200' : 'bg-white/95 border-white text-slate-700'}`} style={{ fontSize: `${fontSize}px` }}>
                                            
                                            {isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pr-8 border-r border-slate-200 dark:border-slate-700 mr-8 opacity-60">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                            
                                            <div className="flex-1 font-medium text-justify">
                                                <div className="flex items-center justify-between mb-6 border-b pb-4 border-slate-200 dark:border-slate-700">
                                                    <span className="text-xs font-black uppercase tracking-widest opacity-40">Slide {currentSlide} / {currentStory.paragraphs.length}</span>
                                                    {requiresCheck && !isSlideComplete && <span className="text-xs font-black uppercase tracking-widest text-amber-500 bg-amber-500/10 px-3 py-1 rounded-full">{hiddenInSlide.length} blanks left</span>}
                                                    {isSlideComplete && <span className="text-xs font-black uppercase tracking-widest text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full flex items-center gap-1"><CheckCircle2 size={14}/> Correct</span>}
                                                </div>

                                                {currentTokens.map((t, i) => {
                                                    if (t.isHidden) {
                                                        const val = dropped[t.id];
                                                        let stateClass = isDarkMode ? 'token-hidden-dark' : 'token-hidden-light';
                                                        if (val) stateClass = 'token-filled'; 
                                                        if (slideResult === 'correct') stateClass = 'token-correct';
                                                        if (slideResult === 'wrong' && val) stateClass = val === t.text ? 'token-correct' : 'token-wrong';
                                                        
                                                        const prevIsHidden = i > 0 && currentTokens[i-1].isHidden && currentTokens[i-1].isWord;
                                                        const nextIsHidden = i < currentTokens.length - 1 && currentTokens[i+1].isHidden && currentTokens[i+1].isWord;
                                                        
                                                        let shapeClass = "token-single";
                                                        if (prevIsHidden && nextIsHidden) shapeClass = "token-middle";
                                                        else if (prevIsHidden && !nextIsHidden) shapeClass = "token-end";
                                                        else if (!prevIsHidden && nextIsHidden) shapeClass = "token-start";

                                                        return <span key={i} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, t.id)} onClick={() => removeDrop(t.id)} className={`token-base cursor-pointer ${stateClass} ${shapeClass}`}>{val || ""}</span>;
                                                    }
                                                    if (t.text.match(/\n/)) return <br key={i}/>;
                                                    return <span key={i}>{t.text}</span>;
                                                })}
                                            </div>

                                            {!isLeftEmoji && <div className="hidden md:flex flex-col justify-between text-3xl pl-8 border-l border-slate-200 dark:border-slate-700 ml-8 opacity-60">{currentEmojis.map((e,i)=><span key={i}>{e}</span>)}</div>}
                                        </div>

                                        <div className="flex justify-end pt-2">
                                            {requiresCheck && !isSlideComplete ? (
                                                <button onClick={checkSlideAnswers} className="bg-slate-900 dark:bg-slate-700 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-xl hover:-translate-y-1 transition-transform flex items-center gap-2">
                                                    Verificar Párrafo
                                                </button>
                                            ) : (
                                                <button onClick={nextSlide} className="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-xl hover:-translate-y-1 transition-transform flex items-center gap-3 animate-in fade-in zoom-in">
                                                    Avanzar <ArrowRight size={24}/>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {currentSlide > 0 && !isPresentationFinished && (
                                <div className="order-1 lg:order-2 lg:col-span-4 w-full lg:sticky lg:top-24 lg:self-start flex flex-col gap-6 lg:h-[calc(100vh-8rem)]">
                                    <div className={`rounded-[2rem] shadow-xl border overflow-hidden flex flex-col h-full max-h-[400px] lg:max-h-full ${isDarkMode ? 'bg-slate-800/90 border-slate-700' : 'bg-white/95 border-white'}`}>
                                        <div className="bg-slate-900 p-4 md:p-5 flex items-center justify-between text-white shrink-0">
                                            <div className="flex items-center gap-2 font-black uppercase text-xs tracking-widest"><Puzzle size={18} className="text-indigo-400"/> Global Word Bank</div>
                                            <span className="bg-slate-800 px-3 py-1.5 rounded-lg text-[10px] font-bold text-slate-300 shadow-inner">{availableWords.length} Left</span>
                                        </div>
                                        
                                        <div className={`p-5 md:p-6 overflow-y-auto custom-scrollbar flex-1 ${isDarkMode ? 'bg-slate-800/50' : 'bg-slate-50'}`} style={{ fontSize: `${Math.max(16, fontSize * 0.7)}px` }}>
                                            {availableWords.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 py-8 text-center">
                                                    <CheckCircle2 size={48} className="mb-4 opacity-30 text-emerald-500"/>
                                                    <p className="text-lg font-black uppercase tracking-widest text-emerald-500">Perfect!</p>
                                                    <p className="text-sm font-bold mt-2">All words placed.</p>
                                                </div>
                                            ) : (
                                                <div className="flex flex-wrap gap-2 md:gap-3">
                                                    {availableWords.map((w, i) => (
                                                        <div key={i} draggable={!isSlideComplete} onDragStart={(e) => handleDragStart(e, w)} className={`border border-b-4 px-4 py-2 md:py-3 rounded-xl font-bold shadow-sm cursor-grab active:cursor-grabbing transition-all ${isDarkMode ? 'bg-slate-700 border-slate-600 border-b-slate-900 text-slate-200 hover:bg-indigo-900 hover:border-indigo-700' : 'bg-white border-slate-300 border-b-slate-300 text-slate-700 hover:bg-indigo-50 hover:border-indigo-300'}`}>{w}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {currentStory.fun_fact && (
                                        <div className={`rounded-[2rem] p-5 shadow-lg border-2 flex gap-4 items-start shrink-0 ${isDarkMode ? 'bg-amber-900/40 border-amber-500/30' : 'bg-amber-50 border-amber-200'}`}>
                                            <div className={`p-3 rounded-xl shadow-sm shrink-0 ${isDarkMode ? 'bg-amber-500/20 text-amber-400' : 'bg-white text-amber-500'}`}><Lightbulb size={24} strokeWidth={2.5}/></div>
                                            <div><h3 className={`font-black text-xs uppercase tracking-widest mb-1 ${isDarkMode ? 'text-amber-400' : 'text-amber-800'}`}>Did You Know?</h3><p className={`font-medium text-sm leading-relaxed ${isDarkMode ? 'text-amber-100/80' : 'text-amber-900/80'}`}>{currentStory.fun_fact}</p></div>
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ReadingActivity />);
    </script>
</body>
</html>

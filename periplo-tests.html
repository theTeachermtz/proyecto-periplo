<script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';

    const _app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);

    const urlParams   = new URLSearchParams(window.location.search);
    const QUIZ_ID     = urlParams.get('id');

    const shuffle = arr => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    };

    const normalize = s => (s || '').toLowerCase().trim().replace(/[?.!,;:]/g, '').replace(/\s+/g, ' ');

    const speakPhrase = (text) => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 0.82;
        window.speechSynthesis.speak(u);
    };

            {

            {

            },
            // ── DIALOGUE FILL ────────────────────────────────────────────────
            {
                id: 'q26', type: 'dialogueFill',
                instruction: 'Choose the most natural and grammatically correct response for B:',
                dialogue: [
                    { speaker: 'A', line: "Did you go to Maria's party last night?" },

                    { speaker: 'A', line: "Oh, that's too bad. Was everything okay?" },
                ],
                options: [
                    "No, I can't. I have work.",

                    "No, I not go. I was busy.",
                ],
                answer: "No, I didn't. I wasn't feeling well."
            },
            // ── PARAGRAPH ORDER ──────────────────────────────────────────────
            {
                id: 'q27', type: 'paragraphOrder',
                instruction: 'Tap the sentences in the correct order to form a coherent paragraph:',
                sentences: [
                    'First, he checked his emails and replied to the most urgent ones.',
                    'By the end of the day, he had finished all his tasks.',
                    'James arrived at the office at 8 AM.',
                    'After that, he joined the morning team meeting.',
                    'Then, he spent the rest of the morning working on his project.',
                ],
                correctOrder: [2, 0, 3, 4, 1]
            },
            // ── CONTEXT MATCH ────────────────────────────────────────────────
            {
                id: 'q28', type: 'contextMatch',
                instruction: 'Match each situation to the most appropriate English phrase:',
                situations: [

                ],

                    'Could I possibly leave a bit early today?',
                    'Would you like some help with that?',
                    'Sorry, could you say that again?',
                    "Why don't we grab some coffee?",
                ]
            },
            // ── SHORT TRANSLATION ────────────────────────────────────────────
            {
                id: 'q29', type: 'shortTranslation',
                instruction: 'Translate the following sentence into English:',
                spanishText: 'Ayer fui al supermercado y compré leche, pan y huevos.',
                sampleAnswer: 'Yesterday I went to the supermarket and bought milk, bread and eggs.',
                keyWords: ['yesterday', 'went', 'supermarket', 'bought', 'milk', 'bread', 'eggs'],
                minKeyWordsMatch: 5
            },
            // ── VOICE REPLY ──────────────────────────────────────────────────
            {
                id: 'q18', type: 'voiceReply',
                prompt: 'Tu compañero te pregunta: "What do you usually do in the morning before work?" Responde con la frase de abajo.',
                targetPhrase: 'I usually wake up at seven and take the bus to work.',
                hint: 'Present Simple · adverb of frequency · transportation'
            },
            {
                id: 'q19', type: 'voiceReply',
                prompt: 'Tu amiga quiere saber qué hiciste ayer. Responde con la frase de abajo.',
                targetPhrase: 'Yesterday I studied English and watched a movie at home.',
                hint: 'Past Simple · time expression at the beginning'
            },
        ]
    };

    // ── TYPE CONFIG ──────────────────────────────────────────────────────────
    const TYPE_CFG = {
        multipleChoice:  { label: 'Opción Múltiple',      icon: '🔤', color: 'text-sky-400'     },
        truefalse:       { label: 'Cierto o Falso',        icon: '⚖️', color: 'text-violet-400'  },
        fillBlank:       { label: 'Completa el Pasaje',    icon: '✍️', color: 'text-amber-400'   },
        unscramble:      { label: 'Ordena la Oración',     icon: '🔀', color: 'text-emerald-400' },
        matching:        { label: 'Empareja',              icon: '🔗', color: 'text-orange-400'  },
        oddOneOut:       { label: 'El Intruso',            icon: '🚫', color: 'text-rose-400'    },
        errorCorrection: { label: 'Corrección de Errores', icon: '🔍', color: 'text-red-400'     },
        openEnded:       { label: 'Respuesta Abierta',     icon: '📝', color: 'text-zinc-400'    },
        audioQuestion:    { label: 'Audio + Pregunta',      icon: '🎧', color: 'text-teal-400'    },
        voiceReply:       { label: 'Respuesta en Voz',      icon: '🎤', color: 'text-indigo-400'  },
        wordForm:         { label: 'Forma de Palabra',      icon: '🔠', color: 'text-purple-400'  },
        categorySort:     { label: 'Clasifica',             icon: '🗂️', color: 'text-cyan-400'    },
        spotError:        { label: 'Encuentra el Error',    icon: '👆', color: 'text-rose-500'    },
        multipleResponse: { label: 'Selección Múltiple',    icon: '☑️', color: 'text-sky-300'     },
        dialogueFill:     { label: 'Completa el Diálogo',   icon: '💬', color: 'text-violet-300'  },
        paragraphOrder:   { label: 'Ordena el Párrafo',     icon: '📄', color: 'text-lime-400'    },
        contextMatch:     { label: 'Situación → Frase',     icon: '🎯', color: 'text-orange-300'  },
        shortTranslation: { label: 'Traducción Corta',      icon: '🌐', color: 'text-fuchsia-400' },
    };

    // ── GRADER ───────────────────────────────────────────────────────────────
    const gradeAnswer = (q, answer) => {
        if (answer === undefined || answer === null || answer === '') return null;
        switch (q.type) {
            case 'multipleChoice':
            case 'audioQuestion':
            case 'oddOneOut':
                return answer === q.answer ? 'correct' : 'incorrect';
            case 'truefalse':
                return answer === q.answer ? 'correct' : 'incorrect';
            case 'fillBlank': {
                if (typeof answer !== 'object') return null;
                const blanks = [];
                let m, re = /\[([^\]]+)\]/g;
                while ((m = re.exec(q.passage || '')) !== null) blanks.push(m[1]);
                if (!blanks.length) return null;
                if (blanks.some((_, i) => !answer[i])) return null;
                return blanks.every((blank, i) => normalize(answer[i]) === normalize(blank)) ? 'correct' : 'incorrect';
            }
            case 'unscramble': {
                if (!answer || !Array.isArray(answer) || !answer.length) return null;
                const norm = normalize(answer.join(' '));
                const accepted = (q.acceptedAnswers || [q.answer]).map(normalize);
                return accepted.includes(norm) ? 'correct' : 'incorrect';
            }
            case 'matching': {
                if (!answer || typeof answer !== 'object') return null;
                const allCorrect = q.pairs.every((pair, i) =>
                    normalize(answer[i]) === normalize(pair.right)
                );
                return allCorrect ? 'correct' : 'incorrect';
            }
            case 'errorCorrection':
                return normalize(answer) === normalize(q.answer) ? 'correct' : 'incorrect';
            case 'openEnded':
                return 'review';
            case 'voiceReply':
                if (answer === 'correct') return 'correct';
                if (answer === 'skipped') return 'review';
                return 'incorrect';
            case 'wordForm':
            case 'dialogueFill':
                return normalize(answer) === normalize(q.answer) ? 'correct' : 'incorrect';
            case 'spotError':
                return normalize(answer) === normalize(q.errorWord) ? 'correct' : 'incorrect';
            case 'multipleResponse': {
                if (!Array.isArray(answer) || !answer.length) return null;
                const expected = new Set((q.answers || []).map(normalize));
                const got = new Set(answer.map(normalize));
                return expected.size === got.size && [...expected].every(w => got.has(w)) ? 'correct' : 'incorrect';
            }
            case 'categorySort': {
                if (!answer || typeof answer !== 'object') return null;
                const allPlaced = q.categories.reduce((sum, c) => sum + (answer[c]?.length || 0), 0);
                if (allPlaced < q.words.length) return null;
                const correct = q.categories.every(cat => {
                    const exp = new Set((q.answers[cat] || []).map(normalize));
                    const got = new Set((answer[cat] || []).map(normalize));
                    return exp.size === got.size && [...exp].every(w => got.has(w));
                });
                return correct ? 'correct' : 'incorrect';
            }
            case 'paragraphOrder': {
                if (!Array.isArray(answer) || answer.length !== q.sentences.length) return null;
                return answer.every((idx, pos) => idx === q.correctOrder[pos]) ? 'correct' : 'incorrect';
            }
            case 'contextMatch': {
                if (!answer || typeof answer !== 'object') return null;
                if (Object.keys(answer).length < q.situations.length) return null;
                return q.situations.every((_, i) => normalize(answer[i]) === normalize(q.phrases[i])) ? 'correct' : 'incorrect';
            }
            case 'shortTranslation': {
                if (!answer || !answer.trim()) return null;
                const norm = normalize(answer);
                const matched = (q.keyWords || []).filter(w => norm.includes(normalize(w))).length;
                const threshold = q.minKeyWordsMatch || Math.ceil((q.keyWords || []).length * 0.7);
                return matched >= threshold ? 'correct' : 'incorrect';
            }
            default:
                return null;
        }
    };

    // ──────────────────────────────────────────────────────────────────────────
    // QUESTION TYPE COMPONENTS
    // ──────────────────────────────────────────────────────────────────────────

    // MULTIPLE CHOICE ─────────────────────────────────────────────────────────
    function QMultipleChoice({ q, answer, onChange, submitted, grade }) {
        return (
            <div className="space-y-2">
                {q.sentence && (
                    <p className="text-zinc-200 font-semibold bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 italic text-sm">
                        {q.sentence}
                    </p>
                )}
                {q.options.map(opt => {
                    const sel     = answer === opt;
                    const correct = submitted && opt === q.answer;
                    const wrong   = submitted && sel && opt !== q.answer;
                    return (
                        <button key={opt} disabled={submitted} onClick={() => onChange(opt)}
                            className={`w-full text-left px-4 py-3 rounded-xl border-2 font-medium text-sm transition-all
                                ${correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                  wrong   ? 'border-rose-500    bg-rose-500/10    text-rose-300'    :
                                  sel     ? 'border-sky-500     bg-sky-500/10     text-sky-300'     :
                                            'border-zinc-700 bg-zinc-800/30 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800/60 active:scale-[0.99]'}`}>
                            {opt}
                        </button>
                    );
                })}
                {submitted && grade === 'incorrect' && (
                    <p className="text-xs font-bold text-emerald-400">✅ Correcta: <span className="font-black">{q.answer}</span></p>
                )}
            </div>
        );
    }

    // TRUE / FALSE ────────────────────────────────────────────────────────────
    function QTrueFalse({ q, answer, onChange, submitted, grade }) {
        return (
            <div className="space-y-3">
                <p className="text-zinc-200 font-semibold bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 text-sm">
                    {q.statement}
                </p>
                <div className="flex gap-3">
                    {[{ val: true, label: '✅ Cierto', ac: 'emerald' }, { val: false, label: '❌ Falso', ac: 'rose' }].map(({ val, label, ac }) => {
                        const sel     = answer === val;
                        const correct = submitted && val === q.answer;
                        const wrong   = submitted && sel && val !== q.answer;
                        const colors  = ac === 'emerald'
                            ? { sel: 'border-emerald-500 bg-emerald-500/20 text-emerald-300', cor: 'border-emerald-400 bg-emerald-500/25 text-emerald-200' }
                            : { sel: 'border-rose-500 bg-rose-500/20 text-rose-300',         cor: 'border-rose-400 bg-rose-500/25 text-rose-200'           };
                        return (
                            <button key={String(val)} disabled={submitted} onClick={() => onChange(val)}
                                className={`flex-1 py-4 rounded-2xl border-2 font-black text-base transition-all active:scale-95
                                    ${correct ? colors.cor :
                                      wrong   ? 'border-rose-500 bg-rose-500/10 text-rose-400 opacity-60' :
                                      sel     ? colors.sel :
                                                'border-zinc-700 bg-zinc-800/30 text-zinc-400 hover:border-zinc-500 hover:bg-zinc-800/60'}`}>
                                {label}
                            </button>
                        );
                    })}
                </div>
                {submitted && grade === 'incorrect' && (
                    <p className="text-xs font-bold text-emerald-400">
                        ✅ Correcta: <span className="font-black">{q.answer ? 'Cierto' : 'Falso'}</span>
                    </p>
                )}
            </div>
        );
    }

    // FILL IN THE BLANK — PASAJE ──────────────────────────────────────────────
    function QFillBlank({ q, answer, onChange, submitted, grade }) {
        const { segments, blanks } = React.useMemo(() => {
            const passage = q.passage || '';
            const re = /\[([^\]]+)\]/g;
            const segs = [], bks = [];
            let lastIdx = 0, m;
            while ((m = re.exec(passage)) !== null) {
                segs.push(passage.slice(lastIdx, m.index));
                bks.push(m[1]);
                lastIdx = re.lastIndex;
            }
            segs.push(passage.slice(lastIdx));
            return { segments: segs, blanks: bks };
        }, [q.passage]);

        const [wordBank] = useState(() => shuffle([...(q.wordBank || blanks)]));
        // availableIdxs: Set of bank indices still in the bank (not placed)
        const [availableIdxs, setAvailableIdxs] = useState(
            () => new Set(wordBank.map((_, i) => i))
        );

        const filled = answer || {};

        const handleBankClick = (bankIdx) => {
            if (submitted) return;
            const firstEmpty = blanks.findIndex((_, i) => !filled[i]);
            if (firstEmpty === -1) return;
            onChange({ ...filled, [firstEmpty]: wordBank[bankIdx] });
            setAvailableIdxs(prev => { const n = new Set(prev); n.delete(bankIdx); return n; });
        };

        const handleBlankClick = (blankIdx) => {
            if (submitted) return;
            const wordStr = filled[blankIdx];
            if (!wordStr) return;
            // Find a bank slot that has this word and is currently NOT available (placed)
            const returnIdx = wordBank.findIndex((w, i) => w === wordStr && !availableIdxs.has(i));
            const newFilled = { ...filled };
            delete newFilled[blankIdx];
            onChange(newFilled);
            if (returnIdx !== -1) {
                setAvailableIdxs(prev => { const n = new Set(prev); n.add(returnIdx); return n; });
            }
        };

        return (
            <div className="space-y-4">
                {/* Passage */}
                <div className="bg-zinc-800/30 border border-zinc-700 rounded-xl px-4 py-4 text-sm sm:text-base leading-loose font-medium text-zinc-200">
                    {segments.map((seg, i) => (
                        <React.Fragment key={i}>
                            <span>{seg}</span>
                            {i < blanks.length && (() => {
                                const val = filled[i];
                                const isCorrect = submitted && normalize(val) === normalize(blanks[i]);
                                const isWrong   = submitted && val && !isCorrect;
                                return (
                                    <button onClick={() => handleBlankClick(i)} disabled={submitted}
                                        className={`inline-block mx-1 px-3 py-0.5 border-b-2 rounded-lg min-w-[80px] text-center font-bold text-sm transition-all
                                            ${!val      ? 'border-dashed border-amber-500/40 text-transparent hover:border-amber-500/70 cursor-pointer' :
                                              isCorrect ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300 cursor-default' :
                                              isWrong   ? 'border-rose-500 bg-rose-500/10 text-rose-300 cursor-default' :
                                                          'border-amber-500 bg-amber-500/10 text-amber-300 cursor-pointer hover:bg-amber-500/20'}`}>
                                        {val || '____'}
                                    </button>
                                );
                            })()}
                        </React.Fragment>
                    ))}
                </div>

                {/* Word bank */}
                {!submitted && (
                    <div className="space-y-1.5">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                            Banco de palabras — toca una palabra para colocarla en el siguiente espacio vacío:
                        </p>
                        <div className="flex flex-wrap gap-2 p-3 bg-zinc-800/20 border border-zinc-700/50 rounded-xl min-h-[44px]">
                            {wordBank.map((word, bankIdx) => {
                                if (!availableIdxs.has(bankIdx)) return null;
                                return (
                                    <button key={bankIdx} onClick={() => handleBankClick(bankIdx)}
                                        className="px-3 py-1.5 bg-zinc-700 hover:bg-amber-600/30 border border-zinc-600 hover:border-amber-500/50 rounded-lg text-sm font-bold text-zinc-100 transition-all active:scale-95">
                                        {word}
                                    </button>
                                );
                            })}
                            {[...availableIdxs].length === 0 && (
                                <span className="text-zinc-600 text-xs self-center italic">Todas las palabras colocadas — toca un espacio para devolver una.</span>
                            )}
                        </div>
                    </div>
                )}

                {/* Results */}
                {submitted && grade === 'incorrect' && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-1">
                        <p className="text-xs font-black text-emerald-400 mb-1.5">✅ Respuestas correctas:</p>
                        {blanks.map((blank, i) => {
                            const wrong = normalize(filled[i]) !== normalize(blank);
                            return wrong ? (
                                <p key={i} className="text-xs text-zinc-300">
                                    <span className="line-through text-rose-400">{filled[i] || '—'}</span>
                                    {' → '}<strong className="text-emerald-300">{blank}</strong>
                                </p>
                            ) : null;
                        })}
                    </div>
                )}
            </div>
        );
    }

    // UNSCRAMBLE — UNA ORACIÓN CON DISTRACTORES ──────────────────────────────
    function QUnscramble({ q, answer, onChange, submitted, grade }) {
        const [pool] = useState(() => shuffle([...q.words]));
        const [placed, setPlaced] = useState([]); // array of pool indices

        const usedSet = new Set(placed);
        const availPool = pool.map((_, i) => i).filter(i => !usedSet.has(i));

        const addWord = (poolIdx) => {
            if (submitted) return;
            const np = [...placed, poolIdx];
            setPlaced(np);
            onChange(np.map(i => pool[i]));
        };

        const removeWord = (pos) => {
            if (submitted) return;
            const np = placed.filter((_, i) => i !== pos);
            setPlaced(np);
            onChange(np.map(i => pool[i]));
        };

        const placedWords = placed.map(i => pool[i]);

        return (
            <div className="space-y-4">
                {/* Spanish prompt */}
                <div className="flex items-start gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-4 py-3">
                    <span className="text-lg shrink-0">🇲🇽</span>
                    <p className="text-indigo-200 font-semibold text-sm leading-snug">{q.spanishPrompt}</p>
                </div>

                {/* Target form label */}
                <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">
                    {q.targetLabel || 'Arma la oración correcta:'}
                </p>

                {/* Answer area */}
                <div className={`min-h-[56px] flex flex-wrap gap-2 p-3 border-2 rounded-xl transition-colors
                    ${submitted && grade === 'correct'   ? 'border-emerald-500/50 bg-emerald-500/5' :
                      submitted && grade === 'incorrect' ? 'border-rose-500/50 bg-rose-500/5' :
                                                           'border-dashed border-zinc-600 bg-zinc-800/20'}`}>
                    {placedWords.length === 0 && !submitted && (
                        <span className="text-zinc-600 text-xs self-center">Toca palabras del banco para armar la oración...</span>
                    )}
                    {placed.map((poolIdx, pos) => (
                        <button key={`${pos}-${poolIdx}`} disabled={submitted}
                            onClick={() => removeWord(pos)}
                            className="px-3 py-1.5 bg-emerald-600/20 border border-emerald-600/40 text-emerald-300 hover:bg-rose-500/20 hover:border-rose-500/40 hover:text-rose-300 rounded-lg text-sm font-bold transition-all active:scale-95 disabled:cursor-default disabled:hover:bg-emerald-600/20 disabled:hover:border-emerald-600/40 disabled:hover:text-emerald-300">
                            {pool[poolIdx]}
                        </button>
                    ))}
                </div>

                {/* Correct answer on wrong */}
                {submitted && grade === 'incorrect' && (
                    <p className="text-xs font-bold text-emerald-400">✅ {q.answer}</p>
                )}

                {/* Word bank */}
                {!submitted && (
                    <div className="space-y-1.5">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                            Banco de palabras — hay palabras que no necesitas:
                        </p>
                        <div className="flex flex-wrap gap-2 p-3 bg-zinc-800/20 border border-zinc-700/50 rounded-xl min-h-[44px]">
                            {pool.map((word, poolIdx) => {
                                if (usedSet.has(poolIdx)) return null;
                                return (
                                    <button key={poolIdx} onClick={() => addWord(poolIdx)}
                                        className="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 border border-zinc-600 rounded-lg text-sm font-bold text-zinc-100 transition-all active:scale-95">
                                        {word}
                                    </button>
                                );
                            })}
                            {availPool.length === 0 && (
                                <span className="text-zinc-600 text-xs self-center italic">Toca una palabra en la oración para devolverla al banco.</span>
                            )}
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // MATCHING ────────────────────────────────────────────────────────────────
    function QMatching({ q, answer, onChange, submitted, grade }) {
        const [rightOptions] = useState(() => shuffle(q.pairs.map(p => p.right)));

        return (
            <div className="space-y-3">
                {q.pairs.map((pair, i) => {
                    const sel     = answer?.[i];
                    const correct = submitted && normalize(sel) === normalize(pair.right);
                    const wrong   = submitted && sel && !correct;
                    return (
                        <div key={i} className="flex items-center gap-3">
                            <div className="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white font-bold text-sm">
                                {pair.left}
                            </div>
                            <span className="text-zinc-600 font-black shrink-0">→</span>
                            <div className="flex-1 relative">
                                <select disabled={submitted} value={sel || ''}
                                    onChange={e => onChange({ ...answer, [i]: e.target.value })}
                                    className={`w-full px-4 py-3 rounded-xl border-2 font-bold text-sm outline-none cursor-pointer appearance-none text-white pr-8 transition-colors
                                        ${correct ? 'border-emerald-500 bg-emerald-500/10' :
                                          wrong   ? 'border-rose-500    bg-rose-500/10'    :
                                          sel     ? 'border-orange-500  bg-orange-500/10'  :
                                                    'border-zinc-700    bg-zinc-800'}`}>
                                    <option value="">Selecciona...</option>
                                    {rightOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                                {submitted && (
                                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm pointer-events-none">
                                        {correct ? '✅' : wrong ? '❌' : ''}
                                    </span>
                                )}
                            </div>
                        </div>
                    );
                })}
                {submitted && grade === 'incorrect' && (
                    <div className="mt-1 p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-1">
                        <p className="text-xs font-black text-emerald-400">✅ Respuestas correctas:</p>
                        {q.pairs.map((pair, i) => (
                            <p key={i} className="text-xs text-emerald-300">
                                <strong>{pair.left}</strong> → {pair.right}
                            </p>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // ODD ONE OUT ─────────────────────────────────────────────────────────────
    function QOddOneOut({ q, answer, onChange, submitted, grade }) {
        return (
            <div className="space-y-3">
                <div className="grid grid-cols-2 gap-2">
                    {q.options.map(opt => {
                        const sel     = answer === opt;
                        const correct = submitted && opt === q.answer;
                        const wrong   = submitted && sel && opt !== q.answer;
                        return (
                            <button key={opt} disabled={submitted} onClick={() => onChange(opt)}
                                className={`py-3 px-4 rounded-xl border-2 font-bold text-sm transition-all active:scale-95
                                    ${correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                      wrong   ? 'border-rose-500    bg-rose-500/10    text-rose-300'    :
                                      sel     ? 'border-rose-400    bg-rose-500/15    text-rose-300'    :
                                                'border-zinc-700 bg-zinc-800/30 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800/60'}`}>
                                {opt}
                            </button>
                        );
                    })}
                </div>
                {submitted && (
                    <>
                        {grade === 'incorrect' && (
                            <p className="text-xs font-bold text-rose-400">❌ El intruso era: <span className="font-black">"{q.answer}"</span></p>
                        )}
                        {q.explanation && (
                            <p className="text-xs text-zinc-500 italic">{q.explanation}</p>
                        )}
                    </>
                )}
            </div>
        );
    }

    // ERROR CORRECTION ────────────────────────────────────────────────────────
    function QErrorCorrection({ q, answer, onChange, submitted, grade }) {
        return (
            <div className="space-y-4">
                <div>
                    <div className="flex items-start gap-2 bg-amber-500/5 border border-amber-500/30 rounded-xl px-4 py-3">
                        <span className="text-lg shrink-0">🚨</span>
                        <p className="text-amber-200 font-semibold italic text-sm leading-snug">{q.sentence}</p>
                    </div>
                    {q.hint && (
                        <p className="text-[11px] text-zinc-500 mt-1.5 ml-1 font-medium">💡 Pista: {q.hint}</p>
                    )}
                </div>
                <div className="space-y-1.5">
                    <p className="text-[11px] font-black text-zinc-300 uppercase tracking-widest">
                        ✏️ Escribe la oración completa y corregida:
                    </p>
                    <textarea disabled={submitted} rows={2}
                        value={answer || ''}
                        onChange={e => onChange(e.target.value)}
                        placeholder="Escribe aquí la oración completa con el error corregido..."
                        className={`w-full bg-zinc-900 border-2 rounded-xl px-4 py-3 text-white font-medium resize-none outline-none text-sm transition-colors
                            ${submitted && grade === 'correct'   ? 'border-emerald-500' :
                              submitted && grade === 'incorrect' ? 'border-rose-500'    :
                                                                   'border-zinc-700 focus:border-red-400'}`}
                    />
                    <p className="text-[10px] text-zinc-600 font-bold">
                        Reescribe la oración entera con la corrección incluida — no solo la parte que cambias.
                    </p>
                </div>
                {submitted && grade === 'incorrect' && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
                        <p className="text-xs font-black text-emerald-400 mb-0.5">✅ Oración correcta:</p>
                        <p className="text-sm text-emerald-300 font-bold">{q.answer}</p>
                    </div>
                )}
            </div>
        );
    }

    // OPEN ENDED ──────────────────────────────────────────────────────────────
    function QOpenEnded({ q, answer, onChange, submitted }) {
        const words  = (answer || '').trim().split(/\s+/).filter(Boolean).length;
        const hasMin = words >= (q.minWords || 0);
        return (
            <div className="space-y-2">
                <textarea disabled={submitted} rows={5}
                    value={answer || ''}
                    onChange={e => onChange(e.target.value)}
                    placeholder="Escribe tu respuesta aquí..."
                    className="w-full bg-zinc-900 border-2 border-zinc-700 focus:border-zinc-500 rounded-xl px-4 py-3 text-white font-medium resize-none outline-none text-sm transition-colors"
                />
                <div className="flex items-center justify-between gap-2">
                    <p className={`text-xs font-bold ${hasMin ? 'text-emerald-400' : 'text-zinc-500'}`}>
                        {words} palabra{words !== 1 ? 's' : ''}
                        {q.minWords ? ` / mínimo ${q.minWords}` : ''}
                        {hasMin ? ' ✓' : ''}
                    </p>
                    {submitted && (
                        <span className="text-[10px] font-black text-zinc-400 bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-0.5 shrink-0">
                            📋 Revisión del teacher
                        </span>
                    )}
                </div>
            </div>
        );
    }

    // AUDIO + QUESTION ────────────────────────────────────────────────────────
    function QAudioQuestion({ q, answer, onChange, submitted, grade }) {
        const [playing,   setPlaying]   = useState(false);
        const [playCount, setPlayCount] = useState(0);

        const handlePlay = () => {
            if (!window.speechSynthesis) { alert('Tu navegador no soporta audio.'); return; }
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(q.audioText);
            u.lang = 'en-US'; u.rate = 0.82;
            u.onstart = () => setPlaying(true);
            u.onend   = () => { setPlaying(false); setPlayCount(c => c + 1); };
            window.speechSynthesis.speak(u);
        };
        const handleStop = () => { window.speechSynthesis.cancel(); setPlaying(false); };

        return (
            <div className="space-y-4">
                <div className="flex items-center gap-4 bg-teal-500/5 border border-teal-500/20 rounded-2xl px-5 py-4">
                    <button onClick={playing ? handleStop : handlePlay}
                        className={`w-14 h-14 rounded-2xl flex items-center justify-center text-black font-black text-2xl shrink-0 transition-all active:scale-95
                            ${playing ? 'bg-teal-400 animate-pulse' : 'bg-teal-500 hover:bg-teal-400'}`}>
                        {playing ? '⏹' : '▶'}
                    </button>
                    <div>
                        <p className="text-teal-400 font-black text-[10px] uppercase tracking-widest mb-0.5">Audio en inglés</p>
                        <p className="text-zinc-400 text-xs font-medium">
                            {playing ? 'Reproduciendo...' :
                             playCount === 0 ? 'Haz clic para escuchar' :
                             `Reproducido ${playCount} vez${playCount !== 1 ? 'es' : ''}`}
                        </p>
                    </div>
                </div>
                <div>
                    <p className="text-zinc-300 font-semibold text-sm mb-3">{q.questionText}</p>
                    <div className="space-y-2">
                        {q.options.map(opt => {
                            const sel     = answer === opt;
                            const correct = submitted && opt === q.answer;
                            const wrong   = submitted && sel && opt !== q.answer;
                            return (
                                <button key={opt} disabled={submitted} onClick={() => onChange(opt)}
                                    className={`w-full text-left px-4 py-3 rounded-xl border-2 font-medium text-sm transition-all active:scale-[0.99]
                                        ${correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                          wrong   ? 'border-rose-500    bg-rose-500/10    text-rose-300'    :
                                          sel     ? 'border-teal-500    bg-teal-500/10    text-teal-300'    :
                                                    'border-zinc-700 bg-zinc-800/30 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800/60'}`}>
                                    {opt}
                                </button>
                            );
                        })}
                    </div>
                    {submitted && grade === 'incorrect' && (
                        <p className="mt-2 text-xs font-bold text-emerald-400">✅ Correcta: <span className="font-black">{q.answer}</span></p>
                    )}
                </div>
            </div>
        );
    }

    // VOICE REPLY ─────────────────────────────────────────────────────────────
    function QVoiceReply({ q, answer, onChange, submitted, grade }) {
        const [status,      setStatus]      = useState(answer || 'idle');
        const [transcript,  setTranscript]  = useState('');
        const [attempts,    setAttempts]    = useState(0);
        const [isListening, setIsListening] = useState(false);
        const recognitionRef = useRef(null);
        const attemptsRef    = useRef(0);
        const maxAttempts    = 3;

        useEffect(() => {
            if (submitted) return;
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;

            const rec = new SR();
            rec.continuous = false;
            rec.interimResults = false;
            rec.lang = 'en-US';

            rec.onstart = () => setIsListening(true);
            rec.onend   = () => setIsListening(false);

            rec.onerror = (e) => {
                setIsListening(false);
                attemptsRef.current++;
                setAttempts(attemptsRef.current);
                setTranscript(e.error === 'no-speech' ? '(no se escuchó nada)' : '(error de micrófono)');
                if (attemptsRef.current >= maxAttempts) {
                    setStatus('skipped'); onChange('skipped');
                } else {
                    setStatus('error');
                }
            };

            rec.onresult = (event) => {
                const spoken = event.results[0][0].transcript;
                setTranscript(spoken);
                const clean = s => s.toLowerCase().replace(/[^\w\s]/gi, '').trim();
                const targetWords = clean(q.targetPhrase).split(' ').filter(Boolean);
                const spokenWords = clean(spoken).split(' ').filter(Boolean);
                const matches = targetWords.filter(w => spokenWords.includes(w)).length;
                const score   = matches / targetWords.length;
                attemptsRef.current++;
                setAttempts(attemptsRef.current);
                if (score >= 0.75) {
                    setStatus('correct'); onChange('correct');
                } else if (attemptsRef.current >= maxAttempts) {
                    setStatus('skipped'); onChange('skipped');
                } else {
                    setStatus('error');
                }
            };

            recognitionRef.current = rec;
            return () => { rec.onresult = null; rec.onerror = null; rec.onstart = null; };
        }, [submitted]);

        const toggleMic = () => {
            const rec = recognitionRef.current;
            if (!rec) { alert('Tu navegador no soporta reconocimiento de voz. Prueba Chrome o Edge.'); return; }
            if (isListening) { rec.stop(); return; }
            setTranscript('');
            setStatus('listening');
            try { rec.start(); } catch(e) {}
        };

        const skipQuestion = () => { setStatus('skipped'); onChange('skipped'); };

        const isFinal = status === 'correct' || status === 'skipped';

        // On results screen — show compact result
        if (submitted) {
            return (
                <div className={`flex items-center gap-3 px-4 py-3 rounded-xl border text-sm font-medium
                    ${grade === 'correct' ? 'border-emerald-500/30 bg-emerald-500/5 text-emerald-300' : 'border-zinc-700/40 bg-zinc-800/30 text-zinc-400'}`}>
                    <span>{grade === 'correct' ? '✅' : '📋'}</span>
                    <div>
                        <p>{grade === 'correct' ? 'Pronunciación aceptada' : 'Pendiente de revisión del teacher'}</p>
                        {transcript && <p className="text-xs text-zinc-500 mt-0.5">Capturado: "{transcript}"</p>}
                    </div>
                </div>
            );
        }

        return (
            <div className="space-y-4">
                {/* Context prompt */}
                <div className="flex items-start gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-4 py-3">
                    <span className="text-lg shrink-0">🇲🇽</span>
                    <p className="text-indigo-200 font-medium text-sm leading-snug">{q.prompt}</p>
                </div>

                {/* Target phrase */}
                <div className="space-y-2">
                    <div className="flex items-center gap-2">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Di esta frase en voz alta:</p>
                        <button onClick={() => speakPhrase(q.targetPhrase)}
                            className="flex items-center gap-1 text-[10px] font-black text-teal-400 bg-teal-500/10 border border-teal-500/20 px-2 py-1 rounded-lg hover:bg-teal-500/20 transition-colors active:scale-95">
                            <Volume2 size={10} /> Escuchar
                        </button>
                    </div>
                    <div className="bg-zinc-800/60 border border-zinc-700 rounded-xl px-4 py-3 text-center">
                        <p className="text-white font-bold text-base">{q.targetPhrase}</p>
                        {q.hint && <p className="text-xs text-zinc-500 mt-1.5">{q.hint}</p>}
                    </div>
                </div>

                {/* State feedback */}
                {status === 'correct' && (
                    <div className="flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/30 rounded-xl px-4 py-3">
                        <span className="text-2xl">✅</span>
                        <div>
                            <p className="text-emerald-300 font-black text-sm">¡Muy bien!</p>
                            {transcript && <p className="text-emerald-400/70 text-xs mt-0.5">Te escuché: "{transcript}"</p>}
                        </div>
                    </div>
                )}
                {status === 'skipped' && (
                    <div className="flex items-center gap-3 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
                        <span className="text-2xl">⏭</span>
                        <p className="text-zinc-400 font-medium text-sm">Saltado — el teacher revisará esta respuesta.</p>
                    </div>
                )}
                {status === 'error' && transcript && (
                    <div className="p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-center">
                        <p className="text-rose-400 font-bold text-xs mb-1">
                            No fue suficiente ({attempts}/{maxAttempts} intentos usados)
                        </p>
                        <p className="text-zinc-400 text-xs">Te escuché decir: "{transcript}"</p>
                    </div>
                )}

                {/* Mic controls */}
                {!isFinal && (
                    <div className="flex flex-col items-center gap-3 pt-1">
                        {isListening && (
                            <p className="text-indigo-400 font-black text-xs uppercase tracking-widest animate-pulse">
                                🎤 Escuchando...
                            </p>
                        )}
                        <button onClick={toggleMic}
                            className={`w-16 h-16 rounded-2xl flex items-center justify-center transition-all active:scale-95 shadow-lg
                                ${isListening
                                    ? 'bg-indigo-600 text-white mic-active'
                                    : status === 'error'
                                    ? 'bg-rose-500/20 border-2 border-rose-500/50 text-rose-400 hover:bg-rose-500/30'
                                    : 'bg-zinc-800 border-2 border-zinc-600 text-zinc-300 hover:border-indigo-500/60 hover:text-indigo-400'}`}>
                            {isListening ? <MicOff size={28}/> : <Mic size={28}/>}
                        </button>
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                            {isListening ? 'Toca para detener' : 'Toca para hablar'}
                            {attempts > 0 && !isListening && ` · ${attempts}/${maxAttempts} intentos`}
                        </p>
                        {attempts > 0 && !isListening && (
                            <button onClick={skipQuestion} className="text-zinc-600 hover:text-zinc-400 text-xs font-bold transition-colors">
                                Saltar esta pregunta →
                            </button>
                        )}
                    </div>
                )}
            </div>
        );
    }

    // WORD FORM ───────────────────────────────────────────────────────────────
    function QWordForm({ q, answer, onChange, submitted, grade }) {
        return (
            <div className="space-y-4">
                <div className="bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3">
                    <p className="text-zinc-200 font-semibold text-sm leading-snug">{q.sentence}</p>
                    <p className="text-[10px] text-purple-400 font-black uppercase tracking-widest mt-1.5">
                        Raíz: <span className="font-black">{q.options.join(' · ')}</span>
                    </p>
                </div>
                <div className="grid grid-cols-2 gap-2">
                    {q.options.map(opt => {
                        const sel = answer === opt;
                        const correct = submitted && opt === q.answer;
                        const wrong = submitted && sel && opt !== q.answer;
                        return (
                            <button key={opt} disabled={submitted} onClick={() => onChange(opt)}
                                className={`py-3 px-4 rounded-xl border-2 font-bold text-sm transition-all active:scale-95 text-left
                                    ${correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                      wrong   ? 'border-rose-500 bg-rose-500/10 text-rose-300' :
                                      sel     ? 'border-purple-500 bg-purple-500/10 text-purple-300' :
                                                'border-zinc-700 bg-zinc-800/30 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800/60'}`}>
                                {opt}
                            </button>
                        );
                    })}
                </div>
                {submitted && grade === 'incorrect' && (
                    <p className="text-xs font-bold text-emerald-400">✅ Correcta: <span className="font-black">{q.answer}</span></p>
                )}
            </div>
        );
    }

    // CATEGORY SORT ───────────────────────────────────────────────────────────
    function QCategorySort({ q, answer, onChange, submitted, grade }) {
        const [poolOrder] = useState(() => shuffle(q.words.map((_, i) => i)));
        const [placed, setPlaced] = useState(() => {
            const init = {};
            q.categories.forEach(c => { init[c] = []; });
            return init;
        });
        const [selectedIdx, setSelectedIdx] = useState(null);

        const allPlacedIdxs = new Set(Object.values(placed).flat());
        const poolIdxs = poolOrder.filter(i => !allPlacedIdxs.has(i));

        const moveToCategory = (cat, wordIdx) => {
            const np = {};
            q.categories.forEach(c => { np[c] = placed[c].filter(i => i !== wordIdx); });
            np[cat] = [...np[cat], wordIdx];
            setPlaced(np);
            const ans = {};
            q.categories.forEach(c => { ans[c] = np[c].map(i => q.words[i]); });
            onChange(ans);
            setSelectedIdx(null);
        };

        const returnToPool = (cat, wordIdx) => {
            const np = { ...placed, [cat]: placed[cat].filter(i => i !== wordIdx) };
            setPlaced(np);
            const ans = {};
            q.categories.forEach(c => { ans[c] = np[c].map(i => q.words[i]); });
            onChange(ans);
            setSelectedIdx(null);
        };

        const catColors = [
            { label: 'text-cyan-400', border: 'border-cyan-500/50', bg: 'bg-cyan-500/8', chip: 'bg-cyan-600/20 border-cyan-600/40 text-cyan-300' },
            { label: 'text-orange-400', border: 'border-orange-500/50', bg: 'bg-orange-500/8', chip: 'bg-orange-600/20 border-orange-600/40 text-orange-300' },
            { label: 'text-violet-400', border: 'border-violet-500/50', bg: 'bg-violet-500/8', chip: 'bg-violet-600/20 border-violet-600/40 text-violet-300' },
        ];

        return (
            <div className="space-y-4">
                {!submitted && poolIdxs.length > 0 && (
                    <div className="space-y-1.5">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                            {selectedIdx !== null ? '✅ Ahora toca la categoría donde va:' : 'Toca una palabra para seleccionarla:'}
                        </p>
                        <div className="flex flex-wrap gap-2 p-3 bg-zinc-800/20 border border-zinc-700/50 rounded-xl min-h-[44px]">
                            {poolIdxs.map(idx => {
                                const isSel = selectedIdx === idx;
                                return (
                                    <button key={idx} onClick={() => setSelectedIdx(isSel ? null : idx)}
                                        className={`px-3 py-1.5 rounded-lg text-sm font-bold transition-all active:scale-95 border-2
                                            ${isSel ? 'bg-sky-500/20 border-sky-500 text-sky-300 scale-105 shadow-md shadow-sky-500/20' : 'bg-zinc-700 border-zinc-600 text-zinc-100 hover:bg-zinc-600'}`}>
                                        {q.words[idx]}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                )}

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {q.categories.map((cat, ci) => {
                        const cc = catColors[ci % catColors.length];
                        const catPlaced = placed[cat] || [];
                        const isCorrect = submitted && (q.answers[cat] || []).every(w => (answer?.[cat] || []).map(normalize).includes(normalize(w))) && (answer?.[cat] || []).length === (q.answers[cat] || []).length;
                        return (
                            <div key={cat}
                                onClick={() => { if (!submitted && selectedIdx !== null) moveToCategory(cat, selectedIdx); }}
                                className={`min-h-[90px] p-3 border-2 rounded-xl transition-all space-y-2
                                    ${submitted && isCorrect     ? 'border-emerald-500/40 bg-emerald-500/5' :
                                      submitted && !isCorrect    ? 'border-rose-500/40 bg-rose-500/5' :
                                      selectedIdx !== null       ? `${cc.border} cursor-pointer hover:brightness-110` :
                                                                   'border-dashed border-zinc-600 bg-zinc-800/20'}`}>
                                <p className={`text-[10px] font-black uppercase tracking-widest ${cc.label}`}>
                                    {cat} {submitted ? (isCorrect ? '✅' : '❌') : (selectedIdx !== null ? '← aquí' : '')}
                                </p>
                                <div className="flex flex-wrap gap-1.5">
                                    {catPlaced.map((wordIdx, pos) => (
                                        <button key={`${cat}-${pos}`} disabled={submitted}
                                            onClick={e => { e.stopPropagation(); returnToPool(cat, wordIdx); }}
                                            className={`px-2.5 py-1 rounded-lg text-xs font-bold border transition-all active:scale-95 hover:opacity-70 ${cc.chip}`}>
                                            {q.words[wordIdx]}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>

                {submitted && grade === 'incorrect' && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-1">
                        <p className="text-xs font-black text-emerald-400 mb-1">✅ Clasificación correcta:</p>
                        {q.categories.map(cat => (
                            <p key={cat} className="text-xs text-zinc-300">
                                <span className="font-black text-zinc-200">{cat}:</span> {(q.answers[cat] || []).join(', ')}
                            </p>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // SPOT THE ERROR ──────────────────────────────────────────────────────────
    function QSpotError({ q, answer, onChange, submitted, grade }) {
        const words = q.sentence.split(' ');
        return (
            <div className="space-y-4">
                <div className="flex flex-wrap gap-2 p-4 bg-zinc-800/30 border border-zinc-700 rounded-xl">
                    {words.map((word, i) => {
                        const clean = word.replace(/[?.!,;:'"]/g, '');
                        const isSel = answer && (normalize(answer) === normalize(clean) || normalize(answer) === normalize(word));
                        const isError = normalize(clean) === normalize(q.errorWord) || normalize(word) === normalize(q.errorWord);
                        const correct = submitted && isError;
                        const wrong = submitted && isSel && !isError;
                        return (
                            <button key={i} disabled={submitted}
                                onClick={() => onChange(clean)}
                                className={`px-3 py-2 rounded-xl font-bold text-sm transition-all active:scale-95 border-2
                                    ${correct    ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                      wrong      ? 'border-rose-500 bg-rose-500/10 text-rose-300' :
                                      isSel      ? 'border-rose-400 bg-rose-500/15 text-rose-300' :
                                                   'border-zinc-700 bg-zinc-800/30 text-zinc-200 hover:border-rose-500/50 hover:bg-rose-500/5 hover:text-rose-200'}`}>
                                {word}
                            </button>
                        );
                    })}
                </div>
                {submitted && (
                    <div className="space-y-1">
                        {grade === 'correct' && (
                            <p className="text-xs font-bold text-emerald-400">✅ Correcto — el error estaba en <strong>"{q.errorWord}"</strong> → debería ser <strong>"{q.correction}"</strong></p>
                        )}
                        {grade === 'incorrect' && (
                            <p className="text-xs font-bold text-rose-400">❌ El error estaba en <strong>"{q.errorWord}"</strong> → debería ser <strong>"{q.correction}"</strong></p>
                        )}
                        {q.explanation && <p className="text-xs text-zinc-500 italic">{q.explanation}</p>}
                    </div>
                )}
            </div>
        );
    }

    // MULTIPLE RESPONSE ───────────────────────────────────────────────────────
    function QMultipleResponse({ q, answer, onChange, submitted, grade }) {
        const selected = new Set(answer || []);
        const toggle = (opt) => {
            if (submitted) return;
            const ns = new Set(selected);
            ns.has(opt) ? ns.delete(opt) : ns.add(opt);
            onChange([...ns]);
        };
        const correctSet = new Set((q.answers || []).map(normalize));

        return (
            <div className="space-y-2">
                <p className="text-[10px] font-black text-sky-400/70 uppercase tracking-widest mb-1">Puede haber más de una respuesta correcta</p>
                {q.options.map(opt => {
                    const isSel = selected.has(opt);
                    const isCorrect = submitted && correctSet.has(normalize(opt));
                    const isWrongSel = submitted && isSel && !isCorrect;
                    const isMissed = submitted && isCorrect && !isSel;
                    return (
                        <button key={opt} disabled={submitted} onClick={() => toggle(opt)}
                            className={`w-full text-left px-4 py-3 rounded-xl border-2 font-medium text-sm transition-all flex items-center gap-3 active:scale-[0.99]
                                ${isCorrect && isSel ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                  isMissed           ? 'border-emerald-500/40 bg-emerald-500/5 text-emerald-400/70' :
                                  isWrongSel         ? 'border-rose-500 bg-rose-500/10 text-rose-300' :
                                  isSel              ? 'border-sky-500 bg-sky-500/10 text-sky-300' :
                                                       'border-zinc-700 bg-zinc-800/30 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800/60'}`}>
                            <span className={`w-5 h-5 rounded-md border-2 flex items-center justify-center shrink-0 text-[10px] font-black transition-all
                                ${isCorrect && isSel ? 'bg-emerald-500 border-emerald-500 text-white' :
                                  isMissed           ? 'bg-emerald-500/20 border-emerald-500/40 text-emerald-400' :
                                  isWrongSel         ? 'bg-rose-500 border-rose-500 text-white' :
                                  isSel              ? 'bg-sky-500 border-sky-500 text-white' :
                                                       'border-zinc-600 bg-zinc-800'}`}>
                                {isSel && '✓'}{isMissed && !isSel && '○'}
                            </span>
                            {opt}
                        </button>
                    );
                })}
                {submitted && q.explanation && (
                    <p className="text-xs text-zinc-500 italic mt-1">💡 {q.explanation}</p>
                )}
            </div>
        );
    }

    // DIALOGUE FILL ───────────────────────────────────────────────────────────
    function QDialogueFill({ q, answer, onChange, submitted, grade }) {
        return (
            <div className="space-y-4">
                <div className="space-y-2 bg-zinc-800/20 border border-zinc-700/50 rounded-xl p-4">
                    {q.dialogue.map((turn, i) => {
                        const isBlank = turn.line === null;
                        return (
                            <div key={i} className={`flex gap-2 ${turn.speaker === 'B' ? 'flex-row-reverse' : ''}`}>
                                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-black shrink-0 mt-0.5
                                    ${turn.speaker === 'A' ? 'bg-zinc-700 text-zinc-300' : 'bg-violet-600 text-white'}`}>
                                    {turn.speaker}
                                </div>
                                <div className={`max-w-[80%] px-3 py-2 rounded-2xl text-sm font-medium leading-snug
                                    ${turn.speaker === 'A' ? 'bg-zinc-800 text-zinc-200 rounded-tl-none' : 'bg-violet-600/20 border border-violet-500/30 text-violet-200 rounded-tr-none'}`}>
                                    {isBlank
                                        ? <span className="text-violet-400/60 font-black italic">{answer ? `"${answer}"` : '¿Qué responde B?...'}</span>
                                        : turn.line}
                                </div>
                            </div>
                        );
                    })}
                </div>
                <div className="space-y-2">
                    {q.options.map(opt => {
                        const sel = answer === opt;
                        const correct = submitted && opt === q.answer;
                        const wrong = submitted && sel && opt !== q.answer;
                        return (
                            <button key={opt} disabled={submitted} onClick={() => onChange(opt)}
                                className={`w-full text-left px-4 py-3 rounded-xl border-2 font-medium text-sm transition-all active:scale-[0.99]
                                    ${correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-300' :
                                      wrong   ? 'border-rose-500 bg-rose-500/10 text-rose-300' :
                                      sel     ? 'border-violet-500 bg-violet-500/10 text-violet-300' :
                                                'border-zinc-700 bg-zinc-800/30 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800/60'}`}>
                                {opt}
                            </button>
                        );
                    })}
                </div>
                {submitted && grade === 'incorrect' && (
                    <p className="text-xs font-bold text-emerald-400">✅ Correcta: <span className="font-black">"{q.answer}"</span></p>
                )}
            </div>
        );
    }

    // PARAGRAPH ORDER ─────────────────────────────────────────────────────────
    function QParagraphOrder({ q, answer, onChange, submitted, grade }) {
        const [shuffled] = useState(() => shuffle(q.sentences.map((_, i) => i)));
        const [ordered, setOrdered] = useState([]);

        const usedSet = new Set(ordered);
        const poolIdxs = shuffled.filter(i => !usedSet.has(i));

        const addToEnd = (sentIdx) => {
            if (submitted) return;
            const no = [...ordered, sentIdx];
            setOrdered(no);
            onChange(no);
        };

        const removeAt = (pos) => {
            if (submitted) return;
            const no = ordered.filter((_, i) => i !== pos);
            setOrdered(no);
            onChange(no);
        };

        return (
            <div className="space-y-4">
                <div className="space-y-1.5">
                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Tu orden — toca una oración para quitarla:</p>
                    <div className={`min-h-[56px] space-y-1.5 p-3 border-2 rounded-xl transition-colors
                        ${submitted && grade === 'correct'   ? 'border-emerald-500/40 bg-emerald-500/5' :
                          submitted && grade === 'incorrect' ? 'border-rose-500/40 bg-rose-500/5' :
                                                               'border-dashed border-zinc-600 bg-zinc-800/10'}`}>
                        {ordered.length === 0 && !submitted && (
                            <p className="text-zinc-600 text-xs text-center py-2">Toca oraciones de abajo para ordenarlas aquí</p>
                        )}
                        {ordered.map((sentIdx, pos) => {
                            const isRight = submitted && q.correctOrder[pos] === sentIdx;
                            const isWrong = submitted && !isRight;
                            return (
                                <button key={`o-${pos}-${sentIdx}`} disabled={submitted}
                                    onClick={() => removeAt(pos)}
                                    className={`w-full text-left flex items-start gap-3 px-3 py-2 rounded-xl border text-sm font-medium transition-all active:scale-[0.99]
                                        ${isRight ? 'border-emerald-500/40 bg-emerald-500/5 text-emerald-300' :
                                          isWrong ? 'border-rose-500/40 bg-rose-500/5 text-rose-300' :
                                                    'border-zinc-700 bg-zinc-800/50 text-zinc-300 hover:bg-rose-500/5 hover:border-rose-500/30'}`}>
                                    <span className={`shrink-0 w-5 h-5 rounded-md flex items-center justify-center text-[10px] font-black
                                        ${isRight ? 'bg-emerald-500/20 text-emerald-400' : isWrong ? 'bg-rose-500/20 text-rose-400' : 'bg-zinc-700 text-zinc-400'}`}>
                                        {pos + 1}
                                    </span>
                                    <span className="leading-snug">{q.sentences[sentIdx]}</span>
                                </button>
                            );
                        })}
                    </div>
                </div>

                {!submitted && poolIdxs.length > 0 && (
                    <div className="space-y-1.5">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Oraciones disponibles:</p>
                        <div className="space-y-1.5">
                            {poolIdxs.map(sentIdx => (
                                <button key={`p-${sentIdx}`} onClick={() => addToEnd(sentIdx)}
                                    className="w-full text-left flex items-start gap-3 px-3 py-2 rounded-xl border border-zinc-700 bg-zinc-800/30 text-zinc-300 text-sm font-medium transition-all active:scale-[0.99] hover:border-lime-500/30 hover:bg-lime-500/5 hover:text-lime-300">
                                    <span className="shrink-0 text-zinc-600 font-black text-base leading-none mt-0.5">+</span>
                                    <span className="leading-snug">{q.sentences[sentIdx]}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                )}

                {submitted && grade === 'incorrect' && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-1">
                        <p className="text-xs font-black text-emerald-400 mb-1.5">✅ Orden correcto:</p>
                        {q.correctOrder.map((sentIdx, pos) => (
                            <p key={pos} className="text-xs text-zinc-300 flex items-start gap-2">
                                <span className="shrink-0 font-black text-zinc-500 w-4">{pos + 1}.</span>
                                <span>{q.sentences[sentIdx]}</span>
                            </p>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // CONTEXT MATCH ───────────────────────────────────────────────────────────
    function QContextMatch({ q, answer, onChange, submitted, grade }) {
        const [shuffledPhrases] = useState(() => shuffle([...q.phrases]));
        return (
            <div className="space-y-3">
                {q.situations.map((situation, i) => {
                    const sel = answer?.[i];
                    const correct = submitted && normalize(sel) === normalize(q.phrases[i]);
                    const wrong = submitted && sel && !correct;
                    return (
                        <div key={i} className="flex items-start gap-2 sm:gap-3">
                            <div className="flex-1 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-3 py-2 text-indigo-200 text-xs font-semibold leading-snug">
                                🇲🇽 {situation}
                            </div>
                            <span className="text-zinc-600 font-black shrink-0 mt-2.5">→</span>
                            <div className="flex-1">
                                <select disabled={submitted} value={sel || ''}
                                    onChange={e => onChange({ ...answer, [i]: e.target.value })}
                                    className={`w-full px-3 py-2 rounded-xl border-2 font-bold text-xs outline-none cursor-pointer text-white transition-colors
                                        ${correct ? 'border-emerald-500 bg-emerald-500/10' :
                                          wrong   ? 'border-rose-500 bg-rose-500/10' :
                                          sel     ? 'border-orange-500 bg-orange-500/10' :
                                                    'border-zinc-700 bg-zinc-800'}`}>
                                    <option value="">Elegir...</option>
                                    {shuffledPhrases.map(ph => <option key={ph} value={ph}>{ph}</option>)}
                                </select>
                            </div>
                        </div>
                    );
                })}
                {submitted && grade === 'incorrect' && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-1.5">
                        <p className="text-xs font-black text-emerald-400 mb-1">✅ Respuestas correctas:</p>
                        {q.situations.map((sit, i) => (
                            <p key={i} className="text-xs text-zinc-300 leading-snug">
                                <span className="text-indigo-300 font-bold">{sit}</span><br/>→ {q.phrases[i]}
                            </p>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // SHORT TRANSLATION ───────────────────────────────────────────────────────
    function QShortTranslation({ q, answer, onChange, submitted, grade }) {
        const total = (q.keyWords || []).length;
        const threshold = q.minKeyWordsMatch || Math.ceil(total * 0.7);
        const keyWordsFound = answer && answer.trim()
            ? (q.keyWords || []).filter(w => normalize(answer).includes(normalize(w))).length
            : 0;

        return (
            <div className="space-y-4">
                <div className="flex items-start gap-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-4 py-3">
                    <span className="text-xl shrink-0">🇲🇽</span>
                    <p className="text-indigo-200 font-bold text-sm leading-snug">{q.spanishText}</p>
                </div>
                <div className="space-y-1.5">
                    <textarea disabled={submitted} rows={2}
                        value={answer || ''}
                        onChange={e => onChange(e.target.value)}
                        placeholder="Escribe la traducción en inglés..."
                        className={`w-full bg-zinc-900 border-2 rounded-xl px-4 py-3 text-white font-medium resize-none outline-none text-sm transition-colors
                            ${submitted && grade === 'correct'   ? 'border-emerald-500' :
                              submitted && grade === 'incorrect' ? 'border-rose-500' :
                                                                   'border-zinc-700 focus:border-fuchsia-400'}`}
                    />
                    {!submitted && answer && answer.trim() && (
                        <p className={`text-xs font-bold transition-colors
                            ${keyWordsFound >= threshold ? 'text-emerald-400' : keyWordsFound > 0 ? 'text-amber-400' : 'text-zinc-600'}`}>
                            {keyWordsFound}/{total} palabras clave{keyWordsFound >= threshold ? ' ✓' : ''}
                        </p>
                    )}
                </div>
                {submitted && grade === 'incorrect' && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
                        <p className="text-xs font-black text-emerald-400 mb-0.5">✅ Ejemplo de respuesta:</p>
                        <p className="text-xs text-zinc-300 italic">{q.sampleAnswer}</p>
                    </div>
                )}
            </div>
        );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // QUESTION CARD
    // ──────────────────────────────────────────────────────────────────────────
    const Q_COMPONENTS = {
        multipleChoice:  QMultipleChoice,
        truefalse:       QTrueFalse,
        fillBlank:       QFillBlank,
        unscramble:      QUnscramble,
        matching:        QMatching,
        oddOneOut:       QOddOneOut,
        errorCorrection: QErrorCorrection,
        openEnded:       QOpenEnded,
        audioQuestion:    QAudioQuestion,
        voiceReply:       QVoiceReply,
        wordForm:         QWordForm,
        categorySort:     QCategorySort,
        spotError:        QSpotError,
        multipleResponse: QMultipleResponse,
        dialogueFill:     QDialogueFill,
        paragraphOrder:   QParagraphOrder,
        contextMatch:     QContextMatch,
        shortTranslation: QShortTranslation,
    };

    function QuestionCard({ q, index, answer, onChange, submitted }) {
        const cfg   = TYPE_CFG[q.type] || { label: q.type, icon: '❓', color: 'text-zinc-400' };
        const grade = submitted ? gradeAnswer(q, answer) : null;
        const Body  = Q_COMPONENTS[q.type];

        const borderColor =
            submitted && grade === 'correct'   ? 'border-emerald-500/30' :
            submitted && grade === 'incorrect' ? 'border-rose-500/30'    :
            submitted && grade === 'review'    ? 'border-zinc-600/40'    :
                                                 'border-zinc-800';

        return (
            <div className={`bg-zinc-900 border ${borderColor} rounded-2xl p-5 sm:p-6 transition-all`}>
                <div className="flex items-start justify-between gap-3 mb-4">
                    <div className="flex items-center gap-3 min-w-0">
                        <span className="shrink-0 w-7 h-7 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-xs font-black text-zinc-400">
                            {index + 1}
                        </span>
                        <div className="min-w-0">
                            <p className={`text-[10px] font-black uppercase tracking-widest ${cfg.color}`}>
                                {cfg.icon} {cfg.label}
                            </p>
                            {(q.stem || q.instruction || q.prompt) && (
                                <p className="text-zinc-200 font-semibold text-sm mt-1 leading-snug">
                                    {q.stem || q.instruction || q.prompt}
                                </p>
                            )}
                        </div>
                    </div>
                    {submitted && (
                        <span className="shrink-0 text-lg">
                            {grade === 'correct' ? '✅' : grade === 'incorrect' ? '❌' : '📋'}
                        </span>
                    )}
                </div>

                {Body
                    ? <Body q={q} answer={answer} onChange={onChange} submitted={submitted} grade={grade} />
                    : <p className="text-rose-400 text-sm">Tipo no soportado: {q.type}</p>
                }
            </div>
        );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // WELCOME SCREEN
    // ──────────────────────────────────────────────────────────────────────────
    function WelcomeScreen({ quiz, onStart }) {
        const typeCounts = quiz.questions.reduce((acc, q) => {
            acc[q.type] = (acc[q.type] || 0) + 1;
            return acc;
        }, {});

        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">
                <div className="w-full max-w-lg">
                    <div className="flex items-center gap-3 mb-8">
                        <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-indigo-600/20">P</div>
                        <div>
                            <p className="text-[10px] font-black uppercase tracking-widest text-indigo-400">Periplo · Evaluación</p>
                            <p className="text-xs text-zinc-500 font-medium">Responde con honestidad — es para mejorar.</p>
                        </div>
                    </div>

                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 sm:p-8 mb-6 shadow-2xl">
                        <h1 className="text-2xl sm:text-3xl font-black text-white mb-2 leading-tight" style={{ letterSpacing: '-0.02em' }}>
                            {quiz.title}
                        </h1>
                        {quiz.description && (
                            <p className="text-zinc-400 font-medium mb-6">{quiz.description}</p>
                        )}

                        <div className="grid grid-cols-3 gap-3 mb-6">
                            {[
                                { val: quiz.questions.length, label: 'Preguntas' },
                                { val: Object.keys(typeCounts).length, label: 'Tipos' },
                                { val: quiz.timeLimit || '∞', label: quiz.timeLimit ? 'Minutos' : 'Sin límite' },
                            ].map(({ val, label }) => (
                                <div key={label} className="bg-zinc-800/60 rounded-2xl p-3 text-center border border-zinc-700/50">
                                    <p className="text-2xl font-black text-white">{val}</p>
                                    <p className="text-[10px] text-zinc-500 font-black uppercase tracking-widest">{label}</p>
                                </div>
                            ))}
                        </div>

                        <div className="space-y-1.5">
                            {Object.entries(typeCounts).map(([type, count]) => {

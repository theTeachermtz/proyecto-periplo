                                const cfg = TYPE_CFG[type] || { label: type, icon: '❓', color: 'text-zinc-400' };
                                return (
                                    <div key={type} className="flex items-center justify-between text-xs">
                                        <span className={`font-bold ${cfg.color}`}>{cfg.icon} {cfg.label}</span>
                                        <span className="text-zinc-500 font-black">{count} pregunta{count !== 1 ? 's' : ''}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <button onClick={onStart}
                        className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black text-base uppercase tracking-widest shadow-lg shadow-indigo-600/20 transition-all active:scale-95">
                        Comenzar Examen →
                    </button>
                    <p className="text-center text-zinc-600 text-xs font-medium mt-3">
                        Puedes revisar tus respuestas antes de enviar.
                    </p>
                </div>
            </div>
        );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // TEST SCREEN
    // ──────────────────────────────────────────────────────────────────────────
    function TestScreen({ quiz, onSubmit }) {
        const [answers,     setAnswers]     = useState({});
        const [showConfirm, setShowConfirm] = useState(false);

        const handleChange = (qId, val) =>
            setAnswers(prev => ({ ...prev, [qId]: val }));

        const isAnswered = (q) => {
            const a = answers[q.id];
            if (a === undefined || a === null) return false;

            if (q.type === 'fillBlank') {
                if (typeof a !== 'object') return false;
                let blankCount = 0;
                let m, re = /\[([^\]]+)\]/g;
                while ((m = re.exec(q.passage || '')) !== null) blankCount++;
                return Object.keys(a).filter(k => a[k]).length >= blankCount;
            }
            if (q.type === 'unscramble') return Array.isArray(a) && a.length > 0;
            if (q.type === 'voiceReply') return !!a;
            if (q.type === 'categorySort') {
                if (!a || typeof a !== 'object') return false;
                return q.categories.reduce((sum, c) => sum + (a[c]?.length || 0), 0) >= q.words.length;
            }
            if (q.type === 'paragraphOrder') return Array.isArray(a) && a.length === q.sentences.length;
            if (q.type === 'contextMatch') return !!a && typeof a === 'object' && Object.keys(a).length >= q.situations.length;
            if (q.type === 'multipleResponse') return Array.isArray(a) && a.length > 0;

            if (typeof a === 'string') return a.trim() !== '';
            if (Array.isArray(a))      return a.length > 0;
            if (typeof a === 'object') return Object.keys(a).length >= (q.pairs?.length || 0);
            return true;
        };

        const answeredCount = quiz.questions.filter(isAnswered).length;
        const unanswered    = quiz.questions.length - answeredCount;
        const pct           = (answeredCount / quiz.questions.length) * 100;

        const handleSubmitClick = () => {
            unanswered > 0 ? setShowConfirm(true) : onSubmit(answers);
        };

        return (
            <div className="min-h-screen flex flex-col">
                <header className="sticky top-0 z-20 bg-zinc-950/95 backdrop-blur-sm border-b border-zinc-800 flex items-center justify-between px-4 sm:px-6 py-3 pt-safe">
                    <div className="flex items-center gap-3 min-w-0">
                        {!IS_STUDENT
                            ? <button onClick={() => window.location.href = 'index.html'}
                                className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20 shrink-0">P</button>
                            : <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20 shrink-0">P</div>
                        }
                        <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1 shrink-0"/>
                        <div className="min-w-0">
                            <h1 className="text-sm sm:text-base font-black text-white leading-none truncate max-w-[160px] sm:max-w-xs">{quiz.title}</h1>
                            <p className="text-[9px] sm:text-[10px] font-bold text-indigo-400 uppercase tracking-widest mt-0.5">
                                {answeredCount} / {quiz.questions.length} respondidas
                            </p>
                        </div>
                    </div>
                    <button onClick={handleSubmitClick}
                        className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-black text-xs sm:text-sm uppercase tracking-widest shadow-lg shadow-indigo-600/20 transition-all active:scale-95 shrink-0">
                        <Send size={14} /> Enviar
                    </button>
                </header>

                <div className="w-full h-1 bg-zinc-800 shrink-0">
                    <div className="h-1 bg-indigo-500 transition-all duration-500" style={{ width: `${pct}%` }} />
                </div>

                <div className="flex-1 max-w-2xl mx-auto w-full px-4 py-6 sm:py-8 space-y-4 pb-safe">
                    {quiz.questions.map((q, idx) => (
                        <QuestionCard key={q.id} q={q} index={idx}
                            answer={answers[q.id]}
                            onChange={val => handleChange(q.id, val)}
                            submitted={false}
                        />
                    ))}

                    <button onClick={handleSubmitClick}
                        className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black text-base uppercase tracking-widest shadow-lg shadow-indigo-600/20 transition-all active:scale-95 flex items-center justify-center gap-2 mt-2">
                        <Send size={18} /> Enviar Examen
                    </button>
                    <p className="text-center text-zinc-600 text-xs font-medium pb-4">
                        {unanswered > 0
                            ? `${unanswered} pregunta${unanswered !== 1 ? 's' : ''} sin responder`
                            : 'Todas las preguntas respondidas ✓'}
                    </p>
                </div>

                {showConfirm && (
                    <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                            <div className="text-center mb-5">
                                <div className="text-4xl mb-3">⚠️</div>
                                <h2 className="text-xl font-black text-white mb-1">¿Enviar el examen?</h2>
                                <p className="text-zinc-400 text-sm">
                                    Tienes <strong className="text-amber-400">{unanswered} pregunta{unanswered !== 1 ? 's' : ''}</strong> sin responder.
                                </p>
                            </div>
                            <div className="flex flex-col gap-3">
                                <button onClick={() => { setShowConfirm(false); onSubmit(answers); }}
                                    className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase tracking-widest transition-all active:scale-95">
                                    Sí, enviar de todas formas
                                </button>
                                <button onClick={() => setShowConfirm(false)}
                                    className="w-full py-3 text-zinc-400 font-bold hover:text-zinc-200 transition-colors">
                                    Regresar al examen
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // RESULTS SCREEN
    // ──────────────────────────────────────────────────────────────────────────
    function ResultsScreen({ quiz, answers }) {
        const graded     = quiz.questions.map(q => ({ q, grade: gradeAnswer(q, answers[q.id]), answer: answers[q.id] }));
        const autoGraded = graded.filter(g => g.grade !== 'review' && g.grade !== null);
        const forReview  = graded.filter(g => g.grade === 'review');
        const correct    = autoGraded.filter(g => g.grade === 'correct').length;
        const total      = autoGraded.length;
        const pct        = total > 0 ? Math.round((correct / total) * 100) : 0;
        const emoji      = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '💪';
        const msg        = pct >= 90 ? '¡Excelente trabajo!' : pct >= 70 ? '¡Muy bien!' : pct >= 50 ? 'Buen esfuerzo' : '¡A seguir practicando!';

        return (
            <div className="min-h-screen flex flex-col">
                <header className="sticky top-0 z-20 bg-zinc-950 border-b border-zinc-800 flex items-center px-4 sm:px-6 py-3 pt-safe">
                    <div className="flex items-center gap-3">
                        {!IS_STUDENT
                            ? <button onClick={() => window.location.href = 'index.html'}
                                className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20">P</button>
                            : <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20">P</div>
                        }
                        <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1"/>
                        <div>
                            <h1 className="text-base font-black text-white leading-none truncate max-w-[200px] sm:max-w-xs">{quiz.title}</h1>
                            <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mt-0.5">Resultados</p>
                        </div>
                    </div>
                </header>

                <div className="flex-1 max-w-2xl mx-auto w-full px-4 py-6 sm:py-8 space-y-6 pb-safe">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 sm:p-8 text-center shadow-2xl">
                        <div className="text-5xl mb-3">{emoji}</div>
                        <h2 className="text-2xl font-black text-white mb-4">{msg}</h2>
                        <p className="text-4xl font-black text-white mb-1">
                            {correct} <span className="text-zinc-500 text-2xl">/ {total}</span>
                        </p>
                        <p className="text-zinc-500 text-sm font-bold mb-5">preguntas auto-calificadas</p>
                        <div className="w-full bg-zinc-800 rounded-full h-3 overflow-hidden mb-2">
                            <div className={`h-3 rounded-full transition-all duration-1000 ${pct >= 70 ? 'bg-emerald-500' : pct >= 50 ? 'bg-amber-500' : 'bg-rose-500'}`}
                                style={{ width: `${pct}%` }} />
                        </div>
                        <p className={`text-xl font-black ${pct >= 70 ? 'text-emerald-400' : pct >= 50 ? 'text-amber-400' : 'text-rose-400'}`}>{pct}%</p>

                        {forReview.length > 0 && (
                            <div className="mt-5 text-xs text-zinc-500 font-bold bg-zinc-800/50 border border-zinc-700 rounded-xl p-3">
                                📋 <strong className="text-zinc-300">{forReview.length} pregunta{forReview.length !== 1 ? 's' : ''}</strong> pendientes de revisión por el teacher.
                            </div>
                        )}
                    </div>

                    <div className="space-y-3">
                        <h3 className="text-xs font-black text-zinc-500 uppercase tracking-widest px-1">Detalle por pregunta</h3>
                        {graded.map(({ q, grade, answer }, idx) => {
                            const cfg     = TYPE_CFG[q.type] || { label: q.type, icon: '❓', color: 'text-zinc-400' };
                            const preview = q.stem || q.instruction || q.prompt || q.statement || q.sentence || q.questionText || q.spanishPrompt || '';
                            return (
                                <div key={q.id} className={`p-4 rounded-xl border space-y-1
                                    ${grade === 'correct'   ? 'border-emerald-500/20 bg-emerald-500/5'  :
                                      grade === 'incorrect' ? 'border-rose-500/20    bg-rose-500/5'     :
                                                              'border-zinc-700/40    bg-zinc-900/50'}`}>
                                    <div className="flex items-start gap-3">
                                        <span className="text-lg shrink-0 mt-0.5">
                                            {grade === 'correct' ? '✅' : grade === 'incorrect' ? '❌' : '📋'}
                                        </span>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-[10px] font-black text-zinc-500">{idx + 1}. {cfg.icon} {cfg.label}</p>
                                            <p className="text-xs font-semibold text-zinc-300 mt-0.5 line-clamp-2">{preview}</p>
                                        </div>
                                    </div>
                                    {grade === 'review' && answer && typeof answer === 'string' && (
                                        <div className="ml-8 mt-2 bg-zinc-800/60 border border-zinc-700/50 rounded-lg px-3 py-2">
                                            <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Respuesta del alumno:</p>
                                            <p className="text-xs text-zinc-300 leading-relaxed">{answer}</p>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {IS_STUDENT ? (
                        <p className="text-center text-zinc-600 text-xs font-bold pb-4">
                            Para salir, cierra esta pestaña de tu navegador.
                        </p>
                    ) : (
                        <button onClick={() => window.location.href = 'index.html'}
                            className="w-full py-3 text-zinc-500 font-bold hover:text-zinc-300 transition-colors text-sm">
                            ← Volver al hub
                        </button>
                    )}
                </div>
            </div>
        );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // APP
    // ──────────────────────────────────────────────────────────────────────────
    function App() {
        const [quiz,         setQuiz]         = useState(null);
        const [loading,      setLoading]      = useState(true);
        const [phase,        setPhase]        = useState('welcome');
        const [finalAnswers, setFinalAnswers] = useState({});

        useEffect(() => {
            const load = async () => {
                if (QUIZ_ID) {
                    try {
                        const snap = await getDoc(doc(_db, `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`, QUIZ_ID));
                        if (snap.exists()) { setQuiz(snap.data()); setLoading(false); return; }
                    } catch (e) { console.warn('Firestore load failed, falling back to mock:', e); }
                }
                setQuiz(MOCK_QUIZ);
                setLoading(false);
            };
            load();
        }, []);

        const handleSubmit = (answers) => {
            setFinalAnswers(answers);
            setPhase('results');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        if (loading) return (
            <div className="min-h-screen flex items-center justify-center">
                <div className="flex flex-col items-center gap-4">
                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"/>
                    <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">Cargando examen...</p>
                </div>
            </div>
        );

        if (!quiz) return (
            <div className="min-h-screen flex items-center justify-center">
                <p className="text-zinc-500 font-bold text-sm">No se encontró el examen.</p>
            </div>
        );

        if (phase === 'welcome') return <WelcomeScreen quiz={quiz} onStart={() => { setPhase('taking'); window.scrollTo(0, 0); }} />;
        if (phase === 'taking')  return <TestScreen quiz={quiz} onSubmit={handleSubmit} />;
        if (phase === 'results') return <ResultsScreen quiz={quiz} answers={finalAnswers} />;
    }

    createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

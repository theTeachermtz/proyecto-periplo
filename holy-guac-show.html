// ── Taquero order generator ───────────────────────────────────
const generateTaqOrder=()=>{
  const sh=arr=>[...arr].sort(()=>Math.random()-.5);
  const tacos=sh(['taco de pollo','taco de carne','taco de quesadilla','taco de chorizo']).slice(0,2+Math.floor(Math.random()*2));
  const comps=sh(['tomate','cebolla','cilantro','salsa verde','salsa roja','guacamole','limón','queso']).slice(0,2+Math.floor(Math.random()*2));
  const drinks=Math.random()<.6?[['cerveza','agua','refresco','jugo de naranja'][Math.floor(Math.random()*4)]]:[];
  return[...tacos,...comps,...drinks].map(item=>({item}));
};

// ── Scramble helper (used in goToChallenge for Group Anagram) ──
const makeScramble=(word)=>{
  const letters=word.toUpperCase().split('');
  let shuffled=[...letters];
  if(!letters.every(l=>l===letters[0])){
    let attempts=0;
    while(shuffled.join('')===letters.join('')&&attempts<10){
      shuffled=shuffled.sort(()=>Math.random()-.5);attempts++;
    }
  }
  return shuffled;
};

// ── Roulette Wheel ────────────────────────────────────────────
function RouletteWheel({spinCount,spinTarget,size=270}){
  const [angle,setAngle]=useState(0);
  const [anim,setAnim]=useState(false);
  const acc=useRef(0),prev=useRef(0);
  useEffect(()=>{
    if(!spinCount||spinCount===prev.current||spinTarget===null)return;
    prev.current=spinCount;
    const seg=45,tmod=spinTarget*seg+seg/2,cmod=acc.current%360;
    const diff=((tmod-cmod)%360+360)%360||360;
    const nxt=acc.current+360*6+diff;
    acc.current=nxt;setAnim(true);setAngle(nxt);
    setTimeout(()=>setAnim(false),4700);
  },[spinCount,spinTarget]);
  const cx=150,cy=150,R=138,inn=40;
  const segs=MINIGAMES.map((mg,i)=>{
    const a1=(i*45-90)*Math.PI/180,a2=((i+1)*45-90)*Math.PI/180,mid=(i*45-90+22.5)*Math.PI/180;
    const path=[`M ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)}`,`L ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)}`,`A ${R} ${R} 0 0 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}`,`L ${cx+inn*Math.cos(a2)} ${cy+inn*Math.sin(a2)}`,`A ${inn} ${inn} 0 0 0 ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)} Z`].join(' ');
    const ex=cx+93*Math.cos(mid),ey=cy+93*Math.sin(mid);
    return(<g key={i}><path d={path} fill={mg.color} stroke="#0a0a0a" strokeWidth="2.5" opacity="0.9"/><text x={ex} y={ey} textAnchor="middle" dominantBaseline="middle" fontSize="16">{mg.emoji}</text></g>);
  });
  return(
    <div className="relative flex items-center justify-center" style={{width:size,height:size}}>
      <div className="absolute text-white z-10 drop-shadow-lg" style={{top:-10,left:'50%',transform:'translateX(-50%)',fontSize:22}}>▼</div>
      <div style={{transform:`rotate(${angle}deg)`,transition:anim?'transform 4.5s cubic-bezier(.04,0,.08,1)':'none',transformOrigin:'50% 50%'}}>
        <svg viewBox="0 0 300 300" width={size-8} height={size-8}>
          {segs}
          <circle cx="150" cy="150" r="139" fill="none" stroke="#ffffff15" strokeWidth="4"/>
          <circle cx="150" cy="150" r="40" fill="#18181b" stroke="#ffffff22" strokeWidth="2"/>
          <text x="150" y="150" textAnchor="middle" dominantBaseline="middle" fontSize="22">🌶️</text>
          {MINIGAMES.map((_,i)=>{const a=(i*45-90)*Math.PI/180;return<line key={i} x1={cx+inn*Math.cos(a)} y1={cy+inn*Math.sin(a)} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="#0a0a0a" strokeWidth="2"/>;} )}
        </svg>
      </div>
    </div>
  );
}

// ── LOBBY ─────────────────────────────────────────────────────
function ScreenLobby({game,roomId,isHost,localId,onStart,onLeave}){
  const [codeCopied,setCC]=useState(false);
  const [showQr,setShowQr]=useState(false);
  const teams=game?.teams||[];
  const players=game?.players||[];
  const isModOnly=game?.hostRole==='MOD_ONLY';
  const copyCode=()=>navigator.clipboard.writeText(roomId).then(()=>{setCC(true);setTimeout(()=>setCC(false),2000);});
  const copyStudentLink_=()=>navigator.clipboard.writeText(studentUrl(roomId)).then(()=>{setCC(true);setTimeout(()=>setCC(false),2000);});
  const removePlayer=async(teamId,playerId,playerName)=>{
    if(!confirm(`¿Eliminar a ${playerName}?`))return;
    try{
      await runTransaction(db,async txn=>{
        const snap=await txn.get(rRef(roomId));
        if(!snap.exists())return;
        const d=snap.data();
        const newPs=d.players.filter(p=>p.id!==playerId);
        const newTeams=d.teams.map(t=>t.id===teamId?{...t,players:t.players.filter(n=>n!==playerName)}:t);
        txn.update(rRef(roomId),{players:newPs,teams:newTeams});
      });
    }catch(e){console.error('removePlayer',e);}
  };
  return(
    <div className="h-full overflow-y-auto scroll-y bg-zinc-950 flex flex-col items-center px-5 pt-4 gap-3"
      style={{paddingBottom:'calc(env(safe-area-inset-bottom) + 20px)'}}>
      {showQr&&<QrModal url={studentUrl(roomId)} onClose={()=>setShowQr(false)}/>}
      {/* Back button — in-flow so it scrolls with content on small screens */}
      <div className="w-full max-w-md flex shrink-0">
        <button onClick={onLeave} className="btn-j text-zinc-500 hover:text-white bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-xl text-sm font-bold">
          ← {isHost?'Cerrar':'Salir'}
        </button>
      </div>
      <div className="bg-zinc-900 border-4 border-lime-500 rounded-3xl p-7 w-full max-w-md shadow-2xl text-center anim-pop">
        {/* Code */}
        <button onClick={copyCode} className="btn-j w-full bg-zinc-950 border border-zinc-800 hover:border-lime-500 rounded-2xl p-4 mb-4 transition-colors">
          <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">{codeCopied?'✅ Copiado':'🔢 Toca para copiar código'}</p>
          <p className="text-5xl font-black text-white tracking-widest">{roomId}</p>
        </button>
        {/* QR + link buttons */}
        <div className="flex gap-2 mb-5">
          <button onClick={()=>setShowQr(true)} className="btn-j flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-bold py-2 rounded-xl text-sm flex items-center justify-center gap-1">📱 QR Alumnos</button>
          <button onClick={copyStudentLink_} className="btn-j flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-bold py-2 rounded-xl text-sm flex items-center justify-center gap-1">🔗 Link Alumnos</button>
        </div>

        {/* Host badge if MOD_ONLY */}
        {isModOnly&&(
          <div className="flex items-center gap-3 bg-lime-500/10 border border-lime-500/30 rounded-2xl p-3 mb-4">
            <span className="text-3xl">{game.hostEmoji}</span>
            <div className="text-left"><div className="text-xs text-lime-400 font-bold">MODERADOR</div><div className="font-black text-white">{game.hostName}</div></div>
            <span className="ml-auto text-xs bg-lime-500/20 text-lime-400 px-2 py-1 rounded-lg font-bold">HOST</span>
          </div>
        )}

        {/* Teams */}
        <div className="space-y-2 mb-5">
          {teams.map(t=>{
            const tPlayers=players.filter(p=>p.teamId===t.id);
            return(
              <div key={t.id} className="rounded-xl p-3 text-left" style={{background:`${t.color}18`,border:`1px solid ${t.color}44`}}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full" style={{background:t.color}}/>
                  <span className="font-black text-sm" style={{color:t.color}}>{t.name}</span>
                  <span className="text-xs text-zinc-600 ml-auto">{tPlayers.length} jugadores</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {tPlayers.map(p=>(
                    <span key={p.id} className={`inline-flex items-center gap-1 text-xs bg-zinc-800 rounded-full px-2 py-0.5 font-semibold ${p.id===localId?'ring-1 ring-white/40 text-white':'text-zinc-300'}`}>
                      {p.emoji} {p.name}
                      {isHost&&p.id!==localId&&(
                        <button onClick={()=>removePlayer(t.id,p.id,p.name)} className="btn-j text-zinc-600 hover:text-red-400 ml-0.5 leading-none text-xs">✕</button>
                      )}
                    </span>
                  ))}
                  {tPlayers.length===0&&<span className="text-xs text-zinc-700 italic">vacío...</span>}
                </div>
              </div>
            );
          })}
        </div>

        {isHost?(
          <button onClick={onStart} className="btn-j w-full bg-lime-500 hover:bg-lime-400 text-black py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_#4d7c0f] flex items-center justify-center gap-2">
            🎡 ¡Comenzar Show!
          </button>
        ):(
          <div className="bg-zinc-800/50 border border-zinc-700 rounded-2xl p-4">

          </div>
        )}

    </div>
  );

// ── CURTAIN animation ─────────────────────────────────────────
function CurtainScene({round,onDone}){
  const [stage,setStage]=useState(0); // 0=curtains, 1=round text, 2=done
  useEffect(()=>{
    const t1=setTimeout(()=>setStage(1),400);
    const t2=setTimeout(()=>setStage(2),3600);
    const t3=setTimeout(()=>onDone&&onDone(),3800);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div className="absolute inset-0 z-50 overflow-hidden" style={{background:'#09090b'}}>
      {/* Left curtain */}
      <div className={`absolute left-0 top-0 h-full w-1/2 ${stage>=1?'curtain-l':''}`}
        style={{background:'linear-gradient(to right,#7f1d1d,#991b1b)',boxShadow:'inset -20px 0 40px rgba(0,0,0,.5)'}}>
        <div className="absolute right-0 top-0 h-full w-4" style={{background:'rgba(0,0,0,.3)'}}/>
      </div>
      {/* Right curtain */}
      <div className={`absolute right-0 top-0 h-full w-1/2 ${stage>=1?'curtain-r':''}`}
        style={{background:'linear-gradient(to left,#7f1d1d,#991b1b)',boxShadow:'inset 20px 0 40px rgba(0,0,0,.5)'}}>
        <div className="absolute left-0 top-0 h-full w-4" style={{background:'rgba(0,0,0,.3)'}}/>
      </div>
      {/* Round text */}
      {stage>=1&&stage<2&&(
        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
          <div className="round-show text-center">
            <div className="text-lime-400 font-black tracking-[.3em] text-lg uppercase mb-2">¡Bienvenidos al</div>
            <div className="text-7xl font-black text-white leading-none">ROUND {round+1}</div>
            <div className="text-amber-400 text-2xl mt-3">🌶️ Holy Guacamole 🌶️</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Minigame: How Many Syllables ──────────────────────────────
function MgSyllables({game,roomId,iAmSpinner,localId}){
  const words=MOCK.syllables;
  const s=game?.mgState||{};
  const [ans,setAns]=useState([1,1,1,1,1]);
  const [tLeft,setTLeft]=useState(45);
  const locked=!!(s.locked||(s.timerEnd&&Date.now()>s.timerEnd));
  const revealed=!!s.revealed;
  const spinnerFinal=(s.playerAnswers||{})[game?.spinnerPlayerId];

  useEffect(()=>{
    if(!s.timerEnd||revealed)return;
    const iv=setInterval(()=>{
      const l=Math.max(0,Math.round((s.timerEnd-Date.now())/1000));
      setTLeft(l);
      if(l<=0){
        clearInterval(iv);
        if(iAmSpinner){
          const allCorrect=words.every((w,i)=>ans[i]===w.answer);
          updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:ans},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
        }
      }
    },200);
    return()=>clearInterval(iv);
  },[s.timerEnd,ans,revealed]);

  const submit=async()=>{
    const allCorrect=words.every((w,i)=>ans[i]===w.answer);
    await updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:ans},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
  };

  if(revealed) return(
    <div className="w-full p-4 space-y-2 max-w-sm mx-auto">
      {words.map((w,i)=>{const ok=(spinnerFinal||[])[i]===w.answer;return(
        <div key={i} className={`flex justify-between items-center rounded-xl px-4 py-2.5 border ${ok?'bg-lime-900/30 border-lime-500':'bg-red-900/30 border-red-500'}`}>
          <span className="font-bold text-white">{w.word}</span>
          <span className="font-black text-sm" style={{color:ok?'#a3e635':'#f87171'}}>{(spinnerFinal||[])[i]??'?'} / {w.answer} {ok?'✅':'❌'}</span>
        </div>);})}
    </div>
  );

  return(
    <div className="w-full p-4 space-y-3 max-w-sm mx-auto">
      <div className={`text-center text-4xl font-black ${tLeft<=10?'text-red-400 animate-pulse':'text-lime-400'}`}>{tLeft}s</div>
      {words.map((w,i)=>(
        <div key={i} className="flex items-center gap-3 bg-zinc-800 rounded-xl px-4 py-2">
          <span className="font-bold text-white flex-1">{i+1}. {w.word}</span>
          {iAmSpinner&&!locked?(
            <div className="flex items-center gap-2">
              <button onClick={()=>setAns(a=>a.map((v,j)=>j===i?Math.max(1,v-1):v))} className="btn-j w-8 h-8 bg-zinc-700 rounded-lg font-black text-white">−</button>
              <span className="w-6 text-center font-black text-white">{ans[i]}</span>
              <button onClick={()=>setAns(a=>a.map((v,j)=>j===i?Math.min(8,v+1):v))} className="btn-j w-8 h-8 bg-zinc-700 rounded-lg font-black text-white">+</button>
            </div>
          ):<span className="text-zinc-600 text-sm">{iAmSpinner&&spinnerFinal?spinnerFinal[i]+' ✓':'—'}</span>}
        </div>
      ))}
      {iAmSpinner&&!locked&&<button onClick={submit} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl">✅ Confirmar respuestas</button>}
      {iAmSpinner&&locked&&<div className="text-center text-zinc-400 font-bold text-sm">Enviando...</div>}
    </div>
  );
}

// ── Minigame: This or That ────────────────────────────────────
function MgThisOrThat({game,roomId,iAmSpinner,localId}){
  const items=MOCK.this_or_that;
  const s=game?.mgState||{};
  const [sel,setSel]=useState(items.map(()=>null));
  const [tLeft,setTLeft]=useState(45);
  const locked=!!(s.locked||(s.timerEnd&&Date.now()>s.timerEnd));
  const revealed=!!s.revealed;
  const spinnerFinal=(s.playerAnswers||{})[game?.spinnerPlayerId];
  // Live selections — written by spinner to Firestore so observers see in real-time
  const liveAns=s.liveAnswers||[];

  useEffect(()=>{
    if(!s.timerEnd||revealed)return;
    const iv=setInterval(()=>{
      const l=Math.max(0,Math.round((s.timerEnd-Date.now())/1000));
      setTLeft(l);
      if(l<=0){
        clearInterval(iv);
        if(iAmSpinner){
          const allCorrect=items.every((item,i)=>sel[i]===item.answer);
          updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:sel},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
        }
      }
    },200);
    return()=>clearInterval(iv);
  },[s.timerEnd,sel,revealed]);

  const submit=async()=>{
    const allCorrect=items.every((item,i)=>sel[i]===item.answer);
    await updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:sel},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
  };

  if(revealed) return(
    <div className="w-full p-4 space-y-2 max-w-sm mx-auto">
      {items.map((item,i)=>{const chose=(spinnerFinal||[])[i];const ok=chose===item.answer;return(
        <div key={i} className={`rounded-xl px-4 py-2.5 border ${ok?'bg-lime-900/30 border-lime-500':'bg-red-900/30 border-red-500'}`}>
          <p className="text-white text-sm font-bold mb-1">{item.sentence.replace('_',`【${chose||'?'}】`)}</p>
          <p className="text-xs font-bold" style={{color:ok?'#a3e635':'#f87171'}}>{ok?'✅ Correcto':'❌ Era: '+item.answer}</p>
        </div>);})}
    </div>
  );

  return(
    <div className="w-full p-4 space-y-2 max-w-sm mx-auto">
      <div className={`text-center text-4xl font-black ${tLeft<=10?'text-red-400 animate-pulse':'text-lime-400'}`}>{tLeft}s</div>
      {items.map((item,i)=>(
        <div key={i} className="bg-zinc-800 rounded-xl px-4 py-2.5">
          <p className="text-white text-sm font-bold mb-2">{item.sentence.replace('_','  ____  ')}</p>
          {iAmSpinner&&!locked?(
            <div className="flex gap-2">
              {[item.a,item.b].map(opt=>(
                <button key={opt} onClick={()=>{
                    const newSel=sel.map((v,j)=>j===i?opt:v);
                    setSel(newSel);
                    updateDoc(rRef(roomId),{'mgState.liveAnswers':newSel});
                  }}
                  className={`btn-j flex-1 py-2 rounded-xl font-black text-sm ${sel[i]===opt?'bg-amber-500 text-black':'bg-zinc-700 text-zinc-300'}`}>{opt}</button>
              ))}
            </div>
          ):(
            <div className="flex gap-2">
              {[item.a,item.b].map(opt=>{
                // Observers: liveAns from Firestore; locked spinner: their submitted answer
                const highlight=(liveAns[i]===opt)||(iAmSpinner&&(spinnerFinal||[])[i]===opt);
                return(<div key={opt} className={`flex-1 py-2 rounded-xl font-black text-sm text-center transition-all ${highlight?'bg-amber-500/40 text-amber-300 ring-1 ring-amber-500/60':'bg-zinc-700/40 text-zinc-500'}`}>{opt}</div>);
              })}
            </div>
          )}
        </div>
      ))}
      {iAmSpinner&&!locked&&<button onClick={submit} disabled={sel.some(v=>v===null)} className="btn-j w-full bg-amber-500 disabled:bg-zinc-700 disabled:text-zinc-500 text-black font-black py-3 rounded-xl">✅ Confirmar respuestas</button>}
      {iAmSpinner&&locked&&<div className="text-center text-zinc-400 font-bold text-sm">Enviando...</div>}
      {!iAmSpinner&&!revealed&&(
        <div className="text-center text-xs font-bold py-1" style={{color:liveAns.some(v=>v!=null)?'#fbbf24':'#52525b'}}>
          {liveAns.some(v=>v!=null)?'🔴 En vivo — eligiendo...':'Esperando que empiece...'}
        </div>
      )}
    </div>
  );
}

// ── Minigame: Aguda / Grave / Esdrújula ──────────────────────
function MgAcentos({game,roomId,iAmSpinner}){
  const s=game?.mgState||{};
  const cards=s.cards||[];
  const flipped=s.flipped??null;
  const answers=s.answers||{};
  const results=s.results||{};
  const errors=s.errors||0;
  const correct=s.correct||0;
  const cardTimer=s.cardTimer||null;
  const liveSel=s.liveSel||null;
  const done=!!s.result;
  const isOpen=flipped!==null;

  const [localSel,setLocalSel]=useState(null);
  const [tLeft,setTLeft]=useState(10);
  const localSelRef=useRef(null);

  // Reset selection when card changes
  useEffect(()=>{setLocalSel(null);localSelRef.current=null;setTLeft(10);},[flipped]);

  // Countdown per card
  useEffect(()=>{
    if(!isOpen||!cardTimer||done)return;
    const iv=setInterval(()=>{
      const l=Math.max(0,Math.round((cardTimer-Date.now())/1000));
      setTLeft(l);
      if(l<=0){clearInterval(iv);if(iAmSpinner)doSubmit(localSelRef.current);}
    },200);
    return()=>clearInterval(iv);
  },[isOpen,cardTimer,done]);

  const flipCard=async(idx)=>{
    if(!iAmSpinner||isOpen||answers[idx]!==undefined||done)return;
    await updateDoc(rRef(roomId),{'mgState.flipped':idx,'mgState.cardTimer':Date.now()+10000,'mgState.liveSel':null});
  };

  const selectOption=async(opt)=>{
    if(!isOpen||!iAmSpinner)return;
    setLocalSel(opt);localSelRef.current=opt;
    updateDoc(rRef(roomId),{'mgState.liveSel':opt});
  };

  const doSubmit=async(sel)=>{
    if(flipped===null)return;
    const card=cards[flipped];
    const isRight=sel===card?.type;
    const newAnswers={...answers,[flipped]:sel??'none'};
    const newResults={...results,[flipped]:isRight};
    const newErrors=errors+(isRight?0:1);
    const newCorrect=correct+(isRight?1:0);
    let result=null;
    if(newCorrect>=6)result='win';
    else if(newErrors>=3)result='strike';
    await updateDoc(rRef(roomId),{
      'mgState.answers':newAnswers,'mgState.results':newResults,
      'mgState.errors':newErrors,'mgState.correct':newCorrect,
      'mgState.flipped':null,'mgState.cardTimer':null,'mgState.liveSel':null,
      ...(result?{'mgState.result':result}:{})
    });
  };

  const OPTS=['aguda','grave','esdrujula'];
  const OPT_LABELS={aguda:'Aguda',grave:'Grave',esdrujula:'Esdrújula'};
  const OPT_COLORS={aguda:'#ef4444',grave:'#22c55e',esdrujula:'#8b5cf6'};
  const currentSel=iAmSpinner?localSel:liveSel;

  return(
    <div className="w-full p-3 flex flex-col gap-2.5 max-w-sm mx-auto">
      {/* Score bar */}
      <div className="flex items-center justify-between px-1">
        <div className="flex items-center gap-1.5">
          <span className="text-xs text-zinc-500 font-bold">Aciertos</span>
          <div className="flex gap-1">{Array.from({length:6},(_,i)=>(
            <div key={i} className={`w-3 h-3 rounded-full ${i<correct?'bg-lime-500':'bg-zinc-700'}`}/>
          ))}</div>
        </div>
        <div className="flex items-center gap-1.5">
          <span className="text-xs text-zinc-500 font-bold">Errores</span>
          <div className="flex gap-1">{[0,1,2].map(i=>(
            <div key={i} className={`w-3 h-3 rounded-full ${i<errors?'bg-red-500':'bg-zinc-700'}`}/>
          ))}</div>
        </div>
      </div>

      {/* 3×3 card grid */}
      <div className="grid grid-cols-3 gap-2">
        {cards.map((card,idx)=>{
          const isFlippedCard=idx===flipped;
          const isDone=answers[idx]!==undefined;
          const wasCorrect=results[idx];
          const canFlip=iAmSpinner&&!isDone&&!isOpen&&!done;
          return(
            <button key={idx} onClick={()=>flipCard(idx)} disabled={!canFlip&&!isDone}
              className={`btn-j aspect-[4/3] rounded-xl flex flex-col items-center justify-center transition-all border-2 select-none
                ${isDone?(wasCorrect?'bg-lime-900/40 border-lime-600':'bg-red-900/40 border-red-600')
                  :isFlippedCard?'bg-amber-500/20 border-amber-400 ring-2 ring-amber-400/40'
                  :canFlip?'bg-zinc-800 border-zinc-700 hover:border-amber-500/50 active:scale-95'
                  :'bg-zinc-900 border-zinc-800'}`}>
              {isDone?(
                <>
                  <span className="text-xs leading-tight text-center px-1 font-black" style={{color:wasCorrect?'#a3e635':'#f87171'}}>{card.word}</span>
                  <span className="text-sm mt-0.5">{wasCorrect?'✅':'❌'}</span>
                </>
              ):isFlippedCard?(
                <span className="text-sm font-black text-white text-center px-1 leading-tight">{card.word}</span>
              ):(
                <span className="text-2xl">{canFlip?'🎴':'🔒'}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Option panel — when a card is open */}
      {isOpen&&!done&&(
        <div className="space-y-2 anim-up">
          <div className={`text-center text-3xl font-black leading-none ${tLeft<=3?'text-red-400 animate-pulse':'text-amber-400'}`}>{tLeft}s</div>
          <div className="grid grid-cols-3 gap-1.5">
            {OPTS.map(opt=>{
              const isSel=currentSel===opt;
              return(
                <button key={opt} onClick={()=>iAmSpinner&&selectOption(opt)}
                  className={`btn-j py-3 rounded-xl font-black text-xs transition-all border-2 ${isSel?'text-white ring-1':iAmSpinner?'bg-zinc-800 border-zinc-700 text-zinc-300 hover:border-zinc-500':'bg-zinc-800/50 border-zinc-800 text-zinc-600 cursor-default'}`}
                  style={isSel?{background:`${OPT_COLORS[opt]}33`,borderColor:OPT_COLORS[opt],boxShadow:`0 0 14px ${OPT_COLORS[opt]}44`}:{}}>
                  {OPT_LABELS[opt]}
                </button>
              );
            })}
          </div>
          {iAmSpinner?(
            <button onClick={()=>doSubmit(localSel)}
              className={`btn-j w-full py-2.5 rounded-xl font-black text-sm ${localSel?'bg-amber-500 hover:bg-amber-400 text-black shadow-[0_4px_0_#92400e]':'bg-zinc-700 text-zinc-500'}`}>
              {localSel?`✅ Es ${OPT_LABELS[localSel]}`:'⚠️ Selecciona primero'}
            </button>
          ):(
            <div className="text-center text-xs font-bold py-0.5 animate-pulse" style={{color:currentSel?'#fbbf24':'#52525b'}}>
              {currentSel?`🔴 Seleccionó: ${OPT_LABELS[currentSel]}`:'Eligiendo...'}
            </div>
          )}
        </div>
      )}

      {/* Prompt — waiting for card */}
      {!isOpen&&!done&&(
        <div className="text-center text-xs font-bold py-1" style={{color:iAmSpinner?'#a3e635':'#52525b'}}>
          {iAmSpinner?`Toca una carta · ${9-Object.keys(answers).length} restantes`:'Esperando que el jugador abra una carta...'}
        </div>
      )}
    </div>
  );
}

// ── Minigame: Group Anagram (3 rounds × 1 word per player) ───
// ── El Taquero Sordo ──────────────────────────────────────────
function MgTaquero({game,roomId,localId,iAmSpinner,players,teams,isHost}){
  const s=game?.mgState||{};
  const taqSub=s.taqSubPhase||'PICK_PARTNER';
  const orderA=s.orderA||[];  // current order for spinner's team
  const orderB=s.orderB||[];  // current order for rival team
  const scoreA=s.scoreA||0;   // complete orders for team A
  const scoreB=s.scoreB||0;   // complete orders for team B
  const idxA=s.idxA||0;       // progress within current orderA
  const idxB=s.idxB||0;       // progress within current orderB
  const taqPartnerA=s.taqPartnerA??null;
  const taqRivalTeam=s.taqRivalTeam??null;
  const taqRivalRep=s.taqRivalRep??null;       // rival whisperer (📱 reads)
  const taqRivalListener=s.taqRivalListener??null; // rival listener (🎧 guesses)
  const timerEnd=s.timerEnd||null;
  const result=s.result||null;

  const spinnerPlayer=players.find(p=>p.id===game?.spinnerPlayerId);
  const spinnerTeam=spinnerPlayer?teams.find(t=>t.id===spinnerPlayer.teamId):null;
  const me=players.find(p=>p.id===localId);
  const myTeam=me?teams.find(t=>t.id===me.teamId):null;
  const partnerPlayer=players.find(p=>p.id===taqPartnerA);
  const rivalTeamObj=teams.find(t=>t.id===taqRivalTeam);
  const rivalRepPlayer=players.find(p=>p.id===taqRivalRep);
  const rivalListenerPlayer=players.find(p=>p.id===taqRivalListener);
  const iAmWhispererA=localId===taqPartnerA;
  const iAmWhispererB=localId===taqRivalRep;
  const tc=game?.teamCount||2;

  const [timerLeft,setTimerLeft]=useState(null);
  useEffect(()=>{
    if(!timerEnd){setTimerLeft(null);return;}
    const update=()=>setTimerLeft(Math.max(0,Math.ceil((timerEnd-Date.now())/1000)));
    update();
    const iv=setInterval(update,500);
    return()=>clearInterval(iv);
  },[timerEnd]);

  // Mark one item correct — if order complete, auto-advance to next order
  const markCorrect=async(team)=>{
    if(team==='A'){
      const newIdx=idxA+1;
      if(newIdx>=orderA.length){
        // Order complete → +1, fresh order, reset progress
        await updateDoc(rRef(roomId),{'mgState.scoreA':scoreA+1,'mgState.idxA':0,'mgState.orderA':generateTaqOrder()});
      } else {
        await updateDoc(rRef(roomId),{'mgState.idxA':newIdx});
      }
    } else {
      const newIdx=idxB+1;
      if(newIdx>=orderB.length){
        await updateDoc(rRef(roomId),{'mgState.scoreB':scoreB+1,'mgState.idxB':0,'mgState.orderB':generateTaqOrder()});
      } else {
        await updateDoc(rRef(roomId),{'mgState.idxB':newIdx});
      }
    }
  };
  const finishGame=async()=>{
    const res=scoreA>scoreB?'win':'strike'; // tie benefits rival → strike
    await updateDoc(rRef(roomId),{'mgState.result':res,'mgState.taqSubPhase':'DONE'});
  };
  // Step 1 of rival selection: first to volunteer = reader (📱 has phone, sees items)
  const volunteerAsRival=async()=>{
    await runTransaction(db,async txn=>{
      const snap=await txn.get(rRef(roomId));
      const d=snap.data();
      if((d.mgState||{}).taqRivalRep)return; // already taken
      txn.update(rRef(roomId),{'mgState.taqRivalRep':localId});
    });
  };
  // Step 2 of rival selection: first remaining to volunteer = listener (🎧 has headphones)
  const volunteerAsListener=async()=>{
    await runTransaction(db,async txn=>{
      const snap=await txn.get(rRef(roomId));
      const d=snap.data();
      const st=d.mgState||{};
      if(!st.taqRivalRep)return;           // reader must be set first
      if(localId===st.taqRivalRep)return;  // reader can't also be listener
      if(st.taqRivalListener)return;       // already taken
      txn.update(rRef(roomId),{'mgState.taqRivalListener':localId,'mgState.taqSubPhase':'READY'});
    });
  };

  // ── Result screen ──────────────────────────────────────────────
  if(result){
    return(
      <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto text-center anim-pop">
        <div className="text-5xl">{result==='win'?'🏆':'💀'}</div>
        <div className="font-black text-lg text-white leading-tight">
          {result==='win'
            ?<><span style={{color:spinnerTeam?.color}}>{spinnerTeam?.name}</span> ganó el reto!</>
            :scoreA===scoreB
              ?<>Empate — punto a <span style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</span>. Strike ❌</>
              :<><span style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</span> ganó. Strike ❌</>}
        </div>
        <div className="flex gap-4 justify-center">
          <div className="text-center">
            <div className="text-3xl font-black" style={{color:spinnerTeam?.color}}>{scoreA}</div>
            <div className="text-xs text-zinc-500">{spinnerTeam?.name}</div>
            <div className="text-xs text-zinc-600">orden{scoreA!==1?'es':''}</div>
          </div>
          <div className="text-zinc-600 font-black self-center text-lg">vs</div>
          <div className="text-center">
            <div className="text-3xl font-black" style={{color:rivalTeamObj?.color}}>{scoreB}</div>
            <div className="text-xs text-zinc-500">{rivalTeamObj?.name}</div>
            <div className="text-xs text-zinc-600">orden{scoreB!==1?'es':''}</div>
          </div>
        </div>
      </div>
    );
  }

  // ── PICK_PARTNER ───────────────────────────────────────────────
  if(taqSub==='PICK_PARTNER'){
    const teammates=players.filter(p=>p.teamId===spinnerPlayer?.teamId&&p.id!==game?.spinnerPlayerId);
    return(
      <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto">
        <div className="text-center font-black text-xl text-white">🌮 El Taquero Sordo</div>
        {iAmSpinner?(
          <>
            <div className="text-zinc-400 text-sm text-center">¿Con quién quieres jugar?</div>
            {teammates.length===0&&<div className="text-zinc-600 text-xs text-center">No hay más compañeros de equipo.</div>}
            {teammates.map(p=>(
              <button key={p.id} onClick={()=>updateDoc(rRef(roomId),{'mgState.taqPartnerA':p.id,'mgState.taqSubPhase':'PICK_RIVAL_TEAM'})}
                className="btn-j w-full flex items-center gap-3 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-zinc-500 rounded-2xl px-4 py-3 text-left">
                <span className="text-2xl">{p.emoji}</span>
                <span className="font-black text-white text-base">{p.name}</span>
              </button>
            ))}
          </>
        ):(
          <div className="text-zinc-500 text-sm text-center animate-pulse py-2">
            <span className="text-white font-bold">{spinnerPlayer?.emoji} {spinnerPlayer?.name}</span> está eligiendo pareja...
          </div>
        )}
      </div>
    );
  }

  // ── PICK_RIVAL_TEAM ────────────────────────────────────────────
  if(taqSub==='PICK_RIVAL_TEAM'){
    const rivalTeams=TEAM_CATALOG.slice(0,tc).filter(t=>t.id!==spinnerPlayer?.teamId);
    return(
      <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto">
        <div className="text-center font-black text-xl text-white">🌮 El Taquero Sordo</div>
        <div className="text-xs text-zinc-500 text-center">Con: {partnerPlayer?.emoji} <span className="text-white">{partnerPlayer?.name}</span></div>
        {iAmSpinner?(
          <>
            <div className="text-zinc-400 text-sm text-center">¿A qué equipo retas?</div>
            {rivalTeams.map(t=>(
              <button key={t.id} onClick={()=>updateDoc(rRef(roomId),{'mgState.taqRivalTeam':t.id,'mgState.taqSubPhase':'RIVAL_VOLUNTEER'})}
                className="btn-j w-full flex items-center justify-center gap-2 rounded-2xl px-4 py-3 font-black text-white text-base"
                style={{background:`${t.color}25`,border:`2px solid ${t.color}`}}>
                <span style={{color:t.color}}>{t.name}</span>
              </button>
            ))}
          </>
        ):(
          <div className="text-zinc-500 text-sm text-center animate-pulse py-2">
            <span className="text-white font-bold">{spinnerPlayer?.emoji} {spinnerPlayer?.name}</span> está eligiendo rival...
          </div>
        )}
      </div>
    );
  }

  // ── RIVAL_VOLUNTEER ────────────────────────────────────────────
  if(taqSub==='RIVAL_VOLUNTEER'){
    const isRivalPlayer=me?.teamId===taqRivalTeam;
    const iAmReader=localId===taqRivalRep;
    const canBeListener=isRivalPlayer&&taqRivalRep&&!taqRivalListener&&localId!==taqRivalRep;
    const bothSelected=!!taqRivalRep&&!!taqRivalListener;
    return(
      <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto">
        <div className="text-center font-black text-xl text-white">🌮 El Taquero Sordo</div>
        <div className="text-sm text-zinc-400 text-center">
          Reto a <span className="font-black" style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</span>
        </div>

        {/* Step 1: volunteer as reader */}
        <div className="rounded-xl p-3 space-y-2" style={{background:taqRivalRep?'#15301510':'#18181b',border:`1px solid ${taqRivalRep?'#22c55e44':'#3f3f46'}`}}>
          <div className="text-xs text-zinc-500 uppercase tracking-widest">Paso 1 — 📱 El que lee</div>
          {!taqRivalRep?(
            <>
              {isRivalPlayer&&(
                <button onClick={volunteerAsRival}
                  className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3.5 rounded-2xl text-lg shadow-[0_4px_0_#92400e] anim-pop">
                  🙋 Yo leo
                </button>
              )}
              {!isRivalPlayer&&(
                <div className="text-zinc-600 text-xs text-center animate-pulse py-1">
                  Esperando a <span style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</span>...
                </div>
              )}
            </>
          ):(
            <div className="flex items-center gap-2 bg-lime-500/10 border border-lime-500/30 rounded-xl px-3 py-2 anim-pop">
              <span className="text-xl">{rivalRepPlayer?.emoji}</span>
              <span className="font-black text-white text-sm">{rivalRepPlayer?.name}</span>
              <span className="text-xs text-lime-400 ml-auto">📱 lector ✅</span>
            </div>
          )}
        </div>

        {/* Step 2: volunteer as listener (only after reader is set) */}
        <div className="rounded-xl p-3 space-y-2" style={{background:taqRivalListener?'#15301510':'#18181b',border:`1px solid ${taqRivalListener?'#22c55e44':taqRivalRep?'#f59e0b55':'#3f3f46'}`}}>
          <div className={`text-xs uppercase tracking-widest ${taqRivalRep?'text-amber-400':'text-zinc-700'}`}>Paso 2 — 🎧 El que adivina</div>
          {!taqRivalRep&&(
            <div className="text-zinc-700 text-xs text-center py-1">Primero elige quien lee...</div>
          )}
          {taqRivalRep&&!taqRivalListener&&(
            <>
              {canBeListener&&(
                <button onClick={volunteerAsListener}
                  className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3.5 rounded-2xl text-lg shadow-[0_4px_0_#92400e] anim-pop">
                  🙋 Yo adivino
                </button>
              )}
              {iAmReader&&(
                <div className="text-zinc-600 text-xs text-center py-1">Tú ya eres el lector — otro compañero elige</div>
              )}
              {!isRivalPlayer&&(
                <div className="text-zinc-600 text-xs text-center animate-pulse py-1">
                  Esperando a <span style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</span>...
                </div>
              )}
            </>
          )}
          {taqRivalListener&&(
            <div className="flex items-center gap-2 bg-lime-500/10 border border-lime-500/30 rounded-xl px-3 py-2 anim-pop">
              <span className="text-xl">{rivalListenerPlayer?.emoji}</span>
              <span className="font-black text-white text-sm">{rivalListenerPlayer?.name}</span>
              <span className="text-xs text-lime-400 ml-auto">🎧 oyente ✅</span>
            </div>
          )}
        </div>

        {/* Both selected — advancing automatically */}
        {bothSelected&&(
          <div className="text-lime-400 text-sm font-bold text-center anim-pop animate-pulse">
            ✅ ¡Listos! Pasando a preparación...
          </div>
        )}

        {/* Host override — can force-advance if needed */}
        {isHost&&bothSelected&&(
          <button onClick={()=>updateDoc(rRef(roomId),{'mgState.taqSubPhase':'READY'})}
            className="btn-j w-full bg-zinc-700 hover:bg-zinc-600 text-zinc-300 font-bold py-2 rounded-xl text-xs">
            ↗ Avanzar manualmente
          </button>
        )}
      </div>
    );
  }

  // ── READY ──────────────────────────────────────────────────────
  if(taqSub==='READY'){
    return(
      <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto">
        <div className="text-center font-black text-2xl text-white">🌮 El Taquero Sordo</div>
        <div className="text-zinc-500 text-xs text-center uppercase tracking-widest">¡Prepárense!</div>
        {/* Team A */}
        <div className="rounded-2xl p-3" style={{background:`${spinnerTeam?.color}18`,border:`2px solid ${spinnerTeam?.color}`}}>
          <div className="text-xs font-black text-center mb-2.5" style={{color:spinnerTeam?.color}}>{spinnerTeam?.name}</div>
          <div className="flex justify-around items-center gap-2">
            <div className="text-center flex-1">
              <div className="text-2xl">{partnerPlayer?.emoji}</div>
              <div className="text-xs font-bold text-white mt-0.5 truncate">{partnerPlayer?.name}</div>
              <div className="text-xs text-amber-400 font-bold mt-0.5">📱 Lee</div>
            </div>
            <div className="text-zinc-600 font-black text-lg shrink-0">↔️</div>
            <div className="text-center flex-1">
              <div className="text-2xl">{spinnerPlayer?.emoji}</div>
              <div className="text-xs font-bold text-white mt-0.5 truncate">{spinnerPlayer?.name}</div>
              <div className="text-xs text-zinc-400 font-bold mt-0.5">🎧 Adivina</div>
            </div>
          </div>
        </div>
        <div className="text-center text-zinc-600 font-black text-sm">VS</div>
        {/* Team B */}
        <div className="rounded-2xl p-3" style={{background:`${rivalTeamObj?.color}18`,border:`2px solid ${rivalTeamObj?.color}`}}>
          <div className="text-xs font-black text-center mb-2.5" style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</div>
          <div className="flex justify-around items-center gap-2">
            <div className="text-center flex-1">
              <div className="text-2xl">{rivalRepPlayer?.emoji}</div>
              <div className="text-xs font-bold text-white mt-0.5 truncate">{rivalRepPlayer?.name}</div>
              <div className="text-xs text-amber-400 font-bold mt-0.5">📱 Lee</div>
            </div>
            <div className="text-zinc-600 font-black text-lg shrink-0">↔️</div>
            <div className="text-center flex-1">
              <div className="text-2xl">{rivalListenerPlayer?.emoji||'❓'}</div>
              <div className="text-xs font-bold text-white mt-0.5 truncate">{rivalListenerPlayer?.name||'siguiente'}</div>
              <div className="text-xs text-zinc-400 font-bold mt-0.5">🎧 Adivina</div>
            </div>
          </div>
        </div>
        <div className="text-center text-zinc-600 text-xs">{totalItems} ítems · 2 minutos</div>
        {(isHost||iAmSpinner)&&(
          <button onClick={()=>updateDoc(rRef(roomId),{'mgState.taqSubPhase':'PLAYING','mgState.timerEnd':Date.now()+122000})}
            className="btn-j w-full bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-2xl text-base shadow-[0_5px_0_#166534]">
            ¡A jugar! 🌮
          </button>
        )}
        {!isHost&&!iAmSpinner&&(
          <div className="text-zinc-500 text-xs text-center animate-pulse">Esperando al girador...</div>
        )}
      </div>
    );
  }

  // ── PLAYING ────────────────────────────────────────────────────
  return(
    <div className="flex flex-col gap-2 p-3 w-full max-w-sm mx-auto">
      {/* Header + timer */}
      <div className="flex items-center justify-between shrink-0">
        <div className="text-xs text-zinc-500 font-bold uppercase tracking-widest">🌮 El Taquero</div>
        {timerLeft!=null&&(
          <div className={`text-xl font-black tabular-nums ${timerLeft<=10?'text-red-400 animate-pulse':timerLeft<=30?'text-amber-400':'text-white'}`}>
            ⏱ {timerLeft}s
          </div>
        )}
      </div>
      {/* Scoreboard — complete ORDERS per team */}
      <div className="grid grid-cols-2 gap-2 shrink-0">
        <div className="rounded-xl p-2 text-center" style={{background:`${spinnerTeam?.color}18`,border:`1.5px solid ${spinnerTeam?.color}55`}}>
          <div className="text-xs font-black truncate" style={{color:spinnerTeam?.color}}>{spinnerTeam?.name}</div>
          <div className="text-2xl font-black text-white leading-none mt-0.5">{scoreA}</div>
          <div className="text-xs text-zinc-500">{idxA}/{orderA.length} en curso</div>
        </div>
        <div className="rounded-xl p-2 text-center" style={{background:`${rivalTeamObj?.color}18`,border:`1.5px solid ${rivalTeamObj?.color}55`}}>
          <div className="text-xs font-black truncate" style={{color:rivalTeamObj?.color}}>{rivalTeamObj?.name}</div>

function MgAnagram({game,roomId,localId,players,teams}){
  const s=game?.mgState||{};
  const assignments=s.assignments||{};
  const playerDone=s.playerDone||{};
  const teamRound=s.teamRound||{};
  const winner=s.winner??null;
  const tc=game?.teamCount||2;

  const me=players.find(p=>p.id===localId);
  const myTeamId=me?.teamId;
  const myAssignment=assignments[localId]; // array of 3 word objects
  const currentRound=teamRound[myTeamId]??0;
  const myWordData=myAssignment?.[currentRound];
  const myRoundDone=(playerDone[localId]||[false,false,false])[currentRound];

  const [placed,setPlaced]=useState([]);
  const [available,setAvailable]=useState([]);
  const [shake,setShake]=useState(false);
  const [localDone,setLocalDone]=useState(false);
  const [initRound,setInitRound]=useState(-1);

  // Re-init puzzle when team advances to a new round
  useEffect(()=>{
    if(!myWordData||myRoundDone||initRound===currentRound)return;
    setInitRound(currentRound);
    setLocalDone(false);
    setAvailable(myWordData.scrambled.map((c,i)=>({id:`r${currentRound}a${i}`,char:c})));
    setPlaced(Array(myWordData.wordEs.length).fill(null));
  },[currentRound,myWordData,myRoundDone]);

  const addLetter=(idx)=>{
    const firstEmpty=placed.findIndex(sl=>sl===null);
    if(firstEmpty===-1)return;
    const letter=available[idx];
    setPlaced(prev=>{const n=[...prev];n[firstEmpty]=letter;return n;});
    setAvailable(prev=>prev.filter((_,i)=>i!==idx));
  };

  const removeLetter=(idx)=>{
    const letter=placed[idx];
    if(!letter)return;
    setPlaced(prev=>{const n=[...prev];n[idx]=null;return n;});
    setAvailable(prev=>[...prev,letter]);
  };

  const checkAnswer=async()=>{
    const guess=placed.map(l=>l?.char||'').join('');
    const target=myWordData.wordEs.toUpperCase();
    if(guess!==target){
      setShake(true);
      setTimeout(()=>setShake(false),500);
      setTimeout(()=>{
        setAvailable(myWordData.scrambled.map((c,i)=>({id:`r${currentRound}a${i}x${Date.now()}`,char:c})));
        setPlaced(Array(myWordData.wordEs.length).fill(null));
      },600);
      return;
    }
    setLocalDone(true);
    await runTransaction(db,async txn=>{
      const snap=await txn.get(rRef(roomId));
      const d=snap.data();
      const st=d.mgState||{};
      const cr=st.teamRound?.[myTeamId]||0;
      const newPD={...(st.playerDone||{})};
      const myFlags=[...(newPD[localId]||[false,false,false])];
      myFlags[cr]=true;
      newPD[localId]=myFlags;
      const myTeamPlayers=(d.players||[]).filter(p=>p.teamId===myTeamId);
      const allDoneThisRound=myTeamPlayers.every(p=>{
        const flags=[...(newPD[p.id]||[false,false,false])];
        return flags[cr]===true;
      });
      const newSt={...st,playerDone:newPD};
      if(allDoneThisRound){
        const newTeamRound={...(st.teamRound||{}),[myTeamId]:cr+1};
        newSt.teamRound=newTeamRound;
        if(cr+1>=3){
          // Team finished all 3 rounds!
          newSt.teamDone={...(st.teamDone||{}),[myTeamId]:Date.now()};
          if(st.winner==null){
            newSt.winner=myTeamId;
            newSt.result=myTeamId===d.winnerTeamId?'win':'strike';
          }
        }
      }
      txn.update(rRef(roomId),{mgState:newSt});
    });
  };

  // Progress board — per team: current round + per-player round completion
  const progressBoard=(
    <div className="w-full space-y-2 px-1">
      {winner!=null&&(
        <div className="text-center font-black text-sm py-1 anim-pop" style={{color:teams.find(t=>t.id===winner)?.color||'#a3e635'}}>
          🏆 ¡{teams.find(t=>t.id===winner)?.name} terminó primero!
        </div>
      )}
      <div className={`grid gap-2 ${tc<=2?'grid-cols-2':'grid-cols-2'}`}>
        {teams.slice(0,tc).map(t=>{
          const tPs=players.filter(p=>p.teamId===t.id);
          const tRound=teamRound[t.id]??0;
          const tDone=tRound>=3;
          const isWinner=t.id===winner;
          return(
            <div key={t.id} className="rounded-xl p-2 transition-all"
              style={{background:`${t.color}15`,border:`1.5px solid ${isWinner?t.color:t.color+'33'}`}}>
              <div className="flex items-center justify-between mb-1.5">
                <div className="text-xs font-black" style={{color:t.color}}>{t.name}</div>
                <div className="text-xs font-black" style={{color:tDone?'#a3e635':t.color+'aa'}}>
                  {tDone?'✅ Done':`R${Math.min(tRound+1,3)}/3`}
                </div>
              </div>
              <div className="space-y-1">
                {tPs.map(p=>{
                  const flags=playerDone[p.id]||[false,false,false];
                  const thisRoundDone=flags[tRound]||(p.id===localId&&localDone&&tRound===currentRound);
                  return(
                    <div key={p.id} className="flex items-center gap-1 rounded-lg px-1.5 py-1 transition-all"
                      style={{background:thisRoundDone?`${t.color}25`:'#1c1c1e'}}>
                      <div className="flex gap-0.5 shrink-0">
                        {[0,1,2].map(r=>(
                          <div key={r} className={`w-1.5 h-1.5 rounded-full ${flags[r]?'bg-lime-400':r<tRound?'bg-zinc-600':'bg-zinc-700'}`}/>
                        ))}
                      </div>
                      <span className="text-xs">{p.emoji}</span>
                      <span className="text-xs font-bold truncate flex-1" style={{color:thisRoundDone?'#fff':'#71717a'}}>{p.name}</span>
                      {thisRoundDone&&<span className="text-xs">✅</span>}
                    </div>
                  );
                })}
              </div>
              {s.teamDone?.[t.id]&&<div className="text-xs text-center mt-1.5 font-black" style={{color:isWinner?t.color:'#71717a'}}>{isWinner?'🥇 1°':'✓'}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );

  // Host / observer or no assignment
  if(!myAssignment) return(
    <div className="flex flex-col items-center gap-3 p-4 w-full">
      <div className="text-xs font-black text-zinc-400 uppercase tracking-widest">📊 Progreso en tiempo real</div>
      {progressBoard}
    </div>
  );

  // Waiting for team to finish current round (I'm done, others aren't)
  if(myRoundDone||localDone) return(
    <div className="flex flex-col items-center gap-3 p-4 w-full">
      <div className="bg-lime-900/40 border border-lime-600 rounded-2xl px-5 py-3 text-center anim-pop">
        <div className="text-3xl mb-1">{myWordData?.emoji}</div>
        <div className="text-lime-400 font-black text-2xl">{myWordData?.wordEs}</div>
        <div className="text-zinc-400 text-xs mt-0.5">{myWordData?.wordEn}</div>
      </div>
      {currentRound<3&&<div className="text-xs font-bold text-amber-400 animate-pulse">⏳ Esperando a tu equipo... Ronda {currentRound+1}/3</div>}
      {progressBoard}
    </div>
  );

  // Playing puzzle
  const allPlaced=placed.every(l=>l!==null);
  return(
    <div className="flex flex-col items-center gap-3 p-4 w-full max-w-sm mx-auto">
      {/* Round indicator */}
      <div className="flex gap-1.5 items-center">
        {[0,1,2].map(r=>(
          <div key={r} className={`h-1.5 rounded-full transition-all ${r<currentRound?'w-6 bg-lime-500':r===currentRound?'w-8 bg-amber-400':'w-6 bg-zinc-700'}`}/>
        ))}
        <span className="text-xs text-zinc-500 ml-1">Ronda {currentRound+1}/3</span>
      </div>
      {/* Clue */}
      <div className="text-center">
        <div className="text-4xl mb-1">{myWordData?.emoji}</div>
        <div className="text-white font-black text-xl">{myWordData?.wordEn}</div>
        <div className="text-zinc-500 text-xs">Forma la palabra en español</div>
      </div>
      {/* Input slots */}
      <div className={`flex gap-2 justify-center flex-wrap ${shake?'anim-shake':''}`}>
        {placed.map((l,i)=>(
          <button key={i} onClick={()=>removeLetter(i)}
            className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-base border-2 transition-all ${l?'bg-amber-500 border-amber-400 text-black hover:bg-amber-400':'bg-zinc-800 border-zinc-700 border-dashed text-zinc-600'}`}>
            {l?.char||''}
          </button>
        ))}
      </div>
      {/* Available letters */}
      <div className="flex gap-2 flex-wrap justify-center min-h-[44px]">
        {available.map((l,i)=>(
          <button key={l.id} onClick={()=>addLetter(i)}
            className="btn-j w-10 h-10 rounded-xl bg-zinc-700 hover:bg-zinc-600 border border-zinc-600 text-white font-black text-sm flex items-center justify-center">
            {l.char}
          </button>
        ))}
      </div>
      {/* Verify */}
      <button onClick={checkAnswer} disabled={!allPlaced}
        className={`btn-j w-full py-3 rounded-xl font-black text-sm ${allPlaced?'bg-amber-500 hover:bg-amber-400 text-black shadow-[0_4px_0_#92400e]':'bg-zinc-700 text-zinc-500'}`}>
        {allPlaced?'✅ Verificar':'Coloca todas las letras'}
      </button>
    </div>
  );
}

// ── Minigame: Vocab Multiple Choice ──────────────────────────
function MgVocab({game,roomId,iAmSpinner,localId}){
  const s=game?.mgState||{};
  const q=MOCK.vocab_mc[(s.questionIdx||0)%MOCK.vocab_mc.length];
  const [localSel,setLocalSel]=useState(null); // local — not locked until submit
  const [tLeft,setTLeft]=useState(30);
  const revealed=!!s.revealed;

  // Timer countdown + auto-submit on expiry (spinner's device only)
  useEffect(()=>{
    if(!s.timerEnd||revealed)return;
    const iv=setInterval(()=>{
      const l=Math.max(0,Math.round((s.timerEnd-Date.now())/1000));
      setTLeft(l);
      if(l<=0){
        clearInterval(iv);
        if(iAmSpinner){
          const isCorrect=localSel!==null&&localSel===q?.ans;
          updateDoc(rRef(roomId),{
            'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:localSel??-1},
            'mgState.revealed':true,'mgState.result':isCorrect?'win':'strike',
          });
        }
      }
    },200);
    return()=>clearInterval(iv);
  },[s.timerEnd,localSel,revealed]);

  const submit=async()=>{
    const isCorrect=localSel!==null&&localSel===q?.ans;
    await updateDoc(rRef(roomId),{
      'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:localSel??-1},
      'mgState.revealed':true,'mgState.result':isCorrect?'win':'strike',
    });
  };

  return(
    <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto">
      {s.timerEnd&&!revealed&&<div className={`text-center text-4xl font-black ${tLeft<=10?'text-red-400 animate-pulse':'text-lime-400'}`}>{tLeft}s</div>}
      <div className="bg-zinc-900 border-2 border-blue-500 rounded-2xl p-4 text-center">
        <p className="text-white font-bold text-lg">{q?.q}</p>
      </div>
      <div className="grid grid-cols-2 gap-2">
        {q?.opts.map((opt,i)=>{
          const isCorrect=i===q?.ans;
          const isChosen=revealed?(s.playerAnswers||{})[game?.spinnerPlayerId]===i:localSel===i;
          const cls=revealed
            ?(isCorrect?'bg-lime-900/50 border-lime-500 text-lime-300':isChosen&&!isCorrect?'bg-red-900/50 border-red-500 text-red-300':'bg-zinc-800 border-zinc-700 text-zinc-500')
            :(iAmSpinner?isChosen?'bg-amber-500 border-amber-400 text-black ring-2 ring-amber-200':'bg-zinc-800 border-zinc-700 text-white hover:bg-zinc-700':'bg-zinc-800 border-zinc-700 text-zinc-400');
          return(<button key={i} onClick={()=>!revealed&&iAmSpinner&&setLocalSel(i)} disabled={revealed||!iAmSpinner}
            className={`btn-j p-4 rounded-xl font-black text-center border-2 transition-all ${cls}`}>
            <span className="block text-xs opacity-60 mb-1">{String.fromCharCode(65+i)}</span>{opt}
          </button>);
        })}
      </div>
      {iAmSpinner&&!revealed&&(
        <button onClick={submit} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl">
          {localSel!==null?'✅ Confirmar respuesta':'⚠️ Enviar sin selección'}
        </button>
      )}
      {!iAmSpinner&&!revealed&&<div className="text-center text-zinc-500 text-sm animate-pulse">El jugador está eligiendo...</div>}
    </div>
  );
}

              {tPs.map(p=>{

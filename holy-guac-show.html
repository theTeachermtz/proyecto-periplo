// ── Roulette Wheel ────────────────────────────────────────────
function RouletteWheel({spinCount,spinTarget,size=270}){
  const [angle,setAngle]=useState(0);
  const [anim,setAnim]=useState(false);
  const acc=useRef(0),prev=useRef(0);
  useEffect(()=>{
    if(!spinCount||spinCount===prev.current||spinTarget===null)return;
    prev.current=spinCount;
    const seg=45,tmod=spinTarget*seg+seg/2,cmod=acc.current%360;
    const diff=((tmod-cmod)%360+360)%360||360;
    const nxt=acc.current+360*6+diff;
    acc.current=nxt;setAnim(true);setAngle(nxt);
    setTimeout(()=>setAnim(false),4700);
  },[spinCount,spinTarget]);
  const cx=150,cy=150,R=138,inn=40;
  const segs=MINIGAMES.map((mg,i)=>{
    const a1=(i*45-90)*Math.PI/180,a2=((i+1)*45-90)*Math.PI/180,mid=(i*45-90+22.5)*Math.PI/180;
    const path=[`M ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)}`,`L ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)}`,`A ${R} ${R} 0 0 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}`,`L ${cx+inn*Math.cos(a2)} ${cy+inn*Math.sin(a2)}`,`A ${inn} ${inn} 0 0 0 ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)} Z`].join(' ');
    const ex=cx+93*Math.cos(mid),ey=cy+93*Math.sin(mid);
    return(<g key={i}><path d={path} fill={mg.color} stroke="#0a0a0a" strokeWidth="2.5" opacity="0.9"/><text x={ex} y={ey} textAnchor="middle" dominantBaseline="middle" fontSize="16">{mg.emoji}</text></g>);
  });
  return(
    <div className="relative flex items-center justify-center" style={{width:size,height:size}}>
      <div className="absolute text-white z-10 drop-shadow-lg" style={{top:-10,left:'50%',transform:'translateX(-50%)',fontSize:22}}>▼</div>
      <div style={{transform:`rotate(${angle}deg)`,transition:anim?'transform 4.5s cubic-bezier(.04,0,.08,1)':'none',transformOrigin:'50% 50%'}}>
        <svg viewBox="0 0 300 300" width={size-8} height={size-8}>
          {segs}
          <circle cx="150" cy="150" r="139" fill="none" stroke="#ffffff15" strokeWidth="4"/>
          <circle cx="150" cy="150" r="40" fill="#18181b" stroke="#ffffff22" strokeWidth="2"/>
          <text x="150" y="150" textAnchor="middle" dominantBaseline="middle" fontSize="22">🌶️</text>
          {MINIGAMES.map((_,i)=>{const a=(i*45-90)*Math.PI/180;return<line key={i} x1={cx+inn*Math.cos(a)} y1={cy+inn*Math.sin(a)} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="#0a0a0a" strokeWidth="2"/>;} )}
        </svg>
      </div>
    </div>
  );
}

// ── LOBBY ─────────────────────────────────────────────────────
function ScreenLobby({game,roomId,isHost,localId,onStart,onLeave}){
  const [codeCopied,setCC]=useState(false);
  const [showQr,setShowQr]=useState(false);
  const teams=game?.teams||[];
  const players=game?.players||[];
  const isModOnly=game?.hostRole==='MOD_ONLY';
  const copyCode=()=>navigator.clipboard.writeText(roomId).then(()=>{setCC(true);setTimeout(()=>setCC(false),2000);});
  const copyStudentLink_=()=>navigator.clipboard.writeText(studentUrl(roomId)).then(()=>{setCC(true);setTimeout(()=>setCC(false),2000);});
  const removePlayer=async(teamId,playerId,playerName)=>{
    if(!confirm(`¿Eliminar a ${playerName}?`))return;
    try{
      await runTransaction(db,async txn=>{
        const snap=await txn.get(rRef(roomId));
        if(!snap.exists())return;
        const d=snap.data();
        const newPs=d.players.filter(p=>p.id!==playerId);
        const newTeams=d.teams.map(t=>t.id===teamId?{...t,players:t.players.filter(n=>n!==playerName)}:t);
        txn.update(rRef(roomId),{players:newPs,teams:newTeams});
      });
    }catch(e){console.error('removePlayer',e);}
  };
  return(
    <div className="h-full flex flex-col items-center justify-center bg-zinc-950 p-5 relative">
      {showQr&&<QrModal url={studentUrl(roomId)} onClose={()=>setShowQr(false)}/>}
      <button onClick={onLeave} className="btn-j absolute top-5 left-5 text-zinc-500 hover:text-white bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-xl text-sm font-bold">
        ← {isHost?'Cerrar':'Salir'}
      </button>
      <div className="bg-zinc-900 border-4 border-lime-500 rounded-3xl p-7 w-full max-w-md shadow-2xl text-center anim-pop">
        {/* Code */}
        <button onClick={copyCode} className="btn-j w-full bg-zinc-950 border border-zinc-800 hover:border-lime-500 rounded-2xl p-4 mb-4 transition-colors">
          <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">{codeCopied?'✅ Copiado':'🔢 Toca para copiar código'}</p>
          <p className="text-5xl font-black text-white tracking-widest">{roomId}</p>
        </button>
        {/* QR + link buttons */}
        <div className="flex gap-2 mb-5">
          <button onClick={()=>setShowQr(true)} className="btn-j flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-bold py-2 rounded-xl text-sm flex items-center justify-center gap-1">📱 QR Alumnos</button>
          <button onClick={copyStudentLink_} className="btn-j flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-bold py-2 rounded-xl text-sm flex items-center justify-center gap-1">🔗 Link Alumnos</button>
        </div>

        {/* Host badge if MOD_ONLY */}
        {isModOnly&&(
          <div className="flex items-center gap-3 bg-lime-500/10 border border-lime-500/30 rounded-2xl p-3 mb-4">
            <span className="text-3xl">{game.hostEmoji}</span>
            <div className="text-left"><div className="text-xs text-lime-400 font-bold">MODERADOR</div><div className="font-black text-white">{game.hostName}</div></div>
            <span className="ml-auto text-xs bg-lime-500/20 text-lime-400 px-2 py-1 rounded-lg font-bold">HOST</span>
          </div>
        )}

        {/* Teams */}
        <div className="space-y-2 mb-5">
          {teams.map(t=>{
            const tPlayers=players.filter(p=>p.teamId===t.id);
            return(
              <div key={t.id} className="rounded-xl p-3 text-left" style={{background:`${t.color}18`,border:`1px solid ${t.color}44`}}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full" style={{background:t.color}}/>
                  <span className="font-black text-sm" style={{color:t.color}}>{t.name}</span>
                  <span className="text-xs text-zinc-600 ml-auto">{tPlayers.length} jugadores</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {tPlayers.map(p=>(
                    <span key={p.id} className={`inline-flex items-center gap-1 text-xs bg-zinc-800 rounded-full px-2 py-0.5 font-semibold ${p.id===localId?'ring-1 ring-white/40 text-white':'text-zinc-300'}`}>
                      {p.emoji} {p.name}
                      {isHost&&p.id!==localId&&(
                        <button onClick={()=>removePlayer(t.id,p.id,p.name)} className="btn-j text-zinc-600 hover:text-red-400 ml-0.5 leading-none text-xs">✕</button>
                      )}

                  ))}
                  {tPlayers.length===0&&<span className="text-xs text-zinc-700 italic">vacío...</span>}
                </div>
              </div>

        {isHost?(

          </button>

// ── CURTAIN animation ─────────────────────────────────────────
function CurtainScene({round,onDone}){
  const [stage,setStage]=useState(0); // 0=curtains, 1=round text, 2=done
  useEffect(()=>{
    const t1=setTimeout(()=>setStage(1),400);
    const t2=setTimeout(()=>setStage(2),3600);
    const t3=setTimeout(()=>onDone&&onDone(),3800);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div className="absolute inset-0 z-50 overflow-hidden" style={{background:'#09090b'}}>
      {/* Left curtain */}
      <div className={`absolute left-0 top-0 h-full w-1/2 ${stage>=1?'curtain-l':''}`}
        style={{background:'linear-gradient(to right,#7f1d1d,#991b1b)',boxShadow:'inset -20px 0 40px rgba(0,0,0,.5)'}}>
        <div className="absolute right-0 top-0 h-full w-4" style={{background:'rgba(0,0,0,.3)'}}/>
      </div>
      {/* Right curtain */}
      <div className={`absolute right-0 top-0 h-full w-1/2 ${stage>=1?'curtain-r':''}`}
        style={{background:'linear-gradient(to left,#7f1d1d,#991b1b)',boxShadow:'inset 20px 0 40px rgba(0,0,0,.5)'}}>
        <div className="absolute left-0 top-0 h-full w-4" style={{background:'rgba(0,0,0,.3)'}}/>
      </div>
      {/* Round text */}
      {stage>=1&&stage<2&&(
        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
          <div className="round-show text-center">
            <div className="text-lime-400 font-black tracking-[.3em] text-lg uppercase mb-2">¡Bienvenidos al</div>
            <div className="text-7xl font-black text-white leading-none">ROUND {round+1}</div>
            <div className="text-amber-400 text-2xl mt-3">🌶️ Holy Guacamole 🌶️</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Minigame: How Many Syllables ──────────────────────────────
function MgSyllables({game,roomId,iAmSpinner,localId}){
  const words=MOCK.syllables;
  const s=game?.mgState||{};
  const [ans,setAns]=useState([1,1,1,1,1]);
  const [tLeft,setTLeft]=useState(45);
  const locked=!!(s.locked||(s.timerEnd&&Date.now()>s.timerEnd));
  const revealed=!!s.revealed;
  const spinnerFinal=(s.playerAnswers||{})[game?.spinnerPlayerId];

  useEffect(()=>{
    if(!s.timerEnd||revealed)return;
    const iv=setInterval(()=>{
      const l=Math.max(0,Math.round((s.timerEnd-Date.now())/1000));
      setTLeft(l);
      if(l<=0){
        clearInterval(iv);
        if(iAmSpinner){
          const allCorrect=words.every((w,i)=>ans[i]===w.answer);
          updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:ans},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
        }
      }
    },200);
    return()=>clearInterval(iv);
  },[s.timerEnd,ans,revealed]);

  const submit=async()=>{
    const allCorrect=words.every((w,i)=>ans[i]===w.answer);
    await updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:ans},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
  };

  if(revealed) return(
    <div className="w-full p-4 space-y-2 max-w-sm mx-auto">
      {words.map((w,i)=>{const ok=(spinnerFinal||[])[i]===w.answer;return(
        <div key={i} className={`flex justify-between items-center rounded-xl px-4 py-2.5 border ${ok?'bg-lime-900/30 border-lime-500':'bg-red-900/30 border-red-500'}`}>
          <span className="font-bold text-white">{w.word}</span>
          <span className="font-black text-sm" style={{color:ok?'#a3e635':'#f87171'}}>{(spinnerFinal||[])[i]??'?'} / {w.answer} {ok?'✅':'❌'}</span>
        </div>);})}
    </div>
  );

  return(
    <div className="w-full p-4 space-y-3 max-w-sm mx-auto">
      <div className={`text-center text-4xl font-black ${tLeft<=10?'text-red-400 animate-pulse':'text-lime-400'}`}>{tLeft}s</div>
      {words.map((w,i)=>(
        <div key={i} className="flex items-center gap-3 bg-zinc-800 rounded-xl px-4 py-2">
          <span className="font-bold text-white flex-1">{i+1}. {w.word}</span>
          {iAmSpinner&&!locked?(
            <div className="flex items-center gap-2">
              <button onClick={()=>setAns(a=>a.map((v,j)=>j===i?Math.max(1,v-1):v))} className="btn-j w-8 h-8 bg-zinc-700 rounded-lg font-black text-white">−</button>
              <span className="w-6 text-center font-black text-white">{ans[i]}</span>
              <button onClick={()=>setAns(a=>a.map((v,j)=>j===i?Math.min(8,v+1):v))} className="btn-j w-8 h-8 bg-zinc-700 rounded-lg font-black text-white">+</button>
            </div>
          ):<span className="text-zinc-600 text-sm">{iAmSpinner&&spinnerFinal?spinnerFinal[i]+' ✓':'—'}</span>}
        </div>
      ))}
      {iAmSpinner&&!locked&&<button onClick={submit} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl">✅ Confirmar respuestas</button>}
      {iAmSpinner&&locked&&<div className="text-center text-zinc-400 font-bold text-sm">Enviando...</div>}
    </div>
  );
}

        }
      }
    },200);
    return()=>clearInterval(iv);
  },[s.timerEnd,sel,revealed]);

  const submit=async()=>{
    const allCorrect=items.every((item,i)=>sel[i]===item.answer);
    await updateDoc(rRef(roomId),{'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:sel},'mgState.locked':true,'mgState.revealed':true,'mgState.result':allCorrect?'win':'strike'});
  };

  if(revealed) return(
    <div className="w-full p-4 space-y-2 max-w-sm mx-auto">

        <div key={i} className={`rounded-xl px-4 py-2.5 border ${ok?'bg-lime-900/30 border-lime-500':'bg-red-900/30 border-red-500'}`}>

  return(
    <div className="w-full p-4 space-y-2 max-w-sm mx-auto">

              ))}
            </div>
          ):(
            <div className="flex gap-2">
              {[item.a,item.b].map(opt=>{

                const highlight=(liveAns[i]===opt)||(iAmSpinner&&(spinnerFinal||[])[i]===opt);
                return(<div key={opt} className={`flex-1 py-2 rounded-xl font-black text-sm text-center transition-all ${highlight?'bg-amber-500/40 text-amber-300 ring-1 ring-amber-500/60':'bg-zinc-700/40 text-zinc-500'}`}>{opt}</div>);

        <div className="text-center text-xs font-bold py-1" style={{color:liveAns.some(v=>v!=null)?'#fbbf24':'#52525b'}}>

      )}

  );
}

// ── Minigame: Vocab Multiple Choice ──────────────────────────
function MgVocab({game,roomId,iAmSpinner,localId}){
  const s=game?.mgState||{};
  const q=MOCK.vocab_mc[(s.questionIdx||0)%MOCK.vocab_mc.length];
  const [localSel,setLocalSel]=useState(null); // local — not locked until submit
  const [tLeft,setTLeft]=useState(30);
  const revealed=!!s.revealed;

  // Timer countdown + auto-submit on expiry (spinner's device only)
  useEffect(()=>{
    if(!s.timerEnd||revealed)return;
    const iv=setInterval(()=>{
      const l=Math.max(0,Math.round((s.timerEnd-Date.now())/1000));
      setTLeft(l);
      if(l<=0){
        clearInterval(iv);
        if(iAmSpinner){
          const isCorrect=localSel!==null&&localSel===q?.ans;
          updateDoc(rRef(roomId),{
            'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:localSel??-1},
            'mgState.revealed':true,'mgState.result':isCorrect?'win':'strike',
          });
        }
      }
    },200);
    return()=>clearInterval(iv);
  },[s.timerEnd,localSel,revealed]);

  const submit=async()=>{
    const isCorrect=localSel!==null&&localSel===q?.ans;
    await updateDoc(rRef(roomId),{
      'mgState.playerAnswers':{...(s.playerAnswers||{}),[localId]:localSel??-1},
      'mgState.revealed':true,'mgState.result':isCorrect?'win':'strike',
    });
  };

  return(
    <div className="flex flex-col gap-3 p-4 w-full max-w-sm mx-auto">
      {s.timerEnd&&!revealed&&<div className={`text-center text-4xl font-black ${tLeft<=10?'text-red-400 animate-pulse':'text-lime-400'}`}>{tLeft}s</div>}
      <div className="bg-zinc-900 border-2 border-blue-500 rounded-2xl p-4 text-center">
        <p className="text-white font-bold text-lg">{q?.q}</p>
      </div>
      <div className="grid grid-cols-2 gap-2">
        {q?.opts.map((opt,i)=>{
          const isCorrect=i===q?.ans;
          const isChosen=revealed?(s.playerAnswers||{})[game?.spinnerPlayerId]===i:localSel===i;
          const cls=revealed
            ?(isCorrect?'bg-lime-900/50 border-lime-500 text-lime-300':isChosen&&!isCorrect?'bg-red-900/50 border-red-500 text-red-300':'bg-zinc-800 border-zinc-700 text-zinc-500')
            :(iAmSpinner?isChosen?'bg-amber-500 border-amber-400 text-black ring-2 ring-amber-200':'bg-zinc-800 border-zinc-700 text-white hover:bg-zinc-700':'bg-zinc-800 border-zinc-700 text-zinc-400');
          return(<button key={i} onClick={()=>!revealed&&iAmSpinner&&setLocalSel(i)} disabled={revealed||!iAmSpinner}
            className={`btn-j p-4 rounded-xl font-black text-center border-2 transition-all ${cls}`}>
            <span className="block text-xs opacity-60 mb-1">{String.fromCharCode(65+i)}</span>{opt}
          </button>);
        })}
      </div>
      {iAmSpinner&&!revealed&&(
        <button onClick={submit} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl">
          {localSel!==null?'✅ Confirmar respuesta':'⚠️ Enviar sin selección'}
        </button>
      )}
      {!iAmSpinner&&!revealed&&<div className="text-center text-zinc-500 text-sm animate-pulse">El jugador está eligiendo...</div>}
    </div>
  );
}

        const score=game?.teamScores?.[t.id]||0;
        return(
          <div key={t.id} className="rounded-xl p-2.5 transition-all" style={{background:`${t.color}12`,border:`1.5px solid ${isWinner?t.color:t.color+'28'}`}}>
            <div className="flex items-center gap-1.5 mb-1.5">
              <div className="w-2 h-2 rounded-full shrink-0" style={{background:t.color}}/>
              <span className="text-xs font-black truncate flex-1" style={{color:t.color}}>{t.name}</span>
              <div className="flex gap-0.5 mx-1">{[0,1,2].map(i=><div key={i} className={`w-1.5 h-1.5 rounded-full ${i<strikes?'bg-red-500':'bg-zinc-700'}`}/>)}</div>
              <span className="text-xs font-black text-white">{score}</span>
            </div>
            <div className="flex flex-wrap gap-1">
              {tPs.map(p=>{
                const isCalled=called.includes(p.id);
                const isSpinner=p.id===spinner;
                const isMe=p.id===localId;
                return(<span key={p.id} className={`text-xs px-1.5 py-0.5 rounded-full font-semibold leading-none transition-all ${isSpinner?'bg-amber-500 text-black':isCalled?'bg-white text-black':isMe?'bg-zinc-700 text-white ring-1 ring-white/30':'bg-zinc-800/80 text-zinc-400'}`}>
                  {p.emoji} {p.name}{isSpinner?' 🌀':isCalled?' ⭐':''}
                </span>);
              })}
              {tPs.length===0&&<span className="text-xs text-zinc-700 italic">vacío</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── PLAYING screen ────────────────────────────────────────────
function ScreenPlaying({game,roomId,isHost,localId,onLeave}){
  const [showPanel,setShowPanel]=useState(false);
  const [spinning,setSpinning]=useState(false);
  const [wheelSettled,setWheelSettled]=useState(false);
  const [showCurtain,setShowCurtain]=useState(game?.phase==='CURTAIN');
  const [cdLeft,setCdLeft]=useState(null); // countdown display (seconds)
  const [buzzOpen,setBuzzOpen]=useState(false); // true when buzzUnlockedAt has truly expired
  const [fetchingQ,setFetchingQ]=useState(false);
  const [fetchStep,setFetchStep]=useState(0);

  const players=game?.players||[];
  const teams=game?.teams||[];
  const mg=game?.minigame?MINIGAMES.find(m=>m.id===game.minigame):null;
  const phase=game?.phase||'CURTAIN';
  const calledIds=game?.buzzCalled||[];
  const isCalledPlayer=calledIds.includes(localId);
  const spinnerPid=game?.spinnerPlayerId;
  const iAmSpinner=spinnerPid===localId;
  const me=players.find(p=>p.id===localId);
  const myTeam=me?teams.find(t=>t.id===me.teamId):null;

  useEffect(()=>{if(game?.phase==='CURTAIN')setShowCurtain(true);},[game?.phase]);

  // Countdown display (5→0) + buzzOpen precise unlock
  useEffect(()=>{
    setBuzzOpen(false);
    setCdLeft(null);
    if(!game?.buzzUnlockedAt)return;
    // Countdown display — updates every 100ms
    const iv=setInterval(()=>{
      const left=Math.max(0,Math.ceil((game.buzzUnlockedAt-Date.now())/1000));
      setCdLeft(left>0?left:null);
    },100);
    // Precise unlock — fires at the exact ms buzzUnlockedAt expires
    const delay=game.buzzUnlockedAt-Date.now();
    const tid=delay>0?setTimeout(()=>setBuzzOpen(true),delay):null;
    if(delay<=0)setBuzzOpen(true); // already past (late join, etc.)
    return()=>{clearInterval(iv);if(tid)clearTimeout(tid);};
  },[game?.buzzUnlockedAt]);

  // Confetti + wheelSettled on ALL devices when wheel lands
  useEffect(()=>{
    if(!game?.spinCount)return;
    setWheelSettled(false); // reset when a new spin fires
    const tid=setTimeout(()=>{
      confetti({particleCount:200,spread:70,origin:{y:.5},colors:['#a3e635','#fbbf24','#ef4444','#3b82f6','#8b5cf6']});
      setWheelSettled(true);
    },4700);
    return()=>clearTimeout(tid);
  },[game?.spinCount]);

  const handleBuzz=async()=>{
    if(!localId)return;
    if(phase!=='BUZZER'&&phase!=='HEIST')return; // visible in CALL_UP but not yet active
    if(phase==='BUZZER'&&!isCalledPlayer)return;  // BUZZER: solo los llamados
    // HEIST: todos los no-eliminados (gateado por el UI con iHeistActive)
    if(game?.buzzUnlockedAt&&Date.now()<game.buzzUnlockedAt)return; // locked during countdown
    const buzz={playerId:localId,teamId:me?.teamId,ts:Date.now(),name:me?.name};
    await updateDoc(rRef(roomId),{buzzLog:arrayUnion(buzz)});
  };

  const doSpin=async()=>{
    if((!iAmSpinner&&!isHost)||spinning)return;
    setSpinning(true);
    const t=Math.floor(Math.random()*8);
    // Stay in SPIN_ASSIGN — host manually navigates to challenge after wheel lands
    await updateDoc(rRef(roomId),{spinCount:(game.spinCount||0)+1,spinTarget:t,minigame:MINIGAMES[t].id});
    setTimeout(()=>setSpinning(false),4700);
  };

  const buzzLog=([...(game?.buzzLog||[])]).sort((a,b)=>a.ts-b.ts);
  // buzzUnlocked: BUZZER/HEIST phase + precise timer fired (buzzOpen)
  const buzzUnlocked=(phase==='BUZZER'||phase==='HEIST')&&(!game?.buzzUnlockedAt||buzzOpen);
  const alreadyBuzzed=buzzLog.findIndex(b=>b.playerId===localId)>=0;
  const roundIdx=game?.roundIdx||0;
  const cPs=calledIds.map(id=>players.find(p=>p.id===id)).filter(Boolean);
  // Evaluation queue: buzzers in timestamp order, then called-but-didn't-buzz
  const evalQueue=[
    ...buzzLog,
    ...cPs.filter(p=>!buzzLog.find(b=>b.playerId===p.id))
           .map(p=>({playerId:p.id,teamId:p.teamId,ts:null,name:p.name})),
  ];

  // ── Mod inline functions (no panel needed for buzzer flow) ───────
  const callUpPlayers=async()=>{
    const tc=game?.teamCount||2;
    const pair=TEAM_CATALOG.slice(0,tc).map(td=>{
      const t=teams.find(t2=>t2.id===td.id);if(!t)return null;
      const tPs=players.filter(p=>p.teamId===t.id);if(!tPs.length)return null;
      return tPs[roundIdx%tPs.length];
    }).filter(Boolean);
    await updateDoc(rRef(roomId),{buzzCalled:pair.map(p=>p.id),buzzLog:[],winnerTeamId:null,spinnerPlayerId:null,buzzQuestion:'',buzzUnlockedAt:null,activeBuzzerIdx:0,buzzShowOptions:false});
  };

  const handleFetchQuestion=()=>{
    if(fetchingQ)return;
    setFetchingQ(true);setFetchStep(1);
    setTimeout(()=>setFetchStep(2),900);
    setTimeout(()=>setFetchStep(3),1800);
    setTimeout(async()=>{
      // MOCK — siempre la misma pregunta por ahora
      await updateDoc(rRef(roomId),{buzzQuestion:'¿Cuántos días tiene la semana?'});
      setFetchingQ(false);setFetchStep(0);
    },2700);
  };

  const startCountdown=async()=>{
    await updateDoc(rRef(roomId),{phase:'BUZZER',buzzUnlockedAt:Date.now()+5500,buzzLog:[],activeBuzzerIdx:0});
  };

  const assignSpinner=teamId=>{
    const tPs=players.filter(p=>p.teamId===teamId);
    const cursor=(game?.spinCursors||{})[teamId]||0;
    return{teamId,spinnerId:tPs[cursor%tPs.length]?.id||null};
  };

  // ── Sequential buzz evaluation ───────────────────────────────
  const declareCorrect=async()=>{
    const evalIdx=game?.activeBuzzerIdx||0;
    const winner=evalQueue[evalIdx];
    if(!winner)return;
    // Spinner = NEXT player after the FFA winner (they already played)
    const tPs=players.filter(p=>p.teamId===winner.teamId);
    const winnerLocalIdx=tPs.findIndex(p=>p.id===winner.playerId);
    const nextIdx=tPs.length>1?(winnerLocalIdx+1)%tPs.length:winnerLocalIdx;
    const spinnerId=tPs[nextIdx]?.id||null;
    await updateDoc(rRef(roomId),{
      winnerTeamId:winner.teamId,spinnerPlayerId:spinnerId,
      phase:'SPIN_ASSIGN',buzzQuestion:'',buzzUnlockedAt:null,activeBuzzerIdx:0,
      spinCount:0,spinTarget:null,minigame:null,
    });
  };

  const markWrong=async()=>{
    const evalIdx=game?.activeBuzzerIdx||0;
    await updateDoc(rRef(roomId),{activeBuzzerIdx:evalIdx+1});
  };

  const retryWithOptions=async()=>{
    await updateDoc(rRef(roomId),{
      buzzLog:[],activeBuzzerIdx:0,buzzShowOptions:true,
      phase:'CALL_UP',buzzUnlockedAt:null,
    });
  };

  const noAnswerReset=async()=>{
    await updateDoc(rRef(roomId),{
      buzzLog:[],activeBuzzerIdx:0,buzzShowOptions:false,
      phase:'CALL_UP',buzzQuestion:'',buzzUnlockedAt:null,
    });
  };

  // ── Quick test result (testing shortcut — simulates win/strike without playing) ─
  const quickResult=async(won)=>{
    const wt=game?.winnerTeamId;if(wt==null)return;
    const newCursors={...(game?.spinCursors||{}),[wt]:((game?.spinCursors||{})[wt]||0)+1};
    const clearMg={minigame:null,mgPhase:null,mgState:{},buzzCalled:[],buzzLog:[],buzzQuestion:'',buzzUnlockedAt:null};
    const tPlayers=players.filter(p=>p.teamId===wt);
    if(won){
      const newCW={...(game?.challengesWon||{}),[wt]:((game?.challengesWon||{})[wt]||0)+1};
      if(newCW[wt]>=5){
        const newScores={...(game?.teamScores||{})};
        newScores[wt]=(newScores[wt]||0)+(game?.accPts||0);
        await updateDoc(rRef(roomId),{...clearMg,teamScores:newScores,accPts:0,challengesWon:{...(game?.challengesWon||{}),[wt]:0},teamStrikes:{...(game?.teamStrikes||{}),[wt]:0},spinCursors:newCursors,roundIdx:roundIdx+1,phase:'CURTAIN'});
      }else{
        const nextSpinner=tPlayers[(newCursors[wt]||0)%tPlayers.length];
        await updateDoc(rRef(roomId),{...clearMg,challengesWon:newCW,teamStrikes:{...(game?.teamStrikes||{}),[wt]:0},spinCursors:newCursors,spinnerPlayerId:nextSpinner?.id||null,spinCount:0,spinTarget:null,phase:'SPIN_ASSIGN'});
      }
    }else{
      const newStrikes={...(game?.teamStrikes||{}),[wt]:((game?.teamStrikes||{})[wt]||0)+1};
      if(newStrikes[wt]>=3){
        await updateDoc(rRef(roomId),{...clearMg,teamStrikes:newStrikes,phase:'HEIST'});
      }else{
        const spinner=tPlayers[(newCursors[wt]||0)%tPlayers.length];
        await updateDoc(rRef(roomId),{...clearMg,teamStrikes:newStrikes,spinCursors:newCursors,spinnerPlayerId:spinner?.id||null,spinCount:0,spinTarget:null,phase:'SPIN_ASSIGN'});
      }
    }
  };

  // Rotation list for the winning team in SPIN_ASSIGN — fixed join order, spinner highlighted
  const rotationList=(teamId)=>{
    return players.filter(p=>p.teamId===teamId);
  };

  // Minigame component dispatch
  const renderMinigame=()=>{
    const props={game,roomId,iAmSpinner,localId};
    switch(game?.minigame){
      case 'twister':  return <MgTongue    game={game} iAmSpinner={iAmSpinner}/>;
      case 'silabas':  return <MgSyllables  {...props}/>;
      case 'tilde':    return <MgThisOrThat {...props}/>;
      case 'piramide': return <MgAlphabet   game={game}/>;
      case 'vocab':    return <MgVocab      {...props}/>;
      default: return <div className="text-zinc-400 text-sm font-bold p-4 text-center">Mini-juego: <span className="text-white">{mg?.label}</span><br/><span className="text-xs text-zinc-600">Módulo en construcción — el moderador conduce en físico</span></div>;
    }
  };

  return(
    <div className="h-full flex flex-col bg-zinc-950 relative overflow-hidden">
      {showCurtain&&<CurtainScene round={game?.roundIdx||0} onDone={()=>{setShowCurtain(false);if(isHost)updateDoc(rRef(roomId),{phase:'CALL_UP'});}}/>}

      {/* ── COMPACT HEADER ────────────────────────────────── */}
      <div className="flex items-center justify-between px-3 py-2 border-b border-zinc-800 bg-zinc-900 shrink-0 z-10">
        <div className="flex items-center gap-2">
          <span className="text-base">🌶️</span>
          <span className="font-black text-white text-sm">Holy Guacamole</span>
          <span className="font-mono text-zinc-700 text-xs">{roomId}</span>
        </div>
        <div className="flex items-center gap-2">
          {me&&myTeam&&(
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold" style={{background:`${myTeam.color}25`,border:`1px solid ${myTeam.color}55`}}>
              <span>{me.emoji}</span><span style={{color:myTeam.color}}>{me.name}</span>
            </div>
          )}
          {isHost&&game?.hostRole==='MOD_ONLY'&&(
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-lime-500/15 border border-lime-500/40">
              <span>{game.hostEmoji}</span><span className="text-lime-400">{game.hostName}</span>
              <span className="text-lime-600 text-xs">MOD</span>
            </div>
          )}
          {isHost&&(
            <button onClick={async()=>{if(confirm('¿Cerrar sala?')){try{await updateDoc(rRef(roomId),{status:'CLOSED'});}catch{}onLeave();}}} className="btn-j bg-zinc-800 hover:bg-red-900/40 border border-zinc-700 hover:border-red-700 text-zinc-500 hover:text-red-400 font-bold text-xs px-2.5 py-1.5 rounded-xl">🚪</button>
          )}
        </div>
      </div>

      {/* ── LA PANTALLA DEL SHOW (top ~58%) ───────────────── */}
      <div className="flex flex-col" style={{flex:'0 0 58%',minHeight:0,background:'#0c0c0e',borderBottom:'2px solid #27272a',overflow:'hidden'}}>

        {/* Score strip inside the screen */}
        <div className="flex border-b border-zinc-800/60 shrink-0">
          {teams.map(t=>{
            const isWinner=game?.winnerTeamId===t.id&&(phase==='SPIN_ASSIGN'||phase==='MINIGAME');
            const score=game?.teamScores?.[t.id]||0;
            const strikes=game?.teamStrikes?.[t.id]||0;
            return(
              <div key={t.id} className="flex-1 flex flex-col items-center py-1.5 px-1 transition-all" style={isWinner?{background:`${t.color}22`,borderBottom:`2px solid ${t.color}`}:{}}>
                <div className="text-xs font-black" style={{color:t.color}}>{score}pts</div>
                <div className="flex gap-0.5 mt-0.5">{[0,1,2].map(i=><div key={i} className={`w-1.5 h-1.5 rounded-full ${i<strikes?'bg-red-500':'bg-zinc-700'}`}/>)}</div>
              </div>
            );
          })}
        </div>

        {/* Phase content — scrollable if needed */}
        <div className={`flex-1 overflow-y-auto scroll-y flex flex-col items-center ${phase==='MINIGAME'?'justify-start py-2':'justify-center'}`}>

          {/* ── WELCOME (CALL_UP, nadie llamado aún) ─────────── */}
          {phase==='CALL_UP'&&cPs.length===0&&(
            <div className="flex flex-col items-center gap-2 py-2 px-4 w-full max-w-sm mx-auto anim-pop">
              <div className="text-6xl anim-float">{game?.hostEmoji||'🌶️'}</div>
              <div className="text-zinc-300 font-black text-xl leading-tight text-center">¡Bienvenidos al</div>
              <div className="text-lime-400 font-black text-3xl leading-tight tracking-tight text-center">Holy Guacamole!</div>
              <div className="text-zinc-400 font-bold text-sm tracking-widest uppercase text-center">Game Show</div>
              <div className="flex items-center gap-2 mt-1 bg-lime-500/10 border border-lime-500/20 rounded-full px-4 py-1.5">
                <span className="text-sm">{game?.hostEmoji||'🎙️'}</span>
                <span className="text-lime-400 font-bold text-sm">{game?.hostName||'Moderador'}</span>
              </div>
              {isHost?(
                <button onClick={callUpPlayers} className="btn-j mt-3 w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-2xl text-base shadow-[0_5px_0_#92400e] flex items-center justify-center gap-2 anim-up">
                  ➡️ Empezar Ronda {roundIdx + 1}
                </button>
              ):(
                <div className="text-zinc-600 text-xs animate-pulse mt-1">Preparando la ronda...</div>
              )}
            </div>
          )}

          {/* ── BUZZER FLOW (CALL_UP con players, o BUZZER) ──── */}
          {(phase==='CALL_UP'||phase==='BUZZER')&&cPs.length>0&&(
            <div className="flex flex-col items-center gap-3 w-full p-3 max-w-sm mx-auto">

              {/* Player chips + buzz buttons grid */}
              <div className={`grid gap-3 w-full ${cPs.length<=2?'grid-cols-2':'grid-cols-2'}`}>
                {cPs.map(p=>{
                  const t=teams.find(t2=>t2.id===p.teamId);
                  const isMe=p.id===localId;
                  const pRank=buzzLog.findIndex(b=>b.playerId===p.id);
                  const pBuzzed=pRank>=0;
                  const canClick=isMe&&!pBuzzed&&buzzUnlocked;
                  return(
                    <div key={p.id} className="flex flex-col items-center gap-2">
                      {/* Chip */}
                      <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-2xl font-black text-sm text-white ${isMe?'ring-2 ring-white/50':''}`}
                        style={{background:`${t?.color}35`,border:`2px solid ${t?.color}`}}>
                        <span className="text-base">{p.emoji}</span>
                        <span>{p.name}</span>
                        {isMe&&<span className="text-xs opacity-60 font-normal">(tú)</span>}
                      </div>
                      {/* Buzz button */}
                      {pBuzzed?(
                        <div className="w-16 h-16 rounded-full flex items-center justify-center font-black text-xl border-2 anim-pop"
                          style={{background:`${t?.color}25`,borderColor:t?.color,color:t?.color}}>
                          {pRank+1}°
                        </div>
                      ):(
                        <button onClick={canClick?handleBuzz:undefined} disabled={!canClick}
                          className={`btn-j w-16 h-16 rounded-full flex items-center justify-center text-2xl transition-all
                            ${canClick?'bg-red-600 hover:bg-red-500 buzz-btn shadow-[0_4px_0_#7f1d1d]':
                              isMe&&phase==='BUZZER'&&!buzzUnlocked?'bg-zinc-800 border-2 border-amber-400/60 animate-pulse':
                              'bg-zinc-800 border-2 border-zinc-700'}`}>
                          {canClick?'🔴':phase==='BUZZER'&&isMe?'⏳':'🔒'}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Countdown big number */}
              {phase==='BUZZER'&&cdLeft!=null&&(
                <div className="text-7xl font-black text-amber-400 animate-pulse anim-pop leading-none">{cdLeft}</div>
              )}

              {/* Question box */}
              {game?.buzzQuestion&&(
                <div className="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-white font-bold text-base anim-pop w-full text-center leading-snug">
                  {game.buzzQuestion}
                </div>
              )}

              {/* Buzz order */}
              {buzzLog.length>0&&(
                <div className="w-full space-y-1.5 anim-up">
                  {buzzLog.map((b,i)=>{
                    const bp=players.find(p=>p.id===b.playerId);
                    const bt=teams.find(t=>t.id===b.teamId);
                    const evalIdx=game?.activeBuzzerIdx||0;
                    const isEval=i===evalIdx&&phase==='BUZZER';
                    return(
                      <div key={i} className="flex items-center gap-2 rounded-xl px-3 py-2"
                        style={{background:isEval?`${bt?.color}25`:'#18181b',border:`1px solid ${isEval?bt?.color+'77':'#3f3f46'}`}}>
                        <span className="font-black w-5 text-sm" style={{color:isEval?'#fbbf24':'#71717a'}}>{i+1}°</span>
                        <span>{bp?.emoji}</span>
                        <span className="font-bold text-sm flex-1 text-white">{bp?.name}</span>
                        <span className="text-xs font-bold" style={{color:bt?.color}}>{bt?.name}</span>
                        {isEval&&<span className="text-xs text-amber-400 font-black animate-pulse">◄</span>}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── MOD INLINE CONTROLS ─────────────────────── */}
              {isHost&&(
                <div className="w-full space-y-2 border-t border-zinc-800 pt-2 mt-1">

                  {/* CALL_UP: fetch question */}
                  {phase==='CALL_UP'&&!game?.buzzQuestion&&(
                    fetchingQ?(
                      <div className="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-center min-h-[48px] flex items-center justify-center">
                        <span className={`text-sm font-black animate-pulse ${fetchStep>=3?'text-lime-400':'text-amber-400'}`}>
                          {fetchStep===1?'🔀 Revolviendo las preguntas...'
                           :fetchStep===2?'✋ Metiendo la mano...'
                           :'🎉 ¡Listo!'}
                        </span>
                      </div>
                    ):(
                      <button onClick={handleFetchQuestion}
                        className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                        🎲 Obtener pregunta
                      </button>
                    )
                  )}

                  {/* CALL_UP: start countdown after question shown */}
                  {phase==='CALL_UP'&&game?.buzzQuestion&&(
                    <button onClick={startCountdown}
                      className="btn-j w-full bg-red-600 hover:bg-red-500 text-white font-black py-3 rounded-xl text-sm flex items-center justify-center gap-2 shadow-[0_4px_0_#7f1d1d]">
                      ⏱ Empezar countdown 5…4…3…
                    </button>
                  )}

                  {/* BUZZER: sequential evaluation */}
                  {phase==='BUZZER'&&evalQueue.length>0&&(()=>{
                    const evalIdx=game?.activeBuzzerIdx||0;
                    const current=evalQueue[evalIdx];
                    const allWrong=evalIdx>=evalQueue.length;
                    const cp=current?players.find(p=>p.id===current.playerId):null;
                    const ct=current?teams.find(t=>t.id===current.teamId):null;
                    return(
                      <div className="space-y-2">
                        {!allWrong&&(
                          <>
                            <div className="flex items-center gap-2 rounded-xl px-3 py-2"
                              style={{background:`${ct?.color}25`,border:`1.5px solid ${ct?.color}`}}>
                              <span className="text-xs font-black text-amber-400 shrink-0">{evalIdx+1}°</span>
                              <span>{cp?.emoji}</span>
                              <span className="font-bold text-white text-sm flex-1">{cp?.name}</span>
                              <span className="text-xs font-black" style={{color:ct?.color}}>{ct?.name}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <button onClick={declareCorrect} className="btn-j bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl text-sm">✅ Correcto</button>
                              <button onClick={markWrong} className="btn-j bg-red-700 hover:bg-red-600 text-white font-black py-3 rounded-xl text-sm">❌ Incorrecto</button>
                            </div>
                          </>
                        )}
                        {allWrong&&(
                          <div className="space-y-1.5">
                            <div className="text-xs text-zinc-400 text-center font-bold py-1">Nadie supo — ¿qué hacemos?</div>
                            <button onClick={retryWithOptions} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-2.5 rounded-xl text-sm">👀 Opciones + nueva cuenta</button>
                            <button onClick={noAnswerReset} className="btn-j w-full bg-zinc-700 hover:bg-zinc-600 text-zinc-300 font-bold py-2.5 rounded-xl text-sm">⏭ Nadie supo — siguiente</button>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                </div>
              )}

            </div>
          )}

          {/* SPIN_ASSIGN — split screen */}
          {phase==='SPIN_ASSIGN'&&(()=>{
            const wt=teams.find(t=>t.id===game?.winnerTeamId);
            const rot=wt?rotationList(wt.id):[];
            const challenges=game?.challengesWon?.[wt?.id]||0;
            const strikes=game?.teamStrikes?.[wt?.id]||0;
            const spun=game?.spinTarget!=null;
            const goToChallenge=async()=>{
              const gid=game?.minigame;
              let initState={result:null};
              if(gid==='silabas'||gid==='tilde') Object.assign(initState,{timerEnd:Date.now()+45000,playerAnswers:{},revealed:false});
              else if(gid==='vocab') Object.assign(initState,{timerEnd:Date.now()+30000,playerAnswers:{},revealed:false});
              else if(gid==='twister') Object.assign(initState,{ttLevel:0,ttResults:[null,null,null]});
              else if(gid==='piramide') Object.assign(initState,{history:[],currentLetter:null});
              await updateDoc(rRef(roomId),{phase:'MINIGAME',mgPhase:'ACTIVE',mgState:initState,accPts:(game?.accPts||0)+10});
            };
            return(
              <div className="flex w-full h-full" style={{minHeight:0}}>
                {/* LEFT: team info */}
                <div className="flex flex-col p-3 gap-2 border-r border-zinc-800 overflow-y-auto" style={{width:'46%'}}>
                  {wt&&<div className="text-xs font-black text-center truncate" style={{color:wt.color}}>🏆 {wt.name}</div>}
                  {/* Progress row */}
                  <div className="flex items-start justify-between px-1 gap-2">
                    <div>
                      <div className="text-xs text-zinc-600 uppercase tracking-wide mb-1">Desafíos</div>
                      <div className="flex gap-0.5">{Array.from({length:5},(_,i)=>(
                        <div key={i} className="w-2.5 h-2.5 rounded-full" style={{background:i<challenges?wt?.color:'#3f3f46'}}/>
                      ))}</div>
                    </div>
                    <div>
                      <div className="text-xs text-zinc-600 uppercase tracking-wide mb-1">Strikes</div>
                      <div className="flex gap-0.5">{[0,1,2].map(i=>(
                        <div key={i} className={`w-2.5 h-2.5 rounded-full ${i<strikes?'bg-red-500':'bg-zinc-700'}`}/>
                      ))}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-xs text-zinc-600 uppercase tracking-wide mb-0.5">Pozo</div>
                      <div className="text-amber-400 font-black text-sm">{game?.accPts||0}pts</div>
                    </div>
                  </div>
                  {/* Rotation list */}
                  <div className="space-y-1 flex-1 min-h-0">
                    {rot.map((p,i)=>{
                      const isNow=p.id===spinnerPid;
                      return(
                        <div key={p.id} className="flex items-center gap-1.5 rounded-lg px-2 py-1.5 transition-all"
                          style={isNow?{background:`${wt?.color}30`,border:`1px solid ${wt?.color}`}:{background:'#18181b',border:'1px solid transparent'}}>
                          <span className="text-xs font-black w-5 shrink-0" style={{color:isNow?wt?.color:'#52525b'}}>{i+1}.</span>
                          <span className="text-sm">{p.emoji}</span>
                          <span className="font-bold text-xs flex-1 truncate" style={{color:isNow?'#fff':'#71717a'}}>{p.name}</span>
                          {isNow&&<span className="text-xs">🌀</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
                {/* RIGHT: roulette + controls */}
                <div className="flex flex-col items-center justify-center p-2 gap-2 flex-1">
                  <RouletteWheel spinCount={game?.spinCount||0} spinTarget={game?.spinTarget??null} size={160}/>
                  {/* Not yet spun — spinner OR host can trigger */}
                  {!spun&&(iAmSpinner||isHost)&&(
                    <button onClick={doSpin} disabled={spinning}
                      className="btn-j w-full py-2.5 rounded-xl font-black text-sm text-black disabled:opacity-40"
                      style={{background:spinning?'#6b7280':'linear-gradient(135deg,#a3e635,#fbbf24)',boxShadow:spinning?'none':'0 4px 0 #4d7c0f'}}>
                      {spinning?'🌀 Girando':'🎡 GIRAR'}
                    </button>
                  )}
                  {!spun&&!iAmSpinner&&!isHost&&(
                    <div className="text-zinc-500 text-xs text-center animate-pulse leading-snug">
                      Esperando que<br/>
                      <span className="text-white font-bold">{players.find(p=>p.id===spinnerPid)?.name||'el jugador'}</span> gire...
                    </div>
                  )}
                  {/* Spinning */}
                  {spun&&!wheelSettled&&(
                    <div className="text-zinc-500 text-xs text-center animate-pulse">🌀 Girando...</div>
                  )}
                  {/* Wheel settled */}
                  {spun&&wheelSettled&&mg&&(
                    <div className="flex flex-col items-center gap-1.5 w-full anim-pop">
                      <div className="rounded-xl px-2 py-1 text-center w-full" style={{background:`${mg.color}25`,border:`1px solid ${mg.color}77`}}>
                        <span className="text-lg">{mg.emoji}</span>
                        <span className="text-white font-black text-xs ml-1 leading-tight">{mg.label}</span>
                      </div>
                      {isHost&&(
                        <>
                          <button onClick={goToChallenge}
                            className="btn-j w-full bg-lime-600 hover:bg-lime-500 text-white font-black py-2 rounded-xl text-xs shadow-[0_3px_0_#166534]">
                            ¡Al desafío! →
                          </button>
                          {/* Quick test shortcuts */}
                          <div className="flex gap-1 w-full mt-0.5">
                            <button onClick={()=>quickResult(true)}
                              className="btn-j flex-1 bg-lime-900/60 hover:bg-lime-800 border border-lime-700 text-lime-300 font-black py-1.5 rounded-lg text-xs">
                              ✅ Acierto
                            </button>
                            <button onClick={()=>quickResult(false)}
                              className="btn-j flex-1 bg-red-900/60 hover:bg-red-800 border border-red-700 text-red-300 font-black py-1.5 rounded-lg text-xs">
                              ❌ Strike
                            </button>
                          </div>
                        </>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* HEIST — 3 strikes, todos los demás equipos compiten por el pozo */}
          {phase==='HEIST'&&(()=>{
            const grayTeam=teams.find(t=>t.id===game?.winnerTeamId);
            const heistLog=([...(game?.buzzLog||[])]).sort((a,b)=>a.ts-b.ts);
            const heistUnlocked=buzzUnlocked; // uses buzzOpen state — same precise timer
            const iHeistActive=me&&me.teamId!==game?.winnerTeamId;
            const alreadyHeistBuzzed=heistLog.findIndex(b=>b.playerId===localId)>=0;
            return(
              <div className="flex flex-col items-center gap-4 p-4 w-full max-w-sm text-center anim-pop">
                <div className="text-red-400 font-black text-2xl uppercase tracking-wider">🚨 POINTS HEIST</div>
                {grayTeam&&<div className="text-zinc-400 text-sm">
                  <span style={{color:grayTeam.color}}>{grayTeam.name}</span> acumula 3 strikes — el pozo de <span className="text-amber-400 font-black">{game?.accPts||0} pts</span> está en juego
                </div>}
                {game?.buzzQuestion&&<div className="bg-zinc-800 rounded-2xl px-5 py-3 text-white font-bold text-base w-full">{game.buzzQuestion}</div>}
                {cdLeft!=null&&(
                  <div className="text-6xl font-black text-amber-400 animate-pulse">{cdLeft}</div>
                )}
                {iHeistActive&&!alreadyHeistBuzzed&&game?.buzzQuestion&&(
                  <button onClick={handleBuzz} disabled={!heistUnlocked}
                    className={`btn-j w-40 h-40 rounded-full text-white font-black text-xl flex items-center justify-center flex-col gap-1 shadow-[0_6px_0_#7f1d1d] ${heistUnlocked?'bg-red-600 hover:bg-red-500 buzz-btn':'bg-zinc-700'}`}>
                    <div className="text-4xl">{heistUnlocked?'🔴':'⏳'}</div>
                    <div>{heistUnlocked?'¡BUZZ!':'Espera'}</div>
                  </button>
                )}
                {iHeistActive&&alreadyHeistBuzzed&&<div className="text-zinc-400 font-bold">✅ Buzzeaste</div>}
                {heistLog.length>0&&(
                  <div className="w-full space-y-1.5">
                    {heistLog.map((b,i)=>{const tp=players.find(p=>p.id===b.playerId);const tt=teams.find(t=>t.id===b.teamId);return(
                      <div key={i} className="flex items-center gap-2 rounded-xl px-3 py-2" style={{background:i===0?`${tt?.color}25`:'#18181b',border:`1px solid ${i===0?tt?.color+'55':'#3f3f46'}`}}>
                        <span className="font-black text-sm w-4" style={{color:i===0?'#fbbf24':'#52525b'}}>{i+1}°</span>
                        <span>{tp?.emoji}</span><span className="font-bold text-sm flex-1 text-white">{tp?.name}</span>
                        <span className="text-xs font-bold" style={{color:tt?.color}}>{tt?.name}</span>
                      </div>);
                    })}
                  </div>
                )}
              </div>
            );
          })()}

          {/* MINIGAME */}
          {phase==='MINIGAME'&&game?.mgPhase&&(
            <>
              {renderMinigame()}
              {/* ── Inline mod controls ── */}
              {isHost&&(()=>{
                const s=game?.mgState||{};
                const result=s.result;
                // Auto-graded result ready → single "Continuar" button
                if(result) return(
                  <div className="px-4 pb-3 mt-1 anim-up">
                    <button onClick={()=>quickResult(result==='win')}
                      className={`btn-j w-full font-black py-3 rounded-xl text-sm ${result==='win'?'bg-lime-600 hover:bg-lime-500 text-white shadow-[0_4px_0_#166534]':'bg-red-700 hover:bg-red-600 text-white shadow-[0_4px_0_#7f1d1d]'}`}>
                      {result==='win'?'✅ ¡Acierto! — Continuar →':'❌ Strike — Continuar →'}
                    </button>
                  </div>
                );
                // Tongue Twister — manual host controls
                if(game?.minigame==='twister'){
                  const ttLevel=s.ttLevel||0,ttResults=s.ttResults||[null,null,null];
                  const passLevel=async()=>{const nr=[...ttResults];nr[ttLevel]=true;if(ttLevel>=2){await updateDoc(rRef(roomId),{'mgState.ttResults':nr,'mgState.result':'win'});}else{await updateDoc(rRef(roomId),{'mgState.ttResults':nr,'mgState.ttLevel':ttLevel+1});}};
                  const failLevel=async()=>{const nr=[...ttResults];nr[ttLevel]=false;await updateDoc(rRef(roomId),{'mgState.ttResults':nr,'mgState.result':'strike'});};
                  return(
                    <div className="px-4 pb-3 mt-1 space-y-2 border-t border-zinc-800 pt-3">
                      <div className="text-xs text-zinc-500 uppercase tracking-widest text-center">Nivel {ttLevel+1} · {['Fácil','Medio','Difícil'][ttLevel]}</div>
                      <div className="grid grid-cols-2 gap-2">
                        <button onClick={passLevel} className="btn-j bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl text-sm">✅ {ttLevel<2?'Pasó →':'¡Win!'}</button>
                        <button onClick={failLevel} className="btn-j bg-red-700 hover:bg-red-600 text-white font-black py-3 rounded-xl text-sm">❌ Strike</button>
                      </div>
                    </div>
                  );
                }
                // Alphabet Pyramid — letter picker inline
                if(game?.minigame==='piramide'){
                  const apH=s.history||[],apL=s.currentLetter||null;
                  const ALPHA='ABCDEFGHIJKLMNÑOPQRSTUVWXYZ'.split('');
                  const pickL=async l=>updateDoc(rRef(roomId),{'mgState.currentLetter':l});
                  const markL=async res=>{
                    const newH=[...apH,{letter:apL,result:res}];
                    const isDone=newH.length>=8,correct=newH.filter(h=>h.result).length;
                    await updateDoc(rRef(roomId),{'mgState.history':newH,'mgState.currentLetter':null,...(isDone?{'mgState.result':correct>=6?'win':'strike'}:{})});
                  };
                  return(
                    <div className="px-4 pb-3 mt-1 space-y-2 border-t border-zinc-800 pt-3">
                      <div className="text-xs text-zinc-500 uppercase tracking-widest">{apH.length}/8 · {apH.filter(h=>h.result).length} correctas</div>
                      {apL&&(<div className="grid grid-cols-2 gap-2">
                        <button onClick={()=>markL(true)} className="btn-j bg-lime-600 text-white font-black py-2.5 rounded-xl text-sm">✅ Correcto</button>
                        <button onClick={()=>markL(false)} className="btn-j bg-red-700 text-white font-black py-2.5 rounded-xl text-sm">❌ Incorrecto</button>
                      </div>)}
                      {!apL&&apH.length<8&&(<div className="grid grid-cols-5 gap-1">
                        {ALPHA.map(l=>{const used=apH.some(h=>h.letter===l);return(<button key={l} onClick={()=>!used&&pickL(l)} disabled={used}
                          className={`btn-j py-1.5 rounded-lg text-xs font-black ${used?'bg-zinc-800 text-zinc-600':'bg-zinc-700 hover:bg-amber-500 hover:text-black text-white'}`}>{l}</button>);})}
                      </div>)}
                    </div>
                  );
                }
                return null;
              })()}
            </>
          )}
        </div>
      </div>

      {/* ── EL FLOOR (bottom ~42%) ─────────────────────────── */}
      <div className="flex-1 overflow-y-auto scroll-y" style={{paddingBottom:'env(safe-area-inset-bottom)'}}>
        <TheFloor game={game} teams={teams} players={players} localId={localId}/>
      </div>

      {showPanel&&<ModPanel game={game} roomId={roomId} players={players} teams={teams} onClose={()=>setShowPanel(false)} onLeave={async()=>{try{await updateDoc(rRef(roomId),{status:'CLOSED'});}catch{}onLeave();setShowPanel(false);}}/>}
    </div>
  );
}

// ── MODERATOR PANEL ───────────────────────────────────────────
function ModPanel({game,roomId,players,teams,onClose,onLeave}){
  const [buzzQ,setBuzzQ]=useState('');
  const phase=game?.phase||'CURTAIN';
  const roundIdx=game?.roundIdx||0;
  const buzzLog=([...(game?.buzzLog||[])]).sort((a,b)=>a.ts-b.ts);

  const markResult=async(won)=>{
    const wt=game?.winnerTeamId;
    const newCursors={...(game?.spinCursors||{}),[wt]:((game?.spinCursors||{})[wt]||0)+1};
    // clearMg: reset minigame state + clear buzzer state for next round
    const clearMg={minigame:null,mgPhase:null,mgState:{},buzzCalled:[],buzzLog:[],buzzQuestion:'',buzzUnlockedAt:null};
    if(won){
      const newCW={...(game?.challengesWon||{}),[wt]:((game?.challengesWon||{})[wt]||0)+1};
      if(newCW[wt]>=5){
        // 🏆 5 CHALLENGES — equipo cobra todos los puntos acumulados
        const newScores={...(game?.teamScores||{})};
        newScores[wt]=(newScores[wt]||0)+(game?.accPts||0);
        await updateDoc(rRef(roomId),{...clearMg,teamScores:newScores,accPts:0,challengesWon:{...(game?.challengesWon||{}),[wt]:0},teamStrikes:{...(game?.teamStrikes||{}),[wt]:0},spinCursors:newCursors,roundIdx:roundIdx+1,phase:'CURTAIN'});
      } else {
        // ✅ Challenge ganado, sigue el mismo equipo (siguiente jugador gira)
        const tPlayers=players.filter(p=>p.teamId===wt);
        const nextSpinner=tPlayers[(newCursors[wt]||0)%tPlayers.length];
        await updateDoc(rRef(roomId),{...clearMg,challengesWon:newCW,teamStrikes:{...(game?.teamStrikes||{}),[wt]:0},spinCursors:newCursors,spinnerPlayerId:nextSpinner?.id||null,spinCount:0,spinTarget:null,phase:'SPIN_ASSIGN'});
      }
    } else {
      const newStrikes={...(game?.teamStrikes||{}),[wt]:((game?.teamStrikes||{})[wt]||0)+1};
      if(newStrikes[wt]>=3){
        // ⚠️ 3 STRIKES → Points Heist
        await updateDoc(rRef(roomId),{...clearMg,teamStrikes:newStrikes,phase:'HEIST'});
      } else {
        // ❌ Strike pero sigue — mismo equipo gira de nuevo (siguiente jugador)
        const teamPlayers=players.filter(p=>p.teamId===wt);
        const spinner=teamPlayers[newCursors[wt]%teamPlayers.length];
        await updateDoc(rRef(roomId),{...clearMg,teamStrikes:newStrikes,spinCursors:newCursors,spinnerPlayerId:spinner?.id||null,spinCount:0,spinTarget:null,phase:'SPIN_ASSIGN'});
      }
    }
  };

  const addPts=pts=>updateDoc(rRef(roomId),{accPts:(game?.accPts||0)+pts});

  return(
    <div className="fixed inset-0 z-50 flex">
      <div className="flex-1 bg-black/60" onClick={onClose}/>
      <div className="w-80 bg-zinc-900 border-l border-zinc-800 flex flex-col anim-drawer h-full">
        <div className="flex items-center justify-between px-5 py-4 border-b border-zinc-800 shrink-0">
          <span className="font-black text-white">⚙️ Panel de Moderador</span>
          <button onClick={onClose} className="btn-j text-zinc-500 hover:text-white text-xl">✕</button>
        </div>
        <div className="flex-1 scroll-y px-4 py-4 space-y-4">

          {/* Phase indicator */}
          <div className="bg-zinc-800 rounded-xl px-3 py-2 text-center">
            <span className="text-xs text-zinc-500 uppercase tracking-widest">Fase actual: </span>
            <span className="font-black text-lime-400 text-sm">{phase}</span>
            <span className="text-zinc-600 text-xs ml-2">· Ronda {roundIdx+1}</span>
          </div>

          {/* CURTAIN → manual skip (fallback si la animación no avanzó) */}
          {phase==='CURTAIN'&&(
            <button onClick={()=>updateDoc(rRef(roomId),{phase:'CALL_UP'})}
              className="btn-j w-full bg-zinc-700 hover:bg-zinc-600 border border-zinc-600 text-zinc-300 font-bold py-3 rounded-xl text-sm">
              ⏭ Skip cortinas
            </button>
          )}

          {/* CALL_UP / BUZZER — el flujo principal ya está inline en pantalla */}
          {(phase==='CALL_UP'||phase==='BUZZER')&&(
            <div className="bg-zinc-800/50 border border-zinc-700 rounded-xl px-3 py-2.5 text-center">
              <p className="text-zinc-500 text-xs">El flujo del buzzer está <span className="text-lime-400 font-bold">en pantalla</span> — no necesitas el panel aquí.</p>
            </div>
          )}

          {/* MINIGAME controls */}
          {phase==='MINIGAME'&&(()=>{
            const mg=MINIGAMES.find(m=>m.id===game?.minigame);
            const mgPh=game?.mgPhase;
            const s=game?.mgState||{};
            const startGame=(extra={})=>updateDoc(rRef(roomId),{mgPhase:'ACTIVE',mgState:{...extra}});
            const revealAnswers=()=>updateDoc(rRef(roomId),{'mgState.revealed':true,mgPhase:'REVEAL'});

            // Per-game controls
            const ttLevel=s.ttLevel||0;
            const ttResults=s.ttResults||[null,null,null];
            const passLevel=async()=>{
              const nr=[...ttResults];nr[ttLevel]=true;
              if(ttLevel>=2){await updateDoc(rRef(roomId),{'mgState.ttResults':nr});markResult(true);}
              else{await updateDoc(rRef(roomId),{'mgState.ttResults':nr,'mgState.ttLevel':ttLevel+1});}
            };
            const failLevel=async()=>{
              const nr=[...ttResults];nr[ttLevel]=false;
              await updateDoc(rRef(roomId),{'mgState.ttResults':nr});
              markResult(false);
            };

            const apHistory=s.history||[];
            const apLetter=s.currentLetter||null;
            const ALPHABET='ABCDEFGHIJKLMNÑOPQRSTUVWXYZ'.split('');
            const pickLetter=async(l)=>{
              await updateDoc(rRef(roomId),{'mgState.currentLetter':l});
            };
            const markLetter=async(result)=>{
              const newH=[...apHistory,{letter:apLetter,result}];
              await updateDoc(rRef(roomId),{'mgState.history':newH,'mgState.currentLetter':null});
              if(newH.length>=8){
                const correct=newH.filter(h=>h.result).length;
                markResult(correct>=6);
              }
            };

            return(
              <div className="space-y-3">
                {mg&&<div className="rounded-xl p-2.5 text-center" style={{background:`${mg.color}18`,border:`1px solid ${mg.color}55`}}>
                  <span className="text-lg">{mg.emoji}</span><span className="font-black ml-2 text-sm">{mg.label}</span>
                </div>}

                {/* Pot */}
                <div className="flex items-center justify-between bg-zinc-800 rounded-xl px-3 py-2">
                  <div className="flex gap-1.5">{[10,25,50,100].map(p=><button key={p} onClick={()=>addPts(p)} className="btn-j bg-emerald-900/70 border border-emerald-700 text-emerald-300 font-black px-2 py-1.5 rounded-lg text-xs">+{p}</button>)}</div>
                  <span className="text-amber-400 font-black text-sm">{game?.accPts||0} pts</span>
                </div>

                {/* START button (shows game on all screens) */}
                {!mgPh&&(
                  <button onClick={()=>{
                    if(game?.minigame==='silabas'||game?.minigame==='tilde')startGame({timerEnd:Date.now()+45000});
                    else startGame();
                  }} className="btn-j w-full bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl text-sm">
                    ▶ Iniciar {mg?.label}
                  </button>
                )}

                {/* TONGUE TWISTER controls */}
                {mgPh&&game?.minigame==='twister'&&ttLevel<3&&(
                  <div className="space-y-2">
                    <div className="text-xs text-zinc-500 uppercase tracking-widest">Nivel {ttLevel+1} · {['Fácil','Medio','Difícil'][ttLevel]}</div>
                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={passLevel} className="btn-j bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl text-sm">✅ {ttLevel<2?'Pasó → siguiente':'¡Los 3!→ WIN'}</button>
                      <button onClick={failLevel} className="btn-j bg-red-700 hover:bg-red-600 text-white font-black py-3 rounded-xl text-sm">❌ No pasó → Strike</button>
                    </div>
                  </div>
                )}

                {/* ALPHABET PYRAMID controls */}
                {mgPh&&game?.minigame==='piramide'&&(
                  <div className="space-y-2">
                    <div className="text-xs text-zinc-500 uppercase tracking-widest">{apHistory.length}/8 letras · {apHistory.filter(h=>h.result).length} correctas</div>
                    {apLetter&&(
                      <div className="grid grid-cols-2 gap-2">
                        <button onClick={()=>markLetter(true)} className="btn-j bg-lime-600 text-white font-black py-2.5 rounded-xl text-sm">✅ Correcto</button>
                        <button onClick={()=>markLetter(false)} className="btn-j bg-red-700 text-white font-black py-2.5 rounded-xl text-sm">❌ Incorrecto</button>
                      </div>
                    )}
                    {!apLetter&&apHistory.length<8&&(
                      <div className="grid grid-cols-5 gap-1">
                        {ALPHABET.map(l=>{
                          const used=apHistory.some(h=>h.letter===l);
                          return(<button key={l} onClick={()=>pickLetter(l)} disabled={used}
                            className={`btn-j py-1.5 rounded-lg text-xs font-black ${used?'bg-zinc-800 text-zinc-600 cursor-not-allowed':'bg-zinc-700 hover:bg-amber-500 hover:text-black text-white'}`}>{l}</button>);
                        })}
                      </div>
                    )}
                  </div>
                )}

                {/* SYLLABLES / THIS-OR-THAT / VOCAB controls */}
                {mgPh&&(game?.minigame==='silabas'||game?.minigame==='tilde')&&!s.revealed&&(
                  <button onClick={revealAnswers} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl text-sm">👁 Revelar respuestas</button>
                )}
                {mgPh&&game?.minigame==='vocab'&&!s.revealed&&(
                  <button onClick={revealAnswers} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl text-sm">👁 Revelar respuesta correcta</button>
                )}

                {/* WIN / STRIKE (shown after reveal or for non-interactive games) */}
                {(mgPh&&(s.revealed||(game?.minigame==='twister'&&ttLevel>=3)||(game?.minigame==='piramide'&&apHistory.length>=8)))&&(
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={()=>markResult(true)} className="btn-j bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl">✅ Win</button>
                    <button onClick={()=>markResult(false)} className="btn-j bg-red-700 hover:bg-red-600 text-white font-black py-3 rounded-xl">❌ Strike</button>
                  </div>
                )}
              </div>
            );
          })()}

          {/* HEIST controls */}
          {phase==='HEIST'&&(
            <div className="space-y-2">
              <div className="text-xs text-red-400 font-black uppercase tracking-widest">🚨 Points Heist</div>
              <div className="text-xs text-zinc-400">Pozo: <span className="text-amber-400 font-black">{game?.accPts||0} pts</span></div>
              {!game?.buzzQuestion&&(
                <div className="space-y-2">
                  <textarea rows={2} value={buzzQ} onChange={e=>setBuzzQ(e.target.value)}
                    className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-red-500 resize-none"
                    placeholder="Pregunta del heist..."/>
                  <button onClick={()=>updateDoc(rRef(roomId),{buzzQuestion:buzzQ,buzzLog:[]})} disabled={!buzzQ.trim()}
                    className="btn-j w-full bg-red-600 hover:bg-red-500 disabled:bg-zinc-800 disabled:text-zinc-600 text-white font-black py-2.5 rounded-xl text-sm">
                    👁 Mostrar pregunta
                  </button>
                </div>
              )}
              {game?.buzzQuestion&&!game?.buzzUnlockedAt&&(
                <button onClick={()=>updateDoc(rRef(roomId),{buzzUnlockedAt:Date.now()+5500,buzzLog:[]})}
                  className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-2.5 rounded-xl text-sm">
                  ⏱ ¿Ready? — Iniciar cuenta 5...
                </button>
              )}
              {buzzLog.length>0&&(
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={()=>{
                    const first=buzzLog[0];
                    if(!first)return;
                    const newScores={...(game?.teamScores||{})};
                    newScores[first.teamId]=(newScores[first.teamId]||0)+(game?.accPts||0);
                    updateDoc(rRef(roomId),{teamScores:newScores,accPts:0,buzzQuestion:'',buzzUnlockedAt:null,buzzLog:[],buzzCalled:[],challengesWon:{...Object.fromEntries(Object.keys(game?.challengesWon||{}).map(k=>[k,0]))},teamStrikes:{...(game?.teamStrikes||{}),[game?.winnerTeamId]:0},roundIdx:roundIdx+1,phase:'CURTAIN'});
                  }} className="btn-j bg-lime-600 text-white font-black py-2.5 rounded-xl text-sm">✅ 1° correcto</button>
                  <button onClick={()=>updateDoc(rRef(roomId),{buzzQuestion:'',buzzUnlockedAt:null,buzzLog:[],buzzCalled:[],accPts:0,roundIdx:roundIdx+1,phase:'CURTAIN'})}
                    className="btn-j bg-zinc-700 text-zinc-300 font-bold py-2.5 rounded-xl text-sm">⏭ Nadie supo</button>
                </div>
              )}
            </div>
          )}

          {/* Team scores quick view */}
          <div className="border-t border-zinc-800 pt-3 space-y-1.5">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Marcador</div>
            {teams.slice(0,game?.teamCount||2).map(t=>(
              <div key={t.id} className="flex items-center justify-between rounded-lg px-3 py-1.5" style={{background:`${t.color}15`}}>
                <span className="text-sm font-bold" style={{color:t.color}}>{t.name}</span>
                <div className="flex items-center gap-3">
                  <div className="flex gap-1">
                    {[0,1,2].map(i=><div key={i} className={`w-2 h-2 rounded-full ${i<(game?.teamStrikes?.[t.id]||0)?'bg-red-500':'bg-zinc-700'}`}/>)}
                  </div>
                  <span className="font-black text-white text-base">{game?.teamScores?.[t.id]||0}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="px-4 py-3 border-t border-zinc-800 shrink-0">
          <button onClick={onLeave} className="btn-j w-full bg-red-900/40 hover:bg-red-800 border border-red-700 text-red-300 font-bold py-2.5 rounded-xl text-sm">🚪 Cerrar sala</button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState(()=>IS_JOIN?(URL_CODE?'PROFILE':'JOIN'):'HOME');
  const [roomId,setRoomId]=useState(URL_CODE);
  const [isHost,setIsHost]=useState(false);
  const [localId,setLocalId]=useState(null);
  const [game,setGame]=useState(null);
  const [toast,setToast]=useState('');
  const [roomTeams,setRoomTeams]=useState(null); // fetched teams for profile
  const unsub=useRef(null);
  const toast_=msg=>mkToast(setToast,msg);

  // If opened directly with ?join=true&code=XXXX, fetch room teams for profile screen
  useEffect(()=>{
    if(IS_JOIN&&URL_CODE&&!roomTeams){
      getDoc(rRef(URL_CODE)).then(snap=>{
        if(snap.exists())setRoomTeams(snap.data().teams||[]);
        else mkToast(setToast,'❌ Sala no encontrada');
      }).catch(()=>mkToast(setToast,'❌ Error de conexión'));
    }
  },[]);

  const subscribeRoom=useCallback(id=>{
    if(unsub.current)unsub.current();
    unsub.current=onSnapshot(rRef(id),snap=>{
      if(snap.exists()){
        const d=snap.data();
        setGame(d);
        if(d.status==='PLAYING'&&screen!=='PLAYING') setScreen('PLAYING');
        if(d.status==='CLOSED') {toast_('⚠️ La sala fue cerrada');resetState();}
      } else {toast_('⚠️ Sala no encontrada');resetState();}
    });
  },[screen]);

  useEffect(()=>()=>unsub.current?.(),[]);

  // Re-subscribe on tab visibility restore (fixes screen-lock tab freeze on mobile)
  useEffect(()=>{
    const onVisible=()=>{
      if(document.visibilityState==='visible'&&roomId&&(screen==='LOBBY'||screen==='PLAYING')){
        subscribeRoom(roomId);
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[roomId,screen,subscribeRoom]);

  const resetState=()=>{setScreen(IS_JOIN?'JOIN':'HOME');setRoomId('');setGame(null);setLocalId(null);setIsHost(false);};

  // Validate code before profile
  const validateCode=async code=>{
    if(!code.trim())return toast_('⚠️ Ingresa un código');
    const c=code.trim().toUpperCase();
    try{
      const snap=await getDoc(rRef(c));
      if(!snap.exists())return toast_('❌ Sala no encontrada');
      const d=snap.data();
      if(d.status==='PLAYING')return toast_('❌ El show ya comenzó');
      if(d.status==='CLOSED')return toast_('❌ Sala cerrada');
      setRoomId(c); setRoomTeams(d.teams||[]); setIsHost(false); setScreen('PROFILE');
    }catch{toast_('❌ Error de conexión');}
  };

  const handleProfile=async(name,emoji,role,teamIdx=0)=>{
    if(isHost){
      const id=Math.random().toString(36).slice(2,6).toUpperCase();
      const r=mkRoom(name,emoji,role,4);
      await setDoc(rRef(id),r);
      setRoomId(id); setLocalId(role==='PLAYER_MOD'?1:'HOST'); setGame(r);
      subscribeRoom(id); setScreen('LOBBY');
    } else {
      let aid=null;
      try{
        await runTransaction(db,async txn=>{
          const snap=await txn.get(rRef(roomId));
          if(!snap.exists())throw new Error('NO_ROOM');
          const d=snap.data();
          if(d.status!=='LOBBY')throw new Error('STARTED');
          const ps=d.players||[];
          aid=ps.length+1;
          const newPlayer={id:aid,name,emoji,teamId:teamIdx,score:0};
          const newTeams=(d.teams||[]).map((t,i)=>i===teamIdx?{...t,players:[...t.players,name]}:t);
          txn.update(rRef(roomId),{players:[...ps,newPlayer],teams:newTeams});
        });
        setLocalId(aid); subscribeRoom(roomId); setScreen('LOBBY');
      }catch(e){toast_(e.message==='NO_ROOM'?'❌ Sala no encontrada':'❌ Error al unirse');resetState();}
    }
  };

  const startGame=async()=>{
    await updateDoc(rRef(roomId),{status:'PLAYING',phase:'CURTAIN'});
    setScreen('PLAYING');
  };

  const leaveRoom=async()=>{
    if(unsub.current)unsub.current();
    if(isHost){try{await updateDoc(rRef(roomId),{status:'CLOSED'});}catch{}}
    else{try{
      await runTransaction(db,async txn=>{
        const snap=await txn.get(rRef(roomId));
        if(!snap.exists())return;
        const d=snap.data();
        const newPs=d.players.filter(p=>p.id!==localId);
        // also remove from team players array
        const myP=d.players.find(p=>p.id===localId);
        const newTeams=d.teams.map(t=>({...t,players:t.players.filter(n=>n!==myP?.name)}));
        txn.update(rRef(roomId),{players:newPs,teams:newTeams});
      });
    }catch{}}
    resetState();
  };

  useEffect(()=>{
    if(screen==='LOBBY'&&game?.status==='PLAYING') setScreen('PLAYING');
  },[game?.status,screen]);

  return(
    <div className="h-full w-full bg-zinc-950 text-white">
      <Toast msg={toast}/>
      {screen==='HOME'   &&<ScreenHome    onCreate={()=>{setIsHost(true);setScreen('PROFILE');}} onJoin={validateCode}/>}
      {screen==='JOIN'   &&<ScreenJoin    onJoin={validateCode}/>}
      {screen==='PROFILE'&&<ScreenProfile isHost={isHost} teams={roomTeams} onSubmit={handleProfile} onBack={()=>{setScreen(IS_JOIN?(URL_CODE?'JOIN':'JOIN'):'HOME');setIsHost(false);setRoomId('');}}/>}
      {screen==='LOBBY'  &&game&&<ScreenLobby   game={game} roomId={roomId} isHost={isHost} localId={localId} onStart={startGame} onLeave={leaveRoom}/>}
      {screen==='PLAYING'&&game&&<ScreenPlaying game={game} roomId={roomId} isHost={isHost} localId={localId} onLeave={leaveRoom}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

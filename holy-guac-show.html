<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef,useCallback} from 'react';

import {getFirestore,doc,onSnapshot,updateDoc,setDoc} from 'firebase/firestore';

// ─── Firebase ────────────────────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:"AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",
  authDomain:"proyecto-periplo.firebaseapp.com",
  projectId:"proyecto-periplo",
  storageBucket:"proyecto-periplo.firebasestorage.app",
  messagingSenderId:"236795998392",
  appId:"1:236795998392:web:0da24b4f018611b55c844d"
},'hgs');
const db  = getFirestore(fbApp);
const REF = doc(db,'artifacts/periplo-app-v1/sessions/holy-guac-live');
const upd = o => updateDoc(REF, o);

// ─── URL role detection ──────────────────────────────────────────────────────
const P       = new URLSearchParams(window.location.search);
const UID     = P.get('uid') || '';
const IS_HOST = UID === 'teacher_anita_001' || UID === 'teacher_builder_001';
const IS_SHOW = !IS_HOST && !P.get('student') && P.get('screen') !== null || (!IS_HOST && !P.get('student'));
// Simplified: host=uid param, student=student param, show=default (no params)
// IS_HOST  → conductor control panel
// IS_STUD  → player join/phone view
// default  → big show screen (what gets shared on Zoom)
const IS_STUD = P.get('student') === 'true' || P.get('player') === 'true';

// ─── Constants ───────────────────────────────────────────────────────────────
const MINIGAMES = [
  {id:'taquero', label:'El Taquero Sordo',        emoji:'🌮',color:'#ef4444',format:'2v2'},
  {id:'twister', label:'Tongue Twister',           emoji:'👅',color:'#f97316',format:'2v2'},
  {id:'acentos', label:'Aguda, Grave o Esdrújula', emoji:'👏',color:'#eab308',format:'equipo'},
  {id:'silabas', label:'How Many Syllables?',      emoji:'🔢',color:'#22c55e',format:'individual'},
  {id:'tilde',   label:'This or That',             emoji:'↔️',color:'#06b6d4',format:'TvT'},
  {id:'anagrama',label:'Group Anagram',            emoji:'🔤',color:'#3b82f6',format:'TvT'},
  {id:'piramide',label:'Alphabet Pyramid',         emoji:'🔺',color:'#8b5cf6',format:'individual'},
  {id:'vocab',   label:'Vocab Multiple Choice',    emoji:'📝',color:'#ec4899',format:'individual'},
];

const TEAM_DEF = [
  {key:'t0',name:'Los Tacos',    emoji:'🌮',hex:'#f59e0b'},
  {key:'t1',name:'Los Chiles',   emoji:'🌶️',hex:'#22c55e'},
  {key:'t2',name:'Los Limones',  emoji:'🍋', hex:'#ca8a04'},
  {key:'t3',name:'Los Aguacates',emoji:'🥑', hex:'#14b8a6'},
];

const EMOJIS = ['😄','😎','🤩','🥳','🔥','⚡','🌟','💪','🎯','🚀','🦊','🐺','🦁','🐯','🦄','🌶️','🌮','🥑','🎸','🏆'];

const mkSession = (tc=4) => ({
  status:'lobby', teamCount:tc,
  teams: TEAM_DEF.slice(0,tc).map(t=>({...t,score:0,players:[]})),
  activeTeamIdx:0, strikes:0, accumulatedPts:0,
  spinCount:0, spinTarget:null, minigame:null,
  stealActive:false, stealQuestion:'', stealAnswered:false, stealWinnerIdx:null,
  players:{},
});

// ─── Shared: Roulette Wheel ───────────────────────────────────────────────────
function RouletteWheel({spinCount,spinTarget,revealed}){
  const [angle,setAngle]   = useState(0);
  const [anim,setAnim]     = useState(false);
  const acc   = useRef(0);
  const prev  = useRef(0);

  useEffect(()=>{
    if(!spinCount||spinCount===prev.current||spinTarget===null) return;
    prev.current = spinCount;
    const seg=45, tmod=spinTarget*seg+seg/2, cmod=acc.current%360;
    const diff=((tmod-cmod)%360+360)%360||360;
    const nxt=acc.current+360*6+diff;
    acc.current=nxt; setAnim(true); setAngle(nxt);
    setTimeout(()=>setAnim(false),4700);
  },[spinCount,spinTarget]);

  const cx=150,cy=150,R=138,inn=40;
  const segs=MINIGAMES.map((mg,i)=>{
    const a1=(i*45-90)*Math.PI/180, a2=((i+1)*45-90)*Math.PI/180, mid=(i*45-90+22.5)*Math.PI/180;
    const path=[
      `M ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)}`,
      `L ${cx+R*Math.cos(a1)}   ${cy+R*Math.sin(a1)}`,
      `A ${R} ${R} 0 0 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}`,
      `L ${cx+inn*Math.cos(a2)} ${cy+inn*Math.sin(a2)}`,
      `A ${inn} ${inn} 0 0 0 ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)} Z`,
    ].join(' ');
    const ex=cx+93*Math.cos(mid), ey=cy+93*Math.sin(mid);
    const win=revealed&&spinTarget===i;
    return(
      <g key={i}>
        <path d={path} fill={mg.color} stroke="#0a0a0a" strokeWidth="2.5" opacity={revealed?(win?1:.3):.88}/>
        <text x={ex} y={ey} textAnchor="middle" dominantBaseline="middle" fontSize={win?'20':'15'}>{mg.emoji}</text>
      </g>
    );
  });

  return(
    <div className="relative flex items-center justify-center" style={{width:300,height:300}}>
      <div className="absolute text-white text-2xl z-10 drop-shadow-lg" style={{top:-10,left:'50%',transform:'translateX(-50%)'}}>▼</div>
      <div style={{transform:`rotate(${angle}deg)`,transition:anim?'transform 4.5s cubic-bezier(.04,0,.08,1)':'none',transformOrigin:'50% 50%'}}>
        <svg viewBox="0 0 300 300" width="292" height="292">
          {segs}
          <circle cx="150" cy="150" r="139" fill="none" stroke="#ffffff18" strokeWidth="4"/>
          <circle cx="150" cy="150" r="40"  fill="#111827" stroke="#ffffff22" strokeWidth="2"/>
          <text   x="150"  y="150"  textAnchor="middle" dominantBaseline="middle" fontSize="20">🌶️</text>
          {MINIGAMES.map((_,i)=>{const a=(i*45-90)*Math.PI/180;return(
            <line key={i} x1={cx+inn*Math.cos(a)} y1={cy+inn*Math.sin(a)} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="#0a0a0a" strokeWidth="2"/>
          );})}
        </svg>
      </div>
      {revealed&&<div className="absolute inset-0 rounded-full pointer-events-none anim-glow" style={{border:`3px solid ${MINIGAMES[spinTarget]?.color||'#eab308'}`}}/>}
    </div>
  );
}

// ─── Shared: Strike display ───────────────────────────────────────────────────
function Strikes({count}){
  return(
    <div className="flex gap-2 justify-center">
      {[0,1,2].map(i=>(
        <div key={i} className={`w-9 h-9 rounded-full flex items-center justify-center font-black text-sm border-2 transition-all ${i<count?'bg-red-500 border-red-400 text-white anim-str':'bg-zinc-800 border-zinc-700 text-zinc-600'}`}>
          {i<count?'✕':'○'}
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════════
// SHOW SCREEN  (big display / Zoom shared tab — no uid params)
// ════════════════════════════════════════════════════════════════════════════════
function ShowLobby({s}){
  const teams=(s.teams||[]).slice(0,s.teamCount||4);
  return(
    <div className="h-full flex flex-col items-center justify-center gap-8 p-8" style={{background:'radial-gradient(ellipse at 50% 0%,rgba(234,179,8,.12) 0%,transparent 60%),#09090b'}}>
      <div className="text-center anim-float">
        <div className="text-7xl mb-2">🌶️</div>
        <h1 className="text-5xl font-black tracking-tight bg-gradient-to-r from-amber-400 to-lime-400 bg-clip-text text-transparent">HOLY GUACAMOLE</h1>
        <p className="text-lime-500 font-bold tracking-[.25em] text-sm uppercase mt-1">Game Show</p>
      </div>
      <div className={`grid gap-4 w-full max-w-4xl ${s.teamCount===2?'grid-cols-2':'grid-cols-2 md:grid-cols-4'}`}>
        {teams.map(t=>(
          <div key={t.key} className="rounded-2xl p-4 text-center anim-up" style={{background:`${t.hex}1a`,border:`2px solid ${t.hex}55`}}>
            <div className="text-4xl mb-1">{t.emoji}</div>
            <div className="font-black text-white text-sm">{t.name}</div>
            <div className="mt-3 space-y-1 min-h-8">
              {(t.players||[]).map((p,i)=><div key={i} className="text-xs bg-zinc-800 rounded-full px-2 py-0.5 text-zinc-200">{p}</div>)}
              {!(t.players||[]).length&&<div className="text-xs text-zinc-600 italic">esperando...</div>}
            </div>
          </div>
        ))}
      </div>
      <p className="text-zinc-600 text-xs tracking-widest animate-pulse uppercase">Esperando al conductor...</p>
    </div>

}

function ShowGame({s}){
  const teams=(s.teams||[]).slice(0,s.teamCount||4);
  const active=teams[s.activeTeamIdx]||teams[0]||TEAM_DEF[0];
  const mg=s.minigame?MINIGAMES.find(m=>m.id===s.minigame):null;
  return(
    <div className="h-full flex flex-col" style={{background:'#09090b'}}>
      {/* Scoreboard */}
      <div className="flex border-b border-zinc-800/80 bg-zinc-900/60">
        {teams.map((t,i)=>{const on=i===s.activeTeamIdx; return(
          <div key={t.key} className={`flex-1 flex flex-col items-center py-2 px-2 transition-all ${on?'opacity-100':'opacity-50'}`}>
            <div className="rounded-xl px-2 py-1 w-full text-center" style={{background:on?`${t.hex}22`:'transparent',border:`${on?2:1}px solid ${on?t.hex:'#3f3f46'}`}}>
              <div className="text-lg">{t.emoji}</div>
              <div className="text-xs font-bold truncate" style={{color:t.hex}}>{t.name}</div>
              <div className="text-2xl font-black text-white">{t.score}</div>
            </div>
          </div>
        );})}
      </div>
      {/* Main */}
      <div className="flex-1 flex items-center justify-center gap-10 p-6">
        <div className="flex flex-col items-center gap-4">
          <RouletteWheel spinCount={s.spinCount||0} spinTarget={s.spinTarget} revealed={!!mg}/>
          {mg&&<div className="rounded-2xl px-6 py-3 text-center anim-pop" style={{background:`${mg.color}25`,border:`2px solid ${mg.color}99`}}>
            <span className="text-2xl">{mg.emoji}</span>
            <span className="text-white font-black text-lg ml-2">{mg.label}</span>
            <div className="text-zinc-400 text-xs mt-0.5 uppercase tracking-wider">{mg.format}</div>
          </div>}
        </div>
        <div className="flex flex-col items-center gap-5 w-52">
          <div className="rounded-2xl p-4 text-center w-full" style={{background:`${active.hex}22`,border:`2px solid ${active.hex}`}}>
            <div className="text-4xl">{active.emoji}</div>
            <div className="font-black text-white text-sm mt-1">{active.name}</div>
            <div className="text-xs mt-1" style={{color:active.hex}}>jugando ahora</div>
          </div>
          <div className="text-center">
            <div className="text-xs text-zinc-500 uppercase tracking-widest">en juego</div>
            <div className="text-6xl font-black text-amber-400">{s.accumulatedPts||0}</div>
            <div className="text-xs text-zinc-500">pts</div>
          </div>
          <div className="text-center w-full">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">strikes</div>
            <Strikes count={s.strikes||0}/>
          </div>
        </div>
      </div>
      {/* Steal overlay */}
      {s.stealActive&&(
        <div className="absolute inset-0 bg-black/85 flex items-center justify-center z-50">
          <div className="bg-zinc-900 border-2 border-amber-500 rounded-3xl p-10 text-center max-w-lg mx-4 anim-pop">
            <div className="text-5xl mb-3">⚡</div>
            <div className="text-amber-400 font-black text-xl uppercase tracking-widest mb-4">¡Reto de Robo!</div>
            <div className="text-white text-2xl font-bold leading-snug">{s.stealQuestion}</div>
            {s.stealAnswered&&s.stealWinnerIdx!==null&&(
              <div className="mt-6 text-green-400 font-black text-xl anim-pop">🏆 {teams[s.stealWinnerIdx]?.name} roba los puntos</div>
            )}
          </div>
        </div>
      )}

  );
}

function ShowPodium({s}){
  const teams=[...(s.teams||[])].slice(0,s.teamCount||4).sort((a,b)=>b.score-a.score);
  useEffect(()=>{confetti({particleCount:200,spread:80,origin:{y:.6}});},[]);
  return(
    <div className="h-full flex flex-col items-center justify-center gap-8 p-8" style={{background:'radial-gradient(ellipse at 50% 30%,rgba(234,179,8,.15) 0%,transparent 70%),#09090b'}}>
      <div className="text-5xl font-black text-amber-400">¡Fin del Show! 🎉</div>
      <div className="flex items-end gap-6 mt-4">
        {teams.map((t,rank)=>{
          const hs=['h-48','h-36','h-28','h-20'], ms=['🥇','🥈','🥉','4️⃣'];
          return(
            <div key={t.key} className="flex flex-col items-center gap-2 anim-up" style={{animationDelay:`${rank*.1}s`}}>
              <div className="text-3xl">{ms[rank]}</div>
              <div className="text-white font-black text-sm">{t.name}</div>
              <div className="text-2xl font-black" style={{color:t.hex}}>{t.score}</div>
              <div className={`${hs[rank]} w-24 rounded-2xl flex items-end justify-center pb-3`} style={{background:`${t.hex}33`,border:`2px solid ${t.hex}`}}>
                <div className="text-4xl">{t.emoji}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════════
// CONDUCTOR  (teacher — opened from index via ?uid=teacher_*)
// ════════════════════════════════════════════════════════════════════════════════
function ConductorConfig({s,onReset}){
  const [names,setNames]=useState(TEAM_DEF.map(t=>t.name));
  const tc=s.teamCount||4;
  const players=Object.entries(s.players||{});

  const applyNames=async()=>{
    const nt=(s.teams||[]).map((t,i)=>({...t,name:names[i]||t.name}));
    await upd({teams:nt});
  };
  const assignPlayer=async(pid,pdata,ti)=>{
    const nt=(s.teams||[]).map((t,i)=>{
      const f=(t.players||[]).filter(n=>n!==pdata.name);
      return i===ti?{...t,players:[...f,pdata.name]}:{...t,players:f};
    });
    await upd({[`players.${pid}.teamIdx`]:ti,teams:nt});
  };
  const setTC=async n=>{if(window.confirm(`¿Cambiar a ${n} equipos? Reinicia sesión.`))onReset(n);};

  return(
    <div className="space-y-5 pb-8">
      <div>
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Equipos</div>
        <div className="flex gap-2">
          {[2,4].map(n=>(
            <button key={n} onClick={()=>tc!==n&&setTC(n)} className={`btn flex-1 py-2 rounded-xl font-bold ${tc===n?'bg-lime-500 text-black':'bg-zinc-800 text-zinc-400'}`}>{n} equipos</button>
          ))}
        </div>
      </div>
      <div>
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Nombres</div>
        {TEAM_DEF.slice(0,tc).map((t,i)=>(
          <div key={t.key} className="flex items-center gap-2 mb-2">
            <span className="w-6">{t.emoji}</span>
            <input className="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-500" value={names[i]} onChange={e=>{const n=[...names];n[i]=e.target.value;setNames(n);}}/>
            <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:t.hex}}/>
          </div>
        ))}
        <button onClick={applyNames} className="btn w-full bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-2 rounded-xl text-sm">Aplicar nombres</button>
      </div>
      <div>
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs text-zinc-500 uppercase tracking-widest">Jugadores ({players.length})</div>
          <span className="text-xs text-zinc-600">Abre: holy-guac-show.html?student=true</span>
        </div>
        {players.length===0
          ?<div className="text-zinc-600 text-sm text-center py-4 bg-zinc-900 rounded-xl italic">Nadie conectado aún</div>
          :<div className="space-y-2">
            {players.map(([pid,p])=>{
              const at=p.teamIdx>=0?(s.teams||[])[p.teamIdx]:null;
              return(
                <div key={pid} className="bg-zinc-900 rounded-xl px-3 py-2">
                  <div className="flex items-center justify-between mb-1.5">
                    <span className="font-semibold text-sm">{p.emoji||'😄'} {p.name}</span>
                    {at?<span className="text-xs font-bold" style={{color:at.hex}}>{at.emoji} {at.name}</span>:<span className="text-xs text-zinc-600">sin equipo</span>}
                  </div>
                  <div className="flex gap-1.5 flex-wrap">
                    {(s.teams||[]).slice(0,tc).map((t,ti)=>(
                      <button key={t.key} onClick={()=>assignPlayer(pid,p,ti)}
                        className="btn text-xs px-2 py-1 rounded-lg font-bold"
                        style={{background:p.teamIdx===ti?`${t.hex}40`:'#27272a',color:p.teamIdx===ti?t.hex:'#71717a',border:`1px solid ${p.teamIdx===ti?t.hex:'#3f3f46'}`}}>
                        {t.emoji} {t.name}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        }
      </div>
      <div className="flex gap-2 pt-2">
        <button onClick={()=>upd({status:'active'})} disabled={s.status==='active'}
          className="btn flex-1 bg-lime-500 disabled:bg-zinc-800 disabled:text-zinc-600 text-black font-black py-3 rounded-xl">
          {s.status==='active'?'▶ En curso':'▶ Comenzar Show'}
        </button>
        <button onClick={()=>upd({status:'podium'})} className="btn px-4 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold rounded-xl text-sm">🏆 Podio</button>
      </div>
    </div>
  );
}

function ConductorJuego({s}){
  const teams=(s.teams||[]).slice(0,s.teamCount||4);
  const active=teams[s.activeTeamIdx||0]||teams[0];
  const mg=s.minigame?MINIGAMES.find(m=>m.id===s.minigame):null;
  const strikes=s.strikes||0, acc=s.accumulatedPts||0;
  const [spinning,setSpinning]=useState(false);

  const spin=async()=>{
    if(spinning) return; setSpinning(true);
    const t=Math.floor(Math.random()*8);
    await upd({spinCount:(s.spinCount||0)+1,spinTarget:t,minigame:MINIGAMES[t].id});
    setTimeout(()=>setSpinning(false),4800);
  };
  const addPts=pts=>upd({accumulatedPts:acc+pts});
  const addStrike=async()=>{
    const n=strikes+1;
    n>=3?await upd({strikes:3,stealActive:true}):await upd({strikes:n});
  };
  const award=async()=>{
    if(!active||acc<=0) return;
    const nt=teams.map((t,i)=>i===s.activeTeamIdx?{...t,score:(t.score||0)+acc}:t);
    await upd({teams:nt,accumulatedPts:0,strikes:0,minigame:null});
  };
  const reset=()=>upd({accumulatedPts:0,strikes:0,minigame:null,stealActive:false});
  const next=()=>upd({activeTeamIdx:((s.activeTeamIdx||0)+1)%teams.length,strikes:0,accumulatedPts:0,minigame:null,stealActive:false,stealQuestion:'',stealAnswered:false,stealWinnerIdx:null});

  return(
    <div className="space-y-4 pb-8">
      {active&&<div className="rounded-2xl p-3 flex items-center justify-between" style={{background:`${active.hex}1a`,border:`2px solid ${active.hex}55`}}>
        <div><div className="text-xs text-zinc-500">Equipo activo</div><div className="text-lg font-black">{active.emoji} {active.name}</div></div>
        <div className="text-right"><div className="text-xs text-zinc-500">total</div><div className="text-2xl font-black" style={{color:active.hex}}>{active.score}</div></div>
      </div>}

      <button onClick={spin} disabled={spinning||s.status!=='active'}
        className="btn w-full py-4 rounded-2xl font-black text-xl text-black disabled:opacity-40"
        style={{background:spinning?'#6b7280':'linear-gradient(135deg,#fbbf24,#84cc16)'}}>
        {spinning?'🌀 Girando...':'🎡 GIRAR RULETA'}
      </button>

      {mg?<div className="rounded-2xl p-3 text-center" style={{background:`${mg.color}18`,border:`2px solid ${mg.color}66`}}>
        <span className="text-2xl">{mg.emoji}</span>
        <span className="font-black text-white ml-2">{mg.label}</span>
        <span className="text-xs text-zinc-400 ml-2 uppercase">{mg.format}</span>
      </div>:<div className="rounded-2xl p-3 text-center bg-zinc-900 border border-zinc-800 text-zinc-600 text-sm">Gira para elegir mini-juego</div>}

      <div>
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Añadir al pozo</div>
        <div className="grid grid-cols-4 gap-2">
          {[10,25,50,100].map(p=>(
            <button key={p} onClick={()=>addPts(p)} className="btn bg-emerald-900/60 hover:bg-emerald-800 border border-emerald-700 text-emerald-300 font-black py-3 rounded-xl text-sm">+{p}</button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div className="bg-zinc-900 rounded-2xl p-3 text-center border border-zinc-800">
          <div className="text-xs text-zinc-500 uppercase tracking-widest">Pozo</div>
          <div className="text-4xl font-black text-amber-400">{acc}</div>
        </div>
        <div className="bg-zinc-900 rounded-2xl p-3 text-center border border-zinc-800">
          <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Strikes</div>
          <Strikes count={strikes}/>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-2">
        <button onClick={addStrike} disabled={strikes>=3} className="btn bg-red-900/60 hover:bg-red-800 border border-red-700 text-red-300 font-bold py-2.5 rounded-xl text-sm disabled:opacity-30">✕ Strike (+1)</button>
        <button onClick={()=>upd({strikes:Math.max(0,strikes-1)})} disabled={strikes<=0} className="btn bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold py-2.5 rounded-xl text-sm disabled:opacity-30">← Quitar</button>
      </div>

      <div className="space-y-2">
        <button onClick={award} disabled={acc<=0} className="btn w-full bg-lime-600 hover:bg-lime-500 disabled:bg-zinc-800 disabled:text-zinc-600 text-white font-black py-3 rounded-xl">
          🏆 Otorgar {acc} pts → {active?.name}
        </button>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={reset}  className="btn bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold py-2.5 rounded-xl text-sm">🔄 Resetear</button>
          <button onClick={next}   className="btn bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-2.5 rounded-xl text-sm">Siguiente →</button>
        </div>
      </div>

      <div className="border-t border-zinc-800 pt-4 space-y-1.5">
        {teams.map((t,i)=>(
          <div key={t.key} className="flex items-center justify-between rounded-xl px-3 py-2 cursor-pointer transition-all"
            style={{background:i===s.activeTeamIdx?`${t.hex}1a`:'#18181b',border:`${i===s.activeTeamIdx?2:1}px solid ${i===s.activeTeamIdx?t.hex:'#3f3f46'}`}}
            onClick={()=>upd({activeTeamIdx:i})}>
            <span className="text-sm">{t.emoji} <span className="font-semibold">{t.name}</span></span>
            <span className="font-black text-lg" style={{color:t.hex}}>{t.score}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ConductorRobo({s}){
  const teams=(s.teams||[]).slice(0,s.teamCount||4);
  const acc=s.accumulatedPts||0;
  const [q,setQ]=useState('');

  const show=async()=>upd({stealActive:true,stealQuestion:q,stealAnswered:false,stealWinnerIdx:null});
  const award=async ti=>{
    const nt=teams.map((t,i)=>i===ti?{...t,score:(t.score||0)+acc}:t);
    await upd({teams:nt,stealActive:false,stealAnswered:true,stealWinnerIdx:ti,accumulatedPts:0,strikes:0,minigame:null});
    setTimeout(()=>upd({stealAnswered:false,stealWinnerIdx:null,stealQuestion:''}),3000);
  };

  return(
    <div className="space-y-4 pb-8">
      <div className="rounded-2xl p-4 bg-amber-500/10 border border-amber-500/40">
        <div className="text-sm text-amber-300 font-bold mb-1">⚡ Puntos en juego</div>
        <div className="text-3xl font-black text-amber-400">{acc} pts</div>
      </div>
      <div>
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Pregunta flash</div>
        <textarea rows={3} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-amber-500 resize-none" placeholder="Escribe la pregunta que verán en pantalla..." value={q} onChange={e=>setQ(e.target.value)}/>
        <div className="flex gap-2 mt-2">
          <button onClick={show} disabled={!q.trim()||acc<=0} className="btn flex-1 bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-black font-black py-2.5 rounded-xl text-sm">⚡ Mostrar en pantalla</button>
          {s.stealActive&&<button onClick={()=>upd({stealActive:false,stealQuestion:'',stealAnswered:false,stealWinnerIdx:null})} className="btn px-4 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold rounded-xl text-sm">✕</button>}
        </div>
      </div>
      {s.stealActive&&<div className="rounded-xl p-3 bg-amber-500/10 border border-amber-500 text-center">
        <div className="text-amber-400 font-bold text-sm animate-pulse">⚡ Visible en pantalla</div>
        <div className="text-white text-sm mt-1">{s.stealQuestion}</div>
      </div>}
      <div>
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">¿Quién ganó el reto?</div>
        {teams.map((t,i)=>(
          <button key={t.key} onClick={()=>award(i)} disabled={acc<=0}
            className="btn w-full flex items-center justify-between rounded-xl px-4 py-3 mb-2 disabled:opacity-30 transition-all"
            style={{background:`${t.hex}18`,border:`2px solid ${t.hex}55`}}>
            <span className="font-bold">{t.emoji} {t.name}</span>
            <span className="font-black text-sm" style={{color:t.hex}}>+{acc} pts →</span>
          </button>
        ))}
      </div>
      <div className="border-t border-zinc-800 pt-4">
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Ajuste manual</div>
        <div className="grid grid-cols-2 gap-2">
          {teams.map((t,i)=>(
            <div key={t.key} className="bg-zinc-900 rounded-xl p-2 border border-zinc-800">
              <div className="text-xs mb-1.5" style={{color:t.hex}}>{t.emoji} {t.name}</div>
              <div className="flex gap-1">
                {[-10,+10].map(d=>(
                  <button key={d} onClick={()=>{const nt=teams.map((tt,ii)=>ii===i?{...tt,score:Math.max(0,(tt.score||0)+d)}:tt);upd({teams:nt});}}
                    className="btn flex-1 text-xs font-bold py-1 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300">
                    {d>0?'+':''}{d}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

    <div className="h-full flex flex-col bg-zinc-950">
      <div className="flex items-center justify-between px-4 py-3 border-b border-zinc-800 bg-zinc-900/80 shrink-0">
        <div className="flex items-center gap-2">
          <span className="text-xl">🌶️</span>

          <button onClick={()=>window.open('holy-guac-show.html','_blank')}

// STUDENT  (phone — ?student=true)
// ════════════════════════════════════════════════════════════════════════════════
function StudentJoin({s,onJoin}){
  const [name,setName]=useState('');
  const [emoji,setEmoji]=useState('😄');
  const [team,setTeam]=useState(null);
  const teams=(s?.teams||[]).slice(0,s?.teamCount||4);
  const [step,setStep]=useState(0); // 0=name, 1=emoji, 2=team

  const proceed=()=>{
    if(step===0&&name.trim()) setStep(1);
    else if(step===1) setStep(2);
    else if(step===2&&team!==null) onJoin(name.trim(),emoji,team);
  };

  return(
    <div className="h-full flex flex-col items-center justify-center p-6 gap-6" style={{background:'radial-gradient(ellipse at 50% 0%,rgba(234,179,8,.1) 0%,transparent 60%),#09090b'}}>
      <div className="text-center anim-float">
        <div className="text-5xl">🌶️</div>
        <h1 className="text-3xl font-black mt-2 bg-gradient-to-r from-amber-400 to-lime-400 bg-clip-text text-transparent">Holy Guacamole</h1>
        <p className="text-zinc-500 text-sm">Game Show</p>
      </div>

      <div className="w-full max-w-xs space-y-4 anim-up">
        {/* Step 0: Name */}
        <div className={step===0?'block':'opacity-50'}>
          <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">Tu nombre</div>
          <input className="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white text-xl text-center focus:outline-none focus:border-lime-500 transition-colors"
            placeholder="¿Cómo te llamas?" value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&proceed()} autoFocus disabled={step!==0}/>
        </div>

        {/* Step 1: Emoji */}
        {step>=1&&(
          <div className="anim-up">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Tu emoji</div>
            <div className="grid grid-cols-5 gap-2">
              {EMOJIS.map(e=>(
                <button key={e} onClick={()=>setEmoji(e)}
                  className={`btn text-2xl rounded-xl py-2 transition-all ${emoji===e?'bg-lime-500/30 ring-2 ring-lime-400':'bg-zinc-800 hover:bg-zinc-700'}`}
                  disabled={step!==1}>
                  {e}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 2: Team */}
        {step>=2&&(
          <div className="anim-up">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Tu equipo</div>
            <div className="space-y-2">
              {teams.map((t,i)=>(
                <button key={t.key} onClick={()=>setTeam(i)}
                  className="btn w-full flex items-center gap-3 rounded-2xl px-4 py-3 transition-all"
                  style={{background:team===i?`${t.hex}33`:'#18181b',border:`${team===i?2:1}px solid ${team===i?t.hex:'#3f3f46'}`}}>
                  <span className="text-2xl">{t.emoji}</span>
                  <span className="font-bold text-white">{t.name}</span>
                  <span className="ml-auto text-xs text-zinc-500">{(t.players||[]).length} jugadores</span>
                </button>
              ))}
            </div>
          </div>
        )}

        <button onClick={proceed}
          disabled={(step===0&&!name.trim())||(step===2&&team===null)}
          className="btn w-full bg-lime-500 hover:bg-lime-400 active:scale-95 disabled:bg-zinc-800 disabled:text-zinc-600 text-black font-black py-4 rounded-2xl text-lg transition-all">
          {step<2?'Siguiente →':'¡Entrar al Show! 🔥'}
        </button>
      </div>
    </div>
  );
}

function StudentGame({s,playerName,playerEmoji,playerTeamIdx}){
  const teams=(s.teams||[]).slice(0,s.teamCount||4);
  const myTeam=teams[playerTeamIdx]||null;
  const mg=s.minigame?MINIGAMES.find(m=>m.id===s.minigame):null;
  const isLobby=s.status==='lobby';
  return(
    <div className="h-full flex flex-col p-5 gap-4 scroll-y" style={{background:'#09090b'}}>
      {myTeam?(
        <div className="rounded-2xl p-4 text-center anim-pop" style={{background:`${myTeam.hex}22`,border:`2px solid ${myTeam.hex}`}}>
          <div className="text-4xl">{playerEmoji} <span className="text-2xl">{myTeam.emoji}</span></div>
          <div className="font-black text-white mt-1">{playerName}</div>
          <div className="text-xs mt-0.5" style={{color:myTeam.hex}}>{myTeam.name}</div>
        </div>
      ):(
        <div className="rounded-2xl p-4 text-center bg-zinc-900 border border-zinc-700">
          <div className="text-zinc-500 text-sm animate-pulse">{isLobby?'El conductor te asignará equipo...':'Esperando asignación...'}</div>
        </div>
      )}
      {!isLobby&&mg&&(
        <div className="rounded-2xl p-4 text-center anim-pop" style={{background:`${mg.color}22`,border:`2px solid ${mg.color}77`}}>
          <div className="text-2xl">{mg.emoji}</div>
          <div className="font-bold text-white text-sm">{mg.label}</div>
          <div className="text-xs text-zinc-400 uppercase tracking-wide mt-0.5">{mg.format}</div>
        </div>
      )}
      <div className="space-y-2">
        <div className="text-zinc-500 text-xs uppercase tracking-widest">Marcador</div>
        {teams.map((t,i)=>(
          <div key={t.key} className="flex items-center justify-between rounded-xl px-4 py-2.5 transition-all"
            style={{background:i===s.activeTeamIdx?`${t.hex}22`:'#18181b',border:`${i===s.activeTeamIdx?2:1}px solid ${i===s.activeTeamIdx?t.hex:'#3f3f46'}`}}>
            <span className="text-sm">{t.emoji} <span className="font-semibold text-white">{t.name}</span></span>
            <span className="font-black text-white text-lg">{t.score}</span>
          </div>
        ))}
      </div>
      {s.stealActive&&(
        <div className="rounded-2xl p-5 text-center anim-pop border-2 border-amber-500 bg-amber-500/10">
          <div className="text-3xl mb-2">⚡</div>
          <div className="text-amber-400 font-black uppercase tracking-wide text-sm mb-2">¡Reto de Robo!</div>
          <div className="text-white font-bold">{s.stealQuestion}</div>
        </div>
      )}
      {isLobby&&<p className="text-zinc-600 text-xs text-center animate-pulse mt-auto">El show comenzará pronto...</p>}
    </div>
  );
}

// ROOT APP
// ════════════════════════════════════════════════════════════════════════════════
function App(){
  const [s,setS]             = useState(null);
  const [loading,setLoading] = useState(true);
  // Student state (persisted in localStorage)
  const [pName,setPName]     = useState(()=>localStorage.getItem('hg_name')||'');
  const [pEmoji,setPEmoji]   = useState(()=>localStorage.getItem('hg_emoji')||'😄');
  const [pTeam,setPTeam]     = useState(()=>{ const v=localStorage.getItem('hg_team'); return v===null?-1:Number(v); });
  const [joined,setJoined]   = useState(()=>!!localStorage.getItem('hg_name')&&localStorage.getItem('hg_team')!==null);

  useEffect(()=>{
    const unsub=onSnapshot(REF,snap=>{
      setS(snap.exists()?snap.data():null);
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  const handleJoin=useCallback(async(name,emoji,teamIdx)=>{
    localStorage.setItem('hg_name', name);
    localStorage.setItem('hg_emoji',emoji);
    localStorage.setItem('hg_team', String(teamIdx));
    setPName(name); setPEmoji(emoji); setPTeam(teamIdx);

    const pid=`p_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    const session=s||mkSession();
    const newTeams=(session.teams||[]).map((t,i)=>{
      const f=(t.players||[]).filter(n=>n!==name);
      return i===teamIdx?{...t,players:[...f,name]}:{...t,players:f};
    });
    const payload={ [`players.${pid}`]:{name,emoji,teamIdx,joinedAt:Date.now()}, teams:newTeams };
    try { await upd(payload); }
    catch { await setDoc(REF,{...mkSession(),players:{[pid]:{name,emoji,teamIdx,joinedAt:Date.now()}},teams:newTeams}); }
    setJoined(true);
  },[s]);

  const handleReset=useCallback(async(tc=4)=>{
    await setDoc(REF,mkSession(tc));
  },[]);

  if(loading) return <div className="h-full flex items-center justify-center bg-zinc-950"><div className="text-5xl animate-spin">🌶️</div></div>;

  const session=s||mkSession();

  // ── CONDUCTOR MODE (opened from index.html with uid param) ──
  if(IS_HOST) return <ConductorView s={session} onReset={handleReset}/>;

  // ── STUDENT PHONE MODE (?student=true) ──
  if(IS_STUD){
    if(!joined) return <StudentJoin s={session} onJoin={handleJoin}/>;
    return <StudentGame s={session} playerName={pName} playerEmoji={pEmoji} playerTeamIdx={pTeam}/>;
  }

  // ── BIG SHOW SCREEN (no params — what Israel shares on Zoom) ──
  if(session.status==='lobby')  return <ShowLobby   s={session}/>;
  if(session.status==='podium') return <ShowPodium  s={session}/>;
  return <ShowGame s={session}/>;
}

createRoot(document.getElementById('root')).render(<App/>);
</script>

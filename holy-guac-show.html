// ── Roulette Wheel ─────────────────────────────────────────────────────────────
function RouletteWheel({spinCount,spinTarget,size=280}){
  const [angle,setAngle]=useState(0);
  const [anim,setAnim]=useState(false);
  const acc=useRef(0), prev=useRef(0);

  useEffect(()=>{
    if(!spinCount||spinCount===prev.current||spinTarget===null)return;
    prev.current=spinCount;
    const seg=45, tmod=spinTarget*seg+seg/2, cmod=acc.current%360;
    const diff=((tmod-cmod)%360+360)%360||360;
    const nxt=acc.current+360*6+diff;
    acc.current=nxt; setAnim(true); setAngle(nxt);
    setTimeout(()=>setAnim(false),4700);
  },[spinCount,spinTarget]);

  const cx=150,cy=150,R=138,inn=40;
  const segs=MINIGAMES.map((mg,i)=>{
    const a1=(i*45-90)*Math.PI/180,a2=((i+1)*45-90)*Math.PI/180,mid=(i*45-90+22.5)*Math.PI/180;
    const path=[`M ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)}`,`L ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)}`,`A ${R} ${R} 0 0 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}`,`L ${cx+inn*Math.cos(a2)} ${cy+inn*Math.sin(a2)}`,`A ${inn} ${inn} 0 0 0 ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)} Z`].join(' ');
    const ex=cx+93*Math.cos(mid),ey=cy+93*Math.sin(mid);
    return(
      <g key={i}>
        <path d={path} fill={mg.color} stroke="#0a0a0a" strokeWidth="2.5" opacity="0.9"/>
        <text x={ex} y={ey} textAnchor="middle" dominantBaseline="middle" fontSize="16">{mg.emoji}</text>
      </g>
    );
  });

  return(
    <div className="relative flex items-center justify-center" style={{width:size,height:size}}>
      <div className="absolute text-white z-10 drop-shadow-lg" style={{top:-10,left:'50%',transform:'translateX(-50%)',fontSize:22}}>▼</div>
      <div style={{transform:`rotate(${angle}deg)`,transition:anim?'transform 4.5s cubic-bezier(.04,0,.08,1)':'none',transformOrigin:'50% 50%'}}>
        <svg viewBox="0 0 300 300" width={size-8} height={size-8}>
          {segs}
          <circle cx="150" cy="150" r="139" fill="none" stroke="#ffffff15" strokeWidth="4"/>
          <circle cx="150" cy="150" r="40"  fill="#18181b" stroke="#ffffff22" strokeWidth="2"/>
          <text   x="150"  y="150"  textAnchor="middle" dominantBaseline="middle" fontSize="22">🌶️</text>
          {MINIGAMES.map((_,i)=>{const a=(i*45-90)*Math.PI/180;return<line key={i} x1={cx+inn*Math.cos(a)} y1={cy+inn*Math.sin(a)} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="#0a0a0a" strokeWidth="2"/>;} )}
        </svg>
      </div>
    </div>
  );
}

// SCREEN: LOBBY
// ══════════════════════════════════════════════════════════════════════════════
function ScreenLobby({game,roomId,isHost,localId,onStart,onLeave}){
  const [codeCopied,setCodeCopied]=useState(false);
  const copyCode=()=>{navigator.clipboard.writeText(roomId).then(()=>{setCodeCopied(true);setTimeout(()=>setCodeCopied(false),2000)});};
  const players=game?.players||[];
  const isModOnly=game?.hostRole==='MOD_ONLY';

  return(
    <div className="h-full flex flex-col items-center justify-center bg-zinc-950 p-6 relative">
      <button onClick={onLeave} className="btn-j absolute top-6 left-6 text-zinc-400 hover:text-white flex items-center gap-2 font-bold bg-zinc-900 px-4 py-2 rounded-xl text-sm border border-zinc-800">
        ← {isHost?'Cerrar sala':'Abandonar'}
      </button>
      <div className="bg-zinc-900 border-4 border-lime-500 rounded-3xl p-8 w-full max-w-md shadow-2xl text-center anim-pop">

        {/* Room code */}
        <button onClick={copyCode} className="btn-j w-full bg-zinc-950 border border-zinc-800 hover:border-lime-500 rounded-2xl p-4 mb-5 transition-colors">
          <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">
            {codeCopied?'✅ Código copiado':'🔢 Toca para copiar el código'}
          </p>
          <p className="text-5xl font-black text-white tracking-widest">{roomId}</p>
        </button>

        {/* Host moderator badge (if MOD_ONLY, not in player list) */}
        {isModOnly&&(
          <div className="flex items-center gap-3 bg-lime-500/10 border border-lime-500/40 rounded-2xl p-3 mb-4 text-left">
            <span className="text-3xl">{game.hostEmoji}</span>
            <div>
              <div className="text-xs text-lime-400 font-bold uppercase tracking-wider">Moderador</div>
              <div className="font-black text-white">{game.hostName}</div>
            </div>
            <span className="ml-auto text-lime-400 font-black text-xs bg-lime-500/20 px-2 py-1 rounded-lg">HOST</span>
          </div>
        )}

        {/* Players */}
        <h3 className="text-left text-zinc-400 font-bold text-sm flex items-center gap-2 mb-3">
          👥 Jugadores ({players.length}/20)
        </h3>
        <div className="grid grid-cols-2 gap-2 mb-6 max-h-52 overflow-y-auto scroll-y">
          {players.map(p=>(
            <div key={p.id} className={`bg-zinc-800 border-2 border-zinc-700 rounded-xl p-3 flex items-center gap-2 ${p.id===localId?'ring-2 ring-white/30 border-lime-500/60':''}`}>
              <span className="text-2xl">{p.emoji}</span>
              <span className="font-black text-white text-sm truncate">{p.name}</span>
              {p.id===localId&&<span className="ml-auto text-xs text-lime-400 font-bold">Tú</span>}
            </div>

            <div className="col-span-2 border-2 border-dashed border-zinc-800 rounded-xl p-4 text-zinc-600 text-sm text-center">
              Esperando jugadores...
            </div>
          )}
        </div>

        {isHost?(
          <button onClick={onStart}
            className="btn-j w-full bg-lime-500 text-black py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_#4d7c0f] flex items-center justify-center gap-2">
            🎡 ¡Comenzar Show!

        ):(
          <div className="bg-zinc-800/50 border border-zinc-700 rounded-2xl p-4">
            <p className="text-zinc-400 font-bold animate-pulse text-sm">Esperando a que el moderador inicie el show...</p>
          </div>
        )}

    </div>
  );
}

function ScreenPlaying({game,roomId,isHost,localId,onLeave}){
  const [showPanel,setShowPanel]=useState(false);
  const [spinning,setSpinning]=useState(false);
  const players=game?.players||[];
  const mg=game?.minigame?MINIGAMES.find(m=>m.id===game.minigame):null;
  const isModOnly=game?.hostRole==='MOD_ONLY';

  const spin=async()=>{
    if(spinning||!isHost)return;
    setSpinning(true);
    const t=Math.floor(Math.random()*8);
    await updateDoc(roomRef(roomId),{spinCount:(game.spinCount||0)+1,spinTarget:t,minigame:MINIGAMES[t].id});
    setTimeout(()=>{
      confetti({particleCount:180,spread:70,origin:{y:.55},colors:['#a3e635','#fbbf24','#ef4444','#3b82f6','#8b5cf6']});
      setSpinning(false);
    },4700);
  };

  const avanzar=async()=>{
    if(!isHost)return;
    await updateDoc(roomRef(roomId),{minigame:null});
  };

  return(
    <div className="h-full flex flex-col bg-zinc-950 relative">

      {/* Header */}
      <div className="flex items-center justify-between px-4 py-2.5 border-b border-zinc-800 bg-zinc-900/80 shrink-0">
        <div className="flex items-center gap-2">
          <span className="text-lg">🌶️</span>
          <span className="font-black text-white text-sm">Holy Guacamole</span>
          <span className="text-zinc-600 text-xs font-mono">{roomId}</span>
        </div>
        <div className="flex items-center gap-2">
          {isHost&&(
            <button onClick={()=>setShowPanel(true)}
              className="btn-j bg-lime-500/20 hover:bg-lime-500/30 border border-lime-500/50 text-lime-400 font-bold text-xs px-3 py-1.5 rounded-xl flex items-center gap-1 anim-ring">
              ⚙️ Panel de Moderador
            </button>
          )}
        </div>
      </div>

      {/* Host moderator badge if MOD_ONLY */}
      {isModOnly&&(
        <div className="flex items-center gap-2 px-4 py-2 bg-lime-500/10 border-b border-lime-500/20">
          <span className="text-xl">{game.hostEmoji}</span>
          <span className="font-black text-white text-sm">{game.hostName}</span>
          <span className="text-xs bg-lime-500/20 text-lime-400 px-2 py-0.5 rounded-full font-bold">MODERADOR</span>
        </div>
      )}

      {/* Players scores */}
      {players.length>0&&(
        <div className="flex gap-2 px-4 py-2 border-b border-zinc-800 overflow-x-auto shrink-0">
          {players.map(p=>(
            <div key={p.id} className={`flex items-center gap-2 bg-zinc-900 rounded-xl px-3 py-2 shrink-0 border ${p.id===localId?'border-lime-500/60':'border-zinc-800'}`}>
              <span className="text-lg">{p.emoji}</span>
              <div>
                <div className="text-xs font-bold text-white leading-none">{p.name}</div>
                <div className="text-amber-400 font-black text-sm">{p.score} pts</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Main: Roulette */}
      <div className="flex-1 flex flex-col items-center justify-center gap-4 p-4">
        <RouletteWheel spinCount={game?.spinCount||0} spinTarget={game?.spinTarget}/>

        {/* Mini-game result */}
        {mg&&(
          <div className="rounded-2xl px-6 py-3 text-center anim-pop" style={{background:`${mg.color}25`,border:`2px solid ${mg.color}99`}}>
            <span className="text-2xl">{mg.emoji}</span>
            <span className="text-white font-black text-xl ml-2">{mg.label}</span>
          </div>
        )}

        {/* Controls */}
        <div className="flex gap-3 items-center">
          {isHost&&!mg&&(
            <button onClick={spin} disabled={spinning}
              className="btn-j px-8 py-4 rounded-2xl font-black text-lg text-black disabled:opacity-50"
              style={{background:spinning?'#6b7280':'linear-gradient(135deg,#a3e635,#fbbf24)',boxShadow:spinning?'none':'0 6px 0 #4d7c0f'}}>
              {spinning?'🌀 Girando...':'🎡 Girar Ruleta'}
            </button>
          )}
          {isHost&&mg&&(
            <button onClick={avanzar}
              className="btn-j px-8 py-4 rounded-2xl font-black text-lg text-black anim-pop"
              style={{background:'linear-gradient(135deg,#a3e635,#fbbf24)',boxShadow:'0 6px 0 #4d7c0f'}}>
              Siguiente →
            </button>
          )}
          {!isHost&&!mg&&(
            <div className="text-zinc-500 text-sm font-bold animate-pulse">Esperando al moderador...</div>
          )}
        </div>
      </div>

      {/* Moderator panel drawer */}
      {showPanel&&<ModPanel game={game} roomId={roomId} onClose={()=>setShowPanel(false)} onLeave={async()=>{await updateDoc(roomRef(roomId),{status:'LOBBY'});setShowPanel(false);}}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [appState,setAppState]=useState('HOME');
  const [roomId,setRoomId]=useState('');
  const [isHost,setIsHost]=useState(false);
  const [localId,setLocalId]=useState(null);
  const [game,setGame]=useState(null);
  const [toast,setToast]=useState('');
  const unsub=useRef(null);

  const toast_=msg=>showToast(setToast,msg);

  // Subscribe to room
  const subscribeRoom=useCallback(id=>{
    if(unsub.current)unsub.current();
    unsub.current=onSnapshot(roomRef(id),snap=>{
      if(snap.exists()){
        const d=snap.data();
        setGame(d);
        if(d.status==='PLAYING'&&appState!=='PLAYING') setAppState('PLAYING');
      } else {
        toast_('⚠️ La sala fue cerrada');
        setAppState('HOME'); setRoomId(''); setGame(null);
      }
    });
  },[appState]);

  useEffect(()=>()=>unsub.current?.(),[]);

  // CREATE ROOM
  const createRoom=()=>{ setIsHost(true); setAppState('PROFILE'); };

  // JOIN ROOM (code check)
  const joinRoom=async code=>{
    if(!code.trim())return toast_('⚠️ Ingresa un código');
    const c=code.trim().toUpperCase();
    try {
      const snap=await getDoc(roomRef(c));
      if(!snap.exists())return toast_('❌ Sala no encontrada');
      const d=snap.data();
      if(d.status!=='LOBBY')return toast_('❌ El show ya comenzó');
      setRoomId(c); setIsHost(false); setAppState('PROFILE');
    } catch { toast_('❌ Error de conexión'); }
  };

  // PROFILE SUBMIT
  const handleProfile=async(name,emoji,role)=>{
    if(isHost){
      const newId=Math.random().toString(36).slice(2,6).toUpperCase();
      const room=mkRoom(name,emoji,role);
      await setDoc(roomRef(newId),room);
      setRoomId(newId);
      setLocalId(role==='PLAYER_MOD'?1:'HOST');
      setGame(room);
      subscribeRoom(newId);
      setAppState('LOBBY');
    } else {
      // Join existing room via transaction
      let assignedId=null;
      try {
        await runTransaction(db,async txn=>{
          const snap=await txn.get(roomRef(roomId));
          if(!snap.exists())throw new Error('NO_ROOM');
          const d=snap.data();
          if(d.status!=='LOBBY')throw new Error('STARTED');
          const ps=d.players||[];
          assignedId=ps.length+1;
          txn.update(roomRef(roomId),{players:[...ps,{id:assignedId,name,emoji,score:0}]});
        });
        setLocalId(assignedId);
        subscribeRoom(roomId);
        setAppState('LOBBY');
      } catch(e){ toast_(e.message==='NO_ROOM'?'❌ Sala no encontrada':'❌ Error al unirse'); setAppState('HOME'); }
    }
  };

  // START GAME
  const startGame=async()=>{
    await updateDoc(roomRef(roomId),{status:'PLAYING'});
    setAppState('PLAYING');
  };

  // LEAVE
  const leaveRoom=async()=>{
    if(unsub.current)unsub.current();
    if(isHost){ try{await updateDoc(roomRef(roomId),{status:'CLOSED'});}catch{} }
    else {
      try{
        await runTransaction(db,async txn=>{
          const snap=await txn.get(roomRef(roomId));
          if(!snap.exists())return;
          txn.update(roomRef(roomId),{players:(snap.data().players||[]).filter(p=>p.id!==localId)});
        });
      }catch{}
    }
    setAppState('HOME'); setRoomId(''); setGame(null); setLocalId(null); setIsHost(false);
  };

  // Listen for status changes when in lobby
  useEffect(()=>{
    if(appState==='LOBBY'&&game?.status==='PLAYING') setAppState('PLAYING');
  },[game?.status,appState]);

  return(
    <div className="h-full w-full bg-zinc-950 text-white">
      <Toast msg={toast}/>
      {appState==='HOME'   &&<ScreenHome    onCreateRoom={createRoom} onJoinRoom={joinRoom}/>}
      {appState==='PROFILE'&&<ScreenProfile isHost={isHost} onSubmit={handleProfile} onBack={()=>{setAppState('HOME');setRoomId('');setIsHost(false);}}/>}
      {appState==='LOBBY'  &&game&&<ScreenLobby  game={game} roomId={roomId} isHost={isHost} localId={localId} onStart={startGame} onLeave={leaveRoom}/>}
      {appState==='PLAYING'&&game&&<ScreenPlaying game={game} roomId={roomId} isHost={isHost} localId={localId} onLeave={leaveRoom}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

// ── Roulette Wheel ────────────────────────────────────────────
function RouletteWheel({spinCount,spinTarget,size=270}){
  const [angle,setAngle]=useState(0);
  const [anim,setAnim]=useState(false);
  const acc=useRef(0),prev=useRef(0);
  useEffect(()=>{
    if(!spinCount||spinCount===prev.current||spinTarget===null)return;
    prev.current=spinCount;
    const seg=45,tmod=spinTarget*seg+seg/2,cmod=acc.current%360;
    const diff=((tmod-cmod)%360+360)%360||360;
    const nxt=acc.current+360*6+diff;
    acc.current=nxt;setAnim(true);setAngle(nxt);
    setTimeout(()=>setAnim(false),4700);
  },[spinCount,spinTarget]);
  const cx=150,cy=150,R=138,inn=40;
  const segs=MINIGAMES.map((mg,i)=>{
    const a1=(i*45-90)*Math.PI/180,a2=((i+1)*45-90)*Math.PI/180,mid=(i*45-90+22.5)*Math.PI/180;
    const path=[`M ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)}`,`L ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)}`,`A ${R} ${R} 0 0 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}`,`L ${cx+inn*Math.cos(a2)} ${cy+inn*Math.sin(a2)}`,`A ${inn} ${inn} 0 0 0 ${cx+inn*Math.cos(a1)} ${cy+inn*Math.sin(a1)} Z`].join(' ');
    const ex=cx+93*Math.cos(mid),ey=cy+93*Math.sin(mid);
    return(<g key={i}><path d={path} fill={mg.color} stroke="#0a0a0a" strokeWidth="2.5" opacity="0.9"/><text x={ex} y={ey} textAnchor="middle" dominantBaseline="middle" fontSize="16">{mg.emoji}</text></g>);
  });
  return(
    <div className="relative flex items-center justify-center" style={{width:size,height:size}}>
      <div className="absolute text-white z-10 drop-shadow-lg" style={{top:-10,left:'50%',transform:'translateX(-50%)',fontSize:22}}>▼</div>
      <div style={{transform:`rotate(${angle}deg)`,transition:anim?'transform 4.5s cubic-bezier(.04,0,.08,1)':'none',transformOrigin:'50% 50%'}}>
        <svg viewBox="0 0 300 300" width={size-8} height={size-8}>
          {segs}
          <circle cx="150" cy="150" r="139" fill="none" stroke="#ffffff15" strokeWidth="4"/>
          <circle cx="150" cy="150" r="40" fill="#18181b" stroke="#ffffff22" strokeWidth="2"/>
          <text x="150" y="150" textAnchor="middle" dominantBaseline="middle" fontSize="22">🌶️</text>
          {MINIGAMES.map((_,i)=>{const a=(i*45-90)*Math.PI/180;return<line key={i} x1={cx+inn*Math.cos(a)} y1={cy+inn*Math.sin(a)} x2={cx+R*Math.cos(a)} y2={cy+R*Math.sin(a)} stroke="#0a0a0a" strokeWidth="2"/>;} )}
        </svg>
      </div>
    </div>
  );
}

          <button onClick={()=>setShowQr(true)} className="btn-j flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-bold py-2 rounded-xl text-sm flex items-center justify-center gap-1">📱 QR Alumnos</button>
          <button onClick={copyStudentLink_} className="btn-j flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-300 font-bold py-2 rounded-xl text-sm flex items-center justify-center gap-1">🔗 Link Alumnos</button>
        </div>

        {/* Host badge if MOD_ONLY */}
        {isModOnly&&(
          <div className="flex items-center gap-3 bg-lime-500/10 border border-lime-500/30 rounded-2xl p-3 mb-4">
            <span className="text-3xl">{game.hostEmoji}</span>
            <div className="text-left"><div className="text-xs text-lime-400 font-bold">MODERADOR</div><div className="font-black text-white">{game.hostName}</div></div>
            <span className="ml-auto text-xs bg-lime-500/20 text-lime-400 px-2 py-1 rounded-lg font-bold">HOST</span>
          </div>
        )}

        {/* Teams */}
        <div className="space-y-2 mb-5">
          {teams.map(t=>{
            const tPlayers=players.filter(p=>p.teamId===t.id);
            return(
              <div key={t.id} className="rounded-xl p-3 text-left" style={{background:`${t.color}18`,border:`1px solid ${t.color}44`}}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full" style={{background:t.color}}/>
                  <span className="font-black text-sm" style={{color:t.color}}>{t.name}</span>
                  <span className="text-xs text-zinc-600 ml-auto">{tPlayers.length} jugadores</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {tPlayers.map(p=>(
                    <span key={p.id} className={`text-xs bg-zinc-800 rounded-full px-2 py-0.5 font-semibold ${p.id===localId?'ring-1 ring-white/40 text-white':'text-zinc-300'}`}>
                      {p.emoji} {p.name}
                    </span>
                  ))}
                  {tPlayers.length===0&&<span className="text-xs text-zinc-700 italic">vacío...</span>}
                </div>
              </div>
            );
          })}
        </div>

        {isHost?(
          <button onClick={onStart} className="btn-j w-full bg-lime-500 hover:bg-lime-400 text-black py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_#4d7c0f] flex items-center justify-center gap-2">
            🎡 ¡Comenzar Show!
          </button>
        ):(
          <div className="bg-zinc-800/50 border border-zinc-700 rounded-2xl p-4">
            <p className="text-zinc-400 font-bold animate-pulse text-sm">Esperando al moderador para iniciar...</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CURTAIN animation ─────────────────────────────────────────
function CurtainScene({round,onDone}){
  const [stage,setStage]=useState(0); // 0=curtains, 1=round text, 2=done
  useEffect(()=>{
    const t1=setTimeout(()=>setStage(1),2200);
    const t2=setTimeout(()=>setStage(2),4000);
    const t3=setTimeout(()=>onDone&&onDone(),4400);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div className="absolute inset-0 z-50 overflow-hidden" style={{background:'#09090b'}}>
      {/* Left curtain */}
      <div className={`absolute left-0 top-0 h-full w-1/2 ${stage>=1?'curtain-l':''}`}
        style={{background:'linear-gradient(to right,#7f1d1d,#991b1b)',boxShadow:'inset -20px 0 40px rgba(0,0,0,.5)'}}>
        <div className="absolute right-0 top-0 h-full w-4" style={{background:'rgba(0,0,0,.3)'}}/>
      </div>
      {/* Right curtain */}
      <div className={`absolute right-0 top-0 h-full w-1/2 ${stage>=1?'curtain-r':''}`}
        style={{background:'linear-gradient(to left,#7f1d1d,#991b1b)',boxShadow:'inset 20px 0 40px rgba(0,0,0,.5)'}}>
        <div className="absolute left-0 top-0 h-full w-4" style={{background:'rgba(0,0,0,.3)'}}/>
      </div>
      {/* Round text */}
      {stage>=1&&stage<2&&(
        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
          <div className="round-show text-center">
            <div className="text-lime-400 font-black tracking-[.3em] text-lg uppercase mb-2">¡Bienvenidos al</div>
            <div className="text-7xl font-black text-white leading-none">ROUND {round+1}</div>
            <div className="text-amber-400 text-2xl mt-3">🌶️ Holy Guacamole 🌶️</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PLAYING screen ────────────────────────────────────────────
function ScreenPlaying({game,roomId,isHost,localId,onLeave}){
  const [showPanel,setShowPanel]=useState(false);
  const [spinning,setSpinning]=useState(false);
  const [showCurtain,setShowCurtain]=useState(game?.phase==='CURTAIN');

  const players=game?.players||[];
  const teams=game?.teams||[];
  const mg=game?.minigame?MINIGAMES.find(m=>m.id===game.minigame):null;
  const phase=game?.phase||'CURTAIN';

  // Called players for buzzer
  const roundIdx=game?.roundIdx||0;
  const calledIds=game?.buzzCalled||[];
  const isCalledPlayer=calledIds.includes(localId);

  // Spinner
  const spinnerPid=game?.spinnerPlayerId;
  const iAmSpinner=spinnerPid===localId;

  // My team
  const me=players.find(p=>p.id===localId);
  const myTeam=me?teams.find(t=>t.id===me.teamId):null;

  useEffect(()=>{if(game?.phase==='CURTAIN')setShowCurtain(true);},[game?.phase]);

  const handleBuzz=async()=>{
    if(!localId||!isCalledPlayer)return;
    const buzz={playerId:localId,teamId:me?.teamId,ts:Date.now(),name:me?.name};
    await updateDoc(rRef(roomId),{buzzLog:arrayUnion(buzz)});
  };

  const doSpin=async()=>{
    if(!iAmSpinner||spinning)return;
    setSpinning(true);
    const t=Math.floor(Math.random()*8);
    await updateDoc(rRef(roomId),{spinCount:(game.spinCount||0)+1,spinTarget:t,minigame:MINIGAMES[t].id,phase:'MINIGAME'});
    setTimeout(()=>setSpinning(false),4700);
  };

  // Confetti on ALL devices when wheel lands
  useEffect(()=>{
    if(!game?.spinCount)return;
    const tid=setTimeout(()=>confetti({particleCount:200,spread:70,origin:{y:.5},colors:['#a3e635','#fbbf24','#ef4444','#3b82f6','#8b5cf6']}),4700);
    return()=>clearTimeout(tid);
  },[game?.spinCount]);

  const buzzLog=([...(game?.buzzLog||[])]).sort((a,b)=>a.ts-b.ts);

  return(
    <div className="h-full flex flex-col bg-zinc-950 relative overflow-hidden">
      {/* Curtain overlay */}
      {showCurtain&&<CurtainScene round={game?.roundIdx||0} onDone={()=>{setShowCurtain(false);if(isHost)updateDoc(rRef(roomId),{phase:'CALL_UP'});}}/>}

      {/* Header */}
      <div className="flex items-center justify-between px-4 py-2.5 border-b border-zinc-800 bg-zinc-900/90 shrink-0 z-10">
        <div className="flex items-center gap-2">
          <span className="text-lg">🌶️</span>
          <span className="font-black text-white text-sm">Holy Guacamole</span>
          <span className="font-mono text-zinc-600 text-xs">{roomId}</span>
        </div>
        <div className="flex items-center gap-2">
          {isHost&&(
            <button onClick={()=>setShowPanel(true)}
              className="btn-j bg-lime-500/15 hover:bg-lime-500/25 border border-lime-500/50 text-lime-400 font-bold text-xs px-3 py-1.5 rounded-xl">
              ⚙️ Moderador
            </button>
          )}
        </div>
      </div>

      {/* Host MOD_ONLY badge */}
      {game?.hostRole==='MOD_ONLY'&&(
        <div className="flex items-center gap-2 px-4 py-2 bg-lime-500/10 border-b border-lime-500/20 shrink-0">
          <span>{game.hostEmoji}</span>
          <span className="font-black text-white text-sm">{game.hostName}</span>
          <span className="text-xs bg-lime-500/20 text-lime-400 px-2 py-0.5 rounded-full font-bold">MODERADOR</span>
        </div>
      )}

      {/* Player identity chip — only for players (not MOD_ONLY) */}
      {me&&myTeam&&(
        <div className="flex items-center gap-2 px-4 py-2 shrink-0" style={{background:`${myTeam.color}18`,borderBottom:`1px solid ${myTeam.color}35`}}>
          <span className="text-base">{me.emoji}</span>
          <span className="font-black text-white text-sm">Tú: {me.name}</span>
          <div className="w-1.5 h-1.5 rounded-full mx-1" style={{background:myTeam.color}}/>
          <span className="text-xs font-bold" style={{color:myTeam.color}}>{myTeam.name}</span>
        </div>
      )}

      {/* Team scores */}
      {teams.length>0&&(
        <div className="flex border-b border-zinc-800 shrink-0">
          {teams.map(t=>{
            const isWinner=game?.winnerTeamId===t.id&&(phase==='SPIN_ASSIGN'||phase==='MINIGAME');
            const score=game?.teamScores?.[t.id]||0;
            const strikes=game?.teamStrikes?.[t.id]||0;
            return(
              <div key={t.id} className="flex-1 flex flex-col items-center py-2 px-1 transition-all"
                style={isWinner?{background:`${t.color}25`,borderBottom:`2px solid ${t.color}`}:{}}>
                <div className="w-2.5 h-2.5 rounded-full mb-1" style={{background:t.color}}/>
                <div className="text-xs font-bold truncate max-w-full px-1" style={{color:t.color}}>{t.name}{isWinner?' 🏆':''}</div>
                <div className="text-xl font-black text-white">{score}</div>
                <div className="flex gap-1">
                  {[0,1,2].map(i=><div key={i} className={`w-2 h-2 rounded-full ${i<strikes?'bg-red-500':'bg-zinc-700'}`}/>)}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Winner team banner */}
      {(phase==='SPIN_ASSIGN'||phase==='MINIGAME')&&game?.winnerTeamId!=null&&(()=>{
        const wt=teams.find(t=>t.id===game.winnerTeamId);
        return wt&&(
          <div className="px-4 py-2.5 font-black text-center text-sm shrink-0 anim-up" style={{background:`${wt.color}30`,color:wt.color,borderBottom:`1px solid ${wt.color}50`}}>
            🏆 {wt.name} — ¡turno de girar la ruleta!
          </div>
        );
      })()}

      {/* Main phase content */}
      <div className="flex-1 flex flex-col items-center justify-center p-4 gap-4 overflow-hidden">

        {/* CALL_UP */}
        {phase==='CALL_UP'&&(()=>{
          const cPlayers=calledIds.map(id=>players.find(p=>p.id===id)).filter(Boolean);
          return(
            <div className="text-center anim-pop space-y-4 w-full max-w-sm">
              <div className="text-4xl">📢</div>
              {cPlayers.length>=2?(
                <>
                  <div className="text-white font-black text-2xl leading-snug">
                    {cPlayers[0]?.emoji} {cPlayers[0]?.name} vs {cPlayers[1]?.emoji} {cPlayers[1]?.name}
                  </div>
                  <div className="text-lime-400 font-bold text-sm uppercase tracking-widest">Come up front!</div>
                  {game?.buzzQuestion&&(
                    <div className="bg-zinc-800 rounded-2xl p-4 text-white font-bold text-lg mt-2">{game.buzzQuestion}</div>
                  )}
                </>
              ):(
                <div className="text-zinc-400 font-bold animate-pulse">El moderador está preparando la ronda...</div>
              )}
            </div>
          );
        })()}

        {/* BUZZER */}
        {phase==='BUZZER'&&(
          <div className="flex flex-col items-center gap-5 w-full max-w-sm text-center">
            {game?.buzzQuestion&&<div className="bg-zinc-800 rounded-2xl p-4 text-white font-bold text-base anim-up">{game.buzzQuestion}</div>}
            {isCalledPlayer&&buzzLog.findIndex(b=>b.playerId===localId)<0?(
              <button onClick={handleBuzz}
                className="btn-j w-56 h-56 rounded-full bg-red-600 hover:bg-red-500 text-white font-black text-3xl shadow-[0_8px_0_#7f1d1d] buzz-btn flex items-center justify-center flex-col gap-2 anim-pop">
                <div className="text-5xl">🔴</div>
                <div>¡BUZZ!</div>
              </button>
            ):isCalledPlayer?(
              <div className="text-zinc-400 font-bold anim-pop text-lg">✅ Buzzeaste · esperando al moderador...</div>
            ):(
              <div className="text-zinc-500 font-bold animate-pulse text-sm">Manos atrás · el moderador leerá la pregunta...</div>
            )}
            {/* Show buzz order to everyone after both buzz */}
            {buzzLog.length>0&&(
              <div className="w-full space-y-2 anim-up">
                {buzzLog.map((b,i)=>{
                  const tp=players.find(p=>p.id===b.playerId);
                  const tt=teams.find(t=>t.id===b.teamId);
                  return(
                    <div key={i} className="flex items-center gap-3 bg-zinc-900 rounded-xl px-4 py-2 border" style={{borderColor:tt?.color||'#3f3f46'}}>
                      <span className="text-amber-400 font-black w-5">{i+1}°</span>
                      <span className="text-lg">{tp?.emoji}</span>
                      <span className="font-bold text-white">{tp?.name}</span>
                      <span className="ml-auto text-xs font-bold" style={{color:tt?.color}}>{tt?.name}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* SPIN_ASSIGN */}
        {phase==='SPIN_ASSIGN'&&(()=>{
          const spinner=players.find(p=>p.id===spinnerPid);
          const wt=teams.find(t=>t.id===game?.winnerTeamId);
          return(
            <div className="text-center anim-pop space-y-4 w-full max-w-sm">
              {wt&&<div className="font-black text-2xl" style={{color:wt.color}}>🏆 {wt.name} al frente!</div>}
              {spinner&&<div className="text-zinc-300 font-bold">Turno de <span className="text-white font-black">{spinner.emoji} {spinner.name}</span> para girar</div>}
              {!iAmSpinner&&<div className="text-zinc-500 text-sm animate-pulse">Esperando que {spinner?.name||'el jugador'} gire la ruleta...</div>}
            </div>
          );
        })()}

        {/* SPIN_ASSIGN — SPIN BUTTON for the spinner player */}
        {phase==='SPIN_ASSIGN'&&iAmSpinner&&(
          <button onClick={doSpin} disabled={spinning}
            className="btn-j px-10 py-5 rounded-2xl font-black text-2xl text-black disabled:opacity-40 anim-pop"
            style={{background:spinning?'#6b7280':'linear-gradient(135deg,#a3e635,#fbbf24)',boxShadow:spinning?'none':'0 8px 0 #4d7c0f'}}>
            {spinning?'🌀 Girando...':'🎡 ¡GIRAR!'}
          </button>
        )}

        {/* SPINNING & MINIGAME — roulette for everyone */}
        {(phase==='SPINNING'||phase==='MINIGAME')&&(
          <>
            <RouletteWheel spinCount={game?.spinCount||0} spinTarget={game?.spinTarget}/>
            {mg&&(
              <div className="rounded-2xl px-6 py-3 text-center anim-pop" style={{background:`${mg.color}25`,border:`2px solid ${mg.color}99`}}>
                <span className="text-2xl">{mg.emoji}</span>
                <span className="text-white font-black text-xl ml-2">{mg.label}</span>
              </div>
            )}
          </>
        )}
      </div>

      {/* Moderator panel drawer */}
      {showPanel&&<ModPanel game={game} roomId={roomId} players={players} teams={teams} onClose={()=>setShowPanel(false)} onLeave={async()=>{try{await updateDoc(rRef(roomId),{status:'CLOSED'});}catch{}onLeave();setShowPanel(false);}}/>}
    </div>
  );
}

// ── MODERATOR PANEL ───────────────────────────────────────────
function ModPanel({game,roomId,players,teams,onClose,onLeave}){
  const [buzzQ,setBuzzQ]=useState(game?.buzzQuestion||'');
  const phase=game?.phase||'CURTAIN';
  const roundIdx=game?.roundIdx||0;
  const buzzLog=([...(game?.buzzLog||[])]).sort((a,b)=>a.ts-b.ts);

  // Auto-compute called players from round index
  const getCalledPair=()=>{
    const tc=game?.teamCount||2;
    return TEAM_CATALOG.slice(0,tc).map(td=>{
      const t=teams.find(t2=>t2.id===td.id);
      if(!t)return null;
      const tPlayers=players.filter(p=>p.teamId===t.id);
      if(!tPlayers.length)return null;
      return tPlayers[roundIdx%tPlayers.length];
    }).filter(Boolean);
  };

  const callUpPlayers=async()=>{
    const pair=getCalledPair();
    await updateDoc(rRef(roomId),{buzzCalled:pair.map(p=>p.id),buzzLog:[],winnerTeamId:null,spinnerPlayerId:null,phase:'CALL_UP'});
  };

  const activateBuzzers=async()=>{
    // Step 1: activate buzzers — players see red button, question hidden yet
    await updateDoc(rRef(roomId),{phase:'BUZZER',buzzLog:[],buzzQuestion:''});
  };

  const revealQuestion=async()=>{
    if(!buzzQ.trim())return;
    // Step 2: show question on all screens simultaneously
    await updateDoc(rRef(roomId),{buzzQuestion:buzzQ});
  };

  const assignSpinner=(teamId)=>{
    const teamPlayers=players.filter(p=>p.teamId===teamId);
    const cursor=(game?.spinCursors||{})[teamId]||0;
    const spinner=teamPlayers[cursor%teamPlayers.length];
    return {teamId, spinnerId: spinner?.id||null};
  };

  const declareCorrect=async()=>{
    // First buzzer's team wins → go to spin
    const first=buzzLog[0];
    if(!first)return;
    const {teamId,spinnerId}=assignSpinner(first.teamId);
    await updateDoc(rRef(roomId),{winnerTeamId:teamId,spinnerPlayerId:spinnerId,phase:'SPIN_ASSIGN'});
  };

  const declareIncorrect=async()=>{
    // Give the win to the second buzzer's team if they're from a different team
    const first=buzzLog[0];
    const alt=buzzLog.find(b=>b.teamId!==first?.teamId);
    if(alt){
      const {teamId,spinnerId}=assignSpinner(alt.teamId);
      await updateDoc(rRef(roomId),{winnerTeamId:teamId,spinnerPlayerId:spinnerId,phase:'SPIN_ASSIGN'});
    } else {
      // Nobody else buzzed — strike for first team
      const tid=first?.teamId;
      if(tid==null)return;
      const newStrikes={...(game?.teamStrikes||{}),[tid]:((game?.teamStrikes||{})[tid]||0)+1};
      if(newStrikes[tid]>=3){
        await updateDoc(rRef(roomId),{teamStrikes:newStrikes,accPts:0,roundIdx:roundIdx+1,phase:'CURTAIN'});
      } else {
        await updateDoc(rRef(roomId),{teamStrikes:newStrikes,roundIdx:roundIdx+1,phase:'CURTAIN'});
      }
    }
  };

  const markResult=async(won)=>{
    const wt=game?.winnerTeamId;
    if(won){
      const acc=game?.accPts||0;
      const newScores={...(game?.teamScores||{})};
      newScores[wt]=(newScores[wt]||0)+acc;
      const newCursors={...(game?.spinCursors||{})};
      newCursors[wt]=((newCursors[wt]||0)+1);
      await updateDoc(rRef(roomId),{teamScores:newScores,accPts:0,teamStrikes:{...(game?.teamStrikes||{}),[wt]:0},spinCursors:newCursors,minigame:null,roundIdx:roundIdx+1,phase:'CURTAIN'});
    } else {
      const newStrikes={...(game?.teamStrikes||{})};
      newStrikes[wt]=(newStrikes[wt]||0)+1;
      if(newStrikes[wt]>=3){
        await updateDoc(rRef(roomId),{teamStrikes:newStrikes,accPts:0,minigame:null,roundIdx:roundIdx+1,phase:'CURTAIN'});
      } else {
        const newCursors={...(game?.spinCursors||{})};
        newCursors[wt]=((newCursors[wt]||0)+1);
        const teamPlayers=players.filter(p=>p.teamId===wt);
        const cursor=newCursors[wt];
        const spinner=teamPlayers[cursor%teamPlayers.length];
        await updateDoc(rRef(roomId),{teamStrikes:newStrikes,spinCursors:newCursors,spinnerPlayerId:spinner?.id||null,minigame:null,phase:'SPIN_ASSIGN'});
      }
    }
  };

  const addPts=pts=>updateDoc(rRef(roomId),{accPts:(game?.accPts||0)+pts});

  return(
    <div className="fixed inset-0 z-50 flex">
      <div className="flex-1 bg-black/60" onClick={onClose}/>
      <div className="w-80 bg-zinc-900 border-l border-zinc-800 flex flex-col anim-drawer h-full">
        <div className="flex items-center justify-between px-5 py-4 border-b border-zinc-800 shrink-0">
          <span className="font-black text-white">⚙️ Panel de Moderador</span>
          <button onClick={onClose} className="btn-j text-zinc-500 hover:text-white text-xl">✕</button>
        </div>
        <div className="flex-1 scroll-y px-4 py-4 space-y-4">

          {/* Phase indicator */}
          <div className="bg-zinc-800 rounded-xl px-3 py-2 text-center">
            <span className="text-xs text-zinc-500 uppercase tracking-widest">Fase actual: </span>
            <span className="font-black text-lime-400 text-sm">{phase}</span>
            <span className="text-zinc-600 text-xs ml-2">· Ronda {roundIdx+1}</span>
          </div>

          {/* CURTAIN → manual skip if animation didn't auto-advance */}
          {phase==='CURTAIN'&&(
            <button onClick={()=>updateDoc(rRef(roomId),{phase:'CALL_UP'})}
              className="btn-j w-full bg-zinc-700 hover:bg-zinc-600 border border-zinc-600 text-zinc-300 font-bold py-3 rounded-xl text-sm">
              ⏭ Skip cortinas → llamar jugadores
            </button>
          )}

          {/* CALL_UP setup */}
          {(phase==='CURTAIN'||phase==='CALL_UP')&&(
            <div className="space-y-2">
              <div className="text-xs text-zinc-500 uppercase tracking-widest">Jugadores a llamar (Ronda {roundIdx+1})</div>
              {getCalledPair().map((p)=>{
                const t=teams.find(t2=>t2.id===p.teamId);
                return(<div key={p.id} className="flex items-center gap-2 bg-zinc-800 rounded-xl px-3 py-2">
                  <span>{p.emoji}</span><span className="font-bold text-sm flex-1">{p.name}</span>
                  <span className="text-xs font-bold" style={{color:t?.color}}>{t?.name}</span>
                </div>);
              })}
              <button onClick={callUpPlayers} className="btn-j w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-2.5 rounded-xl text-sm">
                📢 Llamar al frente
              </button>
            </div>
          )}

          {/* CALL_UP → activate buzzers (no question yet) */}
          {phase==='CALL_UP'&&(
            <button onClick={activateBuzzers}
              className="btn-j w-full bg-red-600 hover:bg-red-500 text-white font-black py-3 rounded-xl text-sm flex items-center justify-center gap-2">
              🔴 Activar Buzzers
            </button>
          )}

          {/* BUZZER — sub-step 1: pregunta no revelada → textarea + botón mostrar */}
          {phase==='BUZZER'&&!game?.buzzQuestion&&(
            <div className="space-y-2">
              <div className="text-xs text-zinc-500 uppercase tracking-widest">Paso 2 — Mostrar pregunta</div>
              <textarea rows={3} value={buzzQ} onChange={e=>setBuzzQ(e.target.value)}
                className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-amber-500 resize-none"
                placeholder="Escribe la pregunta y muéstrala en pantalla..."/>
              <button onClick={revealQuestion} disabled={!buzzQ.trim()}
                className="btn-j w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 text-black font-black py-2.5 rounded-xl text-sm">
                👁 Mostrar pregunta a todos
              </button>
            </div>
          )}

          {/* BUZZER — sub-step 2: pregunta revelada → buzz order + correcto/incorrecto */}
          {phase==='BUZZER'&&game?.buzzQuestion&&(
            <div className="space-y-2">
              <div className="text-xs text-zinc-400 bg-zinc-800 rounded-xl px-3 py-2 italic">"{game.buzzQuestion}"</div>
              <div className="text-xs text-zinc-500 uppercase tracking-widest">Orden de buzzers</div>
              {buzzLog.length===0&&<div className="text-zinc-600 text-sm italic animate-pulse">Esperando buzzers...</div>}
              {buzzLog.map((b,i)=>{
                const p=players.find(pl=>pl.id===b.playerId);
                const t=teams.find(t2=>t2.id===b.teamId);
                const isFirst=i===0;
                return(<div key={i} className="flex items-center gap-2 rounded-xl px-3 py-2" style={{background:isFirst?`${t?.color}25`:'#27272a',border:isFirst?`1px solid ${t?.color}55`:'none'}}>
                  <span className="font-black w-4" style={{color:isFirst?'#fbbf24':'#71717a'}}>{i+1}°</span>
                  <span>{p?.emoji}</span><span className="font-bold text-sm flex-1">{p?.name}</span>
                  <span className="text-xs font-bold" style={{color:t?.color}}>{t?.name}</span>
                </div>);
              })}
              {buzzLog.length>0&&(
                <div className="grid grid-cols-2 gap-2 pt-1">
                  <button onClick={declareCorrect}
                    className="btn-j bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl text-sm">
                    ✅ Correcto
                  </button>
                  <button onClick={declareIncorrect}
                    className="btn-j bg-red-700 hover:bg-red-600 text-white font-black py-3 rounded-xl text-sm">
                    ❌ Incorrecto
                  </button>
                </div>
              )}
            </div>
          )}

          {/* MINIGAME controls */}
          {phase==='MINIGAME'&&(
            <div className="space-y-3">
              {game?.minigame&&(()=>{const mg=MINIGAMES.find(m=>m.id===game.minigame);return mg&&(
                <div className="rounded-xl p-3 text-center" style={{background:`${mg.color}18`,border:`1px solid ${mg.color}55`}}>
                  <span className="text-xl">{mg.emoji}</span><span className="font-black ml-2">{mg.label}</span>
                </div>
              );})()}
              <div className="text-xs text-zinc-500 uppercase tracking-widest">Añadir puntos al pozo</div>
              <div className="grid grid-cols-4 gap-1.5">
                {[10,25,50,100].map(p=>(
                  <button key={p} onClick={()=>addPts(p)} className="btn-j bg-emerald-900/60 border border-emerald-700 text-emerald-300 font-black py-2.5 rounded-xl text-sm">+{p}</button>
                ))}
              </div>
              <div className="text-center py-1">
                <span className="text-xs text-zinc-500">Pozo actual: </span>
                <span className="text-amber-400 font-black">{game?.accPts||0} pts</span>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={()=>markResult(true)}  className="btn-j bg-lime-600 hover:bg-lime-500 text-white font-black py-3 rounded-xl">✅ Ganaron</button>
                <button onClick={()=>markResult(false)} className="btn-j bg-red-700 hover:bg-red-600 text-white font-black py-3 rounded-xl">❌ Strike</button>
              </div>
            </div>
          )}

          {/* Team scores quick view */}
          <div className="border-t border-zinc-800 pt-3 space-y-1.5">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-2">Marcador</div>
            {teams.slice(0,game?.teamCount||2).map(t=>(
              <div key={t.id} className="flex items-center justify-between rounded-lg px-3 py-1.5" style={{background:`${t.color}15`}}>
                <span className="text-sm font-bold" style={{color:t.color}}>{t.name}</span>
                <div className="flex items-center gap-3">
                  <div className="flex gap-1">
                    {[0,1,2].map(i=><div key={i} className={`w-2 h-2 rounded-full ${i<(game?.teamStrikes?.[t.id]||0)?'bg-red-500':'bg-zinc-700'}`}/>)}
                  </div>
                  <span className="font-black text-white text-base">{game?.teamScores?.[t.id]||0}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="px-4 py-3 border-t border-zinc-800 shrink-0">
          <button onClick={onLeave} className="btn-j w-full bg-red-900/40 hover:bg-red-800 border border-red-700 text-red-300 font-bold py-2.5 rounded-xl text-sm">🚪 Cerrar sala</button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState(()=>IS_JOIN?(URL_CODE?'PROFILE':'JOIN'):'HOME');
  const [roomId,setRoomId]=useState(URL_CODE);
  const [isHost,setIsHost]=useState(false);
  const [localId,setLocalId]=useState(null);
  const [game,setGame]=useState(null);
  const [toast,setToast]=useState('');
  const [roomTeams,setRoomTeams]=useState(null); // fetched teams for profile
  const unsub=useRef(null);
  const toast_=msg=>mkToast(setToast,msg);

  // If opened directly with ?join=true&code=XXXX, fetch room teams for profile screen
  useEffect(()=>{
    if(IS_JOIN&&URL_CODE&&!roomTeams){
      getDoc(rRef(URL_CODE)).then(snap=>{
        if(snap.exists())setRoomTeams(snap.data().teams||[]);
        else mkToast(setToast,'❌ Sala no encontrada');
      }).catch(()=>mkToast(setToast,'❌ Error de conexión'));
    }
  },[]);

  const subscribeRoom=useCallback(id=>{
    if(unsub.current)unsub.current();
    unsub.current=onSnapshot(rRef(id),snap=>{
      if(snap.exists()){
        const d=snap.data();
        setGame(d);
        if(d.status==='PLAYING'&&screen!=='PLAYING') setScreen('PLAYING');
        if(d.status==='CLOSED') {toast_('⚠️ La sala fue cerrada');resetState();}
      } else {toast_('⚠️ Sala no encontrada');resetState();}
    });
  },[screen]);

  useEffect(()=>()=>unsub.current?.(),[]);

  const resetState=()=>{setScreen(IS_JOIN?'JOIN':'HOME');setRoomId('');setGame(null);setLocalId(null);setIsHost(false);};

  // Validate code before profile
  const validateCode=async code=>{
    if(!code.trim())return toast_('⚠️ Ingresa un código');
    const c=code.trim().toUpperCase();
    try{
      const snap=await getDoc(rRef(c));
      if(!snap.exists())return toast_('❌ Sala no encontrada');
      const d=snap.data();
      if(d.status==='PLAYING')return toast_('❌ El show ya comenzó');
      if(d.status==='CLOSED')return toast_('❌ Sala cerrada');
      setRoomId(c); setRoomTeams(d.teams||[]); setIsHost(false); setScreen('PROFILE');
    }catch{toast_('❌ Error de conexión');}
  };

  const handleProfile=async(name,emoji,role,teamIdx=0)=>{
    if(isHost){
      const id=Math.random().toString(36).slice(2,6).toUpperCase();
      const r=mkRoom(name,emoji,role,2);
      await setDoc(rRef(id),r);
      setRoomId(id); setLocalId(role==='PLAYER_MOD'?1:'HOST'); setGame(r);
      subscribeRoom(id); setScreen('LOBBY');
    } else {
      let aid=null;
      try{
        await runTransaction(db,async txn=>{
          const snap=await txn.get(rRef(roomId));
          if(!snap.exists())throw new Error('NO_ROOM');
          const d=snap.data();
          if(d.status!=='LOBBY')throw new Error('STARTED');
          const ps=d.players||[];
          aid=ps.length+1;
          const newPlayer={id:aid,name,emoji,teamId:teamIdx,score:0};
          const newTeams=(d.teams||[]).map((t,i)=>i===teamIdx?{...t,players:[...t.players,name]}:t);
          txn.update(rRef(roomId),{players:[...ps,newPlayer],teams:newTeams});
        });
        setLocalId(aid); subscribeRoom(roomId); setScreen('LOBBY');
      }catch(e){toast_(e.message==='NO_ROOM'?'❌ Sala no encontrada':'❌ Error al unirse');resetState();}
    }
  };

  const startGame=async()=>{
    await updateDoc(rRef(roomId),{status:'PLAYING',phase:'CURTAIN'});
    setScreen('PLAYING');
  };

  const leaveRoom=async()=>{
    if(unsub.current)unsub.current();
    if(isHost){try{await updateDoc(rRef(roomId),{status:'CLOSED'});}catch{}}
    else{try{
      await runTransaction(db,async txn=>{
        const snap=await txn.get(rRef(roomId));
        if(!snap.exists())return;
        const d=snap.data();
        const newPs=d.players.filter(p=>p.id!==localId);
        // also remove from team players array
        const myP=d.players.find(p=>p.id===localId);
        const newTeams=d.teams.map(t=>({...t,players:t.players.filter(n=>n!==myP?.name)}));
        txn.update(rRef(roomId),{players:newPs,teams:newTeams});
      });
    }catch{}}
    resetState();
  };

  useEffect(()=>{
    if(screen==='LOBBY'&&game?.status==='PLAYING') setScreen('PLAYING');
  },[game?.status,screen]);

  return(
    <div className="h-full w-full bg-zinc-950 text-white">
      <Toast msg={toast}/>
      {screen==='HOME'   &&<ScreenHome    onCreate={()=>{setIsHost(true);setScreen('PROFILE');}} onJoin={validateCode}/>}
      {screen==='JOIN'   &&<ScreenJoin    onJoin={validateCode}/>}
      {screen==='PROFILE'&&<ScreenProfile isHost={isHost} teams={roomTeams} onSubmit={handleProfile} onBack={()=>{setScreen(IS_JOIN?(URL_CODE?'JOIN':'JOIN'):'HOME');setIsHost(false);setRoomId('');}}/>}
      {screen==='LOBBY'  &&game&&<ScreenLobby   game={game} roomId={roomId} isHost={isHost} localId={localId} onStart={startGame} onLeave={leaveRoom}/>}
      {screen==='PLAYING'&&game&&<ScreenPlaying game={game} roomId={roomId} isHost={isHost} localId={localId} onLeave={leaveRoom}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

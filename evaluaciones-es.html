<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Español | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        button, a, label, .no-select { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { ArrowLeft, Save, PenTool, Loader2, Brain, Key, ChevronDown, ChevronUp, XCircle, MinusCircle, CheckCircle, CheckCircle2, Lock, BookOpen, Palette } from 'lucide-react';

        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const db = getFirestore(app);

        // --- SKILL TEMPLATES ---
        const UNIVERSAL   = ["Aplica en conversación", "Identifica al escuchar"];
        const VERB_SKILLS = ["Significado al verlo", "Pronuncia correctamente", "Conjugación correcta", "Aplica en conversación", "Identifica al escuchar"];
        const VOCAB_SKILLS = ["Identifica (ID)", "Ortografía (SP)", "Colocación (COL)", "Uso activo (USE)"];

        // --- CONFIG POR MÓDULO ESPAÑOL ---
        const CONFIG = {
            es1: {
                label: 'ES1 — Cimientos',
                grammar: [
                    { id: 'es1_fonetica', title: 'Fonética y acentuación', skills: ["5 vocales puras (sin schwa)", "Sílaba tónica correcta", "Tilde diacrítica", "Deletrea en español", ...UNIVERSAL] },
                    { id: 'es1_alfabeto', title: 'Alfabeto · Números · Cognados', skills: ["Recita el alfabeto", "Números 1–100", "Identifica cognados", "Evita faux amis (embarazada)", ...UNIVERSAL] },
                    { id: 'es1_genero',  title: 'Género y número + concordancia', skills: ["Asigna el/la correctamente", "Concordancia art. + sustantivo", "Concordancia con adjetivo", "Patrones -o/-a · -ción/-dad", ...UNIVERSAL] },
                    { id: 'es1_articulo', title: 'El artículo + HAY', skills: ["Hay un/una correctamente", "Hay unos/unas", "Omite artículo cuando aplica", "El agua / Lo interesante (excepción)", ...UNIVERSAL] }
                ],
                verbs: [],
                nouns: [
                    { id: 'np1_es', title: 'NP1-ES: La Casa y los Objetos', skills: VOCAB_SKILLS }
                ],
                adjectives: [
                    { id: 'ap1_es', title: 'AP1-ES: Descripción básica', skills: VOCAB_SKILLS }
                ],
                key_structs: ["Hay un/una · hay unos/unas", "¿Cuántos hay?", "El/La/Los/Las en contexto", "Concordancia art.+sust.+adj.", "5 vocales puras · sin schwa"]
            },
            es2: {
                label: 'ES2 — El Sistema Verbal',
                grammar: [
                    { id: 'es2_ser',      title: 'SER', skills: ["Soy/eres/es/somos/sois/son", "Negación: No soy...", "¿De dónde eres? / ¿Cómo eres?", "Usos: identidad/origen/profesión", ...UNIVERSAL] },
                    { id: 'es2_estar',    title: 'ESTAR', skills: ["Estoy/estás/está/estamos/estáis/están", "Ubica personas y cosas", "¿Cómo estás? / ¿Dónde está?", "Usos: estado/ubicación/temporal", ...UNIVERSAL] },
                    { id: 'es2_tener',    title: 'TENER + obligación', skills: ["Tengo/tienes/tiene/tenemos/tenéis/tienen", "Tengo que + infinitivo", "Hay que + infinitivo", "Tengo hambre / frío / sed", ...UNIVERSAL] },
                    { id: 'es2_serestar', title: 'SER vs ESTAR — contraste', skills: ["Adjetivos duales: listo/malo/seguro/rico", "Es de madera vs Está roto", "Es vs Está con estados y lugares", "Elige correctamente en contexto", ...UNIVERSAL] }
                ],
                verbs: [],
                nouns: [
                    { id: 'np2_es', title: 'NP2-ES: El Cuerpo y la Apariencia', skills: VOCAB_SKILLS },
                    { id: 'np3_es', title: 'NP3-ES: Las Emociones y los Estados', skills: VOCAB_SKILLS }
                ],
                adjectives: [
                    { id: 'ap1_es_r', title: 'AP1-ES (retrieval)', skills: VOCAB_SKILLS },
                    { id: 'ap2_es',   title: 'AP2-ES: Emociones y carácter', skills: VOCAB_SKILLS }
                ],
                key_structs: ["Soy + profesión/origen/material", "Estoy de acuerdo / Está cerrado", "Tengo + sensación física", "Es aburrido vs Está aburrido", "Tengo que / Hay que + inf"]
            },
            es3: {
                label: 'ES3 — Presente I',
                grammar: [
                    { id: 'es3_ar',     title: 'Verbos regulares -AR', skills: ["Conjugación: -o/-as/-a/-amos/-áis/-an", "Negación: No + verbo conjugado", "Pregunta: ¿Tú hablas / Él trabaja?", "Aplica con VPs en contexto real", ...UNIVERSAL] },
                    { id: 'es3_erir',   title: 'Verbos regulares -ER/-IR', skills: ["Terminaciones -ER: -o/-es/-e/-emos/-éis/-en", "Terminaciones -IR: -o/-es/-e/-imos/-ís/-en", "Interrogativos ¿Qué/Cuándo/Dónde/Por qué?", "Combina -AR y -ER/-IR en conversación", ...UNIVERSAL] },
                    { id: 'es3_irrega', title: 'Irregulares Grupo A', skills: ["ir: voy/vas/va/vamos/vais/van", "hacer: hago / haces / hace...", "querer e→ie: quiero / quieres...", "poder o→ue: puedo / puedes...", ...UNIVERSAL] },
                    { id: 'es3_irregb', title: 'Irregulares Grupo B + cambio vocálico', skills: ["Yo-go: digo / sé / vengo / traigo", "e→ie: pienso / pierdo / prefiero", "o→ue: duermo / vuelvo / puedo", "e→i: pido / sigo / consigo", ...UNIVERSAL] }
                ],
                verbs: [
                    { id: 'vp1_es', title: 'VP1-ES: Verbos rutinarios -AR', skills: VERB_SKILLS },
                    { id: 'vp2_es', title: 'VP2-ES: Verbos cotidianos -ER/-IR', skills: VERB_SKILLS },
                    { id: 'vp3_es', title: 'VP3-ES: Irregulares Top 12', skills: VERB_SKILLS }
                ],
                nouns: [
                    { id: 'np4_es', title: 'NP4-ES: La Familia y las Relaciones', skills: VOCAB_SKILLS },
                    { id: 'np5_es', title: 'NP5-ES: El Trabajo y los Estudios', skills: VOCAB_SKILLS }
                ],
                adjectives: [
                    { id: 'ap3_es', title: 'AP3-ES: Descriptores de personas/lugares', skills: VOCAB_SKILLS },
                    { id: 'ap4_es', title: 'AP4-ES: Personalidad y carácter', skills: VOCAB_SKILLS }
                ],
                key_structs: ["Negación: No + verbo conjugado", "¿Tú/Él + verbo?", "¿Qué haces? / ¿Dónde vives?", "Yo-go irregulares (digo/tengo/vengo)", "Cambios vocálicos e→ie / o→ue / e→i"]
            },
            es4: {
                label: 'ES4 — Presente II',
                grammar: [
                    { id: 'es4_reflex1',  title: 'Verbos reflexivos pt.1', skills: ["Pronombres: me/te/se/nos/os/se", "Posición: antes del verbo conjugado", "Me levanto / te acuestas / se ducha", "Se llama... / Nos duchamos por la mañana", ...UNIVERSAL] },
                    { id: 'es4_reflex2',  title: 'Verbos reflexivos pt.2', skills: ["Llamo vs me llamo (cambio semántico)", "Verbos recíprocos: nos vemos / se besan", "Cuándo NO usar el reflexivo", "Me aburro vs aburro a alguien", ...UNIVERSAL] },
                    { id: 'es4_gustar',   title: 'Verbos tipo GUSTAR', skills: ["Me gusta + inf / Me gustan + sustantivo", "Énfasis: A mí me encanta", "OI completos: me/te/le/nos/os/les", "Le molesta / Te interesa / Nos fascina", ...UNIVERSAL] },
                    { id: 'es4_prog',     title: 'Presente Progresivo', skills: ["estar + gerundio (estructura)", "Gerundios regulares: -ando / -iendo", "Irregulares: diciendo / yendo / siendo", "Contraste: trabajo siempre vs estoy trabajando", ...UNIVERSAL] }
                ],
                verbs: [
                    { id: 'vp4_es', title: 'VP4-ES: Verbos reflexivos comunes', skills: VERB_SKILLS },
                    { id: 'vp5_es', title: 'VP5-ES: Verbos tipo gustar', skills: VERB_SKILLS }
                ],
                nouns: [
                    { id: 'np6_es', title: 'NP6-ES: El Tiempo Libre y los Hobbies', skills: VOCAB_SKILLS }
                ],
                adjectives: [
                    { id: 'ap4_es_r', title: 'AP3-ES + AP4-ES (retrieval)', skills: VOCAB_SKILLS }
                ],
                key_structs: ["Me levanto / te acuestas / se llama", "Cambio semántico con reflexivos", "A mí me gusta / A ella le encanta", "Estoy hablando / Están comiendo", "Presente simple vs progresivo"]
            },
            es5: {
                label: 'ES5 — Tiempo y Narrativas',
                grammar: [
                    { id: 'es5_futuroprox', title: 'Futuro Próximo: IR A + inf', skills: ["voy/vas/va/vamos/vais/van a + inf", "¿Qué vas a hacer este finde?", "Planes inmediatos y a futuro", "Contraste con intención espontánea", ...UNIVERSAL] },
                    { id: 'es5_futsimp',    title: 'Futuro Simple', skills: ["Terminaciones: -é/-ás/-á/-emos/-éis/-án", "12 irregulares: tendré/vendré/diré/haré...", "Quizás / Seguramente + futuro", "IR A vs futuro simple (matiz temporal)", ...UNIVERSAL] },
                    { id: 'es5_pret_ar',    title: 'Pretérito Indefinido -AR', skills: ["-é/-aste/-ó/-amos/-asteis/-aron", "Marcadores: ayer / anoche / la semana pasada", "Aplica en narración oral", "Sin confusión con el presente", ...UNIVERSAL] },
                    { id: 'es5_pret_erir',  title: 'Pretérito -ER/-IR + irregulares', skills: ["-í/-iste/-ió/-imos/-isteis/-ieron", "Fui/fue · hice · tuve · pude · vine · dije · supe", "Alterna presente y pretérito naturalmente", "Narración oral fluida con marcadores", ...UNIVERSAL] }
                ],
                verbs: [
                    { id: 'vp6_es', title: 'VP6-ES: Verbos de acción futura', skills: VERB_SKILLS },
                    { id: 'vp7_es', title: 'VP7-ES: Pretérito -AR + irr. gr.1', skills: VERB_SKILLS },
                    { id: 'vp8_es', title: 'VP8-ES: Pretérito -ER/-IR + irr. gr.2', skills: VERB_SKILLS }
                ],
                nouns: [
                    { id: 'np7_es', title: 'NP7-ES: Los Planes y el Transporte', skills: VOCAB_SKILLS },
                    { id: 'np8_es', title: 'NP8-ES: Las Experiencias y el Pasado', skills: VOCAB_SKILLS }
                ],
                adjectives: [],
                key_structs: ["Voy a + inf (planes)", "Hablaré / Tendré / Vendrá", "Ayer hablé / El lunes pasado comí", "Fui/hice/tuve/supe (irr. pretérito)", "Marcadores temporales: ayer / la semana pasada"]
            },
            'es-mix1': {
                label: 'ES-Mix1 — Consolidación Básico',
                grammar: [],
                verbs: [
                    { id: 'vp_ret_15', title: 'VP1–VP5 (retrieval)', skills: VERB_SKILLS },
                    { id: 'vp_ret_68', title: 'VP6–VP8 (retrieval)', skills: VERB_SKILLS }
                ],
                nouns: [
                    { id: 'np_ret_14', title: 'NP1–NP4 (retrieval)', skills: VOCAB_SKILLS },
                    { id: 'np_ret_58', title: 'NP5–NP8 (retrieval)', skills: VOCAB_SKILLS }
                ],
                adjectives: [
                    { id: 'ap_ret', title: 'AP1–AP4 (retrieval)', skills: VOCAB_SKILLS }
                ],
                key_structs: ["SER/ESTAR/TENER integrado y fluido", "Presente completo (incluye reflexivos)", "Gustar + pronombres OI", "IR A + futuro simple (contraste)", "Pretérito indefinido fluido"]
            }
        };

        const LEVEL_HIERARCHY = ['es1', 'es2', 'es3', 'es4', 'es5', 'es-mix1'];

        // --- COMPONENTE PRINCIPAL ---
        const EvaluationHub = () => {
            const [student,    setStudent]    = useState(null);
            const [loading,    setLoading]    = useState(true);
            const [isSaving,   setIsSaving]   = useState(false);
            const [toast,      setToast]      = useState(false);
            const [activeLevel, setActiveLevel] = useState('es1');
            const [openPanels, setOpenPanels] = useState([]);
            const [evalData,   setEvalData]   = useState({});

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { window.location.href = 'index-es.html'; return; }
                getDoc(doc(db, 'artifacts/periplo-app-v1/students', id)).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setStudent({ id: docSnap.id, ...data });
                        if (data.detailedMastery) setEvalData(data.detailedMastery);
                        if (LEVEL_HIERARCHY.includes(data.level)) setActiveLevel(data.level);
                    }
                    setLoading(false);
                });
            }, []);

            const saveEvaluation = async () => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/students', student.id), { detailedMastery: evalData });
                    setIsSaving(false);
                    setToast(true);
                    setTimeout(() => setToast(false), 3000);
                } catch(e) { alert(e.message); setIsSaving(false); }
            };

            const togglePanel = (name) => setOpenPanels(prev =>
                prev.includes(name) ? prev.filter(p => p !== name) : [...prev, name]
            );

            const setSkillStatus = (topicId, skillName, status) => {
                setEvalData(prev => {
                    const topic = prev[topicId] || { skills: {} };
                    return { ...prev, [topicId]: { ...topic, skills: { ...topic.skills, [skillName]: status } } };
                });
            };

            const calcScore = (topicId, skillList) => {
                const topic = evalData[topicId] || { skills: {} };
                let pts = 0;
                skillList.forEach(s => {
                    const st = topic.skills[s] || 0;
                    if (st === 1) pts += 0.5;
                    if (st === 2) pts += 1;
                });
                return skillList.length === 0 ? 0 : Math.round(((pts / skillList.length) * 10) * 10) / 10;
            };

            const sectionAvg = (items) => {
                if (!items || items.length === 0) return 0;
                const total = items.reduce((sum, t) => sum + calcScore(t.id, t.skills), 0);
                return Math.round((total / items.length) * 10) / 10;
            };

            const keyStructId  = () => 'key_structs_' + activeLevel;
            const keyStructScore = () => calcScore(keyStructId(), track.key_structs);

            const SkillRow = ({ label, status, onChange }) => (
                <div className="flex items-center justify-between gap-3 p-2.5 hover:bg-slate-100 dark:hover:bg-zinc-800/50 rounded-xl transition-colors">
                    <span className="text-[11px] font-bold text-slate-700 dark:text-zinc-300 flex-1 leading-tight">{label}</span>
                    <div className="flex bg-slate-200 dark:bg-zinc-950 rounded-xl p-0.5 border border-slate-300 dark:border-zinc-800 shadow-inner">
                        <button onClick={() => onChange(0)} className={`p-1.5 rounded-lg transition-all ${status === 0 ? 'bg-rose-500 text-white scale-110' : 'text-slate-400 hover:text-rose-400'}`}><XCircle size={16}/></button>
                        <button onClick={() => onChange(1)} className={`p-1.5 rounded-lg transition-all ${status === 1 ? 'bg-yellow-500 text-white scale-110' : 'text-slate-400 hover:text-yellow-400'}`}><MinusCircle size={16}/></button>
                        <button onClick={() => onChange(2)} className={`p-1.5 rounded-lg transition-all ${status === 2 ? 'bg-emerald-500 text-white scale-110' : 'text-slate-400 hover:text-emerald-400'}`}><CheckCircle size={16}/></button>
                    </div>
                </div>
            );

            const ProgressBar = ({ score }) => (
                <div className="w-full h-1.5 bg-slate-200 dark:bg-zinc-800 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-500 ${score >= 8 ? 'bg-emerald-500' : score >= 5 ? 'bg-yellow-400' : 'bg-rose-500'}`} style={{width: `${score * 10}%`}}/>
                </div>
            );

            const TopicCard = ({ item, accentColor, onChange }) => (
                <div className="p-4 bg-slate-50 dark:bg-zinc-950/50 rounded-3xl border border-slate-200 dark:border-zinc-800">
                    <div className="flex justify-between items-center mb-2">
                        <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-wider">{item.title}</h3>
                        <span className={`text-xs font-black ${accentColor}`}>{calcScore(item.id, item.skills)}</span>
                    </div>
                    <ProgressBar score={calcScore(item.id, item.skills)}/>
                    <div className="mt-3 space-y-1">
                        {item.skills.map(s => (
                            <SkillRow key={s} label={s}
                                status={(evalData[item.id]?.skills || {})[s] || 0}
                                onChange={v => onChange(item.id, s, v)}
                            />
                        ))}
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-zinc-950">
                    <Loader2 className="animate-spin text-indigo-500" size={48}/>
                </div>
            );

            const studentLevelIndex = LEVEL_HIERARCHY.indexOf(student?.level || 'es1');
            const track = CONFIG[activeLevel];

            return (
                <div className="min-h-screen pb-24 fade-in">
                    {toast && (
                        <div className="fixed bottom-8 right-8 z-[100] bg-emerald-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
                            <CheckCircle2 size={24}/><span className="font-black">¡Guardado!</span>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='index-es.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors text-slate-400">
                                    <ArrowLeft size={20}/>
                                </button>
                                <div>
                                    <h1 className="text-lg font-black leading-none">Evaluación Español</h1>
                                    <p className="text-[10px] font-bold text-slate-400 mt-0.5 uppercase tracking-widest">{student?.name}</p>
                                </div>
                            </div>
                            <button onClick={saveEvaluation} disabled={isSaving}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-black flex items-center gap-2 shadow-lg transition-transform active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 size={18} className="animate-spin"/> : <Save size={18}/>}
                                <span className="hidden sm:inline">Guardar</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 py-8 space-y-6">

                        {/* LEVEL SELECTOR */}
                        <div>
                            <div className="flex flex-wrap gap-1 p-1 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl w-fit">
                                {LEVEL_HIERARCHY.map((lvl, idx) => {
                                    const isLocked = idx > studentLevelIndex;
                                    return (
                                        <button key={lvl} disabled={isLocked} onClick={() => setActiveLevel(lvl)}
                                            className={`px-4 py-2 rounded-xl font-black text-xs transition-all flex items-center gap-1
                                                ${isLocked
                                                    ? 'opacity-40 cursor-not-allowed text-slate-400'
                                                    : activeLevel === lvl
                                                        ? 'bg-slate-100 dark:bg-zinc-800 text-indigo-500 shadow-sm'
                                                        : 'text-slate-400 hover:text-slate-600 dark:hover:text-zinc-300'
                                                }`}>
                                            {isLocked && <Lock size={11}/>}
                                            {lvl.toUpperCase()}
                                        </button>
                                    );
                                })}
                            </div>
                            <p className="text-xs font-bold text-slate-400 mt-2 ml-1">{track.label}</p>
                        </div>

                        {/* GRAMMAR CORE — oculto en ES-Mix1 */}
                        {track.grammar.length > 0 && (
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                                <button onClick={() => togglePanel('grammar')}
                                    className="w-full p-5 flex items-center justify-between bg-emerald-50 dark:bg-emerald-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                    <div className="flex items-center gap-3">
                                        <PenTool className="text-emerald-500" size={20}/>
                                        <h2 className="text-sm font-black text-emerald-500 uppercase tracking-widest">Grammar Core</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-emerald-500 text-lg">{sectionAvg(track.grammar)}</span>
                                        {openPanels.includes('grammar') ? <ChevronUp className="text-emerald-500" size={20}/> : <ChevronDown className="text-emerald-500" size={20}/>}
                                    </div>
                                </button>
                                {openPanels.includes('grammar') && (
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                        {track.grammar.map(t => (
                                            <TopicCard key={t.id} item={t} accentColor="text-indigo-500" onChange={setSkillStatus}/>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VERB MASTERY — oculto en ES1 y ES2 */}
                        {track.verbs.length > 0 && (
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                                <button onClick={() => togglePanel('verbs')}
                                    className="w-full p-5 flex items-center justify-between bg-rose-50 dark:bg-rose-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                    <div className="flex items-center gap-3">
                                        <Brain className="text-rose-500" size={20}/>
                                        <h2 className="text-sm font-black text-rose-500 uppercase tracking-widest">Verb Mastery</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-rose-500 text-lg">{sectionAvg(track.verbs)}</span>
                                        {openPanels.includes('verbs') ? <ChevronUp className="text-rose-500" size={20}/> : <ChevronDown className="text-rose-500" size={20}/>}
                                    </div>
                                </button>
                                {openPanels.includes('verbs') && (
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                        {track.verbs.map(v => (
                                            <TopicCard key={v.id} item={v} accentColor="text-rose-500" onChange={setSkillStatus}/>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VOCAB — SUSTANTIVOS */}
                        {track.nouns.length > 0 && (
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                                <button onClick={() => togglePanel('nouns')}
                                    className="w-full p-5 flex items-center justify-between bg-sky-50 dark:bg-sky-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                    <div className="flex items-center gap-3">
                                        <BookOpen className="text-sky-500" size={20}/>
                                        <h2 className="text-sm font-black text-sky-500 uppercase tracking-widest">Vocab — Sustantivos</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-sky-500 text-lg">{sectionAvg(track.nouns)}</span>
                                        {openPanels.includes('nouns') ? <ChevronUp className="text-sky-500" size={20}/> : <ChevronDown className="text-sky-500" size={20}/>}
                                    </div>
                                </button>
                                {openPanels.includes('nouns') && (
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                        {track.nouns.map(n => (
                                            <TopicCard key={n.id} item={n} accentColor="text-sky-500" onChange={setSkillStatus}/>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VOCAB — ADJETIVOS — oculto en ES5 */}
                        {track.adjectives.length > 0 && (
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                                <button onClick={() => togglePanel('adjectives')}
                                    className="w-full p-5 flex items-center justify-between bg-pink-50 dark:bg-pink-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                    <div className="flex items-center gap-3">
                                        <Palette className="text-pink-500" size={20}/>
                                        <h2 className="text-sm font-black text-pink-500 uppercase tracking-widest">Vocab — Adjetivos</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-pink-500 text-lg">{sectionAvg(track.adjectives)}</span>
                                        {openPanels.includes('adjectives') ? <ChevronUp className="text-pink-500" size={20}/> : <ChevronDown className="text-pink-500" size={20}/>}
                                    </div>
                                </button>
                                {openPanels.includes('adjectives') && (
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in">
                                        {track.adjectives.map(a => (
                                            <TopicCard key={a.id} item={a} accentColor="text-pink-500" onChange={setSkillStatus}/>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ESTRUCTURAS CLAVE */}
                        <div className="bg-white dark:bg-zinc-900 rounded-[2rem] border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <button onClick={() => togglePanel('keystructs')}
                                className="w-full p-5 flex items-center justify-between bg-amber-50 dark:bg-amber-900/10 border-b border-slate-200 dark:border-zinc-800 hover:brightness-95 transition-all text-left">
                                <div className="flex items-center gap-3">
                                    <Key className="text-amber-500" size={20}/>
                                    <h2 className="text-sm font-black text-amber-500 uppercase tracking-widest">Estructuras Clave</h2>
                                </div>
                                <div className="flex items-center gap-4">
                                    <span className="font-black text-amber-500 text-lg">{keyStructScore()}</span>
                                    {openPanels.includes('keystructs') ? <ChevronUp className="text-amber-500" size={20}/> : <ChevronDown className="text-amber-500" size={20}/>}
                                </div>
                            </button>
                            {openPanels.includes('keystructs') && (
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 animate-in fade-in">
                                    {track.key_structs.map(ks => (
                                        <SkillRow key={ks} label={ks}
                                            status={(evalData[keyStructId()]?.skills || {})[ks] || 0}
                                            onChange={st => setSkillStatus(keyStructId(), ks, st)}
                                        />
                                    ))}
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EvaluationHub />);
    </script>
</body>
</html>

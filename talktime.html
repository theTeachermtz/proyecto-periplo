<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Talk Time | Periplo Games</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'pop-in':  'popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards',
                        'fade-in': 'fadeIn 0.25s ease forwards',
                    },
                    keyframes: {
                        popIn:  { '0%': { transform:'scale(0.7)', opacity:'0' }, '100%': { transform:'scale(1)', opacity:'1' } },
                        fadeIn: { '0%': { opacity:'0' },                          '100%': { opacity:'1' } }
                    }
                }
            }
        };
    </script>

    <script type="importmap">
    {
      "imports": {
        "react":           "https://esm.sh/react@18.2.0",
        "react-dom/client":"https://esm.sh/react-dom@18.2.0/client",
        "lucide-react":    "https://esm.sh/lucide-react@0.263.1",
        "firebase/app":    "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            background: #020617;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .table-bg { background: radial-gradient(circle, #082f49 0%, #020617 80%); }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .anim-float { animation: float 3s ease-in-out infinite; display:inline-block; }
    </style>
</head>
<body class="text-white h-[100dvh] w-screen">
<div id="root" class="h-full w-full"></div>

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { initializeApp } from 'firebase/app';
import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, arrayUnion } from 'firebase/firestore';
import {
    Users, Play, Crown, ArrowRight, Zap, Mic, Clock,
    Check, X as XIcon, Pause, Play as PlayIcon, ArrowLeft, HeartCrack,
    UserPlus, Copy
} from 'lucide-react';

const firebaseConfig = {
    apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo",
    authDomain: "proyecto-periplo.firebaseapp.com",
    projectId: "proyecto-periplo",
    storageBucket: "proyecto-periplo.firebasestorage.app",
    messagingSenderId: "236795998392",
    appId: "1:236795998392:web:0da24b4f018611b55c844d"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const AVATARS = ['😎','🤩','🦊','🦁','🐯','🐼','🦋','🦄','🐉','🧙','🥷','🤖','👽','🐬','🦅','🎸','🏆','👑','⚡','🔥','🌙','🌈','💎','🚀','🎯','🎮','🍀','🌟','🦚','🤓'];
const IS_STUDENT_MODE_TT = new URLSearchParams(window.location.search).get('student') === 'true'
    || new URLSearchParams(window.location.search).get('mode') === 'student';
const getStudentNameTT = () =>
    localStorage.getItem('periplo_student_name') ||
    localStorage.getItem('periplo_teacher_name') || '';
const CATEGORIES = {
    story:    { name:'Story Time',    color:'text-blue-400',    border:'border-blue-500'    },
    hotTake:  { name:'Hot Take',      color:'text-fuchsia-400', border:'border-fuchsia-500' },
    facts:    { name:'Shocking Facts',color:'text-amber-400',   border:'border-amber-500'   },
    dilemmas: { name:'Dilemma',       color:'text-emerald-400', border:'border-emerald-500' },
};

const generateId = () => Math.random().toString(36).substring(2,6).toUpperCase();

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const playTick = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.start(); o.stop(audioCtx.currentTime + 0.08);
};
const playAlarm = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle'; o.frequency.setValueAtTime(400, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(620, audioCtx.currentTime + 0.5);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
    o.start(); o.stop(audioCtx.currentTime + 1);
};

// ─── shuffle helper ───
const shuffle = arr => [...arr].sort(() => 0.5 - Math.random());

const TalkTimeGame = () => {
    const [localPlayerId] = useState(() => {
        let id = localStorage.getItem('tt_playerId');
        if (!id) { id = generateId(); localStorage.setItem('tt_playerId', id); }
        return id;
    });

    const [gameState,     setGameState]     = useState('loading');
    const [sessionMode,   setSessionMode]   = useState(null);
    const [sessionCode,   setSessionCode]   = useState('');
    const [joinInput,     setJoinInput]     = useState('');
    const [isStudentMode, setIsStudentMode] = useState(false);
    
    const [playerName,    setPlayerName]    = useState(() => localStorage.getItem('periplo_student_name') || localStorage.getItem('periplo_teacher_name') || '');
    const [playerEmoji,   setPlayerEmoji]   = useState(() => localStorage.getItem('periplo_student_emoji') || localStorage.getItem('periplo_teacher_emoji') || AVATARS[0]);
    const [isHostPlaying, setIsHostPlaying] = useState(false);

    const [sessionData,   setSessionData]   = useState(null);
    const [errorMsg,      setErrorMsg]      = useState('');
    const [localTimeLeft, setLocalTimeLeft] = useState(0);
    const [codeCopied,    setCodeCopied]    = useState(false);

    const timerRaf    = useRef(null);
    const teacherUID  = useRef('teacher_builder_001');

    // ─── init ───
    useEffect(() => {
        const p = new URLSearchParams(window.location.search);
        if (p.get('uid')) teacherUID.current = p.get('uid');

        const isStudent = p.get('student') === 'true' || p.get('mode') === 'student';
        if (isStudent) setIsStudentMode(true);

        const joinCode = p.get('session');
        const quizId   = p.get('id');

        if (joinCode) {
            setSessionMode('join');
            setSessionCode(joinCode.toUpperCase());
            setGameState('setup');
        } else if (quizId || isStudent) {
            setGameState('landing');
        } else {
            setErrorMsg('Falta el ID del juego.');
            setGameState('error');
        }
    }, []);

    // ─── Auto-transition: lobby → playing when host starts game ───
    useEffect(() => {
        if (gameState === 'lobby' && sessionData?.state && sessionData.state !== 'lobby') {
            setGameState('playing');
        }
    }, [sessionData, gameState]);

    // ─── Firestore subscription ───
    useEffect(() => {
        if (!sessionCode || ['setup','host_setup','loading','landing'].includes(gameState)) return;
        const ref = doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode);
        return onSnapshot(ref, snap => {
            if (!snap.exists()) { setErrorMsg('La sala se cerró.'); setGameState('error'); return; }
            const data = snap.data();
            setSessionData(data);

            if (timerRaf.current) cancelAnimationFrame(timerRaf.current);
            if (data.timer?.active && !data.timer.pausedLeft) {
                runLocalTimer(data.timer.endTime);
            } else {
                setLocalTimeLeft(data.timer?.pausedLeft || data.timer?.duration || 0);
            }
        });
    }, [sessionCode, gameState]);

    const runLocalTimer = (endTime) => {
        const tick = () => {
            const left = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
            setLocalTimeLeft(left);
            if (left > 0 && left <= 5) playTick();
            if (left === 0) { playAlarm(); return; }
            timerRaf.current = requestAnimationFrame(tick);
        };
        timerRaf.current = requestAnimationFrame(tick);
    };

    // ─── Host: create session ───
    const initializeHostSession = async (playAsWell) => {
        setGameState('loading');
        try {
            if (playAsWell) {
                localStorage.setItem('periplo_teacher_name', playerName);
                localStorage.setItem('periplo_teacher_emoji', playerEmoji);
            }
            const quizId = new URLSearchParams(window.location.search).get('id');
            const snap = await getDoc(doc(db, `artifacts/periplo-app-v1/users/${teacherUID.current}/quizzes`, quizId));
            if (!snap.exists()) throw new Error('Juego no encontrado.');
            const data = snap.data();
            const code = generateId();

            const initialPlayers = playAsWell ? [{ id: localPlayerId, name: playerName, emoji: playerEmoji }] : [];

            await setDoc(doc(db, 'artifacts/periplo-app-v1/sessions', code), {
                hostId: localPlayerId,
                quizTitle: data.title,
                type: 'TALKTIME',
                state: 'lobby',
                content: data.content,
                playedItems: [],
                players: initialPlayers,
                turnOrder: [],
                currentTurnIndex: 0,
                roundNumber: 1,
                availableCats: Object.keys(CATEGORIES),
                currentTurn: { playerId: null, categoryId: null, options: [], selectedItem: null },
                timer: { active: false, phase: 'prep', endTime: 0, duration: 45, pausedLeft: 0 },
                createdAt: new Date().toISOString()
            });
            setSessionMode('host');
            setSessionCode(code);
            setGameState('lobby');
        } catch (e) { setErrorMsg(e.message); setGameState('error'); }
    };

    // ─── Join: use name from localStorage, avatar from picker ───
    const joinGame = async () => {
        const resolvedName = playerName.trim() || getStudentNameTT() || 'Alumno';
        localStorage.setItem('periplo_student_name', resolvedName);
        localStorage.setItem('periplo_student_emoji', playerEmoji);
        setGameState('loading');
        const ref  = doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode);
        const snap = await getDoc(ref);
        if (!snap.exists()) { setErrorMsg('Código de sala inválido.'); setGameState('error'); return; }
        const data = snap.data();
        if (!data.players.find(p => p.id === localPlayerId)) {
            await updateDoc(ref, { players: arrayUnion({ id: localPlayerId, name: resolvedName, emoji: playerEmoji }) });
        }
        setGameState('lobby');
    };

    // ─── Game actions ───
    const refDoc = () => doc(db, 'artifacts/periplo-app-v1/sessions', sessionCode);

    const startGame = async () => {
        if (!sessionData?.players?.length) return;
        const order = shuffle(sessionData.players.map(p => p.id));
        await updateDoc(refDoc(), {
            state: 'idle',
            turnOrder: order,
            currentTurnIndex: 0,
            roundNumber: 1,
            availableCats: Object.keys(CATEGORIES),
            'currentTurn.playerId':    order[0],
            'currentTurn.categoryId':  null,
            'currentTurn.options':     [],
            'currentTurn.selectedItem':null,
        });
    };

    const startTurn = async () => {
        const playerId = sessionData.turnOrder[sessionData.currentTurnIndex];
        
        let cats = sessionData.availableCats || [];
        if (cats.length === 0) {
            cats = Object.keys(CATEGORIES); // Refill all categories if empty
        }

        const newOptions = [];
        for (const catId of cats) {
            const catData = sessionData.content?.categories?.find(c => c.id === catId);
            if (catData?.items?.length) {
                const played = sessionData.playedItems || [];
                const available = catData.items.filter(i => !played.includes(i.title));
                const pool = available.length ? available : catData.items;
                const chosen = pool[Math.floor(Math.random() * pool.length)];
                newOptions.push({ categoryId: catId, ...chosen });
            }
        }

        const opts = shuffle(newOptions);

        await updateDoc(refDoc(), {
            state: 'choose',
            availableCats: cats, // save back in case it was refilled
            currentTurn: { playerId, categoryId: null, options: opts, selectedItem: null }
        });
    };

    const selectOption = async (item) => {
        const updatedCats = (sessionData.availableCats || []).filter(c => c !== item.categoryId);

        await updateDoc(refDoc(), {
            state: 'reading',
            availableCats: updatedCats,
            'currentTurn.categoryId': item.categoryId,
            'currentTurn.selectedItem': item,
            playedItems: arrayUnion(item.title)
        });
    };

    const startTimer = async (seconds, phase) => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        await updateDoc(refDoc(), {
            state: 'timer',
            timer: { active: true, phase, endTime: Date.now() + seconds * 1000, duration: seconds, pausedLeft: 0 }
        });
    };

    const togglePause = async () => {
        const { timer } = sessionData;
        if (timer.pausedLeft > 0) {
            await updateDoc(refDoc(), { 'timer.pausedLeft': 0, 'timer.endTime': Date.now() + timer.pausedLeft * 1000 });
        } else {
            await updateDoc(refDoc(), { 'timer.pausedLeft': localTimeLeft });
        }
    };

    const endTurn = async (passed) => {
        // Capture snapshot values before the async chain
        const { players, turnOrder, currentTurnIndex, roundNumber } = sessionData;

        if (passed) confetti({ particleCount: 100, spread: 70, origin: { y: 0.35 } });

        await updateDoc(refDoc(), {
            state: passed ? 'judging_pass' : 'judging_fail',
            'timer.active': false
        });

        setTimeout(async () => {
            const nextIdx  = currentTurnIndex + 1;
            const newRound = nextIdx >= turnOrder.length;
            const newOrder = newRound ? shuffle(players.map(p => p.id)) : turnOrder;
            const newIdx   = newRound ? 0 : nextIdx;

            await updateDoc(refDoc(), {
                state: 'next_up',
                turnOrder: newOrder,
                currentTurnIndex: newIdx,
                roundNumber: newRound ? (roundNumber || 1) + 1 : (roundNumber || 1),
                'currentTurn.playerId':    newOrder[newIdx],
                'currentTurn.categoryId':  null,
                'currentTurn.options':     [],
                'currentTurn.selectedItem':null,
            });

            setTimeout(async () => {
                await updateDoc(refDoc(), { state: 'idle' });
            }, 2500);
        }, 2200);
    };

    // ═══════════════════════════════════════════════
    // RENDER STATES
    // ═══════════════════════════════════════════════

    if (gameState === 'loading') return (
        <div className="h-full flex items-center justify-center">
            <Zap className="animate-pulse text-sky-500" size={48}/>
        </div>
    );

    if (gameState === 'error') return (
        <div className="h-full flex flex-col items-center justify-center text-center p-6">
            <HeartCrack className="text-rose-500 mb-4" size={64}/>
            <h2 className="text-2xl font-black mb-2">Error</h2>
            <p className="text-slate-400">{errorMsg}</p>
        </div>
    );

    if (gameState === 'landing') {
        const ttStudentName = getStudentNameTT();
        const doJoin = () => {
            if (joinInput.trim().length === 4) {
                setSessionMode('join');
                setSessionCode(joinInput.trim().toUpperCase());
                setGameState('setup');
            }
        };
        return (
            <div className="flex flex-col h-full bg-zinc-950">
                {/* ── Periplo Banner ── */}
                <header className="shrink-0 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-4 py-2.5 pt-safe">
                    <div className="flex items-center gap-2.5">
                        <button onClick={() => window.location.href = isStudentMode ? 'student_portal.html' : 'index.html'}
                                className="hover:opacity-80 transition-opacity">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-sm shadow-md shadow-indigo-600/30">P</div>
                        </button>
                        <div className="w-px h-5 bg-zinc-800"/>
                        <span className="text-sm font-black text-white">🎙️ Talk Time</span>
                    </div>
                    {ttStudentName && <span className="text-[11px] font-bold text-zinc-400 bg-zinc-900 border border-zinc-800 px-2 py-1 rounded-lg truncate max-w-[130px]">{ttStudentName}</span>}
                </header>

                {/* ── Content ── */}
                <div className="flex-1 flex flex-col items-center justify-center p-6 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-b from-sky-900/20 to-transparent pointer-events-none"/>
                    <div className="relative w-full max-w-sm">
                        {isStudentMode ? (
                            /* ── VISTA ALUMNO: join card tipo Jeopardy ── */
                            <div className="bg-slate-900 border-2 border-sky-500/50 rounded-[2rem] p-8 shadow-2xl text-center">
                                <div className="text-6xl mb-3 anim-float">🎙️</div>
                                <h1 className="text-3xl font-black text-white mb-1">Talk Time</h1>
                                <p className="text-sky-400 font-bold text-xs uppercase tracking-widest mb-6">Ingresa el código de sala</p>
                                <input type="text" value={joinInput}
                                    onChange={e => setJoinInput(e.target.value.toUpperCase())}
                                    onKeyDown={e => e.key==='Enter' && doJoin()}
                                    maxLength={4} placeholder="XXXX" autoFocus
                                    className="bg-slate-800 text-white font-black text-center text-3xl uppercase px-4 py-4 rounded-2xl w-full border-2 border-slate-700 outline-none focus:border-sky-500 transition-colors tracking-widest mb-4"/>
                                <button onClick={doJoin} disabled={joinInput.length < 4}
                                    className="w-full bg-sky-500 hover:bg-sky-400 disabled:bg-slate-700 disabled:text-slate-500 text-black py-4 rounded-2xl font-black text-xl shadow-[0_5px_0_rgba(14,165,233,0.5)] disabled:shadow-none transition active:scale-95">
                                    Entrar →
                                </button>
                            </div>
                        ) : (
                            /* ── VISTA TEACHER ── */
                            <div className="bg-slate-900 border border-white/10 rounded-[2.5rem] p-8 shadow-2xl text-center">
                                <div className="w-20 h-20 bg-sky-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-sky-500">
                                    <Mic size={40} className="text-sky-400"/>
                                </div>
                                <h1 className="text-3xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400">Talk Time</h1>
                                <button onClick={() => setGameState('host_setup')}
                                    className="w-full bg-sky-600 hover:bg-sky-500 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-[0_10px_25px_rgba(14,165,233,0.3)] transition active:scale-95 mb-6">
                                    <Crown size={22}/> Crear Sala (Host)
                                </button>
                                <div className="relative flex items-center py-2 mb-6">
                                    <div className="flex-grow border-t border-white/10"/>
                                    <span className="mx-4 text-slate-500 font-bold text-[10px] uppercase tracking-widest">O únete</span>
                                    <div className="flex-grow border-t border-white/10"/>
                                </div>
                                <div className="flex gap-2 w-full">
                                    <input type="text" value={joinInput}
                                        onChange={e => setJoinInput(e.target.value.toUpperCase())}
                                        onKeyDown={e => e.key==='Enter' && doJoin()}
                                        maxLength={4} placeholder="CÓDIGO"
                                        className="flex-1 min-w-0 bg-slate-950 border border-white/10 rounded-2xl p-4 text-center font-black text-2xl outline-none focus:border-sky-500 text-white uppercase tracking-widest"/>
                                    <button onClick={doJoin} disabled={joinInput.length < 4}
                                        className="shrink-0 px-4 sm:px-6 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-600 rounded-2xl text-white font-black transition active:scale-95">
                                        <ArrowRight size={24}/>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    // ─── Host Setup ───
    if (gameState === 'host_setup') return (
        <div className="fixed inset-0 bg-zinc-950 flex flex-col items-center justify-center p-6 pt-safe pb-safe">
            <button onClick={() => setGameState('landing')}
                className="absolute top-6 left-6 flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-bold px-4 py-2.5 rounded-full transition">
                <ArrowLeft size={15}/> Volver
            </button>

            <div className="w-full max-w-sm bg-zinc-900 border-2 border-sky-500/50 rounded-[2rem] p-6 shadow-[0_0_40px_rgba(14,165,233,0.2)]">
                <div className="text-center mb-6">
                    <div className="w-14 h-14 bg-sky-500/20 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <Crown size={28} className="text-sky-400"/>
                    </div>
                    <h2 className="text-2xl font-black text-white">Opciones de Host</h2>
                </div>

                <div className="flex gap-2 mb-6">
                    <button onClick={() => setIsHostPlaying(false)}
                        className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest border-2 transition-all ${!isHostPlaying ? 'bg-sky-600 border-sky-500 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-sky-500/50'}`}>
                        Solo Moderar
                    </button>
                    <button onClick={() => setIsHostPlaying(true)}
                        className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest border-2 transition-all ${isHostPlaying ? 'bg-sky-600 border-sky-500 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-sky-500/50'}`}>
                        Moderar y Jugar
                    </button>
                </div>

                {isHostPlaying && (
                    <div className="animate-fade-in mb-6">
                        <div className="mb-4">
                            <label className="text-[10px] font-black text-zinc-400 uppercase tracking-widest block mb-2">1. Tu Nombre</label>
                            <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)}
                                maxLength={14} placeholder="Ej. Teacher"
                                className="w-full bg-zinc-800 rounded-2xl px-4 py-3.5 text-xl font-bold text-white outline-none focus:ring-2 focus:ring-sky-500 placeholder-zinc-600 transition"
                            />
                        </div>
                        <div>
                            <label className="text-[10px] font-black text-zinc-400 uppercase tracking-widest block mb-2">2. Elige tu Avatar</label>
                            <div className="grid grid-cols-6 gap-2">
                                {AVATARS.map(e => (
                                    <button key={e} onClick={() => setPlayerEmoji(e)}
                                        className={`text-2xl p-2 rounded-xl transition-all ${playerEmoji === e ? 'bg-sky-600/40 ring-2 ring-sky-500 scale-110' : 'bg-zinc-800 hover:bg-zinc-700'}`}>
                                        {e}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                <button onClick={() => initializeHostSession(isHostPlaying)} disabled={isHostPlaying && !playerName.trim()}
                    className="w-full bg-sky-600 hover:bg-sky-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 transition active:scale-95 shadow-[0_0_20px_rgba(14,165,233,0.3)]">
                    Crear Sala <ArrowRight size={18}/>
                </button>
            </div>
        </div>
    );

    // ─── Student Setup (avatar picker) ───
    if (gameState === 'setup') return (
        <div className="fixed inset-0 flex flex-col bg-zinc-950">
            {/* ── Periplo Banner ── */}
            <header className="shrink-0 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-4 py-2.5 pt-safe">
                <div className="flex items-center gap-2.5">
                    <button onClick={() => setGameState('landing')} className="hover:opacity-80 transition-opacity">
                        <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-sm shadow-md shadow-indigo-600/30">P</div>
                    </button>
                    <div className="w-px h-5 bg-zinc-800"/>
                    <span className="text-sm font-black text-white">🎙️ Talk Time</span>
                </div>
                <span className="text-[11px] font-bold text-zinc-500 uppercase tracking-widest">Elige tu avatar</span>
            </header>

            {/* ── Content ── */}
            <div className="flex-1 flex flex-col items-center justify-center p-5 overflow-y-auto pb-safe">
                <div className="w-full max-w-sm bg-zinc-900 border-2 border-violet-500/50 rounded-3xl p-6 shadow-[0_0_40px_rgba(139,92,246,0.2)]">
                    <div className="text-5xl text-center mb-3">{playerEmoji}</div>
                    <h2 className="text-xl font-black text-white text-center mb-1">Elige tu Avatar</h2>
                    <p className="text-zinc-500 text-xs text-center mb-5">¿Cómo quieres aparecer en la mesa?</p>

                    <div className="grid grid-cols-6 gap-1.5 p-3 border border-zinc-800 rounded-2xl bg-zinc-950 mb-4">
                        {AVATARS.map(e => (
                            <button key={e} onClick={() => setPlayerEmoji(e)}
                                className={`text-2xl aspect-square rounded-xl transition-all flex items-center justify-center ${playerEmoji === e ? 'bg-violet-600/40 ring-2 ring-violet-500 scale-110' : 'bg-zinc-800 hover:bg-zinc-700 opacity-70 hover:opacity-100'}`}>
                                {e}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-2 mb-5">
                        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest text-center mb-2">Cómo jugar</p>
                        {[
                            { e:'🎙️', t:'Cuando sea tu turno, elige un tema y habla en inglés' },
                            { e:'⏱️', t:'45 seg de preparación + 60 seg para hablar' },
                            { e:'✅', t:'El maestro decide si pasas o fallas' },
                            { e:'🔄', t:'Los turnos rotan entre todos los jugadores' },
                        ].map(({e,t}) => (
                            <div key={e} className="flex items-start gap-2.5 bg-zinc-800/50 rounded-xl p-2.5">
                                <span className="text-sm shrink-0">{e}</span>
                                <p className="text-zinc-400 text-xs font-medium leading-snug">{t}</p>
                            </div>
                        ))}
                    </div>

                    <button onClick={joinGame}
                        className="w-full bg-violet-600 hover:bg-violet-500 text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 transition active:scale-95 shadow-[0_5px_0_rgba(109,40,217,0.5)]">
                        Sentarme <ArrowRight size={18}/>
                    </button>
                </div>
            </div>
        </div>
    );

    // ─── Lobby waiting room ───
    if (gameState === 'lobby') {
        const lobbyPlayers = sessionData?.players || [];
        const isHostLocal  = sessionData?.hostId === localPlayerId;
        const MAX_PLAYERS  = 4;

        const copyCode = () => {
            navigator.clipboard.writeText(sessionCode).then(() => {
                setCodeCopied(true);
                setTimeout(() => setCodeCopied(false), 2000);
            });
        };

        const seats = Array.from({ length: MAX_PLAYERS }, (_, i) => lobbyPlayers[i] || null);

        const ttLobbyName = getStudentNameTT() || playerName;
        return (
            <div className="fixed inset-0 flex flex-col bg-zinc-950">
                {/* ── Periplo Banner ── */}
                <header className="shrink-0 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-4 py-2.5 pt-safe">
                    <div className="flex items-center gap-2.5">
                        <button onClick={() => isHostLocal ? window.location.href='index.html' : setGameState('setup')}
                                className="hover:opacity-80 transition-opacity">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-sm shadow-md shadow-indigo-600/30">P</div>
                        </button>
                        <div className="w-px h-5 bg-zinc-800"/>
                        <span className="text-sm font-black text-white">🎙️ Talk Time</span>
                    </div>
                    <div className="flex items-center gap-2">
                        {ttLobbyName && <span className="text-[11px] font-bold text-zinc-400 bg-zinc-900 border border-zinc-800 px-2 py-1 rounded-lg truncate max-w-[120px]">{ttLobbyName}</span>}
                        <button onClick={() => isHostLocal ? window.location.href='index.html' : setGameState('setup')}
                                className="text-zinc-500 hover:text-white text-xs font-bold bg-zinc-900 border border-zinc-800 px-2 py-1 rounded-lg transition-colors">
                            {isHostLocal ? 'Cerrar' : 'Volver'}
                        </button>
                    </div>
                </header>

                <div className="flex-1 flex flex-col items-center justify-center p-6 pb-safe">
                <div className="w-full max-w-sm bg-zinc-900 border-2 border-violet-500/50 rounded-[2rem] overflow-hidden shadow-[0_0_50px_rgba(139,92,246,0.2)]">

                    {/* Code section */}
                    <button onClick={copyCode}
                        className="w-full bg-zinc-950 px-6 py-5 flex flex-col items-center hover:bg-zinc-900/80 transition group">
                        <div className="flex items-center gap-1.5 text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-2 group-hover:text-violet-400 transition">
                            <Copy size={11}/> {codeCopied ? '¡Copiado!' : 'Toca para copiar el código'}
                        </div>
                        <span className="text-5xl font-black text-white tracking-[0.2em]">{sessionCode}</span>
                    </button>

                    {/* Players grid */}
                    <div className="p-5">
                        <div className="flex items-center gap-2 mb-3">
                            <Users size={15} className="text-zinc-500"/>
                            <span className="text-sm font-black text-zinc-300">
                                Jugadores ({lobbyPlayers.length}/{MAX_PLAYERS})
                            </span>
                        </div>
                        <div className="grid grid-cols-2 gap-2 mb-4">
                            {seats.map((p, i) => (
                                <div key={i} className={`rounded-xl p-3.5 border-2 ${p ? 'bg-zinc-800 border-zinc-700' : 'bg-zinc-950 border-dashed border-zinc-700'}`}>
                                    {p ? (
                                        <div className="flex items-center gap-2">
                                            <span className="text-2xl">{p.emoji}</span>
                                            <div>
                                                <p className="text-white font-black text-sm leading-none">{p.name}</p>
                                                {p.id === localPlayerId && <p className="text-violet-400 text-[10px] font-black uppercase mt-0.5">Tú</p>}
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <p className="text-zinc-500 font-bold text-sm">Silla vacía</p>
                                            <p className="text-zinc-700 text-xs">Esperando...</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {isHostLocal ? (
                            <button onClick={startGame} disabled={!lobbyPlayers.length}
                                className="w-full bg-violet-600 hover:bg-violet-500 disabled:bg-zinc-800 disabled:text-zinc-600 text-white py-4 rounded-2xl font-black text-base uppercase tracking-widest flex items-center justify-center gap-2 transition active:scale-95 shadow-[0_0_20px_rgba(139,92,246,0.3)] disabled:shadow-none">
                                {lobbyPlayers.length ? <><Play size={18}/> ¡Comenzar juego!</> : 'Esperando jugadores...'}
                            </button>
                        ) : (
                            <div className="w-full bg-zinc-800 text-zinc-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest text-center">
                                Esperando al maestro...
                            </div>
                        )}
                    </div>
                </div>
                </div>
            </div>
        );
    }

    if (!sessionData) return null;

    // ─── Main game ───
    const isHost      = sessionData.hostId === localPlayerId;
    const { state, currentTurn, timer, players, roundNumber } = sessionData;
    const catInfo     = currentTurn?.categoryId ? CATEGORIES[currentTurn.categoryId] : null;
    const activePlayer = players.find(p => p.id === currentTurn?.playerId);
    const isMyTurn    = currentTurn?.playerId === localPlayerId;

    // ── Player ring ──
    const PlayerRing = () => {
        const total = players.length;
        if (!total) return (
            <div className="flex flex-col items-center justify-center h-52 text-slate-700">
                <Users size={32} className="mb-2"/>
                <p className="text-sm font-bold">Sin jugadores aún</p>
            </div>
        );

        return (
            <div className="relative w-56 h-56 mx-auto shrink-0">
                {/* Table surface */}
                <div className="absolute inset-8 rounded-full table-bg border-4 border-slate-800 flex items-center justify-center shadow-[inset_0_0_30px_rgba(0,0,0,0.9)]">
                    {state === 'lobby' ? (
                        <div className="text-center">
                            <p className="text-sky-400 font-black text-xl tracking-widest">{sessionCode}</p>
                            <p className="text-slate-600 text-[9px] font-bold uppercase tracking-widest mt-0.5">sala</p>
                        </div>
                    ) : state === 'timer' && timer?.phase === 'speaking' ? (
                        <Mic size={28} className="text-emerald-400"/>
                    ) : (
                        <Mic size={22} className="text-slate-800"/>
                    )}
                </div>

                {/* Players */}
                {players.map((p, i) => {
                    const angle  = (i / total) * 2 * Math.PI - Math.PI / 2;
                    const left   = 50 + 38 * Math.cos(angle);
                    const top    = 50 + 38 * Math.sin(angle);
                    const isTurn = currentTurn?.playerId === p.id;
                    const glow   = isTurn && !['lobby','idle'].includes(state);

                    return (
                        <div key={p.id}
                            className="absolute flex flex-col items-center -translate-x-1/2 -translate-y-1/2 transition-all duration-500 z-10"
                            style={{ left:`${left}%`, top:`${top}%` }}>
                            <div className={`w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-2xl border-2 transition-all duration-300 ${glow ? `scale-110 ${catInfo?.border || 'border-sky-500'} shadow-[0_0_14px_rgba(14,165,233,0.5)]` : 'border-slate-700'}`}>
                                {p.emoji}
                            </div>
                            <span className={`text-[9px] font-black uppercase mt-0.5 px-1.5 py-0.5 rounded whitespace-nowrap transition-colors ${isTurn && state === 'idle' ? 'text-white bg-sky-600' : glow ? 'text-white bg-slate-700' : 'text-slate-500'}`}>
                                {p.name}
                            </span>
                        </div>
                    );
                })}
            </div>
        );
    };

    // ── Content card ──
    const Content = () => {
        if (state === 'lobby') return (
            <div className="flex flex-col items-center justify-center py-6 gap-1 animate-fade-in">
                <p className="text-slate-500 text-sm font-bold">Esperando jugadores...</p>
                <p className="text-slate-700 text-xs">{players.length} conectado{players.length !== 1 ? 's' : ''}</p>
            </div>
        );

        if (state === 'idle') return (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center animate-fade-in">
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-2">
                    Ronda {roundNumber || 1} · Le toca a
                </p>
                <p className="text-4xl mb-1">{activePlayer?.emoji}</p>
                <p className="text-white font-black text-xl">{activePlayer?.name}</p>
            </div>
        );

        if (state === 'choose') return (
            <div className="animate-fade-in space-y-2">
                <p className="text-[10px] font-black uppercase tracking-widest text-center mb-3">
                    <span className="text-slate-400">{activePlayer?.name}, elige un tema</span>
                </p>
                {(currentTurn.options || []).map((opt, i) => {
                    const cInfo = CATEGORIES[opt.categoryId];
                    return (
                        <button key={i} onClick={isMyTurn ? () => selectOption(opt) : undefined}
                            className={`w-full p-4 rounded-xl border text-left transition-all ${isMyTurn ? 'border-sky-700 bg-slate-900 hover:bg-sky-900/30 active:scale-[0.98] cursor-pointer' : 'border-slate-800 bg-slate-900 cursor-default'}`}>
                            <div className={`text-[10px] font-black uppercase tracking-widest mb-1 ${cInfo?.color}`}>
                                {cInfo?.name}
                            </div>
                            <p className="text-white font-bold text-sm leading-snug">{opt.title}</p>
                            {opt.content && <p className="text-slate-500 text-xs mt-0.5 line-clamp-1">{opt.content}</p>}
                        </button>
                    );
                })}
            </div>
        );

        if (state === 'reading' || state === 'timer') return (
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 animate-fade-in">
                <div className="flex items-center gap-2 mb-3">
                    <span className={`text-[10px] font-black ${catInfo?.color} uppercase tracking-widest border border-current px-2 py-0.5 rounded-full`}>
                        {catInfo?.name}
                    </span>
                    <span className="text-slate-600 text-xs">→ {activePlayer?.name}</span>
                </div>
                <h3 className="text-white font-black text-base leading-snug mb-2">
                    {currentTurn.selectedItem?.title}
                </h3>
                <p className="text-slate-300 text-sm leading-relaxed">
                    {currentTurn.selectedItem?.content}
                </p>

                {state === 'timer' && (
                    <div className="mt-4 pt-3 border-t border-slate-800">
                        <div className="flex justify-between text-xs font-bold mb-2">
                            <span className="text-slate-400 uppercase tracking-widest">
                                {timer.phase === 'prep' ? '⏱ Prep Time' : '🎙 Speaking'}
                            </span>
                            <span className={localTimeLeft <= 5 ? 'text-rose-400 font-black' : 'text-white'}>
                                {localTimeLeft}s
                            </span>
                        </div>
                        <div className="h-2.5 bg-slate-800 rounded-full overflow-hidden">
                            <div className={`h-full transition-all duration-1000 ${localTimeLeft <= 5 ? 'bg-rose-500' : timer.phase === 'prep' ? 'bg-amber-500' : 'bg-emerald-500'}`}
                                style={{ width:`${(localTimeLeft / timer.duration) * 100}%` }}
                            />
                        </div>
                    </div>
                )}
            </div>
        );

        return null;
    };

    // ── Host controls ──
    const HostControls = () => (
        <div className="w-full max-w-lg mx-auto">
            {state === 'lobby' && (
                <button onClick={startGame} disabled={!players.length}
                    className="w-full bg-sky-600 hover:bg-sky-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition active:scale-95">
                    <Play size={18}/> Iniciar Partida
                </button>
            )}
            {state === 'idle' && (
                <button onClick={startTurn}
                    className="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-4 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition active:scale-95 shadow-[0_0_20px_rgba(192,38,211,0.3)]">
                    <Zap size={18}/> ¡Empezar turno!
                </button>
            )}
            {state === 'reading' && (
                <div className="flex gap-2">
                    <button onClick={() => startTimer(45,'prep')}
                        className="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-900 py-4 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2 transition active:scale-95">
                        <Clock size={16}/> Prep 45s
                    </button>
                    <button onClick={() => startTimer(60,'speaking')}
                        className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2 transition active:scale-95">
                        <Mic size={16}/> Speak 60s
                    </button>
                </div>
            )}
            {state === 'timer' && (
                <div className="flex gap-2">
                    <button onClick={togglePause}
                        className="px-5 bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-xl font-black transition border border-white/10 active:scale-95">
                        {timer.pausedLeft > 0 ? <PlayIcon size={20}/> : <Pause size={20}/>}
                    </button>
                    {timer.phase === 'prep' ? (
                        <button onClick={() => startTimer(60,'speaking')}
                            className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2 transition active:scale-95">
                            <Mic size={16}/> Saltar a Speak
                        </button>
                    ) : (
                        <>
                            <button onClick={() => endTurn(true)}
                                className="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-900 py-4 rounded-xl font-black uppercase text-xs flex items-center justify-center gap-1.5 transition active:scale-95">
                                <Check size={16}/> Aprobado
                            </button>
                            <button onClick={() => endTurn(false)}
                                className="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-4 rounded-xl font-black uppercase text-xs flex items-center justify-center gap-1.5 transition active:scale-95">
                                <XIcon size={16}/> Falló
                            </button>
                        </>
                    )}
                </div>
            )}
        </div>
    );

    // ── Player bar (non-host) ──
    const PlayerBar = () => {
        if (isMyTurn && state === 'choose') return (
            <p className="text-center text-sky-400 font-black uppercase tracking-widest text-sm animate-pulse">
                👆 ¡Tu turno! Elige un tema arriba
            </p>
        );
        if (isMyTurn && state === 'timer' && timer?.phase === 'speaking') return (
            <p className="text-center text-emerald-400 font-black text-xl flex items-center justify-center gap-2">
                <Mic size={22}/> ¡HABLA AHORA!
            </p>
        );
        return (
            <p className="text-center text-slate-700 font-bold text-xs uppercase tracking-widest">
                Sala: {sessionCode} · Ronda {roundNumber || 1}
            </p>
        );
    };

    // ── Overlay (judging + next_up) ──
    const Overlay = () => {
        if (state === 'judging_pass') return (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center animate-fade-in">
                <div className="text-center animate-pop-in">
                    <div className="w-28 h-28 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_60px_rgba(16,185,129,0.8)]">
                        <Check size={56} className="text-black"/>
                    </div>
                    <p className="text-emerald-400 font-black text-4xl uppercase tracking-widest">¡Aprobado!</p>
                </div>
            </div>
        );

        if (state === 'judging_fail') return (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center animate-fade-in">
                <div className="text-center animate-pop-in">
                    <div className="w-28 h-28 bg-rose-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_60px_rgba(225,29,72,0.8)]">
                        <XIcon size={56} className="text-white"/>
                    </div>
                    <p className="text-rose-400 font-black text-4xl uppercase tracking-widest">¡Casi!</p>
                </div>
            </div>
        );

        if (state === 'next_up') {
            const next = players.find(p => p.id === currentTurn?.playerId);
            return (
                <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center animate-fade-in">
                    <div className="text-center animate-pop-in">
                        <span className="inline-block text-slate-400 font-black text-[10px] uppercase tracking-widest border border-slate-700 px-4 py-1.5 rounded-full mb-6">
                            Let's go! · Siguiente turno
                        </span>
                        <p className="text-7xl mb-3">{next?.emoji}</p>
                        <p className="text-white font-black text-3xl">{next?.name}</p>
                        <p className="text-slate-600 text-sm mt-3 font-bold">Prepárate...</p>
                    </div>
                </div>
            );
        }

        return null;
    };

    // ── Shell ──
    return (
        <div className="flex flex-col h-full bg-zinc-950 overflow-hidden">

            {/* Header — Banner estándar Periplo */}
            <header className="sticky top-0 z-20 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-4 py-3 shrink-0 pt-safe"
                    style={{ fontFamily:"'Plus Jakarta Sans', sans-serif" }}>
                <div className="flex items-center gap-3">
                    {isStudentMode ? (
                        <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-600/20">P</div>
                    ) : (
                        <button onClick={() => window.location.href = 'index.html'} className="hover:opacity-80 transition-opacity">
                            <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-600/20">P</div>
                        </button>
                    )}
                    <div className="hidden sm:block w-px h-7 bg-zinc-800"/>
                    <div className="hidden sm:block">
                        <h1 className="text-sm font-black text-white leading-none tracking-tight">Talk Time</h1>
                        <p className="text-[10px] font-bold uppercase tracking-widest mt-0.5 text-violet-400">Conversación</p>
                    </div>
                </div>
                <div className="flex items-center gap-2">
                    {isHost && <Crown size={13} className="text-yellow-400"/>}
                    <span className="bg-zinc-800 text-zinc-300 text-[10px] font-black px-2.5 py-1 rounded-lg uppercase tracking-widest">{sessionCode}</span>
                    <span className="text-zinc-600 text-[10px] font-bold hidden sm:block">
                        {players.length} · Ronda {roundNumber || 1}
                    </span>
                </div>
            </header>

            {/* Player ring */}
            <div className="shrink-0 pt-3 pb-1">
                <PlayerRing/>
            </div>

            {/* Content */}
            <div className="flex-1 overflow-y-auto custom-scrollbar px-4 py-2">
                <Content/>
            </div>

            {/* Bottom panel */}
            <div className="shrink-0 border-t border-white/5 bg-slate-900/80 p-4 min-h-[72px] flex items-center">
                {isHost ? <HostControls/> : <PlayerBar/>}
            </div>

            {/* Overlays */}
            <Overlay/>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<TalkTimeGame/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversational Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { MessageSquare, Save, ArrowLeft, Loader2, Sparkles, KeyRound, X, Plus, Keyboard, Mic, Shuffle, Hash, Bot } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const GAME_MODES = [
            { id: 'typing', name: 'Phone Chat', icon: Keyboard, desc: 'Escribir respuestas (Chat)', color: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'border-cyan-500/30' },
            { id: 'unscramble', name: 'Audio Translator', icon: Shuffle, desc: 'Ordenar palabras (Audios)', color: 'text-emerald-400', bg: 'bg-emerald-500/10', border: 'border-emerald-500/30' },
            { id: 'voice', name: 'Voice Reply', icon: Mic, desc: 'Pronunciación (Micrófono)', color: 'text-indigo-400', bg: 'bg-indigo-500/10', border: 'border-indigo-500/30' }
        ];

        const DashboardPC = () => {
            const [gameTitle, setGameTitle] = useState("");
            const [gameMode, setGameMode] = useState(new URLSearchParams(window.location.search).get('mode') || 'typing');
            const [items, setItems] = useState([{ botMessage: "", expectedAnswer: "", userHint: "" }]);
            
            // Nuevos estados para la IA
            const [contextPrompt, setContextPrompt] = useState("");
            const [turnCount, setTurnCount] = useState(5);

            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            if (data.content) {
                                setGameMode(data.content.gameMode || 'typing');
                                setItems(data.content.flow || data.content);
                            }
                        }
                    });
                }
            }, []);

            const generateWithAI = async () => {
                if (!apiKey) return alert("Pega tu API Key de Gemini abajo a la izquierda.");
                if (!contextPrompt.trim()) return alert("Por favor, escribe un contexto o instrucciones para la IA.");

                setIsGenerating(true);
                try {
                    let prompt = "";
                    if (gameMode === 'typing') {
                        prompt = `Genera ${turnCount} interacciones para un chat de texto en inglés. 
                        Contexto del rol: "${contextPrompt}".
                        Devuelve un array de objetos con:
                        "botMessage": Lo que dice el NPC/Personaje en inglés. 
                        "expectedAnswer": La respuesta lógica del alumno en inglés. 
                        "userHint": Pista o traducción de lo que se espera en español.`;
                    } else if (gameMode === 'unscramble') {
                        prompt = `Genera ${turnCount} frases en inglés para traducir audios reenviados. 
                        Contexto del jefe/persona enviando los audios: "${contextPrompt}".
                        Devuelve un array de objetos con:
                        "botMessage": El contexto o instrucción previa en español (ej. "Me pide los reportes del mes"). 
                        "expectedAnswer": La frase exacta en inglés que el alumno debe armar (sin puntuación final). 
                        "userHint": Traducción literal al español.`;
                    } else {
                        prompt = `Genera ${turnCount} frases en inglés para practicar pronunciación hablada. 
                        Contexto de la práctica: "${contextPrompt}".
                        Devuelve un array de objetos con:
                        "botMessage": La instrucción del AI Coach en español (ej. "¿Cómo le dirías que estás de acuerdo?"). 
                        "expectedAnswer": La frase en inglés que el alumno debe leer en voz alta (sin puntuación final). 
                        "userHint": Traducción literal.`;
                    }

                    prompt += `\nIMPORTANTE: Responde ÚNICA Y EXCLUSIVAMENTE con un array JSON válido, sin texto adicional antes ni después, y sin bloques de código markdown. Ejemplo estricto: [{"botMessage": "A", "expectedAnswer": "B", "userHint": "C"}]`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    
                    // Manejo robusto de errores
                    if (data.error) {
                        throw new Error(data.error.message || "Error desconocido devuelto por Gemini API.");
                    }
                    if (!data.candidates || data.candidates.length === 0) {
                        throw new Error("La IA bloqueó la respuesta o no generó contenido. Revisa tus instrucciones.");
                    }

                    let text = data.candidates[0].content.parts[0].text;
                    // Limpieza de formato markdown si la IA ignora las instrucciones
                    text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
                    
                    const parsedItems = JSON.parse(text);
                    setItems(parsedItems);
                } catch (e) {
                    console.error("Parse Error:", e);
                    alert("Hubo un problema procesando la IA:\n\n" + e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleSave = async () => {
                if (!gameTitle) return alert("El título de la actividad es requerido.");
                if (items.some(i => !i.expectedAnswer)) return alert("Todas las interacciones deben tener una respuesta esperada.");
                
                setIsSaving(true);
                try {
                    const payload = {
                        title: gameTitle,
                        type: 'PHONECHAT',
                        content: {
                            gameMode: gameMode,
                            flow: items
                        },
                        updatedAt: serverTimestamp()
                    };
                    const params = new URLSearchParams(window.location.search);
                    const editId = params.get('edit');
                    
                    if (editId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId), payload);
                    } else {
                        const folder = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                        await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...payload, parentPath: folder, createdAt: serverTimestamp() });
                    }
                    window.location.href = params.get('folder') ? `index.html?folder=${params.get('folder')}` : 'index.html';
                } catch (e) { alert(e.message); }
                finally { setIsSaving(false); }
            };

            const updateItem = (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);
            };

            return (
                <div className="h-screen flex flex-col dark:text-white bg-zinc-950">
                    {/* HEADER */}
                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900 shrink-0">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.history.back()} className="p-2 hover:bg-zinc-800 rounded-lg"><ArrowLeft size={20}/></button>
                            <h1 className="font-black text-cyan-400 flex items-center gap-2 tracking-tighter"><MessageSquare size={18}/> CONVERSACIONAL BUILDER</h1>
                        </div>
                        <button onClick={handleSave} disabled={isSaving} className="bg-emerald-600 px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-500 transition disabled:opacity-50">
                            {isSaving ? <Loader2 className="animate-spin" size={20}/> : <Save size={20}/>} Guardar Actividad
                        </button>
                    </div>

                    <div className="flex-1 overflow-hidden flex flex-col md:flex-row max-w-7xl mx-auto w-full">
                        
                        {/* PANEL IZQUIERDO: CONFIGURACIÓN E IA */}
                        <div className="w-full md:w-80 border-r border-zinc-800 flex flex-col bg-zinc-950/50 shrink-0 overflow-y-auto custom-scrollbar p-4 gap-6">
                            
                            {/* Titulo para el Alumno */}
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest ml-1 mb-2 block">1. Título de la Actividad</label>
                                <input 
                                    value={gameTitle} 
                                    onChange={e => setGameTitle(e.target.value)}
                                    placeholder="Ej. Check-in Hotel"
                                    className="w-full bg-zinc-900 text-lg font-black outline-none border border-zinc-800 focus:border-cyan-500 rounded-xl px-4 py-3 transition-all placeholder-zinc-700"
                                />
                            </div>

                            {/* Selector de Modos */}
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest ml-1 mb-2 block">2. Modo de Juego</label>
                                <div className="flex flex-col gap-2">
                                    {GAME_MODES.map(mode => (
                                        <button 
                                            key={mode.id}
                                            onClick={() => setGameMode(mode.id)}
                                            className={`p-3 rounded-xl border-2 text-left transition-all flex items-center gap-3 ${gameMode === mode.id ? `${mode.border} ${mode.bg}` : 'border-zinc-800 bg-zinc-900/50 hover:border-zinc-700'}`}
                                        >
                                            <div className={`p-2 rounded-lg ${gameMode === mode.id ? mode.bg : 'bg-zinc-800'} ${mode.color}`}>
                                                <mode.icon size={16}/>
                                            </div>
                                            <div>
                                                <div className={`font-black text-sm ${gameMode === mode.id ? 'text-white' : 'text-zinc-400'}`}>{mode.name}</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Prompt de IA */}
                            <div className="bg-indigo-900/10 border border-indigo-500/20 rounded-2xl p-4 flex flex-col gap-4">
                                <div className="flex items-center gap-2 text-indigo-400 font-black text-sm">
                                    <Bot size={18}/> Asistente IA (Gemini)
                                </div>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1 block">Contexto / Historia</label>
                                    <textarea 
                                        value={contextPrompt}
                                        onChange={e => setContextPrompt(e.target.value)}
                                        placeholder="Ej: Un jefe enojado pidiendo reportes financieros porque hay un problema de liquidez..."
                                        className="w-full h-24 bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm outline-none focus:border-indigo-500 resize-none custom-scrollbar"
                                    />
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1 block flex justify-between">
                                        <span>Cantidad de Turnos</span>
                                        <span className="text-white">{turnCount}</span>
                                    </label>
                                    <input 
                                        type="range" min="4" max="10" step="1" 
                                        value={turnCount} onChange={e => setTurnCount(Number(e.target.value))}
                                        className="w-full accent-indigo-500"
                                    />
                                </div>

                                <button onClick={generateWithAI} disabled={isGenerating} className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 transition disabled:opacity-50">
                                    {isGenerating ? <Loader2 className="animate-spin" size={16}/> : <Sparkles size={16}/>} Generar Contenido
                                </button>
                            </div>
                        </div>

                        {/* PANEL DERECHO: ITEMS GENERADOS */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-6 space-y-4 pb-20 bg-zinc-900/30">
                            {items.map((item, idx) => (
                                <div key={idx} className="bg-zinc-900 border border-zinc-800 p-5 rounded-3xl relative group shadow-sm">
                                    <button onClick={() => { const ni = [...items]; ni.splice(idx,1); setItems(ni); }} className="absolute -top-2 -right-2 bg-rose-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg hover:scale-110">
                                        <X size={14}/>
                                    </button>
                                    
                                    <div className="flex items-center gap-2 mb-4">
                                        <span className="bg-zinc-800 text-zinc-400 font-black text-xs px-3 py-1 rounded-md flex items-center gap-1"><Hash size={12}/> Paso {idx + 1}</span>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="md:col-span-2">
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">{gameMode === 'typing' ? 'El Bot Dice (Inglés)' : gameMode === 'unscramble' ? 'Contexto Reenviado (Español)' : 'Instrucción AI Coach (Español)'}</label>
                                            <input value={item.botMessage} onChange={e => updateItem(idx, 'botMessage', e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm font-medium outline-none focus:border-cyan-500 mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-cyan-500 uppercase tracking-widest ml-1">Respuesta Esperada (Inglés)</label>
                                            <input value={item.expectedAnswer} onChange={e => updateItem(idx, 'expectedAnswer', e.target.value)} className="w-full bg-cyan-950/20 border border-cyan-500/30 rounded-xl p-3 text-sm font-black text-cyan-300 outline-none focus:border-cyan-500 mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-amber-500 uppercase tracking-widest ml-1">Traducción / Pista Visual</label>
                                            <input value={item.userHint} onChange={e => updateItem(idx, 'userHint', e.target.value)} className="w-full bg-amber-950/20 border border-amber-500/30 rounded-xl p-3 text-sm font-medium text-amber-200 outline-none focus:border-amber-500 mt-1"/>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            
                            <button onClick={() => setItems([...items, { botMessage: "", expectedAnswer: "", userHint: "" }])} className="w-full py-6 border-2 border-dashed border-zinc-800 rounded-3xl text-zinc-500 font-black hover:bg-zinc-900 hover:text-zinc-400 transition flex items-center justify-center gap-2">
                                <Plus size={18}/> Añadir un turno manual
                            </button>
                        </div>
                    </div>
                    
                    {/* Floating API Key Config */}
                    <div className="fixed bottom-4 left-4 z-50">
                         <button onClick={() => { const k = prompt("Gemini API Key:", apiKey); if(k){setApiKey(k); localStorage.setItem('gemini_api_key', k);}}} className="p-3 bg-zinc-900 rounded-full border border-zinc-800 text-zinc-500 hover:text-indigo-400 shadow-xl transition"><KeyRound size={20}/></button>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<DashboardPC />);
    </script>
</body>
</html>

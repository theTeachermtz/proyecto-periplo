<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Chat Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { MessageSquare, Layers, Zap, Save, ArrowLeft, Loader2, Search, Sun, Moon, ChefHat, LayoutTemplate, X } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const GRAMMAR_MODULES = {
            basic: ["Modal Verbs", "Present Simple", "Present Continuous", "Future (Going to)"],
            advanced: ["Past Simple", "Second Conditional", "Past Continuous", "Past Future Intention"],
            pro: ["Present/Past Perfect", "Perfect Continuous", "Third Conditional", "Mixed Conditionals"]
        };

        const Dashboard = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('periplo_google_key') || '');
            const [gameTitle, setGameTitle] = useState("");
            
            // INGREDIENTES: Gramática y Contexto
            const [activeGrammarTab, setActiveGrammarTab] = useState('basic');
            const [selectedGrammar, setSelectedGrammar] = useState([]);
            const [contextSetting, setContextSetting] = useState(""); 
            const [chatTurns, setChatTurns] = useState(4); // Cantidad de filas
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedContent, setGeneratedContent] = useState([]); // Array de objetos del chat
            const [editingId, setEditingId] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(false);

            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const editId = params.get('edit');
                    if (editId) {
                        setIsLoadingData(true);
                        try {
                            const docRef = doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/chat_games', editId);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                setGeneratedContent(data.content);
                                setGameTitle(data.title);
                                setEditingId(editId);
                            } else alert("No se encontró el juego.");
                        } catch (e) { alert("Error cargando: " + e.message); } 
                        finally { setIsLoadingData(false); }
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const toggleTheme = () => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); };

            const toggleGrammar = (topic) => {
                setSelectedGrammar(prev => prev.includes(topic) ? prev.filter(t => t !== topic) : [...prev, topic]);
            };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    if (!response.ok) throw new Error("Error conectando con Google");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels.find(m => m.includes("gemini-2.0")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { alert("Error al buscar modelos: " + e.message); } 
                finally { setIsLoadingModels(false); }
            };

            const generateContent = async () => {
                if (!apiKey) return alert("Por favor ingresa tu API Key");
                if (!selectedModel) return alert("Por favor escanea y selecciona un modelo primero (botón lupa)");
                if (!contextSetting.trim()) return alert("Por favor describe el tema de la conversación.");
                
                setIsGenerating(true);

                let grammarConstraint = "";
                if (selectedGrammar.length > 0) {
                    grammarConstraint = `STRICT GRAMMAR CONSTRAINT: You MUST actively use the following grammar structures in the user's expected answers: ${selectedGrammar.join(', ')}.`;
                } else {
                    grammarConstraint = "Use natural, conversational grammar appropriate for the topic.";
                }

                const prompt = `
                    You are an expert ESL test creator. Create an engaging, emoji-rich conversational flow for an interactive "Fill in the blanks" chat game.
                    
                    Overall Context/Scenario: ${contextSetting}
                    ${grammarConstraint}

                    Create exactly ${chatTurns} conversational turns. For each turn, provide:
                    1. botMessage: The message sent by the AI Teacher (in English). This sets up the context. INCLUDE relevant emojis to make it look like a real text message.
                    2. userHint: What the user wants to say, written in Spanish (as a guide). Include an emoji at the start if it fits.
                    3. expectedAnswer: The exact English sentence the user must type. It must be the correct translation/intent of the userHint.

                    Output FORMAT (Strict JSON Array):
                    [
                        {
                            "id": 1,
                            "botMessage": "Hi there! 👋 I noticed you were looking at the menu 🍕. Do you have any questions?",
                            "userHint": "🤔 Sí, ¿qué recomiendas para alguien a quien no le gusta el picante?",
                            "expectedAnswer": "Yes, what do you recommend for someone who doesn't like spicy food?"
                        }
                    ]
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json", temperature: 0.7 } }) 
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(`Google Error: ${data.error.message}`);
                    const text = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text);
                    
                    // Asegurar que cada objeto tenga un ID único para React
                    const processedJson = json.map((item, index) => ({...item, id: Date.now() + index}));
                    setGeneratedContent(processedJson);
                } catch (e) { alert("Error: " + e.message); } finally { setIsGenerating(false); }
            };

            const saveToFirebase = async () => {
                if (!gameTitle) return alert("Ponle un título al juego");
                if (generatedContent.length === 0) return alert("Genera el chat antes de guardar.");
                
                try {
                    const params = new URLSearchParams(window.location.search);
                    const folderParam = params.get('folder');
                    const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/chat_games', editingId), { title: gameTitle, content: generatedContent, updatedAt: serverTimestamp() });
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'chat_games'), { title: gameTitle, type: 'PHONECHAT', content: generatedContent, createdAt: serverTimestamp(), parentPath: parentPath });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { alert("Error guardando: " + e.message); }
            };

            // Handlers para edición en el Preview
            const handleContentChange = (id, field, value) => {
                setGeneratedContent(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const addManualTurn = () => {
                setGeneratedContent(prev => [...prev, { id: Date.now(), botMessage: "", userHint: "", expectedAnswer: "" }]);
            };

            const removeTurn = (id) => {
                setGeneratedContent(prev => prev.filter(item => item.id !== id));
            };

            if (isLoadingData) return <div className="h-[100dvh] flex items-center justify-center text-slate-500 font-bold"><Loader2 className="animate-spin mr-2"/> Cargando datos del juego...</div>;

            return (
                <div className="h-[100dvh] flex flex-col">
                    {/* HEADER */}
                    <div className="bg-slate-900 dark:bg-black px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center shrink-0 shadow-md z-10 gap-4">
                        <div className="flex items-center justify-between w-full md:w-auto">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <h1 className="text-xl font-black tracking-tight text-white flex items-center gap-2"><MessageSquare className="text-cyan-400 w-5 h-5"/> Phone Chat Builder</h1>
                            </div>
                            <button onClick={toggleTheme} className="p-2 text-yellow-400 md:hidden">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-xl border border-slate-700 w-full md:w-auto overflow-x-auto custom-scrollbar">
                            <input type="password" placeholder="Tu API Key..." value={apiKey} onChange={e => {setApiKey(e.target.value); localStorage.setItem('periplo_google_key', e.target.value)}} className="bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-xs font-mono text-center w-36 focus:border-cyan-500 focus:outline-none"/>
                            <button onClick={fetchModels} disabled={isLoadingModels || !apiKey} className="p-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition-colors shrink-0" title="Escanear Modelos">{isLoadingModels ? <Loader2 className="animate-spin" size={16}/> : <Search size={16}/>}</button>
                            {availableModels.length > 0 && (<select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-xs text-white max-w-[150px] outline-none">{availableModels.map(m => <option key={m} value={m}>{m.replace('models/', '')}</option>)}</select>)}
                            <button onClick={toggleTheme} className="hidden md:block p-2 text-yellow-400 shrink-0">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                        </div>
                    </div>
                    
                    {/* MAIN LAYOUT TIPO "SUBWAY" */}
                    <div className="flex flex-1 flex-col md:flex-row overflow-hidden bg-slate-50 dark:bg-zinc-950">
                        
                        {/* LEFT: INGREDIENTES Y CONTEXTO (Configuración de IA) */}
                        <div className="w-full md:w-[45%] border-b md:border-b-0 md:border-r border-slate-200 dark:border-zinc-800 flex flex-col h-1/2 md:h-full bg-white dark:bg-zinc-900">
                            <div className="p-4 md:p-6 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                                <input value={gameTitle} onChange={(e) => setGameTitle(e.target.value)} className="w-full text-xl md:text-2xl font-black p-2 border-b-2 border-slate-200 dark:border-zinc-700 bg-transparent dark:text-white focus:border-cyan-500 outline-none placeholder-slate-300 dark:placeholder-zinc-600" placeholder="Título de la Conversación..."/>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-8 custom-scrollbar">
                                {/* TEMA DEL CHAT */}
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><MessageSquare size={16} className="text-cyan-500"/> 1. Tema de la Conversación</h3>
                                    <textarea 
                                        value={contextSetting} 
                                        onChange={e => setContextSetting(e.target.value)} 
                                        placeholder="Ej. El alumno está pidiendo informes sobre un gimnasio por mensaje de texto. El vendedor le ofrece una promoción..."
                                        className="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-4 text-sm text-slate-700 dark:text-zinc-200 focus:border-cyan-500 outline-none h-24 resize-none"
                                    />
                                </div>

                                {/* FILTRO GRAMATICAL */}
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><Layers size={16} className="text-indigo-500"/> 2. Filtro Gramatical (Opcional)</h3>
                                    <div className="bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-2xl overflow-hidden">
                                        <div className="flex border-b border-slate-200 dark:border-zinc-800">
                                            {['basic', 'advanced', 'pro'].map(tab => (
                                                <button key={tab} onClick={() => setActiveGrammarTab(tab)} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-colors ${activeGrammarTab === tab ? 'bg-indigo-100 text-indigo-700 dark:bg-zinc-800 dark:text-white' : 'text-slate-500 dark:text-zinc-500 hover:bg-slate-100 dark:hover:bg-zinc-900/50'}`}>
                                                    {tab}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="p-4 flex flex-wrap gap-2">
                                            {GRAMMAR_MODULES[activeGrammarTab].map(topic => {
                                                const isSelected = selectedGrammar.includes(topic);
                                                return (
                                                    <button key={topic} onClick={() => toggleGrammar(topic)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${isSelected ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-600 dark:text-zinc-400 hover:border-slate-300 dark:hover:border-zinc-500'}`}>
                                                        {topic}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <p className="text-[10px] text-slate-400 dark:text-zinc-500 mt-2 font-bold italic">* Si no seleccionas nada, la IA usará gramática natural según el tema.</p>
                                </div>

                                {/* CANTIDAD DE TURNOS */}
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><ChefHat size={16} className="text-amber-500"/> 3. Longitud del Chat</h3>
                                    <input type="range" min="2" max="10" step="1" value={chatTurns} onChange={e => setChatTurns(parseInt(e.target.value))} className="w-full accent-cyan-500"/>
                                    <div className="text-center font-black text-cyan-600 dark:text-cyan-400 mt-2">{chatTurns} Turnos (Ida y Vuelta)</div>
                                </div>

                                {/* BOTÓN GENERAR */}
                                <button onClick={generateContent} disabled={isGenerating} className="w-full bg-slate-900 dark:bg-cyan-600 text-white px-6 py-4 rounded-xl font-black text-base hover:bg-slate-800 dark:hover:bg-cyan-500 transition-all flex items-center justify-center gap-3 disabled:opacity-50 shadow-lg">
                                    {isGenerating ? <Loader2 className="animate-spin"/> : <Zap className="fill-yellow-400 dark:text-yellow-400"/>} {isGenerating ? "Creando Chat..." : "GENERAR CON IA"}
                                </button>
                            </div>
                        </div>
                        
                        {/* RIGHT: PREVIEW Y EDICIÓN (Estilo WhatsApp) */}
                        <div className="w-full md:w-[55%] flex flex-col relative h-1/2 md:h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-100 dark:bg-zinc-950">
                            <div className="p-4 md:p-6 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-sm border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center shadow-sm z-10 shrink-0">
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white flex items-center gap-2 text-lg"><LayoutTemplate className="text-emerald-500"/> Editor Visual</h3>
                                    <p className="text-xs text-slate-500 dark:text-zinc-400 font-medium mt-1">Puedes modificar los textos generados por la IA.</p>
                                </div>
                                <button onClick={saveToFirebase} disabled={generatedContent.length === 0} className="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 shadow-md transition-colors">
                                    <Save size={18}/> GUARDAR
                                </button>
                            </div>
                            
                            <div className="flex-1 p-4 md:p-6 overflow-y-auto custom-scrollbar space-y-6 pb-32">
                                {generatedContent.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 dark:text-zinc-600">
                                        <MessageSquare size={48} className="mb-4 opacity-50"/>
                                        <p className="font-bold text-center">Sin mensajes aún.</p>
                                        <p className="text-sm text-center">Genera contenido con la IA para ver la vista previa.</p>
                                    </div>
                                ) : (
                                    generatedContent.map((turn, index) => (
                                        <div key={turn.id} className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500 relative group">
                                            
                                            {/* BOTÓN ELIMINAR TURNO (Aparece en hover) */}
                                            <button onClick={() => removeTurn(turn.id)} className="absolute -left-2 top-1/2 -translate-y-1/2 bg-red-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-20 shadow-md">
                                                <X size={14}/>
                                            </button>

                                            {/* MENSAJE DEL BOT (Izquierda) */}
                                            <div className="flex justify-start pl-6">
                                                <div className="bg-white dark:bg-zinc-800 p-3 rounded-2xl rounded-tl-sm shadow-sm border border-slate-200 dark:border-zinc-700 max-w-[85%]">
                                                    <label className="text-[9px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-1 flex items-center gap-1">🧑🏼‍🏫 Teacher (Contexto)</label>
                                                    <textarea 
                                                        value={turn.botMessage} 
                                                        onChange={(e) => handleContentChange(turn.id, 'botMessage', e.target.value)}
                                                        className="w-full bg-transparent text-slate-800 dark:text-zinc-200 outline-none resize-none min-h-[40px] text-sm font-medium"
                                                    />
                                                </div>
                                            </div>

                                            {/* PISTA Y RESPUESTA DEL USUARIO (Derecha) */}
                                            <div className="flex flex-col items-end pl-6">
                                                <div className="bg-cyan-50 dark:bg-cyan-900/20 px-3 py-1.5 rounded-full mb-1 border border-cyan-100 dark:border-cyan-800/50 shadow-sm max-w-[80%]">
                                                    <input 
                                                        value={turn.userHint} 
                                                        onChange={(e) => handleContentChange(turn.id, 'userHint', e.target.value)}
                                                        className="w-full bg-transparent text-cyan-700 dark:text-cyan-400 outline-none text-xs font-bold text-right"
                                                        placeholder="Pista en Español..."
                                                    />
                                                </div>
                                                <div className="bg-cyan-500 dark:bg-cyan-600 p-3 rounded-2xl rounded-tr-sm shadow-md max-w-[85%] border border-cyan-600 dark:border-cyan-500">
                                                    <label className="text-[9px] font-black text-cyan-100 uppercase tracking-widest mb-1 flex items-center justify-end gap-1">Respuesta Esperada ✅</label>
                                                    <textarea 
                                                        value={turn.expectedAnswer} 
                                                        onChange={(e) => handleContentChange(turn.id, 'expectedAnswer', e.target.value)}
                                                        className="w-full bg-transparent text-white outline-none resize-none min-h-[40px] text-sm font-bold text-right placeholder-cyan-200"
                                                        placeholder="English answer here..."
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {/* BOTÓN AÑADIR MANUAL (Flotante) */}
                            {generatedContent.length > 0 && (
                                <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20">
                                    <button onClick={addManualTurn} className="bg-white dark:bg-zinc-800 text-slate-700 dark:text-zinc-300 border border-slate-200 dark:border-zinc-700 px-4 py-2 rounded-full font-bold text-sm shadow-lg hover:bg-slate-50 dark:hover:bg-zinc-700 transition-colors flex items-center gap-2">
                                        <Plus size={16}/> Turno Extra
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

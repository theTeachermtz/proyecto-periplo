<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversational Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { MessageSquare, Save, ArrowLeft, Loader2, Sparkles, KeyRound, X, Plus, Keyboard, Mic, Shuffle } from 'lucide-react';

        // Firebase Config (Igual que en ARCHITECTURE.md)
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const GAME_MODES = [
            { id: 'typing', name: 'Phone Chat', icon: Keyboard, desc: 'Escribir respuestas (Chat)', color: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'border-cyan-500/30' },
            { id: 'unscramble', name: 'Audio Translator', icon: Shuffle, desc: 'Ordenar palabras (Audios)', color: 'text-emerald-400', bg: 'bg-emerald-500/10', border: 'border-emerald-500/30' },
            { id: 'voice', name: 'Voice Reply', icon: Mic, desc: 'Pronunciación (Micrófono)', color: 'text-indigo-400', bg: 'bg-indigo-500/10', border: 'border-indigo-500/30' }
        ];

        const DashboardPC = () => {
            const [gameTitle, setGameTitle] = useState("");
            const [gameMode, setGameMode] = useState('typing');
            const [items, setItems] = useState([{ botMessage: "", expectedAnswer: "", userHint: "" }]);
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setGameTitle(data.title);
                            if (data.content) {
                                // Si existe gameMode lo seteamos, sino por defecto 'typing' (retrocompatibilidad)
                                setGameMode(data.content.gameMode || 'typing');
                                setItems(data.content.flow || data.content); // Soporte para esquema viejo y nuevo
                            }
                        }
                    });
                }
            }, []);

            const generateWithAI = async () => {
                if (!apiKey) return alert("Pega tu API Key de Gemini abajo a la izquierda.");
                if (!gameTitle) return alert("Escribe un tema o situación en el título (ej: 'En el restaurante').");

                setIsGenerating(true);
                try {
                    let prompt = "";
                    if (gameMode === 'typing') {
                        prompt = `Genera 5 interacciones para un chat de texto basado en el tema "${gameTitle}". 
                        "botMessage": Lo que dice el NPC en inglés. 
                        "expectedAnswer": La respuesta corta del usuario en inglés. 
                        "userHint": Pista o traducción en español.`;
                    } else if (gameMode === 'unscramble') {
                        prompt = `Genera 5 frases para traducir audios de un jefe basado en "${gameTitle}". 
                        "botMessage": El contexto en español (ej. "Me pide los reportes"). 
                        "expectedAnswer": La frase exacta en inglés que el usuario debe armar (sin puntuación). 
                        "userHint": Traducción literal al español.`;
                    } else {
                        prompt = `Genera 5 frases para practicar pronunciación basadas en "${gameTitle}". 
                        "botMessage": La instrucción del AI Coach en español (ej. "¿Cómo pides la cuenta?"). 
                        "expectedAnswer": La frase en inglés a pronunciar (sin puntuación). 
                        "userHint": Traducción literal.`;
                    }

                    prompt += ` Responde ÚNICAMENTE con un array JSON válido: [{"botMessage": "...", "expectedAnswer": "...", "userHint": "..."}]`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    setItems(JSON.parse(text));
                } catch (e) {
                    alert("Error con la IA: " + e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleSave = async () => {
                if (!gameTitle) return alert("Título requerido");
                if (items.some(i => !i.expectedAnswer)) return alert("Todas las interacciones deben tener una respuesta esperada.");
                
                setIsSaving(true);
                try {
                    const payload = {
                        title: gameTitle,
                        type: 'PHONECHAT', // Mantenemos PHONECHAT para index.html
                        content: {
                            gameMode: gameMode, // Aquí guardamos el modo específico
                            flow: items // Guardamos el array de items bajo 'flow'
                        },
                        updatedAt: serverTimestamp()
                    };
                    const params = new URLSearchParams(window.location.search);
                    const editId = params.get('edit');
                    
                    if (editId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId), payload);
                    } else {
                        // Respetar la carpeta actual si se envía por URL
                        const folder = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                        await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...payload, parentPath: folder, createdAt: serverTimestamp() });
                    }
                    window.location.href = params.get('folder') ? `index.html?folder=${params.get('folder')}` : 'index.html';
                } catch (e) { alert(e.message); }
                finally { setIsSaving(false); }
            };

            const updateItem = (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);
            };

            return (
                <div className="h-screen flex flex-col dark:text-white bg-zinc-950">
                    {/* HEADER */}
                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900 shrink-0">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.history.back()} className="p-2 hover:bg-zinc-800 rounded-lg"><ArrowLeft size={20}/></button>
                            <h1 className="font-black text-cyan-400 flex items-center gap-2 tracking-tighter"><MessageSquare size={18}/> CONVERSACIONAL BUILDER</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={generateWithAI} disabled={isGenerating} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition disabled:opacity-50">
                                {isGenerating ? <Loader2 className="animate-spin" size={14}/> : <Sparkles size={14}/>} Autocompletar IA
                            </button>
                            <button onClick={handleSave} disabled={isSaving} className="bg-emerald-600 p-2 rounded-xl hover:bg-emerald-500 transition disabled:opacity-50">
                                {isSaving ? <Loader2 className="animate-spin" size={20}/> : <Save size={20}/>}
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-hidden flex flex-col p-4 gap-6 max-w-3xl mx-auto w-full">
                        {/* TITLE & MODE SELECTOR */}
                        <div className="space-y-4 shrink-0">
                            <input 
                                value={gameTitle} 
                                onChange={e => setGameTitle(e.target.value)}
                                placeholder="Tema de la Actividad (ej: Pedir Comida)"
                                className="w-full bg-transparent text-3xl font-black outline-none border-b-2 border-zinc-800 focus:border-cyan-500 pb-2 transition-all placeholder-zinc-700"
                            />
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                {GAME_MODES.map(mode => (
                                    <button 
                                        key={mode.id}
                                        onClick={() => setGameMode(mode.id)}
                                        className={`p-3 rounded-2xl border-2 text-left transition-all flex items-start gap-3 ${gameMode === mode.id ? `${mode.border} ${mode.bg}` : 'border-zinc-800 bg-zinc-900/50 hover:border-zinc-700'}`}
                                    >
                                        <div className={`p-2 rounded-xl ${gameMode === mode.id ? mode.bg : 'bg-zinc-800'} ${mode.color}`}>
                                            <mode.icon size={18}/>
                                        </div>
                                        <div>
                                            <div className={`font-black text-sm ${gameMode === mode.id ? 'text-white' : 'text-zinc-400'}`}>{mode.name}</div>
                                            <div className="text-[10px] font-bold text-zinc-500">{mode.desc}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* ITEMS LIST */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4 pb-20">
                            {items.map((item, idx) => (
                                <div key={idx} className="bg-zinc-900 border border-zinc-800 p-4 rounded-3xl relative group">
                                    <button onClick={() => { const ni = [...items]; ni.splice(idx,1); setItems(ni); }} className="absolute -top-2 -right-2 bg-rose-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg">
                                        <X size={14}/>
                                    </button>
                                    
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="bg-zinc-800 text-zinc-400 font-black text-xs px-2 py-1 rounded-md">Paso {idx + 1}</span>
                                    </div>

                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">{gameMode === 'typing' ? '1. Dice el Bot (Inglés)' : gameMode === 'unscramble' ? '1. Contexto Reenviado (Español)' : '1. Instrucción AI Coach (Español)'}</label>
                                            <input value={item.botMessage} onChange={e => updateItem(idx, 'botMessage', e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm font-medium outline-none focus:border-cyan-500 mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-cyan-500 uppercase tracking-widest ml-1">2. Respuesta del Alumno (Inglés Objetivo)</label>
                                            <input value={item.expectedAnswer} onChange={e => updateItem(idx, 'expectedAnswer', e.target.value)} className="w-full bg-zinc-950 border border-cyan-500/30 rounded-xl p-3 text-sm font-black text-cyan-300 outline-none focus:border-cyan-500 mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-amber-500 uppercase tracking-widest ml-1">3. Pista / Traducción</label>
                                            <input value={item.userHint} onChange={e => updateItem(idx, 'userHint', e.target.value)} className="w-full bg-zinc-950 border border-amber-500/30 rounded-xl p-3 text-sm font-medium text-amber-200 outline-none focus:border-amber-500 mt-1"/>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            
                            <button onClick={() => setItems([...items, { botMessage: "", expectedAnswer: "", userHint: "" }])} className="w-full py-4 border-2 border-dashed border-zinc-800 rounded-3xl text-zinc-500 font-black hover:bg-zinc-900 transition flex items-center justify-center gap-2">
                                <Plus size={18}/> Agregar Paso
                            </button>
                        </div>
                    </div>
                    
                    {/* Floating API Key Config */}
                    <div className="fixed bottom-4 left-4 z-50">
                         <button onClick={() => { const k = prompt("Gemini API Key:", apiKey); if(k){setApiKey(k); localStorage.setItem('gemini_api_key', k);}}} className="p-3 bg-zinc-900 rounded-full border border-zinc-800 text-zinc-500 hover:text-indigo-400 shadow-xl transition"><KeyRound size={20}/></button>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<DashboardPC />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Chat Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { MessageSquare, Layers, Zap, Save, ArrowLeft, Loader2, Search, Sun, Moon, ChefHat, LayoutTemplate, X, Plus, Tags, Keyboard, Mic, Shuffle } from 'lucide-react';
        
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // TAXONOMÍA MAESTRA
        // ============================================================
        const TAXONOMY = {
            basic: {
                grammar: ["Modal Verbs","Present Simple","Present Continuous","Future (Going to)","Otro"],
                verbs: ["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival","Otro"],
                nouns: ["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway","Otro"],
                adjectives: ["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste","Otro"],
                key_structs: ["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs","Otro"],
                otro: ["Otro"]
            },
            advanced: {
                grammar: ["Past Simple","Second Conditional","Past Continuous","Past Future Intention","Otro"],
                verbs: ["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound","Otro"],
                nouns: ["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science","Otro"],
                adjectives: ["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives","Otro"],
                key_structs: ["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice","Otro"],
                otro: ["Otro"]
            },
            pro: {
                grammar: ["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals","Otro"],
                verbs: ["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations","Otro"],
                nouns: ["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic","Otro"],
                adjectives: ["Formal Register Adj.","Nuance & Tone Adj.","Otro"],
                key_structs: ["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives","Otro"],
                otro: ["Otro"]
            }
        };

        // ============================================================
        // SISTEMA DE TAXONOMY NUEVO (igual que dashboards modernos)
        // ============================================================
        const NEW_LEVELS = ["B1", "B2", "B-MIX", "A1", "A2", "A-MIX", "P1", "P2", "P-MIX"];
        const NEW_CATS = [
            { id: 'grammar', label: 'Grammar' },
            { id: 'verbs', label: 'Verb Mastery' },
            { id: 'nouns', label: 'Noun Mastery' },
            { id: 'adjectives', label: 'Vocab Mastery (Adj)' },
            { id: 'key_structs', label: 'Key Structures' },
            { id: 'otro', label: 'Otro (Macro Skills)' }
        ];
        const MACRO_SKILLS = ["Speaking", "Listening", "Reading", "Grammar", "Vocabulary", "Pronunciation"];

        const getAllTopicsForCategory = (categoryId, selectedLevels) => {
            let topics = [];
            const activeDbKeys = new Set();
            selectedLevels.forEach(lvl => {
                if (lvl.startsWith('B')) activeDbKeys.add('basic');
                if (lvl.startsWith('A')) activeDbKeys.add('advanced');
                if (lvl.startsWith('P')) activeDbKeys.add('pro');
            });
            activeDbKeys.forEach(dbKey => {
                if (TAXONOMY[dbKey] && TAXONOMY[dbKey][categoryId]) {
                    topics.push(...TAXONOMY[dbKey][categoryId]);
                }
            });
            return [...new Set(topics)];
        };

        const toggleSelection = (arr, setFn, item) => {
            setFn(arr.includes(item) ? arr.filter(i => i !== item) : [...arr, item]);
        };

        const GRAMMAR_MODULES = {
            basic: ["Modal Verbs","Present Simple","Present Continuous","Future (Going to)","Otro"],
            advanced: ["Past Simple","Second Conditional","Past Continuous","Past Future Intention","Otro"],
            pro: ["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals","Otro"]
        };

        const GAME_MODES = [
            { id: 'typing', name: 'Phone Chat', icon: Keyboard, color: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'border-cyan-500/30' },
            { id: 'unscramble', name: 'Audio Translator', icon: Shuffle, color: 'text-emerald-400', bg: 'bg-emerald-500/10', border: 'border-emerald-500/30' },
            { id: 'voice', name: 'Voice Reply', icon: Mic, color: 'text-indigo-400', bg: 'bg-indigo-500/10', border: 'border-indigo-500/30' }
        ];

        const Dashboard = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('periplo_google_key') || '');
            const [gameTitle, setGameTitle] = useState("");
            
            const [gameMode, setGameMode] = useState(new URLSearchParams(window.location.search).get('mode') || 'typing');
            const [activeGrammarTab, setActiveGrammarTab] = useState('basic');
            const [selectedGrammar, setSelectedGrammar] = useState([]);
            const [contextSetting, setContextSetting] = useState(""); 
            const [chatTurns, setChatTurns] = useState(4); 
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedContent, setGeneratedContent] = useState([]); 
            const [editingId, setEditingId] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);

            // TAXONOMY MODAL STATE — sistema nuevo
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels] = useState([]);
            const [saveCats, setSaveCats] = useState([]);
            const [saveTopics, setSaveTopics] = useState([]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const editId = params.get('edit');
                    if (editId) {
                        setIsLoadingData(true);
                        try {
                            const docRef = doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                setGameTitle(data.title);
                                setEditingId(editId);
                                if (data.content) {
                                    setGeneratedContent(data.content.flow || data.content);
                                    setGameMode(data.content.gameMode || 'typing');
                                }
                                // Compatibilidad: convierte tags viejos (level/category/topic) al nuevo formato
                                if (data.tags) {
                                    const t = data.tags;
                                    if (t.levels) {
                                        setSaveLevels(t.levels);
                                        setSaveCats(t.categories || []);
                                        setSaveTopics(t.topics || []);
                                    } else {
                                        // Formato viejo → convertir
                                        const lvlMap = { basic: 'B1', advanced: 'A1', pro: 'P1' };
                                        setSaveLevels(t.level ? [lvlMap[t.level] || t.level] : []);
                                        setSaveCats(t.category ? [t.category] : []);
                                        setSaveTopics(t.topic ? [t.topic] : []);
                                    }
                                }
                            } else alert("No se encontró el juego.");
                        } catch (e) { alert("Error cargando: " + e.message); } 
                        finally { setIsLoadingData(false); }
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const toggleTheme = () => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); };

            const toggleGrammar = (topic) => {
                setSelectedGrammar(prev => prev.includes(topic) ? prev.filter(t => t !== topic) : [...prev, topic]);
            };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    if (!response.ok) throw new Error("Error conectando con Google");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels.find(m => m.includes("gemini-2.0")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { alert("Error al buscar modelos: " + e.message); } 
                finally { setIsLoadingModels(false); }
            };

            const generateContent = async () => {
                if (!apiKey) return alert("Por favor ingresa tu API Key");
                if (!selectedModel) return alert("Por favor escanea y selecciona un modelo primero (botón lupa)");
                if (!contextSetting.trim()) return alert("Por favor describe el tema de la conversación.");
                
                setIsGenerating(true);

                let grammarConstraint = "";
                if (selectedGrammar.length > 0) {
                    grammarConstraint = `STRICT GRAMMAR CONSTRAINT: You MUST actively use the following grammar structures in the expected English answers: ${selectedGrammar.join(', ')}.`;
                } else {
                    grammarConstraint = "Use natural, conversational grammar appropriate for the topic.";
                }

                let modeInstruction = "";
                if (gameMode === 'typing') {
                    modeInstruction = `
                    1. botMessage: The exact message sent by the NPC in English (MAX 30 WORDS). No descriptive text. Include a relevant emoji at the start.
                    2. userHint: The Spanish translation of what the user wants to say.
                    3. expectedAnswer: The English sentence the user must type (MAX 15 WORDS).`;
                } else if (gameMode === 'unscramble') {
                    modeInstruction = `
                    1. botMessage: The context or instruction describing the situation in Spanish (e.g., "Me pide los reportes").
                    2. userHint: The literal Spanish translation of the target English sentence.
                    3. expectedAnswer: The exact English sentence the user must build (MAX 15 WORDS, NO final punctuation).`;
                } else {
                    modeInstruction = `
                    CRITICAL RULES FOR THIS MODE:
                    1. botMessage: The DIRECT DIALOGUE spoken by the NPC in English (MAX 30 WORDS). NO narrative text. Just the spoken words. Start with ONE emoji representing the character.
                    2. userHint: The EXACT Spanish translation of the botMessage.
                    3. expectedAnswer: The exact English sentence the user must reply with (MAX 15 WORDS, NO final punctuation).`;
                }

                const prompt = `
                    You are an expert ESL test creator. Create an engaging, sequential roleplay chat.
                    Overall Context/Scenario: ${contextSetting}
                    ${grammarConstraint}
                    Create exactly ${chatTurns} sequential conversational turns between the NPC and the User based strictly on the context. 
                    For each turn, provide:
                    ${modeInstruction}
                    Output FORMAT (Strict JSON Array):
                    [{ "botMessage": "...", "userHint": "...", "expectedAnswer": "..." }]
                `;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json", temperature: 0.7 } }) 
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(`Google Error: ${data.error.message}`);
                    const text = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text);
                    setGeneratedContent(json.map((item, index) => ({...item, id: Date.now() + index})));
                } catch (e) { alert("Error: " + e.message); } 
                finally { setIsGenerating(false); }
            };

            const handlePreSave = () => {
                if (!gameTitle) return alert("Ponle un título al juego");
                if (generatedContent.length === 0) return alert("Genera el chat antes de guardar.");
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                try {
                    const params = new URLSearchParams(window.location.search); 
                    const folderParam = params.get('folder');
                    const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';

                    const payload = {
                        title: gameTitle, 
                        type: 'PHONECHAT', 
                        content: { gameMode: gameMode, flow: generatedContent }, 
                        tags: { levels: saveLevels, categories: saveCats, topics: saveTopics },
                        updatedAt: serverTimestamp() 
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), payload);
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), { 
                            ...payload, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { alert("Error guardando: " + e.message); }
                finally { setIsSaving(false); }
            };

            const handleContentChange = (id, field, value) => {
                setGeneratedContent(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const addManualTurn = () => {
                setGeneratedContent(prev => [...prev, { id: Date.now(), botMessage: "", userHint: "", expectedAnswer: "" }]);
            };

            const removeTurn = (id) => {
                setGeneratedContent(prev => prev.filter(item => item.id !== id));
            };

            if (isLoadingData) return <div className="h-[100dvh] flex items-center justify-center text-slate-500 font-bold"><Loader2 className="animate-spin mr-2"/> Cargando datos del juego...</div>;

            return (
                <div className="h-[100dvh] flex flex-col relative">

                    {/* ============================================================ */}
                    {/* MODAL DE CLASIFICACIÓN — SISTEMA NUEVO                       */}
                    {/* ============================================================ */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-lg font-black flex items-center gap-2 text-white"><Tags className="text-cyan-400"/> Clasificar Phone Chat</h2>
                                    <button onClick={() => setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition"><X size={20}/></button>
                                </div>
                                
                                <div className="space-y-6 overflow-y-auto custom-scrollbar pr-1 flex-1 mb-6">
                                    
                                    {/* PASO 1: NIVELES */}
                                    <div>
                                        <label className="block text-xs font-black text-indigo-400 uppercase tracking-widest mb-3">1. Niveles Comerciales</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button key={lvl} onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-indigo-500 hover:text-indigo-300'}`}>
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 2: CATEGORÍAS */}
                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categorías</label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button key={cat.id} onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 3: TEMAS ESPECÍFICOS */}
                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest">3. Temas Específicos</label>
                                            {saveCats.map(catId => {
                                                if (catId === 'otro') return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">Macro Skills</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {MACRO_SKILLS.map(skill => (
                                                                <button key={skill} onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-400 text-white' : 'bg-zinc-900 border-zinc-700 text-zinc-400 hover:border-amber-500 hover:text-amber-300'}`}>
                                                                    {skill}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                                const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                                const topics = getAllTopicsForCategory(catId, saveLevels);
                                                if (topics.length === 0) return null;
                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button key={topic} onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-amber-500 border-amber-400 text-white' : 'bg-zinc-900 border-zinc-700 text-zinc-400 hover:border-amber-500 hover:text-amber-300'}`}>
                                                                    {topic}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}

                                    {saveCats.includes('otro') && saveLevels.length === 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-3">3. Macro Skills</label>
                                            <div className="flex flex-wrap gap-2">
                                                {MACRO_SKILLS.map(skill => (
                                                    <button key={skill} onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                        className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-400 text-white' : 'bg-zinc-900 border-zinc-700 text-zinc-400 hover:border-amber-500 hover:text-amber-300'}`}>
                                                        {skill}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button onClick={executeFinalSave} disabled={isSaving} className="w-full bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} Confirmar y Guardar
                                </button>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <div className="bg-slate-900 dark:bg-black px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center shrink-0 shadow-md z-10 gap-4">
                        <div className="flex items-center justify-between w-full md:w-auto">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <h1 className="text-xl font-black tracking-tight text-white flex items-center gap-2"><MessageSquare className="text-cyan-400 w-5 h-5"/> Conversational Builder</h1>
                            </div>
                            <button onClick={toggleTheme} className="p-2 text-yellow-400 md:hidden">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-xl border border-slate-700 w-full md:w-auto overflow-x-auto custom-scrollbar">
                            {!editingId ? (
                                <>
                                    <input type="password" placeholder="Tu API Key..." value={apiKey} onChange={e => {setApiKey(e.target.value); localStorage.setItem('periplo_google_key', e.target.value)}} className="bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-xs font-mono text-center w-36 focus:border-cyan-500 focus:outline-none"/>
                                    <button onClick={fetchModels} disabled={isLoadingModels || !apiKey} className="p-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition-colors shrink-0">{isLoadingModels ? <Loader2 className="animate-spin" size={16}/> : <Search size={16}/>}</button>
                                    {availableModels.length > 0 && (<select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-xs text-white max-w-[150px] outline-none">{availableModels.map(m => <option key={m} value={m}>{m.replace('models/', '')}</option>)}</select>)}
                                </>
                            ) : (
                                <div className="px-4 py-1.5 flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-emerald-400 font-black text-xs uppercase tracking-widest">Modo Edición Activo</span>
                                </div>
                            )}
                            <button onClick={toggleTheme} className="hidden md:block p-2 text-yellow-400 shrink-0">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                        </div>
                    </div>
                    
                    <div className="flex flex-1 flex-col md:flex-row overflow-hidden bg-slate-50 dark:bg-zinc-950">
                        {/* LEFT PANEL */}
                        {!editingId && (
                            <div className="w-full md:w-[40%] xl:w-[35%] border-b md:border-b-0 md:border-r border-slate-200 dark:border-zinc-800 flex flex-col h-1/2 md:h-full bg-white dark:bg-zinc-900">
                                <div className="p-4 md:p-6 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                                    <input value={gameTitle} onChange={(e) => setGameTitle(e.target.value)} className="w-full text-xl md:text-2xl font-black p-2 border-b-2 border-slate-200 dark:border-zinc-700 bg-transparent dark:text-white focus:border-cyan-500 outline-none placeholder-slate-300 dark:placeholder-zinc-600" placeholder="Título de la Conversación..."/>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-8 custom-scrollbar">
                                    
                                    <div>
                                        <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><Layers size={16} className="text-pink-500"/> 1. Modo de Juego</h3>
                                        <div className="flex flex-col gap-2">
                                            {GAME_MODES.map(mode => (
                                                <button key={mode.id} onClick={() => setGameMode(mode.id)}
                                                    className={`p-3 rounded-xl border-2 text-left transition-all flex items-center gap-3 ${gameMode === mode.id ? `${mode.border} ${mode.bg}` : 'border-slate-200 dark:border-zinc-800 bg-slate-50 dark:bg-zinc-950 hover:border-slate-300 dark:hover:border-zinc-700'}`}>
                                                    <div className={`p-2 rounded-lg ${gameMode === mode.id ? mode.bg : 'bg-slate-200 dark:bg-zinc-800'} ${mode.color}`}>
                                                        <mode.icon size={16}/>
                                                    </div>
                                                    <div className={`font-black text-sm ${gameMode === mode.id ? 'text-slate-800 dark:text-white' : 'text-slate-500 dark:text-zinc-400'}`}>{mode.name}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><MessageSquare size={16} className="text-cyan-500"/> 2. Tema de la Conversación</h3>
                                        <textarea value={contextSetting} onChange={e => setContextSetting(e.target.value)} placeholder="Ej. El alumno está pidiendo informes sobre un gimnasio por mensaje de texto..."
                                            className="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl p-4 text-sm text-slate-700 dark:text-zinc-200 focus:border-cyan-500 outline-none h-24 resize-none"/>
                                    </div>

                                    <div>
                                        <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><Layers size={16} className="text-indigo-500"/> 3. Filtro Gramatical (Opcional)</h3>
                                        <div className="bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-2xl overflow-hidden">
                                            <div className="flex border-b border-slate-200 dark:border-zinc-800">
                                                {['basic', 'advanced', 'pro'].map(tab => (
                                                    <button key={tab} onClick={() => setActiveGrammarTab(tab)} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-colors ${activeGrammarTab === tab ? 'bg-indigo-100 text-indigo-700 dark:bg-zinc-800 dark:text-white' : 'text-slate-500 dark:text-zinc-500 hover:bg-slate-100 dark:hover:bg-zinc-900/50'}`}>
                                                        {tab}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="p-4 flex flex-wrap gap-2">
                                                {GRAMMAR_MODULES[activeGrammarTab].map(topic => {
                                                    const isSelected = selectedGrammar.includes(topic);
                                                    return (
                                                        <button key={topic} onClick={() => toggleGrammar(topic)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${isSelected ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-700 text-slate-600 dark:text-zinc-400 hover:border-slate-300 dark:hover:border-zinc-500'}`}>
                                                            {topic}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        <p className="text-[10px] text-slate-400 dark:text-zinc-500 mt-2 font-bold italic">* Si no seleccionas nada, la IA usará gramática natural según el tema.</p>
                                    </div>

                                    <div>
                                        <h3 className="font-black text-slate-800 dark:text-white uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><ChefHat size={16} className="text-amber-500"/> 4. Longitud de la Práctica</h3>
                                        <input type="range" min="2" max="10" step="1" value={chatTurns} onChange={e => setChatTurns(parseInt(e.target.value))} className="w-full accent-cyan-500"/>
                                        <div className="text-center font-black text-cyan-600 dark:text-cyan-400 mt-2">{chatTurns} Interacciones</div>
                                    </div>

                                    <button onClick={generateContent} disabled={isGenerating} className="w-full bg-slate-900 dark:bg-cyan-600 text-white px-6 py-4 rounded-xl font-black text-base hover:bg-slate-800 dark:hover:bg-cyan-500 transition-all flex items-center justify-center gap-3 disabled:opacity-50 shadow-lg">
                                        {isGenerating ? <Loader2 className="animate-spin"/> : <Zap className="fill-yellow-400 dark:text-yellow-400"/>} {isGenerating ? "Creando Contenido..." : "GENERAR CON IA"}
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {/* RIGHT PANEL */}
                        <div className={`w-full ${editingId ? 'md:w-full' : 'md:w-[60%] xl:w-[65%]'} flex flex-col relative h-1/2 md:h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-100 dark:bg-zinc-950`}>
                            <div className="p-4 md:p-6 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-sm border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center shadow-sm z-10 shrink-0">
                                <div>
                                    <h3 className="font-black text-slate-800 dark:text-white flex items-center gap-2 text-lg"><LayoutTemplate className="text-emerald-500"/> {editingId ? 'Corrección de Contenido' : 'Editor Visual Expandido'}</h3>
                                    <p className="text-xs text-slate-500 dark:text-zinc-400 font-medium mt-1">Cajas redimensionables para facilitar la lectura.</p>
                                </div>
                                <button onClick={handlePreSave} disabled={generatedContent.length === 0} className="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 shadow-md transition-colors">
                                    <Save size={18}/> {editingId ? 'ACTUALIZAR' : 'GUARDAR'}
                                </button>
                            </div>
                            
                            <div className="flex-1 p-4 md:p-6 overflow-y-auto custom-scrollbar pb-32">
                                {editingId && (
                                    <div className="mb-6 max-w-4xl mx-auto animate-in fade-in">
                                        <label className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-2 flex items-center gap-1">Título de la Lección</label>
                                        <input value={gameTitle} onChange={(e) => setGameTitle(e.target.value)} className="w-full text-2xl md:text-3xl font-black p-3 border-b-2 border-dashed border-slate-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-900/50 rounded-t-xl dark:text-white focus:border-emerald-500 outline-none placeholder-slate-300 dark:placeholder-zinc-600 transition-colors" placeholder="Título de la Conversación..."/>
                                    </div>
                                )}

                                <div className={editingId ? 'max-w-4xl mx-auto space-y-6' : 'space-y-6'}>
                                    {generatedContent.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400 dark:text-zinc-600 py-20">
                                            <MessageSquare size={48} className="mb-4 opacity-50"/>
                                            <p className="font-bold text-center">Sin mensajes aún.</p>
                                            <p className="text-sm text-center">Genera contenido con la IA para ver la vista previa.</p>
                                        </div>
                                    ) : (
                                        generatedContent.map((turn, index) => (
                                            <div key={turn.id} className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500 relative group">
                                                <button onClick={() => removeTurn(turn.id)} className="absolute -left-2 top-1/2 -translate-y-1/2 bg-red-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-20 shadow-md">
                                                    <X size={14}/>
                                                </button>
                                                <div className="flex justify-start pl-6">
                                                    <div className="bg-white dark:bg-zinc-800 p-4 rounded-2xl rounded-tl-sm shadow-sm border border-slate-200 dark:border-zinc-700 w-full max-w-[95%]">
                                                        <label className="text-[9px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-widest mb-2 flex items-center gap-1">
                                                            {gameMode === 'typing' ? '🧑🏼‍🏫 Teacher (Contexto)' : gameMode === 'unscramble' ? '📱 Contexto Reenviado (Español)' : '🤖 Instrucción AI Coach (Español)'}
                                                        </label>
                                                        <textarea value={turn.botMessage} onChange={(e) => handleContentChange(turn.id, 'botMessage', e.target.value)}
                                                            className="w-full bg-slate-50/50 dark:bg-zinc-900/50 p-2 rounded-lg text-slate-800 dark:text-zinc-200 border border-transparent hover:border-slate-300 dark:hover:border-zinc-600 outline-none min-h-[80px] resize-y text-sm font-medium"/>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-end pl-6">
                                                    <div className="bg-cyan-50 dark:bg-cyan-900/20 px-4 py-3 rounded-2xl mb-2 border border-cyan-100 dark:border-cyan-800/50 shadow-sm w-full max-w-[90%]">
                                                        <label className="text-[9px] font-black text-cyan-600 dark:text-cyan-500 uppercase tracking-widest mb-1 flex justify-end">
                                                            {gameMode === 'typing' ? 'Pista en Español 💡' : 'Traducción Literal 💡'}
                                                        </label>
                                                        <textarea value={turn.userHint} onChange={(e) => handleContentChange(turn.id, 'userHint', e.target.value)}
                                                            className="w-full bg-transparent text-cyan-800 dark:text-cyan-300 outline-none min-h-[50px] resize-y text-xs font-bold text-right leading-tight" placeholder="Pista en Español..."/>
                                                    </div>
                                                    <div className="bg-cyan-500 dark:bg-cyan-600 p-4 rounded-2xl rounded-tr-sm shadow-md border border-cyan-600 dark:border-cyan-500 w-full max-w-[95%]">
                                                        <label className="text-[9px] font-black text-cyan-100 uppercase tracking-widest mb-2 flex items-center justify-end gap-1">
                                                            {gameMode === 'typing' ? 'Respuesta Esperada ✅' : gameMode === 'unscramble' ? 'Frase a Ordenar (Inglés) ✅' : 'Frase a Pronunciar (Inglés) 🎤'}
                                                        </label>
                                                        <textarea value={turn.expectedAnswer} onChange={(e) => handleContentChange(turn.id, 'expectedAnswer', e.target.value)}
                                                            className="w-full bg-cyan-600/50 dark:bg-cyan-700/50 p-2 rounded-lg text-white border border-transparent hover:border-cyan-400 outline-none min-h-[80px] resize-y text-sm font-bold text-right placeholder-cyan-200" placeholder="English answer here..."/>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            {generatedContent.length > 0 && (
                                <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20">
                                    <button onClick={addManualTurn} className="bg-white dark:bg-zinc-800 text-slate-700 dark:text-zinc-300 border border-slate-200 dark:border-zinc-700 px-4 py-2 rounded-full font-bold text-sm shadow-lg hover:bg-slate-50 dark:hover:bg-zinc-700 transition-colors flex items-center gap-2">
                                        <Plus size={16}/> Turno Extra
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Flow Builder | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { MessageSquare, Layers, Puzzle, Filter, Zap, Save, Edit3, ArrowLeft, Loader2, Search, Sun, Moon, Star, Eye, ChefHat, ShoppingCart } from 'lucide-react';

        // Configuración de Firebase (Se asume la misma estructura del proyecto)
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Bases de datos de ingredientes pedagógicos
        const GRAMMAR_LIST = {
            "BASIC": ["Modal Verbs", "Simple Present", "Present Continuous", "Going To (Future)"],
            "ADVANCED": ["Simple Past", "Past Continuous", "Present Perfect", "Second Conditional"]
        };
        const SPECIAL_WORDS = ["WH Questions", "Frequency Adverbs", "Prepositions of Place"];
        const VOCAB_PACKS = ["At the Airport", "Job Interview", "Ordering Food", "Small Talk"];

        // --- COMPONENTE: EDITOR DE CONTENIDO GENERADO ---
        const ContentEditor = ({ content, onSave, title, setTitle }) => {
            const [editableContent, setEditableContent] = useState(content);

            const handleChange = (index, field, value) => {
                const updated = [...editableContent];
                updated[index][field] = value;
                setEditableContent(updated);
            };

            return (
                <div className="h-[100dvh] flex flex-col p-4 md:p-6 transition-colors">
                    <div className="bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-slate-200 dark:border-zinc-800 overflow-hidden flex flex-col flex-1 max-w-4xl mx-auto w-full">
                        <div className="bg-indigo-600 dark:bg-black p-4 md:p-6 flex justify-between items-center text-white shrink-0">
                            <h2 className="text-xl md:text-2xl font-black flex items-center gap-2"><MessageSquare/> Revisión de Diálogo</h2>
                            <div className="flex gap-2">
                                <button onClick={() => window.location.reload()} className="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl font-bold">Descartar</button>
                                <button onClick={() => onSave(editableContent)} className="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2"><Save size={18}/> GUARDAR</button>
                            </div>
                        </div>
                        
                        <div className="p-4 md:p-6 overflow-hidden flex flex-col flex-1 bg-slate-50 dark:bg-zinc-950">
                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Título de la Lección</label>
                            <input value={title} onChange={(e) => setTitle(e.target.value)} className="w-full text-xl font-bold p-3 border-2 border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 dark:text-white rounded-xl mb-6 outline-none" placeholder="Ej. Small Talk en la Oficina"/>
                            
                            <div className="flex-1 overflow-y-auto space-y-6 custom-scrollbar pr-2">
                                {editableContent.map((item, i) => (
                                    <div key={i} className="p-4 bg-white dark:bg-zinc-900 rounded-xl border border-slate-200 dark:border-zinc-800 shadow-sm relative">
                                        <div className="absolute -left-3 -top-3 bg-indigo-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold border-4 border-white dark:border-zinc-950">{i + 1}</div>
                                        
                                        <div className="space-y-4 mt-2">
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 dark:text-zinc-400">🤖 Bot Message (Contexto)</label>
                                                <textarea value={item.botMessage} onChange={(e) => handleChange(i, 'botMessage', e.target.value)} className="w-full p-2 mt-1 border dark:border-zinc-700 rounded bg-slate-50 dark:bg-zinc-950 dark:text-white outline-none" rows="2"/>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500 dark:text-zinc-400">💡 User Hint (Pista en Español)</label>
                                                    <input value={item.userHint} onChange={(e) => handleChange(i, 'userHint', e.target.value)} className="w-full p-2 mt-1 border dark:border-zinc-700 rounded bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300 outline-none"/>
                                                </div>
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500 dark:text-zinc-400">✅ Expected Answer (Respuesta a teclear)</label>
                                                    <input value={item.expectedAnswer} onChange={(e) => handleChange(i, 'expectedAnswer', e.target.value)} className="w-full p-2 mt-1 border dark:border-zinc-700 rounded bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-bold outline-none"/>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD PRINCIPAL ---
        const Dashboard = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('periplo_google_key') || '');
            const [gameTitle, setGameTitle] = useState("");
            const [ingredients, setIngredients] = useState({});
            const [contextSetting, setContextSetting] = useState(""); 
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedContent, setGeneratedContent] = useState(null);
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const toggleTheme = () => setIsDarkMode(!isDarkMode);

            const toggleIngredient = (name) => {
                setIngredients(prev => {
                    const next = { ...prev };
                    if (next[name]) delete next[name];
                    else next[name] = { priority: 1 };
                    return next;
                });
            };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key");
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) setSelectedModel(validModels.find(m => m.includes("gemini-1.5-pro")) || validModels[0]);
                } catch (e) { alert("Error: " + e.message); }
            };

            const generateContent = async () => {
                if (!apiKey || !selectedModel) return alert("Falta API Key o Modelo");
                const itemsList = Object.keys(ingredients);
                if (itemsList.length === 0 && !contextSetting) return alert("Agrega temas o define un contexto.");

                setIsGenerating(true);

                const prompt = `
                    You are an expert ESL instructional designer. Create a conversational flow for an interactive "Fill in the blanks" chat game.
                    
                    Overall Context/Scenario: ${contextSetting || "A casual conversation"}
                    Grammar/Vocabulary to evaluate in the user's answers: ${itemsList.join(', ')}

                    Create exactly 4 conversational turns. For each turn, provide:
                    1. botMessage: The message sent by the AI Teacher (in English). This sets up the context for the user to reply.
                    2. userHint: What the user wants to say, written in Spanish (as a guide).
                    3. expectedAnswer: The exact English sentence the user must type. This MUST utilize the requested grammar/vocabulary. Keep it natural but specific.

                    Output FORMAT (Strict JSON Array):
                    [
                        {
                            "id": 1,
                            "botMessage": "Hi, I noticed you were looking at the menu. Do you have any questions?",
                            "userHint": "Sí, ¿qué recomiendas para alguien a quien no le gusta el picante?",
                            "expectedAnswer": "Yes, what do you recommend for someone who doesn't like spicy food?"
                        }
                    ]
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) 
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    setGeneratedContent(JSON.parse(text));
                } catch (e) { alert("Error: " + e.message); } 
                finally { setIsGenerating(false); }
            };

            const saveToFirebase = async (finalContent) => {
                if (!gameTitle) return alert("Añade un título");
                try {
                    await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'chat_games'), { 
                        title: gameTitle, type: 'CHAT_FLOW', content: finalContent, createdAt: serverTimestamp() 
                    });
                    alert("¡Juego guardado en Firebase!");
                    window.location.reload();
                } catch (e) { alert("Error guardando: " + e.message); }
            };

            if (generatedContent) return <ContentEditor content={generatedContent} onSave={saveToFirebase} title={gameTitle} setTitle={setGameTitle} />;

            return (
                <div className="h-[100dvh] flex flex-col">
                    {/* HEADER */}
                    <div className="bg-slate-900 dark:bg-black px-6 py-4 flex justify-between items-center shrink-0 shadow-md z-10">
                        <div className="flex items-center gap-4">
                            <h1 className="text-xl font-black text-white flex items-center gap-2"><MessageSquare className="text-indigo-400"/> Chat Flow Builder</h1>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-xl border border-slate-700">
                            <input type="password" placeholder="API Key..." value={apiKey} onChange={e => {setApiKey(e.target.value); localStorage.setItem('periplo_google_key', e.target.value)}} className="bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-xs w-32 outline-none"/>
                            <button onClick={fetchModels} className="p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg"><Search size={16}/></button>
                            {availableModels.length > 0 && <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-xs text-white outline-none">{availableModels.map(m => <option key={m} value={m}>{m.replace('models/', '')}</option>)}</select>}
                            <button onClick={toggleTheme} className="p-2 text-yellow-400">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                        </div>
                    </div>
                    
                    {/* MAIN LAYOUT */}
                    <div className="flex flex-1 overflow-hidden bg-white dark:bg-zinc-950">
                        
                        {/* LEFT: INGREDIENTES */}
                        <div className="w-1/2 border-r border-slate-200 dark:border-zinc-800 flex flex-col bg-slate-50 dark:bg-zinc-950/50">
                            <div className="p-6 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                                <h2 className="font-black text-slate-800 dark:text-white flex items-center gap-2"><ChefHat className="text-orange-500"/> Menú de Ingredientes</h2>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                                <div>
                                    <h3 className="font-black text-indigo-500 uppercase text-xs mb-3 flex items-center gap-2"><Layers size={14}/> Grammar Focus</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {GRAMMAR_LIST.BASIC.concat(GRAMMAR_LIST.ADVANCED).map(item => (
                                            <button key={item} onClick={() => toggleIngredient(item)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${ingredients[item] ? 'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 border-indigo-400' : 'bg-white dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 border-slate-200 dark:border-zinc-700'}`}>{item}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <h3 className="font-black text-emerald-500 uppercase text-xs mb-3 flex items-center gap-2"><Filter size={14}/> Vocab / Scenarios</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {VOCAB_PACKS.map(item => (
                                            <button key={item} onClick={() => toggleIngredient(item)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${ingredients[item] ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 border-emerald-400' : 'bg-white dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 border-slate-200 dark:border-zinc-700'}`}>{item}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        {/* RIGHT: CONFIGURACIÓN Y GENERAR */}
                        <div className="w-1/2 bg-white dark:bg-zinc-900 flex flex-col relative">
                            <div className="p-6 border-b border-slate-200 dark:border-zinc-800 shrink-0">
                                <h3 className="font-black text-slate-800 dark:text-white flex items-center gap-2"><MessageSquare className="text-blue-500"/> Contexto Específico</h3>
                            </div>
                            
                            <div className="p-6 space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-slate-600 dark:text-zinc-300 mb-2">Describe la situación de la conversación:</label>
                                    <textarea 
                                        value={contextSetting} 
                                        onChange={(e) => setContextSetting(e.target.value)}
                                        placeholder="Ej. El alumno está en el aeropuerto y ha perdido su pasaporte. Está hablando con un agente de seguridad."
                                        className="w-full h-32 p-4 bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-xl outline-none dark:text-white resize-none"
                                    />
                                </div>

                                <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100 dark:border-blue-900/50">
                                    <p className="text-sm text-blue-800 dark:text-blue-300 font-medium">
                                        La IA generará 4 turnos de conversación basados en tu descripción y forzará el uso de los <strong>{Object.keys(ingredients).length}</strong> ingredientes gramaticales seleccionados en las respuestas que el alumno debe teclear.
                                    </p>
                                </div>
                            </div>
                            
                            <div className="absolute bottom-8 right-8 z-20">
                                <button onClick={generateContent} disabled={isGenerating} className="bg-indigo-600 text-white px-8 py-4 rounded-full font-black text-lg hover:bg-indigo-500 hover:scale-105 transition-all flex items-center gap-3 shadow-xl">
                                    {isGenerating ? <Loader2 className="animate-spin"/> : <Zap className="fill-yellow-400"/>} 
                                    {isGenerating ? "Generando Diálogo..." : "GENERAR CHAT"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

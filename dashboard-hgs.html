// ─── Taquero vocabulary — Lotería Taco House Co. ──────────────
const TAQ={
  tacos:[
    'taco de frijol','taco de pescado','taco de camarón','taco de bistec',
    'taco de chorizo','taco de pollo','esquite','gordita','sope','flauta',
    'tostada','enchilada','tamal','quesadilla','burrito',
  ],
  complementos:[
    'la cuenta','la propina','el mesero','el churro','el plato','la cuchara',
    'el tenedor','arroz','queso','crema','tortilla','limón','tomate','cebolla',
    'cilantro','chile chipotle','chile habanero','chile jalapeño','salsa',
    'guacamole','aguacate','mole','nopal','totopos','sopa','postre',
  ],
  bebidas:[
    'café de olla','cerveza','margarita','horchata','jamaica','mezcal','tequila','agua fresca',
  ],
};
const TAQ_COLORS={tacos:'#f97316',complementos:'#a3e635',bebidas:'#22d3ee'};
const itemColor=item=>TAQ.tacos.includes(item)?TAQ_COLORS.tacos:TAQ.bebidas.includes(item)?TAQ_COLORS.bebidas:TAQ_COLORS.complementos;

const sh=arr=>[...arr].sort(()=>Math.random()-.5);
const mkOrders=(n=12)=>{
  const out=[];
  for(let i=0;i<n;i++){
    const nt=Math.random()<.4?2:1;
    const nb=1;
    const nc=Math.min(4,Math.max(2,(5+Math.floor(Math.random()*3))-nt-nb));
    out.push({items:[...sh(TAQ.tacos).slice(0,nt),...sh(TAQ.complementos).slice(0,nc),...sh(TAQ.bebidas).slice(0,nb)]});
  }
  return out;
};

// ─── AI Categories ─────────────────────────────────────────────
const CATS=[
  {id:'twister', label:'Tongue Twister',              emoji:'👅',color:'#f97316'},
  {id:'acentos', label:'Aguda/Grave/Esdrújula',       emoji:'👏',color:'#eab308'},
  {id:'silabas', label:'How Many Syllables?',         emoji:'🔢',color:'#22c55e'},
  {id:'tilde',   label:'This or That',                emoji:'↔️',color:'#06b6d4'},
  {id:'anagrama',label:'Group Anagram',               emoji:'🔤',color:'#3b82f6'},
  {id:'vocab',   label:'Vocab Multiple Choice',       emoji:'📝',color:'#ec4899'},
  {id:'trivia',  label:'Trivia (Heist & Free for All)',emoji:'🏆',color:'#f43f5e'},
];

const buildPrompt=(activeIds,counts,ctx)=>{
  let p=`You are an expert Spanish language content creator for a game show.\n`;
  if(ctx.trim()) p+=`Theme/context: "${ctx.trim()}"\n`;
  p+=`Generate EXACTLY the following content. Return ONE valid JSON object with these keys:\n\n`;
  activeIds.forEach(id=>{
    const n=counts[id];
    if(id==='twister') p+=`"twister": array of ${n} Spanish tongue twisters. Format: [{"level":1|2|3,"text":"..."}]  (1=fácil,2=medio,3=difícil)\n`;
    if(id==='acentos') p+=`"acentos": array of ${n} Spanish words classified by stress. Format: [{"word":"...","type":"aguda"|"grave"|"esdrujula"}]  Mix all three types evenly.\n`;
    if(id==='silabas') p+=`"silabas": array of ${n} Spanish words with syllable count (2–5 syllables). Format: [{"word":"...","answer":int}]\n`;
    if(id==='tilde')   p+=`"tilde": array of ${n} fill-in-the-blank sentences. Use confusable Spanish pairs (si/sí, tu/tú, él/el, mas/más, hay/ahí/ay, por/para, ser/estar, etc.). Format: [{"sentence":"... [BLANK] ...","sentence_en":"English translation of the sentence (no blank, just translate the full sentence)","a":"opt1","b":"opt2","answer":"correct"}]\n`;
    if(id==='anagrama')p+=`"anagrama": array of ${n} Spanish vocab words. Format: [{"wordEs":"...","wordEn":"...","emoji":"...","hint":"short English hint 2-3 words"}]\n`;
    if(id==='vocab')   p+=`"vocab": array of ${n} Spanish-English vocabulary translation questions, 4 options each. Show question in both languages. Format: [{"q_es":"¿Qué significa ...?","q_en":"What does ... mean?","opts_es":["a","b","c","d"],"opts_en":["a","b","c","d"],"ans":0-3}]\n`;
    if(id==='trivia')  p+=`"trivia": array of ${n} bilingual trivia questions covering Mexican culture, Canadian culture, and general knowledge. Mix all three topics. Format: [{"q_es":"Pregunta en español","q_en":"Question in English","a_es":"Respuesta en español","a_en":"Answer in English"}]\n`;
  });
  p+=`\nOutput STRICT JSON only. No markdown. No explanations.`;
  return p;
};

function EdTaquero({orders,onChange}){
  const[swapping,setSwapping]=useState(null); // {oi,ii}
  const getCategory=item=>TAQ.tacos.includes(item)?'tacos':TAQ.bebidas.includes(item)?'bebidas':'complementos';
  const swapItem=(oi,ii,newItem)=>{
    const n=[...orders];
    n[oi]={items:n[oi].items.map((it,x)=>x===ii?newItem:it)};
    onChange(n);setSwapping(null);
  };
  return(
    <div className="space-y-2 pb-6" onClick={()=>setSwapping(null)}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex gap-3 text-xs font-bold flex-wrap">
          {Object.entries(TAQ_COLORS).map(([cat,color])=>(
            <span key={cat} className="px-2 py-0.5 rounded-full bg-zinc-800 font-bold" style={{color}}>{cat}</span>
          ))}
          <span className="text-zinc-600 text-[10px] font-semibold self-center">· click chip para sustituir</span>
        </div>
        <button onClick={e=>{e.stopPropagation();onChange(mkOrders(orders.length));}}
          className="btn bg-zinc-700 hover:bg-zinc-600 text-white px-3 py-1.5 rounded-xl text-xs font-black shrink-0">
          🔀 Regenerar todas
        </button>
      </div>
      {orders.map((ord,oi)=>(
        <div key={oi} className="bg-zinc-900 rounded-2xl p-3 border border-zinc-800">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-black text-zinc-500 uppercase tracking-wider">Orden {oi+1} · {ord.items.length} ítems</span>
            <button onClick={e=>{e.stopPropagation();const n=[...orders];n[oi]={items:mkOrders(1)[0].items};onChange(n);}}
              className="btn text-zinc-600 hover:text-amber-400 text-xs font-bold px-2 py-1 rounded-lg hover:bg-zinc-800">
              🔀 esta
            </button>
          </div>
          <div className="flex flex-wrap gap-1.5">
            {ord.items.map((item,ii)=>{
              const isSwapping=swapping?.oi===oi&&swapping?.ii===ii;
              const cat=getCategory(item);
              return(
                <div key={ii} className="relative">
                  <button onClick={e=>{e.stopPropagation();setSwapping(isSwapping?null:{oi,ii});}}
                    className={`text-xs font-bold px-2 py-0.5 rounded-full transition-all border bg-zinc-800 ${isSwapping?'ring-2 ring-white/70 border-white/40':'border-transparent hover:border-white/20'}`}
                    style={{color:itemColor(item)}}>
                    {item}
                  </button>
                  {isSwapping&&(
                    <div className="absolute z-50 top-7 left-0 bg-zinc-800 border border-zinc-600 rounded-xl shadow-2xl p-2 min-w-[170px] max-h-52 overflow-y-auto scroll"
                      onClick={e=>e.stopPropagation()}>
                      <div className="text-[10px] font-black text-zinc-400 uppercase mb-1.5 px-1">{cat}</div>
                      {TAQ[cat].filter(w=>w!==item).map(w=>(
                        <button key={w} onClick={()=>swapItem(oi,ii,w)}
                          className="w-full text-left text-xs font-bold px-2 py-1.5 rounded-lg hover:bg-zinc-700 transition-colors block"
                          style={{color:TAQ_COLORS[cat]}}>
                          {w}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function EdVocab({items,onChange}){
  const upd=(i,f,v)=>{const n=[...items];n[i]={...n[i],[f]:v};onChange(n);};
  const updOpt=(i,lang,oi,v)=>{
    const n=[...items];
    const key=lang==='es'?'opts_es':'opts_en';
    const arr=[...(n[i][key]||['','','',''])];
    arr[oi]=v;n[i]={...n[i],[key]:arr};onChange(n);
  };
  return(
    <div className="space-y-3 pb-6">
      {items.map((it,i)=>{
        const qEs=it.q_es||it.q||'';
        const qEn=it.q_en||'';
        const optsEs=it.opts_es||it.opts||['','','',''];
        const optsEn=it.opts_en||['','','',''];
        return(
          <div key={i} className="bg-zinc-900 rounded-2xl p-3 border border-zinc-800 space-y-2">
            <div className="grid grid-cols-2 gap-2">
              <div>
                <label className="text-[10px] font-black text-pink-400 uppercase">Pregunta ES</label>
                <input value={qEs} onChange={e=>upd(i,'q_es',e.target.value)}
                  placeholder="¿Qué significa...?"
                  className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-2 py-1.5 text-xs font-bold text-white outline-none focus:border-pink-500 mt-0.5"/>
              </div>
              <div>
                <label className="text-[10px] font-black text-sky-400 uppercase">Question EN</label>
                <input value={qEn} onChange={e=>upd(i,'q_en',e.target.value)}
                  placeholder="What does ... mean?"
                  className="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-2 py-1.5 text-xs font-bold text-sky-200 outline-none focus:border-sky-500 mt-0.5"/>
              </div>
            </div>
            <div className="text-[10px] font-black text-zinc-500 uppercase tracking-wider pt-0.5">Opciones — ES · EN</div>
            <div className="space-y-1.5">
              {[0,1,2,3].map(oi=>(
                <div key={oi} className={`flex items-center gap-2 p-2 rounded-xl border ${oi===it.ans?'bg-emerald-900/30 border-emerald-700':'bg-zinc-950 border-zinc-700'}`}>
                  <button onClick={()=>upd(i,'ans',oi)}
                    className={`shrink-0 w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${oi===it.ans?'bg-emerald-500 border-emerald-400':'border-zinc-600 hover:border-emerald-600'}`}>
                    {oi===it.ans&&<span className="w-2 h-2 bg-white rounded-full block"/>}

                  <span className="shrink-0 text-xs font-black text-zinc-500 w-4">{String.fromCharCode(65+oi)}</span>
                  <input value={optsEs[oi]||''} onChange={e=>updOpt(i,'es',oi,e.target.value)}

                  <span className="text-zinc-700 text-xs">·</span>

                    placeholder={`EN ${oi+1}`}
                    className="flex-1 text-xs font-bold bg-transparent border-b border-zinc-700 outline-none text-sky-200 pb-0.5 min-w-0"/>
                </div>

function ReviewScreen({content,title,setTitle,onSave,isSaving}){
  const allTabs=[
    {id:'taquero',label:'Taquero',emoji:'🌮',color:'#ef4444'},
    ...CATS.filter(c=>Array.isArray(content[c.id])&&content[c.id].length>0),
  ];
  const[tab,setTab]=useState(allTabs[0]?.id||'taquero');
  const[ec,setEc]=useState(content);
  const upd=(id,val)=>setEc(p=>({...p,[id]:val}));

  return(
    <div className="h-[100dvh] flex flex-col bg-zinc-950 text-white">
      {/* Header */}
      <div className="bg-black px-4 py-3 flex items-center gap-3 border-b border-zinc-800 shrink-0">
        <input value={title} onChange={e=>setTitle(e.target.value)}
          placeholder="Nombre del banco..."
          className="flex-1 min-w-0 bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2 text-sm font-bold text-white outline-none focus:border-lime-500"/>
        <button onClick={()=>window.location.reload()}
          className="btn bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-4 py-2 rounded-xl font-bold text-sm shrink-0">
          Cancelar
        </button>
        <button onClick={()=>onSave(ec)} disabled={isSaving||!title.trim()}
          className="btn bg-lime-600 hover:bg-lime-500 disabled:opacity-40 disabled:cursor-not-allowed text-white px-5 py-2 rounded-xl font-black text-sm flex items-center gap-2 shrink-0">
          {isSaving?<><span className="animate-spin">🌶️</span>Guardando...</>:<>💾 Guardar banco</>}
        </button>
      </div>

      {/* Tabs */}
      <div className="flex border-b border-zinc-800 overflow-x-auto scroll shrink-0">
        {allTabs.map(t=>{
          const count=t.id==='taquero'?(ec.taquero?.orders?.length||0):(ec[t.id]?.length||0);
          return(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`px-4 py-2.5 font-bold text-sm whitespace-nowrap border-b-2 transition-all ${tab===t.id?'text-white':'text-zinc-500 border-transparent hover:text-zinc-300'}`}
              style={{borderColor:tab===t.id?t.color:'transparent'}}>
              {t.emoji} {t.label} <span className="text-xs opacity-60 ml-0.5">({count})</span>
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div className="flex-1 overflow-y-auto scroll p-4">
        {tab==='taquero'&&<EdTaquero orders={ec.taquero?.orders||[]} onChange={v=>upd('taquero',{orders:v})}/>}
        {tab==='twister'&&<EdTwister items={ec.twister||[]} onChange={v=>upd('twister',v)}/>}
        {tab==='acentos'&&<EdAcentos items={ec.acentos||[]} onChange={v=>upd('acentos',v)}/>}
        {tab==='silabas'&&<EdSilabas items={ec.silabas||[]} onChange={v=>upd('silabas',v)}/>}
        {tab==='tilde'&&<EdTilde items={ec.tilde||[]} onChange={v=>upd('tilde',v)}/>}
        {tab==='anagrama'&&<EdAnagrama items={ec.anagrama||[]} onChange={v=>upd('anagrama',v)}/>}
        {tab==='vocab'&&<EdVocab items={ec.vocab||[]} onChange={v=>upd('vocab',v)}/>}
        {tab==='trivia'&&<EdTrivia items={ec.trivia||[]} onChange={v=>upd('trivia',v)}/>}
      </div>
    </div>
  );
}

// ─── Taxonomy Modal ───────────────────────────────────────────
function TaxModal({saveLevels,setSaveLevels,saveCats,setSaveCats,saveTopics,setSaveTopics,isSaving,onConfirm,onCancel}){
  const {NEW_LEVELS,NEW_CATS,MACRO_SKILLS,getAllTopicsForCategory}=window.PERIPLO_TAXONOMY_ES||{
    NEW_LEVELS:["ES1","ES2","ES3","ES4","ES5","ES-Mix1"],
    NEW_CATS:[{id:'otro',label:'Otro'}],MACRO_SKILLS:[],getAllTopicsForCategory:()=>[]
  };
  const tog=(arr,set,v)=>set(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);
  const valid=saveLevels.length>0&&saveCats.length>0;
  return(
    <div className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
      <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex justify-between items-center mb-6 shrink-0">
          <h2 className="text-xl font-black text-white flex items-center gap-2">🌶️ Clasificar Banco HGS — Español</h2>
          <button onClick={onCancel} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800">✕</button>
        </div>
        <div className="space-y-8 overflow-y-auto scroll pr-2 flex-1">
          <div>
            <label className="block text-xs font-black text-lime-400 uppercase tracking-widest mb-3">1. Nivel del estudiante <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span></label>
            <div className="flex flex-wrap gap-2">
              {NEW_LEVELS.map(lvl=>(
                <button key={lvl} onClick={()=>tog(saveLevels,setSaveLevels,lvl)}
                  className={`px-4 py-2 rounded-xl font-bold text-sm border-2 transition-all ${saveLevels.includes(lvl)?'bg-lime-600 border-lime-600 text-white shadow-md':'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-lime-500 hover:text-lime-300'}`}>
                  {lvl}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">2. Categoría Gramatical <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span></label>
            <div className="flex flex-wrap gap-2">
              {NEW_CATS.map(cat=>(
                <button key={cat.id} onClick={()=>tog(saveCats,setSaveCats,cat.id)}
                  className={`px-4 py-2 rounded-xl font-bold text-sm border-2 transition-all ${saveCats.includes(cat.id)?'bg-emerald-600 border-emerald-600 text-white shadow-md':'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                  {cat.label}
                </button>
              ))}
            </div>
          </div>
          {saveCats.length>0&&saveLevels.length>0&&(
            <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
              <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">3. Temas Específicos</label>
              {saveCats.map(catId=>{
                if(catId==='otro')return null;
                const catLabel=NEW_CATS.find(c=>c.id===catId)?.label||catId;
                const topics=getAllTopicsForCategory(catId,saveLevels);
                if(!topics.length)return null;
                return(
                  <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                    <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                    <div className="flex flex-wrap gap-2">
                      {topics.map(topic=>(
                        <button key={topic} onClick={()=>tog(saveTopics,setSaveTopics,topic)}
                          className={`px-3 py-1.5 rounded-lg font-bold text-xs border transition-all ${saveTopics.includes(topic)?'bg-zinc-200 border-zinc-200 text-zinc-900':'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>
                          {topic}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
              {saveCats.includes('otro')&&(
                <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                  <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades</h4>
                  <div className="flex flex-wrap gap-2">
                    {MACRO_SKILLS.map(skill=>(
                      <button key={skill} onClick={()=>tog(saveTopics,setSaveTopics,skill)}
                        className={`px-3 py-1.5 rounded-lg font-bold text-xs border transition-all ${saveTopics.includes(skill)?'bg-amber-500 border-amber-500 text-zinc-900':'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}>
                        {skill}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
        <button onClick={onConfirm} disabled={isSaving||!valid}
          className="btn w-full mt-6 bg-lime-600 hover:bg-lime-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black text-base flex items-center justify-center gap-2 shrink-0">
          {isSaving?<><span className="animate-spin inline-block">🌶️</span>Guardando...</>:<>💾 Confirmar y Guardar</>}
        </button>
        {!valid&&<p className="text-center text-xs text-zinc-600 mt-2">Selecciona al menos un nivel y una categoría</p>}
      </div>
    </div>
  );
}

// IA Assistant compartido (periplo-ai.js)
const AI = window.PERIPLO_AI;
const ApiKeyBar = AI.createApiKeyBar(React);

// ─── Main Dashboard ────────────────────────────────────────────
function Dashboard(){
  const[apiKey,setApiKey]=useState(AI.loadKey());
  const[models,setModels]=useState([]);
  const[selModel,setSelModel]=useState('');
  const[loadingModels,setLoadingModels]=useState(false);
  const[context,setContext]=useState('');
  const[taqCount,setTaqCount]=useState(12);
  const[enabled,setEnabled]=useState(Object.fromEntries(CATS.map(c=>[c.id,true])));
  const[counts,setCounts]=useState(Object.fromEntries(CATS.map(c=>[c.id,6])));
  const[isGenerating,setIsGenerating]=useState(false);
  const[content,setContent]=useState(null);
  const[title,setTitle]=useState('');
  const[isSaving,setIsSaving]=useState(false);
  const[editingId,setEditingId]=useState(null);
  const[showTaxModal,setShowTaxModal]=useState(false);
  const[pendingContent,setPendingContent]=useState(null);
  const[saveLevels,setSaveLevels]=useState([]);
  const[saveCats,setSaveCats]=useState([]);
  const[saveTopics,setSaveTopics]=useState([]);

  useEffect(()=>{
    const eid=urlParams.get('edit');
    if(!eid)return;
    (async()=>{
      try{
        const s=await getDoc(doc(db,QUIZZES_PATH,eid));
        if(s.exists()){
            const d=s.data();
            setContent(d.content);setTitle(d.title||'');setEditingId(eid);
            if(d.tags){setSaveLevels(d.tags.levels||[]);setSaveCats(d.tags.categories||[]);setSaveTopics(d.tags.topics||[]);}
          }
      }catch(e){alert(e.message);}
    })();
  },[]);

  const fetchModels=async()=>{
    if(!apiKey)return alert('Ingresa tu API Key');
    setLoadingModels(true);
    try{
      const v=await AI.fetchModels(apiKey);
      setModels(v);
      if(v.length)setSelModel(AI.pickPreferredModel(v));
    }catch(e){alert(e.message);}
    setLoadingModels(false);
  };

  const generate=async()=>{
    const activeCatIds=CATS.filter(c=>enabled[c.id]).map(c=>c.id);
    const taqOrders=mkOrders(taqCount);

    if(!activeCatIds.length){
      setContent({taquero:{orders:taqOrders}});
      return;
    }
    if(!selModel)return alert('Escanea los modelos primero (🔍)');

    setIsGenerating(true);
    try{
      const prompt=buildPrompt(activeCatIds,counts,context);
      const raw=await AI.callGemini({apiKey,model:selModel,prompt,json:true});
      const txt=(raw||'').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(txt);
      setContent({taquero:{orders:taqOrders},...parsed});
    }catch(e){alert('Error al generar: '+e.message);}
    setIsGenerating(false);
  };

  const handleSaveRequest=(finalContent)=>{
    if(!title.trim())return alert('Ponle nombre al banco.');
    setPendingContent(finalContent);
    setShowTaxModal(true);
  };

  const saveToFirebase=async(tags)=>{
    if(!pendingContent)return;
    setIsSaving(true);
    try{
      const fp=urlParams.get('folder');
      const pp=(fp&&fp!=='undefined'&&fp!=='null')?decodeURIComponent(fp):'';
      const payload={title,type:'HGS_BANK',content:pendingContent,tags,createdAt:serverTimestamp(),parentPath:pp};
      if(editingId){
        await updateDoc(doc(db,QUIZZES_PATH,editingId),{...payload,updatedAt:serverTimestamp()});
      }else{
        await addDoc(collection(db,QUIZZES_PATH),payload);
      }
      window.location.href=pp?`${BACK_URL}?folder=${encodeURIComponent(pp)}`:BACK_URL;
    }catch(e){alert(e.message);}
    setIsSaving(false);
  };

  if(content)return(
    <>
      {showTaxModal&&<TaxModal
        saveLevels={saveLevels} setSaveLevels={setSaveLevels}
        saveCats={saveCats} setSaveCats={setSaveCats}
        saveTopics={saveTopics} setSaveTopics={setSaveTopics}
        isSaving={isSaving}
        onConfirm={()=>saveToFirebase({levels:saveLevels,categories:saveCats,topics:saveTopics})}
        onCancel={()=>{setShowTaxModal(false);setPendingContent(null);}}
      />}
      <ReviewScreen
        content={content} title={title} setTitle={setTitle}
        onSave={handleSaveRequest} isSaving={isSaving}
      />
    </>
  );

  const activeCats=CATS.filter(c=>enabled[c.id]);
  const totalAI=activeCats.reduce((s,c)=>s+counts[c.id],0);

  return(
    <div className="h-[100dvh] flex flex-col text-white bg-zinc-950">

      {/* Header */}
      <div className="bg-black px-4 py-3 flex items-center justify-between gap-3 border-b border-zinc-800 shrink-0">
        <div className="flex items-center gap-2 min-w-0">
          <button onClick={()=>window.location.href=BACK_URL}
            className="btn p-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl shrink-0">←</button>
          <span className="text-lg shrink-0">🌶️</span>
          <span className="font-black text-white truncate">HGS Bank Builder</span>
        </div>
        <ApiKeyBar
          variant="compact"
          accentBtn="bg-lime-700 hover:bg-lime-600 text-white"
          placeholder="API Key..."
          apiKey={apiKey} setApiKey={setApiKey}
          models={models} selectedModel={selModel} setSelectedModel={setSelModel}
          isLoading={loadingModels} onFetch={fetchModels}
          onClear={()=>setModels([])}
        />
      </div>

      {/* Body */}
      <div className="flex flex-1 overflow-hidden flex-col md:flex-row">

        {/* LEFT — Category configurator */}
        <div className="w-full md:w-[42%] border-b md:border-b-0 md:border-r border-zinc-800 flex flex-col overflow-y-auto scroll p-4 gap-3 bg-zinc-950">

          {/* Taquero card — always active */}
          <div className="rounded-2xl p-4 border-2 border-red-800/60 bg-red-950/10">
            <div className="flex items-start justify-between gap-2 mb-3">
              <div className="flex items-center gap-2">
                <span className="text-2xl">🌮</span>
                <div>
                  <div className="font-black text-white text-sm leading-tight">El Taquero Sordo</div>
                  <div className="text-[10px] text-zinc-500 mt-0.5">Lotería Taco House Co. · 49 palabras</div>
                </div>
              </div>
              <span className="text-[10px] font-black px-2 py-1 rounded-full bg-red-900/50 text-red-300 whitespace-nowrap shrink-0">siempre activo</span>
            </div>
            <div className="space-y-2">
              <div className="flex items-center justify-between">
                <span className="text-xs text-zinc-400 font-bold">Órdenes a generar:</span>
                <span className="font-black text-red-400 text-xl leading-none">{taqCount}</span>
              </div>
              <input type="range" min={8} max={20} value={taqCount}
                onChange={e=>setTaqCount(parseInt(e.target.value))}
                className="w-full accent-red-500"/>
              <div className="text-[10px] text-zinc-600 font-bold mt-1">
                Las mismas {taqCount} órdenes, barajeadas diferente para cada equipo
              </div>
            </div>
          </div>

          {/* AI Category cards */}
          <div className="text-[10px] text-zinc-500 uppercase tracking-widest font-black px-1">Categorías IA — clic para activar/desactivar</div>
          {CATS.map(cat=>(
            <div key={cat.id}
              onClick={()=>setEnabled(p=>({...p,[cat.id]:!p[cat.id]}))}
              className="rounded-2xl p-3.5 border-2 cursor-pointer transition-all select-none"
              style={{
                borderColor:enabled[cat.id]?cat.color+'88':'#27272a',
                background:enabled[cat.id]?cat.color+'0f':'',
                opacity:enabled[cat.id]?1:.55,
              }}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-xl">{cat.emoji}</span>
                  <span className="font-black text-sm text-white">{cat.label}</span>
                </div>
                <div className="w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all"
                  style={{borderColor:enabled[cat.id]?cat.color:'#52525b',background:enabled[cat.id]?cat.color:''}}>
                  {enabled[cat.id]&&<span className="text-white text-[10px] font-black leading-none">✓</span>}
                </div>
              </div>
              {enabled[cat.id]&&(
                <div className="mt-2.5 flex items-center gap-3" onClick={e=>e.stopPropagation()}>
                  <span className="text-xs text-zinc-500 font-bold shrink-0">Cantidad:</span>
                  <input type="range" min={3} max={30} value={counts[cat.id]}
                    onChange={e=>setCounts(p=>({...p,[cat.id]:parseInt(e.target.value)}))}
                    className="flex-1" style={{accentColor:cat.color}}/>
                  <span className="font-black text-sm w-5 text-right shrink-0" style={{color:cat.color}}>{counts[cat.id]}</span>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* RIGHT — Context + summary + vocab preview + generate */}
        <div className="w-full md:w-[58%] flex flex-col bg-zinc-900 relative overflow-hidden">
          <div className="flex-1 overflow-y-auto scroll p-4 space-y-5 pb-28">

            {/* Context */}
            <div>
              <label className="text-xs font-black text-blue-400 uppercase tracking-widest block mb-2">
                🎨 Tema / Contexto del taller (opcional)
              </label>
              <textarea value={context} onChange={e=>setContext(e.target.value)}
                placeholder={'Ej: "Día de Muertos"  ·  "vocabulario de películas de terror"  ·  "jerga mexicana"  ·  "comida de la calle"'}
                className="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-3 text-sm outline-none focus:border-blue-500 resize-none text-white placeholder-zinc-600"
                rows={3}/>
            </div>

            {/* Summary */}
            <div className="bg-zinc-950 rounded-2xl p-4 border border-zinc-800">
              <div className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Este banco incluirá:</div>
              <div className="space-y-2">
                <div className="flex items-center justify-between py-1.5 border-b border-zinc-800">
                  <span className="text-sm font-bold text-white">🌮 El Taquero Sordo</span>
                  <span className="font-black text-red-400">{taqCount} órdenes</span>
                </div>
                {activeCats.map(cat=>(
                  <div key={cat.id} className="flex items-center justify-between py-1.5 border-b border-zinc-800/50">
                    <span className="text-sm font-bold text-white">{cat.emoji} {cat.label}</span>
                    <span className="font-black text-sm" style={{color:cat.color}}>{counts[cat.id]} ítems</span>
                  </div>
                ))}
                {activeCats.length===0&&(
                  <div className="text-zinc-600 text-sm text-center py-2 italic">Activa categorías IA a la izquierda</div>
                )}
                {totalAI>0&&(
                  <div className="flex justify-between pt-1.5">
                    <span className="text-xs text-zinc-500 font-bold">Total ítems IA:</span>
                    <span className="text-xs font-black text-white">{totalAI}</span>
                  </div>
                )}
              </div>
            </div>

            {/* Taquero vocab preview */}
            <div>
              <div className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">
                Vista previa vocabulario Taquero
              </div>
              <div className="space-y-3">
                {Object.entries(TAQ).map(([cat,words])=>(
                  <div key={cat}>
                    <div className="text-[10px] font-black uppercase tracking-wider mb-1.5" style={{color:TAQ_COLORS[cat]}}>
                      {cat==='tacos'?'🌮':cat==='complementos'?'🥗':'🥤'} {cat} ({words.length})
                    </div>
                    <div className="flex flex-wrap gap-1">
                      {words.map(w=>(
                        <span key={w} className="text-[10px] px-2 py-0.5 rounded-full bg-zinc-800 font-bold" style={{color:TAQ_COLORS[cat]}}>
                          {w}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* GENERATE button — floating */}
          <div className="absolute bottom-5 left-4 right-4 z-20">
            <button onClick={generate} disabled={isGenerating}
              className="btn w-full bg-white text-zinc-900 py-4 rounded-2xl font-black text-base md:text-lg disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-3 shadow-2xl hover:bg-lime-400 transition-colors">
              {isGenerating
                ?<><span className="text-xl animate-spin inline-block">🌶️</span>Generando banco...</>
                :<><span className="text-xl">⚡</span>GENERAR BANCO ({taqCount} órdenes{totalAI>0?` + ${totalAI} ítems IA`:''})</>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening - Karaoke Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo para la frase o palabra que se está diciendo en el momento */
        .karaoke-active {
            color: #2563eb; /* Azul brillante */
            font-weight: bold;
            transform: scale(1.05);
            transition: all 0.2s ease-in-out;
        }
        /* Estilo para el texto que aún no se dice o ya pasó */
        .karaoke-inactive {
            color: #9ca3af; /* Gris claro */
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-lg p-8">
        
        <div class="relative w-full overflow-hidden rounded-lg bg-black mb-6 shadow-inner" style="padding-top: 56.25%;">
            <div id="youtube-player" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
        </div>

        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <button id="btn-play" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 font-semibold shadow-md transition transform hover:-translate-y-0.5">▶ Play</button>
            <button id="btn-pause" class="bg-gray-200 text-gray-800 px-6 py-2 rounded-full hover:bg-gray-300 font-semibold transition">⏸ Pausa</button>
            <button id="btn-stop" class="bg-red-100 text-red-600 px-6 py-2 rounded-full hover:bg-red-200 font-semibold transition">⏹ Parar</button>
            <button id="btn-forward" class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-full hover:bg-indigo-200 font-semibold transition">⏩ +5 Seg</button>
        </div>

        <div class="bg-gray-100 p-8 rounded-xl border border-gray-200 text-center text-3xl leading-relaxed shadow-inner min-h-[150px] flex items-center justify-center">
            <p id="subtitles-container" class="flex flex-wrap justify-center gap-2">
                </p>
        </div>

    </div>

    <script>
        // 1. Aquí colocas el Transcript con sus tiempos exactos de inicio (start) y fin (end) en segundos.
        const transcriptData = [
            { start: 0.0, end: 2.5, text: "Welcome to" },
            { start: 2.6, end: 4.5, text: "our new English class." },
            { start: 4.6, end: 7.0, text: "Listen carefully" },
            { start: 7.1, end: 10.0, text: "to the pronunciation." }
        ];

        // 2. Cargar la API de YouTube de forma asíncrona
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;

        // 3. Esta función la llama YouTube automáticamente cuando su API está lista
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                videoId: 'M7lc1UVf-VE', // <--- CAMBIA ESTO POR EL ID DE TU VIDEO
                playerVars: {
                    'controls': 0,      // Oculta los controles nativos de YouTube
                    'disablekb': 1,     // Deshabilita el teclado nativo de YT
                    'rel': 0,           // Evita videos relacionados al final
                    'modestbranding': 1 // Quita el logo de YT lo más posible
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        // 4. Configurar controles y subtítulos una vez que el video cargó
        function onPlayerReady(event) {
            // Asignar funciones a nuestros botones
            document.getElementById('btn-play').addEventListener('click', () => player.playVideo());
            document.getElementById('btn-pause').addEventListener('click', () => player.pauseVideo());
            
            document.getElementById('btn-stop').addEventListener('click', () => {
                player.pauseVideo();
                player.seekTo(0); // Regresa al inicio
            });
            
            document.getElementById('btn-forward').addEventListener('click', () => {
                let currentTime = player.getCurrentTime();
                player.seekTo(currentTime + 5); // Adelanta 5 segundos
            });

            // Dibujar los subtítulos en pantalla
            renderSubtitles();

            // Iniciar el "reloj" que revisa el tiempo cada 100 milisegundos para sincronizar el karaoke
            setInterval(syncKaraoke, 100);
        }

        // 5. Función para crear las etiquetas HTML de los subtítulos
        function renderSubtitles() {
            const container = document.getElementById('subtitles-container');
            container.innerHTML = '';
            
            transcriptData.forEach((item, index) => {
                const span = document.createElement('span');
                span.id = 'sub-' + index;
                span.className = 'karaoke-inactive cursor-pointer hover:text-blue-400';
                span.innerText = item.text;
                
                // Extra: Si el alumno hace clic en una frase, el video salta a esa parte
                span.addEventListener('click', () => {
                    player.seekTo(item.start);
                    player.playVideo();
                });

                container.appendChild(span);
            });
        }

        // 6. Función mágica que cambia el color si el tiempo del video coincide con la frase
        function syncKaraoke() {
            if (!player || !player.getCurrentTime) return; // Si el player no está listo, no hace nada
            
            const currentTime = player.getCurrentTime();
            
            transcriptData.forEach((item, index) => {
                const span = document.getElementById('sub-' + index);
                if (!span) return;
                
                // Si el tiempo actual del video está entre el inicio y fin de esta frase:
                if (currentTime >= item.start && currentTime <= item.end) {
                    span.classList.remove('karaoke-inactive');
                    span.classList.add('karaoke-active');
                } else {
                    span.classList.remove('karaoke-active');
                    span.classList.add('karaoke-inactive');
                }
            });
        }
    </script>
</body>
</html>

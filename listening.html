<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        /* ── Range slider ── */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #fff; cursor: pointer; margin-top: -5px; position: relative; z-index: 40;
            box-shadow: 0 0 8px rgba(255,255,255,0.4); transition: transform 0.15s ease;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.4); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: transparent; border-radius: 2px; }
        input[type=range]:focus { outline: none; }

        /* ── Subtitle overlay transition ── */
        .sub-overlay { transition: opacity 0.3s ease, transform 0.3s ease; }
        .sub-overlay-active { opacity: 1; transform: translateY(0); }
        .sub-overlay-fading { opacity: 0.45; transform: translateY(0); }
        .sub-overlay-hidden { opacity: 0; transform: translateY(6px); pointer-events: none; }

        /* ── Panel animations ── */
        .panel-enter { animation: panelIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Mode pill ── */
        .mode-pill { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* ── Quiz hover (desktop only) ── */
        @media (hover: hover) {
            .quiz-opt:hover:not(:disabled) { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
        }

        /* ── iOS Safari ── */
        button, a, [role="button"] { touch-action: manipulation; }

        /* ── Vocab shimmer ── */
        .vocab-shimmer {
            background: linear-gradient(135deg, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0.02) 50%, rgba(16,185,129,0.08) 100%);
            background-size: 200% 200%; animation: shimmer 3s ease infinite;
        }
        @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        /* ── Scrollbar ── */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

        /* ── Speed badge ── */
        .speed-badge { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-zinc-950 text-slate-100 min-h-[100dvh] relative overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Play, Pause, SkipBack, SkipForward, ExternalLink, Subtitles, EyeOff, BrainCircuit, HelpCircle, CheckCircle2, XCircle, Sparkles, Gauge, Eye, ChevronDown, ChevronUp, ArrowLeft } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const formatTime = (secs) => {
            if (!secs || isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        const ListeningApp = () => {
            const [taller, setTaller] = useState(null);
            const [parsedSubs, setParsedSubs] = useState([]);
            const [vocabulary, setVocabulary] = useState([]);
            const [questions, setQuestions] = useState([]);

            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [showSpeedMenu, setShowSpeedMenu] = useState(false);

            // Subs toggle — independent of side panel
            const [subsVisible, setSubsVisible] = useState(true);

            // Side panel mode: 'vocab' | 'questions' | 'none'
            const [sideMode, setSideMode] = useState('none');

            // NEW: Panel Interactive States
            const [expandedVocab, setExpandedVocab] = useState(-1);
            const [focusedQuestion, setFocusedQuestion] = useState(-1);

            // Quiz tracking
            const [answeredQuestions, setAnsweredQuestions] = useState({});
            const [optionsVisible, setOptionsVisible] = useState(false);

            // Vocab tracking
            const [seenVocab, setSeenVocab] = useState(new Set());

            const playerRef = useRef(null);
            const playerReady = useRef(false);
            const speedMenuRef = useRef(null);
            const lastSubIdx = useRef(-1);

            /* ── STICKY SUBTITLE with grace period ── */
            const SUBTITLE_GRACE = 1.2;

            const getSubtitleState = useCallback(() => {
                if (parsedSubs.length === 0) return { activeIdx: -1, displayIdx: -1 };
                let activeIdx = parsedSubs.findIndex(sub => currentTime >= sub.start && currentTime < sub.end);
                if (activeIdx !== -1) {
                    lastSubIdx.current = activeIdx;
                    return { activeIdx, displayIdx: activeIdx };
                }
                const lastIdx = lastSubIdx.current;
                if (lastIdx >= 0 && lastIdx < parsedSubs.length) {
                    const lastSub = parsedSubs[lastIdx];
                    if (currentTime >= lastSub.end && currentTime < lastSub.end + SUBTITLE_GRACE) {
                        return { activeIdx: -1, displayIdx: lastIdx };
                    }
                }
                const nextIdx = parsedSubs.findIndex(sub => sub.start > currentTime);
                if (nextIdx > 0) { lastSubIdx.current = nextIdx - 1; return { activeIdx: -1, displayIdx: nextIdx - 1 }; }
                if (nextIdx === -1 && parsedSubs.length > 0) { const l = parsedSubs.length - 1; lastSubIdx.current = l; return { activeIdx: -1, displayIdx: l }; }
                return { activeIdx: -1, displayIdx: 0 };
            }, [currentTime, parsedSubs]);

            const { activeIdx: activeSubIndex, displayIdx: displaySubIndex } = getSubtitleState();

            /* ── Firebase ── */
            useEffect(() => {
                const fetchTaller = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) return;
                    try {
                        const docSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTaller(data);
                            setParsedSubs(data.parsedTranscript || []);
                            setVocabulary(data.vocabulary || []);
                            setQuestions(data.questions || []);
                            loadYouTubeScript(data.videoId);
                        }
                    } catch (e) { console.error("Fetch error:", e); }
                };
                fetchTaller();
            }, []);

            /* ── YouTube ── */
            const loadYouTubeScript = (vidId) => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    window.onYouTubeIframeAPIReady = () => initPlayer(vidId);
                    document.body.appendChild(tag);
                } else { initPlayer(vidId); }
            };

            const initPlayer = (vidId) => {
                playerRef.current = new window.YT.Player('yt-player-container', {
                    videoId: vidId,
                    playerVars: { controls: 0, disablekb: 1, rel: 0, modestbranding: 1, playsinline: 1, iv_load_policy: 3 },
                    events: {
                        onReady: (e) => { setDuration(e.target.getDuration()); playerReady.current = true; },
                        onStateChange: (e) => {
                            setIsPlaying(e.data === 1 || e.data === 3);
                            if (duration === 0 && e.target.getDuration) setDuration(e.target.getDuration());
                        }
                    }
                });
            };

            useEffect(() => {
                const interval = setInterval(() => {
                    if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function')
                        setCurrentTime(playerRef.current.getCurrentTime());
                }, 80);
                return () => clearInterval(interval);
            }, []);

            /* ── Controls ── */
            const togglePlayPause = useCallback(() => {
                if (!playerRef.current || !playerReady.current) return;
                const st = playerRef.current.getPlayerState();
                if (st === 1 || st === 3) { playerRef.current.pauseVideo(); setIsPlaying(false); }
                else { playerRef.current.playVideo(); setIsPlaying(true); }
            }, []);

            const seekTo = useCallback((time) => {
                if (playerRef.current && typeof playerRef.current.seekTo === 'function') {
                    playerRef.current.seekTo(time, true);
                    lastSubIdx.current = -1;
                }
            }, []);

            const jumpSeconds = useCallback((s) => {
                if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                    seekTo(Math.max(0, playerRef.current.getCurrentTime() + s));
                    playerRef.current.playVideo();
                }
            }, [seekTo]);

            const handleSeek = useCallback((e) => { const t = parseFloat(e.target.value); setCurrentTime(t); seekTo(t); }, [seekTo]);

            const changeSpeed = useCallback((rate) => {
                setPlaybackRate(rate); setShowSpeedMenu(false);
                if (playerRef.current?.setPlaybackRate) playerRef.current.setPlaybackRate(rate);
            }, []);

            useEffect(() => {
                const handler = (e) => { if (speedMenuRef.current && !speedMenuRef.current.contains(e.target)) setShowSpeedMenu(false); };
                if (showSpeedMenu) document.addEventListener('pointerdown', handler);
                return () => document.removeEventListener('pointerdown', handler);
            }, [showSpeedMenu]);

            /* ── Active detections for tracking progress ── */
            const activeVocab = useMemo(() => vocabulary.find(v => currentTime >= v.startSeconds && currentTime <= v.endSeconds), [currentTime, vocabulary]);
            
            useEffect(() => {
                if (activeVocab && !seenVocab.has(activeVocab.word))
                    setSeenVocab(prev => new Set([...prev, activeVocab.word]));
            }, [activeVocab]);

            /* ── Timeline markers ── */
            const timelineMarkers = useMemo(() => {
                if (duration <= 0) return [];
                if (sideMode === 'vocab') return vocabulary.map(v => ({
                    left: (v.startSeconds / duration) * 100,
                    width: ((v.endSeconds - v.startSeconds) / duration) * 100,
                    active: currentTime >= v.startSeconds && currentTime <= v.endSeconds,
                    color: 'emerald'
                }));
                if (sideMode === 'questions') return questions.map(q => ({
                    left: (q.startSeconds / duration) * 100,
                    width: ((q.endSeconds - q.startSeconds) / duration) * 100,
                    active: currentTime >= q.startSeconds && currentTime <= q.endSeconds,
                    color: 'indigo'
                }));
                return [];
            }, [sideMode, vocabulary, questions, currentTime, duration]);

            /* ── Quiz ── */
            const handleAnswer = useCallback((qIdx, ansIdx) => {
                if (answeredQuestions[qIdx] !== undefined) return;
                setAnsweredQuestions(prev => ({ ...prev, [qIdx]: ansIdx }));
            }, [answeredQuestions]);

            const quizScore = useMemo(() => {
                let correct = 0;
                Object.entries(answeredQuestions).forEach(([qIdx, ansIdx]) => {
                    if (questions[qIdx] && questions[qIdx].correctIndex === ansIdx) correct++;
                });
                return { answered: Object.keys(answeredQuestions).length, correct, total: questions.length };
            }, [answeredQuestions, questions]);

            /* ── Subtitle overlay class ── */
            const subOverlayClass = !subsVisible ? 'sub-overlay-hidden'
                : activeSubIndex >= 0 ? 'sub-overlay-active'
                : displaySubIndex >= 0 ? 'sub-overlay-fading'
                : 'sub-overlay-hidden';

            const hasSidePanel = sideMode === 'vocab' || sideMode === 'questions';

            /* ══════════════ RENDER ══════════════ */

            if (!taller) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center gap-4">
                    <div className="w-12 h-12 border-4 border-zinc-700 border-t-white rounded-full animate-spin"/>
                    <p className="font-black text-zinc-500 tracking-widest uppercase text-sm">Cargando...</p>
                </div>
            );

            return (
                <div className="relative min-h-[100dvh]">
                    {/* ── Blurred BG ── */}
                    {taller.thumbnailUrl && (
                        <div className="fixed inset-0 z-0 bg-cover bg-center opacity-20 blur-[80px] scale-110 saturate-150"
                            style={{ backgroundImage: `url(${taller.thumbnailUrl})` }}/>
                    )}
                    <div className="fixed inset-0 z-0 bg-gradient-to-b from-zinc-950/70 via-zinc-950/90 to-zinc-950"/>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 md:px-6 pt-5 pb-16">

                        {/* ── HEADER ── */}
                        <header className="mb-4">
                            <div className="flex items-start justify-between gap-4">
                                <div className="min-w-0">
                                    {taller.channelName && (
                                        <p className="text-rose-400 font-extrabold uppercase tracking-[0.2em] text-[10px] mb-1 flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-rose-400 rounded-full inline-block"/>
                                            {taller.channelName}
                                        </p>
                                    )}
                                    <h1 className="text-lg md:text-2xl font-black text-white leading-tight line-clamp-2">{taller.title}</h1>
                                </div>
                                <a href={`https://www.youtube.com/watch?v=${taller.videoId}`} target="_blank" rel="noopener noreferrer"
                                    className="shrink-0 bg-white/8 hover:bg-white/12 backdrop-blur text-zinc-300 hover:text-white font-bold px-3 py-2 rounded-xl transition text-xs border border-white/8 flex items-center gap-1.5">
                                    <ExternalLink size={14}/> YouTube
                                </a>
                            </div>
                        </header>

                        {/* ══════════════════════════════════════════
                            MAIN LAYOUT: side-by-side on lg, stacked on mobile
                        ══════════════════════════════════════════ */}
                        <div className={`flex flex-col ${hasSidePanel ? 'lg:flex-row' : ''} gap-4`}>

                            {/* ── LEFT COLUMN: Video + Controls + Mode Tabs ── */}
                            <div className={`${hasSidePanel ? 'lg:flex-1 lg:min-w-0' : 'w-full max-w-5xl mx-auto'} transition-all duration-300`}>

                                {/* Player card */}
                                <div className="rounded-2xl overflow-hidden bg-black/60 backdrop-blur-xl border border-white/8 shadow-2xl shadow-black/40">

                                    {/* Video */}
                                    <div className="w-full relative aspect-video bg-black">
                                        <div className="absolute inset-0 w-full h-full pointer-events-none">
                                            <div id="yt-player-container" className="w-full h-full"></div>
                                        </div>
                                        <div onClick={togglePlayPause} className="absolute inset-0 z-10 cursor-pointer"/>

                                        {/* ── SUBTITLE OVERLAY — only source of subs, controlled by CC toggle ── */}
                                        {displaySubIndex >= 0 && parsedSubs[displaySubIndex] && (
                                            <div className={`sub-overlay absolute bottom-3 md:bottom-5 left-0 right-0 z-20 flex justify-center pointer-events-none px-3 ${subOverlayClass}`}>
                                                <p className="bg-black/75 backdrop-blur-sm text-white text-sm md:text-lg font-semibold px-4 py-2 md:px-6 md:py-2.5 rounded-xl max-w-[95%] text-center leading-snug shadow-lg">
                                                    {parsedSubs[displaySubIndex].text}
                                                </p>
                                            </div>
                                        )}
                                    </div>

                                    {/* ── Transport controls ── */}
                                    <div className="px-3 md:px-4 pt-2.5 pb-3">
                                        {/* Timeline */}
                                        <div className="flex items-center gap-2.5 mb-2.5">
                                            <span className="text-[10px] font-mono text-zinc-500 w-8 text-right tabular-nums">{formatTime(currentTime)}</span>
                                            <div className="relative w-full flex items-center h-5">
                                                <div className="absolute left-0 right-0 h-1 bg-white/10 rounded-full"/>
                                                <div className="absolute left-0 h-1 bg-white/40 rounded-full" style={{ width: duration > 0 ? `${(currentTime/duration)*100}%` : '0%' }}/>
                                                {timelineMarkers.map((m, i) => (
                                                    <React.Fragment key={i}>
                                                        {m.active && (
                                                            <div className={`absolute h-1.5 rounded-full z-10 ${m.color === 'emerald' ? 'bg-emerald-400/80 shadow-[0_0_6px_rgba(52,211,153,0.6)]' : 'bg-indigo-400/80 shadow-[0_0_6px_rgba(129,140,248,0.6)]'}`}
                                                                style={{ left: `${m.left}%`, width: `${m.width}%` }}/>
                                                        )}
                                                        <div className={`absolute w-1.5 h-1.5 rounded-full z-20 transition-all ${m.active ? (m.color === 'emerald' ? 'bg-emerald-300 scale-150' : 'bg-indigo-300 scale-150') : (m.color === 'emerald' ? 'bg-emerald-500/60' : 'bg-indigo-500/60')}`}
                                                            style={{ left: `${m.left}%`, top: '50%', transform: `translateY(-50%) ${m.active ? 'scale(1.5)' : 'scale(1)'}` }}/>
                                                    </React.Fragment>
                                                ))}
                                                <input type="range" min="0" max={duration || 100} step="0.1" value={currentTime} onChange={handleSeek}
                                                    className="absolute inset-0 w-full h-full z-30 m-0 cursor-pointer"/>
                                            </div>
                                            <span className="text-[10px] font-mono text-zinc-500 w-8 tabular-nums">{formatTime(duration)}</span>
                                        </div>

                                        {/* Controls row */}
                                        <div className="flex items-center justify-between">
                                            {/* Left: speed */}
                                            <div className="relative" ref={speedMenuRef}>
                                                <button onClick={() => setShowSpeedMenu(!showSpeedMenu)}
                                                    className="speed-badge text-[11px] font-extrabold text-zinc-400 hover:text-white bg-white/5 hover:bg-white/10 px-2 py-1.5 rounded-lg transition flex items-center gap-1">
                                                    <Gauge size={12}/> {playbackRate}x
                                                </button>
                                                {showSpeedMenu && (
                                                    <div className="absolute bottom-full mb-2 left-0 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl p-1.5 flex flex-col gap-0.5 z-50 min-w-[80px]">
                                                        {[0.5, 0.75, 1, 1.25, 1.5].map(rate => (
                                                            <button key={rate} onClick={() => changeSpeed(rate)}
                                                                className={`text-xs font-bold px-3 py-1.5 rounded-lg text-left transition ${playbackRate === rate ? 'bg-white/15 text-white' : 'text-zinc-400 hover:text-white hover:bg-white/5'}`}>
                                                                {rate}x
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Center: playback */}
                                            <div className="flex items-center gap-4">
                                                <button onClick={() => jumpSeconds(-5)} className="text-zinc-500 hover:text-white transition active:scale-90">
                                                    <SkipBack size={18} fill="currentColor"/>
                                                </button>
                                                <button onClick={togglePlayPause}
                                                    className="bg-white text-zinc-950 hover:scale-105 w-11 h-11 rounded-full flex items-center justify-center shadow-lg shadow-white/10 transition-transform active:scale-95">
                                                    {isPlaying ? <Pause fill="currentColor" size={18}/> : <Play fill="currentColor" size={18} className="ml-0.5"/>}
                                                </button>
                                                <button onClick={() => jumpSeconds(5)} className="text-zinc-500 hover:text-white transition active:scale-90">
                                                    <SkipForward size={18} fill="currentColor"/>
                                                </button>
                                            </div>

                                            {/* Right: CC toggle */}
                                            <button onClick={() => setSubsVisible(!subsVisible)}
                                                className={`text-[11px] font-extrabold px-2.5 py-1.5 rounded-lg transition flex items-center gap-1 ${subsVisible ? 'text-amber-400 bg-amber-400/10 hover:bg-amber-400/20' : 'text-zinc-500 bg-white/5 hover:bg-white/10'}`}
                                                title={subsVisible ? 'Ocultar subtítulos' : 'Mostrar subtítulos'}>
                                                {subsVisible ? <Subtitles size={14}/> : <EyeOff size={14}/>}
                                                <span className="hidden sm:inline">CC</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* ── MODE TABS (below video card) ── */}
                                <div className="flex items-center justify-center gap-2 mt-3">
                                    {[
                                        { id: 'vocab', icon: BrainCircuit, label: 'Vocab', color: 'emerald', count: vocabulary.length, progress: seenVocab.size },
                                        { id: 'questions', icon: HelpCircle, label: 'Quiz', color: 'indigo', count: questions.length, progress: quizScore.answered },
                                    ].map(tab => {
                                        const isActive = sideMode === tab.id;
                                        const colorMap = {
                                            emerald: 'text-emerald-400 bg-emerald-400/15 border-emerald-400/30',
                                            indigo: 'text-indigo-400 bg-indigo-400/15 border-indigo-400/30'
                                        };
                                        const inactiveStyle = 'text-zinc-500 bg-white/5 border-transparent hover:bg-white/8 hover:text-zinc-300';
                                        const Icon = tab.icon;
                                        return (
                                            <button key={tab.id}
                                                onClick={() => setSideMode(sideMode === tab.id ? 'none' : tab.id)}
                                                className={`mode-pill relative flex items-center gap-1.5 px-4 py-2.5 rounded-xl text-xs font-extrabold border transition-all ${isActive ? colorMap[tab.color] : inactiveStyle}`}>
                                                <Icon size={15}/>
                                                {tab.label}
                                                <span className={`ml-0.5 text-[10px] font-black ${isActive ? '' : 'text-zinc-600'}`}>
                                                    {tab.progress || 0}/{tab.count}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* ── RIGHT COLUMN: Side Panel (vocab or quiz) ── */}
                            {hasSidePanel && (
                                <div className="lg:w-[380px] xl:w-[420px] lg:shrink-0 flex flex-col">

                                    {/* ════ VOCAB PANEL (List View) ════ */}
                                    {sideMode === 'vocab' && (
                                        <div className="panel-enter rounded-2xl border border-emerald-500/15 bg-emerald-950/10 backdrop-blur-md flex-1 flex flex-col px-5 py-6 min-h-[400px] max-h-[600px] lg:max-h-[calc(100vh-150px)]">
                                            <div className="flex items-center gap-2 mb-4 shrink-0">
                                                <BrainCircuit className="text-emerald-400" size={20} />
                                                <h3 className="text-white font-black text-lg">Vocabulario</h3>
                                            </div>
                                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-2.5 pb-2">
                                                {vocabulary.length > 0 ? vocabulary.map((v, idx) => (
                                                    <div key={idx} className="bg-black/40 border border-emerald-500/20 rounded-xl overflow-hidden transition-all">
                                                        <button
                                                            onClick={() => setExpandedVocab(expandedVocab === idx ? -1 : idx)}
                                                            className="w-full px-4 py-3.5 flex justify-between items-center hover:bg-white/5 transition-colors text-left"
                                                        >
                                                            <span className="font-bold text-emerald-100 text-sm">{v.word}</span>
                                                            {expandedVocab === idx ? <ChevronUp size={16} className="text-emerald-400 shrink-0"/> : <ChevronDown size={16} className="text-emerald-600 shrink-0"/>}
                                                        </button>
                                                        {expandedVocab === idx && (
                                                            <div className="px-4 pb-4 pt-1 border-t border-emerald-500/20 bg-emerald-500/5">
                                                                <div className="inline-flex items-center gap-1 bg-emerald-500/15 text-emerald-400 px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider mb-2 mt-2">
                                                                    <Sparkles size={10}/> {v.type || "Término"}
                                                                </div>
                                                                <p className="text-sm text-emerald-100/80 italic leading-relaxed">{v.definition}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )) : (
                                                    <p className="text-emerald-500/50 text-sm text-center mt-10">No hay vocabulario disponible.</p>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* ════ QUIZ PANEL (List & Focus View) ════ */}
                                    {sideMode === 'questions' && (
                                        <div className="panel-enter rounded-2xl border border-indigo-500/15 bg-indigo-950/20 backdrop-blur-md flex-1 flex flex-col px-5 py-6 min-h-[400px] max-h-[600px] lg:max-h-[calc(100vh-150px)]">
                                            
                                            {focusedQuestion !== -1 ? (
                                                /* -- FOCUSED QUESTION VIEW -- */
                                                <div className="w-full flex flex-col h-full">
                                                    <button onClick={() => setFocusedQuestion(-1)} className="self-start flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300 text-xs font-bold mb-4 bg-indigo-500/10 hover:bg-indigo-500/20 px-3 py-1.5 rounded-lg transition-colors shrink-0">
                                                        <ArrowLeft size={14} /> Volver a la lista
                                                    </button>

                                                    <div className="flex-1 w-full overflow-y-auto custom-scrollbar pr-1 flex flex-col items-center justify-center">
                                                        {(() => {
                                                            const qIdx = focusedQuestion;
                                                            const qData = questions[qIdx];
                                                            return (
                                                                <div className="w-full">
                                                                    <div className="inline-flex items-center justify-center gap-1.5 bg-indigo-500/15 text-indigo-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.15em] mb-3 border border-indigo-500/20 mx-auto table">
                                                                        <HelpCircle size={12} className="inline"/> Pregunta {qIdx + 1}
                                                                    </div>
                                                                    <h2 className="text-lg lg:text-xl font-black text-white mb-5 text-center leading-snug">{qData.q}</h2>

                                                                    {!optionsVisible && answeredQuestions[qIdx] === undefined ? (
                                                                        <div className="flex justify-center">
                                                                            <button onClick={() => setOptionsVisible(true)}
                                                                                className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg transition-transform active:scale-95 flex items-center gap-2 text-sm">
                                                                                <Eye size={16}/> Mostrar Opciones
                                                                            </button>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="flex flex-col gap-2.5 w-full pb-4">
                                                                            {qData.options.map((opt, idx) => {
                                                                                const selected = answeredQuestions[qIdx];
                                                                                const isSelected = selected === idx;
                                                                                const isCorrect = qData.correctIndex === idx;
                                                                                const showResult = selected !== undefined;
                                                                                let style = "quiz-opt bg-white/5 border-white/10 text-white";
                                                                                if (showResult) {
                                                                                    if (isCorrect) style = "bg-emerald-500/15 border-emerald-500/60 text-emerald-300 ring-1 ring-emerald-500/40";
                                                                                    else if (isSelected && !isCorrect) style = "bg-rose-500/15 border-rose-500/60 text-rose-300";
                                                                                    else style = "bg-black/20 border-transparent text-zinc-600";
                                                                                }
                                                                                return (
                                                                                    <button key={idx} onClick={() => handleAnswer(qIdx, idx)} disabled={showResult}
                                                                                        className={`p-3 rounded-xl border text-left font-semibold transition-all duration-200 flex justify-between items-center gap-2 text-sm ${style}`}>
                                                                                        <span>{opt}</span>
                                                                                        {showResult && isCorrect && <CheckCircle2 size={16} className="text-emerald-400 shrink-0"/>}
                                                                                        {showResult && isSelected && !isCorrect && <XCircle size={16} className="text-rose-400 shrink-0"/>}
                                                                                    </button>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )
                                                        })()}
                                                    </div>
                                                </div>
                                            ) : (
                                                /* -- LIST OF QUESTIONS VIEW -- */
                                                <div className="flex flex-col h-full w-full">
                                                    <div className="flex items-center justify-between mb-4 shrink-0">
                                                        <div className="flex items-center gap-2">
                                                            <HelpCircle className="text-indigo-400" size={20} />
                                                            <h3 className="text-white font-black text-lg">Preguntas</h3>
                                                        </div>
                                                        <div className="text-xs font-bold text-indigo-300/70">
                                                            {quizScore.answered}/{questions.length} Respondidas
                                                        </div>
                                                    </div>

                                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-2.5 pb-2">
                                                        {questions.length > 0 ? questions.map((q, idx) => {
                                                            // Se ilumina si estamos a 5 segundos de empezar, hasta que termina su rango de tiempo
                                                            const isApproachingOrActive = currentTime >= (q.startSeconds - 5) && currentTime <= q.endSeconds;
                                                            const isAnswered = answeredQuestions[idx] !== undefined;
                                                            const isCorrect = isAnswered && answeredQuestions[idx] === q.correctIndex;

                                                            let borderStyle = "border-white/10";
                                                            let bgStyle = "bg-black/40 hover:bg-white/5";
                                                            let textStyle = "text-white/90";
                                                            let shadowStyle = "";

                                                            if (isApproachingOrActive && !isAnswered) {
                                                                // Animación de pulso e iluminación índigo
                                                                borderStyle = "border-indigo-400";
                                                                bgStyle = "bg-indigo-500/20";
                                                                shadowStyle = "shadow-[0_0_15px_rgba(99,102,241,0.3)] scale-[1.02] z-10";
                                                            } else if (isAnswered) {
                                                                // Estilos si ya la respondió
                                                                borderStyle = isCorrect ? "border-emerald-500/30" : "border-rose-500/30";
                                                                bgStyle = "bg-black/60";
                                                                textStyle = "text-white/50";
                                                            }

                                                            return (
                                                                <button
                                                                    key={idx}
                                                                    onClick={() => {
                                                                        setFocusedQuestion(idx);
                                                                        setOptionsVisible(false); // Resetea la vista de opciones al entrar
                                                                    }}
                                                                    className={`w-full text-left p-3.5 rounded-xl border transition-all duration-300 flex flex-col gap-2 ${borderStyle} ${bgStyle} ${textStyle} ${shadowStyle}`}
                                                                >
                                                                    <div className="flex justify-between items-start gap-2">
                                                                        <span className="font-bold text-sm leading-snug">{q.q}</span>
                                                                        {isAnswered && (
                                                                            <span className="shrink-0 mt-0.5">
                                                                                {isCorrect ? <CheckCircle2 size={16} className="text-emerald-500" /> : <XCircle size={16} className="text-rose-500" />}
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-[10px] font-mono text-indigo-300/60 bg-indigo-500/10 px-1.5 py-0.5 rounded">
                                                                            {formatTime(q.startSeconds)}
                                                                        </span>
                                                                        {isApproachingOrActive && !isAnswered && (
                                                                            <span className="text-[10px] font-bold text-indigo-300 animate-pulse flex items-center gap-1">
                                                                                <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full"></div> En turno
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                </button>
                                                            );
                                                        }) : (
                                                            <p className="text-indigo-500/50 text-sm text-center mt-10">No hay preguntas disponibles.</p>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ListeningApp />);
    </script>
</body>
</html>

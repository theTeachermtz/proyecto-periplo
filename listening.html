<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        /* ── Custom range slider ── */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #fff; cursor: pointer; margin-top: -5px; position: relative; z-index: 40;
            box-shadow: 0 0 8px rgba(255,255,255,0.4);
            transition: transform 0.15s ease;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.4); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: transparent; border-radius: 2px; }
        input[type=range]:focus { outline: none; }

        /* ── Smooth subtitle transitions ── */
        .sub-line { transition: opacity 0.35s ease, transform 0.35s ease, filter 0.35s ease; }
        .sub-active { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        .sub-prev { opacity: 0.35; transform: translateY(0) scale(0.88); filter: blur(0.5px); cursor: pointer; }
        .sub-next { opacity: 0.25; transform: translateY(0) scale(0.85); filter: blur(0.5px); cursor: pointer; }
        .sub-exit { opacity: 0; transform: translateY(-8px) scale(0.9); }

        /* ── Karaoke word pop ── */
        .kara-word {
            display: inline-block; margin: 0 3px;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        /* ── Mode pill animations ── */
        .mode-pill { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .mode-pill-active { box-shadow: 0 0 20px rgba(255,255,255,0.1); }

        /* ── Panel slide ── */
        .panel-enter { animation: panelIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Quiz option hover (desktop only) ── */
        @media (hover: hover) {
            .quiz-opt:hover:not(:disabled) { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
            .sub-prev:hover { opacity: 0.55; }
            .sub-next:hover { opacity: 0.45; }
        }

        /* ── iOS Safari hover trap fix ── */
        button, a, [role="button"] { touch-action: manipulation; }

        /* ── Progress ring ── */
        .progress-ring-circle {
            transition: stroke-dashoffset 0.4s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* ── Vocab card shimmer ── */
        .vocab-shimmer {
            background: linear-gradient(135deg, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0.02) 50%, rgba(16,185,129,0.08) 100%);
            background-size: 200% 200%;
            animation: shimmer 3s ease infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ── Scrollbar ── */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        /* ── Playback speed badge ── */
        .speed-badge { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-zinc-950 text-slate-100 min-h-[100dvh] relative overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Play, Pause, SkipBack, SkipForward, ExternalLink, Subtitles, EyeOff, BrainCircuit, HelpCircle, CheckCircle2, XCircle, Sparkles, ChevronDown, Gauge, RotateCcw, Eye } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const formatTime = (secs) => {
            if (!secs || isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        /* ── Tiny progress ring SVG ── */
        const ProgressRing = ({ current, total, size = 28, stroke = 2.5, color = "#818cf8" }) => {
            const radius = (size - stroke) / 2;
            const circumference = radius * 2 * Math.PI;
            const progress = total > 0 ? current / total : 0;
            const offset = circumference - progress * circumference;
            return (
                <svg width={size} height={size} className="absolute -top-1 -right-1">
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke}/>
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={stroke}
                        strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
                        className="progress-ring-circle"/>
                </svg>
            );
        };

        /* ══════════════════════════════════════════
           MAIN APP
        ══════════════════════════════════════════ */
        const ListeningApp = () => {
            const [taller, setTaller] = useState(null);
            const [parsedSubs, setParsedSubs] = useState([]);
            const [vocabulary, setVocabulary] = useState([]);
            const [questions, setQuestions] = useState([]);

            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [showSpeedMenu, setShowSpeedMenu] = useState(false);

            const [displayMode, setDisplayMode] = useState('karaoke');

            // Quiz tracking
            const [answeredQuestions, setAnsweredQuestions] = useState({});  // { qIndex: selectedIdx }
            const [currentActiveQIndex, setCurrentActiveQIndex] = useState(-1);
            const [optionsVisible, setOptionsVisible] = useState(false);

            // Vocab tracking
            const [seenVocab, setSeenVocab] = useState(new Set());

            const playerRef = useRef(null);
            const playerReady = useRef(false);
            const speedMenuRef = useRef(null);
            const lastSubIdx = useRef(-1);

            /* ── STICKY SUBTITLE: keeps the last active sub visible with a grace period ── */
            const SUBTITLE_GRACE = 1.2; // seconds after sub.end before it fades

            const getSubtitleState = useCallback(() => {
                if (parsedSubs.length === 0) return { activeIdx: -1, displayIdx: -1 };

                // Find the sub whose time range covers currentTime
                let activeIdx = parsedSubs.findIndex(sub => currentTime >= sub.start && currentTime < sub.end);

                if (activeIdx !== -1) {
                    lastSubIdx.current = activeIdx;
                    return { activeIdx, displayIdx: activeIdx };
                }

                // We're in a gap — check if we're within grace period of the last known sub
                const lastIdx = lastSubIdx.current;
                if (lastIdx >= 0 && lastIdx < parsedSubs.length) {
                    const lastSub = parsedSubs[lastIdx];
                    if (currentTime >= lastSub.end && currentTime < lastSub.end + SUBTITLE_GRACE) {
                        return { activeIdx: -1, displayIdx: lastIdx }; // still show it, fading
                    }
                }

                // Past grace: find the nearest upcoming or most recent sub
                const nextIdx = parsedSubs.findIndex(sub => sub.start > currentTime);
                if (nextIdx > 0) {
                    lastSubIdx.current = nextIdx - 1;
                    return { activeIdx: -1, displayIdx: nextIdx - 1 };
                }
                if (nextIdx === -1 && parsedSubs.length > 0) {
                    // Past all subs
                    const last = parsedSubs.length - 1;
                    lastSubIdx.current = last;
                    return { activeIdx: -1, displayIdx: last };
                }

                return { activeIdx: -1, displayIdx: 0 };
            }, [currentTime, parsedSubs]);

            const { activeIdx: activeSubIndex, displayIdx: displaySubIndex } = getSubtitleState();

            /* ── Firebase fetch ── */
            useEffect(() => {
                const fetchTaller = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) return;
                    try {
                        const docSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTaller(data);
                            setParsedSubs(data.parsedTranscript || []);
                            setVocabulary(data.vocabulary || []);
                            setQuestions(data.questions || []);
                            loadYouTubeScript(data.videoId);
                        }
                    } catch (e) { console.error("Fetch error:", e); }
                };
                fetchTaller();
            }, []);

            /* ── YouTube player ── */
            const loadYouTubeScript = (vidId) => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    window.onYouTubeIframeAPIReady = () => initPlayer(vidId);
                    document.body.appendChild(tag);
                } else {
                    initPlayer(vidId);
                }
            };

            const initPlayer = (vidId) => {
                playerRef.current = new window.YT.Player('yt-player-container', {
                    videoId: vidId,
                    playerVars: { controls: 0, disablekb: 1, rel: 0, modestbranding: 1, playsinline: 1, iv_load_policy: 3 },
                    events: {
                        onReady: (event) => {
                            setDuration(event.target.getDuration());
                            playerReady.current = true;
                        },
                        onStateChange: (event) => {
                            setIsPlaying(event.data === 1 || event.data === 3);
                            if (duration === 0 && event.target.getDuration) setDuration(event.target.getDuration());
                        }
                    }
                });
            };

            useEffect(() => {
                const interval = setInterval(() => {
                    if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                        setCurrentTime(playerRef.current.getCurrentTime());
                    }
                }, 80); // slightly faster polling for smoother subs
                return () => clearInterval(interval);
            }, []);

            /* ── Playback controls ── */
            const togglePlayPause = useCallback(() => {
                if (!playerRef.current || !playerReady.current) return;
                const state = playerRef.current.getPlayerState();
                if (state === 1 || state === 3) {
                    playerRef.current.pauseVideo();
                    setIsPlaying(false);
                } else {
                    playerRef.current.playVideo();
                    setIsPlaying(true);
                }
            }, []);

            const seekTo = useCallback((time) => {
                if (playerRef.current && typeof playerRef.current.seekTo === 'function') {
                    playerRef.current.seekTo(time, true);
                    // Reset lastSubIdx so sticky logic recalculates cleanly
                    lastSubIdx.current = -1;
                }
            }, []);

            const jumpSeconds = useCallback((seconds) => {
                if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                    const newTime = Math.max(0, playerRef.current.getCurrentTime() + seconds);
                    seekTo(newTime);
                    playerRef.current.playVideo();
                }
            }, [seekTo]);

            const handleSeek = useCallback((e) => {
                const newTime = parseFloat(e.target.value);
                setCurrentTime(newTime);
                seekTo(newTime);
            }, [seekTo]);

            const changeSpeed = useCallback((rate) => {
                setPlaybackRate(rate);
                setShowSpeedMenu(false);
                if (playerRef.current && typeof playerRef.current.setPlaybackRate === 'function') {
                    playerRef.current.setPlaybackRate(rate);
                }
            }, []);

            /* ── Click outside speed menu ── */
            useEffect(() => {
                const handler = (e) => {
                    if (speedMenuRef.current && !speedMenuRef.current.contains(e.target)) setShowSpeedMenu(false);
                };
                if (showSpeedMenu) document.addEventListener('pointerdown', handler);
                return () => document.removeEventListener('pointerdown', handler);
            }, [showSpeedMenu]);

            /* ── Active vocab / question detection ── */
            const activeVocab = useMemo(() => vocabulary.find(v => currentTime >= v.startSeconds && currentTime <= v.endSeconds), [currentTime, vocabulary]);
            const activeQuestionIndex = useMemo(() => questions.findIndex(q => currentTime >= q.startSeconds && currentTime <= q.endSeconds), [currentTime, questions]);
            const activeQuestion = activeQuestionIndex !== -1 ? questions[activeQuestionIndex] : null;

            // Track seen vocab
            useEffect(() => {
                if (activeVocab && !seenVocab.has(activeVocab.word)) {
                    setSeenVocab(prev => new Set([...prev, activeVocab.word]));
                }
            }, [activeVocab]);

            // Reset quiz state when question changes
            useEffect(() => {
                if (activeQuestionIndex !== currentActiveQIndex) {
                    setOptionsVisible(false);
                    setCurrentActiveQIndex(activeQuestionIndex);
                }
            }, [activeQuestionIndex, currentActiveQIndex]);

            /* ── Computed: progress bar markers ── */
            const timelineMarkers = useMemo(() => {
                if (duration <= 0) return [];
                if (displayMode === 'vocab') return vocabulary.map((v, i) => ({
                    left: (v.startSeconds / duration) * 100,
                    width: ((v.endSeconds - v.startSeconds) / duration) * 100,
                    active: currentTime >= v.startSeconds && currentTime <= v.endSeconds,
                    color: 'emerald'
                }));
                if (displayMode === 'questions') return questions.map((q, i) => ({
                    left: (q.startSeconds / duration) * 100,
                    width: ((q.endSeconds - q.startSeconds) / duration) * 100,
                    active: currentTime >= q.startSeconds && currentTime <= q.endSeconds,
                    color: 'indigo'
                }));
                return [];
            }, [displayMode, vocabulary, questions, currentTime, duration]);

            /* ── Quiz answer handler ── */
            const handleAnswer = useCallback((qIdx, ansIdx) => {
                if (answeredQuestions[qIdx] !== undefined) return;
                setAnsweredQuestions(prev => ({ ...prev, [qIdx]: ansIdx }));
            }, [answeredQuestions]);

            const quizScore = useMemo(() => {
                let correct = 0;
                Object.entries(answeredQuestions).forEach(([qIdx, ansIdx]) => {
                    if (questions[qIdx] && questions[qIdx].correctIndex === ansIdx) correct++;
                });
                return { answered: Object.keys(answeredQuestions).length, correct, total: questions.length };
            }, [answeredQuestions, questions]);

            /* ── Seek to sub on click ── */
            const seekToSub = useCallback((idx) => {
                if (parsedSubs[idx]) {
                    seekTo(parsedSubs[idx].start);
                    playerRef.current?.playVideo();
                }
            }, [parsedSubs, seekTo]);

            /* ══════════════════════════════════════
               RENDER
            ══════════════════════════════════════ */

            if (!taller) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center gap-4">
                    <div className="w-12 h-12 border-4 border-zinc-700 border-t-white rounded-full animate-spin"></div>
                    <p className="font-black text-zinc-500 tracking-widest uppercase text-sm">Cargando...</p>
                </div>
            );

            return (
                <div className="relative min-h-[100dvh]">
                    {/* ── Blurred BG ── */}
                    {taller.thumbnailUrl && (
                        <div className="fixed inset-0 z-0 bg-cover bg-center opacity-20 blur-[80px] scale-110 saturate-150"
                            style={{ backgroundImage: `url(${taller.thumbnailUrl})` }}/>
                    )}
                    <div className="fixed inset-0 z-0 bg-gradient-to-b from-zinc-950/70 via-zinc-950/90 to-zinc-950"/>

                    <div className="relative z-10 max-w-5xl mx-auto px-4 md:px-8 pt-6 pb-20">

                        {/* ── HEADER ── */}
                        <header className="mb-5">
                            <div className="flex items-start justify-between gap-4">
                                <div className="min-w-0">
                                    {taller.channelName && (
                                        <p className="text-rose-400 font-extrabold uppercase tracking-[0.2em] text-[10px] mb-1.5 flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-rose-400 rounded-full inline-block"/>
                                            {taller.channelName}
                                        </p>
                                    )}
                                    <h1 className="text-xl md:text-3xl font-black text-white leading-tight line-clamp-2">{taller.title}</h1>
                                </div>
                                <a href={`https://www.youtube.com/watch?v=${taller.videoId}`} target="_blank" rel="noopener noreferrer"
                                    className="shrink-0 bg-white/8 hover:bg-white/12 backdrop-blur text-zinc-300 hover:text-white font-bold px-3 py-2 rounded-xl transition text-xs border border-white/8 flex items-center gap-1.5">
                                    <ExternalLink size={14}/> YouTube
                                </a>
                            </div>
                        </header>

                        {/* ── VIDEO PLAYER CARD ── */}
                        <div className="rounded-2xl overflow-hidden bg-black/60 backdrop-blur-xl border border-white/8 shadow-2xl shadow-black/40 mb-4">

                            {/* Video embed */}
                            <div className="w-full relative aspect-video bg-black">
                                <div className="absolute inset-0 w-full h-full pointer-events-none">
                                    <div id="yt-player-container" className="w-full h-full"></div>
                                </div>
                                <div onClick={togglePlayPause} className="absolute inset-0 z-10 cursor-pointer"/>

                                {/* Inline subtitle overlay — always visible as a small caption when NOT in karaoke mode */}
                                {displayMode !== 'karaoke' && displaySubIndex >= 0 && parsedSubs[displaySubIndex] && (
                                    <div className="absolute bottom-4 left-0 right-0 z-20 flex justify-center pointer-events-none px-4">
                                        <p className={`bg-black/70 backdrop-blur-sm text-white text-sm md:text-base font-semibold px-4 py-2 rounded-xl max-w-[90%] text-center transition-opacity duration-300 ${activeSubIndex >= 0 ? 'opacity-90' : 'opacity-40'}`}>
                                            {parsedSubs[displaySubIndex].text}
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* ── Transport controls ── */}
                            <div className="px-4 pt-3 pb-4">
                                {/* Timeline */}
                                <div className="flex items-center gap-3 mb-3">
                                    <span className="text-[10px] font-mono text-zinc-500 w-9 text-right tabular-nums">{formatTime(currentTime)}</span>
                                    <div className="relative w-full flex items-center h-5">
                                        {/* Track bg */}
                                        <div className="absolute left-0 right-0 h-1 bg-white/10 rounded-full"/>
                                        {/* Played portion */}
                                        <div className="absolute left-0 h-1 bg-white/40 rounded-full" style={{ width: duration > 0 ? `${(currentTime/duration)*100}%` : '0%' }}/>

                                        {/* Markers */}
                                        {timelineMarkers.map((m, i) => (
                                            <React.Fragment key={i}>
                                                {m.active && (
                                                    <div className={`absolute h-1.5 rounded-full z-10 ${m.color === 'emerald' ? 'bg-emerald-400/80 shadow-[0_0_6px_rgba(52,211,153,0.6)]' : 'bg-indigo-400/80 shadow-[0_0_6px_rgba(129,140,248,0.6)]'}`}
                                                        style={{ left: `${m.left}%`, width: `${m.width}%` }}/>
                                                )}
                                                <div className={`absolute w-1.5 h-1.5 rounded-full z-20 transition-all ${m.active ? (m.color === 'emerald' ? 'bg-emerald-300 scale-150' : 'bg-indigo-300 scale-150') : (m.color === 'emerald' ? 'bg-emerald-500/60' : 'bg-indigo-500/60')}`}
                                                    style={{ left: `${m.left}%`, top: '50%', transform: `translateY(-50%) ${m.active ? 'scale(1.5)' : 'scale(1)'}` }}/>
                                            </React.Fragment>
                                        ))}

                                        <input type="range" min="0" max={duration || 100} step="0.1" value={currentTime} onChange={handleSeek}
                                            className="absolute inset-0 w-full h-full z-30 m-0 cursor-pointer"/>
                                    </div>
                                    <span className="text-[10px] font-mono text-zinc-500 w-9 tabular-nums">{formatTime(duration)}</span>
                                </div>

                                {/* Buttons row */}
                                <div className="flex items-center justify-between">
                                    {/* Left: speed control */}
                                    <div className="relative" ref={speedMenuRef}>
                                        <button onClick={() => setShowSpeedMenu(!showSpeedMenu)}
                                            className="speed-badge text-[11px] font-extrabold text-zinc-400 hover:text-white bg-white/5 hover:bg-white/10 px-2.5 py-1.5 rounded-lg transition flex items-center gap-1">
                                            <Gauge size={13}/> {playbackRate}x
                                        </button>
                                        {showSpeedMenu && (
                                            <div className="absolute bottom-full mb-2 left-0 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl p-1.5 flex flex-col gap-0.5 z-50 min-w-[80px]">
                                                {[0.5, 0.75, 1, 1.25, 1.5].map(rate => (
                                                    <button key={rate} onClick={() => changeSpeed(rate)}
                                                        className={`text-xs font-bold px-3 py-1.5 rounded-lg text-left transition ${playbackRate === rate ? 'bg-white/15 text-white' : 'text-zinc-400 hover:text-white hover:bg-white/5'}`}>
                                                        {rate}x {rate === 1 && <span className="text-zinc-600 ml-1">normal</span>}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Center: playback */}
                                    <div className="flex items-center gap-5">
                                        <button onClick={() => jumpSeconds(-5)} className="text-zinc-500 hover:text-white transition active:scale-90">
                                            <SkipBack size={20} fill="currentColor"/>
                                        </button>
                                        <button onClick={togglePlayPause}
                                            className="bg-white text-zinc-950 hover:scale-105 w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-white/10 transition-transform active:scale-95">
                                            {isPlaying ? <Pause fill="currentColor" size={20}/> : <Play fill="currentColor" size={20} className="ml-0.5"/>}
                                        </button>
                                        <button onClick={() => jumpSeconds(5)} className="text-zinc-500 hover:text-white transition active:scale-90">
                                            <SkipForward size={20} fill="currentColor"/>
                                        </button>
                                    </div>

                                    {/* Right: spacer for symmetry */}
                                    <div className="w-[72px]"/>
                                </div>
                            </div>
                        </div>

                        {/* ── MODE TABS ── */}
                        <div className="flex items-center justify-center gap-2 mb-4">
                            {[
                                { id: 'karaoke', icon: Subtitles, label: 'Subs', color: 'amber', count: null },
                                { id: 'vocab', icon: BrainCircuit, label: 'Vocab', color: 'emerald', count: vocabulary.length, progress: seenVocab.size },
                                { id: 'questions', icon: HelpCircle, label: 'Quiz', color: 'indigo', count: questions.length, progress: quizScore.answered },
                            ].map(tab => {
                                const isActive = displayMode === tab.id;
                                const colorMap = { amber: 'text-amber-400 bg-amber-400/15 border-amber-400/30', emerald: 'text-emerald-400 bg-emerald-400/15 border-emerald-400/30', indigo: 'text-indigo-400 bg-indigo-400/15 border-indigo-400/30' };
                                const inactiveStyle = 'text-zinc-500 bg-white/5 border-transparent hover:bg-white/8 hover:text-zinc-300';
                                const Icon = tab.icon;

                                return (
                                    <button key={tab.id}
                                        onClick={() => setDisplayMode(displayMode === tab.id ? 'none' : tab.id)}
                                        className={`mode-pill relative flex items-center gap-1.5 px-4 py-2.5 rounded-xl text-xs font-extrabold border transition-all ${isActive ? `${colorMap[tab.color]} mode-pill-active` : inactiveStyle}`}>
                                        <Icon size={15}/>
                                        <span className="hidden sm:inline">{tab.label}</span>
                                        {tab.count !== null && (
                                            <span className={`ml-0.5 text-[10px] font-black ${isActive ? '' : 'text-zinc-600'}`}>
                                                {tab.progress || 0}/{tab.count}
                                            </span>
                                        )}
                                    </button>
                                );
                            })}
                        </div>

                        {/* ── CONTENT PANELS ── */}
                        <div className="min-h-[200px]">

                            {/* ▸ KARAOKE MODE */}
                            {displayMode === 'karaoke' && (
                                <div className="panel-enter bg-black/30 backdrop-blur-md rounded-2xl border border-white/5 flex flex-col items-center justify-center text-center px-6 md:px-16 py-10 min-h-[200px] gap-3">
                                    {/* Previous line */}
                                    {displaySubIndex > 0 && (
                                        <p onClick={() => seekToSub(displaySubIndex - 1)}
                                            className="sub-line sub-prev text-zinc-400 text-sm md:text-base font-medium max-w-2xl">
                                            {parsedSubs[displaySubIndex - 1].text}
                                        </p>
                                    )}

                                    {/* Active line */}
                                    {parsedSubs.length > 0 && displaySubIndex >= 0 ? (
                                        <p className={`sub-line text-2xl md:text-4xl font-black text-white leading-snug max-w-3xl transition-opacity duration-300 ${activeSubIndex >= 0 ? 'sub-active' : 'opacity-50'}`}>
                                            {parsedSubs[displaySubIndex].text.split(' ').map((word, i) => (
                                                <span key={i} className="kara-word text-amber-300 hover:text-white">{word}</span>
                                            ))}
                                        </p>
                                    ) : (
                                        <p className="text-lg text-zinc-600 italic">Sin subtítulos disponibles</p>
                                    )}

                                    {/* Next line */}
                                    {displaySubIndex >= 0 && displaySubIndex < parsedSubs.length - 1 && (
                                        <p onClick={() => seekToSub(displaySubIndex + 1)}
                                            className="sub-line sub-next text-zinc-500 text-sm md:text-base font-medium max-w-2xl">
                                            {parsedSubs[displaySubIndex + 1].text}
                                        </p>
                                    )}
                                </div>
                            )}

                            {/* ▸ VOCAB MODE */}
                            {displayMode === 'vocab' && (
                                <div className="panel-enter rounded-2xl border border-emerald-500/15 min-h-[200px] flex items-center justify-center px-6 md:px-16 py-10 vocab-shimmer">
                                    {activeVocab ? (
                                        <div className="text-center max-w-xl">
                                            <div className="inline-flex items-center gap-1.5 bg-emerald-500/15 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.15em] mb-4 border border-emerald-500/20">
                                                <Sparkles size={12}/> {activeVocab.type || "Key Phrase"}
                                            </div>
                                            <h2 className="text-3xl md:text-5xl font-black text-white mb-3">"{activeVocab.word}"</h2>
                                            <p className="text-lg text-emerald-100/70 italic font-medium leading-relaxed">{activeVocab.definition}</p>
                                        </div>
                                    ) : (
                                        <div className="text-center text-emerald-500/40 flex flex-col items-center gap-3">
                                            <BrainCircuit size={40} strokeWidth={1.5}/>
                                            <p className="text-sm font-bold uppercase tracking-[0.15em]">Esperando vocabulario...</p>
                                            <p className="text-xs text-emerald-600/40">Sigue los marcadores verdes en la línea de tiempo</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ▸ QUIZ MODE */}
                            {displayMode === 'questions' && (
                                <div className="panel-enter rounded-2xl border border-indigo-500/15 bg-indigo-950/20 backdrop-blur-md min-h-[200px] flex items-center justify-center px-6 md:px-12 py-8">
                                    {activeQuestion ? (
                                        <div className="w-full flex flex-col items-center max-w-3xl">
                                            <div className="inline-flex items-center gap-1.5 bg-indigo-500/15 text-indigo-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.15em] mb-4 border border-indigo-500/20">
                                                <HelpCircle size={12}/> Pregunta {activeQuestionIndex + 1} de {questions.length}
                                            </div>

                                            <h2 className="text-xl md:text-2xl font-black text-white mb-6 text-center leading-snug">{activeQuestion.q}</h2>

                                            {!optionsVisible && answeredQuestions[activeQuestionIndex] === undefined ? (
                                                <button onClick={() => setOptionsVisible(true)}
                                                    className="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                                                    <Eye size={18}/> Mostrar Opciones
                                                </button>
                                            ) : (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                                                    {activeQuestion.options.map((opt, idx) => {
                                                        const selected = answeredQuestions[activeQuestionIndex];
                                                        const isSelected = selected === idx;
                                                        const isCorrect = activeQuestion.correctIndex === idx;
                                                        const showResult = selected !== undefined;

                                                        let style = "quiz-opt bg-white/5 border-white/10 text-white";
                                                        if (showResult) {
                                                            if (isCorrect) style = "bg-emerald-500/15 border-emerald-500/60 text-emerald-300 ring-1 ring-emerald-500/40";
                                                            else if (isSelected && !isCorrect) style = "bg-rose-500/15 border-rose-500/60 text-rose-300";
                                                            else style = "bg-black/20 border-transparent text-zinc-600";
                                                        }

                                                        return (
                                                            <button key={idx}
                                                                onClick={() => handleAnswer(activeQuestionIndex, idx)}
                                                                disabled={showResult}
                                                                className={`p-4 rounded-xl border text-left font-semibold transition-all duration-200 flex justify-between items-center gap-2 ${style}`}>
                                                                <span className="text-sm">{opt}</span>
                                                                {showResult && isCorrect && <CheckCircle2 size={18} className="text-emerald-400 shrink-0"/>}
                                                                {showResult && isSelected && !isCorrect && <XCircle size={18} className="text-rose-400 shrink-0"/>}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="text-center text-indigo-500/40 flex flex-col items-center gap-3">
                                            <HelpCircle size={40} strokeWidth={1.5}/>
                                            <p className="text-sm font-bold uppercase tracking-[0.15em]">Esperando pregunta...</p>
                                            <p className="text-xs text-indigo-600/40">Sigue los marcadores morados en la línea de tiempo</p>
                                            {quizScore.answered > 0 && (
                                                <div className="mt-4 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-5 py-3">
                                                    <p className="text-indigo-300 font-bold text-sm">
                                                        {quizScore.correct}/{quizScore.answered} correctas
                                                        {quizScore.answered === quizScore.total && (
                                                            <span className="ml-2">
                                                                {quizScore.correct === quizScore.total ? '🎯 Perfecto!' : quizScore.correct >= quizScore.total * 0.7 ? '💪 Bien hecho!' : '📚 Sigue practicando'}
                                                            </span>
                                                        )}
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ▸ HIDDEN MODE — nothing displayed */}
                            {displayMode === 'none' && (
                                <div className="panel-enter rounded-2xl border border-white/5 bg-black/20 backdrop-blur min-h-[200px] flex items-center justify-center">
                                    <div className="text-center text-zinc-700 flex flex-col items-center gap-2">
                                        <EyeOff size={32} strokeWidth={1.5}/>
                                        <p className="text-xs font-bold uppercase tracking-widest">Modo enfocado — solo audio</p>
                                    </div>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ListeningApp />);
    </script>
</body>
</html>

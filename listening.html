<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad de Listening - Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-3xl mx-auto px-4 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">Listening Exercise</h1>
            <p class="text-gray-500">Mira el video con atención y responde las preguntas.</p>
        </header>

        <main class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            
            <div class="bg-blue-50 rounded-xl p-6 mb-8 border border-blue-100">
                <h2 class="text-lg font-semibold text-blue-800 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"></path>
                    </svg>
                    Video de la Actividad
                </h2>
                
                <div class="relative w-full overflow-hidden rounded-lg shadow-md" style="padding-top: 56.25%;">
                    <iframe class="absolute top-0 left-0 w-full h-full" 
                            src="https://www.youtube.com/embed/TU_ID_DEL_VIDEO" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                    </iframe>
                </div>
            </div>

            <form id="listening-quiz">
                <div class="space-y-8">
                    
                    <div>
                        <p class="font-medium text-lg mb-3">1. ¿Cuál es el tema principal de la conversación en el video?</p>
                        <div class="space-y-2">
                            <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
                                <input type="radio" name="q1" value="a" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                <span class="ml-3">A) Planear unas vacaciones</span>
                            </label>
                            <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
                                <input type="radio" name="q1" value="b" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                <span class="ml-3">B) Una entrevista de trabajo</span>
                            </label>
                            <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
                                <input type="radio" name="q1" value="c" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                <span class="ml-3">C) Comprar comida en un restaurante</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <p class="font-medium text-lg mb-3">2. Escribe la palabra que falta en la oración: "I usually go to the _______ on weekends."</p>
                        <input type="text" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Tu respuesta aquí...">
                    </div>

                </div>

                <div class="mt-10">
                    <button type="button" class="w-full bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg hover:bg-blue-700 transition duration-200">
                        Revisar Respuestas
                    </button>
                </div>
            </form>
        </main>
    </div>

</body>
</html>

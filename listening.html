<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Activity | Periplo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Play, Pause, RotateCcw, Target, HelpCircle } from 'lucide-react';

        // 1. Nos conectamos a la MISMA base de datos de Periplo
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ListeningApp = () => {
            const [taller, setTaller] = useState(null);
            const [loading, setLoading] = useState(true);
            const playerRef = useRef(null);

            // 2. Cargamos el taller desde Firebase al abrir la página
            useEffect(() => {
                const fetchTaller = async () => {
                    // OJO: Aquí necesitas pasarle el ID del documento de Firebase en la URL
                    // Ejemplo: listening.html?id=ID_DEL_TALLER
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id'); 
                    
                    if (!id) {
                        alert("Falta el ID del taller en la URL");
                        setLoading(false);
                        return;
                    }

                    try {
                        const docRef = doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id);
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            setTaller(docSnap.data());
                            loadYouTubeScript();
                        } else {
                            alert("No se encontró el taller en Firebase");
                        }
                    } catch (error) {
                        console.error("Error conectando a Firebase:", error);
                    }
                    setLoading(false);
                };

                fetchTaller();
            }, []);

            // 3. Configuramos YouTube
            const loadYouTubeScript = () => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    window.onYouTubeIframeAPIReady = initPlayer;
                    document.body.appendChild(tag);
                } else {
                    initPlayer();
                }
            };

            const initPlayer = () => {
                if (taller && taller.videoId) {
                    playerRef.current = new window.YT.Player('yt-player', {
                        videoId: taller.videoId,
                        playerVars: { 'controls': 0, 'rel': 0, 'modestbranding': 1 },
                    });
                }
            };

            const jumpToTime = (seconds) => {
                if (playerRef.current && playerRef.current.seekTo) {
                    playerRef.current.seekTo(seconds);
                    playerRef.current.playVideo();
                }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center font-bold text-xl">Cargando taller desde Firebase...</div>;
            if (!taller) return <div className="min-h-screen flex items-center justify-center font-bold text-xl text-red-500">Error al cargar la actividad.</div>;

            return (
                <div className="max-w-4xl mx-auto p-6 py-12">
                    <header className="mb-8 text-center">
                        <h1 className="text-4xl font-black text-rose-600 mb-2">{taller.title}</h1>
                        <p className="text-slate-500">Escucha con atención y revisa los clips de vocabulario.</p>
                    </header>

                    {/* Reproductor de Video */}
                    <div className="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-video w-full mb-6 relative">
                        <div id="yt-player" className="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
                    </div>

                    {/* Controles Personalizados */}
                    <div className="flex justify-center gap-4 mb-10">
                        <button onClick={() => playerRef.current?.playVideo()} className="bg-rose-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-rose-700 transition shadow-lg"><Play size={20}/> Play</button>
                        <button onClick={() => playerRef.current?.pauseVideo()} className="bg-slate-200 text-slate-800 px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-300 transition"><Pause size={20}/> Pausa</button>
                    </div>

                    {/* Clips de Vocabulario */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 mb-8">
                        <h2 className="text-2xl font-black flex items-center gap-2 mb-6 text-indigo-600"><Target size={24}/> Key Vocabulary Clips</h2>
                        <div className="space-y-4">
                            {taller.clips && taller.clips.map((clip, idx) => (
                                <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between hover:border-indigo-300 transition">
                                    <div className="flex-1">
                                        <h3 className="text-lg font-black text-slate-800">"{clip.word}"</h3>
                                        <p className="text-sm text-slate-600 italic mb-1">...{clip.context}...</p>
                                        <p className="text-xs font-semibold text-slate-400">Definición: {clip.definition}</p>
                                    </div>
                                    <button onClick={() => jumpToTime(clip.startSeconds)} className="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-indigo-200 transition shrink-0">
                                        <RotateCcw size={16}/> Escuchar fragmento
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Preguntas de Comprensión */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                        <h2 className="text-2xl font-black flex items-center gap-2 mb-6 text-emerald-600"><HelpCircle size={24}/> Listening Quiz</h2>
                        <div className="space-y-8">
                            {taller.questions && taller.questions.map((q, idx) => (
                                <div key={idx}>
                                    <p className="font-bold text-lg mb-4">{idx + 1}. {q.q}</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {q.options.map((opt, optIdx) => (
                                            <button key={optIdx} className="p-4 border border-slate-200 rounded-xl text-left font-medium hover:bg-emerald-50 hover:border-emerald-300 transition">
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    {q.startSeconds > 0 && (
                                        <button onClick={() => jumpToTime(q.startSeconds)} className="text-xs font-bold text-slate-400 mt-3 flex items-center gap-1 hover:text-emerald-600 transition">
                                            <RotateCcw size={12}/> Pista: Escuchar la parte donde dan la respuesta
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ListeningApp />);
    </script>
</body>
</html>

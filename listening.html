<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Play, Pause, Square, FastForward } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Convertir el texto feo de YouTube a un arreglo de tiempos
        const parseTranscript = (rawText) => {
            const lines = rawText.trim().split('\n');
            const transcript = [];
            let currentStart = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})$/);
                if (timeMatch) {
                    const parts = line.split(':').map(Number);
                    if (parts.length === 2) currentStart = parts[0] * 60 + parts[1];
                    else if (parts.length === 3) currentStart = parts[0] * 3600 + parts[1] * 60 + parts[2];
                } else {
                    transcript.push({ start: currentStart, text: line });
                }
            }

            for (let i = 0; i < transcript.length; i++) {
                transcript[i].end = transcript[i + 1] ? transcript[i + 1].start : transcript[i].start + 5; 
            }
            return transcript;
        };

        const KaraokeApp = () => {
            const [taller, setTaller] = useState(null);
            const [parsedSubs, setParsedSubs] = useState([]);
            const [currentTime, setCurrentTime] = useState(0);
            const playerRef = useRef(null);

            useEffect(() => {
                const fetchTaller = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id'); 
                    if (!id) return alert("Falta el ID en la URL");

                    const docSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setTaller(data);
                        setParsedSubs(parseTranscript(data.rawTranscript || ""));
                        loadYouTubeScript(data.videoId);
                    } else {
                        alert("Actividad no encontrada.");
                    }
                };
                fetchTaller();
            }, []);

            const loadYouTubeScript = (vidId) => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    window.onYouTubeIframeAPIReady = () => initPlayer(vidId);
                    document.body.appendChild(tag);
                } else {
                    initPlayer(vidId);
                }
            };

            const initPlayer = (vidId) => {
                playerRef.current = new window.YT.Player('yt-player-container', {
                    videoId: vidId,
                    playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'modestbranding': 1 },
                });

                // Reloj maestro de React para el Karaoke (checa el tiempo cada 100ms)
                setInterval(() => {
                    if (playerRef.current && playerRef.current.getCurrentTime) {
                        setCurrentTime(playerRef.current.getCurrentTime());
                    }
                }, 100);
            };

            const handlePlay = () => playerRef.current?.playVideo();
            const handlePause = () => playerRef.current?.pauseVideo();
            const handleStop = () => { playerRef.current?.pauseVideo(); playerRef.current?.seekTo(0); };
            const handleForward = () => { 
                if(playerRef.current?.getCurrentTime) {
                    playerRef.current.seekTo(playerRef.current.getCurrentTime() + 5); 
                }
            };
            const jumpToTime = (sec) => { playerRef.current?.seekTo(sec); playerRef.current?.playVideo(); };

            if (!taller) return <div className="h-screen flex items-center justify-center font-black text-2xl animate-pulse">Cargando...</div>;

            return (
                <div className="max-w-4xl mx-auto p-6 py-12">
                    <h1 className="text-4xl font-black text-rose-600 mb-8 text-center">{taller.title}</h1>

                    {/* Contenedor del Video */}
                    <div className="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-video w-full mb-8 relative border-4 border-slate-200 pointer-events-none">
                        <div id="yt-player-container" className="absolute top-0 left-0 w-full h-full"></div>
                    </div>

                    {/* Tus botones customizados */}
                    <div className="flex flex-wrap justify-center gap-4 mb-10 bg-white p-4 rounded-full shadow-sm border border-slate-200">
                        <button onClick={handlePlay} className="bg-rose-600 text-white px-8 py-3 rounded-full font-black flex items-center gap-2 hover:bg-rose-700 transition shadow-md active:scale-95"><Play size={20}/> Play</button>
                        <button onClick={handlePause} className="bg-slate-100 text-slate-700 px-6 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-slate-200 transition active:scale-95"><Pause size={20}/> Pausa</button>
                        <button onClick={handleStop} className="bg-slate-100 text-slate-700 px-6 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-slate-200 transition active:scale-95"><Square size={20}/> Stop</button>
                        <button onClick={handleForward} className="bg-indigo-100 text-indigo-700 px-6 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-indigo-200 transition active:scale-95"><FastForward size={20}/> +5 Seg</button>
                    </div>

                    {/* El Karaoke Mágico */}
                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center leading-relaxed flex flex-wrap justify-center gap-2 text-2xl md:text-3xl min-h-[200px] items-center">
                        {parsedSubs.map((sub, idx) => {
                            const isActive = currentTime >= sub.start && currentTime < sub.end;
                            return (
                                <span 
                                    key={idx} 
                                    onClick={() => jumpToTime(sub.start)}
                                    className={`cursor-pointer transition-all duration-200 ${isActive ? 'text-rose-600 font-black scale-105' : 'text-slate-300 font-medium hover:text-slate-500'}`}
                                >
                                    {sub.text} 
                                </span>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<KaraokeApp />);
    </script>
</body>
</html>

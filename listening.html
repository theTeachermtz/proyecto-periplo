<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Play, Pause, Square, FastForward, RotateCcw } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Algoritmo mejorado para leer el transcript copiado de YouTube
        const parseTranscript = (rawText) => {
            const lines = rawText.trim().split('\n');
            const transcript = [];
            let currentStart = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // Busca si la línea empieza con un timestamp (ej: 0:05, 12:30, 1:02:15)
                const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})/);
                
                if (timeMatch) {
                    let parts = timeMatch[0].split(':').map(Number);
                    if (parts.length === 2) currentStart = parts[0] * 60 + parts[1];
                    else if (parts.length === 3) currentStart = parts[0] * 3600 + parts[1] * 60 + parts[2];
                    
                    // Si YouTube pegó el tiempo y el texto en la misma línea
                    let textStr = line.replace(timeMatch[0], '').trim();
                    if (textStr) {
                        transcript.push({ start: currentStart, text: textStr });
                    } else {
                        // Preparamos el bloque esperando que la siguiente línea sea el texto
                        transcript.push({ start: currentStart, text: "" });
                    }
                } else {
                    // Es una línea de texto. Se la asignamos al último bloque de tiempo.
                    if (transcript.length > 0) {
                        const lastIndex = transcript.length - 1;
                        if (transcript[lastIndex].text === "") {
                            transcript[lastIndex].text = line;
                        } else {
                            // Si hay varias líneas de texto para el mismo segundo, las unimos
                            transcript[lastIndex].text += " " + line;
                        }
                    }
                }
            }

            // Calculamos cuándo termina cada frase
            for (let i = 0; i < transcript.length; i++) {
                transcript[i].end = transcript[i + 1] ? transcript[i + 1].start : transcript[i].start + 5; 
            }
            // Filtramos por si quedó algún bloque de tiempo vacío
            return transcript.filter(t => t.text.trim() !== "");
        };

        const YouGlishApp = () => {
            const [taller, setTaller] = useState(null);
            const [parsedSubs, setParsedSubs] = useState([]);
            const [currentTime, setCurrentTime] = useState(0);
            const playerRef = useRef(null);

            useEffect(() => {
                const fetchTaller = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id'); 
                    if (!id) return alert("Falta el ID en la URL");

                    const docSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setTaller(data);
                        setParsedSubs(parseTranscript(data.rawTranscript || ""));
                        loadYouTubeScript(data.videoId);
                    } else {
                        alert("Actividad no encontrada.");
                    }
                };
                fetchTaller();
            }, []);

            const loadYouTubeScript = (vidId) => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    window.onYouTubeIframeAPIReady = () => initPlayer(vidId);
                    document.body.appendChild(tag);
                } else {
                    initPlayer(vidId);
                }
            };

            const initPlayer = (vidId) => {
                playerRef.current = new window.YT.Player('yt-player-container', {
                    videoId: vidId,
                    playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
                });
            };

            // El reloj maestro de React: Revisa el tiempo de YouTube 10 veces por segundo
            useEffect(() => {
                const interval = setInterval(() => {
                    if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                        setCurrentTime(playerRef.current.getCurrentTime());
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            const handlePlay = () => playerRef.current?.playVideo();
            const handlePause = () => playerRef.current?.pauseVideo();
            const handleReplay = () => { playerRef.current?.seekTo(0); playerRef.current?.playVideo(); };
            const handleForward = () => { 
                if(playerRef.current?.getCurrentTime) {
                    playerRef.current.seekTo(playerRef.current.getCurrentTime() + 5); 
                }
            };

            // Encuentra cuál es el índice del subtítulo que debería estar leyendo ahora mismo
            let activeIndex = parsedSubs.findIndex(sub => currentTime >= sub.start && currentTime < sub.end);
            
            // Si hay un hueco de silencio, mantenemos el último subtítulo visible un rato
            if (activeIndex === -1 && parsedSubs.length > 0) {
                const pastSubs = parsedSubs.filter(sub => currentTime >= sub.end);
                if (pastSubs.length > 0) activeIndex = parsedSubs.indexOf(pastSubs[pastSubs.length - 1]);
                else activeIndex = 0;
            }

            if (!taller) return <div className="h-screen flex items-center justify-center font-black text-2xl animate-pulse text-slate-400">Cargando taller...</div>;

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 py-12">
                    <h1 className="text-3xl md:text-4xl font-black text-slate-800 mb-8 text-center">{taller.title}</h1>

                    {/* Contenedor del Video */}
                    <div className="bg-black rounded-3xl overflow-hidden shadow-xl aspect-video w-full mb-6 relative border-4 border-slate-800 pointer-events-none">
                        <div id="yt-player-container" className="absolute top-0 left-0 w-full h-full"></div>
                    </div>

                    {/* INTERFAZ ESTILO YOUGLISH: Solo muestra la oración actual y contexto */}
                    <div className="bg-white rounded-3xl shadow-lg border border-slate-200 mb-8 overflow-hidden">
                        <div className="bg-slate-800 p-8 min-h-[180px] flex flex-col items-center justify-center text-center px-4 relative">
                            
                            {/* Oración Anterior (Contexto) */}
                            {activeIndex > 0 && (
                                <p className="text-slate-500 text-sm md:text-base font-medium mb-3 opacity-70 transition-all">
                                    {parsedSubs[activeIndex - 1].text}
                                </p>
                            )}
                            
                            {/* Oración Actual (Destacada) */}
                            {parsedSubs.length > 0 ? (
                                <p className="text-2xl md:text-4xl font-black text-yellow-400 my-2 transition-all transform scale-100">
                                    {parsedSubs[activeIndex]?.text || "..."}
                                </p>
                            ) : (
                                <p className="text-xl text-slate-500 italic">No se detectaron subtítulos.</p>
                            )}
                            
                            {/* Oración Siguiente (Contexto) */}
                            {activeIndex >= 0 && activeIndex < parsedSubs.length - 1 && (
                                <p className="text-slate-500 text-sm md:text-base font-medium mt-3 opacity-70 transition-all">
                                    {parsedSubs[activeIndex + 1].text}
                                </p>
                            )}
                        </div>

                        {/* Controles de Reproducción integrados en la caja */}
                        <div className="bg-white p-4 flex flex-wrap justify-center gap-3">
                            <button onClick={handlePlay} className="bg-rose-600 text-white px-6 py-2.5 rounded-xl font-black flex items-center gap-2 hover:bg-rose-700 transition shadow-sm active:scale-95"><Play size={18}/> Play</button>
                            <button onClick={handlePause} className="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-200 transition active:scale-95"><Pause size={18}/> Pausa</button>
                            <button onClick={handleReplay} className="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-200 transition active:scale-95"><RotateCcw size={18}/> Repetir</button>
                            <button onClick={handleForward} className="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-200 transition active:scale-95"><FastForward size={18}/> +5s</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<YouGlishApp />);
    </script>
</body>
</html>

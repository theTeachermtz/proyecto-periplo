<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #fff; cursor: pointer; margin-top: -5px; position: relative; z-index: 40;
            box-shadow: 0 0 8px rgba(255,255,255,0.4); transition: transform 0.15s ease;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.4); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: transparent; border-radius: 2px; }
        input[type=range]:focus { outline: none; }

        .sub-overlay { transition: opacity 0.3s ease, transform 0.3s ease; }
        .sub-overlay-active { opacity: 1; transform: translateY(0); }
        .sub-overlay-fading { opacity: 0.45; transform: translateY(0); }
        .sub-overlay-hidden { opacity: 0; transform: translateY(6px); pointer-events: none; }

        .panel-enter { animation: panelIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .mode-pill { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
        button, a, [role="button"] { touch-action: manipulation; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .speed-badge { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-zinc-950 text-slate-100 min-h-[100dvh] relative overflow-x-hidden flex flex-col">
    <div id="root" class="flex-1"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Play, Pause, SkipBack, SkipForward, ExternalLink, Subtitles, EyeOff, BrainCircuit, HelpCircle, CheckCircle2, XCircle, Sparkles, Gauge, Eye, ChevronDown, ChevronUp, ArrowLeft, Scissors, Clock, BookOpen, List } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const formatTime = (secs) => {
            if (!secs || isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        const ListeningApp = () => {
            const [taller, setTaller] = useState(null);
            const [parsedSubs, setParsedSubs] = useState([]);
            const [clips, setClips] = useState([]);

            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [showSpeedMenu, setShowSpeedMenu] = useState(false);
            const [subsVisible, setSubsVisible] = useState(true);

            // UI States
            const [panelVisible, setPanelVisible] = useState(true);
            const [focusedClip, setFocusedClip] = useState(-1);
            
            // Interaction States
            const [expandedVocabKey, setExpandedVocabKey] = useState(null); 
            const [visibleOptions, setVisibleOptions] = useState(new Set()); 
            const [answeredQuestions, setAnsweredQuestions] = useState({}); 

            const playerRef = useRef(null);
            const playerReady = useRef(false);
            const speedMenuRef = useRef(null);
            const lastSubIdx = useRef(-1);
            
            // NUEVO: Referencia para pausar automáticamente al terminar el clip actual
            const autoPauseTarget = useRef(null);

            const SUBTITLE_GRACE = 1.2;
            const getSubtitleState = useCallback(() => {
                if (parsedSubs.length === 0) return { activeIdx: -1, displayIdx: -1 };
                let activeIdx = parsedSubs.findIndex(sub => currentTime >= sub.start && currentTime < sub.end);
                if (activeIdx !== -1) { lastSubIdx.current = activeIdx; return { activeIdx, displayIdx: activeIdx }; }
                const lastIdx = lastSubIdx.current;
                if (lastIdx >= 0 && lastIdx < parsedSubs.length) {
                    const lastSub = parsedSubs[lastIdx];
                    if (currentTime >= lastSub.end && currentTime < lastSub.end + SUBTITLE_GRACE) { return { activeIdx: -1, displayIdx: lastIdx }; }
                }
                const nextIdx = parsedSubs.findIndex(sub => sub.start > currentTime);
                if (nextIdx > 0) { lastSubIdx.current = nextIdx - 1; return { activeIdx: -1, displayIdx: nextIdx - 1 }; }
                if (nextIdx === -1 && parsedSubs.length > 0) { const l = parsedSubs.length - 1; lastSubIdx.current = l; return { activeIdx: -1, displayIdx: l }; }
                return { activeIdx: -1, displayIdx: 0 };
            }, [currentTime, parsedSubs]);

            const { activeIdx: activeSubIndex, displayIdx: displaySubIndex } = getSubtitleState();

            /* ── Firebase Fetch ── */
            useEffect(() => {
                const fetchTaller = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) return;
                    try {
                        const docSnap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id));
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTaller(data);
                            setParsedSubs(data.parsedTranscript || []);
                            
                            if (data.clips && data.clips.length > 0) {
                                setClips(data.clips);
                            } else {
                                setClips([{
                                    startSeconds: 0, endSeconds: 9999, reason: "Lección Completa",
                                    vocabulary: data.vocabulary || [], questions: data.questions || []
                                }]);
                            }
                            loadYouTubeScript(data.videoId);
                        }
                    } catch (e) { console.error("Fetch error:", e); }
                };
                fetchTaller();
            }, []);

            /* ── YouTube Player & Auto-Pause ── */
            const loadYouTubeScript = (vidId) => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    window.onYouTubeIframeAPIReady = () => initPlayer(vidId);
                    document.body.appendChild(tag);
                } else { initPlayer(vidId); }
            };

            const initPlayer = (vidId) => {
                playerRef.current = new window.YT.Player('yt-player-container', {
                    videoId: vidId,
                    playerVars: { controls: 0, disablekb: 1, rel: 0, modestbranding: 1, playsinline: 1, iv_load_policy: 3 },
                    events: {
                        onReady: (e) => { setDuration(e.target.getDuration()); playerReady.current = true; },
                        onStateChange: (e) => {
                            setIsPlaying(e.data === 1 || e.data === 3);
                            if (duration === 0 && e.target.getDuration) setDuration(e.target.getDuration());
                        }
                    }
                });
            };

            useEffect(() => {
                const interval = setInterval(() => {
                    if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                        const t = playerRef.current.getCurrentTime();
                        setCurrentTime(t);

                        // NUEVA LÓGICA: Auto-Pausar al llegar al final del clip objetivo
                        if (autoPauseTarget.current !== null) {
                            // Validar que entramos al tiempo exacto del final (con un buffer de 2s por si el timer salta)
                            if (t >= autoPauseTarget.current && t < autoPauseTarget.current + 2) {
                                playerRef.current.pauseVideo();
                                setIsPlaying(false);
                                autoPauseTarget.current = null; // Limpiar objetivo
                            } else if (t < autoPauseTarget.current - 5 || t > autoPauseTarget.current + 2) {
                                // Si el usuario brinca manualmente lejos del objetivo, abortamos el auto-pause
                                autoPauseTarget.current = null;
                            }
                        }
                    }
                }, 80);
                return () => clearInterval(interval);
            }, []);

            // NUEVA LÓGICA: Auto-Sync (Avanzar el panel junto con el video)
            useEffect(() => {
                if (!clips || clips.length === 0 || focusedClip === -1) return;
                
                let activeIdx = clips.findIndex(c => {
                    const end = c.endSeconds === 9999 ? duration : c.endSeconds;
                    return currentTime >= c.startSeconds && currentTime < end;
                });

                // Cambiar el foco si el video entró a un nuevo clip automáticamente (y si hay más de 1 clip para no romper material viejo)
                if (activeIdx !== -1 && activeIdx !== focusedClip && clips.length > 1) {
                    setFocusedClip(activeIdx);
                    // Reseteamos las opciones para que se vea limpio el nuevo clip
                    setVisibleOptions(new Set());
                    setExpandedVocabKey(null);
                }
            }, [currentTime, clips, focusedClip, duration]);

            /* ── Transport Controls ── */
            const togglePlayPause = useCallback(() => {
                if (!playerRef.current || !playerReady.current) return;
                const st = playerRef.current.getPlayerState();
                if (st === 1 || st === 3) { playerRef.current.pauseVideo(); setIsPlaying(false); }
                else { playerRef.current.playVideo(); setIsPlaying(true); autoPauseTarget.current = null; } // Si le da play manual, cancela auto-pause
            }, []);

            const seekTo = useCallback((time) => {
                if (playerRef.current && typeof playerRef.current.seekTo === 'function') {
                    playerRef.current.seekTo(time, true);
                    lastSubIdx.current = -1;
                }
            }, []);

            const jumpSeconds = useCallback((s) => {
                if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                    seekTo(Math.max(0, playerRef.current.getCurrentTime() + s));
                    playerRef.current.playVideo();
                }
            }, [seekTo]);

            const handleSeek = useCallback((e) => { const t = parseFloat(e.target.value); setCurrentTime(t); seekTo(t); }, [seekTo]);

            // Reproducir clip específico
            const playSpecificClip = (start, end) => {
                seekTo(start);
                playerRef.current.playVideo();
                autoPauseTarget.current = end; // Armar la trampa de pausa
            };

            const changeSpeed = useCallback((rate) => {
                setPlaybackRate(rate); setShowSpeedMenu(false);
                if (playerRef.current?.setPlaybackRate) playerRef.current.setPlaybackRate(rate);
            }, []);

            useEffect(() => {
                const handler = (e) => { if (speedMenuRef.current && !speedMenuRef.current.contains(e.target)) setShowSpeedMenu(false); };
                if (showSpeedMenu) document.addEventListener('pointerdown', handler);
                return () => document.removeEventListener('pointerdown', handler);
            }, [showSpeedMenu]);

            const handleAnswer = useCallback((qKey, ansIdx) => {
                if (answeredQuestions[qKey] !== undefined) return;
                setAnsweredQuestions(prev => ({ ...prev, [qKey]: ansIdx }));
            }, [answeredQuestions]);

            const toggleOptions = (qKey) => {
                setVisibleOptions(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(qKey)) newSet.delete(qKey); else newSet.add(qKey);
                    return newSet;
                });
            };

            const timelineMarkers = useMemo(() => {
                if (duration <= 0 || clips.length === 0) return [];
                return clips.map(clip => {
                    const end = clip.endSeconds === 9999 ? duration : clip.endSeconds;
                    return {
                        left: (clip.startSeconds / duration) * 100,
                        width: ((end - clip.startSeconds) / duration) * 100,
                        active: currentTime >= clip.startSeconds && currentTime <= end,
                        color: 'amber'
                    };
                });
            }, [clips, currentTime, duration]);

            const subOverlayClass = !subsVisible ? 'sub-overlay-hidden' : activeSubIndex >= 0 ? 'sub-overlay-active' : displaySubIndex >= 0 ? 'sub-overlay-fading' : 'sub-overlay-hidden';

            if (!taller) return (
                <div className="h-[100dvh] flex flex-col items-center justify-center gap-4">
                    <div className="w-12 h-12 border-4 border-zinc-700 border-t-white rounded-full animate-spin"/>
                    <p className="font-black text-zinc-500 tracking-widest uppercase text-sm">Cargando...</p>
                </div>
            );

            return (
                <div className="relative flex-1 flex flex-col">
                    {/* ── Blurred BG ── */}
                    {taller.thumbnailUrl && (
                        <div className="fixed inset-0 z-0 bg-cover bg-center opacity-20 blur-[80px] scale-110 saturate-150"
                            style={{ backgroundImage: `url(${taller.thumbnailUrl})` }}/>
                    )}
                    <div className="fixed inset-0 z-0 bg-gradient-to-b from-zinc-950/70 via-zinc-950/90 to-zinc-950"/>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 md:px-6 pt-5 pb-6 flex-1 flex flex-col w-full">

                        {/* ── HEADER ── */}
                        <header className="mb-4 shrink-0">
                            <div className="flex items-start justify-between gap-4">
                                <div className="min-w-0">
                                    {taller.channelName && (
                                        <p className="text-rose-400 font-extrabold uppercase tracking-[0.2em] text-[10px] mb-1 flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-rose-400 rounded-full inline-block"/>
                                            {taller.channelName}
                                        </p>
                                    )}
                                    <h1 className="text-lg md:text-2xl font-black text-white leading-tight line-clamp-2">{taller.title}</h1>
                                </div>
                                <a href={`https://www.youtube.com/watch?v=${taller.videoId}`} target="_blank" rel="noopener noreferrer"
                                    className="shrink-0 bg-white/8 hover:bg-white/12 backdrop-blur text-zinc-300 hover:text-white font-bold px-3 py-2 rounded-xl transition text-xs border border-white/8 flex items-center gap-1.5">
                                    <ExternalLink size={14}/> YouTube
                                </a>
                            </div>
                        </header>

                        {/* ══════════════════════════════════════════
                            MAIN LAYOUT
                        ══════════════════════════════════════════ */}
                        <div className={`flex flex-col ${panelVisible ? 'lg:flex-row' : ''} gap-4 flex-1 min-h-0`}>

                            {/* ── LEFT COLUMN: Video + Controls ── */}
                            <div className={`${panelVisible ? 'lg:flex-1 lg:min-w-0' : 'w-full max-w-5xl mx-auto'} flex flex-col transition-all duration-300 shrink-0 lg:shrink`}>

                                {/* Player card */}
                                <div className="rounded-2xl overflow-hidden bg-black/60 backdrop-blur-xl border border-white/8 shadow-2xl shadow-black/40">

                                    <div className="w-full relative aspect-video bg-black">
                                        <div className="absolute inset-0 w-full h-full pointer-events-none">
                                            <div id="yt-player-container" className="w-full h-full"></div>
                                        </div>
                                        <div onClick={togglePlayPause} className="absolute inset-0 z-10 cursor-pointer"/>

                                        {displaySubIndex >= 0 && parsedSubs[displaySubIndex] && (
                                            <div className={`sub-overlay absolute bottom-3 md:bottom-5 left-0 right-0 z-20 flex justify-center pointer-events-none px-3 ${subOverlayClass}`}>
                                                <p className="bg-black/75 backdrop-blur-sm text-white text-sm md:text-lg font-semibold px-4 py-2 md:px-6 md:py-2.5 rounded-xl max-w-[95%] text-center leading-snug shadow-lg">
                                                    {parsedSubs[displaySubIndex].text}
                                                </p>
                                            </div>
                                        )}
                                    </div>

                                    {/* ── Transport controls ── */}
                                    <div className="px-3 md:px-4 pt-2.5 pb-3">
                                        <div className="flex items-center gap-2.5 mb-2.5">
                                            <span className="text-[10px] font-mono text-zinc-500 w-8 text-right tabular-nums">{formatTime(currentTime)}</span>
                                            <div className="relative w-full flex items-center h-5">
                                                <div className="absolute left-0 right-0 h-1 bg-white/10 rounded-full"/>
                                                <div className="absolute left-0 h-1 bg-white/40 rounded-full" style={{ width: duration > 0 ? `${(currentTime/duration)*100}%` : '0%' }}/>
                                                
                                                {timelineMarkers.map((m, i) => (
                                                    <React.Fragment key={i}>
                                                        {m.active && (
                                                            <div className="absolute h-1.5 rounded-full z-10 bg-amber-400/80 shadow-[0_0_6px_rgba(251,191,36,0.6)]"
                                                                style={{ left: `${m.left}%`, width: `${m.width}%` }}/>
                                                        )}
                                                        <div className={`absolute h-1.5 rounded-full z-0 transition-all ${m.active ? 'bg-amber-300' : 'bg-amber-500/40 hover:bg-amber-500/60'}`}
                                                            style={{ left: `${m.left}%`, width: `${m.width}%` }}/>
                                                    </React.Fragment>
                                                ))}
                                                <input type="range" min="0" max={duration || 100} step="0.1" value={currentTime} onChange={handleSeek}
                                                    className="absolute inset-0 w-full h-full z-30 m-0 cursor-pointer opacity-0"/>
                                            </div>
                                            <span className="text-[10px] font-mono text-zinc-500 w-8 tabular-nums">{formatTime(duration)}</span>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <div className="relative" ref={speedMenuRef}>
                                                <button onClick={() => setShowSpeedMenu(!showSpeedMenu)}
                                                    className="speed-badge text-[11px] font-extrabold text-zinc-400 hover:text-white bg-white/5 hover:bg-white/10 px-2 py-1.5 rounded-lg transition flex items-center gap-1">
                                                    <Gauge size={12}/> {playbackRate}x
                                                </button>
                                                {showSpeedMenu && (
                                                    <div className="absolute bottom-full mb-2 left-0 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl p-1.5 flex flex-col gap-0.5 z-50 min-w-[80px]">
                                                        {[0.5, 0.75, 1, 1.25, 1.5].map(rate => (
                                                            <button key={rate} onClick={() => changeSpeed(rate)}
                                                                className={`text-xs font-bold px-3 py-1.5 rounded-lg text-left transition ${playbackRate === rate ? 'bg-white/15 text-white' : 'text-zinc-400 hover:text-white hover:bg-white/5'}`}>
                                                                {rate}x
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="flex items-center gap-4">
                                                <button onClick={() => jumpSeconds(-5)} className="text-zinc-500 hover:text-white transition active:scale-90">
                                                    <SkipBack size={18} fill="currentColor"/>
                                                </button>
                                                <button onClick={togglePlayPause}
                                                    className="bg-white text-zinc-950 hover:scale-105 w-11 h-11 rounded-full flex items-center justify-center shadow-lg shadow-white/10 transition-transform active:scale-95">
                                                    {isPlaying ? <Pause fill="currentColor" size={18}/> : <Play fill="currentColor" size={18} className="ml-0.5"/>}
                                                </button>
                                                <button onClick={() => jumpSeconds(5)} className="text-zinc-500 hover:text-white transition active:scale-90">
                                                    <SkipForward size={18} fill="currentColor"/>
                                                </button>
                                            </div>

                                            <button onClick={() => setSubsVisible(!subsVisible)}
                                                className={`text-[11px] font-extrabold px-2.5 py-1.5 rounded-lg transition flex items-center gap-1 ${subsVisible ? 'text-amber-400 bg-amber-400/10 hover:bg-amber-400/20' : 'text-zinc-500 bg-white/5 hover:bg-white/10'}`}
                                                title={subsVisible ? 'Ocultar subtítulos' : 'Mostrar subtítulos'}>
                                                {subsVisible ? <Subtitles size={14}/> : <EyeOff size={14}/>}
                                                <span className="hidden sm:inline">CC</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* ── MODE TOGGLE ── */}
                                <div className="flex items-center justify-center mt-3 pb-3 lg:pb-0">
                                    <button onClick={() => setPanelVisible(!panelVisible)}
                                        className={`mode-pill relative flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-extrabold border transition-all ${panelVisible ? 'text-amber-400 bg-amber-400/15 border-amber-400/30' : 'text-zinc-400 bg-white/5 border-transparent hover:bg-white/8 hover:text-zinc-300'}`}>
                                        <List size={18}/>
                                        Lección 
                                        <span className="ml-1 text-[11px] font-black bg-black/30 px-2 py-0.5 rounded-md">
                                            {clips.length} Clips
                                        </span>
                                    </button>
                                </div>
                            </div>

                            {/* ── RIGHT COLUMN: Side Panel (Clips Navigation) ── */}
                            {panelVisible && (
                                /* FIX CSS MÓVIL: En dispositivos móviles, le asignamos una altura controlada h-[500px] y overflow-hidden
                                   En pantallas grandes, se auto-ajusta hasta el calc del viewport */
                                <div className="w-full lg:w-[380px] xl:w-[420px] lg:shrink-0 flex flex-col h-[500px] lg:h-auto lg:max-h-[calc(100vh-150px)]">
                                    <div className="panel-enter rounded-2xl border border-amber-500/15 bg-amber-950/10 backdrop-blur-md flex-1 flex flex-col px-5 py-6 overflow-hidden min-h-0">
                                        
                                        {focusedClip !== -1 ? (
                                            /* ════ DETAIL VIEW (Single Clip) ════ */
                                            <div className="flex flex-col h-full w-full min-h-0">
                                                <button onClick={() => setFocusedClip(-1)} className="self-start flex items-center gap-1.5 text-amber-500 hover:text-amber-400 text-xs font-bold mb-4 bg-amber-500/10 hover:bg-amber-500/20 px-3 py-1.5 rounded-lg transition-colors shrink-0">
                                                    <ArrowLeft size={14} /> Volver a Clips
                                                </button>

                                                {/* FIX CSS MÓVIL: Aseguramos que solo esta caja tenga scroll y el contenido no rompa hacia afuera */}
                                                <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-6 pb-4 min-h-0">
                                                    {(() => {
                                                        const clip = clips[focusedClip];
                                                        const endSec = clip.endSeconds === 9999 ? duration : clip.endSeconds;
                                                        return (
                                                            <div className="w-full flex flex-col">
                                                                <div className="mb-6 shrink-0 border-b border-white/10 pb-5">
                                                                    <div className="inline-flex items-center gap-1.5 bg-amber-500/15 text-amber-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.15em] mb-3 border border-amber-500/20">
                                                                        <Scissors size={12}/> Clip {focusedClip + 1}
                                                                    </div>
                                                                    <h2 className="text-xl font-black text-white leading-snug break-words mb-3">{clip.reason}</h2>
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="text-xs font-mono text-amber-500/70 bg-amber-500/10 px-2 py-1 rounded-md flex items-center gap-1.5 shrink-0">
                                                                            <Clock size={12}/> {formatTime(clip.startSeconds)} - {formatTime(endSec)}
                                                                        </span>
                                                                        <button onClick={() => playSpecificClip(clip.startSeconds, endSec)} className="text-xs font-bold text-black bg-amber-400 hover:bg-amber-300 px-3 py-1 rounded-md transition-colors shadow-lg shadow-amber-500/20 flex items-center gap-1 shrink-0">
                                                                            <Play size={12} fill="currentColor"/> Reproducir Clip
                                                                        </button>
                                                                    </div>
                                                                </div>

                                                                {clip.vocabulary && clip.vocabulary.length > 0 && (
                                                                    <div className="mb-6 shrink-0">
                                                                        <h3 className="text-sm font-black text-emerald-400 flex items-center gap-2 mb-3"><BookOpen size={16}/> Vocabulario</h3>
                                                                        <div className="flex flex-col gap-2">
                                                                            {clip.vocabulary.map((v, vIdx) => {
                                                                                const vKey = `${focusedClip}-${vIdx}`;
                                                                                const isExpanded = expandedVocabKey === vKey;
                                                                                return (
                                                                                    <div key={vIdx} className="bg-black/40 border border-emerald-500/20 rounded-xl overflow-hidden shrink-0">
                                                                                        <button onClick={() => setExpandedVocabKey(isExpanded ? null : vKey)} className="w-full px-4 py-3 flex justify-between items-center hover:bg-white/5 transition-colors text-left">
                                                                                            <span className="font-bold text-emerald-100 text-sm break-words pr-2">{v.word}</span>
                                                                                            {isExpanded ? <ChevronUp size={16} className="text-emerald-400 shrink-0"/> : <ChevronDown size={16} className="text-emerald-600 shrink-0"/>}
                                                                                        </button>
                                                                                        {isExpanded && (
                                                                                            <div className="px-4 pb-4 pt-1 border-t border-emerald-500/20 bg-emerald-500/5">
                                                                                                <div className="inline-flex items-center gap-1 bg-emerald-500/15 text-emerald-400 px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider mb-2 mt-2">
                                                                                                    <Sparkles size={10}/> {v.type || "Término"}
                                                                                                </div>
                                                                                                <p className="text-sm text-emerald-100/80 italic leading-relaxed break-words">{v.definition}</p>
                                                                                            </div>
                                                                                        )}
                                                                                    </div>
                                                                                )
                                                                            })}
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {clip.questions && clip.questions.length > 0 && (
                                                                    <div className="shrink-0">
                                                                        <h3 className="text-sm font-black text-indigo-400 flex items-center gap-2 mb-3"><HelpCircle size={16}/> Preguntas</h3>
                                                                        <div className="flex flex-col gap-5 pb-2">
                                                                            {clip.questions.map((q, qIdx) => {
                                                                                const qKey = `${focusedClip}-${qIdx}`;
                                                                                const isOptionsVisible = visibleOptions.has(qKey);
                                                                                const selected = answeredQuestions[qKey];
                                                                                const showResult = selected !== undefined;

                                                                                return (
                                                                                    <div key={qIdx} className="bg-indigo-950/20 border border-indigo-500/20 rounded-xl p-4 shrink-0">
                                                                                        <h4 className="font-bold text-sm text-white mb-4 leading-snug break-words">{q.q}</h4>
                                                                                        
                                                                                        {!isOptionsVisible && !showResult ? (
                                                                                            <button onClick={() => toggleOptions(qKey)} className="w-full bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 border border-indigo-500/30 py-2 rounded-lg font-bold transition-colors flex items-center justify-center gap-2 text-xs">
                                                                                                <Eye size={14}/> Mostrar Opciones
                                                                                            </button>
                                                                                        ) : (
                                                                                            <div className="flex flex-col gap-2">
                                                                                                {q.options.map((opt, oIdx) => {
                                                                                                    const isSelected = selected === oIdx;
                                                                                                    const isCorrect = q.correctIndex === oIdx;
                                                                                                    let style = "bg-black/40 border-white/10 text-white hover:bg-white/5";
                                                                                                    if (showResult) {
                                                                                                        if (isCorrect) style = "bg-emerald-500/15 border-emerald-500/60 text-emerald-300 ring-1 ring-emerald-500/40";
                                                                                                        else if (isSelected && !isCorrect) style = "bg-rose-500/15 border-rose-500/60 text-rose-300";
                                                                                                        else style = "bg-black/20 border-transparent text-zinc-600";
                                                                                                    }
                                                                                                    return (
                                                                                                        <button key={oIdx} onClick={() => handleAnswer(qKey, oIdx)} disabled={showResult}
                                                                                                            className={`p-2.5 rounded-lg border text-left font-medium transition-all flex justify-between items-center gap-2 text-xs shrink-0 ${style}`}>
                                                                                                            <span className="break-words">{opt}</span>
                                                                                                            {showResult && isCorrect && <CheckCircle2 size={14} className="text-emerald-400 shrink-0"/>}
                                                                                                            {showResult && isSelected && !isCorrect && <XCircle size={14} className="text-rose-400 shrink-0"/>}
                                                                                                        </button>
                                                                                                    );
                                                                                                })}
                                                                                            </div>
                                                                                        )}
                                                                                    </div>
                                                                                )
                                                                            })}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )
                                                    })()}
                                                </div>
                                            </div>
                                        ) : (
                                            /* ════ LIST VIEW (All Clips) ════ */
                                            <div className="flex flex-col h-full w-full min-h-0">
                                                <div className="flex items-center gap-2 mb-5 shrink-0">
                                                    <List className="text-amber-500" size={20} />
                                                    <h3 className="text-white font-black text-lg">Segmentos de Lección</h3>
                                                </div>

                                                <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-3 pb-2 min-h-0">
                                                    {clips.length > 0 ? clips.map((clip, idx) => {
                                                        const endSec = clip.endSeconds === 9999 ? duration : clip.endSeconds;
                                                        const isActive = currentTime >= clip.startSeconds && currentTime <= endSec;
                                                        
                                                        const qCount = clip.questions?.length || 0;
                                                        let qAnswered = 0;
                                                        if (qCount > 0) {
                                                            clip.questions.forEach((_, qIdx) => { if(answeredQuestions[`${idx}-${qIdx}`] !== undefined) qAnswered++; });
                                                        }

                                                        let borderStyle = isActive ? "border-amber-400 ring-1 ring-amber-400/50" : "border-white/10 hover:border-white/20";
                                                        let bgStyle = isActive ? "bg-amber-500/10" : "bg-black/40 hover:bg-white/5";

                                                        return (
                                                            <button key={idx} onClick={() => setFocusedClip(idx)}
                                                                className={`w-full text-left p-4 rounded-2xl border transition-all duration-300 flex flex-col gap-2.5 shrink-0 ${borderStyle} ${bgStyle}`}>
                                                                <div className="flex justify-between items-start gap-2">
                                                                    <div className="flex flex-col min-w-0 flex-1">
                                                                        <span className="text-[10px] font-black uppercase tracking-widest text-amber-500/80 mb-1">Clip {idx + 1}</span>
                                                                        <span className="font-bold text-sm text-white/90 leading-snug break-words pr-2">{clip.reason}</span>
                                                                    </div>
                                                                    {isActive && (
                                                                        <span className="shrink-0 flex items-center gap-1.5 text-[9px] font-bold text-amber-400 bg-amber-500/20 px-2 py-1 rounded mt-1">
                                                                            <span className="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"/> EN TURNO
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                
                                                                <div className="flex items-center justify-between mt-1">
                                                                    <span className="text-[10px] font-mono text-zinc-500 flex items-center gap-1">
                                                                        <Clock size={10}/> {formatTime(clip.startSeconds)} - {formatTime(endSec)}
                                                                    </span>
                                                                    <div className="flex gap-2">
                                                                        {(clip.vocabulary?.length || 0) > 0 && (
                                                                            <span className="text-[10px] font-bold text-emerald-500/70 bg-emerald-500/10 px-1.5 py-0.5 rounded flex items-center gap-1 shrink-0">
                                                                                <BookOpen size={10}/> {clip.vocabulary.length}
                                                                            </span>
                                                                        )}
                                                                        {qCount > 0 && (
                                                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 shrink-0 ${qAnswered === qCount ? 'text-indigo-400 bg-indigo-500/20' : 'text-indigo-500/70 bg-indigo-500/10'}`}>
                                                                                <HelpCircle size={10}/> {qAnswered}/{qCount}
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </button>
                                                        );
                                                    }) : (
                                                        <p className="text-zinc-500 text-sm text-center mt-10">No hay clips disponibles.</p>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ListeningApp />);
    </script>
</body>
</html>

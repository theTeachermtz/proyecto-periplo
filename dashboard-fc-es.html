<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WordPack Builder | Periplo Español</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-taxonomy-es.js"></script>
    <script src="periplo-ai.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, X, Settings2, Key, Search, Layers, Tags } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // RUTAS DE FIREBASE — ESPAÑOL (Anita)
        // ============================================================
        const FS_APP_ID  = 'periplo-app-v1';
        const TEACHER_UID = 'teacher_anita_001';

        const { TAXONOMY, NEW_LEVELS, NEW_CATS, MACRO_SKILLS, getAllTopicsForCategory } = window.PERIPLO_TAXONOMY_ES;

        // IA Assistant compartido (periplo-ai.js)
        const AI = window.PERIPLO_AI;
        const ApiKeyBar = AI.createApiKeyBar(React);

        // ============================================================
        // JUEGOS DISPONIBLES EN UN WORDPACK — versión español
        // ============================================================
        const WORDPACK_GAMES = [
            { id: 'flashcards',  label: 'Flashcards',      emoji: '🃏', color: 'border-sky-500/50 bg-sky-500/10 text-sky-400',            file: 'flashcards-es.html'  },
            { id: 'crossword',   label: 'Crucigrama',      emoji: '⬛', color: 'border-amber-500/50 bg-amber-500/10 text-amber-400',      file: 'crossword-es.html'   },
            { id: 'anagram',     label: 'Anagrama',        emoji: '🔤', color: 'border-rose-500/50 bg-rose-500/10 text-rose-400',         file: 'anagram-es.html'     },
            { id: 'memorama',    label: 'Memorama',        emoji: '🧠', color: 'border-emerald-500/50 bg-emerald-500/10 text-emerald-400', file: 'memorama-es.html'    },
            { id: 'emojispell',  label: 'Say it w/ Emoji', emoji: '😎', color: 'border-violet-500/50 bg-violet-500/10 text-violet-400',   file: 'emojispell-es.html'  },
        ];

        const FCBuilder = () => {
            // Nota: los campos se llaman wordEn/wordEs para mantener compatibilidad con los juegos renderers,
            // pero aquí wordEs = la palabra en ESPAÑOL (frontal, lo que aprenden) y wordEn = English translation (trasera)
            const [title, setTitle]   = useState("");
            const [cards, setCards]   = useState([{ id: 1, wordEs: '', wordEn: '', emojis: '', exampleEs: '' }]);
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [magiaModal, setMagiaModal]   = useState(false);
            const [omniPrompt, setOmniPrompt]   = useState("");
            const [targetCount, setTargetCount] = useState(15);

            const [apiKey, setApiKey]                   = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel]     = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);

            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevels, setSaveLevels]       = useState([]);
            const [saveCats, setSaveCats]           = useState([]);
            const [saveTopics, setSaveTopics]       = useState([]);

            const [showPreviewModal, setShowPreviewModal] = useState(false);
            const [savedDocId, setSavedDocId]             = useState(null);

            const abortControllerRef = useRef(null);

            const toggleSelection = (arr, setArr, item) => {
                if (arr.includes(item)) setArr(arr.filter(i => i !== item));
                else setArr([...arr, item]);
            };

            useEffect(() => {
                const savedKey = AI.loadKey();
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, `artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`, editId)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setTitle(data.title);
                            if (data.content?.cards) {
                                setCards(data.content.cards.map((c, i) => ({ ...c, id: Date.now() + i })));
                            }
                            if (data.tags) {
                                setSaveLevels(data.tags.levels || (data.tags.level ? [data.tags.level.toUpperCase()] : []));
                                setSaveCats(data.tags.categories || (data.tags.category ? [data.tags.category] : []));
                                setSaveTopics(data.tags.topics || (data.tags.topic ? [data.tags.topic] : []));
                            }
                            setEditingId(editId);
                        }
                    });
                }
            }, []);

            const addRow    = () => setCards([...cards, { id: Date.now(), wordEs: '', wordEn: '', emojis: '', exampleEs: '' }]);
            const removeRow = (id) => { if (cards.length > 1) setCards(cards.filter(c => c.id !== id)); };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const validModels = await AI.fetchModels(apiKey);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) setSelectedModel(AI.pickPreferredModel(validModels));
                } catch (e) { alert("Error al buscar modelos: " + e.message); }
                finally { setIsLoadingModels(false); }
            };

            const cancelMagia = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    setLoading(false);
                }
            };

            // ============================================================
            // IA PROMPT — genera vocabulario en ESPAÑOL para angloparlantes
            // ============================================================
            const executeMagia = async () => {
                if (!apiKey.trim())     return alert("⚠️ Necesitas ingresar tu API Key.");
                if (!selectedModel)     return alert("⚠️ Escanea y selecciona un modelo primero (botón lupa).");
                if (!omniPrompt.trim()) return alert("⚠️ Escribe qué quieres que haga la IA.");

                setMagiaModal(false);
                setLoading(true);
                abortControllerRef.current = new AbortController();

                const promptText = `
You are an expert Spanish language teacher creating flashcard content for English-speaking students learning Spanish.
The user has given you this free instruction:

USER REQUEST: "${omniPrompt}"

Your task is to generate EXACTLY ${targetCount} flashcards based on that request.

RULES FOR EACH CARD:
1. "wordEs": The Spanish word, phrase, or expression to learn (this is the FRONT of the card — what the student sees first).
2. "wordEn": The English translation or meaning (this is the BACK of the card).
3. "emojis": 1 to 3 emojis that clearly represent the concept.
4. "exampleEs": A short, natural example sentence in Spanish using "wordEs". Keep it appropriate for the student's level.
5. "imageQuery": A short phrase IN ENGLISH (2 to 4 words) describing a concrete, PHOTOGRAPHABLE scene to find a real photo representing the word. For concrete nouns just the thing (e.g. "manzana" -> "red apple fruit"). For abstract words or verbs, describe a visible scene (e.g. "libertad" -> "person arms open sky"). Avoid ambiguous terms that could be confused with proper names or places.

IMPORTANT:
- All Spanish content must be grammatically correct and natural.
- Keep vocabulary and sentences level-appropriate based on the user's request.
- If the request mentions a specific theme (travel, food, body parts, etc.), stick to that theme.

Respond ONLY with a valid JSON with this exact structure, no extra text, no markdown:
{ "title": "Descriptive title of the set in Spanish", "cards": [ { "wordEs": "...", "wordEn": "...", "emojis": "...", "exampleEs": "...", "imageQuery": "..." } ] }
                `;

                try {
                    const rawText = await AI.callGemini({
                        apiKey, model: selectedModel, prompt: promptText,
                        signal: abortControllerRef.current.signal
                    });
                    const parsed = AI.extractJSON(rawText);
                    if (!parsed.cards || !Array.isArray(parsed.cards)) throw new Error("Estructura de JSON inválida.");
                    if (parsed.title && !title) setTitle(parsed.title);
                    setCards(parsed.cards.map((c, i) => ({ ...c, id: Date.now() + i })));
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        console.error("Error al generar:", error);
                        alert("Ocurrió un error al contactar la IA.\n\n" + error.message);
                    }
                } finally {
                    setLoading(false);
                    abortControllerRef.current = null;
                }
            };

            const handlePreSave = () => {
                if (!title.trim() || cards.some(c => !c.wordEs || !c.wordEn)) {
                    alert("Asegúrate de tener un título y que ninguna tarjeta tenga las palabras en blanco.");
                    return;
                }
                setShowSaveModal(true);
            };

            // ============================================================
            // GUARDAR EN FIREBASE — Ruta de Anita
            // ============================================================
            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setLoading(true);

                const cleanCards = cards.map(({ id, ...rest }) => rest);
                const tags = { levels: saveLevels, categories: saveCats, topics: saveTopics };

                const data = {
                    title,
                    type: 'WORD_BANK',
                    content: { cards: cleanCards },
                    tags,
                    cardCount: cleanCards.length,
                    language: 'es',
                    updatedAt: serverTimestamp()
                };

                const params      = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                const parentPath  = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';
                data.parentPath   = parentPath;

                try {
                    let docId = editingId;
                    if (editingId) {
                        await updateDoc(doc(db, `artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`, editingId), data);
                    } else {
                        const ref = await addDoc(collection(db, `artifacts/${FS_APP_ID}/users/${TEACHER_UID}/quizzes`), { ...data, createdAt: serverTimestamp() });
                        docId = ref.id;
                    }
                    setLoading(false);
                    setSavedDocId(docId);
                    setShowPreviewModal(true);
                } catch(e) {
                    alert(e.message);
                    setLoading(false);
                }
            };

            const goToHub = () => {
                const params      = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                const parentPath  = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';
                window.location.href = parentPath ? `index-es.html?folder=${encodeURIComponent(parentPath)}` : 'index-es.html';
            };

            return (
                <div className="max-w-5xl mx-auto p-6 relative">

                    {/* LOADING OVERLAY */}
                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-orange-500 mb-6" size={56}/>
                            <p className="text-orange-500 font-bold uppercase tracking-widest mb-8">Procesando Datos...</p>
                            <button onClick={cancelMagia} className="bg-rose-600 hover:bg-rose-500 text-white font-black px-6 py-3 rounded-full flex items-center gap-2 border-2 border-rose-700 transition-all active:scale-95 shadow-xl">
                                <X size={20}/> CANCELAR TAREA
                            </button>
                        </div>
                    )}

                    {/* ================================================================ */}
                    {/* MODAL DE GUARDADO — Clasificación para español                  */}
                    {/* ================================================================ */}
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-2 text-white">
                                        <Tags className="text-orange-400"/> Clasificar WordPack — Español
                                    </h2>
                                    <button onClick={() => setShowSaveModal(false)} className="text-zinc-500 hover:text-white p-2 rounded-full hover:bg-zinc-800 transition">
                                        <X size={20}/>
                                    </button>
                                </div>

                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2 flex-1">

                                    {/* PASO 1 — NIVELES */}
                                    <div>
                                        <label className="block text-xs font-black text-orange-400 uppercase tracking-widest mb-3">
                                            1. Nivel del Estudiante <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span>
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_LEVELS.map(lvl => (
                                                <button key={lvl}
                                                    onClick={() => toggleSelection(saveLevels, setSaveLevels, lvl)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveLevels.includes(lvl) ? 'bg-orange-600 border-orange-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-orange-500 hover:text-orange-300'}`}>
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 2 — CATEGORÍAS */}
                                    <div>
                                        <label className="block text-xs font-black text-emerald-400 uppercase tracking-widest mb-3">
                                            2. Categoría Gramatical <span className="text-zinc-600 normal-case font-medium">(selección múltiple)</span>
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {NEW_CATS.map(cat => (
                                                <button key={cat.id}
                                                    onClick={() => toggleSelection(saveCats, setSaveCats, cat.id)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-all border-2 ${saveCats.includes(cat.id) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-zinc-950 border-zinc-700 text-zinc-400 hover:border-emerald-500 hover:text-emerald-300'}`}>
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* PASO 3 — TEMAS */}
                                    {saveCats.length > 0 && saveLevels.length > 0 && (
                                        <div className="bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                            <label className="block text-xs font-black text-amber-400 uppercase tracking-widest mb-1">
                                                3. Temas Específicos
                                            </label>

                                            {saveCats.map(catId => {
                                                if (catId === 'otro') return null;
                                                const catLabel = NEW_CATS.find(c => c.id === catId)?.label || catId;
                                                const topics   = getAllTopicsForCategory(catId, saveLevels);
                                                if (topics.length === 0) return null;
                                                return (
                                                    <div key={catId} className="bg-zinc-900/50 rounded-xl p-3 border border-zinc-800/50">
                                                        <h4 className="text-[10px] font-black uppercase text-zinc-500 tracking-wider mb-2">{catLabel}</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {topics.map(topic => (
                                                                <button key={topic}
                                                                    onClick={() => toggleSelection(saveTopics, setSaveTopics, topic)}
                                                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(topic) ? 'bg-zinc-200 border-zinc-200 text-zinc-900 shadow-sm' : 'bg-transparent border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200'}`}>
                                                                    {topic}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {saveCats.includes('otro') && (
                                                <div className="bg-amber-900/10 rounded-xl p-3 border border-amber-900/30">
                                                    <h4 className="text-[10px] font-black uppercase text-amber-600 tracking-wider mb-2">Macro Habilidades</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {MACRO_SKILLS.map(skill => (
                                                            <button key={skill}
                                                                onClick={() => toggleSelection(saveTopics, setSaveTopics, skill)}
                                                                className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all border ${saveTopics.includes(skill) ? 'bg-amber-500 border-amber-500 text-zinc-900 shadow-sm' : 'bg-transparent border-amber-900/50 text-amber-500 hover:border-amber-500'}`}>
                                                                {skill}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <button onClick={executeFinalSave}
                                    disabled={loading || saveLevels.length === 0 || saveCats.length === 0}
                                    className="w-full mt-6 bg-orange-600 hover:bg-orange-500 disabled:opacity-50 disabled:bg-zinc-800 disabled:cursor-not-allowed text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 shrink-0">
                                    <Save size={18}/>
                                    {(saveLevels.length === 0 || saveCats.length === 0) ? "Selecciona Nivel y Categoría" : "Confirmar y Guardar (Anita)"}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ================================================================ */}
                    {/* MODAL DE PREVIEW — elige a qué juego ir tras guardar            */}
                    {/* ================================================================ */}
                    {showPreviewModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">✅</div>
                                    <h2 className="text-xl font-black text-white">¡WordPack guardado!</h2>
                                    <p className="text-zinc-400 text-sm mt-1 font-medium">"{title}"</p>
                                    <p className="text-zinc-500 text-xs mt-2">{cards.length} tarjetas · Disponible en todos los juegos</p>
                                </div>

                                <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 text-center">Abrir directamente en...</p>

                                <div className="space-y-2 mb-4">
                                    {WORDPACK_GAMES.map(game => (
                                        <button key={game.id}
                                            onClick={() => window.location.href = `${game.file}?id=${savedDocId}`}
                                            className={`w-full flex items-center gap-3 p-3 rounded-xl border font-bold text-sm transition-all active:scale-95 hover:opacity-80 ${game.color}`}>
                                            <span className="text-xl">{game.emoji}</span>
                                            <span>{game.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <button onClick={goToHub}
                                    className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl font-bold text-sm transition-colors">
                                    Volver al Hub sin previsualizar
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ================================================================ */}
                    {/* HEADER                                                          */}
                    {/* ================================================================ */}
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href='index-es.html'} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800 hover:bg-zinc-800 transition-colors">
                            <ArrowLeft/>
                        </button>
                        <div className="flex items-center gap-3">
                            <span className="text-3xl hidden sm:block">🇲🇽</span>
                            <div>
                                <h1 className="text-2xl font-black italic text-orange-400 tracking-tight leading-none">WORDPACK BUILDER — ESPAÑOL</h1>
                                <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">Flashcards · Crucigrama · Anagrama · Memorama · Emoji</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setMagiaModal(true)} className="bg-orange-500 hover:bg-orange-400 text-black px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors">
                                <Sparkles size={18}/> <span className="hidden sm:inline">IA Assist</span>
                            </button>
                            <button onClick={handlePreSave} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors">
                                <Save size={18}/> <span className="hidden sm:inline">Guardar</span>
                            </button>
                        </div>
                    </header>

                    {/* CHIPS INFORMATIVOS DE JUEGOS */}
                    <div className="flex flex-wrap gap-2 mb-6">
                        {WORDPACK_GAMES.map(g => (
                            <span key={g.id} className={`text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border ${g.color}`}>
                                {g.emoji} {g.label}
                            </span>
                        ))}
                    </div>

                    {/* TÍTULO */}
                    <input value={title} onChange={e => setTitle(e.target.value)}
                        placeholder="Título del WordPack en español..."
                        className="w-full bg-transparent text-3xl sm:text-4xl font-black border-b-2 border-zinc-800 mb-8 outline-none focus:border-orange-500 pb-2 text-white placeholder-zinc-700"/>

                    {/* TARJETAS */}
                    <div className="space-y-4">
                        {cards.map((c, idx) => (
                            <div key={c.id} className="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 relative group transition-all hover:border-zinc-700 shadow-md">

                                <div className="absolute -left-3 -top-3 bg-orange-500 text-black w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shadow-lg border-4 border-zinc-950 z-10">
                                    {idx + 1}
                                </div>

                                {cards.length > 1 && (
                                    <button onClick={() => removeRow(c.id)}
                                        className="absolute -right-2 -top-2 bg-rose-500 hover:bg-rose-400 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg z-10">
                                        <Trash2 size={14}/>
                                    </button>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                    {/* EMOJI */}
                                    <div className="md:col-span-2 flex flex-col">
                                        <label className="text-[10px] font-bold text-zinc-500 uppercase mb-1 pl-1">Emojis</label>
                                        <input value={c.emojis}
                                            onChange={e => { const n = [...cards]; n[idx].emojis = e.target.value; setCards(n); }}
                                            placeholder="🚀✨"
                                            className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-2xl text-center outline-none focus:border-orange-500 h-full"/>
                                    </div>

                                    {/* ESPAÑOL E INGLÉS */}
                                    <div className="md:col-span-10 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-orange-400 uppercase mb-1 pl-1">Español (Frontal) 🇲🇽</label>
                                            <input value={c.wordEs}
                                                onChange={e => { const n = [...cards]; n[idx].wordEs = e.target.value; setCards(n); }}
                                                placeholder="palabra o frase en español..."
                                                className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-base font-bold text-white focus:border-orange-500 outline-none"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-sky-400 uppercase mb-1 pl-1">English (Back) 🇺🇸</label>
                                            <input value={c.wordEn}
                                                onChange={e => { const n = [...cards]; n[idx].wordEn = e.target.value; setCards(n); }}
                                                placeholder="English translation..."
                                                className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-base font-bold text-white focus:border-sky-500 outline-none"/>
                                        </div>
                                        <div className="sm:col-span-2">
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase mb-1 pl-1">Oración de Ejemplo (Español)</label>
                                            <input value={c.exampleEs || ''}
                                                onChange={e => { const n = [...cards]; n[idx].exampleEs = e.target.value; setCards(n); }}
                                                placeholder="Ej: Me gusta caminar por el parque."
                                                className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm text-zinc-300 focus:border-orange-500 outline-none italic"/>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-8">
                        <button onClick={addRow}
                            className="w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-bold flex items-center justify-center gap-2 hover:bg-zinc-900 hover:text-orange-500 hover:border-orange-900 transition-colors">
                            <Plus/> Añadir Tarjeta Manualmente
                        </button>
                    </div>

                    {/* ================================================================ */}
                    {/* MODAL IA ASSIST                                                 */}
                    {/* ================================================================ */}
                    {magiaModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-orange-500/20 p-2 rounded-xl text-orange-500"><Sparkles size={24}/></div>
                                        <div>
                                            <h3 className="font-black text-xl text-white">IA Assistant</h3>
                                            <p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Generador de Vocabulario en Español</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setMagiaModal(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                </div>

                                <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                                    {/* API KEY (componente compartido periplo-ai.js) */}
                                    <ApiKeyBar
                                        variant="modal"
                                        accentBtn="bg-orange-500 hover:bg-orange-400 text-black"
                                        placeholder="Tu API Key de Google..."
                                        apiKey={apiKey} setApiKey={setApiKey}
                                        models={availableModels} selectedModel={selectedModel} setSelectedModel={setSelectedModel}
                                        isLoading={isLoadingModels} onFetch={fetchModels}
                                        onClear={() => setAvailableModels([])}
                                    />

                                    {/* PROMPT */}
                                    <div>
                                        <label className="block text-xs font-black text-orange-400 uppercase tracking-widest mb-3">Instrucción Libre (Omni-Prompt)</label>
                                        <p className="text-xs text-zinc-400 mb-3 leading-relaxed">Pídele un tema en español, pégale una lista de palabras para que las traduzca, o pégale un texto y pídele que extraiga el vocabulario clave.</p>
                                        <p className="text-[10px] text-zinc-600 mb-3 italic">Ej: "Genera 15 palabras de comida mexicana" · "Extrae verbos de este texto: [pegar texto]" · "Vocabulario de viaje en español para principiantes"</p>
                                        <textarea value={omniPrompt} onChange={e => setOmniPrompt(e.target.value)}
                                            placeholder="Ej: Genera tarjetas con vocabulario de restaurante para nivel básico..."
                                            className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm text-white focus:border-orange-500 outline-none h-40 resize-none shadow-inner"/>
                                    </div>

                                    {/* SLIDER */}
                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">
                                            Cantidad de Tarjetas: <span className="text-orange-400">{targetCount}</span>
                                        </label>
                                        <input type="range" min="5" max="30" value={targetCount} onChange={e => setTargetCount(Number(e.target.value))} className="w-full accent-orange-500"/>
                                        <div className="flex justify-between text-[10px] text-zinc-600 mt-1"><span>5</span><span>30</span></div>
                                    </div>

                                    <button onClick={executeMagia} disabled={!apiKey || !omniPrompt || !selectedModel}
                                        className="w-full bg-orange-500 hover:bg-orange-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black py-4 rounded-xl uppercase tracking-widest flex items-center justify-center gap-2 transition-colors">
                                        <Sparkles size={18}/> Generar {targetCount} Tarjetas en Español
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<FCBuilder />);
    </script>
</body>
</html>

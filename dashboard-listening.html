<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8 flex items-center justify-center font-sans">
    <div id="root" class="w-full max-w-[1400px]"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { Youtube, Play, Loader2, ArrowLeft, KeyRound, Sparkles, BookOpen, Trash2, Plus, Clock, HelpCircle } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const extractYouTubeId = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const parseDirtyTranscript = (rawText) => {
            const lines = rawText.trim().split('\n');
            const transcript = [];
            let currentStart = 0;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (line.toLowerCase().startsWith('capítulo') || line.toLowerCase().startsWith('chapter')) continue;

                const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})/);
                if (timeMatch) {
                    let parts = timeMatch[0].split(':').map(Number);
                    if (parts.length === 2) currentStart = parts[0] * 60 + parts[1];
                    else if (parts.length === 3) currentStart = parts[0] * 3600 + parts[1] * 60 + parts[2];
                    
                    let textStr = line.substring(timeMatch[0].length);
                    textStr = textStr.replace(/^[\s\d]*(minutos?|mins?)?\s*(y)?\s*[\s\d]*(segundos?|segs?)/i, '').trim();
                    
                    if (textStr) transcript.push({ start: currentStart, text: textStr });
                    else transcript.push({ start: currentStart, text: "" });
                } else {
                    if (transcript.length > 0) {
                        const lastIndex = transcript.length - 1;
                        if (transcript[lastIndex].text === "") transcript[lastIndex].text = line;
                        else transcript[lastIndex].text += " " + line;
                    }
                }
            }

            for (let i = 0; i < transcript.length; i++) {
                transcript[i].end = transcript[i + 1] ? transcript[i + 1].start : transcript[i].start + 5; 
            }
            return transcript.filter(t => t.text.trim() !== "");
        };

        const SimpleDashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [title, setTitle] = useState("");
            const [videoUrl, setVideoUrl] = useState("");
            const [transcript, setTranscript] = useState("");
            
            const [thumbnailUrl, setThumbnailUrl] = useState("");
            const [isSaving, setIsSaving] = useState(false);

            const [isExtractingVocab, setIsExtractingVocab] = useState(false);
            const [vocabulary, setVocabulary] = useState([]);

            const [isExtractingQuestions, setIsExtractingQuestions] = useState(false);
            const [questions, setQuestions] = useState([]);

            useEffect(() => {
                const savedGeminiKey = localStorage.getItem('gemini_api_key');
                if (savedGeminiKey) setApiKey(savedGeminiKey);
            }, []);

            const videoId = extractYouTubeId(videoUrl);

            useEffect(() => {
                if (videoId) {
                    setThumbnailUrl(`https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`);
                } else {
                    setThumbnailUrl("");
                }
            }, [videoId]);

            const extractVocabWithAI = async () => {
                if (!apiKey) return alert("Necesitas pegar tu API Key de Gemini.");
                if (!transcript) return alert("Pega el transcript del video primero.");

                setIsExtractingVocab(true);
                try {
                    const cleanTrans = parseDirtyTranscript(transcript);
                    const prompt = `
                    Extrae de 5 a 10 palabras clave (phrasal verbs, slang, modismos) del siguiente transcript.
                    Calcula EN QUÉ SEGUNDO EMPIEZA la idea y EN QUÉ SEGUNDO TERMINA (Dale margen de 5-10 segundos al clip).
                    Devuelve ÚNICAMENTE un JSON con esta estructura exacta:
                    [
                        { 
                            "word": "let this sink in", 
                            "type": "idiom",
                            "definition": "realize or understand something deeply", 
                            "context": "Take a moment and let this sink in before answering.",
                            "startSeconds": 45,
                            "endSeconds": 55
                        }
                    ]
                    Transcript procesado: ${JSON.stringify(cleanTrans.map(t => '[' + t.start + 's] ' + t.text))}
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = resultText.match(/\[[\s\S]*\]/);
                    if (!jsonMatch) throw new Error("Formato incorrecto de la IA.");
                    
                    setVocabulary(JSON.parse(jsonMatch[0]));
                } catch (e) { alert("Error extrayendo vocabulario: " + e.message); } 
                finally { setIsExtractingVocab(false); }
            };

            const extractQuestionsWithAI = async () => {
                if (!apiKey) return alert("Necesitas pegar tu API Key de Gemini.");
                if (!transcript) return alert("Pega el transcript del video primero.");

                setIsExtractingQuestions(true);
                try {
                    const cleanTrans = parseDirtyTranscript(transcript);
                    const prompt = `
                    Eres un creador de exámenes TOEFL avanzado. Analiza TODO este transcript de principio a fin.
                    Extrae "clips de comprensión" basados en ideas completas (chistes, comparaciones, opiniones fuertes, inferencias).
                    
                    REGLA CLAVE 1: ¡NO TE DETENGAS AL PRINCIPIO! Distribuye las preguntas a lo largo de TODO el video. Revisa hasta el último segundo. Si el video es largo, extrae entre 5 y 12 preguntas de alta calidad.
                    REGLA CLAVE 2: NO fuerces preguntas en partes aburridas o silencios, pero asegúrate de no dejar vacíos largos si sí hay información útil.
                    
                    Para cada clip, crea una pregunta tipo TOEFL y encuentra el SEGUNDO EXACTO de inicio y fin (dale margen de 10-15 segundos al clip).
                    
                    Devuelve ÚNICAMENTE un JSON con esta estructura exacta:
                    [
                        {
                            "q": "What does he imply when he compares Guatemala to Guantanamo?",
                            "options": ["It is a dangerous place.", "It has a similar spelling.", "It is known for strict rules.", "It is a popular tourist spot."],
                            "correctIndex": 0,
                            "startSeconds": 120,
                            "endSeconds": 135
                        }
                    ]
                    Transcript procesado: ${JSON.stringify(cleanTrans.map(t => '[' + t.start + 's] ' + t.text))}
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = resultText.match(/\[[\s\S]*\]/);
                    if (!jsonMatch) throw new Error("Formato incorrecto de la IA.");
                    
                    setQuestions(JSON.parse(jsonMatch[0]));
                } catch (e) { alert("Error extrayendo preguntas: " + e.message); } 
                finally { setIsExtractingQuestions(false); }
            };

            const handleProcessAndCreate = async () => {
                if (!videoId || !transcript) return alert("Faltan campos obligatorios.");

                setIsSaving(true);
                try {
                    const cleanTranscriptArray = parseDirtyTranscript(transcript);
                    if (cleanTranscriptArray.length === 0) throw new Error("No se pudo extraer el texto.");

                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                    const finalTitle = title.trim() !== "" ? title.trim() : "Listening & Comp Activity";

                    const payload = {
                        title: finalTitle,
                        thumbnailUrl: thumbnailUrl,
                        type: 'LISTENING', 
                        videoId: videoId,
                        vocabulary: vocabulary,
                        questions: questions,
                        parsedTranscript: cleanTranscriptArray,
                        parentPath: parentPath,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };

                    const docRef = await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    window.location.href = `listening.html?id=${docRef.id}`;
                } catch (e) { alert("Error: " + e.message); } 
                finally { setIsSaving(false); }
            };

            const updateVocab = (index, field, value) => {
                const newArr = [...vocabulary];
                newArr[index][field] = value;
                setVocabulary(newArr);
            };

            const updateQuestion = (index, field, value) => {
                const newArr = [...questions];
                newArr[index][field] = value;
                setQuestions(newArr);
            };

            return (
                <div className="w-full flex flex-col lg:flex-row gap-8">
                    
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl w-full lg:w-1/3 relative flex flex-col h-[90vh]">
                        <button onClick={() => window.location.href = 'index.html'} className="absolute top-8 left-8 text-zinc-400 hover:text-white transition"><ArrowLeft size={24}/></button>
                        <h1 className="text-3xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                            <Youtube size={36}/> Creador AI
                        </h1>

                        <div className="bg-zinc-950/50 p-4 rounded-xl mb-6 flex gap-3 items-center border border-zinc-800 shrink-0">
                            <KeyRound className="text-zinc-500" size={20}/>
                            <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="API Key de Gemini..." className="flex-1 bg-transparent outline-none text-sm"/>
                        </div>

                        <div className="space-y-6 flex-1 flex flex-col overflow-y-auto custom-scrollbar pr-2">
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">URL de YouTube</label>
                                <input value={videoUrl} onChange={e => setVideoUrl(e.target.value)} placeholder="https://youtube.com/..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-rose-400 font-mono"/>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Título</label>
                                <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej: Entrevista a Elon Musk" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 font-bold"/>
                            </div>
                            <div className="flex-1 flex flex-col min-h-[200px]">
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Transcript Sucio</label>
                                <textarea value={transcript} onChange={e => setTranscript(e.target.value)} placeholder="Pega el transcript aquí..." className="flex-1 w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 resize-none font-mono text-sm text-zinc-400"></textarea>
                            </div>
                        </div>

                        <button onClick={handleProcessAndCreate} disabled={isSaving || !videoId || !transcript} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 text-xl mt-6 shrink-0">
                            {isSaving ? <Loader2 className="animate-spin"/> : <Play/>} Guardar y Ver
                        </button>
                    </div>

                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl flex-1 flex flex-col h-[90vh] overflow-y-auto custom-scrollbar">
                        
                        <div className="mb-12">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-black text-emerald-500 flex items-center gap-2"><BookOpen size={28}/> 1. Clips Vocabulario</h2>
                                <button onClick={extractVocabWithAI} disabled={isExtractingVocab || !transcript} className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white px-4 py-2 rounded-xl font-bold flex gap-2 transition-transform active:scale-95 text-sm">
                                    {isExtractingVocab ? <Loader2 className="animate-spin" size={18}/> : <Sparkles size={18}/>} Extraer Vocab
                                </button>
                            </div>

                            <div className="space-y-4">
                                {vocabulary.map((v, idx) => (
                                    <div key={idx} className="bg-zinc-950 p-5 rounded-2xl border border-zinc-800 relative group">
                                        <button onClick={() => setVocabulary(vocabulary.filter((_, i) => i !== idx))} className="absolute top-3 right-3 text-rose-500 hover:bg-rose-900/30 p-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button>
                                        <div className="flex gap-3 mb-3 pr-8">
                                            <input value={v.word} onChange={e => updateVocab(idx, 'word', e.target.value)} className="flex-1 bg-transparent outline-none font-black text-lg text-emerald-400 border-b border-transparent focus:border-emerald-800"/>
                                        </div>
                                        <div className="flex items-center gap-2 mb-3 bg-zinc-900 p-2 rounded-lg border border-zinc-800 w-max">
                                            <Clock size={14} className="text-zinc-500"/>
                                            <input type="number" value={v.startSeconds || 0} onChange={e => updateVocab(idx, 'startSeconds', parseInt(e.target.value)||0)} className="w-16 bg-zinc-950 text-center text-xs font-mono py-1 rounded text-emerald-400 border-none outline-none"/>
                                            <span className="text-xs text-zinc-600">to</span>
                                            <input type="number" value={v.endSeconds || 0} onChange={e => updateVocab(idx, 'endSeconds', parseInt(e.target.value)||0)} className="w-16 bg-zinc-950 text-center text-xs font-mono py-1 rounded text-rose-400 border-none outline-none"/>
                                        </div>
                                        <input value={v.definition} onChange={e => updateVocab(idx, 'definition', e.target.value)} className="w-full bg-transparent outline-none text-sm text-zinc-300"/>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div>
                            <div className="flex justify-between items-center mb-6 border-t border-zinc-800 pt-8">
                                <h2 className="text-2xl font-black text-indigo-400 flex items-center gap-2"><HelpCircle size={28}/> 2. Clips Comprensión</h2>
                                <button onClick={extractQuestionsWithAI} disabled={isExtractingQuestions || !transcript} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-4 py-2 rounded-xl font-bold flex gap-2 transition-transform active:scale-95 text-sm">
                                    {isExtractingQuestions ? <Loader2 className="animate-spin" size={18}/> : <Sparkles size={18}/>} Extraer Preguntas
                                </button>
                            </div>

                            <div className="space-y-4">
                                {questions.map((q, qIdx) => (
                                    <div key={qIdx} className="bg-zinc-950 p-5 rounded-2xl border border-zinc-800 relative group">
                                        <button onClick={() => setQuestions(questions.filter((_, i) => i !== qIdx))} className="absolute top-3 right-3 text-rose-500 hover:bg-rose-900/30 p-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button>
                                        
                                        <input value={q.q} onChange={e => updateQuestion(qIdx, 'q', e.target.value)} placeholder="Pregunta estilo TOEFL..." className="w-full bg-transparent outline-none font-black text-lg text-indigo-400 border-b border-transparent focus:border-indigo-800 mb-3 pr-8"/>
                                        
                                        <div className="flex items-center gap-2 mb-4 bg-zinc-900 p-2 rounded-lg border border-zinc-800 w-max">
                                            <Clock size={14} className="text-zinc-500"/>
                                            <span className="text-xs font-bold text-zinc-500">CLIP DE INFERENCIA:</span>
                                            <input type="number" value={q.startSeconds || 0} onChange={e => updateQuestion(qIdx, 'startSeconds', parseInt(e.target.value)||0)} className="w-16 bg-zinc-950 text-center text-xs font-mono py-1 rounded text-indigo-400 border-none outline-none"/>
                                            <span className="text-xs text-zinc-600">to</span>
                                            <input type="number" value={q.endSeconds || 0} onChange={e => updateQuestion(qIdx, 'endSeconds', parseInt(e.target.value)||0)} className="w-16 bg-zinc-950 text-center text-xs font-mono py-1 rounded text-rose-400 border-none outline-none"/>
                                        </div>

                                        <div className="space-y-2">
                                            {q.options.map((opt, oIdx) => (
                                                <div key={oIdx} className="flex items-center gap-3">
                                                    <input type="radio" name={`radio-${qIdx}`} checked={q.correctIndex === oIdx} onChange={() => updateQuestion(qIdx, 'correctIndex', oIdx)} className="w-4 h-4 text-indigo-600 focus:ring-indigo-500 cursor-pointer"/>
                                                    <input value={opt} onChange={e => {
                                                        const newOpts = [...q.options];
                                                        newOpts[oIdx] = e.target.value;
                                                        updateQuestion(qIdx, 'options', newOpts);
                                                    }} className={`flex-1 p-2 rounded-lg outline-none text-sm border ${q.correctIndex === oIdx ? 'bg-indigo-900/20 border-indigo-800 font-bold text-indigo-300' : 'bg-zinc-900 border-zinc-800 text-zinc-400'}`}/>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </div>

                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SimpleDashboard />);
    </script>
</body>
</html>

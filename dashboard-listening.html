<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8 flex items-center justify-center font-sans">
    <div id="root" class="w-full max-w-[1400px]"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } from 'firebase/firestore';
        import { Youtube, Play, Loader2, ArrowLeft, KeyRound, Sparkles, BookOpen, Trash2, Clock, HelpCircle, Tags, X, Save, Scissors } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============================================================
        // TAXONOMÍA MAESTRA
        // ============================================================
        const TAXONOMY={
            basic:{
                grammar:["Modal Verbs","Present Simple","Present Continuous","Future (Going to)", "Otro"],
                verbs:["Pack 1: Daily Routine","Pack 2: Home & Communication","Pack 3: Travel & Conflict","Pack 4: Business & Emotion","Pack 5: Action & Strategy","Pack 6: Thoughts & Senses","Pack 7: Social & Science","Pack 8: Corporate & Economy","Pack 9: Medical & Survival", "Otro"],
                nouns:["Pack 1: Modern Nomad","Pack 2: Hungry Traveler","Pack 3: Daily Grind","Pack 4: Urban Chaos","Pack 5: Weekend Getaway", "Otro"],
                adjectives:["Pack 1: Personality & Looks","Pack 2: Feelings & State","Pack 3: Places & Vibes","Pack 4: The -ed/-ing Trap","Pack 5: Opinions & Taste", "Otro"],
                key_structs:["WH Questions","FANBOYS & Correlative","Subordinating Conj.","Prep. Time","Prep. Place","Prep. Movement & Other","Possessive & Object Pron.","Quantifiers","Frequency Adverbs", "Otro"],
                otro: ["Otro"]
            },
            advanced:{
                grammar:["Past Simple","Second Conditional","Past Continuous","Past Future Intention", "Otro"],
                verbs:["Irregular A-F","Irregular G-M","Irregular R-S","Irregular T-W","Regular /t/ Sound","Regular /d/ Sound","Regular /ɪd/ Sound", "Otro"],
                nouns:["Pack 1: Success & Failure","Pack 2: Truth & Lies","Pack 3: Media & Ent.","Pack 4: Compound Nouns","Pack 5: Env. & Science", "Otro"],
                adjectives:["Short Comparatives","Long Comparatives","Irregular Comparatives","Superlatives", "Otro"],
                key_structs:["Used to / Use to","Comparative Rules","Superlative Rules","Idiomatic Expressions","Possessive Nouns","Relative Clauses","Modals of Possibility","Passive Voice", "Otro"],
                otro: ["Otro"]
            },
            pro:{
                grammar:["Present/Past Perfect","Perfect Continuous","Third Conditional","Mixed Conditionals", "Otro"],
                verbs:["Phrasal Verbs 2","Idiomatic Expressions","Sayings & Proverbs","Advanced Collocations", "Otro"],
                nouns:["Pack 1: Law & Politics","Pack 2: Finance & Econ.","Pack 3: Collective Nouns","Pack 4: Uncountables","Pack 5: Formal & Academic", "Otro"],
                adjectives:["Formal Register Adj.","Nuance & Tone Adj.", "Otro"],
                key_structs:["Inversion","Cleft Sentences","Participle Clauses","Wish & Regret","Double Comparatives", "Otro"],
                otro: ["Otro"]
            },
            otro: {
                otro: ["Otro"]
            }
        };

        const extractYouTubeId = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const parseDirtyTranscript = (rawText) => {
            const lines = rawText.trim().split('\n');
            const transcript = [];
            let currentStart = 0;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (line.toLowerCase().startsWith('capítulo') || line.toLowerCase().startsWith('chapter')) continue;

                const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})/);
                if (timeMatch) {
                    let parts = timeMatch[0].split(':').map(Number);
                    if (parts.length === 2) currentStart = parts[0] * 60 + parts[1];
                    else if (parts.length === 3) currentStart = parts[0] * 3600 + parts[1] * 60 + parts[2];
                    
                    let textStr = line.substring(timeMatch[0].length);
                    textStr = textStr.replace(/^[\s\d]*(minutos?|mins?)?\s*(y)?\s*[\s\d]*(segundos?|segs?)/i, '').trim();
                    
                    if (textStr) transcript.push({ start: currentStart, text: textStr });
                    else transcript.push({ start: currentStart, text: "" });
                } else {
                    if (transcript.length > 0) {
                        const lastIndex = transcript.length - 1;
                        if (transcript[lastIndex].text === "") transcript[lastIndex].text = line;
                        else transcript[lastIndex].text += " " + line;
                    }
                }
            }

            for (let i = 0; i < transcript.length; i++) {
                transcript[i].end = transcript[i + 1] ? transcript[i + 1].start : transcript[i].start + 5; 
            }
            return transcript.filter(t => t.text.trim() !== "");
        };

        const SimpleDashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [title, setTitle] = useState("");
            const [videoUrl, setVideoUrl] = useState("");
            const [transcript, setTranscript] = useState("");
            
            const [thumbnailUrl, setThumbnailUrl] = useState("");
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const [isExtractingClips, setIsExtractingClips] = useState(false);
            const [clips, setClips] = useState([]);

            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveLevel, setSaveLevel] = useState('basic');
            const [saveCat, setSaveCat] = useState('grammar');
            const [saveTopic, setSaveTopic] = useState(TAXONOMY['basic']['grammar'][0]);

            useEffect(() => {
                const savedGeminiKey = localStorage.getItem('gemini_api_key');
                if (savedGeminiKey) setApiKey(savedGeminiKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setTitle(data.title);
                            setVideoUrl(`https://www.youtube.com/watch?v=${data.videoId}`);
                            setEditingId(editId);
                            
                            if (data.clips) {
                                setClips(data.clips);
                            } else if (data.vocabulary || data.questions) {
                                setClips([{
                                    startSeconds: 0, endSeconds: 600, reason: "Legacy content (no clip format)",
                                    vocabulary: data.vocabulary || [], questions: data.questions || []
                                }]);
                            }
                            
                            if (data.tags) {
                                setSaveLevel(data.tags.level || 'basic');
                                setSaveCat(data.tags.category || 'grammar');
                                setSaveTopic(data.tags.topic || TAXONOMY['basic']['grammar'][0]);
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (TAXONOMY[saveLevel] && TAXONOMY[saveLevel][saveCat]) {
                    setSaveTopic(TAXONOMY[saveLevel][saveCat][0] || 'Otro');
                }
            }, [saveLevel, saveCat]);

            const videoId = extractYouTubeId(videoUrl);

            useEffect(() => {
                if (videoId) {
                    setThumbnailUrl(`https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`);
                } else {
                    setThumbnailUrl("");
                }
            }, [videoId]);

            const extractClipsWithAI = async () => {
                if (!apiKey) return alert("Necesitas pegar tu API Key de Gemini.");
                if (!transcript) return alert("Pega el transcript del video primero.");

                setIsExtractingClips(true);
                try {
                    const cleanTrans = parseDirtyTranscript(transcript);
const prompt = `
                    Eres un arquitecto pedagógico experto creador de material TOEFL. Tu tarea es analizar este transcript de YouTube y convertirlo en una lección estructurada por "Clips" (segmentos).
                    
                    REGLA DE ORO / GOLDEN RULE:
                    ALL OUTPUT CONTENT MUST BE IN ENGLISH. The "reason", the "definition", the question "q", and all "options" MUST BE STRICTLY IN ADVANCED ENGLISH. DO NOT output any Spanish text inside the JSON values.

                    REGLAS ESTRICTAS:
                    1. IGNORA BASURA: Elimina y salta por completo cualquier segmento donde hablen de patrocinadores (Sponsors, Skillshare, BetterHelp, etc.), pidan likes/suscribirse, o intros/outros largos.
                    2. SEGMENTA EL CONTENIDO: Divide las partes útiles del video en "Clips". Un clip debe durar entre 25 segundos y 3 minutos, dependiendo de qué tan densa sea la información.
                    3. CANTIDAD PROPORCIONAL: Adapta el contenido al tiempo. Si el clip dura menos de 1 min, saca 1-2 palabras clave y 1 pregunta general. Si dura más de 1 min, extrae de 2 a 4 palabras clave (idioms, phrasal verbs, slang) y de 2 a 3 preguntas de comprensión (una general y detalles específicos).
                    4. TÍTULO DEL CLIP ('reason'): El campo "reason" DEBE ser un título corto, atrapante y al grano (ej. "What's wrong with home organization?" o "The hidden trap"). MÁXIMO 6 PALABRAS.
                    5. PRECISIÓN DE TIEMPO: Calcula los segundos exactos de inicio (startSeconds) y fin (endSeconds) para el clip general, y también para cada palabra/pregunta.

                    Devuelve ÚNICAMENTE un JSON con esta estructura exacta (arreglo de objetos):
                    [
                        {
                            "startSeconds": 15,
                            "endSeconds": 90,
                            "reason": "The hidden trap of organizing",
                            "vocabulary": [
                                { "word": "let this sink in", "type": "idiom", "definition": "realize or understand deeply", "startSeconds": 25, "endSeconds": 30 },
                                { "word": "get rid of", "type": "phrasal verb", "definition": "eliminate or discard something", "startSeconds": 45, "endSeconds": 50 }
                            ],
                            "questions": [
                                { "q": "What is the main concern described in this segment?", "options": ["Option A", "Option B", "Option C", "Option D"], "correctIndex": 0, "startSeconds": 45, "endSeconds": 70 },
                                { "q": "Why does the speaker compare the system to a trap?", "options": ["Option A", "Option B", "Option C", "Option D"], "correctIndex": 1, "startSeconds": 75, "endSeconds": 85 }
                            ]
                        }
                    ]
                    Transcript procesado: ${JSON.stringify(cleanTrans.map(t => '[' + t.start + 's] ' + t.text))}
                    `;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = resultText.match(/\[[\s\S]*\]/);
                    if (!jsonMatch) throw new Error("Formato incorrecto de la IA.");
                    
                    setClips(JSON.parse(jsonMatch[0]));
                } catch (e) { alert("Error extrayendo clips: " + e.message); } 
                finally { setIsExtractingClips(false); }
            };

            const updateClip = (cIdx, field, value) => {
                const newClips = [...clips];
                newClips[cIdx][field] = value;
                setClips(newClips);
            };

            const updateClipVocab = (cIdx, vIdx, field, value) => {
                const newClips = [...clips];
                newClips[cIdx].vocabulary[vIdx][field] = value;
                setClips(newClips);
            };

            const updateClipQuestion = (cIdx, qIdx, field, value) => {
                const newClips = [...clips];
                newClips[cIdx].questions[qIdx][field] = value;
                setClips(newClips);
            };

            const handlePreSave = () => {
                if (!videoId) return alert("Falta el URL del video.");
                if (!editingId && !transcript) return alert("Pega el transcript para crear la actividad.");
                setShowSaveModal(true);
            };

            const executeFinalSave = async () => {
                setShowSaveModal(false);
                setIsSaving(true);
                try {
                    let cleanTranscriptArray = [];
                    if (transcript) cleanTranscriptArray = parseDirtyTranscript(transcript);

                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                    
                    let flatVocab = [];
                    let flatQuestions = [];
                    clips.forEach(clip => {
                        if(clip.vocabulary) flatVocab = [...flatVocab, ...clip.vocabulary];
                        if(clip.questions) flatQuestions = [...flatQuestions, ...clip.questions];
                    });

                    const payload = {
                        title: title.trim() !== "" ? title.trim() : "Listening & Comp Activity",
                        thumbnailUrl: thumbnailUrl,
                        type: 'LISTENING', 
                        videoId: videoId,
                        clips: clips,
                        vocabulary: flatVocab, 
                        questions: flatQuestions, 
                        tags: { level: saveLevel, category: saveCat, topic: saveTopic },
                        parentPath: parentPath,
                        updatedAt: serverTimestamp()
                    };

                    if (transcript) payload.parsedTranscript = cleanTranscriptArray;

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes', editingId), payload);
                        window.location.href = `listening.html?id=${editingId}`;
                    } else {
                        payload.createdAt = serverTimestamp();
                        const docRef = await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                        window.location.href = `listening.html?id=${docRef.id}`;
                    }
                } catch (e) { alert("Error: " + e.message); } 
                finally { setIsSaving(false); }
            };

            return (
                <div className="w-full flex flex-col lg:flex-row gap-8 relative">
                    
                    {showSaveModal && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-black flex items-center gap-2 text-white"><Tags className="text-rose-500"/> Clasificar Listening</h2>
                                    <button onClick={()=>setShowSaveModal(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
                                </div>
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">1. Nivel</label>
                                        <select value={saveLevel} onChange={e=>{setSaveLevel(e.target.value);const cats=Object.keys(TAXONOMY[e.target.value]||{});setSaveCat(cats[0]||'grammar');}}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-rose-500 cursor-pointer">
                                            {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">2. Categoría</label>
                                        <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-rose-500 cursor-pointer capitalize">
                                            {Object.keys(TAXONOMY[saveLevel]||{}).map(c=><option key={c} value={c}>{c.replace('_',' ')}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">3. Tema Específico</label>
                                        <select value={saveTopic} onChange={e=>setSaveTopic(e.target.value)}
                                            className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-rose-500 cursor-pointer">
                                            {(TAXONOMY[saveLevel]?.[saveCat]||[]).map(t=><option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <button onClick={executeFinalSave} disabled={isSaving} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
                                    {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} Confirmar y Guardar
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl w-full lg:w-1/3 relative flex flex-col h-[90vh]">
                        <button onClick={() => window.location.href = 'index.html'} className="absolute top-8 left-8 text-zinc-400 hover:text-white transition"><ArrowLeft size={24}/></button>
                        <h1 className="text-3xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                            <Youtube size={36}/> Creador AI
                        </h1>

                        <div className="bg-zinc-950/50 p-4 rounded-xl mb-6 flex gap-3 items-center border border-zinc-800 shrink-0">
                            <KeyRound className="text-zinc-500" size={20}/>
                            <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="API Key de Gemini..." className="flex-1 bg-transparent outline-none text-sm"/>
                        </div>

                        <div className="space-y-6 flex-1 flex flex-col overflow-y-auto custom-scrollbar pr-2">
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">URL de YouTube</label>
                                <input value={videoUrl} onChange={e => setVideoUrl(e.target.value)} placeholder="https://youtube.com/..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-rose-400 font-mono"/>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Título</label>
                                <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej: Entrevista a Elon Musk" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 font-bold"/>
                            </div>
                            <div className="flex-1 flex flex-col min-h-[200px]">
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Transcript Sucio</label>
                                <textarea value={transcript} onChange={e => setTranscript(e.target.value)} placeholder="Pega el transcript aquí..." className="flex-1 w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 resize-none font-mono text-sm text-zinc-400"></textarea>
                            </div>
                        </div>

                        <button onClick={handlePreSave} disabled={isSaving || !videoId || (!editingId && !transcript)} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 text-xl mt-6 shrink-0">
                            {isSaving ? <Loader2 className="animate-spin"/> : <Play/>} Guardar y Ver
                        </button>
                    </div>

                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl flex-1 flex flex-col h-[90vh]">
                        
                        <div className="flex justify-between items-center mb-6 shrink-0 border-b border-zinc-800 pb-6">
                            <div>
                                <h2 className="text-2xl font-black text-amber-500 flex items-center gap-2"><Scissors size={28}/> Línea de Tiempo</h2>
                                <p className="text-zinc-500 text-sm mt-1">La IA ignorará los anuncios y creará bloques de aprendizaje útiles.</p>
                            </div>
                            <button onClick={extractClipsWithAI} disabled={isExtractingClips || !transcript} className="bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-white px-5 py-3 rounded-xl font-bold flex gap-2 transition-transform active:scale-95 shadow-lg shadow-amber-500/20">
                                {isExtractingClips ? <Loader2 className="animate-spin" size={20}/> : <Sparkles size={20}/>} Generar Clips
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-6 pb-6">
                            {clips.length === 0 && !isExtractingClips && (
                                <div className="h-full flex flex-col items-center justify-center text-zinc-600 space-y-3">
                                    <Scissors size={48} strokeWidth={1}/>
                                    <p>Presiona "Generar Clips" para comenzar a fragmentar el video.</p>
                                </div>
                            )}

                            {clips.map((clip, cIdx) => (
                                <div key={cIdx} className="bg-black/40 border border-zinc-800 rounded-2xl overflow-hidden shadow-lg relative group">
                                    <button onClick={() => setClips(clips.filter((_, i) => i !== cIdx))} className="absolute top-4 right-4 text-zinc-600 hover:text-rose-500 hover:bg-rose-500/10 p-2 rounded-lg transition-colors z-10"><Trash2 size={18}/></button>
                                    
                                    <div className="bg-zinc-900/80 p-4 border-b border-zinc-800 flex flex-col gap-2">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-amber-500/20 text-amber-400 px-3 py-1 rounded-full text-xs font-black tracking-widest uppercase">Clip {cIdx + 1}</span>
                                            <input value={clip.reason || ""} onChange={e => updateClip(cIdx, 'reason', e.target.value)} placeholder="Topic of this clip..." className="flex-1 bg-transparent text-white font-bold outline-none border-b border-transparent focus:border-amber-500/50"/>
                                        </div>
                                        <div className="flex items-center gap-2 bg-black/50 p-1.5 rounded-lg w-max border border-zinc-800">
                                            <Clock size={14} className="text-zinc-500 ml-1"/>
                                            <input type="number" value={clip.startSeconds || 0} onChange={e => updateClip(cIdx, 'startSeconds', parseInt(e.target.value)||0)} className="w-12 bg-transparent text-center text-xs font-mono text-zinc-300 outline-none"/>
                                            <span className="text-xs text-zinc-600">-</span>
                                            <input type="number" value={clip.endSeconds || 0} onChange={e => updateClip(cIdx, 'endSeconds', parseInt(e.target.value)||0)} className="w-12 bg-transparent text-center text-xs font-mono text-zinc-300 outline-none"/>
                                        </div>
                                    </div>

                                    <div className="p-4 grid grid-cols-1 xl:grid-cols-2 gap-4">
                                        <div className="bg-emerald-950/10 border border-emerald-900/30 rounded-xl p-4">
                                            <h4 className="text-xs font-black text-emerald-500 uppercase tracking-widest mb-4 flex items-center gap-2"><BookOpen size={14}/> Vocabulario</h4>
                                            <div className="space-y-3">
                                                {(clip.vocabulary || []).map((v, vIdx) => (
                                                    <div key={vIdx} className="bg-zinc-950 border border-zinc-800 p-3 rounded-lg relative">
                                                        <button onClick={() => { const nc=[...clips]; nc[cIdx].vocabulary.splice(vIdx,1); setClips(nc); }} className="absolute top-2 right-2 text-zinc-600 hover:text-rose-500"><X size={14}/></button>
                                                        <input value={v.word} onChange={e => updateClipVocab(cIdx, vIdx, 'word', e.target.value)} className="w-full bg-transparent font-bold text-emerald-400 text-sm outline-none mb-1 pr-6"/>
                                                        <input value={v.definition} onChange={e => updateClipVocab(cIdx, vIdx, 'definition', e.target.value)} className="w-full bg-transparent text-zinc-400 text-xs outline-none italic mb-2"/>
                                                        <div className="flex items-center gap-1 opacity-60">
                                                            <Clock size={10} className="text-zinc-500"/>
                                                            <input type="number" value={v.startSeconds||0} onChange={e=>updateClipVocab(cIdx,vIdx,'startSeconds',parseInt(e.target.value)||0)} className="w-8 bg-transparent text-center text-[10px] font-mono text-emerald-400 outline-none"/>
                                                            <span className="text-[10px] text-zinc-600">-</span>
                                                            <input type="number" value={v.endSeconds||0} onChange={e=>updateClipVocab(cIdx,vIdx,'endSeconds',parseInt(e.target.value)||0)} className="w-8 bg-transparent text-center text-[10px] font-mono text-emerald-400 outline-none"/>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-indigo-950/10 border border-indigo-900/30 rounded-xl p-4">
                                            <h4 className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-4 flex items-center gap-2"><HelpCircle size={14}/> Preguntas</h4>
                                            <div className="space-y-3">
                                                {(clip.questions || []).map((q, qIdx) => (
                                                    <div key={qIdx} className="bg-zinc-950 border border-zinc-800 p-3 rounded-lg relative">
                                                        <button onClick={() => { const nc=[...clips]; nc[cIdx].questions.splice(qIdx,1); setClips(nc); }} className="absolute top-2 right-2 text-zinc-600 hover:text-rose-500"><X size={14}/></button>
                                                        <input value={q.q} onChange={e => updateClipQuestion(cIdx, qIdx, 'q', e.target.value)} className="w-full bg-transparent font-bold text-indigo-300 text-sm outline-none mb-2 pr-6"/>
                                                        <div className="space-y-1 mb-2">
                                                            {q.options.map((opt, oIdx) => (
                                                                <div key={oIdx} className="flex items-center gap-2">
                                                                    <input type="radio" checked={q.correctIndex === oIdx} onChange={()=>updateClipQuestion(cIdx, qIdx, 'correctIndex', oIdx)} className="w-3 h-3 text-indigo-500 accent-indigo-500 cursor-pointer"/>
                                                                    <input value={opt} onChange={e=>{ const no=[...q.options]; no[oIdx]=e.target.value; updateClipQuestion(cIdx, qIdx, 'options', no); }} className={`flex-1 bg-transparent text-xs outline-none ${q.correctIndex===oIdx ? 'text-indigo-400 font-bold' : 'text-zinc-500'}`}/>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex items-center gap-1 opacity-60">
                                                            <Clock size={10} className="text-zinc-500"/>
                                                            <input type="number" value={q.startSeconds||0} onChange={e=>updateClipQuestion(cIdx,qIdx,'startSeconds',parseInt(e.target.value)||0)} className="w-8 bg-transparent text-center text-[10px] font-mono text-indigo-400 outline-none"/>
                                                            <span className="text-[10px] text-zinc-600">-</span>
                                                            <input type="number" value={q.endSeconds||0} onChange={e=>updateClipQuestion(cIdx,qIdx,'endSeconds',parseInt(e.target.value)||0)} className="w-8 bg-transparent text-center text-[10px] font-mono text-indigo-400 outline-none"/>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SimpleDashboard />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-8 flex items-center justify-center">
    <div id="root" class="w-full max-w-3xl"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { Youtube, FileText, Play, Loader2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const extractYouTubeId = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const SimpleDashboard = () => {
            const [title, setTitle] = useState("");
            const [videoUrl, setVideoUrl] = useState("");
            const [transcript, setTranscript] = useState("");
            const [isSaving, setIsSaving] = useState(false);

            const videoId = extractYouTubeId(videoUrl);

            const handleCreateAndRedirect = async () => {
                if (!title) return alert("Ponle un título wey.");
                if (!videoId) return alert("Ese URL de YouTube no es válido.");
                if (!transcript) return alert("Pega el transcript de YouTube.");

                setIsSaving(true);
                try {
                    const payload = {
                        title: title,
                        type: 'LISTENING_KARAOKE',
                        videoId: videoId,
                        rawTranscript: transcript, // Guardamos el texto tal cual
                        createdAt: serverTimestamp()
                    };

                    const docRef = await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    
                    // Magia: Te redirige automáticamente a la pantalla del alumno con el ID recién creado
                    window.location.href = `listening.html?id=${docRef.id}`;
                } catch (e) { 
                    alert("Error guardando: " + e.message); 
                    setIsSaving(false);
                }
            };

            return (
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl">
                    <h1 className="text-3xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                        <Youtube size={36}/> Creador de Karaoke
                    </h1>

                    <div className="space-y-6">
                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Título de la Actividad</label>
                            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej: Entrevista a Elon Musk" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-lg font-bold"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">URL del Video de YouTube</label>
                            <input value={videoUrl} onChange={e => setVideoUrl(e.target.value)} placeholder="https://www.youtube.com/watch?v=..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-rose-400 font-mono"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2 flex justify-between">
                                <span>Transcript (Copia y pega con los tiempos)</span>
                            </label>
                            <textarea value={transcript} onChange={e => setTranscript(e.target.value)} placeholder="0:00&#10;Hola a todos&#10;0:02&#10;Bienvenidos al canal..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 h-64 resize-y font-mono text-sm text-zinc-400"></textarea>
                        </div>

                        <button onClick={handleCreateAndRedirect} disabled={isSaving || !videoId || !transcript || !title} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 text-xl mt-4">
                            {isSaving ? <Loader2 className="animate-spin"/> : <Play/>} Crear y Ver Actividad
                        </button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SimpleDashboard />);
    </script>
</body>
</html>

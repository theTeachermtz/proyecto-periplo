<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8 flex items-center justify-center font-sans">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { Youtube, Play, Loader2, ArrowLeft, KeyRound, Sparkles, BookOpen, Trash2, Plus, Clock } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const extractYouTubeId = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const parseDirtyTranscript = (rawText) => {
            const lines = rawText.trim().split('\n');
            const transcript = [];
            let currentStart = 0;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (line.toLowerCase().startsWith('capítulo') || line.toLowerCase().startsWith('chapter')) continue;

                const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})/);
                if (timeMatch) {
                    let parts = timeMatch[0].split(':').map(Number);
                    if (parts.length === 2) currentStart = parts[0] * 60 + parts[1];
                    else if (parts.length === 3) currentStart = parts[0] * 3600 + parts[1] * 60 + parts[2];
                    
                    let textStr = line.substring(timeMatch[0].length);
                    textStr = textStr.replace(/^[\s\d]*(minutos?|mins?)?\s*(y)?\s*[\s\d]*(segundos?|segs?)/i, '').trim();
                    
                    if (textStr) transcript.push({ start: currentStart, text: textStr });
                    else transcript.push({ start: currentStart, text: "" });
                } else {
                    if (transcript.length > 0) {
                        const lastIndex = transcript.length - 1;
                        if (transcript[lastIndex].text === "") transcript[lastIndex].text = line;
                        else transcript[lastIndex].text += " " + line;
                    }
                }
            }

            for (let i = 0; i < transcript.length; i++) {
                transcript[i].end = transcript[i + 1] ? transcript[i + 1].start : transcript[i].start + 5; 
            }
            return transcript.filter(t => t.text.trim() !== "");
        };

        const formatTime = (secs) => {
            if (isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        const SimpleDashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [title, setTitle] = useState("");
            const [videoUrl, setVideoUrl] = useState("");
            const [transcript, setTranscript] = useState("");
            
            const [channelName, setChannelName] = useState("");
            const [thumbnailUrl, setThumbnailUrl] = useState("");
            const [isFetchingMeta, setIsFetchingMeta] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [isExtractingVocab, setIsExtractingVocab] = useState(false);
            const [vocabulary, setVocabulary] = useState([]);

            useEffect(() => {
                const savedGeminiKey = localStorage.getItem('gemini_api_key');
                if (savedGeminiKey) setApiKey(savedGeminiKey);
            }, []);

            const videoId = extractYouTubeId(videoUrl);

            useEffect(() => {
                if (videoId) {
                    setThumbnailUrl(`https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`);
                } else {
                    setThumbnailUrl("");
                }
            }, [videoId]);

            const extractVocabWithAI = async () => {
                if (!apiKey) return alert("Necesitas pegar tu API Key de Gemini arriba para usar la IA.");
                if (!transcript) return alert("Pega el transcript del video primero.");

                setIsExtractingVocab(true);
                try {
                    const cleanTrans = parseDirtyTranscript(transcript);
                    const prompt = `
                    Eres un profesor de idiomas creando material interactivo.
                    Analiza el siguiente transcript y extrae de 5 a 8 palabras clave (phrasal verbs, slang, modismos).
                    
                    Por cada palabra, debes encontrar en el transcript EN QUÉ SEGUNDO EMPIEZA la idea y EN QUÉ SEGUNDO TERMINA (Dale un margen de 5 a 10 segundos al clip para que el alumno entienda el contexto completo).

                    Devuelve ÚNICAMENTE un JSON con esta estructura exacta:
                    [
                        { 
                            "word": "let this sink in", 
                            "type": "idiom",
                            "definition": "realize or understand something deeply", 
                            "context": "Take a moment and let this sink in before answering.",
                            "startSeconds": 45,
                            "endSeconds": 55
                        }
                    ]

                    Transcript procesado (con tiempos):
                    ${JSON.stringify(cleanTrans.map(t => '[' + t.start + 's] ' + t.text))}
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = resultText.match(/\[[\s\S]*\]/);
                    if (!jsonMatch) throw new Error("La IA no devolvió el formato correcto.");
                    
                    const newVocab = JSON.parse(jsonMatch[0]);
                    setVocabulary(newVocab);
                } catch (e) {
                    alert("Error extrayendo vocabulario. Revisa tu API key. Detalle: " + e.message);
                } finally {
                    setIsExtractingVocab(false);
                }
            };

            const handleProcessAndCreate = async () => {
                if (!videoId || !transcript) return alert("Faltan campos obligatorios (URL o Transcript).");

                setIsSaving(true);
                try {
                    const cleanTranscriptArray = parseDirtyTranscript(transcript);
                    if (cleanTranscriptArray.length === 0) throw new Error("No se pudo extraer el texto del transcript.");

                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                    const finalTitle = title.trim() !== "" ? title.trim() : "Listening & Vocab Activity";

                    const payload = {
                        title: finalTitle,
                        thumbnailUrl: thumbnailUrl,
                        type: 'LISTENING', 
                        videoId: videoId,
                        vocabulary: vocabulary,
                        parsedTranscript: cleanTranscriptArray,
                        parentPath: parentPath,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };

                    const docRef = await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    window.location.href = `listening.html?id=${docRef.id}`;
                } catch (e) { 
                    alert("Error: " + e.message); 
                } finally {
                    setIsSaving(false);
                }
            };

            const updateVocab = (index, field, value) => {
                const newVocab = [...vocabulary];
                newVocab[index][field] = value;
                setVocabulary(newVocab);
            };

            return (
                <div className="w-full flex flex-col lg:flex-row gap-8">
                    
                    {/* PANEL IZQUIERDO */}
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl flex-1 relative flex flex-col h-[90vh]">
                        <button onClick={() => window.location.href = 'index.html'} className="absolute top-8 left-8 text-zinc-400 hover:text-white transition"><ArrowLeft size={24}/></button>
                        <h1 className="text-3xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                            <Youtube size={36}/> Creador Premium
                        </h1>

                        <div className="bg-zinc-950/50 p-4 rounded-xl mb-6 flex gap-3 items-center border border-zinc-800 shrink-0">
                            <KeyRound className="text-zinc-500" size={20}/>
                            <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="Tu API Key de Gemini..." className="flex-1 bg-transparent outline-none text-sm"/>
                        </div>

                        <div className="space-y-6 flex-1 flex flex-col overflow-y-auto custom-scrollbar pr-2">
                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">URL de YouTube</label>
                                <input value={videoUrl} onChange={e => setVideoUrl(e.target.value)} placeholder="https://youtube.com/..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-rose-400 font-mono"/>
                            </div>

                            {thumbnailUrl && (
                                <div className="flex gap-4 items-center bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                                    <img src={thumbnailUrl} alt="Thumbnail" className="w-32 h-auto rounded-lg shadow-md object-cover border border-zinc-800"/>
                                    <div>
                                        <p className="text-xs text-emerald-400 font-bold uppercase tracking-wider mb-1">Video Detectado</p>
                                        <p className="text-zinc-400 text-xs">La miniatura se usará como fondo cinemático.</p>
                                    </div>
                                </div>
                            )}

                            <div>
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Título de la Actividad</label>
                                <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej: Entrevista a Elon Musk" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 font-bold"/>
                            </div>

                            <div className="flex-1 flex flex-col min-h-[200px]">
                                <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Transcript (Con Tiempos)</label>
                                <textarea value={transcript} onChange={e => setTranscript(e.target.value)} placeholder="Pega el transcript sucio aquí..." className="flex-1 w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 resize-none font-mono text-sm text-zinc-400"></textarea>
                            </div>
                        </div>

                        <button onClick={handleProcessAndCreate} disabled={isSaving || !videoId || !transcript} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 text-xl mt-6 shrink-0">
                            {isSaving ? <Loader2 className="animate-spin"/> : <Play/>} Crear y Ver Actividad
                        </button>
                    </div>

                    {/* PANEL DERECHO */}
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl flex-1 flex flex-col h-[90vh]">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-black text-emerald-500 flex items-center gap-2">
                                <BookOpen size={28}/> Clips de Vocabulario
                            </h2>
                            <button onClick={extractVocabWithAI} disabled={isExtractingVocab || !transcript} className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white px-4 py-2 rounded-xl font-bold flex gap-2 transition-transform active:scale-95 text-sm">
                                {isExtractingVocab ? <Loader2 className="animate-spin" size={18}/> : <Sparkles size={18}/>} 
                                {vocabulary.length > 0 ? "Re-generar" : "Extraer Vocabulario"}
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4">
                            {vocabulary.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-zinc-600 border-2 border-dashed border-zinc-800 rounded-2xl p-8 text-center">
                                    <Sparkles size={48} className="mb-4 opacity-50"/>
                                    <p className="font-bold">Pega tu transcript y dale al botón.</p>
                                    <p className="text-sm mt-2">La IA leerá el texto, sacará Phrasal Verbs y marcará los segundos exactos del clip para tu alumno.</p>
                                </div>
                            ) : (
                                <>
                                    <button onClick={() => setVocabulary([{word:'', type:'slang', definition:'', context:'', startSeconds:0, endSeconds:10}, ...vocabulary])} className="w-full py-2 border-2 border-dashed border-zinc-700 text-zinc-400 hover:text-white hover:border-zinc-500 rounded-xl font-bold flex justify-center items-center gap-2 transition mb-4">
                                        <Plus size={18}/> Añadir manual
                                    </button>
                                    
                                    {vocabulary.map((v, idx) => (
                                        <div key={idx} className="bg-zinc-950 p-5 rounded-2xl border border-zinc-800 relative group">
                                            <button onClick={() => setVocabulary(vocabulary.filter((_, i) => i !== idx))} className="absolute top-3 right-3 text-rose-500 hover:bg-rose-900/30 p-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button>
                                            
                                            <div className="flex gap-3 mb-3 pr-8">
                                                <input value={v.word} onChange={e => updateVocab(idx, 'word', e.target.value)} placeholder="Palabra / Slang" className="flex-1 bg-transparent outline-none font-black text-lg text-emerald-400 border-b border-transparent focus:border-emerald-800"/>
                                                <input value={v.type} onChange={e => updateVocab(idx, 'type', e.target.value)} placeholder="Tipo" className="w-24 bg-zinc-900 px-2 py-1 rounded-lg outline-none text-xs font-bold text-zinc-400 uppercase text-center border border-zinc-800"/>
                                            </div>

                                            <div className="flex items-center gap-2 mb-3 bg-zinc-900 p-2 rounded-lg border border-zinc-800 w-max">
                                                <Clock size={14} className="text-zinc-500"/>
                                                <span className="text-xs font-bold text-zinc-500">CLIP:</span>
                                                <input type="number" value={v.startSeconds || 0} onChange={e => updateVocab(idx, 'startSeconds', parseInt(e.target.value)||0)} className="w-16 bg-zinc-950 text-center text-xs font-mono py-1 rounded border border-zinc-700 outline-none text-emerald-400"/>
                                                <span className="text-xs text-zinc-600">to</span>
                                                <input type="number" value={v.endSeconds || 0} onChange={e => updateVocab(idx, 'endSeconds', parseInt(e.target.value)||0)} className="w-16 bg-zinc-950 text-center text-xs font-mono py-1 rounded border border-zinc-700 outline-none text-rose-400"/>
                                                <span className="text-xs text-zinc-500 ml-2">({formatTime(v.startSeconds)} - {formatTime(v.endSeconds)})</span>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                <input value={v.definition} onChange={e => updateVocab(idx, 'definition', e.target.value)} placeholder="Definición..." className="w-full bg-transparent outline-none text-sm text-zinc-300 border-b border-transparent focus:border-zinc-700"/>
                                                <textarea value={v.context} onChange={e => updateVocab(idx, 'context', e.target.value)} placeholder="Contexto..." className="w-full bg-zinc-900 p-3 rounded-xl outline-none text-sm italic text-zinc-500 resize-none h-12 border border-zinc-800 focus:border-zinc-600"></textarea>
                                            </div>
                                        </div>
                                    ))}
                                </>
                            )}
                        </div>
                    </div>

                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SimpleDashboard />);
    </script>
</body>
</html>

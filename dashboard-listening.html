<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-8 flex items-center justify-center font-sans">
    <div id="root" class="w-full max-w-3xl"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { Youtube, Play, Loader2, ArrowLeft } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const extractYouTubeId = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        // ALGORITMO MAGISTRAL PARA LIMPIAR YOUTUBE (SIN NECESIDAD DE IA)
        const parseDirtyTranscript = (rawText) => {
            const lines = rawText.trim().split('\n');
            const transcript = [];
            let currentStart = 0;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (line.toLowerCase().startsWith('capítulo') || line.toLowerCase().startsWith('chapter')) continue;

                // Busca el relojito al inicio (0:01, 1:03, etc)
                const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})/);
                
                if (timeMatch) {
                    let parts = timeMatch[0].split(':').map(Number);
                    if (parts.length === 2) currentStart = parts[0] * 60 + parts[1];
                    else if (parts.length === 3) currentStart = parts[0] * 3600 + parts[1] * 60 + parts[2];
                    
                    // Cortamos el relojito de la línea
                    let textStr = line.substring(timeMatch[0].length);
                    
                    // ESTA ES LA MAGIA: Elimina "1 minuto y 3 segundos", "8 segundos", etc. del texto automáticamente
                    textStr = textStr.replace(/^\s*\d*\s*(minuto|minutos)?\s*(y)?\s*\d*\s*(segundo|segundos)/i, '').trim();
                    
                    if (textStr) transcript.push({ start: currentStart, text: textStr });
                    else transcript.push({ start: currentStart, text: "" });
                } else {
                    // Si no es tiempo, es continuación del diálogo anterior
                    if (transcript.length > 0) {
                        const lastIndex = transcript.length - 1;
                        if (transcript[lastIndex].text === "") transcript[lastIndex].text = line;
                        else transcript[lastIndex].text += " " + line;
                    }
                }
            }

            // Calculamos cuánto dura cada frase
            for (let i = 0; i < transcript.length; i++) {
                transcript[i].end = transcript[i + 1] ? transcript[i + 1].start : transcript[i].start + 5; 
            }
            return transcript.filter(t => t.text.trim() !== "");
        };

        const SimpleDashboard = () => {
            const [title, setTitle] = useState("");
            const [videoUrl, setVideoUrl] = useState("");
            const [transcript, setTranscript] = useState("");
            const [isSaving, setIsSaving] = useState(false);

            const videoId = extractYouTubeId(videoUrl);

            const handleProcessAndCreate = async () => {
                if (!title || !videoId || !transcript) return alert("Llena todos los campos.");

                setIsSaving(true);
                try {
                    // Limpieza instantánea sin IA
                    const cleanTranscriptArray = parseDirtyTranscript(transcript);
                    
                    if (cleanTranscriptArray.length === 0) {
                        throw new Error("No se pudo extraer el texto. Revisa que sí tenga los números de tiempo.");
                    }

                    // Recuperamos tu carpeta para que no se pierda en el index
                    const params = new URLSearchParams(window.location.search);
                    const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';

                    // Payload EXACTO al que tu index espera
                    const payload = {
                        title: title,
                        type: 'LISTENING', 
                        videoId: videoId,
                        clips: [], 
                        questions: [],
                        parsedTranscript: cleanTranscriptArray,
                        parentPath: parentPath,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp()
                    };

                    const docRef = await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    
                    // Redirige directo a la actividad ya terminada
                    window.location.href = `listening.html?id=${docRef.id}`;
                } catch (e) { 
                    alert("Error: " + e.message); 
                } finally {
                    setIsSaving(false);
                }
            };

            const goBack = () => {
                const params = new URLSearchParams(window.location.search);
                const parentPath = params.get('folder') ? decodeURIComponent(params.get('folder')) : '';
                window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
            };

            return (
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl relative">
                    <button onClick={goBack} className="absolute top-8 left-8 text-zinc-400 hover:text-white transition"><ArrowLeft size={24}/></button>
                    
                    <h1 className="text-3xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                        <Youtube size={36}/> Creador de Karaoke Rápido
                    </h1>

                    <div className="space-y-6">
                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Título de la Actividad</label>
                            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej: Entrevista" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-lg font-bold"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">URL de YouTube</label>
                            <input value={videoUrl} onChange={e => setVideoUrl(e.target.value)} placeholder="https://www.youtube.com/watch?v=..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-rose-400 font-mono"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Transcript Sucio</label>
                            <textarea value={transcript} onChange={e => setTranscript(e.target.value)} placeholder="Pega el texto de YouTube directo aquí..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 h-64 resize-y font-mono text-sm text-zinc-400"></textarea>
                        </div>

                        <button onClick={handleProcessAndCreate} disabled={isSaving || !videoId || !transcript || !title} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 text-xl mt-4">
                            {isSaving ? <><Loader2 className="animate-spin"/> Creando...</> : <><Play/> Procesar Textos y Ver Karaoke</>}
                        </button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SimpleDashboard />);
    </script>
</body>
</html>

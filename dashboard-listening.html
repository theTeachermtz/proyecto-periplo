<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Listening | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-8 flex items-center justify-center font-sans">
    <div id="root" class="w-full max-w-3xl"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { Youtube, Sparkles, Loader2, KeyRound } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const extractYouTubeId = (url) => {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const SimpleDashboard = () => {
            const [apiKey, setApiKey] = useState("");
            const [title, setTitle] = useState("");
            const [videoUrl, setVideoUrl] = useState("");
            const [transcript, setTranscript] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) setApiKey(savedKey);
            }, []);

            const videoId = extractYouTubeId(videoUrl);

            const handleProcessAndCreate = async () => {
                if (!apiKey) return alert("Necesitas tu API Key de Gemini.");
                if (!title || !videoId || !transcript) return alert("Llena todos los campos.");

                setIsGenerating(true);
                try {
                    // PROMPT ESTRICTO PARA LIMPIAR LA BASURA DE YOUTUBE
                    const prompt = `
                    Eres un experto procesando transcripciones sucias copiadas de la interfaz de YouTube en español.
                    El usuario copió un texto que concatena el tiempo digital, el tiempo escrito en letras y el diálogo, todo pegado sin espacios.
                    
                    EJEMPLOS DEL FORMATO SUCIO QUE RECIBIRÁS:
                    - "0:011 segundoIt's about my 10th time"
                    - "1:031 minuto y 3 segundossir? Uh, the best part"
                    - "Capítulo 2: Bike ride"
                    
                    REGLAS OBLIGATORIAS:
                    1. Extrae SOLO EL DIÁLOGO HABLADO. Elimina por completo los números del inicio, y las palabras "segundo", "segundos", "minuto", "minutos" y la "y" que los conecta.
                    2. Elimina cualquier línea que sea un título de capítulo (ej. "Capítulo X: ...").
                    3. Calcula el SEGUNDO EXACTO de inicio. Ej: "1:03..." -> start: 63. "0:08..." -> start: 8.
                    4. El texto resultante debe ser perfecto para un subtítulo limpio.
                    
                    Ejemplo de resultado esperado:
                    [
                        {"start": 1, "text": "It's about my 10th time in this country..."},
                        {"start": 63, "text": "sir? Uh, the best part here in the Philippines is..."}
                    ]
                    
                    TRANSCRIPT SUCIO A PROCESAR:
                    ${transcript}

                    RESPONDE ÚNICAMENTE CON UN ARREGLO JSON VÁLIDO CON LA ESTRUCTURA EXACTA DEL EJEMPLO. NO AGREGUES MÁS TEXTO.
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const cleanTranscriptArray = JSON.parse(resultText);

                    for (let i = 0; i < cleanTranscriptArray.length; i++) {
                        cleanTranscriptArray[i].end = cleanTranscriptArray[i + 1] ? cleanTranscriptArray[i + 1].start : cleanTranscriptArray[i].start + 5; 
                    }

                    const payload = {
                        title: title,
                        type: 'LISTENING_KARAOKE',
                        videoId: videoId,
                        parsedTranscript: cleanTranscriptArray,
                        createdAt: serverTimestamp()
                    };

                    const docRef = await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), payload);
                    window.location.href = `listening.html?id=${docRef.id}`;
                } catch (e) { 
                    alert("Error procesando: " + e.message + "\n\nRevisa la consola para más detalles."); 
                    console.error(e);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl">
                    <h1 className="text-3xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                        <Youtube size={36}/> AI Karaoke Builder
                    </h1>

                    <div className="bg-zinc-950/50 p-4 rounded-xl mb-6 flex gap-3 items-center border border-zinc-800">
                        <KeyRound className="text-zinc-500" size={20}/>
                        <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} placeholder="Tu API Key de Gemini..." className="flex-1 bg-transparent outline-none text-sm"/>
                    </div>

                    <div className="space-y-6">
                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Título de la Actividad</label>
                            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej: Luke Damant en Filipinas" className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-lg font-bold"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">URL de YouTube</label>
                            <input value={videoUrl} onChange={e => setVideoUrl(e.target.value)} placeholder="https://www.youtube.com/watch?v=..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 text-rose-400 font-mono"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase tracking-widest block mb-2">Transcript Sucio (Pega directo de YouTube)</label>
                            <textarea value={transcript} onChange={e => setTranscript(e.target.value)} placeholder="0:088 segundoson my way to Tondo..." className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none focus:border-rose-500 h-48 resize-y font-mono text-sm text-zinc-400"></textarea>
                        </div>

                        <button onClick={handleProcessAndCreate} disabled={isGenerating || !videoId || !transcript || !title} className="w-full bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 text-xl mt-4">
                            {isGenerating ? <><Loader2 className="animate-spin"/> Limpiando texto...</> : <><Sparkles/> Crear Actividad Limpia</>}
                        </button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SimpleDashboard />);
    </script>
</body>
</html>

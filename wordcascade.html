<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Cascade | Periplo Games</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☄️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'reward-anim': 'rewardAnim 1.2s ease-in-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-6px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(6px, 0, 0)' }
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        rewardAnim: {
                            '0%': { transform: 'scale(0.5) translateY(40px)', opacity: '0' },
                            '15%': { transform: 'scale(1.1) translateY(0)', opacity: '1' },
                            '25%': { transform: 'scale(1) translateY(0)', opacity: '1' },
                            '75%': { transform: 'scale(1) translateY(0)', opacity: '1' },
                            '100%': { transform: 'scale(1.1) translateY(-40px)', opacity: '0' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        }
                    }
                }
            }
        };
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        @media (hover: hover) { .hover-scale:hover { transform: scale(1.05); transition: transform 0.2s; } }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        .drag-active { cursor: grabbing !important; z-index: 50; }
        .word-card { touch-action: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

        /* Progress bar animation */
        .progress-fill { transition: width 0.4s ease-out; }

        /* Tanda badge pulse */
        @keyframes tandaPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(99,102,241,0); }
        }
        .tanda-badge { animation: tandaPulse 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-900 text-white h-[100dvh] w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Zap, Heart, Trophy, Play, AlertCircle, RefreshCcw, ArrowLeft, Pause, BookOpen, UserCircle2, ChevronRight, Star, Lock, CheckCircle2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WORDS_PER_TANDA = 5; // 5 palabras por categoría por tanda

        const CATEGORY_COLORS = [
            { bg: 'bg-blue-500', border: 'border-blue-600', shadow: 'shadow-blue-500/50', text: 'text-white', light: 'bg-blue-500/20', accent: '#3b82f6' },
            { bg: 'bg-rose-500', border: 'border-rose-600', shadow: 'shadow-rose-500/50', text: 'text-white', light: 'bg-rose-500/20', accent: '#f43f5e' },
            { bg: 'bg-amber-500', border: 'border-amber-600', shadow: 'shadow-amber-500/50', text: 'text-white', light: 'bg-amber-500/20', accent: '#f59e0b' },
            { bg: 'bg-emerald-500', border: 'border-emerald-600', shadow: 'shadow-emerald-500/50', text: 'text-white', light: 'bg-emerald-500/20', accent: '#10b981' }
        ];

        // Audio helpers
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'fanfare') {
                // Mini fanfare de victoria de tanda
                [[523, 0], [659, 0.1], [784, 0.2], [1047, 0.3]].forEach(([freq, delay]) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'triangle';
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0, audioCtx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + delay + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.3);
                    o.start(audioCtx.currentTime + delay);
                    o.stop(audioCtx.currentTime + delay + 0.3);
                });
            }
        };

        // ============================================================
        // LÓGICA DE TANDAS
        // Cada tanda = WORDS_PER_TANDA palabras de CADA categoría mezcladas
        // ============================================================
        const buildTandas = (categories) => {
            const numCats = categories.length;
            // Cuántas tandas puede haber basado en la categoría con menos palabras
            const minItems = Math.min(...categories.map(c => (c.items || []).length));
            const totalTandas = Math.ceil(minItems / WORDS_PER_TANDA);
            
            const tandas = [];
            for (let t = 0; t < totalTandas; t++) {
                let tandaWords = [];
                categories.forEach((cat, catIdx) => {
                    const start = t * WORDS_PER_TANDA;
                    const slice = (cat.items || []).slice(start, start + WORDS_PER_TANDA);
                    slice.forEach(item => {
                        const englishWord = item.en || item.word || "";
                        if (englishWord.trim()) {
                            tandaWords.push({
                                text: englishWord,
                                es: item.es || "¡Correcto!",
                                emoji: item.emoji || "❓",
                                categoryId: catIdx,
                                categoryName: cat.name
                            });
                        }
                    });
                });
                // Mezclar las palabras de la tanda
                for (let i = tandaWords.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tandaWords[i], tandaWords[j]] = [tandaWords[j], tandaWords[i]];
                }
                if (tandaWords.length > 0) tandas.push(tandaWords);
            }
            return tandas;
        };

        const CascadeGame = () => {
            const [gameState, setGameState] = useState('loading');
            const [gameData, setGameData] = useState(null);
            const [errorMessage, setErrorMessage] = useState("");
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('wc_playerName') || "");
            const [quizId, setQuizId] = useState(null);

            // Tandas
            const [tandas, setTandas] = useState([]);
            const [currentTanda, setCurrentTanda] = useState(0);
            const [savedTanda, setSavedTanda] = useState(null);

            // Estado del juego activo
            const [wordPool, setWordPool] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [score, setScore] = useState(0);
            const [lives, setLives] = useState(3);
            const [combo, setCombo] = useState(0);
            const [fallingY, setFallingY] = useState(0);
            const [tandaProgress, setTandaProgress] = useState(0); // cuántas palabras completadas en esta tanda
            const [totalTandaWords, setTotalTandaWords] = useState(0);

            const [rewardText, setRewardText] = useState(null);
            const isRewardingRef = useRef(false);
            const gameLoopRef = useRef(null);
            const fallSpeedRef = useRef(0.15);
            const isDraggingRef = useRef(false);
            const wordRef = useRef(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [isWrong, setIsWrong] = useState(false);

            // Cargar datos
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { setErrorMessage("No se encontró ID."); setGameState('error'); return; }
                setQuizId(id);

                // Cargar progreso guardado
                const saved = localStorage.getItem(`wc_prog_${id}`);
                if (saved) setSavedTanda(JSON.parse(saved).tanda);

                getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id)).then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (!data.content?.categories) { setErrorMessage("Estructura inválida."); setGameState('error'); return; }
                        setGameData(data);
                        const built = buildTandas(data.content.categories);
                        setTandas(built);
                        setGameState('menu');
                    } else { setErrorMessage("Juego no encontrado."); setGameState('error'); }
                }).catch(e => { setErrorMessage(e.message); setGameState('error'); });
            }, []);

            const startTanda = (tandaIndex) => {
                if (!tandas[tandaIndex]) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const words = [...tandas[tandaIndex]];
                setCurrentTanda(tandaIndex);
                setWordPool(words.slice(1));
                setCurrentWord(words[0]);
                setScore(0);
                setLives(3);
                setCombo(0);
                setFallingY(0);
                setIsWrong(false);
                setRewardText(null);
                setTandaProgress(0);
                setTotalTandaWords(words.length);
                fallSpeedRef.current = 0.15;
                isRewardingRef.current = false;
                isDraggingRef.current = false;
                playSound('pop');
                setGameState('playing');
            };

            const spawnNextWord = useCallback((pool) => {
                if (pool.length === 0) {
                    // ¡Tanda completada!
                    playSound('fanfare');
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 } });
                    
                    // Guardar progreso si hay más tandas
                    if (currentTanda + 1 < tandas.length) {
                        localStorage.setItem(`wc_prog_${quizId}`, JSON.stringify({ tanda: currentTanda + 1 }));
                    } else {
                        localStorage.removeItem(`wc_prog_${quizId}`);
                    }
                    setGameState('tanda_complete');
                    return;
                }
                const nextPool = [...pool];
                const next = nextPool.pop();
                setWordPool(nextPool);
                setCurrentWord(next);
                setFallingY(0);
                setIsWrong(false);
                isDraggingRef.current = false;
                isRewardingRef.current = false;
                playSound('pop');
            }, [currentTanda, tandas.length, quizId]);

            // Game loop
            useEffect(() => {
                if (gameState !== 'playing' || !currentWord) return;
                const loop = () => {
                    if (!isDraggingRef.current && !isRewardingRef.current) {
                        setFallingY(prev => {
                            const nextY = prev + fallSpeedRef.current;
                            if (nextY >= 90) {
                                handleMiss();
                                return 0;
                            }
                            return nextY;
                        });
                    }
                    gameLoopRef.current = requestAnimationFrame(loop);
                };
                gameLoopRef.current = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(gameLoopRef.current);
            }, [gameState, currentWord]);

            const handleMiss = () => {
                cancelAnimationFrame(gameLoopRef.current);
                playSound('error');
                setCombo(0);
                setTandaProgress(p => p + 1);
                setLives(prev => {
                    const next = prev - 1;
                    if (next <= 0) { setGameState('gameover'); return 0; }
                    return next;
                });
                spawnNextWord(wordPool);
            };

            const handlePointerDown = (e) => {
                if (gameState !== 'playing' || isWrong || isRewardingRef.current) return;
                isDraggingRef.current = true;
                e.target.setPointerCapture(e.pointerId);
                setDragPos({ x: e.clientX, y: e.clientY });
            };
            const handlePointerMove = (e) => {
                if (!isDraggingRef.current || gameState !== 'playing') return;
                setDragPos({ x: e.clientX, y: e.clientY });
            };
            const handlePointerUp = (e) => {
                if (!isDraggingRef.current || gameState !== 'playing') return;
                isDraggingRef.current = false;
                e.target.releasePointerCapture(e.pointerId);
                const wordElement = wordRef.current;
                if (wordElement) wordElement.style.display = 'none';
                const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
                if (wordElement) wordElement.style.display = 'flex';
                const dropZone = elementBelow?.closest('[data-category]');
                if (dropZone) evaluateMatch(parseInt(dropZone.getAttribute('data-category'), 10), dropZone);
                else setDragPos({ x: 0, y: 0 });
            };

            const evaluateMatch = (selectedId, dropElement) => {
                if (selectedId === currentWord.categoryId) {
                    playSound('success');
                    const newCombo = combo + 1;
                    setCombo(newCombo);
                    setScore(prev => prev + (10 * newCombo));
                    setTandaProgress(p => p + 1);
                    fallSpeedRef.current = Math.min(0.5, 0.15 + (score / 1000));
                    dropElement.classList.remove('animate-pop-in');
                    void dropElement.offsetWidth;
                    dropElement.classList.add('animate-pop-in');
                    confetti({ particleCount: 15, spread: 40, origin: { x: dropElement.getBoundingClientRect().left / window.innerWidth + 0.1, y: 0.9 }, colors: ['#ffffff', '#fde047'] });
                    isRewardingRef.current = true;
                    setRewardText(currentWord.es);
                    setTimeout(() => {
                        setRewardText(null);
                        spawnNextWord(wordPool);
                    }, 1200);
                } else {
                    playSound('error');
                    setCombo(0);
                    setIsWrong(true);
                    setTimeout(() => { setIsWrong(false); setDragPos({ x: 0, y: 0 }); }, 400);
                }
            };

            const togglePause = () => {
                if (gameState === 'playing') setGameState('paused');
                else if (gameState === 'paused') setGameState('playing');
            };

            // ─── SCREENS ────────────────────────────────────────────

            if (gameState === 'loading') return (
                <div className="flex h-full items-center justify-center bg-slate-950">
                    <Zap className="animate-pulse text-indigo-500" size={48} />
                </div>
            );

            if (gameState === 'error') return (
                <div className="flex flex-col h-full items-center justify-center p-8 text-center bg-slate-950">
                    <AlertCircle className="text-red-500 mb-4" size={64}/>
                    <h2 className="text-2xl font-bold mb-2">Oops...</h2>
                    <p className="text-slate-400 max-w-md mb-6">{errorMessage}</p>
                    <button onClick={() => window.history.back()} className="bg-slate-800 px-6 py-3 rounded-xl font-bold flex items-center gap-2 active-scale"><ArrowLeft size={20}/> Volver</button>
                </div>
            );

            if (gameState === 'menu') return (
                <div className="flex flex-col h-full bg-slate-900 overflow-hidden relative">
                    <div className="absolute inset-0 bg-gradient-to-b from-indigo-900/20 to-slate-900 z-0 pointer-events-none"></div>

                    <div className="relative z-10 p-6 flex items-center justify-between border-b border-white/10">
                        <button onClick={() => window.history.back()} className="p-2 bg-white/5 hover:bg-white/10 rounded-xl transition active-scale"><ArrowLeft size={20}/></button>
                        <div className="flex items-center gap-2 text-indigo-400 font-bold"><Zap size={20}/> Word Cascade</div>
                        <div className="w-10"/>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center p-6 z-10 gap-6 overflow-y-auto">
                        <h1 className="text-4xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
                            {gameData?.title}
                        </h1>
                        <p className="text-slate-400 text-center text-sm max-w-xs">Arrastra cada palabra a su categoría antes de que toque el suelo.</p>

                        {/* Nombre */}
                        <div className="bg-slate-800/50 p-4 rounded-2xl border border-white/10 w-full max-w-xs flex items-center gap-3">
                            <UserCircle2 className="text-indigo-400 shrink-0"/>
                            <input type="text" value={playerName}
                                onChange={e => { setPlayerName(e.target.value); localStorage.setItem('wc_playerName', e.target.value); }}
                                placeholder="Escribe tu nombre..."
                                className="bg-transparent border-none outline-none text-white font-bold w-full placeholder-slate-500"/>
                        </div>

                        {/* Tandas */}
                        <div className="w-full max-w-xs space-y-2">
                            <p className="text-xs font-black text-slate-500 uppercase tracking-widest text-center mb-3">
                                {tandas.length} Tandas · {WORDS_PER_TANDA} palabras/cat
                            </p>
                            {tandas.map((tanda, i) => {
                                const isSaved = savedTanda !== null && i === savedTanda;
                                const isLocked = savedTanda !== null && i > savedTanda;
                                const isCompleted = savedTanda !== null && i < savedTanda;
                                const isPlayable = !isLocked;

                                return (
                                    <button key={i}
                                        disabled={isLocked || !playerName.trim()}
                                        onClick={() => isPlayable && startTanda(i)}
                                        className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all active-scale
                                            ${isLocked ? 'border-slate-800 bg-slate-900/50 opacity-40 cursor-not-allowed' : 
                                              isCompleted ? 'border-emerald-500/30 bg-emerald-500/5 hover:bg-emerald-500/10' :
                                              isSaved ? 'border-indigo-500/50 bg-indigo-500/10 tanda-badge hover:bg-indigo-500/20' :
                                              'border-white/10 bg-white/5 hover:bg-white/10'}`}>
                                        <div className="flex items-center gap-3">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-sm
                                                ${isCompleted ? 'bg-emerald-500 text-white' :
                                                  isSaved ? 'bg-indigo-600 text-white' :
                                                  isLocked ? 'bg-slate-800 text-slate-600' :
                                                  'bg-slate-800 text-white'}`}>
                                                {isCompleted ? <CheckCircle2 size={18}/> : isLocked ? <Lock size={16}/> : i + 1}
                                            </div>
                                            <div className="text-left">
                                                <p className="font-black text-sm text-white">Tanda {i + 1}</p>
                                                <p className="text-xs text-slate-500">{tanda.length} palabras</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {isSaved && <span className="text-[10px] font-black text-indigo-400 bg-indigo-500/20 px-2 py-1 rounded-lg uppercase tracking-wider">Continuar</span>}
                                            {isCompleted && <span className="text-[10px] font-black text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-lg uppercase">✓ Lista</span>}
                                            {!isLocked && !isCompleted && !isSaved && <ChevronRight size={16} className="text-slate-500"/>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        {savedTanda !== null && (
                            <button onClick={() => {
                                localStorage.removeItem(`wc_prog_${quizId}`);
                                setSavedTanda(null);
                            }} className="text-xs text-slate-600 hover:text-slate-400 transition-colors underline">
                                Reiniciar progreso
                            </button>
                        )}
                    </div>
                </div>
            );

            // TANDA COMPLETADA
            if (gameState === 'tanda_complete') {
                const isLastTanda = currentTanda + 1 >= tandas.length;
                return (
                    <div className="flex flex-col h-full bg-slate-900 items-center justify-center p-6 text-center">
                        <div className="animate-pop-in space-y-6 max-w-sm w-full">
                            <div className={`w-20 h-20 mx-auto rounded-3xl flex items-center justify-center text-4xl shadow-2xl ${isLastTanda ? 'bg-yellow-500' : 'bg-emerald-500'}`}>
                                {isLastTanda ? '🏆' : '⭐'}
                            </div>
                            <div>
                                <h2 className="text-3xl font-black text-white">{isLastTanda ? '¡Completado!' : `Tanda ${currentTanda + 1} Lista`}</h2>
                                <p className="text-slate-400 mt-1 font-bold">
                                    {isLastTanda ? '¡Terminaste todas las tandas!' : `Siguiente: Tanda ${currentTanda + 2}`}
                                </p>
                            </div>

                            <div className="bg-slate-800/50 rounded-2xl p-5 border border-white/10 grid grid-cols-2 gap-4">
                                <div>
                                    <Trophy size={20} className="text-yellow-400 mx-auto mb-1"/>
                                    <p className="text-2xl font-black">{score}</p>
                                    <p className="text-xs text-slate-500 uppercase tracking-wider">Puntos</p>
                                </div>
                                <div>
                                    <Star size={20} className="text-indigo-400 mx-auto mb-1"/>
                                    <p className="text-2xl font-black">{combo}x</p>
                                    <p className="text-xs text-slate-500 uppercase tracking-wider">Combo máx</p>
                                </div>
                            </div>

                            <div className="space-y-3">
                                {!isLastTanda && (
                                    <button onClick={() => startTanda(currentTanda + 1)}
                                        className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-lg active-scale">
                                        Tanda {currentTanda + 2} <ChevronRight size={20}/>
                                    </button>
                                )}
                                <button onClick={() => setGameState('menu')}
                                    className="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active-scale">
                                    <ArrowLeft size={18}/> Ver Tandas
                                </button>
                                {isLastTanda && (
                                    <button onClick={() => { localStorage.removeItem(`wc_prog_${quizId}`); setSavedTanda(null); setGameState('menu'); }}
                                        className="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-lg active-scale">
                                        <RefreshCcw size={18}/> Jugar de nuevo
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // GAME OVER
            if (gameState === 'gameover') return (
                <div className="flex flex-col h-full bg-slate-900 items-center justify-center p-6 text-center">
                    <div className="animate-pop-in space-y-5 max-w-sm w-full">
                        <div className="w-20 h-20 mx-auto bg-rose-500 rounded-3xl flex items-center justify-center text-4xl shadow-2xl">💥</div>
                        <div>
                            <h2 className="text-3xl font-black">¡Se acabaron las vidas!</h2>
                            <p className="text-slate-400 mt-1">Tanda {currentTanda + 1}</p>
                        </div>
                        <div className="bg-slate-800/50 rounded-2xl p-4 border border-white/10">
                            <p className="text-4xl font-black text-white">{score}</p>
                            <p className="text-xs text-slate-500 uppercase tracking-wider mt-1">Puntos esta tanda</p>
                        </div>
                        <div className="space-y-3">
                            <button onClick={() => startTanda(currentTanda)}
                                className="w-full bg-rose-600 hover:bg-rose-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active-scale">
                                <RefreshCcw size={18}/> Reintentar Tanda {currentTanda + 1}
                            </button>
                            <button onClick={() => setGameState('menu')}
                                className="w-full bg-slate-800 text-slate-400 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 active-scale">
                                <ArrowLeft size={18}/> Ver Tandas
                            </button>
                        </div>
                    </div>
                </div>
            );

            // JUEGO ACTIVO
            return (
                <div className="h-full w-full bg-slate-900 flex flex-col relative overflow-hidden touch-none">

                    {/* HUD Superior */}
                    <div className="absolute top-0 w-full p-4 flex justify-between items-start z-20 pointer-events-none">
                        <div className="flex flex-col gap-1.5">
                            {/* Tanda badge */}
                            <div className="bg-slate-800/90 backdrop-blur px-3 py-2 rounded-xl border border-white/10 flex items-center gap-2">
                                <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Tanda</span>
                                <span className="font-black text-white">{currentTanda + 1}<span className="text-slate-500 text-xs">/{tandas.length}</span></span>
                            </div>
                            {/* Score */}
                            <div className="bg-slate-800/90 backdrop-blur px-3 py-2 rounded-xl border border-white/10 flex items-center gap-2">
                                <Trophy size={16} className="text-yellow-400"/>
                                <span className="font-black text-white">{score}</span>
                            </div>
                            {combo > 1 && (
                                <div className="text-emerald-400 font-black text-base flex items-center gap-1 drop-shadow-md animate-pop-in ml-1">
                                    <Zap size={14} fill="currentColor"/> {combo}x
                                </div>
                            )}
                        </div>

                        <div className="flex gap-2 pointer-events-auto">
                            {/* Vidas */}
                            <div className="flex gap-1 bg-slate-800/90 backdrop-blur px-3 py-2 rounded-xl border border-white/10">
                                {[...Array(3)].map((_, i) => (
                                    <Heart key={i} size={20} className={`${i < lives ? 'text-rose-500 fill-rose-500' : 'text-slate-700'}`} />
                                ))}
                            </div>
                            <button onClick={togglePause} className="bg-slate-800/90 backdrop-blur px-3 py-2 rounded-xl border border-white/10 hover:bg-slate-700 transition">
                                <Pause size={20} className="text-white"/>
                            </button>
                        </div>
                    </div>

                    {/* Barra de progreso de tanda */}
                    <div className="absolute top-0 left-0 right-0 h-1 z-30">
                        <div className="progress-fill h-full bg-indigo-500" style={{ width: `${totalTandaWords > 0 ? (tandaProgress / totalTandaWords) * 100 : 0}%` }}/>
                    </div>

                    {/* Área de caída */}
                    <div className="flex-1 relative">
                        <div className="absolute top-20 right-4 text-white/20 font-black text-4xl pointer-events-none">{wordPool.length}</div>

                        {/* Recompensa */}
                        {rewardText && (
                            <div className="absolute inset-0 z-[60] flex items-center justify-center pointer-events-none">
                                <div className="bg-emerald-400 text-slate-900 px-10 py-6 rounded-[2.5rem] font-black text-4xl shadow-[0_20px_50px_rgba(52,211,153,0.5)] border-b-8 border-emerald-600 flex flex-col items-center gap-2 animate-reward-anim">
                                    <span className="text-6xl drop-shadow-md">{currentWord?.emoji}</span>
                                    <span>{rewardText}</span>
                                </div>
                            </div>
                        )}

                        {/* Palabra cayendo */}
                        {currentWord && gameState === 'playing' && !rewardText && (
                            <div
                                ref={wordRef}
                                onPointerDown={handlePointerDown}
                                onPointerMove={handlePointerMove}
                                onPointerUp={handlePointerUp}
                                onPointerCancel={handlePointerUp}
                                className={`word-card absolute left-1/2 -translate-x-1/2 p-6 rounded-3xl bg-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-b-[6px] border-slate-300 select-none flex flex-col items-center justify-center whitespace-nowrap z-50 min-w-[140px]
                                    ${isDraggingRef.current ? 'drag-active scale-110 rotate-3' : ''}
                                    ${isWrong ? 'animate-shake bg-red-100 border-red-300' : ''}`}
                                style={{
                                    top: isDraggingRef.current ? `${dragPos.y}px` : `${fallingY}%`,
                                    left: isDraggingRef.current ? `${dragPos.x}px` : '50%',
                                    transform: isDraggingRef.current ? 'translate(-50%, -50%) scale(1.1)' : 'translateX(-50%)',
                                    transition: isDraggingRef.current ? 'none' : (isWrong ? 'top 0.3s ease-out' : 'none')
                                }}>
                                <span className="text-5xl mb-2 drop-shadow-md">{currentWord.emoji}</span>
                                <span className={`font-black text-xl md:text-2xl ${isWrong ? 'text-red-600' : 'text-slate-900'}`}>{currentWord.text}</span>
                            </div>
                        )}

                        {currentWord && gameState === 'paused' && (
                            <div className="absolute left-1/2 p-6 rounded-3xl bg-white border-b-[6px] border-slate-300 flex flex-col items-center justify-center whitespace-nowrap z-40 opacity-30 blur-sm min-w-[140px]"
                                style={{ top: `${fallingY}%`, transform: 'translateX(-50%)' }}>
                                <span className="text-5xl mb-2">{currentWord.emoji}</span>
                                <span className="font-black text-xl text-slate-900">{currentWord.text}</span>
                            </div>
                        )}
                    </div>

                    {/* Cajas de categoría */}
                    <div className="h-44 md:h-52 grid grid-cols-4 gap-2 p-2 bg-slate-950/50 backdrop-blur-md border-t border-white/5 z-20">
                        {gameData?.content?.categories?.map((cat, i) => {
                            const color = CATEGORY_COLORS[i];
                            return (
                                <div key={i} data-category={i}
                                    className={`relative flex items-center justify-center p-2 rounded-t-3xl rounded-b-xl border-t-4 ${color.bg} ${color.border} shadow-lg transition-transform active:scale-95`}>
                                    <span className={`text-center font-black text-xs md:text-sm uppercase leading-tight ${color.text} drop-shadow-md pointer-events-none`}>
                                        {cat.name}
                                    </span>
                                </div>
                            );
                        })}
                    </div>

                    {/* Pausa overlay */}
                    {gameState === 'paused' && (
                        <div className="absolute inset-0 z-50 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center text-white p-6 text-center">
                            <Pause size={56} className="mb-5 text-indigo-500"/>
                            <h3 className="text-2xl font-black mb-1 uppercase">Pausa</h3>
                            <p className="text-slate-400 text-sm mb-8 font-bold">Tanda {currentTanda + 1} · {tandaProgress}/{totalTandaWords} completadas</p>
                            <div className="space-y-3 w-full max-w-xs">
                                <button onClick={togglePause} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase tracking-widest active-scale">Reanudar</button>
                                <button onClick={() => setGameState('menu')} className="w-full py-4 bg-transparent text-slate-500 rounded-2xl font-bold uppercase tracking-widest hover:text-white transition-colors">Ver Tandas</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<CascadeGame />);
    </script>
</body>
</html>

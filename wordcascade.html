<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adjective Cascade | Periplo Games</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☄️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-6px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(6px, 0, 0)' }
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }
            }
        };
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap'); 
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            touch-action: none; /* Evita pull-to-refresh y scroll accidental en mobile */
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Hover Trap FIX para iOS Safari */
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.05); transition: transform 0.2s; }
        }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* Capa de arrastre segura */
        .drag-active { cursor: grabbing !important; z-index: 50; }
        .word-card { touch-action: none; }
    </style>
</head>
<body class="bg-slate-900 text-white h-[100dvh] w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Zap, Heart, Trophy, Timer, Play, AlertCircle, RefreshCcw, ArrowLeft } from 'lucide-react';

        // Misma config del dashboard
        const firebaseConfig = { 
            apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", 
            authDomain: "proyecto-periplo.firebaseapp.com", 
            projectId: "proyecto-periplo", 
            storageBucket: "proyecto-periplo.firebasestorage.app", 
            messagingSenderId: "236795998392", 
            appId: "1:236795998392:web:0da24b4f018611b55c844d" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Colores consistentes con dashboard-uno
        const CATEGORY_COLORS = [
            { bg: 'bg-blue-500', border: 'border-blue-600', shadow: 'shadow-blue-500/50', text: 'text-blue-100' },
            { bg: 'bg-red-500', border: 'border-red-600', shadow: 'shadow-red-500/50', text: 'text-red-100' },
            { bg: 'bg-yellow-400', border: 'border-yellow-500', shadow: 'shadow-yellow-400/50', text: 'text-yellow-900' },
            { bg: 'bg-green-500', border: 'border-green-600', shadow: 'shadow-green-500/50', text: 'text-green-100' }
        ];

        const CascadeGame = () => {
            // Estados del sistema
            const [gameState, setGameState] = useState('loading'); // loading, error, menu, playing, gameover
            const [gameData, setGameData] = useState(null);
            const [errorMessage, setErrorMessage] = useState("");

            // Estados del juego
            const [wordPool, setWordPool] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [score, setScore] = useState(0);
            const [lives, setLives] = useState(3);
            const [combo, setCombo] = useState(0);
            const [fallingY, setFallingY] = useState(0); // Porcentaje de 0 a 100
            
            // Ref para físicas y controles
            const gameLoopRef = useRef(null);
            const fallSpeedRef = useRef(0.15); // Velocidad inicial (escala con combo/tiempo)
            const isDraggingRef = useRef(false);
            const wordRef = useRef(null);
            
            // Estado visual de arrastre
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [isWrong, setIsWrong] = useState(false);

            // 1. CARGA DE DATOS (Read-Only)
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const gameId = params.get('id');

                if (!gameId) {
                    setErrorMessage("No se encontró ID de juego en la URL. Lanza el juego desde el Dashboard.");
                    setGameState('error');
                    return;
                }

                const loadGame = async () => {
                    try {
                        // Misma ruta definida en la arquitectura
                        const docRef = doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', gameId);
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if(!data.content || !data.content.categories) throw new Error("Estructura de datos inválida");
                            
                            setGameData(data);
                            setGameState('menu');
                        } else {
                            throw new Error("El juego no existe.");
                        }
                    } catch (error) {
                        setErrorMessage(error.message);
                        setGameState('error');
                    }
                };
                loadGame();
            }, []);

            // 2. PREPARACIÓN DEL POOL DE PALABRAS
            const startGame = () => {
                let allWords = [];
                gameData.content.categories.forEach((cat, index) => {
                    cat.words.forEach(word => {
                        allWords.push({ text: word, categoryId: index, categoryName: cat.name });
                    });
                });
                
                // Shuffle array (Fisher-Yates)
                for (let i = allWords.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
                }

                setWordPool(allWords);
                setScore(0);
                setLives(3);
                setCombo(0);
                fallSpeedRef.current = 0.15; // Reset velocidad
                spawnNextWord(allWords);
                setGameState('playing');
            };

            const spawnNextWord = (pool) => {
                if (pool.length === 0) {
                    setGameState('gameover');
                    triggerVictoryConfetti();
                    return;
                }
                const nextPool = [...pool];
                const next = nextPool.pop();
                
                setWordPool(nextPool);
                setCurrentWord(next);
                setFallingY(0);
                setIsWrong(false);
                isDraggingRef.current = false;
            };

            // 3. GAME LOOP (Gravedad)
            useEffect(() => {
                if (gameState !== 'playing' || !currentWord) return;

                const loop = () => {
                    if (!isDraggingRef.current) {
                        setFallingY(prev => {
                            const nextY = prev + fallSpeedRef.current;
                            // Si toca fondo (miss)
                            if (nextY >= 90) {
                                handleMiss();
                                return 0; // Previene un frame extra abajo
                            }
                            return nextY;
                        });
                    }
                    gameLoopRef.current = requestAnimationFrame(loop);
                };
                
                gameLoopRef.current = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(gameLoopRef.current);
            }, [gameState, currentWord]);

            const handleMiss = () => {
                cancelAnimationFrame(gameLoopRef.current);
                setCombo(0);
                setLives(prev => {
                    const next = prev - 1;
                    if (next <= 0) { setGameState('gameover'); return 0; }
                    return next;
                });
                spawnNextWord(wordPool);
            };

            // 4. LÓGICA DE DRAG AND DROP (Pointer Events)
            const handlePointerDown = (e) => {
                if (gameState !== 'playing' || isWrong) return;
                isDraggingRef.current = true;
                e.target.setPointerCapture(e.pointerId);
                setDragPos({ x: e.clientX, y: e.clientY });
            };

            const handlePointerMove = (e) => {
                if (!isDraggingRef.current) return;
                setDragPos({ x: e.clientX, y: e.clientY });
            };

            const handlePointerUp = (e) => {
                if (!isDraggingRef.current) return;
                isDraggingRef.current = false;
                e.target.releasePointerCapture(e.pointerId);

                // Detectar colisión usando el punto exacto de la pantalla
                // Ocultamos temporalmente la palabra para no detectar la colisión consigo misma
                const wordElement = wordRef.current;
                if(wordElement) wordElement.style.display = 'none';
                
                const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
                
                if(wordElement) wordElement.style.display = 'flex'; // Restauramos

                // Buscamos si el elemento debajo tiene nuestro data-attribute
                const dropZone = elementBelow?.closest('[data-category]');
                
                if (dropZone) {
                    const categoryId = parseInt(dropZone.getAttribute('data-category'), 10);
                    evaluateMatch(categoryId, dropZone);
                } else {
                    // Si se soltó en el vacío, vuelve a caer
                    setDragPos({ x: 0, y: 0 });
                }
            };

            const evaluateMatch = (selectedId, dropElement) => {
                if (selectedId === currentWord.categoryId) {
                    // ACERTO
                    const newCombo = combo + 1;
                    setCombo(newCombo);
                    setScore(prev => prev + (10 * newCombo));
                    
                    // Aumentar dificultad
                    fallSpeedRef.current = Math.min(0.5, 0.15 + (score / 1000)); 
                    
                    // Feedback visual en la cubeta
                    dropElement.classList.remove('animate-pop-in');
                    void dropElement.offsetWidth; // Trigger reflow
                    dropElement.classList.add('animate-pop-in');
                    
                    // Micro confetti
                    confetti({ particleCount: 15, spread: 40, origin: { x: dropElement.getBoundingClientRect().left / window.innerWidth + 0.1, y: 0.9 }, colors: ['#ffffff', '#fde047'] });

                    spawnNextWord(wordPool);
                } else {
                    // ERROR
                    setCombo(0);
                    setIsWrong(true);
                    
                    // Penalización: la palabra vuelve arriba y pierdes un poco de tiempo
                    setTimeout(() => {
                        setIsWrong(false);
                        setDragPos({ x: 0, y: 0 });
                    }, 400); // Duración de la animación shake
                }
            };

            const triggerVictoryConfetti = () => {
                const duration = 3000;
                const end = Date.now() + duration;
                const frame = () => {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3b82f6', '#ef4444', '#eab308', '#22c55e'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6', '#ef4444', '#eab308', '#22c55e'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                };
                frame();
            };

            // 5. RENDERIZADO CONDICIONAL
            if (gameState === 'loading') return <div className="flex h-full items-center justify-center"><Zap className="animate-pulse text-indigo-500" size={48} /></div>;
            
            if (gameState === 'error') return (
                <div className="flex flex-col h-full items-center justify-center p-8 text-center bg-slate-950">
                    <AlertCircle className="text-red-500 mb-4" size={64}/>
                    <h2 className="text-2xl font-bold mb-2">Oops...</h2>
                    <p className="text-slate-400 max-w-md mb-6">{errorMessage}</p>
                    <button onClick={() => window.history.back()} className="bg-slate-800 px-6 py-3 rounded-xl font-bold flex items-center gap-2 active-scale"><ArrowLeft size={20}/> Volver</button>
                </div>
            );

            if (gameState === 'menu') return (
                <div className="flex flex-col h-full bg-slate-900 overflow-hidden relative">
                    <div className="absolute inset-0 bg-gradient-to-b from-indigo-900/20 to-slate-900 z-0"></div>
                    <div className="relative z-10 p-6 flex items-center justify-between border-b border-white/10">
                        <button onClick={() => window.location.href='index.html'} className="p-2 bg-white/5 hover:bg-white/10 rounded-xl transition active-scale"><ArrowLeft size={20}/></button>
                        <div className="flex items-center gap-2 text-indigo-400 font-bold"><Zap size={20}/> Adjective Cascade</div>
                        <div className="w-10"></div>
                    </div>
                    
                    <div className="flex-1 flex flex-col items-center justify-center p-6 text-center z-10">
                        <h1 className="text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 animate-pop-in">{gameData.title}</h1>
                        <p className="text-slate-400 mb-12 text-lg max-w-sm">Arrastra cada palabra a su categoría correcta antes de que toque el suelo. ¡Construye tu multiplicador de combos!</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-12 w-full max-w-md">
                            {gameData.content.categories.map((cat, i) => (
                                <div key={i} className={`${CATEGORY_COLORS[i].bg} bg-opacity-20 border border-white/10 rounded-2xl p-4 flex flex-col items-center justify-center backdrop-blur-sm`}>
                                    <span className={`font-black text-sm uppercase text-center ${CATEGORY_COLORS[i].text}`}>{cat.name}</span>
                                </div>
                            ))}
                        </div>

                        <button onClick={startGame} className="bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-10 py-5 rounded-full font-black text-xl flex items-center gap-3 shadow-[0_10px_40px_rgba(16,185,129,0.4)] active-scale hover-scale transition-all">
                            <Play fill="currentColor" size={24}/> JUGAR AHORA
                        </button>
                    </div>
                </div>
            );

            if (gameState === 'gameover') return (
                <div className="flex flex-col h-full bg-slate-900 items-center justify-center p-6 text-center">
                    <Trophy className="text-yellow-400 mb-6 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" size={80} />
                    <h2 className="text-4xl font-black mb-2 animate-pop-in text-white">{lives > 0 ? '¡Dominación Total!' : '¡Juego Terminado!'}</h2>
                    <p className="text-slate-400 mb-8 text-xl">Tu puntuación final</p>
                    
                    <div className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-amber-600 mb-12 animate-pop-in" style={{animationDelay: '0.2s'}}>
                        {score}
                    </div>

                    <div className="flex gap-4">
                        <button onClick={() => setGameState('menu')} className="bg-slate-800 px-6 py-4 rounded-2xl font-bold flex items-center gap-2 active-scale text-white"><ArrowLeft size={20}/> Menú</button>
                        <button onClick={startGame} className="bg-indigo-600 px-8 py-4 rounded-2xl font-bold flex items-center gap-2 active-scale shadow-lg shadow-indigo-600/30 text-white"><RefreshCcw size={20}/> Jugar de Nuevo</button>
                    </div>
                </div>
            );

            // RENDER JUEGO ACTIVO
            return (
                <div className="h-full w-full bg-slate-900 flex flex-col relative overflow-hidden touch-none">
                    {/* HUD / Scoreboard */}
                    <div className="absolute top-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
                        <div className="flex flex-col gap-1">
                            <div className="bg-slate-800/80 backdrop-blur px-4 py-2 rounded-2xl border border-white/10 flex items-center gap-2 text-xl font-black">
                                <Trophy size={20} className="text-yellow-400" /> {score}
                            </div>
                            {combo > 1 && (
                                <div className="text-emerald-400 font-black text-lg ml-2 animate-pop-in flex items-center gap-1 drop-shadow-md">
                                    <Zap size={16} fill="currentColor"/> {combo}x Combo
                                </div>
                            )}
                        </div>
                        
                        <div className="flex gap-1 bg-slate-800/80 backdrop-blur px-3 py-2 rounded-2xl border border-white/10">
                            {[...Array(3)].map((_, i) => (
                                <Heart key={i} size={24} className={`${i < lives ? 'text-rose-500 fill-rose-500' : 'text-slate-600'}`} />
                            ))}
                        </div>
                    </div>

                    {/* ZONA DE CAÍDA */}
                    <div className="flex-1 relative">
                        {/* Indicador de palabras restantes */}
                        <div className="absolute top-20 right-4 text-white/20 font-black text-4xl pointer-events-none">{wordPool.length}</div>

                        {/* LA PALABRA QUE CAE */}
                        {currentWord && (
                            <div 
                                ref={wordRef}
                                onPointerDown={handlePointerDown}
                                onPointerMove={handlePointerMove}
                                onPointerUp={handlePointerUp}
                                onPointerCancel={handlePointerUp}
                                className={`word-card absolute left-1/2 -translate-x-1/2 p-4 rounded-2xl bg-white text-slate-900 font-black text-2xl md:text-4xl shadow-2xl border-b-4 border-slate-300 select-none flex items-center justify-center whitespace-nowrap z-50 transition-colors ${isDraggingRef.current ? 'drag-active scale-110 rotate-2' : ''} ${isWrong ? 'animate-shake bg-red-100 text-red-600 border-red-300' : ''}`}
                                style={{ 
                                    top: isDraggingRef.current ? `${dragPos.y}px` : `${fallingY}%`,
                                    left: isDraggingRef.current ? `${dragPos.x}px` : '50%',
                                    transform: isDraggingRef.current ? 'translate(-50%, -50%) scale(1.1)' : 'translateX(-50%)',
                                    transition: isDraggingRef.current ? 'none' : (isWrong ? 'top 0.3s ease-out' : 'none')
                                }}
                            >
                                {currentWord.text}
                            </div>
                        )}
                    </div>

                    {/* CUBETAS / CATEGORÍAS (Bottom) */}
                    <div className="h-48 md:h-56 grid grid-cols-4 gap-2 md:gap-4 p-2 md:p-4 bg-slate-950/50 backdrop-blur-md border-t border-white/5 z-20">
                        {gameData.content.categories.map((cat, i) => {
                            const color = CATEGORY_COLORS[i];
                            return (
                                <div 
                                    key={i} 
                                    data-category={i}
                                    className={`relative flex items-center justify-center p-2 rounded-t-3xl rounded-b-xl border-t-4 ${color.bg} ${color.border} ${color.shadow} shadow-lg transition-transform`}
                                >
                                    <span className={`text-center font-black text-sm md:text-lg uppercase leading-tight ${color.text} drop-shadow-md pointer-events-none`}>
                                        {cat.name}
                                    </span>
                                    {/* Decoración visual de "boca de cubeta" */}
                                    <div className="absolute top-0 w-full h-4 bg-black/20 rounded-full blur-[2px] pointer-events-none"></div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<CascadeGame />);
    </script>
</body>
</html>

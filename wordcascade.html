<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Cascade | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'reward-anim': 'rewardAnim 1.2s ease-in-out forwards',
                        'flow': 'flow 3s ease-in-out infinite',
                        'ripple': 'ripple 2s ease-out infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'wave': 'wave 4s linear infinite',
                    },
                    keyframes: {
                        shake: { '10%,90%':{transform:'translate3d(-2px,0,0)'},'20%,80%':{transform:'translate3d(4px,0,0)'},'30%,50%,70%':{transform:'translate3d(-6px,0,0)'},'40%,60%':{transform:'translate3d(6px,0,0)'} },
                        popIn: { '0%':{transform:'scale(0.8)',opacity:'0'},'100%':{transform:'scale(1)',opacity:'1'} },
                        rewardAnim: { '0%':{transform:'scale(0.5) translateY(40px)',opacity:'0'},'15%':{transform:'scale(1.1) translateY(0)',opacity:'1'},'25%':{transform:'scale(1) translateY(0)',opacity:'1'},'75%':{transform:'scale(1) translateY(0)',opacity:'1'},'100%':{transform:'scale(1.1) translateY(-40px)',opacity:'0'} },
                        flow: { '0%,100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-6px)'} },
                        ripple: { '0%':{transform:'scale(1)',opacity:'0.4'},'100%':{transform:'scale(1.8)',opacity:'0'} },
                        slideUp: { '0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'} },
                        wave: { '0%':{backgroundPosition:'0% 50%'},'100%':{backgroundPosition:'100% 50%'} },
                    }
                }
            }
        };
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; background: #020c18; }

        .display-font { font-family: 'Syne', sans-serif; }

        /* Fondo de río animado */
        .river-bg {
            background: linear-gradient(180deg, #020c18 0%, #04152a 30%, #061e38 60%, #082244 100%);
            position: relative;
        }
        .river-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 40% at 50% 120%, rgba(14,116,189,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 60% 30% at 20% 80%, rgba(6,182,212,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 30% at 80% 60%, rgba(59,130,246,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Partículas de agua flotando */
        .water-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(147,210,255,0.4);
            pointer-events: none;
        }

        /* Corriente - cada categoría es una corriente del río */
        .stream-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
        }
        .stream-card:hover { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .stream-card:active { transform: scale(0.97); }

        /* Zona de caída */
        .drop-zone {
            position: relative;
            overflow: hidden;
        }
        .drop-zone::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 0 0 4px 4px;
        }

        /* Barra de progreso agua */
        .water-progress {
            background: linear-gradient(90deg, #0ea5e9, #06b6d4, #3b82f6);
            background-size: 200% 100%;
            animation: wave 2s linear infinite;
            transition: width 0.4s ease-out;
        }

        /* Palabra cayendo */
        .falling-word {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .falling-word.wrong {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* Colores de corriente */
        .stream-0 { --stream-color: #0ea5e9; --stream-glow: rgba(14,165,233,0.3); }
        .stream-1 { --stream-color: #f43f5e; --stream-glow: rgba(244,63,94,0.3); }
        .stream-2 { --stream-color: #f59e0b; --stream-glow: rgba(245,158,11,0.3); }
        .stream-3 { --stream-color: #10b981; --stream-glow: rgba(16,185,129,0.3); }

        .stream-border-0 { border-top: 3px solid #0ea5e9; box-shadow: 0 -4px 20px rgba(14,165,233,0.2); }
        .stream-border-1 { border-top: 3px solid #f43f5e; box-shadow: 0 -4px 20px rgba(244,63,94,0.2); }
        .stream-border-2 { border-top: 3px solid #f59e0b; box-shadow: 0 -4px 20px rgba(245,158,11,0.2); }
        .stream-border-3 { border-top: 3px solid #10b981; box-shadow: 0 -4px 20px rgba(16,185,129,0.2); }

        .stream-bg-0 { background: linear-gradient(to top, rgba(14,165,233,0.15), transparent); }
        .stream-bg-1 { background: linear-gradient(to top, rgba(244,63,94,0.15), transparent); }
        .stream-bg-2 { background: linear-gradient(to top, rgba(245,158,11,0.15), transparent); }
        .stream-bg-3 { background: linear-gradient(to top, rgba(16,185,129,0.15), transparent); }

        .stream-text-0 { color: #38bdf8; }
        .stream-text-1 { color: #fb7185; }
        .stream-text-2 { color: #fbbf24; }
        .stream-text-3 { color: #34d399; }

        .stream-dot-0 { background: #0ea5e9; }
        .stream-dot-1 { background: #f43f5e; }
        .stream-dot-2 { background: #f59e0b; }
        .stream-dot-3 { background: #10b981; }

        /* Tanda locks */
        .tanda-unlocked { border-color: rgba(255,255,255,0.12); }
        .tanda-current { border-color: rgba(14,165,233,0.5); box-shadow: 0 0 20px rgba(14,165,233,0.15); }
        .tanda-done { border-color: rgba(16,185,129,0.3); }
        .tanda-locked { opacity: 0.35; }
    </style>
</head>
<body class="h-[100dvh] w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Zap, Heart, Trophy, Play, AlertCircle, RefreshCcw, ArrowLeft, Pause, ChevronRight, Star, Lock, CheckCircle2, X, Waves, Droplets, Fish, Anchor } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WORDS_PER_TANDA = 5;
        const STREAM_ICONS = ['🌊', '🔥', '⚡', '🌿'];
        const STREAM_NAMES = ['Corriente Azul', 'Corriente Roja', 'Corriente Dorada', 'Corriente Verde'];

        // ─── AUDIO ─────────────────────────────────────────────────
        let audioCtx = null;
        const getCtx = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        };
        const playSound = (type) => {
            try {
                const ctx = getCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(350, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(550, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                    osc.start(); osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(660, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(990, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.18);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
                    osc.start(); osc.stop(ctx.currentTime + 0.18);
                } else if (type === 'fanfare') {
                    [[523,0],[659,0.1],[784,0.2],[1047,0.32]].forEach(([freq, delay]) => {
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'triangle'; o.frequency.value = freq;
                        g.gain.setValueAtTime(0, ctx.currentTime + delay);
                        g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + delay + 0.04);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.28);
                        o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + 0.28);
                    });
                }
            } catch(e) {}
        };

        // ─── LÓGICA DE TANDAS ────────────────────────────────────
        const buildTandas = (categories) => {
            const minItems = Math.min(...categories.map(c => (c.items || []).length));
            const totalTandas = Math.ceil(minItems / WORDS_PER_TANDA);
            return Array.from({ length: totalTandas }, (_, t) => {
                const words = [];
                categories.forEach((cat, catIdx) => {
                    (cat.items || []).slice(t * WORDS_PER_TANDA, (t + 1) * WORDS_PER_TANDA).forEach(item => {
                        const text = item.en || item.word || "";
                        if (text.trim()) words.push({ text, es: item.es || "¡Correcto!", emoji: item.emoji || "💧", categoryId: catIdx, categoryName: cat.name });
                    });
                });
                for (let i = words.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [words[i], words[j]] = [words[j], words[i]];
                }
                return words;
            }).filter(t => t.length > 0);
        };

        // ─── COMPONENTE PRINCIPAL ────────────────────────────────
        const WordCascade = () => {
            const [screen, setScreen] = useState('loading'); // loading | name | menu | game | paused | tanda_complete | gameover | error
            const [gameData, setGameData] = useState(null);
            const [tandas, setTandas] = useState([]);
            const [quizId, setQuizId] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');

            // Nombre (persistido)
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('wc_player_name') || '');
            const nameInputRef = useRef(null);

            // Progreso (tanda máxima desbloqueada)
            const [unlockedTanda, setUnlockedTanda] = useState(0);

            // Corriente expandida (para ver palabras)
            const [expandedStream, setExpandedStream] = useState(null);

            // Estado de juego activo
            const [currentTanda, setCurrentTanda] = useState(0);
            const [wordPool, setWordPool] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [score, setScore] = useState(0);
            const [lives, setLives] = useState(3);
            const [combo, setCombo] = useState(0);
            const [fallingY, setFallingY] = useState(0);
            const [tandaProgress, setTandaProgress] = useState(0);
            const [totalTandaWords, setTotalTandaWords] = useState(0);
            const [rewardText, setRewardText] = useState(null);

            const isRewardingRef = useRef(false);
            const gameLoopRef = useRef(null);
            const fallSpeedRef = useRef(0.15);
            const isDraggingRef = useRef(false);
            const wordRef = useRef(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [isWrong, setIsWrong] = useState(false);

            // Cargar datos
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) { setErrorMsg("No se encontró ID de juego."); setScreen('error'); return; }
                setQuizId(id);

                const savedProg = localStorage.getItem(`wc_prog_${id}`);
                if (savedProg) setUnlockedTanda(JSON.parse(savedProg).unlocked || 0);

                getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id)).then(snap => {
                    if (!snap.exists()) { setErrorMsg("Juego no encontrado."); setScreen('error'); return; }
                    const data = snap.data();
                    if (!data.content?.categories) { setErrorMsg("Estructura inválida."); setScreen('error'); return; }
                    setGameData(data);
                    setTandas(buildTandas(data.content.categories));
                    // Si ya tiene nombre guardado, ir directo al menú
                    const saved = localStorage.getItem('wc_player_name');
                    setScreen(saved ? 'menu' : 'name');
                }).catch(e => { setErrorMsg(e.message); setScreen('error'); });
            }, []);

            const handleNameSubmit = () => {
                const name = playerName.trim();
                if (!name) return;
                localStorage.setItem('wc_player_name', name);
                setScreen('menu');
            };

            const startTanda = useCallback((idx) => {
                if (!tandas[idx]) return;
                playSound('pop');
                const words = [...tandas[idx]];
                setCurrentTanda(idx);
                setWordPool(words.slice(1));
                setCurrentWord(words[0]);
                setScore(0); setLives(3); setCombo(0);
                setFallingY(0); setIsWrong(false); setRewardText(null);
                setTandaProgress(0); setTotalTandaWords(words.length);
                fallSpeedRef.current = 0.15;
                isRewardingRef.current = false;
                isDraggingRef.current = false;
                setScreen('game');
            }, [tandas]);

            const spawnNextWord = useCallback((pool, tProgress, tTotal, tIdx) => {
                if (pool.length === 0) {
                    playSound('fanfare');
                    confetti({ particleCount: 120, spread: 90, origin: { y: 0.5 } });
                    const nextUnlocked = Math.max(unlockedTanda, tIdx + 1);
                    setUnlockedTanda(nextUnlocked);
                    if (quizId) localStorage.setItem(`wc_prog_${quizId}`, JSON.stringify({ unlocked: nextUnlocked }));
                    setScreen('tanda_complete');
                    return;
                }
                const next = [...pool];
                const word = next.pop();
                setWordPool(next);
                setCurrentWord(word);
                setFallingY(0); setIsWrong(false);
                isDraggingRef.current = false;
                isRewardingRef.current = false;
                playSound('pop');
            }, [unlockedTanda, quizId]);

            // Game loop
            useEffect(() => {
                if (screen !== 'game' || !currentWord) return;
                const loop = () => {
                    if (!isDraggingRef.current && !isRewardingRef.current) {
                        setFallingY(prev => {
                            const next = prev + fallSpeedRef.current;
                            if (next >= 90) {
                                cancelAnimationFrame(gameLoopRef.current);
                                playSound('error');
                                setCombo(0);
                                setTandaProgress(p => { const np = p + 1; return np; });
                                setLives(prev => {
                                    const nl = prev - 1;
                                    if (nl <= 0) { setScreen('gameover'); return 0; }
                                    return nl;
                                });
                                setWordPool(pool => {
                                    spawnNextWord(pool, tandaProgress + 1, totalTandaWords, currentTanda);
                                    return pool;
                                });
                                return 0;
                            }
                            return next;
                        });
                    }
                    gameLoopRef.current = requestAnimationFrame(loop);
                };
                gameLoopRef.current = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(gameLoopRef.current);
            }, [screen, currentWord]);

            const handlePointerDown = (e) => {
                if (screen !== 'game' || isWrong || isRewardingRef.current) return;
                isDraggingRef.current = true;
                e.target.setPointerCapture(e.pointerId);
                setDragPos({ x: e.clientX, y: e.clientY });
            };
            const handlePointerMove = (e) => {
                if (!isDraggingRef.current) return;
                setDragPos({ x: e.clientX, y: e.clientY });
            };
            const handlePointerUp = (e) => {
                if (!isDraggingRef.current) return;
                isDraggingRef.current = false;
                e.target.releasePointerCapture(e.pointerId);
                if (wordRef.current) wordRef.current.style.display = 'none';
                const el = document.elementFromPoint(e.clientX, e.clientY);
                if (wordRef.current) wordRef.current.style.display = 'flex';
                const dz = el?.closest('[data-category]');
                if (dz) evaluateMatch(parseInt(dz.getAttribute('data-category'), 10), dz);
                else setDragPos({ x: 0, y: 0 });
            };

            const evaluateMatch = (selectedId, dropEl) => {
                if (selectedId === currentWord.categoryId) {
                    playSound('success');
                    const nc = combo + 1;
                    setCombo(nc);
                    setScore(s => s + (10 * nc));
                    setTandaProgress(p => p + 1);
                    fallSpeedRef.current = Math.min(0.45, 0.15 + (score / 1200));
                    dropEl.classList.remove('animate-pop-in');
                    void dropEl.offsetWidth;
                    dropEl.classList.add('animate-pop-in');
                    confetti({ particleCount: 18, spread: 50, origin: { x: dropEl.getBoundingClientRect().left / window.innerWidth + 0.1, y: 0.88 }, colors: ['#ffffff', '#93c5fd', '#67e8f9'] });
                    isRewardingRef.current = true;
                    setRewardText(currentWord.es);
                    setTimeout(() => {
                        setRewardText(null);
                        setWordPool(pool => { spawnNextWord(pool, tandaProgress + 1, totalTandaWords, currentTanda); return pool; });
                    }, 1150);
                } else {
                    playSound('error');
                    setCombo(0);
                    setIsWrong(true);
                    setTimeout(() => { setIsWrong(false); setDragPos({ x: 0, y: 0 }); }, 400);
                }
            };

            // ─── PANTALLA: ERROR ────────────────────────────────
            if (screen === 'error') return (
                <div className="river-bg flex flex-col h-full items-center justify-center p-8 text-center">
                    <AlertCircle className="text-red-400 mb-4" size={56}/>
                    <h2 className="text-2xl font-bold text-white mb-2">Algo salió mal</h2>
                    <p className="text-blue-300/60 mb-6">{errorMsg}</p>
                    <button onClick={() => window.history.back()} className="bg-white/10 border border-white/20 px-6 py-3 rounded-2xl font-bold text-white flex items-center gap-2"><ArrowLeft size={18}/> Volver</button>
                </div>
            );

            // ─── PANTALLA: LOADING ─────────────────────────────
            if (screen === 'loading') return (
                <div className="river-bg flex h-full items-center justify-center">
                    <div className="flex flex-col items-center gap-4">
                        <div className="text-5xl animate-flow">🌊</div>
                        <div className="text-blue-300 font-bold text-sm uppercase tracking-widest">Cargando corriente...</div>
                    </div>
                </div>
            );

            // ─── PANTALLA: NOMBRE ─────────────────────────────
            if (screen === 'name') return (
                <div className="river-bg flex flex-col h-full items-center justify-center p-6 relative overflow-hidden">
                    {/* Decoración */}
                    <div className="absolute inset-0 pointer-events-none overflow-hidden">
                        {['💧','🌊','💦','🐟','🌿'].map((e, i) => (
                            <div key={i} className="absolute text-2xl opacity-10 animate-flow"
                                style={{ left: `${10 + i * 20}%`, top: `${15 + (i % 3) * 25}%`, animationDelay: `${i * 0.6}s` }}>
                                {e}
                            </div>
                        ))}
                    </div>

                    <div className="relative z-10 w-full max-w-sm flex flex-col items-center gap-6 animate-slide-up">
                        <div className="text-7xl animate-flow">🌊</div>
                        <div className="text-center">
                            <h1 className="display-font text-4xl font-black text-white mb-1">Word Cascade</h1>
                            <p className="text-blue-300/70 font-medium text-sm">{gameData?.title}</p>
                        </div>

                        <div className="w-full bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-sm">
                            <p className="text-blue-200/60 text-xs font-bold uppercase tracking-widest mb-3 text-center">¿Quién se lanza al río?</p>
                            <div className="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4">
                                <span className="text-xl">🏄</span>
                                <input
                                    ref={nameInputRef}
                                    type="text"
                                    value={playerName}
                                    onChange={e => setPlayerName(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleNameSubmit()}
                                    placeholder="Tu nombre..."
                                    className="bg-transparent outline-none text-white font-bold w-full placeholder-white/20 text-lg"
                                    style={{fontSize:'16px'}}
                                    autoFocus
                                />
                            </div>
                            <button
                                disabled={!playerName.trim()}
                                onClick={handleNameSubmit}
                                className="w-full bg-gradient-to-r from-sky-500 to-blue-600 disabled:from-white/10 disabled:to-white/10 disabled:text-white/20 text-white py-4 rounded-xl font-black text-base uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-blue-900/40">
                                Lanzarse 🌊
                            </button>
                        </div>
                    </div>
                </div>
            );

            // ─── PANTALLA: MENÚ ────────────────────────────────
            if (screen === 'menu') {
                const cats = gameData?.content?.categories || [];
                return (
                    <div className="river-bg flex flex-col h-full overflow-hidden relative">
                        {/* Header */}
                        <div className="relative z-10 flex items-center justify-between px-5 pt-5 pb-3 shrink-0">
                            <button onClick={() => window.history.back()} className="p-2.5 bg-white/5 border border-white/10 rounded-xl text-white/60 hover:text-white transition">
                                <ArrowLeft size={18}/>
                            </button>
                            <div className="text-center">
                                <h1 className="display-font text-xl font-black text-white">Word Cascade</h1>
                                <p className="text-blue-300/60 text-xs font-medium">{gameData?.title}</p>
                            </div>
                            <button onClick={() => setScreen('name')} className="flex items-center gap-1.5 bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm font-bold text-white/70 hover:text-white transition">
                                <span className="text-base">🏄</span>
                                <span className="max-w-[70px] truncate">{playerName}</span>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto px-5 pb-6 custom-scrollbar relative z-10">

                            {/* Las 4 Corrientes */}
                            <div className="mb-6">
                                <p className="text-xs font-black text-white/30 uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <Waves size={12}/> Las 4 Corrientes — toca para ver las palabras
                                </p>
                                <div className="grid grid-cols-2 gap-2">
                                    {cats.map((cat, i) => (
                                        <div key={i}>
                                            <button
                                                onClick={() => setExpandedStream(expandedStream === i ? null : i)}
                                                className={`stream-card w-full p-4 rounded-2xl text-left transition-all`}>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <div className={`w-2.5 h-2.5 rounded-full stream-dot-${i}`}/>
                                                    <span className={`text-[11px] font-black uppercase tracking-wider stream-text-${i}`}>{STREAM_ICONS[i]} Corriente {i + 1}</span>
                                                </div>
                                                <p className="text-white font-bold text-sm leading-tight">{cat.name}</p>
                                                <p className="text-white/30 text-[10px] mt-1">{(cat.items || []).length} palabras · {expandedStream === i ? 'ocultar ▲' : 'ver ▼'}</p>
                                            </button>

                                            {/* Palabras de la corriente */}
                                            {expandedStream === i && (
                                                <div className={`mt-1 rounded-2xl border border-white/8 bg-white/3 p-3 animate-pop-in`}>
                                                    <div className="flex flex-wrap gap-1.5 max-h-40 overflow-y-auto custom-scrollbar">
                                                        {(cat.items || []).map((item, idx) => (
                                                            <span key={idx} className="flex items-center gap-1 bg-white/8 rounded-lg px-2 py-1 text-[11px] font-bold text-white/80">
                                                                {item.emoji} {item.en || item.word}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Tandas */}
                            <div>
                                <p className="text-xs font-black text-white/30 uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <Droplets size={12}/> {tandas.length} Tramos del Río · {WORDS_PER_TANDA} palabras/corriente
                                </p>
                                <div className="space-y-2">
                                    {tandas.map((tanda, i) => {
                                        const isDone = i < unlockedTanda;
                                        const isCurrent = i === unlockedTanda;
                                        const isLocked = i > unlockedTanda;
                                        return (
                                            <button key={i}
                                                disabled={isLocked}
                                                onClick={() => !isLocked && startTanda(i)}
                                                className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all
                                                    ${isLocked ? 'tanda-locked cursor-not-allowed border-white/5 bg-white/2' :
                                                      isCurrent ? 'tanda-current bg-sky-500/8 cursor-pointer active:scale-98' :
                                                      'tanda-done bg-emerald-500/5 cursor-pointer active:scale-98'}
                                                `}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-base font-black shrink-0
                                                        ${isDone ? 'bg-emerald-500/20 text-emerald-400' :
                                                          isCurrent ? 'bg-sky-500/20 text-sky-400' :
                                                          'bg-white/5 text-white/20'}`}>
                                                        {isDone ? '✓' : isLocked ? <Lock size={16}/> : `${i+1}`}
                                                    </div>
                                                    <div className="text-left">
                                                        <p className={`font-black text-sm ${isLocked ? 'text-white/25' : 'text-white'}`}>
                                                            Tramo {i + 1}
                                                            {isCurrent && unlockedTanda > 0 && <span className="ml-2 text-[10px] font-black text-sky-400 bg-sky-500/15 px-2 py-0.5 rounded-lg">Continuar</span>}
                                                        </p>
                                                        <p className={`text-[11px] ${isLocked ? 'text-white/15' : 'text-white/40'}`}>
                                                            {tanda.length} palabras · velocidad {i < 2 ? '🌊' : i < 3 ? '🌊🌊' : '🌊🌊🌊'}
                                                        </p>
                                                    </div>
                                                </div>
                                                {!isLocked && (
                                                    <ChevronRight size={16} className={isDone ? 'text-emerald-400/60' : 'text-sky-400/60'}/>
                                                )}
                                            </button>
                                        );
                                    })}
                                </div>

                                {unlockedTanda > 0 && (
                                    <button onClick={() => {
                                        localStorage.setItem(`wc_prog_${quizId}`, JSON.stringify({ unlocked: 0 }));
                                        setUnlockedTanda(0);
                                    }} className="mt-4 w-full text-center text-[11px] text-white/20 hover:text-white/40 transition py-2">
                                        Reiniciar progreso desde el inicio
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // ─── PANTALLA: TRAMO COMPLETADO ────────────────────
            if (screen === 'tanda_complete') {
                const isLast = currentTanda + 1 >= tandas.length;
                return (
                    <div className="river-bg flex flex-col h-full items-center justify-center p-6 text-center overflow-hidden">
                        <div className="animate-pop-in space-y-5 max-w-sm w-full relative z-10">
                            <div className="text-7xl animate-flow">{isLast ? '🏆' : '⭐'}</div>
                            <div>
                                <h2 className="display-font text-3xl font-black text-white">
                                    {isLast ? '¡Llegaste al lago!' : `Tramo ${currentTanda + 1} completado`}
                                </h2>
                                <p className="text-blue-300/60 mt-1 font-medium text-sm">
                                    {isLast ? 'Completaste todo el río 🌊' : `Siguiente: Tramo ${currentTanda + 2}`}
                                </p>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4">
                                    <Trophy size={18} className="text-amber-400 mx-auto mb-1"/>
                                    <p className="text-2xl font-black text-white">{score}</p>
                                    <p className="text-[10px] text-white/30 uppercase tracking-wider">Puntos</p>
                                </div>
                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4">
                                    <Star size={18} className="text-sky-400 mx-auto mb-1"/>
                                    <p className="text-2xl font-black text-white">{combo}x</p>
                                    <p className="text-[10px] text-white/30 uppercase tracking-wider">Combo máx</p>
                                </div>
                            </div>
                            <div className="space-y-2.5">
                                {!isLast && (
                                    <button onClick={() => startTanda(currentTanda + 1)}
                                        className="w-full bg-gradient-to-r from-sky-500 to-blue-600 text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 shadow-lg shadow-blue-900/40 active:scale-95">
                                        Tramo {currentTanda + 2} <ChevronRight size={18}/>
                                    </button>
                                )}
                                {isLast && (
                                    <button onClick={() => { localStorage.setItem(`wc_prog_${quizId}`, JSON.stringify({ unlocked: 0 })); setUnlockedTanda(0); setScreen('menu'); }}
                                        className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 shadow-lg active:scale-95">
                                        🏆 Jugar de nuevo
                                    </button>
                                )}
                                <button onClick={() => setScreen('menu')}
                                    className="w-full bg-white/5 border border-white/10 text-white/70 py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95">
                                    <ArrowLeft size={16}/> Ver tramos
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ─── PANTALLA: GAME OVER ─────────────────────────
            if (screen === 'gameover') return (
                <div className="river-bg flex flex-col h-full items-center justify-center p-6 text-center">
                    <div className="animate-pop-in space-y-5 max-w-sm w-full">
                        <div className="text-6xl">💦</div>
                        <div>
                            <h2 className="display-font text-3xl font-black text-white">¡Te ahogaste!</h2>
                            <p className="text-blue-300/50 mt-1 text-sm">Tramo {currentTanda + 1} · {score} puntos</p>
                        </div>
                        <div className="space-y-2.5">
                            <button onClick={() => startTanda(currentTanda)}
                                className="w-full bg-gradient-to-r from-sky-500 to-blue-600 text-white py-4 rounded-2xl font-black text-base flex items-center justify-center gap-2 active:scale-95">
                                <RefreshCcw size={17}/> Reintentar tramo {currentTanda + 1}
                            </button>
                            <button onClick={() => setScreen('menu')}
                                className="w-full bg-white/5 border border-white/10 text-white/60 py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95">
                                <ArrowLeft size={16}/> Ver tramos
                            </button>
                        </div>
                    </div>
                </div>
            );

            // ─── PANTALLA: JUEGO ACTIVO ─────────────────────────
            const cats = gameData?.content?.categories || [];
            return (
                <div className="river-bg h-full w-full flex flex-col relative overflow-hidden touch-none">

                    {/* Barra de progreso agua — top */}
                    <div className="absolute top-0 left-0 right-0 h-1 z-30 bg-white/5">
                        <div className="water-progress h-full" style={{ width: `${totalTandaWords > 0 ? (tandaProgress / totalTandaWords) * 100 : 0}%` }}/>
                    </div>

                    {/* HUD */}
                    <div className="absolute top-2 w-full px-4 flex justify-between items-start z-20 pointer-events-none">
                        <div className="flex flex-col gap-1.5 pointer-events-none">
                            <div className="bg-black/40 backdrop-blur-md px-3 py-2 rounded-xl border border-white/10 flex items-center gap-2">
                                <Waves size={13} className="text-sky-400"/>
                                <span className="text-[11px] font-black text-sky-400 uppercase tracking-wider">Tramo {currentTanda + 1}</span>
                                <span className="text-white/30 text-[11px]">·</span>
                                <span className="text-white/60 text-[11px] font-bold">{tandaProgress}/{totalTandaWords}</span>
                            </div>
                            <div className="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/10 flex items-center gap-1.5">
                                <Trophy size={13} className="text-amber-400"/>
                                <span className="font-black text-white text-sm">{score}</span>
                                {combo > 1 && <span className="text-emerald-400 font-black text-xs ml-1">×{combo}</span>}
                            </div>
                        </div>
                        <div className="flex gap-2 pointer-events-auto">
                            <div className="flex gap-0.5 bg-black/40 backdrop-blur-md px-3 py-2 rounded-xl border border-white/10">
                                {[...Array(3)].map((_, i) => (
                                    <Heart key={i} size={18} className={i < lives ? 'text-rose-400 fill-rose-400' : 'text-white/10'}/>
                                ))}
                            </div>
                            <button onClick={() => setScreen('paused')} className="bg-black/40 backdrop-blur-md px-3 py-2 rounded-xl border border-white/10 text-white/60 hover:text-white transition">
                                <Pause size={18}/>
                            </button>
                        </div>
                    </div>

                    {/* Zona de caída */}
                    <div className="flex-1 relative mt-1">
                        {/* Cuenta regresiva de palabras */}
                        <div className="absolute top-16 right-5 text-white/10 font-black text-5xl pointer-events-none select-none display-font">
                            {wordPool.length}
                        </div>

                        {/* Recompensa */}
                        {rewardText && (
                            <div className="absolute inset-0 z-[60] flex items-center justify-center pointer-events-none">
                                <div className="bg-gradient-to-br from-sky-400 to-blue-600 text-white px-10 py-6 rounded-[2.5rem] font-black text-3xl shadow-[0_20px_60px_rgba(14,165,233,0.5)] border-b-8 border-blue-700 flex flex-col items-center gap-2 animate-reward-anim">
                                    <span className="text-6xl drop-shadow-md">{currentWord?.emoji}</span>
                                    <span>{rewardText}</span>
                                </div>
                            </div>
                        )}

                        {/* Palabra cayendo */}
                        {currentWord && screen === 'game' && !rewardText && (
                            <div
                                ref={wordRef}
                                onPointerDown={handlePointerDown}
                                onPointerMove={handlePointerMove}
                                onPointerUp={handlePointerUp}
                                onPointerCancel={handlePointerUp}
                                className={`word-card falling-word absolute rounded-3xl border-b-[5px] border-slate-200 select-none flex flex-col items-center justify-center whitespace-nowrap z-50 min-w-[120px] px-5 py-4
                                    ${isDraggingRef.current ? 'drag-active rotate-2 scale-110' : ''}
                                    ${isWrong ? 'animate-shake wrong border-red-300' : ''}
                                `}
                                style={{
                                    top: isDraggingRef.current ? `${dragPos.y}px` : `${fallingY}%`,
                                    left: isDraggingRef.current ? `${dragPos.x}px` : '50%',
                                    transform: isDraggingRef.current ? 'translate(-50%, -50%) scale(1.1) rotate(2deg)' : 'translateX(-50%)',
                                    transition: isDraggingRef.current ? 'none' : (isWrong ? 'top 0.3s ease-out' : 'none')
                                }}>
                                <span className="text-4xl mb-1.5 drop-shadow-md">{currentWord.emoji}</span>
                                <span className={`font-black text-lg ${isWrong ? 'text-red-500' : 'text-slate-900'}`}>{currentWord.text}</span>
                            </div>
                        )}

                        {currentWord && screen === 'paused' && (
                            <div className="absolute left-1/2 falling-word rounded-3xl border-b-[5px] border-slate-200 flex flex-col items-center justify-center whitespace-nowrap z-20 opacity-20 blur-sm min-w-[120px] px-5 py-4"
                                style={{ top: `${fallingY}%`, transform: 'translateX(-50%)' }}>
                                <span className="text-4xl mb-1.5">{currentWord.emoji}</span>
                                <span className="font-black text-lg text-slate-900">{currentWord.text}</span>
                            </div>
                        )}
                    </div>

                    {/* Corrientes (cajas de drop) */}
                    <div className="h-40 md:h-48 grid grid-cols-4 gap-1.5 p-2 z-20">
                        {cats.map((cat, i) => (
                            <div key={i}
                                data-category={i}
                                className={`drop-zone flex items-center justify-center p-2 rounded-2xl relative stream-border-${i} stream-bg-${i} transition-transform active:scale-95`}>
                                <div className="flex flex-col items-center gap-1 pointer-events-none">
                                    <span className="text-xl">{STREAM_ICONS[i]}</span>
                                    <span className={`text-center font-black text-[10px] md:text-xs uppercase leading-tight stream-text-${i}`}>
                                        {cat.name}
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Overlay de pausa */}
                    {screen === 'paused' && (
                        <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-lg flex flex-col items-center justify-center text-white p-6 text-center">
                            <div className="text-5xl mb-4 animate-flow">🌊</div>
                            <h3 className="display-font text-2xl font-black mb-1">Corriente pausada</h3>
                            <p className="text-blue-300/50 text-sm mb-8">Tramo {currentTanda + 1} · {tandaProgress}/{totalTandaWords} palabras</p>
                            <div className="space-y-3 w-full max-w-xs">
                                <button onClick={() => setScreen('game')} className="w-full bg-gradient-to-r from-sky-500 to-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 shadow-lg">
                                    Seguir la corriente
                                </button>
                                <button onClick={() => setScreen('menu')} className="w-full bg-white/5 border border-white/10 text-white/50 py-3.5 rounded-2xl font-bold uppercase tracking-widest hover:text-white/80 transition">
                                    Ver tramos
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<WordCascade />);
    </script>
</body>
</html>

<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from 'firebase/firestore';
        import { Check, X, Award, Share2, Layers, Users, ArrowRight, ArrowLeft, Loader2, User, Play, Crown, Volume2, BookOpen, Link as LinkIcon, Trophy, Pause, RotateCcw, AlertTriangle, Home } from 'lucide-react';

        const appId = 'periplo-app-v1';
        const app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const goBack = () => { window.location.href = 'index-es.html'; };
        const AVATAR_EMOJIS = ['👽', '🦖', '🧢', '🍄', '👑', '🐶', '🐱', '🤑', '🤖', '👻', '💩', '🤡', '🐼', '🦊', '🦄', '🍎', '🍔', '⚽'];
        const PLAYER_COLORS = {
            1: { bg: 'bg-sky-500', text: 'text-sky-400', border: 'border-sky-500', light: 'bg-sky-500/20' },
            2: { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500', light: 'bg-rose-500/20' },
            3: { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500', light: 'bg-amber-500/20' },
            4: { bg: 'bg-violet-500', text: 'text-violet-400', border: 'border-violet-500', light: 'bg-violet-500/20' },
        };

        const shuffleArray = (array) => {
            const a = [...array];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        };

        const parseQuizWords = (data) => {
            const rawWords = data.content?.cards || data.content?.pairs || [];
            return rawWords.map((w, i) => ({
                id: w.id || `word-${i}`, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                exampleEs: w.exampleEs || '', emojis: w.emojis || '🎯'
            })).filter(w => w.wordEs);
        };

        const buildRoundsFromWords = (wordsArray) => {
            let pool = [...wordsArray];
            if (pool.length > 30) pool = shuffleArray(pool).slice(0, 30);
            else {
                let fillIndex = 0;
                const shuffled = shuffleArray([...wordsArray]);
                while (pool.length < 30) { pool.push({ ...shuffled[fillIndex % shuffled.length] }); fillIndex++; }
            }
            pool = shuffleArray(pool);
            return [pool.slice(0, 15).map((w, i)=>({...w, instanceId: `i0-${i}`})), pool.slice(15, 30).map((w, i)=>({...w, instanceId: `i1-${i}`}))];
        };

        const buildDeckFromRound = (wordsArray) => {
            let cards = [];
            wordsArray.forEach((item) => {
                cards.push({ uniqueId: `${item.instanceId}-en`, pairId: item.id, text: item.wordEn, emoji: item.emojis, type: 'en', audioText: item.wordEn });
                cards.push({ uniqueId: `${item.instanceId}-es`, pairId: item.id, text: item.wordEs, emoji: item.emojis, type: 'es', audioText: item.wordEn });
            });
            return shuffleArray(cards);
        };

        const MultiPlayerGame = ({ user, quizId, isStudent }) => {
            const [roomId, setRoomId] = useState('');
            const [roomData, setRoomData] = useState(null);
            
            const toggleRole = async (roleId) => {
                const newPlayers = { ...roomData.players };
                // Limpiar si ya estaba sentado en cualquier otra silla
                Object.keys(newPlayers).forEach(k => { if(k.startsWith('j') && newPlayers[k] === user.uid) newPlayers[k] = null; });
                
                // Si la silla nueva está libre, sentarse
                if (newPlayers[roleId] === null) {
                    newPlayers[roleId] = user.uid;
                }
                await updateDoc(doc(db, 'artifacts/periplo-app-v1/public/data/memorama_rooms', roomId), { players: newPlayers });
            };

            // ... (Resto de la lógica del juego incluyendo el renderizado del lobby)
            // Asegúrate de usar sessionData.hostId === user.uid para botones de moderador
            return null; // Aquí va el renderizado completo
        };

        const MemoryApp = () => {
            // ... (Lógica de autenticación que ya corregimos)
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<MemoryApp />);
    </script>

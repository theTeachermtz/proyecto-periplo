        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);

        // --- TAXONOMÍA MAESTRA (Basada en evaluaciones.html) ---

                    { id: 'v_b_2', title: 'Pack 2 (Home & Comm)', words: ["get in", "get out", "agree", "dance", "arrive", "practice", "say", "tell", "speak", "talk", "rest", "close", "write", "read", "call", "answer", "wait for", "meet", "check", "find", "look for", "eat", "drink", "cook", "clean", "wash", "turn on", "turn off", "use", "brush", "finish", "know"] },

                    { id: 'v_b_4', title: 'Pack 4 (Business & Emotion)', words: ["complain", "request", "explain", "recommend", "let know", "collect", "sign", "promise", "discuss", "receive", "deliver", "order", "build", "repair", "design", "manage", "organize", "support", "follow", "verify", "celebrate", "sing", "understand", "learn", "listen", "laugh", "cry", "borrow"] },

                    { id: 'v_b_6', title: 'Pack 6 (Thoughts & Senses)', words: ["think", "believe", "feel", "want", "need", "love", "hate", "prefer", "hope", "enjoy", "decide", "allow", "prevent", "protect", "handle", "perform", "develop", "grow", "replace", "throw", "catch", "sit", "stand", "jump", "run", "hide", "taste", "smell", "touch", "bite"] },

                    { id: 'v_b_8', title: 'Pack 8 (Corporate)', words: ["Hire", "Fire", "Earn", "Spend", "Invest", "Owe", "Promote", "Retire", "Resign", "Operate", "Produce", "Manufacture", "Distribute", "Store", "Export", "Import", "Inspect", "Negotiate", "Persuade", "Convince", "Represent", "Regulate", "Govern", "Vote", "Resolve", "Cooperate", "Compete", "Win", "Beat", "Gain"] },
                    { id: 'v_b_9', title: 'Pack 9 (Medical & Survival)', words: ["Cure", "Heal", "Suffer", "Bleed", "Recover", "Examine", "Diagnose", "Prescribe", "Treat", "Board", "Land", "Take off", "Reserve", "Accommodate", "Check in", "Check out", "Explore", "Guide", "Wander", "Escape", "Survive", "Attack", "Defend", "Fight", "Greet", "Introduce", "Appreciate", "Forgive", "Criticize", "Praise"] }
                ],
                nouns: [
                    { id: 'n_b_1', title: 'Pack 1: Modern Nomad', words: ["laptop", "charger", "backpack", "passport", "ticket", "airport", "flight", "hotel", "map", "tourist", "luggage", "subway", "train", "bus", "station", "guide", "camera", "photo", "trip", "journey"] },
                    { id: 'n_b_2', title: 'Pack 2: Hungry Traveler', words: ["menu", "waiter", "bill", "tip", "water", "coffee", "tea", "bread", "meat", "fish", "chicken", "salad", "soup", "dessert", "fork", "knife", "spoon", "plate", "glass", "napkin"] },
                    { id: 'n_b_3', title: 'Pack 3: Daily Grind', words: ["office", "desk", "chair", "meeting", "schedule", "shift", "colleague", "boss", "employee", "customer", "client", "task", "project", "report", "presentation", "interview", "salary", "resume", "career", "company", "factory", "warehouse", "uniform", "notebook", "pen"] },
                    { id: 'n_b_4', title: 'Pack 4: Urban Chaos', words: ["traffic", "highway", "crosswalk", "sidewalk", "neighborhood", "downtown", "suburb", "skyscraper", "building", "subway", "station", "flight", "passenger", "route", "shortcut", "delay", "engine", "brake", "wheel", "coin", "ticket", "crowd", "noise", "pollution", "bridge"] },
                    { id: 'n_b_5', title: 'Pack 5: Weekend Getaway', words: ["outfit", "shirt", "pants", "jacket", "coat", "dress", "skirt", "shoes", "boots", "sneakers", "hat", "cap", "belt", "fabric", "size", "pocket", "zipper", "button", "break", "journey", "tool", "sign"] }
                ],
                key_structs: [
                    { id: 'ks_b_1', title: 'WH Questions', words: ["What", "Where", "When", "Who", "Why", "Which", "How", "What time", "How often", "How much", "How many", "How long"] },
                    { id: 'ks_b_2', title: 'FANBOYS', words: ["for", "and", "nor", "but", "or", "yet", "so"] },
                    { id: 'ks_b_3', title: 'Subordinating Conj.', words: ["because", "although", "if", "since", "while", "unless", "after", "before", "that's why"] },
                    { id: 'ks_b_4', title: 'Prep. Time', words: ["in", "on", "at", "before", "after", "during", "for", "since", "until", "ago"] },
                    { id: 'ks_b_5', title: 'Prep. Place', words: ["in", "on", "at", "under", "over", "between", "behind", "in front of", "next to", "beside", "above", "below", "opposite", "ahead"] },
                    { id: 'ks_b_6', title: 'Prep. Movement & Other', words: ["to", "into", "across", "through", "along", "past", "out of", "up", "down", "with", "about", "by", "from", "of", "as", "like", "against"] },
                    { id: 'ks_b_7', title: 'Possessive Adj & Object Pron.', words: ["my", "your", "his", "her", "its", "our", "their", "me", "you", "him", "us", "them"] },
                    { id: 'ks_b_8', title: 'Quantifiers', words: ["some", "any", "much", "many", "a lot of", "a few", "a little", "several", "enough", "half", "all", "most"] },
                    { id: 'ks_b_9', title: 'Frequency Adverbs', words: ["always", "usually", "normally", "often", "sometimes", "occasionally", "never", "every once in a while", "once a", "twice a", "every"] }
                ]
            },
            advanced: {
                grammar: [
                    { id: 'past_simple', title: 'Past Simple', words: ["did", "didn't", "was", "were", "yesterday", "last week", "ago", "went", "saw", "had"] },
                    { id: 'second_cond', title: 'Second Conditional', words: ["if", "would", "were", "could", "might", "imaginary", "unlikely", "situation", "result", "condition"] }
                ],
                verbs: [],
                nouns: [],
                key_structs: []
            },
            pro: { grammar: [], verbs: [], nouns: [], key_structs: [] }
        };

        // --- DICCIONARIO TRADUCTOR MAESTRO (Inglés -> Español) ---
        const DICTIONARY = {
            "wake up": "despertar", "shower": "ducharse", "prepare": "preparar", "take": "tomar/llevar", "pick up": "recoger", "get": "conseguir", "start": "empezar", "work": "trabajar", "help": "ayudar", "send": "enviar", "attend": "asistir", "drive": "manejar", "fill up": "llenar", "review": "revisar", "sell": "vender", "upload": "subir", "download": "descargar", "leave": "salir/dejar", "make": "hacer (crear)", "do": "hacer (acción)", "visit": "visitar", "walk": "caminar", "own": "poseer", "feed": "alimentar", "go": "ir", "see": "ver", "sleep": "dormir", "bring": "traer", "buy": "comprar", "lend": "prestar",
            "get in": "entrar", "get out": "salir", "agree": "acordar", "dance": "bailar", "arrive": "llegar", "practice": "practicar", "say": "decir", "tell": "contar/decir a", "speak": "hablar", "talk": "conversar", "rest": "descansar", "close": "cerrar", "write": "escribir", "read": "leer", "call": "llamar", "answer": "responder", "wait for": "esperar", "meet": "conocer/reunir", "check": "revisar", "find": "encontrar", "look for": "buscar", "eat": "comer", "drink": "beber", "cook": "cocinar", "clean": "limpiar", "wash": "lavar", "turn on": "encender", "turn off": "apagar", "use": "usar", "brush": "cepillar", "finish": "terminar", "know": "saber/conocer",
            "open": "abrir", "confirm": "confirmar", "continue": "continuar", "improve": "mejorar", "change": "cambiar", "break": "romper", "fix": "arreglar", "lose": "perder", "find out": "descubrir", "forget": "olvidar", "remember": "recordar", "watch": "mirar", "rain": "llover", "travel": "viajar", "teach": "enseñar", "stay": "quedarse", "move": "mudar/mover", "return": "regresar", "cancel": "cancelar", "steal": "robar", "fall": "caer", "hurt": "doler/herir", "worry": "preocupar", "trust": "confiar", "join": "unirse", "share": "compartir", "avoid": "evitar", "book": "reservar", "imagine": "imaginar", "come": "venir",
            "complain": "quejarse", "request": "solicitar", "explain": "explicar", "recommend": "recomendar", "let know": "hacer saber", "collect": "recolectar", "sign": "firmar", "promise": "prometer", "discuss": "discutir", "receive": "recibir", "deliver": "entregar", "order": "ordenar", "build": "construir", "repair": "reparar", "design": "diseñar", "manage": "gestionar", "organize": "organizar", "support": "apoyar", "follow": "seguir", "verify": "verificar", "celebrate": "celebrar", "sing": "cantar", "understand": "entender", "learn": "aprender", "listen": "escuchar", "laugh": "reír", "cry": "llorar", "borrow": "pedir prestado",
            "dream": "soñar", "complete": "completar", "report": "reportar", "solve": "resolver", "submit": "enviar", "suggest": "sugerir", "warn": "advertir", "wonder": "preguntarse", "choose": "elegir", "plan": "planear", "repeat": "repetir", "accomplish": "lograr", "relax": "relajarse", "compare": "comparar", "park": "estacionar", "plug": "enchufar", "carry": "cargar", "pay": "pagar", "switch": "intercambiar", "push": "empujar", "pull": "jalar", "show": "mostrar", "save": "ahorrar", "raise": "levantar", "go down": "bajar", "increase": "aumentar", "reduce": "reducir", "hand": "entregar", "reach": "alcanzar",
            "think": "pensar", "believe": "creer", "feel": "sentir", "want": "querer", "need": "necesitar", "love": "amar", "hate": "odiar", "prefer": "preferir", "hope": "esperar", "enjoy": "disfrutar", "decide": "decidir", "allow": "permitir", "prevent": "prevenir", "protect": "proteger", "handle": "manejar", "perform": "realizar", "develop": "desarrollar", "grow": "crecer", "replace": "reemplazar", "throw": "lanzar", "catch": "atrapar", "sit": "sentarse", "stand": "ponerse de pie", "jump": "saltar", "run": "correr", "hide": "esconderse", "taste": "probar", "smell": "oler", "touch": "tocar", "bite": "morder",
            "invite": "invitar", "accept": "aceptar", "refuse": "rechazar", "admit": "admitir", "deny": "negar", "offer": "ofrecer", "demand": "exigir", "advise": "aconsejar", "encourage": "animar", "mention": "mencionar", "describe": "describir", "identify": "identificar", "realize": "darse cuenta", "recognize": "reconocer", "suppose": "suponer", "guess": "adivinar", "measure": "medir", "weigh": "pesar", "fit": "quedar (talla)", "suit": "quedar bien", "match": "hacer juego", "fill": "llenar", "empty": "vaciar", "burn": "quemar", "freeze": "congelar", "melt": "derretir", "mix": "mezclar", "connect": "conectar", "succeed": "tener éxito", "fail": "fracasar",
            "What": "Qué", "Where": "Dónde", "When": "Cuándo", "Who": "Quién", "Why": "Por qué", "Which": "Cuál", "How": "Cómo", "Whose": "De quién", "Whom": "A quién", "What time": "A qué hora", "How often": "Con qué frecuencia", "How much": "Cuánto", "How many": "Cuántos", "How long": "Cuánto tiempo",
            "in": "en", "on": "en (sobre/días)", "at": "en (punto/horas)", "about": "acerca de", "against": "contra", "according to": "según", "during": "durante", "so that": "para que", "instead of": "en lugar de", "then": "entonces", "between": "entre dos", "among": "entre varios", "next to": "al lado de", "behind": "detrás", "in front of": "enfrente", "close to": "cerca de", "by": "por/junto a", "under": "debajo", "below": "abajo"
        };

        const Dashboard = () => {
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);

            // ESTADOS DE TAXONOMÍA
            const [selectedLevel, setSelectedLevel] = useState('basic');
            const [selectedCat, setSelectedCat] = useState('verbs');
            const [selectedTopic, setSelectedTopic] = useState('');

            // ESTADO DE PALABRAS DEL JUEGO
            const [wordPairs, setWordPairs] = useState([]); 
            const [manualEn, setManualEn] = useState('');
            const [manualEs, setManualEs] = useState('');

            // EFECTO REACTIVO: Cuando cambia Level, Cat o Topic, se recalcula el Título
            const generatedTitle = useMemo(() => {
                if (!selectedLevel || !selectedCat || !selectedTopic) return "Nuevo Match Madness";
                const levelCap = selectedLevel.charAt(0).toUpperCase() + selectedLevel.slice(1);
                const catCap = selectedCat.charAt(0).toUpperCase() + selectedCat.slice(1);
                
                // Buscar el objeto del tema dentro de la Taxonomía para sacar el título bonito
                const topicObj = TAXONOMY[selectedLevel]?.[selectedCat]?.find(t => t.id === selectedTopic);
                const topicName = topicObj ? topicObj.title : selectedTopic;
                
                return `${levelCap} - ${catCap}: ${topicName}`;
            }, [selectedLevel, selectedCat, selectedTopic]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);

                const init = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const editId = params.get('edit');
                    if (editId) {
                        setIsLoadingData(true);
                        try {
                            const docRef = doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                setEditingId(editId);
                                
                                // Cargar Tags si existen en Firebase
                                if (data.tags) {
                                    setSelectedLevel(data.tags.level || 'basic');
                                    setSelectedCat(data.tags.category || 'verbs');
                                    setSelectedTopic(data.tags.topic || '');
                                }

                                // Cargar Palabras si existen en Firebase
                                if (data.content && data.content.wordPool) {
                                    setWordPairs(data.content.wordPool);
                                }
                            } else alert("No se encontró el juego.");
                        } catch (e) { alert("Error cargando: " + e.message); } 
                        finally { setIsLoadingData(false); }
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const toggleTheme = () => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); };

            // AUTOGENERAR PALABRAS AL SELECCIONAR TEMA (O CUANDO LE DAS AL BOTÓN REGENERAR)
            const fetchWordsFromTaxonomy = useCallback((topicId, level = selectedLevel, cat = selectedCat) => {
                const topicObj = TAXONOMY[level]?.[cat]?.find(t => t.id === topicId);
                
                if (topicObj && topicObj.words) {
                    const pairs = topicObj.words.map((w, index) => ({
                        id: `auto-${Date.now()}-${index}`,
                        en: w,
                        es: DICTIONARY[w] || "TRADUCIR"
                    }));
                    setWordPairs(pairs);
                }
            }, [selectedLevel, selectedCat]);

            const handleTopicChange = (topicId) => {
                setSelectedTopic(topicId);
                fetchWordsFromTaxonomy(topicId); // Trae las palabras frescas al instante
            };

            const handleAddManualPair = () => {
                if (!manualEn.trim() || !manualEs.trim()) return;
                setWordPairs([...wordPairs, { id: `man-${Date.now()}`, en: manualEn.trim(), es: manualEs.trim() }]);
                setManualEn(''); setManualEs('');
            };

            const removePair = (idToRemove) => {
                setWordPairs(wordPairs.filter(p => p.id !== idToRemove));
            };

            const saveToFirebase = async () => {
                if (!selectedTopic) return alert("Selecciona un tema (Topic) antes de guardar.");
                if (wordPairs.length < 5) return alert(`El juego necesita mínimo 5 palabras. Tienes ${wordPairs.length}.`);
                
                setIsSaving(true);
                try {
                    const cleanPool = wordPairs.map((p, index) => ({
                        id: `p-${index}`,
                        en: p.en,
                        es: p.es
                    }));

                    const processedContent = { wordPool: cleanPool };
                    const tags = { level: selectedLevel, category: selectedCat, topic: selectedTopic };

                    const params = new URLSearchParams(window.location.search);
                    const folderParam = params.get('folder');
                    const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';

                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), { 
                            title: generatedTitle, tags: tags, content: processedContent, updatedAt: serverTimestamp() 
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'users', 'teacher_builder_001', 'quizzes'), { 
                            title: generatedTitle, type: 'MATCH', tags: tags, content: processedContent, createdAt: serverTimestamp(), parentPath: parentPath 
                        });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html'; 
                } catch (e) { alert("Error guardando: " + e.message); }
                finally { setIsSaving(false); }
            };

            if (isLoadingData) return <div className="h-[100dvh] flex items-center justify-center text-slate-500 font-bold"><Loader2 className="animate-spin mr-2"/> Cargando datos del juego...</div>;

            return (
                <div className="h-[100dvh] flex flex-col">
                    <div className="bg-slate-900 dark:bg-black px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center shrink-0 shadow-md z-10 gap-4">
                        <div className="flex items-center justify-between w-full md:w-auto">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href='index.html'} className="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <h1 className="text-xl font-black tracking-tight text-white flex items-center gap-2"><Zap className="text-yellow-400 w-5 h-5"/> Match Builder</h1>
                            </div>
                            <button onClick={toggleTheme} className="p-2 text-yellow-400 md:hidden">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                        </div>
                        <div className="flex items-center gap-2 w-full md:w-auto justify-end">
                            {editingId && (
                                <div className="px-4 py-1.5 flex items-center gap-2 mr-4 border border-emerald-500/30 rounded-full bg-emerald-500/10">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-emerald-400 font-black text-xs uppercase tracking-widest">Modo Edición</span>
                                </div>
                            )}
                            <button onClick={toggleTheme} className="hidden md:block p-2 text-yellow-400 shrink-0">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</button>
                            <button onClick={saveToFirebase} disabled={isSaving || wordPairs.length < 5 || !selectedTopic} className="w-full md:w-auto bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all disabled:opacity-50">
                                {isSaving ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} {editingId ? "Actualizar" : "Guardar Juego"}
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex flex-1 flex-col md:flex-row overflow-hidden bg-white dark:bg-zinc-950">
                        {/* LEFT PANEL - TAXONOMY SELECTORS */}
                        <div className="w-full md:w-[35%] xl:w-[30%] border-b md:border-b-0 md:border-r border-slate-200 dark:border-zinc-800 flex flex-col h-1/2 md:h-full bg-slate-50 dark:bg-zinc-950/50">
                            <div className="p-4 md:p-6 border-b border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shrink-0">
                                <h2 className="font-black text-slate-800 dark:text-white flex items-center gap-2 text-lg"><Tags className="text-indigo-500"/> Clasificación (Tags)</h2>
                                <p className="text-xs text-slate-400 dark:text-zinc-500 font-medium mt-1">El título se generará y clasificará automáticamente.</p>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 custom-scrollbar">
                                {/* LEVEL */}
                                <div>
                                    <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">1. Nivel (Level)</label>
                                    <select value={selectedLevel} onChange={e => { setSelectedLevel(e.target.value); setSelectedCat('verbs'); setSelectedTopic(''); }} className="w-full bg-white dark:bg-zinc-900 border border-slate-300 dark:border-zinc-700 rounded-xl p-3 text-slate-800 dark:text-zinc-200 font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                        {Object.keys(TAXONOMY).map(lvl => <option key={lvl} value={lvl}>{lvl.toUpperCase()}</option>)}
                                    </select>
                                </div>

                                {/* CATEGORY */}
                                <div>
                                    <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">2. Categoría (Category)</label>
                                    <select value={selectedCat} onChange={e => { setSelectedCat(e.target.value); setSelectedTopic(''); }} className="w-full bg-white dark:bg-zinc-900 border border-slate-300 dark:border-zinc-700 rounded-xl p-3 text-slate-800 dark:text-zinc-200 font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                        {Object.keys(TAXONOMY[selectedLevel] || {}).map(cat => <option key={cat} value={cat}>{cat.toUpperCase()}</option>)}
                                    </select>
                                </div>

                                {/* TOPIC */}
                                <div>
                                    <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">3. Tema (Topic)</label>
                                    <div className="space-y-2">
                                        {TAXONOMY[selectedLevel]?.[selectedCat]?.map(topic => (
                                            <button 
                                                key={topic.id} 
                                                onClick={() => handleTopicChange(topic.id)}
                                                className={`w-full text-left p-3 rounded-xl border-2 transition-all font-bold text-sm ${selectedTopic === topic.id ? 'bg-indigo-100 dark:bg-indigo-900/30 border-indigo-500 text-indigo-700 dark:text-indigo-400' : 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-600 dark:text-zinc-400 hover:border-slate-300 dark:hover:border-zinc-600'}`}
                                            >
                                                {topic.title}
                                            </button>
                                        ))}
                                    </div>
                                    {!selectedTopic && <p className="text-rose-500 text-xs font-bold mt-3 animate-pulse">⚠️ Selecciona un tema para generar la lista.</p>}
                                </div>
                            </div>
                        </div>
                        
                        {/* RIGHT PANEL - PREVIEW AND EDIT */}
                        <div className="w-full md:w-[65%] xl:w-[70%] bg-white dark:bg-zinc-900 flex flex-col relative h-1/2 md:h-full">
                            <div className="p-4 md:p-6 border-b border-slate-200 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-sm z-10 shrink-0 gap-4 bg-slate-50 dark:bg-zinc-950/50">
                                <div className="w-full">
                                    <h3 className="font-black text-slate-800 dark:text-white flex items-center gap-2 text-xl truncate">{generatedTitle}</h3>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className="text-[10px] font-black uppercase bg-slate-200 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 px-2 py-1 rounded-md">{selectedLevel || '?'}</span>
                                        <span className="text-[10px] font-black uppercase bg-slate-200 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 px-2 py-1 rounded-md">{selectedCat || '?'}</span>
                                        
                                        {/* BOTÓN DE REGENERAR */}
                                        {selectedTopic && (
                                            <button 
                                                onClick={() => fetchWordsFromTaxonomy(selectedTopic)} 
                                                className="text-[10px] font-black uppercase bg-amber-100 text-amber-700 hover:bg-amber-200 dark:bg-amber-900/30 dark:text-amber-400 px-2 py-1 rounded-md flex items-center gap-1 transition-colors"
                                                title="Recargar lista original"
                                            >
                                                <RefreshCw size={10} /> Regenerar
                                            </button>
                                        )}
                                    </div>
                                </div>
                                <div className={`px-4 py-2 rounded-xl text-sm font-black border shrink-0 text-center ${wordPairs.length >= 5 ? 'bg-emerald-100 text-emerald-800 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800/50' : 'bg-rose-100 text-rose-800 border-rose-300 animate-pulse'}`}>
                                    {wordPairs.length} PARES
                                    <p className="text-[9px] uppercase font-bold opacity-70">Mínimo 5</p>
                                </div>
                            </div>
                            
                            <div className="flex-1 p-4 md:p-6 overflow-y-auto custom-scrollbar bg-slate-100/50 dark:bg-zinc-950">
                                
                                {/* ADD MANUAL PAIR */}
                                <div className="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl p-4 flex flex-col sm:flex-row gap-3 items-end mb-8 shadow-sm">
                                    <div className="w-full sm:flex-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Columna 1 (Inglés / Llave)</label>
                                        <input value={manualEn} onChange={e => setManualEn(e.target.value)} className="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-300 dark:border-zinc-700 rounded-xl p-2.5 text-sm font-bold dark:text-white outline-none focus:border-indigo-500" placeholder="Ej. Run"/>
                                    </div>
                                    <div className="w-full sm:flex-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Columna 2 (Español / Par)</label>
                                        <input value={manualEs} onChange={e => setManualEs(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddManualPair()} className="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-300 dark:border-zinc-700 rounded-xl p-2.5 text-sm font-bold dark:text-white outline-none focus:border-indigo-500" placeholder="Ej. Correr"/>
                                    </div>
                                    <button onClick={handleAddManualPair} disabled={!manualEn || !manualEs} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white p-3 rounded-xl font-bold flex items-center justify-center transition-colors">
                                        <Plus size={20}/>
                                    </button>
                                </div>

                                {/* LISTA DE PALABRAS */}
                                {wordPairs.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center text-slate-400 dark:text-zinc-600 py-12">
                                        <ShoppingCart size={48} className="mb-4 opacity-50"/>
                                        <p className="font-bold text-center text-lg">Bolsa Vacía</p>
                                        <p className="text-sm text-center mt-1">Selecciona un tema a la izquierda para auto-generar los pares.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 pb-24">
                                        {wordPairs.map((pair, index) => (
                                            <div key={pair.id} className="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl p-3 flex flex-col justify-center items-center text-center relative group shadow-sm hover:border-indigo-400 dark:hover:border-indigo-600 transition-colors">
                                                <div className="absolute top-2 left-2 bg-slate-100 dark:bg-zinc-800 text-slate-400 dark:text-zinc-500 text-[9px] font-black px-1.5 py-0.5 rounded">{index + 1}</div>
                                                <button onClick={() => removePair(pair.id)} className="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={14}/></button>
                                                
                                                <span className="font-black text-slate-800 dark:text-zinc-100 text-sm mt-3 leading-tight">{pair.en}</span>
                                                <span className="text-xs text-indigo-500 dark:text-indigo-400 font-bold uppercase mt-1 leading-tight">{pair.es}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

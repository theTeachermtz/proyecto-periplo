const MAX_PAIRS = 96;

const Dashboard=()=>{
    const[isSaving,setIsSaving]=useState(false);
    const[editingId,setEditingId]=useState(null);
    const[isLoading,setIsLoading]=useState(false);
    const[isDark,setIsDark]=useState(true);
    const[selectedLevel,setSelectedLevel]=useState('basic');
    const[selectedCat,setSelectedCat]=useState('verbs');
    const[firstTopic,setFirstTopic]=useState('');
    const[wordPairs,setWordPairs]=useState([]);
    const[addedTopics,setAddedTopics]=useState(new Set());
    const[manualEn,setManualEn]=useState('');
    const[manualEs,setManualEs]=useState('');

    const remaining = MAX_PAIRS - wordPairs.length;
    const canSave = wordPairs.length >= 45 && wordPairs.length <= MAX_PAIRS && firstTopic;

    const generatedTitle = useMemo(()=>{
        if(!firstTopic) return "Nuevo Match Madness";
        const t = [...addedTopics];
        const first = t[0] || '';
        // Find the topic object
        let topicName = first;
        for(const lvl of Object.keys(TAXONOMY)){
            for(const cat of Object.keys(TAXONOMY[lvl])){
                const found = TAXONOMY[lvl][cat].find(tp=>tp.id===first);
                if(found) topicName = found.title;
            }
        }
        const suffix = t.length > 1 ? ` + ${t.length-1} más` : '';
        return `${selectedLevel.toUpperCase()} — ${topicName}${suffix}`;
    },[firstTopic,addedTopics,selectedLevel]);

    useEffect(()=>{
        const init=async()=>{
            const p=new URLSearchParams(window.location.search);
            const editId=p.get('edit');
            if(editId){
                setIsLoading(true);
                try{
                    const snap=await getDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',editId));
                    if(snap.exists()){
                        const d=snap.data();setEditingId(editId);
                        if(d.tags){setSelectedLevel(d.tags.level||'basic');setSelectedCat(d.tags.category||'verbs');setFirstTopic(d.tags.topic||'');}
                        if(d.content?.wordPool) setWordPairs(d.content.wordPool);
                        if(d.tags?.addedTopics) setAddedTopics(new Set(d.tags.addedTopics));
                    }
                }catch(e){alert(e.message)}
                setIsLoading(false);
            }
        };init();
    },[]);

    useEffect(()=>{if(isDark)document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark')},[isDark]);

    const addTopic=(topicId)=>{
        const topicObj=TAXONOMY[selectedLevel]?.[selectedCat]?.find(t=>t.id===topicId);
        if(!topicObj||!topicObj.words) return;
        if(addedTopics.has(topicId)) return; // Already added

        const newPairs=topicObj.words.map((w,i)=>({
            id:`${topicId}-${i}-${Date.now()}`,en:w,es:D[w]||D[w.toLowerCase()]||"TRADUCIR"
        }));

        const combined=[...wordPairs,...newPairs];
        if(combined.length>MAX_PAIRS){
            alert(`Esto excedería el límite de ${MAX_PAIRS}. Tienes ${wordPairs.length}, el pack tiene ${newPairs.length}. Espacio: ${remaining}.`);
            return;
        }

        setWordPairs(combined);
        const newAdded=new Set(addedTopics);newAdded.add(topicId);setAddedTopics(newAdded);
        if(!firstTopic) setFirstTopic(topicId);
    };

    const removeTopic=(topicId)=>{
        const topicObj=TAXONOMY[selectedLevel]?.[selectedCat]?.find(t=>t.id===topicId);
        if(!topicObj) return;
        const wordsToRemove=new Set(topicObj.words);
        setWordPairs(prev=>prev.filter(p=>!wordsToRemove.has(p.en)));
        const newAdded=new Set(addedTopics);newAdded.delete(topicId);setAddedTopics(newAdded);
        if(firstTopic===topicId){
            const remaining=[...newAdded];
            setFirstTopic(remaining[0]||'');
        }
    };

    const clearAll=()=>{if(confirm("¿Vaciar toda la bolsa?")){setWordPairs([]);setAddedTopics(new Set());setFirstTopic('');}};

    const addManual=()=>{
        if(!manualEn.trim()||!manualEs.trim()) return;
        if(wordPairs.length>=MAX_PAIRS) return alert(`Límite de ${MAX_PAIRS} alcanzado.`);
        setWordPairs([...wordPairs,{id:`man-${Date.now()}`,en:manualEn.trim(),es:manualEs.trim()}]);
        setManualEn('');setManualEs('');
    };

    const removePair=(id)=>setWordPairs(wordPairs.filter(p=>p.id!==id));

    const saveToFirebase=async()=>{
        if(!canSave) return;
        setIsSaving(true);
        try{
            const pool=wordPairs.map((p,i)=>({id:`p-${i}`,en:p.en,es:p.es}));
            const tags={level:selectedLevel,category:selectedCat,topic:firstTopic,addedTopics:[...addedTopics]};
            const params=new URLSearchParams(window.location.search);
            const fp=params.get('folder');
            const pp=(fp&&fp!=='undefined'&&fp!=='null')?decodeURIComponent(fp):'';

            if(editingId){
                await updateDoc(doc(db,'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes',editingId),{title:generatedTitle,tags,content:{wordPool:pool},updatedAt:serverTimestamp()});
            }else{
                await addDoc(collection(db,'artifacts','periplo-app-v1','users','teacher_builder_001','quizzes'),{title:generatedTitle,type:'MATCH',tags,content:{wordPool:pool},createdAt:serverTimestamp(),parentPath:pp});
            }
            window.location.href=pp?`index.html?folder=${encodeURIComponent(pp)}`:'index.html';
        }catch(e){alert(e.message)}
        setIsSaving(false);
    };

    if(isLoading) return<div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-zinc-500"><Loader2 className="animate-spin mr-2"/>Cargando...</div>;

    const categories=Object.keys(TAXONOMY[selectedLevel]||{}).filter(c=>(TAXONOMY[selectedLevel][c]||[]).length>0);

    return(
        <div className="h-[100dvh] flex flex-col text-zinc-100">
            {/* HEADER */}
            <div className="bg-black px-4 py-3 flex justify-between items-center shrink-0 border-b border-zinc-800 gap-3">
                <div className="flex items-center gap-3 min-w-0">
                    <button onClick={()=>window.location.href='index.html'} className="p-2 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl"><ArrowLeft size={18}/></button>
                    <div className="min-w-0">
                        <h1 className="text-base font-black flex items-center gap-2 truncate"><Zap className="text-yellow-400 w-4 h-4 flex-shrink-0"/> Match Builder</h1>
                        <p className="text-[10px] text-zinc-500 font-bold truncate">{generatedTitle}</p>
                    </div>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                    {editingId&&<span className="text-emerald-400 text-[10px] font-black uppercase bg-emerald-500/10 px-2 py-1 rounded-full border border-emerald-500/30">Editando</span>}
                    <button onClick={saveToFirebase} disabled={isSaving||!canSave} className="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-40 disabled:bg-zinc-800 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 text-sm">
                        {isSaving?<Loader2 className="animate-spin" size={16}/>:<Save size={16}/>} Guardar
                    </button>
                </div>
            </div>

            <div className="flex flex-1 flex-col md:flex-row overflow-hidden">
                {/* LEFT: TAXONOMY */}
                <div className="w-full md:w-[38%] xl:w-[32%] border-b md:border-b-0 md:border-r border-zinc-800 flex flex-col h-[45%] md:h-full bg-zinc-950">
                    <div className="p-4 border-b border-zinc-800 shrink-0">
                        <h2 className="font-black text-sm flex items-center gap-2"><Tags className="text-indigo-400" size={16}/> Clasificación</h2>
                        <p className="text-[10px] text-zinc-500 font-bold mt-1">Selecciona packs para llenar la bolsa (mín 45, máx {MAX_PAIRS})</p>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-5 custom-scrollbar">
                        {/* Level */}
                        <div>
                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Nivel</label>
                            <select value={selectedLevel} onChange={e=>{setSelectedLevel(e.target.value);setSelectedCat(Object.keys(TAXONOMY[e.target.value]||{}).filter(c=>(TAXONOMY[e.target.value][c]||[]).length>0)[0]||'verbs');}}
                                className="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5 text-sm font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                {Object.keys(TAXONOMY).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                            </select>
                        </div>

                        {/* Category tabs */}
                        <div>
                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Categoría</label>
                            <div className="flex flex-wrap gap-1.5">
                                {categories.map(c=>(
                                    <button key={c} onClick={()=>setSelectedCat(c)}
                                        className={`px-3 py-1.5 rounded-lg text-xs font-black uppercase transition-all ${selectedCat===c?'bg-indigo-600 text-white':'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Topics */}
                        <div className="space-y-2">
                            <label className="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Packs disponibles</label>
                            {(TAXONOMY[selectedLevel]?.[selectedCat]||[]).map(topic=>{
                                const isAdded=addedTopics.has(topic.id);
                                const wc=topic.words?.length||0;
                                const wouldExceed=wordPairs.length+wc>MAX_PAIRS;
                                return(
                                    <button key={topic.id} onClick={()=>isAdded?removeTopic(topic.id):addTopic(topic.id)}
                                        disabled={!isAdded&&wouldExceed}
                                        className={`w-full text-left p-3 rounded-xl border-2 font-bold text-sm transition-all ${
                                            isAdded?'bg-indigo-600/20 border-indigo-500 text-indigo-300':
                                            wouldExceed?'bg-zinc-900 border-zinc-800 text-zinc-600 opacity-50 cursor-not-allowed':
                                            'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-indigo-500/50 active:scale-[0.98]'
                                        }`}>
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-2">
                                                {isAdded&&<CheckCircle2 size={14} className="text-indigo-400"/>}
                                                <span>{topic.title}</span>
                                            </div>
                                            <span className={`text-[10px] px-2 py-0.5 rounded ${isAdded?'bg-indigo-500/30 text-indigo-300':'bg-zinc-800 text-zinc-500'}`}>
                                                {isAdded?'✓ Agregado':`+${wc}`}
                                            </span>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* RIGHT: BAG */}
                <div className="w-full md:w-[62%] xl:w-[68%] flex flex-col h-[55%] md:h-full bg-zinc-900">
                    {/* Bag header */}
                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center shrink-0 bg-zinc-950/50">
                        <div>
                            <h3 className="font-black text-base truncate">{generatedTitle}</h3>
                            <div className="flex gap-1.5 mt-1 flex-wrap">
                                {[...addedTopics].map(tid=>{
                                    let name=tid;
                                    for(const l of Object.keys(TAXONOMY))for(const c of Object.keys(TAXONOMY[l])){const f=TAXONOMY[l][c].find(t=>t.id===tid);if(f)name=f.title;}
                                    return<span key={tid} className="text-[9px] font-black bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-md border border-indigo-500/30">{name}</span>;
                                })}
                            </div>
                        </div>
                        <div className="flex items-center gap-2 flex-shrink-0">
                            <button onClick={clearAll} disabled={!wordPairs.length} className="p-2 bg-rose-500/10 text-rose-400 rounded-xl hover:bg-rose-500/20 disabled:opacity-30"><Trash size={16}/></button>
                            <div className={`px-3 py-2 rounded-xl text-sm font-black border text-center ${
                                canSave?'bg-emerald-500/10 text-emerald-400 border-emerald-500/30':
                                wordPairs.length>MAX_PAIRS?'bg-rose-500/10 text-rose-400 border-rose-500/30':
                                'bg-amber-500/10 text-amber-400 border-amber-500/30'
                            }`}>
                                {wordPairs.length}/{MAX_PAIRS}
                                <p className="text-[8px] uppercase font-bold opacity-70">
                                    {wordPairs.length>MAX_PAIRS?'Excedido':wordPairs.length>=45?'¡Listo!':`Faltan ${Math.max(0,45-wordPairs.length)}`}
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-4 overflow-y-auto custom-scrollbar">
                        {/* Manual add */}
                        <div className="bg-zinc-950 border border-zinc-800 rounded-2xl p-3 flex gap-2 items-end mb-4">
                            <div className="flex-1">
                                <label className="text-[9px] font-black text-zinc-500 uppercase block mb-1">English</label>
                                <input value={manualEn} onChange={e=>setManualEn(e.target.value)} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-sm font-bold outline-none focus:border-indigo-500" placeholder="Run"/>
                            </div>
                            <div className="flex-1">
                                <label className="text-[9px] font-black text-zinc-500 uppercase block mb-1">Español</label>
                                <input value={manualEs} onChange={e=>setManualEs(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addManual()} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-sm font-bold outline-none focus:border-indigo-500" placeholder="Correr"/>
                            </div>
                            <button onClick={addManual} disabled={!manualEn||!manualEs||wordPairs.length>=MAX_PAIRS} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white p-2 rounded-lg"><Plus size={18}/></button>
                        </div>

                        {wordPairs.length===0?(
                            <div className="flex flex-col items-center justify-center text-zinc-600 py-12">
                                <ShoppingCart size={40} className="mb-3 opacity-40"/>
                                <p className="font-bold">Bolsa vacía</p>
                                <p className="text-xs mt-1 text-center">Selecciona packs en el panel izquierdo.</p>
                            </div>
                        ):(
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 pb-20">
                                {wordPairs.map((p,i)=>(
                                    <div key={p.id} className="bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 flex items-center justify-between group hover:border-zinc-600 transition-colors">
                                        <div className="min-w-0 flex-1">
                                            <span className="text-[9px] text-zinc-600 font-black">{i+1}.</span>
                                            <span className="font-bold text-zinc-200 text-sm ml-1">{p.en}</span>
                                            <span className="text-indigo-400 text-xs font-bold ml-2">{p.es}</span>
                                        </div>
                                        <button onClick={()=>removePair(p.id)} className="text-zinc-700 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity ml-2 flex-shrink-0"><Trash2 size={13}/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crossword | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .cell-input::selection { background: transparent; }
        .crossword-container { transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
    </style>
</head>
<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Check, RotateCcw, Award, Home, ArrowRight, ArrowDown, Edit2, X, LocateFixed, Plus, Minus } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MOTOR GENERADOR DEL CRUCIGRAMA ---
        const generateCrossword = (words) => {
            if (!words || words.length === 0) return null;
            let bestLayout = null; let maxPlaced = 0;
            const sortedWords = [...words].sort((a, b) => b.wordEn.length - a.wordEn.length);

            const isValid = (wordStr, startX, startY, isHoriz, gridState) => {
                for (let i = 0; i < wordStr.length; i++) {
                    let x = startX + (isHoriz ? i : 0); let y = startY + (isHoriz ? 0 : i);
                    let cell = gridState[`${x},${y}`];
                    if (cell && cell !== wordStr[i]) return false; 
                    const top = gridState[`${x},${y - 1}`]; const bottom = gridState[`${x},${y + 1}`];
                    const left = gridState[`${x - 1},${y}`]; const right = gridState[`${x + 1},${y}`];
                    if (isHoriz) {
                        if (!cell && (top || bottom)) return false;
                        if (i === 0 && left) return false;
                        if (i === wordStr.length - 1 && right) return false;
                    } else {
                        if (!cell && (left || right)) return false;
                        if (i === 0 && top) return false;
                        if (i === wordStr.length - 1 && bottom) return false;
                    }
                }
                return true;
            };

            const tryPlace = (wordIndex, currentPlacements, currentGrid) => {
                if (wordIndex === sortedWords.length) { bestLayout = [...currentPlacements]; maxPlaced = currentPlacements.length; return true; }
                if (currentPlacements.length > maxPlaced) { maxPlaced = currentPlacements.length; bestLayout = [...currentPlacements]; }

                const word = sortedWords[wordIndex];
                const wordStr = word.wordEn.toUpperCase().replace(/\s+/g, '');

                if (currentPlacements.length === 0) {
                    const newGrid = { ...currentGrid };
                    for (let i = 0; i < wordStr.length; i++) newGrid[`${i},0`] = wordStr[i];
                    if (tryPlace(wordIndex + 1, [{ ...word, x: 0, y: 0, isHoriz: true, wordStr }], newGrid)) return true;
                } else {
                    let placedAny = false;
                    for (const placement of currentPlacements) {
                        for (let j = 0; j < placement.wordStr.length; j++) {
                            for (let k = 0; k < wordStr.length; k++) {
                                if (placement.wordStr[j] === wordStr[k]) {
                                    const isHoriz = !placement.isHoriz;
                                    const startX = placement.isHoriz ? placement.x + j : placement.x - k;
                                    const startY = placement.isHoriz ? placement.y - k : placement.y + j;

                                    if (isValid(wordStr, startX, startY, isHoriz, currentGrid)) {
                                        const newGrid = { ...currentGrid };
                                        for (let i = 0; i < wordStr.length; i++) newGrid[`${startX + (isHoriz ? i : 0)},${startY + (isHoriz ? 0 : i)}`] = wordStr[i];
                                        if (tryPlace(wordIndex + 1, [...currentPlacements, { ...word, x: startX, y: startY, isHoriz, wordStr }], newGrid)) return true;
                                        placedAny = true;
                                    }
                                }
                            }
                        }
                    }
                    if (!placedAny) tryPlace(wordIndex + 1, currentPlacements, currentGrid);
                }
                return false;
            };

            tryPlace(0, [], {});
            if (!bestLayout || bestLayout.length === 0) return null;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            bestLayout.forEach(p => {
                if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
                if (p.isHoriz) { if (p.x + p.wordStr.length - 1 > maxX) maxX = p.x + p.wordStr.length - 1; if (p.y > maxY) maxY = p.y; } 
                else { if (p.x > maxX) maxX = p.x; if (p.y + p.wordStr.length - 1 > maxY) maxY = p.y + p.wordStr.length - 1; }
            });

            let numberMap = {}; let currentNumber = 1;
            const sortedPlacements = [...bestLayout].sort((a, b) => a.y === b.y ? a.x - b.x : a.y - b.y);

            sortedPlacements.forEach(p => {
                p.normX = p.x - minX; p.normY = p.y - minY;
                const key = `${p.normX},${p.normY}`;
                if (!numberMap[key]) numberMap[key] = currentNumber++;
                p.number = numberMap[key];
            });

            const width = maxX - minX + 1; const height = maxY - minY + 1;
            const grid = Array(height).fill(null).map(() => Array(width).fill(null));

            sortedPlacements.forEach(p => {
                for (let i = 0; i < p.wordStr.length; i++) {
                    const x = p.normX + (p.isHoriz ? i : 0); const y = p.normY + (p.isHoriz ? 0 : i);
                    if (!grid[y][x]) {
                        grid[y][x] = { answer: p.wordStr[i], starts: i === 0 ? [{number: p.number, isHoriz: p.isHoriz}] : [], placements: [p], x, y };
                    } else {
                        grid[y][x].placements.push(p);
                        if (i === 0) grid[y][x].starts.push({number: p.number, isHoriz: p.isHoriz});
                    }
                }
            });

            const clues = { across: [], down: [] };
            sortedPlacements.forEach(p => {
                p.clueText = p.wordEs || p.exampleEn || p.c2 || "Missing Clue"; 
                p.emojis = p.emojis || "🎯";
                if (p.isHoriz) clues.across.push(p); else clues.down.push(p);
            });

            return { grid, clues, width, height, totalWords: bestLayout.length };
        };

        const CrosswordApp = () => {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);

            const [layout, setLayout] = useState(null);
            const [inputs, setInputs] = useState({});
            
            const [selectedCell, setSelectedCell] = useState(null);
            const [solvedWords, setSolvedWords] = useState([]); 
            const [activePlacementId, setActivePlacementId] = useState(null); 
            const [direction, setDirection] = useState('across'); 
            const [viewMode, setViewMode] = useState('overview'); 
            const [wordFeedback, setWordFeedback] = useState(null); 
            const [globalWin, setGlobalWin] = useState(false);

            const [showAcrossPop, setShowAcrossPop] = useState(false);
            const [showDownPop, setShowDownPop] = useState(false);

            const inputRefs = useRef({});
            const containerRef = useRef(null);
            
            // --- ESTADOS PARA PAN & ZOOM ---
            const [baseScale, setBaseScale] = useState(1);
            const [viewState, setViewState] = useState({ x: 0, y: 0, scale: 1 });
            const [isDraggingUI, setIsDraggingUI] = useState(false);
            const isDraggingRef = useRef(false);
            const dragStartRef = useRef({ x: 0, y: 0, tx: 0, ty: 0, moved: false });

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if(snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            const rawWords = data.content?.cards || data.content?.pairs || [];
                            const cleanWords = rawWords.map((w, i) => ({
                                id: w.id || i, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                                exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || w.c2 || '🎯'
                            })).filter(w => w.wordEn);
                            
                            const shuffledWords = cleanWords.sort(() => 0.5 - Math.random());
                            const generated = generateCrossword(shuffledWords.slice(0, 15)); 
                            setLayout(generated);
                        } else { alert("Juego no encontrado"); }
                        setLoading(false);
                    });
                } else { setLoading(false); }
                return () => unsub();
            }, [quizId]);

            // Calcular escala base
            useEffect(() => {
                if (!layout || !containerRef.current) return;
                const calculateOverviewScale = () => {
                    const { clientWidth, clientHeight } = containerRef.current;
                    const cellSize = window.innerWidth < 768 ? 40 : 48;
                    const gridW = layout.width * cellSize;
                    const gridH = layout.height * cellSize;
                    const scale = Math.min((clientWidth - 60) / gridW, (clientHeight - 180) / gridH, 1.2);
                    setBaseScale(scale);
                    if (viewMode === 'overview') setViewState({ scale, x: 0, y: 0 });
                };
                calculateOverviewScale();
                window.addEventListener('resize', calculateOverviewScale);
                return () => window.removeEventListener('resize', calculateOverviewScale);
            }, [layout, viewMode]);

            // Cámara Cinematográfica (Enfocar palabra)
            useEffect(() => {
                if (viewMode === 'focused' && activePlacementId && layout && containerRef.current) {
                    const activePlacement = layout.clues.across.concat(layout.clues.down).find(p => p.id === activePlacementId);
                    if (!activePlacement) return;
                    const cellSize = window.innerWidth < 768 ? 40 : 48;
                    
                    const wordCenterX = (activePlacement.normX + (activePlacement.isHoriz ? activePlacement.wordStr.length / 2 : 0.5)) * cellSize;
                    const wordCenterY = (activePlacement.normY + (activePlacement.isHoriz ? 0.5 : activePlacement.wordStr.length / 2)) * cellSize;
                    
                    const gridW = layout.width * cellSize;
                    const gridH = layout.height * cellSize;
                    const naturalCenterX = gridW / 2;
                    const naturalCenterY = gridH / 2;

                    const focusScale = window.innerWidth < 768 ? 1.5 : 1.8;
                    const tx = (naturalCenterX - wordCenterX) * focusScale;
                    const ty = (naturalCenterY - wordCenterY) * focusScale;

                    setViewState({ scale: focusScale, x: tx, y: ty });
                } else if (viewMode === 'overview') {
                    setViewState({ scale: baseScale, x: 0, y: 0 });
                }
            }, [viewMode, activePlacementId, layout, baseScale]);

            // --- DRAG AND DROP (PAN) LOGIC BLINDADO ---
            const handlePointerDown = (e) => {
                // EVITAR QUE ARRASTRE SI TOCA UNA CELDA DEL CRUCIGRAMA O UN BOTÓN
                if (e.target.tagName === 'INPUT' || e.target.closest('button') || e.target.closest('.crossword-cell')) return;
                
                isDraggingRef.current = true;
                setIsDraggingUI(true);
                dragStartRef.current = { 
                    x: e.clientX, y: e.clientY, 
                    tx: viewState.x, ty: viewState.y, moved: false 
                };
                e.currentTarget.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDraggingRef.current) return;
                const dx = e.clientX - dragStartRef.current.x;
                const dy = e.clientY - dragStartRef.current.y;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragStartRef.current.moved = true;
                
                setViewState(prev => ({ ...prev, x: dragStartRef.current.tx + dx, y: dragStartRef.current.ty + dy }));
            };

            const handlePointerUp = (e) => {
                if (!isDraggingRef.current) return;
                isDraggingRef.current = false;
                setIsDraggingUI(false);
                e.currentTarget.releasePointerCapture(e.pointerId);
                
                if (!dragStartRef.current.moved) {
                    if (viewMode === 'focused') {
                        setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                        setShowAcrossPop(false); setShowDownPop(false);
                    }
                }
            };

            const handleZoomIn = () => setViewState(p => ({...p, scale: Math.min(p.scale + 0.3, 3)}));
            const handleZoomOut = () => setViewState(p => ({...p, scale: Math.max(p.scale - 0.3, 0.4)}));
            const handleZoomReset = () => { setViewMode('overview'); setViewState({ scale: baseScale, x: 0, y: 0 }); };

            useEffect(() => {
                if (activePlacementId) {
                    const el = document.getElementById(`clue-${direction}-${activePlacementId}`);
                    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
                }
            }, [activePlacementId, showAcrossPop, showDownPop, direction]);

            const checkCurrentWord = () => {
                const activePlacement = layout.clues.across.concat(layout.clues.down).find(p => p.id === activePlacementId);
                if (!activePlacement) return;

                let isCorrect = true; let allFilled = true;
                for(let i=0; i<activePlacement.wordStr.length; i++) {
                    const x = activePlacement.normX + (activePlacement.isHoriz ? i : 0);
                    const y = activePlacement.normY + (activePlacement.isHoriz ? 0 : i);
                    const cell = layout.grid[y][x];
                    const isCellProtected = cell.placements.some(p => solvedWords.includes(p.id));
                    const userVal = isCellProtected ? cell.answer : (inputs[`${x},${y}`] || '');
                    
                    if (userVal === '') allFilled = false;
                    if (userVal !== activePlacement.wordStr[i]) isCorrect = false;
                }

                if (!allFilled) return;

                if (isCorrect) {
                    if (!solvedWords.includes(activePlacementId)) {
                        const newSolved = [...solvedWords, activePlacementId];
                        setSolvedWords(newSolved); setWordFeedback('success');
                        setTimeout(() => {
                            setWordFeedback(null); setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                            setShowAcrossPop(false); setShowDownPop(false);
                            if (newSolved.length === layout.totalWords) setGlobalWin(true);
                        }, 1200); 
                    }
                } else {
                    setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 800);
                }
            };

            const handleInput = (e, x, y) => {
                const val = e.target.value.slice(-1).toUpperCase();
                if (!/^[A-ZÑ]$/.test(val) && val !== '') return;

                const newInputs = { ...inputs, [`${x},${y}`]: val };
                setInputs(newInputs);

                if (val !== '') {
                    const cell = layout.grid[y][x];
                    const activePlacement = cell.placements.find(p => p.id === activePlacementId) || cell.placements[0];
                    const dist = activePlacement.isHoriz ? (x - activePlacement.normX) : (y - activePlacement.normY);

                    if (dist < activePlacement.wordStr.length - 1) {
                        const nextX = activePlacement.isHoriz ? x + 1 : x;
                        const nextY = activePlacement.isHoriz ? y : y + 1;
                        setSelectedCell({ x: nextX, y: nextY }); 
                        setTimeout(() => inputRefs.current[`${nextX},${nextY}`]?.focus(), 10);
                    } else {
                        setTimeout(() => checkWordForce(activePlacement, newInputs), 50);
                    }
                }
            };

            const checkWordForce = (activePlacement, currentInputs) => {
                let isCorrect = true; let allFilled = true;
                for(let i=0; i<activePlacement.wordStr.length; i++) {
                    const x = activePlacement.normX + (activePlacement.isHoriz ? i : 0);
                    const y = activePlacement.normY + (activePlacement.isHoriz ? 0 : i);
                    const cell = layout.grid[y][x];
                    const isCellProtected = cell.placements.some(p => solvedWords.includes(p.id));
                    const val = isCellProtected ? cell.answer : (currentInputs[`${x},${y}`] || '');

                    if (val === '') allFilled = false;
                    if (val !== activePlacement.wordStr[i]) isCorrect = false;
                }
                if (allFilled) {
                    if (isCorrect && !solvedWords.includes(activePlacement.id)) {
                        const newSolved = [...solvedWords, activePlacement.id];
                        setSolvedWords(newSolved); setWordFeedback('success');
                        setTimeout(() => {
                            setWordFeedback(null); setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                            setShowAcrossPop(false); setShowDownPop(false);
                            if (newSolved.length === layout.totalWords) setGlobalWin(true);
                        }, 1200);
                    } else if (!isCorrect) {
                        setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 800);
                    }
                }
            };

            const isProtected = (cx, cy) => {
                const cell = layout.grid[cy][cx];
                return cell && cell.placements.some(p => solvedWords.includes(p.id));
            };

            const handleKeyDown = (e, x, y) => {
                if (globalWin || wordFeedback === 'success') return;
                
                const cell = layout.grid[y][x];
                const activePlacement = cell.placements.find(p => p.id === activePlacementId) || cell.placements[0];
                const dist = activePlacement.isHoriz ? (x - activePlacement.normX) : (y - activePlacement.normY);
                const isAtStart = dist === 0;
                const isAtEnd = dist === activePlacement.wordStr.length - 1;

                if (e.key === 'Enter') {
                    e.preventDefault(); checkCurrentWord();
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    if (inputs[`${x},${y}`] && !isProtected(x, y)) {
                        setInputs(prev => ({ ...prev, [`${x},${y}`]: '' }));
                    } else if (dist > 0) {
                        const prevX = activePlacement.isHoriz ? x - 1 : x;
                        const prevY = activePlacement.isHoriz ? y : y - 1;
                        if (!isProtected(prevX, prevY)) {
                            setInputs(prev => ({ ...prev, [`${prevX},${prevY}`]: '' }));
                        }
                        setSelectedCell({ x: prevX, y: prevY });
                        setTimeout(() => inputRefs.current[`${prevX},${prevY}`]?.focus(), 10);
                    }
                } else if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                    e.preventDefault(); 
                    if (e.key === 'ArrowRight' && activePlacement.isHoriz && !isAtEnd) {
                        setSelectedCell({ x: x + 1, y }); setTimeout(() => inputRefs.current[`${x + 1},${y}`]?.focus(), 10);
                    } else if (e.key === 'ArrowDown' && !activePlacement.isHoriz && !isAtEnd) {
                        setSelectedCell({ x, y: y + 1 }); setTimeout(() => inputRefs.current[`${x},${y + 1}`]?.focus(), 10);
                    } else if (e.key === 'ArrowLeft' && activePlacement.isHoriz && !isAtStart) {
                        setSelectedCell({ x: x - 1, y }); setTimeout(() => inputRefs.current[`${x - 1},${y}`]?.focus(), 10);
                    } else if (e.key === 'ArrowUp' && !activePlacement.isHoriz && !isAtStart) {
                        setSelectedCell({ x, y: y - 1 }); setTimeout(() => inputRefs.current[`${x},${y - 1}`]?.focus(), 10);
                    }
                }
            };

            const handleCellClick = (x, y) => {
                if (globalWin) return;
                const cell = layout.grid[y][x];
                const unsolvedPlacements = cell.placements.filter(p => !solvedWords.includes(p.id));
                if (unsolvedPlacements.length === 0) return;

                let newActive = unsolvedPlacements.find(p => p.id === activePlacementId);
                if (!newActive) newActive = unsolvedPlacements[0];

                setActivePlacementId(newActive.id);
                setDirection(newActive.isHoriz ? 'across' : 'down');

                const firstX = newActive.normX; const firstY = newActive.normY;
                setSelectedCell({ x: firstX, y: firstY });
                setViewMode('focused');

                if (newActive.isHoriz) { setShowAcrossPop(true); setShowDownPop(false); } 
                else { setShowDownPop(true); setShowAcrossPop(false); }

                setTimeout(() => inputRefs.current[`${firstX},${firstY}`]?.focus(), 500); 
            };

            const handleClueClick = (placement) => {
                if (solvedWords.includes(placement.id)) return;
                setActivePlacementId(placement.id);
                setDirection(placement.isHoriz ? 'across' : 'down');
                setViewMode('focused');

                let focusX = placement.normX; let focusY = placement.normY;
                for(let i=0; i<placement.wordStr.length; i++) {
                    const cx = placement.normX + (placement.isHoriz ? i : 0);
                    const cy = placement.normY + (placement.isHoriz ? 0 : i);
                    if (!inputs[`${cx},${cy}`]) { focusX = cx; focusY = cy; break; }
                }
                setSelectedCell({ x: focusX, y: focusY });
                setTimeout(() => inputRefs.current[`${focusX},${focusY}`]?.focus(), 600);
            };

            const isClueActive = (placement) => placement.id === activePlacementId;

            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-amber-500 font-black animate-pulse">Generando Malla...</div>;
            if (!layout) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">No se pudo generar el crucigrama. Verifica que tu banco de palabras no esté vacío o intenta con palabras más largas.</div>;

            const activePlacementObj = activePlacementId ? layout.clues.across.concat(layout.clues.down).find(p => p.id === activePlacementId) : null;

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">
                    
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] pointer-events-none flex items-center justify-center bg-black/60 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-emerald-500/20 border border-emerald-500 text-white p-8 rounded-[2rem] text-center shadow-2xl shadow-emerald-500/20">
                                <Award className="w-20 h-20 text-emerald-400 mx-auto mb-4 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Completado!</h2>
                                <p className="text-emerald-200 font-bold uppercase tracking-widest mb-8">Puntaje Perfecto</p>
                                <button onClick={() => window.location.href='index.html'} className="bg-emerald-500 hover:bg-emerald-400 text-black font-black px-8 py-4 rounded-xl transition-all shadow-lg active:scale-95 pointer-events-auto">
                                    SALIR AL HUB
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="p-4 sm:p-6 w-full flex flex-col sm:flex-row justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/80 backdrop-blur-md z-40 gap-4">
                        <div className="flex items-center gap-4 w-full sm:w-auto justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='index.html'} className="p-2.5 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700">
                                    <Home size={20}/>
                                </button>
                                <div>
                                    <h1 className="text-lg font-black text-amber-500 leading-none tracking-tight">{quizData?.title || 'Actividad Periplo'}</h1>
                                    <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Modo: Crossword</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-4 w-full sm:w-auto relative z-50">
                            
                            <div className="relative group w-1/2 sm:w-32">
                                <button onClick={() => {setShowAcrossPop(!showAcrossPop); setShowDownPop(false);}} className={`relative w-full flex justify-center items-center gap-2 px-4 py-3 rounded-xl font-black text-sm uppercase tracking-widest transition-all border border-transparent shadow-md ${showAcrossPop ? 'bg-amber-500 text-zinc-900' : 'bg-zinc-800 text-amber-500 border border-zinc-700 hover:bg-zinc-700 active:scale-95'}`}>
                                    <ArrowRight size={16} className={showAcrossPop ? 'text-zinc-900' : 'text-amber-500'}/> HOR
                                </button>
                                {showAcrossPop && (
                                    <div className="absolute top-full right-0 sm:right-auto sm:left-0 mt-3 w-72 max-h-64 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 animate-in slide-in-from-top-2 z-50">
                                        <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                            <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Elige una pista</span>
                                            <button onClick={()=>setShowAcrossPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                        </div>
                                        {layout.clues.across.map(c => {
                                            const isSolved = solvedWords.includes(c.id);
                                            const isActive = isClueActive(c);
                                            return (
                                                <button key={c.id} id={`clue-across-${c.id}`} disabled={isSolved} onClick={() => handleClueClick(c)} className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 transition-colors ${isSolved ? 'opacity-50 line-through text-zinc-500' : isActive ? 'bg-amber-500/20 text-amber-300 ring-1 ring-amber-500/50' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                    {isActive && <Edit2 size={14} className="text-amber-500 shrink-0 mt-0.5" />}
                                                    <span className="text-amber-500 shrink-0">{c.number}.</span> <span>{c.clueText}</span>
                                                </button>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>

                            <div className="relative group w-1/2 sm:w-32">
                                <button onClick={() => {setShowDownPop(!showDownPop); setShowAcrossPop(false);}} className={`relative w-full flex justify-center items-center gap-2 px-4 py-3 rounded-xl font-black text-sm uppercase tracking-widest transition-all border border-transparent shadow-md ${showDownPop ? 'bg-amber-500 text-zinc-900' : 'bg-zinc-800 text-amber-500 border border-zinc-700 hover:bg-zinc-700 active:scale-95'}`}>
                                    <ArrowDown size={16} className={showDownPop ? 'text-zinc-900' : 'text-amber-500'}/> VER
                                </button>
                                {showDownPop && (
                                    <div className="absolute top-full right-0 sm:right-auto sm:left-0 mt-3 w-72 max-h-64 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 animate-in slide-in-from-top-2 z-50">
                                        <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                            <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Elige una pista</span>
                                            <button onClick={()=>setShowDownPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                        </div>
                                        {layout.clues.down.map(c => {
                                            const isSolved = solvedWords.includes(c.id);
                                            const isActive = isClueActive(c);
                                            return (
                                                <button key={c.id} id={`clue-down-${c.id}`} disabled={isSolved} onClick={() => handleClueClick(c)} className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 transition-colors ${isSolved ? 'opacity-50 line-through text-zinc-500' : isActive ? 'bg-amber-500/20 text-amber-300 ring-1 ring-amber-500/50' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                    {isActive && <Edit2 size={14} className="text-amber-500 shrink-0 mt-0.5" />}
                                                    <span className="text-amber-500 shrink-0">{c.number}.</span> <span>{c.clueText}</span>
                                                </button>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>

                            <div className="hidden sm:block bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest text-zinc-400 shrink-0">
                                {layout.totalWords} Palabras
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 w-full relative flex min-h-0">
                        <div 
                            className={`flex-1 relative overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-zinc-900 to-black ${isDraggingUI ? 'cursor-grabbing' : 'cursor-grab'}`}
                            ref={containerRef}
                            onPointerDown={handlePointerDown}
                            onPointerMove={handlePointerMove}
                            onPointerUp={handlePointerUp}
                            onPointerLeave={handlePointerUp}
                        >
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div 
                                    className="relative grid gap-[2px] bg-zinc-900/80 p-3 rounded-3xl pointer-events-auto shadow-2xl border border-zinc-800"
                                    style={{ 
                                        gridTemplateColumns: `repeat(${layout.width}, minmax(0, 1fr))`, 
                                        gridTemplateRows: `repeat(${layout.height}, minmax(0, 1fr))`,
                                        transform: `translate(${viewState.x}px, ${viewState.y}px) scale(${viewState.scale})`,
                                        transition: isDraggingUI ? 'none' : 'transform 0.4s cubic-bezier(0.22, 1, 0.36, 1)'
                                    }}
                                >
                                    {viewMode === 'focused' && activePlacementObj && (
                                        <div 
                                            className="absolute z-50 text-4xl sm:text-5xl animate-bounce drop-shadow-xl pointer-events-none flex justify-center"
                                            style={{ 
                                                left: `${(activePlacementObj.normX + (activePlacementObj.isHoriz ? activePlacementObj.wordStr.length/2 : 0.5)) * (window.innerWidth < 768 ? 40 : 48)}px`,
                                                top: `${activePlacementObj.normY * (window.innerWidth < 768 ? 40 : 48) - 55}px`,
                                                transform: 'translateX(-50%)'
                                            }}
                                        >
                                            <div className="bg-zinc-900/90 backdrop-blur-xl px-5 py-2.5 rounded-[2rem] border-2 border-zinc-700 shadow-2xl">
                                                {activePlacementObj.emojis}
                                            </div>
                                        </div>
                                    )}

                                    {layout.grid.map((row, y) => 
                                        row.map((cell, x) => {
                                            if (!cell) return <div key={`${x}-${y}`} className="w-10 h-10 sm:w-12 sm:h-12 bg-transparent pointer-events-none"></div>;

                                            const isProtected = cell.placements.some(p => solvedWords.includes(p.id));
                                            const isSelected = selectedCell?.x === x && selectedCell?.y === y;
                                            const isWordActive = cell.placements.some(p => p.id === activePlacementId);
                                            
                                            const userVal = isProtected ? cell.answer : (inputs[`${x},${y}`] || '');
                                            
                                            let containerClasses = "crossword-cell w-10 h-10 sm:w-12 sm:h-12 relative flex items-center justify-center transition-all duration-300 rounded-lg shadow-sm ";
                                            
                                            if (isProtected) containerClasses += "bg-emerald-500 text-black ring-1 ring-emerald-400 z-10 shadow-emerald-500/50 font-black";
                                            else if (wordFeedback === 'error' && userVal !== '' && isWordActive) containerClasses += "bg-rose-500 text-white animate-shake";
                                            else if (isSelected && viewMode === 'focused') containerClasses += "bg-amber-400 text-black z-30 ring-4 ring-white shadow-xl shadow-amber-500/50 scale-110";
                                            else if (isWordActive && viewMode === 'focused') containerClasses += "bg-amber-500/30 text-amber-100 z-20 border border-amber-500/50";
                                            else containerClasses += "bg-zinc-800 text-white hover:bg-zinc-700 cursor-pointer border border-zinc-700/50";

                                            if (viewMode === 'focused' && !isWordActive && !isProtected) containerClasses += " opacity-20";

                                            return (
                                                <div 
                                                    key={`${x}-${y}`} 
                                                    className={containerClasses}
                                                    onClick={() => handleCellClick(x, y)}
                                                >
                                                    {cell.starts && cell.starts.map((s, idx) => (
                                                        <span key={idx} className={`absolute w-5 h-5 bg-amber-500 text-black rounded-full flex items-center justify-center text-[10px] font-black z-40 shadow-sm pointer-events-none ${s.isHoriz ? '-left-6 top-1/2 -translate-y-1/2' : '-top-6 left-1/2 -translate-x-1/2'}`}>
                                                            {s.number}
                                                        </span>
                                                    ))}
                                                    <input
                                                        ref={el => inputRefs.current[`${x},${y}`] = el}
                                                        className={`w-full h-full bg-transparent text-center uppercase font-black text-xl md:text-2xl outline-none m-0 p-0 z-20 cell-input caret-transparent ${!isWordActive || isProtected ? 'pointer-events-none' : 'cursor-pointer'}`}
                                                        maxLength={2}
                                                        value={userVal}
                                                        readOnly={!isWordActive || viewMode === 'overview'}
                                                        tabIndex={isWordActive && !isProtected ? 0 : -1}
                                                        onChange={(e) => handleInput(e, x, y)}
                                                        onKeyDown={(e) => handleKeyDown(e, x, y)}
                                                        onFocus={(e) => { e.target.select(); }}
                                                    />
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                            
                            <div className="absolute bottom-6 right-6 flex flex-col gap-2 z-40">
                                <button onClick={handleZoomIn} className="w-12 h-12 flex items-center justify-center bg-zinc-800/90 backdrop-blur text-white rounded-full border border-zinc-700 hover:bg-zinc-700 transition-colors shadow-lg"><Plus size={20}/></button>
                                <button onClick={handleZoomOut} className="w-12 h-12 flex items-center justify-center bg-zinc-800/90 backdrop-blur text-white rounded-full border border-zinc-700 hover:bg-zinc-700 transition-colors shadow-lg"><Minus size={20}/></button>
                                <button onClick={handleZoomReset} className="w-12 h-12 flex items-center justify-center bg-zinc-800/90 backdrop-blur text-amber-500 rounded-full border border-zinc-700 hover:bg-zinc-700 transition-colors shadow-lg mt-2"><LocateFixed size={20}/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<CrosswordApp />);
    </script>
</body>
</html>

    <script>

        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }

        .cell-input { caret-color: transparent; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }

        @keyframes heartbeat-glow {
            0%, 100% { opacity: 0; transform: scale(0.95); }
            10% { opacity: 0.25; transform: scale(1.05); }
            20% { opacity: 0.05; transform: scale(1); }
            30% { opacity: 0.25; transform: scale(1.05); }
            45%, 90% { opacity: 0; transform: scale(0.95); }
        }
        .glow-beat-1 { animation: heartbeat-glow 4s ease-in-out infinite; }
        .glow-beat-2 { animation: heartbeat-glow 4s ease-in-out infinite 2s; }

        /* Hidden input for mobile keyboard */
        .hidden-input {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 1px;

<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Check, RotateCcw, Award, Home, ArrowRight, ArrowDown, Edit2, X, Share2, ZoomIn, ZoomOut } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===================== CROSSWORD GENERATOR =====================
        const generateCrossword = (words) => {
            if (!words || words.length === 0) return null;
            let bestLayout = null; let maxPlaced = 0;
            const sortedWords = [...words].sort((a, b) => b.wordEn.length - a.wordEn.length);

            const isValid = (wordStr, startX, startY, isHoriz, gridState) => {
                let hasIntersection = false;
                for (let i = 0; i < wordStr.length; i++) {
                    let x = startX + (isHoriz ? i : 0); let y = startY + (isHoriz ? 0 : i);
                    let cell = gridState[`${x},${y}`];
                    if (cell && cell !== wordStr[i]) return false;
                    if (cell === wordStr[i]) hasIntersection = true;
                    const top = gridState[`${x},${y - 1}`]; const bottom = gridState[`${x},${y + 1}`];
                    const left = gridState[`${x - 1},${y}`]; const right = gridState[`${x + 1},${y}`];
                    if (isHoriz) {
                        if (!cell && (top || bottom)) return false;
                        if (i === 0 && left) return false;
                        if (i === wordStr.length - 1 && right) return false;
                    } else {
                        if (!cell && (left || right)) return false;
                        if (i === 0 && top) return false;
                        if (i === wordStr.length - 1 && bottom) return false;
                    }
                }
                return true;
            };

            const tryPlace = (wordIndex, currentPlacements, currentGrid) => {
                if (wordIndex === sortedWords.length) { bestLayout = [...currentPlacements]; maxPlaced = currentPlacements.length; return true; }
                if (currentPlacements.length > maxPlaced) { maxPlaced = currentPlacements.length; bestLayout = [...currentPlacements]; }

                const word = sortedWords[wordIndex];
                const wordStr = word.wordEn.toUpperCase().replace(/\s+/g, '');

                if (currentPlacements.length === 0) {
                    const newGrid = { ...currentGrid };
                    for (let i = 0; i < wordStr.length; i++) newGrid[`${i},0`] = wordStr[i];
                    if (tryPlace(wordIndex + 1, [{ ...word, x: 0, y: 0, isHoriz: true, wordStr }], newGrid)) return true;
                } else {
                    let placedAny = false;
                    for (const placement of currentPlacements) {
                        for (let j = 0; j < placement.wordStr.length; j++) {
                            for (let k = 0; k < wordStr.length; k++) {
                                if (placement.wordStr[j] === wordStr[k]) {
                                    const isHoriz = !placement.isHoriz;
                                    const startX = placement.isHoriz ? placement.x + j : placement.x - k;
                                    const startY = placement.isHoriz ? placement.y - k : placement.y + j;
                                    if (isValid(wordStr, startX, startY, isHoriz, currentGrid)) {
                                        const newGrid = { ...currentGrid };
                                        for (let i = 0; i < wordStr.length; i++) newGrid[`${startX + (isHoriz ? i : 0)},${startY + (isHoriz ? 0 : i)}`] = wordStr[i];
                                        if (tryPlace(wordIndex + 1, [...currentPlacements, { ...word, x: startX, y: startY, isHoriz, wordStr }], newGrid)) return true;
                                        placedAny = true;
                                    }
                                }
                            }
                        }
                    }
                    if (!placedAny) tryPlace(wordIndex + 1, currentPlacements, currentGrid);
                }
                return false;
            };

            tryPlace(0, [], {});
            if (!bestLayout || bestLayout.length === 0) return null;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            bestLayout.forEach(p => {
                if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
                if (p.isHoriz) { if (p.x + p.wordStr.length - 1 > maxX) maxX = p.x + p.wordStr.length - 1; if (p.y > maxY) maxY = p.y; }
                else { if (p.x > maxX) maxX = p.x; if (p.y + p.wordStr.length - 1 > maxY) maxY = p.y + p.wordStr.length - 1; }
            });

            let numberMap = {}; let currentNumber = 1;
            const sortedPlacements = [...bestLayout].sort((a, b) => a.y === b.y ? a.x - b.x : a.y - b.y);

            sortedPlacements.forEach(p => {
                p.normX = p.x - minX; p.normY = p.y - minY;
                const key = `${p.normX},${p.normY}`;
                if (!numberMap[key]) numberMap[key] = currentNumber++;
                p.number = numberMap[key];
            });

            const width = maxX - minX + 1; const height = maxY - minY + 1;
            const grid = Array(height).fill(null).map(() => Array(width).fill(null));

            sortedPlacements.forEach(p => {
                for (let i = 0; i < p.wordStr.length; i++) {
                    const x = p.normX + (p.isHoriz ? i : 0); const y = p.normY + (p.isHoriz ? 0 : i);
                    if (!grid[y][x]) {
                        grid[y][x] = { answer: p.wordStr[i], starts: i === 0 ? [{number: p.number, isHoriz: p.isHoriz}] : [], placements: [p], x, y };
                    } else {
                        grid[y][x].placements.push(p);
                        if (i === 0) grid[y][x].starts.push({number: p.number, isHoriz: p.isHoriz});
                    }
                }
            });

            const clues = { across: [], down: [] };
            sortedPlacements.forEach(p => {
                p.clueText = p.wordEs || p.exampleEn || p.c2 || "Missing Clue";
                p.emojis = p.emojis || "🎯";
                if (p.isHoriz) clues.across.push(p); else clues.down.push(p);
            });

            return { grid, clues, width, height, totalWords: bestLayout.length };
        };

        // ===================== MAIN APP =====================
        const CrosswordApp = () => {
            const [user, setUser] = useState(null);
            const [quizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [gameStarted, setGameStarted] = useState(false);
            const [playerName, setPlayerName] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            const [fullWordList, setFullWordList] = useState([]);
            const [showWordList, setShowWordList] = useState(false);
            const [layout, setLayout] = useState(null);
            const [inputs, setInputs] = useState({});
            const [selectedCell, setSelectedCell] = useState(null);
            const [solvedWords, setSolvedWords] = useState([]);
            const [activePlacementId, setActivePlacementId] = useState(null);
            const [direction, setDirection] = useState('across');
            const [viewMode, setViewMode] = useState('overview');
            const [wordFeedback, setWordFeedback] = useState(null);
            const [globalWin, setGlobalWin] = useState(false);
            const [showAcrossPop, setShowAcrossPop] = useState(false);
            const [showDownPop, setShowDownPop] = useState(false);

            // Hidden input ref for mobile keyboard
            const hiddenInputRef = useRef(null);
            const gridContainerRef = useRef(null);

            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const cellSize = isMobile ? 42 : 48;
            const gap = 3;
            const gridPadding = 32; // Extra padding for number badges

            const boardW = layout ? (layout.width * (cellSize + gap) - gap + (gridPadding * 2)) : 0;
            const boardH = layout ? (layout.height * (cellSize + gap) - gap + (gridPadding * 2)) : 0;

            // ===== PAN & ZOOM STATE =====
            const [camera, setCamera] = useState({ x: 0, y: 0, scale: 1 });
            const [baseScale, setBaseScale] = useState(1);
            const touchRef = useRef({ dragging: false, startX: 0, startY: 0, startCamX: 0, startCamY: 0, dist: 0, startScale: 1, moved: false, identifier: null });
            const cameraRef = useRef(camera);
            cameraRef.current = camera;

            // All placements flattened
            const allPlacements = useMemo(() => {
                if (!layout) return [];
                return layout.clues.across.concat(layout.clues.down);
            }, [layout]);

            const activePlacementObj = useMemo(() => {
                return allPlacements.find(p => p.id === activePlacementId) || null;
            }, [allPlacements, activePlacementId]);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // ===== FIREBASE LOAD =====
            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            const rawWords = data.content?.cards || data.content?.pairs || [];
                            const cleanWords = rawWords.map((w, i) => ({
                                id: w.id || i, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                                exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || w.c2 || '🎯'
                            })).filter(w => w.wordEn);
                            setFullWordList(cleanWords);
                            const shuffled = [...cleanWords].sort(() => 0.5 - Math.random());
                            const generated = generateCrossword(shuffled.slice(0, 15));
                            setLayout(generated);
                        } else { alert("Juego no encontrado"); }
                        setLoading(false);
                    });
                } else { setLoading(false); }
                return () => unsub();
            }, [quizId]);

            // ===== COMPUTE BASE SCALE ON LAYOUT / RESIZE =====
            useEffect(() => {
                if (!layout || !gameStarted) return;
                const compute = () => {
                    const vw = window.innerWidth;
                    const vh = window.innerHeight;
                    const headerH = isMobile ? 80 : 100;
                    const availW = vw - 40;
                    const availH = vh - headerH - 40;
                    const sx = availW / boardW;
                    const sy = availH / boardH;
                    const s = Math.min(sx, sy, 1.3);
                    setBaseScale(s);
                    setCamera({ x: 0, y: 0, scale: s });
                };
                compute();
                window.addEventListener('resize', compute);
                return () => window.removeEventListener('resize', compute);
            }, [layout, gameStarted, boardW, boardH, isMobile]);

            // ===== FOCUS CAMERA ON ACTIVE WORD =====
            const focusCameraOnPlacement = useCallback((placement) => {
                if (!placement) return;
                const wordCenterX = placement.normX * (cellSize + gap) + (placement.isHoriz ? (placement.wordStr.length * (cellSize + gap) - gap) / 2 : 0) + gridPadding;
                const wordCenterY = placement.normY * (cellSize + gap) + (!placement.isHoriz ? (placement.wordStr.length * (cellSize + gap) - gap) / 2 : 0) + gridPadding;

                const focusScale = isMobile ? 1.3 : 1.6;
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const headerH = isMobile ? 80 : 100;
                const viewCenterX = vw / 2;
                const viewCenterY = headerH + (vh - headerH) / 2;
                // On mobile, shift up to account for keyboard
                const keyboardOffset = isMobile ? 80 : 0;

                const tx = viewCenterX - wordCenterX * focusScale;
                const ty = viewCenterY - wordCenterY * focusScale - keyboardOffset;

                setCamera({ x: tx, y: ty, scale: focusScale });
            }, [cellSize, gap, gridPadding, isMobile]);

            const goOverview = useCallback(() => {
                setViewMode('overview');
                setActivePlacementId(null);
                setSelectedCell(null);
                setShowAcrossPop(false);
                setShowDownPop(false);
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const headerH = isMobile ? 80 : 100;
                const cx = (vw - boardW * baseScale) / 2;
                const cy = headerH + ((vh - headerH) - boardH * baseScale) / 2;
                setCamera({ x: cx, y: cy, scale: baseScale });
            }, [baseScale, boardW, boardH, isMobile]);

            // When viewMode changes to overview, reset camera
            useEffect(() => {
                if (viewMode === 'overview' && layout && gameStarted) {
                    goOverview();
                }
            }, [viewMode, layout, gameStarted, goOverview]);

            // When active placement changes in focused mode, move camera
            useEffect(() => {
                if (viewMode === 'focused' && activePlacementObj) {
                    focusCameraOnPlacement(activePlacementObj);
                }
            }, [viewMode, activePlacementObj, focusCameraOnPlacement]);

            // ===== TOUCH HANDLERS FOR PAN/ZOOM =====
            const getTouchDist = (t1, t2) => Math.sqrt((t1.clientX - t2.clientX) ** 2 + (t1.clientY - t2.clientY) ** 2);

            const handleTouchStart = useCallback((e) => {
                if (e.touches.length === 2) {
                    // Pinch start
                    const d = getTouchDist(e.touches[0], e.touches[1]);
                    touchRef.current = { ...touchRef.current, dist: d, startScale: cameraRef.current.scale, dragging: false };
                    return;
                }
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    touchRef.current = {
                        dragging: true, startX: t.clientX, startY: t.clientY,
                        startCamX: cameraRef.current.x, startCamY: cameraRef.current.y,
                        dist: 0, startScale: cameraRef.current.scale, moved: false,
                        identifier: t.identifier
                    };
                }
            }, []);

            const handleTouchMove = useCallback((e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const d = getTouchDist(e.touches[0], e.touches[1]);
                    const ratio = d / touchRef.current.dist;
                    const newScale = Math.min(Math.max(touchRef.current.startScale * ratio, 0.4), 3);
                    setCamera(prev => ({ ...prev, scale: newScale }));
                    touchRef.current.moved = true;
                    return;
                }
                if (touchRef.current.dragging && e.touches.length === 1) {
                    const t = e.touches[0];
                    const dx = t.clientX - touchRef.current.startX;
                    const dy = t.clientY - touchRef.current.startY;
                    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                        touchRef.current.moved = true;
                    }
                    if (touchRef.current.moved) {
                        e.preventDefault();
                        setCamera(prev => ({
                            ...prev,
                            x: touchRef.current.startCamX + dx,
                            y: touchRef.current.startCamY + dy
                        }));
                    }
                }
            }, []);

            const handleTouchEnd = useCallback((e) => {
                touchRef.current.dragging = false;
            }, []);

            // ===== HIDDEN INPUT HANDLER (mobile keyboard) =====
            const handleHiddenInput = useCallback((e) => {
                if (!selectedCell || !activePlacementId || globalWin || !layout) return;
                const val = e.target.value.slice(-1).toUpperCase();
                e.target.value = ''; // Always clear

                if (!/^[A-ZÑ]$/.test(val)) return;

                const { x, y } = selectedCell;
                const cell = layout.grid[y]?.[x];
                if (!cell) return;

                const isPartOfSolved = cell.placements.some(p => solvedWords.includes(p.id));
                const activePlacement = allPlacements.find(p => p.id === activePlacementId);
                if (!activePlacement) return;

                // If cell is solved (green), user must type the correct letter to advance
                if (isPartOfSolved) {
                    if (val === cell.answer) {
                        advanceFocusFrom(x, y, activePlacement);
                    } else {
                        setWordFeedback('error');
                        setTimeout(() => setWordFeedback(null), 600);
                    }
                    return;
                }

                // Normal cell: write + advance
                const newInputs = { ...inputs, [`${x},${y}`]: val };
                setInputs(newInputs);

                advanceFocusFrom(x, y, activePlacement, newInputs);
            }, [selectedCell, activePlacementId, globalWin, layout, inputs, solvedWords, allPlacements]);

            const advanceFocusFrom = useCallback((x, y, activePlacement, currentInputs) => {
                const dist = activePlacement.isHoriz ? (x - activePlacement.normX) : (y - activePlacement.normY);
                const nextDist = dist + 1;

                if (nextDist < activePlacement.wordStr.length) {
                    // Find next unsolved cell to focus
                    let targetDist = nextDist;
                    while (targetDist < activePlacement.wordStr.length) {
                        const nx = activePlacement.normX + (activePlacement.isHoriz ? targetDist : 0);
                        const ny = activePlacement.normY + (activePlacement.isHoriz ? 0 : targetDist);
                        const nextCell = layout.grid[ny]?.[nx];
                        // If cell is green AND already has correct letter in inputs, skip
                        const isSolvedAndFilled = nextCell && nextCell.placements.some(p => solvedWords.includes(p.id));
                        // Don't skip — user needs to type through green cells too
                        break;
                    }

                    const nx = activePlacement.normX + (activePlacement.isHoriz ? targetDist : 0);
                    const ny = activePlacement.normY + (activePlacement.isHoriz ? 0 : targetDist);
                    setSelectedCell({ x: nx, y: ny });
                    // Keep hidden input focused
                    setTimeout(() => hiddenInputRef.current?.focus(), 20);
                } else {
                    // Reached end — auto-check
                    const inp = currentInputs || inputs;
                    setTimeout(() => checkWord(activePlacement, inp), 50);
                }
            }, [layout, solvedWords, inputs]);

            // ===== PHYSICAL KEYBOARD HANDLER =====
            const handleKeyDown = useCallback((e) => {
                if (!selectedCell || !activePlacementId || globalWin || !layout) return;
                const { x, y } = selectedCell;
                const activePlacement = allPlacements.find(p => p.id === activePlacementId);
                if (!activePlacement) return;

                const cell = layout.grid[y]?.[x];
                if (!cell) return;

                const dist = activePlacement.isHoriz ? (x - activePlacement.normX) : (y - activePlacement.normY);
                const isPartOfSolved = cell.placements.some(p => solvedWords.includes(p.id));

                if (e.key === 'Escape') {
                    e.preventDefault();
                    goOverview();
                    return;
                }

                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkWord(activePlacement, inputs);
                    return;
                }

                if (e.key === 'Backspace') {
                    e.preventDefault();
                    if (!isPartOfSolved) {
                        setInputs(prev => ({ ...prev, [`${x},${y}`]: '' }));
                    }
                    if (dist > 0) {
                        const prevX = activePlacement.normX + (activePlacement.isHoriz ? (dist - 1) : 0);
                        const prevY = activePlacement.normY + (activePlacement.isHoriz ? 0 : (dist - 1));
                        setSelectedCell({ x: prevX, y: prevY });
                    }
                    return;
                }

                if (/^[a-zA-ZñÑ]$/.test(e.key)) {
                    e.preventDefault();
                    const val = e.key.toUpperCase();

                    if (isPartOfSolved) {
                        if (val === cell.answer) {
                            advanceFocusFrom(x, y, activePlacement);
                        } else {
                            setWordFeedback('error');
                            setTimeout(() => setWordFeedback(null), 600);
                        }
                        return;
                    }

                    const newInputs = { ...inputs, [`${x},${y}`]: val };
                    setInputs(newInputs);
                    advanceFocusFrom(x, y, activePlacement, newInputs);
                    return;
                }

                // Arrow keys
                if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                    e.preventDefault();
                    let nx = x, ny = y;
                    if (e.key === 'ArrowRight') nx++;
                    if (e.key === 'ArrowLeft') nx--;
                    if (e.key === 'ArrowDown') ny++;
                    if (e.key === 'ArrowUp') ny--;
                    if (nx >= 0 && ny >= 0 && ny < layout.height && nx < layout.width && layout.grid[ny]?.[nx]) {
                        setSelectedCell({ x: nx, y: ny });
                    }
                }
            }, [selectedCell, activePlacementId, globalWin, layout, inputs, solvedWords, allPlacements, goOverview]);

            // Attach keyboard listener
            useEffect(() => {
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleKeyDown]);

            // ===== CHECK WORD =====
            const checkWord = useCallback((activePlacement, currentInputs) => {
                let isCorrect = true; let allFilled = true;

                for (let i = 0; i < activePlacement.wordStr.length; i++) {
                    const cx = activePlacement.normX + (activePlacement.isHoriz ? i : 0);
                    const cy = activePlacement.normY + (activePlacement.isHoriz ? 0 : i);
                    const cell = layout.grid[cy][cx];
                    const isGreen = cell.placements.some(p => solvedWords.includes(p.id));
                    const rawInput = currentInputs[`${cx},${cy}`];

                    let val = '';
                    if (rawInput !== undefined && rawInput !== '') {
                        val = rawInput;
                    } else if (isGreen) {
                        val = cell.answer;
                    }

                    if (val === '') allFilled = false;
                    if (val !== activePlacement.wordStr[i]) isCorrect = false;
                }

                if (!allFilled) return;

                if (isCorrect && !solvedWords.includes(activePlacement.id)) {
                    const newSolved = [...solvedWords, activePlacement.id];
                    setSolvedWords(newSolved);
                    setWordFeedback('success');
                    setTimeout(() => {
                        setWordFeedback(null);
                        if (newSolved.length === layout.totalWords) {
                            setGlobalWin(true);
                        } else {
                            goOverview();
                        }
                    }, 1000);
                } else if (!isCorrect) {
                    setWordFeedback('error');
                    setTimeout(() => setWordFeedback(null), 600);
                }
            }, [layout, solvedWords, goOverview]);

            // ===== CELL TAP HANDLER =====
            const handleCellTap = useCallback((x, y) => {
                if (globalWin) return;
                if (touchRef.current.moved) return; // Was a drag, not a tap

                const cell = layout.grid[y]?.[x];
                if (!cell) return;

                const unsolvedPlacements = cell.placements.filter(p => !solvedWords.includes(p.id));
                if (unsolvedPlacements.length === 0) return;

                // If tapping the same cell, toggle direction
                let newActive;
                if (selectedCell?.x === x && selectedCell?.y === y && activePlacementId) {
                    const currentP = allPlacements.find(p => p.id === activePlacementId);
                    const otherP = unsolvedPlacements.find(p => p.id !== activePlacementId);
                    newActive = otherP || currentP || unsolvedPlacements[0];
                } else {
                    newActive = unsolvedPlacements[0];
                }

                setActivePlacementId(newActive.id);
                setDirection(newActive.isHoriz ? 'across' : 'down');
                setShowAcrossPop(false);
                setShowDownPop(false);

                // Focus on the FIRST cell of the word
                const firstX = newActive.normX;
                const firstY = newActive.normY;
                setSelectedCell({ x: firstX, y: firstY });
                setViewMode('focused');

                // Focus hidden input for mobile keyboard
                setTimeout(() => {
                    if (hiddenInputRef.current) {
                        hiddenInputRef.current.value = '';
                        hiddenInputRef.current.focus();
                    }
                }, 100);
            }, [globalWin, layout, solvedWords, selectedCell, activePlacementId, allPlacements]);

            // ===== CLUE TAP =====
            const handleClueClick = useCallback((placement) => {
                if (solvedWords.includes(placement.id)) return;
                setActivePlacementId(placement.id);
                setDirection(placement.isHoriz ? 'across' : 'down');
                setViewMode('focused');
                setShowAcrossPop(false);
                setShowDownPop(false);
                setSelectedCell({ x: placement.normX, y: placement.normY });
                setTimeout(() => {
                    if (hiddenInputRef.current) {
                        hiddenInputRef.current.value = '';
                        hiddenInputRef.current.focus();
                    }
                }, 100);
            }, [solvedWords]);

            // ===== EMPTY SPACE TAP =====
            const handleEmptyTap = useCallback(() => {
                if (touchRef.current.moved) return;
                if (viewMode === 'focused') goOverview();
            }, [viewMode, goOverview]);

            // ===== COPY LINK =====
            const copyLink = () => {
                const studentUrl = `${window.location.origin}${window.location.pathname}?id=${quizId}&student=true`;
                navigator.clipboard.writeText(studentUrl).then(() => {
                    setToastMsg('¡Link copiado!');
                    setTimeout(() => setToastMsg(null), 3000);
                });
            };

            // Scroll clue into view
            useEffect(() => {
                if (activePlacementId && viewMode === 'overview') {
                    const el = document.getElementById(`clue-${direction}-${activePlacementId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, [activePlacementId, direction, viewMode]);

            // ===== RENDER =====
            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-amber-500 font-black animate-pulse text-xl">Generando Malla...</div>;
            if (!layout) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">No se pudo generar el crucigrama. Verifica que tu banco de palabras no esté vacío o intenta con palabras más largas.</div>;

            // ===== START SCREEN =====
            if (!gameStarted) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center z-10">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                            <h1 className="text-3xl font-black text-amber-500 mb-2 leading-tight">{quizData?.title || 'Crucigrama'}</h1>
                            <p className="text-zinc-400 mb-8 font-medium">Ingresa tu nombre para comenzar la actividad.</p>
                            <input
                                type="text"
                                placeholder="Tu nombre..."
                                value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && setGameStarted(true)}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-amber-500 transition-colors"
                                style={{ fontSize: '16px' }}
                            />
                            <button
                                disabled={!playerName.trim()}
                                onClick={() => setGameStarted(true)}
                                className="w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest"
                            >
                                Empezar Juego
                            </button>
                            {!isStudent && (
                                <button onClick={() => window.location.href='index.html'} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                    Volver al Hub (Maestro)
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            // ===== GAME SCREEN =====
            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">

                    {/* Hidden input for mobile keyboard */}
                    <input
                        ref={hiddenInputRef}
                        className="hidden-input"
                        type="text"
                        autoCapitalize="characters"
                        autoComplete="off"
                        autoCorrect="off"
                        spellCheck="false"
                        inputMode="text"
                        onInput={handleHiddenInput}
                        onBlur={() => {
                            // Re-focus if still in focused mode
                            if (viewMode === 'focused' && activePlacementId) {
                                setTimeout(() => hiddenInputRef.current?.focus(), 200);
                            }
                        }}
                    />

                    {toastMsg && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-full font-black text-sm shadow-xl z-[120] flex items-center gap-2">
                            <Check size={16} /> {toastMsg}
                        </div>
                    )}

                    {/* WIN OVERLAY */}
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Award className="w-24 h-24 text-amber-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Completado, {playerName}!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Puntaje Perfecto</p>
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => setShowWordList(true)} className="w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">
                                        📖 VER LAS {fullWordList.length} PALABRAS
                                    </button>
                                    <button onClick={() => window.location.reload()} className="w-full bg-amber-500 hover:bg-amber-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">
                                        🔄 JUGAR OTRO TABLERO
                                    </button>
                                    {!isStudent && (
                                        <button onClick={() => window.location.href='index.html'} className="mt-2 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">SALIR AL HUB</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* WORD LIST OVERLAY */}
                    {showWordList && (
                        <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8">
                            <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                                <div className="flex items-center justify-between mb-6 shrink-0">
                                    <h2 className="text-2xl sm:text-3xl font-black text-white">Vocabulario</h2>
                                    <button onClick={() => setShowWordList(false)} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white transition-colors">
                                        <X size={20} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar pb-6">
                                    {fullWordList.map(card => (
                                        <div key={card.id} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                            <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">{card.emojis}</div>
                                            <div className="flex-grow w-full">
                                                <h4 className="text-lg font-black text-white">{card.wordEn}</h4>
                                                <p className="text-amber-500 font-bold text-sm mb-1">{card.wordEs}</p>
                                                {card.exampleEn && <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="p-3 sm:p-5 w-full flex flex-col sm:flex-row justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/90 backdrop-blur-md z-40 gap-3">
                        <div className="flex items-center gap-3 w-full sm:w-auto justify-between">
                            <div className="flex items-center gap-2">
                                {!isStudent && (
                                    <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700">
                                        <Home size={18}/>
                                    </button>
                                )}
                                {!isStudent && (
                                    <button onClick={copyLink} className="p-2 bg-zinc-800 text-sky-400 rounded-xl hover:bg-zinc-700 hover:text-sky-300 transition-colors border border-zinc-700" title="Copiar link para alumnos">
                                        <Share2 size={18}/>
                                    </button>
                                )}
                                <div className="ml-1">
                                    <h1 className="text-base sm:text-lg font-black text-amber-500 leading-none tracking-tight">{quizData?.title || 'Crucigrama'}</h1>
                                    <p className="text-[9px] sm:text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">{solvedWords.length}/{layout.totalWords} palabras</p>
                                </div>
                            </div>

                            {/* Focused mode: show active clue in header */}
                            {viewMode === 'focused' && activePlacementObj && (
                                <button onClick={goOverview} className="flex items-center gap-2 bg-amber-500/10 border border-amber-500/30 rounded-xl px-3 py-2 max-w-[200px] sm:max-w-none">
                                    <span className="text-amber-500 text-lg flex-shrink-0">{activePlacementObj.emojis}</span>
                                    <span className="text-xs font-bold text-amber-300 truncate">{activePlacementObj.clueText}</span>
                                    <X size={14} className="text-zinc-400 flex-shrink-0"/>
                                </button>
                            )}
                        </div>

                        {/* CLUE BUTTONS - only in overview */}
                        {viewMode === 'overview' && (
                            <div className="flex items-center gap-3 w-full sm:w-auto relative z-50">
                                <div className="relative group w-1/2 sm:w-32">
                                    <div className="absolute inset-0 bg-amber-500 blur-md opacity-20 rounded-xl pointer-events-none glow-beat-1"></div>
                                    <button onClick={(e) => { e.stopPropagation(); setShowAcrossPop(!showAcrossPop); setShowDownPop(false);}} className={`relative w-full flex justify-center items-center gap-2 px-4 py-3 rounded-xl font-black text-sm uppercase tracking-widest transition-all border border-transparent shadow-md ${showAcrossPop ? 'bg-amber-600 text-black' : 'bg-zinc-800 text-amber-500 hover:bg-zinc-700 active:scale-95'}`}>
                                        <ArrowRight size={16}/> HOR
                                    </button>
                                    {showAcrossPop && (
                                        <div className="absolute top-full left-0 sm:left-auto sm:right-0 mt-3 w-72 max-h-64 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 z-50">
                                            <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                                <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Horizontales</span>
                                                <button onClick={()=>setShowAcrossPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                            </div>
                                            {layout.clues.across.map(c => {
                                                const isSolved = solvedWords.includes(c.id);
                                                return (
                                                    <button key={c.id} id={`clue-across-${c.id}`} disabled={isSolved} onClick={() => handleClueClick(c)} className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 transition-colors ${isSolved ? 'opacity-40 line-through text-zinc-500' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                        <span className="text-amber-500 shrink-0">{c.number}.</span> <span>{c.clueText}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>

                                <div className="relative group w-1/2 sm:w-32">
                                    <div className="absolute inset-0 bg-amber-500 blur-md opacity-20 rounded-xl pointer-events-none glow-beat-2"></div>
                                    <button onClick={(e) => { e.stopPropagation(); setShowDownPop(!showDownPop); setShowAcrossPop(false);}} className={`relative w-full flex justify-center items-center gap-2 px-4 py-3 rounded-xl font-black text-sm uppercase tracking-widest transition-all border border-transparent shadow-md ${showDownPop ? 'bg-amber-600 text-black' : 'bg-zinc-800 text-amber-500 hover:bg-zinc-700 active:scale-95'}`}>
                                        <ArrowDown size={16}/> VER
                                    </button>
                                    {showDownPop && (
                                        <div className="absolute top-full right-0 mt-3 w-72 max-h-64 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 z-50">
                                            <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                                <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Verticales</span>
                                                <button onClick={()=>setShowDownPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                            </div>
                                            {layout.clues.down.map(c => {
                                                const isSolved = solvedWords.includes(c.id);
                                                return (
                                                    <button key={c.id} id={`clue-down-${c.id}`} disabled={isSolved} onClick={() => handleClueClick(c)} className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 transition-colors ${isSolved ? 'opacity-40 line-through text-zinc-500' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                        <span className="text-amber-500 shrink-0">{c.number}.</span> <span>{c.clueText}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </header>

                    {/* GRID AREA */}
                    <div
                        ref={gridContainerRef}
                        className="flex-1 w-full relative min-h-0 overflow-hidden"
                        style={{ touchAction: 'none' }}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                        onClick={handleEmptyTap}
                    >
                        {/* THE BOARD */}
                        <div
                            className="absolute bg-zinc-900/60 rounded-3xl border border-zinc-800/50"
                            style={{
                                width: boardW,
                                height: boardH,
                                left: camera.x,
                                top: camera.y,
                                transform: `scale(${camera.scale})`,
                                transformOrigin: '0 0',
                                transition: touchRef.current.moved ? 'none' : 'all 0.45s cubic-bezier(0.22, 1, 0.36, 1)',
                                willChange: 'transform, left, top'
                            }}
                        >
                            {/* FLOATING CLUE BANNER */}
                            {viewMode === 'focused' && activePlacementObj && (
                                <div
                                    className="absolute z-50 flex justify-center pointer-events-none"
                                    style={{
                                        left: `${(activePlacementObj.normX * (cellSize + gap)) + gridPadding + (activePlacementObj.isHoriz ? (activePlacementObj.wordStr.length * (cellSize + gap) - gap) / 2 : cellSize / 2)}px`,
                                        top: `${(activePlacementObj.normY * (cellSize + gap)) + gridPadding}px`,
                                        transform: 'translate(-50%, calc(-100% - 20px))',
                                        width: 'max-content'
                                    }}
                                >
                                    <div className="bg-zinc-900/95 border-2 border-amber-500/50 p-2 sm:p-3 rounded-2xl shadow-2xl flex items-center gap-2 sm:gap-3 backdrop-blur-md max-w-[280px]">
                                        <div className="text-2xl bg-zinc-950 p-1.5 rounded-xl flex-shrink-0 shadow-inner">{activePlacementObj.emojis}</div>
                                        <div className="flex flex-col text-left min-w-0">
                                            <span className="text-[9px] text-amber-500 font-black uppercase tracking-widest mb-0.5 flex items-center gap-1">
                                                {activePlacementObj.isHoriz ? <ArrowRight size={10}/> : <ArrowDown size={10}/>}
                                                {activePlacementObj.isHoriz ? 'Horizontal' : 'Vertical'} {activePlacementObj.number}
                                            </span>
                                            <span className="text-xs sm:text-sm font-bold text-white leading-tight truncate">{activePlacementObj.clueText}</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CELLS */}
                            {layout.grid.map((row, y) =>
                                row.map((cell, x) => {
                                    if (!cell) return null;

                                    const isPartOfSolved = cell.placements.some(p => solvedWords.includes(p.id));
                                    const rawInput = inputs[`${x},${y}`];
                                    const isGreen = isPartOfSolved;

                                    let displayVal = '';
                                    if (isGreen) {
                                        displayVal = cell.answer;
                                    } else if (rawInput !== undefined && rawInput !== '') {
                                        displayVal = rawInput;
                                    }

                                    const isSelected = selectedCell?.x === x && selectedCell?.y === y;
                                    const isWordActive = cell.placements.some(p => p.id === activePlacementId);

                                    let bg = 'bg-zinc-800 border-zinc-700/50';
                                    let textColor = 'text-white';
                                    let extra = '';

                                    if (isGreen) {
                                        bg = 'bg-emerald-500 border-emerald-400';
                                        textColor = 'text-black';
                                        extra = 'shadow-sm shadow-emerald-500/40';
                                    } else if (wordFeedback === 'error' && isWordActive && viewMode === 'focused') {
                                        bg = 'bg-rose-500/80 border-rose-400';
                                        extra = 'animate-shake';
                                    } else if (isSelected && viewMode === 'focused') {
                                        bg = 'bg-amber-400 border-amber-300';
                                        textColor = 'text-black';
                                        extra = 'z-30 ring-2 ring-white shadow-lg shadow-amber-500/50 scale-[1.08]';
                                    } else if (isWordActive && viewMode === 'focused') {
                                        bg = 'bg-amber-500/25 border-amber-500/40';
                                        textColor = 'text-white';
                                    }

                                    const dimmed = viewMode === 'focused' && !isWordActive && !isGreen;

                                    return (
                                        <div
                                            key={`${x}-${y}`}
                                            className={`absolute flex items-center justify-center rounded-lg border transition-all duration-200 ${bg} ${extra} ${dimmed ? 'opacity-15' : ''}`}
                                            style={{
                                                width: cellSize,
                                                height: cellSize,
                                                left: x * (cellSize + gap) + gridPadding,
                                                top: y * (cellSize + gap) + gridPadding
                                            }}
                                            onClick={(e) => { e.stopPropagation(); handleCellTap(x, y); }}
                                        >
                                            {/* Number badges */}
                                            {cell.starts && cell.starts.map((s, idx) => (
                                                <span key={idx} className={`absolute w-[18px] h-[18px] bg-amber-500 text-black rounded-full flex items-center justify-center text-[9px] font-black z-40 pointer-events-none ${s.isHoriz ? '-left-[22px] top-1/2 -translate-y-1/2' : '-top-[22px] left-1/2 -translate-x-1/2'}`}>
                                                    {s.number}
                                                </span>
                                            ))}

                                            {/* Letter display */}
                                            <span className={`font-black text-lg sm:text-xl ${textColor} pointer-events-none select-none`}>
                                                {displayVal}
                                            </span>
                                        </div>
                                    );
                                })
                            )}
                        </div>

                        {/* Zoom controls (mobile) */}
                        {isMobile && viewMode === 'overview' && (
                            <div className="absolute bottom-4 right-4 flex flex-col gap-2 z-50">
                                <button
                                    onClick={(e) => { e.stopPropagation(); setCamera(prev => ({ ...prev, scale: Math.min(prev.scale * 1.3, 3) })); }}
                                    className="w-10 h-10 bg-zinc-800/90 border border-zinc-700 rounded-xl flex items-center justify-center text-zinc-300 active:scale-90 backdrop-blur-sm"
                                >
                                    <ZoomIn size={18}/>
                                </button>
                                <button
                                    onClick={(e) => { e.stopPropagation(); setCamera(prev => ({ ...prev, scale: Math.max(prev.scale * 0.7, 0.3) })); }}
                                    className="w-10 h-10 bg-zinc-800/90 border border-zinc-700 rounded-xl flex items-center justify-center text-zinc-300 active:scale-90 backdrop-blur-sm"
                                >
                                    <ZoomOut size={18}/>
                                </button>
                                <button
                                    onClick={(e) => { e.stopPropagation(); goOverview(); }}
                                    className="w-10 h-10 bg-zinc-800/90 border border-zinc-700 rounded-xl flex items-center justify-center text-zinc-300 active:scale-90 backdrop-blur-sm text-xs font-black"
                                >
                                    FIT
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<CrosswordApp />);
    </script>
</body>
</html>

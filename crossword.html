<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        @keyframes glow-beat { 0%,100%{opacity:.15} 50%{opacity:.35} }
        .glow-beat-1 { animation: glow-beat 2s ease-in-out infinite; }
        .glow-beat-2 { animation: glow-beat 2s ease-in-out infinite 1s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        /*
         * THE REAL INPUT — invisible text field that lives on top of the selected cell.
         * It's transparent so the cell styling shows through,
         * but Safari/iOS treats it as a tappable text field and opens the keyboard.
         */
        .cell-real-input {
            position: absolute;
            background: transparent;
            border: none;
            outline: none;
            color: transparent;
            caret-color: transparent;
            font-size: 16px;
            text-align: center;
            text-transform: uppercase;
            z-index: 50;
            padding: 0;
            margin: 0;
            -webkit-appearance: none;
            appearance: none;
        }
        .cell-real-input::selection { background: transparent; }
    </style>

<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Check, Award, Home, ArrowRight, ArrowDown, X, ZoomIn, ZoomOut, Crosshair } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===================== CROSSWORD GENERATOR =====================
        const generateCrossword = (words) => {
            if (!words || words.length === 0) return null;
            let bestLayout = null; let maxPlaced = 0;
            const sortedWords = [...words].sort((a, b) => b.wordEn.length - a.wordEn.length);

            const isValid = (wordStr, startX, startY, isHoriz, gridState) => {
                for (let i = 0; i < wordStr.length; i++) {
                    let x = startX + (isHoriz ? i : 0); let y = startY + (isHoriz ? 0 : i);
                    let cell = gridState[`${x},${y}`];
                    if (cell && cell !== wordStr[i]) return false;
                    const top = gridState[`${x},${y - 1}`]; const bottom = gridState[`${x},${y + 1}`];
                    const left = gridState[`${x - 1},${y}`]; const right = gridState[`${x + 1},${y}`];
                    if (isHoriz) {
                        if (!cell && (top || bottom)) return false;
                        if (i === 0 && left) return false;
                        if (i === wordStr.length - 1 && right) return false;
                    } else {
                        if (!cell && (left || right)) return false;
                        if (i === 0 && top) return false;
                        if (i === wordStr.length - 1 && bottom) return false;
                    }
                }
                return true;
            };

            const tryPlace = (wordIndex, currentPlacements, currentGrid) => {
                if (wordIndex === sortedWords.length) { bestLayout = [...currentPlacements]; maxPlaced = currentPlacements.length; return true; }
                if (currentPlacements.length > maxPlaced) { maxPlaced = currentPlacements.length; bestLayout = [...currentPlacements]; }
                const word = sortedWords[wordIndex];
                const wordStr = word.wordEn.toUpperCase().replace(/\s+/g, '');
                if (currentPlacements.length === 0) {
                    const newGrid = { ...currentGrid };
                    for (let i = 0; i < wordStr.length; i++) newGrid[`${i},0`] = wordStr[i];
                    if (tryPlace(wordIndex + 1, [{ ...word, x: 0, y: 0, isHoriz: true, wordStr }], newGrid)) return true;
                } else {
                    let placedAny = false;
                    for (const placement of currentPlacements) {
                        for (let j = 0; j < placement.wordStr.length; j++) {
                            for (let k = 0; k < wordStr.length; k++) {
                                if (placement.wordStr[j] === wordStr[k]) {
                                    const isHoriz = !placement.isHoriz;
                                    const startX = placement.isHoriz ? placement.x + j : placement.x - k;
                                    const startY = placement.isHoriz ? placement.y - k : placement.y + j;
                                    if (isValid(wordStr, startX, startY, isHoriz, currentGrid)) {
                                        const newGrid = { ...currentGrid };
                                        for (let i = 0; i < wordStr.length; i++) newGrid[`${startX + (isHoriz ? i : 0)},${startY + (isHoriz ? 0 : i)}`] = wordStr[i];
                                        if (tryPlace(wordIndex + 1, [...currentPlacements, { ...word, x: startX, y: startY, isHoriz, wordStr }], newGrid)) return true;
                                        placedAny = true;
                                    }
                                }
                            }
                        }
                    }
                    if (!placedAny) tryPlace(wordIndex + 1, currentPlacements, currentGrid);
                }
                return false;
            };

            tryPlace(0, [], {});
            if (!bestLayout || bestLayout.length === 0) return null;

            const xs = bestLayout.flatMap(p => [p.x, p.x + (p.isHoriz ? p.wordStr.length - 1 : 0)]);
            const ys = bestLayout.flatMap(p => [p.y, p.y + (p.isHoriz ? 0 : p.wordStr.length - 1)]);
            const minX = Math.min(...xs); const minY = Math.min(...ys);
            const maxX = Math.max(...xs); const maxY = Math.max(...ys);
            const width = maxX - minX + 1; const height = maxY - minY + 1;

            const grid = Array.from({ length: height }, () => Array(width).fill(null));
            let numCounter = 1;
            const sortedPlacements = bestLayout.map(p => ({ ...p, normX: p.x - minX, normY: p.y - minY }))
                .sort((a, b) => a.normY !== b.normY ? a.normY - b.normY : a.normX - b.normX)
                .map(p => ({ ...p, number: numCounter++ }));

            sortedPlacements.forEach(p => {
                for (let i = 0; i < p.wordStr.length; i++) {
                    const x = p.normX + (p.isHoriz ? i : 0); const y = p.normY + (p.isHoriz ? 0 : i);
                    if (!grid[y][x]) {
                        grid[y][x] = { answer: p.wordStr[i], starts: i === 0 ? [{number: p.number, isHoriz: p.isHoriz}] : [], placements: [p], x, y };
                    } else {
                        grid[y][x].placements.push(p);
                        if (i === 0) grid[y][x].starts.push({number: p.number, isHoriz: p.isHoriz});
                    }
                }
            });

            const clues = { across: [], down: [] };
            sortedPlacements.forEach(p => {
                p.clueText = p.wordEs || p.exampleEn || p.c2 || "Missing Clue";
                p.emojis = p.emojis || "🎯";
                if (p.isHoriz) clues.across.push(p); else clues.down.push(p);
            });
            return { grid, clues, width, height, totalWords: bestLayout.length };
        };

        // ===================== MAIN APP =====================
        const CrosswordApp = () => {
            const [user, setUser] = useState(null);
            const [quizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [isStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [gameStarted, setGameStarted] = useState(false);
            const [playerName, setPlayerName] = useState('');
            const [toastMsg, setToastMsg] = useState(null);
            const [fullWordList, setFullWordList] = useState([]);
            const [showWordList, setShowWordList] = useState(false);
            const [layout, setLayout] = useState(null);
            const [inputs, setInputs] = useState({});
            const [selectedCell, setSelectedCell] = useState(null);
            const [solvedWords, setSolvedWords] = useState([]);
            const [activePlacementId, setActivePlacementId] = useState(null);
            const [direction, setDirection] = useState('across');
            const [viewMode, setViewMode] = useState('overview');
            const [wordFeedback, setWordFeedback] = useState(null);
            const [globalWin, setGlobalWin] = useState(false);
            const [showAcrossPop, setShowAcrossPop] = useState(false);
            const [showDownPop, setShowDownPop] = useState(false);
            const realInputRef = useRef(null);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const cellSize = isMobile ? 42 : 48;
            const gap = 3;
            const gridPadding = 30;
            const boardW = layout ? (layout.width * (cellSize + gap) - gap + (gridPadding * 2)) : 0;
            const boardH = layout ? (layout.height * (cellSize + gap) - gap + (gridPadding * 2)) : 0;
            const [cam, setCam] = useState({ x: 0, y: 0, s: 1 });
            const [baseScale, setBaseScale] = useState(1);
            const [isAnimating, setIsAnimating] = useState(false);
            const camRef = useRef(cam);
            camRef.current = cam;
            const animTimerRef = useRef(null);
            const touchRef = useRef({ active: false, moved: false, startX: 0, startY: 0, startCamX: 0, startCamY: 0, pinching: false, pinchDist: 0, pinchScale: 1, pinchMidX: 0, pinchMidY: 0, pinchCamX: 0, pinchCamY: 0 });
            const allPlacements = useMemo(() => { if (!layout) return []; return layout.clues.across.concat(layout.clues.down); }, [layout]);
            const activePlacementObj = useMemo(() => allPlacements.find(p => p.id === activePlacementId) || null, [allPlacements, activePlacementId]);

            // ============================================================
            // NAVEGACIÓN INTELIGENTE: regresa al portal o al hub
            // ============================================================
            const goBack = () => {
                const ref = document.referrer;
                if (ref && ref.includes('student_portal.html')) {
                    window.location.href = ref;
                } else {
                    window.location.href = 'index.html';
                }
            };

            useEffect(() => { const fn = () => setIsMobile(window.innerWidth < 768); window.addEventListener('resize', fn); return () => window.removeEventListener('resize', fn); }, []);
            const getViewCenter = useCallback(() => { const vw = window.innerWidth; const vh = window.innerHeight; const hh = isMobile ? 56 : 64; return { x: vw / 2, y: hh + (vh - hh) / 2 }; }, [isMobile]);
            const getOverviewCam = useCallback(() => { const vc = getViewCenter(); const s = baseScale; return { x: vc.x - (boardW / 2) * s, y: vc.y - (boardH / 2) * s, s }; }, [baseScale, boardW, boardH, getViewCenter]);
            const getFocusCam = useCallback((placement) => {
                if (!placement) return camRef.current;
                const fcx = placement.normX * (cellSize + gap) + gridPadding + cellSize / 2;
                const fcy = placement.normY * (cellSize + gap) + gridPadding + cellSize / 2;
                const wordLen = placement.wordStr.length;
                const offsetPx = Math.min(wordLen * (cellSize + gap) * 0.3, 80);
                const wcx = fcx + (placement.isHoriz ? offsetPx : 0);
                const wcy = fcy + (placement.isHoriz ? 0 : offsetPx);
                const s = Math.min(baseScale * 2.2, 2.8);
                const vc = getViewCenter();
                return { x: vc.x - wcx * s, y: vc.y - wcy * s, s };
            }, [baseScale, cellSize, gap, gridPadding, getViewCenter]);

            const animateCamTo = useCallback((target) => {
                if (animTimerRef.current) clearTimeout(animTimerRef.current);
                setIsAnimating(true);
                setCam(target);
                animTimerRef.current = setTimeout(() => setIsAnimating(false), 480);
            }, []);

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, async (u) => { if (u) setUser(u); else { try { await signInAnonymously(auth); } catch(e) { console.error(e); } } });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !quizId) { setLoading(false); return; }
                const fetch = async () => {
                    try {
                        const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId));
                        if (snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            const cards = (data.content?.cards || []).map((c, i) => ({ ...c, id: c.id || `card-${i}` }));
                            setFullWordList(cards);
                            setLayout(generateCrossword(cards));
                        }
                    } catch(e) { console.error(e); } finally { setLoading(false); }
                };
                fetch();
            }, [user, quizId]);

            useEffect(() => {
                if (!layout || !gameStarted) return;
                const compute = () => {
                    const vw = window.innerWidth; const vh = window.innerHeight;
                    const hh = isMobile ? 56 : 64;
                    const s = Math.min((vw - 20) / boardW, (vh - hh - 20) / boardH, 1.3);
                    setBaseScale(s);
                    const vcx = vw / 2, vcy = hh + (vh - hh) / 2;
                    setCam({ x: vcx - (boardW / 2) * s, y: vcy - (boardH / 2) * s, s });
                };
                compute();
                window.addEventListener('resize', compute);
                return () => window.removeEventListener('resize', compute);
            }, [layout, gameStarted, boardW, boardH]);

            const goOverview = useCallback(() => {
                setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                setShowAcrossPop(false); setShowDownPop(false);
                animateCamTo(getOverviewCam());
                if (realInputRef.current) realInputRef.current.blur();
            }, [animateCamTo, getOverviewCam]);

            const focusOnPlacement = useCallback((placement) => { animateCamTo(getFocusCam(placement)); }, [animateCamTo, getFocusCam]);
            const dist2 = (a, b) => Math.sqrt((a.clientX - b.clientX) ** 2 + (a.clientY - b.clientY) ** 2);
            const mid2 = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

            const onTouchStart = useCallback((e) => {
                const tr = touchRef.current;
                if (e.touches.length === 2) {
                    const d = dist2(e.touches[0], e.touches[1]); const m = mid2(e.touches[0], e.touches[1]);
                    tr.pinching = true; tr.active = false; tr.moved = true;
                    tr.pinchDist = d; tr.pinchScale = camRef.current.s;
                    tr.pinchMidX = m.x; tr.pinchMidY = m.y;
                    tr.pinchCamX = camRef.current.x; tr.pinchCamY = camRef.current.y;
                    return;
                }
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    tr.active = true; tr.moved = false; tr.pinching = false;
                    tr.startX = t.clientX; tr.startY = t.clientY;
                    tr.startCamX = camRef.current.x; tr.startCamY = camRef.current.y;
                }
            }, []);

            const onTouchMove = useCallback((e) => {
                const tr = touchRef.current;
                if (tr.pinching && e.touches.length === 2) {
                    e.preventDefault();
                    const d = dist2(e.touches[0], e.touches[1]);
                    const ratio = d / tr.pinchDist;
                    const ns = Math.max(0.25, Math.min(tr.pinchScale * ratio, 3.5));
                    const m = mid2(e.touches[0], e.touches[1]);
                    const nx = m.x - (tr.pinchMidX - tr.pinchCamX) * (ns / tr.pinchScale);
                    const ny = m.y - (tr.pinchMidY - tr.pinchCamY) * (ns / tr.pinchScale);
                    setCam({ x: nx, y: ny, s: ns }); camRef.current = { x: nx, y: ny, s: ns };
                    return;
                }
                if (tr.active && !tr.pinching && e.touches.length === 1) {
                    const t = e.touches[0];
                    const dx = t.clientX - tr.startX; const dy = t.clientY - tr.startY;
                    if (!tr.moved && Math.sqrt(dx*dx+dy*dy) > 5) tr.moved = true;
                    if (tr.moved) {
                        const nx = tr.startCamX + dx; const ny = tr.startCamY + dy;
                        setCam(prev => ({ ...prev, x: nx, y: ny })); camRef.current = { ...camRef.current, x: nx, y: ny };
                    }
                }
            }, []);

            const onTouchEnd = useCallback((e) => {
                const tr = touchRef.current;
                if (tr.pinching) { tr.pinching = false; tr.active = false; return; }
                tr.active = false;
            }, []);

            const handleEmptyTap = useCallback((e) => {
                if (e.target === e.currentTarget) { if (viewMode === 'focused') goOverview(); }
            }, [viewMode, goOverview]);

            const handleCellClick = useCallback((x, y, cell) => {
                if (globalWin) return;
                if (viewMode === 'overview') {
                    const ap = cell.placements[0];
                    setActivePlacementId(ap.id); setSelectedCell({ x, y });
                    setViewMode('focused'); setDirection(ap.isHoriz ? 'across' : 'down');
                    focusOnPlacement(ap);
                    setTimeout(() => { if (realInputRef.current) realInputRef.current.focus(); }, 100);
                } else {
                    const ap = allPlacements.find(p => p.id === activePlacementId);
                    if (!ap) return;
                    if (selectedCell?.x === x && selectedCell?.y === y) {
                        const other = cell.placements.find(p => p.id !== activePlacementId);
                        if (other) { setActivePlacementId(other.id); setDirection(other.isHoriz ? 'across' : 'down'); focusOnPlacement(other); }
                    } else { setSelectedCell({ x, y }); setTimeout(() => { if (realInputRef.current) realInputRef.current.focus(); }, 50); }
                }
            }, [viewMode, activePlacementId, selectedCell, allPlacements, globalWin, focusOnPlacement]);

            const advanceFocusFrom = useCallback((x, y, ap, ci = inputs) => {
                const next = ap.isHoriz ? { x: x + 1, y } : { x, y: y + 1 };
                const end = ap.isHoriz ? ap.normX + ap.wordStr.length - 1 : ap.normY + ap.wordStr.length - 1;
                const atEnd = ap.isHoriz ? x >= end : y >= end;
                if (!atEnd) { setSelectedCell(next); setTimeout(() => { if (realInputRef.current) realInputRef.current.focus(); }, 30); }
                checkWord(ap, ci);
            }, [inputs]);

            const handleRealInput = useCallback((e) => {
                if (!selectedCell || !activePlacementId || globalWin) return;
                const { x, y } = selectedCell;
                const cell = layout?.grid[y]?.[x]; if (!cell) return;
                const ap = allPlacements.find(p => p.id === activePlacementId); if (!ap) return;
                const isGreen = cell.placements.some(p => solvedWords.includes(p.id));
                const v = (e.target.value || '').toUpperCase().replace(/[^A-ZÁÉÍÓÚÑ]/gi, '').slice(-1);
                e.target.value = '';
                if (!v) return;
                if (isGreen) { if (v === cell.answer) advanceFocusFrom(x, y, ap); else { setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 500); } return; }
                const ni = { ...inputs, [`${x},${y}`]: v };
                setInputs(ni);
                advanceFocusFrom(x, y, ap, ni);
            }, [selectedCell, activePlacementId, globalWin, layout, allPlacements, solvedWords, inputs, advanceFocusFrom]);

            const handleKeyDown = useCallback((e) => {
                if (!selectedCell || !activePlacementId || globalWin || !layout) return;
                const { x, y } = selectedCell;
                const ap = allPlacements.find(p => p.id === activePlacementId); if (!ap) return;
                const cell = layout.grid[y]?.[x]; if (!cell) return;
                const isGreen = cell.placements.some(p => solvedWords.includes(p.id));
                if (e.key === 'Escape') { goOverview(); return; }
                if (e.key === 'Enter') { checkWord(ap, inputs); return; }
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    if (!isGreen && inputs[`${x},${y}`]) { setInputs(prev => { const n = {...prev}; delete n[`${x},${y}`]; return n; }); return; }
                    const d = ap.isHoriz ? -1 : 0; const dv = ap.isHoriz ? 0 : -1;
                    const px = x + d; const py = y + dv;
                    if (px >= ap.normX && py >= ap.normY && !(px === x && py === y)) setSelectedCell({ x: px, y: py });
                    return;
                }
                if (/^[a-zA-ZñÑ]$/.test(e.key)) {
                    e.preventDefault();
                    const v = e.key.toUpperCase();
                    if (isGreen) { if (v === cell.answer) advanceFocusFrom(x, y, ap); else { setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 500); } return; }
                    const ni = { ...inputs, [`${x},${y}`]: v };
                    setInputs(ni);
                    advanceFocusFrom(x, y, ap, ni);
                    return;
                }
                if (['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key)) {
                    e.preventDefault();
                    let nx = x, ny = y;
                    if (e.key === 'ArrowRight') nx++; if (e.key === 'ArrowLeft') nx--;
                    if (e.key === 'ArrowDown') ny++; if (e.key === 'ArrowUp') ny--;
                    if (nx >= 0 && ny >= 0 && ny < layout.height && nx < layout.width && layout.grid[ny]?.[nx]) setSelectedCell({ x: nx, y: ny });
                }
            }, [selectedCell, activePlacementId, globalWin, layout, inputs, solvedWords, allPlacements, goOverview, advanceFocusFrom]);

            useEffect(() => { window.addEventListener('keydown', handleKeyDown); return () => window.removeEventListener('keydown', handleKeyDown); }, [handleKeyDown]);

            const checkWord = useCallback((ap, ci) => {
                let ok = true, full = true;
                for (let i = 0; i < ap.wordStr.length; i++) {
                    const cx = ap.normX + (ap.isHoriz ? i : 0); const cy = ap.normY + (ap.isHoriz ? 0 : i);
                    const cell = layout.grid[cy][cx];
                    const green = cell.placements.some(p => solvedWords.includes(p.id));
                    const raw = ci[`${cx},${cy}`]; let v = '';
                    if (raw) v = raw; else if (green) v = cell.answer;
                    if (!v) full = false;
                    if (v !== ap.wordStr[i]) ok = false;
                }
                if (!full) return;
                if (ok && !solvedWords.includes(ap.id)) {
                    const ns = [...solvedWords, ap.id]; setSolvedWords(ns);
                    setWordFeedback('success');
                    setTimeout(() => { setWordFeedback(null); if (ns.length === layout.totalWords) setGlobalWin(true); else goOverview(); }, 1000);
                } else if (!ok) { setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 500); }
            }, [layout, solvedWords, goOverview]);

            const handleClueClick = (c) => {
                setActivePlacementId(c.id); setDirection(c.isHoriz ? 'across' : 'down');
                setSelectedCell({ x: c.normX, y: c.normY });
                setViewMode('focused'); focusOnPlacement(c);
                setShowAcrossPop(false); setShowDownPop(false);
                setTimeout(() => { if (realInputRef.current) realInputRef.current.focus(); }, 150);
            };

            useEffect(() => {
                if (activePlacementId && viewMode === 'overview') {
                    const el = document.getElementById(`clue-${direction}-${activePlacementId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, [activePlacementId, direction, viewMode]);

            // ====== RENDER ======
            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-amber-500 font-black animate-pulse text-xl">Generando Malla...</div>;
            if (!layout) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">No se pudo generar el crucigrama. Verifica tu banco de palabras.</div>;

            // ====== PANTALLA DE INICIO ======
            if (!gameStarted) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 overflow-hidden">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                            <h1 className="text-3xl font-black text-amber-500 mb-2">{quizData?.title || 'Crucigrama'}</h1>
                            <p className="text-zinc-400 mb-8 font-medium">Ingresa tu nombre para comenzar.</p>
                            <input type="text" placeholder="Tu nombre..." value={playerName} onChange={(e) => setPlayerName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && setGameStarted(true)}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-amber-500 transition-colors" style={{ fontSize: '16px' }} />
                            <button disabled={!playerName.trim()} onClick={() => setGameStarted(true)}
                                className="w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black text-lg py-4 rounded-xl shadow-lg active:scale-95 uppercase tracking-widest">
                                Empezar Juego
                            </button>
                            {/* goBack en lugar de hardcodear index.html */}
                            <button onClick={goBack} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">Regresar</button>
                        </div>
                    </div>
                );
            }

            const inputOverlayStyle = (selectedCell && viewMode === 'focused') ? {
                left: selectedCell.x * (cellSize + gap) + gridPadding,
                top: selectedCell.y * (cellSize + gap) + gridPadding,
                width: cellSize, height: cellSize,
            } : { display: 'none' };

            return (
                <div className="h-[100dvh] bg-zinc-950 flex flex-col overflow-hidden relative">

                    {toastMsg && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] bg-zinc-800 border border-zinc-700 text-white px-5 py-3 rounded-2xl font-bold text-sm shadow-xl">{toastMsg}</div>}

                    {/* VICTORIA */}
                    {globalWin && (
                        <div className="absolute inset-0 z-[100] bg-zinc-950/95 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
                            <div className="text-8xl mb-4">🏆</div>
                            <h2 className="text-4xl font-black text-amber-500 mb-2">¡Completado!</h2>
                            <p className="text-zinc-400 mb-8">{playerName}, completaste el crucigrama.</p>
                            <div className="flex flex-col gap-3 w-full max-w-xs">
                                <button onClick={() => setShowWordList(true)} className="w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-4 rounded-xl active:scale-95 text-sm">📖 VER LAS {fullWordList.length} PALABRAS</button>
                                <button onClick={() => window.location.reload()} className="w-full bg-amber-500 hover:bg-amber-400 text-black font-black px-6 py-4 rounded-xl active:scale-95 text-sm">🔄 JUGAR OTRO TABLERO</button>
                                {/* goBack en lugar de index.html */}
                                <button onClick={goBack} className="mt-2 text-xs font-bold text-zinc-500 hover:text-zinc-300 uppercase tracking-widest">SALIR</button>
                            </div>
                        </div>
                    )}

                    {/* LISTA DE PALABRAS */}
                    {showWordList && (
                        <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8">
                            <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                                <div className="flex items-center justify-between mb-6 shrink-0">
                                    <h2 className="text-2xl font-black text-white">Vocabulario</h2>
                                    <button onClick={() => setShowWordList(false)} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white"><X size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 custom-scrollbar pb-6">
                                    {fullWordList.map(c => (
                                        <div key={c.id} className="flex items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                            <div className="text-3xl bg-zinc-900 w-14 h-14 flex items-center justify-center rounded-xl border border-zinc-800 flex-shrink-0">{c.emojis}</div>
                                            <div className="min-w-0">
                                                <h4 className="text-base font-black text-white">{c.wordEn}</h4>
                                                <p className="text-amber-500 font-bold text-sm">{c.wordEs}</p>
                                                {c.exampleEn && <p className="text-zinc-500 text-xs italic truncate">"{c.exampleEn}"</p>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER — Home usa goBack, se elimina botón Share */}
                    <header className="px-3 py-2 sm:px-5 sm:py-3 w-full flex justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/90 backdrop-blur-md z-40 gap-2" style={{ minHeight: isMobile ? 56 : 64 }}>
                        <div className="flex items-center gap-2 min-w-0">
                            <button onClick={goBack} className="p-2 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white border border-zinc-700 flex-shrink-0"><Home size={16}/></button>
                            <div className="min-w-0">
                                <h1 className="text-sm sm:text-base font-black text-amber-500 leading-none truncate">{quizData?.title || 'Crucigrama'}</h1>
                                <p className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">{solvedWords.length}/{layout.totalWords} palabras</p>
                            </div>
                        </div>

                        {viewMode === 'focused' && activePlacementObj ? (
                            <button onClick={goOverview} className="flex items-center gap-2 bg-amber-500/10 border border-amber-500/30 rounded-xl px-3 py-2 min-w-0 max-w-[55%] flex-shrink">
                                <span className="text-lg flex-shrink-0">{activePlacementObj.emojis}</span>
                                <span className="text-[11px] font-bold text-amber-300 truncate">{activePlacementObj.clueText}</span>
                                <X size={14} className="text-zinc-500 flex-shrink-0"/>
                            </button>
                        ) : (
                            <div className="flex items-center gap-2 flex-shrink-0">
                                <div className="relative">
                                    <div className="absolute inset-0 bg-amber-500 blur-md opacity-15 rounded-xl pointer-events-none glow-beat-1"></div>
                                    <button onClick={(e) => { e.stopPropagation(); setShowAcrossPop(!showAcrossPop); setShowDownPop(false); }}
                                        className={`relative flex items-center gap-1.5 px-3 py-2.5 rounded-xl font-black text-xs uppercase tracking-wider shadow-md ${showAcrossPop ? 'bg-amber-600 text-black' : 'bg-zinc-800 text-amber-500 active:scale-95'}`}>
                                        <ArrowRight size={14}/> HOR
                                    </button>
                                    {showAcrossPop && (
                                        <div className="absolute top-full right-0 mt-2 w-72 max-h-60 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 z-50">
                                            <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                                <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Horizontales</span>
                                                <button onClick={()=>setShowAcrossPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                            </div>
                                            {layout.clues.across.map(c => (
                                                <button key={c.id} disabled={solvedWords.includes(c.id)} onClick={() => handleClueClick(c)}
                                                    className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 ${solvedWords.includes(c.id) ? 'opacity-40 line-through text-zinc-500' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                    <span className="text-amber-500 shrink-0">{c.number}.</span><span>{c.clueText}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="relative">
                                    <div className="absolute inset-0 bg-amber-500 blur-md opacity-15 rounded-xl pointer-events-none glow-beat-2"></div>
                                    <button onClick={(e) => { e.stopPropagation(); setShowDownPop(!showDownPop); setShowAcrossPop(false); }}
                                        className={`relative flex items-center gap-1.5 px-3 py-2.5 rounded-xl font-black text-xs uppercase tracking-wider shadow-md ${showDownPop ? 'bg-amber-600 text-black' : 'bg-zinc-800 text-amber-500 active:scale-95'}`}>
                                        <ArrowDown size={14}/> VER
                                    </button>
                                    {showDownPop && (
                                        <div className="absolute top-full right-0 mt-2 w-72 max-h-60 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 z-50">
                                            <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                                <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Verticales</span>
                                                <button onClick={()=>setShowDownPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                            </div>
                                            {layout.clues.down.map(c => (
                                                <button key={c.id} disabled={solvedWords.includes(c.id)} onClick={() => handleClueClick(c)}
                                                    className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 ${solvedWords.includes(c.id) ? 'opacity-40 line-through text-zinc-500' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                    <span className="text-amber-500 shrink-0">{c.number}.</span><span>{c.clueText}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </header>

                    {/* GRID */}
                    <div className="flex-1 w-full relative min-h-0 overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-zinc-900 to-zinc-950"
                        style={{ touchAction: 'none' }}
                        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
                        onClick={handleEmptyTap}>

                        <div className="absolute bg-zinc-900/50 rounded-3xl border border-zinc-800/40"
                            style={{ width: boardW, height: boardH, transform: `translate(${cam.x}px, ${cam.y}px) scale(${cam.s})`, transformOrigin: '0 0', transition: isAnimating ? 'transform 0.45s cubic-bezier(0.22, 1, 0.36, 1)' : 'none', willChange: 'transform' }}>

                            <input ref={realInputRef} className="cell-real-input" style={inputOverlayStyle}
                                type="text" autoCapitalize="characters" autoComplete="off" autoCorrect="off" spellCheck="false"
                                inputMode="text" enterKeyHint="next" onInput={handleRealInput}
                                onKeyDown={(e) => { if (e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Escape') {} }}
                                onBlur={() => { setTimeout(() => { if (viewMode === 'focused' && realInputRef.current && document.activeElement !== realInputRef.current) {} }, 100); }} />

                            {viewMode === 'focused' && activePlacementObj && (
                                <div className="absolute pointer-events-none z-10"
                                    style={{ left: activePlacementObj.normX * (cellSize + gap) + gridPadding - 4, top: activePlacementObj.normY * (cellSize + gap) + gridPadding - 4, width: activePlacementObj.isHoriz ? activePlacementObj.wordStr.length * (cellSize + gap) - gap + 8 : cellSize + 8, height: activePlacementObj.isHoriz ? cellSize + 8 : activePlacementObj.wordStr.length * (cellSize + gap) - gap + 8, background: 'rgba(245,158,11,0.08)', border: '2px solid rgba(245,158,11,0.3)', borderRadius: 14 }}>
                                    <div className={`absolute text-[9px] font-black text-amber-400/80 flex items-center gap-0.5 whitespace-nowrap ${activePlacementObj.isHoriz ? '-left-[21px] top-1/2 -translate-y-1/2' : '-top-[21px] left-1/2 -translate-x-1/2'}`}>{activePlacementObj.number}</div>
                                </div>
                            )}

                            {layout.grid.map((row, y) =>
                                row.map((cell, x) => {
                                    if (!cell) return null;
                                    const isGreen = cell.placements.some(p => solvedWords.includes(p.id));
                                    const rawInput = inputs[`${x},${y}`]; let dv = '';
                                    if (isGreen) dv = cell.answer; else if (rawInput) dv = rawInput;
                                    const isSel = selectedCell?.x === x && selectedCell?.y === y;
                                    const isWA = cell.placements.some(p => p.id === activePlacementId);
                                    const focused = viewMode === 'focused';
                                    let bg, tc, ring = '';
                                    if (wordFeedback === 'success' && isWA && focused) { bg = 'bg-emerald-400'; tc = 'text-black font-black'; ring = 'ring-2 ring-emerald-300'; }
                                    else if (isGreen) { bg = 'bg-emerald-500'; tc = 'text-black font-black'; ring = 'ring-1 ring-emerald-400/60'; }
                                    else if (wordFeedback === 'error' && isWA && focused) { bg = 'bg-rose-500/70'; tc = 'text-white font-black'; ring = 'animate-shake'; }
                                    else if (isSel && focused) { bg = 'bg-amber-400'; tc = 'text-black font-black'; ring = 'ring-[3px] ring-white shadow-lg shadow-amber-400/40 z-30 scale-[1.06]'; }
                                    else if (isWA && focused) { bg = 'bg-amber-500/20'; tc = 'text-white font-bold'; ring = 'border border-amber-500/40'; }
                                    else { bg = 'bg-zinc-800'; tc = 'text-white font-bold'; ring = 'border border-zinc-700/50'; }
                                    const dimmed = focused && !isWA && !isGreen;
                                    return (
                                        <div key={`${x}-${y}`}
                                            className={`absolute flex items-center justify-center rounded-lg transition-colors duration-150 ${bg} ${ring} ${dimmed ? 'opacity-30' : ''}`}
                                            style={{ left: x * (cellSize + gap) + gridPadding, top: y * (cellSize + gap) + gridPadding, width: cellSize, height: cellSize, cursor: 'pointer' }}
                                            onClick={(e) => { e.stopPropagation(); handleCellClick(x, y, cell); }}>
                                            {cell.starts?.map((s, si) => (
                                                <span key={si} className={`absolute text-[8px] font-black text-zinc-400 ${s.isHoriz ? '-left-[21px] top-1/2 -translate-y-1/2' : '-top-[21px] left-1/2 -translate-x-1/2'}`}>{s.number}</span>
                                            ))}
                                            <span className={`text-lg sm:text-xl ${tc} pointer-events-none select-none leading-none`}>{dv}</span>
                                        </div>
                                    );
                                })
                            )}
                        </div>

                        {/* ZOOM */}
                        <div className="absolute bottom-4 right-4 flex flex-col gap-2 z-50">
                            <button onClick={(e) => { e.stopPropagation(); const vc = getViewCenter(); setCam(prev => { const ns = Math.min(prev.s * 1.3, 3.5); return { x: vc.x - (vc.x - prev.x) * (ns / prev.s), y: vc.y - (vc.y - prev.y) * (ns / prev.s), s: ns }; }); setIsAnimating(true); setTimeout(()=>setIsAnimating(false),480); }}
                                className="w-10 h-10 bg-zinc-800/90 border border-zinc-700 rounded-xl flex items-center justify-center text-zinc-300 active:scale-90 backdrop-blur-sm shadow-lg"><ZoomIn size={18}/></button>
                            <button onClick={(e) => { e.stopPropagation(); const vc = getViewCenter(); setCam(prev => { const ns = Math.max(prev.s * 0.7, 0.25); return { x: vc.x - (vc.x - prev.x) * (ns / prev.s), y: vc.y - (vc.y - prev.y) * (ns / prev.s), s: ns }; }); setIsAnimating(true); setTimeout(()=>setIsAnimating(false),480); }}
                                className="w-10 h-10 bg-zinc-800/90 border border-zinc-700 rounded-xl flex items-center justify-center text-zinc-300 active:scale-90 backdrop-blur-sm shadow-lg"><ZoomOut size={18}/></button>
                            <button onClick={(e) => { e.stopPropagation(); animateCamTo(getOverviewCam()); }}
                                className="w-10 h-10 bg-zinc-800/90 border border-zinc-700 rounded-xl flex items-center justify-center text-zinc-300 active:scale-90 backdrop-blur-sm shadow-lg"><Crosshair size={18}/></button>
                        </div>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<CrosswordApp />);
    </script>
</body>
</html>

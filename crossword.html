    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",

      }
    }

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .cell-input::selection { background: transparent; }
        
        /* Modificamos la transición para que escale y se traslade fluido */

        @keyframes heartbeat-glow {
            0%, 100% { opacity: 0; transform: scale(0.95); }
            10% { opacity: 0.25; transform: scale(1.05); }
            20% { opacity: 0.05; transform: scale(1); }
            30% { opacity: 0.25; transform: scale(1.05); }
            45%, 90% { opacity: 0; transform: scale(0.95); }
        }
        .glow-beat-1 { animation: heartbeat-glow 4s ease-in-out infinite; }
        .glow-beat-2 { animation: heartbeat-glow 4s ease-in-out infinite 2s; } 
    </style>
</head>
<body class="text-zinc-100 h-[100dvh] flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Check, RotateCcw, Award, Home, ArrowRight, ArrowDown, Edit2, X, LocateFixed, Plus, Minus, Share2, User } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const generateCrossword = (words) => {
            if (!words || words.length === 0) return null;
            let bestLayout = null; let maxPlaced = 0;
            const sortedWords = [...words].sort((a, b) => b.wordEn.length - a.wordEn.length);

            const isValid = (wordStr, startX, startY, isHoriz, gridState) => {
                for (let i = 0; i < wordStr.length; i++) {
                    let x = startX + (isHoriz ? i : 0); let y = startY + (isHoriz ? 0 : i);
                    let cell = gridState[`${x},${y}`];
                    if (cell && cell !== wordStr[i]) return false; 
                    const top = gridState[`${x},${y - 1}`]; const bottom = gridState[`${x},${y + 1}`];
                    const left = gridState[`${x - 1},${y}`]; const right = gridState[`${x + 1},${y}`];
                    if (isHoriz) {
                        if (!cell && (top || bottom)) return false;
                        if (i === 0 && left) return false;
                        if (i === wordStr.length - 1 && right) return false;
                    } else {
                        if (!cell && (left || right)) return false;
                        if (i === 0 && top) return false;
                        if (i === wordStr.length - 1 && bottom) return false;
                    }
                }
                return true;
            };

            const tryPlace = (wordIndex, currentPlacements, currentGrid) => {
                if (wordIndex === sortedWords.length) { bestLayout = [...currentPlacements]; maxPlaced = currentPlacements.length; return true; }
                if (currentPlacements.length > maxPlaced) { maxPlaced = currentPlacements.length; bestLayout = [...currentPlacements]; }

                const word = sortedWords[wordIndex];
                const wordStr = word.wordEn.toUpperCase().replace(/\s+/g, '');

                if (currentPlacements.length === 0) {
                    const newGrid = { ...currentGrid };
                    for (let i = 0; i < wordStr.length; i++) newGrid[`${i},0`] = wordStr[i];
                    if (tryPlace(wordIndex + 1, [{ ...word, x: 0, y: 0, isHoriz: true, wordStr }], newGrid)) return true;
                } else {
                    let placedAny = false;
                    for (const placement of currentPlacements) {
                        for (let j = 0; j < placement.wordStr.length; j++) {
                            for (let k = 0; k < wordStr.length; k++) {
                                if (placement.wordStr[j] === wordStr[k]) {
                                    const isHoriz = !placement.isHoriz;
                                    const startX = placement.isHoriz ? placement.x + j : placement.x - k;
                                    const startY = placement.isHoriz ? placement.y - k : placement.y + j;

                                    if (isValid(wordStr, startX, startY, isHoriz, currentGrid)) {
                                        const newGrid = { ...currentGrid };
                                        for (let i = 0; i < wordStr.length; i++) newGrid[`${startX + (isHoriz ? i : 0)},${startY + (isHoriz ? 0 : i)}`] = wordStr[i];
                                        if (tryPlace(wordIndex + 1, [...currentPlacements, { ...word, x: startX, y: startY, isHoriz, wordStr }], newGrid)) return true;
                                        placedAny = true;
                                    }
                                }
                            }
                        }
                    }
                    if (!placedAny) tryPlace(wordIndex + 1, currentPlacements, currentGrid);
                }
                return false;
            };

            tryPlace(0, [], {});
            if (!bestLayout || bestLayout.length === 0) return null;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            bestLayout.forEach(p => {
                if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
                if (p.isHoriz) { if (p.x + p.wordStr.length - 1 > maxX) maxX = p.x + p.wordStr.length - 1; if (p.y > maxY) maxY = p.y; } 
                else { if (p.x > maxX) maxX = p.x; if (p.y + p.wordStr.length - 1 > maxY) maxY = p.y + p.wordStr.length - 1; }
            });

            let numberMap = {}; let currentNumber = 1;
            const sortedPlacements = [...bestLayout].sort((a, b) => a.y === b.y ? a.x - b.x : a.y - b.y);

            sortedPlacements.forEach(p => {
                p.normX = p.x - minX; p.normY = p.y - minY;
                const key = `${p.normX},${p.normY}`;
                if (!numberMap[key]) numberMap[key] = currentNumber++;
                p.number = numberMap[key];
            });

            const width = maxX - minX + 1; const height = maxY - minY + 1;
            const grid = Array(height).fill(null).map(() => Array(width).fill(null));

            sortedPlacements.forEach(p => {
                for (let i = 0; i < p.wordStr.length; i++) {
                    const x = p.normX + (p.isHoriz ? i : 0); const y = p.normY + (p.isHoriz ? 0 : i);
                    if (!grid[y][x]) {
                        grid[y][x] = { answer: p.wordStr[i], starts: i === 0 ? [{number: p.number, isHoriz: p.isHoriz}] : [], placements: [p], x, y };
                    } else {
                        grid[y][x].placements.push(p);
                        if (i === 0) grid[y][x].starts.push({number: p.number, isHoriz: p.isHoriz});
                    }
                }
            });

            const clues = { across: [], down: [] };
            sortedPlacements.forEach(p => {
                p.clueText = p.wordEs || p.exampleEn || p.c2 || "Missing Clue"; 
                p.emojis = p.emojis || "🎯";
                if (p.isHoriz) clues.across.push(p); else clues.down.push(p);
            });

            return { grid, clues, width, height, totalWords: bestLayout.length };
        };

        const CrosswordApp = () => {
            const [user, setUser] = useState(null);
            const [quizId, setQuizId] = useState(new URLSearchParams(window.location.search).get('id'));
            const [isStudent, setIsStudent] = useState(new URLSearchParams(window.location.search).get('student') === 'true');
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);

            const [gameStarted, setGameStarted] = useState(false);
            const [playerName, setPlayerName] = useState('');
            const [toastMsg, setToastMsg] = useState(null);

            const [fullWordList, setFullWordList] = useState([]);
            const [showWordList, setShowWordList] = useState(false);

            const [layout, setLayout] = useState(null);
            const [inputs, setInputs] = useState({});
            
            const [selectedCell, setSelectedCell] = useState(null);
            const [solvedWords, setSolvedWords] = useState([]); 
            const [activePlacementId, setActivePlacementId] = useState(null); 
            const [direction, setDirection] = useState('across'); 
            const [viewMode, setViewMode] = useState('overview'); 
            const [wordFeedback, setWordFeedback] = useState(null); 
            const [globalWin, setGlobalWin] = useState(false);

            const [showAcrossPop, setShowAcrossPop] = useState(false);
            const [showDownPop, setShowDownPop] = useState(false);

            const inputRefs = useRef({});
            const containerRef = useRef(null);
            
            // --- NUEVA LÓGICA DE DIMENSIONES BLINDADAS ---
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [baseScale, setBaseScale] = useState(1);
            const [zoomTransform, setZoomTransform] = useState({ scale: 1, x: 0, y: 0 });

            // Detectar celular
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Tamaño rígido en píxeles para evitar el "Acordeón"
            const cellSize = isMobile ? 40 : 48;

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, setUser);
                if (quizId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', quizId)).then(snap => {
                        if(snap.exists()) {
                            const data = snap.data();
                            setQuizData(data);
                            const rawWords = data.content?.cards || data.content?.pairs || [];
                            const cleanWords = rawWords.map((w, i) => ({
                                id: w.id || i, wordEn: w.wordEn || w.c1 || '', wordEs: w.wordEs || w.c3 || '',
                                exampleEn: w.exampleEn || w.c2 || '', emojis: w.emojis || w.c2 || '🎯'
                            })).filter(w => w.wordEn);
                            
                            setFullWordList(cleanWords);

                            const shuffledWords = [...cleanWords].sort(() => 0.5 - Math.random());
                            const generated = generateCrossword(shuffledWords.slice(0, 15)); 
                            setLayout(generated);
                        } else { alert("Juego no encontrado"); }
                        setLoading(false);
                    });
                } else { setLoading(false); }
                return () => unsub();
            }, [quizId]);

            // Calcular escala base (PERFECTO CENTRADO ABSOLUTO)
            useEffect(() => {
                if (!layout || !containerRef.current || !gameStarted) return;
                
                const calculateOverviewScale = () => {
                    // No recalculamos si están tecleando (teclado abierto)
                    if (viewMode === 'focused') return; 
                    
                    const { clientWidth, clientHeight } = containerRef.current;
                    const gridW = layout.width * cellSize;
                    const gridH = layout.height * cellSize;
                    
                    // Márgenes de seguridad
                    const paddingX = isMobile ? 40 : 160;
                    const paddingY = isMobile ? 120 : 200;
                    
                    const scale = Math.min((clientWidth - paddingX) / gridW, (clientHeight - paddingY) / gridH, 1.2);
                    setBaseScale(scale);
                    
                    if (viewMode === 'overview') {
                        setZoomTransform({ scale, x: 0, y: 0 });
                    }
                };
                
                calculateOverviewScale();
                window.addEventListener('resize', calculateOverviewScale);
                return () => window.removeEventListener('resize', calculateOverviewScale);
            }, [layout, viewMode, gameStarted, isMobile, cellSize]);

            // Cámara Cinematográfica (Enfocar palabra esquivando el teclado)
            useEffect(() => {
                if (viewMode === 'focused' && activePlacementId && layout && containerRef.current) {
                    const activePlacement = layout.clues.across.concat(layout.clues.down).find(p => p.id === activePlacementId);
                    if (!activePlacement) return;
                    
                    const wordCenterX = (activePlacement.normX + (activePlacement.isHoriz ? activePlacement.wordStr.length / 2 : 0.5)) * cellSize;
                    const wordCenterY = (activePlacement.normY + (activePlacement.isHoriz ? 0.5 : activePlacement.wordStr.length / 2)) * cellSize;
                    
                    const gridW = layout.width * cellSize;
                    const gridH = layout.height * cellSize;
                    
                    // Distancia desde el centro del Grid hasta el centro de la palabra (en píxeles reales)
                    const tx = (gridW / 2) - wordCenterX;
                    const ty = (gridH / 2) - wordCenterY;

                    const focusScale = isMobile ? 1.4 : 1.8;
                    
                    // Elevamos la vista en móvil para que el teclado virtual no tape la palabra
                    const keyboardOffset = isMobile ? (120 / focusScale) : 0;

                    setZoomTransform({ scale: focusScale, x: tx, y: ty - keyboardOffset });
                } else if (viewMode === 'overview') {
                    setZoomTransform({ scale: baseScale, x: 0, y: 0 });
                }
            }, [viewMode, activePlacementId, layout, baseScale, isMobile, cellSize]);

            useEffect(() => {
                if (activePlacementId) {
                    const el = document.getElementById(`clue-${direction}-${activePlacementId}`);
                    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
                }
            }, [activePlacementId, showAcrossPop, showDownPop, direction]);

            const copyLink = () => {
                const studentUrl = `${window.location.origin}${window.location.pathname}?id=${quizId}&student=true`;
                navigator.clipboard.writeText(studentUrl).then(() => {
                    setToastMsg('¡Link para alumno copiado al portapapeles!');
                    setTimeout(() => setToastMsg(null), 3000);
                });
            };

            const checkCurrentWord = () => {
                const activePlacement = layout.clues.across.concat(layout.clues.down).find(p => p.id === activePlacementId);
                if (!activePlacement) return;

                let isCorrect = true; let allFilled = true;
                for(let i=0; i<activePlacement.wordStr.length; i++) {
                    const x = activePlacement.normX + (activePlacement.isHoriz ? i : 0);
                    const y = activePlacement.normY + (activePlacement.isHoriz ? 0 : i);
                    const cell = layout.grid[y][x];
                    const isCellProtected = cell.placements.some(p => solvedWords.includes(p.id));
                    const userVal = isCellProtected ? cell.answer : (inputs[`${x},${y}`] || '');
                    
                    if (userVal === '') allFilled = false;
                    if (userVal !== activePlacement.wordStr[i]) isCorrect = false;
                }

                if (!allFilled) return;

                if (isCorrect) {
                    if (!solvedWords.includes(activePlacementId)) {
                        const newSolved = [...solvedWords, activePlacementId];
                        setSolvedWords(newSolved); setWordFeedback('success');
                        setTimeout(() => {
                            setWordFeedback(null); setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                            setShowAcrossPop(false); setShowDownPop(false);
                            if (newSolved.length === layout.totalWords) setGlobalWin(true);
                        }, 1200); 
                    }
                } else {
                    setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 800);
                }
            };

            const handleInput = (e, x, y) => {
                const val = e.target.value.slice(-1).toUpperCase();
                if (!/^[A-ZÑ]$/.test(val) && val !== '') return;

                const newInputs = { ...inputs, [`${x},${y}`]: val };
                setInputs(newInputs);

                if (val !== '') {
                    const cell = layout.grid[y][x];
                    const activePlacement = cell.placements.find(p => p.id === activePlacementId) || cell.placements[0];
                    const dist = activePlacement.isHoriz ? (x - activePlacement.normX) : (y - activePlacement.normY);

                    let nextDist = dist + 1;
                    let nextX = x;
                    let nextY = y;
                    let foundNext = false;

                    while (nextDist < activePlacement.wordStr.length) {
                        nextX = activePlacement.normX + (activePlacement.isHoriz ? nextDist : 0);
                        nextY = activePlacement.normY + (activePlacement.isHoriz ? 0 : nextDist);
                        const nextCell = layout.grid[nextY][nextX];
                        const isNextProtected = nextCell.placements.some(p => solvedWords.includes(p.id));
                        
                        if (!isNextProtected) {
                            foundNext = true;
                            break;
                        }
                        nextDist++;
                    }

                    if (foundNext) {
                        setSelectedCell({ x: nextX, y: nextY }); 
                        setTimeout(() => inputRefs.current[`${nextX},${nextY}`]?.focus(), 10);
                    } else {
                        setTimeout(() => checkWordForce(activePlacement, newInputs), 50);
                    }
                }
            };

            const checkWordForce = (activePlacement, currentInputs) => {
                let isCorrect = true; let allFilled = true;
                for(let i=0; i<activePlacement.wordStr.length; i++) {
                    const x = activePlacement.normX + (activePlacement.isHoriz ? i : 0);
                    const y = activePlacement.normY + (activePlacement.isHoriz ? 0 : i);
                    const cell = layout.grid[y][x];
                    const isCellProtected = cell.placements.some(p => solvedWords.includes(p.id));
                    const val = isCellProtected ? cell.answer : (currentInputs[`${x},${y}`] || '');

                    if (val === '') allFilled = false;
                    if (val !== activePlacement.wordStr[i]) isCorrect = false;
                }
                if (allFilled) {
                    if (isCorrect && !solvedWords.includes(activePlacement.id)) {
                        const newSolved = [...solvedWords, activePlacement.id];
                        setSolvedWords(newSolved); setWordFeedback('success');
                        setTimeout(() => {
                            setWordFeedback(null); setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                            setShowAcrossPop(false); setShowDownPop(false);
                            if (newSolved.length === layout.totalWords) setGlobalWin(true);
                        }, 1200);
                    } else if (!isCorrect) {
                        setWordFeedback('error'); setTimeout(() => setWordFeedback(null), 800);
                    }
                }
            };

            const isProtected = (cx, cy) => {
                const cell = layout.grid[cy][cx];
                return cell && cell.placements.some(p => solvedWords.includes(p.id));
            };

            const handleKeyDown = (e, x, y) => {
                if (globalWin || wordFeedback === 'success') return;
                
                const cell = layout.grid[y][x];
                const activePlacement = cell.placements.find(p => p.id === activePlacementId) || cell.placements[0];
                const dist = activePlacement.isHoriz ? (x - activePlacement.normX) : (y - activePlacement.normY);
                const isAtStart = dist === 0;
                const isAtEnd = dist === activePlacement.wordStr.length - 1;

                if (e.key === 'Enter') {
                    e.preventDefault(); checkCurrentWord();
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    if (inputs[`${x},${y}`] && !isProtected(x, y)) {
                        setInputs(prev => ({ ...prev, [`${x},${y}`]: '' }));
                    } else if (dist > 0) {
                        let prevDist = dist - 1;
                        let prevX = x; let prevY = y;
                        let foundPrev = false;
                        
                        while(prevDist >= 0) {
                            prevX = activePlacement.normX + (activePlacement.isHoriz ? prevDist : 0);
                            prevY = activePlacement.normY + (activePlacement.isHoriz ? 0 : prevDist);
                            const prevCell = layout.grid[prevY][prevX];
                            const isPrevProtected = prevCell.placements.some(p => solvedWords.includes(p.id));
                            if (!isPrevProtected) {
                                foundPrev = true;
                                break;
                            }
                            prevDist--;
                        }

                        if (foundPrev) {
                            setInputs(prev => ({ ...prev, [`${prevX},${prevY}`]: '' }));
                            setSelectedCell({ x: prevX, y: prevY });
                            setTimeout(() => inputRefs.current[`${prevX},${prevY}`]?.focus(), 10);
                        }
                    }
                } else if (['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                    e.preventDefault(); 
                    if (e.key === 'ArrowRight' && activePlacement.isHoriz && !isAtEnd) {
                        setSelectedCell({ x: x + 1, y }); setTimeout(() => inputRefs.current[`${x + 1},${y}`]?.focus(), 10);
                    } else if (e.key === 'ArrowDown' && !activePlacement.isHoriz && !isAtEnd) {
                        setSelectedCell({ x, y: y + 1 }); setTimeout(() => inputRefs.current[`${x},${y + 1}`]?.focus(), 10);
                    } else if (e.key === 'ArrowLeft' && activePlacement.isHoriz && !isAtStart) {
                        setSelectedCell({ x: x - 1, y }); setTimeout(() => inputRefs.current[`${x - 1},${y}`]?.focus(), 10);
                    } else if (e.key === 'ArrowUp' && !activePlacement.isHoriz && !isAtStart) {
                        setSelectedCell({ x, y: y - 1 }); setTimeout(() => inputRefs.current[`${x},${y - 1}`]?.focus(), 10);
                    }
                }
            };

            const handleCellClick = (x, y) => {
                if (globalWin) return;
                const cell = layout.grid[y][x];
                const unsolvedPlacements = cell.placements.filter(p => !solvedWords.includes(p.id));
                if (unsolvedPlacements.length === 0) return;

                let newActive = unsolvedPlacements.find(p => p.id === activePlacementId);
                if (!newActive) newActive = unsolvedPlacements[0];

                setActivePlacementId(newActive.id);
                setDirection(newActive.isHoriz ? 'across' : 'down');

                let focusX = newActive.normX; 
                let focusY = newActive.normY;
                for(let i=0; i<newActive.wordStr.length; i++) {
                    const cx = newActive.normX + (newActive.isHoriz ? i : 0);
                    const cy = newActive.normY + (newActive.isHoriz ? 0 : i);
                    const checkCell = layout.grid[cy][cx];
                    const isCellProtected = checkCell.placements.some(p => solvedWords.includes(p.id));
                    if (!isCellProtected && !inputs[`${cx},${cy}`]) { 
                        focusX = cx; focusY = cy; 
                        break; 
                    }
                }

                setSelectedCell({ x: focusX, y: focusY });
                setViewMode('focused');

                if (newActive.isHoriz) { setShowAcrossPop(true); setShowDownPop(false); } 
                else { setShowDownPop(true); setShowAcrossPop(false); }

                setTimeout(() => inputRefs.current[`${focusX},${focusY}`]?.focus(), 500); 
            };

            const handleClueClick = (placement) => {
                if (solvedWords.includes(placement.id)) return;
                setActivePlacementId(placement.id);
                setDirection(placement.isHoriz ? 'across' : 'down');
                setViewMode('focused');

                let focusX = placement.normX; let focusY = placement.normY;
                for(let i=0; i<placement.wordStr.length; i++) {
                    const cx = placement.normX + (placement.isHoriz ? i : 0);
                    const cy = placement.normY + (placement.isHoriz ? 0 : i);
                    const cell = layout.grid[cy][cx];
                    const isCellProtected = cell.placements.some(p => solvedWords.includes(p.id));
                    if (!isCellProtected && !inputs[`${cx},${cy}`]) { focusX = cx; focusY = cy; break; }
                }
                setSelectedCell({ x: focusX, y: focusY });
                setTimeout(() => inputRefs.current[`${focusX},${focusY}`]?.focus(), 600);
            };

            const isClueActive = (placement) => placement.id === activePlacementId;

            if (loading) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-amber-500 font-black animate-pulse">Generando Malla...</div>;
            if (!layout) return <div className="h-[100dvh] flex items-center justify-center bg-zinc-950 text-rose-500 font-bold p-6 text-center">No se pudo generar el crucigrama. Verifica que tu banco de palabras no esté vacío o intenta con palabras más largas.</div>;

            if (!gameStarted) {
                return (
                    <div className="h-[100dvh] bg-zinc-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center z-10 animate-in zoom-in-95">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-4xl font-black shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                            <h1 className="text-3xl font-black text-amber-500 mb-2 leading-tight">{quizData?.title || 'Crucigrama'}</h1>
                            <p className="text-zinc-400 mb-8 font-medium">Ingresa tu nombre para comenzar la actividad.</p>
                            
                            <input 
                                type="text" 
                                placeholder="Tu nombre..." 
                                value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && setGameStarted(true)}
                                className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-xl p-4 text-center text-xl font-bold text-white mb-6 outline-none focus:border-amber-500 transition-colors"
                            />
                            
                            <button 
                                disabled={!playerName.trim()}
                                onClick={() => setGameStarted(true)}
                                className="w-full bg-amber-500 hover:bg-amber-400 disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed text-black font-black text-lg py-4 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-widest"
                            >
                                Empezar Juego
                            </button>
                            
                            {!isStudent && (
                                <button onClick={() => window.location.href='index.html'} className="mt-6 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                    Volver al Hub (Maestro)
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            const activePlacementObj = activePlacementId ? layout.clues.across.concat(layout.clues.down).find(p => p.id === activePlacementId) : null;

            return (
                <div className="h-[100dvh] bg-zinc-950 text-zinc-100 font-sans flex flex-col overflow-hidden relative">
                    
                    {toastMsg && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-full font-black text-sm shadow-xl z-[120] animate-in slide-in-from-top-4 flex items-center gap-2">
                            <Check size={16} /> {toastMsg}
                        </div>
                    )}

                    {globalWin && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-in fade-in p-4">
                            <div className="bg-zinc-900 border border-zinc-700 text-white p-8 rounded-[2rem] text-center shadow-2xl w-full max-w-md">
                                <Award className="w-24 h-24 text-amber-500 mx-auto mb-6 animate-bounce"/>
                                <h2 className="text-4xl font-black mb-2">¡Completado, {playerName}!</h2>
                                <p className="text-zinc-400 font-bold uppercase tracking-widest mb-8">Puntaje Perfecto</p>
                                
                                <div className="flex flex-col gap-4 w-full">
                                    <button onClick={() => setShowWordList(true)} className="w-full bg-zinc-800 border-2 border-zinc-700 hover:bg-zinc-700 text-white font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">
                                        📖 VER LAS {fullWordList.length} PALABRAS
                                    </button>
                                    <button onClick={() => window.location.reload()} className="w-full bg-amber-500 hover:bg-amber-400 text-black font-black px-6 py-4 rounded-xl transition-all shadow-md active:scale-95 text-sm sm:text-base">
                                        🔄 JUGAR OTRO TABLERO
                                    </button>
                                    {!isStudent && (
                                        <button onClick={() => window.location.href='index.html'} className="mt-2 text-xs font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                                            SALIR AL HUB
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showWordList && (
                        <div className="absolute inset-0 z-[110] bg-zinc-950 flex flex-col p-4 sm:p-8 animate-in slide-in-from-bottom-10">
                            <div className="max-w-3xl mx-auto w-full flex flex-col h-full bg-zinc-900 rounded-[2rem] border border-zinc-800 p-6 shadow-2xl">
                                <div className="flex items-center justify-between mb-6 shrink-0">
                                    <h2 className="text-2xl sm:text-3xl font-black text-white">Vocabulario del Paquete</h2>
                                    <button onClick={() => setShowWordList(false)} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 hover:text-white transition-colors">
                                        <X size={20} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar pb-6">
                                    {fullWordList.map(card => (
                                        <div key={card.id} className="flex flex-col sm:flex-row items-start sm:items-center p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800 gap-4">
                                            <div className="text-4xl bg-zinc-900 w-16 h-16 flex items-center justify-center rounded-xl shadow-sm border border-zinc-800 flex-shrink-0">
                                                {card.emojis}
                                            </div>
                                            <div className="flex-grow w-full">
                                                <h4 className="text-lg font-black text-white">{card.wordEn}</h4>
                                                <p className="text-amber-500 font-bold text-sm mb-1">{card.wordEs}</p>
                                                {card.exampleEn && <p className="text-zinc-500 text-xs italic">"{card.exampleEn}"</p>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="p-4 sm:p-6 w-full flex flex-col sm:flex-row justify-between items-center shrink-0 border-b border-zinc-800/50 bg-zinc-900/80 backdrop-blur-md z-40 gap-4">
                        <div className="flex items-center gap-4 w-full sm:w-auto justify-between">
                            <div className="flex items-center gap-3">
                                {!isStudent && (
                                    <button onClick={() => window.location.href='index.html'} className="p-2.5 bg-zinc-800 text-zinc-400 rounded-xl hover:bg-zinc-700 hover:text-white transition-colors border border-zinc-700">
                                        <Home size={20}/>
                                    </button>
                                )}
                                {!isStudent && <div className="w-px h-8 bg-zinc-800 mx-1 hidden sm:block"></div>}
                                {!isStudent && (
                                    <button onClick={copyLink} className="p-2.5 bg-zinc-800 text-sky-400 rounded-xl hover:bg-zinc-700 hover:text-sky-300 transition-colors border border-zinc-700 hidden sm:block" title="Copiar link para alumnos">
                                        <Share2 size={20}/>
                                    </button>
                                )}
                                <div className={!isStudent ? "ml-2" : ""}>
                                    <h1 className="text-lg font-black text-amber-500 leading-none tracking-tight">{quizData?.title || 'Actividad Periplo'}</h1>
                                    <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Modo: Crossword • {layout.totalWords} Palabras</p>
                                </div>
                            </div>
                            {!isStudent && (
                                <button onClick={copyLink} className="p-2.5 bg-zinc-800 text-sky-400 rounded-xl hover:bg-zinc-700 hover:text-sky-300 transition-colors border border-zinc-700 block sm:hidden">
                                    <Share2 size={20}/>
                                </button>
                            )}
                        </div>

                        <div className="flex items-center gap-4 w-full sm:w-auto relative z-50">
                            
                            <div className="relative group w-1/2 sm:w-32">
                                <div className="absolute inset-0 bg-amber-500 blur-md opacity-20 animate-pulse rounded-xl pointer-events-none glow-beat-1"></div>
                                <button onClick={() => {setShowAcrossPop(!showAcrossPop); setShowDownPop(false);}} className={`relative w-full flex justify-center items-center gap-2 px-4 py-3 rounded-xl font-black text-sm uppercase tracking-widest transition-all border border-transparent shadow-md ${showAcrossPop ? 'bg-amber-600 text-black' : 'bg-zinc-800 text-amber-500 hover:bg-zinc-700 hover:text-amber-400 active:scale-95'}`}>
                                    <ArrowRight size={16} className={showAcrossPop ? 'text-black' : 'text-amber-500'}/> HOR
                                </button>
                                {showAcrossPop && (
                                    <div className="absolute top-full left-0 sm:left-auto sm:right-0 mt-3 w-72 max-h-64 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 animate-in slide-in-from-top-2 z-50">
                                        <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                            <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Elige una pista</span>
                                            <button onClick={()=>setShowAcrossPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                        </div>
                                        {layout.clues.across.map(c => {
                                            const isSolved = solvedWords.includes(c.id);
                                            const isActive = isClueActive(c);
                                            return (
                                                <button key={c.id} id={`clue-across-${c.id}`} disabled={isSolved} onClick={() => handleClueClick(c)} className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 transition-colors ${isSolved ? 'opacity-50 line-through text-zinc-500' : isActive ? 'bg-amber-500/20 text-amber-300 ring-1 ring-amber-500/50' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                    {isActive && <Edit2 size={14} className="text-amber-500 shrink-0 mt-0.5" />}
                                                    <span className="text-amber-500 shrink-0">{c.number}.</span> <span>{c.clueText}</span>
                                                </button>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>

                            <div className="relative group w-1/2 sm:w-32">
                                <div className="absolute inset-0 bg-amber-500 blur-md opacity-20 animate-pulse rounded-xl pointer-events-none glow-beat-2"></div>
                                <button onClick={() => {setShowDownPop(!showDownPop); setShowAcrossPop(false);}} className={`relative w-full flex justify-center items-center gap-2 px-4 py-3 rounded-xl font-black text-sm uppercase tracking-widest transition-all border border-transparent shadow-md ${showDownPop ? 'bg-amber-600 text-black' : 'bg-zinc-800 text-amber-500 hover:bg-zinc-700 hover:text-amber-400 active:scale-95'}`}>
                                    <ArrowDown size={16} className={showDownPop ? 'text-black' : 'text-amber-500'}/> VER
                                </button>
                                {showDownPop && (
                                    <div className="absolute top-full right-0 mt-3 w-72 max-h-64 overflow-y-auto custom-scrollbar bg-zinc-800 border border-zinc-700 rounded-2xl shadow-2xl p-2 animate-in slide-in-from-top-2 z-50">
                                        <div className="flex justify-between items-center p-2 mb-1 border-b border-zinc-700">
                                            <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Elige una pista</span>
                                            <button onClick={()=>setShowDownPop(false)} className="text-zinc-500 hover:text-white"><X size={14}/></button>
                                        </div>
                                        {layout.clues.down.map(c => {
                                            const isSolved = solvedWords.includes(c.id);
                                            const isActive = isClueActive(c);
                                            return (
                                                <button key={c.id} id={`clue-down-${c.id}`} disabled={isSolved} onClick={() => handleClueClick(c)} className={`w-full text-left p-3 rounded-xl mb-1 text-sm font-bold flex items-start gap-2 transition-colors ${isSolved ? 'opacity-50 line-through text-zinc-500' : isActive ? 'bg-amber-500/20 text-amber-300 ring-1 ring-amber-500/50' : 'hover:bg-zinc-700 text-zinc-200'}`}>
                                                    {isActive && <Edit2 size={14} className="text-amber-500 shrink-0 mt-0.5" />}
                                                    <span className="text-amber-500 shrink-0">{c.number}.</span> <span>{c.clueText}</span>
                                                </button>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 w-full relative flex min-h-0">
                        {/* AREA SEGURA PARA EL TABLERO */}
                        <div 
                            className="flex-1 relative overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-zinc-900 to-black cursor-default"
                            onClick={(e) => { 
                                if (e.target === e.currentTarget) {
                                    if(viewMode==='focused') {
                                        setViewMode('overview'); setActivePlacementId(null); setSelectedCell(null);
                                        setShowAcrossPop(false); setShowDownPop(false);
                                    }
                                }
                            }}
                        >
                            {/* CONTENEDOR DE CENTRADO ABSOLUTO (NO SE DEFORMA) */}
                            <div className="absolute inset-0 pointer-events-none overflow-hidden">
                                <div 
                                    className="absolute top-1/2 left-1/2 pointer-events-auto shadow-2xl border border-zinc-800 bg-zinc-900/80 p-2 sm:p-3 rounded-3xl crossword-container"
                                    style={{ 
                                        transform: `translate(-50%, -50%) scale(${zoomTransform.scale}) translate(${zoomTransform.x}px, ${zoomTransform.y}px)`,
                                        transformOrigin: 'center center'
                                    }}
                                >
                                    {/* EL GRID MATEMÁTICAMENTE EXACTO (PÍXELES, NO PORCENTAJES) */}
                                    <div 
                                        className="relative grid gap-[2px]"
                                        style={{ 
                                            gridTemplateColumns: `repeat(${layout.width}, ${cellSize}px)`, 
                                            gridTemplateRows: `repeat(${layout.height}, ${cellSize}px)`
                                        }}
                                    >
                                        {viewMode === 'focused' && activePlacementObj && (
                                            <div 
                                                className="absolute z-50 text-4xl sm:text-5xl animate-bounce drop-shadow-xl pointer-events-none flex justify-center"
                                                style={{ 
                                                    left: `${(activePlacementObj.normX + (activePlacementObj.isHoriz ? activePlacementObj.wordStr.length/2 : 0.5)) * cellSize}px`,
                                                    top: `${activePlacementObj.normY * cellSize - 55}px`,
                                                    transform: 'translateX(-50%)'
                                                }}
                                            >
                                                <div className="bg-zinc-900/90 backdrop-blur-xl px-5 py-2.5 rounded-[2rem] border-2 border-zinc-700 shadow-2xl">
                                                    {activePlacementObj.emojis}
                                                </div>
                                            </div>
                                        )}

                                        {layout.grid.map((row, y) => 
                                            row.map((cell, x) => {
                                                if (!cell) return <div key={`${x}-${y}`} style={{ width: cellSize, height: cellSize }} className="bg-transparent pointer-events-none shrink-0"></div>;

                                                const isProtected = cell.placements.some(p => solvedWords.includes(p.id));
                                                const isSelected = selectedCell?.x === x && selectedCell?.y === y;
                                                const isWordActive = cell.placements.some(p => p.id === activePlacementId);
                                                
                                                const userVal = isProtected ? cell.answer : (inputs[`${x},${y}`] || '');
                                                
                                                let containerClasses = "crossword-cell relative flex items-center justify-center transition-all duration-300 rounded-lg shadow-sm shrink-0 ";
                                                
                                                if (isProtected) containerClasses += "bg-emerald-500 text-black ring-1 ring-emerald-400 z-10 shadow-emerald-500/50 font-black";
                                                else if (wordFeedback === 'error' && userVal !== '' && isWordActive) containerClasses += "bg-rose-500 text-white animate-shake";
                                                else if (isSelected && viewMode === 'focused') containerClasses += "bg-amber-400 text-black z-30 ring-4 ring-white shadow-xl shadow-amber-500/50 scale-110";
                                                else if (isWordActive && viewMode === 'focused') containerClasses += "bg-amber-500/30 text-amber-100 z-20 border border-amber-500/50";
                                                else containerClasses += "bg-zinc-800 text-white hover:bg-zinc-700 cursor-pointer border border-zinc-700/50";

                                                if (viewMode === 'focused' && !isWordActive && !isProtected) containerClasses += " opacity-20";

                                                return (
                                                    <div 
                                                        key={`${x}-${y}`} 
                                                        className={containerClasses}
                                                        style={{ width: cellSize, height: cellSize }}
                                                        onClick={() => handleCellClick(x, y)}
                                                    >
                                                        {cell.starts && cell.starts.map((s, idx) => (
                                                            <span key={idx} className={`absolute w-5 h-5 bg-amber-500 text-black rounded-full flex items-center justify-center text-[10px] font-black z-40 shadow-sm pointer-events-none ${s.isHoriz ? '-left-6 top-1/2 -translate-y-1/2' : '-top-6 left-1/2 -translate-x-1/2'}`}>
                                                                {s.number}
                                                            </span>
                                                        ))}
                                                        <input
                                                            ref={el => inputRefs.current[`${x},${y}`] = el}
                                                            className={`w-full h-full bg-transparent text-center uppercase font-black text-xl md:text-2xl outline-none m-0 p-0 z-20 cell-input caret-transparent ${!isWordActive || isProtected ? 'pointer-events-none' : 'cursor-pointer'}`}
                                                            maxLength={2}
                                                            value={userVal}
                                                            autoCapitalize="characters"
                                                            autoComplete="off"
                                                            autoCorrect="off"
                                                            spellCheck="false"
                                                            readOnly={!isWordActive || viewMode === 'overview' || isProtected}
                                                            tabIndex={isWordActive && !isProtected ? 0 : -1}
                                                            onChange={(e) => handleInput(e, x, y)}
                                                            onKeyDown={(e) => handleKeyDown(e, x, y)}
                                                            onFocus={(e) => { e.target.select(); }}
                                                        />
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<CrosswordApp />);
    </script>
</body>
</html>

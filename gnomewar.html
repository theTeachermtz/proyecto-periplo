<html lang="es">
<head>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍄</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = { darkMode: 'class' };

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",

    <style>
        html, body { 
            font-family: 'Nunito', sans-serif; 
            user-select: none; -webkit-user-select: none; 
            touch-action: manipulation; 
            position: fixed; inset: 0; overflow: hidden; 
            background-color: #1a0e2e; margin: 0; padding: 0; 
        }
        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .font-display { font-family: 'Lilita One', cursive; }

        /* ANIMATIONS */
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
        @keyframes marchRight { 0% { transform: translateX(-8px); } 100% { transform: translateX(0); } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 8px rgba(250,204,21,0.4); } 50% { box-shadow: 0 0 20px rgba(250,204,21,0.8); } }
        @keyframes hit-flash { 0% { filter: brightness(3); } 100% { filter: brightness(1); } }
        @keyframes slide-up { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes enemy-walk { 0% { transform: translateY(0) scaleX(-1); } 25% { transform: translateY(-2px) scaleX(-1); } 50% { transform: translateY(0) scaleX(-1); } 75% { transform: translateY(-1px) scaleX(-1); } }
        @keyframes projectile { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.3) translateX(40px); } }
        @keyframes sun-bounce { 0% { transform: scale(0) rotate(0deg); } 50% { transform: scale(1.3) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); } }

        .animate-popIn { animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-float { animation: float 2s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 1.5s ease-in-out infinite; }
        .animate-hit { animation: hit-flash 0.2s ease-out; }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
        .animate-enemy-walk { animation: enemy-walk 0.6s ease-in-out infinite; }
        .animate-sun-bounce { animation: sun-bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* Grid pattern for garden */
        .garden-grid {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Safari iOS hover trap fix */
        @media (hover: hover) {
            .hover-scale:hover { transform: scale(1.08); }
            .hover-bright:hover { filter: brightness(1.2); }
        }

        .btn-juicy {
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation;
        }
        .btn-juicy:active {
            transform: scale(0.95) !important;
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="bg-[#1a0e2e] text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Shield, Zap, Heart, Star, Swords, Play, RotateCcw, Home, Volume2, VolumeX, ChevronRight, Trophy, X, HelpCircle, Loader2, Crosshair, Snowflake, Bomb } from 'lucide-react';

        // ─── FIREBASE ───
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ─── GAME CONSTANTS ───
        const COLS = 9;
        const ROWS = 5;
        const TICK_MS = 600;
        const QUIZ_INTERVAL_MS = 8000;
        const QUIZ_TIMER_S = 10;

        // ─── GNOME UNIT CATALOG ───
        const TEAM_THEMES = {
            blue: { 
                name: 'Gnomos Azules', emoji: '🧙‍♂️', 
                bg: 'from-blue-900 via-indigo-900 to-slate-900',
                accent: 'bg-blue-500', accentText: 'text-blue-400',
                btnGrad: 'from-blue-500 to-indigo-600',
                laneGrad: 'from-emerald-900/80 via-green-900/60 to-emerald-900/80',
                gardenBg: 'from-green-950 to-emerald-950'
            },
            red: { 
                name: 'Gnomos Rojos', emoji: '🧙', 
                bg: 'from-red-950 via-rose-950 to-slate-900',
                accent: 'bg-red-500', accentText: 'text-red-400',
                btnGrad: 'from-red-500 to-rose-600',
                laneGrad: 'from-emerald-900/80 via-green-900/60 to-emerald-900/80',
                gardenBg: 'from-green-950 to-emerald-950'
            }
        };

        const GNOME_TYPES = {
            shooter: { 
                id: 'shooter', name: 'Lanzador', emoji: '🍄', cost: 25,
                hp: 100, damage: 20, range: 4, fireRate: 1, 
                projectile: '💥', desc: 'Dispara cada turno',
                icon: Crosshair
            },
            frost: { 
                id: 'frost', name: 'Hielo', emoji: '❄️', cost: 50,
                hp: 80, damage: 10, range: 3, fireRate: 2,
                projectile: '🧊', desc: 'Ralentiza enemigos', special: 'slow',
                icon: Snowflake
            },
            bomb: { 
                id: 'bomb', name: 'Bomba', emoji: '💣', cost: 75,
                hp: 60, damage: 50, range: 2, fireRate: 3,
                projectile: '💥', desc: 'Daño en área (3 celdas)', special: 'aoe',
                icon: Bomb
            }
        };

        // ─── ENEMY CATALOG ───
        const ENEMY_TYPES = {
            grunt: { id: 'grunt', name: 'Invasor', emoji: '👺', hp: 60, speed: 1, damage: 10, reward: 5 },
            tank: { id: 'tank', name: 'Tanque', emoji: '👹', hp: 150, speed: 2, damage: 15, reward: 10 },
            fast: { id: 'fast', name: 'Veloz', emoji: '😈', hp: 30, speed: 1, damage: 8, reward: 8 }
        };

        // ─── WAVE DEFINITIONS ───
        const buildWaves = (totalWaves) => {
            const waves = [];
            for (let w = 0; w < totalWaves; w++) {
                const enemies = [];
                const count = 4 + Math.floor(w * 1.5);
                for (let i = 0; i < count; i++) {
                    const roll = Math.random();
                    let type = 'grunt';
                    if (w >= 2 && roll > 0.7) type = 'tank';
                    if (w >= 1 && roll > 0.5 && roll <= 0.7) type = 'fast';
                    
                    enemies.push({
                        type,
                        lane: Math.floor(Math.random() * ROWS),
                        delay: i * (3 + Math.floor(Math.random() * 2))
                    });
                }
                waves.push({ enemies, label: `Oleada ${w + 1}` });
            }
            return waves;
        };

        // ─── HELPERS ───
        const shuffleArray = (arr) => {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        };

        const triggerConfetti = () => {
            if (typeof confetti === 'function') {
                confetti({ particleCount: 60, spread: 50, origin: { y: 0.7 }, colors: ['#fbbf24', '#34d399', '#60a5fa'] });
            }
        };

        // ═══════════════════════════════════════════
        // MAIN GAME COMPONENT
        // ═══════════════════════════════════════════
        const GnomeWar = () => {
            // ─── AUTH & DATA ───
            const [user, setUser] = useState(null);
            const [quizData, setQuizData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            // ─── GAME PHASES ───
            const [phase, setPhase] = useState('TEAM_SELECT'); // TEAM_SELECT | PLAYING | VICTORY | DEFEAT
            const [team, setTeam] = useState(null);
            const enemyTeam = team === 'blue' ? 'red' : 'blue';

            // ─── CORE GAME STATE ───
            const [suns, setSuns] = useState(75);
            const [lives, setLives] = useState(5);
            const [grid, setGrid] = useState([]); // [row][col] = null | { gnomeType, hp, maxHp, cooldown, id }
            const [enemies, setEnemies] = useState([]); // [{ id, type, row, col(float), hp, maxHp, speed, slowed, damage }]
            const [projectiles, setProjectiles] = useState([]); // [{ id, row, col, targetCol }]
            const [selectedGnome, setSelectedGnome] = useState(null);
            const [waveIndex, setWaveIndex] = useState(0);
            const [waves, setWaves] = useState([]);
            const [tickCount, setTickCount] = useState(0);
            const [score, setScore] = useState(0);
            const [enemiesKilled, setEnemiesKilled] = useState(0);
            const [questionsRight, setQuestionsRight] = useState(0);
            const [questionsWrong, setQuestionsWrong] = useState(0);
            const [waveCleared, setWaveCleared] = useState(false);
            const [waveAnnounceTick, setWaveAnnounceTick] = useState(-99);
            const [paused, setPaused] = useState(false);

            // ─── QUIZ STATE ───
            const [quizActive, setQuizActive] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [quizTimer, setQuizTimer] = useState(QUIZ_TIMER_S);
            const [quizFeedback, setQuizFeedback] = useState(null); // { correct: bool, text: '' }
            const [questionPool, setQuestionPool] = useState([]);
            const [questionIndex, setQuestionIndex] = useState(0);
            const [lastQuizTick, setLastQuizTick] = useState(0);

            // ─── REFS FOR GAME LOOP ───
            const gameLoopRef = useRef(null);
            const quizTimerRef = useRef(null);
            const enemyIdCounter = useRef(0);
            const gnomeIdCounter = useRef(0);

            // ─── FIREBASE LOAD ───
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const docId = params.get('id');

                const unsub = onAuthStateChanged(auth, async (u) => {
                    if (!u) { signInAnonymously(auth).catch(e => console.error(e)); return; }
                    setUser(u);
                    if (!docId) {
                        // DEV MODE: load mock questions
                        setQuizData(getMockQuizData());
                        setLoading(false);
                        return;
                    }
                    try {
                        const snap = await getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', docId));
                        if (snap.exists()) {
                            setQuizData(snap.data());
                        } else {
                            setError('Documento no encontrado.');
                        }
                    } catch (e) {
                        setError('Error cargando datos: ' + e.message);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            // Mock data for dev/testing
            const getMockQuizData = () => ({
                title: 'Gnome War Demo',
                type: 'GNOMEWAR',
                content: {
                    questions: [
                        { type: 'translate', prompt: '¿Cómo se dice "casa"?', options: ['house', 'car', 'tree', 'book'], correctIndex: 0 },
                        { type: 'translate', prompt: '¿Cómo se dice "perro"?', options: ['cat', 'dog', 'bird', 'fish'], correctIndex: 1 },
                        { type: 'fillBlank', prompt: 'She ___ to school every day.', options: ['go', 'goes', 'going', 'went'], correctIndex: 1 },
                        { type: 'translate', prompt: '¿Cómo se dice "comer"?', options: ['drink', 'sleep', 'eat', 'run'], correctIndex: 2 },
                        { type: 'fillBlank', prompt: 'They ___ playing soccer yesterday.', options: ['was', 'were', 'are', 'is'], correctIndex: 1 },
                        { type: 'translate', prompt: '¿Qué significa "chair"?', options: ['mesa', 'silla', 'cama', 'puerta'], correctIndex: 1 },
                        { type: 'fillBlank', prompt: 'I have ___ eaten breakfast.', options: ['yet', 'already', 'still', 'never'], correctIndex: 1 },
                        { type: 'translate', prompt: '¿Cómo se dice "bonito"?', options: ['ugly', 'tall', 'beautiful', 'small'], correctIndex: 2 },
                        { type: 'fillBlank', prompt: 'He ___ his homework right now.', options: ['do', 'does', 'is doing', 'did'], correctIndex: 2 },
                        { type: 'translate', prompt: '¿Qué significa "between"?', options: ['debajo', 'entre', 'encima', 'dentro'], correctIndex: 1 },
                        { type: 'fillBlank', prompt: 'We ___ to the cinema last night.', options: ['go', 'goes', 'went', 'gone'], correctIndex: 2 },
                        { type: 'translate', prompt: '¿Cómo se dice "rápido"?', options: ['slow', 'fast', 'big', 'old'], correctIndex: 1 },
                    ],
                    waves: 5,
                    difficulty: 'normal'
                }
            });

            // ─── INIT GAME ───
            const startGame = useCallback((selectedTeam) => {
                setTeam(selectedTeam);
                setSuns(75);
                setLives(5);
                setScore(0);
                setEnemiesKilled(0);
                setQuestionsRight(0);
                setQuestionsWrong(0);
                setWaveIndex(0);
                setTickCount(0);
                setWaveCleared(false);
                setWaveAnnounceTick(0);
                setPaused(false);
                setQuizActive(false);
                setQuizFeedback(null);
                setCurrentQuestion(null);
                setLastQuizTick(0);
                setProjectiles([]);

                // Init empty grid
                const newGrid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
                setGrid(newGrid);
                setEnemies([]);
                setSelectedGnome(null);

                // Build waves
                const totalW = quizData?.content?.waves || 5;
                setWaves(buildWaves(totalW));

                // Shuffle question pool
                const qs = quizData?.content?.questions || [];
                setQuestionPool(shuffleArray(qs));
                setQuestionIndex(0);

                enemyIdCounter.current = 0;
                gnomeIdCounter.current = 0;

                setPhase('PLAYING');
            }, [quizData]);

            // ─── PLACE GNOME ───
            const placeGnome = useCallback((row, col) => {
                if (!selectedGnome || phase !== 'PLAYING' || paused || quizActive) return;
                if (col === 0) return; // col 0 is the "base" column
                
                setGrid(prev => {
                    if (prev[row][col] !== null) return prev; // occupied
                    const gnomeDef = GNOME_TYPES[selectedGnome];
                    if (suns < gnomeDef.cost) return prev;

                    const newGrid = prev.map(r => [...r]);
                    newGrid[row][col] = {
                        id: gnomeIdCounter.current++,
                        type: selectedGnome,
                        hp: gnomeDef.hp,
                        maxHp: gnomeDef.hp,
                        cooldown: 0,
                        emoji: gnomeDef.emoji
                    };
                    setSuns(s => s - gnomeDef.cost);
                    return newGrid;
                });
            }, [selectedGnome, phase, paused, quizActive, suns]);

            // ─── QUIZ SYSTEM ───
            const showNextQuestion = useCallback(() => {
                if (questionPool.length === 0) return;
                let idx = questionIndex % questionPool.length;
                setCurrentQuestion(questionPool[idx]);
                setQuestionIndex(prev => prev + 1);
                setQuizTimer(QUIZ_TIMER_S);
                setQuizFeedback(null);
                setQuizActive(true);
            }, [questionPool, questionIndex]);

            const handleAnswer = useCallback((answerIdx) => {
                if (!currentQuestion || quizFeedback) return;
                const correct = answerIdx === currentQuestion.correctIndex;
                
                if (correct) {
                    setSuns(s => s + 25);
                    setScore(s => s + 50);
                    setQuestionsRight(q => q + 1);
                    setQuizFeedback({ correct: true, text: '¡+25 ☀️!' });
                    triggerConfetti();
                } else {
                    setQuestionsWrong(q => q + 1);
                    setQuizFeedback({ correct: false, text: `Respuesta: ${currentQuestion.options[currentQuestion.correctIndex]}` });
                }

                setTimeout(() => {
                    setQuizActive(false);
                    setQuizFeedback(null);
                    setCurrentQuestion(null);
                }, 1500);
            }, [currentQuestion, quizFeedback]);

            // Quiz timer countdown
            useEffect(() => {
                if (!quizActive || quizFeedback) {
                    if (quizTimerRef.current) clearInterval(quizTimerRef.current);
                    return;
                }
                quizTimerRef.current = setInterval(() => {
                    setQuizTimer(prev => {
                        if (prev <= 1) {
                            // Time's up
                            setQuestionsWrong(q => q + 1);
                            setQuizFeedback({ correct: false, text: '⏰ ¡Tiempo!' });
                            setTimeout(() => {
                                setQuizActive(false);
                                setQuizFeedback(null);
                                setCurrentQuestion(null);
                            }, 1500);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(quizTimerRef.current);
            }, [quizActive, quizFeedback]);

            // ─── MAIN GAME LOOP ───
            useEffect(() => {
                if (phase !== 'PLAYING' || paused) {
                    if (gameLoopRef.current) clearInterval(gameLoopRef.current);
                    return;
                }

                gameLoopRef.current = setInterval(() => {
                    setTickCount(prev => {
                        const tick = prev + 1;

                        // ── SPAWN ENEMIES ──
                        setEnemies(prevEnemies => {
                            let newEnemies = [...prevEnemies];

                            setWaves(prevWaves => {
                                setWaveIndex(wi => {
                                    if (wi >= prevWaves.length) return wi;
                                    const wave = prevWaves[wi];
                                    if (!wave) return wi;
                                    
                                    const adjustedTick = tick - (prevWaves.slice(0, wi).reduce((acc, w) => acc + w.enemies.length * 4 + 15, 0));

                                    wave.enemies.forEach(eDef => {
                                        if (eDef.delay === adjustedTick && !eDef.spawned) {
                                            const etype = ENEMY_TYPES[eDef.type];
                                            newEnemies.push({
                                                id: enemyIdCounter.current++,
                                                type: eDef.type,
                                                row: eDef.lane,
                                                col: COLS - 0.1,
                                                hp: etype.hp,
                                                maxHp: etype.hp,
                                                speed: etype.speed,
                                                damage: etype.damage,
                                                reward: etype.reward,
                                                slowed: 0,
                                                emoji: etype.emoji
                                            });
                                            eDef.spawned = true;
                                        }
                                    });
                                    return wi;
                                });
                                return prevWaves;
                            });

                            return newEnemies;
                        });

                        // ── MOVE ENEMIES ──
                        setEnemies(prevEnemies => {
                            return prevEnemies.map(e => {
                                const moveSpeed = e.slowed > 0 ? 0.3 : (e.speed === 2 ? 0.4 : e.speed === 1 ? 0.6 : 0.5);
                                const newSlowed = Math.max(0, e.slowed - 1);
                                return { ...e, col: e.col - moveSpeed, slowed: newSlowed };
                            });
                        });

                        // ── GNOME COMBAT ──
                        setGrid(prevGrid => {
                            const newGrid = prevGrid.map(r => [...r]);
                            
                            setEnemies(prevEnemies => {
                                let updatedEnemies = [...prevEnemies];
                                let killedReward = 0;
                                let killedCount = 0;
                                let newProjectiles = [];

                                // Process each gnome
                                for (let row = 0; row < ROWS; row++) {
                                    for (let col = 0; col < COLS; col++) {
                                        const gnome = newGrid[row][col];
                                        if (!gnome) continue;

                                        const gDef = GNOME_TYPES[gnome.type];
                                        
                                        // Cooldown tick
                                        if (gnome.cooldown > 0) {
                                            newGrid[row][col] = { ...gnome, cooldown: gnome.cooldown - 1 };
                                            continue;
                                        }

                                        // Find target in range (same row)
                                        const targets = updatedEnemies.filter(e => 
                                            e.row === row && 
                                            e.col > col && 
                                            e.col <= col + gDef.range &&
                                            e.hp > 0
                                        ).sort((a, b) => a.col - b.col);

                                        if (targets.length > 0) {
                                            // Fire!
                                            newGrid[row][col] = { ...gnome, cooldown: gDef.fireRate };
                                            
                                            newProjectiles.push({
                                                id: `p-${tick}-${row}-${col}`,
                                                row, col, 
                                                targetCol: Math.floor(targets[0].col),
                                                emoji: gDef.projectile
                                            });

                                            if (gDef.special === 'aoe') {
                                                // Damage all enemies in range on same row
                                                updatedEnemies = updatedEnemies.map(e => {
                                                    if (e.row === row && e.col > col && e.col <= col + gDef.range && e.hp > 0) {
                                                        return { ...e, hp: e.hp - gDef.damage };
                                                    }
                                                    return e;
                                                });
                                            } else {
                                                // Single target
                                                const targetId = targets[0].id;
                                                updatedEnemies = updatedEnemies.map(e => {
                                                    if (e.id === targetId) {
                                                        let newE = { ...e, hp: e.hp - gDef.damage };
                                                        if (gDef.special === 'slow') newE.slowed = 3;
                                                        return newE;
                                                    }
                                                    return e;
                                                });
                                            }
                                        }
                                    }
                                }

                                // Remove dead enemies, count kills
                                const alive = [];
                                updatedEnemies.forEach(e => {
                                    if (e.hp <= 0) {
                                        killedReward += e.reward;
                                        killedCount++;
                                    } else {
                                        alive.push(e);
                                    }
                                });

                                if (killedCount > 0) {
                                    setScore(s => s + killedCount * 100);
                                    setEnemiesKilled(k => k + killedCount);
                                    setSuns(s => s + killedReward);
                                }

                                // Enemies reach base (col <= 0)
                                const survived = [];
                                let livesLost = 0;
                                alive.forEach(e => {
                                    if (e.col <= 0.5) {
                                        livesLost++;
                                    } else {
                                        survived.push(e);
                                    }
                                });

                                if (livesLost > 0) {
                                    setLives(l => {
                                        const newL = l - livesLost;
                                        if (newL <= 0) setPhase('DEFEAT');
                                        return Math.max(0, newL);
                                    });
                                }

                                // Enemy attacks gnome when overlapping
                                survived.forEach(e => {
                                    const eCol = Math.floor(e.col);
                                    if (eCol >= 0 && eCol < COLS && newGrid[e.row][eCol]) {
                                        const gnome = newGrid[e.row][eCol];
                                        const newHp = gnome.hp - e.damage;
                                        if (newHp <= 0) {
                                            newGrid[e.row][eCol] = null;
                                        } else {
                                            newGrid[e.row][eCol] = { ...gnome, hp: newHp };
                                        }
                                    }
                                });

                                setProjectiles(prev => [...prev.slice(-20), ...newProjectiles]);
                                
                                return survived;
                            });

                            return newGrid;
                        });

                        // ── CHECK WAVE CLEAR ──
                        setWaves(prevWaves => {
                            setWaveIndex(wi => {
                                if (wi >= prevWaves.length) return wi;
                                const wave = prevWaves[wi];
                                const allSpawned = wave.enemies.every(e => e.spawned);
                                
                                if (allSpawned) {
                                    setEnemies(prevEn => {
                                        if (prevEn.length === 0) {
                                            // Wave cleared!
                                            const nextWi = wi + 1;
                                            if (nextWi >= prevWaves.length) {
                                                // ALL WAVES DONE — VICTORY
                                                setPhase('VICTORY');
                                            } else {
                                                setWaveAnnounceTick(tick);
                                                // Small delay before next wave
                                                setTimeout(() => setWaveIndex(nextWi), 3000);
                                            }
                                        }
                                        return prevEn;
                                    });
                                }
                                return wi;
                            });
                            return prevWaves;
                        });

                        // ── TRIGGER QUIZ ──
                        const quizTickInterval = Math.floor(QUIZ_INTERVAL_MS / TICK_MS);
                        setLastQuizTick(lqt => {
                            if (tick - lqt >= quizTickInterval) {
                                setQuizActive(qa => {
                                    if (!qa) showNextQuestion();
                                    return qa;
                                });
                                return tick;
                            }
                            return lqt;
                        });

                        // Clear old projectiles
                        setProjectiles(prev => prev.filter((_, i) => i >= prev.length - 15));

                        return tick;
                    });
                }, TICK_MS);

                return () => clearInterval(gameLoopRef.current);
            }, [phase, paused, showNextQuestion]);

            // ─── LOADING SCREEN ───
            if (loading) {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center gap-4 bg-gradient-to-b from-[#1a0e2e] to-[#0d0618]">
                        <Loader2 className="animate-spin text-yellow-400" size={48} />
                        <p className="font-display text-2xl text-yellow-400">Cargando Gnome War...</p>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center gap-4 bg-gradient-to-b from-[#1a0e2e] to-[#0d0618] p-8">
                        <div className="text-6xl">😵</div>
                        <p className="font-display text-2xl text-red-400 text-center">{error}</p>
                    </div>
                );
            }

            // ═════════════════════════════
            // TEAM SELECT SCREEN
            // ═════════════════════════════
            if (phase === 'TEAM_SELECT') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-gradient-to-b from-[#1a0e2e] via-[#15082a] to-[#0d0618] p-6 gap-6 overflow-auto">
                        {/* Title */}
                        <div className="text-center animate-popIn">
                            <div className="text-6xl md:text-8xl mb-2">🍄⚔️🍄</div>
                            <h1 className="font-display text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-400 to-orange-500 drop-shadow-lg">
                                GNOME WAR
                            </h1>
                            <p className="text-lg text-amber-200/60 mt-2 font-bold">¡Defiende tu jardín!</p>
                            {quizData?.title && <p className="text-sm text-white/40 mt-1">{quizData.title}</p>}
                        </div>

                        {/* Team Selection */}
                        <p className="font-display text-2xl text-white/80 animate-slide-up" style={{animationDelay:'0.2s'}}>Elige tu equipo</p>
                        
                        <div className="flex gap-6 md:gap-10 animate-slide-up" style={{animationDelay:'0.3s'}}>
                            {/* Blue Team */}
                            <button onClick={() => startGame('blue')} className="btn-juicy group flex flex-col items-center gap-3 p-6 md:p-8 rounded-3xl bg-gradient-to-b from-blue-600/30 to-indigo-900/30 border-2 border-blue-500/40 hover-scale transition-all duration-200">
                                <div className="text-6xl md:text-7xl">🧙‍♂️</div>
                                <span className="font-display text-2xl md:text-3xl text-blue-300">Azules</span>
                                <span className="text-xs text-blue-400/60">vs Rojos 👺</span>
                            </button>

                            {/* Red Team */}
                            <button onClick={() => startGame('red')} className="btn-juicy group flex flex-col items-center gap-3 p-6 md:p-8 rounded-3xl bg-gradient-to-b from-red-600/30 to-rose-900/30 border-2 border-red-500/40 hover-scale transition-all duration-200">
                                <div className="text-6xl md:text-7xl">🧙</div>
                                <span className="font-display text-2xl md:text-3xl text-red-300">Rojos</span>
                                <span className="text-xs text-red-400/60">vs Azules 👺</span>
                            </button>
                        </div>

                        {/* Instructions */}
                        <div className="max-w-md text-center text-white/40 text-sm mt-4 animate-slide-up" style={{animationDelay:'0.5s'}}>
                            <p>🍄 Coloca gnomos defensores en tu jardín</p>
                            <p>📝 Responde preguntas para ganar ☀️ soles</p>
                            <p>☀️ Usa soles para comprar más defensores</p>
                            <p>👺 ¡No dejes que los invasores crucen!</p>
                        </div>
                    </div>
                );
            }

            // ═════════════════════════════
            // VICTORY SCREEN
            // ═════════════════════════════
            if (phase === 'VICTORY') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-gradient-to-b from-[#1a0e2e] via-[#15082a] to-[#0d0618] p-6 gap-5">
                        <div className="animate-popIn text-center">
                            <div className="text-7xl mb-3">🏆</div>
                            <h1 className="font-display text-5xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-amber-500">¡VICTORIA!</h1>
                            <p className="text-amber-200/60 mt-2 font-bold text-lg">Tu jardín está a salvo</p>
                        </div>
                        <div className="bg-white/5 rounded-2xl p-6 w-full max-w-sm text-center space-y-3 animate-slide-up border border-white/10" style={{animationDelay:'0.2s'}}>
                            <div className="flex justify-between"><span className="text-white/50">Puntuación</span><span className="font-bold text-yellow-400 font-display text-xl">{score}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Enemigos eliminados</span><span className="font-bold text-red-400">{enemiesKilled}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Preguntas correctas</span><span className="font-bold text-green-400">{questionsRight}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Preguntas falladas</span><span className="font-bold text-red-400">{questionsWrong}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Vidas restantes</span><span className="font-bold text-pink-400">{'❤️'.repeat(lives)}</span></div>
                        </div>
                        <div className="flex gap-4 animate-slide-up" style={{animationDelay:'0.4s'}}>
                            <button onClick={() => setPhase('TEAM_SELECT')} className="btn-juicy px-6 py-3 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 font-display text-xl text-white border-b-4 border-orange-800 flex items-center gap-2">
                                <RotateCcw size={20}/> Otra vez
                            </button>
                        </div>
                    </div>
                );
            }

            // ═════════════════════════════
            // DEFEAT SCREEN
            // ═════════════════════════════
            if (phase === 'DEFEAT') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-gradient-to-b from-red-950 via-[#1a0e2e] to-[#0d0618] p-6 gap-5">
                        <div className="animate-shake text-center">
                            <div className="text-7xl mb-3">💀</div>
                            <h1 className="font-display text-5xl md:text-6xl text-red-400">DERROTA</h1>
                            <p className="text-red-300/60 mt-2 font-bold text-lg">Los invasores arrasaron tu jardín</p>
                        </div>
                        <div className="bg-white/5 rounded-2xl p-6 w-full max-w-sm text-center space-y-3 animate-slide-up border border-red-500/20">
                            <div className="flex justify-between"><span className="text-white/50">Puntuación</span><span className="font-bold text-yellow-400 font-display text-xl">{score}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Oleada alcanzada</span><span className="font-bold text-amber-400">{waveIndex + 1} / {waves.length}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Preguntas correctas</span><span className="font-bold text-green-400">{questionsRight}</span></div>
                            <div className="flex justify-between"><span className="text-white/50">Preguntas falladas</span><span className="font-bold text-red-400">{questionsWrong}</span></div>
                        </div>
                        <div className="flex gap-4 animate-slide-up" style={{animationDelay:'0.3s'}}>
                            <button onClick={() => setPhase('TEAM_SELECT')} className="btn-juicy px-6 py-3 rounded-xl bg-gradient-to-r from-red-500 to-rose-600 font-display text-xl text-white border-b-4 border-rose-800 flex items-center gap-2">
                                <RotateCcw size={20}/> Reintentar
                            </button>
                        </div>
                    </div>
                );
            }

            // ═════════════════════════════
            // PLAYING PHASE - MAIN GAME
            // ═════════════════════════════
            const theme = TEAM_THEMES[team] || TEAM_THEMES.blue;
            const enemyEmoji = team === 'blue' ? '👺' : '👹';

            return (
                <div className={`w-full h-full flex flex-col bg-gradient-to-b ${theme.bg} relative overflow-hidden`}>
                    
                    {/* ─── TOP BAR ─── */}
                    <div className="flex items-center justify-between px-3 py-2 bg-black/40 border-b border-white/10 z-30 shrink-0">
                        {/* Suns */}
                        <div className="flex items-center gap-2">
                            <div className="flex items-center gap-1.5 bg-amber-500/20 border border-amber-500/40 rounded-full px-3 py-1">
                                <span className="text-lg">☀️</span>
                                <span className="font-display text-xl text-amber-300">{suns}</span>
                            </div>
                        </div>

                        {/* Wave indicator */}
                        <div className="text-center">
                            <span className="text-xs text-white/40 uppercase tracking-wider">Oleada</span>
                            <div className="font-display text-lg text-white">{waveIndex + 1} / {waves.length}</div>
                        </div>

                        {/* Lives */}
                        <div className="flex items-center gap-1.5">
                            {Array.from({ length: 5 }, (_, i) => (
                                <span key={i} className={`text-lg transition-all ${i < lives ? 'scale-100 opacity-100' : 'scale-75 opacity-30 grayscale'}`}>
                                    {i < lives ? '❤️' : '🖤'}
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* ─── UNIT SHOP BAR ─── */}
                    <div className="flex items-center gap-2 px-3 py-2 bg-black/30 border-b border-white/10 z-20 shrink-0 overflow-x-auto custom-scroll">
                        {Object.values(GNOME_TYPES).map(g => {
                            const affordable = suns >= g.cost;
                            const isSelected = selectedGnome === g.id;
                            return (
                                <button 
                                    key={g.id}
                                    onClick={() => setSelectedGnome(isSelected ? null : g.id)}
                                    className={`btn-juicy flex items-center gap-2 px-3 py-2 rounded-xl border-2 transition-all shrink-0 ${
                                        isSelected 
                                            ? 'border-yellow-400 bg-yellow-500/20 animate-pulse-glow scale-105' 
                                            : affordable 
                                                ? 'border-white/20 bg-white/5 hover-bright' 
                                                : 'border-white/5 bg-white/5 opacity-40 cursor-not-allowed'
                                    }`}
                                    disabled={!affordable}
                                >
                                    <span className="text-2xl">{g.emoji}</span>
                                    <div className="text-left">
                                        <div className="text-xs font-bold text-white leading-tight">{g.name}</div>
                                        <div className="flex items-center gap-1 text-xs text-amber-400 font-bold">
                                            <span>☀️</span>{g.cost}
                                        </div>
                                    </div>
                                </button>
                            );
                        })}

                        <div className="ml-auto flex items-center gap-2 shrink-0">
                            <button onClick={() => setPaused(!paused)} className="btn-juicy p-2 rounded-lg bg-white/10 border border-white/20 text-white/60">
                                {paused ? <Play size={18}/> : <span className="font-bold text-xs px-1">⏸</span>}
                            </button>
                        </div>
                    </div>

                    {/* ─── GAME GRID ─── */}
                    <div className={`flex-1 relative bg-gradient-to-r ${theme.gardenBg} garden-grid overflow-hidden`}>
                        
                        {/* Lane rows */}
                        <div className="absolute inset-0 flex flex-col">
                            {Array.from({ length: ROWS }, (_, row) => (
                                <div key={row} className="flex-1 flex border-b border-white/5 relative">
                                    {/* Base column (col 0) — the wall */}
                                    <div className="w-[11.11%] h-full bg-amber-900/30 border-r-4 border-amber-600/50 flex items-center justify-center relative">
                                        <span className="text-xl md:text-2xl opacity-60">🏠</span>
                                    </div>

                                    {/* Playable columns 1-8 */}
                                    {Array.from({ length: COLS - 1 }, (_, c) => {
                                        const col = c + 1;
                                        const gnome = grid[row]?.[col];
                                        const isEven = (row + col) % 2 === 0;
                                        
                                        return (
                                            <div 
                                                key={col}
                                                onClick={() => placeGnome(row, col)}
                                                className={`w-[11.11%] h-full border-r border-white/5 flex items-center justify-center relative cursor-pointer transition-colors ${
                                                    isEven ? 'bg-green-800/10' : 'bg-green-900/10'
                                                } ${selectedGnome && !gnome ? 'hover:bg-yellow-500/10' : ''}`}
                                            >
                                                {gnome && (
                                                    <div className="relative animate-popIn flex flex-col items-center" title={`${GNOME_TYPES[gnome.type].name} HP:${gnome.hp}`}>
                                                        <span className="text-xl md:text-3xl animate-float drop-shadow-lg">{gnome.emoji}</span>
                                                        {/* HP bar */}
                                                        {gnome.hp < gnome.maxHp && (
                                                            <div className="absolute -bottom-1 w-8 h-1 bg-red-900 rounded-full overflow-hidden">
                                                                <div className="h-full bg-green-400 rounded-full transition-all" style={{ width: `${(gnome.hp / gnome.maxHp) * 100}%` }}/>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>

                        {/* Enemies overlay */}
                        {enemies.map(e => {
                            const topPercent = (e.row / ROWS) * 100 + (100 / ROWS / 2);
                            const leftPercent = (e.col / COLS) * 100;
                            
                            return (
                                <div
                                    key={e.id}
                                    className="absolute transition-all duration-500 ease-linear flex flex-col items-center pointer-events-none z-10"
                                    style={{ 
                                        top: `${topPercent}%`, 
                                        left: `${leftPercent}%`,
                                        transform: 'translate(-50%, -50%)'
                                    }}
                                >
                                    <span className={`text-xl md:text-3xl ${e.slowed > 0 ? 'text-cyan-300' : ''}`} style={{ transform: 'scaleX(-1)', animation: 'enemy-walk 0.6s ease-in-out infinite' }}>
                                        {e.emoji}
                                    </span>
                                    {/* HP bar */}
                                    <div className="w-7 h-1 bg-red-900/60 rounded-full overflow-hidden mt-0.5">
                                        <div className={`h-full rounded-full transition-all ${e.hp / e.maxHp > 0.5 ? 'bg-green-400' : e.hp / e.maxHp > 0.25 ? 'bg-yellow-400' : 'bg-red-500'}`} 
                                             style={{ width: `${(e.hp / e.maxHp) * 100}%` }}/>
                                    </div>
                                    {e.slowed > 0 && <span className="text-[8px] text-cyan-300">❄️</span>}
                                </div>
                            );
                        })}

                        {/* Projectiles overlay */}
                        {projectiles.slice(-10).map(p => {
                            const topPercent = (p.row / ROWS) * 100 + (100 / ROWS / 2);
                            const leftPercent = (p.targetCol / COLS) * 100;
                            return (
                                <div key={p.id} className="absolute z-20 pointer-events-none" style={{ top: `${topPercent}%`, left: `${leftPercent}%`, transform: 'translate(-50%, -50%)', animation: 'projectile 0.4s ease-out forwards' }}>
                                    <span className="text-sm">{p.emoji}</span>
                                </div>
                            );
                        })}

                        {/* Wave Announcement overlay */}
                        {tickCount - waveAnnounceTick < 5 && waveAnnounceTick > 0 && (
                            <div className="absolute inset-0 z-30 flex items-center justify-center pointer-events-none">
                                <div className="bg-black/70 backdrop-blur-sm px-8 py-4 rounded-2xl animate-popIn border-2 border-amber-500/50">
                                    <p className="font-display text-3xl md:text-4xl text-amber-400 text-center">
                                        ⚔️ Oleada {waveIndex + 1} ⚔️
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* Paused overlay */}
                        {paused && (
                            <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                                <div className="text-center animate-popIn">
                                    <p className="font-display text-4xl text-white mb-4">⏸ PAUSA</p>
                                    <button onClick={() => setPaused(false)} className="btn-juicy px-6 py-3 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 font-display text-xl text-white border-b-4 border-emerald-800 flex items-center gap-2 mx-auto">
                                        <Play size={20}/> Continuar
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ─── QUIZ OVERLAY (bottom modal) ─── */}
                    {quizActive && currentQuestion && (
                        <div className="absolute bottom-0 left-0 right-0 z-50 bg-gradient-to-t from-black via-black/95 to-black/80 backdrop-blur-md border-t-2 border-amber-500/50 p-4 animate-slide-up" style={{ maxHeight: '55%' }}>
                            {/* Timer bar */}
                            <div className="w-full h-2 bg-white/10 rounded-full mb-3 overflow-hidden">
                                <div 
                                    className={`h-full rounded-full transition-all duration-1000 ease-linear ${quizTimer > 5 ? 'bg-green-400' : quizTimer > 2 ? 'bg-yellow-400' : 'bg-red-500'}`}
                                    style={{ width: `${(quizTimer / QUIZ_TIMER_S) * 100}%` }}
                                />
                            </div>

                            {/* Question */}
                            <div className="text-center mb-3">
                                <span className="text-xs text-amber-400/60 uppercase tracking-wider font-bold">
                                    {currentQuestion.type === 'translate' ? '🌎 Traducción' : '📝 Completa'}
                                </span>
                                <p className="font-display text-xl md:text-2xl text-white mt-1 leading-tight">
                                    {currentQuestion.prompt}
                                </p>
                            </div>

                            {/* Options */}
                            {!quizFeedback ? (
                                <div className="grid grid-cols-2 gap-2 max-w-lg mx-auto">
                                    {currentQuestion.options.map((opt, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleAnswer(idx)}
                                            className="btn-juicy py-3 px-4 rounded-xl bg-white/10 border-2 border-white/20 text-white font-bold text-base md:text-lg transition-all hover-bright active:border-amber-400"
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className={`text-center py-4 rounded-xl animate-popIn ${quizFeedback.correct ? 'bg-green-500/20 border-2 border-green-500/50' : 'bg-red-500/20 border-2 border-red-500/50'}`}>
                                    <span className="text-3xl">{quizFeedback.correct ? '✅' : '❌'}</span>
                                    <p className={`font-display text-xl mt-1 ${quizFeedback.correct ? 'text-green-300' : 'text-red-300'}`}>
                                        {quizFeedback.text}
                                    </p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Selected gnome indicator */}
                    {selectedGnome && !quizActive && (
                        <div className="absolute bottom-3 left-1/2 -translate-x-1/2 z-20 bg-black/70 backdrop-blur-sm px-4 py-2 rounded-full border border-yellow-500/50 flex items-center gap-2 text-sm animate-popIn pointer-events-none">
                            <span className="text-lg">{GNOME_TYPES[selectedGnome].emoji}</span>
                            <span className="text-yellow-300 font-bold">Toca una celda para colocar</span>
                        </div>
                    )}

                    {/* Score floating */}
                    <div className="absolute top-14 right-3 z-20 bg-black/40 rounded-lg px-3 py-1 border border-white/10">
                        <span className="text-xs text-white/40">Score</span>
                        <div className="font-display text-lg text-amber-400">{score}</div>
                    </div>
                </div>
            );
        };

        // ─── MOUNT ───
        const root = createRoot(document.getElementById('root'));
        root.render(<GnomeWar />);
    </script>
</body>
</html>

// ── helpers ───────────────────────────────────────────────────────────────────
// Normaliza para calificar entrada libre: ignora mayúsculas, acentos, apóstrofes,
// comillas, puntos, comas, signos ¿¡, y espacios (inicio, fin, dobles).
const norm = s => (s || '')
  .toLowerCase()
  .normalize('NFD').replace(/[̀-ͯ]/g, '')   // quita acentos (á→a, ñ→n)
  .replace(/[?.!,;:'"¿¡]/g, '')
  .replace(/\s+/g, ' ')
  .trim();
const shuffleArr = arr => [...arr].sort(() => Math.random() - 0.5);
const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// Distancia de edición (Levenshtein) — para detectar "casi acertó por ortografía".
function editDistance(a, b) {
  a = a || ''; b = b || '';
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
  return dp[m][n];
}
// Tipos de respuesta de texto libre donde aplica el chequeo de ortografía.
const TEXT_TYPES = new Set(['fillBlank', 'errorCorrection', 'translate', 'spotError']);
// Si la respuesta fue INCORRECTA pero MUY cerca de la correcta (1–2 letras),
// fue un typo de ortografía, no que desconociera la palabra. Devuelve {got, expected} o null.
// NO cambia la calificación — sigue siendo error; solo se reporta el dato.
function spellingMiss(q, a) {
  if (!q || a === null || a === undefined || !TEXT_TYPES.has(q.type)) return null;
  const got = norm(String(a));
  if (!got) return null;
  const targets = (q.type === 'spotError' ? [q.errorWord] : [q.answer, ...(q.accept || []), ...(q.acceptedAnswers || [])]).filter(Boolean);
  let best = null, bestD = Infinity;
  targets.forEach(t => { const d = editDistance(got, norm(String(t))); if (d < bestD) { bestD = d; best = t; } });
  if (best === null) return null;
  const len = Math.max(norm(String(best)).length, got.length);
  if (bestD > 0 && bestD <= 2 && len > 0 && bestD / len <= 0.5) return { got: String(a).trim(), expected: String(best) };
  return null;
}

// Elige una pregunta NO usada del contenedor pedido, lo más cercana posible a la dificultad `diff`.
function pickInContainer(ship, container, diff, used) {
  const pool = ship.questions.filter(q => q.container === container && !used.has(q.id));
  if (!pool.length) return null;
  const exact = pool.filter(q => q.tier === TIERS[diff]);
  if (exact.length) return rnd(exact);
  return shuffleArr(pool).sort((a, b) => Math.abs(TIERS.indexOf(a.tier) - diff) - Math.abs(TIERS.indexOf(b.tier) - diff))[0];
}

// Veredicto de una visita (≤6 preguntas) según aciertos. Banda central 3–4/6 = "su nivel" → peloteo.
//  sweepUp (+2) · up (+1) · upB (+1, candidato peloteo) · downB (−1, candidato peloteo) · down (−1) · sweepDown (−2)
function verdictFor(correct, n) {
  if (!n) return 'cap';
  const r = correct / n;
  if (r >= 0.95) return 'sweepUp';   // 6/6 — barrido limpio, salta +2
  if (r >= 0.78) return 'up';        // 5/6 — sube +1
  if (r >= 0.62) return 'upB';       // 4/6 — sube +1, candidato a peloteo
  if (r >= 0.45) return 'downB';     // 3/6 — baja −1, candidato a peloteo
  if (r >= 0.28) return 'down';      // 2/6 — baja −1
  return 'sweepDown';                // ≤1/6 — trancazo, baja −2
}

function gradeQ(q, a) {
  if (a === null || a === undefined || a === '') return false;
  switch (q.type) {
    case 'multipleChoice': case 'oddOneOut': case 'audioQuestion': case 'dialogueFill': case 'wordForm':
      return String(a) === String(q.answer);
    case 'trueFalse':
      return a === q.answer;
    case 'fillBlank': case 'errorCorrection': case 'translate':
      return [q.answer, ...(q.accept || []), ...(q.acceptedAnswers || [])].map(norm).includes(norm(String(a)));
    case 'unscramble':
      return [q.answer, ...(q.acceptedAnswers || [])].map(norm).includes(norm((Array.isArray(a) ? a : [a]).join(' ')));
    case 'spotError':
      return norm(String(a)) === norm(q.errorWord);
    case 'multipleResponse': {
      if (!Array.isArray(a) || !a.length) return false;
      const exp = new Set((q.answers || []).map(norm)), got = new Set(a.map(norm));
      return exp.size === got.size && [...exp].every(w => got.has(w));
    }
    case 'matching':
      return (q.pairs || []).every(p => norm(a[p.left]) === norm(p.right));
    case 'categorySort':
      return (q.buckets || []).every(b => {
        const got = new Set((a[b.label] || []).map(norm)), exp = new Set(b.correct.map(norm));
        return exp.size === got.size && [...exp].every(w => got.has(w));
      });
    default: return false;
  }
}

// Texto legible del enunciado y de la respuesta correcta (para "repasa tus errores")
function promptText(q) {
  if (!q) return '(pregunta)';
  if (q.type === 'translate') return '🇲🇽 ' + (q.spanishPrompt || '');
  if (q.type === 'audioQuestion') return '🔊 ' + (q.q || q.audioText || '');
  return q.q || q.spanishPrompt || '(pregunta)';
}
function correctText(q) {
  if (!q) return '';
  switch (q.type) {
    case 'trueFalse': return q.answer ? 'Verdadero' : 'Falso';
    case 'multipleResponse': return (q.answers || []).join(' · ');
    case 'matching': return (q.pairs || []).map(p => `${p.left} → ${p.right}`).join('   ·   ');
    case 'categorySort': return (q.buckets || []).map(b => `${b.label}: ${(b.correct || []).join(', ')}`).join('   |   ');
    case 'spotError': return q.errorWord;
    default: return String(q.answer ?? '');
  }
}
// Texto legible de LO QUE RESPONDIÓ el alumno (para "tu pusiste X · era Y").
function studentAnswerText(q, a) {
  if (a === null || a === undefined || a === '') return '(sin responder)';
  switch (q.type) {
    case 'trueFalse': return a ? 'Verdadero' : 'Falso';
    case 'unscramble': return (Array.isArray(a) ? a : [a]).join(' ');
    case 'multipleResponse': return (Array.isArray(a) ? a : [a]).join(' · ');
    case 'matching': return Object.entries(a || {}).map(([l, r]) => `${l} → ${r}`).join('   ·   ');
    case 'categorySort': return Object.entries(a || {}).map(([label, ws]) => `${label}: ${(ws || []).join(', ')}`).join('   |   ');
    default: return String(a);
  }
}

}
function Confirm({ t, ok, onClick, label = 'Confirmar' }) {
  return <Btn3D face={t.green.f} edge={t.green.e} big style={{ width: '100%', opacity: ok ? 1 : .45, cursor: ok ? 'pointer' : 'not-allowed' }} onClick={() => ok && onClick()}>{label}</Btn3D>;
}
function InputBox({ t, val, setVal, ok, onSubmit, placeholder }) {
  return <input className="g-input" value={val} onChange={e => setVal(e.target.value)}
    onKeyDown={e => e.key === 'Enter' && ok && onSubmit(val.trim())}
    placeholder={placeholder} autoFocus autoCapitalize="off" autoCorrect="off" spellCheck={false}
    style={{ '--in-bg': t.cardSub, '--in-bd': t.line, '--in-ink': t.ink, '--in-ph': t.faint, '--in-focus': t.purple.f }} />;
}
function Pill({ t, onClick, children, face, muted }) {
  return <button onClick={onClick} className="g-tile" style={{
    padding: '8px 13px', borderRadius: 12, border: 'none', cursor: 'pointer', fontFamily: NUN, fontWeight: 800, fontSize: 14,
    background: muted ? t.card : face.f, color: muted ? t.ink : '#fff', boxShadow: `0 3px 0 ${muted ? t.cardEdge : face.e}`,
  }}>{children}</button>;
}

// ── COMPONENTES DE PREGUNTA (patrón onSubmit) ───────────────────────────────────

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
      <Prompt t={t}>{q.q}</Prompt>
      {(q.options || []).map(opt => <Tile key={opt} t={t} onClick={() => onSubmit(opt)}>{opt}</Tile>)}

}

function QTrueFalse({ q, onSubmit, t }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Prompt t={t}>{q.q}</Prompt>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <Btn3D face={t.green.f} edge={t.green.e} big style={{ width: '100%', padding: '18px 8px', fontSize: 16 }} onClick={() => onSubmit(true)}>Verdadero ✓</Btn3D>
        <Btn3D face={t.flame.f} edge={t.flame.e} big style={{ width: '100%', padding: '18px 8px', fontSize: 16 }} onClick={() => onSubmit(false)}>Falso ✗</Btn3D>

function QAudio({ q, onSubmit, t }) {
  const [played, setPlayed] = useState(false);

function QTranslate({ q, onSubmit, t }) {

function QUnscramble({ q, onSubmit, t }) {
  const [pool] = useState(() => shuffleArr(q.words || []));
  const [placed, setPlaced] = useState([]);
  const [usedIdx, setUsedIdx] = useState(new Set());
  const add = idx => { setPlaced(p => [...p, idx]); setUsedIdx(s => new Set([...s, idx])); };
  const remove = pos => {
    const idx = placed[pos];
    setPlaced(p => p.filter((_, i) => i !== pos));
    setUsedIdx(s => { const n = new Set(s); n.delete(idx); return n; });
  };
  const isQ = (q.answer || '').trim().endsWith('?') || /pregunta/i.test(q.targetLabel || '');
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {q.spanishPrompt && (
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, background: `${t.purple.f}1A`, border: `1px solid ${t.purple.f}40`, borderRadius: 14, padding: '11px 13px' }}>
          <span style={{ fontSize: 17, flexShrink: 0 }}>🇲🇽</span>
          <p style={{ fontFamily: NUN, fontWeight: 800, fontSize: 14, color: t.ink }}>{q.spanishPrompt}</p>
        </div>
      )}
      <p style={{ ...LBL, fontSize: 10, color: t.purple.f }}>{q.targetLabel || 'Arma la oración:'}</p>
      <div style={{ minHeight: 64, background: t.cardSub, border: `2px dashed ${t.line}`, borderRadius: 16, padding: 10, display: 'flex', flexWrap: 'wrap', gap: 8, alignItems: 'flex-start' }}>
        {placed.map((idx, pos) => <Pill key={pos} t={t} face={t.purple} onClick={() => remove(pos)}>{pool[idx]}</Pill>)}
        {isQ && placed.length > 0 && <span style={{ fontFamily: FRED, fontWeight: 700, fontSize: 19, color: t.ink2, alignSelf: 'center', padding: '0 4px' }}>?</span>}
        {!placed.length && <span style={{ color: t.faint, fontSize: 13, alignSelf: 'center', fontFamily: NUN, fontWeight: 700, margin: '0 4px' }}>Toca las palabras de abajo...</span>}
      </div>
      <div>
        <p style={{ ...LBL, fontSize: 9.5, color: t.faint, marginBottom: 7 }}>Hay palabras que NO necesitas:</p>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {pool.map((w, i) => usedIdx.has(i) ? null : <Pill key={i} t={t} muted onClick={() => add(i)}>{w}</Pill>)}
        </div>
      </div>
      <div style={{ display: 'flex', gap: 10 }}>
        <button onClick={() => { setPlaced([]); setUsedIdx(new Set()); }} style={{ padding: '12px 16px', borderRadius: 14, border: 'none', cursor: 'pointer', background: t.cardSub, color: t.ink2, fontFamily: FRED, fontWeight: 600, fontSize: 14 }}>Limpiar</button>
        <Btn3D face={t.green.f} edge={t.green.e} big style={{ flex: 1, opacity: placed.length ? 1 : .45 }} onClick={() => placed.length && onSubmit(placed.map(i => pool[i]))}>Confirmar</Btn3D>
      </div>
    </div>
  );
}

function QMatching({ q, onSubmit, t }) {
  const pairs = q.pairs || [];
  const lefts = pairs.map(p => p.left);
  const [rights] = useState(() => shuffleArr([...pairs.map(p => p.right), ...(q.distractors || [])]));
  const [matched, setMatched] = useState({});
  const [selLeft, setSelLeft] = useState(null);
  const usedRights = new Set(Object.values(matched));
  const allDone = Object.keys(matched).length === lefts.length;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
      <Prompt t={t}>{q.q}</Prompt>
      <Note t={t} color={t.blue}>👉 Toca una palabra de la izquierda y luego elige su pareja.</Note>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {lefts.map(l => {
          const done = matched[l], on = selLeft === l;
          return (
            <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button onClick={() => done ? setMatched(m => { const n = { ...m }; delete n[l]; return n; }) : setSelLeft(s => s === l ? null : l)}
                style={{ flex: 1, textAlign: 'left', cursor: 'pointer', borderRadius: 12, padding: '11px 13px', fontFamily: NUN, fontWeight: 800, fontSize: 14, border: `2px solid ${done ? t.green.f : on ? t.purple.f : 'transparent'}`, background: done ? `${t.green.f}22` : on ? `${t.purple.f}22` : t.card, color: done ? t.green.f : t.ink, boxShadow: `0 3px 0 ${t.cardEdge}` }}>{l}</button>
              <span style={{ color: t.faint, fontSize: 14 }}>→</span>
              <span style={{ flex: 1, padding: '11px 13px', fontFamily: NUN, fontWeight: 800, fontSize: 14, color: done ? t.green.f : on ? t.purple.f : t.faint }}>{done || (on ? '👇 elige abajo' : 'toca para elegir')}</span>
            </div>
          );
        })}
      </div>
      {selLeft && (
        <div>
          <p style={{ ...LBL, fontSize: 10, color: t.ink2, marginBottom: 8 }}>Pareja de "{selLeft}":</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {rights.filter(r => !usedRights.has(r)).map(r => <Pill key={r} t={t} face={t.purple} onClick={() => { setMatched(m => ({ ...m, [selLeft]: r })); setSelLeft(null); }}>{r}</Pill>)}
          </div>
        </div>
      )}
      <Confirm t={t} ok={allDone} onClick={() => onSubmit(matched)} />
    </div>
  );
}

function QCategorySort({ q, onSubmit, t }) {
  const [buckets, setBuckets] = useState(() => Object.fromEntries((q.buckets || []).map(b => [b.label, []])));
  const [pool, setPool] = useState(() => shuffleArr(q.pool || []));
  const [sel, setSel] = useState(null);
  const place = label => {
    if (!sel) return;
    setBuckets(b => ({ ...b, [label]: [...(b[label] || []), sel] }));
    setPool(p => p.filter(w => w !== sel)); setSel(null);
  };
  const unplace = (label, word) => {
    setBuckets(b => ({ ...b, [label]: (b[label] || []).filter(w => w !== word) }));
    setPool(p => [...p, word]);
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
      <Prompt t={t}>{q.q}</Prompt>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {pool.map((w, i) => <Pill key={i} t={t} face={t.purple} muted={sel !== w} onClick={() => setSel(s => s === w ? null : w)}>{w}</Pill>)}
        {!pool.length && <span style={{ color: t.faint, fontSize: 13, fontFamily: NUN, fontWeight: 700, fontStyle: 'italic' }}>Todas clasificadas ✓</span>}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
        {(q.buckets || []).map(b => (
          <div key={b.label} onClick={() => sel && place(b.label)}
            style={{ borderRadius: 16, padding: 12, cursor: sel ? 'pointer' : 'default', border: `2px solid ${sel ? t.purple.f : t.line}`, background: sel ? `${t.purple.f}14` : t.cardSub }}>
            <p style={{ ...LBL, fontSize: 10, color: t.ink2, marginBottom: 8 }}>{b.label}{sel ? ' ← aquí' : ''}</p>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, minHeight: 28 }}>
              {(buckets[b.label] || []).map((w, i) => (
                <button key={i} onClick={e => { e.stopPropagation(); unplace(b.label, w); }} style={{ padding: '7px 11px', borderRadius: 11, border: 'none', cursor: 'pointer', fontFamily: NUN, fontWeight: 800, fontSize: 13, background: `${t.green.f}22`, color: t.green.f }}>{w} ✕</button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <Confirm t={t} ok={!pool.length} onClick={() => onSubmit(buckets)} />
    </div>
  );
}

              <div style={{ maxWidth: '80%', padding: '9px 12px', borderRadius: 16, fontFamily: NUN, fontWeight: 700, fontSize: 13.5, color: isB ? t.purple.f : t.ink, background: isB ? `${t.purple.f}1F` : t.card }}>

function QMultipleResponse({ q, onSubmit, t }) {

              <span style={{ width: 22, height: 22, borderRadius: 7, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: on ? t.purple.f : 'transparent', border: on ? 'none' : `2px solid ${t.faint}`, color: '#fff', fontSize: 13, fontWeight: 900 }}>{on ? '✓' : ''}</span>

function renderQ(q, onSubmit, t) {
  switch (q.type) {
    case 'multipleChoice': case 'oddOneOut': case 'wordForm': return <QChoice q={q} onSubmit={onSubmit} t={t} />;
    case 'trueFalse': return <QTrueFalse q={q} onSubmit={onSubmit} t={t} />;
    case 'audioQuestion': return <QAudio q={q} onSubmit={onSubmit} t={t} />;
    case 'fillBlank': return <QFillBlank q={q} onSubmit={onSubmit} t={t} />;
    case 'errorCorrection': return <QErrorCorrection q={q} onSubmit={onSubmit} t={t} />;
    case 'translate': return <QTranslate q={q} onSubmit={onSubmit} t={t} />;
    case 'unscramble': return <QUnscramble q={q} onSubmit={onSubmit} t={t} />;
    case 'matching': return <QMatching q={q} onSubmit={onSubmit} t={t} />;
    case 'categorySort': return <QCategorySort q={q} onSubmit={onSubmit} t={t} />;
    case 'dialogueFill': return <QDialogue q={q} onSubmit={onSubmit} t={t} />;
    case 'multipleResponse': return <QMultipleResponse q={q} onSubmit={onSubmit} t={t} />;
    default: return <div style={{ color: t.faint, fontSize: 14 }}>Tipo no soportado: {q.type}</div>;
  }
}

// ── MOTOR ───────────────────────────────────────────────────────────────────────
function PlacementTest() {
  const [screen, setScreen] = useState('welcome'); // welcome | self_assess | exam | feedback | result
  const [currentQ, setCurrentQ] = useState(null);
  const [qKey, setQKey] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [finalIdx, setFinalIdx] = useState(null);
  const [saving, setSaving] = useState(false);
  const [showDetail, setShowDetail] = useState(false);
  const [bankReady, setBankReady] = useState(false);
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem('periplo-portal-theme') || 'light'; } catch (e) { return 'light'; } });
  useEffect(() => { try { localStorage.setItem('periplo-portal-theme', theme); } catch (e) {} }, [theme]);
  const t = THEMES[theme];

  useEffect(() => { loadBank().finally(() => setBankReady(true)); }, []);

  // estado del motor en refs (no necesita re-render hasta cambiar de pregunta)
  const st = useRef(null);   // { entryIdx, shipIdx, used, asked, correctStreak, wrongStreak, visitDiff, plan, verdicts, totalAsked, log, history }
  const timer = useRef(null);

  function startExam() { setScreen('self_assess'); }

  function handleSelfAssess(i) {
    const e = ENTRY[i];
    st.current = {
      entryIdx: e.ship, shipIdx: e.ship,
      used: new Set(), asked: [], correctStreak: 0, wrongStreak: 0,
      visitDiff: clamp(e.tier, 0, 2),   // la autopercepción solo sesga la dificultad del 1er barco
      plan: ['conoce', 'entiende', 'produce', 'conoce', 'entiende', 'produce'], // ROTA C→E→P (Produce SIEMPRE en la Q3, antes de cualquier corte por racha)
      verdicts: {}, totalAsked: 0, log: [], history: [],
    };
    serveQuestion();
  }

  // Sirve la siguiente pregunta de la visita: respeta el plan balanceado (2 Conoce · 2 Entiende ·
  // 2 Produce) a la dificultad actual; si el contenedor planeado se agotó, cae a otro contenedor.
  function serveQuestion() {
    const s = st.current;
    if (s.totalAsked >= MAX_QUESTIONS) { endVisit('cap'); return; }
    const planned = s.plan[s.asked.length] || null;
    const order = planned ? [planned, ...LANES.filter(l => l !== planned)] : [...LANES];
    let q = null;
    for (const c of order) { q = pickInContainer(SHIPS[s.shipIdx], c, s.visitDiff, s.used); if (q) break; }
    if (!q) { decide(true); return; } // barco sin preguntas frescas → cierra la visita
    s.used.add(q.id);
    setCurrentQ(q); setQKey(k => k + 1); setScreen('exam');
  }

  // Abre una visita nueva a un barco. NO resetea s.used (memoria global → nunca repite pregunta).
  function openShip(idx) {
    const s = st.current;
    s.shipIdx = idx;
    s.asked = []; s.correctStreak = 0; s.wrongStreak = 0;
    s.visitDiff = 1; // arranca en media y se adapta dentro de la visita
    s.plan = ['conoce', 'entiende', 'produce', 'conoce', 'entiende', 'produce']; // rota C→E→P
    serveQuestion();
  }

  // Cierra la visita actual: registra veredicto del barco, aplica PELOTEO conservador, mueve o finaliza.
  function endVisit(verdict, correct, n) {
    const s = st.current;
    correct = (correct === undefined) ? s.asked.filter(r => r.correct).length : correct;
    n = (n === undefined) ? s.asked.length : n;
    const cur = s.shipIdx;

    if (verdict === 'cap') { s.log.push({ from: cur, to: cur, decision: 'cap', correct, n, reason: 'cap' }); finalize(cur); return; }

    const MAP = { sweepUp: [2, 'up'], up: [1, 'up'], upB: [1, 'up'], downB: [-1, 'down'], down: [-1, 'down'], sweepDown: [-2, 'down'] };
    const [delta, dir] = MAP[verdict];
    s.verdicts[cur] = dir;

    // Tope/base de la flota — no hay a dónde seguir → placement aquí.
    if (dir === 'up' && cur >= SHIPS.length - 1) { s.log.push({ from: cur, to: cur, decision: verdict, correct, n, reason: 'top' }); finalize(cur); return; }
    if (dir === 'down' && cur <= 0) { s.log.push({ from: cur, to: 0, decision: verdict, correct, n, reason: 'bottom' }); finalize(0); return; }

    // PELOTEO conservador: dos barcos adyacentes con veredictos opuestos (abajo "sube", arriba "baja")
    // → su nivel está justo ahí. Coloca en el de ABAJO y corta.
    if (dir === 'up' && s.verdicts[cur + 1] === 'down') { s.log.push({ from: cur, to: cur, decision: verdict, correct, n, reason: 'bounce' }); finalize(cur); return; }
    if (dir === 'down' && s.verdicts[cur - 1] === 'up') { s.log.push({ from: cur, to: cur - 1, decision: verdict, correct, n, reason: 'bounce' }); finalize(cur - 1); return; }

    const to = clamp(cur + delta, 0, SHIPS.length - 1);
    s.log.push({ from: cur, to, decision: verdict, correct, n });
    openShip(to);
  }

  // Tras cada respuesta: ¿corte temprano por racha, tope global, o fin de visita a las 6?
  function decide(forced) {
    const s = st.current;
    const n = s.asked.length;
    const correct = s.asked.filter(r => r.correct).length;
    if (!forced) {
      if (s.correctStreak >= 4) return endVisit('sweepUp', correct, n);   // barrido limpio → +2
      if (s.wrongStreak >= 4) return endVisit('sweepDown', correct, n);   // trancazo → −2
    }
    if (s.totalAsked >= MAX_QUESTIONS) return endVisit('cap', correct, n);
    if (n >= 6 || forced) return endVisit(verdictFor(correct, n), correct, n);
    serveQuestion();
  }

  function handleAnswer(answer) {
    const s = st.current;
    const q = currentQ;
    const correct = gradeQ(q, answer);
    s.asked.push({ id: q.id, container: q.container, tier: q.tier, correct });
    s.history.push({ id: q.id, shipN: SHIPS[s.shipIdx].n, container: q.container, tier: q.tier, correct, q, answer });
    s.totalAsked++;
    s.correctStreak = correct ? s.correctStreak + 1 : 0;
    s.wrongStreak = correct ? 0 : s.wrongStreak + 1;
    s.visitDiff = correct ? Math.min(2, s.visitDiff + 1) : Math.max(0, s.visitDiff - 1); // adapta dificultad dentro de la visita
    setFeedback(rnd(ENCOURAGE)); // aliento neutral — no revela si acertó o falló
    setScreen('feedback');
    clearTimeout(timer.current);
    timer.current = setTimeout(() => { setFeedback(null); decide(false); }, 950);
  }

  async function finalize(idx) {
    const s = st.current;
    setFinalIdx(idx);
    setScreen('result');
    setSaving(true);
    try {
      const ship = SHIPS[idx], p = PLACEMENT[idx];
      const cog = { conoce: { ok: 0, n: 0 }, entiende: { ok: 0, n: 0 }, produce: { ok: 0, n: 0 } };
      (s.history || []).forEach(h => { cog[h.container].n++; if (h.correct) cog[h.container].ok++; });
      const spell = [];
      (s.history || []).forEach(h => { if (!h.correct) { const sm = spellingMiss(h.q, h.answer); if (sm) spell.push({ ...sm, shipN: h.shipN, prompt: promptText(h.q) }); } });
      await setDoc(doc(db, 'artifacts/periplo-app-v1/students', STUDENT_ID), {
        placementCompleted: true, placementDate: serverTimestamp(),
        level: p.level, currentModule: p.module, currentWeek: p.week,
        placementLabel: ship.label, placementShip: ship.id,
        placementPath: s.log, placementSkills: cog, placementTotal: s.totalAsked,
        placementHistory: (s.history || []).map(h => ({ id: h.id, shipN: h.shipN, container: h.container, tier: h.tier, correct: h.correct })),
        placementErrors: (s.history || []).filter(h => !h.correct).map(h => ({ prompt: promptText(h.q), your: studentAnswerText(h.q, h.answer), correct: correctText(h.q), shipN: h.shipN })),
        placementSpelling: spell,
      }, { merge: true });
    } catch (e) { console.error('Firestore error:', e); }
    finally { setSaving(false); }
  }

  // ── PANTALLAS ─────────────────────────────────────────────────────────────────
  if (screen === 'welcome') return (
    <div className="fi" style={screenWrap(t)}>
      <div className="fu" style={{ width: '100%', maxWidth: 400, ...cardBox(t, { padding: '28px 24px 24px', borderRadius: 28 }) }}>
        <div className="floaty" style={iconChip(t, t.purple, 64, 34)}>🧭</div>
        <h1 style={{ fontFamily: FRED, fontWeight: 700, fontSize: 26, color: t.ink, textAlign: 'center', marginTop: 16 }}>Diagnóstico de Nivel</h1>
        <p style={{ fontFamily: NUN, fontWeight: 700, fontSize: 13, color: t.ink2, textAlign: 'center', marginTop: 4 }}>Periplo English Program</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 22 }}>
          {[['⏱️', '5–8 minutos. Responde con calma.'], ['🎯', 'Una pregunta a la vez, sin límite de tiempo.'], ['🔄', 'El examen se adapta a tus respuestas.'], ['📊', 'Al final obtienes tu nivel exacto.']].map(([e, txt]) => (
            <div key={txt} style={{ display: 'flex', alignItems: 'center', gap: 12, background: t.cardSub, borderRadius: 14, padding: '11px 13px' }}>
              <span style={{ fontSize: 20, flexShrink: 0 }}>{e}</span>
              <span style={{ fontFamily: NUN, fontWeight: 700, fontSize: 13.5, color: t.ink, lineHeight: 1.25 }}>{txt}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 22 }}>
          <Btn3D face={t.green.f} edge={t.green.e} big style={{ width: '100%', opacity: bankReady ? 1 : .5 }} onClick={() => bankReady && startExam()}>{bankReady ? 'Comenzar diagnóstico' : 'Cargando…'}</Btn3D>
        </div>
      </div>
      <ToggleCorner t={t} theme={theme} setTheme={setTheme} />
    </div>
  );

  if (screen === 'self_assess') return (
    <div className="fi" style={screenWrap(t)}>
      <div className="fu" style={{ width: '100%', maxWidth: 400 }}>
        <div style={iconChip(t, t.yellow, 64, 34)}>🤔</div>
        <h2 style={{ fontFamily: FRED, fontWeight: 700, fontSize: 22, color: t.ink, textAlign: 'center', marginTop: 14 }}>Una pregunta antes de empezar</h2>
        <p style={{ fontFamily: NUN, fontWeight: 700, fontSize: 13, color: t.ink2, textAlign: 'center', marginTop: 4, marginBottom: 20 }}>Sé honesto — no hay respuesta incorrecta aquí.</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
          {[
            { emoji: '😅', text: 'Casi nada — digo "hello" y me trabo', sub: 'Sé el abecedario y poco más' },
            { emoji: '✈️', text: 'Me defiendo en hoteles y aeropuertos', sub: 'Pido comida, pregunto precios, sobrevivo' },
            { emoji: '🎬', text: 'Entiendo bastante, pero hablar me cuesta', sub: 'Veo series, leo bien, pero el speaking mmmh' },
            { emoji: '💬', text: 'Hablo con confianza — me fallan los detalles', sub: 'Tengo conversaciones pero cometo errores' },
          ].map(({ emoji, text, sub }, i) => (
            <button key={i} onClick={() => handleSelfAssess(i)} className="g-tile" style={{ display: 'flex', alignItems: 'center', gap: 13, textAlign: 'left', cursor: 'pointer', border: 'none', background: t.card, borderRadius: 18, padding: '13px 14px', boxShadow: `0 4px 0 ${t.cardEdge}, ${t.softShadow}` }}>
              <span style={{ fontSize: 26, flexShrink: 0 }}>{emoji}</span>
              <div><p style={{ fontFamily: FRED, fontWeight: 600, fontSize: 14.5, color: t.ink, lineHeight: 1.15 }}>{text}</p><p style={{ fontFamily: NUN, fontWeight: 700, fontSize: 11.5, color: t.ink2, marginTop: 2 }}>{sub}</p></div>
            </button>
          ))}
        </div>
      </div>
      <ToggleCorner t={t} theme={theme} setTheme={setTheme} />
    </div>
  );

  if (screen === 'feedback' && feedback) return (
    <div style={{ height: '100%', background: t.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div className="pop" style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 64, marginBottom: 14 }}>{feedback.e}</div>
        <p style={{ fontFamily: FRED, fontWeight: 700, fontSize: 26, color: t.purple.f }}>{feedback.t}</p>
      </div>
    </div>
  );

  if (screen === 'result') {
    const ship = SHIPS[finalIdx ?? 0];
    const p = PLACEMENT[finalIdx ?? 0];
    const s = st.current || { log: [], history: [] };
    const hist = s.history || [];
    // ── desglose por habilidad (para el alumno) ──
    const cog = { conoce: { ok: 0, n: 0 }, entiende: { ok: 0, n: 0 }, produce: { ok: 0, n: 0 } };
    hist.forEach(h => { cog[h.container].n++; if (h.correct) cog[h.container].ok++; });
    const COGS = [
      { k: 'conoce', label: 'Conoce', sub: 'vocabulario', accent: t.blue },
      { k: 'entiende', label: 'Entiende', sub: 'comprensión', accent: t.yellow },
      { k: 'produce', label: 'Produce', sub: 'expresarte', accent: t.pink },
    ];
    const pct = k => cog[k].n ? Math.round(cog[k].ok / cog[k].n * 100) : null;
    const ranked = COGS.filter(c => cog[c.k].n).sort((a, b) => pct(a.k) - pct(b.k));
    const weakest = ranked[0], strongest = ranked[ranked.length - 1];
    // ── tramos (visitas a barcos) emparejados con el log ──
    const tramos = [];
    hist.forEach(h => {
      const last = tramos[tramos.length - 1];
      if (last && last.shipN === h.shipN) last.qs.push(h); else tramos.push({ shipN: h.shipN, qs: [h] });
    });
    const decLabel = e => {
      if (e.reason === 'cap') return { t: 'Límite de preguntas — placement aquí', c: t.yellow.f };
      if (e.reason === 'bounce') return { t: 'Peloteo detectado 🔄 — su nivel está aquí', c: t.green.f };
      if (e.reason === 'top') return { t: 'Llegó al tope de la flota 🔝 — placement aquí', c: t.green.f };
      if (e.reason === 'bottom') return { t: 'Base de la flota — placement aquí', c: t.yellow.f };
      const up = e.decision === 'sweepUp' || e.decision === 'up' || e.decision === 'upB';
      const jump = e.decision === 'sweepUp' || e.decision === 'sweepDown';
      const fine = e.decision === 'upB' || e.decision === 'downB';
      const tag = jump ? ' (salto rápido)' : fine ? ' · ronda fina' : '';
      return up
        ? { t: `Subió ↑ a Barco ${e.to + 1}` + tag, c: t.green.f }
        : { t: `Bajó ↓ a Barco ${e.to + 1}` + tag, c: t.flame.f };
    };
    const errors = hist.filter(h => !h.correct);
    // ── Ortografía: errores que fueron "casi" por escritura (pusiste X → era Y) ──
    const spelling = [];
    hist.forEach(h => { if (!h.correct) { const sm = spellingMiss(h.q, h.answer); if (sm) spelling.push({ ...sm, shipN: h.shipN }); } });

    return (
      <div style={{ height: '100%', background: t.bg, color: t.ink, overflowY: 'auto' }}>
        <ToggleCorner t={t} theme={theme} setTheme={setTheme} />
        <div className="pt-safe pb-safe" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '20px 16px 40px' }}>
          <div className="floaty" style={{ fontSize: 52, marginTop: 18, marginBottom: 12 }}>🎓</div>
          <h2 style={{ fontFamily: FRED, fontWeight: 700, fontSize: 28, color: t.ink, textAlign: 'center' }}>¡Diagnóstico completo!</h2>
          <p style={{ fontFamily: NUN, fontWeight: 700, fontSize: 13, color: t.ink2, marginBottom: 20 }}>Tu punto de entrada en Periplo:</p>

          {/* Empiezas en (hero) */}
          <div style={{ width: '100%', maxWidth: 400, background: t.heroGrad, borderRadius: 26, boxShadow: `0 5px 0 ${t.heroEdge}, 0 14px 28px rgba(216,67,26,0.28)`, padding: '22px 24px', textAlign: 'center', marginBottom: 16 }}>
            <p style={{ ...LBL, fontSize: 10, color: 'rgba(255,255,255,.85)', marginBottom: 4 }}>Empiezas en</p>
            <p style={{ fontFamily: FRED, fontWeight: 700, fontSize: 40, color: '#fff', lineHeight: 1 }}>{p.level}</p>
            <p style={{ fontFamily: FRED, fontWeight: 600, fontSize: 15, color: 'rgba(255,255,255,.92)', marginTop: 4 }}>{p.module}</p>
          </div>

          {/* Headline + offer */}
          <div style={{ width: '100%', maxWidth: 400, ...cardBox(t, { padding: 18 }), marginBottom: 16 }}>
            <p style={{ fontFamily: FRED, fontWeight: 600, fontSize: 16, color: t.ink, marginBottom: 6 }}>{p.headline}</p>
            <p style={{ fontFamily: NUN, fontWeight: 600, fontSize: 13.5, color: t.ink2, lineHeight: 1.4 }}>{p.offer}</p>
          </div>

          {/* ── Perfil por habilidad ── */}
          <div style={{ width: '100%', maxWidth: 400, ...cardBox(t, { padding: 18 }), marginBottom: 16 }}>
            <p style={{ ...LBL, fontSize: 10, color: t.ink2, marginBottom: 14 }}>Tu perfil</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
              {COGS.map(c => {
                const v = pct(c.k);
                return (
                  <div key={c.k}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 5 }}>
                      <span style={{ fontFamily: FRED, fontWeight: 600, fontSize: 14, color: c.accent.f }}>{c.label} <span style={{ fontFamily: NUN, fontWeight: 700, fontSize: 11, color: t.faint }}>· {c.sub}</span></span>
                      <span style={{ fontFamily: NUN, fontWeight: 800, fontSize: 12, color: t.ink2 }}>{v === null ? '—' : `${cog[c.k].ok}/${cog[c.k].n}`}</span>
                    </div>
                    <div style={{ height: 10, background: t.cardSub, borderRadius: 99, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${v || 0}%`, borderRadius: 99, background: `linear-gradient(90deg, ${c.accent.f}, ${c.accent.e})`, transition: 'width 1s cubic-bezier(.22,1,.36,1)' }} />
                    </div>
                  </div>
                );
              })}
            </div>
            {weakest && strongest && weakest.k !== strongest.k && (
              <p style={{ fontFamily: NUN, fontWeight: 600, fontSize: 13, color: t.ink2, marginTop: 14, lineHeight: 1.4 }}>
                Lo que más se te facilita: <span style={{ fontWeight: 800, color: strongest.accent.f }}>{strongest.label.toLowerCase()}</span>.
                En lo que nos vamos a enfocar: <span style={{ fontWeight: 800, color: weakest.accent.f }}>{weakest.label.toLowerCase()}</span>.
              </p>
            )}
          </div>

          {/* ── Repasa lo que falló (con lo que puso el alumno) ── */}
          {errors.length > 0 && (
            <div style={{ width: '100%', maxWidth: 400, ...cardBox(t, { padding: 18 }), marginBottom: 16 }}>
              <p style={{ ...LBL, fontSize: 10, color: t.ink2, marginBottom: 12 }}>📝 Repasa lo que falló · {errors.length}</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
                {errors.map((h, i) => (
                  <div key={i} style={{ borderLeft: `3px solid ${t.flame.f}`, paddingLeft: 12 }}>
                    <p style={{ fontFamily: NUN, fontWeight: 700, fontSize: 13, color: t.ink, lineHeight: 1.3 }}>{promptText(h.q)}</p>
                    <p style={{ fontFamily: NUN, fontWeight: 800, fontSize: 13, color: t.flame.f, marginTop: 2 }}>✗ Tú: {studentAnswerText(h.q, h.answer)}</p>
                    <p style={{ fontFamily: NUN, fontWeight: 800, fontSize: 13, color: t.green.f, marginTop: 1 }}>✓ {correctText(h.q)}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── Ortografía: "casi" por escritura ── */}
          {spelling.length > 0 && (
            <div style={{ width: '100%', maxWidth: 400, ...cardBox(t, { padding: 18 }), marginBottom: 16 }}>
              <p style={{ ...LBL, fontSize: 10, color: t.ink2, marginBottom: 2 }}>✍️ Ortografía · {spelling.length}</p>
              <p style={{ fontFamily: NUN, fontWeight: 600, fontSize: 12, color: t.faint, marginBottom: 12 }}>Sabías la respuesta — solo bailó la escritura. Sigue contando como error, pero aquí lo ves para pulirlo.</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {spelling.map((sm, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 8, fontFamily: NUN, fontWeight: 800, fontSize: 14 }}>
                    <span style={{ color: t.flame.f, textDecoration: 'line-through' }}>{sm.got}</span>
                    <span style={{ color: t.faint }}>→</span>
                    <span style={{ color: t.green.f }}>{sm.expected}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── Detalle del algoritmo (full disclosure) ── */}
          <div style={{ width: '100%', maxWidth: 400 }}>
            <button onClick={() => setShowDetail(d => !d)} style={{ width: '100%', background: 'none', border: 'none', cursor: 'pointer', fontFamily: NUN, fontWeight: 700, fontSize: 12, color: t.ink2, padding: '8px 0' }}>
              {showDetail ? '▾ Ocultar detalle' : '▸ Ver cómo se calculó (detalle)'}
            </button>
            {showDetail && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 4 }}>
                <p style={{ fontFamily: NUN, fontWeight: 700, fontSize: 11, color: t.faint, textAlign: 'center' }}>{s.totalAsked} preguntas · Barco {(s.entryIdx ?? 0) + 1} → Barco {(finalIdx ?? 0) + 1}</p>
                {tramos.map((tr, i) => {
                  const e = (s.log || [])[i];
                  const d = e ? decLabel(e) : null;
                  return (
                    <div key={i} style={cardBox(t, { padding: 12 })}>
                      <p style={{ fontFamily: FRED, fontWeight: 600, fontSize: 12.5, color: t.ink, marginBottom: 8 }}>Barco {tr.shipN} <span style={{ fontFamily: NUN, fontWeight: 700, color: t.faint }}>· {SHIPS[tr.shipN - 1].level}</span> {e && <span style={{ fontFamily: NUN, fontWeight: 700, color: t.faint }}>· {e.correct}/{e.n}</span>}</p>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 2 }}>
                        {tr.qs.map((h, j) => (
                          <span key={j} style={{ fontFamily: NUN, fontWeight: 800, fontSize: 10, padding: '3px 7px', borderRadius: 7, color: h.correct ? t.green.f : t.flame.f, background: h.correct ? `${t.green.f}22` : `${t.flame.f}22` }}>{LANE_ABBR[h.container]}/{h.tier[0]} {h.correct ? '✓' : '✗'}</span>
                        ))}
                      </div>
                      {d && <p style={{ fontFamily: NUN, fontWeight: 800, fontSize: 11.5, marginTop: 8, color: d.c }}>{d.t}</p>}
                    </div>
                  );
                })}
                <p style={{ fontFamily: NUN, fontWeight: 600, fontSize: 10, color: t.faint, lineHeight: 1.4, padding: '0 4px' }}>C = Conoce · E = Entiende · P = Produce · f/m/d = fácil/media/difícil. El orden muestra cómo subió o bajó la dificultad según tus respuestas.</p>
              </div>
            )}
            {saving && <p style={{ textAlign: 'center', fontFamily: NUN, fontWeight: 700, fontSize: 12, color: t.faint, padding: '8px 0' }}>Guardando resultado...</p>}
          </div>
        </div>
      </div>
    );
  }

  // EXAM
  if (!currentQ) return null;
  const s = st.current;
  const ship = SHIPS[s.shipIdx];
  return (
    <div style={{ height: '100%', background: t.bg, color: t.ink, display: 'flex', flexDirection: 'column' }}>
      <header className="pt-safe" style={{ position: 'sticky', top: 0, zIndex: 20, background: t.navBg, backdropFilter: 'blur(12px)', borderBottom: `1px solid ${t.line}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '10px 16px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
          <div style={{ width: 38, height: 38, borderRadius: 12, flexShrink: 0, background: `linear-gradient(150deg, ${t.purple.f}, ${t.purple.e})`, boxShadow: `0 3px 0 ${t.purple.e}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: FRED, fontWeight: 700, fontSize: 16, color: '#fff' }}>P</div>
          <div style={{ minWidth: 0 }}>
            <p style={{ fontFamily: FRED, fontWeight: 600, fontSize: 14, color: t.ink, lineHeight: 1.1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ship.label}</p>
            <p style={{ ...LBL, fontSize: 9.5, color: t.purple.f, marginTop: 2 }}>{LANE_LABEL[currentQ.container]} · {TIER_LABEL[currentQ.tier]}</p>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
          <span style={{ fontFamily: FRED, fontWeight: 700, fontSize: 15, color: t.ink2 }}>{s.totalAsked}</span>
          <ThemeToggle t={t} theme={theme} onTheme={setTheme} />
        </div>
      </header>
      <div style={{ padding: '16px 16px 4px' }}>
        <span style={{ ...LBL, fontSize: 10, color: t.faint }}>{TOOL_LABEL[currentQ.type] || currentQ.type}</span>
      </div>
      <div className="fi pb-safe" key={qKey} style={{ flex: 1, overflowY: 'auto', padding: '4px 16px 32px' }}>
        <div style={{ maxWidth: 520, margin: '0 auto' }}>{renderQ(currentQ, handleAnswer, t)}</div>
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<PlacementTest />);
</script>
</body>
</html>

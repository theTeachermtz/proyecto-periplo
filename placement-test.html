const norm = s => (s||'').toLowerCase().trim().replace(/[?.!,;:'"]/g,'').replace(/\s+/g,' ');

function getTopicBattery(topicId) {
  const topic = BANK.topics.find(t => t.id === topicId);
  if (!topic) return [];
  const qs = topic.questions;
  const F = qs.filter(q => q.tier === 'facil');
  const M = qs.filter(q => q.tier === 'medio');
  const D = qs.filter(q => q.tier === 'dificil');
  const pick = (arr, ...tools) => arr.find(q => tools.includes(q.tool));
  const F1    = pick(F, 'multipleChoice','trueFalse','oddOneOut') || F[0];
  const M1    = pick(M, 'fillBlank','unscramble','dialogueFill') || M[0];
  const D_err = pick(D, 'spotError','errorCorrection');
  const D_L1  = D.find(q => q.L1 && q !== D_err) || D.find(q => q !== D_err);
  return [F1, M1, D_err, D_L1].filter(Boolean);
}

function computeDecision(correct, total) {
  if (correct >= total)      return 'skip2';
  if (correct >= total - 1)  return 'advance1';
  if (correct >= total - 2)  return 'stop_here';
  return 'stop_before';
}

function gradeQ(q, answer) {
  if (answer === null || answer === undefined) return false;
  switch (q.tool) {
    case 'multipleChoice': case 'wordForm': case 'oddOneOut':
    case 'dialogueFill':   case 'audioQuestion':
      return String(answer) === String(q.answer);
    case 'trueFalse':
      return answer === q.answer;
    case 'fillBlank': case 'errorCorrection':
      return [q.answer,...(q.accept||[])].map(norm).includes(norm(String(answer)));
    case 'unscramble':
      return norm((Array.isArray(answer) ? answer : [answer]).join(' ')) === norm(q.answer);
    case 'spotError':
      return norm(String(answer)) === norm(q.errorWord);
    case 'multipleResponse': {
      if (!Array.isArray(answer)||!answer.length) return false;
      const exp=new Set(q.answers.map(norm)), got=new Set(answer.map(norm));
      return exp.size===got.size && [...exp].every(w=>got.has(w));
    }
    case 'matching':
      return q.pairs.every(p => norm(answer[p.left]) === norm(p.right));
    case 'categorySort':
      return q.buckets.every(b => {
        const got=new Set((answer[b.label]||[]).map(norm)), exp=new Set(b.correct.map(norm));
        return exp.size===got.size && [...exp].every(w=>got.has(w));
      });
    case 'contextMatch':
      return q.pairs.every(p => norm(answer[p.situation]) === norm(p.phrase));
    default: return false;
  }
}

function QMatching({ q, onSubmit }) {
  const pairs = q.pairs||[];

  const [selLeft, setSelLeft] = useState(null);
  const usedRights = new Set(Object.values(matched));
  const allDone = Object.keys(matched).length === lefts.length;
  const assign = right => {
    if (!selLeft) return;
    setMatched(m=>({...m,[selLeft]:right})); setSelLeft(null);
  };
  const clearLeft = left => setMatched(m=>{ const n={...m}; delete n[left]; return n; });
  return (
    <div className="space-y-4">
      <p className="text-white font-bold text-base">{q.q}</p>
      <div className="space-y-2">
        {lefts.map(l => (

        <div>
          <p className="text-zinc-500 text-xs uppercase tracking-widest mb-2">Pareja de "{selLeft}":</p>
          <div className="flex flex-wrap gap-2">
            {rights.filter(r=>!usedRights.has(r)).map(r => (

function QCategorySort({ q, onSubmit }) {
  const [buckets, setBuckets] = useState(() => Object.fromEntries((q.buckets||[]).map(b=>[b.label,[]])));

  const [sel, setSel] = useState(null);
  const place = label => {
    if (!sel) return;
    setBuckets(b=>({...b,[label]:[...(b[label]||[]),sel]}));
    setPool(p=>{ const i=p.indexOf(sel); return [...p.slice(0,i),...p.slice(i+1)]; });
    setSel(null);
  };
  const unplace = (label, word) => {
    setBuckets(b=>({...b,[label]:(b[label]||[]).filter(w=>w!==word)}));
    setPool(p=>[...p,word]);
  };
  const allPlaced = pool.length === 0;
  return (
    <div className="space-y-4">
      <p className="text-white font-bold text-base">{q.q}</p>
      <div className="flex flex-wrap gap-2">
        {pool.map((w,i) => (

            <p className="text-zinc-400 text-xs font-black uppercase tracking-widest mb-2">{b.label}{sel?' ← aquí':''}</p>

  return (
    <div className="space-y-4">
      <p className="text-zinc-400 text-xs font-black uppercase tracking-widest">Une cada situación con la frase:</p>
      <div className="flex flex-wrap gap-2">
        {phrases.filter(p=>!usedPhrases.has(p)).map(p => (
          <button key={p} onClick={() => setSelPhrase(s=>s===p?null:p)}
            className={`px-3 py-2 rounded-xl font-bold text-sm border transition-all ${selPhrase===p?'bg-sky-700 border-sky-500 text-white':'bg-zinc-800 border-zinc-700 text-zinc-200 hover:border-sky-500'}`}>
            "{p}"
          </button>
        ))}
      </div>
      <div className="space-y-2">
        {situations.map(s => (
          <div key={s} onClick={() => selPhrase && assign(s)}
            className={`rounded-2xl p-3 border-2 transition-all ${matched[s]?'border-emerald-700 bg-emerald-950/30':selPhrase?'border-sky-500 cursor-pointer bg-sky-950/20':'border-zinc-700 bg-zinc-900'}`}>
            <p className="text-zinc-300 text-sm font-medium">{s}</p>
            {matched[s] && (
              <p className="text-emerald-400 text-sm font-bold mt-1">→ "{matched[s]}"
                <button onClick={e=>{ e.stopPropagation(); removeSit(s); }} className="ml-2 text-zinc-500 hover:text-red-400 text-xs">✕</button>
              </p>
            )}
          </div>
        ))}
      </div>
      <button onClick={() => allDone && onSubmit(matched)} disabled={!allDone}
        className="w-full py-4 rounded-2xl bg-sky-600 hover:bg-sky-500 disabled:opacity-40 text-white font-black uppercase tracking-widest transition-all active:scale-95">
        Confirmar
      </button>
    </div>
  );
}

function renderQ(q, onSubmit) {
  switch(q.tool) {
    case 'multipleChoice': case 'wordForm': case 'oddOneOut': return <QMultipleChoice q={q} onSubmit={onSubmit}/>;
    case 'trueFalse':        return <QTrueFalse q={q} onSubmit={onSubmit}/>;
    case 'audioQuestion':    return <QAudio q={q} onSubmit={onSubmit}/>;
    case 'fillBlank':        return <QFillBlank q={q} onSubmit={onSubmit}/>;
    case 'errorCorrection':  return <QErrorCorrection q={q} onSubmit={onSubmit}/>;
    case 'spotError':        return <QSpotError q={q} onSubmit={onSubmit}/>;
    case 'unscramble':       return <QUnscramble q={q} onSubmit={onSubmit}/>;
    case 'matching':         return <QMatching q={q} onSubmit={onSubmit}/>;
    case 'categorySort':     return <QCategorySort q={q} onSubmit={onSubmit}/>;
    case 'dialogueFill':     return <QDialogueFill q={q} onSubmit={onSubmit}/>;
    case 'multipleResponse': return <QMultipleResponse q={q} onSubmit={onSubmit}/>;
    case 'contextMatch':     return <QContextMatch q={q} onSubmit={onSubmit}/>;
    default: return <div className="text-zinc-500 text-sm">Tipo no soportado: {q.tool}</div>;
  }
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function PlacementTest() {
  const [screen, setScreen] = useState('welcome');   // welcome | exam | feedback | result
  const [examPhase, setExamPhase] = useState('disc');
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [qKey, setQKey] = useState(0);
  const [discResults, setDiscResults] = useState([]);
  const [topicResults, setTopicResults] = useState([]);
  const [currentTopicIdx, setCurrentTopicIdx] = useState(0);
  const [currentBatteryResults, setCurrentBatteryResults] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [finalIdx, setFinalIdx] = useState(null);
  const [saving, setSaving] = useState(false);
  const [selfAssessIdx, setSelfAssessIdx] = useState(null);
  const timerRef = useRef(null);
  const questionStartTimeRef = useRef(null); // pasivo — solo recolecta, no ramifica

  const discTotal = BANK.discrimination_set.questions.length;

  function startExam() {
    setScreen('self_assess');
  }

  function handleSelfAssess(idx) {
    setSelfAssessIdx(idx);
    const qs = BANK.discrimination_set.questions;
    setQuestions(qs); setQIdx(0); setQKey(0);
    setExamPhase('disc'); setDiscResults([]); setTopicResults([]);
    setCurrentBatteryResults([]);
    questionStartTimeRef.current = Date.now();
    setScreen('exam');
  }

  function showFeedback(correct, correctAnswer, onDone) {
    setFeedback({ correct, correctAnswer });
    setScreen('feedback');
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => { setFeedback(null); setScreen('exam'); questionStartTimeRef.current = Date.now(); onDone(); }, 1600);
  }

  function beginTopicBattery(topicIdx, prevTopicResults) {
    const entry = PLACE_MAP[topicIdx];
    if (!entry || !entry.topicId) { doFinalize(topicIdx, prevTopicResults); return; }
    const battery = getTopicBattery(entry.topicId);
    setCurrentTopicIdx(topicIdx);
    setCurrentBatteryResults([]);
    setQuestions(battery); setQIdx(0); setQKey(k=>k+1);
    setExamPhase('topic'); setScreen('exam');
  }

  function doFinalize(placeIdx, allTopicResults) {
    setFinalIdx(placeIdx);
    setTopicResults(allTopicResults);
    writeResult(placeIdx, allTopicResults);
    setScreen('result');
  }

  function handleAnswer(answer) {
    const timeSpent = questionStartTimeRef.current ? Date.now() - questionStartTimeRef.current : null;
    questionStartTimeRef.current = null;
    const q = questions[qIdx];
    const correct = gradeQ(q, answer);
    const result = { id: q.id, skill: q.skill, correct, tool: q.tool, timeSpentMs: timeSpent };
    const correctAnswer = q.answer ?? q.errorWord ?? '';
    const isLast = qIdx + 1 >= questions.length;

    if (examPhase === 'disc') {
      const newDisc = [...discResults, result];
      setDiscResults(newDisc);
      showFeedback(correct, correctAnswer, () => {
        if (!isLast) { setQIdx(i=>i+1); setQKey(k=>k+1); }
        else {
          const score = newDisc.filter(r=>r.correct).length;
          // bases[selfAssessIdx]: 0→2, 1→3, 2→4, 3→6 — nunca arranca en tema 0 ni 1
          const bases = [2, 3, 4, 6];
          const base = selfAssessIdx !== null ? bases[selfAssessIdx] : 3;
          const startIdx = score >= 7 ? Math.min(7, base + 2) : score >= 5 ? Math.min(7, base + 1) : score >= 3 ? base : Math.max(2, base - 1);
          beginTopicBattery(startIdx, []);
        }
      });
    } else {
      const newBatt = [...currentBatteryResults, result];
      setCurrentBatteryResults(newBatt);
      const capturedTopicIdx = currentTopicIdx;
      const capturedTopicResults = topicResults;
      showFeedback(correct, correctAnswer, () => {
        if (!isLast) { setQIdx(i=>i+1); setQKey(k=>k+1); }
        else {
          const nCorrect = newBatt.filter(r=>r.correct).length;
          const decision = computeDecision(nCorrect, newBatt.length);
          const entry = PLACE_MAP[capturedTopicIdx];
          const newTopicResults = [...capturedTopicResults, {
            topicId: entry.topicId, correct: nCorrect, total: newBatt.length, decision,
            answers: newBatt.map(r => ({ id: r.id, correct: r.correct, tool: r.tool, timeSpentMs: r.timeSpentMs ?? null }))
          }];
          if (decision === 'stop_here') {
            doFinalize(capturedTopicIdx, newTopicResults);
          } else if (decision === 'stop_before') {
            doFinalize(Math.max(0, capturedTopicIdx - 1), newTopicResults);
          } else {
            const jump = decision === 'skip2' ? 2 : 1;
            const nextIdx = capturedTopicIdx + jump;
            if (nextIdx >= PLACE_MAP.length) doFinalize(PLACE_MAP.length - 1, newTopicResults);
            else beginTopicBattery(nextIdx, newTopicResults);
          }
        }
      });
    }
  }

  async function writeResult(placeIdx, allTopicResults) {
    setSaving(true);
    try {
      const place = PLACE_MAP[placeIdx];
      const B1_TOPICS = ['modal_verbs','present_simple','present_continuous','going_to'];
      const detailedMastery = {};
      B1_TOPICS.forEach(tId => {
        const tr = allTopicResults.find(r=>r.topicId===tId);
        const lvl = tr ? (tr.correct >= tr.total ? 2 : tr.correct >= tr.total - 1 ? 1 : 0) : 0;
        const topic = BANK.topics.find(t=>t.id===tId);
        const skills = {};
        if (topic) [...new Set(topic.questions.map(q=>q.skill))].forEach(s=>{ skills[s]=lvl; });
        detailedMastery[tId] = { skills };
      });
      await setDoc(
        doc(db, 'artifacts/periplo-app-v1/students', STUDENT_ID),
        {
          placementCompleted: true,
          placementDate: serverTimestamp(),
          level: place.level,
          currentModule: place.module,
          currentWeek: place.week,
          placementLabel: place.label,
          placementScore: {
            discrimination: {
              correct: discResults.filter(r=>r.correct).length,
              total: discTotal,
              answers: discResults.map(r => ({ id: r.id, correct: r.correct, tool: r.tool, timeSpentMs: r.timeSpentMs ?? null }))
            },
            topics: allTopicResults.map(t => ({
              id: t.topicId, correct: t.correct, total: t.total, decision: t.decision,
              answers: t.answers || []
            }))
          },
          detailedMastery
        },
        { merge: true }
      );
    } catch(e) { console.error('Firestore error:', e); }
    finally { setSaving(false); }
  }

  // ── SCREENS ─────────────────────────────────────────────────────────────────

  if (screen === 'welcome') return (
    <div className="min-h-screen-safe bg-zinc-950 flex flex-col items-center justify-center p-4 pt-safe">
      <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 rounded-[2rem] shadow-2xl flex flex-col overflow-hidden">
        <div className="p-8 flex-1">
          <div className="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center mb-6 text-4xl mx-auto">🧭</div>
          <h1 className="text-2xl font-black text-white text-center mb-1">Diagnóstico de Nivel</h1>
          <p className="text-zinc-500 text-sm text-center mb-6">Periplo English Program</p>
          <div className="space-y-3">
            {[['⏱️','5–8 minutos. Responde con calma.'],['🎯','Una pregunta a la vez, sin límite de tiempo.'],['🔄','El examen se adapta a tus respuestas.'],['📊','Al final obtienes tu nivel exacto.']].map(([e,t]) => (
              <div key={t} className="flex items-start gap-3 bg-zinc-800/50 rounded-xl p-3">
                <span className="text-xl shrink-0">{e}</span>
                <p className="text-zinc-300 text-sm font-medium">{t}</p>
              </div>
            ))}
          </div>
        </div>
        <div className="p-6 bg-zinc-950/50 border-t border-zinc-800/50 pb-safe">
          <button onClick={startExam}
            className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black rounded-2xl text-sm uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-indigo-600/20">
            Comenzar diagnóstico
          </button>
        </div>
      </div>
    </div>
  );

  if (screen === 'self_assess') return (
    <div className="min-h-screen-safe bg-zinc-950 flex flex-col items-center justify-center p-4 pt-safe">
      <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 rounded-[2rem] shadow-2xl overflow-hidden">
        <div className="p-8">
          <div className="w-16 h-16 bg-amber-500/20 rounded-2xl flex items-center justify-center mb-6 text-4xl mx-auto">🤔</div>
          <h2 className="text-xl font-black text-white text-center mb-1">Una pregunta antes de empezar</h2>
          <p className="text-zinc-500 text-sm text-center mb-6">Sé honesto — no hay respuesta incorrecta aquí.</p>
          <div className="space-y-3">
            {[
              { emoji:'😅', text:'Casi nada — digo "hello" y me trabo', sub:'Sé el abecedario y poco más' },
              { emoji:'✈️', text:'Me defiendo en hoteles y aeropuertos', sub:'Pido comida, pregunto precios, sobrevivo' },
              { emoji:'🎬', text:'Entiendo bastante, pero hablar me cuesta', sub:'Veo series, leo bien, pero el speaking mmmh' },
              { emoji:'💬', text:'Hablo con confianza — me fallan los detalles', sub:'Tengo conversaciones pero cometo errores' },
            ].map(({ emoji, text, sub }, i) => (
              <button key={i} onClick={() => handleSelfAssess(i)}
                className="w-full text-left px-4 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-amber-500 transition-all active:scale-95 flex items-center gap-3">
                <span className="text-2xl shrink-0">{emoji}</span>
                <div>
                  <p className="text-white font-bold text-sm leading-tight">{text}</p>
                  <p className="text-zinc-500 text-xs mt-0.5">{sub}</p>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  if (screen === 'feedback' && feedback) return (
    <div className={`min-h-screen-safe flex flex-col items-center justify-center p-6 pt-safe ${feedback.correct?'bg-emerald-950':'bg-red-950'}`}>
      <div className="text-center">
        <div className="text-7xl mb-4">{feedback.correct?'✅':'❌'}</div>
        <p className={`text-2xl font-black mb-3 ${feedback.correct?'text-emerald-300':'text-red-300'}`}>
          {feedback.correct?'¡Correcto!':'Incorrecto'}
        </p>
        {!feedback.correct && feedback.correctAnswer !== undefined && (
          <div className="bg-black/30 rounded-2xl px-5 py-3 mt-2">
            <p className="text-zinc-400 text-xs uppercase tracking-widest mb-1">Respuesta correcta:</p>
            <p className="text-white font-bold text-base">{Array.isArray(feedback.correctAnswer)?feedback.correctAnswer.join(' '):String(feedback.correctAnswer)}</p>
          </div>
        )}
      </div>
    </div>
  );

  if (screen === 'result') {
    const place = PLACE_MAP[finalIdx ?? 0];
    const discScore = discResults.filter(r=>r.correct).length;
    return (
      <div className="min-h-screen-safe bg-zinc-950 flex flex-col pt-safe pb-safe">
        <div className="flex-1 flex flex-col items-center p-6 overflow-y-auto">
          <div className="text-5xl mt-8 mb-4">🎓</div>
          <h2 className="text-3xl font-black text-white mb-1">¡Diagnóstico completo!</h2>
          <p className="text-zinc-500 text-sm mb-6">Tu punto de entrada en Periplo:</p>
          <div className="bg-indigo-950/60 border-2 border-indigo-700 rounded-3xl px-8 py-6 mb-6 w-full max-w-xs text-center">
            <p className="text-indigo-400 text-xs font-black uppercase tracking-widest mb-1">Nivel asignado</p>
            <p className="text-4xl font-black text-white mb-1">{place.level}</p>
            <p className="text-indigo-300 font-bold">{place.module}</p>
            <p className="text-zinc-400 text-sm mt-1">Semana {place.week}</p>
          </div>
          <div className="w-full max-w-xs space-y-2">
            <div className="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">
              <p className="text-zinc-500 text-xs uppercase tracking-widest mb-1">Discriminación de estructuras</p>
              <p className="text-white font-black text-lg">{discScore} / {discTotal} correctas</p>
            </div>
            {topicResults.map(t => {
              const entry = PLACE_MAP.find(p=>p.topicId===t.topicId);
              const badge = t.decision==='skip2'?'Dominado ↑↑':t.decision==='advance1'?'Bien ↑':t.decision==='stop_here'?'Punto de inicio':'Necesita práctica';
              const badgeColor = (t.decision==='skip2'||t.decision==='advance1')?'bg-emerald-900/40 text-emerald-400':t.decision==='stop_here'?'bg-yellow-900/40 text-yellow-400':'bg-red-900/40 text-red-400';
              return (
                <div key={t.topicId} className="bg-zinc-900 rounded-2xl p-4 border border-zinc-800">
                  <div className="flex justify-between items-start gap-2">
                    <div>
                      <p className="text-zinc-400 text-xs font-bold mb-0.5">{entry?.label||t.topicId}</p>
                      <p className="text-white font-black">{t.correct}/{t.total}</p>
                    </div>
                    <span className={`text-xs font-bold px-3 py-1 rounded-full shrink-0 ${badgeColor}`}>{badge}</span>
                  </div>
                </div>
              );
            })}
            {saving && <p className="text-center text-zinc-600 text-xs py-2">Guardando resultado...</p>}
          </div>
        </div>
      </div>
    );
  }

  // EXAM SCREEN
  const currentQ = questions[qIdx];
  if (!currentQ) return null;
  const phaseLabel = examPhase==='disc'?'Diagnóstico inicial':(PLACE_MAP[currentTopicIdx]?.label||'');
  const qNum = questions.length;
  const progressPct = Math.round(((examPhase==='disc'?qIdx:discTotal + topicResults.length*4 + qIdx) / (discTotal + (PLACE_MAP.length-1)*4)) * 100);

  return (
    <div className="min-h-screen-safe bg-zinc-950 flex flex-col pt-safe">
      <header className="sticky top-0 z-20 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-5 py-3 shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-600/20">P</div>
          <div>
            <p className="text-white font-black text-sm leading-none">Diagnóstico</p>
            <p className="text-indigo-400 text-[10px] font-bold uppercase tracking-widest mt-0.5">{phaseLabel}</p>
          </div>
        </div>
        <span className="text-zinc-500 text-sm font-bold">{qIdx+1} / {qNum}</span>
      </header>
      <div className="h-1 bg-zinc-800 shrink-0">
        <div className="h-full bg-indigo-600 transition-all duration-500" style={{width:`${Math.min(100,progressPct)}%`}} />
      </div>
      <div className="px-5 pt-5 pb-1 shrink-0">
        <span className="text-[10px] font-black uppercase tracking-widest text-zinc-500">{TOOL_LABEL[currentQ.tool]||currentQ.tool}</span>
      </div>
      <div className="flex-1 px-5 pb-8 overflow-y-auto" key={qKey}>
        {renderQ(currentQ, handleAnswer)}
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<PlacementTest/>);
</script>
</body>

// ── helpers ───────────────────────────────────────────────────────────────────
// Normaliza para calificar entrada libre: ignora mayúsculas, acentos, apóstrofes,
// comillas, puntos, comas, signos ¿¡, y espacios (inicio, fin, dobles).
const norm = s => (s || '')
  .toLowerCase()
  .normalize('NFD').replace(/[̀-ͯ]/g, '')   // quita acentos (á→a, ñ→n)
  .replace(/[?.!,;:'"¿¡]/g, '')
  .replace(/\s+/g, ' ')
  .trim();
const shuffleArr = arr => [...arr].sort(() => Math.random() - 0.5);
const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// Avanza la posición (carril, dificultad) según acierto/error.
// Acierto: sube el carril hacia Produce; al llegar a Produce sube la dificultad.
// Error: avanza el carril sin subir dificultad; ya en Produce, baja la dificultad.
function advancePos(pos, correct) {
  let { lane, diff } = pos;
  if (correct) {
    if (lane < 2) { lane++; if (lane === 2) diff = Math.min(2, diff + 1); }
    else diff = Math.min(2, diff + 1);
  } else {
    if (lane < 2) lane++;
    else diff = Math.max(0, diff - 1);
  }
  return { lane, diff };
}

// Elige una pregunta no usada lo más cercana posible a (carril, dificultad)
function pickQuestion(ship, pos, used) {
  const want = ship.questions.filter(q =>
    q.container === LANES[pos.lane] && q.tier === TIERS[pos.diff] && !used.has(q.id));
  if (want.length) return rnd(want);
  const rest = ship.questions.filter(q => !used.has(q.id));
  if (!rest.length) return null;
  const dist = q => Math.abs(LANES.indexOf(q.container) - pos.lane) + Math.abs(TIERS.indexOf(q.tier) - pos.diff);
  return shuffleArr(rest).sort((a, b) => dist(a) - dist(b))[0];
}

function gradeQ(q, a) {
  if (a === null || a === undefined || a === '') return false;
  switch (q.type) {
    case 'multipleChoice': case 'oddOneOut': case 'audioQuestion': case 'dialogueFill': case 'wordForm':
      return String(a) === String(q.answer);
    case 'trueFalse':
      return a === q.answer;
    case 'fillBlank': case 'errorCorrection':
      return [q.answer, ...(q.accept || []), ...(q.acceptedAnswers || [])].map(norm).includes(norm(String(a)));
    case 'unscramble':
      return [q.answer, ...(q.acceptedAnswers || [])].map(norm).includes(norm((Array.isArray(a) ? a : [a]).join(' ')));
    case 'spotError':
      return norm(String(a)) === norm(q.errorWord);
    case 'multipleResponse': {
      if (!Array.isArray(a) || !a.length) return false;
      const exp = new Set((q.answers || []).map(norm)), got = new Set(a.map(norm));
      return exp.size === got.size && [...exp].every(w => got.has(w));
    }
    case 'matching':
      return (q.pairs || []).every(p => norm(a[p.left]) === norm(p.right));
    case 'categorySort':
      return (q.buckets || []).every(b => {
        const got = new Set((a[b.label] || []).map(norm)), exp = new Set(b.correct.map(norm));
        return exp.size === got.size && [...exp].every(w => got.has(w));
      });
    default: return false;
  }
}

function QUnscramble({ q, onSubmit }) {
  const [pool] = useState(() => shuffleArr(q.words || []));
  const [placed, setPlaced] = useState([]);
  const [usedIdx, setUsedIdx] = useState(new Set());
  const add = idx => { setPlaced(p => [...p, idx]); setUsedIdx(s => new Set([...s, idx])); };
  const remove = pos => {
    const idx = placed[pos];
    setPlaced(p => p.filter((_, i) => i !== pos));
    setUsedIdx(s => { const n = new Set(s); n.delete(idx); return n; });
  };
  return (
    <div className="space-y-4">
      {q.spanishPrompt && (
        <div className="flex items-start gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-4 py-3">
          <span className="text-lg shrink-0">🇲🇽</span>
          <p className="text-indigo-200 font-semibold text-sm">{q.spanishPrompt}</p>
        </div>
      )}
      <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">{q.targetLabel || 'Arma la oración:'}</p>
      <div className="min-h-16 bg-zinc-900 border-2 border-dashed border-zinc-600 rounded-2xl p-3 flex flex-wrap gap-2 items-start">
        {placed.map((idx, pos) => (
          <button key={pos} onClick={() => remove(pos)}
            className="px-3 py-1.5 rounded-xl bg-indigo-700 text-white font-bold text-sm active:scale-95 hover:bg-rose-600">{pool[idx]}</button>
        ))}
        {!placed.length && <span className="text-zinc-600 text-sm self-center mx-1">Toca las palabras de abajo...</span>}
      </div>
      <div>
        <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Hay palabras que NO necesitas:</p>
        <div className="flex flex-wrap gap-2">
          {pool.map((w, i) => usedIdx.has(i) ? null : (
            <button key={i} onClick={() => add(i)}
              className="px-3 py-2 rounded-xl font-bold text-sm border bg-zinc-800 border-zinc-600 text-zinc-200 hover:border-indigo-500 transition-all active:scale-95">{w}</button>
          ))}
        </div>
      </div>
      <div className="flex gap-2">
        <button onClick={() => { setPlaced([]); setUsedIdx(new Set()); }}
          className="px-4 py-3 rounded-2xl bg-zinc-800 text-zinc-400 font-bold text-sm hover:bg-zinc-700">Limpiar</button>
        <button onClick={() => placed.length && onSubmit(placed.map(i => pool[i]))} disabled={!placed.length}
          className="flex-1 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white font-black uppercase tracking-widest transition-all active:scale-95">Confirmar</button>
      </div>
    </div>
  );
}

function QMatching({ q, onSubmit }) {
  const pairs = q.pairs || [];
  const lefts = pairs.map(p => p.left);
  const [rights] = useState(() => shuffleArr([...pairs.map(p => p.right), ...(q.distractors || [])]));
  const [matched, setMatched] = useState({});
  const [selLeft, setSelLeft] = useState(null);
  const usedRights = new Set(Object.values(matched));
  const allDone = Object.keys(matched).length === lefts.length;
  return (
    <div className="space-y-4">
      <p className="text-white font-bold text-base">{q.q}</p>
      <div className="space-y-2">
        {lefts.map(l => (
          <div key={l} className="flex items-center gap-2">
            <button onClick={() => matched[l] ? setMatched(m => { const n = { ...m }; delete n[l]; return n; }) : setSelLeft(s => s === l ? null : l)}
              className={`px-3 py-2 rounded-xl font-bold text-sm border transition-all flex-1 text-left ${matched[l] ? 'bg-emerald-900/40 border-emerald-700 text-emerald-300' : selLeft === l ? 'bg-indigo-700 border-indigo-500 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-300 hover:border-indigo-500'}`}>{l}</button>
            <span className="text-zinc-600 text-sm">→</span>
            <span className={`px-3 py-2 rounded-xl text-sm flex-1 font-medium ${matched[l] ? 'text-emerald-300' : 'text-zinc-600 italic'}`}>{matched[l] || '---'}</span>
          </div>
        ))}
      </div>
      {selLeft && (
        <div>
          <p className="text-zinc-500 text-xs uppercase tracking-widest mb-2">Pareja de "{selLeft}":</p>
          <div className="flex flex-wrap gap-2">
            {rights.filter(r => !usedRights.has(r)).map(r => (
              <button key={r} onClick={() => { setMatched(m => ({ ...m, [selLeft]: r })); setSelLeft(null); }}
                className="px-3 py-2 rounded-xl bg-indigo-900/50 border border-indigo-600 text-indigo-300 font-bold text-sm hover:bg-indigo-700 transition-all active:scale-95">{r}</button>
            ))}
          </div>
        </div>
      )}
      <button onClick={() => allDone && onSubmit(matched)} disabled={!allDone} className={confirmBtn}>Confirmar</button>
    </div>
  );
}

function QCategorySort({ q, onSubmit }) {
  const [buckets, setBuckets] = useState(() => Object.fromEntries((q.buckets || []).map(b => [b.label, []])));
  const [pool, setPool] = useState(() => shuffleArr(q.pool || []));
  const [sel, setSel] = useState(null);
  const place = label => {
    if (!sel) return;
    setBuckets(b => ({ ...b, [label]: [...(b[label] || []), sel] }));
    setPool(p => p.filter(w => w !== sel)); setSel(null);
  };
  const unplace = (label, word) => {
    setBuckets(b => ({ ...b, [label]: (b[label] || []).filter(w => w !== word) }));
    setPool(p => [...p, word]);
  };
  return (
    <div className="space-y-4">
      <p className="text-white font-bold text-base">{q.q}</p>
      <div className="flex flex-wrap gap-2">
        {pool.map((w, i) => (
          <button key={i} onClick={() => setSel(s => s === w ? null : w)}
            className={`px-3 py-2 rounded-xl font-bold text-sm border transition-all ${sel === w ? 'bg-indigo-700 border-indigo-500 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-200 hover:border-indigo-500'}`}>{w}</button>
        ))}
        {!pool.length && <span className="text-zinc-600 text-sm italic">Todas clasificadas ✓</span>}
      </div>
      <div className="space-y-2">
        {(q.buckets || []).map(b => (
          <div key={b.label} onClick={() => sel && place(b.label)}
            className={`rounded-2xl p-3 border-2 transition-all ${sel ? 'border-indigo-500 cursor-pointer bg-indigo-950/30' : 'border-zinc-700 bg-zinc-900'}`}>
            <p className="text-zinc-400 text-xs font-black uppercase tracking-widest mb-2">{b.label}{sel ? ' ← aquí' : ''}</p>
            <div className="flex flex-wrap gap-2 min-h-7">
              {(buckets[b.label] || []).map((w, i) => (
                <button key={i} onClick={e => { e.stopPropagation(); unplace(b.label, w); }}
                  className="px-3 py-1.5 rounded-xl bg-emerald-900/50 border border-emerald-700 text-emerald-300 font-bold text-sm">{w} ✕</button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <button onClick={() => !pool.length && onSubmit(buckets)} disabled={pool.length > 0} className={confirmBtn}>Confirmar</button>
    </div>
  );
}

  const [sel, setSel] = useState([]);

  return (

      <p className="text-zinc-500 text-sm">Selecciona TODAS las correctas.</p>
      <div className="space-y-2">

          <button key={opt} onClick={() => toggle(opt)}
            className={`w-full text-left px-5 py-4 rounded-2xl border font-medium transition-all active:scale-95 flex items-center gap-3 text-sm ${sel.includes(opt) ? 'bg-indigo-900/40 border-indigo-600 text-indigo-200' : 'bg-zinc-800 border-zinc-700 text-zinc-200 hover:border-zinc-500'}`}>
            <span className={`w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 ${sel.includes(opt) ? 'bg-indigo-600 border-indigo-600' : 'border-zinc-600'}`}>
              {sel.includes(opt) && <span className="text-white text-xs font-black">✓</span>}
            </span>{opt}
          </button>
        ))}
      </div>
      <button onClick={() => sel.length && onSubmit(sel)} disabled={!sel.length} className={confirmBtn}>Confirmar</button>
    </div>
  );
}

function renderQ(q, onSubmit) {
  switch (q.type) {
    case 'multipleChoice': case 'oddOneOut': case 'wordForm': return <QChoice q={q} onSubmit={onSubmit} />;
    case 'trueFalse': return <QTrueFalse q={q} onSubmit={onSubmit} />;
    case 'audioQuestion': return <QAudio q={q} onSubmit={onSubmit} />;
    case 'fillBlank': return <QFillBlank q={q} onSubmit={onSubmit} />;
    case 'errorCorrection': return <QErrorCorrection q={q} onSubmit={onSubmit} />;
    case 'unscramble': return <QUnscramble q={q} onSubmit={onSubmit} />;
    case 'matching': return <QMatching q={q} onSubmit={onSubmit} />;
    case 'categorySort': return <QCategorySort q={q} onSubmit={onSubmit} />;
    case 'dialogueFill': return <QDialogue q={q} onSubmit={onSubmit} />;
    case 'multipleResponse': return <QMultipleResponse q={q} onSubmit={onSubmit} />;
    default: return <div className="text-zinc-500 text-sm">Tipo no soportado: {q.type}</div>;
  }
}

// ── MOTOR ───────────────────────────────────────────────────────────────────────
function PlacementTest() {
  const [screen, setScreen] = useState('welcome'); // welcome | self_assess | exam | feedback | result
  const [currentQ, setCurrentQ] = useState(null);
  const [qKey, setQKey] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [finalIdx, setFinalIdx] = useState(null);
  const [saving, setSaving] = useState(false);
  const [showDetail, setShowDetail] = useState(false);

  // estado del motor en refs (no necesita re-render hasta cambiar de pregunta)
  const st = useRef(null);   // { entryIdx, shipIdx, pos, used, asked, correctStreak, wrongStreak, floorDiff, totalAsked, log }
  const timer = useRef(null);

  function startExam() { setScreen('self_assess'); }

  function handleSelfAssess(i) {
    const e = ENTRY[i];
    st.current = {
      entryIdx: e.ship, shipIdx: e.ship, pos: { lane: 0, diff: e.tier },
      used: new Set(), asked: [], correctStreak: 0, wrongStreak: 0,
      floorDiff: e.tier, totalAsked: 0, log: [], history: [],
    };
    serveQuestion();
  }

  function serveQuestion() {
    const s = st.current;
    if (s.totalAsked >= MAX_QUESTIONS) { decide(true); return; } // tope global → cerrar
    const q = pickQuestion(SHIPS[s.shipIdx], s.pos, s.used);
    if (!q) { decide(true); return; } // barco agotado → forzar decisión
    s.used.add(q.id);
    setCurrentQ(q); setQKey(k => k + 1); setScreen('exam');
  }

  function openShip(idx, startDiff) {
    const s = st.current;
    s.shipIdx = idx;
    s.pos = { lane: 0, diff: clamp(startDiff, 0, 2) };
    // OJO: NO reseteamos s.used — la memoria de preguntas ya hechas es global a todo
    // el examen, así que al volver a un barco no se repiten.
    s.asked = []; s.correctStreak = 0; s.wrongStreak = 0;
    serveQuestion();
  }

  function move(decision) {
    const s = st.current;
    const correct = s.asked.filter(r => r.correct).length, n = s.asked.length;
    if (decision === 'stay') { s.log.push({ from: s.shipIdx, to: s.shipIdx, decision, correct, n, enteredDiff: s.pos.diff }); finalize(s.shipIdx); return; }
    const delta = decision === 'promote' ? 1 : decision === 'demote1' ? -1 : -2;
    const to = clamp(s.shipIdx + delta, Math.max(0, s.entryIdx - 2), Math.min(SHIPS.length - 1, s.entryIdx + 2));
    if (to === s.shipIdx || s.totalAsked >= MAX_QUESTIONS) { s.log.push({ from: s.shipIdx, to, decision, correct, n, enteredDiff: null }); finalize(to); return; }
    let enteredDiff;
    if (decision === 'promote') enteredDiff = 1;                       // sube → entra en media
    else { s.floorDiff = Math.min(2, s.floorDiff + 1); enteredDiff = s.floorDiff; } // baja → +1 dificultad
    s.log.push({ from: s.shipIdx, to, decision, correct, n, enteredDiff });
    openShip(to, enteredDiff);
  }

  // Decide si seguir, subir o bajar tras la última respuesta
  function decide(forced) {
    const s = st.current;
    const n = s.asked.length;
    const correct = s.asked.filter(r => r.correct).length;
    if (s.correctStreak >= 4) return move('promote');
    if (s.wrongStreak >= 4) return move('demote2');
    if (n >= 6 || forced) {
      if (correct >= 5 && n <= 6) return move('promote');     // 5+/6
      if (correct <= 2 && n === 6) return move('demote2');    // ≤2/6
      if (correct === 3 && n === 6) return move('demote1');   // 3/6
      // 4/6 → ambiguo: sigue muestreando hasta 9, luego decide
      if (n >= 9 || forced) {
        const r = correct / n;
        if (r >= 0.6) return move('promote');
        if (r <= 0.34) return move('demote2');
        return move('stay');
      }
    }
    serveQuestion();
  }

  function handleAnswer(answer) {
    const s = st.current;
    const q = currentQ;
    const correct = gradeQ(q, answer);
    s.asked.push({ id: q.id, container: q.container, tier: q.tier, correct });
    s.history.push({ id: q.id, shipN: SHIPS[s.shipIdx].n, container: q.container, tier: q.tier, correct });
    s.totalAsked++;
    s.correctStreak = correct ? s.correctStreak + 1 : 0;
    s.wrongStreak = correct ? 0 : s.wrongStreak + 1;
    s.pos = advancePos(s.pos, correct);
    setFeedback(rnd(ENCOURAGE)); // aliento neutral — no revela si acertó o falló
    setScreen('feedback');
    clearTimeout(timer.current);
    timer.current = setTimeout(() => { setFeedback(null); decide(false); }, 950);
  }

  async function finalize(idx) {
    const s = st.current;
    setFinalIdx(idx);
    setScreen('result');
    setSaving(true);
    try {
      const ship = SHIPS[idx], p = PLACEMENT[idx];
      const cog = { conoce: { ok: 0, n: 0 }, entiende: { ok: 0, n: 0 }, produce: { ok: 0, n: 0 } };
      (s.history || []).forEach(h => { cog[h.container].n++; if (h.correct) cog[h.container].ok++; });
      await setDoc(doc(db, 'artifacts/periplo-app-v1/students', STUDENT_ID), {
        placementCompleted: true, placementDate: serverTimestamp(),
        level: p.level, currentModule: p.module, currentWeek: p.week,
        placementLabel: ship.label, placementShip: ship.id,
        placementPath: s.log, placementSkills: cog, placementHistory: s.history, placementTotal: s.totalAsked,
      }, { merge: true });
    } catch (e) { console.error('Firestore error:', e); }
    finally { setSaving(false); }
  }

  // ── PANTALLAS ─────────────────────────────────────────────────────────────────
  if (screen === 'welcome') return (
    <div className="min-h-screen-safe bg-zinc-950 flex flex-col items-center justify-center p-4 pt-safe">
      <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 rounded-[2rem] shadow-2xl overflow-hidden">
        <div className="p-8">
          <div className="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center mb-6 text-4xl mx-auto">🧭</div>
          <h1 className="text-2xl font-black text-white text-center mb-1">Diagnóstico de Nivel</h1>
          <p className="text-zinc-500 text-sm text-center mb-6">Periplo English Program</p>
          <div className="space-y-3">
            {[['⏱️', '5–8 minutos. Responde con calma.'], ['🎯', 'Una pregunta a la vez, sin límite de tiempo.'], ['🔄', 'El examen se adapta a tus respuestas.'], ['📊', 'Al final obtienes tu nivel exacto.']].map(([e, t]) => (
              <div key={t} className="flex items-start gap-3 bg-zinc-800/50 rounded-xl p-3">
                <span className="text-xl shrink-0">{e}</span>
                <p className="text-zinc-300 text-sm font-medium">{t}</p>
              </div>
            ))}
          </div>
        </div>
        <div className="p-6 bg-zinc-950/50 border-t border-zinc-800/50 pb-safe">
          <button onClick={startExam} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black rounded-2xl text-sm uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-indigo-600/20">Comenzar diagnóstico</button>
        </div>
      </div>
    </div>
  );

  if (screen === 'self_assess') return (
    <div className="min-h-screen-safe bg-zinc-950 flex flex-col items-center justify-center p-4 pt-safe">
      <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 rounded-[2rem] shadow-2xl overflow-hidden">
        <div className="p-8">
          <div className="w-16 h-16 bg-amber-500/20 rounded-2xl flex items-center justify-center mb-6 text-4xl mx-auto">🤔</div>
          <h2 className="text-xl font-black text-white text-center mb-1">Una pregunta antes de empezar</h2>
          <p className="text-zinc-500 text-sm text-center mb-6">Sé honesto — no hay respuesta incorrecta aquí.</p>
          <div className="space-y-3">
            {[
              { emoji: '😅', text: 'Casi nada — digo "hello" y me trabo', sub: 'Sé el abecedario y poco más' },
              { emoji: '✈️', text: 'Me defiendo en hoteles y aeropuertos', sub: 'Pido comida, pregunto precios, sobrevivo' },
              { emoji: '🎬', text: 'Entiendo bastante, pero hablar me cuesta', sub: 'Veo series, leo bien, pero el speaking mmmh' },
              { emoji: '💬', text: 'Hablo con confianza — me fallan los detalles', sub: 'Tengo conversaciones pero cometo errores' },
            ].map(({ emoji, text, sub }, i) => (
              <button key={i} onClick={() => handleSelfAssess(i)}
                className="w-full text-left px-4 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-amber-500 transition-all active:scale-95 flex items-center gap-3">
                <span className="text-2xl shrink-0">{emoji}</span>
                <div><p className="text-white font-bold text-sm leading-tight">{text}</p><p className="text-zinc-500 text-xs mt-0.5">{sub}</p></div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  if (screen === 'feedback' && feedback) return (
    <div className="min-h-screen-safe flex flex-col items-center justify-center p-6 pt-safe bg-zinc-950">
      <div className="text-center fade-in">
        <div className="text-6xl mb-4">{feedback.e}</div>
        <p className="text-2xl font-black text-indigo-300">{feedback.t}</p>
      </div>
    </div>
  );

  if (screen === 'result') {
    const ship = SHIPS[finalIdx ?? 0];
    const p = PLACEMENT[finalIdx ?? 0];
    const s = st.current || { log: [], history: [] };
    const hist = s.history || [];
    // ── desglose por habilidad (para el alumno) ──
    const cog = { conoce: { ok: 0, n: 0 }, entiende: { ok: 0, n: 0 }, produce: { ok: 0, n: 0 } };
    hist.forEach(h => { cog[h.container].n++; if (h.correct) cog[h.container].ok++; });
    const COGS = [
      { k: 'conoce', label: 'Conoce', sub: 'vocabulario', color: 'bg-cyan-500', text: 'text-cyan-400' },
      { k: 'entiende', label: 'Entiende', sub: 'comprensión', color: 'bg-amber-500', text: 'text-amber-400' },
      { k: 'produce', label: 'Produce', sub: 'expresarte', color: 'bg-rose-500', text: 'text-rose-400' },
    ];
    const pct = k => cog[k].n ? Math.round(cog[k].ok / cog[k].n * 100) : null;
    const ranked = COGS.filter(c => cog[c.k].n).sort((a, b) => pct(a.k) - pct(b.k));
    const weakest = ranked[0], strongest = ranked[ranked.length - 1];
    // ── tramos (visitas a barcos) emparejados con el log ──
    const tramos = [];
    hist.forEach(h => {
      const last = tramos[tramos.length - 1];
      if (last && last.shipN === h.shipN) last.qs.push(h); else tramos.push({ shipN: h.shipN, qs: [h] });
    });
    const decLabel = e => {
      if (e.decision === 'stay') return { t: 'Se quedó — es su nivel', c: 'text-yellow-400' };
      if (e.decision === 'promote') return { t: `Subió ↑ a Barco ${e.to + 1}` + (e.enteredDiff != null ? ` (entró en ${TIER_LABEL[TIERS[e.enteredDiff]]})` : ''), c: 'text-emerald-400' };
      if (e.to === e.from) return { t: 'Tope alcanzado — placement aquí', c: 'text-yellow-400' };
      return { t: `Bajó ↓ a Barco ${e.to + 1}` + (e.enteredDiff != null ? ` (entró en ${TIER_LABEL[TIERS[e.enteredDiff]]})` : ''), c: 'text-red-400' };
    };

    return (
      <div className="min-h-screen-safe bg-zinc-950 flex flex-col pt-safe pb-safe">
        <div className="flex-1 flex flex-col items-center p-6 overflow-y-auto">
          <div className="text-5xl mt-6 mb-4">🎓</div>
          <h2 className="text-3xl font-black text-white mb-1">¡Diagnóstico completo!</h2>
          <p className="text-zinc-500 text-sm mb-6">Tu punto de entrada en Periplo:</p>
          <div className="bg-indigo-950/60 border-2 border-indigo-700 rounded-3xl px-8 py-6 mb-4 w-full max-w-sm text-center">
            <p className="text-indigo-400 text-xs font-black uppercase tracking-widest mb-1">Empiezas en</p>
            <p className="text-4xl font-black text-white mb-1">{p.level}</p>
            <p className="text-indigo-300 font-bold">{p.module}</p>
          </div>
          <div className="w-full max-w-sm bg-zinc-900 rounded-3xl p-5 border border-zinc-800 mb-4">
            <p className="text-white text-base font-black mb-1.5">{p.headline}</p>
            <p className="text-zinc-300 text-sm leading-snug">{p.offer}</p>
          </div>

          {/* ── Perfil por habilidad (para el alumno) ── */}
          <div className="w-full max-w-sm bg-zinc-900 rounded-3xl p-5 border border-zinc-800 mb-4">
            <p className="text-zinc-400 text-xs font-black uppercase tracking-widest mb-4">Tu perfil</p>
            <div className="space-y-3">
              {COGS.map(c => {
                const p = pct(c.k);
                return (
                  <div key={c.k}>
                    <div className="flex justify-between items-baseline mb-1">
                      <span className={`text-sm font-black ${c.text}`}>{c.label} <span className="text-zinc-600 font-medium text-xs">· {c.sub}</span></span>
                      <span className="text-zinc-400 text-xs font-bold">{p === null ? '—' : `${cog[c.k].ok}/${cog[c.k].n}`}</span>
                    </div>
                    <div className="h-2.5 bg-zinc-800 rounded-full overflow-hidden">
                      <div className={`h-full ${c.color} rounded-full transition-all`} style={{ width: `${p || 0}%` }} />
                    </div>
                  </div>
                );
              })}
            </div>
            {weakest && strongest && weakest.k !== strongest.k && (
              <p className="text-zinc-300 text-sm mt-4 leading-snug">
                Lo que más se te facilita: <span className={`font-black ${strongest.text}`}>{strongest.label.toLowerCase()}</span>.
                En lo que nos vamos a enfocar: <span className={`font-black ${weakest.text}`}>{weakest.label.toLowerCase()}</span>.
              </p>
            )}
          </div>

          {/* ── Detalle del algoritmo (full disclosure) ── */}
          <div className="w-full max-w-sm">
            <button onClick={() => setShowDetail(d => !d)} className="w-full text-zinc-500 text-xs font-bold py-2 hover:text-zinc-300 transition-colors">
              {showDetail ? '▾ Ocultar detalle' : '▸ Ver cómo se calculó (detalle)'}
            </button>
            {showDetail && (
              <div className="space-y-3 mt-1">
                <p className="text-zinc-600 text-[11px] text-center">{s.totalAsked} preguntas · Barco {(s.entryIdx ?? 0) + 1} → Barco {(finalIdx ?? 0) + 1}</p>
                {tramos.map((tr, i) => {
                  const e = (s.log || [])[i];
                  const d = e ? decLabel(e) : null;
                  return (
                    <div key={i} className="bg-zinc-900 rounded-2xl p-3 border border-zinc-800">
                      <p className="text-white text-xs font-black mb-2">Barco {tr.shipN} <span className="text-zinc-600 font-medium">· {SHIPS[tr.shipN - 1].level}</span> {e && <span className="text-zinc-600 font-medium">· {e.correct}/{e.n}</span>}</p>
                      <div className="flex flex-wrap gap-1.5 mb-1">
                        {tr.qs.map((h, j) => (
                          <span key={j} className={`text-[10px] font-bold px-2 py-1 rounded-md ${h.correct ? 'bg-emerald-900/40 text-emerald-300' : 'bg-red-900/40 text-red-300'}`}>
                            {LANE_ABBR[h.container]}/{h.tier[0]} {h.correct ? '✓' : '✗'}
                          </span>
                        ))}
                      </div>
                      {d && <p className={`text-[11px] font-bold mt-2 ${d.c}`}>{d.t}</p>}
                    </div>
                  );
                })}
                <p className="text-zinc-600 text-[10px] leading-snug px-1">C = Conoce · E = Entiende · P = Produce · f/m/d = fácil/media/difícil. El orden muestra cómo subió o bajó la dificultad según tus respuestas.</p>
              </div>
            )}
            {saving && <p className="text-center text-zinc-600 text-xs py-2">Guardando resultado...</p>}
          </div>
        </div>
      </div>
    );
  }

  // EXAM
  if (!currentQ) return null;
  const s = st.current;
  const ship = SHIPS[s.shipIdx];
  return (
    <div className="min-h-screen-safe bg-zinc-950 flex flex-col pt-safe">
      <header className="sticky top-0 z-20 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-5 py-3 shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-600/20">P</div>
          <div>
            <p className="text-white font-black text-sm leading-none">{ship.label}</p>
            <p className="text-indigo-400 text-[10px] font-bold uppercase tracking-widest mt-0.5">{LANE_LABEL[currentQ.container]} · {TIER_LABEL[currentQ.tier]}</p>
          </div>
        </div>
        <span className="text-zinc-500 text-sm font-bold">{s.totalAsked}</span>
      </header>
      <div className="px-5 pt-5 pb-1 shrink-0">
        <span className="text-[10px] font-black uppercase tracking-widest text-zinc-500">{TOOL_LABEL[currentQ.type] || currentQ.type}</span>
      </div>
      <div className="flex-1 px-5 pb-8 overflow-y-auto" key={qKey}>
        {renderQ(currentQ, handleAnswer)}
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<PlacementTest />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LM Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, X, Settings2, Key, Search, Settings, AlertTriangle, CheckSquare, CheckCircle2, ClipboardPaste, BookOpen } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ARQUETIPOS DE LA API ---
        const AI_MODALITIES = [
            { id: 'verbs', name: 'Tiempos Verbales (Irregulares)', desc: 'C1: Presente | C2: Pasado | C3: Participio' },
            { id: 'implicit_subject', name: 'Sujeto Implícito (ES ➔ EN)', desc: 'C1: Verbo ES (Suj. Oculto) | C2: Sujeto + Verbo EN | C3: Complemento Único' },
            { id: 'sentences', name: 'Frases Compuestas + Conjunciones', desc: 'C1: Oración 1 | C2: Conector (because, so...) | C3: Oración 2 congruente' },
            { id: 'conditionals', name: 'Condicionales (Las dos mitades)', desc: 'C1: If Clause | C2: Sujeto/Modal (I would) | C3: Verbo base + Resultado' },
            { id: 'questions', name: 'Preguntas y Respuestas (ES ➔ EN)', desc: 'C1: Pregunta ES | C2: Pregunta EN | C3: Respuesta Lógica y Única' },
            { id: 'phrasal_verbs', name: 'Phrasal Verbs (EN ➔ ES)', desc: 'C1: Verbo Base | C2: Partícula (up, off...) | C3: Significado (Español)' }
        ];

        // --- MÓDULOS DE GRAMÁTICA PERIPLO (EXTRAÍDOS DE EVALUACIONES.HTML) ---
        const GRAMMAR_MODULES = {
            basic: ["Modal Verbs", "Present Simple", "Present Continuous", "Future (Going to)"],
            advanced: ["Past Simple", "Second Conditional", "Past Continuous", "Past Future Intention"],
            pro: ["Present/Past Perfect", "Perfect Continuous", "Third Conditional", "Mixed Conditionals"]
        };

        const LMBuilder = () => {
            const [title, setTitle] = useState("");
            const [pairs, setPairs] = useState([{ id: 1, c1: '', c2: '', c3: '', isDuplicate: false }]);
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const [gameSettings, setGameSettings] = useState({ rounds: 4, rowsPerRound: 6 });
            const [magiaModal, setMagiaModal] = useState(false);
            
            const [aiConfig, setAiConfig] = useState({ 
                modality: 'implicit_subject', topic: '', c1Prompt: '', c2Prompt: '', c3Prompt: '', rows: 30 
            });

            // --- ESTADOS PARA EL FILTRO GRAMATICAL ---
            const [activeGrammarTab, setActiveGrammarTab] = useState('basic');
            const [selectedGrammar, setSelectedGrammar] = useState([]);
            
            const [bulkModal, setBulkModal] = useState(false);
            const [bulkText, setBulkText] = useState('');

            const [apiKey, setApiKey] = useState("");
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('');
            const [isLoadingModels, setIsLoadingModels] = useState(false);

            const abortControllerRef = useRef(null);

            useEffect(() => {
                const savedKey = localStorage.getItem('periplo_google_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(snap => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setTitle(data.title);
                            if (data.content.settings) setGameSettings(data.content.settings);
                            const loadedPairs = data.content.pairs.map(p => ({...p, isDuplicate: false}));
                            setPairs(loadedPairs);
                            setEditingId(editId);
                        }
                    });
                }
            }, []);

            const handleApiKeyChange = (e) => {
                const val = e.target.value;
                setApiKey(val);
                localStorage.setItem('periplo_google_key', val);
            };

            const addRow = () => setPairs([...pairs, { id: Date.now(), c1: '', c2: '', c3: '', isDuplicate: false }]);
            const removeRow = (id) => { if (pairs.length > 1) setPairs(pairs.filter(p => p.id !== id)); };

            // Función para seleccionar/deseleccionar gramática
            const toggleGrammar = (topic) => {
                setSelectedGrammar(prev => prev.includes(topic) ? prev.filter(t => t !== topic) : [...prev, topic]);
            };

            const processBulkText = () => {
                if (!bulkText.trim()) return;
                const lines = bulkText.split('\n');
                const newImportedPairs = [];
                
                lines.forEach((line, index) => {
                    let cleanLine = line.replace(/^\||\|$/g, '').trim();
                    if (!cleanLine) return;
                    const parts = cleanLine.split(/[\t|]+/).map(s => s.trim()).filter(s => s);
                    
                    if (parts.length >= 3) {
                        newImportedPairs.push({
                            id: Date.now() + index,
                            c1: parts[0], c2: parts[1], c3: parts[2], isDuplicate: false
                        });
                    }
                });

                if (newImportedPairs.length > 0) {
                    const currentPairs = pairs.filter(p => p.c1 || p.c2 || p.c3);
                    setPairs([...currentPairs, ...newImportedPairs]);
                    setBulkModal(false);
                    setBulkText('');
                } else {
                    alert("No se detectaron 3 columnas válidas.");
                }
            };

            const checkDuplicates = () => {
                let hasDupes = false;
                const seen = new Set();
                
                const newPairs = pairs.map(p => {
                    const val1 = p.c1.trim().toLowerCase();
                    if (!val1) return { ...p, isDuplicate: false };

                    const isDup = seen.has(val1);
                    if (val1) seen.add(val1);
                    if (isDup) hasDupes = true;
                    
                    return { ...p, isDuplicate: isDup };
                });

                setPairs(newPairs);
                if (!hasDupes) alert("Todo limpio. No se detectaron palabras repetidas en la Columna 1.");
            };

            const fetchModels = async () => {
                if (!apiKey) return alert("Ingresa tu API Key primero");
                setIsLoadingModels(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey.trim()}`);
                    if (!response.ok) throw new Error("Error conectando con Google");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name);
                    setAvailableModels(validModels);
                    if (validModels.length > 0) {
                        const preferred = validModels.find(m => m.includes("gemini-2.5-flash")) || validModels.find(m => m.includes("gemini-2.0")) || validModels.find(m => m.includes("gemini-1.5-flash")) || validModels[0];
                        setSelectedModel(preferred);
                    }
                } catch (e) { alert("Error al buscar modelos: " + e.message); } 
                finally { setIsLoadingModels(false); }
            };

            const cancelMagia = () => {
                if (abortControllerRef.current) {
                    abortControllerRef.current.abort();
                    setLoading(false);
                }
            };

            const executeMagia = async () => {
                if (!apiKey.trim()) return alert("⚠️ Necesitas ingresar tu API Key.");
                if (!selectedModel) return alert("⚠️ Escanea y selecciona un modelo primero (botón lupa).");
                
                let specificInstructions = "";
                
                // LÓGICA DE PROMPTS
                if (['verbs', 'implicit_subject', 'questions', 'phrasal_verbs', 'conditionals'].includes(aiConfig.modality)) {
                    if (!aiConfig.topic.trim()) return alert("Añade una instrucción o contexto en la caja de texto.");
                    
                    if (aiConfig.modality === 'verbs') {
                        specificInstructions = `- Instrucción General: "${aiConfig.topic}"`;
                    } else if (aiConfig.modality === 'implicit_subject') {
                        specificInstructions = `
                            - Tema/Contexto: "${aiConfig.topic}"
                            - REGLA C1: Verbo o frase corta en ESPAÑOL con sujeto implícito.
                            - REGLA C2: Traducción exacta al INGLÉS (Sujeto + Auxiliar/Verbo).
                            - REGLA C3: Complemento en INGLÉS MUY ESPECÍFICO para que solo encaje con esa oración.
                        `;
                    } else if (aiConfig.modality === 'phrasal_verbs') {
                        specificInstructions = `
                            - Tema/Contexto: "${aiConfig.topic}"
                            - REGLA C1: Solo el verbo base en inglés (ej. "give", "look").
                            - REGLA C2: Solo la partícula/preposición (ej. "up", "after").
                            - REGLA C3: Traducción exacta o significado en ESPAÑOL.
                        `;
                    } else if (aiConfig.modality === 'questions') {
                        specificInstructions = `
                            - Tema/Contexto: "${aiConfig.topic}"
                            - REGLA C1: Una pregunta COMPLETA y natural en ESPAÑOL (ej. "¿Cuándo compraste la casa?").
                            - REGLA C2: La traducción exacta de C1 al INGLÉS (ej. "When did you buy the house?").
                            - REGLA C3: Escribe una RESPUESTA LÓGICA Y MUY ESPECÍFICA en inglés para esa pregunta. PROHIBIDO poner nombres de tiempos gramaticales. (ej. "I bought it two years ago").
                            - ADVERTENCIA: La C3 debe ser el candado único que conecte lógicamente SÓLO con su C2 correspondiente.
                        `;
                    } else if (aiConfig.modality === 'conditionals') {
                        specificInstructions = `
                            - Tema/Contexto: "${aiConfig.topic}"
                            - REGLA C1: La condición ("If" clause). Ej: "If I won the lottery,"
                            - REGLA C2: El sujeto y modal de resultado. Ej: "I would"
                            - REGLA C3: El verbo base y contexto específico. Ej: "buy an island."
                        `;
                    }
                } else if (aiConfig.modality === 'sentences') {
                    if (!aiConfig.c1Prompt.trim() || !aiConfig.c2Prompt.trim() || !aiConfig.c3Prompt.trim()) {
                        return alert("Por favor llena las instrucciones para las 3 columnas.");
                    }
                    specificInstructions = `
                        - Tema General: Frases compuestas
                        - REGLA C1: ${aiConfig.c1Prompt}
                        - REGLA C2: ${aiConfig.c2Prompt}
                        - REGLA C3: ${aiConfig.c3Prompt}
                    `;
                }

                // INYECCIÓN DE RESTRICCIÓN GRAMATICAL
                if (selectedGrammar.length > 0) {
                    specificInstructions += `\n- RESTRICCIÓN GRAMATICAL ESTRICTA: SÓLO y EXCLUSIVAMENTE puedes usar las siguientes estructuras: ${selectedGrammar.join(', ')}. Está ESTRICTAMENTE PROHIBIDO usar otros tiempos verbales o gramática más compleja que no esté en esta lista.`;
                }

                setMagiaModal(false);
                setLoading(true);

                abortControllerRef.current = new AbortController();
                const selectedModality = AI_MODALITIES.find(m => m.id === aiConfig.modality);
                
                const promptText = `
                    Actúa como un profesor de inglés experto creando contenido para un juego de emparejamiento de tres columnas.
                    Genera exactamente un array JSON de ${aiConfig.rows} elementos.
                    
                    Reglas de estructura base (${selectedModality.name}):
                    ${selectedModality.desc}
                    
                    INSTRUCCIONES DEL PROFESOR:
                    ${specificInstructions}
                    
                    Formato JSON requerido estrictamente:
                    [
                      {
                        "c1": "texto columna 1",
                        "c2": "texto columna 2",
                        "c3": "texto columna 3"
                      }
                    ]
                    
                    Asegúrate estrictamente de NO REPETIR textos idénticos en la columna 1 para evitar choques en el juego.
                    NO devuelvas formato markdown, solo el array de JSON crudo.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7
                            }
                        }),
                        signal: abortControllerRef.current.signal
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const jsonString = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonString);

                    const newPairs = parsedData.map((item, index) => ({
                        id: Date.now() + index,
                        c1: item.c1 || '', c2: item.c2 || '', c3: item.c3 || '',
                        isDuplicate: false
                    }));

                    setPairs(newPairs);

                } catch (error) {
                    if (error.name === 'AbortError') console.log("Generación cancelada por el usuario.");
                    else { console.error("Error al generar:", error); alert("Ocurrió un error al contactar la IA.\n\n" + error.message); }
                } finally {
                    setLoading(false);
                    abortControllerRef.current = null;
                }
            };

            const save = async () => {
                if(!title.trim() || pairs.some(p => !p.c1 || !p.c2 || !p.c3)) {
                    alert("Asegúrate de tener un título y que ninguna columna esté vacía.");
                    return;
                }

                const totalNeeded = gameSettings.rounds * gameSettings.rowsPerRound;
                if (pairs.length < totalNeeded) {
                    alert(`⚠️ Error de configuración: Tu juego necesita ${totalNeeded} filas ( ${gameSettings.rounds} rondas x ${gameSettings.rowsPerRound} filas), pero solo tienes ${pairs.length} en tu banco.`);
                    return;
                }
                
                const cleanPairs = pairs.map(({ isDuplicate, ...rest }) => rest);
                
                setLoading(true);
                const data = { title, type: 'LINGOMATCH', content: { pairs: cleanPairs, settings: gameSettings }, updatedAt: serverTimestamp() };
                
                const params = new URLSearchParams(window.location.search);
                const folderParam = params.get('folder');
                const parentPath = (folderParam && folderParam !== 'undefined' && folderParam !== 'null') ? decodeURIComponent(folderParam) : '';
                data.parentPath = parentPath;

                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), data);
                    } else {
                        await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...data, createdAt: serverTimestamp() });
                    }
                    window.location.href = parentPath ? `index.html?folder=${encodeURIComponent(parentPath)}` : 'index.html';
                } catch(e) { alert(e.message); setLoading(false); }
            };

            const totalNeeded = gameSettings.rounds * gameSettings.rowsPerRound;
            const hasEnoughWords = pairs.length >= totalNeeded;

            return (
                <div className="max-w-5xl mx-auto p-6 relative">
                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-amber-500 mb-6" size={56}/>
                            <p className="text-amber-500 font-bold uppercase tracking-widest mb-8">Sintetizando Datos...</p>
                            <button onClick={cancelMagia} className="bg-rose-600 hover:bg-rose-500 text-white font-black px-6 py-3 rounded-full flex items-center gap-2 border-2 border-rose-700 transition-all active:scale-95 shadow-xl">
                                <X size={20}/> CANCELAR MAGIA
                            </button>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800 hover:bg-zinc-800 transition-colors"><ArrowLeft/></button>
                        <h1 className="text-2xl font-black italic text-indigo-400 tracking-tight">LM BUILDER</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setMagiaModal(true)} className="bg-amber-500 hover:bg-amber-400 text-black px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Sparkles size={18}/> <span className="hidden sm:inline">Magia</span></button>
                            <button onClick={save} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Save size={18}/> <span className="hidden sm:inline">Guardar</span></button>
                        </div>
                    </header>

                    <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título de este LingoMatch..." className="w-full bg-transparent text-3xl sm:text-4xl font-black border-b-2 border-zinc-800 mb-6 outline-none focus:border-indigo-500 pb-2 text-white placeholder-zinc-700"/>

                    <div className="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 mb-8">
                        <div className="flex items-center gap-2 mb-4 text-indigo-400 font-bold uppercase tracking-widest text-xs">
                            <Settings size={16}/> Configuración de Partida
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 items-end">
                            <div>
                                <label className="block text-xs font-bold text-zinc-500 uppercase mb-2">Total de Rondas</label>
                                <select value={gameSettings.rounds} onChange={e => setGameSettings({...gameSettings, rounds: parseInt(e.target.value)})} className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-white outline-none focus:border-indigo-500">
                                    {[3,4,5,6].map(num => <option key={num} value={num}>{num} Rondas</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-zinc-500 uppercase mb-2">Pares a resolver por ronda</label>
                                <select value={gameSettings.rowsPerRound} onChange={e => setGameSettings({...gameSettings, rowsPerRound: parseInt(e.target.value)})} className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-white outline-none focus:border-indigo-500">
                                    {[4,5,6,7,8].map(num => <option key={num} value={num}>{num} Pares</option>)}
                                </select>
                            </div>
                        </div>
                        
                        <div className={`mt-4 p-3 rounded-xl flex items-center gap-3 text-sm font-bold ${hasEnoughWords ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20 animate-pulse'}`}>
                            {hasEnoughWords ? <CheckCircle2 size={20}/> : <AlertTriangle size={20}/>}
                            <span>
                                El juego seleccionará aleatoriamente <strong>{totalNeeded} combinaciones</strong> de tu banco.
                                {!hasEnoughWords && ` (Te faltan ${totalNeeded - pairs.length} palabras para que la matemática cuadre).`}
                            </span>
                        </div>
                    </div>

                    <div className="space-y-3">
                        {pairs.map((p, idx) => (
                            <div key={p.id} className={`grid grid-cols-1 md:grid-cols-12 gap-2 bg-zinc-900 pt-6 pb-4 px-4 rounded-2xl border-2 relative group transition-all ${p.isDuplicate ? 'border-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.3)]' : 'border-zinc-800'}`}>
                                
                                <div className="absolute -left-2 -top-2 bg-indigo-600 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs font-black shadow-md border-2 border-zinc-900 z-10">
                                    {idx + 1}
                                </div>

                                {pairs.length > 1 && (
                                    <button onClick={() => removeRow(p.id)} className="absolute -right-2 -top-2 bg-rose-500 hover:bg-rose-400 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg md:hidden group-hover:md:flex z-10">
                                        <Trash2 size={14}/>
                                    </button>
                                )}

                                <div className="md:col-span-4">
                                    <label className={`text-[10px] font-bold uppercase mb-1 block pl-2 ${p.isDuplicate ? 'text-rose-400' : 'text-zinc-500'}`}>Columna 1 (Llave)</label>
                                    <input value={p.c1} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].c1 = e.target.value; n[idx].isDuplicate = false; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/>
                                </div>
                                <div className="md:col-span-4">
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase mb-1 block pl-2">Columna 2</label>
                                    <input value={p.c2} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].c2 = e.target.value; n[idx].isDuplicate = false; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/>
                                </div>
                                <div className="md:col-span-4">
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase mb-1 block pl-2">Columna 3</label>
                                    <input value={p.c3} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].c3 = e.target.value; n[idx].isDuplicate = false; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="flex flex-col sm:flex-row gap-3 mt-6">
                        <button onClick={addRow} className="flex-1 py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-bold flex items-center justify-center gap-2 hover:bg-zinc-900 transition-colors">
                            <Plus/> Añadir Fila Manualmente
                        </button>
                        
                        <button onClick={() => setBulkModal(true)} className="flex-none sm:w-1/4 py-4 bg-zinc-900 border border-zinc-700 hover:border-indigo-500 rounded-2xl text-zinc-400 hover:text-indigo-400 font-bold flex items-center justify-center gap-2 transition-colors">
                            <ClipboardPaste size={18}/> Pegado Rápido
                        </button>

                        <button onClick={checkDuplicates} className="flex-none sm:w-1/4 py-4 bg-zinc-900 border border-zinc-700 hover:border-rose-500 rounded-2xl text-zinc-400 hover:text-rose-400 font-bold flex items-center justify-center gap-2 transition-colors">
                            <CheckSquare size={18}/> Verificar Duplicados
                        </button>
                    </div>

                    {/* MODAL PEGADO RÁPIDO */}
                    {bulkModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-500/20 p-2 rounded-xl text-indigo-500"><ClipboardPaste size={24}/></div>
                                        <div><h3 className="font-black text-xl text-white">Pegado Rápido (Tablas)</h3></div>
                                    </div>
                                    <button onClick={() => setBulkModal(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                </div>
                                <div className="p-6">
                                    <p className="text-sm text-zinc-400 mb-4">Copia las celdas de Excel o una tabla de la IA y pégalas aquí. El sistema cortará las 3 columnas automáticamente.</p>
                                    <textarea 
                                        value={bulkText} 
                                        onChange={e => setBulkText(e.target.value)} 
                                        placeholder="Col1    Col2    Col3..."
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm text-white focus:border-indigo-500 outline-none h-64 resize-none font-mono whitespace-pre"
                                    />
                                </div>
                                <div className="p-6 border-t border-zinc-800 bg-zinc-950 shrink-0 flex gap-3">
                                    <button onClick={() => setBulkModal(false)} className="flex-1 text-zinc-400 font-bold hover:text-white transition-colors">Cancelar</button>
                                    <button onClick={processBulkText} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-black uppercase tracking-widest transition-colors shadow-lg">Importar Datos</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIGURADOR DE IA */}
                    {magiaModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-amber-500/20 p-2 rounded-xl text-amber-500"><Settings2 size={24}/></div>
                                        <div><h3 className="font-black text-xl text-white">Configuración de IA</h3><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Motor LingoMatch</p></div>
                                    </div>
                                    <button onClick={() => setMagiaModal(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                                    <div className="bg-black/30 p-4 rounded-xl border border-zinc-800/50 flex flex-col sm:flex-row gap-2 items-center">
                                        <div className="w-full flex items-center gap-2 bg-zinc-900 p-1.5 rounded-xl border border-zinc-700">
                                            <Key size={14} className="text-zinc-500 ml-2 shrink-0"/>
                                            <input type="password" placeholder="Tu API Key real..." value={apiKey} onChange={handleApiKeyChange} className="bg-transparent text-white px-2 py-1 text-xs font-mono w-full focus:outline-none"/>
                                            <button onClick={fetchModels} disabled={isLoadingModels || !apiKey} className="p-2 bg-amber-500 hover:bg-amber-400 text-black rounded-lg transition-colors shrink-0" title="Escanear Modelos">
                                                {isLoadingModels ? <Loader2 className="animate-spin" size={16}/> : <Search size={16}/>}
                                            </button>
                                        </div>
                                        {availableModels.length > 0 && (
                                            <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2.5 text-xs text-white w-full sm:w-auto outline-none">
                                                {availableModels.map(m => <option key={m} value={m}>{m.replace('models/', '')}</option>)}
                                            </select>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">1. Selecciona la Modalidad</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {AI_MODALITIES.map(mod => (
                                                <div key={mod.id} onClick={() => setAiConfig({...aiConfig, modality: mod.id})} className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${aiConfig.modality === mod.id ? 'border-amber-500 bg-amber-500/10' : 'border-zinc-800 bg-zinc-950 hover:border-zinc-700'}`}>
                                                    <h4 className={`font-bold text-sm mb-1 ${aiConfig.modality === mod.id ? 'text-amber-400' : 'text-zinc-300'}`}>{mod.name}</h4>
                                                    <p className="text-[10px] text-zinc-500 font-medium leading-relaxed">{mod.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* RENDERIZADO DINÁMICO */}
                                    {aiConfig.modality === 'sentences' ? (
                                        <div>
                                            <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">2. Reglas Específicas</label>
                                            <div className="space-y-3">
                                                <div>
                                                    <label className="text-[10px] font-bold text-indigo-400 uppercase">Oración 1</label>
                                                    <input value={aiConfig.c1Prompt} onChange={e => setAiConfig({...aiConfig, c1Prompt: e.target.value})} placeholder="Instrucción estricta para esta columna..." className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:border-indigo-500 outline-none"/>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-amber-400 uppercase">Conector</label>
                                                    <input value={aiConfig.c2Prompt} onChange={e => setAiConfig({...aiConfig, c2Prompt: e.target.value})} placeholder="Instrucción estricta para esta columna..." className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:border-amber-500 outline-none"/>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-emerald-400 uppercase">Oración 2</label>
                                                    <input value={aiConfig.c3Prompt} onChange={e => setAiConfig({...aiConfig, c3Prompt: e.target.value})} placeholder="Instrucción estricta para esta columna..." className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:border-emerald-500 outline-none"/>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">2. Instrucción o Contexto</label>
                                            <textarea 
                                                value={aiConfig.topic} 
                                                onChange={e => setAiConfig({...aiConfig, topic: e.target.value})} 
                                                placeholder={AI_MODALITIES.find(m => m.id === aiConfig.modality).placeholder}
                                                className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm text-white focus:border-amber-500 outline-none h-24 resize-none"
                                            />
                                        </div>
                                    )}

                                    {/* NUEVO FILTRO GRAMATICAL (PASO 3) */}
                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">3. Filtro Gramatical (Opcional)</label>
                                        <div className="bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden">
                                            <div className="flex border-b border-zinc-800">
                                                {['basic', 'advanced', 'pro'].map(tab => (
                                                    <button 
                                                        key={tab} 
                                                        onClick={() => setActiveGrammarTab(tab)}
                                                        className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-colors ${activeGrammarTab === tab ? 'bg-zinc-800 text-white' : 'text-zinc-500 hover:bg-zinc-900/50'}`}
                                                    >
                                                        {tab}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="p-4 flex flex-wrap gap-2">
                                                {GRAMMAR_MODULES[activeGrammarTab].map(topic => {
                                                    const isSelected = selectedGrammar.includes(topic);
                                                    return (
                                                        <button 
                                                            key={topic}
                                                            onClick={() => toggleGrammar(topic)}
                                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${isSelected ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-zinc-900 border-zinc-700 text-zinc-400 hover:border-zinc-500'}`}
                                                        >
                                                            {topic}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">4. Cantidad de Filas (Max 60)</label>
                                        <input type="range" min="3" max="60" step="1" value={aiConfig.rows} onChange={e => setAiConfig({...aiConfig, rows: parseInt(e.target.value)})} className="w-full accent-amber-500"/>
                                        <div className="text-center font-black text-amber-500 mt-2">{aiConfig.rows} Filas a Generar</div>
                                    </div>
                                </div>

                                <div className="p-6 border-t border-zinc-800 bg-zinc-950 shrink-0">
                                    <button onClick={executeMagia} className="w-full bg-amber-500 hover:bg-amber-400 text-black py-4 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-colors"><Sparkles size={20}/> Generar {aiConfig.rows} Filas</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LMBuilder />);
    </script>
</body>
</html>

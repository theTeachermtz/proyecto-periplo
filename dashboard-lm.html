<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LM Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, Zap } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LMBuilder = () => {
            const [title, setTitle] = useState("");
            const [pairs, setPairs] = useState([{ id: 1, c1: '', c2: '', c3: '', exp: '' }]);
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(snap => {
                        if (snap.exists()) {
                            setTitle(snap.data().title);
                            setPairs(snap.data().content.pairs);
                            setEditingId(editId);
                        }
                    });
                }
            }, []);

            const addRow = () => setPairs([...pairs, { id: Date.now(), c1: '', c2: '', c3: '', exp: '' }]);
            
            const handleMagia = async () => {
                const prompt = prompt("¿Sobre qué tema quieres generar el LingoMatch? (Ej: Muebles, Verbos Irregulares, Ropa)");
                if (!prompt) return;
                setLoading(true);
                // Aquí iría el fetch a tu endpoint de Gemini/AI
                alert("Simulando IA: Generando 8 filas sobre " + prompt);
                setPairs([
                    { id: 1, c1: 'Un', c2: 'Sofá', c3: 'Sofa', exp: 'Sofá es masculino aunque termine en A.' },
                    { id: 2, c1: 'Una', c2: 'Silla', c3: 'Chair', exp: 'Silla es femenino regular.' },
                    // ... etc
                ]);
                setLoading(false);
            };

            const save = async () => {
                setLoading(true);
                const data = { 
                    title, 
                    type: 'LINGOMATCH', 
                    content: { pairs }, 
                    updatedAt: serverTimestamp() 
                };
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), data);
                } else {
                    await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...data, createdAt: serverTimestamp() });
                }
                window.location.href = 'index.html';
            };

            return (
                <div className="max-w-5xl mx-auto p-6">
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800"><ArrowLeft/></button>
                        <h1 className="text-2xl font-black italic text-indigo-400">LM BUILDER</h1>
                        <div className="flex gap-2">
                            <button onClick={handleMagia} className="bg-amber-500 text-black px-6 py-2 rounded-xl font-bold flex gap-2 items-center"><Sparkles size={18}/> Magia</button>
                            <button onClick={save} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex gap-2 items-center"><Save size={18}/> Guardar</button>
                        </div>
                    </header>

                    <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título del reto..." className="w-full bg-transparent text-4xl font-black border-b-2 border-zinc-800 mb-8 outline-none focus:border-indigo-500 pb-2"/>

                    <div className="space-y-3">
                        {pairs.map((p, idx) => (
                            <div key={p.id} className="grid grid-cols-4 gap-2 bg-zinc-900 p-2 rounded-2xl border border-zinc-800">
                                <input value={p.c1} placeholder="Col 1 (Art)" onChange={e => { const n = [...pairs]; n[idx].c1 = e.target.value; setPairs(n); }} className="bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold"/>
                                <input value={p.c2} placeholder="Col 2 (ES)" onChange={e => { const n = [...pairs]; n[idx].c2 = e.target.value; setPairs(n); }} className="bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold"/>
                                <input value={p.c3} placeholder="Col 3 (EN)" onChange={e => { const n = [...pairs]; n[idx].c3 = e.target.value; setPairs(n); }} className="bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold"/>
                                <input value={p.exp} placeholder="Explicación error" onChange={e => { const n = [...pairs]; n[idx].exp = e.target.value; setPairs(n); }} className="bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-xs text-zinc-500"/>
                            </div>
                        ))}
                    </div>
                    <button onClick={addRow} className="mt-4 w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-600 font-bold flex items-center justify-center gap-2 hover:bg-zinc-900/50"><Plus/> Añadir Fila</button>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LMBuilder />);
    </script>
</body>
</html>

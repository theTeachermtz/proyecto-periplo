<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LM Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, X, Settings2 } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ARQUETIPOS DE GENERACIÓN PARA LA API
        const AI_MODALITIES = [
            { 
                id: 'syntax', 
                name: 'Construcción de Sintaxis', 
                desc: 'C1: Sujeto | C2: Auxiliar/Modal | C3: Verbo + Complemento',
                placeholder: 'Ej: Diferencia entre Present Simple y Continuous'
            },
            { 
                id: 'gender', 
                name: 'Género y Artículos (Estilo Anita)', 
                desc: 'C1: Artículo (El/La/Un) | C2: Sustantivo (ES) | C3: Traducción (EN)',
                placeholder: 'Ej: Excepciones de género (el problema, la mano)'
            },
            { 
                id: 'verbs', 
                name: 'Tiempos Verbales', 
                desc: 'C1: Presente | C2: Pasado | C3: Participio',
                placeholder: 'Ej: Verbos irregulares comunes'
            },
            { 
                id: 'phrasals', 
                name: 'Phrasal Verbs', 
                desc: 'C1: Verbo base | C2: Preposición | C3: Significado (ES)',
                placeholder: 'Ej: Phrasal verbs con Get y Take'
            }
        ];

        const LMBuilder = () => {
            const [title, setTitle] = useState("");
            const [pairs, setPairs] = useState([{ id: 1, c1: '', c2: '', c3: '', exp: '' }]);
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            // Estado del modal de Magia
            const [magiaModal, setMagiaModal] = useState(false);
            const [aiConfig, setAiConfig] = useState({ modality: 'syntax', topic: '', rows: 6 });

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(snap => {
                        if (snap.exists()) {
                            setTitle(snap.data().title);
                            setPairs(snap.data().content.pairs);
                            setEditingId(editId);
                        }
                    });
                }
            }, []);

            const addRow = () => setPairs([...pairs, { id: Date.now(), c1: '', c2: '', c3: '', exp: '' }]);
            const removeRow = (id) => { if (pairs.length > 1) setPairs(pairs.filter(p => p.id !== id)); };

            // LÓGICA DE PREPARACIÓN PARA GEMINI API
            const executeMagia = async () => {
                if (!aiConfig.topic.trim()) {
                    alert("Necesitas especificar el tema, Isra.");
                    return;
                }
                
                setMagiaModal(false);
                setLoading(true);

                // Aquí es donde construimos el mega-prompt blindado que enviaremos a Gemini
                const selectedModality = AI_MODALITIES.find(m => m.id === aiConfig.modality);
                
                const systemPrompt = `
                    Eres un experto pedagogo de inglés. Genera exactamente ${aiConfig.rows} filas de datos en formato JSON para un juego de emparejamiento triple.
                    Tema solicitado: "${aiConfig.topic}".
                    
                    Reglas estrictas de estructura (${selectedModality.name}):
                    ${selectedModality.desc}
                    La llave 'exp' debe contener una explicación breve (máx 15 palabras) de por qué esa combinación es correcta o el error común que previene.

                    Devuelve SOLO un array de JSON válido con las llaves: c1, c2, c3, exp. Cero markdown, cero texto extra.
                `;

                console.log("PROMPT ENVIADO A LA API:", systemPrompt);

                // TODO: Aquí va el fetch real a la API de Gemini (await fetch('https://generativelanguage...'))
                // Por ahora simulamos la respuesta tras 2 segundos.

                setTimeout(() => {
                    let mockData = [];
                    if (aiConfig.modality === 'syntax') {
                        mockData = [
                            { id: 1, c1: 'She', c2: 'doesn\'t', c3: 'eat meat', exp: 'Con He/She/It usamos doesn\'t en negativo, no don\'t.' },
                            { id: 2, c1: 'They', c2: 'are', c3: 'playing now', exp: 'Continuous requiere el verbo To Be como auxiliar.' }
                        ];
                    } else if (aiConfig.modality === 'gender') {
                        mockData = [
                            { id: 1, c1: 'El', c2: 'problema', c3: 'Problem', exp: 'Termina en A, pero es una excepción masculina (origen griego).' },
                            { id: 2, c1: 'La', c2: 'mano', c3: 'Hand', exp: 'Termina en O, pero es una excepción femenina.' }
                        ];
                    } else {
                        mockData = [
                            { id: 1, c1: 'Ejemplo 1', c2: 'Ejemplo 2', c3: 'Ejemplo 3', exp: 'Generado vía simulación.' }
                        ];
                    }

                    setPairs(mockData);
                    setLoading(false);
                }, 2000);
            };

            const save = async () => {
                if(!title.trim() || pairs.some(p => !p.c1 || !p.c2 || !p.c3)) {
                    alert("Asegúrate de tener un título y que ninguna columna esté vacía.");
                    return;
                }
                setLoading(true);
                const data = { title, type: 'LINGOMATCH', content: { pairs }, updatedAt: serverTimestamp() };
                try {
                    if (editingId) await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), data);
                    else await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...data, createdAt: serverTimestamp() });
                    window.location.href = 'index.html';
                } catch(e) { alert(e.message); setLoading(false); }
            };

            return (
                <div className="max-w-5xl mx-auto p-6 relative">
                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-amber-500 mb-4" size={48}/>
                            <p className="text-amber-500 font-bold uppercase tracking-widest animate-pulse">Sintetizando Datos...</p>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800 hover:bg-zinc-800 transition-colors"><ArrowLeft/></button>
                        <h1 className="text-2xl font-black italic text-indigo-400 tracking-tight">LM BUILDER</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setMagiaModal(true)} className="bg-amber-500 hover:bg-amber-400 text-black px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Sparkles size={18}/> <span className="hidden sm:inline">Magia</span></button>
                            <button onClick={save} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Save size={18}/> <span className="hidden sm:inline">Guardar</span></button>
                        </div>
                    </header>

                    <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título de este LingoMatch..." className="w-full bg-transparent text-3xl sm:text-4xl font-black border-b-2 border-zinc-800 mb-8 outline-none focus:border-indigo-500 pb-2 text-white placeholder-zinc-700"/>

                    <div className="space-y-3">
                        {pairs.map((p, idx) => (
                            <div key={p.id} className="grid grid-cols-1 md:grid-cols-12 gap-2 bg-zinc-900 p-3 rounded-2xl border border-zinc-800 relative group">
                                <div className="md:col-span-3"><input value={p.c1} placeholder="Columna 1" onChange={e => { const n = [...pairs]; n[idx].c1 = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/></div>
                                <div className="md:col-span-3"><input value={p.c2} placeholder="Columna 2" onChange={e => { const n = [...pairs]; n[idx].c2 = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/></div>
                                <div className="md:col-span-3"><input value={p.c3} placeholder="Columna 3" onChange={e => { const n = [...pairs]; n[idx].c3 = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/></div>
                                <div className="md:col-span-3"><input value={p.exp} placeholder="Explicación del error..." onChange={e => { const n = [...pairs]; n[idx].exp = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-xs text-amber-400/70 focus:border-amber-500 outline-none"/></div>
                                
                                {pairs.length > 1 && (
                                    <button onClick={() => removeRow(p.id)} className="absolute -left-3 -top-3 bg-rose-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg md:hidden group-hover:md:block"><Trash2 size={14}/></button>
                                )}
                            </div>
                        ))}
                    </div>
                    
                    <button onClick={addRow} className="mt-6 w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-bold flex items-center justify-center gap-2 hover:bg-zinc-900 transition-colors"><Plus/> Añadir Fila Manualmente</button>

                    {/* MODAL CONFIGURADOR DE IA */}
                    {magiaModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-amber-500/20 p-2 rounded-xl text-amber-500"><Settings2 size={24}/></div>
                                        <div><h3 className="font-black text-xl text-white">Configuración de IA</h3><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Motor LingoMatch</p></div>
                                    </div>
                                    <button onClick={() => setMagiaModal(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">1. Selecciona la Modalidad (Columnas)</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {AI_MODALITIES.map(mod => (
                                                <div key={mod.id} onClick={() => setAiConfig({...aiConfig, modality: mod.id})} className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${aiConfig.modality === mod.id ? 'border-amber-500 bg-amber-500/10' : 'border-zinc-800 bg-zinc-950 hover:border-zinc-700'}`}>
                                                    <h4 className={`font-bold text-sm mb-1 ${aiConfig.modality === mod.id ? 'text-amber-400' : 'text-zinc-300'}`}>{mod.name}</h4>
                                                    <p className="text-[10px] text-zinc-500 font-medium leading-relaxed">{mod.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">2. Escribe el Tema Específico</label>
                                        <textarea 
                                            value={aiConfig.topic} 
                                            onChange={e => setAiConfig({...aiConfig, topic: e.target.value})} 
                                            placeholder={AI_MODALITIES.find(m => m.id === aiConfig.modality).placeholder}
                                            className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm text-white focus:border-amber-500 outline-none h-24 resize-none"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">3. Cantidad de Filas (Max 12 recomendadas)</label>
                                        <input type="range" min="3" max="15" step="1" value={aiConfig.rows} onChange={e => setAiConfig({...aiConfig, rows: parseInt(e.target.value)})} className="w-full accent-amber-500"/>
                                        <div className="text-center font-black text-amber-500 mt-2">{aiConfig.rows} Filas</div>
                                    </div>
                                </div>

                                <div className="p-6 border-t border-zinc-800 bg-zinc-950 shrink-0">
                                    <button onClick={executeMagia} className="w-full bg-amber-500 hover:bg-amber-400 text-black py-4 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-colors"><Sparkles size={20}/> Generar con Gemini API</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LMBuilder />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LM Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, ArrowLeft, Sparkles, Plus, Trash2, Loader2, X, Settings2, Key } from 'lucide-react';

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ARQUETIPOS DE LA API ---
        const AI_MODALITIES = [
            { 
                id: 'verbs', 
                name: 'Tiempos Verbales (Irregulares)', 
                desc: 'C1: Presente | C2: Pasado | C3: Participio',
                placeholder: 'Ej: Dame 12 verbos irregulares agrupados por similitud fonética.'
            },
            { 
                id: 'sentences', 
                name: 'Frases Compuestas + Conjunciones', 
                desc: 'C1: Oración 1 | C2: Conector (because, so, and...) | C3: Oración 2 congruente',
                placeholder: 'Ej: Crea oraciones usando SÓLO modal verbs (can, must, will, should).'
            }
        ];

        const LMBuilder = () => {
            const [title, setTitle] = useState("");
            const [pairs, setPairs] = useState([{ id: 1, c1: '', c2: '', c3: '', exp: '' }]);
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const [magiaModal, setMagiaModal] = useState(false);
            const [aiConfig, setAiConfig] = useState({ modality: 'sentences', topic: '', rows: 6 });
            
            // --- ESTADO Y PERSISTENCIA DE LA API KEY ---
            const [apiKey, setApiKey] = useState("");

            useEffect(() => {
                // Recuperar la llave de la memoria local al cargar
                const savedKey = localStorage.getItem('periplo_gemini_api_key');
                if (savedKey) setApiKey(savedKey);

                const params = new URLSearchParams(window.location.search);
                const editId = params.get('edit');
                if (editId) {
                    getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editId)).then(snap => {
                        if (snap.exists()) {
                            setTitle(snap.data().title);
                            setPairs(snap.data().content.pairs);
                            setEditingId(editId);
                        }
                    });
                }
            }, []);

            const handleApiKeyChange = (e) => {
                const val = e.target.value;
                setApiKey(val);
                localStorage.setItem('periplo_gemini_api_key', val); // Autoguardar
            };

            const addRow = () => setPairs([...pairs, { id: Date.now(), c1: '', c2: '', c3: '', exp: '' }]);
            const removeRow = (id) => { if (pairs.length > 1) setPairs(pairs.filter(p => p.id !== id)); };

            // --- LLAMADA REAL A GEMINI API ---
            const executeMagia = async () => {
                if (!apiKey.trim()) {
                    alert("⚠️ Error: Necesitas ingresar tu API Key de Gemini en la configuración.");
                    return;
                }

                if (!aiConfig.topic.trim()) {
                    alert("Añade una instrucción o tema en la caja de texto.");
                    return;
                }
                
                setMagiaModal(false);
                setLoading(true);

                const selectedModality = AI_MODALITIES.find(m => m.id === aiConfig.modality);
                
                const promptText = `
                    Actúa como un profesor de inglés experto creando contenido para un juego de emparejamiento de tres columnas.
                    Genera exactamente un array JSON de ${aiConfig.rows} elementos.
                    
                    Reglas de estructura (${selectedModality.name}):
                    ${selectedModality.desc}
                    
                    Instrucción específica del tema: "${aiConfig.topic}"
                    
                    Formato JSON requerido estrictamente:
                    [
                      {
                        "c1": "texto columna 1",
                        "c2": "texto columna 2",
                        "c3": "texto columna 3",
                        "exp": "Explicación breve de por qué es correcto o qué regla aplica (máximo 15 palabras)."
                      }
                    ]
                    
                    NO devuelvas formato markdown (ni siquiera las comillas de código), solo el array de JSON crudo.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7
                            }
                        })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message);
                    }

                    const jsonString = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonString);

                    const newPairs = parsedData.map((item, index) => ({
                        id: Date.now() + index,
                        c1: item.c1 || '',
                        c2: item.c2 || '',
                        c3: item.c3 || '',
                        exp: item.exp || ''
                    }));

                    setPairs(newPairs);

                } catch (error) {
                    console.error("Error al generar con Gemini:", error);
                    alert("Ocurrió un error al contactar la IA. Revisa tu API Key y la consola para más detalles.\n\n" + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const save = async () => {
                if(!title.trim() || pairs.some(p => !p.c1 || !p.c2 || !p.c3)) {
                    alert("Asegúrate de tener un título y que ninguna columna esté vacía.");
                    return;
                }
                setLoading(true);
                const data = { title, type: 'LINGOMATCH', content: { pairs }, updatedAt: serverTimestamp() };
                try {
                    if (editingId) await updateDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', editingId), data);
                    else await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), { ...data, createdAt: serverTimestamp() });
                    window.location.href = 'index.html';
                } catch(e) { alert(e.message); setLoading(false); }
            };

            return (
                <div className="max-w-5xl mx-auto p-6 relative">
                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
                            <Loader2 className="animate-spin text-amber-500 mb-4" size={48}/>
                            <p className="text-amber-500 font-bold uppercase tracking-widest animate-pulse">Sintetizando Datos...</p>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href='index.html'} className="p-2 bg-zinc-900 rounded-xl border border-zinc-800 hover:bg-zinc-800 transition-colors"><ArrowLeft/></button>
                        <h1 className="text-2xl font-black italic text-indigo-400 tracking-tight">LM BUILDER</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setMagiaModal(true)} className="bg-amber-500 hover:bg-amber-400 text-black px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Sparkles size={18}/> <span className="hidden sm:inline">Magia</span></button>
                            <button onClick={save} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 sm:px-6 py-2 rounded-xl font-bold flex gap-2 items-center transition-colors"><Save size={18}/> <span className="hidden sm:inline">Guardar</span></button>
                        </div>
                    </header>

                    <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título de este LingoMatch..." className="w-full bg-transparent text-3xl sm:text-4xl font-black border-b-2 border-zinc-800 mb-8 outline-none focus:border-indigo-500 pb-2 text-white placeholder-zinc-700"/>

                    <div className="space-y-3">
                        {pairs.map((p, idx) => (
                            <div key={p.id} className="grid grid-cols-1 md:grid-cols-12 gap-2 bg-zinc-900 p-3 rounded-2xl border border-zinc-800 relative group transition-all">
                                <div className="md:col-span-3">
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase mb-1 block pl-2">Columna 1</label>
                                    <input value={p.c1} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].c1 = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/>
                                </div>
                                <div className="md:col-span-3">
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase mb-1 block pl-2">Columna 2</label>
                                    <input value={p.c2} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].c2 = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/>
                                </div>
                                <div className="md:col-span-3">
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase mb-1 block pl-2">Columna 3</label>
                                    <input value={p.c3} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].c3 = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-sm font-bold text-white focus:border-indigo-500 outline-none"/>
                                </div>
                                <div className="md:col-span-3">
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase mb-1 block pl-2">Explicación Modal</label>
                                    <input value={p.exp} placeholder="..." onChange={e => { const n = [...pairs]; n[idx].exp = e.target.value; setPairs(n); }} className="w-full bg-zinc-950 p-3 rounded-xl border border-zinc-800 text-xs text-amber-400/70 focus:border-amber-500 outline-none"/>
                                </div>
                                
                                {pairs.length > 1 && (
                                    <button onClick={() => removeRow(p.id)} className="absolute -left-3 -top-3 bg-rose-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg md:hidden group-hover:md:block"><Trash2 size={14}/></button>
                                )}
                            </div>
                        ))}
                    </div>
                    
                    <button onClick={addRow} className="mt-6 w-full py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-bold flex items-center justify-center gap-2 hover:bg-zinc-900 transition-colors"><Plus/> Añadir Fila Manualmente</button>

                    {/* MODAL CONFIGURADOR DE IA */}
                    {magiaModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[2rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-amber-500/20 p-2 rounded-xl text-amber-500"><Settings2 size={24}/></div>
                                        <div><h3 className="font-black text-xl text-white">Configuración de IA</h3><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Motor LingoMatch</p></div>
                                    </div>
                                    <button onClick={() => setMagiaModal(false)} className="p-2 hover:bg-zinc-800 rounded-full text-zinc-400 transition-colors"><X size={20}/></button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                                    
                                    {/* CAMPO API KEY */}
                                    <div className="bg-black/30 p-4 rounded-xl border border-zinc-800/50">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 flex items-center gap-2"><Key size={14}/> Gemini API Key</label>
                                        <input 
                                            type="password" 
                                            value={apiKey} 
                                            onChange={handleApiKeyChange} 
                                            placeholder="AIzaSy..." 
                                            className="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm text-white focus:border-amber-500 outline-none transition-colors"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">1. Selecciona la Modalidad (Columnas)</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {AI_MODALITIES.map(mod => (
                                                <div key={mod.id} onClick={() => setAiConfig({...aiConfig, modality: mod.id})} className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${aiConfig.modality === mod.id ? 'border-amber-500 bg-amber-500/10' : 'border-zinc-800 bg-zinc-950 hover:border-zinc-700'}`}>
                                                    <h4 className={`font-bold text-sm mb-1 ${aiConfig.modality === mod.id ? 'text-amber-400' : 'text-zinc-300'}`}>{mod.name}</h4>
                                                    <p className="text-[10px] text-zinc-500 font-medium leading-relaxed">{mod.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">2. Instrucción Pedagógica (Prompt)</label>
                                        <textarea 
                                            value={aiConfig.topic} 
                                            onChange={e => setAiConfig({...aiConfig, topic: e.target.value})} 
                                            placeholder={AI_MODALITIES.find(m => m.id === aiConfig.modality).placeholder}
                                            className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-sm text-white focus:border-amber-500 outline-none h-24 resize-none"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">3. Cantidad de Filas (Tripletas)</label>
                                        <input type="range" min="3" max="15" step="1" value={aiConfig.rows} onChange={e => setAiConfig({...aiConfig, rows: parseInt(e.target.value)})} className="w-full accent-amber-500"/>
                                        <div className="text-center font-black text-amber-500 mt-2">{aiConfig.rows} Filas</div>
                                    </div>
                                </div>

                                <div className="p-6 border-t border-zinc-800 bg-zinc-950 shrink-0">
                                    <button onClick={executeMagia} className="w-full bg-amber-500 hover:bg-amber-400 text-black py-4 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-colors"><Sparkles size={20}/> Generar con Gemini API</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LMBuilder />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Buildings | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // 🍏 FIX SAFARI: Evita el "Sticky Hover" en móviles
        tailwind.config = { 
            future: { hoverOnlyWhenSupported: true },
            darkMode: 'class' 
        }; 
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #09090b; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .building-bg {
            background: linear-gradient(to top, 
                #1e293b 0%, #0ea5e9 20%, #3b82f6 40%, #1e3a8a 60%, #0f172a 80%, #000000 100%
            );
            background-size: 100% 500%;
            transition: background-position 1.5s ease-out;
        }

        .space-stars {
            background-image: 
                radial-gradient(1px 1px at 10% 10%, white 100%, transparent),
                radial-gradient(2px 2px at 20% 30%, white 100%, transparent),
                radial-gradient(1px 1px at 30% 80%, white 100%, transparent),
                radial-gradient(2px 2px at 40% 40%, rgba(255,255,255,0.8) 100%, transparent),
                radial-gradient(1px 1px at 50% 10%, white 100%, transparent),
                radial-gradient(2px 2px at 60% 60%, white 100%, transparent),
                radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.8) 100%, transparent),
                radial-gradient(2px 2px at 80% 80%, white 100%, transparent),
                radial-gradient(1px 1px at 90% 40%, white 100%, transparent);
            background-size: 200px 200px;
            opacity: 0;
            transition: opacity 2s;
        }

        .crane-cable {
            position: absolute;
            width: 3px;
            background: linear-gradient(to bottom, #f8fafc, #94a3b8);
            left: 50%;
            transform: translateX(-50%);
            transform-origin: top center;
            z-index: 10;
        }

        .block-texture {
            background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.4s; }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
        }
        .float-text { animation: floatUp 0.8s ease-out forwards; pointer-events: none; }

        @keyframes fallDebris {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
        }
        .debris { animation: fallDebris 1.5s ease-in forwards; pointer-events: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from 'firebase/firestore';
        import { Building2, Play, RotateCcw, Home, Timer, Trophy, Star, AlertTriangle, Layers, Pause, BookOpen, ChevronRight, X, UserCircle2, ListOrdered } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SISTEMA DE AUDIO NATIVO (Web Audio API) ---
        const AudioManager = {
            ctx: null,
            droneOsc: null,
            droneGain: null,
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playThud: function() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            playPerfect: function() {
                if (!this.ctx) return;
                const playNote = (freq, delay) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, this.ctx.currentTime + delay);
                    gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + delay + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + delay + 0.3);
                    osc.start(this.ctx.currentTime + delay);
                    osc.stop(this.ctx.currentTime + delay + 0.3);
                };
                playNote(523.25, 0);    // C5
                playNote(659.25, 0.05); // E5
                playNote(783.99, 0.1);  // G5
                playNote(1046.50, 0.15); // C6
            },
            playGameOver: function() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            },
            updateTension: function(widthRatio) {
                if (!this.ctx) return;
                
                if (!this.droneOsc) {
                    this.droneOsc = this.ctx.createOscillator();
                    this.droneGain = this.ctx.createGain();
                    this.droneOsc.connect(this.droneGain);
                    this.droneGain.connect(this.ctx.destination);
                    this.droneOsc.type = 'sawtooth';
                    this.droneGain.gain.value = 0;
                    this.droneOsc.start();
                }
                
                if (widthRatio < 0.5) {
                    const tension = 1.0 - (widthRatio / 0.5); 
                    const vol = Math.min(tension * 0.08, 0.08); 
                    const freq = 50 + (tension * 60); 
                    
                    this.droneGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.5);
                    this.droneOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.5);
                } else {
                    this.droneGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.5);
                }
            },
            stopTension: function() {
                if (this.droneGain) {
                    this.droneGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.2);
                }
            }
        };

        // Constantes Físicas
        const GAME_AREA_WIDTH = 400; 
        const INITIAL_BLOCK_WIDTH = 250;
        const BLOCK_HEIGHT = 60;
        const SWING_SPEED_BASE = 0.0025; 
        const PERFECT_TOLERANCE = 8; 

        // ANCLAJES
        const CRANE_TOP = 0; 
        const CABLE_LENGTH = 200; 
        const BLOCK_Y = CRANE_TOP + CABLE_LENGTH; 
        const TOWER_ANCHOR_Y = 380; 

        const COLORS = ['bg-blue-500', 'bg-red-500', 'bg-amber-500', 'bg-green-500', 'bg-indigo-500', 'bg-fuchsia-500', 'bg-emerald-500'];

        const WordBuildings = () => {
            const [gameState, setGameState] = useState('LOADING'); // LOADING, MENU, PLAYING, PAUSED, LIBRARY, LEVEL_TRANSITION, GAMEOVER, VICTORY, LEADERBOARD
            const [gameData, setGameData] = useState(null);
            
            const [levels, setLevels] = useState([]);
            const [currentLevel, setCurrentLevel] = useState(0);
            
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('wb_playerName') || "");
            const [savedProgress, setSavedProgress] = useState(null);
            const [leaderboard, setLeaderboard] = useState([]);
            
            const [levelScore, setLevelScore] = useState(0); 
            const [totalScore, setTotalScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            const [timeElapsed, setTimeElapsed] = useState(0);
            
            const [blocks, setBlocks] = useState([]);
            const [debris, setDebris] = useState([]);
            const [floatingTexts, setFloatingTexts] = useState([]);
            const [cameraY, setCameraY] = useState(0);
            const [shake, setShake] = useState(false);
            const [prevState, setPrevState] = useState('MENU');

            const requestRef = useRef();
            const timeRef = useRef(0);
            const movingBlockRef = useRef({ x: 0, width: INITIAL_BLOCK_WIDTH, direction: 1, speed: SWING_SPEED_BASE });
            const blockDOMRef = useRef(null);
            const isDroppingRef = useRef(false);

            const stateRefs = useRef({ blocks: [], combo: 0, score: 0, maxCombo: 0, currentLevel: 0, levels: [] });

            useEffect(() => {
                stateRefs.current = { blocks, combo, score: levelScore, maxCombo, currentLevel, levels };
            }, [blocks, combo, levelScore, maxCombo, currentLevel, levels]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return setGameState('ERROR');

                const prog = localStorage.getItem(`wb_prog_${id}`);
                if(prog) setSavedProgress(JSON.parse(prog));

                getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id)).then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameData(data);
                        
                        let parsedLevels = [];
                        if (data.content && data.content.categories) {
                            data.content.categories.forEach(cat => {
                                let validItems = (cat.items || []).filter(i => (i.en || i.word || '').trim() !== '');
                                validItems = validItems.sort(() => Math.random() - 0.5);
                                if (validItems.length > 0) {
                                    parsedLevels.push({ name: cat.name, items: validItems });
                                }
                            });
                        }

                        if (parsedLevels.length === 0) return setGameState('ERROR');
                        setLevels(parsedLevels);
                        setGameState('MENU');
                    } else {
                        setGameState('ERROR');
                    }
                });
            }, []);

            useEffect(() => {
                let interval;
                if (gameState === 'PLAYING') {
                    interval = setInterval(() => setTimeElapsed(t => t + 1), 1000);
                } else {
                    AudioManager.stopTension(); 
                }
                return () => clearInterval(interval);
            }, [gameState]);

            const animate = time => {
                if (gameState !== 'PLAYING') return;

                if (!isDroppingRef.current && blockDOMRef.current) {
                    const mb = movingBlockRef.current;
                    const center = GAME_AREA_WIDTH / 2;
                    const swingAmplitude = (GAME_AREA_WIDTH - mb.width) / 2;
                    
                    mb.x = center + Math.sin(time * mb.speed) * swingAmplitude;
                    
                    blockDOMRef.current.style.left = `${mb.x - (mb.width/2)}px`;
                    blockDOMRef.current.style.top = `${BLOCK_Y}px`;
                }

                timeRef.current = time;
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                if (gameState === 'PLAYING') requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [gameState]);

            const getBaseScoreForLevel = (lvl) => {
                if (levels.length === 0) return 0;
                return levels.slice(0, lvl).reduce((acc, l) => acc + l.items.length, 0);
            };

            const saveToLeaderboard = async (finalScore, finalCombo, finalTime) => {
                try {
                    const quizId = new URLSearchParams(window.location.search).get('id');
                    await addDoc(collection(db, `artifacts/periplo-app-v1/users/teacher_builder_001/quizzes/${quizId}/leaderboard`), {
                        playerName: playerName || 'Constructor Anónimo',
                        score: finalScore,
                        maxCombo: finalCombo,
                        timeElapsed: finalTime,
                        date: serverTimestamp()
                    });
                } catch(e) {
                    console.error("Error guardando score:", e);
                }
            };

            const loadLeaderboard = async () => {
                setGameState('LOADING');
                try {
                    const quizId = new URLSearchParams(window.location.search).get('id');
                    const q = query(collection(db, `artifacts/periplo-app-v1/users/teacher_builder_001/quizzes/${quizId}/leaderboard`), orderBy('score', 'desc'), orderBy('timeElapsed', 'asc'), limit(10));
                    const snap = await getDocs(q);
                    setLeaderboard(snap.docs.map(d => d.data()));
                    setGameState('LEADERBOARD');
                } catch(e) {
                    alert("No hay registros en el ranking aún.");
                    setGameState('MENU');
                }
            };

            const handleStartNew = () => {
                if(!playerName.trim()) return alert("Ingresa tu nombre para el registro de obra.");
                AudioManager.init(); 
                
                const quizId = new URLSearchParams(window.location.search).get('id');
                localStorage.setItem('wb_playerName', playerName);
                localStorage.removeItem(`wb_prog_${quizId}`);
                setSavedProgress(null);
                
                setTimeElapsed(0);
                setMaxCombo(0);
                startLevel(0);
            };

            const handleResume = () => {
                if(!playerName.trim()) return alert("Ingresa tu nombre para continuar.");
                AudioManager.init(); 
                
                localStorage.setItem('wb_playerName', playerName);
                setTimeElapsed(savedProgress.time);
                setMaxCombo(0); 
                startLevel(savedProgress.level);
            };

            const startLevel = (lvlIndex) => {
                setCurrentLevel(lvlIndex);
                setLevelScore(0);
                setTotalScore(getBaseScoreForLevel(lvlIndex));
                setCombo(0);
                setCameraY(0);
                setDebris([]);
                setFloatingTexts([]);
                
                setBlocks([{
                    id: `base-${lvlIndex}`,
                    x: GAME_AREA_WIDTH / 2,
                    width: INITIAL_BLOCK_WIDTH,
                    y: 0,
                    textEs: 'BASE',
                    emoji: '🏗️',
                    color: 'bg-zinc-800'
                }]);

                movingBlockRef.current = {
                    x: GAME_AREA_WIDTH / 2,
                    width: INITIAL_BLOCK_WIDTH,
                    speed: SWING_SPEED_BASE + (lvlIndex * 0.0004) 
                };

                isDroppingRef.current = false;
                if(blockDOMRef.current) {
                    blockDOMRef.current.style.transition = 'none';
                    blockDOMRef.current.style.top = `${BLOCK_Y}px`;
                }
                
                AudioManager.updateTension(1.0);
                setGameState('PLAYING');
            };

            const triggerConfettiStars = (hitX, currentCombo) => {
                const dropY = (TOWER_ANCHOR_Y - BLOCK_HEIGHT/2) / window.innerHeight;
                confetti({
                    particleCount: 15 + (currentCombo * 8), 
                    spread: 60 + (currentCombo * 5),
                    origin: { x: hitX / window.innerWidth, y: dropY },
                    colors: ['#FBBF24', '#FCD34D', '#FFFBEB'], 
                    shapes: ['star'],
                    scalar: Math.min(1 + (currentCombo * 0.2), 2.5), 
                    disableForReducedMotion: true,
                    ticks: 60,
                    gravity: 0.9,
                    zIndex: 100
                });
            };

            const handleDrop = () => {
                if (gameState !== 'PLAYING' || isDroppingRef.current) return;
                isDroppingRef.current = true; 

                if(blockDOMRef.current) {
                    blockDOMRef.current.style.transition = 'top 0.25s cubic-bezier(0.55, 0.085, 0.68, 0.53)'; 
                    blockDOMRef.current.style.top = `${TOWER_ANCHOR_Y - BLOCK_HEIGHT}px`;
                }

                setTimeout(finalizeDrop, 250); 
            };

            const finalizeDrop = () => {
                const { blocks, combo, score, maxCombo, currentLevel, levels } = stateRefs.current;
                const mb = movingBlockRef.current;
                const prevBlock = blocks[blocks.length - 1]; 

                const currentX = mb.x;
                const prevX = prevBlock.x;
                const deltaLeft = (currentX - mb.width/2) - (prevX - prevBlock.width/2);

                let newWidth = mb.width;
                let newX = currentX;
                let isPerfect = false;
                let missed = false;
                let debrisPiece = null;

                if (Math.abs(deltaLeft) <= PERFECT_TOLERANCE) {
                    isPerfect = true;
                    newX = prevX; 
                    newWidth = prevBlock.width; 
                    
                    const newCombo = combo + 1;
                    setCombo(newCombo);
                    if (newCombo > maxCombo) setMaxCombo(newCombo);
                    
                    AudioManager.playPerfect();
                    triggerConfettiStars(newX, newCombo);
                    setFloatingTexts(prev => [...prev, { id: Date.now(), text: `x${newCombo}`, x: GAME_AREA_WIDTH/2, y: TOWER_ANCHOR_Y - 100 }]);

                } else {
                    setCombo(0);
                    if (Math.abs(deltaLeft) >= prevBlock.width) {
                        missed = true;
                    } else {
                        AudioManager.playThud();
                        newWidth = prevBlock.width - Math.abs(deltaLeft);
                        if (deltaLeft > 0) {
                            newX = (currentX - mb.width/2) + (newWidth / 2);
                            debrisPiece = { id: Date.now(), x: (currentX - mb.width/2) + newWidth, width: Math.abs(deltaLeft), color: COLORS[currentLevel % COLORS.length] };
                        } else {
                            newX = ((currentX - mb.width/2) + mb.width) - (newWidth / 2);
                            debrisPiece = { id: Date.now(), x: currentX - mb.width/2, width: Math.abs(deltaLeft), color: COLORS[currentLevel % COLORS.length] };
                        }
                    }
                }

                if (missed) {
                    AudioManager.playGameOver();
                    AudioManager.stopTension();
                    setShake(true); 
                    setTimeout(() => setShake(false), 400);
                    saveToLeaderboard(getBaseScoreForLevel(currentLevel) + score, maxCombo, timeElapsed);
                    setGameState('GAMEOVER');
                    return;
                }

                // --- SISTEMA REFINADO DE DIFICULTAD ---
                const blocksPlaced = score + 1;
                let shouldIncreaseSpeed = false;
                
                if (currentLevel === 0) {
                    // Edificio 1: Aumenta cada 3 bloques
                    if (blocksPlaced % 3 === 0) shouldIncreaseSpeed = true;
                } else if (currentLevel === 1) {
                    // Edificio 2: Aumenta cada 2 hasta el bloque 10, luego cada 3 para estabilizar
                    if (blocksPlaced <= 10 && blocksPlaced % 2 === 0) shouldIncreaseSpeed = true;
                    else if (blocksPlaced > 10 && blocksPlaced % 3 === 0) shouldIncreaseSpeed = true;
                } else if (currentLevel === 2) {
                    // Edificio 3: Aumenta cada 2 bloques
                    if (blocksPlaced % 2 === 0) shouldIncreaseSpeed = true;
                } else if (currentLevel >= 3) {
                    // Edificio 4: Aumenta con CADA bloque
                    shouldIncreaseSpeed = true;
                }

                if (shouldIncreaseSpeed) {
                    mb.speed = Math.min(mb.speed + 0.0003, 0.007);
                }

                const currentWord = levels[currentLevel].items[score];
                const newBlock = {
                    id: `block-${score}`, x: newX, width: newWidth, y: blocks.length,
                    textEs: currentWord.es || currentWord.word, emoji: currentWord.emoji,
                    color: COLORS[currentLevel % COLORS.length], isPerfect: isPerfect
                };

                setBlocks(prev => [...prev, newBlock]);
                if (debrisPiece) setDebris(prev => [...prev, debrisPiece]);

                const nextScore = score + 1;
                setLevelScore(nextScore);
                setTotalScore(getBaseScoreForLevel(currentLevel) + nextScore);
                setCameraY(blocks.length * BLOCK_HEIGHT);
                
                AudioManager.updateTension(newWidth / INITIAL_BLOCK_WIDTH);

                if (nextScore >= levels[currentLevel].items.length) {
                    AudioManager.stopTension();
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                    
                    const quizId = new URLSearchParams(window.location.search).get('id');
                    
                    setTimeout(() => {
                        if (currentLevel >= levels.length - 1) {
                            saveToLeaderboard(getBaseScoreForLevel(currentLevel) + nextScore, maxCombo, timeElapsed);
                            localStorage.removeItem(`wb_prog_${quizId}`);
                            setGameState('VICTORY');
                        } else {
                            const progObj = { level: currentLevel + 1, time: timeElapsed };
                            localStorage.setItem(`wb_prog_${quizId}`, JSON.stringify(progObj));
                            setSavedProgress(progObj);
                            setGameState('LEVEL_TRANSITION');
                        }
                    }, 500); 
                    return;
                }

                movingBlockRef.current.width = newWidth; 
                movingBlockRef.current.x = GAME_AREA_WIDTH / 2; 

                if(blockDOMRef.current) {
                    blockDOMRef.current.style.transition = 'none'; 
                    blockDOMRef.current.style.top = `${BLOCK_Y}px`;
                }
                isDroppingRef.current = false; 
            };

            useEffect(() => {
                const handlePointerDown = (e) => {
                    handleDrop();
                };
                if (gameState === 'PLAYING') window.addEventListener('pointerdown', handlePointerDown);
                return () => window.removeEventListener('pointerdown', handlePointerDown);
            }, [gameState]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const openLibrary = () => {
                setPrevState(gameState);
                setGameState('LIBRARY');
            };

            if (gameState === 'LOADING') return <div className="h-screen flex items-center justify-center bg-zinc-950 text-white"><div className="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div></div>;
            if (gameState === 'ERROR') return <div className="h-screen flex items-center justify-center bg-zinc-950 text-rose-500 font-bold">Error cargando datos. Verifica el ID.</div>;

            if (gameState === 'MENU') {
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center building-bg touch-manipulation" style={{backgroundPosition: '0% 100%'}}>
                        <button onPointerDown={(e) => { e.stopPropagation(); setPrevState('MENU'); setGameState('LIBRARY'); }} className="absolute top-6 right-6 bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-2 backdrop-blur-md transition">
                            <BookOpen size={20}/> <span className="font-bold text-sm hidden sm:block">Planos</span>
                        </button>

                        <div className="w-24 h-24 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-3xl flex items-center justify-center shadow-[0_0_50px_rgba(16,185,129,0.5)] mb-8 transform -rotate-6 border-4 border-white/20">
                            <Building2 size={48} className="text-white"/>
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2 tracking-tight drop-shadow-lg">{gameData.title}</h1>
                        <p className="text-emerald-300 font-bold uppercase tracking-widest text-sm mb-12">Proyecto: {levels.length} Edificios</p>
                        
                        <div className="bg-black/40 backdrop-blur-md p-6 rounded-3xl w-full max-w-sm border border-white/10 mb-8">
                            <div className="flex items-center gap-3 bg-zinc-900/80 p-3 rounded-2xl border border-white/5 mb-4 focus-within:border-emerald-500 transition-colors">
                                <UserCircle2 className="text-emerald-400 shrink-0"/>
                                <input 
                                    type="text" 
                                    value={playerName} 
                                    onChange={e => {setPlayerName(e.target.value); localStorage.setItem('wb_playerName', e.target.value);}} 
                                    placeholder="Tu nombre de constructor..." 
                                    className="bg-transparent border-none outline-none text-white font-bold w-full placeholder-zinc-500"
                                />
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-zinc-400 font-bold text-sm">Total Palabras</span>
                                <span className="text-lg font-black">{levels.reduce((acc, lvl) => acc + lvl.items.length, 0)}</span>
                            </div>
                        </div>

                        <div className="flex flex-col gap-3 w-full max-w-sm">
                            {savedProgress && (
                                <button onPointerDown={(e) => { e.stopPropagation(); handleResume(); }} className="bg-amber-500 hover:bg-amber-400 text-zinc-950 w-full py-4 rounded-2xl font-black text-lg shadow-[0_5px_20px_rgba(245,158,11,0.4)] transition active:scale-95 flex items-center justify-center gap-3">
                                    <Play fill="currentColor" size={20}/> CONTINUAR OBRA (Edif {savedProgress.level + 1})
                                </button>
                            )}
                            <button onPointerDown={(e) => { e.stopPropagation(); handleStartNew(); }} className={`${savedProgress ? 'bg-zinc-800 hover:bg-zinc-700 text-white' : 'bg-emerald-500 hover:bg-emerald-400 text-zinc-950 shadow-[0_10px_25px_rgba(16,185,129,0.4)]'} w-full py-4 rounded-2xl font-black text-lg transition active:scale-95 flex items-center justify-center gap-3`}>
                                {savedProgress ? <RotateCcw size={20}/> : <Play fill="currentColor" size={20}/>} {savedProgress ? 'OBRA DESDE CERO' : 'INICIAR OBRA'}
                            </button>
                            <button onPointerDown={(e) => { e.stopPropagation(); loadLeaderboard(); }} className="bg-indigo-600 hover:bg-indigo-500 text-white w-full py-4 rounded-2xl font-black text-lg shadow-[0_5px_20px_rgba(79,70,229,0.4)] transition active:scale-95 flex items-center justify-center gap-3 mt-2">
                                <Trophy size={20}/> VER RANKING
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'LEADERBOARD') {
                return (
                    <div className="flex flex-col h-screen bg-zinc-950 p-6 overflow-hidden text-white building-bg touch-manipulation" style={{backgroundPosition: '0% 50%'}}>
                        <div className="flex items-center justify-between mb-8 shrink-0">
                            <h2 className="text-3xl font-black flex items-center gap-3"><Trophy className="text-yellow-400" size={32}/> Top Constructores</h2>
                            <button onPointerDown={(e) => { e.stopPropagation(); setGameState('MENU'); }} className="p-3 bg-zinc-800/80 text-zinc-300 rounded-full hover:bg-zinc-700 transition-colors backdrop-blur-md">
                                <X size={24} />
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2 pb-10">
                            {leaderboard.map((entry, i) => (
                                <div key={i} className={`flex items-center justify-between p-4 rounded-2xl border ${i===0?'bg-yellow-500/20 border-yellow-500/50':'bg-black/40 border-white/5'} backdrop-blur-md`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-lg ${i===0?'bg-yellow-500 text-black': i===1?'bg-zinc-300 text-black' : i===2?'bg-amber-700 text-white' : 'bg-zinc-800 text-zinc-400'}`}>
                                            {i + 1}
                                        </div>
                                        <div>
                                            <div className={`font-black text-lg ${i===0?'text-yellow-400':'text-white'}`}>{entry.playerName}</div>
                                            <div className="text-xs font-bold text-zinc-400 flex gap-3">
                                                <span>⏱️ {formatTime(entry.timeElapsed)}</span>
                                                <span>⭐ x{entry.maxCombo}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className={`text-3xl font-black ${i===0?'text-yellow-400':'text-emerald-400'}`}>{entry.score}</div>
                                        <div className="text-[10px] uppercase font-bold text-zinc-500 tracking-widest">Pisos</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'LIBRARY') {
                return (
                    <div className="flex flex-col h-screen bg-zinc-950 p-6 overflow-hidden text-white touch-manipulation">
                        <div className="flex items-center justify-between mb-6 shrink-0">
                            <h2 className="text-2xl font-black flex items-center gap-2"><BookOpen className="text-indigo-400"/> Archivos de Obra</h2>
                            <button onPointerDown={(e) => { e.stopPropagation(); setGameState(prevState); }} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 transition-colors">
                                <X size={24} />
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-6 pr-2 pb-10">
                            {levels.map((lvl, i) => (
                                <div key={i} className="bg-zinc-900 rounded-3xl border border-white/5 overflow-hidden">
                                    <div className={`px-5 py-4 ${COLORS[i % COLORS.length]} bg-opacity-20 border-b border-white/5 font-black uppercase tracking-widest text-sm flex justify-between items-center`}>
                                        <span>Edificio {i + 1}: {lvl.name}</span>
                                        <span className="bg-black/30 px-2 py-1 rounded text-xs">{lvl.items.length} pisos</span>
                                    </div>
                                    <div className="p-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {lvl.items.map((item, idx) => (
                                            <div key={idx} className="flex flex-col bg-black/40 p-3 rounded-xl border border-white/5">
                                                <div className="flex items-center gap-3">
                                                    <div className="text-2xl w-10 h-10 bg-zinc-800 rounded-lg flex items-center justify-center shrink-0">{item.emoji}</div>
                                                    <span className="font-bold text-zinc-200">{item.en || item.word}</span>
                                                </div>
                                                <div className="text-sm text-emerald-400 font-bold ml-14">{item.es || item.word}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'LEVEL_TRANSITION') {
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center building-bg touch-manipulation" style={{backgroundPosition: '0% 0%'}}>
                        <div className="w-24 h-24 bg-emerald-500 rounded-3xl flex items-center justify-center mb-8 transform rotate-6 shadow-[0_0_50px_rgba(16,185,129,0.5)]">
                            <Building2 size={48} className="text-white"/>
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2">¡Edificio {currentLevel + 1} Listo!</h1>
                        <p className="font-bold uppercase tracking-widest text-sm mb-12 text-emerald-300">
                            Sector: {levels[currentLevel].name}
                        </p>
                        
                        <button onPointerDown={(e) => { e.stopPropagation(); startLevel(currentLevel + 1); }} className="bg-indigo-600 hover:bg-indigo-500 text-white w-full max-w-sm py-5 rounded-2xl font-black text-xl shadow-lg transition active:scale-95 flex items-center justify-center gap-3">
                            CONSTRUIR EDIFICIO {currentLevel + 2} <ChevronRight size={24}/>
                        </button>
                    </div>
                );
            }

            if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
                const isVictory = gameState === 'VICTORY';
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center building-bg touch-manipulation" style={{backgroundPosition: isVictory ? '0% 0%' : '0% 100%'}}>
                        <button onPointerDown={(e) => { e.stopPropagation(); setPrevState(gameState); setGameState('LIBRARY'); }} className="absolute top-6 right-6 bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-2 backdrop-blur-md transition">
                            <BookOpen size={20}/>
                        </button>

                        <div className={`w-24 h-24 rounded-3xl flex items-center justify-center mb-8 transform rotate-6 shadow-2xl ${isVictory ? 'bg-yellow-500' : 'bg-rose-500'}`}>
                            {isVictory ? <Trophy size={48} className="text-black"/> : <AlertTriangle size={48} className="text-white"/>}
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2">{isVictory ? '¡Ciudad Completada!' : '¡Derrumbe!'}</h1>
                        <p className={`font-bold uppercase tracking-widest text-sm mb-12 ${isVictory ? 'text-yellow-400' : 'text-rose-300'}`}>
                            {isVictory ? 'Tu récord ya está en el Ranking' : `Caíste en el Edificio ${currentLevel + 1}`}
                        </p>
                        
                        <div className="bg-black/40 backdrop-blur-md p-6 rounded-3xl w-full max-w-sm border border-white/10 mb-8 grid grid-cols-2 gap-4">
                            <div className="bg-white/5 p-4 rounded-2xl">
                                <Layers className="text-indigo-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{totalScore}/{levels.reduce((a,l)=>a+l.items.length,0)}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Total Pisos</div>
                            </div>
                            <div className="bg-white/5 p-4 rounded-2xl">
                                <Timer className="text-amber-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{formatTime(timeElapsed)}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Tiempo Total</div>
                            </div>
                        </div>

                        <div className="flex gap-4 w-full max-w-sm">
                            <button onPointerDown={(e) => { e.stopPropagation(); window.location.href='index.html'; }} className="bg-zinc-800 hover:bg-zinc-700 text-white p-5 rounded-2xl font-black transition active:scale-95 flex items-center justify-center shrink-0">
                                <Home />
                            </button>
                            <button onPointerDown={(e) => { 
                                e.stopPropagation();
                                if(isVictory) { setGameState('MENU'); } 
                                else { startLevel(currentLevel); }
                            }} className={`${isVictory ? 'bg-indigo-600' : 'bg-rose-600'} flex-1 text-white py-5 rounded-2xl font-black text-lg shadow-lg transition active:scale-95 flex items-center justify-center gap-2`}>
                                {isVictory ? <ListOrdered/> : <RotateCcw/>} {isVictory ? 'VOLVER AL MENÚ' : 'REINICIAR EDIFICIO'}
                            </button>
                        </div>
                    </div>
                );
            }

            const currentLvlData = levels[currentLevel];
            const currentWord = currentLvlData.items[levelScore];
            
            const bgProgress = Math.max(0, 100 - (levelScore / currentLvlData.items.length) * 100);
            const isInSpace = bgProgress < 40; 

            return (
                <div className={`h-screen w-full flex justify-center building-bg overflow-hidden touch-manipulation ${shake ? 'shake-active' : ''}`} style={{backgroundPosition: `0% ${bgProgress}%`}}>
                    
                    <div className={`absolute inset-0 space-stars pointer-events-none ${isInSpace ? 'opacity-100' : 'opacity-0'}`}></div>

                    {/* Interfaz Superior */}
                    <div className="absolute top-0 inset-x-0 p-4 flex justify-between items-start z-50 pointer-events-none">
                        <div className="flex flex-col gap-2">
                            <div className="bg-black/40 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 flex items-center gap-3">
                                <Building2 className="text-indigo-400" size={18}/>
                                <div>
                                    <div className="text-[10px] text-zinc-400 font-bold uppercase leading-none mb-1">Edificio {currentLevel + 1}</div>
                                    <div className="text-white font-black leading-none">{levelScore} <span className="text-zinc-500 text-xs">/ {currentLvlData.items.length}</span></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-2 pointer-events-auto">
                            <div className="flex gap-2">
                                <div className="bg-black/40 backdrop-blur-md px-3 py-2 rounded-2xl border border-white/10 flex items-center gap-2 pointer-events-none">
                                    <Timer className="text-amber-400" size={16}/>
                                    <span className="text-white font-bold font-mono">{formatTime(timeElapsed)}</span>
                                </div>
                                <button onPointerDown={(e) => { e.stopPropagation(); setPrevState('PLAYING'); setGameState('PAUSED'); }} className="bg-black/40 backdrop-blur-md p-2 rounded-2xl border border-white/10 hover:bg-white/20 transition active:scale-95 no-drop">
                                    <Pause className="text-white" size={20}/>
                                </button>
                            </div>
                            
                            {combo > 1 && (
                                <div className="bg-gradient-to-r from-yellow-400 to-amber-500 text-zinc-900 px-3 py-1 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg animate-pulse">
                                    Combo x{combo}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ZONA DE JUEGO */}
                    <div className="relative w-full max-w-[400px] h-full overflow-hidden">
                        
                        <div className="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 pointer-events-none border-x-2 border-white/10 bg-white/[0.02] z-0" style={{ width: `${INITIAL_BLOCK_WIDTH}px` }}></div>

                        <div className="absolute top-0 inset-x-0 z-40">
                            <div className="crane-cable" style={{ top: `${CRANE_TOP}px`, height: `${CABLE_LENGTH}px` }}></div>
                            
                            {currentWord && (
                                <div 
                                    ref={blockDOMRef}
                                    className={`absolute h-[60px] rounded-xl shadow-2xl flex items-center justify-center text-white border-2 border-white/20 block-texture z-40 ${COLORS[currentLevel % COLORS.length]}`}
                                    style={{ top: `${BLOCK_Y}px`, left: '0px', width: `${movingBlockRef.current.width}px`, willChange: 'left, width, top' }}
                                >
                                    <div className="px-4 text-center truncate font-bold drop-shadow-md text-lg">
                                        <span className="mr-2 text-xl">{currentWord.emoji}</span>
                                        {currentWord.en || currentWord.word}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="absolute inset-x-0 w-full" style={{ top: `${TOWER_ANCHOR_Y}px`, transform: `translateY(${cameraY}px)`, transition: 'transform 0.2s ease-out' }}>
                            {blocks.map((b) => (
                                <div 
                                    key={b.id}
                                    className={`absolute h-[60px] rounded-xl flex items-center justify-center text-white border-t-2 border-white/20 shadow-[0_10px_30px_rgba(0,0,0,0.5)] transition-all ${b.color}`}
                                    style={{ 
                                        left: `${b.x - (b.width/2)}px`, 
                                        width: `${b.width}px`, 
                                        top: `${-(b.y * BLOCK_HEIGHT)}px`, 
                                    }}
                                >
                                    {b.isPerfect && <div className="absolute -left-1 -right-1 top-0 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent opacity-80"></div>}
                                    <div className="px-2 text-center truncate font-bold text-sm drop-shadow-md">
                                        {b.emoji} {b.textEs}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {debris.map(d => (
                            <div 
                                key={d.id}
                                className={`absolute h-[60px] rounded-xl opacity-80 ${d.color} debris`}
                                style={{ left: `${d.x}px`, width: `${d.width}px`, top: `${TOWER_ANCHOR_Y}px` }}
                            ></div>
                        ))}

                        {floatingTexts.map(ft => (
                            <div 
                                key={ft.id} 
                                className="absolute text-yellow-400 font-black text-4xl drop-shadow-lg float-text z-50 whitespace-nowrap tracking-tighter"
                                style={{ left: `${ft.x}px`, top: `${ft.y}px`, transform: 'translateX(-50%)' }}
                            >
                                {ft.text}
                            </div>
                        ))}

                    </div>

                    {/* OVERLAY DE PAUSA */}
                    {gameState === 'PAUSED' && (
                        <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center text-white p-6 text-center animate-in fade-in touch-auto">
                            <Pause size={64} className="mb-6 text-emerald-500" />
                            <h3 className="text-3xl font-black mb-2 tracking-tighter uppercase">Obra en Pausa</h3>
                            <p className="text-zinc-400 mb-8">Edificio {currentLevel + 1}: {currentLvlData.name}</p>
                            
                            <div className="flex flex-col gap-3 w-full max-w-xs">
                                <button onPointerDown={(e) => { e.stopPropagation(); setGameState('PLAYING'); }} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                                    Reanudar Obra
                                </button>
                                <button onPointerDown={(e) => { e.stopPropagation(); openLibrary(); }} className="w-full py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                    <BookOpen size={20}/> Ver Planos
                                </button>
                                <button onPointerDown={(e) => { e.stopPropagation(); window.location.href='index.html'; }} className="w-full py-4 bg-transparent text-zinc-500 hover:text-white rounded-2xl font-bold uppercase tracking-widest transition-colors mt-4">
                                    Salir al Hub
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<WordBuildings />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Buildings | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #09090b; touch-action: none; user-select: none; }
        
        /* Fondo Dinámico: Ciudad -> Cielo -> Estratosfera -> Espacio */
        .building-bg {
            background: linear-gradient(to top, 
                #1e293b 0%,   /* Ciudad / Noche baja */
                #0ea5e9 20%,  /* Cielo de día */
                #3b82f6 40%,  /* Cielo alto */
                #1e3a8a 60%,  /* Estratosfera */
                #0f172a 80%,  /* Espacio profundo */
                #000000 100%  /* Vacío absoluto */
            );
            background-size: 100% 500%;
            transition: background-position 1.5s ease-out;
        }

        /* Estrellas estáticas sutiles */
        .space-stars {
            background-image: 
                radial-gradient(1px 1px at 10% 10%, white 100%, transparent),
                radial-gradient(2px 2px at 20% 30%, white 100%, transparent),
                radial-gradient(1px 1px at 30% 80%, white 100%, transparent),
                radial-gradient(2px 2px at 40% 40%, rgba(255,255,255,0.8) 100%, transparent),
                radial-gradient(1px 1px at 50% 10%, white 100%, transparent),
                radial-gradient(2px 2px at 60% 60%, white 100%, transparent),
                radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.8) 100%, transparent),
                radial-gradient(2px 2px at 80% 80%, white 100%, transparent),
                radial-gradient(1px 1px at 90% 40%, white 100%, transparent);
            background-size: 200px 200px;
            opacity: 0;
            transition: opacity 2s;
        }

        .crane-cable {
            position: absolute;
            width: 3px;
            background: linear-gradient(to bottom, #f8fafc, #94a3b8);
            left: 50%;
            transform: translateX(-50%);
            transform-origin: top center;
            z-index: 10;
        }

        .block-texture {
            background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
        }

        /* Temblor solo para Game Over */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.4s; }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
        }
        .float-text { animation: floatUp 0.8s ease-out forwards; pointer-events: none; }

        @keyframes fallDebris {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
        }
        .debris { animation: fallDebris 1.5s ease-in forwards; pointer-events: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Building2, Play, RotateCcw, Home, Timer, Trophy, Star, AlertTriangle, Layers, Pause, BookOpen, ChevronRight, X } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Constantes del Motor Físico
        const GAME_AREA_WIDTH = 400; 
        const INITIAL_BLOCK_WIDTH = 250;
        const BLOCK_HEIGHT = 60;
        const SWING_SPEED_BASE = 0.003;
        const PERFECT_TOLERANCE = 8; 

        // ANCLAJES (Fieles al croquis)
        const CRANE_TOP = 0; // La cuerda nace en el techo
        const CABLE_LENGTH = 120; // Longitud de la cuerda
        const BLOCK_Y = CRANE_TOP + CABLE_LENGTH; // Dónde cuelga el bloque (120px)
        const TOWER_ANCHOR_Y = 380; // La base receptora. ¡Deja 200px de caída libre!

        const COLORS = ['bg-blue-500', 'bg-red-500', 'bg-amber-500', 'bg-green-500', 'bg-indigo-500', 'bg-fuchsia-500', 'bg-emerald-500'];

        const WordBuildings = () => {
            const [gameState, setGameState] = useState('LOADING'); // LOADING, MENU, PLAYING, PAUSED, LIBRARY, LEVEL_TRANSITION, GAMEOVER, VICTORY
            const [gameData, setGameData] = useState(null);
            
            const [levels, setLevels] = useState([]);
            const [currentLevel, setCurrentLevel] = useState(0);
            
            const [levelScore, setLevelScore] = useState(0); 
            const [totalScore, setTotalScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            const [timeElapsed, setTimeElapsed] = useState(0);
            
            const [blocks, setBlocks] = useState([]);
            const [debris, setDebris] = useState([]);
            const [floatingTexts, setFloatingTexts] = useState([]);
            const [cameraY, setCameraY] = useState(0);
            const [shake, setShake] = useState(false);
            const [prevState, setPrevState] = useState('MENU');

            const requestRef = useRef();
            const timeRef = useRef(0);
            const movingBlockRef = useRef({ x: 0, width: INITIAL_BLOCK_WIDTH, direction: 1, speed: SWING_SPEED_BASE });
            const blockDOMRef = useRef(null);
            const isDroppingRef = useRef(false);

            // Refs para solucionar estado viejo dentro de setTimeouts (Gravedad)
            const stateRefs = useRef({ blocks: [], combo: 0, score: 0, maxCombo: 0, currentLevel: 0, levels: [] });

            useEffect(() => {
                stateRefs.current = { blocks, combo, score: levelScore, maxCombo, currentLevel, levels };
            }, [blocks, combo, levelScore, maxCombo, currentLevel, levels]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return setGameState('ERROR');

                getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id)).then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameData(data);
                        
                        let parsedLevels = [];
                        if (data.content && data.content.categories) {
                            data.content.categories.forEach(cat => {
                                let validItems = (cat.items || []).filter(i => (i.en || i.word || '').trim() !== '');
                                validItems = validItems.sort(() => Math.random() - 0.5);
                                if (validItems.length > 0) {
                                    parsedLevels.push({ name: cat.name, items: validItems });
                                }
                            });
                        }

                        if (parsedLevels.length === 0) return setGameState('ERROR');
                        setLevels(parsedLevels);
                        setGameState('MENU');
                    } else {
                        setGameState('ERROR');
                    }
                });
            }, []);

            useEffect(() => {
                let interval;
                if (gameState === 'PLAYING') {
                    interval = setInterval(() => setTimeElapsed(t => t + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [gameState]);

            const animate = time => {
                if (gameState !== 'PLAYING') return;

                // Solo si NO está cayendo, balanceamos el bloque
                if (!isDroppingRef.current && blockDOMRef.current) {
                    const mb = movingBlockRef.current;
                    const center = GAME_AREA_WIDTH / 2;
                    const swingAmplitude = (GAME_AREA_WIDTH - mb.width) / 2;
                    
                    mb.x = center + Math.sin(time * mb.speed) * swingAmplitude;
                    
                    blockDOMRef.current.style.left = `${mb.x - (mb.width/2)}px`;
                    // Asegurarnos que siempre esté anclado a la cuerda mientras no cae
                    blockDOMRef.current.style.top = `${BLOCK_Y}px`;
                }

                timeRef.current = time;
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                if (gameState === 'PLAYING') requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [gameState]);

            const startLevel = (lvlIndex) => {
                setCurrentLevel(lvlIndex);
                setLevelScore(0);
                setCombo(0);
                setCameraY(0);
                setDebris([]);
                setFloatingTexts([]);
                
                setBlocks([{
                    id: `base-${lvlIndex}`,
                    x: GAME_AREA_WIDTH / 2,
                    width: INITIAL_BLOCK_WIDTH,
                    y: 0,
                    textEs: 'BASE',
                    emoji: '🏗️',
                    color: 'bg-zinc-800'
                }]);

                movingBlockRef.current = {
                    x: GAME_AREA_WIDTH / 2,
                    width: INITIAL_BLOCK_WIDTH,
                    speed: SWING_SPEED_BASE + (lvlIndex * 0.0005) 
                };

                isDroppingRef.current = false;
                if(blockDOMRef.current) {
                    blockDOMRef.current.style.transition = 'none';
                    blockDOMRef.current.style.top = `${BLOCK_Y}px`;
                }
                setGameState('PLAYING');
            };

            const addFloatingText = (text, type, x, y) => {
                const id = Date.now();
                setFloatingTexts(prev => [...prev, { id, text, type, x, y }]);
                setTimeout(() => setFloatingTexts(prev => prev.filter(ft => ft.id !== id)), 800);
            };

            const triggerConfettiStars = (hitX, currentCombo) => {
                // Genera estrellas en la zona del impacto
                const dropY = (TOWER_ANCHOR_Y - BLOCK_HEIGHT/2) / window.innerHeight;
                
                confetti({
                    particleCount: 15 + (currentCombo * 8), 
                    spread: 60 + (currentCombo * 5),
                    origin: { x: hitX / window.innerWidth, y: dropY },
                    colors: ['#FBBF24', '#FCD34D', '#FFFBEB'], 
                    shapes: ['star'],
                    scalar: Math.min(1 + (currentCombo * 0.2), 2.5), 
                    disableForReducedMotion: true,
                    ticks: 60,
                    gravity: 0.9,
                    zIndex: 100
                });
            };

            const handleDrop = () => {
                if (gameState !== 'PLAYING' || isDroppingRef.current) return;
                
                // 1. Bloqueamos la interacción y el balanceo
                isDroppingRef.current = true; 

                // 2. Activamos la gravedad vía CSS
                if(blockDOMRef.current) {
                    // Animación de caída libre fluida
                    blockDOMRef.current.style.transition = 'top 0.25s cubic-bezier(0.55, 0.085, 0.68, 0.53)'; 
                    // El bloque viaja desde BLOCK_Y (120) hasta justo arriba de la torre (320)
                    blockDOMRef.current.style.top = `${TOWER_ANCHOR_Y - BLOCK_HEIGHT}px`;
                }

                // 3. Esperamos que termine de caer para evaluar el golpe
                setTimeout(() => {
                    finalizeDrop();
                }, 250); 
            };

            const finalizeDrop = () => {
                // Recuperamos el estado fresco
                const { blocks, combo, score, maxCombo, currentLevel, levels } = stateRefs.current;
                const mb = movingBlockRef.current;
                const prevBlock = blocks[blocks.length - 1]; 

                // Evaluamos colisión usando el mb.x congelado
                const currentX = mb.x;
                const prevX = prevBlock.x;
                
                const currentLeft = currentX - (mb.width / 2);
                const prevLeft = prevX - (prevBlock.width / 2);
                const deltaLeft = currentLeft - prevLeft;

                let newWidth = mb.width;
                let newX = currentX;
                let isPerfect = false;
                let missed = false;
                let debrisPiece = null;

                if (Math.abs(deltaLeft) <= PERFECT_TOLERANCE) {
                    // GOLPE PERFECTO
                    isPerfect = true;
                    newX = prevX; 
                    newWidth = prevBlock.width; 
                    
                    const newCombo = combo + 1;
                    setCombo(newCombo);
                    if (newCombo > maxCombo) setMaxCombo(newCombo);
                    
                    mb.speed = Math.min(mb.speed + 0.0002, 0.006);
                    
                    triggerConfettiStars(newX, newCombo);
                    addFloatingText(`x${newCombo}`, 'perfect', GAME_AREA_WIDTH/2, TOWER_ANCHOR_Y - 100);

                } else {
                    // RESET COMBO
                    setCombo(0);

                    if (Math.abs(deltaLeft) >= prevBlock.width) {
                        // FALLO TOTAL
                        missed = true;
                    } else {
                        // CORTE PARCIAL
                        newWidth = prevBlock.width - Math.abs(deltaLeft);
                        
                        if (deltaLeft > 0) {
                            newX = currentLeft + (newWidth / 2);
                            debrisPiece = { id: Date.now(), x: currentLeft + newWidth, width: Math.abs(deltaLeft), color: COLORS[currentLevel % COLORS.length] };
                        } else {
                            newX = (currentLeft + mb.width) - (newWidth / 2);
                            debrisPiece = { id: Date.now(), x: currentLeft, width: Math.abs(deltaLeft), color: COLORS[currentLevel % COLORS.length] };
                        }
                    }
                }

                if (missed) {
                    setShake(true); 
                    setTimeout(() => setShake(false), 400);
                    setGameState('GAMEOVER');
                    return;
                }

                // Colocamos el bloque definitivo en la torre
                const currentWord = levels[currentLevel].items[score];
                const newBlock = {
                    id: `block-${score}`,
                    x: newX,
                    width: newWidth,
                    y: blocks.length,
                    textEs: currentWord.es || currentWord.word,
                    emoji: currentWord.emoji,
                    color: COLORS[currentLevel % COLORS.length], 
                    isPerfect: isPerfect
                };

                setBlocks(prev => [...prev, newBlock]);
                if (debrisPiece) setDebris(prev => [...prev, debrisPiece]);

                const nextScore = score + 1;
                setLevelScore(nextScore);
                setTotalScore(prev => prev + 1);

                // Bajamos la cámara
                setCameraY((blocks.length) * BLOCK_HEIGHT);

                // Verificamos si ganamos
                if (nextScore >= levels[currentLevel].items.length) {
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                    setTimeout(() => {
                        if (currentLevel >= levels.length - 1) {
                            setGameState('VICTORY');
                        } else {
                            setGameState('LEVEL_TRANSITION');
                        }
                    }, 500); 
                    return;
                }

                // Reseteamos el bloque colgante para el siguiente tiro
                if(blockDOMRef.current) {
                    blockDOMRef.current.style.transition = 'none'; // Quitamos transición para teletransportarlo arriba
                    blockDOMRef.current.style.top = `${BLOCK_Y}px`;
                }
                movingBlockRef.current.width = newWidth; 
                movingBlockRef.current.x = GAME_AREA_WIDTH / 2; 
                isDroppingRef.current = false; // Desbloqueamos
            };

            // Controles Táctiles
            useEffect(() => {
                const handlePointerDown = (e) => {
                    if(e.target.closest('.no-drop')) return;
                    handleDrop();
                };
                if (gameState === 'PLAYING') window.addEventListener('pointerdown', handlePointerDown);
                return () => window.removeEventListener('pointerdown', handlePointerDown);
            }, [gameState]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const openLibrary = () => {
                setPrevState(gameState);
                setGameState('LIBRARY');
            };

            // ================== RENDER SCREENS ================== //
            if (gameState === 'LOADING') return <div className="h-screen flex items-center justify-center bg-zinc-950 text-white"><div className="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div></div>;
            if (gameState === 'ERROR') return <div className="h-screen flex items-center justify-center bg-zinc-950 text-rose-500 font-bold">Error cargando datos. Verifica el ID.</div>;

            if (gameState === 'MENU') {
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center building-bg" style={{backgroundPosition: '0% 100%'}}>
                        <button onClick={openLibrary} className="absolute top-6 right-6 bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-2 backdrop-blur-md transition">
                            <BookOpen size={20}/> <span className="font-bold text-sm hidden sm:block">Planos</span>
                        </button>

                        <div className="w-24 h-24 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-3xl flex items-center justify-center shadow-[0_0_50px_rgba(16,185,129,0.5)] mb-8 transform -rotate-6 border-4 border-white/20">
                            <Building2 size={48} className="text-white"/>
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2 tracking-tight drop-shadow-lg">{gameData.title}</h1>
                        <p className="text-emerald-300 font-bold uppercase tracking-widest text-sm mb-12">Proyecto: 4 Edificios</p>
                        
                        <div className="bg-black/40 backdrop-blur-md p-6 rounded-3xl w-full max-w-sm border border-white/10 mb-8">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-zinc-400 font-bold">Edificios a construir</span>
                                <span className="text-2xl font-black">{levels.length}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-zinc-400 font-bold">Total Palabras</span>
                                <span className="text-xl font-black">{levels.reduce((acc, lvl) => acc + lvl.items.length, 0)}</span>
                            </div>
                        </div>

                        <button onClick={() => { setTotalScore(0); startLevel(0); }} className="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 w-full max-w-sm py-5 rounded-2xl font-black text-xl shadow-[0_10px_25px_rgba(16,185,129,0.4)] transition active:scale-95 flex items-center justify-center gap-3">
                            <Play fill="currentColor" /> INICIAR OBRA
                        </button>
                    </div>
                );
            }

            if (gameState === 'LIBRARY') {
                return (
                    <div className="flex flex-col h-screen bg-zinc-950 p-6 overflow-hidden text-white">
                        <div className="flex items-center justify-between mb-6 shrink-0">
                            <h2 className="text-2xl font-black flex items-center gap-2"><BookOpen className="text-indigo-400"/> Archivos de Obra</h2>
                            <button onClick={() => setGameState(prevState)} className="p-3 bg-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-700 transition-colors">
                                <X size={24} />
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-6 pr-2 pb-10">
                            {levels.map((lvl, i) => (
                                <div key={i} className="bg-zinc-900 rounded-3xl border border-white/5 overflow-hidden">
                                    <div className={`px-5 py-4 ${COLORS[i % COLORS.length]} bg-opacity-20 border-b border-white/5 font-black uppercase tracking-widest text-sm flex justify-between items-center`}>
                                        <span>Edificio {i + 1}: {lvl.name}</span>
                                        <span className="bg-black/30 px-2 py-1 rounded text-xs">{lvl.items.length} pisos</span>
                                    </div>
                                    <div className="p-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {lvl.items.map((item, idx) => (
                                            <div key={idx} className="flex flex-col bg-black/40 p-3 rounded-xl border border-white/5">
                                                <div className="flex items-center gap-3">
                                                    <div className="text-2xl w-10 h-10 bg-zinc-800 rounded-lg flex items-center justify-center shrink-0">{item.emoji}</div>
                                                    <span className="font-bold text-zinc-200">{item.en || item.word}</span>
                                                </div>
                                                <div className="text-sm text-emerald-400 font-bold ml-14">{item.es || item.word}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'LEVEL_TRANSITION') {
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center building-bg" style={{backgroundPosition: '0% 0%'}}>
                        <div className="w-24 h-24 bg-emerald-500 rounded-3xl flex items-center justify-center mb-8 transform rotate-6 shadow-[0_0_50px_rgba(16,185,129,0.5)]">
                            <Building2 size={48} className="text-white"/>
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2">¡Edificio {currentLevel + 1} Listo!</h1>
                        <p className="font-bold uppercase tracking-widest text-sm mb-12 text-emerald-300">
                            Sector: {levels[currentLevel].name}
                        </p>
                        
                        <button onClick={() => startLevel(currentLevel + 1)} className="bg-indigo-600 hover:bg-indigo-500 text-white w-full max-w-sm py-5 rounded-2xl font-black text-xl shadow-lg transition active:scale-95 flex items-center justify-center gap-3">
                            CONSTRUIR EDIFICIO {currentLevel + 2} <ChevronRight size={24}/>
                        </button>
                    </div>
                );
            }

            if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
                const isVictory = gameState === 'VICTORY';
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center building-bg" style={{backgroundPosition: isVictory ? '0% 0%' : '0% 100%'}}>
                        <button onClick={openLibrary} className="absolute top-6 right-6 bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-2 backdrop-blur-md transition">
                            <BookOpen size={20}/>
                        </button>

                        <div className={`w-24 h-24 rounded-3xl flex items-center justify-center mb-8 transform rotate-6 shadow-2xl ${isVictory ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                            {isVictory ? <Trophy size={48} className="text-white"/> : <AlertTriangle size={48} className="text-white"/>}
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2">{isVictory ? '¡Ciudad Completada!' : '¡Derrumbe!'}</h1>
                        <p className={`font-bold uppercase tracking-widest text-sm mb-12 ${isVictory ? 'text-emerald-300' : 'text-rose-300'}`}>
                            {isVictory ? 'Eres un Maestro Constructor' : `Caíste en el Edificio ${currentLevel + 1}`}
                        </p>
                        
                        <div className="bg-black/40 backdrop-blur-md p-6 rounded-3xl w-full max-w-sm border border-white/10 mb-8 grid grid-cols-2 gap-4">
                            <div className="bg-white/5 p-4 rounded-2xl">
                                <Layers className="text-indigo-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{totalScore}/{levels.reduce((a,l)=>a+l.items.length,0)}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Total Pisos</div>
                            </div>
                            <div className="bg-white/5 p-4 rounded-2xl">
                                <Timer className="text-amber-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{formatTime(timeElapsed)}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Tiempo Total</div>
                            </div>
                        </div>

                        <div className="flex gap-4 w-full max-w-sm">
                            <button onClick={() => window.location.href='index.html'} className="bg-zinc-800 hover:bg-zinc-700 text-white p-5 rounded-2xl font-black transition active:scale-95 flex items-center justify-center shrink-0">
                                <Home />
                            </button>
                            <button onClick={() => { setTotalScore(0); startLevel(0); }} className={`${isVictory ? 'bg-indigo-600' : 'bg-rose-600'} flex-1 text-white py-5 rounded-2xl font-black text-lg shadow-lg transition active:scale-95 flex items-center justify-center gap-2`}>
                                <RotateCcw /> REINICIAR OBRA
                            </button>
                        </div>
                    </div>
                );
            }

            // ================== PLAYING / PAUSED SCREEN ================== //
            const currentLvlData = levels[currentLevel];
            const currentWord = currentLvlData.items[levelScore];
            
            // Calculamos el progreso para mover el fondo (100% es ciudad, 0% es espacio exterior)
            const bgProgress = Math.max(0, 100 - (levelScore / currentLvlData.items.length) * 100);
            const isInSpace = bgProgress < 40; // Aparecen las estrellas en el tercio superior

            return (
                <div className={`h-screen w-full flex justify-center building-bg overflow-hidden ${shake ? 'shake-active' : ''}`} style={{backgroundPosition: `0% ${bgProgress}%`}}>
                    
                    {/* Estrellas Estáticas (Espacio) */}
                    <div className={`absolute inset-0 space-stars pointer-events-none ${isInSpace ? 'opacity-100' : 'opacity-0'}`}></div>

                    {/* Interfaz Superior */}
                    <div className="absolute top-0 inset-x-0 p-4 flex justify-between items-start z-50 pointer-events-none">
                        <div className="flex flex-col gap-2">
                            <div className="bg-black/40 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 flex items-center gap-3">
                                <Building2 className="text-indigo-400" size={18}/>
                                <div>
                                    <div className="text-[10px] text-zinc-400 font-bold uppercase leading-none mb-1">Edificio {currentLevel + 1}</div>
                                    <div className="text-white font-black leading-none">{levelScore} <span className="text-zinc-500 text-xs">/ {currentLvlData.items.length}</span></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-2 pointer-events-auto">
                            <div className="flex gap-2">
                                <div className="bg-black/40 backdrop-blur-md px-3 py-2 rounded-2xl border border-white/10 flex items-center gap-2 pointer-events-none">
                                    <Timer className="text-amber-400" size={16}/>
                                    <span className="text-white font-bold font-mono">{formatTime(timeElapsed)}</span>
                                </div>
                                <button onClick={() => setGameState('PAUSED')} className="bg-black/40 backdrop-blur-md p-2 rounded-2xl border border-white/10 hover:bg-white/20 transition active:scale-95 no-drop">
                                    <Pause className="text-white" size={20}/>
                                </button>
                            </div>
                            
                            {combo > 1 && (
                                <div className="bg-gradient-to-r from-yellow-400 to-amber-500 text-zinc-900 px-3 py-1 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg animate-pulse">
                                    Combo x{combo}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ZONA DE JUEGO */}
                    <div className="relative w-full max-w-[400px] h-full overflow-hidden">
                        
                        {/* 1. LA GRÚA Y EL BLOQUE QUE CUELGA */}
                        <div className="absolute top-0 inset-x-0 z-40">
                            {/* Cuerda Larga */}
                            <div className="crane-cable" style={{ top: `${CRANE_TOP}px`, height: `${CABLE_LENGTH}px` }}></div>
                            
                            {/* Bloque Colgando */}
                            {currentWord && (
                                <div 
                                    ref={blockDOMRef}
                                    className={`absolute h-[60px] rounded-xl shadow-2xl flex items-center justify-center text-white border-2 border-white/20 block-texture z-40 ${COLORS[currentLevel % COLORS.length]}`}
                                    style={{ top: `${BLOCK_Y}px`, left: '0px', width: `${INITIAL_BLOCK_WIDTH}px`, willChange: 'left, width, top' }}
                                >
                                    <div className="px-4 text-center truncate font-bold drop-shadow-md text-lg">
                                        <span className="mr-2 text-xl">{currentWord.emoji}</span>
                                        {currentWord.en || currentWord.word}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 2. LA TORRE ANCLADA ABAJO */}
                        <div className="absolute inset-x-0 w-full" style={{ top: `${TOWER_ANCHOR_Y}px`, transform: `translateY(${cameraY}px)`, transition: 'transform 0.2s ease-out' }}>
                            {blocks.map((b) => (
                                <div 
                                    key={b.id}
                                    className={`absolute h-[60px] rounded-xl flex items-center justify-center text-white border-t-2 border-white/20 shadow-[0_10px_30px_rgba(0,0,0,0.5)] transition-all ${b.color}`}
                                    style={{ 
                                        left: `${b.x - (b.width/2)}px`, 
                                        width: `${b.width}px`, 
                                        top: `${-(b.y * BLOCK_HEIGHT)}px`, 
                                    }}
                                >
                                    {b.isPerfect && <div className="absolute -left-1 -right-1 top-0 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent opacity-80"></div>}
                                    <div className="px-2 text-center truncate font-bold text-sm drop-shadow-md">
                                        {b.emoji} {b.textEs}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 3. ESCOMBROS (Caída Infinita) */}
                        {debris.map(d => (
                            <div 
                                key={d.id}
                                className={`absolute h-[60px] rounded-xl opacity-80 ${d.color} debris`}
                                style={{ left: `${d.x}px`, width: `${d.width}px`, top: `${TOWER_ANCHOR_Y}px` }}
                            ></div>
                        ))}

                        {/* 4. TEXTOS FLOTANTES DE COMBO */}
                        {floatingTexts.map(ft => (
                            <div 
                                key={ft.id} 
                                className="absolute text-yellow-400 font-black text-4xl drop-shadow-lg float-text z-50 whitespace-nowrap tracking-tighter"
                                style={{ left: `${ft.x}px`, top: `${ft.y}px`, transform: 'translateX(-50%)' }}
                            >
                                {ft.text}
                            </div>
                        ))}

                    </div>

                    {/* OVERLAY DE PAUSA */}
                    {gameState === 'PAUSED' && (
                        <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center text-white p-6 text-center animate-in fade-in touch-auto">
                            <Pause size={64} className="mb-6 text-emerald-500" />
                            <h3 className="text-3xl font-black mb-2 tracking-tighter uppercase">Obra en Pausa</h3>
                            <p className="text-zinc-400 mb-8">Edificio {currentLevel + 1}: {currentLvlData.name}</p>
                            
                            <div className="flex flex-col gap-3 w-full max-w-xs">
                                <button onClick={() => setGameState('PLAYING')} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                                    Reanudar Obra
                                </button>
                                <button onClick={openLibrary} className="w-full py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                    <BookOpen size={20}/> Ver Planos
                                </button>
                                <button onClick={() => window.location.href='index.html'} className="w-full py-4 bg-transparent text-zinc-500 hover:text-white rounded-2xl font-bold uppercase tracking-widest transition-colors mt-4">
                                    Salir al Hub
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<WordBuildings />);
    </script>
</body>
</html>

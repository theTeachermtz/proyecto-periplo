<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Buildings | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background-color: #09090b; touch-action: none; user-select: none; }
        
        .sky-bg {
            background: linear-gradient(to bottom, #1e1b4b, #312e81, #4338ca, #0f172a);
            background-size: 100% 400%;
            transition: background-position 2s ease-out;
        }

        .crane-cable {
            position: absolute;
            width: 4px;
            background: linear-gradient(to bottom, #94a3b8, #cbd5e1);
            left: 50%;
            transform: translateX(-50%);
            transform-origin: top center;
            z-index: 10;
        }

        .block-texture {
            background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
        }

        /* Shake animation for heavy drops */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.3s; }

        /* Perfect combo float text */
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        .float-text { animation: floatUp 1s ease-out forwards; pointer-events: none; }

        /* Debris falling */
        @keyframes fallDebris {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
        }
        .debris { animation: fallDebris 1.5s ease-in forwards; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, getDoc } from 'firebase/firestore';
        import { Building2, Play, RotateCcw, Home, Timer, Trophy, Star, AlertTriangle, Layers } from 'lucide-react';

        // Configuración Firebase (Reemplazar con la tuya si es necesario)
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Constants
        const GAME_AREA_WIDTH = 400; // Fixed logical width for the game area
        const INITIAL_BLOCK_WIDTH = 250;
        const BLOCK_HEIGHT = 60;
        const SWING_SPEED_BASE = 0.003;
        const PERFECT_TOLERANCE = 8; // Pixels of forgiveness

        const COLORS = [
            'bg-indigo-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500', 
            'bg-cyan-500', 'bg-fuchsia-500', 'bg-blue-500', 'bg-violet-500'
        ];

        const WordBuildings = () => {
            const [gameState, setGameState] = useState('LOADING'); // LOADING, MENU, PLAYING, GAMEOVER, VICTORY
            const [gameData, setGameData] = useState(null);
            const [queue, setQueue] = useState([]); // All words flattened
            
            // Stats
            const [score, setScore] = useState(0); // Words placed
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [attempts, setAttempts] = useState(1);
            
            // Engine State (React state for rendering the placed tower)
            const [blocks, setBlocks] = useState([]);
            const [debris, setDebris] = useState([]);
            const [floatingTexts, setFloatingTexts] = useState([]);
            const [cameraY, setCameraY] = useState(0);
            const [shake, setShake] = useState(false);

            // Refs for the high-performance rAF loop
            const requestRef = useRef();
            const timeRef = useRef(0);
            const movingBlockRef = useRef({ x: 0, width: INITIAL_BLOCK_WIDTH, direction: 1, speed: SWING_SPEED_BASE });
            const blockDOMRef = useRef(null);
            const isDroppingRef = useRef(false);

            // Fetch Data
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) return setGameState('ERROR');

                getDoc(doc(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes', id)).then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setGameData(data);
                        
                        // Flatten items and shuffle slightly, or keep order. Let's mix them.
                        let allWords = [];
                        if (data.content && data.content.categories) {
                            data.content.categories.forEach(cat => {
                                if(cat.items) allWords = allWords.concat(cat.items);
                            });
                        }
                        // Shuffle array
                        allWords = allWords.sort(() => Math.random() - 0.5);
                        setQueue(allWords);
                        setGameState('MENU');
                    } else {
                        setGameState('ERROR');
                    }
                });
            }, []);

            // Timer
            useEffect(() => {
                let interval;
                if (gameState === 'PLAYING') {
                    interval = setInterval(() => setTimeElapsed(t => t + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [gameState]);

            // Game Loop (Pendulum)
            const animate = time => {
                if (gameState !== 'PLAYING') return;

                if (!isDroppingRef.current && blockDOMRef.current) {
                    const dt = time - timeRef.current;
                    const mb = movingBlockRef.current;
                    
                    // Simple pendulum using sine wave based on time for smooth swing
                    // Center is GAME_AREA_WIDTH / 2
                    const center = GAME_AREA_WIDTH / 2;
                    const swingAmplitude = (GAME_AREA_WIDTH - mb.width) / 2;
                    
                    // Update X based on sine
                    mb.x = center + Math.sin(time * mb.speed) * swingAmplitude;
                    
                    // Apply to DOM directly bypassing React for 60fps
                    blockDOMRef.current.style.left = `${mb.x - (mb.width/2)}px`;
                    blockDOMRef.current.style.width = `${mb.width}px`;
                }

                timeRef.current = time;
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                if (gameState === 'PLAYING') {
                    requestRef.current = requestAnimationFrame(animate);
                }
                return () => cancelAnimationFrame(requestRef.current);
            }, [gameState]);

            const startGame = () => {
                setScore(0);
                setCombo(0);
                setTimeElapsed(0);
                setCameraY(0);
                setDebris([]);
                setFloatingTexts([]);
                
                // Initialize Base Block (Floor)
                setBlocks([{
                    id: 'base',
                    x: GAME_AREA_WIDTH / 2,
                    width: INITIAL_BLOCK_WIDTH,
                    y: 0,
                    textEs: 'START',
                    emoji: '🏁',
                    color: 'bg-zinc-800'
                }]);

                movingBlockRef.current = {
                    x: GAME_AREA_WIDTH / 2,
                    width: INITIAL_BLOCK_WIDTH,
                    speed: SWING_SPEED_BASE
                };

                isDroppingRef.current = false;
                setGameState('PLAYING');
            };

            const triggerShake = () => {
                setShake(true);
                setTimeout(() => setShake(false), 300);
            };

            const addFloatingText = (text, type, x, y) => {
                const id = Date.now();
                setFloatingTexts(prev => [...prev, { id, text, type, x, y }]);
                setTimeout(() => {
                    setFloatingTexts(prev => prev.filter(ft => ft.id !== id));
                }, 1000);
            };

            const handleDrop = () => {
                if (gameState !== 'PLAYING' || isDroppingRef.current) return;
                isDroppingRef.current = true; // Lock interaction

                // 1. Get current positions
                const mb = movingBlockRef.current;
                const prevBlock = blocks[blocks.length - 1]; // Top of the tower

                // Block center X
                const currentX = mb.x;
                const prevX = prevBlock.x;
                
                // Block left edges (for overlap calc)
                const currentLeft = currentX - (mb.width / 2);
                const prevLeft = prevX - (prevBlock.width / 2);
                const deltaLeft = currentLeft - prevLeft;

                let newWidth = mb.width;
                let newX = currentX;
                let isPerfect = false;
                let missed = false;
                let debrisPiece = null;

                // 2. Evaluate Colission
                if (Math.abs(deltaLeft) <= PERFECT_TOLERANCE) {
                    // PERFECT HIT
                    isPerfect = true;
                    newX = prevX; // Snap to center
                    newWidth = prevBlock.width; // Snap width
                    
                    const newCombo = combo + 1;
                    setCombo(newCombo);
                    if (newCombo > maxCombo) setMaxCombo(newCombo);
                    
                    // Increase speed slightly
                    mb.speed = Math.min(mb.speed + 0.0002, 0.006);
                    
                    triggerShake();
                    addFloatingText(`¡Perfecto! x${newCombo}`, 'perfect', GAME_AREA_WIDTH/2, 100);

                } else {
                    // RESET COMBO
                    setCombo(0);

                    // Overlap logic
                    if (Math.abs(deltaLeft) >= prevBlock.width) {
                        // TOTAL MISS
                        missed = true;
                    } else {
                        // PARTIAL HIT
                        newWidth = prevBlock.width - Math.abs(deltaLeft);
                        
                        // Calculate new center X
                        if (deltaLeft > 0) {
                            // Dropped to the right
                            const newLeftEdge = currentLeft;
                            newX = newLeftEdge + (newWidth / 2);
                            
                            // Create Debris (the part that fell off)
                            debrisPiece = {
                                id: Date.now(),
                                x: currentLeft + newWidth,
                                width: Math.abs(deltaLeft),
                                color: COLORS[score % COLORS.length]
                            };
                        } else {
                            // Dropped to the left
                            const newRightEdge = currentLeft + mb.width;
                            newX = newRightEdge - (newWidth / 2);

                            debrisPiece = {
                                id: Date.now(),
                                x: currentLeft,
                                width: Math.abs(deltaLeft),
                                color: COLORS[score % COLORS.length]
                            };
                        }
                    }
                }

                if (missed) {
                    // GAME OVER
                    triggerShake();
                    setGameState('GAMEOVER');
                    setAttempts(a => a + 1);
                    return;
                }

                // 3. Update Tower
                const currentWord = queue[score];
                const newBlock = {
                    id: `block-${score}`,
                    x: newX,
                    width: newWidth,
                    y: blocks.length,
                    textEs: currentWord.es, // Translate to Spanish when placed!
                    emoji: currentWord.emoji,
                    color: COLORS[score % COLORS.length],
                    isPerfect: isPerfect
                };

                setBlocks(prev => [...prev, newBlock]);
                
                if (debrisPiece) {
                    setDebris(prev => [...prev, debrisPiece]);
                }

                // 4. Update Game State
                const nextScore = score + 1;
                setScore(nextScore);

                // Camera Pan (Keep top 3 blocks visible)
                if (blocks.length > 4) {
                    setCameraY((blocks.length - 4) * BLOCK_HEIGHT);
                }

                // Check Victory
                if (nextScore >= queue.length) {
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                    setGameState('VICTORY');
                    return;
                }

                // 5. Prepare Next Block
                setTimeout(() => {
                    movingBlockRef.current.width = newWidth; // Next block inherits the width
                    movingBlockRef.current.x = GAME_AREA_WIDTH / 2; // Reset position
                    isDroppingRef.current = false; // Unlock
                }, 100); // Small delay feels better
            };

            // Global click handler
            useEffect(() => {
                const handlePointerDown = (e) => {
                    // Prevent default to stop scrolling, then drop
                    if(e.target.closest('.no-drop')) return;
                    handleDrop();
                };
                
                if (gameState === 'PLAYING') {
                    window.addEventListener('pointerdown', handlePointerDown);
                }
                return () => window.removeEventListener('pointerdown', handlePointerDown);
            }, [gameState, blocks, combo, score, queue]);

            // Formatter for time
            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            if (gameState === 'LOADING') return <div className="h-screen flex items-center justify-center bg-zinc-950 text-white"><div className="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div></div>;
            if (gameState === 'ERROR') return <div className="h-screen flex items-center justify-center bg-zinc-950 text-rose-500 font-bold">Error cargando datos.</div>;

            // ================== RENDER SCREENS ================== //
            
            if (gameState === 'MENU') {
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center sky-bg" style={{backgroundPosition: '0% 100%'}}>
                        <div className="w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center shadow-[0_0_50px_rgba(99,102,241,0.5)] mb-8 transform -rotate-6">
                            <Building2 size={48} className="text-white"/>
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2 tracking-tight">{gameData.title}</h1>
                        <p className="text-indigo-300 font-bold uppercase tracking-widest text-sm mb-12">Stack The Words</p>
                        
                        <div className="bg-white/10 backdrop-blur-md p-6 rounded-3xl w-full max-w-sm border border-white/10 mb-8">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-zinc-400 font-bold">Palabras Totales</span>
                                <span className="text-2xl font-black">{queue.length}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-zinc-400 font-bold">Modo</span>
                                <span className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-xl text-xs font-bold uppercase">English ➔ Español</span>
                            </div>
                        </div>

                        <button onClick={startGame} className="bg-indigo-600 hover:bg-indigo-500 text-white w-full max-w-sm py-5 rounded-2xl font-black text-xl shadow-lg transition active:scale-95 flex items-center justify-center gap-3">
                            <Play fill="currentColor" /> JUGAR AHORA
                        </button>
                    </div>
                );
            }

            if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
                const isVictory = gameState === 'VICTORY';
                return (
                    <div className="h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-white text-center sky-bg" style={{backgroundPosition: isVictory ? '0% 0%' : '0% 100%'}}>
                        <div className={`w-24 h-24 rounded-3xl flex items-center justify-center mb-8 transform rotate-6 shadow-2xl ${isVictory ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                            {isVictory ? <Trophy size={48} className="text-white"/> : <AlertTriangle size={48} className="text-white"/>}
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-2">{isVictory ? '¡Torre Completada!' : '¡Se Derrumbó!'}</h1>
                        <p className={`font-bold uppercase tracking-widest text-sm mb-12 ${isVictory ? 'text-emerald-300' : 'text-rose-300'}`}>
                            {isVictory ? '¡Eres un arquitecto bilingüe!' : 'Casi llegas al techo'}
                        </p>
                        
                        <div className="bg-white/10 backdrop-blur-md p-6 rounded-3xl w-full max-w-sm border border-white/10 mb-8 grid grid-cols-2 gap-4">
                            <div className="bg-black/20 p-4 rounded-2xl">
                                <Layers className="text-indigo-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{score}/{queue.length}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Pisos</div>
                            </div>
                            <div className="bg-black/20 p-4 rounded-2xl">
                                <Timer className="text-amber-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{formatTime(timeElapsed)}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Tiempo</div>
                            </div>
                            <div className="bg-black/20 p-4 rounded-2xl col-span-2">
                                <Star className="text-yellow-400 mx-auto mb-2" size={20}/>
                                <div className="text-2xl font-black">{maxCombo}</div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase">Combo Perfecto Máximo</div>
                            </div>
                        </div>

                        <div className="flex gap-4 w-full max-w-sm">
                            <button onClick={() => window.location.href='index.html'} className="bg-zinc-800 hover:bg-zinc-700 text-white p-5 rounded-2xl font-black transition active:scale-95 flex items-center justify-center shrink-0">
                                <Home />
                            </button>
                            <button onClick={startGame} className={`${isVictory ? 'bg-indigo-600' : 'bg-rose-600'} flex-1 text-white py-5 rounded-2xl font-black text-lg shadow-lg transition active:scale-95 flex items-center justify-center gap-2`}>
                                <RotateCcw /> REINTENTAR
                            </button>
                        </div>
                    </div>
                );
            }

            // ================== PLAYING SCREEN ================== //
            const currentWord = queue[score];
            // Calculate dynamic background position (moves up as tower grows)
            const bgProgress = Math.max(0, 100 - (score / queue.length) * 100);

            return (
                <div className={`h-screen w-full flex justify-center sky-bg ${shake ? 'shake-active' : ''}`} style={{backgroundPosition: `0% ${bgProgress}%`}}>
                    
                    {/* UI Layer */}
                    <div className="fixed top-0 inset-x-0 p-4 flex justify-between items-start z-50 pointer-events-none">
                        <div className="bg-black/30 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 flex items-center gap-3">
                            <Layers className="text-indigo-400" size={18}/>
                            <div>
                                <div className="text-white font-black leading-none">{score} <span className="text-zinc-500 text-xs">/ {queue.length}</span></div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-2">
                            <div className="bg-black/30 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 flex items-center gap-2">
                                <Timer className="text-amber-400" size={16}/>
                                <span className="text-white font-bold font-mono">{formatTime(timeElapsed)}</span>
                            </div>
                            {combo > 1 && (
                                <div className="bg-yellow-500 text-black px-3 py-1 rounded-xl font-black text-xs uppercase tracking-widest animate-pulse">
                                    Combo x{combo}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Game Area Wrapper (Fixed logical width, centered) */}
                    <div className="relative w-full max-w-[400px] h-full overflow-hidden">
                        
                        {/* 1. THE CRANE / SWINGING BLOCK */}
                        <div className="absolute top-0 inset-x-0 h-32 z-40">
                            {/* Cable */}
                            <div className="crane-cable" style={{ height: '80px' }}></div>
                            
                            {/* The Block */}
                            {currentWord && (
                                <div 
                                    ref={blockDOMRef}
                                    className={`absolute top-[80px] h-[60px] rounded-xl shadow-2xl flex items-center justify-center text-white border-2 border-white/20 block-texture z-40 ${COLORS[score % COLORS.length]}`}
                                    style={{ left: '0px', width: `${INITIAL_BLOCK_WIDTH}px`, willChange: 'left, width' }}
                                >
                                    {/* Muestra la palabra en INGLÉS mientras cuelga */}
                                    <div className="px-4 text-center truncate font-bold drop-shadow-md text-lg">
                                        <span className="mr-2 text-xl">{currentWord.emoji}</span>
                                        {currentWord.en || currentWord.word}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 2. THE TOWER (Placed Blocks) */}
                        {/* We use a container that shifts down (translateY) as the tower goes up */}
                        <div className="absolute bottom-0 inset-x-0" style={{ transform: `translateY(${cameraY}px)`, transition: 'transform 0.3s ease-out' }}>
                            {blocks.map((b) => (
                                <div 
                                    key={b.id}
                                    className={`absolute h-[60px] rounded-xl flex items-center justify-center text-white border-t-2 border-white/20 shadow-xl transition-all ${b.color}`}
                                    style={{ 
                                        left: `${b.x - (b.width/2)}px`, 
                                        width: `${b.width}px`, 
                                        bottom: `${b.y * BLOCK_HEIGHT}px`,
                                        // Visual flair for perfect blocks
                                        boxShadow: b.isPerfect ? '0 0 15px rgba(250,204,21,0.5) inset' : ''
                                    }}
                                >
                                    {b.isPerfect && <div className="absolute -left-1 -right-1 top-0 h-1 bg-yellow-400 rounded-full opacity-50"></div>}
                                    {/* Muestra la palabra en ESPAÑOL una vez apilada */}
                                    <div className="px-2 text-center truncate font-bold text-sm drop-shadow-md">
                                        {b.emoji} {b.textEs}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 3. DEBRIS (Falling chunks) */}
                        {debris.map(d => (
                            <div 
                                key={d.id}
                                className={`absolute h-[60px] rounded-xl opacity-80 ${d.color} debris`}
                                style={{ 
                                    left: `${d.x}px`, 
                                    width: `${d.width}px`, 
                                    bottom: `${(blocks.length - 1) * BLOCK_HEIGHT - cameraY}px` // Spawn at the cut height
                                }}
                            ></div>
                        ))}

                        {/* 4. FLOATING TEXTS */}
                        {floatingTexts.map(ft => (
                            <div 
                                key={ft.id} 
                                className="absolute text-yellow-400 font-black text-xl drop-shadow-lg float-text z-50 whitespace-nowrap"
                                style={{ left: `${ft.x}px`, top: `${ft.y}px`, transform: 'translateX(-50%)' }}
                            >
                                {ft.text}
                            </div>
                        ))}

                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<WordBuildings />);
    </script>
</body>
</html>

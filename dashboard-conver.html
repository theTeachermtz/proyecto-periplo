<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Builder | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }; document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full"></div>
    
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { Save, Plus, Trash2, Link as LinkIcon, MessageCircle, Ear, MessageSquare, AlertCircle, Copy, Check } from 'lucide-react';

        // Configuración de Firebase (Se mantiene la de Periplo)
        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const emptyInteraction = () => ({
            id: crypto.randomUUID(),
            botAudio: '',
            q1: { correct: '', wrong1: '', wrong2: '' },
            q2: { correct: '', wrong1: '', wrong2: '' }
        });

        const Dashboard = () => {
            const [title, setTitle] = useState('');
            const [interactions, setInteractions] = useState([emptyInteraction()]);
            const [isSaving, setIsSaving] = useState(false);
            const [savedId, setSavedId] = useState(null);
            const [copied, setCopied] = useState(false);

            const handleAddInteraction = () => {
                if (interactions.length < 10) {
                    setInteractions([...interactions, emptyInteraction()]);
                }
            };

            const handleRemoveInteraction = (id) => {
                if (interactions.length > 1) {
                    setInteractions(interactions.filter(i => i.id !== id));
                }
            };

            const updateInteraction = (id, field, value) => {
                setInteractions(interactions.map(inter => {
                    if (inter.id === id) {
                        const keys = field.split('.');
                        if (keys.length === 1) return { ...inter, [field]: value };
                        return { ...inter, [keys[0]]: { ...inter[keys[0]], [keys[1]]: value } };
                    }
                    return inter;
                }));
            };

            const handleSave = async () => {
                if (!title.trim() || interactions.some(i => !i.botAudio.trim() || !i.q1.correct.trim() || !i.q2.correct.trim())) {
                    alert('Por favor completa el título y asegúrate de que todas las interacciones tengan al menos el audio y las respuestas correctas.');
                    return;
                }

                setIsSaving(true);
                try {
                    const docRef = await addDoc(collection(db, 'artifacts/periplo-app-v1/users/teacher_builder_001/quizzes'), {
                        title: title.trim(),
                        type: 'conversations',
                        content: { flow: interactions },
                        createdAt: serverTimestamp()
                    });
                    setSavedId(docRef.id);
                } catch (error) {
                    console.error("Error saving document: ", error);
                    alert("Hubo un error al guardar.");
                }
                setIsSaving(false);
            };

            const copyToClipboard = () => {
                const url = `${window.location.origin}/conversations.html?id=${savedId}`;
                navigator.clipboard.writeText(url);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="flex h-full bg-zinc-950">
                    {/* Panel Izquierdo: Constructor */}
                    <div className="flex-1 flex flex-col h-full border-r border-zinc-800">
                        <div className="p-6 border-b border-zinc-800 bg-zinc-900/50 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center border border-indigo-500/30">
                                <MessageCircle className="text-indigo-400" size={20} />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white">Conversation Builder</h1>
                                <p className="text-xs text-zinc-400 font-bold">Ciclos de Escucha y Respuesta (Max 10)</p>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                            {interactions.map((inter, index) => (
                                <div key={inter.id} className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-lg">
                                    <div className="bg-zinc-800/50 px-4 py-3 border-b border-zinc-800 flex justify-between items-center">
                                        <h3 className="font-bold text-white flex items-center gap-2">
                                            <span className="bg-indigo-600 text-white text-xs px-2 py-1 rounded-md">#{index + 1}</span>
                                            Interacción
                                        </h3>
                                        <button 
                                            onClick={() => handleRemoveInteraction(inter.id)}
                                            disabled={interactions.length === 1}
                                            className="p-1.5 text-zinc-500 hover:text-rose-400 hover:bg-rose-400/10 rounded-lg disabled:opacity-50 transition-colors"
                                            title="Eliminar"
                                        >
                                            <Trash2 size={16} />
                                        </button>
                                    </div>
                                    
                                    <div className="p-5 space-y-6">
                                        {/* Audio de la Máquina */}
                                        <div>
                                            <label className="block text-xs font-bold text-indigo-400 mb-2 flex items-center gap-1 uppercase tracking-wider">
                                                <MessageSquare size={14}/> 1. ¿Qué dice la máquina? (Audio en Inglés)
                                            </label>
                                            <textarea 
                                                value={inter.botAudio}
                                                onChange={(e) => updateInteraction(inter.id, 'botAudio', e.target.value)}
                                                className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm text-white focus:border-indigo-500 outline-none resize-none h-20"
                                                placeholder="Ej: Good morning! How can I help you today?"
                                            />
                                        </div>

                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            {/* Pregunta 1: Comprensión */}
                                            <div className="bg-zinc-950/50 p-4 rounded-xl border border-zinc-800/80">
                                                <label className="block text-xs font-bold text-emerald-400 mb-3 flex items-center gap-1 uppercase tracking-wider">
                                                    <Ear size={14}/> 2. ¿Qué entendió? (En Español)
                                                </label>
                                                <div className="space-y-2.5">
                                                    <input 
                                                        value={inter.q1.correct} onChange={(e) => updateInteraction(inter.id, 'q1.correct', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-emerald-500/50 focus:border-emerald-500 rounded-lg p-2.5 text-sm text-white outline-none placeholder:text-zinc-600"
                                                        placeholder="✓ Opción Correcta (Ej: ¡Buenos días! ¿En qué puedo ayudarte?)"
                                                    />
                                                    <input 
                                                        value={inter.q1.wrong1} onChange={(e) => updateInteraction(inter.id, 'q1.wrong1', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-rose-900/50 focus:border-rose-500 rounded-lg p-2.5 text-sm text-white outline-none placeholder:text-zinc-600"
                                                        placeholder="✗ Incorrecta 1 (Ej: Adiós, nos vemos mañana)"
                                                    />
                                                    <input 
                                                        value={inter.q1.wrong2} onChange={(e) => updateInteraction(inter.id, 'q1.wrong2', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-rose-900/50 focus:border-rose-500 rounded-lg p-2.5 text-sm text-white outline-none placeholder:text-zinc-600"
                                                        placeholder="✗ Incorrecta 2 (Ej: ¿Qué hora es?)"
                                                    />
                                                </div>
                                            </div>

                                            {/* Pregunta 2: Respuesta */}
                                            <div className="bg-zinc-950/50 p-4 rounded-xl border border-zinc-800/80">
                                                <label className="block text-xs font-bold text-amber-400 mb-3 flex items-center gap-1 uppercase tracking-wider">
                                                    <MessageCircle size={14}/> 3. ¿Qué debe responder? (En Inglés)
                                                </label>
                                                <div className="space-y-2.5">
                                                    <input 
                                                        value={inter.q2.correct} onChange={(e) => updateInteraction(inter.id, 'q2.correct', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-emerald-500/50 focus:border-emerald-500 rounded-lg p-2.5 text-sm text-white outline-none placeholder:text-zinc-600"
                                                        placeholder="✓ Opción Correcta (Ej: I need to buy a ticket, please.)"
                                                    />
                                                    <input 
                                                        value={inter.q2.wrong1} onChange={(e) => updateInteraction(inter.id, 'q2.wrong1', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-rose-900/50 focus:border-rose-500 rounded-lg p-2.5 text-sm text-white outline-none placeholder:text-zinc-600"
                                                        placeholder="✗ Incorrecta 1 (Ej: I like pizza.)"
                                                    />
                                                    <input 
                                                        value={inter.q2.wrong2} onChange={(e) => updateInteraction(inter.id, 'q2.wrong2', e.target.value)}
                                                        className="w-full bg-zinc-900 border border-rose-900/50 focus:border-rose-500 rounded-lg p-2.5 text-sm text-white outline-none placeholder:text-zinc-600"
                                                        placeholder="✗ Incorrecta 2 (Ej: She is my sister.)"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}

                            <button 
                                onClick={handleAddInteraction}
                                disabled={interactions.length >= 10}
                                className="w-full py-4 border-2 border-dashed border-zinc-800 hover:border-indigo-500/50 hover:bg-indigo-500/5 disabled:opacity-50 disabled:cursor-not-allowed rounded-2xl flex flex-col items-center justify-center gap-2 text-zinc-400 hover:text-indigo-400 transition-all"
                            >
                                <Plus size={24} />
                                <span className="font-bold text-sm">Agregar Interacción ({interactions.length}/10)</span>
                            </button>
                        </div>
                    </div>

                    {/* Panel Derecho: Configuración y Guardado */}
                    <div className="w-80 lg:w-96 bg-zinc-900 flex flex-col">
                        <div className="p-6 border-b border-zinc-800">
                            <h2 className="font-bold text-white mb-4">Configuración Final</h2>
                            <label className="block text-xs text-zinc-400 font-bold mb-2 uppercase tracking-wider">Título de la Actividad</label>
                            <input 
                                type="text"
                                value={title}
                                onChange={(e) => setTitle(e.target.value)}
                                placeholder="Ej: At the Airport..."
                                className="w-full bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none font-bold"
                            />
                        </div>

                        <div className="p-6">
                            <button 
                                onClick={handleSave}
                                disabled={isSaving}
                                className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-indigo-600/50 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 flex items-center justify-center gap-2 transition-all uppercase tracking-widest text-sm"
                            >
                                {isSaving ? <span className="animate-pulse">Guardando...</span> : <><Save size={18} /> Guardar Juego</>}
                            </button>

                            {savedId && (
                                <div className="mt-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl animate-pop">
                                    <div className="flex items-center gap-2 text-emerald-400 mb-2">
                                        <AlertCircle size={16} />
                                        <span className="font-bold text-sm">¡Juego Generado!</span>
                                    </div>
                                    <p className="text-xs text-zinc-400 mb-3">Envía este enlace a tus alumnos:</p>
                                    <div className="flex gap-2">
                                        <input 
                                            readOnly 
                                            value={`${window.location.origin}/conversations.html?id=${savedId}`}
                                            className="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-300 outline-none"
                                        />
                                        <button 
                                            onClick={copyToClipboard}
                                            className="bg-zinc-800 hover:bg-zinc-700 p-2 rounded-lg text-white transition-colors"
                                        >
                                            {copied ? <Check size={16} className="text-emerald-400"/> : <Copy size={16} />}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>

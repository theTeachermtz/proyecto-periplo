<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Directorio de Alumnos | Periplo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap'); 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #6366f1; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 4px; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #3f3f46; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, serverTimestamp, query, where, getDocs, writeBatch } from 'firebase/firestore';
        import { Users, Link as LinkIcon, Plus, Trash2, ArrowLeft, Sun, Moon, CheckCircle2, UserPlus, Hash, Star, LayoutGrid, Zap, Award, Activity, MessageCircle, Ear, BookOpen, PenTool, Brain, Mic, Save, X, HelpCircle, Wand2, GitMerge, Palette, Target } from 'lucide-react';

        const firebaseConfig = { apiKey: "AIzaSyD4d-Kx1jQbgrKIdeOftv7BM729m7MIGPo", authDomain: "proyecto-periplo.firebaseapp.com", projectId: "proyecto-periplo", storageBucket: "proyecto-periplo.firebasestorage.app", messagingSenderId: "236795998392", appId: "1:236795998392:web:0da24b4f018611b55c844d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const FRUIT_FLOWER_PALETTE = [
            { id: 'lavanda', class: 'bg-violet-200 border-violet-300 text-violet-900 dark:bg-violet-900/50 dark:border-violet-500 dark:text-violet-100' },
            { id: 'lirio', class: 'bg-stone-50 border-stone-200 text-stone-600 dark:bg-stone-800 dark:border-stone-500 dark:text-stone-200' },
            { id: 'menta', class: 'bg-teal-200 border-teal-300 text-teal-900 dark:bg-teal-900/50 dark:border-teal-500 dark:text-teal-100' },
            { id: 'durazno', class: 'bg-orange-200 border-orange-300 text-orange-900 dark:bg-orange-900/50 dark:border-orange-500 dark:text-orange-100' },
            { id: 'cereza', class: 'bg-rose-300 border-rose-400 text-rose-900 dark:bg-rose-900/50 dark:border-rose-500 dark:text-rose-100' },
            { id: 'arandano', class: 'bg-blue-300 border-blue-400 text-blue-900 dark:bg-blue-900/50 dark:border-blue-500 dark:text-blue-100' },
            { id: 'kiwi', class: 'bg-lime-200 border-lime-300 text-lime-900 dark:bg-lime-900/50 dark:border-lime-500 dark:text-lime-100' },
            { id: 'uva', class: 'bg-purple-300 border-purple-400 text-purple-900 dark:bg-purple-900/50 dark:border-purple-500 dark:text-purple-100' },
            { id: 'fresa', class: 'bg-pink-200 border-pink-300 text-pink-900 dark:bg-pink-900/50 dark:border-pink-500 dark:text-pink-100' },
            { id: 'mandarina', class: 'bg-amber-200 border-amber-300 text-amber-900 dark:bg-amber-900/50 dark:border-amber-500 dark:text-amber-100' },
            { id: 'cielo', class: 'bg-sky-200 border-sky-300 text-sky-900 dark:bg-sky-900/50 dark:border-sky-500 dark:text-sky-100' },
            { id: 'coral', class: 'bg-red-200 border-red-300 text-red-900 dark:bg-red-900/50 dark:border-red-500 dark:text-red-100' },
        ];

        const LEVELS = [
            { id: 'all', name: 'Todos', icon: Users },
            { id: 'limbo', name: 'Limbo', icon: HelpCircle },
            { id: 'vip', name: 'VIP', icon: Star },
            { id: 'basic', name: 'Básico', icon: LayoutGrid },
            { id: 'advanced', name: 'Avanzado', icon: Zap },
            { id: 'pro', name: 'Pro', icon: Award }
        ];

        const calculateArchetype = (s) => {
            const spk = parseInt(s.speaking) || 0;
            const lst = parseInt(s.listening) || 0;
            const rdn = parseInt(s.reading) || 0;
            const grm = parseInt(s.grammar) || 0;
            const voc = parseInt(s.vocabulary) || 0;
            const prn = parseInt(s.pronunciation) || 0;
            
            const total = spk + lst + rdn + grm + voc + prn;

            if (total <= 10) return { name: "Ahí vamos 🥚", desc: "Tabula rasa. Listo para moldear.", color: "text-stone-500" };
            if (total >= 54) return { name: "Maestro Jedi 👑", desc: "Casi nativo. Ya bromea en inglés.", color: "text-amber-500" };

            if (grm >= 8 && spk <= 5) return { name: "Teórico Bloqueado 📚", desc: "Sabe reglas, pero le da pánico hablar.", color: "text-blue-500" };
            if (spk >= 8 && grm <= 5) return { name: "Tarzán Fluido 🌴", desc: "Habla rápido, pero conjuga a lo salvaje.", color: "text-emerald-500" };
            if (lst >= 8 && spk <= 5) return { name: "Esponja Muda 🧽", desc: "Entiende el chisme, pero no opina.", color: "text-cyan-500" };
            if ((rdn >= 8 || voc >= 8) && lst <= 5 && spk <= 5) return { name: "Lector Académico 🤓", desc: "Lee a Shakespeare, no pide un café.", color: "text-purple-500" };
            if (prn >= 8 && grm <= 5) return { name: "Loro Bilingüe 🦜", desc: "Pronuncia hermoso, pero estructura mal.", color: "text-rose-500" };
            
            if (total < 25) return { name: "Sobreviviente 🐣", desc: "Sobrevive con lo mínimo indispensable.", color: "text-orange-500" };
            if (total >= 25 && total < 45) return { name: "Todo Terreno 🚙", desc: "Balanceado. El intermedio sólido.", color: "text-teal-500" };
            return { name: "Avanzado Pulido 💎", desc: "Detalles mínimos por arreglar.", color: "text-indigo-500" };
        };

        const getSuggestedLevel = (totalScore) => {
            if (totalScore < 25) return 'basic';
            if (totalScore < 45) return 'advanced';
            return 'pro';
        };

        const getRandomColor = () => FRUIT_FLOWER_PALETTE[Math.floor(Math.random() * FRUIT_FLOWER_PALETTE.length)].class;
        const getNextFolio = (existingStudents) => {
            if(existingStudents.length === 0) return "0001";
            const folios = existingStudents.map(s => parseInt(s.folio) || 0);
            return String(Math.max(...folios) + 1).padStart(4, '0');
        };

        const StudentManager = () => {
            const [students, setStudents] = useState([]);
            const [newStudentName, setNewStudentName] = useState('');
            const [newStudentLevel, setNewStudentLevel] = useState('limbo'); 
            
            const [copiedId, setCopiedId] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('all');

            const [evalModal, setEvalModal] = useState(null); 
            const [evalSkills, setEvalSkills] = useState({ speaking: 0, listening: 0, reading: 0, grammar: 0, vocabulary: 0, pronunciation: 0 });
            
            const [colorModal, setColorModal] = useState(null); 
            const [showMatchmaker, setShowMatchmaker] = useState(false);

            useEffect(() => {
                const savedTheme = localStorage.getItem('themePreference');
                if (savedTheme === 'light') setIsDarkMode(false);
                
                const unsubscribe = onSnapshot(collection(db, 'artifacts', 'periplo-app-v1', 'students'), (snapshot) => {
                    const loaded = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => (parseInt(a.folio) || 9999) - (parseInt(b.folio) || 9999));
                    setStudents(loaded);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);
            const toggleTheme = () => { setIsDarkMode(!isDarkMode); localStorage.setItem('themePreference', !isDarkMode ? 'dark' : 'light'); };

            const handleAddStudent = async (e) => {
                e.preventDefault();
                if (!newStudentName.trim()) return;
                try {
                    await addDoc(collection(db, 'artifacts', 'periplo-app-v1', 'students'), { 
                        name: newStudentName.trim(), 
                        folio: getNextFolio(students),
                        color: getRandomColor(),
                        level: newStudentLevel,
                        skills: { speaking: 0, listening: 0, reading: 0, grammar: 0, vocabulary: 0, pronunciation: 0 },
                        createdAt: serverTimestamp() 
                    });
                    setNewStudentName('');
                    setNewStudentLevel('limbo');
                } catch (error) { alert("Error: " + error.message); }
            };

            const handleDeleteStudent = async (id, name) => {
                if (confirm(`¿Eliminar a ${name}?`)) {
                    try { await deleteDoc(doc(db, 'artifacts', 'periplo-app-v1', 'students', id)); } 
                    catch (error) { alert("Error: " + error.message); }
                }
            };

            const handleChangeLevel = async (id, newLevel) => {
                try { await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'students', id), { level: newLevel }); } 
                catch (error) { alert("Error: " + error.message); }
            };

            const handleChangeColor = async (student, newColorClass) => {
                try {
                    await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'students', student.id), { color: newColorClass });
                    const q = query(collection(db, 'artifacts', 'periplo-app-v1', 'schedule'), where('student', '==', student.name));
                    const snap = await getDocs(q);
                    const batch = writeBatch(db);
                    snap.forEach(d => batch.update(d.ref, { customColor: newColorClass }));
                    await batch.commit();
                    setColorModal(null);
                } catch(e) { alert("Error actualizando color: " + e.message); }
            };

            const copyLink = (name, id) => {
                const link = `${window.location.origin}${window.location.pathname.replace('students.html', '')}schedule.html?student=${encodeURIComponent(name)}`;
                navigator.clipboard.writeText(link);
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            };

            const openEvaluation = (student) => {
                setEvalSkills(student.skills || { speaking: 0, listening: 0, reading: 0, grammar: 0, vocabulary: 0, pronunciation: 0 });
                setEvalModal(student);
            };

            const saveEvaluation = async () => {
                if (!evalModal) return;
                try {
                    const currentTotal = parseInt(evalSkills.speaking||0)+parseInt(evalSkills.listening||0)+parseInt(evalSkills.reading||0)+parseInt(evalSkills.grammar||0)+parseInt(evalSkills.vocabulary||0)+parseInt(evalSkills.pronunciation||0);
                    let targetLevel = evalModal.level;
                    if (evalModal.level !== 'vip') targetLevel = getSuggestedLevel(currentTotal);

                    await updateDoc(doc(db, 'artifacts', 'periplo-app-v1', 'students', evalModal.id), { 
                        skills: evalSkills, level: targetLevel
                    });
                    setEvalModal(null);
                } catch (error) { alert("Error: " + error.message); }
            };

            const runMatchmaker = () => {
                const semiStudents = students.filter(s => s.level !== 'vip' && s.level !== 'limbo' && s.skills);
                let pairs = [];
                for(let i=0; i<semiStudents.length; i++) {
                    for(let j=i+1; j<semiStudents.length; j++) {
                        const s1 = semiStudents[i];
                        const s2 = semiStudents[j];
                        const t1 = Object.values(s1.skills).reduce((a,b)=>a+Number(b),0);
                        const t2 = Object.values(s2.skills).reduce((a,b)=>a+Number(b),0);
                        
                        if(Math.abs(t1 - t2) <= 12) { 
                            let reason = "";
                            let strength = "good";

                            const struggles1 = Object.entries(s1.skills).filter(([k,v]) => Number(v) <= 4).map(e=>e[0]);
                            const struggles2 = Object.entries(s2.skills).filter(([k,v]) => Number(v) <= 4).map(e=>e[0]);
                            const sharedStruggle = struggles1.find(sk => struggles2.includes(sk));
                            
                            const good1 = Object.entries(s1.skills).filter(([k,v]) => Number(v) >= 7).map(e=>e[0]);
                            const complement = good1.find(sk => struggles2.includes(sk));

                            if (sharedStruggle) {
                                reason = `Ambos sufren con ${sharedStruggle}. Ideal para atacarlo juntos.`;
                                strength = "perfect";
                            } else if (complement) {
                                reason = `Se complementan: ${s1.name} domina ${complement} y puede ayudar a ${s2.name}.`;
                                strength = "perfect";
                            } else {
                                reason = `Nivel global muy similar (${t1} vs ${t2} pts). Buen ritmo de clase.`;
                            }

                            pairs.push({ s1, s2, reason, diff: Math.abs(t1-t2), strength });
                        }
                    }
                }
                return pairs.sort((a,b)=>a.diff - b.diff).slice(0, 4);
            };

            const filteredStudents = activeTab === 'all' ? students : students.filter(s => (s.level || 'limbo') === activeTab);

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-zinc-950 transition-colors duration-300 pb-12">
                    
                    {colorModal && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-in fade-in zoom-in-95 duration-200">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden border border-slate-200 dark:border-zinc-800 flex flex-col p-6 text-center">
                                <h3 className="text-xl font-black mb-1 flex items-center justify-center gap-2"><Palette className="text-indigo-500"/> Cambiar Color</h3>
                                <p className="text-xs text-slate-500 dark:text-zinc-400 mb-6">Esto actualizará el perfil de {colorModal.name} y todas sus clases en la agenda.</p>
                                
                                <div className="grid grid-cols-4 gap-3 mb-6">
                                    {FRUIT_FLOWER_PALETTE.map((variant) => (
                                        <button 
                                            key={variant.id} 
                                            onClick={() => handleChangeColor(colorModal, variant.class)} 
                                            className={`h-12 w-12 rounded-full border-2 mx-auto transition-all flex items-center justify-center shadow-sm relative overflow-hidden ${variant.class.split(' ')[0]} ${colorModal.color === variant.class ? 'border-slate-900 dark:border-white ring-2 ring-slate-900 scale-110' : 'border-black/5 hover:scale-110'}`} 
                                            title={variant.id}
                                        >
                                            {colorModal.color === variant.class && <div className="bg-black/10 dark:bg-white/20 w-full h-full absolute"></div>}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setColorModal(null)} className="w-full py-3 bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-300 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-xl font-bold transition-colors">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {showMatchmaker && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in zoom-in-95 duration-300">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] shadow-2xl w-full max-w-4xl overflow-hidden border border-indigo-200 dark:border-indigo-900 flex flex-col max-h-[90vh]">
                                <div className="p-6 bg-gradient-to-r from-indigo-600 to-purple-600 flex justify-between items-center text-white shrink-0">
                                    <div>
                                        <h3 className="text-2xl font-black flex items-center gap-2"><Wand2/> Matchmaker & Insights</h3>
                                        <p className="text-indigo-200 text-sm font-bold mt-1">Análisis pedagógico en tiempo real</p>
                                    </div>
                                    <button onClick={() => setShowMatchmaker(false)} className="p-2 bg-white/20 hover:bg-white/30 rounded-full transition-colors"><X size={20}/></button>
                                </div>
                                
                                <div className="p-6 md:p-8 overflow-y-auto custom-scrollbar flex-1 bg-slate-50 dark:bg-zinc-950 space-y-8">
                                    <section>
                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><HelpCircle size={16}/> Pendientes de Evaluación</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {students.filter(s => s.level === 'limbo').length === 0 ? <p className="text-sm text-slate-500 italic">No hay alumnos en el limbo.</p> : null}
                                            {students.filter(s => s.level === 'limbo').map(s => (
                                                <span key={s.id} className="bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">{s.name}</span>
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><GitMerge size={16}/> Pairs Recomendados (Semi-Grupales)</h4>
                                        <div className="grid md:grid-cols-2 gap-4">
                                            {runMatchmaker().length === 0 ? <p className="text-sm text-slate-500 italic">Evalúa a más alumnos semi-grupales para generar recomendaciones.</p> : null}
                                            {runMatchmaker().map((match, idx) => (
                                                <div key={idx} className={`p-5 rounded-2xl border ${match.strength === 'perfect' ? 'bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-800' : 'bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700'}`}>
                                                    <div className="flex items-center justify-between mb-3">
                                                        <span className="font-black text-lg text-slate-800 dark:text-white">{match.s1.name}</span>
                                                        <div className="w-8 h-8 rounded-full bg-slate-100 dark:bg-zinc-900 flex items-center justify-center text-slate-400 font-black text-xs">&</div>
                                                        <span className="font-black text-lg text-slate-800 dark:text-white">{match.s2.name}</span>
                                                    </div>
                                                    <div className="bg-white/50 dark:bg-black/20 p-3 rounded-xl border border-black/5 dark:border-white/5">
                                                        <p className="text-sm font-bold text-slate-600 dark:text-zinc-300 leading-tight">{match.reason}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    {evalModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-in fade-in zoom-in-95 duration-200">
                            <div className="bg-white dark:bg-zinc-900 rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200 dark:border-zinc-800 flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-start bg-slate-50 dark:bg-zinc-950 shrink-0">
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2"><Activity className="text-indigo-500"/> Evaluación Radar</h3>
                                        <p className="font-bold text-slate-500 dark:text-zinc-400 mt-1">{evalModal.name}</p>
                                    </div>
                                    <button onClick={() => setEvalModal(null)} className="p-2 bg-slate-200 dark:bg-zinc-800 hover:bg-slate-300 dark:hover:bg-zinc-700 rounded-full transition-colors"><X size={20}/></button>
                                </div>
                                
                                <div className="p-6 space-y-6 overflow-y-auto custom-scrollbar flex-1">
                                    <div className="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800 rounded-xl p-4 text-center">
                                        <p className="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1">Arquetipo Actual</p>
                                        <h4 className={`text-xl font-black ${calculateArchetype(evalSkills).color}`}>{calculateArchetype(evalSkills).name}</h4>
                                        <p className="text-sm font-medium text-slate-600 dark:text-zinc-400 mt-1">{calculateArchetype(evalSkills).desc}</p>
                                        
                                        <div className="mt-4 font-black text-lg text-indigo-900 dark:text-indigo-300 flex flex-col items-center">
                                            <div className="flex items-center gap-1">
                                                {parseInt(evalSkills.speaking||0)+parseInt(evalSkills.listening||0)+parseInt(evalSkills.reading||0)+parseInt(evalSkills.grammar||0)+parseInt(evalSkills.vocabulary||0)+parseInt(evalSkills.pronunciation||0)} 
                                                <span className="text-sm opacity-50">/ 60 pts</span>
                                            </div>
                                            
                                            {evalModal.level === 'vip' ? (
                                                <div className="mt-2 text-[10px] bg-white/50 dark:bg-black/20 px-3 py-1 rounded-full text-amber-600 dark:text-amber-400 uppercase tracking-widest flex items-center gap-1 border border-amber-200 dark:border-amber-800">
                                                    <Star size={10}/> Alumno VIP (Mantiene Categoría)
                                                </div>
                                            ) : (
                                                <div className="mt-2 text-[10px] bg-white/50 dark:bg-black/20 px-3 py-1 rounded-full text-indigo-700 dark:text-indigo-300 uppercase tracking-widest flex items-center gap-1">
                                                    Auto-asignar a: <b className="ml-1 text-indigo-900 dark:text-white">{LEVELS.find(l => l.id === getSuggestedLevel(parseInt(evalSkills.speaking||0)+parseInt(evalSkills.listening||0)+parseInt(evalSkills.reading||0)+parseInt(evalSkills.grammar||0)+parseInt(evalSkills.vocabulary||0)+parseInt(evalSkills.pronunciation||0)))?.name}</b>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        {[
                                            { id: 'speaking', icon: MessageCircle, label: 'Speaking (Fluidez)', color: 'text-emerald-500' },
                                            { id: 'listening', icon: Ear, label: 'Listening (Oído)', color: 'text-cyan-500' },
                                            { id: 'reading', icon: BookOpen, label: 'Reading Comprehension', color: 'text-blue-500' },
                                            { id: 'grammar', icon: PenTool, label: 'Grammar (Estructura)', color: 'text-purple-500' },
                                            { id: 'vocabulary', icon: Brain, label: 'Vocabulary (Léxico)', color: 'text-rose-500' },
                                            { id: 'pronunciation', icon: Mic, label: 'Pronunciation (Acento)', color: 'text-pink-500' },
                                        ].map(skill => (
                                            <div key={skill.id}>
                                                <div className="flex justify-between items-center mb-2">
                                                    <label className={`text-xs font-bold uppercase tracking-widest flex items-center gap-1.5 ${skill.color}`}><skill.icon size={14}/> {skill.label}</label>
                                                    <span className="font-black text-sm w-6 text-right text-slate-700 dark:text-slate-300">{evalSkills[skill.id] || 0}</span>
                                                </div>
                                                <input type="range" min="0" max="10" step="1" value={evalSkills[skill.id] || 0} onChange={e => setEvalSkills({...evalSkills, [skill.id]: e.target.value})} className="w-full"/>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 dark:bg-zinc-950 border-t border-slate-200 dark:border-zinc-800 flex justify-end gap-3 shrink-0">
                                    <button onClick={() => setEvalModal(null)} className="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors">Cancelar</button>
                                    <button onClick={saveEvaluation} className="px-6 py-2.5 rounded-xl font-black bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg flex items-center gap-2"><Save size={18}/> Guardar Perfil</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-white dark:bg-zinc-900 shadow-sm border-b border-slate-200 dark:border-zinc-800 sticky top-0 z-40">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => window.location.href='index.html'} className="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                                <div className="bg-indigo-500 p-2 rounded-lg text-white shadow-md"><Users size={20}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 dark:text-white leading-none">ALUMNOS</h1>
                                    <p className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-widest mt-1">Directorio & Niveles</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowMatchmaker(true)} className="hidden sm:flex items-center gap-1.5 px-3 py-1.5 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-lg text-xs font-bold hover:bg-indigo-200 dark:hover:bg-indigo-800 transition-colors">
                                    <Wand2 size={14}/> Matchmaker
                                </button>
                                <div className="bg-slate-100 dark:bg-zinc-800 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-500 dark:text-zinc-400 hidden md:block">
                                    Total: {students.length}
                                </div>
                                <button onClick={toggleTheme} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors">
                                    {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
                        <div className="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl border border-slate-200 dark:border-zinc-800 p-6 sm:p-8 mb-8">
                            <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-slate-800 dark:text-white"><UserPlus className="text-indigo-500"/> Registrar Nuevo Alumno</h2>
                            <form onSubmit={handleAddStudent} className="flex flex-col gap-4">
                                <div className="flex flex-col sm:flex-row gap-3">
                                    <input type="text" value={newStudentName} onChange={e => setNewStudentName(e.target.value)} placeholder="Nombre del alumno..." className="flex-1 bg-slate-50 dark:bg-zinc-950 border-2 border-slate-200 dark:border-zinc-800 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 dark:text-white transition-colors"/>
                                    <button type="submit" disabled={!newStudentName.trim()} className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg transition-colors flex items-center justify-center gap-2 shrink-0"><Plus size={18}/> <span className="hidden sm:inline">Agregar</span></button>
                                </div>
                                
                                <div className="flex flex-wrap items-center gap-2 sm:gap-4 mt-2">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mr-2">Nivel Inicial:</span>
                                    {LEVELS.filter(l => l.id !== 'all').map(lvl => (
                                        <label key={lvl.id} className="cursor-pointer">
                                            <input type="radio" name="levelSelect" value={lvl.id} checked={newStudentLevel === lvl.id} onChange={(e) => setNewStudentLevel(e.target.value)} className="sr-only peer" />
                                            <div className="px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition-all peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 peer-checked:text-indigo-600 dark:peer-checked:text-indigo-400 bg-white dark:bg-zinc-800 border-slate-200 dark:border-zinc-700 text-slate-500 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-700 flex items-center gap-1.5">
                                                <lvl.icon size={14}/> {lvl.name}
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </form>
                        </div>

                        <div className="flex justify-between items-center mb-6">
                            <div className="flex overflow-x-auto custom-scrollbar gap-2 pb-2 flex-1">
                                {LEVELS.map(tab => {
                                    const count = tab.id === 'all' ? students.length : students.filter(s => (s.level || 'limbo') === tab.id).length;
                                    return (
                                        <button 
                                            key={tab.id} 
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-sm whitespace-nowrap transition-colors border-2 ${activeTab === tab.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-600 dark:text-zinc-400 hover:bg-slate-50 dark:hover:bg-zinc-800'}`}
                                        >
                                            <tab.icon size={16}/> {tab.name} <span className={`text-[10px] px-1.5 py-0.5 rounded-md ${activeTab === tab.id ? 'bg-white/20 text-white' : 'bg-slate-200 dark:bg-zinc-700 text-slate-500 dark:text-zinc-400'}`}>{count}</span>
                                        </button>
                                    )
                                })}
                            </div>
                            <button onClick={() => setShowMatchmaker(true)} className="sm:hidden p-3 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-xl hover:bg-indigo-200 transition-colors ml-2 shrink-0">
                                <Wand2 size={20}/>
                            </button>
                        </div>

                        {filteredStudents.length === 0 ? (
                            <div className="text-center py-12 bg-white dark:bg-zinc-900 rounded-3xl border border-slate-200 dark:border-zinc-800 border-dashed">
                                <Users size={48} className="mx-auto text-slate-300 dark:text-zinc-700 mb-4"/>
                                <h3 className="text-xl font-bold text-slate-500 dark:text-zinc-500 mb-6">No hay alumnos aquí.</h3>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {filteredStudents.map(student => {
                                    const archetype = student.skills ? calculateArchetype(student.skills) : { name: "Limbo / Por Evaluar", desc: "Realiza la evaluación para perfilar.", color: "text-slate-400" };
                                    const totalScore = student.skills ? parseInt(student.skills.speaking||0)+parseInt(student.skills.listening||0)+parseInt(student.skills.reading||0)+parseInt(student.skills.grammar||0)+parseInt(student.skills.vocabulary||0)+parseInt(student.skills.pronunciation||0) : 0;
                                    
                                    return (
                                        <div key={student.id} className={`rounded-2xl p-5 border shadow-sm flex flex-col justify-between group hover:shadow-md transition-shadow relative overflow-hidden ${student.color ? student.color : 'bg-white dark:bg-zinc-900 border-slate-200 dark:border-zinc-800'}`}>
                                            
                                            <div className="flex justify-between items-start mb-2 relative z-10">
                                                <div>
                                                    <div className="flex items-center gap-1.5 mb-1 opacity-70">
                                                        <Hash size={12}/>
                                                        <span className="text-[10px] font-black tracking-widest">{student.folio || '0000'}</span>
                                                    </div>
                                                    <h3 className="font-black text-xl truncate pr-2" title={student.name}>{student.name}</h3>
                                                </div>
                                                <div className="flex items-center gap-1">
                                                    <button onClick={() => setColorModal(student)} className="opacity-50 hover:opacity-100 hover:text-indigo-500 transition-colors p-1"><Palette size={16}/></button>
                                                    <button onClick={() => handleDeleteStudent(student.id, student.name)} className="opacity-50 hover:opacity-100 hover:text-red-500 transition-colors p-1"><Trash2 size={16}/></button>
                                                </div>
                                            </div>

                                            <div className="mb-4 flex items-center justify-between bg-white/40 dark:bg-black/20 p-3 rounded-xl border border-black/5 dark:border-white/5">
                                                <div className="flex flex-col flex-1 pr-2">
                                                    <span className={`text-[10px] font-black uppercase tracking-widest ${archetype.color} line-clamp-1`} title={archetype.name}>{archetype.name}</span>
                                                    {student.skills ? (
                                                        <div className="flex items-center gap-1 mt-1 opacity-60">
                                                            <div className="w-full max-w-[80px] h-1.5 bg-black/10 dark:bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-current" style={{width: `${(totalScore/60)*100}%`}}></div></div>
                                                            <span className="text-[9px] font-bold">{totalScore}/60</span>
                                                        </div>
                                                    ) : (
                                                        <span className="text-[9px] font-bold opacity-60 mt-1 line-clamp-1">{archetype.desc}</span>
                                                    )}
                                                </div>
                                                <div className="flex gap-1 shrink-0">
                                                    {/* REDIRECT AL NUEVO HUB DE EVALUACIONES DETALLADAS */}
                                                    <button onClick={() => window.location.href = `evaluaciones.html?id=${student.id}`} title="Evaluación a Detalle" className="p-2 bg-white/60 dark:bg-black/40 hover:bg-rose-500 hover:text-white rounded-lg transition-colors shadow-sm"><Target size={16}/></button>
                                                    
                                                    {/* MACRO EVALUACION (RADAR) */}
                                                    <button onClick={() => openEvaluation(student)} title="Macro-Habilidades (Radar)" className="p-2 bg-white/60 dark:bg-black/40 hover:bg-indigo-500 hover:text-white rounded-lg transition-colors shadow-sm"><Activity size={16}/></button>
                                                </div>
                                            </div>

                                            <div className="mb-4 relative z-10">
                                                <select 
                                                    value={student.level || 'limbo'} 
                                                    onChange={(e) => handleChangeLevel(student.id, e.target.value)}
                                                    className="w-full bg-white/50 dark:bg-black/20 border border-black/10 dark:border-white/10 rounded-lg px-2 py-1.5 text-xs font-bold outline-none cursor-pointer appearance-none"
                                                >
                                                    {LEVELS.map(lvl => (
                                                        <option key={lvl.id} value={lvl.id} className="bg-white dark:bg-zinc-900 text-slate-800 dark:text-white" disabled={lvl.id === 'all'}>{lvl.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            
                                            <button onClick={() => copyLink(student.name, student.id)} className={`w-full py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all border-2 z-10 bg-white/50 dark:bg-black/20 hover:bg-white/80 dark:hover:bg-black/40 border-transparent`}>
                                                {copiedId === student.id ? <><CheckCircle2 size={16}/> Copiado</> : <><LinkIcon size={16}/> Copiar Agenda</>}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<StudentManager />);
    </script>
</body>
</html>

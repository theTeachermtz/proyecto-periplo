<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Recuérdalo | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // CSS-variable driven tokens — dark mode just flips the vars, no dark: prefixes needed
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'at-ink':    'var(--at-ink)',
                        'at-body':   'var(--at-body)',
                        'at-muted':  'var(--at-muted)',
                        'at-canvas': 'var(--at-canvas)',
                        'at-soft':   'var(--at-soft)',
                        'at-strong': 'var(--at-strong)',
                        'at-wire':   'var(--at-wire)',
                        // Signature surfaces stay constant in both modes
                        'at-coral':  '#aa2d00',
                        'at-forest': '#0a2e0e',
                        'at-cream':  '#f5e9d4',
                        'at-peach':  '#fcab79',
                        'at-mint':   '#a8d8c4',
                        'at-yellow': '#f4d35e',
                    },
                    borderRadius: {
                        'at-sm': '6px',
                        'at-md': '10px',
                        'at-lg': '12px',
                    }
                }
            }
        };
    </script>
    <script>document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="periplo-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            /* iOS safe area — notch + home bar + side rounded corners */
            padding-top:    env(safe-area-inset-top);
            padding-right:  env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left:   env(safe-area-inset-left);
        }

        /* ── Responsive card grid ───────────────────────────── */
        .card-grid          { display: grid; grid-template-columns: 220px 1fr; }
        .card-emoji-box     { padding: 48px 32px; }
        .card-word-box      { padding: 48px; }
        .card-word-size     { font-size: 52px; letter-spacing: -0.03em; }
        .card-section-pad   { padding: 32px 48px; }
        .card-related-pad   { padding: 20px 48px; }

        @media (max-width: 640px) {
            .card-grid        { grid-template-columns: 1fr; }
            .card-emoji-box   { padding: 28px 20px; border-right: none !important;
                                border-bottom: 1px solid var(--at-wire); }
            .card-word-box    { padding: 20px 20px; }
            .card-word-size   { font-size: clamp(28px, 7vw, 42px); }
            .card-section-pad { padding: 20px; }
            .card-related-pad { padding: 16px 20px; }
        }

        /* Light mode tokens */
        :root {
            --at-canvas: #ffffff;
            --at-soft:   #f8fafc;
            --at-strong: #e0e2e6;
            --at-wire:   #dddddd;
            --at-ink:    #181d26;
            --at-body:   #333840;
            --at-muted:  #41454d;
        }
        /* Dark mode tokens — zinc palette, matches Periplo game files */
        html.dark {
            --at-canvas: #09090b;
            --at-soft:   #18181b;
            --at-strong: #27272a;
            --at-wire:   #3f3f46;
            --at-ink:    #fafafa;
            --at-body:   #d4d4d8;
            --at-muted:  #a1a1aa;
        }
    </style>
</head>
<body class="bg-at-canvas text-at-body">
<div id="root"></div>

<script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Sun, Moon, ChevronLeft, ChevronRight, BookOpen, X } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, doc, getDoc } from 'firebase/firestore';

    const _app = initializeApp(window.PERIPLO_FIREBASE_CONFIG);
    const _db  = getFirestore(_app);

    // ── Helpers ───────────────────────────────────────────────────────────────
    const shuffle = (arr) => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    };

    // ══════════════════════════════════════════════════════════════════════════
    // BLUR BACKGROUND — shared by cover + cards phases
    // ══════════════════════════════════════════════════════════════════════════
    function BlurBg({ src, dark }) {
        if (!src) return null;
        return (
            <>
                {/* Photo layer — blurred, slightly scaled to hide blur edges */}
                <div style={{
                    position: 'fixed', inset: 0, zIndex: 0,
                    backgroundImage: `url(${src})`,
                    backgroundSize: 'cover', backgroundPosition: 'center',
                    filter: 'blur(64px)', opacity: 0.7,
                    transform: 'scale(1.2)', pointerEvents: 'none',
                    transition: 'opacity 0.5s ease',
                }}/>
                {/* Dark/light overlay — tones it down for legibility */}
                <div style={{
                    position: 'fixed', inset: 0, zIndex: 0,
                    background: dark ? 'rgba(9,9,11,0.84)' : 'rgba(255,255,255,0.88)',
                    pointerEvents: 'none',
                }}/>
            </>
        );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // COVER SCREEN
    // ══════════════════════════════════════════════════════════════════════════
    function CoverScreen({ title, cardCount, onStart, bgImage, dark }) {
        return (
            <div className="relative min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6"
                 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                <BlurBg src={bgImage} dark={dark}/>
                <div className="relative z-10 w-full max-w-sm text-center">
                    <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-indigo-600/20 mx-auto mb-6">P</div>
                    <p className="text-orange-400 text-xs font-bold uppercase tracking-widest mb-3">Cultural Deep Dive · Español</p>
                    <h1 className="text-3xl sm:text-4xl font-black text-white mb-2 leading-tight" style={{ letterSpacing: '-0.02em' }}>
                        {title || 'Recuérdalo'}
                    </h1>
                    <p className="text-zinc-500 text-base mb-8">{cardCount} words to explore</p>

                    <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 text-left mb-8 space-y-4">
                        <p className="text-xs font-black text-zinc-500 uppercase tracking-widest">How it works</p>
                        {[
                            { icon: '📖', text: 'Read each card — its definition and the cultural story behind the word' },
                            { icon: '⚡', text: 'Every 5 words, a quick challenge drops to test your recall' },
                            { icon: '🔀', text: 'Two mini-games alternate: a matching round and a true/false round' },
                        ].map((item, i) => (
                            <div key={i} className="flex items-start gap-3">
                                <span className="text-lg shrink-0 mt-0.5">{item.icon}</span>
                                <p className="text-zinc-300 text-sm leading-relaxed">{item.text}</p>
                            </div>
                        ))}
                    </div>

                    <button onClick={onStart}
                        className="w-full py-4 bg-orange-500 hover:bg-orange-400 active:scale-95 text-black font-black rounded-2xl text-lg transition-all shadow-lg shadow-orange-500/20">
                        Let's go →
                    </button>
                </div>
            </div>
        );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // MINI-GAME 1: QUICK MATCH — click-to-pair two columns
    // ══════════════════════════════════════════════════════════════════════════
    const PAIR_COLORS = ['orange', 'sky', 'emerald', 'violet', 'rose'];
    // Pair color: selected = solid (bright), paired = dim, both use deterministic color per index
    const PAIR_STYLE = {
        orange:  { dim: 'bg-orange-500/20 border-orange-500/40 text-orange-200',  solid: 'bg-orange-400 border-orange-400 text-black font-black shadow-md shadow-orange-500/30' },
        sky:     { dim: 'bg-sky-500/20 border-sky-500/40 text-sky-200',          solid: 'bg-sky-400 border-sky-400 text-black font-black shadow-md shadow-sky-500/30' },
        emerald: { dim: 'bg-emerald-500/20 border-emerald-500/40 text-emerald-200', solid: 'bg-emerald-400 border-emerald-400 text-black font-black shadow-md shadow-emerald-500/30' },
        violet:  { dim: 'bg-violet-500/20 border-violet-500/40 text-violet-200', solid: 'bg-violet-400 border-violet-400 text-black font-black shadow-md shadow-violet-500/30' },
        rose:    { dim: 'bg-rose-500/20 border-rose-500/40 text-rose-200',       solid: 'bg-rose-400 border-rose-400 text-black font-black shadow-md shadow-rose-500/30' },
    };

    function MatchGame({ roundCards, onComplete }) {
        const [rightOrder] = useState(() => shuffle(roundCards.map((_, i) => i)));
        const [pairings,     setPairings]     = useState({});
        const [selectedLeft, setSelectedLeft] = useState(null);
        const [checked,      setChecked]      = useState(false);

        const n       = roundCards.length;
        const allDone = Object.keys(pairings).length === n;
        const score   = checked ? Object.keys(pairings).filter(k => pairings[Number(k)] === Number(k)).length : 0;

        const getRightPairedBy = (rightCardIdx) => {
            const e = Object.entries(pairings).find(([, v]) => v === rightCardIdx);
            return e ? Number(e[0]) : null;
        };

        const handleLeft = (i) => {
            if (checked) return;
            setSelectedLeft(prev => prev === i ? null : i);
        };

        const handleRight = (rightCardIdx) => {
            if (checked) return;
            if (selectedLeft === null) {
                // No left selected → un-pair this right item if it's paired
                const by = getRightPairedBy(rightCardIdx);
                if (by !== null) setPairings(prev => { const n = {...prev}; delete n[by]; return n; });
                return;
            }
            // Pair selectedLeft with this right
            setPairings(prev => {
                const next = { ...prev };
                Object.keys(next).forEach(k => { if (next[k] === rightCardIdx) delete next[k]; });
                next[selectedLeft] = rightCardIdx;
                return next;
            });
            setSelectedLeft(null);
        };

        // Left: selected = solid pair color (clear intent), paired = dim, unpaired = neutral
        const leftClass = (i) => {
            const color = PAIR_COLORS[i % 5];
            if (checked) return pairings[i] === i
                ? 'bg-emerald-500 border-emerald-500 text-black font-black'
                : 'bg-rose-500/80 border-rose-500 text-white';
            if (selectedLeft === i) return PAIR_STYLE[color].solid;  // ← same color as paired, just brighter
            if (pairings[i] !== undefined) return PAIR_STYLE[color].dim;
            return 'bg-zinc-800 border-zinc-700 text-zinc-200 hover:border-zinc-500';
        };

        // Right: when left selected = targetable highlight; paired = dim; else neutral
        const rightClass = (rightCardIdx) => {
            const by = getRightPairedBy(rightCardIdx);
            if (checked) return by === rightCardIdx
                ? 'bg-emerald-500 border-emerald-500 text-black font-black'
                : by !== null ? 'bg-rose-500/80 border-rose-500 text-white'
                : 'bg-zinc-800 border-zinc-700 text-zinc-500 opacity-50';
            if (by !== null) return PAIR_STYLE[PAIR_COLORS[by % 5]].dim;
            return selectedLeft !== null
                ? 'bg-zinc-700 border-zinc-500 text-zinc-100 hover:border-white/60 cursor-pointer'
                : 'bg-zinc-800 border-zinc-700 text-zinc-300';
        };

        return (
            <div className="min-h-screen bg-zinc-950 flex flex-col p-4 sm:p-8"
                 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                <div className="max-w-lg mx-auto w-full mb-5">
                    <p className="text-orange-400 text-xs font-bold uppercase tracking-widest mb-1">⚡ Quick Match</p>
                    <h2 className="text-2xl font-black text-white">Connect each word to its meaning</h2>
                    <p className="text-zinc-500 text-sm mt-1">
                        Tap a word to select it, then tap its translation.
                        Tap a paired item again to undo.
                    </p>
                </div>

                <div className="max-w-lg mx-auto w-full">
                    <div className="grid grid-cols-2 gap-2 mb-5">
                        {/* Left — wordEs */}
                        <div className="space-y-2">
                            {roundCards.map((c, i) => (
                                <button key={i} onClick={() => handleLeft(i)}
                                    className={`w-full px-3 py-3.5 rounded-xl text-left font-bold text-sm transition-all border-2 ${leftClass(i)}`}
                                    style={{ cursor: checked ? 'default' : 'pointer' }}>
                                    {c.wordEs}
                                </button>
                            ))}
                        </div>
                        {/* Right — wordEn shuffled */}
                        <div className="space-y-2">
                            {rightOrder.map((cardIdx, vp) => (
                                <button key={vp} onClick={() => handleRight(cardIdx)}
                                    className={`w-full px-3 py-3.5 rounded-xl text-left font-medium text-sm transition-all border-2 ${rightClass(cardIdx)}`}
                                    style={{ cursor: checked || selectedLeft === null ? 'default' : 'pointer' }}>
                                    {roundCards[cardIdx].wordEn}
                                </button>
                            ))}
                        </div>
                    </div>

                    {!checked ? (
                        <button onClick={() => setChecked(true)} disabled={!allDone}
                            className="w-full py-4 bg-orange-500 hover:bg-orange-400 disabled:opacity-30 disabled:cursor-not-allowed text-black font-black rounded-xl uppercase tracking-widest transition-colors">
                            Check ✓
                        </button>
                    ) : (
                        <div className="text-center pt-2">
                            <p className="text-4xl mb-2">{score === n ? '🎉' : score >= Math.ceil(n / 2) ? '👍' : '💪'}</p>
                            <p className="text-2xl font-black text-white mb-1">{score} / {n}</p>
                            <p className="text-zinc-500 text-sm mb-6">{score === n ? 'Perfect match!' : 'Keep going — it\'ll click!'}</p>
                            <button onClick={onComplete}
                                className="px-8 py-4 bg-zinc-100 hover:bg-white text-zinc-900 font-black rounded-xl transition-colors">
                                Continue →
                            </button>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // MINI-GAME 2: PAIR OR NO PAIR — true/false with immediate feedback
    // ══════════════════════════════════════════════════════════════════════════
    function PairOrNoPair({ roundCards, onComplete }) {
        const [questions] = useState(() => {
            const correct = roundCards.map(c => ({ wordEs: c.wordEs, wordEn: c.wordEn, isCorrect: true }));
            // Decoys: each wordEs paired with a different wordEn (offset by 2)
            const decoys = roundCards.slice(0, 3).map((c, i) => ({
                wordEs: c.wordEs,
                wordEn: roundCards[(i + 2) % roundCards.length].wordEn,
                isCorrect: false,
            }));
            return shuffle([...correct, ...decoys]);
        });

        const [qIdx,     setQIdx]     = useState(0);
        const [score,    setScore]    = useState(0);
        const [feedback, setFeedback] = useState(null); // null | 'correct' | 'wrong'
        const [done,     setDone]     = useState(false);

        const q     = questions[qIdx];
        const total = questions.length;

        const answer = (userSays) => {
            if (feedback) return;
            const correct = userSays === q.isCorrect;
            setFeedback(correct ? 'correct' : 'wrong');
            if (correct) setScore(s => s + 1);
            setTimeout(() => {
                setFeedback(null);
                if (qIdx + 1 >= total) setDone(true);
                else setQIdx(n => n + 1);
            }, 700);
        };

        if (done) {
            const pct = Math.round((score / total) * 100);
            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-8 text-center"
                     style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                    <p className="text-5xl mb-3">{pct >= 80 ? '🔥' : pct >= 60 ? '👍' : '💪'}</p>
                    <p className="text-xs text-orange-400 font-bold uppercase tracking-widest mb-2">Pair or No Pair</p>
                    <h2 className="text-3xl font-black text-white mb-1">{score} / {total}</h2>
                    <p className="text-zinc-500 mb-8">{pct >= 80 ? 'Sharp memory!' : 'Keep at it — repetition is the key!'}</p>
                    <button onClick={onComplete}
                        className="px-8 py-4 bg-zinc-100 hover:bg-white text-zinc-900 font-black rounded-xl transition-colors">
                        Continue →
                    </button>
                </div>
            );
        }

        const bgColor = feedback === 'correct' ? 'bg-emerald-950' : feedback === 'wrong' ? 'bg-rose-950' : 'bg-zinc-950';

        return (
            <div className={`min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300 ${bgColor}`}
                 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                {/* Progress bar */}
                <div className="w-full max-w-sm mb-8">
                    <div className="flex justify-between text-xs text-zinc-500 mb-2">
                        <span className="font-bold uppercase tracking-widest text-orange-400">🃏 Pair or No Pair?</span>
                        <span>{qIdx + 1} / {total}</span>
                    </div>
                    <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                        <div className="h-full bg-orange-500 rounded-full transition-all duration-300"
                             style={{ width: `${(qIdx / total) * 100}%` }}/>
                    </div>
                </div>

                {/* Card */}
                <div className={`w-full max-w-sm rounded-[1.5rem] overflow-hidden shadow-2xl transition-all duration-300 ${
                    feedback === 'correct' ? 'ring-2 ring-emerald-500' : feedback === 'wrong' ? 'ring-2 ring-rose-500' : ''
                }`}>
                    <div className="bg-zinc-900 px-8 py-10 text-center">
                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest mb-3">Español</p>
                        <p className="text-4xl font-black text-white leading-none" style={{ letterSpacing: '-0.02em' }}>{q.wordEs}</p>
                    </div>
                    <div className="bg-zinc-800 px-8 py-7 text-center">
                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest mb-2">English</p>
                        <p className="text-xl font-bold text-zinc-200">{q.wordEn}</p>
                    </div>
                </div>

                {/* Buttons */}
                <div className="grid grid-cols-2 gap-3 mt-6 w-full max-w-sm">
                    <button onClick={() => answer(false)} disabled={!!feedback}
                        className="py-5 bg-zinc-800 hover:bg-rose-500/20 border-2 border-zinc-700 hover:border-rose-500 text-zinc-200 hover:text-rose-300 rounded-2xl font-black text-xl transition-all active:scale-95 disabled:opacity-40">
                        ✗
                    </button>
                    <button onClick={() => answer(true)} disabled={!!feedback}
                        className="py-5 bg-zinc-800 hover:bg-emerald-500/20 border-2 border-zinc-700 hover:border-emerald-500 text-zinc-200 hover:text-emerald-300 rounded-2xl font-black text-xl transition-all active:scale-95 disabled:opacity-40">
                        ✓
                    </button>
                </div>
            </div>
        );
    }

    const urlParams    = new URLSearchParams(window.location.search);
    const TEACHER_UID  = urlParams.get('uid')    || 'teacher_anita_001';
    const QUIZ_ID      = urlParams.get('id')     || null;
    const IS_STUDENT   = urlParams.get('student') === 'true';
    const QUIZZES_PATH = `artifacts/periplo-app-v1/users/${TEACHER_UID}/quizzes`;

    // ── Signature surface configs per card ───────────────────────────────────
    // Cultural Curiosity section gets a full-bleed Airtable signature card.
    // isDark drives label opacity and icon border color.
    const ACCENTS = {
        coral:  { bg: 'bg-at-coral',  text: 'text-white',   emojiBg: 'bg-at-cream',  isDark: true  },
        forest: { bg: 'bg-at-forest', text: 'text-white',   emojiBg: 'bg-at-mint',   isDark: true  },
        cream:  { bg: 'bg-at-cream',  text: 'text-[#181d26]', emojiBg: 'bg-at-peach',  isDark: false },
        dark:   { bg: 'bg-at-ink',    text: 'text-at-canvas', emojiBg: 'bg-at-yellow', isDark: true  },
        peach:  { bg: 'bg-at-peach',  text: 'text-[#181d26]', emojiBg: 'bg-at-soft',   isDark: false },
        mint:   { bg: 'bg-at-mint',   text: 'text-[#181d26]', emojiBg: 'bg-at-cream',  isDark: false },
    };

    // ── Accent keys — auto-assigned by index, not stored in Firebase ─────────
    const ACCENT_KEYS = ['coral', 'forest', 'cream', 'dark', 'peach', 'mint'];

    export default function Recuerdalo() {
        const [idx,          setIdx]         = useState(0);
        const [dark,         setDark]        = useState(true);
        const [showIndex,    setShowIndex]   = useState(false);
        const [cards,        setCards]       = useState([]);
        const [quizTitle,    setQuizTitle]   = useState('');
        const [loading,      setLoading]     = useState(true);

        // ── Mini-game state ───────────────────────────────────────────────
        const [phase,        setPhase]       = useState('cover');  // 'cover'|'cards'|'minigame'
        const [mgType,       setMgType]      = useState('match'); // 'match'|'pairnopair'
        const [mgRound,      setMgRound]     = useState(0);
        const [mgCards,      setMgCards]     = useState([]);
        const [pendingIdx,   setPendingIdx]  = useState(0);

        // ── Dark mode toggle ──────────────────────────────────────────────────
        useEffect(() => {
            if (dark) document.documentElement.classList.add('dark');
            else      document.documentElement.classList.remove('dark');
        }, [dark]);

        // ── Load from Firebase ────────────────────────────────────────────────
        useEffect(() => {
            if (!QUIZ_ID) { setLoading(false); return; }
            getDoc(doc(_db, QUIZZES_PATH, QUIZ_ID))
                .then(snap => {
                    if (snap.exists()) {
                        const data = snap.data();
                        // Guard: document in trash → treat as not found
                        if (data.isDeleted === true) { setLoading(false); return; }
                        setQuizTitle(data.title || '');
                        const loaded = (data.content?.cards || []).map((c, i) => ({
                            wordEs:       c.wordEs       || '',
                            wordEn:       c.wordEn       || '',
                            emoji:        c.emoji        || '📌',
                            definition:   c.definition   || '',
                            culturalNote: c.culturalNote || '',
                            relatedWords: c.relatedWords || [],
                            imageData:    c.imageData    || null,
                            accent:       ACCENT_KEYS[i % ACCENT_KEYS.length],
                        }));
                        setCards(loaded);
                    }
                })
                .catch(e => console.error('recuerdalo load error:', e))
                .finally(() => setLoading(false));
        }, []);

        // ── Navigation with mini-game trigger ────────────────────────────────
        const handleNext = () => {
            const newIdx = idx + 1;
            // Mini-game every 5th card (takes priority over end screen)
            if ((idx + 1) % 5 === 0) {
                const batch = cards.slice(idx - 4, idx + 1);
                setMgCards(batch);
                setMgType(mgRound % 2 === 0 ? 'match' : 'pairnopair');
                setPendingIdx(newIdx);
                setPhase('minigame');
                return;
            }
            // No mini-game — last card → finished screen
            if (newIdx >= cards.length) {
                setPhase('finished');
            } else {
                setIdx(newIdx);
            }
        };
        const handlePrev = () => setIdx(i => Math.max(0, i - 1));
        const handleMgComplete = () => {
            setMgRound(r => r + 1);
            if (pendingIdx >= cards.length) {
                setPhase('finished');   // mini-game was after the last card
            } else {
                setIdx(pendingIdx);
                setPhase('cards');
            }
        };

        // ── Derived values ────────────────────────────────────────────────────
        const card   = cards[idx];
        const accent = card ? ACCENTS[card.accent] : null;
        const labelColor = accent?.isDark ? 'rgba(255,255,255,0.6)' : '#41454d';
        const iconBorder = accent?.isDark ? 'rgba(255,255,255,0.25)' : 'rgba(24,29,38,0.15)';
        const iconBg     = accent?.isDark ? 'rgba(255,255,255,0.1)'  : 'rgba(24,29,38,0.06)';

        // ── Loading ───────────────────────────────────────────────────────────
        if (loading) return (
            <div className="h-screen w-screen flex items-center justify-center bg-zinc-950">
                <div className="flex flex-col items-center gap-4">
                    <div className="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"/>
                    <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest"
                       style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                        Cargando set...
                    </p>
                </div>
            </div>
        );

        // ── No ID in URL ──────────────────────────────────────────────────────
        if (!QUIZ_ID) return (
            <div className="h-screen w-screen flex items-center justify-center bg-zinc-950 p-8 text-center">
                <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                    <p className="text-5xl mb-4">📭</p>
                    <h2 className="text-2xl font-black text-white mb-2">Sin set</h2>
                    <p className="text-zinc-500 mb-6 text-sm">
                        Abre este renderer desde el dashboard de Recuérdalo<br/>o incluye <code className="text-orange-400 bg-zinc-900 px-2 py-0.5 rounded">?id=...</code> en la URL.
                    </p>
                    <button onClick={() => window.location.href = 'dashboard-recuerdalo-es.html'}
                        className="px-6 py-3 bg-orange-500 hover:bg-orange-400 text-black rounded-xl font-black text-sm transition-colors">
                        Ir al Builder
                    </button>
                </div>
            </div>
        );

        // ── Set vacío ─────────────────────────────────────────────────────────
        if (!cards.length) return (
            <div className="h-screen w-screen flex items-center justify-center bg-zinc-950 p-8 text-center">
                <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                    <p className="text-5xl mb-4">🫙</p>
                    <h2 className="text-2xl font-black text-white mb-2">Set vacío</h2>
                    {quizTitle && <p className="text-orange-400 text-sm font-bold mb-1">"{quizTitle}"</p>}
                    <p className="text-zinc-500 mb-6 text-sm">El set existe pero no tiene tarjetas todavía.</p>
                    <button onClick={() => window.location.href = `dashboard-recuerdalo-es.html?edit=${QUIZ_ID}`}
                        className="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl font-black text-sm transition-colors">
                        Editar en el Builder
                    </button>
                </div>
            </div>
        );

        // ── Shared background image ───────────────────────────────────────────
        const coverBg = cards.find(c => c.imageData)?.imageData || null;

        // ── Finished screen ───────────────────────────────────────────────────
        if (phase === 'finished') return (
            <div className="relative min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-8 text-center"
                 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                <BlurBg src={coverBg} dark={true}/>
                <div className="relative z-10 w-full max-w-sm">
                    <p className="text-6xl mb-4">🎉</p>
                    <p className="text-orange-400 text-xs font-bold uppercase tracking-widest mb-2">Cultural Deep Dive · Español</p>
                    <h1 className="text-3xl font-black text-white mb-2 leading-tight" style={{ letterSpacing: '-0.02em' }}>
                        {quizTitle || 'Recuérdalo'}
                    </h1>
                    <p className="text-zinc-400 text-base mb-10">You've explored all {cards.length} words!</p>

                    {IS_STUDENT ? (
                        <div className="bg-zinc-900/80 border border-zinc-800 rounded-2xl p-6">
                            <p className="text-zinc-300 font-bold text-lg mb-1">You're done! ✓</p>
                            <p className="text-zinc-500 text-sm">You can close this window now.</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            <button
                                onClick={() => { setIdx(0); setMgRound(0); setPhase('cover'); }}
                                className="w-full py-4 bg-orange-500 hover:bg-orange-400 active:scale-95 text-black font-black rounded-2xl text-lg transition-all">
                                Start over →
                            </button>
                            <button
                                onClick={() => window.location.href = 'index-es.html'}
                                className="w-full py-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-300 font-bold rounded-2xl transition-colors">
                                Back to hub
                            </button>
                        </div>
                    )}
                </div>
            </div>
        );
        if (phase === 'cover') return (
            <CoverScreen title={quizTitle} cardCount={cards.length}
                         onStart={() => setPhase('cards')} bgImage={coverBg} dark={dark}/>
        );

        // ── Mini-game ─────────────────────────────────────────────────────────
        if (phase === 'minigame') return mgType === 'match'
            ? <MatchGame roundCards={mgCards} onComplete={handleMgComplete}/>
            : <PairOrNoPair roundCards={mgCards} onComplete={handleMgComplete}/>;

        return (
            <div className="relative min-h-screen bg-at-canvas">
                <BlurBg src={card?.imageData} dark={dark}/>

                {/* ═══════════════════════════════════════════════════════════ */}
                {/* BANNER — Standard Periplo (igual que demás renderers -es)  */}
                {/* ═══════════════════════════════════════════════════════════ */}
                <header className="sticky top-0 z-20 bg-zinc-950/95 backdrop-blur-sm border-b border-zinc-800 flex items-center justify-between px-3 sm:px-6 py-3"
                        style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>

                    {/* LEFT: P badge + divider + título */}
                    <div className="flex items-center gap-4">
                        <button
                            onClick={() => { if (!IS_STUDENT) window.location.href = 'index-es.html'; }}
                            className={`flex items-center gap-2 transition-opacity ${IS_STUDENT ? 'cursor-default' : 'hover:opacity-80 cursor-pointer'}`}
                            title={IS_STUDENT ? 'Nothing to see here 👀' : ''}>
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20">
                                P
                            </div>
                        </button>
                        <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1"/>
                        <div className="min-w-0">
                            <h1 className="text-base sm:text-lg font-black text-white leading-none tracking-tight truncate max-w-[140px] sm:max-w-none">
                                {quizTitle || 'Recuérdalo'}
                            </h1>
                            <p className="text-[10px] font-bold text-orange-400 uppercase tracking-widest mt-1 hidden sm:block">
                                Cultural Deep Dive · Español
                            </p>
                        </div>
                    </div>

                    {/* RIGHT: toggle + counter + nav + índice */}
                    <div className="flex items-center gap-2">
                        {/* Dark mode toggle */}
                        <button
                            onClick={() => setDark(d => !d)}
                            className="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-800 transition-colors"
                            style={{ cursor: 'pointer' }}
                            title={dark ? 'Modo claro' : 'Modo oscuro'}>
                            {dark ? <Sun size={15}/> : <Moon size={15}/>}
                        </button>

                        {/* Counter */}
                        <span className="text-xs font-bold text-zinc-600 px-1 hidden sm:inline">
                            {idx + 1}/{cards.length}
                        </span>

                        {/* ← Anterior — solo icono en mobile */}
                        <button
                            onClick={handlePrev}
                            disabled={idx === 0}
                            className="flex items-center gap-1.5 px-2 sm:px-4 py-2 bg-zinc-900 border border-zinc-800 text-zinc-300 rounded-xl font-bold text-sm disabled:opacity-30 hover:bg-zinc-800 transition-colors"
                            style={{ cursor: idx === 0 ? 'default' : 'pointer' }}>
                            <ChevronLeft size={15}/>
                            <span className="hidden sm:inline">Anterior</span>
                        </button>

                        {/* Siguiente → / Finalizar (last card) */}
                        <button
                            onClick={handleNext}
                            className="flex items-center gap-1.5 px-3 sm:px-4 py-2 bg-zinc-100 border border-zinc-200 text-zinc-900 rounded-xl font-bold text-sm hover:bg-white transition-colors"
                            style={{ cursor: 'pointer' }}>
                            {idx === cards.length - 1 ? 'Finalizar' : 'Siguiente'}
                            <ChevronRight size={15}/>
                        </button>

                        {/* 📚 Índice de palabras */}
                        <button
                            onClick={() => setShowIndex(true)}
                            className="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-orange-400 hover:bg-zinc-800 transition-colors"
                            style={{ cursor: 'pointer' }}
                            title="Ver todas las palabras">
                            <BookOpen size={15}/>
                        </button>
                    </div>
                </header>

                {/* ═══════════════════════════════════════════════════════════ */}
                {/* MODAL ÍNDICE — lista de todas las palabras para saltar      */}
                {/* ═══════════════════════════════════════════════════════════ */}
                {showIndex && (
                    <div
                        className="fixed inset-0 z-50 flex items-center justify-center p-6"
                        style={{ background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(6px)' }}
                        onClick={() => setShowIndex(false)}>
                        <div
                            className="bg-zinc-900 border border-zinc-800 rounded-[1.5rem] w-full shadow-2xl flex flex-col"
                            style={{ maxWidth: 360, maxHeight: 'min(80vh, 560px)', fontFamily: "'Plus Jakarta Sans', sans-serif" }}
                            onClick={e => e.stopPropagation()}>

                            {/* Modal header */}
                            <div className="flex items-center justify-between px-6 py-4 border-b border-zinc-800 shrink-0">
                                <div>
                                    <h2 className="text-base font-black text-white">Todas las palabras</h2>
                                    <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">
                                        Selecciona para saltar
                                    </p>
                                </div>
                                <button
                                    onClick={() => setShowIndex(false)}
                                    className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-500 hover:text-white transition-colors"
                                    style={{ cursor: 'pointer' }}>
                                    <X size={16}/>
                                </button>
                            </div>

                            {/* Word list — scrollable */}
                            <div className="divide-y divide-zinc-800/60 overflow-y-auto"
                                 style={{ WebkitOverflowScrolling: 'touch' }}>
                                {cards.map((c, i) => (
                                    <button
                                        key={i}
                                        onClick={() => { setIdx(i); setShowIndex(false); }}
                                        className={`w-full flex items-center gap-4 px-6 py-3.5 text-left transition-colors ${
                                            i === idx
                                                ? 'bg-zinc-800'
                                                : 'hover:bg-zinc-800/60'
                                        }`}
                                        style={{ cursor: 'pointer' }}>
                                        <span style={{ fontSize: 28, lineHeight: 1 }}>{c.emoji}</span>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-black text-white text-sm">{c.wordEs}</p>
                                            <p className="text-zinc-500 text-xs truncate">{c.wordEn}</p>
                                        </div>
                                        {i === idx && (
                                            <div className="w-2 h-2 rounded-full bg-orange-400 shrink-0"/>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {/* ═══════════════════════════════════════════════════════════ */}
                {/* CARD                                                        */}
                {/* ═══════════════════════════════════════════════════════════ */}
                <main className="relative z-10 px-4 sm:px-12 py-6 sm:py-8" style={{ maxWidth: 960, margin: '0 auto' }}>
                    <div className="border border-at-wire rounded-at-lg overflow-hidden">

                        {/* ── ROW 1: emoji + word ─────────────────────────── */}
                        <div className="card-grid">

                            {/* Image/placeholder box */}
                            <div className={`${card.imageData ? '' : accent.emojiBg} card-emoji-box flex flex-col items-center justify-center gap-4 border-r border-at-wire overflow-hidden`}>
                                {card.imageData ? (
                                    <img src={card.imageData} alt={card.wordEs}
                                         className="w-full h-full object-cover"
                                         style={{ display: 'block' }}/>
                                ) : (
                                    <span className="font-medium text-at-muted uppercase text-center"
                                          style={{ fontSize: 10, letterSpacing: '0.12em' }}>
                                        Foto próximamente
                                    </span>
                                )}
                            </div>

                            {/* Word + translation */}
                            <div className="card-word-box flex flex-col justify-center gap-2">
                                <span className="font-medium text-at-muted uppercase"
                                      style={{ fontSize: 11, letterSpacing: '0.12em' }}>
                                    Español
                                </span>
                                <h2 className="card-word-size text-at-ink font-normal leading-none">
                                    {card.wordEs}
                                </h2>
                                <p className="text-at-muted font-normal"
                                   style={{ fontSize: 'clamp(15px, 3.5vw, 20px)', marginTop: 6, lineHeight: 1.4 }}>
                                    {card.wordEn}
                                </p>
                            </div>
                        </div>

                        {/* ── ROW 2: Definition ───────────────────────────── */}
                        <div className="card-section-pad border-t border-at-wire flex items-start gap-5">
                            <div className="w-9 h-9 rounded-full border border-at-wire bg-at-soft flex items-center justify-center shrink-0"
                                 style={{ fontSize: 15, marginTop: 2 }}>
                                📖
                            </div>
                            <div className="flex-1">
                                <p className="font-medium text-at-muted uppercase mb-3"
                                   style={{ fontSize: 11, letterSpacing: '0.12em' }}>
                                    Definition
                                </p>
                                <p className="text-at-body leading-relaxed" style={{ fontSize: 15 }}>
                                    {card.definition}
                                </p>
                            </div>
                        </div>

                        {/* ── ROW 3: Cultural note — signature surface ─────── */}
                        <div className={`${accent.bg} card-section-pad flex items-start gap-5`}>
                            <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0"
                                 style={{ fontSize: 15, marginTop: 2, border: `1px solid ${iconBorder}`, background: iconBg }}>
                                💡
                            </div>
                            <div className="flex-1">
                                <p className="font-medium uppercase mb-3"
                                   style={{ fontSize: 11, letterSpacing: '0.12em', color: labelColor }}>
                                    Cultural Curiosity
                                </p>
                                <p className={`${accent.text} leading-relaxed`} style={{ fontSize: 15 }}>
                                    {card.culturalNote}
                                </p>
                            </div>
                        </div>

                        {/* ── ROW 4: Related words ────────────────────────── */}
                        <div className="card-related-pad border-t border-at-wire flex items-center gap-3 flex-wrap">
                            <span className="font-medium text-at-muted uppercase shrink-0"
                                  style={{ fontSize: 11, letterSpacing: '0.12em' }}>
                                Related
                            </span>
                            <div className="w-px h-4 bg-at-wire shrink-0"/>
                            {card.relatedWords.map((w, i) => (
                                <span key={i}
                                      className="font-medium text-at-body bg-at-soft border border-at-wire rounded-full"
                                      style={{ fontSize: 13, padding: '5px 14px' }}>
                                    {w}
                                </span>
                            ))}
                        </div>
                    </div>

                </main>
            </div>
        );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<Recuerdalo />);
</script>
</body>
</html>

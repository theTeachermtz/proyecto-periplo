<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuérdalo | Periplo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // CSS-variable driven tokens — dark mode just flips the vars, no dark: prefixes needed
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'at-ink':    'var(--at-ink)',
                        'at-body':   'var(--at-body)',
                        'at-muted':  'var(--at-muted)',
                        'at-canvas': 'var(--at-canvas)',
                        'at-soft':   'var(--at-soft)',
                        'at-strong': 'var(--at-strong)',
                        'at-wire':   'var(--at-wire)',
                        // Signature surfaces stay constant in both modes
                        'at-coral':  '#aa2d00',
                        'at-forest': '#0a2e0e',
                        'at-cream':  '#f5e9d4',
                        'at-peach':  '#fcab79',
                        'at-mint':   '#a8d8c4',
                        'at-yellow': '#f4d35e',
                    },
                    borderRadius: {
                        'at-sm': '6px',
                        'at-md': '10px',
                        'at-lg': '12px',
                    }
                }
            }
        };
    </script>
    <script>document.documentElement.classList.add('dark');</script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        /* Light mode tokens */
        :root {
            --at-canvas: #ffffff;
            --at-soft:   #f8fafc;
            --at-strong: #e0e2e6;
            --at-wire:   #dddddd;
            --at-ink:    #181d26;
            --at-body:   #333840;
            --at-muted:  #41454d;
        }
        /* Dark mode tokens — zinc palette, matches Periplo game files */
        html.dark {
            --at-canvas: #09090b;
            --at-soft:   #18181b;
            --at-strong: #27272a;
            --at-wire:   #3f3f46;
            --at-ink:    #fafafa;
            --at-body:   #d4d4d8;
            --at-muted:  #a1a1aa;
        }
    </style>
</head>
<body class="bg-at-canvas text-at-body">
<div id="root"></div>

<script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Sun, Moon, ChevronLeft, ChevronRight, BookOpen, X } from 'lucide-react';

    // ── Signature surface configs per card ───────────────────────────────────
    // Cultural Curiosity section gets a full-bleed Airtable signature card.
    // isDark drives label opacity and icon border color.
    const ACCENTS = {
        coral:  { bg: 'bg-at-coral',  text: 'text-white',   emojiBg: 'bg-at-cream',  isDark: true  },
        forest: { bg: 'bg-at-forest', text: 'text-white',   emojiBg: 'bg-at-mint',   isDark: true  },
        cream:  { bg: 'bg-at-cream',  text: 'text-[#181d26]', emojiBg: 'bg-at-peach',  isDark: false },
        dark:   { bg: 'bg-at-ink',    text: 'text-at-canvas', emojiBg: 'bg-at-yellow', isDark: true  },
        peach:  { bg: 'bg-at-peach',  text: 'text-[#181d26]', emojiBg: 'bg-at-soft',   isDark: false },
        mint:   { bg: 'bg-at-mint',   text: 'text-[#181d26]', emojiBg: 'bg-at-cream',  isDark: false },
    };

    // ── Mock cultural cards ──────────────────────────────────────────────────
    // TODO: replace with Firebase load pattern:
    //   getDoc(doc(db, `artifacts/periplo-app-v1/users/${uid}/quizzes`, id))
    //   then map data.content.cards to this shape.
    const CARDS = [
        {
            wordEs: 'gordita',
            wordEn: 'thick stuffed corn cake',
            emoji: '🥙',
            definition:
                "It's basically a thick corn tortilla split open and stuffed with beans, cheese, chicharrón, or stewed meat. Think of it as Mexico's version of a stuffed pita — but crispier, doughier, and deeply satisfying.",
            culturalNote:
                "The word gordita literally means 'chubby little one' — and it's also one of Mexico's most common terms of endearment. Calling someone gordita is warm and affectionate, never offensive.",
            relatedWords: ['sope', 'huarache', 'tlayuda', 'memela'],
            accent: 'coral',
        },
        {
            wordEs: 'nopal',
            wordEn: 'prickly pear cactus pad',
            emoji: '🌵',
            definition:
                "The flat, paddle-shaped pad of the prickly pear cactus. Once the spines are shaved off, it's sliced raw into salads, grilled alongside eggs, or simmered into soups. Slightly mucilaginous — think okra with a citrusy bite.",
            culturalNote:
                "The nopal appears on the Mexican national flag. Legend says the Aztec god Huitzilopochtli told his people to found their city where they saw an eagle perched on a nopal devouring a serpent — that spot became Tenochtitlán, now Mexico City.",
            relatedWords: ['nopales', 'tuna', 'xoconostle'],
            accent: 'forest',
        },
        {
            wordEs: 'tlayuda',
            wordEn: 'giant crispy Oaxacan tortilla',
            emoji: '🌮',
            definition:
                "A giant, partially dried corn tortilla from Oaxaca — roughly 30 cm across — spread with black bean paste and asiento (unrefined pork fat), then topped with tasajo or cecina, Oaxacan string cheese, and sliced vegetables.",
            culturalNote:
                "Tlayudas are so central to Oaxacan identity that locals sometimes call them 'the Oaxacan pizza' — though any Oaxacan will remind you, firmly, that the comparison falls short.",
            relatedWords: ['tasajo', 'cecina', 'asiento', 'quesillo'],
            accent: 'cream',
        },
        {
            wordEs: 'volcán',
            wordEn: 'crispy taco with erupting cheese',
            emoji: '🌋',
            definition:
                "A taco al pastor variant where the tortilla is pressed against the trompo (the rotating spit) until the cheese melts into a crispy, lacy golden shell that spills over the edges — hence the name 'volcano.'",
            culturalNote:
                "The volcán was invented in Mexico City's taquería culture to showcase quesillo (Oaxacan string cheese) in al pastor tacos. When the cheese erupts past the tortilla rim and crisps on the comal, you know you've got the real thing.",
            relatedWords: ['al pastor', 'trompo', 'quesillo', 'gringa'],
            accent: 'dark',
        },
        {
            wordEs: 'maciza',
            wordEn: 'solid pork — no organs',
            emoji: '🥩',
            definition:
                "In any carnitas taquería, maciza refers to the lean, solid cuts — shoulder or leg — as opposed to organ meats or mixed trimmings. Ordering maciza means clean, uncomplicated pork with no surprises.",
            culturalNote:
                "In the carnitas pecking order, maciza is the safe entry point; buche (stomach) or nenepil (uterus) are reserved for the committed purist. Saying 'maciza, por favor' at any carnitas spot in Mexico earns an immediate respectful nod.",
            relatedWords: ['carnitas', 'buche', 'suadero', 'longaniza'],
            accent: 'peach',
        },
        {
            wordEs: 'longaniza',
            wordEn: 'spiced pork sausage',
            emoji: '🌭',
            definition:
                "A long, thin, intensely seasoned pork sausage — spicier and more aromatic than chorizo, made with vinegar, dried chili, and herbs. Common in Oaxaca and Chiapas. Crumbled and fried until crispy, it's a staple in tacos, eggs, and beans.",
            culturalNote:
                "Longaniza varies dramatically by region: Oaxaca's version uses chili negro for deep smokiness; Chiapas's leans toward achiote and citrus. Ordering longaniza in a new city is always a small adventure.",
            relatedWords: ['chorizo', 'tasajo', 'cecina'],
            accent: 'mint',
        },
        {
            wordEs: 'suadero',
            wordEn: 'silky slow-cooked beef',
            emoji: '🥙',
            definition:
                "A thin cut of beef from the layer between hide and muscle, slow-rendered in its own fat until silky and slightly crispy at the edges. One of Mexico City's signature taco proteins — rich, unctuous, and completely addictive.",
            culturalNote:
                "Suadero is almost exclusively a Mexico City thing — street taqueros guard their rendering lard like trade secrets. The best suadero tacos come from stands that have been cooking the same pot since the 1970s, long after midnight.",
            relatedWords: ['maciza', 'carnitas', 'tripa', 'longaniza'],
            accent: 'cream',
        },
    ];

    export default function Recuerdalo() {
        const [idx,       setIdx]       = useState(0);
        const [dark,      setDark]      = useState(true);
        const [showIndex, setShowIndex] = useState(false);

        useEffect(() => {
            if (dark) document.documentElement.classList.add('dark');
            else      document.documentElement.classList.remove('dark');
        }, [dark]);

        const card   = CARDS[idx];
        const accent = ACCENTS[card.accent];
        const labelColor = accent.isDark ? 'rgba(255,255,255,0.6)' : '#41454d';
        const iconBorder = accent.isDark ? 'rgba(255,255,255,0.25)' : 'rgba(24,29,38,0.15)';
        const iconBg     = accent.isDark ? 'rgba(255,255,255,0.1)'  : 'rgba(24,29,38,0.06)';

        return (
            <div className="min-h-screen bg-at-canvas">

                {/* ═══════════════════════════════════════════════════════════ */}
                {/* BANNER — Standard Periplo (igual que demás renderers -es)  */}
                {/* ═══════════════════════════════════════════════════════════ */}
                <header className="sticky top-0 z-20 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-6 py-3"
                        style={{ fontFamily: "'Plus Jakarta Sans', sans-serif" }}>

                    {/* LEFT: P badge + divider + título */}
                    <div className="flex items-center gap-4">
                        <button
                            onClick={() => window.location.href = 'index-es.html'}
                            className="flex items-center gap-2 hover:opacity-80 transition-opacity"
                            style={{ cursor: 'pointer' }}>
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-base shadow-lg shadow-indigo-600/20">
                                P
                            </div>
                        </button>
                        <div className="hidden sm:block w-px h-8 bg-zinc-800 mx-1"/>
                        <div>
                            <h1 className="text-lg font-black text-white leading-none tracking-tight">
                                Recuérdalo
                            </h1>
                            <p className="text-[10px] font-bold text-orange-400 uppercase tracking-widest mt-1">
                                Cultural Deep Dive · Español
                            </p>
                        </div>
                    </div>

                    {/* RIGHT: toggle + counter + nav + índice */}
                    <div className="flex items-center gap-2">
                        {/* Dark mode toggle */}
                        <button
                            onClick={() => setDark(d => !d)}
                            className="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-800 transition-colors"
                            style={{ cursor: 'pointer' }}
                            title={dark ? 'Modo claro' : 'Modo oscuro'}>
                            {dark ? <Sun size={15}/> : <Moon size={15}/>}
                        </button>

                        {/* Counter */}
                        <span className="text-xs font-bold text-zinc-600 px-1 hidden sm:inline">
                            {idx + 1}/{CARDS.length}
                        </span>

                        {/* ← Anterior */}
                        <button
                            onClick={() => setIdx(i => Math.max(0, i - 1))}
                            disabled={idx === 0}
                            className="flex items-center gap-1.5 px-4 py-2 bg-zinc-900 border border-zinc-800 text-zinc-300 rounded-xl font-bold text-sm disabled:opacity-30 hover:bg-zinc-800 transition-colors"
                            style={{ cursor: idx === 0 ? 'default' : 'pointer' }}>
                            <ChevronLeft size={15}/> Anterior
                        </button>

                        {/* Siguiente → */}
                        <button
                            onClick={() => setIdx(i => Math.min(CARDS.length - 1, i + 1))}
                            disabled={idx === CARDS.length - 1}
                            className="flex items-center gap-1.5 px-4 py-2 bg-zinc-100 border border-zinc-200 text-zinc-900 rounded-xl font-bold text-sm disabled:opacity-30 hover:bg-white transition-colors"
                            style={{ cursor: idx === CARDS.length - 1 ? 'default' : 'pointer' }}>
                            Siguiente <ChevronRight size={15}/>
                        </button>

                        {/* 📚 Índice de palabras */}
                        <button
                            onClick={() => setShowIndex(true)}
                            className="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-orange-400 hover:bg-zinc-800 transition-colors"
                            style={{ cursor: 'pointer' }}
                            title="Ver todas las palabras">
                            <BookOpen size={15}/>
                        </button>
                    </div>
                </header>

                {/* ═══════════════════════════════════════════════════════════ */}
                {/* MODAL ÍNDICE — lista de todas las palabras para saltar      */}
                {/* ═══════════════════════════════════════════════════════════ */}
                {showIndex && (
                    <div
                        className="fixed inset-0 z-50 flex items-center justify-center p-6"
                        style={{ background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(6px)' }}
                        onClick={() => setShowIndex(false)}>
                        <div
                            className="bg-zinc-900 border border-zinc-800 rounded-[1.5rem] w-full shadow-2xl overflow-hidden"
                            style={{ maxWidth: 360, fontFamily: "'Plus Jakarta Sans', sans-serif" }}
                            onClick={e => e.stopPropagation()}>

                            {/* Modal header */}
                            <div className="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
                                <div>
                                    <h2 className="text-base font-black text-white">Todas las palabras</h2>
                                    <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">
                                        Selecciona para saltar
                                    </p>
                                </div>
                                <button
                                    onClick={() => setShowIndex(false)}
                                    className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-500 hover:text-white transition-colors"
                                    style={{ cursor: 'pointer' }}>
                                    <X size={16}/>
                                </button>
                            </div>

                            {/* Word list */}
                            <div className="divide-y divide-zinc-800/60">
                                {CARDS.map((c, i) => (
                                    <button
                                        key={i}
                                        onClick={() => { setIdx(i); setShowIndex(false); }}
                                        className={`w-full flex items-center gap-4 px-6 py-3.5 text-left transition-colors ${
                                            i === idx
                                                ? 'bg-zinc-800'
                                                : 'hover:bg-zinc-800/60'
                                        }`}
                                        style={{ cursor: 'pointer' }}>
                                        <span style={{ fontSize: 28, lineHeight: 1 }}>{c.emoji}</span>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-black text-white text-sm">{c.wordEs}</p>
                                            <p className="text-zinc-500 text-xs truncate">{c.wordEn}</p>
                                        </div>
                                        {i === idx && (
                                            <div className="w-2 h-2 rounded-full bg-orange-400 shrink-0"/>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {/* ═══════════════════════════════════════════════════════════ */}
                {/* CARD                                                        */}
                {/* ═══════════════════════════════════════════════════════════ */}
                <main className="px-12 py-8" style={{ maxWidth: 960, margin: '0 auto' }}>
                    <div className="border border-at-wire rounded-at-lg overflow-hidden">

                        {/* ── ROW 1: emoji + word ─────────────────────────── */}
                        <div className="grid" style={{ gridTemplateColumns: '220px 1fr' }}>

                            {/* Emoji box — colored per accent */}
                            <div className={`${accent.emojiBg} flex flex-col items-center justify-center gap-4 border-r border-at-wire`}
                                 style={{ padding: '48px 32px' }}>
                                <span style={{ fontSize: 72, lineHeight: 1 }}>{card.emoji}</span>
                                <span className="font-medium text-at-muted uppercase text-center"
                                      style={{ fontSize: 10, letterSpacing: '0.12em' }}>
                                    foto próximamente
                                </span>
                            </div>

                            {/* Word + translation */}
                            <div className="flex flex-col justify-center gap-2" style={{ padding: '48px 48px' }}>
                                <span className="font-medium text-at-muted uppercase"
                                      style={{ fontSize: 11, letterSpacing: '0.12em' }}>
                                    Español
                                </span>
                                <h2 className="text-at-ink font-normal leading-none"
                                    style={{ fontSize: 52, letterSpacing: '-0.03em' }}>
                                    {card.wordEs}
                                </h2>
                                <p className="text-at-muted font-normal"
                                   style={{ fontSize: 20, marginTop: 6, lineHeight: 1.4 }}>
                                    {card.wordEn}
                                </p>
                            </div>
                        </div>

                        {/* ── ROW 2: Definition ───────────────────────────── */}
                        <div className="border-t border-at-wire flex items-start gap-5"
                             style={{ padding: '32px 48px' }}>
                            <div className="w-9 h-9 rounded-full border border-at-wire bg-at-soft flex items-center justify-center shrink-0"
                                 style={{ fontSize: 15, marginTop: 2 }}>
                                📖
                            </div>
                            <div className="flex-1">
                                <p className="font-medium text-at-muted uppercase mb-3"
                                   style={{ fontSize: 11, letterSpacing: '0.12em' }}>
                                    Definition
                                </p>
                                <p className="text-at-body leading-relaxed" style={{ fontSize: 15 }}>
                                    {card.definition}
                                </p>
                            </div>
                        </div>

                        {/* ── ROW 3: Cultural note — signature surface ─────── */}
                        <div className={`${accent.bg} flex items-start gap-5`}
                             style={{ padding: '32px 48px' }}>
                            <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0"
                                 style={{ fontSize: 15, marginTop: 2, border: `1px solid ${iconBorder}`, background: iconBg }}>
                                💡
                            </div>
                            <div className="flex-1">
                                <p className="font-medium uppercase mb-3"
                                   style={{ fontSize: 11, letterSpacing: '0.12em', color: labelColor }}>
                                    Cultural Curiosity
                                </p>
                                <p className={`${accent.text} leading-relaxed`} style={{ fontSize: 15 }}>
                                    {card.culturalNote}
                                </p>
                            </div>
                        </div>

                        {/* ── ROW 4: Related words ────────────────────────── */}
                        <div className="border-t border-at-wire flex items-center gap-3 flex-wrap"
                             style={{ padding: '20px 48px' }}>
                            <span className="font-medium text-at-muted uppercase shrink-0"
                                  style={{ fontSize: 11, letterSpacing: '0.12em' }}>
                                Related
                            </span>
                            <div className="w-px h-4 bg-at-wire shrink-0"/>
                            {card.relatedWords.map((w, i) => (
                                <span key={i}
                                      className="font-medium text-at-body bg-at-soft border border-at-wire rounded-full"
                                      style={{ fontSize: 13, padding: '5px 14px' }}>
                                    {w}
                                </span>
                            ))}
                        </div>
                    </div>

                </main>
            </div>
        );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<Recuerdalo />);
</script>
</body>
</html>
